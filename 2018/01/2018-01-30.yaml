Date: '2018-01-30'
Source_URI: Portal:Current events/2018 January 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Battle of Aden (2018)
  - The Southern Transitional Council (STC) takes control of the Yemeni port city
    of Aden following two days of fierce fighting in the city which has left dozens
    dead. Yemeni Prime Minister Ahmed Obeid bin Daghr, and members of the President
    Abdrabbuh Mansur Hadi-led government are confined to the presidential palace which
    has been surrounded. (Reuters)
  International relations:
  - Russia–United States relations
  - Reports surface about the publication on January 29 by the United States of a
    list of Russian politicians and oligarchs that the U.S. government was required
    by CAATSA to draw up. Russian President Vladimir Putin says that the list, on
    which he is not included, is an "unfriendly act" that complicates ties between
    the two countries. (BBC1), (BBC2)
  Politics and elections:
  - 2018 State of the Union Address
  - U.S. President Donald Trump delivers his first State of the Union Address to the
    115th United States Congress in the chamber of the House of Representatives. (The
    New York Times)
  - 2017–18 Spanish constitutional crisis
  - The Speaker of the Parliament of Catalonia delays the session of investiture of
    Carles Puigdemont after the suspension by the Constitutional Court of the telematic
    investiture. Roger Torrent insists that Puigdemont is the only candidate, disobeying
    the decision of the high court. (The Guardian)
  - Shortly after the decision, demonstrators assaulted the Parliament gardens as
    a form of protest, facing the Mossos d'Esquadra. (El País)
  - Aftermath of the Kenyan general election, 2017
  - Raila Odinga stages a swearing in ceremony in Nairobi in which he names himself
    the 'People's president'. (New York Times)
