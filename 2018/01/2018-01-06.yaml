Date: '2018-01-06'
Source_URI: Portal:Current events/2018 January 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Casamance conflict
  - Gunmen kill 13 people near the town of Ziguinchor, Senegal. (France 24)
  - Kashmir conflict
  - An IED bombing kills four Indian Reserve policemen patrolling a deserted market
    in the upper northwestern city of Sopore, India. Jaish-e-Mohammed militants, fighting
    against Indian rule in Kashmir, claim responsibility for the attack. (AP via The
    Washington Post) (Gulf News)
  Disasters and accidents:
  - Sanchi oil tanker collision
  - Thirty-two sailors are missing after Iranian oil tanker and Chinese freighter
    CF-Crystal collide off the east coast of China. The collision ignites the oil
    tanker, which carried a 136,000-tonne load. (CNN), (Reuters)
  International relations:
  - Germany–Turkey relations
  - German foreign minister Sigmar Gabriel and his Turkish colleague Mevlüt Çavuşoğlu
    agree to improve relations between their countries. (AFP via News24)
  - Cuba–United States relations
  - U.S. Senator Jeff Flake tells Cuban officials there is "no evidence" of a suspected
    sonic attack on U.S. diplomats at the U.S. embassy in Havana. (CBS News)
  Law and crime:
  - Anti-austerity movement
  - Saudi authorities arrest 11 princes in Riyadh for staging a protest against Saudi
    Arabia's austerity measures. (Al Jazeera)
  Politics and elections:
  - 2017–18 Iranian protests
  - Thousands of government supporters demonstrate across Iran for the fourth consecutive
    day. (Voice of America)
  - Hundreds of Iranians hold rallies in support of the anti-regime protests in Iran,
    in cities including Washington, D.C., Stockholm, London, Paris and Berlin. About
    400 people gathered in central Paris, and several hundred held a rally in front
    of Berlin’s Brandenburg Gate with Iranian flags, drums and banners calling for
    a change of government. (Yahoo! via Reuters)
  - Crisis in Venezuela (2012–present)
  - After the Venezuelan government orders shops to lower prices, hundreds of people
    line up to take advantage of these price cuts. (Reuters)
