Date: '2018-01-13'
Source_URI: Portal:Current events/2018 January 13
Intelligence_Payload:
  Business and economy:
  - Racism in South Africa
  - In South Africa, several H&M stores are closed following protests over a controversial
    advertisement that was featured in the store's webpage. The advertisement showed
    a black child model wearing a green hoodie reading "Coolest Monkey in the Jungle".
    Several stores are also ransacked by protesters from the Economic Freedom Fighters
    over the advertisement. (Reuters) (CNN Business)
  - Rubber bullets are used on EEF protesters at the East Rand Mall. (News24)
  Disasters and accidents:
  - Seven people are killed when a helicopter carrying five Oil and Natural Gas Corporation
    senior officers operated by Pawan Hans Limited crashes into the Arabian Sea off
    the coast of Mumbai, Maharashtra, India. (NDTV) (Aviation Safety Network)
  - A search for missing children is underway after a boat capsized off the Indian
    coast near Dahanu, Maharashtra. Two bodies have been recovered. (BBC)
  - Sanchi oil tanker collision
  - A Chinese rescue team recovers two bodies from the and salvages the voyage data
    recorder from the bridge. (Reuters)
  - Pegasus Airlines Flight 8622
  - A Pegasus Airlines flight from Esenboğa International Airport in Ankara, Turkey,
    departs the runway of Trabzon Airport in northern Turkey upon landing. All 162
    passengers, two pilots, and four cabin crew evacuated the aircraft, a Boeing 737,
    unharmed. The local government launched an investigation into the incident. (Irish
    Independent), (Sky News)
  International relations:
  - Iran–United States relations
  - Iran's Ministry of Foreign Affairs says the January 12 U.S. sanctions on Chief
    Justice Sadeq Amoli-Larijani are "beyond all [...] red lines." (BBC) (Sputnik)
  - Joint Comprehensive Plan of Action
  - U.S. President Donald Trump says he is extending sanctions relief for Iran one
    last time so Europe and the U.S. can fix the nuclear deal's "terrible flaws".
    (BBC)
  - Iran's Foreign Ministry replies that it "will not accept any change in the deal,"
    adding that it will "not take any action beyond its commitments." (Politico)
  - Annexation of Crimea by the Russian Federation
  - Russia deploys a second anti-air S-400 missile battalion in Crimea. (TASS) (Radio
    Free Europe)
  - 2018 Hawaii false missile alert
  - An emergency alert warning of an inbound ballistic missile is accidentally sent
    out across the U.S. state of Hawaii at 8:07 HST, before being cleared as a false
    alarm 38 minutes later. This event caused panic and disruptions across the state
    on the archipelago inhabited by roughly 1.7 million people. (BBC)
  Law and crime:
  - The Bar Council of India forms a 7-member delegation which will attempt to meet
    the four most senior Supreme Court judges on behalf of Chief Justice of India
    (CJI) Dipak Misra. This comes in the wake of allegations made by the four top
    judges against the CJI at a first of its kind press conference held on January
    12. (The Times of India)
  - Nigerian Shia Islamic Movement leader, Ibrahim Zakzaky, who is detained at an
    unknown location without charges since December 2015, makes a short public appearance,
    his first in two years, being allowed to see his doctor. (Reuters)
  - Two people are killed and another is injured in a mass shooting in Vancouver,
    Canada. (CBC)
  Politics and elections:
  - Czech presidential election
  - The first round of the presidential election results in a second round that will
    be held on 26 and 27 January between Miloš Zeman and Jiří Drahoš. (Reuters)
