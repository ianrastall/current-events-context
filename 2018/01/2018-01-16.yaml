Date: '2018-01-16'
Source_URI: Portal:Current events/2018 January 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Aftermath of the Caracas helicopter incident
  - The Venezuelan government confirms that Óscar Pérez, the rogue pilot responsible
    for the Caracas helicopter incident in June 2017, was killed in a firefight with
    the Venezuelan Army yesterday. Two police officers and seven people from Pérez's
    group were killed, and six members of Pérez's group were arrested. (CNN) (teleSUR)
  Arts and culture:
  - Animal welfare and rights in Europe
  - The European Parliament approves a call to ban electric pulse fishing, seen by
    some as cruel. (U.S. News & World Report)
  - The Church of Jesus Christ of Latter-day Saints (Mormon Church) names Russell
    M. Nelson as the 17th President of the Church. (NPR)
  Business and economy:
  - The Dow Jones Industrial Average reaches 26,000 points for the first time, after
    surpassing the 25,000-mark on January 4. (Chicago Tribune)
  - In a strategy claimed as "towards healthier products", Nestlé sells its United
    States confectionery business, number 4 on the market, to Ferrero SpA for $2.8
    billion. (Reuters)
  Disasters and accidents:
  - A Colombian Army Mi-17 helicopter crashes near Segovia, Antioquia, in northern
    Colombia, killing ten people. (Reuters)
  International relations:
  - Palestine–United States relations
  - The United States will withhold $65 million for Palestinian aid paid via the United
    Nations Relief and Welfare Agency stating that UNRWA needs to make unspecified
    reforms. The U.S. says it will provide $60 million, 48 percent of the regular
    payment. (Reuters)
  Law and crime:
  - Terrorism in Kosovo
  - Oliver Ivanović, the head politician of the Kosovo Serb party Freedom, Democracy,
    Justice, is killed outside his office in North Mitrovica in a drive-by shooting.
    Aleksandar Vučić, the President of Serbia says his government treats this as an
    act of terrorism. (BBC)
  - Terrorism in Pakistan
  - Over 1,800 muslim clerics in Pakistan issue a fatwa aimed at prohibiting the use
    of suicide bombing, declaring it haram. (Sputnik).
  Politics and elections:
  - U.S. Special Counsel investigation
  - The New York Times reports that Special Counsel Robert Mueller subpoenaed Steve
    Bannon last week to testify before a grand jury. The House Intelligence Committee
    issues a second subpoena, via powers seldomly used by Congress, following Bannon's
    testimony today that, while he was willing to answer questions, the White House
    instructed him not to answer questions related to his White House tenure. (CNN)
    (NBC News) (The New York Times)
  Science and technology:
  - Climate of Russia
  - Temperatures reach in Russia's Yakutia region, four degrees shy of the record
    low of recorded in 2013 in Yakutia's village of Oymyakon. (Channel NewsAsia)
