Date: '2018-01-29'
Source_URI: Portal:Current events/2018 January 29
Intelligence_Payload:
  Disasters and accidents:
  - Bus plunge
  - A bus plunges into the Bhairab River after falling off a bridge in Murshidabad
    district, West Bengal, India, killing at least 36 people. The late response by
    rescuers to save passengers leads to violence between local residents and police.
    (BBC)
  Law and crime:
  - Crime in Toronto
  - Toronto Police charge landscaper Bruce McArthur with a total of five counts of
    first-degree murder, after garden planters containing the remains of three additional
    people are found on a property linked to him. (CBC News)
  - Mass shootings in the United States, Crime in Pennsylvania
  - The gunman who fatally shot four people at a car wash in the Melcroft suburb of
    Saltlick Township in Pennsylvania the previous day dies at a hospital from a self-inflicted
    gunshot wound. (CNN)
  Politics and elections:
  - Politics of Egypt
  - Minutes before the registration deadline, a second candidate, Moussa Mostafa Moussa,
    fulfills paperwork to participate in the 2018 presidential election. Leading opposition
    members called for a boycott, saying that a wave of repression has cleared the
    field of challengers to President Abdel Fattah el-Sisi. (Reuters)
  - Politics of Romania
  - Viorica Dăncilă (PSD) is confirmed as Romania's first female Prime Minister. She
    is Romania's third premier in less than 13 months. (Irish Times)
  - Presidency of Donald Trump
  - Andrew McCabe resigns as Deputy Director of the Federal Bureau of Investigation
    amid a dispute with President Donald Trump. (The Independent)
