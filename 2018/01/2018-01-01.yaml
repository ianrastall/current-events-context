Date: '2018-01-01'
Source_URI: Portal:Current events/2018 January 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kashmir conflict
  - An armed standoff between Indian security forces and Kashimiri rebels at a paramilitary
    base ends after 36 hours and leaves eight people dead. (Al Jazeera)
  Arts and culture:
  - Boycott, Divestment and Sanctions
  - An American Jewish rabbi publishes an ad in The Washington Post calling the New
    Zealand pop singer Lorde a "bigot" after she cancelled her concert in Israel.
    (Jerusalem Post)
  Business and economy:
  - Value Added Tax (VAT) has been introduced in Saudi Arabia and the United Arab
    Emirates for the first time. (BBC)
  Disasters and accidents:
  - A boat capsizes in the north of Indonesian Borneo, leaving at least eight people
    dead. (BBC)
  - Two people are killed in a plane crash in Northland, New Zealand. (1 News)
  International relations:
  - Pakistan–United States relations
  - U.S. President Donald Trump tweets that Pakistan has been a "safe haven" for terrorists
    from Afghanistan and has given America "nothing but lies & deceit" after getting
    more than $33 billion in U.S. aid. (Time)
  - Pakistan asks U.S. Ambassador to Pakistan David Hale to clarify Trump's remarks.
    Pakistani Prime Minister Shahid Khaqan Abbasi calls for Cabinet and National Security
    Council meetings to discuss the tweet. (Los Angeles Times)
  - Pakistan's Defence Minister accuses the U.S. of giving Pakistan "nothing but invective
    & mistrust" after receiving "land & air communication, military bases & intel
    cooperation that decimated Al-Qaeda over last 16yrs". (AOL)
  Law and crime:
  - Legal history of cannabis in the United States
  - California becomes the latest and most-populated state to legalize the recreational
    use of cannabis. (BBC)
  - Brazil prison riots
  - An apparent gang riot at Colonia Agroindustrial prison in Goiânia, Brazil, results
    in nine deaths and 14 inmates injured. Authorities report 233 prisoners escaped
    but now only 95 prisoners remain at large. (The Guardian) (Reuters)
  - Law of Alaska
  - The U.S. state of Alaska eliminates the posting of bail in criminal cases, replacing
    it with a points-based system, rating the defendant on their previous criminal
    history, their danger to the public, and their probability of showing up to court
    hearings. (US News & World Report)
  Politics and elections:
  - 2017–18 Iranian protests
  - Ten people die at the protests overnight, with twelve deaths total so far as the
    protests enter their fifth day. (BBC)
  - Politics of Switzerland
  - Alain Berset takes office as President of the Swiss Confederation. At 45 years
    of age, Berset is the youngest president of Switzerland since 1934. (Swissinfo)
  Sports:
  - 2018 PDC World Darts Championship
  - In darts, Rob Cross wins the PDC World Darts Championship (on his debut) defeating
    Phil Taylor (in his last career match) 7–2 in the final. (BBC)
