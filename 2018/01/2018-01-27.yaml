Date: '2018-01-27'
Source_URI: Portal:Current events/2018 January 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Kabul ambulance bombing
  - A suicide bomber in an ambulance packed with explosives kills at least 102 people
    and wounds 158 outside a hospital in Kabul, Afghanistan. (The Washington Post)
  - Gunmen kill at least 14 soldiers at a military base in Soumpi, central Mali. (AFP
    via France 24)
  - 2018 attacks on the northern border of Ecuador
  - 13 police officers are injured after an attack against a police command in San
    Lorenzo Canton, Ecuador.(CNN)
  Business and economy:
  - Energy in Europe
  - United States Secretary of State Rex Tillerson says that the U.S. and Poland "oppose"
    the Nord Stream 2 pipeline. They see it as undermining Europe's overall energy
    security and stability. (Reuters via U.S. News and World Report)
  Disasters and accidents:
  - Riverside homes and businesses in Paris are on high alert as the swollen River
    Seine threatens to overflow its banks. (BBC)
  International relations:
  - Turkish military intervention in Afrin
  - According to the Turkish presidency, United States National Security Advisor H.
    R. McMaster said January 26 that the U.S. "will not provide any more weapons to
    the Syrian Kurdish YPG militia". (Reuters via U.S. News & World Report) (AP via
    The Washington Post)
  Law and crime:
  - Weinstein effect
  - In the United States, billionaire Steve Wynn, best known for his casino hotels
    and resorts, resigns as Republican National Committee finance chairman following
    sexual harassment reports, including a $7.5 million settlement with a former worker
    at his Las Vegas resort. (Bloomberg via Fortune)
  Politics and elections:
  - Czech presidential election, 2018
  - Incumbent Miloš Zeman, who opposes immigration and objects to EU sanctions against
    Russia, is elected to a second term as President of the Czech Republic, after
    receiving 51.8 percent of the votes in the run-off election over pro-EU challenger
    Jiří Drahoš. (BBC) (ABC News)
  - Presidency of Donald Trump
  - The United States will pay Boeing nearly US$24 million to replace two of the five
    27-year-old chiller units on Air Force One, customized to carry 70 cubic feet
    of refrigerated storage for about 3,000 meals. (Star and Stripes) (Defense One)
  - Politics of Honduras
  - President Juan Orlando Hernández Alvarado takes oath of his second presidential
    term amid protests led by Salvador Nasralla, former candidate for the Alliance
    of Opposition against the Dictatorship. (Deutsche Welle)
  Sports:
  - 2018 in sumo
  - In sumo, Tochinoshin Tsuyoshi becomes the first Georgian wrestler in history to
    win the makuuchi (top division) championship. (Reuters)
