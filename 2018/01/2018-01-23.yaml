Date: '2018-01-23'
Source_URI: Portal:Current events/2018 January 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - A double car bombing in Benghazi, Libya, kills at least 33 people and wounds "dozens"
    of others. The victims include both military personnel and civilians, according
    to local officials. (Reuters)
  Arts and culture:
  - 90th Academy Awards
  - The nominations for the upcoming Academy Awards are announced. Among the films
    nominated as the best of 2017 in film, The Shape of Water leads with thirteen
    nominations, with Dunkirk following behind with eight nominations. (CNN)
  - Russia's Ministry of Culture bars the release of the British–French political
    satire film The Death of Stalin in the country after accusing the film of containing
    "ideological warfare" and "extremist" content. (BBC)
  Business and economy:
  - World Economic Forum
  - Various billionaires, world leaders, and investors gather in Davos, Switzerland
    to discuss economic issues. (Bloomberg)
  - Trans-Pacific Partnership
  - The 11 remaining countries aiming to create the Trans-Pacific Partnership after
    the United States' withdrawal announce that they will sign an agreement in Chile
    this March. (Reuters)
  Disasters and accidents:
  - 2018 Alaska earthquake
  - A 7.9 magnitude earthquake occurs in the Gulf of Alaska. A tsunami warning is
    issued for coastal Alaska and British Columbia, and the entire U.S. West Coast
    is placed under a tsunami watch. Areas of Alaska remain under a tsunami advisory.
    It is tied as the sixth-largest earthquake ever recorded in the United States,
    but there are no reports of significant damage or fatalities. (Sky News UK) (CBS
    News) (USGS)
  - A helicopter and a light aircraft collide mid-air close to the Philippsburg Nuclear
    Power Plant in Germany, killing four people. (Deutsche Welle)
  - Three people, two employees of a television company and a Brazilian Air Force
    sergeant, are killed when their Robinson R44 crashes into the sea at Praia de
    Pina, Recife, Pernambuco, Brazil. (G1) (Aviation Safety Network)
  International relations:
  - Haiti–United States relations
  - The United States closes its embassy in Port-au-Prince, Haiti, due to large-scale
    protests against the policy of U.S. President Donald Trump. (AP via Armenpress)
  Law and crime:
  - 2018 Marshall County High School shooting
  - A school shooting at Marshall County High School in Draffenville, Kentucky kills
    two people and injures 19. The suspect is arrested. (Fox News)
  Politics and elections:
  - Politics of the United Kingdom
  - Theresa May criticizes Boris Johnson for airing National Health Service funding
    concerns outside private U.K. Cabinet meetings. (Reuters)
  - Venezuelan presidential election, 2018
  - The National Constituent Assembly approved a decree that calls for presidential
    elections before April 30. Incumbent Nicolás Maduro says he will compete for re-election.
    (Business Insider)
  - The United States Senate confirms Jerome Powell as chairman of the Federal Reserve
    Bank with 84 votes for and 13 against. (The New York Times)
  - Politics of Guatemala
  - President Jimmy Morales is questioned about the high costs he spends to buy food
    and other luxury items. (BBC)
  Science and technology:
  - Google Lunar X Prize
  - The organizers of the Google Lunar X Prize announce that the $20 million grand
    prize for a commercial lunar lander will expire on 31 March 2018 without a winner
    because none of its five finalist teams would be able to launch a mission before
    the deadline. (Space News)
  Sports:
  - 2017–18 NBA season
  - LeBron James of the Cleveland Cavaliers scores his 30,000th career regular-season
    point in a loss to the San Antonio Spurs. James becomes the youngest player to
    reach the milestone at age , surpassing Kobe Bryant's previous record of . (Sports
    Illustrated)
