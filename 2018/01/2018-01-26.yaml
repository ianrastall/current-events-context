Date: '2018-01-26'
Source_URI: Portal:Current events/2018 January 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - President of Turkey Recep Tayyip Erdoğan says the Afrin offensive, as announced,
    is now to turn east, towards Manbij and the border with Iraq. (Reuters)
  Arts and culture:
  - Protests against Donald Trump
  - Celebrities Alyssa Milano, Michael Moore and Mark Ruffalo organize a "People's
    State of the Union"-themed concert on Monday in New York City. Common and Andra
    Day are scheduled to perform. (USA Today)
  Business and economy:
  - CSeries dumping petition by Boeing
  - The United States International Trade Commission votes 4–0 in favor of dismissing
    the Boeing Company's petition against Bombardier Inc. over alleged price dumping.
    (Reuters)
  Disasters and accidents:
  - 2018 Miryang hospital fire
  - A fire breaks out in a hospital in Miryang, South Korea, killing at least 37 people
    and injuring over 130 others. (Reuters via ABC News) (BBC)
  - Paris Zoological Park, France, is evacuated and closed after dozens of baboons
    escape their enclosure. (The Guardian)
  - Rescuers, including the Royal New Zealand Air Force, search for the Kiribati ferry
    MV Butiraoi with around 50 people on board after it is declared missing. (BBC)
    (The New Zealand Herald)
  - Cape Town water crisis
  - Cape Town announces that they will reach their "zero day", when they run out of
    all available water reserves, on April 12, 2018. (CNN) (BBC)
  - Aftermath of the Oroville Dam crisis
  - The cost of the Oroville Dam spill rises to US$870 million. The U.S. state of
    California continues to hope for federal aid for the project. (KQED)
  Law and crime:
  - Crime in Guatemala
  - Former Defense Minister of Guatemala Williams Mansilla is arrested for a possible
    corruption case associated with a bond to President Jimmy Morales. The Attorney
    General asked the Supreme Court to consider again the impeachment against President
    Morales. (Reuters)
  - José Arturo Sierra, former President of the Supreme Court of Justice of Guatemala,
    is shot and killed while driving to Guatemala City. (AP via The New Zealand Herald)
  - Cryptocurrency and security
  - Hackers steal $535 million worth of the NEM cryptocurrency from Japanese exchange
    Coincheck. (CNBC)
  Politics and elections:
  - Political appointments by Donald Trump
  - U.S. President Donald Trump names former NASA astronaut James F. Reilly as leader
    of the U.S. Geological Survey. (The Hill)
