Date: '2018-01-18'
Source_URI: Portal:Current events/2018 January 18
Intelligence_Payload:
  Business and economy:
  - The Emirates airline announces an order for up to 36 Airbus A380s. Emirates is
    already the aircraft's largest operator, with a fleet of over 100. (BBC)
  Disasters and accidents:
  - 2018 Aktobe bus fire
  - A bus carrying Uzbek migrant workers catches fire in Kazakhstan's Aktobe Region,
    killing 52 people. Five people escape and are treated by rescue workers. (BBC)
  International relations:
  - France–United Kingdom relations
  - French President Emmanuel Macron meets with British Prime Minister Theresa May
    at the Royal Military Academy Sandhurst. (Politico)
  Law and crime:
  - Crime in Serbia
  - Police in Serbia arrest three Australians, one of them Rohan Arnold, a known businessman,
    for allegedly smuggling of cocaine into Sydney in 2016. (Sydney Morning Herald)
  Science and technology:
  - In a world's first, a drone rescues two swimmers off the coast of Lennox Head,
    New South Wales in Australia by dropping a safety device to them. John Barilaro,
    the Deputy Premier of New South Wales, praises the rescue as historic. (Channel
    NewsAsia) (BBC)
