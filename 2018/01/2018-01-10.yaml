Date: '2018-01-10'
Source_URI: Portal:Current events/2018 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Colombian conflict
  - After failing to reach agreement on an extension of the 101-day ceasefire, hostilities
    resume between Colombia's government and ELN forces. (Colombia Reports)
  - Ivorian soldiers in Bouaké attack the Coordination Center for Operational Decision-Making
    () military base, seizing their weaponry and setting the base on fire after accusations
    that the unit was spying on them. Last year the soldiers were involved in a series
    of mutinies. (Reuters)
  - Rohingya persecution in Myanmar
  - Senior General Min Aung Hlaing posts on Facebook that Myanmar Army troops and
    Rakhine State villagers killed 10 Rohingya Muslims whose bodies were found in
    a mass grave in Inn Din village. This is the first time Myanmar's military has
    officially acknowledged extrajudicial actions against the Rohingya. Fortify Rights
    chief executive officer Matthew Smith says the two Reuters journalists who have
    been jailed since December 12, 2017, were investigating the same mass grave referenced
    by Min Aung Hlaing. (The Washington Post)
  - War in Afghanistan
  - The United States Central Command launches an investigation into a video posted
    on YouTube which appears to show a U.S. service member firing on civilians inside
    a truck on a road in Afghanistan. The montage video, titled "Happy Few Ordnance
    Symphony", has since been removed. (Politico)
  Disasters and accidents:
  - Sanchi oil tanker collision
  - China says no major oil spill has been detected after disaster. (Channel News
    Asia)
  - A fire on the oil tanker rages for the fourth day. An explosion forces rescue
    teams to retreat as 31 sailors remain missing. (Reuters)
  - Tom Wolf, the Governor of Pennsylvania, issues a disaster declaration over the
    "heroin and opioid epidemic”, starting an Opioid Operational Command Center at
    the Pennsylvania Emergency Management Agency. (The Morning Call)
  Law and crime:
  - Immigration policy of Donald Trump
  - The U.S. Immigration and Customs Enforcement agency conducts operations at 98
    7-Eleven stores in 17 states, arresting 21 people suspected of being illegal immigrants.
    (Reuters)
  - The Hellenic Coast Guard seizes the Tanzanian-flagged cargo ship Andromeda – allegedly
    bound for Libya, loaded with 410 tonnes of explosives – in Heraklion, Greece.
    102 safety deficiencies are found, and 8 crew members are arrested. (Maritime
    Executive) (Creta Live)
  Politics and elections:
  - 2018 Tunisian protests
  - More than two hundred people are arrested across Tunisia as protests against economic
    conditions continue to grip the North African country. At least 49 police officers
    have been injured during clashes with protesters. (BBC)
  - A Jewish school on the Tunisian island of Djerba is firebombed. (Reuters)
  - Cabinet of Mexico
  - President Enrique Peña Nieto accepted the resignation of three secretaries of
    his cabinet, including the Secretary of the Interior, Miguel Ángel Osorio Chong.
    (Reuters)
