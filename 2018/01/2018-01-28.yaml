Date: '2018-01-28'
Source_URI: Portal:Current events/2018 January 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Crisis (2011–present)
  - Battle of Aden (2018)
  - United Arab Emirates-backed Southern Transitional Council (STC) fighters seize
    control of government buildings in the southern Yemeni city of Aden, after clashing
    with forces loyal to President Abdrabbuh Mansur Hadi. At least 10 people are reportedly
    killed and 30 wounded. Yemeni Prime Minister Ahmed Obeid bin Daghr accuses the
    separatists of mounting a coup. (BBC) (Al Jazeera)
  - Turkish military operation in Afrin
  - Turkish airstrikes and shelling heavily damage the ancient Syro-Hittite Ain Dara
    temple in Syria's Afrin District. The Directorate-General of Antiquities and Museums
    calls on the international community to pressure Turkey "to prevent the targeting
    of archaeological and cultural sites". (Reuters)
  Arts and culture:
  - 60th Annual Grammy Awards
  - Leonard Cohen and Carrie Fisher win posthumously. (The New York Times)
  - Alessia Cara wins Best New Artist. (NPR)
  - Bruno Mars wins three of the Big Four awards with Song of the Year for "That's
    What I Like", Record of the Year for "24K Magic" and Album of the Year for 24K
    Magic. (CNN), (Billboard)
  Business and economy:
  - Researchers note that in November 2017, Strava, which processes data from apps
    and Internet of Things devices such as Fitbit, accidentally revealed the locations
    of alleged United States military bases overseas, including in Afghanistan, Djibouti
    and Syria. (The Verge), (The Guardian)
  Disasters and accidents:
  - Shipwrecks in 2018
  - Seven survivors from the MV Butiraoi, six adults and a baby, are found in a dinghy
    and rescued, four days after the 50-passenger ferry sank in Kiribati. New Zealand
    rescuers say there is a lot of debris near the dinghy, but no sign of anyone else.
    (Sky News)
  International relations:
  - China–Japan relations
  - Chinese Foreign Minister Wang Yi meets with Japanese Foreign Minister Tarō Kōno
    in Beijing and says they hope to work to improve relations. (Reuters)
  Law and crime:
  - Mass shootings in the United States, Crime in Pennsylvania
  - Four people are shot and killed at a car wash in the Melcroft suburb of Saltlick
    Township in Pennsylvania. A fifth person, believed to be the gunman, is severely
    injured. (CBS News)
  - Four people are shot and killed in a house in Reading, Pennsylvania. (USA Today)
  Politics and elections:
  - 2018 Cypriot presidential election
  - Incumbent Nicos Anastasiades wins the first round of the election, but is well
    short of an absolute majority required to win outright. He will face his rival
    from the 2013 election, Stavros Malas, in the second round. (Cyprus Mail)
  - 2018 Finnish presidential election
  - Incumbent Sauli Niinistö takes an unprecedented first round victory after receiving
    62.7 percent of the votes. (Bloomberg)
  - 2017–2018 Russian protests
  - Russian opposition politician Alexei Navalny is arrested by police at a protest
    rally in Moscow. His arrest comes shortly after police raid the headquarters of
    his unregistered Progress Party in an apparent attempt to disrupt online broadcasts
    of opposition rallies against Vladimir Putin, while police say they were looking
    for a bomb. Navalny is released from police custody without charge late Sunday
    but needs to appear in court later. (The Guardian) (Reuters)
  Sports:
  - 2018 Australian Open
  - Swiss tennis player Roger Federer successfully defends his title in the five-sets
    men's singles final against Marin Čilić, winning his sixth title at the Australian
    Open and becoming the first man to win 20 titles in Grand Slam tournaments. (ESPN)
  - Royal Rumble (2018)
  - In professional wrestling, Shinsuke Nakamura wins the 31st Royal Rumble match.
    Asuka wins the 32nd, the first all-woman version. Both receive championship matches
    at WrestleMania 34. Former UFC women's bantamweight champion Ronda Rousey returns
    to WWE. (Sports Illustrated)
