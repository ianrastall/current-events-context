Date: '2018-01-09'
Source_URI: Portal:Current events/2018 January 9
Intelligence_Payload:
  Business and economy:
  - Steve Bannon steps down as executive chairman of Breitbart News amid a dispute
    with U.S. President Donald Trump over comments he made about the Trump family
    in Michael Wolff's Fire and Fury. (BBC)
  Disasters and accidents:
  - 2017–18 South-West Indian Ocean cyclone season
  - Cyclone Ava
  - At least 29 people are dead and 22 are missing in the aftermath of a strong tropical
    cyclone striking Madagascar. (Firstpost)
  - 2018 Southern California landslides
  - At least 15 people are killed by mudslides following heavy overnight rains in
    areas of Santa Barbara County, California, where last month's wildfires destroyed
    forests and destabilized the land. (SF Gate) (NBC News) (The New York Times)
  - 2018 Swan Islands earthquake
  - A magnitude 7.6 earthquake strikes north of Honduras, resulting in tsunami warnings
    in the Caribbean. (RT)
  International relations:
  - North Korea–South Korea relations
  - In the first inter-Korean talks in two years at the Panmunjeom-Paju "Truce Village"
    (DMZ), both parties agree on the need to ease tensions and hold military talks.
    North Korea also agrees to participate in the 2018 Winter Olympics in Pyeongchang,
    South Korea. (The Korea Herald)
  - Cuba–United States relations, Health-related incidents at the United States Embassy
    in Havana
  - An anonymous senior State Department official says that United States Secretary
    of State Rex Tillerson decided to convene a special-panel Accountability Review
    Board to further investigate the "attacks" at the U.S. embassy in Havana. (Reuters)
  - 2017–18 Iranian protests
  - Supreme Leader Ali Khamenei says that Iran has extinguished the unrest and has
    foiled attempts to turn legitimate protests into an insurgency to overthrow the
    Islamic Republic. He went on to identify the United States, Britain, Israel, the
    People's Mujahedin of Iran and "a wealthy government" in the Persian Gulf among
    Iran's foreign enemies. (Reuters)
  Law and crime:
  - Deferred Action for Childhood Arrivals
  - The United States District Court for the Northern District of California issues
    a nationwide injunction blocking the rescission of the DACA program, ordering
    the Trump administration to restart and maintain the program as the legal challenge(s)
    to the president's decision go forward. (The New York Times)
  - Gerrymandering in the United States
  - A three-judge federal panel rules North Carolina's congressional district map
    was illegally gerrymandered because legislators relied too heavily on partisan
    affiliation in drawing constituencies. This is the first time a federal court
    has struck down a redistricting plan for partisan gerrymandering. (NPR) (The Atlantic)
  Politics and elections:
  - Politics of Poland, Cabinet of Mateusz Morawiecki
  - New ministers of defence, finance, interior, health, environment and foreign affairs,
    amongst others, are appointed. (Reuters) (Reuters²)
  - Politics of Egypt
  - The Parliament of Egypt approves, with a two-thirds majority in favour, extending
    the nationwide state of emergency for a further three months, starting January
    13. (Ahram Online)
  - Politics of Spain, 2017–18 Spanish constitutional crisis
  - Artur Mas announces that he is resigning as president of the PDeCAT party. (Turkey
    Telegraph)
