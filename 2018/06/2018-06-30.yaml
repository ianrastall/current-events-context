Date: '2018-06-30'
Source_URI: Portal:Current events/2018 June 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017–18 Iranian protests
  - A peaceful protest over a water shortage in the southern Iran city of Khorramshahr
    turns violent after clashes between police and protesters. (CNN)
  - Civil unrest in the United States
  - A right-wing Patriot Prayer rally in Portland, Oregon turns violent, with clashes
    reported between the group and the left-wing group Antifa. The Portland Police
    Bureau reports that four arrests were made for outstanding warrants, and that
    Patriot Prayer's permit to march was cancelled once the violence began. (NPR)
    (CBS News)
  Law and crime:
  - Crime in Toronto
  - Two persons are killed, and one injured, in a shooting in downtown Toronto. These
    are the 49th and 50th murders this year, marking a surge of violence in the city.
    (CBC)
  Politics and elections:
  - Protests against Trump administration family separation policy
  - Tens of thousands of people participate in nationwide protests across the United
    States over the Trump administration's immigration policies. Over 630 events are
    planned, with protesters calling for migrant families split at the United States–Mexico
    border to be reunited. (BBC)
