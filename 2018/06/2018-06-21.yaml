Date: '2018-06-21'
Source_URI: Portal:Current events/2018 June 21
Intelligence_Payload:
  International relations:
  - North Korea–United States relations, North Korea and weapons of mass destruction
  - The United States announces that North Korea will destroy the Sohae Satellite
    Launching Station missile test site. (The Straits Times)
  Law and crime:
  - Sara Netanyahu, wife of Israel's Prime Minister Benjamin Netanyahu, is charged
    with fraud over the alleged misuse of state funds at their residence. (CNN)
  - The United States Supreme Court allows states to collect sales taxes from online
    retailers that do not have a "physical presence" in that state. (Politico)
  - Murder of Altantuya Shaariibuu, Malaysia-Mongolia relations
  - Malaysian authorities announce the reopening of investigations into the murder
    of a Mongolian model by two police officers associated with former Prime Minister
    Najib Razak. Who ordered the killing has never been determined. (Reuters)
  Politics and elections:
  - Trump administration family separation policy, Protests against Trump administration
    family separation policy
  - U.S. Immigration and Customs Enforcement temporarily closes their Portland, Oregon,
    offices after protesters camping outside the building grow in numbers. (CNN)
  - First Lady Melania Trump makes a surprise visit to the US-Mexico border to get
    a firsthand look at the immigration crisis. (WSTM-TV)
  - New Zealand Prime Minister Jacinda Ardern gives birth to a baby girl at 4:45 p.m.
    local time (04:45 UTC). Ardern is the first incumbent head of government to give
    birth since Pakistani Prime Minister Benazir Bhutto in 1990. (Newshub) (CNN)
