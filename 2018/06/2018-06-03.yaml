Date: '2018-06-03'
Source_URI: Portal:Current events/2018 June 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Cattle raiding
  - Cattle thieves are reported to have killed 23 people in Zamfara, Nigeria. (BBC)
  Disasters and accidents:
  - European migrant crisis
  - A migrant boat capsizes near the Kerkennah Islands off the coast of Tunisia, killing
    at least 35 people, while 67 others are rescued by the Tunisian coast guard. (BBC)
    (Reuters)
  - A speedboat carrying 15 migrants sinks off the coast of Demre, Turkey. Nine people
    are killed and one person is reported missing. (Anadolu via Eyewitness News)
  - 2018 Volcán de Fuego eruption
  - Volcán de Fuego in Guatemala erupts, leaving at least 62 people dead, 300 others
    injured, and forces the closure of La Aurora International Airport in Guatemala
    City. (The Guardian) (CBS News)
  - Wildfires in the American states of California, Colorado and New Mexico now burn
    of land, causing thousands to evacuate their homes. (CNN)
  International relations:
  - Foreign relations of North Korea, Foreign relations of Syria
  - North Korean state news agency KCNA reports that Syrian President Bashar al-Assad
    said last Wednesday that he will visit Kim Jong-un in North Korea. The Syrian
    president's office refuses to comment on the report when contacted by AFP. (CNN)
    (The Times of India)
  - India and weapons of mass destruction
  - India announces it successfully tested an Agni-V ICBM missile at a base near Odisha
    coast. (Defence Aviation Post)
  Law and crime:
  - Nigeria prison break, List of prison breaks in Nigeria
  - About 200 prisoners escape in a jailbreak at the Minna Medium Security Prison.
    One prison officer was killed and seven prisoners rearrested. (Premium Times)
  Politics and elections:
  - Slovenian parliamentary election, 2018
  - TV Slovenia exit polls show that Janez Janša's anti-immigration Slovenian Democratic
    Party (SDS) would win a plurality of 24.4% of the votes. List of Marjan Šarec
    (LMS), the party of the mayor of Kamnik, would follow with 12.6%. (Reuters)
