Date: '2018-06-04'
Source_URI: Portal:Current events/2018 June 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide bombing at a gathering of clerics in Kabul leaves seven people dead.
    The religious gathering had earlier issued a fatwa against suicide bombings. (Time)
  Business and economy:
  - Banking in the United Kingdom, 2008 United Kingdom bank rescue package
  - The government of the United Kingdom announces its intent to sell a 7.7% stake
    in the Royal Bank of Scotland, expected to raise £2.6 billion. Shadow Chancellor
    John McDonnell says there is "no economic justification" for selling the shares.
    (BBC)
  - Economy of the United States
  - Microsoft announces that it is acquiring code repository GitHub for US$7.5 billion
    in stock, pending regulatory review. (The Verge)
  - Starbucks executive chairman and former CEO Howard Schultz retires from the company.
    (The New York Times)
  Disasters and accidents:
  - A ROCAF F-16 crashes into a mountain near New Taipei City in northern Taiwan.
    The pilot is confirmed dead following a search and rescue operation. (The South
    China Morning Post)
  International relations:
  - Foreign relations of Russia
  - Russian President Vladimir Putin signs a law – voted by the State Duma on 22 May
    and approved by the State Council on 30 May – with countermeasures against actions
    of the United States and other "unfriendly" countries. (TASS)
  Law and crime:
  - Banking in Australia
  - Australia's Commonwealth Bank agrees to pay a fine of A$700 million for failing
    to disclose banking transactions above A$10,000. (BBC)
  - Chinese espionage in the United States
  - The Federal Bureau of Investigation of the United States announces the arrest
    of an employee of the Defense Intelligence Agency whom they have charged with
    spying on the behalf of China. (BBC)
  - Mueller special counsel investigation
  - In a new filing, special counsel Robert Mueller accuses Paul Manafort of witness
    tampering. (Vox)
  - 2017 term opinions of the Supreme Court of the United States
  - Masterpiece Cakeshop v. Colorado Civil Rights Commission
  - The U.S. Supreme Court rules in favor of a baker who sued Colorado's civil-rights
    commission on grounds of religious discrimination. (NPR)
  - Abortion in the United States
  - The U.S. Supreme Court dismisses a lower court's ruling allowing a teenage immigrant
    woman access to abortion, and a government request to discipline ACLU lawyers
    representing this woman. (The Washington Post)
  - The Peruvian Prosecutor's Office finds the skeletal remains of 18 people, who
    are suspected to have been victims of torture, extrajudicial executions and forced
    disappearances committed in the Madre Mía military base, in the Huánuco Department.
    This and other alleged massacres happened during the 80s and 90s government crackdown
    on the Shining Path terrorist organization. The case involves former president
    Ollanta Humala, who was in command of the base during that time. (Diario Correo)
    (BBC News) (RPP Noticias)
  - Société Générale agrees to pay a total fine of $1.3 billion in cases of bribing
    Libyan government officials and manipulation of the Libor interbank rate. (AP
    via Mynews13)
  - 2018 Scottsdale shootings
  - The gunman who is suspected of having killed six people – among them, prominent
    forensic psychologist Steven Pitt – in Arizona, United States, in a five-day time
    span has been found dead in a Scottsdale hotel. His death is considered a suicide.
    (ABC) (AP via SFGate)
  - Phil Andrew, a Catholic layman, a shooting victim and FBI agent, joins the Chicago
    Archdiocese in a new position. Andrew survived being shot in the chest and went
    on to a 21-year career in law enforcement with the Federal Bureau of Investigation,
    after serving as executive director for the Illinois Council Against Handgun Violence.
    As director of Violence Prevention Initiatives, Andrew believes it is as much
    about changing hearts as it is about changing laws. (National Catholic Reporter)
  Politics and elections:
  - Politics of North Korea
  - According to multiple sources, North Korea has fired its top three military officials
    and replaced them with younger loyalists. One of the three new appointees, general
    Ri Yong-gil, was inaccurately "reported" in 2016 as having been executed. (WTVA)
    (BBC)
  - Politics of Jordan
  - Hani Al-Mulki resigns as Prime Minister of Jordan following protests against economic
    reforms. (Al Jazeera)
  Science and technology:
  - Discoveries of exoplanets
  - A study has been revealed that WASP-127b might have possible traces of water.
    (International Business Times)
  Sports:
  - 2018 NFL season
  - Donald Trump announces that he canceled his ceremony for the Super Bowl LII champion
    Philadelphia Eagles at the White House due to the National anthem protests controversy.
    (Detroit News)
