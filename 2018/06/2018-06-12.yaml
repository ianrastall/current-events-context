Date: '2018-06-12'
Source_URI: Portal:Current events/2018 June 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Indo-Pakistani wars and conflicts, India–Pakistan relations
  - India states that four soldiers are killed after Pakistan fires shots at Kashmir.
    (ABC News)
  Business and economy:
  - History of AT&T
  - A U.S. federal judge approves AT&T's $85 billion merger with Time Warner. (NPR)
  - Tesla announces that it intends to cut 3000 jobs in an attempt to improve profitability.
    Many of those workers will be offered alternative jobs under the same employer.
    (BBC)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Hurricane Bud grows into a category four hurricane with winds of off of the Pacific
    Coast of Mexico. (CBS News)
  - 2018 lower Puna eruption
  - Hawaiian Airlines warns that the eruption of Kīlauea may hurt bookings and trim
    revenues. (CNBC)
  - A collision between a river cruise ship and a barge on Russia's Volga River kills
    at least 11 people. (Deutsche Welle)
  Health and environment:
  - Germany issues a recall of 73,000 eggs from the Netherlands suspected to be contaminated
    with fipronil. (BBC)
  International relations:
  - 2017–18 North Korea crisis
  - 2018 North Korea–United States summit, North Korea–United States relations
  - U.S. President Donald Trump and North Korean Chairman Kim Jong-un meet for a historic
    summit on Sentosa Island in Singapore. This marks the first time that the leaders
    of both countries have met. (BBC) (The Guardian)
  - Both sign a joint statement that North Korea will work towards "complete denuclearisation
    of the Korean Peninsula", and the U.S. will provide "security guarantees". The
    two sides agree to recovering and repatriating the remains of prisoners of war
    and those missing in action. (CBS News) (The Wall Street Journal) (The Washington
    Post)
  - After the summit, President Trump says that the U.S. will halt joint military
    exercises with South Korea. (CNN) (BBC)
  - Taiwan–United States relations
  - The United States unveils a new complex in Taipei for the American Institute in
    Taiwan, the de facto U.S. embassy. (Reuters)
  - Macedonia naming dispute, Greece–Republic of Macedonia relations
  - Greece and the Republic of Macedonia reach a deal to end a 27-year naming dispute
    between both countries, which would result in Macedonia being officially renamed
    the Republic of North Macedonia. (BBC)
  Politics and elections:
  - Seattle's city council votes 7–2 to repeal a controversial employer head tax,
    which was approved a month earlier. (The Guardian)
