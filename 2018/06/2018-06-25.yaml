Date: '2018-06-25'
Source_URI: Portal:Current events/2018 June 25
Intelligence_Payload:
  Arts and culture;:
  - Following the suicide of a teenage boy from Radcliffe, Greater Manchester in England
    police issue a public statement and the coroner sends notices to schools warning
    of the game Doki Doki Literature Club!. (MSN)
  Business and economy:
  - 2017–18 Iranian protests, June 2018 Bazaar protests
  - Tehran's Grand Bazaar starts a large strike after Iranian rial plunged to a record
    low against the US dollar on the market. (Trend) (Al-Arabiya)
  - Mohammad Javad Fathi, a member of the parliament, resigns and says that he has
    no hope for change under the current system. (Kaleme)
  - Protesters angered by the economy confront police, as well as chanting "Death
    to Palestine". (The Jewish Press)
  - Economy of the United States
  - Harley-Davidson, a US motorcycle manufacturer, states that it intends to shift
    export production for the EU overseas. The company reports that the decision is
    related to rocky trade relations between the European Union and the United States.
    (BBC)
  - Economy of Wales
  - The government of the United Kingdom announces the cancellation of the Swansea
    Bay tidal lagoon project, prompting ire from Welsh officials. (BBC)
  - Expansion of Heathrow Airport
  - The UK's House of Commons votes 415–119 to approve a third runway at London's
    Heathrow Airport. (BBC)
  - Greek offshore gas extraction firm Energean, which is already developing gas fields
    off Israel, is revealed to be contemplating an initial public offering to raise
    US$1.5 billion in order to develop Gaza Marine, a gas deposit off Gaza. Shell,
    who own a 55% stake in Gaza Marine, have been attempting to sell their share as
    ongoing conflict prevents production. (Haaretz)
  Disasters and accidents:
  - Flash floods and landslides triggered by heavy rains kill at least seven people
    and leave 12 others missing in northern Vietnam. (News.com.au)
  - A Filipino container ship runs aground on a coral reef near Raroia, Tuamotus,
    French Polynesia. France sends an aircraft to survey the scene in response to
    a request for help by Raroia's mayor. (Radio NZ)
  - International mining firm BHP Billiton signs an agreement with Brazilian authorities
    over criminal culpability and civil compensation liability over a mine site collapse
    that killed nineteen. The deal halts litigation for up to two years but does not
    confirm a final amount for a settlement. (Reuters)
  International relations:
  - Water conflicts between Malaysia and Singapore
  - Malaysian Prime Minister Mahathir Mohamad announces his intention to renegotiate
    a 1962 water agreement with Singapore, which the latter country regards as sacrosanct.
    (CNA)
  Law and crime:
  - The Ethiopia Federal Police Commission announces the arrests of 30 people suspected
    of involvement in a bombing of a rally for Prime Minister Abiy Ahmed. The attack
    killed two and injured 156. The United States announces the deployment of FBI
    specialists to assist the probe. (Reuters)
  - Mexican authorities arrest the entire police force of Ocampo, Michoacán, on suspicion
    of murdering a mayoral candidate. (BBC)
  - Zimbabwean authorities report two people have died following Saturday's bomb attack
    on President Emmerson Mnangagwa in Bulawayo, with several others in critical condition.
    (BBC)
  - A judge in Nauru declares the Civil Procedures Amendment 2018 unconstitutional
    and strikes it down. The act restricted the ability of those facing prosecution
    to obtain legal representation. The court orders Nauru's government to pay Australian
    lawyers acting for those who brought the legal challenge. (Radio NZ)
  - A ban on single-use plastics including cups, bags, and bottles in Mumbai, India,
    comes into effect. Mumbai is the nation's largest city with such a law, and those
    in violation face fines and up to three months in prison. (The Guardian)
  - A U.S. judge dismisses legal action brought by two Californian cities against
    oil companies, regarding their contributions towards climate change. (The Hill)
  - German officials announce the arrest of a former aide to Osama bin Laden and plan
    to deport him to his native Tunisia. (Yahoo!)
  Politics and elections:
  - Members of the European Parliament vote to activate the European Union's disciplinary
    process against Hungary, citing alleged discrepancies administering the rule of
    law in the country under Prime Minister Viktor Orbán. (The Guardian)
