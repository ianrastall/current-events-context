Date: '2018-06-09'
Source_URI: Portal:Current events/2018 June 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - The Taliban announce a three-day Eid ceasefire with the Afghan authorities, according
    to Pajhwok Afghan News. On Thursday, President Ashraf Ghani announced a ceasefire
    with the Taliban from June 12–19. (TASS) (Reuters)
  International relations:
  - Shanghai Cooperation Organization
  - The 18th Council of Heads of State meets in Qingdao, China. (The Nation)
  - 44th G7 summit
  - U.S. President Donald Trump calls for "fair and reciprocal" trades between the
    United States and other countries, claiming that the United States is a "piggy
    bank that everyone keeps robbing". (VOA) (BBC)
  - Donald Trump again calls for Russia to be reinstated into the group. Russia was
    suspended after the annexation of Crimea in 2014. (CNN)
  - Trump retracts his endorsement of the summit's final communiqué. (CBS News)
  Politics and elections:
  - Over 100,000 people participate in a large protest in Bucharest, Romania, against
    apparent judicial abuses and "illegitimate interference" of the secret services
    in the political and judicial systems. The protest was organised by the governing
    Social Democratic Party and supported by other political parties. (The Washington
    Post)
  Sports:
  - 2018 Belmont Stakes
  - Justify wins the Belmont Stakes and becomes the second horse in four years to
    win the U.S. Triple Crown of Thoroughbred Racing. (The New York Times)
