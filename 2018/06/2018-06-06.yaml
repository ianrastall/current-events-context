Date: '2018-06-06'
Source_URI: Portal:Current events/2018 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Syrian government re-opens the Homs–Hama highway after it was closed for seven
    years. (Reuters)
  - Iraqi insurgency (2017–present)
  - At least 18 people are killed by twin explosions in a weapons depot in a mosque
    in Sadr City, Baghdad. (Belga via Het Laatste Nieuws)
  Health and environment:
  - Food safety in Australia
  - A woman in Australia is reported dead from hepatitis after consuming frozen pomegranate.
    Health authorities have stated that 24 such cases were related to products by
    Entyce Food Ingredients. (BBC)
  International relations:
  - European migrant crisis
  - 400 migrants try to scale the Ceuta border fence, with most of them repelled.
    It is the first such incident in seven months. (The News Guru)
  - JCPOA
  - The European Commission proposes to implement two measures by August, designed
    to counter the US exit from the agreement with Iran. These would extend the EU
    blocking statute and allow an extension of the European Investment Bank mandate.
    (Belga via HBVL)
  Law and crime:
  - Facebook–Cambridge Analytica data scandal
  - Alexander Nix, the head of Cambridge Analytica, faces questions from British MPs
    regarding the company's use of data. (BBC)
  - In Peru, four policemen die in a terrorist ambush when the vehicle in which they
    were moving was attacked with explosives on a highway of the Anco district, Huancavelica
    Department. (La República) (El Comercio)
