Date: '2018-06-17'
Source_URI: Portal:Current events/2018 June 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - Twin suicide bombings in Damboa, Nigeria, leave at least 31 people dead. The explosions
    are reportedly followed by rockets fired from outside the town. (BBC)
  Law and crime:
  - Wynn Resorts Ltd. says that two board members, including one investigating sexual
    misconduct allegations against former Chief Executive Steve Wynn, will leave their
    posts after Elaine Wynn, the company's largest shareholder, presses for additional
    board changes. (The Wall Street Journal)
  - Mass shootings in the United States
  - A shooting takes place at the Art All Night art festival in Trenton, New Jersey.
    A suspect is killed and 20 other people injured. (Fox News via MSN)
  Politics and elections:
  - Colombian presidential election, 2018
  - Iván Duque wins the second round presidential election to become the new President
    of Colombia. (BBC)
  - Cambodian general election, 2018
  - A FUNCINPEC party SUV's head-on collision in southwest Cambodia with a taxi seriously
    injures former Prime Minister Prince Norodom Ranariddh and kills his wife Ouk
    Phalla; both were standing as candidates in the upcoming election. Seven other
    people were also injured. (AP via Stuff)
  Sports:
  - 2018 FIFA World Cup
  - In an upset victory, Mexico beats Germany 1–0, handing them their first opening
    loss in a World Cup since 1982. (TSN)
  - 2018 U.S. Open (golf)
  - Brooks Koepka wins his second consecutive U.S. Open Championship of Golf, held
    in 2018 at Shinnecock Hills Golf Club in Shinnecock Hills, New York. (PGA)
