Date: '2018-06-10'
Source_URI: Portal:Current events/2018 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Iraq
  - A warehouse holding ballot boxes from elections last month burns down in Baghdad.
    Several politicians say the fire was a criminal act aimed at destabilising the
    state following a disputed election result. (BBC)
  - Authorities in Afghanistan announce the seizure of 156 sacks of ammonium nitrate
    being imported on a truck from Pakistan. This is one of the largest seizures of
    the compound, most commonly used as a fertilizer, but also used to manufacture
    explosives. (Reuters)
  Arts and culture:
  - Electronic Entertainment Expo 2018
  - Press conferences for the 24th annual Electronic Entertainment Expo (E3) continue,
    with many new video game announcements taking place, including Halo Infinite,
    The Elder Scrolls VI, and Just Cause 4. (The Guardian) (Kotaku)
  International relations:
  - 2017–18 North Korea crisis
  - 2018 North Korea–United States summit, North Korea–United States relations
  - North Korean leader Kim Jong-un and U.S. President Donald Trump arrive in Singapore
    ahead of the upcoming summit. (BBC)
  - North Korea–South Korea relations
  - South Korean President Moon Jae-in sends senior officials to Singapore for the
    summit. (The Straits Times)
  - North Korea–Singapore relations
  - Kim Jong-un meets with Singaporean Prime Minister Lee Hsien Loong shortly after
    his arrival. (Channel NewsAsia)
  - European migrant crisis
  - Italy and Malta refuse entry to a German vessel carrying 629 migrants rescued
    off the coast of Libya. (CBC)
  Law and crime:
  - Seven bodies are recovered from the base of Sugarloaf Mountain in Rio de Janeiro,
    Brazil. (BBC)
  Politics and elections:
  - Basque nationalism, Politics of Spain
  - Tens of thousands of Basque nationalists form a human chain asking for greater
    autonomy. (BBC)
  Sports:
  - 2018 French Open
  - In the men's singles final, Rafael Nadal defeats Dominic Thiem and wins his 11th
    title at Roland Garros. (BBC)
