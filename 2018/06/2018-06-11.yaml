Date: '2018-06-11'
Source_URI: Portal:Current events/2018 June 11
Intelligence_Payload:
  Business and economy:
  - Economy of the United Kingdom
  - British retail chain Poundworld, which employs thousands of people, collapses
    into administration. (BBC)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Hurricane Bud grows into a category three hurricane off the Pacific coast of Mexico.
    (CBS News)
  International relations:
  - Singapore–United States relations
  - Singaporean Prime Minister Lee Hsien Loong and U.S. President Donald Trump hold
    a bilateral meeting. (Channel NewsAsia)
  - European migrant crisis
  - Spanish Prime Minister Pedro Sánchez announces that he will allow a migrant vessel
    carrying 629 rescued migrants, including children and pregnant women, to dock
    in Valencia after Malta and Italy both refused the vessel. (BBC)
  Law and crime:
  - Child trafficking in India, Crime in India
  - Police in Assam arrest 18 people in connection of lynching two youths following
    rumors on WhatsApp and social media that they were child traffickers. (Al Jazeera)
  Science and technology:
  - Climate of Mars
  - NASA's Opportunity rover is temporarily shut down due to a dust storm. (BGR)
  - Net neutrality in the United States
  - The 2015 net neutrality rules in the United States end. (The Hill)
  Sports:
  - Heavyweight boxing
  - Deontay Wilder accepts the terms to fight Anthony Joshua. (ESPN)
