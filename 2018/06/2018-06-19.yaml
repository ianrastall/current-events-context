Date: '2018-06-19'
Source_URI: Portal:Current events/2018 June 19
Intelligence_Payload:
  Disasters and accidents:
  - Floods in Abidjan, Ivory Coast killed 20 people and destroyed several houses and
    roads. (Reuters)
  - Shipwrecks in 2018
  - Canadian ship MV Iron Chieftain burns for a second day off the coast of New South
    Wales, Australia. The freighter, carrying dolomite, was partially extinguished
    yesterday, but fire remains in the hold. (SBS)
  - 2018 FIFA World Cup
  - An engine on the Saudi Arabian team's plane catches fire; the plane lands safely
    in Rostov-on-Don for the team's Wednesday match with Uruguay. (BBC)
  International relations:
  - The United States announces its withdrawal from the United Nations Human Rights
    Council. (BBC)
  Law and crime:
  - Cannabis in Canada
  - The Senate of Canada passes the Cannabis Act 52–29 which legalizes cannabis for
    recreational use. (BBC)
  - Shooting of Antwon Rose Jr.
  - A police officer shoots and kills an unarmed black teenager in Pittsburgh, prompting
    protests in the following days. (PBS NewsHour)
