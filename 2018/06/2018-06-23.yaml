Date: '2018-06-23'
Source_URI: Portal:Current events/2018 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eastern Daraa offensive (June 2018)
  - The Syrian government launches a ground offensive in the eastern part of the southern
    province of Daraa. (Gulf Times)
  - Zimbabwean general election, 2018
  - Zimbabwean President Emmerson Mnangagwa survives an apparent assassination attempt
    when an explosive device detonates at an election campaign rally in Bulawayo.
    A few bystanders, including Vice-President Kembo Mohadi, suffer minor injuries.
    (The Guardian) (BBC)
  - Two people are confirmed dead and 156 others injured after a grenade explosion
    at a rally in Addis Ababa, Ethiopia, held by the Prime Minister Abiy Ahmed. (BBC)
    (AP)
  Crime and law:
  - Terrorism in France
  - French police arrest ten members of the far-right group Action des Forces Operationnelles
    (Operational Forces Action) across the nation, questioning them on suspicion of
    plotting a terrorist attack against Muslims. (The Local)
  Disasters and accidents:
  - 2018 Vietnam floods
  - Floods in Vietnam killed 23 people (16 in Lai Chau, 5 in Ha Giang Province while
    two others in other provinces) and caused several damages. (VnExpress International)
  - Maersk Line reveals one of their container ships yesterday responded to a distress
    call from a migrant boat off the Italian coast, rescuing 113 people. (The Local)
  - The US Navy states an A-29 Super Tucano crash at Holloman Air Force Base in New
    Mexico yesterday killed a pilot. (CNN)
  Politics and elections:
  - Politics of Iraq
  - After a meeting in Najaf, Islamic Dawa Party leader Premier Haider al-Abadi and
    Shi'a Sadrist Movement leader Muqtada al-Sadr announce their parties' alliance.
    Together, they control 96 of 329 seats in Parliament. (Al Jazeera)
