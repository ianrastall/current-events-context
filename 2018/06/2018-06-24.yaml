Date: '2018-06-24'
Source_URI: Portal:Current events/2018 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eastern Daraa offensive (June 2018)
  - Russian warplanes provide air cover for the offensive for the first time. (Reuters)
  - Terrorism in Israel
  - Shin Bet and the Israel Defence Forces detain eight suspected terrorists, including
    one suspected of conducting a vehicle-ramming attack earlier in the day. Guns,
    cash, and stun grenades are seized. (The Jerusalem Post)
  Arts and culture:
  - Women to drive movement
  - Saudi Arabia lifts its ban on women being allowed to drive. (USA Today)
  Disasters and accidents:
  - An explosion in Wuppertal, Germany, destroys a building and injures at least 25
    people, four of them seriously. (The Independent)
  - Firefighters extinguish a blaze on bulk freighter MV Iron Chieftain, which was
    burning for almost a week while docked at Port Kembla in New South Wales, Australia.
    Police say they will remain on-scene to assist the owner and operator with salvage
    operations. (Illawarra Mercury)
  International relations:
  - European migrant crisis
  - 16 European Union leaders meet in advance of the 28 June full EU summit on migration.
    (PBS Newshour)
  - Two ships, MV Lifeline and MV Alexander Mærsk, carrying hundreds of rescued migrants,
    await a port to disembark. The commercial Maersk ship rescued migrants following
    a request from Italian authorities but Italy and Malta have refused permission
    to dock. (Deutsche Welle) (euronews)
  - Politicians from Germany, Spain, and Portugal visit MV Lifeline amid negotiations
    for the ship to dock in Malta or Italy, both of which have refused permission.
    (CNN)
  Politics and elections:
  - Turkish general election, 2018
  - Voters in Turkey go to the polls for a presidential and parliamentary election.
    (Reuters)
  - Incumbent President of Turkey Recep Tayyip Erdoğan claims victory as preliminary
    results show him winning a majority of votes. (Australian Financial Review)
