Date: '2018-06-13'
Source_URI: Portal:Current events/2018 June 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Battle of Hudaida (2018)
  - Saudi-led coalition forces begin an operation to take control of the Yemeni port
    city of Al Hudaydah, which has been held by the Houthis since 2015. (BBC News)
  Business and economy:
  - Volkswagen emissions scandal
  - Volkswagen is fined €1 billion by German prosecutors after cheating on diesel
    particulate emissions testing. (BBC News)
  International relations:
  - South Korea–United States relations
  - South Korea says that it will halt military drills with the United States to help
    with Korean denuclearization talks. (Channel NewsAsia)
  - Macedonia naming dispute, Greece–Republic of Macedonia relations
  - Macedonian President Gjorge Ivanov says that he will not sign off on the naming
    deal that was announced yesterday by the Prime Minister. This may slow down the
    naming dispute resolution process. (AP via ABC News)
  Politics and elections:
  - Georgian Prime Minister Giorgi Kvirikashvili resigns following anti-government
    protests. (RFE/RL)
  - Spanish Minister of Culture and Sport Màxim Huerta resigns after tax issues, becoming
    the minister with the shortest time in office in Spain. (Reuters)
  Sports:
  - Canada–Mexico–United States 2026 FIFA World Cup bid
  - The FIFA Congress votes to hold the 2026 World Cup in Canada, Mexico, and the
    United States, with Morocco's World Cup bid coming in second. (BBC Sport) (Sky
    News)
  - 2018 FIFA World Cup
  - Julen Lopetegui is ousted as coach of Spanish national football team, one day
    before the 2018 FIFA World Cup. (The Guardian)
