Date: '2018-06-22'
Source_URI: Portal:Current events/2018 June 22
Intelligence_Payload:
  Disasters and accidents:
  - A BNSF Railway freight train with 33 oil tanker cars derails in Lyon County, Iowa;
    some of the crude leaks into the rain-swollen Rock River. A mandatory evacuation
    was ordered; there are no injuries. (Des Moines Register)
  - Police say the safety driver of an Uber self-driving car that fatally struck a
    pedestrian in Arizona was distracted by watching a TV show on her phone. (Reuters)
  International relations:
  - Trump administration family separation policy
  - The United Nations Human Rights Council issues a condemnation of the separation
    of migrant children from their parents, saying it "may amount to torture", and
    the recent executive order "does not address the situation of those children who
    have already been pulled away from their parents." (The Independent)
  - European migrant crisis
  - Malta refuses to accept 234 African immigrants from the Dutch ship Lifeline. (Reuters)
  - Aftermath of the 2018 North Korea–United States summit, United States Forces Korea
  - The Pentagon announces the suspension of joint military exercises with South Korea,
    including the Ulchi-Freedom Guardian and marine training exercises. (The Japan
    Times)
  Law and crime:
  - Carpenter v. United States
  - The U.S. Supreme Court, by a 5–4 vote, rules law enforcement are required to obtain
    a search warrant to gather location data from cell phone companies. (Gizmodo)
  - Human rights in Venezuela
  - A report from the Office of the United Nations High Commissioner for Human Rights
    accuses the Venezuelan government of allowing its security forces to participate
    in hundreds of extrajudicial killings over the past year. (Al Jazeera)
  - 2017 New York City truck attack
  - Prosecutors in the United States charge Sayfullo Saipov with a further six counts
    of attempted murder, in addition to the 22 other offences already charged in connection
    to a vehicle-ramming attack in New York. Saipov enters pleas of not guilty. (CNN)
  - A court in Jakarta convicts cleric Aman Abdurrahman of inciting others to commit
    terror attacks in support of ISIS and sentence him to death. (The Jakarta Post)
  - Two men are jailed in the United Kingdom for looting historical items from World
    War I shipwreck HMS Hermes and selling them for scrap. (BT)
  Sports:
  - 2018 Mediterranean Games
  - The inauguration ceremony of the XVIIIth edition of the Mediterranean Games takes
    place in Tarragona, Spain. (El Mundo)
