Date: '2018-06-16'
Source_URI: Portal:Current events/2018 June 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Battle of Al Hudaydah
  - Saudi Arabian-led coalition troops seize control of Hodeida International Airport
    in Al Hudaydah after driving out Houthi forces. Around 280 people have been reportedly
    killed in the last four days inside the Yemeni port city. (Sky News)
  - The government of Papua New Guinea declares a state of emergency and suspends
    the government of Southern Highlands Province following post-election riots in
    the provincial capital of Mendi. (ABC News)
  Disasters and accidents:
  - 2018 lower Puna eruption
  - The Hawaii County Civil Defense Agency states that the eruption of lower Puna
    has destroyed 467 homes in total. (Upi)
  - At least 17 people are killed in a stampede at a nightclub in Caracas, Venezuela.
    The stampede was reportedly triggered when a tear-gas canister was set off during
    a brawl. Seven people have been arrested. (BBC)
  Politics and elections:
  - Macedonia naming dispute
  - The coalition government of Greek Prime Minister Alexis Tsipras survives a vote
    of no-confidence brought by the opposition party over a deal to end the dispute.
    (AP)
  Science and technology:
  - A missing Indonesian woman's body is found inside a python, being one of only
    two fully documented cases of a human being consumed by a snake. (The Hindu)
  Sports:
  - 2018 FIFA World Cup, Iceland at the FIFA World Cup
  - First time qualifier Iceland holds off a late charge from two-time champion Argentina
    and comes away with a 1–1 draw in the opening World Cup matches for both countries.
    (ESPN)
