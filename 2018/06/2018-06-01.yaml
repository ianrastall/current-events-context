Date: '2018-06-01'
Source_URI: Portal:Current events/2018 June 1
Intelligence_Payload:
  Business and economy:
  - Economy of Brazil
  - Pedro Parente, the head of Brazil Petrobras, resigns among protests related to
    diesel fuel prices. (BBC)
  - Visa card payments are disrupted throughout Europe due to a network failure. The
    disruption results in large queues at supermarkets and petrol stations. Mastercard
    and American Express say they were not affected. (BBC)
  Health and environment:
  - The CDC reports that five people have died and 197 have been hospitalized in the
    United States, in the largest incidence of E. coli since the 2006 North American
    E. coli outbreak. (BBC)
  International relations:
  - Shangri-La Dialogue
  - The annual three-day regional security forum begins in Singapore. (The Straits
    Times)
  - 2018 North Korea–United States summit, North Korea–United States relations
  - U.S. President Donald Trump officially announces that the summit will resume as
    scheduled following a White House meeting with North Korean general Kim Yong-chol.
    (BBC)
  - Rohingya refugees in Bangladesh
  - The government of Myanmar announces that it has reached a repatriation agreement
    with the United Nations regarding Rohingya refugees in Bangladesh, saying it will
    assure that refugees "can return voluntarily in safety and dignity." Members of
    the UNHCR and the UNDP will be allowed to work in Rakhine State to monitor the
    process. (The Guardian)
  Law and crime:
  - Human rights in Burkina Faso
  - Burkina Faso's National Assembly votes to abolish the death penalty. (News24)
  - 2017–18 Spanish constitutional crisis
  - Federal prosecutors in Germany apply in a Schleswig-Holstein court for the extradition
    of Carles Puigdemont to Spain, arguing that the treason charges are valid according
    to German law, because, according to the prosecutors, "the violence in Catalonia
    on election day can be attributed to the wanted individual". (Al Jazeera)
  - Crime in Canada
  - Former Taliban hostage Joshua Boyle is released from jail with strict bail conditions,
    including an electronic tracking bracelet. (Global News)
  - A Department of Defense report presented to the United States Congress estimates
    at 499 the number of civilian deaths in US military actions during the year 2017,
    with more than 450 reports remaining to be assessed. The casualties occurred in
    Syria, Iraq, Afghanistan and Yemen. (CNN)
  - Crime in Colorado
  - An Uber driver in Denver, Colorado, United States, fatally shoots a passenger
    after a conflict on the Interstate 25 highway. A portion of the highway is placed
    on lockdown following the incident. (NBC News via MSN)
  Politics and elections:
  - 2018 vote of no confidence in the government of Mariano Rajoy, Gürtel case
  - The Government of Mariano Rajoy is ousted after a motion of no confidence passes
    180–169. Pedro Sánchez of the Socialist Workers' Party is sworn in as the new
    Prime Minister. This is the first time in Spanish history that a vote of no confidence
    has resulted in a change of government. (BBC)
  - 2018 Italian government formation
  - Giuseppe Conte is sworn in as the new Prime Minister of Italy at the head of a
    populist coalition, formed by the Five Star Movement and the Northern League.
    Conte had previously given up on trying to form a government after President Sergio
    Mattarella had vetoed Conte's original choice for Minister of Finance, but a different
    candidate was agreed to yesterday. (BBC)
