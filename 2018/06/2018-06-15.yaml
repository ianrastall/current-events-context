Date: '2018-06-15'
Source_URI: Portal:Current events/2018 June 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - The Afghan Ministry of Defense reports that Mullah Fazlullah, the emir of the
    Pakistani Taliban, was killed in Kunar province by an U.S. drone strike two days
    prior on June 13. (NBC News)
  Business and economy:
  - 2018 China–United States trade war
  - The United States imposes a 25% tariff on goods imported from China worth $50
    billion, set to come into effect on July 6, and accuses Beijing of "intellectual
    copyright theft". (BBC) (Business Insider via AOL)
  - China responds with an additional tariff of 25% on $34 billion of U.S. goods,
    to come into effect on July 6, and tariffs on other goods to be announced at a
    later date. (BBC)
  - American Airlines, after cancelling 275 of its regional carrier PSA Airlines's
    scheduled flights on Thursday, cancels another 400 today at Charlotte Douglas
    International Airport because of a "technical issue." (Fox News)
  Disasters and accidents:
  - The Glasgow School of Art in Scotland suffers "extensive damage" after it catches
    on fire. No casualties are reported. (BBC)
  Health and environment:
  - Kellogg's issues a voluntary recall of Honey Smacks amid fears of salmonella contamination,
    with affected areas including the United States, Mexico, Costa Rica, and some
    parts of French Polynesia. (BBC)
  Law and crime:
  - Mueller special counsel investigation
  - Former Trump campaign chairman Paul Manafort has his bail revoked for allegedly
    tampering with witnesses, and is sent to jail to await his trial for foreign lobbying
    charges. (CNN) (The New York Times)
  - Kidnapping of Joshua Boyle and Caitlan Coleman
  - Former Afghanistan hostage Joshua Boyle makes another appearance in court along
    with his lawyers to set a trial date. (Ottawa CTV News)
  - A man who was seen barricading an armored vehicle and blocking traffic at the
    Mike O'Callaghan–Pat Tillman Memorial Bridge near the Hoover Dam is arrested.
    (CBS News)
  Sports:
  - Boris Becker, who was once the highest ranked men's singles tennis player in the
    world, has claimed diplomatic immunity from a bankruptcy claim by private bankers
    Arbuthnot Latham, based on his role as a sports attaché to the European Union
    from the Central African Republic. (Reuters)
  - 2018 FIFA World Cup
  - Cristiano Ronaldo scores a hat-trick achieving Portugal's 3–3 draw against Spain.
    (Reuters)
