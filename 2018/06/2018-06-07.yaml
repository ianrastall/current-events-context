Date: '2018-06-07'
Source_URI: Portal:Current events/2018 June 7
Intelligence_Payload:
  Business and economy:
  - Economy of the United Kingdom
  - House of Fraser announces that it intends to close 31 of its 59 stores, including
    its flagship store on London's Oxford Street. (BBC)
  - Lender of last resort
  - Argentina agrees with IMF negotiators on a US$50 billion loan. (AP via The Kansas
    City Star)
  - IKEA announces that it plans to phase out single-use plastic items by 2020, and
    intends to move toward sustainability in its product design. (BBC)
  International relations:
  - Japan–United States relations
  - Donald Trump and Shinzō Abe discuss improving trade relations between the two
    countries. (The Straits Times)
  - 2018 North Korea–United States summit, North Korea–United States relations
  - Donald Trump says that he might invite North Korean leader Kim Jong-un to the
    United States if the planned summit meeting in Singapore goes well. (BBC)
  Law and crime:
  - Abortion in the United Kingdom
  - The Supreme Court of the UK dismisses a legal challenge by the Northern Ireland
    Human Rights Commission of the restrictive Northern Ireland abortion laws, as
    the court has no jurisdiction in this specific case. Four of seven judges note
    that these laws are incompatible with the European Convention on Human Rights
    "in prohibiting abortion in cases of rape and incest and fatal foetal abnormality",
    a matter of right to respect for private and family life guaranteed by the Convention.
    (The Guardian)
  - 2018 North Korea–United States summit, North Korea–Singapore relations
  - Two South Korean media personnel from KBS News are arrested for trespassing the
    home of a North Korean envoy in Singapore. (Channel NewsAsia)
  - Canadian prime minister Justin Trudeau is accused of groping a journalist in 2000.
    He denies he made negative interactions. (The Hill)
  Politics and elections:
  - 2018 Ontario general election
  - Canadian citizens residing in Ontario go to the polls to elect a new provincial
    government. (CTV)
  - The Progressive Conservative Party of Doug Ford wins a sweeping victory, ending
    15 years of Liberal Party rule in the province. The Liberal Party becomes a minority
    party (or third party) for the first time since its foundation and later first
    provincial election, has losing official party status. (Reuters) (CBC.ca)
  - Ontario New Democratic Party wins 40 seats, becoming Official Opposition for the
    first time since the 1987 election. (The Global and Mail)
  - Ontario Green Party has their first ever MPP elected. Mike Schreiner is elected
    in Guelph district in southwestern Ontario. (CBC.ca)
  - Spanish King Felipe VI swears in the cabinet of Prime Minister Pedro Sánchez.
    It is the first cabinet in European history, and the only in the world, to be
    composed primarily of women. (BBC)
  Science and technology:
  - Life on Mars
  - NASA announces the discovery of preserved organic matter in an ancient lake bed
    on Mars by its Curiosity rover. It has not been determined if the matter was potentially
    related to past life on Mars or not. (The Guardian)
  - Facebook reports an error in privacy settings that has affected 14 million users.
    (BBC)
  Sports:
  - Corruption in Ghana
  - Ghanaian Minister of Information Mustapha Abdul-Hamid announces the decision to
    dissolve the Ghana Football Association following the publication of an exposé
    of the organisation by Anas Aremeyaw Anas. (Reuters)
  - 2018 Stanley Cup Finals
  - In ice hockey, the Washington Capitals win their first Stanley Cup after defeating
    the Vegas Golden Knights 4–1 in the finals. (Sporting News)
