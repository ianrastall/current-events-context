Date: '2018-06-05'
Source_URI: Portal:Current events/2018 June 5
Intelligence_Payload:
  Business and economy:
  - Expansion of Heathrow Airport
  - The Cabinet of the United Kingdom approves a controversial third runway at London's
    Heathrow Airport. (Sky News)
  Disasters and accidents:
  - 2018 lower Puna eruption
  - A lava flow destroys at least 130 homes in the Vacationland Hawaii and Kapoho
    Beach Lots neighborhoods. Officials reported Vacationland Hawaii to be completely
    destroyed, while nearby Kapoho Bay has been filled with lava. (West Hawaii Today)
    (West Hawaii Today2)
  - Mining accidents
  - An explosion at an iron ore mine in Benxi, Liaoning, kills 11 people, 23 others
    were rescued from the site, while 2 more remain trapped. (Reuters)
  - 2018 Volcán de Fuego eruption
  - The death toll for the Volcán de Fuego eruption in Guatemala rises to 75 people.
    (HuffPost)
  International relations:
  - Eritrean–Ethiopian border conflict
  - Ethiopia agrees to "fully accept" the outcome of the Algiers Agreement of 2000,
    which ruled that disputed areas, including the border town of Badme which Ethiopia
    currently occupies, are Eritrean territory. (BBC)
  Law and crime:
  - LGBT rights in the European Union
  - The European Court of Justice rules that EU countries that have not legalised
    same-sex marriage must still offer same-sex spouses the same residency rights
    as heterosexual couples under freedom of movement laws. (The Telegraph)
  - Prostitution in Belgium
  - Prostitutes in Brussels' Rue d'Aerschot red-light district go on strike today
    after one of their colleagues is found murdered this morning. (Het Laatste Nieuws)
  - Hurricane Maria death toll controversy
  - The Government of Puerto Rico says that it will comply with a Superior Court order
    to release all death certificates issued after Hurricane Maria hit the U.S. territory.
    The court order came after CNN and Puerto Rico's Center for Investigative Journalism
    sued the territory's government amid allegations of undercounted fatalities. (AP
    via WDTN)
  Politics and elections:
  - Politics of Spain, 2018 vote of no confidence in the government of Mariano Rajoy
  - Former Prime Minister Mariano Rajoy resigns as the leader of People's Party, four
    days after losing the no-confidence vote that ended his premiership. (El País
    English)
  - Politics of Jordan
  - In an effort to quell unrest caused by IMF-driven reforms, King Abdullah II of
    Jordan appoints Omar Razzaz as Prime Minister. (Reuters)
  - Politics of Ethiopia
  - Fana Broadcasting reports that the Parliament of Ethiopia approves a bill and
    lifts the state of emergency, two months earlier than planned. (Al Jazeera)
  - Me Too movement, Judicial independence
  - Voters in Santa Clara County, California vote to recall Judge Aaron Persky after
    he sentenced a swimmer convicted of sexual assault to six months in jail in 2016.
    (AP via WHSV)
