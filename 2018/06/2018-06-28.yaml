Date: '2018-06-28'
Source_URI: Portal:Current events/2018 June 28
Intelligence_Payload:
  Disasters and accidents:
  - 2018 UY Aviation King Air C90 crash
  - A light aircraft crashes in the Ghatkopar district of Mumbai, India, killing all
    four occupants and one person on the ground. (NDTV) (BBC)
  - A fire breaks out at the Gikomba market in Nairobi, Kenya, with 15 people confirmed
    dead and many homes and stalls being destroyed. (BBC)
  - A landslide killed 14 people in northern Myanmar. (BNI Multimedia Group)
  International relations:
  - Russia–United States relations
  - A summit meeting between U.S. President Donald Trump and Russian President Vladimir
    Putin is set for July 16 in Helsinki. The leaders are expected to discuss national
    security issues as well as Russian interference in the 2016 U.S. elections. (CBS
    News)
  Law and crime:
  - Capital Gazette shooting
  - A shooting at the office of The Capital and the Maryland Gazette newspapers in
    Annapolis, Maryland, United States, kills five people. The suspected shooter is
    detained by local police. (CBC) (BBC)
  - Protests against Trump administration family separation policy
  - About 575 women are arrested during a sit-in at the Hart Senate Office Building
    protesting the Trump administration family separation policy. (NPR)
  - Police arrest at least nine protesters at an Occupy ICE demonstration in Portland,
    Oregon. (The Oregonian)
  - 2017-18 Spanish constitutional crisis
  - The National Court confirms the prosecution against Major of the Mossos d'Esquadra,
    Josep Lluís Trapero and the former leaders of the regional Police for sedition
    and criminal organitzation. (El Mundo)
  Politics and elections:
  - Aftermath of first impeachment process against Pedro Pablo Kuczynski
  - The Prosecutor's Office of Peru opens a preliminary investigation to determine
    if there were alleged political benefits – among them the humanitarian pardon
    granted to former President Alberto Fujimori – offered by former President Pedro
    Pablo Kuczynski to avoid being removed from his office during the first impeachment
    process against him in December 2017. Three months later, in the middle of a similar
    scenario, Kuczynski resigned, seeing that Congress would no longer favor him.
    (Perú 21)
  Sports:
  - 2018 FIFA World Cup
  - Japan is the only Asian team to advance to the knockout stage, via fair play after
    exhausting other tiebreakers. (BBC)
