Date: '2018-06-08'
Source_URI: Portal:Current events/2018 June 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - On Quds Day – the last Friday of Ramadan – thousands of Palestinians protest near
    the Gaza border fence. Israeli troops fire live rounds and tear gas, killing four
    people and injuring over 600. (AP via CBS News)
  - Somali Civil War (2009–present)
  - A U.S. special forces soldier is killed and four others are wounded in an ambush
    by suspected al-Shabaab militants near the town of Jamame, Lower Juba, Somalia.
    (BBC)
  Arts and culture:
  - Weinstein effect
  - The Walt Disney Company announces that its animation chief, John Lasseter, will
    leave the company after December 31, after he was accused of misconduct late last
    year. (Deadline)
  Business and economy:
  - Economy of the United Kingdom
  - Gavin Patterson, the chief executive of BT Group, announces that he intends to
    step down later this year. (BBC)
  - Economy of Japan
  - Due to a change in Japanese legislation, Airbnb announces that it will be cancelling
    thousands of reservations made in the country. (BBC)
  International relations:
  - Embassy attack accusations in Cuba
  - The United States expand their health alert from Guangzhou to all of China, after
    it repatriated multiple employees with symptoms resembling a brain injury. (Reuters)
  - Russia–United States relations
  - The military chiefs of both countries, Joseph Dunford and Valery Gerasimov, meet
    in Finland. (AP via ABC News)
  - 44th G7 summit
  - Leaders from the Group of Seven meet in La Malbaie, Quebec, Canada to discuss
    issues facing their countries, including trade between the United States and European
    Union. (Reuters)
  - U.S. President Donald Trump calls for Russia, which was suspended from the group
    after the annexation of Crimea in 2014, to be reinstated in the group; a call
    supported by the Prime Minister of Italy Giuseppe Conte, and rejected by most
    other G7 leaders. (Deutsche Welle)
  Law and crime:
  - Jean-Pierre Bemba is acquitted of war crimes by the International Criminal Court
    appeals chamber. (AP)
  - Syrian Civil War
  - A U.S. federal judge blocks until June 20 the release in Syrian Democratic Forces-controlled
    territory of a dual-nationality Saudi-American citizen alleged to have joined
    ISIL. The man, who is now held for nine months in Iraq, was planned to be released
    by the U.S. military – with a new cell phone, some food and water and $4,210 in
    cash, but with no identification – as soon as tomorrow. (AFP via The Daily Star)
    (AP via WLNS)
  - Killing of Susanna Feldman
  - Ali Bashar, the main suspect in the murder and rape case of a 14-year-old German-Jewish
    girl in Wiesbaden, Germany is arrested by Kurdish forces in Northern Iraq. (Times
    of Israel)
  Science and technology:
  - TOP500
  - The 10-megawatt IBM Summit supercomputer is unveiled at Oak Ridge National Laboratory,
    East Tennessee. With a reported 200 petaflops of processing power, it is expected
    to top the list of the world's most powerful computers after this June's update
    is presented at the International Supercomputing Conference. (Wired)
  Sport:
  - 2018 NBA Finals
  - In basketball, the Golden State Warriors defeat the Cleveland Cavaliers in four
    games to win the National Basketball Association Championship. (New York Times)
