Date: '2018-06-14'
Source_URI: Portal:Current events/2018 June 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkish general election, 2018
  - Three people are killed and eight wounded in Suruç, Turkey, after election campaigning
    turned into riots. (Reuters via MSN)
  Arts and culture:
  - Cinema of Saudi Arabia
  - The Message is the first Arabic film commercially screened in Saudi Arabia. (Quartz)
  - Demography of Japan
  - Japan lowers the age of adulthood from 20 to 18, with the changes coming into
    effect in 2022. The revision to Japan's civil code means that 18-year-olds will
    be able to marry without their parents' consent, apply for credit cards and loans,
    and transgender people will be able to have their new gender officially recognised.
    The change causes confusion and concern regarding the kimono industry and Coming
    of Age Day. (The Guardian)
  - Cardinal Pietro Parolin addresses participants in the Second Holy See – Mexico
    Conference on International Migration. The Vatican Secretary of State assesses
    the current political climate, calls for the humane treatment of migrants and
    discusses the “primary right” to live with dignity in one’s home country. (Holy
    See Press Office)
  Business and economy:
  - Economy of the European Union
  - The value of the euro falls by one percent after the European Central Bank announces
    it expects to halve net bond purchases to €15 billion per month from October to
    December, then end "quantitative easing" by the close of the year, while not raising
    interest rates. (CNBC) (Reuters)
  - EU countries approve tariffs worth €2.8 billion in retaliation against U.S. tariffs
    on steel and aluminium. (AFP via Yahoo! News)
  - AT&T completes its acquisition of Time Warner. The announcement comes two days
    after a judge ruled that the deal does not violate antitrust laws. (CNN)
  International relations:
  - Comprehensive Economic and Trade Agreement
  - Italian Minister of Agriculture Gian Marco Centinaio says the Italian government
    will not ratify the EU–Canada free-trade agreement since, according to him, the
    agreement does not provide sufficient protection for Italy's specialty foods.
    (Reuters)
  Law and crime:
  - Hillary Clinton email controversy
  - The U.S. Department of Justice publishes a 568-page report by Inspector General
    Michael E. Horowitz on the FBI's handling of its investigation of Hillary Clinton's
    email practices. The report is critical of former FBI Director James Comey, accusing
    him of being "insubordinate", but finding that his actions were not politically
    biased. (CBS News) (BBC)
  - List of journalists killed in India
  - Indian journalist Shujaat Bukhari is shot dead by unidentified gunmen in Srinagar,
    Jammu and Kashmir. One of his bodyguards was also killed in the shooting. (BBC)
  - The attorney general of New York announces she is suing the Donald J. Trump Foundation
    and its directors, President Donald Trump, Donald Trump, Jr., Ivanka Trump and
    Eric Trump. (CNBC)
  Politics and elections:
  - Politics of France
  - 'The Senate of France approves a bill to reform the SNCF railway company. The
    French state writes off €35 billion of SNCF''s €47 billion debt, but remains the
    sole owner of the joint-stock company with two subsidiaries: operator SNCF Mobility
    and infrastructure manager SNCF Network. (International Railway Journal) (Reuters)'
  Sports:
  - 2018 FIFA World Cup
  - Hosts Russia beat Saudi Arabia 5–0 in the opening match, with two goals by Denis
    Cheryshev. (BBC Sport) (Reuters via RNZ)
