Date: '2018-08-24'
Source_URI: Portal:Current events/2018 August 24
Intelligence_Payload:
  Art and culture:
  - The Spanish government passes a decree which amends the Historical Memory Law
    to allow the government to exhume Francisco Franco's remains from the Valle de
    los Caídos. (The Independent)
  Business and economy:
  - Two weeks after Elon Musk expressed his intentions of making Tesla, Inc. private,
    he and the company's board announce that the company will remain publicly listed.
    (NPR)
  Disasters and accidents:
  - A bus plunges off a bridge onto a train track due to a malfunction near Kuopio,
    Finland, killing four people and injuring 20 others. (Yle News)
  International relations:
  - 2017–18 North Korea crisis, North Korea–United States relations
  - U.S. President Donald Trump asks his Secretary of State Mike Pompeo to cancel
    a planned trip to North Korea, citing the country's insufficient progress in denuclearizing
    the Korean peninsula. (CNBC)"
  - Palestine–United States relations
  - The United States Department of State redirects more than $200 million in aid
    for the Palestinian National Authority to "high priority projects elsewhere".
    The Palestine Liberation Organization denounces the "use of cheap blackmail as
    a political tool". (Fox News)
  Politics and elections:
  - Liberal Party of Australia leadership spills, 2018
  - Australian Prime Minister Malcolm Turnbull loses spill motion and resigns. (Sky
    News)
  - Treasurer Scott Morrison wins the second leadership spill, 45 votes to 40 against
    Peter Dutton, and becomes Prime Minister. (ABC)
  - European migrant crisis
  - Representatives from 12 European Union countries do not reach an agreement on
    Italy's request to take in the 150 migrants still remaining on the Diciotti-class
    vessel in Catania, Sicily, after their rescue by the Italian Coast Guard nine
    days ago. (Deutsche Welle) (ANSA)
  - Democratic Republic of the Congo general election, 2018
  - The electoral commission publishes the list of approved candidates. Jean-Pierre
    Bemba and two former prime ministers are excluded. (Reuters via Business Insider)
  - Corruption in Venezuela, United States–Venezuela relations
  - A United States court case gains new evidence and a guilty plea in relation to
    investigations of corruption and money laundering in Venezuela, adding a group
    who are suspected to be relatives of Venezuelan President Nicolás Maduro to the
    list of suspected accomplices. (Business Insider) (ABC News)
  - U.S. Senator John McCain (R–AZ) has announced that he will not continue his cancer
    treatment. (CNN)
