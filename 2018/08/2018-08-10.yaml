Date: '2018-08-10'
Source_URI: Portal:Current events/2018 August 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan, Ghazni offensive
  - A large-scale military offensive is launched by the Taliban in a bid to overrun
    the southeastern city of Ghazni, a provincial capital on the Kabul–Kandahar Highway.
    They manage to take control of a part of the city. (The New York Times)
  International relations:
  - Foreign relations of Colombia
  - Colombia announces its withdrawal from the Union of South American Nations after
    having suspended its membership in the organization since April 2018. (CNN)
  - Turkey–United States relations, 2018–2021 Turkish currency and debt crisis
  - U.S. President Donald Trump authorizes the doubling of Section 232 tariffs on
    imports of aluminium and steel from Turkey, to 20% and 50% respectively. The Turkish
    lira further falls to a new record low against the U.S. dollar and Turkish stocks
    tumble. (CNBC)
  Law and crime:
  - Fredericton shooting
  - At least four people, including two police officers, are killed in a mass shooting
    in Fredericton, Canada. (BBC)
  - Glyphosate § Legal cases
  - A jury in the U.S. state of California awards $289 million to a man who claims
    that his terminal cancer was caused by Monsanto's glyphosate-containing weed killer.
    (BBC)
  - 2018 Horizon Air Q400 incident
  - An airport mechanic steals a Horizon Air Bombardier Q400 from Seattle–Tacoma International
    Airport in the United States, eventually crashing the plane on Ketron Island.
    (CBS News)
  Politics and elections:
  - 2017–2018 Romanian protests
  - 452 people are injured in clashes between protesters and police during an anti-government
    meeting in Bucharest, Romania. (Știrile Pro TV)
  - United Nations Development Group
  - The United Nations General Assembly confirms Michelle Bachelet, former President
    of Chile, to succeed Zeid Raad Al Hussein as the UN High Commissioner for Human
    Rights. The decision to appoint her for a four-year term, starting September 1,
    was made by consensus after her nomination by UN Secretary-General António Guterres.
    (TASS)
  - Terrorism in the United Kingdom
  - Lewis Ludlow pleads guilty to financing and planning a terrorist van attack in
    London, England. (BBC)
  - The Supreme Court of Costa Rica rules that a ban on same-sex marriage is illegal,
    and states that legislators must change the law accordingly within eighteen months.
    (BBC)
