Date: '2018-08-19'
Source_URI: Portal:Current events/2018 August 19
Intelligence_Payload:
  Disasters and accidents:
  - Earthquakes in 2018
  - A deep-focus earthquake of magnitude 8.2 (the strongest recorded in 2018) strikes
    the South Pacific Ocean near Fiji. No threat of tsunami is immediately detected.
    (KATU)
  - 19 August 2018 Lombok earthquake
  - A 6.3-magnitude earthquake strikes the Indonesian island of Lombok, killing 14.
    (The Guardian)
  - 2018 Pacific typhoon season
  - Tropical Storm Rumbia kills nine people in Anhui and Henan provinces, China. (Xinhua)
  - 2018 Pacific hurricane season
  - Hurricane Lane weakens to a Category 3 storm and is expected to pass south of
    Hawaii throughout the next few days. (CBS News) (Honolulu Star-Advertiser)
  International relations:
  - European migrant crisis
  - Italy Interior Minister Matteo Salvini threatens to return 177 migrants who have
    been aboard an Italian coast guard ship for days to Libya. (Time)
  - War In Afghanistan
  - Afghan President Ashraf Ghani calls for a conditional cease-fire with Taliban
    insurgents for the duration of the Eid al-Adha holiday. (Fox News) (Al Jazeera)
  - Bolivarian diaspora
  - Brazilians attack Venezuelan migrants at a border camp, the Brazilian military
    is deployed to stem the conflict. (The Telegraph)
  - Ecuador, Peru, Brazil, Colombia, and Chile tighten border controls for Venezuelan
    migrants. Over 7% of Venezuela’s total population has fled the nation in two years.
    (The Guardian)
  - Colombia-Venezuela relations
  - The Venezuelan armed forces send two attack helicopters and a brigade of 30 soldiers
    across the Colombia-Venezuela border. Colombia denounces the "violation of sovereignty"
    but takes no further action against the country. (NTN24)
  - Premiership of Justin Trudeau, Illegal immigration to Canada
  - Canadian Prime Minister Justin Trudeau shuts down a woman who heckled him about
    illegal immigration, telling her that “racism has no place” in Canada. (The Hill)
  Sports:
  - 2018 All-Ireland Senior Hurling Championship Final
  - In hurling, Limerick defeat Galway in the 2018 All-Ireland Senior Hurling Championship
    Final at Croke Park to win the Liam MacCarthy Cup for the first time since 1973.
    (BBC Sport) (Sky Sports)
  - Cincinnati Masters
  - Novak Djokovic beats Roger Federer in Cincinnati, becoming the first player to
    win singles titles in all nine ATP World Tour Masters 1000 tournaments in his
    career. (The Star)
