Date: '2018-08-30'
Source_URI: Portal:Current events/2018 August 30
Intelligence_Payload:
  Business and economy:
  - Economy of Argentina
  - Argentina hikes interest rate to 60%, the highest in the world, as its currency
    plunges. (CNN)
  - Economy of the United Kingdom
  - Panasonic announces their intent to move their European headquarters from London
    to Amsterdam, citing concern over Brexit. (BBC)
  - Wonga, the largest payday lender in the United Kingdom, collapses into administration.
    (BBC)
  - Crisis in Venezuela
  - The petro, a Venezuelan government-backed cryptocurrency, has not been trading
    and is not publicly accessible, despite government claims that it has sold $3.3
    billion worth of units and the fact that it is linked to the nation's physical
    currency and wages. (Reuters)
  - United States–European Union relations
  - European Commissioner for Trade Cecilia Malmström proposes to reduce all European
    Union import tariffs, also on automobiles, to zero if the United States reciprocates.
    President of the United States Donald Trump threatens to quit the World Trade
    Organization. (Le Soir)
  Disasters and accidents:
  - A military helicopter crashes in the Oromia Region of Ethiopia, killing 18 people.
    (FANA BC via Koaci)
  - A bus crash in Karoo, South Africa, leaves ten people dead and 30 injured. (The
    South African)
  - 2018 Atlantic hurricane season
  - The National Hurricane Center issues advisories for what forecasters call a Potential
    Tropical Cyclone Six. If it strengthens to a tropical storm, it would be known
    as Florence. (Sun Sentinel)
  - At least eight people are reported dead and many sent to hospitals after a bus
    crash on a New Mexico highway. (BBC)
  Law and crime:
  - The Trump administration is considering sending captured ISIL fighters to a prison
    in Iraq, as well as sending "high-valued fighters", who participated in the murder
    of Americans and other Western hostages, to the Guantanamo Bay detention camp.
    Human rights groups and the Democratic Party are opposed to holding these people
    indefinitely without charges and say they should be tried in federal courts. (NBC
    News) (NBC San Diego)
  Politics and elections:
  - Protesters against Mayor of London Sadiq Khan plan to fly a balloon of him in
    which he is wearing a yellow bikini over Parliament Square, London on 1 September
    in the same spot where the Donald Trump baby balloon was flown on 13 July. (Chicago
    Suntimes) (Inquistr)
  - Trans Mountain Pipeline, Premiership of Justin Trudeau
  - A Canadian court overturns Prime Minister Justin Trudeau’s decision to expand
    the Trans Mountain Pipeline. (The Guardian)
  Science and technology:
  - The Japanese space agency announces their schedule for the exploration of 162173
    Ryugu by their Hayabusa2 probe. (BBC)
