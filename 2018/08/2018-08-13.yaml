Date: '2018-08-13'
Source_URI: Portal:Current events/2018 August 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - More than 100 Afghan soldiers and police, 13 civilians and hundreds of Taliban
    are killed during the ongoing offensive in Ghazni. (BBC)
  - The Taliban captures Camp Chenaya, an Afghan Army base in Ghormach District, Faryab
    Province. (Voice of America)
  - At least 40 people are killed by paramilitary forces in eastern Ethiopia, in the
    latest spate of violence driven by ethnic divisions. (Voice of America)
  Business and economy:
  - Turkish currency and debt crisis
  - Asian stock prices sink as Turkey’s financial turmoil fuels fears contagion might
    spread to other emerging markets. (Market Watch)
  Disasters and accidents:
  - 2018 Laos dam collapse
  - The death toll from a dam collapse in Laos on 23 July rises to 36, while 98 people
    are still missing. (Business Standard)
  - Authorities in India confirm that 774 people have been killed so far during monsoon
    rains. (Financial Express)
  - Nine people are killed and 16 others injured after a fire breaks out in a ward
    on the seventh floor of a hospital in New Taipei City, Taiwan. (BBC)
  - More than 300 people are injured, five seriously, after a section of wooden jetty
    collapsed at an urban sports and music festival in Vigo, Spain. (BBC)
  - Twelve fans of Ecuadorian football team Barcelona S.C. are killed and 30 others
    are injured after the bus they were traveling on overturns in Azuay, Ecuador.
    (Xinhua)
  - Three Russian climbers and two Tajik pilots die while 12 other people are injured
    in a helicopter crash in Tajikistan. (Tampa Bay Times)
  - 41 people are injured when a coach overturns in Kent, England, United Kingdom.
    (Kent Live)
  International relations:
  - North Korea–South Korea relations
  - North Korea and South Korea officials begin high-level negotiations, with reports
    suggesting that Kim Jong-un and Moon Jae-in could be planning for a summit in
    Pyongyang later this month. (Reuters)
  Politics and elections:
  - Mueller special counsel investigation
  - The lawyer of Peter Strzok, a former agent of the Federal Bureau of Investigation
    (FBI) who was removed from Robert Mueller's Special Counsel investigation, announces
    that his client has been fired by the FBI. (The Washington Post via MSN)
