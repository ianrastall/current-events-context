Date: '2018-08-06'
Source_URI: Portal:Current events/2018 August 6
Intelligence_Payload:
  Disasters and accidents:
  - 2018 European heat wave
  - A heat wave in Spain kills nine people. (Público)
  - A heat wave in Genoa, Italy, kills seven people. (Genova24)
  - Landslides triggered by floods in Nepal kill nine people. (The Himalayan)
  - A fuel tanker explodes on the A14 motorway after colliding with a lorry near Bologna
    Airport in Italy, causing a section of the motorway to collapse. A person dies
    and 145 others are injured, at least 14 seriously. (ANSA)
  - Twelve migrant workers die and three others are injured when a truck collides
    with a van in Foggia, Italy. (ANSA)
  - The Mendocino Complex Fire grows into the largest active wildfire in California
    history. (BBC)
  International relations:
  - Iran–United States relations, Joint Comprehensive Plan of Action
  - The United States reimposes sanctions on Iran after the US pulled out of the international
    agreement three months prior. (Reuters)
  - The European Union announces that its blocking statute against the US sanctions
    will take effect tomorrow, protecting European companies from US sanctions and
    encouraging them to keep trading with Iran. (The Telegraph)
  - Foreign relations of Brazil, Crisis in Venezuela (2012–present)
  - Brazil closes its international border with Venezuela, following a similar move
    enacted but then rescinded by Colombia earlier in 2018, as a response to an increase
    in Venezuelans fleeing their country to neighbouring states. (The Guardian)
  - Tajikistan–Uzbekistan relations
  - Commercial flights have resumed between the Tajikistan capital, Dushanbe, and
    the Uzbekistan city of Bukhara amid improving ties. (rferl)
  Politics and elections:
  - Caracas drone explosions
  - Venezuelan President Nicolás Maduro skips a rally in Caracas following weekend
    drone blasts that he called an assassination attempt, surprising and confusing
    some supporters in attendance. (Reuters)
  - The Colombian Civil Aviation Authority announces a ban on drones within a 2 nautical
    mile radius and altitude of Plaza Bolívar, Bogotá during the Presidential Inauguration
    of Iván Duque the following afternoon. (Tele13)
  - Second Ivorian Civil War
  - The government of Ivory Coast grants amnesty to former First Lady Simone Gbagbo
    a week after the overturned her acquittal for crimes against humanity. (France
    24)
  Science and technology:
  - Facebook removes several InfoWars-related pages from its platform, for what it
    describes as glorification of violence and dehumanizing language. YouTube deletes
    Alex Jones's main account for repeated Terms of Service violations. Apple and
    Spotify pull Jones's podcasts. Editor Paul Joseph Watson calls Facebook's move
    "political censorship" on Twitter. (NBC News)
