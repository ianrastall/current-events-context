Date: '2018-08-22'
Source_URI: Portal:Current events/2018 August 22
Intelligence_Payload:
  Business and economy:
  - Senior industry sources say that the previously announced initial public offering
    of Saudi Aramco has been halted. (Reuters)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Hurricane Lane strengthens to a Category 5 hurricane for around three hours as
    it heads toward Hawaii, before returning to Category 4. (CNN)
  - 2018 Venezuela earthquakes
  - A 5.8 magnitude earthquake hits close to yesterday's 7.3 earthquake, this one
    inland near Yaguaraparo, Venezuela. (AP)
  - It is revealed that 5 people died from heart attack due to shock in yesterday's
    earthquake. (AP)
  - Earthquakes in 2018
  - A 6.2 earthquake, 100 miles from the Oregon coast, rocks the Western States of
    America. (The Independent)
  Law and crime:
  - Personal and business legal affairs of Donald Trump
  - List of lawsuits involving Donald Trump
  - The lawyer of Michael Cohen, ex-lawyer of U.S. President Donald Trump who pleaded
    guilty to eight felonies a day prior, says his client would refuse to accept a
    presidential pardon. (The Independent)
  - Donald J. Trump Foundation § Investigations by New York State
  - New York state investigators subpoena Michael Cohen as part of their investigation
    into the Trump Foundation. (AP)
  - Terrorism in Germany
  - In Berlin, police raid an apartment and arrest a suspected Russian Islamic extremist
    who had allegedly stored a large amount of TATP in October 2016 and plotted with
    a Frenchman to bomb an unspecified public place in Germany. (Reuters)
  - Human rights in Saudi Arabia
  - According to human rights campaigners, Saudi Arabian prosecutors seek the death
    penalty for six activists for inciting anti-government protests and morally supporting
    rioters. (NBC News)
  - Killing of Mollie Tibbetts
  - Cristhian Bahena Rivera, a Mexican man accused of killing University of Iowa student
    Mollie Tibbetts after entering the U.S. illegally, appears in a Poweshiek County
    court for arraignment on first-degree murder. His bail is set at US$5 million.
    If released by local police, he may be arrested by ICE. (CNN)
  - Corruption in Venezuela, Crisis in Bolivarian Venezuela
  - The Venezuelan National Assembly supports and enforces a ruling made by exiled
    members of the Venezuelan Supreme Court, sentencing Venezuelan President Nicolás
    Maduro to 18 years and 3 months in prison for a litany of charges largely related
    to corruption. The Maduro government calls the court "illegitimate". (El Telégrafo)
  Politics and elections:
  - Crisis in Venezuela
  - Venezuelan President Nicolás Maduro says that the wages for workers in Venezuela
    must be linked to the petro. (El Nacional) (El Universal)
  Science and technology:
  - Interbreeding between archaic and modern humans
  - A bone fragment found in Denisova Cave, Denisova 11, is identified as that of
    a girl who died 50,000 years ago aged at least 13. Genome-wide signatures tell
    that she had a Neanderthal mother and a mostly-Denisovan father. This first find
    of a prehistoric first-generation mixed offspring shows that different archaic
    human subtypes sometimes migrated, and then mixed more frequently than previously
    thought. (NBC News) (Live Science)
  - 2018 in spaceflight, Living Planet Programme
  - The European Space Agency's ADM-Aeolus global wind mapping satellite is successfully
    launched via a Vega rocket from Guiana Space Centre. (BBC)
