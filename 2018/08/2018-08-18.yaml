Date: '2018-08-18'
Source_URI: Portal:Current events/2018 August 18
Intelligence_Payload:
  Arts and culture:
  - Russian president Vladimir Putin attends the wedding of Austrian foreign minister
    Karin Kneissl (FPÖ) and businessman Wolfgang Malinger. (BBC)
  - History of cheese
  - Archeologists from the Cairo University and the University of Catania report the
    discovery of one of the oldest known examples of cheese. Discovered at a tomb
    in the Saqqara necropolis, it is the first known evidence of ancient Egyptian
    cheese production. (BBC)
  Disasters and accidents:
  - Ponte Morandi § Collapse
  - The death toll from the Ponte Morandi collapse in Genoa, Italy, rises to 43. (Adnkronos)
  - 2018 Pacific hurricane season
  - Hurricane Lane enters the central Pacific as a category 4 hurricane. (Honolulu
    Star-Adviser)
  Law and crime:
  - School violence
  - A school official in Bicol Central Academy, a school in Libmanan, Camarines Sur,
    Philippines burned students' bags and other personal belongings as a punishment
    for students who violated the no-bag policy set for the school's event during
    that time. It was met with huge outrage from the netizens. (Rappler)
  Politics and elections:
  - Politics of Belarus
  - Belarusian president Alexander Lukashenko reshuffles his government in the wake
    of a corruption scandal. Andrei Kobyakov is replaced by Sergei Rumas as Prime
    Minister of Belarus. (The Guardian)
  - 6th Justice and Development Party Ordinary Congress
  - At the 6th Ordinary Congress of the Justice and Development Party (AKP), President
    of Turkey Recep Tayyip Erdoğan is re-elected as the party's chairman, receiving
    1380 of 1381 votes. (Anadolu)
  - Protests against Rodrigo Duterte
  - Vice President Leni Robredo protests President Rodrigo Duterte's remark that her
    hometown Naga City is a "hotbed of shabu." (CNN Philippines) (Rappler)
  Sports:
  - 2018 Asian Games
  - The opening ceremony of the Asian Games takes place. (NDTV Sports)
