Date: '2018-08-23'
Source_URI: Portal:Current events/2018 August 23
Intelligence_Payload:
  Business and economy:
  - 2018 China–United States trade war
  - American tariffs of 25% on approximately $16 billion worth of Chinese goods come
    into effect. China immediately responds with equivalent tariffs of its own. (Reuters)
  - Brexit
  - The government of the United Kingdom publishes the first 25 of 80 planned "technical
    notices" providing practical guidance to businesses in case of a no-deal Brexit.
    (Fortune)
  - Austrian Chancellor Sebastian Kurz, whose country holds the rotating European
    Union presidency, expresses interest in avoiding a hard Brexit. (Reuters)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Hurricane Lane causes flash flooding, and threatens a direct hit towards Hawaii
    as it passes through Oahu. Over of rain has already fallen in some areas. (CNN)
  International relations:
  - South Africa–United States relations, South African farm attacks, Fox News controversies
  - The government of South Africa rejects a tweet by U.S. President Donald Trump
    as "based on false information", in which he appeared to respond to a Fox News
    report stating that the South African government is "now seizing land from white
    farmers." (CNN)
  - Crisis in Bolivarian Venezuela
  - Ecuador–Venezuela relations, Bolivarian Alliance
  - Ecuador leaves the Bolivarian alliance of nations run in Latin America, citing
    the behaviour of the Venezuelan government in several areas including attempting
    to impose Chavism in America, creating major crises, and ineffectual control of
    migration. (ABC News), (El Comercio)
  - Colombia-Venezuela relations
  - In response to the Venezuelan Bolivarian National Guard's armed infiltration of
    Norte de Santander, Colombia four days ago, Venezuela releases a statement calling
    it "supposed" and "fake news", despite clear video of Venezuelan helicopters in
    Colombian territory. (NTN24)
  - Bolivarian diaspora, Venezuela–Colombia migrant crisis
  - Colombia announces that it will host a summit in Bogotá with migration officials
    from Peru and Ecuador in an attempt to seek a solution for the growing illegal
    immigration of Venezuelans through their nations. (Reuters)
  Law and crime:
  - 2018 California wildfires
  - Authorities arrest 32-year old John Colin Eagle Skoda after investigators concluded
    that a debris fire he started turned into a 60-square-mile blaze that killed one
    person and destroyed 35 homes. (ABC News)
  Politics and elections:
  - Liberal Party of Australia leadership spill, 2018
  - Australian MP Peter Dutton claims that Prime Minister Malcolm Turnbull has lost
    the support of the majority of the Liberal Party and calls for another leadership
    vote. Turnbull states that he will resign if another spill is called. (ABC) (The
    Sydney Morning Herald) (Reuters)
