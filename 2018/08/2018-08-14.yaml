Date: '2018-08-14'
Source_URI: Portal:Current events/2018 August 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Norma Azucena Rodríguez Zamora, a recently elected member of the Congress of Mexico,
    is kidnapped by gunmen in the state of Hidalgo. (BBC)
  Disasters and accidents:
  - Ponte Morandi § Collapse
  - The Ponte Morandi viaduct collapses on the A10 motorway in Genoa, Italy. 38 people
    are confirmed dead, 16 others are seriously injured, 5 are missing and 632 displaced.
    35 cars and three heavy vehicles are involved in the accident. Several homes are
    also damaged and people inside them also injured. (TGCom)
  - A road accident in Quito, Ecuador involving a bus and a truck leaves 24 people
    dead and 18 others injured. (CNN en Español)
  - Ten people are killed and another injured in a fire at a care home in Chiguayante,
    Chile. (24 Horas)
  International relations:
  - Following a period of quiet, Israel reopens the Kerem Shalom crossing into Gaza.
    (BBC)
  Law and crime:
  - Grand jury investigation of Catholic Church sexual abuse in Pennsylvania
  - A grand jury report alleging that more than 300 priests abused over 1,000 children
    in six Pennsylvania Catholic diocese -- Allentown, Scranton, Harrisburg, Pittsburgh,
    Greensburg, and Erie -- is released by state Attorney General Josh Shapiro. (Washington
    Post) (Times Leader)
  - 2018 Westminster car crash
  - A man is arrested near the Palace of Westminster in London after a Ford Fiesta
    hit pedestrians, cyclists and a security barrier. (The Daily Telegraph)
  - Stand-your-ground law in Florida
  - Michael Drejka is charged with manslaughter by a state attorney after a reversal
    of an earlier decision made by police. The case stems from a controversial video
    that shows Drejka shooting another man over a handicapped parking space and claiming
    self defense. (NBC)
  - Capital punishment in Nebraska
  - Nebraska executes convicted murderer Carey Dean Moore, becoming the first U.S.
    state to execute an inmate with fentanyl, and what is also the state's first execution
    in 21 years, and its first by lethal injection. (BBC)
  Politics and elections:
  - European migrant crisis
  - Spain, Portugal, France, Germany and Luxembourg agree to take in 141 migrants,
    67 of them unaccompanied children, who were rescued on Friday by the MV Aquarius;
    Malta allows the ship to dock. (The Guardian)
  - Kansas gubernatorial election, 2018
  - Incumbent Governor of Kansas Jeff Colyer concedes defeat to Republican challenger
    Kris Kobach in the primary election. (CNN)
