Date: '2018-08-25'
Source_URI: Portal:Current events/2018 August 25
Intelligence_Payload:
  Business and economy:
  - A 1962 Ferrari 250 GTO is sold for $48.4 million at an auction in California,
    making it the most expensive car ever sold through auction. (Bloomberg)
  Disasters and accidents:
  - 2018 Harbin hotel fire
  - A hotel fire in Harbin, China, kills 19 people and injures 23 others. The fire
    broke out at the four-story Beilong Hot Spring Hotel in Harbin's Sun Island recreation
    area. (Xinhua)
  - The collapse of three buildings in Mashhad, Iran, kills ten people and injures
    nine others. (Mehr News Agency)
  - A bus falls into the Iskar Gorge near Svoge, Bulgaria, leaving 17 people dead
    and 17 injured. (BGNES)
  International relations:
  - European migrant crisis
  - Thirteen sick people are taken off the stranded Diciotti vessel in Catania, Italy.
    Albania offers to take in 20 migrants. (Reuters)
  - Italian Minister of the Interior Matteo Salvini is placed under investigation
    for possible illegal detention and kidnapping. He subsequently gives permission
    for the remaining 134 migrants to disembark. Ireland will take 25 migrants, Albania
    20. The Italian church says it will take in the others. (The Guardian)
  Politics and elections:
  - U.S. Senator and 2008 presidential nominee John McCain (R–AZ) dies at the age
    of 81. (The New York Times)
  Sport:
  - 2018 Challenge Cup
  - In the Rugby League, the Catalans Dragons beat the Warrington Wolves in the 2018
    Challenge Cup Final. It is the first time a team that is not from Northern England
    has won the competition. (BBC)
