Date: '2018-08-04'
Source_URI: Portal:Current events/2018 August 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Caracas drone explosions
  - Venezuela President Nicolás Maduro survives what he claims is an assassination
    attempt involving drones while speaking at a military event in Caracas. Eight
    people are injured. (BBC)
  Disasters and accidents:
  - An MI-8 helicopter belonging to Russian company Utair crashes in Siberia, killing
    18 people. (BBC)
  Health and environment:
  - England's Local Government Association reports that approximately two-thirds of
    plastic objects which reach recycling facilities cannot be recycled, due to the
    mix of polymers used by producers. (BBC)
  International relations:
  - 2017–18 North Korea crisis
  - A report commissioned by the United Nations Security Council concludes that North
    Korea has not stopped its nuclear program and that it attempted to sell military
    supplies to Libya, Sudan and Yemen. (BBC)
  - Ri Yong-ho, the Minister of Foreign Affairs of North Korea, says that his country
    will not start denuclearizing unless the United States takes reciprocal actions.
    (The New York Times)
  - Colombia–Venezuela relations, United States–Venezuela relations
  - Venezuelan President Nicolás Maduro blames an alleged assassination attempt on
    Colombia and Venezuelan exiles in the U.S. state of Florida. (The Guardian)
  Politics and elections:
  - 2018 Bangladesh road safety protests
  - Nationwide student protests following the deaths of two teenagers killed by a
    speeding bus enter their fifth day, causing the government to shut down thousands
    of high schools. (The Guardian)
  - 2018 United States gun violence protests
  - Advocates of stricter gun control measures protest outside the NRA headquarters
    in Northern Virginia. (CBS News)
  Sports:
  - Oakland Raiders cornerback Daryl Worley is sentenced to three days in jail and
    two years of probation in June after pleading guilty to firearms and resisting
    arrest charges stemming from an incident in April. (NFL) (ABC News)
