Date: '2018-08-29'
Source_URI: Portal:Current events/2018 August 29
Intelligence_Payload:
  Disasters and accidents:
  - A 7.1 magnitude earthquake hits the Loyalty Islands, New Caledonia. (Stuff)
  - The Swar Chaung dam bursts in Yedashe Township, Bago Region, Myanmar, flooding
    around a hundred villages and forcing roughly 50,000 people to flee their homes.
    One person is missing and the country's main highway is flooded. (The Guardian)
  - The Philippine Navy's Gregorio del Pilar-class frigate BRP Gregorio del Pilar
    (FF-15) runs aground on the disputed Half Moon Shoal in the South China Sea. (ABC
    News)
  International relations:
  - Germany–Namibia relations
  - Germany hands over to Namibia the human remains—19 skulls, a scalp and bones—of
    Herero and Nama tribespeople among the tens of thousands killed by the German
    Empire between 1904 and 1908. (Al Jazeera)
  - Bolivarian diaspora
  - A meeting is held in Lima attended by representatives from Colombia, Peru, Ecuador,
    and Brazil, to develop requests for aid in regards to Venezuelan immigrants, which
    will be sent to organisations including the United Nations and International Red
    Cross. Yesterday, there was a similar meeting in Bogotá. A larger meeting has
    been set-up to be held in Quito in early September, to be attended by representatives
    from 14 countries and 10 international organisations. (Bloomberg)
  Law and crime:
  - Air Canada reports a data breach in which passport information was accessed. (BBC)
  Politics and elections:
  - Pension Fund of the Russian Federation
  - Russian President Vladimir Putin announces a softening of the pension plan presented
    in June. The plan's original announcement has led to protests and a dip in Putin's
    approval ratings. (AP via News 13)
  Sports:
  - 2018 NFL season
  - The Cleveland Browns release linebacker Mychal Kendricks following charges of
    insider trading. (Bleacher Report) (CBS News)
