Date: '2018-08-01'
Source_URI: Portal:Current events/2018 August 1
Intelligence_Payload:
  Arts and culture:
  - The Eiffel Tower in Paris shuts down after workers go on a strike over ticketing
    changes. (Upi)
  Disasters and accidents:
  - 2018 Vietnam floods
  - Two children and a man drown as new floods overflow one bank of the Bui River,
    engulf several villages, and threaten to submerge parts of Hanoi. (NHK World)
  - An intense heat wave hits South Korea, which started at the end of July and is
    forecast to reach its highest temperature in the coming days. The heat wave kills
    27 people, while more than 2,200 are taken to the hospital. (The Straits Times)
  - Grenfell Tower fire
  - England announces that the Ministry of Housing will manage Grenfell Tower in London
    once the investigation into the fire that gutted the building and killed 72 people
    is complete. (BBC)
  International relations:
  - Turkey–United States relations, 2016–present purges in Turkey
  - The White House imposes sanctions on two Turkish officials over the detention
    of Andrew Brunson, an American pastor who is being tried on espionage and terror-related
    charges. (Al Jazeera)
  Law and crime:
  - An orb and two crowns, part of the Regalia of Sweden, are stolen from Strängnäs
    Cathedral. (BBC)
  Politics and elections:
  - Zimbabwean general election, 2018
  - Violence breaks out in Zimbabwe amid allegations of election-rigging by the ruling
    Zanu-PF party. (BBC)
  - Afghan presidential election, 2019
  - The Afghan government says that it will hold presidential elections on April 20,
    2019. (AL Jazeera)
  Science and technology:
  - Researchers from Australia report the success of a plan to use mosquitoes infected
    with Wolbachia bacteria to prevent the spread of dengue fever in an Australian
    town, stating that they intend to bring the program to other locales. (BBC)
  - Reddit reports a data breach consisting of emails and usernames. The site states
    that the perpetrators had access to information on accounts which were subscribed
    to their newsletter between the 3rd and 17th of June, as well as those created
    between 2005 and 2007. (NBC)
