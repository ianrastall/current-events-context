Date: '2018-08-16'
Source_URI: Portal:Current events/2018 August 16
Intelligence_Payload:
  Arts and culture:
  - 2018 Washington Veterans Day Parade
  - The United States Department of Defense postpones President Donald Trump's military
    parade, which was slated to take place on 10 November, until 2019. The estimates
    for the parade's cost have risen from $12 million to $92 million. (ABC News) (Market
    Watch)
  - Freedom of the press in the United States
  - In coordinated editorials defending press freedom, hundreds of U.S. newspapers
    rebuke President Donald Trump's repeated accusations that the news media reports
    "fake news" and that journalists are "enemies of the people". (RTÉ News)
  - American soul singer and songwriter Aretha Franklin dies at the age of 76. (CNN)
  Business and economy:
  - Constellation Brands, the owner of Corona Beer, announces plans to invest in Canadian
    marijuana producer Canopy Growth. (BBC)
  Disasters and accidents:
  - 2018 California wildfires
  - Analysis shows that a rare fire tornado that barreled into the city of Redding
    on July 26 during the Carr Fire was responsible for the death of a firefighter
    as he raced towards a neighborhood in flames. (Los Angeles Times)
  - 2018 Kerala floods
  - Authorities in India say that 350 people are confirmed dead in the heavy floods
    in Kerala. (Times of India)
  Law and crime:
  - Mexican Drug War
  - The Mexican government announces that they are offering up to MXN$30 million (equivalent
    to US$1.56 million) for anyone who provides information that leads to the arrest
    of Nemesio Oseguera Cervantes (alias "El Mencho"), the suspected leader of the
    Jalisco New Generation Cartel and one of Mexico's most-wanted. (El Universal)
  - The government of DR Congo issues an international arrest warrant for opposition
    leader Moïse Katumbi, who was hoping to take part in the upcoming December 2018
    Congolese general election. (Zambia Reports)
  Politics and elections:
  - Elections in Canada, Premiership of Justin Trudeau
  - Canadian Prime Minister Justin Trudeau dismisses speculation that he would call
    an early election this fall and states that his government remains focused on
    renegotiating NAFTA and strengthening the economy. (Reuters)
  - Dog meat consumption in South Korea
  - Animal rights groups hold protests against dog meat consumption in Seoul. (UPI)
  - Amid controversy, the Trump Administration of the United States revokes the security
    clearance of former CIA chief John Brennan. (BBC)
  Sports:
  - 2018 Major League Baseball season
  - The Texas Rangers pull off a triple play against the Los Angeles Angels without
    retiring the batter, the first such triple play in MLB since 1912. (HuffPost)
