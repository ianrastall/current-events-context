Date: '2018-08-27'
Source_URI: Portal:Current events/2018 August 27
Intelligence_Payload:
  International relations:
  - United States free-trade agreements, Mexico–United States relations
  - The United States and Mexico reach common ground on key trade terms in the North
    American Free Trade Agreement. Canada has yet to sign off on the agreement. (BBC)
    (Reuters)
  Law and crime:
  - A United Nations Human Rights Council report based on 875 interviews recommends
    Min Aung Hlaing and five other generals in Myanmar be investigated and prosecuted
    for genocide, crimes against humanity and war crimes since the 1960s. (UPI)
  - Aftermath of the Sri Lankan Civil War
  - Forensic anthropologists from the University of Kelaniya, Sri Lanka, report that
    more than 90 sets of human remains have been discovered near the town of Mannar.
    The mass grave is situated in an area that saw heavy fighting during the country's
    civil war. (BBC)
  - 2018 Chemnitz protests
  - Violent protests break out across Germany after a stabbing attack the day before.
    Several instances of racial violence are reported, and riot police have been attacked.
    (Deutsche Welle)
  Politics and elections:
  - Politics of the United Kingdom
  - Home Secretary Sajid Javid comes under criticism for describing Leader of the
    Opposition Jeremy Corbyn on Twitter as "one of the biggest threat's to our national
    security". (Talk Radio UK)
