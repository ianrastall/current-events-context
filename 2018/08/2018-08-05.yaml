Date: '2018-08-05'
Source_URI: Portal:Current events/2018 August 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A Taliban suicide bomber kills three Czech soldiers on a routine patrol in Charikar,
    Afghanistan. A U.S. soldier and two Afghan troops are also injured in the bombing.
    (BBC)
  - Syrian Civil War
  - Syrian media reports that ISIL has executed one of a number of Druze hostages
    taken from Syria's government-held city of As-Suwayda in an attack last week.
    (Haaretz)
  Disasters and accidents:
  - August 2018 Lombok earthquake
  - A 7.0 magnitude earthquake strikes Lombok, Indonesia. A tsunami warning is issued.
    At least 131 people are killed and more than 238 are injured. (BBC)
  - 2018 Ju-Air Junkers Ju 52 crash
  - Police in Switzerland say that all 20 occupants of a World War II-era Junkers
    Ju 52 plane that crashed yesterday on the flanks of the Piz Segnas mountain are
    dead. (Whig)
  - Police in New Mexico rescue 11 malnourished children being kept in squalid conditions
    in a remote desert compound. (BBC)
  - Five people are killed after a small plane crashes in a Southern California parking
    lot. (Time)
  International relations:
  - Canada–Saudi Arabia relations
  - Saudi Arabia withdraws its Ambassador from Canada, and orders the Canadian counterpart
    to leave the country in 24 hours, after Canada calls for the release of activists
    who are in detention in the Middle East nation. (CBC News)
  Law and crime:
  - Caracas drone explosions
  - Venezuelan authorities detain six people involved in what they call an assassination
    attempt on Venezuela President Nicolás Maduro. (The Hill)
  Sports:
  - Englishwoman Georgia Hall wins the 2018 Women's British Open golf championship.
    (The Guardian)
