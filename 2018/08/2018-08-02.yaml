Date: '2018-08-02'
Source_URI: Portal:Current events/2018 August 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen, Battle of Al Hudaydah
  - Alleged Saudi-led coalition airstrikes on a fish market and hospital entrance
    kill at least 20 people in Al Hudaydah, Yemen. A Saudi spokesman denies that its
    jets were in the area at the time, and blames rebels instead. (BBC)
  - Internal conflict in Myanmar
  - In northern Myanmar, around 300 villagers flee from their homes in Namtu Township,
    Shan State, after Northern Alliance insurgents take positions in the area, renewing
    fears of clashes between insurgents and government soldiers. (Radio Free Asia)
  Arts and culture:
  - Theology of Pope Francis
  - Pope Francis changes Catholic Church teaching to fully reject the death penalty,
    saying that it would work to abolish the death penalty worldwide. (The Washington
    Post)
  - Yomiuri Shimbun reports Tokyo Medical University altered entrance examination
    scores to decrease the number of women attending the school. (BBC)
  - Archeologists of the Romano-Germanic Museum report the discovery of the foundations
    of a Roman library building in Cologne. Dating from the 2nd century CE, it is
    the oldest library yet discovered in Germany. (BBC)
  Business and economy:
  - List of public corporations by market capitalization
  - Apple Inc. becomes the first public company to be worth US$1 trillion. (BBC)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Hurricane Hector becomes the fourth named hurricane of the eastern Pacific's hurricane
    season. (TC Palm)
  - Hector is forecast to strengthen into a category 3 storm the next few days. (Hawaii
    News Now)
  International Relations:
  - Crisis in Venezuela (2012-present), Colombia-Venezuela relations
  - Departing Colombian President Juan Manuel Santos grants 2-year citizenship rights
    to over 440,000 displaced Venezuelans living in Colombia, giving them certainty
    in access to medical and financial aid. (United Nations), (ABC News)
  Politics and elections:
  - Tennessee gubernatorial election, 2018
  - Former construction executive Bill Lee wins the Republican primary for Tennessee
    governor. (WSJ)
  - 2018 United States gun violence protests
  - Anti-violence protesters take to the streets of Chicago to draw attention to the
    problem of gun violence in Chicago, which briefly shuts down Lake Shore Drive.
    Protesters also call for Chicago Police Superintendent Eddie T. Johnson and Mayor
    Rahm Emanuel to step down for their handling of racial incidents in communities
    of color. (The Grio) (VOA News)
  Science and technology:
  - Discoveries of exoplanets
  - Kepler-452b emerges as an exoplanet that might support alien life. (Sky News)
  - Greenhouse gas, Plastic pollution
  - A study is published suggesting that loose plastic objects in the ocean release
    more methane than previously thought. (BBC)
  - Tests on the 5,000-year-old burnt human bones of 25 people found at Stonehenge
    suggest that ten came from more than away in West Wales. (The Guardian)
