Date: '2018-08-11'
Source_URI: Portal:Current events/2018 August 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan, Ghazni offensive
  - Fighting continues around the city of Ghazni. (Reuters)
  Disasters and accidents:
  - The death toll from heavy floods that triggered landislides in Kerala, India,
    which started on 8 July, rises to 37. (India.com)
  International relations:
  - Foreign relations of Uzbekistan, War in Afghanistan
  - A delegation of the Taliban political office in Doha, Qatar, has visited Uzbekistan
    from 7 to 10 August and met with officials at the Ministry of Foreign Affairs.
    Both parties "exchanged views of prospects of the peace process in Afghanistan".
    (The Hindu) (Uzbekistan Ministry of Foreign Affairs)
  Law and crime:
  - List of foreign nationals detained in North Korea, Japan–North Korea relations
  - A Japanese man is taken into custody in North Korea with Tokyo trying to gather
    information about the case. (The Japan Times)
  - LGBT rights in Russia
  - According to the Russian LGBT Network campaign group, a 16-year-old person becomes
    the first minor to be prosecuted under the Russian gay propaganda law. (The Independent)
  Politics and elections:
  - Thousands of people protest in Tunis against a government report on gender equality
    that proposes, among other things, to legalize homosexuality and to make the sexes
    equal in inheritance matters. (Al Araby)
  - U.S. Representative Chris Collins (R–NY) announces that he is suspending his campaign
    for re-election in the 2018 midterms, intending to serve out the remainder of
    his term. Collins was arrested by the FBI on August 8 on charges relating to insider
    trading. (CNN)
