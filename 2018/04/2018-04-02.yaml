Date: '2018-04-02'
Source_URI: Portal:Current events/2018 April 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Saudi King Salman bin Abdulaziz Al Saud and United States President Donald Trump
    hold a telephone conversation discussing the incidents. (Business Standard)
  Disasters and accidents:
  - Earthquakes in 2018
  - A magnitude 6.8 earthquake strikes near Tarija, Bolivia, and is felt as far as
    São Paulo, Brazil, approximately away. There are no reports of major damage or
    casualties. (ABC)
  - A lorry carrying five circus elephants crashes in Albacete, Spain, killing one
    elephant. (Fox News)
  - An oxygen cylinder explodes at a Burger King restaurant in Yerevan, Armenia, resulting
    in at least nine injuries. (Public Radio of Armenia)
  - A light aircraft and a small jet collide on a runway at Marion Municipal Airport,
    Indiana, United States. Two are killed and five more survive. (CNN)
  International relations:
  - China–United States relations
  - The White House criticizes China's decision to place tariffs of up to 25% on 128
    U.S. imports including pork and wine which was in retaliation to U.S. President
    Donald Trump's decision to introduce tariffs on Chinese steel and aluminium imports.
    (BBC)
  - South Africa's Winnie Madikizela-Mandela OLS, also known as Winnie Mandela dies.Winnie
    Mandela was a South African anti-apartheid activist and politician, and the ex-wife
    of Nelson Mandela and a well respected ANC Stalwart.
  Politics and elections:
  - Philippine presidential election, 2016
  - The manual recount of the votes begin for the 2016 vice presidential candidates,
    former Senator Bongbong Marcos and incumbent Vice President Leni Robredo. (CNN)
  - Caste politics in India
  - ​Nine people have died amid violent protests involving tens of thousands of protesters
    from the SC/ST caste groups across India. (News18)
  - Terrorism in Egypt
  - The Egyptian Parliament approves a draft law creating the 18-member Supreme Council
    for ‎Combating Terrorism and Extremism. The new body is headed by the President
    and is expected to also contain the Prime Minister, the speaker of the House of
    Representatives, and the defence and interior ministers. The new body replaces
    the National Council to Combat Terrorism and Extremism created by Presidential
    decree by Abdel Fattah el-Sisi in 2017. (Asharq Al-awsat) (Arab News)
  - Egyptian presidential election, 2018
  - Incumbent Abdel Fattah el-Sisi is declared the winner, with 97% of the vote and
    a 41% turnout. (Ahram Online)
  Science and technology:
  - Chinese space program
  - Chinese space station Tiangong-1 crashes into the South Pacific Ocean near Tahiti.
    (CNN) (BBC)
  - Astronomers report the discovery of MACS J1149 Lensed Star 1, nicknamed Icarus,
    the farthest known star at 9 billion light-years away. (Space)
  - The Atmosphere-Space Interactions Monitor launches to the International Space
    Station to monitor and research thunderstorms. (BBC)
  Sports:
  - 2018 NCAA Division I Men's Basketball Tournament
  - Villanova beats Michigan 79–62 to win the NCAA men's basketball championship.
    (Market Watch)
