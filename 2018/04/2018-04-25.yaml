Date: '2018-04-25'
Source_URI: Portal:Current events/2018 April 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Ahmed Abu Hussein, aged 24, becomes the second journalist killed while covering
    protests at the Israel–Gaza border. Hussein was hospitalized in Gaza after being
    shot by Israeli Defence Forces two weeks prior while wearing a press jacket. (The
    Jerusalem Post)
  - The United Nations Office for the Coordination of Humanitarian Affairs releases
    a detailed breakdown of Palestinian casualties since March 30 by date, age, gender,
    and injury. A total of 40 deaths and 1,511 injuries are listed. More than 400
    injuries are ascribed to gas inhalation. (Haaretz)
  - The Bangladeshi International Crimes Tribunal sentences former National Security
    Intelligence director general Wahidul Haque to prison for crimes against humanity
    committed during the 1971 Liberation War when Haque was a Pakistani Army general.
    The convictions relate to the deaths of 500–600 unarmed Bengalis and Santals in
    Rangpur. (The Dhaka Tribune)
  - Rwandan Genocide
  - Four mass graves are found in Gasabo, Rwanda, thought to date back to the 1994
    genocide. Around 3,000 people from the area remain missing. Houses are demolished
    to access the graves. (BBC)
  Disasters and accidents:
  - Disasters in Indonesia
  - An oil well catches fire in Ranto Peureulak, East Aceh Regency, Indonesia, killing
    ten people. (Sky News)
  International relations:
  - South Korea–United States relations
  - South Korea president Moon Jae-in announces that he will meet U.S. President Donald
    Trump in mid-May. (Upi)
  - It is announced that Admiral Harry B. Harris may be nominated as the new U.S.
    Ambassador to South Korea. (Military)
  - Around 500 experts from over 70 countries meet in Paris to start a two-day counterterror
    conference discussing methods of cutting financing to Al-Qaeda and ISIL. (The
    Tampa Bay Times)
  Law and crime:
  - Politics of Spain
  - The President of the Community of Madrid, Cristina Cifuentes, resigns after the
    discovery of a video of her stealing anti-aging cream in a supermarket and after
    several weeks of controversy after it came to light that she obtained her master's
    degree fraudulently. (BBC)
  - Murder of Kim Wall
  - Danish inventor and submariner Peter Madsen is convicted of the murder of Swedish
    journalist Kim Wall and sentenced to life in prison. (BBC)
  - Golden State Killer
  - Sacramento County Sheriff's Department arrest Joseph James DeAngelo in connection
    to the Golden State Killer case. (The Week)
  - Terrorism in Germany, NSU Trial, NSU murders
  - The terror trial of Beate Zschäpe hears closing arguments in Germany. In addition
    to a series of murders, Zschäpe stands accused of bombings and bank robberies.
    (The Local)
  - Crime in Israel
  - Israeli border police officer Ben Deri receives a 9-month sentence for fatally
    shooting Palestinian teen Nadeem Nawara in 2014. Deri was convicted of causing
    the unarmed boy's death by negligence. No charges were brought over the shootings
    of two other teens, one of whom also died. The court heard Deri used live ammunition
    without authorisation. (The Guardian)
  - Indian guru Asaram Bapu is sentenced to life imprisonment for the rape of a child.
    (Sky News)
  - Scotland's Parliament approves a bill devolving authority for social care payments.
    The bill arranges staggered introduction with complete devolution by 2021 and
    formation of a new agency to administer it. (BBC)
  - A Turkish court convicts and sentences thirteen Cumhuriyet journalists accused
    of supporting terrorist organisations. The newspaper is critical of President
    Recep Tayyip Erdoğan. (The Guardian)
  Politics and elections:
  - Mausoleum of Reza Shah
  - Reza Pahlavi, former crown prince and son of Iran's last Shah, asked authorities
    for access to the body of Reza Shah, through trusted doctors and scientific experts.
    He also added his grandfather must ultimately be buried again in Iran, in a manner
    that respects the wishes of their family and the Iranian people. (Newsweek)
  - United States elections, 2020, Donald Trump presidential campaign endorsements,
    2020
  - Texas senator Ted Cruz said he will support Donald Trump in the 2020 elections.
    (Arutz Sheva)
  Science and technology:
  - 2017 North Korean nuclear test
  - Scientists from the University of Science and Technology of China state that North
    Korea's nuclear test site, the Punggye-ri Nuclear Test Site at Mount Mantap, would
    have collapsed just minutes after the country performed its sixth nuclear test
    and opened up a hole of up to in diameter. It has been one of the possible reasons
    given for North Korea agreement to suspend nuclear and missile tests. (Fortune)
  - A flaw, called the "Ghost in the Locks" exploit, is reported with hotel keycard
    systems created by the Swedish lock company Assa Abloy. The company states that
    they began deploying a patch in February. (BBC)
  - The European Space Agency releases the largest-ever 3D map of stars in our galaxy
    from the Gaia spacecraft. (Le Monde)
  - Astronomers detect light from 14 colliding galaxies. Due to the distances involved,
    the light comes from events which occurred around 12 billion years ago. (BBC)
  Sports:
  - 2018 CONCACAF Champions League Finals
  - C.D. Guadalajara wins the Champions League title, their first since 1962, by winning
    in a penalty shootout over Toronto FC. (Washington Post)
