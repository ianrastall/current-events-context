Date: '2018-04-26'
Source_URI: Portal:Current events/2018 April 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - The United Nations reports the discovery of five "likely" mass graves in Blukwa
    Centre and Maze/Waliba in Ituri, Democratic Republic of Congo. (News24)
  Arts and culture:
  - Cinema of Saudi Arabia
  - Three 4DX locations are expected to open in Riyadh and other major Saudi Arabia
    cities. (Arabian Business)
  - Harvey Weinstein sexual abuse allegations
  - American actor Brad Pitt announces that he will produce a film about the allegations
    of sexual misconduct against American film producer Harvey Weinstein. (Firstpost)
    (People)
  Business and economy:
  - Erin Energy, a Texas company specialising in African offshore oil deposits with
    licences to explore off Nigeria, The Gambia, Ghana, and Kenya, files for bankruptcy
    protection. (Splash 24/7)
  Disasters and accidents:
  - An explosion occurs in the Husky Oil Refinery in Superior, Wisconsin. Five people
    are reportedly injured. Local residents have been ordered to evacuate. (mix108)
  - Thirteen children are killed after their school bus collides with a train in the
    Uttar Pradesh, India. (BBC)
  - Flash floods strike a class hiking trip in the Nahal Tzafit riverbed in the Dead
    Sea, Israel. Nine children are killed and another is reported missing. (The Times
    of Israel)
  - The Transportation Safety Board of Canada concludes pilot disorientation was the
    most likely cause of a plane crash that killed former Premier of Alberta Jim Prentice
    and three others. The TSB asks Transport Canada to mandate cockpit voice recorders
    and flight data recorders on all commercial and private business aircraft. (CBC)
  - Disasters in Indonesia
  - The death toll from yesterday's oil well explosion and fire in Pasir Putih, Aceh,
    Indonesia, reaches 22. (Star Tribune)
  International relations:
  - United States and weapons of mass destruction
  - The United States Air Force tests a Minuteman III intercontinental ballistic missile
    from Vandenberg Air Force Base in California. The missile test is considered to
    be successful. (Business Times)
  - Iran–Israel relations
  - Israel foreign minister Avigdor Lieberman warns that the country will hit Tehran
    if Iran attacks Tel Aviv. (Reuters)
  - South Korea–United States relations
  - South Korea and the United States suspend their Foal Eagle military exercises.
    Furthermore, they also finish parts of the Key Resolve exercises. (UPI)
  - United Kingdom–United States relations
  - U.S. President Donald Trump announces that he will visit the United Kingdom on
    July 13. (Sky News)
  Law and crime:
  - Corruption in Spain
  - Former President of the Community of Madrid, ex-Mayor of Madrid and ex-Minister
    of Justice Alberto Ruiz Gallardón is imputed by his role in Lezo Operation corruption
    scandal. (El País)
  - Bill Cosby sexual assault case
  - Bill Cosby is found guilty of three counts in regard to an aggravated sexual assault
    of a woman in 2004 in a retrial. He faces a maximum sentence of ten years imprisonment
    and a fine of up to $25,000 on each count. (NBC News)
  - Terrorism in Israel
  - Ali Abu Hassan, a Hebron University student from Palestine, is convicted of planning
    a terror attack against light rail in Jerusalem using pipe bombs containing nails
    coated in rat poison. He is found guilty of attempted murder, manufacturing weapons,
    and an immigration offence. (The Times of Israel)
  - Far-right terrorism in the United Kingdom
  - Five alleged members of British neo-Nazi group National Action go on trial in
    Birmingham charged with inciting racial hatred at Aston University. National Action
    is a banned terror group. (BBC) (The St. Helens Star)
  - La Manada sexual abuse case
  - A court in Pamplona, Spain, convicts a group of five men on charges of sexual
    abuse at the festival of San Fermín in 2016, clearing them of charges of gang
    rape. (ABC Online)
  - Thousands of people throughout Spain protest the court's verdict. (The Guardian)
  Politics and elections:
  - Mueller special counsel investigation
  - In the United States, the Senate Judiciary Committee votes on a bill to protect
    Special Counsel Robert Mueller. The bill passes 14–7. (The Miami Herald)
  - Political appointments by Donald Trump
  - Ronny Jackson withdraws as nominee for United States Secretary of Veterans Affairs.
    (NPR)
  - The United States Senate votes 57–42 to confirm former CIA Director Mike Pompeo
    as Secretary of State. (BBC)
  - United States Ambassadors appointed by Donald Trump, Germany–United States relations
  - Richard Grenell is confirmed as the U.S. ambassador to Germany. (The Local)
  Sports:
  - 2018 NFL season
  - In American football, the National Football League starts its draft for the 2018
    season, with the Cleveland Browns selecting Baker Mayfield with the first overall
    pick. (NFL)
