Date: '2018-04-14'
Source_URI: Portal:Current events/2018 April 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - 2018 bombing of Damascus and Homs
  - The United States, France, and the United Kingdom target chemical weapon sites
    and other Syrian military sites with missile strikes on early Saturday morning
    Syrian time (EET), in response to the Douma chemical attack. (The Washington Post)
    (BBC)
  - Russia calls for an emergency meeting of the United Nations Security Council as
    it considers supplying S-300 missile systems to Syria. (Reuters)
  - 2018 Gaza border protests
  - An explosion near the Israel–Gaza border fence kills at least four Palestinians.
    Hamas says terrorists from Islamic Jihad were killed. Locals claim the explosion
    was from the Israeli Defence Forces shelling Hamas. Israel denies any involvement.
    (The Times of Israel)
  - The Palestinian Authority says an Egyptian delegation presently visiting Gaza
    City has asked Hamas to call off the Great March of Return. (The Times of Israel)
  - Israeli forces shoot and wound a Palestinian near Khan Younis. Local medical personnel
    report he has a bullet lodged in his head. (wafa)
  - Palestine Liberation Organization Executive Committee Member Hanan Ashrawi calls
    for international intervention to "protect Palestinians". (wafa)
  - War in Afghanistan (2001–present)
  - The Taliban destroy an electricity pylon in Doshe, Baghlan, Afghanistan, overnight.
    The pylon carries imported power from Tajikistan and Uzbekistan, and its destruction
    causes widespread blackouts across several provinces and in capital Kabul. (Tolo
    News)
  - An explosion strikes a major weapons depot linked to Hezbollah and Iran in Mount
    Azzan, near Aleppo, Syria. Local media and Sky News reports an unidentified jet
    attacked the site, possibly as part of Western coalition airstrikes in the region,
    but al-Mayadeen denies any airstrike happened and said controlled explosions were
    carried out at the site yesterday. (The Times of Israel)
  - Terrorism in Egypt
  - The Egyptian military says 14 terrorists attacked a Sinai military base today,
    with four of them blowing themselves up and killing eight soldiers. (Egypt Today)
  - Yemen accuses Iran of arming Houthi rebels with drones in violation of United
    Nations sanctions to allow the militants to launch attacks on Saudi Arabia. Iran
    supports the Houthis but denies arming them. (The Daily Star)
  - A civilian vehicle hits an unexploded landmine in Arsal, Lebanon. Three occupants
    die. (The Daily Star)
  Disasters and accidents:
  - A storm blasts central US with heavy snow, winds, and hail, forcing flight cancellations,
    creating treacherous road conditions and killing at least three people. (ABC News)
  - The US Navy concludes its investigation into the October crash of a T-45C Goshawk
    military training jet in Tennessee that killed both on board, concluding pilot
    error caused the accident. (Navy Times)
  Law and crime:
  - The Court of Cassation in Egypt upholds life sentences for three Muslim Brotherhood
    leaders including Mohamed Badie and five-year terms for fourteen others. (The
    Daily Star)
  - Terrorism in Iraq
  - The Islamic State ambushes a member of al-Hashd al-Shaabi on Neft Khana road,
    near Khanqeen, northeast of Baquba, Iraq. The militants execute him. (Iraqi News)
  Politics and elections:
  - UK Independence Party leadership election, 2018
  - Gerard Batten is elected unopposed as the leader of the UK Independence Party,
    having been interim leader of the party since previous leader Henry Bolton was
    overthrown in a vote of no confidence in February. (Sky News)
  Science and technology:
  - March for Science 2018
  - A second March for Science is held with various rallies happening internationally.
    (Mother Jones)
  Sports:
  - 2018 NBA Playoffs
  - The first round of the 2018 NBA Playoffs begins. (Yahoo! Sports)
