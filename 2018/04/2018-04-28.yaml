Date: '2018-04-28'
Source_URI: Portal:Current events/2018 April 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Israel launches airstrikes on Hamas ships in Gaza's port and a Hamas building
    in Deir al-Balah in response to the ongoing, and sometimes violent, protests.
    (Ynetnews)
  - Protestor Azzam Aweida, 15, dies of injuries sustained when the Israeli Defence
    Forces shot him yesterday. (The New York Post)
  - Egypt opens the Rafah Crossing into the Gaza Strip for three days, saying it is
    to be used by students, those requiring medical assistance, and people with permits
    to enter Egypt. (Haaretz)
  - War in Afghanistan (2001–2021)
  - A car bomb targeting a military base in the Nadali District of Helmand, Afghanistan,
    kills six including two soldiers. (CNN)
  - A suicide bombing in a restaurant in Galkayo, Somalia, kills three military officials
    and two soldiers. Eight more people are injured, some critically. al-Shabaab claims
    responsibility. (CNN)
  - Hamas accuses the Palestinian Authority of performing a bombing against its own
    Prime Minister, Rami Hamdallah. Hamdallah escaped injury when his convoy was bombed
    during a visit to the Hamas-controlled Gaza Strip last month. (Middle East Eye)
  Arts and culture:
  - Art forgery
  - 82 paintings at a museum dedicated to Étienne Terrus in Elne, France, are revealed
    as forgeries. (BBC)
  - Cardinal Angelo Amato, acting on behalf of Pope Francis, beatifies Hanna Chrzanowska
    in Kraków, Poland. Chrzanowska dedicated her life to helping the sick and homeless
    and had worked with Cardinal Karol Wojtyła, who led her funeral services before
    he became Pope John Paul II. (Radio Poland)
  - Bone remains of more than 140 children and about 200 young llamas were found in
    the Peruvian city of Trujillo, near the Chan Chan citadel, according to a National
    Geographic publication. This discovery, which would date from the time of the
    little-known Chimú pre-Columbian civilization (about 550 years ago), would be,
    for researchers, the largest mass sacrifice of children in the American continent.
    (El Comercio) (National Geographic)
  - A statue honouring comfort women, sex slaves raped by Japanese World War II soldiers,
    in Manila, Philippines, is removed less than five months after it was installed.
    (Xinhua)
  Disasters and accidents:
  - A communal toilet collapses in Bhandup, Mumbai, India. Several people are trapped
    and require rescue, with two dying en route to hospital. (First Post)
  International relations:
  - Sanctions against North Korea
  - Australia and Canada deploy surveillance aircraft to Japan to monitor ship-to-ship
    transfers between North Korean vessels that bypass United Nations sanctions. The
    aircraft join a warship already deployed by the United Kingdom. (CBC)
  - Panmunjom Declaration, South Korea–United States relations
  - United States Defense Secretary James Mattis and South Korea Defense Minister
    Song Young-moo say they are committed to "a diplomatic resolution that achieves
    complete, verifiable and irreversible denuclearization" of North Korea, according
    to a Pentagon spokesperson. Mattis repeats the United States' "ironclad" commitment
    to defend its ally South Korea "using the full spectrum of U.S. capabilities."
    (CBS News)
  Law and crime:
  - A judge in the U.S. state of Oklahoma dismisses charges against seven detainees
    over a prison riot that killed four at Cimarron Correctional Facility in 2015.
    (Stillwater News Press)
  - Worthing Magistrates Court fines the Church of Scientology £14,000 and orders
    it to pay £2,566 in costs for polluting the River Medway in West Sussex, England,
    with raw sewage. (The Independent)
  - Terrorism in Iran
  - An Iranian Revolutionary Court begins a trial of eight alleged Islamic State members
    accused of involvement in gun and suicide bomb attacks that killed eighteen in
    Tehran. (Reuters)
