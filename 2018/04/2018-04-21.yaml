Date: '2018-04-21'
Source_URI: Portal:Current events/2018 April 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Ambassador to the United Nations for Palestine Riyad Mansour says diplomats will
    ask the UN to probe the violence. (The Washington Post)
  - Syrian Civil War
  - The Organisation for the Prohibition of Chemical Weapons takes samples from the
    site of a chemical weapons attack in Douma, Syria. (The Independent)
  - Rebels in Qalamoun begin to evacuate after agreeing to surrender the region to
    Syria's government. (Al Jazeera)
  - Sweden hosts the United Nations Security Council in Backåkra where the Syrian
    conflict is discussed by diplomats at a rare meeting outside the UN's New York
    headquarters. (BBC News)
  - Yemeni Crisis (2011–present)
  - An International Committee of the Red Cross aid worker is shot dead in Taizz Governorate,
    Yemen. The United Nations condemns the attack. (Relief Web)
  - Yemeni Vice President Lt. Gen Ali Mohsen Saleh says a plot to overthrow the internationally
    recognised government by Iran and Houthi rebels has been foiled. (Arab News)
  - War in Afghanistan (2001–present)
  - April 2018 Kabul suicide bombing
  - A bomb explodes in a voter registration centre in Kabul killing at least 30 people
    and injuring approximately 50. Islamic State in Iraq and the Levant claim responsibility.
    (CNN)
  Arts and culture:
  - Nabi Tajima, the world's oldest person, dies at age 117 in southern Japan. (USA
    Today)
  Business and economy:
  - German manufacturer Bavaria Yachtbau is expected to collapse into administration.
    (Yachting Monthly)
  - Irish firm Smyths Toys agrees to buy 93 Toys R Us stores in Germany, Austria,
    and Switzerland plus four related online shops. (WOWK TV)
  International relations:
  - Japan–North Korea relations
  - Japanese Prime Minister Shinzō Abe praises North Korea's statement that it would
    suspend nuclear and missile tests, but he also states the results must lead to
    verifiable denuclearization. (Reuters)
  - Libya–Tunisia relations
  - Tunisia reopens its embassy in Tripoli, Libya. The embassy has been closed since
    the kidnap of ten staff in 2015. (The Libyan Express)
  - Hamas says Palestinian engineer Fadi al-Batsh, shot dead on his way to a mosque
    in Kuala Lumpur, Malaysia, today, was an important member. Hamas does not ascribe
    responsibility for the killing but the victim's relatives allege Israeli involvement.
    Israeli Education Minister Naftali Bennett calls al-Batsh a terrorist and says
    no burial will be permitted in Gaza. (WOWK TV) (Israel National News)
  - The United Arab Emirates says Qatari jet fighters intercepted a passenger plane
    heading to Bahrain and flew dangerously close to it. (Arab News)
  Law and crime:
  - Terrorism in Australia
  - Police in Sydney, New South Wales, Australia, charge a man with several crimes
    under the Terrorism High Risk Offenders Act. (The Guardian)
  - 2014–2018 Nicaraguan protests
  - Ten people are killed in Nicaragua as anti-government protests over pension reforms
    enter their fourth day. (BBC News)
  - Police in Mahikeng, Northwest Province, South Africa, fire rubber bullets as protestors
    against corruption and public service provision riot. President Cyril Ramaphosa
    leaves a Commonwealth summit in London to attend the scene. (The Guardian)
  - Indian lawmakers approve capital punishment for men who rape children under the
    age of 12. Prime Minister Narendra Modi signs the measure. (BBC News)
  - Libyan terrorists bomb an oil pipeline near Mrada, causing an explosion and fire.
    The same pipeline was previously attacked in December. (Xinhua)
  - Opposition demonstrations in Antananarivo, Madagascar, turn violent. Prime Minister
    Olivier Mahafaly Solonandrasana says one died and seventeen were injured but opposition
    Parliamentarian Hanitra Razafimanantsoa, who supports ex-President Marc Ravalomanana,
    says two were shot dead and two babies at a nearby hospital killed by tear gas.
    (Xinhua)
  Politics and elections:
  - Donald Trump presidential campaign, 2020
  - Mitt Romney says that he won't commit to supporting U.S. President Donald Trump
    in the 2020 presidential election. (The Hill)
  - Presidency of Donald Trump
  - Donald Trump is considering a posthumous pardon for Jack Johnson. (The Washington
    Post)
  - Welsh First Minister Carwyn Jones announces his plans to step down this autumn.
    (BBC News)
  Sports:
  - 2017–18 NBA season
  - 2017–18 Milwaukee Bucks season
  - The Milwaukee Bucks announces Green Bay Packers quarterback Aaron Rodgers will
    be a part owner of the franchise. (Bleacher Report)
  - 2018 NBA Playoffs
  - The New Orleans Pelicans became the first No. 6 seed (or lower) to sweep its first-round
    series since the NBA switched from its best-of-five format in 2003 after their
    131–123 game 4 win over the Portland Trail Blazers. Anthony Davis scored 47 points
    and Jrue Holiday 41 points during the win. (USA Today) (UPRX)
