Date: '2018-04-01'
Source_URI: Portal:Current events/2018 April 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016–18 Kashmir unrest
  - Clashes in South Kashmir, India, kill two civilians, three soldiers, and 13 militants.
    (The Times of India)
  - 2018 Gaza border protests
  - The Israeli Government rejects calls for an inquiry, with Prime Minister Benjamin
    Netanyahu likening criticism by Turkish President Recep Tayyip Erdogan to an April
    Fool's Day joke. (The Telegraph)
  - Pope Francis uses his Easter address to call for peace between the peoples of
    Israel and Palestine in response to the clashes. (The Guardian)
  - Syrian Civil War
  - Rebel fighters start evacuating from Douma, Eastern Ghouta, Syria, and head to
    Idlib Governorate on government buses. Douma is the last rebel stronghold in Eastern
    Ghouta. (The Washington Post)
  - Guatemalan Civil War
  - The trial of Guatemalan ex-ruler Efraín Ríos Montt, accused of genocide during
    the civil war in the 1980s, ends abruptly with the defendant's death. (BBC)
  Business and economy:
  - Bahraini state media reports the discovery of the nation's largest known deposit
    of oil and gas in an offshore field. (Bloomberg)
  - Iraq's Oil Ministry brings forward the proposed date for awarding oil exploration
    contracts for new fields offshore and near the Iranian and Kuwaiti borders to
    April 15. (CNBC)
  Disasters and accidents:
  - 2018 Kemerovo fire
  - Governor Aman Tuleyev of Russia's Kemerovo Oblast resigns over the disaster last
    week at the Winter Cherry complex. Tuleyev himself lost a young relative in the
    fire, but had faced protests in the aftermath. (The Guardian)
  - Football matches across Russia are marked with silence from fans throughout the
    first half to commemorate the dead. (BBC)
  - History of autonomous cars
  - The US National Transportation Safety Board criticizes Tesla over the carmaker's
    release of investigative information regarding the fatal crash of a Model X in
    California. (The Washington Post)
  - Two buses collide head-on in Kuwait, killing fifteen oil workers from India, Egypt,
    and Pakistan. Six people are injured. (The National)
  - Water shortages caused by a burst pipe in Thessaloniki, Greece, enter a fifth
    day. (eKathimerini)
  - A bus crash in Slanic Prahova, Romania, injures 23 Israeli tourists. (The Times
    of Israel)
  - A KLM Boeing 777 flying from Atlanta, Georgia, to Amsterdam, Netherlands, encounters
    severe turbulence over the Atlantic Ocean causing injuries to four occupants.
    (The Aviation Herald)
  International relations:
  - South Korea–United States relations
  - The governments of the United States and South Korea begin their Foal Eagle and
    Key Resolve military drills. (New Indian Express)
  - Indian Minister of State for External Affairs V. K. Singh travels to Iraq to reclaim
    the bodies of 38 workers abducted in Mosul by ISIL in 2016 after they were found
    in a mass grave near Badush last month. (Iraqi News)
  - Reactions to the poisoning of Sergei and Yulia Skripal
  - The Embassy of Russia in London releases a list of 14 questions over the attack,
    including a question on possible French involvement. (Sky News)
  - An Ilyushin Il-76 jet carrying Russian diplomats and their families who were expelled
    from the United States as a reaction to the poisoning arrives at Moscow's Vnukovo
    Airport. (Sky News)
  - In an interview, Russian Ambassador to the United Kingdom Alexander Yakovenko
    calls the poisoning a provocation and states that the Russian government suspects
    British intelligence agencies of being behind the incident. (RT), (Daily Star),
    (TASS)
  - Foreign relations of Zambia
  - Zambian President Edgar Lungu requests that Cuba recall its ambassador, Nelson
    Pages Vilas, for allegedly expressing support for a new opposition party. (News24)
  Law and crime:
  - In response to the suicide of a student, protestors attack Crossroads Higher Secondary
    School in Pampady, India, and clash with police. (Gulf News)
  - Hart family crash
  - California Highway Patrol says a crash that left five dead and three children
    missing after a car fell off a cliff into the sea may have been intentional. (NBC
    News)
  - An overnight prison riot kills seven police officers in Amatlán de los Reyes,
    Veracruz, Mexico. (BBC)
  Politics and elections:
  - Politics of Botswana
  - Botswanan President Ian Khama retires from office. Mokgweetsi Masisi is inaugurated
    as the fifth President of Botswana. (Africa News), (Reuters)
  - Costa Rican general election, 2018, Recognition of same-sex unions in Costa Rica
  - Pro-same-sex marriage candidate Carlos Alvarado of the Citizens' Action Party
    defeats conservative candidate Fabricio Alvarado of the National Restoration Party
    in the second round of voting to become the new President of Costa Rica. (BBC)
  - Politics of the Gambia, ECOWAS military intervention in the Gambia, 2016–17 Gambian
    constitutional crisis
  - The new government of the Gambia accuses ex-President Yahya Jammeh's supporters
    of assisting and sheltering foreign militants (the Movement of Democratic Forces
    of Casamance). (The Guardian)
  - Politics of San Marino
  - Matteo Ciacci of Civic 10 and Stefano Palmieri of Future Republic take office
    as the Captains Regent of San Marino. (SMTV San Marino)
  Sports:
  - 2018 Commonwealth Games
  - The Commonwealth Games Federation places India under formal investigation for
    doping. (TVNZ)
  - 2018 NCAA Division I Women's Basketball Tournament
  - Notre Dame wins the 2018 NCAA Tournament over Mississippi State 61–58, with the
    deciding points coming on a dramatic 3-point shot by Arike Ogunbowale just before
    the final buzzer. (ESPN)
