Date: '2018-04-24'
Source_URI: Portal:Current events/2018 April 24
Intelligence_Payload:
  Uncategorized:
  - 2018 Gaza border protests
  - The Israel Defense Forces detain two alleged terrorists attempting to cross the
    Gaza border into Israeli territory armed with a knife and a grenade. (Israel National
    News)
  - West Wind Aviation Flight 280
  - The Transportation Safety Board of Canada reports the aircraft departed with ice
    on it before losing height shortly after takeoff. The December 17 crash killed
    one and injured fifteen. (The Aviation Herald)
  - A United States F-16C fighter jet crashes during a landing attempt at Lake Havasu
    City Municipal Airport, Lake Havasu City, Arizona. The pilot escapes via ejection
    and is hospitalised. (ABC11)
  - 2018 North Korea–United States summit
  - Thailand expresses its interest in hosting the planned summit meeting between
    U.S. President Donald Trump and North Korean leader Kim Jong-un. (ABC News)
  - France–United States relations
  - Donald Trump meets with French president Emmanuel Macron to discuss the Iran nuclear
    deal along with economics and trading. (i24) (USA Today)
  - United States energy developer Invenergy files for arbitration against Poland
    with the United Nations Commission on International Trade Law over a dispute following
    construction of four wind power projects in the country. Invenergy claims Polish
    authorities are ignoring binding rulings by local courts. (Wind Power Monthly)
  - 2018 Toronto van attack
  - Alek Minassian appears in court in Toronto charged with ten murders and thirteen
    attempted murders. (BBC)
  - Yahoo! data breaches
  - The U.S. Securities and Exchange Commission fines Altaba for failing to disclose
    its 2014 data breach in a timely manner. (CNET)
  - Crime in Italy
  - Italian police arrest a Bosnian driver driving a van loaded with weapons bound
    for Barcelona. (The New York Times)
  - The United States Supreme Court rejects a case brought by foreign nationals under
    the Alien Tort Statute attempting to sue the Arab Bank over terror attacks in
    Israel. (USA Today)
  - A former MP from Poland's Samoobrona party is charged with spying for Russia and
    China. (Radio Poland)
  - Crime in Texas
  - Three people are shot and critically wounded, two of them Dallas Police officers
    and the other a security guard, at a Home Depot in Dallas, Texas. The suspected
    shooter, who was also attempting to shoplift merchandise, was arrested soon after.
    One of the police officers died from his injuries the next day. (CBS News) (ABC
    News)
  - In Lima, Peru, a 36-year-old man gets on a public transport bus and sets fire
    to the passengers, after spraying them with gasoline, leaving 10 people injured.
    The most affected, a 22-year-old young woman, was seriously injured and believed
    to be the target of the attack. (Panamericana Televsión) (Diario Correo)
  - An alleged arson attack kills 18 in a karaoke lounge in Qingyuan, China. A suspect
    is arrested. (The Guardian)
  - Atmosphere of Uranus
  - Scientists using infrared spectroscopy data from the Gemini North telescope have
    established the presence of hydrogen sulfide in the clouds of Uranus. (Time)
