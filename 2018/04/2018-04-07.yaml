Date: '2018-04-07'
Source_URI: Portal:Current events/2018 April 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Israeli troops shoot dead ten Palestinians near the Israel–Gaza barrier, including
    a Palestinian journalist, as protests continue. (BBC)
  - A funeral is held for journalist Yasser Murtaja, shot at the fence wearing a press
    jacket covering tyre burnings by protestors yesterday. Israel denies targeting
    journalists intentionally and says it is investigating. (The Guardian)
  - Israeli Prime Minister Benjamin Netanyahu and Defence Minister Avigdor Liberman
    both praise the military response, with Liberman accusing Murtaja of "putting
    himself in danger" by operating a drone. (The Times of Israel)
  - 2018 Münster vehicle ramming
  - A man drives a van into a group of people in Münster, Germany, killing two and
    injuring 30. The driver then shoots and kills himself. (Express) (CNN)
  - Terrorism in India
  - Local authorities in Goa, India, issue a terror alert for the West Coast for fishing
    vessels, resorts, barges, and offshore casinos. The alert states a fishing vessel
    may be used to launch a terrorist attack. The Ports Minister states that Pakistan
    has seized an Indian fishing vessel in connection with the alleged plot. (The
    Financial Express)
  - Terrorism in the United Kingdom
  - Metropolitan Police arrest a suspected terrorist at Gatwick Airport after he arrives
    on a flight from Morocco. (BBC)
  - Cyberattacks on Iran
  - The Ministry of Information and Communications Technology of Iran says hackers
    attacked its networks, leaving an image of US flags on screens. A researcher at
    Cisco's Talos security group acknowledges "several incidents in multiple countries"
    involving the use of their Smart Install protocol. (Reuters)
  - Syrian Civil War
  - 2018 Douma chemical weapons attack
  - Dozens of people in the Syrian city of Douma are reported killed in an apparent
    chemical weapons attack. (The Washington Post)
  Disasters and accidents:
  - A fire breaks out at the 50th floor of the New York Trump Tower, killing one resident
    and injuring four firefighters. According to the New York City Fire Department,
    the building had no sprinklers. (BBC) (The Sydney Morning Herald)
  - A military helicopter crashes in Fort Campbell, Kentucky, United States kills
    both pilots. (CNN)
  - List of shipwrecks in 2018
  - MV Vitaspirit, a 225-meter cargo ship, crashes into a 200-year-old historic coastal
    mansion on the outskirts of Istanbul, Turkey after an engine failure during a
    voyage from Russia to Saudi Arabia. (Hurriyet Daily News)
  International relations:
  - 2018 North Korea–United States summit
  - Several administration officials say the governments of the United States and
    North Korea have begun secret, direct talks with each other. (CNN)
  - Japan activates a 2,100-member Amphibious Rapid Deployment Brigade, its first
    marine force since World War II. (Reuters)
  Law and crime:
  - Former Brazilian President Luiz Inácio Lula da Silva gives a public address alongside
    his impeached successor Dilma Rousseff in São Bernardo do Campo, saying he will
    comply with an arrest warrant and begin a 12-year term for corruption after two
    failed appeals to have the warrant withdrawn. He maintains his innocence. (BBC)
  - Terrorism in Iraq
  - Iraqi security services announce the arrests of 20 suspected Islamic State militants
    in raids in Nineveh. (Iraq News)
  Politics and elections:
  - Brenna Spencer, a female supporter of Donald Trump, goes viral after carrying
    a handgun in her pants while taking a photo. (Yahoo! News)
  Sport:
  - 2017–18 Bundesliga
  - Football team FC Bayern Munich win the competition. It is their sixth title in
    a row and their 28th German title overall. (AFP via Yahoo! Sport)
