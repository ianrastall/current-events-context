Date: '2018-12-16'
Source_URI: Portal:Current events/2018 December 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Strasbourg attack
  - A Polish national who was wounded during a terrorist attack in Strasbourg, France,
    dies of his injuries, raising the death toll to five. (BBC)
  - Tulare County shootings
  - A gunman kills two people and wounds seven others in a shooting spree across Tulare
    County, California. The gunman is identified as an undocumented immigrant. (The
    Washington Post)
  Disasters and accidents:
  - A gas blast in a restaurant in Sapporo, Japan, injures 42 people. (BBC)
  - A bus crash in Zurich, Switzerland, kills one person and injures 44 others. (Tgcom24)
  Politics and elections:
  - 2018 Sri Lankan constitutional crisis
  - Ranil Wickremesinghe is sworn in as Prime Minister of Sri Lanka. (Reuters)
  - Georgian presidential election, 2018
  - Salome Zurabishvili takes office as President of Georgia. Zurabishvili is the
    first woman in office and the last president to be elected by popular vote. (Deutsche
    Welle)
  Sports:
  - 2018 Men's Hockey World Cup
  - In field hockey, Belgium wins the title, defeating the Netherlands 3–2 in a sudden
    death shootout. After regular playing time, the score was 0–0. (Times of India)
