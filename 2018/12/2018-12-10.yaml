Date: '2018-12-10'
Source_URI: Portal:Current events/2018 December 10
Intelligence_Payload:
  Business and economy:
  - The Governor of the Reserve Bank of India, Urjit Patel, resigns abruptly. (Reuters)
  International relations:
  - Brexit
  - The Court of Justice of the European Union rules that an EU member state's invocation
    of Article 50 TEU is unilaterally revokable. (BBC)
  - Prime Minister Theresa May announces the deferral of the meaningful vote on the
    UK's negotiated withdrawal agreement from the European Union that was scheduled
    for tomorrow. (BBC)
  - 164 countries adopt the non-binding Global Compact for Safe, Orderly and Regular
    Migration in Marrakech, Morocco. (UPI)
  Law and crime:
  - Death of Grace Millane
  - New Zealand Prime Minister Jacinda Ardern makes a public apology to the family
    of Grace Millane, who was murdered in Auckland on 1 or 2 December 2018, saying
    that "your daughter should have been safe here". (The Guardian)
  - Thirty-three people are hospitalized in Pavia, Lombardy, Italy, after pepper spray
    was fired inside the gym of a school. This is the second pepper spray-related
    incident in the country in three days. On 8 December, six people died when someone
    fired the spray inside a nightclub, causing a stampede. (Il Messaggero)
  - Russian serial killer and former policeman Mikhail Popkov is convicted of an additional
    56 murders between 1992 and 2007. All of his victims were women. (Sky News)
  - Russell Bishop is convicted of the murder of Karen Hadaway and Nicola Fellows.
    He had been tried and found not guilty of the crimes in 1987, but the acquittal
    was quashed as new evidence in the form of DNA was now available. Bishop had been
    convicted in December 1990 of the abduction, indecent assault and attempted murder
    of a seven-year-old girl in February of that year. (The Guardian)
  - Nissan, the company's former chairman Carlos Ghosn, and an aide are indicted on
    charges that Ghosn underreported about ¥5 billion ($44.5 million) of his income.
    Ghosn's arrest warrant is renewed. (Kyodo News)
  - Former Guantanamo Bay detainee Omar Khadr asks for a Canadian passport to travel
    to Saudi Arabia and speak with his sister Zaynab Khadr. (CBC CA) (Calgary Herald)
  Politics and elections:
  - Yellow vests movement
  - French President Emmanuel Macron addresses the country following the yellow vests
    protests. While refusing to reinstate a wealth tax or back down on the current
    reform agenda, he promises an increase to the minimum wage and to remove some
    taxes on low income earners. (Reuters)
  - 2018 Armenian parliamentary election
  - Acting Prime Minister Nikol Pashinyan's My Step Alliance bloc wins 70.4% of the
    vote. (Armenpress) (Reuters)
  Science and technology:
  - NASA announces that Voyager 2 entered into the interstellar medium after exiting
    the heliosphere on November 5. (NASA)
