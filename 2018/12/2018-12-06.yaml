Date: '2018-12-06'
Source_URI: Portal:Current events/2018 December 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - A car bomb explodes near a police post in Chabahar, Iran. Two police officers
    are pronounced dead and around 40 people were wounded in the attack. Islamic militant
    group Ansar Al-Furqan claims responsibility. Iran accuses the perpetrators of
    being "foreign-backed terrorists". (Middle East Eye)
  Arts and culture:
  - The Game Awards 2018
  - God of War is named Game of the Year at The Game Awards annual awards ceremony
    in Los Angeles. (The Telegraph)
  Disasters and accidents:
  - Two U.S. Marine aircraft from Iwakuni air base crash off the coast of Shikoku,
    Japan, during a mid-air refueling. One serviceman is rescued by Japan's Maritime
    Self-Defense Force, while one is found dead and five are still reported missing.
    (The Japan Times)
  International relations:
  - A U.S.-sponsored resolution to condemn Hamas fails to get adopted at the United
    Nations General Assembly. (AP via Minneapolis Star Tribune)
  Law and crime:
  - The Chinese Ministry of Foreign Affairs demands that Canada and the United States
    clarify the reasons behind the arrest of Huawei CFO Meng Wanzhou, also asking
    for her immediate release. (The Guardian)
  - December 2018 Time Warner Center bomb threats
  - CNN evacuates the Time Warner Center in New York City during CNN Tonight with
    Don Lemon after a bomb threat was called into the building. (CNN) (Variety)
  Politics and elections:
  - Afghan parliamentary election, 2018
  - Afghanistan’s Electoral Complaints Commission declares all votes cast in Kabul
    Province to be invalid due to voter fraud and other cases of mismanagement. (Reuters)
  - Death and state funeral of George H. W. Bush
  - Former U.S. President George H. W. Bush is laid to rest at his Presidential Library
    in College Station, Texas. (NBC News)
  - Yellow vests movement
  - The French police union Vigi calls on police officers to begin an indefinite strike
    on December 8 and join anti-government protesters, noting that "a majority of
    the French continue to back the movement". (Sputnik News)
  - Major landmarks such as the Eiffel Tower and the Louvre are to shut down amid
    expected protests this weekend. (The Guardian)
