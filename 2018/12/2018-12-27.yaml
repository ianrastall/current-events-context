Date: '2018-12-27'
Source_URI: Portal:Current events/2018 December 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Street battles between anti-government protesters and riot police in Sudan leave
    at least 19 people dead, including two policemen, as well as hundreds injured.
    Amnesty International puts the death toll at 37. (Al Jazeera)
  Arts and culture:
  - Richard Arvin Overton, the oldest U.S. veteran from World War II, as well as the
    oldest American man, dies at age 112. (Newsweek), (CNN)
  - Argentina lifts a travel ban on Canadian singer Justin Bieber, who had been previously
    banned from the country for his role in the beating of a photographer in November
    2013. A Document of Resolution was signed last week, officially ending Bieber's
    ban, so Bieber may now freely return to the country. (Daily Mail)
  Disasters and accidents:
  - The New York City sky lights up in blue after a transformer in Astoria, Queens,
    explodes. (The Guardian), (NBC New York)
  International relations:
  - Iraq–United States relations
  - Iraqi politicians from both parliamentary blocs in the Council of Representatives
    of Iraq demand the withdrawal of U.S. forces from the country, following U.S.
    President Donald Trump's unannounced visit to troops stationed at Al Asad Airbase.
    An extraordinary session to debate the matter is planned. (The Guardian)
  - Foreign relations of the Democratic Republic of the Congo
  - The DRC government gives the European Union 48 hours to recall its envoy in the
    country after the EU imposed sanctions on 14 Congolese officials. (Vanguard News
    Nigeria)
  Law and crime:
  - Five Christian monks are tied up and then left injured, one of them seriously,
    after a robbery at a church in Vienna, Austria. (The Guardian)
  Science and technology:
  - The Chaos Computer Club holds their 35th Chaos Communication Congress, a hacker
    convention, in Leipzig, Germany. (Handelsblatt)
