Date: '2018-12-08'
Source_URI: Portal:Current events/2018 December 8
Intelligence_Payload:
  Disasters and accidents:
  - Corinaldo stampede
  - Six people are killed and dozens more injured in a human stampede as frantic concertgoers
    try to exit a packed Lanterna Azzurra club in Corinaldo in Ancona Province, Marche,
    Italy, after pepper spray is reportedly fired inside the club. (BBC)
  - Two buses crash head-on on a highway in Achacachi, Bolivia, leaving at least 17
    people dead and 10 injured. (New Zealand Herald)
  Politics and elections:
  - Presidency of Donald Trump
  - White House Chief of Staff John F. Kelly is set to resign by the end of the month
    according to U.S. President Donald Trump. (CNN)
  - President Trump announces his nomination of army general Mark A. Milley to succeed
    marine general Joseph Dunford as Chairman of the Joint Chiefs of Staff. (Reuters)
  - Yellow vests movement
  - 125,000 people demonstrate across France, according to the Minister of the Interior,
    with about 89,000 police officers on duty. 1,385 people are detained. Tear gas
    and pepper spray are used against the protesters and 135 people are injured. (Al
    Jazeera) (CBC)
  - Federal Government of Belgium
  - Prime Minister Charles Michel says that the New Flemish Alliance (N-VA) party
    quits the coalition. N-VA cites its disagreement over the signing of the United
    Nations Global Compact for Migration. Michel plans to continue with a minority
    cabinet until the next scheduled election. (Het Laatste Nieuws) (Channel NewsAsia)
  Science and technology:
  - The ULA launch of a Delta IV Heavy rocket carrying the NROL-71 mission is called
    off 7 seconds before liftoff time. (NBC San Diego) (NASA Spaceflight)
  Sports:
  - In its second season, Atlanta United FC wins the MLS Cup, defeating the Portland
    Timbers 2–0 in front of a record crowd of 73,019 at Mercedes-Benz Stadium in Atlanta,
    Georgia. (The Guardian)
