Date: '2018-12-04'
Source_URI: Portal:Current events/2018 December 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Operation Northern Shield
  - Israel announces an operation to clear Hezbollah tunnels from Lebanon-Israeli
    border. (The Times of Israel)
  Arts and culture:
  - Russians vote to rename the two main airports of Moscow, Sheremetyevo and Domodedovo,
    after poet Alexander Pushkin and scientist Mikhail Lomonosov, respectively. (TASS)
  Law and crime:
  - The alleged boss of the Cosa Nostra mafia clan is arrested along with 45 suspected
    accomplices in the province of Palermo, Italy. They are accused of aggravated
    extortion. (Euronews)
  Politics and elections:
  - Yellow vests movement
  - Following large protests against French President Emmanuel Macron's planned increases
    on fuel taxes, French Prime Minister Édouard Philippe announces that these plans
    will be suspended for at least six months. (Bloomberg)
  - Brexit negotiations
  - The Government of the United Kingdom is found to be in contempt of parliament
    for the first time in history. The motion, which passed by 311 to 293 votes in
    the House of Commons, was triggered by Theresa May's government failing to publish
    its legal advice on its Brexit withdrawal plan. (CNN)
  - Frank Scott Jr. is elected Mayor of Little Rock, Arkansas, defeating Baker Kurrus
    in the runoff. Scott will become the city's first African-American mayor. (USA
    Today)
  Sports:
  - NHL expansion
  - In ice hockey, the National Hockey League announces that its board of governors
    unanimously approved a new franchise for Seattle. The new team will start play
    in the 2021–22 season, bringing the league's membership to 32 teams. (ESPN)
