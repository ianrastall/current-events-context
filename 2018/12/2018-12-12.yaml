Date: '2018-12-12'
Source_URI: Portal:Current events/2018 December 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The Afghan National Army abandons the western Shib Koh District after the government
    failed to resupply troops stationed there. The district, which borders Iran, is
    now effectively under Taliban control. (Reuters)
  - The Taliban claims responsibility for a suicide bombing that killed 12 people,
    including 8 civilians in Kabul. (Tolo News)
  - Two police officers are injured after a man throws a grenade at them at a shopping
    centre in Nazran, Ingushetia, Russia. The attacker and his accomplice are later
    shot dead. (Xinhuanet)
  Arts and culture:
  - Pope Francis removes Australian prelate George Pell and Chilean prelate Francisco
    Javier Errázuriz Ossa from the Council of Cardinal Advisers. Both are accused
    of covering up child sexual abuse scandals. Former Archbishop of Kinshasa Laurent
    Monsengwo Pasinya also leaves the Council for unrelated reasons. (BBC)
  International relations:
  - North Korea–South Korea relations
  - Soldiers from North Korea and South Korea peacefully cross the Korean Demilitarized
    Zone for the first time since it was created in 1953. (CBS News)
  - United States–Venezuela relations
  - Venezuelan President Nicolás Maduro accuses United States National Security Advisor
    John R. Bolton of personally leading a plot to assassinate him, declining to provide
    evidence. (BBC)
  Law and crime:
  - Michael Cohen, the former lawyer of U.S. President Donald Trump, is sentenced
    to three years in prison for making illegal hush money payments to two women with
    whom Trump allegedly had affairs, and a concurrent sentence of two months for
    making false statements to Congress about a possible Trump Tower deal in Russia.
    (South China Morning Post)
  - Prosecutors in Goiás, Brazil request the preventive detention of medium João de
    Deus over more than 200 allegations of sexual abuse. João de Deus became internationally
    famous in 2013, when his controversial psychic healing methods were broadcast
    on Oprah Winfrey's show Oprah's Next Chapter. (Reuters)
  Politics and elections:
  - Politics of the United Kingdom, Future Conservative Party leadership election
  - By a vote of 200 to 117, British Prime Minister Theresa May survives a motion
    of no confidence within the Conservative Party. (BBC)
