Date: '2018-12-03'
Source_URI: Portal:Current events/2018 December 3
Intelligence_Payload:
  Business and economy:
  - Qatar announces that it is withdrawing from OPEC in January 2019, after almost
    60 years of membership, to focus on natural gas production. (The Guardian)
  Law and crime:
  - The FBI raids the house of Atlantic City Mayor Frank Gilliam. (The New York Times)
  Politics and elections:
  - Death and state funeral of George H. W. Bush
  - The body of former President George H. W. Bush arrives on Special Air Mission
    from Houston to Washington, DC at the Joint Base Andrews. (NBC News) (ABC News)
  - The United States Postal Service announces it will suspend regular mail deliveries,
    retail services and administrative office activity on December 5 as part of President
    Trump's declared national day of mourning. (CNN)
  - 2017-18 Spanish constitutional crisis
  - Jailed Catalan independentists leaders Joaquim Forn and Josep Rull joins Sànchez
    and Turull in the hunger strike. (Reuters)
  Science and technology:
  - 2018 in spaceflight
  - NASA's space probe OSIRIS-REx arrives at the asteroid Bennu. (The New York Times)
  - Soyuz MS-11 successfully launches from the Baikonur Cosmodrome in Kazakhstan carrying
    Roscosmos cosmonaut Oleg Kononenko, NASA astronaut Anne McClain, and CSA astronaut
    David Saint-Jacques for Expedition 58 to the International Space Station. (CBC)
  Sport:
  - 2018 Ballon d'Or
  - In association football, Croatian midfielder Luka Modrić wins the Ballon d'Or
    and becomes the first player other than Lionel Messi or Cristiano Ronaldo to win
    the award since Kaká in 2007. (Reuters)
  - Norwegian striker Ada Hegerberg wins the inaugural Women's Ballon d'Or. (The Guardian)
