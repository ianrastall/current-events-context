Date: '2018-12-05'
Source_URI: Portal:Current events/2018 December 5
Intelligence_Payload:
  Business and economy:
  - The deputy governor of Sweden's central bank, the Riksbank, says that the country
    is likely to become a cashless society within the next three to five years. (Reuters)
  Disasters and accidents:
  - Two people died while 18 others are injured when a tank truck caught fire and
    exploded in the city of Rieti, Italy. (Sky Tg24)
  - Tsunami waves reportedly strike parts of New Caledonia and northern Vanuatu following
    a magnitude 7.5 earthquake centered near the Loyalty Islands. (Australian Broadcasting
    Corporation)
  - A search and rescue operation is underway for 7 servicemen after an incident involving
    a US Marine Corp F/A-18 fighter jet and a KC-130 refueling aircraft off the coast
    of Japan. (BBC)
  Law and crime:
  - The chief financial officer of Huawei, Meng Wanzhou, was arrested on 1 December
    in Vancouver, Canada. She faces extradition to the United States. Huawei says
    she faces unspecified charges. (CNN)
  Politics and elections:
  - Claudia Sheinbaum takes office as Head of Government of Mexico City, becoming
    the first woman and first Jewish person to serve as Mexico City's mayor. (JTA)
  - Politics of Luxembourg
  - Xavier Bettel is sworn in for a second term as Prime Minister. His coalition government
    plans to make all public transport completely free by next summer, a world's first.
    (The Irish Times)
  - Death and state funeral of George H. W. Bush
  - The casket for former U.S. President George H. W. Bush arrives at the National
    Cathedral. (Politico)
  - U.S. President Donald Trump and former U.S. Presidents George W. Bush, Jimmy Carter,
    Barack Obama, and Bill Clinton attend the ceremony alongside German chancellor
    Angela Merkel and Britain's Prince Charles. (The Guardian)
  Science and technology:
  - SpaceX successfully launches CRS-16 on its way to the International Space Station.
    The first stage crashes into the ocean near Cape Canaveral and is later recovered.
    (Universe Today)
