Date: '2018-12-11'
Source_URI: Portal:Current events/2018 December 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Strasbourg attack
  - A gunman kills two people and injures 14 others in a mass shooting in Strasbourg,
    France, during the annual Christmas market. The shooter flees the scene but is
    identified by police as a known extremist. The incident is being treated as an
    act of terrorism. (BBC) (The Daily Telegraph) (The Guardian)
  Disasters and accidents:
  - Five U.S. Marines who were missing after two aircraft collided mid-air off the
    coast of Japan on December 6 are declared dead. (The Japan Times)
  International relations:
  - Philippines–United States relations
  - The Balangiga bells, stolen during the massacre in Balangiga in 1901 during the
    Philippine–American War, were returned to the Philippines after 117 years under
    the possession of the United States. (CNN Philippines)
  Law and crime:
  - Campinas Cathedral shooting
  - A gunman kills four people and injures four others at a Catholic cathedral in
    Campinas, São Paulo, Brazil. The gunman commits suicide after the attack. (BBC)
    (NBC News)
  - Cannabis in New Zealand
  - New Zealand's government passes an amendment to the Misuse of Drugs Act 1975 to
    allow chronic and terminally ill patients to use medical cannabis without facing
    the possibility of prosecution. (The Guardian)
  - In the United Kingdom, a man is tasered by police at the gates of the Palace of
    Westminster. The area is placed on lockdown. (Daily Telegraph)
  - Bill Cosby sexual assault cases
  - The lawyers of Bill Cosby file a list of nearly a dozen alleged trial errors as
    they appeal his sexual assault conviction and three-to-10-year prison term. (CBS
    News)
  - Detention of Meng Wanzhou
  - Meng Wanzhou, CFO of Huawei who was arrested in Canada for an extradition request
    from the United States for alleged US sanction violation against Iran, is granted
    bail with restrictions by a Canadian judge. (CBC)
  - International Crisis Group confirm one of it's worker Michael Kovrig is detained
    in People's Republic of China. Kovrig is a former Canadian diplomat and his detainment
    come after the China warned Canada of severe consequences if Meng was not released.
    (reuters)
  Politics and elections:
  - Thousands of students at the University of Tirana in Albania demonstrate against
    tuition fees. The government appeals for calm. (AP via U.S. News & World Report)
