Date: '2018-12-09'
Source_URI: Portal:Current events/2018 December 9
Intelligence_Payload:
  Disasters and accidents:
  - Two people die and 38 others are hospitalized after a fire erupted in a building
    in Reggio Emilia, Italy. (Gazzetta di Reggio)
  - A helicopter crash in eastern Sudan kills Al-Qadarif state governor Mirghani Saleh
    and at least four other officials. (BBC)
  - Severe winter storms in the southeastern United States kill three people and leave
    310,000 others without power. (BBC)
  Health and environment:
  - A beaver is seen in Northern Italy on camera, a species that has not been seen
    in the country since 1471. (CBC)
  Law and crime:
  - Death of Grace Millane
  - The body of missing tourist Grace Millane is found outside of Auckland, New Zealand.
    (BBC)
  Politics and elections:
  - 2018 Armenian parliamentary election
  - Armenian citizens vote in the country's first ever snap election and the first
    one since the Velvet Revolution. (VOA)
  Sports:
  - 2018 UK Championship
  - Ronnie O'Sullivan wins a record seventh UK Championship snooker title after defeating
    Mark Allen 10–6 in the final at the Barbican Centre, York. (BBC)
  - 2018 NFL season
  - In American football, Larry Fitzgerald of the Arizona Cardinals passes Jerry Rice
    to become the all-time receptions leader with one team. (USA Today)
  - 2018 Copa Libertadores
  - In international football, River Plate wins the Copa Libertadores by beating Boca
    Juniors 3–1 in extra-time (aggregate score 5–3). The final is played at the Bernabéu
    stadium in Madrid. (BBC)
  - 2019 Baseball Hall of Fame balloting
  - In Major League Baseball, the Hall of Fame announces the first members of its
    2019 induction class, with Harold Baines and Lee Smith voted in by one of four
    special committees. They, along with any players elected by the Baseball Writers'
    Association of America in January 2019, will be formally inducted at the Hall's
    facility in Cooperstown, New York on July 21, 2019. (AP via ESPN)
