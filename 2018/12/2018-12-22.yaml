Date: '2018-12-22'
Source_URI: Portal:Current events/2018 December 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - A car bomb near the presidential palace in Mogadishu kills at least 16 people
    and injures more than 20 others. (The Guardian)
  Arts and culture:
  - Simcha Rotem, the last surviving fighter of the 1943 Warsaw Ghetto Uprising, also
    a participant in the 1944 Warsaw Uprising, dies at the age of 94. (Deutsche Welle)
  Disasters and accidents:
  - 2018 Sunda Strait tsunami
  - At least 281 people are killed and over 1,000 injured when a tsunami triggered
    by Krakatoa's eruption hits the coast near Indonesia's Sunda Strait. (BBC) (CNN)
  Politics and elections:
  - The draft of a new constitution is approved by the parliament of Cuba. It will
    be put up for referendum on February 24, 2019. (Reuters)
  - The United States Department of State confirms Special Presidential Envoy for
    the Global Coalition to Counter ISIL Brett McGurk's resignation, effective December
    31. President Trump describes the resignation as a "nothing event". (Associated
    Press) (BBC)
