Date: '2018-12-28'
Source_URI: Portal:Current events/2018 December 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Kurdish YPG calls on Syrian government troops to protect Manbij against what
    it calls a "Turkish invasion". (Reuters) (CNN)
  - An explosion caused by a roadside bomb hits a tourist bus in Cairo, Egypt, near
    the Giza pyramid complex. Three Vietnamese tourists and an Egyptian tour guide
    are killed, while 12 others are injured. (BBC)
  Arts and culture:
  - After a 56-day trek, British Army captain Lou Rudd becomes the second person to
    cross Antarctica alone and unaided, over two decades after the first solo crossing
    by Norwegian Børge Ousland. (BBC)
  International relations:
  - Foreign relations of Bahrain
  - Bahrain announces it will reopen its embassy in Damascus, Syria, a day after the
    UAE made the same decision. (RT)
  Law and crime:
  - 2018 Leicester explosion
  - The three men suspected of causing an explosion at a shop in Leicester in February
    are convicted of murder. The explosion destroyed the shop and the flat above it,
    killing five people. The three men were also convicted of conspiracy with one
    of the victims to commit insurance fraud. (The Guardian)
