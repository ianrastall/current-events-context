Date: '2018-12-02'
Source_URI: Portal:Current events/2018 December 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A senior Taliban commander, Mullah Abdul Manan Akhund, is killed in a U.S. air
    strike in Afghanistan. (BBC)
  - Papua conflict
  - At least 19 people are killed as armed group linked to West Papua Liberation Organization
    attacks construction workers at Trans Papua road project in Nduga Regency, Papua,
    Indonesia. (Radio NZ)
  Disasters and accidents:
  - Eight people are presumed killed after an Embraer EMB-720 crashes in the Amazon
    Rainforest, Brazil. (Aviation Safety Network)
  Politics and elections:
  - COP24
  - The 24th Conference of the Parties to the United Nations Framework Convention
    on Climate Change convenes in Katowice, Poland. (BBC News)
  - At least 65,000 people gather in Brussels, Belgium, in a march for more action
    on protecting the climate. (De Standaard)
  - Elections in Spain, 2018 Andalusian regional election
  - The Socialist and current regional President Susana Díaz wins the election, but
    loses 14 seats. (El Mundo)
  - The far-right and anti-immigration Vox enters a legislative chamber after winning
    12 seats, for the first time in the history of Spanish democracy. (CNN) (The New
    York Times)
  Sport:
  - UEFA confirms that a new annual European football club competition called UEFA
    Europa League 2 will be introduced in 2021. (BBC)
