Intelligence_Payload:
  Disasters and accidents:
  - 2018 Anchorage earthquake
  - More than 1,000 aftershocks shake Alaska after a magnitude 7.0 earthquake knocked
    out power, ripped open roads and splintered buildings in Anchorage. (CNN) (Reuters)
  International relations:
  - 2018 G20 Buenos Aires summit, 2018 China–United States trade war
  - The White House announces that the United States and China agree to halt new trade
    tariffs for 90 days to allow for talks. (BBC) (NBC News)
  Politics and elections:
  - Presidency of Andrés Manuel López Obrador
  - Andrés Manuel López Obrador is sworn in as the 58th President of Mexico. (The
    Guardian)
  - Yellow vests movement
  - Protesters clash with police in Paris. (Reuters)
  - 2017–18 Spanish constitutional crisis
  - Jordi Turull and Jordi Sànchez, jailed Catalan separatist leaders accused of rebellion,
    start a hunger strike. (The Washington Post) (The New York Times)
