Date: '2018-12-29'
Source_URI: Portal:Current events/2018 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - In response to a roadside bombing that killed three Vietnamese tourists and an
    Egyptian tour guide the previous day, Egyptian police kill 40 suspected militants.
    (The New York Times)
  - Yemeni Civil War
  - Yemen's Shiite rebels say they have given control of the port of Hodeida to the
    coast guard and local administrators. The Yemeni government disputes this claim.
    (AP via Seattle Times)
  Disasters and accidents:
  - An equipment failure causes a jet bridge at the Baltimore–Washington International
    Airport to collapse, injuring seven people. (The Baltimore Sun)
  Law and crime:
  - A cyberattack disrupts distribution of newspapers published by Tribune Publishing.
    (Reuters)
  - Four people are killed in a shooting in St. Charles, Missouri, United States.
    Another person was stabbed but survived. A suspect was arrested soon after. (Associated
    Press), (The Daily Beast)
  Politics and elections:
  - United States federal government shutdown of 2018–2019
  - U.S. President Donald Trump issues an executive order freezing federal workers'
    pay raise in 2019, excluding that of military personnel. (CNN)
