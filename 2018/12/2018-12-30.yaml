Date: '2018-12-30'
Source_URI: Portal:Current events/2018 December 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - The Taliban reject peace talks with the Afghan government. (Reuters)
  Disasters and accidents:
  - A rescue helicopter crashes near the world's longest zipline in the United Arab
    Emirates, killing four people. (BBC)
  Law and crime:
  - A French man is detained in Barcelona, Spain, upon entering the Sagrada Familia
    with a suitcase containing ammunition. The Catalan police do not consider it an
    act of terrorism. (Mirror)
  Politics and elections:
  - 2018 Bangladeshi general election
  - Voters in Bangladesh head to the polls to elect 299 representatives to parliament.
    Seventeen people were killed in deadly clashes between supporters and opponents
    of the country's ruling party. (BBC)
  - The Awami League led by Sheikh Hasina is declared as the winner of the election
    with Hasina to serve her third consecutive term as Prime Minister of Bangladesh.
    (BBC)
  - 2018 Democratic Republic of the Congo general election
  - Voters in the Democratic Republic of the Congo head to the polls to determine
    a successor to incumbent President Joseph Kabila. Elections are also held for
    the National Assembly and local councils. (BBC News) (The Telegraph)
