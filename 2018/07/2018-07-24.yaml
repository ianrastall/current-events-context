Date: '2018-07-24'
Source_URI: Portal:Current events/2018 July 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Syrian military incidents during the Syrian Civil War
  - The Israel Defense Forces shoot down a Syrian Air Force jet near the Golan Heights
    after it reportedly crosses into the UNDOF zone near Israeli border. (BBC)
  Business and economy:
  - 2018 lower Puna eruption
  - Hawaii cancels a grant funding the island government's purchase of a recreational
    land parcel that is now covered by fresh lava. (WRAL)
  - Trump tariffs
  - The White House announces $12 billion in bailouts for farmers and ranchers affected
    by recently imposed retaliatory tariffs. (Sacramento Business Journal)
  Disasters and accidents:
  - 2018 Vietnam floods
  - The death toll from heavy floods in Vietnam rises to 27, while seven other people
    are missing. (Reuters)
  Science and technology:
  - 2018 in paleontology
  - Researchers at the Imperial College London report the discovery of the Lingwulong
    genus, a subgroup of Sauropods that lived in China about 174 million years ago,
    which is 15 million years earlier than any previously-known member of the group.
    (BBC) (ABC News)
