Date: '2018-07-02'
Source_URI: Portal:Current events/2018 July 2
Intelligence_Payload:
  Arts and culture:
  - Crossing the Ditch
  - New Zealander Scott Donaldson becomes the first solo kayaker to successfully cross
    the Tasman Sea. After 62 days at sea, he landed in Ngāmotu Beach, New Plymouth,
    at 8.44 p.m. local time (08:44 UTC). (The New Zealand Herald)
  Disasters and accidents:
  - 2018 Tham Luang cave rescue
  - Rescue teams find all 12 boys and their soccer coach alive in Tham Luang Nang
    Non cave in Chiang Rai, Thailand, after being trapped for 10 days. (CNN)
  - European migrant crisis
  - Malta detains German migrant rescue boat MV Sea Watch 3, which had been docked
    in Valletta for repairs, as it attempts to head into the Mediterranean Sea to
    rescue migrants off the Libyan coast. (Reuters)
  - The captain of MV Lifeline, a German migrant rescue ship that docked in Malta
    last week with 130 rescued migrants after Italy refused access, makes an initial
    court appearance in Valletta. He is charged with operating his ship illegally.
    (Reuters)
  Law and crime:
  - Crime in the Philippines and Philippine Drug War
  - Antonio Halili, the mayor of Tanauan, Philippines, is shot dead by a sniper during
    a flag raising ceremony outside the city hall. Halili was known for parading people
    arrested on drug offenses through the city's streets. (CNN)
  - Harvey Weinstein sexual abuse allegations
  - Harvey Weinstein is expected to face additional sexual assault charges in connection
    with a third woman in a July 2006 incident. (WSJ)
  - Terrorism in Pakistan
  - Militants ambush a paramilitary convoy in Awaran, Baluchistan, Pakistan and kill
    six people. (Associated Press via NewsOK)
  - Terrorism in the United States
  - Demetrius Pitts, accused of planning an al-Qaeda bombing in Cleveland, makes his
    first court appearance. (Reuters)
  - Terrorism in Belgium, Terrorism in France
  - Belgian authorities announce the arrest and charge of a Belgian man and his Iranian
    wife suspected of plotting a bomb attack against a Mujahedeen Khalq rally in France.
    (The New York Times)
  - Economy of the United States
  - A US federal judge orders PricewaterhouseCoopers to pay US$625.3 million compensation
    to Federal Deposit Insurance Corp. The judge rules PwC negligently caused losses
    to F.D.I.C. by failing to uncover fraud during audits of Colonial BancGroup. Colonial,
    one the nation's 25 largest banks, and Taylor, Bean & Whitaker, the 12th-largest
    mortgage broker in the US, both collapsed in August 2009 as a result of fraud
    between the two. F.D.I.C. was the receiver for Colonial. (Reuters)
  - The Bataan Coast Guard detains cruise ship MV Forever Lucky on suspicion of involvement
    in human trafficking. The National Bureau of Investigation rescues 139 alleged
    victims from the vessel and charges Johnny Cabrera, the alleged lessor of the
    ship. (Inquirer)
  Politics and elections:
  - 2018 German government crisis, European migrant crisis
  - Chancellor Angela Merkel and Interior Minister Horst Seehofer agree on a migration
    compromise; talks with the SPD coalition partner are following. (Deutsche Welle)
  Sports:
  - 2019 FIBA Basketball World Cup qualification (Asia)
  - Philippines-Australia basketball brawl
  - A brawl breaks out during a 2019 FIBA Basketball World Cup qualifier match between
    the Philippines and Australia at the Philippine Arena in Bocaue. (BBC)
