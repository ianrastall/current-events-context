Date: '2018-07-08'
Source_URI: Portal:Current events/2018 July 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Syrian Air Defense Force damages an Israeli aircraft and thwarts an Israeli
    missile strike on the Tiyas Military Airbase (T-4 Airbase) in the Homs Governorate.
    (Reuters)
  - 2018 Amesbury poisonings
  - A British woman dies after being exposed to the Novichok nerve agent several days
    earlier in Amesbury. (CBS News)
  Disasters and accidents:
  - 2018 Japan floods
  - The death toll from heavy rains in Japan rises to 94, with over 50 people still
    reported missing. (Japan Today)
  - Tham Luang cave rescue
  - Four boys are rescued from the cave. (The Guardian) (CNN)
  - Çorlu train derailment
  - A train en route to Istanbul from Bulgaria derails in Tekirdağ Province, Turkey,
    killing 24 people and injuring 73. (Star Tribune) (BBC)
  International relations:
  - North Korea–United States relations
  - U.S. Secretary of State Mike Pompeo calls for North Korea to follow Vietnam's
    path in overcoming past hostilities with the United States. (The Guardian)
  - 2018 Eritrea–Ethiopia summit
  - Ethiopian Prime Minister Abiy Ahmed meets with Eritrean President Isaias Afwerki
    in Asmara and they pledge to restore diplomatic relations. (CBC)
  Law and crime:
  - Human rights in Iran
  - Iranian police arrest a number of users for posting illegal content on Instagram,
    including a famous blogger named Maedeh Hojabri. (The Guardian)
  Politics and elections:
  - Politics of the United Kingdom
  - David Davis resigns as the United Kingdom's Secretary of State for Exiting the
    European Union amid disagreements with Prime Minister Theresa May over Brexit
    negotiations. (BBC)
  - Purges in Turkey
  - Turkey purges more than 18,500 government workers a day before Recep Tayyip Erdoğan
    is sworn in as executive president. (Bloomberg)
