Date: '2018-07-11'
Source_URI: Portal:Current events/2018 July 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - According to officials, an attack by the Taliban near Kunduz kills 29 Afghan Army
    soldiers. Air strikes kill dozens of militants elsewhere in the country. (Reuters)
  Disasters and accidents:
  - 2018 Japan floods
  - The death toll from heavy rains in Japan rises to 179 while 67 other people are
    still missing. (Channel NewsAsia)
  - Traffic collisions (2000–present)
  - At least 27 people are killed in an overnight bus crash in Sanandaj, Kurdistan
    Province, Iran. (Charlotte Observer)
  - 2018 lower Puna eruption
  - Ahalanui Park and Kua O Ka La School are overtaken by lava. (Big Island Now)
  International relations:
  - 2018 Brussels summit
  - Accession of Macedonia to NATO
  - NATO formally invites Macedonia to begin membership talks to join the organization.
    (RFE/RL)
  Law and crime:
  - National Socialist Underground trial
  - In Germany, the accused members and supporters of the Neo-Nazi terrorist group
    National Socialist Underground are found guilty of the murders of nine immigrants
    and one policewoman, assistance in said murders, bomb attacks, attempted murders,
    and robbery. The main defendant and last surviving member of the terrorist group,
    Beate Zschäpe, is sentenced to life imprisonment. (Deutsche Welle)
  - Murder of XXXTentacion
  - A second suspect is arrested in connection with the murder of rapper XXXTentacion.
    (NBC News)
  Sports:
  - 2018 FIFA World Cup
  - Croatia defeats England 2–1 after extra time, advancing to their first-ever World
    Cup final, which will be against France on July 15. (CNN)
