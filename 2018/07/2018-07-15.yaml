Date: '2018-07-15'
Source_URI: Portal:Current events/2018 July 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015–2018 Iraqi protests
  - Demonstrations in Muthanna Province, Iraq, leave 16 protesters killed or injured
    and 33 others arrested. (Iraqi News)
  Business and economy:
  - Flights from Iran to Najaf, Iraq, are diverted to Baghdad due to anti-government
    protests. (Reuters)
  Disasters and accidents:
  - An earthquake of 6.2 magnitude strikes off Yemen, but there are no reports of
    any damage or casualties. (The New York Times)
  - MV Shunqiang 2 collides with another ship off Shanghai, causing thirteen to fall
    overboard and the ship to sink. Search and rescue operations commence for the
    missing seafarers. (Xinhua)
  - A fire in a copper mine in Limpopo, South Africa kills five and traps a sixth.
    (CNN)
  International relations:
  - Iran and weapons of mass destruction, Iran–Israel proxy conflict
  - New details from Iranian nuclear documents stolen by Israeli spies show that Tehran
    obtained weapons-design information from a foreign source and was on the cusp
    of mastering key bombmaking technologies when the research was ordered halted
    15 years ago. (The Washington Post)
  Law and crime:
  - Murder of April Tinsley
  - Police in Allen County, Indiana arrest a suspect in the 1988 murder of the 8-year-old
    April Tinsley. (CBS News)
  Politics and elections:
  - Politics of Haiti
  - Haitian Prime Minister Jack Guy Lafontant resigns after deadly protests against
    fuel price rises. (BBC)
  Science and technology:
  - 2018 lower Puna eruption
  - A tiny island of lava forms north of the Kapoho ocean entry on Hawaii island.
    (Star Advertiser)
  Sports:
  - Manny Pacquiao vs. Lucas Matthysse
  - In boxing, Manny Pacquiao knocks out Lucas Matthysse in the seventh round to win
    the WBA welterweight championship. (Reuters)
  - 2018 FIFA World Cup Final
  - In football, France defeats Croatia 4–2 to claim its second World Cup championship.
    (BBC Sport)
  - Celebrations across France see two killed, 45 injured, and 292 arrested. (A.A.)
  - 2018 Wimbledon Championships
  - In men's professional tennis, Novak Djokovic defeats Kevin Anderson in three sets
    to win his fourth Wimbledon championship. (BBC Sport)
