Date: '2018-07-29'
Source_URI: Portal:Current events/2018 July 29
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Pacific typhoon season
  - Typhoon Jongdari hits central and western Japan, injuring at least 21 people and
    cutting power to tens of thousands of homes. The typhoon is the latest in the
    series of weather events to affect the country, following devastating floods and
    a fatal heat wave earlier in the month. (BBC)
  - 2018 Attica wildfires
  - The death toll from the fires in Greece rises to 91 while 25 other people are
    still missing. (AP)
  - List of people who disappeared mysteriously
  - TeNiya Elnora Jones, a University of Kentucky student studying abroad in the Middle
    East, is reported missing after a swimming accident over the weekend in Tel Aviv,
    Israel. (USA Today)
  International relations:
  - Israeli–Palestinian conflict, 2018 Gaza border protests
  - Palestinian teenager Ahed Tamimi is released from an Israeli prison. (NBC News)
  Law and crime:
  - Four cyclists, two Americans, one Dutch national and one Swiss national, are killed
    in the Khatlon Region, Tajikistan by a hit-and-run driver while three others are
    injured. A 21 year old male suspect has been arrested. (RFE/RL) (NU.nl)
  Politics and elections:
  - Malian presidential election, 2018
  - Malians go to the polls to elect a president. (The Globe and Mail)
  Sports:
  - 2018 Tour de France
  - Geraint Thomas of the United Kingdom wins the Tour de France. (BBC)
