Date: '2018-07-14'
Source_URI: Portal:Current events/2018 July 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iranian intervention in Iraq (2014–present)
  - Iran's Revolutionary Guards kill three would-be saboteurs and wound another in
    Kermanshah, near the Iraq border, before seizing their equipment. A volunteer
    on Iran's side is also killed. (Reuters via Yahoo! News)
  - 2015–2018 Iraqi protests
  - Widespread unrest erupts in southern Iraq as protesters, frustrated by shortages
    of electricity, water and jobs vent their anger, setting fire to political offices,
    attacking government infrastructure and deepening uncertainty about the country’s
    shaky political future. (Washington Post)
  Disasters and accidents:
  - A landslide at a jade mine in Kachin State, Myanmar, kills at least 15 people
    and injures 45 others. (Channel NewsAsia)
  Science and technology:
  - In data collected by NASA's Juno spacecraft, an INAF team discovers suggestions
    of a new volcano close to the south pole of Jupiter's moon Io. (Tribune)
  Sports:
  - 2018 FIFA World Cup
  - Belgium defeats England 2–0 to finish at third place—its best ever result at a
    World Cup. (Reuters via Radio New Zealand)
