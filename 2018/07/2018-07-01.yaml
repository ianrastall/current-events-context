Date: '2018-07-01'
Source_URI: Portal:Current events/2018 July 1
Intelligence_Payload:
  Disasters and accidents:
  - A bus skids off a mountain road into a –deep ravine in Uttarakhand, India, killing
    at least 48 people. (Sky News)
  - A road accident in Tanzania leaves 20 dead and 45 others injured. (Xinhua)
  International relations:
  - North Korea–United States relations
  - U.S. President Donald Trump's National Security Advisor John R. Bolton states
    that the United States has a plan to dismantle the nuclear weapons program of
    North Korea in a year. (Time)
  Law and crime:
  - List of helicopter prison escapes
  - Three heavily armed gunmen who hijacked a helicopter help Rédoine Faïd, one of
    France's most notorious gangsters, escape from a prison in Réau, Île-de-France.
    Police later discovered the abandoned helicopter in Gonesse. Faïd previously escaped
    prison in 2013 and was briefly France's most wanted criminal. (BBC)
  - Cannabis in the United States
  - Cannabis in Vermont
  - Vermont legalizes recreational marijuana, becoming the ninth U.S. state to do
    so. (SFGate)
  - Crime in Idaho
  - A man stabs multiple people celebrating a three-year-old's birthday party at an
    apartment complex housing refugees in Boise, Idaho. Nine people are injured, including
    the birthday girl and five other children; the birthday girl dies the next day.
    (Reuters)
  - Terrorism in the United States
  - FBI agents arrest a Cleveland man they say told an undercover agent he was planning
    to bomb a July 4th celebration. (Reuters)
  Politics and elections:
  - 2018 German government crisis, European migrant crisis
  - German Chancellor Angela Merkel faces resistance by the Bavarian CSU over the
    result of the EU asylum policy summit last week. (Bloomberg) (Frankfurter Allgemeine)
  - Interior minister Horst Seehofer offers his resignation citing a conflict with
    Angela Merkel over her refugee policy. (Sky News)
  - 2018 Mexican general election
  - Voters in Mexico elect Andrés Manuel López Obrador as their new President in a
    landslide victory. Additionally, 128 senators and 500 deputies were also chosen.
    (Politico) (BBC)
  Sports:
  - 2018 FIFA World Cup
  - Russia knocks out Spain from the World Cup after winning a penalty shootout. (The
    Denver Channel)
  - 2018 Mediterranean Games
  - The closing ceremony of the 18th Mediterranean Games in Tarragona, Spain, takes
    place. (Mundo Deportivo)
  Health and environment:
  - Pimachiowin Aki, a large area of Boreal Forest that spans parts of the Canadian
    provinces of Manitoba and Ontario, and includes the lands of four First Nations,
    is recognized as a UNESCO World Heritage Site. (CBC)
