Date: '2018-07-28'
Source_URI: Portal:Current events/2018 July 28
Intelligence_Payload:
  Arts and culture:
  - Ground breaking on the Barack Obama Presidential Center in Jackson Park, Illinois,
    is pushed back again until all federal approvals are completed, which will not
    be until 2019. (Chicago Sun Times)
  Disasters and accidents:
  - July 2018 Lombok earthquake
  - A magnitude 6.4 earthquake hits Lombok, Indonesia, destroying several houses.
    At least 16 people are killed and 160 others are injured. (BBC)
  - Heavy monsoon rains in northern India leave 58 people dead. (ABC)
  - A bus crashes in Dapoli, India, killing thirty people and leaving one sole survivor.
    (Bendigo Advertiser)
  Law and crime:
  - Former Armenian President Robert Kocharyan is arrested and taken into police custody
    on charges of being involved in the crackdown on protests in 2008 that resulted
    in ten deaths following a disputed presidential election. (RFE/RL)
  - A court in Egypt sentences 75 supporters of former president Mohammed Morsi to
    death, as part of a trial of more than 700. (BBC)
  Politics and elections:
  - Australian federal by-elections
  - Five separate by-elections are held for five seats in the Australian House of
    Representatives, namely Braddon, Fremantle, Longman, Mayo and Perth, four of which
    were triggered by the dual citizenship crisis. (The Guardian)
  - 'Basic Law: Israel as the Nation-State of the Jewish People'
  - Israeli Arab MP Zouheir Bahloul resigns over the "nation-state" law. (BBC)
