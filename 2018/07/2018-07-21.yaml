Date: '2018-07-21'
Source_URI: Portal:Current events/2018 July 21
Intelligence_Payload:
  Business and Economy:
  - Fiat Chrysler CEO Sergio Marchionne resigns due to failing health and is replaced
    by Jeep CEO Mike Manley. (The New York Times)
  Armed conflicts and attacks:
  - Western Iran clashes (2016–present)
  - PJAK militants blow up an ammunition dump and kill eleven Iranian border guards
    stationed at an Iran–Iraq border post in Marivan County. Several militants are
    killed in return. (Reuters)
  - Syrian Civil War
  - Israel Defense Forces extract 98 White Helmets and 324 others from recently recaptured
    southwestern Syrian territory into Jordan, at the request of Canada and the United
    States. Canada, the United Kingdom and Germany offer refuge to some of them. Two
    other groups intended for rescue, comprising about 800 people, do not escape.
    (CBC)
  Disasters and accidents:
  - 2018 Vietnam floods
  - Tropical Storm Son-Tinh kills 20 people, injures 14 more and leaves at least 16
    missing in Vietnam. (Reuters)
  - The death toll from a heatwave in Japan rises to 30. (BBC)
  Law and crime:
  - Crime in South Africa
  - Gunmen attack a minibus of people returning from a funeral between Colenso and
    Weenen in KwaZulu-Natal, South Africa. Eleven people are shot dead and four others
    are critically injured. (The Evening Standard)
  - 2018 Los Angeles hostage incident
  - A gunman is arrested for one count of murder after killing a woman then taking
    dozens of people hostage at a Trader Joe's in Los Angeles, California. (CBS News)
  Politics and elections:
  - People's Party (Spain) leadership election, 2018
  - Pablo Casado is elected leader of Spain's centre-right People's Party after defeating
    former Deputy Prime Minister of Spain Soraya Sáenz de Santamaría in a run-off.
    (BBC)
  - Presidency of Rodrigo Duterte
  - The Philippines immigration authority has ordered the deportation and blacklisting
    of an Australian nun who was investigated, under instruction from President Rodrigo
    Duterte, for her political activism. (Business Insider)
  Sports:
  - 2018 Rugby World Cup Sevens – Women's tournament
  - New Zealand defeats France 29–0 in the final to win the 2018 women's Rugby World
    Cup Sevens. (Radio New Zealand)
