Date: '2018-07-06'
Source_URI: Portal:Current events/2018 July 6
Intelligence_Payload:
  Arts and culture:
  - The wreckage of Nazi German submarine U-966, which was sunk in November 1943,
    is discovered off the coast of Galicia, Spain. (BBC)
  Disasters and accidents:
  - Tham Luang cave rescue
  - A former UDAU diver dies from lack of oxygen while delivering supplies to a group
    of boys and a man trapped in the Tham Luang Nang Non. (ABC)
  - 2018 Japan floods
  - Heavy rain in Japan prompts the evacuation of hundreds of thousands of people.
    At least 38 people have died in landslides. (BBC)
  Health and environment:
  - 2018 Eastern Canada heat wave
  - As the heat wave in Quebec comes to an end, the death toll rises to 54. (CBC)
  Law and crime:
  - Capital punishment in Japan
  - Japan executes former Aum Shinrikyo leader Shoko Asahara and six other main members
    of Aum Shinrikyo, who led the 1995 Tokyo subway sarin attack, by hanging. (BBC)
  - Humboldt Broncos bus crash
  - The driver of the tractor-trailer that collided with the Humboldt Broncos team
    bus is arrested and is expected to face 29 charges. (CBC)
  Politics and elections:
  - Corruption in Pakistan
  - In the Avenfield corruption case, the court announced a 10 year sentence and 8
    million pound fine for the former Prime Minister of Pakistan, Nawaz Sharif. His
    daughter and political heir, Maryam Nawaz, was sentenced to 7 years imprisonment
    and a 2 million pound fine. Sharif's son-in-law, Muhammad Safdar Awan, received
    a one-year sentence. (DAWN)
  - Guatemalan President Jimmy Morales is accused of sexual abuse of ten public officials
    by former Foreign Minister Edgar Gutierrez. (TeleSUR)
