Date: '2018-07-22'
Source_URI: Portal:Current events/2018 July 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - An ISIL suicide bomber kills 14 people and wounds over 60 others at a police checkpoint
    near Hamid Karzai International Airport. The attack coincides with Afghan Vice
    President Abdul Rashid Dostum returning to Afghanistan after more than a year
    in exile in Turkey. Dostum and his entourage are unhurt. (The Wall Street Journal)
  - Yemeni Civil War (2015–present)
  - A suspected U.S. drone strike kills four alleged al-Qaeda militants in Ma'rib.
    (AP)
  - 2018 Toronto shooting
  - A mass shooting in Toronto, Ontario, Canada, occurs, leaving two people dead and
    13 others injured. The shooter is found dead nearby after exchanging gunfire with
    police and fleeing. (AP)
  Law and crime:
  - Protests against Emmanuel Macron, Benalla affair
  - A French judge hands preliminary charges to one of French President Emmanuel Macron's
    top security aides after video surfaced showing him attacking a protester at a
    May Day demonstration. (Canoe.com)
  Sports:
  - 2018 Open Championship
  - Francesco Molinari wins the British Open at Carnoustie for his first major title
    by two strokes over a group including past major winners Rory McIlroy and Justin
    Rose. Tiger Woods, Molinari's playing partner for the final round, finishes one
    shot further back in a tie for sixth. (CBS News)
  - 2018 Rugby World Cup Sevens – Men's tournament
  - New Zealand defeats England 33–12 in the final to win the 2018 men's Rugby World
    Cup Sevens. (Radio New Zealand)
  - Football in Germany
  - Arsenal and German professional footballer Mesut Özil announces his retirement
    from international football, citing racism and disrespect. (The Guardian)
