Date: '2018-07-05'
Source_URI: Portal:Current events/2018 July 5
Intelligence_Payload:
  Disasters and accidents:
  - Fireworks accidents and incidents
  - Two explosions at fireworks workshops in Tultepec, Mexico, kill at least 19 people,
    including rescue workers, and injure dozens more. Tultepec is home to a major
    fireworks industry. (Reuters)
  - 2018 Phuket boat capsizing
  - At least 33 are dead and 23 missing after two passenger boats capsize off Phuket,
    Thailand. All are Chinese tourists. (The New York Times)
  Health and environment:
  - 2018 Eastern Canada heat wave
  - The death toll from the worst heat wave in decades in Quebec rises to 34. (CBC)
  International relations:
  - United States withdrawal from the Joint Comprehensive Plan of Action
  - Iran threatens to close the Strait of Hormuz to shipping if the U.S. re-applies
    sanctions to the country after the U.S withdrew from the JCPOA deal earlier in
    the year. (The Guardian)
  Politics and elections:
  - Directive on Copyright in the Digital Single Market
  - The European Parliament votes against the proposed copyright reform. (BBC)
  - Environmental policy of the Donald Trump administration
  - U.S. President Donald Trump announces the resignation of Scott Pruitt as Administrator
    of the Environmental Protection Agency. Former coal lobbyist Andrew R. Wheeler
    will act as a temporary replacement. (CNBC)
