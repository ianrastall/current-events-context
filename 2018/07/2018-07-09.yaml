Date: '2018-07-09'
Source_URI: Portal:Current events/2018 July 9
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Japan floods
  - The death toll from heavy rains in Japan rises to 126, with over 86 people still
    reported missing. (Japan Today)
  - Tham Luang cave rescue
  - Divers in Thailand rescue four more boys from the cave Tham Luang Nang Non bringing
    the total to eight rescued. (ABC News)
  - About 50 students are poisoned by inhaling a toxic gas, due to an explosion near
    their school of the locality of Chosica, in Lima, Peru. Spokespeople from local
    municipality say that this poisoning is due to the leakage of gas from a chlorine
    cylinder, although the place where the explosion began and the origin of the product
    has yet to be determined. (El Comercio) (La República)
  - 2018 lower Puna eruption
  - The number of homes destroyed by lava from the latest eruption reaches 700. (The
    Business Journals)
  International relations:
  - 2018 Eritrea–Ethiopia summit
  - Leaders from Eritrea and Ethiopia officially declare an end to their countries'
    20-year border conflict. (Deutsche Welle)
  - Sanctions against Iran, Iran–United States relations
  - The U.S. Treasury Department announces sanctions for a Malaysia-based sales agent
    for Mahan Air in connection with Iran's alleged support for international terrorism.
    (Reuters)
  Law and crime:
  - Inn Din massacre § Arrest of Reuters journalists
  - A court in Myanmar charges two Reuters journalists with obtaining secret state
    documents in violation of the colonial-era Official Secrets Act, taking the landmark
    press freedom case to trial after a period of preliminary hearings that lasted
    six months. The two journalists were investigating mass graves in the village
    of Inn Din in northern Rakhine State prior to their arrest and imprisonment on
    12 December 2017. (Reuters) (Al Jazeera)
  - Weinstein effect
  - Eugene Gu, a doctor famous for successfully suing President Donald Trump for blocking
    him on Twitter, has been accused of sexual assault by a woman who says she’s his
    ex. (Daily Dot)
  Politics and elections:
  - 2017–18 Iranian protests, Human rights in Iran
  - Iranian women post videos of themselves dancing to protest the arrest of Instagram
    blogger Maedeh Hojabri. (Time)
  - 2017–18 Spanish constitutional crisis
  - Spanish Prime Minister Pedro Sánchez and President of the Generalitat of Catalonia,
    Quim Torra, meet officially in Moncloa. It is the first time since the beginning
    of the crisis that a Spanish Prime Minister and a Catalan President meet. (El
    País)
  - Politics of the United Kingdom
  - Boris Johnson resigns as the United Kingdom's Secretary of State for Foreign and
    Commonwealth Affairs amid disagreements with Prime Minister Theresa May over Brexit
    negotiations. Johnson is the second member of May's cabinet to resign in two days.
    (BBC)
  - 2019 Kentucky gubernatorial election
  - Kentucky Attorney General Andy Beshear announces that he will run for Kentucky
    Governor in 2019 against incumbent Matt Bevin. (Courier Journal)
  - Brett Kavanaugh Supreme Court nomination
  - U.S. President Donald Trump nominates Brett Kavanaugh to the U.S. Supreme Court.
    (Reuters)
  Sports:
  - Former NFL cornerback Brandon Browner is arrested after allegedly breaking into
    a home of an ex-girlfriend who has a restraining order against him. (UPI)
