Date: '2018-07-03'
Source_URI: Portal:Current events/2018 July 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The son of ISIL leader Abu Bakr al-Baghdadi is killed in a suicide attack mission
    in Homs, western Syria, or in a Russian bombing of a cave. (VOA News)
  Disasters and accidents:
  - Shipwrecks in 2018, Disasters in Indonesia
  - Sinking of MV Sinar Bangun
  - Authorities call off the search for 164 missing after the ferry sank in Lake Toba.
    Only three bodies have been recovered after the disaster. Although the wreck has
    been located, rescuers lack the equipment to raise it or attempt to retrieve any
    bodies inside. (Inquirer)
  - Ferry MV KM Lestari Maju sinks while en route to Pamatata in Selayar, South Sulawesi,
    Indonesia, with 48 vehicles and 139 passengers on board. At least 12 fatalities
    are reported. (Channel NewsAsia)
  - Major power outages
  - Azerbaijan's largest blackout since 1991 affects most of the country. (AP)
  - A pedestrian bridge collapses onto railway lines in Mumbai, injuring five. An
    approaching train is able to perform an emergency stop before colliding with the
    wreckage. Thousands of commuters are left stranded throughout the city. (BBC)
  Health and environment:
  - Seattle becomes the first major U.S. city to ban plastic straws and utensils in
    all bars and restaurants. (CBC)
  - 2018 Eastern Canada heat wave
  - A heat wave throughout Eastern Canada kills six people in Montreal. (CTV)
  Law and crime:
  - Catholic sexual abuse cases in Australia
  - Roman Catholic Archbishop of Adelaide, Philip Wilson, is sentenced to 12 months
    in detention for covering up child sexual abuse in the 1970s. Pope Francis appoints
    Port Pirie Bishop Gregory O'Kelly as Apostolic Administrator, but with special
    near-full powers to govern the Archdiocese, though for now Wilson is still the
    Archbishop. (BBC)
  - LGBT rights in the United Kingdom
  - Theresa May announces a ban on gay conversion therapy. (BBC)
  - Economy of the United Kingdom
  - The UK's Financial Reporting Council launches an investigation into financial
    services provider KPMG over its most recent audit of Convivality, the defunct
    owner of retail chain Bargain Booze. (ITV)
  - 1Malaysia Development Berhad scandal
  - Former Malaysian Prime Minister Najib Razak is arrested for allegedly misusing
    state funds. (CNN)
  - A bomb kills three oil survey workers and injures five more near Dera Bugti in
    Baluchistan, Pakistan. (AP via NewsOK)
  - Cheshire Police in England arrest a female healthcare professional on suspicion
    of murdering eight babies and attempting to murder six more at Countess of Chester
    Hospital. (BBC)
  Politics and elections:
  - Directive on Copyright in the Digital Single Market
  - The Italian Wikipedia blocks all articles in protest of the European Union's copyright
    law. (BBC) (The Local)
  - Tunisian local elections, 2018, Women in Tunisia
  - Souad Abderrahim becomes the first woman to be elected as Mayor of Tunis, the
    capital of Tunisia. (The New York Times)
  Science and technology:
  - Discoveries of exoplanets
  - The European Southern Observatory's Very Large Telescope captures an image of
    PDS 70b, making it the first clear image of a planet forming from the disk of
    gas and debris surrounding its host star. (NBC News)
  Sport:
  - 2018 FIFA World Cup
  - England beats Colombia 4–3 in penalty shoot-out to advance to the quarter-finals
    of the competition. It is the first time England has won a penalty shootout in
    a World Cup match. (The Independent)
