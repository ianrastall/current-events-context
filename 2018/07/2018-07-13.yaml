Date: '2018-07-13'
Source_URI: Portal:Current events/2018 July 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Mastung suicide bombing; 2018 Pakistani general election
  - A suicide bomb attack near Mastung, Pakistan, kills 129 people, including political
    party candidate Siraj Raisani, during a political campaign. This is the third
    consecutive attack on a political rally. (RTÉ.ie)
  - International military intervention against ISIL, War in Afghanistan (2001–2021)
  - Pakistan, Iran, China, and Russia agree on joint efforts against the Islamic State
    group in Afghanistan, in an effort to ensure peace and eliminate terrorism from
    the region. (The Nation)
  Disasters and accidents:
  - An explosion at a chemical plant near Cairo, Egypt, injures 12 people. (BBC)
  - An explosion at a chemical plant in Sichuan, China, kills 19 people and injures
    12 others. (BBC)
  Politics and elections:
  - Mueller special counsel investigation
  - Twelve Russian intelligence officers are indicted for hacks in connection with
    hacking of the Democratic National Committee, the Hillary Clinton campaign, and
    state election systems during the 2016 presidential election. (NPR) (NBC News)
