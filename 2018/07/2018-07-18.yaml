Date: '2018-07-18'
Source_URI: Portal:Current events/2018 July 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Siege of al-Fu'ah and Kafriya
  - The evacuations of Shia towns Al-Fu'ah and Kafriya in the northern Idlib Governorate
    begin, as part of a deal between rebel forces and the Syrian government. (Al Jazeera)
  Arts and culture:
  - A joint-team of South Korean, British, and Canadian explorers announce the discovery
    of the wreck of Russian cruiser Dmitrii Donskoi, off the coast of Ulleungdo island.
    Dmitrii Donskoi was scuttled in 1905 during the Russo-Japanese War. (BBC) (The
    New York Post)
  Business and economy:
  - European Union competition law
  - The European Commission fines Google €4.34 billion for breaching EU antitrust
    regulations, claiming that Google abused the dominant position of Android to promote
    their search product. Google announces it will appeal the ruling. (European Commission)
    (NPR)
  Disasters and accidents:
  - European migrant crisis
  - A migrant boat capsizes off the northern coast of Cyprus, killing at least 19
    people, while 25 are reported missing, and the Turkish coast guard rescues 103.
    (AP)
  International relations:
  - Eritrea–Ethiopia relations
  - International air travel resumes between Eritrea and Ethiopia for the first time
    since 1998. (France 24)
  Law and crime:
  - Terrorism in the United Kingdom
  - Naa'imur Zakariyah Rahman, 20, is convicted of terror offences after attempting
    to kill guards, attack Theresa May, and blow himself up on Downing Street using
    fake explosives provided to him in a sting operation. (The Independent)
  - Far-right terrorism in the United Kingdom
  - The leader of the banned British far-right designated terrorist group National
    Action, Christopher Lythgoe, is jailed for eight years for being a member. (Sky
    News)
  Politics and elections:
  - Cal 3
  - The Supreme Court of California blocks Tim Draper's proposition to break California
    into three states, stating that "significant questions have been raised regarding
    the proposition's validity". (NBC News)
  Science and technology:
  - Nuclear program of Iran
  - Iran starts work at a factory that can produce rotors for up to 60 centrifuges
    a day. (Reuters)
  - Discoveries of exoplanets
  - Astronomers discover a giant gaseous planet orbiting a pair of brown dwarfs. (Sci
    News)
  - Environmental issues in the United States
  - Environmental Protection Agency Acting Administrator Andrew R. Wheeler announces
    coal-burning power plants may dispose of fly ash in unlined ponds for another
    18 months beyond a previously-set April 2019 deadline. Testing standards for hazardous
    elements in adjacent waters are also weakened. While the move would theoretically
    save an estimated $28-31 million annually in regulatory costs, there are concerns
    drinking water could be affected. (NBC News)
  Sports:
  - Formula 2 driver Santino Ferrucci is sacked by Trident Racing for deliberately
    crashing into Arjun Maini at a race in Silverstone earlier this month and for
    his sponsor's non-payment. He was previously fined for a number of other incidents,
    including holding a mobile phone as he drove from a paddock. (ESPN)
