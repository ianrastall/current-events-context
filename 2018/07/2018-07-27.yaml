Date: '2018-07-27'
Source_URI: Portal:Current events/2018 July 27
Intelligence_Payload:
  Business and economy:
  - Proposed acquisition of 21st Century Fox by Disney
  - 21st Century Fox share holders approve a $71.3 billion merger with The Walt Disney
    Company. (Variety)
  Disasters and accidents:
  - 2018 California wildfires
  - The Carr wildfire threatening Redding, California, U.S., kills two firefighters,
    as many residents flee their homes. (New York Times)
  International relations:
  - North Korea–United States relations
  - North Korea returns what it says are the remains of 55 U.S. servicemen killed
    during the Korean War on the 65th anniversary of the signing of the Korean Armistice
    Agreement. The repatriation was agreed at the June summit between U.S. President
    Donald Trump and North Korean leader Kim Jong-un in a bid to improve relations.
    (Sky News) (Vox)
  Science and technology:
  - July 2018 lunar eclipse
  - The longest total lunar eclipse of the 21st century colours the moon reddish orange
    in parts of Africa, Asia and Europe for about one hour and 42 minutes. (ABC News)
