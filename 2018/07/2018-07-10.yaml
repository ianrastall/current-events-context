Date: '2018-07-10'
Source_URI: Portal:Current events/2018 July 10
Intelligence_Payload:
  Arts and culture:
  - Television in Iran
  - A film on IRIB TV1 showing social media users being scolded and tearfully apologizing
    for promoting dance online angers reformists. (AFP via Yahoo! News)
  Disasters and accidents:
  - 2018 Japan floods
  - The death toll from heavy rains in Japan rises to 155 while several other people
    are still missing. (Japan Times)
  - 2018 Phuket boat capsizing
  - The death toll from a tourist boat accident off the coast of Thailand's Phuket
    Island climbs to 44, with five people still missing. (Business Insider)
  - Tham Luang cave rescue
  - Divers in Thailand rescue the remaining four boys and their coach from the Tham
    Luang Nang Non cave. (Channel NewsAsia)
  Health and environment:
  - 2018 North American heat wave
  - The heat-related death toll in the Canadian province of Quebec rises to 70, with
    34 of those occurring in Montreal. (CBC)
  International relations:
  - Human rights in China
  - Liu Xia, widow of Nobel Peace Prize laureate and human rights activist Liu Xiaobo,
    is allowed to leave Beijing, China, for Berlin, Germany. (BBC)
  - 2018 China–United States trade war
  - The Office of the United States Trade Representative releases a list of approximately
    $200 billion worth of Chinese goods to be affected in its next round of tariffs.
    (Reuters)
  Law and crime:
  - Women's rights in Iran
  - Shaparak Shajarizadeh, one of the Iranian women in the Girls of Enghelab Street
    protest against the hijab rule, says that she has left Iran after being sentenced
    to two years in prison and an 18-year suspended prison term. (RFE/RL)
  - 2018 Peshawar suicide bombing
  - A suicide bombing at an Awami National Party campaign rally in Peshawar kills
    twelve people, including the provincial assembly candidate, Haroon Bilour, and
    wounds 35. Bilour was the son of Bashir Ahmad Bilour, who was also assassinated
    by a bomber in 2012. (APA)
  - Trump administration family separation policy
  - The Trump Administration misses a court mandated July 10th deadline to reunite
    some of the youngest of the separated children with their families, citing "legitimate
    logistical impediments". (BBC)
  Politics and elections:
  - 2017–18 Spanish constitutional crisis
  - The Supreme Court of Spain suspends from public office the deputies to the Parliament
    of Catalonia prosecuted for rebellion (Romeva, Turull, Rull, Sànchez, Junqueras,
    Puigdemont). The pre-trial phase is finished. (El País)
  Sports:
  - 2018 FIFA World Cup
  - France knocks out Belgium from the World Cup, with France moving on to the final
    against either Croatia or England. (New York Times)
