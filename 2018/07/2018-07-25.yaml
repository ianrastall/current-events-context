Date: '2018-07-25'
Source_URI: Portal:Current events/2018 July 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - 2018 As-Suwayda attacks
  - Coordinated suicide bombings and shootings carried out by the Islamic State of
    Iraq and the Levant in As-Suwayda, Syria, kill 215 people and injure more than
    200 others. (Reuters)
  - 2018 Quetta suicide bombing
  - A blast outside a polling station in Quetta, Pakistan, kills 31 people and wounds
    several more on election day. (Hindustan Times)
  Business and economy:
  - United States–European Union relations, Trump tariffs
  - U.S. President Donald Trump and European leaders agree to halt their trade war
    over vehicles and say they will open talks on removing trade barriers between
    the United States and the European Union. (AP via Yahoo! Finance)
  Disasters and accidents:
  - 2018 Attica wildfires
  - The death toll from the wildfires in Greece rises to 80 people while many others
    are still missing. (BBC)
  - 2018 Laos dam collapse
  - The death toll from a dam collapse in Laos that caused heavy floods rises to 26,
    while more than 130 remain missing. (Channel NewsAsia)
  - A Legionella outbreak in Bresso, Italy, kills three people while 17 others are
    hospitalized. (Corriere Della Sera)
  - Paraguay's Minister of Agriculture, Luis Gneiting, and three others are killed
    in a plane crash near Ayolas. (Reuters)
  Law and crime:
  - Kidnapping of Joshua Boyle and Caitlan Coleman
  - Caitlan Coleman, the wife of former Taliban hostage Joshua Boyle, returns to the
    United States with her children after a family law court in Ottawa approved her
    request. (CTV News)
  Politics and elections:
  - Pakistani general election, 2018
  - Voters in Pakistan go to the polls to elect the members of the National Assembly
    and the four Provincial Assemblies of Pakistan. (Reuters)
  Science and technology:
  - Water on Mars
  - Scientists at INAF announce the discovery of a liquid water lake beneath a polar
    ice cap on Mars. The discovery was made using MARSIS, a radar instrument on board
    the European Space Agency's Mars Express orbiter. (BBC)
