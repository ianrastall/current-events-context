Date: '2018-07-04'
Source_URI: Portal:Current events/2018 July 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Clashes break out between Israeli security forces and Bedouin residents in Khan
    al-Ahmar, West Bank, as Israeli bulldozers prepare to demolish the village. The
    Supreme Court of Israel ruled that its residents could be evicted on May 24, while
    such relocation is considered illegal under international humanitarian law. (Reuters)
  - 2018 Amesbury poisonings
  - Police determine two British nationals found unconscious at a property in Amesbury,
    Wiltshire, on Saturday were poisoned using Novichok nerve agent of the same kind
    used in the poisoning of Sergei and Yulia Skripal in Salisbury, seven miles from
    Amesbury, almost four months ago. (BBC)
  - A major incident has been declared in Amesbury and several areas of the town have
    been evacuated as the National Counter Terrorism Policing Network investigate
    the attack. (BBC)
  - Moro conflict
  - Philippine soldiers clash with militants from the ISIL-affiliated Bangsamoro Islamic
    Freedom Fighters (BIFF), in the southern province of Maguindanao. The fighting
    began when BIFF militants attempted to occupy a town center, and lasted for 12
    hours until the BIFF militants withdrew to the hills. Four militants were killed,
    while two militants, a Philippine soldier and a local militiaman were wounded.
    (Reuters)
  Disasters and accidents:
  - Survivors trapped overnight on a stricken ferry are rescued off the Indonesian
    island of Sulawesi after the ferry began sinking the day before. Out of the 139
    passengers aboard, 31 have been confirmed dead, while three remain missing. (AP
    via ABC News)
  Health and environment:
  - 2018 Eastern Canada heat wave
  - The death toll from a heat wave in Quebec rises to 17. (CNN)
  Law and crime:
  - Rise and Resist
  - At least six people are arrested for hanging a sign that read "Abolish ICE" from
    the base below the Statue of Liberty, where no banners are permitted hung under
    federal law. Another is arrested after scaling the base of the statue, prompting
    an evacuation of the island on the busy Fourth of July holiday. (The Washington
    Post) (ABC News)
  Politics and elections:
  - Directive on Copyright in the Digital Single Market
  - The Polish, Spanish, Estonian and Latvian Wikipedias shut down in protest of the
    European Union's proposed copyright reform, blocking access for all users. This
    follows identical actions taken by Italian Wikipedia the previous day. (ERR) (TechCrunch)
  - 1Malaysia Development Berhad scandal
  - Former Malaysian Prime Minister Najib Razak is charged with abuse of power and
    three counts of criminal breach of trust. He pleads not guilty to all charges
    and accuses the government of seeking "political vengeance." (Channel NewsAsia)
    (NBC News)
