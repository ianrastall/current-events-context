Date: '2018-03-09'
Source_URI: Portal:Current events/2018 March 9
Intelligence_Payload:
  Arts and culture:
  - Media of the United Kingdom
  - British music journalism magazine New Musical Express (NME) issues its final print
    edition after 66 years, becoming a purely digital medium. (London Evening Standard)
  International relations:
  - 2017–18 North Korea crisis
  - 2018 North Korea–United States summit
  - White House Press Secretary Sarah Huckabee Sanders says that the White House needs
    to see "concrete and verifiable steps" toward the denuclearization of North Korea
    before meeting with Kim Jong-un. (Business Insider)
  - Australia–North Korea relations, Australia–United States relations
  - Australian Prime Minister Malcolm Turnbull urges U.S. President Donald Trump to
    be cautious in North Korea talks. Turnbull also said that Australia must retain
    sanctions on North Korea. (Canberra Times)
  - France–North Korea relations, France–United States relations
  - French President Emmanuel Macron says that Trump should hold tough talks with
    North Korea. (First Post)
  Law and crime:
  - Yountville hostage crisis
  - An Afghan War veteran and recently expelled resident takes an executive director
    and two psychologists into a room at the Veterans Home of California in Yountville,
    California. Seven hours later, California Highway Patrol officers find all of
    them shot dead. (The New York Times)
  - Crime in New York
  - A Brooklyn federal court sentences Martin Shkreli to seven years in prison for
    securities fraud in his hedge fund and pharmaceutical companies. (CNBC)
  - Federal pardons in the United States
  - U.S. President Donald Trump pardons Kristian Saucier, who had served a one-year
    sentence for unauthorized possession and retention of national defense information.
    (The Washington Post)
  Politics and elections:
  - Politics of Mauritius
  - Mauritian President Ameenah Gurib-Fakim is to resign over a financial scandal,
    where she was accused of using a charity bank card to make personal purchases
    worth tens of thousands of dollars. (Reuters) (BBC)
  Science and technology:
  - 2018 in spaceflight
  - Arianespace launches mission VS18 from the Guiana Space Centre, a Soyuz rocket
    carrying a payload of four O3b communications satellites for SES. (NASASpaceFlight.com)
  Sports:
  - 2018 Winter Paralympics
  - The opening ceremony of the 2018 Paralympic Games in South Korea takes place.
    (BBC)
  - Figure skating in the United States
  - American figure skating coach Richard Callaghan is suspended by the United States
    Center for SafeSport for alleged inappropriate sexual conduct with a 15-year-old
    pupil in 1985, first reported in 1999. (The Washington Post)
