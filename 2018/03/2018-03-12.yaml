Date: '2018-03-12'
Source_URI: Portal:Current events/2018 March 12
Intelligence_Payload:
  Business and economy:
  - Acquisitions by Apple
  - Apple Inc. buys digital magazine subscription app Texture for an undisclosed sum.
    (CNBC)
  - United States antitrust law
  - Citing national security concerns, U.S. President Donald Trump blocks Broadcom's
    proposed acquisition of Qualcomm. (CNBC)
  Disasters and accidents:
  - US-Bangla Airlines Flight 211
  - An aircraft operated by Bangladeshi airline US-Bangla Airlines crashes at Tribhuvan
    International Airport, Kathmandu, Nepal, killing 49 of the 71 people on board.
    (BBC)
  International relations:
  - Poisoning of Sergei and Yulia Skripal, Russia–United Kingdom relations
  - British Prime Minister Theresa May says she believes it is "highly likely" that
    the Russian government was behind an attempt to murder Sergei Skripal and his
    daughter using a Novichok agent. (Deutsche Welle)
  Law and crime:
  - Austin package explosions
  - Police in Austin, Texas announce that three package bombs in recent days that
    have killed two people and injured one more appear to be connected. The packages
    were left off at three separate locations and were not placed there by any delivery
    service, police say. (CNN)
  Politics and elections:
  - Russian interference in the 2016 United States elections
  - Republicans on the House Intelligence Committee announce the end of their Russia
    investigation, against the objections of Democratic members. According to the
    investigation's preliminary findings, the 2016 Trump campaign did not collude
    with the Russian government, and, contrary to the U.S. intelligence community's
    previous conclusions, Russia did not have a preference for Donald Trump as a presidential
    candidate. (NBC News)
  Sports:
  - 2017–18 Superleague Greece
  - The Superleague Greece season is suspended indefinitely by the Greek Ministry
    of Culture and Sports after PAOK FC owner Ivan Savvidis invaded the pitch with
    several bodyguards during a match against AEK Athens F.C. while armed with a gun,
    after his side had a late goal ruled out for offside. (BBC)
  - College basketball in the United States
  - 'The field for the 2018 NCAA Division I Women''s Basketball Tournament is announced.
    Connecticut, the only remaining unbeaten Division I team of either sex, is the
    top overall seed, with Notre Dame, Louisville, and Mississippi State as the other
    #1 seeds. (AP via ESPN)'
