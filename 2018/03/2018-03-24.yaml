Date: '2018-03-24'
Source_URI: Portal:Current events/2018 March 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Egypt
  - A bomb planted beneath a car explodes in Alexandria, Egypt, as a motorcade carrying
    the city's head of security passes by, killing at least two people. (The Telegraph)
  - Saudi Arabian-led intervention in Yemen
  - Saudi aircraft attack Houthi targets in residential areas of Hudaydah and Sa'dah,
    Yemen, killing at least seven civilians. (Press TV)
  - Terrorism in Greece
  - An Afghan community centre is burned down in Athens, Greece. An extreme far-right
    group claims responsibility, and the United Nations condemns the attack. (ABC
    News)
  Arts and culture:
  - The Times reports their journalist, Bel Trew, had been expelled from Egypt shortly
    after her February 20 arrest. Trew had been given the option of a military trial
    or leaving the country. (AP) (The Guardian)
  - 2018 Kids' Choice Awards
  - The 31st annual Kids' Choice Awards takes place. (Hollywood Reporter)
  Disasters and accidents:
  - The Kofu District Public Prosecutor’s Office in Japan announces nobody will be
    prosecuted over the collapse of the Sasago Tunnel, which killed nine and injured
    three. Officials say the collapse would have been difficult to predict. (The Japan
    Times)
  - Two men are rescued from a capsized dredger off Malaysia after 50 hours in an
    air pocket in the engine room. The death toll so far is nine, with rescue efforts
    underway to search for more survivors. (Sky News)
  International relations:
  - 2018 inter-Korean summit
  - North Korea accepts South Korea's proposal to hold high-level inter-Korean talks,
    scheduled to take place on March 29. (CNN)
  - Poisoning of Sergei and Yulia Skripal
  - A friend of poisoned exiled Russian spy Sergei Skripal claims Skripal had written
    to Vladimir Putin asking to return to Russia. Russia denies receiving such a letter.
    (BBC)
  - The 23 British diplomats and their families expelled from the Russian Federation
    arrive on a flight from Moscow. (BBC)
  - Investigators discover the Skripals switched off their mobile phones for four
    hours shortly before falling ill, and begin examining mobile phone data from everyone
    in Salisbury the day of the crime in a bid to link a phone to the poisoner. (Daily
    Mirror)
  Law and crime:
  - A car is deliberately driven into a group of schoolgirls in Glasgow, Scotland,
    injuring five. Police launch an attempted murder probe. (BBC)
  Politics and elections:
  - 2018 United States gun violence protests
  - Hundreds of thousands of people participate in the March for Our Lives protest
    around the world regarding gun violence, mass shootings and school shootings in
    the United States. (BBC) (PBS)
  - Peruvian ex-President Pedro Pablo Kuczynski's homes are raided by police investigating
    Operation Car Wash. A judge orders him to remain in Peru. (Deutsche Welle)
