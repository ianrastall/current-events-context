Date: '2018-03-15'
Source_URI: Portal:Current events/2018 March 15
Intelligence_Payload:
  Business and economy:
  - Economy of the United States
  - The largest U.S. broadcaster, iHeartMedia, owner of 850 radio stations, files
    for chapter 11 bankruptcy after accumulating US$20 billion in debt. (CNN)
  - Southeastern Grocers announces a plan to file for bankruptcy and close 94 of its
    locations. (CNN)
  Disasters and accidents:
  - Florida International University pedestrian bridge collapse
  - An under-construction pedestrian bridge over the eight-lane Tamiami Trail at Florida
    International University in Miami collapses killing at least six people and flattening
    eight cars. Nine people are rescued from the rubble and taken to nearby Kendall
    Regional Medical Center. Two require immediate surgery; the others injured sustain
    non-life-threatening wounds. (The Washington Post)
  - Accidents and incidents involving helicopters
  - A U.S. Air Force HH-60 Pave Hawk helicopter crashes near Al-Qa'im in Iraq's western
    Al Anbar Governorate, killing all seven people on board. (ABC News) (CNN)
  - Approximately 3,400kg of gold ingots break free from a Nimbus Airlines Antonov
    An-12 cargo plane and fall onto the runway at Yakutsk Airport. (The Aviation Herald)
  International relations:
  - 2017–18 North Korea crisis
  - North Korea–Sweden relations, 2018 North Korea–United States summit
  - North Korea foreign minister Ri Yong-ho visits Sweden for talks. (NK News) (CNN)
  - Countering America's Adversaries Through Sanctions Act
  - The Trump administration imposes financial sanctions on 19 Russian nationals,
    including 12 of those indicted in the Special Counsel investigation. (Business
    Insider)
  - Russia–United Kingdom relations, Poisoning of Sergei and Yulia Skripal
  - Russian Minister of Foreign Affairs Sergey Lavrov says Russia will "definitely"
    expel British diplomats. (Sputnik News)
  - Rohingya refugees in Bangladesh
  - The government of Myanmar agrees to repatriate 374 Rohingya refugees from a list
    of 8,000 submitted by the government of Bangladesh. Myanmar's authorities blamed
    their Bangladeshi counterparts for the slow process, citing "incomplete" information
    for many of the refugees on the list. (The Guardian)
  - Iran–Saudi Arabia relations
  - Saudi Arabian Crown Prince Mohammed bin Salman says that Saudi Arabia will develop
    nuclear weapons if Iran does. (Reuters)
  Politics and elections:
  - Politics of Slovakia
  - Prime Minister of Slovakia Robert Fico resigns amid controversy over the murder
    of Ján Kuciak. (The Guardian) (BBC)
  Sports:
  - Iditarod Trail Sled Dog Race
  - Norwegian musher Joar Leifseth Ulsom wins the 2018 Iditarod Trail Sled Dog Race.
    (KTUU News)
