Date: '2018-03-13'
Source_URI: Portal:Current events/2018 March 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Naxalite–Maoist insurgency
  - Maoists blow up a mine-protected vehicle of CRPF personnel with an IED, killing
    at least nine and injuring two others in Sukma district, Chhattisgarh, India.
    (Hindustan Times)
  Disasters and accidents:
  - The Argentine Navy rescues four United States Antarctic Program scientists and
    a contractor stranded on Joinville Island in Antarctica after their icebreaker
    RV Laurence M. Gould encountered thick sea-ice. (BBC)
  - A bus plunges into a ravine in the Amhara Region, Ethiopia, killing at least 38
    people, mostly students. (Channel News Asia)
  International relations:
  - Japan–North Korea relations
  - Anonymous Japanese government sources say that Japan is considering a summit meeting
    between Japanese Prime Minister Shinzō Abe and North Korean leader Kim Jong-Un.
    (AFP)
  Law and crime:
  - Transport in Iraq
  - Iraqi Prime Minister Haider al-Abadi lifts a ban on international air travel to
    the Kurdistan Region. (France24)
  Politics and elections:
  - Cabinet of Donald Trump
  - U.S. President Donald Trump fires Rex Tillerson as Secretary of State, moving
    to replace him with CIA Director Mike Pompeo. Trump selects CIA Deputy Director
    Gina Haspel to replace Pompeo as director. (The Washington Post)
  Science and technology:
  - Trans-Neptunian objects
  - (previously known as V774104), a 100–400 kilometer asteroid, is announced as possibly
    the fourth most distant known Solar System object from the Sun at nearly 90 (±10)
    times Earth's distance from the Sun. (Minor Planet Center)
  - Toba catastrophe theory
  - A study is released suggesting that humanity flourished even after Lake Toba erupted
    74,000 years ago. (International Business Times)
  - Discoveries of exoplanets
  - K2-155d, a Super-Earth exoplanet, is discovered and could produce life. (Cnet)
  Sports:
  - 2018 NCAA Division I Men's Basketball Tournament
  - The 2018 NCAA tournament begins, with the First Four starting in Dayton, Ohio.
    (ESPN)
