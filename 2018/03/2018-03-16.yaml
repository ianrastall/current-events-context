Date: '2018-03-16'
Source_URI: Portal:Current events/2018 March 16
Intelligence_Payload:
  International relations:
  - 2017–18 North Korea crisis
  - 2018 inter-Korean summit, North Korea–South Korea relations
  - South Korea states that they want high-level talks with North Korea before the
    summit. (Reuters)
  - South Korea–United States relations
  - South Korea and the United States announce that the Foal Eagle and Key Resolve
    military drills will be scaled down and shortened. (The Malay Mail)
  - Crime in the United Kingdom, Russia–United Kingdom relations
  - The death of Russian businessman Nikolai Glushkov, who lived in exile in the United
    Kingdom, is confirmed by a coroner's examination to be a murder. The killing happened
    eight days after the poisoning of Sergei and Yulia Skripal. (BBC)
  Law and crime:
  - South African Arms Deal
  - South Africa's National Prosecuting Authority Director Shaun Abrahams says former
    President Jacob Zuma will be prosecuted for corruption, relating to a R30 billion
    arms deal in the late 1990s. Zuma disputes all the allegations against him. (The
    Guardian)
  - The Holocaust in Latvia
  - Police arrest a man at the Freedom Monument displaying a poster of soldiers killing
    Jews as a protest against an annual march in Riga, Latvia, honoring two Latvian
    SS divisions during World War II. (JTA) (The Times of Israel)
  - Aviation in the United States
  - The Federal Aviation Administration of the United States restricts "doors off"
    aircraft flights following a helicopter crash that killed 5 people. (CNN)
  - Catholic Church sexual abuse cases
  - Anthony Sablan Apuron, the former Archbishop of the Roman Catholic Archdiocese
    of Agaña, Guam is found guilty on charges of the sexual abuse of minors by a tribunal.
    He is suspended from the exercise of his authority over the archdiocese. (Zenit)
  - Another lawsuit is filed against the Catholic Church in Guam, bringing the total
    lawsuits alleging historical sexual abuse to 157. Louis Brouillard, who is now
    96, was on Guam from 1948 to 1981, and is accused of abusing boys in 100 of the
    lawsuits the church is facing. (RNZ)
  Politics and elections:
  - Presidency of Donald Trump
  - U.S. Attorney General Jeff Sessions fires former Deputy FBI Director Andrew McCabe
    because of a report from the Office of Professional Responsibility accusing McCabe
    of making an unauthorized news media disclosure and lacking candor on multiple
    occasions. (CBS News)
  Science and technology:
  - Discoveries of exoplanets
  - European astronomers discover eight new exoplanets classified as Hot Jupiters
    as part of the WASP project. (The Talking Democrat)
  Sports:
  - 2018 NCAA Division I Men's Basketball Tournament
  - 'For the first time in the history of the Division I men''s tournament, a #16
    seed defeats a #1 seed, as UMBC shocks top overall seed Virginia 74–54. (AP via
    ESPN)'
