Date: '2018-03-06'
Source_URI: Portal:Current events/2018 March 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kamwina Nsapu rebellion
  - The UN Refugee Agency reports that more than 900,000 people have been displaced
    by the ongoing fighting in the central provinces of DR Congo between militias
    and government forces since 2016. (UNHCR)
  - 2018 anti-Muslim riots in Sri Lanka
  - Sri Lanka imposes a nationwide 10-day state of emergency, the first since 2011,
    in an effort to calm communal tensions. The previous day, a Sinhalese Buddhist
    mob attack on Sri Lankan Muslim shops in the region of Kandy, Central Province,
    left a Muslim person dead. (Reuters) (The New York Times)
  Disasters and accidents:
  - 2018 Antonov An-26 crash
  - A Russian Antonov An-26 transport plane crashes during an attempted landing at
    Khmeimim Air Base in Latakia, Syria, killing all 39 people onboard. (BBC)
  International relations:
  - 2018 North Korea–United States summit
  - South Korea states that North Korea is willing to hold talks with the United States
    on denuclearization on the Korean Peninsula. (Fox News)
  - U.S. President Donald Trump tweets that possible progress is being made in talks
    with North Korea. (The Washington Examiner)
  - 2018 inter-Korean summit
  - South Korea and North Korea agree to hold a summit in April 2018. (LocalNews8)
    (CNBC)
  - Assassination of Kim Jong-nam
  - The United States accuses North Korea of using VX to kill Kim Jong-nam, and imposes
    apparently symbolic sanctions against North Korea. (Reuters)
  - Foreign relations of New Zealand
  - New Zealand Prime Minister Jacinda Ardern announces that New Zealand will give
    NZ$10 million to Tonga to help with rebuilding after the country was struck by
    Cyclone Gita in February. (1 News)
  Law and crime:
  - Presidency of Donald Trump
  - The U.S. Office of Special Counsel says that Kellyanne Conway violated the Hatch
    Act of 1939 during two 2017 television interviews. (ABC News)
  - Stormy Daniels–Donald Trump scandal
  - Porn star Stormy Daniels sues Donald Trump, arguing that a nondisclosure agreement
    signed by her and Trump's lawyer Michael Cohen is invalid. (NBC News)
  - Free speech zones on college and university campuses, Safe-space
  - Violence breaks out as protesters storm an event organized by the King's College
    London Libertarian Society which featured Yaron Brook (Ayn Rand Institute) and
    the antifeminist YouTuber Sargon of Akkad. (The Telegraph)
  Politics and elections:
  - Politics of Russia
  - Deputy Prime Minister Arkady Dvorkovich replaces Deputy Prime Minister Vitaly
    Mutko as the Russian government executive in charge of the 2018 FIFA World Cup.
    (AP via ABC News)
  - Presidency of Donald Trump
  - U.S. National Economic Council director Gary Cohn announces his resignation. (BBC)
  Science and technology:
  - 2018 in spaceflight
  - SpaceX successfully launches Spanish communications satellite Hispasat 30W-6 into
    orbit on a Falcon 9 Full Thrust rocket from Cape Canaveral Air Force Station.
    (CBS News)
