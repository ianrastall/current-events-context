Date: '2018-03-26'
Source_URI: Portal:Current events/2018 March 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in the United Kingdom
  - Six alleged members of the banned neo-Nazi group National Action appear in court.
    One is accused of planning to kill MP Rosie Cooper and another is charged with
    inciting murder. (The Independent)
  Business and economy:
  - Economy of the United States
  - U.S. firearms and ammunition manufacturer Remington Arms files for chapter 11
    bankruptcy protection after amassing US$950 million worth of debt. (Bloomberg)
  - Following a collapse of a farm and a large release of Atlantic salmon into the
    Pacific, the state of Washington bans the farming of Atlantic salmon in their
    territorial waters. (NPR)
  - China launches an oil futures market, with contracts denominated in yuan, in a
    bid to compete with oil benchmarks from the United States and Europe. (MarketWatch)
  Disasters and accidents:
  - 2018 Kemerovo fire
  - Witnesses and Russia's Investigative Committee say the Winter Cherry complex's
    exits were blocked and there were no alarms during the disaster. (BBC)
  - US-Bangla Airlines Flight 211
  - The death toll rises to 52 people as a survivor dies in hospital. (Khaleej Times)
  - 2018 New York City Eurocopter AS350 crash
  - The US National Transportation Safety Board releases a preliminary investigative
    report containing new information on the accident, in which five passengers drowned
    when they were trapped in the wreckage. (CNN)
  - 2017–18 Volvo Ocean Race
  - A British yachtsman falls overboard from Sun Hung Kai/Scallywag. A search and
    rescue operation launches, with one ship diverting from over 400 nautical miles
    away. (BBC)
  - History of autonomous cars
  - The governor of Arizona suspends all statewide-testing of Uber autonomous cars
    following the March 19 fatal accident involving Uber self-driving car research.
    (The Verge)
  - A same-sex couple and three of their adopted children have been found dead at
    the bottom of a cliff at the coast of northern California, along with the wreckage
    of their SUV. After further investigation, authorities eventually deduced that
    it was very likely that the couple, which was previously known to have abused
    their children, intentionally drove off the cliff with them. (CNN)
  International relations:
  - Reactions to the poisoning of Sergei and Yulia Skripal
  - More than 100 Russian diplomats are expelled from over 20 countries. (BBC)
  - U.S. President Donald Trump orders the closure of the Russian consulate in Seattle.
    (BBC)
  - European Council President Donald Tusk and European Commission President Jean-Claude
    Juncker conclude talks with Turkish President Recep Tayyip Erdoğan. The parties
    say they have been unable to agree on human rights issues but pledge to hold more
    talks. (The Financial Times)
  - A letter from 59 US Senators is sent to Polish Prime Minister Mateusz Morawiecki
    criticising proposed legislation on reparations to Holocaust victims. The Senators
    say the bill will discriminate against victims and descendants who had emigrated.
    (The Times of Israel)
  Law and crime:
  - Crime in France
  - French police detain two men in connection with the murder of an 85-year-old Holocaust
    survivor who was found in the burned remains of her apartment. The prosecutor's
    office is investigating if the killing was "motivated by the real or supposed
    adherence to a religion". (Reuters)
  - Carbanak
  - Spanish police in Alicante arrest the suspected leader of a bank hacking scheme
    believed to have stolen over €1 billion. (Radio Free Europe/Radio Liberty)
  - Carcassonne and Trèbes attack
  - In regards to the March 23 attack that killed four people, French state prosecutor
    François Molins charges attacker Radouane Lakdim's 18-year-old girlfriend with
    terrorist conspiracy. (The Guardian)
  Politics and elections:
  - Egyptian presidential election, 2018
  - The Egyptian electorate vote in their presidential election, with incumbent President
    Abdel-Fattah el-Sissi facing only one opponent. (The Washington Post)
  Science and technology:
  - Discoveries of exoplanets
  - ArXiv publishes research that a gas giant may be orbiting a brown dwarf. The exoplanet,
    designated OGLE-2017-BLG-1522Lb, orbits its host at a distance of 0.59 AU and
    could be the first known gas giant to have formed inside the protoplanetary disk
    of a brown dwarf. (Phys.org)
