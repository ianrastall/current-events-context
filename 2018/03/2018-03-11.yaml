Date: '2018-03-11'
Source_URI: Portal:Current events/2018 March 11
Intelligence_Payload:
  Disasters and accidents:
  - 2017–18 South Pacific cyclone season
  - Cyclone Hola makes landfall in New Zealand. (Newshub)
  - 2018 New York City helicopter crash
  - A helicopter crash in Manhattan's East River kills five people. (ABC News)
  - 2018 Bombardier Challenger 604 crash
  - A private plane from Sharjah to Istanbul crashes in the Zagros Mountains in Iran,
    killing Turkish socialite Mina Başaran along with, according to Iranian state
    media, ten other people on board. (The National UAE), (BBC)
  Law and crime:
  - Visa policy of the United Kingdom
  - Far-right activist and journalist Lauren Southern is detained at Calais and prevented
    from entering the United Kingdom, with the reason given by the UK Home Office
    that her presence 'was not conducive to the public good'. (London Evening Standard),
    (Fox News)
  - 2018 Vienna embassy stabbing
  - An Austrian soldier was stabbed and injured in front of the Iranian embassy in
    Vienna. The attacker, which had Islamist sympathies according to the authorities,
    was shot dead. (Reuters)
  Politics and elections:
  - 2018 National People's Congress
  - China's National People's Congress approves the removal of presidential term limits,
    in a move that allows current president Xi Jinping to remain president for life.
    (BBC)
  - Chilean general election, 2017
  - Sebastian Piñera takes office for the second time as President of Chile. (SBS)
  - 2018 anti-Muslim riots in Sri Lanka
  - The suspension of Facebook remains in place until the riots end. (The Sunday Times)
  Sports:
  - College basketball in the United States
  - 'The field for the NCAA Division I Men''s Tournament is announced. The top overall
    seed is Virginia, with Villanova, Kansas, and Xavier as the other #1 seeds. (ESPN)'
