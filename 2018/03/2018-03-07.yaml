Date: '2018-03-07'
Source_URI: Portal:Current events/2018 March 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Vienna stabbing
  - 'Two connected stabbings occurred in Vienna, Austria: three people were seriously
    injured outside a Japanese restaurant, and one man in a later stabbing. The perpetrator
    was arrested. (The Independent)'
  Arts and culture:
  - A message in a bottle found in Australia is confirmed to have been adrift for
    almost 132 years, making it reportedly the oldest known message in a bottle. (ABC Online)
  Disasters and accidents:
  - Accidents and incidents involving helicopters
  - A Russian Border Guard Service Mil Mi-8 crashes in Chechnya, killing at least
    eight people. (TASS)
  - March 6–8, 2018 nor'easter
  - A second winter storm occurs in the East Coast of the United States, only a few
    days after another storm. (The Weather Company)
  International relations:
  - Australia–East Timor relations
  - Australia and East Timor sign a treaty for a permanent maritime border in the
    Timor Sea, ending a decade-long dispute over rights to the sea's rich oil and
    gas reserves. (BBC)
  Law and crime:
  - Hate crime in the United Kingdom
  - Paul Golding and Jayda Fransen, leader and deputy of the British far-right organization
    Britain First, are convicted of hate crimes for posting things deemed offensive
    online. Golding is sentenced to 36 weeks in prison and Fransen to 18 weeks in
    prison for promoting Islamophobic activities and harassment. (The Independent)
    (BBC)
  - Crime in the United States
  - Former United States Department of Justice attorney Jeffrey Wertkin is sentenced
    to 2½ years in prison for what prosecutors called the DoJ's "most serious" example
    of public corruption, which involved stealing more than 40 whistleblower fraud
    cases in 2016 with intentions to sell the secret information to companies under
    federal investigation. (The Washington Post)
  Politics and elections:
  - Aftermath of the Stoneman Douglas High School shooting
  - Florida's House of Representatives votes 67–50 to approve a gun and school safety
    bill that would raise the age to buy firearms from 18 to 21, sending the bill
    to Governor Rick Scott to sign into law. The measure also prohibits bump stocks,
    and creates a program for the arming of some teachers. (NBC News)
  Science and technology:
  - Observational astronomy
  - European astronomers observe the "birth" of a symbiotic X-ray binary, IGR J17329-2731,
    described as a transient, from the Galactic Center using INTEGRAL space telescope.
    (European Space Agency) (The Astronomer's Telegram)
  - Asteroid close approaches to Earth in 2018
  - Near-Earth asteroid makes a flyby past Earth. (USA Today)
  - Forensic anthropology
  - Emeritus University of Tennessee Professor Richard Jantz claims that bones found
    in 1940 on Nikumaroro, Kiribati, almost certainly belong to lost aviation pioneer
    Amelia Earhart. (Newshub)
