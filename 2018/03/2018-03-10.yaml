Date: '2018-03-10'
Source_URI: Portal:Current events/2018 March 10
Intelligence_Payload:
  Business and economy:
  - Economy of the Democratic Republic of the Congo
  - Congolese President Joseph Kabila signs a law that increases taxes on mining and
    government royalties on international mining companies working in DR Congo, including
    on the mining of cobalt, despite the opposition from foreign companies. (BBC)
  Disasters and accidents:
  - East-Central Africa Division of Seventh-day Adventists
  - Lightning strikes a Seventh-day Adventist Church in Nyaruguru District, Rwanda,
    killing 16 people and injuring dozens. (BBC)
  Health and environment:
  - Environmental issues in Chile
  - Outgoing Chilean President Michelle Bachelet signs a new law which creates nine
    marine reserves. The new legislation will increase the area of sea under state
    protection from 4.3% to 42.4%. (BBC)
  International relations:
  - 2017–18 North Korea crisis
  - North Korea–United States relations
  - Jeju Island emerges as a possible location for U.S.–North Korea summit talks in
    May. (The Hankyoreh)
  - North Korea–Sweden relations
  - North Korean foreign minister Ri Yong-ho will visit Sweden and meet with Deputy
    Prime Minister Margot Wallström. (Reuters via The Japan Times)
  Law and crime:
  - Aftermath of the Stoneman Douglas High School shooting
  - The NRA is suing Florida after it passed a gun control law which would raise the
    minimum age for purchasing guns from 18 to 21. (CNN) (BBC)
  - The U.S. Department of Justice submits a regulation to ban bump stocks, a modification
    to semi-automatic guns that allows the user to fire at a faster rate. (Reuters)
