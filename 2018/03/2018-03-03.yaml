Date: '2018-03-03'
Source_URI: Portal:Current events/2018 March 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Gazan officials say Israeli soldiers killed a Palestinian farmer on his own land
    in the Gaza Strip. An Israeli military spokesperson said that he got too close
    to the border fence. (Oman Times)
  - Turkish military operation in Afrin
  - According to the Syrian Observatory for Human Rights, at least 36 pro-Syrian government
    troops were killed in a Turkish airstrike in Afrin, Syria. (BBC)
  - Turkish troops and the Free Syrian Army seize control of the strategic town of
    Rajo, Syria, from YPG forces. (Al Masdar News) (The Guardian) (AP via San Francisco
    Chronicle)
  International relations:
  - Protectionism in the United States, United States–European Union relations
  - In a message on Twitter, U.S. President Donald Trump says the U.S. will apply
    a tax on cars made in the European Union if the E.U. "further" increases tariffs.
    (CNBC) (BBC)
  Law and crime:
  - '"Polish death camp" controversy'
  - Hours after the Polish so-called Holocaust Law about discussing of historical
    facts takes effect, the Polish League Against Defamation sues Argentinian newspaper
    Página/12, which it accuses of suggesting Poland was complicit in the Holocaust.
    (Reuters)
  - Murder of Ján Kuciak
  - On the day of the funeral of slain journalist Ján Kuciak, for lack of evidence,
    police release seven Italian nationals who are accused of links with the 'Ndrangheta
    mafia in a posthumously published investigative report by Kuciak. (Daily Star)
  Politics and elections:
  - Stoneman Douglas High School shooting
  - The Florida Senate rejects a bill to ban assault weapons and holds a moment of
    “silence and reflection” for the Parkland, Florida, victims. (The Washington Post)
  Sports:
  - Rules of association football
  - The International Football Association Board, which sets the rules for association
    football, approves the use of video assistant referees, which will be used at
    the 2018 FIFA World Cup in Russia. (BBC)
