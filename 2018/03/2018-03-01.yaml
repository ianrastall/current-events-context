Date: '2018-03-01'
Source_URI: Portal:Current events/2018 March 1
Intelligence_Payload:
  Business and economy:
  - Presidency of Donald Trump
  - U.S. President Donald Trump announces plans to impose tariffs on steel and aluminium
    imports. (BBC), (The Hill)
  Law and crime:
  - Crime in Norway, Crime in the United States
  - Police in Oslo, Norway, say that the FBI is assisting in the investigation into
    two forged nominations of Donald Trump for the Nobel Peace Prize. The impersonator
    allegedly used the same stolen identity twice. (Newser), (The Washington Post)
  - Terrorism in Turkey
  - Dilek Öcalan, MP for the pro-Kurdish HDP party, is sentenced to two and a half
    years in jail on charges of terror propaganda related to her participation in
    the 2016 funeral of a PKK fighter. Nine HDP MPs are currently in jail. (NRT)
  Politics and elections:
  - Politics of Iraq
  - The Parliament of Iraq votes to oblige the federal government to set a schedule
    for the withdrawal of foreign troops. (Iraq News)
  - Russian interference in the 2016 United States elections
  - An alleged Senate Intelligence Committee report states that a House Intelligence
    Committee Republican was behind the leak to Fox News of private text messages
    between a Russian-connected lawyer and Senator Mark Warner, the committee vice-chairman,
    concerning an attempt to contact Christopher Steele, author of the Trump–Russia
    dossier. Committee chairman Richard Burr later denied the leak report. (The New
    York Times), (Slate) (The Hill)
  - 2018 opening of regular sessions of the National Congress of Argentina
  - Argentine President Mauricio Macri delivers a speech in the Congress to start
    the regular sessions for 2018. (Reuters)
  Science and technology:
  - Discoveries of exoplanets
  - NASA astronomers use the Hubble and Spitzer space telescopes in research implying
    that "hot Saturn" (high surface-atmosphere temperatures and gas giant-mass) exoplanet
    WASP-39b, located 700 light-years from Earth, has a large amount of water molecules
    in its atmosphere. (NASA)
  Sports:
  - 2018 NHL Stadium Series
  - The Washington Capitals defeated the Toronto Maple Leafs in a special outdoor
    hockey match, 5–2, at the Navy–Marine Corps Memorial Stadium in Annapolis, Maryland.
    (The Washington Post)
