Date: '2018-10-03'
Source_URI: Portal:Current events/2018 October 3
Intelligence_Payload:
  Business and economy:
  - Toys "R" Us lenders cancel the bankruptcy auction of its brand name and other
    intellectual property assets and instead plan to revive the Toys "R" Us and Babies
    "R" Us brand names. (CNBC)
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - The confirmed death toll from an earthquake and tsunami in Indonesia has risen
    to 1,407. (Reuters)
  - The Soputan volcano on Sulawesi erupts, sending ash columns into the air. (South
    China Morning Post)
  - Six rescue divers drown after they are caught in a whirlpool during a mission
    to locate and rescue a teenager from a disused mining pool in Malaysia. (BBC)
  International relations:
  - United States withdrawal from the Joint Comprehensive Plan of Action
  - The International Court of Justice orders the U.S. to lift sanctions against Iran
    related to the import of humanitarian goods and civil aviation safety. (The Guardian)
  - U.S. Secretary of State Mike Pompeo says that the United States is terminating
    the 1955 Treaty of Amity with Iran. (Fox News)
  - The United States announces its withdrawal from the optional protocol concerning
    compulsory settlement of disputes of the Vienna Convention on Diplomatic Relations.
    (Reuters)
  Law and crime:
  - Florence, South Carolina shooting
  - Seven police officers are shot, one fatally, by a gunman in Florence, South Carolina,
    United States. Five civilians were also injured. (CNN)
  - Immigration policy of Donald Trump, Immigration to the United States
  - A federal court in California blocks the Trump administration from terminating
    the Temporary Protected Status program that allows immigrants from four countries
    to live and work in the United States. (NPR)
  - Former Member of Parliament and Member of the National Assembly for Wales, Simon
    Thomas, pleads guilty to three counts of making indecent images of children. (BBC)
  - Pardon of Alberto Fujimori
  - A Peruvian court reverses the pardon granted to former Peruvian President Alberto
    Fujimori and orders that Fujimori must be returned to prison. (BBC)
  Politics and elections:
  - Politics of France
  - French President Emmanuel Macron accepts the resignation of Minister of the Interior
    Gérard Collomb. (ABC News) (Le Parisien)
  - Presidency of Rodrigo Duterte, Human Security Act
  - The Congress of the Philippines proposes a new law that could give Philippines
    President Rodrigo Duterte wide-ranging powers similar to Ferdinand Marcos. (SCMP)
  Science and technology:
  - Discoveries of exoplanets
  - Kepler-1625b, an exoplanet proposed in 2017 to be orbited by an exomoon, the first
    possible example of a moon orbiting a planet in another stellar system, is confirmed
    with observations from the Hubble Space Telescope. (Space.com)
  - The Federal Emergency Management Agency sends its first ever "Presidential Alert",
    a Wireless Emergency Alerts test message, at 2:18 p.m. EDT (18:18 UTC) to most
    cell phones in the United States. (Time)
  - The Nobel Prize in Chemistry is awarded to George P. Smith, Frances Arnold, and
    Greg Winter for the design of molecules with a range of uses by means that mimic
    natural selection. (The New York Times).
  Sports:
  - In chess, Arkady Dvorkovich is elected as president of the FIDE. (Associated Press)
