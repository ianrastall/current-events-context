Date: '2018-10-16'
Source_URI: Portal:Current events/2018 October 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - The United States Africa Command (AFRICOM) says that a U.S. airstrike has killed
    around 60 al-Shabaab militants near Harardhere in central Somalia. (BBC)
  Disasters and accidents:
  - At least seven people are killed and more than 80 others injured after a train
    derails in Bouknadel, Morocco. (Reuters)
  - The death toll of an accidental explosion in Aba, Nigeria, rises to 200. Over
    2,000 people protest, claiming that the pipeline explosion was caused by NNPC's
    negligence. (Vanguard News)
  - Two Myanmar Air Force F-7 fighter jets crash into a broadcast tower in Magway,
    Myanmar, resulting in the deaths of both pilots and an 11-year-old girl, who was
    killed by falling debris. (New York Times)
  International relations:
  - United States sanctions against Iran
  - The United States Treasury Department announces new sanctions on 22 Iranian corporations
    and banks. (Bloomberg)
  - Australia–Israel relations
  - Australian Prime Minister Scott Morrison announces that his government is considering
    recognising Jerusalem as the Israeli capital and relocating its embassy accordingly,
    in line with the United States, drawing local criticism and sparking outrage from
    members of the opposition. The announcement comes days before a by-election in
    which the governing party's candidate is Dave Sharma, a former ambassador to Israel.
    (BBC)
  - Saudi Arabia–United States relations, Killing of Jamal Khashoggi
  - United States Secretary of State Mike Pompeo meets in Riyadh with Saudi Arabia
    King Salman to express concerns about the disappearance of Saudi Arabian journalist
    Jamal Khashoggi. (Fox News) (Reuters)
  - Senior U.S. Senator Lindsey Graham states that Mohammed bin Salman has murdered
    Khashoggi and that the country's crown prince has "got to go". (AOL) (CNBC)
  Politics and elections:
  - Armenian Prime Minister Nikol Pashinyan resigns from his post in order to dissolve
    the National Assembly and force early elections by the end of the year. (RFE/RL)
