Date: '2018-10-29'
Source_URI: Portal:Current events/2018 October 29
Intelligence_Payload:
  Arts and culture:
  - Syrian Civil War
  - The National Museum of Damascus reopens to the public six years after it was closed
    due to the war. (BBC)
  Disasters and accidents:
  - Lion Air Flight 610
  - A Boeing 737 MAX 8, en route from Jakarta to Pangkal Pinang, crashes into the
    ocean near Karawang, Indonesia, killing all one hundred eighty-one passengers
    and eight crew. (The Straits Times)
  - 2018 European floods
  - Heavy floods and strong winds continue to affect all of Italy. For the duration
    of the disaster across the country, the death toll is eleven people. (Il Messaggero)
  - 2018 Chongqing bus crash
  - A bus veers off the Second Wanzhou Yangtze River Bridge and plunges into the Yangtze
    River in Chongqing, China after its driver was distracted by an unruly passenger,
    killing at least 13 people. (BBC)
  International relations:
  - Brexit
  - AFM, the financial markets authority in the Netherlands, says it will prepare
    for financial trading taking place on its infrastructure in the event the United
    Kingdom leaves the European Union. (Reuters)
  Politics and elections:
  - Politics of Germany, Hessian state election, 2018
  - Following a disappointing state election on Sunday, German chancellor Angela Merkel
    announces that she will not seek re-election as party head at a conference in
    early December and as German chancellor in 2021. (CNBC)
  Sports:
  - 2018 Formula One World Championship
  - In auto racing, Lewis Hamilton clinches his fifth World Drivers' Championship
    with a fourth-place finish at the Mexican Grand Prix. Hamilton ties Juan Manuel
    Fangio for second place in drivers' championships, behind only Michael Schumacher
    with seven. (BBC)
  - 2018 World Series
  - In baseball's World Series, the Boston Red Sox defeat the Los Angeles Dodgers
    in the fifth game, winning the series four games to one and claiming the team's
    ninth World Series title. Red Sox first baseman Steve Pearce is named the Series'
    Most Valuable Player. (The New York Times)
