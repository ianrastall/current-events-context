Date: '2018-10-28'
Source_URI: Portal:Current events/2018 October 28
Intelligence_Payload:
  Business and economy:
  - Pittsburgh synagogue shooting
  - American online payments system company PayPal bans American social media site
    Gab, known for its association with the alt-right movement, while Joyent, Gab's
    American hosting provider, states that they will terminate their service tomorrow.
    The move comes after it was revealed that the suspect in yesterday's 11 deaths,
    Robert Bowers, was an active member on the social network. (CNET)
  - American computer company IBM announces plans to acquire American software company
    Red Hat for US$34 billion. (CNBC)
  Disasters and accidents:
  - A landslide in Isola di Capo Rizzuto of Calabria, Italy, kills ten construction
    workers while they repair a sewer. (Architecture, Building & Construction News)
  - 2018 European floods
  - Heavy floods and strong winds in the comune of Manduria in Taranto, Italy, destroys
    several buildings and roads, leaving at least one person injured. (Quotidiano
    Puglia)
  International relations:
  - India–Pakistan relations
  - The Supreme Court of Pakistan reimposes a ban on all Indian-produced content on
    Pakistani television channels. (Radio Free Europe/Radio Liberty)
  Law and crime:
  - Japanese company Hitachi Chemical states that it falsified inspections for a material
    used in semiconductors. (Reuters)
  Politics and elections:
  - Brazilian general election, 2018
  - Brazilians elect Jair Bolsonaro of the Social Liberal Party as president, with
    55% of the vote, in the second round of the presidential election. (BBC)
  - Georgian presidential election, 2018
  - Georgian citizens vote in the last presidential election to be decided by direct
    election. (RFE/RL)
  - Hessian state election, 2018
  - Voters in the German state of Hesse go to the polls to elect a new legislature.
    The election is widely considered a test for Angela Merkel's ruling CDU–SPD coalition.
    (BBC)
  - Both the CDU's and the SDP's swing drop by a little over 10%, while The Greens
    surge to second place with 19.5% of the vote and the AfD place fourth with 12%
    of the vote. (BBC)
  - New International Airport for Mexico City
  - A nation-wide referendum called upon by Mexico's president-elect Andrés Manuel
    López Obrador results in a majority of votes for the cancellation of the new airport
    and in support of upgrades to the current Mexico City and Toluca airports as well
    as the adapting of Santa Lucía Military Base's runways for civilian aircraft use.
    (The Wall Street Journal)
  Science and technology:
  - Private spaceflight
  - Beijing-based private development space launch company LandSpace's three-stage
    rocket, Zhuque-1, carrying a satellite named Future built for state media China
    Central Television, fails to reach orbit. (Reuters)
