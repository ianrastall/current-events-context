Date: '2018-10-13'
Source_URI: Portal:Current events/2018 October 13
Intelligence_Payload:
  Armed attacks and conflicts:
  - War in Afghanistan
  - A motorcycle rigged with explosives is detonated at an election rally in northeastern
    Afghanistan, killing at least 14 people, including civilians and security forces.
    (ABC News)
  - Somali Civil War
  - Two blasts in the town of Baidoa in Somalia kill at least 15 people and injure
    more than 30 others. (VOA)
  Disasters and accidents:
  - Five South Korean climbers and four Nepali guides die after a snowstorm destroys
    their camp on a Himalayan peak in Nepal. (BBC)
  - At least 27 people die and many others disappear after heavy floods and landslides
    in Sumatra, Indonesia. (The Canberra Times)
  - At least 50 people are killed and 30 others injured when a pipeline catches fire
    and explodes in southeast Nigeria. (Ripples Nigeria)
  - Eleven people are killed after their vehicle and a lorry collide head-on in Thessaloniki,
    Greece. (BBC)
  Law and crime:
  - Venezuela releases political activist Lorent Saleh due to his poor mental health,
    after a prolonged campaign by and talks with the Spanish Office for Latin America.
    Saleh had been detained for over four years by secret services in Venezuela without
    trial, and is being transferred to Spain. (BBC)
  - Acting on an anonymous tip, Michigan state inspectors discover the bodies of 11
    badly-decomposed infants inside the ceiling of a former funeral home in Detroit.
    (UPI)
