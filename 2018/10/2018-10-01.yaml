Date: '2018-10-01'
Source_URI: Portal:Current events/2018 October 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Eastern Euphrates missile strike
  - Iran fires six ballistic missiles from its own territory at ISIL targets near
    the Euphrates river valley in eastern Syria, in response to the Ahvaz military
    parade attack. (The Independent)
  Business and economy:
  - Danish airline Primera Air collapses into bankruptcy and announces that it is
    ceasing all operations at midnight on Monday. (BBC)
  Disasters and accidents:
  - 2018 Naga, Cebu landslide
  - The death toll of the landslide in Cebu, Philippines rise to 77. Eight others
    are still missing and presumed dead. (ABS-CBN News)
  - Thirteen people are killed and at least 30 others are injured when a military
    transport truck flips over on a major road in Freetown, Sierra Leone. (Channel
    NewsAsia)
  - 2018 Pacific hurricane season
  - Hurricane Walaka becomes a category 5 hurricane. It is expected to hit the Johnston
    Atoll. (Star-Advertiser)
  International relations:
  - North Korea–South Korea relations
  - North Korea and South Korea begin removing landmines and other explosives from
    the Korean Demilitarized Zone. (CBS News)
  Law and crime:
  - A hand grenade explodes in a night club in the city of Yambio in South Sudan,
    killing at least ten people and injuring dozens of others. The police commissioner
    in the city confirmed that the explosion is not related to the ongoing civil war
    in the country. (Channel NewsAsia)
  Politics and elections:
  - 2017–18 Spanish constitutional crisis
  - On the one-year anniversary of the Catalan independence referendum, protesters
    block roads, train tracks and the entrance of the Barcelona stock exchange and
    students go on strike. (The Guardian)
  - After an independentist demonstration, the Mossos d'Esquadra evicts riots demanding
    the implantation of the Republic before the main door of the Catalan Parliament
    in a failed attempt to assault it. (La Vanguardia) (BBC)
  - Mirko Tomassoni and Luca Santolini take office as Captains Regents of San Marino.
    (San Marino RTV)
  - Mauricio Vila Dosal takes office as Governor of the Mexican state of Yucatán.
    (Diario de Yucatán)
  Science and technology:
  - The Nobel Prize in Physiology or Medicine is awarded to James P. Allison and Tasuku
    Honjo for their discoveries in cancer therapy. (The New York Times)
  - The discovery of a third Sednoid, 2015 TG387, is announced. The wide asteroid
    never approaches less than 65 astronomical units from the Sun, more than twice
    Neptune's distance. (Nature)
