Date: '2018-10-11'
Source_URI: Portal:Current events/2018 October 11
Intelligence_Payload:
  Disasters and accidents:
  - At least 41 people are killed after a river bursts its bank in Bududa, Uganda.
    Many more are injured and dozens are displaced. (BBC)
  - 2018 European floods
  - 'Heavy floods affect France and Italy: in the French city of Sainte Maxime, two
    people drown after their vehicle is swept away by floodwater. In the Italian city
    of Cagliari, a woman is found dead inside her car, while another man is missing.
    A bridge also collapses and roads are damaged. (BBC)'
  - 2018 Atlantic hurricane season
  - Hurricane Michael is downgraded to a tropical storm, but tornadoes are spotted
    in Georgia and Florida. (Business Insider)
  - Eight children die and three are injured when the wall of a house collapses in
    the suburban area of Sukkur, Pakistan. (Dawn News) (Samaa TV)
  - A mudslide in the central Colombian town of Marquetalia results in at least twelve
    deaths. (AP via ABC America)
  - The collapse of a shopping mall under construction in the Mexican city of Monterrey
    results in at least seven deaths and nine people missing. 15 others are injured.
    (AP via ABC News America)
  - Three people are killed and two are injured after a lorry crashes into a minibus
    in Thatcham, England. (BBC)
  International relations:
  - Russia–Ukraine relations, Schism of 2018
  - The Ecumenical Patriarchate of Constantinople plans to recognize the autocephaly
    of two Ukrainian Orthodox Churches, a move welcomed by Ukrainian leaders and denounced
    as "catastrophic" by the Russian Orthodox Church. (RFE/RL)
  Law and crime:
  - Keiko Fujimori, leader of the opposition in the Congress of Peru and daughter
    of former President Alberto Fujimori, is arrested on charges related to illicit
    campaign finance received from the Odebrecht corporation. (BBC News)
  - Arrest of Juan Requesens, Human rights in Venezuela
  - The Inter-American Commission of Human Rights releases an official charge for
    the protection of Juan Requesens, laying out actions that the Venezuelan government
    must take to ensure the imprisoned politician's welfare, specifically stating
    that he must not be "object to acts of violence against [his health]". This comes
    after a two-month investigation, and days after the death in custody of another
    Venezuelan politician. (Voice of America), (Inter-American Commission for Human
    Rights)
  Science and technology:
  - Soyuz MS-10, carrying a cosmonaut and an astronaut to the International Space
    Station, is forced to make an emergency landing in Kazakhstan after a failure
    with its Soyuz-FG rocket. (Reuters)
  - Discoveries of exoplanets
  - Kepler 159d, an exoplanet with the same size as Saturn, is discovered by University
    of Western Ontario student Chris Fox and professor Paul Wiegert. (Phys.org) (CBC
    CA)
  Sports:
  - United States at the 2020 Summer Olympics
  - Golden State Warriors coach Steve Kerr, Indiana Pacers head coach Nate McMillan,
    and Villanova men's basketball head coach Jay Wright are expected to be assistants
    for the United States basketball team at the 2020 Summer Olympics in Tokyo. (Los
    Angeles Times) (NBC Olympics)
