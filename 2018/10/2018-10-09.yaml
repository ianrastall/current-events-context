Date: '2018-10-09'
Source_URI: Portal:Current events/2018 October 9
Intelligence_Payload:
  Arts and culture:
  - American Music Awards of 2018
  - American singer Taylor Swift wins four trophies, including Artist of the Year,
    and holds 23 American Music Awards, beating Whitney Houston. (BBC News) (Sky News)
  Disasters and accidents:
  - 2018 Atlantic hurricane season
  - Hurricane Michael strengthens to a category 2 storm with 110 mph winds as it continues
    to ascend through the Florida Panhandle. (Washington Post) (Tampa Bay Times)
  - A sinkhole in Dazhou, China, kills four people. (NY Post)
  - 2018 European floods
  - At least 12 people die in flash flooding on the Spanish island of Mallorca, including
    nationals of at least 3 countries. A five-year-old child is missing. (BBC), (El
    País)
  - Pipeline accidents in Canada
  - In British Columbia, communities are forced to evacuate after a pipeline operated
    by Enbridge explodes near Prince George. (Digital Journal) (Toronto Star)
  Law and crime:
  - Former Guatemalan Vice President Roxana Baldetti is sentenced to 15 years and
    6 months in prison for fraud in a system to clean the polluted Lake Amatitlán.
    Baldetti still has four pending lawsuits and extradition to the United States.
    (The Guardian)
  International relations:
  - Foreign relations of the Holy See, Foreign relations of North Korea
  - North Korean leader Kim Jong-un invites Pope Francis to Pyongyang, and said he
    would be "warmly welcomed" to North Korea. (New York Times) (UPI)
  Politics and elections:
  - Nikki Haley announces her resignation as the United States Ambassador to the United
    Nations, effective at the end of the year. (NBC News)
