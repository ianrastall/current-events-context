Date: '2018-10-05'
Source_URI: Portal:Current events/2018 October 5
Intelligence_Payload:
  Arts and culture:
  - 'The Swedish Academy names two new members: Swedish supreme court justice Eric
    Runesson, and Swedish-Iranian writer and poet Jila Mossaed. (Reuters)'
  Business and economy:
  - Defense industry of Russia
  - India buys the S-400 missile system, potentially facing CAATSA U.S. sanctions.
    (CNN)
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - The confirmed death toll from an earthquake and tsunami in Indonesia has risen
    to 1,571. (First Post)
  - At least 13 passengers are killed in a head-on bus collision in Tver, Russia.
    The bus driver and another passenger are injured. (The Moscow Times)
  - Three people are killed and many others are injured after heavy floods strike
    the Italian region of Calabria. A bridge collapses and landslides also occur.
    (La Stampa)
  International relations:
  - 2018 Nobel Peace Prize
  - Denis Mukwege and Nadia Murad are awarded the Nobel Peace Prize "for their efforts
    to end the use of sexual violence as a weapon of war and armed conflict." (NBC
    News)
  Law and crime:
  - Corruption in South Korea
  - Lee Myung-bak is sentenced to 15 years in jail and US$20 million in fines and
    forfeiture, on charges of bribery, embezzlement and abuse of power. All four living
    former Presidents of South Korea now have been convicted. (Reuters via Malay Mail)
  - Shooting of Laquan McDonald
  - A Chicago police officer, Jason Van Dyke, is convicted of second degree murder
    in a historic jury verdict. (Chicago Tribune)
  - French police launch an investigation into the disappearance of Meng Hongwei,
    the president of Interpol. He was reported missing after traveling to his native
    country of China last week. (The Independent)
