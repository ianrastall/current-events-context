Date: '2018-10-21'
Source_URI: Portal:Current events/2018 October 21
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Yilan train derailment
  - At least 18 people are killed and 187 are injured after a train derails in Yilan
    County, Taiwan. (BBC)
  - At least 30 people are injured after a floor collapses at an apartment in South
    Carolina. (CBS News)
  - 2018 Pacific hurricane season
  - Hurricane Willa strengthens to a category 4 hurricane off the Pacific Coast of
    Mexico. (CBS News)
  - Earthquakes in Canada, Earthquakes in 2018
  - Three large earthquakes measuring between magnitude 6.5 and magnitude 6.8 strike
    near Vancouver Island. No tsunami warning is issued. (Global News) (Spokesman)
  - Following the failure of Soyuz MS-10, the Russian-supplied Soyuz MS-11 for crew
    transport to the ISS is now rescheduled to occur on December 3, earlier than initially
    planned. (Interfax)
  International relations:
  - Israel–Jordan relations
  - King Abdullah II announces Jordan will reclaim two small plots of farmland territory
    leased to Israel under their 1994 peace treaty. (Reuters)
  Law and crime:
  - Six people are wounded at a street gang-related shooting near TIAA Bank Field
    before an NFL game, in which the Jacksonville Jaguars hosted the Houston Texans.
    (Chicago Suntimes) (US News)
  - A NATO spokesperson confirms Brigadier General Jeffrey D. Smiley as the American
    wounded by gunfire three days earlier during the attack in which Abdul Raziq Achakzai
    was assassinated. (ABC News)
