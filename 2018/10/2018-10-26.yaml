Date: '2018-10-26'
Source_URI: Portal:Current events/2018 October 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Israel responds to 40 Palestinian rockets with 80 air strikes on what Israel states
    are Iranian and Hamas-controlled weapon factories in Gaza. An Egypt-meditated
    ceasefire is announced by Islamic Jihad soon afterward. (Reuters)
  - Terrorism in Canada
  - The Immigration and Refugee Board of Canada orders Othman Hamdan, a Fort St. John
    man whose Facebook posts promoted the Islamic State, deported. The deportation
    is not immediate and requires additional events to occur. (CBC)
  Disasters and accidents:
  - Flash floods in southern Russia result in six deaths and one missing person. (WECT)
  Law and crime:
  - October 2018 United States mail bombing attempts
  - The FBI has confirmed that packages similar to those found earlier this week were
    sent to U.S. Senators Cory Booker and Kamala Harris. (CNBC) (San Francisco Gate)
  - Authorities are also investigating a packages addressed to former Director of
    National Intelligence James Clapper and billionaire Tom Steyer. (APnews.com) (San
    Francisco Gate)
  - A suspect, Cesar Sayoc, is taken into custody in Plantation, Florida. (NBC News)
    (San Francisco Gate)
  - A man in Salisbury, Wiltshire, England, is arrested for attempting to steal one
    of four existing original copies of Magna Carta from Salisbury Cathedral. (NPR)
    (BBC News)
  - 2018 Freiburg gang rape
  - Authorities arrest eight men after a gang rape in Freiburg, Germany on 14 October,
    with police seeking more men. (The New York Times)
  Politics and elections:
  - 2018 Irish presidential election and Blasphemy Referendum
  - Voters re-elect Michael D. Higgins as President of Ireland and vote to remove
    the offense of blasphemy from the Constitution, with winning margins of over 30%
    in both votes, according to exit polls. (The Guardian) (BBC)
  - 2018 Sri Lankan constitutional crisis
  - Prime Minister of Sri Lanka Ranil Wickremasinghe is replaced by Mahinda Rajapakse.
    (BBC) (The Guardian)
  Sports:
  - 2018 World Series
  - In baseball, game 3 of the World Series, in which the Boston Red Sox lose to the
    Los Angeles Dodgers by a score of 3–2, extends to 18 innings and lasts 7 hours
    and 20 minutes, becoming by far the longest game in World Series history. (USA
    Today)
