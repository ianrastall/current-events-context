Date: '2018-10-25'
Source_URI: Portal:Current events/2018 October 25
Intelligence_Payload:
  Arts and culture:
  - The United Kingdom opens all combat roles in the British Armed Forces, including
    special forces, to women for the first time. (Reuters)
  Disasters and accidents:
  - 2018 Pacific typhoon season
  - Super Typhoon Yutu makes landfall on Saipan and Tinian in the Northern Mariana
    Islands as a category 5 storm. The typhoon becomes the most powerful tropical
    cyclone to strike any part of the United States since 1935. (Saipan Tribune),
    (The Washington Post)
  - Flash floods near the Dead Sea in Jordan kill at least 21 people including 19
    children on a school trip and injure 43 others. (Al Jazeera)
  - On its first day of service the Sheffield Supertram's new tram-train is struck
    by a truck and derailed. (ITV), (Express)
  Law and crime:
  - October 2018 United States mail bombing attempts
  - The New York City Police Department recovers a package similar to those found
    earlier this week at the office of TriBeCa Productions, which is used by actor
    Robert De Niro. (NBC New York)
  - The FBI is investigating two packages found at postal facilities in Delaware,
    sent to former Vice President Joe Biden. (Vice)
  - The Miami-Dade Police Department and federal authorities believe several of the
    packages went through a mail processing and distribution center in Opa-locka,
    Florida and are currently searching the facility with a bomb squad and K-9 unit.
    (CNN)
  - Corruption in Spain
  - Former IMF Director and ex-Deputy Prime Minister of Spain Rodrigo Rato enters
    prison to serve a sentence of 4 and a half years for a crime of embezzlement.
    (The New York Times)
  - Me Too movement
  - Labour peer Peter Hain uses parliamentary privilege to name Philip Green as the
    British businessman who used an injunction to prevent allegations of sexual harassment
    against him being published in The Daily Telegraph. (The Guardian)
  Politics and elections:
  - Politics of Ethiopia
  - United Nations diplomat Sahle-Work Zewde becomes the first female President of
    Ethiopia in its history after the resignation of Mulatu Teshome. (BBC)
  - U.S. President Donald Trump announces his plan to lower American prescription
    drug prices. (The Washington Post)
  Science and technology:
  - Climate of Mars
  - A new study finds that water on Mars may contain more oxygen than previously thought.
    (Times Now News)
