Date: '2018-10-27'
Source_URI: Portal:Current events/2018 October 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Pittsburgh synagogue shooting
  - A gunman opens fire at the Tree of Life - Or L'Simcha Congregation synagogue in
    Pittsburgh, Pennsylvania, killing at least 11 people. The perpetrator 46-years
    old Robert Bowers was an active user of the social media service Gab where he
    had posted anti-Semitic and racist content as well as one before the shooting
    that said "HIAS likes to bring invaders in that kill our people. I can't sit by
    and watch my people get slaughtered. Screw your optics, I'm going in". (BBC),
    (CBC)
  Disasters and accidents:
  - 2018 Leicester City F.C. helicopter crash
  - An AgustaWestland AW169 helicopter with Vichai Srivaddhanaprabha on board crashes
    shortly after take-off from the King Power Stadium Leicester, United Kingdom.
    (BBC)
  - A seven-alarm fire destroys an apartment building in Boston, Massachusetts, injuring
    11 people and displacing 114 residents. (The Boston Globe)
  Politics and elections:
  - Gabonese legislative election, 2018
  - Gabonese citizens vote in the second round of the latest legislative election.
    (News24)
  - ALDE European Parliament group expels Catalan nationalist party PDECat amid corruption
    scandals that affect the CDC predecessor party. (El Periódico)
