Date: '2018-10-06'
Source_URI: Portal:Current events/2018 October 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Defense Minister of Israel Avigdor Lieberman says that Israel will reduce the
    fishing zone off the Gaza Strip from to as a reaction to the weekly Gaza border
    protests. Three Palestinians were killed in yesterday's protest, in which over
    20,000 protestors took part. (Al Jazeera)
  Arts and culture:
  - At an auction in London, the painting Girl with Balloon by Banksy self-destructs
    through a built-in shredder hidden in the frame after selling for US$1.4 million.
    (NBC)
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - The death toll of the earthquake and tsunami that struck Sulawesi, Indonesia,
    rises to 1,649. More than 265 are missing. (The New York Times)
  - At least 50 people are killed and 100 others are injured after an oil tank truck
    collides with a vehicle on the Kinshasa—Matadi highway in Kisantu, Democratic
    Republic of the Congo. (NDTV)
  - At least 22 people are killed and 14 injured after a minibus falls into a gorge
    on the Srinagar Jammu National Highway in India's Jammu and Kashmir state. (Tribune
    of India)
  - 2018 Haiti earthquake
  - A magnitude 5.9 earthquake kills at least 12 people in northern Haiti. At least
    162 others are injured. (Miami Herald)
  - 2018 Schoharie, New York limousine crash
  - Twenty people are killed in Schoharie County, New York, when a stretch limousine
    fails to stop at an intersection, veers into a parking lot and strikes an empty
    vehicle, which in turn hits two pedestrians. All 17 passengers in the limousine
    are killed, along with the driver and the two pedestrians. (BBC)
  Law and crime:
  - Food Additives Amendment of 1958
  - The U.S. Food and Drug Administration bans the usage of seven artificial flavors
    as food additives. Six of them cause cancer in animals when used in "much higher"
    doses than the conditions of their intended use. (NPR)
  - Foreign fighters in the Syrian and Iraqi Civil Wars
  - Jack Letts, a British-Canadian Islamic State fighter held in Syria, faces deportion
    from Syria to Canada instead of the United Kingdom. (Al-Masdar News) (The Guardian)
  Politics and elections:
  - Gabonese legislative election, 2018
  - After long delays, voters in Gabon head to the polls for the first time since
    the controversial 2016 presidential election. (EWN)
  - Latvian parliamentary election, 2018
  - Voters in Latvia go to the polls to vote for a new parliament. The governing coalition
    loses its majority with two new parties Who owns the state? and the New Conservative
    Party becoming the second and third biggest parties behind Social Democratic Party
    "Harmony". (Deutsche Welle), (Reuters)
  - Brett Kavanaugh Supreme Court nomination
  - Judge Brett Kavanaugh's nomination to the U.S. Supreme Court is confirmed when
    a final vote takes place, with 50 senators for his confirmation and 48 against.
    (ABC News)
  - Romanian constitutional referendum, 2018
  - Romanians go to the polls to vote in a referendum on changing the Constitution
    to redefine marriage as being only between a man and a woman. (CNN)
