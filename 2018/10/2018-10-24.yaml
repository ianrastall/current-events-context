Date: '2018-10-24'
Source_URI: Portal:Current events/2018 October 24
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - Authorities lower the casualty numbers for the September 28 earthquake and tsunami
    to 2,256 dead, 10,679 injured, and 1,075 still missing. (reliefweb)
  International relations:
  - Killing of Jamal Khashoggi
  - Saudi Arabia Crown Prince Mohammad bin Salman will address an international audience
    for the first time since the killing of journalist Jamal Khashoggi at the Saudi
    consulate in Istanbul. (CBS News)
  - U.S. President Donald Trump acknowledges that the Saudi Arabia crown prince "could
    have been" involved in the killing of Khashoggi, noting that "the prince is running
    things over there". (The Guardian)
  Law and crime:
  - Russian interference in the 2018 United States elections, cyberwarfare by Russia
  - The United States Cyber Command contacts individual Russians with the hope to
    deter them from interfering with upcoming American elections, including the November
    midterms. (CNBC)
  - October 2018 United States mail bombing attempts
  - The United States Secret Service intercepts two suspicious packages described
    as "potential explosive devices" addressed to former President Barack Obama and
    former Secretary of State Hillary Clinton. One addressed to former CIA director
    John O. Brennan was received at CNN's New York studios, which were evacuated.
    Other politicians who received similar packages include U.S. Representatives Debbie
    Wasserman Schultz (whose name and address was on the return label of a package
    meant for former Attorney General Eric Holder but had the wrong recipient address)
    and Maxine Waters. Authorities are also attempting to locate a suspicious package
    sent to former Vice President Joe Biden that was marked return to sender due to
    a bad address. (Washington Examiner) (NPR)
  - 2018 Jeffersontown shooting
  - A shooter kills two people in a Kroger store near Louisville, Kentucky. (AP via
    CBS)
  - Junpei Yasuda, a Japanese journalist kidnapped by Al-Nusra Front in Syria, is
    released. (Time)
  Science and technology:
  - Settlement of the Americas
  - Stone tools are found in Texas dating back 15,000 years, being the oldest evidence
    of humans in North America. (Daily Mail)
