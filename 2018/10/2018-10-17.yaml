Date: '2018-10-17'
Source_URI: Portal:Current events/2018 October 17
Intelligence_Payload:
  Uncategorized:
  - Gaza–Israel conflict
  - Palestinians in the Gaza Strip launch two rockets at Israel, one landing in the
    southern city of Beersheba, causing serious damage to a house but no injuries,
    and the other landing in the sea. (The Times of Israel)
  - In response to rocket fire, Israeli Air Force jets attack targets in Gaza including
    a tunnel crossing into Israel, tunnel digging sites, a factory storing components
    used for tunnel building and another for the manufacturing of aerial weaponry.
    (The Washington Post)
  - Medal of Honor recipients for the Vietnam War
  - Retired United States Marine veteran John Canley receives the Medal of Honor award
    from U.S. President Donald Trump for his contributions in the Vietnam War. (Fox
    News) (USA Today)
  - 2018 Atlantic hurricane season
  - Over 1,000 people remain missing a week after Hurricane Michael made landfall
    in the Florida Panhandle. (Huffington Post)
  - 2018 European floods, Hurricane Leslie
  - The death toll of the heavy floods in France rises to 14, while another person
    is missing. (Le Soir)
  - Kerch Polytechnic College massacre
  - A double bombing-mass shooting attack leaves 20 dead in a college in Kerch, Crimea.
    An 18-year-old student carried out the gun and bomb attack and then committed
    suicide. The attacker "hated the technical school very much" and had vowed "revenge"
    on his teacher. (BBC)
  - Cannabis in Canada
  - Canada becomes the first G20 nation to fully legalise cannabis. (Yahoo! Canada)
  - Macedonia naming dispute
  - Greek Foreign Minister Nikos Kotzias resigns after discussion with the Greek Defence
    Minister in the framework of the Greece-Macedonia Accord. (Ekathimerini)
  - 2016 German terror plot
  - German media uncover a large ISIL terrorism plot which had been foiled in 2016.
    (Süddeutsche Zeitung)
