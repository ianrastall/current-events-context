Date: '2018-10-10'
Source_URI: Portal:Current events/2018 October 10
Intelligence_Payload:
  Disasters and accidents:
  - At least 51 people are killed when a bus traveling from the Kenyan capital Nairobi
    to Kisumu veers off the road and overturns. (BBC)
  - Three people were killed and houses were damaged after a magnitude 6.3 earthquake
    struck off East Java, Indonesia. (The Straits Times)
  - At least five people died and 30 were injured when a passenger train derailed
    in the north Indian state of Uttar Pradesh. (Cyprus Mail)
  - Four people are killed and 20 others are injured when an apartment building collapses
    in Manama, Bahrain. (Gulf Business)
  - 2018 Haiti earthquake
  - The death toll of a magnitude 5.9 earthquake that struck Haiti rises to 17. (Otago
    Daily Times)
  - 2018 Atlantic hurricane season
  - Hurricane Michael strengthens to a "potentially catastrophic" Category 4 hurricane
    and makes landfall on the Florida Panhandle. (NPR) (Fortune)
  - A man in Greensboro, Florida is killed by a tree that crashed through his home,
    becoming the first reported death from the storm in the United States. Later,
    a child is killed by a falling tree in Seminole County, Georgia. (BBC)
  - The storm causes power outages to 550,000 customers in Florida, Georgia, and Alabama,
    and 375,000 people in 22 counties have been ordered to evacuate. (The Weather
    Channel)
  - Heavy rain and strong winds from Michael are expected in the Carolinas, Georgia,
    and Virginia on Thursday. (The Washington Post)
  International relations:
  - The Turkish newspaper Sabah names the 15-member Saudi Arabian intelligence team
    allegedly involved in the disappearance of Saudi journalist Jamal Khashoggi. (Reuters)
  - Venezuelan President Nicolás Maduro announces in a public broadcast that the United
    States President Donald Trump has sent an order to assassinate him. (Al Jazeera)
  Law and crime:
  - Capital punishment in Bangladesh, Terrorism in Bangladesh
  - A Dhaka court sentences 19 people to death, including two former ministers, and
    sentences Bangladesh Nationalist Party acting chairman Tarique Rahman to life
    imprisonment over a 2004 attack on Prime Minister Sheikh Hasina. (Al Jazeera)
    (Reuters)
