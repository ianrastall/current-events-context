Date: '2018-10-20'
Source_URI: Portal:Current events/2018 October 20
Intelligence_Payload:
  Disasters and accidents:
  - Four U.S. tourists are killed in Costa Rica after a rafting accident on a swollen
    river. (BBC)
  International relations:
  - Russia–United States relations
  - U.S. President Donald Trump says that the United States will withdraw from the
    Intermediate-Range Nuclear Forces Treaty, a 1987 nuclear arms treaty with Russia.
    (The Guardian)
  Law and crime:
  - Religious violence in Nigeria
  - A spat in a market in Nigeria's northern Kaduna State results in 55 dead. After
    the brawl, 22 people were arrested. (BBC)
  - Tanzanian billionaire Mohammed Dewji is freed by his captors nine days after being
    seized by unknown gunmen. (CNN) (Quartz)
  - 2018 Sagay, Negros Occidental hacienda massacre
  - Unidentified armed men shoot and kill nine sugarcane farmers in Sagay, Negros
    Occidental, Philippines. (Philippine Daily Inquirer)
  - The number of remains of babies, fetuses found stashed in Detroit funeral home
    rises to now more than 60. (Reuters)
  Politics and elections:
  - Afghan parliamentary election, 2018
  - After a delay of three years, voters in Afghanistan head to the polls to elect
    members of the nation's parliament. The election is marred by violence and suicide
    attacks which leave over 170 dead or wounded nationwide. (Deutsche Welle)
  - Because of technical issues in some constituencies, voting was extended until
    Sunday. Additionally, voting in the Kandahar Province will be delayed by one week
    following the assassination of police commander Abdul Raziq Achakzai two days
    prior. (Reuters) (Gandhara)
  - Wentworth by-election, 2018
  - Independent candidate Kerryn Phelps leads the vote count in the Australian House
    of Representatives seat of Wentworth. If she wins, the Australian House of Representatives
    will enter into a hung parliament. (The Sydney Morning Herald)
  - Opposition to Brexit in the United Kingdom
  - More than 600,000 people gather at Parliament Square in London as protesters from
    the People's Vote campaign call for a second Brexit referendum deal between the
    United Kingdom and the European Union. (BBC) (Time)
  Science and technology:
  - The skull of the Luzia Woman, one of the oldest known human fossils from the Americas,
    is recovered from the remains of the National Museum of Brazil. The museum staff
    states that the museum intends to attempt to restore the fossil. (BBC)
  - A research study published in The New England Journal of Medicine describes a
    significant mortality response to the immunotherapy Atezolizumab used in conjunction
    with the chemotherapy nab-paclitaxel for a type of untreatable Breast cancer (Triple-negative)
    when the tumors also display programmed death ligand 1 (PD-L1) expression. (The
    New York Times),(The New England Journal of Medicine)
  Sports:
  - 2018 Major League Baseball season
  - The Los Angeles Dodgers return to the World Series after a 5–1 victory against
    the Milwaukee Brewers in game 7 of the National League Championship Series. (The
    Los Angeles Times)
