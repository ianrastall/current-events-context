Date: '2018-10-23'
Source_URI: Portal:Current events/2018 October 23
Intelligence_Payload:
  Arts and culture:
  - Ancient Black Sea shipwrecks
  - The discovery of a Classical Greek trading ship thought to date to approximately
    400 BC is reported by a team of scientists working in the Black Sea. It is the
    oldest known intact shipwreck. (BBC)
  - Replica Titanic
  - It is announced that Titanic II, a replica of the original that sank in 1912,
    is set to set sail in 2022 and will include modern lifeboats and technology. The
    ship is expected to travel the same route as the original ship. (CNET) (Cleveland.com)
  Disasters and accidents:
  - An escalator collapses at Repubblica – Teatro dell'Opera metro station in Rome,
    Italy, leaving at least 20 people injured, the majority Russian football team
    CSKA fans. (BBC)
  - Hurricane Willa hits the coast of Western Mexico. It is also expected to become
    a nor'easter after it passes through the United States. (Boston Globe)
  International relations:
  - Killing of Jamal Khashoggi
  - Turkish president Recep Tayyip Erdoğan rejects the Saudi Arabian government's
    official account of the killing of Saudi-American journalist Jamal Khashoggi in
    a widely publicised address before the Turkish parliament. (The Guardian)
  - Secretary of State Mike Pompeo announces that the United States will revoke visas
    of Saudi Arabia officials behind the killing of Khashoggi. (VOA News) (Star Tribune)
  Law and crime:
  - October 2018 United States mail bombing attempts
  - A mail bomb is discovered at the home of George Soros in Bedford, New York, United
    States. It is safely detonated by the Bedford Police Department. While Soros was
    not at the residence when the device was discovered, the businessman and philanthropist
    is believed to be the intended target. (BBC) (NPR)
  - Terrorism in Canada
  - A motion passed by the Conservative Party calling for a government strategy on
    returning Canadian Islamic State fighters is approved 280-1 by MPs. (Global News)
  - The Connecticut Supreme Court rules that all documents, journals, and belongings
    of Sandy Hook shooter Adam Lanza be released to the public because of lack of
    exemption from the state's open record laws. (Hartford Courant) (CBS News)
