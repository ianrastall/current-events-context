Date: '2018-10-02'
Source_URI: Portal:Current events/2018 October 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021), Afghan parliamentary election, 2018
  - A suicide bomber kills 13 people and injures more than 30 others at an election
    rally in Nangarhar Province, Afghanistan. (BBC)
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - At least 1,347 people are now known to have died in the aftermath of the Indonesian
    earthquake and tsunami. (BBC)
  - European migrant crisis
  - Thirty-four migrants drown in a shipwreck in the western Mediterranean Sea. The
    Moroccan Navy rescues 26 survivors and recovers 11 bodies. (Channel NewsAsia)
  International relations:
  - Saudi Arabia–United States relations
  - In a public speech in Southaven, Mississippi, U.S. President Donald Trump claims
    that Salman of Saudi Arabia's power wouldn't last "for two weeks" without the
    support of the U.S. military. (Reuters)
  Law and crime:
  - Terrorism in France
  - French RAID and BRI police units raid the headquarters of a Shiite association
    in Grande-Synthe and the homes of its leaders for "strong support" to "many" terrorist
    organizations. Assets are frozen and three people remanded in custody. (France-Soir
    via Koz Post)
  Politics and elections:
  - Politics of the United Kingdom, Brexit
  - DUP leader Arlene Foster says that extra border checks between Northern Ireland
    and Great Britain are the "one red line" for her party. (Bloomberg)
  - Government of Iraq
  - The Council of Representatives of Iraq elects Barham Salih as president. Salih
    then appoints Adil Abdul al-Mahdi as prime minister. (CNN)
  Science and technology:
  - The Nobel Prize in Physics is awarded to Arthur Ashkin, Gérard Mourou, and Donna
    Strickland for their work using lasers to manipulate microscopic objects. Strickland
    is the first woman to win this award in 55 years. (The New York Times) (CNN)
