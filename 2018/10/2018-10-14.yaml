Date: '2018-10-14'
Source_URI: Portal:Current events/2018 October 14
Intelligence_Payload:
  Arts and culture:
  - Óscar Romero, the Roman Catholic Archbishop of San Salvador assassinated while
    celebrating Mass in 1980, is canonized by Pope Francis. Six other canonizations,
    including that of Pope Paul VI, are also announced. (BBC)
  Disasters and accidents:
  - At least 22 people are killed in Turkey after a lorry carrying migrants plunges
    off a road. (BBC)
  - A small plane crashes into a crowd near Fulda, Germany, killing three people and
    injuring eight others. (BBC)
  - A bus travelling from Germany to Italy crashes in southern Switzerland, leaving
    one dead and 14 injured. (AP)
  - Tropical cyclone effects in Europe
  - Hurricane-force winds from former Hurricane Leslie strike central and northern
    Portugal, leaving a man dead and 27 others injured. It moves through Spain as
    a tropical storm. (Metro Libre)
  Politics and elections:
  - Luxembourg general election, 2018
  - Voters in Luxembourg go to the polls for the 24th general election. (DW)
  - Bavarian state election, 2018
  - Voters in Bavaria, Germany go to the polls for electing the 180 members of the
    18th Landtag of Bavaria, with the Christian-democratic conservative CSU party
    suffering significant losses. (BBC) (The Guardian)
  - Belgian local elections, 2018
  - Voters in Belgium go to the polls for local elections, with the Greens making
    historic gains. (France 24) (EURACTIV)
