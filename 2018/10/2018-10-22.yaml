Date: '2018-10-22'
Source_URI: Portal:Current events/2018 October 22
Intelligence_Payload:
  Business and economy:
  - After nine years of construction, China is expected to open the world's longest
    sea bridge, Hong Kong–Zhuhai–Macau Bridge, at a ceremony in Hong Kong. (Business
    Insider)
  Disasters and accidents:
  - Two passenger buses collide in the city of Dera Ghazi Khan, in the Punjab Province
    of Pakistan, resulting in 19 deaths and 40 injuries. (The Express Tribune) (Arab
    News)
  Politics and elections:
  - British Columbia electoral reform referendum, 2018
  - The Canadian province of British Columbia begins a postal ballot to determine
    whether to maintain the current first-past-the-post voting system or switch to
    a form of proportional representation for their provincial elections. (Elections
    BC)
  - Transgender rights
  - The Trump administration through the United States Department of Health and Human
    Services plans to include a legal definition of gender in the federal civil rights
    Title IX law. The proposed alteration to the law would define gender as an unchangeable
    anatomical and genetic condition determined at birth. Members of the LGBT community
    plan to contest the move, which they state would largely end protections for transgender
    Americans. (The New York Times) (NPR)
