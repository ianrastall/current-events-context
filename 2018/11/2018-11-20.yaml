Date: '2018-11-20'
Source_URI: Portal:Current events/2018 November 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - November 2018 Kabul attack
  - At least 50 people are killed and 83 others injured in a suicide bombing on a
    Mawlid gathering in Kabul, Afghanistan. (BBC)
  - A policeman is stabbed near the Grand Place in Brussels historic centre by a man
    carrying two small kitchen knives. The attacker is shot in the chest and in a
    critical condition while the policeman suffers non-life threatening injuries.
    (ABCNEWS)
  Disasters and accidents:
  - One person is killed and six others are injured after a train derails due to a
    landslide in the Catalonian town of Vacarisses, Province of Barcelona. (CNN)
  International relations:
  - The general assembly of Interpol elects Vanuatu and Kiribati as new members, but
    not Kosovo. (The Washington Post)
  - Poland and Israel join Bulgaria, the Czech Republic, Croatia, Hungary, Australia
    and Austria in announcing that, despite their agreement in July, they will not
    sign the United Nations Global Compact for Migration in Marrakech on 10–11 December
    2018. (Fox News) (Yeni Şafak) (Jerusalem Post)
  - Erik Solheim resigns as head of the United Nations Environment Programme over
    allegations of expenses abuse and a lack of accountability. (BBC News)
  - North Korea–South Korea relations
  - North Korea blows up ten of its front-line guard posts in the Korean Demilitarized
    Zone (DMZ) in accordance with agreements made with South Korea earlier this year.
    (ABC News)
  Law and crime:
  - Nikola Gruevski, former Prime Minister of Macedonia, says he is granted political
    asylum in Hungary after he fled his home country last week to avoid a two-and-a-half-year
    jail sentence for corruption. (The Washington Post) (The Guardian)
  Politics and elections:
  - Disgruntled police officers and soldiers storm the National Parliament of Papua
    New Guinea due to unpaid allowances related to the APEC Papua New Guinea 2018
    conference last weekend. (The Guardian)
  - The European Union reaches a provisional agreement on a system to investigate
    foreign investments into Europe. (Reuters)
  - Gilets jaunes protests
  - France's "Yellow Vest" protests over fuel taxes enter their fourth day as around
    10,000 people continue to block roads around the country. (The Local)
  - Ivanka Trump, elder daughter of U.S. President Donald Trump, is found to have
    used a private e-mail account to handle government business e-mails. (BBC)
