Date: '2018-11-05'
Source_URI: Portal:Current events/2018 November 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Anglophone Crisis
  - A kidnapping occurs at a school in Bamenda, the capital of the North-West region
    of Cameroon, with at least seventy-eight students and three staff taken, including
    the principal. The Anglophone Crisis is a conflict between separatists and the
    government of Cameroon. (BBC)
  - Yemeni Civil War (2015–present)
  - Days of heavy fighting between Houthi and Saudi-led coalition forces around the
    port city of Al Hudaydah, Yemen, leave at least 150 people dead. (FRANCE 24)
  Disasters and accidents:
  - In Port Hedland, Australia, authorities deliberately derail a runaway train after
    the driver left the train for an inspection. The assemblage consisted of four
    locomotives and two hundred sixty-eight wagons, was operated by BHP Billiton on
    the Pilbara Railways, and traveled ninety-two kilometers. The train was en route
    from Newman to Port Hedland. (ABC Australia)
  International relations:
  - Oman–United Kingdom relations
  - British Defence Minister Gavin Williamson announces that a joint British-Omani
    military training base will open in Oman next year. (Reuters)
  - Foreign relations of the Holy See, Foreign relations of Andorra
  - Pope Francis, head of state of the Vatican City and leader of the Roman Catholic
    Church, threatens to order the abdication of Andorran co-monarch Joan Enric Vives
    Sicília, Archbishop-Bishop of Urgell, if the country decriminalises or legalises
    abortion. (Diari d'Andorra - Catalan)
  Law and crime:
  - Me Too movement
  - Seo Ji-hyeon, a leading figure of the Me Too movement in South Korea, files a
    suit against former South Korean chief prosecutor Ahn Tae-keun and the government
    for physical and psychological distress. (YJC)
  - Cyberwarfare in Iran, Iran–Israel relations
  - The Iranian telecommunication minister Mohammad-Javad Azari Jahromi accuses Israel
    of a failed cyberattack on its telecommunications infrastructure, and vows to
    respond with legal action. (Reuters), (Channel NewsAsia)
