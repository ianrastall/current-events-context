Date: '2018-11-04'
Source_URI: Portal:Current events/2018 November 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Minya bus attack
  - Egyptian police kill 19 Islamist militants accused of involvement in an attack
    on Coptic Christians in central Egypt two days ago. (BBC)
  Arts and culture:
  - Ross Edgley becomes the first person to swim around Great Britain. The swim lasted
    156 days. (BBC)
  Disasters and accidents:
  - 2018 European floods
  - Heavy floods affect Palermo in Sicily, Italy, killing twelve people. The total
    death toll of the floods and strong winds in the country rises to 31 people. (Teleacras)
  - 69.1 tonnes of C9 aromatic hydrocarbon are leaked into the ocean at a port in
    Quangang District, Quanzhou, China when a petrochemical company loads the cargo
    from its terminal into a chemical tanker and the aged hose coupling gasket breaks.
    Nearby aquaculture farms are contaminated, resulting in huge loss. Many fishermen
    and residents get sick from the leaked chemical, and 52 of them are hospitalized.
    Local authorities are accused of playing down the severity of the leakage. Discussion
    of the accident is suppressed on Weibo after the accident has become a hot topic.
    The company lies that the amount of leakage is 6.97 tonnes. (Splash 247) (Sing
    Tao Daily) (Shanghaiist) (Global Times)
  International relations:
  - 2018 New Caledonian independence referendum
  - New Caledonians vote against becoming an independent country from France. (BBC)
  Law and crime:
  - 2017–2018 Spanish constitutional crisis
  - The leading judge presiding over the investigation of the 2017 Catalan independence
    referendum and the director of the Operation Anubis Juan Antonio Ramírez Sunyer
    dies suddenly at the age of 71. (El Mundo)
  - Corruption in Ukraine
  - Kateryna Handziuk, an anti-corruption activist, dies of the injuries that she
    suffered in an acid attack on 31 July in Kherson. (BBC)
  - 2011 Bahraini uprising
  - Bahrain's Court of Appeal rules that the former leader of the now outlawed Al
    Wefaq party, Sheikh Ali Salman, will receive a life sentence over his conviction
    for 2011 spying for Qatar. (BBC)
