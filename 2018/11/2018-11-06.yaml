Date: '2018-11-06'
Source_URI: Portal:Current events/2018 November 6
Intelligence_Payload:
  Arts and culture:
  - Demographics of Colombia
  - With the previous Colombia census thirteen years ago, the National Administrative
    Department of Statistics registered 45.5 million Colombians and legal foreign
    residents living in the country. This latest census reveals that there are five
    million fewer people in Colombia than previously estimated. (El Tiempo)
  Disasters and accidents:
  - European migrant crisis
  - In two separate incidents, there are a total of at least seventeen migrants killed
    after they attempted to cross the Mediterranean Sea from North Africa to Spain.
    (Reuters)
  - A pair of buildings collapsed yesterday in Marseille, France, with today four
    people being found dead while others remain missing. (The Guardian)
  Law and crime:
  - Based upon information from the General Directorate for Internal Security, French
    authorities arrest five men and one woman suspected of planning an attack on French
    President Emmanuel Macron. Police report the suspects are radical far right citizens.
    (Reuters)
  - 2017 New York City Subway bombing
  - A jury in the Manhattan Federal Court finds Akayed Ullah guilty of a pipe bomb
    attack on the Port Authority Bus Terminal in December 2017. (New York Daily News)
  - Cannabis in Michigan, Legality of cannabis by U.S. jurisdiction
  - Voters in Michigan legalize recreational marijuana. (Forbes)
  Politics and elections:
  - Antiguan constitutional referendum, Grenadian constitutional referendum
  - Referenda are held in Antigua and Barbuda and Grenada to decide whether to maintain
    the UK-based Judicial Committee of the Privy Council as the final court of appeal,
    or to adopt the appellate jurisdiction of the Caribbean Court of Justice; both
    are rejected by voters. (Antigua Observer)
  - United States elections, 2018
  - The United States holds midterm elections for all 435 House seats, for 35 Senate
    seats (including two special elections in Minnesota and Mississippi), for 39 state
    and territorial governorships, and for numerous state and local races. (The Guardian),
    (NPR)
  - The Democratic Party takes over control of the House, while the Republican Party
    increases their majority in the Senate. (FiveThirtyEight)
  - At least 95 women attain congressional office, bringing the total number of women
    in all parts of Congress to a record 118. Rashida Tlaib and Ilhan Omar share the
    distinction of becoming the first Muslim congresswomen, while Sharice Davids and
    Deb Haaland become the first Native American congresswomen. (USA Today), (NPR),
    (CNN)
  - Colorado gubernatorial election, 2018
  - Jared Polis becomes the first openly gay person and second openly LGBT person
    elected as a governor in the United States. (Time)
