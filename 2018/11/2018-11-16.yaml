Date: '2018-11-16'
Source_URI: Portal:Current events/2018 November 16
Intelligence_Payload:
  Business and economy:
  - Johnston Press, which owns i, The Scotsman, the Yorkshire Post and other UK newspapers,
    enters administration after failing to secure a buyer. It is set to be de-listed
    on the London Stock Exchange on 19 November 2018. (The Guardian)
  Disasters and accidents:
  - 2018 California wildfires
  - The death toll in the Camp Fire rises to 71, with the statewide total at 74. The
    number of missing and unaccounted-for people rises to more than 1000. (CNN)
  - At least 42 people have died while more than 20 others are injured in a deadly
    fire aboard a bus in Zimbabwe. (BBC)
  - A total of eight people die when a strong winter storm strikes the eastern United
    States, causing tens of thousands of people to lose power. (CNN)
  - Iran's Social Security Organization chairman Mohammad Taghi Nourbakhsh and his
    deputy die after a car accident during a visit to Gorgan. (Mehr News)
  - Disappearance of ARA San Juan
  - The Argentine Navy announces that ARA San Juan (S-42), an Argentine submarine
    that disappeared on November 15, 2017, with 44 crew onboard, has been found on
    the seabed in the South Atlantic Ocean. (BBC)
  Law and crime:
  - Timeline of investigations into Trump and Russia (July–December 2018)
  - An unrelated court filing accidentally reveals that Julian Assange, a major target
    of the investigation into Russia's interference in the 2016 United States election,
    has been charged. (The Guardian) (The New York Times)
  - CNN v. Trump
  - U.S. federal district judge Timothy J. Kelly orders the Secret Service to temporarily
    restore Jim Acosta's White House press pass. (ABC News)
  - Immigration officials from Myanmar intercept a boat of Rohingya refugees off the
    coast of Yangon, and arrest all 106 passengers. The boat was en route to Malaysia,
    after setting off from Sittwe, Rakhine State, with human smugglers and Rohingyas
    fleeing persecution. (ABC News)
  Politics and elections:
  - Politics of the United Kingdom
  - British Prime Minister Theresa May appoints Stephen Barclay as Secretary of State
    for Exiting the European Union, and Amber Rudd as Secretary of State for Work
    and Pensions following yesterday's resignations of Dominic Raab and Esther McVey.
    (Evening Standard)
  - 2018 Georgia gubernatorial election
  - Democratic gubernatorial candidate Stacey Abrams ends her campaign, acknowledging
    that Brian Kemp will be the next Governor of Georgia. In a speech at her election
    headquarters in Atlanta, Abrams emphasized that her statement was not a concession,
    and announced her intention to file a federal lawsuit against the state of Georgia
    for alleged mismanagement during the election. (CNN)
  Science and technology:
  - The first genetic analysis of hemimastigotes reveals they are distinct enough
    from other forms of life to be classified in a separate supra-kingdom. (CBC)
  - Redefinition of SI base units
  - A new definition of SI units, e.g., the kilogram, the ampere, etc., is decided
    by the General Conference on Weights and Measures. They are now entirely defined
    by physical constants, and no longer dependent on any physical object, as was
    previously the case for the kilogram. (National Physical Laboratory)
