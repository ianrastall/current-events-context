Date: '2018-11-21'
Source_URI: Portal:Current events/2018 November 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The death toll in the suicide bomb attack at a gathering of religious scholars
    in Kabul rises to 55. (Reuters)
  - Yemeni Civil War (2015–present)
  - A report by charity Save the Children estimates that 85,000 children died of starvation
    as a result of the war. (The Guardian)
  Disasters and accidents:
  - One person is killed and five people are injured in an auto wreck on New York
    City's Brooklyn Bridge, which sparked a fire that engulfed three vehicles. (ABC
    News) (The New York Times)
  Law and crime:
  - A 27-year-old American Christian missionary is killed upon landing on North Sentinel
    Island in an effort to convert the indigenous Sentinelese people. He is the first
    person killed by the isolated islanders since two Indian nationals in 2006. (BBC)
  - Matthew Hedges, a British academic student studying at Durham University, is sentenced
    to life imprisonment in the United Arab Emirates after being convicted of spying.
    (BBC) (The Guardian)
  Politics and elections:
  - 2018 Iranian general strikes
  - Workers of the Haft Tappeh sugar mill company in the ancient city of Shush, southwest
    Iran, continued their strike and protests to the unpaid salaries for the 15th
    consecutive day. (Al Arabiya)
  - Interpol elects South Korean Kim Jong-yang as its president, beating Russian candidate
    Alexander Prokopchuk. (BBC)
  - Chief Justice of the United States John Roberts replies to President Donald Trump
    who described the judge who ruled on Monday against his migrant asylum order as
    an "Obama judge." (Associated Press)
  - Kosovo puts a 100% trade tariff on all goods imported from Serbia and Bosnia and
    Herzegovina. The European Union says this is a "clear violation" of the Central
    European Free Trade Agreement. (BBC)
  Sports:
  - World Chess Championship 2018
  - After nine consecutive draws, a record for the 132-year-old championship, Magnus
    Carlsen and Fabiano Caruana are tied 4½ points each in the best-of-12-games match.
    (The Guardian)
