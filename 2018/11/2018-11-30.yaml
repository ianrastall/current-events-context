Date: '2018-11-30'
Source_URI: Portal:Current events/2018 November 30
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Anchorage earthquake
  - A magnitude 7.0 earthquake hits Alaska, with the epicenter in Anchorage. Severe
    damage is reported. (USGS) (CBS News)
  - Tornadoes of 2018
  - A severe storm system brings tornado watches and warnings throughout the U.S.
    states of Oklahoma, Texas, Arkansas, and Missouri. A "large and dangerous" tornado
    is confirmed near Gore, Oklahoma. Several other tornadoes are seen by storm chasers.
    (4029 News)
  Business and economy:
  - Marriott International discloses that its Starwood Hotel brand had been subject
    to a data breach. (CNN)
  International relations:
  - North Korea–South Korea relations
  - A South Korean train arrives towards Panmun Station and crosses the DMZ border
    for the first time since 2008, when a South Korean cargo train operated five times
    a week. (The Washington Post) (BBC) (South China Morning Post)
  - Russia–Ukraine relations, Martial law in Ukraine
  - Ukraine bans Russian men aged between 16 and 60 from entering the country following
    the imposition of martial law. President Petro Poroshenko says the ban is to prevent
    the formation of "private armies" in Ukraine. Russia says it does not plan to
    retaliate. (BBC)
  - 2018 G20 Buenos Aires summit
  - The United States, Canada and Mexico sign the United States–Mexico–Canada Agreement
    in Buenos Aires, replacing the North American Free Trade Agreement. (TTNews) (NPR)
  Law and crime:
  - Nigerian police killed 104 cattle thieves in operations in the north-western state
    of Zamfara. (BBC)
  - The Supreme Court of Canada says that Vice Media reporter Ben Makuch must give
    the Royal Canadian Mounted Police material he gathered for stories about an accused
    Islamic State terrorist. (CBC)
  Politics and elections:
  - Brexit negotiations
  - Sam Gyimah resigns as British Minister of State for the Department for Business,
    Energy and Industrial Strategy in protest to Prime Minister Theresa May's Brexit
    withdrawal deal. (The Guardian)
  - Former U.S. President George H. W. Bush dies of Parkinsonism at the age of 94,
    at about 10:10 p.m. CST. (NPR) (CNN)
