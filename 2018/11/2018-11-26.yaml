Date: '2018-11-26'
Source_URI: Portal:Current events/2018 November 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kerch Strait incident
  - Russia asks for an urgent meeting of the United Nations Security Council to convene.
    (TASS)
  - The Kerch Strait is re-opened to commercial shipping. (Reuters)
  - Martial law in Ukraine
  - The Verkhovna Rada approves the introduction of martial law in 10 oblasts of Ukraine
    for a period of 30 days. (BBC)
  - War in Afghanistan (2001–2021)
  - Taliban insurgents ambush a police convoy in the western Farah Province, killing
    20 officers, including the newly appointed provincial police chief. (The Guardian)
  - Israeli–Palestinian conflict
  - Three Israel Defense Forces soldiers are injured, one moderately and two lightly,
    in a vehicle-ramming attack in the West Bank. The assailant was shot dead by one
    of the soldiers. (Yahoo)
  - Somali Civil War
  - An Islamic cleric and 17 of his followers are killed by Al-Shabaab militants for
    playing music during their religious sessions. (TIME)
  - A car bomb explodes in the capital Mogadishu, killing at least six people. (The
    Charlotte Observer)
  Arts and culture:
  - Cinema of Italy
  - Italian director Bernardo Bertolucci, whose film The Last Emperor won nine Oscars,
    dies of lung cancer. (The Guardian)
  Business and economy:
  - History of General Motors
  - General Motors announces it will cease production at the Oshawa Car Assembly in
    Oshawa, Lordstown Assembly in Lordstown, Ohio, and the Detroit/Hamtramck Assembly
    in Detroit. Two transmission plants, the Baltimore Transmission in Baltimore and
    the Warren Transmission in Warren, Michigan, are also expected to stop production.
    (Global News) (GM Authority) (NPR)
  Disasters and accidents:
  - A UH-1 Iroquois military helicopter crashes during a training flight in the Sancaktepe
    district of Istanbul, Turkey, killing four soldiers and leaving one injured. (Anadolu,
    Belga via Het Laatste Nieuws)
  International relations:
  - United Arab Emirates–United Kingdom relations
  - Matthew Hedges, the British student who was sentenced last week by a judge in
    the United Arab Emirates to life in prison on espionage charges, is pardoned and
    released by authorities. The UAE maintains that he was an MI6 agent. (The New
    York Times) (The Guardian)
  Law and crime:
  - Trial of 6ix9ine
  - American rapper 6ix9ine pleads not guilty to racketeering and firearms charges
    and is denied bail as his trial date is set for September 4, 2019. (Fox News)
  - A court in Milan, Italy, examines evidence submitted by the campaign group Global
    Witness, that alleges bribery around the attribution of the OPL 245 oil prospecting
    license in 2011 led to a loss for the Nigerian state estimated at US$6 billion.
    (BBC)
  Politics and elections:
  - George Soros' Open Society Foundations says it will cease operations in Turkey,
    stating that "baseless claims" in the media and a government investigation into
    its alleged role in the Gezi Park protests make its work impossible. (Reuters)
  - Killing of Jamal Khashoggi
  - Human rights activists in Tunisia stage protests against a planned visit by Saudi
    Arabia Crown Prince Mohammed bin Salman over the killing of Saudi Arabia journalist
    Jamal Khashoggi. (Africa News) (VOA News)
  Science and technology:
  - Exploration of Mars
  - The NASA robotic lander InSight lands safely on the Elysium Planitia plain of
    Mars to study the geology of the red planet. (NASA)
  - Genome editing
  - A Chinese scientist claims to be the first person to edit the genome of a human
    baby, by targeting an immune-receptor which is used by HIV (CCR5). This has provoked
    denial from the hospital and international outcry. (CNN) (AP)
  Sports:
  - World Chess Championship 2018
  - After twelve consecutive draws, Magnus Carlsen and Fabiano Caruana will enter
    a tie-breaker on Wednesday, for the first match in WCC history to have no decisive
    games before the tie-breaker. (The Guardian)
