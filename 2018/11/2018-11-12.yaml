Date: '2018-11-12'
Source_URI: Portal:Current events/2018 November 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gaza–Israel clashes (November 2018)
  - Israel and Hamas exchange missile fire with 300 rockets being launched from Gaza
    within the span of three hours. (The New York Times)
  - The Israeli Air Force bombs Hamas-run Al-Aqsa TV's headquarters in Gaza City.
    (Reuters)
  - A rocket fired from Gaza strikes an apartment building in Ashkelon, killing a
    man and injuring two others. The victim was a middle aged Palestinian illegal
    immigrant from Hebron. This is the first person killed on Israeli soil due to
    Palestinian rocket fire since 2014. (Ynetnews)
  Arts and culture:
  - Amnesty International strips Myanmar State Counsellor Aung San Suu Kyi of its
    highest honor, the Ambassador of Conscience Award, which she received in 2009,
    because of her inaction regarding the persecution of Myanmar's Rohingya Muslim
    population in Rakhine State and the military operations in Kachin and Shan State.
    (BBC) (CNN)
  - Pope Francis asks the US Conference of Catholic Bishops, now meeting in Baltimore,
    to delay voting on proposals to address the sexual abuse crisis until he leads
    a global summit in February. (CNN) (Axios)
  - Marvel Comics editor and comic book writer Stan Lee dies at the age of 95. (The
    New York Times) (The Guardian)
  Disasters and accidents:
  - 2018 California wildfires
  - The Camp Fire in Butte County is now ranked as the deadliest wildfire in Californian
    history, with 42 people confirmed dead and 228 people missing. (HuffPost)
  International relations:
  - Killing of Jamal Khashoggi, Foreign relations of Saudi Arabia
  - Prime Minister of Canada Justin Trudeau confirms that Canadian intelligence officials
    have listened to the recording provided by Turkey of the killing of Jamal Khashoggi,
    though he himself had not heard it. (CTV News)
  Law and crime:
  - Parviz Kazemi, former Iranian welfare minister, is arrested and transferred to
    Tehran's Evin Prison on charge of causing disruption in the country's economic
    system. (PressTV)
  - Antisemitism in Canada, History of the Jews in Toronto
  - Toronto police investigates a hate crime against four Jewish teens. 1 person is
    arrested and 9 other teenagers are being sought. (Huffington Post Canada) (CBC
    CA)
  - Three men are convicted at the Western Cape High Court of kidnapping, raping and
    killing Stellenbosch University student Hannah Cornelius, whose body was found
    outside Stellenbosch. They are also convicted of the attempted murder of a friend
    of Hannah's who was abducted at the same time and left for dead near Kraaifontein.
    The three men receive life sentences. (News24)
  Politics and elections:
  - United States Senate election in Arizona, 2018
  - A week after the election, which was initially too close to call, Democratic Party
    candidate Kyrsten Sinema is elected to the United States Senate, defeating GOP
    candidate Martha McSally. Sinema is the first woman elected to represent Arizona
    in the Senate and first Democrat to win a Senate election in the state since 1988.
    (BBC)
  - Marshall Islands President Hilda Heine narrowly survives a 16-16 vote of no confidence.
    17 votes were needed to remove Heine from office. (Marianas Variety)
  Science and technology:
  - The Irish Aviation Authority launches an investigation after several airliner
    pilots report extremely fast moving bright lights off the south-west coast of
    Ireland. (BBC) (Irish Examiner)
