Date: '2018-11-09'
Source_URI: Portal:Current events/2018 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Officials say that an attack by the Taliban on an army outpost killed 10 soldiers
    and 7 policemen in Khwaja Ghar District after 7 policemen were killed in Farah
    yesterday. (AP via The Fresno Bee)
  - 2018 Melbourne stabbing attack
  - One person is killed and two others are injured by a knife-wielding man in Melbourne,
    Australia. The suspect, a 31-year-old Australian resident originally from Somalia,
    randomly stabbed pedestrians after exiting his burning, crashed utility truck
    that held multiple gas canisters. He was shot and killed attempting to stab responding
    police. The Islamic State of Iraq and the Levant claims responsibility. (ABC News)
    (The Age) (NPR)
  Disasters and accidents:
  - Camp Fire, 2018 California wildfires
  - At least 11 people have been killed and more than 150,000 evacuated as two big
    wildfires rage in California, the Camp Fire in Butte County and the Hill Fire
    in Ventura. (BBC)
  - Flash floods caused by heavy rain in Petra, Jordan, kill 11 people while 24 others
    are injured. (BBC)
  - Two additional bodies are found in the rubble of the two buildings that collapsed
    four days ago in Marseille, France, bringing the final death toll to eight. (LCI)
  - A convoy accident involving British Prime Minister Theresa May and Belgian Prime
    Minister Charles Michel interrupts an Armistice Day trip after two police motorbikes
    were knocked over. (Sky News) (Reuters)
  Law and crime:
  - Former Philippine First Lady and Ilocos Norte Representative Imelda Marcos has
    been convicted on seven counts of graft for transferring funds to private foundations
    in Switzerland and is sentenced to at least six years and one month imprisonment
    for each count. (Rappler) (South China Morning Post)
  Politics and elections:
  - United States Senate election in Florida, 2018
  - As the Florida Senate election heads to a mandatory recount, United States President
    Donald Trump and Rick Scott claim, without evidence, that widespread voter fraud
    occurred in Florida during the recent midterm election. (NPR)
  - State judges order election officials from Broward and Palm Beach Counties to
    release absentee ballot information as they continue to count the ballots. (WINK
    News)
  - List of executive actions by Donald Trump, List of lawsuits involving Donald Trump
  - The American Civil Liberties Union files a lawsuit in response to President Trump's
    proclamation that denies asylum to immigrants who enter the country illegally.
    (USA Today)
  - Opposition to Brexit in the United Kingdom
  - British MP Jo Johnson resigns as transport minister over Theresa May's Brexit
    plan and calls for a second referendum. (The Guardian) (BBC)
  - 2018 Sri Lankan constitutional crisis
  - President Maithripala Sirisena dissolves Parliament. (BBC) (CNN)
