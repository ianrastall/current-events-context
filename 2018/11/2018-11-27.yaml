Date: '2018-11-27'
Source_URI: Portal:Current events/2018 November 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Three U.S. troops are killed and three others are wounded in an IED blast near
    Ghazni, Afghanistan. (BBC)
  Arts and culture:
  - The National Board of Review of Motion Pictures names Green Book the best film
    in 2018. A Star Is Born won three awards. (The Hollywood Reporter) (NBR press
    release)
  International relations:
  - Russia–United States relations
  - U.S. President Donald Trump says he may cancel his scheduled meeting with Russian
    President Vladimir Putin during this week's 2018 G20 Buenos Aires summit because
    of Russia's maritime clash with Ukraine. (The Washington Post)
  - Nicaragua–United States relations, Corruption in Nicaragua
  - The Donald Trump administration announces sanctions on Nicaraguan Vice President
    Rosario Murillo and national security advisor Néstor Moncada Lau for corruption,
    violence against protesters, and human rights violations. (BBC) (The Washington
    Times)
  Law and crime:
  - Fake news in South Korea
  - Prosecutors raid the house of Gyeonggi Province governor Lee Jae-myung amid suspicions
    that his wife used a pseudonymous Twitter handle to spread fake news about President
    Moon Jae-in and other political rivals of her husband. (Korea Herald) (english
    chosun)
  Politics and elections:
  - United States Senate special election in Mississippi, 2018
  - Republican Senator Cindy Hyde-Smith defeats Democratic candidate Mike Espy in
    a run off election in Mississippi. (CBS News)
  Science and technology:
  - The World Meteorological Organization and the Australian Bureau of Meteorology
    predict a weak El Niño forming within three months. (BBC)
