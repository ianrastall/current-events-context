Date: '2018-11-15'
Source_URI: Portal:Current events/2018 November 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kivu conflict
  - The United Nations announce that seven MONUSCO peacekeepers were killed in clashes
    with militia yesterday in Beni, North Kivu, Democratic Republic of the Congo.
    (Reuters)
  - War in Afghanistan
  - Taliban kill 30 policemen in an attack on an outpost in Farah Province. (AP via
    Fox News)
  Business and economy:
  - Rail transport in Morocco
  - The Kenitra–Tangier high-speed rail line, the first in Africa, is inaugurated.
    (AP via KSLA News)
  - Criticism of Walmart
  - US Senator Bernie Sanders proposes the Stop Walmart Act, which would prohibit
    big employers from repurchasing shares until they adopt a $15-an-hour minimum
    wage. (CNN) (Market Watch)
  International relations:
  - Killing of Jamal Khashoggi, Foreign relations of Saudi Arabia
  - Saudi Arabia accuses five of its officials of killing and dismembering journalist
    Jamal Khashoggi. (Times Now)
  - The Donald Trump administration announces sanctions on 17 Saudi officials, not
    including Crown Prince Mohammad bin Salman, for their alleged involvement in killing
    Khashoggi. (ABC News) (Politico)
  Politics and elections:
  - Cabinet of the United Kingdom, Brexit negotiations
  - Minister of State for Northern Ireland Shailesh Vara, Secretary of State for Exiting
    the European Union Dominic Raab, and Secretary of State for Work and Pensions
    Esther McVey resign in protest of Prime Minister Theresa May's Brexit plan. (BBC)
    (Bloomberg) (The Telegraph)
  - Conservative Party backbencher Jacob Rees-Mogg, with the backing of at least a
    dozen Tory MPs, says he will submit a letter to the chair of the 1922 Committee,
    Graham Brady, to trigger a motion of no confidence against Prime Minister Theresa
    May. (The Guardian)
