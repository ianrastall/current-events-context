Date: '2018-11-18'
Source_URI: Portal:Current events/2018 November 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram fighters loyal to ISIS attacked a military base in the Nigerian town
    of Metele, killing at least 118 soldiers while at least 153 others were missing
    after the attack, the militants also seized tanks, armored vehicles, artillery,
    weapons, and ammunition (Reuters)
  Disasters and accidents:
  - 2018 California wildfires
  - The number of structures destroyed in the Woolsey Fire rises to 1,452. (Los Angeles
    Times)
  International relations:
  - APEC Papua New Guinea 2018
  - The APEC summit in Papua New Guinea ends without a communiqué for the first time
    in the forum's history. (Reuters)
  Law and crime:
  - Myanmar police fire warning shots at a crowd of Rohingya Muslims after arresting
    two human smugglers at a camp for displaced persons near Sittwe, Rakhine State.
    Four people are injured directly by the gunfire, prompting the U.N. Resident and
    Humanitarian Coordinator to call for "calm and restraint". (Reuters) (VOA News)
  Politics and elections:
  - A planned transgender rights rally in Kyiv, Ukraine, is attacked by far-right
    radicals. (CBC News)
  - Central American migrant caravans
  - Hundreds of residents take to the streets in the Mexican city Tijuana, in protest
    of the arrival of thousands of migrants trying to get to the United States. (BBC)
  Sports:
  - 2018 ATP Finals
  - In tennis, Alexander Zverev upsets Novak Djokovic 6–4, 6–3 to win his first ATP
    Finals title. (ESPN)
  - 2018 NASCAR Cup Series
  - In motorsport, Joey Logano wins the season finale, the Ford EcoBoost 400, to claim
    his first career Cup Series title. (ESPN)
