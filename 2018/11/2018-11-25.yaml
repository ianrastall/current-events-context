Date: '2018-11-25'
Source_URI: Portal:Current events/2018 November 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kerch Strait incident
  - Russia stops three Ukrainian Navy vessels from passing under the Kerch Strait
    Bridge by blocking it with a cargo ship. Russia claims they violated her territorial
    waters and ignored warnings. The navy vessels and their crews are seized after
    shots were fired. Russia says three Ukrainians were wounded. According to Ukraine,
    six of their sailors are wounded. Ukraine denies their ships did anything wrong.
    (Reuters) (AP)
  - An emergency National Security and Defense Council of Ukraine meeting is convened
    in response to the Russian blockade of the Kerch Strait and the seizure of its
    vessels, after which President Petro Poroshenko says he will ask the Verkhovna
    Rada to support a declaration of martial law in Ukraine. The parliament is set
    to have an emergency meeting at 4 p.m. local time on November 26. (Kyiv Post)
  Disasters and accidents:
  - At least 21 people have died, 180 have been injured and tens of thousands have
    been displaced by heavy rains that have affected Iraq. (Times Now)
  - A 6.3 magnitude earthquake strikes near Sarpol-e Zahab, Iran, and close to the
    Iraqi border. A person died in Iraq while more than 700 others are injured. (BBC)
  - Camp Fire
  - Two more bodies are found in Paradise and one in nearby Magalia, raising the death
    toll to 85. Another 249 people are still missing. (CNN)
  - The chemical spill accident in Quangang District, Quanzhou, China on November
    4 is found to be 10 times worse than initially reported. According to the government
    of Quanzhou, the actual leak of C9 aromatics was 69.1 tonnes instead of 6.97 tonnes
    understated by the Fujian Donggang Petrochemical Company. Several officials of
    Quangang District have been suspended from their posts and seven company employees
    have been arrested by the police in connection with the cover-up. (Global Times)
  International relations:
  - Mexico–United States relations, Central American migrant caravans
  - The San Ysidro Port of Entry, the largest border crossing on the Mexico–United
    States border, is closed after U.S. border patrol agents fire tear gas at asylum-seeking
    Central American migrants attempting to enter into the United States. The events
    were triggered by Mexican police breaking up a migrant protest, resulting in a
    rush toward the border. (Reuters)
  Law and crime:
  - Cannabis in South Korea
  - South Korea becomes the first East Asian country to legalize medical cannabis.
    (Sputnik News)
  Politics and elections:
  - Brexit negotiations
  - European Union leaders approve the proposed Brexit deal, at a summit in Brussels.
    (BBC)
  - Swiss referendums, 2018
  - A referendum to give national law precedence over international law fails. (SRF)
