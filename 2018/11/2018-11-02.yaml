Date: '2018-11-02'
Source_URI: Portal:Current events/2018 November 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Unknown attackers kill Maulana Sami-ul-Haq, a former Pakistani senator widely
    known as the "Father of the Taliban", at his residence in Rawalpindi. (Geo TV),
    (Reuters)
  - 2018 Minya bus attack
  - An attack on a bus carrying Copts from Sohag Governorate to the Monastery of Saint
    Samuel the Confessor in Egypt kills seven people and injures several others. (Euronews
    and Reuters)
  Disasters and accidents:
  - 2018 European floods
  - In the floods that are affecting Italy, the death toll rises to 19 people. (Quotidiano)
  International relations:
  - Sanctions against Iran, Iran–United States relations, United States withdrawal
    from the Joint Comprehensive Plan of Action, Joint Comprehensive Plan of Action
  - The Trump administration announces the reimposition of all sanctions on Iran that
    were lifted under the July 2015 deal governing the nuclear program of Iran. (The
    Washington Post)
  - Brazil–Israel relations, Presidency of Jair Bolsonaro
  - The president-elect of Brazil, Jair Bolsonaro, states that he will honor his campaign
    pledge to move the country's embassy in Israel from Tel Aviv to Jerusalem. (AP
    via Deutsche Welle)
  Law and crime:
  - Blasphemy law in Pakistan
  - According to a pact between Tehreek-e-Labbaik Pakistan (TLP) and two Federal &
    Provincial Religious Affairs Ministers of Pakistan, the name of Asia Bibi will
    be placed on the Exit Control List which would prevent her leaving the country.
    TLP has already filed a review petition against the verdict of Supreme Court of
    Pakistan in the Asia Bibi blasphemy case. (Dawn News) (The Guardian)
  - 2018 Tallahassee shooting
  - A gunman kills two people and injures five others before killing himself at a
    yoga studio in Tallahassee, Florida, United States. (CBS News)
  - 2017–18 Spanish constitutional crisis
  - The Spanish Attorney General seeks jail terms for Catalan independence leaders
    for the crime of rebellion with the highest requested penalty being 25 years against
    Oriol Junqueras. The State's Advocacy is asking for prison sentences for only
    the lesser crimes of sedition and embezzlement. (Reuters)
  Politics and elections:
  - Twitter suspensions, Foreign electoral intervention
  - Twitter deletes 10,000 bot accounts that were discouraging people from voting
    in the midterm elections in the United States. (Reuters)
