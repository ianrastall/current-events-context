Date: '2018-11-11'
Source_URI: Portal:Current events/2018 November 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israel-Palestine confrontation (November 2018)
  - Seven Palestinians, including commander Nour Baraka and three other militants,
    are killed during a raid by the Israel Defense Forces in the southeastern Gaza
    Strip, that was supported by air attacks. One IDF officer was killed and another
    was injured. Over a dozen rockets were subsequently fired from Gaza, three of
    which were shot down. (KUNA) (BBC) (Al Jazeera)
  - World War I centenary
  - Around 70 world leaders in Paris mark the centenary of the 1918 Armistice which
    ended World War I. (ABS-CBN News)
  Disasters and accidents:
  - Camp Fire, Woolsey Fire, 2018 California wildfires
  - The death toll in the Camp and Woolsey wildfires has risen to 31 with more than
    200 people still missing. (BBC)
  International relations:
  - Killing of Jamal Khashoggi, Foreign relations of Saudi Arabia
  - Turkish President Recep Tayyip Erdoğan says that recordings related to the killing
    of Saudi journalist Jamal Khashoggi were issued to Saudi Arabia, the United States,
    the United Kingdom, Germany and France. (CNN)
  Law and crime:
  - Ten people are injured after a man steals a car by stabbing its owner and drives
    into pedestrians on a sidewalk and at a shopping mall in Brăila, Romania. (Star
    Tribune)
  - 2018 Australian strawberry contamination
  - A 50-year-old former strawberry farm supervisor is arrested in Queensland in connection
    with 230 reports of sewing needles found hidden in strawberries. The "strawberry
    scare" spread throughout the country and to New Zealand, and devastated Australia’s
    multimillion-dollar strawberry industry. (BBC) (The Mail)
  Politics and elections:
  - Democratic Republic of the Congo general election, 2018
  - The opposition coalition chooses lawmaker Martin Fayulu, leader of the Engagement
    for Citizenship and Development party, as its joint presidential candidate. (Reuters)
    (AFP via Yahoo News)
