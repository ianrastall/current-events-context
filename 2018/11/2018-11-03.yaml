Date: '2018-11-03'
Source_URI: Portal:Current events/2018 November 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - An Afghan commando in Kabul kills Major Brent Taylor of the Utah National Guard,
    who was also the mayor of North Ogden, Utah. (The New York Times)
  Disasters and accidents:
  - Lion Air Flight 610
  - An Indonesian Diving Rescue Team member dies while searching the debris from the
    passenger jet that crashed earlier this week near Jakarta. (ABC News)
  - A lorry loses control at a toll station in Lanzhou, China, killing at least 15
    people and injuring 44 others. (BBC)
  - Colten Treu faces charges of vehicular homicide and drug related charges after
    he drove his car into a group of Girl Scouts collecting trash by the road, killing
    3 and a mother along a Wisconsin highway (KSTP) Treu claimed his passenger was
    huffing Dust-Off and caused the accident by grabbing the wheel as he saw the scouts
    (Oxygen)
  Law and crime:
  - Foreign fighters in the Syrian and Iraqi Civil Wars
  - A 17-year-old Kashmir student who disappeared from Sharda University, Ahtesham
    Bilal Sofi, is found to have joined the Islamic State. (NDTV), (The Times of India)
  Sports:
  - Japan Series, Nippon Professional Baseball
  - The Fukuoka SoftBank Hawks defeat the Hiroshima Toyo Carp to win the 2018 Japan
    Series. (The Japan Times)
