Date: '2018-11-17'
Source_URI: Portal:Current events/2018 November 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - After months of fighting, Syrian government forces retake control of Tulul al-Safa
    in southern Syria from ISIL. (The New Arab)
  Disasters and accidents:
  - 2018 California wildfires
  - 'U.S. President Donald Trump visits victims of the Camp Fire and Woolsey Fire
    as the death toll rises to 79: 76 in the Camp Fire and three in the Woolsey Fire.
    (CNN) (NBC News) (BBC)'
  Politics and elections:
  - Florida gubernatorial election, 2018
  - Florida Democratic candidate for governor Andrew Gillum concedes defeat to Republican
    candidate Ron DeSantis. (CBS News)
  - Gilets jaunes protests
  - Hundreds of thousands protest against fuel taxes in France by blocking roadways.
    One person is killed and more than 200 are injured in subsequent altercations.
    (The New York Times)
  - The medical records of British monarch George III are released, solving the mystery
    of the King's illness, which has plagued historians for hundreds of years. Doctors
    say he would have been diagnosed with bipolar disorder had he lived today. (People)
  - Ibrahim Mohamed Solih takes the oath of office and becomes the 7th President of
    the Maldives. (Al Jazeera)
