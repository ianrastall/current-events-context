Date: '2018-11-28'
Source_URI: Portal:Current events/2018 November 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A series of U.S. airstrikes kills at least 30 Afghan civilians, including 16 children,
    in Garmsir District, Helmand Province. Additional civilians were left injured
    or buried in the rubble. The target of the strikes was a suspected Taliban compound.
    The United States' strategy aims to push the Taliban into talks. (Reuters)
  - At least 10 people are killed and 19 are wounded in an attack on a compound of
    the G4S security contracting company in the Afghan capital Kabul. The Taliban's
    strategy seeks to strengthen its position before any formal negotiations. (Al
    Jazeera)
  Disasters and accidents:
  - A chain reaction of exploding trucks triggered by a blast during the delivery
    of acetylene gas at a chemical plant in Zhangjiakou, China, kills 23 people and
    injures at least 22 others. (Reuters)
  - Flash flooding kills two people and causes major power outages in Sydney, Australia.
    (BBC)
  International relations:
  - India–Pakistan relations
  - Personalities from both countries inaugurate a corridor that will enable Sikh
    pilgrims to travel visa-free between the Indian town of Dera Baba Nanak and the
    Sri Kartarpur Sahib Gurdwara in Pakistan. (Al Jazeera)
  Politics and elections:
  - Malagasy presidential election, 2018
  - Two former presidents, Andry Rajoelina and Marc Ravalomanana, advance to the second
    round, due to be held on December 19. Incumbent president Hery Rajaonarimampianina
    is eliminated. (Reuters)
  - Doctors and firefighters strike in Catalonia, Spain, over budget cuts, ending
    with clashes between demonstrators and Mossos d'Esquadra at the doors of Catalan
    Parliament. Students and teachers start a two-day strike. (El País)
  Sports:
  - World Chess Championship 2018
  - Magnus Carlsen retains the title after a 3–0 victory against Fabiano Caruana in
    the best-of-four rapid tiebreaking series. (The Guardian)
