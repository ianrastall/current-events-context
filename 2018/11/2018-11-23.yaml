Date: '2018-11-23'
Source_URI: Portal:Current events/2018 November 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Karachi Chinese consulate attack
  - Four people are killed in an armed assault on the Chinese consulate in Karachi,
    Pakistan. Three attackers are also dead. The attack is claimed by the Balochistan
    Liberation Army. (CNN)
  - 2018 Orakzai bombing
  - An explosion kills at least 35 people and injures at least 55 at a market in Kalaya,
    Khyber Pakhtunkhwa, northern Pakistan. (Al Jazeera)
  - War in Afghanistan (2001–2021)
  - At least 26 Afghan security forces are killed and 50 are injured by a suicide
    blast in a mosque inside an army base in Khost Province, Afghanistan. (Reuters
    via U.S. News & World Report)
  - Witnesses say that gunmen in pickup trucks attacked a police station in Tazirbu,
    southeast Libya. At least five people were killed and several civilians were abducted.
    (AP via WETM TV18)
  Disasters and accidents:
  - 'Four Finnish tourists and a Zimbabwean pilot are killed when a Cessna S206 crashes
    in Masvingo Province, in southern Zimbabwe. Two Finnish business leaders were
    among the dead: , the CE of the maintenance services and circular economy company
    , and , a director of the forestry company UPM. (Yle)'
  - Margaash, an eight year old snow leopard, is shot dead by staff at Dudley Zoological
    Gardens, England after escaping its enclosure. (BBC)
  Law and crime:
  - Khadim Hussain Rizvi, chief of Pakistani political party Tehreek-e-Labbaik Pakistan
    (TLP), together with his party leaders, is arrested after TLP's refusal to postpone
    their call for a public rally planned for 25 November at Liaqat Bagh, Rawalpindi.
    Pakistan's Federal Minister for Information and Broadcasting Fawad Chaudhry clarifies
    that the action has no connection with the Asia Bibi case. (Dawn), (Pakistan Today)
  Politics and elections:
  - 2018 Sri Lankan constitutional crisis
  - Lawmakers opposed to Mahinda Rajapaksa as Prime Minister win a vote for control
    of a new 13-member parliamentary main committee. (Reuters)
  - Workers at Amazon distribution centers in Germany and Spain protest labour conditions
    in a strike coinciding with the Black Friday shopping peak. (AP via WSFA) (Reuters)
  - The London Metropolitan Police Service releases video footage of police cars being
    driven into suspected criminals on scooters. They say the tactic isn't new. (BBC)
  Sports:
  - Phil Mickelson defeats Tiger Woods after 22 holes of match play at Shadow Creek
    Golf Course to win $9 million USD. (BBC)
