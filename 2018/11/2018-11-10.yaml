Date: '2018-11-10'
Source_URI: Portal:Current events/2018 November 10
Intelligence_Payload:
  Arts and culture:
  - Presidential Medal of Freedom
  - Elvis Presley, Babe Ruth, Roger Staubach, Antonin Scalia, Orrin Hatch, doctor
    and philanthropist Miriam Adelson, and Alan Page are expected to be recipients
    for the Presidential Medal of Freedom award. (Entertainment Weekly), (The Washington
    Post)
  Disasters and accidents:
  - Camp Fire, Woolsey Fire, 2018 California wildfires
  - The town of Paradise, California, with a population of 27,000, is largely burned
    down. More than 6,700 buildings have been destroyed, making it California's most
    destructive wildfire since record-keeping began. (CBC)
  - Butte County Sheriff Kory Honea reports 14 additional bodies have been found in
    the city of Paradise bringing the death toll to 23; Honea added there are 110
    outstanding reports of missing people. (AP via MSN.com)
  - Two people have been confirmed killed by the Woolsey Fire, which has burned 70,000
    acres and hundreds of homes near Los Angeles. (BBC)
  - 2018 Kivu Democratic Republic of the Congo Ebola virus outbreak
  - The death toll of the ebola virus outbreak in the Democratic Republic of the Congo
    that started in August, rises to 200 people. This is the deadliest ebola outbreak
    in the history of the country. (BBC)
  - A landslide leaves at least 10 people dead while eleven others are injured in
    Niterói, Brazil. (The Guardian)
  Law and crime:
  - RCMP confirm one of two explosions at the Strathcona County Community Centre in
    Sherwood Park, Alberta on November 6th was deliberate, and the other was accidentally
    set off. They also disclose the suspect shot himself and later died from his wounds.
    No one else was hurt in the incident, and a motive for the incident is still under
    investigation. (CTV News)
  Politics and elections:
  - Florida elections, 2018
  - Florida Secretary of State Ken Detzner orders machine recounts in the U.S. Senate
    race and the state's governor and agriculture commissioner races as required by
    law when the lead is less than 0.5 percent. Results are due by 3 p.m. EST Thursday.
    Should the results still be within 0.25 percentage points, a manual recount will
    be triggered, with results due on November 18. (CNBC) (NPR)
  Sports:
  - Japanese side Kashima Antlers wins 2018 AFC Champions League after winning 2–0
    on aggregate against Iranian Persepolis in the final. (Sporting News)
