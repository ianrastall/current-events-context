Date: '2018-11-01'
Source_URI: Portal:Current events/2018 November 1
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Pacific typhoon season
  - The death toll from landslides and floods caused by Typhoon Yutu in the Philippines
    rises to 15 people. One man died in Hong Kong, China. (News.com.au), (Asia Times)
  - Lion Air Flight 610
  - Indonesian divers retrieve the flight data recorder from the ocean near Karawang,
    Indonesia, where the plane had crashed three days prior. (Reuters)
  - 2018 European floods
  - The death toll from heavy floods and strong winds affecting Italy rises to 17
    people. (La Repubblica)
  - 2018 Chongqing bus crash
  - Chinese police announce that the driver of the bus that plunged into the Yangtze
    River in Chongqing, China, on October 28 was arguing and fighting with a passenger
    moments earlier, causing the accident. (BBC)
  Health and environment:
  - Legality of cannabis, Cannabis in the United Kingdom
  - Medical cannabis becomes legal in the United Kingdom as the National Health Service
    can now prescribe it to some patients, including those with cancer, severe forms
    of epilepsy, and multiple sclerosis. (BBC)
  International relations:
  - Greece–Republic of Macedonia relations, Macedonia naming dispute
  - Commercial air travel resumes between Greece and Macedonia for the first time
    since 2006. (BBC)
  Law and crime:
  - Capital punishment in Tennessee
  - The state of Tennessee executes Edmund Zagorski, a man convicted of the April
    1983 murders of John Dotson and Jimmy Porter, making it the first time the state
    has executed an inmate by electrocution since 2007. Zagorski requested that he
    be executed via electrocution. (NBC News), (ABC News)
  Politics and elections:
  - Meaza Ashenafi becomes the first woman in Ethiopia's history to preside over the
    Supreme Court. (CNN)
  - British Sports Minister Tracey Crouch resigns amid controversy over a delay on
    regulating fixed odds betting terminals. (Sky News)
  Science and technology:
  - Asteroid belt exploration
  - NASA's Dawn spacecraft exhausts all of its hydrazine fuel propellant and without
    a functioning maneuvering system enters into uncontrolled motion around dwarf
    planet Ceres, thus ending its 11-year mission. (CNN)
  - Astronomers from Harvard University suggest that the interstellar object 'Oumuamua
    may be an extraterrestrial solar sail from an alien civilization, in an effort
    to help explain the object's "peculiar acceleration". (The Independent)
