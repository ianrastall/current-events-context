Date: '2018-11-24'
Source_URI: Portal:Current events/2018 November 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Syrian state media report that more than 50 civilians are injured in a suspected
    poison gas attack by Syrian rebels on Aleppo. (The Sydney Morning Herald)
  Disasters and accidents:
  - Traffic accidents in India
  - A bus crash in Karnataka, India, leaves at least 25 people dead as the vehicle
    sinks into a canal. (The Guardian)
  - At least 35 people died after a cruise boat carrying party revellers capsized
    on Lake Victoria, Uganda. (CNN)
  International relations:
  - Brexit negotiations
  - The Spanish government and the UK government reach an agreement on Gibraltar whereby
    Spain lifts its threat of boycotting Sunday's summit on Brexit. Prime Minister
    Pedro Sánchez says there are now "sufficient guarantees" that any future decisions
    regarding Gibraltar would be made with Spain. (The New York Times) (Reuters)
  - Mexico–United States relations
  - U.S. President Donald Trump announces that migrants seeking asylum at the southern
    border will wait in Mexico while their claims are processed in U.S. courts. Mexico's
    incoming foreign minister Marcelo Ebrard denies an agreement has been reached,
    and says "(no) specific proposal" has been received from the United States. Andrés
    Manuel López Obrador's administration will take power next Saturday, December
    1. (USA Today) (BBC)
  Politics and elections:
  - Politics of Taiwan
  - Taiwanese President Tsai Ing-wen resigns as leader of the Democratic Progressives
    and refuses Prime Minister William Lai's offer to quit after a major defeat in
    local elections. (Reuters) (Associated Press)
  - Same-sex marriage in Taiwan
  - Referendum voters in Taiwan reject a proposal to allow same-sex marriage. A March
    2017 Constitutional Court ruling found the ban on these unions unconstitutional
    and ordered parliament to change the law within two years. Earlier, the government
    said the results of this vote would not affect its complying with the court's
    decision. (BBC)
  - Yellow vests movement
  - Violent clashes between French police and protesters last well into the night
    on the Champs-Élysées in Paris over rising fuel taxes. (Reuters)
  - United Kingdom national security, Russia–United Kingdom relations
  - The British Army Chief of the General Staff, Mark Carleton-Smith, says Russia
    is a "far greater threat" to the United Kingdom's national security than the Islamic
    State. (BBC)
  Sports:
  - World Chess Championship 2018
  - After eleven consecutive draws, a record for the 132-year-old championship, Magnus
    Carlsen and Fabiano Caruana are tied 5.5 points each in the best-of-12-games match.
    (The Guardian)
