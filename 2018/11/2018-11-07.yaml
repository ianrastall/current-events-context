Date: '2018-11-07'
Source_URI: Portal:Current events/2018 November 7
Intelligence_Payload:
  Arts and culture:
  - Jean-Claude Arnault, Postponement of the 2018 Nobel Prize in Literature
  - Jayne Svenungsson announces she is leaving the Swedish Academy, the body that
    awards the Nobel Prize in Literature. She is the eighth person to quit amid sex
    abuse and financial crime scandals at the exclusive group. (AP via The New York
    Times)
  - Premiership of Justin Trudeau, History of the Jews in Canada
  - Canadian Prime Minister Justin Trudeau issues an apology for the country's role
    in turning away the , a ship carrying over 900 Jewish refugees fleeing persecution
    in Nazi Germany. (BBC) (Washington Post)
  Disasters and accidents:
  - Authorities find the bodies of two other men in the two collapsed buildings in
    Marseille, France, two days ago, bringing the death toll to six. (The Journal.ie)
  - A pair of buses collide on a road between Harare and Rusape, Zimbabwe, killing
    at least 47 people. (e News Channel Africa)
  Law and crime:
  - An unidentified attacker fatally shoots Benjamin Ramos, a Philippines lawyer opposing
    President Rodrigo Duterte's war on drugs, in Kabankalan. (The New York Times)
  - Asia Bibi blasphemy case
  - Pakistani Christian woman Asia Bibi, sentenced to death by hanging in 2010 and
    recently acquitted, is released from prison. Bibi has reportedly boarded a plane;
    however, its destination was not known. Several countries have offered her asylum.
    (BBC)
  - Thousand Oaks shooting
  - At least 12 people, including a police sergeant, are killed while ten others are
    injured by a gunman at the Thousand Oaks Borderline Bar and Grill in Thousand
    Oaks, California at around 11:15 p.m. PST (UTC-8). The gunman committed suicide
    at the end of the attack after a stand-off with police. (BBC)
  - The FBI and police find new clues in the search for Ashley Summers, who had been
    missing from her residence in Cleveland, Ohio since 2007. (Fox 8)
  - John Chau
  - The Sentinelese people kill John Allen Chau, with fishermen finding his body lying
    on a beach. (NDTV)
  Politics and elections:
  - Trump administration dismissals and resignations
  - Jeff Sessions asked to resign as United States Attorney General at the request
    of President Donald Trump. Matthew Whitaker, Sessions' chief of staff, is appointed
    acting Attorney General. (The Guardian)
