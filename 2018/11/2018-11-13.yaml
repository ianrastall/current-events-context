Date: '2018-11-13'
Source_URI: Portal:Current events/2018 November 13
Intelligence_Payload:
  Business and economy:
  - Amazon HQ2
  - Amazon announces it will split their second headquarters in New York City and
    National Landing in northern Virginia (outside Washington D.C.) (CNN)
  Disasters and accidents:
  - 2018 California wildfires
  - The death toll of the Camp Fire in Butte County, the deadliest wildfire in Californian
    history, rises to 48 people while dozens are missing. (BBC)
  Law and crime:
  - CNN v. Trump
  - CNN files a lawsuit against the Trump administration, claiming its revocation
    of White House correspondent Jim Acosta's press pass on November 7 violated their
    First and Fifth Amendment rights. (The Washington Post)
  - Several media organizations file amicus briefs in support of CNN. (Vox)
  - One America News Network files an amicus brief in support of the Trump administration.
    (CNBC)
  - Pike County, Ohio shootings
  - Four suspects have been arrested for the murders of eight members of a family
    in 2016. Police believe custody of a child plays a role in this case. One of the
    suspects has a child with one of the victims. (CNN)
  - Bishop International Airport incident
  - Amor Ftouhi is found guilty of three federal charges in the stabbing of an airport
    police officer last year in Flint, Michigan. (NBC News)
  Politics and elections:
  - 2018 Sri Lankan constitutional crisis
  - The Supreme Court of Sri Lanka reverses President Maithripala Sirisena's decisions
    to dissolve Parliament and to hold snap elections. (Al Jazeera)
  - Brexit
  - The Government of the United Kingdom says that UK and EU negotiators reached a
    draft agreement and that it will be discussed by Cabinet tomorrow. (AP via ABC
    News)
  - 2026 Winter Olympics
  - Residents of the city of Calgary head to the polls to vote on a non-binding plebiscite
    to determine if the city should make a bid to host the 2026 Winter Olympic Games.
    (CTV News)
  - The unofficial results suggest the No vote is in the lead, and only a 40% voter
    turnout. Official results will be released Friday, November 16. (City of Calgary)
  - First Lady of the United States Melania Trump calls for the ousting of Deputy
    National Security Advisor Mira Ricardel. (Toronto Star) (Reuters)
  - The Islamic City Council of Tehran appoints Pirouz Hanachi as the new mayor of
    Tehran, the third in 18 months. (RFE/RL)
  Science and technology:
  - Timeline of nuclear fusion
  - China's Hefei Institutes of Physical Science announces that its Experimental Advanced
    Superconducting Tokamak (EAST) reactor in Hefei has reached a milestone of 100
    million degrees celsius. (CGTN)
