Date: '2018-11-22'
Source_URI: Portal:Current events/2018 November 22
Intelligence_Payload:
  Arts and culture:
  - The Leaning Tower of Pisa Surveillance Group reports the structure is leaning
    less, by over the past two decades. (BBC)
  Disasters and accidents:
  - A dust storm, that engulfed parts of Australia’s outback, reaches Sydney. (BBC)
    (Irish Times)
  Health and environment:
  - Dog meat
  - South Korea shuts down the country's largest dog meat slaughterhouse. The move
    is lauded by animal rights activists. (CNN)
  International relations:
  - Foreign relations of Denmark
  - Denmark suspends future weapons export licenses to Saudi Arabia in response to
    the killing of Jamal Khashoggi and the Saudi Arabian-led intervention in Yemen.
    (Reuters)
  - Brexit negotiations
  - President of the European Council Donald Tusk says there is agreement "in principle"
    on a political deal that can be endorsed at an EU summit. (RTÉ)
  - Spain threatens to vote against if there is no agreement on Gibraltar by which
    it demands new guarantees. (The Daily Mail)
  - The United States urges their allies not to use Huawei network equipment, reportedly
    out of national security concerns. (The Hill)
  Law and crime:
  - 2017 Jewish Community Center bomb threats
  - An Israeli-American man, Michael Kadar, is sentenced to 10 years in prison in
    Israel for making 2,000 hoax bomb threats that forced evacuations of Jewish community
    centers in the United States. The threats, made by phone and email in 2016 and
    2017, raised concern that antisemitism was on the rise in the United States. (Reuters)
  - Chinese state media report that five people are killed and 18 others are injured
    after a car plowed into children outside a primary school in Huludao, Liaoning,
    China. (Toronto Star)
  - Me Too movement in South Korea
  - Lee Jae-rock, a South Korean pastor and leader of Manmin Central Church, is sentenced
    to 15 years in prison over 42 counts of sexual harassment and sexual assault against
    eight of his followers. According to the Seoul Central District Court, the victims
    could not resist his advances "due to their absolute faith in the infallibility
    of the accused." (CNN)
  Science and technology:
  - Global warming
  - The World Meteorological Organization reports that average global carbon dioxide
    concentrations rose to 405.5 parts per million in 2017. They say this level was
    not seen since at least 3 million years ago. (Associated Press)
  Sports:
  - World Chess Championship 2018
  - After ten consecutive draws, a record for the 132-year-old championship, Magnus
    Carlsen and Fabiano Caruana are tied 5 points each in the best-of-12-games match.
    (The Guardian)
