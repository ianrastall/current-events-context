Date: '2018-11-19'
Source_URI: Portal:Current events/2018 November 19
Intelligence_Payload:
  Business and economy:
  - Nissan chairman and former CEO Carlos Ghosn is arrested in Japan for breaching
    the country's financial trading laws, prompting Nissan to recommend that he and
    director Greg Kelly step down for misconduct. Ghosn is also the chairman and CEO
    of Renault. (The Irish Times)
  - The offshore section of the TurkStream gas pipeline, between Russia and Turkey,
    is completed. (Bloomberg)
  - David's Bridal files for Chapter 11 bankruptcy. (USA Today)
  Disasters and accidents:
  - 2018 Vietnam floods
  - Landslides due to rains from a tropical storm have killed 13 people and left four
    others missing in south-central Vietnam. (News24)
  International relations:
  - President of the Maldives Ibrahim Mohamed Solih and his Cabinet announce that
    the Maldives is set to return to be a member of the Commonwealth of Nations as
    a republic in the Commonwealth of Nations. (Times Now)
  Law and crime:
  - Watts family homicides
  - Chris Watts of Frederick, Colorado, is sentenced to three consecutive terms of
    life in prison without the possibility of parole for killing his pregnant wife
    Shanann and their two young daughters. (CBS News)
  - Mercy Hospital shooting
  - A shooting takes place at Mercy Hospital in Chicago, leaving four dead, including
    the gunman. (ABC)
  - CNN v. Trump
  - CNN drops its lawsuit against the Trump administration after the White House restores
    reporter Jim Acosta's press pass. (The Washington Post)
  - The White House also issues a set of four guidelines reporters must follow at
    press conferences to avoid further press pass revocations. (ABC News)
  - List of executive actions by Donald Trump
  - A federal judge blocks an order by President Trump that denies asylum to illegal
    immigrants. (The Washington Post)
  Science and technology:
  - Exploration of Mars
  - NASA selects Jezero crater on Mars as the landing site for the Mars 2020 rover.
    The crater was once a large lake and may hold evidence of ancient life. (BBC)
  Sports:
  - 2018 NFL season
  - The Los Angeles Rams defeat the Kansas City Chiefs 54–51 on Monday Night Football
    in the third-highest scoring NFL game in history. (The Guardian)
