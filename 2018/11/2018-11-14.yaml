Date: '2018-11-14'
Source_URI: Portal:Current events/2018 November 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Anglophone Crisis
  - The Cameroonian Armed Forces kill at least 30 Ambazonian separatists in two-days
    of intense clashes in Cameroon's English-speaking region. A mayor in Donga-Mantung
    is also shot dead. (Al Jazeera)
  Disasters and accidents:
  - 2018 California wildfires
  - The death toll in the Camp Fire rises to 56, with the statewide total at 59. Authorities
    release the names of 130 people who are missing, including many in their 80s and
    90s, with the potential that dozens more are unaccounted for. (CBS News)
  - A hot air balloon filled with fireworks and other pyrotechnics explodes midair
    during Tazaungdaing festival celebrations in Taunggyi, Myanmar, injuring nine
    people on the ground. (ABC News)
  International relations:
  - Brexit negotiations
  - British Prime Minister Theresa May wins approval of her Brexit plan from her cabinet,
    although many Conservative and opposition MPs voice strong disapproval. (The Guardian)
    (Politics Home)
  - The United Nations Security Council unanimously votes to lift sanctions on Eritrea.
    (BBC)
  Law and crime:
  - 2018 California wildfires
  - A lawsuit is filed against Pacific Gas and Electric Company, alleging company
    negligence and health and safety code violations in the Camp Fire, which has killed
    at least 48 people. (Reuters) (Los Angeles Times)
  - Persecution of Muslims in Myanmar, Inn Din massacre
  - U.S. Vice President Mike Pence condemns Myanmar's treatment of Rohingya Muslims
    and called for Aung San Suu Kyi to pardon Wa Lone and Kyaw Soe Oo, the two Reuters
    journalists imprisoned in the country. (Huffington Post)
  - Tampon tax
  - The Constitutional Court of Colombia unanimously rules to strike down a five per
    cent tax on feminine hygiene products on gender equality grounds. (El Tiempo)
  Politics and elections:
  - 2018 Fijian general election
  - Citizens of Fiji head to the polls, electing all members of their Parliament and
    the consequent Prime Minister. (Australian Broadcasting Corporation)
  - Prime Minister Frank Bainimarama of the FijiFirst party wins a second term. Bainimarama's
    party holds on to a slim majority of seats in the parliament. (Stuff NZ)
  - 2018 Sri Lankan constitutional crisis
  - The Sri Lankan Parliament reconvenes. The Speaker says it passed a motion of no
    confidence against the disputed Prime Minister Mahinda Rajapaksa. (Al Jazeera)
  - Cabinet of Israel
  - Defence Minister Avigdor Lieberman announces his resignation with effect in 48
    hours in response to the Egyptian-mediated ceasefire between Israel and Hamas.
    (Al Jazeera) (BBC)
  - White House Press Secretary Sarah Huckabee Sanders says Deputy National Security
    Advisor Mira Ricardel is "to transition to a new role within the administration",
    a day after First Lady Melania Trump called for Ricardel's ousting. (Reuters)
  Science and technology:
  - Astronomers announce, through the journal Nature, the discovery of Barnard's Star
    b, a Super-Earth exoplanet orbiting Barnard's Star, the fourth-nearest-known individual
    star to the Sun. (BBC)
