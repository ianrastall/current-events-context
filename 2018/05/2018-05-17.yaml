Date: '2018-05-17'
Source_URI: Portal:Current events/2018 May 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - International military intervention against ISIL
  - Denmark announces the partial withdrawal of its special forces from Iraq following
    the collapse of ISIL in the country. (Channel NewsAsia)
  Disasters and accidents:
  - 2018 lower Puna eruption
  - The summit at Kīlauea erupts and sends a plume of ash and smoke into the air.
    (CNN) (BBC)
  - A school bus and a dump truck collide on Interstate 80 in Mount Olive Township,
    New Jersey, U.S., killing two people and injuring 43. (CNN)
  Politics and elections:
  - 2017–18 Spanish constitutional crisis
  - Quim Torra is sworn in as the 131st President of the Generalitat of Catalonia,
    200 days after the cessation of the government of Puigdemont and the direct rule.
    He does not swear on the Constitution and the Statute of Autonomy, but rather
    on "the will of the people of Catalonia". (El País)
  - Burundian constitutional referendum, 2018
  - Voters in Burundi go to the polls for a referendum to amend the constitution to
    allow current President Pierre Nkurunziza to stay in office until 2034. (The Guardian)
  - Poland detains Yekaterina C., a Russian woman who was part of a pro-Russian group
    that sought to whip up tension between Poland and Ukraine, and expels her. (Kyiv
    Post)
