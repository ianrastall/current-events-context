Date: '2018-05-27'
Source_URI: Portal:Current events/2018 May 27
Intelligence_Payload:
  Arts and culture:
  - Politics of Japan
  - Former Japanese Prime Minister Yasuhiro Nakasone celebrates his 100th birthday.
    (Reuters)
  - Politics of the United States
  - Former U.S. President George H. W. Bush, aged 93, is hospitalized for observation
    due to hypotension (low blood pressure) and fatigue at Southern Maine Health Care.
    (Reuters)
  Disasters and accidents:
  - More than 200 departures are delayed and about 50 arrivals and departures are
    cancelled after lightning hit the aircraft fuel system at London Stansted Airport.
    Violent thunderstorm accompanied by heavy rain overnight caused flooding and property
    damage; the UK was struck by lightning more than 60,000 times in 24 hours, according
    to the Met Office. (Sky News) (Sky News2)
  Law and crime:
  - Mexican Drug War
  - Mexican authorities arrest Rosalinda Garcia, the wife of Jalisco New Generation
    Cartel leader Nemesio Oseguera Cervantes, one of the country's most wanted drug
    lords. (New York Post)
  - Blockade of the Gaza Strip, Human rights in the State of Palestine
  - Israeli Minister of Defense Avigdor Lieberman says that Israel has started building
    a "unique obstacle" along the Zikim beach, a three-story-high kind of breakwater
    designed to cut off the inhabitants of the Gaza Strip from access to Israel by
    the sea. The "impenetrable" structure made of stone and fence is expected to be
    completed before the end of this year. (Belga via De Standaard) (AFP via The Daily
    Star)
  - A member of a Palestinian committee tasked with breaking the siege says a ship
    will set off on Tuesday, carrying a number of injured Gazans and patients aboard.
    He does not specify the ship's first planned stop. (MEMO)
  Politics and elections:
  - Colombian presidential election, 2018
  - Voters in Colombia go to the polls in the first round of a presidential election.
    (BBC News)
  - Politics of Germany
  - An estimated 20,000 people protest against an Alternative for Germany rally attracting
    5,000 demonstrators in Berlin; 2,000 police are deployed. (Al Jazeera)
  - Politics of the State of Palestine
  - Palestinian President Mahmoud Abbas's discharge from the hospital is delayed.
    (Fox News)
  - Politics of Egypt
  - Security sources say that prominent opposition leader Hazem Abdel-Azim has been
    detained. (Reuters) (Deutsche Welle)
  - Politics of Italy
  - Prime Minister designate Giuseppe Conte gives up trying to form a government after
    President Sergio Mattarella earlier vetoed the nomination of technocrat Paolo
    Savona as Minister of Finance. (Bloomberg)
  Sports:
  - 2018 Indian Premier League
  - Chennai Super Kings defeat Sunrisers Hyderabad by 8 wickets in the final of the
    Indian Premier League to win the title for the third time. (Cricinfo)
  - 2018 IndyCar Series
  - 2014 IndyCar Series champion Will Power of Australia wins the 102nd running of
    the Indianapolis 500. It is Danica Patrick's final race before her retirement.
    (NBC Sports)
