Date: '2018-05-18'
Source_URI: Portal:Current events/2018 May 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Santa Fe High School shooting
  - A school shooting takes place at Santa Fe High School in Texas, United States.
    Eight students and two teachers are killed and thirteen others are injured. (KTRK-TV)
    (BBC)
  - A gunman opens fire on the Trump National Doral Miami golf resort in Doral, Florida,
    before being shot and wounded by police. No other victims were reported. (The
    Washington Post) (USA Today)
  - A shooting takes place outside of a high school graduation at Mt. Zion High School
    in Jonesboro, Georgia. One person is killed and another wounded. (Los Angeles
    Times) (FOX2Now)
  Business and economy:
  - Facebook–Cambridge Analytica data scandal
  - Cambridge Analytica files for Chapter 7 bankruptcy. (CNN)
  Disasters and accidents:
  - Cubana de Aviación Flight 972
  - A Boeing 737 crashes shortly after taking off from Havana, Cuba, with 104 passengers
    and nine crew on board. Only three people are reported to have survived the crash.
    One survivor later dies from her injuries. (CNN) (BBC)
  - Over 30 people are injured, seven seriously, in a bus collision at Lincoln Tunnel
    between New Jersey and New York, United States. (Business Insider)
  Health and environment:
  - 2018 Democratic Republic of the Congo Ebola virus outbreak
  - Two more cases of ebola reported in the city of Mbandaka in the Democratic Republic
    of the Congo. 25 people have died this year in the country from the disease, with
    a wider outbreak feared. (The Guardian)
  - Poisoning of Sergei and Yulia Skripal
  - Sergei Skripal is discharged from hospital after two months. (BBC)
  Law and crime:
  - All 34 Roman Catholic bishops in Chile offer to resign after Pope Francis accused
    them of destroying evidence of sexual crimes. (Reuters)
  Politics and elections:
  - Rohingya refugees in Bangladesh
  - The government of Myanmar agrees to repatriate 1,101 Rohingya refugees out of
    a list of over 8,000 submitted by their Bangladeshi counterparts. There are currently
    over 700,000 Rohingya refugees in Bangladesh. (The Daily Star)
