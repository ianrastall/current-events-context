Date: '2018-05-14'
Source_URI: Portal:Current events/2018 May 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Surabaya bombings
  - An Indonesian family believed to be connected to the terrorist group Jamaah Ansharut
    Daulah attacks police headquarters in Surabaya. The attack kills all four perpetrators
    and injures the perpetrator's daughter, six civilians, and four police officers.
    (ABC News)
  Business and economy:
  - The Dutch government, following similar moves by the United States and the United
    Kingdom, announces that it is phasing out the use of antivirus software products
    from the Russian company Kaspersky Lab "as a precautionary measure". (Nasdaq)
  Disasters and accidents:
  - Natural disasters in India
  - Thunderstorms and lightning strikes kill up to 80 people in five states in India,
    mainly in Uttar Pradesh. (The Times of India)
  - A pilot is injured when a cockpit window breaks and he is partially sucked out
    of the Airbus A319 operating Sichuan Airlines Flight 8633. The aircraft lands
    safely at Chengdu. (The Aviation Herald)
  International relations:
  - United States recognition of Jerusalem as capital of Israel
  - On the 70th anniversary of the formation of Israel, the United States becomes
    the first country with an embassy in Jerusalem after a dedication ceremony featuring
    Israeli leaders and White House advisers. (NPR)
  - Tens of thousands of Palestinians protest on the border of Gaza. The Israel Defense
    Forces reports some in the crowds were planting or hurling explosives, and that
    many were flying flaming kites into Israel. The Gaza Health Ministry reports at
    least 58 killed and over 2,400 wounded by Israeli forces using live fire and tear
    gas. (The New York Times) (The Guardian)
  - Six-time Israeli Premier League champion Beitar Jerusalem F.C. officially renames
    itself Beitar Trump Jerusalem F.C. for U.S. President Donald Trump's decision
    to move the embassy. (The Guardian)
  Law and crime:
  - The U.S. Supreme Court, in a case brought by New Jersey challenging the Professional
    and Amateur Sports Protection Act (PASPA), which prohibited state-sponsored sports
    betting outside of four grandfathered states, holds that PASPA is unconstitutional,
    opening the door for all states to authorize sports betting. (CNN)
  Politics and elections:
  - 2017–18 Spanish constitutional crisis
  - The Catalan parliament elects hard-line separatist Quim Torra to become the President
    of the Generalitat of Catalonia after obtaining 66 votes in favor, 65 against
    and four abstentions. (Reuters) (BBC)
