Date: '2018-05-19'
Source_URI: Portal:Current events/2018 May 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Russian military intervention in Ukraine
  - Ukraine's Joint Forces Operation says Russian-led militants have mounted 43 attacks
    on Ukrainian troops in Donbas in the past 24 hours, using artillery systems and
    120mm and 82mm mortars 10 times, with no casualties among the Ukrainian servicemen.
    According to intelligence data, two militants are killed and three others wounded.
    (UNIAN)
  Arts and culture:
  - Wedding of Prince Harry and Meghan Markle
  - The wedding of Prince Harry and Meghan Markle takes place at St George's Chapel,
    Windsor Castle. They are given the titles the Duke and Duchess of Sussex. (BBC)
  International relations:
  - 2018 China–United States trade dispute
  - The United States and China say through a joint statement that they will not impose
    new tariffs on each other after reaching an initial agreement on the trade framework.
    (CNN)
  Law and crime:
  - Human rights in Saudi Arabia
  - Women's rights in Saudi Arabia
  - The state security of Saudi Arabia arrests seven women's rights activists, whom
    the pro-government media presented as "traitors to the fatherland," for allegedly
    working with foreign entities. These arrests take place a little more than a month
    before the driving ban for women is lifted. (The Independent)
  Politics and elections:
  - Antireligious campaigns in China, Freedom of religion in China
  - The Islamic Association of China, a government-affiliated and the country's top
    Islamic regulatory body, announces through a letter on its website that all mosques
    should raise the national flag; the letter comes in light of the country's newly
    revised Regulations on Religious Affairs which intensifies punishments for unsanctioned
    religious activities and increases state supervision of religion. (The Times of
    India)
  - French Polynesian legislative election, 2018
  - Edouard Fritch is re-elected to a second term as President of French Polynesia
    following the victory by his Tapura Huiraatira party in the general election.
    Fritch's Tapura Huiraatira won 39 of the 57 seats in the Assembly of French Polynesia.
    (Radio New Zealand International)
  - Iraqi parliamentary election, 2018
  - The electoral commission announces the results of the May 12 elections. Muqtada
    al-Sadr's list wins most seats, followed by Hadi al-Amiri and Haider al-Abadi's
    groups. (Reuters)
  - 2017–18 Spanish constitutional crisis
  - New President of the Generalitat of Catalonia, Quim Torra, forms a new regional
    government, including the dismissed and imprisoned members Jordi Turull and Josep
    Rull, and "self-exiled" dismissed members Lluís Puig and Toni Comín. (El Periódico)
  Sports:
  - 2018 DFB-Pokal Final
  - Eintracht Frankfurt beat Bayern Munich 3–1 at Olympiastadion to win the 75th edition
    of the DFB-Pokal. (ESPN)
  - 2018 FA Cup Final
  - Chelsea beat Manchester United 1–0 at Wembley to win the 137th edition of the
    FA Cup. (BBC Sport)
  - 2018 Preakness Stakes
  - Justify wins the second leg of the Triple Crown, the Preakness Stakes, in 1:55.93.
    (ESPN)
