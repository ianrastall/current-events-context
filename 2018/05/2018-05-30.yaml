Date: '2018-05-30'
Source_URI: Portal:Current events/2018 May 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ukrainian crisis
  - Arkady Babchenko, who was reportedly assassinated yesterday in Kiev, Ukraine,
    appears on live television stating that the assassination was staged. (BBC)
  Business and economy:
  - 2018 Brazil truck drivers' strike
  - Oil workers in Brazil start a 72-hour strike, amid the ongoing truck drivers'
    strike. (Reuters)
  - Economy of the United States
  - Amid concerns that the value of the company's stocks would fall after the decision
    to cease the sales of certain firearms, Dick's Sporting Goods reports a stronger
    than expected quarter, with shares up 27%. (CNN)
  Disasters and accidents:
  - An avalanche at Babusar Pass kills five members of Tablighi Jamaat religious organization.
    (Daily Pakistan)
  Health and environment:
  - Japanese whaling, Whaling controversy
  - A consortium led by the Institute of Cetacean Research, which is linked to Japan's
    Ministry of Fisheries, reports that 333 Antarctic minke whales were killed in
    last summer's scientific survey. 122 of the whales were pregnant, and 114 immature.
    (Smithsonian)
  International relations:
  - Macedonia naming dispute
  - According to Macedonian Prime Minister Zoran Zaev, talks with Greece on Macedonia's
    name are in a final phase. Zaev says that if a compromise name for the country
    is agreed upon, it will be put to a referendum. (RFE/RL)
  - North Korea–United States relations, 2018 North Korea–United States summit
  - Top North Korean official Kim Yong-chol meets with U.S. Secretary of State Mike
    Pompeo in New York City to discuss the summit set to be held in June. (BBC)
  Law and crime:
  - Harvey Weinstein sexual abuse allegations
  - Harvey Weinstein is indicted for rape charges by a New York City grand jury. (CBS)
  Politics and elections:
  - Budget of the European Union
  - The European Commission proposes to double funding for the Erasmus Programme.
    If adopted, the 2021–2027 budget for the student exchange programme would be €30
    billion. (TRT World)
  - Net neutrality
  - The Senate of the State of California votes to reinstate internet open-access
    rules. (The Verge)
  - Feminism in the United States
  - The Illinois House of Representatives votes 72–45 to ratify the Equal Rights Amendment.
    (Chicago Tribune)
