Date: '2018-05-13'
Source_URI: Portal:Current events/2018 May 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Indonesia
  - Surabaya bombings
  - At least 13 people are killed and more than 40 others wounded after a series of
    suicide bombings at three churches in Surabaya, Indonesia. (CNN) (AP via The London
    Free Press)
  Business and economy:
  - Economic policy of the Donald Trump administration
  - U.S. President Donald Trump says in a tweet that he is working with Chinese President
    Xi Jinping to get the Chinese telecom company ZTE "back into business, fast."
    ZTE suspended its main operations after the U.S. Department of Commerce banned
    American companies from selling to the firm for seven years as punishment for
    ZTE breaking an agreement reached after it was caught illegally shipping U.S.
    goods to Iran. (CNBC)
  International relations:
  - Sanctions against North Korea
  - U.S. Secretary of State Mike Pompeo stated that the U.S. would lift sanctions
    against North Korea if the latter would dismantle its nuclear weapons program.
    (Reuters)
  Law and crime:
  - Crime in Canada
  - Jaspal Atwal, who was the subject of attention during Canadian Prime Minister
    Justin Trudeau's visit to India, is charged after making death threats against
    a Canadian radio host. (The Globe and Mail)
  - A man from Queens is arrested after threatening to kill NBA commissioner Adam
    Silver. (The New York Post)
  Politics and elections:
  - Protests against Emmanuel Macron
  - French transport workers strike, reducing train services on SNCF, due to privatisation
    efforts. (Le Point)
  Sport:
  - 2017–18 Premier League
  - Manchester City set a new record of 100 points in the Premier League following
    a 1–0 win away to Southampton. (Eurosport)
