Date: '2018-05-21'
Source_URI: Portal:Current events/2018 May 21
Intelligence_Payload:
  Business and economy:
  - Economy of Japan
  - Sony agrees to a $2.3 billion deal where they will buy a controlling interest
    in EMI Music Publishing. The deal will mean that Sony would indirectly own 90%
    of the music publisher and its two million songs. (BBC)
  International relations:
  - Israel–Paraguay relations, Status of Jerusalem
  - Paraguay opens its embassy in Jerusalem, making Paraguay the third country, after
    the United States and Guatemala, to transfer its diplomatic mission in Israel
    from Tel Aviv to Jerusalem. (AP via Politico)
  - Iran–United States relations
  - U.S. Secretary of State Mike Pompeo says the U.S. will impose "the strongest sanctions
    in history" on Iran if it does not meet various demands, including ending its
    nuclear program and leaving the Syrian Civil War. (Reuters)
  - Iranian President Hassan Rouhani rejects Pompeo's demands, and Iranian Foreign
    Minister Mohammed Javad Zarif accuses the U.S. of "repeating past mistakes." (Al
    Jazeera)
  - Syrian Civil War
  - The Syrian government declares Damascus as "completely safe" from militant groups
    for the first time in seven years as it forces out ISIS from the area. (Haaretz)
  Law and crime:
  - Catholic sexual abuse cases in Australia
  - Philip Wilson, the Catholic archbishop of Adelaide, Australia, is convicted of
    concealing sexual abuse of children from authorities. (BBC)
  - Epic Systems Corp. v. Lewis
  - The U.S. Supreme Court votes 5–4 to allow companies to enforce contracts which
    bar employees from entering class action lawsuits. (The Washington Post via Concord
    Monitor)
