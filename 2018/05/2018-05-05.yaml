Date: '2018-05-05'
Source_URI: Portal:Current events/2018 May 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - An explosion in Deir al-Balah, Gaza, kills six Palestinians. Hamas and the Israel
    Defense Forces both deny responsibility and blame each other for the blast. (BBC)
  - The Israeli Air Force used a "hotline" to issue an urgent warning to Khemeymim
    Airbase in Syria when a Russian fighter jet strayed close to Israeli airspace
    near the Golan Heights. Last year a Syrian warplane was shot down in a similar
    incident. (AMN)
  Disasters and accidents:
  - An earthquake strikes a coal mine near Jastrzębie-Zdrój, Poland; rescuers have
    thus far recovered two miners alive and located a third, while four remain unaccounted
    for. (CBC)
  - Two coal mines collapse in Balochistan, Pakistan. A gas explosion triggered one
    collapse, in Pir Ismail, Marwar, killing sixteen. A second collapse near Quetta
    kills two more with five miners missing. (The Express Tribune)
  - The Federal Aviation Administration of the United States orders Boeing 787 jets
    using Rolls-Royce Trent 1000 engines to operate within one hour of an airport
    at all times following safety concerns with the engines worldwide which culminated
    in Air New Zealand and Air China grounding their fleets last week. (The Telegraph)
  Law and crime:
  - 2017–2018 Russian protests
  - Russian police detain about 1,600 anti-government protesters, including opposition
    leader Alexei Navalny. (RTÉ)
  - Terrorism in England
  - Naa'imur Zakariyah Rahman, from London, formally denies an ISIL plot to murder
    Theresa May. (BBC)
  - Egypt's Court of Cassation rejects appeals by 45 people handed long prison terms
    over a 2013 Port Said riot that killed 42. The riots broke out in response to
    death sentences handed out over a previous riot in 2012 that killed 72 football
    fans. (Xinhua)
  Politics and elections:
  - Protests against Emmanuel Macron
  - Thousands of people in central Paris demonstrate in an anti-Macron protest against
    his sweeping reforms. 2,000 security forces are deployed. (ABC)
  Science and technology:
  - Exploration of Mars
  - NASA's InSight Mars lander launches from Vandenberg Air Force Base near Lompoc,
    California. It is the first interplanetary mission launched from the West Coast
    of the United States. (CBS News)
  Sports:
  - 2018 Kentucky Derby
  - Pre-race favorite Justify wins the Kentucky Derby, becoming the first horse since
    1882 to win the race while unraced as a two-year-old. The race was run under the
    wettest conditions in its history; by post time, more than of rain had fallen
    on race day, breaking a record that had lasted since 1918. (WDRB – weather) (CBS
    Sports)
