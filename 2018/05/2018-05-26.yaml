Date: '2018-05-26'
Source_URI: Portal:Current events/2018 May 26
Intelligence_Payload:
  Disasters and accidents:
  - 2018 lower Puna eruption
  - Several more properties are destroyed as Kīlauea continues to erupt. (Newsweek)
  - 2018 North Indian Ocean cyclone season
  - Cyclone Mekunu makes landfall near Salalah, Oman, killing at least five people
    with 30 others reported missing. According to the India Meteorological Department
    (IMD), maximum sustained winds of have been recorded, equivalent to a Category
    3 hurricane. The storm is moving north toward Saudi Arabia. (AP via MSN) (IMD)
  - 2018 Atlantic hurricane season
  - Alabama Governor Kay Ivey, Florida Governor Rick Scott, and Mississippi Governor
    Phil Bryant each declare a state of emergency as Subtropical Storm Alberto, with
    maximum sustained winds of 40 mph (65 km/h), approaches the Southeastern United
    States. The National Hurricane Center predicts the storm will make landfall over
    the northern Gulf Coast late Monday afternoon or Monday night, with heavy rainfall
    and tropical storm conditions preceding actual landfall. (USA Today) (National
    Hurricane Center)
  International relations:
  - North Korea–South Korea relations
  - South Korean President Moon Jae-in meets with North Korean leader Kim Jong-un
    the second time in recent months at the peace village on the Northern side to
    discuss the topic of the June 12 summit in Singapore between the U.S. and North
    Korea, which was cancelled then left with the possibility of happening the day
    after. (Channel News Asia) (BBC)
  - United States–Venezuela relations
  - Josh Holt, an American held in Venezuela for allegedly stockpiling weapons and
    attempting to destabilize the government, is released to the United States. (CNN)
  - 2017–18 Qatar diplomatic crisis
  - Qatar orders its traders and shops to stop dealing in products imported from Saudi
    Arabia, the United Arab Emirates, Egypt and Bahrain. (Reuters)
  Law and crime:
  - Reactions to Innocence of Muslims
  - Egypt's top administrative court upholds a 2013 lower court ruling on the short
    film Innocence of Muslims. The court orders authorities to block YouTube for a
    month. An official says the movie denigrates Islam's prophet Muhammad. (AFP via
    Rappler) (Egypt Today)
  Politics and elections:
  - Amendments to the Constitution of Ireland
  - Irish citizens vote in a referendum on the proposed Thirty-sixth Amendment of
    the Constitution Bill 2018 to repeal the 1983 Eighth Amendment constitutional
    ban on abortion by 66.4% to 33.6%. (BBC)
  Sports:
  - 2017–18 UEFA Champions League
  - Liverpool F.C. and defending champions Real Madrid C.F. face each other in the
    final in Kiev, Ukraine. Winning 3–1, Real Madrid are European champions for the
    13th time and is the first team since FC Bayern Munich in the 1970s to win three
    titles in a row. (The Guardian)
  - 2018 Hypo-Meeting
  - World and Olympic champion Nafissatou Thiam becomes the first female heptathlete
    ever to jump over . In this year's heptathlon event at the Götzis, Austria, competition,
    she clears the bar at 2.01 m, also a season's best in women's high jump overall.
    (IAAF)
