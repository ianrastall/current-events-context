Date: '2018-05-15'
Source_URI: Portal:Current events/2018 May 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - The Israeli Army reports some 4,000 Palestinians hold violent protests in five
    locations along the Gaza border, throwing Molotov cocktails at troops and burning
    tires. The Israeli Army kills two protesters and injures more than 100 others
    using live fire and tear gas. (The Jerusalem Post)
  Disasters and accidents:
  - Two people are killed after a Cessna 208 Caravan crashes near Tuzantán, Mexico.
    (Aviation Safety Network)
  International relations:
  - Iran–United States relations
  - Sanctions against Iran
  - The United States Treasury Department announces new sanctions on Iran central
    bank governor Valiollah Seif and assistant director Ali Tarzali for allegedly
    helping the Islamic Revolutionary Guard Corps and Quds Force support Hezbollah.
    (Bloomberg)
  - The United States and six Arab states of the Persian Gulf add more sanctions on
    Hezbollah leaders Hassan Nasrallah and Naim Qassem. (Arab News)
  - Annexation of Crimea by the Russian Federation
  - Russian President Vladimir Putin opens the auto part of the -long road-and-rail
    Kerch Strait Bridge connecting Crimea with Russia. (Reuters)
  Law and crime:
  - Censorship in Germany
  - A Hamburg court upholds a 2017 ban on passages of Jan Böhmermann's poem Schmähkritik.
    (Reuters)
  - Former President of Taiwan Ma Ying-jeou is sentenced to four months in prison
    on charges he leaked classified information from a wiretap. (The Los Angeles Times)
  Politics and elections:
  - 2018 elections in India, Karnataka Legislative Assembly election, 2018
  - The ruling party of India, the Bharatiya Janata Party, wins plurality in state
    assembly elections in Karnataka. (Business Standard)
  - Politics of Hungary
  - George Soros' Open Society Foundations announces that it is moving its operations
    in Budapest to Germany. (CNN)
