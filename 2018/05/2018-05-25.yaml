Date: '2018-05-25'
Source_URI: Portal:Current events/2018 May 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Noblesville West Middle School shooting
  - A shooting at the Noblesville West Middle School in Noblesville, Indiana, United
    States, leaves two people injured. One suspect is in custody. (Business Insider)
  Business and economy:
  - Economy of the European Union
  - EU finance ministers reach an agreement on reforming bank capital rules. (Reuters)
  - Economy of Colombia
  - The OECD member countries admit Colombia as its 37th member. (Xinhua)
  - Economy of Italy
  - The yield spread between the Italian and German 10-year government bonds rises
    to over 2% for the first time in a year, due to the political uncertainty. (El
    País)
  Disasters and accidents:
  - Transport in Uganda
  - 48 people die in an accident involving a tractor, a bus and a truck in Kiryandongo,
    Western Region. (Africa News)
  - 2018 lower Puna eruption
  - A magnitude 4.4 earthquake occurs at Kīlauea. (CBS News)
  International relations:
  - Joint Comprehensive Plan of Action
  - A senior Iranian official asks European powers to come up with a "Plan B" before
    the end of May, so that Iran may decide 'within weeks' whether to stay in the
    agreement. (Reuters)
  - 2018 North Korea–United States summit
  - U.S. President Donald Trump tweets that "very productive talks" are being held
    with North Korean leader Kim Jong-un on reinstating the June 12 Singapore summit,
    which he had cancelled Thursday. (BBC)
  Law and crime:
  - General Data Protection Regulation
  - GDPR rules come into effect in the European Union. Several U.S. news sites are
    subsequently taken offline in the United Kingdom and Europe, including the Los
    Angeles Times, Chicago Tribune and Lee Enterprises newspapers. (The Independent)
  - Austrian privacy organization NOYB files complaints to regulators in four EU countries
    alleging that Facebook, Google, Instagram, and WhatsApp are violating the GDPR.
    (Reuters) (BBC News)
  - Harvey Weinstein sexual abuse allegations
  - After surrendering to the NYPD, film producer Harvey Weinstein is formally charged
    with rape and other sexual abuse offences involving two women. (BBC News)
  - Police in India state that mobs have killed three people after social media warned
    of roaming gangs of child kidnappers. They say that there is no evidence of such
    gangs. (Tampa Bay Times)
  - Bulgarian customs agents seize of heroin in transit for Belgium and the Netherlands
    at the border with Turkey. The drugs, with a street value of €6 million, were
    hidden under tile glue and detected by a sniffer dog. (The Washington Post)
  Politics and elections:
  - Politics of Spain, Gürtel case
  - The opposition Socialist Workers' Party presents a motion of no confidence against
    Prime Minister Mariano Rajoy following the publication of the sentence in the
    Gürtel corruption scandal, which involved the ruling PP. (El Mundo) (The Guardian)
  - The Citizens party gives an ultimatum to Rajoy to call snap elections or otherwise
    they'll support the motion of no confidence. (La Vanguardia) (The New York Times)
  - Rajoy reaffirms that he will not resign, nor call elections and that the motion
    of no confidence is bad for the stability of the country. (El País)
  - Barbadian general election, 2018
  - The Barbados Labour Party, entering the election as the opposition party, wins
    all 30 seats in the House of Assembly. Mia Mottley becomes the first female Prime
    Minister of Barbados. (Reuters)
  - Politics of the Democratic Republic of the Congo
  - Moïse Katumbi and Félix Tshisekedi, two major opposition figures in the Democratic
    Republic of the Congo, issue a joint statement; they discuss choosing a single
    candidate to run in the presidential election now scheduled for December 23. (Bloomberg)
  - Russian presidential election, 2024
  - Russian President Vladimir Putin says that he will respect the Russian constitution
    and step down when his term expires in 2024. (Reuters)
  - Thirty-sixth Amendment of the Constitution Bill 2018
  - Ireland holds a referendum which will decide whether to repeal the constitutional
    prohibition of abortion. Exit polls suggest the results shall be 68% "yes" and
    32% "no". The results will be released at 09:00 UTC tomorrow. (The Irish Times),
    (BBC News)
  Science and technology:
  - 2018 Atlantic hurricane season
  - Subtropical Storm Alberto becomes the first named storm of the 2018 Atlantic hurricane
    season. It formed at the western Caribbean Sea and is expected to move north of
    the Gulf of Mexico later in the weekend. (The Weather Channel)
