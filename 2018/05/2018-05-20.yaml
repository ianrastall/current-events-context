Date: '2018-05-20'
Source_URI: Portal:Current events/2018 May 20
Intelligence_Payload:
  Disasters and accidents:
  - 2018 lower Puna eruption
  - Lava continues spewing from fissures on Kilauea, Hawaii, reaching the Pacific
    Ocean and critically injuring one person. (CNN) (1 News Now)
  - Cyclone Sagar
  - Cyclone Sagar makes landfall in the Middle East and the Horn of Africa, killing
    at least 16 people. (The Weather Channel)
  Law and crime:
  - Mayor Yiannis Boutaris of Greece's second largest city, Thessaloniki, is hospitalized
    after being assaulted by a group of nationalists at a Greek genocide remembrance
    event. (BBC)
  Politics and elections:
  - 2017–18 Spanish constitutional crisis
  - Spanish Prime Minister Mariano Rajoy, with the support of the Workers' Party and
    Citizens Party, decides to maintain direct rule over Catalonia after the announcement
    of Quim Torra appointed government. (HuffPost)
  - The Spanish government blocks the appointment of the new councilors. (El País)
  - Crisis in Venezuela (2012–present)
  - Venezuelan presidential election, 2018
  - Incumbent President Nicolás Maduro wins the presidential election amidst allegations
    of massive irregularities by his main rivals. (Reuters)
  Sports:
  - 2017–18 NHL season
  - 2018 Stanley Cup playoffs
  - The Vegas Golden Knights become the first expansion team to make the Stanley Cup
    Finals in their first season since 1968, a season in which one of the six teams
    that entered the league was guaranteed to reach the final. (CBS Sports)
