Date: '2018-05-06'
Source_URI: Portal:Current events/2018 May 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - The Israel Defense Forces (IDF) open fire on a group of Palestinian men trying
    to sabotage the Israeli-Gazan border fence, killing three and injuring two others.
    The IDF also attacks a Hamas outpost near the border, stating that the location
    was used to launch incendiary kites and other objects in an attempt to burn Israeli
    fields. (The Jerusalem Post)
  - Hamas releases videos showing dozens of Palestinians successfully breaching the
    fence and infiltrating Israel. (Israel National News)
  - Kashmir insurgency
  - Two days of clashes in Indian-administrated Jammu and Kashmir leaves eight militants
    and nine civilians dead, while over 100 protesters are injured during anti-India
    demonstrations. (Benar News)
  - Pakistani Interior Minister Ahsan Iqbal is shot at following a rally in Narowal,
    Punjab. A bullet pierces his right shoulder. He is in stable condition now and
    the gunman has since been arrested, according to Government Officials. (The New
    York Times) (The Nation)
  - War in Afghanistan (2001–2021)
  - A mosque being used for voter registration is bombed in Khost, Afghanistan, killing
    at least 14 people and injuring 33. (ABC News)
  Business and economy:
  - Economy of France
  - French economy minister Bruno Le Maire says Air France may collapse over ongoing
    strike action and the state will not bail the firm out despite owning 14.3% of
    parent Air France-KLM. (BBC)
  Disasters and accidents:
  - Flash floods cause transportation issues and damage buildings in Ankara, the capital
    of Turkey. (BBC)
  - 2018 lower Puna eruption
  - At Leilani Estates, 26 homes and 4 buildings were destroyed by Kīlauea, forcing
    1700 people to leave their homes. (Reuters)
  Law and crime:
  - Malaysian authorities announce sixteen arrests connected to an international human
    trafficking ring. The arrests follow the seizure of modified tanker ship MV Etra
    in Malaysian waters on Tuesday with 127 Sri Lankan migrants on board being smuggled
    to New Zealand and Australia. The arrests include seven people captured aboard
    a fishing vessel used to transfer migrants onto MV Etra. (The South China Morning
    Post)
  Politics and elections:
  - Lebanese general election, 2018
  - Lebanon holds its first parliamentary election since 2009. (BBC)
  - The Electoral Commission of Zambia says it will disqualify anybody who commits
    violence in the campaign for upcoming by-elections slated for June. (The Lusaka
    Times)
  - In an interview granted to the newspaper El Comercio, the Peruvian president,
    Martín Vizcarra, ruled out presenting himself for re-election in 2021 or calling
    early elections. Vizcarra, as vice president, took office late March after former
    President Pedro Pablo Kuczynski resigned due to a corruption scandal and strong
    pressures of the Congress. (América Televisión)
  - Far-right politics in the United Kingdom
  - Thousands of far-right activists attend a protest in London, United Kingdom amid
    a recent crackdown on far-right activity on social media. Guest speakers included
    former English Defence League leader Tommy Robinson, Vice magazine co-founder
    Gavin McInnes, and UK Independence Party (UKIP) leader Gerard Batten. (The Guardian)
