Date: '2018-05-22'
Source_URI: Portal:Current events/2018 May 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Southern Damascus offensive (April–May 2018)
  - Syrian government forces declare Damascus and its surroundings "completely safe"
    for the first time since 2011, after taking Yarmouk Camp and Hajar al-Aswad from
    ISIL. (CBS News)
  - Kha Maung Seik massacre
  - Amnesty International releases a report claiming it has evidence that ARSA insurgents
    massacred nearly 100 Hindus in the village of Kha Maung Seik on August 25, 2017,
    the same day ARSA attacked security forces in Myanmar's Rakhine State. (BBC News)
  - Israel announces it is the first country to use the new F-35 Lightning II fighter
    jet in combat operations. (BBC News) (Business Insider)
  Disasters and accidents:
  - At least 16 people are killed and 38 wounded in Kandahar, Afghanistan, by the
    accidental detonation of a container of explosives while security forces were
    attempting to dispose of it. (Al Jazeera)
  International relations:
  - 2018 North Korea–United States summit, North Korea–United States relations
  - U.S. President Donald Trump states there is a "very substantial chance" that the
    summit with North Korean leader Kim Jong-un next month may not occur. (BBC News)
  - China–United States relations, Economy of China
  - The Chinese Finance Ministry announces it will cut import duties on passenger
    vehicles from 25% to 15% starting on July 1, just days after China and the U.S.
    agreed to a ceasefire in their recent trade hostilities. (CNN)
  - Zimbabwe applies to rejoin the Commonwealth of Nations. Zimbabwe left the Commonwealth
    in 2003 following a disputed election the previous year and subsequent suspension
    from the organization. According to Commonwealth Secretary-General Patricia Scotland,
    the application was made on May 15. (Al Jazeera)
  Law and crime:
  - Environmental issues in India
  - Police in Thoothukudi, Tamil Nadu, India, kill nine people who protested against
    Vedanta Resources' copper smelter operation, alleging that it is a major source
    of pollution and a risk to fisheries. State Minister D. Jayakumar says that it
    was "unavoidable" that the people were shot. National Congress opposition leader
    Rahul Gandhi calls the killings "state sponsored terrorism". (Reuters) (Indian
    Express)
  Sports:
  - 2018 Indian Premier League
  - Chennai Super Kings defeat Sunrisers Hyderabad by 2 wickets in Qualifier-1 and
    progress to the final of the Indian Premier League. (Cricinfo) (Times of India)
