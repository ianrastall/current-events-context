Date: '2018-05-10'
Source_URI: Portal:Current events/2018 May 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Senior Hamas member Yehiyeh Sinwar suggests that tens of thousands of Palestinian
    protestors may try to cross the border fence between Israel and the Gaza Strip.
    (ABC News)
  - An explosion at a khat market in Wanlaweyn, Lower Shabelle, Somalia, kills five
    people and injures ten others. (Africa News)
  - International military intervention against ISIL
  - President of the United States Donald Trump announces that five senior leaders
    of ISIL were captured in a joint operation involving US and Iraqi forces. (CBS
    News)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - A tropical depression forms in the Pacific ocean. It is not supposed to threaten
    land, and is also the first storm of the season. (Weather.com)
  - The National Transportation Safety Board opens an investigation into an automobile
    accident in Florida, involving a Tesla Model S where two teenagers died. According
    to a statement by Tesla, the car's Autopilot feature was not engaged at the time.
    (Reuters), (ABC News)
  International relations:
  - Iran–United States relations, Iran–United Arab Emirates relations
  - In cooperation with United Arab Emirates, the United States Treasury implements
    new sanctions on six persons and three corporate entities having alleged ties
    to Iran's Quds Force. (Reuters)
  - North Korea–United States relations, 2018 North Korea–United States summit
  - US President Donald Trump announces that his summit with North Korean leader Kim
    Jong-un will take place on June 12 in Singapore. (BBC)
  Law and crime:
  - Terrorism in England
  - Safaa Boular, a teenager, goes on trial at the Old Bailey accused of two counts
    of planning terrorism after allegedly planning to attack the British Museum in
    London after failing to travel to Syria to marry an Islamic extremist fighter.
    (BBC)
  - UK Prime Minister Theresa May apologises to the family of Abdul Hakim Belhaj,
    accepting the fact that the UK's actions led to his rendition to Libya where he
    was tortured. Belhaj was detained in Thailand by US authorities in 2004. His wife
    accepts the apology and £500,000. (BBC)
  - Bangladesh Liberation War
  - A court in Bangladesh sentences Riaz Uddin Fakir to death for war crimes during
    the 1971 Liberation War. (Bangladesh Daily News 24)
  - Wu Xiaohui, head of Chinese insurance firm Anbang, is jailed for eighteen years
    for fraud and corruption. He is further sentenced to have 10.5 billion yuan confiscated.
    (BBC)
  - Peruvian police rescues 96 young women, including two Venezuelan citizens and
    one teenager, who had been intercepted by human traffickers in a police operation
    in different nightclubs of the area of La Pampa, Madre de Dios, better known for
    its mining camps. In total, seven people were arrested. (El Comercio)
  Politics and elections:
  - Net neutrality in the United States
  - The Federal Communications Commission sends out a notice which states that the
    2015 US Open-Internet Rules will cease on June 11, 2018. (Reuters)
  - Malaysian general election, 2018
  - Mahathir Mohamad is sworn in as the 7th Prime Minister of Malaysia after leading
    the opposition Pakatan Harapan coalition to victory in the May 9 general election.
    Outgoing Prime Minister Najib Razak pledges to assist with the transition of power.
    (Malaysiakini)
