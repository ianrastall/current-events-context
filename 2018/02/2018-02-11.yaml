Date: '2018-02-11'
Source_URI: Portal:Current events/2018 February 11
Intelligence_Payload:
  Disasters and accidents:
  - Saratov Airlines Flight 703
  - An Antonov An-148 of Saratov Airlines with 71 people on board crashes shortly
    after take-off from Domodedovo Airport, Moscow, Russia. The TASS agency cites
    an emergency source stating that none of the 65 passengers and 6 crew members
    has survived. (BBC) (Reuters via The Daily Star)
  Law and crime:
  - United Kingdom Secretary of State for International Development Penny Mordaunt
    tells BBC One that Oxfam's failure to pass on information regarding sexual misconduct
    allegations of its workers in Haiti and Chad shows an "absolute" absence and failure
    of moral leadership. (BBC News)
  Politics and elections:
  - Monegasque general election, 2018
  - Primo ! Priorité Monaco, a new political party, wins 21 of the 24 seats in the
    National Council. (Hello Monaco) (Le Figaro)
  - Anniversary of the Iranian Revolution, 2017–18 Iranian protests
  - Iranian president Hassan Rouhani proposes a referendum to heal country's divisions,
    according to the Article 59 of constitution. (The Guardian)
  - Sri Lankan local elections, 2018
  - The opposition SLPP (Rajapaksa) wins 44.65% of the vote, the ruling coalition
    parties UNP (Wickremesinghe) and UPFA (Sirisena) gather 32.63% and 8.94% respectively.
    Rosy Senanayake (UNP) becomes the first female mayor of the capital Colombo. (Al
    Jazeera)
