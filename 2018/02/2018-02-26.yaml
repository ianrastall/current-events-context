Date: '2018-02-26'
Source_URI: Portal:Current events/2018 February 26
Intelligence_Payload:
  Arts and culture:
  - Women's rights in Saudi Arabia
  - Saudi Arabia opens applications for women to join its armed forces for the first
    time. (BBC)
  International relations:
  - United States–Mexico relations
  - Mexican President Enrique Peña Nieto cancels a scheduled trip to the United States
    after a heated phone call with U.S. President Donald Trump, in which Trump refused
    to publicly back down from his pledge of having Mexico pay for the U.S.–Mexico
    border wall. (CNN)
  - France–Turkey relations
  - French President Emmanuel Macron phones Turkish President Recep Tayyip Erdoğan,
    telling Erdoğan that the UN-approved ceasefire in Syria also applies in the Afrin
    Region. (Reuters)
  Law and crime:
  - Clinton–Lewinsky scandal
  - Monica Lewinsky questions whether her relationship with Bill Clinton was consensual,
    saying the Me Too movement forced her to reconsider it. (CNN)
  - Crime in Belgium
  - Five Dutch nationals and a Colombian are arrested at the staged delivery operation
    in Oss, Netherlands, of a container with of cocaine and bananas for cover, originating
    from Colombia, that was previously intercepted in the Port of Antwerp. (NL Times)
  Politics and elections:
  - National Party of Australia leadership election, 2018
  - The cogoverning National Party of Australia elects Veterans' Affairs Minister
    Michael McCormack to succeed Barnaby Joyce as their leader. McCormack is later
    sworn in as Deputy Prime Minister. (The Sydney Morning Herald)
  - Politics of France
  - French Prime Minister Édouard Philippe announces plans to overhaul the state-owned
    railway firm SNCF. The details of the railway reform will be released in March.
    (Deutsche Welle)
  - Politics of New Zealand
  - Simon Bridges is elected as leader of the National Party, becoming the first Māori
    on that position. (The New Zealand Herald), (Newshub)
  - Ron Mark is succeeded by Fletcher Tabuteau as deputy leader of New Zealand First.
    (Newshub)
  - United States–North Korea relations
  - United States Special Representative for North Korea Policy Joseph Y. Yun announces
    his retirement, effective 2 March. (Xinhua)
