Date: '2018-02-04'
Source_URI: Portal:Current events/2018 February 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - The Cabinet of Israel decides to legalize a previously unauthorized outpost "deep
    inside the [occupied] West Bank", Havat Gilad, allegedly in reaction to the recent
    killing of an Israeli rabbi there. (Voice of America)
  - Israeli authorities tear down parts of a European Union-funded school in the Palestinian
    village of Abu Nuwar, on the occupied West Bank, saying it was built illegally.
    Palestinians say this is the fifth such demolition since 2016, with residents
    and NGO's each time reconstructing it. (Reuters)
  Disasters and accidents:
  - Cayce, South Carolina train collision
  - An Amtrak passenger train collides with a freight train in Cayce, South Carolina,
    U.S., and is derailed. Two people are killed. (Huffington Post) (BBC) (CNN)
  - An Anglo-Eastern Group oil tanker with 22 Indian crew members on board is reported
    missing off the coast of Benin. The area is well known for piracy. (BBC)
  Politics and elections:
  - Costa Rican general election, 2018
  - Costa Ricans head to the polls to elect a new President, amidst a gay rights controversy.
    (Reuters)
  - Fabricio Alvarado Muñoz (National Restoration Party) and Carlos Alvarado Quesada
    (Citizen Action Party) will face each other in the second round. (The Tico Times)
  - Cypriot presidential election, 2018
  - Cyprus is set to elect a new President in a second round of voting. Candidates
    include incumbent Nicos Anastasiades and AKEL candidate, Stavros Malas. (Reuters)
  - Incumbent Nicos Anastasiades is declared the winner. (Al Jazeera)
  - Ecuadorian referendum and popular consultation, 2018
  - Ecuador is set to hold a referendum consisting of seven questions for voters to
    approve or reject. (Reuters)
  - Politics of Yemen
  - 2011 Nobel Peace Prize co-winner Tawakkol Karman is ordered suspended from the
    Islah party's ranks after she likened the Saudi-led intervention in Yemen to "reckless
    adventurism" and "ugly occupation". (Reuters)
  - Macedonia naming dispute
  - Tens of thousands of people demonstrate in Athens against the willingness manifested
    by the Cabinet of Greece to make concessions in the long-standing dispute with
    the Republic of Macedonia. (Radio Free Europe)
  - Weinstein effect
  - Robert Doyle resigns as Lord Mayor of Melbourne after allegations of sexual misconduct
    were made against him. Melbourne City Council is investigating the allegations.
    (BBC)
  Science and technology:
  - Asteroid close approaches to Earth in 2018
  - As predicted, a ~600 meter asteroid named makes a close approach to Earth of 0.028
    Astronomical units (4.2 million km, 2.6 million mi). (Space)
  Sports:
  - Super Bowl LII
  - The Philadelphia Eagles win their first Super Bowl, defeating the New England
    Patriots 41–33. It is their first championship title. (AP)
