Date: '2018-02-10'
Source_URI: Portal:Current events/2018 February 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - February 2018 Israel–Syria incident
  - The Israeli Army says that it shot down a Syrian UAV manufactured in Iran and,
    in response, it bombed the Tiyas Military Airbase in Homs Governorate, Syria,
    where it was launched from. (Reuters)
  - The Syrian Air Defense Force shoots down an Israeli F-16 over the Golan Heights
    after it fired on alleged Iranian targets inside Syria. Both pilots parachute
    to safety. (BBC) (RFERL)
  - Syrian state media cite a military source saying that the Syrian air defences
    hit "more than one plane" at dawn. (Reuters)
  - Turkish military operation in Afrin
  - The Kurdish YPG shoots down a Turkish Air Force T129 ATAK helicopter over Syria's
    Afrin District, killing both pilots. (Al Jazeera)
  Disasters and accidents:
  - 2018 Hong Kong bus accident
  - A double-decker bus overturns near Tai Po in Hong Kong, killing at least 19 people.
    (The Guardian)
  - A bus carrying local tourists crashes in West Java, Indonesia, killing at least
    27 people. (AP via ABC News)
  - A Papillon Tours helicopter crashes in the Grand Canyon in the Southwestern United
    States, killing three people and injuring the other four on board. The six passengers
    were all British citizens. (AP/CBS News) (ABC News)
  International relations:
  - India–Palestine relations
  - Indian Prime Minister Narendra Modi visits Palestine, saying that he backs an
    independent Palestine state. This event has been labeled as "historic" as it is
    the first time an Indian Prime Minister has visited Palestine. (Al Jazeera)
  - North Korea–South Korea relations
  - South Korean President Moon Jae-in hosts talks at the Blue House with North Korean
    President of the Presidium of the Supreme People's Assembly Kim Yong-nam and Kim
    Jong-Un's sister Kim Yo-jong. (Reuters)
  Law and crime:
  - Crime in Ohio
  - Two officers of the Westerville, Ohio Police Department are shot and killed (one
    died immediately, one later at the hospital) in an ambush-type attack which had
    begun as a domestic dispute between the male perpetrator, who was wounded during
    the incident, and his wife. (CNN)
  Politics and elections:
  - Politics of the United States
  - Heath Hall, the acting Federal Railroad Administration chief, resigns "effective
    immediately" over a Politico report that he has a second job in Madison County,
    Mississippi. (NPR)
  - Politics of the Republic of Ireland
  - Mary Lou McDonald is confirmed in the position of president of Sinn Féin. She
    succeeds Gerry Adams, who was Sinn Féin's leader since 1983. (Reuters)
