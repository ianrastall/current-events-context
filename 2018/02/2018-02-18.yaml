Date: '2018-02-18'
Source_URI: Portal:Current events/2018 February 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Kizlyar church shooting
  - A gunman kills five people and wounds several others at a church in Kizlyar, Dagestan,
    Russia. Police later shoot and kill him. (BBC)
  Disasters and accidents:
  - Iran Aseman Airlines Flight 3704
  - An Iran Aseman Airlines ATR 72 commercial aircraft carrying 59 passengers and
    6 crew members crashes near the Iranian town of Semirom. The airline reports that
    there are no survivors. (AP via Fox News), (BBC)
  Law and crime:
  - Corruption in Latvia
  - The Corruption Prevention and Combating Bureau detains the head of the Bank of
    Latvia, Ilmārs Rimšēvičs. In response, Latvia's Prime Minister Māris Kučinskis
    calls an emergency cabinet meeting but added there was no apparent threat to the
    Latvian financial system. (BBC)
  Sports:
  - 2018 Monster Energy NASCAR Cup Series
  - Austin Dillon wins the 60th Daytona 500. (ESPN)
