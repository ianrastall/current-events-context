Date: '2018-02-03'
Source_URI: Portal:Current events/2018 February 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The London-based Syrian Observatory for Human Rights reports that unidentified
    rebel factions have shot down a Russian Sukhoi Su-25 jet over the Idlib Governorate,
    near Maarrat al-Nu'man, also killing its pilot. The pilot had escaped with his
    parachute but was killed on the ground while he fought with a pistol to evade
    capture. No groups claim responsibility. Russia's Ministry of Defence corroborates
    this version of events. (Deutsche Welle)
  - The Interfax agency states that Russia retaliated with a missile attack, killing
    at least 30 Al-Nusra militants in North-West Syria with "precision-guided weapons".
    (USA Today)
  - According to Sputnik agency, Tahrir al-Sham, allegedly including Al-Nusra Front,
    claims in a social media post that it downed the Russian jet with a shoulder-launched
    anti-aircraft missile. (Sputnik News)
  - The Turkish Army suffers its deadliest day of Operation Olive Branch so far after
    seven soldiers are killed in clashes with the Kurdish YPG. (BBC)
  - War in North-West Pakistan
  - A suicide bombing, revindicated in an email to journalists by the Pakistani Taliban,
    kills at least 11 soldiers and injures 13 at an army unit camp's sports area in
    the Kabal area of the Swat Valley, in Northwestern Pakistan, according to Pakistan
    Army figures. (AFP via The Jakarta Post)
  Law and crime:
  - Macerata shooting
  - A shooting in Macerata, Italy, leaves six African immigrants wounded. The suspect
    is arrested and the case is being treated as a racially motivated crime. (BBC)
  Science and technology:
  - 15760 Albion (previously 1992 QB1), the first discovered Kuiper belt object, is
    officially named by its discoverers. (Minor Planet Center)
  Sports:
  - 2018 UCI Cyclo-cross World Championships
  - Sanne Cant outduels Katie Compton in women's elite race at the UCI Cyclo-cross
    World Championships in Valkenburg, Netherlands, winning her second title. (CX
    Magazine)
