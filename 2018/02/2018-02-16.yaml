Date: '2018-02-16'
Source_URI: Portal:Current events/2018 February 16
Intelligence_Payload:
  Armed conflict and attacks:
  - Boko Haram insurgency
  - Three suicide bombers kill at least 20 people at a fish market in Konduga, Borno,
    Nigeria. (The Guardian)
  Disasters and accidents:
  - 2018 Oaxaca earthquake
  - A magnitude 7.2 earthquake strikes near the town of Pinotepa Nacional and is widely
    felt across Southern and Central Mexico, causing material damages in the states
    of Guerrero, Oaxaca and Mexico City. It is followed by a 5.8-magnitude aftershock.
    (The United States Geological Survey), (CNN)
  Law and crime:
  - Crime in Washington
  - A teenager is arrested for allegedly planning a school shooting in Everett, Washington.
    Police found a semi-automatic rifle hidden in a guitar case along with bomb-making
    equipment. (CBS News)
  - War on Terror
  - The Court of Appeal in Rabat, Morocco, acquits Younes Chekkouri of undermining
    the security of the state. Chekkouri was detained in Guantanamo Bay detention
    camp for 14 years without charges. (Xinhua)
  - Aftermath of the 2016 Turkish coup d'état attempt
  - A court in Turkey hands life sentences to six journalists, including Ahmet Altan,
    Mehmet Altan and Nazlı Ilıcak. (Reuters) (PEN.org)
  Politics and elections:
  - Mueller special counsel investigation
  - U.S. President Donald Trump's former chief strategist Steve Bannon is interviewed
    over two days this week as part of the investigation into alleged Russian interference
    in the 2016 United States elections. (BBC)
  - Thirteen Russian nationals from the Internet Research Agency are indicted by a
    grand jury on charges of conspiracy to defraud the United States during the 2016
    U.S. Presidential election. (CNN) (BBC)
  - Politics of Ethiopia
  - Ethiopia declares a national state of emergency one day after the unexpected resignation
    of Prime Minister Hailemariam Desalegn. (BBC)
  - Rohingya refugees in Bangladesh
  - Bangladeshi home minister Asaduzzaman Khan meets with his Burmese counterpart,
    Kyaw Swe, in Dhaka to discuss the repatriation of Rohingya refugees from Bangladesh
    to Myanmar. The Burmese delegation accepts a list of 8,032 Rohingya refugees (1,673
    families) who are to be repatriated. (Washington Post)
