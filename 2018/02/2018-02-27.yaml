Date: '2018-02-27'
Source_URI: Portal:Current events/2018 February 27
Intelligence_Payload:
  International relations:
  - Foreign relations of North Korea
  - Five unnamed Western European security sources say that North Korean leader Kim
    Jong-un and his father Kim Jong-il used fraudulently obtained Brazilian passports
    in order to apply for visas to visit Western countries in the 1990s. (Reuters)
  Law and crime:
  - Terrorism in the United States
  - A letter containing an unknown substance opened at a U.S. military base in Arlington,
    Virginia, leaves 11 people ill, with three being hospitalized. (Reuters)
  Politics and elections:
  - Government of Saudi Arabia
  - Saudi King Salman replaces top army commanders and reshuffles key security and
    government ministries. (Al Jazeera)
  - Donald Trump presidential campaign, 2020
  - U.S. President Donald Trump names Brad Parscale as his 2020 presidential campaign
    manager as he formally declares he is running for re-election, a record 980 days
    before the election. (CNBC)
  - 2016–2018 investigations involving Benjamin Netanyahu
  - The Israeli Prosecutor's Office links Prime Minister Benjamin Netanyahu in a corruption
    case. (Times of Israel)
  - Democratic Republic of the Congo general election, 2018
  - In a public statement, the foreign ministry of Botswana urges Joseph Kabila, the
    President of DR Congo, to step down since his term expired in December 2016, and
    hold the long-delayed new election. (Voice of America)
