Date: '2018-02-24'
Source_URI: Portal:Current events/2018 February 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - February 2018 Mogadishu attack
  - Two car bombings near the presidential palace in Mogadishu, Somalia, kill at least
    38 people. Al-Shabaab claim responsibility for the attacks. (BBC)
  - Syrian Civil War
  - The United Nations Security Council unanimously approves a resolution demanding
    a 30-day ceasefire in Syria. (BBC), (The Washington Post)
  - Yemeni Civil War (2015–present)
  - Islamist car suicide bombers and gunmen try to storm the headquarters of a counter-terrorism
    unit in the southern port city of Aden, killing at least 14 people and wounding
    40 others. (Reuters)
  - War in Afghanistan (2001–2021)
  - A series of militant attacks in Afghanistan kill more than 20 people. (Reuters)
  - Internal conflict in Myanmar
  - 2018 Sittwe bombings
  - Three bombs explode in Sittwe, the capital of Myanmar's Rakhine State, slightly
    injuring a police officer. Three other unexploded bombs are defused around the
    city. It is unclear who was behind the bombs, but most of them were placed next
    to government-related buildings. (BBC), (Voice of America News)
  Arts and culture:
  - Archbishop of Guatemala City Oscar Julio Vian Morales died at age 70. Acting President
    Jafeth Cabrera decrees three days of national mourning. (ABC News)
  Politics and elections:
  - Aftermath of the Stoneman Douglas High School shooting
  - 2018 NRA boycott
  - Several companies, including First National Bank of Omaha, Hertz, and United and
    Delta airlines have cut ties with the NRA following the shooting, saying that
    the discount deals they have with the NRA are cancelled. (BBC) (USA Today)
  - Nunes memo
  - A memo written by Democrats on the United States House Permanent Select Committee
    on Intelligence is released, countering the Republican memo released on February
    2. (Bloomberg)
  Sports:
  - Doping in Russia
  - Russian bobsledder Nadezhda Sergeeva who tested positive for the banned substance
    trimetazidine (a medication used to treat angina) at the 2018 Winter Olympics
    in Pyeongchang admits to doping and has been disqualified from competing. (AP
    via MSN)
