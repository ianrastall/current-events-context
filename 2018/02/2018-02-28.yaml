Date: '2018-02-28'
Source_URI: Portal:Current events/2018 February 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kivu conflict
  - The death toll from clashes between militias in the Rutshuru Territory of the
    North Kivu province, DR Congo, rises to 23 people. The renewed violence has been
    ongoing since February 25. (New Vision)
  Business and economy:
  - Economy of the United Kingdom
  - U.S. toy and juvenile-products retailer Toys "R" Us collapses into administration
    in the United Kingdom, putting 3200 jobs at risk. (The Independent)
  - British electronics retailer Maplin Electronics collapses into administration
    after rescue talks fail, with 2,500 jobs at risk. (BBC)
  - Stoneman Douglas High School shooting
  - Dick's Sporting Goods and Walmart raise the minimum age for purchasing firearms
    to 21 and stop selling military-style semi-automatic rifles altogether. (NPR),
    (Reuters)
  Disasters and accidents:
  - 2017–18 Western Europe windstorm season
  - The Met Office issues its highest level warning, a red alert for parts of Scotland
    due to heavy snow. It is the first time a red alert has ever been issued in Scotland,
    and only the second time anywhere in the United Kingdom. (BBC)
  - A collision between a passenger and a cargo train in Beheira, Egypt kills 15 people
    and injures 40 more. (Egypt Independent)
  Law and crime:
  - Weinstein effect
  - Two former employees of InfoWars accuse founder and radio host Alex Jones of sexual
    harassment, racism and antisemitism. (New York Daily News)
  Politics and elections:
  - Politics of Afghanistan
  - Afghan President Ashraf Ghani offers to recognize the Taliban as a legitimate
    political formation as part of a proposed process aimed at ending more than 16
    years of war. (Reuters)
  - Presidency of Donald Trump
  - Hope Hicks announces that she will resign as White House Communications Director,
    one day after being interviewed by the House Intelligence Committee. (The Guardian),
    (BBC) (CNN)
  Sports:
  - Doping in Russia
  - The International Olympic Committee restores the Russian Federation's membership
    after the ban from the 2018 Winter Olympics. (BBC)
