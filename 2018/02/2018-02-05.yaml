Date: '2018-02-05'
Source_URI: Portal:Current events/2018 February 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - 2018 Ariel stabbing
  - An Israeli rabbi is stabbed to death by an Israeli Arab outside the Israeli-occupied
    West Bank settlement of Ariel. (Reuters)
  - Syrian Civil War
  - Syrian government airstrikes pound rebel-held Eastern Ghouta enclave near the
    capital Damascus, killing at least 23 civilians including four children. (Al Jazeera)
    (Times of Israel)
  Business and economy:
  - The Wall Street stock market sheds 4.6% of its value, with the Dow Jones Industrial
    Average dropping a record 1,175 points at close. At one point during the day,
    the benchmark index loses a record 1,579 points. (NPR) (BBC) (USA Today)
  International relations:
  - Brexit negotiations
  - After talks with Prime Minister of the United Kingdom Theresa May and Secretary
    of State for Exiting the European Union David Davis in London, E.U. chief negotiator
    Michel Barnier calls on the United Kingdom to make a choice on what sort of future
    relationship it wants with the European Union after Brexit. (Reuters)
  - Netherlands–Turkey relations, Aftermath of the 2017 Dutch–Turkish diplomatic incident
  - The Netherlands withdraw their ambassador in Ankara and say that they will not
    accept a new Turkish ambassador in The Hague. Dutch foreign minister Halbe Zijlstra
    says, "We have not agreed on how to normalise ties." (BBC)
  Law and crime:
  - Crime in Kenya
  - Esmond Bradley Martin, a world-renowned ivory investigator whose detailed reports
    contributed to the fight against elephant poaching and the illegal wildlife trade,
    is murdered at his home in Kenya. (The Guardian)
  - Politics of the Maldives
  - The President of the Maldives, Abdulla Yameen, declares a 15-day state of emergency.
    Security forces storm the Supreme Court of the Maldives in a bid to block the
    court-ordered release of jailed opposition politicians. Police arrest former President
    Maumoon Abdul Gayoom. (BBC) (Reuters)
  Science and technology:
  - Discoveries of exoplanets
  - Scientists using data from the Chandra X-ray Observatory discover new exoplanets
    in galaxies beyond the Milky Way for the first time. (NBC News) (National Geographic)
