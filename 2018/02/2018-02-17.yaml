Date: '2018-02-17'
Source_URI: Portal:Current events/2018 February 17
Intelligence_Payload:
  Disasters and accidents:
  - Earthquakes in 2018
  - 2018 Oaxaca earthquake
  - A military helicopter surveying the damage, carrying the Governor of Oaxaca Alejandro
    Murat Hinojosa and Mexico's Secretary of the Interior Alfonso Navarrete Prida,
    crashes over Jamiltepec, killing 13 people on the ground. These deaths are the
    only known ones related to the earthquake reported so far. (CNN)
  - Earthquakes in the British Isles
  - A magnitude 4.4 earthquake, the strongest in the United Kingdom for ten years,
    occurs at Swansea. (BBC)
  Law and crime:
  - Aftermath of the murder of Zainab Ansari
  - An Anti-Terrorism Court in Lahore, Pakistan, sentences Imran Ali to death, for
    the rape and murder of 7-year-old Zainab Ansari. The victim's family demands Ali's
    hanging to be conducted in public. (The Express Tribune)
  Politics and elections:
  - Politics of the United Kingdom
  - UK Independence Party (UKIP) members vote to remove Henry Bolton as leader amid
    controversy over his private life and leadership. Gerard Batten becomes interim
    leader. (BBC)
