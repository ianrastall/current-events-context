Date: '2018-09-05'
Source_URI: Portal:Current events/2018 September 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A Suicide attack at a wrestling club in a Hazara Shi’ite neighborhood of the Afghan
    capital Kabul and a second explosion apparently targeting emergency services and
    journalists kills at least 20 people and wounds 70 others. (Reuters)
  - Israel’s Supreme Court rejects appeals against the demolition of Khan al-Ahmar
    in the occupied West Bank whose fate has been a subject of international concern.
    (BBC)
  Disasters and accidents:
  - 2018 Atlantic hurricane season
  - Tropical Storm Gordon makes landfall near the Alabama–Mississippi border in the
    United States. One death is reported. (CNN)
  - Hurricane Florence, the sixth named storm of 2018, becomes the first major Atlantic
    hurricane of the year as it strengthens to a category 3 hurricane. (Fox News)
    (SFgate.com)
  - An Iranian man attempts self-immolation in front of the Tehran city hall. (Trend)
  - Emirates Flight 203 from Dubai is quarantined briefly after landing at John F.
    Kennedy International Airport when 19 passengers were deemed sick and others complained
    of symptoms. (USA Today)
  International relations:
  - Israel–Paraguay relations
  - Paraguay announces that it will move its embassy in Israel from Jerusalem to Tel
    Aviv, reversing a May decision to move it from Tel Aviv to Jerusalem, citing efforts
    to achieve peace in the Middle East. In response, Israeli Prime Minister Benjamin
    Netanyahu orders the closure of Israel's embassy in Paraguay. (Reuters), (Reuters2)
  - Bolivarian diaspora, Crisis in Venezuela
  - After an emergency summit, eleven nations of Latin America (including Colombia,
    Brazil, Ecuador, and Peru) announce that they will all admit Venezuelan migrants
    without the required travel documents. (BBC)
  - China–Togo relations
  - Wang Huning, a senior official of the Communist Party of China, meets with Togolese
    President Faure Gnassingbé in Beijing, China. (Xinhua)
  Law and crime:
  - Poisoning of Sergei and Yulia Skripal
  - British authorities charge two men for their alleged involvement in a Novichok
    poisoning earlier in 2018, claiming the men are agents of the GRU. (NPR)
  - Russia says that the United Kingdom declines to provide them with the suspects'
    fingerprints. (TASS)
  - Kidnapping of Joshua Boyle and Caitlan Coleman, Weinstein effect
  - Caitlan Coleman, an American woman kidnapped and held hostage for five years in
    Afghanistan, accused her husband Joshua Boyle physically and emotionally abusing
    her while the family was being held by Taliban-linked militants. (The Guardian)
  Politics and elections:
  - Presidency of Donald Trump
  - The New York Times publishes an editorial written by an anonymous senior administration
    official in the Trump administration which criticizes U.S. President Donald Trump
    and claims unnamed administration aides and officials, in efforts to promote national
    stability, conspired against the president. (AP via CBC)
  Science and technology:
  - International Space Station maintenance
  - The Director General of Roscosmos, Dmitry Rogozin, says the 2mm hole detected
    on the International Space Station (ISS) last week was caused, possibly deliberately,
    by someone using a drill, and that an investigation is under way to find out who
    is responsible. (The Guardian)
