Date: '2018-09-25'
Source_URI: Portal:Current events/2018 September 25
Intelligence_Payload:
  Business and economy:
  - Inspire Brands announces its purchase of fast food chain Sonic Drive-In for US$2.3
    billion. (USA Today)
  - Dunkin' Donuts announces it will drop the "Donuts" part of its name and be simply
    known as "Dunkin' " beginning in January 2019. (USA Today)
  Health and environment:
  - Pussy Riot activist Pyotr Verzilov states on Twitter that he is recovering after
    spending two weeks at Charité in the intensive care unit from a suspected poisoning.
    (CBS News)
  International relations:
  - Russia–Ukraine relations
  - Russia acknowledges that it was notified of Ukraine's decision not to renew the
    Russian–Ukrainian Friendship Treaty. (TASS)
  - China–United States relations
  - The U.S. consulate in Hong Kong says that China denied a request for a port call
    to Hong Kong by the USS Wasp. China says that it handles approvals "case by case,
    in accordance with the principle of sovereignty". (Reuters)
  - Brexit, Opposition to Brexit in the United Kingdom
  - The Labour Party plans to reject UK Prime Minister Theresa May's Chequers Agreement
    and is open to a new Brexit referendum. (Reuters) (AP News)
  Law and crime:
  - A court in Vietnam sentences 42-year old activist Doan Khanh Vinh Quang to 27
    months in prison for writing anti-government Facebook posts criticizing the Communist
    Party of Vietnam. (Fox News)
  - Philippine Senator Antonio Trillanes, a vocal critic of President Rodrigo Duterte,
    is arrested on charges of rebellion. Trillanes says that Duterte is "silencing
    his political critics, those who tell the truth." (Al Jazeera)
  - Bill Cosby sexual assault cases
  - American actor/comedian Bill Cosby is sentenced to three to ten years in a Pennsylvania
    prison for drugging and sexually assaulting a woman in 2004. (The New York Times)
  Politics and elections:
  - Politics of Sweden
  - Swedish Prime Minister Stefan Löfven loses a vote of confidence in parliament.
    (BBC)
