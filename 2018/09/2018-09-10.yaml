Date: '2018-09-10'
Source_URI: Portal:Current events/2018 September 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Netherlands halts funding of the Syrian opposition and police forces, saying
    the chances of them winning the war are "extremely limited". Dutch support for
    the White Helmets will also end in December 2018. (Dutch News)
  - Somali Civil War
  - A car bomb in Mogadishu kills six people and injures 16 others. (Al Jazeera)
  - Second Libyan Civil War, 2018 Tripoli attack
  - Gunmen storm the headquarters of the National Oil Corporation (NOC) in Tripoli,
    Libya. At least four people are killed. (BBC)
  Disasters and accidents:
  - 2018 Hokkaido Eastern Iburi earthquake
  - The death toll from the earthquake in Hokkaido, Japan rises to 44. There are now
    no reports of individuals missing and the search operations have been called off.
    (Xinhua)
  - 2018 Atlantic hurricane season
  - Hurricane Florence regains strength to a category 4 major hurricane and is expected
    to threaten the East Coast of the United States near the Carolinas in the coming
    days, with the potential for a category 4 or 5 landfall with very large rainfall
    totals. Preparations are underway for evacuation of around 1 million coastal inhabitants
    of South Carolina. (Upi) (Post and Courier)
  - A gas depot explodes in Lafia, Nigeria, killing at least 35 people and leaving
    some burned beyond recognition. (CBC)
  International relations:
  - Palestine–United States relations
  - The Wall Street Journal reports that National Security Advisor John R. Bolton
    is expected to announce today the closure of the Palestine Liberation Organization
    office in Washington. (Bloomberg)
  - Palestinian diplomat Saeb Erekat says that the United States "is willing to disband
    the international system in order to protect Israeli crimes". (Times of Israel)
  - North Korea–Russia relations
  - Kremlin aide Yuri Ushakov says that Russian President Vladimir Putin has sent
    a letter to meet North Korea leader Kim Jong-un. (Reuters)
  - Nieuwsuur reports the Dutch government has provided funding over the past two
    years to Syrian rebel group Jabhat al-Shamiya, despite Dutch prosecutors describing
    the group as a "salafist and jihadistic" terror group and preparing to bring a
    man to trial next week accused of being a member. (Dutch News)
  Law and crime:
  - California Attorney General Xavier Becerra announces the arrest of 32 East Bay
    street gangsters linked to a million-dollar fraud conspiracy. (SFGate.com)
  - Death of Marrisa Shen
  - Ibrahim Ali, a 28-year old Syrian refugee living in Canada, is charged with first-degree
    murder in the death of Marrisa Shen. (Fox News) (New York Post)
  Politics and elections:
  - Swedish general election
  - The center-left parties that form the current government obtain 40.6% of the vote,
    the center-right alliance winning 40.3%. The far-right Sweden Democrats gain 17.6%.
    A long process to form a coalition government now seems likely. (CNN)
  - Moscow mayoral election, 2018
  - The Russian presidential office confirms that mayor of Moscow Sergei Sobyanin
    is reelected for a second and final term. (Sputnik via Urdupoint)
  - Impeachment of Park Geun-hye
  - Conservative South Korean protesters at the Seoul station call for the release
    of imprisoned former President Park Geun-hye. (Upi)
  - National Security Advisor John R. Bolton threatens the International Criminal
    Court with sanctions should the organisation try to prosecute Americans for war
    crimes committed in Afghanistan. (Reuters)
  Science and technology:
  - SpaceX successfully launches Canadian communication satellite Telstar 18V from
    Cape Canaveral Air Force Station. It was deployed into geostationary transfer
    orbit (GTO) approximately 32 minutes after rocket's liftoff. (CBS News)
