Date: '2018-09-02'
Source_URI: Portal:Current events/2018 September 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomber attacks a government building in Mogadishu, Somalia, and causes
    the collapse of an adjacent school. Three deaths and 14 injuries are reported.
    (BBC)
  - Moro conflict; 2018 Isulan bombings
  - Another bombing incident occurs in Isulan, Sultan Kudarat, in the Philippines,
    when an improvised explosive device explodes outside an internet café, killing
    one person and injuring 15 others. (GMA News)
  - Second Libyan Civil War
  - Around 400 prisoners, mostly supporters of the late Libyan dictator Muammar Gaddafi,
    escape from a detention facility in Ain Zara, near Tripoli, amid fighting between
    rival militia groups. (BBC)
  Disasters and accidents:
  - 2018 Vietnam floods
  - Heavy floods that started again across Vietnam have killed at least 14 people,
    while four others are declared missing. Also, 375 houses were damaged and 661
    cattle killed. (Firstpost)
  - A bus crashes in the Andes in Ecuador, leaving 11 people dead and 37 injured.
    (Channel NewsAsia)
  - National Museum of Brazil fire
  - A massive fire destroys most of the Paço de São Cristóvão, which houses the National
    Museum of Brazil, in Rio de Janeiro. The museum holds important archaeοlogical
    and anthropological objects, including the remains of the Luzia Woman, Marajoara
    vases and Egyptian mummies. (G1) (Reuters)
  International relations:
  - War in Donbass
  - Tens of thousands of people attend the funeral of Alexander Zakharchenko. Yesterday,
    Russian Foreign Minister Sergei Lavrov said that the murder was a provocation
    and that it would derail the stalled Normandy format peace process. (Deutsche
    Welle)
  - Crisis in Venezuela, Foreign relations of Ireland to the Americas
  - Ireland protests in response to the Venezuelan government seizing a Smurfit Kappa
    production plant, with Dublin liaising through its Mexican embassy to secure its
    return and the release of imprisoned managers. (Financial Times)
  Politics and elections:
  - International presidential trips made by Rodrigo Duterte
  - Philippines President Rodrigo Duterte visits Israel, making him the first Philippines
    president to do so. (Tampa Bay)
