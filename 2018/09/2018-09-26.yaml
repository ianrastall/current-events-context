Date: '2018-09-26'
Source_URI: Portal:Current events/2018 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Tripoli (2018)
  - A ceasefire has ended heavy fighting in Tripoli that has killed over 100 people
    in a month from different militias. (Fox News)
  - Northern Mali conflict
  - At least 15 Tuaregs are killed when armed men from a rival ethnic group (Fulani)
    attack their village in northern Mali, according to local authorities. (Reuters)
  - Ahvaz military parade attack
  - ISIL claims more attacks will follow Saturday's attack. (Rudaw)
  - Gunmen storm a prison in Cameroon, releasing up to 80 prisoners. (IOL)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Tropical Storm Rosa forms off the Pacific Coast of Mexico. Although Rosa is expected
    to strengthen, forecasters say that it will remain offshore. (ABC News) (CBS News)
  Law and crime:
  - Turkey–United States relations, 2016–present purges in Turkey
  - Turkish President Recep Tayyip Erdoğan says that a Turkish court will decide the
    fate of American pastor Andrew Brunson. (Reuters)
  - Brett Kavanaugh Supreme Court nomination
  - A third woman accuses US Supreme Court nominee Brett Kavanaugh of sexual misconduct.
    Her lawyer submitted her sworn statement to the Senate Judiciary Committee. (The
    Wall Street Journal)
  - Poisoning of Sergei and Yulia Skripal
  - Investigative website Bellingcat releases information identifying one of the suspects
    involved in the poisoning of Sergei and Yulia Skripal as Anatoliy Chepiga, a decorated
    Colonel of the Main Intelligence Directorate. (The Guardian)
  - American boxer Victor Ortiz is arrested for allegedly raping a woman in March,
    and is expected to be charged with three felonies. (EOnline)
  Science and technology:
  - Exploration of Mars
  - NASA's Opportunity rover is spotted on satellite imagery three months after it
    went silent during a Martian dust storm. (CBS News)
