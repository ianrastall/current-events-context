Date: '2018-09-22'
Source_URI: Portal:Current events/2018 September 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Ahvaz military parade attack
  - Four unknown gunmen, wearing military uniforms, open fire during a military parade
    to commemorate the Iran–Iraq War in Ahvaz, Khuzestan, Iran, killing 25 people
    and wounding up to 60. Both the Islamic State and Ahvaz National Resistance claim
    responsibility. (Reuters)
  - War in Afghanistan
  - Eight children playing near a police station in the northern Faryab province are
    killed by a landmine explosion. Six other children are also wounded. (BBC)
  - Somali Civil War
  - A U.S. airstrike kills 18 Al Shabaab militants north of Kismayo, Somalia. The
    militants were engaged in an attack on U.S. and local forces. (CBC News)
  - Pakistan’s military says security forces have raided militant hideouts, setting
    off a shootout that leaves seven soldiers and nine militants dead. (The Washington
    Post)
  Arts and culture:
  - Pope Francis's visit to the Baltic States
  - Pope Francis arrives in Vilnius, Lithuania, on his visit to the Baltic States.
    (Catholic News Agency)
  - Portuguese discoveries, History of Portugal
  - Archaeologists discover a centuries-old shipwreck near the Portugal coast of Cascais.
    (CNN)
  Disasters and accidents:
  - MV Nyerere sinking
  - The death toll of the MV Nyerere sinking in Lake Victoria, Tanzania, rises to
    207. Several people are still missing. (BBC)
  - The death toll of a cholera outbreak in Yobe and Borno, Nigeria, rises to 97.
    (Rappler)
  - 2018 lower Puna eruption
  - Hawaiʻi Volcanoes National Park reopens after 134 days of closure due to volcanic
    activity at Kilauea that damaged park infrastructure. (Maui Now) (NBC News)
  International relations:
  - China–Holy See relations
  - The Vatican signs a provisional agreement with China on the process used to appoint
    bishops, a breakthrough after years of contentious negotiations on the management
    of Catholic leadership in the communist country. (The Washington Post)
  Science and technology:
  - Hayabusa2
  - The Japanese space agency JAXA announces that a pair of tall robots successfully
    landed on asteroid Ryugu. (Space.com)
