Date: '2018-09-18'
Source_URI: Portal:Current events/2018 September 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syria missile strikes (September 2018)
  - News emerges that the Russian Ilyushin Il-20 aircraft with fourteen people on
    board, missing since Monday over the Mediterranean Sea, was shot down. Russia
    accuses Israel of not giving enough warning before launching its attacks, causing
    Syria to shoot the plane down. (BBC) (ABC News)
  Business and economy:
  - 2018 China–United States trade war
  - China adds US$60 billion of US products to its import tariff list in retaliation
    to the United States' recent tariffs on US$200 billion of Chinese imported goods.
    (Reuters)
  Disasters and accidents:
  - 2018 Pacific typhoon season
  - The death toll of the Typhoon Mangkhut in the Philippines rises to 81. 59 others
    are still missing. (Philippine Star)
  - 2018 Atlantic hurricane season, Hurricane Florence
  - The death toll rises to 35. Also, about 3.4 million chickens and turkeys and 5,500
    hogs were killed in flooding from Hurricane Florence as rising North Carolina
    rivers swamped dozens of farm buildings where the animals were being raised for
    market. (CBS News) (Washington Examiner)
  - 2016–18 Yemen cholera outbreak
  - Nine people, including seven children, die from cholera in Yemen, amid an outbreak
    of the disease in the country. (Sputnik News)
  - A total of 37 people, mostly foreign workers, are confirmed dead due to the drinking
    of tainted alcohol in Malaysia. (Yahoo News)
  - 21 people are killed and 25 others are injured in a collision between a passenger
    bus and a trailer carrying flammable materials in Isfahan, Iran (Xinhua)
  - A bus crash in southern Ecuador, leave 12 dead and 27 injured. (El Universal)
  - The sixth floor of the Hotel Ritz in Madrid, Spain, collapses resulting in the
    death of one person while 12 others are injured. (BBC)
  International relations:
  - September 2018 inter-Korean summit, North Korea–South Korea relations
  - North Korean leader Kim Jong-un greets South Korean President Moon Jae-in in Pyongyang
    for their third summit meeting in 2018, as both countries look to establish peace
    on the Korean Peninsula. (CNN)
  - North Korea says it will dismantle its Yongbyon Nuclear Scientific Research Center
    if the U.S. takes reciprocal measures. North and South Korea say they will seek
    a joint bid to host the 2032 Summer Olympics. (NBC News)
  Law and crime:
  - Cannabis in South Africa
  - South Africa legalizes the recreational use of cannabis. (BBC)
  Politics and elections:
  - 2018 Chemnitz protests
  - German Chancellor Angela Merkel removes Hans-Georg Maaßen from the position of
    President of the Federal Office for the Protection of the Constitution after his
    remarks downplaying anti-migrant violence. (AP)
