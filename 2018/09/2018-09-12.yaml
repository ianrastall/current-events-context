Date: '2018-09-12'
Source_URI: Portal:Current events/2018 September 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - The death toll from yesterday's suicide attack on protesters in eastern Afghanistan
    rises to 68. (Al Jazeera)
  Business and economy:
  - The French railway company SNCF announces prototypes for driverless passenger
    and freight trains by 2023. (Phys.org)
  Disasters and accidents:
  - 14 people died and 24 others were injured when the brakes of an overloaded passenger
    van failed while the van was traveling on a winding road in northern Philippines.
    (The Boston Globe)
  - At least 20 people are killed in central Mali when a truck plunges into a river
    after a suspected brake failure. (Reuters)
  - 2018 Atlantic hurricane season, Hurricane Florence
  - Amtrak modifies services and cancels train services south of Washington, D.C.
    ahead of Hurricane Florence. FlightAware reported that 180 flights have been cancelled.
    Charleston International Airport in South Carolina is expected to close by midnight.
    (The Washington Post)
  Law and crime:
  - A man plows his car into a crowd of people at a busy square in Hengyang, Hunan,
    China, before exiting his vehicle and stabbing bystanders. Eleven people are killed
    and 44 others are injured. The attacker was detained and identified by police
    as a convicted drug dealer and thief, who said that "he wanted to take revenge
    on society". (South China Morning Post)
  - Five people are killed in a string of shootings in Bakersfield, California, before
    the gunman fatally shoots himself. (Reuters)
  Politics and elections:
  - Treaty on European Union
  - The European Parliament votes 448–197 to trigger article 7 against Hungary for
    flouting the rule of law in the country. (Al Jazeera)
  - 2017–18 Iranian protests
  - Iranian Kurdish shopkeepers begin a region-wide strike against the executions
    of Kurdish activists and the bombing of opposition parties in Koya in the neighboring
    Iraqi Kurdistan Region. (Kurdistan24)
  - 2018 G20 Buenos Aires summit
  - Deputy US Trade Representative Dennis Shea will represent the United States at
    the Group of 20 trade ministerial meeting in Argentina. (Reuters)
  Sports:
  - 2018 WNBA season
  - In the WNBA Finals, the Seattle Storm win the WNBA championship with a 98-92 win
    over the Washington Mystics. (Huffington Post)
