Date: '2018-09-24'
Source_URI: Portal:Current events/2018 September 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syria missile strikes (September 2018)
  - Russian officials state that the country will send S-300 air-defense missile system
    to Syria within two weeks following the downing of Russian aircraft in Syria.
    Russia also stated it will commence jamming radar and satellite signals of planes
    that attack Syrian territory from the Mediterranean. (The Washington Post) (The
    National)
  - War in Afghanistan (2001–2021)
  - A Taliban prisoner kills eight policemen after seizing their weapons. The condition
    of the Taliban gunman is unknown. (Voice of America)
  Business and economy:
  - The developer of the Keystone XL pipeline expects construction to start in 2019.
    (CBS News)
  Disasters and accidents:
  - 2018 Naga, Cebu landslide
  - The death toll of the landslide in Cebu, Philippines rises to 53. (Journal Online)
  - 2018 Atlantic hurricane season, Aftermath of Hurricane Florence
  - Firefighters remove dead fish from Interstate 40 in Pender County, North Carolina
    as water from Hurricane Florence recedes. (AJC) (WPTV)
  International relations:
  - 2018 North Korea–United States summit, North Korea–United States relations
  - US President Donald Trump expects a second summit with North Korea leader Kim
    Jong-un "quite soon". (CNN)
  - Joint Comprehensive Plan of Action
  - The foreign ministers of Germany, Russia, the United Kingdom, France, China and
    Iran agree to the creation of a Special Purpose Vehicle, a financial facility
    in the European Union, to facilitate payments and continue trade with Iran after
    the US withdrawal from the Iran deal. (Associated Press)
  Law and crime:
  - Crime in California
  - Police in California arrest Ramon Escobar, 47, on charges of killing and assaulting
    homeless people, and are investigating whether he may have attacked a fisherman
    napping beneath a pier, in the cities of Los Angeles and Santa Monica, California.
    Authorities believe Escobar may be a serial killer, who is now a person of interest
    in the disappearance of his aunt and uncle in Houston, Texas. (CBS News)
  - Dellen Millard is convicted of murdering his father Wayne Millard, who owned an
    aviation company. The death had initially been ruled a suicide. Dellen Millard
    has already been convicted of two other murders in Canadian court. (BBC) (The
    Globe and Mail)
  Politics and elections:
  - Maldivian presidential election, 2018
  - Outgoing president Abdulla Yameen concedes defeat to opposition candidate Ibrahim
    Mohamed Solih. (Deutsche Welle)
  - Politics of Hong Kong, Localism in Hong Kong
  - The government of Hong Kong bans the pro-independence localist party Hong Kong
    National Party. (BBC) (The Wall Street Journal)
  Science and technology:
  - Timeline of Instagram
  - Instagram co-founders Kevin Systrom and Mike Krieger are expected to step down
    from the company. (UPI)
