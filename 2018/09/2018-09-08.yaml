Date: '2018-09-08'
Source_URI: Portal:Current events/2018 September 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgents attacked a checkpoint in the western province of Afghanistan
    of Herat killing 9 and injuring 6 the militants suffered 10 losses as well. (VOA)
  Business and economy:
  - The WTC–Cortlandt subway station in lower Manhattan opens for the first time since
    being destroyed in the September 11 attacks in 2001. (The New York Times)
  Disasters and accidents:
  - 2018 Hokkaido Eastern Iburi earthquake
  - The death toll from the earthquake in Hokkaido, Japan, rises to 39. More people
    remain missing. (The Japan Times)
  - A pneumonia outbreak in Brescia and Mantova, Italy, infects at least 150 people.
    The deaths of two other people are suspected connected to the disease. The cause
    is a suspected bacterium in the water. (Corriere della Sera)
  - 15 people died and 13 were injured when a truck carrying potatoes crashed into
    five vehicles in Mbeya, Tanzania. (The East African)
  - At least 15 people are killed and 25 others wounded when a passenger bus collides
    with a truck in Kandahar, Afghanistan. (TOLONews)
  - A bus plunges into a ravine in Sukabumi, West Java, Indonesia, resulting in 21
    deaths. (ABC News)
  - The Prime Minister of Abkhazia Gennadi Gagulia dies in a car accident in Abkhazia
    after returning from a trip to Syria. (RFE/RL) (TASS)
  Health and environment:
  - 2018 Middle East respiratory syndrome outbreak
  - A South Korean man is diagnosed with the potentially deadly MERS virus and is
    being treated at a hospital in Seoul, the first such case in three years. (Reuters)
  - The Public Health England reports the United Kingdom's first ever case of monkeypox
    in a Nigerian national staying at a naval base in Cornwall. The patient is being
    treated at the Royal Free Hospital in London. (The Guardian)
  Law and crime:
  - Human rights in Iran
  - Iran's judiciary executes three Iranian Kurdish prisoners, including Ramin Panahi,
    for terrorism offences. Two United Nations special rapporteurs condemn the executions
    and Amnesty International alleges their trials were unfair, due to the denial
    of legal counsel and confessions obtained through torture. (Reuters)
  - Human rights in Egypt
  - A court in Egypt sentences 75 people to death for participating in a pro-Morsi
    sit-in protest in a Cairo suburb in 2013. The breakup of that protest at Rabaa
    Square by Egyptian authorities resulted in over 600 deaths. Of the 739 defendants,
    Muslim Brotherhood leader Mohamed Badie and 46 others are sentenced to life in
    prison, 374 receive 15-year jail terms, 22 are sentenced to 10 years and 215 people,
    including Mahmoud Abu Zeid (Shawkan), to five years in jail. (France 24) (The
    Evening Standard)
