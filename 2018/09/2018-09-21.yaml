Date: '2018-09-21'
Source_URI: Portal:Current events/2018 September 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, Battle of Tripoli (2018)
  - The death toll from recent clashes in Tripoli rises to 96. The clashes, which
    began on August 26, 2018, have also left 444 wounded and 16 missing. (The Washington
    Post)
  - Islamist insurgency in Mozambique
  - Twelve villagers are killed and 14 are wounded in an attack by Ansar al-Sunna
    on a village in northern Mozambique. (News24)
  Disasters and accidents:
  - Dunrobin tornado
  - A tornado hits near Dunrobin, Ontario then goes through Ottawa, Canada. 25 people
    are injured and many houses are destroyed. (The Canadian Press via Toronto Star)
  Health and environment:
  - The government of Nigeria announces that 61 people have died and 50 others have
    been hospitalized from a cholera outbreak in Yobe. (Xinhua)
  Law and crime:
  - A woman goes on a stabbing rampage in Queens, New York City, injuring five, including
    three infants. All are in stable condition. (CNN)
  Politics and elections:
  - Politics of Vietnam
  - Vietnamese President Trần Đại Quang dies at the age of 61 following an extended
    illness. Vice President Đặng Thị Ngọc Thịnh succeeds as the acting President.
    (BBC)
  - Anti-corruption campaign under Xi Jinping
  - The director of the National Energy Administration of China, Nur Bekri, is placed
    under investigation for graft. (Reuters)
  Science and technology:
  - Trans Mountain Pipeline
  - Canada Natural Resources Minister Amarjeet Sohi orders the National Energy Board
    to conduct a new review of the Trans Mountain Pipeline expansion project. (The
    Canadian Press via Edmonton Sun) (Reuters Canada)
  Video games:
  - Telltale Games
  - Video game developer Telltale Games announces the closure of most of its studio
    via public statement. 225 employees are laid off, leaving only 25 left in order
    to fulfill obligations. (Game Informer)
