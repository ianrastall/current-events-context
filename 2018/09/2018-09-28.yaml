Date: '2018-09-28'
Source_URI: Portal:Current events/2018 September 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018 Gaza border protests
  - Six Palestinians, including a 12-year-old, are killed by IDF fire in Gaza border
    clashes. (Haaretz)
  Law and crime:
  - Catholic sexual abuse cases in Chile
  - The Roman Catholic Church defrocks Father Fernando Karadima, a priest at the center
    of a sex abuse scandal in Chile. (Reuters)
  Business and economy:
  - Canada–United States relations, Detroit–Windsor
  - It is announced that the Gordie Howe International Bridge, a bridge planned to
    span the Canada–United States border between Detroit and Windsor, will open in
    late 2024. The project is expected to cost $5.7 billion and create 2500 jobs.
    (CTV News Windsor) (Tri-City News)
  Disasters and accidents:
  - 2018 Pacific hurricane season
  - Hurricane Rosa strengthens to a category 4 hurricane in the Pacific Ocean and
    is expected to affect parts of the coastlines of southwestern Mexico, the Baja
    California Peninsula, and Southern California. (NBC News)
  - Air Niugini Flight 73 lands short at Chuuk International Airport and settles in
    a shallow lagoon. All passengers and crew are successfully evacuated. (ABC)
  - 2018 Sulawesi earthquake
  - Indonesia is hit by a tsunami after being hit by a 7.7-magnitude earthquake, resulting
    in at least 50 deaths and entire families being reported missing. (BBC) (CBS News)
  - A USMC F-35 jet crashes in coastal South Carolina making this the first crash
    of the U.S. military's newest and most expensively developed aircraft. (CBS News)
  Politics and elections:
  - Brett Kavanaugh Supreme Court nomination
  - U.S. President Donald Trump orders an FBI investigation into the sexual assault
    allegations against Supreme Court nominee Brett Kavanaugh. (The New York Times)
  Science and technology:
  - Facebook uncovers a security flaw, impacting 50 million user accounts which may
    have been compromised. (The Guardian) (Reuters)
