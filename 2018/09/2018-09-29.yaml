Date: '2018-09-29'
Source_URI: Portal:Current events/2018 September 29
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - More than 408 people are confirmed dead and at least 540 injured after a tsunami
    triggered by a magnitude 7.5 earthquake which hit Palu and Donggala, Indonesia,
    on Friday. (BBC)
  - A Mediterranean tropical-like cyclone (also known as a "Medicane") strikes Greece
    near Kalamata, causing power outages and gale force winds near the capital Athens.
    In the storm's formative stages, heavy rains killed four people in Tunisia. (Weather
    Underground), (The Weather Channel)
  - The United States Coast Guard rescues one survivor after a helicopter crashes
    near Yakutat, Alaska. Three others aboard the helicopter are missing. (KTUU-TV)
  Law and crime:
  - Harvey Weinstein sexual abuse allegations
  - The New York Supreme Court allows a $45 million loan lawsuit against Harvey Weinstein
    to resume after pausing it for bankruptcy proceedings for The Weinstein Company
    to complete. (The Wrap)
  - Tesla lawsuits and controversies, History of Tesla Inc.
  - Under the terms of a settlement with the U.S. Securities and Exchange Commission,
    Elon Musk and Tesla, Inc. agree to pay $20 million each to financial regulators,
    and Musk is expected to resign as chairman, but will remain as chief executive.
    (Market Watch) (HuffPost)
  - Catalan independence movement
  - Police clash with separatists in Barcelona marking the anniversary of the 2017
    independence referendum. (Reuters via U.S. News & World Report)
  Politics and elections:
  - Brett Kavanaugh Supreme Court nomination
  - The FBI reaches out to Deborah Ramirez, the second woman to publicly accuse Supreme
    Court nominee Brett Kavanaugh of sexual misconduct, as part of the investigations
    into allegations against Kavanaugh. (CBS News)
