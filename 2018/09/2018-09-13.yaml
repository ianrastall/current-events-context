Date: '2018-09-13'
Source_URI: Portal:Current events/2018 September 13
Intelligence_Payload:
  Business and economy:
  - September 2018 inter-Korean summit, North Korea–South Korea relations
  - The heads of Samsung, Hyundai, SK and LG will attend the third Inter-Korean summit
    between South Korean President Moon Jae-in and North Korea leader Kim Jong-un
    in Pyongyang next week. (UPI)
  - The European Central Bank maintains its policy to halve monetary stimulus after
    September and end it in December 2018. However, the ECB perceives "uncertainties
    related to rising protectionism" as the main concern for the global economy. (The
    Daily Journal)
  Disasters and accidents:
  - 2018 Atlantic hurricane season
  - Hurricane Florence weakens to a category 1 storm, but "life-threatening storm
    surge and rainfall" to the Carolinas remain likely with tropical-storm-force winds
    on Thursday. (WBIR), (Business Insider)
  - Aftermath of Hurricane Maria, Hurricane Maria death toll controversy
  - U.S. President Donald Trump denies that 3,000 people died in the 2017 hurricane,
    advancing a number of "6 to 18 deaths", and further makes the false assertion
    that the Democrats inflated the former number. (NBC News) (NPR)
  - Massachusetts gas explosions
  - At least 40 homes are damaged and 1 person killed in Lawrence, Andover, and North
    Andover, as at least 39 gas explosions level houses. Residents are being evacuated
    to neighboring towns. (Fox News), (CNN), (ABC)
  - Heavy floods, following recent heavy rainfall in Adamawa, Nigeria, kill at least
    10 people and displace several hundreds more. (Premium Times)
  - Seven tourists are injured after a section of cliff breaks away above Shipwreck
    Beach at Navagio, on the Greek island of Zakynthos, creating a minor tsunami that
    capsized several small boats in the cove. (BBC) (The Washington Post)
  Law and crime:
  - Organized crime in Nigeria
  - Bandits open fire at a village hall, where residents gather at night to watch
    films, in Zamfara State, Nigeria. Eleven people are killed and many more are injured.
    (BBC)
  - Torture during the Algerian War of Independence
  - French President Emmanuel Macron announces the recognition that the French state
    systematically tortured during the 1950s–60s Algerian War of Independence and
    calls to open archives concerning those who disappeared, such as activist Maurice
    Audin. (The Washington Post)
  - Mass surveillance in the United Kingdom
  - The European Court of Human Rights rules that the United Kingdom breached provisions
    in the European Convention on Human Rights in relation to mass surveillance practices
    exposed by American whistleblower Edward Snowden. (AP News)
  Politics and elections:
  - The Spanish Congress of Deputies approves the decree to allow the government to
    exhume the dictator Francisco Franco's remains from the Valle de los Caídos. (Reuters)
    (The New York Times)
  - South Sudan civil war
  - President of South Sudan Salva Kiir and leader of SPLM-IO Riek Machar reach a
    peace agreement. Other rebel factions are also expected to join a reformed government.
    (BBC)
