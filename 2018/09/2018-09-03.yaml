Date: '2018-09-03'
Source_URI: Portal:Current events/2018 September 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - More than 40 people, including civilians, have died in clashes in the Libyan city
    of Tripoli. (BBC)
  Arts and culture:
  - Former San Francisco 49ers quarterback Colin Kaepernick is expected to become
    the "new face" of the Nike advertising campaign Just Do It. (BBC)
  - President of Ukraine Petro Poroshenko states that the Orthodox Church intends
    to grant the Kiev Patriarchate autocephaly. (BBC)
  Disasters and accidents:
  - Typhoon Jebi (2018)
  - The Typhoon Jebi in Taiwan killed six people while another was declared missing.
    (Taiwan News)
  - A bus accident in Avilés, Spain, kills five people and injures 17 others. (La
    voz de Avilés)
  - An explosion at a Rheinmetall munition depot near Cape Town, South Africa, kills
    at least eight people. (Al Jazeera)
  - A plane crashes near Angel Falls, Venezuela, killing all six of the people onboard.
    (Mundo)
  - 2018 Atlantic hurricane season
  - Tropical Storm Gordon forms in the Florida Keys and is forecast to strengthen
    over the next 48 hours as it brings strong winds and heavy rain to the Gulf of
    Mexico. (KXLY) (NBC News)
  Law and crime:
  - Arrests of Wa Lone and Kyaw Soe Oo
  - Two Reuters journalists jailed in Myanmar are sentenced to seven years in prison
    for violating the Official Secrets Act, prompting international condemnation.
    The pair was investigating reports of mass graves at the village of Inn Din when
    they were arrested in Yangon for attempting to obtain classified documents, which
    they contend were used as bait to entrap them. (The Guardian)
