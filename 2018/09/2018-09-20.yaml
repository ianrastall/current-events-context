Date: '2018-09-20'
Source_URI: Portal:Current events/2018 September 20
Intelligence_Payload:
  Arts and culture:
  - Mercury Prize
  - The band Wolf Alice wins the 2018 Hyundai Mercury Prize for its album Visions
    of a Life. (The Guardian)
  Disasters and accidents:
  - Storm Bronagh
  - Bronagh, the second named storm of the 2018–19 European windstorm season, begins
    moving across Ireland and the United Kingdom. (ITV)
  - Heavy rainfall from Bronagh results in severe flash floods across northern England.
    Sheffield is the worst affected city, with dozens of vehicles becoming stranded
    in rising floodwaters during the evening rush hour. (BBC)
  - High winds from Bronagh arrive later in the day, gusting up to in parts of Wales.
    (BBC)
  - MV Nyerere sinking
  - At least 136 people are dead and more than 100 others are missing after a ferry
    capsizes in Lake Victoria, Tanzania. (BBC)
  - 2018 Naga, Cebu landslide
  - At least 25 people are killed and dozens are missing after a landslide unleashed
    by monsoon rains strikes Cebu, Philippines. (Philippine Star)
  - 2018 California wildfires
  - The United States Forest Service says that the Mendocino Complex Fire, largest
    wildfire on record in California, has been contained. (Mercury News)
  - Eight people are killed in a head-on crash near Florence, Arizona, United States,
    after a car strikes an SUV. (ABC15)
  - Four children from a day-care centre are killed in a collision involving a train
    and an electric cargo bike in Oss, Netherlands. Another child and a woman are
    injured. (BBC)
  - A gas leak at the state archive in the city of Arezzo, Italy, kills two employees
    and injures one other. (Ansa)
  - More than 30 passengers receive treatment after pilots forget to turn on a switch
    regulating cabin pressure on Jet Airways flight 9W 697 from Mumbai to Jaipur.
    (BBC)
  International relations:
  - Brexit negotiations
  - At a European Union leaders' meeting in Salzburg, European Council President Donald
    Tusk says that he will push for an additional gathering in mid-November, allowing
    the United Kingdom's proposals to be "reworked and further negotiated". (AFP via
    Dawn)
  - September 2018 inter-Korean summit, North Korea–South Korea relations
  - South Korean President Moon Jae-in states that North Korean leader Kim Jong-un
    wants to meet with U.S. President Donald Trump for a second time. (NPR)
  - Doping in Russia
  - The World Anti-Doping Agency votes to reinstate its affiliation with the Russian
    Anti-Doping Agency, which had previously been suspended in November 2015. (USA
    Today)
  - Countering America's Adversaries Through Sanctions Act
  - The United States State Department imposes sanctions on the Equipment Development
    Department, an agency within the military of China, for purchasing Sukhoi Su-35
    fighters and S-400 missile system equipment through Rosoboronexport, Russia's
    main arms export agency. (Reuters)
  Law and crime:
  - Aberdeen, Maryland shooting
  - Three people are killed and three others are injured in a shooting at a Rite Aid
    distribution center in Aberdeen, Maryland, USA. The suspected shooter then shoots
    and kills herself. (CNN)
  Politics and elections:
  - Politics of Japan, Liberal Democratic Party (Japan) leadership election, 2018
  - Japanese Prime Minister Shinzō Abe is elected for a third term as President of
    the Liberal Democratic Party. (The Asahi Shimbun)
  Science and technology:
  - Climate of Mars, Atmosphere of Mars
  - The ExoMars Trace Gas Orbiter reveals dust devils in the Mars region Ariadnes
    Colles. New measurements indicate astronauts traveling to Mars would experience
    60% of their recommended career exposure to radioactivity in a single roundtrip
    journey. (Cosmos Magazine) (IFLScience)
  Sports:
  - 2018 NFL season
  - The Cleveland Browns win their first game in nearly two years after 635 days without
    a win. (The Guardian), (The New York Times)
