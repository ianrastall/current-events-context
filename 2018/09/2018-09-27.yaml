Date: '2018-09-27'
Source_URI: Portal:Current events/2018 September 27
Intelligence_Payload:
  Business and economy:
  - Justin Milne resigns as chairman of the Australian Broadcasting Corporation following
    allegations that he interfered in the broadcaster's employment and editorial practices
    on behalf of former prime minister Malcolm Turnbull. (The Sydney Morning Herald)
  Disasters and accidents:
  - The death toll of the floods that affected Nigeria this month rise to 200. (BBC)
  - A Mediterranean hurricane forms, threatening Libya, Italy, Tunisia, and Greece.
    (CNN)
  Law and crime:
  - Adultery law in India
  - The Supreme Court of India strikes down a law criminalizing adultery as unconstitutional,
    stating it treated women as property of their husbands. (BBC)
  - Capital punishment in China
  - China executes Zhao Zewei by firing squad, the man responsible for killing nine
    children and injuring 11 others in a knife attack at a middle school in the Shaanxi
    province. (Reuters)
  Politics and elections:
  - 2017 Rohingya persecution in Myanmar
  - MPs of the House of Commons of Canada vote to strip State Counsellor of Myanmar
    Aung San Suu Kyi of her honorary Canadian citizenship, citing her failure to stop
    the persecution of the Rohingya people by the Myanmar military. (BBC)
  - Brett Kavanaugh Supreme Court nomination
  - Christine Blasey Ford, who has accused Supreme Court nominee Brett Kavanaugh of
    sexual assault, testifies before the Senate. (New York Post)
  - Kavanaugh testifies to the Senate following the testimony of Ford. Kavanaugh denies
    the sexual assault claim and calls it part of a "calculated and orchestrated political
    hit" designed to keep him off the Supreme Court. (AOL)
  - President Donald Trump says he believes Kavanaugh after seeing him testify on
    the sexual assault allegation, citing his remarks as "powerful, honest, and riveting."
    (KDVR)
  Sports:
  - 2018 NFL season, U.S. national anthem protests (2016–present)
  - Eric Reid returns to the NFL, signing a one-year contract with the Carolina Panthers.
    (WRAL) (CBS Sports)
