Date: '2018-09-11'
Source_URI: Portal:Current events/2018 September 11
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Atlantic hurricane season, Hurricane Florence
  - The Donald Trump campaign cancels a rally for Missouri ahead of Hurricane Florence,
    which is expected to make landfall on the East Coast. (Politico)
  - The North Carolina Tar Heels football game against the UCF Knights and the North
    Carolina State Wolfpack game against the West Virginia Mountaineers are cancelled
    due to Hurricane Florence. (Orlando Sentinel) (Sporting News)
  - A bus carrying pilgrims from a Hindu temple in the hills of Telangana in India
    plunges off a road, killing at least 57 people and injuring 25 others.
  Health and environment:
  - 2018 Middle East respiratory syndrome outbreak
  - South Korean health authorities announce that they are searching for around 50
    foreign nationals who may have been in contact with the recently confirmed MERS
    patient, including those who arrived in Incheon Airport from Dubai on the same
    flight last Friday. (The Straits Times)
  International relations:
  - Eritrean–Ethiopian border conflict, Eritrea–Ethiopia relations
  - The Eritrean–Ethiopian border reopens for the first time since 1998. (The New
    York Times)
  Law and crime:
  - Capital punishment in Iraq
  - Iraq announces the executions of seven terror convicts in Dhi Qar, saying the
    men, all citizens of Iraq, were hanged yesterday. (Gulf News)
  Politics and elections:
  - 2017–18 Spanish constitutional crisis
  - A million Catalonia residents launch an "autumn of protests" on National Day of
    Catalonia to demand independence from Spain and release "high-profile" secessionists
    from jail. (The Evening Standard) (ABC News)
  - The Spanish Health Minister Carmen Montón resigns after the irregularities in
    her master's degree and the plagiarism of part of her final project were made
    public on 10 September. She is the second minister to resign since Pedro Sánchez
    formed the government on 7 June. (Reuters)
  Science and technology:
  - RiskIQ, a cybersecurity firm, reports that it has discovered the software that
    was used to gather credit card information from the British Airways website. The
    firm further states that the "supply chain attack" was very similar to an earlier
    attempt to skim data from the Ticketmaster website. (BBC)
