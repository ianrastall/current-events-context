Date: '2018-09-30'
Source_URI: Portal:Current events/2018 September 30
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Sulawesi earthquake and tsunami
  - At least 844 people are now known to have died in the Indonesian earthquake and
    tsunami. (CNN)
  - Four people are dead and at least 120 others are injured when Typhoon Trami makes
    landfall in the cities of Osaka and Okinawa, Japan. (Channel NewsAsia)
  - At least 42 people in Iran die after drinking tainted homemade alcohol. A further
    460 are hospitalized, including 16 that had gone blind and 170 that had undergone
    dialysis. (BBC)
  International relations:
  - China–Pakistan relations
  - The government of Pakistan is "rethinking" its dependence on China for the loans
    it needs to complete its Peshawar to Karachi rail project. This is part of a broader
    pushback on the ambitions of China's Belt and Road Initiative throughout the region.
    (Reuters) (South China Morning Post)
  - Canada–United States trade relations
  - Canada agrees to sign the new United States–Mexico–Canada Agreement deal which
    replaces the North American Free Trade Agreement that was reached in August by
    the United States and Mexico. (The Washington Post)
  Politics and elections:
  - Macedonian referendum, 2018, Macedonia naming dispute
  - A referendum is held in the Republic of Macedonia on whether to change the country's
    name in order to join NATO and the EU. (Reuters)
  - 91.5% of votes are in favor of the change. The voter turnout is only 36.9%, below
    the 50% threshold set by the government. Prime Minister Zoran Zaev still vows
    to propose the change in a parliament vote. (Reuters) (CNN)
  Sports:
  - 2018 Ryder Cup
  - In golf, Team Europe retains the Ryder Cup, defeating Team USA 17½–10½ at Le Golf
    National near Paris. (AP via ESPN)
  - 2018 UCI Road World Championships
  - Alejandro Valverde wins his first title after a four-man sprint, ahead of Romain
    Bardet and Michael Woods. (VeloNews)
  - 2018 NRL Grand Final
  - The Sydney Roosters defeat Melbourne Storm 21-6 in the National Rugby League premiership
    at ANZ Stadium, Sydney Australia. (BBC)
