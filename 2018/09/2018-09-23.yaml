Date: '2018-09-23'
Source_URI: Portal:Current events/2018 September 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Rebels kill 23 civilians and four soldiers in the Democratic Republic of the Congo.
    The attack was near an Ebola epidemic in the town of Beni in eastern Congo. (Reuters)
  Business and economy:
  - Transport in China, Transport in Hong Kong
  - The Guangzhou–Shenzhen–Hong Kong Express Rail Link Hong Kong section opens for
    commercial operation. (CNN)
  Disasters and accidents:
  - MV Nyerere sinking
  - The death toll of the MV Nyerere sinking in Lake Victoria, Tanzania, rises to
    224. Several are still missing. (BBC)
  - Flash floods in Cap Bon, Tunisia have killed at least five people. The heavy rains
    also carried away homes, cars and chunks of road. (France24)
  Law and crime:
  - Brett Kavanaugh Supreme Court nomination
  - A second woman accuses US Supreme Court nominee Brett Kavanaugh of sexual misconduct.
    However, others she identified as witnesses have denied any such act occurred.
    (HuffPost)
  - Defense Distributed founder and 3D-printed gun activist Cody Wilson, who was arrested
    in Taiwan for allegedly having sex with a minor, is released from Harris County
    Jail. (CBS News)
  Sports:
  - In golf, Tiger Woods wins the PGA Tour's season-ending Tour Championship for his
    first tour win since 2013. Justin Rose wins the season-long FedEx Cup points race
    and its associated US$10 million bonus. (ESPN)
