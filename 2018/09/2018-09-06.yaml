Date: '2018-09-06'
Source_URI: Portal:Current events/2018 September 6
Intelligence_Payload:
  Business and economy:
  - Approximately two million Ford F150 trucks are recalled due to a manufacturing
    error which can cause the seat belt pretensioner to ignite the vehicle. (NPR)
  - Trans Mountain Pipeline expansion
  - Kinder Morgan hints at a potential offloading of Canada assets following sales
    of the Trans Mountain Pipeline expansion project to the Canadian government. (Vancouver
    Sun) (Toronto Star)
  Disasters and accidents:
  - 2018 Hokkaido Eastern Iburi earthquake
  - A magnitude 6.7 earthquake strikes the island of Hokkaido in Japan, killing 16
    people, injuring 120 more and leaving 26 missing. (BBC)
  - Earthquakes in 2018
  - A magnitude 7.8 earthquake occurs off the coast of Fiji. The Pacific Tsunami Warning
    Center says no tsunami is expected due to its depth. (BNO News)
  - European migrant crisis
  - Spanish rescuers find five dead migrants and 53 survivors in a boat partially
    sunk in waters east of the Strait of Gibraltar. (ABC News)
  - 2018 North Korean floods
  - Heavy floods in North Korea leave at least 76 dead and 75 missing. (Reuters)
  International relations:
  - North Korea–South Korea relations, 2017–18 North Korea crisis
  - North Korean leader Kim Jong-un and South Korea president Moon Jae-in agree to
    hold a third summit between September 18 and September 20 in Pyongyang. (NBC News)
  - Kim gives a timeline for denuclearization, aiming for completion by the end of
    U.S. President Donald Trump's first term. (Reuters)
  - Eritrea–Ethiopia relations
  - Ethiopia reopens its embassy in the Eritrean capital Asmara. After the 1998-2018
    Eritrean–Ethiopian War, both countries signed a peace accord in July 2018. Also
    in July, Eritrea reopened its embassy in the Ethiopian capital Addis Ababa. (Al
    Jazeera)
  Law and crime:
  - LGBT rights in India
  - The Supreme Court of India strikes down Article 377, a colonial-era law which
    criminalized homosexuality, declaring it unconstitutional. (BBC)
  - Poisoning of Sergei and Yulia Skripal, 2018 Amesbury poisonings
  - Ben Wallace, British Security Minister, says in an interview that Russian President
    Vladimir Putin bears the responsibility for multiple Novichok poisonings in the
    U.K., in which British citizens were harmed and killed. (BBC)
  - 6 September 2018 Cincinnati shooting
  - A gunman kills three people and injures two others at the Fifth Third Bank headquarters
    in Cincinnati, United States, before police fatally shoot him. (Fox News)
  - Sony Pictures hack, WannaCry ransomware attack
  - The Justice Department unseals charges made in June against an alleged hacker
    for the North Korean government in connection with a series of cyber attacks,
    including the 2014 assaults on Sony Pictures. The Federal Bureau of Investigation
    accuses Park Jin Hyok of conspiring the hack on behalf of Reconnaissance General
    Bureau, the country's intelligence agency, and conspiring to commit wire fraud.
    (The Washington Post)
  - Nisour Square massacre
  - The second trial of U.S. citizen Nicholas Slatten, the former Blackwater (now
    Academi) employee who was found guilty in 2013 of first-degree murder in connection
    to the killing in 2007 of fourteen unarmed civilians on Baghdad's Nisour Square
    and sentenced to life in prison, ends in a mistrial. (NPR)
  - Trump administration family separation policy
  - The Trump administration proposes regulatory changes which would allow the children
    of illegal immigrants to be imprisoned for more than 20 days. (NPR)
  - Mexican Drug War
  - Mexican officials report the discovery of the remains of at least 166 people in
    a mass grave in Veracruz. (BBC)
  Politics and elections:
  - Ñuble becomes the 16th region of Chile after new administrative divisions in Chile
    come into effect. (Biobío)
  - Jair Bolsonaro presidential campaign, 2018
  - Brazilian presidential candidate Jair Bolsonaro is stabbed in the abdomen and
    seriously injured at a campaign rally. He is expected to be in intensive care
    for at least seven days. Police arrest a 40-year-old man they say appears mentally
    disturbed. (AP)
  Science and technology:
  - Discoveries of exoplanets
  - Wolf 503b, a super-Earth exoplanet twice the size of Earth, is discovered orbiting
    145 light years away by American, German, and Canadian researchers via the NASA
    Kepler Space Telescope. (Fox News) (Astrobio)
  - Twitter suspensions
  - Twitter permanently suspends the accounts of far-right conspiracy theorist Alex
    Jones and his website InfoWars. According to Twitter, the accounts were suspended
    under their policies against abusive behavior. (Politico)
