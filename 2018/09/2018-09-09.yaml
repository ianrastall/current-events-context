Date: '2018-09-09'
Source_URI: Portal:Current events/2018 September 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Dozens of people are killed in four separate attacks by the Taliban. An army base
    is destroyed in Baghlan Province. (The New York Times)
  Business and economy:
  - Weinstein effect
  - Les Moonves resigns as CEO of CBS Corporation amid reports of sexual misconduct
    allegations and an ongoing investigation into his behavior. CBS donates $20 million
    to groups supporting the Me Too movement and states that this money may be deducted
    from Moonves' severance package depending on the investigation's results. (CNN)
  Disasters and accidents:
  - A small aircraft en route from Juba to Yirol crashes in South Sudan, killing 20
    people, including the Episcopal Bishop of Yirol, and injuring three others. (Toronto
    Star)
  - At least one person is killed and nearly 40 others are injured in a stampede at
    a football stadium in Madagascar. (BBC)
  - Earthquakes in 2018
  - A magnitude 6.5 earthquake strikes near Kirakira, Solomon Islands. No tsunami
    warnings have been issued. (USGS)
  - Moldovan President Igor Dodon is involved in a highway accident when his official
    motorcade is struck by a truck coming from the opposite direction. Several passengers,
    including the president and members of his family, suffer moderate injuries and
    are hospitalized. Reports indicate that the Moldovan head of state is in good
    health. (BBC)
  International relations:
  - North Korea and weapons of mass destruction, Public holidays in North Korea
  - North Korea celebrates its 70th anniversary with a military parade in Pyongyang
    with the absence of its international ballistic missiles. (The New York Times)
  Law and crime:
  - About 200 Kosovo Albanian veterans from the Kosovo War block the road to Banje
    near Drenica and prevent a planned visit by the President of Serbia. (Reuters)
    (Associated Press)
  - The prosecutor in Abkhazia says that the driver of the car that probably initiated
    the deadly accident of Prime Minister of Abkhazia Gennady Gagulya yesterday was
    under the influence of drugs and has been detained. (News.am)
  - Seven people, including two British tourists, are wounded in a knife attack in
    the 19th arrondissement of Paris. The attacker, said to be an Afghan national,
    is arrested by police. (Associated Press) (BBC)
  Politics and elections:
  - Swedish general election, 2018
  - Voters in Sweden head to the polls to elect members to the Riksdag. (BBC)
  - Swedish media report voter harassment by members of the neo-Nazi Nordic Resistance
    Movement. The far-right Alternative for Sweden party is reportedly "shouting loud"
    on social media. (The Washington Post)
  Sports:
  - 2018 NFL season
  - The Green Bay Packers won a game down 17 or more in the fourth quarter for the
    first time in their history with a 24-23 win over the Chicago Bears after Aaron
    Rodgers returned from an injury that caused him to temporarily leave the game.
    This win was the “fourth-largest” comeback in their team history. (Sports Yahoo)
    (Business Insider)
