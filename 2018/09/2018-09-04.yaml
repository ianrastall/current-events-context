Date: '2018-09-04'
Source_URI: Portal:Current events/2018 September 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015–2018 Iraqi protests
  - Seven people are killed and more than 30 are injured during a rally in Basra,
    Iraq after security forces opened fire. (Yeni Şafak English)
  - Libyan civil war
  - The United Nations reports that a ceasefire has been agreed upon by non-governmental
    militias fighting in Tripoli. (BBC)
  Arts and culture:
  - The new book of investigative journalist Bob Woodward, Fear, draws the ire of
    the White House. (Fox News) (Vox)
  - A pair of Judy Garland's famous ruby slippers from The Wizard of Oz (1939) are
    recovered by police. The shoes were stolen from a museum in Grand Rapids, Minnesota
    in 2005. (BBC)
  Business and economy:
  - International reactions to the Saudi-led intervention in Yemen
  - Spain confirms that it has cancelled the sale of 400 laser-guided bombs to Saudi
    Arabia because of concerns about the weapons' use in the conflict in Yemen. (Reuters)
  - Amazon becomes the second trillion-dollar company in the United States. (BBC)
  Disasters and accidents:
  - 2018 Pacific typhoon season
  - Typhoon Jebi kills at least 11 people in Japan, while more than 300 are injured.
    It is considered the strongest typhoon in the country in 25 years. (BBC)
  - A bridge collapses in Kolkata, resulting in three deaths and 25 injuries. (Oneindia)
  Law and crime:
  - 70 protesters, including television actress Piper Perabo, are arrested at the
    Brett Kavanaugh Supreme Court nomination. (People) (The Hill)
  - Table Rock Lake duck boat accident
  - Tia Coleman, an Indianapolis woman who lost her husband and eight other relatives
    in the sinking of a duck boat in Branson, Missouri, files a lawsuit against the
    tour boat operators and manufacturer. (Indy Star)
  Politics and elections:
  - Brett Kavanaugh Supreme Court nomination
  - The U.S. Senate Judiciary Committee opens confirmation hearings for U.S. Supreme
    Court nominee Brett Kavanaugh. (NPR)
  - The European Ombudsman, Emily O'Reilly, mentions four counts of maladministration
    by the European Commission in the fast-track nomination of Martin Selmayr as its
    Secretary-General in February. (BBC)
  - Chicago mayoral election, 2019
  - Chicago Mayor Rahm Emanuel announces he will not seek a third term in 2019. (CBS
    News)
  - Government of Jimmy Morales
  - President Jimmy Morales and the National Security Council of Guatemala banned
    the re-entry into the national territory of the head of the CICIG (International
    Commission against Impunity in Guatemala) Iván Velásquez Gómez. President Morales
    also criticized the Secretary-General of the United Nations António Guterres and
    ordered him to immediately replace the CICIG commissioner. (The Washington Post)
  - Jon Kyl will replace John McCain as Senator of Arizona. (Huffington Post)
  Science and technology:
  - A Microsoft Azure datacenter in Texas goes down due to a cooling system failure.
    Outages in cloud services were reported worldwide (Zdnet)
