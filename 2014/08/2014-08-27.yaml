Date: '2014-08-27'
Source_URI: Portal:Current events/2014 August 27
Intelligence_Payload:
  War in Donbass:
  - Russian journalists say they have been attacked at a cemetery in Pskov while investigating
    reports that Russian soldiers were secretly buried after being killed in Ukraine.
    (BBC)
  - Pro-Russian separatists in eastern Ukraine push their way into the port of Novoazovsk,
    threatening to open up a new front in the war. (Miami Herald) (BBC)
  Syrian Civil War:
  - The UN Human Rights Council issues a report accusing both IS militants and Syrian
    government forces of committing war crimes in Syria. (BBC) (UN Human Rights Council)
  - The US government confirms that an American man believed to have been fighting
    alongside Islamist militants in Syria has been killed; the total number of Americans
    killed while taking part in the civil war rises to three. (BBC)
  - Syrian rebels take over the border Quneitra crossing between Israel and Syria
    after heavy fighting. Mortar rounds and rockets were launched into Israel. One
    IDF soldier is wounded by a bullet just days after rocket attacks from Lebanon.
    (Times of Israel)
  Disasters and accidents:
  - An F-15 Eagle from the Massachusetts Air National Guard crashes in Deerfield,
    Virginia. (NBC News)
  - The UN Refugee Agency announces that over 2000 migrants from Africa and the Middle
    East have drowned this year while trying to reach Europe by boat, a record number.
    (Reuters)
  Law and crime:
  - Christine Lagarde, the Chief of the International Monetary Fund, is placed under
    investigation in France for alleged negligence dating back to her time as Minister
    of Finance. (AP via Washington Post)
