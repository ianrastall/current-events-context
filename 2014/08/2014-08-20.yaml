Date: '2014-08-20'
Source_URI: Portal:Current events/2014 August 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Israel–Gaza conflict
  - In response to rocket fire six hours before the end of a cease-fire, Israeli airstrikes
    kill 11 Palestinians including the wife and infant son of Hamas military leader
    Mohammed Deif - the first deaths in a week - while Hamas launches over 130 missiles
    at Israel during the day. This is the 11th cease-fire broken by rocket fire from
    Hamas. (BBC), (AP via Fox News) (Reuters)
  - War in Donbass
  - Dozens of people die in heavy fighting between Ukrainian government forces and
    rebels in eastern Ukraine. (AFP via Arab News)
  Business and economy:
  - Glencore announces a share buyback program returning $1 billion to its investors,
    while reporting above-expectations first-half profit. (Reuters)
  Disasters:
  - At least 27 people have been pronounced dead after landslides in Japan's Hiroshima
    prefecture with another ten missing. (BBC), (CNN)
  International relations:
  - IAEA reports that Iran is continuing to meet its commitments under the interim
    accord that it reached with the P5+1. (Reuters)
  Science and technology:
  - A new species of tarsier is discovered in Dinagat, Philippines. (National Geographic)
  Sports:
  - Seventeen past and present players with the Cronulla-Sutherland Sharks National
    Rugby League team have been issued with doping show-cause notices after participating
    in a controversial supplements program in 2011. (AAP via Sports Fan)
