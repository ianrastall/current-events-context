Date: '2014-08-26'
Source_URI: Portal:Current events/2014 August 26
Intelligence_Payload:
  Armed conflict and attacks:
  - Taiwan scrambles fighter jets to intercept two Chinese military aircraft that
    breached Taiwanese airspace. (Voice of America)(Reuters)
  War in Donbass:
  - Russia says that the 10 armed Russian paratroopers captured during the night in
    the village of Dzerkalne, Donetsk Oblast, roughly 20 kilometers from the Russian
    border, only entered Ukraine by "mistake". (RIA Novosty via Kyiv Post)
  2014 Israel–Gaza conflict:
  - On the 50th day of the conflict, an internationally supported long-term truce
    is reached where the borders of Gaza, Egypt, and Israel are opened for humanitarian
    and reconstruction supplies and the Gaza fishing zone is extended to 6 km. Other
    issues such as an airport/seaport and the Israeli demand for demilitarization
    will be negotiated within a month. (Times of Israel)
  - Hamas fires over 100 rockets into Israel, causing over 30 injured and 2 dead.
    The Israeli Air Force strikes over 50 targets on the Gaza Strip causing casualties.
    (Jerusalem Post)
  Iraqi insurgency (2011–present):
  - A car bomb explodes in a mainly Shi'ite section of Baghdad, killing at least eight
    people and wounding 20. (Reuters)
  Arts and culture:
  - British singer Kate Bush stages a comeback concert at London's Hammersmith Apollo,
    her first live performance since 1979. (BBC)
  Business and economy:
  - Fast food giant Burger King agrees to acquire Canadian coffee giant Tim Hortons
    for $11.4 billion and move its headquarters to Canada. (Bloomberg via Washington
    Post)
  2014 pro-Russian unrest in Ukraine:
  - The President of Russia Vladimir Putin meets with the President of Ukraine Petro
    Poroshenko in Minsk, Belarus, as disputes in eastern Ukraine continue. (Voice
    of America)
  Law and crime:
  - At least 5 people die in a prison riot in the Brazilian city of Cascavel. (BBC)
  Politics and elections:
  - Three impeachment complaints against Philippines President Benigno Aquino III
    are deemed by the Philippine House of Representatives as "sufficient in form",
    paving the way for possible legal proceedings against him. (GMA Network) (The
    Philippine Star)
  - François Hollande, the President of France names a new Cabinet led by Prime Minister
    Manuel Valls with ministers who rebelled against spending cuts dropped. (BBC)
  - Two high-ranking officials in China's Shanxi province, Chen Chuanping and Nie
    Chunyu, are placed under a corruption investigation by Chinese Communist Party
    authorities. Chen Chuanping was the CPC party chief of Taiyuan, the provincial
    capital. The president of China Resources Power, Wang Yujun, is also detained.
    (Bloomberg) (SCMP)
  - Klaus Wowereit makes it official that he will resign as the mayor of Berlin on
    11 December, after having held the post for nearly 14 years, making him Germany's
    current longest-serving head of a state government. (Deutsche Welle)
  - Michael Spindelegger resigns as vice-chancellor and finance minister of Austria;
    as leader of the Austrian People's Party, he is replaced by Reinhold Mitterlehner.
    (Wall Street Journal) (Kurier)
