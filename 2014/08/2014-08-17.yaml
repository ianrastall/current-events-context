Date: '2014-08-17'
Source_URI: Portal:Current events/2014 August 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bombing at a UN patrol base in Mali results in the deaths of 2 UN peacekeepers
    and the injury of at least 7 others. (BBC) (CNN)
  Islamist insurgency in Nigeria:
  - Chadian troops rescue 85 hostages from Boko Haram who had been kidnapped in Nigeria
    and taken over the border into Chad. (CNN)
  Iraqi insurgency (2011–present):
  - Kurdish forces, supported by U.S. airstrikes, retake control of the Mosul Dam
    after its capture by IS militants. (BBC)
  Disasters and accidents:
  - A tourist boat sinks near the Indonesian island of Sumbawa, with at least 10 foreign
    tourists and 5 Indonesian crew members missing. (BBC)
  2014 West Africa Ebola virus outbreak:
  - Protesters loot an Ebola quarantine centre in the Liberian capital of Monrovia,
    resulting in the escape of 17 patients and the theft of blood-stained bedding
    and medical equipment. (BBC)
  Death of Michael Brown:
  - A private autopsy shows that Michael Brown was shot six times as violent protests
    continue in Ferguson, Missouri. (NBC News)
  Sports:
  - Rwandan international footballer Daddy Birori is found to be a Congolese player
    using a fraudulent passport. Rwanda is disqualified from the 2015 Africa Cup of
    Nations qualification competition as a result. (CAF)
  - Sri Lankan cricketer Mahela Jayawardene plays his final test innings for Sri Lanka,
    scoring 54. Upon retirement, he has a total of 11814 test runs, and is 6th on
    the all time run-scorer's list. (BBC)
