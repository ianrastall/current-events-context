Date: '2014-08-02'
Source_URI: Portal:Current events/2014 August 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Israel–Gaza conflict
  '2014 pro-Russian unrest in Ukraine: War in Donbass':
  - Ukrainian forces retake control of the towns of Krasnohorivka and Staromykhailivka,
    outside the pro-Russian rebels' stronghold of Donetsk. (Reuters via New York Times)
  Nagorno-Karabakh conflict, 2014 Armenian–Azerbaijani line of contact clashes:
  - Five more Azeri troops are killed in overnight fighting with ethnic Armenians
    in Nagorno-Karabakh. The casualties bring the death toll to at least 13 in a flare-up
    of violence over the last few days around Nagorno-Karabakh. Russia has said that
    any further escalation is unacceptable. (Reuters)
  - Israel Defense Forces declare that the Israeli soldier previously believed to
    have been captured by Hamas fighters in Rafah had in fact been killed in battle
    that day and his body taken. (CBC)
  Disasters and accidents:
  - 2014 Kunshan explosion
  - At least 68 people were killed and more than 180 injured in an early morning explosion
    at a factory near Shanghai that makes automobile parts for General Motors. The
    factory produces aluminum alloy tire rims. (LA Times)
  - Landslides in Sun Kosi river of Nepal
  - At least eight people are killed and hundreds are missing after massive landslides
    and flash floods. (Ekantipur)
