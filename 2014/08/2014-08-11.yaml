Date: '2014-08-11'
Source_URI: Portal:Current events/2014 August 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Israel–Gaza conflict
  - A 72-hour ceasefire between Israel and Hamas begins, and talks aimed at finding
    a long-term solution to the conflict commence in Cairo. (Haaretz) (BBC)
  - Iraqi insurgency (2011–present)
  - Iraq's embattled Prime Minister Nouri al-Maliki says that he will file a legal
    complaint against President Fuad Masum for opposing Maliki's reappointment. (AP)
  War in Donbass:
  - Five artillery shells fired by Ukrainian government forces hit a high-security
    prison in outskirts of Donetsk, sparking a riot in which 106 inmates escape; the
    shelling also resulted in the death of one prisoner and the injury of five other
    prisoners and two guards. (BBC)
  - The State Penitentiary Service of Ukraine issues a statement confirming the shelling,
    and also states that 34 of the 106 escaped inmates were returned to the prison.
    (BBC) (State Penitentiary Service of Ukraine)
  Arts and culture:
  - Oscar-winning American comedic actor Robin Williams is found dead at age 63 by
    asphyxiation. (MSN) (CNN) (New York Times)
