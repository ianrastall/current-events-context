Date: '2014-08-12'
Source_URI: Portal:Current events/2014 August 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Israel-Gaza Conflict
  War in Donbass:
  - Ukrainian government forces recapture control of the city of Vuhlehirsk, Donetsk
    Oblast, from pro-Russian insurgents. (Kyiv Post)
  - The Foreign Press Association issues a statement condemning Hamas for intimidation
    and censorship and not allowing an objective reporting of events. (YNet)
  Business and economy:
  - The Natural Development and Reform Commission, an economic planning agency of
    the People's Republic of China, announces an increase in the price of natural
    gas sold to non-residential buyers. (Dow Jones)
  Disasters:
  - A shallow 5.1 magnitude earthquake near Quito's capital region kills four with
    another three missing in a landslide. (AAP via News Limited)
  Health:
  - 2014 West Africa Ebola virus outbreak
  - The death toll from the Ebola virus outbreak passes 1,000. (Reuters via Hindustan
    Times)
  - A Spanish priest dies of the virus in Spain despite being treated with ZMapp,
    an experimental treatment. (CNN)
  Law and crime:
  - Former Philippine Army general Jovito Palparan, known as "The Butcher" for his
    involvement in the disappearance of Sherlyn Cadapan and Karen Empeno, is arrested
    in Manila. (The New York Times)
  Science:
  - Artur Avila, Manjul Bhargava, Martin Hairer, and Maryam Mirzakhani are awarded
    Fields Medals. Mirzakhani became the first female and the first Iranian Fields
    medalist. Fields Medals 2014 (IMU) Nature New Scientist
  Sports:
  - The sale of the Los Angeles Clippers NBA team to ex-CEO of Microsoft Steve Ballmer
    has been completed. (Huffington Post)
