Date: '2014-08-10'
Source_URI: Portal:Current events/2014 August 10
Intelligence_Payload:
  Conflicts and attacks:
  - 2014 Gaza War
  - Israel and Palestinian factions agree to a fresh 72-hour ceasefire, brokered by
    Egypt, which is due to begin at 21:00 GMT. (BBC) (Reuters)
  2014 Iraq conflict:
  - The President of Iraqi Kurdistan, Massoud Barzani, appeals for international military
    aid to help defeat Islamist militants. (BBC)
  - The US launches a fourth round of air strikes targeting Islamic State fighters
    near Erbil, and Kurdish forces regain control of two towns in Nineveh province
    after heavy fighting. (BBC) (New York Times)
  Disasters and accidents:
  - Typhoon Halong makes landfall on Shikoku in Japan with warnings of the potential
    of flooding and landslides with at least 39 people killed and nine injured. (AFP
    via SBS) (AP via Townhall)
  - Iran's IRNA reports that a plane with 40 passengers has crashed at Tehran's Mehrabad
    Airport. (Agencies via Sydney Morning Herald)
  Law and crime:
  - 'Michael Brown incident in Ferguson, Missouri: Protests about police shooting
    a teenager on Saturday in the St. Louis suburb of Ferguson turn ugly with looting
    and vandalism. (CNN)'
  Politics and elections:
  - Voters in Turkey go to the polls for the first round of voting in a presidential
    election with current Prime Minister Recep Tayyip Erdoğan poised for a first round
    victory. (BBC), (Sydney Morning Herald)
  Sports:
  - In golf, world number one Rory McIlroy of Northern Ireland wins the PGA Championship.
    It is his second consecutive major championship win, following The Open Championship,
    his second PGA Championship win, and fourth major overall. (AP via ESPN), (AAP
    via Sydney Morning Herald)
  - In motorsports, American NASCAR driver Tony Stewart withdraws from the race in
    Watkins Glen International, New York, following an incident on Saturday night
    where he struck and killed Kevin Ward Jr. in a dirt track race on Saturday night.
    (ABC News America)
