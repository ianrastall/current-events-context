Date: '2014-08-18'
Source_URI: Portal:Current events/2014 August 18
Intelligence_Payload:
  War in Donbass:
  - Ukrainian forces say they recapture control of Mala Ivanivka and Andrianivka from
    pro-Russian insurgents, effectively isolating the rebel controlled city of Horlivka.
    (Reuters)
  2014 Israel–Gaza conflict:
  - Israeli Defence Forces destroy the homes of the three suspected murderers of the
    kidnapped teenagers on the West Bank. (Jerusalem Post)
  Disasters:
  - At least 160 people are reported dead in floods and landslides following days
    of heavy rain in northern India and Nepal. (BBC)
  Law and crime:
  - Wikileaks founder Julian Assange, who is wanted for questioning in Sweden, says
    that he will leave his refuge in the Ecuadorean embassy in London "soon". (The
    Guardian)
  - Jackie Chan's son Jaycee and Taiwan star Kai Ko are arrested and detained in Beijing
    over drug-related charges. (The Straits Times) (New York Times)
  Death of Michael Brown:
  - The Governor of the US state of Missouri, Jay Nixon, dispatches the Missouri National
    Guard to the St. Louis suburb of Ferguson following a week of often violent protest
    after the shooting of Michael Brown. (Washington Post)
