Date: '2014-08-25'
Source_URI: Portal:Current events/2014 August 25
Intelligence_Payload:
  War in Donbass:
  - Ukrainian forces say they managed to stop a larger part of a convoy of around
    50 armoured vehicles, which entered Ukraine from the border with Russia near Novoazovsk.
    ('Reuters)
  Islamist insurgency in Nigeria:
  - Boko Haram declares an Islamic state in areas of Nigeria under its control. (BBC)
  Iraqi insurgency (2011–present):
  - A suicide bomber detonates his vest inside of a Shiite mosque in Baghdad, Iraq,
    killing 13 people. (New York Times)
  2014 Libyan conflict:
  - Twice in the last seven days, Egypt and the United Arab Emirates have secretly
    teamed up to launch airstrikes against Islamist-allied militants battling for
    control of Tripoli according to senior American officials. (New York Times)
  66th Primetime Emmy Awards:
  - The 66th Primetime Emmy Awards for American television shows are held at the Nokia
    Theatre in Los Angeles, California. (News Limited)
  - Modern Family wins the Primetime Emmy Award for Outstanding Comedy Series tying
    with Frasier at most wins in that category with five each. (Washington Post)
  - Breaking Bad wins the Primetime Emmy Award for Outstanding Drama Series. (The
    Wrap)
  International relations:
  - Russian Foreign Minister Sergey Lavrov says that Russia now formally recognizes
    Petro Poroshenko as the legitimate President of Ukraine in the hope that Poroshenko
    will "live up to Russia's trust." (Kyiv Post)
  Politics and elections:
  - The Prime Minister of France Manuel Valls presents President François Hollande
    with the resignation of the cabinet, with a new cabinet to be appointed tomorrow.
    (CNN)
  - The President of Ukraine Petro Poroshenko dissolves the Parliament and calls new
    elections for October 26. (CNN)
  - Miro Cerar is appointed Prime minister-designate by the Slovenian National Assembly.
    (Slovenia Times)
