Date: '2014-08-23'
Source_URI: Portal:Current events/2014 August 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Israel-Gaza conflict
  - Four additional Palestinians charged with collaborating with Israel are publicly
    executed outside of the Jabalia refugee camp by Hamas; the killings are denounced
    by the secretary-general of the PA, Tayeb Abdel Rahim, who compared them to ISIS.
    (Times of Israel)
  - The IDF retracts claims that the mortar shell that killed an Israeli child was
    fired near or from a school run by UNRWA, saying that the shell was fired from
    a school used as a shelter run by Hamas. (The Guardian)
  - 2014 Libyan conflict
  - Warplanes of an unknown nationality bomb Islamist forces, killing ten fighters.
    (AFP via Yahoo! News)
  - Tripoli International Airport is captured by Islamist militias following days
    of clashes with nationalist militias. (AFP via Yahoo! News)
  - Islamist insurgency in Nigeria
  Iraqi insurgency (2011–present):
  - The UN calls for action to prevent what it suspects may become a massacre in the
    northern Iraqi town of Amirli, which has been besieged by IS forces since June.
    (BBC)
  - At least 30 people are killed in bombings in Baghdad and Kirkuk. (Sky News)
  - Thirty-five Nigerian police officers are missing following an attack on a training
    school in Borno state. (CNN)
  Business and economics:
  - Goldman Sachs agrees to buy back $3.15 billion in low quality mortgage bonds that
    it dumped on Fannie Mae and Freddie Mac preceding the financial crisis of 2007–08.
    (New York Times)
  Disasters and accidents:
  - Iceland issues a red alert warning for the Bárðarbunga volcano meaning significant
    emissions are likely. (BBC)
  - A oil tanker carrying 5,000 liters of oil explodes while docking at the Lach Bang
    port, Thanh Hoa, Viet Nam killing two people and injuring four others. The fire
    is ignited either in the oil compartments or from the cooking gas cylinder. (Thanh
    Nien News)
  Politics and elections:
  - Afghan presidential election, 2014
  - A recount of votes begins after contenders Abdullah Abdullah and Ashraf Ghani
    reach a deal with the assistance of United States Secretary of State John Kerry.
    (BBC)
  Sports:
  - 2014 Pan Pacific Swimming Championships
  - American swimmer Katie Ledecky breaks her own world record for the 400 metres
    freestyle. (Reuters via Yahoo! News)
