Date: '2014-08-01'
Source_URI: Portal:Current events/2014 August 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Nagorno-Karabakh conflict
  - At least eight Azeri soldiers are killed following clashes with Armenian troops
    on the border and near the disputed Nagorno-Karabakh region. Azerbaijan said Armenia
    had also suffered losses, although it did not provide any details. (Yahoo! News)
  - Operation Protective Edge
  '2014 pro-Russian unrest in Ukraine: War in Donbass':
  - Vladimir Antyufeyev, a Russian citizen and veteran of the pro-Russian separatist
    rebellion in Moldova, takes over as head of Donetsk People's Republic rebellion
    after self-labeled "prime minister" Alexander Borodai reportedly disappeared for
    Russia. (BBC News)
  - A 72-hour ceasefire brokered by the UN and United States which began at 08:00
    falls apart with each side accusing the other party of breaching the ceasefire.
    An Israeli soldier is kidnapped and several killed during a suicide bomber attack
    at 09:30, according to Israeli officials. Ninety-one Palestinians were killed
    in the city of Rafah south of Gaza according to the Gaza Officials since the Israeli
    soldier was captured. The UN and USA strongly condemn the attack. The ceasefire
    was cancelled. (Times of Israel) (Global Post)
  - Two Palestinians are shot dead by Israeli security forces during clashes in the
    West bank. (The New York Times)
  Health:
  - 2014 West Africa Ebola outbreak
  - Liberia and Sierra Leone declare a state of emergency in response to the Ebola
    virus disease by sending in troops and ordering the closure of schools and markets
    and the quarantining of affected communities. (Reuters) (The Guardian)
  Law and crime:
  - Uganda Anti-Homosexuality Act, 2014
  - The Constitutional Court of Uganda rules the Uganda Anti-Homosexuality Act, 2014
    invalid on a technicality. (BBC News) (The Times) (The Guardian)
  - Disgraced Australian former entertainer Rolf Harris has applied for permission
    to appeal against his conviction for indecent assault. Eighty-four-year-old Harris
    was sentenced to 5 years and 9 months in prison in July on 12 counts of indecent
    assault against four girls between 1968 and 1986. (BBC News)
