Date: '2014-01-10'
Source_URI: Portal:Current events/2014 January 10
Intelligence_Payload:
  Arts and culture:
  - Spain invites Sephardic Jews to return after 500 years of exile. (BBC News)
  - François Hollande's photo with actress Julie Gayet is removed from the tabloid
    magazine Closer after an injuction by Gayet's lawyer. (The Daily Mail)
  Attacks and armed conflicts:
  - Central African Republic crisis
  - Amidst pressure for failing to resolve ongoing conflict, President of the Central
    African Republic Michel Djotodia resigns nine months after Séléka toppled François
    Bozizé. Alexandre-Ferdinand Nguendet becomes acting president. (IB Times)
  - A car bombing in Karachi, Pakistan, kills Chaudhry Aslam Khan, a senior police
    investigator known for pursuing Pakistani Taliban militants; two other officers
    with him were also killed. (The Australian)
  - The Kenyan Air Force bombs a suspected militant camp in Garbahaareey, Somalia,
    killing 30 militants. (AP via Fox News)
  Business and economy:
  - Volkswagen's luxury brands Porsche, Audi and Bentley have each posted record sales
    for 2013. (BBC News)
  - Google allows users to communicate with each other on Google Plus even if they
    are not friends. (BBC News)
  - The number of people with their personal information stolen from Target stores
    is up from 40 million to 70 million. (CNN)
  International relations:
  - China imposes a "fishing permit" rule in the South China Sea, much to the chagrin
    of the United States, the Philippines, and Vietnam. (Fox News) (The Guardian)
  Politics and elections:
  - Devyani Khobragade, an Indian diplomat whose arrest sparked an international incident
    involving India and the United States, is indicted for allegedly lying to obtain
    a work visa for her housekeeper, and is asked to leave the United States under
    the rules of diplomatic immunity. (BBC News) (USA Today)
