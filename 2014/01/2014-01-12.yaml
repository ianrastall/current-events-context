Date: '2014-01-12'
Source_URI: Portal:Current events/2014 January 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (2011–2013)
  - A car bombing at a bus station in central Baghdad kills at least nine people.
    (BBC News)
  Syrian Civil War:
  - Syrian State TV claims that a rebel mortar attack kills 19 people in the government-controlled
    Ghouta and Karm al shami areas of the city of Homs. (News Limited)
  Arts and culture:
  - Pope Francis publicly releases the names of the 19 new Cardinals from 12 countries
    he will create in his first Consistory. This will occur during a meeting of the
    Cardinals on February 22. (News.VA Official Vatican Network)
  - 71st Golden Globe Awards
  - The Golden Globe Awards are held in Beverly Hills, California, with 12 Years a
    Slave winning the Golden Globe Award for Best Motion Picture – Drama and American
    Hustle winning the Golden Globe Award for Best Motion Picture – Musical or Comedy.
    (Los Angeles Times)
  Sport:
  - In golf, American Jimmy Walker wins the 2014 Sony Open in Hawaii. (Los Angeles
    Times)
  - In darts, Stephen Bunting and Lisa Ashton win the 2014 BDO World Darts Championship.
    (The Guardian)
