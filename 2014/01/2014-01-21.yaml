Date: '2014-01-21'
Source_URI: Portal:Current events/2014 January 21
Intelligence_Payload:
  Euromaidan:
  - Violent clashes occur for a second day between protesters and police in Kiev,
    Ukraine. (BBC News)
  Syrian Civil War spillover in Lebanon:
  - A bomb detonates at a Hezbollah building in Beirut, Lebanon killing four people
    and wounding 35. (AP via USA Today)
  War in North-West Pakistan:
  - Pakistani military aircraft bomb suspected Taliban hideouts killing 25 militants
    in North Waziristan. (India Today)
  - A bomb rips through a bus full of Shi'ite pilgrims in western Pakistan killing
    at least 22 people. (Reuters)
  Business and economy:
  - For the first time in the history of digital currency, two Las Vegas casinos begin
    to accept Bitcoin. (Forbes)
  Disasters and accidents:
  - A polar vortex bears down on the east coast of the United States cancelling thousands
    of flights and creating dangerously cold conditions. (USA Today) (USA Today²)
  Law and crime:
  - Twenty-six people convicted of terrorism charges are hanged in Iraq. (AP via USA
    Today)
  - A man is killed in a shooting at Purdue University in West Lafayette, Indiana,
    U.S. A suspect is in custody. (CNN)
  - One of the founders of Los Zetas drug cartel, Rogelio González Pizaña, is sentenced
    to 16 years in prison. (La Jornada)
  - Former Virginia governor Bob McDonnell and his wife are indicted on federal corruption
    charges for allegedly receiving various financial benefits from a businessman
    seeking favors from the state government. (Fox News)
  Politics and elections:
  - The Government of Thailand declares 60-day state of emergency in Bangkok and surrounding
    provinces from tomorrow as anti-government protests continue. (BBC News)
  Science and technology:
  - The US National Academy of Sciences found that pollution from China’s manufacturing
    industry drifts across the Pacific Ocean and affects US cities. (ABC Online)
