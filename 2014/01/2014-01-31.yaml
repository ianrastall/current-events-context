Date: '2014-01-31'
Source_URI: Portal:Current events/2014 January 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli-Palestinian Conflict
  - The Israeli Air Force strikes targets in the Gaza Strip in response to ongoing
    rocket fire from the Palestinian territory. (Jerusalem Post)
  - Balochistan conflict
  - A bomb kills three Pakistan Army soldiers and injures four others in the restive
    province of Balochistan. (Al Arabiya)
  - Moro insurgency in the Philippines
  - Fifty-three people die in fighting between the Philippine Army and the Bangsamoro
    Islamic Freedom Fighters on the island of Mindanao with the dead including 52
    rebels and one soldier over the past week. (AFP via Capital FM)
  South Yemen insurgency:
  - Fifteen soldiers are killed and four wounded by suspected al Qaeda militants in
    an attack on an army checkpoint in southeastern Yemen. (Reuters)
  Disasters and accidents:
  - For the first time in its 54-year history the State Water Project announces a
    zero water allocation for the state of California providing no water to urban
    residents or farmers this year amid a record setting drought. (LA Times) (Mercury
    News)
  Law and crime:
  - Murder of Meredith Kercher
  - Raffaele Sollecito is arrested in Italy near the Austrian border after again being
    found guilty of the murder of Meredith Kercher. (BBC News)
  - Amanda Knox tells the American media she refuses to return to Italy to be arrested
    after again being found guilty of the same murder. (CNN)
