Date: '2014-01-25'
Source_URI: Portal:Current events/2014 January 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Civil conflict in the Philippines
  - The Philippines and the Bangsamoro agree to a peace deal that would help end the
    45-year conflict. (Fox News)
  - Iraqi insurgency (post-U.S. withdrawal)
  Post-civil war violence in Libya:
  - Five Egyptian embassy staff are kidnapped in the Libyan capital of Tripoli. (The
    Guardian)
  Post-coup unrest in Egypt:
  - Sixty-four people are killed in anti-government marches. (Al-Ahram) (Reuters)
    (BBC News)
  - Seventeen people are killed in car-bomb and mortar attacks on a Shi'ite Muslim
    village in Iraq. (Reuters)
  Law and crime:
  - A vial containing drops of late Pope John Paul II's blood is stolen from the Church
    of San Pietro della Ienca in Abruzzo, Italy. (The Guardian)
  - A shooting at the Columbia Mall in the U.S. state of Maryland results in three
    people being killed. (BBC News)
  Sports:
  - The United SportsCar Championship debuts as the International Motor Sports Association's
    new premier series in the United States with the 52nd running of the 24 Hours
    of Daytona. (Fox Sports)
  2014 Australian Open:
  - China's Li Na defeats Slovakia's Dominika Cibulková 7-63, 6-0 to win the women's
    final. (Sydney Morning Herald)
  Science and technology:
  - Yutu, China's lunar rover, suffers an unspecified "mechanical control abnormality"
    shortly before going dormant for the two-week-long lunar night. The solar-powered
    vehicle has been on the Moon since 15 December and had survived one lunar night.
    (Xinhua) (abc.net.au)
  - Average peak concentrations of PM2.5 (fine particulate air pollution) are more
    than twice as great in Delhi as in Beijing during the first three weeks of the
    year. (The New York Times)
