Date: '2014-01-06'
Source_URI: Portal:Current events/2014 January 6
Intelligence_Payload:
  War in North-West Pakistan:
  - A bomb detonates in a tribal elder's home in Khyber Agency, Pakistan, killing
    10 people and injuring another nine. (Global Post)
  War in Afghanistan (2001–2021):
  - A suicide car bomber detonates at a police checkpoint in Ghazni Province, Afghanistan,
    killing three police officers. (AP via Washington Post)
  Islamist insurgency in Nigeria:
  - Gunmen kill 30 people in the central Nigerian village of Shonong in the Riyom
    local government area. (Reuters)
  Disasters and accidents:
  - 2014 North American cold wave
  - Record low temperatures are predicted for parts of the United States with wind
    chill temperatures expected to drop as low as . (Los Angeles Times) (CBS News)
    (Washington Post)
  International relations:
  - The Czech Foreign Minister Jan Kohout uses strong words to condemn the discovery
    of illegal weapons at the Palestinian embassy complex where a possible booby-trapped
    safe killed the ambassador Jamal al-Jamal on January 1, saying it is "a serious
    violation of the Vienna Convention on Diplomatic Relations." (Miami Herald)
  Law and crime:
  - American-born Colleen LaRose, who calls herself Jihad Jane, is sentenced to 10
    years in prison for a failed al Qaeda-linked plot to kill Swedish artist Lars
    Vilks who had depicted the head of the Muslim Prophet Mohammad on a dog. (BBC
    News)
  - Venezuelan beauty queen Mónica Spear and her British ex-husband are murdered during
    a carjacking in Caracas. (Al Jazeera)
  Politics:
  - The US Senate confirms Janet Yellen as the new chair of the Federal Reserve; Yellen
    will be the first woman to hold this post. (Washington Post)
  Sport:
  - In college football, the Florida State Seminoles defeat the Auburn Tigers to win
    the 2014 BCS National Championship Game. (WFAA)
  - In golf, Zach Johnson wins the 2014 Hyundai Tournament of Champions. (ESPN)
