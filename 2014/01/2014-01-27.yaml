Date: '2014-01-27'
Source_URI: Portal:Current events/2014 January 27
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - Sixty-one people are feared to have been killed following gun attacks in the states
    of Adamawa and Borno. (Xinhua)
  Law and crime:
  - The U.S. Justice Department and the Director of National Intelligence reach a
    preliminary joint agreement, likely resolving a lawsuit with the major American
    Internet provider companies (Google, Yahoo, Facebook, Microsoft, and LinkedIn),
    about the information the companies can release to customers regarding requests
    by the intelligence agencies for information. (NBC)
  - A New York federal district court seeks the extradition of Los Zetas drug cartel
    leader Miguel Treviño Morales, arrested in July 2013. (El Siglo de Torreón)
  Politics and elections:
  - The governing body of the Egyptian military approves Field Marshal Abdel Fattah
    el-Sisi, who led the coup d'état that overthrew President Mohamed Morsi in July
    2013, to run for the presidency in the upcoming election. (BBC News)
