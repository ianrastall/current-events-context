Date: '2014-01-03'
Source_URI: Portal:Current events/2014 January 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - An 85-year-old man dies during Israeli suppression of a violent riot at Kufr Qaddoum
    near Nablus; he is the first Palestinian casualty from conflict with Israel in
    2014. (The Guardian)
  Post-coup unrest in Egypt:
  - Thirteen people are killed in clashes between Muslim Brotherhood supporters, police
    and opponents. (Reuters) (Sky News)
  South Sudanese conflict (2013–present):
  - The United States evacuates additional diplomatic personnel at its embassy in
    Juba due to the deteriorating security situation. (The Hill)
  Disasters and accidents:
  - A winter storm hits the Northeastern United States, bringing snow to the region,
    affecting travel, and killing thirteen people. (NBC News)
  - A deep area of low pressure named Anne brings strong winds, high tides and coastal
    flooding to parts of Western England, Wales, Scotland, France and Ireland. (BBC
    News)
  Health:
  - The Philippine Department of Health declares a measles outbreak in Metro Manila.
    (Solar News)
  International relations:
  - Paraguay announces withdrawal of its recognition of the Sahrawi Republic. (The
    Maghreb Daily)
  Law and crime:
  - Authorities confirm the arrest of El Chino Ántrax, a high-ranking Sinaloa Cartel
    leader, in the Netherlands. (The San Diego Union-Tribune)
  - The people of Humboldt County, California, located on California's North Coast,
    are grieving the loss of Father Eric Freed. He was pastor of St. Bernard's Catholic
    Parish in Eureka who was murdered early on New Years’ Day. (Catholic News Agency)
