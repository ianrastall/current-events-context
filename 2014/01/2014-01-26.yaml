Date: '2014-01-26'
Source_URI: Portal:Current events/2014 January 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgency
  - A suicide bomber attacks an army bus in the Afghan capital, Kabul, killing two
    soldiers and two civilians. (BBC News)
  Somali Civil War:
  - The U.S. military carries out a missile strike in southern Somalia, hitting a
    vehicle and killing Sahal Iskudhuq, a member of the Al Shabaab terrorist group,
    along with his driver. (Fox News)
  Arts and culture:
  - 56th Annual Grammy Awards
  - Macklemore & Ryan Lewis wins Best New Artist, Lorde wins Song of the Year for
    "Royals", and Daft Punk wins Record of the Year for "Get Lucky" and Album of the
    Year for Random Access Memories. (BBC News)
  - Paul McCartney and Ringo Starr perform together in memory of the other late Beatles
    members. (Rolling Stone)
  Disasters and accidents:
  - A tourist boat capsizes off of the Andaman and Nicobar Islands, leaving 21 people
    dead and 11 missing. (BBC News)
  Sports:
  - 2014 Australian Open
  - Stanislas Wawrinka defeats Rafael Nadal 6-3, 6-2, 3-6, 6-3 to win the men's final.
    (BBC Sport)
  - 2014 24 Hours of Daytona
  - João Barbosa, Christian Fittipaldi, and Sébastien Bourdais of Action Express Racing
    wins the inaugural United SportsCar Championship event, marred by a crash that
    hospitalized drivers Memo Gidley and Matteo Malucelli three hours into the race.
    (NASCAR) (Charlotte Observer)
