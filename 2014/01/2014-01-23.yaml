Date: '2014-01-23'
Source_URI: Portal:Current events/2014 January 23
Intelligence_Payload:
  Business and economy:
  - A prominent currency trading platform launched by and for banks, ParFX, opens
    its doors to hedge fund participation. (Reuters)
  Disasters and accidents:
  - A fire breaks out in a L'Isle Verte, Quebec elderly home, killing five people
    and 30 are still missing. (The Toronto Sun)
  Law and crime:
  - Pop star Justin Bieber is arrested for drunken driving and resisting arrest. (CNN)
  - Former Philippine First Lady Imelda Marcos visits the detained ex-President Gloria
    Macapagal-Arroyo and criticizes the current President Benigno Aquino III as "cruel,
    unjust". (Inquirer)
  - Swedish sex club owner Mille Markovic is shot dead in Stockholm. (Aftonbladet)(Daily
    Mail)
  - Supreme Court of Russia releases Platon Lebedev, a business partner of Russian
    magnate and former head of Yukos Mikhail Khodorkovsky, after he spent more than
    10 years in jail. (BBC News)
  Science:
  - A bright type-Ia supernova SN 2014J is discovered in the starburst galaxy Messier
    82. (AAVSO)
