Date: '2014-01-22'
Source_URI: Portal:Current events/2014 January 22
Intelligence_Payload:
  2013–14 Thai political crisis:
  - Kwanchai Praipana, a leader of the pro-government United Front for Democracy Against
    Dictatorship, is shot in the city of Udon Thani as protesters gather in Bangkok
    despite the declaration of a state of emergency. (BBC News)
  Euromaidan:
  - Ukrainian security forces start dismantling protest camps in Kiev with two protesters
    feared dead after clashes with police. (AP via Montreal Gazette) (Reuters)
  Arts and culture:
  - A blue diamond is found in Cullinan, Gauteng, South Africa. (BBC News)
  Business and economy:
  - Mohamed El-Erian, CEO and co-CIO of bond fund manager PIMCO, leaves the two posts
    without offering a reason. (Reuters)
  Law and crime:
  - A Delhi magistrate orders an inquiry into the death of Sunanda Pushkar, the wife
    of Indian cabinet minister Shashi Tharoor. (BBC News)
  Science and technology:
  - New data published independently by NASA and the National Oceanic and Atmospheric
    Administration show that the global warming trend is continuing. (ABC News)
  - Scientists from the European Space Agency and other institutions detect the presence
    of water vapour on Ceres. (Nature)
