Date: '2014-01-04'
Source_URI: Portal:Current events/2014 January 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Majid al-Majid, the chief of the Abdullah Azzam Brigades militant group that was
    accused of being responsible for a double suicide bombing in front of the Iranian
    embassy in Beirut, Lebanon, in November 2013, dies in custody in a military hospital
    in Beirut. (BBC News)
  Anbar conflict:
  - The Iraqi government loses control of Fallujah to Islamist militants. (Al Jazeera)
  Disasters and accidents:
  - A three-story building under construction collapses in the southern Indian state
    of Goa, killing at least 14 people. (Reuters via Voice of America)
