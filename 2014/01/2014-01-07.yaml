Date: '2014-01-07'
Source_URI: Portal:Current events/2014 January 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian opposition–Islamic State of Iraq and the Levant conflict
  - Both belligerents execute dozens of their prisoners of war. (BBC News)
  Disasters and accidents:
  - Four people are killed in a US Air Force HH-60 Pave Hawk crash on England's Norfolk
    coast. (The Independent) (BBC News) (The Daily Telegraph)
  Law and crime:
  - Infanta Cristina, the youngest daughter of the King of Spain, Juan Carlos I, is
    charged by a magistrate with tax evasion and money laundering. (Euronews)
  - Five members of the Citizens' Commission to Investigate the FBI, who in 1971 stole
    documents from the US Federal Bureau of Investigation and gave them to journalists,
    come forth. The leak exposed COINTELPRO, a program of surveillance and blackmail
    against American leftists including Martin Luther King Jr. (New York Times) (The
    Guardian) (New York Magazine)
  Sports:
  - United States gold winning Olympic athlete Lindsey Vonn announces she is pulling
    out of her run for the 2014 Winter Olympics in Sochi due to a re-injured right
    knee. (Washington Post) (ESPN)
