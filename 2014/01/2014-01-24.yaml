Date: '2014-01-24'
Source_URI: Portal:Current events/2014 January 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Heavy gunfire erupts in Central African Republic's capital Bangui. (ABC News)
  Post-coup unrest in Egypt:
  - Three bombs explode in the Egyptian capital, Cairo, killing about five people.
    (BBC News)
  Law and crime:
  - Prominent conservative political pundit Dinesh D'Souza pleads "not guilty" to
    charges that he violated U.S. election financing laws. (Reuters)
  Euromaidan:
  - Unrest in the Ukraine spreads to the cities of Khmelnitsky, Zhytomyr, Cherkasy,
    Lviv (Lvov), Ternopil, Ivano-Frankivsk, Lutsk, Rivne and Chernivtsi. In Rivne
    and Lviv, the offices of the governors were broken into; the Lviv regional governor
    was forced to sign a letter of resignation. (The New York Times) (National Post)
