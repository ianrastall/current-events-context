Date: '2014-01-14'
Source_URI: Portal:Current events/2014 January 14
Intelligence_Payload:
  Armed attacks and conflicts:
  - Mexican Drug War
  - Communitary forces take several towns in Mexican state of Michoacán trying to
    expel the Knights Templar Cartel forces, and prompting the intervention of Mexican
    Army against them. (CNN)
  - Syrian Civil War
  - Forty-six Palestinians and Syrian residents in the Yarmouk Camp have died of starvation
    and lack of medical care, since October, from a Syrian army enforced blockade.
    (The Guardian)
  Law and crime:
  - Russia expels American journalist David Satter from the country in the first such
    case since 1982. (The Guardian)
  - Two students are shot and seriously injured at Berrendo Middle School in Roswell,
    New Mexico, U.S. A 12-year-old male suspect has been apprehended. (Reuters) (CNN)
  Politics and elections:
  - Egyptian constitutional referendum, 2014
  - Voters in Egypt go to the polls for the first day of voting on a new constitution.
  - Former Prime Minister of Israel, Ariel Sharon, is buried on his ranch in southern
    Israel following a state funeral at the Knesset attended by foreign dignitaries
    and Israelis. (BBC News) (The Times of Israel)
