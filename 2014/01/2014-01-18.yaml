Date: '2014-01-18'
Source_URI: Portal:Current events/2014 January 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - An Iranian diplomat is killed in Yemen's capital Sana'a when he resisted gunmen
    who were trying to kidnap him near the ambassador's residence. (Reuters)
  Insurgency in the North Caucasus:
  - Seven suspected militants are killed by Russian security forces in a shootout
    near Makhachkala in Dagestan. (Reuters)
  Arts and culture:
  - 20th Screen Actors Guild Awards
  - The Screen Actors Guild Awards are held with Matthew McConaughey winning Screen
    Actors Guild Award for Outstanding Performance by a Male Actor in a Leading Role
    for his role in Dallas Buyers Club and Cate Blanchett winning Screen Actors Guild
    Award for Outstanding Performance by a Female Actor in a Leading Role for her
    role in Blue Jasmine. (Los Angeles Times)
  - Sixteen-year-old Lewis Clarke of Bristol, United Kingdom, sets a new world record
    after becoming the youngest person to trek to the South Pole. (BBC News)
  Law and order:
  - A warrant is issued for the arrest of Belden Namah, the Leader of the Opposition
    in Papua New Guinea over claims he threatened the police commissioner in a letter.
    (News Limited)
  - An autopsy finds Sunanda Pushkar, the wife of Indian cabinet minister Shashi Tharoor
    found dead in her hotel room on Friday, had died a "sudden and unnatural death".
    (BBC News)
  Politics and elections:
  - Egyptian constitutional referendum, 2014
  - Egypt's election council claims that 98.1% of voters supported the new military-backed
    constitution with a 38.6% turnout. (AP) (Ahram Online)
