Date: '2014-01-19'
Source_URI: Portal:Current events/2014 January 19
Intelligence_Payload:
  War in North-West Pakistan:
  - A bomb attack on an army convoy in the city of Bannu kills at least 20 soldiers.
    (BBC News)
  2013–14 Thai political crisis:
  - A blast at an anti-government protest at Victory Monument in Bangkok injures 28
    protesters, seven of them seriously. (Melbourne Age)
  Gaza–Israel conflict:
  - The Israeli Air Force carries out an air strike seriously injuring one Palestinian
    Islamic Jihad operative in the Gaza Strip and wounding two others. (Jewish Telegraphic
    Agency)
  Euromaidan:
  - New violent clashes erupt in Ukraine as a reaction to new strict anti-protest
    laws. (BBC News)
  Disasters:
  - Residents of the historic Norwegian village of Lærdalsøyri are evacuated due to
    a fire that has destroyed at least 10 homes. (BBC News)
  Politics and elections:
  - Voters in Hungary will go to the polls for a parliamentary election on April 6.
    (AFP via GlobalPost)
  - Sheikh Mohammed Bin Rashid Al Maktoum, Prime Minister and Vice President of the
    United Arab Emirates announces mandatory military service for males aged 18-30.
    (ArabianBusiness.com)
  Sports:
  - In the American National Football League, the Denver Broncos and Seattle Seahawks
    win their respective playoff matches and will meet in Super Bowl XLVIII on February
    2. (Q13 Fox) (The Times of Northwest Indiana)
  - Former world number one and 2008 French Open champion Ana Ivanovic defeats reigning
    world number one, five-time Australian Open champion and tournament favourite
    Serena Williams in the fourth round of the 2014 Australian Open. (ABC News Australia)
