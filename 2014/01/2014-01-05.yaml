Date: '2014-01-05'
Source_URI: Portal:Current events/2014 January 5
Intelligence_Payload:
  Syrian Civil War spillover in Lebanon:
  - A sniper kills a man and six people are wounded in clashes between districts in
    Tripoli, Lebanon, that support rival sides in neighboring Syria's civil war. (Reuters)
  Politics and elections:
  - Voters in Bangladesh go to the polls for a general election. (BBC News)
  Science and technology:
  - A launch of the communication satellite GSAT-14 aboard the GSLV MK.II D5 marks
    the first successful flight of an Indian cryogenic engine. (The Hindu)
  Sports:
  - In ice hockey, the 2014 World Junior Ice Hockey Championships concludes with Finland
    defeating host team Sweden in the final 3–2, winning the tournament for the first
    time since 1998. (CBC)
  - In cricket, the 2013–14 Ashes series concludes with Australia whitewashing England
    5-0 to regain The Ashes after 7 years. (ABC.net)
  Disasters and accidents:
  - A small jet carrying three Mexican men from Toluca crashes while trying to land
    at the Aspen–Pitkin County Airport in the U.S. state of Colorado, killing the
    co-pilot, seriously injuring the pilot and slightly injuring the passenger. (CBC)
