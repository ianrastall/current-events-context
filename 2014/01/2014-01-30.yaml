Date: '2014-01-30'
Source_URI: Portal:Current events/2014 January 30
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - Six suicide bombers take over the Iraqi Ministry of Transportation in Baghdad
    and kill at least 24 hostages before security forces take control. (Reuters via
    NDTV)
  Business and economy:
  - Exxon Mobil posts lower than expected profit figures largely due to the fall in
    its oil and natural gas production. (Reuters)
  - The Philippine economy grows by about 7.2% in 2013 despite being affected by Typhoon
    Haiyan. (BBC News) (Financial Times)
  - Chinese technology company Lenovo buys Motorola Mobility from Google for $3 billion
    to create its own mobile device unit. (BBC News)
  Disasters and accidents:
  - A man whose boat was adrift for sixteen months is rescued at the Marshall Islands.
    The journey began with a companion as part of a venture from Mexico for El Salvador
    in September 2012. (Fox News)
  2013–14 Australian region cyclone season:
  - Tropical Cyclone Dylan forms off the North Queensland coast and is expected to
    make landfall between Lucinda and Proserpine. (ABC Australia via Weatherzone)
  International relations:
  - The Philippines refuses to apologize to Hong Kong for the Manila hostage crisis
    a day after visa-free access was revoked by the territory. (Bloomberg Businessweek)
  Law and crime:
  - 182 inmates escape from a provincial jail in Leyte, Philippines, which was previously
    affected by Typhoon Haiyan, citing squalid conditions and a lack of food. 148
    are recaptured hours later. (Fox News)
  - U.S. Attorney General Eric Holder announces that federal prosecutors will seek
    the death penalty against Boston Marathon bombing suspect Dzhokhar Tsarnaev. (CNN)
  - American Amanda Knox is found guilty of the murder of Meredith Kercher together
    with Knox's former boyfriend Raffaele Sollecito. (News Limited)
  Politics and elections:
  - The Danish coalition government breaks up as widespread turmoil over the partial
    sale of the state-owned DONG Energy to Goldman Sachs leads to the withdrawal of
    the Socialist People's Party. (Copenhagen Post)
  - Mohammad-Ali Najafi resigns as Head of Iran's Cultural Heritage, Handcrafts and
    Tourism Organization, marking the first change in President Rouhani's cabinet.
    (Tehran Times) (Trend)
  - In the Netherlands, State Secretary of Finance Frans Weekers resigns after opposition
    parties give fierce criticism about his performance. (NOS)
  2013–14 Thai political crisis:
  - The Thai Army announces plans to deploy more troops in the streets of Bangkok
    ahead of Sunday's general election. (Reuters)
  Science and technology:
  - Scientists warn that penguin populations may be declining due to extreme environmental
    conditions related to climate change. (The Guardian)
