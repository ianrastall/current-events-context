Date: '2014-01-11'
Source_URI: Portal:Current events/2014 January 11
Intelligence_Payload:
  Attacks and conflicts:
  - Aitizaz Hassan, a Pakistani boy who died after trying to stop a suicide bomber,
    is nominated for an award by Nawaz Sharif. (CNN)
  - Syrian Civil War
  - Five hundred people are killed in inter-factional fighting between an alliance
    of secular rebels and moderate Islamists against radical Islamists. (BBC News)
  - Central African Republic crisis
  - African migrants are to be evacuated as violence continues in the country. (CNN)
  - 2013 Thai political crisis
  - Seven people are injured after protesters are attacked by gunfire. (Voice of America)
  - Euromaidan
  - Yuri Lutsenko, one of the leaders of the protests, is injured during clashes with
    the police. (Los Angeles Times)
  - War in Afghanistan
  - A four-year-old Afghan boy is killed by U.S. troops. (Business Standard)
  - Somali Civil War
  - The United States is to deploy military advisers more than 20 years after the
    Black Hawk down incident. (Sydney Morning Herald)
  Business and economy:
  - Total S.A. is to invest in shale gas exploration in the United Kingdom. (The Guardian)
  Disasters and accidents:
  - A district in the ancient town of Dukezong in Shangri-La County, Yunnan, China,
    burns down. (ABC News)
  - A chemical leak in West Virginia morphs into a crisis after the contamination
    of a portion of the state's water supply. (CNN)
  - Cyclone Ian strikes Tonga with damage to buildings reported. (Fox News)
  Law and crime:
  - United States Attorney General Eric Holder says that same-sex marriages conducted
    in Utah are recognized as legal under federal law. The state of Utah however,
    does not recognize the marriages under state laws. (The Washington Post)
  - The United States Air Force expands an illegal drugs investigation involving 10
    officers in six military bases in the United States and the United Kingdom. (Reuters)
  - A ten-year-old servant girl is tortured to death in Punjab raising concerns about
    human rights in Pakistan. (BBC News)
  - About 110,000 people march peacefully through Bilbao, demanding Basque independence
    and freedom for more than 600 ETA prisoners. (BBC News) (Reuters)
  Politics and elections:
  - Former Israeli Prime Minister Ariel Sharon dies at the age of 85 after spending
    eight years in a coma following a stroke. (BBC News) (ABC NEWS) (International
    Business Times)
  - India says that it has "no stand-off" with the United States even after the Devyani
    Khobragade incident. (BBC News)
  - French President François Hollande is under pressure after photos of him and actress
    Julie Gayet appear in a magazine. (BBC News)
  - Aaron Swartz's Demand Progress and Rootstrikers began a march for The New Hampshire
    Rebellion. It began in Dixville Notch and ended in Concord New Hampshire on January
    24, 2014, in honor of Aaron and Doris Haddock attempting to influence the 2016
    Presidential election as described in Lawrence Lessig's article which appeared
    in a magazine. (The Atlantic)
  Science and technology:
  - X-ray astronomers find evidence of a black hole at the center of a dwarf galaxy
    gobbling up a star; this is the first such event ever filmed. (Astronomy)
  Sport:
  - British footballer Ian Redford is found dead in the woods of Irvine, North Ayrshire,
    Scotland. (The Independent)
  - 2014 Winter Olympics
  - The United States State Department issues a warning to those going to the host
    city of Sochi, informing that local medical facilities are "untested" and that
    there are threats of terrorist activity. (The Hollywood Reporter)
