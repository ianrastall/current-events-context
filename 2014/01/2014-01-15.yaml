Date: '2014-01-15'
Source_URI: Portal:Current events/2014 January 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (post-U.S. withdrawal)
  - At least 26 people are killed in a series of attacks in central Iraq. (BBC News)
  Internal conflict in Burma:
  - A Thailand-based women's rights group accuses Myanmar of using rape as a weapon
    of war. (Reuters)
  Syrian Civil War:
  - Western and Arab countries pledge to give an additional US$1.4 billion for United
    Nations aid. (Reuters)
  Arts and culture:
  - The United States returns 11th-12th century sculptures stolen by art thieves from
    temples in India. (BBC News)
  Business and economy:
  - The World Bank says that the economies affected by the Great Recession are starting
    to recover. (The Guardian)
  Asiana Airlines Flight 214:
  - A graphic video showing the death of a 16-year-old Chinese girl is released after
    firefighters ran her over in the wake of the plane crash. (TIME)
  Law and crime:
  - An anti-LGBT rights law that makes gay marriage punishable by up to 14 years in
    prison is passed in Nigeria. (Voice of America)
  - Italy says that it will use the Italian Army against the mafia who are accused
    of dumping toxic waste in Naples. (BBC News)
  - A Danish tourist is gang-raped in Delhi, India after she gets lost from her hotel.
    (The Guardian)
  - The National Security Agency uses radio waves to spy on computers. (The New York
    Times)
  Egyptian constitutional referendum, 2014:
  - Egyptians vote on a constitution that will ban political parties based on religion,
    give women equal rights and protect the status of minority Coptic Christians.
    (Fox News)
  2013–14 Thai political crisis:
  - Thai protesters continue to shutdown Bangkok in order to force Yingluck to step
    down. (Australia Network News)
  Science and technology:
  - Australia warns of bushfires due to a 40C (104F) heatwave affecting the country.
    (BBC News)
