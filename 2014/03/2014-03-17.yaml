Date: '2014-03-17'
Source_URI: Portal:Current events/2014 March 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - United States Navy SEALs take over a disavowed oil tanker in international waters
    previously seized by Libyan rebels. (AP via New Zealand Herald)
  International relations:
  - President of the United States Barack Obama announces that the United States will
    sanction Russian officials that contributed to the current Crimean crisis. (Voice
    of America)
  Natural disasters:
  - A 6.7 magnitude earthquake strikes off the coast of Chile with officials issuing
    precautionary tsunami warnings for the nation's coast. (CNN)
  Politics and elections:
  - 2014 Crimean status referendum
  - The Republic of Crimea is declared. (AP)
  Science and technology:
  - Evidence of cosmic inflation from the BICEP2 experiment is announced by the Harvard–Smithsonian
    Center for Astrophysics. (BBC News) (Space)
