Date: '2014-03-09'
Source_URI: Portal:Current events/2014 March 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide car bomber kills 42 people at a police checkpoint in Hillah, Iraq. (Voice
    of America)
  - Mexican authorities confirm that Nazario Moreno González, the top leader of the
    Knights Templar Cartel, was killed in the state of Michoacán. (CNN)
  Disasters and accidents:
  - At least 42 migrants from the Horn of Africa drown when their boat overturns off
    the coast of Shabwah Governorate, Yemen. (Al Jazeera)
  - A Boeing 787 controlled by Japan Airlines makes an emergency landing at Honolulu
    Airport in Honolulu, Hawaii, after oil pressure in their right engine dropped.
    (AP via CBS)
  Malaysia Airlines Flight 370:
  - The Ministry of Transport of Vietnam orders local airports and airlines to tighten
    their security, after the Malaysian plane vanished, on the first level of a three-level
    security alert system. (Thanh Nien News)
  Religion:
  - Swedish charismatic pastor Ulf Ekman, who established the Livets Ord ministry,
    breaks with his megachurch and converts to Roman Catholicism. (Charisma News)
  Politics and elections:
  - Vice President of Afghanistan Mohammed Fahim dies at the age of 57 due to natural
    causes. (Reuters)
  - Colombian parliamentary election, 2014
  - President Juan Manuel Santos' coalition wins a reduced majority, while former
    President Alvaro Uribe is elected to the Senate. (Reuters)
  Sports:
  - In U.S. college basketball, Wichita State defeats Indiana State 83–69 to win the
    Missouri Valley Conference Tournament, becoming the first Division I men's team
    to enter the NCAA Tournament unbeaten since UNLV in 1991. (Sports Illustrated)
