Date: '2014-03-28'
Source_URI: Portal:Current events/2014 March 28
Intelligence_Payload:
  Business and economy:
  - Russia announces that it will raise the price Ukraine pays for Russian natural
    gas by 80%. (Reuters)
  - General Motors recalls 172,000 Chevrolet Cruzes, citing faulty front axle shafts.
    (CNN)
  - Also recalled are Chevrolet Cobalts, Chevrolet HHRs, Saturn Ions, Saturn Skys,
    Pontiac G5s, and Pontiac Solstices from 2003 to 2011 due to faulty ignition switches.
    (Reuters)
  Disasters and accidents:
  - An Indian Air Force Lockheed Martin C-130J Super Hercules plane crashes near Gwalior,
    Madhya Pradesh, killing all five onboard. (NDTV)
  International relations:
  - South Korea sends the remains of 437 Chinese soldiers that fought during the Korean
    War back to be buried in China as a gesture of friendship and healing between
    the two countries. (Yonhap News Agency)
  - South Korea captures a North Korean fishing boat that had crossed into their waters
    amid rising tensions between the two neighboring countries. (CNN)
  - Former Prime Minister of Norway Jens Stoltenberg is appointed to succeed Denmark's
    Anders Fogh Rasmussen as the next Secretary General of NATO. (BBC News)
  Law and crime:
  - Buddhist mobs in western Myanmar reportedly target foreign aid groups and workers
    in reaction to supposedly disrespectful treatment of a Buddhist flag. (CNN)
  - A shooting occurs at a courthouse in Brampton, Ontario, Canada, with one shooter
    dead and a police officer injured. (Associated Press)
  Science:
  - The US Geological Survey records a 5.1 magnitude earthquake in the Los Angeles
    area of California. (RTÉ News)
