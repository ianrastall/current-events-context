Date: '2014-03-16'
Source_URI: Portal:Current events/2014 March 16
Intelligence_Payload:
  Politics and elections:
  - Crimean referendum, 2014
  - Voters in Crimea vote overwhelmingly to leave Ukraine and rejoin Russia. Ukraine,
    the European Union, and the United States condemn the referendum, which did not
    give voters the option of the status quo. (BBC News) (Associated Press)
  - Serbian parliamentary election, 2014
  - Voters in Serbia go to the polls for an early parliamentary election. The centre
    right SNS is reported to be receiving around 50% of the popular vote. (AP via
    Houston Chronicle) (Straits Times)
  Sports:
  - In the NASCAR Sprint Cup Series, Carl Edwards wins the Food City 500 at Bristol
    Motor Speedway after rain causes the race to be delayed more than 5 hours, and
    the final laps of the event to be run under caution. (NASCAR.com)
  - 'In U.S. men''s college basketball, the field for the NCAA Division I Tournament
    is set. Florida is the #1 overall seed, with the other top seeds being Arizona,
    Virginia, and unbeaten Wichita State. (AP via ESPN)'
  2014 Winter Paralympics:
  - The Winter Paralympics in Sochi, Russia officially concludes. (CBC) (BBC Sport)
