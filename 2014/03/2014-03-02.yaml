Date: '2014-03-02'
Source_URI: Portal:Current events/2014 March 2
Intelligence_Payload:
  2014 Crimean crisis, 2014 Ukrainian revolution:
  - Ukraine's Navy commander-in-chief, Denis Berezovsky who was appointed only March
    1, defects to the Russia-backed Crimea government. (Ria Novosty via inSerbia)
  - Ukraine's acting president Oleksandr Turchynov says Ukraine's airspace has been
    closed to any non-civilian aircraft. (Reuters)
  War in North-West Pakistan:
  - Pakistani military bombs the hideout of a Taliban militant leader killing five
    insurgents. (Jerusalem Post)
  Islamist insurgency in Nigeria:
  - Over 100 people die in several bomb attacks in Nigeria. (Vanguard (Nigeria))
  Disasters and Accidents:
  - Seven people are killed after a bus collided head-on with a car in Chaman, Pakistan.
    (Dawn)
  - Alabama's oldest hotel, the Mentone Springs Hotel - built in 1884 and listed on
    the register of historical places - burns to the ground. (Chattanoogan)
  Politics and elections:
  - Thai general election, 2014
  - Voters in Thailand go to the polls for a rerun of a general election hoped to
    end the current political crisis. (AAP via SBS)
  - 2014 Russian anti-war protests
  - In Russia, police detained several hundred anti-war protesters in Moscow. (AFP/NewsAsia)
    (Wall Street Journal)
  - Over 250,000 Haredim in Israel staged a protest against military conscription.
    (The Guardian)
  Sport:
  - In association football, Newcastle United fine their manager Alan Pardew nearly
    £100,000 for headbutting David Meyler on the opposing Hull City during a Premier
    League match yesterday. (The Observer)
  - In the second race of the 2014 NASCAR Sprint Cup Series, Kevin Harvick dominates
    the The Profit on CNBC 500, leading to his 2nd straight win at Phoenix International
    Raceway. (Nascar.com)
