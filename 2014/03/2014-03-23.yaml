Date: '2014-03-23'
Source_URI: Portal:Current events/2014 March 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkish F-16s shoot down a Syrian military aircraft for purportedly violating
    Turkish airspace. A Syrian Arab Republic spokesman denies this claim and says
    the aircraft was in Syrian airspace when it was shot down. (AP) (Al Arabiya)
  - Two gunmen storm a Christian church in Kenya during a Sunday service, killing
    at least six people and wounding more than a dozen others. (Reuters) (ABC News
    Australia)
  2014 Oso mudslide:
  - Eighteen people are still missing after a landslide Saturday in Oso, Snohomish
    County, in America's Washington state that has claimed at least three lives. (Yahoo!
    News)
  Health:
  - The United Nations Children's Fund reports that an outbreak of the deadly Ebola
    virus that has so far claimed the lives of 59 victims has spread from southern
    Guinea to the capital Conakry. (AAP via News Limited)
  Law and crime:
  - Shrien Dewani has his extradition date to South Africa set for 7 April to face
    court for the murder of Anni Dewani. (Sky News)
  Elections in France:
  - Voters in France go to the polls for municipal elections with candidates from
    the centre-right Union for a Popular Movement performing well. (AFP via NineMSN)
    (AFP via Yahoo! News)
  Sunflower Student Movement in Taiwan:
  - Protesters opposed to the vote of the Cross-Strait Trade Agreement without a clause-by-clause
    review continue to occupy the Taiwanese parliament. Protesters attempt to occupy
    the nearby Executive Yuan as well. (FocusTaiwan)
