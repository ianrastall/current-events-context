Date: '2014-03-14'
Source_URI: Portal:Current events/2014 March 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Attacks all across Pakistan leave dozens dead, with the most violence centered
    in Peshawar and Quetta. (Reuters)
  - Islamic militants attack a Nigerian Army barracks in Maiduguri, Borno State. (Voice
    of America)
  Business and economy:
  - American sandwich shop chain Quiznos files for bankruptcy. (Businessweek)
  Disasters and accidents:
  - A 7-story building in Mumbai, India, collapses, killing 7 people and injuring
    4. (The Hindu)
  - Rescue crew continue to search for victims in the explosion in the New York City
    neighborhood of East Harlem, which killed 8 and injured more than 70. (BBC News)
  Law and crime:
  - A French court sentences former Rwandan army captain Pascal Simbikangwa to 25
    years for his role in the 1994 Rwandan genocide. (BBC News)
  International relations:
  - The United States announces plans to relinquish remaining controls of the Internet
    following revelations of National Security Agency surveillance last year. (Washington
    Post)
  - United States Secretary of State John Kerry and Russian Foreign Affairs Minister
    Sergey Lavrov meet in London, United Kingdom, to discuss the current Crimean crisis.
    (The Guardian)
  Politics and elections:
  - Joko Widodo is chosen as the nominee for the Indonesian Democratic Party – Struggle
    for the upcoming presidential election. (The Jakarta Globe)
