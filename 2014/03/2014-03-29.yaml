Date: '2014-03-29'
Source_URI: Portal:Current events/2014 March 29
Intelligence_Payload:
  Arts and culture:
  - Italian architect Pier Carlo Bontempi wins the Driehaus Prize. (ArchDaily) (PRweb)
  Syrian Civil War spillover in Lebanon:
  - A suicide bomber kills three soldiers at a Lebanese army checkpoint in the border
    town of Arsal close to the Syrian border. (Time), (Reuters)
  2014 Crimean crisis:
  - Sergey Lavrov, the Foreign Minister of Russia, says that Russia has no intention
    of invading Ukraine. (Reuters)
  Law and crime:
  - The first same-sex marriages take place in the United Kingdom after they were
    given the legal authority to proceed in England and Wales from midnight UTC. (BBC
    News)
  Politics and elections:
  - Voters in Slovakia go to the polls for the second round of voting in the presidential
    election with former businessman Andrej Kiska elected in a landslide. (Deutsche
    Welle) (The Telegraph)
  Sports:
  - In chess, Vishwanathan Anand, the loser of the World Chess Championship 2013,
    earns the right to challenge Magnus Carlsen for the World Chess Championship 2014
    by winning the Candidates Tournament with one round to spare. (The Hindu)
  - In horseracing, African Story wins the Dubai World Cup, (BBC News)
