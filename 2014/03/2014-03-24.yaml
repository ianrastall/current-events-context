Date: '2014-03-24'
Source_URI: Portal:Current events/2014 March 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Twenty soldiers are killed in an attack on a military checkpoint in eastern Yemen.
    (BBC News)
  Disasters and accidents:
  - The death toll from the Oso mudslide in the US state of Washington rises to fourteen
    with dozens of people unaccounted for. (AP via Yahoo! News)
  - The death toll from the Lake Albert boat disaster on March 22 rises to 107. (CNN)
  - A train overruns the buffers at Chicago O'Hare Airport station, injuring 33 people.(Chicago
    Tribune)
  Malaysia Airlines Flight 370:
  - Chinese aircrew report seeing "suspicious objects" in the southern Indian Ocean
    while searching for the missing Malaysian Airlines plane. (Courier Mail)
  - Najib Razak, the Prime Minister of Malaysia, announces that with information from
    the UK Air Accidents Investigation Branch, flight MH370 went down over the southern
    Indian Ocean with "all lives lost." (CNN)
  Health:
  - An outbreak of Ebola virus which has killed at least 59 people in Guinea continues
    its spread, entering Liberia and threatens to spread to Sierra Leone. (Bloomberg)
  International relations:
  - The 2014 Nuclear Security Summit commences in The Hague, Netherlands. (Al Jazeera)
  2014 Crimean crisis:
  - The interim President of Ukraine Olexander Turchynov orders Ukrainian forces to
    withdraw from Crimea. (BBC News)
  - UK Prime Minister David Cameron says the planned 40th G8 summit scheduled to be
    held in the Russian city of Sochi will not take place because of Russia's actions
    in Crimea. (BBC News)
  Law and crime:
  - A Chinese court jails a man for 18 months after he applied for permission to protest
    on the anniversary of the 1989 Tiananmen Square protests. (Al Jazeera)
  Post-coup unrest in Egypt:
  - A court in Minya, Egypt, sentences 528 supporters of former President Mohammed
    Morsi to death for a range of offenses including murdering a policeman and attacks
    on people and property. It is the largest mass death sentence handed down in recent
    history anywhere in the world. (BBC) (The Independent)
