Date: '2014-03-25'
Source_URI: Portal:Current events/2014 March 25
Intelligence_Payload:
  Arts and Culture:
  - Australian Prime Minister Tony Abbott restores Knights and Dames to the Australian
    Honours System through the Order of Australia. (ABC)
  Business and economy:
  - The U.S. District Court in Manhattan finds that the trustee of MF Global may proceed
    with a lawsuit against former executives thereof, including former CEO Jon Corzine.
    (Reuters)
  Disasters and accidents:
  - A bus in Tak Province, Thailand, plunges into a ravine, killing 30 people and
    injuring 22. (BBC News)
  2014 Oso mudslide:
  - The death toll has risen to 16 with an additional 8 bodies located and scores
    missing. (AP via Washington Post)
  Health:
  - The World Health Organisation estimates that air pollution contributed to seven
    million deaths in 2012. (The Telegraph)
  Law and crime:
  - Four men are arrested after BASE jumping from the top of the World Trade Center
    in New York City. (CNN)
  Garda phone tapping scandal:
  - Martin Callinan resigns as Commissioner of Ireland's Garda Síochána (national
    police) over his "disgusting" comment about whistleblowers made to a parliamentary
    committee. Callinan had also been involved in controversy over the recent surveillance/bugging
    of GSOC. (BBC) (The Journal)
  - 'As Callinan goes, details emerge that the national police have been involved
    in phone tapping since the 1980s: the Irish Government establishes an inquiry
    into the matter. (BBC)'
  - A former Garda is found to have perverted the course of justice on two occasions
    and admits having cocaine for sale or supply. (RTÉ News)
  - A letter titled "Recordings of Telephone Conversations made and retained in Garda
    Stations" is leaked revealing that Callinan mentioned the telephone tapping to
    the Department of Justice more than two weeks ago and that the Attorney General
    knew on 11 November 2013. (The Journal)
  Post-coup unrest in Egypt:
  - Mohammed Badie, the guide of Egypt's Muslim Brotherhood, will appear in court
    with 680 others to face charges of incitement to kill. (BBC News)
  2014 Ukrainian revolution:
  - Oleksandr Muzychko, a prominent member of Ukraine's Right Sector nationalistic
    party, is killed under unclear circumstances. (Moscow Times) (AP via CBC)
  - Ihor Tenyukh is discharged as Minister for Defence, to be replaced by Gen. Mykhaylo
    Koval following the loss of Crimea. (Washington Post)
