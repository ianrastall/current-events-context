Date: '2014-03-22'
Source_URI: Portal:Current events/2014 March 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Post-civil war violence in Libya
  - The Libyan National Army fights with rebels occupying oil ports near Benghazi.
    (Reuters)
  - 2014 Crimean crisis
  - Russian troops capture Novofedorivka, an airbase of the Ukrainian Navy in the
    western region of the Crimean Peninsula. (BBC News)
  Business and economy:
  - A member of the governing council of the European Central Bank says that the ECB
    may yet cut interest rates still further, into negative territory. (Reuters)
  Disasters and accidents:
  - Five people die after a light plane catches fire on take-off at Caboolture Airport
    in Queensland, Australia. (The Guardian)
  - At least 35 people die in Balochistan, Pakistan, in a collision between a petrol
    tanker and two buses. (PTI via Business Standard)
  2014 Oso mudslide:
  - A landslide kills two people, and injures six in Oso, Washington, United States.
    (CNN)
  2014 Galveston Bay fuel oil spill:
  - A barge carrying nearly a million gallons of oil collides with a ship in Galveston
    Bay on the coast of the US state of Texas causing an oil spill. (AP)
  International relations:
  - The Veneto region votes to secede from Italy in an informal online referendum.
    (The Daily Mail)
  Sports:
  - Major League Baseball starts its 2014 season at the Sydney Cricket Ground in Australia.
    The Los Angeles Dodgers defeat the Arizona Diamondbacks by a score of 3–1. (AP
    via ESPN)
