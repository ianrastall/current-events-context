Date: '2014-03-31'
Source_URI: Portal:Current events/2014 March 31
Intelligence_Payload:
  Armed conflict and attacks:
  - Explosions kill at least five people and injure several more in the Kenyan capital,
    Nairobi. (BBC News)
  - Mexican Drug War
  Korean maritime border incidents:
  - North and South Korea exchange artillery fire across sea boundaries. (AFP via
    Yahoo! News)
  - The Mexican Navy kills Knights Templar Cartel high-ranking leader Enrique Plancarte
    Solís. (Milenio)
  Arts and culture:
  - The Japanese TV series Waratte Iitomo!, whose presenter Tamori holds the Guinness
    World Record for appearing on the show for 32 consecutive years, comes to an end
    as its 8054th and final episode airs. (The Japan News) (The Japan Times)
  International relations:
  - The United Nations International Court of Justice rules that Japan's Antarctic
    whaling program is not scientific but commercial and forbids grants of further
    permits. (BBC News) (ABC News Australia)
  - Tuvalu withdraws its recognition of Abkhazia and South Ossetia after re-establishing
    diplomatic relations with Georgia. (World Bulletin)
  Law and crime:
  - A Pakistani court charges former President Pervez Musharraf with high treason
    in relation to the imposition of the emergency rule in 2007. (BBC News)
  Politics and elections:
  - French politics
  - French government and Socialist Party admit major defeat following the French
    municipal elections, 2014
  - The President of France François Hollande appoints Manuel Valls, previously Minister
    of the Interior, as the new Prime Minister. He replaces Jean-Marc Ayrault. (Time)
  Science and technology:
  - The Intergovernmental Panel on Climate Change releases a new report outlining
    the impact of climate change on the world at the end of a week of meetings in
    Yokohama, Japan. (BBC News)
