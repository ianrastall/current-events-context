Date: '2014-03-30'
Source_URI: Portal:Current events/2014 March 30
Intelligence_Payload:
  Garda phone recordings scandal:
  - Court documents seen by RTÉ Radio 1's This Week indicate that Gardaí recorded
    phone conversations with two main witnesses during the 1996 Sophie Toscan du Plantier
    murder investigation. (RTÉ News)
  Politics and elections:
  - Electoral authorities in Egypt set the first round of the presidential election
    for 26–27 May. (BBC News)
  2014 Turkish local elections:
  - Voters in Turkey go to the polls for municipal elections with Prime Minister Recep
    Tayyip Erdoğan's Justice and Development Party claiming victory. (AP via ABC)
    (Haaretz) (Sky News Australia)
  Sunflower Student Movement in Taiwan:
  - Between 116,000 and 500,000 protesters march to the Presidential Office, in opposition
    to recent governmental push for Cross-Strait Service Trade Agreement vote and
    other related issues. (LeMonde) (LibertyTimes)
  2014 French municipal elections:
  - Voters in France go to the polls for a second round of voting in municipal elections.
    The ruling Socialist Party generally performs badly, but their candidate in the
    Paris mayoral election Anne Hidalgo is set to become the first female mayor of
    that city. (AP via Washington Post)
