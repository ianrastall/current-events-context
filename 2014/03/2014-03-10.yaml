Date: '2014-03-10'
Source_URI: Portal:Current events/2014 March 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Jordanian judge is fatally shot by Israeli Border Police after he allegedly
    attempted to grab one of their rifles. (AP via Time)
  2014 Crimean crisis:
  - A pro-Russian military force of just about a dozen men take control of the Ukrainian
    naval base near the town of Bakhchysarai. (Reuters)
  Business and economy:
  - Irish fruit firm Fyffes and U.S. rival Chiquita agree to combine, creating the
    world's largest banana company in an all-stock deal valued at about $1.07 billion.
    (BBC News)
  - Pizza chain Sbarro files for chapter 11 bankruptcy for the second time in 3 years.
    (Reuters)
  Politics and elections:
  - Troy Buswell resigns as the Treasurer of Western Australia following a mental
    breakdown and a car accident. (Perth Now)
  - The Prime Minister of Papua New Guinea Peter O'Neill sacks the Treasurer Don Polye
    and the Minister for Industrial Relations Mark Maipakai. (AAP via News Limited)
  New Zealand general election, 2014:
  - John Key, the Prime Minister of New Zealand, announces that the 2014 New Zealand
    election will be held on 20 September 2014. (New Zealand Herald)
  Science and technology:
  - Dr. David J. Skorton, current President of Cornell University, is chosen to be
    the new head of the Smithsonian Institution. (AP via ABC)
