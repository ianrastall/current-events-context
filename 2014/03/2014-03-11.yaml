Date: '2014-03-11'
Source_URI: Portal:Current events/2014 March 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen in Kabul, Afghanistan kill Swedish Radio foreign correspondent Nils Horner.
    (Washington Post)
  - Maoist rebels ambush an Indian paramilitary force in Chhattisgarh, India, killing
    18 soldiers. (AP via Time)
  - In response to mortar fire, an Israeli airstrike in the Gaza Strip kills three
    suspected militants. (AP via Houston Chronicle)
  - Protesters clash with police in Turkey after a 15-year-old boy died from a head
    injury sustained during anti-government protests. (The Guardian) (Reuters)
  Arts and culture:
  - New Zealand says it plans to hold a referendum regarding the change of its national
    flag. (The Guardian)
  - Bronze weapons found near China's Terracotta Army are determined to have once
    belonged to the soldiers. (Live Science)
  Business and economy:
  - Colorado says it has collected $2 million in taxes from marijuana sales in the
    month of January. (The Washington Post)
  - Men's Wearhouse buys rival JoS. A. Bank Clothiers for $1.8 billion. (Reuters)
  Territorial disputes in the South China Sea:
  - Two Philippine ships are expelled by the Chinese Coast Guard from Ayungin Shoal
    in the Spratly group of islands. (Philippine Daily Inquirer)
  Law and crime:
  - The search of one of Congress's stand-alone computers is referred to the Justice
    Department for investigation. (AP via USA Today)
  - Fourteen Caribbean nations file a lawsuit against the United Kingdom, France,
    and the Netherlands for damages caused during the Atlantic slave trade. (Time)
  - Joran van der Sloot faces an extradition case in the United States. (People)
  Politics and elections:
  - The Libyan Parliament sacks Prime Minister Ali Zeidan and appoints former defense
    secretary Abdullah al-Thani as acting prime minister. (Reuters)
  - Politics of Israel
  - Shas endorses Isaac Herzog from the Israeli Labor Party as the country's next
    prime minister. (Times of Israel)
  - A new electoral law that raises the threshold of votes political parties need
    in elections to gain representation in the Knesset from 2 to 3.25% is passed unanimously
    as the entire opposition boycotts the vote. (Al Jazeera)
