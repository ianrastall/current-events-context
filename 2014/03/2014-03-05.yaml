Date: '2014-03-05'
Source_URI: Portal:Current events/2014 March 5
Intelligence_Payload:
  Armed conflicts:
  - The Israel Defense Forces captures an Iranian ship carrying long-range artillery
    rockets to Palestinians in the Gaza Strip (CNN)
  2014 Crimean crisis:
  - UN Envoy Robert Serry is ordered to leave Crimea at gunpoint after being threatened
    by 10–15 armed men. (AP)
  - Saying she cannot be part of a network that "whitewashes the actions of Russian
    President Vladimir Putin", Washington-based anchor Liz Wahl resigns on-air from
    the Russian government-backed news channel RT. (The Guardian) (CNN)
  Arts and culture:
  - An 1,800-year-old Egyptian papyrus discovered a century ago, whose inscription
    is nearly illegible to the naked eye, has been made more readable using infrared
    sensors, revealing the message to be a soldier's letter to his family. (Live Science)
  Business and economy:
  - Radio Shack announces the closure of up to 1,100 stores. (USA Today)
  Disasters and accidents:
  - Raging forest fires break out and sweep through Hoàng Liên National Park fueled
    by dry weather and strong winds, in Lào Cai, Vietnam. (VOV)
  Law and crime:
  - The U.S. Supreme Court interprets the whistle-blower provisions of Sarbanes-Oxley
    to protect the employees of privately owned companies that contract with public
    companies, in a case involving a group of mutual fund entities. (SCOTUSBlog)
  Politics and elections:
  - Andrus Ansip resigns after nine years as prime minister of Estonia. (BBC News)
