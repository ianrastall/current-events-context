Date: '2014-03-15'
Source_URI: Portal:Current events/2014 March 15
Intelligence_Payload:
  Disasters and accidents:
  - The Prime Minister of Malaysia Najib Razak states that Malaysia Airlines Flight
    370 was deliberately steered off course for reasons unknown and then flew for
    almost seven hours more. (AsiaOne)
  Business and economy:
  - Jack Lew, the U.S. Treasury Secretary, speaks to Wang Yang, vice premier of the
    People's Republic of China, and expresses U.S. approval of China's new, wider,
    daily trading band for its renminbi. (Reuters)
  Politics and elections:
  - Voters in the Australian states of Tasmania and South Australia go to the polls
    for state elections. The Liberal Party led by Will Hodgman have won government
    in the Tasmanian election while the South Australian election is too close to
    call. (Radio Australia) (ABC) (AAP via Yahoo!7)
  - Slovak presidential election, 2014
  - Voters go to the polls in Slovakia with partial results showing that Prime Minister
    Robert Fico and businessman-turned philanthropist Andrej Kiska are likely to be
    the two contenders in the second round. (AP)
  - 2014 Crimean crisis and 2014 Russian anti-war protests
  - The March of Peace took place in Russia a day before the Crimean referendum. 30,000
    people participated in anti-war protests in Moscow. (The Moscow Times) (Reuters)
    (RFE/RL)
  Sport:
  - 'In motorsports, the Chip Ganassi Racing #01 Riley-Ford Ecoboost Daytona Prototype,
    driven by Scott Pruett, Memo Rojas and Marino Franchitti, wins the 2014 12 Hours
    of Sebring. (RACER.com)'
