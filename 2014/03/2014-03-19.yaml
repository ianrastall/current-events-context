Date: '2014-03-19'
Source_URI: Portal:Current events/2014 March 19
Intelligence_Payload:
  Armed conflict and attacks:
  - 2014 Crimean crisis
  - Russian forces overrun the Ukrainian Navy headquarters in Sevastopol and another
    naval base. (AFP via Google) (AP) (Reuters via Yahoo! News)
  - Two Egyptian army officers and five militants are killed during a warehouse raid
    in Qalyubiya province north of Cairo. (NPR) (BBC News)
  Syrian Civil War:
  - The Israeli Air Force launches several air strikes on Syrian military sites, killing
    one Syrian soldier and wounding seven others, in retaliation for a bombing that
    wounded four of its troops in the Golan Heights. (BBC News)
  Business and economy:
  - Toyota is ordered to pay $1.2 billion to settle charges that it lied to United
    States safety investigators and the public about deadly accelerator defects. (AFP
    via Google News)
  Politics and elections:
  - South Africa's Public Protector finds that President Jacob Zuma has "benefitted
    unduly" from government funded upgrades of his rural residence. (BBC News)
  - Canadian Minister of Finance Jim Flaherty resigns, planning a return to the private
    sector. Joe Oliver is named to replace him. (National Post)
