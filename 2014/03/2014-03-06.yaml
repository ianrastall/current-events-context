Date: '2014-03-06'
Source_URI: Portal:Current events/2014 March 6
Intelligence_Payload:
  Arts and culture:
  - Pope Francis acknowledges that civil unions for LGBT people is a governmental
    move for economic and health management. (Time)
  - Getty Images allows the free use of 35 million photos. (BBC News)
  - Two members of the protest band Pussy Riot are left with chemical burns and head
    injuries after being attacked by a group of people in a McDonald's. (AFP via Google
    News)
  War in Afghanistan (2001–2021):
  - A NATO airstrike mistakenly hits an Afghan military outpost in Logar Province
    killing 5 Afghan soldiers. (The Washington Post)
  2014 Crimean crisis:
  - The European Union freezes the assets of former Ukrainian president Viktor Yanukovich,
    two of his sons, and dozens of his advisers. (Los Angeles Times)
  - The European Union and UN Security Council both hold emergency meetings to talk
    about the current crisis in Ukraine. (AFP via Times of India)
  - President Barack Obama signs an executive order placing sanctions and visa bans
    on people that contributed to the current crisis in Crimea. (CNN)
  - A special referendum date is moved again. Now it becomes March 16, 2014 instead
    of the previously announced March 30. Voters will be asked whether they wish to
    stay part of Ukraine or join the Russian Federation. (Fox News)
  International relations:
  - The Government of Venezuela cuts diplomatic ties with Panama calling it a "lackey
    of the United States". (CNN)
  - Niger deports Saadi al-Gaddafi, son of Muammar al-Gaddafi, to Libya. (BBC News)
  Politics and elections:
  - The brother of the current President of Afghanistan Hamid Karzai, Qayum Karzai,
    drops out of the Afghan presidential election and endorses Zalmai Rassoul. (Hindustan
    Times)
  - President of Tunisia Moncef Marzouki lifts a state of emergency that was put in
    place after the 2011 Tunisian Revolution. (BBC News)
  Religion:
  - The 14th Dalai Lama delivers the Opening Prayer at the US Senate on Capitol Hill
    in Washington, D.C. (Time)
  Sport:
  - Prince Harry launches the Invictus Games, a Paralympic-style sporting championship
    for wounded soldiers. (BBC News)
  - Vietnamese defender Tran Dinh Dong given 28-match ban in March 2014 after breaking
    an opponent's leg. (BBC News) (Yahoo!)
