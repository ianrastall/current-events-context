Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - The Ukrainian military say they have repelled a renewed assault by the pro-Russian
    forces on the Donetsk International Airport. The airport has been under sustained
    assaults for over 2 weeks despite an official ceasefire. (The Wall Street Journal)
  Art and culture:
  - Burmese hard-line monk, Ashin Wirathu, and a hardline group in Sri Lanka, Bodu
    Bala Sena, say they would work together to rally other Buddhist groups and defend
    their faith against militant Islamists. (Fox News)
  Health:
  - Ebola Virus in the United States
  - A case of Ebola Virus is being treated in the American city of Dallas, Texas.
    (AP via The Olympian)
  Law and crime:
  - A student is shot and wounded at Fern Creek Traditional High School in Louisville,
    Kentucky, U.S. A suspect, also a student at the school, has been arrested. (Yahoo
    News) (WDRB-TV)
  - A student is shot and wounded at Albemarle High School in Albemarle, North Carolina,
    U.S. A student is arrested. (USA Today)
