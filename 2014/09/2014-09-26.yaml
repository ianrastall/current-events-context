Date: '2014-09-26'
Source_URI: Portal:Current events/2014 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - The People's Republic of China says that 50 people died in recent violence in
    the western province of Xinjiang. (Voice of America)
  - Islamic State of Iraq and the Levant
  - The Parliament of the United Kingdom is recalled to discuss British participation
    in 2014 military intervention against ISIS. (Daily Mail) (Telegraph.uk)
  - The Parliament approves air strikes against ISIS in Iraq by 524 votes to 43. (BBC)
  - Taliban insurgency
  - The Taliban gains control of the Ajristan District in Afghanistan's Ghazni Province
    after a week of battle. (BBC)
  - An act of arson at an air traffic control facility in Aurora, Illinois causes
    close to 2000 airline flights to be grounded.(ABC News)
  Business and economy:
  - BlackBerry Limited, the Canadian corporation formerly known as Research in Motion,
    although continues to operate at a loss overall, posted unexpectedly good second
    quarter results, including the first adjusted profit for its hardware unit in
    five quarters. (Reuters)
  Pacific Solution:
  - The small Pacific state of Nauru has run out of money following a legal dispute
    in Australia. (ABC News Australia)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organisation says that the death toll from the Ebola virus is
    over 2,900. (Nigeria Punch)
  Politics and elections:
  - At least 100 pro-democracy protestors enter the main government compound in Hong
    Kong. (BBC)
  - North Korea acknowledges that Kim Jong-un is suffering from "discomfort", after
    a three-week absence from state media photographs. (Al Jazeera)
  - Fatah and Hamas agree to form a unity government on the Gaza Strip. (EuroNews)
