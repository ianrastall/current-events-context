Date: '2014-09-12'
Source_URI: Portal:Current events/2014 September 12
Intelligence_Payload:
  Central African Republic conflict (2012–present):
  - More than 5,000 people have died in the Central African Republic in the past 9
    months. (AP via Washington Post)
  Russian military intervention in Ukraine:
  - The Government of Ukraine and pro-Russian separatists exchange dozens of prisoners
    agreed to as part of a ceasefire a week ago. Both sides still hold thousands of
    prisoners. (Washington Post)
  2014 Taiwan food scandal:
  - Taiwan's Food and Drug Administration indefinitely halts imports of edible lard
    oil from Hong Kong, since an exporter was found to have falsely listed and sold
    industrial grade lard as safe for human consumption. (Taipei Times)
  Ebola virus epidemic in West Africa:
  - Cuba announces plans to send 165 medical staff to West Africa to help combat the
    Ebola virus outbreak that has claimed more than 2,400 lives. (New York Times)
  International relations:
  - Australia raises its terror threat level to high following concerns about militants
    returning from conflicts in Iraq and Syria. (BBC)
  Law and crime:
  - South African athlete Oscar Pistorius is found guilty of the "culpable homicide"
    of his partner Reeva Steenkamp. (BBC)
  - Three people are sentenced to death and one person given a life sentence for the
    2014 Kunming attack in China's Xinjiang region. (AAP via SBS News)
  Politics:
  - Former First Minister of Northern Ireland and Democratic Unionist Party leader
    Ian Paisley dies, aged 88. (BBC)
  Science:
  - NASA's Mars Curiosity rover reaches its final destination Aeolis Mons, a mountain
    that rises 5.5 km at the center of Gale Crater. (Gizmodo)
  Sport:
  - In cricket, former New Zealand player Chris Cairns is to be charged with perjury
    by London's Metropolitan Police Service in relation to a 2012 libel trial regarding
    allegations of match fixing made by former Indian Premier League boss Lalit Modi.
    (The Age)
