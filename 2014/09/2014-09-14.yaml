Date: '2014-09-14'
Source_URI: Portal:Current events/2014 September 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  Islamic State of Iraq and the Levant:
  - Australia sends combat aircraft and special forces to the Middle East to help
    in the fight against Islamic State. (The Australian)
  - Heavy fighting resumes between Ukraine forces and rebels near Donetsk International
    Airport with at least six people dead. The terminal is burning. (Deutsche Welle),
    (New York Times)
  Disasters and accidents:
  - At least 70 people are still missing after the ferry MV Maharlika II sinks off
    the Philippines island of Leyte. (AFP via Channel News Asia)
  - The death toll from a collapse of T. B. Joshua's The Synagogue Church of All Nations
    on Friday in the Ikotun area of the Nigerian largest city Lagos reaches 40. (The
    Express Tribune)
  - 2014 Pacific hurricane season
  - 2014 Pacific typhoon season
  - A boat carrying 250 people from Africa to Europe sinks off the coast off Tajoura
    in Libya with most people feared drowned. (Reuters via New York Times)
  2014 India–Pakistan floods:
  - India suspends rescue operations due to heavy rain in Jammu and Kashmir state
    where over 100,000 still await rescue. (Zee News)
  - Hurricane Odile reaches Category 4 strength as it nears Mexico's Baja California
    coast. (AFP via Telesur)
  - Typhoon Kalmaegi hits the northeast Philippines with warnings of potential floods
    and landslides. (AP via Daily Mail)
  Law and crime:
  - North Korea holds a trial for American tourist Matthew Miller who was detained
    in April and sentences him to six years of hard labor. (AP) (CNN)
  - The Carolina Panthers deactivate defensive end Greg Hardy after his conviction
    on two counts of female assault and communicating threats. (USA Today)
  Swedish general election, 2014:
  - Voters in Sweden go to the polls for a general election with a leftist coalition
    led by the Swedish Social Democratic Party set to form government. Incumbent Prime
    Minister Fredrik Reinfeldt announces that he will step aside as PM and as leader
    of the Moderate Party. (BBC), (AP)
  Sport:
  - The closing ceremony of the inaugural Invictus Games takes place in London, with
    a music concert at Olympic Park featuring artists and groups such as Bryan Adams,
    Ellie Goulding, James Blunt and the Kaiser Chiefs. (BBC) (London Evening Standard)
    (The Daily Telegraph)
  - In basketball, the United States defeats Serbia 129-92 to win the 2014 FIBA Basketball
    World Cup. (New York Times)
  In golf:
  - American Billy Horschel wins the The Tour Championship played in Atlanta. (Reuters)
  - South Korean teenager Kim Hyo-joo wins the year's final LPGA major, the Evian
    Championship, in France. (AP via ESPN)
