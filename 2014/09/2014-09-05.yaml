Date: '2014-09-05'
Source_URI: Portal:Current events/2014 September 5
Intelligence_Payload:
  War in Donbass:
  - The government of Ukraine and pro-Russian rebels agree to a cease-fire, fighting
    continues after the announcement. (Reuters)
  Somali Civil War:
  - The Pentagon confirms that leader of the terrorist group al-Shabaab Moktar Ali
    Zubeyr was killed in an airstrike on September 1. (Reuters)
  Arts and culture:
  - Israeli President Shimon Peres meets with Pope Francis at a time of mounting tension
    in the Middle East. The last meeting between the Pontiff and the Israeli leader
    came in June, when the Pope invited Peres, along with Palestinian President Mahmoud
    Abbas, to join in a prayer service for peace. (Reuters)
  Disasters and accidents:
  - A privately owned Socata TBM-900 (flight number N900KN) from the US flies without
    a conscious pilot for a thousand miles after a suspected cabin depressurization
    (see also) and crashes 14 miles off the coast of northeastern Jamaica. (Reuters)
  International relations:
  - Iranian air traffic control requires a plane chartered by US-led coalition forces
    in Afghanistan to land over issues with the flight plan. (The New York Times)
    The flight later resumes without further incident. (Reuters)
  Politics and elections:
  - Outgoing Slovenian prime minister Alenka Bratušek is formally nominated by Jean-Claude
    Juncker as the country's EU commissioner despite resistance from the prime minister-designate
    Miro Cerar, and according to several European media she is slated to become a
    Vice-President of the Commission. (Slovenia Times)
