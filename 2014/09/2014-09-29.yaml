Date: '2014-09-29'
Source_URI: Portal:Current events/2014 September 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - Renewed clashes around the Donetsk International Airport between the pro-Russian
    rebels and Ukrainian government troops kill at least 12 people in the worst flareup
    of violence since the ceasefire accord earlier in September. (CBC)
  International Relations:
  - Argentina's central bank announces that it will pay the holders of its restructured
    debt Tuesday. Implicitly this indicates that it is ready to defy a U.S. federal
    court which has blocked such payments until the holders of hold-out bonds are
    included. (Reuters)
  Politics and Elections:
  - Ashraf Ghani is sworn in as new president of Afghanistan. (BBC)
