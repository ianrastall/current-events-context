Date: '2014-09-07'
Source_URI: Portal:Current events/2014 September 7
Intelligence_Payload:
  2014 Iraq conflict:
  - The United States launches new airstrikes on ISIS in western Iraq, in an effort
    to protect the Haditha Dam. (Fox News)
  Disasters and accidents:
  - A small plane carrying ten people from Araraquara Airport crashes in the Amazon
    jungle, with "little chance of finding survivors". (News24) (eNCA)
  Science:
  - Asteroid 2014 RC makes a close approach to Earth at 0.1 Lunar Distances () at
    18:01 UTC (Yahoo News)
  Sports:
  - 2014 US Open (tennis)
  - Serena Williams of the United States wins her third straight US Open women's singles
    title tying with Chris Evert and Martina Navratilova for the number of grand slam
    singles wins. (CBS Sports)
  - American twins Bob and Mike Bryan win their fifth US Open men's doubles title,
    giving them 100 ATP World Tour titles as a team. (AP via ESPN)
  - In North American basketball, Bruce Levenson decides to sell his interest in the
    Atlanta Hawks after confessing to sending a racist email back in 2012. (USA Today)
