Date: '2014-09-04'
Source_URI: Portal:Current events/2014 September 4
Intelligence_Payload:
  Disasters:
  - Monsoon rains in Pakistan kill more than 40 people. (Channel News Asia)
  - In the Indian state of Jammu and Kashmir, over 60 people are feared dead from
    floods. (Indian Express)
  2014 West Africa Ebola virus outbreak:
  - The Ebola death total in West Africa exceeds 1,900, according to the World Health
    Organization. (BBC)
  International relations:
  - The two-day NATO summit in Newport, Wales, begins. Leaders agree to apply further
    sanctions on Russia. NATO sources claim that there are "several thousand" Russian
    troops inside Ukraine. (RTE)
  Politics and elections:
  - Juncker Commission
  - Belgium nominates Marianne Thyssen as its candidate for European commissioner.
    (EU Observer)
  - Following pressure from Jean-Claude Juncker to nominate female candidates for
    the European Commission, the government of Romania alters it original choice to
    put incumbent commissioner Dacian Cioloş forward for a second term and instead
    nominates MEP Corina Creţu as the country’s new candidate. (European Voice)
  Arts and culture:
  - For the first time in sixty years, a new Viking ring fortress is found, the fifth
    in present-day Denmark; it is located near the town of Køge and believed to have
    been founded by Harold Bluetooth. (The Copenhagen Post)
  - Comedy legend Joan Rivers dies at age 81. (New York Times)
