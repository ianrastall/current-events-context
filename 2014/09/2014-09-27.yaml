Date: '2014-09-27'
Source_URI: Portal:Current events/2014 September 27
Intelligence_Payload:
  Disasters and accidents:
  - Japan's Mount Ontake volcano erupts causing 250 people to be stranded, injuring
    at least eight people and forcing aircraft to divert their routes. (Reuters)
  Business and economy:
  - After 139 years of ferry crossings between the Danish town of Esbjerg and Harwich
    in England, carries passengers on the route for the last time as DFDS closes the
    route due to "dwindling demand and high costs"; a freight service will still be
    available on the route from Esbjerg to Immingham. (BBC) (DFDS Connects)
  Ebola virus epidemic in West Africa:
  - The official death toll from the Ebola virus outbreak reaches 3,000 with the World
    Health Organisation warning that the official figures "vastly underestimate the
    true scale of the epidemic". (The Independent)
  International relations:
  - The United Nations Human Rights Council votes in favor of LGBT rights. (Human
    Rights Watch)
  Law and crime:
  - Vaughan Foods beheading incident. A recent convert to Islam goes on a rampage
    in a grocery warehouse in Oklahoma, beheading a woman with a knife and stabbing
    another female colleague. (Fox News)
  Politics and elections:
  - David Cunliffe resigns as leader of the New Zealand Labour Party following a crushing
    defeat in last week's election, but will nominate himself as leader in the subsequent
    leadership contest. (Sky News Australia)
  - Artur Mas i Gavarró, the President of the Spanish region of Catalonia, authorises
    a referendum on independence on November 9 despite the opposition of the Government
    of Spain. (AP)
  - Dozens of people are arrested as Hong Kong pro-democracy rallies continue. (CNN)
  Sport:
  - In Australian rules football, Hawthorn Football Club defeats the Sydney Swans
    in the 2014 AFL Grand Final 137-74. (ABC News Australia)
