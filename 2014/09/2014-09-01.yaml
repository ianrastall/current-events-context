Date: '2014-09-01'
Source_URI: Portal:Current events/2014 September 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Pakistan unrest
  - Pakistani protesters armed with sticks and stones clash with police in the centre
    of Islamabad after protests calling for the resignation of Prime Minister Nawaz
    Sharif turn violent. All schools in the capital have been closed as a result of
    the clashes. (Reuters via Yahoo! News)
  - The Pakistan Television Corporation goes off air after protesters storm its headquarters.
    (BBC)
  - 2014 pro-Russian unrest in Ukraine
  - Ukrainian forces battle pro-Russian rebels near Luhansk International Airport.
    The area is encircled by the pro-Russian forces for over 3 weeks. (BBC)
  - Valeriy Heletey, Ukraine's Defence Minister, accuses Russia of launching a "great
    war". (BBC)
  - Four people are arrested after an attempted bombing in Manila's Ninoy Aquino International
    Airport. (CNN)
  Law and crime:
  - A gunman shoots dead two people and injures a third at the Work and Income office
    in Ashburton, New Zealand, before fleeing on a bicycle. The town is locked down
    for seven hours while police search for and apprehend the suspected gunman. (NZ
    Herald)
  - Mohammad Reza Rahimi, former Iranian vice president, is convicted to a prison
    term for his role in the 2011 embezzlement scandal. (Al Jazeera)
