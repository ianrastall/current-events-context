Date: '2014-09-15'
Source_URI: Portal:Current events/2014 September 15
Intelligence_Payload:
  War in Donbass:
  - Heavy shelling on the city of Donetsk, Ukraine, leaves 6 people dead and 15 wounded.
    (AP via Houston Chronicle)
  Business and economics:
  - Information technology company Cognizant agrees to buy health care information
    company TriZetto Corporation for US$2.7 billion. (New York Times)
  - Microsoft agrees to buy Swedish company Mojang, the makers of Minecraft, for US$2.5
    billion. (AP)
  Disasters and accidents:
  - An accidental fire severely burns a giant white rabbit erected by Dutch artist
    Florentijn Hofman in Taoyuan, Taiwan. (AFP via Channel NewsAsia) (New York Times)
  - Five hundred people drowned off the coast of Malta last week after people traffickers
    deliberately sank their ship. (Reuters)
  - Two wildfires around Bass Lake, California, USA, cause the destruction of 21 homes
    and the evacuation of over 1,000 people. (The Weather Channel)
  Politics and elections:
  - Ewa Kopacz becomes Poland's second female prime minister. (Reuters)
  - Swedish Minister of Finance Anders Borg quits politics after he was considered
    to be the next leader of the Moderate Party, which he did not want. (Wall Street
    Journal)
