Date: '2014-09-08'
Source_URI: Portal:Current events/2014 September 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgency
  - A suicide bomb attack kills the police chief of a district in southern Kandahar
    Province in Afghanistan. (Tolo News)
  - War in Donbass
  - Pro-Russian rebels release 1,200 prisoners under ceasefire deal. (BBC)
  Arts and culture:
  - Clarence House confirms that the Duke and Duchess of Cambridge are expecting their
    second child. (BBC) (Wales Online)
  Business:
  - Sweden's AB Electrolux, the parent company of the U.S. brands Electrolux and Frigidaire,
    buys General Electric's appliances business for $3.3 billion. (Reuters)
  - American food manufacturer General Mills buys organic food producer Annie's Homegrown
    for $820 million. (CNBC)
  Disasters and accidents:
  - 2014 India–Pakistan floods
  - More than 160 people have died and thousands are stranded in one of the worst
    floods to occur in 60 years for India's Jammu and Kashmir. (NDTV)
  - Hurricane Norbert (2014)
  - The remnant of Hurricane Norbert causes heavy flooding in the state of Arizona
    leading to the declaration of a state of emergency and causing one death. (CNN),
  Health:
  - It is reported that nearly one thousand children have been hospitalized with respiratory
    illnesses in several U.S. states. (USA Today)
  Politics and elections:
  - Speaking in Edinburgh, former Prime Minister of the United Kingdom Gordon Brown
    sets out a timetable for transferring more powers from Westminster to the Scottish
    Parliament in the event of a No vote in the forthcoming independence referendum.
    (BBC)
  Sports:
  - 2014 US Open
  - Marin Čilić of Croatia defeats Kei Nishikori of Japan in straight sets to win
    the Men's Singles. It is Čilić's first grand slam victory and the first time since
    1998 that there have been eight different winners of the grand slam singles finals.
    (BBC)
  - In American football, the Baltimore Ravens terminate the contract of running back
    Ray Rice after videos emerge on the TMZ website of an assault on his then fiancée
    at the Revel Atlantic City casino. (AP via Seattle Times)
