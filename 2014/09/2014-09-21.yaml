Date: '2014-09-21'
Source_URI: Portal:Current events/2014 September 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Shia insurgency in Yemen
  - The Yemeni government and Shia Houthi rebels sign an agreement aimed at ending
    the political crisis as the rebels advance towards the capital Sana'a; prime minister
    Mohammed Basindwa resigns, and under the deal, rebels will nominate a new prime
    minister within three days. (BBC)
  - Islamic State in Iraq and the Levant
  - Tens of thousands of Kurds flee into Turkey ahead of an ISIL offensive. (AFP,
    New York Times via Sydney Morning Herald)
  - Terrorism in Pakistan
  - The Pakistani Taliban claims to have shot down a Pakistani Air Force F-16, and
    releases pictures of the wreckage. (The Blaze)
  - An explosion near the Egyptian foreign ministry building in Cairo kills at least
    two police officers. (BBC)
  Health:
  - Ebola virus epidemic in West Africa
  - A three day curfew in Sierra Leone ends and will not be extended. (BBC)
  Politics and elections:
  - More than 26,000 people in Moscow participate in the largest demonstration so
    far against Russian president Vladimir Putin and the War in Donbass. (Radio Free
    Europe/Radio Liberty) (BBC)
  - Rallies in support of Ukraine and against the War in Donbass take place in Boston,
    New York, Sydney, Dublin, Madrid, London, Paris, Oslo, Tallinn, Limassol, Istanbul,
    Antalya, Cologne, Milan, Rome, Vienna, Munich, Prague, Berlin, Moscow, Volgograd,
    Yekaterinburg, Perm, Krasnoyarsk, Novosibirsk, Berlaul and Petropavlovsk-Kamchatsky.
    (LiveUAMap)
  - Afghanistan’s rival presidential candidates, Ashraf Ghani and Abdullah Abdullah,
    sign a power-sharing deal that establishes a unity government with Ghani as President
    and Abdullah as Chief Executive. (Euronews), (AP via Mashable)
  Religion:
  - Pope Francis celebrates Mass in Albania. (BBC)
  Sport:
  - In tennis, two-time Australian Open champion Victoria Azarenka is to miss the
    remainder of the season because of the foot injury that has blighted her year.
    (BBC)
