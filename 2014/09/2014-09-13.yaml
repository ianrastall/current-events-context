Date: '2014-09-13'
Source_URI: Portal:Current events/2014 September 13
Intelligence_Payload:
  Naxalite–Maoist insurgency:
  - Three Maoists are killed and two are seriously injured in a fight with security
    forces in the Giridih district of India's Jharkhand state. (PTI)
  Islamic State of Iraq and the Levant:
  - The Prime Minister of Iraq Haider al-Abadi says he has ordered the army to stop
    shelling areas held by the Islamic State where there are civilians present. (AP)
  - Islamic State releases a video purporting to show the beheading of British aid
    worker David Haines. (NBC News)
  Disasters and accidents:
  - At least 29 people are missing after the ferry MV Maharlika II sinks off the Philippines
    coast. (CNN)
  2014 Taiwan food scandal:
  - Yeh Wen-hsiang, the chairman of Chang Guann Co, is arrested for fraud for his
    role in the scandal. (AFP via SBA)
  International relations:
  - The government of Qatar asks exiled leaders of Egypt's Muslim Brotherhood to leave.
    (AP)
  Sports:
  - In American football, Adrian Peterson, running back for the Minnesota Vikings,
    turns himself in to authorities in the Houston area. The day before, he had been
    indicted on child abuse charges stemming from an incident in which he spanked
    his 4-year-old son with a tree branch that he used as a switch. The Vikings have
    deactivated him from Sunday's game against the New England Patriots. (ESPN)
