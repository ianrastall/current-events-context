Date: '2014-09-22'
Source_URI: Portal:Current events/2014 September 22
Intelligence_Payload:
  Business and economy:
  - German conglomerate Siemens AG announces plans to acquire American oilfield equipment
    maker Dresser-Rand Group Inc for US$7.6 billion. (Reuters via Yahoo!)
  - German pharmaceutical company Merck KGaA agrees to buy American chemical company
    Sigma-Aldrich for US$17 billion. (AP via USA Today)
  - Malaysia-based company Aegis Limited is criticized by the government of the Philippines
    for creating an advertisement that attacks the country. (Rappler)
  Politics and elections:
  - The Fiji First Party led by Voreqe Bainimarama wins 32 out of 50 seats in the
    Parliament in last week's general election. (AP)
  - 2014 Hong Kong electoral reform
  - Students from more than 20 universities and colleges in Hong Kong are boycotting
    class in protest against Beijing’s decision to rule out fully democratic elections.
    (The Guardian)
  Science and technology:
  - NASA's MAVEN space probe successfully arrives in orbit over Mars. (BBC)
