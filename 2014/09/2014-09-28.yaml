Date: '2014-09-28'
Source_URI: Portal:Current events/2014 September 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2014 military intervention against ISIS: The al-Nusra Front threatens retaliation
    against nations participating in air strikes against Islamic State. (Al Jazeera)'
  - A Buddhist monk accused of inciting violence against Muslims in Burma says he
    is joining forces with the Bodu Bala Sena group in Sri Lanka in order to combat
    a "serious threat from jihadist groups". (Al Jazeera)
  War in North-West Pakistan:
  - At least 21 militants are killed in airstrikes and a gunfight in Pakistan's northwestern
    tribal areas. (Sky News)
  Disasters and accidents:
  - Three people are killed in a monster truck accident in Haaksbergen in the Netherlands.
    (Sky News)
  2014 Mount Ontake eruption:
  - Dozens of people are rescued from Japan's Mount Ontake following a volcanic eruption,
    with at least 30 feared dead. This is the first deadly eruption in Japan since
    1991. (BBC)
  Politics and elections:
  - A student protester hurls the book Formosa Betrayed at President Ma Ying-jeou
    of Taiwan and hits the president; the Presidential Office condemns the act of
    violence. (AFP via Rappler)(Focus Taiwan)
  - António Costa, mayor of Lisbon, wins a landslide in the Portuguese Socialist Party
    prime ministerial primary against the incumbent António José Seguro.
  2014 Hong Kong protests:
  - Benny Tai announces that Occupy Central is launched as Hong Kong's government
    headquarters is being occupied by thousands of protesters. (The Guardian)
  - Hong Kong police resort to tear gas to disperse protesters but thousands remain.
    (Reuters UK)
  Sports:
  - Dennis Kimetto sets a new world record at the Berlin Marathon. (Daily Mail)
  - The European team wins the Ryder Cup, for the third straight time. (Associated
    Press)
  - In the NASCAR Chase for the Sprint Cup's first ever elimination round, Jeff Gordon
    wins the 2014 AAA 400 at Dover International Speedway while Kurt Busch, A. J.
    Allmendinger, Greg Biffle and Aric Almirola are eliminated from championship contention.
    (ESPN)
