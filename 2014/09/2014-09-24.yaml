Date: '2014-09-24'
Source_URI: Portal:Current events/2014 September 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and Syria
  - Algerian jihadist group Jund al-Khilafah release a video showing French tourist
    Hervé Gourdel being killed because of French participation in airstrikes against
    ISIS. (BBC)
  - ISIS militants blow up the Green Church in Tikrit, an important historic site
    in early Christianity. (The New York Times)
  Disasters and accidents:
  - At least 55 people are dead as a result of flash floods and mudslides in northeast
    India following days of heavy rain. (Sky News)
  International relations:
  - Japan imposes additional sanctions on Russia due to the Ukraine conflict and a
    visit by an aide of the President of Russia Vladimir Putin to a contested island
    off the coast off northern Japan. (Reuters)
  Law and crime:
  - Disappearance of Hannah Graham
  - A Virginia man is arrested in relation to the disappearance of Hannah Graham,
    a British student studying at the University of Virginia. (BBC)
  Politics and elections:
  - Venezuela's opposition parties named Jesus Torrealba, a 56-year-old journalist
    and teacher, to head their coalition ahead of 2015 parliamentary elections where
    they hope to weaken President Maduro's socialist government. (Voice of America)
  Science and technology:
  - India's Mars Orbiter Mission of ISRO successfully enters Mars orbit. (Reuters,
    AFP via ABC News Online)
  - After 32 years of service, the last operational HU-25 Falcon, the only jet to
    ever be a part of the US Coast Guard's air fleet, was retired in Corpus Christi,
    Texas. The Falcon played a significant role in search and rescue as well as counter
    drug missions and was a critical asset during the Gulf War. (KPTV.com)
  Sports:
  - In motorsport, the district attorney for Ontario County, New York announces that
    a grand jury decided not to bring criminal charges against NASCAR driver Tony
    Stewart in the death of Kevin Ward, Jr. during an August sprint car race. The
    prosecutor also reveals that Ward was under the influence of marijuana at the
    time of the accident. (ESPN)
