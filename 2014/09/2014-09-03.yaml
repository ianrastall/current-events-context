Date: '2014-09-03'
Source_URI: Portal:Current events/2014 September 3
Intelligence_Payload:
  2014 pro-Russian unrest in Ukraine:
  - The RIA Novosti news agency reports that Russian photojournalist Andrey Stenin
    has been found dead in Ukraine. It was discovered that he died 4 weeks ago. (RT)
  - Ukraine claims that the President of Ukraine Petro Poroshenko and the President
    of Russia Vladimir Putin have agreed to a "permanent ceasefire". Russia later
    denies these claims. (AFP via BrisbaneCourier-Mail), (ABC News Australia)
  - France halts delivery of the first of two Mistral-class amphibious assault ships
    to the Russian Navy due to circumstances in Ukraine. (BBC)
  Syrian Civil War:
  - A spokesman for the White House confirms that a video showing American journalist
    Steven Sotloff being beheaded is authentic. (Fox News/AP)
  - A spokesman for Israel's Ministry of Foreign Affairs confirms that Sotloff was
    a dual citizen of Israel and the U.S., a fact that had been concealed during his
    captivity, including by Sotloff himself. (USA Today)
  Business and economy:
  - Pharmacy chain CVS Pharmacy announces it will change its name to "CVS Health"
    and cease marketing tobacco products. (KPIX)
  International relations:
  - The President of the United States visits Estonia in a move to reassure the Baltic
    states ahead of a NATO summit in Wales. (CNN)
  - Palestinian President Mahmoud Abbas speaks of an offer suggested by an Egyptian
    official whom he didn't name, that implies Egypt donating 600 square miles of
    land in Sinai to be used as a solution to the problem of Palestinian refugees.
    Mahmoud Abbas said that he rejected that offer. (Times of Israel)
  Science and technology:
  - Two species of dendrogramma, found off the coast of Australia in 1986, are discovered
    to be unclassifiable in any existing phylum. (Guardian)
