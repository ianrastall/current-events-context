Date: '2014-09-23'
Source_URI: Portal:Current events/2014 September 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - 2014 military intervention against ISIS in Syria -- The United States and its
    allies commence air strikes against Islamic State in Syria with reports of at
    least 120 deaths. (BBC), (AFP via Yahoo! News)
  - Georgia denies media reports alleging that the country has offered hosting of
    a training center for anti-Islamic State Syrian rebel fighters and states that
    its involvement in the crisis will be limited to "humanitarian missions". (Civil
    Georgia)
  - The al-Nusra Front claims that its leader Abu Yousef al-Turki was killed in the
    air strikes. (CNN)
  - War in North-West Pakistan
  - Three people are killed in a bombing in Peshawar. (Pakistan Tribune)
  - Arab–Israeli conflict
  - Israel shoots down a Syrian Air Force Sukhoi Su-24 that had infiltrated its air
    space. (AP)
  - While trying to arrest two Hamas militants suspected of the abduction and murder
    of three Israeli teenagers in June, a shootout resulted in the deaths of the two
    suspects. (AP via Fox News)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organisation and the Government of Liberia introduce a controversial
    program to move infected people out of their homes and into de facto shelters.
    (Washington Post)
  International relations:
  - President of Russia Vladimir Putin warns in a letter to his Ukrainian counterpart
    Petro Poroshenko that Moscow will restrict Ukraine's access to Russian markets
    if Kiev implements any part of a trade agreement with the European Union. (Reuters)
  Video Games:
  - FIFA 15 on Microsoft Windows, Nintendo 3DS, PlayStation 3, PlayStation 4, PlayStation
    Vita, Wii, Xbox 360 and Xbox One,
