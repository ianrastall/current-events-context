Date: '2014-09-17'
Source_URI: Portal:Current events/2014 September 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - Islamist insurgency in Nigeria
  - Terrorism in Pakistan
  Syrian Civil War:
  - Nearly 50 people have been killed in two days of Syrian government airstrikes
    on the town of Talbiseh in Homs Governorate. (BBC)
  - A rocket attack by pro-Russian separatists in eastern Ukraine kills 10 civilians
    and injures 12 others in the village of Nyzhnya Krynka near Donetsk. (CNN)
  - At least 13 people are dead and 34 injured after Boko Haram gunmen attack a government
    college in the northern Nigerian city of Kano. (AFP via The Age)
  - Al-Qaeda announced that it had temporarily captured the Pakistani Navy frigate
    PNS Zulfiquar, in an attempt to attack the U.S fleet with onboard missiles, before
    it was recaptured by Pakistani Forces. (Reuters)
  Arts and culture:
  - Forensic teams from the University of Leicester reveal that King Richard III of
    England was killed at the Battle of Bosworth by a combination of blows to the
    skull and pelvis. (BBC)
  Disasters and accidents:
  - King Carl XVI Gustaf of Sweden is involved in a car accident on the Nockebybron
    bridge west of Stockholm. (The Local)
  - Evacuations continue from the area surrounding the Mayon Volcano in the Philippines
    as lava flows down the mountain ahead of a possible eruption. (AFP via ABC News
    Australia)
  International relations:
  - Xi Jinping, the President of China, travels to India to improve trade links and
    attempt to resolve decades old disputes over borders. (BBC)
  Fijian general election, 2014:
  - Voters in Fiji go to the polls for the first election since a coup in 2006 with
    coup leader Voreqe Bainimarama's Fiji First Party achieving 60 per cent of the
    vote. (ABC News Australia), (SBS)
  Sport:
  - The Minnesota Vikings National Football League team place star running back Adrian
    Peterson on the exempt/commissioner's permission list until his child abuse charges
    have been dealt with. (AP via ABC News America)
