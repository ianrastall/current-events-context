Date: '2014-09-02'
Source_URI: Portal:Current events/2014 September 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Iraqi insurgency (2011–present)
  Islamist insurgency in Nigeria:
  - Dozens of people are killed as Boko Haram captures the town of Bama. (Reuters)
  Somali Civil War (2009–present):
  - At least six people are reported killed after a U.S. drone strikes a convoy of
    vehicles believed to be carrying senior members of the militant group Al-Shabaab.
    (Al-Jazeera)
  Sinai insurgency:
  - Eleven Egyptian Army soldiers are killed in a roadside bomb attack in the Sinai
    Peninsula. (Al-Jazeera)
  Terrorism in Saudi Arabia:
  - Saudi Arabian authorities announce they have arrested 88 people on suspicions
    of being part of an al-Qaeda cell and plotting attacks inside and outside the
    kingdom. (Al-Jazeera)
  - ISIL releases an Internet video showing the beheading of American journalist Steven
    Sotloff. (Washington Post)
  - The United States sends an additional 250 US troops to protect American personnel.
    (Fox News)
  Disasters and accidents:
  - At least 11 people, including women and children, are killed and 18 others injured
    after an old structured building collapsed in Hyderabad, India. (Dawn)
  - Three army soldiers are killed in Kupwara district, India after a vehicle skidded
    off the road and fell into a gorge. (The Hindu)
  Law and crime:
  - Former Kenyan presidential candidate Quincy Timberlake is charged with murder
    in the Australian city of Brisbane. (Brisbane Times)
  - The FBI announces that it is investigating the major iCloud leak that exposed
    nude photos of Jennifer Lawrence, Kate Upton and Ariana Grande, among others.
    (MTV)
  Politics and elections:
  - The impeachment cases against Benigno Aquino III are scrapped by the Philippine
    Congress, where his party currently holds the majority. (Economic Times)
