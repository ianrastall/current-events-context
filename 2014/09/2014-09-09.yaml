Date: '2014-09-09'
Source_URI: Portal:Current events/2014 September 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Malaysia Airlines Flight 17
  - The Dutch Safety Board issues a preliminary report on Malaysia Airlines Flight
    17 which crashed on 17 July. It finds that the aircraft was probably hit by multiple
    "high-energy objects that penetrated the aircraft from outside” indicating a missile.
    (BBC), (The Australian)
  Disasters and accidents:
  - 2014 India–Pakistan floods
  - The death toll from the floods rises to at least 205 in Pakistan and 200 in India.
    (AP via ABC News America)
  - At least nine people are killed as a roof collapses in a mosque in the low income
    neighbourhood of Daroghawala in the Pakistani city of Lahore. (AFP via ABC News
    Australia)
  - A massive explosion occurs at a chemical plant in the German town of Ritterhude
    near Bremen. (AFP via ABC News Australia)
  Health:
  - 2014 Taiwan food scandal
  - Products from at least 900 food makers are being recalled after authorities say
    a factory illegally used 243 tonnes of recycled waste oil disguised as lard, some
    of which may have been exported overseas. (Taipei Times) (Bloomberg)
  Sports:
  - Former Formula One driver Michael Schumacher leaves hospital in Switzerland to
    go home after a skiing accident last December. (AP)
