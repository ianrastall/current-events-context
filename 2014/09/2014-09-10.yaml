Date: '2014-09-10'
Source_URI: Portal:Current events/2014 September 10
Intelligence_Payload:
  Moro insurgency in the Philippines:
  - Philippines President Benigno Aquino III submits a bill to the Congress of the
    Philippines that will give autonomy to Filipino Muslims in Bangsamoro and bring
    peace to Mindanao.(The New York Times) (Channel News Asia)
  Timeline of the Iraqi insurgency (2014):
  - The President of the United States Barack Obama authorises $25 million for "immediate
    military assistance" to the Iraqi government and Kurdistan Regional Government.
    He also outlines plans to expand US operations against Islamic State in Iraq and
    the Levant to Syria in a televised address to the nation. (Reuters)(Washington
    Examiner)
  Business and economic:
  - Gold extends a fresh three-month low as a stronger U.S. dollar sapped investor
    appetite for the metal. (The Wall Street Journal)
  2014 India–Pakistan floods:
  - The Chenab River overflows its banks threatening Pakistan's Jhang District. (AP)
  Sports:
  - In American football, a law enforcement official tells the Associated Press that
    in April 2014, he sent a video of Ray Rice punching his then-fiancée in an Atlantic
    City casino to the NFL office. This contradicts statements made by several league
    officials, including commissioner Roger Goodell, claiming they had not received
    or seen the video before it became public on September 8. (ESPN)
  - The first Invictus Games, a multi-sport event for sick and wounded service personnel,
    opens in London, beginning with an opening ceremony attended by Prince Harry,
    the Duke of Cambridge, Prince Charles and the Duchess of Cornwall. (BBC)
