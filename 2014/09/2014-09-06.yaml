Date: '2014-09-06'
Source_URI: Portal:Current events/2014 September 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - The United States says that it will not coordinate with Iran in the fight against
    the Islamic State of Iraq and Syria. (Business Standard)
  Russian military intervention in Ukraine:
  - In an official statement, Patriarch Filaret, who heads the Ukrainian Orthodox
    Church of the Kyivan Patriarchate, says that Russian President Vladimir Putin
    has fallen under the spell of Satan and faces eternal damnation to hell unless
    he repents. (Reuters)
  Syrian Civil War:
  - The Syrian Air Force targets a bakery and a training camp controlled by the Islamic
    State of Iraq and Syria in Ar-Raqqah, killing 25 people. (Reuters)
  Disasters:
  - Heavy monsoon rains and flash floods leave over 200 people dead across India and
    Pakistan. (AP via NBC)
  - China says two pilots conducting fighter jet take-off and landing tests for the
    Chinese aircraft carrier Liaoning were killed during trials. (AFP via Yahoo)
  - 2014 California wildfires
  - A wildfire is reported to have burned 300 acres near Yosemite National Park, forcing
    the evacuation of 700 nearby homes. (ABC News)
  West Africa Ebola virus epidemic:
  - Sierra Leone declares a four day nationwide lockdown to attempt to stop the spread
    of Ebola. (CBC)
  Law and crime:
  - Egypt charges former president Mohammed Morsi and nine others for leaking sensitive
    government information to Qatar. (Reuters)
  Politics and elections:
  - 2014 Scottish independence referendum
  - 'A surge for the yes-campaign following the TV debate Scotland Decides: Salmond
    versus Darling culminates with a poll from YouGov and The Sunday Times showing
    that a majority will vote in favor of Scottish independence. (YouGov)'
  Sports:
  - Auto racing
  - In the NASCAR Sprint Cup Series Federated Auto Parts 400 in Richmond, Virginia,
    Brad Keselowski wins, while Greg Biffle and Ryan Newman earn the final two positions
    in the championship-eligible Chase for the Sprint Cup. 6-time and defending champion
    Jimmie Johnson is briefly treated for dehydration following the event, and one
    spectator was arrested for disorderly conduct after climbing the catch fence surrounding
    the track during the race. (ESPN)
