Date: '2014-09-25'
Source_URI: Portal:Current events/2014 September 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Several Syrian rebel groups sign an agreement to unite in the fight against the
    Islamic State of Iraq and Syria and President Bashar al-Assad's forces. (CNN)
  Disasters and accidents:
  - A 6.2 magnitude earthquake strikes southern Alaska, causing minor damage and affecting
    the state's largest city, Anchorage. (Alaska Dispatch News)
  International relations:
  - Barack Obama, the President of the United States, signs a memorandum expanding
    the Pacific Remote Islands Marine National Monument to 490,000 square miles, making
    it the biggest marine preserve in the world. (AP via ABC News)
  Politics:
  - Eric Holder announces his resignation as Attorney General of the United States,
    effective from when the Senate confirms a successor. (NPR).
  - President of Ukraine Petro Poroshenko announces a wide-ranging reform program
    entitled Strategy 2020 to prepare Ukraine for applying for European Union membership
    in 2020. (BBC)
