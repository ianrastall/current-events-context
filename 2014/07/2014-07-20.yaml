Intelligence_Payload:
  Armed conflicts and attacks:
  - Post-civil war violence in Libya
  - Islamist militia renew their attack on Tripoli International Airport. (Sky News
    Australia)
  - Malaysia Airlines Flight 17 and 2014 pro-Russian unrest in Ukraine
  - Separatist rebels take all the 196 bodies from Malaysia Airlines Flight 17 to
    an undisclosed location. (AP)
  - Operation Protective Edge
  - Israel agrees to a two hour ceasefire in Shuja'iyya neighbourhood in the Gaza
    Strip at the request of the Red Cross ِafter a heavy firefight caused the death
    of more than 74 Palestinians and 13 Israel Defense Forces soldiers. (Haaretz)
  - At least 100 Palestinians and 13 Israel Army soldiers are killed in fighting,
    with the United Nations Security Council set to meet tomorrow. (AFP via Yahoo!
    News)
  Arts and culture:
  - Monty Python perform their last ever comedy show at the The O2 Arena in London.
    (Telegraph)
  Disasters:
  - 2014 Pacific typhoon season
  - The death toll from Typhoon Rammasun reaches 94 in the Philippines and 18 in southern
    China. (AP via Fox News)
  International Relations:
  - For the first time in RIMPAC's history a nation (China) sent a surveillance vessel
    while also participating in the naval exercises.(Reuters)
  Politics and elections:
  - Indonesian presidential election, 2014
  - Election results indicate that the Governor of Jakarta Joko Widodo has been elected
    as the President of Indonesia. (The Jakarta Globe)
  Sports:
  - In golf, Rory McIlroy of Northern Ireland wins the 2014 Open Championship (British
    Open) played at Royal Liverpool Golf Club, England. (AP)
  - In rugby union, a group of players for French club Clermont Auvergne are attacked
    by a gang with machetes, knives and swords in Millau. Three France internationals,
    Benjamin Kayser, Julien Pierre and Aurélien Rougerie, are hospitalized with non-life-threatening
    injuries. (The Independent)
