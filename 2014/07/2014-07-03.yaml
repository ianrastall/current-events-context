Date: '2014-07-03'
Source_URI: Portal:Current events/2014 July 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Post-coup unrest in Egypt (2013–14)
  - On the anniversary of Mohamed Morsi's ouster last year, three attacks took place
    in Kerdasa, Cairo and Assiut, during which one suspected militant was killed when
    the homemade bomb he was handling prematurely exploded. A late night bomb in Alexandria
    exploded in a passenger train, wounding nine people. (ABC News) (allAfrica)
  - One pro-Morsi demonstrator and a policeman were killed during clashes between
    protester and security forces in Giza and Helwan respectively. (The Telegraph)
  - 'Sinai insurgency: Government raids in Rafah killed 17 suspected extremist militants.
    (GlobalPost)'
  - Saudi Arabia deploys 30,000 soldiers to its border with Iraq after Iraqi government
    forces withdrew from the area. (Reuters)
  International relations:
  - Global surveillance disclosures
  - A 31-year-old male employee of Germany's intelligence service BND is arrested
    on suspicions of spying for the United States. The employee is suspected of spying
    on a German parliamentary committee investigating U.S. espionage. (BBC News)
  - The government of Tonga reveals a proposal to trade the disputed Minerva Reefs
    to Fiji in exchange for the Lau Islands, in an effort to settle a decades old
    territorial dispute between the two Pacific countries. (Fiji Times)
  - The government of Japan lifts some sanctions on North Korea following an agreement
    to re-investigate the fate of Japanese nationals abducted by North Korean agents
    in the 1970s and 1980s. (AP via Fox News)
  - The President of China, Xi Jinping, arrives in South Korea for talks with the
    President of South Korea, Park Geun-hye, days after a North Korean missile test.(Yonhap)
  - Russia starts limiting its import of meat from Moldova as a reaction to the European
    Union Association Agreement signed on 27 June. (Moscow Times)
  Politics and elections:
  - Valeriy Heletey takes office as the third Defense Minister of Ukraine after the
    2014 Ukrainian revolution, replacing Mykhailo Koval (Interfax Ukraine)
  - The German parliament approves the country's first minimum wage which will be
    set at 8,50 euros per hour from 2015. (BBC News)
