Date: '2014-07-09'
Source_URI: Portal:Current events/2014 July 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian conflict in Ukraine
  - A spokesman for Russia's Investigative Committee confirms that Nadiya Savchenko,
    the female military aviator who was captured by pro-Russian separatists on June
    18, is now held in Voronezh, Russia, where she has been charged with killing two
    Russian journalists. (Radio Free Europe), (AP)
  - Gaza–Israel conflict
  - The Israeli Army intensifies its attack on the Hamas controlled Gaza Strip with
    130 attacks on key sites such as command centers and rocket launchers after over
    250 rockets and mortars were fired into Israel over the past week. Hamas rockets
    reached over 100 km into Israeli territory. (AP)
  - The death toll from Operation Protective Edge in the Gaza Strip reaches 40. (ABC
    News Australia)
  - Iraqi insurgency (post-U.S. withdrawal)
  - Iraqi security forces find the bodies of 53 men shot recently in Hamza south of
    Baghdad. (BBC News)
  - Somali Civil War (2009–present)
  - Somalia's police and intelligence chiefs were sacked after Al-Shabaab's attack
    on the Presidential palace yesterday. (BBC News)
  Business and economy:
  - Minutes from the last meeting of the U.S. central bank, the Federal Reserve, indicate
    that it will end its program of bond purchases, also known as quantitative easing,
    this October. (Reuters)
  Disasters:
  - 2014 Pacific typhoon season
  - Typhoon Neoguri leaves two dead on Okinawa as it departs for Japan's main islands
    threatening heavy rain. (Reuters)
  International relations:
  - South Korea claims that North Korea has fired two short range missiles into the
    ocean to the east of the Korean Peninsula. (CNN)
  Law and crime:
  - Former Mayor of the American city of New Orleans, Louisiana Ray Nagin (D) is sentenced
    to ten years in prison for corruption, money laundering and other related offences.
    (USA Today) (New York Times)
  - 2014 Harris County shooting
  - A gunman in Spring, Texas, a suburb of Houston, kills six people including four
    children.
  Politics and elections:
  - Indonesian presidential election, 2014
  - Voters in Indonesia go to the polls for a presidential election. (ABC News Australia)
  Science and technology:
  - Russia's Angara rocket successfully makes its maiden flight. (BBC News) (Moscow
    Times) (RIA Novosti)
  Sports:
  - 2014 FIFA World Cup
  - Argentina defeats The Netherlands 4-2 after a penalty shootout to advance to the
    2014 FIFA World Cup Final. (Los Angeles Times)
