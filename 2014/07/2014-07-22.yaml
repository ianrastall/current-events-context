Date: '2014-07-22'
Source_URI: Portal:Current events/2014 July 22
Intelligence_Payload:
  Operation Protective Edge:
  - For the second time, an inspection by United Nations officials reveals rockets
    being stored in a UNWRA run school in Gaza. Rockets discovered in a school a week
    ago were returned to Hamas by UNWRA workers. (Times of Israel)
  Donbass war:
  - The International Committee of the Red Cross (ICRC), guardian of the Geneva Convention,
    makes a confidential legal assessment that Ukraine is officially in a war, Western
    diplomats and officials say, opening the door to possible war crimes prosecutions,
    including over the downing of Malaysia Airlines Flight 17. (Reuters)
  Taliban insurgency:
  - A Taliban suicide bomber blows himself up outside Kabul International Airport
    killing three foreign advisers and an Afghan interpreter. (Reuters)
  Malaysia Airlines Flight 17:
  - Forensic experts in Kharkiv, Ukraine begin identifying the victims of the crash,
    with only 200 bodies delivered out of the 282 pro-Russian separatists claim to
    have sent. (BBC News)
  Iraqi insurgency (2011–present):
  - A suicide bombing in Baghdad kills at least 21 people. (AP via Fox News)
  2014 Pacific typhoon season:
  - Typhoon Matmo (Henry) is expected to make landfall over Taiwan en route to eastern
    China later in the week. (Weather Channel)
  2014 Moscow Metro derailment:
  - Ivan Besedin is fired as the head of the Moscow Metro as a result of the derailment
    that cost 22 lives. (AP)
  Health:
  - Thirty thousand people in the city of Yumen in China's Gansu province have been
    prevented from leaving and 151 people placed in quarantine after a man dies of
    bubonic plague last week. (Wires via Sydney Morning Herald)
  International Relations:
  - The European Union agrees to impose new sanctions on Russia, expanding a list
    of Russian entities and individuals subject to asset freezes and travel bans and
    threatens to target vast sectors of the Russian economy if Moscow does not act
    swiftly to rein in rebels believed to have shot down a Malaysia Airlines plane
    over eastern Ukraine. (Washington Post)
  Law and crime:
  - South Korean police advise that they have positively identified a body found on
    June 12 as Yoo Byung-eun wanted for his alleged role in the sinking of the MV
    Sewol. (New York Times)
  - Panels of the United States Fourth and D.C. (Halbig v. Burwell) Circuit Courts
    make contradictory rulings as to whether people who enroll in federal exchanges
    under the Affordable Care Act (Obamacare) can receive subsidies. (Washington Post)
  Indonesian presidential election, 2014:
  - Joko Widodo is officially elected as the new president of Indonesia (The Jakarta
    Post)
  Sports:
  - Estimate, owned by Queen Elizabeth II and a winner of several high-profile races
    including the Ascot Gold Cup in 2013, tests positive for morphine after this year's
    Gold Cup at Royal Ascot. (The Telegraph)
