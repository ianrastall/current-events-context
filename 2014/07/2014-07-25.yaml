Date: '2014-07-25'
Source_URI: Portal:Current events/2014 July 25
Intelligence_Payload:
  Accidents:
  - An Indian Air Force helicopter crashes in the Sitapur area of Uttar Pradesh, killing
    seven people. (Patrika Group)
  2014 Israel–Gaza conflict:
  - A cease fire deal proposed by U.S. Secretary of State John Kerry is rejected by
    Israel and not commented on by Hamas. Israel agrees to a uni-lateral 12 hour humanitarian
    ceasefire as negotiations continue. (Times of Israel)
  - Israel Police admits that the kidnapping of the three teenagers did not occur
    on the orders of, or with the knowledge of the Hamas leadership and that the crime
    was the action of a "lone cell". (New York) (The Guardian)
  2014 pro-Russian insurgency in Ukraine:
  - U.S. President Barack Obama speaks by phone with Netherlands Prime Minister Mark
    Rutte and they both agree on the need to impose more sanctions on Russia for continuing
    to arm pro-Russian separatists in Ukraine. (Reuters)
  Syrian Civil War:
  - The Jordanian Air Force shoots down a drone as it flew over the northeastern Mafraq
    Governorate near the border with Syria, a security official said. The official
    said the drone flew near the Zaatari refugee camp, which is home to around 100,000
    Syrian refugees. (CNA)
  - Islamic State of Iraq and the Levant forces claim to have killed at least fifty
    members of the Syrian Army, summarily killing many of them. (AFP via Global Post)
  Business and economy:
  - British broadcaster BSkyB buys 21st Century Fox's stake in Sky Italia and Sky
    Deutschland in a $7 billion deal. (The Wrap)
  Law and crime:
  - Vietnamese authorities confirm that a shipment of Vietnamese-owned air-to-air
    missile parts bound for Ukraine was detained by Finland on June 24 after raising
    concerns the consignment of military hardware violated arms-export regulations.
    (The Wall Street Journal)
  Food safety incidents in China:
  - McDonald's restaurants stop selling Chicken McNuggets and some other chicken products
    in Hong Kong, China and Japan from Shanghai Husi Foods that allegedly sold out-of-date
    items to fast food restaurants. (BBC News)
  Politics and elections:
  - Edits to Wikipedia made via computers within the United States Congress are blocked
    for ten days after a series of disruptive edits on pages created by congressional
    staff members. (The Guardian)
