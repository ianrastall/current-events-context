Date: '2014-07-19'
Source_URI: Portal:Current events/2014 July 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Post-coup unrest in Egypt (2013–14)
  War in North-West Pakistan:
  - A US drone strike kills 11 insurgents in a Tehrik-i-Taliban Pakistan compound
    in North Waziristan. (AFP via Global Post)
  Operation Protective Edge:
  - According to Hamas the death toll from Israel's offensive against the Gaza Strip
    exceeds 300 although it is not clear how many are civilians or militants. Israel
    conducted over 2500 airstrikes and artillery strikes during the operation while
    thousands of rockets have been fired into Israel. (AFP via SBS)
  Iraqi insurgency (post-U.S. withdrawal):
  - Three bombs explode in Baghdad killing at least 15 people. (AP via Daily Mail)
  - Gunmen in Egypt's western desert province of New Valley Governorate attack a military
    checkpoint, killing at least 21 soldiers. Egypt reportedly declares a state of
    emergency on its border with Sudan. (Reuters) (Al Arabiya)
  Disasters and accidents:
  - Buses from Poland and Ukraine crash outside the German city of Dresden resulting
    in at least nine deaths and 40 people injured. (AP)
  - At least 38 people are dead after a bus collides with a van carrying flammable
    liquids in China's Hunan province. (AFP via ABC News Australia)
  - 2014 Pacific typhoon season
  - Typhoon Rammasun has killed at least 14 people in southern China since it arrived
    late on Friday. (Reuters)
  International relations:
  - Russia bans 13 Americans including Congressman Jim Moran, Rear Adm. Richard Butler
    and Lynndie England in response to the United States banning Russians for human
    rights abuses. (AP)
  Law and crime:
  - A Florida court awards $23.6 billion in punitive damages against R.J. Reynolds
    Tobacco Company in a case of a longtime smoker who died in 1996. (AP)
