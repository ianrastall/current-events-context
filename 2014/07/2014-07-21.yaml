Date: '2014-07-21'
Source_URI: Portal:Current events/2014 July 21
Intelligence_Payload:
  Armed conflict and attacks:
  - Operation Protective Edge
  - The United Nations Security Council calls for an immediate ceasefire on the Gaza
    Strip after an emergency meeting. (BBC News)
  - 2014 pro-Russian unrest in Ukraine
  - Fighting restarts near Donetsk as international investigators arrive to examine
    the crash of Malaysia Airlines Flight 17. (Reuters)
  - The Prime Minister of Malaysia Najib Razak states that pro-Russian separatists
    agree to hand over the black box flight recorders to a Malaysian investigation
    team. (Washington Post)
  - The United Nations Security Council unanimously supports an Australian proposed
    resolution for an international investigation and an end to hostilities near the
    site. (AP via Fox News)
  - Iraqi insurgency (2011–present)
  - Ten people are killed in an Iraqi Air Force air strike on the rebel-held town
    of Hawija. (Reuters)
  Business and economy:
  - Russian company Severstal sells two steel works in the US to AK Steel and Steel
    Dynamics for US$2.3 billion. (AP)
  Disasters and accidents:
  - 2014 Pacific typhoon season
  - The death toll from Typhoon Rammasun rises to 26 in southern China and 11 in northern
    Vietnam. (CTV News)
  - A bus crashes into a ravine in Pakistan's Kashmir region killing 16 people with
    37 others injured. (AFP via Global Post)
  Law and crime:
  - Boston Marathon bombings
  - Azamat Tazhayakov, a friend of accused marathon bomber Dzhokhar Tsarnaev is found
    guilty of obstruction of justice and conspiracy for trying to hide evidence during
    the ongoing case. (MSN)
