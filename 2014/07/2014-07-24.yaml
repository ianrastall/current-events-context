Date: '2014-07-24'
Source_URI: Portal:Current events/2014 July 24
Intelligence_Payload:
  Armed conflict and attacks:
  - Iraqi insurgency (2011–present)
  - Israel-Gaza conflict
  - In Herat, Afghanistan, two Finnish women working for a foreign aid organization
    are shot and killed. (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - Ukrainian Government forces recapture the city of Lysychansk from pro-Russian
    rebels. (Kyiv Post)
  - Pro-Russian separatists continue to control the strategic border crossing near
    Izvaryne, Luhansk Oblast, which they are believed to use to transport weapons
    and reinforcements from Russia into Ukraine. (Kyiv Post)
  - The United States says it has evidence that Russia is firing artillery across
    the border into Ukraine to target Ukrainian military positions in the conflict
    against pro-Russian separatists. (Reuters)
  - More wreckage from Malaysia Airlines Flight 17 is discovered together with more
    bodies. (The Australian)
  - Gunmen attack a prisoner convoy north of Baghdad resulting in the death of 52
    prisoners and eight Iraqi Army soldiers. (AFP via Fox News)
  - Twin car bombs kill at least 13 people in central Baghdad. (NDTV)
  - At least 15 Palestinians are killed and 200 injured in a strike on a UNRWA-run
    school in Beit Hanoun, northern Gaza, crowded with hundreds of displaced civilians.
    UN condemns the shelling, saying it asked IDF for time to evacuate civilians.
    (The Guardian)
  - Three Palestinians are shot dead by Israeli security forces at a 10,000 person
    protest on the West Bank that had turned violent with molotov cocktails and rocks
    being thrown. Israeli forces reported being fired upon and having protesters trying
    to grab their weapons.(Sky News)
  Disasters and accidents:
  - Air Algérie Flight 5017 loses contact with air traffic controllers 50 minutes
    after takeoff. It was travelling between Ouagadougou, Burkina Faso and Algiers
    with 116 people on board. The wreckage is later found in Mali. (AFP via Sydney
    Morning Herald) (NBC News) (NBC News) (Reuters)
  - Eighteen people including 16 schoolchildren die after a train collides with a
    bus in the Medak district of the Indian state of Telangana. (PTI via Business
    Standard)
  International relations:
  - The United States Federal Aviation Administration lifts its ban on aircraft travelling
    to and from Israel imposed due to concerns about Hamas rockets. (Time)
  - Three American citizens have been detained in Iran this week including Washington
    Post correspondent Jason Rezaian. Rezaian's Iranian wife Yeganeh Salehi has also
    been detained. (Washington Post)
  - The European Court for Human Rights censures Poland over CIA renditions. (The
    New York Times)
  Politics and elections:
  - Arseniy Yatsenyuk resigns as Ukraine's Prime minister after the ruling coalition
    in parliament collapsed, accusing lawmakers of imperiling the nation by putting
    politics above urgent needs during wartime. (Washington Post)
  - The Deputy Prime Minister of Ukraine, Volodymyr Hroisman, is appointed to the
    post of acting prime minister of Ukraine. (Kyiv Post)
  - Fuad Masum is elected as the 7th President of Iraq. (The Washington Post) (BBC
    News)
  - Reuven Rivlin is sworn in as the 10th President of Israel. (IANS via Biharprabha)
  Sports:
  - 2014 Commonwealth Games
  - In swimming, the Australian women's team in the 4x100m freestyle relay of Bronte
    Campbell, Cate Campbell, Emma McKeon and Melanie Schlanger sets a new world record
    of 3:30:98. (Daily Telegraph)
