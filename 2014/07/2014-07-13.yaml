Date: '2014-07-13'
Source_URI: Portal:Current events/2014 July 13
Intelligence_Payload:
  Operation Protective Edge:
  - Israel Defense Forces special forces raid a missile launch site in the Gaza Strip
    and destroy it. (CNN)
  Post-civil war violence in Libya:
  - Islamist militias attack the Zintan Brigade which controls Tripoli International
    Airport triggering fierce clashes that result in six deaths. (AFP via France 24)
    (AP)
  Syrian Civil War:
  - At least four people are killed as Hezbollah clashes with Syrian rebels on the
    border between Lebanon and Syria. (AFP via Global Post)
  International relations:
  - Japan's Defence Ministry claims that North Korea has fired two ballistic missiles
    into the Sea of Japan. (Yonhap News)
  - Pope Francis appeals for peace in the Holy Land following his Angelus address
    at St. Peter’s Square. He exhorts all interested parties and all those with political
    responsibility not to spare efforts to achieve the cessation of all hostilities
    and the desired peace for the good of all. (Vatican Radio)
  Law and crime:
  - Argentinian police arrest at least 30 people in downtown Buenos Aires after Argentina
    loses the 2014 World Cup final in Brazil. (CNN)
  Slovenian parliamentary election, 2014:
  - The new centrist Party of Miro Cerar wins the Slovenian elections by a landslide
    while both the Social Democrats and the centre-right parties suffer their worst-ever
    defeat, and the winner of the previous elections, Positive Slovenia, does not
    even pass the electoral threshold. (Slovenia Times)
  2014 FIFA World Cup:
  - Germany defeats Argentina 1-0 in extra time in the 2014 FIFA World Cup Final at
    the Maracanã Stadium in the Brazilian city of Rio de Janeiro, with Mario Gotze
    scoring the winning goal. (ABC News Australia) (BBC Sport)
  - Lionel Messi of Argentina wins the Golden Ball for player of the tournament while
    Colombia player James Rodriguez wins the Golden Boot for highest scorer and Manuel
    Neuer of Germany wins the Golden Gloves for best goalkeeper. (ABC News Australia)
  2014 Women's British Open:
  - American golfer Mo Martin wins the 2014 Women's British Open held at the Royal
    Birkdale Golf Club in Southport, England. (Daily Telegraph)
