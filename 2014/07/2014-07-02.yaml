Date: '2014-07-02'
Source_URI: Portal:Current events/2014 July 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgency
  - A suicide bomber attacks an Afghan National Army air force bus in Kabul killing
    at least five people. (BBC News)
  - Israeli–Palestinian conflict
  - A missing Palestinian boy in Shuafat is rumored to be murdered in revenge for
    the kidnapping and murder of Israeli teenagers, clashes break out. (Jerusalem
    Post)
  Business and economy:
  - Roche Holding AG says that its US-based Genentech subsidiary will purchase American
    biotechnology company Seragon Pharmaceuticals, Inc for up to $1.725 billion in
    cash and contingency payments. (AP)
  Disasters:
  - 2014 Atlantic hurricane season
  - Tropical Storm Arthur heads towards the US coast with a hurricane warning in place
    for the state of North Carolina. A mandatory evacuation is ordered for Hatteras
    Island in the Outer Banks. (AP)
  - Widespread flooding in the Canadian provinces of Manitoba and Saskatchewan leads
    to the declaration of states of emergencies in 87 municipalities. (CBC)
  - Eleven people are injured including two in critical condition after a food truck
    explodes due to a ruptured propane tank in northern Philadelphia. (Fox)
  - At least 70 asylum seekers drown at sea after their boat sinks off the coast of
    Sicily with 27 rescued. (BBC News)
  Health:
  - 2014 West Africa Ebola outbreak
  - The World Health Organisation convenes an emergency meeting of health ministers
    from 11 countries in Accra, Ghana, to discuss ways of combatting the outbreak
    which has so far infected 763 people, leading to 468 deaths. (BBC News)
  International relations:
  - Togo formally recognizes Kosovo. (Ministry of Foreign Affairs of the Republic
    of Kosovo)
  - Former British Prime Minister Tony Blair agrees to become Egyptian President Abdel
    Fattah el-Sisi's economic adviser as part of a program funded by the United Arab
    Emirates. (The Guardian)
  - South Korea reports that North Korea fired two short range missiles into the Pacific
    Ocean from the coastal city of Wonsan. (AP)
  - A Danish ship carrying hundreds of tons of Syrian chemical weapons arrives in
    the Italian port of Gioia Tauro prior to a rendezvous with an American ship that
    will destroy the weapons at sea. (AP)
  Law and crime:
  - Former President of France Nicolas Sarkozy is charged with corruption and influence
    peddling. (AFP via Yahoo! News Australia)
  Politics and elections:
  - Luxembourg's Viviane Reding, Finland's Olli Rehn, Italy's Antonio Tajani and Poland's
    Janusz Lewandowski step down as EU commissioners in order to take office as newly
    elected members of the European Parliament. (EUobserver)
  - Hundreds of Hong Kong Police Force officers clear sit-in protesters from Hong
    Kong's Central District after the biggest pro-democracy rally in a decade yesterday.
    Over 500 people are arrested for illegal assembly and disrupting traffic in Chater
    Road. (Bloomberg), (AP)
  Science and technology:
  - Fabien Cousteau and two crew members resurface after 31 days living underwater
    and collecting scientific data. (ABC News)
