Date: '2014-07-14'
Source_URI: Portal:Current events/2014 July 14
Intelligence_Payload:
  Korean maritime border incidents:
  - South Korea claims that North Korea has fired dozens of artillery shells into
    the sea near the disputed border. (AP via Fox News)
  Sinai insurgency:
  - One soldier and seven civilians, including two children, are killed in two successive
    mortar blasts in Egypt's city of Al-Arish in the Sinai Peninsula. (Indian Express)
  2014 pro-Russian unrest in Ukraine:
  - A Ukrainian Antonov An-26 military transport plane was shot down near Luhansk
    where there is currently heavy fighting between Ukrainian forces and separatist
    rebels. Ukraine claims that it was shot down by a rocket fired from Russia. (Interfax)
    (AP via CBC)
  - Ukraine and Russia trade charges of alleged violations of the border with the
    Russians claiming that shell fired from the Ukraine killed a Russian man in a
    border town on the weekend. (Reuters)
  Law and crime:
  - Anti-Israel protesters in Paris, France, surround a synagogue and chant anti-Semitic
    slogans resulting in a clash with police leaving three temple members in the hospital.
    Additional anti-Semitic attacks take place across the country including the firebombing
    of a synagogue and the assault of a 17-year-old girl. (Jerusalem Post)
  Arts and culture:
  - The General Synod of the Church of England meeting in York votes to allow women
    to become bishops. (BBC News)
  Business and economy:
  - South Korean electronics company Samsung suspends business with one of its Chinese
    suppliers after finding possible evidence of use of child labour in one of its
    plants. (AFP via NDTV)
  - Shareholders in Australian retailer David Jones Limited agree to accept a $2 billion
    takeover from South African retailer Woolworths. (Bloomberg via Business Week)
  Disasters and accidents:
  - Costa Concordia disaster
  - Efforts to refloat the Italian cruise ship Costa Concordia begin off the coast
    of Italy two and a half years after it sank. (Sky News Australia)
  2014 West Africa Ebola outbreak:
  - The ebola virus outbreak in West Africa continues to get worse with the death
    toll now exceeding 500. (AP)
  Politics and elections:
  - William Hague stands down as the United Kingdom Secretary of State for Foreign
    and Commonwealth Affairs as part of a cabinet reshuffle by Prime Minister David
    Cameron. (AFP via ABC News Australia)
