Date: '2014-07-11'
Source_URI: Portal:Current events/2014 July 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian unrest in Ukraine
  - Ukrainian forces in recently reclaimed city of Sloviansk discover documents that
    show pro-Russian insurgent leader Igor Strelkov handed down at least four death
    sentences under a Stalin-era law of 1941. (Kyiv Post)
  - Twenty-three Ukrainian Army soldiers die as rebels fire a BM-21 Grad missile at
    an armoured brigade near the Russian border. (Reuters)
  - Iraqi insurgency (post-U.S. withdrawal)
  - Kurdish MPs withdraw from the central government following a dispute with the
    Prime Minister Nouri al-Maliki with Kurdish forces taking over control of two
    northern oil fields at Bai Hassan and Kirkuk. (BBC News)
  Health:
  - The aid group Save the Children warns that a cholera outbreak in South Sudan,
    which has so far killed 60 people, threatens thousands of lives. (AP)
  - An experimental vaccine for dengue fever has been developed in Manila. (BBC News)
  Law and crime:
  - The People's Republic of China jails 32 people for allegedly downloading and spreading
    violent Islamist material via the Internet to Xinjiang. (AP via Washington Post)
  Sport:
  - Four-time NBA MVP LeBron James, who opted out of the final two years of his contract
    with the Miami Heat, announces that he will return to his hometown team the Cleveland
    Cavaliers, where he played for the first seven seasons of his NBA career. (Sports
    Illustrated)
  - 2014 Sochi Winter Olympics
  - Four Slovenian skiing officials are suspended for allegedly rigging results so
    that violinist Vanessa-Mae could compete for Thailand in alpine skiing. (AP)
