Date: '2014-07-27'
Source_URI: Portal:Current events/2014 July 27
Intelligence_Payload:
  2014 Israel–Gaza conflict:
  - Israel extends a humanitarian ceasefire on the Gaza Strip but Hamas refuses to
    do so unless Israel withdraws its tanks. Fighting has resumed. (PTI via Business
    Standard)
  - An Israel Defence Force soldier dies from mortar fire as Hamas fires more rockets
    at Israel. The Israeli ceasefire ends early due to continued Hamas attacks. (Haaretz)
    (NBC News)
  Post-civil war violence in Libya:
  - Intense fighting in Benghazi between the Libyan Army and local Islamist militias
    leaves 38 dead, mostly soldiers. (AFP via Yahoo! News)
  - A rocket attack in Libya's capital Tripoli kills 23 Egyptian workers amid increased
    fighting in the city for control of an airport. (Independent Online)
  Islamist insurgency in Nigeria:
  - Gunmen believed to be members of Boko Haram abduct the wife of Deputy Prime Minister
    of Cameroon Amadou Ali. (CNN)
  Arts and culture:
  - Cardinal Francesco Marchisano, formerly a priest of the Archdiocese of Turin,
    dies at the age of 85. With the cardinal's death, there are now 212 members of
    the College of Cardinals, of whom 118 are eligible to take part in the election
    of a pope. (Vatican Radio)
  Law and crime:
  - Five family members are shot dead in a home in Saco, Maine, U.S. (AP via SFGate)
  Science:
  - The population of the Philippines reaches 100 million. (AFP via Yahoo! News)
  Sports:
  - 'In American baseball, the National Baseball Hall of Fame inducts six new members
    for 2014: Greg Maddux, Tom Glavine, Frank Thomas, Bobby Cox, Tony La Russa and
    Joe Torre. (TSN)'
  2014 Tour de France:
  - In cycling, Vincenzo Nibali of Italy wins the Tour de France, becoming the sixth
    cyclist to win all three grand tours including the Vuelta a España and Giro d'Italia.
    (NBC Sports)
