Date: '2014-07-30'
Source_URI: Portal:Current events/2014 July 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Post-civil war violence in Libya
  '2014 pro-Russian unrest in Ukraine: War in Donbass':
  - Fighting intensifies in the east as Ukraine forces recapture control of the strategic
    town of Avdiivka from pro-Russian insurgents. (BBC News)
  - Islamist militias capture a special forces base in Benghazi. (BBC News)
  2014 Israel–Gaza conflict:
  - Israeli shelling of a UNRWA school in Jabaliya refugee camp kills at least 19
    Palestinian civilians and wounds scores more. (Al Jazeera)
  - Three IDF soldiers are killed and fifteen injured when trying to disarm an IED
    rigged smuggling tunnel found at a UNRWA run health clinic in Khan Younis. Since
    the start of Operation Protective Edge 56 IDF soldiers and over 1200 Palestinian
    civilians and militants have been killed. (Times of Israel)
  - Iran's Supreme Leader, Ayatollah Ali Khamenei, offers to donate weapons to the
    West Bank to better hit Israeli cities such as Tel Aviv. (Ynet)
  Business and economy:
  - Analysts of Morgan Stanley predict that Russian President Vladimir Putin would
    soon block the transit of gas through Ukraine to Europe to retaliate against the
    world for imposing economic sanctions on Russia. (Business Insider)
  - Argentina is required to pay $1.3bn to investors who bought its bonds at a big
    discount after a default in 2001-02 by the end of today or be in default again.
    (BBC News)
  - The U.S. District Court in Manhattan, via Judge Jed Rakoff, orders Bank of America
    to pay $1.27 billion in damages relating to the housing bubble-era actions of
    what is now its Countrywide unit. (Reuters)
  Disasters and accidents:
  - One hundred and fifty people are trapped after a landslide in the village of Ambe
    in the Pune district in India's Maharashtra state with 20 killed. (IBN Live),
    (The Hindu)
  - A fire breaks out on Eastbourne Pier in East Sussex, destroying the arcade. (BBC
    News)
  Health:
  - 2014 West Africa Ebola outbreak
  - Liberia closes schools and quarantines communities in order to stop the spread
    of the Ebola virus that has claimed 672 lives in West Africa. (Reuters via ABC
    News Australia)
