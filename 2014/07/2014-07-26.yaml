Date: '2014-07-26'
Source_URI: Portal:Current events/2014 July 26
Intelligence_Payload:
  2014 Israel–Gaza conflict:
  - Israel agrees to pause its offensive on the Gaza Strip while negotiations continue
    for a broader ceasefire while Hamas violates the ceasefire. (New York Times)
  - The death toll from the offensive exceeds 900. (AFP via Manila Bulletin)
  - Fox News reports that Israel has extended the ceasefire by four hours with further
    extensions under consideration while Hamas rejects an extension. (Fox News)
  Post-civil war violence in Libya:
  - The United States evacuates its embassy in Tripoli amid concerns about deteriorating
    security conditions. (AP via ABC)
  Taliban insurgency:
  - Insurgents stop minibuses in Ghōr Province, Afghanistan and execute 14 Shiite
    Muslims. (AP via New York Daily News)
  2014 West Africa Ebola outbreak:
  - Dr. Kent Brantly, the medical director for Samaritan's Purse in Liberia, tests
    positive for the virus. (AP)
  Law and crime:
  - Turkey's state run Anadolu Agency reports that twenty police officers have been
    charged with illegal wiretaps of officials including the Prime Minister of Turkey
    Recep Tayyip Erdoğan. Another 49 are awaiting questioning. (AP via Houston Chronicle)
  Sports:
  - In horseracing, filly Taghrooda wins the King George VI and Queen Elizabeth Stakes
    by 3 lengths. (BBC Sport)
