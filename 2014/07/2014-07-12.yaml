Date: '2014-07-12'
Source_URI: Portal:Current events/2014 July 12
Intelligence_Payload:
  Operation Protective Edge:
  - The death toll in the Gaza Strip since the beginning of Israeli air strikes reaches
    120. The IAF has performed over 1,300 airstrikes since the beginning of the operation.
    (AP)
  War in North-West Pakistan:
  - A cross border attack by the Afghan Taliban kills three Pakistan Army soldiers
    in Bajaur Agency of the Federally Administered Tribal Areas. (AFP via Business
    Recorder)
  Iraqi insurgency (post-U.S. withdrawal):
  - Gunmen kill 29 people in an apartment building in East Baghdad, including twenty
    women. (Reuters)
  - Twin bombings in the city of Kirkuk kill at least 28 people. (AFP via Daily Star)
  Disasters:
  - An explosion in a shop in Istanbul, Turkey's largest city, leaves many injured.
    (World Bulletin)
  2014 pro-Russian unrest in Ukraine:
  - The European Union imposes sanctions on Aleksandr Borodai and ten other pro-Russian
    leaders including travel bans and asset freezes. (Reuters via The Globe and Mail)
  Afghan presidential election, 2014:
  - The disputed Afghan presidential election is to be recounted in full following
    an agreement between the two leading candidates Abdullah Abdullah and Ashraf Ghani.
    (Reuters)
  2014 FIFA World Cup:
  - The Netherlands beats Brazil 3-0 in the Third Place playoff. (Reuters via Yahoo!
    Sports Australia) (Daily Mail)
  2014 IndyCar Series:
  - Ryan Hunter-Reay wins the Iowa Corn 300 at Iowa Speedway.
