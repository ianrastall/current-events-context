Date: '2014-07-16'
Source_URI: Portal:Current events/2014 July 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - A ceasefire violation by Pakistan; forces on Indo-Pak border ends with one BSF
    soldier killed. (Patrika Group)
  2014 insurgency in Donbass:
  - The US widens sanctions against Russia, targeting major banks and energy companies,
    Russian defense industry, and individuals it said were responsible for the continuing
    support of separatists battling government forces in eastern Ukraine. (The New
    York Times) (U.S. Department of Treasury)
  - The Chancellor of Germany, Angela Merkel, criticises Russia for failing to meet
    commitments to end the violence in Ukraine, and said Russia might face further
    EU sanctions. (BBC News)
  War in North-West Pakistan:
  - A drone strike kills at least 20 people in North Waziristan near the border with
    Afghanistan. (Pakistan Express Tribune)
  - Pakistan Air Force air strikes kill at least 35 militants fleeing from North Waziristan.
    (PTI via Business Standard)
  Operation Protective Edge:
  - Israeli shelling kills four children playing in a port next to Al-Deira hotel
    in Gaza, base to many journalists. (The Guardian)
  Business and economy:
  - Japan's Nuclear Regulation Authority grants allowance to restart two nuclear plants,
    the first such a move in the country after the Fukushima disaster. (BBC News)
  2014 Pacific typhoon season:
  - Typhoon Rammasun (Glenda) hits the Philippines island of Luzon causing extensive
    damage and at least ten deaths. (CNN) (Reuters via NBC)
  Politics and elections:
  - 'The European Parliament approves four new European commissioners: Jyrki Katainen
    as Commissioner for Economic and Monetary Affairs and the Euro, Ferdinando Nelli
    Feroci as Commissioner for Industry and Entrepreneurship, Martine Reicherts as
    Commissioner for Justice, Fundamental Rights and Citizenship, and Jacek Dominik
    as Commissioner for Financial Programming and Budget. (European Parliament)'
  - Bashar Assad is sworn in to serve his third term as President of Syria. (AP via
    Washington Post)
  - Russia and Cuba agree on reopening the biggest soviet era espionage base outside
    of Russia. (Business Insider)
