Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Six Israeli nationals are arrested in relation to the murder of Muhammad Abu Khdeir
    as Palestinians continue to riot and clash with police in East Jerusalem and Nazareth.
    (Jerusalem Post)
  - In response to over 25 rockets fired from Gaza into Israel on Sunday, the IAF
    carries out airstrikes killing six Hamas militants. Over 150 rockets and mortars
    have been fired into Israeli civilian areas over the past three weeks. (Jerusalem
    Post)
  Law and crime:
  - Moldova's Council for TV and Radio suspends the broadcast license of the Russian
    TV channel Russia-24 and places sanctions on four Moldovan broadcasters for lack
    of pluralism. (Radio Free Europe/Radio Liberty)
