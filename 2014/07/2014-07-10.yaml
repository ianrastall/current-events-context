Date: '2014-07-10'
Source_URI: Portal:Current events/2014 July 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian conflict in Ukraine
  - Ukrainian forces reclaim control of the city of Siversk from pro-Russian insurgents,
    and move on to consolidate their position by repairing damaged infrastructure
    and funneling aid into recently recaptured territory. (Wall Street Journal)
  - Gaza–Israel conflict
  - A BBC investigation determines that photographs circulating on social media sites
    allegedly covering the airstrikes on Gaza include photographs taken from conflicts
    in Iraq and Syria and are up to five years old. (BBC News) (IsraelNationalNews)
  - As Israeli airstrikes continue, Hamas releases a video threatening to carry out
    stabbings, terror attacks, and suicide bombs inside Israel. The IDF arrests two
    Palestinians as they tried to enter Israel from the West Bank with a car bomb
    to carry out an attack. (Palestinian Media Watch) (YouTube) (Jerusalem Post)
  Business and economy:
  - Civil servants in the United Kingdom go on strike over salary freezes and public
    sector cuts. (Sky News)
  International relations:
  - Germany expels the Berlin station chief of the United States Central Intelligence
    Agency following a series of spy scandals. (AAP via SBS Australia)
  Law and crime:
  - A Myanmar court sentences four journalists and the editor of the Yangon based
    Unity journal to ten years hard labor for allegedly publishing state secrets in
    an investigative series of reports on a weapons factory. (AP)
  Disasters:
  - 2014 Pacific typhoon season
  - Typhoon Neoguri hits the main Japanese island of Honshu causing flooding, landslides
    and three deaths. (BBC News)
