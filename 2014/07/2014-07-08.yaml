Date: '2014-07-08'
Source_URI: Portal:Current events/2014 July 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gaza–Israel conflict
  - The Israeli cabinet approves the call up of 40,000 reserve soldiers as Prime Minister
    Benjamin Netanyahu warns of a ground operation against Palestinian rockets attacks
    and infiltration attempts into Israel. (The Times of Israel)
  - The Israel Defense Forces launch an air and artillery offensive in the Gaza Strip
    to quell rocket attacks and the Israeli Air Force conducts more air strikes against
    the Gaza Strip after Hamas fires rockets into Israel. (BBC News) (AP)
  - Taliban insurgency
  - The Taliban claims responsibility for an attack in central Afghanistan that claims
    the lives of 10 civilians, four Czech members of the International Security Assistance
    Force and two Afghan police officers. (Wall Street Journal)
  - Somali Civil War (2009–present)
  - Al-Shabaab Islamic militants storm the presidential palace in Mogadishu with heavy
    gunfire as government troops try to repel them. (AP via National Post)
  Disasters and accidents:
  - Typhoon Neoguri (2014)
  - Typhoon Neoguri heads towards the southern Japanese island of Okinawa with 100,000
    on the island and adjacent islands urged to evacuate. (AFP via Yahoo! news Australia)
    (Reuters)
  - More than 50 people are injured after two trains collide near the South African
    city of Durban. (AP)
  International relations:
  - The Prime Minister of Australia Tony Abbott and the Prime Minister of Japan Shinzo
    Abe sign a free trade agreement in the Australian capital Canberra. (ABC News
    Australia)
  - The United Nations Permanent Court of Arbitration rules in favour of Bangladesh
    in a border dispute with India over the Bay of Bengal. (Reuters)
  Law and crime:
  - Several buses are set alight and an electronics store looted in the Brazilian
    city of Sao Paulo following Brazil's crushing defeat by Germany in the World Cup
    semi-final. (AFP via Yahoo! News Australia)
  - A jury acquits Rengan Rajaratnam after a trial on insider trading charges in U.S.
    District Court in New York City. (Bloomberg)
  Politics and elections:
  - Around 70 pro-US activists occupy Taiwan provincial government hall. (Focus Taiwan)
  - Amidst several spending scandals, the French major opposition party Union for
    a Popular Movement is discovered to have a hidden debt of €79.1 million for the
    year 2013. (Le Monde)
  Sports:
  - Brazil v Germany (2014 FIFA World Cup)
  - Germany wins 7-1 against Brazil to go through to the final in the biggest margin
    of victory in the FIFA World Cup's semifinal history. (AP) (Bloomberg)
  - Miroslav Klose of Germany breaks the World Cup goal scoring record he previously
    shared with Ronaldo in the semi-final against Brazil. (ABC News Australia)
