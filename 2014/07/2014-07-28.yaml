Date: '2014-07-28'
Source_URI: Portal:Current events/2014 July 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 16 people are killed and 13 injured in the Philippines in a terrorist
    attack by Islamic group Abu Sayyaf. (IANS via Biharprabha)
  2014 pro-Russian unrest in Ukraine:
  - Ukrainian forces recapture control of the strategic height of Savur-Mohyla in
    Donetsk oblast from pro-Russian insurgents. (Interfax)
  - Ukrainian forces recapture control of Debaltseve, Shakhtarsk, Torez, and Lutuhyne
    in Donetsk oblast from pro-Russian separatists. (Kyiv Post)
  - The US and the EU increase sanctions against Russia. (The New York Times)
  Post-civil war violence in Libya:
  - A huge fire at the National Oil Corp. depot started by a stray rocket threatens
    the Libyan capital Tripoli. (AFP via The News)
  2014 Israel–Gaza conflict:
  - The United Nations Security Council calls for an immediate ceasefire but neither
    Israel nor Hamas agrees. (Washington Post)
  - Israeli officials release a report documenting cases of journalists being threatened
    after reporting on potential war crimes by Hamas. (Times of Israel)
  - The IDF releases data indicating that long range rockets fired by Islamic Jihad
    in Gaza struck a hospital in Shifa and a Palestinian refugee camp in Shati killing
    at least nine children and two adults. (Times of Israel)
  - In Toulouse, France, a man is arrested for firebombing a Jewish center after a
    pro-Palestinian protest. (Jerusalem Post)
  - A young Jewish man is assaulted and battered in Paris after his picture and identity
    is posted on a Facebook page calling for attacks on Jews. (Algemeiner)
  Business and economy:
  - American discount store chain Dollar Tree reaches an $8.5 billion deal to buy
    out rival Family Dollar. (AP)
  - The Hague's Permanent Court of Arbitration says Russian officials have manipulated
    the legal system to bankrupt Russia's largest Yukos oil company, and jail its
    boss (Mikhail Khodorkovsky and others). Yukos was the object of a series of politically
    motivated attacks by the Russian authorities that eventually led to its destruction.
    The company's assets were illegally expropriated for the benefit of State companies
    Rosneft and Gazprom. The Yuganskneftegaz auction was illegal. The $50 billion
    awarded by the Hague's arbitration court against Russia is the largest arbitration
    award ever. (Reuters) (The New York Times) (The Moscow Times) (BBC News)
  - Real estate firms Zillow and Trulia agree to merge, becoming the world's third-largest
    real estate firm. (Business Week)
  Disasters and accidents:
  - A rare EF2 tornado strikes Chelsea and Revere, Massachusetts marking the first
    such incident since at least 1950 that a tornado had hit the two communities north
    of Boston according to the NWS. (Boston Globe) (NWS)
  Law and crime:
  - Alleged child molester Charles Mozdir is shot and killed following a shootout
    in Manhattan that left two US Marshals and one police officer wounded after someone
    saw the recently aired segment involving Charles on The Hunt With John Walsh and
    gave a tip. (CNN) (Boston Herald)
