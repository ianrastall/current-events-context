Date: '2014-05-27'
Source_URI: Portal:Current events/2014 May 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - An American doctor, Mehdi Ali Qamar, is shot and killed in Pakistan by unknown
    assailants on motorbikes. (CNN)
  - Iraqi Insurgency
  - Opposition in Georgia's breakaway Abkhazia takes over the government headquarters,
    forcing President Alexander Ankvab to flee the capital, Sukhumi. (BBC News) (Financial
    Times)
  2014 pro-Russian unrest in Ukraine:
  - At least thirty pro-Russian separatists have died in fighting over control of
    Donetsk International Airport; the Ukrainian government claims to have total control
    of the airport following the clashes with the separatists. (BBC News)
  - The newly elected President of Ukraine Petro Poroshenko vows to continue Kyiv's
    anti-terrorist operation against pro-Russian militants in the east. (BBC News)
  Syrian Civil War:
  - Eleven people, including six members of a United Nations Organisation for the
    Prohibition of Chemical Weapons fact finding mission, are attacked near Hama in
    central Syria. (AP via Washington Post) (BBC News)
  War in Afghanistan (2001–2021):
  - Barack Obama, the President of the United States, announces that 9,800 U.S. troops
    will stay in Afghanistan for a year after the withdrawal of combat troops in December.
    (Washington Post)
  - At least 35 people killed, 70 injured in bomb attacks in Baghdad and Anbar Province
    of Iraq. (IANS via Biharprabha)
  Business and economics:
  - The president of the European Central Bank, Mario Draghi, says that the ECB is
    conscious of the dangers of too low a level of inflation and it has the weapons
    necessary to get back to the target rate. (Reuters)
  - Pfizer announces plans to release an over-the-counter version of heartburn medication
    Nexium. (KRON)
  Malaysia Airlines Flight 370:
  - Malaysia's Department of Civil Aviation and British satellite firm Inmarsat release
    the raw data used to determine the estimated path of missing Malaysia Airlines
    Flight 370. (The Star Malaysia)
  Haiyang Shiyou 981 standoff:
  - Vietnam and China trade accusations over an incident in the South China Sea that
    led to the sinking of a Vietnamese fishing boat yesterday. (AP via Fox News)
  Law and crime:
  - Disgraced former New South Wales Police officer Roger Rogerson is arrested over
    the alleged murder of student Jamie Gao in Sydney last week. (WA Today)
  - A Pakistani woman is stoned to death with bricks outside a courthouse by family
    members including her father, two brothers, and ex-fiancé for marrying a man she
    loved against the family's wishes. (The Jerusalem Post via Reuters)
  Politics and elections:
  - The White House accidentally reveals the name of the CIA's top intelligence official
    in Afghanistan to approximately 6,000 journalists during U.S. President Barack
    Obama's visit to Bagram Airfield. (CNN)
  Egyptian presidential election, 2014:
  - The Government of Egypt declares the final day of voting in the election to be
    a public holiday to encourage turnout. (AP via Yahoo! News)
  Science:
  - Scientists announce the discovery of a remote mire the size of England in the
    Republic of the Congo. (BBC News)
