Intelligence_Payload:
  Armed conflicts and attacks:
  - Naxalite–Maoist insurgency
  - Seven police commandos are killed in a Naxalite attack in the Indian state of
    Maharashtra. (Biharprabha News)
  Disasters and accidents:
  - A wall collapse triggered by heavy rains at a recycling plant killed 18 people
    and injured three others in the eastern city of Qingdao, China. (Dawn)
  Sport:
  - Fifteen football supporters are killed in Kinshasa in a stampede caused by tear
    gas being thrown into the stand by police officers attempting to defuse a hostile
    incident. (Radio Okapi)
