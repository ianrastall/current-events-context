Date: '2014-05-01'
Source_URI: Portal:Current events/2014 May 1
Intelligence_Payload:
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian militants seize the regional prosecutor's office in the eastern Ukrainian
    city of Donetsk. (BBC News)
  - Ukraine announces that it is reintroducing conscription. (Daily Mail)
  Islamist insurgency in Nigeria:
  - A car bomb attack in the Nigerian capital Abuja kills at least nine people. (BBC
    News)
  Arts and cuture:
  - Egypt opens a 3D-printed full-sized exact replica of King Tutankhamun's KV62 tomb
    in the Valley of the Kings, as officials announce that a 30-day visa purchased
    at the airport will be two thirds more expensive. (The Guardian) (The Daily Telegraph)
  Business and economy:
  - Ford announces that their current chief executive officer, Alan Mulally, will
    be retiring in July, and that their chief operating officer Mark Fields will be
    taking his place. (BBC News)
  Disasters and accidents:
  - An explosion on a train in the central railway station in the Indian city of Chennai
    kills at least one person and injures ten. (NDTV)
  Health and environment:
  - The first-ever outbreak of chikungunya in the Caribbean reaches epidemic levels.
    (Jamaica Observer)
  International relations:
  - The People's Republic of China and Russia announce plans to hold joint naval exercises
    in the East China Sea in late May amid regional tensions about islands and airspace.
    (AP)
  Law and Crime:
  - Sinn Féin leader Gerry Adams remains in custody in connection with the IRA murder
    of Jean McConville. (BBC News)
