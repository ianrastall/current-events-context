Date: '2014-05-09'
Source_URI: Portal:Current events/2014 May 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni security forces announce that they have killed Shayef Mohammed Saeed Al-Shabwani,
    an al-Qaeda terrorist wanted over a series of attacks in Sana'a. (CNN)
  - The government of Iraq launches a large-scale military operation to regain control
    of Fallujah from anti-government fighters. (CNN)
  2014 pro-Russian unrest in Ukraine:
  - On Victory Day, the Ukrainian Institute of National Memory calls on Ukrainians
    to replace the ribbon of Saint George with a red poppy flower, a symbol that is
    used in Commonwealth countries on Remembrance Day. (Irish Times) (AFP via Zeenews)
  Business and economy:
  - Bloomberg reports that Rupert Murdoch plans to unite various European pay TV entities
    into a single $14 billion entity. (Bloomberg)
  2014 Crimean crisis:
  - Russian President Vladimir Putin visits Crimea for the first time since the annexation,
    arriving in Sevastopol for Victory Day celebrations. (Wall Street Journal).
  - Russia test fired several nuclear delivery systems on the Victory day celebrations
    and also sent a naval flotilla led by the Russian aircraft carrier Admiral Kuznetsov
    through the English Channel. (spacedaily.com)
  North Korea–South Korea relations:
  - South Korea's Ministry of National Defense announces that three drones found in
    their territory came from North Korea. (CNN)
  Natural disasters:
  - A 5.0 magnitude earthquake strikes Shaheed Benazir Abad District, Pakistan, killing
    one person and injuring another 70. (AP via NPR)
  Politics and elections:
  - Jutta Urpilainen steps down as the Finance Minister of Finland after she was not
    re-elected as leader of the Social Democratic Party. (AP via Miami Herald)
  Disasters and accidents:
  - A hot air balloon struck power lines while trying to land near Doswell, Virginia,
    and catches fire. The balloon ascends again, with bits of the basket seen falling
    from the sky, killing all three on board.
