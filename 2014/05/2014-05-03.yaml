Date: '2014-05-03'
Source_URI: Portal:Current events/2014 May 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Indian police arrest 29 people after National Democratic Front of Bodoland separatists
    kill 29 Muslims and burn down homes. (AP via ABC News America)
  - The Armed Forces of Ukraine resume an offensive near Kramatorsk, as military observers
    from the Organization for Security and Cooperation in Europe are released after
    having been held hostage for a week. (Fox News)
  - Twin explosions are reported in the city of Mombasa, Kenya, with at least three
    people killed and several injured. (BBC News)
  Art and culture:
  - The 61st National Film Awards are presented by the President of India to honour
    the best films of 2013 in Indian cinema.
  - Gulzar receives Dadasaheb Phalke Award while Ship of Theseus wins the Best Feature
    Film award. (Variety)
  Disasters and accidents:
  - The death toll from the mudslides in Afghanistan rises to 2,100, with 4,000 people
    displaced. (ABC)
  Health and environment:
  - The first U.S. case of MERS is reported in Munster, Indiana, in a person who travelled
    to Saudi Arabia. (CNN)
  Law and crime:
  - A gunman shoots and kills three people and wounds four others in Jonesboro, Arkansas,
    U.S., and then dies. (ABC News)
  Murder of Jean McConville and Arrest of Gerry Adams:
  - A mural of Sinn Fein Leader Gerry Adams is painted on a wall on the Falls Road,
    Belfast, as police are granted a further 48 hours to question him about the murder
    of Jean McConville. (BBC News)
  Sport:
  - In American horse racing, California Chrome ridden by Victor Espinoza wins the
    2014 Kentucky Derby. (Sports Illustrated Fan Sided)
