Date: '2014-05-07'
Source_URI: Portal:Current events/2014 May 7
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - At least 125 people are killed in a massacre in Gamboru Ngala, Borno State. (BiharPrabha)
    (Reuters)
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian militants recapture the city hall of the southern Ukrainian city of
    Mariupol hours after the Ukrainian government forces took control of the building
    from the militants. (BBC News)
  - Five pro-Russian militants are killed and fifteen more are captured during clashes
    with the Ukrainian military in the outskirts of the southern city of Mariupol.
    (CNN)
  - Russian President Vladimir Putin says that Ukraine's presidential election on
    May 25 is a step "in the right direction", calling on anti-Kyiv protesters to
    postpone a May 11 federalization referendum. Putin also added qualifying conditions.(BBC
    News)
  Syrian Civil War:
  - Rebels withdraw from the besieged city of Homs in accordance with the U.N.-brokered
    deal between them and the Syrian government. (BBC News)
  International relations:
  - Vietnamese naval ships and Chinese vessels collide in the South China Sea; the
    incident occurred while the Vietnamese navy was trying to prevent China from setting
    up an oil rig in an area to which both nations lay claim. (BBC News)
  Law and crime:
  - An alleged American FBI agent is arrested in Pakistan for carrying ammunition
    while trying to board a flight, which is in violation of their anti-terror laws.
    (BBC News)
  Politics and elections:
  - The Constitutional Court of Thailand finds that Prime Minister Yingluck Shinawatra
    is guilty of abuse of power when she transferred the National Security Council
    chief in 2011 and that she cannot remain in office. (ABC News Australia)
  - Alan Shatter resigns from the Irish government after scandals over him came out
    in February. (RTÉ)
  South African general election, 2014:
  - Voters in South Africa go to the polls for a general election. (The Guardian)
  Indian general election, 2014:
  - In India over 60 million people vote in 64 constituencies today across 7 states
    for 16th Lok Sabha. (Times Of India)
  Science:
  - The "Pinocchio Rex" (Qianzhousaurus sinensis) is discovered in Ganzhou, China.
    (National Geographic)
  - Argentinosaurus is named as the heaviest species of dinosaur ever while a sparrow-sized
    Qiliania is named as the smallest. (Reuters)
