Date: '2014-05-18'
Source_URI: Portal:Current events/2014 May 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - A group headed by Khalifa Haftar, which includes renegade Libyan general Mokhtar
    Farnana, launches an attack on the Parliament of Libya. (AP)
  - A blast hits the northern Nigerian city of Kano. (BBC News)
  Business and economy:
  - American communications company AT&T Inc. agrees to buy pay television company
    DirecTV for $48.5 billion. (AP via Politico)
  Disasters and accidents:
  - Officials in North Korea report the collapse of a 23-story block of flats that
    is believed to have killed multiple residents, in a rare public apology. (Al Jazeera)
  - A bus in Fundación, department of Magdalena, Colombia, ignites while transporting
    children from a religious service, killing 31 children. (TIME)
  Soma mine disaster:
  - Turkish police arrest 18 people including mining company executives over the disaster
    which caused the deaths of 301 people. (BBC)
  2014 Vietnam anti-China protests:
  - More than 3,000 Chinese citizens are evacuated from Vietnam, with two Chinese
    killed and more than 100 injured in the riot last week following China drilling
    for oil in the South China Sea. (Reuters) (CNN)
  Politics and elections:
  - Voters in Switzerland resoundingly reject a proposed law change that would have
    given that country the world's highest minimum wage. (AP)
  Sport:
  - In basketball, Maccabi Tel Aviv wins its sixth Euroleague championship. Euroleague
    Official Website
  - In football, River Plate defeats Quilmes 5-0 to secure its 35th championship in
    the Argentine Primera División. (Reuters via Yahoo! Sport)
