Date: '2014-05-20'
Source_URI: Portal:Current events/2014 May 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two explosions occur near a crowded market in the Nigerian city of Jos killing
    at least 118 people. (BBC News) (AFP via Yahoo! News Singapore)
  - Shia insurgency in Yemen
  2014 pro-Russian unrest in Ukraine:
  - Ukrainian billionaire Rinat Akhmetov asks workers to stage a peace rally in the
    Donetsk region in protest against the self-proclaimed Donetsk People's Republic.
    (Interfax) (The Moscow Times)
  - At least 16 people are killed in clashes between Shi'ite Muslim tribesmen and
    Yemeni government forces and allied Sunni tribesmen. (Reuters)
  Business and economy:
  - American car maker General Motors recalls another 2.4 million vehicles. (CNN)
  - Credit Suisse pleads guilty to helping American citizens evade taxes and agrees
    to a US$2.6 billion fine. (Washington Post)
  - A truck going from Florida to Maine carrying about 1.5 to 2 million bees crashes.(Bangor
    Daily News)
  Disasters and accidents:
  - At least 17 people are killed and 27 injured after a bus plunges into a gorge
    in India's Jammu and Kashmir state. (Times of India)
  - Russian media reports that a passenger train has collided with a derailed freight
    train near Moscow killing at least six people. (BBC News)
  - The United States Coast Guard resumes its search for four British sailors lost
    in the mid-Atlantic. (BBC News)
  International relations:
  - The President of Russia Vladimir Putin arrives in the People's Republic of China
    for a state visit. (BBC News)
  Law and crime:
  - American actor Michael Jace is arrested in relation to the shooting death of his
    wife in Los Angeles. (AFP via Melbourne Age)
  - Three female children, ages 2 months to 3 years, are stabbed to death at a home
    in Torrance, California, U.S. The children's mother is arrested and charged with
    murder. (CNN)
  Politics and elections:
  - Narendra Modi is officially re-elected as the leader of the Bharatiya Janata Party
    and the National Democratic Alliance ahead of being sworn in as the Prime Minister
    of India. (Indian Express)
  2013–14 Thai political crisis:
  - The Royal Thai Army declares martial law after six months of political unrest.
    (The Guardian)
  Malawian general election:
  - Voters in Malawi go to the polls for a general election. (BBC News)
