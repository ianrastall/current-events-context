Date: '2014-05-26'
Source_URI: Portal:Current events/2014 May 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian unrest in Ukraine
  - Pro-Russian militants force the closure of Donetsk International Airport a day
    after preventing any voters in the city of Donetsk from casting a vote in the
    Ukrainian presidential election. (Reuters via Chicago Tribune)
  - The Ukrainian Air Force conducts airstrikes on Donetsk International Airport while
    paratroopers drop in to fight pro-Russian separatists. (Irish Times)
  - 2014 Chibok kidnapping
  - Air Marshal Alex Barde, the Nigeria head of defense, tells protesters in Abuja
    that the military knows where the 300 girls kidnapped by Boko Haram are but are
    reluctant to rescue them due to the fear of having them killed. (AP)
  Islamist insurgency in Nigeria:
  - Islamist terror group Boko Haram kills at least 33 security personnel during attacks
    in Nigeria's northeastern Yobe State. (CNN)
  Business and economics:
  - Drugmaker Pfizer says it will not proceed with its attempted $119 billion bid
    for AstraZeneca. (AP via News 24)
  Disasters and accidents:
  - At least 25 people are killed and 100 injured as a passenger train rams into a
    goods train in Uttar Pradesh, India. (NDTV) (IANS via Biharprabha)
  - At least seven people have been killed and twenty injured following a fire in
    a bus terminal north of Seoul in the South Korean city of Goyang. (Yonhap)
  - At least 26 people are dead and 10 missing since Wednesday as storms hit southern
    and central China. (ABC News Australia)
  Politics and elections:
  - 2014 Thai coup d'état
  - Coup leader Prayuth Chan-ocha claims to have the confidence of King of Thailand
    Bhumibol Adulyadej. (AP via Yahoo!)
  - 2014 Indian general election
  - Shri Narendra Modi is sworn in as the 15th Prime Minister of India. (IBN)
  - Egyptian presidential election, 2014
  - Voters in Egypt go to the polls in the first of a two day voting period with Field
    Marshal Abdel Fattah el-Sisi expected to be elected. (AP via Yahoo! News)
