Date: '2014-05-05'
Source_URI: Portal:Current events/2014 May 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian unrest in Ukraine and the Siege of Sloviansk
  - A Ukrainian military helicopter patrolling around the eastern city of Sloviansk
    is shot down; all of the pilots survived and were later rescued. (CNN)
  - Neighbouring Ukraine and breakaway Transnistria, Moldova places its borders on
    alert as the unrest continues. (AP)
  Arts and culture:
  - Russian media reveals that President Vladimir Putin secretly signed a decree (No.
    279) honoring more than 300 journalists for their "objective coverage" of Crimea's
    seizure from Ukraine. (Reuters)
  Business and economy:
  - Target announces that their chief executive and chairman, Gregg Steinhafel, has
    resigned. (BBC News)
  Disasters and accidents:
  - Eleven people are missing after a Chinese cargo ship collides with a Marshall
    Islands registered container ship off the coast of Hong Kong. (The Guardian)
  - At least two people are dead and 30 missing after two boats carrying illegal immigrants
    collide in the Aegean Sea off the coast of Greece. (AP via 680 News)
  Health:
  - The World Health Organization states that the spread of polio is an international
    public health emergency. (BBC News) (New York Times)
  - Coca-Cola and PepsiCo said they will remove brominated vegetable oil (BVO) from
    their drinks. (AP)
  Law and crime:
  - The U.S. Supreme Court rules that a practice of beginning legislative sessions
    with prayers does not violate the Establishment Clause of the First Amendment.
    (Los Angeles Times)
  2014 Chibok kidnapping:
  - Naomi Mutah Nyadar, the leader of the One Million Women protest in Nigeria over
    failure to act on the kidnapping of 203 schoolgirls by terrorist group Boko Haram,
    is reportedly detained on the orders of First Lady of Nigeria Patience Jonathan.
    (BBC News)
