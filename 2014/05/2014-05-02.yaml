Date: '2014-05-02'
Source_URI: Portal:Current events/2014 May 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least nine students are killed in protests in Ethiopia's Oromia Region. (BBC
    News)
  - Security tightens in the People's Republic of China after Wednesday's bombing
    at a train station left three dead and 79 injured. (Daily Mail)
  - 2014 pro-Russian unrest in Ukraine and the Siege of Sloviansk
  Syrian Civil War (Siege of Homs):
  - A 24-hour ceasefire deal is reached in Syria's city of Homs allowing rebels to
    withdraw from their last stronghold in the central city. (BBC News) (Reuters)
  Post-coup unrest in Egypt (Sinai insurgency):
  - Attacks by suicide bombers on a security checkpoint and a civilian bus in Egypt’s
    Sinai Peninsula as well as a separate bombing near a courthouse in Cairo killed
    at least four people. (The Washington Post)
  - Two people were shot dead when supporters of deposed President Mohamed Morsi clashed
    with residents in Alexandria. (Reuters)
  - The Armed Forces of Ukraine launch a military operation against separatists in
    the city of Sloviansk with claims of many deaths and two Ukrainian Army helicopters
    downed. In the port city of Odesa, violent clashes kill at least 42 people, as
    pro-Ukrainians set the pro-Russian headquarters on fire. (CNN) (BBC News) (Express)
  Disasters and accidents:
  - A landslide strikes the town of Hobo Barik in Afghanistan's Badakhshan province
    with at least 350 people dead and over 2000 people missing. (USA Today) (AP)
  - At least 10 people die of suffocation and eight others fell unconscious while
    passing through a water channel which carried chemical waste in Dera Ismail Khan,
    Pakistan. (Dawn)
  Murder of Jean McConville and Arrest of Gerry Adams:
  - Sinn Féin claims that party president Gerry Adams is a victim of "political policing"
    are dismissed by the Taoiseach (Prime Minister of Ireland) Enda Kenny, British
    prime minister David Cameron and Northern Ireland First Minister Peter Robinson.
    (Irish Times)
  - Helen, the eldest daughter of Provisional Irish Republican Army (IRA) murder victim
    Jean McConville, is prepared to name the people responsible for her mother's death,
    saying she no longer fears reprisals by republicans. (RTÉ News)
