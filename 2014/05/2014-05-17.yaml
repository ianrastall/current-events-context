Date: '2014-05-17'
Source_URI: Portal:Current events/2014 May 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Nigeria, Niger, Cameroon, Benin, and Chad join together to combat Boko Haram.
    (The Guardian) (The New York Times)
  Disasters and accidents:
  - A Lao People's Liberation Army Air Force plane crashes carrying twenty people,
    killing the Deputy PM and Defence Minister Douangchay Phichit. (AP via ABC News
    America) (Bangkok Post)
  - A landslide in the Dariali Gorge in northeastern Georgia kills at least three
    people, blocks the Terek River, and disrupts gas supply to Armenia. )
  Sinking of the MV Miraj-4:
  - Officials call off rescue operations as 54 dead bodies recovered with an unknown
    number of people missing in a ferry disaster in the Meghna River of Bangladesh.(Biharprabha
    News)
  Law and crime:
  - A pregnant Sudanese woman Mariam Yahia Ibrahim Ishag is set to receive 100 lashes
    for being married to a Christian man and is sentenced to death for refusing to
    renounce her Christianity causing international outrage. (CNN)
  Science:
  - Palaeontologists report that the remains of the largest dinosaur ever discovered
    have been unearthed in Patagonia, Argentina. (BBC News)
  Sport:
  - Football
  - In Spain, Atlético Madrid draws with FC Barcelona to win the 2013–14 La Liga.
    (France 24)
  - In England, Arsenal defeats Hull City to win the 2014 FA Cup Final. (ITV)
  - In Scotland, St Johnstone defeats Dundee Utd 2-0 to win the 2014 Scottish Cup
    Final. (BBC Sport)
  - In Germany, Bayern Munich defeats Borussia Dortmund to win the 2013–14 DFB-Pokal.
    (L'Équipe)
  Horse racing:
  - Frankie Dettori wins his 200th group one race riding "Olympic Glory" at the Lockinge
    Stakes at Newbury, the first time that a Europe-based jockey achieves this milestone.
    (The Guardian)
  - California Chrome wins the 2014 Preakness Stakes, the second leg of the U.S. Triple
    Crown, run in Baltimore. (Yahoo! Sports)
