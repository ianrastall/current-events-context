Date: '2014-05-16'
Source_URI: Portal:Current events/2014 May 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ten people are killed in two explosions in the Gikomba market area of the Kenyan
    capital of Nairobi. (BBC News)
  - Brazilian police clash with protestors angry over the cost of hosting the World
    Cup in the cities of Sao Paulo and Rio de Janeiro. (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian rebels quickly withdraw from Mariupol as dozens of unarmed pro-Ukraine
    steelworkers with some employed by System Capital Management joined by the police
    start to patrol the city. (U.S. News & World Report) (New York Times)
  - The United Nations warns of a deterioration of human rights in eastern Ukraine
    and the harassment and persecution of the Crimean Tartars in Crimea. (BBC News)
  Arts and culture:
  - American journalist Barbara Walters retires after a 52-year career. (BBC News)
  Business and economy:
  - Darden Restaurants agrees to sell Red Lobster to Golden Gate Capital for US$2.1
    billion. (USA Today)
  2014 General Motors recall:
  - The United States government fines General Motors $35 million for their delays
    in recalling small cars with faulty ignition switches. (BBC News)
  Disasters and accidents:
  - A Russian Proton-M rocket carrying a communications satellite veers off its intended
    path and burns up in the atmosphere. (CNN)
  - Tens of thousands of people are being evacuated in Serbia and Bosnia as heavy
    rains cause floods. (ABC)
  Soma mine disaster:
  - Turkish police crackdown on an anti-government demonstration in the town of Soma,
    firing tear gas and water cannon at thousands of protestors. (BBC News)
  Politics and elections:
  - 2014 Indian general election
  - Led by Narendra Modi, the Bharatiya Janata Party wins a landslide victory in the
    Indian general election. The incumbent Indian National Congress records its worst
    ever result. (India Today)
  - Dr. Robert Petzel resigns as the US Under Secretary of Veterans Affairs for Health
    following a scandal over long waits for care, treatment delays, and falsification
    of records at VA hospitals. (Fox News)
  Sport:
  - In association football, Paris Saint-Germain F.C. and Manchester City F.C. are
    fined €60 million by UEFA for breaches of the Fair Play regulations. (France 24)
