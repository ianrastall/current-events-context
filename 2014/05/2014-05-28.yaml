Date: '2014-05-28'
Source_URI: Portal:Current events/2014 May 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen attack the home of Tunisia's top security official Lotfi Ben Jeddou resulting
    in the death of four police officers. (AP via Miami Herald)
  - A split emerges in the Pakistani Taliban after the Mehsud faction walked out,
    saying the group leaders' tactics were "un-Islamic". (BBC News)
  - At least 11 people are killed in an attack on a church by the Séléka militia group
    in the city of Bangui in the Central African Republic. (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - Ramzan Kadyrov, Head of the Chechen Republic, insists he has not sent troops to
    Ukraine to fight alongside pro-Russia separatists. (BBC News)
  Business and economy:
  - Apple Inc. confirms that it will buy Beats Electronics for $3 billion. (Biz Journals)
  Disasters and accidents:
  - A fire at the Hyosarang hospital, a hospital for the elderly in South Korea's
    Jangseong County, kills at least 21 people and injures 7. (Bloomberg via Business
    Week)
  Law and crime:
  - French police raid a camp site in the port city of Calais containing 800 migrants
    from Asia, Africa and the Middle East. (BBC News)
  - Dutch authorities approve the extradition of high-ranking Sinaloa Cartel leader
    José Rodrigo Aréchiga Gamboa (alias "El Chino Ántrax") to the United States. (Milenio)
  Politics and elections:
  - US President Barack Obama announces a $5 billion "terrorism partnership fund"
    to help other countries tackle extremists. (BBC News)
  Egyptian presidential election, 2014:
  - Voting in Egypt continues for an unscheduled third day due to concerns about low
    turnout. Official results show former military chief Abdul Fattah al-Sisi headed
    for a massive victory with 92% of the vote. (BBC News) (BBC News²) (AP)
