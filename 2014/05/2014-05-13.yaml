Date: '2014-05-13'
Source_URI: Portal:Current events/2014 May 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Villagers in the Nigerian Kala/Balge district of Borno State form a vigilante
    group and successfully repel an attack from the terrorist Islamist group Boko
    Haram, seizing three cars and a military vehicle and killing around 200 of the
    militants. (BBC News) (CNN)
  2014 pro-Russian unrest in Ukraine:
  - Valery Bolotov, a leader of the separatist movement in the eastern city of Luhansk,
    is wounded in an assassination attempt by an unknown assailant. (CNN)
  - An insurgent ambush kills six Armed Forces of Ukraine soldiers. (AP via Netscape)
  - Another 13 individuals, including Russian President Vladimir Putin's first deputy
    chief of staff, Vyacheslav Volodin and the self-declared mayor of Sloviansk, Vyacheslav
    Ponomaryov, and two legal entities are added to the EU sanctions list for "undermining
    or threatening" Ukraine's sovereignty. (Official Journal)
  - The governor of Ukraine’s Donetsk Oblast, Serhiy Taruta says his region, with
    the exception of Sloviansk, is prepared for the May 25 presidential election,
    calling the separatist referendum nothing more than a "sociological questionnaire".
    (Kyiv Post)
  Central African Republic conflict (2012–present):
  - The body of 26-year-old French photojournalist Camille Lepage was found in the
    Bouar region. The French presidency released a statement saying she was "murdered"
    and announced that a team of investigators will be dispatched to the scene. (Time)
    (The Guardian)
  Arts and culture:
  - Investigators claim to have found the wreck of Christopher Columbus's flagship,
    the Santa Maria, off the north coast of Haiti. (The Independent)
  Disasters and accidents:
  - Soma mine disaster
  - At least 238 miners are killed and 120 others trapped in a coal mine in the town
    of Soma in Turkey's Manisa Province. (BBC News) (Biharprabha News)
  - An apartment block in the North Korean capital Pyongyang containing 100 families
    collapses. (AFP via The Australian)
  2014 Vietnam anti-China protests:
  - Thousands of Vietnamese workers stage anti-China protests in front of factories
    with Chinese names over Beijing's decision to locate an oil rig in waters of the
    South China Sea also claimed by Hanoi. (Voice of America
  Law and Crime:
  - Former Israeli Prime Minister Ehud Olmert has been sentenced to six years in jail
    in a bribery case.(Biharprabha News) (AP)
  - Four students and another person are injured during a shooting near Therrell High
    School's campus in Atlanta, Georgia, U.S. A 17-year-old suspect is arrested. (Fox
    News)
  Post-Iraq War:
  - The International Criminal Court will conduct a preliminary examination in the
    claims that United Kingdom forces abused Iraqi detainees between 2003 and 2008.
    (BBC News)
  Science:
  - Studies published in Geophysical Research Letters and Science find that the West
    Antarctic ice sheet is potentially irrevocably melting. (The Washington Post)
    (Science) (Geophysical Research Letters) (New York Times)
