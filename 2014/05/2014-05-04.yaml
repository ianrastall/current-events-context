Date: '2014-05-04'
Source_URI: Portal:Current events/2014 May 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian unrest in Ukraine
  - Pro-Russian activists attack the police headquarters in Odesa, forcing the release
    of several people held over deadly violence two days before. (BBC News)
  Disasters and accidents:
  - The Government of Afghanistan declares a day of national mourning for the victims
    of the mudslides. (BBC News)
  - At least eleven people die in China's Guangdong Province when a bridge collapses
    while being built. (PTI via Business Standard)
  - A train derailment in the Raigad district of India's Maharashtra state causes
    at least 19 deaths and injures 130 people. (Reuters)
  Murder of Jean McConville and Arrest of Gerry Adams:
  - Northern Ireland's First Minister Peter Robinson accuses Sinn Féin of attempting
    to blackmail the Police Service of Northern Ireland over the arrest of Gerry Adams.
    (RTE News)
  - Sinn Féin President Gerry Adams is released from police custody after four days
    of questioning over the murder of Jean McConville. (BBC News)
  Politics:
  - The Sunday Herald becomes the first Scottish newspaper to declare its support
    for a Yes vote in the forthcoming referendum on Scottish independence. (BBC News)
  - Panamanian general election, 2014
  - Voters in Panama go to the polls for a general election. (Fox News Latino)
  - Current Vice President Juan Carlos Varela wins the Presidential election. (AP)
