Date: '2014-05-30'
Source_URI: Portal:Current events/2014 May 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamist insurgency in Nigeria
  - Islamist terror group Boko Haram abduct two prominent traditional rulers from
    Borno State in Nigeria. (IANS via Biharprabha)
  - United States State Department makes its first confirmation that a U.S. citizen
    has been "involved" in a suicide bombing as part of Syria's ongoing civil war.
    (ABC News)
  Disasters and accidents:
  - Indonesia's Sangeang Api volcano erupts disrupting flights in Indonesia and northern
    Australia. (Sydney Daily Telegraph)
  - At least nine people are killed and over a dozen injured when a storm hits the
    Indian capital New Delhi. (AAP via SBS)
  - An earthquake in China's Yunnan province injures at least 45 people and forces
    thousands to relocate. (AP via USA Today)
  Law and crime:
  - The Wall Street Journal reports that the FBI and SEC have launched an insider
    trading investigation involving billionaire investor Carl Icahn, Las Vegas gambler
    and investor Billy Walters, and golf superstar Phil Mickelson. No wrongdoing has
    yet been alleged. (ESPN)
  Politics and elections:
  - Presidency of Barack Obama
  - Eric Shinseki resigns as the United States Secretary of Veterans Affairs due to
    a scandal over the Veterans Health Administration. (AFP via Yahoo!7 News)
  - Jay Carney announces his resignation as White House Press Secretary next month
    with Josh Earnest to replace him. (The Hill)
  - Malawian general election, 2014
  - Opposition candidate Peter Mutharika is declared the winner of the disputed presidential
    election. (BBC News)
  Sport:
  - In basketball, the NBA announces that it has approved the US$2 billion bid of
    former Microsoft CEO Steve Ballmer for the Los Angeles Clippers. The sale must
    still be approved by the league's owners, and banned Clippers owner Donald Sterling
    has filed a $1 billion lawsuit against the NBA. The sale price far exceeds the
    previous NBA record of $550 million paid for the Milwaukee Bucks earlier this
    year. (ESPN)
  - The Palestine national football team defeat The Philippines to win the 2014 AFC
    Challenge Cup, qualifying for the AFC Asian Cup for the first time. (The AFC)
