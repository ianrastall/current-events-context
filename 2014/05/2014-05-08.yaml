Date: '2014-05-08'
Source_URI: Portal:Current events/2014 May 8
Intelligence_Payload:
  Armed conflict and attacks:
  - Syrian Civil War
  - A large explosion levels the Carlton Hotel in Aleppo which was used as a military
    base by the Army of Syria as well as several other buildings. (AP via TV New Zealand)
  - A roadside bomb near the Afghan border in North Waziristan, Pakistan, kills 8
    Pakistani soldiers. (Los Angeles Times)
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian rebels push forward with plans for a referendum on May 11th ignoring
    Putin's statement to delay the vote. (BBC News)
  Business and economy:
  - British bank company Barclays announces that they plan to cut 19,000 jobs over
    the next 3 years and exit the retail bank market in Western Europe. (Wall Street
    Journal)
  - Brazilian oil company Petrobras announces that it plans to cut 8,000 jobs by voluntary
    dismissal after a significant loss of its economy due to ongoing crisis at its
    Pasadena Refining System. (GloboNews)
  Disasters and accidents:
  - At least eight people are killed and 15 others injured after a van fell into a
    ravine in Muzaffarabad, Pakistan. (Dawn)
  Politics:
  - Thailand's National Anti-Corruption Commission refers former Prime Minister Yingluck
    Shinawatra to face impeachment charges in the Senate over a failed rice subsidy
    scheme. (AFP via Yahoo! UK)
  Sport:
  - The National Football League draft begins at Radio City Music Hall in Manhattan.
    (Cal Bears website)
