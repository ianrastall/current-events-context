Date: '2014-05-14'
Source_URI: Portal:Current events/2014 May 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Talks to end the crisis in Ukraine begin, without representatives of pro-Russian
    separatist groups. (BBC News)
  Al-Qaeda insurgency in Yemen:
  - Seven Yemeni Army soldiers and 16 Al-Qaeda in the Arabian Peninsula militants
    are killed in fighting near the town of Azan in Shabwa province. (AP via Daily
    Mail)
  Religious violence in India:
  - At least three people are killed and 15 injured as a result of violent clashes
    between two religious communities in the Indian city of Hyderabad. (Biharprabha
    News)
  Soma mine disaster:
  - Turkey's Energy Minister Taner Yıldız raises the death toll from the disaster
    to at least 274, with 120 people still trapped in the mine and 80 miners injured,
    four seriously. (AP)
  2014 California wildfires:
  - A number of wildfires destroy properties in Los Angeles and San Diego. (NBC)
  International relations:
  - Anti-Chinese protests in southern Vietnam about the People's Republic of China
    deploying an oil rig in a disputed section of the South China Sea degenerate into
    the burning of up to 15 foreign-owned factories. (AP, Reuters via The Age) (AP)
  Law and crime:
  - A judge in the Oscar Pistorius trial orders the athlete to undertake a mental
    evaluation. (BBC News)
  - Portuguese authorities charge Luiz Felipe Scolari, the coach of the Brazil national
    football team, with tax fraud allegedly carried out when he was the coach of Portugal.
    (AFP via Global Post)
