Date: '2014-11-30'
Source_URI: Portal:Current events/2014 November 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - Coalition forces launch over 30 airstrikes on Raqqa, the de facto capital of ISIL.
    (The Guardian)
  - Colombian conflict
  - FARC releases Colombian Army general Rubén Alzate and two of their other prisoners.
    (AP via Fox News)
  Disasters and accidents:
  - Heavy flooding in the south of France claims five lives and forces more than 3000
    people to leave their homes. (NDTV)
  Law and crime:
  - The Simon Wiesenthal Center presumes that Nazi war criminal Alois Brunner, former
    assistant to Adolf Eichmann, is dead. (Express)
  Politics and elections:
  - Uruguayan general election
  - Voters in Uruguay go to the polls for the second round of voting in the presidential
    election with former President Tabaré Vázquez of the ruling Broad Front winning
    another term in government. (BBC), (CNN)
  - Swiss immigration referendum
  - By 74% voters in Switzerland reject the proposal to reduce immigration from about
    80,000 to 16,000 people a year. (BBC) (Al Jazeera)
  - By a similar margin Swiss voters reject a monetary-policy initiative that would
    require the central bank to buy gold. (Bloomberg)
  - Moldovan parliamentary election
  - Pro-European Union parties achieve a majority in the Parliament of Moldova. (The
    New York Times)
  Sports:
  - Police in Columbus, Ohio, USA, discover the body of Ohio State University football
    player and wrestler Kosta Karageorge. On November 26 he committed suicide. (ESPN)
