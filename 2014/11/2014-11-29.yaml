Date: '2014-11-29'
Source_URI: Portal:Current events/2014 November 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Xinjiang conflict
  - Chinese police apprehend and execute eleven Uyghur terrorists following an attack
    with 15 killed and 14 injured in Yarkant County, China. (AFP via Yahoo! News)
  - Islamic State of Iraq and the Levant
  - Iraqi airstrikes kill 17 Iraqi citizens within ISIL controlled areas. (Reuters)
  - Heavy fighting in the northern Syrian city of Kobani kills at least 40 fighters
    from both ISIL and Kurdish forces. (CNN)
  Islamist insurgency in Nigeria:
  - Suspected Boko Haram militants storm the Christian-majority town of Shani, Nigeria,
    leaving dozens dead. (Daily Sabah)
  Law and crime:
  - A Cairo court clears former President of Egypt Hosni Mubarak on murder charges
    related to the death of hundreds of protesters in the 2011 Egyptian revolution.
    (AFP via Channel News Asia), (BBC)
  - Shooting of Michael Brown
  - Ferguson PD officer Darren Wilson resigns following a grand jury decision not
    to indict him in the Michael Brown case. (AP)
  Politics and elections:
  - Jiang Yi-huah resigns as the Premier of Taiwan as the ruling Kuomintang suffers
    heavy losses in local government elections. (AFP via Khaleej Times)
  - 2014 Hong Kong protests
  - Thousands of pro-democracy demonstrators clash with police in the Mong Kok district
    as they try to reclaim their former protest site. (Reuters)
  - Sunni candidates retain a majority of seats in the Bahraini Council of Representatives
    after an election which was boycotted by the main Shi'ite opposition. (AFP via
    The Daily Star)
  - Voters go to the polls in the Australian state of Victoria for a state election.
    The election sees Labor, led by Daniel Andrews, defeat Denis Napthine's Liberal–National
    Coalition, the first time a one-term government has lost power in the state since
    1955. (BBC) (The Age) (News.com.au) (Bloomberg News)
  - The Union for a Popular Movement reelects former French President Nicolas Sarkozy,
    as the party leader. (AP)
