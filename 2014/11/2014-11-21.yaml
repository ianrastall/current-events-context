Date: '2014-11-21'
Source_URI: Portal:Current events/2014 November 21
Intelligence_Payload:
  Disasters and accidents:
  - A military helicopter crashes in Sibiu County, Romania, with at least eight people
    killed and two injured. (Xinhua) (ABC News)
  - The death toll from a snowstorm in western New York State reaches 13, with local
    heavy flooding expected in the United States this week. (AAP via SBS News)
  - A stampede in the city of Kwekwe in Zimbabwe caused by the police firing tear
    gas kills at least eleven people and injures 40 others. (IANS via Business Standard)
  Health:
  - The World Health Organization reports that an outbreak of bubonic plague in Madagascar
    has killed 40 people. (BBC)
  Law and crime:
  - The United States House of Representatives files a lawsuit against President Barack
    Obama for executive actions undertaken in relation to the implementation of the
    Affordable Care Act. (NBC News)
  Sports:
  - In American football, an NFL game between the Buffalo Bills and the New York Jets
    is moved from Buffalo, New York to Detroit, Michigan due to the November 2014
    Western New York snowstorm. (ESPN)
