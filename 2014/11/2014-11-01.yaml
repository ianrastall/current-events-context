Date: '2014-11-01'
Source_URI: Portal:Current events/2014 November 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - al-Qaeda insurgency in Yemen
  - Clashes between al-Qaeda and security forces leave 20 soldiers and 3 militants
    dead in Hodeidah province of western Yemen. (Reuters)
  - Unidentified gunmen kill at least 20 police officers in an ambush in northwest
    Kenya. (World Bulletin)
  - Siege of Kobanê
  - Turkey breaks from its policy of preventing Kurdish fighters from entering Syria
    and allows 150 Iraqi Peshmerga to cross into Kobanê. (The Guardian)
  - Israel-Gaza conflict
  - The Israel Defense Forces report a rocket fired from Gaza landed in Israeli territory
    with no injuries or damage. (AFP via Al Arabiya English)
  Disasters and accidents:
  - At least four people are dead, one injured and several missing following a fire
    in a two apartment building near the University of Southern Maine campus in Portland.
    (AP via Yahoo News US)
  Sports:
  - Western Sydney Wanderers win the AFC Champions League, defeating Saudi Arabian
    club Al Hilal 1–0 on aggregate to become the first Australian club to win the
    tournament. (AAP via ABC News Australia)
  - The racehorse Bayern wins the 2014 running of the Breeders' Cup Classic.(Official
    Breeders' Cup results)
