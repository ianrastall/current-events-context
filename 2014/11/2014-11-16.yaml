Date: '2014-11-16'
Source_URI: Portal:Current events/2014 November 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - ISIL claims to have executed American hostage Abdul-Rahman Kassig. (BBC)
  Islamist insurgency in Nigeria:
  - A female suicide bomber kills 13 people in the town of Abare in northeastern Nigeria.
    (AP)
  - The Nigerian army drives the militant group out of Chibok two days after the town's
    capture. (BBC)
  Arts and culture:
  - The Russian Presidential Library announces plans to establish a Russian version
    of Wikipedia stating that it would provide more "detailed and accurate" information
    about the country. (Reuters via ABC News Australia)
  Disasters and accidents:
  - A fire at a food processing plant kills at least 18 workers in Shandong, China.
    (South China Morning Post)
  - US planes are warned to avoid an Alaskan volcano, Pavlof. (News.com.au)
  - At least four people are killed in mudslides in southern Switzerland and northern
    Italy after days of heavy rain. (BBC)
  Health:
  - Influenza A virus subtype H5N1
  - Authorities in the Netherlands ban the sale of poultry and eggs following the
    discovery of the bird flu virus at a chicken farm. Authorities in the United Kingdom
    have also confirmed that the virus has been discovered at a Yorkshire duck farm
    with the birds being culled. (AP)
  Law and crime:
  - Protestors in Brisbane burn Australian flags over indigenous rights. (News.com.au)
  Politics and elections:
  - Romanian presidential election, 2014
  - Voters in Romania go to the polls for the second round of the presidential election
    with Klaus Iohannis scoring an upset victory over current Prime Minister Victor
    Ponta. (BBC), (Reuters)
  Sports:
  - In motorsport, American driver Kevin Harvick wins the 2014 NASCAR Sprint Cup Series
    by winning the final race of the season at Homestead–Miami Speedway. Ryan Newman
    finishes second by 1 point, the second-closest margin in history. (Yahoo! Sports)
