Date: '2014-11-23'
Source_URI: Portal:Current events/2014 November 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  War in Afghanistan:
  - A suicide bomber kills 45 people and injures 50 more at a volleyball game in Paktika
    province. (Reuters)
  Islamist insurgency in Nigeria:
  - Boko Haram militants kill 48 fish traders near the border with Chad. (BBC)
  - Kenyan security forces cross into Somalia and kill 100 members of Al-Shabaab in
    response to the terrorist group hijacking a bus and killing 28 people. (CNN)
  Disasters and accidents:
  - The death toll from yesterday's earthquake in China's Sichuan province rises to
    four with 54 injured. (AP via Fox News)
  - Volcano eruption on Fogo island, Cape Verde is among the strongest ever recorded
    on the island and is forcing the evacuation of the Chã das Caldeiras village.
    (OceanPress)
  Law and crime:
  - Crime in the Philippines
  - The Philippines marks the 5th anniversary of the Maguindanao massacre. (BBC News)
  - Philippine authorities sentence the security officers of the Ozone disco who were
    responsible for the safety of the disco when a fire occurred in 1996. (BBC News)
  Politics and elections:
  - Tunisian presidential election, 2014
  - Voters in Tunisia go to the polls Sunday in the first free presidential election
    since the Arab Spring's Jasmine Revolution. (BBC) (Pakistan Daily Times)
  - Tuinisia's presidential election appears headed for a runoff between incumbent
    interim President Moncef Marzouki and former Prime Minister Beji Caid Essebsi.
    (Bangkok Post)
  - The Cabinet of Israel approves legislation defining it as the nation state of
    the Jewish people. (AP)
  Sport:
  - Britain's Lewis Hamilton wins the 2014 Formula One world title after finishing
    first in the Abu Dhabi Grand Prix. (BBC Sport)
  - In tennis, Switzerland wins the Davis Cup for the first time defeating France
    in the final. (New York Times)
  World Chess Championship 2014:
  - Norwegian chessplayer Magnus Carlsen defends his World Chess Championship title
    after defeating Vishy Anand of India in 11th game of their match in Sochi, Russia.
    (Deutsche Welle)
