Date: '2014-11-22'
Source_URI: Portal:Current events/2014 November 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - Al-Shabaab militants hijack a bus travelling between the town of Mandera and the
    Kenyan capital Nairobi and execute 28 non-Muslim passengers. (Agencies via Deutsche
    Welle)
  Disasters and accidents:
  - A 6.8 magnitude earthquake occurs in Nagano Prefecture in Japan resulting in at
    least 30 people being injured as several homes collapse. (Wires and ABC News Australia),
    (AP)
  - A 5.9 magnitude earthquake occurs near the town of Kangding in China's Sichuan
    province resulting at least two deaths and 54 injuries. (AP via Wall Street Journal)
  Politics and elections:
  - Bahraini general election, 2014
  - Voters in Bahrain go to the polls for the first parliamentary elections since
    the unsuccessful Pearl Revolution. (BBC)
  Sport:
  - In football, Argentinian Lionel Messi of FC Barcelona sets a new goal scoring
    record in La Liga of 253 goals. (Reuters via SBS)
