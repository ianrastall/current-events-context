Date: '2014-11-15'
Source_URI: Portal:Current events/2014 November 15
Intelligence_Payload:
  Disasters and accidents:
  - A chemical leak at a DuPont plant in LaPorte, Texas leaves four workers dead.
    (NBC News)
  - A 5.4 magnitude earthquake causes serious damage in the Lake Region of Kyrgyzstan.
    (Reuters)
  - A 7.1 magnitude earthquake occurs in waters off Kota Ternate in Indonesia with
    the potential to trigger a tsunami to hit Indonesia and the Philippines. (AP)
  - Later reports state that the threat of a tsunami has passed. (NOAA)
  International relations:
  - The ninth G-20 summit gets underway in the Australian city of Brisbane. (AP via
    NBC News)
  - Italian MP, Romina Mura, complains on the Turkish embassy for their views on the
    Armenian Genocide. (Armenpress)
