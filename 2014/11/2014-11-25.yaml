Date: '2014-11-25'
Source_URI: Portal:Current events/2014 November 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - al-Qaeda insurgency in Yemen
  - A joint operation by U.S. and Yemeni special operations forces on an al-Qaeda
    hideout in eastern Yemen rescues 8 hostages and leaves 7 militants dead. (New
    York Times)
  - Islamic State in Iraq and the Levant
  - Syrian Air Force raids on the city of Raqqa kill at least 36 people. (Washington
    Post)
  Islamist insurgency in Nigeria:
  - Two teenage girl suicide bombers kill more than 40 people in Maiduguri, the capital
    of Borno state in northeastern Nigeria. (AP via Washington Post)
  Disasters and accidents:
  - A block of flats collapses in the Egyptian capital Cairo killing at least 10 people.
    (BBC)
  Law and crime:
  - Portuguese police arrest the ex-prime minister of Portugal, José Socrates. They
    accuse him of corruption, fiscal fraud, and money laundering. (New York Times)
  - 2014 Ferguson unrest
  - The St. Louis suburb of Ferguson braces for another night of violence following
    the decision by a grand jury not to indict a police officer in relation to the
    shooting of Michael Brown. (AP via First Post)
  - 2014 Amsterdam drug deaths
  - People died afrer snorting white heroin that was sold as cocaine by a street dealer
    in Amsterdam, the Netherlands (Washington Times)
  Politics and elections:
  - 2014 Hong Kong protests
  - Hong Kong authorities start clearing away barricades in the district of Mong Kok.
    (AP via Miami Herald)
  Sport:
  - Days after his hat-trick broke the Primera División's 59-year goal-scoring record,
    Barcelona striker Lionel Messi scores another hat-trick in Nicosia to become the
    UEFA Champions League all-time top scorer. (Guardian) (Mail)
  - The Australian cricketer Phillip Hughes is in critical condition after being injured
    by a bouncer during a Sheffield Shield game. (ESPNCricinfo)
