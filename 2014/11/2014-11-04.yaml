Date: '2014-11-04'
Source_URI: Portal:Current events/2014 November 4
Intelligence_Payload:
  International relations:
  - The United States circulates a draft resolution proposing a sanctions regime for
    conflict-torn South Sudan. (Reuters)
  - In Johannesburg, Angolan journalist and human rights campaigner Rafael Marques
    says the African Union should move its headquarters out of Ethiopia because of
    concerns about freedom of expression there. (Fox News)
  Law and crime:
  - Mexican Federal Police arrest a mayor and his wife, the alleged masterminds of
    the kidnapping of 43 students in Iguala, Guerrero. (Los Angeles Times)
  Politics and elections:
  - United States elections, 2014
  - Voters in the United States go to the polls for House of Representatives, Senate
    and local elections. (Bloomberg)
  - The Republican Party retains control of the United States House of Representatives
    and regains control of the United States Senate. Mitch McConnell of Kentucky is
    expected to become Senate Majority Leader. (NBC News), (Washington Post)
  - Tim Scott, a Republican from South Carolina, becomes the first African American
    senator to be elected in the South since Reconstruction. (AP via Weekly Standard)
  - Mia Love, a 38-year-old Brooklyn-born daughter of Haitian immigrants and a convert
    to Mormonism, wins election to the House of Representatives in Utah's 4th congressional
    district. She will become the first black female Republican to ever serve in Congress.
    (FOXNews)
  - Voters in Alaska, Oregon and the District of Columbia vote to legalize marijuana
    for recreational purposes. (Chicago Tribune)
  - Voters in Alaska, Arkansas, Nebraska and South Dakota approve of a minimum wage
    raise in their states. (NBC News)
  Sports:
  - In horse racing, German horse Protectionist wins the 2014 Melbourne Cup ahead
    of Red Cadeaux and Who Shot Thebarman. (Melbourne Age)
  - In baseball, the 2014 Korean Series begins with the Nexen Heroes defeating the
    Samsung Lions 4–2 in Samsung's Daegu Stadium. (Yonhap)
