Date: '2014-11-03'
Source_URI: Portal:Current events/2014 November 3
Intelligence_Payload:
  Islamic State in Iraq and the Levant:
  - Islamic State militants claim to have captured the Jahar gas fields in the Syrian
    province of Homs, the second gas field they have captured in a week. (Reuters)
  Arts and culture:
  - One World Trade Center officially opens, replacing its predecessor 13 years after
    the September 11 attacks. (FOXNews)
  - 'Cardinal Timothy Dolan announces plans to merge 112 parishes: nearly one-third
    of the parishes in the New York archdiocese. Under the plan the 112 parishes will
    be merged into 55 consolidated parishes. (New York Times), (The Dialog)'
  Disasters and accidents:
  - A small boat carrying asylum seekers sinks in the Black Sea near the Turkish city
    of Istanbul resulting in at least 21 deaths. (AAP via SBS)
