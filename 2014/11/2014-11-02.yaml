Date: '2014-11-02'
Source_URI: Portal:Current events/2014 November 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 60 people were killed and 110 injured by a suicide bombing in the Pakistani
    city of Lahore. (CNN)
  - Abu Sayyaf guerillas kill six Philippine Army soldiers outside the town of Basilan.
    (AP viaWashington Post)
  - An assault on a police barracks by suspected members of the Mombasa Republican
    Council separatist group leaves one officer and six attackers dead in Mombasa,
    Kenya. (Reuters)
  Islamic State in Iraq and the Levant:
  - Over 300 members of the Sunni Albu Nimr tribe are executed by ISIS militants in
    Anbar Province, western Iraq. (Reuters via Al Arabiya)
  Libyan Civil War:
  - The death toll surpasses 200 from fighting between loyalist troops and Islamist
    militias in Benghazi since an offensive launched by Khalifa Hifter began two weeks
    ago. (AP via ABC News)
  Gaza-Israel conflict:
  - Hamas arrested five people on Sunday suspected of firing a rocket into Israel
    in violation of the truce. (Times of Israel)
  Law and crime:
  - Multiple people are arrested for their alleged involvement with a hit-and-run
    that killed three 13-year-old trick-or-treaters in Santa Ana, California, U.S.
    (Yahoo News)
  Romanian presidential election, 2014:
  - More than 18 million Romanians are expected to go to the polls to choose their
    president in one of the most important elections since the 1989 revolution. (HotNews.ro)
    (EurActiv)
  - Romanian Prime Minister Victor Ponta, from the ruling PSD, and the ethnic German
    mayor of Sibiu Klaus Iohannis, from the opposition ACL electoral alliance, will
    face a November 16 runoff, with the incumbent Social democrat premier favored
    to win. (BBC)
  2014 pro-Russian unrest in Ukraine:
  - Voters in break away "people's republics" (Donetsk People's Republic and Lugansk
    People's Republic respectively) in Donetsk and Luhansk go to the polls for parliamentary
    and presidential elections. Rebel leaders Alexander Zakharchenko (Donetsk) and
    Igor Plotnisky (Luhansk) appear set for victory in early counting in elections
    which will be recognised in Russia but not elsewhere. International observers
    noted a very high turnout. (BBC)
