Date: '2014-11-11'
Source_URI: Portal:Current events/2014 November 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - A gunfight and two bombings leave at least 15 militants and 5 soldiers dead. (AFP
    via Gulf News)
  - Islamic State
  - A suicide bomber kills eight people in the centre of Baiji in northern Iraq. (Reuters)
  Arts and culture:
  - Renowned Zen Buddhist master Thích Nhất Hạnh suffers a massive brain hemorrhage
    and is rushed to a hospital in western France. (NBC News)
  Business and economy:
  - The Bank of England fires Martin Mallett, once its chief foreign exchange dealer,
    due to evidence that he was in some degree complicit in market manipulation. (Telegraph)
  Disasters and accidents:
  - 58 people are killed in a bus crash in the Sukkur District in southern Pakistan's
    Sindh province. (AP)
  - The first winter storm of the season hits the midwestern United States with at
    least four people dead in Minnesota. (NBC News)
  Health:
  - Eleven women have died and at least twenty are in a critical condition after undergoing
    sterilization surgery in Bilaspur, Chhattisgarh, as part of India]]'s state-run
    mass sterilization campaign. (BBC)
  - Ebola virus epidemic in West Africa
  - Mali confirms that it has a new case of Ebola virus, this time in the capital
    Bamako. (New York Times)
  - Ebola virus cases in the United States
  - Dr. Craig Spencer, a Doctors Without Borders volunteer, was declared free of the
    Ebola virus and released from a New York City hospital. His was the last Ebola
    case being treated in the United States. (USA Today)
  Law and crime:
  - Sinking of MV Sewol
  - In South Korea, fifteen members of the crew of the MV Sewol are sentenced for
    criminal negligence in the ferry disaster with the captain sentenced to 36 years
    and the chief engineer sentenced to 30 years. (Fox News)
  - Iguala mass kidnapping
  - A mob angry at the kidnapping and murder of 43 students torches the regional headquarters
    of Mexico's ruling Institutional Revolutionary Party (PRI) in Chilpancingo, Guerrero,
    and briefly holds a police commander hostage. (Agencies via The Telegraph)
  Politics:
  - Umbrella Revolution
  - Following a court injunction authorising the clearance of protest sites, pro-democracy
    protesters in Hong Kong are warned they could face arrest if they do not leave
    the sites. (Reuters)
  Sports:
  - Thai violinist Vanessa-Mae is banned from skiing races for four years for race
    fixing that enabled her to compete for Thailand at the 2014 Winter Olympics. (The
    Guardian)
  - In baseball, the 2014 Korean Series ends with the Samsung Lions beating the Nexen
    Heroes by 4 games to 2 for their fourth consecutive Korean Series. (The Korea
    Herald)
  - In football, Morocco has been stripped of the rights to host the 2015 Africa Cup
    of Nations and barred from the tournament following an attempt to postpone it
    due to the Ebola outbreak. (Independent, Ireland)
