Date: '2014-11-27'
Source_URI: Portal:Current events/2014 November 27
Intelligence_Payload:
  War in Afghanistan:
  - A suicide bomber kills 5 in a targeted attack on a British embassy vehicle in
    Kabul, Afghanistan. (BBC)
  Sudanese nomadic conflicts:
  - At least 133 people were killed and 100 wounded, in the aftermath of clashes between
    Awlad Omran and Al-Ziyoud groups of the Mesiria tribe. The clashes occurred in
    the Kwak area of the West Kurdufan state, Sudan. (Euronews)
  Islamist insurgency in Nigeria:
  - A roadside bomb planted at a bus station near the town of Mubi in northeastern
    Nigeria kills 40, including 5 soldiers. (Reuters)
  Business and economy:
  - The European Parliament passes a symbolic motion calling for the break-up of American
    tech giant Google. (New York Times)
  - France sets a new record for unemployment with 3.46 million recorded in October.
    (Sky News)
  Greek government-debt crisis:
  - Greek labor unions begin a general strike to protest ongoing government austerity
    measures shuting down public medical, educational, and transportational services.
    (AP via Business Standard)
  Disasters:
  - The UN Relief and Works Agency for Palestine Refugees in the Near East declares
    a state of emergency on the Gaza Strip following heavy floods. (Press TV)
  2014 Hong Kong protests:
  - The Hong Kong Police Force arrests eleven more people in a second night of violence
    after removal of a camp in Mong Kok and seven police officers are arrested for
    alleged assault of a protester on October 15. (AP)
  Politics and elections:
  - Moldovan parliamentary election, 2014
  - the Election commission bans the new pro-Russian party Homeland from competing
    in the elections because of financial support from abroad. (Radio Free Europe/Radio
    Liberty)
  - The Parliament of Ukraine meets for the first time since recent elections with
    Arseniy Yatsenyuk expected to be confirmed as Prime Minister. (Irish Times)
  - The Smith Commission, established by UK Prime Minister David Cameron to look at
    enhanced devolution for Scotland following the independence referendum, publishes
    its report, recommending the Scottish Parliament should be given the power to
    set income tax rates and bands. (BBC)
  - North Korean leader Kim Jong-Un appoints his sister, Kim Yo Jong, to a high government
    position. (CBC)
  - Tongans vote out half of the incumbents in the Legislative Assembly. (ABC Online)
  Sports:
  - In cricket, Australian cricketer Phillip Hughes dies two days after being struck
    on the head by a bouncer while playing in a Sheffield Shield match for South Australia
    against New South Wales. (Canberra Times)
  - In surfing, Australian surfer Stephanie Gilmore wins her 6th women's world surfing
    title. (Brisbane Times)
