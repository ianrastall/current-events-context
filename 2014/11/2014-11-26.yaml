Date: '2014-11-26'
Source_URI: Portal:Current events/2014 November 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian unrest in Ukraine
  - At least three people die in a new round of fighting between the Armed Forces
    of Ukraine and pro-Russian separatists. (Xinhua)
  Disasters and accidents:
  - A fire in a coal mine in China's Liaoning province kills 24 miners and injures
    another 52. (AFP via Channel News Asia)
  - A heavy storm in the eastern United States causes poor road conditions, and delays
    and cancellations of airline flights ahead of the Thanksgiving holidays with up
    to 30 million people affected. (CNN)
  Law and crime:
  - Vietnamese lawmakers approve a law allowing broad foreign ownership of property,
    as the government seeks to boost an ailing real-estate market and accelerate growth.
    (Financial Review)
  - An Egyptian court sentences 78 teenage boys to between 2 and 5 years in jail for
    participating in rallies calling for the return of ousted President Mohammed Mursi.
    (AFP, Reuters vis Sydney Morning Herald)
  Politics and elections:
  - Mexico's Party of the Democratic Revolution (PRD) founder Cuauhtémoc Cárdenas
    resigns amid internal political crisis resulting from the disappearance of the
    43 students in September. (El País)
  - 2014 Hong Kong protests
  - More than 80 people are arrested as police dismantle a protest camp in the Mong
    Kok commercial district. (BBC)
  - Student leaders Joshua Wong and Lester Shum are amongst those arrested. (Reuters)
