Date: '2014-11-13'
Source_URI: Portal:Current events/2014 November 13
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - The Nigerian-based militant group seizes control of the northeastern town of Chibok,
    Borno State. (BBC)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organization reports that the death toll in the three worst affected
    countries in West Africa - Guinea, Liberia and Sierra Leone - has passed 5,000.
    (Reuters)
  International relations:
  - Malaysia Airlines Flight 17
  - The investigation team extends its deadline by another nine months to August 2015
    due to difficulties in accessing the crash site. (The Australian)
  - United Nations
  - Cuba defends North Korea by circulating an amendment to a European-Japanese draft
    resolution recommending the referral of North Korea to the International Criminal
    Court for crimes against humanity. (Reuters)
  Law and crime:
  - A doctor is arrested, believed responsible for the deaths of 13 women in a state-run
    sterilization clinic in Chhattisgarh, India. (BBC)
  - A spokeswoman for the public prosecutor in Switzerland confirms existence of open
    criminal investigations regarding several people who may have taken part in manipulation
    of the currency exchange markets; such investigations are also underway in the
    United States and Britain. (Reuters)
  - A United States Secret Service report outlines numerous security failures that
    enabled Omar Gonzalez to enter the White House. (Washington Post)
  Science:
  - Comet landing
  - The Philae landing craft is now "stable" after bouncing hundreds of metres from
    its initial touchdown, and is sending pictures from the surface of the comet 67P/Churyumov–Gerasimenko.
    (BBC)
  Sports:
  - In cricket, Rohit Sharma of India sets a new record of 264 runs in an ODI innings,
    leading India to a 153-run victory over Sri Lanka in the fourth ODI of Sri Lanka's
    current tour. (ESPNcricinfo)
  In Major League Baseball, the two MVPs are announced:
  - In the National League, Clayton Kershaw of the Los Angeles Dodgers, who had previously
    won the league's Cy Young Award as its most outstanding pitcher, becomes the first
    NL player to sweep both awards since Bob Gibson in . (ESPN)
  - In the American League, Los Angeles Angels outfielder Mike Trout wins the award
    in a unanimous vote. At age 23, he becomes the youngest player ever to be unanimously
    named MVP. (ESPN)
