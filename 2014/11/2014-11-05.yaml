Date: '2014-11-05'
Source_URI: Portal:Current events/2014 November 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Libyan Civil War
  - Battles between loyalist forces and militias have killed nearly 400 in three weeks,
    including at least 250 deaths in Benghazi and 140 near the capital Tripoli. (Associated
    Press via Washington Post)
  - al-Qaeda insurgency in Yemen
  - A US drone strike kills five Al Qaeda in the Arabian Peninsula operatives including
    Shawki al-Badani and Nabil al-Dahab, leader of Ansar al-Sharia in Yemen's Al Bayda
    Governorate. (Reuters via ABC News Australia)
  - Syrian Civil War
  - Mortar fire kills eleven children at a school in Damascus. (Reuters)
  Israeli–Palestinian conflict:
  - A vehicular attack in Jerusalem leaves one person dead and injures fourteen others
    as Hamas claims responsibility and calls for similar acts. (AP)(Times of Israel)(ABC
    News)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organisation appoints Dr Matshidiso Moeti of Botswana as its
    new Africa chief as the death toll from the virus passes 5,000. (AP)
