Date: '2014-11-07'
Source_URI: Portal:Current events/2014 November 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 military intervention against ISIS
  - United States President Barack Obama orders 1500 more troops into Iraq. (The New
    York Times)
  Disasters and accidents:
  - The Philippines commemorates the anniversary of Typhoon Haiyan (Yolanda) which
    destroyed much of the city of Tacloban. (CNN)
  Law and crime:
  - Patient Protection and Affordable Care Act
  - The U.S. Supreme Court agrees to hear federal subsidies cases concerning the law.
    (Fox News)
  - Parents of Mexico's missing students say authorities found 6 bags containing unidentified
    corpses; investigations are underway to determine if they are of the missing students.
    Three people confess their involvement in the massacre. (Fox News)
  - Authorities in New Zealand drop the charge against AC/DC drummer Phil Rudd of
    attempting to procure murder. (The Guardian)
  - The Home Depot discloses that 53 million additional e-mail addresses are compromised
    in the recent data breach. (FOXBusiness)
  2014 Marysville Pilchuck High School shooting:
  - The death toll in the shooting rises to five. (King5)
