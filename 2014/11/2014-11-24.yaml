Date: '2014-11-24'
Source_URI: Portal:Current events/2014 November 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram captures the northeastern Nigerian town of Damasak, killing 50 and
    forcing more than 3,000 to flee across the border into Niger. (UNHCR)
  Arts and culture:
  - Launch of The National, the first Scottish daily newspaper to support Scottish
    independence. (RT)
  Business and economy:
  - The chief executive officer of United Technologies abruptly steps down. (Reuters)
  Disasters and accidents:
  - Malaysia Airlines flight MH17
  - The Dutch Safety Board reports that it has finished work on recovery of the wreckage
    of Malaysia Airlines flight MH17. (Irish Examiner)
  - Floods caused by torrential rain result in 32 deaths in southern Morocco. (Euronews)
  Law and crime:
  - Shooting of Michael Brown, 2014 Ferguson unrest
  - A grand jury in St. Louis County, Missouri decides not to indict police officer
    Darren Wilson in relation to the shooting of Michael Brown in the suburb of Ferguson.
    (USA Today), (Washington Post)
  - Protests turn violent following the announcement despite a request by the President
    of the United States Barack Obama and Brown's family for any protests to be peaceful.
    (CNN)
  Politics and elections:
  - President Barack Obama accepts the resignation of Secretary of Defense Chuck Hagel.
    (BBC)
