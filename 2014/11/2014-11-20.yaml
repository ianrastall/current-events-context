Date: '2014-11-20'
Source_URI: Portal:Current events/2014 November 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - ADF insurgency
  - The Ugandan rebel group kills up to 80 people near Beni in North Kivu, Democratic
    Republic of the Congo. (Reuters)
  15th Latin Grammy Awards:
  - Enrique Iglesias, Gente de Zona, and Descemer Bueno win three Latin Grammy Awards
    including Song of the Year for "Bailando". (ABC News)
  - Paco de Lucía posthumously wins the Latin Grammy Award for Album of the Year for
    Canción de Andaluza. (ABC News)
  - Jorge Drexler and Ana Tijoux win the Latin Grammy Award for Record of the Year
    for "Universos Paralelos". (ABC News)
  International relations:
  - North Korea threatens to conduct another nuclear test in response to a United
    Nations Human Rights Council resolution passed on Tuesday recommending the Security
    Council authorise a probe into human rights abuses. (BBC)
  Law and crime:
  - The New South Wales Independent Commission against Corruption charges former ministers
    Eddie Obeid and Ian Macdonald for offenses of misconduct in public office in relation
    to mining licences. (AAP via Sky News Australia)
  - A knife attack in a sanatorium dormitory in the Northern China resort of Beidahe
    kills seven people, including six nurses. (Reuters via The Globe and Mail)
  - Sinking of MV Sewol
  - A South Korean court sentences Kim Han-sik, the chief executive of Chonghaejin
    Marine, operator of the , to ten years in jail for negligence and embezzlement.
    (Reuters)
  - 'The President of the United States Barack Obama announces executive orders to
    defer the deportations of a certain group of illegal immigrants: parents whose
    children are already U.S. citizens and legal permanent residents who have lived
    in the United States for five years or more. (Washington Post)'
  Politics and elections:
  - The President of Sri Lanka Mahinda Rajapaksa calls an early election. (Washington
    Post)
  - Thousands of protestors gather in Mexico City for a national rally in memory of
    the 43 missing students. Demonstrators have also called for a nationwide strike.
    (BBC News)
  - Nicola Sturgeon becomes Scottish First Minister, after Alex Salmond's resignation.
