Date: '2014-11-14'
Source_URI: Portal:Current events/2014 November 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and Syria
  - Iraqi forces expel ISIS from the refinery town of Baiji in northern Iraq. (Al
    Arabiya)
  Arts and culture:
  - Russia plans an "alternative Wikipedia". (BBC)
  Swedish submarine incidents:
  - Sweden releases a sonar image it says is proof that a foreign submarine entered
    its waters in October. The grainy image shows underwater tracks allegedly left
    by the vessel. (BBC)
  Politics:
  - Japanese Prime Minister Shinzo Abe is preparing to dissolve the Lower House of
    the Diet on Tuesday and call a snap election on December 14th in order to seek
    a public mandate on whether to delay a scheduled increase in the consumption tax.
    (NHK World)
  - Nicola Sturgeon becomes Leader of the Scottish National Party. (NY Times)
