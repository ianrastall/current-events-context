Date: '2014-11-17'
Source_URI: Portal:Current events/2014 November 17
Intelligence_Payload:
  Business and economy:
  - After months fending off a takeover bid from Canada's Valeant, the board of U.S.
    biopharm firm Allergan accepts a $66 billion offer from an Irish white knight,
    Actavis. (Reuters)
  Disasters and accidents:
  - A large earthquake occurs off the coast of New Zealand. (New Zealand Herald)
  International relations:
  - Australia and the People's Republic of China conclude a free trade deal worth
    $18 billion. (News Limited)
  Law and crime:
  - Kenyan police raid two mosques in Mombasa suspected of being linked to al-Shabab.
    One man is killed and over 200 are arrested. (Al Jazeera)
  - Former Beltrán Leyva Cartel leader Alfredo Beltrán Leyva is extradited to the
    United States from Mexico, facing drug trafficking and money laundering offenses.
    (US Department of Justice)
  Politics and elections:
  - Burkinabé uprising
  - Former Burkina Faso foreign minister Michel Kafando is named as transitional President.
    (Reuters)
  Religion:
  - The Church of England adopts legislation paving the way for the appointment of
    female bishops. (BBC)
