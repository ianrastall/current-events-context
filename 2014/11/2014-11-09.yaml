Date: '2014-11-09'
Source_URI: Portal:Current events/2014 November 9
Intelligence_Payload:
  Arts and culture:
  - Tens of thousands of people gather in Berlin at the Brandenburg Gate to mark the
    25th anniversary of the Fall of the Berlin Wall. (BBC News)
  Disasters and accidents:
  - Nine people die after a light plane crashes on an approach to the island of Grand
    Bahama. The dead include preacher Myles Munroe. (AP via Fox News), (NBC News)
  Health:
  - Portugal reports at least 180 cases of Legionella and five fatalities in an outbreak.
    (Diário de Notícias)
  Politics and elections:
  - The Catalan people vote in a referendum on whether and how they should exercise
    self-determination. The Spanish government in Madrid does not recognise the authority
    of the vote. (BBC)
