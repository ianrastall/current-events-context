Date: '2014-11-12'
Source_URI: Portal:Current events/2014 November 12
Intelligence_Payload:
  Armed conflict and attacks:
  - 2014 Russian military intervention in Ukraine
  - NATO claims that Russian Army troops and military equipment have entered Ukraine.
    (BBC)
  - War in Donbass
  - Russian Defence Minister Sergey Shoigu says that the country will resume long-distance
    military flights for the first time since the Cold War to the western Atlantic
    Ocean and Caribbean Sea. (BBC)
  - Yemen
  - Houthi rebellion
  - Fighting between Houthi rebels and Ansar al-Sharia-backed Sunni tribes have left
    at least 33 dead in Al Bayda' Governorate. (Reuters)
  - al-Qaeda insurgency in Yemen
  - A U.S. drone strike kills seven al-Qaeda militants in the south. (Reuters)
  - Azerbaijan shoots down an Armenian Mil Mi-24 military helicopter. (Bloomberg)
  - Islamic State of Iraq and the Levant
  - Suicide bombings kill at least 23 people across Iraq. (Reuters)
  - Islamist unrest in Egypt (2013–14)
  - Gunmen attack an Egyptian Navy ship on the Mediterranean Sea with eight sailors
    missing and four injured after the attack. Thirty-two of the gunmen have been
    captured with four reported as dead. (Voice of America)
  International relations:
  - The 25th ASEAN Summit is held in the city of Naypyidaw, the capital of Myanmar.
    (AP via Daily Mail)
  - Chinese leader Xi Jinping and President of the United States Barack Obama reach
    a deal to limit greenhouse gases. (Washington Post)
  Law and crime:
  - 2014 Iguala mass kidnapping
  - Protesters attack the State Congress building in Mexico's Guerrero state setting
    alight five vehicles. (BBC)
  Science:
  - The European Space Agency's Rosetta lands the Philae probe on the comet 67P/Churyumov-Gerasimenko.
    (Washington Post) (BBC)
