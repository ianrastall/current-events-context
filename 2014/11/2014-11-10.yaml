  Islamist insurgency in Nigeria:
  - A suicide bomber kills at least 47 students at a school assembly in the Nigerian
    town of Potiskum in Yobe state. (BBC)
  - Ten policemen, including a commander, are killed by bomb blasts in Jalalabad and
    Logar Province. (Washington Post)
  - At least four policemen are killed and another four are wounded in separate attacks
    in Karachi and Rawalpindi. (Geo TV)
  - 'Killing of Sergeant Almog Shiloni: A Palestinian man fatally stabs an Israeli
    soldier in Tel Aviv.'
  - '2014 Alon Shvut stabbing attack: In a separate attack at a bus stop near Alon
    Shvut in the West Bank, a Palestinian man runs over three people with a vehicle
    then stabs all three, resulting in the death of 26-year-old occupational therapist
    Dahlia Lemkus. (Reuters) (Times of Israel) (Times of Israel)'
  Business and Economy:
  - Isabel dos Santos, a billionaire and the eldest daughter of the President of Angola,
    has entered an auction for Portugal Telecom, bidding against a France based company,
    Altice. (BBC)
  International relations:
  - APEC China 2014
  - Members of the Asia Pacific Economic Cooperation forum gather in Beijing. (BBC)
  Law and crime:
  - Prosecutors in Lithuania charge an employee at the state air navigation company
    for spying for Belarus over civilian and military air operations. (Reuters)
