Date: '2014-11-28'
Source_URI: Portal:Current events/2014 November 28
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - Gunmen set off three bombs and fire at worshippers at the central mosque in the
    northern city of Kano after the Emir, Sanusi Lamido Sanusi, had issued a call
    to arms against Boko Haram. At least 120 people are killed. (CNN)
  Business and economy:
  - Frantic trading in energy company stocks, especially the suppliers of oil-services,
    shaves billions off the market capitalization of publically traded businesses
    within this sector. (Reuters)
  Holy See–Turkey relations:
  - Pope Francis visits Turkey, calling for interfaith dialogue and an end to Islamic
    extremism, and meeting with President Recep Tayyip Erdoğan and Bartholomew I of
    Constantinople. (AFP via The Times of India)
  Law and crime:
  - The death toll from a mass overdose in a Venezuelan prison after prisoners storm
    a prison infirmary during a prison uprising rises to 35. A hundred other prisoners
    are receiving treatment. (AP via Houston Chronicle)
  - Tuğçe Albayrak, an advocate for harassed women, succumbs to her injury from a
    November 15 attack. German police have already arrested a suspected man. (The
    Independent)
  Politics and elections:
  - The Parliament of Finland votes to allow same-sex marriage, marking the first
    time that a citizens' initiative has received lawmakers' blessing to be written
    into the legislation. (YLE)
  - The social-democratic Siumut narrowly retains a government-forming plurality of
    votes in the Greenlandic general election, tying with leftist opposition Inuit
    Ataqatigiit for number of parliament seats. (Reuters)
  - Hage Geingob wins his elect to become President of Namibia as his ruling SWAPO
    party wins an overwhelming majority in the National Assembly. (AP via ABC News)
  Post-coup unrest in Egypt (2013–14):
  - Three army officers and two protesters are killed and more than one hundred protesters
    are arrested during anti-government protests across Egypt. (ABC News)
  National Football League player conduct controversy:
  - An independent arbitrator between the NFL and the NFL Players Association overturns
    the indefinite suspension levied upon free-agent running back Ray Rice by the
    NFL for assaulting his fiancee. (Bloomberg)
