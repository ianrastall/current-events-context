Date: '2014-04-18'
Source_URI: Portal:Current events/2014 April 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Dozens of civilians sheltering in a UN base in the South Sudan town of Bor are
    killed in an attack by armed men. (BBC News)
  Syrian civil war:
  - The death toll of children in the entire conflict reaches nearly 15,000. (Turkish
    Press)
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian separatists in Donetsk say they will not leave the government buildings,
    defying the Kyiv authorities and threatening a new international deal on Ukraine.
    (BBC News)
  Post-coup unrest in Egypt (2013–14):
  - A police officer is killed and another is wounded after a bomb detonates in a
    busy square in Cairo's Mohandessin district. (The Guardian)
  Business and economy:
  - Arts and crafts retailer Michaels announces that 3 million customers were affected
    by the 8-month long security breach that resulted in the theft of their customers'
    personal information. (CNN)
  Disasters and accidents:
  - Twelve people are killed in an avalanche on Mount Everest. (The Guardian)
  - A 7.5-magnitude earthquake hits near Petatlán, Guerrero, Mexico. (USGS)
  2014 South Korean ferry capsizing:
  - The death toll of the accident rises to 28. (Yonhap)
  - South Korean prosecutors have issued an arrest warrant for the captain, Lee Joon-seok,
    and are seeking the arrest of two other crew members of the Sewol in the wake
    of the ferry capsizing. (CNN)
  Pollution in China:
  - An official study released by the Chinese government reveals that about one-fifth
    of China's soil is contaminated. (BBC News)
  Sino-Vietnamese border incidents:
  - Seven people are killed in a border clash between illegal Chinese migrants and
    Vietnamese security forces at Quang Ninh province. (Wall Street Journal)
