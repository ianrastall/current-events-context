Date: '2014-04-20'
Source_URI: Portal:Current events/2014 April 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - AQIM militants kill eleven soldiers in Tizi Ouzou region of Algeria east of capital
    Algiers in one the deadliest attacks on the Algerian military in several years.
    (BDC)
  2014 pro-Russian unrest in Ukraine:
  - Three people are killed in an attack on check post in Eastern Ukraine manned by
    pro-Russian supporters. (Al Jazeera)
  Post-coup unrest in Egypt (2013–14):
  - Gunmen killed an Egyptian intelligence officer and a policeman on a desert road
    outside Cairo in a late-night firefight. (Chicago Tribune)
  Arts and culture:
  - Over 150,000 people turn out for Pope Francis' Easter mass. (Time)
  2014 South Korean ferry capsizing:
  - The death toll rises to 58 as Navy and Coast Guard divers comb the ferry to retrieve
    victims from the Sewol. Five routes into the ferry have been established, and
    operations are expected to pick up pace. (Yonhap)
  Politics and elections:
  - Afghan presidential election, 2014
  - Dr. Abdullah Abdullah, former foreign minister is leading in Afghan presidential
    election, 2014 with 44% votes followed by Ashraf Ghani with 33% votes, according
    to latest partial results. (BBC News)
  Sports:
  - Lewis Hamilton takes a dominant victory in Chinese Grand Prix to win three consecutive
    races for the first time in his career in Formula 1. His Mercedes-Benz team mate
    Nico Rosberg finished second and Ferrari's Fernando Alonso grabbed third place.
    (BBC Sport)
  - In game two of a Stanley Cup Playoff series, the San Jose Sharks defeat the Los
    Angeles Kings 7-2. During the game the Sharks scored a franchise record seven
    consecutive goals in a playoff game, also breaking the franchise record for most
    goals in a playoff game. The team also tied the franchise record for most goals
    in a period, with three, and the largest margin of victory (five goals). (Toronto
    Sun)
