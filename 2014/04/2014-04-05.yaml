Date: '2014-04-05'
Source_URI: Portal:Current events/2014 April 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two Italian priests and a Canadian nun have been kidnapped by gunmen in Cameroon.
    (AFP via Yahoo! News)
  2014 Aswan tribal clashes:
  - Twenty-three people are killed in a gunfight between feuding tribes near the Egyptian
    city of Aswan. (Al-Ahram) (The Hindu)
  Business and economy:
  - Tyson Foods recalls 75,000 pounds of frozen chicken nuggets due to complaints
    that pieces of plastic were found in its products. (KTVU) (USDA)
  Disasters and accidents:
  - At least three are killed and seven injured when a passenger train derails in
    the Tasikmalaya District, in Indonesia's West Java Island after hitting mounds
    of mud following a downpour of rain. (MSN)
  - Three Pakistani Rangers are killed and 36 injured after a truck overturned Punjab,
    Pakistan. (The Hindu)
  Politics and elections:
  - Sinn Féin’s Martin McGuinness, the Deputy First Minister of Northern Ireland accepts
    an invitation to attend several events during the forthcoming State visit of Irish
    President Michael D. Higgins to the United Kingdom, including a banquet to be
    held by Elizabeth II at Windsor Castle. (RTÉ News)
  Afghan presidential election, 2014:
  - Amidst violence, voters in Afghanistan elect a new President in what is the country's
    first democratic transfer of power. (BBC News) (HuffPost)
  Australian Senate special election in Western Australia, 2014:
  - Voters in the Australian state of Western Australia go to the polls for a Federal
    Senate election. (AAP via News Limited)
  Religion:
  - Roman Catholic Archdiocese of Atlanta archbishop Wilton Gregory announces he will
    sell his recently-acquired $2.2 million mansion amid criticism amongst parishioners.
    (KATC)
  Sports:
  - In horse racing, Pineau De Re, trained by Dr. Richard Newland and ridden by 37-year-old
    Leighton Aspell, who returned to racing after coming out of retirement, wins the
    2014 Grand National at Aintree racecourse with the odds of 25/1. (BBC Sport)
