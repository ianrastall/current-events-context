Date: '2014-04-15'
Source_URI: Portal:Current events/2014 April 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb detonates at a traffic police post in Cairo, Egypt, injuring three people.
    (AP via Houston Chronicle)
  - 2014 pro-Russian unrest in Ukraine
  - Shots are fired at Kramatorsk air base as Ukrainian Ground Forces are dispatched
    to take on separatists. Unconfirmed reports state that four pro-Russian militants
    have been killed and two people have been injured. Some reports claim up to ten
    deaths. (Sky News)
  - Ukraine's acting President Olexander Turchynov has announced the start of an "anti-terrorist
    operation" against pro-Russian separatists. (BBC News)
  - A group of terrorists, suspected to be Boko Haram, attack a Nigerian school, resulting
    in the deaths of two security force members and the abduction of 200 schoolgirls.
    (BBC News)
  Disasters and accidents:
  - At least 48 people die and 15 are severely injured after a bus crashes into a
    truck 150 kilometres north of Lomé, capital of the West African nation of Togo.
    (CNN)
  Health:
  - 2014 West Africa Ebola outbreak
  - The death toll from the West Africa ebola outbreak reaches 121. (AP)
  Law and crime:
  - In a landmark ruling, the Supreme Court of India recognizes transgender as a "third
    gender". (Times of India)
  - Former Prime Minister of Italy Silvio Berlusconi is sentenced to one year of community
    service for his conviction of tax fraud. (Los Angeles Times)
  - 2014 Calgary stabbing. Five people are stabbed to death and one person is in custody
    at a house party in Calgary, Alberta, Canada. (CBC News)
  Science:
  - A total lunar eclipse occurs, peaking at around 8AM UTC. (space.com via Fox News)
