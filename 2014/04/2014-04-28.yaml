Date: '2014-04-28'
Source_URI: Portal:Current events/2014 April 28
Intelligence_Payload:
  Post-coup unrest in Egypt:
  - An Egyptian court hands down a death sentence on 638 Muslim Brotherhood supporters,
    among them the group's top leader Mohamed Badie. (Reuters)
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian gunmen seize the town of Kostyantynivka, the latest in a string of
    towns in the eastern Ukraine. (AFP via Post)
  - The United States imposes a third round of sanctions against Russia, reportedly
    in response to Russia encouraging rebellion in eastern Ukraine. (Reuters)
  - The mayor of the eastern Ukrainian city of Kharkiv, Gennady Kernes, is shot in
    the back by an unknown assailant. (BBC News)
  - Two thousand people holding a peaceful demonstration in Donetsk for a united Ukraine
    are attacked with bats and teargas by pro-Russians. (NBC)
  Iraqi insurgency (post-U.S. withdrawal):
  - Suicide bomb attacks kill dozens of people at a political rally and at early polling
    places for the election to be held on April 30. (Reuters via ABC News Australia)
  Arts and culture:
  - More than 50 royal mummies have been discovered by Egyptian and Swiss archeologists
    in the newly opened KV40 tomb in Egypt's Valley of the Kings. (National Geographic)
  - Scottish-American comedian Craig Ferguson announces his departure from the CBS
    late-night talk show The Late Late Show, effective December 2014. (USA Today)
  Business and economics:
  - Microsoft announces a major vulnerability in Internet Explorer versions 6 to 11
    that could enable hackers to gain access and user rights to its customers' computers.
    (BBC News)
  Malaysia Airlines Flight 370:
  - The search area for the missing aircraft in the southern Indian Ocean is expanded
    with any debris likely to be found on the ocean floor with the minimum time anticipated
    for the search eight months. (TV New Zealand)
  Tornado outbreak of April 27–30, 2014:
  - Seventeen people are killed by tornadoes after a huge storm system sweeps across
    the central and southern United States. (BBC News)
  International relations:
  - Slovakia and Ukraine agree to a deal that will allow gas from Central Europe to
    reach Ukraine via Slovakia. (BBC News)
  Law and crime:
  - U.S. Representative Michael Grimm is taken into federal custody on charges relating
    to a failed restaurant business and allegations that he made false statements.
    (CNN)
  - Paul Simon and wife Edie Brickell are arrested and charged with disorderly conduct.
    (BBC News)
  Politics and elections:
  - An Egyptian court bans the April 6 Youth Movement over claims of espionage and
    of "damaging the image of the state". (Al-Ahram) (Chicago Tribune)
