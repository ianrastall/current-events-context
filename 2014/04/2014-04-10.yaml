Date: '2014-04-10'
Source_URI: Portal:Current events/2014 April 10
Intelligence_Payload:
  Accidents and disasters:
  - At least 10 people are killed after a tour bus collides with a FedEx truck on
    Interstate 5 near Orland, California. (CNN) (USA Today)
  Syrian civil war:
  - 88 civilians are killed in Aleppo by barrel bombs dropped from Syrian government
    warplanes. (NOW Lebanon)
  Arts and culture:
  - American comedian Stephen Colbert, host of The Colbert Report is announced to
    replace David Letterman to host the Late Show on CBS in 2015. (CBS)
  Politics and elections:
  - Five Russian lawmakers have asked the Prosecutor General of Russia, Yury Chaika,
    to investigate whether former Soviet leader Mikhail Gorbachev should face charges
    for his role in the breakup of the Soviet Union. (BBC News)
  - United States Secretary of Health and Human Services Kathleen Sebelius resigns
    from the Obama Administration. OMB Director Sylvia Mathews Burwell is expected
    to be nominated to replace Sebelius. (Fox News)
  2014 Crimean crisis:
  - The Parliamentary Assembly of the Council of Europe suspends Russia's right to
    vote and take part in election observations as a consequence to its annexation
    of Crimea. (Voice of Russia)
  Sunflower Movement in Taiwan:
  - Protesters against a proposed trade deal with China peacefully ended their 24-day
    occupation of the legislature, as lawmakers prepare to review bills requiring
    greater oversight for such agreements. (Bloomberg)
