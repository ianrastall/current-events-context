Date: '2014-04-14'
Source_URI: Portal:Current events/2014 April 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two Abu Sayyaf militants are killed and several captured in a raid in the Philippines
    city of Zamboanga. (AP via ABC News)
  - Islamist insurgency in Nigeria
  - 2014 pro-Russian protests in Ukraine
  Syrian Civil War:
  - Syria's political opposition urges US action in response to the Syrian government's
    barrel bombing campaign in the city of Aleppo. (Reuters)
  - Syrian government troops recapture the towns of Al-Sarkha and Ma'loula near the
    Syria-Lebanon border. (The Daily Star)
  - Twin bomb blasts hit a crowded bus station at the outskirts of the Nigerian capital
    Abuja, killing at least 71 and injuring more than 120 others. (BBC) (Al Jazeera)
  - Pro-Russian gunmen storm another police station, in the town of Horlivka, Donetsk
    Oblast. (BBC News)
  Arts and culture:
  - The Washington Post and The Guardian newspapers win the Pulitzer Prize for Public
    Service for their stories on the National Security Agency based on leaks from
    Edward Snowden. (AP via Salt Lake Tribune)
  Business and economy:
  - American financial services company TIAA–CREF agrees to buy Nuveen Investments
    for $6.25 billion. (Wall Street Journal)
  Law and crime:
  - Radical British Muslim cleric Abu Hamza al-Masri goes on trial in the American
    state of New York for 11 alleged terrorism offenses. (BBC News)
  - A United States court overturns the conviction of Andrew Auernheimer (known as
    weev), who was sentenced to 41-months in prison in 2010 for hacking the AT&T website,
    stealing millions of iPad user e-mails. (PC World)
  Politics and elections:
  - Voters in the Republic of Macedonia head to the polls for a runoff presidential
    election. (Voice of America)
  - Vietnam frees Nguyen Tien Trung and Vi Duc Hoi. (BBC News)
