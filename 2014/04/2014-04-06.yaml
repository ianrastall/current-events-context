Date: '2014-04-06'
Source_URI: Portal:Current events/2014 April 6
Intelligence_Payload:
  Syrian Civil War:
  - Mortar fire kills two people near the Damascus Opera House. (AP via Yahoo! News)
  2014 pro-Russian protests in Ukraine:
  - Pro-Russian demonstrators seize an administrative headquarters in the eastern
    Ukrainian city of Donetsk. (BBC News)
  2014 Aswan tribal clashes:
  - Two more people are killed in Egypt's Aswan in a third day of clashes. Death toll
    rises to 25. (Reuters) (Bloomberg)
  Business and economy:
  - The world's two largest cement manufacturers, LaFarge of France and Holcim of
    Switzerland, agree to a merger that would create a firm with a market value of
    $55 billion. (Reuters)
  - Nigeria's economy passes South Africa's to become the largest in Africa. (BBC
    News
  Law and crime:
  - The Ambassador of Italy to Turkmenistan is charged for alleged child abuse while
    on holiday in the Philippines. (Reuters)
  Politics and elections:
  - Russian municipal elections
  Costa Rican general election, 2014:
  - Voters in Costa Rica go to the polls for a general election. Luis Guillermo Solís
    is the only presidential candidate left in the race following the withdrawal of
    Johnny Araya. (BBC News)
  Hungarian parliamentary election, 2014:
  - Voters in Hungary go to the polls, and Prime Minister Viktor Orbán's Fidesz and
    their allies the Christian Democrats win re-election easily, with 45% of the vote.
    (BBC News)
  - Communist Party of the Russian Federation candidate Anatoly Lokot was elected
    mayor of the third-largest city of Novosibirsk, defeating ruling United Russia
    party candidate. (The Moscow Times)
  Sports:
  - In cricket, Australia win the women's ICC World Twenty20 tournament and Sri Lanka
    win the men's tournament. (BBC Sport)
  - In athletics, Kenenisa Bekele of Ethiopia wins the Paris Marathon. (France 24)
  - In rowing, Oxford beats Cambridge in the 160th edition of The Boat Race. (BBC
    Sport)
  - In women's road cycling, Ellen van Dijk wins the Tour of Flanders World Cup race.
    (BBC Sport)
