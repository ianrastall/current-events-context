Date: '2014-04-03'
Source_URI: Portal:Current events/2014 April 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Former President of Pakistan Pervez Musharraf survives an assassination attempt
    in Islamabad, Pakistan. There are no reports of injuries. (Times of India)
  Syrian Civil War:
  - Mortar fire kills at least six people in a Damascus suburb. (AP via ABC News)
  Arts and culture:
  - Comedian David Letterman, host of CBS's Late Show with David Letterman, announces
    his planned retirement in 2015. (CBS)
  - Colombian Nobel laurete novelist Gabriel García Márquez, 87, is hospitalized in
    Mexico City. His condition and illness remains unknown. (Fox News)
  Oso, Washington mudslide:
  - The death toll from the mudslide reaches 30 as rescuers struggle to identify survivors.
    (BBC News)
  2014 Garda phone recordings controversy:
  - Recordings of 133 conversations between gardaí, witnesses and journalists relating
    to the 1996 murder of Sophie Toscan du Plantier emerge. (RTÉ News)
  Politics and elections:
  - Malta elected a new President of the Republic of Malta Marie Louise Coleiro Preca,
    the second female President after 27 years. The event carried out in Luqa, Siggiewi,
    Qormi, Valletta, Floriana, Malta and Attard. (gov.mt)
  Science and technology:
  - Scientists from NASA and the European Space Agency estimate that Enceladus, a
    moon of Saturn, has an ocean of liquid water under its surface. (BBC News)
