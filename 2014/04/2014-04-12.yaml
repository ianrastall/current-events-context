Date: '2014-04-12'
Source_URI: Portal:Current events/2014 April 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Palestinian-Israeli conflict
  - The Palestinian Authority signs 15 UN/Geneva human rights treaties including the
    Fourth Geneva Convention. Israel responds with sanctions. Peace talks continue.
    (BBC News) (Reuters)
  - 2014 pro-Russian protests in Ukraine
  - War in North-West Pakistan
  - Islamist insurgency in Nigeria
  - Bundy standoff
  Syrian Civil War:
  - Chemical weapons are used again in Syria, this time on the town of Kafr Zita,
    Hama. (US News)
  - Gunmen gain control of a police department in the town of Sloviansk in the eastern
    Ukraine. (Reuters)
  Naxalite–Maoist insurgency/Indian general election, 2014:
  - Suspected Maoist rebels kill 13 people in a bombing in the eastern Indian state
    of Chhattisgarh, during the Indian general election, 2014. (Reuters)
  - Gunmen kidnap 100 men from a tribal gathering in North-West Pakistan. (Reuters)
  - Borno State Senator Ahmed Zannah reports that 135 civilians have been killed in
    attacks in north west Nigeria since Wednesday. (BBC News)
  - Amidst controversy, the Bureau of Land Management accedes to the release of the
    Bundy family's cattle. (Fox) (Yahoo! News)
  Health and environment:
  - Researchers announce a new drug, ABT-450, with a 90-95% success rate at treating
    Hepatitis C. (BBC News)
