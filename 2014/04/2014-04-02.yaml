Date: '2014-04-02'
Source_URI: Portal:Current events/2014 April 2
Intelligence_Payload:
  Uncategorized:
  - Post-coup unrest in Egypt (2013–2014)
  - A bomb detonates near Cairo University, killing a police chief and injuring five
    others. (BBC News)
  - A suicide bomber wearing a military uniform strikes a voter registration office
    in Kabul, Afghanistan killing 6 police officers. (AP via CTV)
  - 2014 Fort Hood shootings
  - A shooting is reported at the Fort Hood Army Base near the US town of Killeen,
    Texas with reports of at least four deaths, including the gunman, and 14 injuries.
    (Washington Post)
  - Chrysler recalls nearly 870,000 SUVs from its Jeep and Dodge brands, citing brake
    issues. (KNTV)
  - 2014 Iquique earthquake
  - The President of Chile Michelle Bachelet declares the northern part of Chile to
    be a disaster zone including the regions of Arica y Parinacota, and Tarapacá.
    (ABC News Australia)
  - A 7.8 aftershock follows in the same area causing more damage. (USGS)
  - The High Court of Australia recognises a neutral third gender that is neither
    male nor female. (AFP via Yahoo! News Australia)
  - The Supreme Court of the United States, in McCutcheon v. FEC, votes 5–4 to overturn
    limits on the amount of money that an individual can donate to politicians' campaigns
    over a two-year cycle. (Washington Post)
  - More than 100 mostly elderly residents of San Francisco's Chinatown are reported
    as victims of fraud from a travel agency. (KGO)
  - California State Senator Leland Yee's attorney Paul DeMeester is replaced by former
    San Francisco assistant district attorney Jim Lassart. (San Jose Mercury News)
  Garda phone recordings scandal:
  - Government sources claim white powder in an envelope and possibly a swastika have
    been sent to the home of the Irish Minister for Justice and Equality Alan Shatter,
    who is embroiled in multiple political controversies. An army bomb disposal unit
    has moved in on Shatter's estate in Ballinteer, Dublin. (Independent)
  - A motion of no confidence brought by the opposition against Minister of Justice
    Alan Shatter is defeated 95–51 in the Dáil following a two-day debate. (RTÉ News)
