Date: '2014-04-27'
Source_URI: Portal:Current events/2014 April 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi helicopters destroy a convoy of ISIL fuel tankers inside Syrian territory.
    (BBC News)
  Post-coup unrest in Egypt:
  - An Egyptian court sentences 11 supporters of deposed President Mohammed Morsi
    to prison terms ranging from five to 88 years for rioting. (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian rebels in Ukraine free a Swedish observer, but not the other seven
    European monitors they have been holding for three days. (BBC News)
  Canonization of Pope John XXIII and Pope John Paul II:
  - Popes John XXIII and John Paul II are declared saints by Pope Francis in the first
    papal canonization since 1954. (Time) (CNN)
  Disasters and accidents:
  - Eight people are killed by a fire in a medical facility in Russia's eastern Altai
    region. (BBC News)
  Tornado outbreak of April 27–30, 2014:
  - At least two people are killed after a tornado touches down in Quapaw, Oklahoma,
    United States. (ABC News)
  - Tornadoes hit the Arkansas towns of Vilonia and Mayflower with reports of casualties.
    (Reuters via ABC News Australia)
  Middle East respiratory syndrome:
  - Saudi Arabia reports eight more deaths and 16 more cases in the latest outbreak
    of the disease. (AP via Yahoo! News)
  Politics and elections:
  - Sinking of the MV Sewol
  - The Prime Minister of South Korea Jung Hong-won announces his immediate resignation
    following growing criticism of the response to the sinking of the MV Sewol. (Al
    Jazeera)
