Date: '2014-04-23'
Source_URI: Portal:Current events/2014 April 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - A car bomb detonates outside a police station in Nairobi, Kenya, killing 4 people.
    (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - Ukrainian security officials discover that the Assumption Monastery Lavra of the
    Moscow Patriarchate in Sviatohirsk served as a military base for pro-Russian insurgents
    who have besieged the region. (Kyiv Post)
  - Ukraine's Deputy Prime Minister Vitaly Yarema announces that pro-Russian militants
    will be targeted in four eastern cities, Kramatorsk, Sloviansk, Donetsk and Luhansk,
    as they refuse to vacate government buildings they previously seized, defying
    the international deal made in Geneva. (CNN)
  Post-coup unrest in Egypt:
  - An Egyptian general is killed and a police officer is injured after a bomb attached
    to the general's car exploded. (CNN)
  Central African Republic conflict:
  - Russia and China have blocked a proposal by the United States and France to impose
    U.N. sanctions on Central African Republic's former President François Bozizé
    and two other people linked to the conflict. (Reuters)
  Disasters and accidents:
  - A 6.6 magnitude earthquake hits 94 km south of Port Hardy in the Canadian province
    of British Columbia at around 8:10 pm PDT. Seismic activity was felt as far as
    Kamloops. (USGS) (CBC News)
  Sinking of the MV Sewol:
  - The official death toll of the ferry capsizing rises to 150 with 150 people still
    missing. (CBS)
  2014 Katanga train derailment:
  - More than 60 people are killed and 80 are seriously injured in a train crash in
    the Democratic Republic of the Congo's Katanga Province. (Reuters)
  Politics and elections:
  - Palestinian rival factions Fatah and Hamas have announced reconciliation to form
    a unity government. They split up violently in 2007. (BBC News)
