Date: '2014-04-13'
Source_URI: Portal:Current events/2014 April 13
Intelligence_Payload:
  War in North-West Pakistan:
  - Seventy-three people are released from captivity by the Taliban, a day after they
    were kidnapped. (The News International)
  2014 pro-Russian protests in Ukraine:
  - Ukraine launches a "full-scale anti-terrorist operation" against pro-Russian protesters
    who have captured police and security forces buildings in the town of Sloviansk.
    (Reuters)
  - Acting President Oleksandr Turchynov says that Ukrainian Ground Forces will conduct
    a similar operation in the eastern part of the country against armed protesters.
    (BBC News)
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide truck bomber detonates at a police station in Kirkuk Governorate, Iraq
    killing eight policemen. (Xinhua)
  Disasters and accidents:
  - A bus en route from Villahermosa to Mexico City crashes into a tractor-trailer
    and catches fire, killing at least 36 people. (AP via Washington Post)
  Law and crime:
  - Overland Park Jewish Community Center shooting. Two shootings occur at Jewish
    facilities on the Kansas side of the Kansas City area. The first occurs at a Jewish
    Community Center in Overland Park, and the second takes place at a retirement
    center in Leawood. Three people are killed. A gunman is arrested. (CNN)
  Natural disasters:
  - A massive forest fire in Valparaíso, Chile destroys thousands of homes and leaves
    11 people dead. (BBC News)
  - A 7.7 magnitude earthquake strikes 204 miles southeast of Honiara, Solomon Islands
    with no reported casualties or damage. (AP via Fox News)
  Politics and elections:
  - Prime Minister of Libya Abdullah al-Thani resigns, citing that he and his family
    were attacked. (Time)
  - Macedonian general election, 2014
  - Voters in Macedonia go to the polls for the first round of voting in a presidential
    election. (Deutsche Welle)
  Sports:
  - In running, Wilson Kipsang of Kenya wins the 2014 London Marathon setting a new
    race record. (AP vis WPXI)
  - 2014 Masters Tournament
  - American golfer Bubba Watson wins the US Masters for the second time in three
    years. (AAP via SBS)
  - In boxing, Manny Pacquiao regains his WBO welterweight title after defeating Timothy
    Bradley. (CNN)
