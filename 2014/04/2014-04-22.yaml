Date: '2014-04-22'
Source_URI: Portal:Current events/2014 April 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - A Somali lawmaker is shot and killed as he leaves his home in Mogadishu, Somalia.
    (AP via ABC)
  - A balloting station on the outskirts of Kirkuk, Iraq, is attacked by militants,
    leaving 10 people dead. (AP via Yahoo! News)
  - African troops capture a junior commander of the Lord's Resistance Army and rescue
    10 civilians after a firefight in the Central African Republic. (AP via Yahoo!
    News)
  2014 pro-Russian unrest in Ukraine:
  - Russian-born American-Israeli journalist Simon Ostrovsky is reportedly abducted
    in Sloviansk by the militia of the separatist pro-Russian leader Vyacheslav Ponomarev.
    (Mashable)
  - Nine people are killed and dozens wounded in two separate bomb and gun attacks
    in north west Pakistan. (Reuters)
  Business and economics:
  - Gilead Sciences reports sales of US$2.27 billion for its new hepatitis C drug
    Sovaldi, the most ever for a drug during its first quarter on the market. (Reuters)
  Disasters and accidents:
  - 2014 South Korean ferry capsizing
  - A total of 113 people are known to have died, with 190 more passengers missing
    and presumed trapped inside the vessel. Seven crew members are detained for their
    failure to evacuate Sewol ferry. The reason for sinking is not yet clear. (BBC
    News)
  Law and crime:
  - Schuette v. Coalition to Defend Affirmative Action
  - In a 6-2 ruling, the Supreme Court of the United States finds that a ban on affirmative
    action through a state constitutional amendment is permissible under the U.S.
    Constitution, overturning an appeals court ruling. (Washington Post)
  - Russian political activist Alexei Navalny is ordered to pay 300,000 rubles (US$8,400)
    in a libel suit by a municipal deputy who Navalny called a drug addict. (AP via
    Yahoo! News)
  Politics and elections:
  - The Health Minister of Saudi Arabia, Abdullah bin Abdulaziz Al Rabiah, is dismissed
    as the Middle East respiratory syndrome coronavirus rages in the nation, killing
    81 people to date. (BBC News)
  Sport:
  - Manchester United manager David Moyes is fired and player-coach Ryan Giggs takes
    charge on an interim basis. Moyes' dismissal comes 10 months after he succeeded
    Sir Alex Ferguson. (BBC Sport)(Independent)
  - Former American cycling team boss Johan Bruyneel is suspended for 10 years for
    his involvement in the Lance Armstrong doping scandal. (BBC Sport)
