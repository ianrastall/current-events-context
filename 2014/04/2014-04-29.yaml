Date: '2014-04-29'
Source_URI: Portal:Current events/2014 April 29
Intelligence_Payload:
  2014 pro-Russian unrest in Ukraine:
  - Pro-Russian militants in the eastern Ukrainian city of Luhansk seize the regional
    administration's headquarters, resulting in a tense standoff with the militants
    and security personnel. (BBC News)
  Syrian Civil War:
  - At least 37 people are killed and 85 others are injured in multiple explosions
    in the Syrian city of Homs. (BBC News)
  Business and economy:
  - The United States Senate Committee on Banking, Housing, and Urban Affairs approves
    three of President Barack Obama's nominees to the Federal Reserve, including the
    nomination of Stanley Fischer to be its vice chairman. (Reuters)
  Korean maritime border incidents:
  - North Korea warns South Korea that it will conduct live firing near the disputed
    maritime border. (BBC News)
  Sinking of the MV Sewol:
  - Surveillance video footage captures the captain of MV Sewol Lee Joon-seok escaping
    the vessel and leaving behind his passengers. (CNN)
  - The President of South Korea Park Geun-hye apologises on national television for
    the government's poor handling of the incident. (BBC News)
  - The death toll rises to 205, with 97 passengers still unaccounted for. (CNN)
  Law and crime:
  - A shooting at a FedEx facility in Kennesaw, Georgia, United States, leaves six
    injured with the gunman committing suicide. (CNN)
  - Venezuelan officials announce that a former chief of the Bolivarian Intelligence
    Service, Eliecer Otaiza, was shot and killed on Saturday. (BBC News)
  - American prisoner Clayton Lockett dies of a heart attack in Oklahoma after a botched
    execution by lethal injection. (Al Jazeera)
  - NBA Commissioner Adam Silver announces that Los Angeles Clippers owner Donald
    Sterling is banned from the league for life after a recording of Sterling making
    racist comments surfaces. Sterling is also fined the maximum allowable US$2.5
    million as the NBA examines options for a forced sale. (ABC News) (Fox News)
