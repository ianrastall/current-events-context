Date: '2014-04-17'
Source_URI: Portal:Current events/2014 April 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Pakistani Taliban announces that it will not extend a ceasefire with the Pakistani
    government. (CNN)
  2014 South Korean ferry capsizing:
  - Republic of Korea Coast Guard and Navy divers resume the search for 290 missing
    people from yesterday's ferry capsizing off the coast of the island of Jindo.
    (Reuters via Yahoo!)
  2014 pro-Russian unrest in Ukraine:
  - Russia and Ukraine together with the United States and the European Union sit
    down for emergency talks in Geneva. All four agree that "illegal military formations
    in Ukraine" must be dissolved, and that everyone occupying buildings must be disarmed
    and leave them. There would be an amnesty for all anti-government protesters under
    the agreement. (The Guardian) (Sky News Australia)
  - A skirmish on the Ukrainian military base in Mariupol by pro-Russian militants
    results in the deaths of 3 of the militants, the wounding of another 13, and the
    capture of 63 others. (BBC News)
  - The Ukrainian Army unit whose armoured vehicles were seized by pro-Russian forces
    is disbanded and its members charged with crimes. (Ukrainian News Agency)
  - Russian President Vladimir Putin admits having sent Russian forces to Crimea last
    month to protect its military equipment there. (Washington Post)
  - Jews in Donetsk are ordered to register with the government of the self-proclaimed
    Donetsk People's Republic via leaflets dropped by an unknown party. The Jewish
    community in Donetsk dismissed it as a "provocation". (USA Today) (CNN)
  Law and crime:
  - Two former Anglo Irish Bank chiefs, Pat Whelan and William McAteer, are found
    guilty of making loans designed to illegally prop up the bank's share price. (BBC
    News)
  - Bankruptcy judge Steven W. Rhodes says that the court may maintain supervision
    over the finances of the city of Detroit, Michigan, even after the city emerges
    from bankruptcy protection. (Reuters)
  Politics and elections:
  - Mike Baird becomes the 44th Premier of the Australian state of New South Wales.
    ABC News (Australian Broadcasting Corporation)
  Algerian presidential election, 2014:
  - Voters in Algeria go to the polls for a presidential election with incumbent President
    Abdelaziz Bouteflika standing for a fourth term. (AP via Fox News)
  Indian general election, 2014:
  - Voters in twelve states of India go to the polls for the biggest day of voting
    during the election process. (BBC News)
  Science and technology:
  - Scientists announce creation of cloned human stem cells derived from adult cells.
    (Time)
