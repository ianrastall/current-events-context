Date: '2014-04-21'
Source_URI: Portal:Current events/2014 April 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - South Sudan conflict
  - The UN condemns the "Targeted Killings" and wounding of hundreds of civilians
    based on their ethnic origins in the town of Bentiu after South Sudanese rebels
    seized the oil hub last week. (Al Jazeera)
  - 2014 pro-Russian unrest in Ukraine
  - Thirty suspected al-Qaeda militants and six civilians are killed in a drone strike
    by the United States in Yemen. (CNN)
  - A car bomb in Mogadishu, Somalia, detonates, killing a member of the Federal Parliament
    of Somalia and injuring another. (BBC News)
  Syrian Civil War:
  - Syrian Air Force air strikes in Aleppo, Syria, killing dozens of people; 14 others
    are killed by barrel bombing in the neighborhood of Baeedeen. (Reuters)
  - According to pro-Russian militants, the bodies of two pro-Russian militants are
    pulled from the Seversky Donets River in Sloviansk, Ukraine, with both having
    multiple stab wounds. The claim could not be independently verified. (The Sun)
  Business and economics:
  - Tony Caplin resigns from the UK Public Works Loan Board after it is revealed that
    he had gone bankrupt. (BBC News)
  - Birch Communications agrees to buy technology and communications equipment provider
    Cbeyond for $323 million. (AP via Yahoo! News)
  Disasters and accidents:
  - A Boeing 737 operated by Malaysian Airlines carrying 166 people makes an emergency
    landing after a tire on the main landing gear blew out. (ABC News)
  - A 16-year-old teenager stows away in the landing-gear compartment of a flight
    from San Jose International Airport to Kahului Airport, surviving a severe lack
    of oxygen and -80°F temperatures during a 5+ hour flight. (Los Angeles Times)
  - Malaysia Airlines Flight 370
  2014 South Korean ferry capsizing:
  - South Korean President Park Geun-hye condemns the action of crew members as tantamount
    to murder. 87 people are known to have died and 238 are missing and presumed dead
    in the sinking of Sewol ferry on 16 April. (Reuters)
  - Four more crew members from the ferry are arrested for deserting the vessel as
    it was sinking. (KDVR)
  - A Tropical Cyclone hampers the search for missing Malaysia Airlines Flight MH370
    which vanished on March 8 with 239 people on board. A U.S. Navy submarine Bluefin-21
    is on mission to find the wreckage. (Reuters)
  Law and crime:
  - Five people are sentenced to death and 37 others given prison sentences for their
    roles in the 2003 bombings in Riyadh, Saudi Arabia. (BBC News)
  - A defendant is shot to death by a U.S. marshal at a U.S. federal court in Salt
    Lake City, Utah after attempting to attack a witness. (AP via San Francisco Chronicle)
  Politics and elections:
  - The Syrian government sets the presidential election for June 3, with opposition
    groups calling it a "parody of democracy". (Reuters)
  Sport:
  - 2014 Boston Marathon
  - More than a million people gather to participate and watch the Boston Marathon,
    one year after the Boston Marathon bombings. (CNN)
  - Thirty-eight-year-old American Meb Keflezighi wins the Boston Marathon men's competition,
    making him the first American in 31 years to do so. (USA Today)
