Date: '2014-04-01'
Source_URI: Portal:Current events/2014 April 1
Intelligence_Payload:
  Arts and culture:
  - American internet cartoon series Homestar Runner makes its first update to its
    webpage after three years on hiatus. (Time)
  Disasters and accidents:
  - An 8.2 magnitude earthquake occurs in the Pacific Ocean near Chile causing landslides
    and killing at least five people. A tsunami warning is issued. (USGS) (AP via
    The Australian) (Fox News)
  2014 Guinea Ebola outbreak:
  - The death toll in Guinea rises to 80 with two people dead in neighbouring Liberia.
    (Sky News Australia)
  2014 Crimean crisis:
  - NATO suspends "all practical civilian and military cooperation" with Russia as
    a result of the annexation of Crimea, and no sign that Russian troops have withdrawn
    from the Ukrainian border. (CNN)
  2014 Garda phone recordings controversy:
  - Taoiseach Enda Kenny tells the Dáil the Prison Service recorded conversations
    between inmates and their solicitors. (RTÉ News)
  - Mr Justice Nial Fennelly will be appointed to chair the Commission of Investigation
    into the Garda controversy. (RTÉ News)
  - The Irish Government will establish a Cabinet committee to examine proposals for
    an independent police authority and other justice reforms, which will be chaired
    by the Taoiseach. (RTÉ News)
  - The Department of Justice releases a letter sent on 10 March from then Garda Commissioner
    Martin Callinan in which he warns them of the recording of phone calls at Garda
    stations. (RTÉ News)
  Science and technology:
  - RIKEN concludes that research suggesting stem cells could be produced through
    STAP techniques was falsified. (The Japan Times)
