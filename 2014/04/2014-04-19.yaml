  2014 South Korean ferry capsizing:
  - The death toll of the accident rises to 32 as two bodies are found in the sea
    and three in a cabin of the ferry, which became fully submerged yesterday. (Yonhap)
  - The South Korean government considers declaring a special disaster zone in Ansan.
    (Yonhap)
  2014 pro-Russian unrest in Ukraine:
  - Ukraine suspends operations against pro-Russian militants in the east of the country
    over Easter. (BBC News)
  Science and technology:
  - A suspected meteorite explosion has been recorded over Murmansk, Russia. (Mirror)
  Politics and elections:
  - Indian general election, 2014
  - India is halfway through elections for 16th Lok Sabha in world's biggest election
    with an electorate of 815 million voters. (Reuters)
