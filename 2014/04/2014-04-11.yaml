Date: '2014-04-11'
Source_URI: Portal:Current events/2014 April 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two rival factions of the Tehrik-i-Taliban Pakistan clash in Waziristan, Pakistan,
    leaving 12 insurgents dead. (The Hindu)
  Arts and culture:
  - Peter Gabriel, Hall & Oates, KISS, Nirvana, Linda Ronstadt, and Cat Stevens are
    inducted into the Rock and Roll Hall of Fame. (CNN)
  Business and economy:
  - American women's clothing retailer Coldwater Creek files for chapter 11 bankruptcy.
    (Dow Jones Business News via NASDAQ)
  Disasters and accidents:
  - Residents in the Australian state of Queensland prepare for Cyclone Ita to make
    landfall between Cooktown and Cape Flattery. (ABC via Yahoo 7)
  - A magnitude 7.1 earthquake strikes off the coast of Papua New Guinea, setting
    off tsunami warnings for the country. (Australia Network News)
  International relations:
  - The United Nations votes to send 12,000 peacekeepers to the Central African Republic
    to help protect citizens as Christians and Muslims continue to fight in the country.
    (Australian Broadcasting Corporation)
  - 2014 Crimean crisis
  - Montenegro, Norway, Iceland and Albania join the list of countries supporting
    sanctions including asset freezings and travel bans directed at Russian individuals.
    (Kyiv Post)
  - Secretary General of NATO Anders Fogh Rasmussen visits Bulgaria and meets with
    President Rosen Plevneliev, during his visit he calls on Russia to withdraw their
    troops from the Ukrainian border. (AP via Fox News)
  Law and crime:
  - The four-year prison sentence of New Citizens' Movement founder Xu Zhiyong is
    upheld in a Chinese court. (AP via American Broadcasting Company)
  - A woman is arrested after she throws a shoe at the head of former United States
    Secretary of State Hillary Clinton as she was giving a speech in Las Vegas, Nevada.
    (AP via Columbus Dispatch)
  - $1.8 billion in fines are imposed on S.A.C. Capital Advisors by the United States
    for insider trading violations. (BBC News)
  - Seamus Daly, a suspect in the Omagh bombing of 1998 in Ireland, is remanded without
    bail and will face 29 counts of murder. (BBC)
  Science and technology:
  - Astronomers, for the first time, discover a moon orbiting around an exoplanet.
    (space.com via HuffPost)
