Date: '2014-04-26'
Source_URI: Portal:Current events/2014 April 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Five British ISAF personnel are killed in a military helicopter crash in Kandahar
    province in southern Afghanistan. (BBC News)
  Disasters and accidents:
  - The death toll from recent flooding in northern Afghanistan rises to 123. (WireUpdate)
  Afghan presidential election:
  - Afghan Presidential elections are set to go to a second round between former foreign
    minister Abdullah Abdullah and Ashraf Ghani after no candidate won an absolute
    majority in first round. (Reuters)
  Arts and culture:
  - Copies of E.T. the Extra-Terrestrial and other Atari games that were buried in
    1983 are discovered in a New Mexican desert. (IGN)
