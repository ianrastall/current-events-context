Date: '2014-04-25'
Source_URI: Portal:Current events/2014 April 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 25 people are killed and several injured in a series of bomb blasts targeted
    at Shi'ite rally in Baghdad, Iraq. The attack comes less than a week before Iraqis
    are due to head to the polls in parliamentary elections. (BBC News)
  - A bomb detonates in Karachi, Pakistan, killing 4 people and wounding 25. (AP via
    Miami Herald)
  - Maoists set off a landmine on a bus carrying officials near Dumka, Jharkhand,
    India, killing 3 people and injuring another 10. (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - A Ukrainian military helicopter is destroyed after being hit by a rocket-propelled
    grenade at a base near the town of Kramatorsk in Eastern Ukraine. (The Daily Telegraph)
  Disasters and accidents:
  - A stampede ensues in Kikwit, Democratic Republic of the Congo, during a tribute
    festival for King Kester Emeneya, killing 23 people. (AP via Yahoo! News)
  - Flash floods in northern Afghanistan kill at least 80 people. (BBC News)
  Elections and politics:
  - The UK government launches an inquiry after the Liverpool Echo reported that Whitehall
    computers had been used to post offensive remarks about the Hillsborough disaster
    on Wikipedia pages relating to the topic. (BBC News)
  Health and environment:
  - China amends its environmental protection laws to help fight pollution and reverse
    environmental damage in the country. (VOA)
  International relations:
  - North Korea announces that it has detained a 24-year-old US tourist, Miller Matthew
    Todd, for "rash behavior" during the immigration process. (BBC News)
  Law and crime:
  - The ex-chief financial officer of Bank of America, Joe Price, agrees to pay a
    $7.5 million fine for misleading investors during the acquisition of Merrill Lynch.
    (Reuters via Fox Business)
  Science and technology:
  - Scientists announce the discovery of Kryptodrakon, the oldest pterosaur yet found.
    (Times of India)
