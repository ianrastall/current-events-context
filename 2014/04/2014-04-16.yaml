Date: '2014-04-16'
Source_URI: Portal:Current events/2014 April 16
Intelligence_Payload:
  Attacks and conflicts:
  - Gunmen ambush a bus killing nine people and wounding six others in western Ethiopia
    near the Sudanese border. (Reuters)
  - Syrian Civil War
  - More chemical attacks are reported, this time in the Damascus suburbs. (Reuters)
  - Jordanian warplanes strike a convoy of vehicles as they were trying to enter Jordan
    from Syria. (BBC News)
  2014 pro-Russian unrest in Ukraine:
  - Six armored personnel carriers belonging to the Ukrainian military are captured
    by pro-Russian protesters amid rising tensions between the protestors and the
    military. (BBC News)
  2014 South Korean ferry capsizing:
  - Yonhap news agency reports that the Republic of Korea Coast Guard has been dispatched
    to rescue a ferry with 476 passengers sinking off the southeastern coast of South
    Korea with claims that at least four passengers have died and scores are injured.
    Approximately 280 people remain unaccounted for. (AP) (AFP via Nine MSN) (BBC
    News)
  Politics and elections:
  - Barry O'Farrell resigns as Premier of the Australian state of New South Wales
    after giving misleading evidence to the Independent Commission against Corruption.
    (Sydney Morning Herald)
  Science and technology:
  - A Soyuz-U rocket carrying a new Egyptian communication satellite, EgyptSat-2,
    was launched from the Baikonur Cosmodrome in Kazakhstan. (ITAR-TASS)
  - Scientists discover a new moon forming in the outer edge of Saturn's A ring, unofficially
    called "Peggy". (NASA Science)
  - Scientists discover an egg membrane protein, Juno, that facilitates fertilisation
    in mammals. (The Independent)
  Sports:
  - In football, Real Madrid C.F. defeats arch-rivals FC Barcelona 2-1 to secure its
    19th Copa del Rey trophy. (The Guardian)
