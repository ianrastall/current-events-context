Date: '2014-04-09'
Source_URI: Portal:Current events/2014 April 9
Intelligence_Payload:
  Armed attacks and conflicts:
  - A bomb blast in a market kills 26 people in the outskirts of the Pakistani capital
    Islamabad. (CNN)
  Syrian Civil War:
  - 25 people are killed in car bombings in the central Syrian city of Homs. (Reuters)
  2014 pro-Russian protests in Ukraine:
  - Over 50 people leave a Ukrainian security service building in Luhansk that is
    currently occupied by pro-Russian separatists. (Reuters)
  - Acting Interior Minister of Ukraine Arsen Avakov states that the unrest will be
    resolved by force or talks in 48 hours. (CNN)
  Business and economy:
  - Toyota announces that it will recall nearly 6.5 million vehicles due to steering
    and other faults. (Reuters)
  - Microsoft officially concludes Windows XP after 12 years of support. (Sydney Morning
    Herald)
  Oso, Washington mudslide:
  - The death toll reaches 36 as rescuers struggle to find 10 who are still missing.
    (CNN)
  Law and crime:
  - Franklin Regional High School stabbing.
  - A student stabs 20 people at Franklin Regional High School in Murrysville, Pennsylvania,
    USA. (NBC)
  - Four people are stabbed in an office in Toronto, Ontario, Canada. (CTV)
  - Bank of America agrees to pay $727 million to customers as restitution for deceptive
    marketing practices and unfair billing. An additional $45 million will be paid
    as fines to government regulatory groups. (Reuters)
  - Conflict erupts over Federal roundup of privately owned cattle in Nevada (secretsofthefed)(Las
    Vegas Review Journal)
  Politics and elections:
  - Maria Miller resigns as the Secretary of State for Culture, Media and Sport in
    the United Kingdom following an expenses scandal. Sajid Javid is announced as
    her replacement. (ITV) (Financial Times)
  - Parliamentary elections were held in Indonesia, with early count indicating Megawati's
    PDIP won a narrow plurality. (BBC News)
  Science and technology:
  - Stuart Parkin is awarded the Millennium Technology Prize for breakthroughs in
    magnetic storage capacity. (The Guardian)
