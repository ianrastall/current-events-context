Date: '2014-12-23'
Source_URI: Portal:Current events/2014 December 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - The internet in North Korea becomes functional again after nine hours without
    access. (CNN)
  - Korea Hydro & Nuclear Power says that its computer systems have been hacked. (Sydney
    Morning Herald)
  - The death toll from the bombings in the Nigerian cities of Gombe and Bauchi reaches
    at least 37. (Bloomberg)
  - Sony Pictures Entertainment hack
  Insurgency in Northeast India:
  - December 2014 Assam violence
  - Attacks on villages in the Indian state of Assam kill dozens of people. Suspicion
    falls on the insurgents of the National Democratic Front of Bodoland. (NDTV)(Euronews)(Al
    Jazeera)
  - As a result, India imposes curfew on parts of Assam. (NBC News)
  - Sony schedules the film The Interview for release to small theaters on Christmas
    Day despite canceling its debut. (Florida Times-Union)
  Businesses and economy:
  - Keurig recalls 6.6 million coffee making machines after ninety reports of burn-related
    injuries. (CNN)
  Disasters and accidents:
  - A tornado outbreak hits the southern United States, producing five tornadoes with
    at least four people dead and leaving fifty others injured. (The Weather Network)
  Health:
  - The FDA says that in regards to the 31-year-old policy against gay men making
    blood donations it will recommend lifting the lifetime ban early next year, replacing
    it with a policy barring donations from men who have had sex with another man
    in the previous 12 months. (AP)
  International relations:
  - The Parliament of Ukraine removes the country’s legislative block on forming military
    alliances, allowing the government to push forward with plans to accede to NATO.
    (BBC)
  - Russia and Pakistan sign their first energy deal for the Karachi–Lahore gas pipeline
    worth US$1.7 billion. (Jagran)
  Politics and elections:
  - The Greek parliament fails to elect a new president in the second round of voting.
    (The Guardian)
