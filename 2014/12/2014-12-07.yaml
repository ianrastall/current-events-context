Date: '2014-12-07'
Source_URI: Portal:Current events/2014 December 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Israeli Air Force bombs two Syrian Armed Forces bases near Damascus and the
    town of Dimas, according to Russian and Syrian sources. (BBC News)
  - Allied Democratic Forces insurgency
  - Ugandan rebels from the Allied Democratic Forces and National Army for the Liberation
    of Uganda kill 36 people in the Democratic Republic of the Congo's North Kivu
    province. (Reuters/AFP via ABC News)
  Disasters and accidents:
  - Typhoon Hagupit
  - The death toll from Typhoon Hagupit in the Philippines is at least three as the
    storm weakens. (BBC)
  - A bus goes off a mountain road in western Nepal, killing 17 passengers. (Al Jazeera)
  International relations:
  - Philippines v. China
  - China condemns the Philippines over the latter's "pressure" over the South China
    Sea despite the disadvantage of the Armed Forces of the Philippines against China's
    People's Liberation Army. (The Sunday Times), (Bloomberg)
  Law and crime:
  - The Obama administration orders the transfer of six prisoners from Guantanamo
    Bay detention camp to Uruguay, the largest single group of detainees to be released
    in five years and the first to be resettled in South America. (New York Times)
  - The Saudi Interior Ministry arrests 135 on terrorism offences, including dozens
    suspected of links to Islamic State of Iraq and the Levant. (Al Jazeera)
  - A chlorine gas leak injures 19 at the Chicago's 'Furfest', a Furry convention.
    Police say the act was intentional. (NBC News)
  Politics and elections:
  - United States Senate election in Louisiana, 2014
  - Democrat Mary Landrieu loses her bid for a fourth term representing Louisiana
    in the United States Senate to Republican Congressman Bill Cassidy in Saturday's
    runoff election, increasing the GOP majority in the U.S. Senate to 54 seats. (USA
    Today) (Newsweek)
