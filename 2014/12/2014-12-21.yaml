Date: '2014-12-21'
Source_URI: Portal:Current events/2014 December 21
Intelligence_Payload:
  Arts and culture:
  - British singer-songwriter Elton John converts his domestic partnership with filmmaker
    David Furnish to marriage. (FOX News)
  International Relations:
  - Egypt temporarily reopens its border crossing with Gaza, which had been closed
    since October, until 4 pm Monday. (Ahram Online)
  - Due to avian influenza in the United States (Oregon), South Korea suspends US
    imports of poultry. (Reuters via Times of India)
  Law and crime:
  - After an eight-year informal moratorium on the death penalty, Jordan executes
    11 men. (Al Jazeera)
  - China has detained more than thirty thousand people within two months for pornography
    and gambling. (Reuters)
  Politics and elections:
  - Beji Caid Essebsi of the secularist Nidaa Tounes party wins Tunisia's presidential
    election. (Al Arabiya English)
