Date: '2014-12-27'
Source_URI: Portal:Current events/2014 December 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - A top level Somali al-Shabab militant with a $3m US bounty, Zakariya Ahmed Ismail
    Hersi, surrenders to police. (BBC)
  - North Korea experiences another Internet and cell phone outage and holds the United
    States responsible. (NY Daily News)
  Disasters and accidents:
  - 2014 Southeast Asian floods
  - Malaysia reports that at least five people are dead. (The Independent)
  - Thailand's Department of Disaster Prevention and Mitigation reports that at least
    eight people are dead. (Bangkok Post)
  Politics and elections:
  - Sweden's center-left government reaches a deal with the center-right opposition,
    The Alliance, giving a minority government room to govern so that the country's
    first snap election since 1958, originally planned for 22 March 2015, can be cancelled;
    the Sweden Democrats react by announcing that they will put down a motion of no
    confidence against Prime Minister Stefan Löfven. (BBC) (The Local)
  - Andrei Kobyakov replaces Mikhail Myasnikovich as Belarus's new prime minister
    in the biggest government reshuffle since 2010. (Radio Free Europe/Radio Liberty)
