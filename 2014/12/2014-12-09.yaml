Date: '2014-12-09'
Source_URI: Portal:Current events/2014 December 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - An Ansar al-Sharia suicide bomb attack kills seven soldiers at an army base in
    southern Yemen. (CNN)
  - Three Turkish Army soldiers die by gunfire in the town of Ceylanpinar. The local
    Turkish governor begins an investigation of whether the gunfire came from the
    Syrian side of the border. (BBC)
  - Another bomb explodes (the previous was November 6, 2014) on a passenger bus,
    killing at least 11 people and injuring 21 in the southern Philippines province
    of Bukidnon. (Xinhua)
  - Al Qaeda in the Islamic Maghreb release Serge Lazarevic, a French hostage seized
    three years ago in Mali. (NYTimes)
  Law and crime:
  - A court in Lismore, Australia, convicts the former National Rugby League player
    Craig Field of the manslaughter of Kelvin Kane outside the Kingscliff Hotel in
    2012. (ABC News Australia)
  - The US Supreme Court rules 9–0 (Integrity Staffing Solutions, Inc. v. Busk) in
    favor of Amazon.com Inc. that employees are not entitled to be paid for the time
    they spend undergoing security checks after their shifts. (Reuters)
  - The Pirate Bay website goes offline after Swedish police seize its servers. (The
    Next Web)
  International relations:
  - The Democrat-controlled United States Senate Select Committee on Intelligence
    releases a report critical of the post-September 11 Bush Administration-era CIA
    interrogation techniques used to extract intelligence from captured Al-Qaeda operatives.
    The Obama Administration places US embassies around the world on high alert. (BBC)
  2014 Hong Kong protests:
  - The Hong Kong Police Force warn protesters that they have until Thursday to leave
    their protest camp in Admiralty. (AP via ABC News)
  Science:
  - Nature publishes Penn State University findings of Ancient shells with 430,000-year-old
    engravings believed to be made by Homo erectus, changing beliefs on artistic expression
    and tool use by ancestors of Homo sapiens. Dutch anthropologist Eugene Dubois
    found the collection in Java in 1891 and Penn State discovered the markings in
    a museum in the city of Leiden. (WA Today)
