Date: '2014-12-29'
Source_URI: Portal:Current events/2014 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Somalia
  - In the latest advance in Operation Indian Ocean, Somali government forces assisted
    by AMISOM troops capture seven towns in the central Hiran province from Al-Shabaab.
    (Garowe Online)
  - Boko Haram
  - Cameroon launches its first airstrikes against Boko Haram in a successful operation
    to reclaim several villages and a military base briefly seized by the militant
    group in the Far North Region. (BBC)
  Disasters and accidents:
  - The MS Norman Atlantic ferry fire death toll rises to at least ten as the evacuation
    ends. (BBC)
  - A fire in a Pakistan shopping mall kills at least 13 people. (AP)
  Ebola outbreak:
  - Glasgow's Gartnavel Hospital diagnoses a woman, who arrived from Sierra Leone,
    as the first case of Ebola in the UK. (BBC)
  Politics and elections:
  - Snap elections are to be called after the Hellenic Parliament fails to elect a
    new Greek president. (Reuters)
  - The Chinese government blocks some of Google's Gmail services. (Reuters)
