Date: '2014-12-05'
Source_URI: Portal:Current events/2014 December 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Somalia
  Kashmir insurgency:
  - An attack on a military camp leaves 11 Indian soldiers and police dead near Uri.
    Eight militants and two civilians are killed in that and concurrent attacks in
    the state capital, Srinagar, and a part of southern Kashmir. (Reuters)
  - A suicide bomb attack kills at least 10 at a restaurant in Baidoa. (Al Jazeera)
  Business and economy:
  - A judge in the Netherlands declares Dutch clothing company Mexx bankrupt. The
    bankruptcy ruling affects over 300 stores worldwide, including 95 locations in
    Canada. (CBC News)
  Disasters and accidents:
  - Italian rescue crews discover 17 bodies in the hull of a migrant ship off Libya.
    (FOX News)
  International Relations:
  - The British Museum announces that it will loan one of the Elgin Marbles in its
    collection, originally taken from Greece, to the Hermitage Museum in Saint Petersburg.
    Greece's Prime Minister Antonis Samaras calls the move "a provocation to the Greek
    people." (CNN)
  Law and Crime:
  - China's Supreme People's Procuratorate arrests former Politburo Standing Committee
    member Zhou Yongkang on corruption charges and expels him from the Communist Party
    of China. (BBC)
  - Bill Cosby files a counter-lawsuit against the woman who accused him of sexual
    assault, claiming she attempted to extort money from him. (BBC)
  - Rolling Stone Magazine issues a partial retraction on Sabrina Erdely's "A Rape
    on Campus" story after additional fact checking identifies "discrepancies" in
    the account of the University of Virginia young woman identified as "Jackie" who
    alleged that seven men raped her as she lay on broken glass during a party at
    U.Va.'s Phi Kappa Psi fraternity in 2012. (Rolling Stone) (Washington Post) (TimesDispatch)
  Science and Technology:
  - The first flight test of NASA's Orion spacecraft launches successfully at 7:05
    EST (12:05 UTC) and splashes down safely in the Pacific Ocean at 8:29 PST (16:29
    UTC). (CNN)
