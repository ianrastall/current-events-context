Date: '2014-12-02'
Source_URI: Portal:Current events/2014 December 2
Intelligence_Payload:
  Armed conflict and attacks:
  - War in Somalia
  - The Red Cross says that at least 36 people may be dead following an attack in
    Mandera County in northeastern Kenya. Al-Shabaab militants are believed to be
    responsible. (Bloomberg via Business Week), (Reuters via New York Times)
  - Syrian Civil War spillover in Lebanon
  - Unidentified gunmen kill 6 Lebanese soldiers near the eastern town of Ras Baalbek.
    (Al Jazeera)
  - Islamic State in Iraq and the Levant
  - The Lebanese government arrests a wife and daughter of ISIL leader Abu Bakr al-Baghdadi.
    (NBC News)
  - Sony Pictures Entertainment hack
  - The FBI launches a probe into a massive hacking attack on Sony Pictures, believing
    the leadership of North Korea to be responsible. (FOX News)
  Business and economy:
  - A major Switzerland based commodities firm, Trafigura, played a "pivotal" role
    in the ability of the semi-autonomous Kurdish region of Iraq to export oil, exports
    that the central government in Baghdad has prohibited. (Reuters)
  Health:
  - Ebola virus epidemic in West Africa
  - Sierra Leone quarantines the Tonkolili district with more than half the country
    under lockdown and the official death toll in the country reaching 1,530 and roughly
    7,109 infected. (Daily Mail)
  International relations:
  - South Korea approves a plan by the Christian Council of Korea to set up a large
    Christmas tree near the border with North Korea despite ongoing tensions. (AP
    via Daily Mail)
  Law and crime:
  - Greek anarchists burn a public transport bus and several cars during clashes with
    police in central Athens. (AP)
  - An Egyptian court sentences 185 people to death over their alleged involvement
    in a lethal attack on a police station on the outskirts of Cairo. (Reuters via
    Egyptian Independent)
  Politics and elections:
  - Israeli prime minister Benjamin Netanyahu fires Justice Minister Tzipi Livni and
    Finance Minister Yair Lapid amid the imminent breakup of the government coalition
    and dissolution of the Knesset ahead of new elections. (Times of Israel)
  - The Sweden Democrats decide to vote for the opposition's budget proposal, likely
    forcing the collapse of Prime Minister Stefan Löfven's new government that came
    to power in the September elections. (ABC News)
  - 2014 Hong Kong protests
  - C. Y. Leung, the Chief Executive of Hong Kong, warns pro-democracy activists not
    to return to the streets after yesterday's clashes. (BBC)
  - 'The Parliament of Ukraine approves the formation of a new government that includes
    three foreigners who have received Ukrainian citizenship just hours before the
    vote: Georgian-born Alexander Kvitashvili, US-national Natalie Jaresko and Lithuanian
    Aivaras Abromavičius. (Al Jazeera) (AP via ABC News)'
