Date: '2014-12-22'
Source_URI: Portal:Current events/2014 December 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - 2014 Peshawar school attack
  - Following the December 17 announcement that it would lift its moratorium on terror-related
    death penalty cases, Pakistan announces that it will execute 500 militants in
    the coming weeks. (AFP)
  - North Korea experiences severe internet outages. (AP)
  - Bombings hit the Nigerian cities of Gombe and Bauchi, killing at least 26 people.
    (BBC)
  Disasters and accidents:
  - An out-of-control dustbin lorry in the Queen Street and George Square areas of
    Glasgow, Scotland, kills at least six people. (BBC)
  International relations:
  - 2014 pro-Russian unrest in Ukraine
  - Kazakhstan renews its military cooperation with Ukraine, to which it promises
    vital supplies of coal, following a visit to Kiev by the Kazakh leader, Nursultan
    Nazarbayev. (Fox News)
  - Human rights in North Korea
  - Eleven (11) of 15 United Nations Security Council members approve placing North
    Korea's human rights record on the Council's agenda. Russia and China oppose the
    decision while Chad and Nigeria abstain. This is the first time this issue has
    been debated by the Security Council. Procedurally, once a topic makes the agenda,
    that issue can be brought up again at any time. (Business Insider) (The Chosun
    Ilbo)
  Law and crime:
  - The US CFTC fines Deutsche Bank $3 million over customer fund flaws. (Reuters
    via FOX Business)
  Politics and elections:
  - A federal land swap in Arizona green lights the US's deepest (1.3 miles) and largest
    (1.6b tons) copper mine. (FOX News)
