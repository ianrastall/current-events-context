Date: '2014-12-30'
Source_URI: Portal:Current events/2014 December 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency
  - Iraqi government forces and allied Shia militia recapture the town of Dhuluiya
    in Saladin Province, north of Baghdad, from the Islamic State of Iraq and the
    Levant. (BBC)
  - Somali civil war
  - A US airstrike in Saakow kills the intelligence chief, Abdishakur, who was also
    known as Tahlil, of the Somali al-Shabab militants. (AP)
  Arts and culture:
  - Luise Rainer, German-born American actress (The Great Ziegfeld, The Good Earth),
    Academy Award winner (1936, 1937), dies of pneumonia at the age of 104. (BBC)
  Disasters and accidents:
  - Indonesia AirAsia Flight 8501
  - Indonesian officials confirm that at least three bodies have been recovered from
    the Java Sea off Borneo. (BBC) (CBS)
  - 2014 Southeast Asian floods
  - Flooding and the death toll continues in Indonesia, Malaysia, the Philippines
    and Thailand. (Reuters)
  Law and crime:
  - A court in Moscow hands down a -year suspended sentence for corruption to Alexei
    Navalny, a prominent anti-Putin activist. (The Denver Post)
  - In three separate, but connected, crime scenes in Edmonton, Alberta, Canada, a
    suicidal man kills eight people and then himself. (Irish Times)
