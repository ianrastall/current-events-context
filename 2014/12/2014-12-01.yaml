Date: '2014-12-01'
Source_URI: Portal:Current events/2014 December 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency
  - The Prime Minister of Iraq Haider al-Abadi promises a crackdown on corruption
    after an audit shows that there were 50,000 ghost soldiers in the Army. (AFP via
    ABC News Australia)
  - The Iraq Prime Minister fires 24 Interior Ministry officials while the Islamic
    State kills at least 15 police officers near the border with Syria. (AP via Daily
    Mail)
  - Naxalite–Maoist insurgency
  - Maoist rebels kill 14 Central Reserve Police Force members in an ambush in Chhattisgarh,
    central India. (BBC)
  Islamist insurgency in Nigeria:
  - Dual Boko Haram attacks in Maiduguri and Damaturu leave at least 77 dead, including
    33 police, 6 soldiers, and 20 militants. (CBS)
  War in Afghanistan:
  - A suicide bomb kills at least nine, including two policemen, at a funeral for
    a tribal elder in Baghlan Province, northern Afghanistan. (Al Jazeera)
  Disasters and accidents:
  - A search continues for 52 people missing from a South Korean fishing vessel, the
    Oriong-501, that sank early in the morning in bad weather in the Bering Sea off
    Russia's Chukotka Autonomous Okrug. Eight people have been rescued including one
    person who subsequently died. (Voice of America)
  World AIDS Day:
  - Researchers claim that the pandemic has reached a tipping point where the number
    of people receiving treatment in a year was greater than the number of new cases.
    (U.S. Presidential Proclamation), (Reuters)
  International relations:
  - Russia abandons its plans for the South Stream pipeline to Bulgaria due to European
    Union objections instead looking at a pipeline to Turkey. (Reuters)
  - The United Nations World Food Program suspends a food program for 1.7 million
    Syrian refugees after donor countries fail to meet their commitments. (AP via
    CBC)
  - Russia launches a new national defense facility in Moscow meant to monitor threats
    to national security in peacetime but take control of the country in wartime.
    (RT)
  Law and crime:
  - A group of 30 armed men raid Papua New Guinea's Lae Nadzab Airport holding passengers
    hostage and ransacking offices. (ABC News Australia)
  Politics and elections:
  - Former Polish prime minister Donald Tusk becomes the second full-time President
    of the European Union. (EUobserver)
  - Moldovan parliamentary election, 2014
  - Moldova's pro-European parties begin consultations on forming a coalition as near-complete
    results show them gaining 54 seats in the 101-seat parliament. (Radio Free Europe/Radio
    Liberty)
  - 2014 Hong Kong protests
  - Pro-democracy demonstrators and the Hong Kong Police Force clash outside the headquarters
    of the Government of Hong Kong. Dozens of people are arrested. (New York Times),
    (AP via Fox News)
  Sports:
  - The Calgary Stampeders defeat the Hamilton Tiger-Cats to win the 102nd Grey Cup.
    (TSN)
