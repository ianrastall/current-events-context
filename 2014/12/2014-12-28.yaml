Date: '2014-12-28'
Source_URI: Portal:Current events/2014 December 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - The militant organisation Boko Haram attacks a village in Northern Cameroon, leaving
    an estimated 30 dead. (News24)
  - War in Afghanistan
  - The International Security Assistance Force formally ends its combat mission.
    (Reuters)
  Disasters and accidents:
  - Indonesia AirAsia Flight 8501
  - Traveling through thunderstorms over the Java Sea, Flight 8501 loses contact with
    air traffic control after the plane departed from the Indonesian city of Surabaya
    en route to Singapore with 162 people on board. (BBC)
  - The Italian-owned MS Norman Atlantic catches fire on a ferry run from Greece to
    Italy 44 nautical miles northwest of Corfu, with 222 vehicles, 411 passengers
    and 5 crew on board. Greek and Italian officials report at least one person is
    dead. (The Independent),(BBC)
  - Two merchant ships collide in rough seas off the Italian Adriatic coast, leaving
    at least one person dead and two missing. (Reuters via News24)
  - Floods and mudslides in Sri Lanka kill at least twenty-four people and leave eight
    missing. (The Japan Times)
  - An apartment building fire near San Antonio, Texas, USA, kills five people. (AP)
  Politics and elections:
  - The Croatian presidential election goes to a run-off between incumbent Ivo Josipović
    and challenger Kolinda Grabar-Kitarović. (Bloomberg)
