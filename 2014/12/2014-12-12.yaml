Date: '2014-12-12'
Source_URI: Portal:Current events/2014 December 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sony Pictures Entertainment hack
  - Sony Pictures Entertainment reportedly shuts production on several sets because
    of computer network issues regarding employee disbursement of pay following a
    massive computer hack. (FOX News)
  Business and economy:
  - Thousands of Italians take to the streets in 50 cities as part of a general strike
    protesting new labour laws. (ABC News Australia)
  - Wall Street sees its worst week in three years as oil prices continue to collapse.
    The Dow Jones Industrial Average sheds 315 points, or 1.8%, to 17280. (FOX Business)
  Disasters and accidents:
  - The ferry MV Mutambala capsizes on Lake Tanganyika, Democratic Republic of the
    Congo leaving at least 26 dead. (Radiookapi.net)
  Law and crime:
  - An unknown person shoots four people outside of Rosemary Anderson High School,
    an alternative high school in Portland, Oregon. Police later question a 22-year-old
    man. (CNN) (MSN), (AP)
  - Prosecutors at Sary-Arqa District Court in Astana charge 30-year-old Yevgeny Vdovenko,
    a Kazakh citizen, of intentional and illegal participation in a military conflict
    abroad because he had fought alongside pro-Russian separatists in eastern Ukraine.
    (Radio Free Europe)
  - A Palestinian man throws a chemical substance believed to be acid at an Israeli
    family that stopped to pick up a hitchhiker. No terrorist groups claim credit
    for the attack. (Reuters)
  Science and technology:
  - Torrent site isoHunt appears to have unofficially resurrected The Pirate Bay at
    a site which turns out serving new content. (VB News)
  - Microsoft announces its upcoming Windows 10 consumer version preview for January
    21. (FOX News)
