Date: '2014-10-10'
Source_URI: Portal:Current events/2014 October 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - ISIL forces capture the headquarters of Kurdish forces defending the Syrian border
    town of Kobane with the United Nations warning of massacre. (AAP via SBS)
  Ebola virus epidemic in West Africa:
  - Three people in Mali, which has had no cases, are injected with an experimental
    vaccine against the Ebola virus, the first such trial in Africa. (Haaretz)
  - The World Health Organisation estimates that the death toll from the outbreak
    has passed 4000 with all but nine deaths occurring in Liberia, Sierra Leone and
    Guinea. (BBC)
  International relations:
  - The local KGB in Minsk arrests about 100 Ukrainian and 30 Belarusian soccer fans
    at a qualifying match between Ukraine and Belarus for the 2016 European Championship
    after they a sang the song, Putin-Huilo! (which roughly translates as "Putin is
    a dickhead!"). (FP)
  Nobel Peace Prize:
  - Pakistani child education activist Malala Yousafzai and Indian children's rights
    advocate Kailash Satyarthi share the 2014 Nobel Peace Prize. (BBC), (Huffington
    Post)
  Politics and elections:
  - Kim Jong-un, the leader of North Korea, fails to show at an event marking the
    69th anniversary of the founding of the Workers' Party of Korea, increasing speculation
    about his prolonged absence from public view. (BBC)
  - Violeta Bulc is nominated as Slovenia's new candidate for EU commissioner after
    the former prime minister Alenka Bratušek was rejected by the European Parliament.
    (Slovenia Times)
  2014 Hong Kong protests:
  - Hong Kong's Occupy Central protest leaders call for supporters to hold a major
    rally after the Government of Hong Kong calls off planned talks. (BBC)
