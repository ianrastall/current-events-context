Date: '2014-10-05'
Source_URI: Portal:Current events/2014 October 5
Intelligence_Payload:
  Syrian civil war:
  - 18,000 Palestinians are facing life-threatening shortages of water in the Yarmouk
    Camp neighborhood of Damascus. (QnA)
  Insurgency in the North Caucasus:
  - Five police officers are killed and twelve others wounded in a suicide bombing
    in Grozny, the capital of Russia's North Caucasian republic of Chechnya. (BBC)
  Politics and elections:
  - Bulgarian parliamentary election, 2014
  - Bulgarians vote in a snap election, following the resignation of a Socialist-led
    government in July; the number of parties in the National Assembly grows from
    four to eight, and the centre-right GERB becomes the biggest party but falls short
    of an overall majority. Voter turnout is just about 50%, lower than at any time
    since the establishment of democratic rule in 1989. (The Economist)
  - Brazilian general election, 2014
  - Brazilians vote in a presidential general election using electronic machines.
    (AP via BBCNews)
  - The election race ends with its final counting indicating a second-round between
    candidates Dilma Rousseff and Aécio Neves to be decided in poll by voters at the
    end of the month. (The Washington post)
  Sports:
  - In rugby league, the South Sydney Rabbitohs win the 2014 NRL Grand Final and with
    it their 21st title (the most by any club) and their first since 1971, by beating
    the Canterbury-Bankstown Bulldogs by 30-6.
