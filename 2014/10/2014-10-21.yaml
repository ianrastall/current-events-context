Date: '2014-10-21'
Source_URI: Portal:Current events/2014 October 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgency
  - A Kabul roadside bomb kills at least four Afghan National Security Force soldiers
    with six other soldiers and six civilians injured. (AP)
  International relations:
  - Poland's parliamentary speaker, Radoslaw Sikorski, says that Russian President
    Vladimir Putin proposed to Poland's then leader Donald Tusk in 2008 that they
    divide Ukraine between themselves. Sikorski later retracted the claim stating
    he had "mis-remembered". (Reuters via Yahoo News)(Daily Mail)
  Law and crime:
  - A South African court sentences Oscar Pistorius to five years in prison for killing
    his girlfriend Reeva Steenkamp. (Mail and Guardian), (NBC)
  - North Korea releases American Jeffrey Edward Fowle five months after detaining
    him for leaving a Bible at a hotel. (CNN)
  Sports:
  - In baseball, the 2014 World Series begins with the San Francisco Giants defeating
    the Kansas City Royals 7–1 in KC's Kauffman Stadium. (AFP via Sports Fan), (AP)
    (MLB.com)
