Date: '2014-10-17'
Source_URI: Portal:Current events/2014 October 17
Intelligence_Payload:
  Disasters and accidents:
  - 2014 Atlantic hurricane season
  - Hurricane Gonzalo hits Bermuda becoming the strongest storm to hit the island
    in a decade. (NBC News), (Reuters)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organisation declares Senegal to be free of the Ebola virus.
    (Reuters via Business Recorder)
  - Ebola virus cases in the United States
  - The President of the United States Barack Obama names lawyer and former political
    operative Ron Klain as "ebola czar" to coordinate US response to the Ebola outbreak.
    (AFP via Yahoo! News)
  International relations:
  - The Kyodo news agency reports that the Prime Minister of Japan Shinzo Abe sent
    a ritual offering to the controversial Yasukuni Shrine in Tokyo that could complicate
    relations with China and South Korea. (Reuters)
  - 2014 pro-Russian unrest in Ukraine
  - Vladimir Putin, the President of Russia, and Petro Poroshenko, the President of
    Ukraine, will meet at the sidelines of the Asia–Europe Meeting in Milan, Italy
    to discuss the conflict and supplies of natural gas. (Euronews)
  Politics and elections:
  - 2014 Hong Kong protests
  - The Hong Kong Police Force stages a dawn raid at the protest site in the suburb
    of Mong Kok. (Reuters)
