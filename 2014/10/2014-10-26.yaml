Date: '2014-10-26'
Source_URI: Portal:Current events/2014 October 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - Pakistan's military claims to have killed 18 militants in air strikes near the
    Afghanistan border. (AFP via Business Recorder)
  - War in Afghanistan (2001–2021)
  - Camp Bastion, the last remaining British base in Afghanistan, and Camp Leatherneck,
    an American base next to it, are handed over to the Afghan Government. (BBC News)
  - Sinai Insurgency
  - The Egyptian government closes the Rafah border crossing with Gaza and will set
    up a buffer zone after a series of attacks which were reported to have been launched
    using smuggling tunnels from Gaza. (Times of Israel)
  - Gaza-Israel conflict
  - Peace talks between Hamas and Israel have been canceled after the Hamas delegation
    was refused entry into Egypt following recent attacks against the Egyptian Army.
    (Times of Israel)
  Law and Crime:
  - Senzo Meyiwa, the goalkeeper and captain of the South Africa national football
    team, is fatally shot in a township near Johannesburg. (Reuters via Yahoo!)
  Politics and elections:
  - Tunisian parliamentary election, 2014
  - Voters in Tunisia go to the polls for a parliamentary election, the first under
    a new constitution. (BBC)
  - Brazilian general election, 2014
  - Voters in Brazil go to the polls for the second round of a presidential election
    with incumbent President Dilma Rousseff re-elected. (AP), (Belfast Telegraph)
  - Uruguayan general election, 2014
  - Voters in Uruguay go to the polls for a general election with the presidential
    election expected to go to a second round. (BBC)
  - Ukrainian parliamentary election, 2014
  - Voters in Ukraine go to the polls with supporters of President Petro Poroshenko
    expected to do well. (AP via Fox News)
  Sports:
  - In baseball, the San Francisco Giants defeat the Kansas City Royals 5–0 at AT&T
    Park in San Francisco, taking a 3–2 lead in the World Series. (AP via ESPN)
