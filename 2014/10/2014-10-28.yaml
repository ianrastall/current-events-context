Date: '2014-10-28'
Source_URI: Portal:Current events/2014 October 28
Intelligence_Payload:
  Disasters and accidents:
  - Residents of Pahoa, Hawaii, begin evacuating ahead of an impending lava flow from
    the Kīlauea volcano. (BBC News)
  - 18 miners are trapped in a coal mine accident in Ermenek in Karaman province,
    Turkey. (ABC News)
  Health:
  - Ebola virus epidemic in West Africa
  - Australia issues a blanket ban on issuing visas for residents of Liberia, Guinea
    and Sierra Leone, the countries worst affected by the Ebola epidemic. (Reuters)
  Politics:
  - Zambian media reports that President Michael Sata has died while receiving medical
    care in London. (New Vision)
  Science:
  - An unmanned Antares rocket carrying NASA's Cygnus CRS Orb-3 resupply mission to
    the International Space Station explodes seconds after taking off from the Mid-Atlantic
    Regional Spaceport in the U.S. state of Virginia. The loss includes five thousand
    pounds of cargo. (The Baltimore Sun)
  Sports:
  - In baseball, the Kansas City Royals defeat the San Francisco Giants 10–0 at Kauffman
    Stadium in Kansas City, Missouri, in the sixth game of the World Series. The Royals
    tie the series at 3–3, setting up a decisive final game on October 29 in Kansas
    City. (AP via ESPN)
