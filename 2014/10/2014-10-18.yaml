Date: '2014-10-18'
Source_URI: Portal:Current events/2014 October 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Suspected Ugandan rebels kill more than 20 people near the Democratic Republic
    of the Congo town of Beni in their second attack in 48 hours. (Reuters)
  Disasters and accidents:
  - Cyclone Hudhud
  - The death toll from the Nepalese avalanche caused by the remnants of Cyclone Hudhud
    reaches 40. (Xinhua)
  - Days of heavy rainfall in Nicaragua lead to at least 22 deaths including 9 people
    killed in the capital Managua by a wall collapse. (BBC)
  Environment:
  - A male of critically endangered northern white rhinoceros died in reservation
    Ol Pejeta in Kenya. It was one of only two known males of the northern subspecies
    of white rhinoceros capable of natural mating. The Dvůr Králové Zoo said that
    he was one of seven northern white rhinos left. (ABC), (Sydney Morning Herald)
  Law and crime:
  - A McKeesport, Pennsylvania fire leaves family with a loss of six lives. (WPXI)
