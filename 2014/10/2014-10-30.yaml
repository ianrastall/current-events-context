Date: '2014-10-30'
Source_URI: Portal:Current events/2014 October 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Burkinabé uprising
  - Protestors demanding the resignation of President Blaise Compaoré set fire to
    parliament and other official buildings. The Chief of the Army dismisses the government
    and national assembly and announces a curfew and a transition time of one year.
    Compaoré fled to Dakar, Senegal. (Euro News)
  - Piracy in Somalia
  - Seven Indian sailors are released by pirates after 4 years of captivity. (UPI)
  2014 War in Donbas:
  - Russian action film star Mikhail Porechenkov is caught on film wearing press gear
    while firing a machine gun toward Ukrainian lines with pro-Russian rebels at Donetsk
    International Airport. (Mashable)
  Disasters and accidents:
  - A Beechcraft King Air B200 crashes into a FlightSafety International building
    in Wichita, Kansas - there are four dead. (Wichita Eagle)
  International relations:
  - Sweden officially recognises Palestine as a sovereign state. Israel recalls its
    ambassador to Sweden. (The Independent)
  Law and crime:
  - Eric Frein, wanted in the American state of Pennsylvania for the 2014 Pennsylvania
    State Police barracks attack that killed one officer and injured another, is taken
    into custody. (CNN)
  Politics:
  - Thomas Menino, former mayor of Boston, Massachusetts, and the longest-serving
    mayor in the city's history, dies of cancer at the age of 71. (Boston Globe)
  - The Temple Mount in Jerusalem was closed to all visitors for the first time since
    2000, following the attempted assassination of Israeli activist Yehuda Glick.
    (The Jerusalem Post)
  Sports:
  - In Nippon Professional Baseball, the Fukuoka SoftBank Hawks win the 2014 Japan
    Series defeating the Hanshin Tigers by 4 games to 1. Hawks outfielder Seiichi
    Uchikawa is named as series MVP. (CBS Sports), (The Japan News)
