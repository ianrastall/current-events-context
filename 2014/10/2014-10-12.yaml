Date: '2014-10-12'
Source_URI: Portal:Current events/2014 October 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - Islamic State claims responsibility for a triple suicide bombing in Iraq's Diyala
    Province that killed 26 Kurds as well as an attack in Anbar Province that killed
    the head of security. (AP)
  - Post-civil war violence in Libya
  - At least 21 people die in Libyan tribal clashes on the weekend. (Al-Arabiyah)
  - At least 26 people have been killed in tribal clashes in Nigeria's Plateau State
    over the past week. (Nigeria Tribune)
  Disasters and accidents:
  - 2014 Pacific typhoon season
  - At least 28 people are injured on the Japanese islands of Okinawa and Kyushu with
    150,000 evacuated as Typhoon Vongfong approaches. (AP)
  - 2014 North Indian Ocean cyclone season
  - Eastern India feels the impact of Cyclone Hudhud which makes landfall around noon
    near the city of Visakhapatnam. The death toll in Andhra Pradesh is at least three.(AP),
    (The Times of India)
  Health:
  - 2014 United States Ebola virus outbreak
  - A Texas nurse tests positive for Ebola. The health care worker is the first person
    to contract the disease in the United States of America, the first infection in
    the US to occur by secondary contact, and the second in the world sickened from
    exposure outside of the African continent. (AP)
  Politics and elections:
  - Bosnia and Herzegovina general election, 2014
  - Bakir Izetbegović and Dragan Čović appear to have won the Bosniak and Croat seat
    in the presidency while the race for the Serb seat is still too close to call.
    (Balkan Insight)
  - Bolivian general election, 2014
  - Voters in Bolivia go to the polls for a general election with incumbent President
    Evo Morales winning in a landslide with 60 per cent of the vote. (AP via Fox News)
