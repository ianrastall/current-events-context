Date: '2014-10-06'
Source_URI: Portal:Current events/2014 October 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - ISIL prepares to establish itself in Libya and reports emerge that they are already
    in the city of Derna. (Al Arabiya)
  - Kashmir conflict
  - India and Pakistan trade fire across the borders resulting in five civilian deaths
    in India and four in Pakistan. (AFP/Reuters via ABC News Australia)
  Business and economics:
  - Hilton Worldwide Holdings Inc. agrees to sell its most prestigious hotel, Manhattan’s
    Waldorf Astoria, for $1.95 billion to Chinese insurance company Anbang Insurance
    Group. (MarketWatch)
  - American IT company Hewlett-Packard announces plans to split in two and shed 5,000
    jobs. (Sci-Tech Today)
  Health:
  - Ebola virus epidemic in West Africa
  - A Spanish nurse becomes the first person to be infected with the Ebola virus outside
    West Africa. (New York Times)
  - Enterovirus 68
  - First death to be blamed on Enterovirus 68. Claims the life of a 4 year old named
    Eli Waller. (CBC)
  Disasters and accidents:
  - 2014 Pacific typhoon season
  - At least four people are dead as Typhoon Phanfone makes landfall in central Japan.
    (AFP via ABC News Australia)
  Politics and elections:
  - The European Parliament rejects Hungary's EU commissioner-designate Tibor Navracsics
    as unsuitable for the education and culture commissioner post; he may still be
    given a different post in the commission, causing a reshuffle. (BBC)
  Science:
  - Nobel Prize in Physiology or Medicine
  - British neuroscientist John O'Keefe and Norwegian scientists May-Britt Moser and
    Edvard Moser share the 2014 Nobel Prize in Physiology or Medicine. (Huffington
    Post)
