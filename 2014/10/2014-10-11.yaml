Date: '2014-10-11'
Source_URI: Portal:Current events/2014 October 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - Turkey agrees to allow the training of 2,000 Syrian opposition forces on its soil
    as Islamic State militants approach to within 1 mile of the centre of the border
    city of Kobani. (Wall Street Journal)
  - Cameroon says that 27 people believed captured by Islamist group Boko Haram including
    the wife of vice Prime Minister Amadou Ali have been freed. (AP via Fox News)
  Disasters and accidents:
  - At least seven people die and approximately 40 are injured at a stampede at a
    political rally by Pakistan opposition leader Imran Khan in the city of Multan.
    (BBC)
  - 2014 Pacific typhoon season
  - Typhoon Vongphong heads for the Japanese island of Okinawa leading to power losses
    and flight disruptions. (Reuters via Daily Mail)
  - 2014 North Indian Ocean cyclone season
  - Cyclone Hudhud strengthens over the Bay of Bengal with one person having already
    died in the storm. Mass evacuations of thousands of people is occurring as the
    storm approaches the east coast. (The Weather Channel), (AFP via SBS)
  Law and crime:
  - The American city of St. Louis prepares for a weekend of protests after eight
    people were arrested protesting another death in the suburb of Ferguson, Missouri
    this week. (Reuters)
  Politics and elections:
  - Charles Michel is sworn in as the new Prime Minister of Belgium leading a Coalition
    of four centre-right parties. (BBC)
