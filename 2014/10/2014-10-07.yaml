Date: '2014-10-07'
Source_URI: Portal:Current events/2014 October 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Korean maritime border incidents
  - There is an exchange of gunfire as a North Korean patrol boat breaches the South
    Korean western sea border. (AFP, NewsCorp via Sydney Daily Telegraph)
  - Islamic State of Iraq and the Levant
  - A hospital in the northern Iraqi city of Tal Afar says that 29 suspected ISIL
    fighters were killed in airstrikes last night. (CNN)
  - Kurds clash violently with Turkish police over failure to help Kurds under siege
    in the Syrian border city of Kobani under siege by ISIL forces. At least fourteen
    people have died in the clashes. (AP)
  Disasters and accidents:
  - A magnitude 6.0 earthquake hits China's Yunnan province with at least one death
    reported. (Sky News)
  - 2014 Pacific typhoon season
  - Supertyphoon Vongfong becomes the most intense storm of the year as it heads for
    Japan. (Live Science)
  - A major search operation is underway for the Sunrise-689, a Vietnamese vessel
    carrying 18 crew members and 5,226 tonnes of oil which lost both radio and radar
    contact on October 3 40 minutes after its departure from Singapore. (International
    Business Times)
  International relations:
  - Burma pledges to release 3000 prisoners a month before it hosts a Southeast Asian
    summit. (Reuters)
  Politics:
  - Umbrella revolution
  - Protesters who filled Hong Kong's streets for more democracy lessened Tuesday
    after the government finally agreed to negotiate with the student leaders. (CBC)
  Science:
  - Nobel Prize in Physics
  - Isamu Akasaki, Hiroshi Amano and Shuji Nakamura win the 2014 Nobel Prize in Physics
    for inventing blue light emitting diodes. (BBC)
