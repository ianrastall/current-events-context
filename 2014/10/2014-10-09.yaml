Date: '2014-10-09'
Source_URI: Portal:Current events/2014 October 9
Intelligence_Payload:
  Armed conflict and attacks:
  - al-Qaeda insurgency in Yemen
  - A suicide bomb attack kills at least 20 people in Tahrir Square in the Yemeni
    capital Sana'a. (Daily Star)
  - War in North-West Pakistan
  - American drone strikes kill at least five militants in North Waziristan. (AP via
    SFGate)
  - A hand grenade explodes in the Malaysian capital Kuala Lumpur killing one person
    and injuring 13. (Wall Street Journal)
  - Iraqi insurgency (2011–present)
  - A car bombing in a busy street in Baghdad's largest Shi'ite neighbourhood kills
    at least 12 people. (AFP via Al-Arabiyah)
  Arts and culture:
  - 2014 Nobel Prize in Literature
  - The French novelist Patrick Modiano is awarded the 2014 Nobel Prize in Literature.
    (Telegraph)
  Law and crime:
  - Alleged Mexican drug lord Vicente Carrillo Fuentes is captured in the city of
    Torreon. (Los Angeles Times)
  Politics and elections:
  - Former Slovenian prime minister Alenka Bratušek withdraws her candidacy as Vice-President
    of the European Commission and as European Commissioner for Energy after having
    been rejected by the European Parliament. (EU Observer)
  - Estonia becomes the first former Soviet republic to legalize gay partnerships
    and grant equal rights to same-sex couples.(EU Observer) (Instinct Magazine)
  - 2014 Hong Kong protests
  - Hong Kong government says it has called off a meeting on 10 October 2014 with
    student leaders of the pro-democracy movement. (BBC)
  - At least 12 people are killed in demonstrations across Turkey. (Al Jazeera)
