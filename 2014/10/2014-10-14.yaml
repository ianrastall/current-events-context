Date: '2014-10-14'
Source_URI: Portal:Current events/2014 October 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkish jets bomb Kurdish PKK positions in south-east Turkey. (BBC)
  Arts and culture:
  - Australian author Richard Flanagan's novel The Narrow Road to the Deep North wins
    the 2014 Man Booker Prize. (BBC)
  Business and economics:
  - A large French bank, Groupe BPCE launches a service that allows its customers
    to use the social network Twitter to send one another money. (Reuters)
  Disasters and accidents:
  - 2014 Pacific typhoon season
  - Typhoon Vongfong leaves Japan as a tropical storm having caused at least one death,
    two people missing and 93 injured. (Reuters via ABC News Australia)
  - 2014 North Indian Ocean cyclone season
  - The death toll from Cyclone Hudhud rises to 24 with 400,000 people needing assistance
    in India's Andhra Pradesh and Orissa states. (BBC)
  - A woman suffering from schizophrenia stabbed three students and a police negotiator
    at a secondary school in Žďár nad Sázavou, Czech Republic. A 16-year-old boy died
    due to his injuries. (Channel NewsAsia)
  Politics and elections:
  - The President of the Generalitat of Catalonia, Artur Mas i Gavarró, drops plans
    for a referendum on independence on November 9 from Spain following opposition
    from the Constitutional Court of Spain. (Bloomberg via Business Week)
  UEFA Euro 2016 qualifying Group D:
  - Ireland stuns world champion Germany in Gelsenkirchen, with Ireland drawing the
    match at 1–1 when John O'Shea scores in stoppage time. (The Sydney Morning Herald)
    (Telegraph)
  UEFA Euro 2016 qualifying Group I:
  - The game between Albania and Serbia is abandoned after a drone carrying a flag
    promoting the concept of Greater Albania descends onto the pitch in Belgrade,
    sparking riots, mass brawling and an explosion. Albania players are attacked on
    the pitch by Serbia fans, who in turn clash with riot police. (BBC) (The Sydney
    Morning Herald)
  - Albania's prime minister is embroiled in scandal after his brother is linked to
    the stunt. (Independent)
