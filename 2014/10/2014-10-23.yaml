Date: '2014-10-23'
Source_URI: Portal:Current events/2014 October 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Hamas member carries out a terrorist attack in Jerusalem by intentionally striking
    a group of pedestrians in a train station with his car killing a 3-month-old baby.
    (Times of Israel)
  - Islamist insurgency in Nigeria
  - Boko Haram abducts "dozens" of women and girls in Adamawa State, specifically
    in the villages of Wanga Mangoro and Garta. (BBC)
  Health:
  - Ebola virus disease in the United States
  - A New York City physician tests positive for Ebola at the Bellevue Hospital Center
    in Manhattan after treating Ebola patients in Guinea. (WABC-TV)
  - Ebola virus epidemic in West Africa
  - Mali confirms that a 2-year-old girl has tested positive for Ebola, marking the
    country's first documented case. (BBC)
  Law and crime:
  - A man attacks a group of police officers in New York City with a hatchet, injuring
    2 before being shot dead. Police suspect the attacker was motivated by radical
    Islamic ideals. (CNN)
  Politics and elections:
  - Protesters in Iran call for increased security after four women are injured in
    acid attacks in Isfahan for allegedly not wearing veils. (AFP via ABC Online)
  Science:
  - Partial solar eclipse visible over much of North America today. (timeanddate.com)
