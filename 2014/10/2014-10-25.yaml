Date: '2014-10-25'
Source_URI: Portal:Current events/2014 October 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (2011-present)
  - Kurdish peshmergas retake the city of Zumar and several nearby villages from ISIS,
    while Iraqi government forces and Shi'ite militias seize control of Jurf Al Sakhar.
    (Reuters/Huffington Post)
  - Sinai insurgency
  - Egypt declares a three month state of emergency for parts of the Sinai Peninsula
    after at least 31 soldiers are killed in two attacks there. (BBC)
  Disasters and accidents:
  - 2014 shooting of Sacramento police officers
  - Luis Enrique Monroy Bracamonte, the prime suspect in the shooting deaths of two
    Northern California sheriff's deputies, is reported to be an illegal immigrant
    from Mexico. (Los Angeles Times)
  - Sixteen workers are killed after a coal mine collapses in far western Xinjiang
    region. (Reuters)
  Law and crime:
  - Despite an international campaign, Iran hangs Reyhaneh Jabbari, sentenced for
    the murder of a man she claims was in self-defence. (BBC)
  Politics and elections:
  - The United States Federal Government recognizes same-sex marriage in Alaska, Arizona,
    Idaho, North Carolina, West Virginia and Wyoming, bringing the total number of
    states with recognition of gay marriage to 32. (ABC News)
  In baseball:
  - In the World Series, the San Francisco Giants defeat the Kansas City Royals 11–4
    at AT&T Park in San Francisco, leveling the series at 2–2. (AP via ESPN)
  - The 2014 Japan Series begins with the Hanshin Tigers defeating the Fukuoka SoftBank
    Hawks 6–2 in Hanshin's Koshien Stadium. (NHK)
