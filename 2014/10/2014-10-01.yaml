Date: '2014-10-01'
Source_URI: Portal:Current events/2014 October 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgency
  War in Donbass:
  - At least 12 people are killed when shells hit a school and, in a separate shelling,
    a bus station in the separatist-controlled city of Donetsk. (CNN)
  - Taliban suicide bombers attack an Afghan National Army convoy in Kabul, killing
    at least 7 people and injuring 19. (Wall Street Journal)
  Syrian civil war:
  - At least 45 people (including 41 children) are killed and 56 injured following
    a suicide bomber attack on the Akrameh al-Makhzumi school in Homs. (RTE)(Al Jazeera)
  Arts and culture:
  - The Philippines government confiscates art owned by Imelda Marcos, including a
    Michaelangelo, a Gauguin, and a Picasso, alleging that these were bought using
    embezzled funds. (BBC)
  Business and economy:
  - U.S. Senator Patrick Leahy writes to Internet Service Providers asking them to
    commit to net neutrality, that is, to refrain from engaging in "paid prioritization."
    (Reuters)
  Environment:
  - Pacific walruses unable to find sea ice on which to rest in Arctic waters are
    coming ashore in record numbers on a beach in north-west Alaska. (The Guardian)
  Politics and elections:
  - Greenland's government calls for an early election on November 28 after an expenses
    scandal prompts Prime Minister Aleqa Hammond to step down as leader of the governing
    Siumut party. (AFP)
  - Julia Pierson resigns as the Director of the United States Secret Service following
    a series of security breaches at the White House. (Bloomberg)
  - The Egyptian government confiscates all copies of a daily print of Al-Masry Al-Youm,
    one of the country’s largest private newspapers, in order to censor an article,
    days after President Abdel Fattah el-Sisi vowed in a U.S. television interview
    that there was "no limitation on freedom of expression in Egypt." (New York Times)
