Date: '2014-10-04'
Source_URI: Portal:Current events/2014 October 4
Intelligence_Payload:
  Armed conflicts:
  - Syrian civil war
  - The Kurdish city of Kobane in the Raqqa governate is on the brink of catastrophe
    as ISIL fighters besiege the city. (The Guardian)
  International relations:
  - Sweden's new centre-left government creates a surprise by announcing that the
    country will recognise the state of Palestine, and becomes the first European
    country to do so while a member of the European Union. (Euronews)
  Politics and elections:
  - After counting special votes from the 20 September New Zealand general election,
    the National Party loses its one-seat majority after losing a seat to the Green
    Party. With the support of ACT and United Future, National still forms a government,
    albeit a minority government. (NZ Herald)
  - Latvian parliamentary election, 2014
  - Latvia votes in a parliamentary election; Laimdota Straujuma's centre-right government
    keeps its majority. (Euronews)
  - Jean-Claude Duvalier (Baby Doc), leader of Haiti from his father's death in 1971
    until his overthrow by a popular uprising in 1986, dies of a heart attack. (CNN)
  Sports:
  - Despite ending their 22-match unbeaten streak after losing to South Africa, New
    Zealand win the 2014 Rugby Championship in rugby union. Also on the final day
    of the tournament, Argentina defeat Australia for their first win in the competition
    since joining it in 2012. (BBC, South Africa–New Zealand) (BBC, Argentina–Australia)
  - The 2014 Asian Games concludes in Incheon, South Korea with China gaining the
    most medals. (The Express Tribune)
