Date: '2014-10-16'
Source_URI: Portal:Current events/2014 October 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - The Pakistan Air Force claims to have killed at least 27 militants in overnight
    airstrikes. (AFP via Hindustan Times)
  International relations:
  - New Zealand, Malaysia, Angola, Spain and Venezuela have been elected to sit on
    the United Nations Security Council for two years from 2015. (Reuters via ABC
    News Australia)
  Law and crime:
  - Brazilian police arrest Thiago Henrique Gomes da Rocha who they claim has killed
    at least 39 people over a three year period targeting homeless people, women and
    gays. (BBC)
  Politics and elections:
  - The Europe of Freedom and Direct Democracy (EFDD) group in the European Parliament,
    set up by Eurosceptic parties after the European elections, is dissolved after
    Latvian MEP Iveta Grigule left the group. (Guardian), (EP Media Spokesman)
  - 2014 Hong Kong protests
  - There are overnight scuffles between members of the Hong Kong Police Force and
    Occupy Central with Love and Peace protesters for a second night. (BBC)
