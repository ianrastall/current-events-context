Date: '2014-10-19'
Source_URI: Portal:Current events/2014 October 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Hong Kong protest
  2014 investigation of suspected foreign underwater activity in the Stockholm archipelago:
  - The Swedish National Defence Radio Agency (FRA) reportedly detected radio communication
    in Russian transmitted on a special frequency used by Russia only in emergency
    situations from an underwater vehicle in the Stockholm archipelago. (Svenska Dagbladet)
  - The Swedish military releases a photo of the suspected vessel in the archipelago
    of Stockholm. (Expressen)
  - The Hong Kong Police Force and protesters clash violently in the neighbourhood
    of Mong Kok. (McClatchy via Washington Post)
  Religion:
  - Pope Francis closes the Third Extraordinary General Assembly of the Synod of Bishops,
    a preparatory meeting which had as its theme the pastoral challenges to the family,
    with a Mass at the Vatican—with Pope Emeritus Benedict XVI and about 70,000 in
    attendance—featuring the beatification of Pope Paul VI, who concluded and implemented
    Vatican Council II and gained fame for writing the still-controversial Humanae
    Vitae sexual ethics encyclical. (MSN/Associated Press)
  Science:
  - A working human intestine is generated in a laboratory from induced pluripotent
    stem cells in the United States. (AAP via The Australian)
  - Oort cloud Comet Siding Spring makes a close fly-by the planet Mars passing within
    140,000 kilometres. (ABC)
