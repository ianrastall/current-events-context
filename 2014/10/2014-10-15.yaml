Date: '2014-10-15'
Source_URI: Portal:Current events/2014 October 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least eight people are killed as villagers clash with construction workers
    and riot police over land disputes in Yunnan province, China. (AFP via AsiaOne)
  - Shia insurgency in Yemen and al-Qaeda insurgency in Yemen
  - Shia Houthi rebels and suspected al-Qaeda militants clash near the town of Radaa
    in Al Bayda' Governorate province resulting in at least 10 deaths. (BBC)
  Business and economy:
  - The Dow Jones Industrial Average drops more than 450 points, erasing gains for
    the year only to rebound late in the day for a close down 173 points. (CNBC)
  Disasters and accidents:
  - A snowstorm and avalanche in the Nepalese Himalayas triggered by the remnants
    of Cyclone Hudhud kills at least 17 people with 100 more out of contact. (AAP
    via SBS), (Reuters)
  Health:
  - Ebola virus outbreak in the United States
  - A second health worker tests positive for the ebola virus in Dallas, Texas. (Reuters
    via ABC News Australia)
  Law and crime:
  - 3 police officers are injured in Jerusalem as Israeli riot police and Palestinian
    protesters clash before a Jewish festival. (AP via Miami Herald)
  Politics and elections:
  - 2014 Hong Kong protests
  - Violent clashes between police and protesters occur in central Hong Kong as protesters
    attempt to barricade a major road. (New York Times)
  - Nicola Sturgeon will succeed Alex Salmond as leader of the Scottish National Party
    and First Minister of Scotland after she was the only candidate to put their name
    forward in the party's leadership election. (BBC)
  - Popular Saudi Shia Sheikh Nimr al-Nimr sentenced to death by Saudi court that
    tries terrorists and human rights activists. (BBC)
  Sport:
  - In North American Major League Baseball, the Kansas City Royals sweep the Baltimore
    Orioles in the 2014 American League Championship Series 4-0 to progress to the
    2014 World Series. (Canadian Press via Yahoo!)
