Date: '2014-10-13'
Source_URI: Portal:Current events/2014 October 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (2011–present)
  - Three bombs explode in Shi'ite areas of Baghdad killing at least 30 people. (Reuters
    via Yahoo! News)
  Disasters and accidents:
  - 2014 Pacific typhoon season
  - Typhoon Vongfong makes landfall in the Japanese island of Kyushu causing the evacuation
    of 150,000 people and disruption to plane and train services. (AP)
  - 2014 North Indian Ocean cyclone season
  - Cyclone Hudhud is downgraded to a tropical depression having caused at least 8
    deaths in India with 5 dead in Andhra Pradesh and 3 people dead in Orissa. (AP)
  - A 7.4 magnitude earthquake occurs off the coast of El Salvador with a tsunami
    warning issued for the Pacific Ocean coasts of El Salvador, Nicaragua and Honduras.
    (Reuters)
  Law and crime:
  - A United States Marine is detained on the USS Peleliu, which is docked in Subic
    Bay, Philippines, after he allegedy murdered Filipino transgender woman Jennifer
    Laude. (Bloomberg)
  - Protesters in the Mexican state of Guerrero attack the state government headquarters
    in the state capital Chilpancingo over the disappearance of 43 students. (BBC)
  Politics and elections:
  - Brazilian general election, 2014
  - Environmentalist Marina Silva, who came third in the first round of the presidential
    elections, decides to back centre-right candidate Aécio Neves following an open
    letter from Neves to the nation where he promises to include in his manifesto
    issues such as land reform, the demarcation of indigenous lands, the rights of
    rural communities and environmental concerns. (BBC)
  - Kim Jong-un, the leader of North Korea makes his first public appearance in five
    weeks. (Reuters via CBC)
  - Evo Morales, president of Bolivia is re-elected for a third 5 year term. (The
    Guardian)
