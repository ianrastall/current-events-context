Date: '2014-10-22'
Source_URI: Portal:Current events/2014 October 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Swedish submarine incidents
  - NATO intercepts Russian jets over the Baltic Sea while Sweden's six-day search
    for a possibly damaged Russian Navy submarine continues. (AP via Daily Telegraph)
    (Europe Online Magazine)
  - Rear Admiral Anders Grenstad, while pointing out that Sweden's military operation
    is focused on gathering intelligence on a suspected foreign submarine in its waters,
    stated that military force could be used to make it surface. (BBC)
  - 2014 shootings at Parliament Hill, Ottawa
  - A gunman shoots a Canadian Forces soldier outside the Canadian National War Memorial,
    with the gunman later reported dead inside the Canadian Parliament buildings.
    The incident came hours after Canada raised its terror threat level from low to
    medium following Monday's fatal hit-and-run attack on two soldiers in Quebec.
    (CBC) (BBC), (CNN) (AFP via Yahoo News) (Guardian)
  - Islamic State of Iraq and the Levant
  - The Syrian Air Force claims to have shot down two of the three fighter jets operated
    by ISIL in northern Syria. (Reuters via Times of India)
  Health:
  - Ebola virus disease in the United States
  - The United States Centers for Disease Control and Prevention announces that there
    will be a 21-day monitoring period for all travelers from Liberia, Sierra Leone
    and Guinea. (Fox News)
  Law and crime:
  - Blackwater Baghdad shootings
  - A court convicts four former employees of Blackwater Worldwide on charges related
    to the 2007 killing of 14 unarmed Iraqis by firing machine guns in a Baghdad traffic
    circle. (Washington Post)
  - In Washington, D. C., Secret Service agents apprehend a White House north fence
    jumper. (ABC News America)
  Sports:
  - In Major League Baseball, the Kansas City Royals defeat the San Francisco Giants
    7–2 at KC's Kauffman Stadium in Game 2 of the 2014 World Series, evening the series
    at 1–1. (AP)
