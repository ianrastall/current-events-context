Date: '2014-10-29'
Source_URI: Portal:Current events/2014 October 29
Intelligence_Payload:
  Arts and culture:
  - New Zealand will hold a referendum regarding its national flag in 2016. (BBC)
  Disasters and accidents:
  - A mudslide in south-central Sri Lanka kills more than 100 people. (Reuters)
  Politics and elections:
  - Tunisian parliamentary election, 2014
  - The results of the recent Tunisian parliamentary election are announced with the
    secular Nidaa Tounes party winning a plurality of seats. (BBC)
  - Guy Scott, the Vice-President of Zambia, becomes the interim President following
    the death of Michael Sata in London on Tuesday. (Voice of America)
  Sport:
  - In Major League Baseball, the San Francisco Giants win the 2014 World Series,
    defeating the Kansas City Royals by 4 games to 3 for the Giants' third World Series
    win in five seasons, followed by civil disorder in the streets. Giants pitcher
    Madison Bumgarner is named as series MVP. (The Guardian), (AP)
