Date: '2014-10-24'
Source_URI: Portal:Current events/2014 October 24
Intelligence_Payload:
  Sinai insurgency:
  - Two attacks by militants on Egyptian military positions in the Sinai Peninsula
    kill at least 33 security personnel. (Reuters)
  Law and crime:
  - 2014 Marysville Pilchuck High School shooting
  - A student and a student gunman of Marysville Pilchuck High School in Marysville,
    Washington, are fatally shot along with six others injured. (CNN)
  - 2014 shooting of Sacramento police officers
  - A gunman kills two sheriff's deputies and wounds an officer and a bystander in
    Sacramento County, California, then is arrested. (FOXNews)
  International relations:
  - The European Union reaches a landmark climate deal to cut emissions by 40 percent
    by 2030. (AFP/Reuters via ABC News)
  Politics and elections:
  - Botswana election
  - Voters in Botswana go to the polls for a general election with the ruling Botswana
    Democratic Party of President Ian Khama winning 33 of 57 seats. (Reuters)
  Science and technology:
  - Chinese space program
  - The China National Space Administration launches the unmanned Chang'e 5-T1 spacecraft
    to fly around the moon and back to earth. (AP)
  - Alan Eustace sets a parachuting record of 135,000 feet. (Daily Mail)
  - Lockheed Martin announces that it plans to have a functioning prototype fusion
    reactor operational in 3 years. (Voice of America)
  Sports:
  - In Major League Baseball, the Kansas City Royals take a 2–1 lead in the 2014 World
    Series after defeating the San Francisco Giants 3–2 at AT&T Park in San Francisco.
    (AP via ESPN)
  - In rugby union, SANZAR announces that Japan has beaten out Singapore for an Asian
    Super Rugby franchise. The Japan franchise will join the Southern Kings from South
    Africa and a team from Argentina as new teams when Super Rugby expands from 15
    sides to 18 in 2016. (AFP via The Sydney Morning Herald)
