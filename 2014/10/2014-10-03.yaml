Date: '2014-10-03'
Source_URI: Portal:Current events/2014 October 3
Intelligence_Payload:
  Business and economy:
  - The Bureau of Labor Statistics reports that unemployment in the United States
    has dropped from 6.1% to 5.9% in September, the lowest since July of 2008. The
    labor force participation rate also fell, to 62.7 percent. (CNBC)
  - A cyber-attack against JPMorgan Chase and 9 other financial institutions that
    compromised over 83 million accounts is disclosed. The attack is considered one
    of the largest data breaches in history.(Reuters)
  Swedish general election, 2014:
  - Sweden's new Prime Minister, Stefan Löfven, presents his minority government consisting
    of the Social Democrats and the Green Party; former EU commissioner Margot Wallström
    is the new foreign minister. (SVT)
