Date: '2014-10-20'
Source_URI: Portal:Current events/2014 October 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Libyan conflict
  - Islamic State of Iraq and the Levant
  - War in Donbass
  2014 investigation of suspected foreign underwater activity in the Stockholm archipelago:
  - The investigation continues as the Russian Oil-tanker NS Concord maintains its
    criss-crossing outside Stockholm. (TT via The Local)
  - Pro-government forces launch an attack on Islamist militants resulting in 75 deaths
    in five days. (AFP via Business Standard)
  - Turkey will allow Turkish Kurds to join in the fight against ISIL in Kobane. (BBC)
  - At least 43 Shi'ites are dead in Baghdad and the holy city of Karbala in a wave
    of suicide and car bombings. (AP)
  - A huge explosion occurs in a rubber factory in the rebel held city of Donetsk
    with the Russian media claiming it was caused by a missile. The Government of
    Ukraine denies the charges. (The Independent)
  Disasters and accidents:
  - 2014 Atlantic hurricane season
  - The remnants of Hurricane Gonzalo are due to make landfall in the United Kingdom
    causing heavy rains and gale force winds. (The Independent)
  - A collision between two buses on the Dhaka-Rajshahi highway leaves at least 30
    people dead in northwestern Bangladesh. (AAP via The Australian)
  - The Chief Executive Officer of Total S.A., Christophe de Margerie, dies in a plane
    crash in Moscow together with three members of the flight crew. (BBC)
  Politics and elections:
  - Joko Widodo is sworn in as President of Indonesia. (BBC)
  - Two members of Prime Minister of Japan Shinzo Abe's cabinet, Trade Minister Yūko
    Obuchi and Justice Minister Midori Matsushima, resign over a scandal involving
    alleged misuse of political funds. (AFP via NZ Stuff)
