Date: '2014-10-08'
Source_URI: Portal:Current events/2014 October 8
Intelligence_Payload:
  Armed conflict and attacks:
  - Mass graves found in Iguala, Mexico, on October 5th reportedly contain the remains
    of 28 of the 43 missing students that clashed with the police during last September.
    (The New York Times)
  - At least 19 Kurdish civilians were killed while protesting against the government's
    inaction in defending Kobani from ISIS advances. (Times of Israel)
  - Taliban insurgency
  - A suicide bomber kills at least four people and wounds 16 in Afghanistan's Helmand
    province. (Tolo News)
  - al-Qaeda insurgency in Yemen
  - al-Qaeda launches an attack on the south Yemen town of al-Bayda killing at least
    four soldiers before being beaten back by the army. (Swiss Info)
  Arts and culture:
  - The Vienna Philharmonic Orchestra is awarded the $1 million Birgit Nilsson Prize
    in a ceremony in Stockholm. (ABC News)
  - Archaeologists date cave paintings in Maros on the Indonesian island of Sulawesi
    as being 40,000 years old, which is as old as similar works in Europe. (New York
    Times)
  Health:
  - Ebola virus disease in the United States
  - The first person who was diagnosed with ebola in the United States, Thomas Eric
    Duncan, a Liberian man, dies in Dallas, Texas. (USA Today)
  International relations:
  - Uhuru Kenyatta, the President of Kenya, appears at a status conference at the
    International Criminal Court regarding post-election violence in 2007. (AAP via
    SBS)
  Politics and elections:
  - With 13 votes for and 122 against, the European Parliament rejects former Slovenian
    Prime Minister Alenka Bratušek's candidacy for Vice-President of the European
    Commission and as Commissioner for the Energy Union. (Slovenia Times) (EU Observer)
  - John Key is sworn in for his third term as Prime Minister of New Zealand. (ABC
    News Australia)
  Science:
  - People in North America, Australia, western South America and parts of East Asia
    will be able to see a lunar eclipse today. (BBC)
  - Nobel Prize in Chemistry
  - Eric Betzig, Stefan Hell and William Moerner share the Nobel Prize in Chemistry
    for the development of ‘super-resolved fluorescence microscopy’. (The Guardian)
