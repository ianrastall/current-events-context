Date: '2014-06-24'
Source_URI: Portal:Current events/2014 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian conflict in Ukraine
  - Russian President Vladimir Putin formally asks Russia's upper house of parliament
    to revoke the right that it earlier granted for Russian forces to intervene militarily
    in Ukraine in defense of Russian-speakers there. (Reuters)
  - Nine Ukrainian servicemen are killed when a Ukrainian Ground Forces Mil Mi-8 is
    downed by separatist forces near Sloviansk, one day after a temporary ceasefire
    was declared. (Sky News Australia)
  - A car bombing occurs in a Shiite suburb of Lebanon's capital Beirut killing the
    bomber and injuring five other people. (AFP via Global Post), (New York Times)
  - At least five people have been killed in an attack on the Kenyan coast. (BBC News)
  - An Afghan man who saved the life of a Navy SEAL requests asylum in the United
    States after the Taliban has declared they will try to kill him. (Vocativ.com)
  - At least one person is killed and two are injured as unidentified gunmen open
    fire on a Pakistan International Airlines aircraft at Bacha Khan International
    Airport in Peshawar, Pakistan. (IANS via Biharprabha)
  Arts and culture:
  - The Emir of Qatar, Sheikh Tamim bin Hamad Al Thani, agrees to spend 2.2 billion
    Euros to convert Barcelona's La Monumental bullring into a 40,000-capacity mosque,
    the biggest in Europe. (RT)
  - Lyrics of "Like a Rolling Stone" handwritten by Bob Dylan sell at auction for
    a record US$2 million. (BBC News)
  Business and economy:
  - Strikes by French air traffic controllers lead to the cancellation of dozens of
    flights in Europe. (ITV)
  Disasters:
  - Nine commercial fisherman are killed and three others are missing after two fishing
    trawlers collide near Pisco in central Peru. (AP)
  Law and crime:
  - The South Korean trial of the captain and 14 crew members in relation to the sinking
    of MV Sewol begins. (BBC)
  - Tijuana Cartel leader Luis Fernando Sánchez Arellano is arrested by the Mexican
    Army in Tijuana, Baja California. (KPBS)
  - R v Coulson, Brooks and others
  - Former News International tabloid editor Andy Coulson is found guilty in relation
    to conspiracy to hack mobile phones. Rebekah Brooks, Charlie Brooks, Clive Goodman,
    Ian Edmondson, Stuart Kuttner, Cheryl Carter and Mark Hanna are acquitted. (New
    York Times)
  Politics and elections:
  - () withdraws his name from nomination to be the next Prime Minister of South Korea
    due to his alleged historic pro-Japanese views. (Yonhap)
  - A new coalition government takes office in Finland, the first led by a Swedish-speaking
    Finn since 1959. (YLE) (Finland Times)
  Sport:
  - In ice hockey, Sidney Crosby, captain of the Pittsburgh Penguins, wins both the
    Hart Memorial Trophy and the Ted Lindsay Award for most valuable player as voted
    by the media and National Hockey League Players' Association, respectively. (NHL)
