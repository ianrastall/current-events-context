Date: '2014-06-30'
Source_URI: Portal:Current events/2014 June 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Post-coup unrest in Egypt
  - A police officer is killed and several others injured in a small explosion near
    the presidential palace in Cairo. A second officer is killed while defusing another
    bomb at the same site. (Reuters) (The Voice of Russia)
  - South Thailand insurgency
  - A group of gunmen open fire at a mosque in the Panare district in Pattani province
    in Thailand, resulting in at least one death. (AP via Myrtle Beach Online)
  - 2014 pro-Russian conflict in Ukraine
  - A cameraman from Russia's Channel One dies after being shot in Donetsk. (RT)
  - Gaza–Israel conflict
  - At least 11 rockets are fired into southern Israel from the Gaza Strip causing
    light damage to a house. (Jerusalem Post)
  - War in North-West Pakistan
  - The Pakistan Army begins a ground offensive against militants in the town of Miramshah
    in North Waziristan. (AP via Time)
  - Israeli–Palestinian conflict
  - The bodies of three kidnapped Israeli teenagers, including one with dual American
    citizenship, are found partially buried near Hebron on the West Bank. Shin Bet
    determined they were murdered shortly after being kidnapped, and is searching
    for two Hamas kidnappers and accomplices.(ABC News America) (Jerusalem Post)
  - Mexican Drug War
  - Mexican Army soldiers kill 22 criminals in a shootout at a warehouse in the town
    of Tlatlaya in central Mexico. (AP)
  Arts and culture:
  - Yosemite National Park commemorates the 150th anniversary of Abraham Lincoln signing
    into law the Yosemite Grant Act, establishing Yosemite as a federally-protected
    area. (KGO)
  Law and crime:
  - The People's Republic of China jails 113 people in Xinjiang autonomous region
    for terrorism and other offences. (AP)
  - North Korea says it will put on trial two American tourists, Jeffrey Fowle and
    Michael Miller, for crimes against the state. (Reuters)
  - Philippines Senator Jinggoy Estrada is arrested for alleged corruption. (AP via
    BND)
  - Australian entertainer Rolf Harris is convicted in London, England, of 12 counts
    of indecent assault against young girls between 1968 and 1986. The 84-year-old
    is to be sentenced on Friday 4 July. (ABC News Australia)
