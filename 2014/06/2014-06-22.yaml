Date: '2014-06-22'
Source_URI: Portal:Current events/2014 June 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Northern Iraq offensive
  - Islamic State in Iraq and the Levant capture the al-Walid (al-Tanf) border crossing
    with Syria and the Turaibil (Karameh) border crossing with Jordan. (Al Jazeera)
  - Syrian civil war
  - A 15-year-old Israeli boy is killed and three Israelis wounded when their truck
    is hit by an unknown weapon in the Golan heights near the Quneitra border crossing;
    Israeli Defense Forces fire at Syrian government targets in response. (BBC News)
  Arts and culture:
  - The Pyu ancient cities are added to the UNESCO World Heritage Site list, the first
    such site in Myanmar. (UNESCO)
  Business and economy:
  - The French government votes to allow a US$17 billion deal buyout of much of Alstom's
    power production business by General Electric to move forward. (Reuters)
  Law and crime:
  - Three men who escaped from a jail near Quebec City via helicopter on 7 June are
    recaptured by the RCMP in Montreal. (CBC)
  Sports:
  - Due to a court order, the first World Cup water break is taken during a match
    between Portugal and the United States. (USA Today)
