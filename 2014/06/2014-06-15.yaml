Date: '2014-06-15'
Source_URI: Portal:Current events/2014 June 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Syrian Military retakes control of Kessab in north-western Syria. (Reuters)
  - War in North-West Pakistan
  - Airstrikes in the northwestern tribal area bordering Afghanistan kill as many
    as 100 militants. Canadian Press via (Nanaimo Daily News)
  - Abu Abdur Rehman Almani, the alleged mastermind behind 2014 Jinnah International
    Airport attack, is killed during air strikes carried out by Pakistan Air Force.
    (IANS via Biharprabha)
  - Pakistan formally launches military operation against the insurgents in North
    Waziristan. (Dunya News)
  - Seven people are killed in Aden, Yemen, after a gunman opens fire on a minibus.
    (Voice of America)
  - Islamist militants kill dozens of people in the Kenyan town of Mpeketoni in the
    Lamu Archipelago in a four hour series of attacks on hotels. (The Telegraph)
  2014 Northern Iraq offensive:
  - The United States evacuates personnel from its embassy in Baghdad as Islamic State
    in Iraq and the Levant nears the city. (AFP via Google News)
  Business and economics:
  - A report by the Official Monetary and Financial Institutions Forum finds that
    total global investments, including gold and stock, by public investors, such
    as central banks, sovereign wealth funds, and pension funds, now total $29.1 trillion.
    (Financial Times)
  - Medtronic agrees to purchase Covidien for US$42.9 billion. (Reuters)
  Politics and elections:
  - Voters in Colombia go to the polls for a presidential election, pitting incumbent
    Juan Manuel Santos against Óscar Iván Zuluaga. Santos is reelected with 51% of
    the vote. (Voice of America) (Miami Herald)
  Sport:
  - In golf, Martin Kaymer of Germany wins the U.S. Open by eight strokes for his
    second career major championship. (BBC Sport)
  - The 82nd 24 Hours of Le Mans ends with Audi drivers André Lotterer, Benoît Tréluyer,
    and Marcel Fässler winning outright in their Audi R18 e-tron quattro. (NBC Sports)
  - 2013–14 NBA season
  - San Antonio Spurs beat the Miami Heat in the 2014 NBA Finals. (Sydney Morning
    Herald)
