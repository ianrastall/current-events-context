Date: '2014-06-08'
Source_URI: Portal:Current events/2014 June 8
Intelligence_Payload:
  Armed conflict and attacks:
  - The United Nations and Military of the Democratic Republic of the Congo sends
    troops to South Kivu province after 37 people are killed there. (Wall Street Journal)
  - 2014 Jinnah International Airport attack
  - Terrorism in Pakistan
  Iraqi insurgency (post-U.S. withdrawal):
  - At least 13 people are killed and 60 injured as a result of a double bombing at
    the offices of the Patriotic Union of Kurdistan in Jalula, Diyala region. (AP
    via Fox News)
  - Gunmen attack Karachi's Jinnah International Airport resulting in at least 13
    deaths and leading to all flights to and from the airport being cancelled. (BBC
    News) (AP via Yahoo! News)
  - Twenty-four people are killed when militants attack a bus carrying Shia pilgrims
    from Iran to Quetta in Balochistan, province of Pakistan.(IANS via Biharprabha)
  Arts and culture:
  - 68th Tony Awards
  - The 68th Tony Awards are held in Radio City Music Hall in New York City with "All
    the Way" winning the Tony Award for Best Play. (USA Today)
  International relations:
  - The Government of Bulgaria orders a halt to construction work on the Gazprom-led
    South Stream pipeline project planned to bypass Ukraine as a transit country into
    Europe. (Sofia Globe)
  - Pope Francis urges President Shimon Peres of Israel and President Mahmoud Abbas
    of Palestine to work for peace at an historic joint prayer meeting at the Vatican.
    (BBC News)
  Law and crime:
  - Three people, including two police officers, are shot dead by a couple in a shooting
    in a pizzeria in the US city of Las Vegas, Nevada. The woman (Amanda Miller) kills
    her husband (Jerad Miller) and then herself. (Fox News)
  Bon Secours Mother and Baby Home:
  - Dr Diarmuid Martin, the Roman Catholic Archbishop of Dublin, calls for an independent
    inquiry into mass graves for women and children warning that more sites are likely
    to be found in Ireland. (The Telegraph)
  Politics and elections:
  - Abdel-Fattah el-Sissi is sworn in as President of Egypt for a four year term.
    (AP via The Globe and Mail)
  Kosovan parliamentary election, 2014:
  - Voters in Kosovo go to the polls for a parliamentary election. (Bloomberg)
  Sports:
  - In association football, FIFA World Cup sponsor Sony calls for an investigation
    into claims that Qatar used bribery to help win the bid to host the 2022 FIFA
    World Cup. (The Guardian)
  2014 French Open:
  - In tennis, Peng Shuai of China and Hsieh Su-wei of Taiwan win their second Grand
    Slam title together by defeating Sara Errani and Roberta Vinci of Italy 6-4, 6-1
    in the women's doubles final at the French Open. (Fox Sports)
  - Rafael Nadal of Spain wins his ninth title in the French Open after a double fault
    from Novak Djokovic of Serbia, 3-6, 7-5, 6-2, 6-4. He becomes the first man to
    win nine titles in one Grand Slam championship. (The Telegraph) (SI)
