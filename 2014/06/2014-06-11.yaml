Date: '2014-06-11'
Source_URI: Portal:Current events/2014 June 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - '2014 Mosul offensive: Insurgents continue their offensive, gaining control of
    the city of Tikrit, the second provincial capital to fall in as many days. At
    least 500,000 residents of Mosul flee the fighting and head east into Kurdish-controlled
    territory, while insurgents storm the Turkish Embassy and take 48 Turks hostage,
    including the Consul General. (Al Jazeera)'
  Al-Qaeda insurgency in Yemen:
  - The entire country of Yemen remains without electricity for a second day after
    insurgents sabotaged power lines linking the capital Sana'a and the contested
    Ma'rib Governorate. (Al Jazeera)
  Libyan Civil War (2014–present):
  - Forces loyal to General Khalifa Haftar conduct at least three separate airstrikes
    on Ansar al-Sharia militia bases in Benghazi. (Al Jazeera)
  2014 pro-Russian conflict in Ukraine:
  - Russian media reports that the self proclaimed "people's mayor" Vyacheslav Ponomarev
    is arrested by a militant wing of a rebel group led by former GRU officer Igor
    Girkin in Slovyansk. (New York Times)
  Business and economy:
  - The European Commission announces that they will begin a formal investigation
    into Apple, Starbucks and Fiat in relation to tax arrangements with Ireland, the
    Netherlands and Luxembourg. (BBC News)
  Sinking of the MV Sewol:
  - Thousands of South Korean police raid a religious compound in search of Yoo Byung-eun,
    a fugitive billionaire wanted over the sinking of the Sewol. (BBC News)
  Law and crime:
  - The news aggregator app Feedly is struck by massive DDoS attacks, with the perpetrator
    attempting to extort money from the company to make the cyber-attacks stop. (BBC
    News)
  - Spree killer Mattias Flink is released from prison on the 20th Anniversary of
    his crimes. (Sveriges Radio)
  Egyptian Revolution of 2011:
  - Activist Alaa Abdel-Fattah and 24 others are sentenced in absentia to 15 years
    in jail in relation to a protest last November. (Ahram)
  Politics and elections:
  - Following an unexpected primary loss to Dave Brat, United States House Representative
    Eric Cantor announces his intent to step down from his office as House Majority
    Leader. (ABC News)
