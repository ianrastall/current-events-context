Date: '2014-06-09'
Source_URI: Portal:Current events/2014 June 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Brazilian riot police use tear gas to disperse protesters in São Paulo amid rising
    tensions between protestors and the government over the cost of the World Cup.
    (BBC News)
  - Taliban insurgency in Afghanistan
  2014 Jinnah International Airport attack:
  - Karachi's Jinnah International Airport will resume services after yesterday's
    attack which claimed 21 lives. (Sky News Australia)
  - The Tehrik-i-Taliban Pakistan claims responsibility for the attack. (Wall Street
    Journal)
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide truck bomber detonates his vehicle at the gate of a Patriotic Union
    of Kurdistan office in Tuz Khormato, Iraq, a second truck bomb detonated as people
    were gathering around the first one. Over 15 are killed and at least 110 injured.
    (AP via ABC)
  Syrian civil war:
  - The Syrian government declares a general amnesty for all citizens. (AP via Vancouver
    Sun)
  - Five NATO International Security Assistance Force troops are killed in fighting.
    (BBC News)
  Arts and culture:
  - Six Cuban National Ballet dancers arrive in the American city of Miami after defecting
    on tour. (NBC Miami)
  Business and economics:
  - Merck & Co. agrees to buy Idenix Pharmaceuticals for US$3.85 billion. (Market
    Watch)
  - American multinational food corporation Tyson Foods agrees to buy Hillshire Brands
    for US$7.7 billion. (Bloomberg)
  International relations:
  - Russian President Vladimir Putin's personal envoy warns Finland against joining
    NATO. (Barents Observer)
  Law and crime:
  - Vietnamese banking tycoon Nguyen Duc Kien is sentenced to 30 years in prison in
    Vietnam on charges of tax evasion, violating state economic regulations, fraud,
    and running an illegal business. (Xinhua)
  - A Russian court in Moscow sentences five men to prison for the 2006 assassination
    of journalist Anna Politkovskaya. (New York Times)
  Sport:
  - 2014 FIFA World Cup
  - A construction worker dies building a monorail extension to Congonhas-São Paulo
    Airport, one of several World Cup projects that have fallen well behind schedule.
    (Sky News)
  Basketball:
  - In a reversal of recent reports, banned Los Angeles Clippers owner Donald Sterling
    withdraws his approval for the sale of the team to Steve Ballmer, and will pursue
    a US$1 billion lawsuit in federal court against the NBA and league commissioner
    Adam Silver. (ESPN)
