Date: '2014-06-29'
Source_URI: Portal:Current events/2014 June 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamist insurgency in Nigeria
  - Islamist extremists torch four churches near the town of Chibok and fire on worshippers
    killing at least 30. (Associated Press vis CTV), (Bloomberg via Business Week)
  - 2014 Northern Iraq offensive
  - The Islamic State of Iraq and the Levant is renamed The Islamic State, with a
    caliphate being proclaimed and Abu Bakr al-Baghdadi being named caliph. (The Independent)
  - 2014 pro-Russian conflict in Ukraine
  - Pro-Russian separatists release another group of Organization for Security and
    Cooperation in Europe monitors seized on May 29. (Reuters via Hürriyet)
  Disasters:
  - Floods in Paraguay force the evacuation of 200,000 people. (BBC News)
  International relations:
  - Hong Kong Immigration Department denied entry and deported a Taiwanese rights
    activist intending to support the Occupy Central campaign, which has gathered
    almost 800,000 votes in an unofficial poll on electoral reform. (AFP via Yahoo!)
    (Focus Taiwan)
  Law and crime:
  - A shooting at Bourbon Street in New Orleans, Louisiana, U.S. injures nine people.
    (CNN)
  - A shooting and stabbing kills one person and wounds five others at a BET party
    held in Hollywood, Los Angeles, California, U.S. (AP via San Francisco Chronicle)
  Politics and elections:
  - Turkish president Abdullah Gül states that he will not run for a second term in
    the upcoming presidential elections in August, paving the way for prime minister
    Recep Tayyip Erdoğan to run as AKP's candidate instead. (Hürriyet)
