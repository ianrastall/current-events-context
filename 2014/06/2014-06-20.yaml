Date: '2014-06-20'
Source_URI: Portal:Current events/2014 June 20
Intelligence_Payload:
  Syrian civil war:
  - Twelve people including nine children are killed when a Syrian army helicopter
    strikes a refugees camp south of Damascus. (Middle East Eye)
  2014 Northern Iraq offensive:
  - US sends 300 military advisers to Iraq as battle rages in Baiji over the country's
    biggest oil refinery. (Reuters)
  2014 Bulgarian floods:
  - At least 11 people are killed and an unknown number missing after torrential rains
    cause flash flooding in northeastern Bulgaria. (ABC News) (Reuters)
  Law and crime:
  - Philippine Senator Bong Revilla surrenders to the Sandiganbayan after the court
    issued a warrant for his arrest in relation to the PDAF scam. (GMANews)
  2014 Minya court rulings:
  - A court in Egypt confirms the death sentences of over 180 Islamists, including
    Mohamed Badie, the top leader of the Muslim Brotherhood. (ABC News)
  Politics and elections:
  - Italy's Five Star Movement joins the eurosceptic political group Europe of Freedom
    and Democracy in the European Parliament, a group otherwise dominated by the United
    Kingdom Independence Party. (EUobserver)
  Sport:
  - In basketball, David Blatt, who coached Maccabi Tel Aviv to the Euroleague title
    this past season, has reportedly reached a deal to become the new head coach of
    the Cleveland Cavaliers. Blatt is the first Euroleague coach to become an NBA
    head coach. (ESPN)
