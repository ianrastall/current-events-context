Date: '2014-06-06'
Source_URI: Portal:Current events/2014 June 6
Intelligence_Payload:
  Armed conflict and attacks:
  - Ashiqullah Mehsud, a senior commander in the Tehrik-i-Taliban Pakistan, is shot
    and killed by unknown assailants, speculated to be from the Mehsud splinter group,
    in the village of Urmuz in the North Waziristan region of Pakistan. (CNN)
  War in Afghanistan (2001–2021):
  - Abdullah Abdullah of the National Coalition of Afghanistan, a frontrunner in the
    Afghan presidential election, survives a bombing attempt. (BBC News)
  2014 pro-Russian conflict in Ukraine:
  - Russian President Vladimir Putin and Ukrainian President-elect Petro Poroshenko
    call for a quick and peaceful end to the violence in eastern Ukraine. (BBC News)
  Iraqi insurgency (post-U.S. withdrawal):
  - Attacks across Iraq kill 27 people. (AP via Daily Mail)
  Arts and culture:
  - World leaders travel to Normandy in France to commemorate the 70th anniversary
    of D-Day, the first day of the Western Allies Invasion of Normandy during World
    War II. (Washington Post)
  - Nun turned singer Cristina Scuccia wins the seventh season of The Voice of Italy.
    (NY Daily news)
  Business and economy:
  - Vodafone reveals that the governments of six countries have a permanent link to
    monitor communications throughout Vodafone's networks. (BBC News)
  Disasters and accidents:
  - At least twelve people are killed as storms batter South China. (Xinhua)
  - At least three people are dead and 13 others are injured after an explosion at
    a coal-fired power station, Kosovo A Power Station, in Obilić, six miles outside
    Pristina, the capital of Kosovo. (BBC News)
  Health:
  - The World Health Organisation estimates that an outbreak of the ebola virus has
    killed more than 200 people in West Africa. (ABC News Australia)
  International relations:
  - North Korea announces that it arrested an American tourist last month for alleged
    inappropriate behaviour. (BBC News)
  - Chinese authorities advise that they will deport Australian artist Guo Jian arrested
    before the 25th anniversary of the Tiananmen Square protests. (BBC News)
  Law:
  - Moncton shooting
  - Canadian police arrest Justin Bourque, wanted for the alleged murders of three
    Royal Canadian Mounted Police officers and for shooting two others in Moncton,
    New Brunswick. (CNN)
  - Japan's parliament moves to ban the possession of child pornography. (CNN)
  - Brazilian prosecutors are investigating allegations that organs are being illegally
    taken from unidentified bodies and sold for medical research. (BBC News)
