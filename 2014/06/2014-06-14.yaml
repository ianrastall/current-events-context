Date: '2014-06-14'
Source_URI: Portal:Current events/2014 June 14
Intelligence_Payload:
  Armed conflict and attacks:
  - 2014 pro-Russian conflict in Ukraine
  - A Ukraine military Ilyushin Il-76 airlifter is shot down, killing all 49 people
    on board. (CNN)
  - Syrian Civil War
  - A bomb explodes in the town of al-Mayadin in Deir al-Zor province near the Iraqi
    border killing eight. (Reuters)
  Politics:
  - Alexander Stubb is elected new leader of the National Coalition Party and thus
    the new prime minister of Finland, the first Swedish-speaking Finn to hold the
    post since 1959. (Hufvudstadsbladet)
  - 2014 Afghan presidential election
  - Voters in Afghanistan go to the polls for the second round of voting with the
    Taliban threatening polling booths. Dozens of people are killed across the country.
    (al-Jazeera), (USA Today)
