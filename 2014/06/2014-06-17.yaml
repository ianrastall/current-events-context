Date: '2014-06-17'
Source_URI: Portal:Current events/2014 June 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - North Korean propaganda videos show that they have developed a cruise missile
    similar to the Russian Kh-35 model. (BBC News)
  - South Thailand insurgency
  - Emergency rule in the southern Thai provinces of Pattani, Yala and Narithiwat
    is extended for another three months. (Bangkok Post)
  - Al-Shabaab militants attack Poromoko village in Kenya, killing 15 people and burning
    multiple houses down. (Reuters)
  - 275 United States Military personnel are deployed to Iraq to provide extra protection
    for the American embassy in Baghdad. (Sky News)
  - Aftermath of the 2012 Benghazi attack
  - United States special operations forces, in coordination with the FBI, captured
    Ahmed Abu Khattala, one of the suspected leaders of the Benghazi attack, on the
    weekend of June 14 to June 15, 2014, in a covert mission in Libya. (Washington
    Post)
  - War in North-West Pakistan
  - At least 25 militants are killed as the Pakistan Air Force strikes terrorist hideouts
    in North Waziristan. (IANS via Biharprabha)
  - Islamist insurgency in Nigeria
  - A suicide bomber detonates a tricycle taxi filled with explosives at an outdoor
    viewing venue for the 2014 FIFA World Cup in Damaturu, Nigeria, resulting in several
    deaths and 15 people critically injured. (AP)
  Disasters and accidents:
  - A tornado hits southern Ontario, Canada causing extensive damage in the corridor
    from Angus to Barrie. (Météo Média)
  - Several other intense tornadoes touch down in Montana and northeast Nebraska.
  - South African wild fires kill seven people, five in Kokstad in KwaZulu-Natal and
    two in the Abaqulusi Local Municipality, as well as destroying thousands of hectares
    of forest and grazing land. (SABC)
  Science:
  - The President of the United States, Barack Obama, proposes to expand the Pacific
    Remote Islands Marine National Monument, creating the world's largest marine sanctuary
    in the Central Pacific Ocean. (Washington Post)
