Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Northern Iraq offensive
  - Islamic State of Iraq and the Levant captures the towns of al-Qa'im, Anah and
    Rawa in Western Iraq. (Al Jazeera)
  - A South Korean soldier fatally shoots five comrades at an outpost in Gangwon Province
    before fleeing with a weapon. (BBC News)
  Law and crime:
  - Belarusian human rights' activist Ales Bialiatski is freed from prison and is
    received by his wife and supporters in Minsk. (Radio Free Europe/Radio Liberty)
