Date: '2014-06-28'
Source_URI: Portal:Current events/2014 June 28
Intelligence_Payload:
  Armed conflict and attacks:
  - War in North-West Pakistan
  - At least 19 militants have been killed in a Pakistan Army offensive in North Waziristan.
    (CNN)
  - 2014 Northern Iraq offensive
  - The Iraqi Army expels militants from the centre of the city of Tikrit amongst
    heavy fighting. (New York Times)
  - Islamist rebels including members of the Al-Qaeda affiliated Nusra Front challenge
    Islamic State in Iraq and the Levant's control of the town of Albu Kamal on the
    Syrian border on Saturday. (Reuters)
  - Islamist insurgency in Nigeria
  - A blast in a brothel in the northeastern city of Bauchi kills at least 11 people
    and injures 28. (Reuters via Daily Times)
  - Post-coup unrest in Egypt
  - A homemade bomb placed in a government construction site in 6th of October City
    exploded, killing a girl and wounding her mother. (The Times of Israel)
  - 'Sinai insurgency: Egyptian special forces tracked down and arrested a terrorist
    cell consisting of 15 militants who belong to the Islamic State in Iraq and the
    Levant. (Jerusalem Post)'
  Arts and culture:
  - The Bosnian city of Sarajevo commemorates the 100th anniversary of the assassination
    of Archduke Franz Ferdinand of Austria that led to World War I. (Reuters)
  Disasters and accidents:
  - At least five people have been killed in an explosion at the world's largest ship
    breaking yard at Alang in Indian state of Gujarat.(IANS via Biharprabha)
  - A dilapidated building collapses in the Indian capital New Delhi with eleven people
    killed and one injured. (AP via CTV)
  - A building under construction in the Indian city of Chennai collapses, with at
    least one death and dozens trapped. (AP via WOKO TV)
  2014 Wang-Zhang Meeting:
  - China's top cross-strait negotiator for Taiwan, on a landmark visit, cancels three
    public appearances at the last minute after protests against his bridge-building
    trip turned violent; protesters earlier splashed white paint and threw ghost money
    at the negotiator's motorcade while shouting slogans such as "Taiwan, China, one
    country on each side". (Wall Street Journal)
  Law and crime:
  - Libyan Islamist militia leader Ahmed Abu Khattala pleads not guilty in a Washington
    D.C. court to one charge of conspiracy in relation to the 2012 Benghazi attack
    in which four Americans were killed. (Washington Post)
  - Two British thirteen-year-olds are arrested for desecrating graves in a Jewish
    cemetery in Manchester, England, causing over £100,000 in damage. Nazi slogans
    and swastikas were drawn on some gravestones, and about forty were toppled over.
    (Jerusalem Post)
