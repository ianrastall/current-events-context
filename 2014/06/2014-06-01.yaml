Date: '2014-06-01'
Source_URI: Portal:Current events/2014 June 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamist insurgency in Nigeria
  - A bombing at a football match in the town on Mubi in northeastern Nigeria kills
    at least 40 people. (AFP via GlobalPost)
  - Two Italian priests and a Canadian nun kidnapped by suspected Boko Haram gunmen
    have been released. (CBC)
  Business and economics:
  - Stocks in Egypt fall sharply with the EGX30 losing 4.2% and the EGX100 losing
    5% after the government proposed a new 10% capital gains tax. (AP via ABC News)
  Disasters and accidents:
  - A Mil Mi-8 helicopter crashes near Munozero () in northern Russia's Murmansk Oblast
    with nineteen people onboard with two confirmed survivors and the fate of the
    other passengers unclear. (ITAR-TASS)
  Law and crime:
  - A Muslim Frenchman with connections to Syrian jihadists is arrested for murdering
    four Jewish people in the Jewish Museum of Belgium shooting. (Times of Israel)
  - A teenager is arrested at Heathrow Airport in England in relation to suspected
    involvement in Syrian-related terrorism. (Daily Express)
  Politics and elections:
  - 2014 Thai coup d'état
  - The Royal Thai Armed Forces deploy against major protests planned for today but
    a small protest goes ahead outside a shopping mall in central Bangkok. (AP)
  - Telangana officially becomes the 29th state of India. (Hindustan Times)
  - Former Farabundo Martí National Liberation Front guerilla leader Salvador Sánchez
    Cerén is sworn in as the President of El Salvador. (AP via CTV)
  Sports:
  - In cycling, Colombian rider Nairo Quintana wins the 2014 Giro d'Italia, with compatriot
    Rigoberto Urán coming second and Italian Fabio Aru coming third. Colombia completed
    a successful stage with rider Julián Arredondo winning the mountains classification.
    (Gazetta)
