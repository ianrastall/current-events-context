Date: '2014-06-13'
Source_URI: Portal:Current events/2014 June 13
Intelligence_Payload:
  Armed conflict and attacks:
  - 2014 pro-Russian conflict in Ukraine
  - Arsen Avakov, Ukraine's Minister of the Interior, claims that Ukrainian forces
    have recaptured the port of Mariupol. (Reuters)
  Business and economics:
  - Priceline.com agrees to purchase OpenTable for US$2.6 billion. (The New York Times)
  - Amaya Gaming Group agrees to purchase PokerStars for US$4.9 billion. (Forbes Magazine)
  - General Motors recalls 511,528 Chevrolet Camaros over fears that drivers could
    bump the key out of the "run" position, turning off the car. (Toronto Star)
  Disasters and accidents:
  - A high speed ferry in Macau hits a breakwater, injuring 58 people. (AP via Fox
    News)
  Law and crime:
  - Romanian hacker Guccifer is indicted in absentia in a federal court in the U.S.
    state of Virginia for hacking into the e-mails of American government officials
    and family members. (The Telegraph)
  Politics and elections:
  - Park Geun-hye, the President of South Korea, reshuffles her cabinet by replacing
    seven members after a fall in public support following the sinking of the MV Sewol
    in April. (Voice of America)
  - Giorgio Orsoni, the mayor of Venice, Italy, resigns over corruption allegations
    related to the MOSE Project. (Reuters)
  - The Thai military junta announces that it is lifting the nationwide curfew. (AP
    via ABC)
  Sports:
  - The Los Angeles Kings defeat the New York Rangers in five games to win the 2014
    Stanley Cup Finals. (NHL), (CBC)
