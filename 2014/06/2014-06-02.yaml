Date: '2014-06-02'
Source_URI: Portal:Current events/2014 June 2
Intelligence_Payload:
  Armed conflict and attacks:
  - 2014 pro-Russian conflict in Ukraine
  - A large skirmish occurs in eastern Ukraine when pro-Russian separatists launch
    a massive attack on a border control centre near the city of Luhansk; five militants
    are killed and another eight are wounded, and seven Ukrainian border guards are
    wounded in the clash. (BBC News)
  - Indian police fire water cannons to disperse hundreds of protesters, angry over
    the gang-rape and hanging of two teenage girls in Uttar Pradesh, demonstrating
    outside the office of Chief Minister Akhilesh Yadav. (BBC News)
  Disasters and accidents:
  - At least 16 people are killed and 58 injured when a bus carrying Indian pilgrims
    fell into Madi River in Pyuthan district of Nepal. (IANS via Biharprabha)
  - A massive sandstorm and record winds hit Iran's capital Tehran, causing power
    blackouts there and killing at least four people. (AAP via SBS)
  Law and crime:
  - Four people are arrested in Paris and southern France on suspicion of recruiting
    militants to fight in Syria. (BBC News)
  - President Obama is accused of breaking the National Defense Authorization Act
    for Fiscal Year 2013 by not notifying the US Congress about the release of prisoners
    from Guantanamo Bay detention camp in the deal to release Bowe Bergdahl. (Daily
    Mail)
  Politics and elections:
  - Mahmoud Abbas, the President of the State of Palestine, announces a unity cabinet
    containing members of both Fatah and Hamas. (Reuters via Newsits)
  - King Juan Carlos I of Spain announces that he is to abdicate with Felipe, Prince
    of Asturias, to succeed him. (RTÉ)
  - The United States Environmental Protection Agency issues new regulations aiming
    to cut carbon emissions in the US power sector by 30 percent from 2005 levels
    by 2030. (Washington Post, Reuters via Sydney Morning Herald) (US Environmental
    Protection Agency)
