Date: '2014-06-12'
Source_URI: Portal:Current events/2014 June 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (post-U.S. withdrawal)
  - The United Nations Security Council meets to discuss the rapid progress of an
    Islamic State of Iraq and the Levant offensive towards Baghdad. (SBS)
  - Iraqi Kurds take over control of the city of Kirkuk as the army flees. (BBC News)
  - The Parliament of Iraq postpones a vote on Prime Minister Nouri Maliki's call
    for a state of emergency due to a lack of quorum. (BBC News)
  - War in North-West Pakistan
  - At least 10 militants are killed in a suspected United States drone attack in
    North Waziristan. (NBC News)
  - 2014 pro-Russian conflict in Ukraine
  - Ukraine's Interior Minister Arsen Avakov claims that three Russian tanks crossed
    into eastern Ukraine and were attacked by the Ukrainian Army. (Belfast Telegraph)
  - Three Israeli teenagers were kidnapped by Palestinian militants. The Israel Defense
    Forces and Shin-Bet deployed large forces through the West Bank in order to find
    and rescue them. (Jerusalem Post)
  Arts and culture:
  - For his exploration of Colombia's drug trade Juan Gabriel Vásquez wins the prestigious
    €100,000 International Dublin Literary Award, the first South American to win
    the prize. (Independent)
  Business and economics:
  - Tesla Motors announces it will allow competitors to use its patents without paying
    royalties. (CNBC)
  Disasters:
  - At least six people are killed and 29 injured in a methane gas leak at the Bhilai
    Steel Plant in Bhilai, Chhattisgarh, India. (NDTV)
  Politics and elections:
  - 'Ontario general election, 2014: The Liberal Party of Ontario wins a majority
    government; Kathleen Wynne will remain the Premier of the province. (CBC News)'
  - Antigua and Barbuda general election, 2014
  - Voters in Antigua and Barbuda went to the polls with the Opposition Antigua Labour
    Party led by Gaston Browne winning a 15 of 17 seats. (Near Shore America)
  Sports:
  - 2014 FIFA World Cup
  - The opening ceremony for the FIFA World Cup is held, followed by the first game
    in Group A between Brazil and Croatia in Arena de São Paulo with Brazil winning
    3-1. (AP)
