Date: '2014-06-25'
Source_URI: Portal:Current events/2014 June 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 Northern Iraq offensive
  - The Prime Minister of Iraq Nouri al-Maliki calls for national unity as a Islamic
    State in Iraq and the Levant reaches Yathrib 87 kilometres (54 miles) north of
    Baghdad. (Washington Post)
  - Nigerian police say that 21 people have been killed in an explosion at a crowded
    Banex Plaza shopping center in Abuja's Wuse 2 district. (Voice of America)
  Post-coup unrest in Egypt:
  - Homemade bombs explode in four metro stations and a court house in Greater Cairo,
    injuring eight people. (Reuters)
  Business and economy:
  - South African platinum miners return to work after a five month strike ends. (Reuters)
  Disasters:
  - Four people are killed in a train accident in Bihar, India. (The Times of India)
  International relations:
  - The People's Republic of China sends its first minister-level official to Taiwan
    to build ties with the self-governing island amid trade suspicions. (AP via Wichita
    Eagle) (BBC News)
  - The United States has added several LeT-affiliated organizations including Jama'at-ud-Dawa
    to its list of foreign terror organisations.(IANS via Biharprabha)
  Algeria–Egypt relations:
  - Egypt's president Abdel Fattah el-Sisi makes his first official visit abroad to
    Algeria where security was top of the agenda. (Voice of America)
  - Algeria agreed to ship five cargoes of liquefied natural gas to Egypt before the
    end of the year. (Reuters)
  Politics and elections:
  - Both houses of the Romanian parliament widely adopt a joint statement urging Romania's
    president Traian Băsescu to resign, following corruption scandals involving his
    arrested brother's graft case and one of his sons-in-law's implication in a criminal
    investigation. (Europeonline-magazine)
