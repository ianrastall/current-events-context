Date: '2014-06-19'
Source_URI: Portal:Current events/2014 June 19
Intelligence_Payload:
  Arts and culture:
  - Prince Felipe, the eldest son of King Juan Carlos I and formerly Prince of Asturias,
    ascends the Spanish throne as King Felipe VI. (The Guardian)
  Law and crime:
  - Romanian President Traian Băsescu denies any implication in his brother's graft
    case in which he is charged with receiving 250,000 euros in order to facilitate
    the release of a well-known incarcerated mobster. Hours after the president's
    press conference, his brother, Mircea, was arrested for 24h. (Reuters)
  - The U.S. Supreme Court cuts back sharply on the range of patentable software,
    in a case involving business methods. (Alice Corp v. CLS Bank)
  Politics and elections:
  - The Ukraine Parliament confirms all government candidates, including that of foreign
    minister, appointed the previous day by President Petro Poroshenko. (Kyiv Post)
