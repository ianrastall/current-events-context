Date: '2014-06-27'
Source_URI: Portal:Current events/2014 June 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - The San Antonio-class amphibious transport dock USS New York, currently home to
    the recently captured Ahmed Abu Khattala, goes dark under the order of the brevity
    code "River City". (Washington Post)
  - 2014 Northern Iraq offensive
  - American human rights group Human Rights Watch claims that Islamic State of Iraq
    and the Levant executed at least 160 captives earlier this month in Tikrit. (AP
    via Fox News)
  Arts and culture:
  - Prince Carl Philip, third-in-line to the Swedish throne, announces that he and
    former men's magazine model Sofia Hellqvist will marry in the summer of 2015.
    (The Local)
  Disasters:
  - At least fourteen people are killed when a Gas Authority of India Limited pipeline
    explodes in the East Godavari district of Andhra Pradesh, India. (BBC News)
  International relations:
  - 2014 pro-Russian conflict in Ukraine
  - Pro-Russian separatists agree to release four of eight Organization for Security
    and Co-operation in Europe observers held hostage since April. (Reuters via Yahoo!
    News)
  - Amidst staunch opposition from UK Prime Minister David Cameron's ministry, the
    European Council nominates Jean-Claude Juncker, former Prime Minister of Luxembourg,
    to be President of the European Commission. (The Telegraph)
  - A Mexican military chopper flies into the United States and mistakenly shoots
    at border guards as part of a drug interdiction operation. Mexican authorities
    apologize for the incident. (RT)
  Ukraine–European Union Association Agreement:
  - The European Union signs pacts with Ukraine, Georgia and Moldova in a move strongly
    opposed by Russia. (BBC News)
  Science and technology:
  - Scientists identify a new species of elephant shrew, named Macroscelides micus.
    (LA Times)
