Date: '2014-06-23'
Source_URI: Portal:Current events/2014 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014 pro-Russian conflict in Ukraine
  War in North-West Pakistan:
  - Pakistani forces conduct airstrikes on terrorist hideouts in North Waziristan,
    killing 25 militants. (Business Standard)
  Arab–Israeli conflict:
  - Israeli Air Force planes carry out a series of air strikes in Syria following
    an attack on Sunday that caused the death of an Israeli teenager. (AP)
  Syrian Civil War:
  - Syria hands over its remaining 100 tonnes of its declared chemical weapons to
    the United Nations Organisation for the Prohibition of Chemical Weapons but the
    organisation cannot declare that the country no longer has any such weapons. (Reuters)
  Islamist insurgency in Nigeria:
  - An explosion at a public health school in the city of Kano in northern Nigeria
    kills at least 12 people. (BBC News)
  Somali Civil War (2009–present):
  - Kenyan Air Force planes attack the al-Qaeda-linked al-Shabab killing 80 of its
    fighters according to the African Union force in Somalia. (BBC News)
  - Pro-Russian insurgents agree to a ceasefire proposed by the Government of Ukraine.
    (AP via San Francisco Chronicle)
  Arts and culture:
  - Denmark proper (not counting Greenland) gets its first natural UNESCO World Heritage
    Sites, in addition to its three cultural sites, as Stevns Klint and the Danish
    parts of the Wadden Sea are inscribed on the UNESCO list. (UNESCO)
  - A painting in Claude Monet's Water Lilies series is sold at auction in London
    for £31.7 million or $54 million US, the second highest price for a Monet on record.
    (AFP via Bangkok Post)
  Business and economy:
  - Oracle Corporation buys MICROS Systems in a $5.3 billion deal. (Reuters)
  Disasters:
  - A Eurofighter Typhoon and a Learjet collide in mid-air over Olsberg, Germany.
    The Learjet crashes, killing both crew. The Eurofighter Typhoon lands safely.
    (Aviation Safety Network)
  Law and crime:
  - The People's Republic of China arrests 300 people in the first month in a crackdown
    on alleged terrorists. (AFP via iAfrica)
  - An Egyptian court sentences three al-Jazeera journalists Peter Greste, Mohammed
    Fahmy and Baher Mohamed, accused of supporting the Muslim Brotherhood, to seven
    years in jail. (BBC News)
  Politics and elections:
  - Mauritanian President Mohamed Ould Abdel Aziz is elected to a second term with
    over 80% of the vote. (Reuters)
  - The sole representative of the leading Irish opposition party Fianna Fáil in the
    European Parliament leaves the liberal ALDE group and joins the moderately Eurosceptic
    ECR group without his party's consent. (EUobserver) (RTÉ)
