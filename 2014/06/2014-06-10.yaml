Date: '2014-06-10'
Source_URI: Portal:Current events/2014 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - The Pakistan Air Force conducts bombing raids against Tehrik-i-Taliban Pakistan
    positions in the Tirah region killing at least 15 militants in response to the
    Jinnah International Airport attack in Karachi. (BBC News)
  - Gunmen attack a training facility near the Jinnah International Airport. (AP)
  - Gunmen in Kenya's port city of Mombasa kill Mohamed Idris, chairman of the Council
    of Imams and Preachers of Kenya, who opposed the radical preachings of Somalia’s
    Al-Qaeda-linked Al-Shabaab insurgents. (Yahoo! News)
  - Iraqi insurgency (post-U.S. withdrawal)
  - Militants stage an overnight attack in Mosul, Iraq, taking control of the city
    while police and military flee. (Washington Post)
  - Five American soldiers, an Afghan soldier, and an interpreter in the Zabul province
    of Afghanistan are killed when a NATO air strike accidentally targeted them. (BBC
    News)
  Disasters and accidents:
  - Violent storms in western Germany with high winds and flooding kill six people.
    (Daily Mail)
  - US Olympic swimming gold medal winner Amy Van Dyken severs her spine in a severe
    ATV accident. (BBC News)
  Politics and elections:
  - Israeli lawmakers choose Reuven Rivlin to be the next President of Israel. (AP
    via Chronicle)
  - United States House Majority Leader Eric Cantor is defeated by newcomer Tea Party-backed
    candidate Dave Brat in a Virginia congressional primary election. (Washington
    Post)
