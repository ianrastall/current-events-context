Date: '2014-06-07'
Source_URI: Portal:Current events/2014 June 7
Intelligence_Payload:
  Armed conflict and attacks:
  - At least 37 people are killed in an attack in the Democratic Republic of the Congo's
    South Kivu province. (Sky News)
  Iraqi insurgency (post-U.S. withdrawal):
  - Islamic State of Iraq and the Levant gunmen storm the campus of the University
    of Anbar, killing three guards and holding dozens of students hostage before withdrawing.
    (Sky News) (AP)
  - The dead bodies of 21 policemen who were kidnapped a day before by militants are
    recovered in Mosul, Iraq. (IANS via Biharprabha)
  - At least 52 people are dead following a series of bombings in Baghdad. (AP via
    Business Week)
  Disasters and accidents:
  - Flash flooding in Afghanistan's Baghlan province kills at least 65 people and
    forces thousands of people to relocate. (BBC News)
  - Actor/comedian Tracy Morgan is taken to ICU at Robert Wood Johnson University
    Hospital following a six-vehicle chain-reaction crash on the New Jersey Turnpike
    that killed friend & fellow comedian James McNair. (CNN)
  Law and crime:
  - Ten supporters of former President of Egypt Mohammed Morsi's Muslim Brotherhood
    movement are sentenced to death in absentia for allegedly inciting violence and
    blocking a road last July. (AP via New Zealand Herald)
  - Altaf Hussain, the exiled founder of the Muttahida Qaumi Movement in Pakistan,
    is released in London on money laundering charges. (ABC Australia and AFP)
  - Dennis Marx of the sovereign citizen movement opened fire with an assault rifle
    outside a Georgia courthouse Friday in an attempt to take hostages, wounded a
    deputy before he was killed in a shootout with officers.(Fox News)
  Politics and elections:
  - Petro Poroshenko is sworn in as the President of Ukraine as the Pro-Russian separatist
    conflict continues. (NDTV) (BBC News)
  - Binyamin Ben-Eliezer of the Israeli Labor Party withdraws from the presidential
    election on 10 June as a result of a graft probe. (AP via Washington Post)
  - UK Education Secretary Michael Gove apologises to Prime Minister David Cameron
    over a row with Home Secretary Theresa May about how to tackle Islamic extremism
    following recent revelations about a Muslim plot to take over schools in Birmingham.
    (BBC News)
  Sports:
  - In tennis, Maria Sharapova of Russia wins her second title in the French Open
    women's singles defeating Simona Halep of Romania 6-4, 6-7, 6-4. (The Telegraph)
  - In hurling, Kilkenny and Offaly meet at Nowlan Park in the opening round of the
    Leinster Championship, the first time a Championship fixture is broadcast live
    to a UK-wide audience on Sky Sports. (The Irish Times) (The Banter)
  Horse racing:
  - Australia wins the Derby Stakes. Trainer Aidan O'Brien becomes the first trainer
    to win the Derby for three successive years. (BBC)
  - Tonalist, ridden by Joel Rosario, wins the 2014 Belmont Stakes, denying California
    Chrome the United States Triple Crown of Thoroughbred Racing. (TheWrap)
