Date: '2014-06-05'
Source_URI: Portal:Current events/2014 June 5
Intelligence_Payload:
  Armed attacks and conflicts:
  - An attack on a Yemeni military checkpoint by suspected al-Qaeda militants in Shabwah
    Governorate, Yemen, leaves 14 people dead. (BBC News)
  Islamist insurgency in Nigeria:
  - Suspected Boko Haram militants launch an attack in a village near the north-eastern
    Nigerian city of Maiduguri, killing approximately 45 people. (BBC News)
  Business and economy:
  - The European Central Bank cuts the prime interest rate to 0.15% and sets the deposit
    rate at -0.10% in an attempt to devalue the euro and boost the stagnant Eurozone
    economy. (New York Times)
  Disasters and accidents:
  - An AV-8B Harrier jet crashes in the U.S. city of Imperial, California, resulting
    in the destruction of three homes. (BBC News)
  Health and environment:
  - A study published in The New England Journal of Medicine links MERS to several
    infected camels. (BBC News)
  Law and crime:
  - The People's Republic of China claims to have arrested 29 people following recent
    terrorist attacks in the Xinjiang region. (AP via ABC)
  - Pakistani police arrest multiple people involved in the stoning of Farzana Parveen,
    bringing the total number of people in custody to 12. (CNN)
  - Moncton shooting
  - Four people are shot with one dead and three injured during a shooting on the
    campus of Seattle Pacific University. (CNN) (Washington Post)
  - American hip hop band the Beastie Boys win a $1.7 million copyright violation
    suit against the makers of Monster Energy drink for unauthorised use of their
    music in advertising. (AP via The Australian)
  Tuam mass grave:
  - An Irish archbishop claims the Catholic Church has no records on the burial of
    796 children in a disused concrete septic tank at a building it runs in Tuam.
    (BBC News) (CNN) (The Guardian)
  - Royal Canadian Mounted Police extend a national manhunt for a 24-year-old gunman
    who killed three police officers and wounded two others in a shootout in Moncton.
    (Reuters)
