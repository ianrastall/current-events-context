Date: '2014-02-10'
Source_URI: Portal:Current events/2014 February 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - A car bomb detonates prematurely in Baghdad, Iraq, killing 21 militants. In a
    separate event, a car bomb hits a convoy transporting Usama al-Nujayfi with a
    bodyguard being wounded. (AFP)
  War in Afghanistan (2001–2021):
  - A car bomb detonates in Kabul, Afghanistan, killing two contractors working with
    ISAF. (AP via CBS)
  Disasters and accidents:
  - At least 50 people are killed in flooding and landslides in Bujumbura, Burundi.
    (BBC News)
  North Korea-United States relations:
  - North Korea withdraws an invitation to a United States envoy to discuss the release
    of Kenneth Bae. (AP via USA Today)
  India-United States relations:
  - The United States files a complaint with the World Trade Organization, accusing
    Indian laws of discriminating against US solar panel manufacturers. (Reuters)
  Law and crime:
  - The Garda Síochána Ombudsman Commission (GSOC), Ireland's police Ombudsman, is
    revealed to have been bugged, with emails, wi-fi and phone systems at its Dublin
    headquarters also accessed illegally and internationally. (The Journal) (Mirror)
  Politics and elections:
  - A presidential panel in Yemen agrees to transform the country into a federation
    of six regions. (Al Jazeera)
