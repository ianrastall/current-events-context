Date: '2014-02-02'
Source_URI: Portal:Current events/2014 February 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three explosions are reported in the Yemeni capital Sanaa along with heavy gunfire.
    (Reuters via Daily Star)
  Arts and Culture:
  - American actor Philip Seymour Hoffman, who won the Academy Award for Best Actor
    at the 78th Academy Awards in 2006 for Capote, is found dead in his Manhattan
    apartment at the age of 46. Authorities initially attributed the death to a drug
    overdose. (NY Post)
  Thai general election, 2014:
  - Voters in Thailand go to the polls with concerns about violence between supporters
    of rival parties. (ABC News Australia)
  Costa Rican general election, 2014:
  - Voters in Costa Rica go to the polls for a general election. (TicoTimes)
  Salvadoran presidential election, 2014:
  - Voters in El Salvador go to the polls with a tight race expected. (Los Angeles
    Times)
  Super Bowl XLVIII:
  - In American football, the Seattle Seahawks defeat the Denver Broncos with a final
    score of 43–8 at MetLife Stadium in East Rutherford, New Jersey. (Reuters) (Los
    Angeles Times)
  - Bruno Mars and the Red Hot Chili Peppers perform for the halftime show. (Agence
    France Press)
