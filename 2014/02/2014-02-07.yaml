Date: '2014-02-07'
Source_URI: Portal:Current events/2014 February 7
Intelligence_Payload:
  Syrian Civil War:
  - Civilians are evacuated from a rebel-held area of the Syrian city of Homs after
    more than 18 months under a government blockade. (The Washington Post)
  Arts and culture:
  - The last speaker of the Native American language Klallam dies in the U.S. state
    of Washington. (Reuters)
  Business and economy:
  - Coca-Cola buys a ten percent stake in Green Mountain Coffee Roasters for US$1.25
    billion. (Daily Mail)
  International relations:
  - Russia's Foreign Ministry calls new US sanctions against Iran a "direct violation
    of the Geneva deal" and "unacceptable". (RIA Novosti)
  Law and crime:
  - Australian Schapelle Corby is granted parole (along with 1,290 others) in Indonesia
    after serving nine years in a Bali prison for drug smuggling. (Sydney Morning
    Herald) (The Eastern Tribune)
  - U.S. Chief Justice John Roberts announces he appointed Judge Richard C. Tallman
    of the Ninth Circuit to the United States Foreign Intelligence Surveillance Court
    of Review for a six-year term beginning January 27, 2014, filling the vacancy
    that had existed since August, and Judge James E. Boasberg of the United States
    District Court for the District of Columbia to replace Reggie Walton in the United
    States Foreign Intelligence Surveillance Court for a six-year term in May. (Reuters
    via Chicago Tribune)
  Politics:
  - After days of rioting in Bosnia, the Presidency Building in Sarajevo is attacked.
    (Al Jazeera)
  Sports:
  - 2014 FIFA World Cup
  2014 Winter Olympics:
  - The opening ceremony is held in the Russian city of Sochi. (BBC Sport)
  - A man attempts to hijack a Pegasus Airlines flight from Kharkiv, Ukraine, and
    demands to be flown to Sochi; the pilots turned off the inflight monitors and
    landed in Istanbul, Turkey, where the passenger was arrested. (New York Times)
    (Telegraph) (CNN)
  - A construction worker dies, in Brazil, while at work for the FIFA World Cup 2014
    arena building to be held in the country. (Mirror)
