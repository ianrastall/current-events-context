Date: '2014-02-15'
Source_URI: Portal:Current events/2014 February 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - A mass grave of Christians is discovered in a neighborhood in Bangui, Central
    African Republic, formerly occupied by the Muslim Seleka rebels. (Reuters)
  Syrian Civil War:
  - Talks in Geneva end without an agreement. (The Washington Post)
  Arts and culture:
  - Academy Award-nominated actress Ellen Page comes out as lesbian at a Human Rights
    Campaign conference. (CNN)
  - Prime Minister of Vietnam Nguyễn Tấn Dũng initiates the construction of Tân Vũ-Lạch
    Huyện Bridge in Haiphong which will become the longest sea bridge in Vietnam as
    well as Southeast Asia. (The Wall Street Journal)
  Business and economy:
  - A North Korean cargo ship is allowed to leave the Panama Canal. (ABC News)
  Disasters and accidents:
  - A portion of the The National Archives of the United Kingdom burns down. (BBC
    News)
  - Rescuers are searching for seven missing Japanese divers in Bali. (The Guardian)
  Winter storms of 2013–14 in the United Kingdom:
  - A man is killed after a monster wave strikes the Marco Polo cruise ship in the
    English Channel. (The Independent)
  - A minicab driver is killed in London when her car is crushed by falling masonry.
    (BBC News)
  - Prime Minister David Cameron warns the floods may get worse because of the recent
    excessive amount of rainfall that has saturated the ground. (Belfast Telegraph)
  Law and crime:
  - A U.S. federal judge overturns a ban on same-sex marriage in Virginia. (The New
    York Times)
  Politics and elections:
  - A new government is formed in Lebanon after 10-months of gridlock, Tammam Salam
    is elected to be Prime Minister. (Reuters)
  - Judicial reforms are passed in the Turkish parliament after 20 hours and a brawl
    in the chamber. (BBC News)
  Sports:
  - French pole vaulter Renaud Lavillenie breaks Sergey Bubka's 21-year-old record
    with a 6.16 metres leap in Donetsk. (BBC Sport)
