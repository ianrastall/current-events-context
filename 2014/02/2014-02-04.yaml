Date: '2014-02-04'
Source_URI: Portal:Current events/2014 February 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - A police officer and seven Islamist militants are killed in a gunfight in Tunis,
    Tunisia. (Reuters)
  Arts and culture:
  - Archaeologists working near the ancient settlement of Edfu in southern Egypt discover
    the remains of a 4,600-year-old step pyramid. (LiveScience via Fox News)
  Business and economy:
  - The software company Microsoft internally promotes Satya Nadella to be its next
    CEO and appoints John W. Thompson as its chairman. (Fox Business)
  Disasters and accidents:
  - At least 10 people are dead and 35 injured when a bus falls into a ditch while
    travelling between the Indian cities of Pune and Satara. (NDTV)
  Law and crime:
  - The Scottish Parliament votes overwhelmingly (105–18) in favor of a bill legalizing
    same-sex marriage in Scotland. (BBC News)
  - The New York City Police Department questions four suspected heroin dealers in
    connection with Philip Seymour Hoffman's death. (Fox News)
  - Sixteen missing children are rescued from Super Bowl-associated sex-trade slavery
    in an FBI sting. (Fox News)
  Politics and elections:
  - United States House of Representatives member Rob Andrews announces that he will
    retire at the end of his current term. (Politico)
  - Michael McFaul, the United States Ambassador to Russia, announces that he is stepping
    down from the job after two years. (The Guardian)
