Date: '2014-02-06'
Source_URI: Portal:Current events/2014 February 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Seven car bombings across Baghdad, Iraq, kill at least 13 people. (Reuters)
  - Palestinian militants in the Gaza Strip fire rockets towards Hof Ashkelon region
    in southern Israel; the rockets are intercepted by Israel's Iron Dome defense
    system. (The Times of Israel)
  - Fighting between Syrian rebels and government forces rages around the Aleppo Central
    Prison in the war-torn city of Aleppo, but it is unclear whether rebels control
    all or part of the facility. (CNN)
  Arts and culture:
  - Jay Leno finally says farewell for the second time to The Tonight Show with guests
    such as Oprah Winfrey, Kim Kardashian and Jim Parsons. (Los Angeles Times)
  Business and economy:
  - Sony says it will sell its PC unit and split its TV division into a separate subsidiary
    as part of its restructuring programme. (BBC News)
  Disasters and accidents:
  - The English Environment Agency issues two severe flood warnings where there is
    a "danger to life" for Somerset in South West England. (BBC News)
  - Rescue workers recover eight bodies from a South African gold mine in Doornkop
    following a fire on Tuesday night. One worker is missing while another eight were
    rescued. (BBC News)
  International relations:
  - Chinese media criticizes Philippine President Benigno Aquino III for his remarks
    the previous day. (CNN)
  - In an Olympic first, UN Secretary-General Ban Ki-moon today addresses the IOC
    Session in advance of the Olympic Winter Games in Sochi. (OLYMPIC.ORG)
  Science:
  - A possible new species of giant jellyfish is discovered, washed up on a beach
    in Australia. (BBC News)
