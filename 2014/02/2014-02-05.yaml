Date: '2014-02-05'
Source_URI: Portal:Current events/2014 February 5
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - A wave of bombings hits central Baghdad with at least 16 people dead. (AP via
    Los Angeles Times)
  Post-civil war violence in Libya:
  - At least 12 people are injured in a grenade attack on a school in Benghazi. (BBC
    News)
  Arts and culture:
  - Archaeologists decrypt the jötunvillur runic code found on 13th century tablets.
    (Sciencenordic)
  Business and economy:
  - Workers on the London Underground commence a 48-hour strike, which is expected
    to cause disruption for millions of commuters in Greater London. (BBC News)
  Disasters and accidents:
  - Part of the South Devon Railway sea wall carrying the railway line linking London
    with the west of England is washed away by a powerful storm that has hit the UK
    overnight. Thousands of homes are also left without electricity. (BBC News)
  - UK Prime Minister David Cameron announces that an extra £100 million will be spent
    on dealing with the aftermath of the floods that have hit the UK. (Belfast Telegraph)
  International relations:
  - North Korea and South Korea hold meetings to discuss visitation reunions of families
    separated by the Korean War. (BBC News)
  Spratly Islands dispute:
  - Philippine President Benigno Aquino III compares China's territory claims in the
    South China Sea to Nazi Germany's invasion of Czechoslovakia. (Telegraph) (The
    New York Times)
  Sports:
  - 2014 Winter Olympics
  - Amidst concerns over the safety of the slopestyle course, Shaun White withdraws
    from the event. (CNN)
