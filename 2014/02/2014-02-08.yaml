Date: '2014-02-08'
Source_URI: Portal:Current events/2014 February 8
Intelligence_Payload:
  Business and economy:
  - McDonald's opens their first restaurant within Vietnam in Ho Chi Minh City. (BBC
    News)
  Disasters and accidents:
  - A rockslide strikes and derails a passing train near Annot, Alpes-de-Haute-Provence,
    France, causing two deaths. (BBC News)
  - A hotel fire in Medina, Saudi Arabia kills fifteen Egyptian pilgrims with 130
    also injured. (Reuters)
  - A massive fire engulfs a warehouse holding 5,600 tons of rubber tires in Savannah,
    Georgia, United States. (AP via Seattle Post-Intelligencer)
  - A truck and a bus collide in the Argentine province of Mendoza, killing at least
    17 people and injuring more than 10 others. (EFE via Fox News)
  - Large snowstorms kill six people and injure over 600 in Japan. (Australia Network)
  - Large areas of England and Wales are under flood warnings as another storm arrives.
    The Somerset Levels are the worst affected area. (news.com.au)
  - Rail links to South West England are cut off by the storms. (BBC News)
  Law and crime:
  - Princess Cristina de Borbón of Spain addresses allegations of money laundering
    and tax evasion at Palma de Mallorca courthouse. (The Guardian)
  Politics and elections:
  - The British Minister of State for Immigration Mark Harper resigns after it is
    discovered that a cleaner that he employed was not legally allowed to work in
    the United Kingdom. (Daily Mail)
  - Hamdeen Sabahi announces his candidacy for the upcoming Egyptian presidential
    elections. (Los Angeles Times)
  2014 Winter Olympics:
  - Norwegian athlete Ole Einar Bjørndalen ties with compatriot Bjorn Daehlie for
    a record 12 medals in the Winter Olympics by winning a gold medal in the men's
    biathlon sprint. (ABC News Australia)
