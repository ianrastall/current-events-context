Date: '2014-02-09'
Source_URI: Portal:Current events/2014 February 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A gunman kills two people at a Russian Orthodox cathedral in Yuzhno-Sakhalinsk,
    Sakhalin. (BBC News)
  - Gunmen attack an Islamic religious gathering in Karachi, Pakistan, killing eight
    people. (AP via Fox News)
  - Central African Republic conflict
  Balochistan conflict:
  - An exchange of gunfire on the border between the Pakistani states of Sindh and
    Balochistan kills at least nine people. (The Express Tribune)
  Syrian Civil War:
  - Hundreds of civilians are evacuated from Homs, Syria, as a tense truce between
    rebel and government forces is maintained. (AP via ABC)
  - Human Rights Watch says that the entire Muslim population of the country may end
    up leaving in the next days or weeks. (BBC News)
  Arts and culture:
  - A 50th anniversary concert is to be held in celebration of the British Invasion
    of The Beatles. (Time)
  - The Federal government recognizes same-sex marriage in the United States in all
    legal matters as Eric Holder compares it to the Civil Rights Movement. (CNN)
  - Woody Allen responds to allegations that he molested his daughter. (The New York
    Times)
  - Marius the giraffe is culled and fed to the lions causing worldwide protests from
    environmental activists. (CNN)
  Disasters and accidents:
  - A car crash on the Pomona Freeway in Los Angeles, California, kills six people.
    (Arizona Daily Star)
  - A car crash on I-275 in the Tampa Bay Area of Florida kills five people. (Tampa
    Bay Times)
  2013–14 Australian bushfire season:
  - Authorities issue emergency warnings for numerous parts of the state of Victoria
    as conditions are the worst recorded since Black Saturday bushfires on February
    7, 2009. (Sydney Morning Herald)
  - Authorities report that several homes are destroyed in northeast Melbourne including
    the suburb of Warrandyte. (Melbourne Age)
  International relations:
  - Iran agrees to a United Nations plan to address suspicions that they are working
    on designing an atomic weapon. (Reuters)
  Iran-United States relations:
  - Iranian officials say that two Iranian Navy warships will be travelling very close
    to the United States' maritime border in the Atlantic Ocean. (AP via USA Today)
  Law and crime:
  - British immigration minister Mark Harper resigns after he reveals that he had
    employed an undocumented worker. (The New York Times)
  2012 Dhaka fire:
  - The owners of Tazreen Fashions, Delwar Hossain and his wife Mahmuda Akter, hand
    themselves in to face charges of murder in relation to the death of 112 workers
    in a factory fire in Dhaka, Bangladesh, in November 2012. (The Globe and Mail)
  Politics and elections:
  - Swiss referendums, 2014
  Tokyo gubernatorial election, 2014:
  - Voters in the Japanese capital of Tokyo elect Yoichi Masuzoe to replace former
    Governor Naoki Inose, who resigned on December 24, 2013. (Yomiuri Shimbun)
  - 50.3% of voters vote in favor of the federal popular initiative "against mass
    immigration", to re-introduce quotas of immigrants for foreigners. (The Guardian)
  Science and technology:
  - Scientists at the Australian National University discover the universe's oldest
    known star SMSS J031300.36-670839.3 estimated to be about 13.6 billion-years-old.
    (NineMSN) (International Business Times)
  - Research from the Science Translational Medicine suggest that Vitamin C may be
    useful in aiding chemotherapy against cancer. (BBC News)
  Sport:
  - Head coach Mo Cheeks is fired by the Detroit Pistons after a disappointing 21-29
    start to the season. (Fox Sports)
