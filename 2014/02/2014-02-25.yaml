Date: '2014-02-25'
Source_URI: Portal:Current events/2014 February 25
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - Boko Haram Islamists kill 59 students in an attack on the Federal Government College
    in the town of Buni Yadi in Yobe State. (Reuters) (Sky News)
  Arts and culture:
  - Over 1,400 gold coins from the mid-19th century that were buried in eight cans
    are discovered by an anonymous couple while walking their dog in Gold Country,
    California. The find dubbed the Saddle Ridge Hoard is expected to be worth over
    $10 million dollars (USD) and is the largest known hoard of gold coins ever found
    in the United States. (USA Today)
  2013 Asiana Airlines accident:
  - Asiana Airlines is fined US$500,000 for failing to promptly assist families of
    passengers aboard the flight. (Associated Press)
  2014 Ukrainian revolution:
  - The United States administration formally declares that it no longer recognizes
    Viktor Yanukovych as Ukraine’s president as "his actions have undermined his legitimacy".
    (Guardian)
  Law and crime:
  - A court in the UK rules that a man arrested in connection with the 1982 Hyde Park
    and Regent's Park bombings will not be prosecuted for his involvement. (Sky News)
  Politics and elections:
  - The Parliament of Ukraine removes the five-pointed red star from its spire in
    a measure aimed at erasing the nation’s Soviet legacy. (RIA Novosty)
  - Russia's leading opposition activists Boris Nemtsov, Alexei Navalny, Ilya Yashin
    are jailed for 7-10 days for disobeying a police officer while protesting against
    the Bolotnaya square case. The previous day, in Moscow police detained over 400
    people, including Nadezhda Tolokonnikova and Maria Alyokhina. (RAPSI) (RFE/RL)
    (The Moscow Times) (Euronews)
  Science and technology:
  - China's National Meteorological Center of CMA warns of heavy smog in northern
    and central China over the next two days. (Xinhua)
