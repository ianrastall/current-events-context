Date: '2014-02-18'
Source_URI: Portal:Current events/2014 February 18
Intelligence_Payload:
  2013–14 Thai political crisis:
  - Protesters and police clash after a crackdown ordered by Prime Minister Yingluck
    Shinawatra with one policeman shot dead and dozens wounded. (BBC News) (Sydney
    Morning Herald)
  Euromaidan:
  - Violent clashes between police forces and opposition demonstrators reignite in
    Kyiv, Ukraine. The death toll rises to 14, six of them policemen who were shot
    dead during the confrontation. (CNN) (BBC News) (Reuters)
  Arts and culture:
  - A US$1 million vase made by Chinese dissident Ai Wei Wei is destroyed in Miami
    by a local vandal protesting the lack of exhibits promoting local art. (The New
    York Times)
  Law and crime:
  - The Supreme Court of the Philippines declares the libel provisions in the Cybercrime
    Prevention Act of 2012 as legal. (Inquirer) (GMA News)
  - Former Australian parliamentarian Craig Thomson is found guilty of theft and fraud
    during his time as national secretary of the Health Services Union. (Sydney Morning
    Herald) (The Australian)
  - French police arrest a man in relation to a killing of a British family in the
    French Alps. (BBC News)
  - Former United States congressman Melvin Jay Reynolds is arrested in Zimbabwe for
    possession of pornography. (Fox News)
  Politics and elections:
  - Justice Kenneth Hayne of the High Court of Australia voids the Senate election
    in the state of Western Australia due to the loss of ballot papers in a very close
    election. (Yahoo! News)
