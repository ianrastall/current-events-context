Date: '2014-02-20'
Source_URI: Portal:Current events/2014 February 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - A shooter opens fire inside a Native American tribal office in Alturas, California,
    United States, killing four and wounding two. (CNN)
  Euromaidan:
  - A shaky truce is broken with police and protesters renewing clashes on Kyiv's
    Maidan Nezalezhnosti, with scores of deaths reported. (Kiev Post) (Associated
    Press)
  - The mayor of Kyiv, Volodymyr Makeyenko, announces he is stepping down from his
    post and leaving the Ukraine's ruling party Party of Regions. (RIA Novosty)
  - The European Union imposes sanctions against Ukraine including asset freezes and
    visa bans. (BBC News)
  Sinai insurgency:
  - Egyptian security officials say army helicopter gunships have rocketed several
    houses where militants were thought to have gathered in the northern region of
    the Sinai Peninsula, killing at least 10. (Montreal Gazette)
  Law and crime:
  - Mexican authorities arrest Jesús Peña (alias "El 20"), the leader of Los Ántrax,
    an armed squadron of the Sinaloa Cartel. Peña was part of Ismael "El Mayo" Zambada's
    inner circle and the successor of El Chino Ántrax. (Azteca Noticias)
  - Louie Sanchez and Marvin Norwood are sentenced to eight years in prison for the
    2011 beating of Bryan Stow. (NBC)
  Politics and elections:
  - Utah and Colorado have announced that they plan to increase the smoking age to
    21. (Denver Post)
  Australian federal election, 2013:
  - The High Court of Australia rules that the Senate election in the state of Western
    Australia was void, meaning that a half-Senate election will be held in that state.
    (The Australian)
  Sports:
  - Alpine skier Bogdana Matsotska of the Ukraine olympic team decides to pull out
    of the Winter Games in Sochi, as widespread anti-government protests back home
    leave dozens dead and hundreds injured. (BBC Sport)
