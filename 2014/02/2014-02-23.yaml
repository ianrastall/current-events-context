Date: '2014-02-23'
Source_URI: Portal:Current events/2014 February 23
Intelligence_Payload:
  Ukrainian Revolution of 2014:
  - Former Ukrainian President Viktor Yanukovych is blocked by Ukraine's customs in
    Donetsk from taking a plane to Russia. (Moscow Times)
  2013–14 Thai political crisis:
  - At least two people have been killed and 41 injured in an attack on an opposition
    rally in the Khao Saming District in Trat Province. (Reuters)
  Taliban insurgency:
  - The Taliban attack an Afghan Armed Forces base in Kunar province, killing 19 soldiers
    and kidnapping seven. (Reuters)
  Syrian Civil War:
  - Seven people are killed and 50 wounded in a car bombing near a field hospital
    in northern Syria, close to the border with Turkey. (BBC News)
  Politics and elections:
  - Estonian Prime Minister Andrus Ansip announces that he will be leaving office
    before scheduled parliamentary elections in 2015. (Deutsche Welle)
  Sport:
  - In NASCAR, Dale Earnhardt, Jr. eventually wins the Daytona 500, ending a 55-race
    winless streak in the Sprint Cup Series, after the race is red flagged for several
    hours due to heavy rain, while a tornado warning is put into effect for the area.
    (Fox News)
  2014 Winter Olympics:
  - The Winter Olympics in Sochi, Russia officially concludes. (Sydney Morning Herald)
