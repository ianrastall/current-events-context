Date: '2014-02-21'
Source_URI: Portal:Current events/2014 February 21
Intelligence_Payload:
  Euromaidan:
  - The Ukrainian government and opposition agree to form a unity government and to
    hold early elections. (The Telegraph)
  2014 Venezuelan protests:
  - Twenty-two-year-old Venezuelan beauty queen Génesis Carmona is shot in the head
    and killed while participating in a student protest against Nicolás Maduro's socialist
    government. (The New York Times)
  Arts and culture:
  - Venezuelan president Nicolás Maduro threatens to expel CNN from the country, alleging
    that they are helping the opposition. (BBC News)
  - Books related to Anne Frank are vandalized across public libraries in Tokyo, Japan.
    (The New York Times)
  Business and economy:
  - G Asset Investment, a private investment management firm, reports that it has
    offered to buy a majority of the equity of Barnes & Noble or to buy its digital
    books business, Nook. (Reuters)
  Disasters and accidents:
  - Eleven people are killed when a Libyan Air Force plane crashes from a suspected
    engine fire in Nabeul Governorate, Tunisia. (CNN)
  Chinese-U.S. relations:
  - The President of the United States, Barack Obama, meets with the Dalai Lama despite
    warnings from China to cancel the meeting. (BBC News)
  Law and crime:
  - Sudan puts a married Ethiopian woman on trial after being gang-raped because she
    waited before she reported it. She faces the death penalty for adultery. (The
    Daily Mail)
  Science and technology:
  - A linguists professor from the University of Bedfordshire manages to decipher
    10 of the words in the enigmatic Voynich manuscript. (BBC News)
  Sport:
  - Aogan O' Fearghail is elected as the 38th President of the GAA, and the first
    from Cavan in the organisation's 130-year history. (The Score) (BBC Sport)
