Date: '2017-07-28'
Source_URI: Portal:Current events/2017 July 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Hamburg attack
  - One person is killed and four others are injured in a knife attack in an Edeka
    supermarket in Barmbek in the German city of Hamburg. Mayor Olaf Scholz said the
    attack was motivated by "hate". The attacker is reported to have shouted "Allahu
    Akbar" before attacking. (BBC)
  Business and economy:
  - U.S. Appeals Court Judge Patricia Millett rejects the Federal Aviation Administration
    argument that seat size is unimportant when passengers exit a plane in an emergency,
    and orders the FAA to set minimum standards for the space airlines give passengers.
    (Reuters) (Bloomberg)
  Disasters and accidents:
  - 2017 Barcelona train crash
  - A passenger train crashes into a buffer stop at Barcelona França railway station,
    injuring 54 people, five seriously. (BBC)
  Health and medicine:
  - Charlie Gard case
  - Charlie Gard, an infant with a rare genetic condition known as mitochondrial DNA
    depletion syndrome, dies at the age of 11 months. (BBC) (Sky News)
  International relations:
  - North Korea and weapons of mass destruction
  - 2017 North Korean missile tests
  - North Korea launches an intercontinental ballistic missile that flies 620 miles
    horizontally in about 45 minutes, landing in the Sea of Japan, according to Japan,
    South Korea and the United States. (ABC News) (Reuters)
  - Iran–United States relations
  - The United States Treasury Department imposes sanctions on six Shahid Hemmat Industrial
    Group satellite companies following a recent Iranian rocket launch that the U.S.
    says breached United Nations Security Council Resolution 2231. (Reuters) (CNN)
  Politics and elections:
  - 2017 Patient Protection and Affordable Care Act replacement proposals
  - The American Health Care Act of 2017, an attempt to repeal the Patient Protection
    and Affordable Care Act, fails passage in the United States Senate. (Reuters)
  - Politics of Pakistan
  - The Prime Minister of Pakistan, Nawaz Sharif resigns after the Supreme Court disqualifies
    him from holding public office following a verdict that he had been dishonest
    in not disclosing his employment in the Dubai-based Capital FZE company in his
    nomination papers. (Dawn (Pakistan)) (BBC)
  - Political appointments by Donald Trump
  - U.S. President Donald Trump announces Homeland Security Secretary John F. Kelly
    will be White House Chief of Staff, replacing Reince Priebus. (ABC News) (Twitter)
    (The New York Times)
