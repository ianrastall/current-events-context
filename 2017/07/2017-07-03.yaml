Date: '2017-07-03'
Source_URI: Portal:Current events/2017 July 3
Intelligence_Payload:
  Armed attacks and conflicts:
  - Battle of Mosul
  - Three female ISIL suicide bombers kill 15 people and injure five in three separate
    incidents over the last two days as the fight for Mosul winds down. (AP via CBS
    News)
  - At least one person is killed and six others are injured in a shooting in the
    French city of Toulouse. (News Corp Australia)
  Business and economy:
  - Total, CNPC and NIOC sign an investment of $5 billion in South Pars, the world
    largest gas field. (Reuters)
  Disasters and accidents:
  - 2017 China floods
  - Floods in South China kill at least 15 people over the last few days with tens
    of thousands more being relocated. More rain is forecast in future days. (Reuters)
  - Eighteen people are dead after a bus collides with a truck in the German state
    of Bavaria. (BBC)
  - Ten people are injured when a taxi jumps a curb and hit a group of cabdrivers
    outside the taxi pool building at Logan International Airport in Boston, Massachusetts.
    (Reuters) (The Boston Globe)
  - A rescue helicopter crashes while attempting to evacuate residents near the Dieng
    Volcanic Complex in Central Java, Indonesia, killing all eight people on board.
    (The Guardian)
  International relations:
  - China–India relations, Bhutan–China relations
  - Amid growing tensions between China and India and Bhutan over the Doklam tri-junction,
    a spokesman on behalf of Bhutan via India Today urges India and China to "de-escalate
    the situation at the border and bring back normalcy". India and China have been
    locked in a military stand-off at the Doklam tri-junction since late June. (India
    Today)
  - Greek–Turkish relations
  - The Greek Coast Guard opens fire on a Turkish-flagged cargo vessel in the Aegean
    Sea. (Reuters) (Sputnik International)
  Politics and elections:
  - Politics of New Jersey
  - Governor Chris Christie is caught sunbathing with his family on a beach he had
    ordered closed for the fourth of July holiday. The beach was closed to the public
    amid a state budget crisis. (Boston Globe via MSN) (Washington Post) (New Jersey
    Department of Environmental Protection)
