Date: '2017-07-01'
Source_URI: Portal:Current events/2017 July 1
Intelligence_Payload:
  Arts and culture:
  - Death and funeral of Helmut Kohl
  - World leaders such as Bill Clinton, Emmanuel Macron, Theresa May, Dmitry Medvedev
    and Angela Merkel attend the memorial service for the former West German leader
    Helmut Kohl. (Fox News) (The Independent)
  - Modena Park 2017
  - Italian rock singer Vasco Rossi broke the world record of biggest ticketed concert
    with 220,000 paying guests hosted at Enzo Ferrari Park in Modena, Italy. (Previous
    record belonged to a-Ha with 198,000 paying guests, set in 1991 in Rio de Janeiro,
    Brazil) (Venues Today)
  Business and economy:
  - Freedom of speech in the Philippines
  - President of the Philippines Rodrigo Duterte threatens the Philippine Daily Inquirer
    with an exposé. The newspaper has been a long-time ally of the politically prominent
    Aquino family (ever since the 1986 EDSA People Power Revolution), as well as the
    minority opposition Liberal Party (of which the Vice President of the Philippines
    Leni Robredo is its prominent member); both have been consistent in their criticisms
    of the Duterty presidency and its policies since its inauguration in 2016. (Rappler)
  - Taxation in India
  - India replaces its federal and state taxes with the Goods and Services Tax (GST),
    the most extensive tax reform since its independence. (BBC)
  Health and medicine:
  - Marawi crisis
  - More than 400,000 people displaced by the conflict are affected by disease outbreaks
    and psychological trauma. (Rappler)
  International relations:
  - Bhutan–China relations, China–India relations
  - Amid growing tensions between China and India and Bhutan, China releases a map
    detailing pieces of land claimed by Bhutan and India as belonging to China. China
    claims, via the map, that territory up until Gipmochi belongs to China and claims
    it's supported by the 1890 Convention of Calcutta. (India Today)
  Law and crime:
  - Law of Singapore
  - Singapore implements a new law that bans foreigners from taking part in protests.
    (The Hindustan Times)
  - Little Rock nightclub shooting
  - Arguments that lead to an exchange of gunfire at a concert at the Power Ultra
    Lounge in Little Rock, Arkansas, result in at least 28 people injured, one hospitalized
    in stable condition. (news.com.au)
  Politics and elections:
  - Canada Day
  - Canada celebrates the sesquicentennial (150-year) anniversary of the Canadian
    Confederation. (Canada.ca)
  - Politics of Hong Kong
  - Carrie Lam is sworn in as the first female Chief Executive of Hong Kong by Chinese
    Communist Party general secretary Xi Jinping amid protests against the 20th anniversary
    of the transfer of sovereignty to China. (The Telegraph)
  - Presidency of Donald Trump
  - Numerous U.S. states, including California, Mississippi, Kentucky and New York,
    reject requests for voter registration data from President Donald Trump's voter
    fraud commission. (The Washington Post)
  - Politics of New Jersey
  - Amid a budget crisis, Governor Chris Christie shuts down the state government
    of New Jersey. (CNN)
  - Politics of Vatican City
  - Pope Francis ousts conservative cardinal Gerhard Ludwig Müller. (The New York
    Times)
  - Philip Greaves is sworn in as acting Governor-General of Barbados following the
    retirement of Sir Elliott Belgrave. (Barbados Today)
  Sport:
  - Celebrities make a pilgrimage to Argentina for the wedding of soccer superstar
    Lionel Messi. (People)
  - 2017 British and Irish Lions tour to New Zealand
  - In rugby union, the British and Irish Lions defeat the All Blacks 24–21 in the
    second test match. (The Guardian)
