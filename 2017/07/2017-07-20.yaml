Date: '2017-07-20'
Source_URI: Portal:Current events/2017 July 20
Intelligence_Payload:
  Armed attacks and conflicts:
  - Syrian Civil War
  - Syrian rebels, who have benefited from the "covert" CIA military aid program,
    say they have not been officially informed of the U.S. decision to stop this aid,
    and add that its full impact depends on whether U.S. allies Jordan, Saudi Arabia,
    Qatar, and Turkey continue to support their fight. A Free Syrian Army commander
    warns this decision risks triggering the collapse of the moderate opposition.
    (Reuters)
  Arts and culture:
  - Linkin Park
  - Chester Bennington, lead vocalist of Linkin Park, dies at his home in the Los
    Angeles suburb of Palos Verdes Estates, California. His death is ruled a suicide
    by hanging. (CNN)
  International relations:
  - Philippine Drug War
  - A hearing in the U.S. Senate is held about alleged human rights violations in
    the Philippines's war against illegal drugs. (Rappler)
  - 2017 electronics ban
  - Citing improved airport security, U.S. officials lift the ban on electronics on
    certain flights to some Middle Eastern countries. (CBS News)
  - FIRST Robotics Competition
  - Six teenagers, four males and two females, from a Burundi robotics team are reported
    missing after competing in the FIRST Global Robotics Competition in Washington,
    D.C. A 16-year-old boy and a 17-year old girl reportedly crossed the United States
    border into Canada. There is no indication of foul play. (Reuters)
  Law and crime:
  - O. J. Simpson robbery case
  - O. J. Simpson is granted parole by the Nevada Board of Parole Commissioners after
    spending nearly nine years in prison. (The Washington Post)
  Politics and elections:
  - 2017 Indian presidential election
  - Ram Nath Kovind has won the Indian presidential election after securing over two-thirds
    of the total electoral college votes. (The Hindu)
  - Liberal Democrats leadership election, 2017
  - Vince Cable is acclaimed as Leader of the Liberal Democrats in the United Kingdom
    after running unopposed. (BBC)
  - Cabinet of Beata Szydło
  - Thousands of Poles continue to protest against the bill concerning the Supreme
    Court. (Politico)
  Science and technology:
  - Hyperloop
  - SpaceX CEO Elon Musk says he has received federal government approval for The
    Boring Company to build an underground 760mph Hyperloop that will connect New
    York City and Washington, D.C.. (The Independent)
