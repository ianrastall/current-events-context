Date: '2017-07-17'
Source_URI: Portal:Current events/2017 July 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro conflict
  - A new set of kidnappings and a jail break plague Sulu province in the southern
    region of Mindanao in the Philippines. (The Japan Times)
  - War in Afghanistan (2001–2021)
  - Officials announce that Afghan security forces have retaken Nawa District from
    the Taliban. (Reuters)
  - Syrian Civil War
  - The Syrian army seizes oil wells in south-west Raqqa Governorate from ISIL. (Sky
    News Australia)
  - Sinai insurgency
  - A two stage attack targeting police kills 5 officers and wounds 11 in the city
    of el-Arish. A later roadside bomb south of the city wounds a further 6 officers.
    (ABC News)
  Disasters and accidents:
  - Aftermath of Malaysia Airlines Flight 17
  - In Vijfhuizen, the Netherlands, exactly three years after the Malaysia Airlines
    Flight 17 (MH17) disaster, the National Memorial for the victims is opened in
    the presence of King Willem-Alexander, Queen Máxima and Prime Minister Mark Rutte.
    (NOS)
  International relations:
  - Foreign trade of the United States
  - Robert Lighthizer sends a document to U.S. lawmakers outlining the Trump administration's
    priorities for renegotiating NAFTA, including lower trade deficits and efforts
    to deter currency manipulation. (Reuters)
  - European Union–Libya relations
  - The European Union restricts the exports of inflatable boats to Libya. (Al Jazeera)
  - Joint Comprehensive Plan of Action
  - The White House tells U.S. Congress that Iran is complying with its nuclear deal,
    and promises to impose new sanctions on Iran's ballistic missile program. (ABC
    News)
  Politics:
  - Martial law in the Philippines
  - President of the Philippines Rodrigo Duterte plans to appeal to the Congress of
    the Philippines to extend Proclamation No. 216 (martial law on the whole of Mindanao,
    which will end on 22 July 10 p.m. PST) until the end of 2017, due to constitutional
    constraints as well as the ongoing Marawi crisis. (The New York Times) (Yahoo!
    News).
