Date: '2017-07-29'
Source_URI: Portal:Current events/2017 July 29
Intelligence_Payload:
  Disasters and accidents:
  - South African Premier Division
  - Two people die and 17 others are injured in a stampede at the First National Bank
    Stadium in Soweto, near Johannesburg, South Africa, during a soccer match between
    Orlando Pirates and Kaizer Chiefs. (Mail and Guardian) (BBC)
  - A fire forces the evacuation of more than 22,000 concertgoers at the Tomorrowland
    music festival at the Parc de Can Zam in Barcelona, Spain. There were no serious
    injuries. This is the first time the festival has been held in Spain; Belgium
    had been the home since 2005. (USA Today) (NBC News)
  International relations:
  - Poland in the European Union
  - The European Union's executive branch sends a formal notice to Poland expressing
    their concern that the new "discretionary" powers given to the country's justice
    minister threaten the independence of the courts in violation of EU laws. Poland
    has a month to respond. (AP via ABC News) (Reuters)
  Law and crime:
  - 2017 Islamic inspired bomb plot on Australian aeroplane
  - Australian federal police conduct raids in four separate suburbs of Sydney, detaining
    individuals and confiscating materials involved in a suspected terrorist plot
    to bomb an aircraft. (The Guardian)
  - Catholic Church sexual abuse cases
  - Monsignor Arnel Lagarejos, a Catholic priest from the Roman Catholic Diocese of
    Antipolo, Philippines was arrested in Marikina for sexually abusing a 13-year-old
    girl, by inviting her to a motel with a 16-year-old pimp. (Philippine Daily Inquirer)
  Politics and elections:
  - Kenyan general election, 2017
  - A man wielding a machete attacks the home of Kenya's Deputy President William
    Ruto, injuring one guard, 10 days before national elections. Ruto and his family
    were not home at the time. The assailant fled to a farm complex, reportedly hiding
    in an unfinished building. There are other media reports that gunmen also struck
    the home. (AP via The Washington Post) (Reuters)
  Science and technology:
  - The Charles Kuonen Bridge in the Swiss Alps in Randa, Switzerland, opens. At 1,621
    feet (494 meters), it is the longest pedestrian suspension bridge in the world.
    (CNN) (Condé Nast Traveler)
