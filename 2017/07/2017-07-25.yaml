Date: '2017-07-25'
Source_URI: Portal:Current events/2017 July 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - 2017 Temple Mount crisis
  - The Israeli government says it will remove metal detectors and some cameras recently
    installed at the entrances to the Temple Mount in Jerusalem that resulted in a
    wave of protests and some deaths. Instead, less obtrusive surveillance means will
    be used. (The New York Times) (Haaretz) (Reuters)
  - War in Donbass
  - Kurt Volker, U.S. special representative for Ukraine, says in a BBC News interview
    that the White House is considering arming Ukrainian government forces fighting
    Pro-Russian militants with defensive weapons. (BBC)
  Business and economy:
  - Microsoft Paint
  - Amid a public backlash, Microsoft reneges on its decision to end its Paint program
    and states that it will be placed on its app store rather than bundled with future
    editions of Windows. (The Independent)
  - Adobe Flash
  - Adobe Systems announces it will stop updating and distributing its multimedia
    software platform Flash by the end of 2020. (Reuters) (CNN)
  - Jimmy Choo Ltd
  - Michael Kors buys Jimmy Choo for US$1.2 billion. (The New York Times)
  - Alternative fuel vehicles
  - Following a similar move in France, the United Kingdom is to ban the sale of petrol
    and diesel cars by 2040 in order to reduce air pollution. A new tax will also
    be levied on diesel car drivers in 2020. (Sky News)
  Disasters and accidents:
  - 2017 heat wave in Europe
  - Firefighters battle wildfires across southern France, including one in Corsica.
    (France 24)
  - Pope Francis halts the fountains of The Vatican amidst a drought in Italy. (CBS
    News)
  Health and medicine:
  - Chronic traumatic encephalopathy
  - A study, published in the Journal of the American Medical Association, finds that
    99 percent of the brains donated for scientific research by deceased National
    Football League players show signs of chronic traumatic encephalopathy (CTE),
    the disease identified in autopsies of numerous NFL players who have committed
    suicide, and the subject of the 2015 movie Concussion. (Reuters) (CNN) (JAMA)
  International relations:
  - Jordan–United States relations
  - Jordanian authorities release a video of a Jordanian Air Force sergeant shooting
    United States soldiers. (The New York Times)
  - Iran–United States relations
  - The United States Navy says the USS Thunderbolt fired a warning shot at an Iranian
    patrol boat after it came within 150 yards of the U.S. ship. (ABC News)
  - United States embargoes
  - The U.S. House of Representatives votes in favor of economic sanctions against
    Russia for its interference in the 2016 U.S. election, and against Iran and North
    Korea for their weapons programs. (The Washington Post)
  Politics and elections:
  - Efforts to repeal Obamacare
  - The U.S. Senate votes to open debate on repealing and possibly replacing Obamacare.
    (NBC News)
  - The Senate votes against the Better Care Reconciliation Act of 2017 amendment.
    (The New York Times)
  - Documents that were previously sealed and withheld from the public pertaining
    to the John F. Kennedy assassination are released. (U.S. National Archives)
