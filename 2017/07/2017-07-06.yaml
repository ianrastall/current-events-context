Date: '2017-07-06'
Source_URI: Portal:Current events/2017 July 6
Intelligence_Payload:
  Arts and culture:
  - World heritage sites
  - In a meeting held in the city of Kraków, Poland, UNESCO decides not to include
    Machu Picchu on its list of endangered heritage sites due to the steps taken by
    Peruvian authorities to address concerns about the condition of the Inca citadel.
    (The Australian)
  Business and economy:
  - Alternative fuel vehicles
  - French ecology minister Nicolas Hulot announces France is to ban the sale of petrol
    and diesel vehicles by 2040. (BBC)
  Disasters and accidents:
  - 2017 Leyte earthquake
  - At least two are killed and power supply is interrupted in Eastern Visayas and
    Bohol when a 6.5 magnitude earthquake hits the province of Leyte in the Philippines.
    (InterAksyon)
  International relations:
  - 2017 Doklam crisis
  - Despite an ongoing stand-off between China and India over the Doklam tri-junction
    which is claimed by both China and Bhutan, China claims that there has been a
    "basic consensus" with Bhutan over the past 24 months that Doklam belongs to China
    and that there is no dispute between the two countries. (The Economic Times)
  - Poland–United States relations
  - U.S. President Donald Trump visits Warsaw, where he speaks of defeating radical
    Islamist terrorism, pledges to uphold the North Atlantic Treaty, and urges Russia
    to "join the community of responsible nations." (Las Vegas Review-Journal)
  Law and crime:
  - Crime in Mexico
  - A prison riot between rival gangs in Acapulco, Mexico, leaves at least 28 inmates
    dead. (BBC)
  - The Oregon legislature passes a bill decriminalizing possession of small quantities
    of illegal drugs. (Statesman Journal)
  Politics and elections:
  - Elections in Vanuatu
  - Tallis Obed Moses is elected President of Vanuatu, succeeding the late President
    Baldwin Lonsdale, who died in office in June. (RNZI)
  - Martial law in the Philippines
  - The Supreme Court of the Philippines says President of the Philippines Rodrigo
    Duterte can declare martial law in the whole Philippines. Two days prior, the
    Supreme Court had ruled in favor of the constitutionality of Proclamation No.
    216 which declared Martial Law and suspended the privilege of the writ of habeas
    corpus in the whole of Mindanao, in response to the Marawi crisis. (Rappler)
  Science and technology:
  - Large Hadron Collider
  - Scientists announce the detection of a new subatomic particle at the Large Hadron
    Collider. (BBC)
