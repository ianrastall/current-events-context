Date: '2017-07-13'
Source_URI: Portal:Current events/2017 July 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Crime in Mexico
  - Masked men attack a child's birthday party in Tizayuca, Hidalgo, killing 11 adults.
    (BBC)
  - Crime in London
  - Five men in London are attacked with acid in five linked attacks. Two teenaged
    suspects are taken into custody. (CNN)
  Law and crime:
  - July 2017 Pennsylvania murders
  - A suspect in a disappearances case in Bucks County, Pennsylvania, reportedly confesses
    to killing and burying four men. (Reuters)
  - Another "person of interest" in the case is taken into custody. (Fox News)
  - Health care in the United States
  - The U.S. Department of Justice charges 412 individuals with health care fraud.
    Collectively, these individuals are accused of collectively defrauding $1.3 billion
    from the U.S. government. (The New York Times)
  - The U.S. Senate releases a revised version of the American Health Care Act, the
    Better Care Reconciliation Act. (NPR)
  - Executive Order 13780, Hawaii v. Trump
  - Hawaii District Judge Derrick Watson extends the definition of "close family members"
    to include grandparents, aunts, and uncles, thereby exempting them from President
    Donald Trump's travel ban on six Muslim-majority nations. (The Washington Post)
    (NPR)
  Politics and elections:
  - Human rights in China
  - Prominent Chinese dissident and Nobel Peace Prize winner Liu Xiaobo dies. (BBC)
  - United States federal budget
  - The Congressional Budget Office estimates that in ten years the federal budget
    of U.S. President Donald Trump will produce a $720 billion deficit rather than
    a $16 billion surplus as claimed by the Trump administration. (Bloomberg)
