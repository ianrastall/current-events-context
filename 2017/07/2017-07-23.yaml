Date: '2017-07-23'
Source_URI: Portal:Current events/2017 July 23
Intelligence_Payload:
  Armed attacks and conflicts:
  - Syrian Civil War
  - The Russian air force bombards the city of Madan and Zor Shamr Camp, south and
    east of Raqqa, Syria, with cluster bombs, killing six civilians and wounding 19
    others. Nearby Alburamadan town was also struck; there are no reports of casualties.
    (SyriaNews)
  - 2017 Amman incident
  - A shooting at the Israeli embassy in Amman, Jordan, leaves one person, a Jordanian,
    dead, and an Israeli and a Jordanian wounded. There is speculation the attack
    may be linked to recent events at Jerusalem's Al-Aqsa Mosque. Another Jordanian
    man was killed inadvertently. (The Atlantic) (Reuters) (BBC)
  Disasters and accidents:
  - Florida manatee
  - Snooty, formerly the world's oldest West Indian manatee, dies at age 69 after
    being trapped in the plumbing of the South Florida Museum. (The Washington Post)
  Law and crime:
  - Philippine Drug War
  - In alleged emulation of Philippine president Rodrigo Duterte's war on drugs, Indonesian
    President Joko Widodo announces orders for police to "shoot" suspected drug dealers
    without trial. (The Guardian)
  - Human trafficking in the United States
  - Nine men are found dead inside a tractor-trailer parked outside a Walmart store
    in the American city of San Antonio, Texas, in what authorities call a case of
    "ruthless" human trafficking. Thirty people, many in critical condition and suffering
    from heat stroke and exhaustion, were removed from the non-air conditioned trailer
    which also lacked a water supply. (Fox News) (Reuters)
  Sports:
  - 2017 Tour de France
  - In road cycling, Britain's Chris Froome wins his third consecutive Tour de France
    and fourth in five years, finishing 54 seconds ahead of Colombian Rigoberto Urán.
    (AP via ESPN)
  - 2017 Open Championship
  - In golf, American Jordan Spieth wins by three shots over fellow American Matt
    Kuchar, becoming only the second male player, after Jack Nicklaus, to win three
    different major championships before turning 24. (ESPN)
  - 2017 World Series of Poker
  - In poker, American Scott Blumstein wins the WSOP Main Event, beating out a field
    of over 7,200 entrants over two weeks to claim the first prize of $8.15 million
    and a WSOP bracelet. (ESPN)
  - 2017 Women's Cricket World Cup
  - In cricket, England defeats India in the final at Lord's in London. Anya Shrubsole
    took six wickets in India's innings. (Reuters via ABC News Australia)
