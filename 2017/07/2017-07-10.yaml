Date: '2017-07-10'
Source_URI: Portal:Current events/2017 July 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Mosul (2016–17)
  - Iraqi Prime Minister Haider al-Abadi declares the battle for Mosul over, after
    the majority of ISIL militants were defeated. (BBC)
  - 2017 Amarnath Yatra attack
  - At least 7 people are killed and 15 injured after gunmen fire upon a pilgrimage
    bus and a police vehicle, on the 11th day of the Amarnath Yatra pilgrimage in
    the Indian city of Anantnag. The attack is believed to be terror-related. (NDTV)
    (The Indian Express)
  Disasters and accidents:
  - Camden Market fire
  - A large fire breaks out at the Camden Markets in North West London, with over
    70 firefighters and 10 firetrucks attending the scene. No casualties have been
    reported. (The Sydney Morning Herald)
  - 2017 United States Marine Corps KC-130 crash
  - A United States Marine Corps Lockheed C-130 Hercules military transport aircraft
    carrying sixteen people has crashed near the American town of Greenwood, Mississippi.
    All sixteen bodies have been recovered. (USA Today) (Reuters via Yahoo! News)
  Health and medicine:
  - Health effects of coffee
  - Coffee may prolong the human lifespan, suggests one study by Imperial College
    London and the International Agency for Research on Cancer, and another by the
    Keck School of Medicine of USC. (CNN)
  International relations:
  - 2017 Doklam crisis
  - Amid a stand-off between India and China over the disputed territory of Doklam
    which is claimed by Bhutan, the Indian National Congress denies the meeting of
    Rahul Gandhi with the Chinese ambassador to India. (Zee News)
  Law and crime:
  - Crimes in Ireland
  - A 3 year-old boy is stabbed to death in an incident in the Poddle Park area of
    Kimmage in Dublin, Ireland. The child's mother, believed to be an Iranian national,
    is being treated for knife wounds in hospital. (RTÉ)
  Politics and elections:
  - Mongolian presidential election, 2017
  - Battulga Khaltmaa is sworn in as the new President of Mongolia following his victory
    in the second round presidential election on 7 July. (Sina English)
  - Human rights in China
  - The Nobel Peace Prize winner Liu Xiaobo is in "critical condition," according
    to Chinese doctors. (The New York Times)
  - Politics of Israel
  - Avi Gabbay, former minister of environmental protection in Benyamin Netanyahu's
    government, wins an upset victory in the primaries of the Israeli Labor Party,
    thus becoming leader of the opposition. (Bloomberg Politics)(The Guardian)
  Science and technology:
  - The Sixth Extinction
  - Between 1900 and 2015, around 177 species of mammals have lost 80% of their distribution
    leading to a presumption that the Holocene extinction is accelerating. (Wired)
