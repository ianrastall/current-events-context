Date: '2017-07-27'
Source_URI: Portal:Current events/2017 July 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - Ukraine's domestic intelligence service, the SBU, reports that the March 2017
    explosions at Balakliia military base in Eastern Ukraine were caused by a drone
    carrying a ZMG-1 thermite grenade. The explosions resulted in 1 death and 5 injuries.
    (Popular Mechanics)
  Business and economy:
  - Chantiers de l'Atlantique
  - France nationalises the STX Europe-owned Chantiers de l'Atlantique shipyard in
    Saint-Nazaire, Pays de la Loire, to prevent Italian shipbuilding firm Fincantieri
    taking majority control. Italian Minister of Economy and Finances Pier Carlo Padoan
    calls the French decision to nationalise the shipyard "grave and incomprehensible".
    (Reuters)
  Health and medicine:
  - Electronic cigarette
  - A new study, published in the The BMJ medical journal, finds that electronic cigarettes
    may help smokers stop their habit. The researchers found that a substantial increase
    in e-cigarette use among American adult smokers was associated with a statistically
    significant increase in the smoking cessation rate. (ABC News) (The BMJ)
  Politics and elections:
  - Russia and the United Nations
  - Russian President Vladimir Putin appoints Vasily Nebenzya to be the new Permanent
    Representative of Russia to the United Nations following the sudden death of Vitaly
    Churkin in February. (Radio Free Europe/ Radio Liberty)
  - 2017 Venezuelan protests
  - At least three protesters are killed across the country amid clashes with police
    as a two-day national strike called by the opposition begins. (Al Jazeera)
  - Anna Johansson and Anders Ygeman resign in the wake of controversy surrounding
    a 2015 data leak of the Swedish Transport Agency. (Politico)
