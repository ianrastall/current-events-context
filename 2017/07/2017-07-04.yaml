Date: '2017-07-04'
Source_URI: Portal:Current events/2017 July 4
Intelligence_Payload:
  Disasters and accidents:
  - A garment factory boiler explosion in Dhaka, Bangladesh, kills 10 people and injures
    dozens. (Reuters)
  - European migrant crisis
  - Approximately fifty migrants are feared drowned off the coast of Morocco. Three
    men were rescued near Alboran Island near the coast of Spain. (BBC)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea test-launches what is presumed to be its first intercontinental ballistic
    missile 933 kilometers into the Sea of Japan within Japan's Exclusive Economic
    Zone. An American expert theorizes the ICBM, which reached an altitude of 2,802
    km, could potentially reach the U.S. state of Alaska. (ABC News Australia) (Xinhua
    News Agency) (Reuters)
  - China–India relations, Bhutan–China relations
  - Amid a stand-off between China and India over the Doklam tri-junction, China tells
    India that former Indian prime minister Jawaharlal Nehru accepted the Convention
    of Calcutta which China is using to support its territorial claims. Tensions have
    been rising between China and India and Bhutan over Doklam since China began constructing
    a road in the disputed territory in mid-June. (News18)
  Law and crime:
  - 2016–17 Rohingya persecution in Myanmar
  - A mob of at least a hundred Rakhine Buddhists in Sittwe, Rakhine State, Myanmar,
    attack seven Rohingya men from Dapaing Camp for internally displaced persons,
    killing one and severely injuring another. The Rohingya men were being escorted
    by police to Sittwe's docks to purchase boats, but were attacked despite armed
    guards being present. (The Irrawaddy) (Reuters)
  - 2017 cyberattacks on Ukraine
  - As part of an investigation into the recent cyberattacks, the servers of Ukraine's
    most popular accounting software company, M.E.Doc, are seized by Ukrainian police.
    (NBC News)
  - CNN controversies
  - CNN is accused of threatening to reveal the personal identity of a Reddit user
    who made a GIF depicting United States President Donald Trump tackling a man to
    the ground, with CNN's logo superimposed on the man's face. The GIF was modified
    and posted on Trump's Twitter feed. (The New York Times)
  Politics and elections:
  - The Landtag of Mecklenburg-Vorpommern elects Manuela Schwesig as state Minister
    President with 40-29 votes. (Frankfurter Allgemeine Zeitung)
  Science and technology:
  - Evolution
  - Researchers discover that the diversity of frogs is a direct result of the extinction
    of the dinosaurs. (NPR)
