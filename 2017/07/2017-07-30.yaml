Date: '2017-07-30'
Source_URI: Portal:Current events/2017 July 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - Boko Haram insurgents ambush an oil exploration team in the Magumeri area of Borno
    State, Nigeria, killing at least 69 people. (AFP via News24)
  - War in Somalia
  - A car bomb explodes near a police station in Mogadishu, killing at least six people
    and wounding thirteen others. (Al Jazeera)
  Disasters and accidents:
  - Floods in India
  - Following heavy rain in July 2017, the Gujarat state of India was affected by
    a severe flood resulting in more than 200 deaths. (NDTV)
  - Northeast India was also affected by flood due to heavy rain resulting in more
    than 85 deaths. (Times of India)
  International relations:
  - Russia–United States relations
  - Russian President Vladimir Putin expels 755 U.S. diplomats in response to new
    sanctions imposed by the United States. (Al Jazeera) (CNN)
  Law and crime:
  - Konstanz shooting
  - A man shoots several people in a nightclub in Konstanz, Germany, killing one.
    The gunman was shot and killed by police. (BBC)
  - Corruption in Iran
  - Former Iranian President Mahmoud Ahmadinejad faces sentences on seven verdicts
    of misusing billions of dollars in government funds while in office, the Supreme
    Audit Court public prosecutor said. If confirmed, Ahmadinejad will be barred from
    public office for seven years. (Reuters)
  - Philippine Drug War
  - 2017 Ozamiz police raid
  - Sixteen people, including Mayor Reynaldo Parojinog Sr. and his wife, are killed
    in a police drug raid in Ozamiz City in the province of Misamis Occidental. The
    Parojinog family had been previously identified with their ties to the illegal
    drug trade, as well as the organized crime group Kuratong Baleleng. (CNN Philippines)
    (GMA News)
  Politics and elections:
  - Venezuelan Constitutional Assembly election, 2017
  - Voters in Venezuela participate in an election for members of a new Constitutional
    Assembly, devised by President Nicolás Maduro to amend the constitution following
    a legislative takeover in March. Many Venezuelans question the election's legitimacy,
    resulting in boycotts and ongoing protests. (The Los Angeles Times)
  - A least nine people have been killed in the last 24 hours, including Constituent
    Assembly candidate Jose Felix Pineda, and Accion Democratica Party youth secretary
    Ricardo Campos. (Al Jazeera) (PJ Media) (The New York Times)
  - Senegalese parliamentary election, 2017
  - Voters in Senegal elect all 165 members of their National Assembly, with former
    President Abdoulaye Wade leading a coalition against the incumbent Macky Sall's
    United in Hope coalition. (DW)
  - Republic of the Congo parliamentary election, 2017
  - Voters in the Republic of the Congo return to the polls for the second round of
    an election for 139 National Assembly members, after the governing Congolese Party
    of Labour won 70 seats in the first round two weeks earlier. (RFI)
  Sports:
  - 2017 Major League Baseball season
  - Adrián Beltré of the Texas Rangers becomes the 31st player with 3,000 career hits
    in Major League Baseball, reaching the milestone with a fourth-inning double in
    the Rangers' 10–6 loss to the Baltimore Orioles. Beltré is the first Dominican-born
    player to reach the milestone. (ESPN)
