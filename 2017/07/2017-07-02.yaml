Date: '2017-07-02'
Source_URI: Portal:Current events/2017 July 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Three suicide bombers in Damascus kill at least 21 people and wound 12 others.
    (The Guardian)
  Business and economy:
  - London Fisheries Convention
  - The United Kingdom announces it is withdrawing from the 1964 London Fisheries
    Convention, which allows several European countries to fish within 6 to 12 nautical
    miles of each other's coastlines. (BBC)
  - People on banknotes
  - The Central Bank of Syria announces a new 2,000 Syrian lira (pound) bank note
    that will feature a portrait of President Bashar al-Assad, the President's first
    appearance on Syrian currency during his 17-years in office. (ABC News)
  Disasters and accidents:
  - 2017 disasters in Russia
  - At least 14 people are killed in Russia's Tatarstan Republic as a bus catches
    fire after colliding with a truck. (Fox News)
  International relations:
  - 2017 electronics ban
  - The United States lifts its ban on electronics in the cabin of flights from Abu
    Dhabi to the U.S. (Reuters)
  - China–India relations, Bhutan–China relations
  - Amid growing tensions between China and India and Bhutan over disputed land, the
    Bharatiya Janata Party supports the words of defence minster Arun Jaitley that
    "India of 2017 is different from India of 1962". It follows a warning from China
    to India that referenced the defeat of the latter during the 1962 Sino-Indian
    War. (DNA India)
  Law and crime:
  - 2017 Avignon shooting
  - Two gunmen open fire near a mosque in Avignon, France, injuring eight people.
    Two of the victims were hospitalised. (BBC News) (Business Insider)
  - Law in Israel
  - Israel arrests Palestinian lawmaker Khalida Jarrar over allegations of her inciting
    of violence. (The Washington Post)
  Sport:
  - Manny Pacquiao vs. Jeff Horn
  - In boxing, Jeff Horn of Australia defeats Senator Manny Pacquiao of the Philippines
    to win the WBO world welterweight belt. (ABC Australia)
  - 2017 FIFA Confederations Cup
  - In football, Germany defeats Chile 1–0 in the final of the 2017 FIFA Confederations
    Cup in the Russian city of Saint Petersburg. (AP)
