Date: '2017-07-08'
Source_URI: Portal:Current events/2017 July 8
Intelligence_Payload:
  Disasters and accidents:
  - Tropical Storm Nanmadol (2017)
  - The death toll from flooding on the southern Japanese island of Kyushu rises to
    15, with six others missing. (AP via The Telegraph)
  - Energy in California
  - An explosion at a Northridge power plant causes a widespread power outage in the
    San Fernando Valley, Los Angeles. (Los Angeles Times) (Sky News)
  International relations:
  - 2017 G20 Hamburg summit
  - The summit announces it is unable to gain agreement on climate change between
    the United States and the other 19 members of this international forum. (Reuters)
  Law and crime:
  - Crime in Cincinnati
  - A shooting at a gender reveal party in Cincinnati kills 1 and injures 8. The unborn
    child, revealed to be a boy, also dies. (CNN)
  Politics and elections:
  - 2017 Venezuelan protests
  - Venezuelan opposition leader Leopoldo López, leader of the Popular Will party,
    is granted house arrest after over three years of imprisonment. (Reuters)
  Sports:
  - 2017 British and Irish Lions tour to New Zealand
  - The test series between New Zealand and the British and Irish Lions concludes
    in a 1–1 draw after the third test match in Eden Park finishes 15–15. (The Guardian)
