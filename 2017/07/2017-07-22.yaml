Date: '2017-07-22'
Source_URI: Portal:Current events/2017 July 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - 2017 Temple Mount crisis
  - A United Nations Security Council session is to be held to address the escalating
    violence in Jerusalem. (Deutsche Welle)
  Business and economy:
  - Bank of America
  - Bank of America chooses Dublin as its European hub. (Bloomberg)
  - MasterCard
  - A United Kingdom court blocks a £14 billion class action lawsuit against Mastercard.
    (The Guardian)
  Disasters and accidents:
  - 2017 Aegean Sea earthquake
  - Aftershocks cause panic in the Greek island of Kos after a deadly earthquake that
    injured hundreds. (The Independent)
  International relations:
  - Russia–United States relations
  - Russian Ambassador to the United States Sergey Kislyak, who was cited in Washington
    Post reports yesterday that American intelligence overheard him telling Moscow
    about his election-related discussions with a Trump campaign official, ends his
    nine-year assignment and leaves the United States. In May 2017, Russian Deputy
    Foreign Minister Anatoly Antonov was approved as the next ambassador. (Reuters)
    (CBS News) (The Washington Post)
  Law and crime:
  - Law of Poland
  - Poles march against a bill that critics say might decrease judicial independence
    in Poland. Hungary has supported the bill while the European Union has opposed
    it. The protesters hope that the President Andrzej Duda would intervene against
    the proposed law. (BBC)
  Politics and elections:
  - 2017 East Timorese parliamentary election
  - Voters in East Timor go to the polls to elect members of their National Parliament.
    (The Australian)
  - Martial law in the Philippines, Proclamation No. 216
  - After seven hours of debate, the joint special session of the Congress of the
    Philippines votes 261–18 in favour of the motion to extend Proclamation No. 216
    (martial law on the whole of Mindanao in response to the Marawi crisis), that
    was set to expire at 10 p.m. Philippine Standard Time, until the end of the year.
    (CNN Philippines) (AFP via Yahoo! News)
  - United States sanctions
  - Negotiators from the Democratic and Republican parties agree on new sanctions
    against Russia, Iran, and North Korea. Both chambers of the United States Congress
    are scheduled to vote on passage on Tuesday. (Reuters) (CBS News)
  - 2017 Venezuelan protests
  - Protesters march towards the Venezuelan Supreme Court against what they feel is
    bias in favor of President Nicolás Maduro. (The New York Times)
  Sports:
  - 2017 Open Championship
  - In golf, South African Branden Grace shoots 62 in the third round at Royal Birkdale,
    becoming the first golfer ever to do so at a men's major championship. (ESPN)
