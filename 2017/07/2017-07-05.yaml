Date: '2017-07-05'
Source_URI: Portal:Current events/2017 July 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mexican Drug War
  - A gunfight between La Línea gang members and a rival cartel in Madera Municipality,
    Chihuahua, leaves at least 14 people dead. (The Washington Post)
  Arts and culture:
  - Disappearance of Amelia Earhart
  - The aviator Amelia Earhart and her navigator Fred Noonan may have survived in
    the Marshall Islands and were held captive by the Japanese according to an allegedly
    undoctored photo in the National Archives. Experts remain divided on the claim,
    however. (CNN) (USA Today)
  Business and economy:
  - Volvo says it plans to phase out fossil fuels by building only electric or hybrid
    cars. (The New York Times)
  - A Chinese state company signs an order with Airbus for 100 A320 and 40 A350 airplanes.
    (Reuters)
  Disasters and accidents:
  - A truck overloaded with passengers crashes near Bambari, Central African Republic,
    killing at least 78 people and leaving dozens more injured. (The Independent)
  Health and medicine:
  - Health in France
  - France plans to make vaccines mandatory for children in 2018. (Newsweek)
  International relations:
  - Executive Order 13780
  - The United States extends the restrictions deadline for refugees. (The Los Angeles
    Times)
  Law and crime:
  - A priest is arrested and questioned over an alleged drug-induced gay orgy hosted
    in his apartment in the Vatican City. (International Business Times)
  - Crime in New York City
  - A police shooting occurs in the Bronx, New York, killing one police officer and
    injuring a bystander. Two officers confront the suspect and shoot him dead. (The
    New York Times)
  - Madison, Maine
  - Three people are shot and killed by a gunman in separate incidents in Madison,
    Maine. A fourth victim is wounded. Sheriffs deputies then shot and killed the
    suspect. (CBS News) (The Boston Globe)
  Politics and elections:
  - Samoa's Legislative Assembly appoints Tuimalealiifano Va'aletoa Sualauvi II as
    O le Ao o le Malo, or Head of State. He will succeed Tufuga Efi, the country's
    head of state since 2007, on July 25. (Talanei)
  - 2017 Venezuelan protests
  - Supporters of Venezuelan President Nicolás Maduro storm the opposition-controlled
    National Assembly and injure several lawmakers, including the President of the
    National Assembly, Julio Borges. Several journalists were also injured in the
    assault. (BBC)
  Society:
  - A group of people are arrested in the Peruvian village of Muqui, located in the
    Andes, after they painted a wall with allusive symbols and messages to the far-left
    terrorist organization, Shining Path, responsible for crimes against humanity
    in Peru from 1980 to 1992. Police later clarified that the true intentions of
    the arrested, some of them students of a technical training institute, were to
    make a short film. (La República) (Diario Correo)
  Science and technology:
  - The face of the Peruvian Moche mummy the Lady of Cao is reconstructed from its
    skull structure, using forensic archaeology techniques and ethnographic research.
    (Sydney Morning Herald)
