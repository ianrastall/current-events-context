Date: '2017-07-11'
Source_URI: Portal:Current events/2017 July 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kurdish–Turkish conflict (2015–present)
  - According to the Turkish Army, its overnight air strike in Dargeçit killed eleven
    militants from the Kurdistan Workers' Party. (Reuters)
  - Syrian Civil War
  - The Syrian Observatory for Human Rights says ISIL leader Abu Bakr al-Baghdadi
    is confirmed dead, according to information from tribal leaders close to ISIL
    in the Deir ez-Zor Governorate. In June, Russia said it had "most likely" killed
    al-Baghdadi and several other high profile ISIL leaders in an airstrike but provided
    no evidence. (The Independent)
  Arts and culture:
  - Pope Francis appoints Father Andrew Bellisario as Bishop of Juneau, Alaska, and
    Auxiliary Bishop Nelson J. Pérez as Bishop of Cleveland, Ohio. (Catholic News
    Agency)
  Business and economy:
  - Poverty reduction
  - The United Kingdom and Bill & Melinda Gates Foundation sponsor a summit that plans
    on raising funds for family planning in developing countries. (TIME) (The Hindustan
    Times)
  Disasters and accidents:
  - Floods in Japan
  - The death toll from recent torrential rain and flooding in Kyushu in southern
    Japan rises to 25. (AFP via The Star)
  Health and medicine:
  - Meningococcal vaccine
  - Researchers in New Zealand have discovered that the MeNZB vaccine for meningitis
    may protect against gonorrhea by 30%. (CBC.ca)
  International relations:
  - Visa policy of the United States
  - Visas given to potential entrepreneurs who are foreigners will be significantly
    reduced prompting fears and criticism from Silicon Valley. Many of those given
    visas are from India. (Voice of America) (U.S. News and World Report)
  - The U.S. Department of Homeland Security reportedly plans to restrict student
    visa holders, most of whom are from China, from staying in the United States for
    over a year. (The Washington Post)
  - United Kingdom–United States relations
  - The Trump Administration announces this year's presidential state visit to the
    United Kingdom is delayed until at least 2018. Both the White House and 10 Downing
    Street state the two countries had been unable to agree on a 2017 date. This planned
    visit has drawn protests in the United Kingdom since February, and more than 1.8
    million signatures on a petition to Parliament to cancel the meeting. (Reuters)
    (Business Insider) (The Australian)
  Politics and elections:
  - 2016–17 purges in Turkey
  - Turkish authorities have ordered the arrest of 105 people working in information
    technology who were believed to have been involved in the attempted overthrow
    of the government last year, state-run Anadolu Agency reported on Tuesday. (Reuters)
  - Human rights in Haiti
  - Haiti will reinstate its armed forces after 20 years of having none. (BBC)
  - Links between Trump associates and Russian officials
  - Donald Trump Jr. discloses emails in which he and Rob Goldstone discuss gathering
    opposition research against Hillary Clinton through a June 2016 meeting with Russian
    lawyer Natalia Veselnitskaya. (The Guardian)
  Science and technology:
  - Quantum Experiments at Space Scale
  - Scientists at the Chinese Academy of Sciences successfully teleport a photon from
    a ground station in Tibet to a satellite orbiting Earth at distance of 500km away.
    It is the first time an object has been teleported from the planet into space.
    (MIT Technology Review)
  Sports:
  - 131st IOC Session preparations
  - The International Olympic Committee plans on awarding the 2024 games to Paris
    and the 2028 games to Los Angeles. Both Emmanuel Macron and Donald Trump have
    voiced their support. (NPR)
