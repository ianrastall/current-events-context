Date: '2017-07-21'
Source_URI: Portal:Current events/2017 July 21
Intelligence_Payload:
  Armed attacks and conflicts:
  - Syrian Civil War
  - Violent clashes break out between the Syrian rebels and Syrian Democratic Forces
    on the outskirts of al-Muhsenli Village, in the northeastern countryside of Aleppo,
    but no casualties are reported. (Iraqi News)
  - Syrian Army forces shell, using heavy artillery, the residential neighborhoods
    in Zaitan Village, in the countryside of Aleppo, destroying civilian property.
    (Iraqi News)
  - Israeli–Palestinian conflict, 2017 Temple Mount crisis
  - Several thousand Palestinians protest Israel's installation of metal detectors
    and a ban on Muslim men under the age of 50 in response to the killing of two
    Israeli policemen last Friday at a contested Jerusalem holy place, known to Muslims
    as the Noble Sanctuary and to Jews as the Temple Mount.
  - Protest marches are also held in Indonesia, Jordan, Lebanon, Malaysia, and Turkey
  - Three Palestinians are killed, 390 people injured with dozens hospitalized in
    clashes in Jerusalem and the West Bank, according to the Red Crescent. Israeli
    police report five officers are wounded.
  - '2017 Halamish stabbing attack: Three Israelis are stabbed to death by a Palestinian
    in their home while eating dinner, according to Israeli officials.'
  - United Nations deputy spokesman Farhan Haq calls for a de-escalation of violence
    and tensions at this site.
  - Egypt calls for an immediate halt to the violence underway around this site, urging
    Israel to show respect for Muslim sacred sites while accusing it of fomenting
    these tensions.
  - Turkish Prime Minister Binali Yıldırım says his country is in dialogue with Israel
    to end the crisis.
  - Palestinian President Mahmoud Abbas says the Palestinian leadership will “freeze
    contacts” with Israel “on all levels.” (AP via The Washington Post) (NBC News)
    (BBC) (CNN) (The New York Times) (Reuters)
  - CPP–NPA–NDF rebellion
  - President of the Philippines Rodrigo Duterte indefinitely freezes the peace talks
    with the Communist Party of the Philippines after numerous attacks by the communist
    rebels on government forces. The President also vowed to re-orient anew the offensive
    against the Party's armed wing the New People's Army. (Al Jazeera)
  Arts and culture:
  - Salvador Dalí
  - The remains of surrealist painter Salvador Dalí are exhumed following a Madrid
    court order on settling the paternity claim of a woman who is allegedly the painter's
    natural daughter. Various experts contest the claim, noting Dalí's sexual eccentrism
    (including a public boast about his "impotency") and that the action being against
    the state (Dalí bequeathed his estate to Spain). If proven, this woman could assume
    part of Dalí's estate. (BBC News)
  Disasters and accidents:
  - 2017 Aegean Sea earthquake
  - A 6.7 magnitude earthquake in the Aegean Sea near Greece and Turkey kills two
    people and injures more than 520 others. (Reuters via ABC)
  International relations:
  - North Korea–United States relations
  - The U.S. State Department announces that it will ban travel to North Korea, following
    the death of Otto Warmbier. (Los Angeles Times)
  Law and crime:
  - Murder of Justine Damond
  - Minneapolis Police Chief Janeé Harteau, upon reflection and at Mayor Betsy Hodges's
    request, resigns in the wake of last Saturday’s tragedy as well as some other
    recent incidents. (ABC News) (The New York Times)
  Politics and election:
  - Political appointments by Donald Trump
  - White House Press Secretary Sean Spicer announces his intention to resign as White
    House Press Secretary due to Donald Trump's appointment of Anthony Scaramucci
    as the White House Communications Director, and will formally step down from the
    role in August 2017. Sarah Huckabee Sanders will take over as the White House
    Press Secretary in August 2017. (The New York Times) (CNN)
