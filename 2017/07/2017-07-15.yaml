Date: '2017-07-15'
Source_URI: Portal:Current events/2017 July 15
Intelligence_Payload:
  Disasters and accidents:
  - At least eight people are killed in a stampede at a football stadium in Dakar,
    Senegal, that started after police used tear gas to break up a fight between the
    rival teams' fans. (Reuters)
  International relations:
  - South China Sea disputes
  - Indonesia renames part of the South China Sea as "North Natuna Sea," angering
    China. (CNN)
  Law and crime:
  - Crime in Iran
  - An attack by a man armed with a knife in Tehran Metro's Shahr-e-Rey Station leaves
    two injured. The attacker is shot dead by the police. (Reuters)
  Politics and elections:
  - Politics of Hong Kong
  - Thousands protest silently in Hong Kong honoring the life of dissident Liu Xiaobo.
    (Channel NewsAsia)
  - Politics of China
  - Chen Min'er replaces Sun Zhengcai as Communist Party Secretary of Chongqing; Sun
    Zhigang becomes party chief of Guizhou. (Reuters)
  Science and technology:
  - Fields Medal
  - Maryam Mirzakhani, the first woman and first Iranian to win the Fields Medal in
    mathematics, dies at 40 of breast cancer. (AP via the Seattle Times)
  - Tardigrade
  - A newly-published paper suggests that some tardigrades may outlive most life on
    Earth. (Vox)
  Sports:
  - 2017 Wimbledon Championships
  - In tennis, Garbiñe Muguruza of Spain defeats Venus Williams of the United States
    7–5, 6–0 to win the women's singles tournament. It is Muguruza's second Grand
    Slam title after her win in the 2016 French Open. (ABC)
