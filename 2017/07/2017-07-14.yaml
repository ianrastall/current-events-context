Date: '2017-07-14'
Source_URI: Portal:Current events/2017 July 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Temple Mount shooting
  - Two Druze Israeli police officers are killed in an attack at Temple Mount in Jerusalem.
    (BBC)
  - Insurgency in Egypt (2013–present)
  - Gunmen shoot dead five police officers near Giza. (ABC News)
  - 2017 Hurghada attack
  - Two female tourists are killed and four others are wounded in a mass stabbing
    attack at a hotel in Hurghada, Red Sea Governorate. The attacker is detained.
    (BBC)
  Disasters and accidents:
  - Marco Polo condo fire
  - At least three people are killed and two hospitalized, one in serious condition,
    from a fire in a condominium tower in the U.S. city of Honolulu, Hawaii. An unknown
    number of residents are reportedly still trapped in their apartments. (AP via
    Fox News) (Reuters)
  Law and crime:
  - Presidency of Donald Trump
  - The White House releases unredacted emails of people concerned about the Presidential
    Advisory Commission on Election Integrity. Sensitive information revealed in the
    emails prompts immediate backlash and privacy concerns. (The Washington Post)
    (The New York magazine)
  - Aftermath of the Mamasapano clash
  - Former President of the Philippines Benigno "Noynoy" Aquino III is indicted (among
    others) by the Office of the Ombudsman for his failure in handling the 2015 Mamasapano
    clash, which resulted in the deaths of 44 members of the Special Action Forces
    of the Philippine National Police. Aquino's legal team has vowed to appeal for
    a motion for reconsideration; as well as the group Volunteers Against Crime and
    Corruption (representing the victims' families), against what they call a "weak
    case" (citing Aquino's charges of "graft" & "usurpation of authority", instead
    of "reckless imprudence resulting in multiple homicide") (Rappler) (ABC News.go)
  - Corruption in Peru, Operation Car Wash
  - A court of Lima orders 18 months of pre-trial imprisonment for former president
    Ollanta Humala and his wife Nadine Heredia for alleged money laundering. Both
    have turned themselves in. (BBC)
  - Executive Order 13780, Hawaii v. Trump
  - The Trump Administration asks the U.S. Supreme Court to stop implementation of
    yesterday's ruling by Hawaii District Judge Derrick Watson that expanded the State
    Department's definition of "close family" used to implement the Supreme Court's
    June order that permits admission to the U.S. of those with a bona fide relationship.
    (Reuters) (U.S. State Department via Reuters)
  Politics and elections:
  - Politics of Australia
  - Deputy Leader of the Australian Greens Scott Ludlam resigns as a Senator after
    discovering that he holds dual citizenship with New Zealand, making him electorally
    ineligible under Section 44 of the Constitution of Australia. (ABC.net)
  - Politics of Hong Kong
  - Four lawmakers are removed from the Hong Kong legislature. (The New York Times)
