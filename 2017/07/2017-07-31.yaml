Date: '2017-07-31'
Source_URI: Portal:Current events/2017 July 31
Intelligence_Payload:
  Business and economy:
  - Scripps Networks Interactive
  - Discovery Communications announces it will acquire Scripps Networks Interactive
    for US$ 14.6 billion. (CNBC)
  Disasters and accidents:
  - 2017 Gujarat flood
  - Flooding in Gujarat, Western India, kills at least 213 people with the death toll
    expected to rise as receding flood waters reveal additional victims. Chief Minister
    of Gujarat Vijay Rupani says heavy rain had triggered "the worst flood of the
    century" in the state. (The Guardian)
  International relations:
  - United States–Venezuela relations
  - The United States sanctions Venezuelan President Nicolás Maduro over the controversial
    Constitutional Assembly election which critics say is an attempt to establish
    a dictatorship. (The Guardian) (BBC)
  - 2017 Qatar crisis
  - Qatar files a legal complaint at the World Trade Organization (WTO) concerning
    the embargo imposed by Saudi Arabia, Egypt, Bahrain and United Arab Emirates in
    June. The parties have 60 days to settle the complaint to avoid WTO litigation.
    (Financial Times) (Reuters)
  Politics and elections:
  - Kenyan general election, 2017
  - The body of Chris Msando, the Kenyan election board's head of information, communication
    and technology, is discovered. Msando, who went missing three days ago, is believed
    to have been tortured and murdered. (Reuters)
  - Political appointments by Donald Trump
  - Newly-appointed White House Chief of Staff John F. Kelly fires Director of Communications
    Anthony Scaramucci less than ten days after Scaramucci took up his post. (The
    New York Times) (BBC)
  Sports:
  - 2024 and 2028 Summer Olympics
  - Los Angeles has reportedly reached an agreement with the International Olympic
    Committee to host the 2028 Games. This means that Paris will most likely host
    the 2024 Games. Both Games will be formally awarded at the 131st IOC Session in
    Lima, Peru, in September. (ESPN)
