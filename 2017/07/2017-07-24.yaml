Date: '2017-07-24'
Source_URI: Portal:Current events/2017 July 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - A suicide car bombing in the western part of Kabul kills at least 24 and injures
    more than 40 people. Afghan authorities say the target of the attack was a bus
    of civilian government workers from the Ministry of Mines and Petroleum. (Reuters)
    (Al Jazeera)
  - U.S. Defense Secretary James Mattis criticizes The Pentagon for wasting US$28
    million for Afghan woodland camouflage that did not match the country's terrain.
    (The Hill)
  - War in North-West Pakistan
  - July 2017 Lahore suicide bombing
  - At least 26 people are killed and over 50 others are injured in a suicide car
    bombing in southern Lahore. (BBC)
  - Russian military intervention in Ukraine
  - Ukrainian President Petro Poroshenko demands Russia halt arms supplies to Russian-backed
    militants as the leaders of France and Germany tried to revive a peace plan. (A
    News)
  Business and economy:
  - Microsoft Paint
  - Microsoft announces that Paint will cease to be updated after the Windows 10 Fall
    Creators Update because its functionality was "integrated into Paint 3D". Paint
    was first released 32 years ago. (The Guardian) (CNET)
  - HelloWallet
  - KeyCorp finalizes its purchase of financial app HelloWallet. (Nasdaq)
  Health and medicine:
  - Charlie Gard case
  - The parents of the terminally ill Charlie Gard give up their legal challenge over
    treatment in the United States. The latest medical reports indicate that the window
    of opportunity no longer exists. (CNN)
  - Epidemiology of HIV/AIDS
  - A girl born with HIV, who was started on HIV drugs when she was 2 months old and
    stopped 40 weeks later, is virtually-free of the virus even after no further treatment.
    (CBS News)
  International relations:
  - Israel–Jordan relations
  - 2017 Amman incident
  - Israel's embassy staff in Jordan, including a security guard involved in a shooting
    incident in which two Jordanians were killed yesterday, return to Israel from
    Amman. Israeli Prime Minister Benjamin Netanyahu thanked U.S. President Donald
    Trump and Jordan's King Abdullah for their help and cooperation. (Reuters) (BBC)
  - Philippines–United States relations
  - History of the Philippines (1898–1946), Philippine–American War, Balangiga massacre
  - During the annual State of the Nation Address through the Congress of the Philippines,
    President of the Philippines Rodrigo Duterte has outright demanded that the United
    States return the controversial Balangiga bells, taken during one of the campaigns
    of the Philippine–American War as spoils of war. Previous attempts to recover
    the bells have all failed so far. (The Washington Post) (United Press International)
  Law and crime:
  - Crime in Switzerland
  - At least five people are injured, two seriously, after a man attacks people with
    a chainsaw in Schaffhausen, Switzerland. A manhunt is underway for the suspect.
    (CNN)
  - Deportation from the United States
  - U.S. District Judge for the Eastern District of Michigan, Mark A. Goldsmith, halts
    for 90 days the mass deportation from the United States of more than 1,400 Iraqi
    nationals, including Chaldean Christians, to allow the plaintiffs time to appeal
    their cases. The American Civil Liberties Union petitioned for the injunction
    stating these people would face persecution in Iraq where they are considered
    ethnic and religious minorities. (Reuters) (Detroit Free Press) (NBC News)
  - Former Democratic IT shared employee Imran Awan is arrested on charges of bank
    fraud at the Washington Dulles International Airport. (CNN)
  - Freedom of religion in Canada
  - Winston Blackmore and James Oler, leaders of a polygamist Mormon sect in Canada,
    are convicted. (TIME)
  Politics and elections:
  - Politics of China
  - The Chinese Central Commission for Discipline Inspection announces that current
    Politburo member Sun Zhengcai is under investigation for violating party discipline.
    Sun is the fourth sitting Politburo member since 1990 to fall from power. (The
    New York Times)
  - Politics of Poland
  - Polish President Andrzej Duda announces he will veto two judicial reform bills
    passed by Poland's parliament, which the European Commission said would result
    in sanctions, and which have generated continuous demonstrations across the country.
    The ruling Law and Justice Party needs to put together a three-fifths majority
    to override the veto. (The New York Times) (BBC) (Reuters)
  Science and technology:
  - Lunar water
  - Brown University researchers discover that a substantial amount of water may be
    present beneath the surface of the Moon. (Space) (CNN)
