Date: '2017-12-12'
Source_URI: Portal:Current events/2017 December 12
Intelligence_Payload:
  Business and economy:
  - Unibail-Rodamco agrees to purchase shopping mall owner Westfield Corporation for
    $15.7 billion. (Business Insider)
  Disasters and accidents:
  - An explosion and fire at the Gas Connect Austria pipeline hub in Baumgarten an
    der March kills one person and injures 21. Service to Hungary, Slovenia, Croatia
    and Italy is suspended. Italy declares a state of emergency. (Reuters) (Deutsche
    Welle)
  Law and crime:
  - Crime in Peru
  - A 22-year-old student is found dead inside the National University of San Marcos,
    of Lima, and the most important and oldest of Peru. Everything seems to indicate
    that he had been killed. Authorities have identified a possible suspect, who is
    also a student at the university. (La República) (ATV) (América Televisión)
  Health and environment:
  - Regulation of chemicals
  - Reacting to a petition from more than a million EU citizens, the European Commission
    releases a 16-page report on glyphosate. It adopts a renewal of the approval of
    glyphosate for a 5-year period and plans to improve the science reviewing process.
    (Reuters via Le Figaro)
  International relations:
  - Syrian Civil War
  - The Syrian opposition urges Russian president Vladimir Putin to put pressure on
    Syrian president Bashar al-Assad in order to "rescue" the Geneva peace talks and
    begin face-to-face bilateral talks. (The Guardian)
  - Foreign relations of Rwanda, Foreign relations of France
  - Rwanda steps up pressure on France to admit alleged complicity in the 1994 genocide
    by publishing a report by law firm Cunningham Levy Muse. (Financial Times)
  Politics and elections:
  - Government of San Francisco
  - Mayor of San Francisco Ed Lee dies of an apparent heart attack. Supervisor London
    Breed becomes acting Mayor. (SFGate)
  - United States Senate special election in Alabama, 2017
  - Voters in Alabama go to the polls to fill the United States Senate seat vacated
    by current United States Attorney General Jeff Sessions. The race is between Roy
    Moore (R) and Doug Jones (D). (CNN)
  - The Associated Press declares Doug Jones the winner. (AP via New York Times)
  Science and technology:
  - Climate change in the Arctic
  - This year's Arctic Report Card reveals that the plunge in sea ice extent as well
    as the amount of ocean surface warming is unprecedented in at least the last 1,500
    years. (Mashable)
  Sports:
  - Weinstein effect
  - Marshall Faulk, Ike Taylor, and Heath Evans are suspended from the NFL Network
    due to allegations of sexual harassment. (The Washington Post)
  - 2017 EAFF E-1 Football Championship
  - South Korea beats North Korea 1–0 in Tokyo. The Japanese authorities gave the
    North Korean players a special visa to enable their participation in the event
    that was formerly known as the East Asian Cup. (Sporza)
