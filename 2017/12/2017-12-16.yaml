Date: '2017-12-16'
Source_URI: Portal:Current events/2017 December 16
Intelligence_Payload:
  Business and economy:
  - China–United Kingdom relations, One Belt One Road Initiative
  - The BBC reports that former Prime Minister of the United Kingdom David Cameron
    is to head a £750 million ($1 billion) U.K. private fund to improve air, road
    and railway links between China and its trading partners. (The Independent) (The
    Guardian)
  Disasters and accidents:
  - December 2017 Southern California wildfires
  - More evacuations are ordered as surging Santa Ana winds drive the 40-percent contained
    Thomas Fire, now the third-largest in California history, further westward in
    Santa Barbara County. (Reuters) (The Hill)
  - Six people are killed, including Hilda Hernández, sister of Honduran President
    Juan Orlando Hernández, in a helicopter accident that was headed to Comayagua
    from Toncontín International Airport in Tegucigalpa. (Reuters)
  - Five people are killed and at least 15 missing in a mudslide in Villa Santa Lucía,
    a remote village in southern Chile, after more than 4.5 inches (11.4 cm) of rain
    the previous 24 hours. President Michelle Bachelet declares a state of emergency.
    Sunday is the run-off election for Chile's next president. (BBC) (The Washington
    Post)
  Politics and elections:
  - Politics of Australia
  - The Coalition keep a one-seat majority in the Australian House of Representatives
    after the Liberals win the Bennelong by-election. (The Guardian)
  - Politics of South Africa
  - Thousands of delegates of the African National Congress gather in Johannesburg
    to elect a party leader, who may replace President Jacob Zuma before his term
    expires in 2019. (AP via Newser)
  Science and technology:
  - Advanced Aviation Threat Identification Program
  - The existence of a U.S. government program that investigated reports of UFOs is
    revealed. (The New York Times)
  Sports:
  - 2017–18 NHL season
  - NHL 100 Classic
  - In ice hockey, a outdoor game is held at Ottawa's Lansdowne Park in Canada to
    celebrate the 100th anniversary of the National Hockey League, which was formed
    in November 1917. The Ottawa Senators win the game in a 3-0 shutout against the
    Montreal Canadiens with Ottawa goalie Craig Anderson registering 28 saves. (Sportsnet)
    (CBC) (NHL.com)
  - 2017 FIFA Club World Cup
  - Real Madrid wins the FIFA Club World Cup for the second time, beating Grêmio 1–0
    in the final. Real Madrid becomes the first team to win the tournament back to
    back. (BBC)
