Date: '2017-12-02'
Source_URI: Portal:Current events/2017 December 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli involvement in the Syrian Civil War
  - Israel launches surface-to-surface missiles at a military installation outside
    the Syrian capital Damascus overnight, Syrian state TV reports. (BBC)
  Arts and culture:
  - ABC News suspends journalist Brian Ross for four weeks without pay as a consequence
    for an erroneous report on Michael Flynn. (CNBC)
  Disasters and accidents:
  - Heavy rainfall causes flooding in southern Albania. At least one person has died
    and 3,000 houses have been flooded. (Fox News)
  - 2017 North Indian Ocean cyclone season
  - Cyclone Ockhi hits southern India causing 13 deaths in Tamil Nadu and Kerala.
    The cyclone kills 15 people and displaces another 200,000 persons in Sri Lanka.
    (NDTV) (Economy Next)
  International relations:
  - Bangladesh–Holy See relations, Rohingya refugees in Bangladesh
  - Pope Francis ends his six-day trip to Myanmar and Bangladesh by visiting the Rohingya
    refugees in Dhaka. (AFP)
  - Saudi Arabian-led intervention in Yemen
  - The former president of Yemen Ali Abdullah Saleh suggests that he is open to talking
    to the Saudi-led coalition that his forces have been fighting for years. (BBC)
  - United States and the United Nations
  - The Trump administrations withdraws the United States from the Global Compact
    on Migration of the United Nations. (Voice of America)
  Politics and elections:
  - Tax Cuts and Jobs Act of 2017
  - The United States Senate passes the Republican tax reform bill with a 51–49 vote.
    (CNN)
  Science and technology:
  - Voyager program
  - Voyager 1 successfully fires backup maneuvering thrusters, that had previously
    remained inactive for 37 years. Those thruster firings are to keep the spacecraft's
    antenna pointed at Earth, which is vital to maintain communications. (Ars Technica)
