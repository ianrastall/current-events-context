Date: '2017-12-09'
Source_URI: Portal:Current events/2017 December 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - United States recognition of Jerusalem as Israeli capital
  - Hundreds of people protest on the West Bank and in Gaza for the third day in a
    row. (BBC)
  - Iraqi Civil War (2014–2017), American-led intervention in Iraq (2014–present),
    Iraq–United States relations
  - Iraq announces that its war against Islamic State (IS) is over. The United States
    Department of State welcomes the end of the "vile occupation" and says that the
    fight continues. (BBC)
  Arts and culture:
  - Egyptology
  - Archaeologists in Egypt display items, including figurines, masks and a mummy,
    from one of two previously unexplored tombs, Kampp 150 and Kampp 161, in the ancient
    Nile city of Luxor. (BBC) (National Geographic)
  - Presidency of Donald Trump
  - The New York Times reports that Donald Trump spends at least four hours a day
    watching the news on television. He watches CNN, Fox News and MSNBC. (The Hill)
  Business and economy:
  - The 1.6-hectare populated hamlet of Alwine in Uebigau-Wahrenbrück district, Germany,
    is sold for 140,000 € at a public auction. (AFP via Daily Nation)
  Sports:
  - 2017 MLS Cup
  - In association football, Toronto win their first MLS Cup defeating the Seattle
    Sounders 2–0 in the final, becoming the first MLS team to complete the domestic
    treble. (AFP via Yahoo!)
