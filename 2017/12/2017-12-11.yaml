Date: '2017-12-11'
Source_URI: Portal:Current events/2017 December 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 New York City Subway bombing
  - An attempted terrorist attack occurs when a homemade pipe bomb worn by a man explodes
    near New York City's Port Authority Bus Terminal. Three people, as well as the
    attacker, are injured. The suspect, identified as Akayed Ullah, is in custody.
    (The New York Times) (CNN)
  - Russian military intervention in the Syrian Civil War
  - During a visit to Syria, his first, President Vladimir Putin announces that a
    significant part of Russian forces will withdraw from Syria now that ISIL has
    been defeated in the country. (BBC) (RT)
  Arts and culture:
  - Cinema of Saudi Arabia
  - The Ministry of Culture of Saudi Arabia announces that it will lift a ban on commercial
    cinemas that has lasted more than three decades. (BBC)
  Business and economy:
  - Economy of the United Kingdom
  - A £6 billion ($8 billion) deal to sell 24 Eurofighter Typhoons to Qatar is announced.
    (BBC)
  Disasters and accidents:
  - December 2017 Southern California wildfires
  - The Thomas Fire is the fifth largest in modern Californian history. (NPR)
  Law and crime:
  - Transgender personnel in the United States military
  - U.S. District Judge Colleen Kollar-Kotelly denies a Trump administration request
    to enforce the ban on transgender troops while this case is under appeal, thereby
    reaffirming her order that requires the U.S. military to accept transgender recruits
    effective January 1, 2018. (Reuters)
  - 2016 Turkish coup d'état attempt and following purges in Turkey
  - Turkey's state news agency announces that prosecutors in Istanbul have requested
    life sentences against six people, including journalist brothers Ahmet and Mehmet
    Altan and chronicler Nazli Ilicak. One of the accusations is reportedly "having
    committed a crime in the name of a terror organization without being a member
    of it." (Yenisafak) (RTBF)
  Politics and elections:
  - Hezbollah political activities
  - Hassan Nasrallah, the Secretary-General of Hezbollah, vows to return to Israel.
    Tens of thousands of people demonstrate in South Beirut. (VRT)
  - Ukrainian crisis
  - Ukrainian opposition leader Mikheil Saakashvili is freed from detention following
    Judge Larysa Tsokol's dismissal of prosecutors’ house arrest request. (Reuters)
  - Politics of India
  - Rahul Gandhi is elected unopposed as the head of the opposition Congress Party.
    On 16 January 2018, he is to take over the reins from his mother Sonia Gandhi,
    who held the position for 19 years. (Al Jazeera) (The Times of India)
  - Politics of France
  - Corsican nationalists demand talks with the French government after a convincing
    win in the second round of elections for a reformed regional government in Corsica.
    (The Guardian)
  Science and technology:
  - British Antarctic Territory
  - Mount Hope, in a disputed region of Antarctica, is found to be the highest mountain
    in territory claimed by the United Kingdom. Ben Nevis in Scotland is the highest
    mountain in the United Kingdom. (BBC)
  - Space policy of the United States
  - U.S. President Donald Trump signs the "Space Policy Directive 1" that establishes
    the foundation for a crewed mission to the Moon, while also maintaining a longer-term
    NASA goal of landing a man on Mars. (Reuters)
  - Male homosexuality
  - The Y-linked protein NLGN4Y transfer from an older brother to a younger by transfer
    through the mother's womb, the mother's bloodstream, and her created antibodies
    reaching her next male fetus' brain, together appear to influence the gayness
    of the next brother. (CNN) (PNAS)
