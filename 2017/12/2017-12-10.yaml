Date: '2017-12-10'
Source_URI: Portal:Current events/2017 December 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - A 24-year-old Palestinian stabs and seriously wounds an Israeli security guard
    at Jerusalem's Central Bus Station. The attacker is arrested. (Reuters) (The Washington
    Post) (The Independent)
  Arts and culture:
  - Iraqi Civil War
  - An Iraqi military parade in Baghdad celebrates final victory over the Islamic
    State of Iraq and the Levant. Prime Minister Haider al-Abadi declares December
    10 an annual national holiday. (Reuters)
  Disasters and accidents:
  - 2017 California wildfires
  - New evacuations are ordered as the fires spread toward a string of California
    coastal cities. Santa Ana winds and rugged mountain terrain continue to hamper
    firefighting efforts. Authorities report the Thomas Fire is only 15 percent contained.
    (Los Angeles Times) (Reuters)
  Law and crime:
  - Capital punishment in Iran
  - The spying charge death sentence against Vrije Universiteit Brussel guest-lecturer
    Ahmadreza Djalali is now executable, since his Iranian lawyer did not appeal the
    verdict and sentence within the required three-week limit. (De Standaard) (VRT)
  Politics and elections:
  - Venezuelan presidential election, 2018
  - Venezuelan President Nicolás Maduro, who is up for re-election, bans the main
    opposition parties, Justice First, Democratic Action and Popular Will from running
    in next year's presidential election. (BBC)
  Science and technology:
  - Severe acute respiratory syndrome
  - Scientists at the Wuhan Institute of Virology trace the source of the deadly 2002–04
    SARS virus outbreak, which killed 774 people in 37 countries, to a colony of cave-dwelling
    horseshoe bats in China's Yunnan province. (The Guardian)
  Sports:
  - 2017–18 Premier League
  - Manchester City beat local rivals Manchester United 2–1 at Old Trafford to set
    a new record for successive victories in English top-flight games, breaking the
    record of 13 successive league wins in a single season set by Chelsea, Arsenal,
    Preston North End and Sunderland. (Metro) (BBC)
