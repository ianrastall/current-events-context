Date: '2017-12-29'
Source_URI: Portal:Current events/2017 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saint Menas church attack
  - Nine people are killed in two coordinated attacks targeting Coptic Christians
    in Egypt. Two of the victims are killed by a gunman in a Coptic-owned appliance
    store in the Helwan area of Cairo. The gunman then moves to a church where he
    kills a further six civilians and a policeman before being arrested. (BBC)
  Business and economy:
  - Venezuelan communications director Jorge Rodríguez announces that the country's
    Petro cryptocurrency, backed by 5.3 billion barrels of oil worth $267 billion,
    will launch shortly. (CNBC)
  Disasters and accidents:
  - Kamala Mills fire
  - At least 15 people are killed in a rooftop restaurant fire in Mumbai, India. (AP)
  Politics and Elections:
  - 2017 Iranian protests
  - Anti-government demonstrators have taken to the streets of Iran for a second day,
    with protests being held in a number of cities. (BBC)
  - Politics of Mali
  - In a surprising event, Malian Prime Minister Abdoulaye Idrissa Maïga and his government
    resign without providing a reason. (The Guardian)
