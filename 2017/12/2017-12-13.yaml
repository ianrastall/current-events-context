Date: '2017-12-13'
Source_URI: Portal:Current events/2017 December 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - At least 30 people are reported to have been killed in Saudi-led coalition air
    strikes on a rebel military police camp in Yemen's capital, Sanaa. (BBC)
  - Israeli–Palestinian conflict
  - Militant Palestinians fire rockets towards Israel from the Gaza Strip. The Israel
    Defense Forces say that the Iron Dome system intercepted two missiles, while one
    rocket fell in a flat open area and nobody was hurt. (Het Laatste Nieuws)
  - The leader of Hamas, Ismail Haniyeh, calls for a new revolt or intifada. (Het
    Laatste Nieuws)
  Arts and culture:
  - Rohingya persecution in Myanmar
  - Dublin City Councillors vote 59–2 to revoke the Freedom of the City of Dublin
    given to Myanmar's Aung San Suu Kyi for her apparent failure to protect the Rohingya
    minority from violence. Singer Bob Geldof returned his Freedom one month ago,
    protesting that Suu Kyi also held the honour. (The Guardian) (The Guardian)
  Disasters and accidents:
  - Marine Corps Air Station Futenma
  - A 17-pound (8 kg) CH-53E transport helicopter window lands on school grounds in
    Okinawa, Japan, marking the second time in less than a week that an American aircraft
    part has fallen on a school there. Today, a child sustains "minor injuries". The
    United States Marine Corps apologizes. (ABC News)
  Law and crime:
  - Proclamation No. 216
  - The Congress of the Philippines votes to approve President Rodrigo Duterte's request
    to extend the declaration of martial law in Mindanao until December 31, 2018.
    (AFP)
  - Operation Car Wash
  - Ecuadorian Vice President Jorge Glas is sentenced to six years imprisonment for
    financial corruption involving the Brazilian construction company Odebrecht. The
    decision will not be enforced until the court confirms the ruling. The court's
    decision can be appealed. (BBC News) (El Universo)
  - Rohingya insurgency in Western Myanmar
  - Two Reuters journalists are arrested in Myanmar for trying to illegally obtain
    official documents. They were reporting about the Rohingya Muslim community in
    Rakhine State. (The New York Times)
  Politics and elections:
  - Politics of the United States
  - Minnesota Governor Mark Dayton announces the appointment of Lt. Gov. Tina Smith
    to replace resigning Sen. Al Franken in the United States Senate. (St. Paul Pioneer
    Press)
  - Politics of the United Kingdom
  - Prime Minister Theresa May suffers a 309–305 defeat, her first, in the House of
    Commons when MPs from both major parties approve an amendment to the Brexit bill
    subjecting a Brexit agreement to a preliminary vote by Parliament. (The Guardian)
    (BBC)
  - 2017 United States political sexual scandals
  - Kentucky state legislator Dan Johnson, who had been accused of sexual assault
    of a teenager, dies of a gunshot wound, an apparent suicide. (AP)
  Sports:
  - Road cycling
  - professional cyclist Chris Froome returns a non-negative result for asthma medication
    salbutamol, during the Vuelta a España in September. (Cyclingnews.com)
