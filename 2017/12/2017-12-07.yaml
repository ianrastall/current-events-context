Date: '2017-12-07'
Source_URI: Portal:Current events/2017 December 7
Intelligence_Payload:
  International relations:
  - Positions on Jerusalem
  - The Czech Republic recognizes West Jerusalem as Israel's capital "in practice".
    (Czech Ministry of Foreign Affairs)
  - Philippine President Rodrigo Duterte expresses interest in moving his country's
    embassy from Tel Aviv to Jerusalem. (Haaretz)
  - Greek–Turkish relations
  - The President of Turkey embarks on a two-day state visit of Greece. Recep Tayyip
    Erdoğan's démarche is a first in 65 years. (The Guardian) (Reuters)
  - European migrant crisis, Treaty on European Union
  - The European Commission orders Poland, the Czech Republic and Hungary to court
    over their refusal to incorporate more refugees. This is the third step in a process
    that may lead to fines and loss of the countries' voting rights in the European
    Union. (De Standaard) (Die Zeit)
  - Economic globalization
  - Fifteen countries ask the World Trade Organization a mandate to negotiate binding
    rules on e-commerce, days after India turned down negotiations. (Economic Times)
  Law and crime:
  - Same-sex marriage in Australia
  - The Parliament of Australia votes to make same-sex marriage legal in Australia.
    (The Australian)
  - 2017 Aztec High School shooting
  - Three people, including the gunman, are killed in a school shooting at Aztec High
    School in New Mexico. (MSN)
  - 2016–17 purges in Turkey
  - Peoples’ Democratic Party’s co-chair Selahattin Demirtaş remains behind bars until
    the next hearing, scheduled for February 14, 2018. He risks 142 years in prison.
    (Turkey Purge)
  - Aftermath of the AMIA bombing
  - In a 491-page ruling, a court indicts former President of Argentina Cristina Fernández
    for treason and orders for her arrest for "trying to cover up Iran's possible
    role in the 1994 bombing of a Jewish community center that killed 85 people".
    Former foreign affairs minister Héctor Timerman is also concerned. Both have previously
    denied wrongdoing. (Reuters)
  Politics and elections:
  - 2017 United States political sexual scandals
  - United States Senator Al Franken announces that he will resign "in the coming
    weeks" amid sexual harassment allegations. (Time)
  - Arizona Congressman Trent Franks announces that he will resign on January 31,
    2018. This announcement comes after two of his employees filed a complaint about
    his conduct, and the House Ethics Committee opened a sexual harassment investigation.
    (Fox News)
  - Nepalese legislative election, 2017
  - Voters in Nepal go to the polls for the second round of a historic legislative
    election. The turnout is 67%, up from 65% in the first round. (Foreign Affairs)
    (Economic Times)
  - Cabinet of Germany
  - The Social Democratic Party congress votes to start talks on "whether and in what
    form" to support a new federal government. (The Washington Post)
  - Politics of Poland
  - Polish Prime Minister Beata Szydło resigns just hours after surviving an opposition
    no-confidence motion. She will be replaced by Finance Minister Mateusz Morawiecki,
    according to the ruling Law and Justice party. (BBC)
  Sports:
  - UEFA Euro 2020
  - Eurostadium in Brussels, Belgium, is unselected as a host for the UEFA Euro 2020
    football competition, ceding its place for group stage matches to Wembley Stadium
    in London, England. Prime Minister of Belgium Charles Michel says the city made
    the error of wanting to build a stadium outside its territory. (voetbalnieuws.be)
    (VRT)
