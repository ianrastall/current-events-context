Date: '2017-12-30'
Source_URI: Portal:Current events/2017 December 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Egypt (2013–present)
  - Three suspected militants are killed and ten others are arrested by Egyptian security
    forces in Giza. (Reuters)
  - Ukrainian crisis
  - A man strapped with explosives takes 11 people hostage in Kharkiv, Ukraine. The
    Ukrainian police free all the hostages and arrest the man. (Reuters)
  Arts and culture:
  - Nepal bans solo climbers, double amputees and blind climbers from scaling its
    mountains, including Mount Everest, in a bid to reduce accidents. This has been
    criticized by successful double-amputee Everest climbers. (BBC)
  Disasters and accidents:
  - Ten people are killed and two are injured in a car crash near Acapulco, Mexico.
    (Reuters)
  Law and crime:
  - Two security officers are killed in a shooting at the hotel-casino Arizona Charlie's
    Decatur in Las Vegas. (KVVU-TV)
  Politics and elections:
  - 2017 Iranian protests
  - Two protesters are shot dead by Iranian police in Dorud, Lorestan Province, as
    anti-government protests spread across the country. (Reuters)
