Date: '2017-12-01'
Source_URI: Portal:Current events/2017 December 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Peshawar Agriculture Directorate attack
  - Four attackers storm the Directorate of Agricultural Training Institute in Pakistan
    and exchange fire with police and army personnel. The four attackers are killed
    in the attack, and at least 12 people are killed and 35+ are injured. Tehrik-i-Taliban
    Pakistan claims responsibility. (Arab News)
  Business and economy:
  - Economics of bitcoin
  - The U.S. Commodity Futures Trading Commission gives a go-ahead for Bitcoin futures
    to trade on the Chicago Mercantile Exchange and Chicago Board Options Exchange.
    (Fortune)
  Health and environment:
  - 2017 Philippine dengue vaccination crisis
  - The Philippine Department of Health temporarily suspends a school-based dengue
    vaccination program after Dengvaxia vaccine maker Sanofi Pasteur made a statement
    that its product poses higher risks to people without prior dengue infection.
    (Rappler) (Philippine Daily Inquirer)
  Law and crime:
  - Links between Trump associates and Russian officials
  - Michael Flynn, former U.S. National Security Advisor to President Donald Trump,
    pleads guilty to one count of making a false statement to the FBI about his contacts
    with Russian officials. It is also announced that Flynn will cooperate with Robert
    Mueller's Special Counsel investigation. (The New York Times) (New York Daily
    News)
  Politics and elections:
  - Aftermath of the 2017 Honduran general election
  - The government of Honduran President Juan Orlando Hernández, who is seeking re-election,
    imposes a ten-day curfew after allegations of electoral fraud and calls for an
    election recount resulted in violent protests across the country. (AP via ABC
    News)
  - Abdication of Emperor Akihito
  - Emperor Akihito announces his intentions to abdicate the throne on April 30, 2019.
    (CNN)
  Science and technology:
  - A 100-megawatt Tesla Powerpack system, which is the world's largest lithium-ion
    battery, is launched in Jamestown, South Australia. (AP via The Guardian)
  Sports:
  - 2018 FIFA World Cup seeding
  - The draw for the 2018 FIFA World Cup takes place at the State Kremlin Palace in
    Moscow, Russia. (The Telegraph)
