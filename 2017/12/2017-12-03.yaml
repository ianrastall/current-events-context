Date: '2017-12-03'
Source_URI: Portal:Current events/2017 December 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Battle of Sana'a (2017)
  - The Royal Saudi Air Force bombs Houthi positions in southern Sana'a in support
    of Ali Abdullah Saleh-headed General People's Congress. (Reuters)
  Business and economy:
  - Venezuelan President Nicolás Maduro announces the creation of the petro cryptocurrency
    in a bid to ease the country's ongoing socioeconomic crisis. (BBC)
  Disasters and accidents:
  - A 10-tonne fishing boat collides with a 336-tonne fuel tanker near Yeongheung
    Island, South Korea, killing 13 of the 22 people on board the fishing boat. Two
    people remain missing. (Radio New Zealand)
  International relations:
  - History of the Communist Party of China
  - General Secretary of the Communist Party of China Xi Jinping concludes a two-day
    "high-level dialogue" with party leaders from 120 countries. The program he announces
    includes the full funding by the Communist Party of China of 15,000 visits from
    foreign party leaders over the next five years "to deepen exchanges". (The Australian)
  Law and crime:
  - In Tel Aviv, up to 20,000 people demonstrate in front of the home of the Attorney
    General of Israel, Avichai Mandelblit, against the slow pace of corruption investigations
    against Prime Minister of Israel Benjamin Netanyahu. (Newsweek)
  - The lawyer of Ahmed Shafiq, a candidate for the spring 2018 presidential elections
    in Egypt, says she met him in a hotel room in Cairo following his arrest the day
    before in Dubai, U.A.E., after saying earlier today that his family didn't know
    his whereabouts. (Ahram Online) (BBC)
  Politics and elections:
  - Corsican territorial election
  - The pro-autonomy coalition party Pè a Corsica obtains 45% of the votes in the
    first round of the Corsican Assembly elections preceding the replacement of the
    departments of Haute Corse and Corse-du-Sud and the region of Corsica, France,
    with a single territorial collectivity. Two "miscellaneous right" parties and
    La République En Marche! also achieve the 7% election threshold to reach the second
    round. (France TV Info) (France 3) (Los Angeles Times)
  - Ukrainian crisis
  - Several thousand opposition supporters demonstrate in central Kiev, calling for
    the parliament to adopt legislation on presidential impeachment. (RFE/RL)
  Sports:
  - Sri Lankan cricket team in India in 2017–18
  - Sri Lanka cricket players take to wearing masks to combat smog pollution that
    disrupts the third Test against India in Delhi. (BBC)
  - The Pontiac Silverdome, former home of the NFL's Detroit Lions and the NBA's Detroit
    Pistons, was to be partially imploded as part of its planned demolition; however,
    approximately 10% of the explosives do not detonate, and the attempted implosion
    fails. (NBC) (The New York Times)
