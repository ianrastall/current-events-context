Date: '2017-12-24'
Source_URI: Portal:Current events/2017 December 24
Intelligence_Payload:
  Disasters and accidents:
  - Typhoon Tembin
  - Officials raise the death total from this storm to 182, with at least 153 people
    missing and more than 70,000 displaced. (Malay Mail)
  International relations:
  - Positions on Jerusalem
  - Guatemalan President Jimmy Morales says he will move his country's Israeli embassy
    from Tel Aviv to Jerusalem. (Reuters)
  - Transport in Tunisia
  - Tunisia's Transport Ministry suspends Emirates Airlines flights to Tunis. (Deutsche
    Welle)
  - Sanctions against North Korea
  - North Korea’s foreign ministry, in an official statement, says the latest United
    Nations sanctions are an act of war and are, in effect, a complete economic blockade.
    (Reuters)
  Law and crime:
  - Pardon of Alberto Fujimori
  - Peruvian President Pedro Pablo Kuczynski pardons Alberto Fujimori, who was serving
    a 25-year sentence for corruption and human rights violations. (BBC)
  Politics and elections:
  - 2016–17 purges in Turkey
  - The Turkish government dismisses 2,756 public servants for alleged links to organizations
    involved in the July 2016 Turkish coup d'état attempt. (France 24)
  Science and technology:
  - China's AVIC AG600, the world's largest amphibious aircraft, makes its maiden
    flight. State-owned Aviation Industry Corporation of China (AVIC) has spent almost
    eight years developing the aircraft, which is designed to carry out marine rescues
    and battle wildfires. (BBC)
