Date: '2017-12-27'
Source_URI: Portal:Current events/2017 December 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass, Minsk II
  - Ukraine exchanges hundreds of prisoners with the Donetsk People's Republic and
    Luhansk People's Republic. (BBC)
  - Perekrestok supermarket bombing
  - A bomb goes off in a supermarket in the Russian city of Saint Petersburg, injuring
    at least 10 people. Police say they are treating the blast as an attempted terror
    attack. Social media accounts linked to ISIL have claimed responsibility. (Reuters)
  International relations:
  - Israel–United States relations
  - Israel's Transportation Minister Yisrael Katz says that the new underground railroad
    terminal in the Jewish Quarter in the Old City of Jerusalem (part of East Jerusalem)
    will be named in honor of U.S. President Donald Trump. (Jerusalem Post)
  - Positions on Jerusalem
  - The Iranian Parliament votes 207–0 to declare Jerusalem the "everlasting capital"
    of Palestine. (The Times of Israel)
  - North Korea and weapons of mass destruction
  - North Korea is building its first operational ballistic missile submarine on an
    “accelerated schedule,” according to the US-Korea Institute of Johns Hopkins School
    of Advanced International Studies. (The Christian Science Monitor)
