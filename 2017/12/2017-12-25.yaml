Date: '2017-12-25'
Source_URI: Portal:Current events/2017 December 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide blast near the National Directorate of Security headquarters in Kabul
    kills 10. Amaq News Agency claims ISIL is responsible for the attack. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - More than 70 civilians are believed to have been killed in two-days of airstrikes
    by the Royal Saudi Air Force targeting Houthi forces. (Al Jazeera)
  Disasters and accidents:
  - At least 19 people are killed and 25 others injured in a jeepney-bus collision
    in La Union, Philippines. (CNN) (Philippine Daily Inquirer)
  - A public transport bus crashes into Slavyansky Bulvar subway station entrance
    in Moscow, Russia, killing four and injuring eleven. (BBC)
  Politics and elections:
  - Russian presidential election, 2018
  - The Russian Central Election Commission refuses to register opposition leader
    Alexei Navalny as a candidate in the presidential election due to a previous embezzlement
    conviction, which he claims is politicized. Navalny has called for his supporters
    to boycott the upcoming election in response. (BBC)
