Date: '2017-12-28'
Source_URI: Portal:Current events/2017 December 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - December 2017 Kabul suicide bombing
  - A suicide bombing at a Shi‘ite cultural center and news agency in Kabul, Afghanistan,
    kills 41 people and injures 84 others. ISIL-affiliated Amaq News Agency says this
    group is responsible. (Reuters) (CNN)
  - Libyan Civil War (2014–present)
  - Battle of Benghazi (2014–2017)
  - The Libyan National Army declares full control of Benghazi, the country's second
    largest city, after retaking the last district held by Islamist militants. (Reuters)
  - Syrian Civil War
  - The White Helmets reports that Syrian government and Russian warplanes, using
    rockets and internationally-banned weapons - including vacuum bombs, repeatedly
    strike residential areas in the town of Al-Lataminah and six villages in Idlib
    province, killing 22 people. (Daily Sabah)
  Culture and media:
  - Barack Obama and Hillary Clinton are voted the most admired man and woman in the
    United States, according to Gallup's annual poll. (CNN)
  Disasters and accidents:
  - Twelve people are dead in an apartment fire in The Bronx area of New York City.
    (AP via Yahoo!)
  International relations:
  - Turkey–United States relations
  - United States consular missions in Turkey and the Embassy of Turkey, Washington,
    D.C. announce they will resume visa services. (France 24)
  Law and crime:
  - Crime in the Philippines
  - In Mandaluyong, Philippines, law enforcers mistakenly fired at a Mitsubishi Adventure,
    which they thought carried suspects in a previous shooting incident, resulting
    in two people dead and two others injured. As a result, 10 police officers were
    relieved from the post. (GMA News)(Philippine Daily Inquirer)
  - Same-sex marriage in the United States
  - The Oregon Court of Appeals upholds a $135,000 fine against the owners of Sweet
    Cakes by Melissa in Sweet Cakes by Melissa v. Oregon Bureau of Labor and Industries
    for refusing to make a wedding cake for a same-sex couple. A similar case, Masterpiece
    Cakeshop v. Colorado Civil Rights Commission has reached the Supreme Court of
    the United States with a decision expected in June 2018. (NBC News)
  - 2017 Wichita, Kansas swatting
  - Police shoot and kill a man in Wichita, Kansas, after a hoax emergency call sends
    them there. (BBC)
  Politics and elections:
  - Liberian general election, 2017
  - With 98 percent of the votes counted, Liberia’s National Elections Commission
    announces these unofficial results show Senator George Weah, a former Pro footballer,
    defeating vice president Joseph Boakai, 61.5 to 38.5 percent, in the runoff of
    October's presidential election, to succeed Ellen Johnson Sirleaf, the first female
    Liberian president. (The New York Times)
