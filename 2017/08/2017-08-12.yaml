Date: '2017-08-12'
Source_URI: Portal:Current events/2017 August 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Seven members of the White Helmets are shot dead by unidentified gunmen who stormed
    their office in rebel-held Sarmin, in northwestern Syria. (CNN)
  - War in North-West Pakistan
  - August 2017 Quetta suicide bombing
  - A suicide bombing took place near a Pakistan army truck in Quetta, Balochistan,
    Pakistan, leaving 15 people dead including 8 soldiers, while injuring 40 others.
    (The Guardian)
  - Unite the Right rally
  - Fights break out between white supremacists and counterprotesters in Charlottesville,
    Virginia, over the removal of the Robert Edward Lee Sculpture. One person is killed
    and several people are injured after a man drove his car into a crowd of counterprotesters.
    (CNN) (BBC) (The Independent)
  - The Governor of Virginia declares a state of emergency due to the protests. (CNN)
  - A Virginia State Police helicopter monitoring protests crashes, killing two officers
    onboard. (NBC News)
  Disasters and accidents:
  - August 2017 Nepal and India floods
  - Flooding in Nepal leaves at least 36 dead and dozens more missing. (Hindustan
    Times)
  International relations:
  - 2017 China–India border standoff
  - India increases its military alert amid a border standoff with the People's Liberation
    Army of China at Doklam. (Bloomberg)
