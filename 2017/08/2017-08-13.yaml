Date: '2017-08-13'
Source_URI: Portal:Current events/2017 August 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - During combat operations in northern Iraq, two U.S. service members are killed
    and five injured. (Reuters)
  - Syrian Civil War
  - Central Syria campaign
  - A Syrian Army commando unit backed by Russian warplanes and helicopters kills
    25 ISIL militants in Central Syria, in the northeast of the Homs Governorate.
    (AFP via Yahoo!)
  - 2017 Ouagadougou attack
  - At least 17 people, including two Canadians, are reported dead and eight others
    injured in an attack on a Turkish themed restaurant in Ouagadougou, the capital
    of Burkina Faso. (RT) (Reuters)
  Disasters and accidents:
  - Earthquakes in 2017
  - A magnitude 6.4 earthquake occurs off the Indonesian island of Sumatra. There
    are no reports of casualties or structural damage to buildings. (Reuters via Channel
    NewsAsia)(US Geological Survey) (AP via The Washington Post)
  - August 2017 Nepal and India floods
  - At least 44 are killed in a landslide on a highway in the northern India province
    of Himachal Pradesh. (The Hindu)
  - Monsoon floods and landslides have killed a total of 74 people in India and Nepal.
    (MSN)
  Sports:
  - 2017 PGA Championship
  - In golf, American Justin Thomas wins the PGA Championship for his first career
    major title. (AP via ESPN)
