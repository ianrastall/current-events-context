Date: '2017-08-28'
Source_URI: Portal:Current events/2017 August 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Syrian Civil War spillover in Lebanon
  - Qalamoun offensive (July–August 2017)
  - ISIL militants and their families, estimated to be around 600 people, begin to
    leave their strongholds on the Lebanon–Syria border and Qalamun Mountains for
    the Deir ez-Zor Governorate under Syrian military escort. A ceasefire was reached
    between warring parties yesterday. (Reuters)
  Disasters and accidents:
  - Hurricane Harvey
  - At least eight people have died in the American state of Texas with 30,000 residents
    in the city of Houston expected to seek temporary shelter. (Los Angeles Times)
  International relations:
  - 2017 China–India border standoff
  - India and China agree to end a two month-long stand-off with the withdrawal of
    Indian troops. The stand-off began in June after China began constructing a road
    in the disputed territory of Doklam which is claimed by both China and Bhutan.
    (news.com.au)
  Law and crime:
  - Same-sex marriage in Chile
  - Chilean President Michelle Bachelet sends a bill to Congress for the legalization
    of same-sex marriage in Chile and adoption by same-sex couples, two years after
    recognizing civil unions for both same-gender and different-gender couples. (Reuters)
  - Crime in Germany
  - Investigations concerning Niels Högel, a German nurse already convicted for murdering
    two of his patients, revealed that the number of people killed while in his care
    is significantly higher, reaching at least 84, with some estimates being even
    higher. This makes Högel the serial killer with the highest known victim count
    in modern German history. (New York Times)
  - Crime in New Mexico
  - Two people are killed and four are hospitalized in a shooting in a library in
    the U.S. town of Clovis, New Mexico. (Reuters)
  - Crime in Mexico
  - Mexican authorities say two suspected thieves died after a mob beat them and four
    others in Tlatlauquitepec, Puebla, Mexico. (Reuters)
