Date: '2017-08-05'
Source_URI: Portal:Current events/2017 August 5
Intelligence_Payload:
  Disasters and accidents:
  - 2017 V-22 Osprey crash
  - Searches are underway for three members of the United States Marine Corps missing
    after a MV-22 Osprey crashed off the coast of the Australian state of Queensland.
    Twenty three of the twenty six people on board have been rescued. (AP) (9 News)
  International relations:
  - North Korea and the United Nations, United Nations Security Council Resolution
    2371
  - The United Nations Security Council votes 15–0 to impose sanctions on North Korea
    for its intercontinental ballistic missile tests. (Reuters)
  Law and crime:
  - Crime in Minnesota
  - An improvised explosive device goes off at a mosque in Bloomington, Minnesota.
    No injuries were reported, and the FBI is investigating the case. (CNN)
  Politics and elections:
  - Mauritanian constitutional referendum, 2017
  - Voters in Mauritania participate in a referendum on whether to amend the Constitution
    of Mauritania, with the abolition of the Senate and addition of red bands to the
    flag of Mauritania among the most significant proposed changes. The OCHR has criticised
    Mohamed Ould Abdel Aziz's government for apparent suppression of opposition protests.
    (Al Jazeera)
  - Second inauguration of Hassan Rouhani
  - Iranian President Hassan Rouhani takes the oath of office to start his second
    four-year term. (Financial Tribune)
  - Indian vice-presidential election, 2017
  - Venkaiah Naidu elected as India's 13th Vice-President of India.(NDTV)
  - 2017 Venezuelan constitutional crisis
  - The new Constituent Assembly votes to remove Attorney General Luisa Ortega Díaz,
    a prominent critic of President Nicolás Maduro, from her post. The move comes
    hours after troops from the National Guard surrounded her home in Caracas. (Al
    Jazeera)
