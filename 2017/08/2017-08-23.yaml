Date: '2017-08-23'
Source_URI: Portal:Current events/2017 August 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - At least 35 people are killed in an air strike that hit a hotel near a Houthi-run
    checkpoint north of the Yemeni capital Sanaa. (Reuters via Channel NewsAsia)
  Business and economy:
  - Nuclear weapons and the United States
  - The U.S. Air Force awards Raytheon and Lockheed contracts to work on the new Long
    Range Standoff weapon, the replacement for the AGM-86B air-launched nuclear cruise
    missile. (Reuters)
  Disasters and accidents:
  - Aftermath of the USS John S. McCain collision
  - The United States Navy relieves vice admiral Joseph Aucoin as commander of the
    United States Seventh Fleet following four collisions in Asia this year that claimed
    the lives of 17 sailors. (New York Times) (Wall Street Journal)
  - Auraiya train derailment
  - A passenger train collided with a dump truck on the line at Auraiya, India, and
    was derailed. Twenty-five people were injured. (The Hindu)
  - Earthquakes in 2017
  - Two people die in an earthquake in Leyte, Philippines. (CNN Philippines)
  - 2017 Atlantic hurricane season
  - Hurricane and storm surge watches are issued for Texas and Louisiana as the tropical
    system Harvey strengthens into a tropical depression and is predicted to bring
    both heavy rainfall and storm surge. (The Weather Channel)
  Law and crime:
  - Disappearance of Kim Wall
  - A headless dismembered torso found washed ashore in Copenhagen two days ago is
    identified as Kim Wall. According to a police spokesperson, the body was deliberately
    mutilated and had metal attached to it so that it would not float. (Reuters via
    MSN) (BBC)
  Politics and elections:
  - Angolan legislative election, 2017
  - Voters in Angola go to the polls to elect 220 National Assembly members. The leader
    of the winning party will become the new president, following the retirement of
    José Eduardo dos Santos, who has held the role since 1979. (Al Jazeera)
