Date: '2017-08-24'
Source_URI: Portal:Current events/2017 August 24
Intelligence_Payload:
  Arts and culture:
  - Archaeology of Israel
  - A 6th century mosaic dated from the rule of Justinian I is discovered while installing
    communication cables in Jerusalem's Old City. (Reuters via ABC Australia)
  Disasters and accidents:
  - 2017 Pacific typhoon season
  - At least 12 people die in the southern Chinese city of Macau as a result of flooding
    caused by Typhoon Hato. Four more people die in neighbouring Guangdong province.
    (AP)
  - 2017 Atlantic hurricane season
  - Tropical depression Harvey becomes a hurricane, expected to make landfall on the
    Texas coast at Category 3, bringing life-threatening storm surge, rainfall, and
    wind hazards. (The Weather Channel) (National Hurricane Center)
  International relations:
  - Iran–Qatar relations
  - Qatar restores diplomatic ties with Iran. Tehran welcomes the move. (Financial
    Times)
  - Colombia–Venezuela relations, Censorship in Venezuela
  - Venezuela's National Commission of Telecommunications (Conatel) takes Colombian
    television channels Caracol Televisión and RCN Televisión off air due to their
    coverage of the 2017 Venezuelan constitutional crisis. (BBC)
  - Cuba–United States relations
  - The United States State Department says at least 16 U.S. government employees
    and family members based in Cuba showed physical symptoms from the previously
    reported acoustic attacks. Investigators are exploring whether some form of sonic
    attack was directed at diplomats' homes. (Reuters)
  Law and crime:
  - Philippine Drug War
  - The Philippine senate investigates the shooting of a 17-year old male student
    seemingly connected to the ongoing drug war. (Rappler)
