Date: '2017-08-11'
Source_URI: Portal:Current events/2017 August 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - ISIL forces raid an Iranian Islamic Revolutionary Guard Corps base in vast desert
    spaces of eastern Homs Governorate, Syria, manned by between 12 to 18 fighters,
    all but one of which are killed. (Almasdar News)
  Arts and culture:
  - Oldest men
  - The world's oldest man, Polish–Israeli Yisrael Kristal, who was also recognized
    as the oldest living Holocaust survivor, dies at age 113 years, 330 days, in Haifa,
    Israel. (BBC via MSN.com)
  - Hugo Award
  - The winners of the annual Hugo Awards are announced at the 75th World Science
    Fiction Convention in Helsinki. (The Guardian)
  Disasters and accidents:
  - Alexandria train collision
  - Two trains collide in Alexandria, Egypt, killing at least 41 people and injuring
    at least 179. (BBC)
  - Migrant crisis
  - At least 56 African migrants drown in the Red Sea while traveling from the Horn
    of Africa to Yemen. Human traffickers had forced 300 people aboard two boats into
    the sea. (AFP via Yahoo!)
  Health and medicine:
  - Gorakhpur hospital deaths
  - Over the past two days, 30 children from Baba Raghav Das Medical College have
    died, allegedly due to lack of oxygen supply to the wards. (The New York Times)
  International relations:
  - Cambodia–Laos relations
  - According to Cambodian Prime Minister Hun Sen, 30 Laotian soldiers cross the border
    into Steung Treng Province despite repeated requests for them to leave. Hun Sen
    gives Laos a six-day ultimatum to withdraw the soldiers or face a military response.
    (Al Jazeera)
  - Peru–Venezuela relations
  - Shortly after Peruvian President Pedro Pablo Kuczynski called Venezuelan President
    Nicolás Maduro a "dictator" in response to the Venezuelan constitutional crisis,
    Peru expels Venezuela's ambassador to Peru to protest Venezuela's recent formation
    of an all-powerful constituent assembly that has been widely condemned as a power
    grab by Maduro. (Reuters)
  Politics and elections:
  - Kenyan general election, 2017
  - The Kenyan electoral commission announces that President Uhuru Kenyatta has won
    re-election. Kenyatta leads ODM candidate Raila Odinga by more than 1.4 million
    votes. The opposition National Super Alliance rejects this finding as fraudulent.
    (NPR) (Reuters)
  - Military of the United States
  - Because of a recent pair of deadly crashes, the U.S. Marine Corps will ground
    its flight operations for 24 hours for an operational reset. The suspensions will
    be spread out over the next two weeks. (Reuters) (The New York Times)
  - Unite the Right rally
  - A white nationalist rally called "Unite the Right" takes place in Charlottesville,
    Virginia. (CNN)
