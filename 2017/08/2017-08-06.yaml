Date: '2017-08-06'
Source_URI: Portal:Current events/2017 August 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - Gunmen kill 11 worshipers in St Phillip's Catholic Church in the town of Ozubulu
    in Nigeria's Anambra State. (Reuters)
  - 2017 Venezuelan constitutional crisis
  - Armed men dressed as soldiers, apparently led by former National Guard captain
    Juan Carlos Caguaripano, attack a Venezuelan Army base near Valencia, Carabobo,
    declaring themselves in rebellion against the National Constituent Assembly and
    President Nicolás Maduro. At least two people are killed. (The Guardian) (Reuters)
  Business and economy:
  - Al Jazeera controversies and criticism
  - Israel plans to shut down all of Al Jazeera's operations in the country, alleging
    support of terrorism. (Reuters)
  Disasters and accidents:
  - 2017 V-22 Osprey crash
  - The search for three members of the United States Marines Corps lost in a MV-22
    Osprey crash in Shoalwater Bay in the Australian state of Queensland is called
    off. (Sky News)
  - 2017 Tulsa tornado
  - An EF-2 tornado strikes Tulsa, Oklahoma, injuring 30 people and damaging dozens
    of buildings. (Reuters)
  International relations:
  - Territorial disputes in the South China Sea
  - During one of the meetings of the 50th Association of Southeast Asian Nations
    Regional Forum at Manila, the foreign ministers of the member nations issued a
    communiqué "emphasizing the importance of non-militarisation and self-restraint,"
    ending an impasse regarding the disputes on the South China Sea. (Reuters)
  Sports:
  - 2017 CrossFit Games
  - Mathew Fraser and Tia-Clair Toomey win the 2017 CrossFit Games in Madison, Wisconsin,
    and claim the title of Fittest on Earth for individual men's and women's respectively.
    (Crossfit.com)
  - UEFA Women's Euro 2017
  - In the UEFA Women's Euro 2017 final, the Netherlands beats Denmark 4–2 for their
    first UEFA Women's Championship title. (BBC Sports)
  - 2017 FA Community Shield
  - Arsenal F.C. beat local rivals Chelsea F.C. 1–1 (4–1 on penalties) to win the
    FA Community Shield. (The Independent)
