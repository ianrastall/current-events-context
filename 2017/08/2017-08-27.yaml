Date: '2017-08-27'
Source_URI: Portal:Current events/2017 August 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Rohingya insurgency in Western Myanmar
  - 2016–17 Northern Rakhine State clashes, 2016–17 Rohingya persecution in Myanmar
  - Dozens of Rohingya Muslims fleeing renewed violence in Rakhine State are detained
    by Bangladeshi and Burmese authorities after they attempt to cross the border
    from Myanmar to Bangladesh. Many were en route to Kutupalong Refugee Camp, a refugee
    camp in Ukhia, Bangladesh, mostly inhabited by Rohingya refugees. (AFP via South
    China Morning Post)
  - Iraqi Civil War
  - Battle of Tal Afar (2017)
  - The Iraqi Army announces it is in full control of the Iraqi Turkmen city of Tal
    Afar in the Nineveh Governorate, after eight days of clashes with ISIL militants
    inside the city. (Rudaw)
  - War in Afghanistan
  - A car bomb in Helmand Province kills up to 13 people, including Afghan Army soldiers
    and civilians, and wounds 18 others, according to government spokesman Omar Zwak.
    (Reuters)
  Disasters and accidents:
  - Hurricane Harvey
  - The death toll from Hurricane Harvey in the American city of Houston, Texas, rises
    to three with several more days of heavy rain causing "catastrophic" floods to
    come. (Houston Chronicle)
  - The entire Texas National Guard is activated by Texas Governor Greg Abbott for
    search and rescue operations, as weather forecasters stated that Harvey would
    move back over the Gulf of Mexico and restrengthen. (CNN)
  - Maritime incidents in 2017
  - A dry cargo vessel broke in two in the Black Sea off Turkey’s northwest coast,
    television images showed early on Sunday, while the 11-man crew was rescued. Leonardo,
    a -long dry cargo ship flagged from Mongolia, started buckling and broke in two
    while on anchor off Istanbul’s Kilyos coast. (Reuters)
  - Mountaineering deaths in Austria
  - Five people were killed and one seriously injured after a mountain accident on
    Sunday in the Austrian state of Salzburg. (Reuters)
  - 2017 Pacific typhoon season
  - Tropical Storm Pakhar hits Hong Kong and Macau with sustained winds of and heavy
    rain, four days after deadly Typhoon Hato passed through the area. (Reuters)
  - Chemical haze near East Sussex coast
  - Police issued a warning and evacuation orders after a unknown chemical "haze"
    leaves over 200 people on Britain's south coast, between the towns of Eastbourne
    and Birling Gap, suffering irritation to their eyes and throats. (Reuters) (BBC)
  International relations:
  - Pakistan–United States relations
  - Pakistan postpones a visit from U.S. acting Assistant Secretary of State Alice
    Wells, its foreign ministry says, as some protest President Donald Trump's accusations
    that Pakistan is harbouring terrorists. (Reuters)
  Politics and elections:
  - Politics of Guatemala
  - President of Guatemala Jimmy Morales announced Sunday he is expelling the head
    of the International Commission against Impunity in Guatemala (CICIG), a U.N.
    anti-corruption commission that is investigating the president's campaign financing.
    (AP)
  - The Constitutional Court suspends the order made by President Jimmy Morales to
    expel the U.N. anti-corruption commission head. (Reuters)
  - Health Minister Lucrecia Hernández Mack and her deputies announce Sunday they
    have resigned. (AP)
  Law and crime:
  - 2017 Berkeley protests
  - Far-right protesters and thousands of far-left counter-protesters clash in Berkeley,
    California, leading to the arrest of at least 14 people. (Los Angeles Times)
  Sports:
  - Floyd Mayweather Jr. vs. Conor McGregor
  - In boxing, Floyd Mayweather Jr. defeats mixed martial artist Conor McGregor in
    the 10th round by technical knockout to improve to 50–0, breaking Rocky Marciano's
    61-year-old record. (ESPN)
  - Baseball
  - 2017 Major League Baseball season
  - Giancarlo Stanton of the Miami Marlins becomes the newest member of the 50 home
    run club, reaching the milestone during the Marlins' 6–2 win over the San Diego
    Padres. (AP via ESPN)
  - 2017 Little League World Series
  - The Kitasuna Little League from the Tokyo, Japan district of Kōtō wins the 2017
    Little League World Series, defeating the U.S. champions from Lufkin, Texas 12–2
    in a game stopped after five innings due to the LLWS mercy rule. It is the Kitasuna
    league's third LLWS crown in the last six years, and the 11th title overall for
    Japan. (AP via ESPN)
