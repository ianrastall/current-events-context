Date: '2017-08-03'
Source_URI: Portal:Current events/2017 August 3
Intelligence_Payload:
  Attacks and armed conflicts:
  - War in Afghanistan (2001–2021)
  - A suicide bomber attacks a convoy in Afghanistan's Kabul province, killing a Georgian
    soldier and three civilians and wounding 13 others, including six Resolute Support
    personnel. (BBC News)
  Disasters and accidents:
  - Nashville International Airport
  - A sewage leak, due to a single toilet, contaminated about 200 passengers's bags
    at Nashville International Airport, according to Southwest Airlines. (ABC News)
    (New York Post)
  International relations:
  - 2017 East African famine
  - USAID announces the Trump administration dedicated $169 million to feed people
    facing starvation in Ethiopia and Kenya, adding to earlier assistance for those
    suffering from drought and conflict in the region. (Reuters)
  - 2017 Venezuelan Constituent Assembly election
  - South American trade bloc Mercosur will trigger its democratic clause this weekend
    to suspend Venezuela indefinitely, furthering its past temporary suspension, and
    not allow the country back until internal political issues have been resolved.
    (Reuters)
  - 2017 Mexico–United States diplomatic crisis, Australia–United States relations
  - Two transcripts of telephone conversations between U.S. President Donald Trump
    and foreign leaders are leaked. Trump was shown to disagree with Mexican President
    Enrique Peña Nieto on 27 January over the proposed border wall, and with Australian
    Prime Minister Malcolm Turnbull the next day over the resettlement deal of refugees
    in Nauru and Manus. (The Washington Post)
  Law and crime:
  - Russian interference in the 2016 United States elections
  - Special counsel Robert Mueller has impaneled a grand jury in Washington, D.C.,
    to investigate allegations of Russia’s interference in the 2016 elections. (Reuters)
  - Grand jury subpoenas have been issued in connection with a June 2016 meeting that
    included Donald Trump Jr., Jared Kushner and a Russian lawyer. (Reuters)
  - Abortion in Chile
  - Chilean lawmakers have approved a bill that would legalize abortion in limited
    circumstances and end the socially conservative country's status as the last in
    South America with a blanket ban on the procedure. (AP)
  - Raytheon
  - Raytheon wins the dismissal of a USD$1 billion whistleblower lawsuit accusing
    the defense contractor of over billing the U.S. government on a contract for satellite
    sensors, nearly 18 months after the United States Court of Appeals for the Ninth
    Circuit revived the case. (Reuters)
  Politics and elections:
  - 115th United States Congress
  - U.S. lawmakers break for summer recess. (AP)
  - Politics of Japan
  - Prime Minister of Japan Shinzō Abe appoints Tarō Kōno as Foreign Minister. (Reuters)
  - Politics of the United States
  - West Virginia Governor Jim Justice announces, during U.S. President Donald Trump's
    rally in Huntington, he is changing his party affiliation from Democratic to Republican.
    (Huff Post via MSN.com) (The Washington Post)
  Sports:
  - Spanish and French football transfers
  - In association football, Paris Saint-Germain sign Neymar from FC Barcelona for
    a world-record transfer fee of €222 million (£200 million, US$264 million). (BBC)
