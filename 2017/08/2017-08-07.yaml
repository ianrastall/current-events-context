Date: '2017-08-07'
Source_URI: Portal:Current events/2017 August 7
Intelligence_Payload:
  Arts and culture:
  - Godzilla in popular culture
  - Haruo Nakajima, who portrayed the monster Godzilla from 1954 to 1972, dies at
    the age of 88. (Daily Mail)
  Business and economy:
  - Airline bankruptcies in the United States
  - Air carrier PenAir declares Chapter 11 bankruptcy in the United States, and ends
    service to Denver, Colorado, and Portland, Oregon. (The Wall Street Journal)
  Law and crime:
  - Media of the Philippines
  - Two more Filipino journalists are murdered in a span of two days adding to toll
    of more than a hundred journalists killed since 2000. (The Straits Times) (The
    Committee to Protect Journalists)
  Politics and elections:
  - Mauritanian constitutional referendum, 2017
  - Results from Saturday's constitutional referendum show Mauritanians have voted
    to abolish the Senate. Turnout was 53.73%, with 85% of voters supporting the change,
    according to officials. (BBC)
  - Corruption in South Africa
  - The Speaker of the National Assembly of South Africa, Baleka Mbete, announces
    that a vote of no confidence in President Jacob Zuma will be held by secret ballot.
    The vote, to be held on 8 August 2017, will be the eighth vote of no confidence
    against the president and the first by secret ballot. (CNN)
