Date: '2017-08-10'
Source_URI: Portal:Current events/2017 August 10
Intelligence_Payload:
  Business and economy:
  - Economy of the United States
  - 'New York State-based GateHouse Media announces an agreement to buy 11 U.S. newspapers
    from Georgia-based Morris Communications. Included in the deal is the Log Cabin
    Democrat, founded in 1879, and three Alaskan newspapers: the Juneau Empire, the
    Peninsula Clarion and Homer News. The deal is expected to close on October 2.
    (AdWeek)'
  - DineEquity announces it will close 160 Applebee's and IHOP restaurants. (USA Today)
  Disasters and accidents:
  - Migrant crisis
  - The United Nations International Organization for Migration reports, over the
    last two days in two incidents, smugglers have thrown 280 migrants from Ethiopia
    and other Horn of Africa countries into the sea off the coast of Yemen. More than
    50 refugees have drowned with over 30 people still missing. (AP via CBS News)
    (Al Jazeera)
  - Road incidents in China
  - At least 36 people die in a bus crash in China's Shaanxi province. The bus was
    travelling between Chengdu and Luoyang. (The Telegraph)
  International relations:
  - Canada–Cuba relations, Cuba–United States relations
  - The Canadian government says at least one of their diplomats in Havana has been
    treated for hearing loss, following up on yesterday's report that American diplomats
    had similar injuries. U.S. officials say the problems started in the fall of 2016.
    The Cuban Foreign Ministry says it was informed of the incidents in February and
    has been investigating since that time. (Time)
  Politics and election:
  - Mayor of Tehran
  - Reformist candidate Mohammad-Ali Najafi is unanimously elected Mayor of Tehran
    by the city council, ending the 12-year tenure of Principlist Mohammad-Bagher
    Ghalibaf. (Financial Times) (ForexRepository)
