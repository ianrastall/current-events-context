Date: '2017-08-22'
Source_URI: Portal:Current events/2017 August 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ain al-Hilweh conflict
  - Renewed clashes between Islamist extremists and the Fatah-supported Joint Palestinian
    Security Force at the Ain al-Hilweh Palestinian refugees camp, near Sidon, Lebanon,
    wound three more Palestinians. (Daily Star) (Naharnet)
  Business and economy:
  - Tourism in the Philippines
  - Viacom International Media Networks has announced it will no longer pursue a Nickelodeon
    underwater theme park and resort in Palawan, Philippines. The project, announced
    last January, attracted controversy due to criticisms from environmentalist groups
    who fear the resort might destroy the area's marine ecosystem, home to two UNESCO
    World Heritage sites. (ABS-CBN News)
  Disasters and accidents:
  - Maritime incidents in 2017
  - The passenger ship Comandante Ribeiro sinks in the Xingu River near Porto de Moz,
    Brazil, with the loss of at least ten lives.(Shipwreck Log)
  Law and crime:
  - Triple talaq in India
  - The "triple talaq", an Islamic practice allowing men to divorce instantly, is
    declared unconstitutional by the Supreme Court of India. (The Guardian)
  Sports:
  - 2017–18 NBA season transactions
  - In the NBA, the Cleveland Cavaliers and Boston Celtics swap All-Star point guards,
    with Isaiah Thomas going to the Cavaliers and Kyrie Irving to the Celtics. The
    Celtics also send the Cavaliers forward Jae Crowder, center Ante Žižić, and a
    2018 first-round draft pick that they had previously obtained from the Brooklyn
    Nets. (ESPN)
