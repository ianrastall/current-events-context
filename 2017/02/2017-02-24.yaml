Date: '2017-02-24'
Source_URI: Portal:Current events/2017 February 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Battle of al-Bab
  - The Turkish-backed Free Syrian Army captures Al-Bab from ISIL after months of
    fighting. (The Washington Post)
  - A car bomb explodes in the Syrian village of Sousian, north of al-Bab, killing
    at least 60 people. (Time) (BBC) (AP)
  - Foreign involvement in the Syrian Civil War
  - The Iraqi Air Force strikes ISIL targets inside Syria for the first time in response
    to recent bombings in Baghdad. (RT)
  - Yemeni Civil War (2015–present)
  - At least eight Yemeni soldiers are killed in a suicide bombing at a military camp
    in Zinjibar. (Al Jazeera)
  Business and economy:
  - Retail chain JC Penney announces plans to close between 130 and 140 stores, as
    well as 2 distribution centers, amid sagging store sales. (CNBC)
  International relations:
  - The Guatemalan army blockades a ship from the Dutch NGO Women on Waves that provides
    material for abortions. (BBC)
  - Israel denies entry to Omar Shakir, a researcher for Human Rights Watch and an
    American citizen, because the organization engages in so-called Palestinian propaganda.
    HRW's Sari Bashi said, "This Israeli government has been narrowing the space for
    democratic activity," by closing the country off to critics. Later, the Israel
    government would grant Mr. Shakir a tourist visa while considering HRW's appeal
    on the work visa. (CNN) (The New York Times)
  - 2017 Mexico–United States diplomatic crisis
  - Mexico states that it will reject third-country deportees. (ABC News)
  - A report alleges that the German BND has been spying on journalists in Afghanistan.
    (BBC)
  Law and crime:
  - Death of Kim Jong-nam
  - Malaysian police claim that Kim Jong-nam, half brother of North Korean leader
    Kim Jong-un, was killed by VX nerve agent, a toxin used almost exclusively for
    chemical warfare. (The New York Times)
  - Presidency of Donald Trump
  - The Trump administration signals that it plans a crackdown on U.S states that
    legalize the use of cannabis. (Los Angeles Times)
  - The Justice Department plans to expand the use of private prisons. (The Washington
    Post)
  - Protesters in South Africa rally against immigration. (France 24)
  Politics and elections:
  - Philippine vice president Leni Robredo defends her fellow Liberal party-mate Leila
    de Lima who was arrested for alleged drug trafficking. Robredo calls de Lima's
    arrest political harassment. (PDI)
  - Presidency of Donald Trump
  - The Trump White House bars The New York Times, CNN, the Los Angeles Times, the
    New York Daily News, The Hill, the Daily Mail, BBC, Politico, and BuzzFeed from
    a Friday press "gaggle." Generally conservative, mostly new, outlets were permitted
    entry, such as Breitbart News, One America News Network, and The Washington Times.
    Also allowed in were ABC News, CBS News, NBC News, The Wall Street Journal, Bloomberg
    News, and Fox News. Time magazine and the Associated Press could have attended
    but chose not to in protest. The White House Correspondents’ Association, which
    represents the press corps, quickly rebuked the White House’s actions. (AP) (Reuters)
    (NBC News) (The New York Times) (The Hill via MSN.Com)
