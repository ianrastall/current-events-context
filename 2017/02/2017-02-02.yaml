Date: '2017-02-02'
Source_URI: Portal:Current events/2017 February 2
Intelligence_Payload:
  International relations:
  - Georgia–European Union relations
  - The European Parliament unanimously approves visa-free regime in the Schengen
    zone for Georgia. (Radio Free Europe/Radio Liberty)
  - Russia–United States relations
  - The United States Department of the Treasury eases some sanctions on the Federal
    Security Service (FSB), allowing for limited transactions with the intelligence
    agency. The sanctions were put in place last year by Barack Obama over alleged
    Russian interference in the 2016 U.S. election. (Reuters)
  - Australia–United States relations
  - Citing unnamed U.S. officials, The Washington Post reports that U.S. President
    Donald Trump berated Australian Prime Minister Malcolm Turnbull. Trump claimed
    it was "the worst call by far" and criticized a refugee settlement deal organised
    between the Turnbull Government and the Obama administration in late 2016. (The
    Washington Post)
  - White House Press Secretary Sean Spicer says the U.S. is still planning on carrying
    through with the refugee resettlement deal. (Bloomberg Politics)
  - Israel–United States relations, Israeli–Palestinian peace process
  - The White House cautions Israel that building new settlements or expanding existing
    settlements in the West Bank, "... may not be helpful in achieving (peace)." (NBC
    News) (BBC)
  Law and crime:
  - Former HBOS manager Lynden Scourfield and other bankers and consultants are found
    guilty of corruption and abuse of power in stealing £245 million from the bank
    and small businesses in a loans scam, which was spent on personal luxuries. Scourfield
    was sentenced to 11 years in prison. (The Guardian)
  Politics and elections:
  - Colombian peace process
  - The National Liberation Army releases former congressman Odin Sanchez, who had
    been held hostage by the rebel group since April 2016, paving the way for peace
    talks to begin between the rebels and the Colombian government next week in Ecuador.
    (BBC)
