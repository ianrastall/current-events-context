Date: '2017-02-12'
Source_URI: Portal:Current events/2017 February 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present), Saudi Arabian-led intervention in Yemen
  - A helicopter from the Saudi-led coalition bombs a vehicle outside Aden International
    Airport, wounding at least three Yemeni soldiers. (Reuters)
  - Kashmir conflict
  - Four suspected militants, two Indian Army soldiers, and one civilian are killed
    in clashes in a village in southern Jammu and Kashmir. (Al Jazeera)
  Arts and culture:
  - 59th Annual Grammy Awards
  - Adele wins the Record of the Year and Song of the Year for "Hello" and Album of
    the Year for 25. Chance the Rapper wins the Grammy Award for Best New Artist.
    David Bowie wins four posthumous awards, two for his final studio album Blackstar
    and two for its title track. (CNN)
  - 70th British Academy Film Awards
  - La La Land wins five awards. I, Daniel Blake wins Best British Film. Emma Stone,
    Casey Affleck, Viola Davis and Dev Patel win in their respective acting categories.
    (BBC)
  Disasters and accidents:
  - The New South Wales Rural Fire Service issues an emergency warning for a bush
    fire located to the east of Dunedoo in New South Wales, Australia. The warning
    comes amidst "unprecedented" fire conditions across the region, deemed to be worse
    than the conditions precipitating the 2009 Black Saturday bushfires in Victoria.
    (The Daily Telegraph) (NSW Rural Fire Service)
  - The California Department of Water Resources orders residents near Oroville Dam
    to evacuate, including low-lying levels of Oroville, after an emergency spillway
    severely eroded. (Fox News)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea test fires a ballistic missile over the Sea of Japan. (BBC)
  Politics and elections:
  - Swiss referendums, 2017
  - Voters in Switzerland approve a referendum that makes it easier for third-generation
    immigrants to become citizens. (BBC) (Reuters)
  - 2017 Turkmenistani presidential election
  - Voters in Turkmenistan go to the polls for an election, with current president
    Gurbanguly Berdimuhamedow expected to win another term. (Radio Free Europe/Radio
    Liberty)
  - 2017 German presidential election
  - Former Foreign Minister Frank-Walter Steinmeier is elected President of Germany.
    (The Guardian)
