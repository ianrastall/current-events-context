Date: '2017-02-28'
Source_URI: Portal:Current events/2017 February 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Twelve Afghan National Police officers are killed in a Taliban "infiltration attack"
    in the southern Helmand Province. (BBC)
  - Gaza–Israel conflict
  - At least four Palestinians are injured following Israeli air strikes in Gaza that
    were reportedly in response to rockets launched into southern Israel by Hamas.
    (RT)
  Business and economics:
  - The Hershey Company announces it will cut about 15 percent of its global workforce
    (~2,700 jobs) to return its international businesses to profitability as quickly
    as possible. The layoffs will have a greater impact on the international workforce.
    (CNN)
  Disasters and accidents:
  - A small plane crashes in a residential area of Riverside, California, killing
    at least three people, all of whom were passengers on the plane. No one on the
    ground was injured. (BBC)
  - A police sniper accidentally fires his weapon while changing position and injures
    two people during a speech by French President François Hollande in Villognon.
    (BBC)
  - Twelve people are injured, four critically, after an SUV hits the Gulf Shores
    High School Band during the Gulf Shores, Alabama, Mardi Gras parade. The vehicle,
    in the parade behind the band, accelerated when the 73-year-old driver's foot
    slipped off the brake pedal onto the gas. (RT) (CNN) (WPMI-TV)
  Law and crime:
  - 2016–17 Turkish purges
  - About 330 people with alleged links to last year's coup attempt stand trial at
    a prison outside Ankara on charges of murder and attempting to overthrow the government,
    the largest trial to date. (Al Jazeera)
  - German police storm a refugee center in Hamburg after a knife-wielding man barricades
    himself in a room with a pregnant woman believed to be his partner. The man was
    injured before he was arrested. (RT)
  - Hundreds of right-wing activists gather to protest the court-ordered demolition
    of the Israeli settlement Ofra, which was built on private Palestinian land in
    the West Bank. Israeli police are evacuating nine homes in the settlement, despite
    hunger strikes and people barricading themselves inside. (RT)
  - The Royal Thai Government has fired Police General Jumpol Manmai for "extremely
    evil" misconduct and political interests which threatened national security. (Reuters)
  Politics and elections:
  - Presidency of Donald Trump
  - The Trump administration plans to increase the budget of the United States Armed
    Forces by more than 9%. (Reuters)
