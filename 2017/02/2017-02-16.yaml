Date: '2017-02-16'
Source_URI: Portal:Current events/2017 February 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Sehwan suicide bombing
  - At least 70 people are killed and more than 150 injured in suicide bombing at
    Lal Shahbaz Qalandar Shrine in Sehwan, Sindh, Pakistan; 50 of the injured are
    in critical condition, medical emergency has been declared in the hospitals of
    Hyderabad, Dadu and Jamshoro. (Dawn News) (The News)
  - Iraqi Civil War (2014–2017)
  - A car bomb explodes in a Shi'ite neighbourhood in Baghdad, killing at least 48
    people. ISIL claimed responsibility for the bombing. (BBC)
  - 2016–17 Rohingya persecution in Myanmar
  - According to Myanmar's military, it has ended its "clearance operation" against
    the country's Rohingya minority in Rakhine State, which the United Nations says
    may amount to ethnic cleansing and crimes against humanity. (The Guardian)
  - Yemeni Civil War (2015–present)
  - An air raid on a funeral in a village north of Sana'a kills at least eight women
    and children. The Houthis blames the Saudi-led coalition for the attack. (Al Jazeera)
  Law and crime:
  - Venezuelan protests
  - Venezuela's Supreme Tribunal of Justice upholds the 13-year, 9-month-plus prison
    term of Popular Will party founder Leopoldo López for inciting violence, via "subliminal
    messages," at the 2014 anti-government protests where 43 people were killed. Yesterday,
    United States President Donald Trump met with López's wife, Lilian Tintori, and
    called on Venezuela to release López immediately. (Latin American Herald Tribune)
    (Reuters) (Heavy.com)
  - Legal challenges to U.S. immigration suspension order
  - The U.S. Justice Department tells the Ninth Circuit Court of Appeals that it won't
    be seeking further action by the court since this executive order will soon be
    replaced by a different one. Justice added they expect the Ninth Circuit ruling
    will be vacated once the new executive order is issued. (NBC News)
  Politics and elections:
  - Presidency of Donald Trump
  - Protests against Donald Trump
  - U.S. immigration suspension, Day Without Immigrants
  - 'Hundreds of restaurants and other businesses in U.S. cities close their doors
    after activists called on immigrants to stay home from work, avoid shopping or
    eating out, and skip classes Thursday for #ADayWithoutImmigrants, to protest the
    President''s immigration reforms and highlight the immigrant community''s contributions
    to the United States. (Reuters) (The Atlantic) (The Philadelphia Inquirer) (Los
    Angeles Times)'
  - Formation of Donald Trump's cabinet
  - U.S. President Donald Trump names Florida International University College of
    Law Dean and former National Labor Relations Board member Alexander Acosta to
    be Secretary of Labor. The President's initial nominee, Andy Puzder, withdrew
    his nomination yesterday. (Politico) (CNN) (NPR)
  - Political appointments of Donald Trump
  - The U.S. Senate confirms, 51-49, Congressman Mick Mulvaney to head the Office
    of Management and Budget. (The Washington Post)
  - Philippine presidential election, 2016
  - The Supreme Court of the Philippines allows the electoral protest of defeated
    candidate Bongbong Marcos against Philippine vice president Leni Robredo to continue.
    (Reuters via U.S. News and World Report)
  - United Nations officials announce the creation of a new team in Geneva to investigate
    possible war crimes, crimes against humanity and genocide during the Syrian Civil
    War in order to prepare for future prosecutions of those responsible. (The Guardian)
