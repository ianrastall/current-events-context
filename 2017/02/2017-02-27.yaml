Date: '2017-02-27'
Source_URI: Portal:Current events/2017 February 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro conflict
  - The Abu Sayyaf militant group beheads their German hostage Jurgen Kantner in Indanan,
    Philippines. (The Straits Times)
  - Communist rebellion in the Philippines
  - A total of 21 combatants die in a three-week offensive by the government against
    the Communist Party of the Philippines. (Rappler)
  - Syrian Civil War
  - The Syrian Government's Tiger Forces reaches the front lines with the Syrian Democratic
    Forces south of Manbij after capturing territory from ISIL, east of al-Bab. (Syrian
    Live Map)
  - War in Afghanistan (2001–2021)
  - According to the Afghan Interior Ministry, Mullah Abdul Salam Akhund, a senior
    Taliban commander, is killed in a U.S. airstrike in Kunduz Province. (Radio Free
    Europe/Radio Liberty)
  - Somali Civil War (2009–present)
  - A car bomb explodes near a checkpoint outside Mogadishu, wounding at least four
    Somali soldiers. (Al Jazeera)
  International relations:
  - Armenia–European Union relations
  - Armenia and the European Union agree on a new pact to boost ties between the two.
    It is expected to be signed later this year. This comes after Armenia rejected
    an Association Agreement in 2013. (Radio Free Europe/Radio Liberty)
  Politics and elections:
  - The Liberal Party of the Philippines, the party of vice president Leni Robredo
    and detained senator Leila de Lima, formally becomes the opposition after its
    members and its ally from the Akbayan party are ousted from key positions in the
    Senate. (Rappler)
  Science and technology:
  - SpaceX announces that it will take two space tourists on an orbit of the Moon
    in 2018. (CNBC)
