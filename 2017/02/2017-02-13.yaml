Date: '2017-02-13'
Source_URI: Portal:Current events/2017 February 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - 2017 Lahore suicide bombing
  - At least 13 people, including six police officers, are killed and 85 are injured
    after a bomb explodes at a protest rally in Lahore, Punjab. The Pakistani Taliban
    splinter group Jamaat-ul-Ahrar claims responsibility. (Dawn)
  - War in Afghanistan (2001–2021)
  - According to a United Nations Assistance Mission in Afghanistan inquiry, 18 civilians
    in Helmand Province were killed in coalition air raids last Thursday and Friday,
    with locals and Afghan officials claiming that the death toll is higher. (Al Jazeera)
  Disasters and accidents:
  - 2017 Oroville Dam crisis
  - Thousands of people are urged to evacuate in and around the vicinity of Yuba City
    due to the impending failure of an emergency spillway at Oroville Dam in Northern
    California. 188,000 people were reported to be evacuated. (CNN) (The Washington
    Post)
  - At least four skiers are killed in an avalanche at the Tignes resort in France.
    (The Guardian)
  - At least 34 people are killed after a tour bus, carrying mostly local elderly
    tourists, overturns on a freeway in Taipei, Taiwan. (Focus Taiwan) (BBC)
  - The U.S. Coast Guard continues to search for the missing F/V Destination, a Seattle-based
    fishing vessel operating near St. George, Alaska, with a six-member crew. The
    Coast Guard has discovered a debris field, but no sign of the crew. (KTUU-TV)
  Law and crime:
  - A warrant of arrest is to be served on Philippines opposition leader and senator
    Leila de Lima. (CNN)
  Politics and elections:
  - The Islamabad High Court indefinitely bans the celebration of Valentine's Day
    in Pakistan. (CNN)
  - Michael T. Flynn resigns as National Security Advisor following controversy over
    his alleged contacts with Russian officials. Retired United States Army general
    Keith Kellogg subsequently becomes acting National Security Advisor until a permanent
    replacement is appointed. (Reuters)
  - Kim Jong-nam, eldest son of Kim Jong-il, is assassinated in Malaysia after two
    unidentified women reportedly poisoned him at Kuala Lumpur International Airport.
    (FOX News)
  - Cabinet of Donald Trump
  - The United States Senate, in a 53–47 vote, confirms Steven Mnuchin to be Treasury
    Secretary. (NBC News)
