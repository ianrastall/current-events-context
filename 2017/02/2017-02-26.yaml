Date: '2017-02-26'
Source_URI: Portal:Current events/2017 February 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Syrian Army recaptures the strategic town of Tadef from ISIL, south of al-Bab,
    securing key transportation routes in eastern Aleppo Governorate. (Xinhuanet)
  - A Sabal Trail Transmission Pipeline protester who was seen firing a high powered
    rifle at the pipeline construction site in Florida was chased by police until
    his car crashed. The suspect was shot and killed by a deputy after he tried to
    engage police in a gunfight. (CBS News)
  Arts and culture:
  - 89th Academy Awards
  - The 89th Academy Awards are held in Los Angeles, California. (ABC)
  - Moonlight wins Best Picture, moments after La La Land was mistakenly announced
    as the winner. It also won Best Adapted Screenplay. (ABC News Australia) (ABC)
  - Mahershala Ali wins the Best Supporting Actor for his role in Moonlight. He is
    the first Muslim American to win the award. (The Guardian)
  - La La Land 's director Damien Chazelle wins the Oscar for Best Director and Emma
    Stone wins the Best Actress. (The Guardian)
  - Casey Affleck wins the Best Actor for his role in Manchester by the Sea, which
    also won Best Original Screenplay. (ABC)
  - Viola Davis wins the Best Supporting Actress for her role in Fences. (ABC)
  - The Salesman directed by Asghar Farhadi won Best Foreign Language Film. Farhadi
    and other film crew did not attend the ceremony in protest of Donald Trump's visa
    ban. First Iranian in space Anousheh Ansari and scienist Firouz Naderi attended
    in place of Farhadi. (The Guardian)
  - 'O.J.: Made in America wins the Best Documentary Feature. (ABC)'
  - The Netflix "documentary" The White Helmets, a film about the Syrian Civil War,
    wins the Best Documentary Short.The cinematographer Khaled Khatib who is himself
    a member of the rebel-aligned group couldn't attend the ceremony because officials
    from the Department of Homeland Security discovered "derogatory information" about
    him. (Vox)
  - Zootopia wins the Best Animated Feature. (ABC)
  Disasters and accidents:
  - Millions of residents in the Chilean capital Santiago are left without access
    to running water after the Maipo River is contaminated by flooding and landslides.
    At least four people have died in the floods. (BBC)
  - 16 people dead in northern India after a truck carrying villagers to church overturned
    on a mountain road. (DW)
  Politics and elections:
  - Tens of thousands of people march through Moscow, Russia, to commemorate the two-year
    anniversary of opposition leader Boris Nemtsov's assassination. (The Guardian)
    (Radio Free Europe/Radio Liberty)
  - Political appointments of Donald Trump
  - Philip Bilden, nominee for Secretary of the Navy, withdraws his name from consideration.
    Mr. Bilden says his business interests created complications. (CNN)
  Sport:
  - 2017 EFL Cup Final
  - Manchester United beat Southampton 3–2 at Wembley Stadium to win the 2016–17 EFL
    Cup. (BBC)
  - 2017 Daytona 500
  - Kurt Busch wins his first Daytona 500, in the first Monster Energy NASCAR Cup
    Series event to contain stages within the race. (Orlando Sentinel)
