Date: '2017-02-05'
Source_URI: Portal:Current events/2017 February 5
Intelligence_Payload:
  Disasters and accidents:
  - Heavy snow and avalanches kill dozens of people in Afghanistan and northern Pakistan,
    while Kabul International Airport is closed due to snow and ice on the runway.
    (BBC) (FOX News)
  Law and crime:
  - Turkish police arrest over 400 suspected ISIL members in raids across the country.
    (Al Jazeera)
  Politics and elections:
  - U.S. immigration suspension, State of Washington v. Trump
  - Trump's travel ban remains suspended as the U.S. Court of Appeals for the Ninth
    Circuit denies the Justice Department's request to stay the ruling which blocks
    major portions of the executive order. (NPR)
  - Following the court's suspension of the travel ban, Iran allows visas for the
    United States men's freestyle wrestling team to compete in the 2017 World Cup.
    (CNN)
  - 2017 Romanian protests
  - More than 600,000 people protest in dozens of cities in Romania and diaspora against
    Grindeanu Government. (Digi24)
  - Following diplomatic mediation by the European Union and the United States, minority
    Serbs tear down a concrete wall in Mitrovica. The city's majority Albanians regarded
    the wall as a provocation. (VOA News)
  - The Obama Administration and Bush Administration had failed to publicly disclose
    up to thousands of lethal airstrikes the U.S. made in Afghanistan, Iraq, and Syria
    against ISIL, Al-Qaeda, and the Taliban via U.S. Army helicopters and drones.
    (Reuters) (Military Times)
  - The Liechtenstein general election, 2017 took place in Liechtenstein resulting
    in a Progressive Citizens' Party and Patriotic Union coalition government under
    Prime Minister Adrian Hasler. The election left the Progressive Citizens' Party
    with only nine seats, one less than the previous election. The Patriotic Union
    kept all eight seats during the election. Gaining stature in the Landtag of Liechtenstein
    the Free List or FL held on to all three seats but rose 1.5%pp. With the Independents
    gaining one seat from the previous election leaving them at five.
  Sports:
  - Super Bowl LI
  - The New England Patriots defeat the Atlanta Falcons 34–28, in the first game in
    Super Bowl history to go into overtime. (The New York Times)
  - Tom Brady, the quarterback for the New England Patriots, wins his fourth Most
    Valuable Player award, the most won by any player. Brady joins Charles Haley as
    the only players to be on five Super Bowl-winning teams. (NBC Sports)
  - In association football
  - Cameroon wins the 2017 Africa Cup of Nations with a 2–1 victory over Egypt. (The
    Guardian)
