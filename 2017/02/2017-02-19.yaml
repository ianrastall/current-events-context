Date: '2017-02-19'
Source_URI: Portal:Current events/2017 February 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War, Battle of Mosul
  - Iraq Prime Minister Haider al-Abadi says U.S.-backed Iraqi forces have launched
    an operation to regain control of western Mosul from ISIL militants. The United
    Nations says humanitarian agencies are setting up in these older sections of the
    city where, already, food and fuel supplies are dwindling, running water is scarce,
    and electricity in many neighborhoods is unreliable for the estimated 800,000
    civilians. (CNN) (BBC) (UN-OCHA)
  - Somali Civil War (2009–present)
  - A car bomb explodes in the Wadajir District of Mogadishu, killing at least 20
    people and injuring 50 more. (Al Jazeera)
  - An explosion kills one and injures at least 30 people, mostly police officers
    preparing for the weekly anti-bullfighting protests in Bogotá, Colombia. Bullfighting
    resumed last month after a four-year lull, per a Supreme Court order. Responsibility
    has not been determined. (Reuters) (BBC) (i24news)
  - War in North-West Pakistan
  - An overnight Pakistani counter-terrorism raid kills five members of the banned
    Jamaat-ul-Ahrar, which has claimed responsibility for recent deadly terrorist
    attacks. Four militants escaped. (AP)
  Business and economics:
  - Kraft Heinz drops its bid to buy Unilever for US$143 billion. Unilever rejected
    the idea last Friday but Kraft Heinz still expressed interest in finding an agreement.
    (BBC)
  Disasters and accidents:
  - 2017 Afghanistan avalanches
  - At least 25 people are killed by snowstorms and avalanches in northern Afghanistan
    as heavy snow continues to hit the country. (Al Jazeera)
  International relations:
  - Mongolia's economy
  - An agreement is reached between Mongolian government representatives and the International
    Monetary Fund and other international partners on a three-year, $5.5 billion economic
    stabilization package. (Reuters) (IMF)
  Politics and elections:
  - Ecuadorian general election, 2017
  - Voters head to the polls to select the National Assembly and a new president with
    former vice-president Lenín Moreno facing off against former bank president Guillermo
    Lasso, and six other opposition candidates. There will be an April 2 runoff unless
    the leader receives 40 percent of the votes and is at least 10 percentage points
    ahead of the others. In addition, there's a tax haven referendum. (Reuters)
  - South Sudanese Civil War
  - Two top level officials overseeing South Sudan's military courts resign from their
    posts, accusing the government of interfering in the court's moves to discipline
    soldiers accused of rape and murder. The resignations come less than a week after
    a military general and the Minister of Labour resigned in protest of President
    Salva Kiir Mayardit's alleged approval of atrocities against civilians not belonging
    to the Dinka group. (Al Jazeera)
  - 2017 Belarusian protests
  - Demonstrations spread to the second city of Belarus—Gomel—where 2,000 march against
    a 2015 tax law. (Reuters)
  Science and technology:
  - SpaceX CRS-10
  - SpaceX successfully launches a Falcon 9 rocket from Kennedy Space Center, placing
    a Dragon spacecraft in orbit and recovering the launcher's first stage. The spacecraft
    will resupply the International Space Station.(NPR)
  Sports:
  - 2017 Asian Winter Games
  - The week-long 2017 Asian Winter Games open at Sapporo Dome in Japan with more
    than 2,000 athletes from 31 countries, including North Korea, participating. (AP)
