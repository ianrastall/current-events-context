Date: '2017-02-14'
Source_URI: Portal:Current events/2017 February 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Idlib Governorate clashes (2017)
  - Rival fighters between Tahrir al-Sham and Jund al-Aqsa clash in Syria's northern
    Idlib Governorate, killing "dozens" according to the Syrian Observatory for Human
    Rights. (BBC)
  - Kashmir conflict
  - At least three Pakistan Army soldiers are killed by the Indian Army, while separate
    clashes kill three Indian Army soldiers and one suspected militant, at the Line
    of Control. (Al Jazeera)
  - Kamwina Nsapu rebellion
  - According to the United Nations, the Congolese military has killed at least 101
    people, including over 30 women, in the last five days while fighting Kamwina
    Nsapu rebels in Kasaï-Central. (Al Jazeera)
  Business and economics:
  - Cigna announces that it has terminated its merger with Anthem, a deal that was
    blocked by a U.S. federal judge last week. In addition, Cigna sues Anthem for
    the $1.85 billion reverse termination fee, and for more than $13 billion in additional
    damages. Anthem says Cigna has no right to terminate the merger, a deal which
    in January was extended to April 30, 2017. (Bloomberg) (CNBC)
  - Aetna and Humana terminate their proposed merger that had been blocked last month
    by a U.S. federal judge. Aetna announces it will pay Humana the $1 billion fee
    for calling off the agreement. (Forbes) (NPR)
  International relations:
  - United States–Venezuela relations
  - The United States sanctions Vice President of Venezuela Tareck El Aissami for
    allegedly "playing a significant role in international narcotics trafficking".
    The sanctions freeze his assets in the U.S. and bar him from entering the country.
    (BBC)
  - Foreign relations of the Gambia
  - British Foreign Secretary Boris Johnson, during a visit to the Gambia, announces
    that the West African nation is to rejoin the Commonwealth of Nations following
    talks with Gambian President Adama Barrow. The Gambia withdrew from the Commonwealth
    in 2013 under Yahya Jammeh, who considered it a "neo-colonial institution". (Sky
    News)
  Law and crime:
  - Kurdish–Turkish conflict (1978–present) / 2016–17 Turkish purges
  - Turkish police arrest over 800 people with alleged links to the outlawed Kurdistan
    Workers' Party (PKK). (Al Jazeera)
  - Two radio journalists are shot dead and a co-worker injured in San Pedro de Macorís,
    Dominican Republic, while presenting the show "Milenio Caliente" on Facebook Live.
    Three people were arrested. (BBC) (CNN)
  Politics and elections:
  - Joseph Clancy, Director of the United States Secret Service, announces his retirement
    effective March 4. (USA Today)
  Science and technology:
  - The United Arab Emirates announces at the World Government Summit that its planned
    passenger drone will begin operations in July. (BBC)
