Date: '2017-02-10'
Source_URI: Portal:Current events/2017 February 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - French police arrest three men and a 16-year-old girl found with bomb-making materials
    in a Montpellier flat. The female suspect had been spotted online saying she wanted
    to either leave for the Syria-Iraq conflict or mount an attack in France, and
    recorded a video in which she pledged allegiance to ISIL. (BBC)
  - In Hong Kong, over 16 were injured, and an incoherent man was charged with arson
    after an alleged firebomb attack on a rush hour Hong Kong metro commuter train.
    The man set fire to himself and others with a flammable liquid for an unspecified
    personal reason, but officials found no evidence of a terrorist motive. (Independent)
  Business and economics:
  - British consumer goods company Reckitt Benckiser agrees to buy U.S. baby formula
    maker Mead Johnson Nutrition for $16.6 billion. (Reuters)
  Disasters and accidents:
  - At least seven people have been killed in the Bangli Regency of Bali after a landslide
    caused by torrential rain. (AP via ABC News Australia)
  - Volunteers are working to save the remaining live pilot whales beached at Farewell
    Spit on New Zealand's South Island. Project Jonah reports that 75 percent of the
    more than 400 stranded whales are dead. (NBC News)
  - A 6.5 magnitude earthquake strikes 14 kilometers (8 miles) northwest of Surigao
    City on the Philippines island of Mindanao and kills four people, injures more
    than 100 others, and damages multiple buildings. (AP), (9news) (Reuters)
  - At least 17 people are killed with dozens injured in a crowd stampede at a football
    stadium in Uíge, Angola. (AP)
  - Polish Prime Minister Beata Szydło is injured in a car crash in her hometown,
    Oświęcim, Poland. Mrs. Szydło is in good condition in a Warsaw hospital. (AP)
  International relations:
  - European Union–The Gambia relations
  - The European Union pledges to give the Gambia €225 million in aid to assist the
    country following the departure of former president Yahya Jammeh, whose 22 years
    of misrule left the country "virtually bankrupt". (The Guardian)
  Law and crime:
  - U.S. immigration suspension legal challenges
  - Aboard Air Force One, President Trump tells reporters he is considering issuing
    a revised policy banning citizens of certain countries traveling to the United
    States. (Reuters)
  - The Trump administration decides to not immediately appeal the Ninth Circuit's
    decision, which continues the travel ban suspension, to the Supreme Court. (CNN)
  - A judge in Peru issues an arrest warrant for former President Alejandro Toledo
    for allegedly receiving US$20 million in bribes from Odebrecht, a Brazilian construction
    company, in exchange for a contract deal to build a transoceanic highway between
    Brazil and the Peruvian coast. Toledo denies any wrongdoing. (The Guardian)
  Movies:
  - The Movie Premiere of The Lego Batman Movie
  - 'From the Studio That Brought You Osmosis Jones, Ozzy & Drix, Space Jam, Batman,
    Batman Returns, Batman Forever, Batman and Robin, Batman Begins, The Dark Knight,
    The Dark Knight Rises, Batman v Superman: Dawn of Justice, The Lego Movie'
  Politics and elections:
  - Cabinet of Donald Trump
  - The United States Senate, in a 52 to 47 vote, confirms physician and U.S. Representative
    Tom Price to be Secretary of Health and Human Services. (CBS News)
  - Iran marks its 38th anniversary of the Iranian Revolution with nationwide rallies
    and ceremonies. The ceremony also contains some anti-Trump protests. (The New
    York Times) (Reuters)
  Sport:
  - Doping in Russia
  - Russian track and field athlete Mariya Savinova is banned by the Court of Arbitration
    for Sport from partaking in any sporting events for four years and is stripped
    of her gold medal that she won in the 800 metres at the 2012 Summer Olympics for
    doping between 2010 and 2013. (Radio Free Europe/Radio Liberty)
  - Iditarod Trail Sled Dog Race
  - The Iditarod Trail Committee announces the race's March official start has been
    moved from the Anchorage area northeast to Fairbanks, Alaska, due to low-snow
    conditions in the Alaska Range. (AP) (Iditarod.com)
