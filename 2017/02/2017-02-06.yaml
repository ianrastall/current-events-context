Date: '2017-02-06'
Source_URI: Portal:Current events/2017 February 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinai insurgency
  - An Egyptian Army raid in central Sinai kills at least 14 ISIL militants. (Reuters)
  - An Afghan diplomat is shot dead at the Afghan consulate in Karachi, Pakistan.
    (Reuters)
  Arts and culture:
  - Queen Elizabeth II marks her 65th anniversary as sovereign, making her the only
    British monarch to commemorate a Sapphire Jubilee. (Reuters)
  Health and medicine:
  - South Korea's Agricultural Ministry confirms a case of foot-and-mouth disease
    at a dairy farm in Boeun County. This is the first instance of this disease in
    the country since March 29, 2016. (The Korea Times)
  Law and crime:
  - Brazilian President Michel Temer deploys the Brazilian Army to the southeastern
    state of Espírito Santo, where a police strike has led to a wave of violence and
    looting, including dozens of murders in the state capital, Vitória. (Reuters)
    (The Guardian)
  - Israel passes the Regulation Law which retroactively legalizes 4,000 housing units
    in 16 settlements on Area C West Bank occupied Palestinian territories. (The New
    York Times) (The Jerusalem Post)
  Politics and elections:
  - U.S. Representative Matt Gaetz proposes a bill to eliminate the United States
    Environmental Protection Agency. (The Hill)
  Science and technology:
  - A herd of Plains bison are successfully reintroduced to the Banff National Park
    in Alberta, Canada, more than 100 years after they were nearly hunted out of existence.
    (BBC)
