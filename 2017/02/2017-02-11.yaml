Date: '2017-02-11'
Source_URI: Portal:Current events/2017 February 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide bomber kills at least seven people outside a bank in Lashkargah. (Reuters)
  - Syrian Civil War, Battle of al-Bab
  - Syrian rebels and Turkish troops enter al-Bab, with Syrian troops also approaching
    the town, prompting heavy clashes with ISIL militants. (Al Jazeera)
  - 2017 Istanbul nightclub shooting
  - Abdulkadir Masharipov is charged with murder in relation to the shootings in Istanbul
    that killed 39 people and is remanded in custody. Islamic State in Iraq and the
    Levant has claimed responsibility for the shootings. (ABC)
  Disasters and accidents:
  - Severe flooding following five days of incessant rain causes landslides that have
    killed 13 people in Indonesia's West Nusa Tenggara Province. (AP)
  - Over 70,000 people are evacuated from Thessaloniki, Greece, as authorities attempt
    to defuse a World War II-era unexploded ordnance, which was discovered last week.
    (The Guardian)
  Politics and elections:
  - 2017 elections in India
  - Uttar Pradesh Legislative Assembly election
  - Voters in Uttar Pradesh cast ballots in Phase 1 of the state's 2017 elections,
    with Phase 7, the final poll, to be held on 8 March. This will be an important
    test of India's November policy change that removed 86 percent of the cash then
    in circulation. (Reuters)
  - Violence erupts at a protest rally in Baghdad, Iraq, killing at least four protesters
    and one police officer. Thousands of supporters of Shia cleric Muqtada al-Sadr
    gathered in the capital to demand an overhaul of the country's electoral system.
    (Al Jazeera)
