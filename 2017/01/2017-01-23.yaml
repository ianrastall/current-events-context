Date: '2017-01-23'
Source_URI: Portal:Current events/2017 January 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - The Yemeni Army claims to have recaptured the port city of Mocha from Houthi rebels.
    (Al Jazeera)
  - Sinai insurgency
  - At least five Egyptian Army soldiers are killed by unknown gunmen in the Sinai
    Peninsula. (Al Jazeera)
  Business and economy:
  - John D. Bates, United States federal judge for the United States District Court
    for the District of Columbia, blocks a proposed merger by health insurance companies
    Aetna and Humana. (The New York Times)
  Law and crime:
  - 2016–2017 Gambian constitutional crisis
  - According to an advisor to Gambian President Adama Barrow, more than 500 million
    dalasi, equivalent to US$11.3 million, are reported missing from state coffers
    after former President Yahya Jammeh left the country in exile. (BBC)
  - Following a joint police operation by Europol and Interpol last October and November
    across much of Europe, dubbed "Operation Pandora", more than 3,500 stolen artwork
    and artifacts are recovered, with 75 people arrested and 48,588 more being investigated.
    (BBC)
  Politics and elections:
  - Presidency of Donald Trump
  - U.S. President Donald Trump issues executive orders to withdraw the United States
    from the Trans-Pacific Partnership, and reinstates the Mexico City Policy, a policy
    banning U.S. aid to foreign organizations that use funds from other sources to
    perform or discuss abortions, which Barack Obama scrapped in 2009. (The Independent)
    (The Washington Post) (CNN)
  - Syrian peace process
  - Peace talks in Astana, Kazakhstan, between the Syrian opposition and the Syrian
    Government, meant to build on a fragile ceasefire currently in effect in the Syrian
    Civil War, end with no breakthrough reported. (Radio Free Europe/Radio Liberty)
