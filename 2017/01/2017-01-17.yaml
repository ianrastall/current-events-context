Date: '2017-01-17'
Source_URI: Portal:Current events/2017 January 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - A Nigerian Air Force jet mistakenly bombs a refugee camp in Borno State, near
    the border with Cameroon, killing at least 90 people and injuring more than 100.
    The pilot reportedly believed he was attacking Boko Haram militants. (BBC)
  Business and economy:
  - British American Tobacco agrees to take over the R. J. Reynolds Tobacco Company
    for $49.4 billion. (AFP by Yahoo!)
  Disasters and accidents:
  - Malaysia Airlines Flight 370
  - The underwater search for missing Malaysia Airlines Flight 370 has been suspended.
    (CNN)
  International relations:
  - Germany–United States relations
  - Deutsche Bank agrees to a $7.2 billion settlement with the U.S. Department of
    Justice over its sale and pooling of toxic mortgage securities in the years leading
    up to the 2008 financial crisis. (Reuters)
  - Israeli–Palestinian peace process
  - Israeli Prime Minister Benjamin Netanyahu calls the latest peace-conference "useless".
    (CNN)
  - Moldova–European Union relations
  - Moldovan President Igor Dodon, during his first state visit to Russia, says Moldova
    could scrap the 2014 Moldova–European Union Association Agreement after the country's
    next parliamentary election. (Reuters)
  Law and crime:
  - Barack Obama presidential pardons
  - The President of the United States Barack Obama commutes the bulk of the sentence
    for Chelsea Manning for leaking documents to WikiLeaks. Manning will now be released
    in 2017 instead of 2045. (BBC)
  - President Obama also commutes the sentence of Puerto Rican independence activist
    Oscar López Rivera who was sentenced to 35 years imprisonment for seditious conspiracy.
    (The Guardian)
  Politics and elections:
  - Aftermath of the United Kingdom European Union membership referendum, 2016
  - After much speculation British Prime Minister Theresa May announces that the United
    Kingdom will be leaving the European Single Market. (Business Insider)
  - 2016–2017 Gambian constitutional crisis
  - Four Cabinet of the Gambia members resign, including Minister of Finance and Economic
    Affairs, Abdou Kolley, Minister of Foreign Affairs, Neneh Macdouall-Gaye, Minister
    of Trade, Abdou Jobe, and Minister of Environment Pa Ousman Jarju. (Al Jazeera)
  - Gambian President Yahya Jammeh declares a 90-day state of emergency a day before
    his mandate ends. (BBC)
  - President of the European Parliament
  - Antonio Tajani has been elected as new President of the European Parliament. (BBC)
    (New York Times)
