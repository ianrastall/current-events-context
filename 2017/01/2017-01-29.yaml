Date: '2017-01-29'
Source_URI: Portal:Current events/2017 January 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Yakla raid
  - A U.S. military raid takes place in Yemen's southern Al Bayda Governorate. According
    to medics on the scene as reported by Reuters, "around 30" were killed, among
    which were at least three senior Al-Qaeda members, at least one U.S. service member,
    and 10 women and children. (Reuters) (The Guardian)
  - Syrian Civil War, Siege of Wadi Barada
  - The Syrian Army recaptures all of the towns and villages in the Barada river valley
    near Damascus from rebel forces. (Al Jazeera)
  - Insurgency in the North Caucasus
  - At least three suspected militants are killed by Russian security forces during
    a firefight in Khasavyurt, Dagestan. (Radio Free Europe/Radio Liberty)
  - Quebec City mosque shooting
  - A gunman opens fire at a mosque in Quebec City, Canada, during evening prayers.
    At least five people were killed. Two suspects were apprehended; one was later
    released. (CBC News) (Reuters)
  Law and crime:
  - Executive Order 13769
  - U.S. federal judges in the states of Massachusetts, Virginia, and Washington sign
    orders halting implementation of parts of the executive order. (New York Daily
    News) (Reuters via News.com.au)
  - White House Chief of Staff Reince Priebus states that people from the affected
    countries who have been lawfully admitted for permanent residence, i.e. have a
    green card, will not be prevented from returning to the United States. (The New
    York Times)
  - 2017 Romanian protests
  - In the largest protest since the 1989 Revolution, more than 90,000 people march
    through Romania's capital and other cities against a government proposal to pardon
    thousands of prisoners. (Business Review) (Digi24)
  Politics and elections:
  - French Socialist Party presidential primary, 2017
  - In the second round run-off to select the Socialist Party's candidate in this
    year's spring presidential election, the leftist candidate, former Minister of
    National Education Benoît Hamon, topped former Prime Minister Manuel Valls, a
    centrist, with 58.65 percent of the vote. (ABC News) (Yahoo! News)
  Sport:
  - 2017 Australian Open
  - In tennis, Roger Federer of Switzerland defeats Rafael Nadal of Spain in the final
    of the men's singles. (ABC Australia)
