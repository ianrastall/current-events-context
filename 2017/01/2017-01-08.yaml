Date: '2017-01-08'
Source_URI: Portal:Current events/2017 January 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - January 2017 Jerusalem vehicular attack
  - A truck rams into a group of Israeli soldiers in a deliberate attack in East Jerusalem,
    killing four and wounding 21. The perpetrator was previously convicted of terrorism
    and was jailed for 10 years. (CNN) (The Guardian)
  - Iraqi Civil War
  - Two suicide bombings, one using a car bomb and another with an explosive belt,
    take place in vegetable markets in eastern Baghdad, killing at least 20 people
    and injuring more than 50. The Islamic State in Iraq and the Levant claims responsibility.
    (Reuters AP via ABC Australia) (AP via The Daily Mail) (Al Jazeera)
  Arts and culture:
  - The 74th Golden Globe Awards are held in Hollywood. (News Limited)
  - The Crown wins the Golden Globe Award for Best Television Series – Drama. (Variety)
  - La La Land wins the Golden Globe Award for Best Motion Picture – Musical or Comedy
    while Moonlight wins the Golden Globe Award for Best Motion Picture – Drama. (Los
    Angeles Times)
  - La La Land becomes the single most winning film in Golden Globes history, winning
    all seven awards out of its seven nominations and becomes the seventh film to
    achieve all the awards it was nominated for, the others being Doctor Zhivago (1966),
    Love Story (1971), The Godfather (1973), One Flew Over the Cuckoo's Nest (1976),
    A Star is Born (1977) and Midnight Express (1979). (Golden Globes) (Los Angeles
    Times)
  Politics and elections:
  - Israel–United Kingdom relations
  - Several British MPs demand an investigation into a recent scandal in which an
    Israeli embassy official in London had conspired to damage the reputation of several
    British politicians in response to the recent United Nations Security Council
    resolution. (Al Jazeera)
  - Akbar Hashemi Rafsanjani, former President of Iran, dies at the age of 82. (Reuters)
    (BBC) (Al-Jazeera)
  - Pakistan has decided to impose official prohibition on Jundallah and splinter
    groups that claim responsibility for terror attacks. (The News) (Daily Times)
