Date: '2017-01-26'
Source_URI: Portal:Current events/2017 January 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - Forces of the Libyan National Army claim to have captured one of the last remaining
    strongholds of Benghazi from Ansar al-Sharia. (Al Jazeera)
  Business and economics:
  - Tankers anchored in the Caribbean Sea are unable to deliver over four million
    barrels of crude oil, due to Venezuela's state-owned oil and natural gas company
    being unable to pay for hull cleaning, inspections, and other port services. (Reuters)
  Disasters and accidents:
  - Two to three days of freezing weather and heavy snow kills at least 27 children
    in Jowzjan Province, Afghanistan. (Radio Free Europe/Radio Liberty) (Khaskbahar
    Hindi)
  - At least 14 Indian Army soldiers and four civilians are killed in a series of
    avalanches near the Line of Control in Jammu and Kashmir. (BBC)
  International relations:
  - 2017 Mexico–United States diplomatic crisis
  - Mexican President Enrique Peña Nieto cancels the meeting scheduled for next week
    with U.S. President Donald Trump, citing his plan to build a border wall between
    the two countries. (The New York Times)
  - Donald Trump calls for a 20% tariff on Mexican imports to pay for the cost of
    a wall on the U.S–Mexican border. White House Press Secretary Sean Spicer says
    that this is one of the ideas that the administration is considering to make Mexico
    pay for the wall. (NBC News)
  Law and crime:
  - The Supreme Court of Greece rejects the extradition of eight soldiers accused
    by Turkey of involvement in the 2016 Turkish coup d'état attempt. (BBC News)
  - Former Gambian Interior Minister Ousman Sonko is arrested in Switzerland on allegations
    of human rights abuses. (News24)
  Politics and elections:
  - Patrick F. Kennedy, Joyce Anne Barr, Michele Thoren Bond and Gentry O. Smith resign
    from the United States Department of State, after Victoria Nuland and Gregory
    B. Starr had declined to stay on in the Donald Trump administration. (The Herald
    Scotland)
  - 2016–2017 Gambian constitutional crisis
  - Gambian President Adama Barrow returns to the Gambia after being sworn in as president
    in Senegal, bringing an end to the country's political crisis. (The Guardian)
  - Ard van der Steur the Minister of Security and Justice of the Netherlands resigns
    after allegedly misinforming the House of Representatives over the fallout of
    a payments scandal. (BBC News)
  Science and technology:
  - The Bulletin of the Atomic Scientists moves the Doomsday Clock thirty seconds
    forward, to two and a half minutes before midnight. (The Washington Post)
