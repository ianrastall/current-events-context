Date: '2017-01-24'
Source_URI: Portal:Current events/2017 January 24
Intelligence_Payload:
  Arts and culture:
  - 89th Academy Awards
  - Nominations for the 2017 Academy Awards are announced, with La La Land, Moonlight
    and Hidden Figures among the favorites. (Los Angeles Times)
  - Mashhad in northeastern Iran was officially named the capital of the Islamic culture
    in 2017 by the ISESCO. (Tasnim)
  Disasters and accidents:
  - California Governor Jerry Brown declares a state of emergency in 50 counties,
    as winter storms kill four and cause millions of dollars in damage. (The Weather
    Channel)
  - Rigopiano avalanche
  - The death toll from the avalanche which buried the four-star luxury resort Hotel
    Rigopiano on 18 January rises to seventeen, with twelve others still missing.
    (ABC News)
  - An Italian rescue helicopter, carrying an injured skier from Gran Sasso d'Italia,
    crashes amid thick fog, killing six people. (BBC)
  - Fire destroys a kennel in Wasilla, Alaska, killing 46 Labrador Retrievers. Thirty-two
    other dogs survive the fire in the licensed shelter. (KTUU-TV)
  Law and crime:
  - Police discover US$20 million in a bed frame under a mattress at a Massachusetts
    home. The cash is believed to be linked to Telexfree, a pyramid scheme disguised
    as a company that claimed to provide internet phone services. A Brazilian man
    that police were following was charged in connection to the money. (BBC)
  Politics and elections:
  - Ken Wyatt is sworn in as the first Indigenous Australian ever to serve as a Federal
    minister, becoming the Minister for Indigenous Health and Aged Care. (ABC News)
  - R (Miller) v Secretary of State for Exiting the European Union
  - The Supreme Court of the United Kingdom rules that the Government of the United
    Kingdom may not begin the formal Brexit process until Parliament votes in approval
    of the move. (BBC)
  - Israeli settlement
  - Israel approves the construction of 2,500 more new settlement homes in the West
    Bank, the most in years and the second time new homes were approved since Donald
    Trump was inaugurated as President of the United States. (The Guardian)
  - Syrian peace process
  - The second day of peace negotiations in Astana, Kazakhstan, end with the sponsors
    of the talks, Russia, Turkey and Iran, agreeing to set up commission between the
    three to monitor and enforce the fragile ceasefire to the Syrian Civil War. (The
    Guardian)
  - 2016–2017 Gambian constitutional crisis
  - Gambian President Adama Barrow names Fatoumata Tambajang as Vice-President of
    the Gambia. (Al Jazeera)
  - Presidency of Donald Trump
  - U.S. President Donald Trump signs documents approving the construction of both
    the Keystone XL and Dakota Access Pipelines. (BBC)
