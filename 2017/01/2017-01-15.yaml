Date: '2017-01-15'
Source_URI: Portal:Current events/2017 January 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - At least seven people are killed when their vehicle hits a roadside bomb in Nangarhar
    Province. (Radio Free Europe/Radio Liberty)
  Disasters and accidents:
  - Floods in Thailand
  - Flooding in southern Thailand has caused 40 deaths in recent days with more heavy
    rain forecast for Monday. (Sydney Morning Herald)
  International relations:
  - Israeli–Palestinian peace process
  - A summit begins in Paris, France, to restart peace negotiations between Israel
    and Palestine in an effort to discuss a possible two-state solution to the conflict.
    However, neither Israel nor Palestine sent representatives to the summit, casting
    doubts on a breakthrough. (Al Jazeera)
  - Kosovo–Serbia relations
  - Serbian President Tomislav Nikolić accuses Kosovo of "seeking a war" after a train,
    en route to the Serb-majority city of Mitrovica in North Kosovo, and decorated
    in Serbian national colors and the words "Kosovo je Srbija" (Kosovo is Serbia),
    was prevented from crossing the Kosovan border. The Prime Minister of Kosovo Isa
    Mustafa says the train had been stopped "to protect the country's sovereignty".
    (BBC)
  Law and crime:
  - Crime in Brazil
  - At least 10 people are killed in a prison riot between rival gangs in Natal, Brazil.
    (BBC)
  - 2011 Bahraini uprising
  - Bahrain executes three people for their alleged involvement in a bombing that
    killed three police officers in 2014, the first executions in the country since
    2010. (The Guardian)
  Science and Technology:
  - Scientists have created a new form of hydrogen at temperature near absolute zero.
    These anions or clusters are formed by an electron addition to liquid helium nanodroplets
    doped with molecular hydrogen or deuterium. (Science Alert) (Science News)
  - SpaceX returns to flight by placing 10 Iridium NEXT satellites in orbit and successfully
    recovering the first stage of its Falcon 9 launcher on a droneship. (Ars Technica)
