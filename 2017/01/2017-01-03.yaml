Date: '2017-01-03'
Source_URI: Portal:Current events/2017 January 3
Intelligence_Payload:
  Business and economy:
  - Ford announces that it has cancelled plans to build a $1.6 billion plant in Mexico,
    long criticized by U.S. President-elect Donald Trump, and will invest $700 million
    in its Michigan plant in Flat Rock, potentially creating 700 new jobs from the
    investment and expansion of the plant. (CNN) (Fox News)
  - The U.S. Commerce Department announces that construction spending increased 0.9
    percent to $1.18 trillion in November 2016, the highest level since April 2006.
    (CNBC)
  Law and crime:
  - Former Hong Kong Chief Executive Donald Tsang, who is on trial for corruption,
    pleads not guilty to three charges of bribery and misconduct relating to a penthouse
    he leased in Shenzhen. (AFP, Reuters via The Straits Times) (BBC News) (South
    China Morning Post)
  - 2017 Kidapawan jail siege
  - More than 100 prisoners escape in the Philippines after armed suspected Muslim
    rebels storm a prison in Kidapawan. A prison guard dies. (ABC Australia) (Al Jazeera)
  Politics and elections:
  - Presidential transition of Donald Trump
  - U.S. President-elect Donald Trump says that Robert Lighthizer will be the country's
    chief trade negotiator. (Reuters)
  - 115th United States Congress
  - The Republican-led U.S. House of Representatives cancels plans approved on Monday,
    following widespread criticism, including a tweet by President-elect Trump, that
    would have weakened the House's independent ethics watchdog, the Office of Congressional
    Ethics. (CNN) (Washington Post)
  - The House GOP caucus overwhelmingly re-elects Paul Ryan to another term as House
    Speaker. (AP via KYTV) (Politico)
  - The Grand National Assembly of Turkey votes to extend a state of emergency imposed
    after last year's attempted coup for another three months. (AP)
  Sports:
  - The English rugby league club the Bradford Bulls goes into liquidation after years
    of financial problems. (BBC)
