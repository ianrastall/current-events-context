Date: '2017-01-28'
Source_URI: Portal:Current events/2017 January 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - The World Food Programme cuts food aid to over 1.4 million displaced Iraqis by
    50%, citing payment delays from donor states. (Al Jazeera)
  Disasters and accidents:
  - A boat with 31 people on board, including more than 20 Chinese tourists, goes
    missing after sailing from the eastern Malaysian port of Kota Kinabalu to visit
    the island of Pulau Mengalum. (AP)
  International relations:
  - Pope Francis takes de facto control of the Sovereign Military Order of Malta (the
    entity retains sovereignty under international law), forcing its leader Prince
    and Grand Master Matthew Festing to resign. (The New York Times)
  - Turkey–United Kingdom relations
  - UK Prime Minister Theresa May and Turkish President Recep Tayyip Erdoğan sign
    a £100 million defense deal to build new fighter jets. Under the deal, BAE Systems
    will collaborate with Turkish companies to build the TAI TFX. (The Guardian)
  Law and crime:
  - Executive Order 13769
  - Travelers from Iran, Iraq, Libya, Somalia, Sudan, Syria, and Yemen are blocked
    from entering the United States as the executive order takes effect. (The New
    York Times)
  - Iran says it will take reciprocal action after U.S. President Donald Trump signed
    the executive order which limits immigration from seven Muslim-majority countries,
    including Iran. (CNN)
  - U.S. District Judge Ann Donnelly in New York grants a stay of the executive order
    that allows people with valid visas who landed in the U.S. to temporarily remain
    in the country. (Reuters) (CNBC) (AP)
  - Silvio Berlusconi prostitute trial
  - An Italian court orders former Prime Minister Silvio Berlusconi to stand trial
    on April 4 on charges of allegedly bribing witnesses with €10 million (US$11 million)
    in order to silence them over accusations he paid for sex with young women. (Reuters)
  Sport:
  - 2017 Australian Open
  - Serena Williams defeats her sister Venus Williams 6-4, 6-4 to win the women's
    singles and an Open era-record 23rd Grand Slam singles title. (The Guardian)
