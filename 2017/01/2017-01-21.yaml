Date: '2017-01-21'
Source_URI: Portal:Current events/2017 January 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - 2017 Parachinar bombing
  - At least 22 people are killed and around 90 injured after a bomb explodes at a
    vegetable market in Parachinar in the Federally Administered Tribal Areas of Pakistan.
    (Al Jazeera) (AP) (Bernama via AstroAwan) (Radio Pakistan)
  - Lashkar-i-Jhangvi al-Alami and Tehrik-i-Taliban Pakistan released joint statements
    claiming responsibility through text messages sent to journalists. (Dawn News)
    (Reuters)
  - Syrian civil war
  - A car bomb attack occurs in the Rakban refugee camp near the Jordanian border.
    Casualty counts are currently unknown and no one has yet taken credit for the
    attack. (Al Jazeera)
  - Two suicide bombers detonate their explosives during a firefight with Saudi security
    forces in Jeddah. (Al Jazeera)
  - Eight people are killed in Rafah, Egypt, after a shell lands on the home in which
    they were staying. (Reuters)
  Disasters and accidents:
  - Kuneru train derailment
  - The Hirakhand Express 18448, a scheduled passenger train from Jagdalpur to Bhubaneswar,
    derails near Kuneru in the Indian state of Andhra Pradesh. At least 25 are killed
    and around 200 others are injured. (The Deccan Chronicle)
  Law and crime:
  - Brazilian police enter the Alcacuz prison outside the city of Natal, Rio Grande
    do Norte, after a week of fighting leaves 26 inmates dead. At least 126 people
    have been killed in Brazil's prisons since the beginning of the year. (AP)
  Politics and elections:
  - 2017 Women's March and Inauguration of Donald Trump protests
  - A crowd of over 500,000 gather in Washington DC, U.S., to advocate for women's
    rights and address the inauguration of Donald Trump (The New York Times) (LA Times)
  - Marches occur across the U.S. and throughout the world, with 408 reported marches
    in the U.S. and 168 marches reported in other countries. (The New York Times)
  - 2016–2017 Gambian constitutional crisis
  - Former President Yahya Jammeh leaves The Gambia on a plane reportedly bound for
    Guinea. (BBC)
