Date: '2017-01-22'
Source_URI: Portal:Current events/2017 January 22
Intelligence_Payload:
  Disasters and accidents:
  - A 7.9 magnitude earthquake hits west of Panguna, Papua New Guinea, beneath Bougainville
    Island. No immediate reports of casualties or major damage. Tsunami alert for
    Papua New Guinea and the Solomon Islands is rescinded. (Reuters/AP via ABC) (TVNZ)
    (AFP via Yahoo! News) (USGS)
  - Chile has declared a state of emergency and requested international help to help
    deal with forest fires. (BBC)
  - January 21–22, 2017 tornado outbreak
  - Severe storms kill at least 11 people and injure 23 in the U.S. state of Georgia.
    (BBC)
  - The death toll in the southern United States rises to 18 with the Governor of
    Georgia Nathan Deal declaring a state of emergency in seven counties. (Yahoo!
    News Canada)
  Law and crime:
  - A shootout between armed robbers and civilian bystanders at the Rolling Oaks Mall
    in San Antonio, Texas, U.S., leaves one dead and seven wounded. (Reuters)
  Politics and elections:
  - Mauritian Prime Minister Anerood Jugnauth announces his intention to resign on
    Monday and hand power over to his son, Pravind Jugnauth. (BBC)
  - Israeli settlement
  - Following the inauguration of Donald Trump as President of the United States,
    Israel approves the construction of 566 new settlement homes in East Jerusalem.
    (BBC)
  - French Socialist Party presidential primary, 2017
  - Voting takes place in the first round of the French Socialist Party presidential
    primary to select a candidate to run in this year's presidential election. (Reuters)
  - Benoît Hamon wins the first round of voting and will now face runner-up former
    Prime Minister of France Manuel Valls in a second round run-off on January 29.
    (BBC)
  - The Indian state government of Tamil Nadu lifts its ban on the sport of Jallikattu,
    following five days of protests by demonstrators against the ban. (The New Indian
    Express)
