Date: '2017-01-11'
Source_URI: Portal:Current events/2017 January 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - At least 11 people are killed in a bombing in Kandahar, including five UAE diplomats.
    (Al Jazeera)
  - Taiwan scrambles navy ships and jets as Chinese warships, led by the aircraft
    carrier Liaoning, sail through the Taiwan Strait following exercises in the South
    China Sea. (Reuters)
  Arts and culture:
  - The Elbphilharmonie concert hall in Hamburg, Germany is officially inaugurated
    with light shows and concerts of the Elbphilharmonie Orchestra. (The New York
    Times)
  Business and economy:
  - Environmentalists and netizens protest the planned construction of a Nickelodeon-themed
    underwater amusement park and resort by Viacom International Media Networks in
    Coron, Palawan, Philippines, despite claims by Viacom that the project would advocate
    marine resources conservation. (CNN Money) (CNN Philippines)
  - Reuters reports, on the basis of anonymous Chinese bankers, that the State Administration
    of Foreign Exchange is instructing them to keep quiet about any negative analysis
    of prospects for the yuan. (Reuters)
  Law and crime:
  - Crime in El Salvador
  - As the homicide rate in El Salvador declines, the country records its first day
    in the last two years without a homicide. (CNN)
  Politics and elections:
  - President-elect of the United States Donald Trump holds his first post-election
    press conference in New York City. (CBS News)
  - The Special Inspector General for Afghanistan Reconstruction releases a report
    on Afghanistan, saying that the Afghan Armed Forces are not capable of securing
    the country and have lost more territory to the Taliban, the most since the United
    States invasion of Afghanistan in 2001. (Radio Free Europe/Radio Liberty)
  Science and technology:
  - Radio in Norway
  - Norway becomes the first country to start a complete switch-off of national FM
    radio stations. The change, from the analogue FM system to digital audio broadcasting,
    is expected to be completed by the end of the year. Some, such as the Norwegian
    Local Radio Association, are concerned about the impact on motorists and the elderly.
    (New Scientist) (BBC)
