Date: '2017-01-10'
Source_URI: Portal:Current events/2017 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan, 10 January 2017 Afghanistan bombings
  - Two bombs explode near the National Assembly in Kabul, killing at least 38 people.
    (Radio Free Europe/Radio Liberty)
  Arts and culture:
  - The board for the US$1 billion Lucas Museum of Narrative Art announces it will
    construct the museum in Los Angeles, California. (Los Angeles Times)
  International Relations:
  - Iran–Saudi Arabia relations
  - Iran confirms receipt of Saudi Arabian invitation to discuss bilateral talk for
    Hajj-2017. The Iranian delegation is expected to travel to Saudi Arabia on 23
    February this year for participation in the next pilgrimage. (The Washington Post)
    (The News)
  - The foreign ministry of the People's Republic of China confirms that the country's
    head of state Xi Jinping will attend the World Economic Forum in Davos, Switzerland,
    this year, making him the first China's paramount leader to attend the high-profile
    event. (Reuters)
  - Israel–Palestine relations
  - The Palestinian National Authority threatens to revoke its recognition of Israel
    (guaranteed by their signing of the Oslo I Accord in 1993) if the United States,
    under the presidency of Donald Trump, moves its Embassy in Tel Aviv to Jerusalem.
    (The Guardian)
  - Addis Ababa–Djibouti Railway
  - Addis Ababa–Djibouti Railway is officially completed, creating a rail link between
    Djibouti and Ethiopia. (AllAfrica.com)
  Law and crime:
  - American Dylann Roof is sentenced to death for the Charleston church shooting
    in which nine people were killed. (Fox News)
  Politics and elections:
  - Death and state funeral of Akbar Hashemi Rafsanjani
  - Hundreds of thousands of Iranians gather in Tehran for the funeral of former president
    Akbar Hashemi Rafsanjani. (Reuters) (CNN)
  - Presidential transition of Donald Trump
  - President-elect Donald Trump appoints businessman and son-in-law Jared Kushner
    as his senior advisor in the White House. (Al Jazeera)
  Sports:
  - The FIFA Council unanimously approves expansion of the World Cup from 32 to 48
    teams starting in 2026. (ESPN)
  - In U.S. college women's basketball, Connecticut wins its 90th consecutive game,
    tying the school's own record for the longest winning streak in NCAA Division
    I basketball for either sex. (ESPN)
