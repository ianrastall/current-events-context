Date: '2017-04-01'
Source_URI: Portal:Current events/2017 April 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Military intervention against ISIL
  - An Iraqi airstrike near Al Qaim, Anbar province, Iraq, kills Ayad al-Jumaili,
    believed to be ISIL's second-in-command. (Al Jazeera)
  Disasters and accidents:
  - Cyclone Debbie
  - Consequences of heavy rain from Cyclone Debbie kill at least three people and
    force 20,000 others to leave their homes in New South Wales and Queensland. (News
    Limited) (ABC)
  - Police search for four missing people in southeast Queensland as the Logan River
    reaches record levels. (AAP via Yahoo! News Australia)
  - A landslide hits the Indonesian island of Java and leaves more than two dozen
    people missing. (DPA via News Limited)
  - 2017 Putumayo landslide
  - A landslide in Colombia's southwestern border department of Putumayo sends mud
    and debris crashing onto houses killing over 250 people and injuring at least
    400 others. In addition, 200 people are missing. (Hindustan Times) (Reuters)
  - An explosion occurs at a carnival in Villepinte, Seine-Saint-Denis, France, injuring
    at least 18 people. (The Independent) (BBC)
  - Authorities cannot contact the South Korean cargo freighter Stellar Daisy. It
    is believed that the ship sunk off the coast of Uruguay. (SBS Australia)
  Politics and elections:
  - 2017 dissolution of Venezuelan National Assembly
  - Venezuela's Supreme Court reverses their controversial ruling. The court restores
    legislative power to the National Assembly. However, the court's decision still
    allows President Nicolás Maduro to enter joint-venture deals. (BBC) (The Washington
    Post)
  - After two weeks of social unrest in French Guiana, the French government promises
    €1 billion for education, healthcare, security, and justice. (France 24) (Reuters)
  Sports:
  - 2017 NCAA Division I Men's Basketball Tournament
  - Men's basketball Gonzaga defeats South Carolina 77–73 to advance to the title
    game on April 3. (AP via ESPN)
  - In the other semifinal, North Carolina defeats Oregon 77–76. (AP via ESPN)
