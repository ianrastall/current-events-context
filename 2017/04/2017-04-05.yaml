Date: '2017-04-05'
Source_URI: Portal:Current events/2017 April 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - A suicide bomber kills at least six people and injures 18 near a Pakistan Army
    vehicle taking part in the census in the city of Lahore. (Reuters)
  - Iraqi Civil War (2014–2017)
  - According to security sources, dozens of people are killed in an overnight attack
    in Tikrit by suspected ISIL militants. 31 bodies were taken to a hospital, according
    to a local doctor, while more continued to be found by morning. (Al Jazeera)
  Disasters and accidents:
  - A USAF F-16 crashes shortly after takeoff from Joint Base Andrews in Prince George's
    County, Maryland. The pilot inside ejected safely and was taken to a local hospital
    with non-life threatening injuries. (Fox News)
  - A 6.1 magnitude earthquake struck northeast Iran near the city of Mashhad, kills
    1 person and at that least four were injured. (Reuters)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea fires a medium-range ballistic missile about 60 kilometers (37 miles)
    into its eastern waters, in the direction of Japan according to United States
    and South Korean officials. (CNN) (AP)
  - United States Secretary of State Rex Tillerson issues a statement saying "The
    United States has spoken enough about North Korea. We have no further comment."
    (CNN)
  - China–Finland relations
  - Chinese president Xi Jinping visits Finland on his way to the United States. (Reuters)
  Law and crime:
  - Mexican Beltrán Leyva Cartel drug lord Alfredo Beltrán Leyva is sentenced to life
    in prison and ordered to forfeit $US529,200,000. (U.S. Department of Justice)
  Politics and elections:
  - LGBT history
  - Two openly gay candidates are elected to the Anchorage Assembly, becoming the
    first openly LGBT elected officials in Alaska. Approximately 20 percent of the
    city's population voted, a notably low turnout. (LGBT Weekly) (Alaska Commons)
