Date: '2017-04-02'
Source_URI: Portal:Current events/2017 April 2
Intelligence_Payload:
  Business and economy:
  - India inaugurates the 9.2-kilometer Chenani-Nashri Tunnel, in the state of Jammu
    and Kashmir. (The Times of India)
  - Ciudad Juárez-based newspaper Norte closes its print edition, citing a lack of
    security in Mexico. (AP via ABC) (Guardian)
  Disasters and accidents:
  - Cyclone Debbie
  - The death toll from Cyclone Debbie and the associated flooding in the Australian
    states of New South Wales and Queensland rises to five people. (News Limited)
  - A bus carrying around 50 school children rolls over on a highway south of Sveg
    in the northern region of Härjedalen, Sweden, killing three people. (Reuters)
  Law and crime:
  - An attack occurs at a Sufi shrine near Sargodha, Pakistan, killing more than 20
    people. Authorities arrest a main suspect and several others. (BBC)
  Politics and elections:
  - Armenian parliamentary election, 2017
  - Voters in Armenia go to the polls for an election, the first since constitutional
    changes were approved in a referendum in 2015, which changed the country's governance
    from a semi-presidential system to a parliamentary republic. Opinion polls predict
    a tight race between the nationalist Republican Party, led by President Serzh
    Sargsyan, and the centre-right Prosperous Armenia, led by Gagik Tsarukyan. With
    votes from 64% of the polling stations counted, the Republican Party leads with
    49.7% of votes. (Radio Free Europe/Radio Liberty) (TASS)
  - Serbian presidential election, 2017
  - Voters in Serbia go to the polls for an election, which Prime Minister Aleksandar
    Vučić of the conservative Serbian Progressive Party is expected to win. In projections,
    Vučić gets around 55% of the votes, avoiding a second round. (Radio Free Europe/Radio
    Liberty) (CNBC)
  - Ecuadorian general election, 2017
  - Voters in Ecuador return to the polls for the second round of a presidential election,
    which Lenín Moreno of the socialist PAIS Alliance is predicted to narrowly win
    over the center-right Creating Opportunities's Guillermo Lasso. With 94.18% of
    the votes counted, Moreno leads with 51.07%. According to the national election
    commission, it was a transparent and successful election. (SBS News) (TeleSUR)
  Sports:
  - 2017 NCAA Division I Women's Basketball Championship Game
  - South Carolina defeats fellow Southeastern Conference team Mississippi State 67–55
    for the Gamecocks' first national title. (AP via ESPN)
