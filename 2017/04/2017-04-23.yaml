Date: '2017-04-23'
Source_URI: Portal:Current events/2017 April 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - A U.S. member of the OSCE monitoring mission is killed and two others injured
    after their vehicle drives over a land mine near Luhansk. (Radio Free Europe/Radio
    Liberty)
  International relations:
  - North Korea–United States relations
  - Yonhap reports that North Korea has detained a U.S. citizen as he sought to leave
    the country. (BBC)
  Law and crime:
  - Prominent Italian-born conservationist Kuki Gallmann is shot and injured in an
    ambush in northern Kenya. (BBC)
  - European migrant crisis
  - An Italian prosecutor says there are "telephone calls" between people smugglers
    in Libya and some non-governmental organizations. Frontex, the European Border
    and Coast Guard Agency, says the practices amount to a "taxi service". One NGO
    says "more would die" if they were not there. (Deutsche Welle) (BBC)
  Politics and elections:
  - 2017 French presidential election
  - Voters in France go to the polls to elect a new president; Marine Le Pen and Emmanuel
    Macron qualify for the second round. (The Wire) (The Washington Post)
