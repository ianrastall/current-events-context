Date: '2017-04-25'
Source_URI: Portal:Current events/2017 April 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - April 2017 Turkish airstrikes in Syria and Iraq
  - Turkish air strikes kill 18 Kurdish YPG fighters and media officials in northeastern
    Syria. Also five Peshmerga fighters are killed during a Turkish attack on Sinjar
    in Iraq. Turkey also claims to have destroyed "terror hubs". Iraq denounces the
    strike as a violation of its sovereignty. (Reuters) (Hurriet Daily News)
  Arts and culture:
  - Wikipedia co-founder Jimmy Wales announces plans for a crowdfunded news website,
    Wikitribune, that will publish stories by journalists, with contributions, including
    fact checking, by volunteers to, among other goals, counter the recent spread
    of so-called "fake news". (NBC News) (Nieman Foundation for Journalism)
  Business and economy:
  - United States Secretary of the Interior Ryan Zinke says that Donald Trump plans
    to review U.S. national monuments. (The Washington Post)
  Disasters and accidents:
  - Twenty-seven people are killed in Kenya's Makueni County when a bus and a truck
    collide on the Nairobi–Mombasa Road. (The Standard)
  International relations:
  - Saudi Arabia is among twelve countries newly elected to the United Nations Commission
    on the Status of Women, despite the nation's conflicts with women's rights. (Australian
    Broadcasting Corporation)
  - North Korea–United States relations
  - The USS Michigan docks at Busan, South Korea, amid growing concerns over North
    Korean weapons development. (BBC)
  - Germany–Israel relations
  - Prime Minister of Israel Benjamin Netanyahu cancels a visit with the foreign minister
    of Germany Sigmar Gabriel after the latter's refusal to cancel a meeting with
    the Israel Defense Forces veterans NGO Breaking the Silence saying the group "slanders
    IDF soldiers as war criminals"(New York Daily News)
  Law and crime:
  - India is to provide every cow with a biometric dog tag, in an effort to prevent
    cattle smuggling. (Times of India)
  - The United States announced it will end a six-year Central-African hunt for Joseph
    Kony the following day. (AFP via Pulse.ng)
  - Gun politics in the United States
  - An affiliate of the NRA sues California for alleged discrimination. (Fox News)
  - Immigration policy of Donald Trump
  - U.S. District Court Judge William Orrick rules that President Donald Trump's executive
    order withholding federal funds from sanctuary cities is unconstitutional. (The
    Washington Post)
  Sports:
  - In auto racing, longtime NASCAR Cup Series star Dale Earnhardt Jr. announces that
    he will retire at the end of the 2017 season. (ESPN)
