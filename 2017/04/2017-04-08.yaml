Date: '2017-04-08'
Source_URI: Portal:Current events/2017 April 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - A U.S. special forces service member is killed while taking part in an operation
    against ISIL militants in Afghanistan's eastern Nangarhar Province. (Sky News)
  Disasters and accidents:
  - A freight train derails in Hunedoara County, Romania, killing both crew members
    on board. (The New York Times)
  - In Świebodzice, Poland, an old tenement house collapses killing at least six people,
    including two children, and injuring six. The exploration teams are looking for
    4 missing people. (Gazeta.pl)
  - Cyclone Debbie
  - Another body has been found after flooding in eastern Queensland, raising the
    death toll to twelve. (ABC News)
  - At least 20 people are killed when a boat carrying wedding guests collides with
    a river barge in western Myanmar. (AFP via News24)
  - 2017 Batangas earthquakes
  - Two earthquakes, with magnitudes of 5.6 and 6.0 and related to the April 4 magnitude
    5.5 earthquake, hits Batangas, and are felt as far as Metro Manila. (Rappler)
  Law and crime:
  - ETA ceasefire negotiations
  - The militant Basque separatist group ETA begins handing over its remaining weapons
    during a ceremony in Bayonne, France, in which the group turned over to authorities
    an inventory of weapons and their locations. (BBC)
  - Four inmates are killed at Kirkland Correctional Institution in South Carolina.
    Authorities have charged two inmates with the murders of the four men. (NBC News)
