Date: '2017-04-14'
Source_URI: Portal:Current events/2017 April 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - The Afghan Ministry of Defense reports as many as 36 suspected ISIL militants
    were killed while no civilians were harmed in yesterday's bombing in Nangarhar
    Province using the so-called "mother of all bombs" (GBU-43). The ministry spokesman
    added these deaths have not been independently verified. (Reuters)
  - 2017 Jerusalem Light Rail stabbing
  - A British student is stabbed and killed during an attack on a light-rail train
    in Jerusalem, Israel. Two other passengers are injured. A Palestinian man with
    a history of mental problems and other issues is taken into custody by Israeli
    authorities. Israeli Finance Minister Moshe Kahlon linked the attack to terrorism.
    (Haaretz)
  - Somali Civil War (2009–present)
  - The United States is to deploy troops to Somalia for the first time since 1994
    to help train the Somali Armed Forces in their conflict with al-Shabaab insurgents.
    (BBC)
  Disasters and incidents:
  - A landfill slide in Colombo, Sri Lanka, kills at least 16 people. (RTÉ)
  Law and crime:
  - Amtrak Police taser a man at New York's Penn Station after the man allegedly became
    agitated due to a delayed train. Bystanders, falsely believing a shooting had
    occurred, caused a stampede, injuring more than a dozen people. (New York Daily
    News) (Newsday)
  International relations:
  - China–North Korea relations
  - Air China suspends all flights to North Korea's capital Pyongyang amid rising
    tensions between North Korea and the United States. (CNN)
  - European migrant crisis
  - More than 2,000 migrants are rescued from the Mediterranean Sea off the coast
    of Libya. (Reuters)
  - Global surveillance disclosures (2013–present)
  - The Shadow Brokers group releases files allegedly from the National Security Agency
    which indicate efforts to monitor financial transactions made through the Society
    for Worldwide Interbank Financial Telecommunication. (Reuters)
  - The release also includes programs targeting Microsoft Windows operating systems.
    Microsoft announces that it had already fixed most (but not all) of these exploits.
    (Engadget) (Motherboard)
  Politics and elections:
  - Iranian presidential election, 2017
  - President Hassan Rouhani seeks for a second term while one of his main rivals
    Ebrahim Raisi also registers with just one day remaining for the submission. (Al
    Jazeera) (Reuters)
