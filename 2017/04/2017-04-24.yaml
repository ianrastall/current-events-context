Date: '2017-04-24'
Source_URI: Portal:Current events/2017 April 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Camp Shaheen attack
  - The Afghan Minister of Defense, Abdullah Habibi and the Chief of Staff of the
    Afghan National Army, Qadam Shah Shahim, resign after a Taliban attack on Camp
    Shaheen near Mazar-i-Sharif that claimed over 140 lives. (CNN) (UPI)
  - 2017 Sukma attack
  - Suspected Maoist insurgents kill at least 24 Central Reserve Police Force (CRPF)
    officers in the Sukma district of Chhattisgarh, India. (BBC)
  International relations:
  - Syria–United States relations
  - The United States imposes sanctions on 271 employees of the Syrian Scientific
    Studies and Research Center for their alleged role in developing weapons used
    in the Khan Shaykhun chemical attack. (Deutsche Welle)
  Law and crime:
  - In Paraguay, around 50 armed men, allegedly belonging to the Brazil-based Primeiro
    Comando da Capital criminal gang, storm a security vault and police headquarters
    in Ciudad del Este, escaping with around $6 million in a daring cross-border raid.
    (The Guardian)
  - Philippine Drug War
  - A Filipino lawyer files a complaint of "mass murder and crimes against humanity"
    against Philippines president Rodrigo Duterte and eleven other officials at the
    International Criminal Court in The Hague, Netherlands. (The New York Times)
  - The accused include PNP chief Ronald dela Rosa, Justice secretary Vitaliano Aguirre,
    Edilberto Leonardo, Royina Garma, House speaker Pantaleon Alvarez, former Interior
    secretary Ismael Sueno, Sonny Buenaventura, Solicitor General Jose Calida, Dante
    Gierran, Senator Richard J. Gordon, and Senator Alan Peter Cayetano. (Philippine
    Daily Inquirer)
  - List of offenders executed in the United States in 2017
  - Arkansas becomes the first U.S. state since Texas in 2000 to hold two executions
    on the same day as executes convicted murderers Jack Jones, Jr. and Marcel Williams.
    (BBC) (AP via Yahoo! News)
  Politics and elections:
  - 2017 French presidential election
  - Presidential candidate Marine Le Pen announces she is stepping down as leader
    of the National Front. (BBC)
  - Muhammad V is formally installed as the 15th King of Malaysia. (Berita Harian)
  - United Kingdom general election, 2017
  - The Communist Party of Britain announces it will not field any candidates in the
    upcoming general election for the first time since its formation in 1920, and
    endorses Labour leader Jeremy Corbyn, saying victory for Mr Corbyn at the general
    election in June would be “the first step towards a formation of left-led government
    at Westminster”. (The Independent)
  Science and technology:
  - Peggy Whitson, commander of the International Space Station (ISS), breaks the
    record for most total days spent in space by any NASA astronaut, at more than
    534 days. (Mirror)
