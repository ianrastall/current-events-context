Date: '2017-04-10'
Source_URI: Portal:Current events/2017 April 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - South Sudanese Civil War
  - Government-aligned militias kill 16 people during a raid in Wau, South Sudan.
    (Reuters)
  - Somali Civil War (2009–present)
  - A suicide bomber attacks a military training camp in Mogadishu, killing at least
    nine soldiers. Al-Shabaab claimed responsibility for the attack. (Al Jazeera)
  Arts and culture:
  - 2017 Pulitzer Prize
  - The New York Daily News and ProPublica win the Pulitzer Prize for Public Service
    for reporting on nuisance abatement by police targeting minorities. (The New York
    Times)
  - The Underground Railroad by Colson Whitehead and Sweat by Lynn Nottage win the
    Pultizer Prizes for Fiction and Drama respectively. (The Guardian)
  Business and economics:
  - Aspen Skiing Company and KSL Capital Partners agree to acquire Intrawest for $1.5
    billion. (Reuters)
  - The United Kingdom-based Jaeger fashion chain collapses into administration after
    failing to find a buyer. (BBC)
  Disasters and accidents:
  - 2016–17 South Pacific cyclone season
  - Category 3 Cyclone Cook hits Grand Terre, the main island of New Caledonia. (ABC)
    (Stuff.co.nz)
  International relations:
  - Cross-Strait relations
  - People's Republic of China detains Taiwanese political activist Lee Ming-che on
    suspicion of endangering national security and revokes his wife's travel permit.
    (Voice of America)
  Law and crime:
  - 2017 North Park Elementary School shooting
  - An elementary school teacher and an 8-year-old student were shot and killed by
    the teacher's estranged husband, who then killed himself, at North Park Elementary
    School in San Bernardino, California. Another student, a 9-year-old boy who was
    also behind the teacher, was wounded. (CNN) (NBC News) (Fox News)
  - Voter ID laws in the United States
  - A federal district court for southern Texas rules that the state's voter ID law
    was passed in 2011 with the intent to discriminate against minority voters. The
    5th Circuit Court of Appeals previously found that the law had the effect of discriminating
    against minority voters, and remanded the case to the district court for further
    action. (Reuters) (Talking Points Memo)
  - Pakistan sentences former Indian Navy officer Kulbhushan Yadav to death for espionage
    and sabotage. (Dawn) (NDTV)
  Politics and elections:
  - Neil Gorsuch Supreme Court nomination
  - President Donald Trump's pick for the U.S. Supreme Court, Neil Gorsuch, is sworn
    in at the White House. (Reuters)
  - Alabama Governor Robert J. Bentley resigns as the Alabama House Judiciary Committee
    began impeachment proceedings against him over a relationship with a former aide.
    In addition, Bentley pleads guilty to two "failure to disclose" misdemeanors.
    Kay Ivey is sworn in as Alabama Governor. Under terms of the plea bargain, Bentley
    is forbidden from ever running for elected office in Alabama again. (NBC News)
    (Business Insider) (WHNT)
  - Starting this spring, the state of New York will offer free four-year public college
    tuition for residents whose families make less than $100,000, the first state
    in the country to do so. (NBC News)
  Science and technology:
  - The Australian Research Council reports that two thirds of the Great Barrier Reef
    have suffered from severe coral bleaching, denoting a second consecutive year
    of severe bleaching. (Australian Broadcasting Corporation)
