Date: '2017-04-11'
Source_URI: Portal:Current events/2017 April 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Russian military intervention in Syria
  - According to the Russian Defence Ministry, two of its soldiers have been killed
    by a mortar attack in Syria while another was wounded. The ministry did not specify
    when or where the attack occurred. (Radio Free Europe/Radio Liberty)
  - A US-led airstrike intended to kill ISIS soldiers mistakenly kills 18 members
    of the Syrian Democratic Forces. (The New York Times)
  - Borussia Dortmund team bus bombing
  - Three explosions occur near the Borussia Dortmund football team bus as it slowed
    down to turn a corner. Spanish player Marc Bartra was injured and has been taken
    to hospital. Dortmund's UEFA Champions League fixture against AS Monaco FC is
    subsequently postponed. (The Daily Telegraph) (The Independent)
  Business and economics:
  - United Express Flight 3411 incident
  - United Airlines CEO Oscar Munoz issues an apology for the removal of a passenger
    from an overbooked flight on April 9, which has since gone viral. United Airlines
    stock drops more than 4%, a loss of £800 million to the company's value. (BBC)
  International relations:
  - North Korea–United States relations
  - North Korea announces its readiness to declare war on the United States after
    the country previously stated that they felt threatened as U.S. military forces
    approach the Korean Peninsula. (News.com.au)
  Politics and elections:
  - Iranian presidential election, 2017
  - The five-day registration process of candidates begins for the elections to be
    held on 19 May. (Mehr News)
  Science & technology:
  - Support for Windows Vista officially ends. (TheVerge)
