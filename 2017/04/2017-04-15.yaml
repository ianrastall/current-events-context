Date: '2017-04-15'
Source_URI: Portal:Current events/2017 April 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, 2017 Aleppo suicide car bombing
  - A car bomb strikes a convoy of buses near Aleppo which were carrying evacuees
    from the pro-government towns of Al-Fu'ah and Kafriya. Over 100 people are killed.
    (BBC) (AP via Yahoo! News)
  - South Sudanese Civil War
  - At least 16 people are killed amid fresh fighting in Raga, according to a SPLM-IO
    spokesperson. The United Nations Office for the Coordination of Humanitarian Affairs
    said that over 60 humanitarian aid workers were forced to flee. (Al Jazeera)
  - 2017 Nangarhar airstrike
  - The death toll according to a Nangarhar official source now stands at 94 militants,
    including 4 commanders. Former president Hamid Karzai says the strike was in violation
    of national sovereignty. (TOLOnews)
  - The Chief Public Prosecutor’s Office in Istanbul launches an investigation into
    17 United States citizens in connection with the 2016 Turkish coup d'état attempt.
    (The Independent)
  Arts and culture:
  - Emma Morano, the last person living who was born before 1900, dies at the age
    of 117. (Reuters)
  Disasters and accidents:
  - 2017 Northwest Iran floods
  - Flash flooding caused by torrential rain leaves at least 17 people dead and 20
    others missing in northwestern Iran, according to state television. (Al Jazeera)
  Law and crime:
  - Personal and business legal affairs of Donald Trump
  - U.S. President Donald Trump's lawyers tell a federal court, in a case alleging
    negligence and incitement to riot during a 2016 campaign rally in Louisville,
    Kentucky, that he is "immune from suit because he is President of the United States."
    A lawyer for the plaintiffs responds that, in Clinton v. Jones, the Supreme Court
    found the president could be sued for events that occurred before he took office.
    (The Washington Post)
  Politics and elections:
  - Presidency of Donald Trump
  - Protests against Donald Trump, Tax Day March
  - Tens of thousands of people march in dozens of U.S. cities and at President Donald
    Trump's Mar-a-Lago resort in Palm Beach, Florida, to demand that Trump release
    his tax returns and to show the public cares about the issue. There were clashes
    between Trump supporters and protesters at some locations, with 11 people injured
    and 21 arrested at a riot in Berkeley, California. (The New York Times) (Reuters)
    (Los Angeles Times)
  - United States Vice President Mike Pence visits Alaska, where he meets with Governor
    Bill Walker and discusses stationing F-35 squadrons in the state. Pence is beginning
    a 10-day trip to South Korea, Australia, Indonesia and Japan. (US News & World
    Report)
  - Iranian presidential election, 2017
  - Tehran Mayor Mohammad-Bagher Ghalibaf and First Vice President Eshaq Jahangiri
    submit their candidacies as registration closes. The final list of approved candidates
    will be announced on April 27. (Mehr News)
