Date: '2017-04-29'
Source_URI: Portal:Current events/2017 April 29
Intelligence_Payload:
  International relations:
  - North Korea and weapons of mass destruction
  - The U.S. Pacific Command and South Korean defense officials report that a North
    Korean missile was fired in the early morning, but quickly failed and did not
    travel beyond North Korea, echoing a similar failed attempt by North Korea thirteen
    days ago. (The Washington Post)
  Disasters and accidents:
  - At least 24 people are killed by a landslide in the small village of Ayu in southern
    Kyrgyzstan. (Radio Free Europe/Radio Liberty)
  - 2017 Aerogaviota Antonov An-26 crash
  - An Aerogaviota-operated Antonov An-26 plane crashes in western Artemisa Province,
    Cuba, killing eight troops on board. (Daily Mail) (AP via Miami Herald)
  - April 2017 North American storm complex
  - At least 7 people are killed in the US states of Missouri, Arkansas and Texas
    due to tornadoes and floods. (CNN)
  Law and crime:
  - 2017 block of Wikipedia in Turkey
  - Monitoring group Turkey Blocks reports that a provisional administrative order
    blocks access to all language editions of Wikipedia in Turkey. (AFP via SBS)
  Politics and elections:
  - People's Climate March
  - Tens of thousands of people protest in Washington, D.C. to bring awareness to
    climate change. (The Guardian)
  - University of Puerto Rico strikes, 2017
  - Strikes continue in the University of Puerto Rico because of university budget
    cuts from the Puerto Rico Oversight Board (PROMESA). (Pasquines)
  - Brexit
  - European Union leaders approve negotiating guidelines that seek to secure "sufficient
    progress" on the rights of European Union expatriates living in the United Kingdom,
    on the financial terms of the separation and on a "soft border" between the Republic
    of Ireland and Northern Ireland, before committing to talk about a new free trade
    deal. (Reuters)
  - White House Correspondents' Association
  - The 2017 White House Correspondents' Dinner is held while Donald Trump decides
    not to attend, becoming the first incumbent president to do so since Ronald Reagan,
    who did not attend the dinner while recovering from a 1981 assassination attempt.
    (The Washington Post)
