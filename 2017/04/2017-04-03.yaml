Date: '2017-04-03'
Source_URI: Portal:Current events/2017 April 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Saint Petersburg Metro bombing
  - An attack on a Saint Petersburg Metro train at Sennaya Ploshchad station kills
    at least 11 people and injures more than 50 others. Authorities disarm another
    bomb, found at nearby Vosstaniya Square station. (The Independent) (The New York
    Times)
  - Piracy off the coast of Somalia
  - Somali pirates hijack an Indian cargo ship off the coast of Puntland. (BBC)
  Arts and culture:
  - An Egyptian excavation team discovers the remains of a pyramid dating back 3,700
    years to the thirteenth Dynasty of Egypt at the Dahshur necropolis 40km south
    of Cairo. (Al Jazeera) (BBC)
  Disasters and accidents:
  - Cyclone Debbie
  - A mother and two children drown after their car plunges into the flooded Tweed
    River, raising the death toll to eight people. A ten-year-old girl escapes and
    alerts authorities. (News.com.au)
  - A boiler explosion at a Missouri box company in St. Louis's historic Soulard neighborhood
    kills three people and injures four others. (St. Louis Post-Dispatch) (St. Louis
    Public Radio)
  Law and crime:
  - LGBT rights in Russia
  - Russian authorities arrest more than 100 gay men in Chechnya, including television
    personalities and religious figures, for "nontraditional sexual orientation."
    The Novaya Gazeta newspaper reported that three of the arrested men have been
    killed, while others reportedly were released for family honor killing. Chechen
    Republic leader Ramzan Kadyrov's spokesperson said this report contains “absolute
    lies and disinformation” since there are no homosexuals in Chechnya. (The Guardian)
    (The New York Times)
  - Trump Tower wiretapping allegations
  - Media reports indicate that former National Security Advisor Susan Rice improperly
    requested the unmasking of some American names, including those of Donald Trump's
    campaign staff, that had been incidentally collected during national security
    investigations. A National Security Adviser may request unmasking if specific
    criteria are met. A Rice associate denies that the unmasking was improper. (Fox
    News) (Business Insider) (The Blaze)
  Politics and elections:
  - Armenian parliamentary election, 2017
  - Authorities declare that the Republican Party, led by President Serzh Sargsyan,
    wins the Armenia election amid accusations by opposition parties and the Organization
    for Security and Co-operation in Europe of voting irregularities. (Al Jazeera)
  Sports:
  - In ice hockey
  - The NHL announces that it will not release its players to participate in the 2018
    Winter Olympics. (ESPN)
  - In basketball
  - 2017 NCAA Division I Men's Basketball Championship Game
  - North Carolina defeats Gonzaga, 71-65, for the 2017 men's basketball national
    title. (ESPN) (The New York Times)
  - 'The Naismith Memorial Basketball Hall of Fame announces its 2017 induction class,
    which will formally enter the Hall on September 8: (Hall of Fame press release)'
  - To be inducted as players are Zack Clayton, Nikos Galis, George McGinnis, and
    Tracy McGrady.
  - To be inducted as coaches are Robert Hughes, Muffet McGraw, and Bill Self.
  - To be inducted as contributors are Mannie Jackson, Tom Jernstedt, Jerry Krause,
    and Rebecca Lobo.
