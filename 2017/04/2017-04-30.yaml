Date: '2017-04-30'
Source_URI: Portal:Current events/2017 April 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - One person is killed and seven are injured in a shooting at a pool party in San
    Diego, California. The suspect is killed by police. (The San Diego Union-Tribune)
  Disasters and accidents:
  - Swiss mountain climber Ueli Steck dies in a mountaineering accident near Mount
    Everest. (AP)
  - Tornado outbreak and floods of April 28–30, 2017
  - The death tolls from tornadoes and floods in the midwestern and southern United
    States rises to ten with two people missing. (Fox News)
  Law and crime:
  - Saeed Karimian, the founder and director of GEM TV, a Persian language network
    based in Dubai, is shot dead in Istanbul, Turkey, along with his Kuwaiti business
    partner. Karimian had previously been tried in absentia by a Tehran court and
    sentenced to six years in prison for spreading propaganda against Iran. (BBC)
  Politics and elections:
  - Democratic Party (Italy) leadership election, 2017
  - Former Italian Prime Minister Matteo Renzi regains the role of Secretary of the
    Democratic Party, after his resignation in February, in an open primary election.
    (The Telegraph)
  - 2017 United States federal budget
  - U.S. Congressional negotiators reach a bipartisan agreement on the FY 2017 federal
    government budget that, once approved by both Houses, will fund the entire fiscal
    year through September 30. The current spending authorization expires Friday,
    May 5. (Bloomberg) (The New York Times)
  Science and technology:
  - Zoologists led by the University of Papua announce the first sighting of a pack
    of New Guinea highland wild dogs in the wild of New Guinea, near the Grasberg
    mine, in over four decades. (Australian Broadcasting Corporation)
  - Sodimejo, an Indonesian man who made an unverified claim to have been born in
    1870, which would have made him 146 years old, has died. (The Guardian)
