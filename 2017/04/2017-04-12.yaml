Date: '2017-04-12'
Source_URI: Portal:Current events/2017 April 12
Intelligence_Payload:
  Arts and culture:
  - Pope Francis expands the Secretariat for Communications and appoints 13 new consultants
    in addition to the 16 members added on July 13, 2016. The secretariat was established
    in June 2015. (America Magazine)
  Armed conflicts and attacks:
  - Ten people are killed in Inabanga, Bohol, in the Philippines' Central Visayas,
    after the country's National Police and Armed Forces clash with suspected members
    of Abu Sayyaf. (CNN Philippines)
  - War in Afghanistan (2001–2021)
  - A suicide bomber kills at least five people and injures ten more near government
    offices in Kabul. ISIL claims responsibility for the attack. (Al Jazeera)
  Business and economics:
  - History of the United States dollar
  - In an interview, U.S. President Donald Trump says the U.S. dollar is "getting
    too strong" and wants to keep interest rates low, causing the U.S. Dollar Index
    to fall. (Reuters)
  Law and crime:
  - Sheila Abdus-Salaam, an incumbent associate judge of the New York Court of Appeals
    and the first African-American woman to serve on the Court of Appeals is found
    dead in the Hudson River. (NY1 News)
  Politics and elections:
  - Iranian presidential election, 2017
  - Former Iranian President Mahmoud Ahmadinejad registers to run in next month's
    election for a non-consecutive third term, according to state media. (Radio Free
    Europe/Radio Liberty)
  - Protests in South Africa
  - Julius Malema addresses a large, multi-racial crowd in Pretoria before their march
    on the Union buildings. (Weekly Xpose South Africa)
