Date: '2017-11-26'
Source_URI: Portal:Current events/2017 November 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Russian airstrikes hit residential buildings in the ISIS-held village of Al-Shafah
    in Deir Ezzor province, killing at least 53 civilians, including 21 children.
    (Japan Times)
  Disasters and accidents:
  - A large factory explosion in Ningbo, China, kills at least 2 people and injures
    more than 30. (BBC)
  - Popocatépetl volcano continues to erupt in Mexico. (CNN)
  Politics and elections:
  - 2017 Tehreek-e-Labaik protest
  - Pakistan's government calls for troops to be deployed in the capital, Islamabad,
    after violence breaks out during protests by Islamists that were organized by
    the Tehreek-e-Labaik. (BBC)
  - Honduran general election, 2017
  - Voters in Honduras go to the polls to elect a president for the country, with
    current President Juan Orlando Hernández running for a second term, marking the
    first time a sitting president sought reelection. (Al Jazeera)
  - Nepalese legislative election, 2017
  - Voters in Nepal go to the polls for the first phase of an election to choose members
    for the House of Representatives and Parliament. (BBC)
  - 2017 United States political sexual scandals
  - John Conyers stands down as the ranking Democrat on the United States House Committee
    on the Judiciary following a series of sexual harassment allegations. (The Globe
    and Mail)
