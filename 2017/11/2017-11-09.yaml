Date: '2017-11-09'
Source_URI: Portal:Current events/2017 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War, Saudi Arabian-led intervention in Yemen
  - A senior UN official warns that Yemen faces the world's largest famine in decades
    "with millions of victims" if aid deliveries do not resume. (BBC)
  Law and crime:
  - 2017 Saudi Arabian purge
  - Saudi Arabia's attorney general says at least $100bn (£76bn) has been misused
    through systemic corruption and embezzlement in recent decades. (BBC)
  - Smoking ban in Vatican City
  - Pope Francis issues a directive banning the sale of most tobacco in Vatican City
    as of January 1, 2018, because of its unhealthy attributes. A 2015 book stated
    the papal city netted $11 million (£8.7 million) per year from these sales. (AFP
    via MSN.com) (Crux)
  - Spanish constitutional crisis
  - The Supreme Court sends to preventive prison the Speaker of the Parliament of
    Catalonia, Carme Forcadell. She leaves the prison the next day, after the payment
    of a bail. Four of the members of the Bureau of the Parliaments are condemned
    to pay a fine, while one of them not receives any precautionary measure. (BBC)
  Politics and elections:
  - United States Senate special election in Alabama, 2017
  - Four women accuse Roy Moore, a former Alabama judge and U.S. Senate candidate,
    of sexual misconduct during the 1970s and early 1980s when they were between the
    ages of 14 and 18 and he was in his 30s. (The Guardian)
  - Some Republican politicians distance themselves from Moore, calling on him to
    step down from the election if these allegations are true, while some Alabama
    Republicans defend him. (Q13 Fox) (Time)
