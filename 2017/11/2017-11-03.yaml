Date: '2017-11-03'
Source_URI: Portal:Current events/2017 November 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Siege of Deir ez-Zor (2014–17)
  - The Syrian Army (SAA) and allies announce the complete liberation of Deir ez-Zor
    from ISIL. (Sputnik International)
  - At least nine people are killed and another 23 are injured in Hader, Quneitra
    Governorate, after a Tahrir al-Sham-operated car bomb detonates inside the town.
    (Reuters)
  - Iraqi Civil War (2014–2017)
  - 2017 Western Iraq campaign
  - The Iraqi Armed Forces enter the town of Al-Qa'im, close to the border with Syria.
    Al-Qa'im is one of the last towns in Iraq still held by ISIL. (Reuters)
  - Somali Civil War (2009–present)
  - The United States launches airstrikes against Islamic State in Somalia for the
    first time. The United States Africa Command says "several terrorists" were killed
    in the strikes, which took place in coordination with Somalia's government. (The
    Independent)
  Arts and culture:
  - Kevin Spacey sexual assault allegations
  - Netflix announces that it will no longer be working with American actor Kevin
    Spacey who plays Frank Underwood on the U.S. version of House of Cards. (News
    Limited)
  International relations:
  - Japan–United States relations
  - United States president Donald Trump's daughter Ivanka visits Japan. (The Washington
    Post) (The New York Times)
  Law and crime:
  - Spanish constitutional crisis
  - Spain issues an arrest warrant against former Catalonian president Carles Puigdemont.
    (BBC)
  - War in Afghanistan
  - United States soldier Bowe Bergdahl is convicted of desertion and dishonorably
    discharged, but is not imprisoned. (The New York Times)
  - Human rights in Zimbabwe
  - Zimbabwe accuses American citizen Martha O'Donovan of trying to overthrow the
    regime of Robert Mugabe. (The Los Angeles Times)
  Politics and elections:
  - 2017 Westminster sexual scandals
  - The Conservative Party suspends Dover MP Charlie Elphicke following "serious allegations"
    against him which have been passed on to police. Elphicke denies any wrongdoing.
    (The Guardian)
  Science and technology:
  - Climate change
  - A significant U.S. federal government study finds "no convincing alternative explanation"
    for the changing climate other than "human activities, especially emissions of
    greenhouse gases." (CNN)
