Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Zimbabwean coup d'état
  - Soldiers directing traffic and at least six APCs have been spotted around Harare,
    a day after General Constantino Chiwenga intervened in attempt to prevent a purge
    within the ruling ZANU-PF party. The party has accused the general of treason.
    (Reuters)
  Disasters and accidents:
  - 2017 Iran–Iraq earthquake
  - Thousands of Iranians are forced to spend a second night outdoors in near-freezing
    temperatures after an earthquake hit the country's western border with Iraq. (BBC)
  Law and crime:
  - Seminole Heights serial killer
  - Police in Florida link a fourth unsolved murder to an unknown serial killer targeting
    the Seminole Heights area of Tampa, Florida. (CNN)
  - Rancho Tehama shootings
  - Five people, including the gunman, are killed and several others injured following
    a shooting at an elementary school and other locations on Rancho Tehama, California.
    The alleged gunman was shot and killed by police. (Los Angeles Times) (NPR)
