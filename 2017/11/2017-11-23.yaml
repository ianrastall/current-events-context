Date: '2017-11-23'
Source_URI: Portal:Current events/2017 November 23
Intelligence_Payload:
  Disasters and accidents:
  - Mexico's Popocatepetl volcano sends a cloud of smoke, ash and steam around 5,900
    feet (1798 meters) above the peak, the largest eruption since 2013. (Yahoo! News)
    (El Universal)
  International relations:
  - Rohingya genocide
  - Bangladesh's Foreign Minister A. H. Mahmood Ali and Myanmar's State Counsellor
    Aung San Suu Kyi agree to return Rohingya refugees from Bangladesh to Myanmar
    in a two-month period. (The Australian)
  - Russia–Sudan relations
  - Sudanese President Omar al-Bashir, wanted by the ICC for allegations of genocide
    and war crimes, asks Russian President Vladimir Putin for increased military ties
    and protection against the United States during his first visit to Russia as President.
    Putin agrees to increase their countries' economic ties. (France 24)
  Law and crime:
  - Immigration to Australia
  - Papua New Guinea Police remove 40 refugees from the closed Manus Regional Processing
    Centre, and over 300 refugees remain. (BBC)
