Date: '2017-11-08'
Source_URI: Portal:Current events/2017 November 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - 2017 Abu Kamal offensive
  - The Syrian Army and its allies capture Abu Kamal from the Islamic State of Iraq
    and the Levant. (Deutsche Welle)
  Arts and culture:
  - Kevin Spacey sexual assault allegations
  - Former U.S. TV news anchor Heather Unruh accuses actor Kevin Spacey of sexually
    assaulting her son in Nantucket, Massachusetts, in 2016, when her son was 18 years
    old. (CNN)
  Business and economy:
  - United States antitrust law
  - The United States Department of Justice antitrust chief has told AT&T that it
    must sell off either DirecTV or Turner Broadcasting System (the parent of CNN)
    in order to complete its acquisition of Time Warner. (CNN)
  Law and crime:
  - Illegal drug trade in Colombia
  - Colombian authorities seize 12 tons of cocaine, worth an estimated $360 million,
    from the Clan del Golfo and make four arrests. (Reuters)
  Politics and elections:
  - Politics of the United Kingdom
  - British politician Priti Patel resigns from her position as Secretary of State
    for International Development amid reports that she had had unauthorized meetings
    with senior Israeli officials. (The Guardian)
  - Presidency of Donald Trump
  - U.S. federal prosecutors subpoena Carl Icahn over his role as an adviser on biofuels
    in the Trump administration. (CNBC)
