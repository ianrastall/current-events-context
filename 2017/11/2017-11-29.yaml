Date: '2017-11-29'
Source_URI: Portal:Current events/2017 November 29
Intelligence_Payload:
  Arts and culture:
  - 2017 in archaeology
  - Archaeologists from the University of Leicester announce the discovery of evidence
    that Julius Caesar's invasion of Britain started in Pegwell Bay, Kent. (BBC)
  Business and economy:
  - Corporate bankruptcies
  - Cumulus Media files for Chapter 11 bankruptcy reorganization and enters into a
    restructuring agreement with some of its lenders to reduce more than $1 billion
    of the debt accrued by the Atlanta-based radio broadcasting group since its 2011
    purchase of Citadel Broadcasting, towards the end of a 30-day period for the company
    to secure a financing plan after defaulting on a $23.6-million debt payment on
    November 1. In a statement, Cumulus representatives said that the company expects
    all operations, programming and sales for its 459 radio stations across the U.S.
    to continue as normal during the restructuring process. (Reuters) (Atlanta Journal-Constitution)
  Health and environment:
  - 2017 Philippine dengue vaccination crisis
  - Sanofi Pasteur made a statement that its product Dengvaxia poses higher risks
    to people without prior dengue infection. (Sanofi Pasteur)
  Law and crime:
  - Euthanasia in Australia
  - Victoria becomes the first state to pass euthanasia legislation. (ABC News Australia)
  - International Criminal Tribunal for the former Yugoslavia
  - Retired Croatian Army general Slobodan Praljak, upon hearing at a UN tribunal
    that the international tribunal upheld his war crime conviction, drinks a small
    vial that apparently contained poison, and later dies in a hospital in The Hague.
    (The New York Times) (The Guardian)
  - Weinstein effect
  - NBC News announces that it has terminated their employment of Matt Lauer after
    a female employee filed a complaint about him conducting "inappropriate sexual
    behavior in the workplace". (CNN) (The New York Times)
  - Garrison Keillor, the former host of A Prairie Home Companion, is fired from Minnesota
    Public Radio after the public broadcaster discloses that it had become aware of
    allegations of "inappropriate behavior with an individual who worked with him".
    (The Washington Post)
  Politics and elections:
  - Donald Trump on social media, Islamophobia in the United States
  - U.S. President Donald Trump re-tweets three anti-Muslim videos that were originally
    tweeted by Jayda Fransen, the deputy leader of British far-right political party
    Britain First, prompting international condemnation and criticism. (BBC) (The
    New York Times) (The Guardian) (CNN) (MSNBC) (The Washington Post)
