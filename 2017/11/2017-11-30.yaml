Date: '2017-11-30'
Source_URI: Portal:Current events/2017 November 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Aftermath of the 14 October 2017 Mogadishu bombings
  - A Somali committee determined that the death toll of the twin bombing in Mogadishu
    last October is way higher than expected, rising up to 512. This makes the attack
    the third-deadliest terrorist attack worldwide. (Reuters)
  Arts and culture:
  - Weinstein effect
  - American producer Russell Simmons announces his resignation from his companies
    after a sexual assault allegation was made by screenwriter Jenny Lumet against
    him. (The Guardian)
  Business and economy:
  - Economy of South Korea
  - The Bank of Korea raises interest rates for the first time in more than six years
    by lifting borrowing costs to 1.50 percent from 1.25, citing economic recovery.
    (AFP) (Reuters)
  Disasters and accidents:
  - Yemeni Civil War (2015–present)
  - The International Committee of the Red Cross is buying 750,000 liters of diesel
    fuel to help provide clean water for a million people living in Yemen. (BBC)
  - A rare minor earthquake centered northeast of Dover, Delaware, is felt throughout
    the Mid-Atlantic United States. (ABC)
  - Disappearance of ARA San Juan
  - The Argentine Navy decides to cancel the search and rescue effort for the missing
    44 crew members of San Juan, 15 days after it went missing, in order to focus
    on the search for the submarine itself. (Reuters via The Independent)
  Politics:
  - Icelandic parliamentary election, 2017
  - Katrín Jakobsdóttir is confirmed as Prime Minister of Iceland after forming a
    coalition with other parties. (BBC News)
  Law and crime:
  - Shooting of Kathryn Steinle
  - José Inés García Zarate, a suspect in a 2015 shooting in San Francisco, is acquitted
    of murder charges and found guilty of being a felon in possession of a firearm.
    (NBC News)
