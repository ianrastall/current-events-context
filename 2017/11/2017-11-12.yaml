Date: '2017-11-12'
Source_URI: Portal:Current events/2017 November 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 in the Central African Republic
  - A grenade attack at a peace concert in Bangui, Central African Republic, kills
    seven and injures 20. (Reuters)
  Arts and culture:
  - '#MeToo'
  - Hundreds of sexual abuse victims and their supporters march in Hollywood, California.
    (Los Angeles Times)
  Business and economy:
  - 2017 Dubai Airshow
  - Boeing announces at the Dubai Airshow that the airline Emirates will purchase
    forty 787 Dreamliners with a list value of US$15 billion. (BBC)
  Disasters and accidents:
  - 2017 Iran–Iraq earthquake
  - A 7.3 magnitude earthquake strikes near Halabja, Iraq, killing at least 145 people
    and injuring more than 850 with structural damage reported in both Iraq and Iran.
    (Reuters) (Al Jazeera) (AP via Fox News) (Reuters²) (U.S. Geological Service)
  - A tourist boat capsizes on the Krishna River in Andhra Pradesh, leaving at least
    16 people dead. (Reuters)
  - 2017 Costa Rica earthquake
  - Costa Rica is hit by a 6.5 magnitude earthquake at Jacó near the capital San José.
    No immediate reports of casualties or damage. (USGS)
  Politics and elections:
  - Equatorial Guinean legislative election, 2017
  - As the people of Equatorial Guinea vote in the legislative election, the government
    blocks access to the internet and bans private vehicles. Observers predict the
    Democratic Party of Equatorial Guinea will win the election. (DW)
  - Slovenian presidential election, 2017
  - Slovenian President Borut Pahor, winning nearly 53 percent of the vote (373,877),
    is reelected for a second term in the runoff between the top two candidates from
    the October, 22, 2017, poll. Marjan Šarec, the other candidate from the original
    field of nine, received 332,366 votes. (Reuters) (The New York Times)
