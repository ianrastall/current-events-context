Date: '2017-11-07'
Source_URI: Portal:Current events/2017 November 7
Intelligence_Payload:
  Health and environment:
  - Air quality in Delhi
  - A blanket of thick grey smog covers the Indian capital, Delhi, with some areas
    30 times more polluted than the World Health Organization's recommended limit,
    one year after a similar smog. (BBC)
  - North Korea and weapons of mass destruction
  - A North Korean defector claims children are being born with deformities near North
    Korea's nuclear testing site. (Fox News)
  International relations:
  - Yemeni Crisis (2011–present)
  - Saudi Arabia's Crown Prince Mohammad bin Salman accuses Iran of an act of "direct
    military aggression" by supplying missiles to rebels in Yemen. (BBC)
  - South Korea–United States relations
  - U.S. President Donald Trump visits South Korea amidst a crisis with North Korea.
    (CNN)
  - Paris Agreement parties and signatories
  - Syria signs the Paris Agreement. This will make the United States the only country
    not in the Paris Agreement, when they plan to leave on 4 November 2020. (The Guardian)
  Law and crime:
  - Crime in Japan
  - Former millionaire Chisako Kakehi (also known as Japan's "Black Widow") is sentenced
    to death for the murder of 3 men which included a husband. (AFP via MSN) (BBC)
  Politics and elections:
  - United States elections, 2017
  - Voters in New Jersey and Virginia chose new governors. (CNN)
  - Philip Murphy wins the New Jersey gubernatorial election. (The New York Times)
  - Ralph Northam wins the Virginia gubernatorial election. (The New York Times)
  - In the Virginia House of Delegates election, Democrats win 15 seats, Republicans
    lose 18 seats, and 3 seats are too close to call. (The Washington Post)
  - Voters in New York reject a ballot initiative that, if passed, would have resulted
    in a Constitutional Convention being convened to change in the current state constitution.
    (Patch.com) (Business Insider) (The New York Times)
  - Voters in Utah's 3rd congressional district choose John Curtis to win the representative
    seat in the special election. (CNN) (The New York Times)
  - Former US District attorney Jenny Durkan is elected mayor of Seattle, becoming
    the city's first woman mayor since 1926. (The Seattle Times)
  - Maine votes to expand Medicaid under Obamacare in the first ever referendum on
    the issue. (ABC News)
