Date: '2017-11-18'
Source_URI: Portal:Current events/2017 November 18
Intelligence_Payload:
  Disasters and accidents:
  - Disappearance of ARA San Juan
  - The Argentine Navy continues searching in the South Atlantic for the submarine,
    which went missing on 15 November 2017. (Reuters via U.S. News and World Report)
  - A fire in a low-rent apartment in a suburb of Beijing kills 19 people and injures
    8. (Xinhua net) The Beijing municipal government then launches a fire safety crackdown
    in which thousands of migrant workers are evicted from their homes within days.
    (Caixin)
  International relations:
  - France–Lebanon relations
  - Prime Minister of Lebanon Saad Hariri meets President of France Emmanuel Macron
    at the Élysée Palace in Paris. (Arab News)
  Politics and elections:
  - 2017 Zimbabwean coup d'état
  - Thousands of people celebrate the expected downfall of Robert Mugabe in the streets
    of Harare. (BBC) (Reuters)
  - Politics of Northern Ireland
  - Gerry Adams, the long-term leader of Sinn Féin, announces that he will step down
    as party leader next year. (Reuters via News Limited)
  - 2017 Spanish constitutional crisis
  - The Spanish Attorney General José Manuel Maza unexpectedly dies of an illness
    in Buenos Aires at the age of 66. (BBC)
