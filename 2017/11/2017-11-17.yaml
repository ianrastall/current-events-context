Date: '2017-11-17'
Source_URI: Portal:Current events/2017 November 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - 2017 Western Iraq campaign
  - The Iraqi Army captures the town of Rawa from the Islamic State in Iraq and the
    Levant (ISIL). It was the last town held by ISIL in Iraq. (AP)
  Arts and culture:
  - 2017 in archaeology
  - Mungo Man, the oldest human remains in Australia, is returned to Lake Mungo in
    outback New South Wales, where he was originally buried. (AP)
  Disasters and accidents:
  - Disappearance of ARA San Juan
  - The Navy of Argentina begins a search for one of its submarines, the San Juan,
    which has been out of contact for two days. (CNN)
  International relations:
  - Audrey Azoulay is elected the new director-general of the UNESCO, succeeding Irina
    Bokova. (Al Jazeera)
  Politics and elections:
  - Evelyn Wever-Croes becomes the first female Prime Minister of Aruba following
    the 2017 general election in September. (Nederlandse Omroep Stichting)
  - Politics of Kenya
  - At least five people are killed at a demonstration in Nairobi after supporters
    of Raila Odinga and members of the National Super Alliance clash with the Kenya
    Police. (CNN)
