Date: '2017-11-05'
Source_URI: Portal:Current events/2017 November 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Aden unrest
  - A suicide bombing in Aden kills at least five government soldiers. (Al Jazeera)
  - Iraqi Civil War
  - Two suicide bombers attack a Shi'ite mosque in Kirkuk, killing at least 5 people
    and injuring more than 20. (Reuters)
  Business and economy:
  - Paradise Papers
  - Journalists start reporting on the contents of 13.4 million documents leaked from
    the offshore law firm Appleby, along with business registries in 19 tax jurisdictions
    that reveal offshore financial activities of politicians, celebrities, corporate
    giants and business leaders. The German newspaper Süddeutsche Zeitung had previously
    obtained the documents and shared them with the International Consortium of Investigative
    Journalists. (BBC) (The New York Times)
  - The documents include names of individuals and companies such as that of United
    States businessman and Secretary of Commerce Wilbur Ross, United Kingdom monarch
    Elizabeth II, Liberian president Ellen Johnson-Sirleaf, former German chancellor
    Gerhard Schröder, Russian-Uzbek business magnate Alisher Usmanov, the social media
    companies Twitter and Facebook, and pop stars Bono and Madonna. (Quartz)
  Disasters and accidents:
  - 2017 Pacific typhoon season
  - Typhoon Damrey (2017)
  - The death toll in Vietnam from Typhoon Damrey reaches 27, another 22 are missing.
    (AP via Fox News)
  - Helicopter accidents and incidents
  - A helicopter crashes near Saudi Arabia's border with Yemen, killing Prince Mansour
    bin Muqrin, and seven other Saudi officials. The cause of the crash is unknown.
    (NBC News)
  Law and crime:
  - Sutherland Springs church shooting
  - A gunman opens fire at a Baptist church in the American town of Sutherland Springs,
    Texas in the San Antonio area, killing at least 26 people and injuring many others.
    The 26-year-old gunman is later found dead in his car from a self-inflicted gunshot
    wound. (ABC News) (BBC) (CNN)
  - Catalan Republic, Spanish constitutional crisis
  - Secessionist Catalan leader Carles Puigdemont surrenders to Belgian police. (The
    Guardian)
  - Crime in Kentucky
  - United States Senator Rand Paul is recovering from fractured ribs after being
    assaulted by a neighbor at his home. (NBC)
  Politics and elections:
  - Protests against Rodrigo Duterte, Philippine Drug War
  - Human rights activists and opponents of Philippines president Rodrigo Duterte
    stage protests led by the Philippine Catholic Church against the ongoing drug
    crackdown that has killed thousands of people. (Rappler)
  - 2017 Russian protests
  - At least 260 people have been arrested while protesting against Vladimir Putin
    in Moscow while people in five other cities are also detained. The protests were
    organized by the Artpodgotovka movement founded by Vyacheslav Maltsev. (BBC)
  Sports:
  - 2017 New York City Marathon
  - Shalane Flanagan becomes the first American woman since 1977 to win the New York
    City Marathon. Kenyan Geoffrey Kamworor wins the men's marathon. (The New York
    Times)
