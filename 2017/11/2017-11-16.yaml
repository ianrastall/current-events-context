Date: '2017-11-16'
Source_URI: Portal:Current events/2017 November 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - South Sudanese Civil War
  - Rival factions within the ruling Sudan People's Liberation Movement sign the "Declaration
    of Unification" in Cairo, Egypt. (Sudan Tribune)
  - Northern Rakhine State clashes, Rohingya persecution in Myanmar (2016–present)
  - Human Rights Watch releases a report detailing the alleged systematic rape of
    Rohingya women and girls by Myanmar's security forces in Rakhine State. (Al Jazeera)
    (Human Rights Watch)
  Business and economy:
  - Economy of Venezuela
  - Venezuela defaults on sovereign debt and bonds issued by state oil firm PDVSA
    (Petróleos de Venezuela, S.A.). (Reuters)
  Politics and elections:
  - Politics of Cambodia
  - The opposition Cambodian National Rescue Party is dissolved by the Cambodian Supreme
    Court. (BBC)
  - Tongan general election, 2017
  - About 67% of Tonga's registered voters participate in the country's general election.
    (Matangi Tonga)
  - The Democratic Party of the Friendly Islands wins 14 of the 17 electoral seats,
    and all but 2 of the 9 noble representatives are re-elected. (Radio New Zealand)
