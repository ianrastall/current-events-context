Date: '2017-11-22'
Source_URI: Portal:Current events/2017 November 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Counter-terrorism in Georgia
  - Explosions and gunfire are heard in the Georgian capital of Tbilisi amidst counter-terrorism
    operations. One security guard and 3 terrorists are killed. (Al Jazeera)
  Disasters and accidents:
  - A U.S. Navy C-2A Greyhound, operating off the aircraft carrier USS Ronald Reagan,
    crashes in the Philippine Sea. Eight sailors are rescued, while three remain missing
    from the 11-person crew. (CNBC)
  International relations:
  - Palestine–United States relations
  - The Palestinian National Authority suspends contact with the United States after
    the Palestine Liberation Organization office in Washington, D.C. was closed. (UPI)
  - International reactions to the 2016–17 Rohingya persecution in Myanmar
  - U.S. Secretary of State Rex Tillerson calls the persecution of Rohingya Muslims
    by the government of Myanmar an "ethnic cleansing" and announces that the United
    States will consider targeted sanctions against Myanmar. (Reuters)
  Law and crime:
  - International Criminal Tribunal for the former Yugoslavia
  - Ratko Mladić, the former Chief of Staff of the Bosnian Serb army during the Bosnian
    War, is found guilty of genocide, war crimes, and crimes against humanity by the
    International Criminal Tribunal for the former Yugoslavia and is sentenced to
    life imprisonment. (The Guardian)
  Politics and elections:
  - 2017 Lebanon–Saudi Arabia dispute
  - Lebanon Prime Minister Saad Hariri arrives in Beirut for the first time since
    announcing his resignation in Saudi Arabia more than two weeks ago. (BBC)
  - At Lebanese President Michel Aoun's request, Hariri suspends his resignation so
    further consultations can proceed. (BBC)
