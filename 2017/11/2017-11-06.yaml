Date: '2017-11-06'
Source_URI: Portal:Current events/2017 November 6
Intelligence_Payload:
  Business and economy:
  - 2017 Saudi Arabian anti-corruption arrests
  - Investors react poorly to the arrest of Saudi billionaire Prince Al-Waleed bin
    Talal, one of the world's wealthiest men. (BBC)
  International relations:
  - Japan–United States relations
  - U.S. President Donald Trump visits Japan amidst the 2017 North Korea crisis. (CNN)
  - 2017 Lebanon–Saudi Arabia dispute
  - Saudi Arabia says Lebanon has declared war against it through acts of aggression.
    (Reuters)
  Law and crime:
  - Sutherland Springs church shooting
  - Officials from the FBI and Texas law enforcement are searching for the motive
    of the gunman who opened fire in a Baptist church, killing 26 people and injuring
    20 others. (Todays)
  - Immigration to the United States, United States Citizenship and Immigration Services
  - United States Attorney General Jeff Sessions intends on stripping the U.S. citizenship
    of four Somali Americans allegedly abusing the Diversity Immigrant Visa by pretending
    to be a family. The Trump Administration earlier said it plans to scrap the visa
    program. (Washington Free Beacon)
  - The United States Department of Homeland Security announces that it will end temporary
    protected status for thousands of Nicaraguan migrants while decisions await for
    thousands more from El Salvador, Haiti and Honduras. (BuzzFeed)
  Politics and elections:
  - Politics of the Solomon Islands
  - Solomon Islands Prime Minister Manasseh Sogavare is narrowly ousted in a vote
    of no confidence by 27 to 23 votes. (Radio New Zealand International)
  - Icelandic parliamentary election, 2017
  - Left-Green Movement leader Katrín Jakobsdóttir fails to form a government after
    the breakdown of talks with her proposed four-party coalition. (Sky News)
  - Politics of Zimbabwe
  - Emmerson Mnangagwa is fired as Vice President by Zimbabwe President Robert Mugabe.
    The public and the media widely perceives Mugabe's wife Grace as his likely successor
    after his death with Mnangagwa having been seen as her rival. (The Guardian)
