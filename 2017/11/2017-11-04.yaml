Date: '2017-11-04'
Source_URI: Portal:Current events/2017 November 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Houthi rebels in Yemen fire a ballistic missile at King Khalid International Airport
    in Riyadh, Saudi Arabia. The missile was shot down, according to Saudi officials,
    with no resulting injuries or damage. (BBC News) (The New York Times)
  Arts and culture:
  - Karen Ibasco of the Philippines is crowned Miss Earth 2017 at the Mall of Asia
    Arena in Pasay, Philippines. (Xinhua)
  Disasters and accidents:
  - 2017 Pacific typhoon season
  - Typhoon Damrey kills at least 19 people in Vietnam, a week before the country
    is set to host APEC Vietnam 2017. (ABC Australia)
  International relations:
  - Temporary Protected Status
  - The United States will end the temporary protected status program (TPS) for more
    than 300,000 refugees from El Salvador, Haiti, Honduras, and Nicaragua. Many of
    the refugees have already left for Canada, where it is easier to get asylum. (Newsweek)
    (Reuters)
  - Manus Regional Processing Centre
  - An offer is made by New Zealand prime minister Jacinda Ardern to resettle refugees
    stuck in the Manus Regional Processing Centre but is rejected by Australian Prime
    Minister Malcolm Turnbull. The processing center has triggered a humanitarian
    crisis for the refugees and protests in Australian cities. (Al Jazeera) (The Sydney
    Morning Herald)
  - Human rights in Myanmar
  - The United States contemplates reimposing sanctions against Myanmar over alleged
    abuses against the Rohingya people. (The Hindu)
  Law and crime:
  - 2017 Saudi Arabian anti-corruption arrests
  - Saudi Arabia announces the arrest of billionaire investor Prince Al-Waleed bin
    Talal, plus at least 10 other princes, four government ministers and tens of former
    ministers by Crown Prince Mohammad bin Salman's newly formed anti-corruption agency.
    (AFP via Yahoo!) (The New York Times)
  - West African Ebola virus epidemic
  - The International Federation of Red Cross and Red Crescent Societies reports the
    discovery of several cases of fraud amounting to at least $6 million (£4.6 million)
    through overbilling and the "likely collusion" between a bank and former IFRC
    employees during the 2013–16 West African Ebola outbreak. (Voice of Africa) (The
    Guardian)
  Politics and elections:
  - Politics of Lebanon, 2017 Lebanon–Saudi Arabia dispute
  - Lebanese Prime Minister Saad al-Hariri resigns, citing assassination threats.
    (BBC)
  - Slovak regional elections, 2017
  - Ján Lunter defeats Marian Kotleba in the Slovakian regional election held in the
    Banská Bystrica Region. Direction – Social Democracy loses four regions to center-right
    opposition candidates. (Reuters)
  - Protests against Donald Trump
  - Refuse Fascism holds protests against U.S. President Donald Trump in several major
    cities, including New York City, Chicago, and San Francisco. (KTLA)
