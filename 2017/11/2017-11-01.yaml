Date: '2017-11-01'
Source_URI: Portal:Current events/2017 November 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - A Saudi-led coalition airstrike on a market in Sahar District in Yemen's northern
    Saada Governorate, which is under Houthi control, kills at least 26 people, according
    to medics and local officials. (Reuters)
  - War in Afghanistan
  - Two fuel tankers are bombed in the Afghan town of Charikar, killing at least 15
    people and injuring at least 27. (Reuters)
  Arts and culture:
  - Rock climbing in Australia
  - The Uluṟu-Kata Tjuṯa National Park's board votes unanimously to ban climbing on
    Uluru, sacred to the Anangu people, in Australia's Northern Territory, from October
    2019, due to Indigenous concerns over respect for the sacred site and for the
    safety of tourists. (Deutsch Welle via USA Today)
  - NPR controversies
  - Citing "inappropriate behavior", Michael Oreskes resigns from his position as
    senior vice president of news at NPR after three journalists accuse him of sexual
    harassment. (CNN)
  Law and crime:
  - 2017 Spanish constitutional crisis
  - A Belgian lawyer representing Carles Puigdemont announces his client will not
    return to Spain to answer charges against him. Spanish prosecutors could order
    a European Arrest Warrant if Puigdemont fails to appear in court. (BBC)
  - Thornton shooting
  - A gunman opens fire in a Walmart in Thornton, Colorado, killing three people.
    (The Telegraph)
  Politics and elections:
  - Japanese general election, 2017
  - Shinzō Abe is officially reinstated as Prime Minister of Japan following the election
    on 22 October 2017. (Reuters)
  - 2017 Australian parliamentary eligibility crisis
  - President of the Australian Senate, Stephen Parry, announces he will resign, effective
    2 November 2017, after confirming he holds dual British-Australian citizenship.
    (BBC)
  - States of emergency in France
  - France declares the end of the country's state of emergency which was enforced
    as a reaction to the November 2015 Paris attacks. The state of emergency gets
    replaced with a new counterterrorism law signed by President Emmanuel Macron.
    (The Independent)
  - 2017 Westminster sexual scandals
  - Michael Fallon resigns as the United Kingdom's Secretary of State for Defence
    amid controversy over reports he touched a female journalist inappropriately in
    2002. (BBC)
  Science and technology:
  - Genetically modified organism
  - The U.S. Environmental Protection Agency reports weed killer dicamba, used in
    fields with genetically modified crops, has damaged more than 3.6 million acres
    of normal soybean crops in 25 states this year. (The New York Times)
  Sports:
  - 2017 World Series
  - In baseball, the Houston Astros defeat the Los Angeles Dodgers 5–1 in the seventh
    and deciding game of the World Series. It is the first World Series title for
    the Astros, who had lost 111 games just four seasons earlier. The Astros' George
    Springer, who set records for most extra-base hits (8) and total bases (29) in
    a single World Series, and tied the record for most home runs in a single World
    Series (5), is named series MVP. (CNN) (CBS Sports)
