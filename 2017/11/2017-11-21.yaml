Date: '2017-11-21'
Source_URI: Portal:Current events/2017 November 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - An estimated 50 people are killed when a suicide bomber attacks a mosque during
    morning prayers in Mubi, Nigeria. (The Guardian)
  Disasters and accidents:
  - 2017 eruption of Mount Agung
  - Mount Agung in Bali erupts for the first time in 50 years, leading to thousands
    of people fleeing their homes. (BBC)
  International relations:
  - 2017 North Korea crisis
  - The U.S. Treasury imposes new sanctions on several North Korean shipping companies
    and vessels, along with four Chinese companies which have engaged in trading activities
    with North Korea. (CBS News)
  Law and crime:
  - Net neutrality in the United States
  - Federal Communications Commission chairman Ajit Pai announces his agency will
    take steps to repeal the regulations put in place under the Obama administration,
    including the classification of broadband Internet as a public utility. (The New
    York Times)
  Politics and elections:
  - 2017 Zimbabwean coup d'état
  - Robert Mugabe resigns as the President of Zimbabwe shortly after impeachment proceedings
    are launched. It ends a period of his 29 years in office as President. (Fox News)
