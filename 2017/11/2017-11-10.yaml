Date: '2017-11-10'
Source_URI: Portal:Current events/2017 November 10
Intelligence_Payload:
  Disasters and accidents:
  - A driver intentionally drives into a group of students near Toulouse, France.
    Three injured people are taken to hospital. A suspect has been arrested. Police
    are not treating this incident as connected to terrorism. (BBC) (CNN)
  - Airborne radioactivity increase in Europe in autumn 2017
  - France's nuclear safety institute (IRSN) picks up traces of ruthenium-106, suggesting
    a nuclear accident took place in either Russia or Kazakhstan, in late September
    and early October. (The Telegraph)
  International relations:
  - 2017 Lebanon–Saudi Arabia dispute
  - Saudi Arabia, and subsequently the United Arab Emirates and Kuwait, urge all citizens
    currently in Lebanon to leave the country immediately. Recently, Saudi Arabia
    declared that a missile attack on its airport from Yemen was "an act of war" by
    Lebanon. (Al-Jazeera) (NPR)
  - French President Emmanuel Macron makes an unscheduled visit to Saudi Arabia amidst
    an escalating crisis between the kingdom and Lebanon. France is a close partner
    of Lebanon. (BBC)
  - Hezbollah declares the resignation of Prime Minister Saad Hariri invalid. Hariri
    has been detained in Saudi Arabia (presumably in Riyadh) for several days. The
    Saudi government is accused of pressuring Hariri to resign in the first place.
    (Al Jazeera)
  - Dicastery for Promoting Integral Human Development
  - Pope Francis, at the start of a two-day nuclear disarmament conference at Vatican
    City, says countries should not stockpile nuclear weapons even for the purpose
    of deterrence. (Reuters) (Vatican Radio)
