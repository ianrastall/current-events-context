Date: '2017-11-25'
Source_URI: Portal:Current events/2017 November 25
Intelligence_Payload:
  International relations:
  - Russia–United States relations
  - Russian President Vladimir Putin signs into law amendments that allow foreign
    media outlets in Russia to be listed as foreign agents. Earlier this month, RT
    America has been forced to be registered as a foreign agent in the United States.
    (CNN) (Reuters)
  Law and crime:
  - Aftermath of 2017 Zimbabwean coup d'état
  - Former Zimbabwe finance minister Ignatius Chombo, who was arrested during Operation
    Restore Legacy, is charged in Harare Magistrate’s Court with three counts of fraud,
    abuse of power, and corruption. (Reuters) (The Citizen)
  - Russia–United States relations, LinkedIn hack in 2012
  - The United States and Russia begin fighting over the extradition of Yevgeniy Nikulin,
    who was detained in October 2016 in the Czech Republic, after the U.S. Justice
    Department issued an international arrest warrant for him. However, soon after
    the U.S. issued its arrest warrant, Russian authorities also sought his extradition.
    The Russian charge accuses Nikulin of stealing from an online money transfer company
    back in 2009. (CNN)
  - Crime in Canada
  Politics and elections:
  - Queensland state election, 2017
  - The Australian Labor Party leads the tight race with three-quarters of the votes
    counted. Pauline Hanson's One Nation party has yet to confirm victory in any contest;
    the nationalists are projected to win just one seat though they may poll better
    overall than the predicted 20 percent. Official results may not be known for several
    days. (Reuters)
