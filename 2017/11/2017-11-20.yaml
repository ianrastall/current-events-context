Date: '2017-11-20'
Source_URI: Portal:Current events/2017 November 20
Intelligence_Payload:
  Business and economy:
  - Economy of the United States
  - The U.S. Department of Justice files a lawsuit blocking the potential merger of
    AT&T and Time Warner. (CNN)
  Disasters and accidents:
  - Earthquakes in 2017
  - A 7.0 magnitude undersea earthquake strikes east of New Caledonia's Loyalty Islands
    in the South Pacific Ocean. Tsunami warnings for New Caledonia and Vanuatu are
    cancelled. There are no immediate reports of damage. (Gulf News) (Reuters) (USGS)
  International relations:
  - 2017 North Korea crisis
  - U.S. President Donald Trump announces the designation of North Korea as a state
    sponsor of terrorism. (The New York Times)
  Law and crime:
  - Weinstein effect
  - Charlie Rose is suspended as host of Charlie Rose and anchor of CBS This Morning
    after allegations of sexual harassment and obscene phone calls and was later fired
    by the following day. (The Washington Post)
  - Visa policy of the United States
  - The United States Department of Homeland Security announces they will not renew
    the "temporary protected status" of around 50,000 Haitians living in the United
    States when it expires in 18 months. (The Washington Post)
  Politics and elections:
  - Brexit negotiations
  - After the United Kingdom withdrawal from the European Union referendum, the European
    Medicines Agency (EMA) will relocate to Amsterdam and the European Banking Authority
    (EBA) to Paris from London. (Politico)
  Sports:
  - National Football League
  - The Georgia Dome, former home of the NFL's Atlanta Falcons and the NCAA's Peach
    Bowl, is imploded after 25 years of use. (CNBC) (Fox News) (The Washington Post)
