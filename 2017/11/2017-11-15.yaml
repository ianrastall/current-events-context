Date: '2017-11-15'
Source_URI: Portal:Current events/2017 November 15
Intelligence_Payload:
  Arts and culture:
  - Works by Leonardo da Vinci
  - Salvator Mundi, a painting generally attributed to Leonardo da Vinci, is sold
    at auction Christie's in New York City for US$450.3 million; setting a new record
    for the sale of an original work of art. (The Guardian)
  Disasters and accidents:
  - Cyclone Numa
  - Flash floods on the outskirts of the Greek capital Athens kill at least 16 people
    and injure dozens more after a severe thunderstorm. (AP via ABC Australia) (The
    Guardian)
  - Numa is an example of a rare Mediterranean tropical-like cyclone, or "medicane".
    These uncommon tropical-like systems form over much cooler oceans than typical
    tropical cyclones. (The Weather Channel) (Washington Post)
  Law and crime:
  - Rancho Tehama shootings
  - Authorities discover the murdered wife of spree killer Kevin Janson Neal under
    the floorboards of their home, raising the death toll to six with ten others wounded
    in eight separate shootings. (Los Angeles Times)
  Politics and elections:
  - 2017 Zimbabwean coup d'état
  - Zimbabwe Defence Forces troops seize control of the Zimbabwe Broadcasting Corporation
    headquarters as explosions are heard in the capital Harare amid reports of a coup
    against President Robert Mugabe. (Reuters)
  - A high-ranking representative of the Zimbabwe National Army broadcast a military
    statement calling on the various sectors of society to keep calm and support the
    country's development. (The Guardian)
  - Finance Minister Ignatius Chombo is among those people detained overnight in Zimbabwe.
    (The Guardian)
  - Australian Marriage Law Postal Survey
  - The outcome of the Australian Marriage Law Postal Survey is announced with 61.6%
    voting yes to allow same-sex marriage with 79.5% of Australian voters participating.
    (Canberra Times)
  - 2017 United Nations Climate Change Conference
  - High level statespersons from France, Germany and other nations speak at the 2017
    United Nations Climate Change Conference in Bonn. (ABC News)
  Science and technology:
  - GW170608
  - LIGO announces it has detected gravitational waves from the merger of two black
    holes. (LIGO Caltech)
