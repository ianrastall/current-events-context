Date: '2017-11-24'
Source_URI: Portal:Current events/2017 November 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Sinai mosque attack
  - At least 305 people are killed, and over 128 wounded, in a bomb and gun attack
    at a mosque near Arish, Egypt. (BBC)
  International relations:
  - Turkey–United States relations, Syrian Civil War
  - The White House confirms Turkish Foreign Minister Mevlüt Çavuşoğlu's announcement
    that President Donald Trump told Turkish President Recep Tayyip Erdoğan that America
    is preparing to stop supplying weapons to ethnic Kurdish fighters in Syria. (The
    Washington Post) (AP via NBC News)
  - Palestine–United States relations
  - The U.S. State Department, in a reversal, says the Palestine Liberation Organization
    mission can remain open in Washington, D.C. (CBS News)
  Law and crime:
  - Trial of Oscar Pistorius
  - Former South African sprint runner Oscar Pistorius has his jail sentence increased
    to 13 years and five months for the murder of his girlfriend Reeva Steenkamp.
    The Supreme Court of Appeal ruled his sentence be increased to 15 years, less
    time already served. (9 News Australia)
  - Taner Kılıç
  - Sting, Peter Gabriel, Edward Snowden and Ai Weiwei call for president of Amnesty
    International Turkey Taner Kılıç to be released from prison. (Al Jazeera English)
  Politics and elections:
  - Aftermath of 2017 Zimbabwean coup d'état
  - Emmerson Mnangagwa is sworn in as the new President of Zimbabwe pending elections
    next year. (CNN)
  - The Zimbabwean government recognizes the birthday of former leader, Robert Mugabe
    as a national holiday. (BBC)
  - Presidency of Donald Trump
  - Days ahead of the Global Entrepreneurship Summit in India, scheduled to be attended
    by Ivanka Trump per Prime Minister Narendra Modi's June invitation, reports indicate
    the United States Department of State, led by Secretary of State Rex Tillerson,
    will not be sending a high-level delegation to support her amid reports of tensions
    between Tillerson and the White House. (CNN) (Daily Mail)
  - U.S. President Donald Trump designates Office of Management and Budget director
    Mick Mulvaney acting director of the Consumer Financial Protection Bureau (CFPB),
    replacing Richard Cordray, who promoted chief of staff Leandra English to CFPB
    deputy director prior to his resignation. (Reuters) (The Hill)
