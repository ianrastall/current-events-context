Date: '2017-11-27'
Source_URI: Portal:Current events/2017 November 27
Intelligence_Payload:
  Arts and culture:
  - Wedding of Prince Harry and Meghan Markle
  - Prince Harry announces his engagement to American actress Meghan Markle. (NBC
    News)
  Disasters and accidents:
  - Morlanwelz train collision and runaway
  - A passenger train collides with a car on a level crossing at Morlanwelz, Hainaut,
    Belgium, and is damaged by the subsequent fire. During recovery operations, it
    breaks free from the train hauling it, runs away for and collides with a passenger
    train at Strépy-Bracquegnies. Two people are killed, seven are injured. (The Brussels
    Times)
  Health and environment:
  - Health in Europe
  - A European Union appeal committee votes to reauthorise the use of glyphosate as
    a herbicide for a five-year period. (The Guardian)
  International relations:
  - International reactions to the Rohingya crisis in Myanmar, Pastoral visits of
    Pope Francis
  - Pope Francis arrives in Yangon to begin a six-day trip to Myanmar and Bangladesh,
    where he is expected to meet with the Rohingya people. (BBC) (Channel NewsAsia)
  Law and crime:
  - Forced evictions in China
  - Authorities in Beijing evict thousands of its migrant population in wake of a
    fire that left 19 people dead earlier this month, leaving many homeless in sub-zero
    temperatures. (Radio Free Asia) (Quartz)
  Politics and elections:
  - 2017 Tehreek-e-Labaik protest
  - The Pakistan Minister for Law Zahid Hamid resigns after days of protest over proposed
    changes to blasphemy laws. (CNN)
  - 2017 Spanish constitutional crisis
  - The Attorney General of Catalonia, José María Romero de Tejada, unexpectedly dies
    in Barcelona of pneumonia at the age of 69, few days after the death of the Attorney
    General of the State. (El País)
