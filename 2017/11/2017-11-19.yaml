Date: '2017-11-19'
Source_URI: Portal:Current events/2017 November 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - 2017 Abu Kamal offensive
  - Syrian government troops and allied militia retake Abu Kamal, ISIL's last urban
    stronghold in Syria. (Daily Mail)
  - Northern Rakhine State clashes
  - Chinese delegates visiting the Burmese capital of Naypyidaw propose a three-phase
    plan to resolve the conflict in Myanmar's Rakhine State. The governments of Myanmar
    and Bangladesh expressed support for the plan, which included repatriating refugees
    that have fled from violence in Rakhine State. (Reuters)
  Disasters and accidents:
  - Human stampedes in 2017
  - At least 15 people are killed in a human stampede over food in the village of
    Sidi Boualem, Morocco. (BBC)
  Law and crime:
  - Tate murders
  - Charles Manson, the infamous former cult leader who ordered the murder of Sharon
    Tate and others, dies at age 83. (CNN)
  - Crime in France
  - A policeman in the French city of Sarcelles kills his girlfriend's father, two
    passers-by and himself after she ended their relationship. (BBC)
  Politics and elections:
  - Chilean general election, 2017
  - Voters in Chile head to the polls to elect a president, as well as positions in
    the Senate, the Chamber of Deputies, as well as regional boards. (BBC)
  - Former President Sebastián Piñera wins the primary vote in the presidential election
    and faces a runoff against Socialist Alejandro Guillier. (BBC)
  - Government formation in Germany, 2017
  - The Free Democratic Party (FDP), which was in discussions over forming a government
    with the CDU, CSU and Alliance 90/The Greens, announced that the party refuses
    further coalition negotiations. The main reasons for the failure were questions
    about the politics concerning migration and environment. (The Guardian)
  - 2017 Zimbabwean coup d'état
  - President of Zimbabwe Robert Mugabe is fired as the leader of ZANU–PF and replaced
    with former Vice President Emmerson Mnangagwa. (The Guardian) (AP)
  - In a television speech, President Mugabe refuses to resign and pledges to preside
    over next month's ZANU-PF congress. The ruling party gave the 93-year-old less
    than 24 hours to quit as head of state or face impeachment. (Financial Express)
    (Euronews)
  Sports:
  - 2017 NASCAR Cup Series
  - Martin Truex Jr. wins the season-ending 2017 Ford EcoBoost 400 and with it his
    first title of the NASCAR Cup Series. The race also marks the final Cup Series
    appearance for Dale Earnhardt Jr., Matt Kenseth, and Danica Patrick as full-time
    drivers. (AP via ESPN)
