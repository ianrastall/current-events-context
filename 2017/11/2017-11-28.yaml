Date: '2017-11-28'
Source_URI: Portal:Current events/2017 November 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 North Korean missile tests
  - North Korea fires another missile in a test, landing in the Sea of Japan. (BBC)
  Law and crime:
  - 2017 New York City truck attack
  - Sayfullo Saipov, the suspect of the attack, pleads not guilty to all charges of
    murder and terrorism. (The Guardian)
  - Seminole Heights serial killer
  - Tampa, Florida police arrest Howell Emanuel Donaldson III and charge him with
    four counts of murder. (CBS)
  - Police in Reno, Nevada, kill a man after he held a hostage and opened fire from
    the eighth floor of a luxury high-rise condominium, in a scenario similar to the
    2017 Las Vegas shooting two months earlier. No one was injured. (Los Angeles Times)
    (Fox News) (Mercury News)
  Politics and elections:
  - Tax Cuts and Jobs Act of 2017
  - The U.S. Senate Budget Committee votes to move the Trump administration's tax
    bill to the full U.S. Senate. (Business Insider)
  Science and technology:
  - 2017 in spaceflight
  - A Soyuz-2.1b's Fregat upper stage malfunctions during Meteor-M No.2-1's launch
    from the Vostochny Cosmodrome. The status of the satellite and 18 other payloads
    is unknown, as they are either stranded in a wrong orbit or they reentered the
    atmosphere and crashed in the ocean. (Spaceflight Now)
  - Elsagate
  - YouTube removes thousands of child abuse videos related to Elsagate. (CBS News)
