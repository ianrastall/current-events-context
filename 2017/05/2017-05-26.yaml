Date: '2017-05-26'
Source_URI: Portal:Current events/2017 May 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Minya attack
  - Gunmen open fire on buses carrying Coptic Christians in Minya Governorate, Egypt,
    killing at least 28 people and injuring dozens more. (The Independent)
  - The Egyptian Air Force strikes militant camps in eastern Libya in retaliation
    to the Minya attack, according to state media. (BBC)
  - War in Afghanistan (2001–2021)
  - Taliban militants attack an Afghan National Army base in Shah Wali Kot District,
    Kandahar Province, killing at least 15 soldiers. (BBC)
  - Syrian Civil War
  - United Nations High Commissioner for Human Rights Zeid bin Ra'ad calls on all
    air forces in Syria to better distinguish between military targets and civilians.
    (Reuters)
  Arts and culture:
  - The National Constitutional Convention of Aboriginal Australians and Torres Strait
    Islanders at Mutitjulu concludes with Indigenous leaders calling for a treaty
    and reforms to the Constitution of Australia, beyond the proposed written recognition,
    including entrenchment of representative bodies and commissions for Indigenous
    rights. (Aus. Broadcasting Corp.)
  - Right-wing media personality Katie Hopkins is to leave LBC with "immediate effect"
    after Hopkins posted on Twitter calling for a so-called "final solution" to the
    United Kingdom's Islamic terrorism problem following the Manchester Arena bombing
    which left 22 people dead. (The Independent)
  Disasters and accidents:
  - 2017 Sri Lankan flood and landslide
  - Disaster Management Centre of Sri Lanka reports that 91 people are killed and
    110 people from 14 districts are missing due to flood and landslide. (BBC)
  International relations:
  - The Turkish government issues an arrest warrant for NBA Oklahoma City Thunder
    player Enes Kanter suspected of being a member of a "terror group." Kanter, a
    vocal supporter of Fethullah Gülen, was returning to the U.S. from a charity tour
    when, last Saturday, he was detained in Bucharest, Romania, because his Turkish
    passport had been revoked. Kanter says he plans on becoming a United States citizen.
    (ESPN)
  Law and crimes:
  - A spokesman for the Chipotle Mexican Grill restaurant chain reveals that hackers
    stole customer payment data from most of their stores over a span of three weeks
    starting from the end of March. (Reuters)
  - 2017 Portland train attack
  - Two men are stabbed to death in a train in Portland, Oregon, after they attempt
    to intervene while a man shouts racial slurs at two teenage girls, one of them
    wearing a hijab. (CBS News)
  Politics and elections:
  - Polish-American diplomat Zbigniew Brzezinski, counselor to President Lyndon B.
    Johnson (1966–1968) and President Jimmy Carter's National Security Advisor (1977–1981),
    dies at the age of 89. (The Washington Post) (New York Daily News)
  Science and technology:
  - Construction begins on the European Extremely Large Telescope (ELT) in northern
    Chile. The ELT is expected to become operational in 2024. (Reuters)
