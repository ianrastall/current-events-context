Date: '2017-05-05'
Source_URI: Portal:Current events/2017 May 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Russia, Iran and Turkey reach an agreement, effective this midnight, to establish
    four "safe zones" in Syria over which all military aircraft, including Turkish,
    Russian, and American aircraft, will be barred from flying. (Reuters) (Fox News)
  - The United Nations welcomed the long discussed safe zones, although they have
    been rejected by Syrian rebels and the Kurdish PYD. (Reuters) (Fox News) (Reuters)
  - Afghan border police and the Pakistani military clash at a border crossing near
    Chaman, killing at least 13 people and wounding over 80 others. Both sides blame
    each other for the flareup in fighting. (Radio Free Europe/Radio Liberty)
  International relations:
  - United States senators Ben Cardin (D-MD) and Marco Rubio (R-FL) file a bill restricting
    arms sales to the Philippine National Police over its drug war. (Rappler)
  Law and crime:
  - 2012 Delhi gang rape
  - The Indian Supreme Court upholds the death sentences imposed on four men convicted
    in the 2012 gang rape and murder of a 23-year-old woman on board a bus in South
    Delhi. (Reuters)
  - Hundreds of prisoners escape from an overcrowded jail in Pekanbaru, Indonesia.
    (Australian Broadcasting Corporation)
  Politics and elections:
  - United Kingdom local elections, 2017
  - Results from yesterday's elections show significant swings towards the Conservative
    Party and away from the Labour Party. (The Guardian)
  - Algerian legislative election, 2017
  - Results from yesterday's election give a reduced majority of seats to Abdelaziz
    Bouteflika's incumbent coalition. (Al Jazeera)
  - French presidential election, 2017
  - Files purportedly from the campaign of Emmanuel Macron are posted online. Macron
    campaign officials say the files are a mix of fake and authentic documents and
    drew parallels with what happened in the 2016 US Presidential elections. (CNN)
  - Political appointments of Donald Trump
  - Tennessee state senator and former Army flight surgeon Mark Green withdraws his
    name from consideration as Secretary of the Army because of political opposition.
    Green was the Trump Administration's second nominee for this position. (The New
    York Times) (AP via U.S. News & World Report)
  Science and technology:
  - The Comac C919 makes its maiden flight from Shanghai Pudong International Airport,
    China. (FlightGlobal)
  - ISRO has successfully launched a new communications satellite for South Asia from
    Satish Dhawan Space Centre, India. (BBC)
