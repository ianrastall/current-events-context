Date: '2017-05-04'
Source_URI: Portal:Current events/2017 May 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Venezuelan protests
  - A student is killed amid gunfire in El Tigre, raising the death toll in protests
    against Nicolás Maduro's government to at least 37 in the past month. (ABC News)
  Arts and culture:
  - Buckingham Palace announces that 95-year-old Prince Philip, Duke of Edinburgh,
    the Prince consort of Queen Elizabeth II, will retire from royal duties in August.
    (BBC)
  Disasters and accidents:
  - Asian Dust
  - A severe dust storm impacts North China, causing flight cancellations at Beijing
    Capital International Airport. (The Daily Star)
  International relations:
  - The Holy See and Myanmar establish full diplomatic relations following a meeting
    between Pope Francis and Myanmar's State Counsellor Aung San Suu Kyi. (National
    Catholic Reporter)
  - A memorandum is signed by Russia, Iran, and Turkey calling for de-escalation of
    the Syrian Civil War, although neither the Syrian government nor the Syrian opposition
    are signatories. (The New York Times)
  Politics and elections:
  - United Kingdom local elections, 2017
  - The British people vote locally. (The Telegraph)
  - Georgia's 6th congressional district special election, 2017
  - The campaign of Jon Ossoff wins a lawsuit extending voter registration. (Atlanta
    Journal Constitution)
  - Algerian legislative election, 2017
  - Voter turnout is predicted to be low as Algerians go to the polls to elect members
    of the People's National Assembly. (Al Jazeera)
  - Efforts to repeal the Patient Protection and Affordable Care Act, American Health
    Care Act of 2017
  - The Republican-controlled United States House of Representatives votes in favor
    of the repeal of the 2010 Patient Protection and Affordable Care Act and passage
    of the House's 2017 American Health Care Act, by a narrow, 217–213 vote. Twenty
    Republicans and all Democrats opposed the bill, which now heads to the United
    States Senate for its legislative action. (CNN) (Fox News)
  Science and technology:
  - Scientists confirm that Denmark has its first wild pack of Gray wolves for the
    first time in 200 years. (The Guardian)
