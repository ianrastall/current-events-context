Date: '2017-05-13'
Source_URI: Portal:Current events/2017 May 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Balochistan
  - Gunmen open fire on construction workers at Gwadar Port, Pakistan, killing at
    least 10 people. The Balochistan Liberation Army claimed responsibility for the
    attack. (Al Jazeera)
  - WannaCry ransomware attack
  - A ransomware cyberattack continues to infect computers of private and public organisations
    around the world, and demand payment in bitcoin. The method used by the program,
    EternalBlue, was originally developed by the National Security Agency to exploit
    a vulnerability in Microsoft Windows, and was leaked by The Shadow Brokers in
    April. (BBC/Reuters/RNZ via RNZ)
  - Ivorian soldiers block access to Bouaké, the second-largest city in Ivory Coast
    amid a dispute over pay. The town of Odienné is also reported to be under mutineer
    control. (BBC)
  Arts and culture:
  - Pope Francis canonizes Jacinta and Francisco Marto, two of the three Fátima children
    who reported seeing the Virgin Mary in the spring and summer of 1917. The Martos,
    who died during the post-World War I international influenza pandemic, are the
    Catholic Church's youngest saints who did not die as martyrs. The other child,
    Lúcia de Jesus dos Santos, survived until the year 2005, when she was 97 years
    old. (NBC News) (The New York Times)
  - The Venice Biennale awards its top prize, the Golden Lion for best national participation,
    to German artist and choreographer Anne Imhoff for her total totalitarianism exhibition
    "Faust." (The New York Times) (Art News)
  - 2017 Eurovision Song Contest
  - Salvador Sobral of Portugal wins the Eurovision Song Contest with the song Amar
    pelos dois. While the country debuted in the 1964 edition of the contest, this
    marks the first win by a Portuguese entrant. (Irish Times)
  Disasters and accidents:
  - A bus carrying tourists crashes near the resort town of Marmaris in southwest
    Turkey, killing at least 17 people and leaving 13 others injured. (Reuters)
  - 2017 Adendro train derailment
  - A TrainOSE passenger train derails near the Greek village of Adendro, leaving
    at least four people dead and five seriously injured. (Sky News)
  - A 5.7 magnitude earthquake kills at least three people in the town of Pish Qaleh
    in northeast Iran. (The Australian) (Al Jazeera)
  Sports:
  - In motorsports, Monster Energy NASCAR Cup Series driver Aric Almirola is cut from
    his vehicle and airlifted to a local hospital with undisclosed injuries after
    a crash late in the Go Bowling 400 at Kansas Speedway. (FOX Sports)
