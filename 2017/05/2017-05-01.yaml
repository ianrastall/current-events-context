Date: '2017-05-01'
Source_URI: Portal:Current events/2017 May 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - International Workers' Day
  - Workers' Party of Belgium representative Raoul Hedebouw gets stabbed in the thigh,
    moments before holding a speech in Liège, Belgium. The presumed assailant is arrested.
    (Sudinfo)
  - Turkish police fire tear gas and rubber bullets at demonstrators marching to Taksim
    Square. Over 200 people are arrested at protests around the city of Istanbul.
    (Reuters)
  - Marches in Paris are disrupted as French riot police fire tear gas at violent
    protesters ahead of the second round of the presidential election. (Evening Standard)
  Disasters and accidents:
  - A series of earthquakes, the largest registering 6.3, strike near Mosquito Lake,
    Alaska, near the Alaskan border with British Columbia, Canada. At least one office
    building and two schools were heavily damaged and evacuated in the Yukon. (USA
    Today) (CBC News)
  - Severe clear-air turbulence on an Aeroflot flight from Sheremetyevo International
    Airport, Moscow to Suvarnabhumi Airport, Bangkok, subjects 27 passengers to injuries
    including bone fractures. (CNN)
  International relations:
  - The Momentum Movement holds a pro-EU, anti-Russia march attended by approximately
    10,000 in Budapest, Hungary, chanting “Europe, not Moscow” in support of the EU
    and against Prime Minister Viktor Orbán. (Euractiv) (BBJ)
  - North Korea–United States relations
  - Two Rockwell B-1B Lancer heavy bombers are flown over the Korean Peninsula by
    the United States, leading North Korea to accuse the US of preparing for nuclear
    warfare. (Australian Broadcasting Corporation)
  Law and crime:
  - Saudi Arabia announces the arrest of 46 of what it describes as militants connected
    with the summer 2016 suicide bombing of Al-Masjid an-Nabawi in Medina. (Reuters)
  - A knife attack leaves one dead and three injured at the University of Texas at
    Austin. (CNN)
