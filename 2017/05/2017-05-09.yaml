Date: '2017-05-09'
Source_URI: Portal:Current events/2017 May 9
Intelligence_Payload:
  International relations:
  - Syria–United States relations, Turkey–United States relations
  - Despite opposition from Turkey, President Donald Trump authorizes an arms deal
    with the Syrian Kurds to assist the Syrian Democratic Forces in their fight against
    Islamic State of Iraq and the Levant (ISIL). (CNN)
  Law and crime:
  - Former Jakarta Governor Basuki Tjahaja Purnama, popularly known as "Ahok", is
    found guilty of blasphemy and sentenced to two years in prison. The accusation
    that he insulted the Quran sparked large protests last November. (The Guardian)
  Politics and elections:
  - South Korean presidential election, 2017
  - South Koreans vote in a presidential election, with Moon Jae-in of the Democratic
    Party of Korea winning the election. (TIME) (The Hill)
  - Moon Jae-in pledges to make South Korea "a just, united country." (Reuters)
  - Dismissal of James Comey
  - U.S. President Donald Trump removes James Comey as Director of the Federal Bureau
    of Investigation, with Andrew G. McCabe stepping in as acting director. (BBC)
  - The Assembly of California votes in favor of ending a ban which barred members
    of the Communist Party USA from holding positions in the state government. (NPR),
    (AP via Fox News)
  - Georgia's 6th congressional district special election, 2017
  - The election between Democrat Jon Ossoff and Republican Karen Handel to replace
    the seat vacated by Tom Price becomes the most expensive congressional race in
    United States history. (CNN)
