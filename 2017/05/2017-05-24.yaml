Date: '2017-05-24'
Source_URI: Portal:Current events/2017 May 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Manchester Arena bombing
  - As part of an ongoing investigation, British police arrest six people in connection
    with Monday's deadly explosion, including a 23-year-old man who was taken into
    custody Tuesday. (ABC News) (Reuters) (Reuters²)
  - The father, Ramadan Abedi, and younger brother, Hashem Abedi, of suspected bomber
    Salman Abedi are arrested in Tripoli by the Libyan Counter-Terrorism forces. (Chicago
    Tribune) (Hindustan Times)
  - 2017 Jakarta bombings
  - Three police officers are killed in a suicide bombing at a bus station in Jatinegara,
    Jakarta. (News.com.au)
  - Five people are killed in a raid on a house of a Shia cleric in Bahrain. (BBC)
  Business and economy:
  - Economy of the People's Republic of China
  - Moody's Investors Service downgrades the credit rating of the People's Republic
    of China from AA3 to A1. (CNBC)
  Disasters and accidents:
  - European migrant crisis
  - The Italian Coast Guard reports that at least 20 migrants are killed when their
    500-passenger boat capsizes in the Mediterranean Sea off Libya's coast. About
    1,700 people have been rescued in 15 operations since Tuesday. (AP via ABC News)
  - Four climbers are found dead on Mount Everest, bringing this season's death toll
    to 10. (BBC)
  - A landslide at Big Sur blocks off a portion of California State Route 1 just south
    of Gorda; no injuries have been reported. (CNN)
  Law and crime:
  - LGBT rights in Taiwan
  - After the Supreme Court rules in favor, same-sex-marriage is on its way to being
    legalized in Taiwan, the first country in Asia to do so. (GMA News)
  - Philippine Drug War
  - During a phone call between U.S. president Donald Trump and Philippine president
    Rodrigo Duterte, Trump allegedly congratulates Duterte on his drug war, which
    has been widely criticized for its brutality by human rights organizations. (Reuters)
    (The Washington Post)
  - Murder of Seth Rich
  - Fox News retracts their claims regarding the murder. (Fox News) (BuzzFeed)
  Politics and elections:
  - Legality of cannabis
  - Vermont governor Phil Scott vetoes a bill legalizing marijuana in the state. (The
    Hill)
  - 2018 United States federal budget
  - 'President Donald Trump''s proposed budget for fiscal year 2018, titled "America
    First: A Budget Blueprint to Make America Great Again," has a $2 trillion accounting
    error over 10 years because it uses the same money twice for two different purposes.
    (NBC News)'
  - Protestors set fire to the Ministry of Agriculture headquarters in Brasília amid
    calls for the impeachment or resignation of Michel Temer as President of Brazil
    over allegations of corruption. (BBC)
  - Montana's at-large congressional district special election, 2017
  - Republican Greg Gianforte bodyslams a reporter from The Guardian who then reports
    the situation to police. Gianforte is running against Democrat Rob Quist. (The
    Guardian)
  - American Health Care Act of 2017
  - The Congressional Budget Office predicts that in the next decade, the new health
    care bill recently approved by the U.S. House of Representatives will reduce the
    federal deficit by $120 billion and leave 23 million more Americans uninsured,
    as opposed to current law. (NPR) (The New York Times)
  Sport:
  - 2017 UEFA Europa League Final
  - Manchester United beat Dutch opponents Ajax 2–0 at the Friends Arena in Solna,
    Sweden, to win the 2016–17 UEFA Europa League and qualify for next season's UEFA
    Champions League group stage. (BBC)
