Date: '2017-05-08'
Source_URI: Portal:Current events/2017 May 8
Intelligence_Payload:
  Business and economy:
  - At the Fort Lauderdale–Hollywood International Airport, Spirit Airlines cancels
    eleven flights and delays 30 due to a dispute between the airline and its pilots
    (as talks occur between the airline and the pilots' union, Air Line Pilots Association,
    International). Protests break out and three travelers are arrested. (The New
    York Times)
  Law and crime:
  - Philippine Drug War
  - The United Nations Human Rights Council conducts a periodic review of the human
    rights situation in the Philippines. (The Philippine Star)
  - The Phoenix, Arizona police arrest the suspected Maryvale serial shooter. (ABC
    15)
  Politics and elections:
  - Russian interference in the 2016 United States elections
  - Sally Yates testifies before the United States Senate Judiciary Subcommittee on
    Crime and Terrorism concerning investigations into Russia's role in the 2016 U.S.
    presidential election and in the Trump administration. (CNN)
  - Political appointments of Donald Trump
  - The United States Senate confirms Heather Wilson as Secretary of the Air Force.
    (The Washington Post)
  Science and technology:
  - Rare specimens of daisies from the 1850s originally held in the National Museum
    of Natural History in Paris were reportedly destroyed by Australia in March allegedly
    due to incomplete paperwork. (BBC)
  - The journal Genes & Development publishes research from the University of Texas
    Southwestern Medical Center in a mouse-model study (which may translate over to
    humans) alluding as to why hair turns gray and goes bald. The scientists describe
    a protein called KROX20 which switches on skin cells that become a hair shaft,
    which then causes cells to produce another protein called stem cell factor. In
    mice, these two proteins are important for baldness and graying. (Time)
