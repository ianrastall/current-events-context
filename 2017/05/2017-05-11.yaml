Date: '2017-05-11'
Source_URI: Portal:Current events/2017 May 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Mosul
  - The Iraqi army's chief of staff, Lt Gen Othman al-Ghanmi, states that his security
    forces are only days away from completing the operation to recapture Mosul from
    ISIL. (BBC)
  Arts and culture:
  - The New Orleans City Council removes the statue of Confederate President Jefferson
    Davis in New Orleans. This action is the second of four planned removals of Confederate
    monuments in the city. (NPR)
  Health and medicine:
  - 2015–16 Zika virus epidemic
  - The federal government of Brazil informs the World Health Organization that it
    is ending its state of emergency concerning the Zika virus, following a 95.3%
    reduction in cases in early 2017 compared to early 2016. (AFP via Seven News)
  International relations:
  - Representatives of the Arctic Council, a group of eight countries that border
    the Arctic Circle, meet in Alaska to discuss oil drilling. (The Washington Post)
  Law and crime:
  - Triple Talaq in India
  - The Supreme Court of India begins hearings on whether oral divorce is a fundamental
    right of Islam. (The Times of India)
  - Moscow police detain five protesters after they attempted to deliver a petition
    to investigate the status of LGBT rights in Chechnya to the Prosecutor General
    of Russia. (BBC)
  - The Federal Bureau of Investigation raids a Republican fundraising firm in Annapolis,
    Maryland. (Bloomberg)
  Politics and elections:
  - United Kingdom general election, 2017
  - An unknown person or organization leaks a 45-page draft campaign manifesto, described
    as "the most left-wing," of the Labour Party, that is due for official confirmation
    tomorrow. (BBC) (CNN)
  - French parliamentary election, 2017
  - French President-elect Emmanuel Macron announces his slate of candidates for the
    upcoming elections for French Parliament. (Reuters)
