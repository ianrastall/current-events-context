Date: '2017-05-25'
Source_URI: Portal:Current events/2017 May 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Former Greek Prime Minister Lucas Papademos is injured when a booby-trapped package
    explodes inside his vehicle in Athens. Authorities report his injuries are not
    life threatening. (BBC) (Reuters)
  - Battle of Mosul
  - The United States military reports that their investigation found 105 civilians
    were killed and 36 people are still missing from the bombing of a Mosul building
    on March 17. (NBC News and AP)
  International relations:
  - United Kingdom–United States relations, 2017 Brussels summit
  - British police suspend sharing intelligence with the United States in connection
    with Monday's Manchester bombing attack for most of the day, after U.S. officials
    allegedly leak "sensitive information" to The New York Times. British Prime Minister
    Theresa May emphasized the sensitive nature of said information when she met with
    U.S. President Donald Trump during their meeting at the NATO summit in Brussels.
    Trump calls for an investigation into the leaks. (CNN) (Reuters) (The New York
    Times)
  - Territorial disputes in the South China Sea
  - The USS Dewey sails within 12 nautical miles of the disputed Mischief Reef in
    the South China Sea. (BBC)
  Law and crimes:
  - Immigration policy of Donald Trump
  - The United States Court of Appeals for the Fourth Circuit refuses to reinstate
    Executive Order 13780 on the basis of religious discrimination, upholding the
    District Court for Maryland's March 7 ruling. (The New York Times) (Reuters)
  Politics and elections:
  - Montana's at-large congressional district special election, 2017
  - Voters in Montana pick between Republican Greg Gianforte and Democrat Rob Quist
    in the special congressional election to replace Ryan Zinke, who is now President
    Trump's Secretary of the Interior. (NPR)
  - Gianforte is officially charged with misdemeanor assault for allegedly body slamming
    reporter Ben Jacobs from The Guardian; the Missoulian, Billings Gazette, and Independent
    Record newspapers rescind their endorsements of Gianforte. (Fox News) (CNN via
    KTLA) (Billings Gazette)
  - Gianforte wins the election with over 50% of the vote to Quist's 44%. The political
    fallout if any is unknown as many voters cast unchangable absentee ballots before
    the incident took place. (The New York Times)(Bloomberg)
  - Russian interference in the 2016 United States elections
  - Jared Kushner, son-in-law of and Senior Advisor to the President of the United
    States, is identified as a main focus of investigations into Russian ties by the
    Federal Bureau of Investigation. (The Washington Post)
  Science and technology:
  - 2017 Atlantic hurricane season
  - The U.S. National Oceanic and Atmospheric Administration says warm ocean waters
    could fuel an above-normal Atlantic hurricane season. The forecast calls for 11
    to 17 named storms with five to nine hurricanes, warmer-than-average waters across
    the tropical Atlantic Ocean and Caribbean Sea, and a weak or nonexistent El Niño.
    (CBS News)
  - Results of the Juno mission are announced by NASA researchers, revealing new and
    unexpected information concerning Jupiter's poles, meteorology, and magnetic and
    gravitational fields. (CNN)
  - Rocket Lab launches its 3D-printed Electron rocket on a test flight from Māhia
    Peninsula in New Zealand. This is the first launch from New Zealand and the first
    from a private facility. Electron is 17 meters high, is intended for frequent
    launches of small payloads, and costs $5 million per liftoff. SpaceX's Falcon
    9 stands at 70 meters, carries up to 22,800 kilograms to the ISS, and costs $62
    million per launch. (BBC) (Smithsonian)
  Sports:
  - NCAA Division I conference realignment
  - The Missouri Valley Conference officially announces that Valparaiso University
    will join the conference on July 1. The Crusaders will move from the Horizon League
    to replace the Wichita State Shockers, departing for the American Athletic Conference
    on the same date. (Chicago Tribune)
