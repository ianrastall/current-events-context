Date: '2017-05-07'
Source_URI: Portal:Current events/2017 May 7
Intelligence_Payload:
  Disasters and accidents:
  - At least 11 people are dead after a bus and truck collide in Vietnam's Gia Lai
    province. (The Straits Times)
  - Around 50,000 people are evacuated from the German city of Hanover while bomb
    disposal experts defuse three bombs dropped by the Royal Air Force during World
    War II. (BBC)
  - A state of emergency is declared in Montreal, Canada as 1,200 Canadian Forces
    personnel are deployed in the province of Quebec to help with rising floodwaters.
    146 communities are affected and more than 1,500 residents have been evacuated
    from their homes. (CBC)
  - In Chicago, 4 are killed and 5 injured when a speeding car accidentally hit a
    parked car and then crashed head-on into a CTA transit bus. (NBC Chicago)
  Law and crime:
  - France bans the breeding of killer whales and dolphins in captivity and orders
    aquariums and water parks to expand their pools within three years following a
    campaign by animal rights groups. (The Independent)
  - In China city of Weihai, authorities eventually concluded that what appeared to
    be an accident was a school bus driver driving students from China and South Korea
    to an international school set fire to the bus in a tunnel, killing two adults
    and 11 children. The bus driver who died was angry that his overtime allowance
    had been suspended. (CTGN) (New York Post)
  Politics and elections:
  - French presidential election, 2017
  - Voters in France return to the polls for a run-off, to elect either Emmanuel Macron
    or Marine Le Pen as the new President of France. (BBC)
  - Macron wins the election, earning 66.1% of the vote to Le Pen's 33.9%, becoming
    the youngest French head of state since Napoleon. (The New York Times) (Reuters)
  Science and technology:
  - The United States Air Force's unmanned spacecraft X-37B successfully lands at
    Kennedy Space Center's Shuttle Landing Facility in Merritt Island, Florida, after
    spending a record-breaking 718 days in orbit. The landing was responsible for
    reports of sonic booms across central Florida. (CBS News)
  Sport:
  - 2016–17 A-League
  - In association football, Sydney FC defeats the Melbourne Victory 4-2 in the A-League
    Grand Final after a penalty shootout. (The Canberra Times)
