Date: '2017-05-28'
Source_URI: Portal:Current events/2017 May 28
Intelligence_Payload:
  Armed attacks and conflicts:
  - CPP-NPA-NDF rebellion
  - The government of the Philippines and the Communist Party cancel peace talks after
    president Rodrigo Duterte declares martial law in Mindanao. (teleSur)
  - Marawi crisis
  - The Philippine military announces that it has discovered the bodies of 16 people,
    believed to have been killed by the ISIL affiliated Abu Sayyaf. Authorities say
    that the death toll after six days of fighting is 95, including 19 civilians.
    (The New York Times)
  Arts and culture:
  - 2017 Cannes Film Festival
  - The Square, a Swedish film directed by Ruben Östlund, wins the Palme d'Or, the
    top award at the Cannes Film Festival. (Reuters)
  Disasters and accidents:
  - 2017 Sri Lankan flood and landslide
  - At least 126 people are dead, and 97 missing, after mudslides and floods caused
    by heavy rain in Sri Lanka. Over 100,000 people have been displaced. (AP)
  - Four people, including a pregnant woman, are killed and dozens injured when a
    rush of fans try to enter an already-at-capacity Tiburcio Carías Andino Stadium
    before the Honduran Clausura final in Tegucigalpa, Honduras. Police are investigating
    possible overselling of tickets. (Sporting News) (The Sun) (AP)
  Law and crime:
  - 2017 Mississippi shootings
  - Eight people, including a Lincoln County Sheriff's Department deputy, are fatally
    shot overnight at three locations in rural Mississippi. A suspect is in custody;
    he says he intended for it to be "suicide by cop." (NBC News and AP)
  Politics and elections:
  - German federal election, 2017
  - In a speech in Munich, Angela Merkel says that Europe must not rely on its former
    allies. (The Guardian)
  Science and technology:
  - The Russian Irkut MC-21 airliner makes its maiden flight. (TASS)
  Sport:
  - 2017 Indianapolis 500
  - Takuma Sato of Japan wins the 2017 Indianapolis 500 ahead of Helio Castroneves
    of Brazil. Sato is the first Japanese driver to win the event. (Yahoo! Sports)
    (Los Angeles Times)
