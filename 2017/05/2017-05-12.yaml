Date: '2017-05-12'
Source_URI: Portal:Current events/2017 May 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb hits a convoy of the Deputy Chairman of the Senate of Pakistan, Abdul Ghafoor
    Haideri, near Mastung in the province of Balochistan, killing at least 25 people
    and injuring 35 others, including the Senate's Deputy Chairman. (Reuters)
  - An explosion outside a prominent post office in Rome causes damage to a car; however,
    no injuries or deaths have been reported. A preliminary investigation indicated
    it was most likely “a demonstrative act, showing that it could be done”. (The
    Guardian)
  - WannaCry ransomware attack
  - 'A large scale international cyber-attack using the WannaCry ransomware package
    disrupts computer and telephone systems in thousands of cases across 99 countries.
    Affected organisations include: England''s NHS, with doctors reporting messages
    demanding money; MegaFon and Sberbank in Russia; Telefónica, Iberdrola, and Gas
    Natural in Spain; and FedEx. (BBC) (AP/Reuters via ABC Australia)'
  Arts and culture:
  - Catholics in Portugal converge in a shrine in Fatima for a visit by Pope Francis.
    (BBC)
  - British author J. K. Rowling urges fans to refrain from buying a manuscript written
    by her, a Harry Potter prequel, which was originally auctioned off for charity
    but was later stolen. (People)
  Law and crime:
  - A judge in Alkmaar, the Netherlands, grants a 12-year-old boy the right to decide
    for himself on whether or not to continue chemotherapy. The ruling was based on
    a psychiatric evaluation of the patient as being "capable of a reasonable evaluation
    of his interests and realizes the consequences — including the negative ones —
    of his decision." (The Charlotte Observer)
  - Costa Concordia disaster
  - The Italian Supreme Court of Cassation upholds Francesco Schettino's 16-year sentence
    for his role as Captain of the Costa Concordia in the deaths of 32 people. (BBC)
    (Reuters)
  - A shooting attack at a nursing home in Kirkersville, Ohio, kills four people,
    including a police chief and the shooter. (ABC News)
  Politics and elections:
  - Iranian presidential election, 2017
  - Candidates debate on live television with the rivals of frontrunner and current
    president, Hassan Rouhani, taking aim at his economic policies. (Bloomberg)
  Sports:
  - 2016–17 Premier League
  - In association football, Chelsea have secured the Premier League title after winning
    away against West Bromwich Albion. (BBC)
