Date: '2017-05-14'
Source_URI: Portal:Current events/2017 May 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - According to the International Committee of the Red Cross, a cholera outbreak
    has since April 27 killed at least 115 people and left another 8,500 ill across
    Yemen. (Al Jazeera)
  - WannaCry ransomware attack
  - Shortly after the attack began a researcher found an effective kill switch, which
    prevented many new infections, and allowed time to patch systems. This greatly
    slowed the spread. Cyber security authorities discover new versions that lack
    the kill switch. (The Hacker News) (Der Spiegel) (Tech Crunch)
  International relations:
  - North Korea and weapons of mass destruction, 2017 North Korean missile tests
  - U.S. and South Korean officials confirm that North Korea launched a test missile
    from the west coast city of Kusong. The projectile travelled to the east for 30
    minutes and reaching an altitude of more than before landing in the Sea of Japan,
    south of the Russian city of Vladivostok. (CBS via MSN) (BBC) (Reuters)
  - The Government of China begins a two-day summit in Beijing, in an attempt to raise
    international support for its Belt and Road Initiative. (Australian Broadcasting
    Corporation)
  Politics and elections:
  - North Rhine-Westphalia state election, 2017
  - Voters in the German state of North Rhine-Westphalia head to the polls, with the
    media suggesting a victory for Angela Merkel's CDU over the SPD, who have lead
    the state for all but five years since 1966. (Al Jazeera)
  - French presidential election, 2017
  - France swears in Emmanuel Macron as the 25th President of France. (Reuters via
    ABC News Australia)
