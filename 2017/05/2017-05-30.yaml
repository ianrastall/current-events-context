Date: '2017-05-30'
Source_URI: Portal:Current events/2017 May 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War
  - Al-Faqma ice cream parlor bombing
  - A car bomb explosion outside a popular ice cream parlor in central Baghdad kills
    13 people and injures 24. ISIL claims responsibility for the attack. (AP)
  Business and economy:
  - China Labor Watch says one of its team was arrested and two others are missing
    when they were investigating labor practices at Ganzhou Huajian International
    Shoe City Co., whose products include Ivanka Trump-branded shoes. (Time)
  International relations:
  - North Korea–United States relations
  - A formation of United States B-1B bombers from Guam flew over Korea, staging a
    nuclear bomb dropping drill. North Korea calls it a military provocation. (Yonhap)
    (Terra)
  - Ukraine–European Union relations
  - The Dutch Senate approves the European Union's Association Agreement with Ukraine,
    setting the stage for it to be ratified as early as July, pending royal promulgation.
    The process was previously delayed by a non-binding referendum where a majority
    of Dutch voters rejected ratification of the agreement. (Radio Free Europe/Radio
    Liberty)
  - South Korea–United States relations
  - South Korean President Moon Jae-in, who had campaigned on a parliamentary review
    of the country's missile defense system, orders an investigation of the anti-missile
    system after discovering the government was not informed when four more U.S. Terminal
    High Altitude Area Defense (THAAD) system launchers had been brought in and installed.
    (Reuters)
  Disasters and accidents:
  - 2017 North Indian Ocean cyclone season
  - More than 300,000 people are evacuated in Bangladesh as Cyclone Mora approaches.
    (AFP via Malaysia Sun)
  Politics and elections:
  - Former Panamanian leader Manuel Noriega dies aged 83. (New York Daily News)
  - Michael Dubke resigns as President Trump's White House Communications Director
    after three months on the job. (BBC)
