Date: '2017-05-15'
Source_URI: Portal:Current events/2017 May 15
Intelligence_Payload:
  Business and economy:
  - Western Digital appeals to arbitration in an effort to prevent its partner Toshiba,
    from selling its chip-making operation, Toshiba Memory. (Reuters)
  Disasters and accidents:
  - Four people are killed after a Beechcraft Super King Air crashes Assabu, Hokkaido,
    Japan. (Aviation Safety Network)
  - Four people are killed after a Mitsubishi MU-2 crashes in the Atlantic Ocean,
    near Eleuthera, Bahamas. (Aviation Safety Network)
  - A Philadelphia-originating Learjet crashes in Carlstadt as it approached Teterboro
    Airport in New Jersey, killing at least two people. (CNN)
  - An Akron, Ohio fire kills seven people, including five children and two adults.
    (Fox News 8)
  Health and medicine:
  - A small study shows that two known carcinogens, o-toluidine and 2-naphthylamine,
    were found in greater amounts in the urine of e-cigarette users than in nonusers.
    Previous studies of traditional cigarette smokers have identified o-toluidine
    and 2-naphthylamine as the two most carcinogenic molecules for the bladder. (Medscape
    Medical News)
  International relations:
  - Donald Trump revelation of classified information to Russia
  - According to a current and a former unnamed U.S. government official, President
    Donald Trump revealed classified information that jeopardized a critical source
    of intelligence on the Islamic State during his Oval Office meeting with the Russian
    Foreign Minister and Ambassador on May 10. (The Washington Post) (The New York
    Times) (Reuters)
  Law and crime:
  - Papua New Guinean media reports confirm that 17 people were fatally shot by prison
    officers during a prison escape in Lae on May 12. (Al Jazeera)
  - A trial at a court in Ouagadougou, Burkina Faso, opens to try former President
    Blaise Compaoré and members of his cabinet in absentia. Burkina Faso accuses Compaoré,
    who is in exile in the Ivory Coast, of ordering the killing of protesters during
    the uprising that ousted him in 2014. (Al Jazeera)
  - Voter ID laws in the United States
  - The U.S. Supreme Court rules that the North Carolina state legislative members
    do not have standing to request an appeal of the U.S. Court of Appeals for the
    Fourth Circuit ruling against a law which it found discriminated against black
    voters. (Reuters)
  - Moors murderer Ian Brady, one of a pair of killers whose victims from 1963–65
    were five children aged between 10 and 17, dies at the age of 79. (ITV)
  - Mexican Drug War
  - An unknown gunman shoots and kills veteran journalist Javier Valdez Cárdenas,
    who is noted for his investigative reporting on Mexico's war on drugs, in Culiacán,
    Sinaloa. (AP via Fox News)
  Politics and elections:
  - Iranian presidential election, 2017
  - Tehran Mayor Mohammad Bagher Ghalibaf withdraws his candidacy. (Tehran Times)
