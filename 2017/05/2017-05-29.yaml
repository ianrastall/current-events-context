Date: '2017-05-29'
Source_URI: Portal:Current events/2017 May 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Marawi
  - Philippine forces continue to battle Maute militants for the city of Marawi. (CNN)
  - Syrian Civil War
  - Damascus's governor says the last group of rebels and civilians have left the
    city's besieged Barzeh district. (Reuters)
  - Iraqi Civil War
  - Iraq's Popular Mobilization Forces, assisted by Iran, say they cleared ISIL out
    of several villages north of Ba'aj on the border with Syria. (Reuters)
  Arts and culture:
  - Canadian Indian residential school system
  - Canadian Prime Minister Justin Trudeau asks Pope Francis for a public apology
    for the Roman Catholic Church's role in the abuse of indigenous children in the
    residential school system. In 2009, Pope Benedict XVI issued an expression of
    sorrow after an audience with Assembly of First Nations Chief Phil Fontaine. (BBC)
  Business and economy:
  - Japan Tobacco announces plans to quadruple its output of smokeless tobacco by
    the end of next year. (Reuters)
  Disasters and accidents:
  - A zookeeper is killed at Hamerton Zoo Park in Cambridgeshire, England, following
    an incident in the zoo's tiger enclosure. (BBC)
  - At least 11 people are killed and 69 are injured as a severe thunderstorm hits
    Moscow, Russia. (BBC)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea launches a Short-Range Ballistic missile near Wŏnsan towards the Sea
    of Japan, according to South Korea. The missile reportedly lands in Japan's exclusive
    economic zone (EEZ) after traveling 450 km. (The Japan Times) (CNN)
  Law and crime:
  - Tiger Woods, an American professional golfer, is arrested for driving under the
    influence due to mixing medications, no alcohol was detected in his system. (Sports
    Illustrated)
  Politics and elections:
  - United Kingdom general election, 2017
  - Labour leader Jeremy Corbyn debates with Conservative leader Theresa May. (The
    Telegraph)
  - Venezuelan protests
  - Eighteen people, including two opposition leaders, Henrique Capriles and Carlos
    Paparoni, are injured in Caracas as security forces stop protestors from reaching
    the government ombudsman's office. (Reuters) (AP)
  Sport:
  - 2017 EFL Championship play-off Final
  - Huddersfield Town win the final match of the 2017 English Football League play-offs,
    defeating Reading 4–3 on penalties after a 0–0 draw, thereby earning promotion
    to the 2017–18 Premier League. (BBC Sport)
