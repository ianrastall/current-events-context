Date: '2017-05-02'
Source_URI: Portal:Current events/2017 May 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - According to the Syrian Observatory for Human Rights, at least 38 people are killed,
    including civilians and Syrian Democratic Forces fighters, after ISIL militants
    attack a camp for displaced Syrian and Iraqi refugees near Al-Shaddadah, Al-Hasakah
    Governorate. (BBC)
  Disasters and accidents:
  - Six people are killed after a car fell into a gorge near Shimla District, India.
    (The Indian Express)
  - Twelve people are killed and twelve injured after a gas explosion in a railway
    tunnel under construction in Guizhou Province, China. (The Indian Express)
  International relations:
  - North Korea and weapons of mass destruction, North Korea–United States relations
  - North Korea vows to accelerate its nuclear weapons programme to "maximum pace"
    and test a nuclear device "at any time" in response to U.S. President Donald Trump's
    aggressive stance towards the regime. (The Guardian)
  Politics and elections:
  - 2017 United Kingdom general election
  - Conservative leader Theresa May states she will be a "bloody difficult woman"
    in her negotiations with Jean-Claude Juncker regarding the rights of EU nationals
    after Brexit. (BBC)
  - 2017 French presidential election
  - Far-right candidate Marine Le Pen is accused of plagiarising a speech by François
    Fillon. (BBC)
  - Czech Prime Minister Bohuslav Sobotka has announced that he will submit his government's
    resignation because of a disagreement with Finance Minister Andrej Babiš. (BBC)
  - Philippine drug war
  - Philippine vice president Leni Robredo faces an impeachment charge before the
    House of Representatives for condemning the country's war on drugs at the United
    Nations. (Philippine Star)
  - 2014–17 Venezuelan protests
  - President Nicolás Maduro announces the drafting of a new constitution amid massive
    protests. (Los Angeles Times)
