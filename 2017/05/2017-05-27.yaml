Date: '2017-05-27'
Source_URI: Portal:Current events/2017 May 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - At least 18 people are killed and 6 others injured in a car bomb explosion in
    Khost, eastern Afghanistan. (The Independent)
  - Second Libyan Civil War
  - Ansar al-Sharia announces it is formally dissolving amid heavy losses that have
    wiped out its leadership and decimated its fighters. The group was responsible
    for the 2012 Benghazi attack. (Reuters)
  Arts and culture:
  - Gregg Allman, co-founder, vocalist and keyboard player of the Allman Brothers,
    dies in Savannah, Georgia. (New York Times)
  Business and economy:
  - British Airways cancels all flights from Heathrow Airport and Gatwick Airport
    amid a "major IT system failure", that is causing severe disruption to flight
    operations worldwide. (BBC)
  Disasters and accidents:
  - Summit Air Flight 409
  - A Summit Air Let L-410 crashes after hitting a tree while landing at Lukla Airport
    in Nepal following a cargo flight. Both pilots die. A third crewman survives.
    (The Aviation Herald)
  International relations:
  - 43rd G7 summit
  - The meeting of Group of 7 leaders in Taormina, Italy, concludes with a disagreement
    on whether to uphold the Paris Agreement; U.S. President Donald Trump is the only
    leader not to confirm commitment to the agreement, due to his climate change denial.
    (BBC)
  Law and crime:
  - Colombey authorities report the tomb of French national hero Charles de Gaulle
    has been vandalized. (Reuters)
  - Manchester Arena bombing
  - Theresa May announces that the British terror threat level has been downgraded
    from "critical" to "severe" and that Operation Temperer will be phased out shortly,
    following productive counter-terrorism investigations. (The Guardian)
  - Marawi crisis
  - President of the Philippines Rodrigo Duterte tells soldiers fighting in Mindanao,
    where he proclaimed martial law earlier this week, that he will accept responsibility
    for abuses they commit, and jokes that "[i]f you had raped three, I will admit
    it, that's on me." (Reuters via Aus. Broadcasting Corp.)
  - Police search for a driver who witnesses believe was driving aggressively around
    campers in Grays Harbor County, Washington, and deliberately backed over two campers
    while yelling racial slurs, killing one and injuring a second. Both victims are
    from the Quinault Indian Nation. (The Seattle Times)
  - Police announce charges of attempted murder against 150 protestors from Dhaka
    University over a protest to restore a statue of Lady Justice outside the Supreme
    Court. Protestors and police clashed near the High Court, with police firing tear
    gas and water cannons after protestors breached a barricade. Police claim protestors
    wielded sticks and stones in a bid to murder on-duty officers. (Dhaka Tribune)
  Sport:
  - 2017 FA Cup Final
  - Arsenal beat London rival Chelsea 2–1 at Wembley Stadium to win the 2016–17 FA
    Cup. (Daily Mail)
  - 2016–17 Scottish Cup
  - Celtic wins the 2017 Scottish Cup, defeating Aberdeen 2–1 in the final. Celtic
    have the Treble for the fourth time. (AP via ABC Australia)
