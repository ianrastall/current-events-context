Date: '2017-05-21'
Source_URI: Portal:Current events/2017 May 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A Taliban raid kills at least 20 Afghan police officers in southern Afghanistan.
    (AFP via Dunya News)
  - An Indonesian maritime patrol boat, the KM Hiu Macan 001, intercepts five boats
    and arrested 55 Vietnamese crew members for allegedly poaching off Natuna Islands,
    but after an unexpected aggressive intervention by Vietnamese coast guards forces
    the Indonesian authorities to back off, release the arrested men and return to
    base empty handed. (The Star)
  Arts and culture:
  - After 146 years, the Ringling Bros. and Barnum & Bailey Circus comes to a close.
    (The New York Times)
  - In a surprise appointment by Pope Francis, Bishop Anders Arborelius is the first
    ever person from Sweden to become a cardinal. (CNS)
  Disasters and accidents:
  - Mountaineers led by Tim Mosedale confirm suspicions that Mount Everest's famous
    Hillary Step had completely collapsed. (BBC)
  International relations:
  - North Korea and weapons of mass destruction
  - South Korea reports North Korea fired a Pukguksong-2 intermediate-range ballistic
    missile that flew 500 km before landing in the Sea of Japan. (Reuters|AP via ABC
    Australia)(RT)
  - Enes Kanter, a Turkish player with the NBA's Oklahoma City Thunder, returns to
    the U.S. after having been briefly detained in Bucharest. Kanter alleged that
    his public opposition to Turkish president Recep Tayyip Erdoğan and support of
    exiled Islamic cleric Fethullah Gülen had led to the cancellation of his Turkish
    passport. (ESPN)
  Politics and elections:
  - Swiss referendums, 2017
  - Swiss voters approve a referendum to phase out nuclear power in Switzerland and
    increase renewable energy. (ABC News)
  Sport:
  - In cricket, Mumbai Indians win the Indian Premier League, defeating Rising Pune
    Supergiant by one run in the final. (The Hindu)
  - 2017 IIHF World Championship Final
  - Tied 1-1, Sweden wins in a shootout against Canada to claim its tenth title at
    Lanxess Arena in Cologne, Germany. (AP via ESPN)
