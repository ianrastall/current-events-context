Date: '2017-05-03'
Source_URI: Portal:Current events/2017 May 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide bombing attack on a NATO convoy in Kabul kills eight civilians and injures
    at least 28 people. (Reuters)
  - Somali Public Works Minister Abbas Abdullahi Sheikh Siraji is shot and killed
    inside his vehicle by security forces near the Villa Somalia in the capital Mogadishu,
    after mistaking him for a militant. (BBC) (BNO News)
  Arts and culture:
  - Plans for a Chicago-based presidential library in honour of the former U.S. President
    Obama are revealed. (NBC)
  Business and economy:
  - Puerto Rico government-debt crisis
  - Puerto Rico files for the largest "local government" bankruptcy in the United
    States. (Reuters)
  Disasters and accidents:
  - An explosion at a coal mine near Azadshahr, Iran, kills at least 35 miners and
    traps 39 others, according to state media. (BBC)
  - A car crash at an auto auction in Billerica, Massachusetts, kills at least three
    and injures nine, two critically. (CNN)
  Politics and elections:
  - French presidential election, 2017
  - Candidates Marine Le Pen and Emmanuel Macron face off in a debate. (The Guardian)
  - United Kingdom general election, 2017
  - Conservative politician Theresa May accuses European Union officials of trying
    to influence the upcoming elections. (The Scotsman)
