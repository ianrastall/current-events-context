Date: '2017-05-10'
Source_URI: Portal:Current events/2017 May 10
Intelligence_Payload:
  Arts and culture:
  - Pope Francis intends to canonize two of the children who had visions at Fatima.
    (The Salt Lake Tribune)
  International relations:
  - Cross-Strait relations
  - A spokesman for the Taiwan Affairs Office of People's Republic of China says Taiwan
    is barred from observing this year’s World Health Assembly because current President
    Tsai Ing-wen has not endorsed the Beijing view that both sides belong to a single
    China under the One-China policy; the spokesman further said that the health of
    people in Taiwan is not being put at risk by Taiwan's inability to attend. (Voice
    of America) (Reuters)
  Politics and elections:
  - Bahamian general election, 2017
  - Voters in the Bahamas go to the polls to elect all 39 members of the House of
    Assembly. (Miami Herald)
  - Incumbent Prime Minister Perry Christie of the Progressive Liberal Party concedes
    defeat to Hubert Minnis of the Free National Movement. (Al Jazeera)
  - Lawmakers in the Parliament Assembly of Kosovo vote in a no-confidence motion
    to remove the government of Prime Minister Isa Mustafa from office, triggering
    a snap election that is due to take place next month. (Al Jazeera)
  - Russian interference in the 2016 United States elections
  - The U.S. Attorney's Office in Alexandria, Virginia, through U.S. Attorney Dana
    Boente, issues subpoenas to former National Security Advisor Michael T. Flynn
    to assess the extent of his ties to Russia. (CNN)
