Date: '2017-09-05'
Source_URI: Portal:Current events/2017 September 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Siege of Deir ez-Zor (2014–17)
  - The Syrian Army lifts the 28-month-long siege of Deir ez-Zor by the Islamic State
    of Iraq and the Levant. (Reuters) (BBC News)
  - 2016–17 Rohingya persecution in Myanmar
  - More than 123,000 Rohingya refugees have fled Myanmar and crossed into Bangladesh
    due to escalating violence by the Myanmar Army. (BBC News)
  - Burmese State Counselor Aung San Suu Kyi receives international criticism and
    pressure urging her to help the Rohingya. (Reuters)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Irma
  - Hurricane Irma strengthens to a maximum Category 5 hurricane, becoming the strongest
    Atlantic hurricane since 2005's Hurricane Wilma in terms of maximum sustained
    winds, described as "extremely dangerous." The National Hurricane Center (NHC)
    predicts that Irma could strengthen even more due to favorable conditions. (Washington
    Post)
  - The NHC says Irma is the most powerful Atlantic storm ever recorded outside the
    Caribbean Sea and the Gulf of Mexico. Ahead of Irma's landing, President Donald
    Trump issues a state of emergency declaration for Florida, Puerto Rico, and the
    U.S. Virgin Islands. (Reuters) (The Washington Examiner)
  International relations:
  - India–Myanmar relations
  - Indian Prime Minister Narendra Modi heads to Myanmar for a state visit. (The Hindu)
  - 2017 North Korea crisis
  - Japan–United States relations, South Korea–United States relations
  - Amid tensions from South Korea, U.S. President Donald Trump announces that he
    is "allowing Japan and South Korea to buy a substantially increased amount of
    highly sophisticated military equipment from the United States." (The Independent)
  Law and crime:
  - Journalists killed in India
  - Prominent Indian journalist and Lankesh Patrike editor Gauri Lankesh is shot dead
    by unidentified men outside her house in the city of Bengaluru. (Reuters)
  - Australian Marriage Law Postal Survey (Same-sex marriage)
  - The High Court of Australia receives a complaint against the Australian Marriage
    Law Postal Survey citing the postal survey as "unique and offensive." (The Guardian)
  Politics and elections:
  - Politics of Taiwan
  - Tainan Mayor William Lai Ching-te is appointed as the new Premier by the President
    of the Republic of China Tsai Ing-wen. (AP)
  - Deferred Action for Childhood Arrivals
  - The Trump Administration announces that, during the next six months, it will be
    ending the DACA program that has halted the deportation of about 800,000 people
    who were brought to the U.S. illegally as children. Congress is called upon to
    pass legislation to correct the situation. (The New York Times)
  Sports:
  - 2017–18 NBA season
  - Billionaire investor Tilman Fertitta buys the Houston Rockets NBA basketball team
    for US$2.2 billion. (Houston Chronicle) (ESPN)
