Date: '2017-09-11'
Source_URI: Portal:Current events/2017 September 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinai insurgency
  - Militants ambush a police convoy in Egypt's Sinai Peninsula killing 18 police
    and wounding seven others. (AP)
  - Syrian Civil War
  - Siege of Deir ez-Zor (2014–17)
  - Russia sends 175 demining combat engineers to defuse mines in Deir ez-Zor Governorate.
    (Reuters)
  Arts and culture:
  - Monkey selfie copyright dispute
  - PETA and David Slater settle the monkey selfie copyright dispute. (CNN)
  Disasters and accidents:
  - Rail accidents in 2017
  - Two trains collide in Andermatt railway station in the Canton of Uri, Switzerland,
    injuring around 30 people. (Reuters)
  International relations:
  - Aurora 17
  - Sweden starts its largest military exercise in over 20 years. Nearly 20,000 troops
    are set to participate, including a contingent of over 1,000 U.S. soldiers. The
    drills will take place on and around the island of Gotland, including soldiers
    from NATO countries. (AP)
  - 2017 North Korea crisis, United Nations Security Council Resolution 2375
  - The United Nations Security Council approves new sanctions on North Korea, limiting
    refined petroleum imports and banning textile exports, in response to its recent
    nuclear test. (Bloomberg)
  Law and crime:
  - Crime in Belgium
  - Mouscron mayor Alfred Gadenne is found dead with his throat slashed inside the
    Belgian city's cemetery. A suspect has reportedly turned himself in to police.
    (Reuters)
  - Crime in Brazil
  - Brazil is to investigate the supposed murder of ten members of an Amazonian tribe
    in the Javari Valley. (The Guardian)
  - Deferred Action for Childhood Arrivals
  - California, Maine, Maryland and Minnesota sue the Trump administraion over the
    termination of DACA. (The Los Angeles Times)
  Politics and elections:
  - Politics of the Philippines
  - Philippine Justice secretary Vitaliano Aguirre is caught allegedly conspiring
    a lawsuit against opposition Senator Risa Hontiveros. (Rappler)
  - Catalan independence
  - Around a million people rally in Barcelona to mark the National Day of Catalonia
    and to support the upcoming independence referendum on 1 October. (Reuters)
