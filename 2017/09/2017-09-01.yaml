Date: '2017-09-01'
Source_URI: Portal:Current events/2017 September 1
Intelligence_Payload:
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Irma, now a Category 2 hurricane with maximum sustained winds of 110
    miles per hour (175 kilometers per hour), is expected to resume strengthening
    this weekend increasing the danger when it nears the Leeward Islands in the Caribbean
    next Thursday. (Weather Channel) (CNN) (National Hurricane Center)
  Health and medicine:
  - Great Lakes
  - Researchers report, in the Environmental Science & Technology journal, the discovery
    of antidepressant concentrations in 10 kinds of fish in the Niagara River, which
    links to the Great Lakes via Lakes Erie and Ontario. Speculated causes include
    inadequate treatment of water re-introduced into said bodies of water. (New York
    Daily News)
  International relations:
  - South Korea–United States relations, 2017 North Korea crisis
  - South Korean President Moon Jae-in and U.S. President Donald Trump agree to revise
    the South Korea Ballistic Missile Range Guidelines which caps South Korea's missile
    development. (Reuters)
  Law and crime:
  - United States Court of Appeals for the Seventh Circuit
  - United States federal judge Richard Posner has announced his retirement after
    three decades of service on the bench of the 7th U.S. Circuit Court of Appeals,
    headquartered in Chicago, Illinois. Appointed by President Ronald Reagan in 1981,
    Justice Posner has written more than 3,300 opinions from the bench. (AP)
  Politics and elections:
  - 2017 New Zealand general election
  - The Labour Party, led by Jacinda Ardern, surges in the polls and is neck-and-neck
    with the National Party, led by Bill English, for the race for Prime Minister
    of New Zealand. (The Guardian)
  - 2017 Kenyan general election
  - The Supreme Court of Kenya annuls the results of the recent presidential election,
    that indicated President Uhuru Kenyatta was reelected, due to irregularities,
    and orders a new election. (BBC)
  - Presidency of Donald Trump
  - Paul Ryan (R-WI), U.S. Speaker of the House of Representatives, urges President
    Donald Trump not to rescind the Deferred Action for Childhood Arrivals (DACA)
    program that protects immigrants who illegally entered the U.S. as children from
    deportation. (Reuters)
  - President Trump nominates Oklahoma congressman Jim Bridenstine, member of the
    House Committee on Science, Space, and Technology, to be Administrator of the
    National Aeronautics and Space Administration. (Politico)
  Science and technology:
  - 2017 in astronomy
  - Asteroid 3122 Florence, which is roughly 2.7 miles (4.4 kilometers) wide, comes
    within 4.4 million miles (7 million km) of Earth — approximately 18 times the
    distance from our planet to the Moon. (Space)
