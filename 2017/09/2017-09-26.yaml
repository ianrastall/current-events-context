Date: '2017-09-26'
Source_URI: Portal:Current events/2017 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Har Adar shooting
  - Three Israelis are killed and one other is wounded after a Palestinian gunman
    opens fire in an entrance to the Israeli settlement of Har Adar in the West Bank.
    (Reuters)
  Business and economy:
  - Mass surveillance in the United States
  - The United States Department of Homeland Security plans to collect the social
    media information of all immigrants, including green card holders and naturalized
    citizens, beginning on October 18, 2017. (CNET)
  - Social networking services
  - Twitter is experimenting with doubling its 140 character limit to 280 characters
    for all languages except Japanese, Chinese and Korean. (USA Today)
  - Economy of the United States
  - The U.S. Commerce Department imposes preliminary anti-subsidy duties on Bombardier
    Inc. CSeries jets following American rival Boeing's claims of unfair Canadian
    subsidies. The penalty is on hold pending the U.S. International Trade Commission's
    final decision, expected in 2018. (Reuters) (The Washington Post)
  Law and crime:
  - Women's rights in Saudi Arabia
  - The king of Saudi Arabia issues a decree allowing women to be issued driving licenses
    by June 2018. Saudi Arabia is the world's last sovereign state that does not allow
    women to drive. (The Guardian) (The Telegraph)
  - 2017 NCAA Division I men's basketball corruption scandal
  - The office of the United States Attorney for the Southern District of New York
    announces that 10 individuals, including assistant coaches at four NCAA Division
    I men's basketball programs—Arizona, Auburn, Oklahoma State, and USC—have been
    arrested on federal corruption charges. The accused are alleged to be part of
    a scheme by which coaches accepted bribes to steer NBA-bound college players toward
    certain agents and financial advisers. Court documents also allege that an apparel
    company later identified as Adidas paid $100,000 to the family of an unnamed player
    to ensure his signing with an unnamed Division I school, which was later confirmed
    as the University of Louisville. (ESPN)
  Politics and elections:
  - Iraqi Kurdistan independence referendum, 2017
  - The result of a non-binding independence referendum by Iraqi Kurdistan will to
    be announced within 72 hours. The vote is widely expected to be in favor of independence.
    (Al Jazeera)
  - Iran and Turkey have vowed that there may be military aggression if the result
    is independence. (Newsweek)
  - Turkey's president has said Iraqi Kurds could go hungry as a result of the punitive
    measures it is considering after Monday's independence referendum. (BBC)
  - United States Senate
  - Senate special election in Alabama, 2017
  - Justice Roy Moore and U.S. Senator Luther Strange face off in Alabama’s special
    election in what political analysts claim is a deepening rift between the Republican
    Party's establishment and anti-establishment factions. Moore is projected to win
    the primary runoff. (BBC), (New York Times)
  - United States Senator Bob Corker (R-Tenn), the senate's Foreign Relations Chairman,
    announces he will not seek reelection in 2018. He is the first senator to announce
    his retirement this term. (Politico) (The Washington Post)
  - Politics of Russia
  - Russian President Vladimir Putin dismisses Nizhny Novgorod Oblast governor Valery
    Shantsev from his post, the second governor to lose his job in a week after Putin
    dismissed Samara Oblast governor Nikolay Merkushkin the day before. The dismissals
    come amid speculation that governors of several federal subjects will resign in
    anticipation of presidential elections in 2018. (Radio Free Europe/Radio Liberty)
  - Presidency of Donald Trump
  - Acting U.S. Drug Enforcement Administration chief Chuck Rosenberg announces his
    resignation, effective Oct. 1, after more than two years in the position. (USA
    Today)
  Science and technology:
  - Green wall
  - Africa's Great Green Wall is successfully reversing desertification. (BBC)
