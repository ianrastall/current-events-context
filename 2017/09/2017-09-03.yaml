Date: '2017-09-03'
Source_URI: Portal:Current events/2017 September 3
Intelligence_Payload:
  Business and economy:
  - Economy of Cambodia
  - The Cambodia Daily newspaper announces it will publish its final edition after
    being ordered to pay USD$6.3 million in taxes as a result of an investigation,
    initiated by Prime Minister of Cambodia Hun Sen, into private companies operating
    in Cambodia. (NPR)
  Disasters and accidents:
  - Hurricane Harvey
  - Hurricane Harvey is projected to possibly become the second costliest hurricane
    in the United States's history, with estimates ranging from US$72 billion to over
    $125 billion. In comparison, Hurricane Katrina's total damage is estimated to
    be around $118 to $160 billion. (ABC News)
  - 2017 California wildfires
  - The La Tuna Fire continues to burn in Los Angeles, California, becoming the largest
    fire in the city's history at around 5,800 acres. Mayor Eric Garcetti declares
    a state of emergency. (Los Angeles Times) (NBC News)
  - Unexploded ordnance in Germany
  - Large portions of Frankfurt, Germany, are evacuated as local authorities work
    to defuse a bomb left over from a Royal Air Force raid during World War II. The
    evacuation is the largest to occur in Europe since World War II. (CNN)
  - Bomb disposal experts successfully defuse the bomb. (AP)
  International relations:
  - 2017 North Korea crisis
  - 2017 North Korean nuclear test
  - A 6.3 magnitude earthquake is detected near the Punggye-ri Nuclear Test Site in
    Kilju County, North Korea, after North Korea tests its sixth and most powerful
    nuclear weapon to date. North Korean state media claims the country tested a hydrogen
    bomb that can be fitted on an ICBM. (New York Times) (AFP, Wall Street Journal
    via The Australian) (New York Times) (AP/Reuters via ABC Australia)
  - The independent seismic monitoring agency NORSAR estimates that the blast had
    a yield of around 120 kilotons, approximately three times more than the combined
    explosive yield of the bombs dropped on Hiroshima and Nagasaki during World War
    II. (NOSAR)
  - U.S. Secretary of Defense James Mattis says in a statement “Any threat to the
    United States or its territories, including Guam or our allies, will be met with
    a massive military response, a response both effective and overwhelming". (Reuters)
  Science and technology:
  - Free-electron laser
  - The European X-ray free-electron laser is inaugurated in Hamburg, Germany. (XFEL)
