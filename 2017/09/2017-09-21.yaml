Date: '2017-09-21'
Source_URI: Portal:Current events/2017 September 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Russian and Syrian warplanes carry out airstrikes in southern Idlib, killing three
    civilians and wounding others. (Iraqi News)
  Business and economy:
  - Economy of the United States
  - Google strikes a $1.1bn (£822m) deal with Taiwan's HTC to expand its smartphone
    business. (BBC)
  - Economy of China
  - China's credit rating has been downgraded by Standard & Poor's (S&P) because of
    worries over the rapid build up of debt in the country. (BBC)
  Disasters and accidents:
  - European migration crisis
  - At least five migrants have died and ninety are missing after their boat sinks
    off the western coast of Libya. (AP via U.S. News and World Report)
  - 2017 Atlantic hurricane season
  - Hurricane Maria
  - Maria, now a Category 3 hurricane with maximum sustained winds of 125 mph (205
    km/h), is passing offshore of the northern coast of the Dominican Republic, expected
    to impact the Turks and Caicos Islands and southeastern Bahamas later tonight
    and Friday. (National Hurricane Center)
  - Casualty reports indicate at least 15 people have been killed on Dominica and
    two on Guadeloupe. The casualty report for Puerto Rico is now two deaths, including
    a man from a capsized boat near Vieques, Puerto Rico. Power remains out for an
    estimated 3.4 million Puerto Ricans as the energy grid is all but destroyed. Guajataca
    Dam in Puerto Rico will experience an "imminent dam break" according to the National
    Weather Service which will threaten 70,000 residents. In addition, more than 95
    percent of the island’s wireless cell sites are out of service. (The New York
    Times)
  - Puerto Rico is forecast to get an additional to of rain through Saturday, on top
    of the several feet of rain that has fallen on parts of the island. Caguas has
    received the most, . The NHC expects to rain for the Dominican Republic, Turks
    and Caicos, and Mayaguana in the southeast Bahamas. (National Hurricane Center)
    (The New York Times)
  - 2017 Central Mexico earthquake
  - Rescuers are focusing on 10 collapsed buildings where people may still be alive.
    Mexico City Mayor Miguel Ángel Mancera reports the death toll is now at least
    273, with 50 people still missing. (Reuters)
  International relations:
  - North Korea–United States relations
  - U.S. President Donald Trump announces new sanctions on North Korea over its nuclear
    weapons program. (BBC)
  Law and crime:
  - Protests against Rodrigo Duterte
  - Coinciding with the 45th anniversary of the declaration of martial law in 1972
    by the late Philippine President Ferdinand Marcos, nationwide protests are conducted
    by various groups against the government's implementation of war on drugs and
    the ongoing martial law in the whole of Mindanao under the administration of President
    Rodrigo Duterte. (Rappler)
  - Russian interference in the 2016 United States elections
  - Facebook agrees to disclose ads that ran in the U.S. in 2016 from accounts associated
    with a Russian entity known as the Internet Research Agency to United States Congressional
    investigators. Earlier, this information was provided to Special Counsel Robert
    Mueller. (CBS News) (Facebook)
