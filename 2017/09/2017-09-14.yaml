Date: '2017-09-14'
Source_URI: Portal:Current events/2017 September 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War
  - 2017 Nasiriyah attacks
  - Several members of ISIL stage multiple attacks on the outskirts of Nasiriyah in
    the southern Dhi Qar Governorate, killing at least 50 people and injuring 87 others.
    (BBC) (RT)
  Arts and culture:
  - History of mathematics
  - The origin of the zero may have been in South Asia according to a Sanskrit script
    housed in the United Kingdom since 1902 and discovered in Bakhshali near Peshawar,
    Pakistan. (The Guardian)
  Business and economy:
  - Feminism in the United States
  - Google is being sued over alleged inequality in the pay of male and female employees.
    (BBC)
  Disasters and accidents:
  - 2017 disasters in Malaysia
  - A fire at an Islamic boarding school for boys kills 24 people, most of them students,
    in Kuala Lumpur, Malaysia. (Reuters)
  - 2017 Pacific typhoon season
  - Flights are cancelled and evacuations are ordered for over 100,000 people in the
    North Central Coast of Vietnam, in preparation for Typhoon Doksuri. The system
    has already claimed four lives passing over the Philippines. (The Washington Post)
  International relations:
  - Zapad 2017 exercise, Belarus–Russia relations
  - Russia and Belarus begin a six-day joint strategic military exercise inside Belarus
    and Russia's Kaliningrad Oblast. The military exercise simulates war against the
    fictional state of Veyshnoria. According to the Defence Ministry of Belarus, fewer
    than 13,000 personnel will be taking part in the exercise; however, Western analysts
    believe the total number will range from 60,000 to 100,000. (Reuters)
  - India–Japan relations
  - Japan agrees to help with the construction of an Indian bullet train. (The Guardian)
  Law and crime:
  - Philippine Drug War
  - The Communist-aligned Makabayan bloc leaves the majority of the Philippine lower
    House over disagreements due to the ongoing drug crackdown. (Rappler)
  Politics and elections:
  - 2020 United States presidential election
  - California wants to schedule its primaries earlier than usual, possibly on March
    or Super Tuesday, to have much more influence in comparison to its weight and
    diversity and to help Californian candidates, such as Eric Garcetti and Kamala
    Harris. (NPR)(CNN)
  Science and technology:
  - Snow leopard
  - The International Union for Conservation of Nature upgrades the conservation status
    of the snow leopard from endangered to vulnerable. (Sky News)
  Sports:
  - 2017 Major League Baseball season
  - In baseball, the Cleveland Indians break the Major League Baseball record for
    longest winning streak with 22 wins in a row. The 1935 Chicago Cubs previously
    held the record with 21. (Washington Post)
