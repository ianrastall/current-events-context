Date: '2017-09-10'
Source_URI: Portal:Current events/2017 September 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Russian military intervention in the Syrian Civil War
  - Russian airstrikes on several ferries attempting to cross the Euphrates near Deir
    ez-Zor kill at least 34 civilians, including 9 children, according to the Syrian
    Observatory for Human Rights. (AFP via Daily Mail)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Irma
  - Hurricane Irma makes landfall in Florida as a category 4 hurricane, killing at
    least three people and knocking out power to over one million households. (ABC
    News)(CNN) (The Guardian)
  - 2017 Livorno floods
  - Floods, following torrential rain, kill at least six people in the port city of
    Livorno, Italy. (Deutsche Welle)
  Law and crime:
  - 2017 Plano shooting
  - A gunman shoots seven people dead at a house party in Plano, Texas, amid a domestic
    dispute. The gunman was then killed after exchanging fire with a Plano Police
    Department officer. (The Independent)
  Sports:
  - 2017 US Open (tennis)
  - Spain's Rafael Nadal defeats South African Kevin Anderson, 6–3, 6–3, 6–4, in the
    US Open men's singles final for his third championship at Flushing Meadows Park
    in the New York City borough of Queens. This is Nadal's second Grand Slam title
    this year, and his 16th overall. (ESPN)
  - 2017 Vuelta a España
  - The general classification of the 72nd edition of the Vuelta a España is won for
    the first time by British cyclist Chris Froome from Team Sky, ahead of Vincenzo
    Nibali of Bahrain-Merida Pro Cycling Team. (BBC)
