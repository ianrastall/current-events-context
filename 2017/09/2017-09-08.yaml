Date: '2017-09-08'
Source_URI: Portal:Current events/2017 September 8
Intelligence_Payload:
  Arts and culture:
  - Pope Francis pastoral visits
  - Pope Francis, responding to FARC rebel leader Rodrigo Londoño's open letter asking
    for forgiveness for the suffering the group had inflicted on the country during
    his talk in Villavicencio, urges Colombians skeptical of the peace deal to be
    open to reconciliation. (Reuters) (Salem Radio Network)
  Disasters and accidents:
  - 2017 Chiapas earthquake
  - Tsunami waves are reported in Mexico from the earthquake late yesterday with the
    biggest wave measuring . (Fox News)
  - The death toll from yesterday's earthquake rises to over 50 people. (AP) (AFP
    via Focus News Agency) (Sky News)
  - 2017 Atlantic hurricane season
  - Hurricane Jose
  - Hurricane Jose intensifies into an "extremely dangerous" Category 4 hurricane
    as it nears the northern Leeward Islands, according to the National Hurricane
    Center. (CBS News)
  - Hurricane Irma
  - Hurricane Irma's death toll this week is at least 21 people after recently hitting
    Cuba and The Bahamas as a Category 4 storm with maximum sustained winds of 155
    mph (250 km/h). (Reuters) (National Hurricane Center)
  - Approximately 5.6 million people in the U.S. states of Florida and South Carolina
    have been asked to evacuate. (Fox News) (AP)
  - Hurricane Irma regains category 5 strength just before it makes landfall on Cuba's
    Camaguey Archipelago. (Washington Post)
  - Accidents involving helicopters
  - A Duke University medical helicopter crashes near Belvidere, North Carolina, killing
    four people. (Daily Mail)
  - A helicopter crashes in Medford, New Jersey, leaving two people dead, including
    singer Troy Gentry of Montgomery Gentry. (Sky News)
  International relations:
  - Bahrain–United States relations
  - The U.S. State Department has approved a package of potential arms sales worth
    more than USD$ 3.8 billion to the Kingdom of Bahrain including F-16 jets, upgrades,
    missiles and patrol boats. (Reuters)
  - North Korea–Philippines relations
  - The Philippines suspends trade relations with North Korea to comply with a recent
    United Nations Security Council resolution over its repeated missile tests. (Reuters)
  - 2017 Qatar diplomatic crisis
  - Qatar Emir Sheikh Tamim bin Hamad al-Than telephones Saudi Arabia Crown Prince
    Mohammad bin Salman to discuss the three-month old crisis. (Al Jazeera)
  - U.S. President Donald Trump speaks with Saudi Arabian, Emirati, and Qatari leaders
    emphasizing that unity among Arab partners is essential for regional stability
    and for countering Iran's threat. (The Hill) (Radio Free Europe/Radio Liberty)
  Law and crime:
  - Identity theft in the United States
  - The U.S. Justice Department announces Roman Seleznev, the son of Russian parliament
    member Valery Seleznev, pleaded guilty in a $50 million identity theft probe.
    This past April, Roman Seleznev was sentenced to 27 years in prison on 38 counts
    of hacking crimes. (Reuters) (Sputnik)
  - Law of Brazil
  - Brazilian prosecutor Rodrigo Janot files charges in the Supreme Court against
    officials in President Michel Temer's Brazilian Democratic Movement Party accusing
    them of forming a criminal organization. Earlier the Court said, next week, it
    will consider Temer's request to block Janot from issuing further charges. (Reuters)
  - Deferred Action for Childhood Arrivals
  - The University of California files a lawsuit against the potential termination
    of the Deferred Action for Childhood Arrivals programme which may affect more
    than 4,000 students. (Los Angeles Times) (Politico)
  - Crime in Massachusetts
  - In Groton, Massachusetts, Orion Krause is arrested for killing his mother, grandparents,
    and a caretaker in their home. Authorities believe the killings were an act of
    domestic violence. (Boston CBS)
