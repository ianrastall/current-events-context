Date: '2017-09-16'
Source_URI: Portal:Current events/2017 September 16
Intelligence_Payload:
  Business and economy:
  - Airlines of the Republic of Ireland
  - Irish low-cost airline Ryanair cancels 82 Sunday flights as the first step in
    a six-week program that will eliminate 40 to 50 flights daily to wipe out its
    crew vacation backlog in order to meet Irish Aviation Authority requirements by
    the end of this year. (Bloomberg)
  International relations:
  - Catalan independence referendum, 2017
  - More than 700 Catalan mayors meet in Barcelona with Catalan President Carles Puigdemont
    to confirm their support for the October 1 independence referendum. Earlier this
    week, Spanish prosecutors warned that officials participating in this vote could
    be criminally charged. (Reuters)
  - Spain–United Kingdom relations
  - The government of Scotland releases a statement in support of the Catalan independence
    referendum but would prefer that both Catalonia and Spain agree on the terms.
    (The Scotsman)
  - Iraqi Kurdistan independence referendum, Germany–Turkey relations
  - Turkey summons the ambassador of Germany after at least 10,000 people rally in
    Cologne in support of the referendum. (Deutsche Welle)
  Politics and elections:
  - Icelandic parliamentary election, 2017
  - Iceland will vote for a new Alþingi (parliament) on November 4 after the collapse
    of the previous government. (News.com.au)
  - 2020 United States presidential election
  - California passes a bill that will move the primaries to March near Super Tuesday.
    (Politico)
  - Rohingya refugees in Bangladesh
  - Bangladesh announces plans to build a giant refugee camp the size of a small city
    to house nearly 400,000 Rohingya refugees. (BBC)
