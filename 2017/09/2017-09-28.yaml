Date: '2017-09-28'
Source_URI: Portal:Current events/2017 September 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Islamic State of Iraq and the Levant releases footage which apparently show
    its leader Abu Bakr al-Baghdadi urging his followers to expand their attacks against
    "crusaders and apostates". (Los Angeles Times)
  Business and economy:
  - Credit card fraud
  - Whole Foods Market, recently acquired by Amazon, announces hacking of payment
    card information from some of its stores. (Reuters)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Maria
  - U.S. President Donald Trump waives the Jones Act for Puerto Rico after he first
    disallowed additional aid, citing shipping industry business interests. Senator
    John McCain says the Jones Act makes prices for food, water, and other emergency
    supplies too high in Puerto Rico. (Newsweek)
  - Ring of Fire
  - More than 134,000 people on the island of Bali, Indonesia, have been taken to
    shelters as the Mount Agung volcano continues to release smoke. The alert level
    for an eruption has been raised to the second highest level, 4. In addition, the
    entire population of Vanuatu's Aoba Island, also at alert level 4, is being moved
    from the path of the increasingly active Lombenben volcano. (news.com.au) (CNN)
  - Rohingya refugee crisis
  - At least 14 Rohingya people, including 10 children, fleeing violence in Myanmar
    are killed when their boat apparently hits a submerged object and capsizes just
    yards from the Bangladesh coast. (AFP via MSN.com)
  Politics and elections:
  - Japanese general election, 2017
  - Prime Minister Shinzō Abe dissolves the lower house of parliament prior to the
    October 22 election. (Bloomberg) (Japan Times)
  - Catalan independence referendum, 2017
  - The President of Catalonia vows to continue on with the vote despite objections
    from Spain. (USA Today)
  Science and technology:
  - Aftermath of the 2011 Tōhoku earthquake and tsunami
  - Aquatic species from Japan hitched a ride on debris from the 2011 Tōhoku earthquake
    and tsunami and were able to reach the West Coast of the United States alive.
    (Phys.org)
