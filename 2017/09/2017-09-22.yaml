Intelligence_Payload:
  Business and economy:
  - Transport in London
  - Transport for London announces that it will not issue Uber a new private hire
    license. (BBC)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Tens of thousands of people in northern Puerto Rico are ordered to evacuate after
    floodwaters from Hurricane Maria damage the Guajataca Dam. (The Washington Post)
  Politics and elections:
  - Aruban general election, 2017
  - Voters in Aruba go to the polls to elect a new Parliament, with the ruling Aruban
    People's Party losing 4 of its 13 seats. Prime Minister Mike Eman announces his
    intention to step down as leader of the Aruba People's Party. (NRC)
  Science and technology:
  - Human evolution
  - A new study shows that Neanderthal brains developed more slowly than those of
    modern humans, contradicting previous studies. (BBC)
