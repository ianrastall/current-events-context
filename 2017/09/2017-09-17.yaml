Date: '2017-09-17'
Source_URI: Portal:Current events/2017 September 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - A roadside bomb kills five people in Bajaur, Pakistan. (Geo TV)
  Arts and culture:
  - 69th Primetime Emmy Awards
  - The Primetime Emmy Awards is held in Los Angeles at the Microsoft Theater. Political
    satirist and The Late Show host Stephen Colbert hosts the event. (The New Yorker)
  - The Handmaid's Tale wins eight awards including Outstanding Drama Series, while
    Veep wins for Outstanding Comedy Series. (ABC News Australia)
  - Last Week Tonight with John Oliver won Outstanding Variety Talk Series, while
    Saturday Night Live won for Outstanding Variety Sketch Series. (Vox)
  Disasters and accidents:
  - 2017 disasters in Romania
  - At least eight people are killed and 137 injured after a strong storm hits western
    and central Romania. (Washington Post) (Reuters)
  - 2017 Atlantic hurricane season
  - Hurricane Maria
  - Hurricane Maria has been upgraded from a tropical storm to a Category 1 hurricane.
    Hurricane watches and warnings have been issued in parts of the Caribbean. It
    is following a path similar to Category 5 Hurricane Irma which left at least 82
    dead. (CNN)
  Law and crime:
  - Crime in France
  - A British Airways airplane is evacuated at Paris Charles de Gaulle Airport after
    a "direct threat" was made against it. After a search, it is declared safe. (The
    Guardian)
  Politics and elections:
  - Pakistan by-election, Panama Papers case
  - Kulsoom Nawaz Sharif, wife of ousted former Prime Minister Nawaz Sharif, defeats
    the opposition party's Yasmin Rashid in the by-election for Nawaz Sharif's National
    Assembly seat. Kulsoom, represented by her daughter and proxy Maryam, is being
    treated in London for cancer. (The Nation) (BBC) (Al Jazeera)
  - Macanese legislative election
  - Voters in Macau vote for a new Legislative Assembly. (South China Morning Post)
  - Next Japanese general election
  - Japanese Prime Minister Shinzō Abe is expected to dissolve the House of Representatives
    on September 28, 2017 to make way for fresh elections. (The Japan Times)
  - Palestinian politics
  - Hamas, through Egyptian-mediated talks, agrees to dissolve its Gaza administration,
    hold talks with the Fatah West Bank government, and hold elections for a Palestinian
    unity government. (The Guardian) (Reuters)
  Sports:
  - EuroBasket 2017
  - In basketball, Slovenia wins EuroBasket for the first time in history, beating
    Serbia 93–85 in the final. (EuroNews)
  - 2017 Asian Indoor and Martial Arts Games
  - The fifth Asian Indoor Games open in Ashgabat, Turkmenistan, with around 5,500
    athletes from 61 countries participating in the event which will last until September
    27. (Radio Free Europe/Radio Liberty)
