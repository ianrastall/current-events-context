Date: '2017-09-09'
Source_URI: Portal:Current events/2017 September 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Siege of Deir ez-Zor (2014–17)
  - The Syrian Army breaks the nine month long siege of the Deir ez-Zor Airport by
    ISIL militants. (Reuters)
  - Deir ez-Zor offensive (September 2017–present)
  - SDF announces an offensive against ISIL militants in northern Deir ez-Zor Governorate.
    (Reuters)
  - 2016–17 Northern Rakhine State clashes
  - The Arakan Rohingya Salvation Army declares a unilateral ceasefire to allow humanitarian
    groups to facilitate aid for Rohingya refugees. (BBC)
  Arts and culture:
  - Egyptology
  - Egypt announces the discovery of a tomb in Luxor belonging to a royal goldsmith
    who lived more than 3,500 years ago in the 18th Dynasty. (AP)
  - Roman Britain
  - Archaeologists discover a cache of Roman Britain-era artefacts, including weapons,
    at an ancient Roman cavalry barracks near Hadrian's Wall in northern England.
    Archaeologists liken the discovery to winning the lottery. (The Guardian)
  - 2017 Venice Film Festival
  - Film director Guillermo del Toro wins for The Shape of Water. (Vulture)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Irma
  - Hurricane Irma makes landfall in Cuba. The death toll across the Caribbean is
    at least 25 people, (CNN) (The New York Times)
  - Hurricane Katia
  - Hurricane Katia makes landfall in Mexico as a Category 1 hurricane, causing heavy
    damage and at least two deaths. (UPI)
  - 2017 Chiapas earthquake
  - The death toll in the earthquake that struck the Chiapas region of Mexico rises
    to 90. (CNN)
  International relations:
  - 2017 Qatar diplomatic crisis
  - Saudi Arabia suspends any dialogue with Qatar, accusing it of “distorting facts”
    in its reporting of yesterday's phone call between the leaders of both countries
    which suggested a breakthrough in the Gulf dispute was possible. (Reuters) (RT
    via Newsline)
  Politics and elections:
  - Politics of Uruguay
  - Vice President Raúl Sendic of Uruguay resigns amid a graft investigation. (Bloomberg)
  Sports:
  - 2017 US Open (tennis)
  - In tennis, Sloane Stephens of the United States wins the women's singles final
    defeating fellow American Madison Keys 6–3, 6–0. (Reuters via Yahoo!)
  - West Indian cricket team in England in 2017
  - In cricket, England defeat the West Indies by nine wickets to win the three-match
    series. England bowler Jimmy Anderson takes 7–42 and becomes only the third fast
    bowler in history to take 500 Test wickets. (BBC)
