Date: '2017-09-24'
Source_URI: Portal:Current events/2017 September 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Russian military intervention in the Syrian Civil War
  - A Russian lieutenant general, Valery Asapov, is killed by mortar fire from ISIL
    militants near the city of Deir ez-Zor, according to the Russian Defence Ministry.
    Asapov has been described as one of the senior Russian military advisers in Syria.
    (Al Arabiya)
  International relations:
  - Foreign relations of Iraqi Kurdistan
  - Iranian forces launch a military exercise near the border of Iraqi Kurdistan,
    hours before a Kurdish vote on independence from Iraq. Turkey is also conducting
    a military exercise in the region. (CNBC)
  - The Iraqi government discourages foreign countries from importing crude oil directly
    from its Iraqi Kurdistan region. (Reuters)
  - Immigration policy of Donald Trump
  - The White House announces that citizens of North Korea, Venezuela, and Chad will
    be restricted from travelling to the United States, along with citizens of the
    six nations previously listed in Executive Order 13780 with the exception of Sudan.
    (CNBC)
  Law and crime:
  - Burnette Chapel shooting
  - A shooting at a church in Nashville, Tennessee, leaves one dead and seven injured.
    The suspected shooter is arrested. (KTLA)
  - Crime in Indiana
  - Indiana gerontophobe and prolific serial killer Orville Lynn Majors, believed
    to have committed as many as 130 nursing home murders between 1993 and 1995, dies
    in prison at the age of 56. (My Wabash Valley)
  Politics and elections:
  - German federal election, 2017
  - Voters in Germany go to the polls to elect members of the Bundestag. Chancellor
    Angela Merkel of the Christian Democratic Union is widely expected to win a fourth
    term in office. (DW)
  - Exit polls indicate Merkel has won a fourth term in power, and that Alternative
    for Germany will enter the Bundestag for the first time as the third largest party.
    (BBC)
  - U.S. national anthem protests (2016–present)
  - Amid criticism of U.S. national anthem protests by U.S. President Donald Trump,
    some National Football League players and teams react to the controversy by kneeling,
    linking arms, or skipping game performances of the national anthem. (ESPN)
  Transport:
  - Transportation in Dubai
  - City officials in Dubai, United Arab Emirates, announce that residents will receive
    incentives for swapping their petrol engine vehicles for electric ones, including
    a free Salik tag, and an exemption from RTA registration and renewal vehicle fees.
    (Khaleej Times)
