Date: '2017-09-15'
Source_URI: Portal:Current events/2017 September 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Parsons Green bombing
  - An explosion on a train at the Parsons Green tube station in London injures 29.
    Scotland Yard is treating the incident as a terrorist attack. (The Guardian) (BBC)
  Arts and culture:
  - Oldest living people
  - Jamaican Violet Mosse-Brown, the world's oldest person, dies in Montego Bay at
    age 117. (UPI)
  Business and economy:
  - Economy of California
  - Key housing bills pass in California, the U.S. state with the highest number of
    people suffering from homelessness and poverty. (The Sacramento Bee) (Los Angeles
    Times)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - In the aftermath of Hurricane Irma, the island of Barbuda is fully depopulated
    for the first time in 300 years. (CNN)
  - 2017 Pacific typhoon season
  - Typhoon Doksuri (Maring) hits central Vietnam killing one person and injuring
    ten. (AP)
  - Crocodile attack
  - A journalist for the British newspaper Financial Times is killed by a crocodile
    in Sri Lanka. (The Chicago Tribune)
  Health and medicine:
  - Fight against hunger
  - The World Health Organization says that hunger around the world has risen as a
    result of war and climate change. (The World Health Organization)
  International relations:
  - 2017 North Korea crisis
  - September 2017 North Korean missile launch over Japan
  - A North Korean missile flies over Hokkaido, Japan, triggering the J-Alert system,
    following a similar event on 29 August. (Bloomberg)
  - South Korea responds with its own missile firing just six minutes after the North's
    test was detected. (Yonhap)
  Law and crime:
  - Shooting of Anthony Lamar Smith
  - The ex-police officer involved in a fatal 2011 shooting of a black man in St.
    Louis, Missouri is acquitted of all charges related to the case. (DW)
  - Hundreds of people protest the decision. After some protests become violent, 10
    police officers are injured and 32 protesters are arrested. (ABC News)
  Politics and elections:
  - Politics of Iceland
  - Prime Minister Bjarni Benediktsson is criticised after his father wrote a letter
    recommending that a convicted child molester be pardoned. The Bright Future party
    withdraws from the governing coalition, triggering its collapse. (BBC)
  - Philippine Drug War
  - Around 1,200 members of the Philippine National Police in the suburb of Caloocan
    are fired over allegations of crimes attributed to the police. (U.S. News and
    World Report)
  - Iraqi Kurdistan independence referendum, 2017
  - The Iraqi Kurdistan Parliament votes to go ahead with the planned independence
    referendum, scheduled to take place on 25 September, 2017. (BBC)
  Science and technology:
  - Cassini retirement
  - After 20 years "floating" the Solar System, the Cassini space probe to the Saturn
    system ends the mission with a controlled fall into the atmosphere of the planet.
    (BBC)
