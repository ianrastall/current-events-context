Date: '2017-09-30'
Source_URI: Portal:Current events/2017 September 30
Intelligence_Payload:
  Armed attacks and conflicts:
  - 2017 Edmonton attack
  - In Edmonton, Alberta, Canada, near Commonwealth Stadium, a man drives into a police
    officer and then stabs the officer. The suspect fled the scene and was later arrested
    that night following a police pursuit, where four pedestrians were hit by the
    suspect in a rental truck. Police are investigating the incident as an act of
    terrorism. (Edmonton Journal) (Reuters)
  Disasters and accidents:
  - 2017 disasters in Romania
  - A fire at a retirement home in Bucharest, Romania, leaves one person dead and
    19 others injured. (The New York Times)
  - 2017 disasters in DR Congo
  - A military transport plane crashes after take-off from N'djili Airport in Kinshasa,
    Democratic Republic of the Congo, killing all 12 Russian crew members. (Deutsche
    Welle via MSN)
  - Human stampede
  - A crowd surge collapses a barrier during a soccer match at Stade de la Licorne
    in Amiens, France, injuring twenty-nine people, five of them seriously. (AFP via
    Yahoo! Sports)
  International relations:
  - Foreign relations of Thailand, Rohingya persecution in Myanmar (2016–present)
  - Thailand's Ministry of Foreign Affairs says it is "closely following the situation"
    in Rakhine State and offers aid for the governments of Myanmar and Bangladesh.
    (Reuters)
  Politics and elections:
  - Abortion in the Republic of Ireland
  - Tens of thousands of protesters march through Dublin to demand Ireland to change
    its abortion laws, and anti-abortion activists stage counter-demonstrations. A
    pro-choice rally is held outside the Irish embassy in London. (BBC)
  - Nazism in Sweden
  - About 600 members of the Swedish neo-Nazi group Nordic Resistance Movement march
    through Gothenburg, and 10,000 people hold a counter-demonstration. More than
    50 people are arrested and several people are injured during the protests. (The
    Washington Post)
  Sports:
  - 2017 AFL Grand Final
  - The Australian rules football club Richmond Football Club defeats the Adelaide
    Football Club in the 2017 AFL Grand Final by 108 points to 60. Dustin Martin won
    the Norm Smith Medal for best on ground after having won the 2017 Brownlow Medal
    for the best and fairest player in the competition. (ABC Australia) (ABC Australia)
