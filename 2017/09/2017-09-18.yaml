Intelligence_Payload:
  Armed conflicts and attacks:
  - Northern Rakhine State clashes
  - A few hundred pro-government protesters gather in Myanmar's commercial capital
    Yangon, condemning Rohingya militants as well as perceived foreign interference
    in the Rakhine conflict. (MSN)
  Business and economy:
  - Bankruptcy in the United States
  - Toys "R" Us files for Chapter 11 bankruptcy protection in the United States, and
    also files for bankruptcy in Canada, as it attempts to restructure its debts.
    (BBC) (CNBC)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Maria
  - Hurricane Maria reaches Category 5 as it threatens the Leeward Islands, Puerto
    Rico, and the Dominican Republic. (NBC News)
  Politics and elections:
  - Politics of the Netherlands
  - Eberhard van der Laan, the mayor of Amsterdam, takes a permanent leave of absence
    after disclosing that his metastatic lung cancer has been diagnosed as terminal.
    (NOS) (RTL Nieuws)
