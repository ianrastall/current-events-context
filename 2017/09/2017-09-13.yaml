Date: '2017-09-13'
Source_URI: Portal:Current events/2017 September 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - A suicide bombing occurs at a checkpoint near the Kabul International Cricket
    Stadium in Kabul, Afghanistan, killing at least three people and injuring five.
    (Reuters)
  - The United States Senate blocks an amendment to the 2018 National Defense Authorization
    Act that would have repealed the war authorizations for the use of force in Iraq
    and Afghanistan. (CNBC)
  Business and economy:
  - Antivirus software
  - United States Homeland Security bans Kaspersky Lab products from government computers
    due to fears they could be coerced into sharing information with the Russian government.
    (Gizmodo)
  International relations:
  - Immigration to the United States
  - The United States stops giving out visas to high ranking officials of Cambodia,
    Eritrea, Guinea and Sierra Leone for failing to accept deportations. (Radio Free
    Asia)
  Law and crime:
  - Politics of Texas
  - The United States Supreme Court confirms (5–4) a temporary stay of a lower court
    ruling which would have required Texas to undergo new redistricting of congressional
    districts with large Hispanic and African American populations. The ruling was
    made in advance of a formal hearing on the gerrymandering case, Abbott v. Perez,
    which has no scheduled hearing date yet. (Politico), (The Houston Chronicle)
  - Law of Israel
  - The Supreme Court of Israel strikes down the exemption on the conscription of
    ultra-Orthodox Jews. (The Los Angeles Times)
  - Crime in New York
  - Former businessman Martin Shkreli has his bail revoked for threatening former
    politician Hillary Clinton, after Shkreli posted on Twitter that he would offer
    $5,000 to anyone who could directly obtain a lock of Clinton's hair. Shkreli was
    convicted of fraud in August and is awaiting sentencing. (CNN)
  Politics and elections:
  - State of the Union (European Union)
  - President of the European Commission, Jean-Claude Juncker, holds his annual State
    of the European Union speech in Strasbourg. (Reuters)
  - Deferred Action for Childhood Arrivals (DACA)
  - In an official dinner hosted by the United States President, Donald Trump and
    leaders of the Democratic party Chuck Schumer and Nancy Pelosi agree to fix DACA
    but disagree with the details, with Trump denying on Twitter the following day
    that a deal had been made which excluded funding for his proposed wall on the
    Mexico–United States border. (CNN)
  - Catalan independence referendum, 2017
  - Spanish Attorney General, José Manuel Maza, imputes 700 Catalan mayors for their
    role in the banned independence referendum. (BBC)
  Science and technology:
  - Galápagos tortoise
  - Scientists hope to revive the extinct Floreana island tortoise using a 'genetically-informed'
    captive breeding program with the tortoises closest ancestors. (Phys.org)
  Sports:
  - 131st IOC Session
  - The International Olympic Committee awards the 2024 Summer Olympics to Paris and
    the 2028 Summer Olympics to Los Angeles. (Los Angeles Times)
  - 2017 Major League Baseball season
  - The Cleveland Indians defeat the Detroit Tigers 5–3 for their 21st consecutive
    win, surpassing the previous American League record of 20 set by the 2002 Oakland
    Athletics. The streak is the longest in Major League Baseball since the 1935 Chicago
    Cubs won 21 straight. (AP via ESPN)
