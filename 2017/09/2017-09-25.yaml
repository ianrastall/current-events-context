Date: '2017-09-25'
Source_URI: Portal:Current events/2017 September 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Northern Rakhine State clashes
  - A mass grave of 28 Hindus, including children, allegedly slain by the Arakan Rohingya
    Salvation Army, is discovered by the Myanmar Army. (The Australian)
  - 2017 North Korea crisis
  - North Korea says that the recent flight of U.S. aircraft off the coast of North
    Korea amounts to a declaration of war. (BBC)
  Arts and culture:
  - Women in the United States Marines
  - The first ever female United States Marine Corps Infantry officer graduates. (NPR)
  Business and economy:
  - Media of the United Kingdom
  - The BBC plans to launch a service in Korean. (BBC)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Maria
  - Puerto Rican officials request aid from the United States federal government for
    welfare in the aftermath of the hurricane-induced humanitarian crisis on the island.
    (CNN)
  Law and crime:
  - Crime in Nigeria
  - Gunmen attack the Ogba Zoo in Benin City, Nigeria, killing three police officers
    and abduct the zoo's director. There is no information on who the gunmen and abductors
    are, or whether they have made any demands. (BBC)
  - Crime in Russia
  - Russian police arrest a couple from the southern Krasnodar region that has allegedly
    murdered as many as 30 people since 1999 and consumed parts of the human bodies.
    (CNN) (International Business Times)
  Politics and elections:
  - Iraqi Kurdistan independence referendum, 2017
  - Voters in Iraqi Kurdistan head to the polls for a referendum on independence from
    Iraq. (Sky News)
  - Japanese general election, 2017
  - The Prime Minister of Japan Shinzō Abe calls a snap election with the election
    to be held on October 22. (Reuters)
  - German federal election, 2017
  - Frauke Petry resigns as leader of the far right Alternative for Germany (AfD),
    a day after the party won seats in the Bundestag for the first time, saying the
    party has become too "anarchical" and "could not offer a credible platform". (The
    Guardian)
  - Efforts to repeal Obamacare
  - United States Senator Susan Collins says she will vote "no" on the Graham–Cassidy
    bill joining Senators John McCain and Rand Paul and possibly ending the most recent
    effort to repeal Obamacare. (The Hill)
  Science and technology:
  - Science in Australia
  - At the International Astronautical Congress in Adelaide, the Government of Australia
    announces that it will create an Australian space agency. (The Sydney Morning
    Herald)
