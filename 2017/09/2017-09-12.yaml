Date: '2017-09-12'
Source_URI: Portal:Current events/2017 September 12
Intelligence_Payload:
  Arts and culture:
  - 2016 United States presidential election
  - Hillary Clinton releases the book What Happened, a memoir about her most recent
    presidential campaign. Clinton has implied that she may not run again in 2020.
    (CNN)
  International relations:
  - Russian interference in the 2016 United States elections
  - The United States Department of Justice has requested Moscow-based Russian media
    channel RT America to register as a foreign lobbying firm in the United States.
    (The Hill)
  - Russia–Turkey relations
  - President of Turkey Recep Tayyip Erdoğan affirms Turkey has paid a deposit on
    the purchase of Russian S-400 missile systems. (Hürriyet)
  Law and crime:
  - Law of California
  - California Governor Jerry Brown signs a bill that will protect all California
    residents, regardless of their immigration status, from unnecessary detention
    and questioning; similar to those ordinances in sanctuary cities. (Los Angeles
    Times)
  - Executive Order 13780, Asylum in the United States
  - The U.S. Supreme Court rules that the Trump administration can block international
    refugees from entering the United States. (Reuters)
  - Terrorism in Spain
  - The Sagrada Família basilica in Barcelona is evacuated due to an anti-terrorism
    operation. (AP)
  - Terrorism in the Philippines
  - In an unconfirmed video, the Islamic State of Iraq and the Levant instructs its
    followers to go and fight in the Philippines instead of the Middle East. (NBC)
  Politics and elections:
  - 2017 Singaporean presidential election
  - Halimah Yacob is elected as the first female president of Singapore as the sole
    candidate in the upcoming elections. (The New York Times)
  - Politics of the Philippines
  - Philippine senators call for Justice secretary Vitaliano Aguirre to resign. (Philippine
    Canadian Inquirer)
  - The House of Representatives of the Philippines approves a bill that limits the
    budget of the Commission on Human Rights to only ₱1,000 (US$20). (Rappler) (BBC)
  - Politics of Washington (state)
  - Seattle mayor Ed Murray announces his resignation after allegations surface that
    he sexually abused five teenagers in the 1970s and 80s. (The Seattle Times)
  - 2017 Norwegian parliamentary election
  - The right-wing coalition led by Erna Solberg wins its second term in office in
    the Norwegian parliamentary election held late yesterday. (BBC News)
  - Rohingya refugees in Bangladesh
  - Bangladeshi Prime Minister Sheikh Hasina accuses the Burmese government of "atrocities"
    against the Rohingya people and calls for these alleged atrocities to stop. (The
    Indian Express)
  Science and technology:
  - Apple media events
  - 'Apple Inc. announces three new iPhone models: the iPhone 8, iPhone 8 Plus, and
    the iPhone X. The Apple Watch Series 3 and a new Apple TV are also announced.
    (The New York Times)'
