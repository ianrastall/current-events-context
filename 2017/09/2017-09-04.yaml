Date: '2017-09-04'
Source_URI: Portal:Current events/2017 September 4
Intelligence_Payload:
  Armed attacks and conflicts:
  - Syrian Civil War
  - Syrian state television reports the Syrian Army reaches a point 3 kilometers from
    Deir ez-Zor, a city besieged by the Islamic State of Iraq and the Levant since
    2014. (Reuters)
  - Two Russian soldiers, escorting the military staff ceasefire monitoring convoy,
    are killed in Deir ez-Zor Province by ISIL shelling. (Reuters)
  Business and economy:
  - Economy of the United States
  - United Technologies Corp will buy airplane parts maker Rockwell Collins for USD$30
    Billion, including seven billion in debt previously incurred by Rockwell Collins.
    (Reuters)
  - Media of the United States
  - Tronc Inc., the Los Angeles Times and the Chicago Tribune publisher, buys the
    New York Daily News. (U.S. News & World Report)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Irma
  - Hurricane Irma is now a Category 4 hurricane with maximum sustained winds of 130
    mph (215 km/h). Hurricane warnings are issued for the Leeward Islands in the Caribbean,
    which are expected to be affected Tuesday. Rainfalls of up to 10 inches (25 centimeters)
    are possible. Irma is forecast to strengthen over the next 48 hours. The governors
    of Puerto Rico and Florida issue states of emergency. (NPR) (AP via The Washington
    Post) (National Hurricane Center)
  International relations:
  - 2017 North Korea crisis
  - South Korean Defense Minister Song Young-moo says it is worth reviewing deployment
    of U.S. strategic assets (aircraft carriers, nuclear submarines, and B-52 bombers)
    to South Korea more regularly. (The Washington Post)
  - Crisis in Venezuela
  - The opposition movement in Venezuela seeks help from France. (ABC news)
  Law and crime:
  - Crime in Italy
  - Italian fugitive and 'Ndrangheta member Rocco Morabito is arrested in Montevideo,
    Uruguay, after 23 years on the run. He is now expected to be extradited to Italy
    in the coming months. (BBC)
  Politics and elections:
  - Politics of Taiwan
  - Premier of the Republic of China Lin Chuan offers his resignation as head of the
    Executive Branch of Taiwan. (Reuters)
