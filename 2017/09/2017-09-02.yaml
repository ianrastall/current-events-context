Date: '2017-09-02'
Source_URI: Portal:Current events/2017 September 2
Intelligence_Payload:
  Armed attacks and conflicts:
  - Iraqi Civil War
  - Seven people are killed and 13 are injured after suicide bombers hit a state-run
    power station near the northern city of Samarra, Iraq. The Islamic State of Iraq
    and the Levant claims responsibility for the attack. (Reuters)
  Business and economy:
  - Trump Tower wiretapping allegations
  - Both the FBI and NSD declare that they possess no records indicating that Trump
    Tower in New York City, New York was wiretapped earlier in March. (CNN)
  Disasters and accidents:
  - 2017 disasters in Kenya
  - Seven schoolgirls are killed and ten hospitalised after a fire at the Moi Girls
    School in Nairobi, Kenya. (Reuters)
  - A boat carrying at least 19 migrants from Costa Rica to Nicaragua capsized leaving
    one dead and a boy missing, with 17 rescued. (The Indian Express)
  International relations:
  - Timor Gap
  - Australia and East Timor settle a dispute between the two countries in the Timor
    Sea. (ABC.net.au)
  Law and crime:
  - Law enforcement in Cambodia
  - Cambodian opposition leader Kem Sokha is arrested for alleged treason. (The Chicago
    Tribune)
