Date: '2017-09-19'
Source_URI: Portal:Current events/2017 September 19
Intelligence_Payload:
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Maria
  - Hurricane Maria makes landfall on Dominica as a category 5 hurricane with maximum
    sustained winds of 160 mph (260 km/h). Maria is the second category 5 hurricane
    to make landfall at that intensity in the 2017 season, making this and 2007 the
    only seasons on record to feature this occurrence. (National Hurricane Center)
  - 2017 Central Mexico earthquake
  - A magnitude 7.1 earthquake strikes Mexico, killing at least 220 people and collapsing
    several buildings in Mexico City and widespread evacuations, hours after a yearly
    earthquake drill in commemoration of the 1985 Mexico City earthquake. (KTLA)
  International relations:
  - 72nd session of the United Nations General Assembly
  - The 72nd session of the United Nations General Assembly commences its General
    Debate at the United Nations headquarters in Manhattan, New York. (amNewYork)
  Law and crime:
  - Crime in Louisiana
  - Two African-American men are killed in separate incidents near Baton Rouge, Louisiana,
    and a third home is shot at in what local and federal officials call racially-motivated
    crimes. A local man is arrested on suspicion of the murders. (CBS News) (U.S.
    News & World Report)
  - 2017 Spanish constitutional crisis
  - Spain's Guardia Civil raid private delivery offices in the Catalan city of Terrassa,
    searching for and confiscating envelopes suspected of containing voting cards
    for the upcoming Catalan independence referendum. (BBC)
  Science and technology:
  - Mobile operating system
  - Apple Inc. releases the iOS 11 update for most current models of the iPhone and
    iPad. (CNN)
