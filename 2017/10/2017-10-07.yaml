Date: '2017-10-07'
Source_URI: Portal:Current events/2017 October 7
Intelligence_Payload:
  Armed attacks and conflicts:
  - A Saudi national opens fire at the Al-Salam Royal Palace in Jeddah, Saudi Arabia,
    killing two guards and injuring three others. Security guards shoot and kill the
    gunman. (Arab News) (BBC)
  Disasters and accidents:
  - 2017 Atlantic hurricane season
  - Hurricane Nate
  - Hurricane Nate makes landfall near the mouth of Mississippi River and near Biloxi,
    Mississippi, as a Category 1 hurricane with maximum sustained winds of . (WJLA)
  - Aftermath of Hurricane Maria
  - The Federal Communications Commission approves Google's plan to restore some cell
    phone service in hurricane-hit Puerto Rico with Project Loon balloons. (The Telegraph)
  - An explosion at a liquefied natural gas depot leads to a second explosion at a
    gas station in Legon, a suburb of the Ghanaian capital Accra, killing at least
    seven people and injuring sixty-eight more. (AP via Fox News) (StarrFM)
  - 2017 Madagascar plague outbreak
  - Since August 1, another round of pneumonic, bubonic, and septicemic plague spreads
    in Madagascar, killing at least 45 people. (The Washington Post) (Relief Web)
  - A car mounts the pedestrian sidewalk near the Natural History Museum on Exhibition
    Road, and injures 11 people. London police believe the incident is not terror
    related. They arrested the driver but later released him. (BBC)
  Politics and elections:
  - 2017 Russian protests
  - Russian police arrest 290 protesters calling on President Vladimir Putin to resign.
    (Reuters) (CNN)
