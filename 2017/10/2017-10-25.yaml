Date: '2017-10-25'
Source_URI: Portal:Current events/2017 October 25
Intelligence_Payload:
  Arts and culture:
  - Congressional Gold Medal
  - The Congressional Gold Medal is awarded to Filipino American veterans of World
    War II more than 70 years after the end of that war. (Manila Bulletin)
  Disasters and accidents:
  - Floodings in Burgas Province, Bulgaria, claim 3 victims. (Novinite) (Radio Bulguria)
  Politics and elections:
  - 19th National Congress of the Communist Party of China
  - At the National Congress of the Communist Party of China, Xi Jinping assumes his
    second term as General Secretary (China's paramount leader), and the political
    theory Xi Jinping Thought is written into the party's constitution. (BBC) (Guardian)
    (Telegraph)
  - Politics of Saudi Arabia
  - Crown Prince Mohammad bin Salman of Saudi Arabia announces that a majority of
    Saudis want a return to moderate Islam. 70% of the kingdom is made up of residents
    under the age of 30 who welcome the idea of new reforms. (BBC)
  Law and crime:
  - Ukrainian crisis
  - A parked scooter explosion in Kiev, thought to be an assassination attempt on
    Ukrainian Radical MP Ihor Mosiychuk, kills his bodyguard and one more man. Mosiychuk,
    political scientist Vitaliy Bala and a woman are injured. (DigitalJournal)
  Science and technology:
  - Interstellar comet
  - The discovery of an asteroid with a record high eccentricity, A/2017 U1, is announced.
    It is almost certainly the first known example of an interstellar object. While
    initially thought to be a comet, it is now considered an asteroid. (IAU Minor
    Planet Center)
