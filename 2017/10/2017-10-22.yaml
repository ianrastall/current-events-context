Date: '2017-10-22'
Source_URI: Portal:Current events/2017 October 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - A suicide bomber kills 13 people and injures five others in the northeast Nigerian
    city of Maiduguri. According to the police, 13 more civilians were injured in
    separate attacks. (Reuters)
  Law and crime:
  - Israeli–Palestinian conflict
  - A Palestinian man in the occupied West Bank is arrested and questioned for a few
    hours by Israeli police after Facebook mistranslates his Arabic-language message
    saying "good morning" into Hebrew for "attack them". (Sky News)
  Politics and elections:
  - Japanese general election, 2017
  - Shinzō Abe is re-elected prime minister as his Liberal Democratic Party-led coalition
    wins 312 seats and retains its two-thirds supermajority in the 465-member House
    of Representatives. (BBC) (Reuters)
  - Slovenian presidential election, 2017
  - Voters in Slovenia go to the polls to elect their president. Opinion polls predict
    that the independent incumbent Borut Pahor will retain the largely ceremonial
    role despite being challenged by noted actor and comedian Marjan Šarec. (Bloomberg)
  - Argentine legislative election, 2017
  - Voters in Argentina go to the polls to elect half of the members of the Chamber
    of Deputies and Senate. Cambiemos, the national government coalition led by president
    Mauricio Macri, got a clear victory in the four most populated provinces and the
    city of Buenos Aires. Former president Cristina Fernández de Kirchner ran for
    senator of Buenos and ended second, leading the opposition. (The Washington Post)
  - Referendums in Italy
  - Lombard autonomy referendum, 2017 and Venetian autonomy referendum, 2017
  - Set on the same day, two regions of Italy hold non-binding referendums aimed to
    decide whether citizens want greater autonomy or not. (BBC News)
  Sports:
  - 2017 Major League Baseball postseason
  - The Houston Astros defeat the New York Yankees 4–0 in the seventh and deciding
    game of the American League Championship Series, thereby advancing to the World
    Series for the second time in team history and the first as an American League
    team. (AP via ESPN)
