Date: '2017-10-08'
Source_URI: Portal:Current events/2017 October 8
Intelligence_Payload:
  Disasters and accidents:
  - Rohingya genocide
  - A refugee boat en route to Bangladesh from Myanmar capsizes, resulting in at least
    12 deaths. (Global News)
  - 2017 Atlantic hurricane season
  - Hurricane Nate
  - Hurricane Nate weakens to a tropical storm, and causes flooding and power outages
    in Mississippi and Alabama. (ABC News)
  International relations:
  - Turkey–United States relations
  - The U.S. Mission in Turkey suspends all non-immigration visa services in the country
    citing security concerns. (Reuters)
  - In a reciprocal action of retaliation, the Turkish mission in the United States
    suspends all non-immigration visa services in the country, via a reversed-role
    copy of the U.S. statement. (Reuters)
  - The Turkish lira (TRY) falls 3.2% intraday on worries for tourism in Turkey. (Reuters)
    (Bloomberg)
  Politics and elections:
  - 2017 Spanish constitutional crisis
  - At least 350,000 people attend a rally in Barcelona to oppose Catalan independence.
    (BBC)
  Sports:
  - Festus Talam wins the Eindhoven Marathon with a time of 2 hours, 6 minutes, 13
    seconds, beating his 2016 record by 13 seconds. (Sport Hive)
