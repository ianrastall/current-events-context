Intelligence_Payload:
  Armed conflicts and attacks:
  - 14 October 2017 Mogadishu bombings
  - At least 276 people are killed when a lorry filled with explosives detonates outside
    a hotel in the capital Mogadishu, becoming the worst terrorist attack in Somalia's
    history. (NBC News)
  - Battle of Raqqa (2017)
  - The Syrian Democratic Forces carry out a deal to evacuate dozens of ISIL militants
    from Raqqa to Deir ez-Zor. (Rudaw)
  Arts and culture:
  - Harvey Weinstein sexual misconduct allegations
  - The Board of Directors of the Academy of Motion Picture Arts and Sciences decides
    to strip Harvey Weinstein of membership following several allegations of predatory
    sexual behavior. (Los Angeles Times)
  Health and medicine:
  - A small-scale study has determined that psilocybin mushrooms, which contain the
    drug psilocybin, can treat depression. (BBC)
