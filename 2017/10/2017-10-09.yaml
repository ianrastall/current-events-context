Date: '2017-10-09'
Source_URI: Portal:Current events/2017 October 9
Intelligence_Payload:
  Business and economy:
  - Nobel Memorial Prize in Economic Sciences
  - The Nobel Prize committee awards American Richard Thaler the Sveriges Riksbank
    Prize in Economic Sciences in Memory of Alfred Nobel "for his contributions to
    behavioral economics." His work focuses on the psychology of the human conflict
    of what we plan for the financial present versus what we plan for the future.
    (Nobel Prize.org) (BBC)
  - 2017 Kobe Steel falsification of data scandal
  - Japan's third-biggest steelmaker, Kobe Steel, admits to falsification of product
    data. About four percent of the aluminum and copper products that it shipped from
    September 2016 to August 2017 were falsely labeled as meeting the specifications
    requested by 200 customers, including Toyota Motor Corp, Central Japan Railway
    Company, Mitsubishi Heavy Industries, Mazda Motor Corp, and Subaru Corp. (Reuters)
  Disasters and accidents:
  - A fire at the Sindika Trade Center, a construction materials shopping center in
    the northwestern edge of Moscow, Russia, forces the evacuation of at least 3000
    people. (BBC) (Reuters)
  - October 2017 Northern California wildfires
  - More than a dozen wildfires around Mendocino, Napa, Sonoma, and Yuba counties
    in California, kill at least ten people, destroy at least 1500 homes and businesses,
    and force 20 thousand people to evacuate. The Governor of California, Jerry Brown,
    declares a state of emergency. (AP) (The Washington Post) (NBC)
  Law and crime:
  - Bosnian War
  - The presiding judge Šaban Maksumić of the Sarajevo, Bosnian war crimes court acquits
    former Bosnian military officer Naser Orić of the charge of killing three Bosnian
    Serb prisoners of war during the Bosnian War. In July 2008, the Appeals Chamber
    of the International Criminal Tribunal for the former Yugoslavia in the Netherlands
    acquitted Orić for failing to prevent the deaths of five Bosnian Serb detainees
    and the mistreatment of eleven other detainees from late 1992 to early 1993. (Reuters)
  Sports:
  - 2018 FIFA World Cup qualification
  - Iceland qualifies for the 2018 FIFA World Cup after defeating Kosovo 2–0 to win
    UEFA Group I, becoming the smallest nation by population to qualify for a FIFA
    World Cup. (The Guardian)
