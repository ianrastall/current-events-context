Date: '2017-10-28'
Source_URI: Portal:Current events/2017 October 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 28 October 2017 Mogadishu bombings
  - Two car bombs kill at least 25 people, mostly police officers, near the national
    theater area in Mogadishu, Somalia, two weeks after a similar attack killed hundreds.
    Islamist group Al-Shabaab claims responsibility. (Reuters)
  Disasters and accidents:
  - At least 19 people are killed and 16 others are injured when a bus skids off the
    road in the Dhading District and falls into the Trishuli River in central Nepal.
    (AFP via MSN.com)
  - 2017 Atlantic hurricane season
  - Tropical storm warnings are issued for western Cuba and the northwestern Bahamas,
    and tropical storm warnings are announced for coastal South Florida in the U.S.,
    as a strengthening Tropical Storm Philippe treks north-northeast with maximum
    sustained winds at 35 mph (55 km/h). (The Weather Channel) (National Hurricane
    Center)
  Politics and elections:
  - Black Lives Matter
  - A "White Lives Matter" gathering takes place in Shelbyville, Tennessee, with 200+
    WLM protestors met by 700+ counter-protesters. (USA Today)
  - Icelandic parliamentary election, 2017
  - Voters in Iceland go to the polls to elect 63 members of the Althing. (BBC News)
