Date: '2017-10-17'
Source_URI: Portal:Current events/2017 October 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Battle of Raqqa
  - The Syrian Democratic Forces announce the end of the battle for ISIL's de facto
    capital. (Al Jazeera)
  - War in Afghanistan
  - A suicide attack on a police compound in Gardez, Paktia Province, kills at least
    20 people, while a separate gun attack at a training facility in neighboring Ghazni
    Province leaves another 15 people dead. (Radio Free Europe/Radio Liberty)
  - 2017 Iraqi–Kurdish conflict
  - The Iraqi Army and allied militias continue to seize Kurdish-held territory, taking
    over several key cities including Khanaqin near the Iranian border, Jalawla, Bashiqa,
    Sinjar and Rabia, as well as the Mosul Dam. (The Washington Post)
  Law and crime:
  - Aftermath of Harvey Weinstein sexual misconduct allegations
  - Roy Price, chief of Amazon Studios, resigns amid accusations that he harassed
    a female producer and ignored an actress' allegation of sexual assault by producer
    Harvey Weinstein. (Reuters)
  Politics and elections:
  - Ukrainian crisis
  - Three protestors and one police officer are injured in clashes between anti-corruption
    demonstrators and Ukrainian police in front of the parliament building in Kiev,
    Ukraine. (BBC)
  - Executive Order 13780, Hawaii v. Trump
  - A federal judge in Hawaii blocks enforcement of the latest version of President
    Donald Trump's travel ban. (ABC News)
