Date: '2017-10-23'
Source_URI: Portal:Current events/2017 October 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Marawi
  - The Philippines Armed Forces declares an end to military operations in the southern
    city of Marawi after 5 months of fighting. (Reuters)
  - Syrian Civil War
  - The Palmyra Coordination Committee reports that 67 bodies, victims of summary
    execution by ISIL, were found in Al-Qaryatayn in the Homs Governorate in central
    Syria. (AP via MSN.com)
  Disasters and accidents:
  - 2017 Pacific typhoon season
  - Typhoon Lan makes landfall in the Shizuoka Prefecture of Japan, causing at least
    two deaths and 10 injuries. (ABS-CBN News)
