Date: '2017-10-13'
Source_URI: Portal:Current events/2017 October 13
Intelligence_Payload:
  Business and economy:
  - Human rights in the Philippines
  - A group of civil society organizations, "among them groups working on human rights,
    youth and drug policy reform," have demanded that Apple Inc. remove from its App
    Store games it said violated the tech firm's guidelines and promoted violence
    and killings commonplace in the Philippine Drug War. (Reuters)
  - Economy of the United Kingdom
  - The head of the United Kingdom's Financial Conduct Authority Andrew Bailey admits
    to meeting oil giant Saudi Aramco over a potential £1.5 trillion listing on the
    London Stock Exchange. The regulator has been criticised for proposing changes
    to listing rules to accommodate sovereign-owned companies. (BBC)
  - Economy of the United States
  - U.S.-based electric automobile maker Tesla fires 400 employees. (Reuters)
  Disasters and accidents:
  - October 2017 Northern California wildfires
  - Among the property damage from the wildfires in California is the Santa Rosa home
    of Peanuts creator Charles M. Schulz; his widow was evacuated Monday. Peanuts
    featured the characters Snoopy and Charlie Brown. (CNN)
  - The death toll grows to 35 people with hundreds still missing. (BBC) (Los Angeles
    Times) (Reuters)
  - The property destruction now includes more than 5700 homes and businesses. (Reuters)
  - Wildlife of Antarctica
  - Conservation biologists describe Adélie penguin east Antarctic colony population
    conditions as catastrophic for the second time in five years as excessive ice
    kills birds travelling for food. (BBC)
  International relations:
  - Joint Comprehensive Plan of Action
  - U.S. President Donald Trump chooses not to certify that Iran complies with the
    2015 agreement. The United States Congress now has 60 days to decide whether to
    lift the sanctions relief, possibly breaching the agreement. (Reuters)
  Law and crime:
  - Cybercrime
  - U.S.-based Hyatt Hotels discovers another (the other much larger one being in
    2015) unauthorized access to payment card information at certain Hyatt-managed
    locations worldwide between March 18 and July 2, at a total of 41 properties in
    11 countries. (Reuters)
  - MS-13
  - Police in Chimaltenango, Guatemala capture Ángel Gabriel Reyes Marroquin, a leader
    of the notorious Mara Salvatrucha, or MS-13, street gang. Prosecutors say he is
    connected to the deaths of at least 287 people. In 2014 Reyes escaped while facing
    charges including murder from a maximum security prison. Currently, he was also
    wanted for an August 17 armed attack on Roosevelt Hospital in Guatemala City in
    which seven people were shot dead. (BBC) (BBC)
  Sports:
  - 2018 FIFA World Cup qualification
  - Bruce Arena resigns as manager of the United States men's national soccer team
    following the failure of the team to qualify for the 2018 FIFA World Cup, the
    first time the U.S. has failed to qualify for a FIFA World Cup since 1986. (The
    Guardian)
