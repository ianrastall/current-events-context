Date: '2017-10-15'
Source_URI: Portal:Current events/2017 October 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Iraqi–Kurdish conflict
  - Battle of Kirkuk (2017)
  - Iraqi forces advance into Kurdish-held territory around the city of Kirkuk. Clashes
    have been reported in the surrounding cities. (Reuters) (RT)
  Arts and culture:
  - Pope Francis announces a special assembly of the Synod of Bishops for the Pan-Amazon
    region. The synod is planned for October of 2019. (Vatican Radio)
  Politics and elections:
  - Kyrgyz presidential election, 2017
  - Voters in Kyrgyzstan go to the polls to elect a new president, with current president
    Almazbek Atambayev constitutionally barred from seeking a second term in office.
    (BBC)
  - Sooronbay Jeenbekov is elected President of Kyrgyzstan in the first peaceful transfer
    of power after a full term in the country's history. (BBC)
  - Austrian legislative election, 2017
  - Voters in Austria go to the polls to elect a new National Council. (Euro News)
  - Venezuelan regional elections, 2017
  - Voters in Venezuela go to the polls to elect new state governors, resulting in
    the incumbent socialist party winning the majority of the governorships, a result
    disputed by the opposition. (Reuters)
