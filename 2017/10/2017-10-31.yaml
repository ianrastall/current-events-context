Date: '2017-10-31'
Source_URI: Portal:Current events/2017 October 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Lower Manhattan attack
  - Eight people are killed and at least 11 others injured when a man in a rented
    pickup truck drives down a bike path along the West Side Highway in Lower Manhattan.
    The 29-year-old suspect, later identified as Uzbekistani immigrant Sayfullo Saipov,
    is shot and taken into custody by police. Police are treating this incident as
    an act of terrorism. (New York Post) (AP) (UPI) (NBC News)
  - War in Afghanistan (2001–2021)
  - A suicide bombing in Afghanistan's capital Kabul kills at least 8 civilians and
    leaves numerous wounded. The Islamic State claims responsibility. (Reuters)
  Disasters and accidents:
  - North Korea tunnel collapse
  - A tunnel under construction at North Korea's nuclear test site collapses, killing
    as many as 200 workers. (Yonhap News Agency)
  - Road accidents in 2017
  - A car accident on highway 400 involving 14 vehicles, including two tanker trucks,
    results in three deaths near Barrie, Ontario. Police suspect distracted driving
    to be the cause. (CBC)
  Law and crime:
  - Crime in Utah
  - A shooting on the campus of the University of Utah leaves one student dead. A
    suspect is taken into custody. (CNN)
  - Crime in California
  - At an elementary school in Riverside, California, police shoot a parent who reportedly
    took a teacher hostage. (Los Angeles Times)
  Politics and elections:
  - Russian interference in the 2016 United States elections
  - U.S. senators question lawyers representing Facebook, Twitter and Google about
    Russian activity on their platforms during the 2016 United States presidential
    election. (BBC)
  - Virginia gubernatorial election, 2017
  - The Latino Victory Fund withdraws an anti–Ed Gillespie political advertisement
    because of scenes which loosely resemble a recent terror attack in New York City.
    The ad was originally meant to improve Ralph Northam's standing with minority
    voters. (New York Daily News), (The Washington Post)
  Science and technology:
  - 2017 in spaceflight
  - A Minotaur-C rocket launches from Vandenberg Air Force Base, California, and deploys
    10 commercial Earth-imaging satellites for Planet Labs. It is the first successful
    mission for the Minotaur-C, formerly known as Taurus, since 2004. (Spaceflight
    101)
