Date: '2017-10-02'
Source_URI: Portal:Current events/2017 October 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Las Vegas shooting
  - The Luxor Hotel is placed on lockdown due to a bomb threat. (Express)
  - The death toll rises to at least 59 people with an additional 527 others injured.
    (The New York Times) (The Washington Post)
  - Authorities name the shooter, who killed himself before police arrived at his
    room in the Mandalay Bay casino and hotel, as 64-year-old Nevada resident Stephen
    Paddock. Police find 23 guns in Paddock's hotel room, and 19 more at his Mesquite,
    Nevada, home. (CNBC) (ABC News)
  - The attack is the deadliest mass shooting in recent U.S. history. (The Guardian)
  - Stephen Paddock's former neighbors in Reno, Nevada, describe him as having a possible
    gambling problem. (Newsweek)
  - CBS fires Hayley Geftman-Gold, vice president and senior counsel of strategic
    transactions at CBS, for a social media post stating that she did not have sympathy
    for the shooting's victims because "country music fans often are Republican gun
    toters". (Fox News) (The Hill)
  - Without providing evidence, ISIL claims responsibility for the attack. U.S. law
    enforcement say they have found no evidence linking the perpetrator with international
    terrorist groups. (CBS News)
  - Syrian Civil War
  - Two suicide bombers attack a police station in the Al-Midan neighbourhood of Damascus,
    killing at least 15 people. (Reuters)
  Arts and culture:
  - After suffering a cardiac arrest in his Malibu, California home, American singer
    and songwriter Tom Petty dies at the UCLA Medical Center in Santa Monica, California,
    at the age of 66. (Rolling Stone)
  Health and medicine:
  - Nobel Prize in Physiology or Medicine
  - The Nobel Prize committee awards Americans Jeffrey C. Hall, Michael Rosbash, and
    Michael W. Young the prize for their work on molecular mechanisms that control
    circadian systems. (The Guardian) (Nobel Prize.org)
  International relations:
  - Egypt–North Korea relations
  - Thirty-thousand North Korean rocket propelled grenades are seized off the coast
    of Egypt by American forces after being purchased by Egyptian business executives
    for $23 million (E£406 million/₩20 billion). (Haaretz)
  - Thailand–United States relations
  - Thai Prime Minister Prayut Chan-o-cha meets with U.S. President Donald Trump in
    the Oval Office. Trump says he wants to lower the U.S. trade deficit with Thailand.
    (Reuters)
  Law and crime:
  - Russian presidential election, 2018
  - Russian opposition leader and hopeful presidential candidate Alexei Navalny is
    sentenced in Moscow to 20 days detention for organizing unauthorized public meetings.
    This is Navalny's third jail term this year. (Reuters) (RT)
  - Politics of Ecuador
  - Ecuador's Supreme Court orders that Vice President Jorge Glas be jailed for his
    alleged acceptance of bribes from the Odebrecht construction company. Prior to
    this, Glas had been free but barred from leaving the country. (AP)
  - Assassination of Kim Jong-nam
  - Two women charged with the assassination of Kim Jong-nam plead not guilty in a
    Malaysian court because they thought it was a TV prank. Kim Jong-nam was the eldest
    son of deceased North Korean leader Kim Jong-il and the half-brother of current
    North Korean leader Kim Jong-un. (BBC)
  Politics and elections:
  - Politics of Canada
  - After her appointment by Prime Minister of Canada Justin Trudeau, former astronaut
    Julie Payette, in an installment ceremony, becomes the 29th Governor General of
    Canada. (CBC)
