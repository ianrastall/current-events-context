Date: '2017-10-24'
Source_URI: Portal:Current events/2017 October 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Germany
  - German police find guns and ammunition in a raid on suspected Islamist militants.
    (Reuters)
  - Terrorism in Indonesia
  - Indonesia arrests nine with alleged Islamic State links. (Reuters)
  - Six crew from a German ship are kidnapped in Nigerian waters. (Reuters)
  Business and economy:
  - Economy of the European Union
  - The European Commission scraps the draft legislation that would have permitted
    the EBA regulator to order "too big to fail" banks to split off their trading
    activities, citing "no foreseeable agreement" in sight on criteria. The draft
    was supposed to be the EU's answer to the United States' Volcker Rule. (Reuters)
  - Banking in the United States
  - Vice President Mike Pence casts the tie-breaking vote late Tuesday night to repeal
    a rule that would have made it easier for Americans to sue their banks and credit
    card companies. (CNN)
  International relations:
  - Immigration policy of Donald Trump
  - U.S. President Donald Trump signs an executive order which allows U.S. to resume
    its refugee program, with a 90-day review period for 11 countries identified as
    "high risk". (The Guardian)
  Law and crime:
  - Ransomware
  - Security researchers report on the outbreak of the ransomware nicknamed Bad Rabbit,
    which has affected computer networks throughout the world, with Russia and Ukraine
    being the worst affected. (International Business Times) (BBC)
  Politics and elections:
  - 19th National Congress of the Communist Party of China
  - The week-long Communist Party congress in Beijing draws to an end, with General
    Secretary Xi Jinping set to become its most influential leader since Party Chairman
    Mao Zedong. (BBC)
  - United States Senate elections, 2018
  - Republican Senator Jeff Flake, a vocal critic of the Trump administration from
    Arizona announces that he will not run again in 2018. (Politico)
  - Nuclear power in the United States
  - Republican leaders in the U.S. House of Representatives launch an investigation
    into the Obama administration's decision in 2010 to allow Rosatom to purchase
    Canada-based Uranium One. (Los Angeles Times)
