Date: '2017-10-29'
Source_URI: Portal:Current events/2017 October 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Northern Rakhine State clashes
  - More than 2,000 people march in Yangon to show support for the military, urging
    the military to secure the country's sovereignty, protect national security and
    stop illegal intruders (referring to the Rohingya people). (ABC News)
  - Libyan Civil War
  - In coordination with Libya’s internationally recognized government, American special
    operations forces and FBI agents capture Mustafa al-Imam, a militant who allegedly
    was involved in the 2012 Benghazi attack, at an unknown location in Libya. (Fox
    News)
  Disasters and accidents:
  - October 2017 Northern California wildfires
  - Archives from Hewlett-Packard founders William Hewlett and David Packard are among
    those destroyed by fires in a Santa Rosa neighborhood. (Quartz)
  - A pickup truck crashes into an Amish horse-drawn buggy, killing three preteen
    children and injuring six other passengers in Bushnell Township, Michigan. Police
    say the survivors' injuries are life-threatening. (The Detroit News) (FOX17) (AP)
  Politics and elections:
  - Politics of Iraqi Kurdistan
  - Massoud Barzani, the president of the Kurdistan Region in Iraq since 2005, announces
    that he will step down after November 1. The Iraqi Kurdistan Parliament now has
    to redistribute the authorities of the presidency. (AFP via SBS)
  - 2017 Spanish constitutional crisis
  - Hundreds of thousands of supporters for a unified Spain gather in Barcelona, the
    capital and largest city of Catalonia, in one of the biggest shows of force against
    Catalan independence. (The Washington Post) (Reuters)
  Sports:
  - 2017 FIA Formula One World Championship
  - After a first-lap collision and a ninth-place finish in the Mexican Grand Prix,
    Lewis Hamilton becomes the fifth driver to win four FIA Formula One World Championship
    titles. (The Guardian)
  - 2017 World Rally Championship
  - Sébastien Ogier clinches his fifth successive World Rally Championship title,
    finishing third in the 2017 Wales Rally GB. (BBC)
  - 2017 WTA Finals
  - Danish tennis player Caroline Wozniacki wins the WTA Finals defeating American
    Venus Williams in the final match, 6–4, 6–4. (BBC)
