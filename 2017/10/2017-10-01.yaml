Date: '2017-10-01'
Source_URI: Portal:Current events/2017 October 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Crisis (2011–present)
  - Houthi forces claim to have shot down a U.S. MQ-9 Reaper drone over the Yemeni
    capital Sana'a. Footage released by Saba News Agency appears to show crowds gathering
    around the wreckage of an aircraft. (Reuters)
  - Marseille stabbing
  - A knife-wielding man at Saint Charles train station in Marseille, France, kills
    two women. Police kill the suspect and are treating the attack as a terrorist
    incident. ISIL claims responsibility. (CNN) (Daily Mail)
  - Anglophone problem (Cameroon)
  - Soldiers in Buea and Bamenda, Cameroon, shoot dead a total of at least eight people
    during various protests by Anglophone separatists. (Reuters)
  - Syrian Civil War
  - The Islamic State group seizes the Al-Qaryatain town in the central province of
    Homs in a surprise attack against Syrian government forces. (First Post)
  - 2017 Las Vegas shooting
  - A gunman opens fire in Paradise, Nevada, at the Mandalay Bay Resort and Casino
    from the upper floors down upon a Jason Aldean outdoor concert, with at least
    59 people dead and 527 others injured. Authorities believe the lone gunman is
    dead. (The New York Times)
  Business and economy:
  - The United Kingdom's Monarch Airlines goes into financial bankruptcy administration,
    suspending all flights, cancelling 300 thousand bookings, and leaving tens of
    thousands of passengers stranded. (Reuters)
  - Skanska USA implodes the Old Kosciuszko Bridge in New York City after 78 years
    of connecting Brooklyn and Queens. (NBC)
  Disasters and accidents:
  - Vanuatu begins evacuating 11,000 islanders from the island of Ambae because of
    the erupting volcano Manaro Voui which pollutes the water. (Reuters)
  Law and crime:
  - O. J. Simpson robbery case
  - Nevada prison authorities release former NFL player O. J. Simpson on parole after
    serving nine years for a 2007 Las Vegas armed robbery. Previously, a jury had
    acquitted Simpson of the 1995 murder of his ex-wife Nicole Brown Simpson and her
    friend Ron Goldman. (CNN)
  Politics and elections:
  - Catalan independence referendum, Operation Anubis, Spanish constitutional crisis
  - The government of Catalonia holds a public referendum on whether their region
    should gain independence from Spain, despite the Spanish courts and government
    declaring the vote illegal and deploying police to deter voters. Catalan President
    Carles Puigdemont says Catalonia "has won the right to become an independent state."
    (BBC) (The Independent)
  - Spanish riot police clash with some protesters in various cities and towns, with
    844 people and 33 police reported injured. (Sky News) (NBC News) (BBC) (The Independent)
  - The Mayor of Barcelona Ada Colau calls on Spanish Prime Minister Mariano Rajoy
    to resign following the police crackdown on Catalan protestors which has left
    hundreds injured. (Euronews)
  - Guardia Civil riot police officers and Catalonia's Mossos d'Esquadra clash in
    Sant Joan de Vilatorrada as tensions rise between the rival police forces. (The
    Spain Report)
  - The government of Catalonia declares that the "yes"-to-independence-vote has won
    a landslide victory. (AP)
  - Catalans defy police orders to leave polling places. (AP)
  - New Democratic Party leadership election, 2017
  - Canada's left-leaning New Democratic Party elects Jagmeet Singh its leader. (The
    Guardian)
  Sports:
  - U.S. national anthem protests (2016–present)
  - Some players throughout the National Football League hold demonstrations before
    or during the U.S. national anthem. These demonstrations include kneeling, raising
    fists, or praying, as a show of unity or protest of social and racial injustice.
    (CNN)
