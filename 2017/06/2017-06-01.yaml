Date: '2017-06-01'
Source_URI: Portal:Current events/2017 June 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Marawi crisis
  - Philippine Defense Secretary Delfin Lorenzana announces the deaths of ten soldiers
    in Marawi as a result of a "friendly fire" airstrike. (BBC)
  International relations:
  - China–Germany relations
  - Chinese Premier Li Keqiang and German Chancellor Angela Merkel vow to expand their
    partnership in combating global climate change. (Reuters)
  - United States withdrawal from the Paris Agreement
  - U.S. President Donald Trump confirms that the United States will withdraw from
    the 2015 Paris Agreement on climate change mitigation. (The Guardian)
  - 2017 Bilderberg Conference
  - The secretive Bilderberg Group meet in Chantilly, Virginia, for its annual conference.
    (BBC)
  Law and crime:
  - United States immigration ban
  - The Department of Justice asks the Supreme Court for expedited review of the Fourth
    Circuit Appeals Court's May 25 ruling that affirmed the Maryland district court
    decision to prevent implementation of revised Executive Order 13780, and let the
    travel ban take effect. The Appeals Court of the Ninth Circuit has not announced
    its decision on a similar ruling from Hawaii. (CNN) (The New York Times)
  Politics and elections:
  - United States withdrawal from the Paris Agreement
  - Elon Musk quits as an official advisor to U.S. President Donald Trump in protest
    at the United States withdrawal from the Paris Agreement. (The Hill)
  Science and technology:
  - Gravitational-wave astronomy
  - Scientists announce that the Advanced Laser Interferometer Gravitational-wave
    Observatory (LIGO) has made a third detection of gravitational waves, named GW170104.
    The signal beam, detected on 4 January 2017, apparently results from a merger
    of two black holes of 19 and 31 solar masses. Such detections are said to be progressively
    moving this emerging field in astronomy "from novelty to new observational science".
    (BBC)
