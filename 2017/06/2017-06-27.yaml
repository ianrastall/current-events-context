Date: '2017-06-27'
Source_URI: Portal:Current events/2017 June 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ukrainian crisis
  - Ukrainian intelligence officer and head of a special forces unit, Maksym Shapoval,
    is assassinated in Kiev by car bomb. (BBC) (The Guardian)
  - 2017 Venezuelan protests
  - 2017 Venezuelan constitutional crisis
  - Armed civilian groups attack the National Assembly building, after a clash between
    lawmakers and the Bolivarian National Guard (GNB), leaving various legislators
    and journalists injured. Opposition legislator and President of the Assembly Julio
    Borges blames President Nicolás Maduro for the attack. (Firstpost)
  - 2017 Caracas helicopter incident
  - A police helicopter strafes the Supreme Court and the Interior Ministry in what
    President Nicolás Maduro calls "an attack by terrorists seeking a coup". There
    are no reports of injuries. (Reuters)
  Business and economy:
  - European Union competition law
  - The European Commission imposes a record €2.42bn antitrust fine on internet giant
    Google for allegedly manipulating its search engine results. (BBC News) (CNN)
  Law and crime:
  - Aftermath of the Bosnian War and Bosnian genocide
  - An appeals court in The Hague rules that Netherlands is partly to blame for the
    deaths of some 350 Muslim Bosnian men in the 1995 Srebrenica genocide and, in
    a move considered landmark, orders it to pay limited damages. (The Telegraph)
    (BBC News)
  - 2017 Petya cyberattack
  - A major ransomware cyberattack strikes companies across the globe and 80% of all
    infections were in Ukraine. (BBC News)
  Politics and elections:
  - Corruption in Brazil
  - Brazilian President Michel Temer is charged with corruption by Prosecutor General
    Rodrigo Janot. The case will now go to the Supreme Federal Court. (The Guardian)
  - Efforts to repeal and replace Obamacare
  - The U.S. Republican Party's leadership, facing strong opposition to the Senate
    version of H.R. 1628, the American Health Care Act of 2017, postpones the planned
    vote on the bill, a setback to Senate Majority Leader Mitch McConnell. (Reuters)
    (AP via The Mercury News)
  - Political appointments of Donald Trump
  - The White House announces that President Trump plans to nominate Textron Systems
    Chief Executive Ellen Lord for Under Secretary of Defense for Acquisition, Technology
    and Logistics. Textron Systems is a defense contractor. (Fortune)
  Science and technology:
  - Social networking service
  - Facebook, Inc. announces that its social media service now has 2 billion regular
    users, more than a quarter of the world's population. Twitter, by comparison,
    has 328 million users as of April 2017. (Reuters)
