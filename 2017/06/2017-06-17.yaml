Date: '2017-06-17'
Source_URI: Portal:Current events/2017 June 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - At least one Afghan is killed and seven American soldiers wounded in an "insider
    attack" at Camp Shaheen, in the northern city of Mazar-i-Sharif. An earlier report
    that Americans had been killed is incorrect. The Taliban claims responsibility.
    (Reuters) (The New York Times)
  - Colombian conflict
  - A suspected terrorist bomb explosion in an Andino shopping mall's ladies bathroom
    in Bogotá, Colombia, kills three women and injures at least 11. (Reuters) (Colombia
    Reports)
  Disasters and accidents:
  - USS Fitzgerald and MV ACX Crystal collision
  - The USS Fitzgerald, a United States Navy destroyer, collides with a merchant ship
    MV ACX Crystal off the coast of Japan at around 2:30 a.m. local time, with seven
    American sailors reported missing. The ship was taking on water and able to operate
    at limited propulsion. (CNN)
  - Climate of Chile
  - Four people are killed as intense rains and snowstorms hit central and southern
    Chile. About 3,000 people are homeless, and hundreds of thousands have lost power.
    (Reuters)
  - 2017 Portugal wildfires
  - Wildfires in central Portugal kill at least 24 people and several firefighters
    are among 20 injured. The death toll so far is the largest due to a wildfire in
    Portugal since 1966. (BBC)
  - Grenfell Tower fire
  - The suspected death toll of the fire in North Kensington, London earlier in the
    week significantly increases, as the Metropolitan Police Service reports that
    a minimum of 58 people are missing and feared dead. (The Telegraph)
  Law and crime:
  - Shooting of Philando Castile
  - Minnesota State Patrol, after issuing three warnings, arrest 18 people who were
    blocking Interstate 94 in St. Paul. A peaceful protest started following Friday's
    acquittal of St. Anthony police officer Jeronimo Yanez, who was charged with manslaughter
    in the fatal shooting of Philando Castile. (CBS News)
  - Bill Cosby sexual assault allegations
  - The trial against comedian Bill Cosby at the Montgomery County Courthouse ends
    with a hung jury and the consequent declaration of a mistrial. (NBC News)
  Politics and elections:
  - Politics of Vanuatu
  - Baldwin Lonsdale, the President of Vanuatu, dies suddenly of a heart attack at
    age 67. Parliament Speaker Esmon Saimon takes his post as acting president. (BBC)
    (Radio New Zealand)
  - Political appointments of Donald Trump
  - Milwaukee County Sheriff David Clarke withdraws his name from consideration for
    an assistant secretary position at the Department of Homeland Security. (AP via
    ABC News) (The Washington Post)
