Date: '2017-06-06'
Source_URI: Portal:Current events/2017 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - 2017 Herat bombing
  - An explosion occurs near police offices and a mosque in Herat, killing at least
    ten people. (Al Jazeera)
  - American-led intervention in Syria
  - Battle of Raqqa (2017)
  - The United States-backed Syrian Democratic Forces launch an operation to capture
    Raqqa, ISIL's de facto Syrian capital. (Reuters)
  Business and economy:
  - 2017 Qatar diplomatic crisis
  - The Philippines temporarily suspends sending workers to Qatar. (BBC)
  International relations:
  - Russia–United States relations
  - A Russian SU-27 fighter jet intercepts an American B-52 strategic bomber that
    was flying over international waters of the Baltic Sea parallel to the Russian
    border, and escorts the B-52 until it flew away from the border area. The United
    States military confirmed that the US Air Force B-52 was operating in international
    airspace, but had no further comment about the incident. (Reuters) (EURACTIV)
  Law and crime:
  - 2017 Notre Dame attack
  - A man who was yelling "This is for Syria" while attacking a police officer with
    a hammer near Notre-Dame de Paris, France is shot and wounded by another officer.
    Prosecutors open a terrorism probe. (Reuters) (AP) (BBC)
  - Corruption in Brazil
  - Brazil's Superior Electoral Court reopens the illegal campaign funding case against
    President Michel Temer, who was the vice presidential candidate on former President
    Dilma Rousseff's ticket in 2014. Temer became president in August 2016 when Rousseff
    was impeached, and could be unseated if the court annuls the Rousseff–Temer election
    victory. (Reuters) (Yahoo!7 News)
  - Sandy, Utah attack
  - Three people are killed in a shooting, including the perpetrator, and two others
    are injured in an apparent domestic dispute in Sandy, Utah. (CBS News)
  Politics and elections:
  - Government of Uzbekistan
  - Uzbekistan Deputy Prime Minister Rustam Azimov is dismissed by President Shavkat
    Mirziyoyev, who had earlier criticized Azimov for failing to control financiers'
    activities. He is replaced by former Deputy Finance Minister Jamshed Kuchkarev.
    (Reuters) (AKIpress news agency) (Reuters²)
  - New Jersey gubernatorial election, 2017
  - American voters in the state of New Jersey select party candidates to succeed
    term-limited incumbent Republican Chris Christie. Democrat Phil Murphy and Republican
    Kim Guadagno win nominations their parties' nominations. (Q13 FOX News)
