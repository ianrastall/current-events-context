Date: '2017-06-28'
Source_URI: Portal:Current events/2017 June 28
Intelligence_Payload:
  Business and economy:
  - Type 055 destroyer
  - China's state-run Global Times newspaper reports the launching of the first Type
    055 destroyer, a 10,000-ton "new generation" warship, at the Jiangnan Shipyard
    in Shanghai. (Reuters)
  Disasters and accidents:
  - Aftermath of the Hillsborough disaster
  - Six people are charged with various offences including manslaughter by gross negligence
    following the Hillsborough disaster in 1989. (BBC)
  International relations:
  - China–North Korea relations
  - Fearing lack of payment, China National Petroleum Corporation stops selling oil
    to North Korea. (International Business Times)
  Politics and elections:
  - Nepalese local elections, 2017
  - Nepalis vote in the second round of local elections, a major step in the near
    decade-long transition from monarchy to democratic government. The first round
    was held on May 14, and the final round is scheduled for September 18, after the
    monsoon season. Parliamentary elections are expected later this year. (Reuters)
  - 2017 Venezuelan constitutional crisis
  - The Supreme Court of Venezuela bars Luisa Ortega Díaz, the chief prosecutor and
    outspoken critic of president Nicolás Maduro, from leaving the country and freezes
    her assets. (Sputnik)
  Sports:
  - NCAA Division I conference realignment
  - The Horizon League announces that IUPUI (full name Indiana University – Purdue
    University Indianapolis) will join the conference on July 1. The Jaguars will
    move from the Summit League to replace Valparaiso University, moving from the
    Horizon to the Missouri Valley Conference on the same date. (CBS Sports)
