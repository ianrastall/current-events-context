Date: '2017-06-24'
Source_URI: Portal:Current events/2017 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Syrian ceasefire line incidents during the Syrian Civil War
  - Israel and Syria exchange weapons fire in the disputed Golan Heights, with Israel
    destroying several targets, including two Syrian tanks. Although there were deaths
    on the ground in Syria, the number of casualties among Syrian forces is unknown.
    No Israeli troops were injured. (CNN)
  Disasters and accidents:
  - 2017 Sichuan landslide
  - An early-morning landslide buries 40 homes and leaves 15 people dead and 114 others
    missing in Aba Prefecture, Sichuan Province, China. At least 500 rescue workers
    are on scene, and a 2-km stretch of the river in Mao County is blocked. (CNN)
  Health and medicine:
  - 2016–17 Yemen cholera outbreak
  - The number of the cholera outbreak cases in Yemen passes 200,000, with over 1,300
    deaths so far. There are an estimated 5,000 new cases every day. (BBC)
  Law and crime:
  - 2017 Westminster cyberattack
  - Police in the United Kingdom are investigating a cyberattack on the Houses of
    Parliament after an attempt was made to gain unauthorised access to politicians'
    email accounts. (BBC)
  Politics and elections:
  - Papua New Guinean general election, 2017
  - Polling places open in Papua New Guinea, and will remain open for two weeks, to
    elect all 111 members of the National Parliament. The People's National Congress
    led by Prime Minister Peter O'Neill is considered likely to maintain a governing
    coalition, despite uncertainty due to lack of opinion polling. (AAP via news.com.au)
