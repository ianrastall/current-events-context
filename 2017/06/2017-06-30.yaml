Date: '2017-06-30'
Source_URI: Portal:Current events/2017 June 30
Intelligence_Payload:
  Armed attacks and conflicts:
  - Syrian Civil War spillover in Lebanon
  - Lebanese Armed Forces are attacked by five suicide bombers and other militants
    during a raid of two Syrian refugee camps in Arsal near the Syrian border. The
    army reports a girl was killed in one of the suicide attacks, seven soldiers were
    also wounded, and 350 people, including several ISIL officials, were detained
    during the sweep. (Reuters) (AP via ABC News)
  International relations:
  - China–India relations, Bhutan–China relations
  - China informs India that it must withdraw its troops for any dialogue to occur
    as tensions rise between China and India and Bhutan over the disputed territory
    of Doklam. (Financial Express)
  Law and crime:
  - Recognition of same-sex unions in Germany
  - The Bundestag votes to introduce same-sex marriage in Germany. With 393 votes
    in favor and 226 against, including Chancellor Angela Merkel, the law is expected
    to enter into force before the end of the year. (The Guardian)
  - 2017 Bronx Lebanon Hospital attack
  - A doctor thought to be formerly employed with the Bronx-Lebanon Hospital Center
    kills one and wounds five others at the facility in New York City. (NBC New York)
    (New York Daily News)
  Politics and elections:
  - Politics of France
  - France's National Front leader Marine Le Pen is under investigation for alleged
    misuse of European Union funding. (Euronews) (AP via CBS News)
  Science and technology:
  - Colony collapse disorder
  - A study funded by Bayer and Syngenta confirms that neonicotinoid insecticides
    kill queen and worker bees. (NPR)
  - Global warming
  - A temperature of 53.7°C (128.7°F) is recorded during the 2017 heat wave in Ahvaz,
    Khuzestan Province, breaking Iran's previous record and becoming one of the highest
    temperatures ever recorded on Earth. (The Washington Post)
  - U.S. President Donald Trump signs an executive order re-establishing the National
    Space Council, which was disbanded in 1993. (The Washington Post)
  Sports:
  - 2017 UEFA European Under-21 Championship
  - In association football, Germany defeats Spain 1–0 in the final to win the 2017
    edition of the UEFA European Under-21 Championship. (BBC)
