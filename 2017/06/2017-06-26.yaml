Date: '2017-06-26'
Source_URI: Portal:Current events/2017 June 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Colombian peace process
  - The United Nations confirms that the FARC has completed its disarmament process,
    with former rebels due to make the transition to civilian life and the group to
    transform into a legal political party in the country. (Al Jazeera)
  Law and crime:
  - Bella Bond murder case
  - Michael P. McCarthy (ex-boyfriend of Bella's mother) is found guilty of second-degree
    murder in the killing of Bella Bond. (Fox News)
  - Human rights in China
  - Chinese political activist and Nobel Peace Prize laureate Liu Xiaobo is released
    from prison on medical parole after being diagnosed with terminal liver cancer.
    (The Guardian)
  - Immigration policy of Donald Trump
  - The Supreme Court of the United States partially reinstates President Donald Trump's
    travel ban and invalidates certain injunctions that were put on the order by two
    federal appeals courts earlier. Final oral hearings concerning the legality of
    the Executive Order 13780 will be held in October 2017 at the Supreme Court. (BBC
    News)
  - Unruly aircraft passengers
  - Alaska Airlines removes 11 passengers from a Juneau, Alaska to Seattle, Washington
    flight, due to alleged unruly and uncooperative behavior. There were no arrests.
    (Atlanta Journal-Constitution) (Travel Pulse)
  Media:
  - CNN 2017 undercover videos controversy
  - Three CNN journalists, Thomas Frank, Eric Lichtblau, and Lex Haris, resign after
    the publication of a Russia-related article involving President Donald Trump that
    was retracted. (ABC News) (Washington Post)
  Politics and elections:
  - Mongolian presidential election, 2017
  - Mongolians go to the polls to elect a new president. The centre-right Democratic
    Party's Battulga Khaltmaa wins a plurality of votes, but falls short of a majority,
    necessitating a second round. (Reuters)
  - Presidency of Rodrigo Duterte
  - President of the Philippines Rodrigo Duterte makes another lengthy absence from
    any public appearance after missing the Independence Day celebrations earlier
    in June. Rumors about his health continue to circulate within the minority although
    government officials deny any issues. (Rappler)
  - Politics of Israel
  - The Jewish Agency for Israel Board of Governors cancels Monday's dinner with Israeli
    Prime Minister Benjamin Netanyahu to protest Sunday's decision by his cabinet
    to rescind plans for a mixed-gender prayer area at Jerusalem's Western Wall, a
    compromise agreement reached after three years of intense negotiations. (AP via
    ABC News)
  Sports:
  - 2017 America's Cup
  - In sailing, Emirates Team New Zealand win the 35th America's Cup, 7–1, against
    Oracle Team USA. (The New Zealand Herald)
