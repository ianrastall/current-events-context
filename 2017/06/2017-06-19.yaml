Date: '2017-06-19'
Source_URI: Portal:Current events/2017 June 19
Intelligence_Payload:
  Armed conflict and attack:
  - 2017 Finsbury Park attack
  - At least one person has been killed and ten injured after a van runs over pedestrians
    outside the Finsbury Park Mosque in the north London suburb of Finsbury Park.
    Police are investigating the act as a terrorist incident. (News Limited) (AP)
  - June 2017 Champs-Élysées car ramming attack
  - A car carrying firearms and gas bottles deliberately rammed a police vehicle on
    the Champs-Élysées in Paris, France, subsequently bursting into flames. The driver,
    who was on a security watchlist, was shot dead. (CNN)
  - Syrian Civil War
  - After yesterday's downing of a Syrian Su-22 jet, Russia shuts down a deconfliction
    channel and says it will follow any aircraft west of the Euphrates as a target.
    (PBS)
  Disasters and accidents:
  - Population displacement
  - The number of people displaced globally totals 65.6 million after an addition
    of 10.3 million people displaced in 2016. Syria, Colombia, Afghanistan, Iraq and
    South Sudan are the countries in the top five. (The Washington Post)
  - Bear attacks
  - Two people are attacked and killed by black bears, in separate incidents in Alaska,
    following a rise in bear attacks in that state. (ABC News)
  International relations:
  - United Kingdom withdrawal from the European Union
  - Brexit negotiations begin in Brussels. (The Guardian)
  - Piracy in the Sulu Sea
  - Indonesia, Malaysia and the Philippines begin joint patrols in the pirate havens
    within the Celebes and Sulu Seas. (Rappler)
  - North Korea–United States relations
  - American student Otto Warmbier, who returned to the United States after serving
    17 months in the North Korean prison system dies after returning from North Korea
    last week in a comatose state. His family has accused the Government of North
    Korea of torturing him. (AP via Aus. Broadcasting Corp.)(AP via Yahoo! News)
  Law and crime:
  - Freedom of speech in the United States
  - The Slants win their case with the Supreme Court of the United States that the
    U.S. Patent and Trademark Office's rejection of their trademark under the Lanham
    Act due to their name being "disparaging" is an unconstitutional violation of
    their free speech rights under the First Amendment. (NPR)
  Science and technology:
  - Personal information of about 200 million U.S. citizens has been exposed on the
    Internet since January when unsecured files were uploaded by Republican contractor
    Deep Root Analytics. The data, available via publicly accessible providers such
    as Amazon Web Services, included birth dates, home addresses, telephone numbers,
    religious affiliations, ethnicities, and political views. The problem was discovered
    by an UpGuard analyst. (BBC) (Salon)
