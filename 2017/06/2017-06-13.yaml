Date: '2017-06-13'
Source_URI: Portal:Current events/2017 June 13
Intelligence_Payload:
  Disasters and accidents:
  - 2017 Bangladesh landslide
  - At least 134 people are dead and dozens are missing in landslides caused by days
    of heavy monsoonal rain in Bangladesh. (Al Jazeera) (BBC) (AFP via The Star)
  International relations:
  - Qatar–United States relations
  - Dana Shell Smith announces she is resigning as United States Ambassador to Qatar
    amid regional tensions over Qatar's alleged support for terrorist groups. (New
    York Post)
  - North Korea–United States relations
  - After over a year in North Korean prison, the government releases the one-year
    comatose Otto Warmbier after negotiations from the United States Department of
    State. (BBC)
  - North Korean defectors
  - A North Korean soldier crosses the Korean Demilitarized Zone (DMZ) and defects
    to South Korea, the first since September 2016. (Yonhap)
  Law and crime:
  - Crime in Germany
  - A shooting occurs at a local train station in the Unterföhring suburb of Munich,
    Germany. The assailant shot a police officer in the head; she is in critical condition.
    Backup police engaged in a shootout where the suspect and two bystanders were
    injured. Police do not believe this is a terrorist attack. (Reuters) (NBC News)
  - 2017 Georgia prison escape
  - Two Baldwin State Prison inmates, Donnie Russell Rowe and Ricky Dubose, escape
    from a prisoner transport vehicle on Georgia State Route 16 after overpowering
    and killing two police officers. The prisoners then carjacked a passing Honda
    Civic and fled towards Eatonton, Georgia, according to officials. (ABC News)
  Politics and elections:
  - Politics of the Republic of Ireland
  - Irish Taoiseach Enda Kenny makes his farewell address to Dáil Éireann, and will
    submit his resignation to President Michael D. Higgins after six years in office.
    It is expected that his successor, Leo Varadkar, will be elected by the Dáil to
    succeed him tomorrow. (RTÉ)
