Date: '2017-06-12'
Source_URI: Portal:Current events/2017 June 12
Intelligence_Payload:
  Disasters and accidents:
  - Earthquakes in 2017
  - An earthquake of 6.3 magnitude shakes the Aegean Sea, causing one death. Many
    houses were damaged in Plomari, Greece, and some collapsed. (AP)
  International relations:
  - Foreign relations of Panama
  - Panama severs diplomatic ties with Taiwan and establishes formal relations with
    China. (Reuters)
  Law and crime:
  - United States immigration policy
  - A Ninth Circuit Appeals Court panel unanimously upholds the Hawaii district court
    decision to prevent implementation of revised Executive Order 13780. On May 25,
    the Fourth Circuit Appeals Court affirmed a similar ruling by the Maryland district
    court. (NBC News) (CNN)
  - In a unanimous decision (8–0), the U.S. Supreme Court strikes down a gender distinction
    in U.S. immigration law that treats mothers and fathers differently. (Reuters)
  Politics and elections:
  - 2017 Russian protests
  - Hundreds of people are detained at anti-corruption protest rallies in Moscow and
    St. Petersburg and many other towns, including opposition leader Alexei Navalny.
    (Reuters) (BBC)
  - Kosovan parliamentary election, 2017
  - A coalition led by the Democratic Party of Kosovo wins the most votes in yesterday's
    election and is in a good position to form a government led by former rebel leader
    and Prime Minister Ramush Haradinaj. (New York Times)
  Sport:
  - 2017 NBA Finals
  - In basketball, the Golden State Warriors defeat the Cleveland Cavaliers in five
    games to win the 2017 NBA Finals. It is the second time they have won the Finals
    in last three years. Kevin Durant is declared NBA Finals MVP. (NBC News)
  - 2018 FIFA World Cup qualification
  - In association football, Iran becomes the second team to qualify for the 2018
    FIFA World Cup after Brazil, and the first Asian side, by defeating Uzbekistan.
    (FIFA)
