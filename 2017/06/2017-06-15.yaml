Date: '2017-06-15'
Source_URI: Portal:Current events/2017 June 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - June 2017 Kabul mosque attack
  - A terrorist attack, involving a blast and gunfire, occurs at a Shia mosque in
    Kabul, Afghanistan, killing several people. (BBC)
  Arts and culture:
  - Man Booker International Prize
  - David Grossman wins the Man Booker International Prize for his novel A Horse Walks
    Into a Bar. (BBC)
  Law and crime:
  - Parliament of Japan
  - The Japanese Diet passes an anti-terrorism law that has been accused by critics
    as a threat to freedom. (The Guardian) (CNN)
  - European Union roaming regulations
  - A European Union law enters force, scrapping roaming charges for people using
    mobile phones abroad within the EU and the European Economic Area. (BBC)
  - 2017 Xuzhou kindergarten bombing
  - An explosion at a kindergarten in Fengxian, Jiangsu Province, China, kills seven
    people and injures 66. (CNN)
  Politics and elections:
  - Government of Serbia
  - Serbian president Aleksandar Vučić nominates Ana Brnabić as the next Prime Minister
    of Serbia. If confirmed by the National Assembly, Brnabić will become Serbia's
    first female and lesbian Prime Minister. (BBC)
  Sport:
  - Members of the U.S. Congress compete in the annual Congressional Baseball Game
    at Nationals Park. The Democrat team beats the Republican team 11–2, but lend
    the trophy to the Republicans until Rep. Steve Scalise recovers from wounds he
    received in a shooting the previous day. (Reuters)
