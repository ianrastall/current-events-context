Date: '2017-06-10'
Source_URI: Portal:Current events/2017 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Marawi crisis
  - United States special forces join the battle in Marawi, Philippines, against the
    Maute. (CNBC)
  - War in Afghanistan (2001–2021)
  - An Afghan soldier kills 3 U.S. troops and injures 1 other in Achin, Nangarhar
    Province. The Taliban claims responsibility, saying the Afghan soldier was one
    of several Taliban infiltrators in the Afghan Armed Forces. (The Guardian)
  Disasters and accidents:
  - Road incidents in the Netherlands
  - Eight people are injured, two seriously, when a car drives into several people
    in front of the Amsterdam Centraal station in the Netherlands. Police say the
    driver may have taken ill; they are not treating this as terrorism-related. (DutchNews.NL)
    (Reuters)
  - Road incidents in Switzerland
  - After finishing a hill-climb run on the trail in St. Gallen, Switzerland, The
    Grand Tour presenter, Richard Hammond failed to stop his Rimac Concept One, crashed
    it through a safety barrier and rolled over several times as it careened down
    the hill. It eventually came to a rest, upside-down, near the bottom. Hammond
    remained conscious during the accident and told first responders not to pull him
    out of the wreckage by his feet, as he thought he had broken his leg. Shortly
    after Hammond was removed from the Rimac, the wreckage burst into flames. (The
    Guardian)
  Law and crime:
  - A 50-year-old man opens fire on passers-by in Kratovo, Russia, killing five people.
    (RT)
  - Crime in Canada
  - Quebec police shoot and kill a 19-year-old suspect following a stabbing spree
    in the village of Akulivik which left three people dead and two others critically
    injured. (CBC)
  Politics and elections:
  - Aftermath of the United Kingdom general election, 2017
  - Prime Minister Theresa May's closest advisers, Fiona Hill and Nick Timothy, resign
    as her Chiefs of Staff amid criticism over their role in the Conservative Party's
    election campaign. (The Independent)
  - Following talks in Belfast, the Democratic Unionist Party (DUP) agrees to a "confidence
    and supply" deal to support a Conservative Party minority-government. (BBC)
  - March Against Sharia
  - Protesters stage rallies, organized by ACT! for America, against sharia law in
    major and small cities across the United States. Counter protesters also assembled
    at these locations. (Reuters) (AP via Time)
  - Politics of Zimbabwe
  - Zimbabwe president Robert Mugabe fires prosecutor Johannes Tomana. (BBC)
  Sport:
  - 2017 Belmont Stakes
  - In American horse racing, Tapwrit wins the 2017 Belmont Stakes. (AL.com)
  - 2017 French Open
  - In tennis, Jeļena Ostapenko of Latvia defeats Simona Halep of Romania 4–6, 6–4,
    6–3 in the Women's Singles of the French Open. It is Ostapenko's first WTA Tour
    title, making her the first woman to earn her first tour victory at a Grand Slam
    event since Barbara Jordan at the 1979 Australian Open. She also becomes the first
    Latvian of either sex to win a Grand Slam event and the first unseeded woman to
    win the French Open since 1933. (The Washington Post) (ESPN)
