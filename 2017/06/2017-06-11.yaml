Date: '2017-06-11'
Source_URI: Portal:Current events/2017 June 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Marawi crisis
  - Philippines president Rodrigo Duterte says he is "not aware" of the United States
    providing support to the Philippine government's military intervention against
    Islamists in Marawi. Duterte also said that he "never approached America for help".
    (Reuters)
  Arts and culture:
  - 71st Tony Awards
  - The Tony Awards are held in New York City with Dear Evan Hansen winning six awards
    including Best Musical and Oslo winning best play. (Daily Mirror)
  International relations:
  - Ukraine–European Union relations
  - The European Union's visa-free regime for Ukraine officially enters into force.
    (Radio Free Europe/ Radio Liberty)
  - 2017 Qatar diplomatic crisis
  - Iran sends five 90-tonne air cargo payloads of perishable food to Qatar. More
    shipments by air and sea are underway. (AFP via Ńew Indian Express)
  - United Kingdom–United States relations
  - The Guardian reports that U.S. President Donald Trump has postponed his visit
    to the United Kingdom, according to a U.K. adviser who said Mr. Trump recently
    telephoned 10 Downing Street with this information. Both Prime Minister Theresa
    May's office and the White House deny this report. (The Guardian) (Geo TV)
  Law and crime:
  - Gaddafi family
  - Saif al-Islam Gaddafi, son of late Muammar Gaddafi, is released in Zintan after
    requests from the eastern Libya-based government. He is sought by the International
    Criminal Court and was condemned to the death penalty by the Tripoli-based government.
    His whereabouts are now unknown. (Reuters)
  - Presidency of Donald Trump
  - The Maryland and the District of Columbia attorneys general plan to sue President
    Trump on Monday claiming he violated the emolument clauses in the Constitution
    by accepting foreign payouts for his hotelier empire. (The Washington Post) (New
    York Daily News)
  Politics and elections:
  - Kosovan parliamentary election, 2017
  - Voters in Kosovo go to the polls for a snap election to replace the government
    of Prime Minister Isa Mustafa, who was removed from office in a no-confidence
    motion last month. (Radio Free Europe/ Radio Liberty)
  - French legislative election, 2017
  - Voters in France return to the polls after last month's presidential election
    for the first round of a legislative election, to begin choosing the 577 members
    of France's lower house. Opinion polls and exit polls predict that En Marche!,
    formed by newly elected President Emmanuel Macron, will pick up a majority of
    seats. (BBC) (The Telegraph)
  - Puerto Rican status referendum, 2017
  - With a turnout of 23% eligible voters, 97% of the voters in Puerto Rico request
    that the island become a U.S. state. (Reuters)
  Sport:
  - 2017 French Open
  - In tennis, Rafael Nadal of Spain defeats Stan Wawrinka of Switzerland 6–2, 6–3,
    6–1, to win the men's singles at the French Open. It is Nadal's tenth win in the
    French Open. (New York Times)
  - 2017 Stanley Cup Finals
  - In ice hockey, the Pittsburgh Penguins win the 2017 Stanley Cup Finals defeating
    the Nashville Predators in six games. It is the Penguins' fifth overall and second
    successive Stanley Cup title. (Bleacher Report)
