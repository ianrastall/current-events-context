Date: '2017-06-09'
Source_URI: Portal:Current events/2017 June 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Tehran attacks
  - Thousands of people along with officials attend funerals held for victims of the
    attacks. (Los Angeles Times)
  - President Hassan Rouhani says the attacks targeted peace and democracy. (PressTV)
  - War in North-West Pakistan
  - Chinese authorities report "grave concern" over reports that two kidnapped Chinese
    teachers in Quetta, Pakistan, were killed by members of the Islamic State of Iraq
    and the Levant. (CNN)
  - Saudi Arabian-led intervention in Yemen
  - Human rights activists accuse forces led by Saudi Arabia and the UAE of kidnapping
    and torturing people during the Yemeni conflict. (Al Jazeera)
  - Iraqi Civil War (2014–2017)
  - A suicide bomber at a market in Musayyib kills 31 and wounds 35. ISIL claims responsibility.
    (Reuters)
  Arts and culture:
  - Cinema of the United States
  - Adam West, the actor widely known for playing Batman in the ABC series of the
    same name during the 1960s, dies from leukemia. (BBC)
  Business and economy:
  - Space launch market competition
  - United Launch Alliance says it was not given an opportunity to bid against rival
    SpaceX for the upcoming launch of the U.S. Air Force miniature X-37B space plane.
    The Air Force declined to comment. (Reuters via New York Daily News)
  Politics and elections:
  - United Kingdom general election, 2017
  - Results of yesterday's snap election are counted, revealing a hung parliament
    as the Conservative Party fails to retain its parliamentary majority, despite
    remaining the party with the most seats. Prime Minister Theresa May announced
    that she will form a minority government with the support of the Northern Irish
    Democratic Unionist Party. (BBC)
  - Significant gains are made by the opposition Labour Party led by Jeremy Corbyn,
    while the Scottish National Party's dominance of Scottish seats is reduced. (The
    Guardian)
  - UK Independence Party leader Paul Nuttall resigns; his party's share of the popular
    vote of 1.8% was over 10 percentage points lower than in 2015. (The Independent)
  - Politics of Japan
  - The National Diet of Japan passes legislation allowing Emperor Akihito to abdicate.
    The abdication is to take place within three years. (AP/Reuters via Aus. Broadcasting
    Corp.)
  - James Comey Senate Intelligence Committee testimony
  - President Donald Trump claims that James Comey committed perjury during his testimony
    yesterday, and offers to give his own testimony, "under oath," refuting that he
    requested Comey to drop the Flynn investigation and that he had asked for Comey's
    allegiance. (The New York Times)
  Sports:
  - 2018 FIFA World Cup qualification
  - The Saudi Arabia national team provokes outrage for failing to observe a minutes
    silence at a World Cup qualifier against Australia at Adelaide Oval. The minute
    silence was in commemoration of the two Australian victims of the 2017 London
    Bridge attack. The incident received condemnation from Australia's political leaders.
    (Nine News)
