Date: '2017-06-25'
Source_URI: Portal:Current events/2017 June 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Syrian ceasefire line incidents during the Syrian Civil War
  - Israel strikes two Syrian Army artillery positions and an ammunition truck in
    Quneitra Governorate, after stray shells from Syria land in the northern Golan
    Heights for a second day in a row. (Reuters)
  Disasters and accidents:
  - 2017 Bahawalpur explosion
  - Over 150 people die and dozens are injured, many critically, when an oil tanker
    truck overturns and explodes as people from surrounding villages gather around
    the truck to collect the spilling oil. The accident happened in Bahawalpur, eastern
    Pakistan. (BBC) (AP) (CNN) (India Times)
  - 2017 Newcastle incident
  - Six people are injured after a car ploughs into Eid al-Fitr worshippers in Newcastle
    upon Tyne, England. Police do not believe terrorism is involved. (CNN) (The New
    York Times)
  - Aftermath of the Grenfell Tower fire
  - External cladding samples from 60 high-rise apartment towers, from 25 different
    areas of the country, fail fire-resistance testing. Evacuation of thousands of
    apartments is underway as workers start to remove the deficient covering. (National
    Post) (Liverpool Echo)
  - Maritime incidents in 2017
  - At least nine people are killed and about 30 others are missing after their multi-story
    tourist boat, carrying about 170 people, sinks in a reservoir in northwest Colombia
    near Medellín. (The Guardian) (The Washington Post)
  International relations:
  - 2017 Qatar diplomatic crisis
  - The Bahrain News Agency publishes an official list of the demands from Saudi Arabia,
    Bahrain, the United Arab Emirates and Egypt towards Qatar. Turkey says the demands
    on Qatar are unlawful. (Al Arabiya) (Reuters)
  Politics and elections:
  - Albanian parliamentary election, 2017
  - Voters in Albania go to the polls in an election important to the country's European
    Union candidacy, with both the ruling Socialist Party and the rival Democratic
    Party looking to gain a majority in the country's parliament. Voting is extended
    by one hour because of Eid al-Fitr celebrations and 39°C (102°F) degree temperatures.
    (Radio Free Europe/Radio Liberty) (ABC News)
  - Politics of Syria
  - In the first declared visit to the town since the beginning of the war, President
    Bashar al-Assad attends the Eid al-Fitr prayer in Hama. (Reuters)
  Sports:
  - EuroBasket Women 2017
  - In basketball, Spain defeats France 71–55 in the final to win the EuroBasket Women
    2017. (USA Today)
