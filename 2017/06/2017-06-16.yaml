Date: '2017-06-16'
Source_URI: Portal:Current events/2017 June 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - June 2017 Jerusalem attack
  - In two simultaneous attacks near the Damascus Gate in Jerusalem, an Israeli policewoman
    is fatally stabbed; the three Palestinian assailants are shot dead. ISIL claims
    were questioned by Israeli authorities. As well, the PFLP and Hamas claim it was
    their members who did it. (Reuters)
  - Russian military intervention in the Syrian Civil War
  - The Russian Ministry of Defence says its forces may have killed ISIL's leader
    Abu Bakr al-Baghdadi in an airstrike, south of Raqqa on 28 May, and currently
    is seeking confirmation. (The Independent)
  Business and economy:
  - Whole Foods Market
  - Amazon agrees to buy Whole Foods Market for $13.7 billion. The takeover deal is
    expected to be completed in the second half of the year. (BBC)
  International relations:
  - Russia–United States relations, Iran–United States relations
  - The United States Senate passed by an overwhelming majority a bill ramping-up
    sanctions against Russia and against Iran. Language in the measure also reaffirms
    United States' commitment to NATO. (The Washington Post)
  - Djibouti–Eritrea relations
  - Djiboutian foreign minister Mahamoud Ali Youssouf accuses Eritrea of occupying
    the disputed Doumeira Islands and Ras Doumeira peninsula after Qatari peacekeepers
    withdrew from the area. (Al Jazeera)
  - Cuba–United States relations
  - U.S. President Donald Trump announces new restrictions on travel and business
    with Cuba, reversing policies of Cuban Thaw, implemented during the tenure of
    President Barack Obama. (CNN)
  Law and crime:
  - Shooting of Philando Castile
  - Jeronimo Yanez, the police officer previously accused of manslaughter and reckless
    discharge of a firearm at Philando Castile, is acquitted of all charges. (NBC
    News)
  Music:
  - Lorde - Melodrama
  Politics and elections:
  - Politics of Germany
  - Former German Chancellor Helmut Kohl dies at the age of 87. (BBC)
  - Business career of Donald Trump
  - The U.S. Office of Government Ethics certifies President Donald Trump's financial
    report which discloses over $315.6 million in personal liabilities and exceeding
    $1.4 billion in assets as of mid-2017, for revenues of more than $594 million
    over 2016 and early 2017. (Reuters)
