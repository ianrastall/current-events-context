Date: '2017-06-29'
Source_URI: Portal:Current events/2017 June 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Créteil mosque incident
  - A man attempts to run over pedestrians outside a mosque in Créteil, France. (BBC)
  - Military intervention against ISIS
  - Battle of Mosul
  - Iraq Prime Minister Haider al-Abadi declares the end of the Islamic State's self-declared
    caliphate following the capture of the Great Mosque of al-Nuri in Mosul. (NBC
    News) (Xinhua News Agency)
  - RAMSI
  - A farewell ceremony in Honiara ends the 14 year RAMSI mission in the Solomon Islands.
    (Radio New Zealand International)
  Disasters and accidents:
  - Charra Pani cable car accident
  - At least twelve people die and two others are injured after a cable car falls
    nearly 500 feet into a ditch in Charra Pani, Galyat, Pakistan. (Pakistan Point
    News)
  International relations:
  - Australia–United States relations
  - Australia and the United States begin their month-long biennial joint military
    exercise, Talisman Saber, this year's being their largest ever, involving 33,000
    U.S. and Australian troops on board amphibious assault ships. (Reuters)
  - Taiwan–United States relations
  - The United States plans to sell Taiwan $1.42 billion in arms, the first such sale
    under the administration of Donald Trump. (Reuters)
  - Bhutan–China relations, China–India relations
  - Amid a stand-off between China and India in the Indian state of Sikkim, Bhutan
    protests to China over the construction of a road in the disputed territory of
    Doklam, a meeting point for all three countries' borders. (The Straits Times)
  Law and crime:
  - Recognition of same-sex unions in Germany
  - German same-sex couples may be able to marry after Chancellor Angela Merkel drops
    her opposition for a parliamentary vote. (BBC)
  - Crime in Argentina
  - A car knocks down the security fences of the Pink House, the Presidential Palace
    of Argentina, and then stops in front of the building's gate. The authorities
    reported that the driver of the vehicle had psychiatric disorders and that, in
    addition, the security personnel present at the time of the incident was separated
    from his position. It was also learned that this fact took place on 21 June. (El
    Universo) (Infobae)
  - Child sexual abuse in Australia
  - Victoria Police charge Cardinal George Pell, the Prefect of the Secretariat for
    the Economy, and the third most senior official of the Catholic Church, with historic
    child sex offences. Pell will be required to attend hearings at the Melbourne
    Magistrates Court in Australia on July 19. (ABC News Australia)
  - The Catholic Archdiocese of Sydney says Cardinal Pell "strenuously denies" these
    sexual assault charges. (Reuters)
  - Aftermath of the assassination of Boris Nemtsov
  - A jury trial convicts five individuals accused of working together to assassinate
    Boris Nemtsov. These individuals had been promised a bounty of 15 million Russian
    rubles. Critics say the original financiers and organizers of the crime have not
    been identified. (Reuters)
  Politics and elections:
  - Gun laws in the Czech Republic
  - The Chamber of Deputies of the Czech Republic passes a Czech Social Democratic
    Party-proposed amendment to the constitution, giving citizens the right to acquire,
    possess and carry firearms for the purpose of security. The constitutional amendment
    will now go to the Senate, where it is expected to pass. (BBC)
  - Politics of the United Kingdom
  - After six days of debate, the House of Commons of the United Kingdom votes to
    approve, with 323 votes for and 309 against, the policies set out in the Queen's
    Speech. In order to avoid a 'regret' amendment, Chancellor of the Exchequer Philip
    Hammond says that England's National Health Service is to provide free abortions
    to women from Northern Ireland with funds from the Government Equalities Office.
    (The Daily Mirror)
  - Politics of Hong Kong
  - Protests mark the 20th anniversary of the transfer of sovereignty over Hong Kong
    to China from the United Kingdom alongside the arrival of China's paramount leader
    Xi Jinping. (Hong Kong Free Press)
  Science and technology:
  - 2017 in spaceflight
  - ISRO launches communications satellite GSAT-17 from French Guiana. (The Indian
    Express)
