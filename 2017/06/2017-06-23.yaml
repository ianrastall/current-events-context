Date: '2017-06-23'
Source_URI: Portal:Current events/2017 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - June 2017 Pakistan bombings
  - Multiple blasts occur at a market in Parachinar, killing at least 37 people and
    wounding over 150 more. (Radio Free Europe/Radio Liberty) (Al Jazeera)
  - A suicide car bombing at a police checkpoint in Quetta kills at least 13 people.
    (Al Jazeera)
  Disasters and incidents:
  - Akyazı electrocution incident
  - Five people are killed after being electrocuted at a water park in Akyazı, Turkey.
    (BBC)
  - Aftermath of the Grenfell Tower fire
  - All 800 homes in the five tower blocks of the Chalcots Estate, in Camden, London,
    are evacuated after the cladding was declared to have failed fire safety tests.
    (Sky News)
  Law and crime:
  - Human trafficking in Belgium
  - A Belgian court condemns a United Arab Emirates princess and her seven daughters
    to a fine and a suspended sentence, for human trafficking and mistreatment of
    their servants at a Brussels luxury hotel in 2008. (Minneapolis Star Tribune)
  - Aftermath of the shooting of Samuel DuBose
  - For the second time, a mistrial is declared in the case against officer Ray Tensing
    for the fatal shooting of Samuel DuBose during a traffic stop. (New York Times)
  - Guantanamo military commission
  - A Guantanamo military commission charges detainee Riduan Isamuddin for his roles
    in the 2002 Bali bombings and the 2003 Marriott Hotel bombing. The Pentagon is
    yet to decide whether to threaten capital punishment. (Miami Herald)
  Politics and elections:
  - Russian presidential election, 2018
  - Russian opposition leader Alexei Navalny is formally barred by the Central Election
    Commission from his running in next year's presidential election. (BBC)
  Science and technology:
  - 2017 in spaceflight
  - ISRO's PSLV-C38 successfully launches Cartosat-2E and 30 other satellites from
    Satish Dhawan Space Centre First Launch Pad in Sriharikota, Andhra Pradesh. (The
    Times of India)
  - SpaceX launches BulgariaSat-1, Bulgaria's first ever geostationary communications
    satellite, from Cape Canaveral Air Force Station on a Falcon 9 Full Thrust rocket,
    which successfully lands on an autonomous spaceport drone ship in the Atlantic
    Ocean. (Orlando Sentinel)
  - Creation–evolution controversy
  - Turkey decides to stop teaching evolution to its students until their university
    level curriculum, deeming it controversial and too complex to understand. Critics
    say this undermines the secular foundation of the Turkish state. (Reuters)
  Sports:
  - 2017 NHL Entry Draft
  - Swiss ice hockey player Nico Hischier is selected first by the New Jersey Devils.
    (CBC)
