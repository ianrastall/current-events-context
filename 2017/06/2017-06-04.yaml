Date: '2017-06-04'
Source_URI: Portal:Current events/2017 June 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 London Bridge attack
  - In the early hours of Sunday morning, explosions are heard around London Bridge,
    believed to be controlled explosions carried out by the police. (Metro)
  - The death toll from the attacks is seven, with at least 48 injured. Officials
    say that the three attackers were killed by the police. (The Washington Post)
    (AP) (BBC)
  - Syrian Civil War
  - The U.S.-backed Syrian Democratic Forces (SDF) take control of the Baath Dam on
    the Euphrates, near the ISIL stronghold of Raqqa, and upon doing so, rename it
    "Freedom Dam". (Reuters)
  - Marawi crisis
  - Citizens remain trapped in Marawi, Philippines, after a ceasefire organised by
    the Moro Islamic Liberation Front (MILF) is broken. Up to 2,000 people remain
    in need of help after nearly two weeks without food. (Al Jazeera)
  - 2017 Resorts World Manila attack
  - The Philippine police identifies the lone gunman as Jessie Javier Carlos, a local
    citizen, who was a debt-riddled former employee of the Department of Finance.
    (Rappler) (Philippine Daily Inquirer)
  Arts and culture:
  - One Love Manchester
  - The charity concert organized by Ariana Grande in the wake of the Manchester Arena
    bombing is held in Manchester, England. (Variety)
  Law and crime:
  - Censorship in Bahrain
  - Bahrain bans the independent Al-Wasat newspaper on grounds that it "sows division"
    in the Shia-majority kingdom. (AFP via Yahoo!)
  Politics and elections:
  - United Kingdom general election, 2017
  - All major parties suspend their campaigns following last night's terror attack
    in London. The general election, scheduled for June 8, is not expected to be postponed.
    (The Independent)
  - Maltese general election, 2017
  - Simon Busuttil of Forza Nazzjonali concedes defeat to the incumbent Joseph Muscat
    and his Labour Party, who are projected to win 54.9% of the popular vote. (Times
    of Malta)
  - Cambodian communal elections, 2017
  - Voters cast ballots to select representatives for rural and urban Cambodian precincts
    from, nationwide, 94,595 candidates for 11,572 council seats. Voter turnout was
    85.74 percent with few reports of irregularities. According to early results,
    the opposition makes significant gains against the ruling party of Prime Minister
    Hun Sen. (Radio Free Asia) (Channel NewsAsia) (Reuters)
