Date: '2017-06-07'
Source_URI: Portal:Current events/2017 June 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2017 Tehran attacks
  - Gunmen attack the Islamic Consultative Assembly and Mausoleum of Ruhollah Khomeini
    in Tehran, Iran. Eighteen civilians are killed in the attack on the Parliament
    and one in the attack on the mausoleum. (Reuters via The Canberra Times) (AP)
  - The Islamic State of Iraq and the Levant (ISIL) claims responsibility for the
    shootings. (The Telegraph)
  Business and economy:
  - Economy of South Africa
  - The giant South Africa based cement company, PPC Ltd., presents its first quarter
    results, dominated by the "impact of a liquidity crisis precipitated by an unexpected
    S&P debt downgrade." (Reuters)
  - 2017 Qatar diplomatic crisis
  - The Philippines partially lifts a temporary suspension of deployment of overseas
    workers to Qatar. (GMA News)
  Disasters and accidents:
  - 2017 Myanmar Air Force Shaanxi Y-8 crash
  - A military aircraft with 120 people onboard crashes into the Andaman Sea off the
    coast of Myanmar. (The Independent) (Metro)
  Law and crime:
  - Crime in London
  - A childcare worker in London is reportedly stabbed by three Muslim women while
    on her way to work, suffering non life threatening injuries. (BBC News)
  Politics and elections:
  - Political appointments of Donald Trump
  - United States president Donald Trump announces lawyer Christopher A. Wray as his
    nominee to be director of the Federal Bureau of Investigation. (The New York Times)
  - 2017 clashes at the Turkish Ambassador's Residence in Washington, D.C.
  - A U.S. House resolution unanimously passes 397–0 calling for all Turkish security
    guards involved in the May 16 clashes to be charged and prosecuted under United
    States law. (The New York Times)
  Science and technology:
  - Human evolution fossils
  - The oldest fossil records of Homo sapiens are discovered in Jebel Irhoud, Morocco,
    dated at between 300,000 and 350,000 years old. The earliest Homo sapiens fossils
    had been dated as 200,000 years old. (Washington Post)
