Date: '2017-06-03'
Source_URI: Portal:Current events/2017 June 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - June 2017 Kabul attack
  - According to the Interior Ministry, three blasts at a funeral attended by MPs
    and government figures in Kabul kill at least seven people and wound 119 more.
    (The Guardian)
  - 2017 London Bridge attack
  - A van travelling at approximately per hour ploughs into pedestrians on London
    Bridge; the three occupants then abandon the van and embark on a stabbing spree
    in Borough Market before being shot dead by officers of the Metropolitan Police.
    At least six civilians are killed. (BBC) (CBC)
  Arts and culture:
  - Pope Francis meets with 400 children from towns hit by earthquakes in central
    Italy on August 24, 2016. A few children offer brief testimony about their experiences
    during the earthquake, which hit parts of central Italy and resulted in nearly
    300 deaths. (Catholic News Agency)
  Disasters and accidents:
  - 2017 Turin stampede
  - More than 1,500 people are injured when panic erupts among Juventus fans who are
    watching the 2017 UEFA Champions League Final on Piazza San Carlo in Turin, Italy.
    (BNO News) (AFP)
  Politics and elections:
  - Lesotho general election, 2017
  - Voters in Lesotho go to the polls for an election, with a tight race predicted
    between the Democratic Congress, led by current Prime Minister Pakalitha Mosisili,
    and the All Basotho Convention, led by former prime minister Tom Thabane. (Al
    Jazeera)
  - Maltese general election, 2017
  - Voters in Malta go to the polls for a snap election, with current Prime Minister
    Joseph Muscat and his Labour Party facing off against Forza Nazzjonali, led by
    Simon Busuttil. The election comes amid corruption allegations leveled against
    Muscat's associates. (Reuters)
  - CNN denies authenticity of footage documenting its employees manufacturing a protest
    using unrepresentative Muslim actors. (Washington Times)
  Science and technology:
  - SpaceX CRS-11
  - SpaceX launches a Falcon 9 rocket with a shipment of food and supplies in a refurbished
    Dragon cargo capsule for the International Space Station. The mission reuses a
    Dragon cargo vessel that was previously flown in a September 2014 mission. (Phys.org)
    (Space.com)
  Sports:
  - 2017 UEFA Champions League Final
  - In football, Real Madrid defeats Juventus 4–1. The Spanish team becomes the first
    to win back-to-back titles since the competition became known as the Champions
    League, and to win their 12th title in the competition. (Yahoo!) (Reuters)
  - Alex Honnold climbs El Capitan in Yosemite National Park without ropes becoming
    the first person ever to free solo the route. (National Geographic)
