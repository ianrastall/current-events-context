Date: '2017-06-22'
Source_URI: Portal:Current events/2017 June 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - 2017 Lashkargah bombing
  - A car bomb outside a New Kabul Bank branch in Lashkargah, Helmand Province, kills
    at least 20 people. The Taliban claims responsibility. (CNN)
  Business and economy:
  - Mexico–United States wall
  - United States President Donald Trump plans on adding solar panels to his proposed
    border wall with Mexico. (The Washington Post) (BBC)
  Disasters and accidents:
  - Earthquakes in 2017
  - A 6.8-magnitude earthquake strikes off the coast of Puerto San José, Guatemala.
    (CNN)
  International relations:
  - Chagos Archipelago sovereignty dispute
  - In a vote at the United Nations General Assembly, 94 states support a Mauritius-sponsored
    resolution to seek an advisory opinion from the International Court of Justice
    on the legal status of the disputed Chagos Archipelago. (The Guardian)
  - Chinese espionage in the United States
  - An American who formerly worked for the Central Intelligence Agency is arrested
    on charges of selling classified information to Chinese operatives in May 2017.
    (The Washington Post)
  - Brexit negotiations
  - UK Prime Minister Theresa May announces that citizens of the European Union living
    in the United Kingdom will be able to acquire a "UK settled status" after the
    UK leaves the EU. (BBC)
  Law and crime:
  - Immigration to the United States
  - A judge in Michigan halts the possible deportation of over 100 Chaldean Iraqi
    Christians. (The Hill)
  - Dismissal of James Comey
  - U.S. President Donald Trump clarifies that he did not record any private conversations
    with former FBI Director James Comey. (Chicago Tribune)
  - American Health Care Act of 2017
  - The U.S. Senate releases its version of the American Health Care Act of 2017.
    (New York Times)
  Sports:
  - 2017 NBA draft
  - Markelle Fultz of the University of Washington is selected first by the Philadelphia
    76ers. (ESPN)
  - Test cricket
  - In cricket, the International Cricket Council votes to elevate Afghanistan and
    Ireland to full Test status. The two countries become the 11th and 12th Test nations.
    (ESPNcricinfo)
