Date: '2017-06-20'
Source_URI: Portal:Current events/2017 June 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Military intervention against ISIL
  - The Royal Australian Air Force (RAAF) suspends combat missions against ISIL over
    Syria, following Russia's threat that it would treat any aircraft from the U.S.-led
    coalition flying west of the Euphrates as a potential target. (The Guardian)
  - A U.S. F-15 shoots down an Iranian Shahed 129 drone near the Jordan–Syria border
    where U.S. ground forces are based. (BBC)
  - 2017 Brussels attack
  - A man is shot in Brussels Central Station amid reports of an attempted bombing
    attack. (BBC)
  Arts and culture:
  - Nazi plunder
  - A secret collection of Nazi heritage is found in Argentina. (Reuters)
  Business and economy:
  - Economy of the United States
  - Robert Kaplan, head of the Federal Reserve Bank of Dallas, says that low bond
    yields suggest sluggish growth ahead for the economy of the United States. (Reuters).
  - Uber founder and CEO Travis Kalanick resigns amid pressure from investors due
    to allegations of sexual harassment, gender discrimination, and corporate misconduct
    in the company. (The New York Times)
  Disasters and accidents:
  - A heat wave strikes the Western U.S. states of Arizona, California, and Nevada.
    It is predicted to last until June 23. (CNN)
  - 2017 Atlantic hurricane season
  - Tropical Storm Cindy makes its way towards the eastern coasts of the Southern
    United States. (The Weather Channel)
  - 2017 Portugal wildfires
  - A Canadair firefighting plane reportedly crashes in Pedrógão Grande, central Portugal,
    while tackling raging wildfires. However, this claim has been denied by Portuguese
    authorities. (BBC)
  International relations:
  - North Korea–United States relations
  - Following the death of 22-year-old U.S. student Otto Warmbier, touring firm Young
    Pioneer Tours, who arranged Otto's visit to North Korea, say they will no longer
    be taking U.S. citizens to North Korea as the "risk is too high". Beijing-based
    Koryo Tours say they are reviewing their positions on taking U.S. citizens to
    the country. (The Guardian)
  Law and crime:
  - 2017 Venezuelan protests
  - The Supreme Court paves the way for the prosecution of Prosecutor General Luisa
    Ortega Díaz after she voiced criticism towards President Nicolás Maduro. (The
    Washington Post)
  - LGBT rights in Russia
  - The European Court of Human Rights rules that Russia's gay propaganda law encourages
    homophobia, reinforces prejudice and violates the right to freedom of speech.
    (The Independent)
  Politics and elections:
  - Georgia's 6th congressional district special election, 2017
  - Campaigning ends and voting begins in the suburbs of Atlanta in the U.S. state
    of Georgia between Republican Karen Handel and Democratic Jon Ossoff, where Republican
    Handel wins the election by a narrow margin. (Atlanta Journal Constitution) (The
    New York Times)
  - The amount of money spent for all candidates, $56 million, sets a new record for
    a U.S. House of Representatives seat. The previous record was $29.5 million, set
    in a 2012 Florida race. (Reuters)
  - South Carolina's 5th congressional district special election, 2017
  - Republican Ralph Norman narrowly defeats Democrat Archie Parnell to win a U.S.
    House district in north-central South Carolina. (The New York Times)
