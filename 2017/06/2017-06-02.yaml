Date: '2017-06-02'
Source_URI: Portal:Current events/2017 June 2
Intelligence_Payload:
  Arts and culture:
  - Rock am Ring
  - A terrorist threat results in the evacuation of tens of thousands of fans at the
    first day of the annual Rock am Ring music festival at the Zeppelinfeld in Nuremberg,
    Germany. Organizers say they hope the festival will resume Saturday. (BBC)
  Health and medicine:
  - Health in South Sudan
  - Fifteen young children die of "severe sepsis/toxicity" from contaminated vaccine
    during South Sudan's measles vaccination campaign. In one instance, a syringe
    containing vaccine stored without refrigeration was used for all the children
    over four days. (AP via NBC News)
  International relations:
  - United Nations Security Council election, 2017
  - Equatorial Guinea, Ivory Coast, Kuwait, Peru and Poland are elected to the United
    Nations Security Council for a two-year term beginning on January 1, 2018. (Channel
    NewsAsia)
  - North Korea and weapons of mass destruction
  - As a result of North Korea's repeated missile tests, the United Nations Security
    Council expands its targeted sanctions against the country, adding to the U.N.
    blacklist four entities, including the Koryo Bank and the Army's Strategic Rocket
    Force, and 14 people, including the North's head of intelligence operations. (Reuters)
  - Russia–Turkey relations
  - Russia lifts more trade sanctions it had placed on Turkey following the 2015 downing
    of a Russian fighter jet. (Daily Sabah) (BBC)
  Law and crime:
  - 2017 Resorts World Manila attack
  - At least 37 people are killed in a deliberately lit fire at Resorts World Manila
    in the Philippines. The perpetrator stole gaming chips and fired gun shots before
    committing suicide. (CNN)
  - ISIL claims responsibility for the attack; however, authorities contend it is
    not terror related. (Reuters)
  - War in Afghanistan (2001–2021)
  - Five anti-government/anti-Taliban protestors are shot dead by police in Kabul,
    Afghanistan, after demanding that the government step down in the wake of the
    May 2017 Kabul attack. (BBC)
  - Penn State child sex abuse scandal
  - Former Pennsylvania State University president Graham Spanier, former vice president
    Gary Schultz, and former athletic director Timothy Curley are sentenced to prison
    for covering up ex-coach Jerry Sandusky's criminal sexual acts, thereby letting
    him victimize more boys. (Reuters)
  Politics and elections:
  - United States withdrawal from the Paris Agreement
  - Disney CEO Bob Iger joins Elon Musk in resigning from President Trump's advisory
    councils in response to Trump's decision to withdraw the U.S. from the Paris Agreement.
    (The Independent)
  - Fine Gael leadership election, 2017
  - Leo Varadkar becomes the new party leader of Fine Gael, after winning 51 of 73
    votes in the parliamentary party, and is expected to become Taoiseach (Prime Minister)
    of Ireland, which would make him the youngest and first openly gay man to be Taoiseach,
    as well as being the first of half-Indian descent. (The Sun)
  Science and technology:
  - Moons of Jupiter
  - Two of Jupiter's moons, S/2003 J 18 and S/2011 J 2 are recovered, and a small
    1.5-kilometer outer moon (S/2016 J 1) is discovered, the first moon discovered
    around a major planet in 6 years. (Minor Planet Center)
