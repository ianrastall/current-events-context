Date: '2017-03-06'
Source_URI: Portal:Current events/2017 March 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Internal conflict in Myanmar
  - According to the government of Myanmar, at least 30 people are killed in an attack
    on various police, military, and government installations by the Myanmar National
    Democratic Alliance Army in Laukkai. Four police officers were also taken hostage.
    (Reuters)
  Disasters and accidents:
  - 2016–17 South-West Indian Ocean cyclone season
  - Intense, Category 4 Cyclone Enawo is intensifying, as it closes in on the northern
    tip of Madagascar. (The Weather Channel)
  International relations:
  - North Korea and weapons of mass destruction
  - South Korea claims that North Korea has fired several missiles from the Sohae
    Satellite Launching Station into the Sea of Japan. (Agencies via Channel News
    Asia)
  - According to the Japanese Government, three of them came down in Japan's Exclusive
    Economic Zone. (NPR)
  Politics and Elections:
  - Presidency of Donald Trump
  - U.S. President Donald Trump signs a revised version of Executive Order 13769 eliminating
    Iraq from the order and reducing the indefinite suspension of Syrian refugees
    to 120 days. The order will be in effect on March 16, 2017. (The New York Times)
    (CNN)
  Sports:
  - 2017 World Baseball Classic begins at the Gocheok Sky Dome, Seoul, South Korea,
    as tournament debutant Israel upsets host nation South Korea 2-1 in extra innings.
    (ESPN)
