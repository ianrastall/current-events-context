Date: '2017-03-21'
Source_URI: Portal:Current events/2017 March 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Citing security concerns because of recent terrorist activity, the American and
    British governments impose a ban affecting inbound-passengers flying from much
    of the Middle East and North Africa. The ban includes airplane cabin passenger-accessible
    items such as laptops, tablets, and other electronic devices which are larger
    than a smartphone. Larger such electronic devices will still be allowed on board
    in checked baggage which is thus more closely screened and passenger-inaccessible.
    (CNN) (BBC)
  - War in Somalia
  - A car bomb explodes at a checkpoint near the Villa Somalia, the President of Somalia
    Mohamed Abdullahi Mohamed's official residence in Mogadishu, killing at least
    five people. (The Citizen)
  International relations:
  - Joint Comprehensive Plan of Action
  - Tasnim News Agency reports that, in a Nowruz speech, Supreme Leader of Iran Ali
    Khamenei said experts in his country can enrich uranium to 99 percent. ISNA reports
    that Iranian Foreign Minister Mohammad Javad Zarif is threatening to quit the
    Iran nuclear deal if the United States blocks Iran's version of the deal's implementation.
    (Kleine Zeitung)
  Law and crime:
  - In a 6–2 decision (NLRB v. SW General, Inc), the U.S. Supreme Court puts new restrictions
    on presidential powers, limiting a president's authority to staff certain top
    government posts in a case involving an appointment to the National Labor Relations
    Board saying that under the Federal Vacancies Reform Act, a person cannot serve
    as the acting head of a federal agency once the president nominates him or her
    to permanently serve in the role if it is a position that requires U.S. Senate
    confirmation. The court upholds a lower court's ruling that then-President Barack
    Obama exceeded his legal authority with his temporary appointment of an NLRB general
    counsel in 2011. The ruling will give President Donald Trump and future presidents
    less flexibility in filling jobs that require Senate confirmation. (Reuters)
  Politics and elections:
  - Bruno Le Roux resigns as France's Minister of the Interior amid a jobs scandal
    involving two of his daughters. Using public funds, Bruno had hired his 15 and
    16-year-old daughters as parliamentary assistants while he was serving as a deputy
    in the French National Assembly. (BBC)
  Sports:
  - In International professional baseball
  - The United States defeats Japan 2–1 at Dodger Stadium to advance to the 2017 World
    Baseball Classic's final. This is the first time that the U.S. has done so in
    the tournament's 11-year history. (USA Today)
