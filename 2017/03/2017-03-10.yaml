Date: '2017-03-10'
Source_URI: Portal:Current events/2017 March 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - A Saudi-led coalition airstrike on a market in Al Hudaydah Governorate, Yemen,
    kills at least 20 civilians and six Houthi militants. (AFP via Daily Mail)
  Disasters and accidents:
  - A helicopter crashes in Istanbul's Büyükçekmece district, killing at least seven
    people. (Daily Sabah)
  - 2017 Guatemala orphanage fire
  - The death toll at the fire at an orphanage in San José Pinula, Guatemala, rises
    to at least 35 children. (Reuters)
  International relations:
  - Pope Francis donates 100,000 euros for the poor of Aleppo. (Reuters)
  - Stephen O'Brien, head of the United Nations Office for the Coordination of Humanitarian
    Affairs, reports that the world is experiencing its most severe humanitarian crisis
    since World War II, with over 20 million people suffering from severe lack of
    food security in Yemen, South Sudan, Somalia, and Northeast Nigeria. (BBC)
  Politics and elections:
  - Impeachment of Park Geun-hye
  - South Korea's Constitutional Court upholds the impeachment of President Park Geun-hye,
    removing her from office. Hwang Kyo-ahn assumes powers as Acting President. (Reuters)
  - Subsequent riots in Seoul kill at least three people. (CNN)
  - 2017 dismissal of U.S. attorneys
  - United States Attorney General Jeff Sessions requests the resignations of 46 Barack
    Obama-era chief federal prosecutors, including United States Attorney for the
    Southern District of New York Preet Bharara, who was previously told to stay on
    by then President-elect Donald Trump in November. (Reuters)
