Date: '2017-03-15'
Source_URI: Portal:Current events/2017 March 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli authorities shoot into a car that was on a ramming attack at a bus shelter
    at the Gush Etzion Junction in the West Bank where 13 Palestinians and 3 Israelis
    have been killed since October 2015. A 16-year-old Palestinian, Fatima Jibrin
    Taqatqa, had lost control of her car and the teenager now remains in critical
    condition. (Jewish Press) (Fars)
  - Syrian Civil War
  - According to Syrian state media, two suicide bombers attack in Damascus, killing
    at least 31 people. (The Guardian)
  - A second explosion occurs in the Rabwah area of Damascus. (Al Masdar News)
  - Suspected Russian warplanes carry out airstrikes on the city of Idlib at dawn,
    killing 21 people including at least 14 children. (The New Indian Express)
  - Boko Haram insurgency
  - Four suicide bombers kill at least two people and wound 16 others in Maiduguri,
    Nigeria. (Al Jazeera)
  Disasters and accidents:
  - An avalanche kills four skiers in Tyrol, Austria. (BBC)
  Politics and elections:
  - Dutch general election, 2017
  - Voters in the Netherlands go to the polls for a general election. Exit polls suggest
    that incumbent Prime Minister Mark Rutte's People's Party for Freedom and Democracy
    will win the most seats in the election. (BBC)
  - United States immigration ban
  - A U.S. federal judge in Hawaii, finding the revised federal immigration/refugee
    executive order violates the U.S. Constitution's religious establishment clause,
    grants the state of Hawaii's motion for a nationwide temporary restraining order
    on these rules that were set to become effective at midnight. President Donald
    Trump vows to appeal this ruling. Two other federal courts held hearings on similar
    requests filed by the states of Maryland and Washington; neither of these judges
    issued a ruling. (Reuters) (Honolulu Star-Advertiser)
