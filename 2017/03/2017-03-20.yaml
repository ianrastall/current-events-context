Date: '2017-03-20'
Source_URI: Portal:Current events/2017 March 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - A car bomb in Baghdad's southwestern Hayy Al-A'amel neighborhood kills at least
    23 people, and wounds 45 others. (AP via Fox News)
  - Israeli–Syrian ceasefire line incidents during the Syrian Civil War, March 2017
    Israel–Syria incident
  - The Syrian Army shoots down an Israel Defense Forces (IDF) Skylark drone over
    Syria's Quneitra Governorate. (The Times of Israel)
  Disasters and accidents:
  - A large tree falls into a pool at the base of the Kintampo waterfalls in Ghana,
    killing at least 18 people and injuring 22 others. (Al Jazeera)
  - 2017 South Supreme Airlines Antonov An-26 crash
  - An Antonov An-26 of South Supreme Airlines crashes upon landing at Wau Airport,
    South Sudan, the 43 people on board survived. (The Aviation Herald) (CNN)
  Politics and elections:
  - East Timorese presidential election, 2017
  - Elections are held in East Timor to vote for the nation's 4th President. Francisco
    Guterres, runner-up in the 2007 and 2012 elections, is expected to win due to
    the support of Xanana Gusmão. (The Sydney Morning Herald)
  - Russian interference in the 2016 United States elections
  - The United States House Permanent Select Committee on Intelligence holds a hearing
    about Russian interference in the 2016 election and confirms that there is an
    ongoing investigation into ties between Trump's team and Russia. (The Washington
    Post)
  - Neil Gorsuch Supreme Court nomination
  - The Senate Judiciary Committee begins hearings on the nomination of Judge Neil
    M. Gorsuch to the Supreme Court of the United States. (CNN)
  - Brexit
  - British Prime Minister Theresa May announces that her government will trigger
    article 50, which begins the process of withdrawing from the European Union, on
    March 29. (The Guardian)
