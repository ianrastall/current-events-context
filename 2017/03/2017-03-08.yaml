Date: '2017-03-08'
Source_URI: Portal:Current events/2017 March 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - March 2017 Kabul attack
  - A suicide bomber and unidentified gunmen dressed as doctors attack a military
    hospital in Kabul, killing at least 38 people and wounding dozens more. ISIL claims
    responsibility for the attack. (The Guardian)
  - Iraqi Civil War (2014–2017)
  - At least 21 people are killed after two suicide bombers attack a wedding party
    near Tikrit. (Al Jazeera)
  - Syrian Civil War
  - American-led intervention in Syria
  - The United States Marine Corps' 11th Marine Expeditionary Unit arrives in Syria
    ahead of a Syrian Democratic Forces operation to take control of ISIL's de facto
    capital of Raqqa. (The Washington Post)
  Business and economy:
  - RadioShack files for chapter 11 protection from creditors for the second time
    in two years. (Reuters).
  Disasters and accidents:
  - The gigantic limestone natural arch Azure Window on the Maltese island of Gozo
    collapses due to a storm. (Times of Malta)
  - 2017 Guatemala orphanage fire
  - A fire breaks out at an orphanage in San José Pinula, Guatemala after students
    protesting conditions including alleged sexual and physical abuse set fire to
    their bedding, killing at least 19 children. (BBC)
  Law and crime:
  - Abdellatif Midras, a member of the Moroccan Parliament, is shot dead in Casablanca.
    (Reuters)
  Politics and elections:
  - The Day Without a Woman general strike occurs. (The Verge)
  Science and technology:
  - Timeline of Mars exploration
  - U.S. Congress passes a bill that mandates NASA send humans to Mars by 2033. (Business
    Insider) (Gizmodo)
  - Physicists synthesize space-time crystals for the first time. (Live Science) (Nature)
  Sports:
  - 2016–17 UEFA Champions League
  - In association football, FC Barcelona becomes the first team to overturn a first-leg
    4–0 deficit in the UEFA Champions League as they knocked out Paris Saint-Germain
    with a 6–1 victory in the second leg to reach the quarter-finals for the 10th
    successive season. (BBC)
