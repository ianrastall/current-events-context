Date: '2017-03-07'
Source_URI: Portal:Current events/2017 March 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Syrian Army captures at least 23 villages in North East Aleppo Governorate
    from ISIL in a matter of hours after an ISIL withdrawal caused by the SAA capturing
    Al-Khafsah. (Al Masdar News)
  - Iraqi Civil War (2014–2017)
  - Battle of Mosul (2016–2017)
  - The Iraqi Army retakes Mosul Museum as well as the main government building in
    Mosul. (Reuters)
  Disasters and accidents:
  - 2016–17 South-West Indian Ocean cyclone season
  - Cyclone Enawo makes landfall in Madagascar as a powerful Category 4 storm, making
    it the most powerful storm to strike the African nation in 13 years. (The Weather
    Channel)
  - Dozens of tornadoes spawned by thunderstorms touch down in the American Midwest,
    damaging or destroying numerous homes and businesses and causing some injuries.
    The Johnson County Executive Airport in Olathe, Kansas is closed following heavy
    damage caused by the severe weather. (ABC News)
  - A CSX Transportation freight train collides with a charter bus in Biloxi, Mississippi,
    killing at least four people and leaving dozens injured. (Fox News)
  - 2016-2017 Cook Inlet natural gas leak
  - An investigation by the United States Department of Transportation's Pipeline
    and Hazardous Materials Safety Administration finds that the natural gas leak
    occurring in Alaska's Cook Inlet began earlier than first reported, and represents
    significant safety and environmental risks. The agency gives pipeline operator
    Hilcorp Energy until May 1, 2017 to fix the leak, or shut the pipeline down. (KTUU-TV)
  International relations:
  - Malaysia–North Korea relations
  - North Korea temporarily bans all Malaysian nationals (estimated to be at least
    11 people including embassy employees) from leaving the country amid a growing
    dispute between the two countries over the death of Kim Jong-nam, the half-brother
    of Kim Jong-un. Malaysian official Khairy Jamaluddin calls the move "tantamount
    to taking hostages". (BBC) (Channel News Asia)
  - South Korea–United States relations
  - The United States begins deploying the Terminal High Altitude Area Defense (THAAD)
    missile defense system in South Korea. (BBC)
  Law and crime:
  - Vault 7
  - WikiLeaks releases thousands of documents that it claims provides details of surveillance
    software used by the United States Central Intelligence Agency. (The New York
    Times)
  Politics and elections:
  - European migrant crisis
  - The National Assembly of Hungary approves the automatic detention of all asylum
    seekers who enter the country. (BBC)
