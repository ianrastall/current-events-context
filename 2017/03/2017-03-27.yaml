Date: '2017-03-27'
Source_URI: Portal:Current events/2017 March 27
Intelligence_Payload:
  Arts and culture:
  - The Big Maple Leaf, a solid gold 1 million dollar Canadian coin weighing , is
    stolen from the Bode Museum in Berlin, Germany. (CBC)
  Disasters and accidents:
  - An avalanche on Mount Nasu in Japan's Tochigi Prefecture, kills at least eight
    schoolchildren while the students were on a mountaineering excursion. There are
    three students and three teachers missing. (AFP via Channel News Asia) (CNN)
  - 2016–17 Australian region cyclone season
  - More than 25,000 people are evacuated from the city of Mackay, Queensland, ahead
    of Cyclone Debbie which is expected to make landfall in northern Queensland tomorrow.
    The Australian Bureau of Meteorology warns that Cyclone Debbie will be the worst
    storm to hit Queensland since Cyclone Yasi in 2011. (ABC)
  Politics and elections:
  - Bulgarian parliamentary election, 2017
  - Official results of yesterday's election are released today. An exit poll showed
    the centre-right GERB winning the most votes. (Yahoo! News)
  - Northern Ireland Assembly election, 2017
  - The deadline for the Government formation in Northern Ireland has expired following
    the refusal of the Democratic Unionist Party and Sinn Féin to enter a power sharing
    agreement with each other, with both parties blaming each other for the impasse.
    (BBC)
  Science and technology:
  - The U.S. FDA approves Tesaro's ovarian cancer drug, Niraparib. (Reuters)
  Sports:
  - The National Football League (NFL) owners approve, by a 31–1 vote, the move of
    the Oakland Raiders to Las Vegas, Nevada, for the 2019 or 2020 season. The Las
    Vegas Raiders will become the second top-level professional sports franchise in
    the city, following the National Hockey League's Vegas Golden Knights, which will
    begin play in October 2017. The move now awaits completion of a new Raiders stadium,
    until which time the Raiders will continue playing home games in Oakland. Bank
    of America has issued the Raiders $650 million in credit to purchase land and
    build the new stadium in Clark County. (NBC Sports) (The Washington Post)
