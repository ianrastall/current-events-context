Date: '2017-03-26'
Source_URI: Portal:Current events/2017 March 26
Intelligence_Payload:
  Disasters and accidents:
  - A Ukrainian military Mi-2 transport helicopter crashes after hitting a power line
    near Kramatorsk, Donetsk Oblast, killing all five people aboard. (Reuters)
  Law and crime:
  - A shooting in Cincinnati, Ohio, kills one person and injures fourteen others.
    (CNN)
  - 2017 Russian protests
  - Authorities detain hundreds of people, including Alexei Navalny, at anti-corruption
    protests across Russia. (Reuters) (Reuters)
  Politics and elections:
  - Bulgarian parliamentary election, 2017
  - Bulgarians vote to elect a new Prime Minister after the resignation of Boyko Borissov.
    Opinion polls predict a close contest between Borissov's centre-right GERB and
    the Socialist Party. (The Economist)
  - Hong Kong Chief Executive election, 2017
  - The Hong Kong Election Committee meets to select a new Chief Executive. Carrie
    Lam becomes the first female Chief Executive. (The Telegraph) (The New York Times)
  - Wallis and Futuna Territorial Assembly election, 2017
  - Voters in Wallis and Futuna re-elect nine members and elect eleven new members
    to the 20-seat Territorial Assembly. (Radio New Zealand International)
  Sports:
  - 2017 NCAA Division I Men's Basketball Tournament
  - The last two places in the Final Four are decided. In the East Region in New York
    City, South Carolina defeats Southeastern Conference foe Florida 77–70 for the
    Gamecocks' first-ever Final Four appearance. (AP via ESPN) In the South Region
    in Memphis, Tennessee, North Carolina defeats Kentucky 75–73, sending the Tar
    Heels to their 20th Final Four. (AP via ESPN)
