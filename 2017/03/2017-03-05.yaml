Date: '2017-03-05'
Source_URI: Portal:Current events/2017 March 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sudanese conflict in South Kordofan and Blue Nile
  - The Sudan People's Liberation Movement-North releases 127 prisoners from captivity,
    mostly troops of the Sudanese military. (Al Jazeera)
  Law and crime:
  - Cannabis in Israel
  - Israel changes its law regarding marijuana use. Instead of facing criminal charges,
    first-time offenders who smoke marijuana in public places will only receive a
    fine. (Haaretz)
  Politics and elections:
  - South Korea announces it will be raising its US$217,000 cash reward for classified
    information from North Korea by defectors to $860,000. (The Guardian)
