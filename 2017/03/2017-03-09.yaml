Date: '2017-03-09'
Source_URI: Portal:Current events/2017 March 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, American-led intervention in Syria
  - According to the Syrian Observatory for Human Rights, multiple suspected U.S.-led
    coalition air raids kill at least 23 civilians in the village of al-Matab in northern
    Syria. (Al Jazeera)
  Arts and culture:
  - German and Egyptian archaeologists uncover a humanoid statue with an approximate
    height of eight metres, believed to be of Ramesses II, at the former site of Heliopolis
    in northeast Cairo. (The Daily Telegraph)
  Disasters and accidents:
  - A motorway bridge near Ancona, Italy, collapses killing two Italians and injuring
    two Romanian workers. The Italian highway agency links the collapse with a temporary
    structure that was designed to support it. (BBC)
  - An overcrowded bus veers off a mountain road in Jajarkot District, Nepal, killing
    at least 24 people. (Al Jazeera)
  Law and crime:
  - 2017 Düsseldorf axe attack
  - An assailant injures seven people, one severely, in an axe attack at the central
    railway station in Düsseldorf, Germany. Police have arrested one suspect. (CNN)
