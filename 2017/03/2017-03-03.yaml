Date: '2017-03-03'
Source_URI: Portal:Current events/2017 March 3
Intelligence_Payload:
  Disasters and accidents:
  - 2015 Shoreham Airshow crash
  - The Air Accidents Investigation Branch determines that a pilot error was the cause
    of the crash. (BBC)
  - 2016–17 Zimbabwe floods
  - Since December, flooding in Zimbabwe has killed 246 people and nearly 2,000 more
    have been left homeless, according to officials. (Al Jazeera)
  - 2016-2017 Cook Inlet natural gas leak
  - A damaged natural gas pipeline operating under Cook Inlet offshore of Nikiski
    (near Anchorage, Alaska) continues releasing between 6,000–8,800 cubic meters
    (210,000–310,000 cubic feet) of gas per day. Pipeline operator Hilcorp Energy
    states that due to sea ice conditions, repairs will not be possible for weeks.
    (Popular Mechanics) (Peninsula Clarion)
  International relations:
  - United States–European Union relations
  - The European Parliament votes to end visa-free travel for United States citizens
    after the U.S. government failed to agree to visa-free travel for citizens of
    five European Union member states, Bulgaria, Croatia, Cyprus, Poland and Romania.
    The resolution is non-binding. (The Independent)
  Law and crime:
  - Bon Secours Mother and Baby Home
  - A mass grave is discovered at a former Catholic orphanage in Tuam, Ireland, containing
    “significant quantities of human remains”, all of them children. It is alleged
    over 800 children died at this orphanage and most were buried in the 1950s. (The
    Guardian)
  - Antisemitism in the United States
  - Juan M. Thompson, a 31-year-old ex-journalist, is arrested and charged with making
    at least eight threats against Jewish Community Centers in the United States,
    as well as a threat made against the Anti-Defamation League, while allegedly impersonating
    a former girlfriend. (BBC)
  Politics and elections:
  - Northern Ireland Assembly election, 2017
  - Mike Nesbitt announces he is standing down as leader of the Ulster Unionist Party
    (UUP) following the party's poor performance in yesterday's Northern Ireland Assembly
    election. (BBC)
  Science and Technology:
  - Nintendo's Switch video game console is released in most regions.
