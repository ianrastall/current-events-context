Date: '2010-12-29'
Source_URI: Portal:Current events/2010 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'South Thailand insurgency: Seven people are injured in a bomb attack in southern
    Thailand by suspected Islamist insurgents. (The Straits Times) (Thai News Agency)'
  - 'Nigerian Sharia conflict: Three people are killed by Islamist group Boko Haram
    in northeastern Nigeria, in the latest in a number of attacks. (Reuters)'
  - 'Mexican Drug War: The Mexican Los Zetas drug cartel threatens to launch a war
    in northern Guatemala where the government declared a "state of siege". (Al Jazeera)'
  - Five suspected Islamist militants are arrested for planning to attack Jyllands-Posten
    newspaper in Denmark. (BBC)
  - The Iraqi cilivian death toll due to violence has fallen to just under 4,000 in
    2010, the lowest since the 2003 invasion of Iraq according to the Iraq Body Count.(Reuters)
  Business and economy:
  - '2010 Tunisian protests: People ignore threats of "firm" punishment from Tunisian
    President Zine El Abidine Ben Ali and continue to protest over unemployment and
    poor living conditions. (Al Jazeera)'
  - The minimum wage in the Chinese capital Beijing is raised by 20% for the second
    time in six months, amid rising food costs. (AFP)
  Disasters and accidents:
  - 12 Vietnamese sailors are missing after a cargo ship sinks in the South China
    Sea. 11 other crew were rescued. (Saigon Daily)
  - An Antonov An-22 cargo plane crashes during training in Russia's Tula region,
    killing 12 crew. (BBC) (Times of India) (RIA Novosti)
  International relations:
  - A proposed draft resolution calling on the United Nations Security Council to
    criticise the construction of settlements by Israel is obtained by the Associated
    Press. (Al Jazeera)
  - An open letter from about 30 rabbi wives causes controversy due to its call for
    Israeli girls not to date Arabs or work in places that employ non-jews, three
    weeks after a similar letter urged Jews not to engage in property trade with non-Jews.
    (CNN) (ABC News Australia)
  - The United States revokes the visa for Bernardo Álvarez Herrera, the Venezuelan
    ambassador to the country. (Al Jazeera)
  - Côte d'Ivoire President Laurent Gbagbo refuses to step down after a meeting with
    other African leaders. (IOL) (AP via Google News)
  - Seven Thais, including a MP, are arrested after illegally crossing the border
    into Cambodia. (The Straits Times) (Taiwan News)
  Law and crime:
  - Cuba commutes the last remaining death sentence on the island. (AFP via Google
    News) (Sify India)
  - A court in Angola sentences Joao Antonio Puati to 24 years imprisonment after
    convicting him in relation to the Togo national football team attack last January.
    (BBC)
  - President of Colombia Juan Manuel Santos announces the death of Pedro Guerrero,
    one of the country's most wanted men who was killed in a gunbattle with police
    while he celebrated Christmas. (BBC)
  Politics and elections:
  - Ikililou Dhoinine is elected president by residents of the Comoros Islands. (BBC)
    (Pretoria News) (Reuters via France24)
  - The Chinese government sets out new measures to tackle corruption. (BBC) (China
    Daily)
  Sport:
  - England retain the Ashes for the first time in 24 years after winning the fourth
    Test of the 2010–11 series against Australia in Melbourne. (BBC)
  - Malaysia wins 2010 AFF Suzuki Cup with a total of 4-2 over Indonesia in the final
    matches. (ABS-CBN)
