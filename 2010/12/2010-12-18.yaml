Date: '2010-12-18'
Source_URI: Portal:Current events/2010 December 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Teams of militants assaulted the Afghan army in the north of the country and in
    the capital, killing at least 16 members of the security forces. (The New York
    Times) (Xinhua)
  - An Israeli air-strike in the Gaza Strip kills five Palestinian militants according
    to Palestinian sources; Israel says they were attempting to fire missiles into
    Israel. (BBC)(CNN)(The Jerusalem Post)
  Business and economy:
  - The United States' unemployment rate rises in 21 states, the highest number to
    report an increase since August. It falls in 15 states. (Washington Times)
  - Bank of America bans Wikileaks payments as a result of news of an upcoming release
    of information on banks in the United States that could leave an impact. (New
    York Post)
  Disasters:
  - At least 30 people drown after a boat capsizes in northeastern Bangladesh. (BBC)
    (Times of India)
  - A Chinese fishing boat capsizes during a scuffle with a South Korean coastguard
    ship, leaving one dead and two missing. (AP) (Channel News Asia)
  - Roads, railways and airports across the United Kingdom are severely affected by
    further heavy snowfall. Severe weather warnings have been issued for many areas.
    (BBC)
  International relations:
  - South Korean military officials say they will proceed with planned live-fire artillery
    drills from an island bombarded by North Korea last month, despite threats of
    retaliation. (VOA) (BBC)
  - Chinese Premier Wen Jiabao arrives for a working visit in Pakistan and meets with
    Pakistani Prime Minister Yusuf Raza Gilani. (The Hindu)
  - Palestinian Prime Minister Salam Fayyad says that there has been a change in the
    Palestinian mindset and they "are fully committed to non-violence". (Jerusalem
    Post)
  - A PRC fishing boat collided with a South Korea coastguard ship causing an incident
    near Eocheong island (Yahoo)
  Ivory Coast crisis:
  - Kenya calls on African nations to oust Ivory Coast incumbent President Laurent
    Gbagbo from office, by force if necessary, if he does not step down. (Al Jazeera)
  - Incumbent President Laurent Gbagbo orders United Nations peacekeepers to leave
    the country. (BBC)
  Law and crime:
  - Nigeria agrees to drop corruption charges against Dick Cheney and Halliburton
    in exchange for a $250 million settlement. (Business Week)
  - Hundreds of people, including nationalists, are arrested in the Russian capital
    Moscow in an attempt to prevent an outbreak of ethnic violence. (Reuters) (RIA
    Novosti)
  - Around 140 prisoners break out of jail in Nuevo Laredo, northern Mexico. (UPI)
  - The United States Senate repeals "Don't Ask Don't Tell" by a vote of 65-35. The
    bill will now be sent to President Barack Obama to be signed. (New York Times)
  - An Italian court grants Amanda Knox a review of the forensic evidence used to
    convict her of the 2007 murder of British student Meredith Kercher. (BBC)
  Politics:
  - The Venezuelan parliament temporarily grants more powers to President Hugo Chávez
    in the wake of recent flooding, allowing him to pass laws by decree without the
    support of the National Assembly.(BBC)
