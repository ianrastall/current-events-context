Date: '2010-12-23'
Source_URI: Portal:Current events/2010 December 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Hundreds of South Korean troops, tanks, helicopters and jet fighters gather 12
    miles from the border with North Korea to stage one of South Korea's largest ever
    live fire military drills in a "show of force" before its neighbour. North Korea
    describes the exercises as "warmongering", and threatens a "sacred war". (BBC)
    (CNN) (Al Jazeera)
  - The United Nations says 173 people have been killed during post-election violence
    in the Ivory Coast. (BBC)
  - Two parcel bombs explode at the Swiss and Chilean embassies in central Rome, Italy.
    One person is seriously injured. Officials suspect that the perpetrators are from
    an Italian anarchist group. (The Australian) (swissinfo.ch) (The Christian Science
    Monitor)
  Arts and culture:
  - A survey indicates that almost one third of Britons believe they have a guardian
    angel. (The Independent) (Daily Mail) (Press Association via Google News)
  Business and economy:
  - China offers to help eurozone countries through the debt crisis. (BBC)
  - Banking giant Santander has admitted that a computer error has resulted in up
    to 35,000 people receiving other person's transactions details on their bank statement.
    (BBC)
  Disasters:
  - At least 20 people are buried by a landslide in the northern Colombian department
    of Santander. (Colombia Reports) (Xinhua)
  International relations:
  - China describes recent criticism of its control on the Catholic Church by the
    Vatican as "imprudent and ungrounded". (Times of India) (New York Times)
  - British MPs express concerns over whether the UK is "getting value for money"
    from its spending on education aid money in Africa. (BBC)
  Law and crime:
  - A court in Nice fines a male Algerian after convicting him of having insulted
    the French national flag last Tuesday. It is the first such penalty of its kind.
    (BBC)
  Politics:
  - A man jumps from the balcony of the parliament building in Romania in protest
    at spending cuts. (euronews) (People's Daily)
  - The Greek Parliament approves sweeping cuts in its budget; some Greeks disagree
    and protest. (BBC)
  - The Daily Telegraph publishes further details of taped conversations with Liberal
    Democrat MPs, which include comments that British Prime Minister David Cameron
    cannot be trusted and Chancellor George Osborne has "a capacity to get up one's
    nose". (BBC)
  - Citizenship and Immigration Canada cuts funding for settlement centres across
    the country, leading to the Ontario Liberals protesting the decision that will
    affect many new immigrants in the province. Immigration minister Jason Kenney
    also affirms that Santa Claus is Canadian, referring to his characteristic red
    and white colours. (Globe and Mail) (CTV) (Toronto Star) (National Post) (Calgary
    Herald)
  - Former MSP Tommy Sheridan is convicted of perjury following a 12-week trial at
    the High Court in Glasgow. He was found guilty of lying during his successful
    defamation case against the News of the World which had printed details of his
    private life. (BBC)
  - The New Zealand military releases formerly classified files regarding possible
    UFO sightings. (The Associated Press) (LF Press) (Hawke's Bay Today)
