Date: '2010-12-01'
Source_URI: Portal:Current events/2010 December 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two villagers and 10 Naxalites are killed in firing between a group of criminals
    and Maoists in Munger, India. (PTI)
  Arts and culture:
  - Two walls collapse at the ancient Roman city of Pompeii during heavy rains, the
    third such incident in a month. (BBC) (Adnkronos)
  Business and economy:
  - Russia’s Gazprom and Ukraine’s Naftogaz Ukrainy have agreed to set up two joint
    ventures, the Russian company said after a meeting between its CEO Alexei Miller
    and Ukrainian Fuel and Energy Minister Yuri Boiko. (ITAR)
  Disasters:
  - 21 people are killed and several states declare a state of emergency after torrential
    rains in Venezuela. (El Universal) (AP)
  - At the 2010 United Nations Climate Change Conference, Google unveils an initiative
    using Google Earth allowing users to view the effects of deforestation, impacts
    and videos on global warming and climate change. (Voice of America) (Reuters)
    (The Huffington Post)
  International relations:
  - Kazakhstan hosts its first OSCE summit in a decade. (AFP) (euronews)
  - South Korea states that it will hold more military exercises with the United States
    following the conclusion of a naval exercise in the Yellow Sea, despite threats
    from North Korea. (BBC)
  - Israel reveals plans to build 625 more homes in the Palestinian territories, close
    to East Jerusalem. (Reuters)
  Law and crime:
  - Japanese police arrest a leading mob figure, Tadashi Irie, third-in-command of
    the Yamaguchi-gumi. (UPI)
  - Iran executes Shahla Jahed by hanging eight years after she was sentenced to death
    for murdering the wife of footballer Nasser Mohammadkhani, her husband under a
    temporary marriage. (BBC)
  - A US army medic receives 9 months in jail after pleading guilty to shooting two
    unarmed Afghan farmers for "no apparent reason". (Reuters)
  Politics:
  - The opposition Muslim Brotherhood and Wafd parties withdraw from the Egyptian
    parliamentary election, after the ruling National Democratic Party wins 97% of
    the seats in the first round last weekend. (Al Jazeera) (The Guardian)
  - The results of the Afghan parliamentary election are finally announced. (New York
    Times)
  - Rob Ford becomes mayor of Toronto. (Toronto Sun) (CBC)
  Sport:
  - The Football Association will investigate crowd violence at an English League
    Cup quarter-final fixture between Birmingham City FC and local rivals Aston Villa
    FC. (The Telegraph)
