Date: '2010-12-20'
Source_URI: Portal:Current events/2010 December 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - 7 people are killed in a roadside bomb and shooting incident in the Somali capital
    Mogadishu. (Reuters)
  - A bomb exploded at a downtown bus station in Kenya's capital as passengers boarded
    a bus, killing at least one person and wounding up to 39 others, police said.
    Suspicions centered on a Somali militant group. (News 13)
  - The Republic of Korea Marine Corps holds live-fire drill exercises on Yeonpyeong
    Island. North Korea says it will not retaliate. (Yonhap) (BBC) (Xinhua)
  - 13 Afghan soldiers were killed in two separate suicide attacks launched by Taliban
    in the capital city of Afghanistan. (TRT)
  Arts and culture:
  - Pope Benedict XVI discusses sexual abuse of children by priests while dining with
    cardinals and bishops at his traditional Christmas audience. (BBC) (The China
    Post) (AFP via Philippine Daily Inquirer)
  Business and economy:
  - Social network chief Mark Zuckerberg is photographed meeting CEO of Chinese search
    engine Baidu Robin Li, in Beijing, China. (Guardian) (Vancouver Sun) (AP via CBS
    News) (Inquirer via AFP)
  - The European Central Bank worries about its ability to provide further financial
    assistance to eurozone members due to flawed legislation. (BBC)
  - Heathrow Airport in London reopens after a weekend of heavy snowfall. (Al Jazeera)
  - GM completes $2.1 billion purchase of stock held by U.S. Treasury. (Business Today)
  Disasters:
  - Estimates of the death toll resulting from the boat disaster off Christmas Island
    rise as high as 48. (ABC News Australia)
  - At least 26 people are killed and several others are injured when a bus carrying
    tourists from Thailand overturns in Malaysia. (Bernama) (Thai News Agency)
  - Three people were killed and 23 wounded in a bomb attack on a bus in central Nairobi,
    Kenya. (AFP via Sydney Daily Telegraph)
  - A 6.5 magnitude earthquake hits southeastern Iran, near Bam with at least eleven
    people dead and hundreds injured. (Herald Sun), (CNN) (Los Angeles Times)
  International relations:
  - President of Russia Dmitry Medvedev sets off for India for a two-day official
    visit to sign trade deals. (BBC)
  - North Korea agrees with United States troubleshooter Bill Richardson to permit
    the return of United Nations nuclear inspectors. (AFP via The Australian)
  - Israel orders all of their foreign envoys to thwart Palestinian attempts to draft
    a UN resolution with the aims of recognition of Palestinian and to pressure Israel
    to stop settling its citizens within Palestine. (Haaretz)
  - Russia warns the U.S. that a renegotiation of the Start treaty may lead to the
    pact's destruction. (BBC)
  - Egypt uncovers an alleged Israeli spy-ring, charging one Egyptian business man
    and two Israelis with attempting to recruit agents to spy for Israel. (BBC)
  Law and crime:
  - Indonesia jails six people on terrorism charges for involvement with the "Al-Qaeda
    in Aceh" group. (Jakarta Globe) (The Straits Times)
  - David Paterson, Governor of New York, is fined $62,125 for accepting free gifts
    from a registered lobbyist—the New York Yankees. (Reuters)
  - Iranian director Jafar Panahi is sentenced to six years imprisonment for making
    a film "against the regime." (Time)
  Politics and elections:
  - Ukrainian opposition leader Yulia Tymoshenko is charged with misusing state funds
    while serving as Prime Minister. (Ukrainian News Agency) (BBC)
  - President of Belarus Alexander Lukashenko claims victory in the presidential election
    with 79% of the vote. Hundreds of people who protested the vote are arrested.
    (BBC) (CNN)
  - Mexican politician Diego Fernandez de Cevallos is released by his kidnappers seven
    months after being abducted. (BBC)
  Science and technology:
  - 1,200 new species and varieties of sea creatures discovered during the first world
    survey of marine life are presented at a conference in Jerusalem, Israel. (Israel
    21C) (The Jerusalem Post)
  Sport:
  - Samuel Eto'o sets a new landmark for individual success in African football after
    winning Footballer of the Year for the fourth time. (The Irish Times)
