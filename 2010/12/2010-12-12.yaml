Date: '2010-12-12'
Source_URI: Portal:Current events/2010 December 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomber in the Iraqi city of Ramadi in western Anbar province kills several
    people. (Al Jazeera)
  Disasters:
  - A large storm hits the Eastern Mediterranean region, resulting in deaths in several
    countries. (Al Jazeera) (BBC)
  - A heavy blizzard in the midwestern US states of Minnesota, Wisconsin, Iowa, Illinois
    and Michigan dropping about three feet of snow results in two deaths, road closures,
    flight cancellations and the inflatable roof of the Hubert H. Humphrey Metrodome
    in Minneapolis, Minnesota, collapsing. (USA Today), (AP via Courier-Journal)
  International relations:
  - Newly released cables from Australian intelligence show the intelligence assessment
    that charges of sodomy laid against Malaysian opposition leader Anwar Ibrahim
    are due to a "set up job" that he "walked into". Others refer to Malaysia as a
    "confused and dangerous" state, Thai politicians as corrupt and Crown Prince Maha
    Vajiralongkorn as "very erratic and easily subject to influence", and Japan as
    a "big fat loser". (The Sydney Morning Herald)
  Law and crime:
  - Julian Assange's lawyer says American spying charges against her client are "imminent"
    despite seeming to have committed no crime in the country. She also reports that
    he is detained in solitary confinement with restricted access to lawyers. (The
    Times of India)
  Politics and elections:
  - Incumbent Ivory Coast President Laurent Gbagbo accuses foreign envoys of seeking
    to turn the military against him. (AFP)
  - Hundreds of people participate in two separate rallies in Moscow, Russia, calling
    for the resignation of Prime Minister Vladimir Putin and protesting constitutional
    abuses, and the second demanding greater rights for ethnic Russians. (PA) (RIA
    Novosti)
  - A parliamentary election takes place in Kosovo, with exit polls indicating that
    Prime Minister Hashim Thaçi has won the vote. (BBC) (Reuters)
  - One person is killed in clashes between demonstrating garment workers demanding
    higher pay, and police in Bangladesh. (CBC) (BD News 24)
  - Keith Brown is appointed as Scottish Transport Minister following yesterday's
    resignation of Stewart Stevenson. (BBC)
  - Thousands of people protest in Cairo over the outcome of the recent Egyptian parliamentary
    elections. (ABC News)
