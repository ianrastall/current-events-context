Date: '2010-11-27'
Source_URI: Portal:Current events/2010 November 27
Intelligence_Payload:
  Disasters and accidents:
  - Seven people are killed after steel box girders used for building an overpass
    overturn in Nanjing, China. (Xinhua via Shanghai Daily)
  - Christians flee from their homes in Saeedabad, Karachi, following violence sparked
    by a Muslim-Christian marriage. (Daily India)
  International relations:
  - A senior United Nations official, Vijay Nambiar, meets with Burmese opposition
    leader Aung San Suu Kyi in Yangon. (Al Jazeera) (The Irrawaddy) (Reuters)
  Shelling of Yeonpyeong:
  - North Korea accuses South Korea of using "human shields" during the incident.
    (BBC)
  - International diplomats work to ease hostilities in the Korean Peninsula, after
    North Korea warned of unpredictable "consequences" if the United States deploys
    an aircraft carrier to the Yellow Sea. (CNN) (Voice of Russia)
  Law and crime:
  - Somali-born teenager Mohamed Osman Mohamud is arrested in Portland, Oregon, for
    allegedly plotting a bombing attack on a Christmas tree lighting ceremony. (BBC)
  - At least three people die in protests in the Ivory Coast over a curfew imposed
    ahead of the second round of the Ivorian presidential election. (BBC)
  - Hundreds of Pakistani Muslims demonstrate in Lahore against a potential pardon
    for a Christian woman sentenced to death for blasphemy against Islam. (news.com.au)
  Politics and elections:
  - Côte d'Ivoire President Laurent Gbagbo declares a curfew, amid clashes that killed
    three people ahead of the second round of the presidential election on Sunday.
    (Channel News Asia) (IOL)
  - Two Japanese ministers are censured by the House of Councillors over a territorial
    dispute with China. (Straits Times)
  - Voters in the Australian state of Victoria go to the polls for the state election.
    (ABC News)
  - Ed Miliband launches a two-year review of British Labour Party policy, saying
    that the Party must move beyond New Labour and calling on activists to make it
    the "People's Party" again. (BBC)
  - Tens of thousands of people march through Dublin in protest at the Irish government's
    austerity measures. (BBC)
  - Icelanders vote for the creators of a new constitution. (AP via MSNBC)
