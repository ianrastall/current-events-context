Date: '2010-11-06'
Source_URI: Portal:Current events/2010 November 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - The United Nations says that more than 650 women and children have been detained,
    tortured and sexually abused during mass evictions from Angola to the Democratic
    Republic of the Congo. (Al Jazeera)
  - 27 people are killed in various arson incidents in Karachi, capital of Pakistan's
    Sindh province. (The Deccan Chronicle) (Dawn)
  - In response to militants firing rockets into southern Israel, the Israel Air Force
    launches two raids on the southern Gaza Strip; one Palestinian is wounded. (France24)
    (Ynet)
  - Car bombs injure at least 37 people in the Iraqi cities of Baghdad and Kirkuk.
    (CNN)
  - Somali pirates receive a record £7.6m in ransoms for seized South Korean and Singaporean
    ships. (BBC) (Al Jazeera)
  - Armenia and Azerbaijan exchange the bodies of deceased soldiers and a civilian
    under the auspices of the International Committee of the Red Cross. (Xinhua)
  Arts and culture:
  - The House of the Gladiators in the ancient Roman city of Pompeii collapses, prompting
    criticism of the Italian government's "neglect" of the site. (AP via Washington
    Post)
  - Chinese artist Ai Weiwei claims that he has been placed under house arrest to
    stop him organising a demolition party to observe the destruction of his studio.
    (BBC) (CNN)
  - Christ the King, the world's biggest statue of Jesus, is completed in Świebodzin,
    Poland (AP)
  Disasters and accidents:
  - The death toll from the Haiti cholera outbreak rises to 500. (AFP)
  - At least 19 people are killed in a fire at a shopping mall in northeast China's
    Jilin City. (Times of India) (BBC)
  - 2010 eruption of Mount Merapi
  - Lava and ash spew from Mount Merapi in Central Java province in Indonesia before
    dawn as the death toll rises to 120. (The Guardian) (AFP via Yahoo! News)
  - Tropical Storm Tomas heads for the Turks and Caicos Islands after killing seven
    people in Haiti. (The Telegraph)
  International relations:
  - US President Barack Obama arrives in India on the first leg of an Asian tour aimed
    at boosting United States exports. (BBC) (Times of India)
  - Finance Ministers from the Asia-Pacific Economic Cooperation meet in Tokyo, Japan.
    (Reuters)
  - Pope Benedict XVI begins a visit to Spain at Santiago de Compostela. (BBC)
  Law and crime:
  - The jury in the Petit family home invasion murder trial continues to deliberate
    whether murderer Steven Hayes should receive the death penalty or life imprisonment.
    (Fox News)
  - Prominent Russian journalist Oleg Kashin for the Kommersant newspaper is attacked
    outside his home in Moscow. (Reuters) (RIA Novosti)
  - Three Northern Ireland police officers are injured after a bomb is thrown at them
    while investigating a robbery in West Belfast. (BBC)
  - A judge in Yemen orders the capture of militant Islamic cleric Anwar al-Awlaki
    to face charges of "forming an armed gang". (CNN)
  - Armed attackers attempt to carjack Formula One World Champion Jensen Button in
    São Paulo as he was returning from practice for the Brazilian Grand Prix at Interlagos.
    (BBC)
  - Hamas leader Mahmoud Zahar says “the Jews will soon be expelled from Palestine”
    in the same way that they were “kicked out” by European countries “because they
    betrayed, stole and corrupted these countries." (The Jerusalem Post)
  Politics and elections:
  - Tens of thousands of people participate in an anti-nuclear demonstration against
    a waste shipment on its way from France to Germany. (Reuters)
  - Tanzanian President Jakaya Kikwete is sworn in for a second and final term. (Daily
    Nation) (Xinhua)
  - Following a recount, Republican Eddie Calvo is certified as the winner of the
    2010 gubernatorial election in Guam by 487 votes over Democrat Carl Gutierrez.
    (Pacific News Center)
  - Opposition parties in Burma accuse the military junta of "cheating" and "threatening"
    voters ahead of the general election on Sunday. (Al Jazeera)
  - The Ivory Coast presidential election will go to a second round with President
    Laurent Gbagbo facing opposition leader Alassane Ouattara. (BBC)
  Sports:
  - New Zealand have won four medals including two golds at the World Rowing Championships.
    (TVNZ) (Radio NZ) (Stuff)
  - US surfer Kelly Slater wins his 10th ASP world championship, the most by any surfer
    at the Rip Curl Pro Search in Puerto Rico. (AAP via ABC News Australia)
  - Champion American thoroughbred racehorse Zenyatta ends her career with a second
    to "Blame" in the Breeders' Cup. (People)
  - Joe Paterno wins his 400th game as head coach of the Penn State Nittany Lions,
    becoming the first FBS head coach to reach that milestone. (ESPN)
