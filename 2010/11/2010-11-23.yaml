Date: '2010-11-23'
Source_URI: Portal:Current events/2010 November 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Movement for the Emancipation of the Niger Delta claims responsibility for
    the destruction of an oil pipeline feeding a refinery in the Niger Delta. (AFP
    via Google News) (CNN)
  Shelling of Yeonpyeong:
  - North Korea shells Yeonpyeong island, South Korea at 14:34 local time in response
    to South Korean shelling close to the North Korean border during military drills.
    The North's shelling kills two marines and prompts a military response by the
    South in one of the most serious clashes since the 1953 armistice of the Korean
    War. (YTN Television) (BBC) (Yonhap) (China Daily)(The Sun UK)
  Arts and culture:
  - Clarence House confirms that Prince William and Catherine Middleton are to be
    married at Westminster Abbey on Friday 29 April 2011. (BBC)
  Business and economy:
  - Qantas announces that its fleet of Airbus A380 superjumbos will start returning
    to service on Saturday. (The Sydney Morning Herald)
  - A United States federal court jury decides that SAP AG must pay Oracle Corporation
    $1.3 billion for copyright infringement, the largest ever damages payment for
    copyright infringement. (Bloomberg)
  Disasters:
  - Cambodia declares a day of mourning for at least 378 people killed in a stampede
    in the capital Phnom Penh. (BBC)
  - At least seven bodies are recovered following a mine collapse in Suriname. (Jamaica
    Observer)
  Home Video:
  - 'Beauty and the Beast: Diamond Edition on 2-Disc DVD'
  International relations:
  - A Saudi woman accused of torturing her Indonesian maid is sent to jail while the
    maid is hospitalised, in a case that has caused tensions between the two countries.
    (AFP via Google News)
  - The Gambia severs diplomatic and economic relations with Iran and orders Iranian
    government representatives to leave within 48 hours. The Gambia has given no reason
    for the move. (BBC) (Reuters)
  - India forms two new military divisions, comprising more than 36,000 men, to be
    deployed in Arunachal Pradesh near the border with China. (BBC)
  Law and crime:
  - Bangladesh sentences a further 23 soldiers from the Bangladesh Rifles to imprisonment
    over a mutiny in February 2009. (Xinhua)
  Politics and elections:
  - Burmese pro-democracy leader Aung San Suu Kyi is reunited with her son for the
    first time in a decade. (BBC) (Al Jazeera)
  - King Abdullah II of Jordan commissions the Prime Minister Samir Rifai to form
    a new government following recent elections. (Bloomberg)
  The Irish financial crisis:
  - Brian Cowen, the Taoiseach, claims in Dáil Éireann that he is "not clinging to
    power". (RTÉ)
  - One of Minister for Transport Noel Dempsey's many offices is targeted with graffiti.
    (The Irish Times) (RTÉ)
  - Morgan C Jones, actor and satirist from Dublin, announces a "you're fired" protest
    against the government for Dáil Éireann on Thursday. (The Irish Times)
  - The opposition Labour Party grants its leader Eamon Gilmore "a free hand to take
    any initiative he deems appropriate over the coming days". (RTÉ)
  - A candidate in Thursday's by-election withdraws calling it a complete farce with
    a general election now due to occur in January. Some islands voted in the by-election
    yesterday. (RTÉ)
