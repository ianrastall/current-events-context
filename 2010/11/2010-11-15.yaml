Date: '2010-11-15'
Source_URI: Portal:Current events/2010 November 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - US diplomat Richard Holbrooke says the US has a transition plan for Afghanistan,
    not an exit strategy, and that there will be some drawdown of American troops
    in Afghanistan next year but the U.S. combat mission will not end there until
    2014. (CP via Google)
  Business and economy:
  - BHP Billiton abandons its US$39 billion takeover bid for Canadian fertiliser maker
    Potash Corp. (Sydney Morning Herald)
  Disasters:
  - Fire destroys a high-rise apartment building in Shanghai, China, killing at least
    42 people, injuring more than 90 and forcing some residents to jump from windows
    to escape. (Guardian) (MSNBC) (Los Angeles Times) (Shanghai Daily)
  - At least 42 people die after a building collapses in eastern New Delhi, India
    with at least twenty people trapped in the rubble. (AFP via Google News)
  International relations:
  - The United States will provide an additional US$500-million aid to Pakistan to
    help rebuild the country after devastating floods caused the worst natural disaster
    in Pakistan’s history. (VOA)
  Law and crime:
  - Iran arrests five human rights lawyers for security-related offences, the latest
    in a series of arrests of Iranian human rights' activists since last year's disputed
    presidential election. (Reuters) (AFP via Google) (Herald Sun)
  Politics and elections:
  - Recently freed democracy leader Aung San Suu Kyi criticizes the recent elections
    in Burma, but calls for dialogue with Myanmar government and pledges to keep working
    toward restoring democracy and improving human rights in Myanmar. (CNN) (The Australian)
  - A. Raja resigns as the Indian Telecommunications Minister over claims that licenses
    had been improperly given to mobile phone companies. (BBC)
  - Guinea election
  - Violence occurs in Guinea as both candidates declare victory ahead of the Guinean
    presidential election. (AFP via Sydney Morning Herald)
  - Alpha Condé of the opposition Rally of the Guinean People is declared the winner
    of the election. (CNN)
  Science:
  - Scientists exhume the remains of 16th century astronomer Tycho Brahe in Prague
    to try to solve the mystery of his sudden death. (AP)(BBC)
