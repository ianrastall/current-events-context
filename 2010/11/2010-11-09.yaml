Date: '2010-11-09'
Source_URI: Portal:Current events/2010 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb explosion kills Ali Abadi, governor of Shwak district in Afghanistan's
    eastern province of Paktia. (Press TV)
  - The death toll from clashes at a camp in Western Sahara between Sahrawi protesters
    and Moroccan police rises to eleven. (AFP via Google News)
  - Anwar al-Awlaki, a Yemeni cleric affiliated with al-Queda, tells Muslims in a
    new video posting that they are free to kill American at will, in retaliation
    for the killing of civilians in Iraq, Afghanistan and elsewhere. (The Australian)
  - About 20,000 people flee Burma to escape fighting between the Burmese military
    and the Democratic Karen Buddhist Army in Karen State after the recent general
    election. (AFP via Yahoo News)
  - Three members of the British Armed Forces are being investigated by military lawyers
    over alleged abuse of Iraqi detainees. (BBC)
  - In Dublin, dozens of complaints are made about the "heavy-handed" tactics of "excessive
    force" deployed by gardaí following last week's nationwide student demonstration
    against a government-proposed fee increase, the largest such demonstration in
    a generation. (The Irish Times) (RTÉ)
  Business and economy:
  - The European Commission finds that Qantas, British Airways, Air France, Japan
    Airlines and seven other carriers fixed the price of air cargo between 1999 and
    2006 and fines each airline involved millions of euros. (ABC)
  International relations:
  - A United Nations report suggests North Korea has supplied Burma, Iran and Syria
    with nuclear technology, in violation of United Nations sanctions. China had previously
    blocked the report from reaching the UN Security Council. (Reuters)
  - British Prime Minister David Cameron begins an official visit to the People's
    Republic of China. China, UK seek closer ties as economic dialogue opens in Beijing.
    (Xinhua) (BBC)
  - Secret documents are released showing churches and civilians upon the enemies
    list of Indonesian special forces Kopassus. The U.S. government had just removed
    a twelve-year funding ban on the group this summer.(Democracy Now!)
  Law and crime:
  - In the first public sign that the sentence of death by stoning passed on Sakineh
    Mohammadi Ashtiani is causing divisions within the regime, Alef, a conservative
    newspaper in Iran, challenges the handling of the case. (The Australian)
  - A man surrendered to police and confessed to killing five and wounding one in
    two separate attacks in South China's Hainan province. (China Daily)
  - A second Russian journalist is attacked in Moscow. Motivation is unclear but both
    had written about trees being felled to make way for motorways. (Al Jazeera)
  - A riot in the Pedrinhas prison in north-eastern Brazil results in eighteen prisoner
    deaths and a guard being wounded. (AFP via ABC News Australia)
  - A new law in Taiwan allows women to breastfeed in public and imposes fines on
    those trying to stop them. (Straits Times) (AFP via Google News)
  - Seventeen people including six employees of the Claims Conference in the United
    States have been charged with theft of $42 million from Holocaust compensation
    funds provided by the Government of Germany. (BBC)
  Politics and elections:
  - Hamas bans Fatah supporters from holding a rally in the Gaza Strip as representatives
    of the two parties prepare to meet in Syria to discuss ways of resolving the conflict
    between them. (The Jerusalem Post)
  - The Union Solidarity and Development Party is predicting a sweeping victory in
    the Burmese general election which overseas observers have called a sham. (Reuters)
  - The Chinese government prevents the lawyer for Nobel Peace Prize winner Liu Xiaobo
    from going to London to speak at a conference organised by the International Bar
    Association. (The Daily Telegraph) (Radio Television Hong Kong)
  Jordanian elections:
  - Jordanians go the polls for their parliamentary election but the opposition Islamic
    Action Front boycotts. (BBC) (Xinhua)
  - One person is killed and several others injured as fighting between rival groups
    breaks out during the vote in Imrea, near Kerak. (Al Jazeera)
  Science and technology:
  - Construction of a factory for the first fleet of commercial spaceships begins
    at the Mojave Air and Space Port in the United States. (The Australian)
