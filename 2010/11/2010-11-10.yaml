Date: '2010-11-10'
Source_URI: Portal:Current events/2010 November 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - The death toll from clashes in Western Sahara increases to 19. (AP via South Coast
    Today)
  - The United Nations says pirates off the coast of Somalia are "outperforming" an
    international effort to stop them. (Al Jazeera)
  - Bombings targeting Baghdad's Christian neighbourhoods kill at least four people.
    (AP via Atlanta Journal-Constitution) (CNTV)
  - An article in Time states Egypt helped Israel assassinate Palestinian Muhammad
    Jamal al-Namnam, a senior member of the al-Qaeda-affiliated Army of Islam organization.
    He was killed last week, after his car exploded in Gaza City. (Al Jazeera) (Time)
  Art and culture:
  - Italian film producer Dino De Laurentiis (Serpico, Death Wish) dies in Los Angeles,
    California ending a movie career that spanned seven decades in both the United
    States and Italy. (ABC News America)
  - 3D Express Coach to be put into trial in Beijing. (CNTV)
  - US singer Brad Paisley wins Entertainer of the Year at the 2010 CMA Awards held
    in Nashville, Tennessee. (AP via Houston Chronicle)
  Business and economy:
  - Singapore Airlines grounds three of its Airbus A380 fleet to replace their Rolls-Royce
    engines. (The Sydney Morning Herald)
  Disasters:
  - At least 16 people are killed and dozens are injured in a fire at a juvenile jail
    in the town of Ilobasco in El Salvador. (Al Jazeera)
  - Qantas and Cathay Pacific cancel flights out of Jakarta's Soekarno–Hatta International
    Airport due to the eruptions of Mount Merapi in Indonesia. (CNN)
  - An Israeli Air Force F-16I crashes in Makhtesh Ramon while on a training over
    the Negev desert in southern Israel, killing both the pilot and navigator of the
    plane. "Bodies of IAF pilot and navigator found after F-16I crash in Negev" (Ha'aretz)
  2010 Haiti cholera outbreak:
  - Doctors set up cholera clinics in Port-au-Prince as the 2010 Haiti cholera outbreak
    reaches the capital. (AP via Yahoo! News)
  - The death toll passes 600. (BBC)
  International relations:
  - U.S. President Barack Obama gives a speech in Indonesia during which he says more
    needs to be done to repair the relationship between the United States and the
    Muslim world. (Reuters)
  - Jordanian King Abdullah II meets with Xu Caihou, vice chairman of China's Central
    Military Commission, in Amman, Jordan. (CPC)
  Law and crime:
  - American Gabe Watson leaves detention in Australia after serving time for the
    death of Tina Watson after she drowned in 2007 after he failed to rescue her.
    He will be extradited to Alabama to face murder charges upon suspicion of murder.
    (News.Com.Au)
  Politics and elections:
  - A Chinese activist Zhao Lianhai who campaigned for victims of the tainted milk
    scandal in 2008 is jailed for two and half years for "inciting social disorder".
    (BBC) (Reuters Africa)
  - Tens of thousands of university students and lecturers march in a National Union
    of Students protest in London against plans by the United Kingdom government to
    raise tuition fees to £9,000 per year in England. Violence occurs later with the
    building hosting the Conservative Party's campaign headquarters trashed by riots
    in the day (BBC) (The Guardian)
  - Prithviraj Chavan is appointed Chief Minister of Maharashtra in India to replace
    Ashok Chavan who resigned in a corruption scandal. (BBC)
  - The Ivory Coast defers the second round of voting for the Ivory presidential election
    to November 28. (CNN)
