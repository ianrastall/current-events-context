Date: '2010-11-20'
Source_URI: Portal:Current events/2010 November 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Nigerian army arrests the leader of a militant gang and 51 others believed
    responsible for hostage-taking in the Niger Delta. (Reuters) (Xinhua)
  - A three day mutiny in Madagascar ends after an army barracks occupied by rebel
    troops is stormed by the army. (BBC) (Al Jazeera)
  Arts and culture:
  - Vladimir Arzumanyan from Armenia wins the Junior Eurovision Song Contest 2010
    with the entry "Mama". (Junioreurovision.tv)
  - The Vatican will issue guidelines for bishops, on how to combat sexual abuse within
    the church. (BBC)
  Disasters and accidents:
  - Nine people, including Russians and Ukrainians, die in a bus accident in Egypt.
    (ITAR-TASS)
  - Doctors without Borders criticizes the response to the 2010 Haiti cholera outbreak
    as inadequate. (BBC)
  - All 12 people aboard an Indian Air Force Mil Mi-17 transport helicopter are found
    dead following a crash in Arunachal Pradesh near the Chinese border. (Times of
    India) (Sky News)
  International relations:
  - Pope Benedict XVI urges Pakistani authorities to release Aasia Bibi, a Christian
    woman facing a death sentence on a charge of blasphemy against Islam. (Daily Times)
  - China's state-backed church appoints a bishop without the approval of Pope Benedict
    XVI. (BBC) (Taiwan News)
  - United Nations Secretary-General Ban Ki-moon is welcoming Iran's invitation for
    a visit next year by the United Nations' human rights chief, Navi Pillay (SMH
    News)
  - NATO summit
  - NATO nations agree to start handing over Afghanistan's security to the Afghanistan
    military and give local forces total control by 2014. (Associated Press)
  - Russia agrees to help NATO build a United States planned missile shield in Europe.
    (Washington Post)
  Law and crime:
  - The United States Senate settles with a payment of $4.6 billion to black farmers
    and at least 300,000 Native Americans who objected to government discrimination
    and cheating in Cobell v. Salazar. (BBC)
  Politics and elections:
  - Pope Benedict XVI is scheduled to elevate 24 new cardinals at a ceremony. (BBC)
  - Mahmoud Bahmani resigns as Governor of the Central Bank of Iran. (IRNA)
