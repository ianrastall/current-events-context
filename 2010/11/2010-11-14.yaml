Date: '2010-11-14'
Source_URI: Portal:Current events/2010 November 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - One person dies when a bomb in a pushcart explodes in Behsod district of Nangarhar
    province, east of Kabul, Afghanistan. (Xinhua)
  - Russian security forces kill three rebels in Buinaksk in the Caucasus region of
    Dagestan. (PTI)
  - Eleven people are killed in Helmand province, Uruzgan province, Kandahar province,
    and Nangarhar province of Afghanistan. (The New York Times)
  - A northern Sudanese plane bombs Southern Sudan, injuring several people, and the
    UN sends an assessment team to the area. (BBC)
  - Somali pirates free British couple Paul and Rachel Chandler after a year in captivity.
    (The Guardian) (Al Jazeera)
  - Abdul Khaliq Farahi, the Afghan consul general in Pakistan, is released by gunmen
    after two years in captivity. (Reuters AlertNet)
  - Former British soldier turned singer-songwriter James Blunt claims that he stopped
    what he believed would be World War III by disobeying a direct order for his troops
    to attack Russian soldiers given by American General Wesley Clark while he was
    in Kosovo with NATO in 1999. (BBC) (The Age) (The Independent) (TVNZ) (UPI)
  Arts and culture:
  - Yines, a previously unknown indigenous tribe, is discovered in the Amazonian jungle
    of southeast Peru. (Al Jazeera)
  - The UK is to become one of the first countries to officially monitor happiness
    in a government scheme designed to measure psychological and environmental wellbeing.
    (The Guardian)
  Disasters:
  - Seven people are killed in a fire burning migrant workers' residence in Dijon,
    eastern France. (Xinhua)
  - The death toll from the Mount Merapi eruptions reaches 250. (AP via Yahoo! News)
  - Flooding in southeastern Belgium kills three people and leaves one person missing
    near the capital Brussels. (The Voice of Russia) (The Canadian Press) (Expatica
    Belgium)
  2010 Haiti cholera outbreak:
  - The death toll rises to 917. (BBC) (Al Jazeera)
  - The Irish government pledges €500,000 and an emergency shipment of humanitarian
    supplies to Haiti in the battle against its cholera epidemic. (The Irish Times)
  Law and crime:
  - Authorities in Lebanon arrest Islamist preacher Omar Bakri Muhammed, days after
    a court sentenced him and 21 others to life imprisonment for carrying out "terrorist
    acts". (UPI) (Lebanese National News Agency) (Reuters)
  International relations:
  - The head of the joint UN-African Union mission in Darfur expresses concern that
    military tensions between north and south Sudan over the Southern Sudanese independence
    referendum could spill over into the separate Darfur conflict, undermining troubled
    peace efforts there. (Reuters Africa) (AFP via Google)
  - Thousands of people protest in Spain against a raid by Moroccan authorities in
    a camp in the disputed Western Sahara. (Angola Press) (CNN)
  - The Israeli cabinet approves a plan to allow 8,000 Ethiopians of Jewish descent
    into the country. (BBC) (JTA)
  - The United States offers Israel 20 F-35s and opposition to anti-Israel resolutions
    in the UN if Israel agrees to a partial 90-day freeze in building in the West
    Bank, excluding east Jerusalem. (BBC) (Al Jazeera) (The Jerusalem Post) (Haaretz)
  - The Organization of American States urges Nicaragua and Costa Rica to withdraw
    their security forces from an island in the San Juan river. Google is blamed for
    the dispute and revises its maps. (BBC)
  - Asia Pacific Economic Cooperation leaders agree to work towards forming a Free
    Trade Area of the Asia Pacific. (Straits Times)
  Politics:
  - Rival Palestinian parties Fatah and Hamas accuse each other for the failure to
    resolve the conflict between them in the second round meeting held in Damascus,
    Syria. (The Jerusalem Post)
  - Hundreds of people protest in Moscow, Russia, to demand action over an attack
    on journalist Oleg Kashin. (RIA Novosti) (CP)
  - Cuba frees political prisoner Arnaldo Ramos Lauzerique, one of 13 prisoners who
    had refused to go into exile in exchange for their freedom. (BBC)
  - A nationwide strike takes place in Bangladesh after former Prime Minister Khaleda
    Zia was evicted from her home. (Al Jazeera) (Hindustan Times)
  - The French cabinet led by Prime Minister François Fillon resigns, paving the way
    for a reshuffle by President Nicolas Sarkozy. Fillon remains as Prime Minister
    with Michèle Alliot-Marie becoming the Minister for Foreign Affairs replacing
    Bernard Kouchner. (BBC) (France 24), (Al-Jazeera)
  - Italian Prime Minister Silvio Berlusconi announces he will seek a confidence vote
    once the 2011 budget is approved. (Reuters)
  - Thousands of cheering supporters greet Burmese democracy leader Aung San Suu Kyi
    outside the headquarters of the National League for Democracy in Yangon. (AP via
    The Star) (BBC)
  - Gerry Adams, the President of Sinn Féin, announces that he will resign his positions
    in the Northern Ireland Assembly and the Parliament of the United Kingdom to stand
    for the Dáil. (The Times via The Australian) (The Guardian)
  - The Panhellenic Socialist Movement (PASOK) of Greek Prime Minister George Papandreou
    does well in a second round of municipal elections including its candidates elected
    as mayors of Athens and Thessaloniki. (BBC) (Al Jazeera)
  Sports:
  - Sweden's Robin Söderling wins his first major tennis tournament by winning the
    Paris Masters final, currently ranking fourth in the world in tennis. (BBC News)
  - Germany's Sebastian Vettel of Red Bull Racing wins Formula One's Drivers Championship.
    (IBN)
