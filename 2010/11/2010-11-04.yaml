Date: '2010-11-04'
Source_URI: Portal:Current events/2010 November 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Six armed ethnic groups in Burma join forces, fearing they will be attacked by
    the military government after the general election on Sunday. (Straits Times)
    (MSN Philippine News)
  - The United Nations says child soldiers continue to be recruited to fight and engage
    in piracy in Somalia. (IRIN)
  - Somali pirates hijack a vessel under the flag of the Comoros Islands with 29 people
    on board off the coast of Tanzania. (Voice of Russia)
  - Two men are charged with terrorism following parcel bomb attacks in Greece, as
    a 14th bomb addressed to the French embassy in Athens is detonated by police.
    (AFP) (BBC)
  - Several Sudanese police are killed in a battle with rebel Justice and Equality
    Movement fighters in Darfur. The Sudanese government claims that the rebels sustained
    heavy casualties. (BBC)
  - Thirteen militants are killed in a drone attack in North Waziristan, Pakistan.
    (BBC)
  Arts and culture:
  - A piece of stone axe found at the Gabarnmung rock art gallery on the lands of
    the Jawoyn people in Australia's Northern Territory is dated at 35,500 years old
    making the oldest of its type in the world. (ABC News Australia)
  - Formula Rossa, the worlds fastest roller coaster, opens at Ferrari World in Abu
    Dhabi. (Theme Park Insider)
  Business and economy:
  - Toyota recalls around 135,000 vehicles in Japan and Europe over a steering fault.
    (Financial Times) (Bloomberg)
  - A United States jury rules that Citigroup did not mislead Terra Firma Capital
    Partners in its bid for music group EMI. (BBC)
  - United Kingdom - Business Secretary Vince Cable orders Ofcom to investigate News
    Corporation's plan to take full control of BSkyB. (BBC)
  Disasters and accidents:
  - Residents in Haiti and Jamaica are evacuated ahead of Tropical Storm Tomas. (AP)
  - Indonesia evacuates thousands more people from their villages as Mount Merapi
    in central Java explodes again. (Jakarta Globe) (ABC)
  - At least sixteen people are dead and fifteen missing following mudslides in Costa
    Rica caused by heavy rains. (CNN)
  - Ongoing flooding in northern Colombia kills at least 102 people. (Sky News Australia)
    (Colombia Reports) (The Weather Network) (ReliefWeb)
  - Aero Caribbean Flight 883 crashes in central Cuba, killing all 68 people on board.
  Qantas Flight 32:
  - Qantas Flight 32 from Singapore to Sydney makes an emergency landing at Changi
    Airport after debris suspected to be from the aircraft is found on Batam Island
    in Indonesia. (MSN), (AFP via Yahoo! News), (BBC)
  - Qantas suspends all A380 flights while the explosion is investigated. (AAP via
    Brisbane Times)
  International relations:
  - UK Foreign Secretary William Hague has warned that "the window is closing" on
    the possibility of a peace deal between Israel and the Palestinians. (BBC) (The
    Guardian)
  - Serbian President Boris Tadić apologises for the Vukovar massacre in 1991 on a
    visit to a mass grave in Croatia. (Al Jazeera) (B92)
  Law and crime:
  - Japanese police investigate the leak of classified anti-terrorism documents. (AFP)
    (Asahi Shimbun)
  - An ongoing denial-of-service cyber attack knocks Burma off the internet, days
    ahead of the general election. (BBC) (AFP)
  - More than fifty inmates at the Moorlands Young Offenders Institution in South
    Yorkshire, England, riot for the second successive night. (BBC)
  Politics and elections:
  - The Cambodian government opens a "protest park" in the capital Phnom Penh, amid
    criticism from rights groups. (Phnom Penh Post) (Canadian Press) (Straits Times)
  - Pat Quinn is reelected as Governor of Illinois after a close election. (KSDK)
