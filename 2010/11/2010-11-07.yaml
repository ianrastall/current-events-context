Date: '2010-11-07'
Source_URI: Portal:Current events/2010 November 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Islamist militant group al-Shabaab threaten more attacks in Burundi and
    Uganda in retaliation for their participation in an African Union peacekeeping
    operation in the country. Meanwhile, seven people are killed in fighting in the
    capital Mogadishu. (CP)
  - Police use batons, pepper spray, tear gas and water cannon to disrupt activists
    expressing concern about the safety of a temporary warehouse in Gorleben where
    nuclear waste is being transported via train from France to Germany. It is thought
    to be the largest such mobilisation ever. (Huffington Post) (Al Jazeera) (BBC)
    (The Hindu) (The Straits Times) (euronews)
  - Kenyan policeman Peter Karanja kills 10 people, including two colleagues, in a
    shooting rampage in bars in Siakago, 90 miles northeast of Nairobi. Protesters
    outside the police station demand answers from police as to how this incident
    happened. (CNN)(The Deccan Chronicle) (Al Jazeera) (China Daily) (Xinhua)
  - Israel police fire tear gas and rubber bullets at residents trying to halt demolition
    of an illegal mosque in the southern Bedouin city of Rahat. (AFP via Google News)
    (Al Jazeera)
  - Fourteen people are killed in United States drone attacks in North Waziristan,
    Pakistan. (AP)
  - At least three people die, including two members of Sons of Iraq due to a bomb
    planted at their checkpoint in central Iraq, and an imam was shot dead in Baghdad.
    (CNN)
  Arts and culture:
  - Queen Elizabeth II starts a Facebook page but one is not permitted to "poke" or
    "befriend" her. (MSNBC) (BBC)
  - The 16th London Turkish Film Festival began Thursday evening with the world premier
    of Çağan Irmak's 'Prensesin Uykusu' at the Empire Leicester Square in London.
    (Hürriyet Daily)
  - Supporters of Chinese artist Ai Weiwei hold a party at his studio in Shanghai
    ahead of its scheduled demolition; he cannot attend as he is under house arrest.
    (BBC)
  - Residents of Cap d'Agde, Europe's largest nudist colony, criticise foreign nudists
    and express unhappiness at "an explosion of libertarianism" they claim is turning
    the resort into the "European capital of debauchery" and an "open-air brothel".
    (The Observer)
  Disasters and accidents:
  - Airlines cancel flights to Indonesia due to the Mount Merapi volcanic eruption.
    (ABC News Australia)
  International relations:
  - Iranian Foreign Minister Manouchehr Mottaki said that Iran has agreed to hold
    talks with the five UN Security Council permanent members and Germany (G5+1) in
    Turkey. (Xinhua)
  - Israel expels Riksdag member Mehmet Kaplan, a veteran of the Gaza flotilla raid,
    moments after his arrival, claiming he had "failed to follow procedure". Ex-Israeli
    artist Dror Feiler, who is also currently based in Sweden, is expelled with him.
    (AFP via Google News)
  - Sudanese President Omar al-Bashir arrives in Qatar for talks with Sheikh Hamad
    bin Khalifa Al Thani. (Al Jazeera)
  Law and crime:
  - Swedish police announce that a 38-year-old male had been brought into custody
    on suspicion of being involved in the 2009–10 Malmö shootings. (CNN) (BBC)
  Politics and elections:
  - Burmese election
  - Voters in Burma go to the polls for the Burmese general election, the first national
    election in twenty years, with widespread allegations of intimidation and fraud.
    (Al Jazeera) (BBC) (ABC)
  - Burma declares a state of emergency preventing political gatherings for 90 days
    after the election. (ABC News)
  - Police in Vietnam detain prominent government critic Cu Huy Ha Vu on charges of
    "propaganda against the state". (Zee News) (VOV News)
  - Greeks vote in local elections with the Prime Minister George Papandreou threatening
    to dissolve parliament if his party does not fare well. Early results show that
    the PASOK is doing well making an early election less likely. (Al Jazeera) (The
    Observer) (AP via Beaver County Times)
  - Voters in Guinea finally go to the polls for the second round of voting in the
    presidential election. (Al Jazeera) (Reuters)
  - Voters in Azerbaijan go to the polls for a parliamentary election with the opposition
    raising concerns over candidates being prevented from registering. (BBC) (Trend
    News Agency)
  - Scores of candidates in the Afghan parliamentary election protest at the lack
    of any results from the election held on September 18 and call for a new election.
    (Reuters)
  Sport:
  - Sebastian Vettel of Red Bull Racing wins the 2010 Brazilian Grand Prix with Red
    Bull winning the Constructors Championship. (Sydney Morning Herald)
  - New York Marathon
  - Haile Gebrselassie of Ethiopia, one of the greatest long distance runners, announces
    his retirement after failing to complete the marathon. (New York Times)
  - Edna Kiplagat of Kenya wins the women's marathon. (New York Times)
  - Gebregziabher Gebremariam wins the men's marathon. (New York Times)
  Technology:
  - The Nintendo Wii and Nintendo DSi XL come out in color red celebrating mario's
    25th anniversary.
