Date: '2010-11-05'
Source_URI: Portal:Current events/2010 November 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomber kills at least 50 people and injures around 90 in a mosque near
    Darra Adam Khel region, 30 kilometers from Peshawar, the capital of Khyber Pakhtunkhwa
    province of Pakistan. (CNN) (Xinhua) (Dawn)
  - At least five people are killed after two clans clash in Sindh's Khanur Mahar
    region of Pakistan. (Dawn)
  - Al-Qaeda in the Arabian Peninsula claims responsibility for the cargo plane bomb
    plot of October 29, 2010 and a September UPS plane crash in Dubai. (Reuters)
  Arts and culture:
  - In the United Kingdom, members of the National Union of Journalists at the BBC
    begin a 48 hour strike in a dispute over proposed changes to the Corporation's
    pension scheme. BBC News operates a reduced service. (BBC) (The Guardian)
  - MSNBC suspends U.S. television pundit Keith Olbermann indefinitely for making
    political donations to three Democratic Party candidates. (AP)
  - Ready Steady Cook, thought to be the longest running cookery show currently on
    television, is axed by the BBC. (The Guardian) (RTÉ) (Daily Record) (Daily Mail)
  Business and economy:
  - A final funding deal for the Airbus A400M military transport aircraft has been
    agreed to by the United Kingdom, France, Germany, Belgium, Luxembourg, Spain and
    Turkey. (BBC)
  - Thomas Hoenig, a member of the Federal Reserve Board, gives some indication of
    the split within that body in a speech to the National Association of Realtors.
    Though the Fed announced a new round of quantitative easing on Wednesday, Hoenig
    said that the Fed risks inflation and another boom-bust. (Bloomberg)
  Disasters and accidents:
  - The death toll from the Mount Merapi eruption in Indonesia rises to 122 as at
    least 78 bodies were removed from homes and streets blanketed by ash up to 30-centimeters
    deep. (The Jakarta Globe)
  - An Aero Caribbean passenger plane crashes in the central Cuban province of Sancti
    Spíritus, killing all 68 on board. (BBC) (CNN)
  - A small plane carrying 21 people crashes near Karachi Airport in Pakistan. (Times
    of India)
  - 12 people are dead after a 41-vehicle traffic accident on an expressway in East
    China's Jiangxi province. (Shanghai Daily)
  - At least one person dies in Haiti from flooding caused by Hurricane Tomas, adding
    to the fourteen people who died in Saint Lucia. (BBC)
  - A concrete mixer lorry falls on a train near Oxshott, England. (BBC)
  International relations:
  - Georgian police arrest 13 people allegedly belonging to a Russian spy network.
    (France 24)
  - The Chinese embassy in Oslo implicitly warns foreign diplomats not to attend the
    Nobel Peace Prize award ceremony for Liu Xiaobo. (BBC)
  - Greece resumes shipping mail and packages overseas following a 48-hour suspension
    imposed following a spate of parcel bombs sent to embassies in Athens and to European
    Union leaders. (Reuters)
  - The Government of Norway demands an explanation from the US Government on reports
    that the US embassy in Oslo conducted illegal surveillance on Norwegian citizens
    for more than ten years. (Reuters)
  Law and crime:
  - A Peruvian judge orders that United States born militant Lori Berenson be released
    from prison in Lima. (AP via The News Tribune)
  - Mexican drug cartel leader Ezequiel Cardenas Guillén is shot dead by Mexican security
    forces in Matamoros following a gun fight of several hours. (BBC)
  - Violent protests occur in Oakland, California following Johannes Mehserle receiving
    two years jail for the shooting of Oscar Grant on the Bay Area Rapid Transit system
    with Oakland police chief Anthony Batts expecting to make 150 arrests. (New York
    Times), (CNN)
  Politics and elections:
  - Protests against the visit of Pope Benedict XVI to Spain take place. (euronews)
  - A specially convened Election court in the United Kingdom orders a re-run of the
    2010 general election campaign in Oldham East and Saddleworth, the constituency
    of ex-immigration minster Phil Woolas, after he is found guilty of making false
    statements against an opponent during the original campaign. (BBC)
  - Nigel Farage is re-elected as the leader of the UK Independence Party. (BBC)
  - A protest by French anti-nuclear organisation GANVA blocks a train carrying nuclear
    waste near Caen in northwestern France. (CNN)
  - The President of Tanzania Jakaya Kikwete is reelected to a second term despite
    allegations of vote-rigging. (ABC News Australia)
