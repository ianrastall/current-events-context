Date: '2010-11-30'
Source_URI: Portal:Current events/2010 November 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Mogadishu (2010)
  - Fighting in the Somali capital Mogadishu leaves at least 15 people dead and 25
    injured. (Bloomberg)
  - An explosion occurs outside a stadium in Bishkek, Kyrgyzstan, injuring four people.
    (ITAR-TASS) (The Guardian)
  - An inquiry is ordered over the death of an immigrant in France, who was tear gassed,
    batoned, and twice tasered during an incident which left four police injured.
    (BBC)
  - Mexican soldiers uncover 18 corpses in 11 graves near Palomas, Chihuahua. (BBC)
  - Six people are killed in a suicide bombing in the Bannu district in northwestern
    Pakistan. (AP via Washington Post) (Dawn)
  Arts and culture:
  - A poem written by Nobel laureate Seamus Heaney sells for €4,800 at auction. (The
    Irish Times)
  - Movember wraps up with over $50 million raised for prostate cancer. (Movember)
    (Leader-Post)
  Business and economy:
  - The United Nations Climate Change Conference (COP-16) opens in the Mexican resort
    city of Cancún. (Xinhua)
  - Students protest in Rome and other Italian cities as politicians threaten to cut
    funding for education and research. (BBC)
  - Officials from multinational corporations Royal Dutch Shell and Halliburton are
    to be questioned in Nigeria in relation to bribery scandals and corruption. (BBC)
  - The European Commission launches an anti-trust investigation of Google. (The Guardian)
  Disasters:
  - At least 30 people are killed by flooding and heavy rains in Morocco. (Al Jazeera)
  - The United Kingdom continues to face blizzard conditions with many schools closed,
    long queues on the M8 motorway in Scotland, and Edinburgh Airport closed. (Daily
    Mail) (BBC) (CNN) (Sky News)
  - Ireland is hit by snow and record low November temperatures that disrupt the nation.
    (The Irish Times) (RTÉ)
  - Heavy flooding and mudslides claim at least 21 lives in Venezuela, with the President
    of Venezuela declaring a state of emergency in the state of Falcón. (CNN)
  Home Video:
  - Fantasia and Fantasia 2000 on Blu-ray and DVD
  International relations:
  - Russian President Dmitry Medvedev warns of an "arms race" if Russia and the West
    can not agree on a missile defence system for Europe. (Al Jazeera) (AFP)
  - Ecuador invites Julian Assange of WikiLeaks to speak publicly and offers him residency
    where he can make more revelations. Venezuelan President Hugo Chávez praises the
    website and calls for the resignation of U.S. secretary of state Hillary Clinton.
    (BBC)
  - The easing of Israel's blockade of Gaza six months ago has led to "little improvement"
    for people living there, a report by 21 aid and rights agencies says; Israeli
    officials says that the claims "are biased and distorted" and that truckloads
    of supplies entering the Gaza Strip has increased from 86 to 176 truckloads per
    day, since June.(The Jerusalem Post) (BBC) (Al Jazeera)
  - There is a row in the European Parliament as French and German MEPs attack Ireland's
    12.5% corporate tax rate. (RTÉ)
  Korean peninsula:
  - Officials from the United States, South Korea and Japan are to meet in Washington,
    D.C., to discuss North Korea. (CNN)
  - North Korea warns of "all-out war any time" in response to a continuing drill
    by South Korean and US forces. (CNN)
  - North Korea claims it has "thousands" of nuclear centrifuges operating at a previously
    undetected nuclear plant. (BBC) (The Hindu) (Arirang)
  Law and crime:
  - India's top investigating agency raids 11 locations in connection with alleged
    financial irregularities in the 2010 Commonwealth Games. (BBC)
  - Pakistani government starts securing 36 hacked websites after the ‘Indian Cyber
    Army’ gained root access to a main server hosting important Pakistani government
    websites. (Dawn)
  - An orderly at a Spanish retirement home admits to killing 11 residents. (BBC)
  - Interpol issues an arrest warrant for Julian Assange, the founder of WikiLeaks,
    to face sexual assault charges in Sweden. (Fox News)
  Politics and elections:
  - Kyrgyzstan's parliament agrees to form a three-way coalition government, creating
    the first parliamentary democracy in Central Asia. (BBC) (24.kg News Agency)
  - Irish Minister for Justice and Law Reform Dermot Ahern announces he is not to
    contest his seat in Dáil Éireann at the next general election (due in 2011) as
    he has "a painful medical condition necessitating heavy medication". (RTÉ) (The
    Irish Times) (BBC) (Irish Independent)
  - United States Secretary of Defense Robert Gates urges the United States Senate
    to abolish "don't ask don't tell" for gays and lesbians serving in the US military
    and releases a report showing that ending the policy would have little impact.
    (Reuters) (CNN)
  - The Slurpee Summit occurs in Washington, DC. (Slate)
  Sport:
  - Police investigating allegations of financial irregularities at the 2010 Commonwealth
    Games in Delhi raid 11 places. (BBC News)
  FIFA controversy:
  - FIFA Vice-President and CAF President Issa Hayatou denies allegations of bribery
    and threatens to sue the BBC after its Panorama programme alleges he received
    bribes from sports marketing firm ISL. (BBC)
  - British Prime Minister David Cameron is "frustrated" by the BBC for airing a documentary
    discussing the claims, but says the claims will not affect an attempt to win hosting
    rights for the 2018 FIFA World Cup. (The Daily Telegraph) (Reuters)
