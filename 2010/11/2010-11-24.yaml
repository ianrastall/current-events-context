Date: '2010-11-24'
Source_URI: Portal:Current events/2010 November 24
Intelligence_Payload:
  Shelling of Yeonpyeong:
  - The bodies of two civilians killed in the attack are discovered on Yeonpyeong.
    (BBC) (Yonhap)
  - South Korea suspends flood aid to North Korea following the attack. (AFP via Sydney
    Morning Herald)
  Arts and culture:
  - Debut novellist Amy Sackville wins the John Llewellyn Rhys Prize for her novel
    The Still Point.
  Business and economy:
  - Workers in Portugal hold a general strike to protest against proposed cuts to
    wages. (BBC)
  - Chinese Premier Wen Jiabao visits Moscow and meets with Russian President Dmitry
    Medvedev. Chinese companies sign deals worth over $8.6 billion with Russian counterparts.
    (AFP via Yahoo! Finance)
  - Don Chu, an executive of a hedge fund networking fund Primary Global Research,
    is arrested on insider trading charges in the United States. (Reuters)
  - Ireland unveils a 15 billion euro austerity package to secure a bailout from the
    financial crisis. (Sydney Morning Herald)
  - American corporations posted record profits of $1.67trillion for last quarter,
    amidst high unemployment rates. (Democracy Now!) (CNN)
  Disasters:
  - 29 miners in a New Zealand mine are confirmed dead after a second explosion, following
    a first explosion on November 19 which trapped them. (TVNZ) (3 News), (Sydney
    Daily Telegraph)
  - An Australian Government report on the Montara oil spill blames it on oil rig
    operator PTTEP. (AP via Forbes)
  - The United Nations and Pan American Health Organization estimate that the number
    of cases in the 2010 Haiti cholera outbreak could reach more than 200,000 in the
    next three months. (AFP via Google), (BBC)
  Law and Crime:
  - Former United States House of Representatives Majority Leader and former Dancing
    with the Stars contestant Tom DeLay is convicted of money laundering and conspiracy
    in relation to Republican fundraising for the 2002 Texas state elections. (CNN)
    (Reuters)
  - Brazilian police shoot dead at least thirteen people in Rio de Janeiro following
    a wave of violence by suspected drug traffickers. (BBC)
  Politics and elections:
  - One protester is killed during clashes between riot police and Egyptian copts
    after permission was refused for a new church. (AP) (RFI)
  - Blaise Compaoré is re-elected as President of Burkina Faso following a presidential
    election with 81% of the vote. (Times Live South Africa)
  - Protests occur in Kabul follow the announcement of most of the results of the
    Afghan parliamentary election. (Reuters)
  - UK Independence Party MEP Godfrey Bloom is expelled from the chamber of the European
    Parliament after calling German Socialist MEP Martin Schulz an "undemocratic fascist".
    (BBC) (The Independent)
  - University students throughout England and Wales stage a day of demonstrations
    against increases in tuition fees and cuts to higher education funding. (BBC)
