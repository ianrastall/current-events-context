Date: '2010-11-22'
Source_URI: Portal:Current events/2010 November 22
Intelligence_Payload:
  Disasters:
  - An army robot encounters water and breaks down 550 metres into the Pike River
    Mine in New Zealand where 29 miners are missing, but drilling of a shaft continues
    to allow air sampling. (The New Zealand Herald) (The Sydney Morning Herald)
  - All 29 Chinese miners trapped in the flooded Batian mine in Sichuan Province are
    rescued. (AP) (China Daily)
  - At least 339 people are killed at a stampede during Bon Om Thook (Khmer Water
    Festival) celebrations in Phnom Penh, Cambodia. (BBC) (Xinhua) (AP) (Reuters)
  International relations:
  - South Korean Defense Minister Kim Tae-Young says the country may consider redeploying
    U.S. tactical nuclear weapons after the announcement of a new nuclear uranium
    enrichment plant by North Korea. (Korea Herald) (Financial Times) (China Daily)
  - Israel's parliament passes a bill requiring a special parliamentary majority or
    a referendum before Israel could relinquish the Golan Heights or east Jerusalem
    for a peace deal. (BBC) (The Jerusalem Post)
  Law and crime:
  - Ten Somalis go on trial in Germany for attacking a German ship in the country's
    first pirate trial in 400 years. (Deutsche Welle) (Al Jazeera)
  - Former Vice President of the Democratic Republic of the Congo, Jean-Pierre Bemba,
    goes on trial for crimes against humanity and war crimes at the International
    Criminal Court in The Hague. (IOL) (CNN)
  - Chinese authorities begin a search for a batch of melamine-tainted products in
    Hubei. (Xinhua) (AFP via Google News) (RTHK)
  - A Washington D.C. jury convicts Ingmar Guandique of the murder of Chandra Levy.
    (The Washington Post)
  - CBC News leaks a suggestion that Hezbollah may have been responsible for the murder
    of Rafic Hariri. (CBC)
  Politics and elections:
  - Former Nigerian Vice President Atiku Abubakar is chosen to challenge incumbent
    President Goodluck Jonathan for the ruling People's Democratic Party nomination
    in next year's presidential election. (Al Jazeera) (Nigerian Guardian) (AFP via
    Google News)
  - The Burmese embassy in Bangkok, Thailand, grants Aung San Suu Kyi's younger son
    Kim Aris a visa to see her. (BBC) (Sify India)
  - Minoru Yanagida resigns as the Japanese Minister of Justice for joking about how
    easy his job was. (BBC) (Japan Today)
  Irish financial crisis:
  - Brian Cowen, the Taoiseach, states that he will call an early election once the
    Oireachtas passes an emergency budget to tackle the financial crisis. (The New
    York Times)
  - Protesters, including TD Aengus Ó Snodaigh, gather in Dublin. Some enter Government
    Buildings. Protesters are struck with batons while trying to sit down. (The Irish
    Times)
  Sport:
  - Canadian baseball player Joey Votto of the Cincinnati Reds wins Most Valuable
    Player of the National League in Major League Baseball in an almost unanimous
    vote. (Major League Baseball)
  - Brad Childress is sacked as head coach of the Minnesota Vikings National Football
    League team. (AP)
