Date: '2010-11-13'
Source_URI: Portal:Current events/2010 November 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Nigerian military asks civilians in the Niger Delta creeks to leave, warning
    of action against camps of criminal gangs in the area. (Reuters) (AFP)
  - The Kenyan navy shoots dead three suspected Somali pirates who had attacked a
    naval patrol. (IOL) (Reuters)
  - Somali pirates hijack a Chinese ship with 29 crew on board in the Arabian Sea.
    (Shanghai Daily) (Times of India)
  - Taliban insurgents attack the airport in the Afghan city of Jalalabad and a nearby
    base. (BBC)
  Disasters:
  - A fire kills dozens of animals at a zoo in Karlsruhe, Germany. (Deutsche Welle)
    (BBC)
  International relations:
  - Former U.S. President Jimmy Carter says that Hamas has agreed to deliver a letter
    from abducted Israel Defense Forces soldier Gilad Shalit to his family; Carter
    has mediated between the two sides in the past. (Haaretz)
  - The United Nations Security Council receives a report on violations of the Darfur
    weapons embargo; China says it is vaguely worded and full of flaws. (BBC)
  APEC Japan 2010:
  - Leaders from the Asia Pacific Economic Cooperation area attend the APEC Japan
    2010 summit in Yokohama. (Japan Times)
  - Thousands demonstrate against Chinese President Hu Jintao's visit, against the
    background of a dispute between Japan and China over islands in the East China
    Sea, condemning “Chinese imperialism” while waving the flags Tibet, East Turkestan
    and south Mongolia. (NPR) (AP)
  Law and crime:
  - Morocco arrests 96 people it accuses of inciting violence during last Monday's
    deadly police raid on the Gdaim Izik camp in Western Sahara. Half a dozen appear
    before a military court, including activist Annaama Asfari. (Al Jazeera)
  Politics:
  - Burmese opposition leader Aung San Suu Kyi is released after 15 years of house
    arrest. (BBC) (Times of India) (Al Jazeera)
  - Police and protesters clash in the Bangladeshi capital Dhaka over the authorities'
    bid to evict opposition leader Khaleda Zia from her home. (Al Jazeera)
  - The French Cabinet led by Prime Minister François Fillon resigns ahead of a reshuffle
    by President Nicolas Sarkozy. (BBC)
  Sports:
  - Seongnam Ilhwa Chunma (South Korea) defeats Zob Ahan Isfahan F.C. (Iran) 3–1 to
    win the AFC Champions League. (Football 3)
  - Manny Pacquiao defeats Antonio Margarito to win the WBC World Super Welterweight
    title, winning his record eighth belt in eight championship classes. (AP via NBC)
