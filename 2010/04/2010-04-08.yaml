Date: '2010-04-08'
Source_URI: Portal:Current events/2010 April 8
Intelligence_Payload:
  2010 Kyrgyzstan riots:
  - 100 people die in anti-government protests in Kyrgyzstan, according to opposition
    activist Toktoim Umetalieva. (Arab News)
  - The Kyrgyzstan government is ousted as the result of the popular revolt. (News.com.au)
  - Opposition leader Roza Otunbayeva says she will lead a temporary government for
    six months. (Kyrgyz National Informational Agency) (The New York Times)
  - President Kurmanbek Bakiyev escapes Bishkek, purportedly to a southern region
    of the country through Osh. He refuses to resign, but admits he's lost control
    of the Kyrgyz military. (BBC)
  Uncategorized:
  - Sri Lankans vote in the country's 2010 parliamentary election. (The Guardian)
  - Pakistan adopts the 18th amendment to the Constitution, stripping President Asif
    Ali Zardari of key powers. (Dawn) (Hindustan Times) (Press TV) (CNN) (Radio Netherlands
    Worldwide)
  - 5 people are killed and 11 others are injured in separate attacks in Diyala and
    Nineveh. (People's Daily Online)
  - United States President Barack Obama and Russian President Dmitry Medvedev sign
    a new arms reduction treaty that will cut both countries' arsenals by a third.
    (BBC) (AP) (TIME)
  - Israeli Prime Minister Benjamin Netanyahu will send deputy prime-minister to a
    summit on nuclear weapons in the United States over concerns that Egypt and Turkey
    might shift the focus away from preventing militants from obtaining nuclear weapons
    by insisting that Israel sign the Nuclear Non-Proliferation Treaty (NPT). (BBC)
    (Reuters)
  - A Palestinian teen reported to have been killed returns home safely. (Ottawa Citizen)
  - Professor Lee R. Berger announces the discovery of a new hominid species, Australopithecus
    sediba, believed to be an ancestor of either Homo habilis or Homo erectus. (Time)
  - The Bangladeshi army distributes drinking water among more than 12 million people
    in Dhaka as fears grow over the city's water crisis. (Arab News)
  - More than 50 doctors in Edo State, Nigeria go on strike after a colleague is kidnapped
    by unidentified gunmen. (BBC)
  - 29 paramilitary troops are convicted of mutiny and imprisoned for up to seven
    years at a Bangladeshi tribunal. (Arab News)
  - The death toll in the storm which caused severe damage to Brazil's Rio de Janeiro
    metro area reaches 200. (The Huffington Post) (Xinhua)
  - Separation surgery is declared successful in London on the conjoined twins from
    Cork, Ireland, born on 2 December. (RTÉ) (The Daily Telegraph) (Irish Examiner)
    (Sky News) (BBC) (CNN)
  - Scientists say Glacier National Park has lost two more of its glaciers to global
    warming. (Xinhua)
  - Sex Pistols manager Malcolm McLaren, notorious for the banned "God Save the Queen"
    single, dies in Switzerland. (The Independent) (BBC) (The Guardian) (Sky News)
  - 14 people die of dengue fever in Dominican Republic. 2,000 cases of dengue fever
    have been registered. A total of 52 died of the disease last year. (Xinhua)
  - Dublin's Glasnevin Cemetery, which holds 1.5 million corpses, is reopened with
    a new museum after an €11 million redevelopment. (The Irish Times)
