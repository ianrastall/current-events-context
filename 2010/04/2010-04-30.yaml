Date: '2010-04-30'
Source_URI: Portal:Current events/2010 April 30
Intelligence_Payload:
  Expo 2010:
  - Hailed as the largest World's Fair in history, Expo 2010 opens in Shanghai, China.
    (Financial Times)(Xinhua) (China.org) (Sina) (People) (China.com) (Shanghai Daily)
  - Maltese President George Abela is hospitalised after sustaining an injury in his
    China hotel and has to cancel his appearance at the official inauguration. (The
    Times of Malta)
  Uncategorized:
  - At least eight villagers die following a landslide in Kenya, with others hospitalised
    or missing and homes destroyed. (BBC)
  - At least eight people die in an attack on an army base in South Sudan. (BBC)
  - French senator Charles Pasqua is convicted and sentenced on charges of corruption
    which occurred whilst he was interior minister in the 1990s. (France24) (BBC)
    (China Post)
  - Tonga's Attorney-General suddenly resigns amidst allegations the government is
    trying to take over his judiciary. (TVNZ)
  - Former Pakistani spy Khalid Khawaja is murdered; a previously unknown militant
    group - Asian Tigers - claims responsibility. (The Wall Street Journal)
  - Protesters in Thailand storm a hospital amid rising tension between pro- and anti-government
    factions. (NY Times)
  - The United States Justice Department opens a criminal investigation into alleged
    fraud by Goldman Sachs. (Washington Post)
  - The Nigerian House of Representatives announces the creation of ten new states,
    five in the north and five in the south, by 2011. (AllAfrica.com)
  - China and South Korea discuss the potential security threat presented by North
    Korean aggression. (Washington Post)
  - The United States announces it will begin mediating indirect peace talks between
    Israel and Palestine. (NY Times)
  - Iran threatens to "cut off Israel's feet" if Israel attacks Syria. (Jerusalem
    Post)
  - China moves to increase classroom security after a series of unrelated attacks
    on schools injure dozens of children and kill ten. (LA Times)
  - One of Ireland's most recognisable broadcasters, Gerry Ryan, who co-presented
    Eurovision Song Contest 1994 sixteen years ago today, is discovered dead at his
    Dublin home after failing to present this morning's edition of The Gerry Ryan
    Show on national radio station RTÉ 2fm. (The Guardian) (BBC) (esctoday.com) (Vancouver
    Sun) (Sky News)
  - Russian businessman Vasily Bukhtienko, who established a Joseph Stalin museum
    in Volgograd, is beat to death by electric shocks. (BBC)
  Deepwater Horizon drilling rig explosion aftermath:
  - The oil spill resulting from the explosion of the Deepwater Horizon drilling rig
    in the Gulf of Mexico reaches the Louisiana coast. (CBS News)
  - Landfall of the giant oil spill will result in widespread environmental harm to
    animals, birds and coastline areas. (The Washington Post) (CNN)
  - Weather threatens to impede cleanup efforts. (Houston Chronicle)
