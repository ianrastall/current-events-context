Date: '2010-04-27'
Source_URI: Portal:Current events/2010 April 27
Intelligence_Payload:
  Uncategorized:
  - Standard & Poor's downgrades Greece's sovereign credit rating to junk, four days
    after the country's government requests the activation of a €45-billion EU–IMF
    bailout. (Business Week)
  - Norway and Russia settle a 40-year-old conflict over their maritime border in
    the Barents Sea, announced during President Medvedev's state visit in Norway.
    (Earthtimes) (Reuters)
  - India arrests a woman working at its embassy in the Pakistani capital of Islamabad
    on charges of espionage. (Times of India) (Xinhua)
  - A mortar attack on joint Iraqi army-police office kills 2 Iraqi soldiers and injures
    14 in Baghdad. (USA Today)
  - About 20 senior military leaders in Burma, including Prime Minister Thein Sein,
    retire from their posts in the State Peace and Development Council to participate
    in the general election later this year. (BBC) (Reuters) (Sify)
  - A smoke bomb is thrown in the Ukrainian parliament during protests after Ukraine's
    extension of the lease on a Russian naval base in Sevastopol. (BBC) (RIA Novosti)
  - A United States Senate investigation finds that Goldman Sachs made billions of
    dollars at the expense of its clients during the collapse of the housing market.
    (BBC)
  - Oh Eun-Sun becomes the first woman to successfully scale all of the world's 14
    highest peaks. (Korea Times) (CTV)
  - Former Kyrgyz President Kurmanbek Bakiyev is charged with mass killings for his
    role in an uprising earlier this month. (Washington Post) (RIA Novosti)
  - Kenya's foreign minister Moses Wetangula arrives in the United Arab Emirates to
    resolve a diplomatic row after Kenya interrogated and deported members of the
    UAE's ruling family on terrorism charges. (Kenyan Standard) (BBC)
  - Haiti drops kidnapping charges against U.S. missionaries detained for trying to
    take children out of the country after the January earthquake. (USA Today)
  - The Metropolitan Police in London publish a long suppressed report on the 1979
    death of Blair Peach which concludes that a police officer was probably responsible
    for his killing. (BBC) (Report)
  - The Israeli military disciplines four officers involved in two clashes with West
    Bank protesters in which four Palestinian civilians were killed. (BBC)
  - A massive landslide hits a north Taiwan highway close to Keelung. (People)
  - Sierra Leone introduces free healthcare for pregnant and breast-feeding women
    and children under five. (BBC)
  - The evangelical group Noah's Ark Ministries International claims to have found
    a 4800-year-old wood structure that they are "99.9 percent" certain is the remains
    of Noah's Ark. (Fox News)
