Date: '2010-04-03'
Source_URI: Portal:Current events/2010 April 3
Intelligence_Payload:
  Uncategorized:
  - Eugène Terre'Blanche, founder of the Afrikaner Resistance Movement, is killed
    in his hometown of Ventersdorp. (BBC) (RTÉ)
  - Three German soldiers are killed in north Afghanistan, five other Germans were
    wounded in fighting southwest of Kunduz. 22 German soldiers have been killed by
    fighting or attacks in Afghanistan since 2001 and another 138 wounded. (China
    Daily) (Newsday) (ABC) (Breitbart) (Wten)
  - German troops kill at least five Afghan soldiers in a friendly fire incident north
    of the capital Kabul. (Deutsche Welle) (The Daily Telegraph) (Taiwan News)
  - Australian Prime Minister Kevin Rudd appoints the country's first population minister,
    Tony Burke, as part of a strategy for managing population growth. (ABC News) (Angola
    Press) (Reuters India)
  - Rescuers enter a flooded mine in Shanxi, China to help over 153 workers trapped
    there for over a week. (China Daily) (CNN) (Press TV)
  - Eight people are missing and one dies as a fishing boat sinks while searching
    for the South Korean Cheonan warship that sank last week near the Northern Limit
    Line border with North Korea. (Yonhap) (BBC)
  - The controversial African Renaissance Monument, which is taller than the Statue
    of Liberty, is inaugurated in the Senegalese capital Dakar. (BBC) (Al Jazeera)
    (AFP) (CNN) (The Guardian)
  - Thousands of "red shirt" anti-government protesters rally in the Thai capital
    Bangkok demanding new elections. (Thai News Agency) (CBC) (The Hindu)
  - Cambridge Boat Club defeats Oxford Boat Club to win the 156th University Boat
    Race in London, England. (BBC)
  - Apple released the iPad in the United States.
