Date: '2010-04-11'
Source_URI: Portal:Current events/2010 April 11
Intelligence_Payload:
  Aftermath of 2010 Polish Air Force Tu-154 crash:
  - The body of President Lech Kaczyński, who was killed in yesterday's plane crash
    just north of Smolensk, Russia, is flown back to Poland. (Reuters news coverage)
    (The Economist) (Toronto Star)
  - Concerts and football matches are cancelled, while cinemas, theatres, restaurants
    and shopping malls close their doors. (The Guardian)
  - The President is processed through the streets and lies in state in the Presidential
    Palace, Warsaw. (Al Jazeera) (The New Zealand Herald)
  - Tens of thousands of Poles line the streets of Warsaw to witness the event. (Los
    Angeles Times) (The Sydney Morning Herald)
  - A two minute silence is observed across Poland in memory of the victims. (RTÉ)
  - 10 million Polish Americans mourn their loss in several cities across the country.
    (Wall Street Journal)
  - Polish British mourn one of their priests, Monsignor Bronislaw Gostomski, who
    died in the crash. (The Atlanta Journal-Constitution)
  - 1 million Polish Canadians begin a week of mourning. (CBC) (CBC)
  - Women's U-17 UEFA Championship elite qualifying phase game Poland versus Republic
    of Ireland in Ukraine is postponed due to the tragedy. (RTÉ)
  Pakistan:
  - Airstrikes kill 10 militants in northwestern Pakistan as part of a military operation
    that has eliminated more than 300 fighters in the last three weeks. (The New Zealand
    Herald)
  - Pakistani troops with helicopters bomb 13 militants to death and wound several
    others. (Press TV)
  Iran:
  - President of Iran Mahmoud Ahmadinejad plans to relocate millions of Tehranians
    as the city is threatened by earthquakes. (Press TV)
  - Iran announces it will take part in the International Atomic Energy Agency's conference
    to review the Nuclear Non-Proliferation Treaty in New York, United States in May.
    (Press TV)
  - Iran announces its decision to file a formal complaint with the United Nations
    against the United States, citing Barack Obama's threat to use a "nuclear attack"
    against it as a "threat to global peace and security". (Al Jazeera)
  Uncategorized:
  - Iraq's election seeks a recount in five provinces after up to 750,000 votes are
    "tainted by fraud". (Reuters)
  - Sudan hosts its first general elections in 24 years. (Al Jazeera) (BBC) (Press
    TV) (Arab News)
  - A 6.8 magnitude earthquake strikes the southern Solomon Islands, 97 km southwest
    of Kirakira on Makira Island. (The Australian) (TVNZ)
  - Israel is set to impose a military order, which ten human rights groups fear could
    see thousands of Palestinians deported from the West Bank if they do not have
    a residency permit. (BBC) (Al Jazeera) (The Guardian) (The Times) (The Jordan
    Times)
  - The Democratic Front for the Liberation of Palestine (DFLP) asks China to pressure
    Israel to have its nuclear sites inspected during the forthcoming international
    nuclear conference, saying "world silence on the issue of the Israeli nuclear
    capabilities is creating tension in the region, especially with the relentless
    international focus on Iran and North Korea". (Brunei News)
  - Kyrgyzstan's interim government considers arresting and charging President Kurmanbek
    Bakiyev for the deaths of 81 people in riots earlier this week. (Al Jazeera) (AFP)
    (Xinhua)
  - South African police investigate a possible link between homosexual sex and the
    murder of Eugène Terre'Blanche. (IOL) (The New York Times) (The Times)
  - Centre-right Fidesz wins majority of parliamentary seats in the first round of
    the Hungarian general elections. (Reuters) (AP/Yahoo!)
  - Abdullah of Saudi Arabia and Vietnamese President Nguyễn Minh Triết discuss bilateral
    ties in oil, food and manpower and sign three major agreements — a treaty avoiding
    double taxation, a protocol to promote ties in the oil and gas sectors and an
    agreement to promote agricultural cooperation. (Arab News) (Reuters) (Daily Star
    Lebanon) (Radio Australia) (Saudi Gazette)
  - Nine people, including three Italian medical workers, are detained over accusations
    of plotting to kill Governor of Helmand Gulab Mangal. (Al Jazeera)
  - The death toll in clashes between anti-government protesters and Thai troops in
    the capital Bangkok rises to at least 20 people. (BBC) (Thai News Agency)
  - Two Chinese singers become the country's first to be punished for lip-synching
    nearly two years after the Beijing Olympiad. (Reuters South Africa)
  - The Belfast Wheel ceases to function. (BBC) (RTÉ)
  - Texas Stadium, the former home of the National Football League's Dallas Cowboys,
    is demolished by implosion. (ESPN Dallas)
  - Analysts predict the 2011 bankruptcy of one of the world's largest economies,
    Japan, with a public debt figure larger than any other industrialised nation.
    (Press TV) (AFP) (The Economist)
