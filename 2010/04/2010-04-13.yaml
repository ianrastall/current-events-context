Date: '2010-04-13'
Source_URI: Portal:Current events/2010 April 13
Intelligence_Payload:
  Nuclear Security Summit:
  - President of the United States Barack Obama opening the biggest international
    meeting hosted by the US since 1945, greets leaders from nearly 50 countries.
    World leaders at the summit hear dire warnings of the danger of nuclear material
    falling into the wrong hands. (BBC News)
  - The Georgian president, Mikheil Saakashvili, says that his government thwarted
    an attempt to sell highly enriched uranium on the black market last month. (The
    Guardian)
  - Hu Jintao, President of the People's Republic of China, meets with President Barack
    Obama to discuss Iran's nuclear program. (CNN)
  - Conservative leader David Cameron launches his party's election manifesto, which
    he says is a "plan to change Britain for the better". He said the "optimistic"
    plan would bring a "new kind of government" with less state and more "people power".
    (BBC News)
  - The UK Independence Party says they will not campaign against election candidates
    from other parties who are "committed" Eurosceptics, and Plaid Cymru have also
    launched their manifesto in Cardiff with a pledge to protect the vulnerable and
    front-line services. (BBC News)
  Uncategorized:
  - A magnitude 6.9 earthquake strikes southeastern Qinghai, China, near the Yangtze
    River. There were no immediate reports of casualties. (The Associated Press)(Vancouver
    Sun)
  - A bar of radioactive cobalt-60 found in a New Delhi market causes life-threatening
    radiation sickness in one person and contingency measures from the authorities.
    ("The Faster Times")
  - Kyrgyzstan's ousted president Kurmanbek Bakiyev says he will resign if the interim
    government guarantees his family's safety. (The Telegraph) (Al Jazeera)
  - A huge glacier breaks off and plunges into a lake in Peru sparking a 23-metre
    high tsunami wave that destroyed a nearby town. The massive chunk of ice - around
    the size of four football pitches - tumbled into the '513 lake' in the Andes near
    Carhuaz, around 200 miles north of Lima. (Sky News) (The Peruvian Times)
  - Israel tells all of its citizens visiting the Sinai Peninsula to leave immediately
    after Israeli intelligence warns that a terror cell may be planning to kidnap
    an Israeli national and bring him to Gaza. (Yahoo! News) (The Telegraph)
  - Israeli soldiers kill four heavily-armed Islamic Jihad gunmen sent to attack Israeli
    forces and believed to be planting explosives along the security fence with Gaza.
    (JTA)
  - A group of Lebanese politicians play a match of association football to commemorate
    the 35th anniversary of the Lebanese Civil War. AFP
  - The body of Poland's First Lady, Maria Kaczyńska, is flown to Warsaw to lie in
    state alongside that of her husband, President Lech Kaczyński. Poland has seen
    an outpouring of grief since the couple and scores of other senior Polish officials
    died in a plane crash in western Russia on Saturday. (BBC News) (Xinhua)
  - The First Lady of the United States, Michelle Obama, makes an unannounced visit
    to Haiti. It is her first official trip overseas without US President Barack Obama
    since he took office last year. (BBC News)
  - 11 people are killed in Isabela City, Philippines, after 25 suspected members
    of the Abu Sayyaf extremist group clash with security forces. (CNN)
  - At least 73 civilians were killed when an army jet bombed a remote village in
    Pakistan's tribal region of Khyber, a local official has told the BBC. (BBC News)
  - UK General Election countdown
  - All 103 passengers and crew escape alive after a Boeing 737-300 overruns the runway
    at Rendani Airport, Manokwari, Indonesia. (JACDEC), (Aviation Herald)
  - An American Boeing 767 passenger jet makes an emergency landing in Iceland after
    reports of chemical fumes in the cabin. A spokesman for Keflavik airport outside
    Reykjavík says several crew members on the American Airlines flight had complained
    of dizziness. (BBC News)
  - Japanese car maker Toyota faces further safety concerns after Consumer Reports
    issues a recommendation not to buy the Lexus GX 460 four-wheel drive because of
    fears that the car could roll over. (BBC News)
  - The Australian authorities say a Chinese bulk carrier which ran aground off Queensland
    has caused widespread damage to the famed Great Barrier Reef. The cleanup is likely
    to be the biggest operation ever undertaken there. (BBC News)
  - A mentally ill man goes on a stabbing rampage outside a primary school in southern
    China, killing two and wounding five. (The Telegraph)
  - Former Bosnian Serb leader, Radovan Karadzic, cross-examines the first prosecution
    witness at the resumption of his war crimes trial at The Hague. (BBC News)
  - Twitter sells advertising on its site for the first time. Advertisers will be
    able to buy "Promoted Tweets" that will appear on Twitter's search results pages.
    (BBC News)
  - Spanish police say they have seized more than 800kg (1,760lbs) of cocaine from
    a lorry disguised as an official backup vehicle for the Dakar rally. (BBC News)
