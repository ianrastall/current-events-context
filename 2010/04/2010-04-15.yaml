Date: '2010-04-15'
Source_URI: Portal:Current events/2010 April 15
Intelligence_Payload:
  2010 Yushu earthquake:
  - President Hu Jintao, attending a BRIC summit in Brasilia, announces postponement
    of his state visits to Peru and Venezuela. (Xinhua)
  - Premier Wen Jiabao arrives in Yushu Tibetan Autonomous Prefecture and postpones
    his trip to southeast Asia. (ABC)
  - The death toll rises to 617. (Xinhua) (The Hindu) (Bernama)
  Sudanese general election, 2010:
  - Sudanese newspapers report the death of 9 members of the National Congress during
    general elections in the country; the Sudan People's Liberation Army denies the
    incident. (Global Times) (Al Jazeera)
  - Polls close after five days of voting. (France24)
  Uncategorized:
  - Due to the eruption of Eyjafjallajökull volcano, Belgian, British, Czech, Danish,
    Dutch, Finnish, French, German, Icelandic, Irish, Norwegian, Polish, Russian and
    Swedish airspaces are affected by the eruption. (BBC) (euronews) (RTÉ) (The Irish
    Times)
  - Former Israeli Prime Minister Ehud Olmert is a prime suspect in a large corruption
    scandal, law enforcement sources have told the BBC. (BBC)
  - The leaders of the United Kingdom's three main political parties take part in
    the first of three televised debates ahead of the 2010 General Election. (BBC)
    (The Guardian)
  - The maiden flight of the Geosynchronous Satellite Launch Vehicle Mk.II, India's
    first launch with an indigenous cryogenic upper stage, ends in failure, resulting
    in the loss of the GSAT-4 satellite. (The Hindu)
  - Three explosions occur in the former Burmese capital of Yangon during the city's
    Water Festival, killing at least 9 people and injuring 178. (Xinhua) (BBC) (Radio
    Australia News)
  - Gunfire disrupts a rally in support of former President of Kyrgyzstan Kurmanbek
    Bakiyev in the southern city of Osh. (Reuters) (Al Jazeera)
  - At least three security officers are killed after riots in north Jakarta, Indonesia,
    over plans to bulldoze a cemetery containing a memorial to a revered Muslim scholar.
    (Antara) (Ninemsn) (Jakarta Post)
  - The 2010 IBSA summit comes to a close in Brasilia.
  - Oxfam International says the number of sexual assaults in eastern Democratic Republic
    of Congo has increased "dramatically". (Al Jazeera)
  - Israel's Communications Ministry imposes a blanket ban on the iPad and will confiscate
    them from anyone carrying them into the country. (Ha'aretz) (PC World)
