Date: '2010-04-09'
Source_URI: Portal:Current events/2010 April 9
Intelligence_Payload:
  Uncategorized:
  - Rescue efforts continue in Brazil in an attempt to locate around 200 people believed
    to have been buried in their homes by a large landslide in Morro do Bumba near
    Rio de Janeiro city in the state of Rio de Janeiro. (BBC)
  - The death toll in Shanxi's flooded Wangjialing coal mine reaches 25. (Al Jazeera)
  - Thousands of Iraqis protest in the city of Najaf to mark the seventh anniversary
    of the occupation of Iraq by the United States. (People's Daily Online) (Al Jazeera)
  - Australia immediately suspends all new asylum claims by people from Sri Lanka
    and Afghanistan. (The Times of India) (BBC) (The Guardian) (Reuters) (The Times)
    (France24) (Al Jazeera)
  - Union Minister of Home Affairs of the Republic of India P. Chidambaram takes "full
    responsibility" for the killing of 76 paramilitary troops in Tuesday's Maoist
    ambush in Chhattisgarh — history's deadliest attack on security forces by Maoist
    insurgents — and offers to resign. (BBC) (Reuters India)
  - The funeral of South Africa's white supremacist leader Eugene Terreblanche takes
    place in South Africa. (Sky News) (BBC) (Al Jazeera)
  - Anti-government protesters in Thailand storm and occupy an opposition television
    station. (BBC) (Thai News Agency)
  - Germany charges a former member of the Red Army Faction (RAF) in connection with
    the murder of Attorney General Siegfried Buback, who was shot alongside two other
    men in 1977. (Deutsche Welle) (BBC) (Die Welt)
  - Sri Lanka's governing coalition wins a majority in the country's 2010 parliamentary
    election. (BBC) (Al Jazeera) (France24) (Reuters) (South China Morning Post)
  - Ahead of Sudan's first multi-party elections in 24 years, some opposition parties
    criticise lack of access to balanced media coverage and accuse the government
    of manipulation. (Al Jazeera)
  - Pope Benedict XVI encounters allegations he was responsible for obstructing the
    punishment of American paedophile priest Stephen Kiesle by signing a letter in
    1985 - the first time he has been directly accused of involvement in the Catholic
    Church's ongoing international child sex abuse scandal. (BBC) (The Guardian) (The
    Times) (LA Times) (The J Post)
  - The first black Prime Minister of Zimbabwe Rhodesia, Bishop Abel Muzorewa, is
    announced to have died at the age of 85. (BBC) (The Daily Telegraph) (Daily Nation)
    (Voice of America)
  - Two days of national mourning begin in Kyrgyzstan for the victims of police shootings
    as the dead are buried. (Deutsche Welle) (BBC) (ABC News)
  - The Islamic State of Iraq posts a statement on the internet claiming responsibility
    for Sunday's triple bombings in Baghdad which killed at least 40 people and affected
    some foreign embassies but denies involvement in Tuesday's six bombings which
    killed 35 people in Shia areas. (BBC) (France24) (Reuters) (People's Daily Online)
  - Shanghai Metro Line 2 opens service to Pudong International Airport. (Shanghai
    Daily)
  - U.S. helicopter - Air Force CV-22 Osprey - crashes in southern Afghanistan, killing
    three U.S. service members and one civilian employee. Zabiullah Mujahid says Taliban
    fighters shot down the chopper. (CNN)
  - Associate Justice John Paul Stevens of the U.S. Supreme Court announces his retirement
    after serving on the court for 34 years. (LA Times)
  - American and Russian physicists announce the creation of ununseptium, atomic element
    number 117. (CBC News) New York Times
  - 4.1-magnitude earthquake jolts northern Chinese city of Tangshan. (Sina)
  - The World Bank approves a $3.75 billion loan for a coal-fired power plant in South
    Africa. (Democracy Now)
