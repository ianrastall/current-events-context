Date: '2010-04-04'
Source_URI: Portal:Current events/2010 April 4
Intelligence_Payload:
  Uncategorized:
  - 114 miners trapped in a flooded mine for more than a week in Shanxi, China, are
    rescued. (AP) (Xinhua)
  - At least 10 Indian security personnel are killed and three injured when Maoist
    guerrillas blow up a police bus in Orissa's Koraput district. (Times of India)
  - President of Senegal Abdoulaye Wade announces in a televised address marking 50
    years of independence that his country is to resume control of all military bases
    held by former colonial power France. (BBC) (Al Jazeera) (euronews)
  - The Chinese coal ship Shen Neng 1 is reported to be leaking oil after it ran aground
    on the Great Barrier Reef off Queensland, Australia. (Al Jazeera)
  - Three car bombs hit the Egyptian, German and Iranian embassies in the centre of
    the Iraqi capital, Baghdad, in quick succession, killing at least 30 people. (BBC)
  - President of Afghanistan Hamid Karzai threatens to join the Taliban if the Afghani
    Parliament refuses to approve his proposal to take control of the electoral apparatus
    from the United Nations. (Wall Street Journal Online)
  - A 7.2-magnitude earthquake hits Baja California, about 108 miles east-southeast
    of Tijuana, says the U.S. Geological Survey. (USGS Earthquake Hazards Program)
    (News Channel 10)
  - Secretary-General of the United Nations Ban Ki-moon witnesses one of the world's
    worst environmental disasters as he flies over the shrinking Aral Sea, the world's
    fourth largest lake, which has in recent decades shrunk in size by more than 70
    percent. (UN)
  - Iran invites 60 countries to a two-day nuclear disarmament conference in Tehran
    on April 17–18, entitled "Nuclear energy for everyone, nuclear arms for no one".
    China says it will attend the conference which invites "the world to disarm and
    prevent proliferation". (Al Jazeera)
