Date: '2010-04-24'
Source_URI: Portal:Current events/2010 April 24
Intelligence_Payload:
  Uncategorized:
  - In separate events, 29 people are killed in a suicide attack on a prison van,
    six NATO oil tankers are torched, and the Pakistan Army attacked Taliban fighters.
    (Arab News)
  - Paraguay passes a bill, requested by President, Fernando Lugo, that suspends constitutional
    rights for 30 days in parts of the country after the Paraguayan People's Army
    (PPA) kills four people. (BBC)
  - A tornado in Mississippi kills at least 10 people. (USA Today)
  - Prime Minister Abhisit Vejjajiva of Thailand rejects protester demands to dissolve
    the Parliament within 30 days. (Sky News)
  - A strong earthquake measuring 6.1 strikes in the Maluku Islands north of Ambon
    Island. (Arab News)
  - al-Shabaab seizes three towns from Ahlu Sunna Waljama'a in central Galguduud,
    Somalia. (Al Jazeera)
  - Iraq holds funerals for those killed in yesterday's series of bombings in Baghdad.
    (Al Jazeera)
  - Russia's Proton-M rocket sends a United States SES-1 telecommunications satellite
    into space. (Xinhua)
  - An unmanned American aircraft kills seven militants in Pakistan. (Washington Post)
  - Tens of thousands of people rally and lay flowers at a monument in Yerevan to
    the victims on the 95th anniversary of the Armenian Genocide. (Al Jazeera)
  - Marchers march in a dozen Spanish cities, including thousands in Madrid, to support
    Judge Baltasar Garzón who has been told he may face a trial for launching an inquiry
    into the acts of General Francisco Franco. Falange arranges a smaller protest
    in Madrid in opposition to Garzón. (BBC) (CBC)
  - Former Nazi corporal and founder of Villa Baviera in Chile Paul Schäfer dies in
    prison at the age of 88. (BBC) (Deutsche Welle) (France24) (Philippine Daily Inquirer)
  - Wang Lequan, Communist Party secretary since 1994, is replaced by Zhang Chunxian
    as the most powerful official in Xinjiang. (BBC) (Arab News) (The Hindu) (South
    China Morning Post)
  - Two German men held in Abia State, Nigeria are released six days after being seized
    on a swim. (BBC)
  - The Cheonan, which was destroyed in the Baengnyeong incident, is recovered. (Sky
    News)
  - Mumbai's Oberoi Hotel reopens 18 months after sustaining damage in the 2008 Mumbai
    attacks. (BBC)
  - Prince Philip, Duke of Edinburgh injures his ankle in a carriage driving accident
    on the Queen's Windsor estate. (Arab News)
  Child sexual abuse in the Roman Catholic Church:
  - In Chile, Catholic Church leaders and President Sebastián Piñera meet for more
    than an hour to discuss the child sexual abuse scandal and agree to send a letter
    to all the country's parishes. (BBC)
  - A retired priest says he was ignored when he spoke out about Belgium's longest-serving
    bishop having sexually abused a boy years before his admission and immediate resignation
    yesterday. (CBC)
