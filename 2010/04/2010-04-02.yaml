Date: '2010-04-02'
Source_URI: Portal:Current events/2010 April 2
Intelligence_Payload:
  Uncategorized:
  - United States Department of Labor announces second solid growth in jobs since
    the recession. (Los Angeles Times) (Business Week)
  - Bishop of Down and Connor Noel Treanor says at St Peter's Cathedral, Belfast in
    Northern Ireland that the "crimes and sins of abuse of children and minors by
    clergy and religious" are "faith-shaking". (RTÉ) (The Times) (The Australian)
  - Rescue teams attempting to reach 153 miners trapped in a flooded coal pit in Shanxi
    report "signs of life", including "tapping", "banging" and "shouts", as relatives
    allege an official cover-up of the incident. (BBC) (The Guardian)
  - Brazilian land reform activist Pedro Alcantara de Souza is fatally shot five times
    in the head by two men on motorcycles as he tries to ride his own bicycle in Pará.
    (BBC) (Miami Herald) (Arabnews)
  - Soyuz TMA-18 is launched from the Baikonur Cosmodrome, carrying three members
    of the Expedition 23 crew of the International Space Station. (CNN)
  - Three men are charged with murder in the fatal stabbings of two men on a New York
    City Subway over the weekend. (AP) (CBS) (The New York Times) (CKOY)
  - Record rains cause flooding across New England, with Rhode Island hit the hardest.
    Federal Emergency Management Agency (FEMA) officials say as many as 200,000 people
    in Rhode Island could be affected. President Barack Obama talks to Governor Don
    Carcieri about the damage. (My Fox Boston) (Boston Channel) (The Boston Globe)
    (CNS)
  - Limerick pubs break with tradition by opening on Good Friday following the recent
    landmark court ruling. (RTÉ) (The Irish Times) (Irish Examiner)
  - Another nationwide blackout affects Malta due to a technical fault. (MaltaMediaOnline)
    (Times of Malta)
