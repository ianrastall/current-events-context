Date: '2010-04-29'
Source_URI: Portal:Current events/2010 April 29
Intelligence_Payload:
  Uncategorized:
  - Deepwater Horizon drilling rig explosion in the Gulf of Mexico
  - The United States Coast Guard begins a controlled burn to remove oil spilled in
    the aftermath of the Deepwater Horizon disaster. (BBC News)
  - As economic losses begin to mount, shrimp fishermen in Louisiana and Alabama file
    class action lawsuits against the oil company BP and owners of the drilling rig
    (Reuters)
  - A U.S. government panel, the U.S. Commission on International Religious Freedom,
    names Saudi Arabia and China among 13 countries as the most serious violators
    of religious freedom. (VOA) (AP) (USA Today)
  - Millions of mostly Asian women who work in countries like Saudi Arabia, Lebanon
    and the United Arab Emirates remain at risk of human trafficking, forced labor,
    confinement and sexual violence, the New York-based Human Rights Watch group reports.
    (The Jakarta Globe)
  - India and Pakistan agree to reopen discussion on "all issues of mutual concern."
    (LA Times) (Times of India)
  - Twenty-eight children and three adults are stabbed at a nursery school in China.
    (BBC News) (China Daily)
  - The U.S. Food and Drug Administration (FDA) approves Provenge (sipuleucel-T),
    the first "vaccine" approved to treat cancer, for men with advanced prostate cancer.
    (USA Today)
  - Belgium's parliament votes to ban the wearing of burqas and other face coverings
    in public. (The Telegraph)
  - The United States tells Israel that it must remove 23 West Bank outposts, as previously
    promised. (Jerusalem Post)
  - The third round of leaders' debates takes place in the United Kingdom. (NY Times)
  - Human rights workers Beatriz Alberta Cariño Trujillo and Jyri Antero Jaakkola
    were killed by paramilitaries in the Mexican state of Oaxaca. (The Washington
    Post)
  - Pakistani security forces announce that Taliban leader Hakimullah Mehsud is likely
    still alive, contrasting early reports that stated a January 2010 drone attack
    had killed him. (LA Times)
