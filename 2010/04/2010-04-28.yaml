Date: '2010-04-28'
Source_URI: Portal:Current events/2010 April 28
Intelligence_Payload:
  Uncategorized:
  - Niger faces total crop failure worse than that of 2005, according to United Nations
    Under-Secretary-General for Humanitarian Affairs and Emergency Relief Coordinator
    John Holmes. (BBC) (Reuters)
  - A Thai soldier dies in a flareup of tensions in the ongoing conflict between pro-
    and anti-government factions in Thailand. (Wall Street Journal)
  - The United States Coast Guard plans a controlled burn to remove spilled oil in
    the aftermath of the Deepwater Horizon disaster. (MarketWatch)
  - Russia posts once classified documents relating to the Katyn massacre online.
    (The Guardian)
  - President of Iran Mahmoud Ahmadinejad has applied for a visa to visit the United
    States next week for the Non-Proliferation Treaty review conference, and State
    Department spokesman Philip Crowley has said they will likely be approved, although
    "a face-to-face meeting between a US diplomat and an Iranian diplomat is highly
    unlikely" (BBC) (AFP) (AP) (The Star)
  - A report blames pilot error for the 2007 crash of Kenya Airways Flight 507 in
    Cameroon. (BBC) (CBC) (Reuters Africa)
  - United States Secretary of the Interior Ken Salazar approves Cape Wind, the nation's
    first off-shore wind farm. (BBC News)
  - Team China is stripped of a 2000 Olympics bronze medal in women's gymnastics after
    it is revealed that one member of the team was underage. (NY Times)
  - UK Prime Minister Gordon Brown is described as "mortified" after an open-mic incident
    during general election campaigning recorded him describing a Rochdale voter as
    a "bigoted woman". (BBC News)
  Israeli–Palestinian conflict:
  - Israeli soldiers open fire on protesters who approached the Israeli border from
    Gaza, killing a 20-year-old Palestinian man. The Israeli military says the demonstrators
    were throwing stones at soldiers and setting fires. (Haaretz) (New York Times)
    (Al Jazeera) (Press TV)
  - Four Palestinians die in a tunnel beneath the Egyptian border with the Gaza Strip,
    possibly after the tunnel was filled with gas or blown up. (BBC) (Ynetnews)
