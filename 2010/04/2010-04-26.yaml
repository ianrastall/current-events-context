Date: '2010-04-26'
Source_URI: Portal:Current events/2010 April 26
Intelligence_Payload:
  Uncategorized:
  - Belgium's King Albert accepts the resignation of Prime Minister Yves Leterme,
    ending his government's term and leading to early elections in June 2010. (BBC)
  - In elections marred by boycotts and fraud allegations, Omar al-Bashir is re-elected
    president of Sudan despite facing war crimes charges and an international arrest
    warrant. (USA Today)
  - Robotic submarines attempt to stop leaking oil in the aftermath of the Deepwater
    Horizon drilling rig explosion. (The Globe and Mail)
  - The British ambassador to Yemen, Timothy Torlot, survives an attempted suicide
    bombing. (Washington Post)
  - Former dictator of Panama, Manuel Noriega is extradited from the United States
    to France. (CNN)
  - Noma, located in Copenhagen, Denmark, is named as the "world's best restaurant"
    in Restaurant magazine's annual survey. (The Guardian)
  - A 6.5~6.9 earthquake strikes near Taitung, south east of Taiwan. (Focus Taiwan)
    (Xinhua)
  - By a 6-5 margin, a United States federal appeals court rules that a sex-discrimination
    lawsuit, the largest employment discrimination case in history, against Wal-Mart
    can continue. (NY Times)
  - The United States Supreme Court agrees to hear a case challenging laws that forbid
    the selling of violent video games to minors. (LA Times)
  - A Hamas militant is killed in Hebron after a shootout with the Israeli Defense
    Forces. (Jerusalem Post) (Sydney Morning Herald) (BBC)
  - South Koreans pay tribute to the victims of the sinking of the ROKS Cheonan in
    March. (Yonhap) (Xinhua) (Al Jazeera)
  - The Government of South Korea announces the completion of the world’s longest
    seawall in a reclaimed tidal flat in Gunsan, North Jeolla Province. (Korea Herald)
  2010 Thai political protests:
  - Several grenade attacks occur at the homes of former Thai Prime Minister Banharn
    Silpa-archa and in Chiang Mai. (Bangkok Post)
  - Red shirt protesters set up roadblocks to prevent police reinforcements from reaching
    the capital Bangkok. (BBC) (Thai News Agency)
  - Yellow shirt protesters say they will take action against the red shirts if the
    authorities do not deal with the protests. (Al Jazeera)
