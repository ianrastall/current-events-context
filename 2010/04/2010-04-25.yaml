Date: '2010-04-25'
Source_URI: Portal:Current events/2010 April 25
Intelligence_Payload:
  Uncategorized:
  - The International Court of Arbitration in The Hague orders the British government
    to pay £400 million to Iran for an arms deal cancelled following the Iranian Revolution.
    (Ha'aretz) (Press TV) (ABC News)
  - 55 people are killed and 85 injured after clashes between Arab nomads from the
    Darfur region of Sudan and the Southern Sudan army. (Al Jazeera) (BBC) (AFP)
  - An inquiry is launched as at least 80 schoolgirls in different Kunduz schools
    are poisoned this week; the Taliban, opposed to female education, denies any knowledge.
    (BBC) (Japan Today) (Reuters)
  - Zhou Qiang succeeds Zhang Chunxian as the provincial party secretary of Hunan
    Province in China. (China Daily)
  - At least five people are killed and 20 others are injured by a bomb blast at a
    cafe in the Ethiopian town of Adi Haro. (Al Jazeera)
  - Israeli police clash with Palestinian protesters objecting to an "extremely provocative"
    march by settlers in Silwan in East Jerusalem, calling for the removal of Palestinians
    who live in the area. (Al Jazeera)
  - Mexican Labour Party leader in Guerrero Rey Hernández dies after being shot at
    least seven times outside his home in Tlacoachistlahuaca. (The Times of India)
    (People's Daily Online)
  - Hungary's Fidesz – Hungarian Civic Union wins a historic two-thirds general election
    victory, according to second round results. (BBC) (CBC) (The Daily Telegraph)
  - Heinz Fischer wins the Austrian presidential election, 2010. (Al Jazeera) (CBC)
    (The Irish Times)
  - Nearly 100,000 people rally in Okinawa, Japan, demanding the removal of an American
    base from the island. (Kyoto) (Washington Post) (China Daily)
  - Thousands of people rally in Beirut to ask for the separation of religion and
    state in Lebanon. (Al Jazeera)
  - A huge fire destroys hundreds of homes and leaves thousands homeless in Quezon
    City, Philippines. (ABS-CBN News) (BBC)
  - The Spanish Navy captures eight suspected pirates off the Somalia coast. (Press
    TV) (The Washington Post)
  - The Ladies in White are stopped from marching in Havana but stand silently instead.
    (BBC) (The Miami Herald)
  - Cuba's Speaker of the Parliament Ricardo Alarcón challenges the United States
    to lift its 48-year embargo on the island if it believes Cuba benefits from the
    embargo, as Hillary Clinton suggested. (euronews) (Press TV) (Channel News Asia)
  - Iranian Minister for Foreign Affairs Manouchehr Mottaki meets the head of the
    International Atomic Energy Agency (IAEA) in Vienna and says Iran remains interested
    in a nuclear fuel swap drafted by the United Nations. (Al Jazeera) (Press TV)
    (Xinhua)
  - Chennai Super Kings defeat Mumbai Indians to win the third Indian Premier League
    cricket tournament. CNN, Al Jazeera, Sydney Morning Herald
  - South African President Jacob Zuma announces that he is HIV-negative in an effort
    to promote AIDS awareness. (BBC) (China Post) (France24) (News24)
  - Bollywood superstar Amitabh Bachchan reveals he has cirrhosis of the liver. (BBC)
    (CBC) (The Straits Times) (The Times)
  - Professor Stephen Hawking warns humans about the dangers of contacting extraterrestrials.
    (BBC) (Fox News) (The Hindu) (Sky News) (The Sunday Times)
  - The United Kingdom Professional Footballers' Association votes Wayne Rooney as
    "player of the year". (BBC) (The Daily Telegraph)
  - The first passenger flight between Iraq and the United Kingdom in two decades
    touches down at London Gatwick Airport, nine days overdue because of volcanic
    ash problems. (BBC)
  London Marathon:
  - Tsegaye Kebede wins the men's marathon with a time of 2:05:19; Liliya Shobukhova
    wins the women's marathon with a time of 2:22:00. (USA Today)
  - Princess Beatrice of York becomes the first royal to complete the London Marathon.
    (The Daily Telegraph)
  Pope Benedict XVI and his upcoming visit to Britain:
  - The British Foreign and Commonwealth Office apologises after The Sunday Telegraph
    obtains a "foolish" document calling for the upcoming September visit of Pope
    Benedict XVI to be marked by the launch of "Benedict-branded" condoms, the opening
    of an abortion clinic and the blessing of a same-sex marriage. (BBC) (The Guardian)
    (RTÉ)
  - The Vatican downplays the incident and says it will continue to visit despite
    the diplomatic gaffe. (National Post)
