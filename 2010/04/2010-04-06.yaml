Date: '2010-04-06'
Source_URI: Portal:Current events/2010 April 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Naxalite–Maoist insurgency: At least 70 Indian soldiers are killed in an attack
    by Naxalites in the Dantewada district of Chhattisgarh. (The Times of India) (AP)'
  - 'Iraq War: At least eight explosions rock Baghdad and kill at least 35 people
    and wound over 140 others. (Al Jazeera)'
  - 'Kyrgyz Revolution of 2010: Hundreds of protesters seize a government office in
    Bishkek to request the resignition of Kurmanbek Bakiyev after battling flashbangs
    and lachrymators. A local governor is taken hostage by protesters. Hundreds surround
    police HQ. Almazbek Atambayev is seized by police. There are riots in Talas. (BBC
    News)'
  - 'Piracy in Somalia: A South Korean warship catches up with an oil tanker that
    was hijacked by Somali pirates in the Indian Ocean. (BBC News) (Korea Times)'
  Israeli–Palestinian conflict:
  - Palestinians fire another Qassam rocket at southern Israel, causing no harm, despite
    Gaza groups agreement to stop rockets attacks. (The Jerusalem Post)
  - Teenager from the Gaza Strip who was alleged to have been killed by IDF soldiers
    last week, released from an Egyptian prison, after infiltrating the Egyptian border
    through an underground tunnel and saying that he and several Palestinian teenagers
    who were with him were tortured by Egyptian soldiers while in prison. (The Jerusalem
    Post)
  - The Israeli military criticises its own soldiers for killing four young Palestinian
    demonstrators near Nablus in the West Bank in March, with the Commander describing
    the killings as "an unnecessary operational occurrence with dire consequences".
    (BBC News) (Arab News)
  - Israel's Nahalat Shimon settler group presents an eviction warrant to two further
    Palestinian families in East Jerusalem, bringing the current total number of Palestinian
    houses facing eviction in that neighbourhood to eight. (Arab News)
  - Israeli troops arrest for an unrevealed reason three Palestinian civilians in
    Beit Ommer village and later move them to a military detention centre, as the
    Israeli military also ransacks homes in Nablus and Hebron. (The Muslim News)
  - Egypt allows a rare opening of the Rafah border to permit the first-known Palestinian
    conjoined twins, their family and a medical team to travel to the National Guard
    Hospital, Riyadh, Saudi Arabia, for separation surgery 10 days after their birth.
    Abdullah of Saudi Arabia is to pay for the surgery. (Haaretz)
  - 23-year-old Israeli Arab Rawi Fuad Sultani is imprisoned for nearly six years
    for passing on sensitive information about Israeli Army Chief Gabi Ashkenaz. (BBC
    News) (France24) (The Jerusalem Post) (Haaretz)
  Arts and culture:
  - Vigils and a musical requiem are among a series of events held in L'Aquila to
    mark the first anniversary of one of Europe's largest post-war natural disasters.
    (BBC News)
  Business and economy:
  - AOL announces it is to sell or shut down Bebo two years after purchasing it. (BBC
    News) (The Wall Street Journal) (The New Zealand Herald)
  - United States Court of Appeals for the District of Columbia Circuit rules that
    the FCC cannot enforce net neutrality and that Comcast can limit its customers'
    access to BitTorrent. (The New York Times) (Wired News)
  Disasters and accidents:
  - About 103 people are killed in flooding and mudslides in Rio de Janeiro state
    in Brazil. Of the total, thirty-three people died in the city of Rio de Janeiro,
    while 33 were killed in the neighbouring city of Niterói, 12 people dead in São
    Gonçalo, and one in Petrópolis. (BBC News) (Al Jazeera) (Xinhua) (AP) (O Estado
    de S. Paulo)
  International relations:
  - Details of North Korea's own Red Star operating system emerge. (BBC News) (IOL)
  - Prime Minister of Turkey Recep Tayyip Erdoğan, speaking about 100,000 Armenian
    illegal immigrants currently living in Turkey, says "I may have to tell these
    100,000 to go back to their country because they are not my citizens. I don't
    have to keep them in my country". (Ethiopian Review)
  - Hackers based in China access classified Indian documents, emails of the Dalai
    Lama, offices of the United Nations and the Pakistani embassy in the United States.
    (BBC News) (Times of India) (CBC)
  Law and crime:
  - Turkish police arrest at least 14 military officers, including four generals,
    accused of a 2003 coup plot. (Al Jazeera) (BBC News) (Reuters)
  - Baton-wielding Egyptian police disperse a pro-democracy demonstration in Cairo.
    (BBC News) (Reuters) (The Washington Post)
  - South African police build a barricade from razor wire to curtail people scuffles
    outside Ventersdorp Magistrate's court where two farm workers, aged 15 and 28,
    are charged with Saturday's murder of white supremacist leader Eugène Terre'Blanche.
    (BBC News) (IOL)
  - President of Yemen Ali Abdullah Saleh frees prisoners as part of its support for
    the cease-fire. (Arab News)
  Politics and elections:
  - Campaigning ahead of Sri Lanka's parliamentary election comes to an end. (Al Jazeera)
  - British Prime Minister Gordon Brown calls a general election for 6 May. (BBC News)
    (Al Jazeera) (RTÉ)
  - Lord Saville is asked to hold back until after the UK general election the publication
    of the Bloody Sunday (1972) report into the killing of 14 unarmed civil rights
    protesters by British Army paratroopers in Bogside, Derry. (RTÉ) (The Guardian)
    (BBC News)
  - Nigeria's acting President Goodluck Jonathan inaugurates a new Cabinet. (NEXT)
    (BBC News)
  Science and technology:
  - Announcement of first animals that spent their entire lives without oxygen were
    discovered in depths of Mediterranean Sea. They belong to three new species from
    phylum Loricifera. (BMC Biology) (Nature)
