Date: '2010-04-05'
Source_URI: Portal:Current events/2010 April 5
Intelligence_Payload:
  Uncategorized:
  - A series of coordinated bombings at the U.S. consulate in Peshawar and at a ruling
    party rally in the Pakistani North-West Frontier Province kills fifty people and
    injures one hundred. (Reuters)
  - An explosion at a coal mine in Raleigh County, West Virginia kills 25 miners and
    leaves several missing. This is the deadliest mining accident in the U.S. in at
    least 35 years. (BBC News) (Herald Sun)
  - The United States Supreme Court declines to take up a case by residents of Bikini
    Atoll and Enewetak in the Marshall Islands, who are seeking compensation for U.S.
    nuclear tests conducted on the islands. (Christian Science Monitor)
  - 'Iraq War: WikiLeaks releases a video from 2007 showing the killing of civilians,
    including two Reuters news staff, by the U.S. military in Baghdad, Iraq. (BBC
    News)'
  - The Centers for Disease Control and Prevention is currently attempting to gauge
    the risk of the recently-discovered XMRV virus, linked to rare forms of prostate
    cancer and chronic fatigue syndrome, to the blood donation supply. (The Wall Street
    Journal)
  - A United Nations peacekeeper dies in Mbandaka, Équateur, Democratic Republic of
    Congo. (GBN)
  - The Duke Blue Devils defeat the Butler Bulldogs, 61-59, to win their fourth U.S.
    men's college basketball title. (CBS News)
