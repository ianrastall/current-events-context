Date: '2010-01-23'
Source_URI: Portal:Current events/2010 January 23
Intelligence_Payload:
  Aftermath of the 2010 Haiti earthquake:
  - The Haitian government declares earthquake rescue operations over. (BBC)
  - The government announces a first precise death toll of 111,481. To date, it is
    the second-deadliest earthquake of the 21st century (after the 2004 Indian Ocean
    earthquake). (CNN)
  Joe Biden's visit to Iraq:
  - U.S. Vice President Joe Biden holds talks with Iraqi political leaders ahead of
    the March parliamentary election. (BBC)
  - Biden says the U.S. government will appeal in the Blackwater Baghdad shootings
    case. (BBC)
  Uncategorized:
  - Thousands of protesters demonstrate in Venezuela for and against the polices of
    President Hugo Chávez amid a currency revaluation and energy shortages in the
    country. (Reuters) (Al Jazeera)
  - Eight people are killed and 13 missing after flash floods and landslides hit Sulawesi,
    Indonesia. (News Australia) (Jerusalem Post)
  - Between 100 and 150 bodies are found stuffed in wells in the village of Kuru following
    religious clashes in Jos, Nigeria. (BBC) (AFP)
  - A passenger train in Iran derails, killing at least eight people and wounding
    at least fifteen others. (Press TV) (ISNA) (Reuters) (RTÉ) (The Canadian Press)
  - Japanese prosecutors question Representative Ichirō Ozawa over an alleged party
    funding scandal. (BBC) (Manilla Bulletin)
  - The American Civil Liberties Union condemns a U.S. Justice Department report that
    suggested 47 Guantánamo Bay detainees should be held indefinitely without trial.
    (BBC)
  - Jim McCormick, the director of the U.K. company manufacturing the controversial
    ADE 651 bomb detectors, is arrested on suspicion of fraud. (BBC)
  - A new assessment by the U.S. Geological Survey says Venezuela may hold double
    the oil reserves of Saudi Arabia. (BBC)
  - Former Thai Prime Minister Thaksin Shinawatra leaves Cambodia on the eve of anti-government
    protests in Thailand. (The Phnom Penh Post)
  - A strong weather system leaves damage in the U.S. states of California and Arizona
    after producing flooding rains, strong winds, and a rare outbreak of tornadoes
    in the region. (Los Angeles Times) (San Francisco Chronicle) (ABC News)
  - Canadians take to the streets to protest the prorogation of the 40th Canadian
    Parliament. (CBC) (Globe and Mail)
