Date: '2010-01-15'
Source_URI: Portal:Current events/2010 January 15
Intelligence_Payload:
  Uncategorized:
  - Johnson & Johnson recalls more than 53 million bottles of over-the-counter products,
    including Tylenol, Motrin and Rolaids, from the Americas, the United Arab Emirates
    and Fiji. (Reuters)
  - President Faure Gnassingbé and national team captain Emmanuel Adebayor are among
    dignitaries to attend a funeral ceremony held in Lomé for the two football officials
    killed during the Togo national football team attack in Angola. (BBC)
  - At least five people die and dozens are injured in Nairobi, Kenya, when police
    clash with protesters demanding the release of Jamaican Muslim cleric Abdullah
    al-Faisal. (Xinhua) (Al Jazeera)
  - President of Tunisia Zine El Abidine Ben Ali reshuffles his government, making
    11 ministerial changes including the appointment of new finance, defence, tourism
    and foreign affairs ministers, and sends his condolences to Haiti. (IOL) (Reuters
    Africa) (Middle East Online) (Xinhua)
  - Muslim fundamentalists kill two people, an army colonel and the military commander
    of Béjaïa in northern Algeria. (IOL)
  - 23 security guards are detained after clashing over the care of a taxi rank in
    Sundumbili, KwaZulu-Natal. (IOL)
  - Spain's government sees a video showing three aid workers who have been held hostage
    by Al-Qaeda in Mali since November 2009. (IOL)
  - In the Kamsar area, north of Muzaffarabad, Kashmir, a Chinese road-building firm
    digs up a van containing 17 decomposed corpses which went missing during a 2005
    earthquake. (BBC)
  - Mr Gay China, said to be the first gay Chinese pageant, is shut down by police
    an hour before opening. (BBC) (The Times) (Philippine Daily Inquirer)
  - Russia ratifies key European Court of Human Rights reform. Russia was the last
    of the 47 Council of Europe member-states to ratify Protocol 14. (Al Jazeera)
    (RT) (NY Times) (BBC) (ITAR-TASS) (FT) (RFERL)
