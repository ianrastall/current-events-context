Date: '2010-01-28'
Source_URI: Portal:Current events/2010 January 28
Intelligence_Payload:
  Uncategorized:
  - The U.S. Senate votes to give Ben Bernanke a second term as chair of the Federal
    Reserve. (AP)
  - J. D. Salinger, author of the novel The Catcher in the Rye, dies at the age of
    91. (BBC) (CBC) (RTÉ)(TIME) (The Times)
  - The death toll from yesterday's apartment collapse in Liège reaches nine as the
    search for bodies is temporarily suspended due to the danger caused by other falling
    buildings. (Reuters India) (RTÉ) (TVNZ)
  - Three players are dismissed during the semi-final football match between rivals
    Algeria and Egypt in the 2010 Africa Cup of Nations, months following their previous
    meeting which led to international violence and diplomatic skirmishes. (magharebia.com)
    (BBC) (USA Today)
  - Colombia makes a formal diplomatic protest to Venezuela over the latter's alleged
    violation of Colombian airspace by a military helicopter. (BBC) (RIA Novosti)
    (Colombia Reports)
  - Sudan's ruling National Congress Party endorses South Sudan President Salva Kiir
    in upcoming elections. (BBC) (Sudan Tribune)
  - Former French Prime Minister Dominique de Villepin is cleared of charges of complicity
    to false denunciation in the Clearstream affair. (France 24)
  - Iran executes two opposition supporters for their role in the election protests
    in the country. (Al Jazeera) (The Times) (WSJ)
  Aftermath of the 2010 Haiti earthquake:
  - The International Monetary Fund loans US$114 million to Haiti following the recent
    earthquake devastation, with the full amount due to be transferred by the end
    of the week. (The Straits Times) (The Hindu)
  - Teenager Darlene Etienne is pulled alive from the rubble of Port-au-Prince "happy
    but dehydrated" 16 days after being buried, having spent the time drinking Coca-Cola
    and water from a bath. (BBC) (Indian Express) (The Sydney Morning Herald)
  - French medics report that American medics' risky "guillotine-amputations" were
    made too fast, patients now risking necrosis, septicemia, and requesting later
    a 2nd amputation to better protect the patients. (LeMonde)
  North Korea:
  - North Korean vessels fire again across the Northern Limit Line maritime boundary
    with South Korea. (Yonhap) (RIA Novosti) (WSJ Europe)
  - An American man is detained after crossing into North Korea from China. (Al Jazeera)
    (BBC)
