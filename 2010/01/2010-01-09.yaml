Date: '2010-01-09'
Source_URI: Portal:Current events/2010 January 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - The United States warns against an attack by "regional extremists" on an Air Uganda
    flight between Uganda and Sudan. (BBC) (New Vision) (Sudan Tribune)
  - A bomb explodes outside the Greek Parliament in Athens with no casualties. (CNN)
    (China Radio International)
  - A fourth church is attacked in Malaysia as a row over the use of the word "Allah"
    by non-Muslims deepens. (Reuters) (Malayasian Star) (Sydney Morning Herald)
  Business and economy:
  - Venezuela's President Hugo Chávez announces that the national currency, the bolívar,
    will be devalued for the first time since 2005, by between 17% and 50%. (BBC)
    (Al Jazeera)
  Disasters and accidents:
  - A magnitude 6.5 earthquake strikes offshore near Eureka, California, with reports
    of damage and local power outages. (CNN)
  - Hundreds of flights are cancelled in Germany as the severe weather conditions
    across Europe continue. The government asks people to buy several days worth of
    food and retreat indoors for the rest of the week. (BBC) (Deutsche Welle)
  International relations:
  - Egypt bans all future aid convoys to Gaza, following recent clashes with Viva
    Palestina. (Al Jazeera) (AFP)
  Law and crime:
  - British MP and MLA Iris Robinson is expelled by the Democratic Unionist Party
    after further details emerge of her involvement in a political and sex scandal.
    (The Belfast Telegraph) (The Guardian)
  - 30 people are injured after bottles of acid are thrown from a building into a
    busy street in Hong Kong. (Radio Television Hong Kong) (BBC)
  - The Sri Lankan army releases over 700 former Tamil Tiger fighters after a rehabilitation
    program. (The Hindu) (AFP)
  - An Indian man is set on fire in Melbourne, Australia, in the latest in a series
    of attacks on Indian nationals in the country. (Sydney Morning Herald) (Press
    Trust of India) (AFP)
  Politics and elections:
  - South African President Jacob Zuma urges party unity and warns economic recovery
    will be slow at a gathering celebrating the 98th anniversary of the African National
    Congress. (Times LIVE) (Reuters) (BBC)
  - Taiwan's opposition Democratic Progressive Party wins all three seats in by-elections
    against the ruling Kuomintang. (Taiwan News) (Radio Television Hong Kong) (Reuters
    India)
  - Afghanistan's President Hamid Karzai resubmits his proposal for forming the cabinet
    after his previous selection was rejected by the National Assembly. (Press TV)
    (AFP)
  Togo national football team bus attack:
  - The Togo national football team withdraw from the 2010 Africa Cup of Nations as
    a third member of the team is confirmed dead following the attack on their team
    bus. (BBC) (Angola Press) (IOL) (The New York Times)
  - The Confederation of African Football announces that football matches will continue
    to be played in Cabinda Province where the attack took place. (The Daily Telegraph)
  - The Togo national football team later decide to reverse their decision to pull
    out of the Africa Cup of Nations. (AP via ESPN) (L'Équipe, in French)
  - The Togo government decides to pull them out anyway. (BBC Sport) (Philippine Times)
