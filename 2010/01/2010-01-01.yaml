Date: '2010-01-01'
Source_URI: Portal:Current events/2010 January 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 18 FARC rebels are killed while celebrating the New Year in an air raid
    by the Colombian Air Force in the south of the country. (Latin American Herald
    Tribune) (Al Jazeera)
  - '2010 Lakki Marwat suicide bombing: At least 95 people are killed, more than 100
    more are injured and 20 houses are destroyed after a suicide bomber blows himself
    up at a volleyball game in Lakki Marwat, northwest Pakistan. (The Times) (Express
    India) (BBC News)'
  Arts and culture:
  - Russians are surprised by a cartoon "gently lampooning" Dmitry Medvedev and Vladimir
    Putin who are portrayed dancing, singing and playing musical instruments. (BBC)
    (France 24)
  Business and economy:
  - China and the Association of Southeast Asian Nations (ASEAN) launch a Free Trade
    Area. (New York Times) (Xinhua)
  Disasters and accidents:
  - At least 19 people are dead and five are injured as mudslide hits an island resort
    near Angra dos Reis, Ilha Grande. Large numbers also killed elsewhere in Brazil.
    (BBC) (The Washington Post)
  Health:
  - A study suggests that teenagers who go to bed late are more likely to develop
    depression and to have suicidal thoughts. (BBC News) (CBC) (Sleep)
  - Researchers announce that the likely origin of devil facial tumour disease, a
    transmissible cancer which has caused the population of Tasmanian devils to collapse
    by 60% in the past decade, is Schwann cells. (BBC) (Time) (New York Times) (Science)
  International relations:
  - A Cambodian court issues an arrest warrant for opposition leader Sam Rainsy, for
    failing to turn up at court over a border dispute with Vietnam. (BBC) (Phnom Penh
    Post)
  - North Korea calls for the end of hostilities with the United States and a nuclear
    free Korean Peninsula, to restart talks; in its annual New Year editorial. (Yonhap)
    (CNN) (Al Jazeera)
  - Spain takes over the Presidency of the Council of the European Union from Sweden.
    (BBC News) (Deutsche Welle) (euronews)
