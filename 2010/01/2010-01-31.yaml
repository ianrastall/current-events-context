Date: '2010-01-31'
Source_URI: Portal:Current events/2010 January 31
Intelligence_Payload:
  Uncategorized:
  - Gunmen open fire on a student party in Ciudad Juárez, killing at least 13. (BBC)
    (Times of India)
  - President of Malawi Bingu wa Mutharika becomes the Chairman of the African Union.
    (AFP)
  - Roger Federer beats Andy Murray to win the men's singles title at the 2010 Australian
    Open. (BBC Sport)
  - Egypt become African Cup of Nations champions for a record third consecutive title
    after beating Ghana 1-0 in Estádio 11 de Novembro, Luanda, Angola, in the 2010
    Africa Cup of Nations final. (BBC Sport)
  - A Mw 5.2 earthquake in Sichuan province, China, kills one person and injures 11
    others, destroying at least 100 homes. (BBC News) (Bangkok Post) (Times of India)
  - The death toll from flooding in southern Peru rises to 20. (BBC News)
  - The Movement for the Emancipation of the Niger Delta (MEND), a militant group
    in the Niger delta region of Nigeria, announces the end of its unilateral ceasefire.
    (The Punch) (BBC News)
  - Thirteen soldiers in Burundi have been arrested for allegedly plotting a coup
    to overthrow President Pierre Nkurunziza. (BBC News) (Afrique en ligne)
  - The remains of 250 British and Australian soldiers who died in the Battle of Fromelles
    during World War I are reburied in the first new Commonwealth War Graves Commission
    cemetery to be constructed in 50 years. (BBC News)
  - A suicide bomber kills at least sixteen people in a market in Khar in north-western
    Pakistan. (Daily Times of Pakistan) (BBC News)
