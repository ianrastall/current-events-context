Date: '2010-01-10'
Source_URI: Portal:Current events/2010 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three Palestinian Islamic Jihad operatives are killed while firing mortars into
    Israel from Gaza. (The Jerusalem Post)
  - The Sunday Mirrors defence correspondent Rupert Hamer is killed in an explosion
    in Afghanistan, becoming the first British journalist to be killed there and the
    first to be killed in a war zone since 2003. (BBC) (Channel 4 News) (The Daily
    Telegraph)
  - Some more churches are attacked in Malaysia. (BBC) (News24)
  - 15 people are killed and 15 are injured, five seriously, when a bus and truck
    collide on a major highway in the Sahara Desert in Ghardaïa Province, Algeria.
    (Press TV) (Reuters)
  Arts and culture:
  - It is revealed that AHS Centaur, an Australian hospital ship dating from World
    War II, has been viewed for the first time since it was torpedoed by the Japanese
    in May 1943 killing 268 people. (BBC) (ABC News) (news.com.au) (The Sydney Morning
    Herald)
  Business and economy:
  - China overtakes Germany to become the world's largest exporter. (Xinhua) (BBC)
    (Al Jazeera)
  Disasters and accidents:
  - Winter of 2009–2010 in Europe
  - More than 160 people are trapped in vehicles overnight in Germany, dozens of flights
    are cancelled, Berlin and Leipzig are buried under 30cm of snow, parts of Schleswig-Holstein
    remain unreachable. The electricity of 80,000 people is cut off by snow in Poland.
    Eurostar services are affected in Belgium, Britain and France. (BBC)
  Law and crime:
  - Sheikh Issa bin Zayed Al Nahyan, brother of the leader of the United Arab Emirates,
    Khalifa bin Zayed Al Nahyan, is acquitted of beating a former business partner
    in a videotaped attack. (Reuters) (The Daily Telegraph) (Al-Bawaba)
  - Britain is set to ban a Muslim group, Al-Muhajiroun, also known as Islam4UK, that
    recently caused outrage by proposing a demonstration in the town that receives
    the bodies of British war dead killed abroad, the Home Office says. (CNN)
  - President of Sinn Féin Gerry Adams receives a death threat. (RTÉ) (Ireland Online)
    (The Irish Times)
  Politics and elections:
  - Ivo Josipović wins in the second round of the presidential election, and is elected
    third President of Croatia. (Deutsche Welle) (Al Jazeera) (BBC)
  - Ahead of the Iraqi parliamentary election, 2010, the De-Ba'athification Commission
    recommends banning the leaders of the Iraqi National Dialogue Front, the Coalition
    for Iraqi National Unity and 13 other parties for links to Saddam Hussein's banned
    Ba'ath Party. (The Washington Post)
  Sport:
  - With the 2010 Africa Cup of Nations due to get underway in Angola, confusion surrounds
    the participation of Togo following the fatal attack on their team bus. Their
    Prime Minister Gilbert Houngbo sends a plane to bring them home. (BBC)
