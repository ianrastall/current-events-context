Date: '2010-01-11'
Source_URI: Portal:Current events/2010 January 11
Intelligence_Payload:
  Arts and culture:
  - People in 16 countries in 44 cities from Adelaide to Zürich cause "scenes of chaos
    and joy in public places" by removing their trousers in public, with 3,000 people
    doing it in New York alone. (BBC) (The Independent) (Ottawa Citizen)
  Business and economy:
  - The People's Republic of China conducts a land-based high-altitude anti-ballistic
    missile test. (SINA News) (Yahoo! News)
  - The Chinese Academy of Social Sciences reports that more than 24 million Chinese
    men of marrying age will be without spouses by the end of the decade, citing an
    uneven birth rate. (Global Times) (BBC)
  Health:
  - United Nations Secretary-General Ban Ki-moon outlines seven priorities for 2010
    and urges a renewed focus on sustainable development, ending poverty, disease
    and hunger. (UN News Centre) (Sudan Tribune)
  - Wolfgang Wodarg, the Council of Europe's head of health affairs, claims that the
    2009 flu pandemic was a "false pandemic" orchestrated by the pharmaceutical industry
    to sell vaccines. (The Sun)
  - The New York City Health Department seeks national reduction of salt in food.
    (CNN)
  - The United Nations seeks to virtually eliminate mother-to-child transmission of
    HIV/AIDS in Africa. Michel Sidibé visited Sauri in western Kenya, which is a village
    of the Millennium Villages Project. (UN News Centre)
  International relations:
  - North Korea proposes a peace treaty, replacing the Korean War armistice. (Yonhap)
    (AFP)
  - The Low Couch diplomatic spat between Israel and Turkey. Turkey demands Israeli
    apology.
  Law and crime:
  - Perry v. Schwarzenegger, a challenge to California Proposition 8 and likely a
    landmark case regarding same-sex marriage rights in the United States, begins
    in San Francisco. (Associated Press)
  - Hundreds of prisoners are transferred from the Ignacio Allende prison in Veracruz,
    Mexico, in preparation for a controversial Mel Gibson film shoot. Protests from
    relatives of the prisoners are ignored. (BBC) (Hindustan Times) (CBC News)
  - Northern Ireland's First Minister Peter Robinson temporarily hands over his position
    to Arlene Foster in the wake of the ongoing political scandal surrounding his
    wife and fellow politician Iris Robinson.
  Politics and elections:
  - Thousands of supporters of former Thai Prime Minister Thaksin Shinawatra gather
    outside the home of a royal adviser accused of involvement in the 2006 coup that
    ousted the Prime Minister. (Thai News Agency) (Reuters) (Al Jazeera)
  Science and technology:
  - Tombs discovered near Egypt's pyramids reinforce the theory they were built by
    free workers rather than slaves. (BBC News)
  Sport:
  - Angola makes two arrests over an attack on the Togo national football team in
    Cabinda Province. (Angola Press)(CNN) (Xinhua)
  - The 2010 Africa Cup of Nations continues without Togo as Malawi unexpectedly beat
    World Cup qualifiers Algeria by three goals. (BBC) (The Times) (Al Jazeera)
