Date: '2010-01-16'
Source_URI: Portal:Current events/2010 January 16
Intelligence_Payload:
  Uncategorized:
  - Previously unknown Florence Green, at 108, is believed to be Britain's oldest
    surviving UK-resident First World War veteran, and the last known female First
    World War veteran, having served with the Women's RAF (WRAF) in 1918 (The Daily
    Telegraph)
  - Spanish politician Gaspar Llamazares says the United States's Federal Bureau of
    Investigation (FBI) use of his photo in its "shameless" digital manipulation of
    Osama Bin Laden for a wanted poster, has left him insecure and worried about travelling
    to the United States in future. (BBC) (Sky News) (The Daily Telegraph)
  - The German government asks its citizens to stop using Microsoft's web browser
    Internet Explorer to protect their own security. (BBC) (The Sydney Morning Herald)
    (The Daily Telegraph)
  - The first detailed measurements of the melting point of diamond indicate that
    it behaves similarly to water in that the solid floats on the liquid. (Discovery
    News) (Popular Science)
  - The Afghan parliament for a second time rejects most of President Hamid Karzai's
    cabinet nominees. (CNN) (The Hindu)
  - India's National Security Advisor M K Narayanan steps down as part of an overhaul
    of security in the country. (The Times) (Times of India)
  - China announces an increase of 28% in the number of internet users in the country,
    now at 384 million. (Times of India) (China Daily) (The Independent)
  - Authorities in Cuba are investigating the death of 26 patients at a psychiatric
    hospital after a spell of unusually cold weather. (BBC) (Havana Times)
  - Another church is attacked in Malaysia and a mosque also targeted for the first
    time in a row over the use of the word "Allah" by non-Muslims. (Times of India)
    (AFP)
  - Kenya will deport a radical Jamaican Muslim cleric Abdullah el-Faisal after protests
    against his detention led to rioting. (Reuters) (Daily Nation)
  - Australian police bust a $A18 million cannabis crop. The cannabis crop has been
    found growing on leased land in a national park in northern New South Wales. (Otago
    Daily Times)
  - Japanese politician Ichiro Ozawa vows to stay on after the arrests of several
    of his aides in a growing funding scandal in the Democratic Party of Japan. (Xinhua)
    (Canadian Press)
  Aftermath of 2010 Haiti earthquake:
  - A 4.5 magnitude aftershock strikes Haiti within days of the recent devastating
    earthquake. (Sky News)
  - The United Nations says the earthquake is the worst disaster it has ever had to
    deal with in its history. (The Daily Telegraph)
