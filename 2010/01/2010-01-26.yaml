Date: '2010-01-26'
Source_URI: Portal:Current events/2010 January 26
Intelligence_Payload:
  Uncategorized:
  - Authorities in Peru begin evacuating over 2,000 tourists stranded by heavy rains
    on Machu Picchu. (BBC)
  - A French parliamentary report backs a partial ban on the wearing of burkhas by
    Muslim women. (France 24) (Al Jazeera) (CNN)
  - The United States approves an arms sale to Taiwan, amid opposition from China.
    (Al Jazeera) (Radio Taiwan International)
  - Petelo Vikena, King of the Kingdom of Alo in Wallis and Futuna, abdicates after
    reports of vandalism and arson against royal property. (RNZI)
  - James Cameron's Avatar becomes the highest-grossing film of all time (not accounting
    inflation), surpassing his 1997 Titanic. (Wall Street Journal) (The Hollywood
    Reporter) (New York Post)
  - Voters in Sri Lanka go to the polls in a presidential election. (Daily News) (The
    Hindu) (Xinhua)
