Date: '2010-01-24'
Source_URI: Portal:Current events/2010 January 24
Intelligence_Payload:
  Aftermath of the 2010 Haiti earthquake:
  - Haiti is rocked by another earthquake. (CBC News) (RTÉ) (TVNZ)
  - The Haitian government announces the death toll from the recent earthquake has
    reached 150,000 in the capital Port-au-Prince alone. (BBC)
  - A minute's silence is held before games in the 2010 Africa Cup of Nations. (CNN)
  - France holds two fund-raising concerts in Le Zénith de Paris and the Bataclan.
    (France24)
  Uncategorized:
  - In the National Football League, the Indianapolis Colts and New Orleans Saints
    win playoff games to advance to Super Bowl XLIV. (AP)
  - One person is killed and three more are injured when an explosion occurs at a
    thermo-electric plant near Gryfino, Poland. (Ynetnews) (The Irish Times)
  - The Chinese government denies state involvement in the cyber attacks on Google,
    while the state-run China Daily newspaper accuses the United States of hypocrisy.
    (BBC) (China Daily)
  - A flight operated by Kolavia on behalf of Taban Air crashes on landing at Mashhad
    International Airport, Iran, injuring at least 46 people. (Press TV) (BBC) (The
    New York Times)
  - The Venezuelan government takes six cable television channels off the air, including
    RCTV, after they refused to transmit government messages. (BBC) (The New York
    Times)
  - Osama Bin Laden claims responsibility for the failed Christmas day bombing attempt
    in Detroit, United States, last year. (BBC) (The New York Times) (VOA)
  - Afghanistan postpones its upcoming parliamentary elections to 18 September due
    to lack of funds and security concerns. (The Guardian) (The New York Times)
  - North Korea says any attempt by South Korea to launch pre-emptive strikes against
    its nuclear facilities will be considered a declaration of war. (Yonhap) (BBC)
    (The New York Times)
  - At the NRJ Music Awards in Cannes, France, hip hop band Black Eyed Peas are mistakenly
    presented with an award for best international group which was intended for Tokio
    Hotel, while Rihanna falls off the stage during a live performance of "Russian
    Roulette". (BBC)
  - Quentin Tarantino's Inglourious Basterds wins the top prize at the 16th Screen
    Actors Guild Awards, with Jeff Bridges and Sandra Bullock winning best actors.
    (BBC) (The New York Times)
  - A spokesman for U.S. President Barack Obama expresses the administration's support
    for a second term for the incumbent Chairman of the Federal Reserve, Ben Bernanke,
    and says lawmakers would send a bad message by "playing politics in any way" with
    Bernanke's confirmation. (ABC News)
  - Sri Lankan opposition candidate General Sarath Fonseka receives the support of
    former President Chandrika Kumaratunga in the 2010 presidential election. (BBC)
  - The citizens of Nago, Okinawa, elect mayor Susumu Inamine, an opponent of the
    U.S. Marine Corps Air Station Futenma, which is crucial for Japan – United States
    relations. (The New York Times) (BBC News)
  - Authorities in Wales arrest two people in connection with the abandonment at the
    cathedral in Carlow, Ireland of an 8-month-old baby taken from Nottinghamshire,
    England. (RTÉ) (Sunday Independent) (BBC)
  - Ghana eliminate the hosts of the 2010 Africa Cup of Nations Angola following accusations
    of "intimidatory" tactics carried out by the country's security forces. (France24)
  - James Cameron's Avatar becomes (not accounting for inflation) the second highest
    grossing movie in the United States and Canada and the best selling movie overseas.
    (Variety) (BoxOfficeMojo)(Reuters) (HollywoodReporter)
