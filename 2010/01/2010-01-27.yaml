Date: '2010-01-27'
Source_URI: Portal:Current events/2010 January 27
Intelligence_Payload:
  Uncategorized:
  - At least 20 people are injured after a five-storey apartment building collapses
    following a gas explosion in Liège, Belgium. (The Daily Telegraph) (The Canadian
    Press) (RTÉ)
  - Incumbent President of Sri Lanka Mahinda Rajapaksa is declared the winner of Sunday's
    presidential election, defeating opposition candidate Sarath Fonseka. (BBC)
  - North Korea fires artillery shots into the sea near the disputed Northern Limit
    Line maritime border, with South Korea returning fire. (Yonhap) (BBC) (Times of
    India)
  - Prime Minister Gordon Brown and Taoiseach Brian Cowen leave Northern Ireland after
    three days spent discussing its future. (RTÉ) (BBC)
  - The highest surface wind gust ever recorded of 220 kt at Barrow Island, Australia
    in 1996 is ratified by the WMO. (Arizona State University) (WMO).
  - Ireland is hit by two earthquakes over a 24-hour period, described as "unusual"
    by experts. (RTÉ) (BBC) (The Irish Times)
  - The Supreme Court of the United Kingdom overturns two Orders in Council that froze
    the assets of unconvicted suspects in terrorism cases. (BBC News)
  - The Secretary of the Treasury of the U.S., Timothy Geithner, appears before a
    committee of the United States House of Representatives to discuss his actions
    in 2008, when he was the President of the Federal Reserve Bank of New York, in
    the rescue of troubled insurance industry giant AIG. (New York Times)
  - Steve Jobs unveils the Apple iPad, a tablet PC at a press conference in San Francisco.
    (Engadget)
  Machu Picchu mudslides:
  - New Zealanders, Britons, Chinese and Irish tourists are among the thousands trapped
    after mudslides in the Incan capital Machu Picchu. (The New Zealand Herald) (Sky
    News) (China Daily) (RTÉ)
  - Some wealthier tourists pay $500 to escape the devastation which has killed at
    least 10 people. (The Times)
  Aftermath of 2010 Haiti earthquake:
  - UK Prime Minister Gordon Brown says seven-year-old Charlie Simpson, who rode five
    miles and raised more than £200,000 for the 2010 Haiti earthquake fund, is "truly
    inspirational" as his spouse Sarah Brown meets him in his absence at Downing Street.
    (BBC)
  - Pop star Susan Boyle is "shocked but unharmed" after disturbing an intruder at
    her house in Scotland as she returns from recording her part for Simon Cowell's
    charity single for Haiti. (The Times) (CNN) (Washington Post)
