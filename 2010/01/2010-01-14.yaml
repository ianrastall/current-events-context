Date: '2010-01-14'
Source_URI: Portal:Current events/2010 January 14
Intelligence_Payload:
  Uncategorized:
  - India celebrates the Thai Pongal, Makar Sankranti and Magh Bihu harvest festivals
    in places around the country (Palayamkottai, Haridwar). (The Hindu)
  - 40 people are killed after two buses crash head-on in one of Papua New Guinea's
    worst ever road accidents. (The National) (AFP)
  - Seven people die in a stampede at a religious festival on the Ganges in West Bengal,
    India. (The Hindu) (BBC) (Press TV)
  - Venezuelan President Hugo Chávez partially reverses a decision to ration electricity
    in the country a day after it was announced, saying it was having "undesirable
    effects" on the population. Thus, Caracas residents won't have power cuts anymore.
    (El Universal) (AFP)
  - The head of Guinea's junta Moussa Dadis Camara and interim leader General Sékouba
    Konaté hold emergency talks with Burkina Faso's President Blaise Compaoré. (AFP)
    (BBC)
  - Mongolian President Tsakhiagiin Elbegdorj announces a moratorium on the death
    penalty, calling for it to be abolished. (BBC) (Al Jazeera) (China Daily)
  - A crew of eight Irish sailors is rescued after the Clipper Round the World Yacht
    Race competitor Cork Clipper hits a rock in Java, Indonesia. (RTÉ) (BBC) (Ireland
    Online)
  - A man is held in custody in Ireland after threatening that there was a bomb on
    board a transatlantic flight which had to land in an emergency at Shannon Airport.
    (RTÉ)
  - Taoiseach Brian Cowen meets Prime Minister Gordon Brown in London for talks on
    the devolution process in Northern Ireland. (The Irish Times) (RTÉ) (BBC)
  - A suicide bombing at a market in Afghanistan's Orūzgān Province kills 20 people.
    (BBC)
