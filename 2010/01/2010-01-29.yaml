Date: '2010-01-29'
Source_URI: Portal:Current events/2010 January 29
Intelligence_Payload:
  Uncategorized:
  - The Wittelsbach-Graff Diamond goes on public display in Washington, D.C., United
    States. (The Irish Times) (BBC) (The Daily Telegraph)
  - The United States approves a US$6 billion arms sales package to Taiwan. (The New
    York Times) (AFP) (Taiwan News)
  - Haiti acknowledges the immediate international assistance it received from Cuba,
    the Dominican Republic and Venezuela following the recent earthquake and confirms
    the death toll has reached 150,000. (Granma)
  - A state of emergency is declared in parts of Bolivia and rescue efforts continue
    in Peru amid heavy rain and floods in the region. (BBC) (Andina)
  - The offices of defeated Sri Lankan presidential candidate Sarath Fonseka are raided
    by police. (Press Trust of India) (Al Jazeera) (BBC)
  - A Nigerian court dismisses a call for an interim leader to be appointed while
    President Umaru Yar'Adua is in hospital in Saudi Arabia. (NEXT) (Reuters) (BBC)
  - North Korea fires artillery towards South Korean territory at the Northern Limit
    Line for a third consecutive day. (Xinhua) (Yonhap)
  - A 25-year-old employee of the Bank of Ireland is detained by authorities in connection
    with the largest bank robbery in the country's history. (The Irish Times) (RTÉ)
  - First flight of the Russian stealth fighter Sukhoi T-50. (The Times) (BBC)
  - Several people are killed in heavy fighting in the Somalian capital Mogadishu.
    (CNN) (Dawn) (Al Jazeera)
  - Tony Blair appears at the Iraq Inquiry and is questioned in public for the first
    time about his decision to take the United Kingdom to war against Iraq. (BBC)
    (The Guardian)
  - Vietnamese author Pham Thanh Nghien, who criticised the ruling Communist Party,
    is sentenced to four years in prison for spreading propaganda against the state.
    (Al Jazeera) (BBC)
  - Canadian Prime Minister Stephen Harper appoints five new Senators. (Globe and
    Mail)
