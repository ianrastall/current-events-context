Date: '2010-01-20'
Source_URI: Portal:Current events/2010 January 20
Intelligence_Payload:
  Uncategorized:
  - Russian journalist Konstantin Popov dies after being beaten by police in Tomsk,
    Siberia. (Reuters)
  - Malaysian police arrest eight people in connection with a firebomb attack on a
    church, in a row over the use of the word "Allah". (Bernama) (AFP) (Al Jazeera)
  - Dutch politician Geert Wilders goes on trial for allegedly inciting racial hatred
    against Muslims. (The Times) (Dutchnew.nl) (CNN)
  - The Nigerian Army regains control of the city of Jos after religious violence
    killed more than 200 people. (BBC) (Al Jazeera) (NEXT)
  - Christopher Speight, an American man suspected of shooting and killing eight people
    in Appomattox, Virginia, surrenders to police. (BBC)
  - U.S. investment bank JPMorgan Chase is in talks to buy natural gas firm RBS Sempra
    for about US$4 billion. (CNBC)
  - A 6.1 magnitude aftershock rocks Haiti a week after the 2010 Haiti earthquake.
    (BBC) (CBC)
  - The Burmese Supreme Court announces it will return a verdict on the extended house
    arrest of Aung San Suu Kyi by next month. (CNN) (AFP)
  - Vietnamese human rights lawyer Le Cong Dinh is convicted on charges of subversion
    and sentenced to five years in prison. (BBC) (Vietnam News) (Bangkok Post)
  - Microsoft issues a patch for a serious security hole in Internet Explorer 6 after
    France and Germany advised their citizens to change browsers. (BBC) (Xinhua)
  - The 2D version of the film Avatar is pulled from theaters in China.(Times of India)
    (Haaretz) (BBC) (Malaysia Star)
