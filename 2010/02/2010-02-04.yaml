Date: '2010-02-04'
Source_URI: Portal:Current events/2010 February 4
Intelligence_Payload:
  Uncategorized:
  - A curfew is imposed in Srinagar, Kashmir, after protests over the death of a 15-year-old
    boy during a demonstration. (AFP) (BBC) (KashmirWatch.com)
  - North Korea relaxes restrictions on the free market after a revaluation in 2009
    led to unrest and worsened food shortages. (AFP) (BBC) (The Times)
  - Switzerland agrees to accept two Chinese Muslim Uyghurs from the Guantanamo Bay
    detention camp. (Swissinfo)
  - Yahoo! sells HotJobs to Monster.com for US$225million. (PA)
  - Debt-ridden emirate of Dubai of the United Arab Emirates, confirms the discovery
    of a new oilfield. (Gulf News) (Kyiv Post)
  - Sumo grand champion Asashoryu announces his retirement, following allegations
    he attacked a man outside a Tokyo nightclub. (BBC)
