Date: '2010-02-28'
Source_URI: Portal:Current events/2010 February 28
Intelligence_Payload:
  2010 Winter Olympics:
  - International Olympic Committee president Jacques Rogge officially closes the
    Winter Olympics in Vancouver, Canada. Canada finishes in first place in the medal
    table with a record 14 gold medals, while the United States wins a record total
    of 37 medals. (Xinhua)
  - Hosts Canada defeat the United States 3-2 in overtime to win the men's hockey
    tournament. (The Daily Telegraph)
  Uncategorized:
  - Hundreds of people wearing pink wigs and pink clothing walk out of Catholic Mass
    in 's-Hertogenbosch in the Netherlands in protest of a gay Dutch man being refused
    communion in a nearby town. (BBC) (UPI)
  - Tajikistan votes in parliamentary elections. (Al Jazeera)
  - A storm sweeps across Western Europe, killing at least 50 people and leaving a
    million homes without power. (BBC) (Deutsche Welle) (euronews) (The Sydney Morning
    Herald)
  - 900 ships are stranded in south China's Guangxi Zhuang autonomous region amid
    falling water level caused by severe drought. The waterway traffic jam started
    on Wuzhou City section of Xijiang River. (China Daily)
  - Two huge icebergs let loose off Antarctica's coast. The two icebergs are drifting
    together about 62 to 93 miles (100 to 150 kilometers) off eastern Antarctica,
    according to an Australian Antarctic Division glaciologist. (China Daily)
  - 11 civilians die in a roadside bomb in Helmand Province. (Al Jazeera) (BBC) (RTÉ)
    (Reuters India)
  - Three ETA militants, including one of its top leaders, Ibon Gogeascoechea, on
    the run since 1997, are detained in a French-Spanish raid in Cahan, Orne. (BBC)
    (The Guardian) (The Daily Telegraph)
  - About eighty tons of dead fish are discovered and removed in a lagoon in Rio de
    Janeiro, Brazil, likely due to localized ocean anoxia and algal blooms.(The Associated
    Press) (Latin American Herald Tribune)
  - Egyptian authorities announce the discovery of a granite head from a statue of
    Tutankhamun's grandfather Amenhotep III, which was unearthed at a temple in Luxor.
    (BBC) (France24) (Herald Sun) (Reuters) (The Scotsman) (The Washington Post) (Xinhua)
  2010 Chile earthquake and Pacific Ocean tsunamis:
  - At least 708 people are confirmed dead in Chile (CNN)
  - Japan and numerous other countries evacuate coastal residents as a tsunami approaches.
    Some Japanese homes are flooded by the tsunami. (BBC) (Sky News) (The New Zealand
    Herald)
