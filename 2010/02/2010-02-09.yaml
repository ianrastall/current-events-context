Date: '2010-02-09'
Source_URI: Portal:Current events/2010 February 9
Intelligence_Payload:
  Uncategorized:
  - Conrad Murray, Michael Jackson's doctor pleads not guilty in death of the star.
    (WSJ) (Washingtonpost) (FOX)
  - The campaign period for the Philippine general election, 2010 begins. (BBC)
  - The recently-elected President of Sri Lanka Mahinda Rajapaksa dissolves his country's
    parliament one day after the arrest of Sarath Fonseka. (BBC)
  - The Italian Embassy in Iran is attacked by protesters unhappy with Italy's decision
    to scale back economic dealings and push for tighter sanctions and protests are
    also held outside French and Dutch embassies. (The Jerusalem Post)
  - Andal Ampatuan Jr., former ally of President Gloria Macapagal-Arroyo, and 196
    other people are charged with murder in the Philippines, in connection with the
    Maguindanao massacre in November 2009. (ABS-CBN News) (AFP)
  - China sentences Tan Zuoren, who investigated poor construction after the 2008
    Sichuan earthquake, to five years in prison for "inciting subversion of state
    power". (BBC) (The Washington Post) (Radio Television Hong Kong)
