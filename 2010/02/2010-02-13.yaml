Date: '2010-02-13'
Source_URI: Portal:Current events/2010 February 13
Intelligence_Payload:
  Uncategorized:
  - U Tin Oo, the Vice-Chairman of the National League for Democracy was released
    today in Yangon, the largest city in Myanmar, after the expiration of his term
    of house arrest. (UN)
  - Cyclone Rene approaches Manu'a at full force winds of 150 kilometres an hour.
    (Radio New Zealand International)
  - A suspected terrorist attack in the western Indian city of Pune kills 9 people
    and injures more than 45 others. BBC news (The Times of India) (The Hindu) (The
    Times)
  - Burma releases vice-chairman of the National League for Democracy (NLD), Tin Oo
    at the age of 82, after he has spent more than a decade in prison or under house
    arrest. (BBC)
  - The Côte d'Ivoire government is dissolved with President Laurent Gbagbo saying
    on state television that the peace process has broken down. (Al Jazeera) (The
    Sydney Morning Herald) (Reuters)
  - Clashes erupt in Dresden 65 years after the city was bombed at the end of World
    War II. (Al Jazeera) (CBC) (Press TV) (The Washington Post) (BBC)
  - Kenyan President Mwai Kibaki demands eight senior officials to resign due to corruption
    scandals in the education ministry and a maize scandal. (BBC)
  - NATO forces in Afghanistan launch Operation Moshtarak against the Taliban-controlled
    village of Marja in Helmand Province. (The New York Times)
  - At least 10 people are electrocuted to death when a power cable collapses onto
    a bus in Port Harcourt. (BBC)
  - Three people die and others are seriously injured after a Danish bus en route
    from Berlin to Munich hits a barrier and flips over on the Bundesautobahn 9 near
    Dessau, Saxony-Anhalt. The Autobahn is closed in both directions. (The Local)
    (IOL) (RTÉ)
  2010 Winter Olympics in Vancouver:
  - The men's downhill skiing is postponed due to "slushy conditions", with the women's
    super-combined event having already been postponed. (BBC) (Sky Sports)
  - The luge event goes ahead at the Whistler Sliding Centre a day after the death
    of Nodar Kumaritashvili. (BBC) (The Times) (ABC)
  Year of the Tiger:
  - China prepares to celebrate New Year holidays with tens of millions of people
    travelling and fireworks anticipated. (The Daily Telegraph)
  - Wen Jiabao delivers his New Year message in state newspapers. (Reuters)
