Date: '2010-02-16'
Source_URI: Portal:Current events/2010 February 16
Intelligence_Payload:
  Assassination of a senior Hamas military commander in Dubai:
  - Dubai police release the passport photographs of 11 “Europeans” suspected of the
    murder of Mahmoud al-Mabhouh. (BBC)
  - It emerges those suspected used fake British and Irish passports with Dublin saying
    it did not issue passports under their names, there is no evidence of their names
    on official Irish records and the counterfeits contain passport numbers with incorrect
    combinations of letters and digits. (The Daily Telegraph)
  Uncategorized:
  - Pope Benedict XVI issues a statement after a two-day meeting with all Irish bishops
    in the Vatican, including labelling paedophilia a "heinous crime", but his nuncio
    refuses to appear before an inquiry in Dáil Éireann. (RTÉ) (The Guardian) (The
    Times)
  - The Queen Mary 2 arrives at the Port of Shanghai, making her first port call in
    China since her maiden voyage in 2004. (Xinhuanet)
  - Queen Rania of Jordan meets with CEOs of mobile operators from around the world
    in Barcelona on Monday to rally support for the 1GOAL global education campaign.
    (Jordantimes)
  - Libya detains Irish nationals at its airport in Tripoli due to the escalation
    of a dispute between it and Switzerland which has led Libya to refuse anyone from
    the Schengen area, despite Ireland not being a member. (The Irish Times)
  - EMI places its Abbey Road Studios in St John's Wood, London, up for sale in an
    attempt to ease the debt burden created by Terra Firma Capital Partners' leveraged
    buyout of the company. (Financial Times)
