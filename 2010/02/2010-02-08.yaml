Date: '2010-02-08'
Source_URI: Portal:Current events/2010 February 8
Intelligence_Payload:
  Uncategorized:
  - Sudan's President Omar al-Bashir could still face charges of genocide in Darfur.
    (BBC)
  - Dr. Conrad Murray is charged with involuntary manslaughter in pop singer Michael
    Jackson's death.(BBC)
  - The sodomy trial of Malaysian opposition leader Anwar Ibrahim is halted after
    his lawyers attempt to have the judge removed. (Bernama) (Al Jazeera) (UPI)
  - Ukrainian opposition leader Viktor Yanukovych appears to win the 2010 presidential
    election, with 98% of the ballots counted. (Kyiv Post) (The New York Times) (The
    Hindu)
  - At least 17 Indian soldiers are killed in an avalanche in Kashmir. (Indian Express)
    (BBC)
  - Space Shuttle Endeavour launches successfully from Kennedy Space Center at 4:14
    EST, marking the beginning of STS-130, a two-week mission to the International
    Space Station. (UPI)
  - The World Health Organisation confirms that a cholera outbreak which has spread
    along the north coast of Papua New Guinea has hit more than 2,000 people, killing
    around 50 of them. (The Sydney Morning Herald)
  - A colony of Galapagos Islands sea lions relocate 1,500 kilometres, the first time
    they have set up a colony outside the islands. (BBC)
  - The Boeing 747-8 takes its maiden flight, lasting just under four hours.
  - A series of avalanches at the Salang tunnel in Afghanistan is presumed to kill
    64 people, with at least 400 injuries reported. (The New York Times) (Toronto
    Sun)
  - Reform of the banking system was one of the key themes at this year’s World Economic
    Forum in Davos. European Parliament Vice-President Silvana Koch-Mehrin said "There
    was general disapproval of the disproportionate self-rewarding in the banking
    sector". (Gov Monitor)
