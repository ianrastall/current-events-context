Date: '2010-02-14'
Source_URI: Portal:Current events/2010 February 14
Intelligence_Payload:
  Uncategorized:
  - NATO admits it killed 12 civilians when two misfired rockets hit a house in Marjah,
    Helmand. President Hamid Karzai calls for an explanation. (BBC) (news.com.au)
    (Reuters)
  - Viva Leroy Nash, the oldest death row inmate in the United States, dies of natural
    causes at the age of 94. (BBC) (The New Zealand Herald) (Taipei News)
  - Thousands of people collect in Beirut on the fifth anniversary of the assassination
    of former Prime Minister Rafic Hariri in a bombing alongside 21 other people,
    with his son and current Prime Minister Saad Hariri addressing the crowd. (Al
    Jazeera) (BBC) (The Irish Times) (CBC) (The Independent)
  - Kenyan President Mwai Kibaki undoes the suspensions for fraud of the agriculture
    and education ministers handed out by his Prime Minister. (BBC)
  - BMW Oracle win the 33rd America's Cup becoming the first American team to win
    since 1992. (BBC) (TVNZ) saling.org/wordcup/news
  - Rafiq Husseini, a top aide of Palestinian President Mahmoud Abbas, is suspended
    following involvement in an alleged attempt to trade influence for sex. (MSNBC)
    (The Jerusalem Post)(The Guardian)
  - Cyclone Rene heads for Tonga and Niue after brushing American Samoa. (The New
    Zealand Herald) (The Sydney Morning Herald)
  - Nine Irish Roman Catholic bishops and Cardinal Seán Brady arrive in Rome to discuss
    the Murphy Report and Ryan Report into the Catholic sexual abuse scandal in Ireland
    with Pope Benedict XVI, the first such meetings there in eight years. (RTÉ) (Reuters)
    (Gulf Times) (The Irish Times)
  - Pakistani Prime Minister Yousuf Raza Gilani condemns the bomb blast in Pune, India,
    one day earlier, saying Pakistan is against terrorism and that his country wants
    better relations with India. (The Hindu)
  - Iran detains five more members of the Baháʼí minority, in addition to Baháʼí leaders
    jailed since 2008, for alleged involvement in protests against the regime. (The
    Jerusalem Post)
  - The death toll from yesterday's double bus electrocution in Port Harcourt rises
    to as much as 40, with more than 30 injured. (THISDAY) (The Punch) (Press TV)
    (The New York Times)
  - Viktor Yanukovych is officially named winner of the Ukraine presidential election.
    (RIA) (Radio Free Europe/Radio Liberty) (AP) (AFP)
  2010 Winter Olympics in Vancouver:
  - Alexandre Bilodeau scores first place in the men's freestyle skiing moguls, winning
    Canada's first ever Olympic gold medal on home soil. (BBC)
