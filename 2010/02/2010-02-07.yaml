Date: '2010-02-07'
Source_URI: Portal:Current events/2010 February 7
Intelligence_Payload:
  Uncategorized:
  - Sir Richard Branson warns that oil crunch is coming within five years. (Current
    TV) (thisismoney) (Telegraph) (theenergycollective)
  - New Orleans Saints beat the Indianapolis Colts 31-17 to win Super Bowl XLIV. (Sports
    Illustrated)
  - Laura Chinchilla is elected President of Costa Rica, the first woman to take the
    office, following the 2010 general election. (Reuters)(Tico Times) (RTÉ) (Xinhua)
  - First Gentleman and former President Néstor Kirchner of Argentina undergoes emergency
    surgery to remove a blockage in his carotid artery. (BBC) (The Washington Post)
    (Philippine Daily Inquirer)
  - In Nigeria, the Governor of Anambra state, Peter Obi, is controversially re-elected.
    (BBC) (Reuters South Africa)
  - The Kleen Energy Systems plant in Middletown, Connecticut, explodes, killing at
    least five people and injuring at least 14 others. (BBC News) (The New York Times)
  - A Pakistani lawyers' group in Lahore threatens to "burn alive" anyone who prosecutes
    lawyer accused of murdering a 12-year-old servant girl. (Asia News)
  - Social Development Minister Margaret Ritchie defeats Alasdair McDonnell in an
    election to become leader of the Social Democratic and Labour Party (SDLP) following
    Mark Durkan's resignation yesterday. She is the first woman to take charge of
    the party in its history and the first female leader of a major party in Northern
    Ireland. (The Belfast Telegraph) (BBC) (RTÉ)
  - Voters in Ukraine go to the polls in the second round of the country's presidential
    election. (Al Jazeera) (The Independent)
  - Australian Senator John Faulkner and Doctor Wayne Mapp attend a ceremony in Gallipoli
    to commemorate dead ANZAC and Turkish soldiers, laying wreaths at several locations.
    (The Sydney Morning Herald)
  - Huang Yizhong is jailed for 13 years in Jiangmen, Guangdong, for copying and spreading
    pornographic material through his website. (The Washington Post)
  - Britain is to tighten the rules on immigrants entering the country on a student
    visa in a clampdown on a system which some security experts say has been exploited
    by Islamist militants. (Reuters)
  - Iranian President Mahmoud Ahmadinejad orders his country's atomic agency to begin
    enriching uranium to a higher level. (The New York Times) (Press TV)
  - Libya bans YouTube, independent news sites and opposition web sites in crackdown
    on controversial subjects, including human rights abuses by the Libyan government.
    (The Jerusalem Post)
