Date: '2010-02-23'
Source_URI: Portal:Current events/2010 February 23
Intelligence_Payload:
  Uncategorized:
  - Sudanese President Omar al-Bashir and the main Darfur rebel group, the Justice
    and Equality Movement, sign a ceasefire deal. (CNN) (Xinhua) (BBC)
  - Former Irish Green Party leader Trevor Sargent resigns as Minister of State for
    Food and Horticulture after admitting "an error of judgment" involving his contacts
    with the Garda Síochána. (RTÉ) (The Irish Times)
  - A United Nations report says mobile phones are used by around 4.6 billion in total
    or two-thirds of the world population, including more than half of people in the
    developing world. (Digital Trends) (Globe and Mail)
  - China increases controls on the internet, requiring anyone who wishes to set up
    a website to produce identification and meet regulators. (BBC) (China Daily)
  - Mauritania recalls its ambassador from Mali after the latter released four members
    of Al-Qaeda in the Islamic Maghreb. (BBC) (Reuters South Africa)
  - Iranian authorities arrest the leader of the Jundallah, Abdolmalek Rigi, a Sunni
    militant organisation based in southeastern Iran. (Press TV) (CNN)
  - At least five people are killed and dozens buried in a landslide near Bandung
    in West Java, Indonesia. (BBC) (Jakarta Post) (New Straits Times)
  - A 250lb car bomb explodes outside a courthouse in Newry, Northern Ireland, the
    first such bomb to explode in the area since 2000. (BBC)
  - Danish Prime Minister Lars Løkke Rasmussen carries out a major cabinet reshuffling,
    bringing in female ministers in charge of Defence and Foreign Affairs, the first
    in Denmark's history. (Copenhagen Post)
  Assassination of Hamas official in Dubai:
  - Two more fake Irish passports are identified by the United Arab Emirates as being
    involved in the assassination of Mahmoud al-Mabhouh, a senior Hamas official in
    Dubai, bringing the current total to seven. (The Irish Times)
  - One of the first five passport holders used a vacant Dublin home address belonging
    to the brother of former Taoiseach Albert Reynolds. (The Irish Times)
