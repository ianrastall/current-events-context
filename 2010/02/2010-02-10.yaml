Date: '2010-02-10'
Source_URI: Portal:Current events/2010 February 10
Intelligence_Payload:
  Uncategorized:
  - Hundreds of Somali citizens flee the capital Mogadishu as hundreds of insurgents
    enter the city ahead of a government announcement of an offensive against them.
    (BBC) (News24.com)
  - Frank Bainimarama, leader of the 2006 Fijian coup d'état and current Prime Minister
    of Fiji, announces that he will retire in 2014. The report is denied by Fiji's
    Permanent Secretary for Information. (RNZI)
  - The Court of Appeal of England and Wales rules that open air funeral pyres can
    be accommodated under the 1902 Cremation Act as amended. (BBC)
  - A 3.8-magnitude earthquake strikes near Chicago, United States. No reports of
    major damage. (CNN)
  - Officials in Haiti state that at least 230,000 people died in the 2010 Haiti earthquake,
    but that number may yet grow, approaching the 2004 Indian Ocean earthquake as
    the deadliest natural disaster of the 21st century thus far. (BBC)
  - Vice President Goodluck Jonathan is appointed acting President of Nigeria in place
    of Umaru Yar'Adua. (NEXT) (AllAfrica.com) (BBC)
  - Nationwide strikes led by Communist and Socialist parties take place in Greece
    to protest the government's handing of the country's debt. Most of the country
    was brought to a standstill as factories, schools, airports and hospitals closed
    down or reduced capacity (BBC) (Deutsche Welle) (Al Jazeera)
  - Prominent Uzbek photographer Umida Akhmedova is found guilty on charges of "slandering
    the nation" in her work, but is immediately pardoned under an amnesty. (BBC) (The
    Moscow Times)
  - Afghan officials report that at least 150 bodies were pulled from vehicles buried
    by avalanches in the Salang Pass in the Hindu Kush mountains earlier this week.
    (UPI.com)
