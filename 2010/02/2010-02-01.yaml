Date: '2010-02-01'
Source_URI: Portal:Current events/2010 February 1
Intelligence_Payload:
  Uncategorized:
  - US President Barack Obama will propose a $3.8 trillion budget for fiscal 2011
    that foresees the deficit hitting a record $1.6 trillion in the current fiscal
    year but falling to about $700 billion by 2013. (WSJ)
  - US Secretary of State Hillary Clinton presses China to back Iran sanctions for
    its nuclear program. (WSJ)
  - United Nations Secretary-General Ban Ki-moon arrives in Cyprus to begin talks
    aimed at reuniting the country. (The Hindu) (Deutsche Welle) (UN News Centre)
  - Nigerian militant group the Movement for the Emancipation of the Niger Delta denies
    it attacked oil pipelines in the south of the country, after Shell closes three
    oil flow stations. (Al Jazeera) (BBC)
  - Envoys of the Dalai Lama return from Beijing after the ninth round of negotiations.
    (Times of India) (Xinhua) (RIA Novosti)
  - A female suicide bomber kills 41 people and injures a further 106 in an attack
    in the Iraqi capital Baghdad. (Al Jazeera) (The Daily Telegraph)
  - Nine people are killed in a bus rampage in Tianjin, northern China. (BBC) (China
    Daily) (Taiwan News)
  - Chinese state media voices its disapproval after the Obama administration unveils
    its first arms package for Taiwan, a move that prompted China to threaten sanctions
    on the firms involved. (Reuters) (BBC)
  - Anti-government protests take place in cities across Russia, with 100 protesters
    detained at rallies in Moscow and Saint Petersburg. (BBC) (The Moscow Times) (Sify)
  52nd Grammy Awards:
  - Pop singer Beyoncé Knowles wins the most awards at the 52nd Grammy Awards, winning
    six of her ten nominations including Song of the Year for "Single Ladies (Put
    a Ring on It)", and becoming the first woman to win six awards in the same night.
    (BBC) (The Times of India) (Chicago Tribune)
  - Rock band AC/DC win their first ever Grammy Award. (The Daily Telegraph)
  - Seven performers, including Michael Jackson, Bobby Darin and Loretta Lynn, are
    awarded Lifetime Achievement Awards. (All About Jazz)
