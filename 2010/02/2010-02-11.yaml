Date: '2010-02-11'
Source_URI: Portal:Current events/2010 February 11
Intelligence_Payload:
  Uncategorized:
  - A European Union summit takes place to discuss a possible bailout for Greece's
    economy. (Reuters) (The Guardian)
  - The European Parliament rejects an agreement that would have granted the United
    States Terrorist Finance Tracking Program unlimited access to the SWIFT bank transactions
    database. (BBC News)
  - Protests continue in Sri Lanka after the arrest of opposition candidate Sarath
    Fonseka. (AFP) (Bernama)
  - British fashion designer Alexander McQueen is found dead at his home in London
    at the age of 40, on the eve of his mother's funeral, in an apparent suicide.
    (BBC News) (The Sydney Morning Herald) (The New York Times) (Irish Independent)
    (The New Zealand Herald)
  - A court in Beijing upholds a sentence against Chinese dissident Liu Xiaobo who
    was sentenced to 11 years imprisonment on charges of subversion. (Xinhua) (The
    Times) (Al Jazeera)
  - Sergey Aleynikov, a former computer programmer for Goldman Sachs, is indicted
    for three counts by a U.S. federal court in Manhattan for theft of trade secrets,
    transportation of stolen property in interstate and foreign commerce, and unauthorized
    computer access. (Wall Street Journal)
  - Former U.S. President Bill Clinton has two coronary stents implanted in his heart
    at the NewYork–Presbyterian Hospital in New York City, after chest pains. (New
    York Times)
  - Haiti announces that the 10 American missionaries accused of attempted kidnapping
    will be released from custody. (Sky News)
  - A large eruption occurs at the Soufrière Hills volcano in Montserrat after a partial
    lava dome collapse, sending ash to a height of 50,000 feet. (Montserrat Volcano
    Obeservatory)
  Iran:
  - President Mahmoud Ahmadinejad announces that Iran is now a nuclear state, following
    a successful 20% uranium enrichment. (New York Times)
  - Reformists clash with police forces in Iran, during protests held at the 31st
    anniversary of the overthrow of shah Mohammad Reza Pahlavi. (New York Times) (Al
    Jazeera)
