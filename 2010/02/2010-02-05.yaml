Date: '2010-02-05'
Source_URI: Portal:Current events/2010 February 5
Intelligence_Payload:
  Uncategorized:
  - At least 22 people are killed and more than 50 are injured in two separate bombings
    in Karachi. (The Hindu) (BBC) (euronews) (The Guardian)
  - At least 40 people are killed and more than 140 are wounded in at least two explosions
    in Karbala during the final day of Arba'een. (Al Jazeera) (The Guardian) (The
    New York Times)
  - A private helicopter crashes in the Dominican Republic, killing two. The helicopter
    was returning from relief work for the 2010 Haiti earthquake. (AP)
  - Civil servants in Zimbabwe go on strike, demanding a wage increase. (Zimbabwe
    Times) (Business Day) (Press TV)
  - Cyclone Oli hits Tahiti and other islands of French Polynesia, killing at least
    one man. (AP) (BBC)
  - The last native of India's Andaman Islands fluent in the Aka-Bo language dies,
    rendering the language extinct. (Daily Mail)
  - Danish special forces storm a ship captured by armed Somali pirates and free the
    25 crew on board. (Miami Herald)
  - The Democratic Unionist Party (DUP) and Sinn Féin agree to devolution from Westminster
    from 12 April 2010 after two weeks of discussions, the longest ever during the
    Northern Ireland peace process. (RTÉ) (BBC)
  - Five Russian soldiers are killed and six injured in clashes with militants in
    Chechnya. (RIA Novosti) (Press TV) (News24)
  - Four British politicians will face criminal prosecution over their expense claims
    in the ongoing expenses scandal. (BBC) (Washington Post)
  - New images of the dwarf planet Pluto reveal rapid changes on its surface. (BBC)
    (National Geographic) (Xinhua)
  - Uganda's deputy Foreign Minister Henry Okello Oryem says the country's anti-homosexuality
    Bill "will be changed". (BBC)
  - North Korea announces it will release an American man who entered the country
    on December 25, 2009. (The Guardian) (Yonhap) (Korea Times)
