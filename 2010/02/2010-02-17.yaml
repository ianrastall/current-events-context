Date: '2010-02-17'
Source_URI: Portal:Current events/2010 February 17
Intelligence_Payload:
  Uncategorized:
  - 500,000 residents of Mexico City have been vaccinated against the A/H1N1 flu.
    (Xinhuanet)
  - Four people are charged in connection with the Santika Club fire in Thailand on
    December 31, 2008. (Bangkok Post)
  - The body of fallen luger Nodar Kumaritashvili returns to his hometown of Bakuriani,
    Georgia, for burial. (BBC) (ESPN)
  - Guam Governor Felix Perez Camacho issues an executive order changing the name
    of Guam to Guahan in government documents and signage and calls for unification
    with the Northern Mariana Islands. (Pacific Daily News) (Pacific Daily News) (Saipan
    Tribune)
  - At least 22 people are killed in a bus crash in Northern India. (ABC) (BBC)
  - It emerges that fake Irish passports used by suspects in the assassination of
    a senior Hamas military commander in Dubai had valid numbers with mismatched identities,
    with the Irish Department of Foreign Affairs embarking on an urgent mission to
    track the three genuine passport holders with these numbers. (RTÉ) (The Irish
    Times)
  - Police in Kenya free five suspects held in connection with organising a gay wedding
    in a Mtwapa hotel. (BBC)
  - Services from the UK, France, Germany and the Netherlands remain disrupted as
    investigations continue into the Halle train collision in Belgium.(BBC)
  - The Supreme Administrative Court of Ukraine suspends the decision of the Electoral
    Commission to declare Viktor Yanukovych the winner of the Ukrainian presidential
    election until the court has decided on the complaints brought by the other candidate,
    Prime Minister Yulia Tymoshenko. (La Libre Belgique)
  - The UK branch of publishing company Reader's Digest files for administration.
    (BBC) (Sky News)
  - Walgreen Co. announces that it is buying Duane Reade Holdings Inc., operator of
    a chain of 257 drugstores in the New York City area, for about $1.08 billion including
    assumption of debt. (Marketwatch)
  - Five southern Africans, including Archbishop Desmond Tutu, have their genomes
    analysed by scientists and published in Nature, with Tutu excited to discover
    he is "related to the San people, the first people to inhabit Southern Africa".
    (BBC)
  - Rwanda, the East African country that is embracing a transition to a Green economy,
    will be the global host of World Environment Day on 5 June 2010. (UNEP)
