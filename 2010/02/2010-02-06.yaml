Date: '2010-02-06'
Source_URI: Portal:Current events/2010 February 6
Intelligence_Payload:
  Uncategorized:
  - Jordan Queen's educational reform program lauded in Jordan. Rania Al Abdullah
    and Princess Hessa bint Salman were briefed on the Jordan River Foundation (JRF)
    by the organization's Director General Valentina Qussisiya. (zawya)
  - The Eastern Route of the South-to-North Water Diversion Project, one of the world's
    largest water projects, has been delayed by about five years due to problems associated
    with water pollution, officials in east China's Shandong province. (China Daily)
  - Wang Jiarui, head of the Communist Party of China's liaison office, arrives in
    North Korea on a "goodwill visit" at the invitation of the Workers' Party of Korea.
    (AFP) (Tehran Times) (The Straits Times)
  - Charles McArther Emmanuel, son of President of Liberia Charles Taylor, is ordered
    to pay more than $22 million (£14 million) to five people tortured during the
    Second Liberian Civil War. (BBC)
  - The Group of Seven nations agree to write off Haiti's debts following a conference
    in Iqaluit, Nunavut. (BBC)
  - The Bank of Spain announces that Spain’s economy fell 3.6% in 2009, the most in
    decades. (Mercopress) (Reuters) (Business Spectator)
  - Thousands protest in Togo against a decision by the Confederation of African Football
    to ban the country from the next two editions of the Africa Cup of Nations. (BBC)
    (Times of India)
  - An Australian mining company signs a $70 billion deal to supply Chinese power
    stations with coal, in the country's biggest ever export contract. (BBC) (The
    Hindu) (Sydney Morning Herald)
  - Mark Durkan, former Deputy First Minister of Northern Ireland, resigns as leader
    of the Social Democratic and Labour Party (SDLP). (The Belfast Telegraph) (The
    Irish Times)
  - French aid worker, Laurent Maurice, kidnapped in Chad last November, is released
    after 89 days of captivity, described as "tired but appears to be in good health".
    (BBC) (CNN) (Philippine Daily Inquirer) (Reuters South Africa) (CTV News) (news.com.au)
  - Afghan police admit they shot dead seven civilians, including two children, as
    they collected firewood in Spin Boldak, Kandahar, last Thursday. (Reuters) (Press
    TV) (France24)
  - '23 Yemeni government soldiers are killed by the Houthis in two separate incidents:
    15 are ambushed in Wadi al-Jabara, while the remaining 8 die in Sa''dah. (Press
    TV)'
  - The Taliban blow up a girls' school in Huwaid, Pakistan, killing no one. (AFP)
