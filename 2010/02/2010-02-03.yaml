Date: '2010-02-03'
Source_URI: Portal:Current events/2010 February 3
Intelligence_Payload:
  Uncategorized:
  - L'Homme Qui Marche I by Alberto Giacometti, a bronze sculpture sells in London
    for £65,001,250, a new world record auction price. (BBC) (The Daily Telegraph)
  - A major fireball is reported in the skies over Ireland, lighting up "the whole
    country". (RTÉ) (The Irish Times)
  - Avatar becomes the highest grossing film in the U.S. and Canada while surpassing
    the 2 billion dollars mark in worldwide sales. (Reuters) (BoxOfficeMojo)
  - Judges at the International Criminal Court rule that Sudan's president Omar al-Bashir
    could face charges of genocide over the War in Darfur. (The Guardian) (CNN)
  - Pirates off the coast of Somalia seize a North Korean-flagged cargo ship south
    of Yemen. (AFP) (CNN)
  - NASA and Cornell University have given up attempting to move the Spirit rover,
    currently stuck in sand near Home Plate, Gusev crater on the planet Mars, and
    are converting it into a stationary outpost. Its twin rover, Opportunity, remains
    mobile on Mars. (Space.com)
  - Malaysian opposition leader Anwar Ibrahim goes on trial in Kuala Lumpur, accused
    of sodomy. (Bernama) (BBC) (AFP)
  - A man detonates a homemade bomb outside a shopping mall in Darwin, Australia,
    wounding 15 people. (Sydney Morning Herald) (The Australian)
  - A bombing near a girls' school in Lower Dir, Pakistan kills seven, including three
    U.S. Marines, marking the first time U.S. soldiers are killed in that country.
    (CNN) (Al Jazeera)
