Date: '2010-02-12'
Source_URI: Portal:Current events/2010 February 12
Intelligence_Payload:
  Uncategorized:
  - Secretary-General Ban Ki-moon has repeatedly called on the DPRK to re-engage in
    the Six-Party Talks that also involve the Republic of Korea, Japan, China, Russia
    and the United States. (UN)
  - Police in Mtwapa arrest five men accused of being homosexuals, two of whom had
    wedding rings and were attempting to marry in a first for Kenya. (BBC) (Daily
    Nation)
  - Thousands of people flee Mogadishu after 24 people are killed and 40 people are
    wounded in two days. (BBC) (CBC)
  - Russian security forces kill at least 20 people in Ingushetia. (BBC) (The Star)
    (The Scotsman)
  - Togo appeal to the Court of Arbitration for Sport over their ban from the next
    two Africa Cup of Nations in the aftermath of the Togo national football team
    attack. (BBC) (CNN) (The Guardian)
  - Mexican President Felipe Calderón's visit to a community centre in Ciudad Juárez
    where 13 teenagers and two adults were shot dead at a school party on 31 January
    is disrupted by murders, riot police and dozens of protesters. (BBC) (Latin American
    Herald Tribune) (Radio Netherlands Worldwide)
  - A shooting at the University of Alabama in Huntsville, United States, leaves at
    least three persons dead. (CNN)
  - The United States successfully shoots down a launching ballistic missile using
    the Boeing YAL-1, a military Boeing 747-400F aircraft mounted with a chemical
    oxygen iodine laser weapon. (Reuters)
  - Thailand deports the five-man crew detained in the country since December after
    transporting weapons from North Korea. (AFP) (Thai News Agency)
  - Campaigning for Iraq's parliamentary election begins. (Xinhua) (AFP) (Press TV)
  - Indonesia's former anti-corruption chief Antasari Azhar is sentenced to 18 years
    for the murder of a businessman. (Jakarta Post) (CNN)
  - A ceasefire is declared between Houthi fighters and the Yemeni government in northern
    Yemen. (The Guardian) (Al Jazeera) (Press TV)
  - Burma's leader General Than Shwe says the general elections will be held "soon".
    (Al Jazeera) (Press Trust of India)
  - Chinese human rights activist Feng Zhenghu, stranded at Japan's Narita International
    Airport after being refused entry to China for three months, returns home. (Bangkok
    Post) (BBC)
  2010 Winter Olympics:
  - The XXI Olympic Winter Games competitions begin in Vancouver, British Columbia,
    Canada. (NBC Sports)
  - Georgian luger Nodar Kumaritashvili is killed after a crash at the Whistler Sliding
    Centre, during a training run for the 2010 Winter Olympics. (BBC) (The Times)
    (The Los Angeles Times)
  - Nodar Kumaritashvili is remembered by the participants in the opening ceremony.
    (The Sydney Morning Herald)
