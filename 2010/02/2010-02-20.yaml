Date: '2010-02-20'
Source_URI: Portal:Current events/2010 February 20
Intelligence_Payload:
  Uncategorized:
  - Olympic luger Nodar Kumaritashvili is buried in Bakuriani, Georgia. (BBC) (CBC)
    (Sina)
  - President of Afghanistan Hamid Karzai, addressing parliament with a photo of an
    8-year-old girl who lost 12 relatives to ISAF rocket fire during Operation Moshtarak,
    urges foreign troops to do more to prevent civilian deaths. (Al Jazeera)
  - 30 people are killed in an air strike by the Pakistan Army in South Waziristan.
    (Al Jazeera)
  - The Justice and Equality Movement rebel group in Sudan's Darfur region signs a
    framework ceasefire agreement with the Sudanese government in N'Djamena. (BBC)
  - Russian allies, including Venezuela and Turkey, file a dozen requests for Mi-28N
    Night Hunter attack helicopters from Russia. (Europe News Agency)
  - Floods and mudslides on the island of Madeira leave at least 32 dead and 68 injured.
    (Jersey Evening Post) (BBC) (Al Jazeera)
  - The death toll from a minaret collapse in Morocco rises to 41. (CNN) (Xinhua)
  - The Chinese military and several schools deny involvement in cyber attacks on
    Google, following a New York Times report cited investigators linking Lanxiang
    Vocational School and Shanghai Jiaotong University to the attacks. (Press Trust
    of India) (China Daily)
  - The Dutch cabinet Balkenende IV collapses after a dispute on extending the mandate
    of Task Force Uruzgan in Afghanistan. (Radio Netherlands Worldwide) (BBC) (Al
    Jazeera)
  - Lunar Tet New Year holiday road accidents killed almost 300, injured 400 people
    in Vietnam. Most of the crashes involved alcohol. (Inquirer) (Vietnam News)
  - Bal wins the Golden Bear at the 60th Berlin International Film Festival. (Deutsche
    Welle) (BBC)
  - The Canadian three-masted ship SV Concordia capsizes in a storm off the coast
    of Brazil. The entire crew, 64 people, are rescued after spending 48 hours on
    life rafts in rough seas. (The Sydney Morning Herald) (The Vancouver Sun) (The
    Montreal Gazette) (The Times)
  2010 Nigerien coup d'état:
  - The African Union (AU) suspends Niger following this week's coup d'état. (Al Jazeera)
    (Xinhua) (BBC)
  - Thousands of people take part in a second day of celebrations in the capital.
    (BBC)
