Date: '2010-02-24'
Source_URI: Portal:Current events/2010 February 24
Intelligence_Payload:
  Uncategorized:
  - The discovery of the sauropod genus Abydosaurus is announced. (ScienceDaily) (Irish
    Times)
  - Toyota's President Akio Toyoda apologises to the United States Congress for safety
    problems that led to deaths and worldwide recalls of its vehicles. (BBC) (Channel
    News Asia) (New York Times)
  - Prime Minister of the Ivory Coast Guillaume Soro announces the formation of a
    new government after 48 hours of negotiations, and opposition parties demand the
    reinstatement of the electoral commission. (Post Zambia) (Al Jazeera)
  - Cuban President Raúl Castro "laments" the death of political prisoner Orlando
    Zapata, who was on a hunger strike for more than 80 days in protest of prison
    conditions in the country. (BBC) (Reuters)
  - RasGas, a joint venture of Qatar Petroleum and ExxonMobil, starts its seventh
    LNG train, ensuring Qatar's position as the world's biggest producer of liquefied
    natural gas. (Reuters) (Bloomberg)
  - Oxfam Hong Kong suspends its student training programme in China after the Chinese
    government said the charity had "unfriendly intentions". (BBC) (Radio Television
    Hong Kong) (My Sin Chew)
  - Sachin Tendulkar becomes the first cricketer in history to score a double century
    in One Day International cricket. (Rediff)
  - The Ministry of Commerce of the People's Republic of China rejects Tengzhong's
    bid to purchase Hummer from General Motors. (Reuters) (New York Times)
  - The first Vincent van Gogh to be authenticated since 1995 goes on display at a
    Zwolle museum 26 years after the death of the museum founder who first identified
    it. (Reuters) (CBC News) (The Times) (The Daily Telegraph)
  - SeaWorld Orlando trainer Dawn Brancheau dies during an attack by the world's largest
    killer whale in captivity, Tilikum.
