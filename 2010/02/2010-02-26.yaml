Date: '2010-02-26'
Source_URI: Portal:Current events/2010 February 26
Intelligence_Payload:
  Uncategorized:
  - Kim Yuna, Korean figure skater,won the gold medal with new world record in both
    short programme and free skate with the total of 228.56, which is another world
    record in the total score, becoming the first South Korean skater to medal in
    any discipline of figure skating at the Olympic Games. Kim's gold medal was South
    Korea's first medal at the Winter Olympics.(BBC)
  - A girls' boarding school dormitory in KwaZulu-Natal is shut down due to widespread
    lesbian activity. (BBC)
  - Wang Meng wins her third gold medal in the 1,000 meters short track at Vancouver
    to become China's first winter Olympian to win three gold medals at one Games
    and give China all the women's titles. (Shanghai Daily) (China Daily)
  - Brazilian police investigate after a newborn baby dies while two doctors argue
    during the mother's labour in an Ivinhema hospital. (The Irish Times)
  - The Organization of American States (OAS) Inter-American Commission on Human Rights
    (IACHR) issued a 300-page report on democracy and human rights in Venezuela under
    Hugo Chávez. (The Washington Post)
  - Turkish police launch a second wave of arrests of military officers tied to the
    alleged "Sledgehammer" coup plot. (CNN)
  - Syrian President Bashar Assad hosts Hezbollah head Hassan Nasrallah and Iranian
    leader Ahmadinajad in Damascus where they condemn the United States and Israel
    (CNN), (The Jerusalem Post)
  - At least 17 people killed as Taliban suicide bombers carry out a string of attacks
    in Kabul, Afghanistan (CNN), (The Hindu)
  - A suspicious package is discovered at the Israeli Embassy in Dublin. (RTÉ)
  - The cruise ship MS Costa Europa crashes into a dock in the Egyptian port of Sharm
    al-Sheikh, killing three people. (BBC) (CNN)
  - At least 16 people are killed in a stampede at Djinguereber Mosque in Mali's northwestern
    city of Timbuktu. (Reuters South Africa) (BBC) (Al Jazeera)
  - Burma's Supreme Court rejects an appeal by detained National League for Democracy
    leader Aung San Suu Kyi against an 18 month extension on her house arrest. (Times
    of India) (CBC) (MSN Philippines)
  - The official North Korean news agency KCNA announces the country has detained
    four South Koreans for crossing the border into the country. (Yonhap) (KCNA) (Al
    Jazeera)
  - Prince settles his court case with MCD Productions which had sued the musician
    after he cancelled a 2008 Croke Park concert at short notice. (RTÉ) (BBC)
  - It is reported that an iceberg the size of Luxembourg has struck the Mertz Glacier,
    breaking it in half. (AP)
  - Politiken apologises for its reprint of a cartoon depicting the Prophet Muhammad
    with a bomb-shaped turban in 2008 but is criticised by other Danish newspapers.
    (BBC)
  - An experiment in Minnesota's Soudan Mine reports detection of weakly interacting
    massive particles, a form of cold dark matter, with masses of 7-11 billion electronvolts.(Nature
    News) (ArXiv)
  - New York Democratic Governor David Paterson announces he will not run in the New
    York gubernatorial election of 2010.(The New York Times)
  - President Muammar Gaddafi of Libya declares a holy war on Switzerland. (The Washington
    Post)
  - A 7.0 magnitude earthquake strikes off the southern coast of Japan's Ryukyu Island.
    (USA Today)
