Date: '2010-10-11'
Source_URI: Portal:Current events/2010 October 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Telugu Desam leader is murdered in broad daylight in a restaurant near Srikantam
    circle in Anantapur, India. (Deccan Chronicle)
  - The Indian Army says that nearly 40 militants have been killed by security forces
    during 25 infiltration attempts in Indian-controlled Kashmir from across the border
    in the last two months. (China Daily)
  Afghanistan:
  - Afghan President Hamid Karzai confirms holding unofficial talks with Taliban "for
    quite some time" in order to end the nine-year war. (AFP via Google News) (Xinhua)
  - Six Taliban fighters including shadowy district governor are killed in separate
    operations in western Herat province. (PLA)
  - Two Indians are killed in a missile attack launched by the Taliban on an Indian
    NGO's office in Afghanistan's Kunar province. (Deccan Chronicle)
  Arts and culture:
  - The Hobbit is set to be most expensive movie ever. The New Zealand company, Wingnut
    Films, is waiting for the green light for its planned adaptation. (NZ Herald)
  - British pop singer George Michael is released from a Suffolk prison after serving
    4 weeks for driving while under the influence of cannabis. (BBC), (Sky News)
  - Australian opera singer Dame Joan Sutherland dies in Switzerland after a lengthy
    illness. (Sydney Morning Herald) (Swissinfo.ch)
  Business and economy:
  - Economists Peter A. Diamond, Dale T. Mortensen and Christopher A. Pissarides win
    the Nobel Memorial Prize in Economic Sciences for their work in labor market analysis.
    (Nobel Prize), (AP via Fox News)
  - Microsoft launches Windows Phone devices. (C-Net)
  Disasters:
  - 18 people are killed when a bus falls into a river in Bulandshahr district, Uttar
    Pradesh, India. (Deccan Chronicle) (Zeenews)
  - The death toll from flooding in Indonesia reaches 145 with West Papua most heavily
    affected. (CNN) (Straits Times) (Jakarta Post)
  - '2010 Atlantic hurricane season: Tropical Storm Paula forms near Honduras and
    is expected to become a hurricane by Tuesday. (AP)'
  International relations:
  - Israeli Prime Minister Benjamin Netanyahu says that he will extend the settlement
    freeze if the Palestinian leadership recognizes Israel as a Jewish state. The
    Palestinians quickly reject the offer. (Haaretz), (AFP via Google News)
  - The United Arab Emirates closes its airspace to Canada's Defence Minister Peter
    MacKay over a growing dispute over aviation rights.(CBC)
  Liu Xiaobo:
  - China cancels a meeting with Norwegian Minister of Fisheries and Coastal Affairs
    Lisbeth Berg-Hansen after the Nobel Peace Prize is awarded to him. (Reuters)
  - Xiaobo's lawyer confirms that his wife Liu Xia is under house arrest in Beijing.
    (CNN)
  Law and crime:
  - Greek Police officer Epaminondas Korkoneas is convicted of the culpable homicide
    of teenager Alexandros Grigoropoulos which sparked the 2008 Greek riots. (Greek
    reporter) (BBC)
  - British judge Heather Hallett opens the inquests into the 7 July 2005 London bombings.
    (Reuters UK)
  - Benigno Aquino III, the President of the Philippines, elects only for administrative,
    and no criminal charges to be laid in relation to the botched Manila hostage crisis
    in August. (Philippines Star) (Philippines Daily Enquirer)
  - A woman accused of sexually abusing girls at the Oprah Winfrey Leadership Academy
    for Girls in Meyerton, South Africa, is acquitted. (AP via USA Today)
  - The son of Sakineh Mohammadi Ashtiani, the woman sentenced to death by stoning,
    and two German journalists posing as tourists seeking to interview him, may have
    been arrested in Iran. (AFP via Herald Sun)
  Politics:
  - The Bharatiya Janata Party government of India's Karnataka state wins a vote of
    no confidence after 16 members of the Karnataka Legislative Assembly are disqualified
    from voting. (OneIndia) (Hindustan Times)
  - The government of Bolivia annuls a new coca production law which cut the number
    of leaves growers could sell following widespread protests. (BBC)
  Kyrgyzstani parliamentary election:
  - Five Kyrgyz political parties, including Ata-Zhurt, Social Democratic Party of
    Krygyzstan, Ar-Namys, Respublika, and Ata Meken, have passed all thresholds at
    the election thus can obtain parliamentary seats. (24.kg) (Xinhua)
  Science:
  - Surgeons at the Shepherd Center in Atlanta, Georgia inject a spinal cord injury
    patient with embryonic stem cells in an experiment approved by United States Food
    and Drug Administration. (USA Today)
  Sport:
  - Nigerian athlete Oludamola Osayomi, the winner of the 100 metres sprint at the
    2010 Commonwealth Games in Delhi, India, tests positive for the banned stimulant
    Methylhexanamine. (AFP via Yahoo! News Australia), (ABC News Australia), ( Sky
    Sports)
