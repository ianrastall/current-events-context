Date: '2010-10-06'
Source_URI: Portal:Current events/2010 October 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eleven suspected militants are killed in a US drone attack near Miramshah in North
    Waziristan, Pakistan. (Dawn)
  - One person is killed and two others were injured when an explosion took place
    in the Azmat Khel Area of Bannu, Pakistan. (Dawn)
  - Thai authorities accuse the anti-government red shirts of being behind a bomb
    blast in the capital Bangkok that killed at least three people. (AFP) (Straits
    Times) (Thai News Agency)
  - Gunmen torch up to 40 oil tanker trucks carrying fuel for NATO forces in Afghanistan
    in Quetta and Nowshera, Pakistan and kill a truck driver. The Tehreek-e-Taliban
    claimed responsibility for that and other attacks. This was the sixth attack on
    convoys taking supplies to Afghanistan since Pakistan closed a key border crossing
    almost a week ago. (AP via MSNBC) (Reuters), (AFP via Google News) (Sky News)
    (Reuters)
  - Yemen attacks
  - A British embassy car is attacked in Sanaa, the capital of Yemen with three people
    injured . (Channel News Asia) (Yemen Observer), (AFP via Google News)
  - A Frenchman is shot dead outside the Austrian oil company OMV compound outside
    Sanaa. (Reuters via the New York Times)
  - Suspected al-Qaeda militants are believed to be responsible for both attacks.
    (Reuters)
  - President of the United States Barack Obama awards a Medal of Honor posthumously
    to Robert James Miller of the US Army Green Berets for "conspicuous gallantry
    ... at risk of life above and beyond the call of duty" while fighting in the War
    in Afghanistan on January 25, 2008. (CNN)
  Arts and culture:
  - The 15th Pusan International Film Festival started in Pusan, South Korea. (People
    via Xinhua)
  - Irish poet Seamus Heaney wins the Forward Poetry Prize. (BBC)
  - An autopsy finds that the death of United States actor Gary Coleman in Salt Lake
    City, Utah was an accident. (BBC)
  Disasters:
  - Four people were killed and three others were injured when two containers of fireworks
    exploded near the Mỹ Đình National Stadium, Hanoi. (Vietnamnet)
  - At least 25 soldiers are killed in a helicopter crash in Tajikistan, east of the
    capital Dushanbe. (BBC) (Xinhua)
  - Floods leave 1 dead, 3 missing, 33,000 evacuated in the Chinese province of Hainan.
    (Global Times) (China Dialy)
  - At least 75 people are killed in flash floods in eastern Indonesia. (Straits Times)
    (Al Jazeera)
  - The death toll from floods in central Vietnam rises to at least forty-nine. (AFP
    via Sydney Morning Herald) (VOV News) (Vietnamnet) (TRT)
  - A firefighter is killed and 17 others injured in a major fire in Vishwas Nagar,
    India. (PTI)
  - Tornadoes hit Bellemont, Arizona in the southwest of the United States resulting
    in at least seven people being injured. (CNN)
  Ajka alumina plant accident:
  - Hungary expects to take at least a year and tens of millions of dollars to clean
    up what the country's environment minister describes as its worst chemical accident.
    (BBC)
  - Hungary opens a criminal investigation into the incident. (The Telegraph)
  International relations:
  - South Korea and the European Union sign a free trade agreement. (Xinhua)
  Law and crime:
  - 46 police officers in Ecuador are arrested on suspicion of involvement in last
    week's uprising. (AFP)
  - The first civilian trial of a person formerly imprisoned by the United States
    in Guantánamo Bay begins in New York. According to his lawyers Ahmed Ghailani
    of Tanzania was tortured. (BBC)
  - A Federal Court of Canada judge rejects a request by francophone groups outside
    Quebec to overturn the Conservative government's decision to scrap the longform
    census. (Toronto Sun)
  - United States Federal Bureau of Investigation agents arrest dozens of Puerto Rico
    police officers accused of aiding drug traffickers. (AP via Google News)
  - Law enforcement agencies in Victoria, Australia, the United Kingdom and Spain
    conduct raids in relation to allegedly corrupt behaviour by the currency subsidiary
    of the Reserve Bank of Australia. (Radio New Zealand)
  - Two Turkish soldiers are shot dead by a third soldier in the southwestern province
    of Muğla. (Hurriyet Daily)
  Politics and elections:
  - Ethiopian opposition leader Birtukan Mideksa of the Unity for Democracy and Justice
    is released from prison after two years of incarceration. (Bloomberg)
  - China's climate negotiator Xie Zhenhua states that the country's voluntary efforts
    supported by its own resources and technologies only accept "non-invasive" international
    consultation and analysis at the UNFCCC meeting in Tianjin, China. (China Daily)
  Science:
  - China's gross domestic product (GDP) will grow by 10.5 percent in 2010 and 9.6
    percent in 2011, ahead of other major economies, according to a report released
    by the International Monetary Fund. (Global Times)
  - Richard F. Heck, Ei-ichi Negishi and Akira Suzuki win the 2010 Nobel Prize in
    Chemistry for developing new ways of linking carbon atoms together. (Nobel Prize),
    (BBC)
  Sports:
  - The appeals of Pakistan cricket players Salman Butt, Mohammad Amir and Mohammad
    Asif regarding spot-fixing during the tour of England are set for October 30 and
    31. (BBC)
  - Boston Red Sox owner John W. Henry agrees to purchase Liverpool F.C. for an undisclosed
    sum, the deal still needs final approval. (Boston.com),(Sky News)
  - Roy Halladay of the Philadelphia Phillies throws a no-hitter against the Cincinnati
    Reds making him the first Major League Baseball pitcher to throw a no-hitter in
    postseason play since Don Larsen's perfect game in the 1956 World Series. (New
    York Times)
