Date: '2010-10-23'
Source_URI: Portal:Current events/2010 October 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 50 people are injured in Bangladesh protests attacked army camps, set a jeep on
    fire and damaged two other vehicles during the clashes in Roopganj, a sub-district
    of Narayanganj near Dhaka. (Tha Indian)
  - 'Iraq War Logs: Julian Assange of Wikileaks tells a London news conference that
    the 400,000 classified U.S. military documents released to the general public
    yesterday reveal that the Iraq War is "a bloodbath on every corner". (AFP via
    Tehran Times)'
  - There are clashes on the streets of Conakry after the second round of voting in
    the Guinean presidential election, due on 24 October, is deferred for the third
    time. (BBC)
  - Suspected Maoist rebels kill six policemen in eastern India. (Al Jazeera) (AP
    via Google News) (Times of India)
  - A suicide bomber attacks the United Nations compound in western Afghanistan based
    in Herat. (Voice of America)
  - Nine Taliban fighters, including two commanders, are killed as security forces
    storm their hideout in Kandahar province, south of Afghanistan. (Xinhua via PLA)
  Business and economy:
  - '2010 strikes in France: French unions challenge a back-to-work order in court,
    one day after the senate voted in favour of increasing their retirement age. (Al
    Jazeera)'
  - Group of Twenty finance leaders agree to give 6% more International Monetary Fund
    votes to developing countries, though the U.S. retains its veto power, in a meeting
    in Gyeongju, South Korea. (BBC) (Reuters via Yahoo! News)
  - Residents of Naples are repelled by the police force while expressing their ire
    over a government plan to open a huge garbage dump on the edge of town. (Al Jazeera)
  Disasters and accidents:
  - At least one person is killed and thousands more are affected after Cyclone Giri
    makes landfall in western Burma. (Al Jazeera)
  - The death toll from Typhoon Megi in Taiwan has reached as least eleven with at
    least 23 people from two Chinese tour groups missing. It has now made landfall
    in China's Fujian province. (CNN) (Reuters)
  - Seven people are killed at Nyayo National Stadium in the Kenyan capital Nairobi
    as fans try to enter a Kenyan Premier League football match between Gor Mahia
    and AFC Leopards. (Al Jazeera) (BBC)
  - Several people are killed in a helicopter crash in the Mourne Mountains, County
    Down. (BBC) (RTÉ) (Xinhua)
  - The Centers for Disease Control and Prevention project that as many as 1 in 3
    adult Americans will have diabetes by 2050 if current trends in diet and exercise
    continue.(Reuters)
  International relations:
  - Rival demonstrations take place in China and Japan over the disputed Senkaku Islands.
    (CP) (Straits Times)
  - German economy minister Rainer Bruederle criticizes the United States' monetary
    easing as indirectly manipulation of the USD exchange rates. (Reuters)
  Israeli–Palestinian conflict:
  - Richard Falk, a UN human rights rapporteur, issues a report to the United Nations
    General Assembly saying continued settlement construction would probably make
    Israel's occupation of Palestinian land irreversible and that said the UN, the
    US and Israel had failed to uphold the rights of Palestinians. (BBC)
  - Bishops from across the Middle East urge Israel to end its occupation of Palestinian
    territories at the end of a two-week-long meeting at the Vatican. (The New York
    Times)
  - The United Nations Relief and Works Agency for Palestine Refugees in the Near
    East (UNRWA) reports that the Israel Defense Forces (IDF) are preventing it from
    building schools in Gaza; the Israeli Defense Ministry says it is doing so to
    thwart Hamas from building the schools next to Hamas military installations.(The
    Jerusalem Post) (Ynetnews) (RIA Novosti)
  Law and crime:
  - The high court in Egypt orders the government to ban police officers from university
    campuses. (Al Jazeera) (BBC)
  - 306 former Tamil Tiger combatants are to be released from rehabilitation in Sri
    Lanka. (Xinhua)
  - Gunmen kill thirteen people and wound fifteen at a birthday party in the Mexican
    border city of Ciudad Juárez. (Al Jazeera) (Reuters)
  Politics and elections:
  - David Thompson, the Prime Minister of Barbados, dies of pancreatic cancer with
    Freundel Stuart being sworn in as the new Prime Minister. (Reuters via ABC News
    Online)
  - Voters in Bahrain go to the polls for the Bahraini parliamentary election. (Al
    Jazeera) (BBC)
  - The opposition Social Democrats are awarded control of the Czech senate by the
    people in mid-term elections, giving them the chance to oppose right-wing government
    attempts to cut the wages of workers, stop them sending more troops to Afghanistan
    and make government reforms "socially more tolerable". (BBC) (AFP via France24)
  - The Chinese government announces it will review a new language policy promoting
    mandarin as the sole language of instruction in universities following protests
    by Tibetan students across the country. (The Hindu)
  Sports:
  - The Texas Rangers advance to their first World Series after defeating the New
    York Yankees in the 2010 American League Championship Series. (Sports Illustrated)
    (New York Post)
  - The Australian Sports Anti-Doping Authority states that nine Australian athletes
    have tested positive for the banned stimulant methylhexanamine. (ABC News Australia)
  - In a fight promoted as "Aztec warrior vs. Viking", Cain Velasquez defeats Brock
    Lesnar at UFC 121 to become the new UFC Heavyweight Champion. (Sherdog)
