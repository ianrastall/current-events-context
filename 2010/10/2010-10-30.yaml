Date: '2010-10-30'
Source_URI: Portal:Current events/2010 October 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - One person was killed and eight others were wounded when unknown assailants opened
    fire in Rawalpindi's Civil Lines area of Pakistan. (dawn)
  - Gunman opened fire on a group of people on a neighborhood sports field in northern
    Honduras and killed at least 14. (Shanghai Daily)
  - NATO forces repel a Taliban attack on an outpost in Afghanistan's Paktika Province,
    killing at least 80 insurgents. (BBC) (Reuters Africa) (The Australian)
  - 2010 cargo plane bomb plot
  - The United States searches on Saturday for the people behind the attempts to send
    mail bombs to Chicago synagogues. (BBC) (The Jerusalem Post)
  - Yemeni authorities arrest two women in relation to the attack and search for other
    people of interest. (Al Jazeera) (AP)
  - President of Afghanistan Hamid Karzai reprimands Russia after its forces enter
    the country without permission and "violate Afghan sovereignty" in a joint mission
    with United States agents. Karzai orders an investigation. (Al Jazeera) (BBC)
  - Thousands of people flee their homes in Guinea amid ethnic clashes ahead of a
    presidential run-off. (IOL)
  - Community leaders in Plateau State, Nigeria, appeal for calm following attacks
    by Muslim Hausa–Fulani against a Christian village near the city of Jos. (BBC)
  - Somali pirates attack and seize a Liberian tanker with 24 crew on board in the
    Indian Ocean. (AFP)
  - A roadside bomb targeting the African Union Mission to Somalia kills seven people
    in the capital Mogadishu. (AHN)
  Arts, culture and entertainment:
  - English pop group Take That sell 1 million 2011 reunion tour tickets within 24
    hours amid crashing websites and jammed phone lines. (The Times of Malta) (The
    Irish Times) (Reuters) (BBC)
  - 18-year old Alexandria Mills from the United States wins the 60th edition of the
    Miss World pageant in China. (ABC News)
  Business and economy:
  - A large oil field is discovered off the coast of Brazil that could contain between
    8 and 15 billion barrels. (BBC)
  Disasters and accidents:
  - At least 16 people drown and 70 are missing after an overcrowded ferry sinks in
    a river in West Bengal, eastern India. (AFP)
  - Typhoon Chaba heads towards eastern Japan. (AFP via Google News)
  - French and Australian rescue crews find four French nationals who died in a helicopter
    crash in Antarctica. (CNN)
  - Hurricane Tomas lashes the islands of Saint Lucia and Saint Vincent in the Lesser
    Antilles. (BBC)
  Aftermath of October 2010 Sumatra earthquake:
  - The death toll from the tsunami climbs to 413 and 218 people missing with the
    government of Indonesia considering evacuations. (CNN)
  - Rescue workers find 135 people on a remote island and revise downwards by half
    the missing toll. (Al Jazeera)
  International relations:
  - Family reunions take place in North Korea between North and South Korean families
    separated during the Korean War sixty years ago. (Al Jazeera) (Yonhap)
  - Turkey's national security council adds Israeli activity in the Middle East, "online
    terror" and global warming to a document listing potential threats, while removing
    Armenia, Bulgaria, Georgia, Iran and Syria from the same list. The document also
    calls for a Middle East without nuclear weapons. (Ynetnews)
  - The prime ministers of China and Japan meet in Vietnam amid a diplomatic disagreement,
    with Hillary Clinton of the United States wading into the dispute during a speech.
    (Al Jazeera)
  - Abdullah of Saudi Arabia invites Iraqi political leaders for a meeting in Riyadh
    as part of an attempt to sort out the deadlock over the formation of a new government.
    (Al Jazeera)
  Law and crime:
  - Two men are sentenced to life imprisonment for the killing of a Rwandan journalist
    who had allegedly uncovered evidence that the Rwandan government was behind the
    attempted murder of an ex-army general. (IOL)
  - Turkey lifts a two-year ban on YouTube, which was blocked due to videos insulting
    the country's founder Mustafa Kemal Atatürk. (BBC) (Today's Zaman)
  - Sweden detains two people for allegedly plotting to attack Gothenburg in an alleged
    "terrorist crime". (Al Jazeera)
  - Fourteen people are killed by gunmen at a soccer field in San Pedro Sula, Honduras.
    (CNN)
  Politics:
  - An estimated 200,000 people attend the Rally to Restore Sanity and/or Fear by
    political satirists Jon Stewart and Stephen Colbert on the National Mall in Washington,
    D.C. (Al Jazeera) (Toronto Sun) (Reuters)
  - 'Harriet Harman, the deputy leader of the British Labour Party, issues an apology
    for branding Danny Alexander, a member of the British Government, a "ginger rodent".
    Mr Alexander tweets in response: "I am proud to be ginger and rodents do valuable
    work cleaning up mess others leave behind". (Sky News) (Press Association via
    The Guardian)'
  - In an interview with Al-Hayat later quoted by Israeli television, senior Hamas
    official Mahmoud al-Zahar calls a "rebel" against Hamas policy anyone who fires
    rockets from Gaza into Israel. (Haaretz)
  Sport:
  - Australia defeat Ireland by a score of 102–92 to win the 2010 International Rules
    Series at Croke Park. (RTÉ Sport) (The Irish Times) (ABC News) (The Sydney Morning
    Herald) (BBC Sport) (Sky Sports)
