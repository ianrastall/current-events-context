Date: '2010-10-09'
Source_URI: Portal:Current events/2010 October 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A senior Taliban commander and two other insurgents were killed in a fire fight
    with Nato and Afghan forces in western Badghis province's Murghab district. (Dawn)
  - 7 naxals are gunned down by the police in an encounter in Mahasamund district
    of Chhattisgarh. (Deccan Chronicle)
  - Four Italian soldiers die following an attack in the Farah area, Afghanistan.
    (CNN)
  - Gunmen in southwestern Pakistan near the town of Sibi set fire to more than 20
    oil tanker trucks carrying fuel for NATO forces in Afghanistan. (Al Jazeera) (Reuters
    via Yahoo! News)
  - The Government of Ecuador extends a state of emergency initially imposed on September
    30 in the 2010 Ecuador crisis. (CNN)
  Violence in England:
  - Riot police and dogs clash with protesters as demonstrations lead to violence
    in England. There are injuries and 5 men are arrested in the country's largest
    police operation for a quarter of a century (25 years). (BBC) (The Daily Telegraph)
  - A Sky News satellite truck is attacked by elements of the far-right English Defence
    League as 4 frightened members of its news team lock themselves inside. (Sky News)
  Death of Linda Norgrove:
  - The death of Linda Norgrove occurs during a botched rescue attempt by the United
    States in Afghanistan. (Sky News)
  - David Cameron defends the failed American rescue attempt. (BBC)
  Arts and culture:
  - Minister of Māori Affairs Pita Sharples adds his name to calls for suspended TVNZ
    broadcaster Paul Henry to be sacked after he manages to upset most of India. (stuff.co.nz)
  - Warner Bros. axes the 3D version of the next Harry Potter film. (BBC) (Daily Mail)
  Business and economy:
  - Silicon Valley Bank (SVB) has signed a series of cooperative framework agreements
    with the Shanghai Financial Office. (21cbh)
  Disasters:
  - More than 200 passengers are rescued, 20 of whom sustain injuries, from Baltic
    Sea ferry Lisco Gloria, en route from Kiel to Klaipėda, after it ignites near
    Fehmarn off the eastern coast of Schleswig-Holstein. There are reports of an explosion
    on board. (BBC) (Deutsche Welle)
  Ajka alumina plant accident:
  - The Hungarian town of Kolontár is evacuated as the emergency worsens. (BBC) (Sky
    News)
  2010 Copiapó mining accident:
  - A drill reaches the underground chamber where the 33 trapped miners reside. Wild
    celebrations occur. Rescue efforts are scheduled to begin within days. (BBC) (Reuters)
  International relations:
  - The United States leads a group of non-EU developed countries in attempts to thoroughly
    revamp the Kyoto Protocol, blocking any possible progress in the climate negotiations
    currently under way in Tianjin, according to negotiator Sui Wei. (China Daily)
  Law and crime:
  - An Ecuadorean court orders the imprisonment of 12 police after last week's 2010
    Ecuador crisis, with a lawyer saying they are being swept up in a "witch hunt".
    (Al Jazeera)
  - Former Oceanic Bank chief Cecilia Ibru is sentenced to six months in prison after
    being found guilty of committing 3 of 25 charges of fraud and mismanagement. (BBC)
  - Erwin Arnada, the former editor of Playboy Indonesia, is arrested on Bali. He
    had been on the run since being sentenced to two years in prison in August after
    an earlier trial in 2007. (BBC) (AFP via Philippine Daily Inquirer)
  Politics:
  - Kim Jong-un attends the Arirang Festival performance in Pyongyang with his father
    Kim Jong-il. It is Kim Jong-un's first appearance before the world's media. (BBC)
    Senior Chinese leader Zhou Yongkang is also in attendance. (Xinhua)
  Sport:
  - The New York Yankees sweep the Minnesota Twins to progress to the 2010 American
    League Championship Series in Major League Baseball. (New York Times)
