Date: '2010-10-05'
Source_URI: Portal:Current events/2010 October 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Afghan militant attacks kill 4 civilians, wound 6 in southwestern Farah province's
    Rusht Rod district. (Poten via Associated Press)
  - At least 3 people are killed and 9 others receive wounds during a bomb explosion
    at an apartment complex in the suburbs of Bangkok. (BBC), (ABC Online)
  - A linkmen working for the banned ULFA is killed, while 2 other cadres reportedly
    escape with their lives in an encounter in Meghalaya's West Garo Hills district.
    (PTI)
  - A car bomb explodes beside a shopping centre in Derry, Northern Ireland. (BBC)
  - A state of emergency in place in Ecuador after the 2010 Ecuador crisis is extended
    to Friday. (CNN)
  Arts and culture:
  - Google lines up Internet TV programming partners like TBS, TNT, CNN, HBO, NBA,
    CNBC. (Shanghai Daily)
  - Researchers identify a new, though threatened, language known as Koro. (BBC)
  TVNZ Breakfast race row:
  - Breakfast broadcaster Paul Henry is suspended effective immediately by TVNZ after
    yesterday's controversial interview with John Key. The network had previously
    issued a statement in support of Henry. (The New Zealand Herald)
  - Protesters rally outside TVNZ's central Auckland office to call for the broadcaster's
    scalp. (The New Zealand Herald)
  Business and economy:
  - The Bank of Japan lowers interest rates in Japan to a range of between 0 and 0.1%.
    (The New York Times)
  - Mexico issues its first ever 100-year bond, raising US$1 billion in a day. (Reuters)
  Disasters:
  - A state of emergency is declared after three people are killed and 120 injured
    by chemical sludge from an alumina plant flooded out of a burst dam in western
    Hungary. (Al Jazeera) (BBC) (Reuters) (AFP via Sydney Morning Herald)
  - The United Nations states that at least 400 children have already died in the
    Zamfara State lead poisoning epidemic, double the amount that had been previously
    reported; the incident is described as "far from over". (BBC) (AFP via The Sydney
    Morning Herald) (Reuters via News24)
  - A major hailstorm and significant tornado outbreak struck primarily the US state
    of Arizona, causing $4.9 billion in damages. (Storm Prediction Center)(NWS Phoenix)(NWS
    Flagstaff)
  - At least seven people die after a Cessna 402 crashes in the Bahamas. (Reuters
    via Yahoo)
  International relations:
  - President of Indonesia Susilo Bambang Yudhoyono cancels a state visit to the Netherlands
    in protest of a possible court arrest. (Al Jazeera) (BBC)
  - Former Pakistani President Pervez Musharraf tells Der Spiegel that a blind eye
    was turned to militant groups fighting in Kashmir. (BBC) (Der Spiegel) (The Asian
    Age)
  - President of the United States Barack Obama announces plans via Secretary of Energy
    Steven Chu that additional solar panels will be installed at the White House,
    while the founder of Sungevity plans to install solar panels at the private official
    residence of President of the Maldives Mohamed Nasheed for the "Global Work Party"
    event planned by 350. (The Associated Press) (The Washington Post) (Asian Tribune)
  - 1976 Nobel Peace Prize laureate Mairead Maguire is deported by Israel ending her
    joint effort with other Nobel laureates to meet Israeli and Palestinian peace
    activists. (The Hindu) (Hindustan Times)
  Law and crime:
  - Israel's army says it is investigating a video which appears to show a soldier
    dancing around a bound and blindfolded Palestinian woman. (Al Jazeera) (BBC)
  - A London court is told that a Saudi prince sexually murdered his servant. (BBC)
  - Faisal Shahzad, the failed Times Square bomber, is sentenced to life imprisonment
    without the possibility of parole by a court in New York. (Al Jazeera) (Sky News)
  - Former Société Générale trader Jérôme Kerviel is sentenced to three years in jail
    in France for his role in the 2008 Société Générale trading loss. (Al Jazeera)
    (BBC)
  - The extradiction of alleged arms dealer Viktor Bout from Thailand to the United
    States moves a step closer after a Thai court dismisses money laundering charges
    against him. (The Guardian)
  - French police arrest twelve alleged al-Qaeda terrorists in Marseilles and Bordeaux
    including three suspects allegedly found with bomb making kits. (Al Jazeera) (Jerusalem
    Post)
  - Steven Hayes is found guilty of murdering three women of the same family in Connecticut
    during a home invasion in 2007, now he is facing the death sentence or life imprisonment.(Fox
    News)
  - Ahmed Ghailani will have the first civilian trial for a Guantanamo inmate which
    will begin tomorrow in New York. (BBC)
  Politics:
  - Serbia mark the tenth anniversary of the overthrow of Slobodan Milošević. EU and
    U.S. politicians send their congratulations. (BBC)
  - UK Prime Minister David Cameron is forced to issue an apology to his own voters
    after breaking an election promise by withdrawing child benefit from 1.2 million
    of them. (The Guardian)
  - President of Bolivia Evo Morales knees a political opponent in the "testicular
    zone" during a friendly football match. (The Guardian)
  - Kim Jong-un joins his father Kim Jong-il in observing Korean People's Army, confirming
    his status as heir-apparent as Supreme Leader of North Korea. (AP via Google News)
  - President of Senegal Abdoulaye Wade dismisses his energy minister Samuel Sarr,
    following a week of protests over frequent power cuts, and replaces him with Wade's
    own son. (BBC)
  - Sudan announces its timetable for January's referendum on independence for the
    south, with 14 November named as the first date for voter registration. (BBC)
    (AFP via The Sydney Morning Herald)
  - Guinea announces that the second round of voting for the Guinea presidential election
    will be on October 24 after months of delay. (CNN)
  Science:
  - Physicists Andre Geim and Konstantin Novoselov at the University of Manchester
    win the 2010 Nobel Prize in Physics "for groundbreaking experiments regarding
    the two-dimensional material graphene". (Nobel Prize) (Al Jazeera) (The New York
    Times)
