Date: '2010-10-13'
Source_URI: Portal:Current events/2010 October 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two soldiers died and another one was injured in clash with PKK militants in Ovacik
    township of southeastern province of Tunceli, Turkey. (World Bulletin)
  - The death toll has risen to 11 following a U.S. drone strike launched late Wednesday
    night in the Datta Khell area of Pakistan. (Xinhua) (AP)
  - Somali pirates release Puntland's Ports Minister Said Mohamed Rageh who was kidnapped
    last Friday. (BBC)
  - Iran's Fars News Agency (FNA) announces that 18 people were killed in a blast
    at one of the Revolutionary Guards' bases in Luristan Province. (Xinhua)
  - War in Afghanistan
  - 4 Marines are killed in Helmand Province, Afghanistan when a roadside IED ambushes
    a convoy. Lance Corporals Joseph Rodewald, 22, Phillip Vinnedge, 19, Victor Dew,
    20, and Cpl. Justin Cain, 22. (Orange County Register)
  - 8 people are feared dead after a cargo plane crash near Kabul. (Hindustan Times)
    (AP via anhourago)
  - NATO claims to have killed two Taliban leaders in fighting in the Afghanistan
    War while a soldier was lost in fighting during an insurgent attack in eastern
    Afghanistan. (AP via Washington Examiner)
  - 10 people, including three women, are injured in a clash between two groups at
    Kaserwa in Uttar Pradesh, India. (DNA)
  Business and economy:
  - India will spend $2.3 trillion by 2030 to attempt to improve energy efficiency
    and use of clean technology.(DNA) (Reuters)
  - French unions continue mass strikes for a second day with over one million people
    protesting on Tuesday against pension reform. (CNN)
  - The Australian dollar reaches its highest level against the United States dollar
    in 27 years. (The Australian)
  - The US government rules out a moratorium on foreclosures. The moratorium would
    help millions expected to lose their homes, but may also hurt the housing market.
    (Reuters)(MSNBC)
  - An unknown pornographic actor has tested positive for HIV, with Wicked Pictures
    and Vivid Entertainment halting production. ABC News
  Disasters:
  - Rescue efforts conclude for the Chilean miners trapped in the 2010 Copiapó mining
    accident, with the last miner being rescued at 9:56PM local time. (Bloomberg),
    (Reuters), (AFP, AP via Sydney Morning Herald), (BBC)
  - The New Zealand city of Christchurch is hit by a magnitude 5.0 earthquake, an
    aftershock to the 2010 Canterbury earthquake. (ABC News Australia)
  International relations:
  - Iranian President Mahmoud Ahmadinejad visits Lebanon amidst concern from Israel
    and United States. (BBC)
  Politics and elections:
  - A group of 23 elder Communist Party of China members call for an end to restrictions
    on freedom of speech in the country. (BBC) (Al Jazeera)
  - Chinese Premier Wen Jiabao calls for reform of China's political system in the
    lead-up to a four-day annual policy meeting of Communist Party leaders. (AP via
    Yahoo!)
