Date: '2010-10-03'
Source_URI: Portal:Current events/2010 October 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Security forces eliminated 25 Taliban militants in their former stronghold Nad
    Ali district of southern Helmand Province of Afghanistan. (Xinhua) (People)
  - A roadside bomb strikes a civilian car in Paktika Province, in eastern Afghanistan,
    leaving seven civilians dead. (Xinhua)
  - Twelve people were killed and seven injured after individuals opened fire at NATO
    oil tankers near the Defence Housing Authority, in Rawalpindi, Pakistan. (Xinhua)
  - In a second audio recording in 24 hours, Al-Qaida leader Osama bin Laden says
    Muslim nations haven't done enough to support relief efforts in flood-hit Pakistan.
    (timesnow.tv)
  - An Israeli military tribunal convicts two Israeli soldiers for using a Palestinian
    child as a human shield during an offensive in Gaza in 2009, said to be the first
    conviction of its kind in Israel's history. (BBC) (Haaretz) (AFP via Google News)
  - Two Thai soldiers are killed and four others are wounded during a gun fight with
    suspected Islamist rebels in the south of the country. (Channel NewsAsia) (Thai
    News Agency)
  - Police in Indonesia kill six suspected Islamist militants and arrest four others
    in a raid in North Sumatra. (AFP) (Jakarta Post) (Xinhua)
  Arts and culture:
  - Archaeologists digging at a site on the Egypt-Gaza border unearth parts of a possible
    hidden city which they believe is more than 2,000 years old. They encounter difficulties
    while excavating due to the blockade of Gaza. (Al Jazeera)
  - International cultural experts attack the Italian government's policy of tolerating
    oversized advertisements on historic Venetian sights as being "probably illegal".
    They say it violates the city's UNESCO ranking as a World Heritage Site. (The
    Observer)
  - An art exhibition indicates Adolf Hitler's foreign minister, Joachim von Ribbentrop,
    planned to retire in Cornwall after the planned German invasion of Britain during
    World War II. (The Observer)
  Disasters:
  - Six people were killed and five injured Sunday after a wall of a factory building
    under construction collapsed in east China's Shandong Province. (Sina)
  - Five people were killed and four others were injured in a colliery explosion in
    southwest China's Guizhou Province. The accident was reported at Huanghegou pit
    in Xixiu District of Anshun City. (China Daily)
  - Rain-triggered floods killed four people and left two others missing Sunday in
    Atush city in northwest China's Xinjiang Uyghur Autonomous Region. (Global Times)
  - Nine die in floods in central Vietnam. Four people have been killed in Hà Tĩnh
    Province, one in Quảng Bình Province and one in Quảng Trị Province, while two
    individuals were injured in [à Tĩnh and Quảng Bình Provinces. (Vietnam News) (Vietnamnet)
  - An explosion rips through a leather workshop in the town of Güzelburç in Hatay
    Province, Turkey, killing 3 people and injuring 5 others. (Hürriyet)
  - 74-year-old Prime Minister of Italy Silvio Berlusconi tells a blasphemous joke
    about Jews to emergency workers dealing with the 2009 L'Aquila earthquake, causing
    upset to the Vatican. Berlusconi describes it as "just a laugh" he "made in private,
    not offensive and not a sin." (The Daily Telegraph)
  International relations:
  - Germany marks 20 years as a reunified nation with events in Bremen and pays its
    last World War I reparations. (BBC) (Al Jazeera) (AFP via The Sydney Morning Herald)
  - Egypt and Iran agree to resume direct flights after three decades. (Al Jazeera)
  - The United States issues a travel alert to its citizens across Europe, warning
    that it suspects they may become the target of a commando-style attack. (Al Jazeera)
    (BBC) (Channel 4 News)
  - The United Kingdom's Foreign and Commonwealth Office updates its travel advice
    for Europe. (The Guardian) (BBC) (Sky News)
  - American and British government officials make contact to collaborate on the issue
    of a broad travel alert. (PA via The Independent)
  Law and crime:
  - Ecuadorean Policy Minister Doris Soliz announces that parts of an austerity law
    which provoked the 2010 Ecuador crisis are to be rewritten. (BBC)
  - 22 Mexican tourists are kidnapped in Acapulco. (CNN) (RFI)
  Politics and elections:
  - Fiji's former prime minister, Mahendra Chaudhry, is arrested for allegedly breaching
    the military government's emergency regulations. (Al Jazeera) (BBC) (Fiji Times)
    (Sify India)
  - Voters in Brazil go to the polls in a presidential election with a runoff election
    likely between Dilma Rousseff of the Workers' Party and José Serra of the Brazilian
    Social Democratic Party. (Al Jazeera), (The Guardian)
  - Voters in Bosnia and Herzegovina go to the polls in a general election. (Al Jazeera)
  - Healthcare Professionals for Change, the first professional body established with
    the aim of improving the United Kingdom's Suicide Act 1961, is to launch its campaign
    to change death laws, described as "unprecedented". (The Observer)
  Sport:
  - The 2010 Commonwealth Games officially start at the Jawaharlal Nehru Stadium in
    Delhi, India. (Al Jazeera) (BBC News)
  Rugby league:
  - The St. George Illawarra Dragons defeat the Sydney Roosters 32–8 to win the 2010
    NRL Grand Final in Sydney. (The Australian)
  - Wigan Warriors defeat St Helens 22–10 to win the 2010 Super League Grand Final
    in Manchester. (BBC Sport)
