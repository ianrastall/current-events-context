Date: '2010-03-04'
Source_URI: Portal:Current events/2010 March 4
Intelligence_Payload:
  Uncategorized:
  - Egyptian President Hosni Mubarak says he does not mind the nomination of the former
    Director-General of International Atomic Energy Agency Mohamed ElBaradei in the
    next presidential election as long as it is under the framework of existing constitution.
    (Gulf NEWS)
  - Forty-one scientists publish a paper in Science affirming that the Cretaceous–Paleogene
    extinction event, the large-scale mass extinction of dinosaurs and other lifeforms
    on Earth ~65.5 million years ago, was caused by an asteroid impact. (Science),
    (Science)
  - A Mexico City law allowing same-sex marriages takes effect. (CNN)
  - The Committee on Foreign Affairs of the United States House of Representatives
    accepts a resolution describing the Armenian Genocide as "genocide", prompting
    Turkey to recall its ambassador and threatening Turkey–United States relations.
    (BBC)
  - Thousands of passengers are stuck in ice in the Baltic Sea. (BBC) (The Age) (CNN)
  - Dozens of tourists are airlifted to safety following flash floods at the Samburu
    National Reserve in Kenya. (BBC)
  - Four German Islamists are imprisoned after being convicted of planning "a second
    11 September 2001". (BBC)
  - A magnitude 6.4 earthquake hits Taiwan, injuring 12 and disrupting communications
    and rail services. (AP) (China Daily) (Taiwan News) (Focus Taiwan)
  - At least 63 people die after a stampede at a Hindu temple in Pratapgarh, Uttar
    Pradesh, India. (YahooNews) (Xinhua) (Hurriyet)
  - At least 14 people are killed in Baghdad on the first day of voting in Iraq's
    parliamentary elections. (BBC)
  - A Cairo court orders the retrial of Hisham Talaat Moustafa and Muhsin Sukkari
    who were sentenced to death for killing Lebanese singer Suzanne Tamim in Dubai
    in 2008. (BBC) (The Daily Telegraph) (The Guardian) (The Los Angeles Times) (Houston
    Chronicle)
  - The Party for Freedom (PVV) of Geert Wilders becomes the largest political party
    in Almere and the second largest in The Hague. (BBC)
  - The brother of Sinn Féin's Gerry Adams, detained under a European arrest warrant,
    is released on bail after surrendering to the Garda Síochána in Ireland. (BBC)
    (RTÉ)
  - The family of kidnapped boy Sahil Saeed ask that he be returned home safely. (BBC)
    (Bangkok Post) (Sky News)
  - Footballer Thierry Henry is booed by his own fans each time he touches the ball
    in his first game for France since his handball controversy against Ireland last
    November, with his own manager expressing doubt about his recent performances
    for the first time. (RTÉ) (The Guardian) (CNN) (The Daily Telegraph)
  - Burt Reynolds undergoes quintuple coronary artery bypass surgery. (BBC) (Ireland
    Online) (CNN) (CBC)
  2010 Uganda landslide:
  - Uganda buries its dead from Monday night's mudslide which destroyed three villages
    near Bududa. (BBC)
  - More than 50 schoolchildren are missing after elders instructed them to seek shelter
    in a hospital hit by mud. (The Scotsman)
