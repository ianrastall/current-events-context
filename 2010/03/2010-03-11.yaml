Date: '2010-03-11'
Source_URI: Portal:Current events/2010 March 11
Intelligence_Payload:
  Uncategorized:
  - The Kyzyl-Agash dam in Kazakhstan bursts, killing at least 35.(AFP)
  - Two children are prevented by the Roman Catholic Archdiocese of Denver from enrolling
    in a Catholic school in Boulder, Colorado, United States because their parents
    are lesbians. (The Straits Times)
  - The American Civil Liberties Union (ACLU) intervenes when Mississippi bans same-sex
    relationships and cancels its prom (leavers' dinner) due to the desire of a female
    student to bring her girlfriend and wear a tuxedo, while one of her teachers tells
    her "she had to remember where she was". (BBC) (CNN)
  - Israeli authorities plan thousands more homes in settlements in East Jerusalem
    since Palestinian leaders terminated talks earlier this week due to this issue.
    (The Guardian)
  - Israel apologises for the timing of the announcement during a visit by the Vice
    President of the United States, calling it a "grave error", a "mistake" and a
    "failure" and promising it would not happen again. (Gulfnews)
  - British freelance journalist Paul Martin, the first Western journalist to be arrested
    by Hamas, is released but deported after no evidence is found to convict him of
    a crime in court. (The Times) (CBC)
  - More than 30,000 Greek workers stage their third general strike against the government.
    (BBC) (Al Jazeera) (RTÉ)
  - Hundreds of angry women dressed in black march though the streets of Abuja and
    Jos following the recent massacre in Nigeria. (BBC)
  - More than 20 civilians die during the second day of conflict between Somali government
    troops and opposition forces in Mogadishu. (Al Jazeera)
  - The Gambia arrests people, including former fisheries minister Antouman Saho,
    without telling them why. (BBC)
  - Former President of the Federation of Bosnia and Herzegovina Ejup Ganić is released
    on bail on "stringent" conditions by the British High Court. (Al Jazeera)
  - As Sebastián Piñera is inaugurated as the new President of Chile, a new earthquake
    —6.9 and 6.7 magnitude—strike west of Pichilemu. (BBC) (MercoPress)
  - 'Afghanistan: Five civilians, including four children, die in an explosion, while
    two construction contractors, including one from South Africa, are shot dead.
    (Reuters)'
  - Turkey recalls its ambassador to Sweden and cancels the Turkey - Sweden summit
    planned for March 17 after the Riksdag votes in favour of calling the Armenian
    Genocide a genocide. (Armenian Weekly) (Deutsche Welle) (Radio Netherlands Worldwide)
    (RTÉ) (Reuters)
  - Sahil Saeed is "found" in Pakistan. (The Daily Telegraph)
  - Ivory Coast and Chelsea F.C. striker Didier Drogba is named African Footballer
    of the Year. (BBC)
  - The Duke of Edinburgh, on a trip to Exeter, Devon with Elizabeth II of the United
    Kingdom, asks a female sea cadet if she works at a strip club before concluding
    that it is "probably too cold for that anyway". (The Daily Telegraph) (The Sydney
    Morning Herald)
  - Pink Floyd win their court battle with EMI, paving the way for individual tracks
    of their music to be removed from online music services. (BBC) (The Daily Telegraph)
    (The Guardian)
