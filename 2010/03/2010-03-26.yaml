Date: '2010-03-26'
Source_URI: Portal:Current events/2010 March 26
Intelligence_Payload:
  Uncategorized:
  - China surpassed the United States last year as the country with the most clean
    energy investment. China's clean energy investments were $34.6 billion, compared
    with U.S.A.'s $18.6 billion last year. The US still leads the world in installed
    renewable energy, with 52.2 gigawatts of wind energy, small hydroelectric, biomass
    and waste generating capacity, per a report by the nonprofit Pew Charitable Trusts,
    but has dropped below ten other countries, including Canada and Mexico in investments
    as a share of the national economy.(The China Post) (Business Times) (China Daily)
    (L.A. Times)
  - An explosion triggered a fire in a chemical plant in an east China city, leaving
    3 dead, one seriously injured. The explosion occurred at 2:40 p.m. in Haiyi Specialty
    Chemicals Co., Ltd. in Qingdao, a coastal city in Shandong Province. (Sina)
  - US President Obama and Russian President Medvedev finalize a new arms control
    treaty to further reduce the nuclear arsenals of each country still remaining
    since the Cold War. (The Jerusalem Post) (The New York Times) (The Hindu)
  - A prominent Indonesian cleric says Islamic law should take priority over laws
    passed by Parliament. (The Jakarta Post)
  - The United Nations Secretary-General Ban Ki-moon says he is disappointed with
    Burma's military leaders for their lack of democratic progress in the run up to
    general elections in the country. (Al Jazeera) (Sydney Morning Herald) (Reuters)
  - Chinese police arrests a suspect for poisoning frozen dumplings for revenge. Those
    dumplings were exported to Japan and sickened 10 people in 2008. (Asahi Shimbun)
    (Xinhua)
  - 11 people are killed in a highway accident on Interstate 65 in the U.S. state
    of Kentucky, near Munfordville. The wreck site is roughly 40 miles northwest of
    the city of Bowling Green, near Mammoth Cave National Park. (CNN) (MSNBC)
  - A challenge to Ireland's Romeo and Juliet law is rejected by the High Court. (RTÉ)
  - A South Korean Navy ship named the Cheonan, carrying more than 100 personnel sinks
    near the Northern Limit Line in waters off the country's west coast near North
    Korea. (Yonhap) (BBC) (RTÉ) (The Times of India) An international team of investigators
    attributes the attack to a torpedo fired by a North Korean submarine. (The Times).
  - ITV drops police television series The Bill after 27 years. (The Guardian) (RTÉ)
  - The Times and The Sunday Times announce they are to charge £1 per day and £2 per
    week for online access from June 2010 and split into two websites from Times Online.
    (The Guardian) (Wall Street Journal) (RTÉ) (The New York Times)
  - Russia outlaws Mein Kampf due to its "extremist" content. (RIA Novosti) (Radio
    Netherlands Worldwide) (RTÉ) (The Hindu) (The New York Times)
  Middle East:
  - 'Israel refuses renewed calls to stop building homes in East Jerusalem, with a
    representative of Prime Minister Benjamin Netanyahu stating in writing: "Israeli
    construction policy in Jerusalem has remained the same for 42 years and isn’t
    changing". (Arab News)'
  - Iran calls on Muslims around the world to act in protest of Israel's construction
    plans in East Jerusalem. (Press TV) (Ynetnews) (The Star) (The Jerusalem Post)
  - 'Israeli incursion into Gaza: two Israeli soldiers and four Palestinian militants
    are killed. (Yahoo! News) (The Jerusalem Post)'
