Date: '2010-03-17'
Source_URI: Portal:Current events/2010 March 17
Intelligence_Payload:
  Uncategorized:
  - Protests in Thailand by the National United Front of Democracy Against Dictatorship
    continue, with supporters throwing their own blood outside the house of Prime
    Minister Abhisit Vejjajiva. (Thai News Agency) (Al Jazeera)
  - A French police officer dies in a shootout with Basque nationalist group ETA in
    Paris, the first French officer to do so. (CNN)
  - 30 members of the "Ladies in White" opposition movement in Cuba are arrested at
    a demonstration in the capital Havana. (AFP) (Al Jazeera) (BBC)
  - Seven Chinese fisherman kidnapped off Cameroon's disputed Bakassi peninsula are
    released. (CCTV) (BBC)
  - Nigeria's acting president Goodluck Jonathan dissolves the country's cabinet.
    (The Punch) (BBC) (Xinhua)
  - Saint Patrick's Day
  - President of the United States Barack Obama meets Taoiseach Brian Cowen at the
    White House in Washington, D.C., United States. (BBC) (RTÉ) (Irish Independent)
    (The Daily Telegraph)
  - Vice President of the United States Joe Biden makes an error when he suggests
    that Cowen's mother is dead. (The Daily Telegraph) (Evening Herald) (Fox News)
    (The Times)
  - More than half a million people fill the streets of Dublin for the parade there.
    (The Sydney Morning Herald) (RTÉ)
  - President of the United States Barack Obama announces that the United States will
    pursue aggressive sanctions to prevent Iran from getting a nuclear weapon that
    could potentially spark a nuclear arms race in the Middle East. (Reuters)
  - 'An investigation is launched into how a Wal-Mart shop in New Jersey, United States
    announced "Attention Wal-Mart customers: All black people leave the store now".
    (The Daily Telegraph)'
  - American television officials issue an apology following the broadcast of two
    hours of pornography on two children's channels. (BBC) (The Guardian) (Radio Netherlands
    Worldwide) (The Times of India)
