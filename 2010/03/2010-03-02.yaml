Date: '2010-03-02'
Source_URI: Portal:Current events/2010 March 2
Intelligence_Payload:
  Assassination of Mahmoud al-Mabhouh:
  - Police in Dubai order an arrest warrant for Israeli Prime Minister Benjamin Netanyahu
    and the head of Mossad in connection with the assassination of Mahmoud al-Mabhouh.
    (The Sydney Morning Herald)
  - Carrickmacross town council in Ireland votes to remove a guestbook page which
    had been signed by Israeli ambassador to Ireland Zion Evrony in protest at the
    alleged use of Irish passports in the assassination of Mahmoud al-Mabhouh. (Al
    Jazeera) (France24) (Press TV)
  Uncategorized:
  - Agathe Habyarimana, the widow of former Rwandan President Juvénal Habyarimana,
    accused of helping plan the 1994 genocide, is arrested in France. (BBC) (France
    24)
  - More than a dozen Chinese newspapers publish a rare joint editorial calling for
    the end of the hukou system of household registration. (AP) (China Daily) (BBC)
  - The government of the People's Republic of China announces a 10-year program under
    which clean energy will account for 15 percent of the total consumption mix by
    2020. (China Daily)
  - In the United Kingdom, BBC Director General Mark Thompson confirms plans to close
    BBC 6 Music and the BBC Asian Network as part of a cost-cutting drive. The proposals
    will also see BBC Radio 7 rebranded as BBC Radio 4 Extra and cutbacks to the BBC
    website. (Guardian) (Telegraph) (The Times) (BBC)
  - A landslide in the Bududa District of Uganda results in at least 100 deaths. (BBC
    News) (New Vision)
  - 'Murder of James Bulger: Jon Venables, one of Britain''s most notorious child
    murderers, is returned to prison after breaching the conditions of his release.
    (BBC) (RTÉ) (The Sydney Morning Herald) (The New Zealand Herald) (Radio Netherlands
    Worldwide) (CNN)'
  - Irish Minister for Arts, Sport and Tourism Martin Cullen is hospitalised after
    the escalation of a recent chronic back complaint, disrupting some of his work,
    including a visit to the United States. (RTÉ) (The Irish Times) (Irish Examiner)
    (Newstalk)
