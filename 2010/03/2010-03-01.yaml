Date: '2010-03-01'
Source_URI: Portal:Current events/2010 March 1
Intelligence_Payload:
  Uncategorized:
  - Sony blames recent malfunctions of older PS3 "fat" models on an internal clock
    glitch. (BBC)
  - An aeroplane carrying aid materials for the 2010 Chile earthquake crashes killing
    at least six people. (ABC)
  - In response to the assassination of Mahmoud al-Mabhouh, Dubai's police chief states
    that travelers suspected of being Israeli will not be allowed into the United
    Arab Emirates even if they arrive with passports issued by other countries. (AP),
    (The Jerusalem Post)
  - Floodwaters in Les Cayes and surrounding areas responsible for the deaths of 8
    Haitians recede. (Al Jazeera)
  - Georgia and Russia re-open their only usable land border crossing, located on
    the Caucasus Mountains, for traffic and trade for the first time in four years.
    (Al Jazeera) (Press TV) (Toronto Sun) (Xinhua)
  - Spain requests an explanation from Venezuela concerning allegations that it helped
    terrorist groups Euskadi Ta Askatasuna and FARC plot to kill Colombian President
    Álvaro Uribe and other Colombian personalities in Spanish soil. (BBC) (Houston
    Chronicle) (Sky News)
  - Goalkeeper Kodjovi Obilalé, shot in the Togo national football team attack prior
    to the 2010 Africa Cup of Nations in Angola, is to return to France after emergency
    surgery in Johannesburg. (Radio Netherlands Worldwide) (Reuters South Africa)
  - 63-year-old former President of the Federation of Bosnia and Herzegovina Ejup
    Ganić is detained at London Heathrow Airport while trying to leave the UK to escape
    charges of war crimes. (BBC) (RTÉ) (Radio Srbija) (Al Jazeera) (The New York Times)
  - The Palestinian cabinet moves its weekly meeting from Ramallah to Hebron in a
    symbolic protest at the decision by Israel to add Hebron's Cave of the Patriarchs
    and Rachel's Tomb in Bethlehem to its list of national heritage sites. (Voice
    of America)
  - The trial of former Bosnian Serb leader Radovan Karadžić resumes in The Hague.
    (CNN) (The Sydney Morning Herald) (The New Zealand Herald) (RTÉ)
  - 17 Nigerian police officers are arrested in connection with the deaths of Boko
    Haram members in 2009. (BBC) (Al Jazeera) (Radio Netherlands Worldwide)
  - Convicted member of ETA Iñaki de Juana Chaos is to be extradited from Northern
    Ireland to Spain where he is scheduled to face further charges. (RTÉ) (BBC)
  - Toyota president Akio Toyoda apologies to his Chinese customers in Earth's largest
    auto mart. (BBC) (Financial Times)
  - Two of three Sikhs kidnapped in Khyber Agency on the Afghan border in January
    are recovered by Pakistan's security forces. The decapitated corpse of the other
    was found last week. (Reuters India)
  - Robert Mugabe's indiginisation law begins, with 51 per cent of each company being
    given to black Zimbabweans. (Al Jazeera) (BBC) (Voice of America)
  - A petition featuring 450,000 international names in opposition of Uganda's Anti-Homosexuality
    Bill is given to the speaker of parliament, Edward Ssekandi, by an Anglican priest
    and an HIV/AIDS activist. (BBC) (Voice of America)
  - Over 5,000 people, including a pregnant woman and TV weatherman Grant Denyer,
    strip naked and are photographed at the Sydney Opera House during the Sydney Gay
    and Lesbian Mardi Gras, double the number which had been expected. (BBC) (news.com.au)
    (CBC) (Reuters)
  Xynthia:
