Date: '2010-03-14'
Source_URI: Portal:Current events/2010 March 14
Intelligence_Payload:
  Uncategorized:
  - A massive power outage occurs in parts of Chile, including Santiago, with ONEMI
    working to restore service. (The Sydney Morning Herald) (Santiago Times)
  - David Beckham tears his Achilles tendon in a match for A.C. Milan. He is ruled
    out for the 2010 FIFA World Cup. (The Times) (The New York Times) (Houston Chronicle)
    (CNN)
  - National United Front of Democracy Against Dictatorship protesters in red march
    through Bangkok, Thailand, demonstrating against the government. (The Times) (Sky
    News) (The Washington Post) (CBC) (Xinhua)
  - Archbishop of Armagh and Primacy of Ireland Cardinal Seán Brady refuses calls
    by sex abuse victims such as Colm O'Gorman to resign and defends representing
    the Church when two teenagers abused by Father Brendan Smyth were forced to sign
    an oath of silence. (RTÉ) (The Guardian) (BBC) (The Sunday Times)
  - Israeli military forces seize a senior Hamas official after raiding Ramallah.
    (Reuters) (Hindustan Times) (ABC News)
  - Two French Triangle workers who were kidnapped in Birao, Central African Republic
    last November are released in Darfur. (BBC)
  - Two people are killed and 30 injured when an avalanche hits a snowmobile competition
    in British Columbia, Western Canada. (Vancouver Sun) (Globe and Mail) (CBC)
  - Drug-related violence kills 24 people in Mexico in 24 hours, 13 of them in the
    city of Acapulco. (Times) (BBC) (CNEWS) (MSNBC) (Jakarta Post) (Reuters)
  - Spaniard Fernando Alonso wins the 2010 Bahrain Grand Prix Formula One race; Brazilian
    Felipe Massa comes in second. (The New York Times)
  - 'Colombian legislative election, 2010: Over 2500 candidates can be chosen for
    102 Senate seats and 166 Chamber of Representatives seats, as well as 5 Colombian
    representatives to the Andean Parliament (organ of the Andean Community of Nations)
    and a people''s initiative in the Caribbean Region. (BBC) (Reuters)'
  - Primaries elections for the presidential candidate (for the upcoming presidential
    election) from Green Party (3 candidates) and Conservative Party (5 candidates)
    also take place. (Direct Democracy)
  - Brazilian President Luiz Inácio Lula da Silva lands in Israel at the start of
    his Middle East tour of Palestine and Jordan before his visit to Iran. (BBC)
  Earthquakes:
  - A 6.6 magnitude earthquake hits central Japan with no reports of damage or casualties.
    (MSNBC.com)
  - A 6.4 magnitude earthquake hits the eastern islands of Indonesia; no immediate
    reports of casualties. (AP) (Reuters)
