Date: '2010-03-03'
Source_URI: Portal:Current events/2010 March 3
Intelligence_Payload:
  Uncategorized:
  - Gay people may now receive communion across the diocese of 's-Hertogenbosch after
    nationwide protests following an incident last Sunday. (Radio Netherlands Worldwide)
  - 'An Israeli raid on the West Bank is aborted after a soldier posts the following
    secret details on Facebook: "On Wednesday we are cleaning Qatanna, and on Thursday,
    God willing, going home". (RTÉ) (RIA Novosti) (USA Today) (Ha''aretz) (Reuters)'
  - Leonid Tyagachyov, head of Russia's Olympic Committee, resigns after the nation's
    worst performance in the history of the Winter Olympic Games at the 2010 event
    in Vancouver. (BBC) (The Washington Post) (Bangkok Post) (The New York Times)
  - A fake Swedish pilot is detained in an Amsterdam cockpit in the process of taking
    off for Turkey in a jet with 101 passengers. (BBC) (The News International) (Reuters)
    (The Daily Telegraph) (The Age)
  - One German and one Italian man are killed and at least 6 are injured near Marseille
    in a collision between a 26-foot wave and the Greek-Cypriot cruise ship Louise
    Majesty which was travelling with 2,000 passengers from Barcelona to Genoa. (Al
    Jazeera) (USA Today) (Herald Sun) (Irish Independent)
  - President of Nigeria Umaru Yar'Adua does not attend a cabinet meeting in Abuja
    after his arrival home from medical treatment in Saudi Arabia. Acting President
    Goodluck Jonathan chairs instead. (Al Jazeera)
  - Spain says Venezuela has said it will assist an investigation into allegations
    of support for ETA. (BBC)
  - 5 police officials in Chiniot, Punjab, are detained after footage of them whipping
    people in their custody are broadcast across national television channels. (BBC)
    (The News International)
  - 7 suspected weapons traffickers to Iran (2 Iranians, 5 Italians) are detained
    in Italy with the help of Swiss police. (Al Jazeera) (BBC) (The Times) (The Daily
    Telegraph) (France24)
  - Multiple suicide bombings, including one at a hospital, kill at least 33 and wound
    more than 50 people in Baqouba, Iraq. (CNN) (The Hindu) (Al Jazeera)
  - Three are killed in Indian Navy air show crash in Hyderabad, India. (The Hindu)
    (BBC) (CNN)
  - In the elections in the Netherlands, voters choose new municipal councils for
    394 municipalities. (Nederland Kiest) (NOS)
  - A BBC investigation claims millions of dollars in Western aid donated to the 1984–1985
    famine in Ethiopia was stolen by rebels who used it to purchase weapons. (BBC)
  - 14 killed, 39 wounded in a gunbattle in Mogadishu, Somalia's capital city. (Stuff)
    (Hurriyet)
  Aftermath of the 2010 Chile earthquake:
  - The Chilean Navy admits failure to prevent deaths in the tsunami triggered by
    the recent earthquake. (Al Jazeera)
  - 'Residents in Concepción are critical of the government''s response, with one
    saying: "I did not support General Augusto Pinochet, but right now we could use
    a Pinochet". (The Independent)'
  - President Michelle Bachelet says Chile is not short of food and fuel as the official
    death toll now stands at 799. (BBC)
  The Hurt Locker:
  - Nicolas Chartier, producer of The Hurt Locker, is banned from the 82nd Academy
    Awards after an e-mail is found to be a violation of rules. (BBC) (The Guardian)
    (CNN)
  - An American army bomb disposal expert sues for multi-millions the makers of The
    Hurt Locker. (ABC News)
