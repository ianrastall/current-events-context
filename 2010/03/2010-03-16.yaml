Date: '2010-03-16'
Source_URI: Portal:Current events/2010 March 16
Intelligence_Payload:
  Uncategorized:
  - Ancient tombs of Uganda's Bugandan kings, a World Heritage Site, are burnt down
    by unknown causes. (New Vision) (Xinhua)
  - Nauru President Marcus Stephen dissolves Parliament, paving the way for an early
    general election, originally scheduled for 2011. (Radio New Zealand International)
  - Archbishop of Armagh and Primate of All Ireland Cardinal Seán Brady is accused
    of using the "Nuremberg defence" and is told to resign by politicians, including
    Martin McGuinness, over his representation of the Church when two teenagers abused
    by Father Brendan Smyth were forced to sign an oath of silence. (Ireland Online)
    (CNN) (The Times)
  - A man who used to teach at a Roman Catholic religious order's schools in Spain
    is arrested in Chile on suspicion of sexually abusing children. (CNN)
  - The military trial of Sri Lanka's former army chief Sarath Fonseka, charged with
    participating in politics while in uniform, is adjourned at the end of day one.
    (BBC) (The Guardian) (CBC) (The Daily Telegraph) (The Times)
  - Thai redshirts spill blood at the gates of the government in their third day of
    protests. (BBC) (The Times) (The Guardian)
  - France sends military aid to Wallis and Futuna, which suffered extensive damage
    from Cyclone Tomas. (Ocean Flash)
  - French national railway SNCF, as part of a rapid response training, causes a media
    scare by mistakenly placing a statement on its website stating that more than
    100 people died in a train explosion in Mâcon, Burgundy. (BBC) (San Francisco
    Chronicle) (The Times) (The Daily Telegraph)
  - NASA researchers in Antarctica discover cold-water Lysianassidae, shrimp-like
    amphipods, living in the water beneath the Ross Ice Shelf. (The Christian Science
    Monitor)
  - Michael Jackson's estate signs history's largest recording deal with Sony Music.
    (BBC) (Sky News) (The Guardian) (The Times)
  - Sahil Saeed is located alive and well in a field in Pakistan after being deposited
    at a school. (BBC) (Sky News) (The Guardian) (The Daily Telegraph) (The Times)
  - The Pakistan Olympic Association postpones its national games in Peshawar due
    to security concerns. (BBC) (Reuters)
  - A French gendarme is killed by ETA terrorist members near Paris, in the first
    murder of a French police officer by ETA. (BBC)
