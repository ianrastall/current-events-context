Date: '2010-03-10'
Source_URI: Portal:Current events/2010 March 10
Intelligence_Payload:
  Interreligious riots in Jos, Nigeria:
  - Nigerian soldiers open fire on a crowd after curfew in Jos, killing two people,
    days after Muslim-Christian riots in the area left more than 200 dead including
    dozens of children (The Hindu)
  - Nigeria charges with murder 49 of the 200 people it has arrested so far following
    the recent massacre of civilians near Jos. (BBC)
  Uncategorized:
  - Britain, France and the EU support U.S. Vice President Joe Biden's condemnation
    of Israeli expansion of settlements in occupied territory. (BBC)
  - Burma's newly announced second law relating to the 2010 general election bars
    anyone with a criminal conviction from participating in a political party, effectively
    barring Aung San Suu Kyi. (Al Jazeera) (Straits Times) (CNN)
  - Three men are detained in relation to the theft of the corpse of former Cypriot
    President Tassos Papadopoulos. (BBC)
  - Australia and Indonesia sign an agreement to combat people smuggling. (news.com.au)
  - Dulmatin, the alleged mastermind of the 2002 Bali bombings, is confirmed dead
    in a police raid in Pamulang, Jakarta, by Indonesian President Susilo Bambang
    Yudhoyono during a state visit in Australia. (ANTARA News) (CNN) (BBC)
  - Aid worker Alicia Gamez, captured in Mauritania in 2009 by a group affiliated
    with Al Qaeda and taken to Mali, is released. (BBC) (IOL) (Houston Chronicle)
    (CNN)
  - Boris Berezovsky is awarded £150,000 in England's High Court and wins his libel
    case in relation to the 2006 poisoning to death of Alexander Litvinenko. (BBC)
    (The Daily Telegraph) (Sky News)
  - A man wrongly accused of being child murderer Jon Venables goes into hiding after
    becoming the target of a hate campaign on the internet. (The Daily Telegraph)
  - The birth of a live elephant at Taronga Zoo is hailed as a "miracle" that will
    "completely rewrite the elephant birth textbooks" after he was thought to have
    died inside his mother's womb. (BBC)
  - Forbes magazine publishes its 2010 list of billionaires, replacing Bill Gates
    with Carlos Slim as the world's wealthiest person. (Forbes)
