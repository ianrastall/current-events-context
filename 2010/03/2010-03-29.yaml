Date: '2010-03-29'
Source_URI: Portal:Current events/2010 March 29
Intelligence_Payload:
  Uncategorized:
  - 15 people, including 2 journalists, are arrested by Israel during a police attack
    on a protest near Bethlehem. (The Muslim News)
  - Aung San Suu Kyi's party, the National League for Democracy, announces it will
    boycott the upcoming general elections in Burma. (BBC) (AP)
  - Suicide bombers detonate two bombs at Moscow Metro stations Lubyanka and Park
    Kultury, killing at least 36 with the death toll expected to rise. (RIA) (AP)
    (Russia Today) (RIAN)
  - The stern of the South Korean warship which exploded on Friday with 46 crewmen
    still missing is located and the military is expected to attempt a dive. (The
    Sydney Morning Herald) (Yonhap)
  - Maule, Chile, is rattled by a 6.1 magnitude aftershock on Monday 08.43 a.m. AEDT
    (5:43 p.m. Sunday local time). (The Sydney Morning Herald) (Xinhua)
  - A Rio Tinto Group executive is jailed for 10 years in China. (RTÉ)
  - FARC releases into the jungle a soldier it kidnapped just under a year ago. (BBC)
  - Ireland's rail line between Galway and Limerick reopens for the first time in
    34 years. (RTÉ)
  - More than 300 southern right whales, mostly young calves, have been discovered
    dead off Argentina's Patagonian coast in the last five years. (The Sydney Morning
    Herald)
  - In architecture, Kazuyo Sejima and Ryue Nishizawa, cofounders of the firm SANAA,
    win the 2010 Pritzker Prize. (BBC News)
  - Nine members of the Hutaree militia are arrested in the United States on allegations
    of a plot to kill policemen then to attack the funerals, in preparation for a
    war against all levels of American government. (CNN)
  - A patent on two human genes is struck down by a judge in U.S. District Court in
    Manhattan. (The New York Times) (Newsweek)
