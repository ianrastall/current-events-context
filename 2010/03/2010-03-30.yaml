Date: '2010-03-30'
Source_URI: Portal:Current events/2010 March 30
Intelligence_Payload:
  Uncategorized:
  - Colombian soldier Pablo Emilio Moncayo is released after 12 years in FARC captivity.
    (BBC)
  - Russia has a day of mourning following the train bombs in Moscow. (CBC) (RTÉ)
  - The Andaman Islands are rattled by a 6.6 magnitude earthquake. (USGS)
  - Two mortuary staff in Shandong are arrested after 21 baby corpses are found in
    a river. (China Daily) (news.com.au) (Sky News) (CNN)
  - The body of Sheikh Ahmed bin Zayed Al Nahyan is found by a team of Moroccan and
    French divers four days after his aircraft crashed into a lake in Morocco. (Al
    Jazeera)
  - The 2010 South American Games are officially closed, with Colombia winning the
    most gold medals and Brazil just a little over 10 medals behind.
  - Somali pirates hijack 8 Indian vessels abducting 120 sailors, biggest abduction
    count till date, off the coast of Kismayo. (The Times of India)
  - 10 children, youths and young adults between the ages of 8 and 21 are gunned down,
    presumably by drug traffickers, in the northern Mexican state of Durango. (CNN)
  - Chinese police are hunting a man suspected of killing five members of a migrant
    family, including an 8-year-old girl, in the Inner Mongolia Autonomous Region.
    (People's Daily)
  - Seán Quinn's Quinn Insurance goes into administration. (RTÉ) (The Irish Times)
    (The Guardian) (BBC)
  - Ten people were shot Tuesday night in what appears to be two drive-by shootings
    in southeast Washington D.C., with at least four killed. (Xinhua) (China Dialy)
    (CCTV) (CNN)
  - At least 31 militants were killed Tuesday during Pakistan Security Forces operation
    in the Orakzai tribal agency. Over 150 militants have been killed in the last
    six days. (People Dialy)
