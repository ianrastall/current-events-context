Date: '2010-03-07'
Source_URI: Portal:Current events/2010 March 7
Intelligence_Payload:
  Uncategorized:
  - Hundreds of Christian villagers are hacked to death with machetes by Muslim herders
    in Dogo-Nahawa, Nigeria. (Reuters) (BBC) (The Washington Post)
  - Tens of thousands demonstrate against an abortion bill in several Spanish cities.
    (BBC) (The Mercury)
  - Melbourne, Australia experiences flooding after a once-in-a-century thunderstorm
    of marble-sized hailstones which tears the roof from a railway station and leads
    to the postponement of sports fixtures. A state of emergency is declared in Queensland.(Sky
    News) (The Times)
  - Voters in Iraq take part in parliamentary elections and a referendum on the Status
    of Forces Agreement. (Al Jazeera) (BBC)
  - Voters in Switzerland take part in a referendum on whether to provide lawyers
    for non-human animals and other issues. (Swissinfo) (Deutsche Welle)
  - Five Pakistani police officials are suspended due to their negligence in the kidnapping
    of British Pakistani boy Sahil Saeed. (Sky News)
  - Three people are killed falling from high-rise flats in Glasgow. (BBC) (The Guardian)
    (Sky News) (The Times)
