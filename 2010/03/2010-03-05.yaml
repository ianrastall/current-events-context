Date: '2010-03-05'
Source_URI: Portal:Current events/2010 March 5
Intelligence_Payload:
  Uncategorized:
  - Baidu shares have risen 34% since rival Google said on Jan 12 it may shut down
    its business in China. Baidu has risen 34 percent and Google has lost 8.5 percent.
    (China Daily)
  - Irish Minister for Foreign Affairs Micheál Martin, writing in the International
    Herald Tribune, says Israel's blockade of Gaza is "inhumane and unacceptable"
    and calls on the European Union and other countries to request that it be ended
    following his visit there last week. (Ha'aretz) (RTÉ)
  - A magnitude 6.5 earthquake occurs in the ocean off Sumatra with the possibility
    of a tsunami. (CNN)
  - HIH Princess Toshi of Japan is excused from school due to excessive bullying from
    classmates. (BBC) (Japan Today) (Miami Herald) (The Daily Telegraph) (The Times)
  - Joe Glenton, a British soldier who went AWOL in 2007 and became a figurehead of
    the anti-war movement, is demoted and sent to jail in Colchester. (BBC) (CNN)
    (The Guardian) (The Daily Telegraph)
  - Prime Minister of the United Kingdom Gordon Brown gives evidence to the Iraq Inquiry.
    (The Guardian) (The Daily Telegraph) (The Times)
  - Fiji imprisons eight men for an assassination attempt on Commodore Frank Bainimarama
    in 2007. (BBC) (The Washington Post) (Bangkok Post) (The Sydney Morning Herald)
  - 15 Israeli police are "lightly hurt" and several dozen Palestinians are injured
    and three are arrested after Friday prayers on the Temple Mount and a recent Israeli
    decision to include two West Bank shrines on a list of national heritage sites.(Ha'aretz)
  - At least 16 people are wounded in two grenade attacks in Kigali, one near the
    city's genocide memorial. A third explosion elsewhere kills at least one person.
    (BBC) (Reuters)
  - Pakistan army kills 30 Taliban militants near Peshawar, the capital of North West
    Frontier Province. (Global Security)
  - A suicide bomber attacked a convoy of Shi'ite Muslims in northwest Pakistan, killing
    at least 12 people. (Global Security)
