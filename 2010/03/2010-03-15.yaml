Date: '2010-03-15'
Source_URI: Portal:Current events/2010 March 15
Intelligence_Payload:
  Israeli–Palestinian conflict:
  - Israel's ambassador to the United States, Michael Oren, did not claim that relations
    between the two countries face their worst crisis in 38 years. (BBC News)
  - After hundreds of photographs and movies are declassified by the Israel Defense
    Forces, the Intelligence and Terrorism Information Center publishes a report showing
    Hamas using children as human shields as well as operating out of mosques and
    hospitals in the recent Gaza War.(The Jerusalem Post)
  Uncategorized:
  - David Beckham flies to Finland to have surgery for a torn Achilles tendon, after
    the injury thwarts his attempt to become the first English footballer to play
    at four editions of the FIFA World Cup. (The Scotsman)
  - United States Senator Christopher Dodd submits a draft of a bill that would reform
    financial regulation, mostly in accord with the proposals of President Barack
    Obama's administration. (Reuters)
