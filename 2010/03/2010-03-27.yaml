Date: '2010-03-27'
Source_URI: Portal:Current events/2010 March 27
Intelligence_Payload:
  Uncategorized:
  - Earth Hour
  - Approximately 4,000 cities around the world dimmed their building lights to commemorate
    Earth Hour. (MSNBC)
  - Irish Green Party leader John Gormley is criticised for delivering a televised
    speech during his party's national convention which coincides with Earth Hour.
    (Irish Independent) (RTÉ) (Irish Examiner)
  - More than 100 people are injured and one death is reported as the Bugandan king
    visits royal tombs which were recently destroyed by fire. (Arab News)
  - Two bombs killed 42 people and wounded 65 others in Iraq's mainly Sunni Diyala
    province, prior to the release of full preliminary results from the March 7 parliamentary
    election. (China Daily)
  - Three deaf men who allege they were sodomised and abused by priests as children
    appear on RAI Television to confront the diocese of Verona. (Arab News)
  - The European Union and Libya lift visa bans on each other. (BBC)
  - India test fires two short range missiles, the Dhanush and Prithvi II. (The Hindu)
    (Xinhua) (Straits Times)
  - President of Egypt Hosni Mubarak is reported by Al Gomhuria to be returning home
    following his recent gallbladder surgery in Heidelberg. (Al Jazeera)
  - The South Korean government calls an emergency security meeting to investigate
    yesterday's ship sinking near Baengnyeong Island in the Yellow Sea as a rescue
    operation continues to retrieve 46 missing sailors. (Al Jazeera) (BBC) (Yonhap)
  - Thousands of soldiers participate in Burma's annual Armed Forces Day parade in
    Naypyidaw and are inspected by General Than Shwe who delivers a rare public address.
    (BBC) (IOL) (Bangkok Post)
  - Thai troops retreat after thousands of "red shirt" protesters demand fresh elections.
    (Bangkok Post) (Reuters)
  - In horse racing, Gloria de Campeao wins the Dubai World Cup. (BBC)
  Middle East:
  - 'Israeli tanks and armoured bulldozers leave Gaza after an incursion near Khan
    Younis: two Gazans are killed and 12 wounded, including at least one civilian.
    (Jerusalem Post)'
  - Jerusalem is discussed at the two-day annual Arab summit in Sirte, with PNA officials
    calling for "a large Arab political support to the Palestinian people on all levels
    in order to be able to face the right-wing Israeli government of Benjamin Netanyahu
    which insists to elude from the peace process and keeps its aggressive actions
    against our people". (Xinhua)
