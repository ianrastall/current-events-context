Date: '2010-03-06'
Source_URI: Portal:Current events/2010 March 6
Intelligence_Payload:
  Uncategorized:
  - Micheál Martin briefs his fellow EU Foreign Ministers on his visit to Gaza at
    a meeting in Córdoba, Spain. (RTÉ)
  - Washington, D.C. is to become the first American city to hand out free female
    condoms in the battle against HIV/AIDS. (The Washington Post) (BBC) (Boston Globe)
  - There are riots in Brussels. (Sky News)
  - Nigeria's and Al-Merreikh's Endurance Idahor dies during a football match in Sudan
    with the referee ending the match as a result. (BBC) (The Times of India) (The
    New York Times)
  - Ingushetian President Yunus-bek Yevkurov confirms the death of Alexander Tikhomirov/Said
    Buryatsky. (BBC) (Reuters) (The Star)
  - Taliban commander Faqir Mohammed is reportedly killed in a drone strike in Pakistan.
    (BBC)
  - The Chilean Navy removes Commander Mariano Rojas, head of the oceanography service,
    from his post following his failure to warn of the tsunami which followed the
    2010 Chile earthquake. (The Daily Telegraph) (The New Zealand Herald) (RTÉ) (The
    Times)
  - At least 11 Philippine soldiers are killed in an ambush by communist rebels in
    Mansalay, Mindoro. (Philippine Inquirer) (Al Jazeera)
  - Iceland holds a referendum about compensating the United Kingdom and the Netherlands
    after the collapse of the Icesave bank, with a 95% "no" vote recorded. (BBC)(CNN)
    (IceNews)
  - US Defense Secretary Robert Gates reviews allegations of misconduct in Afghanistan
    by the private military company formerly known as Blackwater, Xe Services LLC.
    (BBC)
  Iraqi parliamentary election, 2010:
  - Iraqis living in Iran vote. (Al Jazeera)
  - A car bomb which explodes in Najaf results in the deaths of at least three people
    one day before elections. (Al Jazeera)
  Hosni Mubarak:
  - Egyptian President Hosni Mubarak temporarily hands over power, due to surgery
    on his gallbladder. (AFP) (Washington Post)
  - Gallbladder surgery on Egyptian President Hosni Mubarak is said to have been successful
    at Heidelberg University Hospital in Germany. (Al Jazeera)
