Date: '2010-03-31'
Source_URI: Portal:Current events/2010 March 31
Intelligence_Payload:
  Uncategorized:
  - Algerian authorities arrest an Israeli spy found with a false Spanish passport
    under the 35-year-old pseudonym Alberto Vagilo. This was initially reported by
    some sources as the abduction of a Spanish citizen by an al-Qaeda-linked group.
    (Press TV)
  - Yemeni Minister of Justice Ghazi al-Aghbari and Palestinian ambassador to Yemen
    Bassem Al-Agha hold discussions on the issue of bilateral judicial cooperation.
    (Saba News Agency)
  - The Israel Defense Forces (IDF) fire tear gas at around 200 Palestinians and their
    allies protesting outside the gates of Ofer Prison at the recent detainment of
    colleagues. (Ynetnews)
  - MPs state the UK government must ensure that military equipment sold to Israel
    is not used in the occupied territories. (BBC)
  - A bicycle-borne bomb kills at least 13 people and injures 45 others in Afghanistan's
    Helmand province. (CNN)
  - Twelve people, including two police officers, are killed in two blasts in the
    town of Kizlyar in Russia's volatile North Caucasus region of Dagestan. (RIA Novosti)
    (Xinhua) (TVNZ)
  - Serbia passes legislation that offers an apology for its role in the 1995 Srebrenica
    massacre during the Bosnian War. (B92) (BBC)
  - Shahram Amiri, a scientist involved in Iran's nuclear program, defects to the
    United States and begins talking to the Central Intelligence Agency. (ABC News)
  - The trial of the lone surviving gunman involved in the 2008 Mumbai attacks, Ajmal
    Kasab, concludes. (NDTV) (BBC)
  - Google says thousands of internet users in Vietnam have been spied on with malicious
    software, appearing to target opponents of bauxite mining in the country. (BBC)
    (Reuters)
  - Foreign journalists based in China and Taiwan say their Yahoo email accounts have
    been hacked. (Times of India) (BBC) (Radio Taiwan International)
  - Lines of "green wall" are built along the desert district in Yanchi county, Ningxia
    Hui autonomous region to defend against desertification. (Sina)
