Date: '2010-03-18'
Source_URI: Portal:Current events/2010 March 18
Intelligence_Payload:
  Uncategorized:
  - The Sudanese government signs a ceasefire deal with a small Darfur rebel group,
    Liberation and Justice Movement. (Al Jazeera)
  - Nigeria recalls its ambassador to Libya after Libyan leader Muammar al-Gaddafi
    suggests the country be partitioned into two separate Christian and Muslim nations.
    (BBC) (Modern Ghana) (Al Jazeera)
  - Proposed international trade bans on polar bears and bluefin tuna are rejected
    by the Convention on International Trade in Endangered Species of Wild Fauna and
    Flora. (Reuters) (Global Times) (BBC)
  - Former Chairman of Anglo Irish Bank Sean FitzPatrick is arrested and has his home
    searched under Section 4 of the Criminal Justice Act 1984 at his home in Greystones,
    County Wicklow. (RTÉ) (The Times) (Sky News) (France24) (The New York Times)
  - Current Bishop of Derry Séamus Hegarty is named as one of those involved in a
    "secret deal" in the case of a woman who says she was sexually abused for ten
    years from the age of eight. (The Belfast Telegraph) (RTÉ) (The Guardian) (BBC)
    (The Times)
  - An official report released after five years of research by the Dresden Historians'
    Commission states a reduced figure of as many as 25,000 people died in the 1945
    bombing of Dresden. (BBC) (USA Today) (The Sydney Morning Herald)
  - Former Guatemalan President Alfonso Portillo is to be extradited to the U.S. following
    a ruling by a Guatemalan criminal court. (BBC)
  - A Thai farm worker in Israel is killed by a rocket fired from the Hamas-controlled
    Palestinian territory of Gaza, according to the Israeli military. (The New York
    Times) (Al Jazeera)
  - Turkey arrests around 20 people as it investigates an alleged attempted coup d'état.
    (The Guardian)
  - Charges occur in The Gambia's attempted coup d'état to overthrow President Yahya
    Jammeh. (BBC)
  - Released kidnapped child Sahil Saeed returns home to Manchester in England. (BBC)
    (The Daily Telegraph)
  - French photographer Sophie Ristelhueber wins the Deutsche Börse Photography Prize.
    (BBC)
