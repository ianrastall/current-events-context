Date: '2010-03-13'
Source_URI: Portal:Current events/2010 March 13
Intelligence_Payload:
  Uncategorized:
  - The shortest living person, He Pingping, dies in Rome due to unknown complications
    at the age of 21. (BBC)
  - Israeli Prime Minister Binyamin Netanyahu launches an inquiry into how plans for
    hundreds of new homes in East Jerusalem were announced.(Al Jazeera)
  - The Georgian television station Imedi sparks panic throughout Georgia by broadcasting
    a fake news item about a supposed invasion of Russian troops and the murder of
    President Mikheil Saakashvili. (RIA Novosti)
  - New Zealander Peter Bethune, a member of the Sea Shepherd Conservation Society
    who captained the Ady Gil when it crashed with the MV Shonan Maru 2 and sank,
    encounters coastguards, police and protesters as he arrives on the Japanese mainland.
    (The Sydney Morning Herald)
  - Fighting in Somalia's capital Mogadishu has killed 60 people since March 10. (Reuters)
  - At least 6 people, including three security personnel, die and more than 16 others
    are wounded after a suicide bomber tries to enter a government building, is stopped
    by police and detonates himself in Swat, Pakistan. (The Sydney Morning Herald)
    (Reuters)
  - Association Mutual Aid and Solidarity AF447 seeks equal compensation for Air France
    Flight 447's French famiiles after Brazilian judge Mauro Nicolau Junior awards
    NZ$1.6 million for dead state prosecutor Marcelle Valpacos Fonseca; French insurer
    Axa will appeal. (The New Zealand Herald) (Reuters)
  - Peruvian President Alan García orders funding for a tsunami-warning system. (The
    New Zealand Herald)
  - Taoiseach Brian Cowen begins his state visit to the United States in Chicago,
    announcing to the world his scheme that will allow senior citizen tourists aged
    66 and above to travel free on Iarnród Éireann in the Republic of Ireland. (RTÉ)
    (Chicago Sun-Times) (The Times of India)
  - 450,000 are left without power in the Northeastern United States as high winds
    topple power lines and trees. A crane collapses at the Revel Casino in Atlantic
    City, New Jersey, injuring one. (New York Times) (Press of Atlantic City)
  - U.S. President Barack Obama proposes sweeping changes to education law which would
    rework the No Child Left Behind program. (New York Times)
  Catholic sex abuse cases:
  - Archbishop of Armagh and Primacy of Ireland Cardinal Seán Brady admits for the
    first time that he represented the Church when two teenagers abused by Father
    Brendan Smyth were forced to sign an oath of silence. (RTÉ)
  - Pope Benedict XVI's former archdiocese of Munich-Freising (1977–1982) reveals
    he transferred a suspected paedophile priest to a job that allowed him to continue
    abusing children. (The New Zealand Herald) (Wall Street Journal)
  Afghanistan:
  - A remotely operated bomb killed 6 people traveling in southern Afghanistan in
    Tirin Kot, the capital of Afghanistan's Uruzgan province. (CNN) (CBS) (AP)
  - At least 30 people have been killed in a series of suspected suicide bombings
    in the Afghan city of Kandahar, officials say. (BBC)
  Sport:
  - Michael Schumacher makes his return to Formula One at the age of 41. (The Times)
    (The Daily Telegraph) (CNN) (The Hindu) (Miami Herald)
  - Australia beat Germany 2-1 to win the 2010 Men's Hockey World Cup for field hockey
    in New Delhi. (Indian Express)
