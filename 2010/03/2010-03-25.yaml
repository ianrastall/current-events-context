Date: '2010-03-25'
Source_URI: Portal:Current events/2010 March 25
Intelligence_Payload:
  Uncategorized:
  - A car bomb killed at least 6 people and wounded more than 40 others in a Colombia's
    Buenaventura city notorious for cocaine trafficking. (Pravda.ru)
  - Rustam Minnikhanov is sworn in as the second president of Tatarstan. (Radio Free
    Europe)
  - Pakistan's jet fighters pounds militants' hideouts in northwest Pakistan's Mamozai
    area, killing at least 48 people and injuring 32 others. (Xinhua)
  - A Gazan fisherman is critically wounded when the Israeli navy targets his fishing
    boat in an early morning attack. (The Muslim News)
  - The United States weakens proposed sanctions against Iran in a bid to win broader
    support on the UN Security Council as Iranian President Mahmoud Ahmadinejad dismisses
    the impact of any new measures to stop Iran’s nuclear program. (The Christian
    Science Monitor)
  - Hamas decides to execute Palestinians whom they have found guilty of “collaboration”
    with Israel despite protests by human rights and legal organizations, while criticizing
    those who have been firing rockets at Israel in the past few days. (The Jerusalem
    Post)
  - 500 homes near the airport in Mogadishu are demolished by Somali troops. (BBC)
  - President of the United States Barack Obama requests that Cuba's leaders release
    all political prisoners, describing human rights there as "deeply disturbing".
    (Al Jazeera)
  - 3 die in a medical helicopter crash in Tennessee, United States, with the helicopter
    that crashed being operated by Hospital Wing. (CNN)
  - U.S. defense secretary Robert Gates announces new rules that make it more difficult
    to expel gay service members. (The New York Times)
  - Munster Rugby fans in Ireland win a court case against the state allowing pubs
    to open for business on Good Friday, a day that normally sees all pubs in the
    country shut for religious reasons. (RTÉ) (BBC) (The Irish Times)
  - Independent News & Media sells its British titles to Russian billionaire Alexander
    Lebedev for £1. (Reuters) (RTÉ) (The Irish Times) (The Guardian)
  Child sex abuse in the Catholic Church:
  - Pope Benedict XVI is accused of failing to act in a case of the sexual abuse of
    200 deaf boys. (BBC News) (Al Jazeera) (The Hindu)
  - Bishop of Waterford and Lismore William Lee apologises for his two-year delay
    in failing to alert authorities to child sexual abuse allegations in his parish
    in the mid-1990s, describing as "seriously inadequate" his handling of the matter.
    (RTÉ) (The Irish Times) (BBC) (CNN)
  - An editorial from the Vatican says the news media is acting "with the clear and
    ignoble intent of trying to strike Benedict and his closest collaborators at any
    cost". (L'Osservatore Romano) (The New York Times) (BBC News)
  Dennis Hopper:
  - The lawyer for Dennis Hopper admits for the first time that the actor is terminally
    ill and unable to undergo chemotherapy treatment for his prostate cancer. (BBC)
    (Montreal Gazette) (The Daily Telegraph)
  - Hopper receives a star on the Hollywood Walk of Fame. (USA Today)
