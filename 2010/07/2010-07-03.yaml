Date: '2010-07-03'
Source_URI: Portal:Current events/2010 July 3
Intelligence_Payload:
  Uncategorized:
  - More than 230 people are killed and 200 injured after a fuel tanker overturns
    and explodes in the South Kivu province of the Democratic Republic of the Congo.
    (Al Jazeera) (BBC) (Xinhua)
  - Gaza
  - More than 10,000 Palestinians, including many patients needing medical treatment,
    are reported to have crossed into Egypt via the Rafah border since its 1 June
    opening in the aftermath of the Gaza flotilla raid. (Independent Online)
  - Hamas demolishes the homes of 20 families as part of a housing regulation plan.
    (Aljazeera)
  - 12 people are killed and 12 injured after a bus falls from a bridge near South
    Korea's main Incheon International Airport. (BBC) (The Korea Herald) (Taiwan News)
  - China jails a Tibetan environmentalist on charges of 'splitting the nation'. (BBC)
    (Reuters)
  - Prime Minister of Thailand Abhisit Vejjajiva probes the deaths of eight soldiers
    over two days. (Aljazeera)
  - Police apologize to American hotel heiress Paris Hilton after she was cleared
    of drug charges made against her while she was watching a 2010 FIFA World Cup
    match in Port Elizabeth, South Africa. (in2town) (AP via Google News)
  - The U.S. Pentagon alleges that Iran has violated United Nations sanctions against
    itself by providing an advanced radar system to Syria, a system the Pentagon claims
    would hurt Israel's ability to launch surprise attacks against Iran. (CNN) (FOX)
  - 'Poland and the United States sign a deal in Kraków allowing the United States
    to position an American anti-missile shield in Poland to defend Europe from the
    perceived threat of Iran and other countries: Russia objects. (Aljazeera)'
  - Guillermo Fariñas, a hunger striker in Cuba, is reported to be "close to death"
    by authorities, in his latest hunger strike attempt. BBC News
  - Kyrgyzstan's interim leader Roza Otunbayeva is officially sworn in as President.
    (Aljazeera) (The Hindu) (AFP) (Xinhua)
  - Guinea announces it will hold a run-off presidential election as last Sunday's
    first round vote resulted in no winner. (Aljazeera)
  - Former Argentine military ruler Jorge Rafael Videla goes on trial. (BBC)
  - United States Republican Party chairman Michael Steele is heavily criticised by
    members of his own party and by members of the Democratic Party for saying America's
    war in Afghanistan is "a war of Obama's choosing". (Aljazeera)
  - Serena Williams beats Vera Zvonareva 6–3, 6–2 to win her fourth Wimbledon women's
    singles title. (BBC)
