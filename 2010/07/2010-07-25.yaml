Date: '2010-07-25'
Source_URI: Portal:Current events/2010 July 25
Intelligence_Payload:
  Uncategorized:
  - 1 person is killed and at least 10 are injured after a bombing at a bus stop in
    Bangkok following a parliamentary by-election. (Aljazeera) (Channel 4) (Bangkok
    Post)
  - The Al-Qaeda Organization in the Islamic Maghreb announces it has killed a French
    hostage in Mali after a failed rescue attempt by French and Mauritanian troops.
    (BBC) (Aljazeera)
  - There are reports that an airstrike on a village in Helmand Province has killed
    45 civilians, including children, who were sheltering from violence. (BBC)
  - It is revealed that BP chief executive Tony Hayward is negotiating his terms of
    exit after being negatively criticised by politicians in the United States over
    his handling of the Deepwater Horizon oil spill in the Gulf of Mexico. (BBC) (The
    Guardian)
  - United States Secretary of the Treasury Tim Geithner pushes for Congress to allow
    the tax cuts for high-income taxpayers in the Jobs and Growth Tax Relief Reconciliation
    Act of 2003 to expire at the end of 2010, while extending the act's tax cuts for
    middle- and lower-income taxpayers. (CNN)
  - Iraq Inquiry witness Carne Ross alleges the British government is covering up
    "embarrassing testimony" about its decision to invade Iraq in 2003. (The Observer)
    (Channel 4)
  - Burmese military ruler General Than Shwe begins a five-day visit to India. (BBC)
    (The Times of India)
  - Former President of Cuba Fidel Castro visits a mausoleum in Artemisa, his first
    reported appearance outside Havana since leaving office in 2006. (BBC)
  - Alberto Contador wins the 2010 Tour de France, his third, as seven-times winner
    Lance Armstrong makes his final appearance. (BBC Sport)
  - Fernando Alonso wins the German Grand Prix ahead of Ferrari team-mate Felipe Massa
    at Hockenheim. (BBC Sport)
  - The FIVB World League 2010 ends with Brazil becoming the first country to win
    the competition nine times.
  Love Parade stampede:
  - Survivors blame officials for yesterday's death stampede at the Love Parade in
    Duisburg. (BBC) (Deutsche Welle) (Der Spiegel)
  - The death toll rises to 19. (Reuters)
  - The event's founder axes the annual festival. (The Daily Telegraph) (Sky News)
  African Union summit:
  - At the African Union summit in Kampala, attended by 53 countries, its president,
    the President of Malawi Bingu wa Mutharika, states International Criminal Court
    indictments against the Sudanese president undermine African peace and security
    and calls for the issue to be solved in a different way. (Aljazeera)
  - Ugandan President Yoweri Museveni says the fight against Somali militant group
    al-Shabaab must be stepped up. (BBC) (Daily Nation)
