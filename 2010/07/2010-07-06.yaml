Date: '2010-07-06'
Source_URI: Portal:Current events/2010 July 6
Intelligence_Payload:
  Uncategorized:
  - Australia celebrates indigenous culture for NAIDOC Week with the 2010 theme 'Unsung
    Heroes - Closing the Gap by Leading Their Way'.(ABC)(NAIDOC)
  - Somali Civil War
  - East African leaders call for 20,000 troops to be deployed across Somalia to support
    the United Nations-backed Transitional Federal Government and for the United Nations
    to replace the African Union Mission to Somalia. (AllAfrica.com) (BBC News)
  - 16 people are killed in clashes between rival factions in the capital Mogadishu.
    (AFP)
  - Asia
  - Ameer Ullah Mehsud, a Taliban commander and one of the founders of the Tehrik-e-Taliban
    Pakistan, is killed by the Pakistani army. (CNN)
  - Protesters try to enter the United Nations compound in Colombo, Sri Lanka, calling
    for the United Nations to abandon an inquiry into alleged human rights abuses
    in the final stages of the civil war between the government and Tamil rebels that
    ended last year. Staff are unable to leave until being assisted by Sri Lankan
    police. (Aljazeera) (CNN)
  - Thailand extends a state of emergency in several provinces and in the capital
    Bangkok, and lifts the decree in a further five provinces. (Bangkok Post) (The
    Guardian) (Xinhua)
  - Three people are killed in Srinagar, Kashmir after police shoot at people protesting
    at the fatal shooting of people by police. (Aljazeera)
  - Middle East and Africa
  - The Israeli military announces it will charge an army sniper with the killing
    of two Palestinian women during the Gaza offensive. (Aljazeera) (The Guardian)
    (BBC) (CNN)
  - An Egyptian bus driver shoots and kills six labourers and injures 12 who were
    travelling on a bus in Cairo. (Reuters Africa) (AP) (BBC) (News24.com)
  - The head of the United Nations and African Union peacekeeping missions in the
    Darfur region of Sudan calls for the immediate lifting of restrictions on their
    movements. (AP)
  - 12 members of the Kurdistan Workers' Party and 3 Turkish soldiers are killed in
    clashes in southeast Turkey. (CNN) (Al Jazeera) (Today's Zaman)
  - Europe
  - 3 people are killed in shooting at a McDonald's restaurant in Finland. (CNN)
  - Bradley Manning is finally charged with leaking the Collateral Murder video to
    Wikileaks, along with other documents, after spending more than a month detained
    in Kuwait without charge. (ABC) (AP)
  - The Ghana national football team are to receive national awards after their success
    at the 2010 FIFA World Cup, while former UN Secretary-General Kofi Annan writes
    of his heartbreak. (The Washington Post) (IOL)
  - The Federal government of the United States files a lawsuit against the U.S. state
    of Arizona in its bid to overturn its controversial immigration law. (CNN)
  - President of France Nicolas Sarkozy denies allegations of alleged illegal payments
    from France's richest woman, L'Oréal heiress Liliane Bettencourt. (Aljazeera)
    (CNN)
  - Republican Governor of the U.S. state of Hawaii Linda Lingle vetoes a bill allowing
    same-sex civil unions. (AP via Oroville MR)
  - Israeli Prime Minister Benjamin Netanyahu arrives in Washington, D.C. for talks
    with President of the United States Barack Obama. (BBC News) (CNN) (Ynet)
  - Rupert Murdoch takes a share in a rival to Aljazeera. (The Guardian)
  - The Khan Shatyry Entertainment Center, which features the tallest tent in the
    world, opens to the public in Astana, Kazakhstan. (BBC News)
  - Sierra Leonean writer Olufemi Terry wins the Caine Prize for African Writing.
    (BBC) (CBC) (National Post)
  - Men at Work are forced to give away 5% of their "Down Under" royalties after a
    Sydney court rules they plagiarised a flute solo from "Kookaburra Sits in the
    Old Gum Tree". (The Guardian) (BBC) (The Daily Telegraph) (Sky News)
  - Singer Cheryl Cole is diagnosed with malaria after fainting. (BBC) (The Independent)
  - Singer George Michael is arrested on suspicion of being unfit to drive. (BBC News)
