Date: '2010-07-04'
Source_URI: Portal:Current events/2010 July 4
Intelligence_Payload:
  Uncategorized:
  - Australia celebrates indigenous culture with NAIDOC Week with the 2010 theme 'Unsung
    Heroes - Closing the Gap by Leading Their Way'.(ABC)(NAIDOC)
  - Iranian human rights activist Mina Ahadi tries to stop death by stoning for an
    Iranian woman convicted of adultery. (CNN)
  - Lebanese Ayatollah Mohammad Hussein Fadlallah dies suddenly in Beirut. (Aljazeera)
    (CNN) (Press TV) (RTÉ) (Xinhua)
  - At least 15 people are killed and 48 are injured after the driver of a runaway
    bus smashes into a concrete wall in the Philippines. (BBC) (People's Daily) (news.com.au)
    (The Times of India)
  - At least four people are killed and dozens of others are wounded in a bombing
    at Ramadi's provincial government building. (Aljazeera)
  - Women and children march towards Mahmoud al-Zahar's house in Gaza to hand him
    a letter calling on Hamas to insist on the release of 1,000 Israeli-held Palestinian
    prisoners during their talks with Israel. (Xinhua)
  - President of Brazil Luiz Inácio Lula da Silva takes his last tour of Africa as
    president. (BBC)
  - David Petraeus formally takes command of the International Security Assistance
    Force in Afghanistan. (CBC),(BBC)
  - Iran passes on to Tehran's Swiss embassy what it describes as evidence proving
    that the United States Central Intelligence Agency abducted Iranian nuclear scientist
    Shahram Amiri. (Aljazeera)
  - Japan's competitive eating champion Takeru "Tsunami" Kobayashi is arrested after
    disrupting the Nathan's Hot Dog Eating Contest in New York City, United States.
    (The Sydney Morning Herald)
  - Polish presidential election, 2010
  - Polish voters head to the polls for the second round of presidential voting.
  - Jarosław Kaczyński initially concedes defeat after exit polls show Bronisław Komorowski
    winning, but later withdraws his concession as exit polls show the result narrowing.
    (BBC)
  - Mexican gubernatorial elections, 2010
  - Voters in 14 Mexican states vote to elect governors and mayors. (Aljazeera) (BBC)
    (Sky News)
  - Exit polls show the opposition Institutional Revolutionary Party winning in 8
    of the 14 states, with a strong showing in mayoral elections. BBC News
  - In a referendum, voters in the German state of Bavaria vote to ban smoking at
    all pubs and restaurants. (The Sydney Morning Herald)
  - Rafael Nadal of Spain wins the men's singles titles at the 2010 Wimbledon Championships.
    (AFP), (BBC)
