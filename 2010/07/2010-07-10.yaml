Date: '2010-07-10'
Source_URI: Portal:Current events/2010 July 10
Intelligence_Payload:
  Uncategorized:
  - After more than a century in British collections, the head of Noongar leader Yagan
    is ceremonially buried on the 177th anniversary of his last full day of freedom.
    (ABC) (Perth Now) (The West-Yahoo!-7)
  - After public outcry, gamemaker Blizzard Entertainment rescinds its plan to force
    users of its World of Warcraft online game to post under their real names. (BBC
    News)
  - Chinese exports rose by 43.9% this past June, compared to the same time last year.
    (BBC News)
  - Gunman Raoul Moat shoots and kills himself after a 6-hour standoff with police,
    ending the largest manhunt in United Kingdom's recent history. (BBC News) (Daily
    Telegraph)
  - An aid ship trying to carry aid to Gaza is forced to dock at el-Arish in Egypt,
    after coming under heavy Israeli pressure to not break Israel's Gaza blockade.
    (BBC News)
  - A new bill is introduced in the Israeli Knesset that would force Haredi Jewish
    schools to teach core subjects such as mathematics, science, English, and civics,
    or lose state funding. (Haaretz)
  - Between 1.1 and 1.5 million people, according to organisers, and 56000 demonstrators,
    according to spanish protesters-counting specialized company Lynce, demonstrate
    in central Barcelona demanding greater autonomy for Catalonia within Spain. (BBC
    News) (Times of India) (AFP)
  - A breakaway group from the National League for Democracy in Burma registers to
    participate in the general election later this year. (BBC News) (AFP) (Al Jazeera)
  - Japanese Prime Minister Naoto Kan makes a final campaign push on the eve of the
    country's Upper House election. (Channel NewsAsia)
  - North Korea offers to return to the six-party talks over its nuclear weapons programme.
    (Al Jazeera) (Arirang News) (AP)
  - Sri Lankan lawmaker Wimal Weerawansa ends his hunger strike against United Nations
    Secretary-General Ban Ki-moon's decision to send a human rights panel to investigate
    war crimes to the country. (The Hindu) (AFP) (Xinhua)
  - The leaders of North and South Sudan begin talks on a strategy to deal with the
    results of next year's referendum on independence for the latter. (Al Jazeera)
    (Reuters) (AFP)
  - The Rosetta probe makes a flyby past the 21 Lutetia asteroid to gather scientific
    data. (BBC News)
  - BP is set to remove the containment cap over the destroyed Deepwater Horizon oil
    well in the Gulf of Mexico, and replace it with a bigger cap. Oil and gas will
    spew unrestricted from the well for an estimated four to seven days until the
    new cap is in place. (BBC News) (Al Jazeera)
  - '2010 FIFA World Cup: Germany defeats Uruguay 3-2 to finish third. (BBC)'
  - UEFA President Michel Platini is released from hospital. (France24)
