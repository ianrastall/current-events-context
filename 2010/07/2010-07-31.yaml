Date: '2010-07-31'
Source_URI: Portal:Current events/2010 July 31
Intelligence_Payload:
  Uncategorized:
  - Chelsea Clinton and Marc Mezvinsky marry in Rhinebeck, New York. (UPI)
  - The United States Department of Commerce releases statistics showing that the
    United States economy shrank by 4.1 per cent between the 4th quarter of 2007 and
    the second quarter of 2009, a deeper recession than previously thought. (Bloomberg)
  - The report of the Victorian Bushfires Royal Commission into the Black Saturday
    bushfires that killed 173 people in Victoria, Australia, is tabled in the Parliament
    of Victoria. It contains 67 recommendations including changes to evacuation policy
    and an increase in backburning. (ABC Online)
  - The black box for Airblue Flight 202 which crashed near Islamabad, Pakistan, is
    found. (DAWN)
  - The death toll from the 2010 Pakistan floods exceeds 900 and may climb further.
    (Bloomberg via San Francisco Chronicle), (AFP via Google News)
  - Germany holds a memorial service for the 21 victims of the Love Parade disaster.
    (BBC)
  - United States and Michigan government officials say it will take months to clean
    up an oil spill in the Kalamazoo River in southern Michigan and considerably longer
    for the ecosystem to recover. (AP via New York Times)
  - An explosion in a coal mine in Shanxi Province, China leaves 17 people dead while
    24 miners are trapped by flooding in a nearby mine. (UPI)
  - The Federal Bureau of Investigation is investigating whether civilians conspired
    with a US soldier to release classified information available on Wikileaks. (UPI)
  - Mexican police rescue two television camera operators kidnapped by drug cartels
    on Monday. (Reuters via New York Times)
  - Pakistani intelligence officials cancel a planned visit to the United Kingdom
    after British Prime Minister David Cameron warned Pakistan to avoid links with
    groups that "promote the export of terror". However, a visit by President Asif
    Ali Zardari will go ahead. (BBC)
  - Police fire rubber bullets to disperse rioting garment workers as protests spread
    beyond the capital Dhaka to other Bangladeshi cities. (AFP via Google News)
