Date: '2010-07-09'
Source_URI: Portal:Current events/2010 July 9
Intelligence_Payload:
  Uncategorized:
  - A suicide bomb in Pakistan's tribal areas near the Afghanistan border kills at
    least 50. (AP via Google News) (Al Jazeera)
  - Floribert Chebeya's autopsy returns an "inconclusive" result. (BBC)
  - The head of the United Nations Interim Force in Lebanon in southern Lebanon appeals
    for calm after attacks by villagers. (BBC News) (Al Jazeera) (AFP)
  - Israel criticises Britain's ambassador to Lebanon for eulogising Mohammad Hussein
    Fadlallah, who recently died. (BBC)
  - Two weeks after the sacking of General Stanley A. McChrystal over comments that
    appeared in Rolling Stone, a top French general is attacked for publicly criticising
    the United States-led war attempt on Afghanistan and questioning if the United
    States is controlling its allies. (France24)
  - Guinea's presidential run-off is postponed due to allegations of fraud. (BBC)
  - Following the recent parliamentary elections in Slovakia, Iveta Radičová substitutes
    Robert Fico as Prime Minister, becoming the first female incumbent of the post.
  - The United Nations Security Council issues a Presidential Statement condemning
    the sinking of the South Korean warship ROKS Cheonan. (United Nations) (CBC)
  - At least 50,000 West Papuans march on the Papua provincial parliament in Jayapura
    calling for the rejection of special autonomy status offered by Indonesia in favor
    of independence; 20,000 camp outside the parliament overnight. (RNZI) (Jakarta
    Globe)
  - The Australian Government is conducting a review on the proposed national internet
    filter. (BBC News)
  - Johnson & Johnson recalls 3 million bottles of medicines, including Tylenol, Benadryl,
    and Motrin, because of odors traced to a chemical in pallets used to transport
    and store the medicines. (Reuters)
  - Hangzhou Xiaoshan International Airport in Zhejiang, China, is closed after a
    UFO sighting. (Daily Mail) (Shanghai Daily) (oneindia)
  - China renews the internet content provider license for Google allowing it to continue
    operating in the country. (BBC News) (Daily Mail) (Radio Television Hong Kong)
  - The United States Government gives BP a 24-hour deadline to answer questions about
    the Deepwater Horizon oil spill, as well as providing detailed information and
    plans on stopping the leak. (BBC News)
  - The South Korean Central Bank unexpectedly raise interest rates from 2% to 2.25%.
    (BBC News)
  - Wall Street ends the week with the strongest gains in a year, with the Dow Jones
    Industrial Average rising 5.3%, and NASDAQ rising 5%. (Reuters)
  - A plane containing 10 members of a Russian spy ring arrives in Vienna, Austria,
    from the United States. (BBC News)
  - Pope Benedict XVI appoints Archbishop Velasio de Paolis to lead the Legion of
    Christ following the previous head who had engaged in child sex abuse and a number
    of other crimes throughout his career. (AP via Asia One) (IPS)
  - Chinese officials seize 64 tonnes of raw dairy materials contaminated with melamine.
    (BBC News) (Al Jazeera)
  - Iran announces that a woman convicted of adultery will no longer face stoning
    to death after international concern. She may, however, still face the death penalty.
    (National Turk) (BBC News) (Press TV)
  - Salman Hossain, a Bangladeshi immigrant to Canada, is charged with online advocation
    of genocide against Canadian Jews. (AFP)
  - A painting in a Johannesburg shopping centre depicting an autopsy on the corpse
    of Nelson Mandela surrounded by nosy world leaders attracts controversy as the
    topic of Mandela's eventual death is taboo in South Africa. (BBC)
  - Australia celebrates indigenous culture in NAIDOC Week with the 2010 theme "Unsung
    Heroes - Closing the Gap by Leading Their Way". (ABC)(NAIDOC)
  - American researchers discover that some fruits and vegetables grown today have
    less nutritional value than those grown in the 1950s. (MSNBC)
  - 19-year-old French sprinter Christophe Lemaitre sets a national record of 9.98
    seconds and becomes the first genetic European to run 100 metres in less than
    10 seconds. (France24)
  Mel Gibson:
  - The American-born Australian actor is being called a "potential suspect" in a
    domestic violence investigation. (MSNBC) (IMDB)
  - An audio tape reportedly containing the voice of the actor surfaces online, with
    the actor allegedly making bigoted remarks against Latinos. (New York Daily News)
  - The actor is reportedly dropped by his talent agency. (Reuters)
