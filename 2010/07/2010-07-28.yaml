Date: '2010-07-28'
Source_URI: Portal:Current events/2010 July 28
Intelligence_Payload:
  Uncategorized:
  - A bomb on a civilian bus in Nimruz Province in southwest Afghanistan results in
    at least 25 deaths. (Press TV), (samaylive)
  - An explosion at a plastics factory in Nanjing, China, kills at least 12 people
    and injures hundreds. (RIA Novosti), (Reuters)
  - Airblue Flight 202 crashes in the Margalla Hills outside Islamabad, Pakistan,
    killing all 152 people aboard. (New York Times), (Xinhua), (Reuters), (Voice of
    America)
  - A United States Air Force Boeing C-17 crashes at the Elmendorf Air Force Base
    in Alaska. (The News Tribune)
  - A boat sinks on the Kasai river in the Democratic Republic of the Congo, killing
    as many as 140. (BBC) (UPI)
  - During a visit to India, British Prime Minister David Cameron warns Pakistan not
    to have any relationship with groups that "promote the export of terror". (BBC)
    (Indian Express)
  - Around 300 Bedouins living in "illegal settlements" in Israel's Negev desert have
    been made homeless after police raided their village and razed their homes. They
    are to be resettled in Rahat. (BBC)
  - United States federal judge Susan Bolton issues a ruling blocking Arizona from
    implementing sections of Arizona SB 1070 requiring police to check a person's
    immigration status and requiring immigrants to carry their papers at all times.
    (ABC Online)
  - French police find the bodies of eight new-born babies in the village of Villers-au-Tertre
    in north-east of France. (BBC)
  - Eight severed heads are discovered in four locations in the Mexican state of Durango.
    (UPI)
  - The ruling Grand National Party in South Korea wins five out of eight seats in
    a by-election to National Assembly seats left vacant by resignations or convictions.
    (Yonhap)
  - Governor of the U.S. state of California Arnold Schwarzenegger declares a "fiscal
    state of emergency" requiring most state employees to take three days a month
    of unpaid leave until a new budget is enacted. (AFP via Sydney Morning Herald)
  - The Spanish autonomous community of Catalonia bans bullfighting, the first region
    on the mainland to do so. (Los Angeles Times)
