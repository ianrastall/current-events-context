Date: '2010-07-27'
Source_URI: Portal:Current events/2010 July 27
Intelligence_Payload:
  Uncategorized:
  - The Afghan War Diary claim that Pakistan's Inter-Service Intelligence (ISI) orchestrated
    the suicide attack on the Indian embassy in Kabul in 2008, which left 40 dead.
    (samaylive).
  - Experts verify that photographic negatives bought at a garage sale are early works
    of the American photographer Ansel Adams. (CNN)
  - BP announces that Tony Hayward is to step down as CEO following the Deepwater
    Horizon oil spill and will be replaced by Bob Dudley on October 1st. (TV New Zealand),
    (Bloomberg)
  - South China floods
  - Flooding at the Three Gorges Dam is set to peak within the next 24 hours. (BBC)
    (Xinhua)
  - A landslide in China's Sichuan Province caused by heavy rains results in 21 people
    being missing. (AP via Google News)
  - A bridge collapse in Luanchuan County in Henan Province of China results in at
    least 37 deaths. (Reuters via Straits Times)
  - BP sets aside $32.2bn to clean up the Gulf of Mexico oil spill. (BBC)
  - Lufthansa Cargo flight 8460, a McDonnell Douglas MD-11, crashes upon landing in
    Saudi Arabia, injuring the pilot and the first officer. (BBC) (Reuters)
  - An oil spill in Dalian, China, is contained from reaching international waters.
    (China Daily)
  - Two police officers in Egypt go on trial for brutality over the death of a man
    in custody in Alexandria. (Aljazeera) (Reuters Africa)
  - Following a court order, Israeli police demolished the Bedouin village of Al-Araqeeb
    north of Beer Sheva, evicting 200 residents. (CNN)
  - A Dutch court rules that sailor Laura Dekker can attempt to become the youngest
    person to circumnavigate the world solo. (BBC)
  - David Cameron, the Prime Minister of the United Kingdom, describes the Gaza Strip
    as a "prison camp" during a visit to Turkey. Israel's ambassador to the UK, Ron
    Prosor, describes the people of the Gaza strip as "prisoners of the terrorist
    organization Hamas". (CNN)
  - The United States Congress provides funding for a troop increase for the War in
    Afghanistan. (Reuters)
  - The wreck of the 19th century Royal Navy ship HMS Investigator is found in Mercy
    Bay in northern Canada. (National Post)
  - The Argentine Football Association decides not to renew Diego Maradona's contract
    as coach of the Argentina national football team. (The Telegraph)
