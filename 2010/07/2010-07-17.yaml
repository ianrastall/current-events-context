Date: '2010-07-17'
Source_URI: Portal:Current events/2010 July 17
Intelligence_Payload:
  Uncategorized:
  - Dozens of English football fans clash with dogs and riot police in a busy shopping
    square in York, causing its closure. (BBC)
  - At least 50 automobiles sustain burns in Grenoble, France, as people protest the
    fatal shooting of a man by police. The man was shot during a chase following a
    robbery after firing on police. (BBC) (The Age) (Aljazeera) (The Daily Telegraph)
    (Reuters) (News24.com)
  - 300 JEM rebels and 86 Sudanese Army soldiers are killed in Darfur. (Aljazeera)
  - At least eight people are killed by machete-wielding attackers near Jos, Nigeria
    in scenes reminiscent of events earlier this year. (BBC) (Aljazeera)
  - South Korea develops a long-range cruise missile capable of striking North Korea,
    Japan, Russia and China. (WAtoday)
  - Suspected militants armed with assault rifles attack a bus in northwest Pakistan
    near the Afghanistan border, resulting in at least 16 casualties. (ABC Australia
    Online)
  - Thousands of mourners gather in Zahedan for a mass funeral for those killed in
    recent bombings; Iranian officials indicate that they believe the West carried
    out the atrocities. (The Age) (BBC)
  - The Mexican military says Thursday's attack in Ciudad Juárez was a car bomb. (Aljazeera)
  - Tens of thousands of people take part in a landmark European gay rights rally
    in Warsaw, the first time Europride is being held in Central and Eastern Europe.
    (BBC)
  - Film director Roman Polanski appears in public for the first time since being
    released from house arrest, watching his wife perform at the Montreux Jazz Festival.
    (BBC) (France24) (CBC News) (Reuters)
  - The Welsh language is spoken for the first time in a ceremony at England's Westminster
    Cathedral in honour of martyred saint John Roberts. (BBC)
  - 30 bottles of champagne believed to pre-date the French Revolution are found on
    the Baltic seabed off the coast of Finland; it may be the world's oldest drinkable
    champagne. (BBC) (The Independent) (The Irish Times) (News24.com)
  - The Gaza Strip opened its first shopping mall in the Rimal neighborhood of Gaza
    City. (CAMERA) (Alamy)
  - British tour operator Goldtrail collapses, stranding thousands of holidaymakers
    abroad. (BBC) (The Age)
  - Israeli settlements dump untreated chemical waste directly into a sewage canal
    that runs through agricultural land in the West Bank, giving Palestinians skin
    and respiratory illnesses. (Aljazeera)
  - Typhoon Conson makes landfall near Hai Phong, Vietnam, after devastating Southern
    China and the Philippines with at least 65 dead. (JTWC) (NDCC)
  - One month after Israel's announcement it was easing its Gazan blockade the humanitarian
    situation remains dire. (Sky News)
  - More than 2,000 firefighters fight a fire at the port of Dalian after two oil
    pipelines explode. (WAtoday) (BBC)
  - Greece experiences its first forest fires of the summer season. (WAtoday)
  - Twenty-eight coal miners die after a fire in their mine near Hancheng City in
    China's Shaanxi Province. (CRI English)
  - German Foreign Minister Guido Westerwelle criticises a reported Israeli plan that
    would lead to Gaza's separation from the rest of the Palestinian territories becoming
    final. (The Hindu)
  - High Representative of the Union for Foreign Affairs and Security Policy Catherine
    Ashton attends a joint press conference with Palestinian Prime Minister Salam
    Fayyad after their meeting in Ramallah. (Xinhua)
  - Venezuela recalls its ambassador to Colombia following Colombian accusations that
    Venezuela is hosting rebels on its territory. (Aljazeera)
  - German minister Ilse Aigner expresses annoyance at Facebook's privacy policy,
    saying the website is breaking the law by collecting information such as phone
    numbers. (The Age)
  - Bangladeshi police arrest an army major who allegedly possessed hundreds of bottles
    of Phensedyl, an illegal cough syrup. (BBC)
  - Hugo Chávez exhumes the corpse of Simón Bolívar to investigate suspicions of foul
    play being involved in his death. (WAtoday)
  - The Prime Minister of Papua New Guinea Michael Somare will reportedly be asked
    to resign as both prime minister and leader of the National Alliance Party on
    Monday. (PNG Post-Courier)
  - The Prime Minister of Australia Julia Gillard calls a federal election for 21
    August 2010. (iPrime) (Aljazeera)
  - Dozens of residents protest against plans to build four wind turbines in a field
    in Berkshire, England. (BBC)
  - The United States government run National Oceanic and Atmospheric Administration
    (NOAA) claims 2010 could be the warmest year on record since 1880. (Aljazeera)
  - Ten endangered species previously known only by their Latin titles are named.
    (Channel 4)
  - Unmanned solar-powered plane Zephyr, reaches its seventh consecutive day of flight.
    (BBC)
  - The opening ceremony of the XXI Central American and Caribbean Games in Puerto
    Rico is delayed after a tornado causes disruption in Mayagüez. (BBC)
  - Salman Butt captains Pakistan for the rest of their tour after Shahid Afridi's
    retirement from Tests. (The Guardian)
  - One of the balls used in the 2010 FIFA World Cup Final sells for £48,200 on eBay.
    (Sky News)
