Date: '2010-07-14'
Source_URI: Portal:Current events/2010 July 14
Intelligence_Payload:
  Uncategorized:
  - The corpse of senior Rwandan opposition politician Andre Kagwa Rwisereka, who
    was recently reported missing, is found near his car with the head almost entirely
    severed off. (BBC)
  - Israeli warships force the Gaza-bound aid ship Amalthea to change course to El
    Arish port in Egypt. (Aljazeera) (BBC)
  - More than 60 people are hospitalised after a suspected chlorine gas leak in Mumbai.
    (BBC) (Arab News) (News24.com) (The Age) (The Independent)
  - The United States discusses the arrest of Bradley Manning, accused of providing
    secret information about US military corruption to Wikileaks. (BBC)
  - India's Home Secretary G. K. Pillai states Pakistan's intelligence agency Inter-Services
    Intelligence (ISI) co-ordinated the 2008 Mumbai attacks. (Aljazeera) (Deutsche
    Welle)
  - Former Balochistan senator Habib Jalib is shot dead outside his home in Quetta,
    leading to riots and widespread mourning. (BBC) (The News International) (Xinhua)
  - Senior Indian Army officer Major A. K. Thinge is killed in battle in Kashmir.
    (BBC) (The Times of India) (Indian Express) (People's Daily)
  - Romanian pop singer Mădălina Manole commits suicide by poisoning. (Mediafax)
  - The Zutons frontman Dave McCabe denies breaking a man's nose by headbutting him
    outside a nightclub in Liverpool. (BBC) (Liverpool Daily Post) (Oxford Mail)
  - It is announced that the last roll of Kodachrome manufactured has been developed
    for photographer Steve McCurry. (Wichita Eagle)
  - Airline Ryanair is reprimanded by the UK's Advertising Standards Authority for
    misleading customers with their advertisements for low fares. (BBC)
  - A group of more than 30 journalists from such countries as Turkey, Spain, Germany,
    Lebanon, Egypt, the United Kingdom and the United States announces it is to take
    legal action against Israel for equipment lost and money stolen due to the Gaza
    flotilla raid. (Aljazeera)
  - Previously secret papers released as a result of civil proceedings brought by
    six former Guantánamo Bay inmates against MI5 and MI6, the Home Office, the Foreign
    Office, and the Attorney General's Office reveal the British government was involved
    in the abduction and torture of its own citizens following the September 11 attacks.
    (The Guardian)
  - Tens of thousands take part in a church-sponsored demonstration against same-sex
    marriage outside Congress in Buenos Aires, as senators prepare to vote on a bill
    which would make Argentina the first South American country to legalize same-sex
    marriage. (France 24) (BBC)
  - German prosecutors raid 13 branches of Credit Suisse while probing tax fraud.
    (BBC)
  - 'Venezuela extradites Colombian Carlos Alberto Renteria to the United States:
    the US claims he is a major drug cartel leader. (BBC) (The China Post) (Reuters)'
  - Former MI6 worker Daniel Houghton pleads guilty to breaching the Official Secrets
    Act by unlawfully disclosing top secret material to Dutch agents. (BBC)
  - 'Former Prime Minister of Bulgaria Sergey Stanishev is charged with mishandling
    classified documents: he calls the charges "politically motivated". (BBC)'
  - Former Colombian politician and hostage Íngrid Betancourt drops her lawsuit against
    the state. (BBC)
  - The man accused of murdering aid worker Margaret Hassan in Iraq in 2004 disappears
    before his retrial. (RTÉ) (BBC) (The Irish Times) (The Independent)
  - Sri Lankan police file a new case against Sarath Fonseka accusing him of employing
    military deserters. (Aljazeera)
  - A new text service to report hate speech and to be monitored by the National Cohesion
    and Integration Commission is launched in Kenya ahead of the upcoming referendum
    on a new constitution. (BBC)
  - Police find 48 kilograms of illegal cannabis in Launceston and charge two men,
    after a week-long operation in one of the largest seizures of the drug in Tasmanian
    history. (The Sydney Morning Herald)
  - Two more Cuban dissidents arrive in Spain out of the 52 political prisoners due
    to be released on humanitarian grounds. (BBC)
  - The United Nations, European Union and United States express their opposition
    to the demolition of six more Palestinian homes by Israel. (Aljazeera)
  - The Sri Lankan cabinet meets in Kilinochchi, the former capital of the Tamil Tigers
    in the far north of the island. (BBC)
  - Irish Fianna Fáil Senator Ivor Callely is suspended for 20 days without pay due
    to a travel expenses scandal. (RTÉ) (The Irish Times)
  - Indian Foreign Minister S. M. Krishna goes to Islamabad for talks with his counterpart
    of Pakistan, Shah Mehmood Qureshi, for the first time since the 2008 Mumbai attacks.
    (BBC)
  - Chancellor of Germany Angela Merkel and nearly half her cabinet begin a five-day
    visit to Russia, China and Kazakhstan as part of an attempt to boost trade, energy
    and security links. (BBC) (Der Spiegel) (Deutsche Welle)
  - Beijing authorities begin to gate and lock some lower-income villages, imposing
    curfews in order to control the flow of migrant workers. (AP)
  - A controversial Bastille Day parade gets underway in Paris. (BBC) (Aljazeera)
  - 'Shahram Amiri, the Iranian nuclear scientist allegedly abducted by the United
    States Central Intelligence Agency, leaves U.S. soil: Iran states it will continue
    to pursue the case "legally and diplomatically". (Aljazeera) (BBC)'
  - Boeing unveils Phantom Eye, its unmanned hydrogen-powered spy plane capable of
    flying for up to four consecutive days. (BBC)
  - An 18th-Century wood-hulled ship is discovered at the World Trade Center site
    in Lower Manhattan, New York City. (The New York Times)
  - Researchers find that the Vatican Radio transmitters increase the risk of tumours
    and leukaemia in children who live nearby. (BBC)
  - The United Kingdom announces its refusal to issue visas to a lacrosse team representing
    the Iroquois Confederacy, whose departure has been delayed since Friday, after
    the United States Department of State earlier in the day cleared the team's departure
    with tribal passports. The UK stated that it will only recognise passports from
    the United States or Canada. (BBC) (The New York Times)
  - Controversial French footballer Thierry Henry moves to a team in the United States.
    (BBC Sport) (Toronto Sun)
  - UK Athletics (UKA) requests changes to Britain's tax laws after sprinter Usain
    Bolt declines to appear at a meeting in London for financial reasons. (BBC Sport)
