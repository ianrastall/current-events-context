Date: '2010-07-02'
Source_URI: Portal:Current events/2010 July 2
Intelligence_Payload:
  Aftermath of the Gaza flotilla clash:
  - Israeli Prime Minister Benjamin Netanyahu states in a televised address that Israel
    will not apologize to Turkey for the Gaza flotilla clash and that no compensation
    will be paid to the injured. (Haaretz) (The Sydney Morning Herald)
  - Turkey considers banning Israeli commercial flights, while Israeli Industry, Trade
    and Labour Minister Binyamin Ben-Eliezer denies reports he promised compensation
    for those killed in the Israel Navy's raid on the Gaza-bound aid flotilla. (Haaretz)
    (The Irish Times)
  - A series of studies published by Palestinian scientists in The Lancet claims that
    Israel's blockade of the Gaza Strip threatens to cause long-term health damage,
    malnutrition and stunted growth in children. (Reuters)
  - The German Bundestag passes a cross-party motion demanding Israel to end its blockade
    of the Gaza Strip. (Jewish Telegraphic Agency) (Deutsche Welle) (Bernama)
  - Senegal enters eight days of national mourning as President Abdoulaye Wade swears
    allegiance to the new Grand Marabout of the Mourides following the death of his
    predecessor, Serigne Mouhamadou Lamine Bara Mbacké. (Reuters)
  - At least 17 civilians are killed and dozens of others are injured during fighting
    between the government and anti-government in Mogadishu. (Aljazeera)
  - Former South African Police Service national commissioner and ex-Interpol president
    Jackie Selebi is found guilty of corruption. (BBC) (Aljazeera)
  - A priest accused of involvement in the 1994 Rwandan Genocide is arrested in Uganda
    after he entered from the Democratic Republic of the Congo. (BBC) (CNN)
  - Newly-elected President Ahmed M. Mahamoud Silanyo promises to campaign "vigorously"
    for the recognition of "our democracy" during his time in office. (AFP)
  Uncategorized:
  - Israel's blockade on Gaza
  - Africa
  - Turkish warplanes bomb Kurdistan Workers' Party (PKK) hideouts in the Qandil mountains
    and the Hakurk region of Iraq, the day after 17 people die in Siirt. (Aljazeera)
    (Xinhua)
  - Amnesty International calls for an independent investigation into the July 2009
    Ürümqi riots, while the United States agrees. (Aljazeera)
  - Eight soldiers are killed during two roadside bombs in Narathiwat and Yala in
    Thailand. (Aljazeera)
  - At least four people are killed and several others are wounded as six suicide
    bombers storm a USAID compound before dawn in Kunduz, Afghanistan. (AP via The
    Washington Times) (Aljazeera)
  - Protests take place in Lahore and Karachi among other places amid calls for resignations
    following yesterday's bombings of Data Darbar in Lahore. (Aljazeera)
  - American hotel heiress Paris Hilton is arrested in Port Elizabeth, South Africa,
    for allegedly smoking marijuana during the 2010 FIFA World Cup match between Brazil
    and the Netherlands. (The Daily Telegraph)
  - Russian cargo ship Progress fails to dock with the International Space Station.
    (BBC) (France24) (Fox News)
  - Somaliland presidential election, 2010
  - Ian Paisley condemns the invitation for the Pope to visit Britain and calls child-abusing
    Catholic priests "Antichrists". (The Sydney Morning Herald)
  - President of the United States Barack Obama signs into law the CISAD Act, which
    bans US banks from doing business with foreign banks that provide services to
    Iran's elite Revolutionary Guards. (Aljazeera)
  - Germany vows to suspend aid to Zimbabwe unless occupiers leave a farm owned by
    a German national. (The Sydney Morning Herald)
  - Gazprom and Beltransgaz sign a gas transit deal, setting the transit fee for this
    year. (Xinhua)
