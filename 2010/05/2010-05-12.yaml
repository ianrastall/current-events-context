Date: '2010-05-12'
Source_URI: Portal:Current events/2010 May 12
Intelligence_Payload:
  Uncategorized:
  - Global Green USA attends BioShield 2010 Tabletop Exercise in Tbilisi, Georgia.
    (Global Green)
  - Afriqiyah Airways Flight 771 arriving from South Africa en route to London crashes
    at Tripoli airport, Libya, killing 104 people; a 10-year-old child is the sole
    survivor. (BBC) (AFP) (Al Jazeera)
  - Airports in Morocco, Spain and Portugal reopen after days of Icelandic volcanic
    disruption. (BBC) (NEWS.com.au)
  - The International Committee of the Red Cross confirms reports of a second, secret
    US prison at Bagram Air Base in Afghanistan after new allegations of torture.
    (BBC)
  - Russia and Turkey sign a $20 billion deal permitting Moscow to build and own a
    controlling stake in Ankara's first nuclear power plant. (Al Jazeera)
  - Philippine general election, 2010
  - Mayor Jejomar Binay and Senator Mar Roxas are still in a tight race for the vice-presidency.
    (Philippine Daily Inquirer)
  - Philippine President Gloria Macapagal-Arroyo is elected as representative of Pampanga,
    the first outgoing president to be elected to the House of Representatives. (GMA
    News)
  - Former First Lady Imelda Marcos is elected as representative of Ilocos Norte.
    (Philippine Daily Inquirer)
  - World-renowned boxer Manny Pacquiao is elected as representative of Sarangani.
    (Philippine Star)
  - The Chengdu-Dujiangyan High-Speed Railway begins operation in Sichuan, China,
    on the second anniversary of the 2008 Sichuan earthquake. (China Daily)
  - In South Sudan there is violence for the third time in a week between the army
    and forces led by the former general George Athor. (BBC) (Reuters)
  - 9 people, including 7 children, are killed at a school near Hanzhong city, Shaanxi,
    China. (Xinhua) (AP)
  - A bomb planted inside a grocery store in a mainly Shi'ite area of Baghdad kills
    three people and wounds 23. (TVNZ)
  - Irish authorities launch an investigation into last night's "violent incident"
    which saw protesters attempt to storm Dáil Éireann in a campaign against bank
    bail-outs. (The Irish Times) (TV3)
  - Spain's Prime Minister José Luis Rodríguez Zapatero announces wage cuts for state
    employees and a reduction in investment in response to his country's budget deficit.
    (Al Jazeera)
  - Pope Benedict XVI, accompanied by tens of thousands of pilgrims, visits the famous
    Catholic shrine to the Virgin Mary in Fatima, as part of his four-day visit to
    Portugal, and recalls the assassination attempt on his predecessor there. (BBC)
    (RTÉ) (France24) (The Sydney Morning Herald)
  - North Korea says it has undertaken nuclear fusion, a claim disputed by international
    scientists. (BBC) (AP) (China Daily)
  - A possible supermassive black hole is witnessed being hurled from its parent galaxy
    at high speed. (BBC)
