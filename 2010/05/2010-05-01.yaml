Date: '2010-05-01'
Source_URI: Portal:Current events/2010 May 1
Intelligence_Payload:
  Uncategorized:
  - Part of New York City's Times Square is evacuated and sealed off as a car bomb
    is discovered and deactivated before it could be detonated. (ABC News) (BBC) (Philippine
    Daily Inquirer) (Sydney Morning Herald)
  - Dozens of people are killed by twin bomb blasts inside a Mogadishu mosque. (Reuters)
    (Al Jazeera) (BBC) (San Francisco Chronicle) (The Times)
  - Four soldiers are killed and several sustain wounds in a rocket, rifle and grenade
    attack on a military outpost near Nazimiye in Turkey. (BBC)
  - In thoroughbred racing, Super Saver, ridden by Calvin Borel, wins the 2010 Kentucky
    Derby. (AP)
  - At least one person is killed and 21 others are injured at a horse race in Nalchik,
    Kabardino-Balkaria. (Al Jazeera)
  - At least two civilians are killed and ten more are wounded by a suicide attack
    on a market in Swat Valley. (Al Jazeera)
  - Johnson & Johnson announces the recall of 43 over-the-counter medicines intended
    for infants and children, affecting the United States and nine other markets.
    (Washington Post)
  - At least 150,000 people gather in Kathmandu to support Maoists who want the Prime
    Minister to resign; a general strike is called for on Sunday, May 2. (Al Jazeera)
    (BBC) (The News International) (CNN)
  - Greek police shoot tear gas at protesters in Athens during an anti-government
    march. (BBC) (Sky News) (The Times)
  - Thousands of people protest in Tirana, demanding a recount of votes from last
    June's parliamentary elections. (Al Jazeera) (BBC) (Deutsche Welle) (France24)
  - In a non-title boxing match, welterweight champion Shane Mosley loses to Floyd
    Mayweather by unanimous decision. (LA Times)
  - Bolivia nationalises four electricity companies. (Al Jazeera) (BBC) (Bangkok Post)
    (Reuters)
  - Pope Benedict XVI will appoint an envoy and a commission to reform Legion of Christ
    (LC), whose Mexican founder, Marcial Maciel, abused children before being dismissed
    in 2006. (BBC) (Reuters)
  - Albania becomes the 37th member of the European Patent Organisation. (EPO)
  - Taiwan employs capital punishment for the first time since 2005, executing four
    men for "grave offences such as fatal kidnappings and murders". (BBC)
  - Two retired generals tell The Washington Post that, with more than 25 per cent
    of young Americans being "too fat to fight", obesity is threatening the future
    of the United States military. (BBC) (The New Zealand Herald) (Radio New Zealand)
  - A Taipei-Shanghai flight makes an emergency landing in Hangzhou after an American
    passenger makes an inappropriate reference to a bomb. (The Times of India) (The
    Age) (BBC)
  - A major pipe rupture in Weston, Massachusetts leaves up to 2 million people in
    the Greater Boston area without drinkable tap water for 59 hours. (Boston Globe)
