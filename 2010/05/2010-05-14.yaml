Date: '2010-05-14'
Source_URI: Portal:Current events/2010 May 14
Intelligence_Payload:
  Uncategorized:
  - 25 people die and 120 others are injured in a suicide attack while attending a
    football match in the Iraqi city of Tal Afar. (Al Jazeera) (BBC) (France24) (Xinhuanet)
  - Death toll rises to at least 8 and up to 121 injured as anti-government protests
    escalate in Thailand during a day of violence sparked by yesterday’s shooting
    of a key figure, Khattiya Sawasdipol, of the Red Shirt protesters. (The Times)
    (WCNC)
  - At least one person is killed and 42 injured as live ammunition is fired during
    clashes between interim government supporters and backers of ousted president
    Kurmanbek Bakiyev in southern Kyrgyzstan. (Xinhua)
  - Iran announces that it hanged 5 prisoners convicted of the so-called crime of
    "enmity against God", at least 4 of whom were members of Iran's Kurdish minority.
    (VOA)
  - The sole survivor of the Afriqiyah Airways Flight 771 crash in Libya is informed
    of the death of his family members. (BBC) (Fox News) (Sky News) (The Guardian)
  - The body of a Palestinian teenager said to have been shot dead by Jewish settlers
    is found. He is the first to die since Israel and the Palestinian National Authority
    began indirect peace talks on Saturday. In a retaliation shooting, the Al-Aqsa
    Martyrs' Brigades claims responsibility for firing on a car of Jewish civilians
    in the West Bank. (Reuters) (The Jerusalem Post)
  - Pakistan arrests a suspect with connections to a Pakistani group who said he acted
    as an accomplice to the man accused of trying to bomb Times Square in New York.
    (The Washington Post)
  - The chairman of the Nigerian People's Democratic Party (PDP), Vincent Eze Ogbulafor,
    resigns days after facing fraud charges in court. (BBC)
  - Spanish judge Baltasar Garzón is suspended ahead of his trial. (Al Jazeera) (BBC)
    (Reuters) (The Times of India)
  - Tens of thousands of people protest in Tirana against last years election, demanding
    a recount. (BBC)
  - Hundreds of people demonstrate and police shoot dead one person after a NATO-led
    raid murders civilians in Jalalabad Afghanistan. (Al Jazeera)
  - The ban given following the Togo national football team attack ahead of the 2010
    Africa Cup of Nations in Angola is lifted with immediate effect as confirmed by
    the Confederation of African Football (CAF) at a meeting in Cairo. (AFP) (BBC)
    (The Daily Telegraph)
  - Ethiopia, Rwanda, Tanzania and Uganda sign an agreement to seek more water from
    the Nile, a move opposed by Egypt and Sudan. Kenya issues a support statement.
    (BBC) (Al Jazeera) (IOL) (The Miami Herald)
  - Nigerian National Petroleum Corporation (NNPC) and China State Construction Engineering
    Corp (CSCEC) sign a €18 billion (£16 billion) deal. (BBC)
  - Sweden expels Syrian diplomat over suspected kidnapping plot. (The Jerusalem Post)
  - British Labour MP Stephen Timms, a former treasury minister, is stabbed in the
    abdomen by a woman in east London. (Fox News) (RTÉ) (Sky News) (The Independent)
    (BBC)
  - New Zealand and South Africa's rugby unions make "landmark apologies" for excluding
    Maori and black players from their teams during the apartheid era. (BBC)
  - Space Shuttle Atlantis lifts off for its final planned flight in the Space Shuttle
    program after a quarter century of service. (The New York Times)
  - The Aviva Stadium, Ireland's new national stadium, is officially opened by Taoiseach
    Brian Cowen in Dublin. (The Irish Times) (BBC) (Reuters)
