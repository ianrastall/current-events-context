Date: '2010-05-17'
Source_URI: Portal:Current events/2010 May 17
Intelligence_Payload:
  Uncategorized:
  - The design for the New Bus for London is revealed. (BBC)
  - The refusal of Israel to permit entry of internationally renowned American linguist
    and political activist Noam Chomsky to the West Bank on May 16, sparks intense
    debate in the country. (New York Times)
  - Naxalite insurgents blow up a bus in India filled with police and para-militaries,
    50 are feared killed. (NDTV)
  - A Pamir Airways plane with 43 people on board crashes in Afghanistan between the
    cities of Kabul and Kunduz. (AFP) (Oneindia.in) (Xinhua)
  - Six people are attacked with a meat cleaver before the assailant commits suicide
    at a market in Foshan, China. (AP) (Shanghai Daily) (CNN)
  - Brazil, Iran and Turkey agree on a nuclear fuel swap aimed at easing concerns
    from the West that Iran might building a bomb. (Al Jazeera) (BBC)
  - Dublin Airport, Amsterdam Airport Schiphol and Britain's two busiest airports
    all close due to the latest round of Icelandic volcanic disruption. (Al Jazeera)
    (RTÉ) (BBC)
  - The Instituto Butantan in São Paulo, Brazil, which had one of the world's largest
    snake collections, is destroyed by fire. (BBC) (MercoPress)
  - The national day of Norway
  2010 Thai political protests:
  - Hospital officials confirm the death of Thai general, Khattiya Sawasdipol, after
    he was shot on Thursday as he backed protesters in Bangkok. (BBC) (Al Jazeera)
  - Thousands of red shirt protesters continue to defy a government deadline to disperse.
    (Bangkok Post) (CBC)
