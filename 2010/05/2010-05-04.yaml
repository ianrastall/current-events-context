Date: '2010-05-04'
Source_URI: Portal:Current events/2010 May 4
Intelligence_Payload:
  Uncategorized:
  - Thailand's Prime Minister Abhisit Vejjajiva and anti-government "Red Shirt" protesters
    reach a qualified agreement to hold general elections in November, but questions
    over the dissolution of parliament prevent an end to the two-month standoff in
    central Bangkok. (ABC News) (AP)
  - Former Argentine President Néstor Kirchner is unanimously elected the first Secretary
    General of the Union of South American Nations (Unasur) at a heads of state summit
    held in Campana, Argentina. Télam (Argentina), Washington Post,ABC (Spain),Semana
    (Colombia)
  - U.S. Customs and Border Protection agents arrest Faisal Shahzad, a naturalized
    U.S. citizen from Pakistan, in connection with the attempted car bombing in Times
    Square as he tried to flee the country. (MSNBC) (CNN) (USA Today)
  - Rising floodwaters from the Cumberland River flood the Grand Ole Opry House with
    several feet of water, and cause evacuations in Nashville, Tennessee. (USA Today)
    (The New York Times) (The Washington Post)
  - The Deepwater Horizon drilling rig explosion in the Gulf of Mexico causes slowing
    shipping and increased prices for gasoline, food and other items in the United
    States. (CBS News) (MSNBC)
  - Pablo Picasso's Nude, Green Leaves and Bust sells for US$106 million at Christie's
    in New York, becoming the most expensive work of art sold at auction. (Reuters)
  - A new European Jewish group, JCall, supported by thousands of European Jews is
    founded to lobby for a resolution to the Middle East conflict.(Jerusalem Post)
    (Al Jazeera)
  - At least 10 people die and 14 are injured in a fire at a dormitory for railway
    workers in Hohhot, Inner Mongolia. (The Sydney Morning Herald)
  - Dozens of people are injured when panic breaks out at the Remembrance of the Dead
    in Amsterdam, the Netherlands. (NOS)
  - Experts announce a rescue plan intended to preserve the existence of the endangered
    snubfin dolphin, the only dolphin unique to Australia. (The Sydney Morning Herald)
  Air travel disruption after the 2010 Eyjafjallajökull eruption:
  - Flights in and out of Northern Ireland and the Republic of Ireland are grounded
    for several hours. (BBC News)
  - The Civil Aviation Authority announces that airspace over Scotland and Northern
    Ireland will be closed from 0700 BST on Wednesday. (BBC News)
