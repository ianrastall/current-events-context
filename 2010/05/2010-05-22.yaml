Date: '2010-05-22'
Source_URI: Portal:Current events/2010 May 22
Intelligence_Payload:
  Air India Express Flight 812:
  - Air India Express Flight 812, with 166 people on board, crashes near Mangalore
    International Airport. (Aviation Safety Network) (Al Jazeera) (CNN) (BBC)
  - An investigation into the cause of the crash begins; the flight's black box is
    located. (BBC) (RTÉ)
  - Only eight passengers have survived the crash. (CNN)
  Uncategorized:
  - Apa, a Nepalese Sherpa mountain climber who already held the world record for
    summiting Mount Everest more than any other person, reaches the summit for the
    20th time. (Xinhua) (Press Trust of India) (Asian Tribune)
  - The death toll of Cyclone Laila in Andhra Pradesh, the worst storm to hit the
    Indian state in 14 years, reaches 36. (IndiaTimes) (BBC)
  - The death toll from yesterday's car bomb at a market in Diyala reaches 30. (BBC)
  - The Texas Education Agency adopts controversial changes to the Texas public school
    curriculum, including dropping coverage of enlightenment thinker Thomas Jefferson
    and suggesting United Nations is a "threat to freedom". The proposal to refer
    to the slave trade as the "Atlantic triangular trade" is not implemented. (BBC)
  - Irish authorities arrest two men and foil a "major dissident bomb operation".
    (RTÉ) (Press Association)
  - Afghan police seize a cache of hundreds of rockets hidden on the outskirts of
    Kabul. (BBC)
  - At least 13 people have died in a clash between a Somali militia and Ethiopian
    forces who had crossed the border in Somaliland. (BBC)
  - Campaigning closes ahead of the Ethiopian general election, 2010 to be held tomorrow.
    (Al Jazeera)
  - Abbott Laboratories buys a Piramal Healthcare unit in India to become the country's
    largest drug-maker. (The Irish Times) (Economic Times)
  - Five people are shot dead by 100 armed Maoists who storm and burn market buildings
    in Sheohar, Bihar. (Economic Times) (The Hindu)
  - British Airways chief executive Willie Walsh is surrounded by demonstrators who
    storm the headquarters of the Acas building in London. (The Daily Telegraph) (The
    Guardian) (CNN) (Hindustan Times)
  - Ariane 5 launch vehicle carries out its 50th mission, putting two large telecommunications
    satellites in orbit. (BBC)
  - In the 2010 UEFA Champions League Final, Inter Milan defeats Bayern Munich 2–0,
    for their first major European title since 1965. (BBC)
  - More than 74,000 South African football fans attend the first match at Soccer
    City—venue for the 2010 FIFA World Cup Final—less than three weeks before the
    tournament begins. (BBC)
  - Thirteen-year-old American Jordan Romero becomes the youngest person to reach
    the summit of Mount Everest. (AP via ESPN)
  - Blackpool Football Club beat Cardiff City Football Club 3-2 in the 2010 Final
    of the Football League Championship play-offs to be guaranteed "the biggest windfall
    in global sport from the outcome of a single event". (The Sunday Times) (BBC)
    (The Independent)
  - Republic of Ireland defender Shane Duffy undergoes life-saving surgery in Dublin
    after lacerating his liver. (BBC) (RTÉ) (ABC News) (USA Today)
  - Nicolaus Copernicus is disinterred from an unmarked grave and reburied by Poland.
    (AP) (The Voice of Russia)
  - A range of activities occur across the United Kingdom to mark the International
    Day for Biological Diversity. (BBC)
