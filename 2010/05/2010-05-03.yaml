Date: '2010-05-03'
Source_URI: Portal:Current events/2010 May 3
Intelligence_Payload:
  Uncategorized:
  - Ajmal Kasab, the only surviving terrorist involved in the 2008 Mumbai attacks,
    is found guilty of murder, conspiracy, and waging war against India. (AP) (NDTV)
  - American air carriers United and Continental officially announce a merger that
    will create the world's largest airline. (CNN) (Bloomberg)
  - Darfur rebel group, the Justice and Equality Movement, breaks off peace talks
    with the Sudanese government, accusing it of a renewing the conflict with a military
    offensive that has included airstrikes and ground attacks over the past week.
    (USA Today) (The Washington Post)
  - The death toll reaches 28 as flooding from weekend storms worsens in southern
    US towns and cities, including Nashville in Middle Tennessee, and parts of Kentucky,
    Alabama and Mississippi. (USA Today) (CNN)
  - Thai Prime Minister Abhisit Vejjajiva proposes to hold elections on 14 November
    to end the political crisis in the country. (Bangkok Post) (Al Jazeera) (BBC)
  - The Irish Aviation Authority closes Donegal Airport, cancels at least two flights
    and announces the closure of all airspace in Ireland on Monday due to Icelandic
    volcanic ash, while British Airports, including some in Scotland, may also be
    affected due to continued eruptions of Eyjafjallajökull volcano. (Herald Sun)
    (BBC) (RTÉ)
  - Iranian President Mahmoud Ahmadinejad and United States Secretary of State Hillary
    Clinton exchange criticism of each other’s countries nuclear policies at the opening
    of the Nuclear Non-proliferation Treaty Review Conference at the United Nations
    Headquarters in New York. (Chicago Tribune) (CNN) (USA Today)
  - Australian mining stocks plummet after the government passes a new 40% profit
    tax on the industry. International mining companies warn that many new mining
    projects may be canceled. (Reuters)
  - Norsk Hydro secures 100 years worth of bauxite supply in a US$4.9 billion deal.
    (Bloomberg)
  - Hundreds of Egyptian workers protest outside Egypt's cabinet building to request
    a rise in their minimum wage. (Al Jazeera)
  - A manual recount gets underway in Baghdad. (Al Jazeera)
  - Neil Robertson becomes the first Australian to win the World Snooker Championship
    since 1952 and the first player from outside the UK and Ireland to win the world
    title since 1980. (BBC) (The Sydney Morning Herald)
  - North Korean leader Kim Jong-il arrives in China on a rare foreign visit. (Hong
    Kong Standard) (The Times) (Yonhap) (China Daily) (Al Jazeera)
  - The European Commission proposes rules for imports of fishery products from Greenland
    into the EU. (EU Business)
  - Uganda's highest ice cap in the Rwenzori mountain range splits. (BBC)
  - Natavia Lowery, PA to former Ramones manager Linda S. Stein, is given a 25 year
    to life jail sentence for beating Stein to death on 30 October 2007. (BBC) (CNN)
    (Houston Chronicle) (The Washington Post)
  World Press Freedom Day:
  - Journalists protesting against the prison death of Cameroon newspaper editor Bibi
    Ngota clash with police in Yaoundé as hundreds are prevented from staging a sit-in
    at the office of the prime minister. (BBC)
  - Paris-based media watchdog group Reporters Without Borders names the leaders of
    North Korea (Kim Jong-il), Russia (Vladimir Putin) and Rwanda (Paul Kagame) as
    some of the world's worst "predators of freedom" and lists offences against press
    freedom in 40 countries. (BBC) (New York Daily News)
