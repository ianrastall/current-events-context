Date: '2010-05-10'
Source_URI: Portal:Current events/2010 May 10
Intelligence_Payload:
  Uncategorized:
  - Iraqi insurgents kill 102 and injure over 200 people, mostly Iraqi civilians,
    in a series of suicide bombings from Mosul to Basra in Iraq, the highest number
    in one day this year, and jeopardizing a planned US withdrawal. (The Times)
  - Prime Minister of the United Kingdom Gordon Brown announces his intention to resign
    as Leader of the Labour Party, and calls for a leadership election to be completed
    by September. (BBC)
  - Stock markets rise significantly and bond prices fall around the world after investors
    are reassured by the European Union and International Monetary Fund’s nearly $1
    trillion plan to avoid a European debt crisis. (USA Today) (The Times)
  - President Obama nominates Solicitor General Elena Kagan as the youngest Justice
    and third woman for the Supreme Court of the United States. (USA Today) (The Times)
  - German Chancellor Angela Merkel’s government loses its majority in the upper house
    of parliament in a state election marked by voter anger over the bailout to avoid
    the Greek debt crisis. (The Australian) (Los Angeles Times)
  - BP sprays more chemicals into the main massive undersea oil leak in the Gulf of
    Mexico using a deep-sea robot in an attempt to thin the oil which is rushing up
    from the seabed at the rate of about 210,000 gallons (795,000 liters) per day.
    (USA Today)
  - A mass grave containing the bodies of 250 ethnic Albanians from the Kosovo War
    is discovered in Serbia. (USA Today) (B92) (AFP)
  - Presidential elections, legislative elections and local elections start today
    in the Philippines. (Philippine Inquirer) (BBC)
  - The South Korean Defence Minister Kim Tae-Young announces that investigators have
    found traces of explosives in the wreck of the ROKS Cheonan that sank in March.
    (BBC) (Xinhua) (Kyodo)
  - Rescue efforts continue in the aftermath of the May 2010 Siberia mine explosion.
    (RIA Novosti)
  - A senior U.S. official, Kurt M. Campbell, meets with Burmese opposition leader
    Aung San Suu Kyi. (AP) (The New York Times) (Press TV)
  - Severe rainstorms have killed at least 70 people since a powerful tornado hit
    Chongqing municipality in south-western China in Dianjiang and Liangping counties.
    Inclement weather in the next two days will affect Guangdong, Fujian, Hunan, Jiangxi,
    Zhejiang, Guizhou and Yunnan provinces. (Sina)
  - Multiple tornadoes across Oklahoma and Kansas result in at least 5 deaths and
    58 injuries. Twisters hit a truck stop near Midwest City and locations in Oklahoma
    City. (KTUL) (AP) (NWS Norman) (NewsOK)
