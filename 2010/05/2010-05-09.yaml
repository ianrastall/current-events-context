Date: '2010-05-09'
Source_URI: Portal:Current events/2010 May 9
Intelligence_Payload:
  Uncategorized:
  - BP's containment chamber fails, prolonging the Gulf of Mexico oil spill. (Reuters)
  - The regional coalition of Christian-Democrats (CDU) and Free Democrats (FDP) are
    voted out of office in North Rhine-Westphalia (NRW), which may lead to the federal
    government of Chancellor Angela Merkel losing its majority in the upper house.
    (BBC) (Financial Times) (The Guardian) (The Independent)
  - Sandro Bondi, Italy's minister of culture, calls for a boycott of the 2010 Cannes
    Film Festival after a documentary on the 2009 L'Aquila earthquake was included
    in the programme. (AFP) (Reuters)
  - An earthquake strikes Sumatra sparking fears of a tsunami. (BBC) (Bangkok Post)
    (France24) (IAfrica.com)
  - A mine explosion in Mezhdurechensk (Kemerovo Oblast), Russia, kills at least 12
    people and injures 24 others with 64 unaccounted for. (BBC) (TVNZ)
  - U.S. missiles kill five people in North Waziristan, Pakistan. (AP)
  - A Chinese man is freed from prison after 10 years after the man he had been convicted
    of killing is found alive. (BBC) (The Daily Telegraph) (Philippine Daily Inquirer)
  - Somali pirates seize MS Marida Marguerite, a German-owned tanker, off the coast
    of Somalia. (Press TV)
  - Dallas Braden of the Oakland Athletics throws the 19th perfect game in Major League
    Baseball history in a 4-0 win over the Tampa Bay Rays. (ESPN)
  - The 26th annual Vancouver Sun Run happens today in Vancouver, British Columbia,
    Canada.
