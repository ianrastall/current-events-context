Date: '2010-05-18'
Source_URI: Portal:Current events/2010 May 18
Intelligence_Payload:
  Uncategorized:
  - A new study has found that the gap in wealth between white and black Americans
    increased by more than four times between 1984 and 2007. (BBC)
  - Hamas' interior ministry executes three Palestinians in Gaza, without the approval
    of the President of the Palestinian National Authority, Mahmoud Abbas. (The Jerusalem
    Post)
  - A Taliban suicide car bomber kills at least 12 Afghan civilians and wounds dozens
    more in an attack on a NATO convoy in the capital, Kabul. (TVNZ)
  - A suicide car-bomber attacks a police van in the north western Pakistani town
    of Dera Ismail Khan, killing 12 people. (TVNZ)
  - Suspected Maoists kill 35 people in a land mine attack against a bus in central
    India on a road roughly 280 miles (450 km) south of the state capital of Raipur.
    (CNN)
  - Secretary-General Ban Ki-moon appoints Christiana Figueres of Costa Rica to lead
    United Nations efforts to combat climate change and global warming. (UN)
