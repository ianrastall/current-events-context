Date: '2010-05-05'
Source_URI: Portal:Current events/2010 May 5
Intelligence_Payload:
  Uncategorized:
  - Umaru Yar'Adua, President of Nigeria, dies at age 58. Acting President Goodluck
    Jonathan succeeds Yar'Adua as President in his own right. (Sky News) (CNN)
  - 2010 Greek riots
  - One hundred thousand Greeks participate in a general strike in Greece to protest
    against "austerity measures" set up by the recent Papandreou's gouverment. (The
    Times) (CBC) (Al Jazeera)
  - Three people die of asphyxiation due to fires set by protesters. (Reuters) (BBC)
  - The Supreme Court of India in a landmark judgment declares the use of narco tests,
    brain mapping tests and lie detector tests by investigative agencies unconstitutional.
    (HindustanTimes)
  - Landsides killed 15 Chinese workers in the Tengchong County, Yunnan Province.
    (China.com) (People)
  - Somali pirates seize the Russian oil tanker with 23 people on board, 500 miles
    off the Somali coast. (RIA Novosti) (BBC)
  - An Egyptian-led proposal for a nuclear arms free Middle East receives support
    from the United States, Russia, Britain, France, and China. Israel is the only
    Middle Eastern nation believed to possess nuclear weapons. (Reuters)
  - Around 23 people are killed when a bus overturns while traveling to Cape Town,
    South Africa. (AP) (IOL) (Daily Nation)
  - The European Parliament calls on Canada to ensure visa-free travel for all EU
    citizens in a wide-ranging resolution, while expressing hope that the EU-Canada
    summit will speed up negotiations on a comprehensive trade agreement. (Europarl)
    (Isria) (MSNBC)
  - A prominent journalist in Somalia, Sheikh Nur Abkey, is kidnapped and then killed
    in Mogadishu. (Press TV) (Reuters India) (BBC)
  - Two men are killed and another one is wounded when unidentified gunmen open fire
    at a Lexus in the capital of Russia’s Caucasian republic of Dagestan, Makhachkala.
    (ITAR)
  - The European Parliament calls for tougher EU fiscal rulebook. (EU Business) (Expatica)
  - Twenty-one-term U.S. Rep. Dave Obey, a Wisconsin Democrat and chairman of the
    House Appropriations Committee, announces he will not run for re-election in November.
    (AP at Yahoo)
  - Democracy Now! producers file a lawsuit against multiple law enforcement agencies
    for allegedly unjustifiably encroaching on their First Amendment rights at the
    2008 Republican National Convention. (StarTribune)
