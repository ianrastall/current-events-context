Date: '2010-05-13'
Source_URI: Portal:Current events/2010 May 13
Intelligence_Payload:
  2010 Thai political protests:
  - A general associated with the National United Front of Democracy Against Dictatorship,
    Khattiya Sawasdipol, is seriously injured after being shot in the head while giving
    an interview. (Reuters) (Bangkok Post)
  - Gunfire and explosions occur in the capital Bangkok after the red shirt protesters
    ignore a government deadline to end their street protests. (Al Jazeera)
  Uncategorized:
  - 5 people are killed and a further 19 injured in two bombings in Baghdad. (Xinhua)
  - Three alleged organisers of Moscow suicide bombings in March 2010 are killed after
    apparently resisting arrest. (BBC) (Al Jazeera)
  - Seven countries who have faced accusations of human rights violations win three-year
    seats on the United Nations Human Rights Council in an uncontested election. (AP)
    (The Guatemala Times) (Reuters Canada)
  - At least 21 people are killed and five are wounded in an outburst at a colliery
    in Puding County, Anshun, Guizhou. (Xinhua) (Al Jazeera) (DAWN) (BBC)
  - A report from Human Rights Watch claims that the Israeli army unlawfully destroyed
    civilian property in the Gaza War of 2008 and 2009, while the Israeli army asserts
    they only targeted property used for combat or terrorist activities. (BBC) (Ha'aretz)
  - President Goodluck Jonathan nominates Namadi Sambo to serve as Nigeria's vice
    president. (Al Jazeera)
  - Following a warning, a bomb explodes outside a maximum security prison in Korydallos,
    Greece. (BBC)
  - The Aban Pearl, a natural gas platform, sinks off the coast of Venezuela, with
    all 95 workers evacuated safely. (CBC)
  - As many as half a million pilgrims from 35 nations, including India, China and
    Vietnam, attend open-air Mass at Fátima, Portugal, celebrated by Pope Benedict
    XVI. The Pope criticises abortion and same-sex marriage in a speech. (BBC) (RTÉ)
    (The Sydney Morning Herald)
  - The ".рф" (".rf" - Russian Federation) Cyrillic country code top-level domain
    (ccTLD) is officially launched, the fourth internationalized country code. The
    first two web sites available on “.рф” are президент.рф (president.rf) and правительство.рф
    (government.rf). (Voice of Russia) (ITAR-TASS) (RIA Novosti)
  - The second case of poliomyelitis in two days is reported in Russia, in Russia's
    first polio cases in 15 years, with the virus believed to have come from Tajikistan.
    (RT) (RIA) (The Moscow Times)
  - Supporters of ousted Kyrgyz President Kurmanbek Bakiyev seize government buildings
    in the south of the country. (BBC) (AFP)
  - One of Nigeria's most influential politicians, James Ibori, is arrested on corruption
    charges in Dubai. (NEXT) (BBC)
  - Sudan asks Interpol to arrest Justice and Equality Movement chief Khalil Ibrahim.
    (Al Jazeera)
  - Five people are arrested, two in Massachusetts, and three in New York by the FBI
    in connection with the 2010 Times Square car bombing attempt (NECN) (NJ News)
    (WJZ) (Al Jazeera)
  - The U.S. state of Hawaii enacts a law permitting officials to ignore multiple
    attempts by the same person to view the birth certificate of President of the
    United States Barack Obama. (BBC)
