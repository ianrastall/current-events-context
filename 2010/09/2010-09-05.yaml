Date: '2010-09-05'
Source_URI: Portal:Current events/2010 September 5
Intelligence_Payload:
  Armed conflict and incidents:
  - Israel
  - Israeli F-16 warplanes launch airstrikes on Gaza smuggling tunnels, with one Palestinian
    dead and several injured, in retaliation for recent Palestinian attacks. (The
    Jerusalem Post) (Al Jazeera) (Xinhua) (BBC)
  - Yoav Gallant is chosen as the Chief of General Staff of the Israel Defense Forces.
    (Jerusalem Post)
  - At least five people are killed and 35 injured as a suicide bomber attacks a Russian
    Army firing range at Buynaksk, Dagestan. (Reuters) (RIA Novosti)
  - More than 40 people are killed and dozens of others are injured in a clash in
    Darfur. (Al Jazeera)
  - Iraq
  - A large explosion hits an Iraqi Ministry of Defence complex in Baghdad. (AFP via
    the Melbourne Age)
  - At least 12 people are killed and dozens injured as insurgents attack one of the
    main military command centres in Baghdad. (New York Times), (AP via Google News)
  - The Basque nationalist group ETA announces a ceasefire in its struggle for Basque
    independence from France and Spain. (BBC)
  Arts and culture:
  - The winners of the 2010 Hugo Awards are announced at Worldcon in Melbourne, Australia.
    (Hugo Awards)
  - British academic Peter Gumbel causes controversy in France by alleging in his
    book that their education system lowers the self-esteem of pupils. (The Observer)
  Disasters:
  - A state of emergency is declared in Guatemala after heavy rains and landslides
    kill at least 18 people. (BBC) (RTÉ)
  - The Australian Army is called in to assist with flood relief in the state of Victoria.
    (ABC News Australia)
  International Relations:
  - A Palestinian Authority spokesman says that Iran has no standing to criticize
    them for relaunching direct talks with Israel while Iran "represses their people,"
    after the Iranian foreign minister says those negotiating with Israel are "betraying
    their nations." (Jerusalem Post)
  Law and crime:
  - Police in El Salvador discover barrels containing US$9 million in suspected drug
    money. (BBC) (AP)
  Politics:
  - Voters in Moldova go to the polls in a referendum on whether the country's President
    should be directly elected. (Reuters) (RIA Novosti)
  - The five contenders to be leader of the United Kingdom Labour Party hold a debate
    in Norwich, England. (Sky News)
  Science:
  - A group of Danish rocketeers postpone launch when a valve on their rocket jammed.
    (BBC)
