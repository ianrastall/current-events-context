Date: '2010-09-03'
Source_URI: Portal:Current events/2010 September 3
Intelligence_Payload:
  Armed conflicts and incidents:
  - Rebels in Darfur say armed men have attacked villages in the region leaving dozens
    dead in the last two days. (IOL) (AFP)
  - A suicide bomber injures at least 25 Tajikistan police officers with several missing
    following an attack on a regional headquarters at Khujand. (AFP) (RIA Novosti)
  - A Taliban bomb attack on a Shiite solidarity rally with the Palestinian people
    kills at least 53 people in Quetta, Pakistan. (MSNBC) (Reuters via Yahoo! Canada)
    (Xinhua) (The Times of India)
  Business and economy:
  - Unemployment in the United States rises to 9.6% for August. (Market Watch)
  Disasters:
  - UPS Airlines Flight 6 crashes in Dubai near the International Airport killing
    both crew members. (Emirates 24/7) (Gulf News) (BBC), (Al Jazeera)
  - Mount Sinabung in North Sumatra, Indonesia, erupts again. (AP via MSNBC) (Bernama)
  - States in the New England region of the United States prepare for a possible impact
    from Hurricane Earl which has weakened to a tropical storm. (The Boston Globe),
    (AP via Yahoo! News)
  - Forest fires flare up in the southern Russian regions of Volgograd and Saratov,
    killing two people and burning down 500 buildings. (AFP via The Courier Mail)
    (The Moscow News) (BBC)
  - Landslides in the village of Wama near Baoshan in China kill at least 12 people
    with 36 missing. (Sky News Australia)
  - A magnitude 7.1 earthquake occurs near Christchurch, New Zealand, causing widespread
    damage and power cuts but no deaths. (The New Zealand Herald) (Herald Sun)
  International relations:
  - South Africa criticises a life sentence passed against former Madagascan President
    Marc Ravalomanana, as it would "not help" the country's political situation. (BBC)
    (Business Day) (AllAfrica.com)
  - Japan approves additional sanctions against Iran due to concerns over Iran's nuclear
    program. (AP via ABC News America)
  - The United Nations Food and Agriculture Organization calls a special meeting for
    24 September to discuss rising food prices. (BBC)
  Law and crime:
  - Miami International Airport in the US state of Florida is evacuated after a suspicious
    package is found. A passenger is taken into custody. (CNN) (CNN)
  - The President of the Philippines, Benigno Aquino III, takes responsibility for
    the handling of the Manila hostage crisis in August. (Hindustan Times)
  - Seven defendants are found guilty of abusing children in the Casa Pia child sex
    abuse trial in Lisbon, Portugal. (BBC)
  Politics:
  - Pro-government crowds in Iran attack the home of opposition leader Mahdi Karroubi
    ahead of Al-Quds day protests. (Jakarta Post) (Al Jazeera)
  - Militant Australian Islamic preacher Feiz Mohammad calls for Dutch politician
    Geert Wilders to be "beheaded" for denigrating Islam. (AFP via Sydney Morning
    Herald)
  Science:
  - The Royal Mail in the United Kingdom launches the first intelligent postage stamp,
    the first to work with image recognition technology. (BBC)
  - A study published in the journal Cell reports the discovery that the cerebral
    cortex of mammals shares a common evolutionary origin with mushroom bodies, brain
    structures involved in learning and memory in insects and other invertebrates.
    (Science Daily)
  Sport:
  - The International Cricket Council charges three Pakistan cricketers who are then
    formally interviewed by police into a betting scam alleged by the News of the
    World. (The Guardian)
  UEFA Euro 2012 qualifying:
  - Qualification starts for UEFA Euro 2012 in European football, with wins for Germany
    and 2010 FIFA World Cup finalists Spain and the Netherlands. (Toronto Sun) (The
    Guardian)
  - France is booed by their fans after an embarrassing 1-0 home defeat against Belarus.
    (The Guardian)
  - Two hundred and eighty German and Belgian fans are arrested in Brussels for football
    hooliganism. (New Kerala)
