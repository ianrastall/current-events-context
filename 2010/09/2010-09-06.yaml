Date: '2010-09-06'
Source_URI: Portal:Current events/2010 September 6
Intelligence_Payload:
  Armed conflicts and incidents:
  - At least seventeen people are killed and forty others injured after a suicide
    bomber attacks a Pakistan police station in the town of Lakki Marwat in Khyber
    Pakhtunkhwa province. (Al Arabiya)
  - The number of deaths for members of the International Security Assistance Force
    in the War in Afghanistan reaches 500 for the first 9 months of 2010 as opposed
    to 521 for all of 2009. (Reuters)
  - Alfredo Pérez Rubalcaba, Spain's Interior Minister, dismisses ETA's ceasefire
    offer as insufficient for a peace process. (CNN)
  Disasters:
  - New Zealand Army soldiers begin providing security at the centre of Christchurch
    following the 2010 Canterbury earthquake as a state of emergency is extended until
    Wednesday. (AP via Yahoo! News) (AFP via Yahoo! News)
  - Over fifty-thousand Australians have been placed on evacuation alert in the Australian
    state of Victoria in eleven towns since Saturday due to the 2010 Victorian floods.
    (AFP via The West Australian)
  - Emergency teams in Guatemala resume rescue efforts after mudslides bury dozens
    of people. (BBC)
  - '2010 Atlantic hurricane season: Tropical Storm Hermine slams into northern Mexico
    near the border with Texas. (Reuters via Swiss Info)'
  - A wind-driven wildfire in the United States state of Colorado leads to the evacuation
    of 1,000 houses. (AP via Yahoo! News)
  International relations:
  - North Korea announces it will release seven detained Chinese and South Korean
    fishermen. (Yonhap) (Xinhua) (Al Jazeera)
  - Bernard Kouchner, the French Minister of Foreign Affairs, and the Vatican offer
    to assist Sakineh Mohammadi Ashtiani sentenced to death by stoning for adultery
    in Iran. (BBC)
  - Avigdor Lieberman, the Israeli Foreign Affairs Minister and leader of the Yisrael
    Beitenu Party says that it will block any proposal to extend a freeze on settlements
    on the West Bank. (Voice of America)
  Law and crime:
  - China investigates the qualifications of all its commercial pilots after 200 of
    them had falsified their résumés. (BBC) (AFP) (China Daily)
  - Two Greenpeace activists are given suspended sentences in Japan for stealing whale
    meat. (The Japan Times) (Reuters) (AP)
  - Bahrain charges 23 Shia Muslim activists with terrorism and attempting to overthrow
    the government. (Al Jazeera) (Bloomberg) (Bahrain News Agency)
  Politics and elections:
  - Vlad Filat, the Prime Minister of Moldova, concedes defeat on a referendum proposal
    for direct election of the President of Moldova. (BBC)
  - France prepares for a general strike over reform to pensions with two million
    people expected to participate. (The Telegraph)
  - Former Prime Minister of the United Kingdom Tony Blair cancels a London book signing
    for his memoir, A Journey, because of protests by the British National Party and
    anti-Iraq War demonstrators. (The Guardian)
