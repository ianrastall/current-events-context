Date: '2010-09-22'
Source_URI: Portal:Current events/2010 September 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three troops were killed when a roadside blast struck a military vehicle in Bara
    area of Khyber, one of the seven tribal agencies in Pakistan's restive northwest
    bordering Afghanistan. (Xinhua)
  - At least one person is killed and 10 injured in a shootout in Quetta, Pakistan.
    (Xinhua)
  - Three French crewman are kidnapped off the coast of Nigeria. (Reuters) (Xinhua)
    (The Himalayan Times)
  - A Palestinian man is shot dead by an Israeli security guard in the East Jerusalem
    area of Silwan, during a clash between Israeli settlers and Palestinians. (BBC)
  - At least a dozen Iranians are killed and 81 are wounded in a bomb attack on a
    military parade in the Kurdish town of Mahabad according to reports from Iranian
    Arabic language television Al-Alam. (DNA India) (Reuters) (RFERL) (cnbc), (AFP
    via Sydney Morning Herald)
  - A militant is killed in an ongoing operation by security forces in militancy-hit
    Sopore township of north Kashmir in the Baramulla district. (PTI)
  Disasters and accidents:
  - At least 18 people are dead and 44 missing after heavy rains from Typhoon Fanapi
    flood parts of southern China. (CNN) (AP)
  - Two workers are killed and another is injured after a mine in Balıkesir collapses.
    22 workers have been killed there in the past six months. (Today's Zaman)
  Entertainment:
  - American celebrity Paris Hilton is barred from entering Japan after pleading guilty
    to cocaine possession in Las Vegas, Nevada, earlier in the week. (Times of India)
  - American singer Eddie Fisher dies in Berkeley, California. (AP via Yahoo! News)
  International relations:
  - Russia bans arms sales to Iran, in accordance with United Nations Security Council
    Resolution 1929. (RIA Novosti) (Xinhua)
  - China threatens Japan with "further action" if the latter does not release a Chinese
    fishing captain detained near the disputed Senkaku Islands. (Al Jazeera) (AFP)
  - 'An international summit titled "The Arctic: Territory of Dialogue" begins in
    Moscow, Russia, on territorial claims and co-operation in the Arctic. (BBC) (Voice
    of Russia)'
  - Radio Free Asia reports that North Korea's National Defense Commission held an
    emergency meeting presided over by Kim Jong-un to compromise the upcoming G20
    summit in Seoul, South Korea. (Korea Times) (Arirang News)
  - A panel of human rights experts convened by the United Nations Human Rights Council
    says Israel's seizure of the in the Gaza flotilla raid was "clearly unlawful".
    (The Guardian), (BBC)
  Law and crime:
  - 14 mutilated bodies are discovered in the Ruzizi River in Burundi, close to the
    border with the Democratic Republic of the Congo. (BBC) (News24)
  - Iranian human rights campaigner Emadeddin Baghi is sentenced to six years in jail
    after recording an interview for the BBC with reformist cleric Grand Ayatollah
    Hussein-Ali Montazeri. (BBC)
  Politics:
  - Another group of asylum seekers starts a new protest at the Villawood Immigration
    Detention Centre in Sydney, Australia, while other detainees continue a hunger
    strike. (Sydney Morning Herald)
  - Simonetta Sommaruga and Johann Schneider-Ammann are elected as new members of
    the Swiss Federal Council by the Swiss parliament. Swiss parliament dossier (german)
  Science:
  - The discovery of the ceratopsids species Kosmoceratops richardsoni and Utahceratops
    gettyi in Utah is announced. (National Geographic)
