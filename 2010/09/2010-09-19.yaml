Date: '2010-09-19'
Source_URI: Portal:Current events/2010 September 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - A new convoy of vehicles departs the UK with humanitarian aid for Gaza, more than
    three months after 9 people were killed in the Gaza flotilla raid. (Al Jazeera)
  - The United States Army charges 5 US soldiers with murdering 3 Afghan civilians
    earlier this year. (Reuters)
  - 2 car bombs explode in Baghdad, Iraq, killing at least 31 people and injuring
    111. (AFP via Google News) (Xinhua) (CNN) (AP)
  - 3 more people die in protests against the Government of India in the state of
    Jammu and Kashmir. (AP via Google News)
  - At least 40 Tajik soldiers are killed in an attack in the Rasht Valley in eastern
    Tajikistan. (RIA Novosti) (CNN)
  - Islamist al-Shabaab insurgents in Somalia seize control of 2 independent radio
    stations in the capital Mogadishu. (Times Live South Africa) (Xinhua) (BBC) (Sify
    India)
  - 2 Taiwanese tourists are shot while in a bus outside the Jama Masjid mosque in
    Delhi, India. (BBC) (Times of India)
  - 5 people are killed in an armed fight in Otlubayır in eastern Ağrı. (Today's Zaman)
  Arts and culture:
  - The King's Speech is premiered at the 35th Toronto International Film Festival.
    (The Guardian)
  - Original handwritten Harry Potter manuscripts are to be displayed at Scotland's
    Wigtown festival. (BBC)
  Disasters:
  - Rain-triggered floods killed four people and left two others missing Sunday in
    northwest China's Xinjiang Uyghur Autonomous Region's in Atush city. (Global Times
    via Xinhua)
  - Heavy monsoon rains and landslides swept the hilly areas of northern India over
    the weekend, killing at least 47 people. 24 people died in Almorah district in
    Uttrakhand state, 23 people were either swept away in Pitthoragarh, Champawat
    and Uttarkashi regions. (CBS) (AP via KansasCity)
  - Typhoon Fanapi (Inday) hits Taiwan with at least three people killed and dozens
    of people injured. The Peoples Republic of China steps up its emergency response
    in preparation for an impact on Monday. (Bloomberg), (UPI)
  - Hurricane Igor weakens to a Category 1 hurricane as it approaches Bermuda but
    cuts power to half the country. (AP via Google News), (Reuters)
  International relations:
  - China suspends high level diplomatic exchanges with Japan after the latter extended
    the detention of a Chinese fishing captain. (BBC) (Nikkei) (The Guardian)
  - A humanitarian aid convoy for the Viva Palestina charity starts in London, England,
    headed for the Gaza Strip. (Al Jazeera)
  Law and crime:
  - A British man of Somali origin, destined for Uganda, is arrested in Schiphol airport
    in Amsterdam on suspicion of being a terrorist. (BBC)
  - Inderjit Singh Reyat, the only man convicted of the bombings of Air India Flight
    182 and Narita International Airport in 1985, is found guilty of perjury. (CBC)
    (The Hindu) (AFP)
  - At least four people are killed and a police officer seriously wounded in a shooting
    incident at a hospital in Lörrach, Germany. (Deutsche Welle) (BBC) (AFP via Sydney
    Morning Herald)
  - The Metropolitan Police release six men arrested on suspicion of being terrorists
    during Pope Benedict XVI's visit to the United Kingdom without charge. (CNN)
  - Eight Mexican police officers from the state of Guerrero are found dead. (CNN)
  Politics and elections:
  - Supporters of Zimbabwean President Robert Mugabe stone delegates meeting in the
    capital Harare to create a new constitution, injuring five people. (Times Live)
    (NewsDay.zw)
  - Swedish general election
  - Voters in Sweden go to the polls for a general election with the centre-right
    Alliance government led by Prime Minister of Sweden Fredrik Reinfeldt winning
    the most seats but falling short of a majority (EuroNews) (AP via Google News),
    (CNN)
  - The far-right Sweden Democrats wins seats in the Swedish parliament for the first
    time. (BBC)
  - The United Front for Democracy Against Dictatorship, or Red Shirts, hold protests
    on the fourth anniversary of the downfall of Prime Minister of Thailand Thaksin
    Shinawatra. (Bangkok Post) (Bloomberg)
  - Raul Castro, the President of Cuba, sacks Yadira García Vera as Minister for Basic
    Industry for "weak control over resources set aside for investment and production.".
    (AFP via Google News)
  Religion:
  - Pope Benedict XVI beatifies Cardinal John Henry Newman in an outdoor mass in Birmingham,
    England, on the final day of his visit to the UK. (AFP via Yahoo! News), (BBC)
  - Concerns are held about a cult-like group of Salvadoran migrants to the United
    States in Palmdale, California, who have gone missing after leaving a note that
    they were going to meet Jesus. They are later found alive in a park. (CNN) (AP
    via AdelaideNow)
  - Approximately 2,000 Armenians worship at the 10th century Church of the Holy Cross
    on Akdamar Island in Turkey for the first time since 1915. (Al Jazeera)
  Sport:
  - In Gaelic football, Cork defeat Down in the 2010 All-Ireland Senior Football Championship
    Final at Croke Park to win their seventh All-Ireland Senior Football Championship
    and their first since 1990. (RTÉ Sport) (BBC Sport) (The Irish Times)
