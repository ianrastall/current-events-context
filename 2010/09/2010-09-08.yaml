Date: '2010-09-08'
Source_URI: Portal:Current events/2010 September 8
Intelligence_Payload:
  Armed conflicts and incidents:
  - Mexican marines arrest seven gunmen suspected in participating in the massacre
    of 72 Central and South American migrants in San Fernando, Tamaulipas. (AP via
    Fox News)
  Arts and culture:
  - A Charities Aid Foundation survey finds that Australia, New Zealand and Canada
    are the most generous contributors to charity. (Canadian Press via Google News)
  Disasters:
  - Two workers are missing and more than thirty workers are trapped in an oil rig
    in the Shengli oil field off Dongying in China's Shandong province. (AFP via Google
    News)
  - The state of emergency in Christchurch, New Zealand, is extended for another week
    following an aftershock to Saturday's earthquake in Lyttelton. (Sydney Morning
    Herald)
  - Eight people are missing and at least fifty-four houses are destroyed in a wildfire
    burning west of Boulder, Colorado, in the United States. (CNN)
  - The remnants of Tropical Storm Hermine causes widespread flooding in the US states
    of Texas and Oklahoma with at least two people dead. (AP via Yahoo! News)
  International relations:
  - South Korea unveils sanctions against Iran for its nuclear program. (Xinhua via
    Sina)
  - Japan detains a Chinese fishing boat found near the disputed Pinnacle Islands
    in the East China Sea. (Xinhua)
  Law and crime:
  - The New South Wales parliament votes to legalise adoption by same sex couples
    in Australia's most populous state. (AAP via Sydney Morning Herald)
  - Police in Europe shut down 49 servers and detain ten people in a raid across thirteen
    countries in a crackdown on film piracy. (AFP via the Melbourne Age)
  - The United States Court of Appeals for the Ninth Circuit dismisses a lawsuit associated
    with the Central Intelligence Agency's practice of "extraordinary rendition".
    (New York Times)
  Politics and government:
  - The Parliament of Sri Lanka passes the 18th Amendment to the Constitution of Sri
    Lanka which removes the two-term limit on the presidency and allows him to choose
    the judges and commissioners monitoring elections, human rights, and other affairs.
    (BBC) (New York Times) (The Australian)
