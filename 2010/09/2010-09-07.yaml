Date: '2010-09-07'
Source_URI: Portal:Current events/2010 September 7
Intelligence_Payload:
  Armed conflicts and incidents:
  - Israel begins military preparations in order to intercept a 20-ship flotilla due
    to set sail towards the Gaza Strip and break the Israeli blockade. A wide range
    of plans are being considered, including the possibility of stopping the flotilla
    far out at sea due to its sheer size. (Hurriyet)
  - A car bomb attack on a Pakistan police headquarters in the city of Kohat kills
    at least 20 people and injures 50. (AFP via Google News)
  Arts and culture:
  - The shortlist for the Man Booker Prize is released with Peter Carey, Emma Donoghue,
    Andrea Levy, Howard Jacobson and Tom McCarthy in the running. (The Guardian)
  Business and economy:
  - Mozambique announces it will reverse a rise in the price of bread that led to
    riots last week. (BBC) (Al Jazeera)
  - Current Barclays Capital chief Robert Diamond, one of the world's highest paid
    bankers, is to become chief executive of Barclays Bank plc succeeding the present
    incumbent John Varley next year. (BBC)
  Disasters:
  - Some 3,500 people are evacuated in Boulder County, Colorado due to wildfires concerns.
    (AFP via Google News)
  - Japan experiences its record-hottest summer. (Mercury News) (Washington Post)
  - Around 85 fires break out in the U.S. city of Detroit, Michigan, with at least
    20 homes destroyed. Winds of 40 to 50 mph cause 113,000 customers to lose electricity.
    (ABC News America) (WISN)
  Law and crime:
  - Mark David Chapman, John Lennon's killer, is denied parole by the New York State
    Division of Parole in the U.S.. (CNN)
  - A curfew is imposed in parts of Srinagar following clashes. (samaylive)
  Politics and elections:
  - At least 50 people are arrested during pro-democracy protests in Swaziland. (Bloomberg)
    (BBC)
  - United States Army General David Petraeus, the Commander of the International
    Security Assistance Force in Afghanistan, condemns plans by a small Florida church
    to burn copies of the Koran on the anniversary of the September 11 attacks as
    inflammatory. (New York Times)
  - 2010 Australian federal election
  - Independent members of parliament Tony Windsor and Rob Oakeshott agree to support
    a Julia Gillard Australian Labor Party Government ensuring that Labor will be
    able to form a Government. (Sydney Morning Herald)
  - Bob Katter, an independent member of the Australian House of Representatives for
    Division of Kennedy, indicates that he will support the Liberal/National coalition
    in Parliament. (ABC News)
  - Trade unions in India declare a bandh or general strike to protest a hike in fuel
    prices. India is crippled. (samaylive), (NDTV)
  - Public transport workers in France and London go on strike over French and UK
    government austerity measures. The French actions are part of a general strike.
    (AP via ABC News America), (BBC)
  - Richard M. Daley announces that he will not seek reelection as Mayor of Chicago,
    Illinois in 2011. (Chicago Tribune)
