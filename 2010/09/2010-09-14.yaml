Date: '2010-09-14'
Source_URI: Portal:Current events/2010 September 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three Colombian police officers were killed Monday during a suspected guerrilla
    attack near the Venezuelan border. (PLA)
  - Indian police open fire on stone-throwing protesters in Indian-administered Kashmir,
    injuring 10 people. (AFP)
  - One Palestinian gunman is killed and four more are wounded in a Gaza firefight
    after launching RPGs and missiles at Israeli soldiers. (Ynetnews)
  - French police evacuate the Eiffel Tower and the surrounding Champ de Mars park
    in Paris following a bomb threat. (AFP via Google News)
  Business and economy:
  - Kia Motors suspends exports to Iran partly in response to South Korea's sanctions
    against Iran's nuclear program. (AFP via Google)
  - Virgin Blue fights for approval of its transtasman alliance with Air New Zealand.
    (Nzherald)
  - Cisco Systems, the provider of computer networking products and services headquartered
    in San Jose, California, announced that it will break with a long-standing policy
    and issue a stock dividend during the current fiscal year. (Cisco Blogs)
  - A study funded by Pfizer, makers of the smoking cessation drug Varenicline, claims
    it would be financially wise for governments to fund smoking cessation treatments.
    (Reuters)
  Arts and culture:
  - British singer George Michael is given a sentence of eight weeks for driving under
    the influence of cannabis at the Highbury Corner Magistrates Court in London.
    (BBC)
  Disasters:
  - 2010 Atlantic hurricane season
  - Hurricane Julia becomes the fifth hurricane of the 2010 Atlantic hurricane season.
    (Reuters)
  - Mexico and Belize issue warnings about Tropical Storm Karl which is threatening
    the Yucatán Peninsula. (CNN)
  International relations:
  - A third Iranian diplomat defects and applies for asylum in Europe over the disputed
    presidential election last year. (Al Jazeera)
  - China cancels a visit of a senior official to Japan amid a row over the arrest
    of a Chinese skipper near the disputed islands of Senkaku. (BBC)
  - Iran releases United States hiker Sarah Shourd from Evin Prison following payment
    of bail. (CNN) (Al Jazeera)
  - Viviane Reding, a Luxembourg politician and currently the European Commissioner
    for Justice, Fundamental Rights and Citizenship, describes France's deportation
    of Romani migrants as a "disgrace". (Voice of America)
  - A second round of Middle East peace talks between Israel and the Palestinian Authority
    concludes in Sharm el-Sheikh, Egypt. (Jerusalem Post)
  Law and crime:
  - Ukrainian prosecutors say that former Interior Minister Yuriy Kravchenko ordered
    the murder of journalist Georgiy Gongadze in 2000. (UNIAN) (Bloomberg) (BBC)
  Politics:
  - Peruvian President Alan García names José Chang as Prime Minister, replacing Javier
    Velásquez as part of a cabinet reshuffle. (Andina) (BBC)
  - The head of Guinea's electoral commission who was convicted for electoral fraud,
    Ben Sekou Sylla, dies, ahead of a presidential run-off on Sunday. (Reuters) (BBC)
  - France passes a resolution banning full face veils after a 246-1 vote in the Senate.
    The law must still be reviewed by the Constitutional Council before coming into
    effect. (Ynetnews)
  - The Governor-General of Australia swears in Julia Gillard as Prime Minister of
    Australia and her Ministry. (AAP via Sydney Morning Herald) (ABC Online)
  - Naoto Kan is reelected as the leader of the Democratic Party of Japan and therefore
    as Prime Minister of Japan, defeating powerbroker Ichirō Ozawa. (Xinhua) (Reuters)
  - Robert Gates, the United States Secretary of Defense, outlines a $100 billion
    savings plan for his Department. (UPI)
  - Cecilia Romero resigns as the head of the Mexican National Institute of Migration
    in the wake of massacre of 72 migrants at the hands of a drug cartel. (AP via
    San Francisco Chronicle)
  - United States primary elections
  - Christine O'Donnell is elected the Republican Party candidate in the Delaware
    US Senate race. (The Guardian)
  - Representative Charles Rangel wins the Democratic primary election for New York's
    15th congressional district despite facing 13 ethics allegations in the House.
    (CNN)
  Sport:
  - FIFA investigates allegations that a fake Togo national football team played against
    Bahrain last week. (BBC) (AP)
  - Reggie Bush of the New Orleans Saints gives up his Heisman Trophy won while playing
    for the USC Trojans due to receiving improper payments. (ESPN)
