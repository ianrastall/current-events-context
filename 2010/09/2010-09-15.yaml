Date: '2010-09-15'
Source_URI: Portal:Current events/2010 September 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ethiopian forces, supported by Somaliland, kill 123 members of the rebel Ogaden
    National Liberation Front in the east of the country and surround a further 90
    rebels. (BBC)
  - At least 12 people die in Pakistan's North Waziristan province as United States
    drone attacks continue for a second day. (Xinhua)
  - Hamas militants fire two Qassam rockets and mortar rounds into Israel from the
    Gaza Strip. Israeli aircraft then bombed a smuggling tunnel under the Gaza Strip's
    border with Egypt.(Haaretz)
  - The Real Irish Republican Army threatens to resume attacks on Mainland Britain
    including banks. (Al Jazeera)
  - US and Iraqi forces raid a neighbourhood in Fallujah resulting in at least six
    casualties. (AP via Miami Herald)
  Arts and culture:
  - Pieces of an ancient necropolis taken from Egypt in 1999 are discovered in an
    antiques shop in Spain. (BBC)
  - United States cartoonist Molly Norris of Seattle, Washington, who developed Everybody
    Draw Mohammed Day, goes into hiding following a death threat from an Islamist
    radical. (MSNBC)
  Business and economy:
  - A Chinese survey shows that 91 percent of the population oppose raising retirement
    age. The retirement age in China is generally set at 60 for men and 50-55 for
    women. (People Daily) (China Daily)
  - Japan intervenes in the foreign exchange market for the first time in six years
    to reduce the exchange rate for the yen in order to stimulate the Japanese economy.
    (Reuters)
  - News Corporation sells the Fiji Times to Fijian company Motibhai two weeks before
    a deadline set by the government of interim Prime Minister Frank Bainimarama.
    (Radio New Zealand)
  International relations:
  - Malaysia considers suing Israel in the International Court of Justice over the
    blockade of the Gaza Strip. (Haaretz)
  - A Chinese fishing boat returns to Quanzhou after being captured by the Japan Coast
    Guard off the disputed Senkaku Islands. (Xinhua)
  - The United States and Russia establish a working group to improve relations between
    the United States military and Russian military. (RIA Novosti)
  Law and crime:
  - Northern Territory Police call for reinforcements as violence breaks out amongst
    Australian aborigines in the town of Yuendumu following the death of an indigenous
    man. (ABC News Australia)
  Politics:
  - A presidential run-off election in Guinea is postponed due to lack of preparation.
    (Reuters) (BBC)
  - Nigerian President Goodluck Jonathan announces he will contest the presidential
    election in January 2011. (African Press Agency) (AP)
  - An anti-American protest in Kabul, sparked in part by the 2010 Qur'an-burning
    controversy, turns violent with five members of the Afghan National Police being
    injured and two demonstrators being shot. (CNN)
  - North Korea's ruling Workers' Party of Korea cancels its largest political convention
    in thirty years officially due to floods caused by Typhoon Kompasu but sparking
    speculation about the health of Kim Jong-il. (ABC News)
