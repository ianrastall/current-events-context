Date: '2010-09-11'
Source_URI: Portal:Current events/2010 September 11
Intelligence_Payload:
  Armed conflicts and incidents:
  - A man is arrested after a minor explosion at a hotel in Copenhagen, amid heightened
    security fears in Denmark. (BBC) (Deutsche Welle) (Reuters)
  - U.S. Army Staff Sergeant Salvatore Giunta is awarded the Medal of Honor for his
    actions during the ongoing War in Afghanistan, the first living recipient to be
    so honored since the Vietnam War. (The Guardian)
  Arts and culture:
  - U.S. film director Sofia Coppola wins the Golden Lion at the 67th Venice International
    Film Festival for her film Somewhere. (BBC)
  - US actor Kevin McCarthy best known for his roles in Invasion of the Body Snatchers
    and Death of a Salesman dies. (Playbill)
  Eid al-Fitr:
  - Muslims around the world celebrate the feast of Eid al-Fitr marking the end of
    the holy month of Ramadan. (AP via Google News)
  - Tens of thousands of people protest against Indian rule in Kashmir during a rare
    Eid al-Fitr event. (BBC)
  Business and economy:
  - Air Zimbabwe fires pilots on strike for better pay. (BBC)
  - Mining in 3 eastern Democratic Republic of the Congo provinces is suspended by
    President Joseph Kabila to allow for a clean-up of operations. (Al Jazeera) (BBC)
  Greek protests against austerity:
  - Police tear gas people in Thessaloniki as tens of thousands of people protest
    against Prime Minister George Papandreou's austerity plans. (BBC) (The Guardian)
    (Al Jazeera)
  - A doctor throws a shoe at the prime minister and is promptly arrested and locked
    up with two bystanders. They are later released unharmed. (The Times of India)
    (CNN)
  Disasters:
  - At least 10 people are killed and 20 others are injured during a gas explosion
    near Mashhad, Khorasan Razavi. A fire burns for 3 hours. (Al Jazeera) (Xinhua)
    (Press TV) (Tehran Times)
  - Officials in 3 Egyptian governorates declare a state of emergency after a barge
    leaked some 100 tons of gasoline into the Nile River north of Aswan. (AP)
  - Mexico experiences its record worst ever rainy season. (The China Post) (The Age)
  - A moderate earthquake strikes Indonesia's North Maluku province. (ABC Online)
  - The death toll rises to 6 from the pipeline explosion in San Bruno, California
    near the U.S. city of San Francisco. (AP via Silicon Valley Mercury News)
  - Four people are dead and twenty-five people are hospitalised after a Coach USA
    Megabus crashes into a railroad overpass in Salina, New York. (CNN)
  - More than 300 flights from Shanghai, China are delayed due to torrential rain
    caused by Tropical Storm Meranti. (Xinhua)
  - Hurricane Igor reaches Category 1 in the Atlantic Ocean. (UPI)
  International relations:
  - France condemns as "unacceptable" remarks made by former Cuban leader Fidel Castro
    expressing sympathy with the Romani migrants it is trying to rid itself of. (BBC)
    (AFP via France24)
  - North Korea proposes the resumption of family reunions with South Korea. (BBC)
    (Yonhap)
  - Jordan signs a nuclear co-operation treaty with Japan to build a nuclear power
    plant within 10 years. (Press TV)
  Law and crime:
  - Sex abuse campaigners meet at a conference in Islington, North London, to call
    for "action not words" from Pope Benedict XVI ahead of his visit to the UK. (BBC)
  - 9 Serb paramilitaries are indicted over the deaths of 43 ethnic Albanians in May
    1999. (Al Jazeera)
  - At least 8 police officers are killed and several others are wounded in San Miguel,
    Putumayo, Colombia, near its border with Ecuador. 2 of the perpetrators are then
    killed in the jungle. (BBC)
  - Police in Somalia say they have foiled an attack by Islamist militants against
    the seaport in the capital Mogadishu. (Reuters) (Sify)
  Politics:
  - Prime Minister of Australia Julia Gillard announces her new Cabinet, with former
    PM Kevin Rudd named as the Minister for Foreign Affairs. (ABC Online)
  - The United States commemorates the anniversary of the September 11 attacks with
    events in New York City, the Pentagon Memorial in Washington D.C. and in Shanksville,
    Pennsylvania, near where United Airlines Flight 93 crashed. (AFP via ABC News)
  2010 Qur'an-burning controversy:
  - Thousands of Afghans protest in Badakhshan province over U.S. plans to hold an
    "International Burn-a-Koran Day", despite its cancellation. (Reuters)
  - Hundreds of Americans engage in heated competing demonstrations in New York City,
    blocking streets and being overseen by mounted police and dog units. (BBC)
  - Pastor Terry Jones of the Dove World Outreach Center in America says the group
    will not burn the Koran "not now, not ever". (BBC)
  Sport:
  - The 3 Pakistan national cricket team members alleged to have spot fixed by the
    UK's News of the World tabloid arrive back in Pakistan; they deny any involvement.
    (DAWN) (BBC Sport) (Reuters via Gulf News)
  - Kim Clijsters of Belgium wins her second successive US Open championship, defeating
    Russia's Vera Zvonareva 6-2 6-1. (CNN)
