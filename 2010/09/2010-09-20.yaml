Date: '2010-09-20'
Source_URI: Portal:Current events/2010 September 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - A U.S. missile strike kills six alleged militants in northwestern Pakistan in
    Shawa near Mir Ali in the North Waziristan tribal area. (AP)
  - MPs meet Syed Ali Shah Geelani in Kashmir in a bid to resolve the crisis, the
    first visit there by an all-party Indian team in two decades. (BBC)
  - France sends dozens of soldiers equipped with Breguet Atlantique and Mirage aircraft
    to Niamey, Niger, in its search for 7 kidnapped hostages. (BBC)
  - GBC, the Somali radio station seized yesterday, is to now broadcast only Islamic
    messages. (BBC)
  - Colombia claims it has killed a senior Farc rebel leader and 25 others. (BBC)
    (Colombia Reports)
  Arts and culture:
  - The director of Glastonbury Abbey issues an apology after giving Hollywood actor
    Nicolas Cage access to the grave of King Arthur during a live TV broadcast. (The
    Guardian)
  - More than 600 antiquities lost in mysterious circumstances due to "inappropriate
    handover procedures" after being repatriated by the United States in 2009 are
    found and returned to the National Museum of Iraq. (BBC)
  - Jailed U.S. entertainer Lindsay Lohan has her probation revoked by Judge Elden
    Fox following a failed drug test. (CNN)
  Disasters and accidents:
  - 110 people are wounded as a stadium collapses during a car race in Paraná, Brazil.
    (BBC)
  - At least 21 people are killed and dozens are injured after two trains collide
    in the Shivpuri district of India's Madhya Pradesh state. (The Hindu) (AFP via
    Yahoo! News) (Xinhua)
  - Typhoon Fanapi arrives in China's Fujian province after causing widespread damage
    in Taiwan. (Hindustan Times)
  - A Russian Air Force Sukhoi Su-27 aircraft crashes in the Russian Far East; both
    pilots are rescued alive. (RIA Novosti)
  - Admiral Thad Allen of the United States Coast Guard, the man responsible for leading
    the cleanup of the Deepwater Horizon oil spill, declares that BP's Macondo well
    is sealed. (Wall Street Journal via The Australian)
  International relations:
  - The 54th International Atomic Energy Agency (IAEA) General Conference opens in
    Vienna with attendance by 151 countries. (Xinhua)
  - The United States and Australia issue travel warnings for India following the
    shooting of two Taiwanese tourists outside the Jama Masjid mosque in Delhi. (Reuters)
  - World leaders arrive in New York City for a United Nations summit to discuss progress
    in implementing Millennium Development Goals. (CNN)
  - A Syrian ship transporting food and medical aid to the Gaza Strip docks in El-Arish.
    (Haaretz)
  - The father of one of those killed in the 1988 Pan Am Flight 103 bombing travels
    to Libya to meet Abdelbaset al-Megrahi; he considers Megrahi to be innocent and
    calls for an inquiry. (BBC)
  Politics and elections:
  - Results in the Swedish general election show the centre-right Alliance government
    led by Prime Minister Fredrik Reinfeldt winning a plurality, with the Sweden Democrats
    holding the balance of power. (Reuters Canada)
  - Irish Taoiseach Brian Cowen comes under pressure to resign from former ministers
    and backbenchers in his own party after last week's controversial live radio interview
    with Cathal Mac Coille on Morning Ireland. (The Guardian) (BBC)
  - Israel allows the delivery of twenty new cars to Gaza after a three-year wait.
    (AFP via Google News) (BBC) (JTA)
  - The German government meets to discuss Google's Street View mapping service. (BBC)
  - A date is set for a North Korea Workers Party conference. (BBC)
  - The death of a Fijian detainee at the Villawood Detention Centre in Sydney, Australia,
    sparks a rooftop protest by Tamil detainees. (The Herald-Sun)
  Science:
  - Jupiter becomes the brightest object in the night sky after the Moon as it makes
    its closest approach to Earth since 1963. (UPI)
  Sport:
  - Kenny McKinley, a wide receiver for the Denver Broncos in the US National Football
    League, is found dead. (USA Today)
  Television:
  - CBS Premiere of Hawaii Five-0
  - CBS Season Premiere of How I Met Your Mother
