Date: '2010-09-13'
Source_URI: Portal:Current events/2010 September 13
Intelligence_Payload:
  Armed conflicts and incidents:
  - At least 18 people are dead after protests in Jammu and Kashmir following reported
    burning of a Koran in the United States. (BBC) (IBN Live) (Times of India), (Voice
    of America)
  - Peter Hain reveals Nelson Mandela was "breathing fire" down a phone about Tony
    Blair's role in invading Iraq. (BBC News)
  - A civilian is killed and six people injured in fighting in Iraq's Diyala Governorate.
    (Xinhua)
  Business and economy:
  - Cuba announces plans to cut up to half a million public sector jobs to revive
    the island's economy, in the biggest private sector shift since the 1959 revolution.
    (BBC),(Al Jazeera), (CNN)
  - The Basel Committee on Banking Supervision based in Basel, Switzerland, increases
    capital requirements for banks around the world to be introduced on 1 January
    2015. (The Australian)
  - Harley-Davidson workers in Menomonee Falls, Wisconsin approve a new contract freezing
    pay and cutting jobs following a threat to move production from the state cutting
    1,350 jobs. (AP via Google News)
  - A study of Food and Drug Administration and U.S. Department of Agriculture employees
    shows that the food industry has been successfully withholding information from
    inspectors and pressuring the government agencies to withdraw or alter policies
    which promote food safety. (Reuters)
  Disasters:
  - At least 17 people die after a Conviasa ATR 42 crashes near Ciudad Guayana in
    Venezuela's Bolívar State. (Xinhua) (Sina) (Voice of America)
  - Monsoon flooding on the Yamuna River threatens the Taj Mahal in Agra, India after
    more than of water had to be released from a barrage in Haryana, while hundreds
    of nearby villages flooded and flooding continues in Uttar Pradesh and Punjab.
    (MSN India) (The Weather Network)
  International relations:
  - Russian diplomat Yuri Fedotov takes office as the head of the United Nations Office
    on Drugs and Crime. (AP)
  Politics:
  - The ruling National Resistance Movement in Uganda endorses incumbent President
    Yoweri Museveni to run for a fourth term in presidential elections in early 2011.
    (AFP) (Xinhua)
  - A rare congress of the Korean Workers' Party in North Korea is postponed amid
    speculation about the health of Kim Jong-il. (Radio Television Hong Kong) (Voice
    of Russia) (Arirang)
  - André-Joseph Léonard, the Archbishopric of Mechelen-Brussels and head of Belgium's
    Roman Catholic Church, announces how the church will deal with widespread cases
    of sexual abuse within its ranks. (BBC), (AFP via Yahoo! News)
  - US defense officials claim they are preparing to notify Congress of plans to sell
    $60 billion of military equipment to Saudi Arabia. (CNN) (Reuters)
  Sport:
  - Rafael Nadal of Spain wins the Men's Singles at the 2010 US Open defeating Novak
    Djokovic of Serbia 6-4 5-7 6-4 6-2 becoming the seventh man in history to win
    all four Grand Slam titles, and the youngest man to ever achieve the Career Golden
    Slam. (BBC)
