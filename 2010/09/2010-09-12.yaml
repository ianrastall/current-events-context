Date: '2010-09-12'
Source_URI: Portal:Current events/2010 September 12
Intelligence_Payload:
  Armed conflicts and incidents:
  - At least 3 people are killed by a United States missile attack on a home where
    associates of Tehrik-i-Taliban Pakistan chief Hafiz Gul Bahadur were believed
    to be staying in northwest Pakistan. (AP via Fox News)
  - Israeli soldiers identify a group of armed men approaching Israel from Gaza near
    Kibbutz Erez, killing three; Palestinian sources claim that two were farmers.
    (The Jerusalem Post) (BBC) (Reuters)
  - Danish police state that there is no evidence that a small explosives blast in
    a Copenhagen hotel ties into a larger terror plot. (Al Jazeera)
  - A curfew is imposed on Srinagar and other large towns in Kashmir after police
    clashes with people protesting against Indian rule yesterday. (BBC)
  - At least 24 people are injured in clashes between supporters of rival political
    parties in several parts of Conakry ahead of a presidential run-off election in
    Guinea. (Al Jazeera) (BBC) (The Daily Telegraph) (Japan Today)
  Arts and culture:
  - French film director Claude Chabrol, a founding member of the French New Wave,
    dies. (The Guardian) (France 24) (The New York Times) (The Daily Telegraph) (Press
    TV)
  - Lady Gaga wins eight MTV Video Music Awards at the 2010 ceremony including Video
    of the Year for "Bad Romance". (MTV)
  Disasters:
  - The 33 miners involved in the 2010 Copiapó mining accident are permitted to smoke
    cigarettes after one month of underground entrapment. (BBC) (AFP via The Sydney
    Morning Herald)
  - 95 farm workers are rescued from difficult living conditions in two south-eastern
    states (Minas Gerais and Rio de Janeiro (state)) of Brazil. (BBC)
  2010 San Bruno pipeline explosion:
  - The death toll rises to 7 from a pipeline explosion in San Bruno, California,
    near the U.S. city of San Francisco. (Bay City News via San Francisco Chronicle)
  - The California Public Utilities Commission orders Pacific Gas and Electric to
    perform a survey of all natural gas lines in California following the explosion.
    (AP via The Houston Chronicle)
  2010 Atlantic hurricane season:
  - Hurricane Igor strengthens to Category 4 in the Atlantic Ocean. (AFP via Google
    News)
  - Tropical Storm Julia forms in the Atlantic with a tropical storm warning issued
    for parts of the Cape Verde Islands. (AP via Houston Chronicle)
  International relations:
  - Prime Minister of Israel Benjamin Netanyahu states that 10-month restrictions
    on the building of Israeli settlements in the West Bank will no longer apply after
    they expire later this month. (Al Jazeera)
  - The Economic Cooperation Framework Agreement (ECFA), an important trade pact,
    comes into force between China and Taiwan. Hundreds of thousands of people protested
    against it in Taiwan but it was unanimously approved by the island's parliament.
    (BBC)
  - 2 French judges and 17 other legal experts land in Rwanda ahead of a week-long
    inquiry into the killing of President Juvénal Habyarimana, whose plane with French
    crew on board was shot down in 1994. (BBC)
  - '2009 detention of American hikers by Iran: Iran announces its willingness to
    release Sarah Shourd, a U.S. hiker arrested in 2009, on bail and says that she
    will be permitted to leave the country. (BBC) (The Guardian) (AP via The Independent)
    (Al Jazeera)'
  - Mexican marines capture alleged Beltrán Leyva Cartel leader Sergio Villarreal
    Barragán in the state of Puebla. (The Guardian)
  Law and crime:
  - President of Russia Dmitry Medvedev approves a plan to overhaul Russia's police
    system. (IANS via Sulekha)
  - Malaysia's police force is debated following the fatal shooting of a 15-year-old
    boy. (Al Jazeera)
  - Australia sends an official to the Indonesian province of Maluku to investigate
    claims that Detachment 88, part of the Indonesian National Police, tortured a
    group of separatists. (AAP via Sydney Morning Herald)
  - Airplane cleaners in the Philippines locate a newborn male baby human which had
    been discarded in a toilet bin. (AFP via The Sydney Morning Herald)
  Politics and elections:
  - Néstor Kirchner, former President of Argentina and current Secretary-General of
    the Union of South American Nations (UNASUR), has surgery on a blocked coronary
    artery. (BBC)
  - Taxpayer March on Washington (also known as the 9/12 Tea Party) takes place in
    Washington, D. C. According to various estimates ranging from 60,000 to more than
    1 million people march from Freedom Plaza to the United States Capitol. The event
    coincided with other similar protests organized in various cities across the nation.The
    protesters rallied against what they consider big government, the dismantling
    of free market capitalism, abortion, and President Barack Obama's proposals on
    health care reform, taxation, and federal spending, among other issues. (BBC)
    (Los Angeles Times)
  Turkish constitutional referendum, 2010:
  - Voters in Turkey go to the polls for a referendum to amend the constitution. (BBC)
    (Al Jazeera) (Xinhua)
  - The constitutional changes are reported to have been "approved" by the people.
    (BBC)
  Sport:
  - Albanians jeer Serbs following a Serbian defeat in an international basketball
    game leading to clashes in Mitrovica. (BBC News) (Al Jazeera)
  - In basketball, the United States defeats Turkey 81-64 in the 2010 FIBA World Championship
    Final to win the 2010 FIBA World Championship. (Toronto Sun)
  - The men's singles final and women's doubles finals for the 2010 US Open tennis
    final are postponed until Monday due to rain. (Xinhua)
