Date: '2010-09-27'
Source_URI: Portal:Current events/2010 September 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suspected U.S. drone fired missiles at a house in northwestern Pakistan in Khushali,
    a village near Mir Ali, killing four people. (Jakarta Post)
  - Rwanda withdraws a threat to remove its peacekeepers from Darfur after a United
    Nations report accused the Rwandan army of genocide in the Democratic Republic
    of the Congo. (AFP) (BBC) (The East African)
  - Around 70 insurgents are killed when two NATO helicopters strike inside Pakistan
    in its northwest Khost tribal area bordering Afghanistan. Pakistan strongly condemned
    the attack, calling it a violation of its airspace. (Yahoo! News) (Xinhua) (Reuters)
    (BBC)
  - President of Colombia Juan Manuel Santos describes the killing of Mono Jojoy as
    the "beginning of the end" for the Farc organization. (BBC) (AFP via The Sydney
    Morning Herald)
  - Three Palestinians said to be members of the Islamic Jihad group are killed in
    an Israeli air strike on the southern part of the Gaza Strip. (Al Jazeera)
  Afghanistan:
  - Three former Australian soldiers are charged with offences including manslaughter
    following an action in the Afghanistan War in which six civilians died. (Courier
    Mail)
  - The Taliban claim that they are holding a British foreign aid worker and offer
    to exchange her for Aafia Siddiqui, a Pakistan scientist recently jailed in the
    United States. (The Telegraph)
  Arts and culture:
  - Gloria Stuart, the oldest-ever nominee for an Academy Award, specifically the
    Academy Award for Best Supporting Actress for her role as the elder Rose in the
    1997 film Titanic, dies in Los Angeles, aged 100. (Variety)
  Business and Economy:
  - Unilever plc, an Anglo-Dutch consumer products giant, has entered into an agreement
    to buy Alberto-Culver, a manufacturer of hair and skin care products, for $3.7
    billion. (TheStreet)
  Disasters and accidents:
  - At least thirteen people die in the Gulf of Aden after a small boat capsizes with
    a rescue effort by the USS Winston S. Churchill saving another 61 passengers.
    (News Limited)
  - A 6.1 magnitude earthquake southwest of the Iranian city of Shiraz kills at least
    one person and injures three. (Reuters)
  - A landslide in the town of Giraldo in Colombia's Antioquia Department buries 30
    people with authorities believing there is little chance of them being rescued.
    (AFP via Google News)
  International relations:
  - The US state department expresses disappointment at Israel's decision not to extend
    its ban on settlement building in the West Bank. (BBC)
  - Japan's Chief Cabinet Secretary Yoshito Sengoku calls for the People's Republic
    of China to compensate for Japanese patrol boats damaged in a confrontation with
    a Chinese fishing boat in the East China Sea. (AP via Houston Chronicle) (Al Jazeera)
  Law and crime:
  - 95 people, including two former mayors and planning chief of Marbella, appear
    in court in Malaga in one of Spain's biggest corruption trials. (The Telegraph)
    (BBC)
  - Chinese police investigate claims that a security firm colluded with officials
    to detain protesters in secret prisons. (BBC) (China Economic Observer) (AP)
  - The trial of former Bosnian Serb leader Radovan Karadžić resumes at the International
    Criminal Tribunal for the former Yugoslavia in The Hague, Netherlands. (CNN)
  - Brandon Joseph Rhode is executed at a prison in Jackson, Georgia in the southern
    United States. (AJC)
  Politics and elections:
  - North Korea
  - Delegates arrive in the North Korean capital Pyongyang ahead of the largest Korean
    Workers' Party conference in decades. (Al Jazeera)
  - Kim Jong-un, the youngest son of North Korean leader Kim Jong-il is named as a
    General, the clearest sign that he will be named the successor to his father.
    (The Guardian)
  - The President of Venezuela Hugo Chávez's United Socialist Party of Venezuela wins
    a majority of seats in the parliamentary election held yesterday but lost a two-thirds
    majority needed to pass major legislation unaided. (BBC) (Al Jazeera)
  - President of the United States Barack Obama signs a small business lending bill
    into law. (Reuters)
  Sports:
  - The Philadelphia Phillies wins the National League East in Major League Baseball.
    (New York Times)
  Weather:
  - Los Angeles experiences all-time record high temperature day at 45°C or 113F.
    (Los Angeles Times)(USA Today)
