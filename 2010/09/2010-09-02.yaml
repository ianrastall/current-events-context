Date: '2010-09-02'
Source_URI: Portal:Current events/2010 September 2
Intelligence_Payload:
  Armed conflicts and incidents:
  - 10 civilians are killed and 2 others are wounded after being struck by NATO during
    an election campaign in Rostaq, Afghanistan. Originally, a spokesman had said
    a "precision air strike" had hit a militant vehicle. (BBC) (Reuters)
  - Palestinians stone an Israeli car travelling through the West Bank resulting in
    a 12-year-old being injured. (YNet News)
  - The Mexican Army claims to have killed 25 drug cartel gunmen in a clash in Tamaulipas
    state near the United States border. (BBC)
  Disasters:
  - Permanent Representative of Pakistan to the United Nations Hussain Haroon calls
    for an inquiry after allegations emerge of Pakistani floodwaters being diverted
    into vulnerable villages in a bid to preserve crops. (BBC)
  - 2010 Pacific typhoon season
  - Severe Tropical Storm Lionrock lands in China's Fujian province with warnings
    of strong winds and torrential rains. (Straits Times)
  - Typhoon Kompasu (Glenda) hits South Korea resulting in three deaths and leading
    to cancellation of flights and school classes. (Straits Times) (AP via Sign On
    San Diego)
  - Hurricane Earl
  - A tropical storm warning is issued for the coast of Long Island in New York as
    Hurricane Earl approaches the east coast of the United States. (AP via Washington
    Post) (Reuters)
  - A state of emergency is declared in the states of North Carolina and Virginia.
    (Bloomberg)
  - An oil rig explodes in the Gulf of Mexico, west of the Deepwater Horizon oil rig
    that exploded in April, killing no people. (AP)
  International relations:
  - Lebanon requests an Interpol arrest warrant for Ghassan al-Jidd, a former General
    in the Lebanese Army who allegedly spied for the Mossad. (Jerusalem Post)
  Law and crime:
  - At least 17 migrants are kidnapped by suspected human traffickers in Tijuana,
    Baja California, in northwestern Mexico. (Al Jazeera) (RFI)
  - Price riots continue in Mozambique, leaving a further four people dead. (AP) (Reuters
    Africa)
  - Police in Brazil arrest almost the entire council in the city of Dourados, Mato
    Grosso do Sul, on suspicion of fraud and corruption, leaving the city without
    a government. (BBC) (Latin American Herald Tribune)
  - Figures show that at least 2,000 British police officers had 3 or more complaints
    made against them in 2009-10. (BBC)
  Politics and elections:
  - Independent Member of the Australian House of Representatives Andrew Wilkie announces
    that he will support the Gillard Labor Government on supply and confidence. (SBS)
  - BP warns the United States Congress that it might not be able to pay compensation
    for the Deepwater Horizon oil spill if it is barred from getting new offshore
    drilling permits. (New York Times)
  - Sebastian Vlădescu is replaced as Romanian Minister of Finance by Gheorghe Ialomitianu
    as part of a Cabinet reshuffle. (AFP via Google News)
  Sport:
  - Pakistani cricket team in England in 2010
  - Pakistan's high commissioner Wajid Shamsul Hasan says 3 of his country's cricketers
    connected to allegations of betting corruption by the News of the World tabloid
    could have been set up. (BBC Sport) (Sky News)
  - The International Cricket Council charges Pakistan captain Salman Butt and fast
    bowlers Mohammad Aamer and Mohammad Asif with corruption offences and provisionally
    suspends them from international cricket pending hearings. (AFP via ABC Online)
