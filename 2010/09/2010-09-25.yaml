Date: '2010-09-25'
Source_URI: Portal:Current events/2010 September 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gun battle between security forces and Taliban fighters leave four militants including
    their commander dead in Wardak province 40 km west of Afghanistan capital Kabul.
    (Xinhua)
  - Two Russian police and seven militants are killed in firefights in the southern
    republic of Dagestan while thirty people are injured in a suicide bombing. (RIA
    Novosti via RT)
  - The Israeli Navy kills a Palestinian fisherman off Gaza. (Sky News)
  - One of three Palestinians wounded by Israeli tank fire on 14 September dies in
    the Gaza Strip. (AFP via Google News)
  - Those sexually abused as children by Catholic priests in Italy gather in public
    for the first time in Verona to campaign for the act to be made a crime against
    humanity and to organise an international demonstration outside the Vatican next
    month. (BBC) (Al Jazeera) (AP via The Age) (The Irish Times) (The Jakarta Post)
  Arts and culture:
  - 1986 Nobel Laureate for Literature Wole Soyinka, the first African to receive
    the award, launches a political party ahead of Nigeria's upcoming presidential
    election. (BBC) (Daily Nation)
  Disasters:
  - The United Nations estimates on a preliminary basis that at least 2,000 tents
    were damaged or destroyed in the storm that struck Haiti's capital Port-au-Prince.
    (Al Jazeera)
  - At least two people are killed and seventeen injured in a domestic gas explosion
    in the Schaerbeek area of Brussels, Belgium. (RIA Novosti)
  International relations:
  - Mahmoud Abbas addresses the United Nations General Assembly, where he states that
    Palestinians desire "a comprehensive and just" peace agreement and requests that
    Israel cease its policy of building settlements in the West Bank. (Xinhua) (Al
    Jazeera) (BBC)
  - The People's Republic of China demands an apology from Japan after a recently
    detained fishing boat captain returns. Japan's Foreign Ministry rejects the call.
    (Reuters) (AP via SignOnSanDiego)
  Law and crime:
  - A U.S. federal court judge denies convicted murderer and rapist Albert Green's
    request for a stay of execution, clearing the way for California's first execution
    in five years. (San Francisco Chronicle)
  - Pakistan International Airlines Flight 782 departing from Toronto, Canada, for
    Karachi, Pakistan, carrying 273 passengers lands at Arlanda Airport in Stockholm,
    Sweden, due to a bomb threat. A man is taken into custody by the Swedish National
    Task Force and then released. (AP via Yahoo! News) (CNN)(Sky News) (Big Pond News)
  Politics:
  - The U.S. government urges a judge to dismiss a lawsuit which challenges an American
    targeted killing program which is currently hunting an American citizen who has
    no charges brought against him. (Reuters)
  - Campaigning begins in Myanmar ahead of November elections. (AP via The Jakarta
    Post)
  - In the United Kingdom, the Labour Party elects Ed Miliband over his older brother
    David in the tightest leadership election in history, with Ed coming out on top
    in only the 4th round of voting. (BBC) (The Guardian) (Al Jazeera)
  Science:
  - The Soyuz TMA-18 capsule carrying three members of the International Space Station
    lands safely in Kazakhstan. (Xinhua)
  - The Uganda Wildlife Authority (UWA) states that the population of some animals
    in the country's national parks and game reserves has doubled since 1999. (BBC)
    (AFP via France24) (News24)
  Sport:
  - The Australian Football League Grand Final between Collingwood and St Kilda ends
    in a draw, resulting in a rematch to be played next weekend. (ABC Online) (Herald-Sun)
  - Michael Fennell, the President of the Commonwealth Games Federation, says that
    the Games will go ahead but that there "was extensive work to be done" for the
    2010 Commonwealth Games in Delhi, India, ahead of its opening on 3 October. (Reuters)
    (Al Jazeera)
  - The Texas Rangers clinch the American League West division in Major League Baseball.
    (Silicon Valley Mercury News)
