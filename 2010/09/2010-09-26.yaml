Date: '2010-09-26'
Source_URI: Portal:Current events/2010 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2010 Philippine Bar exam bombing
  - At least 24 people are injured after a grenade is thrown at the De La Salle University
    in Manila, where bar examinations were being held. (ABS-CBN News)
  - A clash between ethnic Bugis and Tidung (Tarakan indigenous people) claimed one
    life in Juwata sub-district, Tarakan, East Kalimantan. (Jakarta Post)
  - 6 civilians are wounded in an explosion apparently targeting the Shiite politician
    Mowaffak al-Rubaie near a fuel station in Sa'doun Street, Baghdad. (Xinhua)
  - Intelligence services report 7 as the death toll resulting from 2 U.S. drone aircraft
    missile strikes in North Waziristan. (BBC)
  - The Stuxnet computer worm fails to harm the operating system of Bushehr Nuclear
    Power Plant in Bushehr after infecting the personal computers of staff. (BBC)
    (AFP via France24)
  - The American bishop Eddie Long, who has opposed same-sex marriage, vows to tackle
    allegations of luring young men into sexual intercourse. (BBC)
  - The Spanish government is reported to have rejected an ETA statement calling for
    a permanent ceasefire between the two sides. (BBC) (AFP via The Sydney Morning
    Herald) (Al Jazeera)
  - The Army of the Guardians of the Islamic Revolution cross the border into Iraq
    and kill 30 Kurds. (BBC)
  - 2 NATO service members are killed in a bomb blast in southern Afghanistan. (AP)
  - Yemen issues a list of eight alleged Al Qaeda operatives wanted for possible involvement
    in an attack on a Yemen police bus on Saturday in Sana'a. (Xinhua via Global Times)
  Arts and culture:
  - America's Department of Defense (The Pentagon) admits purchasing nearly 10,000
    copies of a memoir by U.S. Army Reserve officer Anthony Shaffer, destroying all
    of them in an effort to suppress secret information and ordering heavy redactions
    of the book's second printing. (The Daily Telegraph) (Toronto Sun) (CNN)
  - Georgia replaces the Russian language with the English language as its second
    language. (Al Jazeera)
  - The Peter Mullan film Neds wins two major honours at the San Sebastián International
    Film Festival. (BBC)
  Business and economy:
  - Australian climate change activists close down the world's largest coal port in
    Newcastle, New South Wales. (Reuters via Yahoo! News)
  Disasters:
  - The People's Republic of China reports an outbreak of the plague in Tibet, with
    5 people infected and 1 fatality. (AFP via Sydney Morning Herald)
  - A specially built cage is delivered to the scene of the 2010 Copiapó mining accident.
    (Al Jazeera) (BBC) (AP via The Guardian)
  - Towns in the U.S. state of Wisconsin evacuate residents due to flooding of the
    Wisconsin River. (CNN)
  Brandenburg bus crash:
  - A tourist bus from Poland hits a bridge pillar on a highway at Schoenefelder Kreuz
    in Brandenburg, killing at least 12 people and injuring 40. (The Daily Telegraph)
    (Xinhua)
  - Prime Minister of Poland Donald Tusk visits the crash site and meets survivors.
    (Deutsche Welle)
  International relations:
  - Philip Alston, the international law scholar who recently stepped down as the
    United Nations's senior official on extrajudicial killings, calls for the UN to
    investigate war crimes in Afghanistan and to convict those responsible. (The Observer)
  - The Israeli settlement freeze ends at 22.00 (GMT), should Israel restart construction
    of buildings on the West Bank the peace talks with Palestinian leader Mahmoud
    Abbas are expected to end. (BBC) (CNN)
  Irene:
  - The boat Irene, carrying a group of Jewish activists from Germany, Israel, the
    U.S. and UK, sets sail from northern Cyprus aiming to breach Israel's blockade
    of the Gaza Strip. (Al-Bawaba) (BBC) (CNN) (euronews)
  - Israel calls the ship a "provocation". (Deutsche Welle)
  UNHRC report into the Gaza flotilla raid:
  - The 57-member United Nations Human Rights Council is to investigate the facts
    found by a report into the Gaza flotilla raid carried out by Israel earlier this
    year. (The Jordan Times)
  - Israeli officials and groups such as the American Jewish Committee "slam" the
    United Nations Human Rights Council report. (JTA)
  Politics and elections:
  - Video footage emerges casting doubt on the integrity of the recent Afghan parliamentary
    election and showing fake votes being filled in as fraud police watch on. (Al
    Jazeera)
  - Pakistan's minister for defence production Abdul Qayum Jatoi resigns after criticising
    the military for allegedly carrying out political assassinations. (BBC)
  - Voters in Venezuela go to the polls for a parliamentary election. (Al Jazeera)
    (BBC)
  - Ed Miliband declares the death of Tony Blair's centrist New Labour in his first
    interview since being elected leader of the British Labour Party yesterday. (The
    Daily Telegraph)
  Sport:
  - Fernando Alonso wins the 2010 Singapore Grand Prix. (The Guardian)
  - The corpse of 31-year-old former Great Britain rugby league hooker Terry Newton
    is located hanging dead at a house in England. (The Guardian) (BBC News) (The
    Independent) (The Daily Telegraph)
  2010 Commonwealth Games:
  - Thousands of slum dwellers are handed eviction notices in the Indian capital Delhi,
    a week before the 2010 Commonwealth Games is due to open. (TV New Zealand)
  - Akhil Kumar escapes injury after his bed collapses beneath him. (The Indian Express)
    (The Deccan Chronicle)
