Date: '2010-09-21'
Source_URI: Portal:Current events/2010 September 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eight people have been confirmed dead in the southern state of Northern Bahr el
    Ghazal, Sudan. (Sudan Tribune) (africannewslive)
  - At least 15,000 people flee their homes in Yemen after a government offensive
    against rebels in the south in the country. (BBC)
  - War in Afghanistan (2001–2021)
  - Nine International Security Assistance Force soldiers are killed in a NATO helicopter
    crash in southern Afghanistan. (AFP via National Post) (China Daily) (CNN)
  - NATO fatalities rise to 529 making 2010 the most deadly year of the war since
    2001. (New York Times)
  - Al-Qaeda in the Islamic Maghreb claims responsibility for kidnapping five French
    workers in Niger. (Reuters)
  Business and economy:
  - Lawrence Summers announces that he will leave as head of the United States National
    Economic Council, responsible for advising President Barack Obama on economic
    policy. (New York Times)
  - In the Mark Cuban insider trading case, an appeals court overturns a district
    court decision last fall that had dismissed the civil charges brought against
    Cuban by the U.S. Securities and Exchange Commission. (MarketWatch).
  Disasters:
  - 2010 Atlantic hurricane season
  - Tropical Storm Lisa forms in the Atlantic Ocean off the Cape Verde Islands. (AP
    via Canadian Business)
  - Hurricane Igor heads for Newfoundland. (News 13)
  International relations:
  - China rules out a meeting with Japanese Prime Minister Naoto Kan at the United
    Nations to resolve an ongoing diplomatic row, saying the timing is "not proper".
    (Reuters) (AFP) (Radio Television Hong Kong)
  Law and crimes:
  - Italian authorities seize 23 million euro (approximately US$30 million) from a
    Vatican bank account in a money laundering probe. (AP)
  - U.S. entertainers Paris Hilton and Nicky Hilton are stopped by immigrations at
    a Japanese airport and forbidden to enter the country due to Paris's drug conviction
    the day prior. (Fox News)
  Politics and elections:
  - A gay rights protest against the views of Moscow Mayor Yury Luzhkov is broken
    up with eight people arrested. (BBC) (Sify India) (AP)
  - President of Paraguay Fernando Lugo sacks heads of the country's army, navy and
    air force plus five more senior officers in a decision aimed at "institutionalizing
    the structure of the armed forces". (BBC)
  - Asylum seekers at the Villawood Immigration Detention Centre in Sydney, Australia,
    continue their protest with some inmates cutting themselves until a meeting occurs
    with officials from the Department of Immigration and Citizenship. (ABC News),
    (AFP via Yahoo! News), (ABC News Online)
  - The governing Workers Party of North Korea reschedules its first party conference
    for thirty years for September 28 in Pyongyang amongst speculation that Leader
    Kim Jong-il will name his youngest son Kim Jong-un as his successor. (The Guardian),
    (AP)
  - Omar Abdirashid Ali Sharmarke resigns as Prime Minister of Somalia following an
    impasse developing with President Sharif Ahmed over a new constitution. (AP via
    Google) (Al Jazeera)
  Sport:
  - 2010 Commonwealth Games
  - The Commonwealth Games Federation demands that India improve conditions at the
    athletes' village in Delhi. (BBC)
  - At least 23 people are injured after a footbridge collapses near the main Jawaharlal
    Nehru Stadium. (Reuters) (OneIndia), (Times of India)
  - The Minnesota Twins win the American League Central in Major League Baseball and
    become the first team to qualify for postseason play in 2010. (SBNation)
  Television:
  - 'CBS Season Premieres of NCIS and NCIS: Los Angeles'
