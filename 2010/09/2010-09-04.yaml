Date: '2010-09-04'
Source_URI: Portal:Current events/2010 September 4
Intelligence_Payload:
  Armed conflicts and incidents:
  - Thousands attend a funeral for the Shia Muslim suicide attack victims in Quetta
    as the death toll rises to 65. (Aljazeera)
  - 2 attacks kill at least 10 people and wound at least 28 others in Afghanistan.
    (Aljazeera)
  - 2 Azeri soldiers are killed in fighting near Nagorno-Karabakh, the second incident
    of clashes within a week. (Reuters) (ITAR-TASS)
  Arts and culture:
  - Tony Blair is met with a three-hundred person antiwar demonstration and has a
    small number of individuals throw objects (shoes, bottles and eggs), and encounters
    an attempted citizen's arrest for war crimes at Eason's in Dublin, Ireland, at
    his first public book signing for A Journey; four are arrested. Clashes between
    protesters and police lead to the closure of businesses and the Luas tram system.
    (The Guardian) (RTÉ) (The Irish Times) (AFP via Daily Nation) (Aljazeera)
  Disasters:
  - A state of emergency and curfew are declared in Christchurch, New Zealand, after
    the 2010 Canterbury earthquake. (The Guardian) (Waikato Times)
  - A plane crash near Fox Glacier in the South Island of New Zealand is believed
    to have killed 9 people. (ABC News Online) (BBC)
  - NASA scientists advise the 33 miners trapped in Chile to regulate sleeping patterns,
    boost intake of Vitamin D and take exercise. (BBC)
  - The President of Guatemala Alvaro Colom declares a state of emergency after weeks
    of heavy rain results in landslides with at least 21 people dead. (AFP via ABC
    Online) (Al Jazeera)
  - Two light aircraft collide in midair during an air race near Ryde on the Isle
    of Wight off the coast of England resulting in the deaths of the pilots. (UPI)
  - Former Hurricane Earl loses its tropical storm status after making landfall in
    Nova Scotia, Canada but left one person dead and a million people without power
    in Canada. (AFP via Yahoo! News)
  - Hundreds of people are believed to have died in the Democratic Republic of the
    Congo in river boat accidents. (Al Jazeera)
  Australian floods:
  - Heavy rain in the Australian state of Victoria causes flooding in the towns of
    Ballarat, Maryborough and Bendigo with landslides blocking roads in the Victorian
    Alps. (ABC News Online) (ABC News Online)
  - Floodwaters isolate the town of Birdsville in Queensland. (AAP via Sydney Morning
    Herald)
  Law and crime:
  - A prominent opposition journalist in Belarus, Oleg Bebenin, is found hanged; officials
    say he committed suicide. (BBC) (IOL) (Kyiv Post)
  - A court in Argentina reopens an investigation into crimes against humanity under
    Francisco Franco in Spain. (BBC)
  - Sakineh Mohammadi Ashtiani, convicted of adultery and sentenced to death in Iran,
    reportedly faces the whip after The Times publishes an unveiled image of political
    activist Susan Hejrat in the mistaken belief it is her. (The Guardian)
  Politics and elections:
  - Thousands of people protest across France against the government's policy of deporting
    of Romani people. (Aljazeera) (France 24) (BBC)
  - Yu Myung-hwan resigns as South Korea's Minister for Foreign Affairs and Trade
    amid accusations of nepotism after his daughter is hired to a midlevel position
    in his Ministry. (Yonhap) (AP via ABC News America)
  - Cabinet formation in the Netherlands; Informateur Ivo Opstelten informs Queen
    Beatrix that the coalition formation between the People's Party for Freedom and
    Democracy (VVD) and the Christian Democratic Appeal (CDA) with support from the
    Party for Freedom (PVV) failed, after PVV leader Geert Wilders lost his confidence
    in the internal stability of the CDA parliamentary group after a letter of criticism
    was sent by CDA negotiator Ab Klink (CDA). (NOS)
  Sport:
  - The News of the World alleges that a 4th cricketer from Pakistan is being probed
    by the International Cricket Council (ICC) into the corruption allegations it
    broke last week. (BBC)
