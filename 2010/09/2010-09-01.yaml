Date: '2010-09-01'
Source_URI: Portal:Current events/2010 September 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - The People's Liberation Army Navy commences artillery exercises in the Yellow
    Sea in response to those being conducted by South Korea and the United States
    against North Korea. (BBC)
  - At least 30 people are killed and 250 injured in three suicide bombing attacks
    on Shia procession in Lahore, Pakistan. (BBC) (Arab News) (DAWN) (The Guardian)
    (The Times of India) (Xinhua)
  - At least 6 people die as Mozambique police fire rubber bullets as a protest in
    Maputo over rising food prices turns into a riot. (RFI) (BBC) (Reuters Africa)
    (Aljazeera)
  - A border clash between Armenia and Azerbaijan occurs, leaving several soldiers
    dead and both sides blaming the other for the violence. (BBC) (Aysor)
  - 2 Israelis are wounded in a shooting near Kochav HaShachar in the West Bank. (Haaretz)
    (Aljazeera)
  - The Palestinian Authority arrests 250 members of Hamas following the shooting
    of four Israeli settlers at Beit Hagai. (Los Angeles Times)
  Arts and culture:
  - Actor Michael Douglas speaks for the first time in public of his recent disgnosis
    with throat cancer during an interview on American television. (BBC) (The Guardian)
  - Hungarian actress Zsa Zsa Gabor is rehospitalised in the United States after becoming
    unconscious. (BBC)
  - Former British Prime Minister Tony Blair's autobiography A Journey goes on sale
    in the United Kingdom and becomes a bestseller. (The Guardian)
  - United States rapper T.I. and his wife singer Tameka Cottle are arrested on Sunset
    Boulevard in Los Angeles for illegal drug possession. (CNN)
  - Archaeologists discover 200 year old bottles of beer in a shipwreck south of the
    autonomous Aland Islands in the Baltic Sea believed to be the world's oldest.
    (CNN)
  Business and economics:
  - Apple Inc. launches Ping. (BBC)
  - A trade agreement between Australia and the European Union comes into effect stopping
    Australian wine being marketed using terms such as champagne and port. (ABC Online)
    (BBC) (People's Daily)
  - The U.S. Court of Appeals, Federal Circuit, upheld an injunction issued by a federal
    district court in Indiana in 2009, enjoining Teva Pharmaceuticals from the marketing
    of its drug for the treatment of osteoporosis. The district court found, and the
    appellate court agrees, that Teva's drug is in violation of a valid patent held
    by Eli Lilly and Company. (Fierce Pharma)
  Disasters:
  - 57,000 people are made homeless by heavy floods near Aweil, Northern Bahr el Ghazal
    in southern Sudan. (BBC)
  - The U.S. state of North Carolina orders the evacuation of Cape Hatteras and Ocracoke
    Island ahead of Hurricane Earl. (Christian Science Monitor)
  - A tower block collapse in Saint Petersburg neither kills nor injures people. (BBC)
    (CNN) (People's Daily)
  - Eight people are killed and 40 missing in landslides that hit Wama village in
    Yunnan province, near Baoshan. The overall death toll from the 2010 China floods
    rises to 3,185, with 1,050 more missing. (AFP)
  2010 Pakistan floods:
  - The World Bank pledges to loan an additional $100 million to Pakistan. (Hindustan
    Times) (Reuters)
  - Flood taxes are imposed in principle. (People's Daily)
  - UK deputy prime minister Nick Clegg visits a relief camp in Sukkur to witness
    the devastation caused by the ongoing floods. (BBC) (The Times of India) (PA via
    The Independent) (Sky News)
  2010 Copiapó mining accident:
  - 'The 33 miners involved in the 2010 Copiapó mining accident in Chile receive their
    first hot meal in 26 days: it consists of meatballs, chicken and rice through
    a tube. (BBC)'
  - As the isolation of the miners is similar to a space mission, NASA sends a team
    of doctors, who recommend the miners abstain from cigarettes and alcohol while
    trapped. (The Daily Telegraph) (Reuters)
  International relations:
  - Several European countries summon their Kenyan ambassadors in a bid to determine
    why Kenya did not arrest President of Sudan Omar al-Bashir when he came to Nairobi
    for the new constitution ceremony. (BBC)
  - The United States adds Tehrik-i-Taliban Pakistan to its list of what it considers
    "foreign terrorist organizations"; rewards are announced for the capture of its
    leaders. (Reuters) (The Hindu) (Los Angeles Times)
  - President of the United States Barack Obama meets with a range of Middle East
    leaders in pursuit of peace between Israel and Palestine, including Prime Minister
    of Israel Benjamin Netanyahu, President of the Palestinian Authority Mahmoud Abbas,
    King of Jordan Abdullah II and President of Egypt Hosni Mubarak. (CNN) (Aljazeera)
  Law and crime:
  - Greece brings into force a smoking ban. (BBC) (AP via The Guardian) (The Independent)
    (Sky News)
  - 92 Afghan asylum seekers escape from the Northern Immigration Detention Centre
    in Darwin, Australia as part of a protest with four people being hospitalised
    due to dehydration. (AAP via Sydney Morning Herald)
  - 2 Yemenis are released from custody in Amsterdam, having been arrested after being
    suspected by the United States of plotting a terrorist act. No evidence was found
    against the men. (BBC)
  - Swedish prosecutors decide to reopen a rape case against Wikileaks founder Julian
    Assange; Assange denies the allegations. (Aljazeera) (The Guardian) (CNN) (The
    New Zealand Herald)
  - A man upset with the Discovery Channel's environmental programs takes several
    people hostage at its headquarters in Silver Spring, Maryland, near Washington,
    DC. Police snipers eventually kill him with the hostages being safe. (UKPA via
    Google) (Entertainment Weekly) (The Guardian) (People)
  Politics and elections:
  - The Australian Greens agree to support a Gillard Labor minority government as
    negotiations continue to form a government after the recent election. (Reuters)
  - Members of the United Kingdom Labour Party start voting in the leadership election
    with the candidates being Diane Abbott, David Miliband, Ed Miliband, Ed Balls
    and Andy Burnham. (BBC)
  - Christopher Myers, a special adviser to UK Foreign Secretary William Hague, resigns
    due to "untrue and malicious" allegations amid questions surrounding Hague's marriage.
    (BBC) (Channel 4) (The Independent)
  - More than 150 Israeli academics say they will no longer lecture or work in Jewish
    settlements in the West Bank. (BBC)
  Sport:
  - Mohammad Asif of Pakistan is dropped from an Indian movie due to the recent allegations
    of match-fixing. (BBC News) (Reuters)
