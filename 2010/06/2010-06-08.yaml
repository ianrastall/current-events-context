Date: '2010-06-08'
Source_URI: Portal:Current events/2010 June 8
Intelligence_Payload:
  Uncategorized:
  - At least 11 people die and injuries are caused in various fatal incidents across
    Iraq, including several civilians, a Sunni Imam and a Christian. (BBC)
  - American popstar Chris Brown postpones a tour of the United Kingdom after being
    denied a visa following his physical assault on Rihanna. (BBC)
  - At least 12 people drown and 9 others disappear after a boat sinks in Sunamganj
    District, Bangladesh. (Aljazeera) (Bangkok Post) (BBC) (TIME) (Xinhua)
  - The EU proposes that Romani issues should be integrated into housing, education
    and culture polices at EU and national level. (europa.eu)
  - 21 nations, including the Presidents of Afghanistan, Russia and Syria, attending
    the Conference on Interaction and Confidence-Building Measures in Asia summit
    in Istanbul condemn Israel's deadly raid on the Gaza-bound aid flotilla, while
    Israel, the 22nd participant with a lower-level diplomat, disagrees. (Aljazeera)
    (Voice of America) (Xinhua)
  - The United States threatens Iran with its toughest nuclear sanctions yet, despite
    the nuclear fuel-swap arrangement Iran made with Brazil and Turkey in May. (BBC)
  - Libya orders the United Nations refugee agency, UNHCR, to leave the country for
    unknown reasons. (Al Jazeera) (Reuters Africa) (BBC)
  - The Red Crescent Society, for the first time since December 2008 and in a joint
    venture between Iran and Turkey, prepares to send two aid boats of donations and
    relief workers to Gaza. (The Times)
  - China lodges a formal protest to North Korea after a North Korean soldier fatally
    shot three Chinese citizens at their mutual border. (AP) (Global Times) (Chosun
    Ilbo) (Radio Television Hong Kong)
  - Uganda undoes remarks suggesting President of Sudan Omar al-Bashir would not be
    welcome at July's African Union conference in Kampala. (Aljazeera) (BBC)
  - Television host Elena Skordelli goes on trial for the murder of Cypriot media
    mogul Andis Hadjicostis. (BBC News)
  - The trial of alleged "rogue trader" Jérôme Kerviel of Société Générale begins
    in Paris. (Aljazeera) (The Guardian) (The Irish Times)
  - The trial of former Governor of Illinois Rod Blagojevich on corruption charges
    begins today in the United States. (AP via Google News)
  - Refugee agencies criticise the UK Border Agency's decision to deport Afghan children.
    (Aljazeera)
  - Poland legalises chemical castration. (BBC)
  - Kenneth O'Keefe, an Irish-American living in London who was captured and injured
    by Israel Defense Forces following last week's raid on a Gaza-bound aid flotilla,
    threatens legal action after being included on a list of alleged "active terror
    operatives". (The Irish Times)
  - At least 2 tonnes of cocaine worth around US$1 billion bound for Europe is seized
    in The Gambia. (BBC)
  - Philippine presidential election, 2010
  - Noynoy Aquino is elected as President of the Philippines in the Philippines presidential
    election, taking 42% of the vote, about 16 percentage points more than second-place
    Joseph Estrada. (ABS-CBN News)
  - Mar Roxas prepares a challenge of the election for Vice President of the Philippines
    after the final tally shows him 727,000 votes behind Jejomar Binay. (ABS-CBN News)
  - Japanese Prime Minister Naoto Kan is due to name his cabinet and be formally sworn
    in by Emperor Akihito. (BBC)
  - Public sector workers in Spain hold a major strike in protest against a 5% pay
    cut due to come into effect this month as part of a government austerity package.
    (CNN) (Financial Times)
  - China defends its censorship of the internet in a document laying out the government's
    attitude towards the web. (BBC) (China Daily) (Al Jazeera)
  - Egypt permits legislators from the Muslim Brotherhood and other groups to enter
    the blockaded Gaza Strip. (Reuters) (Arab News)
  - The 11th Panchen Lama, the 20-year-old living Buddha on Monday visited south Tibet's
    Shannan Prefecture, held large prayer services and gave head-touch blessings to
    more than 5,000 local devotees. (tibet.cn) (Chinamil) (Tibet culture)
  - Scientists find evidence that large seas once existed on Mars. (BBC)
