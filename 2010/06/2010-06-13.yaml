Date: '2010-06-13'
Source_URI: Portal:Current events/2010 June 13
Intelligence_Payload:
  Uncategorized:
  - Egyptian security forces beat protesters at a demonstration against human rights
    abuses in Egypt and an incident of police brutality that resulted in the death
    of a young man a week ago. (AP) (Los Angeles Times)
  - 10 police were killed in an attack on Sunday on an outpost in Dai Kundi province
    in central Afghanistan. (TVNZ)
  - An investigation by The Sunday Times alleges that Japan has bribed smaller nations
    in exchange for their vote to resume whaling at the International Whaling Commission.
    (The Sunday Times)
  - A plane carrying 16 Al Jazeera Sports broadcast staff to the 2010 FIFA World Cup
    game between Algeria and Slovenia in Polokwane made an emergency landing at Lanseria
    International Airport following the jamming of the aircraft's landing gear. Lanseria
    International Airport is shut down. (Reuters Africa) (AFP) (Herald Sun) (IOL)
  - 5 people have died and dozens been injured in a stampede at a rally in the Kenyan
    capital, Nairobi. (BBC) (aajmedia)
  - At least two people are killed and 20 injured in a stampede at a peace concert
    in Côte d'Ivoire. (BBC) (Philippine Inquirer)
  - South African police shoot a lachrymatory agent at hundreds of 2010 FIFA World
    Cup stewards at pay cut protests in Durban. (BBC)
  - Hezbollah warns Israel on gas fields being claimed by both Israel and Lebanon.
    (presstv.ir)(Ynet)(VJ)
  - Slovak Prime Minister Robert Fico is appointed by President Ivan Gašparovič to
    form a new government. (Xinhua)
  - Venezuelan authorities issue an arrest warrant for the head of Globovisión, the
    country's only remaining independent television station which criticises President
    of Venezuela Hugo Chávez. (Aljazeera)
  - An explosion injures 24 people at a rally opposed to a new draft constitution
    in the Kenyan capital Nairobi. (BBC) (Capital FM)
  - Fighting between government troops and police in Somalia leaves at least 13 people
    dead and 14 injured in the capital Mogadishu. (Al Jazeera) (Reuters Africa)
  - Two people are killed and six others are wounded during four explosions close
    to the entrance of the Iraqi central bank building in downtown Baghdad. (Xinhua)
  - A 7.5-magnitude earthquake west of India's Nicobar Islands causes tremors felt
    along India's eastern seaboard and triggers a tsunami watch, which is later cancelled.
    (AFP) (NDTV)
  - FIFA says it will assist Al Jazeera Sports in its investigation of the 2010 FIFA
    World Cup signal sabotage. (Business Week) (Hindustan Times) (The Zimbabwean)
  - Wen Jiabao, the Premier of the People's Republic of China and Prime Minister of
    Japan Naoto Kan agree to establish a Prime Ministerial hotline between the two
    heads of government. (Xinhua)
  - Joran Van der Sloot said he'll reveal the location of U.S teen Natalee Holloway's
    body to the investigators if authorities transfer him to an Aruban jail from his
    current jail in Peru. (Fox News)
  - A London School of Economics report finds that Pakistan's largest intelligence
    agency, the Inter-Services Intelligence, is secretly funding and training the
    Afghan Taliban. (BBC)
  - South Korea's chairman of the Joint Chiefs of Staff Gen. Lee Sang-eui offers to
    retire over the recent warship sinking. (Xinhua)
  - Britain's most senior military officer, Sir Jock Stirrup, agrees to leave before
    the end of his term in April 2011, according to the country's Defence Secretary
    Liam Fox. (BBC) (The Irish Times) (Xinhua)
  - Freed Swiss businessman Max Göldi is due to leave Libya. (Xinhua)
  - The Japan Aerospace Exploration Agency's Hayabusa spacecraft returns to earth
    near Woomera in northwest South Australia. (ABC Australia)
  - Official documents say the United Kingdom's government considered denying the
    Korea DPR national football team visas to attend the 1966 FIFA World Cup in England
    for fear of "diplomatic shockwaves" brought on by Communism. (BBC) (AFP) (The
    Belfast Telegraph) (RTHK)
  2010 Kyrgyzstan crisis:
  - Tensions remain high in Kyrgyzstan, with police patrolling the streets and special
    forces standing guard in the city of Osh and Jalal-Abad, after ethnic clashes
    left more than 100 people dead and about 1,400 others injured since fighting broke
    out Thursday night. (TVNZ) (CNN) (Aljazeera)
  - 150 paratroopers from Russia arrived to Kant, Kyrgyzstan on Sunday. (Xinhua) (swissinfo)
    (trtenglish) (presstv.ir)
  - Tens of thousands of people flee across the border into Uzbekistan. (BBC)
  - 3 Ilyushin Il-76 aircraft land at Kant Air Base in Kyrgyzstan, after departing
    from Ramenskoye Airport, located near Moscow. (24)
  Israeli–Palestinian conflict:
  - Arriving in the Gaza Strip for the first time since Israel blockaded it in 2006,
    Secretary-General of the Arab League, Amr Moussa, calls for the blockade to be
    ended. (Aljazeera) (Xinhua) (Voice of America)
  - United States Ambassador to the United Nations Susan Rice tells Fox News that
    Israel is capable of conducting a credible investigation into the fatal Gaza flotilla
    raid on its own terms. (Ynetnews)
  - Israeli Defense Minister Ehud Barak cancels an official two-day trip to France
    at short notice, while several French members of the flotilla and three MPs plan
    to file a lawsuit against him in France and at the International Criminal Court
    in The Hague. (Ynetnews) (AP) (The Jerusalem Post)
  - Israel sets up its own internal "independent public commission" into its recent
    deadly raid on the Gaza-bound international aid flotilla. Yaakov Turkel is chair,
    while two foreign observers are Ken Watkin and David Trimble, Baron Trimble. (BBC)
    (The News International) (Aljazeera)
  Belgian general election, 2010:
  - The Belgian elections take place amid a possibility of partition. (Xinhua)
  - The N-VA wins. (Aljazeera)
