Date: '2010-06-14'
Source_URI: Portal:Current events/2010 June 14
Intelligence_Payload:
  Uncategorized:
  - The Mo Ibrahim Prize for Achievement in African Leadership is awarded to no one
    for a second consecutive year. (Aljazeera)
  - Fighting between Somali government troops and local police has killed at least
    13 people in Mogadishu and gunmen killed a judiciary official of the semi-autonomous
    Puntland region in the Hamarjajab district. (Arab News)
  - At least 28 prisoners are killed in a clash between rival gangs in Sinaloa, Mexico.
    (Asiaone) (BBC) (newser)
  - The Federal Supreme Court of Switzerland rules that Romanian footballer Adrian
    Mutu has lost his final appeal in a five-year legal battle meaning he has to pay
    a record €17 million in damages for breaching his contract. (The Guardian) (BBC)
    (AsiaOne) (The Hindu) (CNN)
  - Secretary of State for Northern Ireland Owen Paterson receives a copy of the Saville
    Inquiry, the longest and most expensive public inquiry in British history, ahead
    of its official launch by David Cameron tomorrow. (The Irish Times) (RTÉ)
  - Amidst growing labour unrest in China, Premier Wen Jiabao visits migrant workers
    at a Beijing construction site and calls for better treatment for the country's
    migrant workers. (Straits Times) (Xinhua)
  - Egypt and Al Jazeera Sports clash over claims of interference in the transmission
    of 2010 FIFA World Cup soccer matches. (Reuters Africa)
  - A California judge refuses to suspend the medical licence of Conrad Murray, the
    doctor charged in connection with Michael Jackson's death. (AP via LA.com) (newser)
  - At least 35 people are feared drowned and 50 people disappear after a boat capsizes
    on the Ganges River in northern India. (AP via CT Now) (Xinhua)
  - At least 14 people are killed and at least 30 are injured when a tourist bus disappears
    over the edge of a ravine in the Philippines. (Xinhua)
  - 10 police are killed and several others are wounded in an ambush by drug hitmen
    in Zitácuaro Michoacán. (The Star) (AP) (The Australian) (Los Angeles Times)
  - Colombian security forces rescue two senior police officers and a soldier held
    hostage since 1 November 1998, among the longest-held captives; a fourth hostage
    is later rescued. (BBC) (France24) (Los Angeles Times) (The Sydney Morning Herald)
    (Aljazeera) (BBC)
  - Ireland's Fine Gael Deputy Leader and Finance Spokesperson Richard Bruton, brother
    of former Taoiseach John Bruton, is sacked after publicly declaring his lack of
    confidence in Fine Gael's leader Enda Kenny. (BBC) (RTÉ) (The Irish Times) (Press
    Association)
  - Churches in Kenya accuse the government of being behind a grenade attack at a
    rally opposed to a draft constitution which killed six people. (BBC) (AP) (Daily
    Nation)
  - A team of American geologists and Pentagon officials say they have discovered
    vast mineral wealth, including iron, gold and lithium, estimated to be worth nearly
    US$1 trillion, in Afghanistan, though other senior officials say this has been
    known since at least the 1970s. (CBS News) (Politico) (The Guardian) (AP)
  - The arrest of several army officers in Guinea is not linked to elections, according
    to the country's army chief. (BBC)
  - The Iraqi Council of Representatives convenes in Baghdad three months after inconclusive
    elections. (AFP via Google News)
  - Polish authorities arrest a suspected Israeli agent in connection with the murder
    of a Hamas operative in Dubai in January. (BBC)
  - Lanseria International Airport reopens after the removal of the wreckage of yesterday's
    emergency landing involving mainly Al Jazeera Sports broadcast staff on their
    way to cover the 2010 FIFA World Cup game between Algeria and Slovenia in Polokwane.
    (IOL)
  - New files on American politician Ted Kennedy, which were previously secret, are
    released. (BBC)
  - US Secretary of State Hillary Clinton announces the 10th Annual Trafficking in
    Persons Report. (US Department of State)
  2010 Kyrgyzstan crisis and 2010 South Kyrgyzstan riots:
  - Secretary-General of the United Nations Ban Ki-moon expresses "alarm" at events
    in Kyrgyzstan. (BBC)
  - Camps are quickly set up along the Kyrgyzstan border for the tens of thousands
    of people fleeing the riots in Kyrgyzstan. (Aljazeera)
  - Zhalalidin Salakhuddinov, the leader of the Uzbek National Center, claims that
    200 Uzbeks have died in the fighting. (AP via Google News)
  - Minority Uzbeks accuse the majority Kyrgyz of carrying out genocide in the southern
    cities of Osh and Jalal-Abad. (Reuters)
  Israeli–Palestinian conflict:
  - The International Committee of the Red Cross (ICRC) issues a report criticizing
    Israel and calling on it to lift the blockade. (CNN) (BBC)
  - Israel acknowledges that Uri Brodsky, a citizen arrested in Poland and charged
    with involvement in the assassination of Mahmoud al-Mabhouh, is a "businessman"
    but Prime Minister Benjamin Netanyahu refuses to comment on suggestions the country
    is trying to stop his extradition to Germany amid calls by ministers for him to
    be extradited to Israel. (The Daily Telegraph)
  - An Israeli Police officer is killed and two others wounded in a shooting near
    Hebron. The Al-Aqsa Martyrs' Brigades claims responsibility, and claims it is
    retaliation for the Gaza flotilla raid. (The Jerusalem Post)
  - The European Union presses Israel to lift its blockade of Gaza, as EU members
    meet in Luxembourg to discuss ways that Europe could renew its role in helping
    supervise Gaza's border crossings. (Yahoo! News)
  - Two Iranian aid ships begin departing for Gaza, one from Khorramshahr and one
    from Istanbul. Egypt grants permission for 70 Iranian MPs to visit Gaza. (Ynetnews)
    (The Jerusalem Post)
  NCAA (U.S. college) conference realignment:
  - The University of Texas at Austin, seen as the key to the survival of a 10-team
    Big 12 Conference in the wake of the loss of Colorado to the Pacific-10 Conference
    and Nebraska to the Big Ten Conference, announces it will turn down an invitation
    from the Pac-10 and remain in the Big 12. Shortly after Texas' announcement, four
    other Texas and Oklahoma schools targeted by the Pac-10 pledge themselves to the
    Big 12. (ESPN)
