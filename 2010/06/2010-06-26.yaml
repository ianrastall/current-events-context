Date: '2010-06-26'
Source_URI: Portal:Current events/2010 June 26
Intelligence_Payload:
  Uncategorized:
  - Shreya Ghoshal was honored from the U.S. state of Ohio, wherein governor Ted Strickland
    declared June 26 as "Shreya Ghoshal Day". (IMDb News)
  - Gunmen raided a jewelry shop Saturday morning in western Iraq, killing four people
    before fleeing with a large amount of gold in Fallujah, 40 miles (65 kilometers)
    west of Baghdad. (Arab News)
  - The Death toll in unrest in southern Kyrgyzstan rises to 275. (Central Asian News)
  - 17 people are killed and 25 others injured when an overcrowded bus collided head-on
    with a speeding truck near Chenaki More, abount 30 km from Patna, India. (Thaindian)
  - 2010 G-20 Toronto summit
  - The leaders of the world's twenty largest economies meet in Canada at the 2010
    G-20 Toronto summit. (BBC)
  - Over one hundred people are arrested for planning to "commit mischief". (CBC)
  - Mostly peaceful protesters march through Toronto while a small amount of radicals
    smash shopfronts and burn police cars. (Reuters via ABC Australia)
  - President of China Hu Jintao accepts an invitation for a state visit from President
    of the United States Barack Obama. (BBC)
  - The G8 releases a statement agreeing that Israel's blockade on Gaza is "not sustainable
    and must be changed" and calling for United Nations Security Council Resolution
    1860, which was approved by the United Nations Security Council in January 2009,
    to be implemented. (AFP) (Ynetnews) (Al Jazeera)
  - A Toronto veterinarian, who has no involvement in activism, alleges "overreach
    of police power" after being awoken at night by police in his bedroom at gunpoint;
    they did not produce a search warrant, questioned his wife and disturbed their
    baby son before dragging him downstairs in handcuffs onto his own front lawn.
    He was later released and filed a complaint. (CBC) (National Post)
  - France is announced as the host of the G8 in 2011. (Xinhua)
  - President of Zambia Rupiah Banda says his country did not ask for health and road
    aid which has now been frozen by The Global Fund to Fight AIDS, Tuberculosis and
    Malaria and the European Union before an upcoming election and says "We must not
    allow donors to feel they can interfere in the internal affairs of this country
    because it is a sovereign and independent state". (Reuters Africa)
  - Voters in Somaliland take part in a presidential election. (Arab News) (AP) (The
    New York Times) (Al Jazeera)
  - Israel allegedly confiscates seven oxygen machines en route to hospitals in the
    West Bank and Gaza as they "came under the category of possible use for non-medical
    purposes". The Palestinian Ministry of Health asks for the Norwegian Development
    Agency that donated them to assist in calling for their return. (Haaretz)
  - Israel's pledge to ease its blockade on Gaza has little effect on factories. (The
    Independent)
  - Iranian lawmakers protesting at Israel's blockade of Gaza say they will travel
    to the area on an aid ship from Lebanon. (Reuters Africa)
  - The Vatican's Secretary of State Cardinal Tarcisio Bertone criticizes Belgian
    police participating in raids against child sex abuse. (BBC)
  - Tens of thousands of people demonstrate in Taiwan against a trade agreement with
    China to be signed on Tuesday. (BBC) (Focus Taiwan News Channel) (Radio Television
    Hong Kong)
  - Several thousand Egyptians, joined by opposition leader Mohamed ElBaradei, protest
    systematic use of torture by authorities in the largest demonstration yet resulting
    from the alleged fatal beating to death of Khaled Said by police. (Arab News)
  - Two Palestinians are killed in an Israeli strike on two underground tunnels from
    the Gaza Strip to Israel. The IDF claims the attack was a response to Thursday's
    firing of a dozen mortar rounds towards Israel. (Arab News) (The Washington Post)
  - Thousands of Iranians in Paris ask the UN to tighten its sanctions on Iran. (YnetNews)
    (Euronews)
  - Four people are killed and five wounded in violence in Indian-administered Kashmir's
    Sopore area. (CNN)
  - Brazilian President Luiz Inácio Lula da Silva cancels his trip to Canada due to
    the widespread floods. (The Sydney Morning Herald)
  - The ruling Workers' Party of Korea in North Korea announces that it will convene
    a meeting in September to elect new leaders. (Arirang News) (Al Jazeera) (AFP
    via Sydney Morning Herald)
  - Alleged Agrigento mafia boss Giuseppe Falsone is arrested in Marseille in the
    south of France after spending 10 years on the run. (BBC)
  - Four American service personnel are killed in Afghanistan. (CNN)
  - Former Vice President of the United States Dick Cheney, who has a long history
    of heart problems, is hospitalized. (The Sydney Morning Herald)
  - 'Fedor Emelianenko records only the second loss of his career as he is tapped
    out by Fabrício Werdum at the Strikeforce: Fedor vs. Werdum mixed martial arts
    match in San Jose, California, US. (Sherdog)'
