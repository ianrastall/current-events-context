Date: '2010-06-07'
Source_URI: Portal:Current events/2010 June 7
Intelligence_Payload:
  Uncategorized:
  - The Israeli Navy kills four Palestinians wearing diving gear; Israel says they
    were carrying weapons and planning an attack, off the coast of Gaza. (Ynetnews)
    (Haaretz) (BBC) (RTÉ) (Aljazeera)
  - Canadian poet Anne Michaels's novel Fugitive Pieces has been judged, by a panel
    of teenagers, the best Orange Prize for Fiction winner in its 15-year history.
    Fugitive Pieces won the Prize in 1997. (BBC)
  - Chinese stock markets closed down Monday on weaker global recovery prospects.
    (Sina)
  - A total of 172 people are killed in the floods caused by Tropical Storm Agatha
    that struck Guatemala. (Xinhua)
  - At least 5 people are confirmed dead as tornados and storms batter the Midwest
    U.S. state of Ohio. (Xinhua) (Sydney Morning Herald) (trend.az)
  - At least three people die and 10 go missing during an explosion in a natural gas
    pipeline in Cleburne, Texas. (MSNBC)
  - Two people die and 14 others are injured when a car ploughs into a crowd of spectators
    at a rally for World Environment Day in Gatsibo, Rwanda. (BBC) (Times Live)
  - Police say 55 bodies have been recovered so far from an abandoned mine in Guerrero,
    Mexico. (BBC)
  - Polish officials say 6,000 Polish zloty were withdrawn using credit cards stolen
    from a passenger killed in the 2010 Polish Air Force Tu-154 crash near Smolensk.
    Poland says four soldiers have been arrested, while Russia denies this. (BBC)
  - 9 passengers are injured and a train carriage left dangling over an embankment
    after a derailment in Scotland. (Sky News)
  - The number of migrant workers who died or were injured at South Korea's workplaces
    has risen over the last three years to reach nearly 14,500. (Yonhap)
  - The Cyprus-based Free Gaza Movement packs up and leaves Cyprus for London after
    the Cypriot government's decision to interfere with and disrupt last week's international
    aid flotilla. (Xinhua)
  - Veteran American journalist Helen Thomas announces she is retiring, after apologizing
    for making remarks saying Jews should leave Israel and return to Europe are widely
    condemned in the United States. (Ynetnews) (BBC) (The Guardian) (RTÉ) (The Sydney
    Morning Herald)
  - 13 executed in Iran's Qezel Hessar Prison. (fcnn)
  - The main suspect in the murder of Stephany Flores Ramírez, Joran van der Sloot,
    confesses to her murder in Peru. (CNN)
  - The Magistrate court in Bhopal, India convicts eight people, one posthumously,
    for their role in the Bhopal disaster industrial castastrophe 25 years ago in
    1984. (Times of India) (AFP) (BBC) (Aljazeera)
  - A Chubb Security security guard is shot dead in a gunfight after being ambushed
    by gunmen whilst delivering cash to a Bank in the Sydney CBD, Australia. (Daily
    Telegraph) (Sydney Morning Herald)
  - 22-year-old U.S. Army intelligence analyst, SPC Bradley Manning, is named as the
    alleged source of the leak of the Collateral murder video, along with the Granai
    massacre video and other documents, said to be in the possession of Wikileaks.
    (Wired) (BBC)
  - Chancellor Angela Merkel agrees €80 billion of savings spread across four years
    with her coalition cabinet. (BBC)
  - North Korea holds a rare second session of its parliament, with Choe Yong-rim
    appointed to replace Kim Yong-il as Premier. (Aljazeera) (BBC) (Xinhua)
  - The genetically modified variety of maize known as NK603, outlawed across the
    European Union, is sown and contaminates fields in seven German states. (Deutsche
    Welle) (BBC)
  - A nearly 25-year study published today in Paediatrics concludes that children
    raised in lesbian households are "psychologically well-adjusted" and have "fewer
    behavioral problems than their peers". (CNN)
  - International Olympic Committee (IOC) President Jacques Rogge inspects the site
    of the 2014 Winter Olympics in Sochi, Russia. (BBC)
