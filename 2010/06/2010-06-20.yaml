Date: '2010-06-20'
Source_URI: Portal:Current events/2010 June 20
Intelligence_Payload:
  Uncategorized:
  - At least 40 people were shot over the weekend across Chicago, with seven of them
    slain, Chicago Tribune reported. (CNTV)
  - Graeme McDowell of Northern Ireland wins the 2010 U.S. Open at Pebble Beach Golf
    Links in California. (Reuters via UK Yahoo) (RTÉ) (The Guardian)
  - In Poland, presidential elections take place after the death of President Lech
    Kaczyński on April 10, 2010 in a plane crash. (AP) The two main candidates are
    Acting President Bronisław Komorowski (Civic Platform) and former Prime Minister
    Jarosław Kaczyński (Law and Justice) receive 45.7% and 33.2% of the votes respectively,
    requiring a runoff between them. (AP)
  - Jundallah's leader Abdolmalek Rigi is executed in Tehran. (BBC) (South China Morning
    Post) (The Sysney Morning Herald) (Bangkok Post) (Reuters)
  - Archbishop of Naples Crescenzio Sepe and former Italy transport minister Pietro
    Lunardi face allegations of corruption over a property deal. (BBC) (RTÉ)
  - At least one person is killed and tens of others are wounded during clashes between
    Indian paramilitary authorities and demonstrators in Kashmir. The demonstrators
    were protesting against a 25-year-old who is said to have been beaten to death
    by soldiers during a 12 June demonstration. (Aljazeera)
  - At least 26 people are killed and 53 other are injured during two car bombings
    in central Baghdad, Iraq. (BBC)
  - A Bell 412 Mexican military helicopter crashes in Durango state in northern Mexico
    Saturday, killing all 11 people on board. (People)
  - A plane carrying several Australian mining executives including Ken Talbot disappears
    in either Cameroon or the Republic of the Congo. (Philippine Daily Inquirer) (BBC)
    (Reuters), (Sydney Morning Herald)
  - 2010 FIFA World Cup
  - South Sudan's 7ft 7in basketball legend and humanitarian, Manute Bol, dies. (BBC)
    (The New York Times) (The Independent) (The Washington Post)
  - Michael Jackson's memorial plaque will be unveiled at a West End theatre in London
    on June 24. In mid-February Los Angeles coroners have released a report of his
    autopsy, which said his death was a homicide. (rian.ru) (mjjboard) (BBC) (SKY)
  Israeli–Palestinian conflict:
  - Israel says it will move to loosen its land blockade against the Gaza Strip, while
    indicating the continuation of its naval blockade against the region. (Xinhua)
  - Israel denies Economic Cooperation and Development Minister Dirk Niebel entry
    to the Gaza Strip to visit a humanitarian project co-funded by Germany during
    his four-day visit to the region. (Reuters) (AFP) (Ynetnews)
  Colombian presidential election, 2010:
  - In the runoff of the presidential elections in Colombia, Juan Manuel Santos from
    the Party of the U defeats his Green Party adversary Antanas Mockus, getting around
    70% of the votes. (AP via CBS), (Reuters)
  - At least seven police officers are killed and eight others disappear in an explosive
    attack on a police patrol. (Aljazeera)
  - The managing director of the French Football Federation, Jean-Louis Valentin,
    quits after the France national football team participates in a public row with
    him and then a boycott during the 2010 FIFA World Cup in South Africa. (BBC) (AP)
    (Xinhua) (TIME) (The Guardian)
  - Nigeria football player Sani Kaita receives at least 1,000 death threats after
    being sent off during his team's losing game with Greece at the 2010 FIFA World
    Cup; the Nigerian government and FIFA are involved. (BBC) (The Budapest Report)
    (Forbes) (The Daily Telegraph)
