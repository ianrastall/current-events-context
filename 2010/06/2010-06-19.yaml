Date: '2010-06-19'
Source_URI: Portal:Current events/2010 June 19
Intelligence_Payload:
  Uncategorized:
  - Burmese Democracy activist Aung San Suu Kyi turns 65, as international and domestic
    pressure for her release from house arrest intensify. Guards surrounding her home
    allow her to receive a birthday cake and a bouquet of flowers from political supporters.
    (Yahoo! News)
  - A gunman shoots 4 people then turns the gun on himself in San Bernardino, California.
    (AP via Atlanta Journal Constitution)
  - A former Rwandan army chief in exile, Faustin Nyamwasa, is shot in South Africa.
    (BBC) (News24) (Al Jazeera)
  - At least 48 people are killed in rival clashes between nomadic groups in the Darfur
    region of Sudan. (BBC) (AFP)
  - Gunfire at a combat post in Afghanistan killed a French soldier and wounded an
    Afghan translator. (CNN)
  - A drone attack on a militant hideout in North Waziristan in Pakistan, killed at
    least 13 people and injured six others. (CNN)
  - 5 policemen are killed and 14 others injured in four separate attacks against
    the police forces in Pakistan. (Xinhua)
  - Four suspected al-Qaida gunmen blast their way into the intelligence headquarters.
    The attack on the heavily protected security complex kills 18 in the southern
    port city of Aden, Yemen. (China Daily) (Washington Post)
  - Sweden's Crown Princess Victoria marries Daniel Westling; Westling becomes Duke
    of Västergötland. (BusinessWeek)
  - 10 Turkish soldiers are killed during clashes with Kurdish rebels on the border
    of Turkey and Iraq, in Şemdinli township of Hakkâri province and in the Gediktepe-Tekeli
    region. (TRT) (CNN)
  - Roadside bomb blast kills 4, wounds 12 in bus carrying soldiers in Istanbul. (AA)
  - 8 Turkish troops are killed in an attack by Kurdish rebels in southeastern Turkey.
    In response, Kurdish positions are targeted by Turkish airstrikes in Northern
    Iraq. Twelve Kurdish rebels are killed. (BBC) (IOL)
  - Flooding in South China kills at least 88 people, and forces nearly 750,000 people
    to leave their homes. (BBC News) (Le Monde) (nzherald) (ABC)
  Nauruan parliamentary election:
  - Parliamentary elections take place, with 18 seats at stake in the Parliament of
    Nauru. The President is elected to serve a 3-year term. (Election Guide)
