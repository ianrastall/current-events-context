Date: '2010-06-11'
Source_URI: Portal:Current events/2010 June 11
Intelligence_Payload:
  Shanghai International Film Festival:
  - From Oscar-winning blockbusters to low-budget art-house and documentary films,
    the 13th Shanghai International Film Festival screens films for everyone. It will
    feature a retrospective of films by Woody Allen and John Woo, classic movies from
    Japan, Canada, Germany, Italy and Ireland, as well as new Chinese cinema. (Shanghai
    Daily) (SIFF)
  2010 Kyrgyzstan crisis:
  - Riots erupt in the southern city of Osh killing at least 45, and injuring over
    a hundred others. The violence comes just over two months after violent riots
    in Bishkek toppled Kurmanbek Bakiyev's government, and only days ahead of a critical
    constitutional referendum. (News Daily) (CNN) (BBC) (The Wall Street Journal)
  - A curfew is imposed and a state of emergency declared in Osh by the interim government.
    (RIA Novosti) (Aljazeera)
  Mexico – United States relations:
  - Univision airs video footage of the U.S. agent who fatally shot a Mexican boy
    on Monday. (Sky News) (Press TV)
  - Mexico asks that the American agent who shot the boy be extradited. (Daily Mail)
  Politics of Japan:
  - Japanese Prime Minister Naoto Kan warns that the nation's economy is on "brink
    of collapse". (BBC) (The Guardian)
  - Shizuka Kamei, minister in charge of postal reform and financial services, quits
    after three days in protest over Kan's decision to delay a bill related to the
    proposed postal service privatisation. (The Australian)
  Uncategorized:
  - François Bazaramba is sentenced to life imprisonment for his part in the 1994
    Rwandan Genocide in Porvoo, Finland's first genocide trial. (Aljazeera) (BBC)
    (news24.com) (Reuters)
  - Israeli police fatally shoot a Palestinian driver who was attempting to run them
    down; the two policeman and three civilians are injured in the incident. (Jerusalem
    Post) (The New York Times)
  - 40 people are killed and at least four others are wounded in an attack by at least
    30 gunmen in Chihuahua, Mexico. (Xinhua) (The AP) (BBC) (Aljazeera) (Toronto Sun)
  - At least 20 people die during flash floods of the Little Missouri River through
    a campground in the Ouachita Mountains near Caddo Gap, Arkansas, west of Little
    Rock, Arkansas in the United States. (China Daily) (Reuters)
  - 'At least 11 civilians and two US soldiers are killed in southern Afghanistan:
    9 of the civilian deaths are in a roadside bomb on a minibus in Kandahar. (Aljazeera)'
  - Pope Benedict XVI begs for forgiveness from God and from those who have been abused
    as children by priests. (The Daily Telegraph) (The New York Times) (RTÉ) (Aljazeera)
  - A small plane crashes into Round Valley High School in Eagar, Arizona with at
    least two casualties. (Fox TV Phoenix)
  - Researchers use X-ray techniques to discover that Rose of Viterbo died from thrombus
    in her heart, not tuberculosis as originally thought. (BBC) (The Star) (Fox News)
  - New Zealand has a parliamentary expenses scandal, with one MP claiming for pornography.
    (BBC) (The Scotsman)
  - Two motorcyclists, from Austria and New Zealand, are killed in the same Isle of
    Man TT race. (BBC)
  - King George Tupou V proposes the use of nuclear energy in Tonga. (Canadian Business)
  - An Israeli parliamentary lobby group submits a bill, supported by 25 politicians,
    proposing that boycotts of Israel be outlawed. (The Independent)
  - Taipei pulls its films from the Shanghai International Film Festival over fears
    that China would claim them. (AP) (Asiaone)
  - Jane Fonda is awarded the Great Medal of Paris by mayor Bertrand Delanoë for her
    contribution to the city's art and culture during the Paris Cinema Festival. (BBC)
    (AFP) (NPR) (The Canadian Press)
  - Astronomers at the European Southern Observatory's Very Large Telescope (VLT)
    in Chile track the motion of gas giant Beta Pictoris b, the first time an extra-solar
    planet is tracked in orbit around a young star. (BBC)
  2010 FIFA World Cup:
  - The first African edition of the association football tournament begins in South
    Africa. (Aljazeera)
  - Nelson Mandela cancels his much anticipated public appearance at the opening ceremony
    due to the death of his great-granddaughter on her way home from the opening concert
    last night. (BBC) (The Guardian) (RTÉ) (The New York Times)
  - Technical issues disrupt Al Jazeera Sports's broadcast in the United Arab Emirates
    and much of the Arab World. (Gulf News) (The National)
  NCAA (U.S. college) conference realignment:
  - Boise State University will leave the Western Athletic Conference to join the
    Mountain West Conference. (ESPN)
  - The University of Nebraska will leave the Big 12 Conference and join the Big Ten
    Conference. (ESPN)
