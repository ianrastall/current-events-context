Date: '2010-06-12'
Source_URI: Portal:Current events/2010 June 12
Intelligence_Payload:
  Uncategorized:
  - The death toll from the Arkansas floods reaches 18. (AP via Google News)
  - The Ogaden National Liberation Front (ONLF) says the government of Ethiopia killed
    71 civilians in a military operation last month. (Aljazeera) (AFP) (Reuters Africa)
  - Thousands of Palestinians cross the Rafah Border Crossing into the Gaza Strip
    following its opening by Egypt, but Egypt prevents hundreds of activists from
    entering and Hamas continues to refuse Red Cross visits for captured Israeli soldier,
    Gilad Shalit. (Ynetnews) (Sify News)
  - Poland detains a wanted man it says is the Israeli Mossad spy who used a German
    passport in the assassination of Mahmoud al-Mabhouh, while Germany seeks his extradition.
    (Jerusalem Post) (Aljazeera) (BBC) (Press TV) (Reuters Canada)
  - Al Jazeera Sports, which has exclusive broadcasting rights for the 2010 FIFA World
    Cup in the Middle East and North Africa, says its Nilesat and Arabsat signals
    are being sabotaged in an "act of piracy", as criticism mounts across the affected
    regions and on the internet. (Aljazeera) (Gulf News) (IOL) (The National)
  - The Government of Cuba releases imprisoned paraplegic dissident Ariel Sigler on
    humanitarian grounds and transfers six others to more convenient jails. (BBC)
  - New Zealand's police find at least thirteen girls aged 12-16 who work as "active
    prostitutes" in the "young red light area" in Auckland's CBD. (The New Zealand
    Herald)
  - A school teacher who stabbed 16 young pupils and a teacher in a knife rampage
    in south China in April is sentenced to death. (Shanghai Daily)
  - The European Union promises €500 million towards the 2010/11 budget of Kenya,
    the largest economy in East Africa. (Reuters Africa)
  - Chinese Buddhist monks and archaeologists revealed what they believe to be a part
    of the skull of Siddartha Gautama, the founder of Buddhism, in east China's Jiangsu
    Province. (Xinhua)
  - UK Prime Minister David Cameron and U.S. President Barack Obama discuss America's
    oil spill problem over a telephone call. (Aljazeera) (Reuters Africa)
  - A French fishing boat rescues US teenage sailor Abby Sunderland in the Southern
    Ocean. (AAP via Yahoo News Australia)
  - Pilots for the American low-cost carrier Spirit Airlines go on strike. (AP via
    Google News)
  2010 Kyrgyzstan crisis:
  - Roza Otunbayeva, Kyrgyzstan's interim president, asks Russia to send troops to
    quell ethnic violence in the southern city of Osh. (AP via Lethbridge Herald)
    (The Guardian) (Sky News)
  - Russia declines to send troops. (AP) (Xinhua)
  - Kyrgyzstan's interim government gives shoot-to-kill powers to security forces.
    (BBC) (Arab News)
  Iran:
  - The first anniversary since the disputed presidential election, which retained
    Mahmoud Ahmadinejad, passes relatively quietly after the opposition cancels rallies
    in the face of arrests and threats by the authorities. (Jerusalem Post) (AP) (Aljazeera)
  - Iranian opposition leader, Mir Hossein Mousavi, calls off plans to take to the
    streets on anniversary of 2009 elections, citing fears of violence, but vows to
    continue the struggle. (Jerusalem Post)
  - Clashes erupt in Tehran as some protesters come out to demonstrate and dozens
    are detained as security forces disperse them. (Ynetnews) (Los Angeles Times)
  - Iranian Nobel Prize laureate, Shirin Ebadi approves of the United Nations Security
    Council sanctions against Iran's nuclear program, as Iran marks the first anniversary
    of its disputed presidential poll. (AFP)
  - President Ahmadinejad says that Iran will itself produce the 20% enriched uranium
    to power the Tehran research reactor. (Tehran Times)
