Date: '2010-06-05'
Source_URI: Portal:Current events/2010 June 5
Intelligence_Payload:
  Uncategorized:
  - A cap is placed on the leaking pipe of the Deepwater Horizon oil rig, allowing
    the spill to slow but not stop. (New York Times)
  - Israeli troops take control of the MV Rachel Corrie delivering aid to the Gaza
    Strip. (The Telegraph)
  - Actor Don Cheadle is appointed as Goodwill Ambassador for the United Nations environment
    agency during a ceremony in Rwanda to mark World Environment Day. (UN)
  - Vice President and Prime Minister of the UAE and Ruler of Dubai H.H. Sheikh Mohammed
    bin Rashid Al Maktoum met today Queen Elizabeth II of Britain on the sideline
    of the English Derby at Epsom Racecourse. (uaepm.ae)
  - The 11th Panchen Lama, the 20-year-old living Buddha visited Jokhang Temple, the
    most renowned monastery in Lhasa, capital of southwest China's Tibet Autonomous
    Region. (tibet.cn) (Xinhua) (People Daily)
  - Francesca Schiavone of Italy wins the 2010 French Open defeating Samantha Stosur
    of Australia 6-4 7-6. (Reuters)
  Horse racing:
  - Workforce wins the Epsom Derby. Jockey Ryan L. Moore also won the Epsom Oaks on
    Friday. (BBC)
  - Drosselmeyer wins the 142nd Belmont Stakes, giving trainer Bill Mott his first
    Triple Crown race victory. (AFP via Google News)
