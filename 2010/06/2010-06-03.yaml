Date: '2010-06-03'
Source_URI: Portal:Current events/2010 June 3
Intelligence_Payload:
  Uncategorized:
  - British Airways issues an apology for a photograph in a staff magazine which implied
    Osama Bin Laden had a frequent flyer boarding pass for first class. (BBC)
  - The Chinese newspaper Southern Metropolitan Daily publishes a cartoon referring
    to the Tiananmen Square protests of 1989; the image is later removed. (BBC) (Ottawa
    Citizen)
  - ITV postpones a second night of its soap opera Coronation Street due to a storyline
    which had similar themes to the Cumbria shootings. (BBC) (The Guardian)
  - The Financial Services Authority (FSA) fines JPMorgan Securities a record sum
    of £33.32 million ($48.2 million) for failure to protect the money of its clients.
    (BBC)
  - The death toll from a fire in Dhaka rises to at least 87 people, injures more
    than 100 more and leaves others trapped and in danger. (Philippine Daily Inquirer)
    (BBC) (The Mercury)
  - The death toll from rain-triggered landslides and flooding in south China's Guangxi
    Zhuang Autonomous Region rose to 44. (Xinhuanet)
  - A lion fatally wounds a South African woman working at the Chipangali Wildlife
    Orphanage in Bulawayo, the sanctuary's first human fatality since its establishment
    three decades ago. (BBC) (Mail & Guardian) (ABC News)
  - President of Haiti René Préval, speaking in the Dominican Republic, calls on donors
    to deliver on their promises to give aid at a meeting in the United States in
    March following the 2010 Haiti earthquake as only Brazil has delivered its entire
    pledge of $55 million. (Aljazeera)
  - 3 people are arrested after a man wrongly jailed for 11 years in central China
    Shangqiu City. (Sina) (CRI)
  - A judge and court clerk are shot dead at the Law Courts of Brussels, the main
    courts in the Belgian capital. (BBC) (B92) (AFP) (Xinhua)
  - Leading Congolese rights activist Floribert Chebeya is found dead in his car after
    having been summoned to a meeting with the police chief. (BBC) (IOL) (news24.com)
    (Reuters) (The Washington Post)
  - Bishop Luigi Padovese of the Roman Catholic Apostolic Vicariate of Anatolia is
    attacked at his home in İskenderun, Hatay Province and dies later in hospital.
    Mr Padovese's driver is arrested. (BBC)
  - A report by the Police Service of Northern Ireland's Historical Enquiries Team
    concludes that a British soldier who fatally shot a 41-year-old civilian in Derry
    in 1971 acted "unlawfully", as the civilian "was not carrying a firearm and he
    posed no threat to the soldiers". (BBC) (Londonderry Sentinel)
  - Christian Wulff is nominated for President of Germany by Chancellor Angela Merkel.
    (Bloomberg)
  - Dawn Purvis resigns as leader of the Progressive Unionist Party over the fatal
    shooting of Bobby Moffett. (BBC)
  - The MARS-500 project begins, with six men - three Russians, two Europeans and
    a Chinese man - entering the sealed facility in Moscow where they will spend 18
    months in isolation from the outside world. (BBC) (RIA Novosti)
  - The earliest surviving complete census of Ireland is made available online for
    the first time and reveals details on the early life of James Joyce as well as
    other famous writers and politicians. (The Irish Times) (RTÉ)
  Gaza flotilla raid:
  - United Nations Human Rights Council passed a resolution calling for an independent
    fact-finding mission into Israel's interception of a Gaza-bound flotilla. (Jewish
    Telegraphic Agency)
  - Turkey buries its citizens killed in the raid. Israel states there is "no need"
    for an international inquiry because it expects its own inquiry to meet the "highest
    international standards." President of Turkey Abdullah Gül states relations between
    the two countries would "never be the same". (BBC) (Aljazeera)
  - A United States Department of State official says a 19-year-old with dual American-Turkish
    citizenship was among those shot dead, four times in the head at close range and
    five times overall, during the raid. (The Associated Press)
  - South Africa recalls its ambassador to Israel to show what it describes as its
    "strongest condemnation of the attack". (Aljazeera)
  - An Irish citizen captured and taken to Beersheba detention camp by Israel during
    their raid on the Gaza-bound international aid flotilla is hospitalised after
    becoming ill in Tel Aviv. (The Press Association) (Lynnnews)
  - 'The Israeli Foreign Ministry says 527 of the captured activists, as well as the
    bodies of those killed, have been placed on flights bound for Turkey and Greece:
    seven more are still in hospital: three other captured activists — one man and
    two women from Australia, Ireland and Italy — remain in Israel "for technical
    reasons". (New Straits Times)'
  - The Sydney Morning Herald's chief correspondent Paul McGeough and photographer
    Kate Geraghty are among the captives to have been released. (The Sydney Morning
    Herald)
  - 37 British nationals captured by Israel during the raid begin returning home.
    (Channel 4 News)
  - Israeli protesters wave Armenian and Kurdish flags in front of the Turkish embassy
    in Tel Aviv, during a violent demonstration in which Turkish Prime Minister Recep
    Erdoğan is called "a fascist".(YnetNews)(VideoPedia)
  Somalia:
  - At least 20 people are killed and 60 injured in heavy fighting between government
    forces and Islamist militants in the capital Mogadishu. (CNN) (BBC) (Sify)
  - Somali forces from the semi-autonomous region of Puntland storm a hijacked Panamanian-flagged
    cargo ship, capturing the pirates and freeing the crew. (AfricaNews) (BBC) (Xinhua)
