Date: '2010-06-06'
Source_URI: Portal:Current events/2010 June 6
Intelligence_Payload:
  Uncategorized:
  - 41 people have been killed in fighting over the past three days in Sudan's western
    region of Darfur according to a Sudan tribal leader. (AFP)
  - An attack of rockets kills six US soldiers and wounds about a dozen others in
    Baghdad, Iraq. Two more bombs go off elsewhere but no deaths are reported. (Aljazeera)
    (CNN)
  - A passenger train, with about 60 passengers, travelling between Glasgow and Oban
    derails leaving the carriages perched over an embankment. (BBC)
  - 16 people are injured during a crush outside Makhulong Stadium in Tembisa, Johannesburg
    ahead of the 2010 FIFA World Cup warm-up match between Nigeria and North Korea,
    to which entry was free. (Aljazeera) (BBC) (AP)
  - United States Coast Guard Admiral Thad Allen, the US government's response manager
    to the Gulf of Mexico oil disaster says that BP is making progress stopping the
    oil flow, but that it is too early to call the effort a success and the spill
    may continue for several months. (CNN) (The New York Times)
  - The United Nations airlifts baby gorillas from the Democratic Republic of the
    Congo where militias log and mine their habitat and it is feared gorillas may
    become extinct by the mid-2020s. (CNN)
  - Israel rejects United Nations Secretary-General Ban Ki-moon's proposal to create
    an international committee of inquiry into the raid on Gaza flotilla raid; committee
    members would include representatives from the United States, Turkey and Israel.
    (Haaretz) (BBC)
  - Pope Benedict XVI calls for an urgent international effort to resolve tensions
    in the Middle East, at the end of a three-day trip to Cyprus. (BBC)
  - The head of police in the Democratic Republic of the Congo is suspended following
    the death of human rights activist Floribert Chebeya. (Aljazeera) (BBC) (RTÉ)
  - French fishermen off the coast of Malta repel an attempt by Greenpeace to obstruct
    their operations, sinking several Greenpeace Zodiac boats and injuring a Greenpeace
    activist. (The Malta Independent)
  - Two men bound for Somalia to join an Islamic extremist group with links to Al-Qaeda
    are arrested at Kennedy International Airport, New York City, United States. (The
    New York Times)
  - The 11th Panchen Lama hosted a religious prayer ceremony at the Razheng Monastery,
    240 kilometers away from Lhasa. (tibet.cn)
  - NASA scientists discover that Titan, one of Saturn's moons, has the necessary
    atmosphere to support life. (USA Today)
