Date: '2010-08-26'
Source_URI: Portal:Current events/2010 August 26
Intelligence_Payload:
  Arts and culture:
  - German HIV-positive pop singer Nadja Benaissa is found guilty of grievous bodily
    harm after transmitting HIV to a man who had unprotected sex with her without
    her telling him of her condition. (New York Times)
  Business and economy:
  - Mass protests by civil servants in South Africa continue, demanding improved pay
    and benefits. (Al Jazeera)
  Disasters:
  - Two Greek F-16 planes collide mid-air south of Crete; 2 out of 3 pilots are rescued.
    (Athens News Agency) (The Sydney Morning Herald)
  - 2010 Pakistan floods
  - Pakistan orders nearly half a million people in towns including Sujawal, Mirpur
    Bathoro and Daro threatened by floods to evacuate. (AFP via Google News)
  - The Pakistan Taliban threatens to kidnap foreign aid workers. (The Telegraph)
  - South Korea offers emergency aid to North Korea for floods. (AFP via Google News)
  - The United States Food and Drug Administration finds that feed given to hens at
    Wright County Egg and Hillandale Farm led to a salmonella outbreak in eggs. (CNN)
  International relations:
  - Former International Atomic Energy Agency director Olli Heinonen claims that Iran
    has stockpiled enough low-enriched uranium for one to two nuclear bombs. (Haaretz)
  - Israel asks Germany to arrest Klaas Carel Faber, a Nazi war criminal who killed
    20 Jews at Westerbork concentration camp. (Haaretz)
  - The New York Times claims that Mohammed Zia Salehi, an official of Afghanistan's
    Karzai administration accused of graft is on the United States Central Intelligence
    Agency payroll. (The New York Times)
  - Ahmad Vahidi, Iran's Minister of Defense, offers military assistance to Lebanon
    following a request from Hezbollah. (AFP via Lebanon Daily Star)
  - South Korea's presidential office claims that North Korean leader Kim Jong-il
    is visiting China for the second time this year. (Yonhap) (Wall Street Journal)
    (Al Jazeera)
  Law and crime:
  - Russian police arrest activists from Amnesty International and remove volunteers
    from Greenpeace Russia and the ONE Campaign at a U2 concert in Moscow. (BBC) (RIA
    Novosti) (Business Week)
  - An independent counsel finds that the Governor of New York David Paterson gave
    misleading evidence about intending to pay for free tickets that he obtained to
    last year's baseball world series and refers the issue to the Albany District
    Attorney for possible prosecution for perjury. (New York Times)
  - Mexico asks its Latin American neighbours to help identify the 72 people found
    murdered in Tamaulipas. (AFP via The Age)
  Politics:
  - Solomon Islands MP Steve Laore dies, reducing newly elected Prime Minister Danny
    Philip's parliamentary majority to just one. (Agence France Presse)
  - Democratic Party of Japan powerbroker Ichirō Ozawa announces a leadership challenge
    to the Prime Minister of Japan Naoto Kan with a ballot to be held on September
    14. (Reuters)
  Science:
  - Heavy rains wash red argillite sediment from old sedimentary rock into a river
    at Waterton Lakes National Park in Alberta, causing Cameron Falls to turn red.
    (Daily Mail)
