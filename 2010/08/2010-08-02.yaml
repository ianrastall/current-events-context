Date: '2010-08-02'
Source_URI: Portal:Current events/2010 August 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Jordanian civilian is killed and three others are wounded as a Grad rocket launched
    from the Sinai hits the city of Aqaba. Four other rockets land in open areas in
    the Gulf of Aqaba. Jordan, Israel, Egypt and the United States condemn the attack.
    (YnetNews) (Haaretz)
  - The United Nations establishes a panel with an Israeli and Turk amongst its members
    to investigate the Gaza flotilla raid in May. (AFP via Google News)
  Arts and culture:
  - An antiques dealer is imprisoned for handling a copy of the First Folio by poet
    and playwright William Shakespeare, though cleared of actually stealing it, in
    the UK. (BBC)
  Business and economy:
  - Cuban President Raúl Castro pledges to ease state control of the economy. (BBC)
    (People's Daily) (Angola Press)
  Disasters:
  - Hundreds of new wildfires erupt in Russia as fire has damaged or destroyed 27
    towns and villages. (AP via Boston Globe)
  - A fire at a retirement home in Nigel, Gauteng, South Africa, kills 18 people.
    (BBC) (Times Live South Africa)
  - Eleven people are killed and four survive after a passenger plane crashes in Russia's
    Krasnoyarsk territory. (RIA Novosti) (Times of India)
  - The Government of the United States claims that nearly 5 million barrels of oil
    have spilt from the Deepwater Horizon oil spill in the Gulf of Mexico, making
    it the largest accidental maritime oil spill ever. (New York Times)
  - At least 33 people drown after a boat capsizes on Lake Albert in Uganda. (UPI)
    (AFP)
  International relations:
  - The European Union announces it will end its mission to reform security forces
    in Guinea-Bissau due to the deteriorating situation in the country. (BBC) (News24)
  - The Government of Pakistan summons the British High Commissioner to Islamabad
    for a "dressing down" by Foreign Minister Shah Mehmood Qureshi over remarks made
    by the British Prime Minister David Cameron on Pakistan "looking both ways" on
    terrorism. (AFP via Google News) (The Guardian) (BBC)
  Law and crime:
  - The trial of Malaysian opposition leader Anwar Ibrahim on sodomy charges is deferred
    until August 9. (CNN)
  - A drunk man on a tractor kills 11 people and injures many others in a rampage
    in northern China. (Reuters Africa) (BBC) (The Hindu)
  Politics:
  - Politicians in Nepal fail to elect a new Prime Minister for the third time after
    no candidate secured a majority. (Kantipur) (BBC) (Indian Express)
  - Several people are killed during protests in Indian-administered Kashmir after
    the worst anti-government violence in two years. (The Hindu) (BBC)
  - A Greek truck drivers strike ends with the situation expected to get back to normal
    quickly. (AP via The Australian)
  - The United States House of Representatives ethics committee charges California
    Democrat Maxine Waters with breaking ethics rules. (USA Today)
  Science:
  - The Census of Marine Life is released after 10 years of study of the worlds oceans
    showing that there are 230,000 species of animal living there. (Fox News), (The
    Guardian)
  Sports:
  - Lithuania wins the European U-18 basketball championship. (Ballineurope)
  - Former World No. 1 professional tennis player Ivan Lendl announces a return after
    a 16-year break. (BBC Sport)
  - Car driver Michael Schumacher apologises to Rubens Barrichello for what Barichello
    describes as "the most dangerous manoeuvre against me I have ever known", which
    occurred during the 2010 Hungarian Grand Prix. (The Guardian)
