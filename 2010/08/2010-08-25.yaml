Date: '2010-08-25'
Source_URI: Portal:Current events/2010 August 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - A military spokesperson claims that a suicide bomber was shot and killed when
    he tried to drive a truckload of explosives into a Mauritanian army barracks in
    Néma near the border with Mali. (AP via Washington Post)
  - A string of attacks in Iraq targeting Iraqi security forces leaves at least 56
    people dead. (AP via Washington Post), (New York Times)
  Battle of Mogadishu (2010):
  - Clashes continue in Mogadishu after a rebel advance on the presidential palace
    is repelled. (Reuters)
  Arts and culture:
  - Actor Paul Hogan is banned from leaving Australia until he settles a multi-million
    dollar tax bill. (The Australian)
  - Archaeologists working at the Umm El-Kharga Oasis, 200km south of Cairo, discover
    a 3,500-year-old ancient Egyptian settlement. (ABC News America)
  Disasters:
  - The flight data recorder from Henan Airlines Flight 8387 is found. (BBC)
  - A school bus collides with a train in Cape Town, South Africa, killing at least
    nine pupils and injuring five others. (AP via The Globe and Mail)
  - At least 20 people are killed in Democratic Republic of the Congo after a Filair
    plane crashes near Bandundu. (BBC),(Yahoo)
  - Hurricane Danielle strengthens to Category 2 on the Saffir–Simpson Hurricane Scale
    and heads towards Bermuda. (AP via Google News)
  International Relations:
  - The former President of the United States Jimmy Carter arrives in North Korea
    to negotiate for the release of United States citizen Aijalon Gomes. (CNN)
  - Wikileaks publishes a CIA analysis claiming that the United States could be perceived
    as an "exporter of terrorism". (Washington Post)
  Law and Crime:
  - Mexican Naval Infantry find 72 corpses at a remote ranch in San Fernando, Tamaulipas,
    near the border with the US state of Texas. The victims were economic migrants
    from Central America and South America believed to be murdered by a drug cartel.
    (Reuters), (Daily Mail)
  - The Royal Canadian Mounted Police arrests two suspects in Ottawa for alleged terrorism
    offences. (CTV)
  Politics and elections:
  - Danny Philip, an MP from Rendova Tetepare, is elected the new Prime Minister of
    the Solomon Islands following the 2010 general election. Philip narrowly defeated
    Steve Abana with 26-23 vote total. (Solomon Times)
  - Craig Langdon resigns as an Australian Labor Party MP of the Victorian Legislative
    Assembly representing Ivanhoe. (AAP via Sydney Morning Herald)
  Science:
  - A solar system is discovered for the star HD 10180 including a possible planet
    1.4 times the size of the Earth. (Christian Science Monitor) (New York Times)
