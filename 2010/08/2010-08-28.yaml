Date: '2010-08-28'
Source_URI: Portal:Current events/2010 August 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Pakistan
  - Suspected United States missiles strike two cars carrying militants in Pakistan's
    Kurram Valley resulting in at least four deaths. (AP via Fox News)
  - A heavy exchange of gunfire erupts outside a Pakistan security forces office in
    Peshawar near the United States consulate. Two hostages were taken but eventually
    freed. (AP via MSNBC), (DNA India), (Al-Jazeera)
  - Suspected Taliban insurgents attack two coalition allied military bases in eastern
    Afghanistan; both attacks are repelled by coalition forces, killing 24 militants
    while taking no casualties. (BBC)
  Business and economy:
  - Cuba eases property laws, allowing foreign investors to lease government land
    for up to 99 years. (AP) (Al Jazeera)
  International relations:
  - China and India state that the military ties between the two countries will not
    be affected despite the recent visa dispute.
  - The International Criminal Court reports Kenya to the United Nations Security
    Council over a visit by Sudanese President Omar al-Bashir to the country. (BBC)
    (The Standard)
  - Rwanda threatens to limit cooperation with the United Nations after a report accused
    the country of war crimes in neighbouring Democratic Republic of the Congo. (AFP)
  - Iran answers Lebanon's call to help fund the Lebanese Army after the United States
    threatened to cut off funds following the 2010 Adaisseh incident.
  - Mount Sinabung in Sumatra, Indonesia, erupts. Thousands of people evacuated.(The
    Jakarta Post) (Wikinews)
  Law and crime:
  - Iran says no final decision has been made on the stoning of Sakineh Mohammadi
    Ashtiani, who was convicted of adultery. (AFP) (Iranian Students' News Agency)
  Politics:
  - Former President of Madagascar Marc Ravalomanana is sentenced in absentia to life
    in prison with hard labour for ordering the killing of opposition supporters.
    (BBC) (Reuters Africa)
  - A large gathering of people attend Glenn Beck's "Restoring Honor" rally at the
    National Mall in Washington, D.C. (USA Today)
  Sport:
  - Four members of the Pakistan national cricket team are allegedly involved in a
    betting scandal including captain Salman Butt fast bowlers Mohammad Asif and Mohammad
    Amir and wicketkeeper Kamran Akmal during their current tour of England. (Daily
    Mail)
