Date: '2010-08-29'
Source_URI: Portal:Current events/2010 August 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eighty thousand people rally in Hong Kong after last week's fatal tourist coach
    hijacking hostage crisis in the Philippines. (Aljazeera) (BBC) (Bangkok Post)
    (The Independent)
  - At least 19 people are killed in a fire fight between President of Chechnya Ramzan
    Kadyrov's personal guards and protesters in Tsentoroi. (Aljazeera)
  - A Palestinian man is killed by the collapse of a smuggling tunnel under the border
    between Egypt and the Gaza Strip. (AFP via Google News)
  - Afghanistan
  - 7 American soldiers are killed in fighting in Afghanistan over the weekend. (AP
    via MSNBC)
  - Gunmen kill 5 campaign workers for a female candidate in the Afghan parliamentary
    election, 2010. (Reuters)
  - The Catholic Church admits that during a meeting in April Godfried Danneels, the
    retired Catholic leader in Belgium, advised a person who had experienced abuse
    to remain silent until his abuser Roger Vangheluwe, the Bishop of Bruges, retired.
    (BBC)
  Arts and Culture:
  - 62nd Primetime Emmy Awards
  - Mad Men wins the Emmy for Outstanding Drama Series. (Los Angeles Times)
  - Modern Family wins the Emmy for Outstanding Comedy Series. (Los Angeles Times)
  - The final episode of Last of the Summer Wine airs on BBC One after 37 years. (The
    Guardian) (The Daily Telegraph) (Daily Mail)
  - A small semi-train is driven through the streets of Gaza after six months of construction,
    to the delight of children living in harsh conditions. (Xinhua)
  Disasters:
  - Floods worsen in Pakistan as more towns are threatened. (Press TV)
  - 1 person dies as the Sumatran volcano Sinabung prompts a red alert by erupting
    for the first time in over 400 years, leading to Indonesia evacuating thousands
    of people. (ABC News Online) (AFP via Google News) (DPA via Monsters and Critics)
  - At least 38 people, including the driver, are killed in Ecuador when a bus falls
    down a cliff outside the capital Quito, reportedly after the driver fell asleep.
    (Reuters Africa) (Sky News Australia)
  International relations:
  - The Palestinian Authority launches a United States-funded advertising campaign
    supporting peace talks with Israel. (Jerusalem Post)
  Law and crime:
  - Indonesian detainees riot and light a fire at the Northern Immigration Detention
    Centre in Darwin, Australia. (ABC News Online), (AFP via Yahoo! News)
  - Unidentified gunmen assassinate Marco Antonio Leal Garcia, the mayor of the small
    town of Hidalgo in Tamaulipas, Mexico. (AFP via Sydney Morning Herald)
  Politics:
  - Afghanistan's former deputy attorney-general Fazel Ahmed Faqiryar is sacked over
    his refusal to obstruct corruption investigations into senior government officials;
    Faqiryar is critical of President Hamid Karzai. (Aljazeera)
  - Racism in Australia is shown to be subsiding as the country elects its first indigenous
    parliamentarian, Ken Wyatt. (BBC) (The Independent) (The Age)
  - President of the United States Barack Obama pledges to restore the Gulf Coast
    on the fifth anniversary of Hurricane Katrina in a speech in New Orleans. (Reuters
    via Toronto Sun) (Aljazeera)
  Sport:
  - A man is arrested in connection to an alleged sports betting scam centered on
    the current Test match at Lord's Cricket Ground in London between England and
    Pakistan. (BBC)
  - David Lekuta Rudisha lowers the 800 metres world record to 1:41.01 seconds. (IAAF)
