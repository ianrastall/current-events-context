Date: '2010-08-24'
Source_URI: Portal:Current events/2010 August 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two Catalonian aid workers kidnapped in Mauritania by Al-Qaeda Organization in
    the Islamic Maghreb return home. (Al Jazeera) (Reuters)
  - Foreign human rights groups accuse Rwandan and Congolese rebels of gang-raping
    nearly 200 women and some baby boys over four days within miles of a U.N. peacekeepers'
    base in the village of Bunangiri, North Kivu province, Democratic Republic of
    the Congo. (Al Jazeera) (CNN) (AP) (Reuters)
  - A lance-corporal in the Australian Army is killed in fighting with the Taliban
    in Afghanistan's Oruzgan province. (News Limited)
  Yemeni al-Qaeda crackdown:
  - 80,000 people flee the southern Yemeni city of Lawdar after clashes between Al-Qaeda
    linked forces and government troops killed several people. (Al Jazeera)
  Battle of Mogadishu (2010):
  - Al-Shabaab militants storm the Hotel Muna, close to the Presidential palace Villa
    Somalia in Mogadishu, killing at least 33 people including several MPs. (euronews)
    (BBC) (AFP), (New York Times)
  Arts and culture:
  - American actor Lindsay Lohan is released from a rehabilitation centre 22 days
    into a three month program. (ABC News)
  Business and economics:
  - India rejects plans by mining group Vedanta to extract bauxite in Orissa due to
    environmental concerns. (Times of India) (BBC)
  - Cairn Energy discovers gas off the coast of Greenland, amid protests from Greenpeace
    demanding it halt its oil operations. (BBC) (AFP)
  - Stocks on the Philippine Stock Exchange fall the day after the Manila hostage
    crisis. (Businessweek)
  Disasters:
  - Henan Airlines Flight 8387, carrying 91 people on board, overshoots the runway
    and bursts into flames in Yichun City in Heilongjiang, northeastern China; at
    least 43 people are reported dead. (AP) (Xinhua) (BBC)
  - Oxfam warns of a "double disaster" following flooding compounding a recent drought
    and food crisis in Niger. (AFP) (BBC)
  - Agni Air Flight 101, a small plane carrying fourteen people, crashes in Nepal's
    Makwanpur District with no survivors expected. (Kantipur) (CNN)
  - Rescue efforts start to free the men trapped following the 2010 Copiapó mining
    accident. (ABC News America)
  Law and crime:
  - The United States Department of Justice states that it will appeal a decision
    by United States federal judge Royce C. Lamberth to block an executive order by
    President Barack Obama to expand embryonic stem cell research. (BBC)
  Politics and elections:
  - Samantha Cameron, wife of the British Prime Minister David Cameron, gives birth
    to the couple's fourth child, a girl. (Telegraph) (BBC)
  - John McCain wins the Republican Party primary election to become the nominee in
    the US Senate election in Arizona. (Fox News)
