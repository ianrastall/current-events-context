Date: '2016-03-30'
Source_URI: Portal:Current events/2016 March 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - Blasts and gunfire are reported in Tripoli. (Reuters)
  - Naxalite–Maoist insurgency
  - At least seven Central Reserve Police Force (CRPF) personnel are killed in an
    IED attack on their vehicle in the Indian state of Chhattisgarh's Dantewada district.
    Naxalite insurgents are suspected to have been behind the attack. (International
    Business Times)
  Business and economy:
  - Taiwanese electronics company Foxconn agrees to buy 60% of the Japanese Sharp
    Corporation for 389 billion yen ($3.5 billion). (Bloomberg)
  Disasters and accidents:
  - Thailand and neighbouring countries suffer from the worst drought in decades as
    an El Niño-induced water shortage reduces reservoirs to critical levels. (Al Jazeera)
  - At least nine people are injured in severe storms that spawned multiple tornado
    touchdowns in northeastern Oklahoma and sections of the Southwestern United States.
    One patient is in critical condition; the others suffered serious injuries, according
    to the Emergency Medical Services Authority. Parts of Texas, Louisiana, and Arkansas
    are also impacted. A flash flood watch has been issued through Thursday evening.
    Two (2) to 4 inches of rain is expected, with perhaps 6 inches in some locations.
    (AP)
  Health and medicine:
  - A new study by researchers at McGill University and the University of California,
    Los Angeles, finds that each additional month a woman has paid maternity leave
    is associated with decreased infant mortality by more than 10 percent. Researchers
    noted that paid maternity leave reduces stress because of the guarantee of income
    and job security, increases the chances for breastfeeding and other infant care,
    and allows a mother to seek more medical attention for herself. (UPI) (PLOS Medicine)
  - The United States Food and Drug Administration announces it has relaxed its official
    requirements regarding the use of the abortion drug Mifeprex (RU-486). The current
    guidelines were based on 1990s medical evidence. Changes include reducing the
    number of physician visits required by abortion-seeking women, reducing drug dosage,
    and allowing women to take the drug for three weeks longer -- now a total of 70
    days. (UPI)
  - Air pollution in Mexico City
  - Mexico City, facing the capital's worst air-quality crisis in over a decade, issues
    a temporary order that all cars remain idle one day a week. Today, authorities
    report a pollution index of 108 (bad) after low readings during Holy Week. Vehicles
    will also be forced from the roads one Saturday a month. The measure will begin
    next Tuesday, April 5, and run until Thursday, June 30, 2016. Starting July 1,
    improved technology will be in place at smog-check centers where all vehicles
    must be tested every six months. (AP via Fox News)
  International relations:
  - The Wallenberg family files an application to formally declare Swedish diplomat
    Raoul Wallenberg (born in 1912) to be dead. Wallenberg saved the lives of thousands
    of Jews in World War II only to disappear at the hands of the Soviet forces. (Times
    of Israel)
  - Russia–Ukraine relations
  - The Ukrainian parliament votes to ban all Russian films released after January
    1, 2014, saying the move is aimed at improving “national security"; more than
    430 Russian films and TV series fall under the new measures. Last month, the State
    Committee in Television and Radio-broadcasting in Ukraine removed 15 Russian TV
    channels from being broadcast in Ukraine. (RT)
  - U.K. Prime Minister David Cameron, at the upcoming Nuclear Security Summit in
    Washington, D.C., will announce a three-way deal with the United States and Euratom,
    the European Union nuclear agency, to turn nuclear waste into medical isotopes
    to help fight cancer. (Bloomberg)
  Law and crime:
  - A Bangladesh Court issues an arrest warrant, the second one so far, for former
    Prime Minister Khaleda Zia and 27 opposition Bangladesh Nationalist Party members
    over political violence, mostly petrol-bomb attacks, that occurred during anti-government
    protests last year that killed at least 120 people. (Al Jazeera)
  - EgyptAir Flight 181
  - A Larnaca, Cyprus, court orders that 59-year-old Seif Eddin Mustafa, who was arrested
    by Cypriot police yesterday, remain in local police custody for eight days to
    assist Cyprus's own investigation. Mustafa faces charges of hijacking, illegal
    possession of explosives, kidnapping, and threats to commit violence. It's unclear
    if Mustafa had any explosives; the bomb belt he wore was fake, and officials are
    waiting for testing results on unidentified liquids found among his possessions.
    (AP via The Daily Courier)
  - Egypt General Prosecutor Nabil Sadek formally requests Mustafa's extradition from
    Cyprus. (Reuters)
  Politics and elections:
  - Myanmar general election, 2015
  - The government of Pakistan warns that it will push to clear the Islamist protests
    occurring in Islamabad. Protests have broken out in the capital and other cities
    ever since Mumtaz Qadri was executed last February for his role in killing Punjab
    governor Salmaan Taseer in 2011 because he opposed Pakistan's blasphemy laws.
    (Radio Free Europe/Radio Liberty)
  - Second Libyan Civil War
  - The opposition controlled National Assembly of Venezuela passes an amnesty bill
    that could potentially free over 70 opposition leaders and activists jailed during
    protests last year, including prominent leader Leopoldo López. (BBC)
  2016 United States presidential election:
  - The National Border Patrol Council (NBPC), which organizes some 16,500 border
    patrol agents, endorses Donald Trump for President of the United States, NBPC's
    first-ever endorsement in a presidential election. (CNN)
  - In Myanmar's capital Naypyidaw, Htin Kyaw is sworn in by House Speaker Mahn Win
    Khaing Than as the first civilian president in 54 years. Htin Kyaw, a close aide
    to Aung San Suu Kyi, takes power from former general Thein Sein. (Daily Mail)
  - The United Nations-backed Libyan Presidential Council arrives in Tripoli despite
    warnings by hardliners opposed to any unity government that they will attempt
    to keep them out of the city. (The Guardian)
  - Venezuelan President Nicolás Maduro vows to veto this amnesty bill. The opposition
    can override the veto since it holds a supermajority in the National Assembly.
    Maduro can also send the bill to the Supreme Tribunal to determine its constitutionality.
    (UPI)
  - The opposition plans to generate a recall referendum that would ask voters if
    President Maduro should be removed from office. The Constitution states a recall
    referendum can be held once the president has served half of his six-year term
    (Maduro became President on April 19, 2013) and at least 20 percent of registered
    voters sign the petition. (UPI²)
  Sports:
  - Two Russian cyclists, former world champion Anastasia Chulkova and Pavel Yakushevskiy,
    test positive for meldonium. (AP)
  - Three-time Kentucky Derby winning jockey Calvin Borel announces his retirement.
    (Louisville Courier-Journal)
