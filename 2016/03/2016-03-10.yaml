Date: '2016-03-10'
Source_URI: Portal:Current events/2016 March 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War spillover in Lebanon
  - Clashes between the Lebanese Army and jihadist militants near the village of Ras
    Baalbek in northeast Lebanon, close to the Syrian border, leaves one soldier and
    eight militants dead. (AFP via Daily Mail)
  - War in Afghanistan (2001–2021)
  - Dozens of militants are killed in fighting between rival Taliban factions in Afghanistan's
    western Herat Province. (The Guardian)
  Disasters and accidents:
  - Two days of heavy rain in the American state of Louisiana has caused at least
    three deaths and caused more than a thousand people to evacuate their homes. (Fox
    News)
  International relations:
  - United States–Venezuela relations
  - Venezuela recalls its chargé d'affaires from its embassy in Washington, D.C. after
    U.S. President Barack Obama renewed a decree imposing sanctions on several top
    Venezuelan officials. (Reuters)
  - North Korea–South Korea relations
  - North Korea fires two missiles into the Sea of Japan and announces its intention
    to liquidate all remaining South Korean assets on its territory. (AFP via Yahoo!
    News)
  Law and crime:
  - Former Russian Press Minister Mikhail Lesin was found by an American investigation
    to have died of blunt force injuries in Washington, D.C. in November last year.
    (Reuters)
  - A jury in a U.S. federal court in Scranton, Pennsylvania says that Cabot Oil must
    pay plaintiffs $4.2 million in damages that resulted from Cabot's fracking operations
    in the northeast part of that state. (Reuters)
  Politics and elections:
  - 'Three candidates are put forward to become President of Myanmar: Htin Kyaw and
    Sai Nyunt Lwin from the National League for Democracy and Khin Aung Myint from
    the military. (ABC News Australia)'
  - The Irish Dáil Éireann (parliament) fails to elect a new taoiseach (Prime Minister)
    with incumbent Enda Kenny carrying on as a caretaker. (BBC)
