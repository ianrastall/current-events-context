Date: '2016-03-16'
Source_URI: Portal:Current events/2016 March 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - 2016 Peshawar bus bombing
  - A bomb detonates in a bus carrying government employees in Peshawar, Pakistan,
    killing 15 and injuring at least 54. (AP via CBS)
  - Boko Haram insurgency
  - 2016 Maiduguri suicide bombings
  - Two female suicide bombers detonate their explosives at a mosque during morning
    prayer on the outskirts of Maiduguri, Nigeria, killing 22 and injuring 18. (AP
    via New York Times) (Newsweek)
  Disasters and accidents:
  - The Washington Metro, a commuter rail system which transports nearly 1 million
    passengers across the Washington, D.C. metropolitan area per day, shuts down to
    allow for an emergency inspection of 600 electrical cables, following two fires
    occurring over the past 14 months. Officials say the system is scheduled to resume
    service by the following morning, though individual Metro lines or stations could
    remain closed indefinitely if problems are identified. (The Washington Post) (The
    Washington Times) (CBS News)
  Health and medicine:
  - Zika virus outbreak
  - 'Cuban officials announce they have detected the first case of the Zika virus
    transmitted inside the country: a 21-year-old Havana woman who had not traveled
    abroad. Cuba has reported a handful of travel-associated Zika cases, all believed
    imported from Venezuela. (Medical Xpress) (Outbreak News Today)'
  International relations:
  - North Korea–United States relations
  - North Korea sentences American Otto Warmbier, a 21-year-old from Cincinnati, Ohio,
    studying at the University of Virginia, to 15 years hard labor for removing a
    political poster from a hotel. (The Guardian) (The Washington Post)
  - President Barack Obama orders new sanctions against North Korea in response to
    'illicit' nuclear, missile tests. (AP)
  - Syrian Civil War, Syrian peace process
  - The delegation of the government of Syria rules out starting any direct talks
    with the opposition delegation as U.N. sponsored peace talks enter a third day
    in Geneva. (BBC)
  - Kurdish officials say they plan to declare a federal region in northern Syria
    after being excluded from peace talks in Geneva aimed at ending the 5-year-old
    conflict. The move will combine three Kurdish-led autonomous areas into a federal
    system in what is set to alarm neighboring Turkey. (USA Today)
  - Turkey–United Kingdom relations
  - Turkey deports British academic Chris Stephenson, a computer science lecturer
    at Bilgi University in Istanbul, who is charged with making terrorism propaganda.
    The UK Foreign Office said it was providing assistance; there has been no comment
    from Turkish officials. (AP)
  Law and crime:
  - The travel ban for former Pakistani President Pervez Musharraf is lifted by the
    Supreme Court of Pakistan. Musharraf is currently facing treason charges in Pakistan.
    (Reuters)
  - PKK rebellion (2015–present)
  - Authorities in Turkey arrest three academics on charges of "terrorist propaganda"
    after they called for an end to security operations in the country's Kurdish-majority
    southeast. (Radio Free Europe/Radio Liberty)
  - Attacks on humanitarian workers
  - The U.S. military disciplines more than a dozen personnel for mistakes that led
    to the bombing of a Médecins Sans Frontières (Doctors Without Borders) hospital
    that killed 42 people in Afghanistan last October. No criminal charges are pending.
    The partially redacted investigation report is expected to be made public shortly.
    (AP)
  Politics and elections:
  - Republican Party presidential debates and forums, 2016
  - Donald Trump announces he will skip the Fox News GOP presidential debate between
    the three remaining candidates on March 21, saying he thinks "we had enough of
    debates." (Newsmax)
  - Ohio Governor John Kasich says he will also skip the debate if Donald Trump follows
    through on his vow not to attend. (The Hill)
  - Fox News cancels the Republican debate scheduled for Monday in Salt Lake City,
    Utah. The Utah Republican Party has received more than 50,000 ticket requests.
    Utah Lieutenant Governor Spencer Cox is upset Trump, "...is snubbing the state
    of Utah." According to Deseret News, Trump is in fourth place in Utah polls. (The
    Salt Lake Tribune) (Deseret News)
  - 2016 United States presidential election
  - Barack Obama Supreme Court candidates
  - Brazil's ex-president Luiz Inácio Lula da Silva takes Cabinet post as chief of
    staff to Brazil's current president, Dilma Rousseff, thereby gaining legal shield.
    Only the Brazilian Supreme Court can try presidential Cabinet members for crimes.
    (The New York Times) (UPI)
  2016 Republican Party presidential primaries:
  - Senior GOP rules committee member Curly Haugland says that "We (RCN committee
    members) choose the nominee, not the voters". (Washington Post)
  - In the Missouri Primary, media outlets have held off calling yesterday's races
    due to the extremely close results. Donald Trump and Hillary Clinton lead in their
    party's vote, but by just two-tenths of 1 percent ahead of Ted Cruz and Bernie
    Sanders, respectively. Missouri law states a recount may be requested if the margin
    is less than half a percentage point. Either Cruz or Sanders or both can request
    a recount. These results are unofficial, until they’re certified by the Missouri
    Secretary of State, which reportedly could take up to four weeks. Trump leads
    by about 1,700 votes and Clinton's edge is about 1,500. The state also needs to
    count the remaining absentee and provisional ballots; the deadline for overseas
    ballots is noon Friday. (The Hill) (CNN)
  - President Barack Obama nominates Merrick Garland to replace Antonin Scalia on
    the Supreme Court of the United States. (BBC) (CNN)
  - Protests erupt outside the presidential palace in Brasília, and on São Paulo's
    main Avenue Paulista. on news of Luiz Inácio Lula da Silva's appointment as President
    Rousseff's chief of staff. Federal Judge Sérgio Moro says taped conversations
    between the two show Lula and Rousseff, apparently, trying to influence the investigation.
    (Reuters)
  Science and technology:
  - Scientists release a small flock of pigeons, dubbed "The Pigeon Air Patrol", carrying
    tiny backpacks to monitor London's air quality during a period of moderate to
    high pollution. The backpacks contain sensors used to measure nitrogen dioxide
    and ozone levels. (Engadget) (The Guardian)
  Sport:
  - The PGA of America announces it is discontinuing the PGA Grand Slam of Golf, a
    special postseason event among the year's winners of the four major championships
    of regular men's golf. This year, it was set to be held at Trump National Golf
    Club in Los Angeles, California. The 2015 event was cancelled after the PGA decided
    to move the exhibition contest from the same Trump Club, and they couldn't find
    a replacement course golf course with suitable dates. (AP) (PGA) (ESPN)
