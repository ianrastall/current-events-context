Date: '2016-03-03'
Source_URI: Portal:Current events/2016 March 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - DHKP/C insurgency in Turkey
  - Istanbul police, after a standoff, shoot and kill two women from the Revolutionary
    People’s Liberation Army-Front suspected of ambushing a riot police station in
    the Bayrampaşa neighborhood on the city’s European side. Two policemen were injured.
    (The Washington Post)
  Disasters and accidents:
  - A nationwide power outage hits Syria. The Syrian government says shortly before
    the power outage, militants had hit part of a power-generating station with rockets
    in the city of Hama, though it hasn't said whether this damage was linked to the
    nationwide outage. Also, it isn't clear how many people are affected by the power
    outage as many cities outside of the government's control already weren't being
    served by the government-run power grid. (CNN)
  - At least 31 people are killed in Kwekwe, Zimbabwe, when a bus, with a blown front
    tire, switches lanes and slams into an oncoming public transport minibus. (AP
    via Fox News)
  International relations:
  - North Korea and weapons of mass destruction
  - South Korea claims that North Korea has launched several short range missiles
    into the Sea of Japan. (Yonhap) (AFP via Yahoo! News)
  - North Korean leader Kim Jong Un orders nuclear weapons to be ready for use at
    any time. (Sky News)
  - Taliban insurgency
  - Sartaj Aziz, a top foreign affairs adviser for Pakistan, publicly admits for the
    first time that the Afghan Taliban's leadership is living in the country and that
    Islamabad has "considerable influence" over them. (Radio Free Europe/Radio Liberty)
  - Russian military intervention in Ukraine (2014–present)
  - The United States extends sanctions against Russia over its military intervention
    in Ukraine. (ABC News)
  - Jordan–United States relations
  - The United States delivers eight UH-60 Black Hawk helicopters to Jordan to help
    the Jordanian Armed Forces defend the country from the threat of ISIL. (Reuters)
  Law and crime:
  - Honduran indigenous environmental activist Berta Cáceres is assassinated in her
    home in La Esperanza in Intibucá Department. (Telesur)
  - A riot at a prison in Guyana's capital Georgetown leaves at least 16 people dead.
    The riot began when inmates angered by a search that led to the confiscation of
    mobile phones set fires in one part of the prison. (Reuters)
  Politics and elections:
  - New Zealand flag debate
  - Voting begins for the second stage of New Zealand's flag referendum with the current
    flag going up against the design chosen on the first stage of the referendum.
    Voting will end on March 23 with polling showing the current flag is favoured
    to win. (BBC) (CNN)
  - 2014–16 Venezuelan protests
  - Violence breaks out in the Venezuelan city of San Cristóbal between students and
    police after a supreme court ruling curtailed the power of the opposition-controlled
    National Assembly to review government appointments of Supreme Court justices.
    (BBC)
  - Republican Party presidential debates, 2016
  - The eleventh Republican Party presidential debate of the election cycle takes
    place at the Fox Theatre in downtown Detroit, Michigan, airing live on Fox News
    Channel. The debate features four Republican candidates, Donald Trump, Ted Cruz,
    Marco Rubio and John Kasich. Ben Carson was also invited to the debate but he
    said that he would not be attending. An estimated 16.9 million viewers watched
    the debate, 5.5 million of them adults aged 25-54, making it the most watched
    debate since December 2015. (Fox News) (CBS Local) (Hollywood Reporter)
  Science and technology:
  - Astronomers use the Hubble Space Telescope to discover GN-z11, the remotest galaxy
    yet discovered. (ABC News)
