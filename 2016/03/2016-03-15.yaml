Date: '2016-03-15'
Source_URI: Portal:Current events/2016 March 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - American-led intervention in Syria
  - A senior Iraqi intelligence official, who is also a Syrian activist leader, says
    Islamic State of Iraq and the Levant commander Omar al-Shishani (Omar the Chechen,
    real name Tarkhan Tayumurazovich Batirashvili) died of wounds suffered in a March
    4 U.S. airstrike near the Syrian town of Al-Shaddadah. The U.S. State Department
    offered up to $5 million for information on his whereabouts. Amaq news agency,
    which supports ISIL, says Shishani is neither dead nor hurt. (New York Times)
    (Chicago Tribune) (Reuters via Swiss Broadcasting Corporation)
  - 2016 Brussels police raids
  - Belgian security forces hunt gunmen linked to the November 2015 Paris attacks
    following a raid on a house in Brussels which left four officers wounded and one
    suspect dead after an exchange of gunfire. Roads have been blocked off in the
    Belgian capital's southern suburb of Forest as one or more gunmen remain at large.
    (The Independent) (Irish Times)
  - Saudi Arabian-led intervention in Yemen
  - Airstrikes reportedly kill at least 41 people and wound 75 others in Yemen's northern
    Hajjah Governorate. (Reuters)
  Arts and culture:
  - Pope Francis announces that Mother Teresa will be canonized on September 4. (The
    Guardian)
  Business and economy:
  - Brookfield Asset Management Inc and Qube Holdings join forces to make a A$ 9.1
    billion bid for Australian freight logistics company Asciano Limited. (Bloomberg)
  - Linn Energy, an oil-and-gas producer with about $10 billion in debt, says a bankruptcy
    filing may be unavoidable. The company was founded in 2003 and had its initial
    public offering in 2006. (Reuters)
  Disasters and accidents:
  - 2016 Ecuadorian Air Force Arava crash
  - An Ecuadorian Air Force IAI Arava 201 crashes near Shell Mera in a mountainous
    part of eastern Ecuador during military exercises, killing all of the 22 soldiers
    on board. (BNO News) (Aviation Safety Network)
  - The entire Washington D.C. Metro system will shut down for 29 hours beginning
    at midnight Wednesday for an emergency investigation after an electric cable caught
    fire on Monday. (The Washington Post) (NBC4 Washington)
  - A fire severely damages the 16th century Wythenshawe Hall, near Manchester, England.
    (BBC)
  - A deadly fire breaks out at a rehabilitation center for addicts in Sterlitamak,
    Bashkortostan, a Republic of Russia, killing 12 people. An investigation was immediately
    launched. (Radio Free Europe/Radio Liberty)
  Health and medicine:
  - The U.S. Centers for Disease Control and Prevention issues final recommendations
    urging doctors to try something besides an opioid when first treating pain, and
    if an opioid drug, such as hydrocodone or oxycodone, is the best choice, start
    with the lowest possible dose. (The Washington Post) (NBC News)
  International relations:
  - Burundian unrest (2015–2018)
  - The European Union suspends direct financial aid to Burundi after concluding that
    the Burundian authorities had not done enough to find a political solution to
    the ongoing conflict occurring in the country. (The Guardian)
  - Argentina–China relations
  - Argentina's coastguard says it has sunk a Chinese fishing trawler that was operating
    illegally within its territorial waters. The coastguard says it rescued four of
    the trawler's crew while others who abandoned ship were picked up by another Chinese
    vessel shadowing the pursuit. (Reuters via Yahoo! News)
  - The parliament of the Netherlands passes a resolution calling on the government
    to stop selling arms to Saudi Arabia, citing ongoing "violations of humanitarian
    law" in Yemen. (Middle East Eye)
  Law and crime:
  - Shooting of Michael Brown, Ferguson unrest
  - The Ferguson, Missouri, city council, after last month voting to change the terms
    of the agreement, reverses course and unanimously (6-0) agrees to accept a U.S.
    Justice Department overhaul of its troubled police force and municipal courts.
    This avoided a likely expensive legal battle with the federal government which
    had filed suit against the city following last month's vote. (CNN)
  Politics and elections:
  - 2016 United States presidential election
  - Voters in the U.S. states of Florida, Illinois, Ohio, Missouri, North Carolina
    and the commonwealth of the Northern Mariana Islands head to the polls for Republican
    and Democratic Party primaries that the media has dubbed "Super Tuesday 2". (AFP
    via Yahoo! News)
  - Donald Trump wins primaries in Illinois, North Carolina, Missouri and Florida
    while John Kasich wins in Ohio. (NY Daily News) (Decision Desk HQ) (CNN), (USA
    Today) (NBC News)
  - Donald Trump wins the Northern Mariana Islands caucus. (Politico)
  - Hillary Clinton wins the Democratic primaries in Florida, Illinois, Ohio, Missouri
    and North Carolina. (Fox News), (Washington Post) (NBC News) (NBC News Live Blog)
  - Marco Rubio suspends his presidential campaign following a disappointing defeat
    in his home state of Florida. (The New York Times)
  - North Carolina's controversial voter ID law is in effect for the first time. Voters
    without these new ID credentials, including voters with a “reasonable impediment”
    to obtaining an ID, can cast a provisional ballot. Citizens (2,567) faced this
    problem during early voting, including U.S. Senator Richard Burr who, because
    his driver's license was stolen, was without ID. In addition, votes for congressional
    candidates for House seats don't count because the state's congressional district
    map was redrawn after the ballots were printed. The actual congressional primary
    is scheduled for June 7. (WRAL)(The Nation via Moyers & Company) (NPR) (Charlotte
    Observer) (The New York Times)
  - Nigerien general election, 2016
  - The government will release opposition candidate Hama Amadou from prison due to
    health issues. Amadou is facing off against incumbent President of Niger Mahamadou
    Issoufou in the second round of voting on Sunday. (Reuters)
  - The Myanmar Assembly of the Union, or parliament, selects Htin Kyaw as the new
    President. Kyaw, a confidant of Aung San Suu Kyi, will be the first civilian president
    in decades. Suu Kyi, a Nobel Peace Prize recipient, is constitutionally barred
    from the office. (Indian Express) (ABC News Australia)
  - The Obama administration announces it is cancelling plans to permit drilling for
    oil and gas off the southeastern U.S. Atlantic coast. A new plan involves 10 potential
    lease sales in the Gulf of Mexico and three off the coast of Alaska. (USA Today)
    (The Island Free Press)
  Science and technology:
  - Andrew Wiles wins the 2016 Abel Prize for his solution to Fermat's Last Theorem.
    (Nature)
  - Scientists, in the Proceedings of the National Academy of Sciences scientific
    journal, report that so-called fairy circles are caused by the plants themselves,
    which have self-organized. Michael Cramer and Nichole Barger suggested this in
    2013. (The Washington Post) (PNAS) (The Atlantic)
