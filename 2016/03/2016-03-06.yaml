Date: '2016-03-06'
Source_URI: Portal:Current events/2016 March 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - A suicide bomber kills at least 60 people and wounds 70 others after ramming his
    explosives-laden truck into a security checkpoint at one of the entrances to the
    Iraqi city of Hillah, south of Baghdad. The Islamic State of Iraq and the Levant
    claims responsibility for the attack. (Reuters) (FOX News) (AP via Yahoo! News)
  - Syrian Civil War
  - Battle of Aleppo (2012–2016)
  - At least nine civilians are killed and dozens are injured after rockets and mortars
    hit the mainly Kurdish neighborhood of Sheikh Maqsood in the city of Aleppo. The
    neighborhood is controlled by the People's Protection Units (YPG). (Reuters)
  Arts and culture:
  - Former First Lady of the U.S. Nancy Reagan dies at age 94. (NBC News)
  Disasters and accidents:
  - Twelve coal miners are killed following a gas leak in a mine near the Chinese
    city of Baishan in Jilin province. (AAP via SBS)
  - European migrant crisis
  - At least 25 migrants, including 10 children, drown after their wooden boat capsizes
    in the Aegean Sea near the seaside town of Didim, Turkey. The Turkish Coast Guard
    was able to rescue 15 people. (International Business Times) (AFP via Yahoo7 News)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea threatens a pre-emptive nuclear strike against South Korea and the
    United States in response to the two nations' annual joint military exercise which
    Pyongyang considers is a pretext for an invasion. (The Washington Times)
  Law and crime:
  - Iranian billionaire Babak Zanjani is sentenced to death for corruption. Zanjani
    was arrested in December 2013 after accusations that he withheld billions in oil
    revenue channelled through his companies. He denies the allegations. (BBC)
  - Egyptian interior minister Magdy Abdel-Ghaffar accuses Hamas and the Egyptian
    Muslim Brotherhood in the June 2015 assassination of Attorney General Hisham Barakat.
    (Latin American Herald Tribune) (Debkafile)
  Politics and elections:
  - Beninese presidential election, 2016
  - Voters in Benin go to the polls for the first round of voting in a presidential
    election with 33 candidates vying to replace current President Thomas Yayi Boni.
    (Bloomberg)
  - Thousands of people gather in the Georgian capital of Tbilisi to protest against
    their government's negotiations with Russian state-owned oil company Gazprom.
    (Radio Free Europe/Radio Liberty)
  - 2016 United States presidential election
  - Marco Rubio wins the Puerto Rican Republican Party primary. (BBC)
  - Bernie Sanders wins the Maine Democratic caucuses. (AP)
  - Slovak parliamentary election, 2016
  - Prime Minister Robert Fico's Smer party won 28.3 percent of the vote, but with
    just 49 seats, lost its majority in the 150-member parliament. The Freedom and
    Solidarity party won 21 seats (12.1%), and the Ordinary People party took 19 seats
    (11.0%). (AP via Daily Sabah)
  - The right scored first-time seats. The Slovak National Party won 15 seats; and,
    the Kotleba – People's Party Our Slovakia won 14 seats, nearly three times more
    than predicted. (The Washington Post) (Irish Independent)
  - Analysts indicate Fico may find it very difficult to form a new government. Political
    analyst Samuel Abrahám says coalition-building “could take weeks, even months.
    ... Fico's rhetoric strengthened the right in Slovakia." (Daily Times) (Reuters
    via Azerbaijan State News Agency )
