Date: '2016-09-10'
Source_URI: Portal:Current events/2016 September 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war and Russia–United States relations
  - The U.S. Obama administration and the Russian Putin administration agree to a
    Syrian peace deal. The deal is intended to end combat in specified areas and create
    a joint center of combat to fight ISIL and Al-Nusra Front. (BBC)
  Disasters and accidents:
  - A boiler explodes causing a fire in a factory in the Bangladeshi city of Tongi
    killing at least 25 people and injures 70 others. (AFP via ABC News Australia)
  - 2016 Tanzanian earthquake
  - A magnitude 5.7 earthquake occurs in northern Tanzania, near Lake Victoria, killing
    at least 13 people and injuring 200 others. Tanzanian authorities report significant
    damage in the town of Bukoba. The governments of Burundi, Kenya, Rwanda, and Uganda
    report tremors. (BBC) (AFP via The Daily Mail)
  Law and crime:
  - The District Court for the District of Columbia releases John Hinckley Jr, U.S.
    President Ronald Reagan's March 1981 would-be assassin, from a psychiatric hospital
    after 35 years. (BBC)
  - Philippine Drug War
  - The sister of Filipino actress Maritoni Fernandez and daughter of British hereditary
    peer Antony Moynihan, 3rd Baron Moynihan is shot dead in a suburb of Manila. Through
    deliberate evidence left at the scene, the perpetrator's motive appears to be
    an implication that Moynihan had been a drug dealer. (Rappler)
  Politics and elections:
  - Fiji authorities detain two opposition party leaders, a prominent trade unionist,
    and another opposition activist, following their participation in Wednesday's
    forum on the Pacific island's 2013 constitution. A police spokesperson told the
    Fiji Times that several people were being questioned about comments made at the
    forum that, "Could affect the safety and security of all Fijians." (Reuters) (Radio
    New Zealand)
  Sports:
  - 2016 US Open (tennis)
  - In tennis, German Angelique Kerber defeats Czech Karolína Plíšková in three sets
    to win the 2016 US Open women's singles title. (AP) (BBC) (US Open)
