Date: '2016-09-19'
Source_URI: Portal:Current events/2016 September 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 New York and New Jersey bombings
  - A bomb squad robot detonates an explosive device at a transit station in Elizabeth,
    New Jersey. There has been a previous explosion in Seaside Park. No one is hurt.
    (NBC News)
  - Linden, New Jersey police shoot and arrest Ahmad Khan Rahami, the suspected perpetrator.
    Two police officers are reportedly injured. (The New York Times)
  - War in Afghanistan (2001–2021)
  - Afghan officials say yesterday's U.S. airstrikes killed up to eight Afghan policemen
    in Lashkar Gah, Uruzgan. (Reuters)
  - A Democratic Republic of the Congo protest calling for the resignation of President
    Joseph Kabila turns violent in Kinshasa, leaving at least 17 people dead, including
    three police officers. Opposition groups say that 50 people died. (Le Point)(DNA)(BBC)
  - Syrian civil war
  - Hours after the Syrian military declares the end of the ceasefire, an airstrike
    hits a convoy of United Nations OCHA aid trucks near the town of Urum al-Kubra,
    in the Aleppo Governorate, with the Syrian Observatory for Human Rights reporting
    that at least 12 people have been killed. (BBC)
  Business and economy:
  - 2016 Bangladesh Bank heist
  - A court in the Philippines orders the central bank to return US$15 million back
    to Bangladesh. (Reuters)
  Disasters and accidents:
  - 2016 Southeastern United States gasoline shortage
  - The U.S. states of North Carolina and Virginia declare a state of emergency over
    gas shortages as a result of the Colonial pipeline leak in Shelby County, Alabama.
    (WTKR)
  - 2016 California wildfires, Soberanes Fire
  - The cost, so far, of battling the wildfire on California's scenic Big Sur coast
    is $206.7 million — the costliest in U.S. history, according to the National Interagency
    Fire Center. The blaze, which was first reported on July 22, is currently 67 percent
    contained. (AP)
  Health:
  - 2016 Southeast Asian haze
  - In 2015, more than 100,000 people in Indonesia, Malaysia, and Singapore may have
    died as a result of forest fires in Southeast Asia. The continued poor air quality
    also continues to affect the health of more than 42 million Indonesians. (The
    Washington Post)
  Law and crime:
  - Mexican authorities find the bodies of two priests who were kidnapped yesterday
    in Poza Rica, Veracruz. Authorities find the third abducted person, the driver,
    alive. (AP)
  Politics and elections:
  - Cambodian prime minister Hun Sen says that he will continue his campaign against
    protests from the Cambodian opposition while Kem Sokha of the Cambodian National
    Rescue Party vows to remain as their leader. (Australian Broadcasting Corporation)
