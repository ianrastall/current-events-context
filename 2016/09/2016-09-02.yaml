Date: '2016-09-02'
Source_URI: Portal:Current events/2016 September 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sectarianism in Pakistan
  - Islamic militants attack Christian sections of Khyber Pakhtunkhwa, leaving 13
    dead in the city of Mardan. (CNN)
  - Colombian conflict
  - The President of Colombia Juan Manuel Santos announces that he will sign the peace
    deal with the Revolutionary Armed Forces of Colombia or FARC on September 26.
    (AP)
  - Moro conflict
  - An explosion at a night market in Davao City, Philippines, kills at least 14 people
    and injures 60. President of the Philippines and former Davao City mayor Rodrigo
    Duterte was in the city at the time. Abu Sayyaf have claimed responsibility for
    the attack. (Reuters) (ABS-CBN) (ABS-CBN)
  Business and economics:
  - Samsung Electronics recalls all Galaxy Note 7 smartphones that have fire-prone
    batteries, and halts sales in 10 markets. A Samsung official says phones with
    the problematic battery account for less than 0.1 percent of those sold. (Reuters)
    (The Verge)
  Disasters and accidents:
  - 2016 Atlantic hurricane season
  - Residents of the American state of Florida prepare for the impact of Hurricane
    Hermine which is expected to make landfall today. A state of emergency has been
    declared in 51 of the 67 counties in the state. (Reuters/AFP via ABC News Australia)
  - Floods in Bihar
  - Seven more people have died in Katihar district taking the death toll in the Bihar
    floods to 179. (The Indian Express)
  - Hermine, as a Category 1 storm, kills one person and leaves a quarter-million
    others without electricity during its trek through Florida. Now a tropical storm
    over North Carolina, Hermine should re-strengthen when it moves into the Atlantic
    Ocean tomorrow. Tropical storm warnings and watches are issued from Georgia to
    Rhode Island. (UPI) (NHC)
  Politics and elections:
  - President Islam Karimov of Uzbekistan dies after 27 years in office. (Reuters
    via Time) (BBC)
