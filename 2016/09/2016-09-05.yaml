Date: '2016-09-05'
Source_URI: Portal:Current events/2016 September 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Two successive suicide bombers on foot kill at least 24 people and injure 91 others,
    including senior security and police officials, after striking close to the Afghan
    Ministry of Defence in Kabul. The Taliban claims responsibility by disclosing
    the death of 58 officers and commanders. Another bombing took place not long after.
    (Reuters) (BBC) Today (Singapore) (Sina Corp)
  - Syrian civil war
  - Several bombings kill at least 40 people in government and Kurdish held territory
    across Syria, including Tartus, Homs, Al-Hasakah and Damascus. The Islamic State
    of Iraq and the Levant claims responsibility. (AP via ABC News America) (BBC)
  - Philippine Drug War
  - With 2,400 people dead so far, Rodrigo Duterte, the President of the Philippines,
    says that "plenty will be killed" in the war against drugs. (Reuters)
  Arts and culture:
  - An asteroid is named in honour of Freddie Mercury on what would have been his
    70th birthday. (Rolling Stone)
  - American Conservative icon Phyllis Schafly dies at the age of 92. (NBC)
  Business and economy:
  - Russia–Saudi Arabia relations
  - Russia and Saudi Arabia agree on a plan to manipulate oil output. (USA Today)
  - The Duterte administration suspends more Philippine mines for violating environmental
    regulations. (Reuters)
  Disasters and accidents:
  - A Tel Aviv, Israel, four story parking lot under construction collapses and kills
    at least two people and injures 18 others. (Haaretz)
  - 2016 Ethiopian protests
  - At least 23 inmates are killed in a fire and stampede at Kaliti Prison near Addis
    Ababa in Ethiopia during an attempted jailbreak. (BBC)
  Health:
  - 2015–16 Zika virus epidemic
  - The cases of people infected with the Zika virus in Singapore jumps to 240+. (CNBC)
  International relations:
  - 2016 G20 Hangzhou summit
  - U.S. President Barack Obama and Russian President Vladimir Putin fail to agree
    on a peace deal regarding the Syrian civil war. (CNN)
  - Philippines–United States relations
  - U.S. President Barack Obama cancels a scheduled meeting with the President of
    the Philippines, Rodrigo Duterte, after Duterte referred to Obama as a "son of
    a whore", while adding "I am no American puppet", in response to Obama's recent
    criticism of his war on drugs. (The Washington Post) (CNN)
  - North Korea–South Korea relations
  - South Korea reports that North Korea has fired three ballistic missiles into the
    Sea of Japan. (Reuters via ABC News)
  Law and crime:
  - Philippines v. China
  - Chinese vessels are seen positioned near the disputed Scarborough Shoal off the
    coast of the Philippines. (The New York Times)
  Politics and elections:
  - Hong Kong legislative election, 2016
  - Nathan Law becomes the youngest-ever Hong Kong legislator at age 23. (Al Jazeera)
  - 2016 United States presidential election
  - Libertarian nominee Gary Johnson qualifies in Connecticut giving him ballot access
    to 48 states. (The CT Mirror)
  Science and technology:
  - The European Space Agency's robotic lander Philae is discovered wedged in a crack
    between some rocks in the shadow of a cliff on 67P/Churyumov–Gerasimenko by the
    Rosetta space probe after being lost since 2014. (CNN)
