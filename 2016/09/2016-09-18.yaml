Date: '2016-09-18'
Source_URI: Portal:Current events/2016 September 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kashmir insurgency
  - 2016 Uri attack
  - Four Jaish-e-Mohammed militants attack an Indian Army base near the Pakistan border
    with at least 17 soldiers and four militants killed. (International Business Times)(BBC)
  - War in North-West Pakistan
  - Two gunmen kill three Pakistani Army soldiers near the city of Peshawar. (AP)
  - Syrian civil war
  - Amaq News Agency claims ISIL is responsible for shooting down a Syrian Air Force
    fighter jet over Deir ez-Zor. The London-based SOHR says the MiG pilot was killed.
    (Al Jazeera)
  - Australia's Department of Defence acknowledges its participation "among a number
    of international aircraft" in the Deir ez-Zor air raid. It says it would "never
    intentionally target a known Syrian military unit or actively support Daesh (ISIS)"
    and offers its condolences. (SANA) (ABC)
  Arts and culture:
  - 68th Primetime Emmy Awards
  - 'The 68th Primetime Emmy Awards is held at the Microsoft Theater in Los Angeles
    with Game of Thrones winning the Emmy Award for Outstanding Drama Series, Veep
    winning the Emmy Award for Outstanding Comedy Series and The People v. O.J. Simpson:
    American Crime Story winning the Emmy for Outstanding Limited Series. (Variety)'
  - Game of Thrones wins three Emmy Awards to become the most successful narrative
    series of all time beating the record previously held by Frasier. (AFP/Reuters
    via ABC News Australia)
  - The Church of Jesus Christ of Latter-day Saints in Japan
  - Russell M. Nelson dedicates the Sapporo Japan Temple, the 151st LDS temple and
    third temple in Japan. (Deseret News)
  Disasters and accidents:
  - A tourist boat carrying about 150 people capsizes on the Chao Phraya River in
    Thailand, killing at least 12 people with dozens missing. (Reuters)
  Politics and elections:
  - Russian legislative election, 2016
  - Russian voters head to the polls to elect all 450 MPs to the 7th State Duma of
    the Russian Federation. Exit polls show the governing United Russia party with
    a comfortable lead. (BBC), (The Duran)
  - Berlin state election, 2016
  - Voters head to the polls in Berlin, Germany, to elect members to the Abgeordnetenhaus
    of Berlin. Latest polling indicates the anti-immigration Alternative for Germany
    (AfD) are expected to make strong gains. (Reuters) (Sputnik News)
  Sports:
  - 2016 Summer Paralympic Games
  - The 2016 Summer Paralympic Games close in Rio de Janeiro. (ABC)
