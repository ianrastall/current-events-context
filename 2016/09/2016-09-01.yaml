Date: '2016-09-01'
Source_URI: Portal:Current events/2016 September 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Gabonese protests
  - Large explosions and gunfire are reported in the Gabonese capital Libreville as
    security forces clash with supporters of opposition presidential candidate Jean
    Ping protesting the election results indicating a narrow victory by President
    Ali Bongo Ondimba. (Reuters)
  - Military helicopters bomb the headquarters of Union of Forces for Change, according
    to opposition leader Jean Ping, killing at least two people. Internet is also
    cut in the capital, Libreville. (BBC)
  - Kurdish–Turkish conflict (1978–present)
  - Turkish Armed Forces claims that it has killed three Kurdistan Workers' Party
    fighters in air strikes in southeastern Turkey near the borders with Iraq. (Reuters
    via Daily Mail)
  Disasters and accidents:
  - 2016 Southeast Asian haze
  - A South Korean palm oil company is accused of causing the wildfires in Indonesia.
    (The Guardian)
  - A SpaceX Falcon 9 rocket explodes during a routine firing test at Cape Canaveral
    Air Force Station in Florida. SpaceX say there were no injuries, but that an "anomaly"
    during the static fire test resulted in the loss of the rocket and the Israeli
    Amos-6 communication satellite it was carrying. (The Telegraph)
  - A 7.1 magnitude earthquake occurs off the north east coast of North Island, New
    Zealand. A tsunami warning was issued after the earthquake, and waves of 0.3m
    have been reported near Gisborne. (BBC) (The Independent)
  Health:
  - 2015–16 Zika virus epidemic
  - A pregnant woman is discovered to be infected by the Zika virus after cases jump
    to over 100 in Singapore. (NBC News)
  - Malaysia confirms its first case of Zika virus. (Channel News Asia)
  International relations:
  - South China Sea disputes
  - Iranian-born Australian politician Sam Dastyari pledges his support for China's
    position in the dispute. (Sydney Morning Herald)
  - Cambodia–Vietnam relations
  - Cambodia and Vietnam fail to agree on a resolution regarding their border dispute.
    (Voice of America)
  Law and crime:
  - Burial of Ferdinand Marcos
  - Female victims of the martial law dictatorship of Ferdinand Marcos speak at the
    Philippine Supreme Court about how they endured torture during Marcos' regime.
    (Rappler)
  Politics and elections:
  - The Parliament of Cambodia plans to strip political immunity for opposition politician
    Thak Lany of the Cambodia National Rescue Party alliance after she criticized
    Prime Minister Hun Sen. (The Phnom Penh Post)
