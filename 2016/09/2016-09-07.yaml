Date: '2016-09-07'
Source_URI: Portal:Current events/2016 September 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - A chlorine attack in Aleppo on Tuesday injures more than 100 people. The blast
    from barrel bombs dropped kills one person. (CNN)
  - Mexican Drug War
  - A gang shoots down a police helicopter near Apatzingán, Michoacán, killing four
    people. The police had been conducting an operation against criminal groups and
    drug cartels. (The Daily Telegraph)
  Arts and culture:
  - The American pop star Madonna agrees on a settlement with her former husband Guy
    Ritchie over their son. (BBC)
  - Burial of Ferdinand Marcos
  - The Duterte administration defends its decision to bury the former dictator Ferdinand
    Marcos in the Philippine heroes' cemetery. (AP via Fox News)
  - Hunters discover a 1000-year-old sword in Iceland. (BBC)
  - The U.S. Yosemite National Park expands by 400 acres. (BBC)
  Business and economy:
  - Apple announces the release of the iPhone 7 along with the Apple Watch 2. (The
    Telegraph)
  - Air China receives criticism in the United Kingdom after it releases an advertisement
    warning passengers from visiting areas of London populated by blacks, Indians
    and Pakistanis. (Sky News)
  - Liberty Media confirms it is buying Formula One for US$4.4 billion; however, Bernie
    Ecclestone will remain as chief executive. (BBC)
  Disasters and accidents:
  - Flooding in Niger kills at least 38 people and leaves more than 92,000 people
    displaced. (The New Indian Express)
  Health:
  - 2015–16 Zika virus epidemic
  - Malaysia reports its first pregnant woman infected with the Zika virus. (The Guardian)
  International relations:
  - Philippines v. China
  - The Duterte administration accuses China of building a "secret island" on the
    Scarborough Shoal. (Rappler)
  - Bahrain–United States relations
  - The Obama administration urges Bahrain to free Nabeel Rajab, a human rights activist.
    (BBC)
  - Iran–Saudi Arabia relations
  - The top cleric of Saudi Arabia says Iranians "are not Muslims." (The Times of
    India)
  - Russia–United States relations
  - A Russian Sukhoi Su-27 fighter jet makes an "unsafe close-range intercept" of
    a United States Navy P-8A Poseidon over the Black Sea in international airspace,
    coming within 10 feet (3.3 m) of the U.S. aircraft. (Voice of America) (CNN)
  Law and crime:
  - The sheriff's department of Morton County, North Dakota, issues arrest warrants
    for United States Green Party presidential candidate, Jill Stein, and her running-mate,
    Ajamu Baraka on charges of criminal trespass and criminal mischief. The county
    sheriff's department says that Stein and Baraka vandalized equipment at a controversial
    pipeline construction site. (The Hill)
  - Denmark's government plans to buy the leaked Panama Papers containing Danish citizens.
    (BBC)
  - Hungarian prosecutors charge a woman who kicked refugees fleeing in Hungary with
    disorderly conduct. (Al Jazeera)
  Politics and elections:
  - Luis Videgaray Caso resigns as Mexico's finance minister amid fallout over President
    Enrique Peña Nieto's controversial meeting with U.S. presidential candidate Donald
    Trump in Mexico City. Videgaray is revealed to have been the main advocate of
    arranging the meeting. (The Washington Post)
  - Gabonese presidential election, 2016
  - Ali Bongo Ondimba rejects calls for a recount. (Reuters)
  Science and technology:
  - A beachgoer in Australia discovers dinosaur footprints believed to be around 130
    million years old while combing the shore for shells. (CNN)
  Sports:
  - The 2016 Summer Paralympic Games, i.e., (parallel Olympic Games), open in Rio
    de Janeiro. (Al Jazeera)
