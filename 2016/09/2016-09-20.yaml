Date: '2016-09-20'
Source_URI: Portal:Current events/2016 September 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - A day after street violence in the Democratic Republic of the Congo between protesters
    opposed to President Joseph Kabila and security forces left at least 44 dead,
    armed men in military uniforms burn down the headquarters of the main opposition
    Union for Democracy and Social Progress (UDPS) in Kinshasa, DR Congo, killing
    at least two people. (Reuters)
  Art and culture:
  - Citing irreconcilable differences, Angelina Jolie files for divorce from Brad
    Pitt and seeks full custody of their six children. The couple married in 2014
    and had been in a relationship since 2005. (CNN)(The New York Times)
  Disasters and accidents:
  - 2016 Pacific typhoon season
  - Typhoon Malakas makes landfall on the southern Japanese island of Kyushu dumping
    heavy rain and causing flight cancellations. (AFP via Channel News Asia)
  - An Mi-8 transport helicopter crashes near the eastern Libyan city of Tobruk, killing
    at least six people. (AP via Fox News)
  - A United States Air Force U-2 reconnaissance aircraft crashes in Northern California,
    shortly after takeoff from Beale Air Force Base, killing one pilot and injuring
    another. (The Los Angeles Times)
  Health:
  - 2015–16 Zika virus epidemic
  - Authorities diagnose six more cases of the Zika virus in the provinces of Cebu
    and Iloilo in the Visayas and Laguna province near Metro Manila, Philippines.
    (CNN)
  International relations:
  - Accession of Bosnia and Herzegovina to the European Union
  - The European Union's 28 member states formally accept Bosnia and Herzegovina's
    membership application. The European Commission (EC) will now determine whether
    Bosnia meets the criteria to join the union, a process that is expected to take
    a year. (Deutsche Welle)
  - In his final speech as President of the United States to the United Nations General
    Assembly, Barack Obama calls for a renewed commitment to collaborative efforts
    in facing many of the challenges confronting “an integrated world” community.
    (The New York Times)
  Law and crime:
  - A court sentences five members of the Cuba men's national volleyball team to prison
    for a gang rape of a Finnish woman that took place in Tampere, Finland, in July
    2016 during the FIVB Volleyball World League. (Yle)
