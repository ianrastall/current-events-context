Date: '2016-09-11'
Source_URI: Portal:Current events/2016 September 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - Before a ceasefire takes effect tomorrow, over 100 people have been killed and
    over 100 injured in airstrikes on rebel-held Idlib. (CNN) (Sky News)
  - Second Libyan Civil War
  - Forces loyal to Libyan general and former US citizen Khalifa Haftar, commander
    of the elected Council of Deputies military, seize control of the ports of Sidra,
    Ra's Lanuf, Brega and Zuwetina. (Reuters)
  Arts and culture:
  - Burial of Ferdinand Marcos
  - The communication channel of the Philippine government is under scrutiny after
    an apparent whitewash and historical revisionism of the abuses of the Marcos dictatorship.
    (Rappler)
  - The Miss America 2017 pageant is held in Atlantic City, New Jersey, with Savvy
    Shields, currently Miss Arkansas, winning the event. (AP via Fox News)
  Law and crime:
  - 2009–10 Iranian election protests
  - Iran's former prosecutor of the Islamic Revolutionary Court, Saeed Mortazavi apologizes
    for his role in 2009 accidents at Kahrizak detention center which resulted in
    the deaths of three political prisoners including Mohsen Rouholamini. (Trend)
  - 2016 Taoyuan bus crash
  - Authorities find that the July 19 bus crash in Taiwan that killed 26 people was
    an intentional suicide by the bus driver. (CNN)
  - In China, the Central Commission for Discipline Inspection places under investigation
    Tianjin mayor Huang Xingguo, who is also serving as acting Communist Party Secretary.
    (The Guardian)
  Politics and elections:
  - 2016 Croatian parliamentary election
  - Voters in Croatia go to the polls for a parliamentary election with the conservative
    Croatian Democratic Union taking an early lead. (The New York Times)
  - 2016 United States presidential election
  - Hillary Clinton's doctor says she is being treated for pneumonia and dehydration
    after the Democratic Party presidential candidate fell ill and abruptly left a
    ceremony in New York City honoring the 15th anniversary of the September 11 attacks.
    (The New York Times)
  Sports:
  - 2016 US Open (tennis)
  - In tennis, Swiss Stan Wawrinka defeats Serbian Novak Djokovic in four sets to
    claim the 2016 US Open men's singles title. (The Guardian)
  - 2016 Vuelta a España
  - In bicycle racing, the 71st edition of the Vuelta a España concludes with Nairo
    Quintana of Colombia winning the general classification. (The Guardian)
