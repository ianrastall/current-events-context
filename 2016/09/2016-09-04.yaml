Date: '2016-09-04'
Source_URI: Portal:Current events/2016 September 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Davao City bombing
  - In light of the attacks, the governments of Australia, Canada, Singapore, the
    United Kingdom, and the United States issue travel warnings against going to Mindanao,
    Philippines. (Rappler)
  - Syrian Civil War
  - Syrian government forces advance around and encircle Aleppo in order to try and
    impose a siege. (AP)
  Arts and culture:
  - Mother Teresa, known for working with the desperately poor in India, is canonized
    by Pope Francis in a ceremony at the Vatican. (BBC)
  Disasters and accidents:
  - A 6.0 magnitude earthquake strikes Agusan del Sur province in Mindanao island.
    (Philippine Daily Inquirer)
  - At least 35 people are killed and 25 are injured after a bus crashes into a fuel
    tanker in Afghanistan's Zabul province. (Ariana News)
  - 2016 Pacific typhoon season
  - The death toll in Japan from Typhoon Lionrock rises to 17 with several people
    still missing. Typhoon Namtheun is now threatening the main island of Kyushu.
    (AFP via Straits Times)
  Health:
  - 2015–16 Zika virus epidemic
  - The Zika virus outbreak in Singapore which has infected over 200 people likely
    evolved from Southeast Asia. (Bloomberg)
  Politics and elections:
  - 2016 United States presidential election
  - The Richmond Times-Dispatch of Virginia is first to endorse Libertarian candidate
    Gary Johnson for president and the first newspaper media endorsement of a third-party
    nominee in this election cycle. (ABC)
  - Mecklenburg-Vorpommern state election, 2016
  - Voters in the federal German state of Mecklenburg-Vorpommern head to the polls
    in a regional election to elect members to the Landtag of Mecklenburg-Vorpommern.
    The latest polling indicates the anti-immigration Alternative for Germany (AfD)
    are expected to gain strongly. (Reuters)
  - Hong Kong legislative election, 2016
  - Voters in Hong Kong go to the polls for a Legislative Council election, the first
    major election since the 2014 pro-democracy street protests. Several young pro-independence
    candidates win seats in the election. (AP), (Reuters)
