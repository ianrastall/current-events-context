Date: '2016-09-03'
Source_URI: Portal:Current events/2016 September 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - The President of the Philippines Rodrigo Duterte declares a nationwide "state
    of lawlessness" after yesterday's bombing in Davao City that has killed at least
    14 people. (AP)
  Disasters and accidents:
  - Bees and toxic chemicals
  - Over 3 million bees die in South Carolina after being exposed to pesticides intended
    for mosquitoes carrying the Zika virus. (NPR)
  - North Korea says that at least fifteen people are missing and thousands left homeless
    in the city of Hoeryong after the Tumen River floods. (Reuters)
  - 2016 Oklahoma earthquake
  - A magnitude 5.6 earthquake strikes Pawnee, Oklahoma, tying the record for the
    strongest in state history. At least one person was injured. (CNN) (KOKI-TV)
  - State officials order closure of three dozen wastewater disposal wells by oil
    and gas operators. (The New York Times)
  - Governor Mary Fallin declares a state of emergency for Pawnee County. (KOTV 6)
  Politics and elections:
  - Indian general strike of 2016
  - Around 180 million people are claimed to be striking in India against Prime Minister
    Narendra Modi's economic privatization plans. The strike is allegedly the largest
    in human history. (Al Jazeera)
