Date: '2016-09-14'
Source_URI: Portal:Current events/2016 September 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Davao City bombing
  - The death toll of the September 2 bombing rises to 15. (CNN)
  - Boko Haram insurgency
  - Clashes near the village of Toumour in Niger's southeast Diffa Region kill at
    least 30 Boko Haram militants and five Niger Armed Forces soldiers. (Reuters)
  Business and economy:
  - German chemicals company Bayer AG will announce that it has acquired American
    seeds company Monsanto Co. for US$66 billion. (Reuters)
  Disasters and accidents:
  - 2016 Pacific typhoon season
  - Typhoon Meranti hits southern Taiwan with record breaking winds and heavy rains,
    disrupting transport and knocking out power to tens of thousands of people. (Bloomberg)
  - Fears rise in the Philippine province of Batanes after communications are cut
    in the islands. (The Guardian), (Rappler)
  International relations:
  - Human rights in Venezuela
  - The South American trading bloc Mercosur threatens to suspend Venezuela if it
    does not protect human rights and enact a law guaranteeing the free movement of
    Mercosur citizens. The bloc sets a deadline of December 1, 2016, for Venezuela
    to comply with their requirements. (BBC)
  Law and crime:
  - Operation Car Wash
  - Brazilian prosecutors file corruption charges against former President Luiz Inácio
    Lula da Silva and his wife, Marisa Letícia Lula da Silva. Federal judge Sérgio
    Moro will preside over his case. (Reuters)
  Politics and elections:
  - The Obama administration plans to lift sanctions against Myanmar. (NPR)
  - The Obama administration plans on increasing refugees admitted to the United States
    to 110,000. (NBC)
  - Australian prime minister Malcolm Turnbull plans to introduce a plebiscite on
    the legality of same-sex marriage in the country. (The Sydney Morning Herald)
  Sports:
  - Members of European football's governing body, UEFA, elect Aleksander Čeferin,
    president of the Football Association of Slovenia since 2011, president of UEFA.
    Čeferin will serve the remainder of former UEFA president Michel Platini's term
    of office, until 2019, who was banned by the FIFA Ethics Committee for corruption
    last year. (BBC)
  - 2016 Summer Paralympics
  - Iranian powerlifter Siamand Rahman cleared the bar at 310kg in the men's over
    107kg, setting a new world Paralympic record and claiming his second consecutive
    Paralympic gold. (IOC) (PressTV) (IOC²)
