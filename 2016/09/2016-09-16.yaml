Date: '2016-09-16'
Source_URI: Portal:Current events/2016 September 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - A suicide bombing at a mosque in Mohmand Agency kills at least 28 people and injures
    31 others. Jamaat-ul-Ahrar claims the responsibility. (The Independent) (The Express
    Tribune)
  Art and culture:
  - The iPhone 7 was released by Apple, along with the Plus version.
  Disasters and accidents:
  - 2016 Pacific typhoon season
  - Typhoon Meranti hits mainland China and Taiwan killing at least eight people and
    destroying 1,600 houses. (The Wall Street Journal) (AP via ABC News)
  - The storm cuts power and communications in the Philippine province of Batanes
    as it undergoes a "state of calamity." (Rappler)
  International relations:
  - South China Sea disputes, Japan–United States relations
  - The Obama administration agrees to have the United States Armed Forces assist
    Japan on conducting joint patrols in the South China Sea. (CNN)
  Law and crime:
  - The United Kingdom agrees to allow alleged hacker Lauri Love to be extradited
    to the United States. (BBC)
  Politics and elections:
  - Philippine Drug War, Philippines–United States relations
  - In response to American criticism of the Duterte regime, Filipino foreign secretary
    Perfecto Yasay says the Philippines cannot remain as the "little brown brother"
    of the United States. (The Guardian)
  - The European Parliament condemns the killings in the Philippines. (The Philippine
    Star)
  - Former Prime Minister and President of Italy Carlo Azeglio Ciampi dies at the
    age of 95. (Reuters)
  - UK Independence Party leadership election, 2016
  - Members of the UK Independence Party (UKIP) elect Diane James as their new leader.
    (BBC)
  - 2016 United States presidential election
  - The Commission on Presidential Debates officially announces the invitation of
    Democratic Party nominee Hillary Clinton, and GOP nominee Donald Trump, to the
    first presidential debate at Hofstra University in Hempstead, New York, on September
    26. However, third-party candidates, Gary Johnson and Jill Stein, have not met
    the criteria, and will not be participants in the debate. (Reuters)
