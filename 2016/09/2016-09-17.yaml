Date: '2016-09-17'
Source_URI: Portal:Current events/2016 September 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war, American-led intervention in Syria
  - The United States acknowledges that its warplanes may have hit a Syrian Army position
    near Deir ez-Zor Airport in eastern Syria, while conducting an operation against
    ISIL, killing more than 60 Syrian troops. (BBC)
  - The United Nations Security Council (UNSC) holds an emergency session to discuss
    the U.S. airstrikes in Deir ez-Zor. (The Guardian)
  - Moro conflict
  - Abu Sayyaf frees a Norwegian hostage for a ransom of ₱30 million (US$638,000)
    and releases three kidnapped Indonesians from Sabah. (Interaksyon) (Rappler) (Reuters
    via The New Straits Times)
  - 2016 New York and New Jersey bombings
  - A bombing occurs in the Chelsea neighborhood of Manhattan injuring 29 people.
    (The New York Times)
  - An explosion occurs in Seaside Park, New Jersey, shortly before the USMC 5K run
    in the area. No injuries or fatalities are reported. (Asbury Park Press)
  - St. Cloud, Minnesota mall stabbing
  - A mass stabbing at Crossroads Center in St. Cloud, Minnesota, U.S., leaves nine
    injured. An off-duty police officer shoots dead the perpetrator, Dahir Adan. (The
    St. Cloud Times)
  - ISIL-affiliated media wing Amaq News Agency claims responsibility for the act.
    (CNN)
  International relations:
  - Aftermath of the United Kingdom European Union membership referendum, 2016
  - President of the European Council Donald Tusk states that the UK could begin its
    formal process of withdrawing from the European Union early next year, after a
    meeting with Prime Minister Theresa May last week. (BBC)
  - Non-aligned Movement
  - Around ten heads of state attend the 17th Non-aligned Movement summit in Isla
    Margarita, Venezuela, including Evo Morales of Bolivia, Raúl Castro of Cuba, Rafael
    Correa of Ecuador, Hassan Rouhani of Iran, Mahmoud Abbas of the State of Palestine,
    Robert Mugabe of Zimbabwe, and Venezuela's president Nicolás Maduro. (Al Jazeer)
  Law and crime:
  - The Sandiganbayan court clears former Philippines president Gloria Macapagal Arroyo
    in the national broadband corruption scandal. (The Standard)
  - 2016 Calgary machete attack
  - An unidentified suspect chases people with a machete outside the Marlborough CTrain
    station in Calgary, Alberta and injures 2 inside the nearby Marlborough Mall,
    including a police officer. The injured officer shoots the suspect who remains
    in critical condition. (Global News), (The Calgary Sun)
  Politics and elections:
  - A local doctor in Belgium grants euthanasia to a terminally-ill minor, marking
    the first case of such procedure performed since the 2014 removal of age restrictions.
    (BBC)
  2016 Summer Paralympics:
  - Iranian Para-cyclist Bahman Golbarnezhad dies after being involved in a crash
    during the men's C4-5 road race. (BBC) (The Sun)
