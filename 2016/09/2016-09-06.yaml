Date: '2016-09-06'
Source_URI: Portal:Current events/2016 September 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Davao City bombing
  - Philippine president Rodrigo Duterte declares a state of emergency in the whole
    country. In a warning to Abu Sayyaf, Duterte says "I will eat you alive." (Time),
    (Rappler)
  - War in Afghanistan (2001–2021)
  - Gunfire is heard in the Afghan capital Kabul with security forces looking for
    attackers with at least one person killed and six injured. (AP)
  - A suicide bomber attacks a charity in the Kabul suburb of Shāre Naw with the Taliban
    claiming responsibility. (BBC)
  - South Thailand insurgency
  - A motorcycle bomb kills a father and daughter outside an elementary school in
    Narathiwat province. (Reuters)
  - Iraqi Civil War (2014–2017)
  - The Islamic State of Iraq and the Levant bans burqas in northern Iraq after a
    series of fatal attacks on its members by veiled women. (International Business
    Times)
  Arts and culture:
  - Warner Brothers is accused of self-censorship after it tagged its own websites
    for copyright infringement through the search engine Google. (New York Daily News)
  Business and economy:
  - Bayer reproposes to buy Monsanto at a new exchange of US$65 billion including
    debt. (The Wall Street Journal)
  - Fox News On The Record host Greta Van Susteren leaves the channel after 14 years.
    (AP via Breitbart News)
  Disasters and accidents:
  - 2016 Pacific hurricane season
  - Hurricane Newton makes its way towards the resort town of Los Cabos, Mexico. (Mexico
    News Daily)
  - Typhoon Lionrock (2016)
  - The death toll rises to at least 114 as 60 more people are killed in floods after
    the typhoon hits North Korea, displacing over 44,000 people. Fifteen people are
    also missing. (The Indian Express)
  Health:
  - 2015–16 Zika virus epidemic
  - A new infection of the Zika virus spreads to the Philippines. (Australian Broadcasting
    Corporation)
  - Isabelle Dinoire, who received the world's first face transplant, is reported
    to have died from cancer at the age of 49 in April 2016. (BBC)
  International relations:
  - 2016 ASEAN Summit
  - Laos prepares to host the 28th and 29th ASEAN Summit. (CNN)
  - Barack Obama pledges US$90 million to clear Laos of unexploded ordnance dropped
    by the United States during the Vietnam War. (NBC)
  Law and crime:
  - About 27 years after his abduction, the remains of Jacob Wetterling are discovered.
    (NPR)
  - 21st Century Fox, the parent company of Fox News, settles a sexual harassment
    case by Gretchen Carlson for US$20 million. (Vanity Fair)
  - Bill Cosby sexual assault allegations
  - A judge in Pennsylvania schedules the dates for the trial of accused U.S. comedian
    Bill Cosby. (BBC)
  Politics and elections:
  - Mecklenburg-Vorpommern state election, 2016
  - German Chancellor Angela Merkel defends her stance regarding the European migrant
    crisis despite her party losing in the key election. (Deutsche Welle)
  - British MP Keith Vaz quits the Home Affairs Select Committee following allegations
    that he had engaged in sexual activity with male prostitutes. (BBC)
  Science and technology:
  - A study concludes that typhoons in Asia are becoming stronger. (The Guardian)(Nature
    Geoscience)
  - The giant panda is removed from IUCN's endangered species list but is replaced
    by the Eastern gorilla. (CNN)
  Sports:
  - San Francisco 49ers football player Bruce Miller is charged with assault. (Sports
    Illustrated)
