Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Resolute Support Mission
  - Two Romanian soldiers are killed along with assailants in an insider attack in
    Afghanistan. (Washington Post)
  - Syrian Civil War
  - Aleppo offensive (May 2016)
  - At least 13 Iranian soldiers are killed in a battle with Islamist militants in
    a village near Aleppo, Syria. This is the largest single day loss for the Iranians
    since the start of the conflict. (Retuers) (Business Insider) (NDTV)
  Law and crime:
  - Indonesia-Philippines relations
  - Filipina convict Mary Jane Veloso gets a reprieve from Indonesian executions.
    (Philippine Daily Inquirer)
  Politics and elections:
  - Polish Constitutional Court crisis, 2015, Law and Justice government
  - About 240,000 Poles have taken to the streets in Warsaw to protest against the
    Polish government. (BBC)
  - Sarawak state election, 2016
  - In Malaysia, Sarawak voters go to the polls for a state election. (Channel NewsAsia)
  - Bukit Batok by-election, 2016
  - Singapore's Bukit Batok by-elections conclude with more than 24,000 voters casting
    ballots. Murali Pillai of the People's Action Party emerged as the winner with
    61.21% of the valid votes cast. This was the first Singaporean by-election following
    the 2015 general elections. (Channel NewsAsia) (The Straits Times)
  - 2016 United States presidential election, United States presidential election
    in Guam, 2016
  - Voters in Guam head to the polls to vote in the Democratic presidential caucus.
    (Guam Daily Post)
  Sports:
  - Nyquist wins the 2016 Kentucky Derby, extending his race record to eight wins
    in eight races.(The Blood-Horse)
