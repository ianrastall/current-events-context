Date: '2016-05-12'
Source_URI: Portal:Current events/2016 May 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Crisis (2011–present)
  - Al Qaeda militants kill at least 13 Yemeni government troops near the city of
    Mukalla. (AFP via Daily Mail)
  - Iraqi Civil War (2014–2017)
  - A twin suicide bombing attack at a police station in Baghdad kills five people.
    Yesterday 93 people had been killed and 165 injured in the deadliest day of attacks
    in Iraq this year. (AP via Fox News)
  Business and economy:
  - Nissan announces that it will buy 34% of fellow Japanese car manufacturer Mitsubishi
    Motors for 237.4 billion yen ($2.2 billion). (The Independent)
  - The Bank of England issues an unusually sharp warning about the possible economic
    consequences of an "Out" vote in the upcoming Brexit referendum. (Reuters)
  Disasters:
  - Malaysia Airlines Flight 370
  - The Government of Malaysia confirms that two more pieces of debris found in South
    Africa and Rodrigues Island off the coast of Mauritius are "almost certainly"
    from Malaysia Airlines 370 that disappeared two years ago. (AP via The New York
    Times)
  International relations:
  - Syrian Civil War
  - Turkish president Recep Tayyip Erdoğan threatens unilateral action against Islamic
    State of Iraq and Syria inside Syria. (Hurriyet Daily) (WSJ)
  - Amid impeachment proceedings in Brazil against President Dilma Rousseff Pope Francis
    appeals for prayer and dialogue. (Vatican Radio) (BBC)
  Law and crime:
  - A criminal investigation is launched by the New Hampshire attorney general against
    law enforcement officials after news footage showed Massachusetts/New Hampshire
    police appear to beat a man who was surrendering at the end of a bi-state car
    chase. (Washington Post via MSN)
  Politics and elections:
  - Impeachment process against Dilma Rousseff
  - The Brazilian Senate votes (55-22) to begin the impeachment process against the
    President of Brazil Dilma Rousseff and suspend her from office while the trial
    takes place. (BBC)
  - Baltimore, Maryland, primary election, 2016
  - Maryland state elections officials decertify the results of Baltimore’s April
    26, 2016, primary election because, for example, the number of ballots cast was
    hundreds more than the number of voters who checked in at polling places. (The
    Washington Post)
  Science:
  - Longevity claims
  - A 120-year old woman is found living in the Astrakhan Oblast of Russia, which
    would make her the world's oldest living person. However, her birth year remains
    internationally unverified. Thus, 116-year old Italian Emma Morano is still listed
    as the oldest verified living person. (TASS)
  - The world's oldest person, American Susannah Mushatt Jones, dies at the age of
    116. (Wave 3)
  - Researchers from Konkoly Observatory in Budapest, Hungary, reveal that (225088)
    2007 OR10 is the third largest dwarf planet in the Solar System. (Gizmodo)
