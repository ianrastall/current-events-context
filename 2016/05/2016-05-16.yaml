Date: '2016-05-16'
Source_URI: Portal:Current events/2016 May 16
Intelligence_Payload:
  Arts and culture:
  - The Vegetarian, written by Han Kang and translated by Deborah Smith, wins the
    Man Booker International Prize. (BBC News) (The Independent) (The Telegraph)
  Business and economy:
  - Pfizer Inc. announces plans to buy Anacor for $5.2 billion. (Reuters)
  Disasters and accidents:
  - At least 15 students are killed and 6 are missing after heavy rains and flash
    flooding trigger a landslide at a popular tourist resort in Deli Serdang Regency,
    Indonesia. (The Star Online)
  Law and crime:
  - Colombian conflict (1964–present)
  - Colombian police announce the seizure of about of cocaine in an operation targeting
    the Clan Úsuga gang. This would make it the biggest seizure of drugs in the history
    of Colombia. (UPI) (BBC) (NBC News)
  - Rwandan genocide
  - A Swedish court sentences Claver Berinkindi, a 61-year-old Swedish citizen originally
    from Rwanda, to life in prison for participation in the Rwandan genocide in 1994.
    (Reuters) (The Local)
  Politics and elections:
  - The Afghan capital Kabul is locked down as members of the Hazara community protest
    the proposed route of a power line. (AP)
  Science and technology:
  - The first penis transplant in the United States is performed successfully at the
    Massachusetts General Hospital (MGH) in Boston, Massachusetts. Doctors call the
    operation "a surgical milestone". The patient, 64-year-old Thomas Manning from
    Halifax, Massachusetts, is the third man worldwide to have had the experimental
    surgery performed. (USA Today) (BBC)
