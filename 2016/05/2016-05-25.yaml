Date: '2016-05-25'
Source_URI: Portal:Current events/2016 May 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The Afghan Taliban announces that Haibatullah Akhundzada will be its new leader
    replacing Akhtar Mansour who died recently in a drone strike. Sirajuddin Haqqani
    and Mullah Yaqoob are named as deputy leaders. (Al-Jazeera)
  - A suicide bomb attack kills at least 10 people and injures four people travelling
    on a bus for appeals court staff travelling west of Kabul. (Reuters via Yahoo!
    News)
  Business and economy:
  - Greek financial crisis
  - The Eurozone agrees to a €10.3 billion ($11.48 billion) bailout package for Greece.
    (The Guardian)
  Disasters and accidents:
  - European migrant crisis
  - At least five die after their overcrowded, repurposed trawler capsized in the
    southern Mediterranean Sea off the coast of Libya. The Italian navy rescued 562
    people. (Al Jazeera)
  International relations:
  - Russia–Ukraine relations, War in Donbass
  - Ukrainian pilot and parliamentarian Nadiya Savchenko, who has been detained in
    Russia since 2014, arrives home following a dramatic prisoner swap with Russia.
    (Reuters)
  Politics and elections:
  - In the United States, Hillary Clinton is criticized by the State Department’s
    inspector general for her usage of a private email server while she was secretary
    of state. The finding also concluded though that former secretary of state Colin
    Powell also had a private email server, as did former ambassador to Kenya Scott
    Gration. The inspector referred to the email server usage as "longstanding systemic
    weaknesses". (New York Times)
  2016 Stanley Cup playoffs:
  - The San Jose Sharks defeat the St. Louis Blues in the Western Conference Final
    in six games to advance to the Stanley Cup Finals for the first time in franchise
    history. (NHL)
