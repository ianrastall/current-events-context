Date: '2016-05-15'
Source_URI: Portal:Current events/2016 May 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Iraq (2013–2017)
  - Suicide bomb attacks in a state owned cooking gas plant in Taji, north of Baghdad,
    kill at least 18 people, while 11 others die in attacks across the country. (Al
    Jazeera) (Reuters via Daily Mail)
  - Yemeni civil war (2015–present)
  - A suicide bombing kills at least 30 and injures 70 others in the southern city
    of Mukalla, Yemen. The Islamic State of Iraq and the Levant claims responsibility
    for attack. (Xinhua) (Reuters) (Canadian Press via Chronicle-Herald)
  Disasters and accidents:
  - A truck collides with a motorised rickshaw in the Adilabad district of India's
    Telangana state resulting in 16 deaths. (AP via Washington Post)
  Law and crime:
  - Capital punishment in the Philippines
  - President-elect of the Philippines, Rodrigo Duterte, vows to reintroduce capital
    punishment and give security forces permission to shoot to kill for organized
    crime figures and people resisting arrest. Duterte is due to take office on June
    30, 2016. (BBC)
  - A released report from an interview with former U.S. diplomat Donald Rickard reveals
    that he provided intelligence that led to the arrest of Nelson Mandela. (The Telegraph)
  Politics and elections:
  - Dominican Republic general election, 2016
  - Voters in the Dominican Republic go to the polls for a general election. (AP)
  Sports:
  - 2016 Formula One season
  - 'At the tender age of 18 years, 7 months and 15 days old, Max Verstappen wins
    the 2016 Spanish Grand Prix, becoming not only the first dutchman to win a Formula
    One World Championship grand prix, but also destroying 3 records previously held
    by Sebastian Vettel: youngest ever winner, youngest driver to score a podium finish,
    and youngest ever to lead a lap. (The Guardian)'
  - 2015–16 Premier League, 2015–16 Manchester United F.C. season
  - Tens of thousands of people are evacuated from Old Trafford shortly before kick-off
    between Manchester United F.C. and A.F.C. Bournemouth after a suspect package
    was found. A controlled explosion was then carried out within the stadium. The
    package is discovered to be an explosives training device left behind earlier
    in the week by a private company following a training exercise involving explosive
    search dogs. (BBC)
