Date: '2016-05-28'
Source_URI: Portal:Current events/2016 May 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Spillover of the Syrian Civil War
  - Turkey claims that its artillery fire together with U.S. air strikes killed more
    than 104 ISIL militants after rockets fired from northern Syria killed several
    people in the Turkish town of Kilis. (AP via The Olympian) (The New York Times)
  - Conflict in the Niger Delta
  - The Niger Delta Avengers militant group destroy gas and oil pipelines belonging
    to Shell and Agip in Nigeria. (The New York Times)
  Disasters and accidents:
  - Lightning strikes across Europe kill one person and injure at least 14 more. (BBC)
    (CNN)
  - 2016 Atlantic hurricane season
  - The United States National Hurricane Center issues a tropical storm warning for
    parts of South Carolina as the newly upgraded Tropical Storm Bonnie, at 5 p.m.
    EDT about 125 miles from Charleston, South Carolina, moves northwest toward the
    Atlantic Coast. (NBC News) (National Hurricane Center) (AP via The Washington
    Post)
  - A Rutan VariEze experimental aircraft crashes north of Ventura, California, killing
    the two people aboard. (UPI)
  - Harambe is killed.
  International relations:
  - The U.S. military restricts off-base alcohol consumption in Okinawa until July
    24 after the arrest of a former Marine suspected of murder. (The New York Times)
  - The President of Russia, Vladimir Putin, warns Romania and Poland against hosting
    parts of the U.S. missile defense shield. (FOX News) (CNN)
  Law and crime:
  - Bryce Dejean-Jones, a National Basketball Association player with the New Orleans
    Pelicans, is shot dead in Dallas, Texas, after breaking down an apartment bedroom
    door. (Bleacher Report) (ESPN)
  - Brazilian Police say they have identified and are searching for four of the more
    than 30 men suspected in last Saturday's gang rape of a 16-year-old girl in Rio
    de Janeiro. The assault came to light after several men posted about the attack
    online. (AP via New York Daily News)
  - The Chilean government says President Michelle Bachelet voluntarily testified
    this week as part of a probe into alleged tax crimes by her daughter-in-law Natalia
    Compagnon. (Reuters)
  Politics and elections:
  - Iran's newly elected parliament, officially called the Islamic Consultative Assembly,
    is opened and new members will be sworn-in during the first session. (International
    Business Times) (PressTV)
  - Former Secretary General of NATO Anders Fogh Rasmussen is named an advisor for
    Ukrainian President Petro Poroshenko, a move described by a Russian deputy chairman
    of the Foreign Affairs Committee as a "hostile gesture". (Radio Free Europe/Radio
    Liberty)
  - Anti-government protests erupt across Papua New Guinea against Prime Minister
    Peter O'Neill, calling on him to resign. Papua New Guinea has been in a state
    of political turmoil since 2014 when the Prime Minister was accused of fraud and
    corruption. (Radio New Zealand)
  - 2016 United States presidential election
  - Federal District Judge Gonzalo Curiel unseals documents requested by The Washington
    Post that had been filed with the court in connection with pending civil cases
    against Trump University, a former business of the Republican Party's presumptive
    presidential nominee Donald Trump. The judge noted that Trump's candidacy has
    increased interest in these cases, and that Trump's comments "... (have) placed
    the integrity of these court proceedings at issue." (The Washington Post) (Politico)
    (UPI) (Politico²)
  Sports:
  - Eight Russian Olympic athletes from three different sports have tested positive
    for banned substances during a re-examination of blood samples taken during the
    2012 London Olympics, according to the Russian Olympic Committee. (The New York
    Times)
  - 2015–16 UEFA Champions League
  - In association football, Real Madrid C.F. defeats Atlético Madrid in a penalty
    shoot-out to win the final. (The Guardian) (Eurosport)
