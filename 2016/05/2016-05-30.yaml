Date: '2016-05-30'
Source_URI: Portal:Current events/2016 May 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Iraq (2013–2017)
  - At least 24 people are killed in a series of attacks in and around Baghdad. ISIL
    has claimed responsibility. (ABC News) (AP)
  - Operation Breaking Terrorism
  - Iraqi forces reportedly enter the city of Fallujah. Tens of thousands of civilians
    are trapped in the city. (USA Today) (The Guardian)
  - War in Afghanistan (2001–2021)
  - At least 11 Afghan policemen are killed in a suspected Taliban attack on security
    checkpoints in Helmand province. (The Statesman)
  - Kurdish–Turkish conflict (2015–present)
  - Two Turkish police officers are killed in a suspected Kurdistan Workers’ Party
    (PKK) bomb attack in the eastern province of Van. (Hurriyet Daily)
  - War in Donbass
  - Three Ukrainian Army soldiers are killed and eight more are injured around separatist-controlled
    Donetsk and government-controlled Mariupol by Russian-backed separatists. (Radio
    Free Europe/Radio Liberty)
  Arts and culture:
  - The Bible Emoji, a new digital translation of all 66 books of the King James Version
    of the Bible which replaces some words with emojis, is announced by its anonymous
    creator. (UPI) (The Guardian) (New York Daily News)
  Disasters and accidents:
  - Floods in Baden-Württemberg in southwestern Germany following heavy rain that
    started Sunday night kill at least four people. (Sky News)
  Law and crime:
  - Hissene Habre, ex president of Chad, is sentenced to life in prison for ordering
    rape, sexual slavery and killings during his rule from 1982 to 1990. (BBC)
  - More details emerge on the rescue of Olympiacos and Mexico international footballer
    Alan Pulido, kidnapped in Ciudad Victoria on May 28. He escaped by overpowering
    a captor left alone with him. (ESPN)
  Politics and elections:
  - Philippine presidential election, 2016
  - The Congress of the Philippines proclaims Rodrigo Duterte and Leni Robredo as
    President-elect and Vice President-elect of the Philippines, respectively. (CNN
    Philippines) (AP via The Olympian)
  - Syrian peace process
  - Chief Syrian opposition negotiator of the High Negotiations Committee Mohammed
    Allush resigns over the failure of the UN-backed peace talks. Allush said that
    without any of the opposition demands met, peace talks were a "waste of time".
    In April, the HNC suspended talks with the Syrian government's delegation in Vienna.
    (Radio Free Europe/Radio Liberty)
  - Impeachment process against Brazilian President Dilma Rousseff
  - Fabiano Silveira, Minister for Transparency, Supervision and Control, resigns
    after leaked recordings suggested he tried to derail the Petrobras corruption
    investigation. This anti-corruption ministry was created on May 12, 2016, when
    Vice President Michel Temer was sworn in as acting president. The same tapes led
    to the resignation of Planning Minister Romero Jucá last week. (BBC) (Reuters)
  - Haitian presidential election, 2015–16
  - A special verification panel recommends throwing out the results of the Haiti
    presidential election on October 25, 2015, because it appeared to be tainted by
    significant voter fraud. (AP via US News and World Report)
  - Jordanian King Abdullah II dissolves the parliament and appoints a new prime minister,
    Hani Al-Mulki. (Business Standard) (Washington Post)
  Science and technology:
  - A new study by University of Colorado Boulder researchers, published in the Proceedings
    of the National Academy of Sciences, finds opioid medicines can paradoxically
    cause an increase in chronic pain in lab rats. (EurekAlert!)
  Sports:
  - 2016 NBA Playoffs
  - In basketball, the Golden State Warriors defeat the Oklahoma City Thunder 96–88
    in the deciding Game 7 of the Western Conference Finals, winning the series 4–3.
    The defending NBA champion Warriors advance to the NBA Finals, where they will
    face the Eastern Conference champion Cleveland Cavaliers for the second straight
    season. (ESPN)
