Date: '2016-05-06'
Source_URI: Portal:Current events/2016 May 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Aleppo offensive (May 2016)
  - More than 72 are killed in clashes between Al-Nusra Front and Syrian government
    forces in Khan Tuman south of Aleppo, Syria. (i24 News) (VOA News)
  Law and crime:
  - A man is killed, and two others are injured (a man in critical condition and a
    woman with non-life-threatening injuries), in the parking lot of Westfield Montgomery
    Mall in Potomac in Montgomery County, Maryland, near Washington, D.C. Soon after,
    a woman is killed at a grocery store some miles away. Police suspect that the
    same shooter may be behind both crime scene incidents. Police in both Montgomery
    County and neighboring Prince George's County are also examining whether this
    person is the same as the male involved in the fatal shooting the previous day
    of a woman, Gladys Tordil, who was allegedly shot (a bystander who tried to help
    was also wounded) by her estranged abusive husband, tentatively identified as
    Eulalio Tordil, 62, a former Federal Protective Service officer. (MSN) (CNN)
  Politics and elections:
  - 2016 Philippine presidential election
  - The supporters of presidential candidates Grace Poe and Mar Roxas post petitions
    and counter-petitions on Change.org urging either candidate to drop-out and give
    way for the other. (The Manila Standard)
  - Vice presidential candidate Leni Robredo thanks supporters for the "Poe-Robredo
    tandem" pairing her with presidential candidate Grace Poe but insists she is loyal
    to her running-mate Mar Roxas. (Philippine Daily Inquirer) (GMA News)
  - Mar Roxas and current President Benigno Aquino III call on political rivals Jejomar
    Binay, Miriam Defensor Santiago, and Grace Poe to unite and form a unity coalition
    in the upcoming elections. (CNN Philippines) (Channel NewsAsia)
  - Grace Poe rejects Mar Roxas' offer saying she is not willing to withdraw. Jejomar
    Binay also rejects calls for him to withdraw. (Rappler) (The Philippine Star)
    (ABC News Go)
  - Leni Robredo thanks a group of activist-farmers from Sumilao, Bukidnon, for their
    support promising to continue their reforms. (Rappler)
  - Head of Australia's Department of Immigration Mike Pezzullo denies that the detention
    centre for asylum seekers on Manus Island must be closed. He said there was no
    crisis that required any closure of the centre despite Papua New Guinea's Supreme
    Court ruling it to be unconstitutional and ordering the release of the detainees.
    (Radio New Zealand)
  - The Workers' Party of Korea, the ruling party of North Korea, holds its first
    party congress in nearly 40 years. The meeting comes as the country is facing
    tougher sanctions for its recent missile launches. (BBC)
  - 2016 United Kingdom local elections
  - London votes Sadiq Khan to succeed Boris Johnson as Mayor of London; Khan is the
    first Muslim to be elected London's Mayor. (BBC)
  - In Scotland, the Scottish National Party win a historic third term in government
    with Nicola Sturgeon re-elected First Minister, but fall two seats short of an
    overall majority. (BBC)
  Science and technology:
  - SpaceX successfully lands another Falcon 9 First stage onto a floating barge for
    the second time. It was carrying a Japanese communications satellite JCSAT-14,
    which was successfully put into geostationary orbit. (Wired)
  Sports:
  - Cameroonian footballer Patrick Ekeng of Romanian club FC Dinamo București dies
    after collapsing during a match. (Guardian)
