Date: '2016-05-08'
Source_URI: Portal:Current events/2016 May 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinai insurgency
  - Gunmen kill eight policemen in an ambush outside Cairo. The attack is claimed
    by Islamic State. (CNN) (Reuters) (BBC)
  - Terrorism in Saudi Arabia
  - A policeman is killed in a shootout with militants in Taif, Saudi Arabia. (Reuters)
    (FOX News)
  - Syrian Civil War
  - Spillover of the Syrian Civil War, Turkey–ISIL conflict
  - Turkish shelling kills 55 Islamic State of Iraq and Syria insurgents in northern
    Syria in retaliation for rocket attacks on Kilis, a Turkish border town. (Reuters)
    (Daily Progress)
  - Three Spanish journalists were released after being abducted around Aleppo, Syria,
    and held hostage by the Al-Nusra Front since 13 July 2015. (The Telegraph)
  Disasters and accidents:
  - At least 73 people are killed in a collision between two buses and a fuel tanker
    in Ghazni Province, Afghanistan. (BBC) (USA Today)
  - At least 41 people are missing in Taining County of China's Fujian province after
    a landslide hits a construction workers dormitory. (BBC)
  International relations:
  - North Korean leader Kim Jong-un rules out a nuclear first strike unless North
    Korea's sovereignty is violated. (NPR)
  Law and crime:
  - War in Afghanistan (2001–2021)
  - Afghan officials hang six Taliban prisoners. (Washington Post)
  - Unidentified gunmen shoot dead Khurram Zaki, a Pakistani rights activist known
    for speaking out against the Taliban. (VOA News)
  Politics and elections:
  - Australian federal election, 2016
  - Prime Minister of Australia Malcolm Turnbull has called a historic double dissolution
    election with both houses of Parliament being dissolved and an election to be
    held on July 2. (ABC News)
  - Gou Zhongwen replaces the disgraced Lu Xiwen as the Deputy Party Secretary of
    Beijing. (Wen Wei Po)
