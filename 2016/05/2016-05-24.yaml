Date: '2016-05-24'
Source_URI: Portal:Current events/2016 May 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Jammu and Kashmir
  - Jaish-e-Mohammed operations chief is killed in a gun battle with police. (ABC
    News)
  - Kurdish–Turkish conflict (2015–present)
  - At least six Turkish soldiers are killed and four others are wounded in a PKK
    attack in Turkey's eastern Van Province. (Daily Sabah)
  - Syrian civil war
  - New satellite imagery from Stratfor appears to reveal the destruction of four
    Russian attack helicopters and 20 lorries at the Tiyas military airbase after
    a reported attack which was conducted last week by the ISIL. (BBC)
  - Northern al-Raqqa offensive (2016)
  - U.S. backed Syrian Democratic Forces, led by Kurdish forces, launch an operation
    to capture Al-Raqqah, the de facto capital of Islamic State of Iraq and Syria.
    The force is reported to be more than 50,000 strong. (Reuters)
  - War in Donbass
  - Seven Ukrainian servicemen are killed in suspected attacks by pro-Russian rebels.
    (Reuters)
  Business and economy:
  - American agrochemical and agricultural biotechnology company Monsanto rejects
    an unsolicited $62 billion takeover bid by German pharmaceutical giant Bayer,
    saying the price was too low but adding that it remained “open to further talks.”
    (Reuters)
  Disasters and accidents:
  - Eleven people are dead and many are missing after a jade mine collapses in the
    Myanmar town of Hpakant. (AFP via New Straits Times)
  - EgyptAir Flight 804
  - Reports claim that an Egyptian forensic official says that body parts recovered
    from EgyptAir flight 804 indicate that the crash was caused by an explosion. (Daily
    Mail)
  International relations:
  - European migrant crisis
  - Greek authorities begin operations to clear the Idomeni refugee camp on the border
    with Macedonia. (AP via ABC News)
  Law and crime:
  - A court in the U.S. state of Pennsylvania finds that there is enough evidence
    to hold entertainer Bill Cosby on felony indecent assault charges in relation
    to the case of Andrea Constand v. William H. Cosby, Jr.. (CNN)
  - Google's offices in central Paris are raided by French finance officials as part
    of a tax fraud investigation. Google is accused of owing €1.6bn ($1.8bn; £1.3bn)
    in unpaid taxes. (BBC)
  - Loretta Lynch, the Attorney General of the United States, advises that the US
    government will seek the death penalty against Dylann Roof accused of conducting
    the 2015 Charleston massacre. (Post and Courier)
  - Motorist Wahib Sadek Ahmed is arrested after he is accused of wielding a knife
    at a motorist. He is subdued after four taser shots. The FBI investigates after
    Sadek claim to be affiliated with a terrorist organization. His car is found to
    contain the knife and three guns, including an AK-47, and a loaded 45-caliber
    pistol. (CBSDFW local)
  Politics and elections:
  - Iran's Assembly of Experts new session is opened which elects Ahmad Jannati as
    its chairman. (Mehr)
  - The President of Turkey Recep Tayyip Erdoğan formally approves his ally Binali
    Yıldırım as the Prime Minister. (AP via ABC News America)
