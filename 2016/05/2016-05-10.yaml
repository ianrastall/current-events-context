Date: '2016-05-10'
Source_URI: Portal:Current events/2016 May 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Ali Haider Gilani, the son of former Prime Minister of Pakistan Yousaf Raza Gilani,
    is rescued in a joint operation by U.S. and Afghan forces three years after he
    was kidnapped by suspected Taliban militants. (AFP via ABC News Australia)
  - Kurdish–Turkish conflict (2015–present)
  - At least three are killed in a car bomb targeting a Turkish police vehicle in
    Diyarbakır, Turkey. (FOX News)
  Business and economics:
  - U.S. District Judge Emmet Sullivan blocks the $6.3 billion merger of major office
    supply companies Staples and Office Depot, finding it would result in reduced
    competition and higher prices. The companies announce they are abandoning the
    deal. (The Washington Post)
  Disasters:
  - At least 50 are killed in flooding and landslides triggered by heavy rains in
    Ethiopia. (FOX News)
  - 2016 Fort McMurray wildfire
  - Alberta authorities update information about the fire. About 2,400 homes and buildings
    were destroyed, but firefighters saved 25,000 others in the city, including the
    hospital, municipal buildings, and every functioning school. They expect most
    of the 88,000 evacuees will return to their homes within two weeks. The fire,
    which has merged with another blaze, is about 884 square miles (2,090 square kilometers)
    in size. The majority of Canada's oil sands industry, and a third of the country's
    total oil output, is offline, though Shell Canada has restarted its Albian Sands
    mining operations. (AP)
  Law and crime:
  - Munich knife attack
  - One person is killed and several others injured in a knife attack at the Grafing
    station, a station of the Munich S-Bahn system in Germany. (Sky News)
  - An assailant stabs four people, killing two, at a home and a mall in Taunton,
    Massachusetts. A third victim is being treated for life-threatening injuries.
    The suspect was shot and killed by an off-duty deputy sheriff at the second scene.
    (CNN) (The Boston Globe)
  - Death of Freddie Gray
  - Officer Edward Nero waives his right to a jury trial on misdemeanor charges of
    second-degree assault, two counts of misconduct in office, and reckless endangerment.
    (Reuters)
  Politics and election:
  - Philippine presidential election, 2016
  - Rodrigo Duterte continues to lead in the presidential race, while Leni Robredo
    leads Bongbong Marcos by a small margin in the vice presidential race. (Philippine
    Daily Inquirer)
  - 2016 United States presidential election, United States presidential election
    in West Virginia, 2016, United States presidential election in Nebraska, 2016
  - Voters in the state of West Virginia head to the polls to vote in the Democratic
    and Republican presidential primaries. Voters in the state of Nebraska vote in
    the Republican presidential primary with Donald Trump just 169 delegates short
    of securing the nomination. (New York Daily News) (Lincoln Journal Star)
  - Trump is projected as the winner in the Republican primary in West Virginia while
    Bernie Sanders is projected to win the Democratic Primary. (New York Times) (BBC)
  - Trump is projected to win Nebraska. (Washington Examiner)
  - Impeachment process against Dilma Rousseff
  - Brazil's Federal Senate unanimously votes to strip Delcídio do Amaral of his senate
    seat. Amaral, one of Rousseff's biggest foes, was arrested last November for allegedly
    taking kickbacks from Petrobras. (AP)
  - The Supreme Federal Court rejects the government's request to rule on the merits
    of last month's Chamber of Deputies impeachment vote. (AP)
  Science:
  - NASA confirms that 1,284 objects discovered by its Kepler spacecraft are in fact
    exoplanets. (The Verge)
  Sports:
  - In basketball, Stephen Curry of the Golden State Warriors is named NBA MVP for
    the second straight season. Curry is the first player ever to receive all possible
    first-place votes. (ESPN)
  - London football club West Ham United F.C. play the final match of their 112-year
    stay at the Boleyn Ground, before moving to the city's Olympic Stadium. (BBC)
