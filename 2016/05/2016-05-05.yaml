Date: '2016-05-05'
Source_URI: Portal:Current events/2016 May 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - At least 12 people are killed and many are wounded in twin blasts in central Syria.
    (USA Today)
  - Airstrikes on a camp for war refugees in Syria near the Syria–Turkey border kills
    28 people, including women and children. (Reuters) (BBC)
  - Terrorism in Saudi Arabia
  - Saudi security forces shoot dead two alleged Islamic State of Iraq and the Levant
    militants while two others blew themselves up near Mecca, Saudi Arabia. (Reuters)
  - Gaza–Israel conflict
  - A Palestinian woman is killed and another person is injured in the Gaza Strip
    by tank fire from Israel. Israel said it responded to mortar rounds and the discovery
    of another tunnel by Hamas. (BBC) (The Times of Israel)
  Business and economy:
  - 2016 Philippine presidential election
  - The Philippine peso fell 0.3% continuing its drop three weeks in a row. (Bloomberg)
  - The stock exchange in Manila slid 1.2%, set for its lowest close in two months,
    before Monday's presidential elections. (Bloomberg) (Reuters)
  Disasters and accidents:
  - 2016 Fort McMurray wildfire
  - The western Canadian province of Alberta declares a state of emergency as devastating
    wildfires, fed by unseasonably hot temperatures and dry conditions, grow to five
    times their initial size. The mandatory evacuation order expands to include the
    communities of Anzac, Gregoire Lake Estates, and Fort McMurray First Nation, forcing
    thousands who had just resettled to move again. (CTV) (USA Today) (Reuters)
  - Since the fire has intermittently blocked the only route south toward Alberta's
    major cities, evacuees have had to go north toward oil camps and a few small settlements.
    The province has airlifted 4,000 people to Edmonton and Calgary as of late Thursday.
    Roughly 20 percent of Canada's crude oil production, around 680,000 barrels per
    day, is offline and is expected to increase. There are no known casualties from
    the fire, which today has grown to 210,000 acres (85,000 hectares), but fatalities
    are reported in at least one vehicle crash along the evacuation route. (Daily
    Mail)
  - Reuters reports that Alberta Province, which projects a C$10 billion deficit this
    fiscal year as the prolonged slump in oil prices has reduced tax revenue, last
    month cut funding for wildfire prevention, including millions for programs created
    in response to the province's Slave Lake wildfire in 2011, which destroyed more
    than 300 homes. (Reuters via Voice of America)
  - At least 12 people are killed and 30 others injured after a bus plunges into a
    ravine in Bolivia's eastern Santa Cruz province. (Agencia EFE)
  International relations:
  - Spain–United Kingdom relations, Disputed status of Gibraltar
  - The Royal Navy's fires warning shots at a Spanish Guardia Civil vessel after it
    twice attempted to cut across the path of United States Navy submarine during
    an incursion into Gibraltar's territorial waters. Gibraltar officials say Spanish
    vessels regularly stray deep into its territorial waters and the Foreign and Commonwealth
    Office has attacked the incursions as provocative. (The Telegraph)
  Law and crime:
  - Operation Car Wash, Impeachment process against Dilma Rousseff
  - Acting on a request from Brazil's top prosecutor, Supreme Court Justice Teori
    Zavascki suspends President of the Deputies Chamber Eduardo Cunha for obstructing
    the Petrobras corruption investigation. The full court confirms this action, Cunha
    is eliminated from the line of succession to President Dilma Rousseff, who may
    be suspended from office next week. (Reuters) (Globo)
  - Colorado Springs, Colorado, agrees to pay people who were sent to jail because
    they couldn't afford to pay fines for minor offenses like panhandling and jaywalking.
    The city will pay $125 for each day the person spent behind bars, an estimated
    total of $103,000 for the 66 people identified. In 1971, the U.S. Supreme Court
    ruled that people cannot be jailed if they do not have the money to pay. (AP via
    The Washington Post) (The Colorado Independent)
  - California court finds "Grim Sleeper" serial killer guilty. (The Los Angeles Times)
  - Hackers attack millions of users of Gmail, Hotmail, and Yahoo Mail, forcing users
    to make password changes. (Forbes)
  Politics and elections:
  - 2016 Justice and Development Party leadership election
  - Turkish Prime Minister Ahmet Davutoğlu announces his resignation effective May
    22 amid conflict with President Recep Tayyip Erdoğan over Turkey's increasingly
    authoritarian rule. Davutoğlu said he would step down following an extraordinary
    meeting of AKP party leaders scheduled for May 22. (The New York Times) (The Guardian)
  - 2016 Philippine general election
  - Philippine candidate Grace Poe denies she will give way in favor of administration
    bet Mar Roxas (Rappler)
  - Philippine senator and former coup plotter Antonio Trillanes warns that a coup
    d'etat may occur if Rodrigo Duterte wins the presidential elections. (ABC Online),
    (Philippine Daily Inquirer)
  - The sect Iglesia ni Cristo conducts a "silent war" against the senatorial candidacy
    of justice secretary Leila de Lima. (Rappler)
  - Philippine presidential candidate Grace Poe releases her full statement of assets,
    liabilities, and net worth. (GMA News)
  - 2016 United Kingdom local elections
  - Members of the British public head to local polling stations to cast their vote
    for various governmental positions, including the Mayor of London. Members of
    the Scottish, Welsh and Northern Irish public head to the polls for the regional
    devolved elections; the Scottish general election, the Welsh general election
    and the Northern Irish general election.(The Daily Telegraph)
  - 2016 United States presidential election
  - Former Governor of Texas and Republican presidential candidate Rick Perry endorses
    Donald Trump for president and says he is open to being Trump's vice-presidential
    running mate. (CNN)
  Sport:
  - Zika virus outbreak
  - Major League Baseball Commissioner Rob Manfred says the decision whether the Miami
    Marlins and Pittsburgh Pirates two-game series scheduled for later this month
    will be moved from Puerto Rico because of concerns about the Zika virus, will
    be announced Monday "at the latest." (AP)
