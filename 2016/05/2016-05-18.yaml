Date: '2016-05-18'
Source_URI: Portal:Current events/2016 May 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - Twin bombings kill a police officer and wound nine people in Peshawar, Pakistan.
    (FOX News)
  - War in Iraq (2013–2017)
  - Use of chemical weapons in the Iraqi civil war
  - Iraqi police claim ISIL militants fired chemical weapons, suspected to be mustard
    gas or chlorine, in the May 8 attacks on Bashir near Kirkuk, Iraq. (Time)
  - Nine soldiers are killed and nine more wounded in a raid on suspected ISIL militants
    in Baghdad. (Swiss Info)
  - Chibok schoolgirls kidnapping
  - One of the girls kidnapped in 2014 by Boko Haram in Nigeria is found and reunited
    with her family. (BBC) (CNN)
  Business and economy:
  - Suzuki says it used improper fuel economy tests for Japan in a widening of a scandal
    that hit Mitsubishi Motors. (Reuters)
  - Mark Zuckerberg, the CEO of Facebook, met with a group of prominent U.S. conservatives,
    over allegations that the company censors conservative content. (Reuters)
  Disasters and accidents:
  - Cyclone Roanu
  - More than 150 people are feared dead by two landslides triggered by more than
    three days of heavy rain in central Sri Lanka. (Reuters) (The New York Times)
  - A powerful 6.7 magnitude earthquake hits Ecuador near the town of Muisne, one
    person is killed. (Reuters) (AP)
  - A United States Air Force B-52 Stratofortress crashes at Andersen Air Force Base
    on Guam. All seven aircrew members escaped. No injuries have been reported. (Pacific
    Daily News)
  International relations:
  - Cross-Strait relations
  - China stages joint war games featuring mock beach landing, helicopter assaults
    and tank battles along its east coast, just days before the inauguration of Taiwanese
    president Tsai Ing-Wen. (AP via Daily Mail)
  Law and crime:
  - Michelle Lodzinski is convicted of murdering her five-year-old son Timothy Wiltsey
    25 years ago in New Jersey. (AP via Chicago Tribune) (USA Today) (The New York
    Times)
  Politics and elections:
  - 2014–16 Venezuelan protests
  - Amid a state of emergency, Venezuelan police clash and fire tear gas at protesters
    calling for the downfall of socialist president Nicolás Maduro in central Caracas.
    The protests come a day after Maduro warned that the opposition-controlled National
    Assembly may soon "disappear". (The Guardian)
  Sport:
  - 2016 UEFA Europa League Final
  - Spanish side Sevilla FC beats English opponent Liverpool F.C., 3-1, at St. Jakob-Park
    in Basel, Switzerland, to win the 2015–16 UEFA Europa League. It is their third
    straight UEFA Europa League title win. (Radio New Zealand)
