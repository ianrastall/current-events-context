Date: '2016-05-20'
Source_URI: Portal:Current events/2016 May 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Iraq (2013–2017)
  - Ar-Rutbah offensive (2016)
  - Iraqi Army forces helped by U.S. airstrikes recapture the southwestern city of
    Ar-Rutbah from the Islamic State of Iraq and the Levant group. The victory will
    allow for the re-opening of the Baghdad-Amman highway. (Al Jazeera)
  - Abkhaz–Georgian conflict
  - Georgia's Ministry of Foreign Affairs expresses "shock and deep concern" after
    a Georgian citizen, 31-year-old Giga Otkhozoria, was shot dead by Russian Armed
    Forces troops patrolling areas near the administrative boundary with Abkhazia.
    (Radio Free Europe/Radio Liberty)
  Business and economy:
  - Shortages in Venezuela
  - Coca-Cola FEMSA suspends all production in Venezuela due to a sugar shortage.
    (Fortune) (Sputnik)
  Disasters and accidents:
  - 2016 Sri Lankan floods
  - Two hundred thousand people flee the Sri Lankan capital Colombo as floods caused
    by several days of heavy rain worsen. (AFP via Yahoo!)
  - EgyptAir Flight 804
  - Egyptian Armed Forces claim that passenger luggage and part of the aircraft have
    been found in the Mediterranean Sea 290 kilometers north of Alexandria. (CNN)
  - Temperatures soar to a record in the Indian state of Rajasthan. The heatwave has
    claimed 300 lives since April 2016. (BBC)
  - At least four National Gendarmerie officers are killed in a helicopter crash in
    Hautes-Pyrénées, in southwestern France. (The Local)
  - List of earthquakes in Australia
  - The United States Geological Survey (USGS) reports a magnitude 5.9 earthquake
    strikes the southern part of the Northern Territory in central Australia. No damage
    or injuries are reported. (The Sydney Morning Herald) (RT)
  Health:
  - 2015–16 Zika virus epidemic
  - The Centers for Disease Control and Prevention reports at that least 270 pregnant
    women in the United States are infected with the Zika virus. (NBC News) (NPR)
  International relations:
  - Accession of Montenegro to NATO
  - The Kremlin condemns NATO's membership invitation to Montenegro, warning the step
    risks fueling geopolitical tensions in Europe. (Reuters)
  - War in Afghanistan (2001–2021)
  - NATO foreign ministers, meeting at NATO headquarters in Brussels, Belgium, agree
    to extend the alliance's Resolute Support Mission, that trains, advises and assists
    Afghanistan's military beyond 2016. (AP via Daily Mail) (NATO)
  Law and crime:
  - Efforts to impeach Barack Obama
  - The Oklahoma Legislature files a measure asking for Congress to impeach Barack
    Obama over his decision to allow transgender students to use the bathrooms corresponding
    to their gender identity. (KOCO)
  - The Mexican government approves the extradition of drug boss Joaquín Guzmán to
    the United States following assurances that he will not face the death penalty.
    (Reuters)
  - A United States Secret Service officer shoots an armed man on a street near the
    White House after the man allegedly approached the officer and refused to drop
    his weapon. The White House is locked down. (AP via Yahoo! News) (CNN)
  - A highly-reported execution of convicted murderer Kho Jabing occurs at 3.30pm
    on 20 May 2016 amidst local and international pleas to the government of Singapore
    to revoke the scheduled execution. (The Straits Times)
  Politics and elections:
  - Tsai Ing-wen is sworn in as the first female President of Taiwan. (BBC)
  - Israeli Defense minister Moshe Ya'alon announces his resignation. (The New York
    Times) (BBC) (FOX News)
  - The Oklahoma legislature passes a bill that would make it a felony for doctors
    to perform abortions and revokes the medical license of assisting physicians.
    The governor then vetoes the bill. (The New York Times) (Washington Post) (CNN)
  - 2015–16 Iraqi protests
  - Iraqi security forces fire tear gas and water cannon on protesters attempting
    to storm the Green Zone in Baghdad, injuring at least 33. (Bloomberg) (WSJ)
  - The Iraqi government imposes a curfew in Baghdad. (Reuters)
