Date: '2016-05-14'
Source_URI: Portal:Current events/2016 May 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - At least two people are killed and 12 injured after a suicide bomb attack on a
    police training center in Helmand Province. (Stars and Stripes)
  - Syrian Civil War
  - Turkey's Anadolu Agency reports that 45 Islamic State of Iraq and the Levant militants
    have been killed by a combination of Turkish Army shelling and a U.S. air strike
    north of Aleppo. (Reuters vs Trust)
  - U.S. officials believe the Islamic State of Iraq and the Levant has declared a
    state of emergency in its self-declared capital, Al-Raqqah. (CNN) (FOX News) (CBS
    News)
  - Iraqi Civil War (2014–2017)
  - At least 14 suicide bombers attack a complex, killing themselves and at least
    6 people. (AP via FOX News)
  Arts and culture:
  - Eurovision Song Contest 2016, Ukraine in the Eurovision Song Contest 2016
  - Ukraine's Jamala, performing the song "1944", wins the 2016 Eurovision Song Contest
    in Stockholm, Sweden. (BBC)
  Disasters and accidents:
  - More than 50 have been killed by lightning strikes in Bangladesh over the past
    two days. (BBC)
  - A bus crashes on U.S. Route 83 in Texas about 46 miles north of the city of Laredo
    resulting in eight deaths and 44 injured. (AP)
  Law and crime:
  - A Buddhist monk is hacked to death in Bangladesh. (VOA News) (CNN)
  - At least three people are killed and dozens are wounded after a mass brawl, involving
    around 200 people, mostly North Caucasusian migrants, breaks out in Khovanskoye
    Cemetery in southwest Moscow. The Mayor of Moscow Sergey Sobyanin said that none
    of those responsible would go unpunished. (Reuters)
  Politics and elections:
  - 2016 state of emergency in Venezuela
  - Venezuelan President Nicolás Maduro orders the seizure of factories that have
    stopped production and the jailing of their owners amid a nationwide state of
    emergency. During a speech to pro-government supporters in Caracas, he said the
    country had to recover the means of production, to counter its deep economic crisis.
    He also said military exercises would take place next weekend to counter "foreign
    threats". (BBC)
  Sport:
  - 2015–16 La Liga
  - In football, FC Barcelona wins La Liga for the 24th time. It is FC Barcelona's
    second straight title and sixth in the last eight years. (Sports Illustrated)
  - FA Women's Cup
  - Arsenal LFC defeats Chelsea LFC 1-0 to win their 14th title before a record match
    for this fixture at Wembley Stadium. (Eurosport)
