Date: '2016-05-26'
Source_URI: Portal:Current events/2016 May 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi civil war
  - Operation Breaking Terrorism
  - Iraqi security forces and Shiite Popular Mobilization Forces recapture Al-Karmah,
    about 16 kilometers (10 miles) northeast of Fallujah. (CNN)
  Arts and culture:
  - Archaeologists announce the discovery of a 2,400-year-old tomb which they believe
    to be that of Aristotle based on its grandiosity, and its location atop a hill
    in Stagira, the city of his birth. (UPI) (The New York Times)
  - 89th Scripps National Spelling Bee
  - The Scripps National Spelling Bee in the United States finishes with a tie between
    Jairam Hathwar and Nihar Janga. This is the third successive year the event has
    finished in a tie. (The Guardian)
  Disasters and accidents:
  - Two United States Navy FA-18's crash in the Atlantic Ocean near the Outer Banks
    off the coast of the US state of North Carolina. The four pilots safely ejected
    from the planes and are being examined in Sentara Norfolk General Hospital in
    Virginia. (Virginian-Pilot) (UPI)
  - European migrant crisis
  - At least 20 people drown in the southern Mediterranean Sea when a repurposed fishing
    boat sinks 35 nautical miles north of Zuwara, Libya. (The Guardian)
  Health and medicine:
  - Researchers at the United States Department of Defense report, in the journal
    Antimicrobial Agents and Chemotherapy, the discovery in the United States of a
    strain of E. coli that includes the new gene MCR-1, which is resistant to colistin,
    a last-resort antibiotic. (National Geographic) (The Washington Post) (Antimicrobial
    Agents and Chemotherapy)
  International relations:
  - Chinese state media Xinhua News Agency criticizes Taiwan President Tsai Ing-wen
    as politically extreme and lacking emotional balance because she is unmarried
    and does not have children. (BBC) (The New York Times)
  - South Korea plans to import arms worth about 3.5 trillion won (US$3 billion) this
    year to enhance its defense capabilities. (UPI) (Yonhap)
  - Ethiopia-South Korea relations
  - South Korean President Park Geun-hye, during her state visit to Ethiopia to work
    toward full-scale defense cooperation, pledges $1 million in aid for drought recovery.
    Park is expected to continue to Uganda and Kenya after this visit. (UPI)
  Law and crime:
  - Indonesian President Joko Widodo issues an executive order (Perppu) making child
    sexual abuse punishable by chemical castration and extends the maximum penalty
    to death. (UPI) (Time)
  - Ken Starr, the president of Baylor University, is stripped of his title after
    an investigation revealed the university mishandled accusations of sexual assault
    against its football players. The university's football coach, Art Briles, is
    also fired. (The New York Times)
  - A lawsuit brought against Google by Oracle Corporation accusing Google of using
    copyrighted code for the Android operating system is decided in Google's favor.
    (The New York Times) (The Guardian)
  - A bill that punishes hate crimes against law enforcement is signed by Louisiana
    Governor John Bel Edwards. It is the first state to pass such a law. (The New
    York Times)
  - A Muslim mob is found to have attacked Coptic homes and stripped a woman in public
    in Minya Governorate, Egypt, on 20 May 2016. (U.S. News & World Report)
  Politics and elections:
  - French labor unions, led by the CGT, implement a strike in protest of proposed
    reforms to labor laws. (BBC)
  - 2016 United States presidential election
  - The Associated Press reports that Donald Trump has secured enough delegates to
    secure the Republican Party nomination for President. (AP)
  2016 Stanley Cup playoffs:
  - The Pittsburgh Penguins defeat the Tampa Bay Lightning in Game 7 of the Eastern
    Conference Final to advance to the Stanley Cup Finals; they will face the San
    Jose Sharks. (ESPN)
