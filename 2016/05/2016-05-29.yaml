Date: '2016-05-29'
Source_URI: Portal:Current events/2016 May 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Northern Mali conflict
  - Five United Nations peacekeepers are killed in an attack in central Mali. (The
    New York Times) (Reuters)
  - Boko Haram insurgency
  - Niger security forces kill 12 Boko Haram militants in Bosso. (Reuters)
  - An improvised explosive device kills four civilians and one soldier in Biu, Nigeria.
    (U.S. News & World Report)
  - Yemeni civil war (2015–present)
  - At least 69 people are killed and 25 injured in fighting between the Houthis and
    government forces loyal to Yemeni President Abd Rabbuh Mansur Hadi. (ABC News)
    (FOX News) (Daily Mail)
  Disasters and accidents:
  - At least three people are missing after heavy rains caused flooding in the U.S.
    states of Texas and Kansas. So far, four people have died in the flooding. (AP)
  - A fire at a home for elderly people near the Ukrainian capital Kiev kills at least
    16 people. (BBC)
  - European migrant crisis
  - The United Nations fears that approximately 700 migrants have drowned in three
    Mediterranean Sea shipwrecks over the past few days. (AP)
  - Tropical Storm Bonnie makes landfall on the East Coast of the United States, affecting
    mainly the city of Charleston, South Carolina. (AccuWeather)
  International relations:
  - Foreign relations of North Korea
  - In compliance with recent UN Security Council resolutons, President Yoweri Museveni
    of Uganda announces an end to security and military cooperation with North Korea.
    (Reuters)
  Law and crime:
  - Mexican international football player Alan Pulido, who plays for Olympiacos F.C.,
    is kidnapped by masked men near his home in Ciudad Victoria, Tamaulipas. He is
    later rescued. (BBC) (AP via Sun MV)
  Politics and elections:
  - 2016 United States presidential election, Gary Johnson presidential campaign,
    2016
  - Gary Johnson, former Governor of New Mexico, secures the nomination for the Libertarian
    Party in the U.S. presidential election. Johnson picks former Massachusetts governor,
    and former Republican, William Weld as his running mate. (Washington Post)
  Sports:
  - 2016 Indianapolis 500
  - In motor sport, rookie Alexander Rossi wins the 100th Indianapolis 500. (USA Today)
