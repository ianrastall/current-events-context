Date: '2016-05-09'
Source_URI: Portal:Current events/2016 May 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - A suicide car bomb targeting Mogadishu's traffic police headquarters kills at
    least four. Al-Shabaab claims responsibility. (The New York Times) (Reuters)
  - Yemeni Civil War (2015–present)
  - Saudi Arabian-led intervention in Yemen
  - Airstrikes by the Saudi-led coalition kill at least 10 in Yemen. (The New York
    Times)
  - Iraqi Civil War (2014–2017)
  - The Pentagon announces the death of Islamic State of Iraq and Syria (ISIL) leader
    Abu Waheeb and three other militants in an airstrike near the town of Rutba, Iraq.
    (FOX News) (Reuters)
  - An ISIL car bomb kills at least 50 and injures 54 people in the eastern Iraq city
    of Baquba. (AAP via News Limited)
  Business and economy:
  - Panama Papers
  - The Panama Papers go online at the International Consortium of Investigative Journalists
    website. (BBC)
  Disasters and accidents:
  - At least seven people are killed and 30 injured in a bus accident in Ranchi, the
    capital of the Indian state of Jharkhand. (NDTV)
  - The death toll from yesterday's landslide in Taining County in China's Fujian
    province rises to 14 with 25 still missing, (AP via Daily Mail)
  International relations:
  - North Korea–United Kingdom relations
  - Rupert Wingfield-Hayes, the BBC's Tokyo correspondent, was detained in North Korea
    before being expelled by the government for "speaking very ill of the system".
    (BBC)
  Politics and elections:
  - Philippine general election, 2016
  - Filipino voters head to the polls for a presidential election with unofficial
    counts showing Davao City mayor Rodrigo Duterte with a commanding lead. (CNN)
    (AP)
  - Austrian Chancellor Werner Faymann resigns after seven and a half years in office;
    says he lost the backing of his Social Democrats party. (USA Today)
  - Impeachment process against Dilma Rousseff
  - Waldir Maranhão, the acting President of Brazil's Chamber of Deputies, says that
    the impeachment vote in that chamber should be annulled due to procedural irregularities
    and the voting process be held again. The Federal Senate is due to start voting
    on whether to impeach President Rousseff later this week. (Al Jazeera)
  - Later Monday, Maranhão reverses his earlier decision to annul the Chamber of Deputies
    April 17 vote for impeachment. (AP)
  Science:
  - A transit of Mercury occurs, visible from Africa, the Americas, Europe and most
    of Asia. (BBC) (Daily Mail) (The New York Times)
  Sport:
  - 2015 FIFA corruption case
  - UEFA President Michel Platini, who had been suspended by the FIFA Ethics Committee
    last fall, announces his resignation following the Court of Arbitration for Sport
    decision that let stand his ban, shortened to four years which corresponds to
    the duration of his remaining time in office. The court ruled that Platini was
    guilty of conflict of interest for taking a $2 million payment from FIFA approved
    by Sepp Blatter in 2011. (USA Today)
