Date: '2016-12-29'
Source_URI: Portal:Current events/2016 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Russian president Vladimir Putin says a ceasefire has been brokered between the
    Syrian government and rebel forces. The ceasefire is said to be guaranteed by
    Russia and Turkey and would exclude UN-denominated terror organizations such as
    ISIL and al-Nusra. The FSA says it would abide by the truce, while Ahrar al-Sham
    expresses "reservations". (ITV) (Reuters)
  Arts and culture:
  - Czartoryski Museum
  - The Polish government buys the internationally-known Czartoryski collection of
    art. Based in the city of Kraków and consisting of around 86,000 pieces, this
    features works by Leonardo da Vinci, Rembrandt and Pierre-Auguste Renoir. (BBC)
  - 'The academic Phil Scraton refuses an OBE granted to him by Elizabeth II in her
    2017 New Year Honours list for his work on the Hillsborough disaster. Professor
    Scraton wrote Hillsborough: The Truth, first published in 1990 and seen as the
    definitive account of the disaster. (BBC) (The Guardian)'
  Business and economy:
  - The Bank of Italy says in a statement that the country's treasury will have to
    put up around 6.6 billion euros to rescue Monte dei Paschi given the European
    Central Bank's estimate of Monte dei Paschi's capital shortfall. (Reuters)
  Disasters and accidents:
  - At least 50 people drown and thousands are left homeless due to flooding in the
    Democratic Republic of the Congo. (France 24)
  International relations:
  - The United States expels 35 Russian diplomats over the alleged Russian interference
    during the U.S.'s 2016 presidential election. (BBC)
  - The Egyptian government approves a deal granting two Red Sea islands to Saudi
    Arabia. (Reuters)
  Law and crime:
  - The Ambassador of Greece to Brazil, Kyriakos Amiridis, is reported missing while
    on vacation in Rio de Janeiro. A homicide team is investigating his disappearance.
    (BNO News) (O Globo)
  - Turkish journalist Ahmet Şık is arrested in Istanbul, allegedly over a social
    media posting. (Washington Post)
  - 2016 Berlin truck attack
  - Naveed Baloch, the man from Pakistan who was wrongly arrested in the aftermath
    of the recent attack on a Christmas market in Berlin, gives an interview outlining
    the conditions in which he was held and reveals he is now in hiding amid fears
    for his life. (The Guardian)
  Science and technology:
  - U.S. President Barack Obama declares the Bears Ears in Utah and Gold Butte area
    of Nevada as National Monuments. Both are known for the presence of Native American
    populations and archaeological sites. (BBC News)
  Sports:
  - Former boxing world champion Ricky Hatton speaks on British radio about depression
    and gives an account of past suicide attempts. (BBC Sport) (The Daily Telegraph)
  Transportation:
  - Punggol Point LRT station opened along the West Loop of the Punggol LRT line.
