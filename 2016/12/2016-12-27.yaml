Date: '2016-12-27'
Source_URI: Portal:Current events/2016 December 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Government forces push to capture a Houthi enclave in Bayhan District, on the
    border between Shabwa and Marib provinces, resulting at least 28 Houthi militants
    and 12 Yemeni soldiers killed. (Dunya News)
  Arts and culture:
  - Carrie Fisher, the actress and writer best known for playing Princess Leia in
    the Star Wars franchise, dies following complications from a heart attack. (E!
    News)
  Business and economy:
  - The U.S. Federal Trade Commission gives the antitrust go ahead to Abbott Laboratories
    in its acquisition of St. Jude Medical. (Reuters)
  Disasters and accidents:
  - 2016 Pacific typhoon season, Typhoon Nock-ten (2016)
  - The Philippine Coast Guard looks for 18 missing sailors from a ship sunk by Typhoon
    Nock-ten (Nina). At least seven people are confirmed to have died in the storm.
    (AP via Daily Mail)
  - At least 27 people are killed after drinking toxic alcohol in Pakistan. (The New
    York Times), (UPI)
  International relations:
  - Israel's Foreign Ministry announces that it is "reducing" ties with some of the
    UN Security Council countries that voted to pass United Nations Security Council
    Resolution 2334. (Business Insider), (NBC News)
  - Japan–United States relations
  - Japanese Prime Minister Shinzō Abe makes a landmark visit to Naval Station Pearl
    Harbor in Pearl Harbor, Hawaii, offering "sincere and everlasting condolences"
    to the victims of the attack on Pearl Harbor by the Japanese empire on December
    7, 1941. (BBC)
  Law and crime:
  - Basuki Tjahaja Purnama, the Christian Governor of the Indonesian capital Jakarta,
    will face prosecution for blasphemy. (ABC)
  - Former President of Argentina Cristina Fernández de Kirchner is indicted on corruption
    charges. (The Telegraph)
  - Cuba's National Assembly of People's Power approves a law banning commemorative
    statues of late President Fidel Castro, and the naming of public places after
    him, in accordance with the wishes of Castro, who died last month. (Reuters)
  Science and technology:
  - The journal the Proceedings of the National Academy of Sciences publishes research
    from the Zoological Society of London that the cheetah population approaches extinction
    with only 7,100 individuals left alive in the wild as a result of a sudden crash
    in population. (BBC), (The Proceeding of the National Academy of Science)
