Date: '2016-12-24'
Source_URI: Portal:Current events/2016 December 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - President Muhammadu Buhari announces that the Nigerian Armed Forces have successfully
    driven out Boko Haram militants from their last stronghold in the Sambisa Forest
    in northeastern Nigeria. (BBC News) (Business Insider)
  Disasters and accidents:
  - A passenger bus carrying 46 people, mostly school groups from Tonga, crashes in
    the Gisborne Region of New Zealand, approximately 30 kilometers south of the city
    of Gisborne. Two people died while several were injured, with some still hospitalized.
    (New Zealand Herald)
