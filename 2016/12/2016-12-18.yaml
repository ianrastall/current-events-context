Date: '2016-12-18'
Source_URI: Portal:Current events/2016 December 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Aleppo offensive (November–December 2016)
  - Rebels attack and burn several buses en route to evacuate ill and injured people
    from the besieged Syrian villages of Al-Fu'ah and Kafriya. (The Guardian)
  - Yemeni Civil War (2015–present)
  - December 2016 Aden suicide bombings
  - An explosion outside a military camp in southern Yemen kills at least 49 people
    and injures many more. The explosion is believed to have been caused by a suicide
    bomber wearing an explosive vest. (AP) (BBC)
  - Israeli–Palestinian conflict
  - A rock throwing 19-year old Palestinian is killed by IDF troops amid clashes in
    the West Bank village of Beit Rima. (Daily Sabah) (Haaretz)
  - 2016 Al-Karak attack
  - Unknown militants stage a number of attacks across the city of Al-Karak in Jordan,
    killing five people and injuring at least 10 others. (Al Jazeera)
  Arts and culture:
  - Fifth Harmony announces Camila Cabello's departure from the group. (Billboard)
  - Stephanie Del Valle of Puerto Rico is named as Miss World 2016. (The Telegraph)
  Disasters and accidents:
  - At least 49 people die in Irkutsk, Russia after consuming hawthorn-scented bath
    essence as if it were alcohol. The product has been found to contain methanol.
    (The New York Times) (BBC News)
  - 2016 Indonesian Air Force Lockheed C-130 Hercules crash
  - An Indonesian military Lockheed C-130 Hercules transport plane crashes in Papua
    province killing all 13 people on board. (AP via Star Tribune)
  International relations:
  - Gambian presidential election, 2016
  - Leaders from the West African bloc ECOWAS and from the Organization of Islamic
    Cooperation plead with Gambian long-time President Yahya Jammeh who lost in the
    recently held elections to step aside or face consequences. (Al-Jazeera) (Quartz)
  Politics and elections:
  - Ivorian parliamentary election, 2016
  - Côte d'Ivoire votes. (The Voice of America)
