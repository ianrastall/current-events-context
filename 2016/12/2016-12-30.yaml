Date: '2016-12-30'
Source_URI: Portal:Current events/2016 December 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Berlin truck attack
  - The funeral of Łukasz Urban, the driver killed in the course of last week's attack
    on a Christmas market in Berlin, takes place in his village of Banie near the
    German border. President of Poland Andrzej Duda and a German diplomat attend.
    (BBC) (Deutsche Welle)
  Disasters and accidents:
  - Six people die in a fire in a bakery in the Indian city of Pune. (Firstpost)
  - At least seven people are killed and 30 trapped after a pile of waste collapses
    in a Coal India mine in Jharkhand. (Reuters) (CNN)
  - A Cessna 525 carrying six passengers goes missing shortly after takeoff from Cleveland
    Burke Lakefront Airport in the United States. (USA Today)
  International relations:
  - Russia–United States relations
  - After 35 Russian diplomats are expelled from the United States, Russia's foreign
    minister Sergey Lavrov recommends expelling 35 American diplomats. Russian President
    Vladimir Putin rejects Lavrov's recommendation and expresses a desire to restore
    relations between the two countries. (The New York Times) (Newshub)
  - The U.S. Burlington Electric Department says that a code associated with a broad
    Russian hacking campaign dubbed "Grizzly Steppe" by the U.S. Government has been
    detected on a laptop associated with a Vermont electric utility but not connected
    to the grid. (The Boston Globe)
  - Mali returns two people France deported on the same planes they arrived on. (BBC)
  Law and crime:
  - A body found in a burnt-out vehicle north of the Brazilian city of Rio de Janeiro
    is confirmed to be that of missing Greek Ambassador Kyriakos Amiridis. A military
    police officer who had an affair with the ambassador's wife confesses to the murder.
    The wife and a second man are also detained. (BBC)
  - Sahaj International opens in Kochi in the South Indian state of Kerala. The country's
    first school for transgender pupils, it caters for adults who left school early.
    (BBC)
  Politics and elections:
  - Romanian President Klaus Iohannis designates social-democrat Sorin Grindeanu as
    the country's new prime minister, after the victory of the centre-left PSD earlier
    this month. (AFP by The Indian Express)
  - China's State Council announces details of its intention to ban all ivory trade
    and processing activities by the end of 2017. (BBC)
  Science and technology:
  - A volcanic eruption continues on Bogoslof Island near Unalaska, in the Aleutian
    Islands of Alaska. The eruption has impacted air transportation routes. (Alaska
    Public Radio Network) (Tech Times) (CDA News)
  Sports:
  - Mo Farah and world tennis number one Andy Murray are among those knighted by Elizabeth
    II in her 2017 New Year Honours list. (The Guardian)
  - In mixed martial arts, Amanda Nunes defeats Ronda Rousey to retain the Women's
    Bantamweight title at UFC 207. (The New York Times)
