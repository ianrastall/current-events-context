Date: '2016-12-26'
Source_URI: Portal:Current events/2016 December 26
Intelligence_Payload:
  Arts and culture:
  - American Actor George S. Irving, best known for being one of the last members
    of the original production of Oklahoma! and voicing Heat Miser from The Year Without
    a Santa Claus, dies at age 94. (The Hollywood Reporter)
  Disasters and accidents:
  - 2016 Russian Defence Ministry Tupolev Tu-154 crash
  - Eleven bodies have so far been recovered from the Black Sea from yesterday's military
    aircraft crash. All 92 people on board died. (CNN)
  International relations:
  - China resumes diplomatic ties with São Tomé and Príncipe two weeks after the African
    island nation broke diplomatic ties with Taiwan. (AP via New York Times)
  - CHP MP Öztürk Yılmaz says Turkey has expressed its readiness to work with president
    Assad of Syria. (Sputnik)
  Science and technology:
  - Researchers at the SLAC National Accelerator Laboratory find a way to make thinner
    electrical wires that measure just three atoms wide. (Phys.org) (SLAC)
