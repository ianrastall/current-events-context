Date: '2016-12-31'
Source_URI: Portal:Current events/2016 December 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - December 2016 Baghdad bombings
  - A pair of bomb blasts targeting a market in central Baghdad kills at least 27
    people and injures over 50. (AP), (The Telegraph)
  - War in Afghanistan (2001–2021)
  - Withdrawal of U.S. troops from Afghanistan
  - United States troops withdraw from Afghanistan after 15 years.
  Arts and culture:
  - China, with their largest television network China Central Television, announces
    a new launch of a global media platform extending globally and renaming the network
    China Global Television Network. (News Asia)
  Disasters and accidents:
  - In Helsinki, Finland, authorities detain an unidentified driver after driving
    at high speed, and veering for unknown reasons, into a crowd, injuring 7 people.
    Authorities quickly conclude no evidence points to a deliberate attack. (RT)
  Science and technology:
  - Authorities add a leap second on December 31 to bring UTC more inline with mean
    solar time. (Physics Org), (BBC)
