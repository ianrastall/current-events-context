Date: '2016-12-10'
Source_URI: Portal:Current events/2016 December 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Palmyra offensive (December 2016)
  - The SOHR and Amaq announce that ISIL has captured an oil field north-west of Palmyra.
    (De Standaard) (VOA)
  - American-led intervention in Syria, Northern Raqqa offensive (November–December
    2016)
  - The United States announces that it will deploy an additional 200 troops to help
    force the Islamic State of Iraq and the Levant from Al-Raqqah. (Reuters), (BBC),
    (ABC News)
  - Yemeni Civil War (2015–present)
  - December 2016 Aden suicide bombing
  - A suicide bomber kills at least 50 soldiers and injures 70 more at a military
    barracks in Aden, Yemen. (BBC) (Reuters)
  - December 2016 Istanbul bombings
  - Two bombs, one detonated by a suicide bomber, near the Vodafone Arena in Istanbul,
    Turkey, kill at least 29 people and injure more than 150 others. Ten people have
    been arrested in relation to the bombings. (BBC) (Reuters) (AP)
  - Kurdish–Turkish conflict (2015–present)
  - Turkish fighter jets kill 19 suspected Kurdish militants in strikes on the Gara
    region in northern Iraq. (Reuters via Daily Mail)
  Arts and culture:
  - 2016 Nobel Peace Prize
  - Colombian president Juan Manuel Santos receives his award in Oslo, Norway. (Al-Jazeera)
  Disasters and accidents:
  - 2016 Aceh earthquake
  - At least 43,000 have been displaced by Wednesday's earthquake in the Indonesian
    province of Aceh. (Daily Telegraph)
  - Hitrino train derailment
  - At least seven people have been killed and 25 others are injured after an explosion
    caused by the derailment of a train carrying propane and butane in the Bulgarian
    village of Hitrino, near Shumen. (BBC News) (Independent Ireland) (Reuters) (The
    New York Times)
  - Uyo church collapse
  - At least 60 are killed in a collapse of a church in Uyo, Nigeria. (FOX News) (BBC)
  International relations:
  - China opposes any new sanctions against North Korea during a meeting in the United
    Nations Security Council. (The New York Times)
  Politics and elections:
  - Aftermath of the Gambian presidential election, 2016
  - Gambian security forces are deployed on the streets of the capital Banjul, following
    President Yahya Jammeh's rejection of last week's presidential election result.
    (The Guardian)
  - Human Rights Day
  - In the Philippines, demonstrators call for President Rodrigo Duterte to address
    extrajudicial killings linked to the Philippine Drug War, ongoing military operations
    against communist rebels, and the controversial burial of Ferdinand Marcos in
    the Heroes' Cemetery. An effigy of Marcos was made as a centerpiece of the protest.
    (Rappler)
  - United States Senate election in Louisiana, 2016
  - John N. Kennedy of the Republican Party defeats Foster Campbell of the Democratic
    Party to become the junior Senator for Louisiana. (Washington Post)
  Sport:
  - 2016 Major League Soccer season
  - In association football, Toronto FC play Seattle Sounders FC in the MLS Cup final
    held at Toronto's BMO Field. The Sounders win 5–4 in a penalty shootout after
    the game ended scoreless after extra time. It is the Sounders' first MLS title.
    (CTV), (MLS)
  - 2016 NCAA Division I FBS football season (American football)
  - Lamar Jackson of the Louisville Cardinals wins the Heisman Trophy. At 19, Jackson
    is the youngest ever winner of the Trophy. (CNN) (New York Post)
  - In the Army–Navy Game in Baltimore, the Army Black Knights beat the Navy Midshipmen
    21–17. This marks Army's first win in the rivalry since 2001, ending the longest
    winning streak for either side in the rivalry's 126-year history. (AP via ESPN)
