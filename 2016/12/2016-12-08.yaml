Date: '2016-12-08'
Source_URI: Portal:Current events/2016 December 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - As of December 1, the total death toll for the war stands at an estimated 9,758
    people according to a United Nations report released today. (United Nations)
  Disasters and accidents:
  - 2016 Aceh earthquake
  - International aid organisations arrive in the Indonesian province of Aceh as the
    death toll for the earthquake passes 100. (AP)
  Law and crime:
  - Philippine Drug War
  - A panel formed by the Senate of the Philippines concludes that operations under
    Oplan Tokhang by the Philippine National Police is unconstitutional. (Rappler)
  Politics and elections:
  - New Zealand National Party leadership election, 2016
  - Australian Associated Press reports that Bill English has secured the support
    of a majority of members of the New Zealand National Party to succeed John Key
    as the Prime Minister of New Zealand. (AAP via Sky News Australia)
  - Impeachment process against Park Geun-hye
  - A bill is introduced into the South Korean National Assembly to impeach President
    Park Geun-hye. A vote is expected tomorrow. (Reuters)
  - Presidential transition of Donald Trump
  - Carl's Jr./Hardee's executive and minimum wage reform critic Andrew Puzder is
    selected as United States Secretary of Labor. (The New York Times)
  Science and technology:
  - American astronaut John Glenn dies at the age of 95. (Space)
