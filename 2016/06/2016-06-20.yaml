Date: '2016-06-20'
Source_URI: Portal:Current events/2016 June 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A minibus carrying private security guards explodes in Kabul resulting in the
    death of at least 12 people and injuring several others. (Reuters and NBC News)
  - Iraqi Civil War (2014–2017)
  - A suicide bombing strikes Camp Taji, killing four Iraqi Army soldiers. (Radio
    New Zealand)
  Business and economy:
  - The U.S. Supreme Court reversed an appeals court ruling that would have narrowly
    interpreted the auto salesman's exemption from overtime pay rules mandated by
    statute under rules promulgated by the U.S. Labor Department, remanding the matter
    for further consideration. (slip opinion)
  International relations:
  - According to the United Nations High Commissioner for Refugees, the number of
    people displaced by conflicts in the world is at its highest level ever recorded,
    with an estimated 65.3 million people either being refugees, internally displaced
    or asylum seekers. (BBC)
  Law and crime:
  - Human rights in Bahrain
  - Bahraini authorities strip Isa Qassim, the kingdom's most influential Shia cleric,
    of his citizenship after they accused him of promoting "sectarianism and violence".
    (BBC)
  - According to an environmental report by Global Witness, 2015 was the deadliest
    year ever for environmental activists, with the reported deaths of 185 activists,
    as a result of falling commodity prices prompting forceful land grabs by mining
    and foresting companies. (Deutsche Welle)
  - Gun politics in the United States
  - The U.S. Supreme Court declines to review assault weapons bans in Connecticut
    and New York, as it did last December concerning Chicago, Illinois, city law.
    Five other states and Washington, D.C. have similar restrictions. (AP via Fox
    News)
  Politics and elections:
  - Croatian MPs vote to dissolve the Parliament, setting the stage for snap election,
    which are expected to take place in early September. This comes as Croatia is
    facing an escalating political crisis following the last election in November
    2015. (Al Jazeera)
  - 2014–16 Venezuelan protests
  - Per Venezuela's National Electoral Council's ruling, citizens across the country
    queue up for fingerprint validation of 1,850,000 signatures on referendum to recall
    President Nicolás Maduro. The opposition Democratic Unity Roundtable must validate
    197,000 signatures (1 percent of registered voters) by Friday, in this first step
    of the recall referendum process. (Reuters) (TeleSUR)
  Science and technology:
  - Solar Impulse 2, a plane powered only by the sun, leaves New York on the 15th
    leg of its round-the-world journey, a 90-hour flight over the Atlantic Ocean to
    Western Europe. (Reuters) (Business Standard)
