Date: '2016-06-12'
Source_URI: Portal:Current events/2016 June 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - In the Third Battle of Fallujah, ISIL militants attack a military barracks east
    of Fallujah, killing more than 50 government soldiers and militia members. At
    least 12 militants were also killed in the assault. (Al Jazeera)
  - Yemeni civil war
  - Missiles, fired from a U.S. drone, strike a four-wheel drive vehicle in southern
    Yemen, killing two and injuring another suspected militant. (Press TV)
  Arts and culture:
  - Around 10,000 people attend a street party in front of Buckingham Palace to celebrate
    Queen Elizabeth II's 90th birthday. (Reuters)
  - 70th Tony Awards
  - The 70th Tony Awards are held at the Beacon Theatre in New York City with The
    Humans winning the Best Play and Hamilton winning the Best Musical. (Variety)
  - Hamilton sweeps the Tonys, winning 11 of Broadway's top awards including best
    musical, best actor (Leslie Odom, Jr.), best direction (Thomas Kail), best featured
    actress (Renée Elise Goldsberry), and best featured actor (Daveed Diggs). Creator
    Lin-Manuel Miranda won for best score and for best book of a musical. (Otago Daily
    Times) (Forbes)
  - Hamilton fell just short of The Producers record of 12 wins in 2001. (Los Angeles
    Times)
  International relations:
  - European migration crisis
  - Italy's Coast Guard picks up 1,230 migrants in the Mediterranean Sea. More than
    4,000 people have been saved at sea in the past week. (Reuters via Trust)
  Law and crime:
  - Orlando nightclub shooting
  - In what is the deadliest mass shooting and the worst terror attack since 9/11
    to occur in the United States, a mass shooting at a gay nightclub in the U.S.
    city of Orlando, Florida, kills at least 50 people, including the shooter, and
    injures 53. (BBC) (CNN) (Australian Broadcasting Co.)
  - ISIL's Amaq News Agency claims that the assault, "... was carried out by an Islamic
    State fighter". (Reuters) (CBS New York)
  - The FBI identifies the deceased gunman as Omar Mir Seddique Mateen, a 29-year-old
    American citizen born in New York to Afghani parents, and living in Port St. Lucie,
    Florida. Mateen called 9-1-1 during the attack and pledged allegiance to ISIL.
    (CBS New York)
  - Mateen's father, Seddique Mir Mateen, says, "We are saying we are apologizing
    for the whole incident. This had nothing to do with religion." Seddique says that
    during a recent outing in Miami, his son got very angry when he saw men kissing
    and touching each other. According to the elder Mateen, Omar said, "Look at that.
    In front of my son they are doing that." (NBC News)
  - The City of Orlando requests, via Twitter, citizens, "... hold off on vigils —
    they represent a serious strain on our limited resources, which we need to dedicate
    to law enforcement and victims." (The New York Times)
  - The scheduled L.A. Pride parade is held in West Hollywood Park in California.
    A 20-year-old man, whose car was filled with explosive materials and weapons,
    is arrested before he reached the parade area. He is misquoted as saying he wanted
    to harm people at the event. (Los Angeles Daily News)
  - An explosion at Shanghai Pudong International Airport injures at least three people;
    the explosive appears to be homemade. (AP via The Guardian)
  - Lawyers for former President of Chad Hissène Habré, who was recently found guilty
    of crimes against humanity and sentenced to life in prison, appeal the verdict.
    However, a tribunal spokesman said the appeal process is not expected to be done
    before April 2017. (Al Jazeera)
  Sports:
  - UEFA Euro 2016
  - UEFA opens an inquiry into the Russian Football Union after massive fights between
    Russian and English hooligans during and after the match between Russia and England
    in Marseille. Dozens of injuries, including at least one Briton in critical condition,
    and multiple arson attacks occurred throughout the city. (BBC)
  - 2016 KPMG Women's PGA Championship
  - In golf, Brooke Henderson of Canada wins the 2016 KPMG Women's PGA Championship.
    (Seattle Times)
  - 2016 Stanley Cup Finals
  - In ice hockey, the Pittsburgh Penguins win their fourth Stanley Cup title defeating
    the San Jose Sharks 4 games to 2 in the finals. (ESPN)
