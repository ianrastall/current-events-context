Date: '2016-06-04'
Source_URI: Portal:Current events/2016 June 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Syrian Government forces enter Raqqa province, the joint capital of Islamic State
    in Iraq and the Levant. It is one of three simultaneous attacks in Iraq and Syria.
    (Haaretz)
  - Kashmir conflict
  - Two militants attack a police checkpoint in the city of Anantnag in south Kashmir
    killing two Indian police officers. (Indian Express)
  Disasters and accidents:
  - The flight recorder casings and potential flight recorder of Eastern Flight 980,
    which crashed in 1985 on Mount Illimani, Bolivia, are recovered by hikers from
    Boston. (Operation Thonapa)
  Law and crime:
  - Thai authorities remove all 137 tigers from the Tiger Temple in Kanchanaburi Province.
    The remains of 30 more tiger cubs, in addition to the 40 carcasses found earlier,
    were discovered Thursday. Five men have been charged with possession of endangered
    animal parts without permission. (CNN) (Bangkok Post)
  - Nigeria’s information and culture minister says the government has recovered $9.1
    billion in money and assets stolen from the oil sector. (HuffPost)
  Politics and elections:
  - 2016 United States presidential election, United States Virgin Islands Democratic
    caucuses, 2016
  - The Democratic Party in the Virgin Islands, which has seven unpledged delegates,
    holds its caucus with Hillary Clinton. The results, along with those from tomorrow's
    primary in Puerto Rico, could bring Hillary Clinton close to securing the nomination.
    (The Washington Post)
  - Hillary Clinton picks up six out of seven pledged delegates in the V.I. caucus.
    (AP via ABC News)
  Science and technology:
  - Scientists report, in the AHA journal Stroke, that a small trial of stroke victims
    showed significant improvement following injection of stem cells directly into
    their brains. The study had been designed just to test whether the highly experimental
    therapy was safe. Such treatments were available in China for many years but treatment
    results were very inconclusive. (Tech Insider) (Stroke)
  Sport:
  - 2016 French Open – Women's Singles
  - In tennis, Garbine Muguruza of Spain wins the 2016 French Open by 7–5 6–4 in an
    upset defeat of Serena Williams. (CNN)
  - 2016 Epsom Derby
  - In horse racing, Harzand trained by Dermot Weld wins the Epsom Derby. It is the
    fifth horse owned by His Highness The Aga Khan IV to win the Derby. (The Telegraph)
