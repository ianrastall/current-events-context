Date: '2016-06-02'
Source_URI: Portal:Current events/2016 June 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - In a raid by Somali forces near Kismayo, at least 16 Al-Shabaab militants are
    killed, including the mastermind of the Garissa University College attack. (BBC)
  Arts and culture:
  - The United States announces new rules, that will go into effect on July 6, that
    amount to a near-total ban on the commercial trade of African elephant ivory.
    (National Geographic)
  Business and economy:
  - A collection of environmental groups including the Sierra Club file a brief opposing
    the Arch Coal plan to exit from bankruptcy. (Reuters)
  Disasters and accidents:
  - 2016 European floods
  - At least eleven people are killed in heavy flooding across Europe. (BBC) (Bloomberg)
  - The Louvre will close briefly to move the artwork most at risk from flooding.
    (The New York Times)
  - In Smyrna, Tennessee, Captain Jeff "Kooch" Kuss, a pilot of the aerobatic team
    Blue Angels is killed attempting a Split S. The cause was pilot error. (USNI News)
  - A Romanian medical helicopter crashes near Cahul, Moldova, killing four people.
    (Radio Free Europe/Radio Liberty)
  - May 2016 United States storm complex
  - At least five United States Army soldiers are killed and four are missing after
    their Light Medium Tactical Vehicle overturns near Fort Hood in Texas. (KXAN)
  - In Columbus, Ohio, a 7 month old baby is killed in his stroller when a woman driving
    alone with a learning permit jumped the curb, hit his father and the child and
    crashed into a building. No cause of the crash has been established. (WBNS-10TV)
  International relations:
  - Armenian Genocide recognition
  - The German Bundestag passes a resolution classifying the Ottoman Empire's killing
    of Armenians in 1915 as genocide, provoking a furious reaction in Turkey. (BBC)
  Law and crime:
  - An autopsy finds that American musician Prince died of an overdose of fentanyl,
    an opioid painkiller 50 times more powerful than heroin. (AP) (The New York Times)
  - 2016 UCLA shooting
  - A second victim of the UCLA shooter is found in Minnesota; the shooter is identified
    as a former Ph.D. candidate in mechanical engineering that claimed his first victim
    had "cleverly stolen his code." (The New York Times)
  - Four Syrians who are suspected of traveling to Europe on behalf of the Islamic
    State to attack Düsseldorf are arrested. (The New York Times)
  - 2016 Mathura clash
  - 24 people are killed and 368 arrested in the Indian city of Mathura as police
    attempt to clear members of a squatter group from land they are occupying. (The
    Times of India)
  - Violence breaks out at a rally supporting Donald Trump in San Jose, California.
    An officer and several demonstrators were assaulted, and a few people were arrested.
    (CNN)
  - In Ottawa, Canada Marc Leduc is found guilty first-degree murder in the killings
    of two women found dead in 2008 and 2011 involved in drugs and sex trade. His
    DNA was matched after he was arrested in a 2012 sex assault with a knife. (CTV
    News)
  - Catholics in France and Belgium are recovering from ISIS attacks including numerous
    acts of violence and aggression, fires set in churches, an assault on a priest,
    the desecration of a tabernacle and the hacking of more than 100 Catholic websites.
    (Catholic News Agency)
  Politics and elections:
  - U.S. House Speaker Paul Ryan endorses Donald Trump for President of the United
    States. (CNN) (Washington Post)
  - The Supreme Court of the United States accepts a petition by five people from
    American Samoa arguing that people born in this U.S. territory are entitled to
    U.S citizenship under the United States Constitution. The State Department currently
    opposes this idea. (Radio New Zealand)
