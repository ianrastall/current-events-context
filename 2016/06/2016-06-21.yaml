Date: '2016-06-21'
Source_URI: Portal:Current events/2016 June 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Jordanian–Syrian border incidents during the Syrian Civil War
  - A car-bomb explodes near a Jordanian Armed Forces outpost in the extreme north-eastern
    point of Rukban, a makeshift Syrian refugee camp, leaving 6 soldiers dead and
    14 injured. (BBC)
  - Somali Civil War (2009–present)
  - Five Kenyan police officers are killed when Al-Shabaab militants ambush their
    convoy near El Wak, Kenya. (Al Jazeera)
  - Israeli–Palestinian conflict
  - A 15-year-old Palestinian teen is shot and killed by Israel Defense Forces while
    traveling in his family's car through an area where stones had been thrown that
    injured two tourists and an Israeli. The IDF says an official investigation has
    been opened. Preliminary results indicate Mahmoud Rafat Baderan, the teen who
    was shot, was not involved in any stone throwing on the highway. (Haaretz)
  Disasters and accidents:
  - Five people, all foreign holidaymakers, are killed and 23 are injured when their
    bus swerves off a highway en route to Belgrade, Serbia. (Radio Free Europe/Radio
    Liberty)
  International relations:
  - Japan–North Korea relations
  - Japan places its military on high alert to be ready to shoot down any missile
    heading for its territory amid reports of a possible North Korean launch of an
    intermediate-range missile from its east coast. (Reuters) (RT)
  - Egypt–Saudi Arabia relations
  - An Egyptian court, while not final, reverses the decision by President Abdel Fattah
    el-Sisi to cede Tiran and Sanafir Island to Saudi Arabia. (Al Jazeera)
  Law and crime:
  - Jean-Pierre Bemba, leader of the Movement for the Liberation of the Congo, and
    a former Congolese vice president, is sentenced to 18 years in prison by the International
    Criminal Court for war crimes, and for sexual violence crimes against humanity
    in neighboring Central African Republic during 2002 and 2003. (BBC) (The Times)
