Date: '2016-06-03'
Source_URI: Portal:Current events/2016 June 3
Intelligence_Payload:
  Disasters and accidents:
  - 2016 European floods
  - The flood waters for the Seine River are expected to peak at six metres above
    its normal level. Flooding in France and Germany has so far claimed at least 11
    lives. (BBC)
  - A sixth body is recovered in Bavaria near the Austrian border. (AP)
  - European migrant crisis
  - Bodies of 117 people, including 75 women, 36 men and six children, are recovered
    from a beach near Zuwarah, Libya, possibly from yesterday's capsize in the Mediterranean
    Sea. (CNN)
  - Greek authorities rescue 340 people from a boat carrying around 700 migrants that
    capsized 75 nautical miles off the Greek island of Crete. So far nine bodies have
    been recovered. (U.S. News & World Report) (CNN)
  - May 2016 United States storm complex
  - The four missing Fort Hood soldiers from the overturned Light Medium Tactical
    Vehicle are found dead, bringing the death toll from the accident to nine. (AP
    via Los Angeles Times) (UPI)
  - 2016 Union Pacific oil train fire
  - Eleven cars from a 96-car Union Pacific oil train derail, and at least one catches
    fire, in the Columbia River Gorge near Mosier, Oregon, within about 20 feet of
    the city's sewage plant. Coincidentally, a Wasco County Planning Department public
    hearing is scheduled for Tuesday concerning a Union Pacific proposal to expand
    an existing railroad siding on either side of Mosier. (The Oregonian) (Wasco County
    Planning Commission)
  - At least eight people are hospitalized after lightning struck at the Rock am Ring
    music festival near Mendig, Germany. (AP)
  - A helicopter crashes in Nabire, Papua, Indonesia, killing a pilot and three passengers.
    (Detik.com)
  Health and medicine:
  - A study by researchers at the University of North Carolina at Chapel Hill, presented
    at the American Society of Clinical Oncology meeting in Chicago, reports 26 percent
    of cancer patients can't afford to pay for their treatment, and 18 percent can't
    afford their prescriptions. (UPI) (ASCO) (Meeting)
  Law and crime:
  - 2015 FIFA corruption case
  - FIFA shares results of their investigation with legal authorities showing former
    president Sepp Blatter and two others gave themselves nearly $80 million over
    the past five years via annual raises and World Cup bonuses. (NPR)
  Politics and elections:
  - Venezuela's National Election Council cancels a planned meeting to determine the
    validity of 1.85 million signatures on a petition for a referendum to oust President
    Nicolás Maduro. (UPI)
  Sports:
  - In boxing, heavyweight champion Muhammad Ali, dies of respiratory complications
    in a hospital in the American city of Phoenix, Arizona. (NBC News)
  - A ten person team of refugees will compete in the 2016 Summer Olympics in Rio
    de Janeiro. (Al Jazeera)
