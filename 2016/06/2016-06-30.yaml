Date: '2016-06-30'
Source_URI: Portal:Current events/2016 June 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - An Afghan National Security Forces convoy outside Kabul is attacked in a coordinated
    ambush including suicide bombers and heavy machine guns resulting in over 40 deaths.
    (BBC)
  - Boko Haram insurgency
  - At least 15 people are killed and 50 are wounded following two suicide bombings
    in Cameroon's Far North Region. (AP via The New York Times)
  - Iraqi Civil War (2014–2017)
  - According to reports, at least 250 ISIL militants were killed during fighting
    in the city of Fallujah while fighting Iraqi Army forces with assistance from
    U.S. airstrikes. (Reuters via Euronews)
  - 2016 Istanbul airport attack
  - A Turkish official reports the three suspected Islamic State suicide bombers who
    killed 44 people and wounded 238 others were Russian, Uzbek, and Kyrgyz nationals.
    (Reuters)
  - Israeli–Palestinian conflict
  - A 17-year-old Palestinian stabs and kills a sleeping 13-year-old Israeli and American
    citizen girl Hallel Yaffa Ariel in her bedroom. The assailant is fatally shot
    by security guards. Israeli Prime Minister Benjamin Netanyahu blamed "incitement-driven
    terrorists" while the U.S. State Department condemned the "outrageous terrorist
    attack." (AP via Post-Bulletin) (Reuters) (Fox)
  Business and economics:
  - The Hershey Company rejects a $23 billion takeover bid by rival Mondelez International,
    maker of Oreo cookies and Cadbury chocolates. (AP via The Washington Post)
  - The Governor of Puerto Rico authorizes the suspension of payments on the general
    obligation debt of that commonwealth, assuring a default on the $1.9 billion of
    debt payments due the following day.
  Disasters and accidents:
  - European migrant crisis
  - At least 10 people drown off the coast of Libya when their dinghy sinks. The Italian
    Navy managed to rescue over 100 more people. (BBC)
  International relations:
  - Armenia–Russia relations
  - Armenia's parliament, by a 102–8 vote, ratifies an agreement to create an Armenia–Russia
    joint Air Defense system. (Reuters) (Armenpress)
  - The United Nations agrees to appoint an observer to investigate violence against
    LGBT people, despite opposition from various countries. (Radio Free Europe/Radio
    Liberty)
  Law and crime:
  - Colombian, Italian, and U.S. police seize 11 tonnes of cocaine smuggled to various
    countries and arrest 33 people across Colombia and Italy after the discovery of
    seven laboratories in the Colombian jungle run by local organized criminal groups
    and 'Ndrangheta. (Reuters)
  Politics and elections:
  - 2016 Conservative Party (UK) leadership election
  - British home secretary Theresa May enters into the Tory leadership contest, saying
    that Article 50 of the EU Treaty should not be invoked before the end of this
    year, implying that formal Brexit negotiations with the EU institutions be put
    on hold until 2017 at the earliest. (Wall Street Journal)
  - Former Mayor of London Boris Johnson rules himself out of running in the Tory
    leadership contest, a move believed to be influenced by Michael Gove's announcement
    earlier in the day to run for the leadership. (BBC)
  - Presidential transition of Rodrigo Duterte
  - Rodrigo Duterte is inaugurated as President of the Philippines and Leni Robredo
    as Vice President. (The Manila Bulletin), (The Wall Street Journal)
  - Political reshuffle in the Communist Party of China
  - Luo Huining leaves his position as party chief of Qinghai and becomes party chief
    of Shanxi province, replacing Wang Rulin. (SCMP)
  - Qiang Wei leaves his post as party chief of Jiangxi; Governor Lu Xinshe becomes
    the new party chief of Jiangxi. (SCMP)
  - Hubei governor Wang Guosheng becomes party chief of Qinghai province. (SCMP)
  - Lu Wei is replaced as head of the Cyberspace Administration of China by Xu Lin.
    (SCMP)
  - Bosnia and Herzegovina officially releases its first census report since the end
    of the Bosnian War after multiple delays, showing that the country had lost one
    fifth of its population from 4.4 million to 3.5 million between then and 2013.
    (Radio Free Europe/Radio Liberty)
  - Russian Defense Minister Sergey Shoygu dismisses 50 high-ranking Navy officers,
    including Baltic Fleet Commander Viktor Kravchuk and Chief of Staff Sergei Popov,
    following a month-long inspection that found incompetence, deficiencies in training,
    and misinformation regarding the state of the fleet. (UPI) (Reuters)
