Date: '2016-06-10'
Source_URI: Portal:Current events/2016 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A blast occurs at a mosque in a small village in the Nangarhar Province, killing
    four people and injuring nearly 40 more. (Radio Free Europe/Radio Liberty)
  - 2016 Aktobe shootings
  - Kazakh police kill five additional suspected militants in Aktobe as part of a
    "counterterrorism operation". (Radio Free Europe/Radio Liberty)
  - Conflict in the Niger Delta
  - The Niger Delta Avengers blow up an oil pipeline operated by Italy's Eni in the
    Niger Delta. (Reuters)
  - Syrian civil war, Manbij offensive
  - Kurdish-led fighters completely encircle the ISIL-held town of Manbij, near the
    Turkish border, while Syrian forces move closer to ISIL's de facto capital, Raqqa.
    (AP)
  Business and economy:
  - Gawker Media files for Chapter 11 bankruptcy after losing an invasion-of-privacy
    lawsuit brought by former professional wrestler Hulk Hogan, and has sold its blog
    network to Ziff Davis. (Bloomberg) (The New York Times) (Ad Week)
  - The bankruptcy auction for the company gets underway when Gawker accepts tech
    publisher Ziff Davis's bid for all seven of its brands and other assets, reportedly
    for $90 million to $100 million. (CNN)
  - Amazon.com Inc is preparing to start a stand-alone streaming music service, in
    direct competition with Apple Music and Spotify, according to sources who spoke
    to Reuters. (Reuters)
  Disasters and accidents:
  - The United States Geological Survey (USGS) reports a magnitude 5.1 earthquake
    strikes near Borrego Springs, Southern California. The Los Angeles County Fire
    Department and Riverside County Sheriff's Department say they have received no
    reports of serious damage. (NBC News)
  - The United States Geological Survey also reports that a magnitude 6.2 earthquake
    struck off the coast of Malaita island, Solomon Islands. However, no tsunami warning
    has been issued. (Radio New Zealand)
  International relations:
  - Israel–Palestine relations
  - Israel temporarily bans all Palestinians from entering its territory until Sunday
    following the June 2016 Tel Aviv shooting. (AFP via Yahoo! News)
  - Russia–United States relations
  - Russia's Foreign Ministry warns of "retaliatory measures" over the entry of the
    United States Navy destroyer, USS Porter. The USS Porter arrived in the Black
    Sea port of Varna, Bulgaria, earlier this week for what the U.S. Navy called a
    routine deployment. (USA Today)
  - Cuba–United States relations
  - The U.S. Department of Commerce approves service by six commercial airlines from
    five U.S. cities, including Miami and Philadelphia, to nine international airports
    in Cuba. Approval for routes to the capital Havana are still pending. Most of
    the carriers plan to begin their new service this fall and winter. (Miami Herald)
  Law and crime:
  - A Maldives court convicts Ahmed Adeeb, the country's former vice president, of
    masterminding a plot to kill President Abdulla Yameen. He is sentenced to 15 years
    in prison. Earlier this week, Adeeb was sentenced to 10 years for firearms possession.
    (AP)
  - Christina Grimmie, a YouTube star and former contestant on The Voice, is shot
    dead by an "infatuated" fan as she signed autographs following a concert appearance
    with Before You Exit at The Plaza Live in Orlando, Florida. The shooter, 27-year-old
    Kevin James Loibl, shot himself dead after being tackled by Grimmie's brother.
    Grimmie died in a hospital just before 11 p.m. (Orlando Police Department via
    WKMG-TV)
  Politics and elections:
  - Georgia Senator David Perdue is criticized for remarks at the Faith and Freedom
    Coalition’s Road to Majority conference in which his quote of Psalm 109:8, "Let
    his days be few, and may another have his office," appears to be a prayer for
    President Barack Obama’s death. Perdue says, "It was a little humor and I said
    it in a way that we were talking about his days as president." (UPI) (The Daily
    Beast)
  United Kingdom European Union membership referendum, 2016:
  - In a substantial swing, the "Leave" camp is 10 points ahead of "Remain" with less
    than two weeks to go before Britain's referendum on whether to stay in the European
    Union, according to a poll by ORB. (The Independent)
  Sport:
  - Gordie Howe, who scored 801 goals, was a six-time most valuable player during
    26 years in the National Hockey League and won four Stanley Cups with the Detroit
    Red Wings, dies at the age of 88. (CNN)
