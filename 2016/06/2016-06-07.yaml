Date: '2016-06-07'
Source_URI: Portal:Current events/2016 June 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - June 2016 Istanbul bombing
  - Seven police officers and four civilians are killed, and 36 people are wounded,
    three critically, by a car bomb explosion near the main tourism district in Istanbul,
    Turkey. The explosives, detonated by remote control, wrecked a passing police
    bus, reports CNN Türk. There is no immediate claim of responsibility. (Reuters)
    (AP)
  - Turkish police detain four people for interrogation. (The Daily Star)
  - United Nations Secretary-General Ban Ki-moon condemns today’s terrorist attack
    in Istanbul. Ban says, "The UN stands in solidarity with the people and Government
    of Turkey at this difficult time." (UN News Centre)
  - 2016 Aktobe shootings
  - Kazakhstan police report the death toll from Sunday's attack in Aktobe is now
    19 — three civilians, three National Guard servicemen, and 13 attackers. (Reuters)
  Business and economics:
  - The U.S. Justice Department announces pharmaceutical companies Genentech Inc.
    and OSI Pharmaceuticals Inc. will pay $67 million to settle False Claims Act allegations
    for misleading statements about the effectiveness of the drug Tarceva in treating
    non-small-cell lung carcinoma. (UPI)
  Disasters and accidents:
  - Australian east coast low
  - The search continues for three missing people in the Australian states of New
    South Wales and Tasmania. Four deaths have so far been confirmed in the Australian
    Capital Territory, Tasmania and NSW. (AAP via 9 News) (ABC)
  - A pickup truck reported to be driving erratically mowed down a group of nine bicycle
    riders, killing five and injuring four near Kalamazoo, Michigan. The driver was
    arrested after fleeing. Authorities have not established any contributing causes
    of what is being called the worst bicycle accident in the county. (The Atlantic)
    (CTV News)
  Health and medicine:
  - Johns Hopkins University researchers report, in the journal Health Affairs, that
    media reports about people accused of committing violent crimes having mental
    illnesses rarely discuss successful treatment of patients, and thereby overstate
    the problem. Most people exhibiting the types of psychological conditions the
    media mention are not generally violent. The researchers suggest coverage reinforces
    fear of mental illness and the people who have it, and, because of the social
    stigma, discourages people from seeking treatment. (UPI) (Health Affairs)
  Politics and elections:
  - 2016 United States presidential election
  - Voters go to the polls in six states, including California and New Jersey, with
    Hillary Clinton gaining enough delegates to become the presumptive nominee of
    the Democratic Party. She will be the first woman nominee by a major party to
    run for President of the United States. (Reuters) (Fox News)
  - Hillary Clinton wins in California, New Jersey, New Mexico, and South Dakota.
    Bernie Sanders wins in Montana and North Dakota. (AP²) (NMPolitics.net)
  - Donald Trump wins the Republican Party primaries in California, Montana, New Jersey,
    New Mexico, and South Dakota. (AP) (AP²)
  Sport:
  - A German federal court upholds the Court of Arbitration for Sport's 2009 blood
    doping ruling against Olympic speed skating champion Claudia Pechstein who is
    seeking compensation from the International Skating Union for the two-year ban.
    (AP)
