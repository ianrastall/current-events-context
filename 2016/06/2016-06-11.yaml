Date: '2016-06-11'
Source_URI: Portal:Current events/2016 June 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Fighting breaks out between ISIL militants and Afghan police in the Haska Mina
    District, Nangarhar Province, leaving six police officers and 15 militants dead,
    according to officials. (Radio Free Europe/Radio Liberty)
  - Second Libyan Civil War
  - Libyan forces claim to have captured the port in the city of Sirte after heavy
    fighting with ISIL. (BBC)
  - Syrian Civil War
  - According to the Syrian Observatory for Human Rights, two suicide bombings occur
    near the Sayyidah Zaynab shrine in a Damascus suburb, killing at least 20 people.
    (Reuters)
  Sports:
  - UEFA Euro 2016
  - English and Russian football fans riot before the England–Russia Euro 2016 match
    in Marseille and fight afterwards. The match ended in a 1-1 draw. (AP)
  - Fighting breaks out between supporters of Northern Ireland and France in Nice.
    (The Telegraph)
  - 2016 Belmont Stakes
  - Creator, ridden by Irad Ortiz Jr. and trained by Steve Asmussen, wins the 148th
    running of the Belmont Stakes. (NBC News)
