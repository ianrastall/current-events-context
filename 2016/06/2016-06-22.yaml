Date: '2016-06-22'
Source_URI: Portal:Current events/2016 June 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro conflict
  - The Islamic State of Iraq and the Levant declares war on the Philippines. (The
    Philippine Star)
  - Syrian Civil War
  - According to the Syrian Observatory for Human Rights, airstrikes on ISIL-held
    Al-Raqqah kill at least 18 civilians. The group was unable to determine who carried
    out the airstrikes. (BBC) (Washington Post)
  - Battle of Fallujah (2016)
  - The United Nations reports 80,000 civilians have fled Fallujah, as Iraqi Army
    and Shia militias retake most of the city from ISIL. (The Christian Science Monitor)
  - Sectarianism in Pakistan
  - Gunmen kill Sufi devotional singer Amjad Sabri in Pakistan with a faction of the
    Pakistani Taliban claiming responsibility. (New York Times)
  - Gunmen kill a Nigerian driver and kidnap seven people near Calabar, Nigeria. The
    group, which was escorted by a security pickup that reportedly had four armed
    policemen, includes five expatriate and two Nigerian contractors working for Macmahon
    Holdings' United Cement Company plant in the Akpabuyo district. Police report
    two of the workers escaped. Police commissioner Jimoh Ozi-Obeh says no ransom
    has been received. (TimesLIVE) (Daily Post)
  Disasters and accidents:
  - Lightning strikes in the Indian states of Bihar and Uttar Pradesh kill at least
    70 people, mostly farm labourers. (Al Jazeera)
  - A severe thunderstorm and tornado near Yancheng, Jiangsu Province, China, kills
    at least 98 people. See 2016 Jiangsu tornado. (BBC)(The Seattle Times)
  International relations:
  - North Korea–South Korea relations, North Korea and weapons of mass destruction
  - South Korea reports that North Korea has tested two BM25 Musudan intermediate-range
    ballistic missiles. (CNN)
  - Spillover of the Syrian Civil War
  - Jordan declares its borders with Syria and Iraq are to be closed military zones
    following yesterday's suicide bomb attack in Rukban, Mafraq Governorate, that
    killed six soldiers. (BBC)
  Politics and elections:
  - 2016 House Democrats sit-in
  - United States President Barack Obama signs the Frank R. Lautenberg Chemical Safety
    for the 21st Century Act into law. The legislation is the first major overhaul
    of toxic chemicals rules in America in 40 years. (The Washington Post) (AP via
    The New York Times)
  - Greek debt crisis
  United Kingdom European Union membership referendum, 2016:
  - European Commission president Jean-Claude Juncker warns the British voters, saying
    that there would be no re-negotiations with Britain whatever outcome of its membership
    referendum. (Independent)
  - Georgia Representative John Lewis leads about 40 U.S. House of Representatives
    Democrats in a sit-in after the U.S. Senate failed to approve any of four gun
    control measures Monday night. (NBC News) (Politico)
  - The European Central Bank reinstates the waiver that enables Greek banks to use
    the country's bonds as collateral for regular loans, for the first time in more
    than a year. (AP) (Reuters)
  Science and technology:
  - India's ISRO successfully launches 20 satellites in a single mission. (Times of
    India)
  Sport:
  - In ice hockey, the NHL awards Las Vegas an expansion team to begin play in the
    2017–18 season. The Board of Governors defers Quebec City's bid with the league,
    citing factors such as conference imbalance, difficulty of bringing two teams
    at the same time, and the weakening Canadian dollar. (NHL)
