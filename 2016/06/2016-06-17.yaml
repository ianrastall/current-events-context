Date: '2016-06-17'
Source_URI: Portal:Current events/2016 June 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017), Military intervention against ISIL, Battle of Fallujah
    (2016)
  - The Iraqi government recaptures the main government compound in Fallujah. (AFP
    via Daily Mail)
  - Kurdish separatism in Iran
  - 2016 West Iran clashes
  - Kurdish rebels and Iranian Revolutionary guards clash in Oshnavieh, killing 12
    rebels and three guards. There is dispute over who the rebels were. Iranian authorities
    claim it was the Party of Free Life of Kurdistan movement while a member of the
    Democratic Party of Iranian Kurdistan claimed their group was responsible for
    the fighting. (Radio Free Europe/Radio Liberty)
  - Boko Haram insurgency
  - Boko Haram militants attack a funeral in the village of Kuda in the Adamawa State
    of Nigeria, killing 18 women, with more reportedly still missing. (Al Jazeera)
  - Insurgency in the North Caucasus
  - Four Russian security officers and six militants are killed in an anti-terrorism
    operation in Dagestan. (Radio Free Europe/Radio Liberty)
  Business and economy:
  - The U.S. Justice Department has decided against an action against Angelo Mozilo,
    former chief executive of Countrywide Financial, arising out of the issuance of
    mortgage backed securities during his tenure there. (Reuters)
  Disasters and accidents:
  - EgyptAir Flight 804
  - The second flight recorder from the wreckage of ill-fated EgyptAir Flight 804
    is recovered from the crash site in the Mediterranean Sea. (Channel NewsAsia)
  - 2016 California wildfires
  - A wildfire in Santa Barbara County, California doubles in size overnight to 4,000
    acres. The Santa Barbara County Sheriff's Office says mandatory evacuations remain
    in effect for areas such as El Capitán State Beach. The blaze was currently 5%
    contained, according to Los Padres National Forest officials. (Los Angeles Times)
  Law and crime:
  - 2002 Gujarat riots
  - A court in India sentences dozens of people to prison, some of them for life,
    for their roles in riots that killed 69 Muslims in the city of Ahmedabad in 2002.
    (BBC)
  Sport:
  - 2016 Summer Olympics
  - The International Olympic Committee (IOC) upholds its ban on Russian track and
    field athletes participating in the 2016 Summer Olympics in Rio de Janeiro due
    to various doping scandals. IOC officials plan to gather next Tuesday to discuss
    the matter further. (BBC)
