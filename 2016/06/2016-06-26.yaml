Date: '2016-06-26'
Source_URI: Portal:Current events/2016 June 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - Battle of Fallujah (2016)
  - The head of the counter terrorism forces which partook in the offensive says that
    the city of Fallujah has been "fully liberated". (AP)
  - Boko Haram insurgency
  - Fighting in various remote villages in the Borno State of Nigeria kill at least
    one civilian and six Boko Haram militants. According to the Nigerian Army, they've
    rescued more than 5,000 hostages from the militants. (Al Jazeera)
  - Syrian Civil War
  - Airstrikes reportedly kill at least 82 people, including 58 civilians, in Syria's
    eastern Deir ez-Zor Governorate, according to the Syrian Observatory for Human
    Rights. (Al Jazeera)
  Business and economy:
  - The expanded Panama Canal opens after a $4.5 billion expansion allowing larger
    ships to use it. (Los Angeles Times)
  Disasters and accidents:
  - A bus fire kills at least 35 people in China's Hunan Province. (AFP via Geo TV)(Reuters)
  - A roller coaster derails and crashes at M&D's theme park in Motherwell, Scotland.
    Ten people are reportedly injured. (BBC)
  - Five people are killed in the American state of Colorado after an Amtrak train
    collides with a minivan carrying six people near the town of Trinidad, Colorado.
    (9 News) (Denver Post)
  Law and crime:
  - Unidentified men with bush knives attack the Papua New Guinea University of Technology
    in the city of Lae, killing one student, and set fire to various buildings on
    the campus. (Radio New Zealand)
  - Organized crime in Italy
  - Ernesto Fazzalari, Italy's second most-wanted fugitive and member of 'Ndrangheta,
    is arrested by the Carabinieri near Molochio in Calabria, Southern Italy, after
    two decades on the run. Interior Minister Angelino Alfano described Fazzalari
    as "one of the most important fugitives and a leading underworld figure". (The
    Guardian)
  - Police report multiple stabbings at a planned "white pride" rally in Sacramento,
    California, between the Traditionalist Workers Party and counter-protesters. The
    Sacramento Fire Department reports seven people were taken to local hospitals,
    two with life-threatening wounds. (CBS News) (ABC News)
  Politics and elections:
  - 2016 Spanish general election
  - Voters in Spain go to the polls for a general election six months after an inconclusive
    election. Polls indicate that no party will be in position to form a government.
    (AP)
  - United Kingdom withdrawal from the European Union
  - Nicola Sturgeon, the First Minister of Scotland, says that Scottish Parliament
    has the power to veto the United Kingdom's exit from the European Union. (BBC)
  - Heidi Alexander, Gloria De Piero, Ian Murray, Lilian Greenwood, Lucy Powell, Kerry
    McCarthy, Seema Malhotra, Vernon Coaker, Charlie Falconer, Karl Turner and Chris
    Bryant resign en masse from the Labour Shadow Cabinet of Jeremy Corbyn in protest
    at Jeremy Corbyn's leadership over the EU referendum, and the firing of Hilary
    Benn. (BBC)
  - The petition calling for a second referendum passes three million signatures.
    (Parliament UK)
  Sport:
  - Copa América Centenario
  - In football, Chile wins the Copa América, defeating Argentina in a penalty shootout
    after regular time and extra time end scoreless. (Daily Mirror)
  - Argentina star Lionel Messi, who became Argentina's all-time leading goalscorer
    during the Copa, announces his retirement from international football after the
    game. (ABC News)
