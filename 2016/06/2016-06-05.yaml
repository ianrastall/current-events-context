Date: '2016-06-05'
Source_URI: Portal:Current events/2016 June 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kurdish–Turkish conflict (2015–present)
  - Turkish Air Force bombs Kurdistan Workers' Party targets in northern Iraq and
    southeastern Turkey killing at least 27 militants. (Reuters)
  - 2016 Aktobe shootings
  - Three people are killed and 10 more are injured following an attack on a military
    base in Aktobe, Kazakhstan, by suspected Islamists. (RT)
  - War in Afghanistan
  - David Gilkey, an NPR photojournalist and a 2015 winner of the Edward R. Murrow
    Award, and Afghan journalist and translator Zabihullah Tamanna are killed when
    the Afghan army unit they were accompanying comes under fire near Marjah in Helmand
    Province. (AP) (NPR) (Corporation for Public Broadcasting)
  Business and economy:
  - English/American comedian John Oliver buys and then forgives $15,000,000 (USD)
    in medical debt to about 9,000 people, making it the biggest ever giveaway in
    television history. (CNN)
  Disasters and accidents:
  - Australian east coast low
  - New South Wales facing evacuations and a rising flood threat as heavy rain and
    high winds hit Sydney and Newcastle. Parts of Victoria and Tasmania are braced
    for wild weather. (The Guardian)
  - Hermalle-sous-Huy train collision
  - A passenger train crashes into a goods train in the Belgian town of Hermalle-sous-Huy
    in the municipality of Saint-Georges-sur-Meuse, resulting in at least three deaths
    and more than 40 injuries. (Reuters) (Reuters² via ABC News Australia)
  - 2016 Calabasas fire
  - Firefighters have contained about 80 percent of the 516-acre brush fire in Calabasas,
    California. Evacuation orders affecting at least 5,000 people in the Los Angeles
    area are being lifted. The fire started yesterday when a pickup truck struck a
    power pole. (CNN) (NBC News)
  - 2016 Atlantic hurricane season
  - Tropical Storm Colin
  - Tropical Storm Colin forms in the Gulf of Mexico and is likely to hit Florida's
    Gulf Coast tomorrow. (Reuters)
  Law and crime:
  - Six people are hurt as an unknown assailant fires shots at a Czech tourist bus
    on the A7 autoroute near Saulce-sur-Rhône in southeastern France. (BBC)
  Politics and elections:
  - Peruvian general election, 2016
  - Voters in Peru go to the polls for the second round of voting in a presidential
    election where Keiko Fujimori and Pedro Pablo Kuczynski are the remaining candidates.
    (International Business Times)
  - Early results indicate Kuczynski has a slight lead over Fujimori, 50.59 percent
    to 49.41 percent, with about 52% of the votes counted. (Reuters)
  - Swiss referendums, 2016
  - Voters in Switzerland go to the polls to vote in a number of referenda including
    a proposal for a basic income of 2,500 francs a month. (AP via Daily Mail)
  - 77% of Swiss voters reject the proposed basic income plan. (BBC)
  - 2016 United States presidential election, Puerto Rico Democratic primary, 2016
  - Amid frustrations with the ongoing economic crisis, Puerto Rican Democrats vote
    in the Commonwealth's primary with front-runner Hillary Clinton forecast to win
    following yesterday's sweep in the Virgin Islands' caucus, moving even closer
    to locking up her party's presidential nomination. There are 60 pledged delegates
    at stake. (AP via U.S. News & World Report) (CNN)
  - Hillary Clinton wins Puerto Rico's Democratic presidential primary and, according
    to the Associated Press, is now less than 30 delegates short of the 2,383 needed
    to win the nomination. (AP) (NPR)
  Sport:
  - 2016 French Open – Men's Singles
  - Novak Djokovic tops Andy Murray to win the French Open men's championship. This
    completes his non-calendar year Grand Slam. Djokovic is the first man since 1969
    (Rod Laver) to hold all four Grand Slam singles titles at once. (CNN)
