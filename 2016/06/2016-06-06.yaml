Date: '2016-06-06'
Source_URI: Portal:Current events/2016 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Five people working for Jordanian intelligence are killed in an attack in a Palestinian
    Baqa'a refugee camp near Amman. (Al Arabiya)
  Disasters and accidents:
  - Australian east coast low
  - 'Three bodies have been discovered in flood waters: two in the state of New South
    Wales and one in the Australian Capital Territory. Two people are missing in Tasmania.
    (ABC News Australia)'
  - A soldier is killed and another injured after a fire spread to an ammunition dump
    at the Salawa army camp near Sri Lanka's capital Colombo. Thousands of people
    in the area were evacuated. The fire is under control, according to a military
    spokesman. (AP)
  - 2016 Atlantic hurricane season
  - Florida Governor Rick Scott declares a state of emergency as Tropical Storm Colin's
    rain and gusty winds pelt the state's west coast. Maximum sustained winds at 1:00
    p.m. EDT are 50 mph (85 kpm). Between three and five inches of rain are forecast
    for northern Florida, with some areas getting up to eight inches. (Miami Herald)
    (NHC)
  - The National Hurricane Center says this is the earliest a third named storm has
    ever formed in the Atlantic basin. (CBS News)
  Health and medicine:
  - Singapore researchers report, in the nanomaterials journal Small, the creation
    of a new antimicrobial material capable of neutralizing E. coli bacteria, including
    antibiotic-resistant bacteria such as Staphylococcus aureus and Pseudomonas aeruginosa.
    (UPI) (Wiley Online Library)
  Law and crime:
  - Researchers report that testing of 5,000 forgotten Cuyahoga County, Ohio, police
    rape kits for unsolved cases between 1993 and 2010 has led to more than 250 criminal
    convictions. (UPI) (Case Western Reserve University)
  Politics and election:
  - Peruvian general election, 2016
  - With more than 92% of the vote counted, Pedro Pablo Kuczynski is ahead of Keiko
    Fujimori by just over 103,000 votes, 50.3 percent to 49.6 percent, in the electorate
    of 23 million citizens. Ballots of Peruvians living abroad will begin to arrive
    tonight. Mariano Cucho, the head of the electoral office, says the count may not
    be finalized until Thursday or Friday. (CNN via WFXP) (Reuters) (Fox News Latino)
  - With 96.13% of ballots counted, Pedro Pablo Kuczynski's lead shrinks to less than
    50,000 votes, with 50.14 percent of the votes versus Keiko Fujimori's 49.85 percent.
    (Financial Times)
  - Haitian presidential election, 2015–16
  - Haiti will redo its presidential election after findings of widespread voter fraud
    in last years voting. Additional measures will be put in place for the first round
    in October this year. (Fox News)
  - Democratic Party presidential primaries, 2016
  - The Associated Press reports that Hillary Clinton has the support of enough delegates
    to secure the Democratic Party nomination. Since delegates do not vote until the
    convention though, she is the presumptive nominee of the party. (AP)
