Date: '2016-06-27'
Source_URI: Portal:Current events/2016 June 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War spillover in Lebanon
  - A suicide bomber attacks the Lebanese village of Qaa near the Syrian border, with
    at least six people dead and 13 people injured. (BBC)
  - At least two people are killed and 72 are injured following a grenade attack on
    a concert at the Mahamasina Municipal Stadium in Madagascar's capital, Antananarivo.
    (Reuters)
  Business and economy:
  - Brexit impact
  - The value of the British pound initially falls by more than 2% as Asian markets
    open to a decline. (Reuters)
  - A number of analysts, including Ralf Preusser from Bank of America and Ric Deverell
    from Credit Suisse, believe that the United Kingdom economy is heading into a
    recession. (Poundsterlinglive)
  - The Dow Jones drops by more than 300 points in early trading, but rebounds a bit
    to close at a loss of 260.51. (CNBC)
  - Standard & Poor's downgrades the UK credit rating from AAA to AA with a negative
    outlook. Fitch follows by downgrading UK from AA+ to AA. (The Guardian)
  - Volkswagen emissions scandal
  - Volkswagen faces settlement costs of $15 billion to settle lawsuits in the United
    States resulting from the rigging of emissions tests. (Bloomberg)
  Disasters and accidents:
  - A Singapore Airlines Boeing 777-300ER en route to Milan's Malpensa Airport makes
    an emergency landing at Singapore's Changi Airport after the pilots received an
    engine oil warning message, whereafter the plane's right engine caught fire. Singapore
    Changi Airport's aircraft rescue and firefighting services extinguished the fire
    and Singapore Airlines confirmed that all 222 passengers and 19 crew members evacuated
    safely. (CNN) (The Sydney Morning Herald)
  - 2016 West Virginia flood
  - Two men initially thought to have died when a camper was swept away in Greenbrier
    County are found alive, lowering the death toll from the disaster to 20 confirmed
    fatalities and three others missing and presumed dead. (AP via Fox News)
  International relations:
  - India formally joins the Missile Technology Control Regime (MTCR). (The Times
    of India)
  - Russia–Turkey relations, 2015 Russian Sukhoi Su-24 shootdown
  - Turkish President Recep Tayyip Erdoğan writes Russian President Vladimir Putin
    to offer condolences to the family of the deceased Russian pilot of the Sukhoi
    Su-24 warplane shot down last November. The Kremlin has insisted on a personal
    apology for months. A Turkish spokesman says this is a step toward improving bilateral
    relations between the two countries. (The Washington Post) (The Guardian)
  - Israel–Turkey relations
  - Israeli Prime Minister Benjamin Netanyahu and Turkish Prime Minister Binali Yıldırım
    announce their countries have agreed on a pact to normalize diplomatic relations
    that have been strained for six years since the Gaza flotilla raid when nine Turkish
    activists were killed. (Christian Science Monitor) (Los Angeles Times) (The Times
    of Israel)
  Law and crime:
  - Former Moldovan Prime Minister Vlad Filat is sentenced to prison for nine years
    after being found guilty of corruption and abuse of power. (Radio Free Europe/Radio
    Liberty)
  - Whole Woman's Health v. Hellerstedt
  - The Supreme Court of the United States strikes down a law that would have required
    abortion clinics in Texas to upgrade in order to meet new "hospital-like" standards.
    Supporters of abortion rights said that the proposed law would force nearly all
    abortion clinics in the state to shut down, while their opponents argued for women's
    health benefits. (CNN)
  United Kingdom withdrawal from the European Union:
  - Peter Altmaier, German Chancellor Angela Merkel’s chief of staff, warns Britain
    of dire consequences of exit from the European Union, saying in a newspaper interview
    that UK leaders should not rule out the possibility of another referendum on the
    same issue. (Daily Mail) (Bloomberg)
  - Joining their 12 colleagues from the day before, Luciana Berger, Angela Eagle,
    Maria Eagle, Kate Green, Nia Griffith, John Healey, Lisa Nandy and Owen Smith
    resign from the Labour Shadow Cabinet of Jeremy Corbyn, alongside 18 junior shadow
    ministers and 9 additional frontbenchers, while Angela Smith and Steve Bassam
    of the House of Lords leadership will boycott attending Shadow Cabinet meetings,
    all in protest at Jeremy Corbyn's leadership over the EU referendum, and the firing
    of Hilary Benn. (The Guardian)
  - The European Union refuses informal talks with the United Kingdom until they trigger
    Article 50 to leave. (BBC)
  Sport:
  - UEFA Euro 2016
  - Underdogs Iceland defeat England 2-1 at the Allianz Riviera in Nice to reach the
    quarter-finals of the UEFA European Championship. (BBC)
  - Roy Hodgson announces his resignation as England manager following the team's
    defeat to Iceland. (BBC)
