Date: '2016-11-19'
Source_URI: Portal:Current events/2016 November 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War
  - At least 12 tribal fighters were killed by ISIL insurgents. The attack occurred
    in Shirqat. (Reuters)
  - Yemeni Civil War (2015–present), Saudi Arabian-led intervention in Yemen
  - The Saudi-led coalition announces a 48 hour ceasefire in Yemen from noon. (Bloomberg)
    (Reuters, AFP via Breaking News)
  - A missile killed a Saudi soldier in Asir province (Reuters)
  - Terrorism in Pakistan
  - At least four are killed in an attack in Quetta, Pakistan. Islamic State of Iraq
    and the Levant claims responsibility. (Live Mint) (FOX News)
  - Insurgency in Northeast India
  - Three soldiers are killed in an ambush in Assam. (Times of India)
  Business and economics:
  - After a software error, Mexicans purchase US$2500 Dell Alienware laptops for just
    US$33 each. (BBC)
  Disasters and accidents:
  - 2016–17 UK and Ireland windstorm season
  - The Met Office issues warnings for parts of South East England as Storm Angus
    prepares to make landfall. (BBC)
  - An air ambulance on its way to University of Utah Medical Center in Salt Lake
    City crashes in Elko, Nevada. 4 people, including 3 crew and one patient are killed,
    and vehicles on the ground are damaged during the crash. (NBC News)
  Politics and elections:
  - Bersih 5 rally
  - Tens of thousands of people protest in the Malaysian capital Kuala Lumpur, calling
    for Prime Minister Najib Razak to step down amid an ongoing corruption scandal
    involving 1Malaysia Development Berhad. (Reuters)
  - Pope Francis creates 17 new cardinals during a consistory in St. Peter's Basilica,
    raising the membership of the College of Cardinals to 228, of whom 121 are eligible
    to vote in a papal election. (Holy See Press Office)
  Science and technology:
  - An Atlas V rocket launches the GOES-R geosynchronous environmental satellite that
    will cover the Western Hemisphere for weather forecasting. (Florida Today)
  Sports:
  - In NASCAR, Daniel Suárez wins the season's final race in the second-tier Xfinity
    Series, the Ford EcoBoost 300, claiming the season title in the process. The Mexican
    becomes the first foreign driver ever to win a season championship in any of NASCAR's
    three U.S.-based national touring series. (ESPN)
