Date: '2016-11-22'
Source_URI: Portal:Current events/2016 November 22
Intelligence_Payload:
  Business and economics:
  - The board of TransAsia Airways decides to dissolve the company after halting flights
    on Tuesday. (Bloomberg) (The Wall Street Journal) (The New York Times)
  Disasters and accidents:
  - 2016 Fukushima earthquake
  - A 6.9 magnitude earthquake off Japan's Fukushima Prefecture injures 15 people,
    and triggers a 1 meter tsunami that causes a temporary power disruption at Fukushima
    Daini Nuclear Power Plant. (weather.com) (BBC) (News Corp via the West Australian)
  - A 56-vehicle pile-up on the G5 Beijing–Kunming Expressway in China's northern
    Shanxi province, leaves at least 17 people dead and 37 others injured. (BBC)
  - 2016 Atlantic hurricane season
  - Hurricane Otto impacts Panama. A tropical storm watch is issued for Nicaragua
    from Bluefields to Sandy Bay Sirpi. (NOAA)
  - European migrant crisis
  - Rescuers recovered 8 bodies and saved 1400 migrants adrift on the Mediterranean
    Sea today. (IANS via the Indian Express)
  - A German court acquits seven Islamists who formed a "Sharia police force" in the
    city of Wuppertal in 2014 after determining that they were not violating a law
    against "intimidating or militant uniforms". (RT) (Deutsche Welle)
  Law and crime:
  - Former Egyptian Interior Minister Habib el-Adly is placed under house arrest on
    embezzlement charges. (Daily News Egypt)
  Politics and elections:
  - Presidency of Donald Trump
  - Trump's aide Kellyanne Conway announces that the president-elect will not seek
    new charges against Hillary Clinton for possible crimes related to her email server.
    (New York Times)
  Sports:
  - In ice hockey, the identity of the Las Vegas team that will become the NHL's 31st
    franchise in the is unveiled as the Vegas Golden Knights. (ESPN)
