Date: '2016-11-26'
Source_URI: Portal:Current events/2016 November 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - A car bomb kills at least 20 in Mogadishu. (VOA News)
  - Terrorism in Pakistan
  - Four suicide bombers and two soldiers are killed in a failed attack on the Ghalani
    camp in the Mohmand tribal district. Jamaat-ul-Ahrar claims responsibility. (VOA
    News) (Dawn) (Fox News)
  - Syrian Civil War, Aleppo offensive (November 2016)
  - Government forces have captured most of Hanano, the largest rebel-controlled district
    in eastern Aleppo, and have begun pushing into neighboring 'Ard Al-Hamra and Jabal
    Badro districts. (BBC) (Al Masdar News)
  - Moro conflict
  - November 2016 Butig clash
  - Soldiers killed at least 11 insurgents in Butig. (Reuters)
  Business and economy:
  - The chief executive of Royal Dutch Shell, Ben van Beurden, denies the claim that
    his company's balance sheet contains any assets that will be "stranded," that
    is that will have to be written off, due to the Paris Climate Accord. (Reuters)
  Disasters and accidents:
  - At least seven people are dead, one person is missing and three others are rescued
    after a chartered fishing boat capsizes due to large waves in Kaipara Harbour,
    New Zealand. (AP via Fox News)
  Health:
  - 2016 influenza A virus subtype H5N8 outbreak
  - Avian flu virus H5N8 outbreaks are reported in birds in India, Germany, Finland,
    Ireland, the Netherlands, and several other European nations. The World Health
    Organization advised on 17 November that human infection is possible, but unlikely,
    based on information available. (Reuters) (The New York Times) (Business Insider)
    (Agriland) (Phys.org) (WHO)
  Law and crime:
  - Semnan–Damghan train collision
  - Iran arrests three railway officials in connection with yesterday's deadly train
    crash in Semnan that killed 45 and injured 103 people. (AFP via Yahoo! News) (Press
    TV)
  - The Iraqi parliament passes a law recognizing Shia paramilitary units as a government
    entity, complete with salaries and pensions that mirror those of the military
    and the police. (Al Jazeera)
  Politics and elections:
  - Cuban state television announces that former President Fidel Castro has died at
    age 90. (BBC)
  - 2016 South Korean protests
  - South Koreans take to the streets en masse demanding the resignation of President
    Park Geun-hye amidst a corruption scandal. Around 1.5 million people rallied in
    the capital Seoul, while another 400,000 people demonstrated in provincial cities.
    (Al Jazeera)
  - 2016 Kuwaiti general election
  - Kuwait, where citizens make up around 30 percent of the emirate's 4.4 million
    population, votes in a snap election following parliament's dissolution on 16
    October amid the impact of falling oil prices. This is the first election the
    opposition has not boycotted in nearly four years. (Daily Mail)
  - 2016 United States presidential election recount and audit
  - The Clinton campaign announces it will participate in efforts to push for recounts
    by Jill Stein's campaign in Michigan, Pennsylvania and Wisconsin. (CNN)
