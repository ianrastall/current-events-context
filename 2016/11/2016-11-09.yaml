Date: '2016-11-09'
Source_URI: Portal:Current events/2016 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Operation Inherent Resolve
  - The United States military states that it has inadvertently killed 64 civilians
    in air strikes on targets in Syria and Iraq over the past year. (AP via Fox News)
  Disasters and accidents:
  - 2016 Croydon tram derailment
  - At least seven people have been killed and 51 hospitalised after a Tramlink light
    rail vehicle derailed and overturned close to Sandilands tram stop in the London
    Borough of Croydon early on Wednesday. It is believed to be the first tram accident
    involving fatalities in the United Kingdom since 1959. (BBC News)
  Politics and elections:
  - 2016 United States presidential election and 2016 United States elections
  - Donald Trump, the Republican nominee for the 2016 presidential election, becomes
    the president-elect of the United States after defeating Hillary Clinton, the
    Democratic nominee in the electoral college. It is the fifth time in United States
    history where the winning candidate lost the popular vote, the last such defeat
    occurring in 2000 when George W. Bush defeated Al Gore.
  - The Republican Party retains control of the House and Senate. (The New York Times)
  - Notable propositions are passed in several states including legal recreational
    marijuana in California, Massachusetts, and Nevada; medical marijuana in Arkansas,
    Florida and North Dakota; tougher firearms restrictions in California and Washington
    state; physician assisted suicide in Colorado, and the reimposition of capital
    punishment in Nebraska. (BBC) (The Chicago Tribune)
  - Over 100,000 protest the election of Donald Trump in Chicago; Los Angeles; Oakland,
    California; Philadelphia; Portland, Oregon, New York City; Seattle and other major
    cities, reflecting a deep political divide in the United States. (CNN) (ABC)
  - Some residents and business leaders in the state of California, which voted with
    majority support for Hillary Clinton, propose launching a secession movement from
    the United States after Donald Trump is elected president. (Time) (BBC)
  International relations:
  - Canada–United States relations
  - The immigration website of Canada crashes due to overflow, coinciding with the
    election in the United States. (CNN)
  Law and crime:
  - The Supreme Court of the United States hears arguments on a case regarding whether
    the citizenship claim of a child is different if there is an unmarried father
    versus an unmarried mother who is a U.S. citizen. (Scotus blog)
