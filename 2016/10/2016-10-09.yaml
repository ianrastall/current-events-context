Date: '2016-10-09'
Source_URI: Portal:Current events/2016 October 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kurdish–Turkish conflict (2015–present)
  - A suspected PKK car bomb kills at least 17 people, and injures 27 others in Turkey's
    southeast Hakkâri Province. (The Independent)
  - Israeli–Palestinian conflict (2015–present)
  - A shooting takes place in Jerusalem that kills two people, including a police
    officer, injuring six others. The attack was carried out by a Palestinian gunman
    who opened fire from a vehicle on people waiting at a train station and then the
    nearby police headquarters in Jerusalem. Israeli police kill the gunman. (BBC)
  - Yemeni Crisis (2011–present)
  - The United States Navy's destroyer USS Mason comes under missile attack in the
    Red Sea, off the coast of Yemen. The two missiles, fired from Yemeni territory
    controlled by Iranian-backed Houthis, impacted the water well before reaching
    the ship, according to Pentagon spokesman Captain Jeff Davis. (Reuters)
  Arts and culture:
  - Pope Francis announces the upcoming creation of 17 new Cardinals; 13 of them will
    be under the age of 80 and thus able to vote in a future papal conclave to select
    the new Pope. (The Vatican Information Service)
  Disasters and accidents:
  - An Afghan Armed Forces Mi-17 helicopter crashes in northern Afghanistan with all
    seven people onboard, four crewmen and three passengers, dying. (AFP via The Bangkok
    Post)
  - A man driving the wrong way on Interstate 89 in Williston, Vermont, kills five
    people, all local high school juniors. (The Burlington Free Press), (AP via Fox
    News)
  Law and crime:
  - 2016 Ethiopian protests
  - Ethiopia's government declares a six-month state of emergency amid continuing
    protests, especially in the restive Oromia Region. (BBC)
  Politics and elections:
  - United States presidential election debates, 2016
  - Hillary Clinton and Donald Trump hold the second presidential debate of the 2016
    U.S. presidential election at Washington University in St. Louis, Missouri, in
    a "town meeting" format. (CBS News)
  - Lithuanian parliamentary election, 2016
  - Voters in Lithuania vote to elect representatives for the 141-seat parliament.
    (Bloomberg via The Chicago Tribune)
  - A court sentences former Communist Party Secretary of Yunnan province, Bai Enpei,
    to death for corruption and amassing wealth of unclear origin. (The South China
    Morning Post)
  - Thailand's King Bhumibol Adulyadej, 88, the world's longest reigning monarch,
    is in unstable condition after a hemodialysis treatment. (Reuters), (Al Jazeera)
  Sports:
  - Festus Talam wins the Eindhoven Marathon with a time of 2 hours, 6 minutes, and
    26 seconds. (Kenya Page)
