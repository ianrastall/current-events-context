Date: '2016-10-01'
Source_URI: Portal:Current events/2016 October 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Houthi forces launch rockets that hit and reportedly destroy HSV-2 Swift, a military
    vessel belonging to the United Arab Emirates Navy, off the coast of Yemen, near
    the strategic Red Sea port of Mokha. (Reuters), (Press TV)
  - Syrian Civil War
  - Russian and Syrian government attacks on rebel-held east Aleppo kill two people
    and injure 13 others. The Syrian American Medical Society reports the city's main
    trauma hospital closes. (Reuters), (BBC)
  - War in Somalia
  - A car bomb at a Mogadishu restaurant near the Jilaow detention center kills four
    people and injures another five. Al-Shabaab claims responsibility for the attack.
    (CNN), (Reuters)
  - A Somalian regional government demands an explanation from the United States after
    an airstrike kills 22 civilians and other soldiers instead of the targeted Al-Shabaab
    militants in Galmudug. (BBC)
  Business and economy:
  - Volkswagen emissions scandal
  - Volkswagen agrees to pay its U.S. dealers up to US$1.2 billion to compensate them
    for their losses resulting from the company's emissions cheating scandal. (The
    Los Angeles Times)
  Disasters and accidents:
  - Mexico's Volcán de Colima erupts forcing the evacuation of two nearby villages.
    (Reuters via ABC News Australia)
  Politics and elections:
  - The leader of the Spanish Socialist Workers' Party, Pedro Sánchez, resigns. (BBC)
  - The Obama administration through the United States Department of Commerce transfers
    oversight of the technical management of the Internet by the Internet Corporation
    for Assigned Names and Numbers to an international consortium of stakeholders.
    (Reuters)
  Sport:
  - Dublin defeats Mayo in the 2016 All-Ireland Senior Football Championship Final,
    retaining the Sam Maguire Cup for the first time since 1977. (Sky), (BBC)
  - 2016 AFL Grand Final
  - In Australian Rules football, the Western Bulldogs defeat the Sydney Swans to
    win their first premiership since 1954. (ABC Australia)
