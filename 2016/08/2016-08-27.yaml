Date: '2016-08-27'
Source_URI: Portal:Current events/2016 August 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Paraguayan People's Army insurgency
  - At least eight Paraguayan Army soldiers are killed in an ambush by suspected Paraguayan
    People's Army (EPP) insurgents, near the village of Arroyito, in northern Paraguay.
    (BBC)
  - Kurdish–Turkish conflict (2015–present)
  - Suspected Kurdish militants fire rockets at Diyarbakır Airport in Diyarbakır,
    Turkey. (Reuters)
  Disasters and accidents:
  - A fire at a warehouse in Moscow, Russia, kills at least 17 people, all migrant
    workers from Kyrgyzstan. The Investigative Committee of Russia, which reports
    directly to President Vladimir Putin, says a criminal inquiry has been launched.
    (Radio Free Europe/Radio Liberty)
  Politics and elections:
  - Northern Territory general election, 2016
  - The opposition Australian Labor Party defeats the governing Country Liberal Party
    in a landslide, reducing the CLP to just two seats. (The Guardian)
