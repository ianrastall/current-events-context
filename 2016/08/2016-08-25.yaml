Date: '2016-08-25'
Source_URI: Portal:Current events/2016 August 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Philippine Drug War
  - The death toll in Rodrigo Duterte's war on drugs reaches 1,900 people killed.
    (Al Jazeera)
  - Syrian Civil War
  - Turkey sends more tanks into northern Syria to continue its offensive against
    Islamic State of Iraq and the Levant and Kurdish People's Protection Units (YPG).
    (Reuters)
  Business and economy:
  - Miners in the Philippines criticize the government after a crackdown on mining
    closed more nickel and copper mines. (Gulf Times), (Jakarta Globe)
  Disasters and accidents:
  - August 2016 Central Italy earthquake
  - The search continues for survivors in central Italy with the death toll now 241.
    An aftershock of 4.7 MMS hits further east in the province near Norcia. (AFP via
    ABC News Australia) (USA Today) (USGS) (Financial Times)
  Health:
  - 2015–16 Zika virus epidemic
  - Hong Kong's Centre for Health Protection confirms Hong Kong's first case of Zika
    virus in a 38-year-old woman and says it will report the case to the World Health
    Organization (WHO). (Channel News Asia)
  Law and Crime:
  - Three people are killed and two are injured after a crossbow attack in Scarborough,
    Toronto. A suspicious package was also found in another linked event.(CBC)
  Politics and elections:
  - Impeachment process against Dilma Rousseff
  - Brazil's Federal Senate begins the impeachment trial of suspended President Dilma
    Rousseff. (Reuters)
