Date: '2016-08-07'
Source_URI: Portal:Current events/2016 August 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 stabbing of Charleroi police officers
  - ISIL claims responsibility for the machete attack in Belgium. (Reuters)
  Disasters and accidents:
  - 2016 Macedonian floods
  - Floods in Macedonia's capital, Skopje, kill at least 21 people with six others
    missing and dozens injured following torrential rain and strong winds late Saturday.
    (BBC) (AP)
  - 2016 Atlantic hurricane season
  - The death toll from mudslides in Eastern Mexico triggered by Hurricane Earl rises
    to 38, with 28 people killed in Puebla, and 10 others in Veracruz. (Reuters)
  - Incidents at independent amusement parks
  - A ten-year old boy dies after suffering a neck injury while riding the 168-feet
    tall Verrückt water slide at the Schlitterbahn water park in Kansas City, Kansas,
    U.S. The boy is identified as Caleb Schwab, son of Kansas Rep. Scott Schwab. (USA
    Today) (Global News)
  Law and crime:
  - Philippine Drug War
  - President Rodrigo Duterte releases a list of politicians, police officers and
    military personnel allegedly involved in the illicit drug trade. (Rappler)
  - Oscar Pistorius is admitted to a Pretoria hospital after sustaining injuries to
    his wrists. Blades are subsequently found in a search of his cell. (News24)
  - Iran confirms it has executed nuclear scientist Shahram Amiri by hanging for treason.
    Iranian judiciary spokesman Gholam-Hossein Mohseni-Eje'i says Amiri was charged
    with spying for enemies of the Islamic Republic of Iran and that U.S. officials
    had been unaware that Iran was monitoring Amiri's efforts for the West. His body
    was returned to his family with rope marks around his neck. (USA Today)
  Politics and elections:
  - Thai constitutional referendum, 2016
  - Voters in Thailand go to the polls to vote on whether a new constitution, which
    would restore elections but empower the military, should it be adopted. The military
    junta has banned campaigning in opposition to the new constitution. The constitution
    is approved by 61.45 percent. (BBC)
  Sport:
  - 2016 Summer Paralympics
  - The International Paralympic Committee bans all Russian athletes from the Paralympics
    due to state-sponsored sample doctoring to avoid the detection of the use of banned
    drugs. (BBC Sport)
  - After the men's 400-metre freestyle final of the 2016 Summer Olympics, Australian
    gold medalist Mack Horton says Chinese silver medalist Sun Yang is a "drug cheat",
    referring to Sun's three-month doping ban in 2014; Chinese netizens have swarmed
    Horton's online pages to demand an apology; Chinese state media has since called
    Horton "immoral" and described Australia as a former "offshore prison". (The Sydney
    Morning Herald) (ABC News) (Sky News)
  - In baseball, the Miami Marlins' Ichiro Suzuki becomes the 30th Major League Baseball
    player with 3,000 career hits, reaching the milestone with a seventh-inning triple
    against the Colorado Rockies. (ESPN)
  - Jim Furyk becomes the first golfer to shoot a round of 58 in an official PGA Tour
    event, doing so in the final round of the Travelers Championship. (ESPN)
