Date: '2016-08-06'
Source_URI: Portal:Current events/2016 August 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - The Syrian Observatory for Human Rights claims that 10 people have been killed
    in an air strike on a hospital in the town of Milis in Syria's Idlib province.
    (AFP via Yahoo! News)
  - 2016 stabbing of Charleroi police officers
  - A man attacks two policewomen with a machete in Charleroi, Belgium, whilst reportedly
    shouting Allahu Akbar. The attacker was shot dead by another police officer. The
    policewomen are being treated in hospital for non-life-threatening wounds. The
    attack is being investigated as a possible act of terrorism. (Telegraph), (Bloomberg)
  - Moro conflict
  - Three people, including a pregnant woman, are kidnapped in Patikul, Sulu, in the
    Philippines Autonomous Region in Muslim Mindanao. No group has claimed responsibility,
    though Abu Sayyaf is suspected. (UPI) (GMA News)
  Business and economy:
  - Reuters reports, based on sources "familiar with the matter," that Nissan is talking
    with Panasonic Corp. about the sale of Nissan's car battery manufacturing operation.
    (Reuters)
  Disasters and accidents:
  - 2016 Rouen fire
  - A fire kills at least 13 people in a bar in the French city of Rouen. (CNN)
  - 2016 Atlantic hurricane season
  - Tropical Storm Earl makes its final landfall near Veracruz in eastern Mexico,
    producing flooding rains that kill at least six. (EFE), (AP via New York Times)
  International relations:
  - Territorial disputes in the South China Sea
  - China's People's Liberation Army Air Force says it has conducted "combat patrols"
    near the disputed Spratly Islands and Scarborough Shoal in the South China Sea
    as part of an effort to normalize such drills and respond to security threats.
    Xian H-6 strategic bombers and Su-30 fighter jets took part in the patrols, according
    to Xinhua News Agency. (Reuters)
  Politics and elections:
  - 2016 United States presidential election
  - Hawaii U.S. Senator Brian Schatz criticizes Donald Trump for calling the Philippines
    a 'terrorist' country. (The Manila Bulletin)
