Date: '2016-08-10'
Source_URI: Portal:Current events/2016 August 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ukrainian crisis
  - Russia's Federal Security Service (FSB) says it has thwarted two armed Ukrainian
    incursions into Crimea with at least two killed, including one FSB officer, following
    a "massive fire fight" with "sabotage-terrorist" groups. Ukraine denies the Russian
    claims. (Reuters) (The Guardian)
  - Royal Canadian Mounted Police kill 24-year-old Aaron Driver in Strathroy, Ontario.
    Driver was accused of supporting the Islamic State of Iraq and the Levant, and
    was believed to have been plotting an "imminent" attack against Canadians. (CP24)
  Arts and culture:
  - 400-year old petroglyphs are discovered off the Waianae coast of Hawaii. (CNN)
  Business and economics:
  - Boeing's CFO Greg Smith announces that Boeing won't raise production of its 787
    Dreamliner to fourteen per month as previously expected, but will keep it at 12
    while continuing to monitor demand. (Reuters)
  Disasters and accidents:
  - A fire caused by an electrical fault at the Al-Yarmouk Teaching Hospital in Baghdad
    kills 11 babies. (Newsweek)
  Law and crime:
  - The Supreme Court of Belize rules that Belize's anti-sodomy law is unconstitutional.
    Belize becomes the last country in Central America to strike down its sodomy law.
    (NBC News}
  Politics and elections:
  - Impeachment process against Dilma Rousseff
  - Brazil's Federal Senate votes 59 to 21 to indict suspended President Dilma Rousseff
    on charges of breaking budget laws and put her on trial. (Reuters)
