Date: '2016-08-21'
Source_URI: Portal:Current events/2016 August 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - An al-Shabaab suicide car bomb kills at least 20 people in the town of Galkayo
    in Somalia's semi-autonomous Puntland region. (Reuters)
  - Gaziantep bombing
  - The death toll from the Turkish wedding bombing rises to 50 with up to 94 people
    injured. Islamic State in Iraq and the Levant is suspected of conducting the attack.
    (Daily Sabah)
  International relations:
  - Philippine Drug War
  - Rodrigo Duterte threatens to withdraw the Philippines from its founding membership
    of the United Nations after the international body criticized him over alleged
    human rights violations. (BBC)
  Law and crime:
  - Iraqi Civil War
  - Iraq hangs 36 men convicted of taking part in the Islamic State group's massacre
    of hundreds of soldiers in 2014. (AP)
  - A shooter wounds at least 13 people at a house party in Bridgeport, Connecticut.
    (AP via Fox News)
  Politics and elections:
  - 2016 Labour Party (UK) leadership election
  - London Mayor Sadiq Khan calls on fellow Labour Party members to remove Jeremy
    Corbyn in the upcoming party leadership election. (Reuters) (The Observer via
    The Guardian)
