Date: '2016-08-15'
Source_URI: Portal:Current events/2016 August 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - An air strike by the Saudi-led coalition which hit a hospital in northern Yemen
    run by Médecins Sans Frontières (Doctors Without Borders) kills at least 11 people.
    (BBC)
  Disasters and accidents:
  - 2016 Louisiana floods
  - At least seven people have died and thousands have been rescued in the American
    state of Louisiana. President of the United States Barack Obama has declared a
    federal emergency in the state. (BBC), (NBC News)
  - An Olympics aerial camera and its cables fall sixty-five feet, injuring seven
    people. (USA Today)
  - Heavy rainfall causes multiple bus crashes that kill at least 40 people and injure
    86 in the Kavrepalanchowk bus crashes. (CNN)
  Law and crime:
  - Pennsylvania Attorney General Kathleen Kane is convicted of perjury and obstruction
    of justice. (WCAU-TV)
  - Former English Premier League player Dalian Atkinson dies after being tasered
    by police in Telford, Shropshire. (The Independent)
  - New York authorities charge a man with second-degree murder in the deaths of a
    New York Muslim imam and his assistant. (Reuters)
  Politics and elections:
  - The Obama administration transfers 15 Guantanamo Bay detainees to the United Arab
    Emirates. (BBC)
