Date: '2016-08-13'
Source_URI: Portal:Current events/2016 August 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - At least 10 children are killed and 28 injured in an air attack on a school in
    northern Yemen. The Houthi group claims that the Saudi Arabia led coalition is
    responsible. (Reuters via ABC News)
  - Syrian civil war
  - The Syrian Observatory for Human Rights says that at least 51 people have been
    killed in the Syrian city of Aleppo. (AFP via Yahoo! News)
  Disasters and accidents:
  - 2016 Louisiana floods
  - Louisiana Governor John Bel Edwards declares a state of emergency as over 17 inches
    of rain (43 cm) causes unprecedented flooding across the region and takes at least
    three lives in his state, with more rain expected through Sunday. (Reuters), (AP)
  - The death toll from Thursday's explosion in a Silver Spring, Maryland, apartment
    building rises to three with others still missing. The cause of the blast has
    not yet been officially determined. (Reuters)
  Law and crime:
  - Six people are injured by a knifeman who also set fire to a train at Salez, Switzerland.
    (BBC News Online)
  - A lone gunman shoots a Muslim cleric and an associate to death in the Ozone Park
    neighborhood of Queens, New York City. Both were still wearing religious garb
    following afternoon prayers. No arrests have been made. (Reuters)
  - 2016 Milwaukee riots
  - Violence breaks out in Milwaukee, Wisconsin, following a fatal police shooting
    of a 23-year-old male criminal armed with a handgun earlier in the day. The Milwaukee
    Police Department says an officer was injured after being struck in the head by
    a brick, while a police car and gas station were set on fire. (NBC News)
  Sport:
  - 2016 Summer Olympics
  - Darya Klishina, Russia's sole track and field competitor at the Rio Olympics,
    has her exemption to Russia's blanket ban revoked. Reportedly, new evidence emerged
    in relation to a World Anti-Doping Agency report. Klishina is appealing the decision
    to the Court of Arbitration for Sport. (Reuters)
  - The United States becomes the first nation to win 1000 gold medals at the Olympic
    Games when its 4 × 100 medley relay team of Kathleen Baker, Lilly King, Dana Vollmer
    and Simone Manuel wins. (USA Today)
