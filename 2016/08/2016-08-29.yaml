Date: '2016-08-29'
Source_URI: Portal:Current events/2016 August 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro conflict
  - At least 12 Philippine Army soldiers die in clashes with the Abu Sayyaf. (BBC)
  - Yemeni Civil War (2015–present)
  - The death toll of a suicide bombing in the southern Yemeni city of Aden rises
    to at least 71. Islamic State in Iraq and the Levant claims responsibility. (Reuters)
  - 2016 Kashmir unrest
  - A curfew has ended in the Indian state of Jammu and Kashmir after 52 days of protest
    allowing for an all-party delegation to visit the state on Sunday. (Times of India)
  Arts and culture:
  - Gene Wilder, known for his role as the title character in Willy Wonka & the Chocolate
    Factory, and for his collaborations with Mel Brooks, dies at the age of 83. (Variety)
  Disasters and accidents:
  - A lightning strike from a freak thunderstorm kills 323 reindeer in Norway. (The
    Washington Post)
  - 2016 Pacific hurricane season
  - A hurricane watch is issued for the island of Hawaii as Hurricane Madeline approaches.
    (AP)
  Health:
  - 2015–16 Zika virus epidemic
  - The number of Zika virus infected in Singapore rises above 40. (NBC)
  Law and crime:
  - Philippine Drug War
  - Philippines president Rodrigo Duterte calls on critic senator Leila de Lima to
    resign and "hang herself". (Rappler)
  - Duterte rejects claims that he is inciting genocide with his anti-drug campaign.
    (The Daily Beast)
  - Multiple individuals rammed a van into the entrance of the Brussels National Institute
    of Criminology building, setting its laboratories on fire. No casualties have
    been reported. At least five people are arrested. (BBC) (BNO News)
  - U.S. officials are investigating the hacking of election system databases in Illinois
    and Arizona. The FBI alerted all election officials nationwide about this issue
    earlier this month. (CNN) (NBC News)
  Politics and elections:
  - Political reshuffle in China
  - Li Jinbin becomes Communist Party Secretary (top official) of Anhui, succeeding
    Wang Xuejun.
  - Chen Quanguo becomes Communist Party Secretary of the Xinjiang Uyghur Autonomous
    Region, succeeding Zhang Chunxian, who will take on another office.
  - Li Jiheng becomes Communist Party Secretary of the Inner Mongolia Autonomous Region,
    succeeding Wang Jun. (South China Morning Post)
  Science and technology:
  - Scientists from the University of Texas at Austin postulate that the hominin fossil
    Lucy (Dinkinesh) died due to a fall from a tree. Paleoanthropologist Donald Johanson,
    who is credited with discovering and naming Lucy, disagrees. (National Geographic)
