Date: '2016-08-03'
Source_URI: Portal:Current events/2016 August 3
Intelligence_Payload:
  Business and economy:
  - The European Banking Authority supports retaining a 3% leverage ratio for most
    banks within the European Union. (Reuters)
  Disasters and accidents:
  - The search continues for survivors of a bridge collapse on the Mumbai-Goa highway
    over the flooded Savitri River in western India. Twenty two people and two buses
    are believed to be missing. (AP via The Washington Post), (Times of India)
  - An Emirates Boeing 777-300, flight EK521 from Thiruvananthapuram in India, crash
    lands at Dubai International Airport and bursts into flames. All 282 passengers
    and 18 crew evacuate safely, although one firefighter is killed during the rescue.
    (BBC) (CNN) (Al Jazeera)
  - 2016 Atlantic hurricane season
  - Tropical Storm Earl, now about 265 miles (425 km) east-southeast of Belize City
    with top sustained winds of 70 mph (110 KM/H), becomes Hurricane Earl that could
    produce up to 16 inches of rain by the time it hits Belize. On Sunday, then a
    tropical wave, Earl was responsible for nine deaths, with four people still missing,
    in the Dominican Republic. (NBC News) (NHC public advisory)
  - 2016 Pacific typhoon season
  - Nida, the strongest typhoon to hit the Chinese coast in 33 years with winds of
    up to 145 kilometers per hour (90 mph), affects about 500,000 people; led to the
    cancellation of over 180 flights at the Hong Kong International Airport; caused
    2,100 people to need emergency living assistance; destroyed over 300 houses; and,
    damaged about 2,400 houses and 19,600 hectares (48,433 acres) of crops. (News
    Nation) (CNN)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea launches two ballistic missiles, one of which explodes immediately
    after its launch while the main part of the other lands in Japan's economic exclusion
    zone. (Reuters)
  Law and crime:
  - Manus Island
  - A court in Papua New Guinea orders the closure of the facility housing migrants.
    (The Guardian)
  - The United States Supreme Court grants a Virginia school board's emergency request
    to stop implementation of the federal government policy that calls for student
    use of the bathroom consistent with their gender identity in order to allow the
    board to appeal the Fourth Circuit Court ruling that upheld this policy. (Reuters)
    (The Wall Street Journal) (Los Angeles Times) (Metro Weekly)
  - 2016 Russell Square stabbing
  - At least one person is dead and several injured as a result of a knife attack
    in London's Russell Square. (BBC)
  Science and technology:
  - The United States Federal Aviation Administration approves private startup company
    Moon Express landing a robotic craft on the Moon, according to the Mountain View,
    California, company. (The New York Times) (SpaceNews)
  Sports:
  - 2016 Summer Olympics
  - Competition begins with six matches in women's football. (ESPN)
