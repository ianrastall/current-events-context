Date: '2016-08-05'
Source_URI: Portal:Current events/2016 August 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Assam attacks
  - Gunmen open fire in a market in Assam, India, killing 13 people and injuring 18.
    (India Today)
  - Iraqi Civil War, Military intervention against ISIL
  - The United Nations reports that ISIL appears to have captured up to 3,000 fleeing
    Iraqi villagers from Hawija District headed to Kirkuk city. Militants reportedly
    executed 12 people. Earlier, the Iraqi Observatory for Human Rights said ISIL
    is using people for human shields against attacks by Iraqi security forces. (NRT
    News) (NBC News)
  - War in Afghanistan
  - At least 10 people are killed by a pair of explosions in the Tsamkani District
    in the eastern Afghan province of Paktia. Spokesman Naqib Ahmad Atal says the
    Taliban are to blame. (AP)
  Business and economy:
  - A U.S. district court judge gives the go-ahead to a billion-dollar lawsuit against
    PricewaterhouseCoopers in connection with the losses at MF Global in October 2011.
    (Reuters)
  Disasters and accidents:
  - A Pakistani Mi-17 transport helicopter belonging to the Punjab government en route
    to Russia for repair, crashed on Thursday night in Logar Province, Afghanistan.
    The six people on board have been taken hostage by the Taliban. (The Express Tribune)
    (Pakistan Today)
  - After the crash of a Pakistani Mi-17 transport helicopter belonging to the Punjab
    government, Army Chief General Raheel Sharif had called the U.S. Military Commander
    in Afghanistan, General John Nicolson, and asked him to help recover the crew.
    The Afghan government and Afghan Army have also been contacted for recovery of
    helicopter and crew. (Dunya News)
  International relations:
  - 2016 United States presidential election
  - Republican presidential candidate Donald Trump says he plans to ban immigration
    from Afghanistan, Iraq, Morocco, Pakistan, the Philippines, Somalia, Syria, Uzbekistan
    and Yemen. (The Washington Post)
  - European migrant crisis
  - Ventimiglian police commander Giorgio Marenco says the more than 100 migrants
    who crashed the Italian border town's police barriers and entered France remain,
    under French police surveillance, outside the French Riviera town of Menton. (Reuters)
  Law and crime:
  - A Swedish court orders the owner of the luxury cruise ship that was due to house
    1,800 asylum seekers before the Swedish Migration Agency pulled the plug to immediately
    leave its port. The local County administration says it intends to forcefully
    execute the ruling of the court if the vessel has not left the port by Monday
    morning. (Local)
  Politics and elections:
  - British activists with the Black Lives Matter movement from America block the
    road to Heathrow Airport and to streets in Manchester, Birmingham, and Nottingham,
    marking the fifth anniversary of the deadly police shooting of Mark Duggan in
    north London. Ten protestors are arrested. (NBC News) (Reuters)
  Sports:
  - The 2016 Summer Olympics held in the Brazilian city of Rio de Janeiro officially
    start with the Opening Ceremony at Maracanã Stadium. (BBC)
