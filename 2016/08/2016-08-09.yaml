Date: '2016-08-09'
Source_URI: Portal:Current events/2016 August 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli-Palestinian conflict
  - Israel charges a UN administrative manager of being a Hamas-linked operative from
    Gaza. (The Associated Press via The New York Times)
  - Saudi Arabian-led intervention in Yemen
  - At least 14 people are killed after Saudi-led coalition airstrikes hit a food
    factory in Yemen's capital Sana'a. The airstrikes come just days after the suspension
    of inconclusive peace talks in Kuwait. (The Guardian)
  Arts and culture:
  - The Islamic State of Iraq and the Levant threatens to attack the Miss Universe
    2016 pageant if it were to be held in the Philippines. (Fox News)
  Business and economics:
  - Delta Air Lines cancels about 530 flights worldwide on the second day of its major
    computer systems problem due to malfunctioning switchgear. (Reuters)
  Disasters and accidents:
  - 2016 California wildfires
  - The out-of-control Pilot Fire hits 7,500 acres of bone-dry tinder and brush in
    the San Bernardino Mountains east of Los Angeles. More than 5,000 homes are under
    evacuation orders. Authorities shut down school districts in the area. (Reuters)
  - 2016 Portugal wildfires
  - A raging wildfire destroys dozens of homes and prompts the evacuation of more
    than 400 people from Portugal's Madeira island as flames spread near the island's
    capital, Funchal. Regional President Miguel Albuquerque says one person had suffered
    serious burns and scores of others had needed treatment for the effects of smoke.
    Flights have also been disrupted at Madeira Airport due to smoke. (BBC)
  Law and crime:
  - Philippine Drug War
  - Rodrigo Duterte says he might declare martial law in the Philippines if his spat
    with the Supreme Court escalates. (Rappler)
  - The United States Department of State expresses "concern" over extrajudicial killings
    in the Philippines. (The Washington Post)
  - Irom Chanu Sharmila is set to end her 16-year fast against India's Armed Forces
    (Special Powers) Act.(News18)(Ndtv)
  - Murder of Seth Rich
  - WikiLeaks announces that it is offering $20,000 for information leading to a conviction
    in last month's shooting death of 27-year-old Democratic National Committee (DNC)
    staffer Seth Rich in Bloomingdale, Washington, D.C.. Police say they believe Rich
    was likely killed in an attempted robbery. (The Hill)
  Science and technology:
  - A study conducted at the Royal Melbourne Institute of Technology shows a positive
    correlation with playing online video games and higher test scores in math, science
    and reading while a negative correlation with social media use. (CNN)
  Sport:
  - 2016 Summer Olympics
  - French swimmer Camille Lacourt accuses Chinese swimmer Sun Yang of doping, saying
    "he pisses purple", while American swimmer Michael Phelps says "something needs
    to be done" to prevent doping from infiltrating swimming. (AFP via ABC News)
