Date: '2016-08-30'
Source_URI: Portal:Current events/2016 August 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinjar massacre
  - Thousands of Yazidi are believed to be buried in 72 newly-discovered mass graves
    left by ISIL after the 2014 massacre. (The Daily Mail)
  - A car bomb explodes near the Chinese embassy in Kyrgyzstan, killing the perpetrator
    and injuring three. (The New York Times)
  - Somali Civil War (2009–present)
  - A car bomb explodes outside the President of Somalia's compound in Mogadishu claiming
    at least ten people's lives. Al Shabaab has claimed responsibility for the attack.
    (Daily Mail)
  - Syrian Civil War
  - The Islamic State of Iraq and the Levant says its official spokesman, Abu Mohammad
    al-Adnani, has been killed in Syria's Aleppo Governorate. The group's statement,
    distributed by Amaq News Agency, did not say how al-Adnani was killed. (Reuters)
  Business and economy:
  - The European Union orders Apple to pay up to 13 billion euros in back taxes to
    Ireland. A three-year investigation by the EU's competition commissioner concludes
    that Apple received "illegal state aid" from Ireland, the EU order that Apple
    pay 13 billion euros ($14.5 billion), and, in addition, interest and unpaid taxes.
    (Reuters)
  Disasters and accidents:
  - Numerous tremors rock the Katla volcano in Iceland prompting the government to
    raise the alarm level. (Bloomberg)
  Health:
  - 2015–16 Zika virus epidemic
  - Australia, South Korea and Taiwan issue travel advisories concerning Singapore
    after cases of Zika virus infection in the city-state passes 50. (Reuters)
  International relations:
  - Philippines v. China
  - Philippines president Rodrigo Duterte says he would not press on for China to
    abide by the South China Sea ruling but he might do so in the future. (Voice of
    America)
  Law and crime:
  - 'Two North Korean officials are reportedly publicly executed by Kim Jong-un after
    they allegedly disobeyed orders: former agriculture minister Hwang Min for unsuitable
    policies and Ri Yong Jin, a senior official at the education ministry, for sleeping
    at a meeting with Kim, disrespect for the leader and corruption. They were allegedly
    executed by anti-aircraft artillery fire. (International Business Times) (The
    Guardian, UK)'
  - American singer Chris Brown is arrested on suspicion on assault with a deadly
    weapon following a lengthy stand-off with the Los Angeles Police Department. (NBC
    Los Angeles)
  Politics and elections:
  - Venezuelan protests
  - Venezuelan officials arrest several opposition activists, including Popular Will
    Party leaders, just days before Thursday's scheduled national protest against
    the rule of President Nicolás Maduro. (Reuters) (Bloomberg)
  - Impeachment of Dilma Rousseff
  - The Senate postpones the impeachment vote on suspended President Dilma Rousseff
    to Wednesday. (The New York Times)
