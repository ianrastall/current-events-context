Date: '2016-08-22'
Source_URI: Portal:Current events/2016 August 22
Intelligence_Payload:
  Disasters and accidents:
  - 2016 Pacific typhoon season
  - Typhoon Mindulle is forecast to make landfall near the Japanese capital Tokyo
    with flights and train services being cancelled. It arrives one day after Typhoon
    Kompasu. (Bloomberg), (CNN)
  - At least 40 people are killed and hundreds of thousands are evacuated due to flooding
    caused by days of heavy rain in central and eastern India. (ABC News)
  International relations:
  - North Korea–South Korea relations
  - South Korea and the United States start annual military drills despite North Korea's
    threats of nuclear attacks. (AP)
  - Iran–Russia relations
  - Iran confirms that Russia will stop using its Hamadan Airbase to launch attacks
    in Syria, saying Russia's use of Hamadan Airbase was "temporary, based on a Russian
    request," and that Russian operations are "finished for now". Iranian Defence
    Minister Hossein Dehghan earlier criticized Russia's announcement of its use of
    the base in Iran, saying "There has been a kind of showing-off and inconsiderate
    attitude behind the announcement of this news." (The Washington Post)
  Law and crime:
  - Ahmad al-Mahdi pleads guilty at the start of his trial before the International
    Criminal Court for the war crime of destroying cultural sites in Timbuktu. (BBC
    News)
  - Philippine Drug War
  - The death toll estimates for the crackdown on recreational drugs in the Philippines
    reaches 1,800 amid a senate investigation of the killings. (NBC News)
  Politics and elections:
  - President of the Philippines Rodrigo Duterte fires thousands of former president
    Benigno Aquino III appointees from the government. (Time magazine)
  - French presidential election, 2017, The Republicans (France) presidential primary,
    2016
  - Former President of France Nicolas Sarkozy officially declares his candidacy for
    president in 2017. (The Guardian)
  Science and technology:
  - Microsoft acknowledges that a Windows 10 update has stopped millions of webcams
    from working. (BBC)
