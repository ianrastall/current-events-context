Date: '2016-08-19'
Source_URI: Portal:Current events/2016 August 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - Russian warships in the Mediterranean Sea fire cruise missiles at sites near Aleppo.
    The Russian Defense Ministry claims the strikes targeted the Islamist militant
    group Jabhat Fateh al-Sham. (Pravda) (Reuters)
  Arts and culture:
  - The American town of Shishmaref, Alaska, votes to relocate the village from its
    current location on a barrier island, that has been disappearing through erosion
    and rising sea levels, to a site on the mainland. (The New York Times) (ABC News)
  Law and crime:
  - A Defense Department audit reveals that the United States Army had manipulated
    its finances, making $6.5 trillion of improper accounting adjustments in order
    to balance the books in 2015. (Reuters)(The Hill)(CNN)
  Politics and elections:
  - 2016 United States presidential election
  - Paul Manafort resigns as chairman of Donald Trump's presidential campaign. (The
    Guardian)
