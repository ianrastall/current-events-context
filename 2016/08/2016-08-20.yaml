Date: '2016-08-20'
Source_URI: Portal:Current events/2016 August 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gaziantep bombing
  - A suicide bomber targets a Kurdish wedding celebration in the Turkish city of
    Gaziantep killing at least 22 people and wounding 94. (Reuters), (Reuters via
    New York Times)
  - 2016 Citronelle homicides
  - Six people, including an unborn baby, were killed in Citronelle, Alabama. A 27-year-old
    man was arrested as a suspect in the case. (CNN)
  Business and economy:
  - India announces the new governor of its central bank, the Reserve Bank of India,
    is Urjit Patel, formerly the RBI's deputy governor for monetary policy. (Reuters)
  Law and crime:
  - Derrick Dearman a 27-year-old Mississippi man kills five people in the U.S. town
    of Citronelle, Alabama then kidnaps his pregnant ex-girlfriend from among the
    victims. Nearby, the Greene County, Mississippi Sheriff's office takes the surrender
    and confession of the suspect. (Reuters)
  Sports:
  - 2016 Summer Olympics
  - Mo Farah of Great Britain wins the men's 5,000 metres to go along with his earlier
    gold medal in the 10,000 metres. By successfully defending his golds from the
    2012 Games in both events, he becomes only the second man to win these two events
    at consecutive Olympics, alongside Lasse Virén of Finland (1972 and 1976). (BBC)
  - Matthew Centrowitz wins the men's 1,500 metres for the first American gold in
    the event since 1908. (BBC)
  - In men's football, Brazil defeats Germany 5–4 on penalties after a 1–1 draw to
    claim their first-ever gold medal in the sport. (BBC)
  - In women's golf, Inbee Park of South Korea wins the gold medal. (BBC)
