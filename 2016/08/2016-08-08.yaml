Date: '2016-08-08'
Source_URI: Portal:Current events/2016 August 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Ethiopian protests
  - More than fifty protesters are killed by Ethiopian security forces over the last
    few days. The government restricted internet and journalist access to the country.
    (Al Jazeera)
  - Quetta Bombing
  - At least 70 people are killed and about 120 others injured in a suicide bombing
    at a hospital in Quetta, Pakistan. (BBC)
  - The Pakistani Taliban, Jamaat-ul-Ahrar, claims responsibility for the attack.
    (BBC²)
  Arts and culture:
  - Emperor Akihito of Japan says he intends to lessen his official duties due to
    old age. (USA Today)
  - The Philippine Defense ministry prepares for the burial of former President Ferdinand
    Marcos in the Heroes' Cemetery. (Rappler) (GMA News)
  Business and economy:
  - Delta Air Lines ground their operations after a malfunction in their system headquarters.
    (Chicago Tribune)
  Disasters and accidents:
  - 2016 Atlantic hurricane season
  - At least 40 people are killed by landslides from floods created from Earl's heavy
    rainfall in the eastern Mexican states of Puebla and Veracruz. The tropical depression
    dissipated early today. (NPR) (The Yucatan Times) (NHC)
  - 2016 Pacific hurricane season
  - Remnants of Hurricane Earl helped form Tropical Storm Javier which is southeast
    of the Mexican resort of Cabo San Lucas on the Baja California Peninsula. A hurricane
    warning is issued for the southern portion of the peninsula. Rainfall from the
    storm is expected to impact the American Southwest, starting Tuesday evening.
    (The Yucatan Times) (The Weather Channel) (NHC)
  International relations:
  - 2016 United States presidential election
  - A Filipino lawmaker proposes a bill banning Republican U.S. presidential candidate
    Donald Trump from entering the Philippines after Trump compared Filipino legal
    immigrants to terrorists. (The Washington Post), (Rappler)
  - Japan–North Korea relations, North Korea and weapons of mass destruction
  - Japan orders its military to shoot down any North Korean missiles that threaten
    to strike Japan at anytime, and is placing its forces on a state of alert for
    at least three months, according to a Ministry of Defense official. (Reuters)
  - Pope Benedict XVI issues a new appeal for an end to bloodshed in Syria, and added
    a plea for peace in Libya. (Catholic World News)
  Politics and Elections:
  - A report showing a negative evaluation of the British Government's Troubled Families
    programme is leaked to the BBC. (BBC)
  Sport:
  - Manchester United complete the signing of Paul Pogba on a five-year deal from
    Juventus for a world record transfer fee of £89m (€105m), making Pogba the most
    expensive football player ever. (BBC Sport)
