Date: '2016-01-08'
Source_URI: Portal:Current events/2016 January 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Hurghada attack
  - Two suspected ISIS militants are killed and three tourists injured in an unsuccessful
    attack on a hotel in the city of Hurghada. (BBC)
  - 2016 shooting of Philadelphia police officer
  - A gunman stating to have sworn allegiance to the Islamic State of Iraq and the
    Levant (ISIS) shoots and seriously wounds a Philadelphia police officer before
    being arrested. (Reuters)
  Disasters and accidents:
  - 2015–16 Australian bushfire season
  - Three people are unaccounted for and at least 135 structures are destroyed, including
    the historic Yarloop Workshops, following a bushfire in the small Western Australian
    town of Yarloop. Reports coming out of the area suggest the town of Yarloop has
    been almost completely destroyed with one local official, Murray Cowper, saying,
    "A big fireball came through and there was no way they were going to stop it.
    This could well be the end of the town". (SBS) (BBC)
  Law and crime:
  - New Year's Eve sexual assaults in Germany
  - The chief of Cologne's police force, Wolfgang Albers, is relieved of his duties
    following criticism of his handling of violent clashes and sexual assaults by
    migrant gangs in the city on New Year's Eve. (The Independent)
  - Mexican Drug War
  - The Mexican Navy recaptures escaped drug lord Joaquín Guzmán, also known as "El
    Chapo", in Los Mochis, Sinaloa. (RT)
  - Dragan Vasiljković, a former Serbian paramilitary commander, is charged with war
    crimes in Croatia. (ABC News Australia)
