Date: '2016-01-16'
Source_URI: Portal:Current events/2016 January 16
Intelligence_Payload:
  Arts and culture:
  - From the Diocese of Tonga, Catholic Cardinal Soane Patita Paini Mafi is welcomed
    at the Co-Cathedral of Saint Theresa of the Child Jesus in Honolulu, Hawaii. Appointed
    by Pope Francis, Mafi is the first and youngest cardinal from the small South
    Pacific nation of Tonga. (Hawaii Catholic Herald)
  Armed conflicts and attacks:
  - 2016 Ouagadougou attacks
  - Burkina Faso security forces storm the Hotel Splendid which had been under attack
    by Al Qaeda in the Islamic Maghreb militants. Over 126 people have been freed
    and at least 29 people have died. (AP via the Daily Mail) (BBC) (CNN) (AFP via
    Daily Star)
  - At least 10 bodies have also been found in the Cappucino cafe which was also attacked
    by the militants. (AP via Miami Herald)
  - Two Australians, a doctor and his wife, have been abducted in northern Burkina
    Faso. The Al Qaeda-linked, Mali-based "Emirate of the Sahara" is responsible,
    according to SITE. (AP) (AFP via Yahoo! News)
  - 2016 Jakarta attacks
  - Indonesia blocks access to radical Islamist websites and social media sites after
    the recent terror attacks in Jakarta. (Reuters)
  - Syrian Civil War
  - 2016 Deir ez-Zor massacre
  - At least 75 Syrian Army soldiers and pro-Assad militiamen are killed following
    a multi-front attack on the eastern Syrian city of Deir ez-Zor by Islamic State
    of Iraq and the Levant forces. The Syrian Observatory for Human Rights reports
    ISIL fighters had advanced into the northern tip of Deir ez-Zor city, and captured
    the suburb of Al-Baghaliyeh. The pro-government Syrian Arab News Agency (SANA)
    reports that government forces had repelled an attack on the city leaving dozens
    of militants dead. (AFP via the Daily Mail)
  - Hundreds of civilians are reportedly killed by Islamic State of Iraq and the Levant
    militants throughout the city of Deir ez-Zor. Syria's state news agency SANA,
    quoting residents, said "around 300 civilians" were killed. If confirmed it would
    be one of the deadliest days in Syria's nearly five-year war. (AFP via Yahoo!)
  - Al-Qaeda insurgency in Yemen, Drone strikes in Yemen
  - A U.S. drone strike on a vehicle in Yemen's Shabwah Governorate kills three suspected
    Al-Qaeda in the Arabian Peninsula (AQAP) militants. (The Guardian)
  Disasters and accidents:
  - A suspected gas explosion in the Italian town of Arnasco kills at least five people.
    (Business Insider)
  - U.S. President Barack Obama declares the city of Flint, Michigan, to be in a federal
    public health state of emergency due to an ongoing crisis that involves lead contamination
    (and possibly Legionella which has caused 87 cases of Legionnaires' disease which
    has led to 10 deaths) in its local water supply. (The Flint Journal on MLive)
  International relations:
  - Iran–United States relations
  - Iran releases four Iranian-American prisoners including Washington Post reporter
    Jason Rezaian and Christian pastor Saeed Abedini. The United States is to release
    seven Iranian-Americans held in the United States for violating sanctions against
    Iran. (New York Times) (IRNA) (Reuters) (Washington Post)
  - Nuclear program of Iran
  - The International Atomic Energy Agency states that Iran has complied with its
    commitments under the Joint Comprehensive Plan of Action, paving the way for international
    sanctions to be lifted by the United States and European Union. (IEAE) (New York
    Times) " (BBC)
  - European migrant crisis
  - Austria is to deploy its army on its borders with Germany and Slovenia in the
    wake of surging numbers of migrants entering the Central European country. (The
    Local Austria)
  Politics and elections:
  - 2016 Taiwanese general election
  - Tsai Ing-wen of the Democratic Progressive Party (DPP) is elected the first female
    President of Taiwan. Eric Chu, the ruling Kuomintang (Chinese Nationalist Party)
    candidate concedes defeat and announced his resignation as party leader. Ms. Tsai
    vowed to preserve the status quo in relations with China. The DPP supports independence
    for the island. (BBC) (CNN)
  - Current ruling party Kuomintang (Chinese Nationalist Party) lost its majority
    in the Legislative Yuan, a first since the country's founding in 1911 (The Guardian)
  - Argentinian left-wing lawmaker Milagro Sala is detained at her home for allegedly
    instigating public disturbances. (Telesur TV)
  Sports:
  - In motor sport, The 2016 Dakar Rally finishes with Stephane Peterhansel of France
    winning his 12th victory in the cars and Toby Price of Australia winning his first
    victory in the motorcycles. (AFP via Yahoo! News)
