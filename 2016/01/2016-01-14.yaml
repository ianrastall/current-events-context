Date: '2016-01-14'
Source_URI: Portal:Current events/2016 January 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Jakarta attacks
  - Bomb blasts and gunfire are reported in the centre of the Indonesian capital Jakarta.
    At least seven deaths have been reported. (ABC News Australia) (AP) (The Australian)
    (Reuters)
  - Indonesian police suspect Islamic State militants are responsible for the attacks
    with five attackers reported dead. (AP) (AFP via Channel NewsAsia)
  - Turkey–PKK conflict
  - PKK rebellion (2015–present)
  - Turkish police headquarters in Midyat and Çınar, Diyarbakır, are hit by car bombs,
    killing six people and injuring 39. No group has claimed responsibility but the
    government accuses PKK rebels of carrying out the attack. (BBC) (Middle East Eye)
  - 2015–2016 wave of violence in Israeli–Palestinian conflict
  - A foiled stabbing attack resulted in Israeli soldiers shooting and killing a Palestinian
    at Beit Einun. (The Jerusalem Post)
  Arts and culture:
  - 88th Academy Awards
  - The nominations are announced for the 88th Academy Awards at the Samuel Goldwyn
    Theater in Hollywood. (E! Online)
  - Actor Alan Rickman dies from cancer, aged 69. (BBC)
  - Archbishops of the Anglican Communion meeting in England vote to sanction the
    U.S. branch of the Communion for its unilateral decision to allow same-sex marriages.(New
    York Times)
  - René Angélil, manager and husband of singer Celine Dion, dies at age 73 after
    a long battle with throat cancer.(BBC)
  Disasters and accidents:
  - 2016 Atlantic hurricane season
  - Hurricane Alex becomes the first hurricane to form in the Atlantic Ocean in January
    since 1938 with warnings issued for the Azores. (Weather Channel)
  Business and economy:
  - A Brazilian court suspends the licence for the Belo Monte Dam weeks before it
    was due to start operating until operator Norte Energia SA and the government
    of Brazil reorganizes Fundação Nacional do Índio, a protection agency for indigenous
    Brazilians. (Reuters via CNBC)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organisation declares an end to the Ebola virus outbreak in West
    Africa with Liberia the last country to be declared free of the virus. (AFP via
    Yahoo!)
  - A person dies of the Ebola virus in Sierra Leone hours after the WHO makes its
    declaration. (BBC)
  International relations:
  - 2016 North Korean nuclear test
  - South Korea and the People's Republic of China will hold talks to develop a joint
    response to last week's North Korean nuclear test. (Yonhap)
  Politics and elections:
  - Thousands of people in Moldova march against proposed candidate for Prime Minister
    Vlad Plahotniuc. (AP via ABC News)
  Science and technology:
  - Astronomers announce the discovery of supernova ASASSN-15lh, the biggest yet seen
    by scientists. (Los Angeles Times)
