Date: '2016-01-06'
Source_URI: Portal:Current events/2016 January 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - The Islamic State's Libyan branch continues attacks on Libya's oil ports of Sidra
    and Ra's Lanuf, resulting in at least 10 security personnel deaths and 40 injured.
    The National Oil Corporation (NOC) reports that fires continue to rage in both
    Sidra and Ra's Lanuf after oil storage tanks were hit by shells. (Al Jazeera)
    (BBC)
  - Bahrain says it has dismantled a terrorist cell allegedly linked to Iran's Revolutionary
    Guard and Lebanon's Hezbollah. (The National)
  Arts and culture:
  - 'Star Wars: The Force Awakens becomes the highest-grossing film ever in the United
    States and Canada, overtaking Avatar. (Hollywood Reporter)'
  Business and economy:
  - TransCanada, the firm that unsuccessfully applied for cross-border permission
    to build the Keystone XL pipeline, files a lawsuit against the United States alleging
    that the refusal of permission violated the North American Free Trade Agreement.
    (Reuters)
  International relations:
  - 2016 North Korean nuclear test
  - A 5.1 magnitude earthquake near Sungjibaegam, North Korea, is suspected to be
    a nuclear explosion at the Punggye-ri Nuclear Test Site. North Korea announces
    it has conducted a hydrogen bomb test. They claim to have tested a miniaturized
    bomb. If not true it would mean that the test partially failed. (AFP via ABC News
    Australia) (AP) (Bloomberg) (The Guardian)
  - The Secretary-General of the United Nations Ban Ki-moon demands that North Korea
    should cease any further nuclear activity. (ABC News Australia)
  Law and crime:
  - German police temporarily seal off the main entrance to the chancellery building
    because of a suspicious package. (Reuters) (AP via USA Today) (Al Arabia)
  - Texas state trooper Brian Encinia is charged with perjury in connection with the
    death of Sandra Bland. (AP via Fox 32)
  Sport:
  - In Major League Baseball, Ken Griffey Jr. and Mike Piazza are elected to the Hall
    of Fame by the Baseball Writers' Association of America. Griffey was named on
    all but three of the 440 ballots received, surpassing Tom Seaver for the highest
    voting percentage in Hall history. Griffey and Piazza will be formally inducted
    on July 24. (NBC News)
