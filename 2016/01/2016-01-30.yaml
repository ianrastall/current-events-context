Date: '2016-01-30'
Source_URI: Portal:Current events/2016 January 30
Intelligence_Payload:
  Business and economics:
  - Social networking service Facebook, and its photo-sharing subsidiary Instagram,
    ban private, person-to-person sales of guns via their services. (CNBC) (The Christian
    Science Monitor)
  Disasters and accidents:
  - 2015–16 Australian region cyclone season
  - Western Australia's Pilbara region braces for the impact of Cyclone Stan, which
    is expected to make landfall as a Category Three storm. (ABC News Australia)
  - A helicopter fighting forest fires in South Korea's North Jeolla Province crashes
    near the Geumsansa Temple in Gimje. The 61-year-old pilot dies in the crash. (Yonhap
    News)
  - European migrant crisis
  - Almost 40 people are killed and 75 are rescued after a boat carrying migrants
    sinks between Turkey and Greece. (Reuters)
  Health:
  - Zika virus outbreak in the Americas (2015–present)
  - Jamaican health officials confirm the country's first case of the Zika virus in
    a 4-year-old child who recently returned from a trip to Texas. (USA Today)
  - More than 2,100 pregnant Colombian women are infected with the mosquito-borne
    Zika virus. (Reuters)
  International relations:
  - Global surveillance disclosures (2013–present), Edward Snowden
  - NSA documents show the US and UK spied on Israeli military drones and fighter
    jets. (CNN) (The Verge)
  - Territorial disputes in the South China Sea
  - A United States Navy guided missile destroyer, USS Curtis Wilbur (DDG-54), sails
    within 12 nautical miles of the disputed Triton Island. The Pentagon said that
    the mission aimed at countering the "excessive maritime claims of parties that
    claim the Paracel Islands", while China's Ministry of Defense said the U.S. action
    “severely violated the law." (BBC) (The Washington Post)
  Law and crime:
  - 2015 FIFA corruption case
  - Reuters reports that a million dollars in FIFA funding is missing from the accounts
    of the National Football Federation of Guatemala. (Reuters)
  - Orange County Men's Central Jail escape
  - Two of the inmates who escaped from a jail in Santa Ana, California, were arrested
    in San Francisco. (San Francisco Chronicle)
  - National Western Complex shootout
  - At least one person is killed and multiple others injured in a fight between two
    outlaw motorcycle gangs in the American city of Denver, Colorado. (9 News)
  Politics:
  - An estimated half-million Italians protest in Rome's Circus Maximus against pending
    legislation that would legalize same-sex unions. The legislation would extend
    to civil unions the same rights they would have under marriage, including adoption
    of children. (AP via The New York Times) (Reuters) (NBC News) (The Local)
  Sports:
  - 2016 Australian Open
  - In tennis, Angelique Kerber of Germany tops (2–1) defending champion Serena Williams
    of the United States, 6-4, 3–6, 6–4, to win the Women's Singles. This is Kerber's
    first Grand Slam title. (ABC News Australia) (The Guardian)
  - South Korean golfer Jang Ha-na makes first albatross on par-four in LPGA history.
    (ABC)
