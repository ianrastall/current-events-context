Date: '2016-01-18'
Source_URI: Portal:Current events/2016 January 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014–16 Russian military intervention in Ukraine
  - Ukraine says that a cyberattack on Boryspil International Airport near Kiev came
    from Russian computers. (Sky News)
  - Saudi Arabian-led intervention in Yemen
  - A Saudi-led coalition airstrike on a police building in Yemen's capital, Sana'a,
    kills at least 26 people and injures 15 others. (RT)
  - Spillover of the Syrian Civil War
  - A rocket fired from ISIL-controlled territory in Syria's Aleppo Governorate, kills
    at least one person and injures another in the Turkish city of Kilis, close to
    the Syria–Turkey border. The Turkish military responded with artillery fire on
    ISIL positions. (AFP via Daily Mail)
  Arts and culture:
  - Glenn Frey, a founding member of the Eagles, dies of complications arising from
    rheumatoid arthritis, colitis and pneumonia. (BBC)
  Business and economy:
  - Reuters reports that Xiao Gang, the head of the China Securities Regulatory Commission,
    has offered to resign after a sharp sell-off in two of China's stock exchanges.
    (Reuters)
  - Tata Steel is to cut 1,050 jobs in the United Kingdom, with the majority going
    in South Wales. The Indian multinational steel-making company announced there
    will be 750 job losses at its Port Talbot Steelworks in Port Talbot, Wales while
    another 300 jobs will go at its plants in Corby and Hartlepool in England. (Bloomberg)
  Disasters and accidents:
  - Modane avalanche
  - At least five French Foreign Legion soldiers are killed and six injured in an
    avalanche while on a training exercise in the Alps, close to the Italian border.
    The soldiers were members of the 2nd Foreign Engineer Regiment. (BBC)
  Law and crime:
  - November 2015 Paris attacks
  - A man linked to the Paris attacks is arrested in Mohammedia, Morocco. (Sky News)
  - MASSOB
  - Biafran separatists claim that police killed 8 protesters calling for independence.
    (AP via WTOP)
  Politics and elections:
  - The Russian Duma rejects a Communist Party bill banning homosexual expression.
    (Radio Free Europe)
  - 2016 United States presidential election
  - The British Parliament debates a petition, signed by more than 560,000 people,
    calling for the Home Secretary to ban, because of 'hate speech,' United States
    Republican Party presidential candidate Donald Trump from entering the United
    Kingdom. Almost all of the 50 MPs (member of parliament), of the 650-member legislative
    body, present criticized Trump -- especially his comments on Muslims -- but few
    supported an entry ban. (CNN) (The Guardian)
