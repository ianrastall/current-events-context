Date: '2016-01-10'
Source_URI: Portal:Current events/2016 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - PKK rebellion (2015–present)
  - Turkish security forces kill at least 32 Kurdistan Workers' Party (PKK) militants
    over the weekend, in military operations across the embattled Kurdish-majority
    southeast. (Reuters)
  - Yemeni Civil War (2015–present)
  - Saudi Arabian-led intervention in Yemen
  - A suspected Saudi missile strike on a Médecins Sans Frontières (MSF) clinic in
    Razih, located in Yemen's northern Saada Governorate, leaves at least five people
    dead and around a dozen injured. (RT)
  - War in Afghanistan (2001–2021)
  - The Afghanistan defense ministry reports its forces have recaptured Darqad District
    in northern Takhar Province. According to the ministry, twenty Taliban militants
    and one Afghan soldier were killed in two days of fighting. (The Gulf Today) (Reuters)
  Arts and culture:
  - The 73rd Golden Globe Awards are held at the Beverly Hilton in Beverly Hills,
    California. (Los Angeles Times)
  - The Martian wins the award for Best Motion Picture - Musical or Comedy and lead
    actor Matt Damon winning Best Performance by an actor in a musical or comedy.
    (AP)
  - The Revenant wins the award for best drama with lead actor Leonardo DiCaprio winning
    best actor in a drama. (Variety)
  - British musician and actor David Bowie dies from cancer, aged 69. (BBC)
  Disasters and accidents:
  - 2015–16 South Pacific cyclone season
  - Residents of the islands of Tafea are urged to seek shelter as Severe Tropical
    Cyclone Ula approaches Vanuatu. (Radio New Zealand)
  - Twenty people are killed after a bus carrying amateur football players and fans
    plunges into a river in Veracruz, eastern Mexico. (Business Standard) (AP)
  - The two-month-old Nipigon River Bridge near Nipigon, Ontario is closed to traffic
    after a mechanical failure, severing the Trans-Canada Highway and forcing a detour
    into the United States. (CBC) (National Post)
  International relations:
  - 2016 North Korean nuclear test
  - A single United States Air Force B-52 long-range strategic bomber makes a low-level
    flight over South Korea, close to the Korean Demilitarized Zone (DMZ), in a show
    of force following North Korea's fourth nuclear test on January 6, before returning
    to its base in Guam. (Reuters)
  - Germany–Poland relations
  - Poland summons the German ambassador in Warsaw over "anti-Polish" remarks made
    by German politicians. (BBC)
  Law and crime:
  - U.S. Army officials set August 8 as the start date for Sgt. Bowe Bergdahl’s court-martial.
    Bergdahl, charged with desertion and misbehavior before the enemy, was held captive
    by the Taliban for five years after he left his base in Afghanistan. A pre-trial
    hearing is scheduled for early this week. (AP)
  - Mexican Drug War
  - Mexican authorities want to question American actor Sean Penn and Mexican actress
    Kate del Castillo about a secret October meeting and interview with Joaquín Guzmán,
    published by Rolling Stone magazine yesterday. Mexico Attorney General Arely Gomez
    says it was the Penn interview that led authorities to a Guzman hiding place.
    (CNN) (CBS News) (USA Today) (Rolling Stone)
  Politics and elections:
  - Catalan independence
  - The newly appointed President of Catalonia, Carles Puigdemont, vows to continue
    his predecessor Artur Mas i Gavarró's plans to secede from Spain within 18 months.
    (BBC)
  Sport:
  - Lawyers for former FIFA chief Sepp Blatter confirm that he will appeal his eight
    year ban from the organisation. (AFP via Yahoo! News)
