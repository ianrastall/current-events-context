Date: '2016-01-09'
Source_URI: Portal:Current events/2016 January 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Egypt
  - Two police officers are shot dead by gunmen near the Giza pyramids, on the outskirts
    of Cairo. (The Independent)
  - Second Libyan Civil War
  - A major power station in the eastern Libyan city of Benghazi is shelled by militants.
    (Reuters)
  - Syrian Civil War, Russian military intervention in the Syrian Civil War
  - Russian airstrikes on an Al-Nusra Front (Al-Qaeda's branch in Syria)-run prison
    complex in the northern town of Maarrat al-Nu'man, Idlib, leaves nearly 60 people
    dead. Most of those killed were rebels imprisoned by Al-Nusra, according to the
    Syrian Observatory for Human Rights. (The National) (AFP via Daily Mail)
  Disasters and accidents:
  - 2015–16 Australian bushfire season
  - Two dead bodies have been found in Yarloop, Western Australia, and residents of
    four towns urged to evacuate in under threat as the Waroona bushfire continues
    to burn out of control. (West Australian via Yahoo! Online) (ABC News) (The Australian)
  - A bushfire burning near the town of Esperance, Western Australia, is threatening
    lives and properties. (West Australian via Yahoo! Australia)
  International relations:
  - Brussels Agreement (2013), Kosovo–Serbia relations
  - Anti-Serbian protesters set fire to the government's headquarters in Kosovo's
    capital, Pristina, over an EU-brokered deal that will give Kosovo's ethnic Serb
    minority greater local powers. (RT)
  Law and crime:
  - Sian Blake's partner Arthur Simpson-Kent is arrested in Ghana in connection with
    the murder of Blake and her two children. (The Guardian)
  Sport:
  - 2016 Dakar Rally
  - A Bolivian spectator dies in the seventh stage between Bolivia and Argentina after
    being hit by a Mitsubishi driven by French driver Lionel Baud. (ABC News Australia)
