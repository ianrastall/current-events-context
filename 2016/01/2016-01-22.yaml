Date: '2016-01-22'
Source_URI: Portal:Current events/2016 January 22
Intelligence_Payload:
  Arts and culture:
  - Douglas Borough Council announces that the Douglas Bay Horse Tramway, at Douglas,
    Isle of Man, ran for the last time at the end of the 2015 season. (BBC)
  Business and economy:
  - Steve Zadesky, who has been running the electric car project for Apple Inc. for
    two years, will leave that company soon for personal reasons, according to the
    Wall Street Journal. (Wall Street Journal)
  Disasters and accidents:
  - January 2016 United States blizzard
  - Millions of people in the Mid-Atlantic states brace for a winter storm. (BBC)(CNN)
  International relations:
  - European migrant crisis
  - The United States government implements new restrictions to its visa waiver program
    which now requires, with limited exceptions, European, Japanese and Australian
    travelers to the United States who either have been visitors in the last five
    years to or are dual-citizens of Iran, Iraq, Syria and Sudan to obtain a travel
    visa. The new visa policies were mandated by legislation which was passed, in
    the aftermath of November 2015 Paris attacks, by Congress on the grounds of national
    security. (CNN) (The New York Times) (Radio Free Europe/Radio Liberty)
  Law and crime:
  - La Loche shootings
  - A former La Loche Community School student shot and killed two brothers at home,
    and two females, one a teacher, at the school in La Loche, Saskatchewan, Canada,
    while injuring others. A suspect has been arrested. (CBC) (Reuters)
  Politics and elections:
  - Wei Hong resigns as Governor of Sichuan province in China after it was revealed
    that he was undergoing investigation for "breaching party discipline." Former
    World Health Organization executive committee member Yin Li becomes acting governor.
    (SCMP)
