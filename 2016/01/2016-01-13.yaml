Date: '2016-01-13'
Source_URI: Portal:Current events/2016 January 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Pakistan
  - At least 15 people are killed and dozens injured after a bomb explodes near a
    polio centre near the Pakistani city of Quetta. (Samaa)
  - Korean border incidents
  - South Korean soldiers fire warning shots at a suspected North Korean drone near
    the Korean Demilitarized Zone (DMZ). The "unidentified flying object" was spotted
    around 29 miles north of Seoul, near South Korea's Dora Observation Post. (Sky
    News)
  - War in Afghanistan
  - Islamic State militants attack Pakistan's consulate in Jalalabad, Afghanistan,
    killing 9 people and injuring 12 more. (NDTV)
  - Syrian Civil War
  - Following the death of its leader, Zahran Alloush, Jaysh al-Islam names Essam
    al-Buwaydhani as its new leader. (The News Hub)
  - January 2016 Istanbul bombing
  - Turkish Interior Minister Efkan Ala says yesterday's ISIS suicide bomber had registered
    with Turkish immigration authorities but was not on any known militant suspects
    list. (Reuters)
  - Turkish police arrest three people with Russian citizenship in the southern province
    of Adana on suspicion of belonging to ISIS. (ABC News) (Leader Call)
  Arts and culture:
  - Three winning Powerball lottery tickets are sold in the U.S. states of California,
    Florida, and Tennessee. Each will share the estimated jackpot of US $1.6 billion
    dollars, the largest lottery jackpot in world history. (ABC News)
  Business and economy:
  - Al Jazeera America announces that it will close in April due to poor ratings.
    (The New York Times)
  Disasters and accidents:
  - 2016 Atlantic hurricane season
  - Subtropical Storm Alex is located 785 miles (1,260 km) south-southwest of the
    Azores. Alex is one of just four tropical or subtropical storms to occur in January
    since 1851, the first year records were kept. The hurricane season begins on June
    1 of each year. Alex is expected to hit the Azores on Friday with average rain
    accumulations of 3 to 5 inches. (The Washington Post) (NHC)
  - An avalanche kills three and injures one at the Les Deux Alpes ski resort in Isère
    département of the French Alps. Officials are searching for other possible victims.
    (CNN)
  International relations:
  - Iran–United States relations
  - Iran claims that it has interrogated ten United States Navy personnel that it
    captured allegedly in its territorial waters. (Sky News Australia)
  - All 10 U.S. sailors are freed by Iran and are in U.S. custody. The U.S. Naval
    Forces Central Command says, "There are no indications that the sailors were harmed
    during their brief detention." (The Washington Post)
  - Israel–Sweden relations
  - Israel says Swedish Foreign Minister Margot Wallström is no longer welcome in
    the country after she called for investigations into "suspected extrajudicial
    executions" of Palestinians by the Israeli army. Sweden has for many years financed
    NGOs such as B'Tselem and Breaking the Silence operating in Israel. (Breaking
    Israel News)
  - Cuba–United States relations
  - A major indication that relations between Cuba and the U.S. are increasingly normalized
    will be the island nation’s participation later this month at an annual Caribbean
    security conference in Jamaica, according to the outgoing head of the United States
    Southern Command, General John F. Kelly. (Military Times)
