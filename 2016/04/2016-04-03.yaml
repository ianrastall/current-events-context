Date: '2016-04-03'
Source_URI: Portal:Current events/2016 April 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Nagorno-Karabakh conflict
  - 2016 Armenian–Azerbaijani clashes
  - Azerbaijan calls a unilateral ceasefire in its fight with ethnic Armenians one
    day after 30 soldiers died. The Associated Press reports rebel forces reject Azerbaijan's
    claims, saying they see no sign the government has stopped fighting. (AP) (BBC)
    (NPR)
  - Syrian Civil War
  - Battle of al-Qaryatayn (March–April 2016)
  - The Syrian Army retakes control of al-Qaryatayn, Homs Governorate, after driving
    out ISIL militants. (Reuters)
  - The Syrian Observatory for Human Rights reports the al-Nusra Front's spokesperson
    Abu Firas al-Suri was among 20 militants killed in a suspected Russian airstrike
    on a village near the city of Idlib in northwestern Syria. (Reuters)
  - Moro attacks on Sabah, Moro Conflict
  - Four Sarawakian Malaysians are kidnapped off the coast of Sabah by suspected members
    of the Abu Sayyaf, a group linked to the Islamic State of Iraq and the Levant.
    (The New York Times)
  - Military intervention against ISIL, Iraq Civil War
  - The United States military reports a drone attack killed ISIL rocket expert Jasim
    Khadijah. The unmanned airstrike also killed other IS militants and destroyed
    at least one makeshift drone. Khadijah, a former Iraqi officer, is believed responsible
    for the March attack that killed a U.S. Marine in northern Iraq. (UPI) (Daily
    Mail)
  - Iraqi forces capture the northern part of the ISIL held town of Hīt, west of Baghdad.
    (AP)
  - An attacker throws a grenade and fires shots outside a sports hall in the small
    town of Zubin Potok in northern Kosovo, just hours before Serbian Prime Minister
    Aleksandar Vučić was due to hold an election rally there. "A hand grenade exploded
    outside the sports hall but there are no injuries," Besim Hoti, a Kosovo police
    commander in the area, told Reuters. (Reuters)
  Business and economics:
  - Aftermath of the 2016 Brussels bombings
  - Two weeks after the deadly suicide bombings, Brussels Zaventem International Airport
    will reopen today with three symbolic flights to Faro, Athens, and Turin. On Thursday,
    the airport had said it was "technically ready" to resume partial services, but
    the opening was held up because police unions threatened to strike unless additional
    security checks were introduced. (AsiaOne) (The Jewish Press)
  - Panama Papers
  - A leak of 11.5 million documents from law firm Mossack Fonseca reveals details
    of shell companies used by 12 current or former world leaders including President
    of Russia Vladimir Putin whose aides allegedly shuffled billions of dollars. (ABC
    News via 9MSN)
  - The documents, 2.6 terabytes of information, were obtained more than a year ago
    from an anonymous source by the German newspaper Süddeutsche Zeitung. Journalists
    from more than 80 countries have been working with this data. The documents expose
    holdings of 12 current and former world leaders, and 128 more politicians and
    public officials worldwide. The national leaders named include Pakistan Prime
    Minister Nawaz Sharif; Ukraine's President Petro Poroshenko, and Iceland's Prime
    Minister Sigmundur Davíð Gunnlaugsson. (The Guardian)(USA Today)
  - The Health Information Trust Alliance, a nonprofit industry group, warns that
    hospitals in the United States must prepare for more ransomware attacks. A review
    late last year of some 30 mid-sized U.S. hospitals found 52 percent were infected
    with malicious software. This week, an attack on MedStar Health forced the largest
    healthcare provider in the Washington, D.C. area, to shut down much of its computer
    network. (Reuters)
  Disasters and accidents:
  - 2016 Khyber Pakhtunkhwa flood
  - At least 45 people are killed and another 34 hospitalized following heavy rains
    and flash floods in the northwestern Pakistani province of Khyber Pakhtunkhwa.
    (Dawn) (AP)
  - A 6.9 magnitude earthquake occurs off the coast of Vanuatu with a tsunami warning
    issued. (USGS)
  - 2016 Chester, Pennsylvania train derailment
  - Two people are killed and 35 injured when a United States Amtrak passenger train
    on the Palmetto route traveling from New York City to Savannah, Georgia, with
    341 passengers and seven crew on board, derails in Chester, Pennsylvania, after
    striking a backhoe that was on the track. Local media reports the deceased are
    veteran Amtrak workers. Area hospitals are treating the injured; none in life-threatening
    condition. (CNN) (NBC Philadelphia) (BBC) (Reuters)
  - At least 18 people are injured following a collision between two trains at Plymouth
    railway station in the city of Plymouth, Devon. The crash has caused significant
    disruption to rail services in South West England. (Sky News)
  International relations:
  - India–Saudi Arabia relations
  - In Riyadh, India's Prime Minister Narendra Modi and Saudi Arabia's King Salman
    sign five agreements, including plans to increase investments, and to cooperate
    in intelligence sharing. (AP)
  - European migrant crisis
  - Czech Minister of the Interior Milan Chovanec says that authorities in Prague
    will send a group of 25 Iraqi Christians back to Iraq after they tried to move
    to Germany rather than staying in the Czech Republic. The refugees were on their
    way to Germany via bus before being stopped at the border. Czech authorities agreed
    to a request by the German police to take the people back. Chovanec said the 25
    Iraqis abused Czech generosity and should go back to Iraq within seven days. (Radio
    Free Europe/Radio Liberty)
  - Last month's agreement between the European Union and Turkey will be implemented
    Monday as migrants currently on Greek islands will be returned to the Turkish
    mainland. (AP)
  - Japan–Philippines relations
  - A Japanese Navy submarine makes a port call in the Philippines, the first in fifteen
    years, in a show of growing military cooperation amid tension triggered by China's
    growing assertiveness in the South China Sea. It was escorted into the former
    U.S. Naval Base at Subic Bay by two Japanese destroyers on a tour of Southeast
    Asia. (Reuters)
  Law and crime:
  - Guillaume Pepy, France's national railway company president, announces armed train
    marshals, in civilian dress, will be patrolling some passenger trains. (AP)
  Politics and elections:
  - The Parliament of South Africa announces it will debate a motion to impeach President
    Jacob Zuma this coming Tuesday. This comes after Zuma is facing mounting pressure
    when the Constitutional Court ruled that Zuma violated the constitution by using
    state funds to renovate his mansion. Yesterday, anti-apartheid veteran Ahmed Kathrada
    joined opposition leaders in calling for Zuma's resignation. (Al Jazeera)
  - Police forcibly break up a protest in Malé, Maldives, with tear gas and pepper
    spray and detain multiple journalists. The demonstration was against government
    moves to introduce a new law to criminalize defamation. (BBC)
  - Abortion in Poland
  - Thousands of people attended a pro-choice rally outside Parliament of Poland in
    Warsaw after Jarosław Kaczyński, the leader of the ruling Law and Justice party,
    backed a call by Polish Catholic bishops for a full ban on abortion. (Euronews
    via Reuters)
  - Yemeni President Abd Rabbuh Mansur Hadi sacks Prime Minister and Vice President
    of Yemen Khaled Mahfoudh Bahah. Hadi named top general Ali Mohsen al-Ahmar as
    his new Vice President and appointed Ahmed Obeid bin Daghr, a former official
    in Saleh's General People's Congress as the new Prime Minister. (Reuters)
  Science and technology:
  - The Associated Press reports a government-sponsored committee of 27 companies/trade
    associations, set up by the U.S. FAA in February, on Friday submitted recommendations
    that could clear the way for commercial drone flights over populated areas, and
    help speed the introduction of package delivery drones. (AP)
  Sport:
  - ICC Women's World Twenty20, 2016 ICC Women's World Twenty20
  - West Indies women's national cricket team beat defending champions Australia women's
    national cricket team by 8 wickets the final in Kolkata. (ICC)
  - 2016 ICC World Twenty20
  - Defending champions The West Indies beat England by 4 wickets in the final in
    Kolkata. (BBC)
  - 2016 NCAA Women's Division I Basketball Tournament
  - The 2016 United States women's college basketball national championship will be
    decided when two former Big East Conference foes meet at Bankers Life Fieldhouse
    in Indianapolis at 8:30 p.m. EDT, Tuesday, April 5, 2016. Connecticut topped Oregon
    State 80–51, and Syracuse claimed an 80–59 win over Washington in Sunday's semifinals.
    Syracuse (30–7, 13–3 ACC) will be making its first appearance in the NCAA title
    game. UConn (37–0, 18–0 American), a 10-time national champion and defending champion
    for the fourth straight season, has won every title game it has played in. (ESPN)
    (ESPN²)
