Date: '2016-04-09'
Source_URI: Portal:Current events/2016 April 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro Conflict
  - 2016 Battle of Basilan
  - At least 18 soldiers are killed and 52 injured in clashes with Abu Sayyaf militants
    and allied gunmen in Basilan island, Philippines. (FOX News)
  - Military intervention against ISIL
  - The United States Air Force deploys B-52 bombers to Al Udeid Air Base in Qatar
    to join operations against ISIL in Syria and Iraq. This is the first time they
    have been stationed in the Middle East since the end of the Gulf War in 1991.
    (Reuters)
  - Internal conflict in Peru
  - At least two people are killed in a remote part of Peru in an attack by Shining
    Path guerillas. (Daily Mail)
  Disasters and accidents:
  - European migrant crisis
  - Five migrants drown off the island of Samos close to Turkey. (AP)
  - At least 23 people are killed and 32 others injured after a bus plunges into a
    river in southeastern Peru. (AFP via ABC News)
  International relations:
  - Egypt–Saudi Arabia relations
  - Egypt and Saudi Arabia reach an agreement on the disputed islands of Tiran Island
    and Sanafir Island, placing the formerly Egyptian-administered islands officially
    under Saudi Arabian sovereignty. (Daily Mail)
  - North Korea and weapons of mass destruction
  - North Korea claims to have successfully tested the engine for an intercontinental
    ballistic missile. (BBC)
  Law and crime:
  - 2016 Brussels bombings
  - Mohamed Abrini has reportedly admitted to being the "man in the hat" sought after
    the Brussels bombings. He is also being charged with involvement in the November
    2015 Paris attacks. (BNO News)
  - Former New Orleans Saints defensive end Will Smith is shot dead in a road rage
    incident. (CNN)
  Politics and elections:
  - 2016 United States presidential election
  - Registered Democratic voters in the U.S. state of Wyoming gather, by county, for
    the Wyoming Democratic caucuses. Bernie Sanders is projected to win. (Wyoming
    Tribune) (The Hill)
  - Panama Papers
  - Thousands of people protest in Whitehall calling on British Prime Minister David
    Cameron to resign over his financial affairs and his handling of them in relation
    to revelations made by the leak of the Panama Papers. (Independent)
  - Puerto Rican Governor Alejandro García Padilla announces he declared a state of
    emergency at the Commonwealth's Government Development Bank yesterday, which allows
    withdrawals only to fund necessary costs for health, public safety, and education
    services. Without this measure and debt restructuring, the United States territory
    would be forced to default as it faces nearly $2.5 billion in bond payments from
    May through July. (AP via The Washington Post)
  Sport:
  - British horse Rule The World wins the 2016 Grand National. (BBC)
  - In boxing, Anthony Joshua wins the International Boxing Federation heavyweight
    championship defeating Charles Martin the defending champion. (The Guardian)
