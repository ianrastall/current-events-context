Date: '2016-04-02'
Source_URI: Portal:Current events/2016 April 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Armenian–Azerbaijani border conflict
  - 2016 Armenian–Azerbaijani clashes
  - Armenia and Azerbaijan exchange gunfire for the third successive day after an
    escalation of a dispute over the boundaries between Azerbaijan and the disputed
    Nagorno-Karabakh Republic. (RT)
  - Syrian Civil War
  - The Syrian Observatory for Human Rights claims that the Al-Nusra Front as well
    as other insurgents have captured the village of Tel el-Ais in a strategic position
    overlooking the highway between Aleppo and Damascus. (AP)
  - The official Syrian Arab News Agency (SANA) reports a mass grave, containing the
    bodies of beheaded women and children, has been found in the former ISIL-controlled
    city of Palmyra, recently retaken by the Syrian government. (The Independent)
  - Second Libyan Civil War
  - Two security guards are killed while repelling an ISIL attack on the Bayda oil
    field, near the town of Marada, Libya. (Reuters)
  - Iraqi Civil War (2014–2017)
  - Hīt offensive (2016)
  - Iraqi security forces free a large number of prisoners from an underground ISIL-operated
    jail in the city of Hīt. Malallah al-Obeidi, a local official in the Al Anbar
    Governorate, put the number of freed prisoners at around 1,500, saying most of
    them were civilians. (AFP via Al Arabiya)
  - PKK rebellion (2015–present)
  - A bombing kills at least five Turkish soldiers and one special forces police officer
    in the southeastern city of Nusaybin, near the Syria–Turkey border. (BBC)
  Arts and culture:
  - Archaeologists claim to have discovered a probable Viking settlement in North
    America on Newfoundland's Point Rosee. (AFP via ABC Australia)
  - American pornographic actress Amber Rayne dies at the age of 31. (BBC)
  - Hong Kong terrestrial television provider Asia Television ceases all broadcasts
    at midnight, following a 2015 decision by the Hong Kong Government not to renew
    its television license. (Fortune.com)
  Disasters and accidents:
  - In the United States, a Lancair IV plane crashes into a car stopped along a highway,
    50 miles north of San Diego, California, killing car passenger Antoinette "Toni"
    Frances Isbelle, a member of the WFTDA's San Diego Starlettes roller derby team.
    Five others, including the pilot, are hospitalized. (The San Diego Union Tribune)
    (New York Daily News)
  International relations:
  - European migrant crisis, Austria–Italy relations
  - Austria plans to deploy soldiers on its border with Italy to stem an expected
    increase in migrants trying to get to northern Europe, according to Austrian Defence
    Minister Hans Peter Doskozil. "As the EU's external borders are not yet effectively
    protected, Austria will soon ramp up strict border controls. That means massive
    border controls on the Brenner Pass, and with soldiers," Doskozil told German
    daily newspaper Die Welt. (Reuters)
  - Burundian unrest (2015–2018)
  - The United Nations Security Council unanimously adopts a resolution setting the
    stage for the deployment of UN Police to Burundi, where political unrest that
    has lasted nearly a year killed over 400 people and displaced tens of thousands.
    The resolution asks Secretary-General Ban Ki-moon to present options within 15
    days for the deployment of UN police in order to monitor the security situation,
    promote respect for human rights and advance the rule of law. (Al Jazeera)
  - NATO–Russia relations
  - The United States Air Force sends 12 F-15C Eagles and 350 personnel to Iceland
    and the Netherlands to deter further Russian aggression in Europe. (CNN)
  - Greek government-debt crisis
  - Greece demands an explanation from the International Monetary Fund (IMF) after
    an apparent leaked transcript suggested the IMF may threaten to pull out of the
    country's bailout as a tactic to force European lenders to offer more debt relief.
    Whistleblowing site WikiLeaks published what it said was the transcript of a March
    19 conference call of three senior IMF officials discussing tactics to apply pressure
    on Greece, Germany and the EU to reach a deal in April. (Reuters)
  Law and crime:
  - Indian women's rights activists are barred by angry villagers and local authorities
    from entering Shani Shingnapur temple despite a court ruling guaranteeing access.
    Breaking with a centuries-old tradition, the high court in Mumbai ruled women
    have a fundamental right to enter Hindu temples across the state of Maharashtra,
    and the government has the responsibility to protect their rights. Bhumata Ranragini
    Brigade leader Trupti Desai and 25 other supporters were detained by police. All
    India Mahila Congress President Shobha Oza and Delhi Commission for Women chairwoman
    Swati Maliwal called the actions of locals and authorities "completely shameful."
    (UPI)
  Politics and elections:
  - 2016 United States presidential election, Republican Party presidential candidates,
    2016
  - The Republican National Committeeman for North Dakota, Curly Haugland, says that
    the likelihood for outsiders such as Donald Trump to get state electoral votes
    are slim as the party honor its own elders. (Politico)
  - Trần Đại Quang is sworn in as the President of Vietnam. (Reuters via The Star)
  - The Saudi-owned news channel Al Arabiya shuts its offices in Beirut, Lebanon and
    dismisses 27 employees in a sudden move reflecting tensions between Saudi Arabia
    and Lebanon-based Hezbollah, which is backed by Iran. Saudi Arabia interpreted
    Lebanon's lack of public solidarity as a sign that it had become beholden to Hezbollah.
    (Radio Free Europe/Radio Liberty)
  - The Governor of the U.S. territory of Guam Eddie Calvo announces his intention
    to hold a plebiscite to decide the future political status of the island. Calvo
    said he hopes to start a successful "education campaign" on the issue before filing
    a petition to start a referendum. If the plebiscite does take place, voters on
    Guam would be asked to select which political status they would prefer; independence,
    statehood, or free association However, the possible vote would be non-binding
    as any change in political status would require an act of Congress in Washington,
    D.C.. Guam is currently on the United Nations list of Non-Self-Governing Territories
    in need of decolonization. (Radio New Zealand)
  - Aftermath of the 2016 Brussels bombings
  - Police in Brussels, Belgium arrest multiple right-wing and anti-racist protesters,
    with riot squads engaged in a tense confrontation with local youths in the district
    of Sint-Jans-Molenbeek. A standoff grew when far-right protesters faced a counter-demonstration,
    despite protests being banned by local authorities who were fearful of last Sunday's
    event, in which police forcefully dispersed a right-wing protest with water cannons.
    (Reuters)
  Sport:
  - 2016 World Figure Skating Championships
  - Spanish figure skater Javier Fernández defends his world title after making a
    stunning comeback from behind Japanese figure skater Yuzuru Hanyu, who was ahead
    by 12 points, to win gold. (The Guardian)
  - 2015–16 NBA season
  - In basketball, the visiting Boston Celtics defeat the Golden State Warriors, snapping
    the Warrior's 14-month, 54-game home win streak which leaves the San Antonio Spurs
    with the only undefeated home record this season. (Basketball-Reference.com) (SBNation)
    (ESPN)
  - 2016 NCAA Men's Division I Basketball Tournament
  - In the U.S. men's national college basketball tournament semifinals in Houston's
    NRG Stadium, the Villanova Wildcats thrash the Oklahoma Sooners 95–51, the most
    lopsided result in men's Final Four history; and in a battle between Atlantic
    Coast Conference members, the North Carolina Tar Heels defeat the Syracuse Orange
    83–66. The title game on April 4 pits the Wildcats, 1985 champions, and the five-time
    champion Tar Heels. (NBC Sports) (Toronto Sun)
