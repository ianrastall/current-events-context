Date: '2016-04-07'
Source_URI: Portal:Current events/2016 April 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - According to Syrian state television, ISIL militants kidnapped over 300 staff
    members from a cement factory outside of the city of Al-Dumayr earlier this week
    and no contact with them has been made since. (Al Jazeera)
  - Military intervention against ISIL
  - Turkish Armed Forces shell ISIL positions hours after projectiles hit Turkey's
    Kilis Province. (Hurriyet)
  Arts and culture:
  - American Idol (season 15)
  - Trent Harmon is declared as the last winner of the American singing competition
    series, American Idol, which concluded after 15 seasons. (E! Online)
  - LGBTQ rights in the United States
  - The Mississippi Hospitality and Restaurant Association, in response to the potential
    backlash from Mississippi Governor Phil Bryant's signing of the known-as religious
    freedom bill which permits denial of services because of religious belief, will
    distribute decals that say "Everyone's Welcome Here." Mike Cashion, MHRA director,
    says the bill "created a level of controversy" that affects Mississippi's image.
    (Jackson Free Press)
  Business and economy:
  - Australian mining and materials company Arrium goes into voluntary administration
    with 7,000 jobs under threat in Australia, including 1,000 at the Whyalla Steelworks
    in South Australia. (ABC News)
  - Bloomberg News reports Verizon Communications plans a bid for Yahoo Inc.'s Web
    business, including Yahoo Japan Corp., next week. Google, Time Inc., and private
    equity funds Bain and TPG are considering bidding for Yahoo's core business. AT&T
    Inc., Comcast, and Microsoft Corp. reportedly aren't interested. (Reuters) (Bloomberg
    News)
  Disasters and accidents:
  - Another earthquake measuring at 6.7 strikes off the northwest of Vanuatu, the
    third earthquake in the same region this week. However, the Pacific Tsunami Warning
    Center says the earthquake poses no tsunami threat. (Radio New Zealand)
  Law and crime:
  - Attacks on secularists in Bangladesh
  - Attackers in Bangladesh wielding machetes kill Nazimuddin Samad, a liberal blogger.
    (Reuters)
  - Students from Jagannath University in Dhaka, where Nazimuddin Samad studied, protest
    the killing and tell reporters that police inaction over previous killings contributed
    to the death of Samad. (BBC)
  - Panama Papers
  - The government of Panama announces that it is creating an "international panel"
    to help improve transparency in its offshore financial industry. The move follows
    the leak of millions of documents from law firm Mossack Fonseca, showing it helped
    some clients evade tax and avoid sanctions. (BBC)
  - Colombia's Constitutional Court votes in favor of same-sex marriage, in a 6-3
    decision. (ABC News) (The Advocate)
  - Planned Parenthood and the American Civil Liberties Union sue Indiana stating
    the U.S. state's new abortion law is unconstitutional because it bans the procedure
    if sought because of genetic abnormalities. (CBS News with AP) (Reuters)
  Politics and elections:
  - The National Assembly of Vietnam approves Nguyễn Xuân Phúc as the country's new
    prime minister, succeeding Nguyễn Tấn Dũng. (Reuters) (Shanghai Daily)
  - Hashim Thaçi is sworn in as the new President of Kosovo. (Radio Free Europe/Radio
    Liberty)
  - South Sudanese Civil War
  - Former Vice President and opposition leader Riek Machar says he will return to
    the capital Juba on April 18 to form a transitional government with President
    Salva Kiir Mayardit in the hopes of bringing peace to South Sudan after their
    acrimonious split ignited more than two years of war. (Al Jazeera)
  - Aung San Suu Kyi, now the State Counsellor of Myanmar, says she will press for
    the release of political prisoners and student activists in the country, hinting
    that a mass amnesty may be imminent, a week after her government took power. (The
    Guardian)
  - 2016 United States presidential election, Donald Trump endorsements
  - Former New York City mayor Rudy Giuliani endorses Donald Trump for U.S. President,
    predicting Trump will get more than 50% of the statewide vote. (CBS News)
  - Panama Papers
  - United Kingdom Prime Minister David Cameron admits he benefited from a Panama-based
    offshore trust, Blairmore Holdings Inc., set up by his late father. Cameron says
    he divested himself of his shares, for £31,500 (US$44,300), before becoming prime
    minister in 2010. (The Guardian) (AP via The Washington Post)
  - Jürgen Mossack, co-founder of the Mossack Fonseca law firm, resigns from an honorary,
    unpaid post on the National Council of Foreign Relations, which advises Panama's
    government on foreign policy. (The New York Times)
