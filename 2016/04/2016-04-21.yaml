Date: '2016-04-21'
Source_URI: Portal:Current events/2016 April 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sudanese nomadic conflicts, Ethnic violence in South Sudan
  - The Ethiopian Army crosses the border into South Sudan with the latter's approval
    in search of more than 100 children who were kidnapped and spirited across the
    border in a surprise attack by unknown assailants that also killed 208 people
    a few days ago. (Al Jazeera)
  - Northern Mali conflict
  - Ansar Dine, an Islamic extremist group claims responsibility for kidnapping three
    International Committee of the Red Cross staffers this weekend in Abeïbara in
    northeastern Mali. (AP)
  - Amnesty International says the Nigerian Army killed 350 members of the Islamic
    Movement and secretly buried them in mass graves in the city of Zaria in Kaduna
    State. (The Guardian)
  Arts and culture:
  - Elizabeth II, queen regnant of the United Kingdom and Head of the Commonwealth
    of Nations, celebrates her 90th birthday. (BBC)
  - Bongbong Marcos admits that his family is blocking forfeiture of 200 masterpiece
    paintings sought by the government saying that the works were not subject of a
    court order case. The artworks, accumulated during the administration of his father,
    Philippine dictator Ferdinand Marcos are believed to be part of the family's alleged
    ill-gotten wealth. (ABS-CBN News)
  - The Bunyadi, a London pop-up restaurant where diners will be encouraged to eat
    in the nude, has a reservation waiting list of more than 13,000 people for its
    June opening. The restaurant will operate for three months. (UPI)
  - Musician Prince dies at his home at Paisley Park in the Minneapolis suburb of
    Chanhassen, Minnesota. (News Limited)
  Business and economy:
  - Volkswagen emissions scandal
  - Volkswagen reaches a deal with the United States government that includes vehicle
    buybacks and cash compensation. (AP via Fox News)
  - The Vatican suspends PricewaterhouseCoopers' audit of its finances over questions
    whether proper procedures were followed when the December 2015 contract, reportedly
    worth $3 million, was enacted. Analysts say this move exposes the rift between
    the church’s old guard and supporters of financial reform, and raises questions
    about the Catholic Church’s commitment to cleaning up its finances. (Reuters)
    (The Guardian) (BBC)
  Disasters and accidents:
  - More than 100 are feared dead in an early summer heatwave in India which has forced
    the closure of schools. (Reuters)
  - At least 24 people are killed, 136 others injured, and eight workers still missing
    from yesterday's blast at the major Clorados 3 petrochemical plant of Petroquimica
    Mexicana de Vinilo. Nineteen people remain hospitalized, with 13 in serious condition.
    The plant is run by Mexichem under agreement with Petroleos Mexicanos (Pemex),
    the national petrochemical company, in Coatzacoalcos, Veracruz, Mexico, on the
    country's southern Gulf of Mexico coast. Pemex had an earlier fire at the same
    facility in February 2016 that killed one worker; also that month, an offshore
    Pemex Gulf platform fire killed two and injured eight. (Reuters) (AP)
  - At least two people are killed after an oceanfront stretch of an elevated bike
    lane in Rio de Janeiro, Brazil, collapses when it was hit by a strong wave. Two
    other people were rescued alive, while another may be missing. The bike lane was
    among the projects built in preparation for the 2016 Summer Olympics. No Olympic
    event will be held on the path. (AP) (AP² via CBS News) (Hindustan Times)
  International relations:
  - Australia–Philippines relations, Philippines–United States relations, 2016 Philippine
    presidential election
  - Presidential candidate Rodrigo Duterte said that Australia and the United States
    should go ahead and cut their ties with the Philippines if he was elected president,
    following critical comments of their ambassadors on his rape remarks. (Rappler)
  - Gulf Cooperation Council Summit
  - United States President Barack Obama, at the Gulf Cooperation Council Summit in
    Saudi Arabia, says the United States will continue to deter and confront aggression
    against Gulf Arab states; joins others in warning the fragile cease-fire in Syria
    is on the verge of collapse; pledges vigilance about Iran's destabilizing activities
    in the Middle East; wants Gulf allies to offer more democratic reforms and improve
    human rights; and, says the U.S. and its Gulf partners should wait to see whether
    Iraq can resolve its political crisis before committing more financial aid which
    is impeding the fight against ISIL. (AP) (Reuters)
  - Syrian peace process
  - Staffan de Mistura, U.N. envoy to Syria, says there has been "real but modest"
    progress in the country's humanitarian situation, despite the shaken ceasefire.
    Aid convoys have reached 560,000 people in hard-to-reach and besieged areas; six
    areas still remain off limits. Yesterday, the Syrian Arab Red Crescent medically
    evacuated 515 people from four communities—Zabadani, Madaya, Kfarya, and Foua—besieged
    by government and rebel groups. (AP)
  - United Kingdom withdrawal from the European Union
  - U.S. President Barack Obama, in an op-ed in London's Daily Telegraph, urges Britons
    to keep the U.K. in the European Union. Tomorrow, Obama is scheduled to have lunch
    with Prince Philip and Queen Elizabeth, who celebrated her 90th birthday today.
    He then will hold talks with Prime Minister David Cameron. (Reuters) (Bloomberg)
    (The Daily Telegraph)
  - Philippines–United Kingdom relations, Philippines–United States relations
  - The United States and the United Kingdom issue travel alerts for their citizens
    to avoid the Sulu Archipelago in the southwestern Philippines where a wave of
    kidnappings by Abu Sayyaf militants has occurred. (AP)
  Law and crime:
  - Crime in El Salvador
  - The government of El Salvador unveils and deploys a new heavily armed special
    forces unit to fight criminal gangs in rural areas of the country. Officials say
    it will target gang leaders who left the cities because of a government crackdown.
    (BBC)
  - Six high ranking Pakistan Army officers, including a lieutenant-general and major-general,
    are sacked by Chief of Army Staff Raheel Sharif amid corruption allegations within
    the army. Sharif said corruption had to be uprooted to fight terrorism. (BBC)
  Politics and elections:
  - Philippine general election, 2016
  - Philippine presidential candidate Rodrigo Duterte says he shot a fellow law student
    at San Beda College. The victim, Octavio Goco, who was also a Lex Talionis fraternity
    brother of Duterte, survived the assault. Duerte was not allowed to participate
    in his graduation ceremony. (Rappler) (Philippine Daily Inquirer)
  - Russia–Ukraine relations
  - Ukrainian President Petro Poroshenko signs legislation banning all Russian films
    made after January 1, 2014. The legislation also bans movies produced by Russia
    after 1991 if they "glorify the work of government bodies" of Russia, citing such
    movies to be a threat to national security. (Radio Free Europe/Radio Liberty)
  - 2016 Macedonian protests
  - The European Union cancels mediation talks on resolving the political crisis in
    Macedonia after that country's main political opposition, led by Zoran Zaev, declined
    to take part. (Radio Free Europe/Radio Liberty)
  - Chadian presidential election, 2016
  - The incumbent President of Chad Idriss Deby is reelected for a fifth term amid
    allegations of fraud. (Voice of America)
  Science and technology:
  - Solar Impulse 2, a plane powered only by the sun, takes off from Kalaeloa, Hawaii,
    USA, on the ninth leg of its around-the-world journey. This portion of the trip
    will cover 2,542 nautical miles and, in about three days, is scheduled to touch
    down in Mountain View, California. The journey originated in Abu Dhabi, United
    Arab Emirates, on March 9, 2015, and, after another 8,130 nmi, will complete the
    circle when it lands in Abu Dhabi. (AP)
  Sport:
  - 2016 Summer Olympics
  - The Olympic flame is lit outside the Temple of Hera in Olympia, Greece, by Greek
    actress Katerina Lehou. Brazilian volleyball legend Giovane Gávio starts the relay
    that will reach the capital Brasilia on May 3 for transport throughout the South
    American country by 12,000 torchbearers, arriving at Maracanã Stadium in Rio de
    Janeiro on August 5. (AP via WMAR-TV)
  - Zika virus outbreak
  - Some Miami Marlins and Pittsburgh Pirates baseball players, who are scheduled
    to play a two-game series the end of May in San Juan, Puerto Rico, to honor Pirates
    Hall of Famer Roberto Clemente, are concerned about being exposed to the Zika
    virus. About 400 cases have been confirmed in the Commonwealth. (AP via ESPN)
    (The Sporting News) (Yahoo! Sports)
