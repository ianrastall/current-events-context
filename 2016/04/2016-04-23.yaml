Date: '2016-04-23'
Source_URI: Portal:Current events/2016 April 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - The Pakistani Taliban claims the killing of a Sikh lawmaker, Soran Singh. (The
    New York Times)
  - Syrian Civil War
  - ISIL claims to have shot down a Syrian Arab Air Force MiG-23, southeast of Damascus,
    and captured its pilot. Amaq News Agency, which supports ISIL, gave the pilot’s
    name as Azzam Eid, from Hama. The Syrian Observatory for Human Rights says it
    was not clear whether the plane had been shot down or crashed because of mechanical
    failure. (Daily Mail) (Times of Israel)
  - Syrian government airstrikes kill 25 people, mostly civilians, in attacks on rebel-held
    areas near the capital Damascus. (The New York Times)
  - Al-Qaeda insurgency in Yemen
  - Yemeni government forces along with Popular Resistance militia kill dozens of
    Al-Qaeda in the Arabian Peninsula fighters in clashes in southern Yemen. A drone
    strike kills two others further north, near Ma'rib. (Reuters)
  - Iraqi Civil War
  - Two separate car bombs kill at least 12 people in Iraq's capital, Baghdad. The
    Islamic State claims responsibility for the blast at the security checkpoint in
    a northern district that killed nine and injured 28 others. Three people are killed
    and 11 injured at the second bombing in southern Baghdad that targeted an army
    convoy; no group has claimed responsibility. (Reuters)
  Arts and culture:
  - The continuing influence of English dramatist William Shakespeare is celebrated
    on the 400th anniversary of his death in Stratford-upon-Avon. (Time)
  - Spain commemorates the 400th anniversary of the death of its most famous author
    Miguel de Cervantes. (AFP via France 24)
  Disasters and accidents:
  - 2015–16 South Pacific cyclone season
  - Samoan authorities prepared for Severe Tropical Cyclone Amos which is forecast
    to make landfall later tonight. (Weather Zone)
  - A Russian oil tanker catches fire in the Caspian Sea, killing at least one crew
    member. A total of 10 crew members were evacuated from the ship, which was in
    the territorial waters of Turkmenistan when the fire broke out. It was unclear
    what caused the blaze. (Radio Free Europe/Radio Liberty)
  - 2016 Ecuador earthquake
  - The death toll from the earthquake passes 650 with over 50 people missing. It
    is now the deadliest earthquake in South America this century. (AP via ABC News)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea is reported to have launched a submarine-launched ballistic missile
    for the first time. (Reuters)
  - Russia–United States relations
  - President of Russia Vladimir Putin accuses the United States of reneging on a
    16-year-old deal that called for reducing Russia's and the United States' stockpiles
    of weapons-grade plutonium. He accused Washington of trying to preserve its ability
    to turn some of its plutonium stockpile back into a form usable for nuclear weapons.
    (Radio Free Europe/Radio Liberty)
  - Syrian peace process
  - Reuters reports the Friday afternoon truce between Kurdish Asayish forces and
    pro-Syrian government forces, declared following a three-day outbreak of violence
    that killed at least 26 people, is holding. (Reuters)
  - European migrant crisis
  - German Chancellor Angela Merkel, European Council President Donald Tusk, and European
    Commission Vice-President Frans Timmermans meet with Syrian refugees at a camp
    in the southeastern Turkish town of Nizip prior to talks with a delegation led
    by Turkish Prime Minister Ahmet Davutoğlu. Davutoğlu stresses the importance of
    implementation of European Union visa liberalization for Turkish citizens in assuring
    the success of Europe's migrant readmission agreement with his country. Tusk announces
    that the EU will spend 1 billion euros ($1.1 billion) this summer on projects
    to improve the lives of Syrian migrants. (Hürriyet Daily News) (Reuters) (Journal
    of Turkish Weekly)
  - North Korea-United States relations
  - Foreign Minister Ri Su-yong says North Korea is ready to halt nuclear tests if
    the United States suspends its annual military exercises with South Korea. (AP
    via Time)
  Law and crime:
  - Attacks on secularists in Bangladesh
  - Professor Rezaul Karim Siddique is killed in the Bangladeshi city of Rajshahi
    in an ISIL attack. (Hindustan Times) (AFP via Yahoo!)
  - Böhmermann affair
  - During a rally in support of German comedian Jan Böhmermann, outside the Turkish
    embassy in Berlin, Bruno Kramm, head of the Berlin branch of Germany's Pirate
    Party, is arrested for “insulting a representative of a foreign state” by quoting
    a line from the comic’s satirical poem about Turkish President Recep Tayyip Erdoğan.
    (RT)
  - Panama Papers
  - Prime Minister of Pakistan Nawaz Sharif bows to opposition demands that he ask
    Pakistan's chief justice to set up an independent commission to investigate offshore
    accounts linked to his family. Sharif said he would accept the commission's findings
    and even resign if called upon. (Radio Free Europe/Radio Liberty)
  - European Union finance ministers approve a series of measures to tackle tax-evading
    methods that were exposed by the Panama Papers. (The Guardian)
  - United States Federal agents are combing three states for 32 cases of commercial
    grade explosives, about 500 pounds of 2½ to 5 inch aerial shells, stolen from
    a CSX train traveling from Chicago, Illinois, through Ohio that arrived in Detroit,
    Michigan, on Wednesday. (CBS News) (Detroit Free Press)
  Politics and elections:
  - Philippine presidential election, 2016
  - Human rights activists, lawyers, labor rights groups and other advocates endorse
    Leni Robredo for vice president. (Rappler)
  - South Sudanese Civil War
  - Rebel leader Riek Machar misses an international deadline to return to the capital
    Juba to take the post of Vice President. Machar was offered the position by President
    Salva Kiir Mayardit in the hopes of putting an end to the civil war but has repeatedly
    delayed his return. (Al Jazeera)
  - Thousands of people protest in the German city of Hanover against the proposed
    Transatlantic Trade and Investment Partnership deal. They say the deal would drive
    down wages, and weaken environmental protection and labour rights. (BBC)
  - Darfurian status referendum, 2016
  - According to the Sudanese electoral commission, more than 97% of voters in Darfur
    choose to remain as five states rather than form a single region. However, The
    vote was held amid ongoing insecurity and many of Sudan's 2.5 million displaced
    people were not registered to vote, with the U.S. State Department warning that
    the referendum could not be considered credible "under current rules and conditions".
    (BBC)
  - Congo President Denis Sassou Nguesso names former opposition leader Clément Mouamba
    as prime minister. (Reuters)
  Science and Technology:
  - Solar-powered aircraft Solar Impulse 2 lands in Mountain View, California after
    a 62-hour flight across the Pacific Ocean from Hawaii. (NBC News) (BBC)
