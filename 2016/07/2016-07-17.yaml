Date: '2016-07-17'
Source_URI: Portal:Current events/2016 July 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least one person is reportedly killed and others are taken hostage after an
    armed group seized control of the police headquarters in the Erebuni District
    of Yerevan, Armenia. The gunmen are demanding the release of jailed opposition
    figure, Jirair Sefilian, according to Armenia's National Security Service. (RT)
  - Syrian Civil War
  - Syrian Government forces capture the main road into the parts of Aleppo controlled
    by rebels. (Reuters)
  - Second Libyan Civil War
  - UN-backed talks are underway in Tunis regarding the future of Libya, including
    discussions on forming a unified army for the Government of National Accord. (RTE)
  Arts and culture:
  - Protesters in Pakistan take offense to the honour killing of internet celebrity
    Qandeel Baloch. (Al Jazeera)
  Business and economics:
  - The Prime Minister of Australia, Malcolm Turnbull said that his country would
    open up trading with the United Kingdom in a post-EU trade deal. (BBC)
  Disasters and accidents:
  - Local officials report eight people were killed on Friday when their elevator
    fell 18 stories in an under-construction apartment building in the port city of
    Longkou in Shandong province of eastern China. (AP)
  - A helicopter crashes at Breighton Aerodrome in the United Kingdom, with reports
    of five casualties. (BBC)
  Law and crime:
  - 2016 shooting of Baton Rouge police officers
  - At least three Baton Rouge Police Department officers are shot dead and several
    others are wounded by a gunman in Baton Rouge, Louisiana. (USA Today) (BBC)
  Politics and elections:
  - Territorial disputes in the South China Sea, Philippines v. China
  - Vietnamese police bus away about two dozen would-be protestors who gathered at
    Hoàn Kiếm Lake in central Hanoi to rally in support of the Permanent Court of
    Arbitration's South China Sea decision, and against China's rejection of the tribunal's
    ruling. This preemptive action, in effect, squashed the No-U group protest. (AP)
    (AAP via News.com.au)
  - São Tomé and Príncipe presidential election, 2016
  - Voters in São Tomé and Príncipe go to the polls for a presidential election with
    former Prime Minister Evaristo Carvalho elected in the first round. (Africa News)
  - The Bahrain High Civil Court in Manama dissolves Al Wefaq, Bahrain's main Shia
    opposition group, accusing it of helping to foster violence and terrorism in the
    Sunni-led, Shia-majority island country. The Bahraini court previously issued
    a three-month suspension of the group last month. (Al Jazeera) (JURIST)
  Sport:
  - 2016 Open Championship
  - In golf, Henrik Stenson wins the 2016 Open Championship defeating Phil Mickelson
    after a closely fought battle in the final round at the Royal Troon Golf Club
    in Scotland. Stenson's total of 264, 20 under par, is the lowest stroke total
    ever recorded in any major championship and ties Jason Day's performance at last
    year's PGA Championship for the lowest score in relation to par at a major. It
    is also Stenson's first victory in a major tournament. (The Guardian)
