Date: '2016-07-25'
Source_URI: Portal:Current events/2016 July 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - A suicide car bomb kills at least 21 people and wounds more than 32 at the entrance
    to Al Khalis, northeast of Baghdad. Most died inside their vehicles while waiting
    to enter the town. (Al Jazeera)
  - Conflict in Najran
  - Saudi Arabia's Interior Ministry says five border guards have been killed following
    clashes with Houthi militants on the border with Yemen. (The New York Times)
  Business and economy:
  - Verizon Communications buys Yahoo! for $4.83 billion in cash, ending the latter's
    over 20-year run as an independent corporation. (Los Angeles Times) (Reuters)
  Disasters and accidents:
  - At least 39 people are killed, including 16 children, in a fire at a residential
    compound in Mangidy, Madagascar. (Reuters)
  International relations:
  - Taiwanese president Tsai Ing-wen refutes accusations that she would have interpreted
    the 1992 consensus differently. (Straits Times)
  Law and crime:
  - 2016 Fort Myers nightclub shooting
  - At least two people are killed after as many as 17 people are injured during a
    mass shooting at Club Blu, a nightclub in Fort Myers, Florida, with most of the
    victims reportedly minors. Two suspects and a person of interest have been detained
    in connection with the shooting. (BBC), (News-Press)
  - 2016 Turkish purges
  - Turkey orders the detention of 42 journalists including well-known writer Nazli
    Ilicak. Earlier, Turkish satirical magazine was prevented from publishing its
    post-coup edition—a cartoon on the cover showed Turkish soldiers facing off against
    anti-coup protesters, both pushed toward each other by giant hands. (Reuters)
    (CNN)
  - Amnesty International reports detainees in Turkey are being subjected to beatings
    and torture, including rape, in official and unofficial detention centres in the
    country. (NPR) (AI)
  Politics and elections:
  - 2016 Democratic National Convention
  - High profile speakers include Senator Cory Booker, Senator Al Franken, Senator
    Kirsten Gillibrand and Senator Jeanne Shaheen. (The Washington Post)
  - Headliners include Senator Elizabeth Warren, Democratic presidential candidate
    Senator Bernie Sanders and First Lady Michelle Obama. (Los Angeles Times)
  - Senator Bernie Sanders is booed by his own supporters during his keynote speech
    after telling them, "We must elect Hillary Clinton." (ABC News)
  - Celebrity appearances and performances include the boyband Boyz II Men, singer/songwriter
    Paul Simon and singer/actress Demi Lovato; among the speakers include Sanders
    supporter/comedian Sarah Silverman and Latina activist/actress Eva Longoria. (Variety),
    (CNN)
  - Opposition leader Sam Rainsy criticizes Cambodian autocrat Hun Sen for trying
    to split up the Cambodian National Rescue Party, the second largest party in parliament.
    (The Phnom Penh Post)
