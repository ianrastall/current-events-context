Date: '2016-07-28'
Source_URI: Portal:Current events/2016 July 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - Russian Defense Minister Sergei Shoigu says Russia and Syria will open humanitarian
    corridors to Aleppo, and will provide a way for rebel fighters to lay down their
    arms. (CBS News)
  - The Syrian government offers an amnesty for rebels who surrender within three
    months. (Huffington Post)
  - Abu Mohammad al-Julani, the leader of Al-Nusra Front, announces that the group
    is splitting from Al-Qaeda with their approval and that new operations will be
    carried out under the name Jabhat Fateh al-Sham. (The Guardian)
  Disasters and accidents:
  - At least 64 people die in Nepal after heavy monsoonal rain triggers floods and
    landslides. (BBC) (Al Jazeera)
  - Around 1.8 million people are affected, and the Kaziranga National Park is submerged,
    due to heavy rains causing flooding in Assam. (The Guardian)
  International relations:
  - North Korea–United States relations
  - North Korea says the United States has "crossed the red line in our showdown"
    after placing sanctions on its leader Kim Jong-un over human rights abuses, and
    considers the sanctions to be a "declaration of war" by the United States. (Sky
    News)
  Politics and elections:
  - 2016 Democratic National Convention
  - Hillary Clinton accepts her party's nomination as the candidate for this year's
    presidential election. (The New York Times)
  - Notable speakers include Governor Mark Dayton of Minnesota, Governor Andrew Cuomo
    of New York, House Minority Leader Nancy Pelosi, Governor John Hickenlooper of
    Colorado, Governor Tom Wolf of Pennsylvania, retired General John R. Allen and
    Chelsea Clinton. (Fox)
  - Celebrity appearances include singer Carole King, basketball player Kareem Abdul-Jabaar,
    actress Chloë Grace Moretz and singer Katy Perry. (Fox)
  Science and technology:
  - Kīlauea, a shield volcano on the island of Hawai'i, erupts lava into the ocean
    for the first time since 2013. (The Weather Channel) (Christian Science Monitor)
