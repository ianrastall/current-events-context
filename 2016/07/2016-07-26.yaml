Date: '2016-07-26'
Source_URI: Portal:Current events/2016 July 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - Al-Shabaab claim responsibility for a double suicide car bombing attack in Mogadishu
    near an African Union base at the city's airport. At least 13 people are killed,
    including seven UN guards. (AP) (Al-Jazeera)
  - 2016 Normandy church attack
  - Two men armed with knives take a priest, two nuns and two parishioners hostage
    in a church near Rouen in the French region of Normandy. French police kill the
    hostage-takers after the 86-year-old priest, Jacques Hamel, was killed by slitting
    his throat. (NBC News) (BBC), (Haaretz)
  - Following the murder of the Catholic priest, French President François Hollande
    vows to wage war against the Islamic State of Iraq and the Levant "by every means".
    The organization released a video showing the attackers pledging allegiance to
    ISIL during the attack. (Local)
  Disasters and accidents:
  - 2016 California wildfires
  - Sand Fire
  - A state of emergency is declared in Los Angeles County, California, due to the
    threat posed by the Sand Fire. (Los Angeles Daily News)
  - Officials evacuate 10,000 homes as the blaze grows to more than 35,000 acres.
    (Los Angeles Times)
  - Soberanes Fire
  - California officials declare a state of emergency for this Garrapata State Park
    blaze in Monterey County that, in its fifth day, has grown to 23,500 acres, and
    is only 10 percent contained. Six major Big Sur State Parks remain closed. (San
    Francisco Chronicle) (AP)
  - Two nearby boats, responding to a Coast Guard emergency broadcast, rescue 46 people
    from the sinking 220-foot Alaska Juris fishing boat in the Bering Sea off Alaska's
    Aleutian Islands. There are no reports of injuries; all on board were wearing
    survival suits. (AP)
  - Landslides from torrential rain that pounded North Korea's North Pyongan Province
    this weekend kills 10 people and injures 55 with four others missing. (UPI)
  International relations:
  - Palestine–United Kingdom relations
  - The Palestinian National Authority says it is planning to sue the United Kingdom
    over the 1917 Balfour Declaration. Palestinian Foreign Affairs Minister Riyad
    al-Maliki says the document led to mass Jewish immigration to British Mandatory
    Palestine, "at the expense of our Palestinian people". (BBC)
  Law and crime:
  - Sagamihara stabbings
  - At least 19 people are killed and 26 others are injured in a knife attack at a
    care centre for disabled people in the city of Sagamihara, Kanagawa Prefecture,
    Japan. A man has handed himself in to the police, according to local media. (BBC)
  - The children's music group USA Freedom Kids plans to sue the campaign of Donald
    Trump. (The Washington Post)
  - New York City Police Commissioner Bill Bratton announces the arraignment of three
    suspects in the theft of more than $5 million in cash and valuables, including
    jewelry and baseball cards, from banks in Brooklyn and Queens, in April and May
    of this year. (Reuters)
  Politics and elections:
  - The Prime Minister of Australia Malcolm Turnbull announces that a Royal Commission
    will be held into the Northern Territory youth justice system after the Australian
    Broadcasting Commission's Four Corners program shows footage of juvenile Aboriginal
    Australians being tortured at the Don Dale Juvenile Detention Centre. John Elferink
    has been sacked as the Northern Territory's Minister for Justice and Corrections
    following the report. (ABC News), (The Guardian)
  - The President of South Sudan, Salva Kiir, removes Riek Machar from his post as
    deputy leader and as vice president, and installs Taban Deng Gai in his place.
    (BBC)
  - 2016 Democratic National Convention
  - Hillary Clinton is nominated as the Democratic Party candidate for this year's
    presidential election. She becomes the first woman ever to be nominated for president
    by a major party in the United States.(CNN)(The Guardian) (NBC News)
  - Former president Bill Clinton, husband of Hillary Clinton, describes Hillary as
    a fighter who works relentlessly to make the world better. (The Sacramento Bee),
    (Time) (NPR)
  - Other Democratic leaders speaking include Donna Brazile, Virginia Governor Terry
    McAuliffe, Senator Barbara Boxer, Senator Tom Harkin, Senator Amy Klobuchar, Senator
    Harry Reid, Senator Chuck Schumer, House Minority Leader Nancy Pelosi, former
    Attorney General Eric Holder, former U.S. Secretary of State Madeleine Albright
    and former U.S. President Jimmy Carter. (The Chicago Sun Times), (CBS)
  - Celebrity appearances include Elizabeth Banks, Andra Day, Lena Dunham, America
    Ferrera, Tony Goldwyn, Alicia Keys, Debra Messing, Meryl Streep, and Mallory Weggemann.
    (The Chicago Sun Times), (CBS)
  Science and technology:
  - Solar Impulse 2 becomes the first solar-powered aircraft to travel around the
    world without fuel after it returns to Abu Dhabi. (Deutsche Welle)
  - Every square inch of the United States is forecasted to have hotter-than-normal
    temperatures for the first time in recorded history.(USA Today)
  Sport:
  - Serie A defending champions Juventus break the Italian transfer record fee after
    completing the signing of Argentinian forward Gonzalo Higuaín from Napoli for
    €90M (£75.3m) on a five-year-deal. (Sky Sports)
