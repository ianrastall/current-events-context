Date: '2016-07-02'
Source_URI: Portal:Current events/2016 July 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Gulshan attack
  - 13 hostages were rescued following a standoff with the Rapid Action Battalion.
    (Reuters)
  - Twenty hostages and two policemen were killed, and six gunmen are dead with one
    captured alive. (CNN)
  - War in Afghanistan
  - At least two people are killed and dozens more are wounded in a suicide bombing
    in Jalalabad, Nangarhar Province. (Radio Free Europe/Radio Liberty)
  - Iraqi Civil War, Military intervention against ISIL
  - According to The Pentagon, two senior ISIL leaders have been killed by a United
    States-led coalition airstrike in Mosul. (The Guardian) (BBC)
  - Syrian Civil War
  - Syrian government airstrikes in Damascus kill at least 30 people. According to
    the rebels, the airstrikes were revenge for the killing of a Syrian Air Force
    pilot by Al-Nusra Front yesterday. The airstrikes reportedly targeted a medical
    centre and a school. (The Guardian)
  - 2016 Istanbul airport attack
  - Turkish police arrest a total of 41 people in connection with the Istanbul Atatürk
    Airport terrorist attack. (UPI.com)
  Law and crime:
  - A lone gunman opened fire at a café in Žitište, Serbia, killing five people and
    injuring 20 more. The perpetrator was arrested shortly afterward while attempting
    to flee the scene. (Radio Free Europe/Radio Liberty)
  - Four children are stabbed to death by their mother in Memphis, Tennessee. The
    mother was taken into custody. (Local 8 News)
  Politics and elections:
  - Australian federal election, 2016
  - Australians vote to elect a government for the next three years. Prime Minister
    Malcolm Turnbull, leader of the conservative Liberal Party-led Coalition, dissolved
    both houses of Parliament in May in a bid for a Senate more friendly to his agenda.
    The final result showed the Coalition with a bare 1 seat majority in the House
    with 76 seats and the Australian Labor Party with 69 seats. (Reuters) (Sydney
    Morning Herald)
  - Aftermath of the United Kingdom European Union membership referendum, 2016
  - In pro-EU rallies, thousands of people protest in London against the United Kingdom
    withdrawal from the European Union and ask that Article 50 not be invoked. (The
    Guardian)
