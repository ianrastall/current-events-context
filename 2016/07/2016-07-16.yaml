Date: '2016-07-16'
Source_URI: Portal:Current events/2016 July 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Turkish coup d'état attempt
  - The President of Turkey Recep Tayyip Erdoğan returns to Istanbul Atatürk Airport
    indicating that the coup may be faltering. (The New York Times)
  - Erdoğan declares that the coup is over with over 1,500 members of the Turkish
    military in detention. (CNN) (AP)
  - 'General Ümit Dündar reports at least 194 people were killed: two soldiers, 41
    police officers, 47 civilians, and 104 alleged coup plotters. An official later
    adds that 1,440 people have been reported wounded. (NBC News)'
  - Greek security forces arrest eight people after a Turkish military helicopter
    lands at Alexandroupoli Airport. The helicopter crew have reportedly requested
    political asylum. (Reuters via Yahoo! News) (Ekathimerini)
  - Secretary of State John Kerry says the United States would consider an extradition
    request for the cleric blamed for the attempted coup. Fethullah Gülen left Turkey
    in 1999 and now lives in Pennsylvania. Gülen denies any involvement. Kerry adds
    no request has been received. (NBC News) (AP)
  - The United States Federal Aviation Administration issues an order that prohibits
    all airlines from flying from Turkey to the U.S., and bans U.S. commercial and
    private aircraft from flying to Turkey. (Reuters)
  - 2016 Nice truck attack
  - ISIL claims responsibility for the attack, and four people allegedly involved
    in the attack are arrested overnight. (AP, Fox News via West Australian)
  Arts and culture:
  - Pakistani social media celebrity Qandeel Baloch is killed by her brother in an
    honour killing. (BBC)
