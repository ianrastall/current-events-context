Date: '2016-07-22'
Source_URI: Portal:Current events/2016 July 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Turkish coup d'état attempt, 2016 Turkish purges
  - Thousands gather in Istanbul's Taksim Square in a show of support for the new
    powers that President Recep Tayyip Erdoğan has received in order to crackdown
    on dissent following the attempted coup. (The Telegraph)
  - 2016 Munich shooting
  - Ten people, including the gunman, are killed and 21 wounded in a shooting in and
    around the Olympia-Einkaufszentrum shopping mall in the Moosach district of Munich,
    Germany, next to the Olympic stadium.(CNN) (Reuters) (AP via KMGH-TV) (The New
    York Times) (BBC)
  Arts and culture:
  - China begins demolishing buildings and evicting residents at Larung Gar in Tibet,
    one of the largest religious institutes in the world. Officials put forward overpopulation
    and security as the leading reasons for the planned action. (BBC) (AP via ABC
    News)
  Disasters and accidents:
  - An Indian Air Force AN32 carrying 29 people on board has gone missing over the
    Bay of Bengal while en route to Port Blair in the Andaman and Nicobar Islands.
    The Indian Navy has launched a search and rescue operation. (BBC)
  - The municipality of North Battleford, Saskatchewan shuts off its main water supply
    following an oil spill into the North Saskatchewan River the previous day, of
    up to 250,000 litres, from a pipeline owned by Husky Energy. (The Saskatoon Star-Phoenix)
  International relations:
  - Cross-Strait relations
  - Taiwanese President Tsai Ing-wen rejects a supposed deadline set by Mainland China's
    leader Xi Jinping for accepting the 1992 Consensus, saying such a deadline is
    against the will of the people. (Focus Taiwan) (The Washington Post)
  Politics and elections:
  - 2016 United States presidential election
  - Presumptive Democratic Party presidential nominee Hillary Clinton selects Senator
    Tim Kaine (Virginia) as her vice-presidential running mate. (Fox News)
  Sport:
  - Sam Allardyce is appointed as the new England national football team manager by
    The Football Association following the resignation of Roy Hodgson in June. (BBC)
  - American hurdler Kendra Harrison sets a new world record in the women's 100 meters
    hurdles with a time of 12.20 seconds in the London Anniversary Games at the Olympic
    Stadium. (Daily Mail)
