Date: '2016-07-09'
Source_URI: Portal:Current events/2016 July 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Jammu and Kashmir
  - 2016 Kashmir unrest
  - At least three people are killed and dozens more are wounded when protesters clash
    with Indian Army soldiers. The protesters defied an army curfew and took part
    in the funeral of a top rebel commander of Hizbul Mujahideen. (Radio Free Europe/Radio
    Liberty)
  - South Sudanese Civil War
  - According to a military spokesman of the rebel SPLM-IO, at least 115 soldiers
    between the two rival Sudan People's Liberation Army factions are killed in clashes
    in the capital, Juba. (Reuters)
  - Syrian civil war, Russian intervention
  - A Russian Air Force Mi-24 helicopter crashes near Palmyra, Syria, while assisting
    Syrian Army forces in the area. Russia's Ministry of Defence confirms two Russian
    pilots, Riafa'at Habibulin and Yevgeny Dolgin, are killed. (The Independent)
  Disasters and accidents:
  - Typhoon Nepartak (2016)
  - Taiwan is recovering after Typhoon Nepartak hit yesterday killing two people and
    injuring 72. (PA via BT)
  International relations:
  - International reactions to Philippines v. China
  - Ahead of a court decision by the Permanent Court of Arbitration, China holds a
    naval drill in the disputed South China Sea raising tensions in the region. (The
    New York Times)
  - North Korea and weapons of mass destruction
  - South Korea claims that North Korea has fired a ballistic missile from a submarine.
    (Yonhap)
  - 2016 Warsaw summit
  - NATO members in Warsaw, Poland, agree to extend their mission in Afghanistan into
    2017 and announced that they will continue to fund the Afghan Armed Forces to
    2020. (Radio Free Europe/Radio Liberty)
  - Bahamian–United States relations, 2016 shooting of Dallas police officers
  - Following the death of Alton Sterling and Philando Castile and the shooting of
    white police officers in Dallas, Texas, The Bahamas issues a rare travel warning
    for its citizens traveling to the United States. (BBC)
  Law and crime:
  - Human rights in the Philippines
  - The government of the Philippines demands its critics to provide proof if there
    are human rights violations conducted during its drug war. (Rappler)
  - More than a hundred suspected drug pushers have been killed since Rodrigo Duterte
    took office as president of the country, a situation likened to the dictatorship
    of Ferdinand Marcos. (Philippine Daily Inquirer)
  - Child marriage
  - This week, the Gambia and Tanzania outlawed child marriages. Friday, the Tanzanian
    High Court — in a case filed by the Msichana Initiative, a lobbying group that
    advocates for girls' right to education — ruled in favor of protecting girls from
    the harms of early marriage. And during a feast ending the Muslim holy month of
    Ramadan on Wednesday, The Gambian President Yahya Jammeh announced that child
    and forced marriages are banned. Jammeh called on the National Assembly to quickly
    take up the issue. (AP) (BBC) (Human Rights Watch)
  - 2016 shooting of Dallas police officers
  - Multiple gunshots strike the public safety headquarters of the San Antonio, Texas,
    Police Department. No injuries are reported. (USA Today)
  Politics and elections:
  - 2016 Zimbabwe protests
  - The Zimbabwe economy is crippled after a week of protests as a result of dissatisfaction
    with the regime of Robert Mugabe. (The Telegraph)
  - Nauruan parliamentary election, 2016
  - Voters in Nauru go to the polls for an election. The President of Nauru Baron
    Waqa is reelected in his constituency. (Radio New Zealand), (ABC News Australia)
  - United States presidential elections, 2016
  - Green Party presumptive presidential candidate Jill Stein invites Bernie Sanders
    to take over her place as the party's nominee. (International Business Times)
  Sport:
  - 2016 Wimbledon Championships – Women's Singles
  - In tennis, American defending champion Serena Williams defeats Angelique Kerber
    of Germany in straight sets to win her seventh Wimbledon Championships title and
    her 22nd Grand Slam title, tying the Open era record held by Steffi Graf. (BBC)
