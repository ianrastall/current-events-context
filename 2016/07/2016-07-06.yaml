Date: '2016-07-06'
Source_URI: Portal:Current events/2016 July 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - CPP-NPA-NDF rebellion
  - Twenty Philippine Army soldiers are under investigation after they are suspected
    of mutilating the body of a New People's Army member. The communist militant's
    eyes were gouged, his tongue was cut off and his throat was slit. (GMA News)
  - Yemeni Civil War
  - A suicide car bomb, that targeted the Central Security headquarters in the port
    city of Aden, Yemen, kills at least 26 people. Following the blast, militants
    stormed the compound and clashed with soldiers. No group immediately claimed responsibility
    but it is similar to an Islamic State in Iraq and the Levant attack on the port
    of Al Mukalla. (AP via The New York Times) (Reuters)
  Business and economy:
  - The price of nickel swings wildly after Philippines environment secretary Gina
    Lopez announces plans to close existing mines in the country. (Financial Times)
    (Bloomberg)
  - Business magnate and former Italian prime minister Silvio Berlusconi sells leading
    football club A.C. Milan to a Chinese consortium for an eventual €400 million.
    (BBC)
  - Australian federal election, 2016
  - Standard & Poor's drops Australia's debt outlook from stable to negative following
    the country's surprisingly close election this weekend. (The Guardian)
  International relations:
  - International reactions to Philippines v. China
  - China threatens the United States regarding the South China Sea and it will not
    accept a verdict in the Permanent Court of Arbitration. (ABC News Go) (Forbes)
  Law and crime:
  - Oscar Pistorius trial
  - South African athlete Oscar Pistorius is sentenced to six years imprisonment for
    the murder of Reeva Steenkamp. (CNN)
  Politics and elections:
  - Iraq Inquiry
  - A report about the United Kingdom's involvement in the Iraq War is released. The
    chairman of the inquiry, Sir John Chilcot, said that the invasion was not a "last
    resort" and was based on "flawed intelligence and assessments". The inquiry was
    announced on 15 June 2009 by then-Prime Minister Gordon Brown. The final hearing
    was held on 2 February 2011. (The Guardian) (BBC) (BBC²)
  - Hillary Clinton email controversy
  - Loretta Lynch, the Attorney General of the United States, closes the investigation
    into Hillary Clinton's use of a personal email system to conduct official business
    without charges being laid. (CNN)
  - 2016 Zimbabwe protests
  - National "Stay Away" protests, organized over the Internet via the WhatsApp social
    messaging platform, take place in Zimbabwe, following fears of an economic collapse
    amid calls for President Robert Mugabe's resignation.(BBC News)
