Date: '2016-07-15'
Source_URI: Portal:Current events/2016 July 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Nice truck attack
  - The President of France François Hollande extends a state of emergency against
    terrorism for three months following the attack, which has now claimed over 80
    lives. He had previously announced that it would be lifted on 26 July. (Sputnik
    News), (BBC News)
  - Authorities identify the attacker as a 31-year-old Tunisian resident in France,
    who was killed during the exchange of gunfire with police. The man was known to
    police in connection with petty crime, but was not on the French intelligence
    service watch list. (Reuters) (BBC)
  - 2016 Turkish coup d'état attempt
  - The Prime Minister of Turkey Binali Yıldırım calls for "calm" over what he states
    was an "illegal attempt" by sections of the Turkish military to claim power. (The
    Telegraph)
  - The Turkish military claims to have gained control of the government with gunfire
    reported on the streets of Ankara. (CNBC)
  - The President of Turkey Recep Tayyip Erdoğan urges supporters to oppose the coup
    d'etat by taking to the streets. (Washington Post)
  - The death toll from the coup is reported to be at least 42 in Ankara and 60 across
    Turkey. 130 soldiers have been taken into custody and one Turkish Army general
    has been killed. (Reuters via Trust), (NBC News)
  Arts and culture:
  - In painting, Louise Hearman wins the 2016 Archibald Prize for her portrait of
    Australian comedian, satirist and actor Barry Humphries. (ABC News)
  Business and Economics:
  - Herbalife, a multi-level marketer of dietary supplements and personal care products,
    has reached an agreement with the U.S. Federal Trade Commission to settle charges
    arising out of the appearance that it is a pyramid scheme. (BBC)
  International relations:
  - Ukrainian crisis, Russia–Ukraine relations
  - Russia is to deploy its advanced long range S-400 surface-to-air missile system
    to Feodosia in the Crimean Peninsula next month for the first time. (Radio Free
    Europe/Radio Liberty) (RT)
  Politics and elections:
  - Republican Party vice presidential candidate selection, 2016
  - Donald Trump chooses Indiana governor Mike Pence as his vice presidential running
    mate. (CNN)
  Sport:
  - Evolution Championship Series
  - The largest video fighting game tournament in the world begins its three day event
    running from July 15–17. Over 15,000 players registered to compete with record
    breaking entrants for Street Fighter 5 at 5,107, Super Smash Bros for Wii U at
    2,662 and Super Smash Bros. Melee at 2,372 entrants. (ESPN)
