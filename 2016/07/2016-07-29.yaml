Date: '2016-07-29'
Source_URI: Portal:Current events/2016 July 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Nigerian military commences bombing militants in Lagos and Ogun States with
    many militants reported dead. (The Eagle)
  - Boko Haram insurgency
  - The United Nations suspends aid to dangerous areas of Nigeria's northeastern Borno
    State following Thursday's attack by Boko Haram (ISIL in Africa) on a humanitarian
    convoy where two soldiers and three civilians were wounded. However, UNICEF noted,
    aid will continue to the capital Maiduguri. (AP via The New York Times)
  - Syrian civil war
  - British-based Syrian Observatory for Human Rights reports a Save the Children
    maternity hospital in Kafr Takharim in rebel-held Idlib Governorate is hit by
    airstrikes. No report on casualties. SOHR also says at least five people are killed
    and more than 25 injured from airstrikes in another part of the northern Idlib
    countryside. (Reuters)
  - Cabinda War
  - The Front for the Liberation of the Enclave of Cabinda (FLEC) says it has killed
    nine Angolan soldiers and wounded 14 others in recent clashes in the oil-rich
    Cabinda Province. (Reuters)
  Business and economy:
  - The Bank of Japan announces a 6 trillion yen stimulus package to help invigorate
    the Japanese economy. (Marketwatch)
  Disasters and accidents:
  - The United States Geological Survey (USGS) reports a 7.7 magnitude earthquake
    has struck off the Northern Mariana Islands in the Pacific Ocean. The Pacific
    Tsunami Warning Center says there is no tsunami threat because the quake was very
    deep in the earth. (Pacific Daily News)
  International relations:
  - Japan–United States relations
  - The United States military says it will shortly return 4,000 hectares of its Okinawa
    military installation, 17 percent of the area it controls, to the Japanese government.
    (Reuters)
  Law and crime:
  - Michigan Attorney General Bill Schuette files criminal charges against six state
    employees in connection with the Flint water crisis. (Detroit Free Press) (Reuters)
  - Former President of Brazil Lula da Silva will stand trial on obstruction of justice
    charges relating to the Petrobras scandal. (The Guardian)
  Politics:
  - The American Federal Bureau of Investigation is investigating claims that the
    Hillary Clinton campaign has been hacked as part of recent cyber-attacks on the
    Democrats. (Washington Examiner), (Fox News)
