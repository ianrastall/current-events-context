Date: '2016-07-19'
Source_URI: Portal:Current events/2016 July 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The British-based Syrian Observatory for Human Rights reports U.S.-led coalition
    airstrikes on the Islamic State-held city of Manbij in northern Syria kill at
    least 56 civilians, including 11 children, and injure dozens more. (Reuters)
  - Northern Mali conflict
  - '2016 Nampala attack: At least 12 soldiers are killed and 27 others injured after
    unidentified militants briefly overrun a government base in central Mali, near
    the border with Mauritania. The attackers also burn and loot the adjacent village
    of Nampala. (Reuters)'
  - Three people, including the perpetrator, are killed in a shooting in the town
    of Spalding, Lincolnshire in the United Kingdom. Lincolnshire Police have ruled
    out a potential link to terrorism. (BBC)
  - An unidentified senior Indonesian official says the government is "99 percent"
    certain Abu Wardah Santoso, leader of ISIL-connected Mujahidin Indonesia Timur,
    was killed in Monday's clash with security forces on Sulawesi island. (Reuters)
  Arts and culture:
  - Fox News Channel controversies
  - Roger Ailes is reported to be leaving Fox News after charges of sexual harassment
    are filed against him by former Fox and Friends host Gretchen Carlson. (Variety)
  Disasters and accidents:
  - 26 people who were mainly from China and aboard a tour bus die after it crashes
    into a highway railing while en route to Taoyuan International Airport and bursts
    into flames. (Reuters)
  - A crane collapses across the Tappan Zee Bridge in New York. No vehicles are hit,
    but several contractors suffer minor injuries. (ABC News)
  International relations:
  - North Korea–South Korea relations, North Korea and weapons of mass destruction
  - The South Korean Joint Chiefs of Staff and the United States Strategic Command
    report North Korea fires three ballistic missiles into the Sea of Japan. The short-range
    ballistic missiles flew about 500 to 600 kilometers (310 to 375 miles) before
    crashing in the sea, sufficient to target the southern part of South Korea where
    the U.S. Terminal High Altitude Area Defense system is set to be installed. (AP)
    (BBC)
  Law and crime:
  - Former Philippine president Gloria Macapagal Arroyo has been acquitted of plunder.
    (BBC)
  - Three people are killed, including the male attacker, in a shotgun shooting outside
    a swimming pool in Spalding, Lincolnshire, U.K.. The victims are reported to be
    a 40-year-old mother and her 20-year-old daughter; both apparently knew the suspect.
    (Daily Mirror)
  - A Kansas City police captain has been shot dead in Kansas City, Kansas. One suspect
    is in custody and two others are possibly at large. (Breaking 911)
  Politics and elections:
  - 2016 United States Senate election in California
  - United States president Barack Obama and his vice president Joe Biden endorse
    Kamala Harris over Loretta Sanchez, both of whom are Democrats. (The Los Angeles
    Times)
  - 2016 Labour Party (UK) leadership election
  - Angela Eagle drops out of the race and announces her endorsement of Owen Smith,
    the last remaining candidate to challenge incumbent party leader Jeremy Corbyn.
    (BBC)
  - 2016 Republican National Convention
  - Donald Trump is nominated as the Republican Party candidate for this year's presidential
    election. (NBC News)
