Date: '2016-07-21'
Source_URI: Portal:Current events/2016 July 21
Intelligence_Payload:
  Business and economy:
  - Fox News Channel controversies
  - 21st Century Fox announced that the head of Fox News, Roger Ailes, is resigning.
    Rupert Murdoch will replace him as interim Chief Executive and Chairman. (Mediaite)
    (CNN) (New York Post)
  Disasters and accidents:
  - July 2016 North China cyclone
  - Torrential precipitation and widespread flash floods from an extratropical cyclone
    resulted in at least 78 deaths over North China and nearby regions. (Xinhua)
  International relations:
  - International reactions to Philippines v. China
  - Waves of Chinese protestors gather outside of KFC restaurants and Apple Stores
    across China to express their anti-U.S. sentiments after the ruling, while Chinese
    state media asks for calm. (AP via ABC News) (BBC) (USA Today)
  Law and crime:
  - Philippine Drug War
  - The Philippines' current crackdown on controlled substances passes a death toll
    of 500. (Abscbn)
  Politics:
  - 2016 Republican National Convention
  - Donald Trump accepts the nomination of the Republican Party in the 2016 US Presidential
    election. (New York Times)
  Sports:
  - 2016 Summer Olympics
  - Russia's track and field athletes will not be allowed to compete in the Rio Olympic
    Games, even if they did not fail drug tests, after an appeal to the Court of Arbitration
    for Sport is rejected. (BBC)
