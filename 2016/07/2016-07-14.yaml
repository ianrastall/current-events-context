Date: '2016-07-14'
Source_URI: Portal:Current events/2016 July 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Somalia
  - A suspected militant of Al-Shabaab shoots and kills four Kenyan police officers
    at a police station in Kapenguria, Kenya, where he was being held. The militant
    was later killed following a shootout with police. (Reuters)
  - 2016 Nice truck attack
  - A truck plows into a mass of revelers during the Bastille Day fireworks on the
    Promenade des Anglais in Nice, France, with a death toll as high as 80 and 100
    people injured. (Le Parisien) (Fox News)
  Arts and culture:
  - 68th Primetime Emmy Awards
  - 'The nominees are announced in Los Angeles. Game of Thrones, Veep and The People
    v. O. J. Simpson: American Crime Story lead in nominations. (Los Angeles Times)
    (The Washington Post)'
  International relations:
  - The French government calls on former European Commission chief José Manuel Barroso
    not to take a job with investment bank Goldman Sachs, after some EU politicians
    demanded Barroso be sanctioned for accepting the new position that raises questions
    about the EU's conflict of interest rules. (BBC)
  Law and crime:
  - United States Supreme Court Justice Ruth Bader Ginsburg apologizes for remarks
    she made earlier in the week to a number of news outlets criticizing presumptive
    Republican presidential nominee Donald Trump. (CNN)
  Politics and elections:
  - Formation of the May ministry
  - Elizabeth Truss is named Secretary of State for Justice and first ever female
    Lord Chancellor of the United Kingdom as former chancellor Michael Gove is ousted
    from the cabinet. (The Lawyer)
