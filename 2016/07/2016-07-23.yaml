Date: '2016-07-23'
Source_URI: Portal:Current events/2016 July 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2016 Munich shooting
  - Munich Police Chief Hubertus Andrae identifies the attacker as a dual national,
    18-year-old Iranian-German who apparently acted alone. He was found dead of a
    suspected self-inflicted gunshot wound to his head. (Reuters)
  - Chief Andrae reports there are "no indications" the teenage gunman, who killed
    nine people and apparently himself, had links to ISIL or any other terror group.
    The attack injured 27. (NBC News)
  - July 2016 Kabul bombing
  - Afghan officials report at least 80 people are killed and more than 230 injured
    as twin suicide blasts hit a large demonstration of the Shiite Hazara community
    over a power route line at Dehmazang Circle, Kabul, Afghanistan. The Islamic State
    claims responsibility. (Reuters) (News World India) (India Today) (Pakistan Today)
  - Afghan President Ashraf Ghani declares Sunday, 24 July 2016, a day of national
    mourning.(BBC)
  Arts and culture:
  - Rihanna has been announced to play the iconic role of Marion Crane from the 1960
    classic horror film Psycho for the final season of the American television series
    Bates Motel. (Rolling Stone) (CNN)
  - Wikileaks reveals that Ariana Grande was prevented from performing in the White
    House because of the July 2015 donut-licking incident. (Billboard)
  Disasters and accidents:
  - July 2016 North China cyclone
  - Floods kill at least 154 in China and 300,000 people are being evacuated in Hebei
    province. Villagers have accused local officials of covering up the extent of
    the damage. (AP via The Daily Mail)
  - Malaysia Airlines Flight 370
  - An article in New York magazine speculates that the pilot may have deliberately
    crashed the plane into the Southern Ocean. (New York magazine)
  - 2016 Pacific hurricane season
  - Hawaii Governor David Ige declares a state of emergency as Tropical Storm Darby
    is on track to reach the U.S. state's Big Island today with maximum sustained
    winds approaching 50 mph (80 kph). The storm, which previously was a Category
    3 hurricane, could produce up to 15 inches (40 cm) of rain. (Reuters) (NHC)
  - A bus from Wales carrying 50 people, including 41 teenagers, tips over in eastern
    France, injuring 13, two seriously. (Reuters)
  - A seventeen-square mile fire continues to burn in Santa Clarita, California, near
    Los Angeles. (ABC News)
  - 2016 Indian Air Force An-32 disappearance
  - The search intensifies for the Indian Air Force Antonov An-32 military transport
    with 29 people aboard that went missing over the Bay of Bengal shortly after its
    Friday morning takeoff from Tambaram. (UPI)
  International relations:
  - Philippines v. China
  - Cambodia and Laos cause discord at the Association of Southeast Asian Nations
    meeting after they block a joint statement by the group regarding the South China
    Sea. (Reuters), (The New York Times)
  Law and crime:
  - California governor Jerry Brown rejects a parole for Leslie van Houten, a cult
    follower of Charles Manson. (Fox News)
  - Indian External Affairs Minister Sushma Swaraj announces Indian charity worker
    Judith D'Souza (Aga Khan Foundation), who was kidnapped in Kabul, Afghanistan,
    on June 9, 2016, is free. (AP via The New York Times)
  Politics and elections:
  - 2016 Democratic National Committee email leak
  - Emails released by Wikileaks show that the Democratic National Committee (DNC),
    led by Debbie Wasserman Schultz, supported the candidacy of Hillary Clinton over
    Bernie Sanders. (ABC News), (The Washington Post), (CNN), (Al Jazeera)
  - Influential UC Berkeley professor Robert Reich calls on the DNC to fire Schultz.
    (Mediaite)
  - Jeff Weaver, the campaign manager of Bernie Sanders, says that someone, alluding
    to Debbie Wasserman Schultz, must be held accountable for the revelations in the
    leaks. (ABC News)
  - 2016 Zimbabwe protests
  - Robert Mugabe calls war veterans, who are calling for him to resign, traitors.
    (The Washington Post)
  - Turkish state of emergency
  - President Recep Tayyip Erdoğan's order under the state of emergency declared Wednesday
    after the failed military coup calls for closure of thousands of private schools,
    charities, and other institutions suspected of having links to Fethullah Gülen.
    (Reuters)
  Sport:
  - Russian balloonist Fyodor Konyukhov breaks the world record of American Steve
    Fossett for the fastest hot air balloon ride to circumnavigate the globe. (BBC)
