Date: '2016-07-30'
Source_URI: Portal:Current events/2016 July 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kurdish–Turkish conflict (1978–present)
  - The Turkish military kills 35 Kurdistan Workers' Party militants after they attempt
    to capture a base in Turkey's Hakkâri Province. (Reuters via ABC News Australia)
  - Boko Haram insurgency
  - Niger, following attacks by Boko Haram on Bosso and Yebi in the Lake Chad region,
    extends for three months a state of emergency in Diffa. (Reuters)
  Disasters and accidents:
  - 2016 Lockhart hot air balloon crash
  - At least 16 people are killed after a hot air balloon catches fire and crashes
    near Lockhart, Texas. (BBC)
  - 2016 California wildfires
  - The deadly, nine-day old Soberanes Fire, blazing south of Carmel-by-the-Sea, has
    destroyed 57 homes and is expected to grow to 170,000 acres (265 square miles)
    before it's done. It is 15 percent contained. Six major Big Sur State Parks remain
    closed through August 6. (Reuters) (Los Angeles Times)
  Politics and elections:
  - Tunisian lawmakers, dissatisfied with the lack of progress on a financial reforms
    package, vote (118-3) to dismiss Prime Minister Habib Essid from office. (Reuters)
  Sport:
  - In skydiving, American Luke Aikins sets a world record for jumping from a height
    of 25,000 feet (7,620 meters) without a parachute or wing suit. (NPR) (AP via
    CBS News) (BBC)
