Date: '2016-07-13'
Source_URI: Portal:Current events/2016 July 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War
  - A car bomb explodes at a checkpoint north of Baghdad, killing at least seven people.
    (Radio Free Europe/Radio Liberty)
  - Insurgency in Jammu and Kashmir
  - The death toll from anti-government protests in the Indian state rises to 36 with
    over a thousand more being treated for injuries. Chief Minister Mehbooba Mufti
    has called for calm. (BBC)
  - Syrian Civil War
  - Russian war planes allegedly bomb a refugee camp near the border with Jordan,
    killing at least eight people. (BBC)
  - According to the Syrian Observatory for Human Rights, airstrikes in the towns
    of Al-Rastan and Ariha kill at least 24 people, despite a temporary ceasefire
    being declared by the Syrian government. (Reuters)
  - South Sudanese Civil War
  - The United States deploys more than three dozen soldiers to Juba, South Sudan,
    to protect the U.S. embassy and help evacuate non-essential embassy staff due
    to local clashes. (UPI)
  Arts and culture:
  - Dr. Carla Hayden is confirmed to be the 14th Librarian of Congress, becoming the
    first woman and African-American to lead the Library of Congress.(Washington Post)
  Disasters and accidents:
  - A bus crashes on a highway in Dagestan, Russia, killing at least nine people and
    injuring dozens more. (Radio Free Europe/Radio Liberty)
  International relations:
  - North Korea–South Korea relations
  - South Korea announces plans to deploy a Terminal High Altitude Area Defense anti-ballistic
    missile system in Seongju County in the country's south in order to deter against
    a North Korean attack. (CNN)
  Law and crime:
  - In Brooklyn, New York 33 people are treated for a possible K2 overdose. The drug
    is illegal to sell or produce in the state. (New York Daily News)
  - 2016 Zimbabwe protests
  - A Zimbabwean court dismisses charges against opposition leader Pastor Evan Mawarire
    who was accused of trying to overthrow the government. (Reuters)
  - A serial killer who has murdered seven people over a period of several months
    is on the loose in Phoenix, Arizona. (NBC)
  Politics and elections:
  - Theresa May becomes the Prime Minister of the United Kingdom. (The Telegraph)
  - Formation of the May ministry
  - The new Prime Minister of the United Kingdom Theresa May begins forming her ministry
    following the end of the Second Cameron ministry. The former Mayor of London Boris
    Johnson is appointed Secretary of State for Foreign and Commonwealth Affairs,
    Philip Hammond is appointed as Chancellor of the Exchequer, Amber Rudd is appointed
    Home Secretary filling Theresa May's former position, Liam Fox is appointed as
    Secretary of State for International Trade and David Davis is appointed as minister
    for the newly created Secretary of State for Exiting the European Union. (BBC)
  - Emperor Akihito of Japan intends to abdicate within a few years, citing old age.
    It would be the first abdication of a Japanese emperor in 200 years; the last
    emperor to abdicate was Emperor Kōkaku in 1817. (BBC) (The Guardian)
  - Nauruan parliamentary election, 2016
  - Baron Waqa is reelected President of Nauru, winning 16 of the 18 votes in Parliament.
    (Radio New Zealand)
  - Human rights in Egypt
  - In a report by Amnesty International, the group documents findings of Egyptian
    officials forcibly making hundreds of people disappear and face torture in the
    past year in an attempt to crack down on dissent in the country. (BBC)
  Sport:
  - In American football, a United States appeals court has denied New England Patriots
    quarterback Tom Brady's appeal for his role in the Deflategate controversy. (ESPN)
