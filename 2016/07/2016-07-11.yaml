Date: '2016-07-11'
Source_URI: Portal:Current events/2016 July 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Somalia
  - At least 10 Somali Armed Forces soldiers and 12 Al-Shabaab militants are killed
    in fighting near the town of Afgooye, Lower Shabelle. (Al Jazeera)
  - Insurgency in Jammu and Kashmir
  - 2016 Kashmir unrest
  - At least 30 civilians have been killed by Indian Army soldiers as anti-government
    protests and violence spread across the state. (CNN-News18)
  - Syrian Civil War
  - Rebels in Aleppo launch an assault on government-controlled areas in the city.
    This comes after the Syrian Army blocked off the only road leading into opposition-controlled
    areas. According to state media, at least eight people have been killed and dozens
    more are wounded. (BBC)
  - Iraqi Civil War, Military intervention against ISIL
  - The United States announces it will be sending 560 more United States Armed Forces
    soldiers to Iraq to help fight against ISIL. (BBC)
  - Israeli–Palestinian conflict
  - Israeli forces level land east of Khan Yunis in the southern Gaza Strip. (Ma'an
    News)
  Arts and culture:
  - The 127 people who were massacred in the Srebrenica massacre in 1995 and were
    subsequently discovered in mass graves are buried at the Srebrenica Genocide Memorial
    following a funeral. For the first time, Bosnian Serbs were not welcome to attend
    the ceremony. (Reuters)
  Disasters and accidents:
  - Floods resulting from the annual monsoon season cause 22 deaths and make 100,000
    people homeless in India. (Reuters via Channel News Asia)
  - A Lockheed C-130 Hercules owned by the Portuguese Armed Forces catches fire while
    taking off from Montijo Air Base, killing at least three people. (Reuters)
  Law and crime:
  - St. Joseph courthouse shooting
  - At least three people die, including the shooter, in a shooting at the Berrien
    County courthouse in the U.S. state of Michigan. (Washington Examiner)
  Politics and elections:
  - 2016 Zimbabwe protests
  - Protest leader, Evan Mawarire, asks the international community to put pressure
    on the regime of Robert Mugabe. (The Guardian)
  - 2016 Conservative Party (UK) leadership election
  - Andrea Leadsom withdraws from the leadership election meaning that Theresa May
    will become the next leader of the Conservative Party and next Prime Minister
    of the United Kingdom. (The Guardian)
  - Prime Minister David Cameron announces he will step down on Wednesday, July 13.
    (BBC)
  - 2016 Labour Party (UK) leadership crisis
  - The former Shadow Leader of the House of Commons Angela Eagle formally announces
    her bid to become the new leader of the Labour Party after Jeremy Corbyn refused
    calls to resign. (ITV News)
  Sport:
  - The Ultimate Fighting Championship Mixed Martial Arts competition is sold to a
    consortium led by Hollywood talent agents WME-IMG. (AP)
  - In basketball, Tim Duncan, who played his entire 19-season NBA career with the
    San Antonio Spurs, where he won five NBA titles and two MVP awards, made 15 All-Star
    appearances and made the All-NBA first team 10 times, announces his retirement.
    (ESPN)
