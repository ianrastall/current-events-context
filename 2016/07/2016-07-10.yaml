Date: '2016-07-10'
Source_URI: Portal:Current events/2016 July 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - South Sudanese Civil War
  - An estimated 272 people have been killed between rival Sudan People's Liberation
    Army factions as clashes in the capital, Juba, continue. According to a spokesman
    for rebel leader and Vice President Riek Machar, South Sudan is "back to war"
    despite a peace deal being reached last April. (Al Jazeera) (BBC)
  - Hamza bin Laden, the son of the slain Osama bin Laden, threatens a genocide against
    the United States to retaliate for his father's killing. (News.com.au)
  Arts and culture:
  - An ancient Philistine cemetery has been unearthed in Israel. (BBC)
  International relations:
  - Foreign relations of the United States
  - The United Arab Emirates and Bahrain issue a travel warning for their citizens
    heading to American cities where protests are occurring following ethnic tensions
    in the country. This comes after The Bahamas issued its own travel warning yesterday,
    after the shooting of Dallas police officers. (Al Jazeera)
  Law and crime:
  - Kem Ley, a popular Cambodian political commentator and frequent critic of Prime
    Minister Hun Sen, is shot dead at a gas station in Phnom Penh. (Cambodia Daily)
  Politics and elections:
  - Japanese House of Councillors election, 2016
  - Voters in Japan go to the polls with the ruling Liberal Democratic Party and its
    Komeito partners looking for a two-thirds majority that will allow them to put
    forward a referendum to change the constitution. The governing parties won 70
    of the 121 seats. (AAP via SBS), (Bloomberg), (AP via Crossroads Today)
  - Australian federal election, 2016
  - The Leader of the Opposition, Bill Shorten, concedes defeat as continued counting
    in marginal seats indicates that the governing coalition of the Liberal Party
    and National Party will either win a narrow majority or be able to govern with
    the support of independents. Malcolm Turnbull will continue as Prime Minister
    of Australia and has claimed victory. (Reuters), (The Guardian)
  - Shooting of Alton Sterling and Shooting of Philando Castile
  - Protests continue in multiple cities across the United States following the death
    of two black men by police. Numerous confrontations and arrests have been reported.
    (Reuters)
  Sport:
  - 2016 Wimbledon Championships – Men's Singles
  - In tennis, Andy Murray of Scotland defeats Canadian Milos Raonic in the finals
    of the men's singles to win his second Wimbledon championship. It is the first
    time that a men's Wimbledon final has not featured Roger Federer, Rafael Nadal
    or Novak Djokovic since 2002. (Wimbledon official live updates)
  - UEFA Euro 2016 Final
  - In football, host nation France plays against Portugal for the 2016 UEFA European
    Championship at the Stade de France in Saint-Denis. Portugal wins 1–0 with an
    Éder goal in extra time. (UEFA official) (BBC), (ABC News Australia)
