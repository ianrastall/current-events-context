Date: '2016-07-24'
Source_URI: Portal:Current events/2016 July 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War, Military intervention against ISIL
  - At least 21 are killed and more than 35 people injured in a suicide attack at
    one of the residential entrances to district Kadhimiyah, in northern Baghdad,
    Iraq. ISIL claims responsibility, as published in its official media. (CNN) (Iraqi
    News)
  - 2016 Ansbach bombing
  - Fifteen people are injured following a suicide bombing in Ansbach, Germany. (BBC)
  - Syrian Civil War
  - Syrian opposition activists report government airstrikes on Aleppo Province kill
    at least five people and hit at least five medical facilities. (AP via The New
    York Times)
  Arts and culture:
  - Thousands of people in Cambodia attend the funeral of Kem Ley, a critic of the
    perceived corrupt and authoritarian rule of Hun Sen, who has been in power since
    1985. (Australian Broadcasting Corporation), (Fox News), (ABC News)
  Disasters and accidents:
  - 2016 California wildfires
  - A dead body is found in the area of the Sand Fire near Santa Clarita that has
    doubled in size to more than 22,000 acres. Officials order mandatory evacuations
    for 1,500 homes in Little Tujunga, Sand, and Placerita canyons. The South Coast
    Air Quality Management District issues an alert for unhealthy air quality in affected
    areas. (NBC News) (Los Angeles Times)
  - The death toll from the two-mile high Mount Sinabung ash eruption Saturday has
    risen to seven, with two others in critical condition. All victims were working
    farms in the village of Gamber in the Karo Regency of North Sumatra, within the
    volcano's "red zone" that Indonesian authorities have declared off-limits. (Weather
    Channel) (Bangkok Post)
  Health:
  - 2016 Summer Olympics
  - The leader of the Australian delegation says the country's athletes would not
    be checking in at the athletes' village because it's unsafe for human habitation.
    Australian athletes have been staying at nearby Rio de Janeiro hotels. (The New
    York Times)
  International relations:
  - Philippines v. China
  - Cambodia continues to block consensus in the Association of Southeast Asian Nations
    meeting. The country has political and economical dependencies with China. (BBC)
  Law and crime:
  - A machete attack in the German city of Reutlingen by a Syrian asylum-seeker leaves
    one woman dead and two others injured. (BBC)
  Politics and elections:
  - 2016 Democratic National Convention
  - Debbie Wasserman Schultz resigns from her position as Chairperson of the Democratic
    National Committee. Wasserman Schultz had reportedly been removed from a speaking
    role after a WikiLeaks email leak proved her implicit support of Hillary Clinton's
    campaign during the primaries. Her resignation will take effect upon the close
    of the convention. Donna Brazile will serve as interim chair. (Reuters) (The Washington
    Post) (CNN) (Fox News)
  - Nepal's Prime Minister Khadga Prasad Oli resigns minutes before parliament was
    to vote on a no confidence motion he was likely to lose, after allies of his multi-party
    coalition leave the government accusing him of not honoring power sharing deals
    that helped him assume office in October 2015. (The Hindu) (Reuters)
  - 2016 Turkish coup d'état attempt
  - In an unusual show of unity, tens of thousands of supporters of Turkey's ruling
    party and the country's main opposition parties hold a cross-party "Republic and
    Democracy" rally in support of democracy in Istanbul's central Taksim Square.
    (Reuters)
  Sport:
  - 2016 Summer Olympics
  - The International Olympic Committee states it considers all Russian athletes tainted
    by the country’s state-run doping scheme but individual athletes can compete in
    2016 Games if they are able to convince individual sports federations of their
    innocence. A daunting task for these organizations to handle hundreds of appeals
    just 12 days before the start of the Rio Games on 5 August. (The New York Times)
    (AP & NBC News) (rt.com)
