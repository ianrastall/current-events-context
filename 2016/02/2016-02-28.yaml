Date: '2016-02-28'
Source_URI: Portal:Current events/2016 February 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Two police officers are killed after a bomb explodes in Helmand Province. (Khaama
    Province)
  - Iraqi Civil War (2014–2017)
  - Two suicide bombers kill 70 people and injure more than 100 others at a crowded
    market in Sadr City, Iraq. ISIL claims responsibility for the attack. (Reuters)
    (RT)
  - Somali Civil War (2009–present)
  - Two al-Shabaab suicide bombers kill at least 40 people in the Somali town of Baidoa.
    (CNN) (Reuters) (Reuters via Daily Mail)
  Arts and culture:
  - The 88th Academy Awards are held at the Dolby Theatre in Hollywood, California.
    (US Weekly)
  - Mexican director Alejandro González Iñárritu wins the Academy Award for Best Director
    for The Revenant. (USA Today)
  - Brie Larson wins the Academy Award for Best Actress for her role in Room. (Entertainment
    Weekly)
  - Leonardo DiCaprio wins the Academy Award for Best Actor for his role in The Revenant.
    (ABC Online Australia)
  - Spotlight wins the Academy Award for Best Picture. (The Verge)
  Disasters and accidents:
  - Vorkuta mine explosion
  - Thirty-six people are believed to have died at a coal mine where a methane gas
    ignition triggered three explosions and the collapse of the mine in Vorkuta, Russia.
    (NDTV)
  Law and crime:
  - 2016 Thane stabbing
  - A man fatally stabs 14 family members before taking his own life in the Indian
    city of Thane. (India Today)
  - A Virginia police officer is killed during her first day on the job (and another
    two are wounded) in a domestic related shooting in Lake Ridge, Virginia. (CNN)
  - Royal Commission into Institutional Responses to Child Sexual Abuse
  - Cardinal George Pell, the third most senior person in the Roman Catholic Church,
    gives evidence to the Royal Commission in Rome dealing with his time as a priest
    in the Australian cities of Ballarat and Melbourne. (News Limited)
  Politics and elections:
  - South Korean opposition lawmakers' anti-terrorism bill filibuster, which stops
    all other legislative business, extends its world record to 115 hours Sunday afternoon,
    easily besting Canada's 58-hour session in 2011. The major issue is giving South
    Korea's intelligence agency powers to monitor private communications. This parliamentary
    session is set to end March 11, with elections on April 13. (Reuters)
  - Swiss referendums, 2016
  - Swiss citizens vote on four referenda, including one, proposed by the right-wing
    Swiss People's Party, that would automatically expel foreigners who commit two
    minor crimes. Current law calls for deportation of non-citizens convicted of murder
    or sexual violence. (BBC) (AFP via The Guardian)
  - 2016 United States presidential election
  - Tulsi Gabbard resigns as vice-chair of the Democratic National Committee and endorses
    Vermont Senator Bernie Sanders. (Reuters)
  Sport:
  - 2016 Football League Cup Final
  - Manchester City beat Liverpool 3-1 on penalties at Wembley Stadium to win the
    2015–16 Football League Cup. (Mirror)
