Date: '2016-02-07'
Source_URI: Portal:Current events/2016 February 7
Intelligence_Payload:
  Disasters and accidents:
  - 2016 Taiwan earthquake
  - The death toll from yesterday's earthquake in Taiwan rises to at least 29, with
    at least 120 trapped under collapsed buildings in Tainan, while 198 people have
    been rescued. (AP) (Taipei Times)
  - A man is killed and three other employees are injured following a suspected meteorite
    strike in a garden outside the Bharathidasan Engineering College in Tamil Nadu,
    India. Witnesses say they saw a mysterious object fall from the sky. If confirmed,
    this would be the first recorded fatality from a meteorite strike. (Metro) (The
    Indian Express)
  - One person is killed and six others injured in an explosion at JCG Farms, an American
    feed mill near Atlanta, Georgia. (AP)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea launches a long range rocket that critics claim is a test of banned
    technology for a long range missile that could hit the United States. South Korea's
    military says the rocket released an object into orbit. (AP via Washington Post)
    (CNN) (Reuters)
  - Japan's NHK news reports the rocket passed over the southern Japanese island of
    Okinawa. Japanese Prime Minister, Shinzō Abe, condemns the launch and says, "We
    absolutely cannot allow this. We will take action to totally protect the safety
    and well-being of our people". The Japanese government says no rocket debris fell
    on Japanese territory and there are no reports of damage. The rocket reportedly
    falls into waters southwest of Jeju Island. (ABC News) (Yonhap)
  - South Korea's intelligence agency claims that North Korea is preparing for another
    nuclear test. (Yonhap)
  - The United Nations Security Council condemns North Korea's long-range missile
    launch, a violation of numerous U.N. resolutions. (CNN) (USA Today)
  - Syrian Civil War, Foreign involvement in the Syrian Civil War
  - The United Arab Emirates (UAE) says it is ready to deploy ground troops to Syria
    as part of an international coalition to fight against the Islamic State of Iraq
    and the Levant, if said coalition was led by the United States. (Al Jazeera)
  Law and crime:
  - Two people are killed and ten others are injured in a shooting outside an Orlando,
    Florida nightclub. (Click Orlando)
  - One person is killed and seven others are injured in a shooting outside a Rochester,
    New York sports bar. (ABC News)
  - Hamas reports it has executed one of its commanders, Mahmoud Eshtewi, for “moral
    and behavioral violations.” Human Rights Watch, contacted by Eshtewi’s family,
    had been monitoring the case. (AP via The Washington Post)
  Politics and elections:
  - Politicians in Haiti agree to a process to select an interim President to replace
    Michel Martelly. Presidential elections will be held on April 14 with the winner
    to be sworn in on 14 May. (BBC)
  - Haiti delays Carnival celebrations over concern that anti-government protests
    might turn violent. (Reuters) (The Guardian)
  - The Parliament of Algeria considers a new constitution imposing term limits for
    the President and recognising Amazigh as an official language. (AP)
  Sport:
  - In American football, the Denver Broncos defeat the Carolina Panthers 24–10 in
    Super Bowl 50. Broncos outside linebacker Von Miller is named as the game's Most
    Valuable Player. (BBC) (ESPN)
