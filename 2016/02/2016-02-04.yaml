Date: '2016-02-04'
Source_URI: Portal:Current events/2016 February 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - A drone strike in Yemen's Shabwah Governorate kills six suspected Al-Qaeda in
    the Arabian Peninsula militants. (Jerusalem Post)
  - Russian intervention in the Syrian Civil War, Battle of Aleppo (2012–present)
  - The Syrian Observatory for Human Rights reports Russian airstrikes on several
    rebel-held neighborhoods in the city of Aleppo, kills at least 21 civilians. (AFP
    via Yahoo!)
  - Russia's Ministry of Defence accuses Turkey of preparing a military incursion
    into northern Syria, saying it had registered "a growing number of signs of hidden
    preparation of the Turkish Armed Forces for active actions on the territory of
    Syria". Tens of thousands of Turkish troops are active on the border of Syria
    involved in fighting the Kurdistan Workers' Party (PKK). (Reuters)
  Business and economy:
  - The U.S. President Barack Obama announces a plan to tax crude oil $10 a barrel
    in order to fund infrastructure spending, according to a White House statement.
    (Reuters)
  Health:
  - Zika virus outbreak
  - The Polynesian state of Tonga declares a Zika virus epidemic with two confirmed
    cases and 265 suspected cases. (Radio New Zealand)
  - A pregnant woman is reported with the Zika virus in Spain - the first case in
    Europe. (BBC)
  International relations:
  - Julian Assange
  - The UN Working Group on Arbitrary Detention rules that Julian Assange is being
    arbitrarily detained. (BBC) (Reuters) (The Guardian)
  - Trans-Pacific Partnership
  - Twelve nations, including the United States, sign the deal at SkyCity Auckland
    in Auckland, New Zealand. (BBC) (UPI)
  - European migrant crisis
  - The President of Finland, Sauli Niinistö, in an address to the Finnish parliament
    (Eduskunta), says the current flow of migrants into Europe threatens the continent's
    Western values and that the UN's Convention relating to the Status of Refugees
    is outdated, saying "All estimates predict that the flow of people will increase
    this year. This is challenging the ability of Western democracies to help and
    also challenging the very structures underlying the idea of Europe". (Yle News)
  Law and crime:
  - The People's Republic of China charges Zhao Liping, former Police Chief for Inner
    Mongolia with murder, bribery and possession of fire arms and explosives. (Reuters)
  - The suspect in the murder investigation of former Deputy Prime Minister of the
    Netherlands Els Borst admits to have assassinated her citing political motivations.
    (NOS) (RTL Nieuws)
  - Five adults and one child are found stabbed to death in the Chicago neighborhood
    of Gage Park in the U.S. (Chicago Tribune)
  - Terrorism in Germany
  - German police arrest two Algerian men suspected of having links to the Islamic
    State of Iraq and the Levant and planning terror attacks in the country. One of
    the men detained, reported to be aged 35, had been living in a refugee shelter
    in the town of Attendorn, east of Cologne. Police say "investigations show that
    he has been trained militarily in Syria". (BBC)
  Politics:
  - Tamil national anthem
  - Sri Lanka lifts unofficial ban on Tamil national anthem on independence day. (New
    York Times) (Indian Express)
