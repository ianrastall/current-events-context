Date: '2016-02-27'
Source_URI: Portal:Current events/2016 February 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - A truce is in effect, as of midnight. Russian Air Force attacks on opposition
    positions were reported to have been intensified before the truce took effect.
    (BBC)
  - War in Afghanistan (2001–2021)
  - A suicide bomber kills at least 26 and injures nearly 50 in Afghanistan's eastern
    Kunar Province near the border with Pakistan. (AAP via News Limited) (The New
    York Times)
  - Yemeni Civil War (2015–present)
  - Saudi Arabian-led intervention in Yemen
  - At least 30 people are killed in an airstrike on a market near the Yemeni capital
    Sana'a. (BBC)
  Law and crime:
  - Three people are stabbed, including one person critically wounded, and several
    people are arrested after a Ku Klux Klan (KKK) rally in Anaheim, California turns
    violent. (Los Angeles Times)
  Politics and elections:
  - 2016 United States presidential election
  - Voters in South Carolina go to the polls for the Democratic Party primary. Hillary
    Clinton won. (ABC) (AL.com) (The Guardian)
  - Irish general election, 2016
  - Counting begins of the votes cast yesterday with exit polls indicating that the
    existing coalition will not gain enough votes to govern without reaching a deal
    with other parties. (BBC)
  - Elections in Iran
  - Counting of votes begins in Iran after polling hours in yesterday's election were
    extended by six hours due to a heavy turnout. Reports indicate that reformist
    candidates are doing well in the early count. (Reuters via Swiss info) (AP)
  - Preliminary results shows that Pervasive Coalition of Reformists has won a majority
    in Tehran district and some other big cities, as Principlists Coalition won seats
    in smaller cities. (Reuters)
  - Early Assembly of Experts results show that Principlists won the majority, as
    Reformists won 14 out of 16 seats in Tehran, although some of them also had the
    support of conservatives. (Reuters via Yahoo!)
  - Thousands, including some from Australia, protest in London, England, against
    the renewal of the United Kingdom's Trident nuclear deterrent system, the largest
    anti-nuclear rally since 1983. Leader of the Labour Party Jeremy Corbyn, Scottish
    National Party leader and First Minister of Scotland Nicola Sturgeon, the Welsh
    Plaid Cymru Party, and the Green Party participated in the march. A parliamentary
    vote on renewing Trident is expected this year. (International Business Times)
    (The Guardian)
  - A large rally, with estimated counts ranging from 7,500 to 100,000, honors former
    deputy prime minister and opposition leader Boris Nemtsov on the first anniversary
    of his assassination near the Kremlin. (Reuters)
