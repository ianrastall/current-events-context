Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021), Military intervention against ISIL
  - U.S. airstrikes in eastern Afghanistan hit an ISIS radio station and kill 29 militants.
    (CNN)
  Arts and culture:
  - In the United States, Punxsutawney Phil does not see his shadow which according
    to tradition signals an early spring. (CNN)
  Business and economics:
  - Negotiators for the European Commission and the United States agree on a pact
    protecting data transfers across the North Atlantic by companies such as Google
    and Amazon, imposing on such companies certain privacy shield obligations. (Reuters)
  Health:
  - Zika virus outbreak in the Americas (2015–present)
  - The Government of Honduras declares a state of emergency with 3,649 suspected
    cases of the Zika virus in the past three months. (AP via Journal Sentinel)
  Politics and elections:
  - Martin O'Malley is suspending Presidential Campaign after Iowa Vote. (The Atlantic)
