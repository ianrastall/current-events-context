Date: '2016-02-29'
Source_URI: Portal:Current events/2016 February 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - At least 40 people are killed and 58 others injured following a suicide bombing
    at a Shi'ite funeral in the city of Miqdadiyah, Diyala Governorate. ISIL claim
    responsibility for the attack. (Reuters)
  Business and economy:
  - China says it expects to lay off 1.8 million state workers in the coal and steel
    sectors, or about 15 percent of the industries' workforce, as part of efforts
    to reduce industrial overcapacity. (Reuters)
  Disasters and accidents:
  - One person has died and hundreds of people have been evacuated after heavy rain
    in the Indonesian capital Jakarta. (Jakarta Post)
  International relations:
  - European migrant crisis
  - Macedonian police use tear gas after hundreds of migrants frustrated with long
    delays broke a gate on the border with Greece and temporarily cross the border.
    (Press Association via Irish Independent)
  - Immigration Minister John McCallum says Canada has reached its target of resettling
    25,000 Syrian refugees under its program started in November 2015. (Time)
  Law and crime:
  - Pakistani authorities hang Mumtaz Qadri for his role in the murder of reformist
    Punjab governor Salmaan Taseer in 2011. (Radio Free Europe/Radio Liberty)
  - Calais migrant crisis
  - Clashes break out inside the Calais jungle camp in the port city of Calais between
    migrants and riot police as officials attempted to evict hundreds of migrants
    from the southern section of the camp. Several tents and wooden shacks were set
    on fire by migrants. (The Telegraph)
  - In the United States, a 14-year-old shoots two students, who were hospitalized
    in stable condition, in the Madison Local School cafeteria. Two other teenagers
    are injured, none seriously. The southwestern Ohio school, which had practiced
    for such an event, immediately went into lockdown; Tuesday classes are cancelled.
    (AP via The Citizen) (UPI) (School website)
  Politics and elections:
  - Former Prime Minister of Malaysia Mahathir Mohamad quits the ruling United Malays
    National Organisation due to concerns over "corruption" under current PM Najib
    Razak. (Reuters via The Age)
  - Hillary Clinton email controversy
  - The United States Department of State releases the final batch of emails recovered
    from the private server of former Secretary of State and Democratic Party front
    runner in the race for the nomination for the 2016 presidential election. (NBC
    News)
