Date: '2016-02-21'
Source_URI: Portal:Current events/2016 February 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - February 2016 Homs bombings
  - Twin bomb blasts hit the Syrian city of Homs with at least 57 people reportedly
    killed and more than 100 injured. The Islamic State of Iraq and the Levant claims
    responsibility. (Reuters) (AFP via Daily Mail) (BBC)
  - February 2016 Sayyidah Zaynab bombings
  - At least 83 people are killed and 178 injured in a series of bombings in the Damascus
    suburb Sayyidah Zaynab, Rif Dimashq Governorate. ISIL again claims responsibility.
    (AFP via Yahoo! News) (CNN)
  - Second Libyan Civil War
  - The Libyan National Army says it has taken control of the town of Ajdabiya and
    several areas of Benghazi following heavy clashes with Islamist militant groups.
    (Reuters)
  - 2016 Pampore stand-off
  - A group of Islamic terrorists exchange fire with Indian Armed Forces troops for
    the second consecutive day in Pampore, Jammu and Kashmir, India. At least five
    soldiers and one civilian have been killed. (ABC News) (UPI)
  - A Hindu priest is hacked to death and two devotees, who tried to intercede, are
    wounded in a temple in the Panchagarh District in northern Bangladesh. The Islamic
    State of Iraq and the Levant claims responsibility. (BBC) (AP)
  Disasters and accidents:
  - 2015–16 South Pacific cyclone season
  - Cyclone Winston
  - At least five people are reported dead and entire villages have been flattened
    after Cyclone Winston hits Fiji. (New Zealand Herald)
  International relations:
  - European migrant crisis
  - Greece claims that Macedonia has closed its borders to migrants from Afghanistan.
    (AP via New York Times)
  - Insurgency in the Maghreb (2002–present)
  - Germany is considering sending troops to Tunisia to help train the Tunisian Army
    in the fight against Islamist militants, particularly ISIL who control territory
    in neighboring Libya. (France 24)
  - Syrian Civil War peace process
  - U.S. Secretary of State John Kerry says a tentative ceasefire agreement reached
    with Russian Foreign Minister Sergey Lavrov is now being presented to the opposing
    forces. (CBS News) (Reuters via The Australian Financial Review)
  - Japan–United States relations
  - Thousands protest outside the Japanese parliament in Tokyo against the relocation
    of a U.S. military base on Okinawa Island. Residents cite noise, pollution, and
    crime as reasons for not wanting a new base built. (Reuters)
  Law and crime:
  - 2016 Kalamazoo shootings
  - Kalamazoo County, Michigan, authorities say last evening's shooting spree resulted
    in six deaths with two others seriously wounded. Each victim was shot multiple
    times. Police acknowledge that an earlier report that a 14-year-old girl died
    is incorrect; she is alive, but "severely, gravely" injured. The suspect, a 45-year-old
    man who is an Uber driver without a prior criminal record, was taken into custody
    without a struggle. (USA Today) (CNN)
  - Terrorism in Malaysia
  - Australia issues a security alert, warning that terrorists may be planning attacks
    in and around the Malaysian capital Kuala Lumpur. It also recommended that Australians
    avoid travel to the coastal region of eastern Sabah, where the beaches and islands
    are popular with foreign tourists. (Reuters via Daily Mail)
  - Pope Francis calls for a worldwide ban on the death penalty and urges Christian
    leaders to work to stop executions as part of the church's Holy Year of Mercy.
    (UPI)
  Politics and elections:
  - 2016 Comorian presidential election
  - Voters in Comoros go to the polls for a presidential election with 25 candidates
    standing. (Mail and Guardian)
  - 2016 Nigerien general election
  - Voters in Niger go to the polls for a general election. (France 24)
  - North Korean state media confirms that Ri Myong-su is the new chief of the General
    Staff Department of the Korean People's Army replacing Ri Yong-gil who was executed.
    (AFP via Yahoo! News)
  - 2016 United Kingdom European Union membership referendum
  - In what is seen as a major boost for the "Vote Leave" campaign, Mayor of London
    Boris Johnson announces he will be campaigning for the United Kingdom to leave
    the European Union. (Sky News)
  - Ashraf Rifi resigns as the Minister for Justice for Lebanon in protest at Hezbollah
    domination of the government which he claims is harming relations with Arab nations.
    (AP)
  - 2016 Macedonian parliamentary election
  - The European Union and the United States advise interim Macedonian Prime Minister
    Emil Dimitriev to postpone elections scheduled for April 24, 2016. (Balkan Insight)
  - 2016 Bolivian constitutional referendum
  - According to exit polls, Bolivian voters reject a constitutional amendment that
    would have permitted President Evo Morales to stand for a fourth term in office.
    His current term expires in 2020. (BBC)
  - 2016 Philippine presidential election
  - The debate series PiliPinas Debates 2016 kicks off in Cagayan de Oro. (Nikkei
    Asian Review)
  Sports:
  - Denny Hamlin wins the 2016 Daytona 500 by 0.011 seconds, the closest margin in
    the history of the race, and the 13th-closest in NASCAR Sprint Cup Series history.
    (Yahoo! News)
