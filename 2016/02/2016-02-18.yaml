Date: '2016-02-18'
Source_URI: Portal:Current events/2016 February 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kurdish–Turkish conflict
  - February 2016 Diyarbakır bombing
  - A roadside bomb hits a military convoy, killing six Turkish Army soldiers in the
    southeast Diyarbakır Province. (ABC News) (Reuters)
  - Turkish Air Force jets bomb Kurdistan Workers' Party (PKK) bases in Iraqi Kurdistan
    just hours after Turkish President Recep Tayyip Erdoğan blamed Kurdish militants
    for the 2016 Ankara bombing. (Haaretz)
  - Ethnic violence in South Sudan
  - Fighting occurs between Shilluk and Dinka youths at a United Nations peacekeeping
    compound in the city of Malakal which lasts around three hours. Médecins Sans
    Frontières reports at least 18 people are killed, including two MSF South Sudanese
    staff members, and dozens injured. (Reuters) (Trend News Agency)
  - Syrian Civil War
  - The Syrian Army, backed by the Russian Air Force, says it has captured the town
    of Kinsabba in the northwest Latakia Governorate. (Reuters)
  Business and economy:
  - Venezuela, facing an economic crisis, raises the price of gasoline for the first
    time in 20 years. (BBC)
  Disasters and accidents:
  - At least 71 people are killed in a head-on collision between a bus and a truck
    in Ghana. (Sky News) (BBC)
  Health:
  - Zika virus outbreak
  - Pope Francis indicates that contraceptives could be allowed, as the "lesser of
    two evils" vis-à-vis the sin of abortion, in addressing the life-threatening problem
    the Zika virus presents. He noted that Pope Paul VI, "in a difficult situation
    in Africa, permitted nuns to use contraceptives in cases of rape". (CNN) (The
    Washington Post) (AP) (Katholiek Nieuwsblad) (Patheos)
  International relations:
  - North Korea–South Korea relations
  - South Korea's National Intelligence Service warns that North Korea is currently
    planning a "terrorist attack" on South Korea, saying Kim Jong-un himself gave
    the order to North Korea's State Security Department to make preparations for
    attacks. The NIS warning covered a large number of possible targets, including
    "subways, shopping malls, exhibition centers, power plants" as well as possible
    cyber attacks. (CNN)
  - Cuba–United States relations
  - The President of the United States Barack Obama announces that he will visit Cuba
    next month becoming the first American president to visit Cuba since 1928. (Yahoo!)
  Law and crime:
  - Xenophobic mob blocks a refugee bus in Clausnitz, German state of Saxony. (Deutsche
    Welle) (Deutsche Welle²) (Deutsche Welle³) (The New York Times) (The New York
    Times²)
  Politics and elections:
  - Philippine Senate election, 2016
  - Nike, Inc. drops Manny Pacquiao as an endorser after his remarks about LGBT people.
    (BBC) (Forbes)
  - Ugandan general election, 2016
  - Voters in Uganda go to the polls for a general election to elect a new President
    of Uganda as well as for parliamentary and local elections. The Presidential race
    with eight candidates including incumbent Yoweri Museveni and seven challengers
    is tipped to be the closest in the nation's history. (BBC)
  - The government shuts down social media at the request of the electoral commission
    which says it is a security matter. Many Ugandans access Twitter and Facebook
    via a Virtual private network (VPN) which masks a user's location. (Daily Times)
    (Quartz)
  - Kizza Besigye, the main opposition presidential candidate, is "briefly" arrested
    after the polls close in Naguru, trying to get into a police command center in
    the capital Kampala. Besigye, who's challenged President Musveni in the last three
    elections, has been repeatedly arrested, roughed up, or confined to house arrest
    during that time. (AP via Sky News Australia) (The Globe and Mail) (The New York
    Times)
  - Łukasz Kamiński, head of the Institute of National Remembrance says a newly found
    document, seized this week from the house of Poland's last communist-era interior
    minister, Czesław Kiszczak, suggests that former Polish President Lech Wałęsa
    was an informant for the Polish People's Republic's secret security service during
    the 1970–76 period. (NBC News) (BBC)
