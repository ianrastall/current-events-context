Date: '2022-10-15'
Source_URI: Portal:Current events/2022 October 15
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Soloti military training ground shooting
  - At least 11 people are killed and 15 others injured after two shooters open fire
    on a group of volunteers at a Russian military training ground in Belgorod Oblast,
    near the border with Ukraine. (Reuters)
  - Mahsa Amini protests
  - Evin Prison fire
  - Gunfire breaks out amid a fire at the Evin Prison in Tehran, Iran, resulting in
    the death of eight inmates and the wounding of 61 more. (BBC News)
  - Sudanese nomadic conflicts
  - Five people are killed and nine others are injured in tribal clashes in West Kordofan,
    Sudan. (Reuters)
  - Mexican drug war
  - Twelve people are killed and three are injured in a mass shooting at a bar in
    Irapuato, Guanajuato, Mexico. (Reuters)
  - Twenty people are killed and 14 others are injured after a bus flips over while
    travelling between Pasto and Popayan, Colombia. (Reuters)
  - Two people are killed by flash flooding in Agia Pelagia, Heraklion, Crete, Greece.
    (Reuters)
  - Namibia reports an outbreak of foot-and-mouth disease in the northeastern region
    of Zambezi. (Xinhua)
