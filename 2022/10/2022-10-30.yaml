Date: '2022-10-30'
Source_URI: Portal:Current events/2022 October 30
Intelligence_Payload:
  Uncategorized:
  - Kivu conflict
  - M23 offensive
  - M23 rebels capture the towns of Kiwanja and Rutshuru in North Kivu, Democratic
    Republic of the Congo. In response, the Congolese government expels Rwanda's ambassador,
    accusing the country of supporting the rebels. (Al Jazeera)
  - Israeli–Palestinian conflict
  - Five Israeli soldiers are injured during a vehicle-ramming attack at a checkpoint
    in Jericho, in the occupied West Bank. The perpetrator is shot dead by police.
    (Haaretz)
  - 2022 Morbi bridge collapse
  - At least 141 people are killed in a collapse of a bridge over the Machchhu River
    in Morbi, Gujarat, India. More than 80 people have been rescued. (The Hindu) (BBC
    News)
  - Eleven people are killed during a crowd crush at a Fally Ipupa concert at the
    Stade des Martyrs in Kinshasa, Democratic Republic of the Congo. (Reuters)
  - Russia–United Kingdom relations
  - Russia announces sanctions on eleven British Overseas Territories, accusing them
    of "unfriendly actions" against Moscow. With these sanctions, the United Kingdom
    and all 14 British Overseas Territories are now on Russia's list of sanctioned
    territories. (Anadolu Agency)
  - Dover firebomb attack
  - A man throws firebombs at a centre for processing asylum seekers in Dover, Kent,
    UK, injuring two people before killing himself. (TheJournal.ie)
  - Crime in London
  - Two people are shot and killed in Brixton, London, while a bystander was knocked
    down and injured by the gunman's vehicle. No arrests have been made. (BBC News)
  - 2022 Brazilian general election
  - Luiz Inácio Lula da Silva narrowly wins election to Brazil's presidency with 50.9%
    of the vote, defeating incumbent Jair Bolsonaro in the second-round run-off. (Time)
    (Sky News)
