Date: '2022-10-14'
Source_URI: Portal:Current events/2022 October 14
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Two people are killed and five others are injured in an exchange of fire between
    Israeli soldiers and Palestinian militants in Jenin, West Bank, following a raid
    conducted by the former. The Israeli soldiers aimed to capture a Hamas operative
    suspected of involvement in recent shootings; he was subsequently detained and
    taken into custody. (Al Jazeera) (Ynetnews)
  - Insurgency in Balochistan
  - Three people are killed and six others are injured by a roadside bomb near a convoy
    carrying the relatives of a man who was killed yesterday in Mastung, Balochistan,
    Pakistan. (AP)
  - Bartın mine explosion
  - Forty-one people are killed and eleven more are injured by an explosion at a coal
    mine in Amasra, Bartın Province, Turkey. (BBC News)
  - Aydin Coban, a 44-year old Dutch man convicted of sexually extorting British Columbian
    teenager Amanda Todd, is sentenced to 13 years in prison. (CBC)
  - Premiership of Liz Truss
  - Kwasi Kwarteng is dismissed by Liz Truss as Chancellor of the Exchequer following
    the market turbulence after the announcement of his September 2022 United Kingdom
    mini-budget. (Financial Times)
