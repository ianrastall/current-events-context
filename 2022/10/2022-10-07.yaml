Date: '2022-10-07'
Source_URI: Portal:Current events/2022 October 7
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - During three separate attacks , a 14-year-old Palestinian boy is killed by Israeli
    soldiers in a village near Ramallah, in the West Bank, while a 17-year-old Palestinian
    boy is killed and his mother wounded when Israeli soldiers open fire at residents
    during confrontations with Israeli settlers.In al-Mazra’a al-Gharbiyah, witnesses
    said Israeli soldiers opened fire at the residents during confrontations with
    Israeli settlers, killing a 17-year-old Palestinian and wounding another. (Al
    Jazeera)
  - Communist rebellion in the Philippines
  - Two soldiers are killed and three civilians are injured when five drug gangs open
    fire during a attack on a senator's convoy in clashes with airstrikes, prison
    riots, mass shooting, and mass stabbing between the military and the New People's
    Army in Eastern Samar, Philippines. (Xinhua)
  - Somali Civil War
  - The Somali Armed Forces kill 19 al-Shabaab militants in Bal'ad, Middle Shabelle,
    in a repelled attack amid ongoing operations against the jihadist group. (allAfrica)
  - Seven soldiers are killed and four injured during an attack at an army base in
    Garabtisan, Djibouti, by Armed FRUD gunmen. Both the attackers are killed. (Al
    Jazeera)
  - 2022 Nobel Peace Prize
  - Belarusian activist Ales Bialiatski, the Russian human rights society Memorial
    and the Ukrainian human rights organization The Center for Civil Liberties are
    awarded the Nobel Peace Prize. (DW)
  - Eurovision Song Contest 2023
  - Liverpool is selected as the host city of next year's Eurovision Song Contest.
    (BBC News)
  - Creeslough explosion
  - Ten people are killed, eight others are injured, and others remain trapped under
    rubble after an explosion at an Applegreen petrol station in the village of Creeslough,
    County Donegal, Ireland. (BBC News)
  - Mahsa Amini protests
  - Canada–Iran relations
  - The Canadian government permanently bans 10,000 IRGC members from Canada. (Iranintl)
    (CTV News)
  - Denmark–Iran relations
  - An armed intruder damages several vehicles in the parking lot of the Iranian embassy
    in Copenhagen, Denmark. Iranian Foreign Minister Hossein Amir-Abdollahian criticizes
    the Danish police for not providing adequate protection for the embassy. (Tasnim)
    (Bloomberg)
  - 2022 Lesotho general election
  - Citizens in Lesotho head to the polls to elect the 120 members of the National
    Assembly. (Reuters)
