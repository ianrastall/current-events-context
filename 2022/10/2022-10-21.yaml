Date: '2022-10-21'
Source_URI: Portal:Current events/2022 October 21
Intelligence_Payload:
  Uncategorized:
  - Six people are killed in an apartment block fire in Hartland, Wisconsin, United
    States. Local police say that an "active criminal investigation" is underway.
    (ABC News)
  - At least seven people are killed and four others are injured in a road accident
    in Lima, Peru. (Xinhua)
  - Mexico reports its first case of the highly pathogenic H5N1 virus in a wild, non-poultry
    bird in Metepec, State of Mexico. (Reuters)
  - Argentina–Venezuela relations
  - The last five members of an Iranian cargo plane with Venezuelan crew arrive in
    Caracas after four months in Argentine custody, where a court seized the plane
    on suspicions of terrorism at the request of a US court. (Reuters)
  - Aftermath of the 2022 Pakistani constitutional crisis
  - The Election Commission of Pakistan bans former prime minister Imran Khan from
    seeking an elected office in the government for five years, citing Khan's deceit
    in declaring some of the gifts that he received from foreign dignitaries during
    his premiership. (France 24)
  - 2022 British Columbia New Democratic Party leadership election
  - David Eby is acclaimed as the leader of the British Columbia New Democratic Party
    and becomes the next Premier of British Columbia following the disqualification
    of his sole opponent, climate activist Anjali Appadurai. (Reuters)
