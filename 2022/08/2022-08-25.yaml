Date: '2022-08-25'
Source_URI: Portal:Current events/2022 August 25
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine campaign
  - Ukraine says that the Zaporizhzhia Nuclear Power Plant has been completely disconnected
    from its power grid after shelling near the Russian-occupied plant caused several
    fires. Security systems at the plant were activated shortly after the power failure,
    according to a local official. (NBC News)
  - American-led intervention in the Syrian civil war
  - The United States conducts airstrikes against Iranian-backed militia groups in
    Syria for a second day. (The Wall Street Journal)
  - Flooding in Afghanistan this month has killed 182 people and wounded 250 more
    as torrential rains wrought widespread devastation in central and eastern provinces.
    (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in North Korea
  - North Korea reports four new "fever" cases in Ryanggang Province and places the
    province under lockdown. (Al Arabiya)
  - Assassination of Shinzo Abe
  - Itaru Nakamura, chief of the Japanese national police agency, resigns, taking
    responsibility for the failures in former prime minister Shinzo Abe's security
    that resulted in his assassination in Nara on July 8. (CBC)
  - Four people, including a police constable, are killed in a mass shooting in Tucson,
    Arizona, United States. (ABC News)
  - 2022 Angolan general election
  - The electoral commission announces that President João Lourenço's MPLA has won
    the general election. (Reuters)
