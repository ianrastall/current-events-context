Date: '2022-08-14'
Source_URI: Portal:Current events/2022 August 14
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - A Palestinian gunman opens fire inside a bus in Jerusalem's Old City, injuring
    eight people, two of them critically. Israeli police later raid the Silwan neighborhood,
    where the suspect lived, and arrest him. (Al Jazeera) (AP)
  - Five people are killed and 26 others are injured by an explosion in Guayaquil,
    Ecuador. The government blames organized crime groups. (BBC News)
  - Giza church fire
  - At least 41 people are killed and 45 others are injured in a fire at the Saint
    Mercurius Coptic Orthodox church in Giza, Egypt. (BBC News)
  - 2022 European and Mediterranean wildfires
  - More than 1,500 people are evacuated from Zaragoza, Spain, due to wildfires. (EMEA
    Tribune)
  - 2022 Yerevan explosion
  - Six people are killed, 60 others injured and 18 more are missing in an explosion
    at a fireworks storage area of a mall in Yerevan, Armenia. The city's mayor stated
    that there were people trapped under rubble. (Al Jazeera)
  - Seven people are killed by flooding caused by heavy rainfall in Pengzhou, Sichuan,
    China. (AP)
