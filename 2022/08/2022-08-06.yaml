Date: '2022-08-06'
Source_URI: Portal:Current events/2022 August 6
Intelligence_Payload:
  Uncategorized:
  - Gaza–Israel conflict
  - Operation Breaking Dawn
  - Israel launches airstrikes for the second day in the Gaza Strip, killing 14 people
    and injuring several others. Nineteen Palestinian Islamic Jihad members are also
    arrested in the West Bank. (Al Jazeera)
  - Twelve people are killed and 32 others are injured when a bus carrying pilgrims
    from Poland to Medjugorje, Bosnia and Herzegovina, crashes in Podvorec, Croatia.
    (BBC News)
  - One person is killed and at least 121 others are injured after a lightning strike
    causes a fire near the supertanker port in Matanzas, Cuba. (Reuters)
  - Four people are killed and eight others are injured when a bus travelling from
    Istanbul, Turkey, to Bucharest, Romania, crashes near Veliko Tarnovo, Bulgaria.
    (AP)
  - 2022 Saint Kitts and Nevis general election
  - Terrance Drew is sworn in as prime minister of Saint Kitts and Nevis. (The St
    Kitts and Nevis Observer)
