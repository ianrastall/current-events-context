Date: '2022-08-08'
Source_URI: Portal:Current events/2022 August 8
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Northern Chad
  - The government of Chad and more than 30 rebel and opposition factions sign a peace
    agreement at talks in Doha, Qatar. However, the main rebel group Front for Change
    and Concord in Chad rejects the agreement, saying that negotiators had not listened
    to their demands, which included the release of political prisoners. (Reuters)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The Pentagon announces that it will send Ukraine an additional $1 billion in military
    assistance, including tens of thousands more munitions and explosives, the largest
    such aid package to the country since the start of the invasion. (The Washington
    Post)
  - Russia–United States relations
  - Russia suspends New START arms inspections of its nuclear weapons in response
    to travel restrictions imposed by the United States and its allies. (Reuters)
  - FBI search of Mar-a-Lago
  - The Federal Bureau of Investigation executes a search warrant at Mar-a-Lago, the
    primary residence of former U.S. president Donald Trump, as part of a Justice
    Department investigation into Trump. (CNN)
