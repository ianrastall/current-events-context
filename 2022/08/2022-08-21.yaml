Date: '2022-08-21'
Source_URI: Portal:Current events/2022 August 21
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - 2022 Mogadishu hotel attack
  - The siege at a hotel seized by al-Shabaab fighters in Mogadishu ends with the
    deaths of all of the attackers. Twenty-one other people were killed, and 117 others
    were injured. (Al Jazeera) (BBC News)
  - 2022 Afghanistan floods
  - Nine people are killed by heavy flooding in Khoshi District, Logar, Afghanistan.
    (AP)
  - Sixteen people are killed and three others are injured when a truck collides with
    a minibus in Ulyanovsk Oblast, Russia. (Reuters)
  - At least 50 people are killed by flooding caused by heavy rains in Himachal Pradesh
    and Uttarakhand, India. (Reuters)
  - Nine soldiers are killed and four others are injured when their truck plunges
    into a ravine in Azad Kashmir, Pakistan. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Japan
  - Prime Minister Fumio Kishida tests positive for COVID-19. (Kyodo News)
  - Iran–United Arab Emirates relations
  - The United Arab Emirates announces the reinstallation of its ambassador to Iran,
    which will take effect "in the coming days", more than six years after it cut
    off diplomatic relations with the Islamic republic. (CNA)
  - LGBT rights in Singapore
  - Prime Minister Lee Hsien Loong says that Singapore will decriminalize sex between
    men, which is illegal under a colonial-era law, while also amending the Constitution
    to define marriage as a heterosexual union. (CNA)
  - Oleksandr Nakonechny, regional head of the Security Service of Ukraine in Kirovohrad
    Oblast, is found dead in his apartment in an apparent suicide. (Interfax Ukraine)
  - 2022 Western & Southern Open
  - In tennis, world number 156 Borna Ćorić of Croatia becomes the lowest-ranked champion
    in the ATP Tour Masters 1000 after defeating Stefanos Tsitsipas of Greece in the
    men's singles final of the 2022 Cincinnati Masters. (Philippine Daily Inquirer)
  - World number 17 Caroline Garcia of France becomes the first qualifier to win a
    WTA 1000 tournament after defeating Petra Kvitová of the Czech Republic in the
    women's singles final of the 2022 Cincinnati Masters. (Sportstar)
