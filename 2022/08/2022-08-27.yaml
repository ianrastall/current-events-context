Date: '2022-08-27'
Source_URI: Portal:Current events/2022 August 27
Intelligence_Payload:
  Uncategorized:
  - Libyan crisis, aftermath of the Second Libyan Civil War
  - 2022 Tripoli clashes
  - Fighting breaks out between two militias in Tripoli, Libya. At least 23 people
    are killed and over 140 others are injured. (Associated Press) (Reuters)
  - Jihadist insurgency in Burkina Faso
  - Six people are killed and two others are injured when militants attack a gold
    mine in Boungou, Bilanga Department, Gnagna Province, Burkina Faso. (Reuters)
  - Hungary–Russia relations, Nuclear power in Hungary
  - Minister of Foreign Affairs Péter Szijjártó announces Russian nuclear energy provider
    Rosatom will begin construction of two new nuclear reactors to expand the Paks
    Nuclear Power Plant. (BBC News)
  - Six people are killed and seven others are injured after a truck crashes into
    a community barbecue in Nieuw-Beijerland, South Holland, The Netherlands. (Associated
    Press)
  - Kosovo–Serbia relations
  - Kosovan prime minister Albin Kurti and Serbian president Aleksandar Vučić agree
    on a freedom of movement arrangement between Kosovo and Serbia. (The Manila Times)
  - Indictment and arrest of Julian Assange, Censorship in the United States
  - Lawyers for WikiLeaks publisher Julian Assange file an appeal against his extradition
    to the U.S., after UK Home Secretary Priti Patel approved his extradition from
    the United Kingdom. (The Guardian)
  - UN High Commissioner for Human Rights Michelle Bachelet meets with Assange’s lawyers
    and his wife in Geneva, Switzerland. (The Guardian)
  - Hunter Biden laptop controversy, Censorship in the United States
  - In an interview on The Joe Rogan Experience, Facebook CEO Mark Zuckerberg reveals
    that Facebook restricted posts about the Hunter Biden laptop controversy during
    the 2020 United States presidential election after receiving misinformation warnings
    from the Federal Bureau of Investigation. (BBC News)
  - 2022–23 Premier League
  - English football club Liverpool defeats Bournemouth 9–0 at Anfield, Liverpool,
    to equal the joint-largest winning margin in Premier League history. (BBC Sport)
