Date: '2022-08-26'
Source_URI: Portal:Current events/2022 August 26
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine campaign
  - Ukraine's state nuclear company, Energoatom, says that the Russian-occupied Zaporizhzhia
    Nuclear Power Plant has resumed supplying electricity to Ukraine's power grid
    after being disconnected yesterday from it for the first time in history. (Al
    Jazeera) (Reuters)
  - A traffic police deputy chief is killed by a bombing in the Russian-occupied city
    of Berdiansk, Zaporizhzhia Oblast. Russian authorities accuse the Ukrainian forces
    of the attack. (Reuters)
  - Tigray War
  - Ethiopian forces reportedly airstrike a kindergarten playground in Mekelle, Tigray
    Region, killing at least seven people and injuring more than 13 others. (CTV News)
    (Reuters)
  - Nagorno-Karabakh conflict, Azerbaijan–Russia relations
  - Russian peacekeepers withdraw from the city of Lachin and the villages of Zabukh
    and Sus, thereby returning the Lachin corridor to Azerbaijan. (Al Jazeera)
  - Police arrest over 40 protestors for vandalism during a Just Stop Oil protest
    and blockade in London, United Kingdom. (The Telegraph)
  - A vehicle rams into a crowd of people in central Brussels, Belgium, injuring six
    people. The driver flees the scene but is subsequently arrested in Antwerp. A
    motive is still unclear, but terrorism is not being ruled out. (Brussels Times)
    (Euronews)
