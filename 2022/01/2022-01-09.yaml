Date: '2022-01-09'
Source_URI: Portal:Current events/2022 January 9
Intelligence_Payload:
  Uncategorized:
  - 2022 Kazakh protests
  - The death toll from the protests in Kazakhstan increases to 164, including 103
    who were killed in Almaty. 5,135 people have also been detained. (Al Jazeera)
  - 79th Golden Globe Awards
  - South Korean actor O Yeong-su wins the Golden Globe Award for Best Supporting
    Actor in the Squid Game television series, becoming the first person from South
    Korea to win the honor. (Korea Times)
  - Mj Rodriguez wins the Best Actress in the Pose television series, becoming the
    first trans actress to win a Golden Globe. (CNN)
  - 2022 Bronx apartment fire
  - Seventeen people are killed and 44 others are injured after a fire spreads through
    a 19-story apartment building in the Bronx, New York City, United States. (CNN)
    (ABC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - Tianjin begins city-wide COVID-19 testing for 14 million people after 20 children
    and adults tested positive for COVID-19, two of whom were infected with the SARS-CoV-2
    Omicron variant. (The Guardian)
  - COVID-19 pandemic in Kuwait
  - Kuwait reports a record 2,999 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 433,919. (Kuwait News Agency)
  - COVID-19 pandemic in Kyrgyzstan
  - Health Minister Alymkadyr Beishenaliev announces that 55% of the Kyrgyzstan population
    has received their first doses of the COVID-19 vaccine. (AKIPress)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record for the second consecutive day of 28,707 new
    cases of COVID-19, thereby bringing the nationwide total of confirmed cases to
    2,965,447. (Rappler)
  - COVID-19 pandemic in Qatar
  - Qatar reports a record 3,487 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 266,344. (Qatar Tribune)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record 16 deaths from COVID-19 in the past 24 hours,
    thereby bringing the statewide death toll to 727. (ABC News Australia)
  - COVID-19 pandemic in Greece, COVID-19 vaccination in Greece
  - The Greek government announces that fully vaccinated people who have not received
    a COVID-19 vaccine booster dose seven months after receiving their second dose
    will be banned from entering most indoor venues and participating in many types
    of activities beginning on February 1. (Times of Malta)
  - COVID-19 pandemic in Africa
  - The total number of confirmed COVID-19 cases in Africa surpasses 10 million. (Barron's)
  - Foreign relations of Mali
  - The West African nations of the 15-member bloc ECOWAS suspend diplomatic relations
    with Mali and announce that they are closing their borders with and imposing economic
    sanctions on Mali in response to an "unacceptable delay" to the country's next
    general election. (Reuters)
