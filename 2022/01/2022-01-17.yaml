Date: '2022-01-17'
Source_URI: Portal:Current events/2022 January 17
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis, Russia–NATO relations
  - Canada deploys a small contingent of special forces to Ukraine as part of a NATO
    response to deter Russian aggression. The unit is also being tasked with evacuating
    diplomatic personnel from the Canadian embassy in Kyiv in the event of a full-scale
    invasion. (Reuters)
  - The United Kingdom begins supplying anti-tank guided missiles to Ukraine amid
    tensions with Russia, according to a statement from Secretary of State for Defence
    Ben Wallace. A small number of British military personnel will also be deployed
    to help train Ukrainian troops. (Reuters)
  - Royal Air Force C-17 transport aircraft arrive in Ukraine with "light anti-armour
    weapons" as part of British military support for Ukraine. (UK Defence Journal)
  - Spillover of the Yemeni Civil War
  - 2022 Abu Dhabi attack
  - Three people are killed in a drone attack on petrol tanks at a major oil storage
    facility near Abu Dhabi International Airport, United Arab Emirates. The Yemen-based
    Houthis claim responsibility, saying that they launched "five ballistic missiles
    and a large number of drones". (Hindustan Times) (CNN)
  - Capital of Indonesia
  - The Minister of National Development Planning Suharso Monoarfa reveals that the
    name of the new Indonesian capital will be Nusantara. Nusantara is a term that
    has been used to describe the Indonesian Archipelago. (VOI)
  - An independent investigation team identifies Arnold van den Bergh, a member of
    Amsterdam's Jewish Council, as the most likely person responsible for reporting
    The Diary of a Young Girl author Anne Frank and her family to the Nazis in 1944,
    leading to their deaths in a concentration camp. (BBC News)
  - 2022 Afghanistan earthquake
  - At least 26 people are killed by a magnitude 5.3 earthquake in Qadis, Badghis
    Province. (France 24)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Denmark
  - Denmark reports a record 28,780 new COVID-19 cases in the past 24 hours as the
    country eases many of its pandemic restrictions. (Reuters)
  - COVID-19 pandemic in Greece, COVID-19 vaccination in Greece
  - Greece begins to introduce monthly fines for people over the age of 60 who are
    unvaccinated against COVID-19 amid an increase in the number of new cases in the
    country. The monthly fine will initially be €50 this month and will be €100 per
    month thereafter. (NPR)
  - COVID-19 pandemic in the Netherlands
  - The Netherlands reports a record 42,472 new COVID-19 cases in the past 24 hours.
    (NL Times)
  - COVID-19 pandemic in Canada
  - COVID-19 drug development
  - Health Canada approves the use of Pfizer's anti-COVID-19 viral drug Paxlovid for
    people over the age of 18 years who are at risk of severe disease and death. (CBC
    News)
  - COVID-19 pandemic in Alberta
  - Alberta Minister of Health Jason Copping tests positive for COVID-19 as the province
    reports 1,007 total hospitalizations. (CBC News)
  - COVID-19 pandemic in the Philippines, COVID-19 vaccination in the Philippines
  - COVID-19 pandemic in Metro Manila
  - The Philippines begins to ban people who are unvaccinated against COVID-19 from
    riding public transport and entering commercial planes despite protests from labour
    and human rights groups. (Al Jazeera)
  - A Parisian court fines far-right French television pundit and presidential candidate
    Éric Zemmour €10,000 for calling unaccompanied migrant children "rapists" and
    "murderers" during a September 2020 television broadcast. (BBC News)
