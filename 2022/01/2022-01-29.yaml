Date: '2022-01-29'
Source_URI: Portal:Current events/2022 January 29
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - Russia–NATO relations, France–Romania relations
  - France announces that it will deploy "several hundred" troops to Romania in order
    to support NATO's eastern flank amid tensions with Russia. (Times of India)
  - 2021–22 European windstorm season
  - Storm Malik impacts the British Isles, killing two people, and causing widespread
    damage in Scotland and Northern England. (The Independent)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Russia
  - Russia reports a record for the ninth consecutive day of 113,122 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 1.61 million.
    (The Moscow Times)
  - COVID-19 pandemic in Turkey
  - Turkey reports a record 94,783 new COVID-19 cases in the past 24 hours. (Reuters)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record for the fourth consecutive day of 17,542 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 811,122. (The
    Korea Herald)
  - 2022 Russian military exercise controversy
  - Irish Minister for Foreign Affairs Simon Coveney announces that the Russian Minister
    of Defence has agreed to his request that the exercises would be moved outside
    the Irish Exclusive Economic Zone. (RTÉ)
  - Freedom Convoy 2022
  - Participants in the convoy arrive at Parliament Hill in Ottawa, Ontario, Canada
    to protest vaccine mandates and other public health restrictions imposed during
    the COVID-19 pandemic. (CTV News Ottawa)
  - 2022 Italian presidential election
  - After seven inconclusive ballots, Sergio Mattarella is elected for a second term
    as President on the eighth ballot. (ANSA)
  - 2022 Australian Open
  - Australian tennis player Ashleigh Barty defeats American Danielle Collins in two
    sets, 6–3, 7–6,(7–2) to win the women's singles title at the Australian Open.
    Barty is the first home player to win the title since Chris O'Neil in 1978. (AFP
    via France 24)
