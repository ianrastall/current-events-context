Date: '2022-01-10'
Source_URI: Portal:Current events/2022 January 10
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - Ukrainian authorities arrest an alleged Russian intelligence agent who they claim
    attempted to recruit others to launch attacks in the port city of Odesa. (MSN)
  - Yemeni Civil War
  - The pro-Yemeni government militia Giants Brigades say that they are in "full control"
    of the Shabwah Governorate after ten days of fighting Houthi forces. (France 24)
  - The United States Mint announces that they have started shipping the first coins
    of the American Women quarters program. American poet Maya Angelou will become
    the first African American woman to be featured on a U.S. quarter. (The Hill)
    (NPR)
  - 2022 East London floods
  - Ten people are killed and hundreds more are left homeless due to floods in East
    London, South Africa, as poorly built homes are swept away, especially in Mdantsane
    just outside the city. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 vaccination in India
  - India begins administering COVID-19 vaccine booster doses for high-risk individuals,
    such as healthcare workers and people over the age of 60 with comorbidities. (The
    Times of India)
  - COVID-19 pandemic in Indonesia, COVID-19 vaccination in Indonesia
  - The Indonesian Drug and Food Control Agency issues an emergency use authorization
    of five COVID-19 vaccines as booster dose, namely Pfizer–BioNTech, AstraZeneca,
    CoronaVac, and Zifivax's ZF2001 for one dose, and half dose of the Moderna COVID-19
    vaccine. (Kompas)
  - COVID-19 pandemic in Nepal
  - Nepal bans mass public gatherings of more than 25 people, closes schools until
    January 29 and mandates proof of vaccination in order to enter hotels, parks,
    restaurants, cinema halls, and public office beginning on January 21 due to an
    increase in the number of COVID-19 cases. (Reuters)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record for the third consecutive day of 28,707 new cases
    of COVID-19, thereby bringing the nationwide total of confirmed cases to 2,998,530.
    (ABS-CBN News)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario, Impact of the COVID-19 pandemic on education
  - The Ontario government says that the province will resume in-person learning for
    students by January 17. (Ottawa Citizen)
  - COVID-19 pandemic in Mexico
  - Mexican president Andrés Manuel López Obrador tests positive for COVID-19 for
    the second time. (NPR)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record for the second consecutive day of 18 deaths from
    COVID-19, thereby bringing the statewide death toll to 745. (The Guardian)
  - Australia surpasses one million cases of COVID-19. (Al Jazeera)
  - COVID-19 pandemic in Chile
  - Chile begins administering second booster doses of the COVID-19 vaccine to people
    who are most vulnerable to COVID-19, including immunocompromised people, becoming
    the first country in Latin America to do so. (AP)
  - COVID-19 pandemic in Italy
  - Italy restricts the access of public transport, coffee shops, gyms, and many other
    activities to people who have been vaccinated or has been recovered from COVID-19
    amid the surge of the COVID-19 cases driven by the Omicron variant. (Sky News)
  - COVID-19 pandemic in Uganda, Impact of the COVID-19 pandemic on education
  - Uganda reopens schools for the first time since March 2020 after a nearly two
    year closure due to the COVID-19 pandemic. (The Independent)
  - COVID-19 vaccine development
  - Pfizer CEO Albert Bourla says that the company will develop a COVID-19 vaccine
    to target the Omicron variant by March. (CNBC)
  - Russia–United States relations
  - Russia and the U.S. begin a series of talks in Geneva in an effort to defuse tensions
    between both countries as well as tensions with Ukraine. (The Guardian)
  - 2021–2022 social unrest in the French West Indies
  - Roadblocks are set up by demonstrators and stones are thrown at the police in
    Basse-Terre. (France info)
  - The Peoples Gazette, a Nigerian online newspaper, claims that it has been raided
    by the National Intelligence Agency. (Peoples Gazette)
  - Xenotransplantation
  - Doctors at the University of Maryland, Baltimore, successfully transplant a pig
    heart into a human patient for the first time. (ABC News)
  - Impact of the COVID-19 pandemic on sports
  - 2022 Australian Open
  - The Federal Court of Australia orders that Serbian tennis player Novak Djokovic
    be released from immigration detention and allowed to compete in the Australian
    Open in order to defend his Championship, and also orders the federal government
    to pay Djokovic's legal fees. (BBC News)
  - 2022 College Football Playoff National Championship
  - In American football, Georgia defeats Alabama to win the national championship,
    its first since 1980. (CBS News)
