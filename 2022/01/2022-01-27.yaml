Date: '2022-01-27'
Source_URI: Portal:Current events/2022 January 27
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russian-Ukrainian crisis
  - The United States rejects Russia's demand that Ukraine be barred from joining
    NATO. (BBC News)
  - U.S. President Joe Biden, during a telephone conversation with Ukrainian President
    Volodymyr Zelensky, says "the Russians could invade Ukraine in February". (BBC
    News)
  - Spillover of the Syrian civil war
  - Jordanian troops kill 27 "armed smugglers" after they tried to cross the border
    from Syria with a large quantity of amphetamines. Several other smugglers, who
    were "supported by other armed groups", were wounded, according to a statement
    from the military. (Reuters)
  - 2022 Dnipro shooting
  - Five people are killed and five more are injured in a mass shooting at a Yuzhmash
    production facility in Dnipro, Ukraine, after a member of the Ukrainian National
    Guard opens fire. (The Straits Times)
  - Aftermath of the 2021 Kyrgyzstan–Tajikistan clashes
  - Two civilians are killed while 21 more people are wounded near the border between
    Kyrgyzstan and Tajikistan after troops from both countries engage in a battle.
    (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Finland
  - Finland reports its first ten cases of the Omicron sub-lineage named BA.2 sublineage
    in Southwest Finland. (Yle News)
  - COVID-19 pandemic in Germany
  - Germany reports a record for the second consecutive day of 203,136 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 9.2 million.
    (Anadolu Agency)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the seventh consecutive day of 88,816 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 11,404,617.
    (Azeri Press Agency)
  - COVID-19 pandemic in Spain
  - Spain reports its first two cases of the Omicron sub-lineage named BA.2 sublineage
    in Catalonia. (The Olive Press)
  - COVID-19 pandemic in Turkey
  - Turkey reports a record 82,180 new COVID-19 cases in the past 24 hours. (Asharq
    Al-Awsat)
  - COVID-19 pandemic in the United Kingdom
  - The government's Plan B restrictions, including mandatory usage of face masks
    on public transport and in shops, and usage of NHS COVID passports for large events
    are lifted in England. (Sky News)
  - European Union response to the COVID-19 pandemic, COVID-19 drug development
  - The European Medicines Agency conditionally approves the use of the Pfizer anti-COVID-19
    oral drug Paxlovid for high-risk adult patients. (France 24)
  - COVID-19 pandemic in Brazil
  - Brazil reports a record for the second consecutive day of 228,954 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 24.7 million.
    (Business Standard)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record for the third consecutive day of 14,518 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 777,497. (Asian
    News International)
  - Xiomara Castro is officially sworn in as the 56th President of Honduras, making
    her the country's first female president. (AFP via NDTV)
