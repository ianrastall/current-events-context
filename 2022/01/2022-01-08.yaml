  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Cyprus
  - A Cypriot scientist reportedly detects a variant of the SARS-CoV-2 called "Deltacron",
    which combines genomes found in the SARS-CoV-2 Delta variant and genetic signatures
    found in the SARS-CoV-2 Omicron variant. (CNBC)
  - COVID-19 pandemic in Romania
  - Romania reintroduces mandatory face mask wearing in outdoor and indoor public
    spaces; reduces the operating hours and capacity of bars, restaurants, cinemas,
    gyms, and sporting events; and also reduces the quarantine period, amidst concern
    that the next wave of COVID-19 could overwhelm the health system. (AP)
  - COVID-19 pandemic in Sweden
  - Victoria, Crown Princess of Sweden tests positive for COVID-19 for a second time.
    (U.S. News & World Report)
  - COVID-19 pandemic in Australia
  - The number of confirmed COVID-19 cases in Australia surpasses 100,000 for the
    first time since the beginning of the pandemic, with Victoria reporting a record
    51,356 new cases in the past 24 hours after including rapid antigen tests as part
    of the total number of cases. (RNZ)
  - COVID-19 pandemic in Mexico
  - Mexico reports a record 30,671 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 4.1 million. The country also
    surpasses 300,000 deaths from COVID-19. (Bloomberg)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record 26,458 new cases of COVID-19 in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 2,936,875. (ABS-CBN
