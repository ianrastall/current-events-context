Date: '2022-01-23'
Source_URI: Portal:Current events/2022 January 23
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis
  - The U.S. State Department orders its diplomats' families to leave Ukraine, and
    authorizes voluntary departure of non-essential embassy staff in Kyiv. "Due to
    the continued threat" of a Russian invasion on Ukraine, American citizens are
    also urged to leave the country. (France 24)
  - Mali War
  - A French soldier is killed in a mortar attack on a military camp in Gao, northern
    Mali. (France 24)
  - Yaoundé nightclub fire
  - At least 16 people are killed and eight others are injured in a fire caused by
    fireworks at a nightclub in Yaoundé, Cameroon. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Russia
  - Russia reports a record for the third consecutive day of 63,205 new COVID-19 cases,
    thereby bringing the nationwide total of confirmed cases to 11.1 million. (Anadolu
    Agency)
  - President of Armenia Armen Sarkissian resigns on the grounds that the Constitution
    does not give him enough influence in the country's decision-making process. (Reuters)
