Date: '2022-01-30'
Source_URI: Portal:Current events/2022 January 30
Intelligence_Payload:
  Uncategorized:
  - A multiple-vehicle collision in North Las Vegas, Nevada, United States, kills
    nine people and injures six others. (Las Vegas Review-Journal)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in the Philippines
  - The Inter-Agency Task Force for the Management of Emerging Infectious Diseases
    announces that the National Capital Region and seven other provinces will be downgraded
    to Alert Level 2, which will allow for resumption of in-person classes and usage
    of contact sports venues. (Rappler)
  - COVID-19 pandemic in Qatar
  - Qatar begins administering the Pfizer–BioNTech COVID-19 vaccine for children aged
    between 5 to 11 years. It comes after the Ministry of Public Health approves the
    use of the vaccine for this age group. (The Peninsula Qatar)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the tenth consecutive day of 121,288 new COVID-19
    cases, bringing the nationwide total of confirmed cases to 11.37 million. (Euronews)
  - North Korean missile tests
  - North Korea launches a Hwasong-12 intermediate-range ballistic missile (IRBM)
    from its Chagang Province. The missile reached an altitude of 2,000 km before
    landing in the Sea of Japan. It is North Korea's first IRBM launch since 2017.
    South Korea's National Security Council holds an emergency meeting in response
    to the launch. (BBC News) (Reuters)
  - Manchester United F.C. and England player Mason Greenwood is arrested by Greater
    Manchester Police on suspicion of rape and assault after videos and images of
    alleged abuse of his partner were posted on social media. (BBC News)
  - Ten members of the Sunni Islamist organization Muslim Brotherhood are sentenced
    to capital punishment by an Egyptian court for their involvement in a deadly attack
    against security personnel in 2015. (AFP via The Times of Israel)
  - 2022 Portuguese legislative election
  - Voters in Portugal head to the polls for a snap parliamentary election. (Reuters)
  - 2021 NFL season
  - 2022 NFL playoffs
  - The Cincinnati Bengals defeat the Kansas City Chiefs, 27–24, to win the AFC Championship,
    while the Los Angeles Rams defeat the San Francisco 49ers, 20–17, to win the NFC
    Championship. The Bengals and Rams will meet in Super Bowl LVI, set to be played
    in SoFi Stadium on February 13. The Rams will also become the second team after
    the 2020 Tampa Bay Buccaneers to play the Super Bowl in their home stadium. (CNN)
  - 2022 Australian Open
  - Spanish tennis player Rafael Nadal defeats Russian Daniil Medvedev in five sets
    to win the men's singles title at the Australian Open. The victory is Nadal's
    21st Grand Slam title, which is an all-time record. (The Guardian)
  - 2022 European Men's Handball Championship
  - Sweden beat Spain 27–26 in the finals to be crowned champions, their first major
    title since 2002. (Olympics) (Euro Handball)
