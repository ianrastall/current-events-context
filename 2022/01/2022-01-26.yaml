Date: '2022-01-26'
Source_URI: Portal:Current events/2022 January 26
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Battle of al-Hasakah
  - The Kurdish-led Syrian Democratic Forces recapture a prison in al-Hasakah from
    Islamic State. (Al Jazeera)
  - 2021–2022 Russo-Ukrainian crisis
  - U.S. Secretary of State Antony Blinken announces that the United States has given
    a written response to Russia, aimed at the de-escalation of tensions between Ukraine
    and Russia. The response, coordinated with European allies and Ukraine, addresses
    Russia's demands and actions. (CNN)
  - Mali War
  - The Malian junta demands that Denmark withdraw its forces from the country, saying
    they were never given authorization to participate in the ongoing European-led
    peacekeeping operations. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - Germany reports a record 164,000 new COVID-19 cases in the past 24 hours. (Al-Arabiya)
  - COVID-19 pandemic in Hungary
  - Hungary reports a record 20,174 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 1,471,276. (Daily News Hungary)
  - COVID-19 pandemic in Poland
  - Poland reports a record 53,420 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 4,637,776. (Polskie Radio)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the sixth consecutive day of 74,692 new COVID-19 cases,
    thereby bringing the nationwide total of confirmed cases to 11.3 million. (The
    Moscow Times)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Israel, COVID-19 vaccination in Israel
  - Israeli Health ministry approves the second round of booster dose of the COVID-19
    vaccine for people aged above 18 years who have underlying medical conditions.
    (The Times of Israel)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record for the second consecutive day of 13,102 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 762,983. (The
    Korea Herald)
  - COVID-19 pandemic in Brazil
  - Brazil reports a record 224,567 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 24.5 million. (Reuters)
  - Canada–Ukraine relations
  - Canadian Prime Minister Justin Trudeau announces the extension of Operation Unifier
    for three years. Sixty more troops will also be deployed to Ukraine in the coming
    days. Trudeau's government also announces a shipment of non-lethal equipment and
    intelligence sharing. (CTV News)
  - LGBT rights in France
  - The National Assembly votes to criminalize conversion therapy, with violators
    facing three years in prison and up to €45,000 in fines. The bill will now be
    sent to President Emmanuel Macron to be signed into law. (BBC News)
