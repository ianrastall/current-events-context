Date: '2022-01-22'
Source_URI: Portal:Current events/2022 January 22
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis, Russia–NATO relations
  - The British Foreign, Commonwealth and Development Office says that, according
    to the available information, the Russian government is planning to "install a
    pro-Russian leader in Kyiv as it considers whether to invade and occupy Ukraine."
    (CNN)
  - Vice Admiral Kay-Achim Schönbach resigns as Inspector of the German Navy following
    comments at a think tank in New Delhi, in which he called Russia's intention to
    attack Ukraine "nonsense", saying that Russian president Vladimir Putin "deserves
    respect" and dismissing the prospects of Ukraine ever regaining Crimea and joining
    NATO. (The Guardian)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia reports its first confirmed deaths related to the SARS-CoV-2 Omicron
    variant in an unvaccinated 64-year-old man and a vaccinated 54-year-old woman
    who both had underlying health conditions. (CNN Indonesia)
  - COVID-19 pandemic in Japan
  - Japan reports a record for the fifth consecutive day of 54,576 new COVID-19 cases,
    including a record 11,227 new cases in Tokyo and a record 7,675 new cases in Osaka
    Prefecture. (Kyodo News)
  - COVID-19 pandemic in Singapore
  - Singapore reports its first confirmed death related to the SARS-CoV-2 Omicron
    variant in an unvaccinated 92-year-old woman. (The Straits Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Poland
  - Poland reports a record for the second consecutive day of 40,876 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 4,484,095.
    (Polskie Radio)
  - COVID-19 pandemic in Romania
  - Romania surpasses two million cases of COVID-19. (Digi24)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the second consecutive day of 57,212 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 11.04 million.
    (The Times of India)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Kiribati
  - Kiribati goes into lockdown for the first time during the pandemic after dozens
    of passengers onboard a January 14th charter flight from Fiji test positive for
    COVID-19. (CNN)
  - COVID-19 pandemic in Samoa
  - Samoa Prime Minister Fiamē Naomi Mataʻafa announces a three day lockdown in response
    to ten positive COVID-19 passengers from repatriation flight. (RNZ)
  - COVID-19 pandemic in the Solomon Islands
  - The number of new COVID-19 cases rises to 48, despite ongoing lockdowns in Ontong
    Java Atoll, Honiara, and Guadalcanal Province. The current outbreak began last
    week when 23 crew members onboard an illegal fishing vessel from Papua New Guinea
    tested positive after entering Ontong Java Atoll. (RNZ)
