Date: '2022-01-07'
Source_URI: Portal:Current events/2022 January 7
Intelligence_Payload:
  Uncategorized:
  - 2022 Kazakh protests
  - Kazakh president Kassym-Jomart Tokayev issues his security forces a shoot-to-kill
    without warning order in an attempt to end the ongoing protests. (Reuters)
  - The Russian Ministry of Defense reports that Russian troops deployed to Kazakhstan
    have maintained control of the Almaty International Airport and secured critical
    government buildings in Nur-Sultan, including the Ak Orda Presidential Palace.
    (Bloomberg) (The New York Times)
  - Chongqing explosion
  - Sixteen people are killed and 10 others injured by a gas explosion in Chongqing,
    China. (CNN)
  - West Bank bus crash
  - Nine people are killed and two injured after a truck and minibus collided at on
    Highway 90, Palestine. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in the Philippines
  - COVID-19 testing
  - The Food and Drug Administration begins accepting requests for certification of
    COVID-19 antigen test kits for home use. Previously, antigen test kits were only
    available for professional use. (CNN Philippines)
  - The Inter-Agency Task Force for the Management of Emerging Infectious Diseases
    places 14 more provinces and cities under Alert Level 3 from January 9 to January
    15. Five areas including Metro Manila were already placed into Alert Level 3 due
    to an increase in the number of COVID-19 cases. (Philippine Daily Inquirer)
  - COVID-19 pandemic in Japan
  - Japan declares a quasi-state of emergency for Okinawa, Yamaguchi, and Hiroshima
    prefectures, which host U.S. military bases and are reporting an increase in the
    number of COVID-19 cases. The quasi-emergency measures will take effect on January
    9. (Kyodo News)
  - COVID-19 pandemic in Sri Lanka, COVID-19 vaccination in Sri Lanka
  - Sri Lanka begins its COVID-19 vaccination rollout for children between the ages
    of 12 and 15 years using the Pfizer-BioNTech COVID-19 vaccine. (MedicalXpress)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austrian chancellor Karl Nehammer tests positive for COVID-19 and begins a period
    of self-isolation. (Politico.eu)
  - COVID-19 pandemic in Bulgaria, Travel during the COVID-19 pandemic
  - Bulgaria imposes a rule that requires almost all travellers aged above 12 years
    from the European Union and the United Kingdom to have a negative PCR test in
    the previous 72 hours along with a valid COVID-19 certificate prior to arrival,
    in order to limit the spread of the SARS-CoV-2 Omicron variant. (Euronews)
  - COVID-19 pandemic in Germany
  - German chancellor Olaf Scholz and the leaders of 16 states agree to reduce the
    isolation period for people who have received a booster dose of the COVID-19 vaccine
    and also toughen the requirement to enter bars and restaurants to include a booster
    shot or a negative test result in addition to proof of vaccination or recovery
    as the Omicron variant continues to spread across the country. (ABC News)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales premier Dominic Perrottet announces that the state will suspend
    elective surgeries as well as ban singing and dancing in hospitality venues, entertainment
    facilities and major recreation facilities due to an increase in the number of
    COVID-19 cases caused by the SARS-CoV-2 Omicron variant. These restrictions will
    be in effect until January 27. (News.com.au)
  - COVID-19 pandemic in the Northern Territory
  - The Northern Territory reports a record for the third consecutive day of 412 new
    cases of COVID-19, bringing the territory-wide total of confirmed cases to 1,686.
    (ABC News Australia)
  - COVID-19 pandemic in Argentina
  - Argentina reports a record for the fourth consecutive day of 110,553 new cases
    of COVID-19. (Infobae)
  - COVID-19 pandemic in Mexico, COVID-19 drug development
  - Mexican health regulator COFEPRIS grants emergency use authorization for Merck
    & Co.'s anti-COVID-19 drug Molnupiravir for the treatment of severe disease. (Reuters)
  - COVID-19 pandemic in Nigeria, COVID-19 vaccination in Nigeria
  - Nigerian President Muhammadu Buhari announces that Nigeria is working on developing
    its own COVID-19 vaccine. (CNN)
  - Murder of Ahmaud Arbery
  - The three defendants convicted in the murder of Ahmaud Arbery are sentenced to
    life in prison. Travis and Greg McMichael are sentenced to life without the possibility
    of parole, while William Bryan is sentenced to life with the possibility of parole.
    (NBC News)
  - Discoveries of exoplanets
  - Researchers from the University of Bern announce the discovery of TOI-2257 b,
    an eccentric exoplanet that orbits near a red dwarf. (Phys.org)
