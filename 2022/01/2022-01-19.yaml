Date: '2022-01-19'
Source_URI: Portal:Current events/2022 January 19
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis, Russia–NATO relations
  - US President Joe Biden says a full-scale Russian invasion of Ukraine will result
    in a more severe penalty than a "minor incursion" as he predicts that Russian
    President Vladimir Putin "will move in [on Ukraine]; he has to do something".
    (Reuters)
  - US Secretary of State Antony Blinken arrives in Kyiv, Ukraine, in a show of support
    for Ukraine. During a one-day visit, Blinken will meet with Ukrainian President
    Volodymyr Zelensky. White House Press Secretary Jen Psaki said yesterday that
    "Russia could at any point launch an attack on Ukraine" and that "No option is
    off the table". (France 24)
  - Lithuanian Defence Minister Arvydas Anušauskas warns that the presence of Russian
    troops in Belarus poses a "direct threat" to Lithuania. (Politico.eu)
  - The United Kingdom's Royal Air Force continues flights to Ukraine delivering "thousands"
    of MBT LAW anti-tank missiles to the Ukrainian military. Russia accuses Britain
    of "fuelling the crisis" by sending lethal weapons to Ukraine. (UK Defence Journal)
    (The Times)
  - Employees of the STB, Bucharest's largest public transport company, go on strike
    demanding the resignation of its chairman, Adrian Criț. The city authorities,
    led by the Save Romania Union-backed mayor Nicușor Dan, condemn the strike, blaming
    it on the Social Democratic Party-backed trade unionist Vasile Petrariu as an
    attempt to undermine his authority. (Digi24)
  - Six people are killed in a fire at a nursing home in Moncada, Valencia, Spain.
    (The Washington Post)
  - Twenty-nine people are killed during a stampede at an open-air Pentecostal church
    in Monrovia, Liberia. The stampede was triggered by panic after gangsters entered
    the prayer ground after a collection. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan
  - The Japanese government announces that it will place Tokyo and 12 other prefectures
    under a quasi-state of emergency from January 21 to February 13 amid an increase
    in the number of COVID-19 cases due to the SARS-CoV-2 Omicron variant, with the
    country reporting a record for the second consecutive day of 41,487 new cases
    of COVID-19. (Kyodo News)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports its first confirmed deaths related to the SARS-CoV-2 Omicron
    variant in two unvaccinated people in their 60s who had underlying health conditions.
    (ABS-CBN News)
  - COVID-19 pandemic in Vietnam
  - Vietnam reports its first three locally transmitted cases of the SARS-CoV-2 Omicron
    variant in Ho Chi Minh City. (Hanoi Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Bulgaria
  - Bulgaria reports a record for the second consecutive day of 11,181 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 841,785. (Bulgarian
    Press Agency)
  - COVID-19 pandemic in the Czech Republic
  - The Czech government suspends plans to make COVID-19 vaccination mandatory for
    key workers and people over the age of 60, which was expected to come into effect
    in March. (ABC News)
  - COVID-19 pandemic in Germany
  - Germany reports a record 112,323 new COVID-19 cases in the past 24 hours. (Deutsche
    Welle)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in American Samoa
  - A seventh passenger from a Hawaiian Airlines flight from Honolulu, Hawaii, tests
    positive for COVID-19. The plane landed in American Samoa on January 6, 2022.
    (Samoa News)
  - COVID-19 pandemic in Kiribati
  - Kiribati announces a curfew and mandatory face masks after 36 passengers on a
    charter flight from Fiji test positive for COVID-19 upon arrival. The plane was
    the first international commercial flight to land in the country since March 2020.
    Kiribati reopened its borders on January 10th. (Stuff.co.nz)
  - COVID-19 pandemic in Algeria, Impact of the COVID-19 pandemic on education
  - The Algerian government announces that all elementary and high schools will be
    closed for 10 days due to an increase in the number of Omicron variant cases in
    the country. (Arab News)
  - COVID-19 pandemic in Mexico
  - Mexico reports a record for the second consecutive day of 60,552 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 4,495,310.
    (Bloomberg)
  - Westminster lockdown parties controversy
  - Conservative Party MP Christian Wakeford crosses the floor to the opposition Labour
    Party, stating that Prime Minister Boris Johnson's behaviour has been "disgraceful".
    There are growing calls within the ruling Conservative Party for Johnson to resign
    amid public outrage over "Partygate". (Reuters)
