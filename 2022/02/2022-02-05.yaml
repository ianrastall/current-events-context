  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - A pair of Tu-22M3 bombers are seen flying across Belarus amid large joint military
    drills and tensions between Russia and Ukraine. (AP)
  - Protesters gather in Kharkiv, Ukraine, to protest Russian aggression. Code Pink
    and other anti-war protesters also gather in Topsham, Maine and other cities across
    the U.S. to protest the escalation. (VOA) (WABI-TV) (San Francisco Chronicle)
  - Insurgency in Balochistan
  - Twenty Baloch Nationalist Army separatists and nine Pakistani soldiers are killed
    during raids in Panjgur and Nushki, after the BNA attacked two security posts
    two days ago, killing four soldiers and a civilian. (Al Jazeera)
