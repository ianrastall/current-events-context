Date: '2022-02-06'
Source_URI: Portal:Current events/2022 February 6
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - Russia–NATO relations
  - French President Emmanuel Macron says that a deal to "avoid war in Ukraine" is
    "within reach" and that it is legitimate for Russia to raise its own security
    concerns to NATO. Macron will meet with Vladimir Putin in Moscow tomorrow. (BBC
    News)
  - Afghanistan–Pakistan border skirmishes
  - Five Pakistani troops are killed after "militants from inside Afghanistan" opened
    fire on a border post in Kurram District, Khyber Pakhtunkhwa. The army says that
    it retaliated, causing heavy casualties among the militants. The Taliban government
    denies that the firing came from within Afghan territory. (Reuters)
  - 2021–22 South-West Indian Ocean cyclone season
  - Cyclone Batsirai, a category 4 cyclone on the Saffir–Simpson scale, kills at least
    10 people and displaces more than 48,000 after making landfall in Madagascar.
    (AFP via France 24)
  - COVID-19 pandemic
  - COVID-19 pandemic in Honduras
  - President Xiomara Castro tests positive for COVID-19. (Reuters)
  - COVID-19 pandemic in Papua New Guinea
  - Prime Minister James Marape tests positive for COVID-19 and returns home after
    attending the 2022 Winter Olympics opening ceremony. (Voice of America)
  - COVID-19 pandemic in Russia
  - Russia lifts its seven-day quarantine guideline for people who had contact with
    positive COVID-19 patients despite reporting a record 189,071 new cases. (ABC
    News)
  - COVID-19 pandemic in South Korea
  - South Korea surpasses one million cases of COVID-19 after reporting a record 38,690
    new cases in the past 24 hours. (CNA)
  - COVID-19 protests in Canada
  - Freedom Convoy 2022
  - Ottawa Mayor Jim Watson declares a state of emergency in the capital as a trucker
    protest against COVID-19 vaccine mandates enters its second week. (The Independent)
  - 2022 Costa Rican general election
  - A general election is held in Costa Rica. (Al Jazeera)
  - 2021–2022 Tunisian political crisis
  - Tunisian president Kais Saied dissolves the nation's Supreme Judicial Council.
    The Council's leaders declare the dissolution as illegal. (DW)
  - 2022 Winter Olympics
  - New Zealand at the 2022 Winter Olympics
  - New Zealand snowboarder Zoi Sadowski-Synnott wins a gold medal in women’s slopestyle,
    winning New Zealand its first-ever gold medal at the Winter Olympics. (Forbes)
    (RNZ)
  - 2021 Africa Cup of Nations
  - In association football, Senegal win their first international trophy after beating
    Egypt on penalties in the final at the Olembe Stadium in Yaoundé, Cameroon. Senegalese
    forward Sadio Mané is named the tournament's Best Player. (CNN)
