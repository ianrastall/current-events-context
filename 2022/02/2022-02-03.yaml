Date: '2022-02-03'
Source_URI: Portal:Current events/2022 February 3
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - War in Donbas
  - The United States Embassy in Kyiv calls on Russia to "fully comply" with the ceasefire
    in Donbas after pro-Russian forces shelled the strategic Hnutove entry-exit checkpoint
    and a humanitarian road corridor. (Ukranews)
  - Belarus–Ukraine relations
  - Belarus says that a Ukrainian Air Force drone violated its airspace over a military
    training area, and that the military forced the aircraft to land. The Belarusian
    Ministry of Foreign Affairs summons the Ukrainian ambassador in response to the
    incident. (Belta)
  - Syrian civil war
  - Abu Ibrahim al-Hashimi al-Qurashi, the leader of the Islamic State, dies after
    killing himself with a suicide bombing during a U.S. Joint Special Operations
    Command raid and battle in Atme, Idlib Governorate, Syria. Twelve more people
    are killed during the raid. (BBC News)
  - The oil tanker Trinity Spirit catches fire and explodes off the coast of Nigeria.
    (Newsweek)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - India surpasses 500,000 deaths from COVID-19, becoming the third country to do
    so after the United States and Brazil. (The Times of India)
  - COVID-19 pandemic in Japan
  - Japan surpasses three million COVID-19 cases after a record 104,270 new cases
    in the past 24 hours. (Anadolu Agency)
  - COVID-19 pandemic in Malaysia, COVID-19 vaccination in Malaysia
  - Malaysia begins administering COVID-19 vaccines for children between the ages
    of 5 and 11 years using the Pfizer-BioNTech COVID-19 vaccine. (CNA)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - France surpasses 20 million COVID-19 cases. (Reuters)
  - COVID-19 pandemic in Germany, COVID-19 vaccination in Germany
  - The Standing Committee on Vaccination issues a recommendation for the approval
    of the protein-based Novavax COVID-19 vaccine for use in adults. (Deutsche Welle)
  - COVID-19 pandemic in the United Kingdom, COVID-19 vaccination in the United Kingdom
  - The Medicines and Healthcare products Regulatory Agency approves the use of the
    protein-based Novavax COVID-19 vaccine for use in adults over the age of 18 years.
    (The Guardian)
  - COVID-19 pandemic in Brazil
  - Brazil reports a record 298,408 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 26.09 million. (Reuters)
  - COVID-19 pandemic in South Africa, History of COVID-19 vaccine development
  - South Africa's Afrigen Biologics uses the publicly available sequence of the mRNA-based
    Moderna COVID-19 vaccine to make its own version of the vaccine, which will become
    the world's first vaccine based on an existing vaccine once it is tested on humans
    later this year. (Al Jazeera)
  - Germany–Russia relations, Media freedom in Russia, Censorship in Germany
  - Russia withdraws the press credentials of all Deutsche Welle staff and closes
    the German media organization's studio in Moscow in response to German regulators
    blocking the Russian television channel RT Deutsch. (Deutsche Welle)
  - Twenty people die and 74 others are hospitalized in Buenos Aires, Argentina, after
    consuming cocaine laced with poison or "cut" with another substance. Nine people
    are arrested. (BBC News)
  - Partygate
  - Four senior aides to UK Prime Minister Boris Johnson resign, including Downing
    Street Chief of Staff Dan Rosenfield, Principal Private Secretary Martin Reynolds,
    Downing Street Director of Communications Jack Doyle, and political adviser Munira
    Mirza, amid controversy over the Prime Minister's handling of the Partygate scandal.
    (Reuters)
  - 2022 Caribbean Series
  - Professional baseball team Caimanes de Barranquilla defeats the Gigantes del Cibao
    4–1 to win the 2022 Caribbean Series and becoming the first Colombian team to
    win the tournament. (MLB)
