Date: '2022-02-01'
Source_URI: Portal:Current events/2022 February 1
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - War in Donbas
  - A Ukrainian Air Force drone strike kills a pro-Russian insurgent on the frontline
    in Donbas, according to the head of the self-proclaimed Donetsk People's Republic.
    (Skai)
  - The Luhansk People's Republic accuses Ukraine of deploying a 9K33 Osa anti-aircraft
    missile system in a residential area of Popasna, a majority Russian-speaking city
    near the frontline. (TASS)
  - 2021–2022 Russo-Ukrainian crisis, Russia–United States relations
  - Russian President Vladimir Putin accuses the United States of trying to "draw
    Russia into war" in Ukraine as a pretext to impose more sanctions in order to
    "contain Russia's development". Putin also says that the U.S. has ignored Russia's
    concerns about the expansion of NATO in Eastern Europe. (BBC News)
  - 2022 Guinea-Bissau coup d'état attempt
  - A coup attempt is made in Guinea-Bissau. President Umaro Sissoco Embaló says that
    "many" members of the security forces have been killed in a "failed attack against
    democracy" as both the African Union and ECOWAS condemn the attempted coup. (France
    24)
  - 2022 Haiti floods
  - Three people are killed and at least 2,500 families have been evacuated amid heavy
    rains and flooding in Haiti. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Norway
  - Norway lifts almost all remaining COVID-19-related restrictions except for face
    mask rules due to the country's high vaccination rate. (The Local Norway)
  - COVID-19 pandemic in Portugal
  - Portuguese Prime Minister António Costa announces that he has tested positive
    for COVID-19. (Politico.eu)
  - COVID-19 pandemic in Spain, COVID-19 vaccination in Spain
  - The Spanish Agency of Medicines and Medical Devices approves the phase III trial
    of the Hipra COVID-19 vaccine candidate. (The Olive Press)
  - COVID-19 pandemic in Turkey
  - Turkey reports a record 102,601 new COVID-19 cases in the past 24 hours. (Hürriyet
    Daily News)
  - European Union response to the COVID-19 pandemic, Vaccine passports during the
    COVID-19 pandemic
  - The European Union restricts the validity of the EU Digital COVID certificate
    to only nine months after having received their second dose of the COVID-19 vaccine.
    (Schengen Visa Info)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada, COVID-19 vaccination in Canada
  - COVID-19 pandemic in Quebec, COVID-19 vaccination in Quebec
  - Quebec Premier François Legault suspends a plan to tax people who are unvaccinated
    against COVID-19 in order to protect "social cohesion" in the province. (CBC)
  - COVID-19 pandemic in the United States
  - The United States surpasses 900,000 deaths from COVID-19. (New York Daily News)
  - 2021–2022 Russo-Ukrainian crisis
  - Belarus–United States relations
  - The U.S. State Department announces that they have ordered government employees
    and their families to leave Belarus amid ongoing tensions between Russia and Ukraine.
    (The Hill)
  - Impact of the COVID-19 pandemic on sports
  - 2022 Winter Olympics
  - American bobsledder Elana Meyers announces that she has tested positive for COVID-19
    ahead of the upcoming Winter Olympics. (Time)
