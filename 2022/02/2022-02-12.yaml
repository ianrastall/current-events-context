Date: '2022-02-12'
Source_URI: Portal:Current events/2022 February 12
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - All British troops are ordered to withdraw from Ukraine. (The Independent)
  - Multiple nations, including Estonia, Iraq, Palestine, Spain and Taiwan, warn against
    traveling to Ukraine and urge their citizens to leave the country. (ERR) (NRT)
    (WAFA) (El País) (Focus Taiwan)
  - Israel declares a state of emergency due to tensions between Russia and Ukraine.
    (Haaretz)
  - KLM suspends all flights to Ukraine. (NL Times)
  - The Pentagon orders the departure of U.S. troops in Ukraine as tensions between
    Ukraine and Russia escalate. (CNBC)
  - The United States orders the evacuation of its embassy staff in Kyiv. (CNN)
  - Thousands of people protest against Russian military aggression in Kyiv, chanting
    "Glory to Ukraine" and "Ukrainians will resist". (Reuters)
  - Jihadist insurgency in Burkina Faso
  - French forces launch an airstrike on a jihadist camp in southern Burkina Faso,
    near the border with Benin, killing 40 combatants. The attack was a retaliation
    for the massacre of nine people (including a Frenchman) in Benin's W National
    Park earlier that week. (Voice of America)
  - 2018–2022 Turkish currency and debt crisis
  - President Recep Tayyip Erdoğan announces that the value-added tax (VAT) will be
    lowered from 8% to 1% on dairy products, fruit, vegetables, and other basic foods.
    The VAT reduction, aimed at countering soaring inflation, will go into effect
    on Monday. (Daily Sabah)
  - Bahrain–Israel relations
  - Bahraini authorities confirm that an Israeli military officer will be stationed
    inside the country as part of an upcoming international coalition consisting of
    34 countries. This is the first time an Israeli officer has been sent to a military
    post in the Arab World. (Reuters)
  - Lynching of Mushtaq Ahmed
  - A man accused of blasphemy is lynched by a mob in Tulamba, Mian Channu Tehsil,
    Khanewal District, Punjab, Pakistan. (BBC News)
  - COVID-19 protests in Canada
  - Freedom Convoy 2022
  - Protesters gather at the Peace Bridge near the Canada–United States border in
    an attempt to end the COVID-19 mandates in Canada. (USA Today) (Buffalo News)
  - 2021 FIFA Club World Cup
  - In association football, English club Chelsea win their first FIFA Club World
    Cup title after beating Brazilian club Palmeiras 2–1 after extra time in the final
    at the Mohammed bin Zayed Stadium in Abu Dhabi, United Arab Emirates. Chelsea
    defender Thiago Silva wins the tournament's Golden Ball award. (Al Jazeera)
