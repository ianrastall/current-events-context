Date: '2022-02-09'
Source_URI: Portal:Current events/2022 February 9
Intelligence_Payload:
  Uncategorized:
  - Colombian conflict
  - Two soldiers are killed during an insurgent attack against Infantry Battalion
    21 of the Colombian Army in Granada, Meta. (La FM)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Denmark
  - Queen Margrethe II tests positive for COVID-19, with mild symptoms. (NDTV)
  - COVID-19 pandemic in Slovenia
  - Slovenian Prime Minister Janez Janša tests positive for COVID-19, with mild symptoms.
    (Barron's)
  - COVID-19 pandemic in Spain
  - King Felipe VI tests positive for COVID-19, with mild symptoms. (Reuters)
  - COVID-19 pandemic in Sweden
  - Sweden scraps almost all pandemic restrictions, essentially declaring the pandemic
    as "over". The move is condemned by scientists in Sweden and abroad, who warn
    the pandemic still persists and continues to represent serious dangers. (Reuters)
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reports a record for the fifth consecutive day of 1,161 new COVID-19
    cases, thereby bringing the territory-wide total of confirmed cases to 17,808.
    Hong Kong also reports their first two deaths from COVID-19 since September. (South
    China Morning Post)
  - COVID-19 vaccine
  - Johnson & Johnson officially suspends production of its COVID-19 vaccine. It says
    production will likely resume later, and that millions of doses remain stocked
    for distribution per earlier agreements. (CBS News)
  - 2022 Winter Olympics
  - ROC at the 2022 Winter Olympics, Doping in Russia
  - Russian figure skater Kamila Valieva tests positive for banned substances after
    winning gold in the team event, delaying the medal ceremony. (AP News)
