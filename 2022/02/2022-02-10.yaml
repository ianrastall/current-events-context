Date: '2022-02-10'
Source_URI: Portal:Current events/2022 February 10
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - Belarus–Russia relations
  - Russia and Belarus begin a 10-day military exercise known as "Allied Resolve-2022"
    amid ongoing tensions with Ukraine. The United States and NATO denounce the exercise,
    with NATO calling it the biggest deployment of Russian troops since the Cold War.
    (CNBC)
  - Russia–Ukraine relations
  - Ukraine says that Russian Navy drills in the Black Sea and the Sea of Azov have
    made navigation "virtually impossible", stating that the drills are part of a
    "hybrid war" against the country. Foreign Minister Dmytro Kuleba says that the
    Sea of Azov is completely blocked, essentially blockading Ukrainian ports. (Reuters)
    (BBC News)
  - Ukraine–United States relations
  - U.S. President Joe Biden calls on any remaining Americans to leave Ukraine immediately
    due to increased threats of Russian military action. The U.S. State Department
    issues a level 4 travel warning, the highest level. (BBC News)
  - Jihadist insurgency in Burkina Faso
  - Four civilians are killed during a battle between French troops and Ansar ul Islam
    in Burkina Faso. Ten militants are killed in the clash, which involved support
    from an attack helicopter. (Reuters)
  - Yemeni Civil War (2014-present)
  - Houthi–Saudi Arabian conflict
  - An airstrike on Abha International Airport in the Saudi Arabian city of Abha injures
    twelve people. The attack was done by members of the Houthi movement. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - Spain lifts its outdoor mask mandate due to a decline in the spread of the Omicron
    variant. (GMA News Network)
  - COVID-19 pandemic in the United Kingdom
  - Charles, Prince of Wales, tests positive for COVID-19 for the second time. (Reuters)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in Western Australia
  - Western Australia reports a record 37 locally transmitted cases of COVID-19 in
    the past 24 hours. (ABC News Australia)
  - COVID-19 vaccination in Australia
  - The Australian Technical Advisory Group on Immunisation proposes changing the
    definition of a fully vaccinated person to only include people who have received
    a booster dose. (ABC News Australia)
  - COVID-19 pandemic in Costa Rica
  - Costa Rican president Carlos Alvarado Quesada tests positive for COVID-19. (Anadolu
    Agency)
  - COVID-19 pandemic in Tunisia
  - Tunisia lifts its nightly curfew due to a decrease in the number of COVID-19 cases,
    but extends the ban on gatherings for one week. (National Post)
  - Xenophobia and racism related to the COVID-19 pandemic
  - A South Korean envoy in New York City is attacked in an unprovoked assault. (Yahoo!
    News)
  - Aftermath of the Second Libyan Civil War
  - The interim Government of National Unity, intended to be dissolved by the 2021
    Libyan presidential election before its indefinite postponement, chooses former
    Interior Minister Fathi Bashagha to replace the incumbent, UN-recognized Prime
    Minister Abdul Hamid Dbeibeh, for his failure to hold the elections as agreed
    during the peace process. Dbeibeh rejects the appointment, saying that his replacement
    must be chosen by the eventual national election as per the aforementioned ceasefire
    agreement, reigniting fears of renewed warfare. (Al-Jazeera)
  - Archaeologists announce the discovery of a human tooth in the Grotte Mandrin near
    Malataverne, France, dating to 54,000 YBP, around 10,000 years before the currently
    accepted date for the arrival of Homo sapiens in Europe. (CNN)
