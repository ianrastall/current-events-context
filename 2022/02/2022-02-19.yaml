  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis
  - War in Donbas
  - The Donetsk People's Republic and Luhansk People's Republic declare a full military
    mobilisation, a day after beginning to evacuate civilians to Russia. (Reuters)
  - Two Ukrainian troops are killed and four others are injured by shelling from separatist
