Date: '2022-02-25'
Source_URI: Portal:Current events/2022 February 25
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive, Battle of Kyiv
  - The Ukrainian military says that it has blown up a bridge in order to prevent
    Russian forces from advancing to Kyiv. (Ukrinform)
  - Ukraine says that Russian troops have entered Kyiv and heavy fighting is underway.
    Videos on social media show tanks advancing through the city's Obolon neighbourhood.
    Gunfire and explosions are also reported in the city's Podilskyi District. (BBC
    News) (The Guardian)
  - The US Department of Defense says that Russia is losing momentum in its attack
    on Ukraine. (CNN)
  - Millerovo air base attack
  - Ukrainian OTR-21 Tochka missiles attack the Millerovo air base in Rostov oblast,
    Russia, destroying two Russian Air Force warplanes according to Ukrainian officials.
    Images appear to show the airbase on fire. (Newsweek) (RostovGazeta)
  - Battle of Starobilsk
  - A column of Russian soldiers is defeated by the Ukrainian army in Starobilsk.
    (Gazeta.ua)
  - Battle of Ivankiv
  - Ukrainian airborne assault troops engage Russian soldiers at Ivankiv and Dymer.
    (Gazeta.ua)
  - Battle of Chernihiv
  - A captain and corporal from the Russian 11th Guards Air Assault Brigade surrender
    to the Armed Forces of Ukraine near Chernihiv. (Gazeta.ua)
  - Battle of Sumy
  - Russian forces reportedly retreat from Sumy. (Channel 24)
  - Battle of Chernobyl
  - The Ukrainian government's State Nuclear Regulatory Inspectorate says that higher
    than usual gamma radiation levels have been detected in the Chernobyl Exclusion
    Zone after the power plant was captured by Russia. (The Telegraph)
  - Battle of Antonov Airport
  - The Russian Defence Ministry says that Russian Airborne Forces have recaptured
    the strategic Hostomel Airport near Kyiv, after assaulting the airbase with 200
    helicopters. (BBC News)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - Ukraine–NATO relations, 2022 NATO virtual summit
  - During an emergency NATO summit, Secretary General Jens Stoltenberg announces
    that NATO will provide weapons to Ukraine. He also announces that the NATO Response
    Force will be activated for the first time in history. (Reuters) (Stars and Stripes)
  - Kazakhstan–Russia relations
  - Kazakhstan will deny Russia’s request for troops to join the war. It will also
    not join Putin’s recognition of Donetsk People's Republic or Luhansk People's
    Republic. (NBC News)
  - Ukrainian President Volodymyr Zelenskyy accuses European leadership of "inaction"
    in face of the Russian invasion, saying "Like World War II, you said never again,
    but here it is again and you're not doing enough to respond". Zelenskyy also calls
    on citizens across the European Union to protest and force their governments to
    take more decisive action. (The Business Standard)
  - A Moldovan-flagged chemical tanker is hit by a missile near the Port of Odesa,
    seriously injuring two crew members, according to Moldova's naval agency. It is
    unclear who launched the missile. (Reuters)
  - Russian President Vladimir Putin urges the Armed Forces of Ukraine to "take power
    in your own hands" and overthrow the Ukrainian government, which he referred to
    as a "gang of drug addicts and neo-Nazis". (The Guardian)
  - Russian foreign ministry spokesperson Maria Zakharova warns both Finland and Sweden
    that they could face "detrimental military and political consequences" if they
    attempt to join NATO. (The Guardian)
  - Colombian conflict
  - At least 23 FARC dissidents are killed by the Colombian Army during an operation
    in Arauca Department. (Al Jazeera)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - Eurovision Song Contest 2022
  - Russia is disqualified from competing in the Eurovision Song Contest 2022 due
    to its invasion of Ukraine. (Euronews)
  - Expo 2020
  - The Dubai expo will be open to all nations despite Russia's invasion of Ukraine.
    (Reuters)
  - 2022 Sumatra earthquake
  - At least seven people are killed and 85 others are injured by an earthquake in
    Sumatra, Indonesia. The 6.2 magnitude earthquake is felt as far away as Malaysia
    and Singapore. (The Straits Times)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reports a record 10,010 new COVID-19 cases in the past 24 hours, which
    is the first time that the territory has reported more than 10,000 cases since
    the beginning of the pandemic. (ABC News)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record 61,631 new COVID-19 recoveries in the past 24 hours,
    thereby bringing the nationwide total of recoveries to 4.73 million. (detikNews)
  - COVID-19 pandemic in Kyrgyzstan
  - The Kyrgyzstan Health Ministry announces that the country plans to purchase doses
    of the Johnson & Johnson COVID-19 vaccine, as well as around 100,800 doses of
    the Moderna COVID-19 vaccine. (Trend)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record for the second consecutive day of 32,070 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 3.33 million.
    (Malay Mail)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - International sanctions during the Russo-Ukrainian War
  - Russia–Taiwan relations
  - Taiwanese Premier Su Tseng-chang announces that Taiwan will impose sanctions on
    Russia following the invasion of Ukraine. (Financial Post)
  - Russia–United Kingdom relations
  - Russia bans all British airlines from its airspace and airports in response to
    the UK's ban on its flag carrier Aeroflot. (Reuters)
  - Russia–European Union relations
  - The European Union freezes all assets held by Russian President Vladimir Putin
    and Foreign Minister Sergey Lavrov in the EU. (National Post)
  - Russia–United States relations
  - The Biden administration announces that the U.S. will join the European Union
    in imposing sanctions on Putin. (NBC News)
  - The Council of Europe announces the suspension of Russia's membership. (The Business
    Standard)
  - The Council of the OECD formally terminates the accession process of Russia to
    the organisation. (OECD)
  - Russia–Ukraine relations
  - Russian President Vladimir Putin tells Chinese President Xi Jinping that Russia
    is willing to hold talks with Ukraine. (Reuters)
  - Ukrainian President Volodymyr Zelenskyy urges Vladimir Putin to engage in talks
    in order to end the conflict. (Armenpress)
  - Kremlin Press Secretary Dmitry Peskov says that Russia has agreed to hold talks
    and will send a delegation to Minsk, Belarus. (The Wall Street Journal)
  - Ukrainian presidential advisor Mykhailo Podolyak says that the country is ready
    to hold talks with Russia on neutral status in order to implement a ceasefire.
    A time and place is expected to be announced. (Reuters) (The Independent)
  - President Zelenskyy calls for Israeli Prime Minister Naftali Bennett to serve
    as a mediator in talks between Ukraine and Russia. (Times of Israel)
  - Foreign relations of the Federated States of Micronesia
  - The Federated States of Micronesia suspends diplomatic ties with Russia. (Barron's)
  - China–Russia relations
  - Chinese Foreign Minister Wang Yi urges Russia to respect the "territorial sovereignty"
    of Ukraine and to "put an end to civilian casualties by resuming negotiations."
    (CNN)
  - Belarus–Ukraine relations
  - Secretary of the Belarus Foreign Ministry Anatoly Glaz says that Belarus is ready
    to help bring peace to Ukraine amid reports of possible peace talks in Minsk.
    (Belta)
  - Nuclear program of Iran
  - Russia–United States relations
  - U.S. State Department spokesperson Ned Price says that the U.S. will still engage
    with Russia in efforts to revive the Joint Comprehensive Plan of Action and prevent
    Iran from acquiring nuclear weapons despite Russia's invasion of Ukraine. (Reuters)
  - Travel during the COVID-19 pandemic
  - COVID-19 pandemic in Brazil, COVID-19 pandemic in Venezuela
  - Brazil and Venezuela will reopen their border after a two year closure due to
    the COVID-19 pandemic. (Reuters)
  - Protests against the 2022 Russian invasion of Ukraine
  - Ukrainians, Norwegians, and Russians hold a joint anti-war protest in Kirkenes,
    Norway, calling for Vladimir Putin to be tried at the International Criminal Court
    at The Hague, Netherlands. (BarentsObserver)
  - Protesters gather in Sarajevo, Bosnia and Herzegovina, to stand in solidarity
    with Ukraine. (Reuters)
  - Protesters gather at the Russian consulate in Edinburgh, Scotland, for a second
    consecutive day to express outrage over the war. (AOL)
  - Media freedom in Russia
  - Russia announces that it has partially restricted access to Facebook. (CNET)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - 2021–22 UEFA Champions League
  - UEFA announces the relocation of this year's Champions League final from the Krestovsky
    Stadium in Saint Petersburg to the Stade de France near Paris, in response to
    the crisis. (CNN)
  - 2022 Formula One World Championship
  - The Fédération Internationale de l'Automobile cancels this year's edition of the
    Russian Grand Prix in Sochi initially scheduled for September 25, stating that
    "it is impossible to hold the Russian Grand Prix in the current circumstances".
    (BBC Sport)
