Date: '2022-02-13'
Source_URI: Portal:Current events/2022 February 13
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - Operation Unifier
  - Canada withdraws its military advisors from Ukraine and relocates them to an undisclosed
    destination in Europe. It moves its diplomatic staff to Lviv, suspending all operations
    at its embassy in Kyiv. (Reuters)
  - Ukraine receives a shipment of FIM-92 Stinger anti-aircraft missile systems from
    Lithuania. (Reuters)
  - Ukraine formally requests a meeting with Russia and the Organization for Security
    and Co-operation in Europe within the next 48 hours in response to the crisis.
    (Daily Sabah)
  - Eight people are killed after a Pilatus PC-12 crashes near Beaufort, North Carolina.
    (Aviation Safety Network)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Nepal, Impact of the COVID-19 pandemic on education
  - Schools are reopened in Nepal after being closed for more than a month. (Times
    of India)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record of 56,431 new COVID-19 cases in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 1.35 million. (Manila
    Bulletin)
  - Eleven people are injured during a mass stabbing by a man riding a bicycle through
    Albuquerque, New Mexico, United States. The suspect is taken into custody. (ABC
    News) (Albuquerque Journal)
  - A car bombing in Ashkelon, Israel, kills one person and injures two more. The
    incident is most likely related to organized crime in Israel. (Times of Israel)
  - Canada convoy protest
  - Canadian police say a major demonstration at the Ambassador Bridge in Windsor,
    Ontario, has dispersed peacefully. The protesters had been given warnings for
    several days. (BBC News)
  - 2022 German presidential election
  - Frank-Walter Steinmeier is re-elected as president of Germany. (Deutsche Welle)
  - 2021 NFL season
  - The Los Angeles Rams defeat the Cincinnati Bengals, 23–20, to win Super Bowl LVI.
    (ESPN)
