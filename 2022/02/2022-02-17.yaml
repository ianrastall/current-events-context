Date: '2022-02-17'
Source_URI: Portal:Current events/2022 February 17
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis
  - War in Donbas
  - The Ukrainian government accuses Russian separatists of shelling a kindergarten
    in Stanytsia Luhanska, Luhansk Oblast using artillery, injuring three civilians.
    The Luhansk People's Republic says that its forces were attacked by the Ukrainian
    military with mortars, grenade launchers and machine gun fire. At least 32 shells
    hit the city, causing power outages and damaging multiple structures. (MSN) (The
    Guardian)
  - The United Nations Security Council convenes in order to discuss Russia's military
    buildup on the Ukrainian border. (C-SPAN)
  - The U.S. State Department confirms that the U.S. deputy ambassador to Russia was
    expelled from the country. White House Principal Deputy Press Secretary Karine
    Jean-Pierre calls the expulsion "unprovoked". (Reuters)
  - The EU High Representative for Foreign Affairs and Security Policy Josep Borrell
    says that shelling has begun in eastern Ukraine. (La Vanguardia)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - Senior British officials say that Russian President Vladimir Putin has now decided
    to invade Ukraine following "changes in the last 24 hours". (The Times)
  - Germany deploys 130 troops and 60 armoured personnel carriers to Lithuania. Lithuanian
    President Gitanas Nauseda says that the German forces are authorized to defend
    the country from threats. More troops are expected to arrive later this week.
    (Reuters)
  - Mali War, Operation Barkhane
  - France and the EU-wide Takuba Task Force announce that they will begin withdrawing
    from Mali, stating that the military government in place since last year's coup
    has placed "multiple obstructions" to their counter-terrorism operations. (Al
    Jazeera)
  - Panama-flagged car carrier MV Felicity Ace is abandoned approximately 90 nautical
    miles southwest of the Azores following a severe fire onboard. The ship's entire
    22-man crew safely evacuates using lifeboats. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in British Columbia
  - British Columbia lifts most of its COVID-19 restrictions, allowing all businesses
    to reopen and operate at full capacity. Indoor gatherings and organized events
    are also permitted to operate without occupancy limits. However, provincial mandates
    requiring the use of vaccine cards for entry into businesses and the use of masks
    in indoor settings remain in effect. (CBC)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - Governor Gavin Newsom announces that California will become the first U.S. state
    to approach COVID-19 as an endemic rather than a pandemic. (CBS News)
  - COVID-19 pandemic in the Dominican Republic
  - The Dominican Republic ends all COVID-19-related public health measures, including
    mask wearing mandates and use of vaccine passes in order to enter public places,
    despite not reaching 70% of its vaccination target. (U.S. News & World Report)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia surpasses 5 million cases of COVID-19. (Medcom.id)
  - COVID-19 pandemic in Japan
  - Japan reports a record 269 deaths from COVID-19 in the past 24 hours. (Nippon.com)
  - COVID-19 pandemic in New Zealand
  - New Zealand reports a record 1,929 new community transmitted COVID-19 cases in
    the past 24 hours. (New Zealand Herald)
  - COVID-19 pandemic in Switzerland
  - Swiss President Ignazio Cassis tests positive for COVID-19. (Reuters)
  - Canada convoy protest
  - Tamara Lich and Chris Barber, two organizers of the protest in Ottawa, are arrested
    by police. (CTV News)
  - Designated terrorist organisations in Australia
  - Australia designates the entirety of Hamas, including its political wing, as a
    terrorist organisation, and also designates Atomwaffen Division, Tahrir al-Sham
    and the Guardians of Religion Organization as terrorist organisations. (SBS News)
  - The Kuwaiti Ministers of Defense and the Interior, both members of the ruling
    Al-Sabah family, resign. The resignations are accepted by the Emir, who appoints
    a different member of the Al-Sabah family and Mohammad al-Fares, the current Oil
    Minister, to their respective posts. (Reuters)
  - The British government ends its immigrant investor programs, known as a Tier 1
    (Investor) visa, with "immediate effect". The scheme was introduced in 2008 in
    order to encourage wealthy people from outside the European Union to invest in
    the United Kingdom. (BBC News)
