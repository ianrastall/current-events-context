Date: '2022-02-22'
Source_URI: Portal:Current events/2022 February 22
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - Prelude to the 2022 Russian invasion of Ukraine
  - International recognition of the Donetsk People's Republic and the Luhansk People's
    Republic
  - Syria voices support for Russia's recognition of the Donetsk People's Republic
    and the Luhansk People's Republic as independent states. (Reuters)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - Anti-war protesters gather at the Russian Embassy in Berlin, Germany, to oppose
    President Vladimir Putin's decision to send soldiers to separatist regions in
    Ukraine. (CTV News)
  - Protesters also gather at the Russian Embassy in Kyiv to protest ongoing tensions
    between Russia and Ukraine. (Firstpost)
  - The United States calls the Russian troop deployments in eastern Ukraine "an invasion".
    (CTV News)
  - The Russian parliament ratifies the friendship and cooperation treaties with the
    DPR and LPR, following Putin's request made the previous day. (TASS)
  - The foreign ministers of European Union member states agree on a package of new
    sanctions against Russia. (Al Jazeera)
  - Germany suspends the Nord Stream 2 project in response to Russia's recognition
    of the Donetsk People's Republic and the Luhansk People's Republic as independent
    states. (Deutsche Welle)
  - The U.N. Security Council unanimously passes a resolution declaring that Iraq
    is no longer required to pay out to victims of its 1990 invasion of Kuwait. Iraq
    had paid out US$50 billion to 1.4 million claimants, including one claim to the
    Kuwait Petroleum Corporation that totaled US$14.7 billion, by the time of the
    resolution's passage. (Toronto Star)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong Chief Executive Carrie Lam announces a citywide testing campaign due
    to surge of the cases caused by the SARS-CoV-2 Omicron variant. It is planned
    to test each citizen three times during the campaign. (ABC News)
  - COVID-19 pandemic in Singapore
  - Singapore reports a record 26,032 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 622,293. (CNA)
  - Aftermath of the 2020 Nova Scotia attacks
  - A public inquiry into the 2020 shootings in Nova Scotia, Canada, that killed 22
    people is opened. (CBC News)
  - Persecution of Christians in North Korea, Religion in North Korea
  - A South Korean state commission confirms that retreating North Korean soldiers
    murdered over 1,150 South Korean Christian civilians in the early stages of the
    Korean War due to a state anti-religion campaign. (The Korea Times)
  - 20th National Congress of the People's Party (Spain)
  - The secretary general of the People's Party, Teodoro García Egea, resigns after
    a scandal over alleged spying on the President of the Community of Madrid Isabel
    Díaz Ayuso. (Swissinfo)
