Date: '2022-02-23'
Source_URI: Portal:Current events/2022 February 23
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2021–2022 Russo-Ukrainian crisis
  - Reactions to the 2021–2022 Russo-Ukrainian crisis
  - Ukraine announces the mobilization of its military reserves with a maximum service
    length of one year for reservists between the ages of 18 and 60 years. (The Hill)
  - Ukraine urges all citizens to leave Russia immediately, following an increase
    in tensions in the region. (MSN)
  - Ukraine closes its civilian airspace nationwide due to potential hazards. (Reuters)
  - Russia closes its airspace in a region to the east of its border with Ukraine.
    (FlightGlobal)
  - Tunisia announces that they will remove Death on the Nile from theaters over Gal
    Gadot’s role in the film and her normalization of Israel. (Al Mayadeen)
  - 2021–2022 global energy crisis
  - Brent Crude oil reaches its highest price since its 2014 peak, at $99 per barrel,
    amid rising tensions between Russia and Ukraine. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in South Korea
  - COVID-19 vaccination in South Korea
  - South Korea approves the use of the Pfizer–BioNTech COVID-19 vaccine for children
    between the ages of 5 and 11 years. (AP)
  - South Korea reports a record 171,452 new COVID-19 cases in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 2,329,182. (The Straits
    Times)
  - COVID-19 pandemic in Cambodia, COVID-19 vaccination in Cambodia
  - Cambodia begins its COVID-19 vaccination rollout for children over the age of
    three years, becoming the world's first country to administer vaccines for children
    under the age of five years. (Bangkok Post)
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reports a record 8,674 new COVID-19 cases in the past 24 hours, thereby
    bringing the territory-wide total of confirmed cases to 75,248. (South China Morning
    Post)
  - COVID-19 pandemic in Canada, COVID-19 drug development
  - The Canadian government signs an agreement with AstraZeneca to procure 100,000
    doses of the Evushield COVID-19 antibody therapy for use in high-risk patients.
    (CTV News)
  - Canada convoy protest
  - Prime Minister of Canada Justin Trudeau revokes the state of emergency that was
    declared under the Emergencies Act on February 14. (Reuters)
