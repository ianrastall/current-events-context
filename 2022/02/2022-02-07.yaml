Date: '2022-02-07'
Source_URI: Portal:Current events/2022 February 7
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 Russo-Ukrainian crisis
  - Germany–United States relations
  - German chancellor Olaf Scholz meets with U.S. president Joe Biden during his first
    visit to the United States in order to discuss the situation in Ukraine, saying
    that Germany will be "acting together" with the United States if Russia invades
    Ukraine. (CNN)
  - Thirteen people are killed and 34 injured after a tour bus crashed while descending
    a steep hill at Bantul, Yogyakarta, Indonesia. (Union of Catholic Asian News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Nigeria
  - Nigeria receives two million doses of the Janssen COVID-19 vaccine donated by
    the European Union. (All Africa)
  - COVID-19 pandemic in South Africa, COVID-19 vaccination in South Africa
  - The South African Health Products Regulatory Authority approves the use of the
    Sinopharm BBIBP COVID-19 vaccine for adults aged above 18 years. (The Straits
    Times)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reports a record for the third consecutive day of 614 new COVID-19 cases,
    thereby bringing the territory-wide total of confirmed cases to 16,022. (The Guardian)
  - COVID-19 pandemic in South Korea
  - South Korea ditches its Test-and-Trace strategy and instead focuses on maintaining
    essential social functions amid a rising number of COVID-19 cases caused by the
    SARS-CoV-2 Omicron variant. (Financial Times)
  - COVID-19 pandemic in Australia, Travel during the COVID-19 pandemic
  - Australia announces that it will reopen its international borders to fully vaccinated
    tourists on February 21, after a closure of almost two years in response to the
    COVID-19 pandemic. However, Western Australia is expected to continue to close
    its borders to tourists. (ABC News Australia)
  - COVID-19 protests in Canada
  - Freedom Convoy 2022
  - In Ottawa, seven people are arrested, more than 500 others are ticketed, and sixty
    criminal investigations are commenced, for a number of offenses related to the
    truckers' protest, including violations of the Highway Traffic Act, vandalism,
    and the smuggling of gasoline. (MSN)
  - 2021–2022 Tunisian political crisis
  - Tunisian police close the Supreme Judicial Council building in Tunis and prevent
    its members and their staff from entering. The legal body was dissolved yesterday
    by President Kais Saied in a move widely decried within the nation as illegal.
    (Al Jazeera)
