  - 2022 Petrópolis floods
  - At least 117 people are killed by mudslides and flooding in Petrópolis, Rio de
    Janeiro. It is the heaviest rainfall registered in the city since 1932. (Reuters)
  - List of fatal shark attacks in Australia
  - A man is killed in a shark attack off Little Bay, Sydney, Australia. It is the
    first fatal shark attack in Sydney since 1963. A witness estimated that the shark
    was about in length. (Reuters)
  - At least 13 people are killed after wedding guests fall into a well in Kushinagar,
    Uttar Pradesh, India. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record for the second consecutive day of 64,718 new COVID-19
    cases, thereby bringing the nationwide total of confirmed cases to 4.96 million.
    (detikHealth)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record 27,831 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 3.11 million. (The Star)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 90,443 new COVID-19 cases in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 1.55 million. (CNA)
  - COVID-19 pandemic in Switzerland
  - Switzerland lifts almost all of its COVID-19-related restrictions, with people
    no longer needing to show COVID-19 vaccine certificates to enter public venues,
    due to confidence that infection rates had been uncoupled from hospitalization.
    (Politico.eu)
  - Rule of Law Conditionality Regulation
  - The European Court of Justice dismisses Poland and Hungary's challenges against
    the regulation and confirms that the regulation is in compliance with the treaties
    of the European Union. This will allow the European Commission to suspend funds
    from the EU budget to member states that have rule of law issues which are likely
    to affect the management of EU funds. (Al Jazeera)
  - Philippine Basketball Association
  - The Alaska Aces, the second most successful team in the history of the league
    with 14 championship titles in 35 years, announced that it will cease to exist
    after the conclusion of the ongoing 2021 PBA Governors' Cup. (ESPN)
