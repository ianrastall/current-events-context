Date: '2022-03-12'
Source_URI: Portal:Current events/2022 March 12
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Russian soldiers have damaged the Sviatohirsk Lavra, a popular Orthodox pilgrimage
    site under the jurisdiction of Ukrainian Orthodox Church of the Moscow Patriarchate,
    at around 22:00 local time. (Kyiv Independent) (Ukrayinska Pravda)
  - Russia warns that it could fire on any future NATO armaments shipments to Ukraine,
    saying that the weapons shipments are "legitimate military targets" for its military.
    (Financial Times)
  - Iraqi conflict, 2022 Erbil rocket attacks
  - Iran launches twelve ballistic missiles at the Iraqi city of Erbil, Kurdistan
    Region, with explosions reported near the U.S. consulate and Erbil International
    Airport. The missiles are believed to be Fateh-110s. There are no reports of injuries
    or deaths. (The Jerusalem Post) (MSN) (Al Arabiya)
  - Iraqi security officials confirm that the missiles were launched from Iran and
    that several missiles hit the U.S. consulate building. (DW)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - 2022 boycott of Russia and Belarus
  - Pokémon Go suspends operations in Russia and Belarus following the invasion. (Gamerant.com)
  - The Central Bank of Russia announces that stock trading on the Moscow Stock Exchange
    will remain suspended until at least March 18 due to the fallout from the Russian
    invasion. (The Wall Street Journal)
  - 2022 Lualaba train accident
  - At least 61 people are killed and 54 more injured by a train crash in Lualaba
    Province, Democratic Republic of the Congo. (Al Jazeera)
  - 2022 California wildfires
  - The Hollister Fire near Santa Barbara County, grows to 1,000 acres, prompting
    evacuations off the Gaviota Coast. (Merced Sun-Star)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - China reports more than 3,100 cases of COVID-19, a new single-day record. (South
    China Morning Post)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 383,665 new COVID-19 cases in the past 24 hours.
    (Korea Herald)
  - COVID-19 pandemic in Vietnam
  - Vietnam reports a record 454,197 new COVID-19 cases in the past 24 hours, including
    a record 225,693 new cases in Hanoi, which is the highest single-day total in
    any municipality or province. (VnExpress)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–Ukraine relations
  - Israel–Ukraine relations, Israel–Russia relations
  - Ukrainian President Volodymyr Zelenskyy says that ceasefire negotiations between
    Russia and Ukraine should be held in Jerusalem. He also says that Israeli Prime
    Minister Naftali Bennett could have a positive impact on the negotiations. (Times
    of Israel)
  - Azerbaijan–Ukraine relations, Azerbaijan–Russia relations
  - Azerbaijani foreign policy adviser Hikmet Hajiyev says that Azerbaijan is open
    to holding talks between Ukraine and Russia. (Trend)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Protests against the 2022 Russian invasion of Ukraine
  - 2022 anti-war protests in Russian-occupied Ukraine, Battle of Melitopol
  - Demonstrators gather to protest the abduction of Melitopol mayor Ivan Fedorov.
    (BBC News)
  - Anti-war protesters gather in Florence, Tuscany, Italy, to listen to a videotaped
    speech by Volodymyr Zelenskyy. (Reuters)
  - International sanctions during the Russo-Ukrainian War
  - Italian police seize sailing yacht A at the Port of Trieste after its owner, Russian
    oligarch Andrey Melnichenko, was sanctioned by the European Union. (The Guardian)
  - Capital punishment in Saudi Arabia
  - Saudi Arabia executes 81 people, making it the largest execution in Saudi Arabian
    history, surpassing a January 1980 mass execution of 63 militants who were convicted
    of attempting to seize the Masjid al-Haram in Mecca. (Time)
  - 2022 Turkmenistan presidential election
  - A presidential election is held in Turkmenistan, with Serdar Berdimuhamedow expecting
    to be elected President of Turkmenistan to succeed his father, Gurbanguly Berdimuhamedow.
    (Al Jazeera)
  - Portuguese footballer Cristiano Ronaldo surpasses Josef Bican as the sport's official
    top goalscorer of all time as recorded by FIFA, after scoring his 806th and 807th
    goals during a Premier League match with Manchester United against Tottenham Hotspur.
    (The Indian Express)
