Date: '2022-03-03'
Source_URI: Portal:Current events/2022 March 3
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Siege of Chernihiv
  - The governor of Chernihiv Oblast says that at least 33 people have been killed
    and at least 18 others injured in Russian airstrikes on residential areas in Chernihiv.
    (National Post) (U.S. News & World Report) (NDTV)
  - Battle of Kharkiv
  - Thirteen students are killed at the National University of Kharkiv after a Russian
    shell struck a dormitory at the university's Academy of Culture. Five foreign
    students are among the dead, including four Chinese and one Indian student. (Taiwan
    News)
  - Kherson offensive
  - The Ukrainian Navy patrol vessel Sloviansk is destroyed in a Russian anti-ship
    missile strike off the Port of Odesa, resulting in the disappearance of all its
    crew. (Debrief)
  - Ukrainian refugee crisis
  - The United Nations High Commissioner for Refugees says that over one million Ukrainians
    have fled the country since the invasion began. (Al Jazeera)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–United States relations
  - Russia and the U.S. establish a hotline in an effort to prevent escalation between
    the two nuclear powers. (Reuters)
  - Russian Foreign Minister Sergey Lavrov says that the war on Ukraine will continue
    "until the end", and accuses Ukrainian President Volodymyr Zelenskyy of allowing
    "a society where Nazism is flourishing". Lavrov also says that Russia is not planning
    a nuclear war. (Reuters)
  - 2022 Russian financial crisis
  - Standard & Poor's downgrades Russia's debt from BB+ to CCC-, signalling that it
    believes that Russia is prone to defaulting on its obligations. (Reuters)
  - The Estonian cargo ship MV Helt sinks near the Port of Odesa in the Black Sea
    following an explosion. All six crew members on board were rescued, according
    to authorities. Estonian Foreign Minister Eva-Maria Liimets says that an investigation
    into the incident will occur. (Euronews)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - COVID-19 vaccination in France
  - French Prime Minister Jean Castex announces that France will lift their requirements
    for COVID-19 vaccine passports in access venues beginning on March 14. (France
    24)
  - COVID-19 pandemic in Estonia
  - Estonian President Alar Karis tests positive for COVID-19. (ERR)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reports a record for the second consecutive day of 56,827 new COVID-19
    cases, thereby bringing the total of confirmed cases in the territory to 350,557.
    The territory also reporting a record 144 deaths in the past 24 hours, thereby
    bringing the death toll in territory to 1,366. (South China Morning Post)
  - COVID-19 pandemic in Kazakhstan
  - COVID-19 vaccination in Kazakhstan
  - Kazakhstan begins its production of the Sputnik Light COVID-19 vaccine. (Kazinform)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Indiana
  - Indiana Governor Eric Holcomb signs an executive order ending the state’s COVID-19
    emergency. (The Indianapolis Star)
  - COVID-19 pandemic in New Zealand
  - New Zealand reports a record 23,183 new community transmitted COVID-19 cases in
    the past 24 hours. (New Zealand Herald)
  - Reactions to the 2021–2022 Russo-Ukrainian crisis, International reactions to
    the 2022 Russian invasion of Ukraine
  - Russia–Ukraine relations
  - Ukrainian President Volodymyr Zelenskyy says that the second round of talks between
    Ukraine and Russia have begun. (The Tribune India)
  - Ukrainian presidential adviser Mykhailo Podolyak says that Ukraine and Russia
    have not "achieved the desired results they wanted", but that Russia has agreed
    to a temporary ceasefire in humanitarian corridors, thereby allowing more time
    for civilian evacuations. Both sides are expected to hold a third round of talks
    beginning next week. (Reuters) (Forexlive)
  - President Zelenskyy calls for a personal meeting with Russian President Vladimir
    Putin in an effort to end the war. (MarketWatch)
  - Nuclear program of Iran
  - Iran–Saudi Arabia relations
  - Saudi Crown Prince Mohammed bin Salman says that his country will continue talks
    with regional rival Iran in order to reach an agreement between the two countries.
    Bin Salman also reaffirms his support for a "strong" nuclear deal that would prevent
    Iran from acquiring nuclear weapons. (Reuters)
  - Iran–United States relations
  - U.S. State Department principal deputy spokesperson Jalina Porter says that efforts
    to revive the 2015 Iran nuclear deal have made "significant progress" but urges
    Iran not to wait any longer. (Times of Israel)
  - Potential enlargement of the European Union
  - Prime Minister of Georgia Irakli Garibashvili signs a letter to formally apply
    for membership in the European Union. (Barron's)
  - Moldovan President Maia Sandu announces that Moldova is formally applying for
    EU membership. (Jerusalem Post)
  - Enlargement of NATO
  - The Assembly of the Republic of Kosovo approves a resolution urgently requesting
    the government to begin negotiations for the country's entry into NATO. (Reuters)
  - International reactions to the 2022 Russian invasion of Ukraine
  - International sanctions during the Russo-Ukrainian War
  - French authorities seize the yacht of Russian oligarch Igor Sechin in La Ciotat
    after the European Union blacklisted Sechin and froze his assets. (BBC News)
  - 2022 Armenian presidential election
  - The Armenian National Assembly elects Vahagn Khachaturyan in a second round as
    the new country's President. (RFE/RL)
  - International reactions to the 2022 Russian invasion of Ukraine
  - Media freedom in the European Union, Censorship in the United Kingdom
  - Russian television network RT is taken off-air in the EU and the United Kingdom
    due to its coverage of the Russian invasion of Ukraine. (BBC News)
  - RT America ceases production and fires most of its employees. It expects the layoff
    to be permanent. (CNN)
  - 2022 in archosaur paleontology
  - A new research published in the Journal of Vertebrate Paleontology shows that
    the stegosaur Bashanosaurus, also known as the Bashanosaurus primitivus, is the
    oldest dinosaur species to be discovered in Asia. (Phys.org)
  - Impact of the COVID-19 pandemic on sports
  - 2022 NFL season
  - The National Football League and National Football League Players Association
    announce that they will eliminate COVID-19 testing and other protocols for the
    2022 season following a revision to U.S. CDC guidelines and a decline in the number
    of COVID-19 cases. (ESPN)
  - 2022 boycott of Russia and Belarus
  - UEFA announces that they have banned Belarus from hosting international games
    due to its role in the invasion of Ukraine. (Bleacher Report)
