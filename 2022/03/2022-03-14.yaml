Date: '2022-03-14'
Source_URI: Portal:Current events/2022 March 14
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Siege of Mariupol
  - Local officials in Mariupol, Donetsk Oblast, say that over 160 cars have left
    the city in the first successful attempt to arrange a humanitarian corridor to
    evacuate the city. (Reuters)
  - Russia denies having requested military assistance from China, as alleged by several
    US officials. (BBC News) (Al Jazeera)
  - A Russian Air Force airstrike on a television tower in Rivne Oblast in Western
    Ukraine kills at least nine people, according to Rivne governor Vitaliy Koval.
    (Reuters)
  - A Russian Orlan-10 UAV crashes near a village in Bistrița-Năsăud County, Romania.
    (Euronews)
  - Nagorno-Karabakh conflict
  - 2021–2022 Armenia–Azerbaijan border crisis
  - Armenia–Azerbaijan relations
  - Armenian Foreign Minister Ararat Mirzoyan asks the OSCE Minsk Group to help initiate
    peace talks with Azerbaijan in an effort to normalize relations following the
    conflict. (ThePrint)
  - Yemeni Civil War
  - Famine in Yemen
  - The United Nations reports that around 161,000 people in Yemen are expected to
    face a famine in the second half of the year. (Bloomberg)
  - 2022 California wildfires
  - Evacuation warnings are lifted in Santa Barbara County after 50 percent of the
    Hollister Fire is contained. (KCRA-TV)
  - COVID-19 pandemic
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Impact of the COVID-19 pandemic on long-term care facilities
  - Long-term care homes in Ontario will keep their vaccine mandates for employees
    despite the province lifting all mandates. (Global News)
  - Ontario health officials report no deaths from COVID-19 in the past 24 hours for
    the first time since December 20. (CTV News Toronto)
  - COVID-19 pandemic in New Brunswick
  - New Brunswick lifts their COVID-19 restrictions including their mask mandate,
    social distancing rules, and limits on gatherings. (CBC)
  - COVID-19 pandemic in South Korea
  - COVID-19 vaccination in South Korea
  - Interior Minister Jeon Hae-cheol announces that South Korea will begin its COVID-19
    vaccine campaign for children between the ages of 5 and 11 years on March 31.
    Booster doses will also be administered for children between the ages of 12 and
    17 years. (Korea Herald)
  - COVID-19 pandemic in Germany
  - The incidence rate for COVID-19 reaches an all-time high in Germany for the third
    consecutive day, at a seven-day moving average rate of 1,543 infections per 100,000
    people. (Bloomberg)
  - COVID-19 pandemic in Russia
  - Moscow Mayor Sergey Sobyanin announces that the city has ended their mask requirements
    and other COVID-19 measures for business. (Reuters)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–Ukraine relations
  - The fourth round of talks between the Ukrainian and Russian delegations resumes
    in an effort to end the war but is delayed until tomorrow due to technical issues.
    (Wall Street Journal) (Reuters)
  - Russia–Slovakia relations
  - Slovakia expels three Russian diplomats for alleged espionage and bribery. (AP)
  - Germany–United States relations
  - Germany announces that it will buy 35 F-35 Lightning II fighter jets from the
    United States to replace its aging fleet of Panavia Tornados. Germany will also
    purchase 15 Eurofighter Typhoon jets from Airbus. (Reuters)
  - 2022 Russian invasion of Ukraine
  - Protests against the 2022 Russian invasion of Ukraine
  - 2022 anti-war protests in Russia
  - Marina Ovsyannikova, a Russian state television journalist, interrupts a live
    news broadcast of Channel One Russia, holding a sign saying "No War" and "Stop
    the war. Do not believe propaganda, they tell you lies here", and is promptly
    arrested. (MSN)
  - Anti-war protesters seize the mansion of Oleg Deripaska in London. Four of the
    protesters who were seen on the balcony of Deripaska's mansion are later arrested.
    (The Guardian)
  - International sanctions during the Russo-Ukrainian War
  - Andrey Turchak, the secretary-general of the ruling party United Russia, declares
    that the party will draft a bill criminalising compliance with the Western sanctions.
    (Kommersant)
  - 2022 Northeastern U.S. serial shooter
  - The New York City Police Department releases images of a suspected serial killer
    who has shot five homeless men, two fatally, in New York City and Washington,
    D.C. in the last week. (The New York Times)
  - Cameroon bans shisha smoking, becoming the sixth African country to do so. (Africanews)
  - Political impact of the COVID-19 pandemic
  - Jean Charest, a candidate for the upcoming Conservative Party of Canada leadership
    election, tests positive for COVID-19. (CBC)
  - A DDoS cyberattack temporarily takes down Israeli government websites, including
    the websites of the interior, health, justice, and welfare ministries and the
    prime minister's office. (Middle East Eye)
