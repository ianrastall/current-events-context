Date: '2022-03-28'
Source_URI: Portal:Current events/2022 March 28
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Irpin
  - Mayor Oleksandr Markushyn says that Irpin has been recaptured by Ukrainian Ground
    Forces. (Times of Israel)
  - Northeastern Ukraine offensive
  - Battle of Kharkiv
  - Russian artillery damages a school in Kharkiv. (Yahoo News) (Sky News)
  - Eastern Ukraine offensive
  - Russian troops shell Rubizhne, Luhansk Oblast, killing one person. (Ukrinform)
  - Trostyanets is retaken by Ukrainian Armed Forces. (Jerusalem Post)
  - 2022 Russia–Ukraine peace negotiations
  - Russia cautions against expecting any "significant breakthroughs" ahead of the
    first round of in-person negotiations with Ukraine. (MSN)
  - Two Ukrainian negotiators as well as sanctioned Russian oligarch Roman Abramovich
    are reported to have fallen victim to suspected poisoning during peace talks on
    the Belarus–Ukraine border earlier this month. Their health has since improved.
    (Reuters) (BBC News)
  - Ukrainian President Volodymyr Zelenskyy says that some mayors abducted by invading
    Russian forces have been found dead. (Ukrayinska Pravda) (The Economist)
  - Nigerian bandit conflict
  - Abuja–Kaduna train attack
  - Bandits bomb and open fire at a train in Kaduna State carrying 970 passengers
    travelling from Abuja to Kaduna, Nigeria, killing 7 people and wounding 22 more.
    Some others are kidnapped. (BBC News)
  - Kivu conflict
  - Militants belonging to the March 23 Movement attack military bases near Goma in
    the Democratic Republic of the Congo. Congolese authorities say that two Rwandan
    soldiers were participating in the attack. The movement have regrouped and retaken
    strategic areas for the first time since their defeat in 2013. (Reuters)
  - P&O sacking of 800 staff
  - The United Kingdom's Maritime and Coastguard Agency seizes P&O Ferries-operated
    ferry MS Pride of Kent at the Port of Dover after the ferry "failed safety checks"
    by authorities. It is the second P&O Ferries ship to be detained by UK authorities
    since the firm fired all 800 British crew members and replaced them with cheaper
    agency workers. (Sky News)
  - The Department for Transport gives P&O Ferries a deadline of March 31 to rehire
    all the fired staff. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - COVID-19 pandemic in Shanghai
  - Shanghai enters two-stage lockdown which close all non-essential businesses after
    the city reporting 3,500 new COVID-19 cases. (Forbes)
  - COVID-19 pandemic in Indonesia
  - Indonesia surpasses six million cases of COVID-19. (Medcom.id)
  - COVID-19 pandemic in Israel
  - Prime Minister Naftali Bennett tests positive for COVID-19. (Jerusalem Post)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in Victoria
  - Premier Daniel Andrews tests positive for COVID-19. (Sky News Australia)
  - COVID-19 pandemic in Andorra
  - The Andorran government announces the lifting of indoor mask usage, except in
    health care institutions, as well as the need for antigen testing for nightlife.
    The government also announces the relaxation of the protocol for positive contacts.
    (Andorra Difusió)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Kazakhstan–Russia relations
  - Kazakhstan says that it does not want to be behind a "new iron curtain", and that
    international companies boycotting Russia are welcome to "move production to Kazakhstan".
    (Reuters)
  - Abraham Accords
  - The foreign ministers of Israel, Egypt, Morocco, Bahrain and the United Arab Emirates,
    as well as the United States Secretary of State, meet in Sde Boker, Israel, and
    agree to hold regular meetings about regional security and commit to further expanding
    economic and diplomatic cooperation. (Times of Israel) (The Washington Post)
  - Mexican drug war
  - Las Tinajas massacre
  - Twenty people are killed and four more are injured in a mass shooting at an illegal
    cockfighting pit in Las Tinajas, Michoacán, Mexico. (BBC News)
  - Former Honduran President Juan Orlando Hernández will be extradited to the United
    States on drug trafficking charges. (France 24)
  - 2021–2022 Tunisian political crisis
  - Speaker of the Assembly Rached Ghannouchi announces that the parliament will hold
    two full sessions this week, the first time since President Kais Saied seized
    most executive powers and suspended parliament last July, to try to block attempts
    by Saied to adopt a new constitution that will solidify his rule. (Reuters)
