Date: '2022-03-30'
Source_URI: Portal:Current events/2022 March 30
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - Ukraine says that Russian artillery and aircraft have targeted a Red Cross hospital
    in the city of Mariupol. (Times of Israel)
  - Battle of Chernobyl
  - Ukrainian Deputy Prime Minister Iryna Vereshchuk calls for Russia to withdraw
    from the Chernobyl Exclusion Zone area and for Russian troops occupying the former
    nuclear plant to pull out. (Reuters)
  - A U.S. official says that Russian forces have begun withdrawing from the Chernobyl
    area and have moved into Belarus. (France 24)
  - 2022 Ukrainian refugee crisis
  - The United Nations High Commissioner for Refugees says more than four million
    Ukrainians have fled the country since the invasion began on February 24. (France
    24)
  - Insurgency in Khyber Pakhtunkhwa
  - The Tehrik-i-Taliban Pakistan attack a military base in Tank, Pakistan, killing
    six soldiers. (Arab News)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - U.S. President Joe Biden receives his second booster shot of the COVID-19 vaccine.
    (CBS News)
  - COVID-19 pandemic on cruise ships
  - The U.S. CDC removes their travel warnings for cruise ships, which were imposed
    during the beginning of the pandemic. However, passengers will still be required
    to be vaccinated and to test negative for COVID-19. (The Washington Post)
  - Treatment and management of COVID-19
  - According to a new study, the antiparasitic drug ivermectin does not prevent hospitalizations
    from COVID-19. (New England Journal of Medicine)
  - Reactions to the 2022 Russian invasion of Ukraine
  - 2022 Russia–Ukraine peace negotiations
  - Ukrainian negotiator Davyd Arakhamia says that the Russian and Ukrainian delegations
    will resume their peace talks online on April 1 after the latest round of negotiations
    in Turkey has ended. (Reuters)
  - 2021–2022 North Korean missile tests
  - North Korea–South Korea relations
  - The South Korean military says that last week, North Korea tested Hwasong-15 from
    November 2017, instead of a Hwasong-17. This comes a day after the defense ministry
    and lawmakers also confirmed this. (DW) (CBS News)
  - Iran–United States relations
  - Iranian missile tests
  - The United States sanctions the Iranian ballistic missile program. (CNN)
  - Russia–South Ossetia relations
  - The President of South Ossetia, Anatoly Bibilov, declares that the partially recognised
    state will undertake "legal steps" in the near future for accession to become
    part of Russia. (Meduza)
  - 2021–2022 Tunisian political crisis
  - Tunisian President Kais Saied orders the Assembly of the Representatives of the
    People to be dissolved, after 116 of the 124 MPs who convened online voted earlier
    in the day to strip Saied of the "exceptional measures" he had taken on since
    last July. (Reuters)
  - Cyberwarfare by Russia
  - Russia announces that it will ban all usage of software from other countries in
    government agencies beginning in 2025. Additionally, beginning on March 31, all
    foreign software purchases for government agencies must be pre-approved by the
    government. (Reuters) (TASS)
  - It is reported that Russian government hackers have attacked and compromised the
    servers of Hungary's Ministry of Foreign Affairs since late 2021. (Direkt36)
  - South Korea launches a solid-fuel indigenous space rocket at the Agency for Defense
    Development site in Taean County, South Chungcheong Province. (Korea Herald)
  - The Hubble Space Telescope observes the most distant single star ever. The star,
    named Earendel by astronomers, is 28 billion light-years away. It is the farthest
    detection of a star, dating back 900 million years after the Big Bang. This discovery
    surpasses Hubble's record from 2018, when it discovered a star that existed when
    the universe was roughly four billion years old. (CNN)
  - 2021–22 UEFA Women's Champions League knockout phase
  - A crowd of 91,553 attends the second leg of the quarterfinal between archrivals
    FC Barcelona and Real Madrid at Camp Nou in Barcelona. This surpasses the 90,185
    at the 1999 FIFA Women's World Cup Final and is reportedly the largest attendance
    for a women's football match since Mexico–Denmark (110,000) in 1971. Barça won
    5–2 on the day and 8–3 on aggregate. (ESPN)
