Date: '2022-03-27'
Source_URI: Portal:Current events/2022 March 27
Intelligence_Payload:
  Uncategorized:
  - 2022 Hadera shooting
  - Two policemen are killed and 12 more people are injured during a mass shooting
    by two Islamic State gunmen at a bus stop in Hadera, Haifa District, Israel. The
    attackers are shot dead. (Reuters) (Times of Israel)
  - 94th Academy Awards
  - CODA wins this year's Best Picture, while Jane Campion wins Best Director for
    The Power of the Dog. (CNN)
  - Will Smith wins Best Actor for his portrayal of Richard Williams in King Richard,
    while Jessica Chastain wins Best Actress for her portrayal of Tammy Faye Messner
    in The Eyes of Tammy Faye. (ABC News) (The Guardian)
  - Dune wins the most awards in six, mostly untelevised categories. (Showbiz Cheat
    Sheet)
  - CODA star Troy Kotsur wins Best Supporting Actor, becoming the first deaf male
    actor to win an Academy Award. (Variety)
  - West Side Story star Ariana DeBose wins Best Supporting Actress, becoming the
    first queer woman of colour to win an Academy Award (The Guardian)
  - Celebrities at the Awards wear blue and gold ribbons to stand in solidarity with
    Ukraine and pay tribute to the refugees. (USA Today) (The Wrap)
  - Wildfires in 2022
  - Ukrainian Human Rights commissioner Lyudmyla Denisova warns that around 10,000
    hectares of forest fires are currently burning near the Chernobyl Exclusion Zone.
    (The Independent)
  - A wildfire engulfs the uninhabited Gruinard Island in Gruinard Bay, Scotland.
    (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - COVID-19 pandemic in Shanghai
  - Shanghai imposes a lockdown in the Pudong area and other parts of the city. Additionally,
    areas near the Huangpu River will undergo four days of COVID-19 testing beginning
    tomorrow. (South China Morning Post)
  - COVID-19 pandemic in Hong Kong
  - Chief Executive Carrie Lam announces that Hong Kong will begin offering COVID-19
    vaccinations at home for elderly people in the coming weeks in order to increase
    the vaccination rate. (Bloomberg)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–Ukraine relations
  - Ukrainian delegate Davyd Arakhamia announces that in-person ceasefire talks between
    the Ukrainian and Russian delegations will occur in Turkey. The talks are expected
    to occur from March 28 to March 30. (Ukrinform)
  - Nuclear program of Iran
  - U.S. Secretary of State Antony Blinken says that the U.S. and their Gulf allies
    will deter Iran from acquiring a nuclear weapon, regardless if a deal to revive
    the 2015 agreement has been reached or not. (CNN)
  - Protests against the 2022 Russian invasion of Ukraine
  - 2022 anti-war protests in Russia
  - Russian artist Yevgenia Isayeva douses herself in fake blood during an anti-war
    protest in Saint Petersburg. She is later detained by police. (RFE/RL)
  - Crime in El Salvador
  - El Salvador declares a state of emergency after 62 people were murdered in the
    country yesterday, making it the most violent 24-hour period since the end of
    the civil war in 1992. (BBC News)
  - 2022 Uruguayan Law of Urgent Consideration referendum
  - A referendum is held in Uruguay on whether to repeal the Urgent Consideration
    Law, which gives the government more power to dismantle protests and increased
    security measures after record high crime rates in Uruguay in 2017. (MercoPress)
