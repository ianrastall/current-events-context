Date: '2022-03-23'
Source_URI: Portal:Current events/2022 March 23
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Kyiv
  - Four people are injured by a series of Russian Air Force strikes on infrastructure
    in Kyiv. (Euronews)
  - Russian journalist Oksana Baulina is killed in shelling in Kyiv's Podilskyi District.
    (BBC News)
  - A laboratory near the Chernobyl Exclusion Zone is looted and destroyed by Russian
    soldiers. (CNN)
  - Somali Civil War
  - March 2022 Somalia attacks
  - Two Kenyan guards and a Somali policeman are killed during a shooting attack by
    al-Shabaab gunmen at Mogadishu International Airport. Two of the attackers are
    also killed. Several more people are wounded. All domestic and international flights
    at the airport are suspended. (Reuters)
  - Two suicide bombers blow themselves up targeting a vehicle carrying politician
    Amina Mohamed Abdi in Beledweyne, killing her and 47 more people. At least 105
    more are injured. (Reuters)
  - Yemeni Civil War
  - A car bombing kills four people in Aden, Yemen, including a Brigadier General.
    (Reuters)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - 2022 boycott of Russia and Belarus
  - Sanofi suspends the delivery of non-essential drugs to Russia and Belarus. However,
    essential and life-changing medicines and vaccines will still be delivered. (Reuters)
  - Nestlé announces that it will suspend sales of non-essential items in Russia,
    following similar company boycotts to Russia. (Reuters)
  - Russian President Vladimir Putin demands that countries that he deems "unfriendly"
    pay for deliveries of natural gas in rubles. (Bloomberg)
  - The Moscow Stock Exchange will reopen in a limited capacity on March 24, ending
    the almost month-long shutdown of the stock exchange's activities. (Bloomberg)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - House Sergeant at Arms William J. Walker and Capitol physician Brian P. Monahan
    announce that a phased reopening of the United States Capitol will begin next
    week after the Capitol was closed for 2 years due to the COVID-19 pandemic. (The
    Hill)
  - COVID-19 vaccination in the United States
  - Moderna says that it will ask the U.S. FDA for approval of their COVID-19 vaccine.
    (The New York Times)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Quebec
  - Quebec health officials approve a fourth dose of the COVID-19 vaccine for high-risk
    groups in order to prepare for the possibility of a sixth wave of COVID-19 cases
    in the province. (Global News)
  - COVID-19 pandemic in South Africa
  - South Africa lifts its remaining COVID-19 restrictions including mandatory PCR
    tests for vaccinated travellers as the number of COVID-19 cases continues to decline.
    (Al Jazeera)
  - COVID-19 pandemic in South Korea
  - South Korea surpasses 10 million cases of COVID-19. (Sky News)
  - Foreign relations of Russia
  - Poland–Russia relations
  - Poland expels 45 staff of the Russian embassy in Warsaw for "spying activities".
    (Rzeczpospolita)
  - Anatoly Chubais, the special envoy of the Kremlin for ties with international
    organisations, resigns from his post and leaves Russia. (Reuters)
  - Belarus–Ukraine relations
  - Belarus expels most Ukrainian diplomats, accusing Kyiv of interfering in Belarus's
    domestic affairs. Only five diplomats will remain at the embassy in Minsk. Belarus
    additionally orders the closure of the Ukrainian consulate in Brest. (AFP via
    The Straits Times)
  - Nuclear program of Iran
  - Iranian Foreign Minister Hossein Amir-Abdollahian says that Iran and other world
    powers are closer to finalizing an agreement to revive the 2015 nuclear deal.
    (Reuters)
  - Aftermath of the 2021 United States Capitol attack
  - Criminal charges in the 2021 United States Capitol attack
  - Capitol riot suspect Evan Neumann has been granted asylum in Belarus "indefinitely".
    Neumann claimed that he faced "political persecution" in the United States. (BBC
    News)
  - Israeli–Palestinian conflict
  - The Israel Border Police arrests 17 Palestinians whom it suspects of taking part
    in riots last month. (Times of Israel)
