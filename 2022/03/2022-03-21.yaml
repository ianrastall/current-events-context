Date: '2022-03-21'
Source_URI: Portal:Current events/2022 March 21
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Kyiv
  - Kyiv shopping centre bombing
  - A Russian airstrike destroys a shopping mall in Kyiv, killing at least eight people.
    (The Washington Post)
  - Siege of Mariupol
  - Russia gives Ukraine a 5 a.m. (3 a.m. UTC) deadline to surrender the city of Mariupol.
    (The Guardian)
  - Ukraine rejects the Russian ultimatum to surrender its control of Mariupol, with
    Deputy Prime Minister Iryna Vereshchuk saying "we have already informed the Russian
    side about this". (BBC News)
  - Sumykhimprom chemical plant ammonia leak
  - An ammonia leak occurs at the Sumykhimprom chemical plant in Sumy. (The Kyiv Independent)
  - Insurgency in the Maghreb
  - Jihadist insurgency in Burkina Faso
  - Islamist militants ambush soldiers in Gourma Province, Burkina Faso, killing 13
    soldiers. (The Guardian)
  - Kashmir conflict
  - Militants shoot and kill a civilian in Budgam district, Jammu and Kashmir, India.
    (Hindustan Times)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - The Moscow Stock Exchange reopens for bond trading after being closed for almost
    a month following the invasion. (BBC News)
  - Norway will provide financial support to students from Ukraine, Russia, and Belarus.
    (Schengen Visa)
  - China Eastern Airlines Flight 5735
  - A China Eastern Boeing 737NG crashes near Wuzhou, Guangxi, China, killing all
    the 132 people on board. The plane descended more than in just over a minute.
    (CSB News)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario removes their mask mandate for most settings with the exception of public
    transportation, long-term care and retirement homes, congregate care and living
    facilities, homes for individuals with developmental disabilities, other healthcare
    settings, shelters, and jails. (Global News)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Louisiana
  - New Orleans lifts their COVID-19 vaccine mandate for bars and restaurants. (NOLA.com)
  - COVID-19 pandemic in Hong Kong
  - Chief Executive Carrie Lam announces that, beginning next month, Hong Kong will
    lift its COVID-19 restrictions and will also end its ban on flights from the U.S.
    and eight other countries. (NBC News)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–Ukraine relations
  - Ukrainian President Volodymyr Zelenskyy says that he will consider dropping Ukraine's
    request to join NATO in exchange for a ceasefire. (Axios)
  - Myanmar–United States relations
  - International reactions to the Rohingya genocide
  - The United States formally recognizes the Rohingya genocide committed by the Myanmar
    Army. (Reuters)
  - Nuclear program of Iran
  - Iranian Supreme Leader Ali Khamenei expresses his support for negotiations and
    efforts to revive the 2015 nuclear deal. He also says that the Iranian economy
    should not be tied to efforts to ease U.S. sanctions against the country. (Infobae)
    (Reuters)
  - 2022 Corsica unrest
  - Corsican nationalist leader Yvan Colonna dies several weeks after being assaulted
    in prison by another inmate. The attack resulted in riots on the French island,
    which injured dozens of people. (Digital Journal)
  - International sanctions during the 2022 Russian invasion of Ukraine
  - The Royal Gibraltar Police seize a superyacht, owned by Russian oligarch Dmitry
    Pumpyansky, docked at the Port of Gibraltar. Pumpyansky is currently sanctioned
    by the United Kingdom and the European Union. (Reuters)
  - 44th Canadian Parliament
  - The Liberal Party of Canada reaches a tentative confidence-and-supply agreement
    with the New Democratic Party (NDP) that would see the NDP prop up the minority
    Liberal government until 2025 in exchange for progress on longtime NDP policy
    priorities. (CTV News)
  - Internet censorship in Russia
  - A Russian court bans Facebook and Instagram for "extremism". (The Moscow Times)
  - The Roskomnadzor, the Russian media regulator, blocks Euronews. (Novaya Gazeta)
  - Discoveries of exoplanets
  - NASA announces that they have discovered their 5000th exoplanet since 1992, when
    astronomers Aleksander Wolszczan and Dale Frail announced the discovery of two
    exoplanets orbiting PSR B1257+12. (Science News)
  - Doping in Russia, Russia at the Olympics
  - Russian racewalker Elena Lashmanova is banned from the Olympics for two years
    and will be stripped of her gold medal at the 2012 Summer Olympics following doping
    allegations against her. (ESPN)
