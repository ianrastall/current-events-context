Date: '2022-03-29'
Source_URI: Portal:Current events/2022 March 29
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine offensive
  - Battle of Mykolaiv
  - Mykolaiv government building airstrike
  - A missile strike hits the regional administration's headquarters in Mykolaiv,
    killing twelve people and injuring 22 others. (Reuters)
  - Kyiv offensive, Northeastern Ukraine offensive
  - Russian troops begin retreating from positions in Kyiv Oblast and Chernihiv Oblast,
    according to Ukrainian and American officials. The United States European Command
    confirms the Russian withdrawal, observing a "major strategy shift". (U.S. News
    & World Report) (Times of Israel)
  - Attack on Snake Island
  - Roman Hrybov, the border guard who told the Russian warship command over the radio
    "Russian warship, go fuck yourself" in defiance of its order to surrender Snake
    Island, is freed in a prisoner swap. Initial reports erroneously suggested that
    13 border guards on the island had died. (The Guardian)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–NATO relations
  - The U.S. deploys 200 marines from the Marine Air Control Group 28, 10 F/A-18 Hornet
    fighter jets, and an unspecified number of C-130s to Lithuania as part of NATO's
    response to Russian military aggression in Eastern Europe. (USNI)
  - 2022 Russia–Ukraine peace negotiations
  - The Ukrainian and Russian delegations hold face-to-face peace talks in Turkey
    for the first time in two weeks. (AP)
  - Russian officials agree to "fundamentally cut back military activity in the direction
    of Kyiv and Chernihiv" during the negotiations. (The Guardian)
  - A shell strikes a temporary Russian military camp near the city of Belgorod, 25
    km from the Russia–Ukraine border. Russian authorities report at least four injuries,
    and say that the shell was fired from Ukrainian territory. Ukraine denies firing
    the missile, instead attributing the strike to an error on Russia's part. (Reuters)
  - Israeli–Palestinian conflict
  - 2022 Bnei Brak shootings
  - Five people are killed and another is injured during a series of drive-by shootings
    in Bnei Brak, Tel Aviv District, Israel. The attacker, a Fatah sympathizer, is
    shot dead. (Jerusalem Post) (Times of Israel)
  - Yemeni Civil War
  - The Saudi-led military coalition suspends all military activity in Yemen. (Arab
    News)
  - Nigerian bandit conflict
  - Bandits attack villages in the Bakura and Talata Mafura local government areas
    of Nigeria. Many people are killed. (Premium Times)
  - Kivu conflict
  - 2022 MONUSCO helicopter crash
  - Six Pakistani crew members and a Russian and a Serbian soldier are killed as a
    MONUSCO helicopter crashes in the Democratic Republic of the Congo. The rebel
    March 23 Movement group is accused of being behind the crash. The group has denied
    their involvement. (Reuters)
  - 2022 boycott of Russia and Belarus
  - It is announced that officials from Russia and Belarus will not be welcomed at
    the upcoming ceremony to mark the liberation of the Buchenwald concentration camp
    due to their role in the invasion of Ukraine. (Forbes)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - The U.S. FDA and the CDC approve fourth doses of the Pfizer and Moderna COVID-19
    vaccines for people over the age of 50 years. (CNBC) (NBC News)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Belgium–Russia relations, Czech Republic–Russia relations, Ireland–Russia relations,
    Netherlands–Russia relations
  - Belgium, the Netherlands, Ireland and the Czech Republic expel Russian diplomats.
    (Reuters)
  - Estonia–Russia relations, Latvia–Russia relations, Lithuania–Russia relations
  - Russia expels diplomats from Estonia, Latvia, and Lithuania, in retaliation for
    the earlier expulsions of Russian diplomats from these countries. (Reuters)
  - 2021–2022 North Korean missile tests
  - North Korea–South Korea relations
  - South Korean lawmakers and the defense ministry say that last week, North Korea
    has tested a Hwasong-15, which was successfully tested in November 2017, instead
    of a Hwasong-17. (ABC News) (AP)
  - The Democratic Republic of the Congo joins the East African Community, becoming
    the largest country in both area and population to do so, and thereby granting
    the bloc access to the Atlantic Ocean. (Bloomberg)
  - International sanctions during the Russo-Ukrainian War
  - The United Kingdom's National Crime Agency seizes the 58.5 metre superyacht PHI
    on the River Thames in London after its unnamed Russian oligarch owner was sanctioned
    by the British government. (Reuters)
  - Lynching in the United States
  - U.S. President Joe Biden signs the Emmett Till Antilynching Act into law, which
    makes lynching a federal crime. (CBS News)
  - 2021–2022 Belarus–European Union border crisis
  - A regional court in the border town of Hajnówka rules that pushbacks against migrants
    on the Belarus–Poland border violated Polish law. (Gazeta Wyborcza) (Rzeczpospolita)
