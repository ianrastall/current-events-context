Date: '2022-03-22'
Source_URI: Portal:Current events/2022 March 22
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Kyiv
  - Ukrainian forces say that they have retaken Makariv, a suburb near Kyiv. (BBC
    News)
  - Siege of Mariupol
  - Russian Navy warships in the Sea of Azov shell Ukrainian-held areas of Mariupol.
    (ABP Live)
  - 2022 Russia–Ukraine peace negotiations
  - UN Secretary-General António Guterres says that there is diplomatic progress on
    several key issues in the situation in Ukraine in an effort to end the "unwinnable"
    war. (United Nations)
  - Kremlin Press Secretary Dmitry Peskov says that Russia will only use its nuclear
    weapons if the country faces an "existential threat" amid growing concerns that
    Russia will use nuclear weapons in Ukraine. (Reuters)
  - 2022 Beersheba attack
  - Four people are killed and two others are injured during a vehicle-ramming and
    mass stabbing attack in Beersheba, Southern Israel. The attacker, an Islamic State
    supporter, was shot dead by a bus driver. (Haaretz)
  - Five Ancient Egyptian tombs are discovered in Egypt. (Jerusalem Post)
  - 2022 boycott of Russia and Belarus
  - Danish shipping company Maersk announces its complete withdrawal from the Russian
    economy and says that it will liquidate all of its Russian assets. (Trans.info)
  - LG Electronics suspends all shipments to Russia and says that the company "remains
    committed to supporting humanitarian relief efforts". (UPI)
  - French oil and natural gas company TotalEnergies announces that it will no longer
    buy Russian oil by the end of the year and will also terminate additional investments
    in Russia. (The New York Times)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - White House Press Secretary Jen Psaki tests positive for COVID-19 for the second
    time. (AP)
  - COVID-19 pandemic in Norway
  - King Harald V tests positive for COVID-19. (ABC News)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–Ukraine relations
  - Kremlin Press Secretary Dmitry Peskov says that the ongoing ceasefire talks should
    be "more active and substantial". (The Moscow Times)
  - Eight people are killed in an arson attack in Birbhum, West Bengal, India. (The
    Hindu)
  - Two teachers are killed by a student during a stabbing attack at a secondary school
    in Malmö, Sweden. The perpetrator, an 18-year-old boy, is arrested. (BBC News)
  - Russian opposition leader Alexei Navalny is convicted of fraud and sentenced to
    nine years in prison by a Russian court, which claims that Navalny stole millions
    in donations from his supporters. (Sky News)
  - 44th Canadian Parliament
  - Prime Minister Justin Trudeau announces that the Liberal Party has finalized a
    confidence-and-supply agreement with the New Democratic Party. (CTV News)
  - Australia announces the creation of the Defence Space command, saying it is designed
    to counter Russia and Mainland China's ambitions in outer space. The new agency's
    servicemembers will come from the army, navy, air force, and will also include
    private contractors. (BBC News)
