Date: '2022-03-09'
Source_URI: Portal:Current events/2022 March 9
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - A Russian airstrike destroys a maternity ward and a children's hospital in Mariupol,
    Ukraine, killing three people and injuring at least 17 people. President Volodymyr
    Zelenskyy says that many people are unaccounted for. (Business Insider) (AP) (The
    Chicago Tribune) (Sky News)
  - Battle of Kharkiv
  - Ukrainian forces announce that they have regained control of Derhachi, a city
    located in the Kharkiv Raion district of the Kharkiv Oblast. (Ukrinform)
  - Ukrainian refugee crisis
  - The United Nations High Commissioner for Refugees says over two million Ukrainians
    have now fled the country since the invasion began. Most have gone to neighbouring
    Poland, with Hungary, Romania and Slovakia also taking in several hundred thousand
    refugees each. (DW)
  - Poland–United States relations
  - The Pentagon rejects an offer from Poland's foreign ministry to "deploy – immediately
    and free of charge – all their MIG-29 jets" to the Ramstein Air Base and place
    them at the disposal of the Government of the United States of America" for transfer
    to the Ukrainian Air Force. (Reuters) (Reuters 2)
  - Reactions to the 2022 Russian invasion of Ukraine
  - The British Army confirms that a number of active-duty soldiers have disobeyed
    orders and gone AWOL, and have likely gone to Ukraine to fight against the Russian
    military. Defence Minister Ben Wallace says that the serving members are "breaking
    the law and will be prosecuted" when they return to the United Kingdom. (Sky News)
  - The United Kingdom's Defence Ministry says that it is sending another 1,615 MBT
    LAWs, and a small number of FGM-148 Javelin anti-tank missiles to the Ukrainian
    army. More small arms, body armour and medical supplies have also been sent. (BBC
    News)
  - 2021–2022 Russo-Ukrainian crisis
  - 2022 Russian financial crisis
  - Fitch Ratings downgrades Russia from "B" to "C", one grade above default, and
    warns that Russian default on its obligations is "imminent". (BBC News)
  - The Russian Ministry of Economic Development proposes a draft nationalisation
    bill that will impose receivership for up to 3 months on assets of companies that
    boycotted the Russian market due to the Russian invasion of Ukraine if the ownership
    share by legal entities from "unfriendly countries" exceeds 25%. If the companies
    still do not resume their business in the country, their assets will be auctioned.
    More than 300 companies that left Russia or suspended operations in Russia could
    be targeted. (TASS)
  - 2022 boycott of Russia and Belarus
  - New Jersey Governor Phil Murphy signs a legislation banning the state from doing
    business dealings with Belarus and Russia. (Patch.com)
  - John Deere announces that it will suspend shipments to Russia and Belarus following
    the invasion. (WBTV-TV)
  - American industrial conglomerate 3M suspends all business operations in Russia.
    (Reuters)
  - The Chinese Foreign Ministry announces that China will provide 5 million yuan
    ($790,000) in humanitarian aid to Ukraine. (South China Morning Post)
  - 2022 Russian invasion of Ukraine
  - The Ukrainian state grid operator warns that Russian forces, which are in control
    of the Chernobyl Nuclear Power Plant, have disconnected the plant from the electricity
    grid, which the operator says will impact nuclear fuel cooling, and which also
    caused a blackout in the nearby city of Slavutych. The nuclear plant previously
    suspended all communications with the IAEA, the United Nations-based organisation
    specialising in nuclear energy production. (The Independent) (Interfax Ukraine)
  - Ukrainian Foreign Minister Dmytro Kuleba says that reserve diesel generators that
    cool spent nuclear fuel can only last for another 48 hours and that a radiation
    leak from Chernobyl is "imminent" if power is not restored immediately. Kuleba
    also says that "Putin's barbaric war" puts all of Europe in danger. However, the
    International Atomic Energy Agency says there is "no critical impact on security"
    imminent. (Times of Israel) (Reuters)
  - 2022 eastern Australia floods
  - Prime Minister Scott Morrison declares a national emergency in Australia in response
    to the ongoing floods in Australia. (ABC News Australia)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austria suspends its universal COVID-19 vaccine mandate one week before fines
    of up to €3,600 were scheduled to take effect for those who did not comply with
    the mandate. The suspension of the mandate will be reviewed in three months. (Politico)
  - COVID-19 pandemic in Romania
  - Romania lifts all COVID-19-related restrictions including requiring a digital
    COVID pass to access institutions and the obligation to wear protective masks
    both indoors and outdoors. (Reuters)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 342,446 new COVID-19 cases in the past 24 Hours.
    (CNA)
  - Reactions to the 2022 Russian invasion of Ukraine
  - International sanctions during the Russo-Ukrainian War
  - Russia–United States relations
  - Kremlin spokesman Dmitry Peskov tells the United States to "await its response"
    to the "economic war" being waged against Russia. (Reuters)
  - Russia–United Kingdom relations
  - The UK bans all Russian aircraft from landing in its territory and travelling
    in its airspace, impounding a Russian oligarch-owned private jet at Farnborough
    Airport. The UK also bans all exports of aviation and space industry-related goods
    and services. (Reuters)
  - Russia–Ukraine relations
  - Russian Foreign Minister Sergey Lavrov arrives in Ankara, Turkey, for upcoming
    talks with Ukrainian Foreign Minister Dmytro Kuleba. (Reuters)
  - Ukrainian foreign policy aide Ihor Zhovkva says that Ukraine is open to holding
    talks discussing Russia's demand of Ukraine's neutrality as long as Ukraine is
    given security guarantees. However, Zhovkva warned that Ukraine will not give
    up any of its territories. (Bloomberg)
  - 2022 South Korean presidential election
  - Preliminary results of the presidential election show a narrow victory for the
    conservative candidate Yoon Suk-yeol. (The New York Times)
  - The wreck of Ernest Shackleton's ship Endurance, which sank in 1915, has been
    located beneath the Weddell Sea. (The New York Times)
  - 2022 Major League Baseball season
  - 2021–22 Major League Baseball lockout
  - Major League Baseball postpones opening day to April 14 after failing to reach
    a deal with the Major League Baseball Players Association. (Bleacher Report) (ABC
    News)
