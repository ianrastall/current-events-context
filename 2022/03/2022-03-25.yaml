Date: '2022-03-25'
Source_URI: Portal:Current events/2022 March 25
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Kyiv
  - Russia says that it used Kalibr cruise missiles to destroy a major oil terminal
    near Kyiv. (Reuters)
  - Battle of Kherson
  - A United States defense official states that the Russian forces are no longer
    in full control of Kherson, the only major city they had captured in Ukraine.
    (The New York Times)
  - Belarusian involvement in the 2022 Russian invasion of Ukraine
  - Belarusian President Alexander Lukashenko reaffirms that Belarus has "no plans
    to fight in Ukraine". However, he also warned that Belarus could join the war
    if aggression is launched against it. (TASS)
  - Russia says that the first phase of the invasion has been completed. (BBC News)
  - The Russian Defence Ministry updates its official casualty figures in Ukraine,
    stating that 1,351 troops have been killed in action and 3,825 others have been
    injured since the "special military operation" began on February 24. (Eurasian
    Times)
  - Yemeni Civil War
  - Houthi–Saudi Arabian conflict
  - Houthi rebels launch 16 missile and drone attacks on Saudi Arabian cities. An
    airstrike also hits an ARAMCO facility in Jeddah, setting fire to an oil storage
    facility near a Formula One racing track where drivers were preparing for the
    2022 Saudi Arabian Grand Prix. (ABC News) (France 24)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - 2022 boycott of Russia and Belarus
  - Iranian officials consider the possibility of recognising the electronic payment
    system MIR, in response to moves to ban Russian banks from SWIFT. (Iran Daily)
    (MEMonitor)
  - COVID-19 pandemic
  - COVID-19 pandemic in Brazil
  - COVID-19 vaccination in Brazil
  - The Butantan Institute opens a factory that will develop more products of China’s
    CoronaVac COVID-19 vaccine beginning in 2023. (Xinhua)
  - COVID-19 pandemic in Japan, COVID-19 drug development
  - The Government of Japan signs a basic agreement with Shionogi to provide million
    doses of oral COVID-19 treatment the company is now developing pending the regulatory
    approval. (Reuters)
  - Travel during the COVID-19 pandemic
  - Emirates Airline will resume flights to India and return to pre-COVID-19 levels
    beginning on April 1. (Al Arabiya)
  - Afghanistan–United States relations
  - Treatment of women by the Taliban
  - The U.S. State Department cancels meetings with the Taliban leadership in Doha,
    Qatar, dealing with the Afghan economy, in response to the Taliban barring high-school
    girls from returning to school. (Reuters)
  - 2021–2022 North Korean missile tests
  - The Korean Central News Agency confirms that North Korea tested an ICBM yesterday,
    which is revealed to be the Hwasong-17. (Yonhap)
  - Finland–Russia relations
  - Finland's state-owned VR Group announces that it will suspend all train services
    on the Riihimäki–Saint Petersburg railway, which connects Helsinki and Saint Petersburg,
    on March 28. The suspension will close one of the last public transport routes
    to the European Union for Russians. (Al Arabiya)
  - Russia investigation origins counter-narrative
  - Former U.S. President Donald Trump files a lawsuit against Hillary Clinton, alleging
    that her campaign tried to rig the 2016 United States presidential election by
    creating a false narrative that tied Trump's campaign to the Russian government.
    Trump is seeking compensatory and punitive damages worth US$24 million. (Reuters)
    (The Washington Post)
