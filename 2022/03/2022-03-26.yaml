    News) (I News)
  - Anti-war protesters gather in London to stand in solidarity with Ukraine. (The
    Guardian)
  - 2022 Maltese general election
  - Maltese citizens go to the polls to elect members of the Parliament. (Euronews)
  - 65 terabytes of data belonging to the Federal Air Transport Agency (Rosaviation),
    the Russian airspace regulator, gets lost indefinitely in a hacker attack, which
    is said to be one of the largest ever. The data lost includes all official documents,
    files on its servers, the public procurement system of Rosaviation, as well as
    all emails for the last one and a half years; no backups are available. As a result,
    the agency is forced to switch to paper-based workflow. (Kommersant) (Aviation24.be)
