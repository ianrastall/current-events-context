  - Reactions to the 2022 Russian invasion of Ukraine
  - Russia–United States relations
  - U.S. President Joe Biden declares in a speech that Russian President Vladimir
    Putin "cannot remain in power". In response to reports that the statement constitutes
    a call for regime change, the White House later releases a statement saying that
    Biden's "point was that Putin cannot be allowed to exercise power over his neighbors
    or the region. He was not discussing Putin's power in Russia, or regime change".
    In response to Biden's statement, the Kremlin states that this is a choice of
    the Russian people. (CNN) (The Hill)
  - Protests against the 2022 Russian invasion of Ukraine
  - 2022 anti-war protests in Russian-occupied Ukraine
  - Slavutych mayor Yurii Fomichev is released by Russian soldiers after protesters
