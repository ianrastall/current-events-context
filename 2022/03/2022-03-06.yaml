Date: '2022-03-06'
Source_URI: Portal:Current events/2022 March 6
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - France–Russia relations
  - In a phone call with French president Emmanuel Macron, Russian president Vladimir
    Putin says that Russia will no longer attack nuclear power plants and is open
    to holding a trilateral meeting between Russia, Ukraine, and the International
    Atomic Energy Agency. (Politico.eu) (FactoPress)
  - Ukrainian president Volodymyr Zelenskyy says that Havryshivka Vinnytsia International
    Airport in Vinnytsia Oblast has been "completely destroyed" after being hit with
    eight Russian ballistic missiles. (The Guardian)
  - The Ukrainian military says that it has killed over 11,000 Russian troops since
    the invasion began, while Russian Defence Ministry spokesman Maj. Gen. Igor Konashenkov
    said on Wednesday that 498 Russian troops had been killed. (Reuters) (The Week)
  - U.S. officials claim that Russia has started recruiting Syrian mercenaries experienced
    in urban combat. (The Wall Street Journal)
  - Terrorism in India, Kashmir conflict
  - A militant attacks a marketplace in Srinagar, Jammu and Kashmir, with a grenade,
    killing a man and injuring 24 others. (The Times of India)
  - Israeli-Palestinian conflict
  - A 19-year-old Palestinian stabs an Israeli police officer in the Old City of Jerusalem.
    Police open fire on the attacker, killing him. One of the police is injured by
    friendly fire. (The Times of Israel) (Al Jazeera)
  - Insurgency in the Maghreb
  - The Nigerien government confirms reports that five soldiers were killed on Friday
    by an improvised explosive device bombing in Torodi, Tillabéri Region. (TRT World)
  - 2022 Russian invasion of Ukraine
  - Ukraine suspends all exports of rye, oat, buckwheat, millet, sugar, salt, and
    most meat and meat products that are fit for human consumption, as the country
    expects poor harvests and food shortages. (Dzerkalo Tyzhnia)
  - United States–Venezuela relations, 2021–2022 global energy crisis
  - The United States start talks with Venezuela about supplies of its oil, currently
    under sanctions, in an attempt to substitute the Russian crude. So far the talks
    yielded few results. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in New Zealand
  - The Chatham Islands near New Zealand reports its first case of COVID-19. (TVNZ)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Enlargement of NATO
  - Ukraine–NATO relations
  - Ukrainian negotiator Davyd Arakhamia says that Ukraine is open to having non-NATO
    discussions in the future. (Reuters)
  - Russia–Turkey relations
  - Turkish president Recep Tayyip Erdoğan calls for Russian president Vladimir Putin
    to declare a ceasefire between Russia and Ukraine. Putin tells Erdoğan that he
    is ready for dialogue in an effort to end the war but also warns that any attempt
    to draw out negotiations could fail. He also calls for Ukraine to cease fighting
    in order for the military campaign to end. (The Moscow Times) (Reuters)
  - Israel–Russia relations
  - Israeli prime minister Naftali Bennett says that his country will try to mediate
    a ceasefire between Ukraine and Russia even if attempts are not successful. (Reuters)
  - Protests against the 2022 Russian invasion of Ukraine
  - 2022 anti-war protests in Russia
  - Around 4,000 anti-war demonstrators are arrested during protests in cities across
    Russia that are aimed at opposing the invasion. (BBC News)
  - Kazakhstan will allow anti-war protests in the country amidst fears that the country
    could be sanctioned. Protesters gather in Almaty to protest Russia’s invasion
    of Ukraine. (Rferl) (France 24)
  - Protests against responses to the COVID-19 pandemic
  - A convoy of truckers inspired by the Canadian convoy protesters gather at the
    Capital Beltway in Washington, D.C. to call for all COVID-19 restrictions and
    mandates to be lifted. (CNN)
  - Kwangmyŏngsŏng program
  - North Korea says that it performed data transmission and other key tests to make
    a reconnaissance spy satellite. This comes a day after the country conducted a
    missile test. (ABC News)
  - International sanctions during the Russo-Ukrainian War
  - A Russian government directive is published ordering moving all government institutions
    and Internet service providers servicing them to switch to Russian DNS servers
    and (whenever possible and applicable) to the .ru domain zone as well as substitute
    all foreign-hosted Javascript code with equivalent code hosted onshore by March
    11. Russian authorities, however, do not plan to cut off from the global Internet
    network themselves. (The Register) (Kommersant)
