  - 2022 Ukrainian Kharkiv counteroffensive
  - Amid a renewed counter-offensive in the region, Ukrainian forces reportedly break
    through Russian defenses and advance more than 30 kilometers into Russian held
    territory in the Kharkiv Oblast, capturing many towns and cities including Balakliia.
    (The Guardian)
  - 2022 Africa floods
  - 2022 Kasese District landslides
  - Fifteen people are killed by landslides caused by heavy rain in Kasese District,
    Uganda. (Reuters)
  - 2022 Pacific hurricane season
  - Hurricane Kay strengthens into a Category 2 hurricane south of Baja California
    Sur, Mexico. (Washington Post)
  - Eleven people are killed and two others are injured by a building collapse in
    Aleppo, Syria. (AP)
  - 2022 monkeypox outbreak
  - Egypt confirms its first case of monkeypox. (Reuters)
  - 2022 Saskatchewan stabbings
  - The remaining suspect in Sunday's stabbing spree is arrested outside Wakaw, Saskatchewan.
    He later dies in custody. (CTV News Regina) (Global News)
  - 2022 Memphis shootings
  - Three people are killed and three others injured after a gunman goes on a livestreamed
    shooting spree in Memphis, Tennessee, United States. A 19-year-old suspect is
    arrested. (WSMV-TV)
  - Albania–Iran relations
  - The government of Albania suspends diplomatic relations with Iran after a major
    cyberattack allegedly occurs. Iranian diplomats and embassy staff are told to
    leave Albania within 24 hours. (Reuters) (BBC News)
  - Gervais Ndirakobuca becomes the new prime minister of Burundi, following unanimous
    approval by the National Assembly. (Reuters)
