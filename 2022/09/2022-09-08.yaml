Date: '2022-09-08'
Source_URI: Portal:Current events/2022 September 8
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Seven people are killed and 12 others are injured by airstrikes in Idlib Governorate,
    Syria. (AP)
  - Eleven people are killed and 12 others are missing after a boat sinks off the
    coast of Tunisia. (BBC)
  - Nine people are killed and two others are injured by a lightning strike in Sirajganj,
    Bangladesh. (Xinhua)
  - Fourteen people are killed when a boat capsizes in Pará, Brazil. (Reuters)
  - International sanctions during the 2022 Russian invasion of Ukraine
  - Poland–Russia relations, Estonia–Russia relations, Latvia–Russia relations, Lithuania–Russia
    relations
  - Poland and the Baltic states announce a ban on Russian tourists entering their
    countries beginning on September 19. (EER)
  - Former White House Chief Strategist and Senior Counselor to the President of the
    United States Steve Bannon pleads not guilty to state charges in New York for
    allegedly defrauding donors to build a wall on the U.S. southern border. (AP)
  - Death of Elizabeth II, Operation London Bridge
  - Buckingham Palace announces that Queen Elizabeth II has died at the age of 96
    at Balmoral Castle in Scotland. She is succeeded as monarch by her son King Charles
    III. (BBC News)
  - The parliament of Solomon Islands votes to delay the next general election amid
    objections by opposition parties, who accuse Prime Minister Manasseh Sogavare
    of a "power grab". (Reuters)
