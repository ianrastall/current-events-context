    after three years of construction. (Al Arabiya)
  - 2022 Pacific typhoon season
  - The Japan Meteorological Agency urges residents to evacuate southern parts of
    the island of Kyushu as super Typhoon Nanmadol approaches. An official for the
    agency warns that Nanmadol can bring "unprecedented" storms and rain to the area.
    (Reuters)
  - Twenty-two people are killed and 10 others are injured by a landslide in Achham,
    Nepal. (Reuters)
  - Nine people are killed and 55 others are rescued after a bus crashes in Alajuela
    Province, Costa Rica, during heavy rains. (Reuters)
  - Politics of the Philippines
  - Vic Rodriguez steps down as Executive Secretary and will continue to be Bongbong
    Marcos chief of staff. (Inquirer)
