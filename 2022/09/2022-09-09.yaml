Date: '2022-09-09'
Source_URI: Portal:Current events/2022 September 9
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Northeastern Ukraine campaign
  - Governor of Sumy Oblast Dmytro Zhyvytskyi says that Russian forces have shelled
    a hospital in Velyka Pysarivka, causing an unspecified number of casualties. (Radio
    Free Europe/Radio Liberty)
  - 2022 Ukrainian Kharkiv counteroffensive
  - Ukraine claims to have retaken more than 1,000 square kilometers of territory
    previously occupied by Russia, within the last week. (BBC News)
  - Three people are killed and 11 others are injured when a freight train and a passenger
    train collide in Novska, Croatia. (AP)
  - Iran–United States relations
  - The United States Department of the Treasury sanctions the Iranian Ministry of
    Intelligence and Intelligence Minister Esmaeil Khatib in response to a cyberattack
    against Albania. (Al Jazeera)
  - North Korea and weapons of mass destruction
  - North Korea passes a new law formally declaring itself a "nuclear state". The
    law includes the right of North Korea to use "preemptive" nuclear strikes as Kim
    Jong-un promises to "never give up" the country's nuclear weapons. (CNN)
  - Mexico transfers control over its National Guard to the Mexican Army. (Reuters)
  - A new lunar mineral is discovered by the Beijing Research Institute of Uranium
    Geology, which is named Changesite–(Y). (Interesting Engineering)
