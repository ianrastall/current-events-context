Date: '2022-06-04'
Source_URI: Portal:Current events/2022 June 4
Intelligence_Payload:
  Uncategorized:
  - Aftermath of the 2021 Kyrgyzstan–Tajikistan clashes
  - Tajikistan says that a border clash happened yesterday after Kyrgyz soldiers crossed
    the border close to Vorukh. (Reuters)
  - Hapur chemical plant explosion
  - Nine people are killed and 19 others injured after a boiler explodes at a chemical
    plant in Hapur, Uttar Pradesh, India. (AP)
  - One person is killed and eight others injured when a train derails in Guizhou,
    China. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Russia
  - Dmitry Kovtun, a former KGB agent accused of the fatal 2006 poisoning of Kremlin
    critic Alexander Litvinenko in London, dies from COVID-19 in Moscow. (RFE/RL)
  - 2022 monkeypox outbreak
  - Timeline of the 2022 monkeypox outbreak
  - India reports its first suspected monkeypox case in a girl from Ghaziabad. (Hindustan
    Times)
  - 2022 Philadelphia shooting
  - Three people are killed and eleven others wounded in a mass shooting in the South
    Street neighbourhood of Philadelphia, Pennsylvania, United States. (Reuters)
  - A man is publicly lynched by a mob of 200 people in the Nigerian capital city
    Abuja after he gets into a "heated argument" with a local Islamic cleric. (Reuters)
  - 2022 Albanian presidential election
  - After three sessions in which the proposed candidates failed to obtain the necessary
    votes, the Parliament of Albania elects Chief of the General Staff Bajram Begaj
    as the new Albanian President. (Reuters)
  - 2021–2022 Tunisian political crisis
  - The Tunisian judiciary announces that it will suspend work in all of the courts
    and go on strike for a week in response to President Kais Saied dismissing 57
    judges earlier this week. (Reuters)
  - The Judicial Council for Iraq's Kurdistan Region rejects a ruling from the federal
    Supreme Judicial Council demanding that the regional government hand over its
    oil supply, stating that the oil-sharing agreement enshrined in the national constitution
    did not apply to oil and gas discovered after 2005. (Reuters)
  - Japanese yachtsman Kenichi Horie becomes the oldest person to sail solo across
    the Pacific Ocean at the age of 83. (The Japan Times)
