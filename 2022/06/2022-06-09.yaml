Date: '2022-06-09'
Source_URI: Portal:Current events/2022 June 9
Intelligence_Payload:
  Uncategorized:
  - Jihadist insurgency in Burkina Faso
  - Militants kill at least one soldier and one civilian in the Karma gold mine in
    Yatenga Province, Burkina Faso. (Reuters)
  - Eleven gendarmes are killed during an attack by unidentified militants in Seytenga
    Department, Séno Province. (Reuters)
  - 2022 Democratic Republic of the Congo–Rwanda tensions
  - The Democratic Republic of the Congo (DRC) claims that 500 disguised members of
    the Rwandan special forces have intruded into the DRC. (Reuters)
  - Boko Haram insurgency
  - Twenty-five people are killed in an attack by gunmen on motorcycles in Dikwa,
    Borno State, Nigeria. (Reuters)
  - A People's Liberation Army Air Force Chengdu J-7 aircraft crashes in a residential
    area in Laohekou, Hubei, China, killing at least one person on the ground as the
    pilot ejects out of the aircraft. (CNN)
  - The bodies of two disabled people are found in Roadford Lake, near Okehampton,
    Devon, England, a day after their boat capsized on the lake. Four others are in
    hospital, with one in critical condition. (BBC News)
  - One person is killed and one other is injured after heavy flooding in Tirana,
    Albania. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Maryland
  - Governor Larry Hogan outlines a long-term preparedness plan on how Maryland will
    deal with COVID-19 including a focus on treatments that would keep people out
    of hospitals as well as on how the state would respond to future variants. (The
    Washington Post)
  - 2022 monkeypox outbreak
  - 2022 monkeypox outbreak in Spain
  - Spain will begin vaccinations of close contacts of monkeypox using the Imvanex
    vaccine after 242 cases were reported in the country. (Reuters)
  - 2021–2022 Belarus–European Union border crisis
  - Poland decides to lift its state of emergency over attempts by migrants to cross
    the Belarus–Poland border, saying that the border barrier it has been building
    is mostly complete. (AP)
  - A 2-seater Beechcraft plane violates the airspace of seven countries in Eastern
    Europe, and is intercepted by two Hungarian Air Force Gripen jets, two USAF F-16s
    and two Romanian Air Force F-16s before being abandoned at an airfield near Targovishte,
    Bulgaria. (The Straits Times)
  - Daegu office fire
  - Seven people are killed and 46 others are injured by a fire, suspected to be an
    arson attack, that spread through an office building in Daegu, South Korea. The
    suspect is killed in the fire. (AP)
  - Cannabis in Thailand
  - Thailand removes cannabis and hemp plants from its list of illegal narcotics,
    and will allow people to grow an unlimited number of these plants in farms and
    gardens for medicinal purposes as long as they inform the authorities. However,
    public consumption of these plants is discouraged by official authorities. (The
    Guardian)
  - Three people are killed and another is injured in a mass shooting in Smithsburg,
    Maryland, United States. (AP)
  - The Donetsk People's Republic (DPR) sentences to death two Britons and a Moroccan
    who had joined Ukrainian forces on charges of terrorism, mercenary activities,
    and attempting to overthrow the DPR's government. (AP)
  - The European Parliament adopts a resolution urging to amend the treaties of the
    European Union in order to abolish the unanimity principle in decisionmaking with
    respect to sanctions and foreign policy and to grant the Parliament the right
    to legislative initiative. (Politico)
  - NASA announces that the James Webb Space Telescope collided with a micrometeoroid
    last month, but continues to function normally. (Phys.org)
