Date: '2022-06-11'
Source_URI: Portal:Current events/2022 June 11
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Battle of Donbas, Eastern Ukraine offensive
  - Battle of Sievierodonetsk
  - Russian forces shell the Azot chemical plant in Sievierodonetsk, Luhansk Oblast.
    Governor Serhiy Haidai says that the attack has caused a massive fire at the plant.
    (Reuters)
  - Jihadist insurgency in Burkina Faso
  - 2022 Seytenga massacre
  - Suspected jihadists massacre over 100 men in Seytenga Department, Séno Province,
    Burkina Faso. (Reuters)
  - A helicopter missing since 9 June is found crashed near Modena, Emilia-Romagna,
    Italy. All seven people on board were killed in the crash. (Reuters)
  - Iran–Venezuela relations
  - Top oil and petrochemicals producers Iran and Venezuela sign a 20-year economic
    cooperation agreement. (Reuters)
  - The former president of Bolivia Jeanine Áñez is sentenced to ten years in prison
    for the crimes of breach of duty and resolutions contrary to the Constitution
    and laws of Bolivia during the 2019 Bolivian political crisis. (elDiarioAR.com)
  - Foreign relations of North Korea
  - North Korea appoints Choe Son-hui as its next foreign minister. (Reuters)
  - March for Our Lives Demonstrations
  - Demonstrators participate in more than 450 rallies nationwide to push for gun
    law changes after mass shootings in United States. (NBC News) (NPR)
