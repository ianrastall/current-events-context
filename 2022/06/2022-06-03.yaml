Date: '2022-06-03'
Source_URI: Portal:Current events/2022 June 3
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Battle of Donbas
  - Battle of Sievierodonetsk
  - Two Reuters journalists are injured and their driver is killed after their vehicle
    is attacked while travelling to Sievierodonetsk. The perpetrators have not been
    identified. (Times of Israel)
  - Russian occupation of Kharkiv Oblast
  - Vitaly Ganchev is announced as head of the Kharkiv Military-Civilian Administration.
    His appointment might have happened earlier as he was de facto Governor since
    April 2022.(2day.kh.ua)
  - 2022 food crises
  - Chad declares an emergency over food insecurity in the country. The United Nations
    estimates that more than a third of the population are in need of urgent humanitarian
    aid. (Africanews)
  - Garmisch-Partenkirchen train derailment
  - Five people are killed and 60 others are injured after a train derails in Garmisch-Partenkirchen,
    Bavaria, Germany. (VOA)
  - 2022 Russian mystery fires
  - A fire occurs in a building in Moscow, Russia, injuring at least four people,
    with 125 people being rescued. However, the total number of people trapped inside
    the building is unclear. (AP)
  - 2022 monkeypox outbreak
  - Latvia confirms its first case of monkeypox. (Reuters)
  - United States health officials say that 1,200 doses of the smallpox vaccine have
    been administered for patients considered at a high-risk for monkeypox. (CNN)
  - 2019–2022 Sudanese protests
  - A protester is killed in Khartoum after security forces open fire on demonstrators
    on the third anniversary of the Khartoum massacre. (Reuters)
  - Estonia's coalition agreement collapses as the junior coalition partner, the Centre
    Party, joins the far-right EKRE in defeating a government bill on primary education,
    and is subsequently expelled by Prime Minister Kaja Kallas. Kallas is expected
    to form a coalition with two other parties, Isamaa and the Social Democrats. (Reuters)
  - Germany's Bundestag approves a constitutional amendment that enshrines €100 billion
    in military spending. The amendment must now pass the Bundesrat. (AFP via France
    24)
  - Legality of cryptocurrency by country or territory
  - The U.S. state of New York passes a partial two-year cryptocurrency mining ban
    for cryptocurrency mined from fossil fuel power plants. (Politico)
  - Impact of the COVID-19 pandemic on sports
  - The Special Olympics lift their COVID-19 vaccine mandate for the upcoming Special
    Olympics USA event in Orlando, Florida, after Governor Ron DeSantis urged them
    to do so or face threats of a $27.5 million fine. (Florida Politics) (Bleacher
    Report) (WPEC-TV)
