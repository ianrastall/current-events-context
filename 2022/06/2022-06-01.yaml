Date: '2022-06-01'
Source_URI: Portal:Current events/2022 June 1
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Three civilians are killed after Russian forces shell the Sviatohirsk Lavra monastery.
    (Ukrayinska Pravda via Yahoo! News)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - Germany says that it will send the IRIS-T air defence missile system to Ukraine
    following a request from Ukraine for heavy weapons. (Reuters)
  - U.S. President Joe Biden agrees to provide Ukraine with long-range rocket artillery
    systems after Ukraine reportedly gave "assurances" that they will not use the
    missile systems to strike Russian cities. The weapons systems are a part of a
    new $700 million weapons package to Ukraine that will also include ammunition,
    counter-fire radars, a number of air surveillance radars, and additional Javelin
    anti-tank missiles. (Reuters)
  - Russia says the U.S. decision to supply advanced long-range rocket systems and
    munitions to Ukraine could "widen the conflict", and also risks "direct confrontation"
    with Russia, accusing the United States of "purposefully and diligently adding
    fuel to the fire". (Reuters)
  - Syrian civil war
  - Turkish intervention in the Syrian civil war
  - Turkey announces a planned military operation to seize control of the Syrian cities
    of Tal Rifaat and Manbij from the Kurdish-led Syrian Democratic Forces. (Al Jazeera)
  - Three people are killed and several others are injured by a rocket attack in Tell
    Abyad, Raqqa Governorate, Syria. (AP)
  - Kashmir conflict
  - Insurgency in Jammu and Kashmir
  - Local authorities say that yesterday's attack in Kulgam has caused over 100 Kashmiri
    Hindu families to flee Kashmir. (Reuters)
  - Israeli–Palestinian conflict
  - A Palestinian man is killed and two others are injured after the IDF raided the
    town of Ya'bad to demolish the house of the perpetrator of the Bnei Brak shootings,
    following a confrontation by residents. A woman holding a knife is also shot and
    killed near the Al-Arroub refugee camp in the occupied West Bank. (Reuters)
  - Mali War
  - Two Red Cross workers are killed in an attack by unknown militants in Mali. (Reuters)
  - A Jordanian member of the MINUSMA peacekeeping force is killed and three others
    are injured in Kidal Region, Mali. (France 24)
  - Comair, a South African franchisee for British Airways, suspends all flights after
    the company announced that it has run out of funds. Budget airline Kulula.com,
    which is a wholly owned subsidiary of Comair, has also suspended all flights.
    (Al Jazeera)
  - Earthquakes in 2022
  - 2022 Ya'an earthquake
  - Four people are killed and 41 others injured by a 5.9 magnitude earthquake in
    Sichuan, China. (The Washington Post)
  - Denmark and the European Union, 2022 Danish European Union opt-out referendum
  - Exit polls show that around two-thirds of Danes voted to have Denmark join the
    European Union's Common Security and Defence Policy, ending Denmark's 30-year
    policy of opting out. (Al Jazeera)
  - Greece–Turkey relations
  - Turkish President Recep Tayyip Erdoğan cancels high-level talks with Greek Prime
    Minister Kyriakos Mitsotakis, accusing Mitsotakis of consistently using Greek
    jets to violate Turkey's airspace. Turkish Foreign Affairs Minister Mevlüt Çavuşoğlu
    had also accused Greece of violating the airspace of demilitarized zones in the
    Aegean Sea yesterday. (Al Jazeera)
  - Russia–Taiwan relations, International sanctions during the Russo-Ukrainian War
  - Taiwan imposes an export ban of all modern computer chips to Russia and Belarus,
    as well as any technology and equipment used to manufacture them. (Taiwan News)
  - Warren Clinic shooting
  - At least five people, including the perpetrator, are killed in a mass shooting
    at a clinic in Tulsa, Oklahoma, United States. (CNN)
  - Depp v. Heard
  - Actor Johnny Depp wins a defamation lawsuit against his ex-wife, actress Amber
    Heard. (BBC News)
  - Canada announces that it will temporarily decriminalize possession of less than
    2.5 grams total of MDMA, opioids, cocaine, and methamphetamine in the province
    of British Columbia, in order to allow for the province to launch a three-year
    trial of drug decriminalization and treatments. (BBC News)
  - Next Generation EU
  - The European Commission formally approves, by a majority vote, Poland's plan for
    the usage of the EU's Recovery and Resilience Facility funds. Although the money
    will not be immediately available for use, the plan must go through approval in
    the European Council, and any future funding requests in that mechanism will also
    be subject to the approval of other member states. The acceptance was previously
    withheld due to the Commission's concerns about the rule of law in the country,
    and in particular Poland's non-compliance with the ruling of the European Court
    of Justice that ordered the Disciplinary Chamber of the Supreme Court disbanded.
    (Rzeczpospolita) (Politico)
  - Scientists from the University of Western Australia announce that a seagrass meadow
    of the species Posidonia australis covering , approximately three times the size
    of Manhattan, found off of Western Australia's Shark Bay, actually belongs to
    one plant, making it the largest known plant on Earth. (BBC News)
