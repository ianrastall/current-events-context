Date: '2022-06-16'
Source_URI: Portal:Current events/2022 June 16
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Ukrainian officials say that four people have been killed and six others have
    been injured in a rocket attack in Sumy overnight. (Reuters)
  - The mayor of Melitopol claims that Ukrainian farmers caused "mass illness" in
    Russian troops by poisoning cherries. (The Daily Beast)
  - The United States announces the capture of a senior ISIL leader in Syria. (Al
    Jazeera)
  - One Sudanese protester is shot dead after a flare up of anti-military protests
    in Khartoum and Omdurman. (Reuters)
  - 2022 Russia–European Union gas dispute
  - European benchmark natural gas prices increase by around 30% after Russia's Gazprom
    reduced Nord Stream 1's gas supply to Germany to 40% of the pipeline's capacity.
    Russia blames maintenance problems resulting from Canada's refusal to return equipment
    that was sent for repair and warns that usage of the pipeline could be completely
    suspended. (Reuters)
  - United States sanctions against Iran
  - Oil prices increase in the United States following the Biden administration's
    announcement of new sanctions against Iran's petrochemicals industry. The sanctions
    are an effort to force Iran to comply with the Joint Comprehensive Plan of Action,
    from which the United States unilaterally withdrew in 2018. (Al Jazeera) (Reuters)
  - Four people are killed and five others are injured in a building fire in the town
    of Handlova, Slovakia. (AP)
  - Firefighters fight wildfires across Catalonia and Navarre, Spain, as temperatures
    reach , complicating the efforts of the firefighters. (Euronews)
  - Sergey Cherkasov, a Russian military intelligence official, is expelled from the
    Netherlands for attempting to begin an internship at the International Criminal
    Court in The Hague using a fake Brazilian identity. Cherkasov will now face a
    criminal trial in Brazil. (The Guardian) (Reuters)
  - Three people are killed in a shooting at an Episcopal Church in Vestavia Hills,
    Alabama, United States. (The Independent)
  - 2022 NBA Finals
  - In basketball, the Golden State Warriors defeat the Boston Celtics in six games
    to win their fourth NBA championship in eight years. Stephen Curry is named NBA
    Finals MVP. (The Washington Post) (KION-TV)
