Date: '2022-06-08'
Source_URI: Portal:Current events/2022 June 8
Intelligence_Payload:
  Uncategorized:
  - 2022 South Khorasan train derailment
  - Twenty-two people are killed and 87 others injured after a train travelling between
    Mashhad and Yazd collides with an excavator near Tabas, South Khorasan province,
    Iran. (AP)
  - 2022 V-22 Osprey plane crash
  - A United States Marine Corps V-22 Osprey crashes near the town of Glamis in Imperial
    County, California, United States, killing five U.S Marines onboard. (CBS News)
  - Ten people are killed and three are missing after heavy flooding in Hunan and
    Guangxi, China. (AP)
  - 2022 monkeypox outbreak
  - Timeline of the 2022 monkeypox outbreak
  - 2022 monkeypox outbreak in the United States
  - Texas reports its first case of monkeypox. (Denton Record-Chronicle)
  - Arizona reports its first suspected case of monkeypox. (Maricopa GOV)
  - Brazil, Greece and Ghana report their first cases of monkeypox. (CNA) (Reuters)
    (BBC News)
  - Uganda and Cyprus report their first suspected cases of monkeypox. (Dispatch Uganda)
    (Financial Mirror)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Florida
  - Florida reports its first cases of the Omicron BA.4 variant at the Premier Medical
    Laboratory Services in three patients in Miami-Dade County. (Patch.com)
  - COVID-19 pandemic in Thailand
  - Public Health Minister Anutin Charnvirakul urges people to "move on" from COVID-19
    and declares his intentions for Thailand to downgrade the disease to an endemic.
    However, he didn't include a time frame on when to do so and says that the situation
    will be reviewed by mid-June after bars, pubs and entertainment venues reopened
    in the country. (Bangkok Post)
  - Phase-out of fossil fuel vehicles
  - The European Parliament votes to phase out the sale of new combustion engine vehicles
    by 2035. (AP)
  - Belgium–Democratic Republic of the Congo relations
  - King Philippe of Belgium, in a speech to the Congolese parliament in Kinshasa,
    formally condemns the atrocities that occurred when the Democratic Republic of
    the Congo was declared the personal property of his ancestor, Leopold II of Belgium,
    saying that the colonial government "was one of unequal relations, unjustifiable
    in itself, marked by paternalism, discrimination and racism". (BBC News)
  - Algeria–Spain relations
  - Algeria suspends a 20-year friendship treaty with Spain, and bans all imports
    from Spain, amid a disagreement over the Spanish government's position on the
    disputed Western Sahara. (Reuters)
  - 2022 Berlin car attack
  - One person is killed and 30 others, including 14 students, are injured, after
    a car drives into a crowd in Berlin, Germany. A 29-year-old German-Armenian man
    is arrested at the scene. (BBC News) (Reuters)
  - Brett Kavanaugh alleged assassination plot
  - A 26-year-old man from Simi Valley, California, is charged by the U.S. Justice
    Department for attempting to murder a U.S. judge after being found at the house
    of Justice Brett Kavanaugh while armed with several weapons. According to authorities,
    the suspect planned to assassinate Kavanaugh and then commit suicide. (CNN)
  - 2023 Nigerian presidential election
  - Former Governor of Lagos State Bola Tinubu wins the presidential primary of the
    ruling All Progressives Congress and officially becomes the party's nominee for
    the February 2023 general election. Tinubu, who served as Governor from 1999 to
    2007, defeated Rotimi Amaechi, Yemi Osinbajo, and eleven other candidates to win
    the primary. (Channels TV)
  - The United Kingdom decides against direct rule of the British Virgin Islands despite
    finding "gross failures of governance" in the overseas territory. The British
    government will give the territory's new administration two years to reform before
    imposing direct rule, according to Foreign Secretary Liz Truss. (BBC News)
  - Vitaliy Khotsenko is sworn as new Prime Minister of the Donetsk People's Republic
    following dimission of Alexander Ananchenko. (TASS)
