Date: '2022-06-02'
Source_URI: Portal:Current events/2022 June 2
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine offensive
  - Ukrainian officials say that the Armed Forces of Ukraine have recaptured 20 settlements
    in Kherson Oblast. (VOA)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The United Kingdom announces that it will send M270 Multiple Launch Rocket Systems
    to Ukraine to counter the Russian invasion. (Euro Weekly News)
  - Sweden announces that it will send additional military aid to Ukraine, including
    anti-ship missiles, anti-tank guided missiles, and rifles for the Ukrainian Ground
    Forces. (Reuters)
  - Kashmir conflict
  - Insurgency in Jammu and Kashmir
  - A Hindu bank manager from Rajasthan is shot dead in a suspected terror attack
    in Kulgam district, Indian-administered Jammu and Kashmir. (AP)
  - Syrian civil war
  - Three people are killed and 21 others are injured when a bus is attacked by militants
    in Deir ez-Zor Governorate, Syria. (AP)
  - Platinum Jubilee of Elizabeth II
  - The platinum jubilee of Queen Elizabeth II commences at The Mall in London. (BBC
    News)
  - 2022 monkeypox outbreak
  - Morocco confirms its first case of monkeypox. (Reuters)
  - The United Nations formally recognizes the new official name of Türkiye following
    an official request from Turkey to change its name. Turkish state broadcaster
    TRT says that the name change is primarily to avoid association with the bird
    of the same name. (BBC News)
  - 2022 Ontario general election
  - Ontario Premier Doug Ford is re-elected as Premier of Ontario, Canada. (CTV News)
  - Bavarian authorities announce that they will release all of their unpublished
    files on the Munich massacre. (AP)
  - Internet censorship in Russia
  - Russia blocks access to the Finnish, Russian and English websites of Finnish state
    broadcaster Yle, on orders of the Prosecutor-General of Russia. (Yle)
