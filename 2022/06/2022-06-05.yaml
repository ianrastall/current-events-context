Date: '2022-06-05'
Source_URI: Portal:Current events/2022 June 5
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Battle of Donbas
  - Russian major general Roman Kutuzov is killed in Mykolaivka, Luhansk Oblast. (Reuters)
    (Ukrayinska Pravda)
  - Russia launches airstrikes on the Ukrainian capital Kyiv for the first time since
    April 28. The Russian Defence Ministry says that the missile strikes targeted
    T-72 tanks that had been supplied to Ukraine by several EU countries. At least
    one person is injured. (The Guardian)
  - Herder–farmer conflicts in Nigeria
  - Owo church attack
  - At least 50 people are killed in a mass shooting and bombing inside a Catholic
    church in Owo, Ondo, Nigeria. (Reuters)
  - Fulani herdsmen kill 32 people in four attacks in Kajuru, Kaduna State. (AP)
  - 2021–2022 Democratic Republic of the Congo attacks; Allied Democratic Forces insurgency
  - Suspected Allied Democratic Forces fighters kill at least 18 people in an attack
    on the village of Otomabere, Irumu Territory in the Ituri Province of the Democratic
    Republic of the Congo. (Reuters)
  - Minimum wage in Germany
  - The Bundestag votes 400–41, with 200 abstentions, to approve raising the minimum
    wage in Germany to €12 ($12.90) an hour. (DW)
  - Sitakunda fire and explosions
  - At least 49 people are killed and over 400 others injured by a fire and explosions
    at a storage depot in Sitakunda, Chittagong District, Bangladesh. (BBC News)
  - Wildfires in 2022
  - A large wildfire breaks out on the Hymettus mountain range near Athens, Greece.
    A number of homes are damaged in the fire. (Reuters)
  - The Philippine Institute of Volcanology and Seismology raises the alert status
    of Mount Bulusan to level 1 after the volcano experienced a phreatic eruption.
    (Rappler)
  - Two pilots are killed when their plane crashes in Ar-Ramtha, Jordan. (Reuters)
  - One person is killed and 14 others are injured by heavy thunderstorms and flash
    flooding in France. (AP)
  - Twenty-six people are killed and 4 others injured when a bus falls into a gorge
    in Uttarakhand, India. (Reuters)
  - 2022 monkeypox outbreak
  - Timeline of the 2022 monkeypox outbreak
  - 2022 monkeypox outbreak in the United States
  - Hawaii reports a probable case of monkeypox in a person from Oahu, becoming the
    first island region of the United States to report a case. (KGMB-TV)
  - Colombia reports its first confirmed case of monkeypox in a man who travelled
    from Spain. (24 News Recorder)
  - 2021–2022 North Korean missile tests
  - North Korea fires at least eight short-range ballistic missiles into the Sea of
    Japan from several locations in the country. (The Japan Times)
  - Russia–Serbia relations
  - Russian Foreign Minister Sergey Lavrov cancels his scheduled visit to Serbia after
    neighbouring states in the Balkans refuse to let Lavrov's plane use their airspace.
    (BBC News)
  - 2022 Chattanooga shooting
  - Three people are killed and 14 others are injured in a mass shooting in Chattanooga,
    Tennessee, United States. Three people are also hit by cars, with one person later
    dying. (AP)
  - 2022 Kazakh constitutional referendum
  - Kazakhs go to the polls to vote on 56 amendments to the constitution and President
    Kassym-Jomart Tokayev's "Second Republic" proposals, among them the reduction
    of presidential powers, reform of the Parliament, the curbing of former President
    Nursultan Nazarbayev's powers, and the creation of three new regions. (The Economist)
  - 2022 French Open – Men's singles
  - Rafael Nadal defeats Casper Ruud to win the men's singles tennis title at the
    2022 French Open, extending his all-time record for the most Grand Slam men's
    singles titles to 22. (BBC Sport)
  - 2022 FIFA World Cup qualification
  - In association football, Wales defeats Ukraine 1–0 at the Cardiff City Stadium
    to become the final team from UEFA to qualify for the 2022 FIFA World Cup in Qatar.
    It is the first time that Wales has qualified for a FIFA World Cup since 1958.
    (Al Jazeera)
