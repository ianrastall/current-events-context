Date: '2022-06-06'
Source_URI: Portal:Current events/2022 June 6
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The United Kingdom announces that it will send several M270 long-range rocket
    artillery systems to Ukraine. (The Guardian)
  - 2021–2022 Democratic Republic of the Congo attacks, Ituri conflict
  - Suspected CODECO militants kill 12 people and injure two others in Ituri Province,
    Democratic Republic of the Congo. (Reuters)
  - 2022 monkeypox outbreak
  - Timeline of the 2022 monkeypox outbreak
  - 2022 monkeypox outbreak in the United States
  - The U.S. Department of Health and Human Services says that the United States has
    obtained 36,000 doses of the Jynneos vaccine in order to combat the monkeypox
    outbreak. (CNBC)
  - Washington, D.C. reports a case of orthopoxvirus. (The Hill)
  - 2022 monkeypox outbreak in the United Kingdom
  - The United Kingdom reports 77 new cases of monkeypox, thereby bringing the total
    number of cases in the country to more than 300. (The Guardian)
  - Kosovo reports its first suspected case of monkeypox. (Euronews Albania)
  - Singapore reports its first case of monkeypox in a man who travelled from Australia.
    (CNA)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - Transportation Secretary Pete Buttigieg tests positive for COVID-19. (The Washington
    Post)
  - COVID-19 pandemic in mainland China
  - COVID-19 pandemic in Beijing
  - Beijing's restaurants reopen following a decrease in new cases of COVID-19. (Reuters)
  - 2022 Mariupol cholera outbreak
  - Petro Andryushchenko, advisor to Mayor Vadym Boychenko, warns that Mariupol may
    have suffered a cholera outbreak. (The National News)
  - 9th Summit of the Americas
  - The Biden administration bans the presidents of Cuba, Venezuela, and Nicaragua
    from attending this year's Summit of the Americas in Los Angeles, United States.
    Mexican President Andrés Manuel López Obrador announces that he will personally
    boycott the meeting in response to the ban, sending Foreign Secretary Marcelo
    Ebrard to represent him at the summit. (Reuters)
  - Canada–Chile relations
  - Chilean President Gabriel Boric visits Ottawa to hold a wide-ranging bilateral
    meeting with Canadian Prime Minister Justin Trudeau. (CTV News)
  - Aftermath of the 2021 United States Capitol attack
  - Criminal charges in the 2021 United States Capitol attack
  - Five members of the far-right group Proud Boys, including leader Enrique Tarrio,
    are charged with seditious conspiracy for their involvement in the January 6 attack
    at the United States Capitol, becoming the second group to be charged with seditious
    conspiracy in connection to the attack. (NPR)
  - Mass media in Latvia, Latvia–Russia relations
  - Latvia bans all Russia-based TV media outlets that threaten "the territorial integrity
    and independence of another country", referring to the Russo-Ukrainian War. The
    measure will last until Russia de-occupies Crimea and ends its warfare against
    Ukraine. (LRT)
  - International sanctions during the Russo-Ukrainian War
  - A federal judge in the U.S. state of New York orders the seizure of two private
    jets, a Boeing 787 Dreamliner and a Gulfstream G650ER, owned by sanctioned Russian
    oligarch Roman Abramovich. (The Guardian)
  - Orlando Jorge Mera, the Environmental Minister for the Dominican Republic and
    son of former President Salvador Jorge Blanco, is shot dead in his office. The
    perpetrator was identified by a presidential spokesman as Miguel Cruz, a childhood
    friend of the minister. He was later taken into custody. (Reuters) (BBC News)
  - The South African Justice Department confirms that Rajesh Gupta and Atul Gupta
    of the influential Gupta family have been arrested in the United Arab Emirates
    for engaging in corrupt practices during the Zuma presidency. (Al Jazeera)
  - The trial of Aydin Coban, a Dutch man accused of harassing and extorting Port
    Coquitlam teenager Amanda Todd online prior to her suicide in 2012, begins at
    the British Columbia Supreme Court in British Columbia, Canada. (CBC)
  - Partygate
  - Sir Graham Brady, chairman of the Conservative Party's 1922 Committee, announces
    that he has received the 54 letters necessary to trigger a party confidence vote
    in Boris Johnson's leadership of the party. (The Guardian)
  - Boris Johnson survives the confidence vote by a margin of 211–148 and the party
    will not conduct a leadership election with 58.8% of Conservative MPs voting in
    favour of Johnson. (The Times)
  - Malian junta leader Assimi Goïta declares that Mali will return to civilian rule
    in March 2024. It was supposed to occur this February until being delayed, prompting
    sanctions from its neighbors. (France 24)
