Date: '2022-06-07'
Source_URI: Portal:Current events/2022 June 7
Intelligence_Payload:
  Uncategorized:
  - Anglophone Crisis
  - Five Cameroonian soldiers are killed in an attack by Ambazonian separatists in
    Kouoptamo district. (Reuters)
  - Syrian civil war, Turkish occupation of northern Syria
  - The Syrian Democratic Forces (SDF) threatens to turn to Syrian President Bashar
    al-Assad for support if Turkey launches a new military operation in northern Syria,
    where the SDF controls most of its territory. (Al Jazeera)
  - Censorship in the United Kingdom
  - British cinema chain Cineworld cancels all showings of the historical drama The
    Lady of Heaven, following days of protests by Muslims who say that the movie is
    blasphemous and sectarian. Cineworld says that the decision to cancel showings
    was to "ensure the safety of our staff and customers". (The Guardian)
  - International sanctions during the Russo-Ukrainian War
  - The United States Department of the Treasury bans all trading of Russian debt
    and stocks, including on the secondary market. (Reuters)
  - Russia freezes Western banks' and investment funds' assets worth $17 billion.
    (Rzeczpospolita)
  - Killa Saifullah bus crash
  - Twenty-two people are killed when a bus falls into a ravine in Killa Saifullah
    District, Balochistan, Pakistan. (AP)
  - Kasai diamond mine collapse
  - Six people are killed after a diamond mine collapsed in Kasai, Democratic Republic
    of the Congo. (Reuters)
  - Three people are killed and several others are injured when a train collides with
    a truck in Gara Oreshets, Bulgaria. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Andorra
  - Prime Minister Xavier Espot tests positive for COVID-19. (Diari d'Andorra)
  - COVID-19 pandemic in Germany
  - Minister of Foreign Affairs Annalena Baerbock tests positive for COVID-19. (Washington
    Post)
  - 2022 monkeypox outbreak
  - Timeline of the 2022 monkeypox outbreak
  - Bangladesh and The Bahamas report their first suspected cases of monkeypox. (Dhaka
    Tribune) (Caribbean Loop News)
  - 2022 Mariupol cholera outbreak
  - Mariupol reports its first confirmed cases of cholera as well as its first confirmed
    deaths from cholera. (Ukra News)
  - Japan–Russia relations, Kuril Islands dispute
  - Russian Foreign Ministry spokeswoman Maria Zakharova announces that Russia will
    cancel a 1998 agreement with Japan allowing Japanese fishermen to operate near
    the southern Kuril Islands, claiming that Japan is not meeting the financial obligations
    outlined in the agreement. (Al Jazeera)
  - Cambodia–China relations
  - Cambodia and China break ground on a joint expansion project of the Ream Naval
    Base near Sihanoukville, Cambodia. (The Guardian)
  - An independent inquiry established by the U.N. Human Rights Council following
    the 2021 Israel–Palestine crisis issues a report accusing Israel of seeking "complete
    control" over the Palestinian territories, and of granting "different civil status,
    rights and legal protection" to the country's Arab citizens. (Al Jazeera) (Reuters)
  - Allison Fluke-Ekren pleads guilty in a federal court in Alexandria, Virginia,
    United States, of providing material support to ISIS by conspiring to conduct
    terrorist attacks on United States soil and by leading and training at least 100
    female ISIS fighters. Fluke-Ekren also claimed in her plea deal to helping Ansar
    al-Sharia analyze documents stolen during the 2012 Benghazi attack. (CNN)
  - Human rights in Russia
  - Russia's State Duma votes nearly unanimously to pass a bill ending the jurisdiction
    of the European Court of Human Rights in the country, with only one lawmaker from
    the Communist Party opposing the bill. The bill must now be signed by President
    Vladimir Putin before becoming law. (Reuters)
  - Lieutenant of the Sovereign Military Order of Malta Marco Luzzago dies and is
    succeeded ad interim by Ruy Gonçalo do Valle Peixoto de Villas Boas. (ANSA)
  - The European Commission agrees to make USB Type-C the common charging port for
    all mobile phones, tablets and cameras in the European Union by autumn 2024. (Reuters)
