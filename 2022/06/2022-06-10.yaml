Date: '2022-06-10'
Source_URI: Portal:Current events/2022 June 10
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - The Ministry of Foreign Affairs of Ukraine states that the country has "installed
    naval mines in the exercise of our right to self-defence". (Reuters)
  - 2022 Democratic Republic of the Congo–Rwanda tensions
  - The Democratic Republic of the Congo accuses Rwanda of killing two Congolese children
    in a rocket attack. Rwanda also accuses the DRC of firing rockets into the country
    from Bunagana. (Reuters)
  - Whisky War
  - So called Whisky War, a pseudo confrontation between Canada and Denmark ends with
    the Hans Island divided.
  - 2021–2022 inflation surge
  - The Dow Jones Industrial Average falls 880 points and the S&P 500 falls 117 points
    following the release of an inflation report that showed a faster-than-expected
    rise in prices and consumer sentiment reaching a record low. (NBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - Travel during the COVID-19 pandemic
  - The Biden administration announces that the U.S. has lifted COVID-19 testing restrictions
    for international travel. (AP)
  - 2022 monkeypox outbreak
  - 2022 monkeypox outbreak in the United States
  - The U.S. purchases 300,000 more doses of vaccines from Bavarian Nordic, including
    the Jynneos vaccine, as part of an effort to combat the monkeypox outbreak. (Axios)
  - Poland reports its first case of monkeypox. (Reuters)
  - China–Russia relations
  - Russia and China open the new Blagoveshchensk–Heihe Bridge. The 1 km long bridge
    spans across the Amur river to connect Heihe in Northeastern China's Heilongjiang
    province with Blagoveshchensk in Far Eastern Russia's Amur Oblast. It will shorten
    the travel distance of freight between China and western Russia by 1,500 km. (Reuters)
  - Russia withdraws from the United Nations World Tourism Organization (UNWTO) after
    having been suspended by that organization due to the country's war in Ukraine.
    (The Guardian)
  - Capital punishment in Malaysia
  - Malaysian law minister Wan Junaidi announces that mandatory capital punishment
    will be abolished in the country. (CNN)
  - 2022 FIFA World Cup qualification
  - FIFA dismisses a petition by the Football Federation of Chile against the Ecuadorian
    Football Federation to disqualify the Ecuador national football team from participating
    in the 2022 World Cup, claiming that one of its players, Byron Castillo, is ineligible
    on the grounds of his nationality. (Japan Today)
