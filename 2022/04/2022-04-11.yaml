Date: '2022-04-11'
Source_URI: Portal:Current events/2022 April 11
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - Ukrainian President Volodymyr Zelenskyy announces that the city of Mariupol has
    been "completely destroyed", stating the death toll as "tens of thousands". (Washington
    Examiner)
  - Governor of Donetsk Oblast Pavlo Kyrylenko says that three people have been killed
    and eight more injured by rocket attacks in the region. (Reuters)
  - Israeli–Palestinian conflict
  - Two Breslov-Hasidic Israelis are shot in Nablus after they attempted to enter
    through an unmanned checkpoint in order to pray at Joseph's Tomb. Fire damage
    is discovered inside several chambers of the tomb and is attributed to Palestinian
    rioters who were throwing stones at the tomb two days prior. (The Jerusalem Post)
    (BBC News)
  - Five people are injured when their car is stoned in East Jerusalem. (Times of
    Israel)
  - A Palestinian militant is shot dead after throwing an incendiary device at Israeli
    security forces in the West Bank. (CTV News)
  - International sanctions during the Russo-Ukrainian War, Economic impact of the
    2022 Russian invasion of Ukraine
  - In response to the S&P's lowering of Russian foreign debt rating to "SD" (selective
    default), Finance Minister Anton Siluanov tells pro-Kremlin newspaper Izvestia
    that the government is preparing to sue in order to force the investors to accept
    their payments. (CNN)
  - 2022 Pacific typhoon season
  - At least 25 people are killed during floods and landslides caused by Tropical
    Storm Megi in the Philippines. (Reuters)
  - Trikut cable car accident
  - At least three people are killed at the Trikut hills ropeway in Deoghar district,
    Jharkhand, India. (NDTV)
  - 6 people, including 3 children, have been killed and 5 injured in a gas leak explosion
    in an apartment block in Moscow, Russia. (Radio Free Europe)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Pennsylvania
  - COVID-19 pandemic in Philadelphia
  - Philadelphia reinstates their indoor mask mandate amid an increase in the number
    of cases in the city, becoming the first major U.S. city to do so. The mandate
    will take effect on April 18. (ABC News)
  - COVID-19 pandemic in mainland China
  - COVID-19 pandemic in Shanghai
  - Shanghai eases their lockdown in several areas of the city. (Bloomberg.com)
  - In Chile, Santiago governor Claudio Orrego announces that the national capital
    will ration water for the first time in its history, as the country enters its
    13th year of drought. (The Guardian)
  - Islamic terrorism in Europe, Terrorism in the United Kingdom
  - Murder of David Amess
  - Islamic State supporter Ali Harbi Ali is convicted of the murder of British Conservative
    MP for Southend West David Amess. Ali is also convicted of preparing acts of terrorism.
    (BBC News)
  - British Conservative MP for Wakefield Imran Ahmad Khan is convicted of sexually
    assaulting a 15-year-old boy in 2008. (BBC News)
  - 2022 Pakistani constitutional crisis
  - Over 100 Pakistani lawmakers resign in protest of the no-confidence motion against
    Imran Khan, former Prime Minister of Pakistan. (Reuters)
