Date: '2022-04-21'
Source_URI: Portal:Current events/2022 April 21
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - Vladimir Putin tells his troops not to storm the Azovstal iron and steel works
    building in Mariupol, Donetsk Oblast, calling that plan "impractical" and instead
    ordering a blockade of the area. (The Guardian)
  - Afghanistan conflict
  - Islamic State–Taliban conflict
  - 2022 Mazar-i-Sharif mosque bombing
  - Thirty-one people are killed and 87 others are injured in a bombing at a Shia
    mosque in Mazar-i-Sharif, Balkh Province. The Islamic State claims responsibility
    for the bombing. (Yahoo! News) (Reuters)
  - Four people are killed and 18 others are injured during a bombing in Kunduz targeting
    the 217 Omari Corps. (Tolo News)
  - Four Taliban members are killed and another is injured when their vehicle is hit
    by a roadside bomb in Nangarhar Province. (BBC News)
  - Boko Haram insurgency
  - Boko Haram raid the town of Geidam, Yobe State, Nigeria, killing 12 people. Several
    buildings are destroyed, including a school. (The Premium Times) (The Toronto
    Star)
  - The legislature for the U.S. state of Florida votes to strip Walt Disney World
    of its ability to self-govern by dissolving the Reedy Creek Improvement District,
    in apparent retaliation for Disney's actions during and following the passage
    of HB 1557, also known as the "Don't Say Gay" bill. (CNBC) (Financial Times)
  - Six people are killed after a fire occurs at a defence research institute in Tver,
    Russia. (Reuters)
  - Iran–Israel relations
  - Iran arrests three alleged Israeli Mossad spies in Sistan and Baluchestan province,
    claiming that the spies are part of recent sensitive data leaks. (AP)
  - India–Maldives relations
  - Maldivian President Ibrahim Mohamed Solih issues a presidential decree outlawing
    protests against India, claiming it is causing national instability and putting
    the security of Indian diplomats at risk. (Indian Express)
  - Former Honduran President Juan Orlando Hernández is extradited to the United States
    on drug trafficking charges. (The Washington Post)
