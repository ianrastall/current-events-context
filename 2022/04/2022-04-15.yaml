Date: '2022-04-15'
Source_URI: Portal:Current events/2022 April 15
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Russia launches major missile strikes on Kyiv, saying that the strikes are in
    retaliation for the April 2022 Belgorod and Bryansk attacks. (Reuters)
  - Israeli–Palestinian conflict
  - 2022 Al-Aqsa Mosque storming
  - More than 150 Palestinians and three Israeli police officers are injured after
    Israeli police stormed the Al-Aqsa Mosque in East Jerusalem. Hundreds of Palestinians
    across the Gaza Strip protest the storming. (BBC News) (Al Jazeera)
  - A man is injured during a stabbing attack in Haifa, Israel. Police say that the
    stabbing was likely motivated by political reasons. (Times of Israel)
  - Insurgency in Khyber Pakhtunkhwa
  - Pakistani airstrikes in Afghanistan
  - At least 39 people are killed in several Pakistani airstrikes in border areas
    of Afghanistan's Khost and Kunar provinces, allegedly targeting TTP members. (Radio
    Free Europe/Radio Liberty)
  - Internal conflict in Myanmar
  - Karen conflict
  - An attempt by the Burmese army to take control of Lay Kay Kaw, a Karen National
    Union-controlled town, fails. (Radio Free Asia)
  - South Thailand insurgency
  - Two bombings in Thailand by the Ethnic Malay Patani United Liberation Organisation
    kill one civilian and injure three police officers. (Reuters)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - Moody's announces that it will declare Russia in default on May 4, at the end
    of the grace period, if Russia services the foreign dollar-denominated bonds that
    it paid on April 4 in rubles rather than in US dollars, as mandated by the terms
    of the obligations. (Reuters)
  - The South Korean government approves a plan to join the CPTPP. (The Korea Times)
  - At least 35 people are killed and 71 others are injured when a bus carrying churchgoers
    to an Easter gathering crashes in Chipinge, Zimbabwe. (Al Jazeera)
  - A migrant vessel crashes off the coast of Sabratha, Libya, killing at least 6
    people and leaving 29 others presumed dead. (The Guardian)
  - COVID-19 pandemic
  - COVID-19 pandemic in South Korea
  - South Korean Prime Minister Kim Boo-kyum announces that South Korea will lift
    their COVID-19 social distancing requirements beginning on April 18. The mask
    mandate, however, will remain in place. (Korea Herald)
  - Censorship in Russia
  - Russia blocks Radio France Internationale and the Russian edition of The Moscow
    Times. (Reuters)
  - Gasteranthus extinctus, an orange wild flower that is a member of the Gesneriaceae
    family, is rediscovered in Ecuador after being considered extinct for 36 years.
    The study of the flower's rediscovery is published by the journal PhytoKeys and
    the Field Museum in Chicago. (CNET)
