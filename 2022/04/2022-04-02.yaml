Date: '2022-04-02'
Source_URI: Portal:Current events/2022 April 2
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Bucha
  - Bucha massacre, War crimes in the 2022 Russian invasion of Ukraine
  - Hundreds of civilians are found dead on the streets in Bucha after the city is
    recaptured by Ukrainian forces. Journalists and Ukrainian forces say that they
    have uncovered evidence of war crimes by the Russian military. (Times of Israel)
    (The Guardian) (The Kyiv Independent)
  - Battle of Chernobyl
  - The Ukrainian flag is raised over the Chernobyl Nuclear Power Plant following
    its recapture from Russian forces. A ceremony is held to honour the staff at the
    former plant who continued to work under Russian occupation. (CNN)
  - Ukraine retakes full control of the Kyiv Oblast as the last Russian troops return
    to Belarus. (Reuters)
  - Southern Ukraine offensive
  - Aftermath of the Siege of Enerhodar
  - Residents say that Russian occupiers have violently dispersed a pro-Ukrainian
    demonstration in Enerhodar. Several protesters are arrested. Russian troops are
    also alleged to have used explosions in order to disperse the crowd. (Reuters)
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - Lithuanian documentary filmmaker Mantas Kvedaravičius is killed in Mariupol. (Reuters)
  - Israeli–Palestinian conflict
  - Three Palestinian Islamic Jihad members are killed and four Israeli soldiers are
    injured during a gunfight near Jenin in the West Bank. (BBC News)
  - Fighting erupts near the Damascus Gate in Jerusalem, leading to four Palestinians
    being arrested by Israel Police for rioting. (Times of Israel)
  - Yemeni Civil War
  - Ceasefire talks between the Houthis and Saudi Arabian forces begin in Yemen in
    an effort to end fighting. (France 24)
  - Australia and India sign a A$12.6 billion trade deal aimed at strengthening India's
    manufacturing sector by allowing access to more raw materials, and to also reduce
    Australia's dependence on China after China placed sanctions on some Australian
    goods following several political disputes. (South China Morning Post)
  - COVID-19 pandemic
  - COVID-19 pandemic in Nauru
  - President Lionel Aingimea announces Nauru's first positive cases of COVID-19 in
    two asymptomatic people who travelled from Brisbane on March 31. (RNZ)
  - Enlargement of NATO
  - Prime Minister Sanna Marin says that a decision on Finland joining the NATO military
    alliance must be made before this summer, stating that "Russia is not the neighbor
    we thought it was". (Yle)
  - Protests against the 2022 Russian invasion of Ukraine
  - 2022 anti-war protests in Russia
  - More than 170 people are detained in anti-war protests across Russia. (The Moscow
    Times)
  - Sri Lankan economic crisis
  - 2022 Sri Lankan protests
  - The Sri Lankan government imposes a state of emergency after the Mirihana Presidential
    Residence is targeted by local civilian protesters. (BBC News)
