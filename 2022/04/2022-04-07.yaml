Date: '2022-04-07'
Source_URI: Portal:Current events/2022 April 7
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - The governor of Luhansk Oblast, Serhiy Haidai, reports that all hospitals in the
    province have been completely destroyed by the Russian Armed Forces. Russia denies
    the claim, accusing Ukraine of destroying their own hospitals. (CNN)
  - Mayor Borys Filatov requests that all women, children, and elderly leave the city
    of Dnipro in preparation for a possible Russian attack. (The Guardian)
  - Israeli–Palestinian conflict
  - 2022 Tel Aviv shooting
  - Three people are killed and 11 more are injured during a mass shooting at a bar
    in Tel Aviv, Israel. The attacker is killed during a shootout in nearby Jaffa.
    (BBC News)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - 2022 boycott of Russia and Belarus
  - The United States House of Representatives votes 420–3 to pass legislation to
    suspend normal trade relations with Russia and Belarus following the invasion
    of Ukraine. Following this, the Senate also votes 100–0 to pass the legislation,
    sending it to President Joe Biden for approval. (San Francisco Chronicle) (Fox
    Business)
  - The Russian ruble goes above the pre-war level after falling as low as 150 rubles
    per US dollar in early March. (Bloomberg)
  - Eight people are killed and three more injured during an explosion at a bar in
    a military camp in Goma, North Kivu, Democratic Republic of the Congo. The causes
    of the blast are unknown. (Reuters)
  - Around two million people in Puerto Rico are left without electricity after a
    fire occurs at one of the island's largest power plants. (The Washington Post)
  - A DHL Boeing 757-200 cargo plane breaks into two parts after making an emergency
    landing at the Juan Santamaría International Airport in San José, Costa Rica.
    No one is injured. (Reuters)
  - At least 11 people are killed and a dozen injured in a landslide in Abriaquí municipality,
    Colombia. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Cyprus
  - Travel during the COVID-19 pandemic
  - Cyprus will lift their COVID-19-related travel conditions from April 18, ending
    rules of two years of the pandemic. (Reuters)
  - COVID-19 pandemic in Kazakhstan
  - Travel during the COVID-19 pandemic
  - Kazakhstan will lift their COVID-19 travel restrictions at the country's borders
    with Kyrgyzstan, Russia and Uzbekistan. (Astana Times)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - House Speaker Nancy Pelosi tests positive for COVID-19. (The New York Times)
  - 2022 Russia–Ukraine peace negotiations
  - Belarusian President Alexander Lukashenko says that Minsk should be included in
    negotiations aimed at ending the war. (The Moscow Times)
  - International reactions to the 2022 Russian invasion of Ukraine
  - The emergency special session of the United Nations General Assembly votes to
    suspend Russia from the Human Rights Council, with 93 votes in favor, 24 against
    and 58 abstentions. Russia is the second country to be suspended from the council,
    after Libya in 2011 during the final year of Muammar Gaddafi's rule. (CNN)
  - War crimes in the 2022 Russian invasion of Ukraine
  - Former German Justice Minister Sabine Leutheusser-Schnarrenberger and former Interior
    Minister Gerhart Baum file a complaint with German federal prosecutors accusing
    Russian President Vladimir Putin, all 32 members of the Security Council of Russia,
    and members of the Russian Armed Forces of committing war crimes in Ukraine. (ABC
    News)
  - An unknown assailant throws acetone and red paint at Russian Nobel Prize laureate
    Dmitry Muratov as he traveled on a Moscow–Samara train, injuring him. A motive
    for the attack is unknown, but it is suspected to be a possible reaction to Muratov's
    opposition to the Russian invasion of Ukraine. (Radio Free Europe/Radio Liberty)
    (Reuters)
  - 2022 Peruvian protests
  - The government of Pedro Castillo announces that they have deployed the Peruvian
    Army to highways amid protests against inflation in the country. (Reuters)
  - Ketanji Brown Jackson is confirmed for the Supreme Court of the United States,
    following a 53–47 vote by the Senate. Jackson is the first black woman to be confirmed
    for this position and will replace justice Stephen Breyer after he retires in
    the court's summer session. (The New York Times)
  - President of Yemen Abdrabbuh Mansur Hadi resigns from office, dismisses vice president
    Ali Mohsen al-Ahmar and transfers both office's powers to the newly formed eight
    member Presidential Leadership Council chaired by Rashad al-Alimi. (BBC News)
  - It is announced that over 5,000 new species of previously undiscovered RNA viruses
    were found in ocean-living organisms and proposed to group them into five new
    phyla, according to a paper published in Science. (The Independent)
