Date: '2022-04-19'
Source_URI: Portal:Current events/2022 April 19
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine, Battle of Donbas
  - Eastern Ukraine offensive
  - Ukraine says that Russian forces have begun an anticipated military offensive
    in the Donbas with explosions reported in multiple cities. (BBC News) (Reuters)
  - War in Donbas
  - A civilian is killed and several others are injured by an explosion in Kramatorsk.
    (Times of Israel)
  - Nuclear threats during the Russian invasion of Ukraine
  - Amidst American allegations that Russia may use nuclear weapons, Russian Foreign
    Minister Sergey Lavrov says that the country will not use them and will continue
    using conventional weapons. (Newsweek)
  - Israeli–Palestinian conflict
  - The Iron Dome intercepts a Hamas missile fired into Israel's Southern District
    from the Gaza Strip. (Times of Israel)
  - Israel fires missiles at a Hamas weapon depot in Gaza in response to the Hamas
    attack. No injuries are reported. (Reuters)
  - At least 40 Palestinians are injured after the IDF fires tear gas and rubber bullets
    at Palestinians protesting a march held by right-wing settlers near the former
    settlement of Homesh. (Al Jazeera)
  - 2022 Kabul school bombing
  - At least six people are killed and many others are injured by a school bombing
    in Kabul, Afghanistan. (Reuters)
  - 2022 Sri Lankan protests
  - One person is killed and 14 others injured after police fire live bullets at protesters
    in Rambukkana. (BBC News)
  - A tractor collides with a military vehicle in South Darfur, Sudan, killing five
    people. (Radio Dabanga)
  - International reactions to the Russo-Ukrainian War
  - International reactions to the 2022 Russian invasion of Ukraine
  - The Russian foreign ministry expels 21 Belgian diplomats, 15 Dutch diplomats and
    4 Austrian diplomats as a reciprocal measure. (The Moscow Times) (Anadolu Agency)
  - International sanctions during the Russo-Ukrainian War
  - Greece seizes Russian-flagged oil tanker Pegas/Lana off the island of Euboea as
    part of European Union economic sanctions on Russia. The ship had 19 crew members
    on board, according to the Ministry of Shipping. (Reuters)
  - Iran–Israel relations, Iran–Israel proxy conflict
  - Iranian president Ebrahim Raisi warns Israel that Iran will respond to any hostile
    action taken against it. (DW) (Al Jazeera)
  - China–Solomon Islands relations
  - The foreign ministers of the People's Republic of China and Solomon Islands sign
    a security pact. (Al Jazeera)
  - Cameroon–Russia relations
  - Jeune Afrique reports that on 12 April the defence ministers of Russia and Cameroon
    signed a new military cooperation agreement, renewing a similar agreement signed
    in 2015. (Jeune Afrique)
  - 2022 East Timorese presidential election
  - The East Timorese people head to the polls for the second round of the presidential
    election between José Ramos-Horta and incumbent Francisco Guterres. (The Guardian)
  - The United States says it will ban anti-satellite missile tests. (BBC News)
