Date: '2022-04-29'
Source_URI: Portal:Current events/2022 April 29
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - 2022 Al-Aqsa Mosque storming
  - Forty-two Palestinians are injured as the Israeli police storm the Al-Aqsa Mosque
    in Jerusalem in response to crowds within the mosque throwing rocks and fireworks
    in the direction of Jewish worshippers at the Western Wall. (Al Jazeera) (Ynetnews)
  - An Israeli security guard in the Ariel settlement is shot dead in what is suspected
    to be a militant attack. (Times of Israel) (The Jerusalem Post)
  - Afghanistan conflict
  - April 2022 Kabul mosque bombing
  - Ten people are killed and 15 others are injured when a mosque is bombed in Kabul,
    Afghanistan. (National Post)
  - Central African Republic Civil War
  - Six soldiers and four Coalition of Patriots for Change rebels are killed during
    a shootout at a military outpost in Bakouma, Central African Republic. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Russia
  - The number of COVID-19-related deaths in Russia surpasses 800,000. (Reuters)
  - COVID-19 pandemic in South Korea
  - The South Korean government announces that it will lift outdoor mask mandate from
    May 2 due to decrease of the number of COVID-19 cases, despite criticism from
    the incoming Yoon Suk-yeol administration regarding the mandate. (France 24)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record for the second consecutive day of 11,517 new COVID-19
    cases. (Focus Taiwan)
  - 2022 Indian heat wave
  - India's weather department issues a severe heat wave warning as temperatures rapidly
    increase across the country. (BBC News)
  - 2022 G20 Bali summit
  - Russian President Vladimir Putin accepts an invitation to the upcoming G20 summit
    in Bali, Indonesia, despite Russia’s invasion of Ukraine. Ukrainian President
    Volodymyr Zelenskyy is also invited to the summit. (FirstPost)
  - The premier of the British Virgin Islands, Andrew Fahie, is arrested for alleged
    drug smuggling and money laundering in the United States. (BBC News)
  - British MP Neil Parish is being investigated by the Parliamentary Commissioner
    for Standards after two MPs allegedly claimed that Parish was watching pornography
    in the House of Commons. (The Guardian)
  - A high court in Malawi convicts five people of killing an albino man and seven
    more people of selling the man's body parts. The body parts are desired by some
    local residents, who believe that they can bring luck and wealth. (Voice of America)
