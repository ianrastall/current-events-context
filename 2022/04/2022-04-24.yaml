Date: '2022-04-24'
Source_URI: Portal:Current events/2022 April 24
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Ukrainian authorities claim that a person has been killed by overnight shelling
    in Dnipropetrovsk Oblast. (Reuters)
  - Russian state media reports that Ukraine has launched rockets into a village in
    Belgorod Oblast, Russia. (Reuters)
  - The Swiss Federal Department of Economic Affairs vetoes Germany's request to re-export
    Swiss ammunition to Ukraine on the basis of Switzerland's neutrality. (Reuters)
  - U.S. Secretary of State Antony Blinken and Defense Secretary Lloyd Austin arrive
    in Ukraine and meet with Ukrainian president Volodymyr Zelenskyy. In the highest-level
    American visit in Kyiv since the beginning of the Russian invasion, Zelenskyy
    is informed of the approved new military assistance for Ukraine. (CBS News)
  - The Russian embassy in Tehran denies that Iran is a secret armament supplier for
    the Russian war effort. (Tasnim News Agency)
  - Insurgency in the Maghreb
  - Mali War
  - Six soldiers are killed and twenty others are injured after attacks on three military
    bases in Mopti and Ségou regions, Mali. (Voice of America)
  - Jihadist insurgency in Burkina Faso
  - Jihadist attacks on military posts in Soum Province, Burkina Faso, kill nine soldiers
    and six civilians, and injure around 30 others. (Reuters)
  - Internal conflict in Myanmar
  - 2021–2022 Myanmar insurgency
  - It is reported that family members of the ruling military junta in the city of
    Yangon are seeking refuge in the country's capital Naypyidaw as urban fighting
    intensifies between soldiers and insurgents. (MyanmarNews)
  - War in Darfur
  - At least 168 people are killed and 98 others injured during a three-day clash
    between Arabs and non-Arabs in West Darfur, Sudan. (Al Jazeera)
  - Crime in Honduras
  - Honduran President Xiomara Castro declares a state of emergency in the Colón Department
    following the death of three policemen in an ambush in Trujillo. The announced
    objective is to apprehend the perpetrators. (elDiario.es)
  - 2022 French presidential election
  - The second round of the French presidential election between Emmanuel Macron and
    Marine Le Pen takes place. (CNN)
  - Exit polls show Emmanuel Macron winning the French presidential election with
    a majority of 58% of votes. Macron becomes the first incumbent President to win
    re-election since Jacques Chirac's victory in the 2002 French presidential election
    against Jean-Marie Le Pen, Marine Le Pen's father. (France 24) (NBC News)
  - Le Pen concedes defeat to Macron, ensuring him a second term. However, she says
    that the results are nonetheless a significant improvement from the previous election
    and therefore a victory for her party. (Sky News) (BBC News)
  - 2022 Slovenian parliamentary election
  - Slovenes head to the polls to elect members of their Parliament. (Xinhua News
    Agency) (Al Jazeera)
  - Exit polls show Robert Golob's green Freedom Movement winning 35.8% of the vote
    over incumbent Prime Minister Janez Janša's right-wing populist Slovenian Democratic
    Party. (The Guardian)
