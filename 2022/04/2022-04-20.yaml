Date: '2022-04-20'
Source_URI: Portal:Current events/2022 April 20
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - Ukrainian negotiator Mykhailo Podolyak says in a tweet that Ukraine is ready to
    hold a special round of negotiations in Mariupol in an effort "To save our guys,
    Azov (battalion), military, civilians, children, the living and the wounded".
    (Reuters)
  - A 91-year-old Holocaust survivor is confirmed to have died on April 4, making
    her the second Holocaust survivor to be killed during the 2022 Russian invasion
    of Ukraine. (BBC News)
  - Presidential advisor Oleksiy Arestovych claims that Ukraine is blocking an attempted
    Russian advance on Sloviansk. (Reuters)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The Pentagon announces that Ukraine has received fighter aircraft and aircraft
    parts to bolster the Ukrainian Air Force. However, the number of aircraft sent
    or their origin are not disclosed. (Euractiv)
  - Kashmir conflict
  - Insurgency in Jammu and Kashmir
  - A Railway Protection Force officer is killed and another is injured in an attack
    in Kakapora, Jammu and Kashmir, India. (NDTV)
  - Israeli–Palestinian conflict
  - The Israel Defence Forces launches airstrikes on targets in the Gaza Strip in
    retaliation for a previous rocket attack launched from Gaza. (AP)
  - Marches organized by ultranationalist Itamar Ben-Gvir in the Arab neighbourhood
    in the old city of Jerusalem are interrupted by Israeli police, leading to skirmishes
    between protesters and police. (EFE via eldiario.es)
  - Colombian conflict
  - Six soldiers are killed and five others are injured in a bombing in north-western
    Antioquia Department, Colombia. The Clan del Golfo is suspected to be behind the
    attack. (BBC News)
  - Oromo conflict
  - At least 20 people are killed and another 50 injured in clashes in the Amhara
    Region, Ethiopia. (BBC News)
  - Six people are killed and 19 others are injured by a bombing at a cattle market
    in Taraba State, eastern Nigeria. The attacker also died in the explosion. The
    Islamic State claims responsibility. (AP)
  - One person is killed and four others are injured when an IED blast hits a bus
    in Bursa, Marmara, Turkey. (Reuters)
  - Five people are killed and seven others remain trapped after a coal mine explosion
    in the Pniówek Coal Mine in Poland. (Reuters)
  - Twenty people are killed and at least one other is injured when a minibus collides
    with a vehicle in Bauchi State, Nigeria. (Reuters)
  - A small plane crashes into a street in Port-au-Prince, Haiti, killing six people.
    (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Delhi
  - New Delhi reinstates mandatory face mask wearing due to an increase in COVID-19
    cases in the Indian capital. (Reuters)
  - COVID-19 pandemic in Israel, Face masks during the COVID-19 pandemic
  - Prime Minister Naftali Bennett's office announces that mandatory indoor mask-wearing
    will be lifted for the second time on April 23 at 8 p.m., pending approval from
    the Knesset Health Committee. However, mask wearing will still be mandatory in
    high-risk locations and by those who are in quarantine. (The Times of Israel)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record 2,386 new COVID-19 cases in the past 24 hours, all locally
    transmitted, bringing the nationwide total of confirmed cases to 40,186. (Focus
    Taiwan)
  - COVID-19 pandemic in Norway
  - COVID-19 vaccination in Norway
  - The Norwegian Institute of Public Health announces that it has begun giving people
    over the age of 80 a second booster dose of the COVID-19 vaccine. (ABC News)
  - Panama–United States relations
  - The United States signs an agreement with Panama to help stop undocumented immigration.
    (The Jerusalem Post)
  - Judge Paul Golspring of the Westminster Magistrates' Court refers to UK Home Secretary
    Priti Patel to sign an extradition order to the United States for Julian Assange
    in relation to WikiLeaks concerning human rights abuses in the Guantanamo detention
    camp and the Iraq war and the war in Afghanistan. (eldiario.es)
  - Two people are killed and three others are seriously injured after being hit in
    a hit and run incident in Cachar district, Assam, India. (Hindustan Times)
  - An Iraqi Shia hacker group named the Altahrea Team launches major cyberattacks
    against numerous Israeli websites in retaliation for the assassination of Qasem
    Soleimani. (Ynet News)
  - 528 Rohingya refugees flee an immigration detention centre in Penang State, Malaysia,
    following a riot inside the building. Six people are killed after colliding with
    motorcyclists while crossing a road. (Al Jazeera)
  - 2022 East Timorese presidential election
  - Former president José Ramos-Horta defeats incumbent president Francisco Guterres
    to become the next President of East Timor. (The Guardian)
