    no reports of casualties. (Reuters)
  - List of rocket attacks from Lebanon on Israel
  - A rocket is fired from Lebanon into Matzuva, Israel. Israel responds by firing
    at targets in Lebanon. (Times of Israel)
  - A limestone statue of the Canaanite goddess Anat from 2,500 BC is found in the
    Gaza Strip. (ABC News)
  - Acquisition of Twitter by Elon Musk
  - Elon Musk reaches an agreement to buy Twitter for $44 billion. (The Verge)
  - A landslide has left at least 2 dead and 9 injured in Bukavu, Democratic Republic
    of the Congo. (BBC News)
