Date: '2022-04-12'
Source_URI: Portal:Current events/2022 April 12
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Mali War
  - The European Union suspends some of its military activities in Mali due to the
    alleged involvement of Russian private military companies in the conflict, especially
    during the Siege of Moura in March. (Reuters)
  - Five soldiers are killed and several others are injured after a landmine planted
    by Islamic extremists explodes in Northern Pendjari National Park, Benin. (Reuters)
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - U.S. President Joe Biden calls the Russian war in Ukraine a "genocide". (AP)
  - 2022 New York City Subway attack
  - Seventeen people are injured during a mass shooting and smoke bomb attack at the
    36th Street station in Brooklyn, New York City, United States. The attacker is
    at large. (BBC News)
  - Israeli–Palestinian conflict
  - A police officer is stabbed and injured by a Palestinian militant in Ashkelon,
    Southern Israel. The attacker is shot dead. (The Guardian)
  - Herder–farmer conflicts in Nigeria
  - Armed Fulani herdsmen kill 23 people in Benue State, Nigeria. (Channels TV)
  - Western Sahara conflict
  - Algerian authorities accuse Morocco of attacking an Algerian vehicle convoy on
    Sunday. (Reuters)
  - Insurgency in Khyber Pakhtunkhwa
  - Two officers and two Tehrik-i-Taliban militants are killed in an ambush in North
    Waziristan, a district of the Pakistani province of Khyber Pakhtunkhwa. (AP)
  - 2022 KwaZulu-Natal floods
  - Major flooding in South Africa, mainly in the city of Durban, kills at least 435
    people and leaves many others missing. (BBC News)
  - An explosion at an Amal Movement scout camp in Sidon, Lebanon, kills one person
    and injures seven others. According to the National News Agency the incident occurred
    due to an accident in a Hamas weapon depot. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Mainland China
  - COVID-19 pandemic in Shanghai
  - Shanghai eases its COVID-19-related restrictions for some 4.8 million residents
    amid concerns that lockdown restrictions would harm the economy. (Reuters)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports 551 new COVID-19 cases in the past 24 hours, which is the highest
    single-day figure of new cases this year. (Focus Taiwan)
  - Cameroon–Russia relations
  - Jeune Afrique reveals that the defence ministers of Russia and Cameroon sign a
    new military cooperation agreement, renewing a similar agreement signed in 2015.
    (Jeune Afrique)
  - COVID-19 pandemic in the United Kingdom
  - Partygate
  - British Prime Minister Boris Johnson, his wife Carrie Johnson, and Chancellor
    Rishi Sunak are fined for breaching the COVID-19 lockdown rules in the country.
    (The Guardian)
  - Abortion in the United States
  - Abortion in Oklahoma
  - Oklahoma Governor Kevin Stitt signs a law criminalising abortion in the state,
    with the exception of cases when the mother's health is in danger. According to
    the law, anyone performing an abortion could face a fine of up to $100,000 and
    up to 10 years in prison, although the woman undergoing the abortion would not
    be penalised. (AP) (The Washington Post)
  - Russian fake news laws
  - A Colombian citizen is arrested in Russia on charges of "spreading false information"
    about the Russian Armed Forces on social media. This is the first known case of
    a foreign national facing possible prosecution under Russia's new "fake news"
    law. (The Moscow Times)
  - Chilean Constitutional Convention
  - The Chilean Constitutional Convention approves defining the country as a "Social
    State" in the new fundamental law, a fact that various constituents and experts
    interpret as a turning point in the country's history. (eldiario.es)
  - Law of Indonesia
  - Law on Elimination of Sexual Violence
  - Indonesia's parliament passed a bill outlawing sexual abuse and forced marriage.
    (CNN)
  - 2021–22 North American winter
  - April 2022 North American storm complex, 2021–22 NHL season
  - The National Hockey League announces that the upcoming Winnipeg Jets game against
    the Seattle Kraken, originally scheduled for April 13, has been postponed to May
    1 as a winter storm sweeps through the southern area of Manitoba. (ESPN)
  - 2022 Major League Baseball season
  - In baseball, San Francisco Giants assistant coach Alyssa Nakken becomes the first
    woman to coach on the field during a Major League Baseball regular season game
    during the team's matchup against the San Diego Padres. (ABC News)
