Date: '2022-04-23'
Source_URI: Portal:Current events/2022 April 23
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 bombing of Odesa
  - Infrastructure in the Southern Ukrainian city of Odesa is hit by airstrikes, killing
    at least five people, including a baby, and injuring 18 others, according to the
    local authorities. (Reuters) (Times of Israel)
  - The Investigative Committee of Russia announces that they are investigating allegations
    by RIA Novosti that troops from the British SAS have been deployed to Western
    Ukraine. (Reuters) (Al Jazeera)
  - War in Darfur, Darfur genocide
  - Human rights groups say that eight people were killed during clashes followed
    by a Janjaweed raid on Thursday and Friday in Kreinik, West Darfur. (AP)
  - 2021–2022 Democratic Republic of the Congo attacks, Ituri conflict, Kivu conflict
  - Kenya says that the East African Community plans to deploy a peacekeeping force
    in the Democratic Republic of the Congo. (AP)
  - Insurgency in Khyber Pakhtunkhwa
  - Unknown gunmen from Afghanistan storm a Pakistani military outpost near the border
    in Pakistan’s North Waziristan District, killing three soldiers. (Al Jazeera)
  - 2022 Imo/Rivers explosion
  - Over 100 people are killed after an illegal oil refining depot explodes in Ohaji/Egbema,
    Imo State, Nigeria. (Reuters)
  - European migrant crisis
  - At least 17 migrants are killed after four boats sink off the coast of Sfax, Tunisia.
    (Reuters)
  - Three people are killed and 98 more are rescued after an explosion at the Gaisky
    ore mine in Orenburg, Russia. (Reuters)
  - Ten people are dead and 16 more are missing as a sightseeing boat sinks off Japan's
    northern island of Hokkaido. (Reuters)
  - Four people are dead and six more are missing after an accident in a coal mine
    in Jastrzębie-Zdrój, Poland. (Reuters)
  - One person dies and 40 people are rescued after a boat sinks in Tripoli, Lebanon.
    (Reuters)
  - Russia–Turkey relations
  - Turkey closes its airspace to Russian Armed Forces flights to Syria, as well as
    civilian aircraft that are suspected of carrying Russian troops. (The Jerusalem
    Post)
  - Thousands of Argentinian farmers protest against President Alberto Fernández's
    new export taxes on farm goods, which protesters say is a "rope that is being
    used to choke us". The farmers used tractors to block the road leading to the
    Casa Rosada in Buenos Aires. (Reuters)
  - 2022 Major League Baseball season
  - In baseball, the Chicago Cubs defeat the Pittsburgh Pirates, 21–0, the largest
    defeat in Pirates history and the largest victory in Cubs history since 1901.
    (CBS News) (Chicago Sun Times)
  - Tyson Fury vs. Dillian Whyte
  - Tyson Fury retains the WBC world heavyweight title after defeating Dillian Whyte
    via technical knockout in round 6 in front of 94,000 spectators at Wembley Stadium,
    London, a post-war British record. Post-match, Fury suggests that he may now retire
    from professional boxing. (BBC Sport)
