Date: '2022-04-03'
Source_URI: Portal:Current events/2022 April 3
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine offensive
  - Battle of Odesa
  - Large explosions are reported in the port city of Odesa as residents are urged
    to seek shelter. Ukrainian officials say the Russian Air Force has fired missiles
    at the city, and that some missiles have been intercepted. (BBC News) (NDTV)
  - Bucha massacre, War crimes in the 2022 Russian invasion of Ukraine
  - Human Rights Watch, an independent human rights group, says that it has documented
    allegations of war crimes perpetrated by Russian forces in Ukraine against civilians,
    including rape, summary execution, and looting of civilian properties. (CNN)
  - The United States, the European Union, and NATO leaders react to emerging reports
    of the massacre in Bucha, accusing the Russian Armed Forces of war crimes and
    calling for more sanctions against Russia. (BBC News)
  - Afghanistan conflict
  - One person is killed and several more are injured after a militant bombs a money
    exchange hub in Kabul, Afghanistan. While the Taliban says that ten people were
    injured, the city's emergency hospital counts an injury toll of 59. (Reuters)
  - Allied Democratic Forces insurgency
  - Twenty-one people are killed during an ADF attack at the village of Masambo, in
    the Democratic Republic of the Congo. (Reuters)
  - 64th Annual Grammy Awards
  - During the ceremony, Ukrainian President Volodymyr Zelenskyy makes a video appearance
    and delivers a pre-taped speech urging viewers to support his country during the
    invasion in "any way" they can. (The Hollywood Reporter) (The Washington Post)
  - COVID-19 pandemic
  - COVID-19 pandemic in China
  - COVID-19 pandemic in Shanghai
  - Around 25 million residents in Shanghai are ordered to undergo COVID-19 testing
    in an effort to contain the current COVID-19 outbreak. (South China Morning Post)
  - 2022 Sacramento shooting
  - Six people are killed and 12 others are injured during a mass shooting at a popular
    nightlife area in Sacramento, California, United States. (ABC News)
  - 2022 NCAA Division I Men's Basketball Tournament
  - Around ten people are injured in downtown Chapel Hill, North Carolina, after a
    series of riots broke out following UNC's victory against Duke in the Final Four.
    (CNN)
  - 2022 Hungarian parliamentary election
  - Voters in Hungary head to the polls to elect a new National Assembly. (The Guardian)
  - Fidesz, the party of current Prime Minister Viktor Orbán, wins most of the seats
    and retains its parliamentary supermajority, while opposition leader Péter Márki-Zay
    loses his home district of Hódmezővásárhely. (CNN)
  - 2022 Serbian general election
  - Voters in Serbia head to the polls to vote in the presidential and parliamentary
    elections. (DW)
  - President Aleksandar Vučić is re-elected with 60.0% of the vote, and his party
    Serbian Progressive Party wins the most votes in the National Assembly at 42.9%
    though fail to win an overall majority of seats. (Reuters)
  - 2022 Costa Rican general election
  - Voters in Costa Rica head to the polls to vote in the second round of the presidential
    election. (TSE)
  - Rodrigo Chaves Robles is elected President of Costa Rica. (Reuters)
  - 2022 Pakistani constitutional crisis
  - Pakistani President Arif Alvi dissolves the National Assembly after Deputy Speaker
    Qasim Suri refused to hold a motion of no confidence against Prime Minister Imran
    Khan, who was widely expected to lose the motion. Khan previously accused the
    United States of conspiring with the opposition to remove him due to his opposition
    towards US foreign policy, which the US denies. (BBC News)
  - 2022 Sri Lankan protests
  - The entire cabinet of Prime Minister Mahinda Rajapaksa resigns following days
    of economic protests in Sri Lanka. (BBC News)
  - Former Crown Prince of Jordan Hamzah bin Hussein announces on Twitter that he
    is renouncing his "Prince" title, saying that his "personal convictions" are not
    in line with the "modern methods of our institutions". Hamzah has been under house
    arrest since last March after he accused Jordanian leaders of corruption and incompetence.
    (BBC News)
  - Homosexuality in association football
  - Qatar bans LGBT symbols at the 2022 FIFA World Cup. (Euronews) (NBC News)
