Date: '2022-04-09'
Source_URI: Portal:Current events/2022 April 9
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 Russia–Ukraine peace negotiations
  - Ukrainian President Volodymyr Zelenskyy says that Ukraine is still ready to continue
    peace negotiations with Russia. (RTÉ)
  - Eastern Ukraine offensive
  - Four people in Vuhledar and one person in Novomykhailivka, Marinka Raion, are
    killed by Russian shelling. Two people are injured. (Times of Israel)
  - Ukrainian Minister of Reintegration of Temporarily Occupied Territories Iryna
    Vereshchuk announces that President Zelenskyy has ordered a third prisoner exchange
    with Russia, with 12 Ukrainian soldiers and 14 civilians returning to Ukraine.
    (RFerl)
  - Israeli–Palestinian conflict
  - 2022 Tel Aviv shooting
  - Israeli soldiers raid the refugee camp in Jenin where the perpetrator of the Tel
    Aviv shooting lived. A Palestinian Islamic Jihad member is killed and 13 other
    people are injured. (Times of Israel) (Al Jazeera)
  - In retaliation for the Israeli raid, a group of around 100 Palestinian rioters
    vandalize Joseph's Tomb in Nablus. The gravestone and some other objects are damaged
    in the attack. (The Jerusalem Post) (Ynet)
  - Israeli–Syrian ceasefire line incidents during the Syrian civil war
  - The state-owned Syrian Arab News Agency says that Israeli airstrikes have hit
    the northwestern city of Masyaf. No casualties have been reported. (Times of Israel)
  - International sanctions during the Russo-Ukrainian War, Economic impact of the
    2022 Russian invasion of Ukraine, 2022 Russian financial crisis
  - S&P Global Ratings lowers its rating of Russian foreign obligations to "SD" (selective
    default) since the Russian government decided to use rubles to pay off its bondholders
    instead of using U.S. dollars as stipulated. However, S&P expects that Russia
    will still meet its other payment obligations. (Reuters)
  - Earthquakes in 2022
  - A magnitude 5.2 earthquake hits the town of Pütürge in eastern Turkey. No casualties
    or serious damage are reported. (AP)
  - European migrant crisis
  - At least 13 people are killed and 10 others are missing after two boats carrying
    African migrants sink off the coast of Sfax, Tunisia. At least 19 people have
    been rescued. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Saudi Arabia
  - Impact of the COVID-19 pandemic on Hajj
  - The Ministry of Hajj and Umrah announces that Saudi Arabia will lift their COVID-19
    restrictions on the hajj and will allow 1 million people to participate in the
    event for the first time since 2019. (Al Arabiya)
  - COVID-19 pandemic in Azerbaijan
  - Azerbaijani Healthcare Minister Teymur Musayev announces that Azerbaijan will
    develop their own domestic vaccines to combat COVID-19. (AzerNews)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - U.S. Agriculture Secretary Tom Vilsack tests positive for COVID-19. (CNN)
  - Foreign relations of Ukraine
  - EU High Representative Josep Borrell announces that the European Union and Italy
    will resume their diplomatic operations in Kyiv after temporarily relocating to
    Lviv. (The Hill)
  - Law of "confrontation with human-rights violations and USA adventuresome and terrorist
    measures in the region"
  - Iran sanctions 15 Americans with ties to the Trump administration. (IRNA)
  - Libyan peace process
  - Libyan Army officials in Eastern Libya announce their refusal to take part in
    the 5+5 Libyan Joint Military Commission, urging warlord Khalifa Haftar to cut
    off oil exports and transport to the Western half of the country. (Reuters)
  - 2022 Pakistani political crises
  - Pakistani Prime Minister Imran Khan and his government are ousted in a no-confidence
    vote put forward by the country's political opposition. (AP)
  - 2022 Grand National
  - Noble Yeats, ridden by jockey Sam Waley-Cohen, wins the 2022 Grand National horse
    race at Aintree Racecourse in Merseyside, England. Noble Yeats was a surpise victor
    at 50–1, beating the favourite Any Second Now. (The Telegraph)
