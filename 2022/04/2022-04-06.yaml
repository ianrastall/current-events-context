Date: '2022-04-06'
Source_URI: Portal:Current events/2022 April 6
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Battle of Sievierodonetsk
  - Russian forces shell Sievierodonetsk, Luhansk Oblast, setting ten high-rise buildings
    on fire. (The Guardian)
  - Four civilians are reported to have been killed by the Russian military in Vuhledar,
    Donetsk Oblast. (Reuters)
  - 2022 Russia–Ukraine peace negotiations
  - Russia says it will end its invasion if Ukrainian President Volodymyr Zelenskyy
    agrees to conditions set during negotiations, specifically a legal guarantee that
    Ukraine will not join NATO by changing the Ukrainian constitution to include such
    a provision. Russia also says it suspended operations in Kyiv as a "goodwill gesture"
    in order to promote peace talks. (Hindustan Times)
  - Afghanistan conflict (1978–present)
  - A hand grenade is thrown into the Pul-e Khishti Mosque in Kabul, Afghanistan,
    killing at least one person and injuring five others. (La Prensa Latina) (Deutsche
    Welle)
  - Iraqi conflict
  - Three missiles land near an oil refinery in Erbil, Iraqi Kurdistan. Two American
    security personnel are injured. (Reuters)
  - Four Europeans go missing after a diving trip off the coast of Mersing, in the
    Johor state of Malaysia. Authorities say that a search operation is ongoing and
    one person has since been rescued. (The Guardian) (ABC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - U.S. Attorney General Merrick Garland and U.S. Commerce Secretary Gina Raimondo
    test positive for COVID-19 after attending the Gridiron Club's annual dinner in
    Washington, D.C.. Several other attendees also tested positive. (NBC News)
  - A man dies after ramming his vehicle into the fence of the Russian Embassy in
    Bucharest, Romania and setting himself on fire. (Gazeta de Cluj) (Reuters)
  - Former President of Burkina Faso Blaise Compaoré is found guilty of complicity
    in the murder of the country's first president, Thomas Sankara, and is sentenced
    in absentia to life imprisonment. Compaoré has been in exile in Ivory Coast ever
    since resigning to the presidency following the 2014 Burkina Faso uprising. (The
    Guardian)
  - Poland arrests two Belarusian citizens on charges of spying for Minsk. (Reuters)
  - 2019–2022 Sudanese protests
  - A protester is shot dead as security forces confront anti-coup demonstrations
    in the state of Khartoum, Sudan. (Reuters)
  - The governing coalition of Israeli Prime Minister Naftali Bennett loses its majority
    in the Knesset after coalition whip Idit Silman of the Yamina party defects to
    the opposition Likud party, raising the possibility of new elections in Israel
    for the fifth time in four years. (Axios)
  - 2022 boycott of Russia and Belarus
  - It is announced that Russian and Belarusian athletes will be banned from participating
    in the 2022 Boston Marathon due to the invasion. (Boston.com)
