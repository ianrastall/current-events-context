Date: '2022-04-26'
Source_URI: Portal:Current events/2022 April 26
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The United Kingdom's Armed Forces Secretary James Heappey says that Ukraine can
    strike targets inside Russia with British weapons, saying that it is "completely
    legitimate" in order to disrupt attacks on Ukraine. (The Guardian)
  - The Russian Defence Ministry accuses the UK of "provoking Ukraine" into attacking
    Russian territory, and warns of a "proportional response" should any attacks occur.
    (BBC News)
  - Germany announces the delivery of 50 ex-Bundeswehr Gepard anti-air tanks to Ukraine,
    the first heavy weaponry supplied by Germany since the start of the invasion.
    (Reuters)
  - 2022 Russia–Ukraine peace negotiations
  - UN Secretary-General António Guterres visits Moscow in order to meet with Russian
    President Vladimir Putin. Before the meeting, Guterres calls for a ceasefire to
    end the war. (The Hindu)
  - President Putin says that Russia and Ukraine are continuing ceasefire talks online.
    (Reuters)
  - A Russian missile strike destroys a strategic bridge across the Dniester Estuary
    in Odesa Oblast, according to Ukrainian authorities. (AP)
  - Russian Foreign Minister Sergey Lavrov says that weapons supplied to Ukraine "will
    be a legitimate target for Russia's military" and further stating "storage facilities
    in western Ukraine have been targeted". Lavrov also stated that "NATO, in essence,
    is engaged in a war with Russia through a proxy and is arming that proxy. War
    means war." (Al Jazeera) (The Independent)
  - Transnistria conflict
  - 2022 Transnistria attacks
  - Moldova's Supreme Security Council convenes an emergency meeting after yesterday's
    attacks in the breakaway Transnistria. President Maia Sandu says that the attacks
    were aimed at "destabilising the situation in the region", and also says that
    the military will improve combat readiness and increase patrols on the border
    with Transnistria. (Reuters)
  - Insurgency in Balochistan
  - 2022 University of Karachi bombing
  - Three Chinese citizens and their Pakistani driver are killed and four others are
    injured when a Balochistan Liberation Army suicide bomber blows herself up near
    their van in Karachi, Sindh, Pakistan. (BBC News) (Reuters)
  - Insurgency in the Maghreb
  - Gunmen open fire at a police station in Karimama, Benin, killing one officer and
    wounding several more. (Reuters)
  - Russia in the European energy sector
  - 2022 Russia–European Union gas dispute
  - Gazprom announces that it will stop delivering natural gas to Poland via the Yamal–Europe
    pipeline and to Bulgaria as both countries rejected Russia's demand to pay for
    the fossil fuel supply in Russian rubles. Poland does not expect to experience
    disruptions from the suspension of natural gas deliveries. However, the suspension
    of Russian gas deliveries to Bulgaria "poses a serious challenge to the security
    of supply to the country" as Bulgaria is almost completely dependent on Russian
    gas. (Deutsche Welle) (Rzeczpospolita) (Reuters)
  - European migrant crisis
  - A person is killed and 24 are missing after a migrant vessel crashes off the coast
    of Spain's Canary Islands. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Washington, D.C.
  - Vice President Kamala Harris tests positive for COVID-19. (CNBC)
  - Veshkayma kindergarten shooting
  - A staff member and two children are killed, and another staff member is injured
    in a shooting at a kindergarten in Veshkayma, Ulyanovsk Oblast, Russia. The gunman
    later kills himself. (Reuters)
  - Twenty Islamic worshippers are killed during riots in Gondar, Amhara Region, Ethiopia.
    (Reuters) (France 24)
  - In the morning, the Moon, Jupiter, and Venus are seen aligning with each other.
    (Space.com)
