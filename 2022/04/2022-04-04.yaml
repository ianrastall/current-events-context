Date: '2022-04-04'
Source_URI: Portal:Current events/2022 April 4
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Battle of Bucha
  - U.S. President Joe Biden calls for Russian President Vladimir Putin to face trials
    for war crimes after more images emerge of the Bucha massacre. (CNN)
  - 2022 Russia–Ukraine peace negotiations
  - Ukrainian President Volodymyr Zelenskyy says that peace talks will continue despite
    the Bucha massacre. (BBC News)
  - Kashmir conflict
  - An Indian Central Reserve Police Force officer is killed and another is wounded
    by militants in the Maisuma neighbourhood of Srinagar, Jammu and Kashmir. (Times
    of India)
  - International sanctions during the Russo-Ukrainian War
  - Lithuania bans Russian IT companies from relocating to Lithuania. (LRT)
  - Germany assumes control of Gazprom Germania, Gazprom's German subsidiary, after
    the German economy ministry declines to approve the subsidiary's acquisition by
    two entities with unclear beneficiaries. (Financial Times)
  - Lebanese liquidity crisis
  - Deputy PM Saadeh Al Shami says that Lebanon and its central bank are bankrupt.
    (Anadolu Agency)
  - A train derails in Lualaba Province, Democratic Republic of the Congo, killing
    seven people and injuring 14 others. (The Punch)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Lithuania
  - Lithuania lifts requirements for masks in indoor spaces, except in public transport
    and medical facilities, and reduces the COVID-19 isolation period to five days.
    (LRT)
  - COVID-19 pandemic in Sweden, COVID-19 vaccination in Sweden
  - The Public Health Agency of Sweden recommends a fourth COVID-19 vaccine dose for
    people over age of 65 years, as well as other adults aged 18–64 with weak immune
    response. (The Local Sweden)
  - COVID-19 pandemic in mainland China
  - China reports 13,146 new cases of COVID-19 in the past 24 hours, which is the
    highest single-day total of new cases since the height of the pandemic in Wuhan
    in February 2020. (France 24)
  - Reactions to the 2022 Russian invasion of Ukraine
  - Lithuania–Russia relations
  - Lithuania orders the closure of the Russian consulate in Klaipėda and downgrades
    diplomatic ties with Russia, ordering the Russian ambassador to leave the country.
    (LRT)
  - France–Russia relations, Germany–Russia relations, Latvia–Russia relations
  - France, Germany and Latvia expel Russian diplomats in response to war crimes in
    the 2022 Russian invasion of Ukraine, specifically the Bucha massacre. (Radio
    Free Europe) (Axios)
  - Russia–European Union relations, Iceland–Russia relations, Norway–Russia relations,
    Russia–Switzerland relations
  - Russia restricts diplomats, journalists, and politicians from the European Union,
    Iceland, Norway, Switzerland, and Liechtenstein from obtaining a visa by a simplified
    procedure. (Kommersant) (Reuters)
  - 2022 Sacramento shooting
  - The Sacramento Police Department arrests a 26-year-old man in connection to yesterday's
    mass shooting that left six people dead and 12 others injured. (KTVU-TV)
  - Discoveries of exoplanets
  - Astronomers announce the discovery of K2-2016-BLG-0005Lb, an exoplanet that is
    said to resemble Jupiter. The discovery was made using the now-retired Kepler
    space telescope. (ScienceAlert)
  - The third part of the IPCC Sixth Assessment Report is released, studying methods
    to mitigate climate change. (Met Office)
  - Centerra Gold announces that they have reached an agreement with Kyrgyzstan to
    hand control of the Kumtor Gold Mine to the Kyrgyz government. (Mining.com)
  - 2022 NCAA Division I Men's Basketball Tournament
  - In basketball, the Kansas Jayhawks rally from a 15-point deficit to defeat the
    8th-seeded North Carolina Tar Heels 72–69 in the National Championship Game. This
    is the 4th championship for the Kansas Jayhawks men's basketball team, and their
    first since 2008. (The New York Times)
