Date: '2022-04-01'
Source_URI: Portal:Current events/2022 April 1
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - Battle of Bucha
  - Ukrainian forces recapture Bucha, Kyiv Oblast, from Russian troops. (Ukrinform)
  - Battle of Irpin
  - Ukrainian forces recapture the city of Irpin after driving out the last Russian
    troops. Mayor Oleksandr Markushyn confirms that the city has been fully liberated.
    (BBC News)
  - The body of Reuters journalist Maks Levin is found in the town of Huta Mezhyhirska,
    near Kyiv. Levin had already disappeared several days before and is the sixth
    journalist to be killed in the country since Russia invaded. (The Guardian)
  - Attack on Belgorod
  - Russia claims that the Ukrainian Air Force conducted an airstrike on Belgorod,
    hitting several fuel facilities. Videos on social media show low-flying attack
    helicopters firing rockets at a fuel depot in the city. (AP)
  - 2022 Russia–Ukraine peace negotiations
  - Ceasefire talks between the Russian and Ukrainian delegations resume via video
    link. (Times of Israel)
  - Insurgency in the Maghreb
  - Mali War
  - Mali says that it has killed 203 insurgents in a major nine-day military operation
    from 23 March to April 1. (The Guardian)
  - Afghanistan conflict
  - Two bombs explode at a playing field in Herat, Afghanistan, killing five people
    and injuring 25 more. (ABC News)
  - Israeli–Palestinian conflict
  - A Palestinian man is shot dead by Israeli security forces in clashes in Hebron.
    (Jerusalem Post) (Al Jazeera)
  - Yemeni Civil War
  - The Saudi-led coalition and the Houthis agree to a UN-brokered nationwide truce,
    the first in years, for two months to mark the start of Ramadan. As part of the
    deal, fuel shipments will be allowed to enter the Houthi-controlled port of Al
    Hudaydah and commercial flights will resume in the capital of Sanaa. (Reuters)
  - 2022 Waheen Market Fire
  - A massive fire breaks out at the main marketplace in Hargeisa, Somaliland, injuring
    at least 28 people and completely destroying the market. (The Guardian)
  - Eight people are killed and 20 more are injured during a coal mine collapse in
    Aleksinac, Serbia. (Al Jazeera)
  - Four pilots are killed after two South Korean Air Force KAI KT-1 Woongbis crash
    into each other over a mountain northeast of Sacheon, South Korea. (Deutsche Welle)
  - COVID-19 pandemic
  - COVID-19 pandemic in Russia
  - COVID-19 vaccination in Russia
  - The Russian Health Ministry announces that Russia has registered the nasal spray
    form of the Sputnik V vaccine, making Russia the first country to register a nasal
    spray COVID-19 vaccine. (TASS)
  - COVID-19 pandemic in Italy
  - Italy ends its two-year state of emergency and begins to gradually lift attendance
    limits for outdoor and indoor sports venues, along with a requirement that anyone
    over the age of 50 should be vaccinated to enter their place of work. (Reuters)
  - COVID-19 pandemic in Malaysia
  - Malaysia begins its transition from pandemic to endemic phase that shift the management
    of the pandemic from reliance on government-imposed standard operating procedures
    and existing laws to individual responsibility, and community solidarity. (The
    Star)
  - COVID-19 pandemic in the United States
  - The U.S. CDC announces that the Biden administration will end the usage of Title
    42, a series of COVID-19 restrictions imposed by the Trump administration in order
    to prevent migrants from entering the United States. The measure will take effect
    on May 23. (CNBC)
  - Canada–Holy See relations
  - Canadian Indian residential school system
  - Following a meeting with indigenous delegates from Canada, Pope Francis apologizes
    for the "deplorable conduct" by members of the Catholic Church for actions in
    the church-run residential school system. (CBC News)
  - Ukraine–European Union relations
  - President of the European Parliament Roberta Metsola travels to Kyiv to meet with
    Ukrainian president Volodymyr Zelenskyy and chairman of the Verkhovna Rada Ruslan
    Stefanchuk, and subsequently addresses the Verkhovna Rada. Metsola becomes the
    first EU official to visit Ukraine since the Russian invasion began. (Times of
    Malta)
  - Sri Lankan economic crisis
  - 2022 Sri Lankan protests
  - President Gotabaya Rajapaksa declares a state of emergency as civil unrest spreads
    across the country. Dozens of Sri Lanka Police officers have been injured in clashes
    with protesters and 52 people have been arrested. (Reuters)
  - Oscar Mina and Paolo Rondelli are elected the new Captains Regents of San Marino.
    (San Marino TV)
