Date: '2022-04-22'
Source_URI: Portal:Current events/2022 April 22
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine offensive, Russian occupation of Kherson
  - Russian Major general Rustam Minnekayev says that the goal of the military operation
    is now to seize territory in Southern Ukraine in order to create a land corridor
    from Crimea to Ukraine's border with Transnistria, a pro-Russian unrecognized
    breakaway state that is internationally recognized as part of Moldova. (BBC News)
    (The Guardian)
  - 2022 Ukrainian refugee crisis
  - Ukraine says that it will not allow residents to evacuate Mariupol today over
    concerns that the route is too dangerous. (Times of Israel)
  - The mayor of Balakliia in Kharkiv Oblast is charged with treason by Ukrainian
    authorities for accepting aid from Russian occupation forces. The mayor is believed
    to have fled to Russia with his family. (Newsweek)
  - Afghanistan conflict
  - 2022 Kunduz mosque bombing
  - At least 33 people are killed and 43 others are injured by a bombing at a Sufi
    mosque in Kunduz, Afghanistan. (BBC News)
  - Israeli–Palestinian conflict
  - At least 57 Palestinians are injured after Israeli police fire stun grenades and
    rubber bullets at a crowd of worshipers within the Al-Aqsa mosque compound in
    East Jerusalem, in response to stones and fireworks being thrown at Jewish worshipers.
    (Reuters)
  - Two rockets are launched into Israel from the Gaza Strip. One rocket lands in
    Sha'ar HaNegev and the other falls into the Beit Hanoun area, injuring one person.
    (Times of Israel)
  - Kashmir conflict
  - A soldier and six rebels are killed in fighting in Jammu and Kashmir, India. Four
    members of the security forces are injured. (AP)
  - Somali Civil War
  - Pescatore Seafood Restaurant bombing
  - Six people are killed and seven others injured by an al-Shabaab suicide bomber
    at a restaurant on Lido Beach, Mogadishu. (BBC News)
  - Kivu conflict, Ituri conflict
  - The East African Community agree to set up a regional military force in eastern
    Democratic Republic of the Congo in an attempt to end the conflicts there. (Reuters)
  - The Iranian Ministry of Industry, Mine and Trade bans the import of iPhones. (Tasnim)
  - 2022 Bosnia and Herzegovina earthquake
  - One person is killed and 14 others are injured after a magnitude 5.7 earthquake
    strikes Bosnia and Herzegovina. (Las Vegas Sun)
  - One person is killed and two others are injured after a transport plane crashes
    in Zaporizhzhia (region), Ukraine. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Pennsylvania
  - COVID-19 pandemic in Philadelphia
  - Philadelphia lifts their mask mandate days after reinstating it. (The Philadelphia
    Inquirer)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales, COVID-19 pandemic in Victoria
  - Public health restrictions are eased in New South Wales and Victoria. (The Guardian)
  - COVID-19 pandemic in mainland China
  - COVID-19 pandemic in Shanghai
  - Authorities in Shanghai announce that they will tighten the enforcement of lockdown
    measures, as COVID-19 cases continue to increase in the city. (BBC News)
  - COVID-19 pandemic in Samoa
  - Samoa reports five community spread COVID-19 cases on Manono Island, which had
    been free of the virus until now. (RNZ)
  - Japan–Russia relations
  - Japan and Russia sign an agreement on fishing quotas after a month of negotiations.
    The two countries agree on Japan's quota of 2,050 tons of salmon and trout within
    Russia's exclusive economic zone, which is the same level as last year, while
    Japan agrees to pay fees of between 200–300 million yen to Russia. (Reuters)
  - Disappearance of Madeleine McCann
  - German authorities formally identify a suspect in the 2007 disappearance of a
    British three-year-old girl in Portugal. (CNN)
  - France issues an international arrest warrant for former Nissan chairman Carlos
    Ghosn. (DW)
