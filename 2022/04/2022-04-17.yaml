Date: '2022-04-17'
Source_URI: Portal:Current events/2022 April 17
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Siege of Mariupol
  - The Russian Armed Forces give an ultimatum to the last remaining holdout of Ukrainian
    troops and "foreign fighters" at the Azovstal iron and steel works plant in Mariupol
    to surrender. Defenders of the Azov Sea port ignore the ultimatum. (Reuters) (Al
    Jazeera)
  - 2022 Ukrainian refugee crisis
  - For the first time since the invasion began, more Ukrainians entered Ukraine from
    Poland than left, according to the Polish Border Guard. (BBC News)
  - Six people are killed by Russian missile strikes on Lviv. (Independent)
  - Insurgency in the Maghreb
  - Jihadist insurgency in Niger
  - More than 70 Islamic State – West Africa Province militants are killed during
    airstrikes by Niger and Nigeria at the border between the two countries. (Al Jazeera)
  - American conspiracy theorist website InfoWars files for Chapter 11 bankruptcy
    due to mounting legal fees from lawsuits over its spread of conspiracy theories
    about the Sandy Hook Elementary School shooting. (NPR)
  - COVID-19 pandemic
  - COVID-19 pandemic in Australia
  - The government withdraws its ban on foreign cruise ships. (South China Morning
    Post)
  - North Korea and weapons of mass destruction
  - North Korea says that it tested a new weapon to boost their tactical nuclear capabilities.
    (BBC News)
  - Two people are killed and 13 more injured in a mass shooting at a party in Pittsburgh,
    Pennsylvania, United States. (AP)
  - Myanmar's military junta pardons 1,619 prisoners in an annual tradition. However,
    no political prisoners were pardoned. (France 24)
  - Around 70 Extinction Rebellion members, including canoeist Etienne Stott and sailor
    Laura Baldwin, are detained after gluing themselves to a Shell oil tanker truck
    near the Marble Arch at Hyde Park in London, UK. (BBC News)
  - Citizen Lab's research reveals at least 65 pro-independence Catalan figures -
    including Pere Aragonès and Carles Puigdemont - have been targeted using NSO Group’s
    Pegasus spyware. (The Guardian)
  - 2022 Nippon Professional Baseball season, Rōki Sasaki's perfect game
  - Chiba Lotte Marines pitcher Rōki Sasaki is taken out after throwing 102 pitches
    and eight perfect innings to end his attempt for a second consecutive perfect
    game, one week after completing his first one. (MLB.com)
