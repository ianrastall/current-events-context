Date: '2022-04-16'
Source_URI: Portal:Current events/2022 April 16
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Northeastern Ukraine offensive
  - Battle of Kharkiv
  - Russian missile strikes hit Kharkiv, killing one person. (Reuters)
  - A restaurant operated by the World Central Kitchen is confirmed to be destroyed
    by the missile strike. (The Hill)
  - 2022 Russia–Ukraine peace negotiations
  - It is reported that Russian oligarch Roman Abramovich has visited Kyiv in an effort
    to revive peace talks between Russia and Ukraine. (Bloomberg.com)
  - The Russian Air Force launches airstrikes on Kyiv. (CTV News)
  - One person is killed and six others injured after an oil tanker explodes east
    of Hong Kong. (Al Jazeera)
  - Russia–United Kingdom relations
  - Russia's foreign ministry bans Prime Minister Boris Johnson, Foreign Secretary
    Liz Truss, and 11 other British senior politicians from entering Russia. (BBC
    News)
  - Japan's Ministry of Defense reports that it scrambled fighters to intercept foreign
    military aircraft 1,004 times in 2021, in 722 of these cases the foreign aircraft
    were from the People's Republic of China. (The Diplomat)
  - 2022 Salvadoran gang crackdown
  - President of El Salvador Nayib Bukele announces that 12,169 gang members have
    been arrested since the state of emergency began on March 27. (Europa Press)
  - Columbiana Centre shooting
  - A mass shooting at a shopping mall near Columbia, South Carolina, United States,
    injures 12 people. (The Guardian)
  - Riots between Hindus and Muslims during a Hanuman Jayanti ceremony in Delhi, India,
    leave several people injured. (Reuters)
  - Rioting in Sweden continues for a second day after the far-right Hard Line party
    led by Rasmus Paludan organized a Quran burning event in Landskrona. (AP)
  - Chinese space program
  - Chinese astronauts Ye Guangfu, Wang Yaping and Zhai Zhigang of the Shenzhou 13
    spacecraft land successfully in Inner Mongolia after spending 183 days in space.
    During the spaceflight, Wang Yaping became the first Chinese woman to perform
    a spacewalk. (Al Jazeera)
  - 2022 USFL season
  - In American football, the United States Football League kicks off their inaugural
    season with the Birmingham Stallions defeating the New Jersey Generals 28–24,
    marking the return of the USFL for the first time since the 1985 season. (CBS
    Sports)
  - Lotte Championship
  - South Korean professional golfer Kim Hyo-joo wins the 2022 LPGA Lotte Championship.
    (France 24)
