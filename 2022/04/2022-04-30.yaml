Date: '2022-04-30'
Source_URI: Portal:Current events/2022 April 30
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 Russia–Ukraine peace negotiations
  - Russian Foreign Minister Sergey Lavrov says that sanctions must be lifted as part
    of the peace negotiations between Ukraine and Russia. (Reuters)
  - April 2022 Belgorod and Bryansk attacks
  - Governor of Kursk Oblast Roman Starovoyt says that shells have been launched at
    a border checkpoint from the direction of Ukraine. (Reuters)
  - Around 20 civilians have left the steel plant, a deputy commander of the Azov
    Battalion says. (The Times of Israel)
  - Afghanistan conflict
  - At least one person is killed and three others injured when a van explodes in
    Kabul, Afghanistan. (Reuters)
  - Sinai insurgency
  - A natural gas pipeline is blown up in Bir al-Abd, North Sinai, Egypt, by suspected
    jihadist militants. (Times of Israel)
  - A plane carrying four people crashes in Sioux Lookout, Ontario, Canada, killing
    everyone on board. (CBC)
  - A tornado strikes Andover, Kansas, United States, inflicting heavy damage. As
    part of the same weather system, three storm chasers are killed in a car accident
    due to aquaplaning. (BBC News) (USA Today)
  - Five people are rescued and dozens of others remain trapped after a building collapses
    in Changsha, China. (BBC News)
  - A tricycle falls into a man-made channel in Itay El Barud, Egypt. Eight children
    die and four people are rescued. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - It is announced that Beijing residents must show proof of a negative COVID-19
    test in order to enter public spaces as part of a major tightening of restrictions
    in the Chinese capital. (BBC News)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record for the third consecutive day of 15,419 new COVID-19 cases.
    (Focus Taiwan)
  - Israel–Palestine relations, Israeli–Palestinian peace process
  - Hamas warns that, if another attempt to storm the al-Aqsa Mosque is made by Israel,
    war could break out. (France 24)
  - 2021–22 La Liga
  - In association football, Real Madrid wins a record 35th La Liga title, following
    a 4–0 victory over Espanyol. Manager Carlo Ancelotti becomes the first manager
    to win titles in all of Europe's top five leagues. (ABS-CBN News)
