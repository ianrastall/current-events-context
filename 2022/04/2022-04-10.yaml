Date: '2022-04-10'
Source_URI: Portal:Current events/2022 April 10
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Kyiv offensive
  - A mass grave of Ukrainian civilians is discovered near the village of Buzova,
    Kyiv Oblast. (Radio Free Europe/Radio Liberty) (Reuters)
  - Prosecutor General of Ukraine Iryna Venediktova says that 1,222 bodies have been
    discovered so far in Kyiv Oblast. (Times of Israel)
  - Northeastern Ukraine offensive
  - Two people are killed and several others are injured by Russian shelling in the
    town of Derhachi, Kharkiv Oblast. (Reuters)
  - Dnipro International Airport is completely destroyed by Russian missile strikes.
    Five people are injured. (Reuters)
  - Israeli–Palestinian conflict
  - The Israel Defence Forces perform a raid in the West Bank city of Jenin. Two brothers
    of dead Palestinian militant Raad Hazem are injured. (The Jerusalem Post)
  - An Israel Border Police officer is injured in a stabbing attack at the entrance
    to the Cave of the Patriarchs in Hebron. The attacker is killed. (Reuters)
  - A Palestinian woman is killed in a confrontation with the Israel Defence Forces
    in Husan. (AP)
  - A man is killed after reportedly throwing a Molotov cocktail at Israeli forces
    in Al-Khader, Bethlehem Governorate. (Times of Israel)
  - Nigerian bandit conflict
  - 2022 Plateau State massacre
  - Fifty people are killed and 70 others kidnapped in a series of attacks in Plateau
    State, Nigeria. (Reuters)
  - War in Darfur
  - Twelve people are killed and 10 more injured during a mass shooting at the Tangi
    and Bir Dagig villages in West Darfur, Sudan. (Dabanga)
  - Spain–Western Sahara relations
  - The Polisario Front suspends all relations with Spain. (Reuters)
  - Two people are killed and ten others hospitalized in a mass shooting in Cedar
    Rapids, Iowa, United States. (USA Today) (KGAN)
  - 2022 French presidential election
  - Voters in France go to the polls to elect their next President. (The New York
    Times)
  - Incumbent President Emmanuel Macron wins the first round with 28.1% of the vote
    and will face Marine Le Pen, who has obtained 23.3% of the vote, in the second
    round on April 24. (elDiario.es)
  - 2022 Nippon Professional Baseball season, Rōki Sasaki's perfect game
  - Chiba Lotte Marines pitcher Rōki Sasaki throws a perfect game, the first in 28
    years and the 16th in NPB history, tying the existing NPB record by striking out
    19 batters, and setting a new record by striking out 13 consecutive batters. (Kyodo
    News)
  - 2022 Masters Tournament
  - American professional golfer Scottie Scheffler wins the Masters Tournament at
    the Augusta National Golf Club in Augusta, Georgia. This win is Scheffler's first
    win at the tournament. (CBS Sports)
