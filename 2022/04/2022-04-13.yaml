Date: '2022-04-13'
Source_URI: Portal:Current events/2022 April 13
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - The Russian defence ministry claims that around 1,000 Ukrainian marines have surrendered
    to Russia. Ukraine makes no comment. (Rferl)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The United States says that it is sending an additional $800 million in military
    aid to Ukraine, as well as heavy weapons, including artillery systems, artillery
    rounds, armored personnel carriers, Mi-17 helicopters transferred from Afghanistan,
    300 Switchblade drones and unmanned surface vehicles for coastal defence. (Reuters)
  - Russian deputy foreign minister Sergei Ryabkov says U.S. and NATO vehicles transporting
    weapons on Ukrainian territory are "legal military targets". (Reuters)
  - Northeastern Ukraine offensive
  - Governor of Kharkiv Oblast Oleh Synyehubov says that seven people have been killed
    and 22 others have been injured in the oblast during the past 24 hours. (The Jerusalem
    Post)
  - Kyiv offensive
  - The Russian defence ministry says it will begin to target Ukrainian "decision-makers",
    including President Volodymyr Zelenskyy, and command centres in the capital Kyiv
    if Ukrainian forces continue to attack Russian territory. (NDTV)
  - Presidents Andrzej Duda of Poland, Gitanas Nausėda of Lithuania, Egils Levits
    of Latvia, and Alar Karis of Estonia arrive in Kyiv and meet with Ukrainian president
    Volodymyr Zelenskyy. (AP)
  - The Ukrainian military says that it has struck the Russian Navy's cruiser Moskva
    with Neptune anti-ship missiles hours after the warship was reported to be on
    fire in the Black Sea. (FCB News) (NDTV)
  - Israeli–Palestinian conflict
  - The Israel Defense Forces raid the city of Nablus in the West Bank, killing one
    person and injuring 31 others. (Al Jazeera)
  - Insurgency in Cabo Delgado
  - South Africa says that it is extending its participation in a multinational counter-insurgent
    coalition in Mozambique. (AP)
  - Nigerian bandit conflict, Boko Haram insurgency
  - Nigeria says it has uncovered an alliance between bandit gangs and the Islamist
    Boko Haram group. (AP)
  - Insurgency in the Maghreb
  - Jihadist insurgency in Niger
  - Four gendarmes and seven border police are killed in a series of attacks by jihadist
    militants. (Reuters)
  - Wildfires in 2022
  - 2022 New Mexico wildfires
  - Two people are killed and 200 homes are reportedly damaged during the McBride
    Fire in Ruidoso, New Mexico. (The New York Times) (NMDPS)
  - 2022 KwaZulu-Natal floods
  - The death toll from the floods in KwaZulu-Natal, South Africa, during the last
    five days increases to 300. (BBC News)
  - Earthquakes in 2022
  - A 6.3 magnitude earthquake hits the Papua New Guinean island of New Britain. (Canberra
    Times)
  - Ten people are killed and 14 others are injured when a truck crashes into a tourist
    bus in Aswan Governorate, Egypt. (ABC News)
  - Eighteen people are killed when a truck carrying 29 people flips over in Indonesia's
    West Papua province. (Reuters)
  - Twenty-eight people are dead after a boat capsizes in Sokoto State, Nigeria. (pulse
    NG) (PeaceFM)
  - Six people are dead and 13 more injured during a fire at a pharmaceutical factory
    in Andhra Pradesh, India. (Independent)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - Face masks during the COVID-19 pandemic in the United States
  - The U.S. CDC and TSA announce that they have extended the mask mandate for public
    transportation until May 3. (The Washington Post) (The Hill)
  - U.S. Health and Human Services secretary Xavier Becerra announces that the Biden
    administration has extended the COVID-19 state of emergency for 90 days. The state
    of emergency was expected to expire on April 16. (Roll Call)
  - Abortion in the United States
  - Abortion in Kentucky
  - A bill banning abortion after 15 weeks of gestation (styled on Mississippi's bill)
    and restricting its access to minors comes into force after the legislature overrides
    Governor Andy Beshear's veto. (WFPL)
  - English Channel migrant crossings
  - The British government and Rwanda agree on a deal to relocate illegal migrants
    who arrive on boats in the United Kingdom to processing centres in Rwanda. (BBC
    News)
  - Enlargement of NATO
  - Finnish prime minister Sanna Marin says Finland will decide on NATO membership
    within "weeks", after Russia warned the country against joining the Western military
    alliance. (BBC News)
  - 2022 New York City Subway attack
  - The suspect in yesterday's mass shooting and smoke bomb attack at the New York
    City Subway that injured 23 people is arrested following a tip from bystanders.
    (BBC News)
  - Disney announces that it shut down Club Penguin Rewritten, which was seen as a
    successor to the defunct Club Penguin, over concerns of copyright infringement.
    Assets are seized by the Police Intellectual Property Crime Unit. Three people
    are arrested in London, United Kingdom on suspicion of distributing materials
    infringing copyright. (Dexerto)
