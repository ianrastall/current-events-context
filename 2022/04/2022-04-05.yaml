Date: '2022-04-05'
Source_URI: Portal:Current events/2022 April 5
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - A Dominica-flagged vessel berthed at the port in Mariupol is hit by artillery
    from the Russian Navy. One person is injured, but all crew members are successfully
    evacuated. (Reuters)
  - Insurgency in the Maghreb
  - Mali War
  - Siege of Moura
  - Human Rights Watch says that the Malian military and mercenaries from the Wagner
    Group massacred over 300 civilians in the town of Moura during a nine-day counter-insurgency
    operation in March. (The Guardian) (Human Rights Watch)
  - Jihadist insurgency in Burkina Faso
  - Militants raid a community of nuns in Kaya, Sanmatenga Province, Burkina Faso,
    kidnapping an American. (Reuters) (Barron's)
  - Nigerian bandit conflict
  - At least 15 people are killed and more than a dozen others are injured in an attack
    at a military base in Birnin Gwari, Kaduna State, Nigeria. (Reuters)
  - Imam Reza shrine stabbings
  - A Shia cleric is killed and two more are injured during a stabbing attack at the
    Imam Reza Shrine in Mashhad, Iran. (The Washington Post)
  - Ituri conflict
  - A UN peacekeeper from Nepal is killed in Djugu territory in the eastern Democratic
    Republic of the Congo by suspected militia members. (Reuters)
  - Global minimum corporate tax rate
  - Poland blocks European Union's adoption of the 15% minimum corporate tax after
    previous holdouts have abandoned their opposition for the reform. (Politico)
  - Tornado outbreak of April 4–5, 2022
  - An ongoing tornado outbreak kills two people and produces a large tornado that
    hits Allendale, South Carolina, United States, prompting the National Weather
    Service to issue a rare tornado emergency. (The Weather Channel)
  - Twenty-three people are killed after a Mil Mi-8 crashes near Zaporizhzhia Oblast,
    Ukraine. (Aviation Safety Network)
  - Five people are killed and ten others are injured when a train collides with a
    pickup truck in Mindszent, Hungary. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in mainland China
  - COVID-19 pandemic in Shanghai
  - Chinese authorities extend the lockdown in Shanghai after more than 13,000 people
    test positive for COVID-19. (NBC News)
  - International reactions to the 2022 Russian invasion of Ukraine
  - Denmark–Russia relations, Estonia–Russia relations, Italy–Russia relations, Latvia–Russia
    relations, Portugal–Russia relations, Romania–Russia relations, Russia–Slovenia
    relations, Russia–Spain relations, Russia–Sweden relations
  - Denmark, Estonia, Italy, Portugal, Romania, Slovenia, Spain, and Sweden expel
    over 100 Russian diplomatic staff from their countries. Latvia closes the Russian
    consulates in Daugavpils and Liepāja, while Estonia closes the Russian diplomatic
    facilities in Narva and Tartu. These actions come as a reaction to the newly revealed
    Bucha massacre. (Politico) (Interfax Ukraine) (TASS) (National Post) (Al Arabiya)
  - Turkey–Ukraine relations
  - Turkey moves its embassy back to Kyiv from Chernivtsi. (Anadolu Agency)
  - War in Darfur
  - Darfur genocide
  - The trial of Ali Kushayb, one of the suspects in the genocide in Darfur, Sudan,
    begins at the International Criminal Court in The Hague, Netherlands. Kushayb
    pleads not guilty. (Deutsche Welle)
  - 2022 Peruvian protests
  - President Pedro Castillo imposes a curfew in Lima amid protests against inflation
    caused by rising fuel and fertiliser costs. (BBC News)
  - Rule of Law Conditionality Regulation
  - The European Commission launches disciplinary proceedings against Hungary under
    the newly-upheld conditionality mechanism that could block funds over rule-of-law
    concerns if the shortcomings do not prevent misuse of EU funds. (Politico)
  - 2022 Sacramento shooting
  - The Sacramento Police Department announces the arrests of two additional people,
    ages 27 and 31, in connection to the mass shooting on Monday that killed six people
    and injured 12 others. (NBC News)
