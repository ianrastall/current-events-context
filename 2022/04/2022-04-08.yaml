Date: '2022-04-08'
Source_URI: Portal:Current events/2022 April 8
Intelligence_Payload:
  Uncategorized:
  - Russia-Ukraine War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Kramatorsk railway station attack
  - A pair of Russian missiles strike a railway station in Kramatorsk, killing at
    least 50 people and injuring at least 87 others. (Reuters) (Al Jazeera)
  - Jihadist insurgency in Burkina Faso
  - At least 12 soldiers and four paramilitary fighters are killed and 21 others are
    injured during an attack on an army base in Namissiguima, Burkina Faso. (U.S.
    News & World Report)
  - The Food and Agriculture Organisation's food price index increases by 13% in March
    to an all-time record of 159.3 points amid fallout from the Russian invasion of
    Ukraine. The price of vegetable oils increases by 23% and the price of cereals
    increases by 17%. (Reuters)
  - Government and intergovernmental reactions to the 2022 Russian invasion of Ukraine
  - Japan–Russia relations
  - Japan expels eight Russian diplomats. (Jerusalem Post)
  - Gretchen Whitmer kidnapping plot
  - Two defendants in the case of an apparent plot seeking to kidnap Governor of Michigan,
    United States, Gretchen Whitmer due to her COVID-19 policies in October 2020 are
    acquitted by the jury of the charges of conspiring to kidnap. The trial of the
    other two defendants ends in a hung jury. (NPR)
  - The Russian Ministry of Justice revokes the registration of 15 foreign organizations,
    including Amnesty International, Human Rights Watch (HRW), and the Carnegie Endowment
    for International Peace. No reason is given, but the revocations come days after
    HRW reported on war crimes committed by Russia during the invasion of Ukraine.
    (Reuters)
  - HD1, the farthest known galaxy, is discovered 13.5 billion light-years away from
    Earth. (Astronomy.com) (The Harvard Gazette) (Forbes)
