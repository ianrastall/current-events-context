Date: '2022-07-31'
Source_URI: Portal:Current events/2022 July 31
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine offensive
  - A Russian missile strike on Mykolaiv in Kherson Oblast, kills Nibulon owner Oleksiy
    Vadaturskyi and his wife. (BBC News)
  - A drone strikes Russia's Black Sea Fleet headquarters, injuring five people, according
    to the mayor of Sevastopol. (The Guardian)
  - Kosovo–Serbia relations
  - Kosovo Police close two border crossings in North Kosovo after local Serbs blocked
    roads and fired shots at police to protest an order to switch Serbian car license
    plates to Kosovan ones within two months. (Reuters)
  - Afghanistan conflict
  - A member of the Taliban is killed during clashes with Iranian border guards on
    the Afghanistan–Iran border. (Reuters)
  - July 2022 United States floods
  - The death toll from the ongoing flash floods in Kentucky, United States, increases
    to 28. (CNN)
  - Heavy rainfall warnings are issued for the affected areas of Kentucky as Governor
    Andy Beshear says that at least 37 people remain unaccounted for. (The Washington
    Times)
  - Malagasy President Andry Rajoelina mobilizes and deploys the army after 32 people
    were killed in Ankazobe on July 29 by cattle thieves. (BBC News)
  - 2022 Republic of the Congo parliamentary election
  - The second round of the parliamenentary election takes place. (Africa News)
  - UEFA Women's Euro 2022 final
  - England defeats Germany 2–1 in the final of the UEFA Women's Euro 2022 to give
    the England women's team its first major football championship. (BBC Sport)
