Date: '2022-12-03'
Source_URI: Portal:Current events/2022 December 3
Intelligence_Payload:
  Uncategorized:
  - Mahsa Amini protests
  - The Iranian government gives its first official report regarding deaths from the
    protests that followed the death of Mahsa Amini in September. The report states
    that more than 200 people have died in what the government has labelled as "riots".
    (Al Jazeera)
  - Hunter Biden laptop controversy
  - Internal documents released by Twitter CEO Elon Musk show that staff at the company
    suppressed posts discussing the October 2020 New York Post article on the Hunter
    Biden laptop story ahead of the 2020 United States presidential election. (Forbes)
  - Former South Korean national security director Suh Hoon is arrested on charges
    of tampering with evidence related to the killing of a Ministry of Oceans and
    Fisheries official by North Korean agents near the Northern Limit Line in September
    2020. (AP)
  - Attempts to overturn the 2020 United States presidential election
  - Donald Trump claims in his social media platform Truth Social that the fraud during
    the 2020 American presidential elections justifies the "termination of all rules,
    regulations, and articles, even those found in the Constitution". (BBC News)
