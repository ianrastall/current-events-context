Source_URI: Portal:Current events/2022 December 4
Intelligence_Payload:
  Uncategorized:
  - 2022 Africa floods
  - Nine people are killed and eight others are reported missing after flash flooding
    hits a church in Johannesburg, South Africa. (AP)
  - The Indonesian government raises the volcanic alert status to the highest level
    after Semeru in East Java erupts, forcing the evacuation of around 2,000 people.
    (AFP via The Hindu)
  - Iran–Israel relations
  - Capital punishment in Iran
  - Iran says that it has executed four prisoners convicted of spying for Israel.
    (Arab News)
  - Mahsa Amini protests
  - Iranian prosecutor-general Mohammad Jafar Montazeri announces the dissolution
    of the Guidance Patrol, though Iranian state media disputes this. (AFP via Khaleej
    Times) (The New York Times) (BBC News)
  - Moore County substation attack
  - Over 40,000 customers are without power after two power substations in Moore County,
    North Carolina, United States, are deliberately damaged by gunfire on Saturday
    night. A curfew has been ordered, and power restoration is expected to take until
    Thursday. (CNN)
  - The African National Congress meets to debate the political future of South African
    president Cyril Ramaphosa amid an emerging scandal concerning Ramaphosa's ownership
    of a farm in alleged breach of anti-corruption laws. Ramaphosa has stated that
    he does not intend to resign. (AP)
