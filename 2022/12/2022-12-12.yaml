Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - Islamic State–Taliban conflict
  - 2022 Kabul hotel attack
  - Three civilians are killed by Islamic State insurgents at a hotel in Kabul, Afghanistan.
    (AP)
  - Sino-Indian border dispute
  - Several soldiers are injured when hundreds of Indian and Chinese troops clash
    in the disputed Tawang district of Arunachal Pradesh. (MSN)
  - Montenegrin nationalist protests
  - Protests and riots occur in front of the Montenegrin Parliament building in Podgorica
    after the adoption of amendments to the presidential bill. (Vijesti)
  - Bankruptcy of FTX
  - Former FTX CEO Sam Bankman-Fried is arrested in the Bahamas on request of the
    U.S. government on undisclosed charges. (Reuters)
  - Wieambilla police shootings
  - Two police officers and a civilian are killed and two other officers are injured
    when gunmen open fire at a remote property in Wieambilla, Queensland, Australia,
    where police were investigating a missing person report. The three perpetrators
    are later killed by police. (BBC News) (ABC News Australia)
  - All members of Belgium's Political Bureau of the Walloon Parliament resign after
    a scandal concerning excessive public spending by parliamentary clerk Frédéric
    Janssens. Bureau President Jean-Claude Marcourt, who had been criticized for taking
    part in a luxury 3-day trip to Dubai for €20,000 using public funds, had previously
    refused to be the only person to resign if all other members of the Bureau did
    not resign. (RTBF)
