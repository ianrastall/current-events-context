Date: '2022-12-21'
Source_URI: Portal:Current events/2022 December 21
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Two people are killed and five others are injured during the shelling of a hotel
    and a restaurant in Donetsk. Former Russian Deputy Prime Minister and head of
    Roscosmos Dmitry Rogozin and Prime Minister of the Donetsk People's Republic Vitaliy
    Khotsenko are among the injured. (BBC News)
  - Spillover of the Somali Civil War
  - A vehicle travelling from Hayley Lapsset camp to Garissa, Kenya, hits a roadside
    bomb planted by Al-Shabaab militants, who then engage in a shootout with the car's
    occupants, killing two police officers and a civilian, and injuring several others.
    (Al Jazeera)
  - Yemeni Civil War
  - Four people are killed and three others are injured when a roadside bomb explodes
    near a military vehicle in Al Mahfad District, Abyan Governorate, Yemen. (Siasat)
  - Islamic State insurgency in Iraq
  - Two soldiers are killed and three others are injured during an ambush by Islamic
    State gunmen in Kirkuk, Iraq. (WSJ)
  - 2022 Gambian coup d'état attempt
  - Four soldiers are arrested after an alleged coup attempt in The Gambia. (BBC News)
  - At least 15 students are killed when a school bus overturns in Manipur, India.
    (Business Today)
  - Ukraine–United States relations
  - 2022 visit by Volodymyr Zelenskyy to the United States
  - Ukrainian President Volodymyr Zelenskyy arrives in the United States on his first
    official trip abroad after the Russian invasion of Ukraine. (The New York Times)
  - Germany–Russia relations
  - A German Federal Intelligence Service official is arrested for allegedly relaying
    classified information to Russian intelligence services. (AFP via South China
    Morning Post)
