Date: '2022-12-17'
Source_URI: Portal:Current events/2022 December 17
Intelligence_Payload:
  Uncategorized:
  - Strictly Come Dancing
  - Wildlife presenter Hamza Yassin and his professional partner Jowita Przystal win
    the coveted glitterball trophy despite a few mistakes and landing in the bottom
    of the leaderboard. (BBC News)
  - Yemeni Civil War
  - Three people are killed and another is injured in a landmine explosion in Al Hudaydah,
    Yemen. (Mehr News)
  - Economy of Uzbekistan
  - Uzbekistan announces a nearly $1 billion loan from the two main World Bank lending
    institutions, aimed at supporting the country's transition to a private sector-led
    economy. (Xinhua)
  - Five people are killed and five others are injured in a head-on collision of a
    bus and a pickup truck near Ventersburg, Free State, South Africa. (NewZimbabwe)
  - Three people are killed and 17 others are injured by a freak wave at a beach in
    Durban, KwaZulu-Natal, South Africa. (VOA)
  - Dresden Green Vault burglary
  - German authorities recover 31 royal jewellery items that were stolen from the
    Green Vault museum at Dresden Castle in Dresden, Saxony, Germany, in 2019. (AFP
    via South China Morning Post)
  - 2022 Tunisian parliamentary election
  - Tunisians head to the polls to elect the members of the Assembly of the Representatives
    of the People. Opposition parties have called for a boycott of the election. (AFP
    via The East African)
  - 2022 Fijian general election
  - Fiji's election office projects that both the ruling FijiFirst and opposition
    People's Alliance parties will win 26 seats each in the 55-seat parliament, resulting
    in a deadlock. (DW)
  - 2022 FIFA World Cup
  - Croatia defeats Morocco 2–1 in the third place play-off. This is Croatia's second
    third-place finish, and Morocco's best ever result at a World Cup, which is also
    the best ever result by both an African and Arab team at the tournament. (CNN)
  - 2022 NFL season
  - The Minnesota Vikings complete the largest comeback in NFL history against the
    Indianapolis Colts, winning 39–36 after a 0–33 deficit. The previous largest comeback
    occurred in January 1993 when the Buffalo Bills won 41–38 against the Houston
    Oilers after a 35–3 deficit. (CBS Sports)
