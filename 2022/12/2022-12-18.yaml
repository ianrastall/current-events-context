  Uncategorized:
  - Islamic State insurgency in Iraq
  - 2022 Kirkuk bombing
  - Nine police officers are killed and two others are injured when a convoy hits
    a roadside bomb in Kirkuk, Iraq. (Al Jazeera)
  - Insurgency in Khyber Pakhtunkhwa
  - Bannu counterterrorism centre siege
  - Around 20 Pakistani Taliban members seize control of a counterterrorism centre
    in Bannu, Pakistan, killing one officer and taking six hostages. The attackers
    are demanding safe passage to Afghanistan. (Al Jazeera)
  - 2022 Salang Tunnel fire
  - At least 31 people are killed and 37 others are injured when a tank truck overturns,
    explodes and catches fire in the Salang Tunnel in Afghanistan. (Tolo News)
  - 2022 Vaughan shooting
  - Five people are killed and one other person is injured in a mass shooting at a
    condominium tower in Vaughan, Ontario, Canada. The gunman is killed by police.
    (Global News)
  - Israel deports French-Palestinian lawyer and activist Salah Hamouri saying that
    Hamouri continues to be active with the Popular Front for the Liberation of Palestine,
    which has been designated as a terrorist organization by Israel, the United States,
    European Union and other countries. (Arab News)
  - 2022 FIFA World Cup
  - Argentina defeats the reigning champions France 4–2 on penalties after a 3–3 draw
    to win their third World Cup title, and first since 1986. (CNN)
