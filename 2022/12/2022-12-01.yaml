Date: '2022-12-01'
Source_URI: Portal:Current events/2022 December 1
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Two Al-Quds Brigades leaders are killed and another person is injured by Israeli
    soldiers during a raid at a refugee camp in Jenin, in the occupied West Bank.
    (Al Jazeera)
  - 2022 Haitian crisis
  - Twelve people are killed by armed gangs in Cabaret, a town in the department of
    Ouest. (Al Jazeera)
  - 2022 Spain letter bomb attacks
  - The Spanish Ministry of the Interior reports that several letter bombs have been
    sent to Prime Minister Pedro Sánchez, the Ministry of Defence and the Torrejón
    Air Base. A sixth letter bomb is intercepted at the U.S. Embassy in Madrid. (El
    Plural) (Reuters) (La Sexta)
  - COVID-19 recession
  - It is reported that the eurozone's unemployment rate declined to 6.5 per cent
    at the start of the fourth quarter, the lowest rate since Eurostat started recording
    employment data in 1998. (WION)
  - Canada–China relations
  - Chinese police overseas service stations
  - Canada accuses China of operating "illegal" police stations on Canadian territory.
    (The Guardian)
  - Missing and murdered Indigenous women
  - A man is charged in Winnipeg, Manitoba, Canada, for the murders of four indigenous
    women earlier this year. (BBC News)
