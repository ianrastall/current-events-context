Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 Russian strikes against Ukrainian infrastructure
  - Russia carries out a series of drone and cruise missile strikes on Ukraine, with
    strikes reported in the cities of Kyiv, Kharkiv, Odesa, Lviv, and Zhytomyr, injuring
    at least three people. (BBC News)
  - Second Gyeongin Expressway tunnel fire
  - Five people are killed and 37 others injured in a fire caused by the collision
    of a freight truck and a bus on the Second Gyeongin Expressway near Seoul, South
    Korea. (Reuters)
  - Toxic cough syrup
  - Eighteen children in Uzbekistan die after drinking a cough syrup product manufactured
    by Indian drug manufacturer Marion Biotech. (BBC News)
  - 2022 North Kosovo crisis
  - Following talks with Serbian president Aleksandar Vučić, barricades erected by
    ethnic Serbs in North Kosovo begin being dismantled. (BBC News)
  - Thirty-seventh government of Israel
  - Benjamin Netanyahu is sworn in as the prime minister of Israel for the third time
    in his political career. (CNN)
  - Death and funeral of Pelé
  - Brazilian footballer Pelé dies at the age of 82. (CNN)
