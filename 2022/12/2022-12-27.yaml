Date: '2022-12-27'
Source_URI: Portal:Current events/2022 December 27
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Battle of the Svatove-Kreminna line
  - Ukrainian forces claim that they are closing in on the city of Kreminna in Luhansk
    Oblast. According to governor Serhiy Haidai, Russian fighters in some parts of
    the city were forced to retreat to neighboring Rubizhne. (The Guardian)
  - 2022 Northern Mindanao floods
  - The death toll from monsoon floods in the Philippines has increased to 32, with
    24 others still missing. Eighteen of the deaths occurred in Northern Mindanao.
    (AP)
  - 2022 Omdurman bus crash
  - Sixteen people are killed when a bus collides with a dump truck on the outskirts
    of Omdurman, Khartoum, Sudan. (Reuters)
  - International sanctions during the Russo-Ukrainian War
  - 2022 Russian oil price cap
  - Russian president Vladimir Putin issues a decree to prohibit the exports of Russian
    oil and petroleum products to countries and organizations that adhere to the US$60-per-barrel
    price cap that Australia, the European Union, and the G7 member states agreed
    upon earlier this month. The decree will be in effect from February 1 to July
    1. (AFP via NDTV)
  - Gretchen Whitmer kidnapping plot
  - A federal judge in Michigan, United States, sentences a man to 16 years in prison
    for plotting to kidnap Michigan governor Gretchen Whitmer in 2020. The man was
    also convicted of conspiring to use a weapon of mass destruction. (CNN)
  - Title 42 expulsion
  - The Supreme Court of the United States rules 5–4 to maintain Title 42 of the U.S.
    Code, allowing the government to remove persons who have recently been in a country
    where an infectious disease was present. (AFP via RFI)
  - South Korean president Yoon Suk-yeol pardons former president Lee Myung-bak as
    part of a mass pardon aimed at "national unity". Lee had been serving a 17-year
    sentence for corruption. (Al Jazeera)
  - The Taiwanese government announces that it would extend the required duration
    for conscription from four months to one year, citing the increasing threat of
    China using military force to pursue Chinese unification. The reform, which will
    apply to men born after January 1, 2005, will take effect in 2024. (AFP via SBS
    World News)
  - 2022–23 NBA season
  - Slovenian point guard Luka Dončić of the Dallas Mavericks scores the first 60-point
    triple-double in the National Basketball Association, the premier men's professional
    basketball league in the world, after recording 60 points, 21 rebounds, and 10
    assists in the Mavericks' 126–121 overtime win against the New York Knicks in
    Dallas. (BBC Sport)
