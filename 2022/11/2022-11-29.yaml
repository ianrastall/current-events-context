Date: '2022-11-29'
Source_URI: Portal:Current events/2022 November 29
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Four Palestinians, one in Hebron, one in al-Mughayir and two brothers in Kafr
    Ein, are killed during clashes with Israeli forces. Eight others are injured.
    A man is also killed in Kokhav Ya'akov after ramming and seriously injuring a
    female soldier. (AP) (Times of Israel)
  - Germany–Qatar relations
  - 2021–2022 global energy crisis
  - 2022 Russia–European Union gas dispute
  - Germany signs a 15-year deal with Qatar's state-owned petroleum company QatarEnergy
    to have its liquefied natural gas supplied by the company from 2026. (AP)
  - Nineteen people are injured after an ethane gas explosion in Agua Dulce, Veracruz,
    Mexico. (AP)
  - China–United Kingdom relations
  - 2022 COVID-19 protests in China
  - The Foreign, Commonwealth and Development Office of the United Kingdom summons
    Chinese ambassador Zheng Zeguang over the arrest of BBC News journalist Edward
    Lawrence while covering the protests in Shanghai. (AFP via CNA)
  - LGBT rights in Singapore
  - The Parliament of Singapore repeals Section 377A, thereby decriminalising sex
    between consenting male adults in the country. (The New York Times)
  - November 2021 English Channel disaster
  - The Gloucestershire Constabulary arrest a man near Cheltenham, Cotswolds, England,
    as a prime suspect in conspiring to transport 30 illegal immigrants from France
    to the United Kingdom on an inflatable boat, of which all but three died when
    the boat capsized in transit along the English Channel in 2021. (AFP via The Star)
  - Janusz Waluś, the convicted assassin of South African anti-apartheid politician
    Chris Hani, is stabbed and wounded in prison in Pretoria a few days before his
    scheduled release on parole. (AFP via The Guardian)
