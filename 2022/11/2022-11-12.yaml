Intelligence_Payload:
  Uncategorized:
  - 2022 Dallas airshow mid-air collision
  - A Bell P-63 Kingcobra and a Boeing B-17 Flying Fortress collide mid-air at an
    air show in Dallas, Texas, United States, killing six people. (CBS News)
  - A bus falls into a canal in the Nile River Delta in Dakahlia Governorate, Egypt,
    killing 21 people. (ABC News)
  - Lebanon launches its first cholera vaccine campaign. (Arab News)
  - 2022 Bahraini general election
  - Bahrainis head to the polls to elect the 40 members of the Council of Representatives.
    (SwissInfo)
  - 2022 United States Senate elections
  - Incumbent Democrat Catherine Cortez Masto defeats Republican challenger Adam Laxalt
    to win the 2022 United States Senate election in Nevada, securing the Democratic
    Party majority in the United States Senate for the upcoming 118th United States
    Congress. (NBC News)
  - 2021 Rugby World Cup
  - Hosts New Zealand win a record sixth Women's Rugby World Cup title after defeating
    England 34–31 in the final at Eden Park in Auckland. The final was a rematch of
    the 2017 edition, which New Zealand had also won. (CNN)
