Date: '2022-11-21'
Source_URI: Portal:Current events/2022 November 21
Intelligence_Payload:
  Uncategorized:
  - Kurdish–Turkish conflict
  - Spillover of the Syrian civil war
  - A rocket attack on the Turkish border town of Karkamış, kills three people, including
    a child. Interior Minister Süleyman Soylu blames Kurdish militants in Syria and
    vows a "strong response". Kurdish groups have denied being behind the attack.
    (DW)
  - A Turkish soldier is killed and seven police officers are injured after the Bab
    al-Hawa Border Crossing is shelled by suspected Kurdish militants. (ABC News)
  - Turkish President Recep Tayyip Erdoğan threatens to launch a ground operation
    in northern Syria and Iraqi Kurdistan in response to the rocket attacks on Turkish
    territory. (France 24)
  - Afghanistan conflict
  - Two people are killed in a bombing in Kabul, Afghanistan. (Reuters)
  - Three people are killed and 22 others are injured after an ambush on a major highway
    in Central Equatoria, South Sudan. (AP)
  - 2022 West Java earthquake
  - A 5.6-magnitude earthquake kills at least 310 people and injures over 2,000 others
    in West Java, Indonesia. (RTÉ)
  - 2022 Anyang factory fire
  - At least 38 people are killed and two others are injured by a fire at a factory
    in Anyang, Henan, China. Local officials report evidence of electric resistance
    welding violating workplace safety standards as the likely cause of the fire.
    (AFP via NDTV)
  - A Piper PA-31 crashes into a residential area in the Belén Rosales, Medellín,
    Colombia, killing the eight people on board. (El Tiempo)
  - One person is killed and 16 others are injured when a vehicle crashes into an
    Apple Store in Hingham, Massachusetts, United States. (BBC News)
  - Twelve people are injured in an explosion at a school in Sydney, New South Wales,
    Australia. (OneNews)
  - France–Mali relations, Mali War
  - The Assimi Goïta-led military junta prohibits the operation of France-supported
    NGOs in Mali to reciprocate the French government's suspension of development
    aid for the West African country due to its involvement with Russia's Wagner Group
    in the war. (AFP via Al Arabiya)
  - A court in Tel Aviv rules that former Israeli Prime Minister Ehud Olmert committed
    defamation against the family of prime minister-designate Benjamin Netanyahu by
    claiming that members of Netanyahu's family are mentally ill and orders Olmert
    to pay $18,000. (BBC News)
  - Artemis program
  - Artemis 1
  - NASA's Orion spacecraft performs a flyby of the Moon, coming within of the lunar
    surface before entering into a lunar orbit. (BBC News)
  - 2022 FIFA World Cup controversies
  - The Iranian team chooses not to sing the Iranian national anthem prior to a match
    against England amid ongoing civil unrest in Iran. (Reuters)
