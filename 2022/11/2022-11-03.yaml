Date: '2022-11-03'
Source_URI: Portal:Current events/2022 November 3
Intelligence_Payload:
  Uncategorized:
  - 2021–2022 North Korean missile tests
  - Japan–North Korea relations
  - North Korea launches an intercontinental ballistic missile towards Japan, prompting
    evacuation warnings for residents in the prefectures of Miyagi, Yamagata and Niigata.
    The missile landed about off the Japanese coast in the Pacific Ocean, with the
    launch likely not successful. (The Guardian) (Reuters) (CNBC)
  - Israeli–Palestinian conflict
  - Three Palestinians are killed during raids by Israeli soldiers in the West Bank,
    while another is killed in East Jerusalem after stabbing and injuring a police
    officer. (ABC News)
  - A 14-year-old Jewish girl is in critical condition after being shot in the head
    by a Palestinian sniper in Kiryat Arba, in the occupied West Bank. (Jewish Press)
  - Attempted assassination of Imran Khan
  - Former Pakistani Prime Minister Imran Khan is shot in the leg during a rally in
    Wazirabad, Punjab. Khan is taken to Lahore for treatment, although he was not
    seriously injured. A Khan supporter is killed and eight others are injured. The
    perpetrator is arrested. (Al Jazeera)
  - Somali Civil War
  - Two people are killed and five others are injured when a vehicle carrying students
    hits a roadside bomb in Mogadishu, Somalia. (ABC News)
  - Sistan and Baluchestan insurgency
  - A Shi'ite cleric is shot dead at a mosque in Zahedan, Sistan and Baluchestan province,
    Iran. (Reuters)
  - 2021–2022 inflation surge
  - 2018–2022 Turkish currency and debt crisis
  - Inflation in Turkey reaches 85.51%, the highest rate since 1997. (AFP via News24)
  - The Bank of England raises its interest rates by 0.75 percentage point, to 3.00%,
    the largest increase in 33 years, amid soaring inflation and a cost of living
    crisis in the UK. The bank also predicts a record-length recession, lasting until
    mid-2024. (The Financial Times)
  - Five people are killed and four others are injured in a methane explosion at a
    coal mine in Karaganda, Kazakhstan. (Al Jazeera)
  - Chagos Archipelago sovereignty dispute
  - The United Kingdom agrees to hold negotiations with Mauritius on the future status
    of the Chagos Archipelago. (The Guardian)
  - Australian sex offender Peter Scully and three of his accomplices are sentenced
    to 129 years in prison by a regional court in the Philippines for 60 offences
    related to child sexual abuse. (AFP via Gulf News)
  - 2021 Wheelchair Rugby League World Cup
  - After a year's delay, the Wheelchair Rugby League World Cup begins in England,
    with Ireland beating Spain 32–55 in the opening game at the Copper Box Arena in
    London. (The Guardian)
