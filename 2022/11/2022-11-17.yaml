Date: '2022-11-17'
Source_URI: Portal:Current events/2022 November 17
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 missile explosion in Poland
  - Germany offers to deploy its Air Force jets to protect Polish airspace in response
    to Tuesday's missile explosion in Przewodów, Lublin Voivodeship, that killed two
    people. (A News)
  - October–November 2022 nationwide missile strikes on Ukraine
  - Russia carries out another wave of cruise missile strikes on Ukraine, with strikes
    reported in Dnipro, Odesa, Kharkiv, and Zaporizhzhia, where two people were confirmed
    to have been killed overnight by a missile. In Dnipro and Odesa, critical infrastructure
    is also targeted. (The Guardian)
  - 23rd Annual Latin Grammy Awards
  - The 23rd Annual Latin Grammy Awards are held at the Michelob Ultra Arena in Las
    Vegas, Nevada. Uruguayan singer-songwriter Jorge Drexler was the most awarded
    artist with six wins. (Billboard)
  - 2021–2022 inflation surge
  - November 2022 United Kingdom autumn statement
  - Chancellor of the Exchequer Jeremy Hunt delivers the delayed autumn statement
    to parliament, announcing measures to stabilize the economy amid a cost of living
    crisis, including raising the National Living Wage from £9.50 an hour to £10.42
    beginning next year, increasing pensions and welfare payments in line with rising
    inflation, introducing a higher rate windfall tax on the profits of energy firms,
    introducing a new "temporary tax" on companies that generate electricity, and
    capping rent increases in the social sector to 7% until 2024. (BBC News)
  - 2022 Jabalia fire
  - At least 21 people are killed in a fire at a residential building in Jabalia,
    Gaza Strip. (Times of Israel)
  - Fifteen people are killed and 16 more injured by an explosion caused by a gas
    leak at a residential building in Sulaymaniyah, Kurdistan Region, Iraq. (Al Jazeera)
  - France–Mali relations, Mali War
  - The French foreign ministry announces the temporary suspension of development
    aid to Mali, citing the controversial relationship between the Assimi Goïta-led
    military junta and Russia's Wagner Group in the war. (AFP via RFI)
  - Malaysia Airlines Flight 17
  - A court in the Netherlands sentences two Russians, Igor Strelkov-Girkin and Sergey
    Dubinsky, and a Ukrainian pro-Russian separatist Leonid Kharchenko to life imprisonment
    for shooting down the Malaysia Airlines flight over Donetsk Oblast, Ukraine in
    2014. The verdict was delivered in absentia of the defendants. (AP)
  - 2021–2022 Myanmar civil war
  - The State Administration Council of Myanmar grants an amnesty to 5,774 prisoners,
    including former British ambassador Vicky Bowman and Australian economist Sean
    Turnell, a former economic policy advisor to jailed state counsellor Aung San
    Suu Kyi. (AFP via France 24)
