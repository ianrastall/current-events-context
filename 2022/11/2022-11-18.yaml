Date: '2022-11-18'
Source_URI: Portal:Current events/2022 November 18
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - October–November 2022 nationwide missile strikes on Ukraine
  - Ukrainian President Volodymyr Zelenskyy says that Russian missile strikes have
    left at least 10 million Ukrainians without electricity as the death toll from
    yesterday's missile strikes increases to seven with many more people injured.
    (BBC News)
  - 2021–2022 North Korean missile tests
  - North Korea fires a suspected intercontinental ballistic missile that lands 200
    kilometres off the coast of Japan, within Japan's exclusive economic zone. (Reuters)
  - Mahsa Amini protests
  - Protesters set fire to the house of the Islamic Republic of Iran's founder Ayatollah
    Ruhollah Khomeini in Khomein, Markazi Province. (France 24)
  - 2021–2022 inflation surge, Economy of Japan
  - It is announced that inflation in Japan reached 3.6% in October, which is the
    highest level of inflation recorded in the country since 1982. (Al Jazeera)
  - 2022 Pakistan floods
  - Twenty people are killed and 13 others are injured when a van falls off the Indus
    Highway in Sindh, Pakistan, into a flooded ditch. (ABC News)
  - 2022 Nord Stream pipeline sabotage
  - Swedish authorities confirm intentional sabotage as the cause of the Nord Stream
    gas pipeline explosions after traces of explosives were found at the site of the
    leaks. (Reuters)
  - LATAM Perú Flight 2213
  - A LATAM Airlines A320neo jet collides with a fire truck at Jorge Chávez International
    Airport in Lima, Peru, killing two firefighters and injuring 25 other people.
    (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in China
  - Beijing starts to provide Convidecia Air, the world's first inhalable COVID booster
    vaccine, manufactured by CanSino Biologics. (Al Arabiya)
  - 2022 Ecuador prison riots
  - Ten people are killed after a prison riot breaks out near Quito, Ecuador. (AFP
    via RTÉ)
  - United States v. Elizabeth A. Holmes, et al.
  - Theranos founder and CEO Elizabeth Holmes is sentenced by a court in the U.S.
    state of California to more than 11 years in prison on four counts of fraud, and
    for misleading investors on the reliability of her company's technology. Her sentence
    will begin on April 27, 2023. (BBC News)
  - United States Attorney General Merrick Garland appoints special counsel Jack Smith
    to investigate Donald Trump's actions regarding the January 6 United States Capitol
    attack and taking classified documents to Mar-a-Lago. (CNN)
  - Leap second
  - The General Conference on Weights and Measures votes to stop synchronizing UTC
    to the standard mean solar time measurement UT1 by 2035. (The Guardian)
  - 2022 FIFA World Cup controversies
  - Qatar bans alcohol from World Cup host stadiums two days before the world football
    championship starts. (The New York Times)
  - 2023 Formula One World Championship
  - F1 launches a female racing category, which is expected to begin next year. (Al
    Arabiya)
  - International Basketball Federation
  - The United States loses its top rank at the FIBA Men's World Ranking for the first
    time since 2010 after being surpassed by Spain in the latest update. (AP via The
    Boston Globe)
