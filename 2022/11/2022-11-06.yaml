Date: '2022-11-06'
Source_URI: Portal:Current events/2022 November 6
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Syrian government forces shell a camp for displaced persons in rebel-held Idlib
    Governorate, killing six occupants and injuring dozens of others. (SF Gate)
  - 2022 Haitian crisis
  - Following increased international pressure, Haitian gang leader Jimmy Chérizier
    announces the end of a blockade that his gang had imposed on a key fuel station,
    leading to severe shortages. (ABC News)
  - One person is killed and ten others are wounded in a bus bombing in Tacurong,
    Sultan Kudarat, Mindanao, Philippines. (AP)
  - Precision Air Flight 494
  - A Precision Air airliner with 43 persons aboard crashes into Lake Victoria, Tanzania.
    Nineteen occupants are killed; the others are rescued. (Al Jazeera)
  - An explosion at a fireworks show in Huejutla, Hidalgo, Mexico, injures 17 people.
    (AP)
  - Twenty people are injured in a building collapse in Baghdad, Iraq. (AP)
  - Three people are killed and 32 others are injured in a bus crash in Bolu Province,
    Turkey. (AP)
  - The Iranian Islamic Revolutionary Guard Corps reports arresting alleged People's
    Mojahedin Organization of Iran members in three provinces. (Tasnim)
  - 2022 MotoGP World Championship
  - Francesco Bagnaia wins the 2022 MotoGP World Championship for Ducati at the Circuit
    Ricardo Tormo in Valencia. (CNN)
  - 2022 NASCAR Cup Series
  - Joey Logano wins the NASCAR Cup Series Championship Race at Phoenix Raceway, and
    wins his second career Cup Series championship. (Yahoo! Sports)
