Date: '2022-11-30'
Source_URI: Portal:Current events/2022 November 30
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - American-led intervention in the Syrian civil war
  - The United States Central Command announces that the Free Syrian Army killed Islamic
    State caliph Abu al-Hasan al-Hashimi al-Qurashi during an operation in the Daraa
    Governorate in mid-October. (AFP via The Brussels Times)
  - Afghanistan conflict
  - 2022 Aybak bombing
  - At least 15 people are killed and 20 others injured in a bombing at a religious
    school in Aybak, Samangan Province. (Al Jazeera)
  - November 2022 Quetta bombing
  - Three people are killed and 24 others injured by a Pakistani Taliban suicide bomber
    at a polio vaccination centre in Quetta, Balochistan, Pakistan. (Al Jazeera)
  - 2022 Spain letter bomb attacks
  - A staff member at the Ukrainian embassy in Madrid, Spain, suffers minor injuries
    when opening a letter bomb that was addressed to ambassador Serhii Pohoreltsev.
    (Reuters)
  - UNESCO officially adds several inscriptions to its intangible cultural heritage
    list, including French baguettes, Korean talchum dance, and Chinese tea making.
    (BBC News)
  - 2022 Brazil floods and landslides
  - Two people have been killed and thirty others are feared missing after a landslide
    in Guaratuba, Paraná, Brazil. (Sky News)
  - Capital punishment in Singapore
  - The Singaporean government approves legislation that will only allow the Court
    of Appeal to grant a last-ditch clemency petition prior to an execution on consideration
    or on the basis of new evidence presented by the defendant. (Al Jazeera)
  - Scott Morrison ministerial positions controversy
  - The Australian House of Representatives votes 86–50 to censure former prime minister
    Scott Morrison for failing to disclose to the parliament and the public his secret
    appointments to a number of ministries during his premiership. Morrison is the
    first former Australian prime minister to be censured. (AP)
