Date: '2022-11-25'
Source_URI: Portal:Current events/2022 November 25
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - The military of Somalia carries out a series of counterterrorism operations in
    southern Somalia, killing 15 al-Shabaab members who survived a previous operation
    two days ago, in which 49 fighters were killed. The military also says that they
    stopped an attack in Qayib, Galmudug, killing dozens of militants. (Xinhua)
  - 2022 São Tomé and Príncipe coup d'état attempt
  - São Tomé and Príncipe prime minister Patrice Trovoada reports that his officials
    had thwarted a coup d'état attempt led by the President of the National Assembly,
    Delfim Neves, after they arrested Neves and another individual for infiltrating
    the headquarters of the armed forces in São Tomé. Four people were killed in the
    attempt. (AP via The Washington Post)
  - 2022 Ürümqi fire
  - Ten people are killed and nine others injured in a fire at an apartment block
    in Ürümqi, Xinjiang, China. (AP)
  - At the 19th CITES Conference of the Parties in Panama City, member states adopt
    stricter measures on the trade of 54 requiem and hammerhead shark species. (AFP
    via Voice of America)
  - Aracruz school shootings
  - Four people are killed and 12 others injured in a mass shooting targeting two
    schools in Aracruz, Espírito Santo, Brazil. The suspect, a 16-year-old boy, is
    later arrested. (AP)
  - Mount Isa Murders
  - An Indian Australian citizen, Rajwinder Singh, is arrested in New Delhi as the
    prime suspect in the murder of Australian woman Toyah Cordingley on a beach in
    Far North Queensland in October 2018. (AP)
