  - Five people are killed in a helicopter crash in Yangyang County, Gangwon, South
    Korea. (Yonhap)
  - Protests against COVID-19 lockdowns in China
  - Hundreds of protesters clash with police in Shanghai as security forces attempt
    to disperse the crowds during a candlelight vigil for the victims of the fire
    on 24 November in Ürümqi, Xinjiang. (Reuters)
