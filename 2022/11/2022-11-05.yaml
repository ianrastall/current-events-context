Date: '2022-11-05'
Source_URI: Portal:Current events/2022 November 5
Intelligence_Payload:
  Uncategorized:
  - The Voice of America reports that the Republic of Georgia is receiving an economic
    boost from the war in Ukraine. It is "expected to record a vigorous 10% growth
    in economic output for 2022 amid a consumption-led boom," due largely to the arrival
    of refugees from Russia, seeking to avoid conscription or Putin's crackdown on
    dissent. (VOA News)
  - Seven people are killed in a helicopter crash in Foggia, Apulia, Italy. (Corriere
    della Sera)
  - 'Quebec, Canada, registers its highest-ever temperature for November: at Saint-Anicet.
    (MétéoMédia)'
  - Kostroma café fire
  - At least 15 people are killed in a fire at a café in Kostroma, Russia. Two hundred
    fifty others are evacuated. The fire was started by a flare gun that discharged
    during an altercation. (NDTV)
  - Spanish police announce raids in Asturias, Ciudad Real, Toledo, and Valencia that
    netted the largest cannabis haul in history, "equivalent to approximately 1.1
    million plants" and weighing more than 32 tonnes. (BBC News)
  - Economy of Ghana
  - More than 1,000 protesters march in Accra to demand the resignation of president
    Nana Akufo-Addo, amid a worsening economic crisis in the country. (Reuters)
  - MLS Cup 2022
  - Los Angeles FC win their first MLS Cup title, defeating the Philadelphia Union
    3–0 in a penalty shoot-out following a 3–3 draw at Banc of California Stadium
    in Los Angeles, California. (Los Angeles Times)
  - 2022 World Series
  - The Houston Astros defeat the Philadelphia Phillies in Game 6 of the 2022 World
    Series, winning the series 4 games to 2. They clinched their second World Series
    title, their first since 2017. At 73, Dusty Baker became the oldest in Major League
    Baseball history to win the World Series as a manager, while Jeremy Peña became
    only the third rookie to win MVP. (The New York Times)
