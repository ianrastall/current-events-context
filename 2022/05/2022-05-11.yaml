Date: '2022-05-11'
Source_URI: Portal:Current events/2022 May 11
Intelligence_Payload:
  Uncategorized:
  - 2022 Russian invasion of Ukraine
  - 2022 bombing of Odesa
  - Russian forces continue to fire missiles at the Ukrainian port city of Odesa in
    an apparent attempt to cut supplies to the city. (AP)
  - Battle of Kharkiv
  - Ukrainian military forces recapture several settlements north of Kharkiv, driving
    Russian troops to less than a dozen miles from the Russian border. (MSN)
  - Israeli–Palestinian conflict
  - Killing of Shireen Abu Akleh
  - Al Jazeera journalist Shireen Abu Akleh is killed while covering a raid in Jenin.
    Palestinian sources say that Abu Akleh was shot by Israeli soldiers, while Israeli
    sources say that she was likely killed by indiscriminate fire by Palestinian militants.
    Israel eventually admitted and apologized for the murder after initial denials.
    Another journalist and two other Palestinians are injured in the shooting. (NPR)
  - A Palestinian is shot dead after charging at police officers in Jerusalem. (Times
    of Israel)
  - Insurgency in the Maghreb
  - Eight soldiers are killed and 13 others are injured during an ambush by Al-Qaeda-linked
    militants in Kpendjal Prefecture, Togo. The attack is believed to be connected
    to the current insurgency in Burkina Faso, making it the first Islamic extremist
    attack in Togo. (Reuters)
  - Somali Civil War
  - Four people are killed by a suicide bomber at a checkpoint in Mogadishu, Somalia.
    Al-Shabaab claims responsibility for the attack. (AP)
  - Boko Haram insurgency
  - Seven soldiers are killed and two others are missing after gunmen ambush them
    in Taraba State, Nigeria. (Reuters)
  - Sinai insurgency
  - Five soldiers are killed and four others are injured during a shooting at a security
    post in North Sinai, Egypt. (Reuters)
  - A small plane crashes in Cameroon with eleven people on board. It is unknown if
    any casualties occurred. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in New Zealand
  - Prime Minister Jacinda Ardern announces that New Zealand will fully reopen its
    borders on July 31, two months before the government lifts all remaining pandemic
    restrictions. (Al Jazeera)
  - European Union response to the COVID-19 pandemic
  - The European Union Aviation Safety Agency (EASA) and the European Centre for Disease
    Prevention and Control (ECDC) announce in a joint statement that, starting next
    week, masks are no longer required for flights or in airports. However, the EASA
    asks passengers to "behave responsibly and respect the choices of others around
    them," while the ECDC recommends that passengers continue to practice social distancing
    if it can be done in a non-disruptive manner. (Euronews)
  - COVID-19 pandemic in the United States
  - COVID-19 passes a threshold of 1 million confirmed deaths in the United States,
    according to a Reuters tally. Some news outlets declared that the 1 million mark
    was reached a week earlier. (Reuters) (NBC)
  - Finland–United Kingdom relations, Sweden–United Kingdom relations
  - British Prime Minister Boris Johnson signs security agreements with Finland and
    Sweden, pledging British military assistance to both Nordic countries should they
    come under attack. (Reuters)
  - American Indian boarding schools
  - A report by the US Department of the Interior identifies 53 burial sites of Native
    American children near boarding schools, where children were forcibly sent to
    according to the 19th and 20th century federal government's policy of assimilation.
    Preliminary results suggest that more than 500 children were found to have died
    while in school custody. (Reuters)
  - Surfside condominium collapse
  - A tentative settlement of $997 million is reached with the families of victims
    and survivors of the condo collapse in Surfside, Florida, United States. However,
    the settlement is still subject to final approval. (AP)
  - LGBT rights in Greece
  - Greece bans the practice of conversion therapy for minors as well as all advertisements
    promoting it. (Reuters)
  - Hong Kong's national security police arrest four people, including Cardinal Joseph
    Zen, Cantopop singer Denise Ho, and former legislative councilwoman Margaret Ng,
    in connection with a fund that provided aid to protesters. (The Guardian)
  - The Iranian Ministry of Intelligence says that it has arrested two European nationals
    for allegedly attempting to destabilize the nation in connection with foreign
    intelligence services. (Al Arabiya)
