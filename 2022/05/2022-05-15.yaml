Date: '2022-05-15'
Source_URI: Portal:Current events/2022 May 15
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Russia launches missile strikes from the Black Sea on "military infrastructure"
    in Yavoriv Raion, Lviv Oblast, located near Ukraine's western border with Poland.
    The target was "completely destroyed", according to the region's governor Maksym
    Kozytskyy. (Reuters)
  - Insurgency in Khyber Pakhtunkhwa
  - A suicide bomber kills three Pakistani soldiers and three children in North Waziristan,
    Pakistan. (Al Jazeera)
  - Two Sikhs are shot dead by gunmen riding on motorcycles in Peshawar, Pakistan.
    (AP)
  - Enlargement of NATO
  - Finland–NATO relations
  - President Sauli Niinistö and Prime Minister Sanna Marin formally announce that
    Finland will apply for NATO membership. Niinistö says that "this is a historic
    day", and that Finland is "entering a new era". (Yle)
  - Sweden–NATO relations
  - Sweden's governing Social Democratic Party approves the country joining NATO.
    The official government decision is expected in the coming days. (Politico)
  - 2022 Laguna Woods shooting
  - One person is killed and five others are injured during a mass shooting at a church
    in Laguna Woods, California, United States. (CBS News)
  - 2022 Somali presidential election
  - Former President of Somalia Hassan Sheikh Mohamud is re-elected to a non-consecutive
    term in the third voting round. (Reuters)
  - 2022 Swiss referendums
  - Voters in Switzerland approve three measures in a referendum. These measures will
    require streaming services to invest 4% of their revenue in Switzerland into domestic
    filmmaking; allow the government to increase the Swiss contribution in Frontex,
    the EU border agency; and change the default system of organ donation from explicit
    to presumed consent. (Swissinfo)
  - 2022 Lebanese general election
  - Lebanese voters head to the polls to elect a new session to Parliament. Preliminary
    counts show the Iran-backed Hezbollah and its allies, who won in the previous
    election, losing seats while the Saudi-backed Lebanese Forces made gains. (Reuters)
