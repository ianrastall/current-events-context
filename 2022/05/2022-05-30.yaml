Date: '2022-05-30'
Source_URI: Portal:Current events/2022 May 30
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Battle of Donbas
  - Battle of Sievierodonetsk
  - Ukrainian authorities say that Russian forces have entered Sieverodonetsk, Luhansk
    Oblast, leaving the city without water. (Al Jazeera)
  - Rebel forces say a Ukrainian shelling attack in Donetsk has killed five civilians
    (including a teenager) and left 13 injured. (AP) (Le Monde)
  - A French journalist is killed by Russian shelling in Luhansk Oblast, according
    to the region's governor Serhiy Haidai. (Reuters)
  - A car bomb is detonated in Russian-occupied Melitopol, Zaporizhzhia Oblast, injuring
    at least three people. Russian authorities blame pro-Ukrainian residents for the
    incident. (Reuters)
  - Allied Democratic Forces insurgency; 2021–2022 Democratic Republic of the Congo
    attacks
  - Fifteen people are killed in a suspected Islamist attack by the Allied Democratic
    Forces in North Kivu, Democratic Republic of the Congo. (Reuters)
  - Insurgency in Southeastern Nigeria
  - Nigerian police say that unknown militants have kidnapped a prelate in Abia State.
    (AP)
  - Nigerian bandit conflict
  - Bandits kill up to 30 vigilantes in Zamfara State, Nigeria. (Reuters)
  - Russian occupation of Kherson, 2022 food crises
  - Russia begins exporting grain from the occupied Kherson Oblast in Southern Ukraine
    to Russia. Russian-occupying administration official Kirill Stremousov says that
    the administration was also "working on the supplies of sunflower seeds to local
    and Russian processing plants". Ukraine accuses Russia of stealing its grain.
    (Reuters)
  - International sanctions during the Russo-Ukrainian War
  - After weeks of deliberations, all of the European Union member states agree to
    impose an oil embargo on most oil imports from Russia (with the exception of that
    brought by pipelines), to be fully implemented by the end of the year, and cut
    off Sberbank from SWIFT. (NPR)
  - A report by the Blue Marine Foundation found that fishing vessels from the European
    Union were illegally harvesting fish in the exclusive economic zones off the coasts
    of India, Somalia and Mozambique even as the stocks of yellowfin tuna were on
    the verge of collapse. (OCCRP)
  - Hurricane Agatha
  - One person is killed in Tapachula, Chiapas, as Hurricane Agatha approaches Mexico.
    (Diario Presente)
  - Five people are injured after a school bus crashes into a ditch and rolls over
    in Roztoka, Tarnów County, Poland. (AP)
  - The wreckage of the Cessna 182 that disappeared from radar the previous day is
    found near Broćanac, Croatia. All four people on board were killed. (The Washington
    Post)
  - Two people are killed and 20 others are injured after a car crashes into a crowd
    in Lincoln, Nebraska, United States. (AP)
  - 2022 monkeypox outbreak
  - Thailand reports its first case of monkeypox. (ThaiPBS)
  - Status of Jerusalem, Foreign relations of Israel, Foreign relations of Suriname
  - Surinamese Foreign Minister Albert Ramdin says that Suriname will open an embassy
    in Jerusalem. (Times of Israel)
  - Politics of Transnistria
  - Aleksandr Rozenberg is sworn as new Prime Minister of Transnistria. (novostipmr.com)
  - 2022 Australian federal election
  - 2022 Liberal Party of Australia leadership election
  - Former Minister for Defence Peter Dutton is elected unopposed as Leader of the
    Liberal Party of Australia and, by extension, Leader of the Opposition following
    former Prime Minister Scott Morrison's resignation. (The Guardian)
  - 2022 National Party of Australia leadership spill
  - Former Deputy Prime Minister Barnaby Joyce is removed as Leader of the National
    Party of Australia in a leadership spill and replaced by his former Deputy and
    former Minister for Agriculture and Northern Australia David Littleproud. (The
    Guardian)
  - As vote counting continues, the Australian Labor Party achieves a majority in
    the House of Representatives. (The Guardian)
