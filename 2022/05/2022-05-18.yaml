Date: '2022-05-18'
Source_URI: Portal:Current events/2022 May 18
Intelligence_Payload:
  Uncategorized:
  - Around 200 anti-government militants block a road in Gorno-Badakhshan, Tajikistan,
    which links the country to China. Some of the militants, armed with firearms and
    petrol bombs, later ambush a security convoy on the same road. Eight militants
    and one officer are killed, while 13 officers are injured and more than 70 militants
    are arrested. The Tajik interior ministry later say the attack was an attempt
    to "destabilise the social and political situation" in the region. (Reuters)
  - 2021–2022 global supply chain crisis
  - 2022 United States infant formula shortage
  - The U.S. House of Representatives votes to pass a series of legislation aimed
    at combating the baby formula shortage in the United States. The Access to Baby
    Formula Act passes with a 414–9 vote, and the Infant Formula Supplemental Appropriations
    Act passes with a 231–192. (NBC News) (Newsweek)
  - U.S. President Joe Biden invokes the Defense Production Act to solve the baby
    formula shortage in the U.S. (CNBC)
  - Google's Russian subsidiary announces its intention to file for bankruptcy after
    Russian authorities seize the company's bank account. (Reuters)
  - Twelve people are killed and another is injured after a wall of a salt factory
    collapses in Morbi, Gujarat, India. Several others are missing. (Reuters)
  - One person is killed and several others are injured after a car drives into 14
    cyclists in Przypki, Poland. (AP)
  - 2022 monkeypox outbreak
  - Portugal confirms its first five cases of monkeypox. (AP)
  - Spain says that it is monitoring eight potential monkeypox cases. (CTV News)
  - The United States confirms its first case of monkeypox in 2022, in a man from
    Massachusetts who recently traveled to Canada. (ABC News)
  - Mozambique confirms its first polio case in 30 years in the northwestern province
    of Tete. (Reuters)
  - Government and intergovernmental reactions to the 2022 Russian invasion of Ukraine
  - Ukraine–United States relations
  - The American embassy in Kyiv reopens for the first time since the beginning of
    the invasion of Ukraine. (Reuters)
  - France–Russia relations, Italy–Russia relations, Russia–Spain relations
  - The Russian Foreign Ministry expels 85 diplomats from France, Spain, and Italy
    in response to the expulsions of Russian diplomats from European Union nations.
    (Reuters)
  - Enlargement of NATO
  - Finland and Sweden both formally apply to join NATO. (Reuters)
  - Three people are killed and five others injured after a man opens fire at his
    former workplace in Ilam province, Iran, before committing suicide. (AP)
  - 30th Alberta Legislature
  - Premier of Alberta Jason Kenney announces his intention to resign as leader of
    the United Conservative Party after a leadership review results in 51.4% approval
    of his leadership from party members. He will be replaced as leader and premier
    once a successor is named. (AP)
  - 2021–22 UEFA Europa League
  - In association football, Eintracht Frankfurt defeat the Glasgow Rangers 5–4 on
    penalties to win the UEFA Europa League following a 1–1 draw after extra time
    in the final at the Ramón Sánchez Pizjuán Stadium in Seville, Spain. (CNN)
