Date: '2022-05-12'
Source_URI: Portal:Current events/2022 May 12
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Ukrainian forces repel an attempted Russian military crossing of the Donets river,
    west of Sievierodonetsk, in Luhansk Oblast. At least one Russian battalion tactical
    group is reportedly destroyed, as well as the pontoon bridge deployed in the crossing.
    (Reuters)
  - The Russian Air Force launches around a dozen missiles at the city of Kremenchuk,
    including four at the Kremenchuk Oil Refinery, in Poltava Oblast. (Ukrinform)
  - Kurdish–Turkish conflict
  - Turkey says that five people were injured by Kurdish nationalists launching a
    missile attack into the country from Syria. (Reuters)
  - One person is killed and thirteen others injured by a roadside bombing targeting
    a van in Karachi, Sindh, Pakistan. (AP)
  - The cryptocurrency market loses US$200 billion following stablecoin TerraUSD's
    collapse in value. Bitcoin and Ether fall to their lowest value in 16 and 11 months,
    respectively. (CNBC)
  - Tibet Airlines Flight 9833
  - An A319-100 aircraft operated by Tibet Airlines veers off the runway and catches
    fire at Chongqing Jiangbei International Airport in Yubei District, Chongqing,
    China, injuring forty people, with some being hospitalized. (Bangkok Post) (The
    Hindu)
  - Five people are feared dead and twenty others are injured in a chemical plant
    explosion and fire in Kočevje, Slovenia. (AP)
  - Eleven people die and thirty-one others are rescued after a boat capsizes off
    the coast of Puerto Rico near Desecheo Island. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in North Korea
  - North Korea announces its first COVID-19 outbreak. (AP)
  - Supreme Leader Kim Jong-un orders a national lockdown. (Financial Times)
  - COVID-19 pandemic in Romania
  - Romania announces that starting on May 16, the fourth dose of Comirnaty – the
    Pfizer–BioNTech COVID-19 vaccine – can be administered in vaccination centers
    and in family medicine offices for all adults. (Romania Insider)
  - Enlargement of NATO
  - Finland–NATO relations
  - Finland's leaders declare that the country should apply for membership of NATO
    "without delay," with the Parliament set to vote next week on whether to apply.
    (CNBC) (President of the Republic of Finland)
  - Finland–Russia relations
  - The Russian Ministry of Foreign Affairs threatens to take retaliatory steps against
    Finland, including of a "military-technical" nature, if the country joins NATO.
    (BBC News)
  - France–Iran relations
  - France summons the Iranian ambassador in response to the detainment of two French
    nationals. (Times of Israel)
  - A team of scientists at the Event Horizon Telescope release the first ever image
    of Sagittarius A*, the supermassive black hole at the center of the Milky Way
    galaxy. (BBC News)
  - Researchers from the University of Florida announce that plants have been grown
    on lunar soil, collected by Apollo missions, for the first time ever. (AP)
  - 2022 boycott of Russia and Belarus, 2022 French Open
  - Tennis players from Russia and Belarus will be allowed to compete at the upcoming
    French Open as neutral athletes. However, players who speak in support for Russian
    President Vladimir Putin will face sanctions. (Tennis Majors)
