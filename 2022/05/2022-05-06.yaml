Date: '2022-05-06'
Source_URI: Portal:Current events/2022 May 6
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 Russia–Ukraine peace negotiations
  - Ukrainian President Volodymyr Zelenskyy says that Ukraine is open to continue
    peace talks with Russia if they guarantee the restoration of preinvasion borders,
    return the Ukrainians who were forcefully evacuated to Russia, and if Russian
    troops withdraw from the country. (The Independent) (Axios)
  - Ukrainian MP Oleksiy Goncharenko claims that the Russian frigate Admiral Makarov
    was struck with Neptune anti-ship missiles off of Snake Island. Russia denies
    having any information of the strike. (Newsweek)
  - Jihadist insurgency in Burkina Faso
  - Eleven people are killed and nine others are injured in Islamist attacks in Loroum
    and Sanmatenga provinces, Burkina Faso. Twenty attackers are also killed. (AP)
  - Acquisition of Twitter by Elon Musk
  - The Orlando Police Pension Fund files a class-action lawsuit in the Delaware Chancery
    Court against Twitter Inc and Elon Musk, seeking to delay the acquisition of Twitter
    to 2025. (Reuters)
  - Hotel Saratoga explosion
  - At least 26 people are killed and at least 74 others are injured by an explosion
    caused by a suspected gas leak at the Hotel Saratoga in Havana, Cuba. (AP)
  - Two people die and over 100 more are rescued as a boat carrying migrants runs
    aground in southern Italy. (AP)
  - Two people are killed and eighteen others are injured when an explosion occurs
    in a residential building in Madrid, Spain. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Colombia
  - COVID-19 vaccination in Colombia
  - Colombia announces that it will offer a second COVID-19 vaccine boosters for people
    aged above 50 years. It comes after the country reached its target for fully vaccinate
    70% of population. (Reuters)
  - COVID-19 pandemic in mainland China
  - China decides to making regular COVID-19 testing mandatory for its citizens with
    setting up thousands of permanent PCR testing stations, with 9,000 already completed
    in Shanghai alone, as authorities aim to "normalise" tough pandemic controls even
    after the current round of lockdowns end. (Livemint)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record 30,035 new COVID-19 cases in the past 24 hours, which
    is the first time the country has reported more than 30,000 cases since the pandemic
    began. (Taiwan News)
  - Iran–Sweden relations
  - Iran detains a Swedish man who was travelling as a tourist, allegedly in response
    to Sweden prosecuting Hamid Nouri, an Iranian official considered to be responsible
    for the mass killings of political prisoners in 1988. (AP)
  - Iran–United States relations
  - The U.S. Senate passes 62–33 a non-binding resolution barring the Biden administration
    from removing the Islamic Revolutionary Guard Corps from its list of Foreign Terrorist
    Organizations. (Haaretz)
  - Two people are killed and three others are injured during a mass shooting at a
    care home in Molensingel, Alblasserdam, Netherlands. The perpetrator was already
    wanted for murdering a man at a shop yesterday. (BBC News)
  - Sofia Sapega, the girlfriend of Belarusian activist Roman Protasevich, with whom
    she was detained when their flight was diverted by the Belarusian Air Force last
    year, is sentenced to six years in prison for "inciting social hatred". The exiled
    Belarusian opposition condemns the verdict. (Reuters)
  - 2022 Sri Lankan protests
  - The Sri Lankan government declares a state of emergency in response to massive
    anti-government protests. (Reuters)
  - 2022 NHL Entry Draft
  - NHL commissioner Gary Bettman says that Russian players will remain eligible for
    the upcoming NHL Draft despite other clubs banning Russian athletes. (Sportsnet)
