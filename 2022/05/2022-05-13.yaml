Date: '2022-05-13'
Source_URI: Portal:Current events/2022 May 13
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Israeli involvement in the Syrian Civil War
  - Syrian state media says that a missile attack from Israel hit Masyaf, Hama Governorate,
    killing five people and injuring seven others. (Reuters)
  - Ten Syrian Army soldiers are killed and nine others are injured by a rocket attack
    that hit a bus in Aleppo, Syria. (Reuters)
  - Israeli–Palestinian conflict
  - Israeli police commando Noam Raz is killed in a shootout with Palestinian Islamic
    Jihad gunmen in Jenin, West Bank. (Times of Israel)
  - Israeli riot police beat pallbearers and mourners at the funeral of journalist
    Shireen Abu Akleh, which was attended by thousands of Palestinians in East Jerusalem.
    White House Press Secretary Jen Psaki and the deputy speaker for UN Secretary-General
    António Guterres called the images of the attacks "deeply disturbing". (AP)
  - Six people are injured in a mass stabbing on a train near Aachen, NRW, Germany.
    Police arrested an Iraqi man and are investigating whether it was a terrorist
    attack. (Deutsche Welle)
  - Acquisition of Twitter by Elon Musk
  - Elon Musk temporarily suspends his $44 billion takeover deal of Twitter as he
    seeks to confirm the company's calculations that spam bots and fake accounts constitute
    less than 5% of the user base. (Reuters)
  - Enlargement of the eurozone
  - The Croatian Parliament votes 117–13 to officially replace the kuna with the euro
    on 1 January. (RTÉ)
  - The Sky Bridge 721 opens in Dolni Morava, Czech Republic. Spanning , it is longest
    simple suspension bridge in the world. (Reuters)
  - 2022 Delhi fire
  - At least 27 people are killed and more than 40 others are injured in a fire at
    a commercial building in Mundka, Delhi, India. (NDTV)
  - COVID-19 pandemic
  - COVID-19 pandemic in North Korea
  - North Korea says that six people have died and 187,800 others have been quarantined
    due to the latest COVID-19 outbreak. (The New York Times)
  - The total number of people who have received a dose of the Malaria vaccine surpasses
    1 million. (NPR)
  - Enlargement of NATO
  - Finland–Russia relations
  - RAO Nordic, a subsidiary of Russian energy company Inter RAO, announces it will
    suspend deliveries of electricity to Finland, saying it has not been paid for
    prior deliveries. The suspension comes as Russia threatens retaliation if Finland
    joins NATO. (BBC News)
  - Finland–Turkey relations, Sweden–Turkey relations
  - Turkish president Recep Tayyip Erdoğan says that Turkey will oppose Sweden and
    Finland's applications to join NATO, asserting that the countries are "guesthouses
    for terrorist organisations", without giving details. Turkey has repeatedly criticized
    Sweden and other Western European countries for its handling of organisations
    labeled terrorist by the Turkish government, including the Kurdish militant groups
    PKK and YPG, and the followers of U.S.-based Islamic cleric Fethullah Gülen. (Reuters)
  - Government and intergovernmental reactions to the 2022 Russian invasion of Ukraine
  - Russia–United States relations
  - U.S. Defense Secretary Lloyd Austin holds talks with Russian Defense Minister
    Sergei Shoigu in the first meeting between the two since the start of the invasion.
    (Reuters)
  - War crimes during the 2022 Russian invasion of Ukraine
  - Ukraine holds its first trial for war crimes committed during the Russian invasion,
    against a Russian soldier accused of shooting an unarmed civilian in March. (AP)
  - Anti-government demonstrations occur in multiple cities in Iran that are experiencing
    Internet shutdowns. (Fox News)
  - President of the United Arab Emirates and ruler of Abu Dhabi Khalifa bin Zayed
    Al Nahyan dies at the age of 73. (Gulf News)
