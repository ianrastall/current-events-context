Date: '2022-05-09'
Source_URI: Portal:Current events/2022 May 9
Intelligence_Payload:
  Uncategorized:
  - 2022 Sri Lankan protests
  - Prime Minister of Sri Lanka Mahinda Rajapaksa resigns amid mass protests over
    the government's handling of the economic crisis. (BBC News)
  - Pro-government supporters storm a major protest site in Colombo, clashing with
    police and protesters. A total of 78 people are injured. (Al Jazeera)
  - Two people are killed and eight more are injured as police open fire against a
    group of protestors who were trying to set fire to the Pradeshiya Sabha chairman’s
    residence in Weeraketiya. (Ada Derana)
  - MP Amarakeerthi Athukorala opens fire against protestors who were blocking his
    vehicle in Nittambuwa, killing one man and injuring another. Athukorala then escaped
    into a nearby building, before being found dead alongside his security officer.
    (Al Jazeera)
  - Gunmen open fire at two polling stations in Buluan and Lanao del Sur, Philippines,
    killing three guards and a voter and injuring another guard and two voters, amid
    the presidential elections. (Al Jazeera)
  - 2022 Pulitzer Prizes
  - The Washington Post wins the Pulitzer Prize for Public Service for its coverage
    of the 2021 United States Capitol attack. The New York Times wins the Pulitzer
    Prize for International Reporting on the war on terror's failed bombing campaigns
    and the most awards overall. (The New York Times) (NPR)
  - Nigeria's airlines say that they have cancelled a plan to suspend domestic flights,
    a decision they had previously made due to an increase in the cost of aviation
    fuel. (BBC News)
  - The Royal Thai Army announces it will ban all army personnel from using the Singaporean
    e-commerce site Lazada for allegedly insulting the royal family in a Facebook
    video ad. Digital Economy Minister Chaiwut Thanakamanusorn in a separate statement
    said the government is considering legal action against both Lazada and the advertising
    agency responsible for the ad. (Reuters)
  - One person dies and eleven others are missing after a fishing boat sinks off the
    coast of Ghana. (BBC News)
  - Four people are killed and fifty others are injured after a tear gas grenade is
    set off causing a human stampede at a public university in Potosí, Bolivia. (AP)
  - Enlargement of NATO
  - The Swedish Social Democratic Party announces that it will decide on May 15 whether
    to pursue a course of action to join NATO. Finnish President Sauli Niinistö is
    expected to also announce Finland's intention to join NATO on May 12. (Al Jazeera)
  - Foreign relations of Iran, Foreign relations of Transnistria
  - Iranians in Moldova are urged to leave the country due to rising tensions in pro-Russian
    Transnistria and spillover effects from the war in Ukraine. (Tasnim)
  - 2022 Ecuador prison riots
  - A prison riot in Santo Domingo, Ecuador, kills 44 inmates. (ABC News)
  - 2022 Philippine general election
  - Filipinos head to the polls to elect officials in the Presidential, Senate, House
    of Representatives, Gubernatorial, and other local elections. (The Guardian)
  - Bongbong Marcos, the son of late Philippine dictator Ferdinand Marcos, is leading
    in the preliminary and unofficial results to become the next President. (CNN)
