  - Floods in twelve provinces of Afghanistan destroy 500 homes, kill 22 people and
    injure 40 others. (Reuters)
  - COVID-19 pandemic
  - WHO puts estimate of deaths due to COVID-19, including incidentals due to impacted
    health systems, at approximately 15 million worldwide. (CBC)
  - 2022 CONCACAF Champions League
  - Seattle Sounders FC becomes the first US Major League Soccer team to win the CONCACAF
    Champions League, defeating UNAM 5–2 on aggregate in the final. (Sports Illustrated)
