Date: '2022-05-14'
Source_URI: Portal:Current events/2022 May 14
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Jihadist insurgency in Burkina Faso
  - Fifteen civilians and three VPD volunteers are killed during a shooting attack
    against their convoy in Kompienga. (France 24)
  - Twenty people, including eight VPD volunteers, are killed during an attack in
    the town of Guessel. (Africanews)
  - Six people are killed during an attack in Markoye. (Ouest France)
  - 2022 Buffalo shooting
  - Ten people are killed and three others injured after a gunman opens fire in a
    Tops Friendly Markets supermarket in Buffalo, New York, United States. The shooter,
    a self-described white supremacist, is taken into custody. (AP)
  - Eurovision Song Contest 2022
  - Kalush Orchestra, representing Ukraine, wins the Grand Final with the song "Stefania".
    (Yahoo! News)
  - Economy of Venezuela
  - Venezuela announces that it will sell 5–10% shares in state-owned companies to
    private investors in order to help fund state enterprises. (AP)
  - 2022 heat wave in India and Pakistan
  - India bans wheat exports with immediate effect after the heat wave causes yields
    to be lower than expected. Exceptions will be made if wheat is requested by governments,
    or for food security needs. (Bloomberg)
  - Georgia–Russia relations, Russia–South Ossetia relations
  - Proposed Russian annexation of South Ossetia
  - Outgoing South Ossetian President Anatoly Bibilov announces that a referendum
    on joining Russia will be held on July 17. (Reuters)
  - The Federal Supreme Council of the United Arab Emirates appoints Mohamed bin Zayed
    Al Nahyan as the country's new president, who also inherits the Emirate of Abu
    Dhabi after the death of his half-brother Khalifa bin Zayed Al Nahyan. (AP)
