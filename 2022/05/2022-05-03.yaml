Date: '2022-05-03'
Source_URI: Portal:Current events/2022 May 3
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Governor of Donetsk Oblast Pavlo Kyrylenko says that nine people have been killed
    by Russian shelling in Donetsk Oblast, Ukraine. (Reuters)
  - Ten people are killed after projectiles hit a coking plant in Avdiivka, Donetsk
    Oblast. (Reuters)
  - The United Nations says that 127 people have been evacuated from the besieged
    Azovstal plant and nearby areas. (PBS News)
  - 2022 Russia–Ukraine peace negotiations
  - Russian President Vladimir Putin tells French President Emmanuel Macron that his
    country is ready to continue peace negotiations with Ukraine amidst fears that
    talks between the two countries have stalled. (TASS) (KMGH-TV)
  - Somali Civil War
  - At least 30 Burundian peacekeepers are killed and 20 more injured during an al-Shabaab
    attack at an African Union military base in Lower Shabelle, Somalia. (VOA)
  - Boko Haram insurgency
  - Seven people are killed as Islamist insurgents attack a village in Chibok, Borno
    State, Nigeria. (AP)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - 2022 Russian debt default
  - Russia avoids default on the dollar-denominated bonds that were due in April by
    sending dollars to foreign investors just before the grace period expired. (Bloomberg)
  - International sanctions during the 2022 Russian invasion of Ukraine
  - President Vladimir Putin signs a decree that will allow the Russian government
    to terminate any business and exports with entities and people that it deems "unfriendly".
    (Reuters)
  - Based on its preliminary findings, the European Commission accuses Apple of violating
    the EU's competition law by blocking its competitors from accessing the technology
    used for the Apple Pay service, and threatens to fine the company up to 10% of
    its global revenue. (BBC News)
  - American bank Citigroup says that the flash crash that affected several European
    stock markets yesterday was caused by an error from one of its traders. (BBC News)
  - Changsha building collapse
  - Two people are confirmed to have been killed when a building in Changsha, China,
    collapsed on April 29. (BBC News)
  - Abortion in the United States
  - Dobbs v. Jackson Women's Health Organization
  - 2022 abortion protests in the United States
  - Demonstrations are held outside the U.S. Supreme Court Building in response to
    last night's leak of the draft opinion. (Politico)
  - In California, an anti-abortion activist is detained by the San Francisco Police
    Department after climbing to the top of the 61-story Salesforce Tower. (KRON-TV)
    (San Francisco Chronicle)
  - The U.S. Supreme Court confirms the authenticity of the draft opinion indicating
    that the court would overturn Roe v. Wade and Planned Parenthood v. Casey. Chief
    Justice John Roberts condemns the leak and says that an investigation into the
    leak will be launched. (The New York Times) (Reuters)
  - Abortion in Oklahoma
  - Governor Kevin Stitt signs a heartbeat bill, i.e. a bill banning abortion after
    a heartbeat in a fetus is detected, which is at the age of about 6 weeks (except
    in cases of medical emergencies) and also adopts Texas-style enforcement to pursue
    offenders. The bill takes effect immediately. (CNN)
  - Carlos Guillén Tatis, the agriculture counselor at the Dominican Republic's embassy
    in Haiti, is kidnapped in Croix-des-Bouquets, Haiti. (AP)
  - European Parliament constituency
  - The European Parliament votes in favour of an election law overhaul, to be confirmed
    and possibly amended by the European Council, that will create a 28-seat pan-EU
    constituency and introduce elections of the President of the European Commission
    by popular vote. The reform will also create the European Electoral Authority,
    introduce postal voting for all EU residents, lower the minimum age of candidates
    to 18 and fix elections on Europe Day, May 9. (Euractiv)
