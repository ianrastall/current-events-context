Date: '2022-05-08'
Source_URI: Portal:Current events/2022 May 8
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Two Palestinians are killed by Israeli soldiers during confrontations in the West
    Bank, while an Israeli policeman is stabbed and wounded in Jerusalem, hours after
    the perpetrators of the El'ad stabbing are arrested. (Reuters)
  - Ituri conflict, 2021–2022 Democratic Republic of the Congo attacks
  - Thirty-five civilians are killed during an attack on a gold mine by CODECO rebels
    in Ituri Province, Democratic Republic of the Congo. (Reuters)
  - Government and intergovernmental reactions to the 2022 Russian invasion of Ukraine
  - Canada–Ukraine relations
  - Prime Minister of Canada Justin Trudeau, Deputy Prime Minister Chrystia Freeland
    and Minister of Foreign Affairs Mélanie Joly make an unannounced visit to Kyiv
    to meet with President of Ukraine Volodymyr Zelenskyy amid the ongoing Russian
    invasion. (CTV News)
  - Trudeau announces the reopening of the Canadian Embassy in Kyiv. (Politico)
  - Ukraine–United States relations
  - U.S. First Lady Jill Biden makes an unannounced visit to Uzhhorod, Ukraine, and
    holds a Mother’s Day meeting with Ukrainian First Lady Olena Zelenska. (AP) (CNN)
  - European Union–United States relations, Iran–United States relations
  - The European Union recommends that the United States remove the Islamic Revolutionary
    Guards Corps from their terrorist organization blacklist. (Times of Israel)
  - 2022 abortion rights protests in the United States
  - The office of Wisconsin Family Action, an anti-abortion group in Madison, Wisconsin,
    catches fire and is looted. Police discover a molotov cocktail and begin an arson
    investigation. (Milwaukee Journal Sentinel) (ABC News)
  - 2022 Hong Kong Chief Executive election
  - John Lee is elected as the 5th Chief Executive of Hong Kong. (The New York Times)
  - 2022 Mutua Madrid Open – Men's singles
  - Carlos Alcaraz defeats defending champion Alexander Zverev to win the men's singles
    tennis title at the 2022 Mutua Madrid Open. (BBC Sport)
