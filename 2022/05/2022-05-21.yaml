Date: '2022-05-21'
Source_URI: Portal:Current events/2022 May 21
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Siege of Mariupol
  - Russia declares victory in capturing the city of Mariupol. (The Guardian)
  - United States President Joe Biden signs into law a bill that would provide $40
    billion in military and economic aid for Ukraine, replenish stocks of U.S. equipment
    sent to Ukraine, fund European Command operations, and address the global food
    crisis. (CNN) (Reuters)
  - Maghreb insurgency
  - Mali War
  - An elderly Italian couple and their son are kidnapped by jihadists in Southern
    Mali. A Togolese citizen is also reported to have been kidnapped along with the
    Italians, but authorities say that they are unable to confirm if this is true.
    (Reuters)
  - Israeli–Palestinian conflict
  - A 17-year-old member of the Palestinian Islamic Jihad is killed and another is
    injured during clashes with Israeli soldiers in Kafr Dan, Jenin Governorate. (Reuters)
  - 2021–2022 global supply chain crisis
  - 2022 United States infant formula shortage
  - U.S. President Joe Biden signs the Access to Baby Formula Act, a bill aimed at
    expanding access to baby formula in the United States. (The Hill)
  - 2022 Russia–European Union gas dispute, Finland–Russia relations
  - Russia's Gazprom suspends natural gas exports to Finland over Finland's refusal
    to comply with Russia's demand that gas be paid for in rubles. (Reuters)
  - Weather of 2022
  - May 2022 Canadian derecho
  - At least nine people are dead after a derecho moves across portions of Central
    Canada. (CP24) (CTV News)
  - At least 57 people are dead after severe flooding in eastern India and Bangladesh.
    (BBC News)
  - Two workers are killed in an accident at the Khoemacau copper mine in Botswana.
    Authorities temporarily shut down the mine. (Reuters)
  - Four people are killed after a building collapse in Lagos, Nigeria. (BBC News)
  - Three people are killed and more than 30 are injured in a bus crash on the motorway
    near Mealhada, Portugal. (Today 90)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Tamil Nadu
  - Tamil Nadu reports its first case of the Omicron BA.4 variant in a 19-year-old
    woman. (The Hindu)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports its first case of the Omicron BA.4 variant in a person
    who recently travelled to the Middle East. (The Philippine Star)
  - 2022 monkeypox outbreak
  - Switzerland and Israel confirm their first cases of monkeypox. (Al Jazeera)
  - Greece and Norway report their first suspected cases of monkeypox. (Reuters) (Keep
    Talking Greece)
  - 2022 Australian federal election
  - ABC News Australia declares that Australian Prime Minister Scott Morrison and
    the current government have been defeated by Anthony Albanese and the Australian
    Labor Party. However, the number of seats to declare a majority or minority government
    is uncertain. (ABC News Australia)
  - An unusually early heat wave in Southern France continues to set all-time high
    records for May, with some communities reporting temperatures as high as . (La
    Dépêche du Midi) (Le Parisien)
  - An early heat wave in the United States sets all-time high records for May 21
    in several cities in Texas, Mississippi, Virginia, Maryland and Delaware, and
    ties them for some other areas, particularly in the Northeast. (The New York Times)
  - 2021–22 UEFA Women's Champions League
  - In association football, Olympique Lyonnais defeat Barcelona 3–1 in the final
    at Juventus Stadium in Turin, Italy, to win their eighth UEFA Women's Champions
    League title. (CNN)
  - 2021–22 EuroLeague
  - In basketball, Anadolu Efes defeat Real Madrid 58–57 in the championship game
    at Štark Arena in Belgrade, Serbia, to win their second EuroLeague title. (Daily
    Sabah)
