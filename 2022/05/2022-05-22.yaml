  - 2021–22 Serie A
  - A.C. Milan win the scudetto of the Serie A, the highest level of Italian league
    football, after finishing the season with 86 points, two points more than runners-up
    and their intercity rivals, Inter Milan. Milan win their 19th Serie A title overall
    and their first since the 2010–11 season. (CNA)
  - 2021–22 Premier League
  - Manchester City win their second consecutive Premier League title, their fourth
    in 5 years, and their sixth overall on the final day of the season following a
    3–2 comeback against Aston Villa. Manchester City win the league with 93 points,
    one point more than Liverpool. This is the first time since 2019 that the title
    has been decided on the final day of the season. (The New York Times)
  - 2022 PGA Championship
  - American professional golfer Justin Thomas wins the PGA Championship, making it
    his second since 2017. (ESPN)
