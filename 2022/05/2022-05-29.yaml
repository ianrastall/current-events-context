Date: '2022-05-29'
Source_URI: Portal:Current events/2022 May 29
Intelligence_Payload:
  Uncategorized:
  - Anglophone Crisis
  - Twenty-four people are killed and more than 60 injured in an attack by Anglophone
    rebels in Cameroon. (Barron's)
  - Tara Air Flight 197
  - A Yeti Airlines Twin Otter airplane goes missing with 22 people on board after
    going over high mountains in Nepal. (AP)
  - A Cessna 182 takes off from Split, Croatia, and heads to Germany before disappearing
    from radar north from Rakovica. (The Washington Post) (The Dubrovnik Times)
  - One person is killed and eleven others injured after a boat capsizes in Lake Pueblo
    State Park, Colorado, United States; another is reported missing. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - California Governor Gavin Newsom tests positive for COVID-19. (CNN)
  - 2022 monkeypox outbreak
  - Pakistan and Afghanistan report their first suspected cases of monkeypox. (24
    News HD) (See News)
  - Chairperson of the African Union Macky Sall calls for dialogue between the Democratic
    Republic of the Congo and Rwanda amid rising tensions between the two countries
    over the resurgence of the M23 rebels. Rwanda calls it an "internal DR Congo conflict"
    and also calls for the release of two "kidnapped" Rwandan soldiers along its border
    with DR Congo. (Reuters)
  - Indian musician Sidhu Moose Wala is shot dead by unidentified assailants in Jawaharke
    village of Mansa. (The Indian Express)
  - 2022 Colombian presidential election
  - Colombians go to the polls to vote in the presidential election. (NPR)
  - Left-wing candidate, former 19th of April Movement guerrilla and former Bogotá
    mayor Gustavo Petro, and populist former Bucaramanga mayor Rodolfo Hernández Suárez,
    win 40% and 28% of the vote respectively. They will face off in the second round
    in June. (CNN)
  - Pope Francis appoints twenty-one new cardinals. Most of the cardinals are from
    outside Europe. (AP)
  - 2022 in association football
  - 2021–22 Liga I, Football in Romania
  - FC Dinamo București will be relegated to the second division for the first time
    in the 74-year history of the club. (DigiSport)
  - 2021–22 in French football, Football in France
  - AS Saint-Étienne is relegated to the second division following a loss to AJ Auxerre.
    Saint-Étienne fans storm the pitch, throw flares at players, and clash with riot
    police officers. (France 24) (The Washington Post)
  - 2022 IndyCar Series, 2022 Indianapolis 500
  - Marcus Ericsson wins the 106th running of the Indianapolis 500. Ericsson is the
    first Swedish driver to win the event since 1999. (Yahoo!)
