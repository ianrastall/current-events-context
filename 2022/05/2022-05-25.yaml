Date: '2022-05-25'
Source_URI: Portal:Current events/2022 May 25
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Donbas offensive
  - The Ukrainian city of Pokrovsk, Donetsk Oblast, is hit by Russian missiles, injuring
    several people. (AP)
  - Southern Ukraine offensive
  - A Russian cruise missile strike destroys a shopping centre and several homes in
    the city of Zaporizhzhia, killing one person and injuring three others. At least
    62 homes were damaged, according to local officials. (Ukrinform)
  - Afghanistan conflict
  - May 2022 Kabul mosque bombing
  - At least five people are killed when a bomb explodes at a Shia mosque in Kabul,
    Afghanistan. (Reuters)
  - 2022 Mazar-i-Sharif minivan bombings
  - Nine passengers are killed when improvised explosive devices hidden inside a group
    of minivans detonate in Mazar-i-Sharif, Balkh Province. (AP)
  - Israeli–Palestinian conflict
  - Clashes break out with the IDF after Palestinian rioters attack Joseph's Tomb
    in Nablus, West Bank. Fifteen Palestinians are injured and one teenager is killed.
    (Times of Israel)
  - Three Israelis are injured in a Palestinian stone-throwing attack in Huwara, West
    Bank. (Times of Israel)
  - Colombian conflict
  - Colombian and Venezuelan intelligence officials confirm the death of Miguel Botache
    Santillana, alias Gentil Duarte, the top leader of the FARC dissidents. (Caracol
    Radio)
  - Kivu conflict
  - M23 fighters besiege a military base in Rumangabo, Democratic Republic of the
    Congo. (Reuters)
  - Insurgency in Northern Chad
  - Fighting breaks out between Arab and Tama gold miners in the Kouri Bougoudi district
    of Northern Chad. The rebel Front for Change and Concord in Chad group says that
    over 200 people have been killed. (Reuters)
  - Insurgency in the Maghreb
  - Jihadist insurgency in Burkina Faso
  - May 2022 Madjoari massacre
  - At least 50 people are killed during an attack in Madjoari Department, Burkina
    Faso. (Reuters)
  - 2022 boycott of Russia and Belarus
  - Marks & Spencer, a British retail chain, announces that it is permanently closing
    all of its 48 stores in Russia, which employ 1,200 people, saying that it is a
    "values-led business". (Sky News)
  - European migrant crisis
  - One person is killed and 75 others remain missing after a boat carrying migrants
    sinks off the coast of Tunisia. (Reuters)
  - A bus carrying Central American and Cuban migrants crashes off a highway in San
    Luis Potosí, Mexico. Seven migrants die and 25 are injured. (AP) (Excélsior)
  - 2022 monkeypox outbreak
  - Finland reports its first suspected case of monkeypox. (Reuters)
  - Abortion in Oklahoma
  - Governor of Oklahoma Kevin Stitt signs HB 4327 into law, making Oklahoma the first
    state in the United States to completely ban abortion. (ABC News)
  - Kashmiri separatist leader Yasin Malik is sentenced to life in prison by Patiala
    House court of India. (Reuters)
  - Russia's State Duma approves a bill removing the upper age limit for contractual
    service in the Russian Armed Forces. The bill will now head to President Vladimir
    Putin to be signed into law. (Reuters)
  - Several bomb threats are made via email to schools and government institutions
    in Sarajevo Canton, Bosnia and Herzegovina, prompting evacuations. No bombs have
    been found. (N1)
  - 2022 Philippine presidential election
  - Congress officially proclaims former Senator Bongbong Marcos and his running mate,
    Davao City Mayor Sara Duterte, as president-elect and vice president-elect, respectively.
    (CNN)
  - 2021–22 UEFA Europa Conference League
  - In association football, Roma defeats Feyenoord 1–0 in the final at the Arena
    Kombëtare in Tirana, Albania, to win the inaugural edition of the UEFA Europa
    Conference League, the third tier of active European club football competitions.
    (The Guardian)
