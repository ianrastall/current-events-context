Date: '2022-05-01'
Source_URI: Portal:Current events/2022 May 1
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Siege of Mariupol
  - Some civilian evacuations begin from the Azovstal iron and steel works in Mariupol.
    Officials believe that up to 1,000 people have sought refuge at the plant, which
    has been the target of Russian airstrikes for days. However, evacuations are suspended
    until 8 a.m. tomorrow due to "security concerns". (The Washington Post) (CNN)
  - Five people are killed by Russian shelling in the town of Lyman. (Times of Israel)
  - April 2022 Belgorod and Bryansk attacks
  - A fire reportedly occurs at a military facility in Belgorod Oblast, Russia, slightly
    injuring one person and damaging seven houses. (Reuters)
  - Transnistria conflict
  - Ukrainian intelligence officials report that Russia is poised to launch a second
    front from the breakaway area of Transnistria in order to take over the rest of
    Moldova. (The Times)
  - Sinai insurgency
  - The Islamic State claims via the Al-Naba newspaper that Israel killed a senior
    jihadist commander in the Egyptian Sinai Peninsula. (Times of Israel)
  - International sanctions during the Russo-Ukrainian War
  - Germany–Russia relations
  - German Foreign Minister Annalena Baerbock says that Germany may lift sanctions
    against Russia if they completely withdraw their troops from Ukraine. (Bloomberg
    Quint)
  - Hungary, a member of the European Union, says that it will veto any sanctions
    that would restrict energy imports from Russia. Unanimity among the 27 EU members
    is required to introduce sanctions. (Bloomberg)
  - Two people are killed and another person is missing after heavy flooding in the
    French overseas department of Guadeloupe. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Greece
  - The Greek Civil Aviation announces that Greece has lifted their COVID-19 restrictions
    for domestic and foreign flights. Passengers will still be required to wear a
    mask. (Reuters)
  - COVID-19 pandemic in Italy
  - Italy removes their Green Pass for all indoor places except hospitals and nursing
    homes and lifts their COVID-19 vaccination and mask mandate for museums, bars,
    hotels, and restaurants. However, masks will still be required for public transport
    until June 15. (Wanted In Rome)
  - Protests against the 2022 Russian invasion of Ukraine
  - May Day anti-war rallies are held across the world to call for peace in Ukraine.
    (Al Jazeera)
