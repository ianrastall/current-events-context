Date: '2022-05-31'
Source_URI: Portal:Current events/2022 May 31
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Eastern Ukraine offensive
  - Battle of Sievierodonetsk
  - An airstrike hits a tank filled with nitric acid in Sievierodonetsk, Luhansk Oblast,
    prompting the region's governor to ask residents to remain inside bomb shelters
    due to the risk of exposure to toxic fumes. (Reuters)
  - Ukraine says that Russian forces have taken control of most of Sievierodonetsk
    after launching a full-scale assault on the city. Luhansk governor Serhiy Haidai
    says that 60% of structures in the city have been destroyed in the fighting. (Reuters)
  - A Russian missile hits an apartment in Sloviansk, Donetsk Oblast, killing three
    people and injuring six others. (AP)
  - Internal conflict in Myanmar
  - A bombing kills one person and injures nine others near the Sule Pagoda in Yangon,
    Myanmar. State media accuses the People's Defence Force of responsibility, which
    the PDF denies. (AP)
  - Seven people are injured after military forces shell a monastery in Natmyaung,
    Sagaing Region. (Radio Free Asia)
  - Tigray War
  - The United Nations says that the Eritrean Defence Forces shelled the Ethiopian
    border town of Sheraro over the weekend, killing a 14-year-old girl and injuring
    18 others. (Reuters)
  - International sanctions during the Russo-Ukrainian War
  - The United Kingdom and the European Union agree to implement a ban on insuring
    Russian oil tankers, which will be phased in beginning in 6 months. This will
    effectively render the vast majority of oil tankers uninsurable as most institutions
    conducting insurance are located in Western Europe. (Financial Times)
  - Six African countries, on Zimbabwe's initiative, agree to restart trade in ivory
    as the population of elephants soars beyond sustainable levels. (OCCRP)
  - An AIDC AT-3 crashes in Kaohsiung, Taiwan, killing the pilot. In response, the
    Taiwanese Air Force suspends training operations. (Reuters)
  - 2022 monkeypox outbreak
  - Hungary and Norway report their first cases of monkeypox. (Reuters) (Reuters 2)
  - Regulation of electronic cigarettes
  - Mexico bans the sale of electronic cigarettes. (The Washington Post)
  - A major cyberattack hits the Costa Rican Social Security Fund, forcing the ministry
    to shut down its digital database and endangering the country's healthcare system.
    (Reuters)
  - Workers of the Polish Social Insurance Institution (ZUS) announce that they will
    go on a general strike beginning on June 27 amid disciplinary dismissal of the
    leader of the trade union representing ZUS and general poor conditions of employment.
    (Rzeczpospolita)
  - The Tau Herculids meteor shower, caused by debris from the 1995 breakup of comet
    73P/Schwassmann–Wachmann, peaks. (Space)
