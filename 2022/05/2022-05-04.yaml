Date: '2022-05-04'
Source_URI: Portal:Current events/2022 May 4
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Siege of Mariupol
  - The Associated Press confirms that approximately 600 people died in the Mariupol
    theatre airstrike. (AP)
  - Russian forces bombard the Azovstal steel works plant in Mariupol with thermobaric
    missiles. Mariupol mayor Vadym Boychenko confirms that contact has been lost with
    Ukrainian soldiers trapped inside the plant. (Mirror)
  - Ukraine confirms that Russian troops have entered the steel works plant after
    launching "an all-out assault". (BBC News)
  - Finland says that a Russian Air Force Mi-17 violated its airspace this morning,
    flying "four to five kilometres" inside Finnish airspace. The incursion comes
    ahead of an expected Finnish application to join NATO. (RTÉ)
  - International sanctions during the 2022 Russian invasion of Ukraine
  - The European Union proposes to ban all oil imports from Russia by the end of the
    year, and also remove Russia's biggest bank, Sberbank, from SWIFT. (CNN)
  - 2021–2022 inflation surge
  - The United States Federal Reserve announces that it is raising interest rates
    by 0.5%, which is the largest interest rate hike since 2000, in order to combat
    growing inflation. (CNN)
  - Twenty-six people are killed when a minibus, a bus and a fuel truck collide with
    each other in Rivne Oblast, Ukraine. (Reuters)
  - Twenty people are killed when a bus crashes into a tea estate in Fort Portal,
    Uganda. (AP)
  - 2021–2022 North Korean missile tests
  - South Korea and the Japan Coast Guard both accuse North Korea of firing a ballistic
    missile from Sunan-guyok into the Sea of Japan. (France 24)
