Date: '2022-05-24'
Source_URI: Portal:Current events/2022 May 24
Intelligence_Payload:
  Uncategorized:
  - 2022 Russian invasion of Ukraine
  - Siege of Mariupol
  - Ukrainian authorities say that about 200 dead people are found in the rubble of
    an apartment building in Mariupol, Donetsk Oblast. (AP)
  - Battle of Donbas
  - Russian Ground Forces seize control of Svitlodarsk in Donetsk Oblast, according
    to regional governor Pavlo Kyrylenko. (Reuters)
  - Hungary declares a state of emergency over the war in Ukraine and problems in
    the Hungarian economy caused in part by the conflict. (Reuters)
  - War on drugs
  - Mexican drug war
  - Celaya massacre
  - Eleven people are killed during a mass shooting at a hotel in Celaya, Guanajuato,
    Mexico. (Reuters)
  - Vila Cruzeiro shootout
  - Twenty-one people are killed in a shootout between Brazilian police and the Comando
    Vermelho gang in a favela in Rio de Janeiro. (Reuters)
  - Kashmir conflict
  - Insurgency in Jammu and Kashmir
  - An Indian policeman is killed and his seven-year-old daughter injured in an attack
    in Srinagar, Jammu and Kashmir. (The Hindu)
  - Kurdish–Turkish conflict
  - Operation Claw-Lock
  - Five Turkish soldiers are killed by Kurdish fighters in Iraq. (The New Arab)
  - Yemeni Civil War
  - Three people are killed when a drone is shot down and crashes in Sanaa, Yemen.
    (AP)
  - Israeli–Palestinian conflict
  - An independent investigation by CNN, aided by a newly released video by fellow
    Al Jazeera correspondent, points to late journalist Shireen Abu Akleh having been
    deliberately targeted by IDF soldiers. (CNN)
  - 2019–present Sri Lankan economic crisis, Economy of Sri Lanka
  - Sri Lanka increases fuel prices in order to help public finances and combat a
    debilitating economic crisis. Acting Prime Minister Ranil Wickremesinghe warns
    that "there is a possibility that inflation will increase further". (CNA)
  - Economic impact of the 2022 Russian invasion of Ukraine, International sanctions
    during the Russo-Ukrainian War
  - The United States Department of Treasury announces that it will not renew the
    sanctions exemption which permits Russia to service its sovereign debt to American
    investors. Allowing the exemption to expire increases the likelihood that Russia
    will default on that debt this summer. (The Wall Street Journal)
  - Collective action in the United Kingdom
  - The National Union of Rail, Maritime and Transport Workers votes to go on a national
    strike in the United Kingdom for the first time since 1994 after demanding a "decent
    pay rise, job security and no compulsory redundancies". (BBC News)
  - Several people are injured when a train collides with a bus in Blaustein, Baden-Württemberg,
    Germany. (AP)
  - Two pilots are killed in Isfahan, Iran, when their fighter jet crashes. (Reuters)
  - Sixteen people are killed when a boat sinks off the coast of Myanmar. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Gujarat
  - Gujarat reports its first case of the Omicron BA.5 variant in a person who traveled
    to South Africa. (The Quint)
  - COVID-19 pandemic in North Korea
  - The Korean Central News Agency reports that North Korea has a total of 3 million
    suspected cases of COVID-19. (Korea Herald)
  - 2022 monkeypox outbreak
  - The Czech Republic, Slovenia, and the United Arab Emirates confirm their first
    cases of monkeypox. (Reuters) (Reuters 2) (Reuters 3)
  - England reports 14 new cases of monkeypox, thereby bringing the total number of
    cases in the country to 70. (Reuters)
  - German Health Minister Karl Lauterbach announces that Germany has ordered 40,000
    doses of the smallpox vaccine as a precaution, after the country reported its
    first case of monkeypox. (Axios)
  - Denmark announces that it will provide vaccines produced by Bavarian Nordic to
    persons who have been in close contact with monkeypox cases. (Reuters)
  - Lebanon reports its second suspected case of monkeypox. (Beirut)
  - Robb Elementary School shooting
  - Nineteen children and two teachers are killed in a mass shooting at an elementary
    school in Uvalde, Texas, United States. The gunman, a local 18-year-old high school
    student, is subsequently killed by police. The gunman had also shot and critically
    wounded his grandmother earlier in the day. (ABC News)
  - Media freedom in Russia
  - The Russian State Duma passes a bill that will allow state prosecutors to close
    Russian bureaus of media outlets from countries that Russia deems "unfriendly".
    The bill will now need to be passed by the upper house and receive President Putin's
    signature. (Reuters)
  - 2022 Pakistani protests
  - A policeman is shot dead by a Pakistan Tehreek-e-Insaf official, leading to a
    police crackdown on pro-Imran Khan demonstrators. (Reuters)
  - Ugandan police arrest veteran opposition politician Kizza Besigye for "inciting
    violence" and also disperse a crowd protesting against the government. (Reuters)
  - Anglo-Swiss commodity trading company Glencore pleads guilty to fraud charges
    related to bribery and price manipulation when pursuing preferential access to
    oil contracts. The company expects to pay total fines of $1.5 billion. (Swissinfo)
  - Former President of Moldova Igor Dodon is arrested on charges including corruption
    and treason. (Euronews)
  - The Premier League approves the sale of Chelsea F.C. to a U.S. consortium led
    by Los Angeles Dodgers co-owner Todd Boehly. Chelsea owner Roman Abramovich decided
    to sell the club after he was sanctioned over his connections to the Russian government.
    (BBC Sport)
