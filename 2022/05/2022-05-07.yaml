Date: '2022-05-07'
Source_URI: Portal:Current events/2022 May 7
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022 bombing of Odesa
  - Four Russian missiles strike the Ukrainian port city of Odesa. (Reuters)
  - Siege of Mariupol
  - Ukraine says that all women, children, and elderly have been evacuated from the
    besieged Azovstal steel plant. (Reuters)
  - Bilohorivka school bombing
  - Russian forces bomb a school in Bilohorivka, Sievierodonetsk Raion, Luhansk Oblast.
    Only two deaths are confirmed but sixty people are believed to have been killed.
    (Reuters)
  - Al-Qaeda insurgency in Yemen
  - Two colonels, two soldiers and four al-Qaeda insurgents are killed during clashes
    in Dhale Governorate, Yemen. (AP)
  - Sinai insurgency
  - Ten soldiers and one officer are killed during an attack at a checkpoint at a
    water pumping station in the Suez Canal, Egypt. (Reuters)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - The Airline Operators of Nigeria announces that all of their airlines will suspend
    their domestic flights beginning on Monday, in protest of rising fuel prices caused
    by the war in Ukraine. (BBC News)
  - Wildfires in 2022
  - Eight people are killed and 17 others injured during wildfires in Krasnoyarsk
    Krai, Siberia, Russia, that destroy hundreds of buildings in 16 settlements. The
    Federal Agency for Forestry blames high winds for worsening the fires and impacting
    firefighting efforts. (Reuters)
  - Three people are injured in an explosion at a steel coke plant in Jharkhand, India.
    (Reuters)
  - Four Vietnamese nationals are killed when a fire breaks out at Bismark House Mill
    in Oldham (BBC)
  - COVID-19 pandemic
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record 46,536 new COVID-19 cases in the past 24 hours, which
    is the first time the country has reported more than 40,000 cases since the beginning
    of the pandemic. (Focus Taiwan)
  - The monkeypox virus is detected in a person who recently travelled to England
    from Nigeria. (BBC News)
  - Treatment of women by the Taliban
  - The Taliban passes a law ordering all women in Afghanistan to cover their faces
    in public with a burqa. (Reuters)
  - Iran preemptively shuts down the internet in Khuzestan province amid protests
    against a 200% increase in bread prices. (Iran International)
  - One person is killed and six others injured in a mass shooting in Cancún, Quintana
    Roo, Mexico. (AP)
  - 2022 Northern Ireland Assembly election
  - Irish republican party Sinn Féin win the most seats in the Northern Ireland Assembly
    with 29% of the first-preference vote, marking the first time that a unionist
    party did not win the most seats since Northern Ireland's establishment in 1921.
    (The Guardian)
  - Former president of Brazil Luiz Inácio Lula da Silva announces his candidacy for
    the upcoming Brazilian presidential election in October, launching his candidacy
    with a message of "hope" and stating that he is ready to make "the greatest peaceful
    revolution" in the history of Brazil. (EFE)
  - 2022 Kentucky Derby
  - The 148th Kentucky Derby is held in Louisville, Kentucky with a full capacity
    for the first time since 2019 after two years of COVID-19 capacity restrictions.
    American thoroughbred Rich Strike wins the Derby in one of the largest upsets
    in history with an 80–1 odds to win. (CBS News) (ABC News)
