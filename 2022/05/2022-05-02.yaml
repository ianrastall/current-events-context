Date: '2022-05-02'
Source_URI: Portal:Current events/2022 May 2
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Southern Ukraine offensive
  - 2022 bombing of Odesa
  - A Russian missile hits a dormitory in Odesa, killing a 14-year-old boy and wounding
    a 17-year-old girl, according to Ukrainian officials. An Orthodox Church was also
    damaged in the missile strike. (Reuters)
  - Siege of Mariupol
  - The resumption of civilian evacuations from the Azovstal steel mill which was
    expected to begin at 8 a.m. local time does not occur, as Russia begins a non-stop
    barrage of airstrikes and bombings following the departure of Red Cross personnel,
    who had left the previous day after the evacuations were suspended. (CNN)
  - Five Russian troops are allegedly killed during a supposed incursion into the
    steel plant. (CNN)
  - Belgorod and Bryansk attacks
  - Explosions are reported in the city of Belgorod, Belgorod Oblast, Russia. Governor
    Vyacheslav Gladkov states that "there were no casualties or damage". (Reuters
    via NDTV)
  - A Ukrainian Air Force Bayraktar TB2 drone destroys two Russian Raptor-class patrol
    boats near Snake Island in the Black Sea. (CBS News)
  - 2022 New Mexico wildfires
  - Residents of Las Vegas, New Mexico, and surrounding communities evacuate as the
    Calf Canyon/Hermits Peak Fire continues to spread. (NPR) (The New York Times)
  - Five people are killed by a building collapse in Lagos, Nigeria. (AP)
  - Hungary–Ukraine relations, Hungary-Russia relations
  - Ukraine's National Security and Defense Council Secretary Oleksiy Danilov accuses
    Hungary of having advance knowledge of the Russian invasion, saying that Hungary
    was warned by Russian President Vladimir Putin, and that Hungary had plans to
    annex parts of Western Ukraine. (Ukraine Today)
  - Abortion in the United States
  - Dobbs v. Jackson Women's Health Organization
  - A draft opinion leaked to Politico indicates that the U.S. Supreme Court is set
    to overturn Roe v. Wade and Planned Parenthood v. Casey. (Politico) (Reuters)
  - Spanish authorities announce that Pegasus spyware was found on the cell phones
    of Prime Minister Pedro Sánchez and Minister of Defense Margarita Robles. (Al
    Jazeera)
  - It is announced that Russian President Vladimir Putin will reportedly undergo
    cancer surgery and temporarily hand power to Russian Security Council Secretary
    Nikolai Patrushev. (Business Standard)
