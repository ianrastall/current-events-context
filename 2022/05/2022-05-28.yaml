Date: '2022-05-28'
Source_URI: Portal:Current events/2022 May 28
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Donbas offensive, Eastern Ukraine offensive
  - Battle of Sievierodonetsk
  - Russian troops enter the strategic city of Sievierodonetsk in Luhansk Oblast with
    heavy street-to-street fighting underway. Luhansk governor Serhiy Haidai says
    that Ukrainian forces may have to retreat from the city in order to avoid capture.
    (Reuters)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - Ukraine confirms that it has received shipments of Harpoon anti-ship missiles
    from Denmark, and self-propelled howitzers from the United States in order to
    counter the Russian invasion. (Reuters)
  - 2022 Port Harcourt stampede
  - Thirty-one people are killed and seven others are injured in a stampede at a church
    charity event in Port Harcourt, Rivers State, Nigeria. (Al Jazeera)
  - 2022 Brazil floods and landslides
  - At least 106 people are killed by mudslides and flooding in the Recife metropolitan
    area, Pernambuco, Brazil. (AP)
  - Indonesian rescuers search for 26 people who went missing after a boat capsized
    last Thursday in the Makassar Strait with 43 people on board. News of the sinking
    reached authorities today. (Dawn)
  - Fifteen people are killed and three others are missing after heavy rain causes
    flooding in southern China. (AP)
  - 2022 monkeypox outbreak
  - The Republic of Ireland, Malta, and Mexico confirm their first cases of monkeypox.
    (The Guardian) (Xinhua News Agency) (El Universal in Spanish)
  - Iran reports its first suspected case of monkeypox. (IFP News)
  - 2023 Nigerian presidential election
  - Former Vice President Atiku Abubakar wins the presidential primary of the main
    opposition Peoples Democratic Party and officially becomes the party's nominee
    for the February 2023 general election. Abubakar, who served as Vice President
    from 1999 to 2007 and was the PDP's 2019 presidential nominee, defeated Nyesom
    Wike, Bukola Saraki, and nine other candidates to win the primary. (Premium Times)
  - 2019–2022 Sudanese protests
  - Two protesters are killed by Sudanese security forces in Khartoum. (AP)
  - International sanctions during the Russo-Ukrainian War
  - China denies airspace to Boeing and Airbus aircraft that have been reregistered
    in Russia as a result of sanctions triggered by its invasion. The reregistration
    is in violation of international law. (Airways Magazine)
  - 2021–22 UEFA Champions League
  - In association football, Real Madrid win a record 14th UEFA Champions League title
    after defeating Liverpool 1–0 in the 2022 UEFA Champions League Final at the Stade
    de France near Paris, with Vinícius Júnior scoring the winning goal. Kick-off
    was delayed by 36 minutes due to ticketed fans being prevented from entering the
    stadium. French police fire tear gas at Liverpool supporters. UEFA blamed the
    delay on Liverpool fans trying to enter the stadium with fake tickets and blocking
    the turnstiles. (The Guardian) (The Telegraph) (AP)
