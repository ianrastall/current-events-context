Date: '2022-05-17'
Source_URI: Portal:Current events/2022 May 17
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - A Russian airstrike kills eight people and injures twelve others in Desna, Chernihiv
    Oblast. (Reuters)
  - Insurgency in Khyber Pakhtunkhwa
  - Two Tehrik-i-Taliban commanders are killed in a shootout with Pakistani security
    forces in North Waziristan, Khyber Pakhtunkhwa. (AP)
  - 2022 Tripoli clashes
  - Heavy fighting breaks out in Tripoli, Libya, forcing Prime Minister Fathi Bashagha
    to flee the capital. (AP)
  - Allianz's American asset management unit pleads guilty to criminal securities
    fraud and agrees to pay $5.8 billion to those who have been misled about the risk
    of investing in some hedge funds that collapsed with the beginning of the COVID-19
    pandemic, in addition to more than $1 billion to the Securities and Exchange Commission.
    (Bloomberg) (Reuters)
  - Nine people are killed during an explosion caused by a gas leak at a primary school
    and a store in Kano, Nigeria. (BBC News)
  - Eleven people are killed after heavy rain causes floods and landslides in India.
    (AP)
  - 2022 monkeypox outbreak
  - Another four cases of monkeypox are confirmed by the UK Health Security Agency,
    bringing the total number recorded in the current outbreak to seven. Notably,
    these new cases appear to be the result of community transmission, with no known
    links to previous cases. (BBC News)
  - United States–Venezuela relations, International sanctions during the Venezuelan
    crisis
  - The United States lifts some economic sanctions on Venezuela, including allowing
    the Chevron Corporation to negotiate its license with the Venezuelan PDVSA state-owned
    oil company and removing the names of some Venezuelan officials from a United
    States government list of sanctioned individuals. (AP)
