Date: '2022-05-27'
Source_URI: Portal:Current events/2022 May 27
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - Donbas offensive, Eastern Ukraine offensive
  - Battle of Lyman
  - Russian forces announce they have captured the city of Lyman. (AP)
  - Enlargement of the eurozone
  - Bulgaria and the euro
  - The Bulgarian government approves adopting the euro as the country's currency
    on January 1, 2024, replacing the lev. (Reuters)
  - The Iranian IRGC Navy boards and seizes two Greek ships after the Supreme National
    Security Council condemned the US seizure of a Russo-Iranian ship. (VOA) (AP)
  - The Mexican energy regulatory commission fines Spanish electric utility Iberdrola
    for US$467 million for violating local regulations that prohibit selling electricity
    to third parties. (Al Mayadeen)
  - A vehicle carrying 26 soldiers crashes in the Shyok River in Ladakh, India, killing
    seven soldiers. (The Hindu)
  - An icefall kills two mountain climbers and injures nine others in the Alps of
    Valais, Switzerland. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in North Dakota
  - North Dakota reports 960 cases of COVID-19 and confirms their first case of the
    Omicron BA.4 variant. (Bismarck Tribune)
  - 2022 monkeypox outbreak
  - Canada reports 10 new cases of monkeypox, thereby bringing the total number of
    cases in the country to 26. (Reuters)
  - Finland and Argentina confirm their first cases of monkeypox. (Reuters) (AP)
  - Bolivia and Ecuador report suspected cases of monkeypox. (247 News Agency) (Big
    News Network)
  - Croatia–Russia relations
  - Russia expels five Croatian diplomats. (Reuters)
  - Foreign relations of Fiji
  - Fiji announces that it will become the 14th member of the Indo-Pacific Economic
    Framework for Prosperity in order to counter Chinese influence in the Pacific.
    This comes amid a visit by Chinese foreign minister Wang Yi to Kiribati. (Al Jazeera)
  - Following the resignation of the Prime Minister of Transnistria Aleksandr Martynov,
    Deputy Prime Minister Stanislav Kasap becomes acting head of government. (rulers.org)
    (Interfax)
  - 2023 Nigerian presidential election
  - The Federal High Court in Yenagoa rules that former President Goodluck Jonathan
    is allowed to run in the next presidential election, stating that a 2018 amendment
    prohibiting vice presidents from serving more than one full-term upon succession
    did not apply to Jonathan. (Reuters) (BBC News)
