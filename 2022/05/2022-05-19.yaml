Date: '2022-05-19'
Source_URI: Portal:Current events/2022 May 19
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Jihadist insurgency in Burkina Faso
  - Jihadist fighters raid a military base in Madjoari Department, Burkina Faso, killing
    eleven soldiers and wounding 24 more. (AP)
  - The United Kingdom Maritime Trade Operations agency says that a foreign vessel
    has been attacked off the coast of Al Hudaydah, Yemen. (AP)
  - Economic impact of the 2022 Russian invasion of Ukraine
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - The United States Senate votes 86–11 to pass a $40 billion package aimed at sending
    aid to Ukraine. The legislation will head to U.S. President Joe Biden for his
    signature. (Reuters)
  - 2021–2022 global supply chain crisis
  - 2022 United States infant formula shortage
  - The U.S. Senate votes unanimously to pass the Access to Baby Formula Act, a bill
    that would provide access to baby formula in the United States. This comes a day
    after the U.S. House of Representatives passed the bill. The bill will head to
    President Biden for his signature. (PBS)
  - 2019–present Sri Lankan economic crisis
  - Sri Lanka defaults on its debt for the first time in the country's history as
    it struggles with its worst financial crisis in more than 70 years. (BBC News)
  - Fourteen people are killed and 20 others are injured after a bus's brakes malfunction,
    causing it to crash on a highway in Jalisco, Mexico. (Reuters)
  - Eight people are injured in an explosion at an oil refinery in Ulsan, South Korea.
    (Reuters)
  - Four people are killed and 10 are missing after a boat carrying migrants sinks
    off the coast of Sfax, Tunisia. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - The United States Centers for Disease Control and Prevention (CDC) votes to recommend
    a third dose of the Pfizer COVID-19 vaccine for children ages 5–11 years old.
    (CBS News)
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Telangana
  - India reports their first case of the Omicron BA.4 variant in Hyderabad, Telangana.
    (Mint)
  - 2022 monkeypox outbreak
  - Spain has confirmed the diagnoses of seven monkeypox cases, with many others still
    being tested, amid an unusual outbreak in Europe. (AP)
  - Bavarian Nordic announces that it will supply the Imvanex vaccine to Europe in
    response to the monkeypox outbreak. (GlobeNewswire)
  - Polio eradication
  - A case of wild poliovirus is recorded in Mozambique for the first time since 1992.
    (AfricaNews)
  - Enlargement of NATO, Finland–Turkey relations, Sweden–Turkey relations
  - President of Turkey Recep Tayyip Erdoğan reiterates that he will vote against
    the admittance of Finland and Sweden into NATO, effectively preventing their accession.
    Erdoğan has accused the two countries of supporting the Kurdistan Workers Party
    and the Syrian Kurdish People's Protection Units, which Turkey considers to be
    terrorist organizations. (Yahoo! News)
  - Two people are killed and seven wounded during a mass shooting near a McDonald's
    restaurant in Chicago, Illinois, United States. (AP)
  - Four people (including the perpetrator) are killed in a murder–suicide in Harris
    County, Texas. (KTRK-TV) (The Houston Chronicle)
  - An unusually cold spell of weather hits southern Brazil. A meteorological station
    in Gama noted the lowest temperature since the beginning of weather observations
    (1963) in the Federal District, which contains the capital, Brasília, at . Several
    locations in the area have also seen snowfall, which is very rare in the country.
    (France 24)
