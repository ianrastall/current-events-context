Date: '2022-05-10'
Source_URI: Portal:Current events/2022 May 10
Intelligence_Payload:
  Uncategorized:
  - Ituri conflict, 2021–2022 Democratic Republic of the Congo attacks
  - Fourteen people are killed during an attack by suspected CODECO militants at a
    refugee camp in Fataki, Ituri Province, Democratic Republic of the Congo. (Reuters)
  - 2022 Sri Lankan protests
  - The Sri Lankan Defense Ministry authorizes the Army and police force to shoot
    looters and assailants and to arrest protesters without warrants in response to
    yesterday's violence. (Al Jazeera)
  - Apple announces it will discontinue sales of the iPod Touch, officially ending
    the iPod line of portable media players after more than 20 years. (The Verge)
  - The operator of Ukraine's natural gas system GTSOU announces that it will stop
    shipments of Russian gas through the Sokhranivka route on Wednesday. (Reuters)
  - Lithuania–Russia relations, Government and intergovernmental reactions to the
    2022 Russian invasion of Ukraine
  - The Seimas of Lithuania unanimously votes to designate Russia as a terrorist state
    and to classify Russia's actions in Ukraine as genocide. (NPR)
  - In a rare public rebuke, World Health Organization Director-General Tedros Adhanom
    Ghebreyesus criticizes China's "Zero-COVID" policy as "unsustainable", advising
    the Chinese government to change its strategy. (Al Jazeera)
  - 2022 Philippine presidential election
  - Former Senator of the Philippines Bongbong Marcos, son of dictator Ferdinand Marcos,
    is expected to become the next President of the Philippines, based on partial
    and unofficial counts. Marcos has more than twice as many votes as the next closest
    candidate Leni Robredo, the current Vice President of the Philippines. The victory
    will be officially ratified by the Congress of the Philippines in late May. (BBC
    News)
  - Crown Prince of Kuwait Mishal Al-Ahmad Al-Jaber Al-Sabah accepts the resignation
    of the Government of Kuwait, after the request had been submitted more than a
    month ago. No timeline is given for when the next election will occur. (Reuters)
  - Yoon Suk-yeol is sworn in as the 13th President of South Korea. (CNN)
  - Katalin Novák takes office as the first female President of Hungary. (Al Jazeera)
