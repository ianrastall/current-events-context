Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Suspension and ban of humanitarian aid organizations during the Gaza war
  - The Israeli military demolishes the main UNRWA building in East Jerusalem, forcing
    staff out and confiscating their devices, following the Israeli ban on the organization
    operating in the region. (Al Jazeera)
  - 2026 Gelida train derailment
  - The driver is killed and 37 other people are injured when a commuter train collides
    with a wall and derails in Gelida, Catalonia, Spain. (RTVE)
  - At least four people are killed in flooding in Monastir Governorate, Tunisia,
    the worst floods in the country since 1950. (Al Jazeera)
  - At least two people are killed in flooding in Algeria. (APA News)
  - Search and rescue crews rescue a motor banca crewman off a capsized boat in Sarangani,
    Davao Occidental, Philippines, while continuing to search for the other three
    missing crew members and 11 passengers. (AP via ABC News) (Philippine Daily Inquirer)
  - China–United Kingdom relations
  - The British government approves China's new embassy at London's Royal Mint Court,
    despite security concerns. The planning decision affirmed development compliance,
    while MI5 raised no objections. The embassy will be the largest Chinese embassy
    in Europe upon completion. (CNN)
  - Gun laws of Australia
  - 2026 Australia gun buyback program
  - The Australian parliament passes laws introducing a nationwide gun buyback program,
    stricter background checks, and tougher penalties for hate crimes, following the
    2025 Bondi Beach shooting that killed 15 people. (Reuters)
  - War on drugs
  - Thai authorities announces the end of a 4-month operation to combat drug trafficking
    in the country, resulting in the seizure of 330 million methamphetamine tablets,
    the arrests of over 88,000 suspects, and frozen assets worth ฿3.39B (US$140M).
    (The Straits Times)
  - Portuguese police arrest 37 suspects linked to an ultra-right network accused
    of racially motivated hate crimes, seizing weapons and neo-Nazi materials during
    a nationwide operation targeting , whose leader is already imprisoned. (Reuters)
  - 2021–present Bulgarian political crisis
  - Bulgarian president Rumen Radev resigns, marking the first voluntary resignation
    of the country's president in its post-communist history. Vice president Iliyana
    Yotova is sworn in as acting president, becoming the country's first female president.
    (AP)
  - Thousands of people protest across Germany, particularly in Bremen, Dortmund,
    Frankfurt, in support of Kurdish forces against the Syrian Armed Forces in clashes
    in northeastern Syria. (DW)
