  - Yemeni civil war
  - 2025 Southern Yemen offensive, Saudi-led intervention in the Yemeni civil war
  - A Southern Transitional Council (STC) delegation in Riyadh announces the group's
    dissolution following widespread territorial losses to the Saudi-backed Yemeni
    government. The STC rejects the announcement, saying the announcement was made
    under duress. (The New Arab)
  - EU–Mercosur Association Agreement
  - Twenty-one of the 27 countries of the European Union approve a trade deal with
    Mercosur, which will create "the world's largest free trade area" after 25 years
    of talks. The deal is expected to be formally signed in Paraguay in the near future.
    (Politico)
  - Fourteen people are killed and over 30 others are injured after a bus plunges
    into a gorge near Nahan, Himachal Pradesh, India. (Hindustan Times)
  - Nine people are killed and 10 are injured after a bus crashes between Kano and
    Maiduguri in Borno State, Nigeria. (Daily Post)
  - 2026 Cedarbluff shootings
  - At least six people are killed in spree shootings at three locations across Cedarbluff,
    Mississippi, United States. A 24-year-old man is taken into custody and charged
    with murder. (AP via CTV News)
  - 2025 Honduran general election
  - The National Congress of Honduras approves a recount of the votes cast in the
    November 2025 election, which is subsequently approved by President Xiomara Castro's
    decree. (CNN in Spanish) (Bloomberg)
