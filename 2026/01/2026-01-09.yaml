Intelligence_Payload:
  Uncategorized:
  - Syrian conflict
  - SDF–Syrian transitional government clashes
  - January 2026 Aleppo clashes
  - The Syrian defense ministry declares a ceasefire in the Ashrafiyah, Bani Zeid,
    and Sheikh Maqsood districts of Aleppo after several days of armed conflict between
    government forces and the Kurdish-led Syrian Democratic Forces that killed at
    least 21 people. (AFP via Arab News)
  - Operation Southern Spear
