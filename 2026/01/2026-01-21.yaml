Date: '2026-01-21'
Source_URI: Portal:Current events/2026 January 21
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Killing of journalists in the Gaza war
  - At least eleven Palestinians, including two children and three journalists documenting
    Egyptian state aid distribution, are killed in Israeli airstrikes in the Netzarim
    Corridor in Gaza. (Al Jazeera)
  - Israel–Hezbollah conflict
  - Israel launches a series of airstrikes in Lebanon, killing one person each in
    Tyre and Sidon and wounding 19 others in Qanarit. (Al Jazeera)
  - Yemeni civil war
  - A car bombing near Aden, Yemen, targeting the motorcade of Southern Giants Brigades
    commander Hamdy Shoukry, kills three people and injures four others. (AP via ABC
    News)
  - Orbanomics, Economy of Hungary
  - Hungarian prime minister Viktor Orbán announces a 100-billion-forint (US$300-million)
    support package for the restaurant sector and commits to covering additional household
    heating costs for January, as part of broader measures to ease cost-of-living
    pressures and revive the economy ahead of the upcoming parliamentary elections.
    (Reuters)
  - January 2026 New Zealand storms
  - New Zealand territorial authorities order evacuations in low-lying areas of the
    North Island after heavy rain and strong winds cause flooding and landslides,
    while police search for a man missing after being swept away while fording. (Reuters)
  - Severe storms in Greece kill two people as strong winds and heavy rainfall cause
    flooding, prompting authorities to suspend maritime traffic and close schools
    in several regions. (AFP via BSS)
  - EU–Mercosur Partnership Agreement
  - The European Parliament approves a measure by a vote of 334–324 to ask the European
    Court of Justice to rule on whether the free trade agreement between the EU and
    Mercosur can be applied before full ratification by all member states and whether
    its provisions restrict the EU's ability to set environmental and consumer health
    policies. (Reuters)
  - Greenland crisis, Tariffs in the second Trump administration
  - United States president Donald Trump announces he will cancel the planned tariffs
    on Denmark, Finland, France, Germany, the Netherlands, Norway, Sweden, and the
    United Kingdom after reaching an agreement with NATO Secretary General Mark Rutte
    for a Greenland framework. He also stated at the World Economic Forum that he
    has ruled out sending forces amidst invasion fears. (BBC News) (Fortune)
  - 2024 South Korean martial law crisis
  - A high court in Seoul, South Korea, sentences former prime minister Han Duck-soo
    to 23 years in prison for being an accomplice in giving procedural legitimacy
    to the martial law decree during a cabinet meeting. (Reuters) (The Guardian)
  - Corruption in Malaysia
  - The Malaysian anti-corruption commission charges two former military chiefs and
    one of their wives with money laundering, abuse of power, and criminal breach
    of trust. (AP)
  - Trial of Tetsuya Yamagami
  - A district court in Nara, Japan, sentences Tetsuya Yamagami to life in prison
    for assassinating former prime minister Shinzo Abe in 2022. (Reuters)
  - War on drugs
  - Europol announces an end to an operation against synthetic drug production and
    trafficking in Belgium, the Czech Republic, Germany, Netherlands, Poland, and
    Spain, resulting in the arrests of 85 people and the seizure of 1,000 metric tons
    of chemicals in 24 labs. (DW)
  - Politics in Australia
  - The Opposition Liberal–National Coalition splits less than a year after reforming
    as the Liberal and National parties take opposing stances on the Albanese government's
    proposed tightening of hate speech laws in the wake of the Bondi Beach shooting.
    (ABC News Australia)
