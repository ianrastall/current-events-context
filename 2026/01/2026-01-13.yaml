Date: '2026-01-13'
Source_URI: Portal:Current events/2026 January 13
Intelligence_Payload:
  Uncategorized:
  - 2025–2026 Iranian protests
  - 2026 Iran massacres
  - The U.S.-based non-governmental organization HRAI reports that at least 2,000
    people have been killed during nationwide protests in Iran. Meanwhile, independent
    activist sources contend that the nationwide crackdown has resulted in at least
    12,000 to 20,000 people killed. (CBS News) (AP)
  - Insurgency in Chad
  - At least six people are killed, including three soldiers and three attackers,
    and 12 others are injured, including two other attackers, in clashes between a
    rebel group and the Chadian National Army in Korbol, Moyen-Chari, Chad. (Africanews)
  - Adelaide Writers' Week boycott
  - Adelaide Writers' Week in Adelaide, Australia, cancels its 2026 festival after
    director Louise Adler resigned and more than 180 writers withdrew in protest over
    the board's decision to disinvite Palestinian Australian author Randa Abdel-Fattah.
    (Reuters)
  - 2018–present Argentine monetary crisis
  - Argentina records a 31.5% annual inflation rate in December, the lowest end-year
    level since 2017, while monthly prices rise 2.8%, driven mainly by transport,
    housing, and fuel. (AFP via Barron's)
  - At least 38 people are killed when a ferry strikes rocks and sinks on the Niger
    River in Diré, Tombouctou Region, Mali. (AP)
  - At least 19 people are killed, four are seriously injured and over 30 others are
    missing following a landslide triggered by hours of heavy rain in Walikale Territory,
    North Kivu, Democratic Republic of the Congo. (AP) (Prensa Latina)
  - Philippines–United Arab Emirates relations
  - The Philippines and the United Arab Emirates sign a free trade agreement. (The
    Star)
  - Mexican drug war, Mexico–Venezuela relations
  - Mexican police arrest six alleged Tren de Aragua members operating in Mexico City
    on charges of drug trafficking, extortion, and human trafficking. (AP)
  - 2026 Ugandan general election, Human rights in Uganda
  - Uganda orders a nationwide internet shutdown two days before its general election,
    with the communications regulator directing service providers to suspend access
    to curb alleged misinformation and incitement. (AFP via Le Monde) (Al Jazeera)
  - Censorship in Venezuela
  - Venezuelans regain access to the social network X after more than a year of blockage
    under de jure president Nicolás Maduro. (AFP via CP24)
