Intelligence_Payload:
  Uncategorized:
  - 2026 Balochistan attacks
  - Pakistani security forces raid two militant hideouts and kill 41 insurgents in
    separate shootouts in the Harnai and Panjgur districts. (AP)
  - At least one person is killed and six others are reported missing when a fishing
    vessel sinks off Gloucester, Massachusetts, United States. (WCVB-TV)
  - Israel–South Africa relations
  - Israel expels South Africa's chargé d'affaires Shaun Byneveldt to reciprocate
    South Africa's persona non grata declaration on the Israeli ambassador following
    international incidents between the two countries in the wake of South Africa's
    genocide case against Israel. (CNN-News18) (DW)
  - Epstein files
  - The United States Department of Justice releases more files on sex offender Jeffrey
    Epstein following the passing of the Epstein Files Transparency Act, the largest
    single-day release of said files, including over 3 million previously undisclosed
    documents. (AP) (Reuters)
  - Killing of Brian Thompson
  - United States federal judge Margaret Garnett dismisses the federal murder and
    weapon charges against Luigi Mangione in the killing of former UnitedHealthcare
    CEO Brian Thompson, ruling out the death penalty against Mangione. The judge maintains
    the stalking charges, which carries a maximum sentence of life imprisonment. (DW)
  - Tunisian president Kais Saied extends a decade-long national state of emergency
    for 11 months. (Reuters)
  - Cuba–United States relations, Tariffs in the second Trump administration
  - United States president Donald Trump declares a national emergency regarding Cuba
    in order to impose tariffs on countries that provide oil to it. (UPI)
  - Acting President of Venezuela Delcy Rodríguez announces a proposal for mass amnesty
    and plans to close the polemic El Helicoide prison. (The Guardian)
  - 2026 Australian Open
  - In tennis, Carlos Alcaraz defeats Alexander Zverev in the men's singles semifinal
    of the Australian Open in a 5-hour and 27-minute match, the longest semifinal
    match in tournament history. (Al Jazeera)
