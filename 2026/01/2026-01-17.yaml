  - 2026 northeastern Syria offensive
  - Syrian government forces capture many towns in Aleppo Governorate, including Dayr
    Hafir and Maskanah, after Syrian Democratic Forces (SDF) units withdraw from their
    positions. The Syrian Army also reportedly expelled the SDF from Al-Tabqah. (Al
    Jazeera)
  - Iraqi conflict, Iraq–United States relations
  - The United States Armed Forces formally withdraws from Iraq's Al-Asad Airbase,
    handing over full operational control of the airbase to the Iraqi Armed Forces
    for the first time since 2014. (Reuters)
  - EU–Mercosur Association Agreement
  - The European Union and Mercosur formally sign the free trade agreement between
    the two blocs after 25 years of negotiations. (Reuters)
  - 2026 Binaliw landslide
  - The death toll from the landslide in the Binaliw landfill in Cebu City, Philippines,
    rises to 35. Search operations are ongoing for the last victim. (ABS-CBN News)
  - 2026 Biobío wildfires
  - At least 16 people are killed, more than 50,000 are evacuated and a state of emergency
    is declared due to wildfires in Ñuble Region and Biobío Region, Chile. (France
    24) (BBC News)
  - 2026 Indonesia Air Transport ATR 42 crash
  - An Indonesia Air Transport ATR 42-512 aircraft operated by the marine affairs
    ministry carrying eleven people loses contact in Maros Regency, South Sulawesi,
    while flying to Makassar and crashes. A search and rescue effort is underway.
    (Detikcom in Indonesian) (ANTARA)
  - 2026 Gul Plaza Shopping Mall fire
  - At least six people are killed, 22 others are injured and 50 are reported missing
    in a massive fire at a multi-story shopping mall in Karachi, Sindh, Pakistan.
    (Dawn) (AP)
  - At least 24 people are killed and 45 others are injured in two separate road crashes
    in Pakistan when a truck plunges into a canal in Sargodha, Punjab, and a passenger
    bus overturns on a highway in Balochistan. (AP)
  - Eight skiers are killed and another is seriously injured in separate avalanches
