Intelligence_Payload:
  Uncategorized:
  - Insurgency in Balochistan
  - Twelve Balochistan Liberation Army gunmen are killed by the Pakistani army in
    an attempted hostage-taking at a police station in Kharan District, Balochistan
    Province, Pakistan. (AP)
  - Canada–China relations
  - Canada and China reach a trade agreement that reduces Canadian tariffs on Chinese
    electric vehicles and Chinese tariffs on Canadian canola seeds, following a high-level
    summit in Beijing. (CNN)
  - Taiwan–United States relations, Tariffs in the second Trump administration
  - Taiwan and the United States reach a trade agreement that would reduce U.S. tariffs
    on Taiwanese goods from 20% to 15% in return for promised Taiwanese investment
    in U.S. businesses. (AFP via France 24)
  - At least 100 people are killed and thousands of homes are destroyed across Mozambique,
    South Africa, and Zimbabwe, amidst severe torrential rain and flooding. (AP)
  - Iran–New Zealand relations
  - New Zealand temporarily closes its embassy in Tehran, evacuates its diplomats
    to Ankara, Turkey, and warns its citizens to leave Iran, citing the deteriorating
    security situation and internet blackout. (AFP via Al Arabiya)
  - 2026 Ugandan general election
  - 2026 Ugandan protests
  - Clashes between protesters opposed to president Yoweri Museveni and police leave
    at least seven people dead in Butambala, Uganda. (BBC News) (Reuters)
  - The opposition National Unity Platform says its leader and presidential candidate
    Bobi Wine has been placed under house arrest. A Ugandan military helicopter takes
    Wine to an unknown location after his house was stormed by security forces. (BBC
    News) (Sky News)
  - Arrest of Yoon Suk Yeol
  - A high court in Seoul, South Korea, sentences former president Yoon Suk Yeol to
    five years in prison for obstructing justice and excluding cabinet members during
    his 2024 martial law declaration, while acquitting him of document forgery. (AFP
    via TRT World) (AP)
  - Corruption in Malaysia
  - Malaysian prime minister Anwar Ibrahim temporarily freezes all military and police
    procurement until compliance rules are met following an anti-corruption probe,
    while ordering a review and restructuring of the procurement system. (Reuters)
