Date: '2026-01-27'
Source_URI: Portal:Current events/2026 January 27
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Kharkiv strikes
  - At least five people are killed and two others are injured in a Russian drone
    strike on a passenger train in Kharkiv Oblast, Ukraine. (The Guardian) (Reuters)
  - Gaza war
  - Israeli forces kill six Palestinians by shelling and gunfire in al-Tuffah, Gaza
    City, Gaza. (The New Arab)
  - Suspected armed gang members ambush a police patrol on the Guga–Bakori road in
    Katsina State, Nigeria, killing three officers and injuring two. (Reuters)
  - Sinking of MV Trisha Kerstin 3
  - Philippine officials ground the fleet of passenger ships belonging to Aleson Shipping
    Lines, owner of the sunken ferry Trisha Kerstin 3. (AP via CTV News) (GMA News)
  - Seven people are killed and three injured after a minibus carrying Greek PAOK
    FC fans crashes on E70 in Timiș County, Romania. (AP) (Caliber)
  - Four Cuban nationals are killed and another is injured in a fire at an unlicensed
    migrant hostel in Balashikha, Moscow Oblast, Russia. (AFP via Al Arabiya)
  - Three people are killed and two others injured after a boat carrying 25 tourists
    from France capsizes off the coast of Muscat, Oman. (Al Jazeera)
  - United States–Venezuela relations
  - United States sanctions during the Venezuelan crisis
  - The United States begins releasing frozen Venezuelan assets under sanctions, as
    acting Venezuelan president Delcy Rodríguez confirms renewed diplomatic contacts
    between the two countries. (AFP via France 24)
  - India–European Union relations
  - The European Union and India sign a free trade agreement, eliminating tariffs
    on metals, plastics, chemicals, and pharmaceutical products. (The Guardian)
  - Iran–Saudi Arabia relations
  - Saudi Arabia bans the use of its territory or airspace for any military action
    against Iran. (AFP via The Times of Israel)
  - The Azerbaijani State Security Service announces that it has foiled an attempt
    by the Islamic State's Khorasan Province to bomb an embassy in Baku. (Al Jazeera)
  - 2025 Honduran general election
  - Nasry Asfura is sworn in as President of Honduras, succeeding Xiomara Castro.
    (AFP via France 24)
  - In an overnight session, the National Assembly of France approves a bill banning
    social media for children under the age of 15. The bill will now go to the Senate
    for approval. (AFP via The Guardian)
  - The Bulletin of the Atomic Scientists announces that the Doomsday Clock has been
    set to 85 seconds before midnight, the closest it has been to midnight, citing
    rising global tensions. (CNN) (Reuters)
