Date: '2026-01-28'
Source_URI: Portal:Current events/2026 January 28
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Dnipro strikes, Kyiv strikes, Odesa strikes
  - Three people are killed and three others are injured in overnight Russian strikes
    on the Kyiv, Dnipropetrovsk, and Odesa oblasts of Ukraine. (Al Jazeera)
  - Russo-Caucasian conflict
  - Two militants are killed in a shootout with police in Karabudakhkentsky District,
    Dagestan, Russia. (News.Az)
  - Sarah Mullally is confirmed as the first female archbishop of Canterbury and primate
    of the Church of England. (Reuters)
  - 2026 Rubaya mine collapse
  - At least 200 people are killed and several others are injured when a landslide
    collapses several of the Rubaya mines in Masisi Territory, North Kivu Province,
    Democratic Republic of the Congo. (The Canadian Press)
  - SATENA Flight 8895
  - A SATENA Beechcraft 1900 crashes near Cúcuta in North Santander, Colombia, killing
    all 15 people on board. (BNO News) (El Heraldo)
  - 2025–26 European windstorm season
  - Five people are killed and severe damage is caused by Storm Kristin in Portugal.
    (AA)
  - 2026 Baramati Learjet 45 crash
  - Five people, including Maharashtra deputy chief minister Ajit Pawar, are killed
    after a Learjet 45 aircraft crashes and explodes at Baramati Airport in Pune district,
    Maharashtra, India. (CNN-News18 via YouTube) (Hindustan Times)
  - Five people are killed, including three children, in a house fire in Sakha Republic,
    Russia. (Xinhua)
  - Climate change in the Caribbean, Climate change in the Netherlands
  - The Hague district court orders the Dutch government to create a legally binding
    plan to protect Bonaire from climate change, including setting enforceable emissions-reduction
    targets aligned with the Paris Agreement, after ruling that existing measures
    fail to safeguard residents from rising seas and extreme weather. (AP)
  - Guinea is unsuspended from ECOWAS following the 2025 Guinean presidential election.
    (ECOWAS)
  - Corruption in South Korea
  - A court in Seoul, South Korea, sentences former first lady Kim Keon Hee to 20
    months in prison for corruption. (AP)
  - Iran–Turkey relations
  - The Turkish National Intelligence Organization arrest six people, including an
    Iranian national, who are suspected of spying for Iran's Revolutionary Guard Corps,
    including at the NATO Incirlik Air Base in Adana. (AP)
  - 2023 Ecuadorian general election, Corruption in Ecuador
  - Ecuador's prosecutor's office raids the homes of politicians from the Citizen
    Revolution party, including presidential candidate Luisa González, as part of
    an investigation into alleged illicit Venezuelan money used to finance their 2023
    campaign. (Reuters)
  - 2025 Africa Cup of Nations final
  - In association football, the Confederation of African Football (CAF) fines the
    Senegal Football Federation US$615,000 for unsportsmanlike conduct during the
    final match against Morocco, fines Senegalese coach Pape Thiaw $100,000, and bans
    him for five 2027 AFCON qualifying matches. Senegalese players Iliman Ndiaye and
    Ismaila Sarr are also banned from the first two qualifier matches. (DW)
  - The CAF also fines the Royal Moroccan Football Federation $315,000 for unsportsmanlike
    conduct and interfering with referees. Moroccan captain Achraf Hakimi is banned
    for two games and player Ismael Saibari is banned for three. (DW)
