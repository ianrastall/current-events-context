    Zhang Youxia and the commission's chief of staff Liu Zhenli have been placed under
    investigation over suspected violations of discipline. (CNA)
  - Internet censorship in Pakistan
  - A Pakistani court sentences human rights lawyer Imaan Mazari and her husband to
    a combined 17 years in prison under cybercrime laws for social media posts that
    prosecutors say promote anti-state activity and accuse the military of terrorism.
    (Reuters)
  - 2026 Ugandan protests
  - Ugandan opposition leader Bobi Wine says soldiers have raided his Kampala residence,
    hospitalized his wife after assaulting her, and seized their property following
    Wine's rejection of election results that gave President Yoweri Museveni a new
    term. (Reuters)
