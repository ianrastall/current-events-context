  - 2026 West Bandung landslide
  - Eight people are killed and 82 others are missing after a landslide at West Bandung
    Regency, West Java, Indonesia. (CBC News) (ABC News Australia)
  - Six people are killed in a fire at a four-story furniture building in Hyderabad,
    Telangana, India. (The Economic Times) (The Times of India)
  - Five dead bodies, believed to be among those aboard a motor banca that was capsized
    on January 18, are found off Sarangani, Davao Occidental, Philippines. Search
    and rescue operations continue for at least ten others missing. (ABS-CBN News)
  - At least one person is killed and 14 others are injured in a gas explosion and
    multiple-alarm fire at a 17-story apartment building in the Bronx, New York City,
    United States. (WCBS-TV)
  - Commuter trains in Catalonia, Spain, are suspended for the second time this week.
    The Catalan government cites a lack of guaranteed safety on the railway network
    for the suspension. Rain and winds have caused landslides. (El Mundo in Spanish)
  - Italy–Switzerland relations
  - Italy recalls its ambassador to Switzerland after Swiss courts released the owner
    of a Crans-Montana bar on bail, while he is under investigation for a New Year's
    Day fire that killed 40 people, including six Italians. (Firstpost)
  - Operation Metro Surge, Shootings by U.S. immigration agents in the second Trump
