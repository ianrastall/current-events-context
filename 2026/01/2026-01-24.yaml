  - Protests occur in Minneapolis, Minnesota, United States, after 37-year-old Alex
    Pretti was fatally shot by ICE agents in the city. The Department of Homeland
    Security states he attacked ICE while allegedly carrying a concealed handgun.
    Protesters are reportedly hit with tear gas and at least one stun grenade. (WCCO-TV)
    (Minnesota Star Tribune)
  - Anti-corruption campaign under Xi Jinping
