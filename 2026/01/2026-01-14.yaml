Date: '2026-01-14'
Source_URI: Portal:Current events/2026 January 14
Intelligence_Payload:
  Uncategorized:
  - Anglophone Crisis
  - Fifteen people, including eight children, are killed by gunmen in a mass shooting
    in Ndu, Northwest Region, Cameroon. (AP)
  - Armed conflict for control of the favelas
  - Brazilian police kill four Comando Vermelho gang members in a raid in Rio de Janeiro,
    and seize weapons, ammunition, drugs, camouflage clothing, and radios. A police
    helicopter is shot at and damaged, injuring one crew member. (AP)
  - 2025–2026 Iranian protests, Kurdish separatism in Iran
  - Armed groups of Iraqi Kurdish fighters, possibly affiliated with the PKK, have
    allegedly infiltrated the Iranian border. According to reports, they engaged in
    clashes with IRGC led security forces. (Reuters) (Fox News)
  - The price of gold reaches an all-time high of US$4,644.56 per ounce, surpassing
    December's previous peak of $4,383.76. (Royal Mint)
  - 2026 Crans-Montana bar fire
  - The Swiss cantons of Valais and Geneva ban fireworks in indoor venues in the aftermath
    of the fire at a Crans-Montana nightclub, which killed 40 people. (BBC)
  - 2026 Sikhio train disaster
  - At least 32 people are killed and 66 others are injured when a construction crane
    falls onto a passing train in Sikhio district, Nakhon Ratchasima province, Thailand.
    (Sky News) (Reuters) (AP)
  - The Copernicus Climate Change Service reports that 2025 ranks as the third-warmest
    year on record and completes the first three-year period with average global temperatures
    at least 1.5°C above pre-industrial levels. (AFP via ABS-CBN News)
  - Armenia–Azerbaijan relations
  - Nagorno-Karabakh conflict
  - Azerbaijan releases four Armenian prisoners convicted of offenses linked to the
    Nagorno-Karabakh conflict as part of ongoing post-war normalization efforts. (Reuters)
  - Greenland crisis
  - Denmark–France relations
  - French foreign minister Jean-Noël Barrot announces that France will open a consulate
    in Greenland in February, signaling its rejection of attempts by the United States
    to acquire the territory through coercion. (AFP via Le Monde)
  - Travel bans under the Trump administrations
  - The U.S. Trump administration announces that it will suspend the processing of
    immigrant visas for 75 countries. Tourist and business visas will not be affected.
    (AFP via Le Monde)
  - Sexual deepfake and illegal content generation on X
  - The Garda Síochána of Ireland confirms that there are 200 active investigations
    into child sexual abuse material being generated by Grok. (RTÉ)
  - Shootings by U.S. immigration agents in the second Trump administration, Operation
    Metro Surge
  - A person is shot and injured by a United States Immigration and Customs Enforcement
    officer in Minneapolis, Minnesota, United States. (ABC News)
  - Singapore's parliament votes to remove Workers' Party leader Pritam Singh as Leader
    of the Opposition following his conviction for providing false testimony to a
    parliamentary committee in 2021. (Reuters)
