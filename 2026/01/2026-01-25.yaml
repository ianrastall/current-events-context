Date: '2026-01-25'
Source_URI: Portal:Current events/2026 January 25
Intelligence_Payload:
  Uncategorized:
  - Ethnic violence in South Sudan
  - The South Sudanese army orders all civilians, United Nations personnel, and aid
    workers in the Akobo, Nyirol, and Uror counties of the Jonglei State to evacuate
    ahead of an imminent operation against opposition forces. (Reuters)
  - Gaza war
  - Three Palestinians are killed by Israeli forces in two separate incidents in the
    Gaza Strip. (Reuters)
  - Ituri conflict
  - The Allied Democratic Forces kill at least 25 people in several communities in
    Ituri Province, Democratic Republic of the Congo. (AFP via New Vision)
  - 2026 Salamanca shooting
  - Eleven people are killed and 12 others are injured in a mass shooting at a football
    match in Salamanca, Guanajuato, Mexico. (BBC News)
  - January 2026 North American winter storm
  - Over a million people are left without power across the southern United States
    and at least 10,000 flights cancelled due to the winter storm. (AP) (Al Jazeera)
  - Seven occupants are killed and another is injured when a Bombardier Challenger
    650 jet crashes at Bangor International Airport in Maine, United States, during
    severe weather conditions. (Reuters)
  - The death toll from the recent landslide in West Java, Indonesia, increases to
    25 with 72 people still missing and believed to be buried under tonnes of mud,
    rocks and uprooted trees. (Sky News) (AP)
  - A merchant ship rescues one migrant in the Mediterranean Sea after a boat departing
    from Tunisia sinks, while authorities report that about 50 others are missing
    and presumed dead and transfer the survivor to Malta for medical treatment. (Reuters)
  - Thailand launches its first effort to reintroduce endangered Indo-Pacific leopard
    sharks into the wild by releasing captive-bred juveniles near the Phuket province.
    (Reuters)
  - Brazil–Mexico relations, Mexico–Peru relations
  - Brazil assumes responsibility for representing Mexico's diplomatic interests in
    Peru, including safeguarding the Mexican embassy in Lima, after Peru severed relations
    with Mexico following the granting of asylum to former prime minister Betssy Chávez.
    (Reuters)
  - Embargo of Russian oil during the Russo-Ukrainian war, France–Russia relations
  - French authorities place the Indian captain of an oil tanker intercepted by the
    French Navy in the Mediterranean Sea under questioning on suspicion of breaching
    sanctions on Russian oil shipments, while prosecutors open a preliminary inquiry
    after the vessel arrives at anchorage near Marseille and its crew remains aboard.
    (AP)
  - Three gunmen fire a rocket-propelled grenade at an armored SUV and open fire in
    an ambush against a convoy carrying the mayor of Shariff Aguak, Maguindanao del
    Sur, Philippines, injuring two security forces. The three perpetrators are later
    killed in a shootout with security forces. (Sunstar)
  - 2025–26 Myanmar general election
  - Citizens of Myanmar vote in the third and final phase to elect the nation's bicameral
    legislature. (AP) (Al Jazeera)
  - Skyscraper Live (2026)
  - American climber Alex Honnold free-solo climbs the Taipei 101 skyscraper in Taiwan,
    setting the record for the highest free solo climb of an urban structure, after
    completing the climb during a livestreamed event. (AFP via The Sun) (Reuters)
