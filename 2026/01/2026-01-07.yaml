Date: '2026-01-07'
Source_URI: Portal:Current events/2026 January 7
Intelligence_Payload:
  Uncategorized:
  - Operation Southern Spear
  - United States oil blockade during Operation Southern Spear, Russia–United States
    relations
  - The United States boards and seizes the sanctioned Russian-flagged tanker Marinera
    (Bella 1) in the North Atlantic Ocean after it breached the U.S. naval blockade
    around Venezuela. (Reuters) (Sky News)
  - The United States Coast Guard also seizes the Panamanian-flagged tanker M Sophia
    for its alleged "illegal activities" in international waters of the Caribbean
    Sea. (BBC News)
  - Yemeni civil war
  - 2025 Southern Yemen offensive, Saudi-led intervention in the Yemeni civil war
  - The Saudi Arabia-led coalition launches airstrikes on Southern Transitional Council
    (STC) positions in the Dhale Governorate in southern Yemen. (Al Jazeera)
  - Aidarus al-Zoubaidi, head of the STC, is dismissed from the Presidential Leadership
    Council after failing to attend peace negotiations. (Al Arabiya)
  - Five people are killed and 27 others injured after a bus plunged into a 100-foot-deep
    ravine in Chakwal, Pakistan. (The Express Tribune)
  - Climate change policy of the United States, Proposals for the United States to
    withdraw from the United Nations
  - The United States announces its withdrawal from dozens of United Nations bodies,
    including the Intergovernmental Panel on Climate Change, the Framework Convention
    on Climate Change, the UN Population Fund, UN Trade and Development and four of
    the Economic and Social Council's regional commissions. (AFP via France 24)
  - Cross-strait relations
  - China bans Taiwanese interior minister Liu Shyh-fang and education minister Cheng
    Ying-yao, along with their relatives, from entering the country, alleging their
    involvement in the Taiwan independence movement. (Reuters)
  - Political status of the Cook Islands and Niue, Foreign relations of Niue
  - Germany formally recognizes and establishes diplomatic relations with the Pacific
    island of Niue, with the German mission in Wellington, New Zealand, coordinating
    ties. Niue remains in free association with New Zealand. (DPA via Yahoo News)
  - Somalia–United States relations
  - The U.S. State Department suspends all ongoing assistance programs to Somalia,
    alleging that the Somali government destroyed an American-funded World Food Programme
    warehouse and stole 76 tonnes of food aid. (AP)
  - Corruption in Malaysia
  - The Malaysian anti-corruption commission detains a former army chief and four
    other suspects and seizes RM2.4 million (US$591,000) in cash while seeking court
    approval to extend custody in a bribery investigation linked to military procurement
    contracts. (Reuters)
  - Corruption in Nigeria
  - A Nigerian federal court grants bail to former justice minister Abubakar Malami
    and two co-accused in a money laundering and abuse of office case involving 16
    charges, setting the bail at ₦500 million (US$350,000). (Reuters)
  - Killing of Renée Good
  - A United States Immigration and Customs Enforcement agent fatally shoots a 37-year-old
    woman in Minneapolis, Minnesota, prompting protests. (CNN)
  - Governor of Minnesota Tim Walz issues a warning order to prepare the Minnesota
    National Guard in the event of civil unrest. (CBS News)
  - Scam centers in Cambodia, Cambodia–China relations
  - Cambodia extradites three Chinese nationals, including Prince Group founder Chen
    Zhi, to China following a joint investigation into transnational fraud networks
    linked to large online scam operations in Southeast Asia. (Reuters)
