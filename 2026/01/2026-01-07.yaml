  headline: United States seizes Venezuela-linked oil tankers, including a Russian-flagged vessel
  summary: U.S. authorities boarded and seized the tanker Marinera in the North Atlantic and the tanker M Sophia in the Caribbean on January 7 as part of a maritime interdiction campaign tied to Venezuelan oil shipments. Reuters reporting and a U.S. Southern Command release support the seizures and the claim that the U.S. intended to tighten control over oil flows connected to Venezuela.
  details:
    what_happened:
    - U.S. personnel boarded the Russian-flagged Marinera south of Iceland after the vessel had previously refused boarding and switched flags.
    - U.S. authorities also intercepted the tanker M Sophia in the Caribbean in a separate operation tied to Venezuelan oil transport.
    - Vice President JD Vance publicly defended the Marinera seizure, and U.S. officials said Venezuelan oil movements would have to pass through U.S.-approved channels.
    why_it_matters:
    - The seizure of a Russian-flagged vessel raised the risk of a diplomatic or military incident with Moscow in a sensitive North Atlantic corridor.
    - The action signaled a shift from paper sanctions toward physical interdiction of oil shipments at sea.
