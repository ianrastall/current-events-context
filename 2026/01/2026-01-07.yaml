  importance: medium
  headline: Wyoming Supreme Court strikes down the state’s abortion bans
  summary: On January 6, in a ruling still central to the January 7 news cycle, the Wyoming Supreme Court struck down the state’s abortion bans and held that the state constitution protects competent adults’ health care decisions. The court summary and later legal analysis support the 4-1 vote, the reliance on Article 1, Section 38, and the invalidation of both procedural and medication-abortion restrictions.
  details:
    what_happened:
    - The Wyoming Supreme Court ruled 4-1 against the state’s abortion bans in State v. Johnson.
    - The justices held that Article 1, Section 38 of the Wyoming Constitution protects a competent adult’s right to make health care decisions.
    - The ruling invalidated both the broad abortion ban and the separate medication-abortion law.
    why_it_matters:
    - The case created a state-constitutional abortion precedent built on a health-care-freedom provision originally adopted in a very different political context.
    - It restored abortion access in Wyoming unless and until the state changes its constitution or enacts different laws that survive review.
    uncertainty_notes:
    - The underlying decision date is January 6, 2026; the event is included in the January 7 snapshot because it remained a major current development that day.
