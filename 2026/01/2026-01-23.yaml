    crew are ongoing. (AP via ABC News) (RTHK)
  - Scam centers in Cambodia, Cambodia–South Korea relations
  - South Korea repatriates 73 nationals suspected of participating in fraud operations
    in scam centers in Cambodia. (DW)
  - California Governor Gavin Newsom announces that California will join the World
