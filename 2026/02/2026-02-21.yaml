Date: '2026-02-21'
Source_URI: Portal:Current events/2026 February 21
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Attacks in Russia during the Russo-Ukrainian war
  - Ukrainian forces launch long-range FP-5 Flamingo cruise missiles, striking the
    Votkinsk Machine Building Plant in Votkinsk, Udmurtia, Russia. Another missile
    strikes a natural-gas processing plant in Samara Oblast. (The Telegraph) (DW)
  - Eastern front of the Russo-Ukrainian war
  - Russian forces capture the village of Karpivka in Donetsk Oblast, Ukraine, as
    they attempt to advance towards Lyman. (Devdiscourse)
  - Insurgency in Khyber Pakhtunkhwa
  - 2026 Afghanistan–Pakistan conflict, 2026 Pakistani airstrikes in Afghanistan
  - Pakistan conducts intelligence-based strikes on seven locations along the Durand
    Line in the Nangarhar and Paktika provinces of Afghanistan targeting alleged camps
    of the Pakistani Taliban and an affiliate of the Islamic State, resulting in dozens
    of fatalities and injuries. (NDTV) (AFP via The Straits Times)
  - Two soldiers and five militants are killed in a shootout in Bannu, Khyber Pakhtunkhwa,
    Pakistan. (Reuters)
  - Jonglei clashes
  - Up to 22 people are killed, including women and children, and several others are
    injured when Agwelek Forces gunmen open fire on villagers in Ayod County, Jonglei
    State, South Sudan. (CTV News)
  - Syrian conflict
  - The Islamic State claims responsibility for two attacks on security personnel
    in northern and eastern Syria, in which a soldier and a civilian were killed.
    (Reuters)
  - Terrorism in Ukraine
  - A policewoman is killed and at least 15 others are injured, including some seriously,
    in two explosions at a shop in Lviv, Ukraine. The attacks are being treated as
    terrorism. (TRT World)
  - 76th Berlin International Film Festival
  - At this year's Berlin Film Festival, İlker Çatak's Yellow Letters wins the Golden
    Bear. (AFP via The Philippine Star)
  - Tariffs in the second Trump administration
  - United States president Donald Trump raises the global tariff on imports from
    10% to 15% under emergency powers that permit the measure for up to 150 days after
    the Supreme Court ruled yesterday that a 1977 law does not authorize the imposition
    of his earlier country-specific tariffs. The administration states that the new
    rate applies broadly, with exemptions for certain sectors and goods covered by
    existing trade agreements. (AFP via France 24)
  - 2025–26 Australian bushfire season
  - The state emergency service of Victoria, Australia, issues the highest-level emergency
    evacuation warning for areas surrounding the A1 Mine Settlement of Gaffneys Creek,
    as an uncontrolled bushfire burns the settlement. (Reuters)
  - Libyan crisis
  - At least five bodies of refugees wash ashore near Tripoli, Libya. Residents also
    observe a child's body carried back to sea by strong waves, prompting a coast
    guard search operation. (Reuters)
  - Six people are killed, including a five-year-old, and three others are injured
    when a boat capsizes and sinks on the Grande River in Rio de Janeiro, Brazil.
    (Xinhua)
  - The death toll from the truck explosion on a highway in Santiago, Chile, on Thursday,
    rises to six, with 15 others still hospitalized with serious injuries. (Xinhua)
  - Five people are killed in a fire at an apartment building in Blagoveshchensk,
    Amur Oblast, Russia. (Izvestia)
  - Four children and an elderly woman are killed in a house fire in Voskresensk,
    Moscow Oblast, Russia. (Izvestia)
