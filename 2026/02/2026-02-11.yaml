Date: '2026-02-11'
Source_URI: Portal:Current events/2026 February 11
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Attacks in Russia during the Russo-Ukrainian war
  - The Volgograd refinery in Volgograd Oblast, Russia, is ablaze with multiple explosions
    reported after being attacked overnight by Ukrainian drones. Volgograd International
    Airport is closed in response to the attack. (The Kyiv Indpendent) (RBC-Ukraine)
  - Kharkiv strikes
  - Four people are killed and two others are injured in a Russian airstrike on Bohodukhiv,
    Kharkiv Oblast, Ukraine. (AFP via The Hindu)
  - Yemeni civil war
  - Southern Transitional Council conflict
  - A crowd linked to the Southern Transitional Council attempts to storm a local
    government building in Ataq, Yemen. Security forces open fire, killing five people
    and wounding 39 more. (Al Jazeera)
  - Papua conflict
  - Two pilots are killed after assailants shoot at a landing Smart Air flight in
    Boven Digoel Regency, South Papua, Indonesia, carrying 15 people. Another person
    is killed after a convoy is attacked. (Reuters)
  - Syrian conflict, US intervention in Syria
  - The United States Armed Forces withdraws from the al-Tanf military base, handing
    it over to the Syrian Armed Forces. (AFP via Al Arabiya)
  - Connections of Jeffrey Epstein
  - British International Investment suspends all future investments with DP World
    after their CEO Sultan Ahmed bin Sulayem was revealed to have maintained close
    ties with convicted American sex offender Jeffrey Epstein, including an exchange
    in 2009 in which he was revealed as the recipient of an email saying "I loved
    the torture video" from Epstein. (Arab News)
  - Economy of El Salvador
  - The Inter-American Development Bank announces that it will provide US$1.3 billion
    in financing to El Salvador in 2026, targeting housing and tourism. (Reuters)
  - At least 15 people are killed, six others are rescued and six are reported missing
    when a ferry capsizes on the Nile River in Shendi District, River Nile State,
    Sudan. (AP)
  - The United States Federal Aviation Administration briefly issues a halt to all
    flights to and from El Paso International Airport in Texas, due to a balloon that
    was mistaken for a drone. (The Guardian)
  - 2026 Anapa college shooting
  - A security guard is killed and three others are injured in a shooting at a technical
    college in Anapa, Krasnodar Krai, Russia. (AA)
  - 2026 Hat Yai school shooting
  - One person is killed and three others are injured, including the perpetrator,
    in a school shooting in Hat Yai, Songkhla, Thailand. (AFP via Philippine Daily
    Inquirer)
  - The Constitutional Court of Slovakia suspends a criminal code amendment that would
    bar courts from accepting testimony from cooperating witnesses who previously
    provided false statements. (Reuters)
  - 2026 Barbadian general election
  - Barbadians vote to elect the 30 members of the House of Assembly. (The Guardian)
