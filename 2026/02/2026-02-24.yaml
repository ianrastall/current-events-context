Date: '2026-02-24'
Source_URI: Portal:Current events/2026 February 24
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Nuclear risk during the Russo-Ukrainian war
  - The Foreign Intelligence Service of Russia accuses France and the United Kingdom
    of preparing to supply Ukraine with a nuclear weapon, prompting the Russian foreign
    ministry to warn that such a move would lead to a direct conflict between NATO
    states and Russia. (TRT World) (Reuters)
  - Myanmar Civil War
  - Conflict in Rakhine State
  - The Myanmar Air Force airstrikes on suspected rebel targets kill at least 17 in
    the Rakhine state. (Al Jazeera)
  - M23 campaign
  - The governor of South Kivu, Democratic Republic of the Congo, reports the discovery
    of two mass graves containing at least 172 bodies in Uvira, South Kivu, following
    the withdrawal of the March 23 Movement (M23) from the city. Rights groups previously
    reported alleged killings during the M23's presence. (Reuters)
  - Syrian conflict
  - Three Saraya al-Jawad gunmen and a soldier are killed in a shootout in Latakia,
    Syria. (Al Jazeera)
  - Insurgency in Khyber Pakhtunkhwa
  - Five police officers are killed by the Pakistani Taliban during two ambushes in
    Kohat District, Khyber Pakhtunkhwa, Pakistan. (AP)
  - Four police officers are killed and three civilians injured in a suicide bombing
    at a checkpoint in Bhakkar District, Punjab, Pakistan. (Xinhua)
  - Terrorism in Russia
  - Two people are killed, including the suspect, and two others are injured in a
    suicide bombing targeting a police car near the Savyolovsky railway station in
    Moscow, Russia. (AFP via Arab News) (Xinhua)
  - AI boom, 2024–present global memory supply shortage
  - American technology company Meta agrees to purchase millions of artificial intelligence
    chips from AMD, with AMD committing to supply up to six gigawatts of graphics
    processing units and issuing Meta warrants convertible into 160 million shares
    as part of a long-term partnership. (AFP via The Peninsula Qatar)
  - Thirty people are killed, 39 others are reported missing and at least 440 are
    displaced from their homes after heavy rain triggers flash flooding in Juiz de
    Fora, Minas Gerais, Brazil. (AFP via France 24) (Reuters)
  - Four people are killed and several others are injured when an Islamic Republic
    of Iran Army Aviation Bell AH-1 SuperCobra helicopter crashes into a fruit market
    in Dorcheh, Isfahan province, Iran. (Reuters) (JFeed)
  - At least four people are killed and nine others are injured in an explosion at
    a house in Antonio Ante Canton, Imbabura Province, Ecuador. (Xinhua)
  - Four people are killed and another is critically injured from carbon monoxide
    poisoning at an apartment building in Kursk Oblast, Russia. (Xinhua)
  - The death toll from an explosion and fire at a six-story residential building
    in Chattogram, Bangladesh, rises to three. (News.Az)
  - Bolivia–United States relations
  - Bolivia resumes operational cooperation with the United States Drug Enforcement
    Administration (DEA) to combat drug trafficking and organized crime after a 17-year
    suspension. Bolivia says the renewed collaboration will include efforts to address
    money laundering linked to the illicit drug trade. (Reuters)
  - Guinea–Sierra Leone relations
  - Sierra Leone says that Guinea has detained several of its army and police personnel
    and seized their ammunition during construction work on border facilities in Sulima
    Chiefdom, Falaba District. (Reuters)
  - Hungary–Ukraine relations
  - Hungarian prime minister Viktor Orbán announces that Hungary has ended all support
    for Ukraine, including through European Union framework, until Ukraine resumes
    oil transfers via the Druzhba pipeline. (AA)
  - is sworn in as the new Prime Minister of Peru, succeeding Ernesto Álvarez Miranda.
    (Andina)
  - The United Kingdom's Information Commissioner's Office (ICO) fines American social
    media network Reddit £14.5m for "using the data of children under the age of 13
    unlawfully", and potentially exposing them to "inappropriate and harmful content",
    including pornography. (The Guardian)
