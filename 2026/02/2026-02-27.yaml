Date: '2026-02-27'
Source_URI: Portal:Current events/2026 February 27
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - Israeli air and drone strikes kill at least five people and injure several others
    in central and southern Gaza, despite an ongoing United States-brokered truce
    between Israel and Hamas. (AFP via The Hindu)
  - 2026 Afghanistan–Pakistan war
  - Clashes break out on the border between Afghanistan and Pakistan, with Pakistan
    launching airstrikes on several locations in Afghanistan, including the capital
    of Kabul, targeting Taliban government forces directly, in what Pakistani defense
    minister Khawaja Asif describes as "open war". (Al Jazeera)
  - 2026 Bolivian Air Force Lockheed C-130 crash
  - Twenty people are killed and 30 more are injured after the crash of a Bolivian
    Air Force aircraft into a busy avenue in El Alto, Bolivia. (Reuters)
  - Seven people are killed and 19 others are injured in a blast and fire at a café
    in Shchuchinsk, Kazakhstan. (Reuters)
  - Six people are killed and several others are injured after a sleeper bus collides
    with a trailer on National Highway 25 in Rajasthan, India. (News18)
  - Two people are killed and 49 more injured after a tram derails in Milan, Italy,
    and crashes into pedestrians and a building. (BBC News) (Rai News)
  - 2025 Pertamina corruption case
  - A court in Jakarta, Indonesia, sentences nine individuals, including two former
    chief executives of subsidiaries of state-owned energy company Pertamina, to prison
    terms ranging from nine to 15 years in a corruption case involving alleged unlawful
    oil terminal leasing and crude oil imports that prosecutors say caused significant
    state losses. (Reuters)
  - Humanitarian aid during the Gaza war
  - The Supreme Court of Israel issues an interim order suspending a government ban
    on 37 foreign non-governmental organizations operating in Gaza and the West Bank,
    allowing them to continue their operations while the court reviews a petition
    challenging the revocation of their legal status. (AFP via France 24)
  - A Tunisian court sentences former prime minister Ali Laarayedh, who has been detained
    since 2022, to 24 years in prison for facilitating the travel of Tunisian nationals
    to Syrian conflict zones during his premiership, while seven co-defendants, including
    former interior ministry officials, receive prison terms ranging from three to
    24 years. (Reuters)
  - Artificial intelligence in government
  - Anthropic CEO Dario Amodei rejects a U.S. Department of Defense request to loosen
    security safeguards on the Claude large language model for potential use in mass
    surveillance and autonomous weapons systems. (BBC News) (SRF)
  - OpenAI announces that it has reached an agreement with the U.S. Department of
    Defense to deploy its technology on the latter's network. (Politico)
