Date: '2026-02-06'
Source_URI: Portal:Current events/2026 February 6
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - An Israeli airstrike hits a building in Gaza City, Palestine. (Al Arabiya English)
  - Iraqi insurgency
  - The Iraqi Air Force carries out airstrikes on Islamic State hideouts near Hatra
    in northern Nineveh Governorate, Iraq, using F-16 fighter jets, killing four militants
    and destroying logistical facilities. (Shafaqna)
  - An Islamic State suicide bomber detonates explosives at a hideout in Al-Qa'im
    District, Iraq, during an attempted arrest, killing himself and injuring two security
    officers. (AP)
  - Russo-Ukrainian war
  - Attacks in Russia during the Russo-Ukrainian war
  - The deputy head of Russian military intelligence, lieutenant general Vladimir
    Alekseyev, is shot and critically injured in Moscow, Russia. (BBC News)
  - Sudanese civil war
  - Kordofan Campaign
  - One person is killed and three others are injured in drone strikes by the Rapid
    Support Forces on a humanitarian convoy of the World Food Programme in Allah Karim
    near El-Obeid, North Kordofan, Sudan. (AA)
  - 2026 Islamabad mosque bombing
  - Thirty-two people are killed and 170 others are wounded in a suicide bombing at
    a Shia mosque in Islamabad, Pakistan. The Islamic State – Pakistan Province claims
    responsibility. (Al Jazeera)
  - The wreckage of an Embraer EMB 110 Bandeirante operating a cargo flight for Agape
    Flights that went missing yesterday is found in Jérémie, Grand'Anse, Haiti. Both
    pilots were killed. (BAAA-ACRO) (Miami Herald)
  - At least 53 people are killed or missing, including two babies, and two others
    are rescued when a rubber boat capsizes north of Zuwarah, Tripolitania, Libya.
    (Al Jazeera)
  - Three men, including the pilot, are killed when a light aircraft crashes into
    the ocean off Goolwa South, South Australia. (Reuters)
  - Greenland crisis
  - Canada–Denmark relations, Denmark–France relations, Foreign relations of Greenland
  - Canada and France open consulates in Nuuk, Greenland, to reinforce support for
    the Danish Realm against United States president Donald Trump's threats to unilaterally
    annex the territory. (DW)
  - Iran–United States relations, International sanctions against Iran
  - The United States Department of State issues sanctions on 14 oil tankers that
    are used to transport oil to Iran. (The New Arab)
  - 2012 Benghazi attack
  - One of the "key participants" behind the 2012 attack on two United States government
    facilities in Benghazi, Libya, that killed ambassador J. Christopher Stevens and
    three other Americans, is arrested, charged with murder, arson and terrorism and
    brought to the United States. (Al Jazeera)
  - Cannabis in North Macedonia
  - North Macedonian police seize 28 tonnes of cannabis, the largest such haul in
    the country, from former industrial sites in Skopje and Strumica, link the operation
    to a recent five-tonne seizure in Serbia, and state that the material originated
    from licensed medicinal-growing facilities but was diverted for unauthorized use.
    (Reuters)
  - Capital punishment in North Korea, Mass media in North Korea
  - Amnesty International reports that North Koreans are being executed for watching
    the South Korean series Squid Game and listening to K-pop. (Sky News)
  - Deaths and misconduct in Mother and Baby homes in the Republic of Ireland
  - A further 22 sets of infant remains are recovered from the former site of the
    Tuam Mother and Baby home in County Galway, Ireland, bringing the total to 33
    sets of remains. (RTÉ)
  - Ipswich serial murders
  - English serial killer Steven Wright, who killed five women in 2006, receives another
    life sentence after he admitted to murdering a 17-year-old girl in 1999. (Reuters
    via CTV News)
  - Organized crime in France
  - At least six people, including a child, are injured in a grenade attack at a beauty
    salon in Grenoble, Auvergne-Rhône-Alpes, France. (Xinhua News Agency) (Le Parisien
    in French)
  - Schellenberg smuggling incident
  - China overturns the death sentence of Canadian citizen Robert Lloyd Schellenberg
    after he was detained on drug trafficking charges in 2014. (AFP via CTV News)
  - TikTok controversies
  - The European Commission, in a preliminary statement regarding their ongoing investigation
    into TikTok, finds evidence of "addictive design" in its app, which could affect
    children and vulnerable adults, in possible violation of the European Union's
    Digital Services Act. (RTÉ)
  - Bodies and remains are found in an area where search and rescue operations are
    ongoing for 10 missing workers kidnapped from a Canadian gold and silver mine
    in Sinaloa, Mexico, on January 28. Four people are arrested. (CP24)
  - A funeral home owner is sentenced to 40 years in prison for abusing 189 corpses
    and giving their families fake ashes in Penrose, Colorado, United States. (The
    Guardian)
  - Corruption in China
  - Former vice president of the Bank of China Lin Jingzhen is expelled from the Chinese
    Communist Party following an investigation by the Central Commission for Discipline
    Inspection that found "serious violations of discipline and laws". (Reuters)
  - 2026 Winter Olympics
  - The opening ceremony for the Winter Olympics in Milan and Cortina d'Ampezzo, Italy,
    is held. (NBC News)
