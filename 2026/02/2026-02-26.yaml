  - Danish prime minister Mette Frederiksen calls a snap election for March 24 amid
    the Greenland crisis. (AP via NBC News)
  - Corruption in Albania
  - Albanian prime minister Edi Rama dismisses deputy prime minister and infrastructure
    minister Belinda Balluku after anti-corruption prosecutors indicted her on suspicion
