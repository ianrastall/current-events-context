  - Decline of newspapers
  - American newspaper The Washington Post announces that it will lay off about 300
    journalists, roughly one-third of its employees, particularly those who cover
    sports, local news, and world news sections as part of a major restructuring effort.
    (BBC News)
  - 2025–26 Asian winter
  - The death toll from severe weather in Japan, including heavy snowfall, rises to
