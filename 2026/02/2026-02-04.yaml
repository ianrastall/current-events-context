    to be extradited to the U.S. (Reuters)
  - 2024 Elbit Systems burglary
  - The Woolwich Crown Court finds three out of six members of Palestine Action not
    guilty of aggravated robbery relating to a raid on a building owned by Israeli
    weapons manufacturer Elbit Systems in Bristol, England, United Kingdom, while
    charges on criminal damage and violent disorder received partial or no verdicts.
    Five are released on bail. (BBC News)
  - 2025 North Sea ship collision
  - A cargo ship captain is sentenced to six years in prison for gross negligence
