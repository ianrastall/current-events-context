  - Nine city government employees are killed when a dump truck, also carrying crude
    oil, falls into a river in Bayawan, Negros Oriental, Philippines. (ABS-CBN News)
  - Eswatini–United States relations, Deportation in the second Trump administration
  - Eswatini's high court upholds an agreement with the United States that accepts
    third-country deportees in exchange for $5.1 million and at least 15 transfers
