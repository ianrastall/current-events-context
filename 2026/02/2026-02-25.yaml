Date: '2026-02-25'
Source_URI: Portal:Current events/2026 February 25
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Attacks in Russia during the Russo-Ukrainian war
  - Seven people are killed and ten others are injured in a Ukrainian drone strike
    on a fertilizer plant just outside of Dorogobuzh in Smolensk Oblast, Russia. (TRT
    World)
  - 2026 Cuban crisis
  - 2026 Cuban boat incident
  - The Cuban coast guard trades fire with an American marked speedboat registered
    in Florida off of Cuba. According to Cuban government sources, the boat's occupants
    fired on coast guard personnel who approached it for identification, and injured
    a coast guard commander in the shootout, with returning fire killing four and
    injuring six unidentified gunmen. (CBS News)
  - 2025–2026 Iran internal crisis
  - Mojahedin-e-Khalq (MEK) fighters allegedly attack Iranian security forces near
    Supreme Leader Ali Khamenei's headquarters in Tehran. Both MEK and Iranian government
    sources claim dozens of MEK fighters were killed or arrested, though MEK additionally
    asserts that government forces also suffered "heavy losses" during the alleged
    clashes. (Jerusalem Post)
  - Economy of South Korea
  - South Korea's benchmark KOSPI index surpasses 6,000 points for the first time,
    crossing the threshold shortly after the opening of trading. (AFP via BSS)
  - The death toll from the explosion of a truck on a highway in Santiago, Chile,
    on February 19, rises to 12. Nine people remain hospitalized, including five in
    critical condition. (Xinhua)
  - A Turkish Air Force F-16 fighter jet crashes in western Turkey, killing the pilot.
    (NOS)
  - Cuba–United States relations
  - 2026 Cuban crisis
  - The United States announces that it will ease certain restrictions to permit Venezuelan
    oil exports to Cuba's private sector for commercial and humanitarian purposes
    amid an energy shortage. (Reuters)
  - India–Israel relations
  - Israel's Knesset speaker Amir Ohana awards Indian prime minister Narendra Modi
    the newly established Medal of the Knesset to honor him for his "significant contributions
    to the State of Israel and the Jewish people." (Times of Israel)
  - Assassination of Marielle Franco
  - The Supreme Federal Court of Brazil sentences former Rio de Janeiro legislators
    Chiquinho and Domingos Brazão to 76 years and three months in prison each for
    ordering the 2018 killing of city councilor Marielle Franco and her driver, convicting
    them of double aggravated homicide, participation in an armed criminal organization,
    and attempted murder. (AFP via France 24)
