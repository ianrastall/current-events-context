Date: '2026-02-14'
Source_URI: Portal:Current events/2026 February 14
Intelligence_Payload:
  Uncategorized:
  - Communal conflicts in Nigeria
  - Gunmen launch simultaneous attacks on three communities in Niger State, Nigeria,
    killing at least 46 people and kidnapping a number of others. (AFP via The Daily
    Star)
  - Islamist insurgency in Burkina Faso
  - Seven Ghanaian traders are killed when Islamist insurgents attack Titao, Loroum
    Province, Burkina Faso, with the assailants burning the bodies and a vehicle.
    (Reuters)
  - Mexican drug war
  - Gunmen attack a bar in Puebla, Mexico, killing three people and wounding five
    others. Authorities confirm the arrest of four criminals related to the attack.
    (Aristegui Noticias)
  - Ukraine and the International Monetary Fund
  - Ukraine and the International Monetary Fund agree to modify conditions for a proposed
    US$8.2 billion, four-year lending program, easing certain requirements including
    planned tax increases on entrepreneurs above a higher revenue threshold. (Reuters)
  - Ethiopia–Sudan relations
  - Ethiopia revokes Reuters journalists' accreditation in response to an article
    on February 10 that alleged the Ethiopian military was supporting the Rapid Support
    Forces in the Sudanese civil war by running secret training camps for its fighters.
    (Bloomberg)
  - Death and funeral of Alexei Navalny
  - France, Germany, the Netherlands, Sweden, and the United Kingdom assess that Russian
    opposition leader Alexei Navalny died in prison after being poisoned by epibatidine,
    a neurotoxin found in South American poison dart frogs. (NBC News)
  - 2026 Winter Olympics
  - Brazilian ski racer Lucas Pinheiro Braathen wins gold at the men's giant slalom,
    becoming the first Brazilian and first South American athlete to win a medal at
    a Winter Olympics. (AP)
