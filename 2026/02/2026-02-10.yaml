Date: '2026-02-10'
Source_URI: Portal:Current events/2026 February 10
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Five Palestinians are killed by Israeli strikes and gunfire on the Gaza Strip.
    (RTÉ News)
  - Russo-Ukrainian war
  - Russian attacks on civilians in the Russo-Ukrainian war
  - Two people are killed in a Russian airstrike on Sloviansk, Donetsk Oblast, Ukraine.
    (The Kyiv Independent)
  - Boko Haram insurgency, Nigeria–United States relations
  - A United States military official confirms that the U.S. will deploy 200 soldiers
    to Nigeria to help train the Nigerian military and provide logistical support
    against Boko Haram and other Islamic terrorist groups. (AA)
  - Syrian conflict
  - Four people are killed and eight others are wounded after their vehicle strikes
    a land mine in Deir ez-Zor Governorate, Syria. In a separate incident, a tractor
    triggers a land mine in the village of Taanah, Aleppo Governorate, killing one
    person. (MENA via The New Arab)
  - Ireland launches a permanent basic-income programme for the arts that pays 2,000
    creative workers €325 (US$387) per week for three years, following a government
    trial that began in 2022, and which culture minister Patrick O'Donovan describes
    as the first permanent scheme of its kind worldwide. (Reuters)
  - Connections of Jeffrey Epstein
  - Canadian pensions funder La Caisse suspends all future ventures with multinational
    logistics company DP World following the disclosure by the U.S. Department of
    Justice that its CEO Sultan Ahmed bin Sulayem had maintained close ties with convicted
    sex offender Jeffrey Epstein. (The Gazette)
  - United States embargo against Cuba, Cuba–Mexico relations, Canada–Mexico relations,
    United States trade war with Canada and Mexico
  - Mexico confirms it has suspended all shipments of fuel to Cuba to avoid punitive
    tariffs by the United States which is enforcing an oil blockade of the island,
    while vowing to continue shipments of humanitarian aid. (AA)
  - Canadian airlines Air Transat and WestJet suspend all flights to Cuba amid a shortage
    of fuel for commercial aviation, and say efforts are underway to return Canadians
    stranded on the island. (Bloomberg)
  - Six people are killed after a car collided with a truck in Dausa district, India.
    (PTI via The Hindu)
  - A Pemex-owned pipeline explodes in Oaxaca, Mexico, killing three people and injuring
    six others. (Reuters)
  - A Starsky Aviation Fokker 50 aircraft veers off a runway at Aden Adde International
    Airport to a nearby beach in Mogadishu, Somalia, due to a technical error. All
    55 people on board survive. (AP) (BBC News)
  - Azerbaijan–United States relations
  - Azerbaijani president Ilham Aliyev and United States vice president JD Vance sign
    a strategic partnership agreement in Baku covering economic and security cooperation.
    (AFP via France 24)
  - Palau–United States relations
  - The United States Department of State bans Palauan senate president Hokkons Baules
    and his family from entering the country due to alleged corruption. (Reuters)
  - 2026 Tumbler Ridge shooting
  - Nine people are killed, including the suspect, in a school shooting at Tumbler
    Ridge Secondary School in Tumbler Ridge, British Columbia, Canada. (CBC News)
    (The Jerusalem Post)
  - Corruption in Malaysia
  - The Malaysian federal court reinstates the bribery conviction and six-year prison
    sentence of former Federal Land Development Authority chairperson Mohd Isa Abdul
    Samad after overturning a 2024 acquittal on nine corruption counts linked to a
    hotel purchase. (Reuters)
  - Kidnappings in Colombia
  - Colombian senator Aida Quilcué and her two bodyguards are abducted from their
    car by unidentified assailants while traveling in Cauca Department. Security forces
    later locate the empty car, and Quilcué and her escorts are released unharmed
    following government warnings. (AFP via Philippine Daily Inquirer)
  - Recognition of same-sex unions in the Philippines
  - The Philippine supreme court rules that same-sex partners may qualify as co-owners
    of property under the Family Code when both contribute to its acquisition, reversing
    lower-court decisions in a dispute between two former partners in Metro Manila.
    (BBC News)
  - War on drugs
  - Europol says it has dismantled a drug trafficking network that was smuggling cocaine
    into Iceland, resulting in the arrests of 24 people. (Reuters)
  - Corruption in Albania
  - Protesters clash with riot police in Tirana, Albania, amid protests over corruption
    allegations involving deputy prime minister Belinda Balluku. At least sixteen
    people are injured while police say thirteen people have been arrested. (AP)
  - Elections in Zimbabwe
  - Zimbabwean president Emmerson Mnangagwa's cabinet approves draft constitutional
    amendments that extend presidential term limits from five to seven years and replace
    direct presidential elections with parliamentary selection, which would allow
    Mnangagwa to remain in office until 2030 if adopted by parliament. (Reuters)
  - Portuguese home minister Maria Lúcia Amaral resigns after criticism over the government's
    response to Storm Kristin and other storms. (Reuters)
  - Internet censorship in Russia, Censorship of Telegram
  - The Russian Roskomnadzor restricts access to the instant messaging service Telegram,
    citing alleged failures to remove prohibited material and protect personal data,
    and triggers nationwide service disruptions reported by users. (CNN)
