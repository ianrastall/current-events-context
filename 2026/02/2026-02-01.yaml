Date: '2026-02-01'
Source_URI: Portal:Current events/2026 February 1
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Balochistan, India–Pakistan relations
  - 2026 Balochistan attacks
  - Pakistani military and Balochistan Police forces announce the end to a 40-hour
    counterterrorism operation which resulted in the deaths of 145 Baloch Liberation
    Army (BLA) insurgents, 18 civilians, and 18 security personnel. The Pakistani
    government accuses India of backing the BLA. (AP)
  - Russo-Ukrainian war
  - Dnipro strikes
  - A Russian drone strike hits a minibus transporting mineworkers in Dnipro, Ukraine,
    killing at least 15 people and injuring seven others. (BBC News)
  - Boko Haram insurgency
  - Nigeria reports that its forces have killed a senior Boko Haram commander known
    as Abu Khalid, describing him as the group's deputy leader in the Sambisa Forest,
    and ten other fighters during a raid in Borno State. (Reuters)
  - Sudanese civil war
  - A Sudan Airways passenger flight lands at Khartoum International Airport, Sudan's
    main international airport, for the first time since the war began in 2023, resuming
    limited operations after renovations and earlier drone attacks. (AFP via Al-Ahram)
  - 68th Annual Grammy Awards
  - At the 2026 Grammy Awards, Kendrick Lamar wins five awards and surpasses Jay-Z
    as the most awarded hip-hop artist in Grammy history, while Bad Bunny's Debí Tirar
    Más Fotos becomes the first Spanish-language album to win Album of the Year. (AP)
    (The Hollywood Reporter)
  - '"Golden" from the film KPop Demon Hunters becomes the first K-pop song to win
    a Grammy after winning Best Song Written for Visual Media. (AP via ABC News)'
  - Steven Spielberg becomes the 22nd competitive EGOT awardee after winning a Grammy
    for Best Music Film for producing Music by John Williams. (AA)
  - Storm Kristin
  - Portugal launches a €1 billion (US$1.2 billion) loan program to rebuild uninsured
    storm-damaged factories and a €500 million ($593 million) facility for short-term
    liquidity, while the government extends the state of calamity in about 60 municipalities
    amid forecasts of further heavy rain and flooding. (Reuters)
  - Nine people are killed and 21 others are injured, including seven critically,
    after a bus rolls off a road and crashes in Antalya province, Turkey. (AP)
  - Four people are killed and 28 others are injured after a bus carrying wedding
    guests collides with a truck and overturns in Lodhran District, Pakistan. (Dawn)
  - 2026 Costa Rican general election
  - Costa Ricans vote to elect the president and all 57 members of the Legislative
    Assembly. From a field of 20 candidates, Laura Fernández of the Sovereign People's
    Party (PPSO) wins the presidency with 48% of the vote. (BBC News)
  - Epstein Files, Relationship of Peter Mandelson and Jeffrey Epstein
  - Peter Mandelson resigns from Labour Party (UK) after the United States Department
    of Justice releases files showing that convicted child sex offender Jeffrey Epstein
    made £55,000 ($75,000) in payments to Lord Mandelson in three separate transactions
    in 2003 and 2004. (BBC)
  - Tens of thousands of people gather in Prague, Czech Republic, in support of President
    Petr Pavel in his dispute with foreign minister Petr Macinka and his party Motorists
    for Themselves. (AP)
  - 2026 Australian Open
  - In tennis, Spanish player Carlos Alcaraz defeats Serbian player Novak Djokovic
    in the men's singles final 2–6, 6–2, 6–3, 7–5, to win his first Australian Open
    title, becoming the youngest man to complete the career Grand Slam in singles.
    (AFP via ABS-CBN) (ESPN)
  - 2026 European Men's Handball Championship
  - In handball, Denmark defeats Germany 34–27 and becomes European Champions in addition
    to being the reigning World and Olympic Champions. (DW)
