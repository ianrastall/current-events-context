    headline: "U.S. forces strike Kharg Island military sites as Iran retaliates across the Middle East"
    summary: >
      The U.S. military conducted large-scale precision strikes on over 90 Iranian
      military targets on Kharg Island, destroying radar and missile storage sites
      while deliberately sparing crude oil export infrastructure. In retaliation,
      Iran and aligned militias launched a widespread wave of drones and missiles,
      damaging five U.S. aerial refueling planes in Saudi Arabia, destroying a
      drone in Kuwait, striking a U.S. embassy helipad in Baghdad, and targeting
      financial and energy hubs in the UAE and Bahrain.
    details:
      what_happened:
        - "U.S. Central Command struck naval mine and missile storage facilities on Kharg Island, aiming to degrade Iran's ability to threaten the Strait of Hormuz."
        - "An Iranian drone strike penetrated Prince Sultan Air Base in Saudi Arabia, damaging five U.S. aerial refueling tankers."
        - "A drone impacted a helipad inside the U.S. Embassy compound in Baghdad, prompting urgent evacuation warnings for American citizens."
        - "Iranian drones targeted Citibank buildings in Dubai and Manama, while intercepted debris caused fires at the Fujairah oil terminal in the UAE."
      why_it_matters:
        - "The direct exchange of strikes marks a severe escalation in state-on-state conflict, threatening U.S. military assets and regional stability."
        - "While oil infrastructure was spared, the geographic spread of Iran's retaliation underscores its capability to strike U.S. allies and commercial interests across the Gulf."
      uncertainty_notes:
        - "The exact extent of damage to U.S. assets in Saudi Arabia is disputed, with President Trump claiming 'virtually no damage' to four of the five planes."
