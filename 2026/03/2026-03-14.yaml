        - Reuters reported that a strike hit an industrial site in Isfahan, Iran.
        - Fars News Agency described the facility as an HVAC equipment manufacturing plant.
        - Iranian state media said 15 workers were killed in the strike.
        - Iranian authorities publicly blamed the United States and Israel for the attack.
      why_it_matters:
        - The strike indicated that industrial facilities inside Iran remained vulnerable as the regional war expanded.
        - Claims of civilian casualties heightened the diplomatic and escalation risk around the conflict.
      uncertainty_notes:
