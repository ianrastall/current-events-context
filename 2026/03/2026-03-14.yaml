    headline: "Strait of Hormuz blockade triggers global oil shock as traffic collapses"
    summary: >
      The ongoing Iranian blockade of the Strait of Hormuz has severely disrupted
      global energy markets, reducing daily maritime traffic through the chokepoint
      from an average of 138 vessels to just two. The disruption has pushed Brent
      crude oil prices above $100 per barrel, prompting Japan to authorize a historic
      release of 80 million barrels from its strategic reserves to stabilize the market.
    details:
      what_happened:
        - "Iranian naval mines and the threat of missile strikes effectively closed the Strait of Hormuz to commercial shipping."
        - "Global oil prices surged, with Brent crude reaching between $99 and $103 per barrel."
        - "Japan announced the largest release of strategic oil reserves in its history to counter the supply disruption."
        - "U.S. President Donald Trump called for an international naval coalition, including China and the UK, to break the blockade."
      why_it_matters:
        - "The blockade affects nearly 20% of the world's oil supply, threatening to reignite global inflation and strain net-importing economies in Europe and Asia."
