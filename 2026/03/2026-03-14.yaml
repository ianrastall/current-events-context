        - The Kuwaiti military reported three minor injuries at the air base.
        - Associated Press linked the attacks to disruption in Gulf energy markets and higher oil prices.
      why_it_matters:
        - The attacks showed that Gulf energy and military infrastructure remained exposed as the regional war widened.
        - Damage in Fujairah and Kuwait added pressure to already strained oil and shipping markets.
      uncertainty_notes:
        - The listed sources in this record directly support the impacts in the UAE and Kuwait, but they are less explicit on direct attribution for both strikes.
