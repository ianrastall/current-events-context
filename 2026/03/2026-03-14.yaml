      Drone and missile attacks hit infrastructure in the United Arab Emirates and Kuwait on March 14. Associated Press reported a strike on the Fujairah Oil Industry Zone that ignited storage tanks and pushed oil prices higher, while the Kuwaiti Ministry of Defence said an attack on Ahmad al-Jaber Air Base injured three military personnel after some drones were intercepted and others breached the perimeter. The reviewed file attributed the attacks to Iran, but the listed source support in this record is stronger on the impacts than on direct attribution.
    details:
