    summary: >-
      A strike hit an industrial facility in Isfahan, central Iran, on March 14. Reuters supported the occurrence and location of the strike, while Fars News Agency said the site was an HVAC plant and that 15 workers were killed. Iranian authorities blamed the United States and Israel for the attack, but the listed sources in this record do not independently establish responsibility.
    details:
