    summary: >
      Deadly landslides in Ethiopia's southern Gamo Zone emerged as one of the day's major disaster stories, with Reuters reporting on March 12 that at least 70 people had died after days of heavy rain and that additional people were still missing. Associated Press separately reported at least 50 deaths and 125 missing earlier in the day, naming Gacho Baba, Kamba and Bonke districts as the main affected areas. The differing counts reflected a fast-moving rescue and recovery operation in which bodies were still being recovered from mud and debris. The disaster highlighted the severe vulnerability of parts of southern Ethiopia to rain-triggered slope failures and the likelihood that the toll would continue to change.
