    headline: "USTR formally opens new Section 301 probes into overcapacity and forced labor across dozens of trading partners"
    summary: >
      The United States Trade Representative formally initiated major new Section 301 investigations on March 12, opening one case into structural excess capacity and excess production in 16 trading partners and another into forced labor practices involving 60 countries. The move, described in a USTR press release and related Reuters reporting, was part of the administration's effort to rebuild legal and procedural foundations for future trade pressure after a court setback to broader tariff powers. Reuters also reported immediate concern from targeted partners, with the European Union urging Washington to treat it as an ally rather than a source of the overcapacity problem, and Singapore saying it would engage with the U.S. side. No new tariffs were imposed on March 12, but the investigations opened a pathway toward them.
