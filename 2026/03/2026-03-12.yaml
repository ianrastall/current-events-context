Date: '2026-03-12'
Source_URI: Portal:Current events/2026 March 12
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2026 Strait of Hormuz crisis
  - Iranian supreme leader Mojtaba Khamenei issues his first public message since
    his election in which he says that Iran should continue blocking the Strait of
    Hormuz and advises neighboring countries to close American military bases in their
    territory. Khamenei also vows to "avenge the blood of our martyrs". (BBC News)
    (Los Angeles Times)
  - German shipping company Hapag-Lloyd says that projectile ​fragments ​hit the Liberia-flagged
    container vessel Source Blessing ⁠near the ​Strait. (Reuters)
  - Oman orders the evacuation of vessels from the Mina Al Fahal oil port. (Oil Price)
  - 2026 Iranian strikes on Bahrain
  - An Iranian strike hits fuel storage tanks at a facility in Muharraq Governorate,
    Bahrain. (Qatar News Agency)
  - 2026 Iranian strikes on Kuwait
  - Kuwait International Airport is targeted by several drones, causing material damage
    but no injuries. (NDTV)
  - 2026 Iranian strikes on Saudi Arabia
  - The Saudi defense ministry announces the interception of two missiles and the
    destruction of seven drones. (Qatar News Agency)
  - 2026 Iranian strikes on the Kurdistan Region
  - A French soldier is killed and six others are injured in an Iranian drone attack
    on a military base in Erbil, Iraq. (Reuters) (Al Jazeera)
  - Hezbollah–Israel conflict
  - 2026 Lebanon war
  - Eight people are killed and 31 more injured by an Israeli airstrike on the Ramlet
    al-Baida beach in central Beirut, Lebanon. Seven more people are also killed in
    other attacks in the country. (Al Jazeera)
  - Hezbollah launches over 200 rockets and 20 UAVs at northern Israel, injuring two
    people. (The Times of Israel)
  - At least 20 people are killed in an airstrike targeting a Popular Mobilization
    Forces building in Akashat, Iraq. (Sky News)
  - The Italian military base in Erbil, Kurdistan Region, Iraq, is struck by a missile,
    with no casualties of injuries reported. (Asharq Al-Awsat)
  - Chilean architect Smiljan Radić receives the 2026 Pritzker Architecture Prize,
    recognizing his contributions to contemporary architecture. (AFP via France 24)
  - Economic impact of the 2026 Iran war, Embargo of Russian oil during the Russo-Ukrainian
    war
  - The United States treasury department issues a temporary license permitting the
    delivery and sale of Russian oil and petroleum products already loaded onto vessels
    before March 12, easing sanctions on such shipments until April 11 amid rising
    global energy prices. (AFP via Philippine Daily Inquirer)
  - German economic crisis
  - The Lufthansa pilot union announces a 48-hour strike for all flights departing
    German airports until Saturday over ongoing disputes about pensions, causing major
    delays. (The Independent)
  - At least 102 people are killed and one person is rescued after a series of landslides
    in the Gamo Zone of Ethiopia. (Ethiopia Observer) (AP)
  - Eight people are killed after an artisanal mine collapses in Ouham-Pendé, Central
    African Republic. (AP)
  - At least four crew members are killed when a United States Air Force Boeing KC-135
    Stratotanker carrying six crew members crashes after an incident involving another
    aircraft in western Iraq. (BNO News) (BBC News)
  - Gaza genocide
  - South Africa's genocide case against Israel
  - Iceland and the Netherlands announce they will both intervene on the side of South
    Africa in the International Court of Justice's genocide case against Israel. (The
    Express Tribune)
  - Arctic policy of Canada, NATO Arctic Sentry, Polar Icebreaker Project
  - Canadian prime minister Mark Carney announces nearly CAN$35 billion (US$25.7 ‌billion)
    in funding to strengthen Canada's Arctic infrastructure, including upgrades to
    military facilities and the construction of new icebreakers to expand the country's
    operational capacity in the region. (AFP via France 24)
  - Brazil–United States relations, Arrest of Jair Bolsonaro
  - Brazilian Supreme Federal Court justice Alexandre de Moraes denies a request by
    imprisoned former president Jair Bolsonaro to receive a visit from American diplomat
    Darren Beattie, ruling that the meeting falls outside the diplomatic purposes
    stated in Beattie's visa authorization. (Reuters)
  - Cuba–Holy See relations
  - Cuba announces plans to release 51 prisoners following discussions with the Holy
    See, stating that the detainees have served most of their sentences and demonstrated
    good conduct. (AFP via Indo Premier)
  - Hungary–Ukraine relations
  - Hungary returns two seized armored cars to Ukraine but retains approximately US$82
    million in cash and gold as authorities investigate suspected money laundering.
    (Reuters)
  - Iran–Thailand relations, 2026 Strait of Hormuz crisis
  - Thailand summons Iran's ambassador, demanding an apology and an explanation for
    the attack on the bulk carrier in the waters of the Strait the previous day. (BERNAMA)
  - 2026 Old Dominion University shooting
  - Two people are killed, including the perpetrator, and two other people are critically
    injured in a school shooting at Old Dominion University in Norfolk, Virginia,
    United States. (CNN) (WAVY-TV)
  - Crocus City Hall attack
  - A Russian military court sentences 19 people for their involvement in the terrorist
    attack at the Crocus City Hall in Krasnogorsk, Moscow Oblast, in 2024. Fifteen
    of those are sentenced to life in prison while the other four are given between
    19 and 22 years in prison. (BBC News)
  - Human rights in Indonesia
  - Two unidentified men assault and injure the deputy director of KontraS, an Indonesian
    human rights organization, in an acid attack in central Jakarta. (AFP via CNA)
    (Tempo English)
  - Temple Israel synagogue attack
  - The perpetrator is killed and 31 others are injured in a shooting and vehicle-ramming
    attack at the Temple Israel synagogue in West Bloomfield Township, Michigan, United
    States. (CNN)
  - Sanctions during the Venezuelan crisis
  - The International Criminal Court at The Hague dismisses an investigation into
    whether U.S. sanctions against Venezuelan officials qualify as crimes against
    humanity. (AP)
  - A rabbi is seriously injured in a stabbing in Ramat Gan, Israel, as local police
    suspect a terrorist motive. (The Times of Israel)
  - The Israeli military drops charges against five soldiers accused of raping a Palestinian
    prisoner at the Sde Teiman detention camp. (AP)
  - 2026 Nepalese general election
  - The Nepalese election commission releases the official results of the recent election,
    with Balen Shah's Rastriya Swatantra Party winning 182 seats in the 275-member
    House of Representatives. The result gives the party a majority in the House and
    places it two seats short of a supermajority. (AFP via The Hindu)
  - Polish president Karol Nawrocki announces that he will veto legislation enabling
    Poland to access €43.7 billion (US$50.3 billion) in European Union loans under
    the Security Action for Europe program to fund military spending. (Reuters)
  - 2025–26 NBA season
  - In basketball, Oklahoma City Thunder player Shai Gilgeous-Alexander breaks the
    NBA record set by Wilt Chamberlain for most consecutive 20-point games with 127
    games. (ESPN)
