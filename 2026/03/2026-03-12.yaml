        - "USTR announced a Section 301 investigation into structural excess capacity and production involving 16 economies."
        - "A separate Section 301 investigation was opened into forced labor practices involving 60 countries."
        - "Reuters reported that the probes were part of an effort to rebuild trade leverage after a judicial decision undercut earlier tariff authorities."
        - "The European Union publicly objected to being grouped as a source of overcapacity rather than treated as a partner."
        - "Singapore said it would engage with USTR following inclusion in the overcapacity case."
      why_it_matters:
        - "Section 301 probes are a recognized legal route for the United States to justify future tariffs or other trade remedies."
        - "The breadth of the actions risked widening trade friction not only with China but also with allies and major supply-chain partners."
