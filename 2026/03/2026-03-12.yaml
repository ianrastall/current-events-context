        - "Local officials said at least one person was pulled alive from the mud during rescue operations."
        - "Regional authorities urged residents in vulnerable highland and flood-prone areas to move to safer ground."
      why_it_matters:
        - "The death toll made the landslides one of the most serious natural-disaster events of the day globally."
        - "Continuing rain raised the risk of additional slope failures and complicated rescue efforts."
