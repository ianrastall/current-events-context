    headline: "ICC prosecutor opens Belarus investigation over alleged deportation and persecution of political opponents"
    summary: >
      The International Criminal Court's prosecutor opened an investigation on March 12 into alleged crimes against humanity linked to Belarus, focusing on the deportation and persecution of political opponents who fled into neighboring Lithuania. Reuters reported that the move followed a Lithuanian referral and that prosecutors said there was a reasonable basis to believe a widespread or systematic attack against a civilian population had occurred. The ICC prosecutor's office simultaneously issued its own statement confirming the end of its preliminary examination and the start of a full investigation. The step was legally notable because Belarus is not a party to the Rome Statute, but the prosecution argued the Court had jurisdiction because part of the alleged criminal conduct took effect on Lithuanian territory, which is an ICC member state.
    details:
      what_happened:
        - "The ICC Office of the Prosecutor concluded its preliminary examination concerning Lithuania and Belarus and opened a formal investigation."
        - "The case concerns alleged crimes against humanity involving the deportation and persecution of Belarusian opponents."
        - "Reuters reported that prosecutors said there was a reasonable basis to believe the conduct formed part of a widespread or systematic attack on civilians."
        - "Jurisdiction was linked to the fact that alleged victims crossed into Lithuania, a state party to the ICC."
      why_it_matters:
        - "The investigation represented a rare international criminal step directed at Belarus despite its non-member status."
        - "It advanced the use of cross-border effects to establish ICC jurisdiction over alleged crimes committed by non-state parties."
      uncertainty_notes:
        - "Opening an investigation did not mean charges had yet been filed against any specific individual."
