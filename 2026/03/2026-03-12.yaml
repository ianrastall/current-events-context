    headline: "Drone strike hits Adikong market on the Sudan-Chad border, killing civilians"
    summary: >
      A drone strike hit the market area of Adikong in Sudan's West Darfur region near the Chadian border on March 12, killing civilians and injuring many more. Associated Press reported that the strike hit fuel storage at the busy border market, causing secondary explosions and sending casualties across the frontier for treatment. Médecins Sans Frontières said at least four civilians were killed and more than twenty injured, and it blamed the Sudanese army for the attack. The U.N. human rights office separately warned on the same day about a broader surge in deadly drone attacks on civilians in Sudan, placing the Adikong strike in a larger pattern of escalating air-delivered violence.
    details:
      what_happened:
        - "A drone strike struck Adikong market in West Darfur close to the Chad border."
        - "The blast ignited fuel reserves, producing fires and secondary explosions in a civilian commercial area."
        - "MSF said at least four civilians were killed and more than twenty wounded, including women and children treated across the border in Adré."
        - "MSF attributed the strike to the Sudanese army; the military had not publicly commented in the cited reports."
      why_it_matters:
        - "The attack showed how drone warfare in Sudan was increasingly reaching crowded civilian spaces and cross-border humanitarian corridors."
        - "Markets near Chad are lifelines for trade, aid and civilian survival in Darfur, so damage there has outsized humanitarian effects."
      uncertainty_notes:
        - "Casualty figures were preliminary on March 12 and could rise as additional victims were identified."
        - "Responsibility was publicly alleged by MSF in the cited reporting rather than established by an independent adjudication."
