    headline: "Qatar LNG shutdown and force majeure declarations deepen the global gas and helium shock"
    summary: >
      The energy disruption tied to the Middle East war deepened on March 12 as Reuters reported that the shutdown of Qatar's giant LNG complex and ensuing force majeure declarations were rippling through gas and industrial supply chains. QatarEnergy had halted production at its 77 million-tonne-per-year LNG facility and declared force majeure on shipments, while buyers including Shell passed those declarations downstream. Reuters also reported that helium prices had roughly doubled because Qatar accounts for about one-third of world supply. The same day's reporting from TotalEnergies confirmed related production outages in the United Arab Emirates and lower output elsewhere in the region, reinforcing the sense of a wider Gulf energy shock rather than a narrow shipping disruption.
    details:
      what_happened:
        - "QatarEnergy's earlier halt at its 77 mtpa LNG facility continued to reverberate through the market on March 12."
        - "Shell declared force majeure on some Qatari LNG cargoes it had agreed to sell to customers, citing the upstream disruption."
        - "Reuters reported that helium prices had surged because Qatar is a critical supplier to the global market."
        - "TotalEnergies said its overall output was down and confirmed outages affecting gas production in the United Arab Emirates."
      why_it_matters:
        - "Qatar is one of the world's most important flexible LNG suppliers, so disruption there rapidly affects both Europe and Asia."
        - "The helium impact broadened the story beyond fuel markets into medical, industrial and scientific supply chains."
      uncertainty_notes:
        - "The duration of the outages and the exact timing of normalized cargo flows remained unclear."
