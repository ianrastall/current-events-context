    summary: >
      Iran-aligned armed groups in Lebanon and Iraq stepped up attacks on March 12, underscoring the regionalization of the war around Iran. Reuters reported that Hezbollah and Iran's Revolutionary Guards launched a large rocket barrage into northern Israel while Iraqi armed groups accelerated strikes linked to U.S. military positions and maritime traffic. The moves came even though many of Tehran's allied groups had already been weakened by months of conflict and earlier Israeli attacks. Israeli Prime Minister Benjamin Netanyahu also publicly threatened Iran's new supreme leader, illustrating how the conflict was broadening across both rhetoric and military activity.
