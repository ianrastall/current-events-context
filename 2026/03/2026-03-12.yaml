    headline: "U.S., Russia and China clash at the U.N. Security Council over Iran's nuclear file"
    summary: >
      The United States, Russia and China openly clashed at the United Nations on March 12 as the Security Council debated Iran's nuclear program in the middle of the expanding regional war. Reuters and U.N. meeting coverage showed that Russia and China challenged the legality of reviving U.N. sanctions on Iran and sought to block the discussion, but were outvoted on the agenda. U.S., British and French diplomats argued that Moscow and Beijing had been obstructing work in the Iran sanctions committee, while Russia and China accused Washington of using the Council to legitimize military pressure. The confrontation underlined how the Iran crisis was spilling simultaneously into diplomacy, sanctions politics and great-power rivalry.
    details:
      what_happened:
        - "The Security Council met on non-proliferation and the Iran sanctions file as fighting in the Middle East continued."
        - "Russia and China challenged the legality of the meeting and were outvoted on the agenda in a procedural vote."
        - "The United States, Britain and France accused Moscow and Beijing of blocking meaningful work in the committee established under U.N. Resolution 1737 on Iran."
        - "Russian and Chinese representatives argued that Washington was trying to weaponize the Council after having withdrawn from the 2015 nuclear deal framework."
      why_it_matters:
        - "The dispute showed that there was no unified major-power approach to Iran even as the regional conflict was escalating."
        - "Any future attempt to restore or tighten multilateral sanctions was likely to be contested procedurally as well as politically."
      uncertainty_notes:
        - "The meeting reflected diplomatic positions rather than a negotiated outcome, and no new Security Council resolution was adopted on March 12."
