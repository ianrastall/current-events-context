    headline: "China's National People's Congress closes after approving the 2026 budget, planning outline and new laws"
    summary: >
      China's annual parliamentary session ended on March 12 with the National People's Congress approving the government's work report, the 2026 budget, the outline of the 15th Five-Year Plan, and several new legal texts, according to Xinhua. Reuters also reported that China's defense budget for 2026 would rise 6.9% to 1.94 trillion yuan, continuing a steady buildup in military spending. On the same day, Reuters highlighted Taiwanese concern over a new ethnic unity law passed by parliament, because some of its language appeared to extend beyond China's existing borders and was seen in Taipei as potentially relevant to Taiwan. Together, the votes closed the annual session with a mix of economic planning, state-building legislation and clear signals of continued security prioritization.
    details:
      what_happened:
        - "The 14th National People's Congress concluded its annual session in Beijing on March 12."
        - "Delegates approved the government work report, the 2026 national economic and social development plan, and the central and local budgets."
        - "Xinhua reported passage of the outline for the 15th Five-Year Plan as well as the Ecological and Environmental Code and the Ethnic Unity and Progress Promotion Law."
        - "Reuters reported that the 2026 defense budget was set at 1.94 trillion yuan, up 6.9% from the prior year."
        - "Taiwanese officials warned that the new ethnic unity law's wording could have implications beyond the mainland."
      why_it_matters:
        - "The closing votes formally locked in China's economic and fiscal priorities for 2026, including another sizable defense increase."
        - "The ethnic unity law drew attention because its wording fed cross-strait sensitivities at a time of already elevated tension."
      uncertainty_notes:
        - "Interpretations of the ethnic unity law's possible application outside mainland China were politically contested."
