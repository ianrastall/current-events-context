      what_happened:
        - "Reuters reported simultaneous or near-simultaneous attacks involving Hezbollah and Iran's Revolutionary Guards against northern Israel."
        - "Iraqi armed groups aligned with Iran stepped up attacks connected to U.S. interests and regional shipping routes."
        - "The attacks occurred despite assessments that several Iran-backed groups had been degraded by earlier fighting and leadership losses."
        - "Israeli leaders publicly paired military operations with warnings directed at Iran's top leadership."
