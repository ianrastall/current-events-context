Date: '2026-03-26'
Source_URI: Portal:Current events/2026 March 26
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2025–2026 Iran–United States negotiations
  - Pakistan in the 2026 Iran war
  - Middle East special envoy Steve Witkoff confirms that the United States has shared
    a 15-point peace plan to Iran through the Pakistani government. (The Pakistan
    Connect)
  - Pakistani Foreign Minister Ishaq Dar confirms that indirect negotiations between
    the United States and Iran are taking place. (The Hindu)
  - 2026 Iranian strikes on Israel
  - Nine people are injured in Israel after seven salvos of ballistic missiles by
    Iran. (The Times of Israel)
  - 2026 Iranian strikes on the United Arab Emirates
  - Two people are killed and three others are injured by falling debris from an intercepted
    ballistic missile in Abu Dhabi, United Arab Emirates. (Hindustan Times)
  - Reactions to the 2026 Iran war, Israel–Uganda relations
  - Ugandan Chief of Defence Forces Muhoozi Kainerugaba says the country is ready
    to join the war "on the side of Israel" and says the Uganda People's Defence Force
    will enter the war soon if Iranian attacks on Israel don't end soon. (The Jerusalem
    Post)
  - Israel claims to have assassinated Alireza Tangsiri, the commander of Iran's Islamic
    Revolutionary Guard Corps Navy. (Al Jazeera)
  - Hezbollah–Israel conflict
  - 2026 Lebanon war
  - One person is killed and 11 are injured by Hezbollah rocket fire in Nahariya,
    Israel. (Jerusalem Post)
  - Two Israeli soldiers are killed in action in southern Lebanon. (Reuters)
  - Economic impact of the 2026 Iran war
  - Norway's Storting passes a bill temporarily cutting petrol and diesel taxes in
    response to surging energy costs amid the Strait of Hormuz crisis. (Reuters)
  - Mauritius and South Sudan announce measures restricting electricity consumption
    due to the international energy crisis with Juba's main electricity distributor,
    Juba Electric Distribution Company, saying the capital will start experiencing
    daily power cuts on a "rotational basis" from today. (BBC News)
  - At least 13 people are killed and 28 others are injured when a private bus collides
    head-on with a truck in Prakasam district, Andhra Pradesh, India. (The Times of
    India)
  - At least nine people are killed and around 30 others are injured when a bus collides
    with a truck and overturns in Chhindwara district, Madhya Pradesh, India. (Hindustan
    Times)
  - Two people are killed, including a child, and at least 90 families are affected
    in flooding in Kandahar, Afghanistan. (ATN)
  - Russia–United Kingdom relations
  - Russia says the United Kingdom's decision to board and detain Russian shadow fleet
    vessels is hostile and vows a "political, legal and asymmetric" response against
    the UK to protect Russian interests. (Reuters)
  - British Chief of the General Staff Roland Walker warns that the UK is now on an
    "inevitable collision course" with Russia and urges the government to prepare.
    (MSN)
  - Australia–Iran relations, Reactions to the 2026 Iran war
  - Australia announces a six-month ban on short-term visa applications from Iranian
    passport holders for tourism and work, citing concerns that some visitors may
    not depart Australia once their visas expire due to the Iran war. The new policy
    includes limited exemptions. (AFP via The Times of Israel)
  - Belarus–North Korea relations
  - Belarus and North Korea sign a "friendship and cooperation" treaty after North
    Korean supreme leader Kim Jong Un welcomed Belarusian president Alexander Lukashenko
    to Pyongyang. (AFP via The Guardian)
  - Tajikistan–Uzbekistan relations
  - During a state visit to Uzbekistan, Tajikistan President Emomali Rahmon and Uzbekistan
    President Shavkat Mirziyoyev officially inaugurates the Tajikistan embassy in
    Tashkent. (Kun.uz)
  - Two people are killed, including the perpetrator, in a stabbing attack in a Pokémon
    Center at the Sunshine City building in Tokyo, Japan. (CTV News)
  - 2026 Faroese general election
  - Two days after the Danish election, Faroe Islanders vote to elect 33 members of
    the Løgting. (Dagur.fo in Faroese) (Euractiv)
  - 2026 FIFA World Cup
  - Iran's Ministry of Sport and Youth bans the Iran national football team from travelling
    to "hostile countries" placing the Iranian team's participation in this year's
    FIFA World Cup tournament in doubt, which is being held in the United States,
    Canada and Mexico. (Reuters)
