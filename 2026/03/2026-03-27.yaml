  - 2026 Nepalese general election
  - Following his Rastriya Swatantra Party's landslide victory in the general election,
    Balendra Shah is sworn as Prime Minister of Nepal, succeeding interim prime minister
    Sushila Karki. (Reuters)
  - Opposition to Vladimir Putin in Russia
  - Russia designates filmmaker and teacher Pavel Talankin, the co-director and subject
    of the 2025 documentary film Mr Nobody Against Putin, as a foreign agent after
    authorities accuse him of spreading disinformation about the government and opposing
    the war in Ukraine. (AFP via RFI)
  - Protests against the 2026 Iran war
  - Lawmakers from the Jammu & Kashmir National Conference protest outside the legislative
    assembly of Jammu and Kashmir, India, in solidarity with Iran and against the
    assassination of former supreme leader Ali Khamenei amidst the Iran war. Additionally,
