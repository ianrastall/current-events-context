Date: '2026-03-28'
Source_URI: Portal:Current events/2026 March 28
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis (2023–present)
  - 2026 Iran war
  - 2026 Iranian strikes on the United Arab Emirates
  - Emirates Global Aluminium reports that one of its facilities in Abu Dhabi sustained
    significant damage and several injuries during missile and drone attacks attributed
    to Iran. (AFP via The Times of Israel)
  - Iraq in the 2026 Iran war
  - An airstrike in Kirkuk, Iraq, hits a base of the Popular Mobilization Forces,
    killing one member and injuring four others. (AFP via LBCI)
  - Red Sea crisis
  - A ballistic missile is launched by the Houthis from Yemen towards Israel, representing
    the group's entrance in the war. The Israel Defense Forces says that the missile
    was successfully intercepted and no injuries were reported. (Reuters) (The Times
    of Israel)
  - 2026 Lebanon war
  - Five paramedics are killed in an Israeli airstrike in Zawtar al-Gharbiyah, Lebanon.
    (Al Jazeera)
  - Three journalists are killed and several others injured in an Israeli airstrike
    in Jezzine District, South Governorate, Lebanon. A responding paramedic is also
    killed by another strike. (KGO-TV)
  - Terrorism in France
  - A man is detained and another is at large after trying to ignite an improvised
    explosive device near a Bank of America building in Paris, France. Anti-terrorism
    prosecutors are investigating. (Sky News)
  - Twenty-two bodies are recovered from a vessel found adrift off the coast of Crete,
    Greece, according to the Greek coast guard. Twenty-six people are rescued by Frontex.
    Several survivors said some people were also thrown overboard into the Mediterranean
    Sea on the orders of a human trafficker during the journey. (Reuters)
  - One person is killed and 25 others are injured, including seven critically, in
    a fire at a high-rise building in Xiaodian, Taiyuan, Shanxi, China. (Xinhua)
  - Qatar–Ukraine relations
  - Qatar and Ukraine sign a defense pact that includes cooperation on countering
    missile and drone threats. (AFP via The News)
  - Protests against the 2026 Iran war
  - Around 18 people are arrested during anti-war protests held across Israel against
    the Iran war, including 13 in Tel Aviv and 5 in Haifa. Protests are also held
    in Jerusalem and Beersheba. (Haaretz) (Times of Israel)
  - Five police officers are killed and three others are injured in an ambush by unidentified
    gunmen in Shariff Aguak, Maguindanao del Sur, Philippines. (Philippine Daily Inquirer)
  - Nepal's former prime minister K. P. Sharma Oli is arrested over his alleged involvement
    in the crackdown on the 2025 protests. (BBC News)
  - Constitutional crisis in Somalia
  - The South West House of Representatives re-elects incumbent President Abdiaziz
    Laftagareen for the second time amid tensions with the Somali federal government
    that resulted in armed forces being deployed to Lower Shabelle, Bay and Bakool
    region of Somalia. (Somali Guardian) (Hiiraan Online)
  - Protests against Donald Trump
  - 2026 No Kings protests
  - The third No Kings protests are held in all 50 U.S. states against the policies
    of U.S. President Donald Trump and his administration including the Iran war,
    ICE operations, and the January shootings of Renée Good and Alex Pretti. (CNN)
    (Reuters)
  - In throughbred racing, American racehorse Magnitude wins the 30th Dubai World
    Cup in Dubai, United Arab Emirates, amidst the Iran war. (The National News) (ESPN)
