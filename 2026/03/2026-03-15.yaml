    importance: 4
    headline: "A sprawling U.S. storm system brings blizzard conditions, Hawaii flooding, wildfire pressure and major travel disruptions"
    summary: >
      A broad storm chain battered much of the United States on March 15, 2026, bringing
      heavy snow to the Upper Midwest, severe flooding in Hawaii, ongoing wildfire strain
      in Nebraska, widespread power outages, and a growing threat of thunderstorms and
      tornadoes farther east. AP reported more than 600 cancellations at Minneapolis-Saint
      Paul airport, more than 850 cancellations at Chicago's O'Hare and Midway, and more
      than 210,000 utility customers without power across six Great Lakes states.
    details:
      what_happened:
        - "Heavy snow made roads hazardous or impassable across parts of Minnesota, Wisconsin, and Michigan."
