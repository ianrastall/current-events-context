        - "Kazakh voters cast ballots in a referendum on a new constitution."
        - "Reuters reported two exit polls showing about 87% support and turnout of about 73%."
        - "The proposed constitutional order would streamline parliament and recreate the office of vice president."
        - "AP reported the reforms would also expand the president's appointment powers and create additional institutional tools under presidential influence."
      why_it_matters:
        - "The referendum could reshape Kazakhstan's political system and succession dynamics."
        - "Critics and some analysts argued it may allow Tokayev to consolidate or extend power beyond the spirit of existing term limits."
