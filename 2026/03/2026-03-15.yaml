      Kazakhstan held a referendum on March 15, 2026, and exit polls indicated strong
      support for a new constitution. Reuters reported roughly 87% approval with turnout
      around 73%, while AP said the constitutional package would strengthen President
      Kassym-Jomart Tokayev's grip on power by reshaping parliament, restoring the vice
      presidency, and allowing the president to appoint key officials.
