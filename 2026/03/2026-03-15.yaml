    summary: >
      Vietnam held nationwide elections for its new National Assembly on March 15, 2026.
      Reuters and AP reported that roughly 73.5 million to 79 million eligible voters
      were choosing 500 lawmakers from a field of 864 candidates, the overwhelming
      majority of whom were fielded or pre-approved by the ruling Communist Party.
    details:
      what_happened:
        - "Vietnamese voters cast ballots for the 500-seat National Assembly and local councils."
        - "Reuters reported that nearly 93% of parliamentary candidates were fielded by the Communist Party, with independent candidates making up a small minority."
        - "AP reported that nearly 79 million eligible voters were choosing from 864 vetted candidates."
        - "The election came shortly after the party's January congress reconfirmed To Lam as the country's top political leader."
      why_it_matters:
        - "The election set the composition of the legislature that will ratify key appointments and support the government's next policy agenda."
        - "It offered a closely watched indicator of continuity in Vietnam's one-party political system."
        - "The vote took place as Vietnam sought to maintain rapid growth and attract manufacturing investment."
      uncertainty_notes:
