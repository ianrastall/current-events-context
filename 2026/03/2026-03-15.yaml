    headline: "IEA details rollout of more than 400 million barrels from emergency reserves amid Iran-war supply shock"
    summary: >
      The International Energy Agency said on March 15, 2026, that more than 400 million
      barrels from emergency oil reserves would begin flowing soon in response to the
      sharp energy shock linked to the Iran war and disruption in the Strait of Hormuz.
      Reuters reported that this was the sixth coordinated stockpile release in IEA
      history and by far the largest described in the 2026 crisis.
    details:
      what_happened:
        - "The IEA announced that oil from emergency reserves in Asia and Oceania would be available immediately, with Europe and the Americas following later in March."
        - "Reuters reported that governments committed 271.7 million barrels from public stocks, 116.6 million from obligated industry stocks, and 23.6 million from other sources."
        - "The release was designed to counter price spikes and physical supply disruptions linked to the effective choking of Hormuz traffic."
      why_it_matters:
        - "Around one-fifth of global oil and gas supply normally moves through the Strait of Hormuz."
        - "The reserve release was a major international intervention to stabilize fuel markets, shipping expectations, and inflation pressures."
        - "The action highlighted how the Iran conflict had become a first-order global economic risk rather than only a regional military crisis."
      uncertainty_notes:
        - "The timing and pace of actual physical deliveries varied by region."
        - "The longer-term market effect depended on whether Hormuz disruptions persisted."
