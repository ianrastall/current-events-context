    headline: "Pakistan strikes targets in Afghanistan's Kandahar as fighting with Kabul intensifies"
    summary: >
      Pakistan said it carried out overnight strikes on installations and militant
      infrastructure in Afghanistan's Kandahar region on March 15, 2026, as the worst
      Pakistan-Afghanistan fighting in years continued. Afghan officials said the two
      sites hit were an empty guard post and a drug rehabilitation center that sustained
      slight damage, and they said there were no casualties from the Kandahar strikes.
    details:
      what_happened:
        - "Pakistan's information minister said the military struck Taliban installations and 'terrorist hideouts' in Kandahar overnight."
        - "AP reported Kabul said two locations were hit: a daytime security-guard site that was empty at night and a drug rehabilitation center."
        - "Afghan authorities said the Kandahar strikes caused slight damage and no casualties."
        - "Afghanistan said it retaliated against Pakistani military targets, while Pakistan rejected those claims."
        - "AP also reported that a mortar fired from Afghanistan hit a home in Pakistan's Bajaur district on the same day, killing four family members and injuring two others."
      why_it_matters:
        - "The episode underscored a sharp escalation in Pakistan-Afghanistan hostilities after the collapse of an earlier ceasefire."
        - "It raised the risk of a broader regional security crisis in South Asia."
        - "The conflict centers on cross-border militancy, sovereignty, and mutual accusations of harboring armed groups."
      uncertainty_notes:
        - "The two governments sharply disputed what was hit and the extent of resulting damage."
        - "Casualty reporting for the wider cross-border fighting remained contested."
