    headline: "China sets 2026 growth target and reviews draft national development planning law"
    summary: >
      Xinhua and China Daily reported that China set a 2026 GDP growth target
      of 4.5 to 5 percent in the government work report as the National
      People's Congress opened its annual session. Xinhua also reported that
      lawmakers began deliberating a draft law on national development
      planning, intended to codify procedures for formulating and implementing
      five-year plans. Together, the steps linked the year's macro targets to
      the opening phase of the 15th Five-Year Plan.
    details:
      what_happened:
        - "Xinhua and China Daily reported that the government work report set a 2026 GDP growth target of 4.5 to 5 percent."
        - "Xinhua reported that the National People's Congress began deliberating a draft law on national development planning on March 5."
        - "The cited reporting tied both moves to the start of the 2026 to 2030 planning cycle and to wider efforts to steer high-quality development."
      why_it_matters:
        - "China's annual growth target shapes expectations for demand, trade and investment flows."
        - "Putting the planning framework into law would formalize how Beijing prepares and implements long-term economic blueprints."
      uncertainty_notes: []
