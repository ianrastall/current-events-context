    importance: 4
    headline: "EU Council agrees position on law to protect vulnerable adults in cross-border cases"
    summary: >
      On March 6, 2026, the Council of the European Union reached a common position on a landmark regulation designed to protect the rights of vulnerable adults in cross-border situations. The agreement, chaired by Cyprus's Justice Minister Costas Fytiris, establishes clear rules for jurisdiction and introduces a "European certificate of support and representation" to facilitate the recognition of powers across member states. This marks a significant advancement in EU social policy, aiming to provide greater autonomy and legal certainty for a particularly vulnerable population moving within the single market.
    details:
      what_happened:
        - "The Council of the European Union formally agreed upon its common position on the proposed regulation concerning the protection of vulnerable adults."
        - "The regulation clarifies which court or authority has jurisdiction in cross-border cases involving property sales, medical care abroad, or placement in care facilities."
        - "A key element of the agreement is the creation of a 'European certificate of support and representation' to streamline the recognition of a chosen representative's authority in another member state."
        - "The Council decided to remove a proposal for interconnected national protection registers at this stage to reduce administrative burdens on member states."
      why_it_matters:
        - "This regulation addresses a long-standing gap in EU law, providing crucial protections for a highly vulnerable group who may be unable to advocate for themselves."
        - "The introduction of the 'European certificate' is a practical tool that could significantly simplify legal processes for families and caregivers navigating different national systems, enhancing personal autonomy."
        - "The agreement represents a tangible step towards building a Social Europe, demonstrating a commitment to fundamental rights and social cohesion beyond purely economic integration."
      uncertainty_notes: []
