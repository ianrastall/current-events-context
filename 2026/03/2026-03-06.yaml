        - "Professor Wiriya Namsiripongpun of Thammasat University advocated for an 'Accessibility for All Act', arguing that current disability-related laws are scattered across different ministries and ineffective."
        - "Public transportation in Thailand, such as trains and buses, is also noted as not being universally accessible, further limiting mobility for people with disabilities."
