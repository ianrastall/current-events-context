Date: '2026-03-06'
Source_URI: Portal:Current events/2026 March 6
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2026 Iranian strikes on Qatar
  - The Qatari government announces that its military had intercepted nine Iranian
    drones, while one drone struck an uninhabited area. (QNA via Gulf Times)
  - The Qatar Civil Aviation Authority partially reopens the country's airspace through
    designated contingency routes with limited capacity. Operations initially included
    evacuation flights for stranded passengers and air cargo services. (AFP via Deccan
    Chronicle)
  - Protests against the 2026 Iran war
  - Iranian diaspora protesters clash with anti-war protesters at a Ali Khamenei vigil
    at Washington Square Park in New York City, United States. (Times of Israel)
  - Demonstrators in Sanaa, Yemen, rally in solitary with Iran and Lebanon amidst
    the conflict. (Middle East Eye)
  - 2025–2026 Iran–United States negotiations
  - United States president Donald Trump calls for the "unconditional surrender" of
    Iran, saying there will be no deal or further talks. This comes after Iranian
    president Masoud Pezeshkian says that several countries have initiated mediation
    efforts to end the war. (BBC News)
  - 2026 Iranian strikes on Azerbaijan
  - Azerbaijan's State Security Service affirms it has thwarted a terror attack plotted
    by Iran's Islamic Revolutionary Guard Corps, including possible strikes against
    the Baku-Tbilisi-Ceyhan pipeline. (Euronews)
  - 2026 Iranian strikes on Bahrain
  - The Bahraini military announces that its air defence continue to intercept successive
    waves of Iranian attacks, with 84 missiles and 147 drones destroyed since the
    onset of hostilities. (Emirates News Agency)
  - 2026 Iranian strikes on the Kurdistan Region
  - Drones hit a hotel in Erbil, Iraqi Kurdistan. (Iraqi News)
  - 2026 Iranian strikes on Saudi Arabia
  - An Iranian ballistic missile strikes Prince Sultan Air Base in Riyadh Province,
    Saudi Arabia. The Saudi defense ministry says air defenses intercepted three missiles
    launched to the base, as well as four drones east of the province. (The Caspian
    Post) (Saudi Gazette)
  - An Israeli IAI Heron UAV is shot down over Khuzestan province, Iran. (Aviation
    Safety Network)
  - U.S. Army AH-64 Apache helicopters launch air-to-surface missiles at Popular Mobilization
    Forces positions near Mosul, Iraq. (Iraqi News) (Shafaq)
  - The Iranian Red Crescent Society reports the death toll from the Israeli and American
    air campaign in Iran has risen to 1,332. (Turkiye Today)
  - 2026 Hezbollah–Israel war
  - At least 41 people are killed, including three soldiers, and 40 more injured in
    Israeli air and ground raids on Al-Nabi Shayth, Beqaa Valley. The Israeli commandos
    tried unsuccessfully to locate and take away the remains of missing pilot Ron
    Arad. (Al Jazeera) (The Guardian)
  - Three Ghanaian peacekeepers are injured in an Israeli missile strike in southern
    Lebanon. (France 24)
  - Ecuadorian conflict
  - Operation Southern Spear
  - The U.S. defense department says its military has carried out airstrikes on narcoterrorists
    in Ecuador at the request of the Ecuadorian government, targeting a camp belonging
    to a faction of the FARC dissidents at the border with Colombia. (Reuters)
  - 2026 Afghanistan–Pakistan war
  - The United Nations High Commissioner for Refugees reports at least 100,000 civilians
    have now been displaced from their homes due to the fighting between Afghanistan
    and Pakistan, while Afghan forces say they have destroyed 14 more Pakistani military
    outposts along the border and downed a drone. (Sky News)
  - Sudanese civil war
  - The Sudanese military recaptures the town of Barah in North Kordofan, Sudan, following
    a ground assault backed by airstrikes against the Rapid Support Forces (RSF),
    reportedly inflicting heavy losses on the RSF and destroying 32 RSF combat vehicles.
    (Al Jazeera)
  - Russo-Ukrainian war
  - Prisoners of war in the Russo-Ukrainian war
  - Russia and Ukraine exchange prisoners of war, with 300 soldiers returned to each
    side. (The Moscow Times)
  - A wave of severe weather and a related tornado outbreak, kill at least eight people
    and cause widespread damage in the central United States. (CNN)
  - 2020–2026 H5N1 outbreak
  - The Japanese agriculture ministry confirms a H5N1 bird flu outbreak at a poultry
    farm in Abira, Hokkaido. (MENAFN)
  - 2026 Iranian diaspora protests
  - Police in Moscow, Russia, detain Iranian nationals who celebrated the killing
    of former supreme leader Ali Khamenei in public. (The Moscow Times)
  - Immigration policy of the second Trump administration
  - A United States appeals court declines to allow Donald Trump's administration
    to end temporary protected status for more than 350,000 Haitian nationals, leaving
    in place a lower court order that blocks the policy while the case proceeds. (Reuters)
  - 2026 Iranian leadership crisis
  - Exiled Iranian crown prince Reza Pahlavi, son of the late former shah Mohammad
    Reza Pahlavi, says he is ready to lead a potential transition if the Iranian government
    falls. (Naijan News)
  - 2026 Kosovan presidential election, 2026 Kosovan parliamentary election
  - Kosovan president Vjosa Osmani dissolves the Kuvendi, attempting to set new parliamentary
    elections within 45 days. The Vetëvendosje party maintains that the constitution
    allows parliament 60 more days to try to elect a president, seeking to challenge
    Osmani's decree at the Constitutional Court. (AP) (Balkan Insight) (RKS)
  - Internet in Indonesia
  - Indonesia announces that it will prohibit social media access for users under
    the age of 16 and begin deactivating accounts belonging to minors on several major
    platforms as part of a phased policy intended to address risks such as internet
    fraud and excessive internet use. (AFP via CNA)
  - 2026 Winter Paralympics
  - The opening ceremony of the Winter Paralympics in Milan and Cortina d'Ampezzo
    is held in Verona Arena, Verona, Italy. (AP)
