    importance: null
    headline: "EU-Mercosur deal remains under legal and political scrutiny before provisional rollout"
    summary: >
      Scrutiny of the EU-Mercosur deal continued in early March after the
      European Parliament asked the EU Court of Justice to assess whether the
      agreement conforms with EU treaties, while Eurogroup for Animals argued
      that the deal could weaken animal-welfare standards and should not be
      applied provisionally before parliamentary consent. Associated Press
      reported on February 27 that Ursula von der Leyen intended to move toward
      provisional implementation after Mercosur ratifications, keeping the deal
      under political and legal pressure.
    details:
      what_happened:
        - "The European Parliament said on January 21 that it had requested a Court of Justice opinion on whether the agreement conforms with EU treaties."
        - "Eurogroup for Animals said on January 28 that the agreement should not be provisionally applied before judicial and parliamentary scrutiny."
        - "Associated Press reported on February 27 that Ursula von der Leyen would move toward provisional implementation after Mercosur ratifications despite the pending parliamentary process."
      why_it_matters:
        - "The deal remains entangled with questions of democratic procedure, legal competence and standards enforcement."
        - "Animal-welfare objections show how trade deals increasingly face scrutiny beyond tariffs and market access."
      uncertainty_notes:
        - "The cited sources span January and late February 2026, so this entry is framed as an ongoing dispute still salient on March 6 rather than as a single same-day decision."
