    headline: "EU Council agrees position on law to protect vulnerable adults in cross-border cases"
    summary: >
      The Council of the European Union said on March 6 that it had agreed its
      position on a law meant to protect adults who need support in cross-border
      situations such as property transactions, medical care abroad or
      relocation. The Council said the text clarifies jurisdiction, applicable
      law, recognition of protection measures and the creation of a European
      certificate of support and representation. It also said member states
      removed the proposal for interconnected protection registers for now while
      asking the Commission to reassess the idea later.
    details:
      what_happened:
        - "The Council said it agreed its position on an EU law covering adults who need protection or support in cross-border situations."
        - "The text clarifies which authority is competent, which law applies, and how measures or powers of representation are recognized in another member state."
        - "The agreed text includes a European certificate of support and representation and drops interconnected protection registers at this stage."
        - "The agreement will serve as the basis for negotiations with the European Parliament."
      why_it_matters:
        - "It addresses a practical legal gap for adults who rely on support across EU borders."
        - "It moves the EU toward operational cross-border tools, not just general rights language."
      uncertainty_notes: []
