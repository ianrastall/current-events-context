      what_happened:
        - "The Constitutional Court ordered a temporary halt on President Vjosa Osmani's move to set a date for snap elections."
        - "The ruling followed Osmani's dissolution of parliament after lawmakers failed to elect a new president by the constitutional deadline."
        - "Reuters reported that the court also froze parliament's effort to elect a president while it considered the dispute."
        - "Prime Minister Albin Kurti, once an ally of Osmani, challenged the dissolution in court."
      why_it_matters:
        - "The decision prolonged Kosovo's political paralysis and delayed a path out of the crisis."
        - "It underscored the fragility of Kosovo's constitutional arrangements for electing a president and maintaining government continuity."
