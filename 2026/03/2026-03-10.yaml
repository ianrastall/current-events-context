    details:
      what_happened:
        - "The bus caught fire in Kerzers in Fribourg canton on Tuesday evening, killing six people."
        - "Five other people were injured, with several taken to hospital by emergency services."
        - "Swiss authorities said the most likely scenario was that a passenger set himself on fire using a flammable substance and that he was believed to be among the dead."
        - "Police said they found no indication of a terror motive and opened a criminal investigation."
      why_it_matters:
        - "The fire caused one of Switzerland's deadliest public-transport incidents in recent memory."
        - "The case raised immediate public-safety concerns while remaining, at least initially, outside a terrorism framework."
