    importance: null
    headline: "Britain's parliament approves legislation to remove hereditary peers from the House of Lords"
    summary: >
      Britain's parliament approved legislation removing the remaining hereditary peers from the House of Lords, completing the final parliamentary stage of a reform first begun in 1999. The bill ended the right of the last 92 hereditary peers to sit and vote in the upper chamber and fulfilled a manifesto pledge of Prime Minister Keir Starmer's Labour government. Official parliamentary and government material described the vote as one of the biggest reforms to Parliament and UK democracy in a generation.
    details:
      what_happened:
        - "The House of Lords completed the final stage of the Hereditary Peers Bill on March 10 after consideration of Commons reasons in legislative 'ping pong'."
        - "The measure removes the remaining 92 hereditary peers from the Lords, ending their automatic right to sit and vote by inheritance."
        - "The bill was presented by the government as a major constitutional reform and a manifesto commitment of the Labour administration."
      why_it_matters:
        - "The change removed one of the most visible hereditary features of the British legislature."
        - "It marked the completion of a reform process left unfinished when most hereditary peers were removed in 1999."
