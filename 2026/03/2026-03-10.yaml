    headline: "U.S.-Israeli war on Iran widens with strikes on naval assets and a drone hit on a major UAE industrial site"
    summary: >
      The U.S.-Israeli campaign against Iran intensified on March 10, with Washington saying it had destroyed 16 Iranian mine-laying vessels and prepared the heaviest day of strikes so far, while Israeli officials said the war would continue until Israel and the United States decided it should end. Iran kept up retaliatory attacks and threats against Gulf oil exports. In the United Arab Emirates, a drone strike caused a fire at the Ruwais Industrial Complex, a major ADNOC downstream site, underscoring how the conflict had expanded from direct military targets to commercial and energy infrastructure across the region.
    details:
      what_happened:
        - "The U.S. military said it had destroyed 16 Iranian mine-laying vessels as part of efforts to blunt threats to shipping in and around the Gulf."
        - "Top U.S. military officials said March 10 would be the most intensive day of U.S. strikes inside Iran up to that point in the war."
        - "Israeli Foreign Minister Gideon Saar said the war would continue until Israel and the United States judged that their objectives had been met."
        - "A drone strike caused a fire at the Ruwais Industrial Complex in Abu Dhabi emirate, where ADNOC operates major refining and petrochemical facilities."
      why_it_matters:
        - "The fighting was no longer confined to Iran and Israel, but was directly affecting Gulf commercial and energy infrastructure."
        - "Mine-laying threats and attacks on energy sites heightened risks to oil exports, shipping insurance, and regional escalation."
      uncertainty_notes:
        - "The sources confirmed the destruction of vessels and the Ruwais fire, but did not provide a single verified battlefield-wide casualty total for March 10."
