      Kosovo's Constitutional Court temporarily barred President Vjosa Osmani from announcing a date for a snap election, deepening an institutional crisis that followed the dissolution of parliament after lawmakers failed to elect a president. Reuters reported that the ruling held until March 31 and also froze parliament's effort to elect a president, intensifying a power struggle between Osmani and Prime Minister Albin Kurti over whether the dissolution was constitutional.
