    headline: "Iran war disrupts Gulf refining and pushes airlines to raise fares and fuel surcharges"
    summary: >
      The economic shock from the Iran war deepened on March 10 as consultancy IIR estimated that about 1.9 million barrels per day of Gulf refining capacity had been shut, while carriers in Asia and Europe began raising fares, adding fuel surcharges, or reworking schedules in response to surging jet fuel prices and disrupted flight corridors. Reuters reported that Qantas and Air New Zealand were among the first airlines to react publicly, while broader industry warnings pointed to a worsening squeeze on margins, ticket prices, and cargo flows if the conflict persisted.
    details:
      what_happened:
        - "Consultancy IIR said around 1.9 million barrels per day of Gulf refining capacity was shut because of the conflict, affecting facilities across Bahrain, Iraq, Kuwait, Qatar, Saudi Arabia, and the UAE."
        - "Reuters reported that airlines in Asia and Europe were raising fares or adding fuel surcharges as jet fuel prices spiked sharply."
        - "Qantas said it would raise international fares, and Air New Zealand also moved to increase prices because of higher fuel costs."
        - "Carriers including Cathay Pacific and Finnair were adjusting routes and warning of further impacts from constrained airspace and fuel availability."
      why_it_matters:
        - "The conflict was transmitting quickly into household and business costs through fuel, freight, and air-travel prices."
        - "Refining outages and aviation disruptions signaled that the war's economic effects extended well beyond the immediate combat zone."
      uncertainty_notes:
        - "The reported refinery outages were point-in-time estimates and could change quickly with further strikes, repairs, or policy intervention."
