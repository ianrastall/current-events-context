Date: '2026-03-10'
Source_URI: Portal:Current events/2026 March 10
Intelligence_Payload:
  Uncategorized:
  - 2026 Iran war
  - 2026 Iranian strikes on the United Arab Emirates
  - The Ruwais refinery in Al Dhannah, Abu Dhabi Emirate, United Arab Emirates, shuts
    down after a drone strike that causes a fire. (Reuters)
  - 2026 Strait of Hormuz crisis
  - United States intelligence sources report that Iran has started to deploy underwater
    mines in the Strait of Hormuz. The Central Command says that American forces have
    sunk several Iranian ships, including 16 minelaying vessels. (CNN) (CNBC)
  - United Kingdom involvement in the 2026 Iran war
  - Royal Navy warship HMS Dragon leaves Portsmouth and heads to Cyprus in response
    to a drone strike on the United Kingdom's RAF Akrotiri base. (BBC News)
  - According to Iran International, American and Israeli airstrikes have killed many
    Islamic Revolutionary Guard Corps commanders and generals, including Basij chief
    Asadollah Badfar. Prior to his reported death, Badfar was involved in crackdowns
    against the 2025–2026 protests. (Iran International) (Jerusalem Post)
  - Russo-Ukrainian war
  - Attacks in Russia during the Russo-Ukrainian war
  - Six people are killed and 37 others are injured in a Ukrainian missile attack
    in Bryansk, Russia. (Xinhua)
  - The Ukrainian Special Operations Forces announce several overnight drone strikes
    on Russian electronic warfare stations and warehouses in Donetsk and Makiivka,
    Donetsk Oblast, Ukraine. (Ukrainska Pravda)
  - Sudanese civil war
  - Forty people are killed in a drone strike on a truck carrying funeralgoers near
    Abu Zabad, West Kordofan, Sudan. (Arab News)
  - Seven people, including three children, are killed and 13 others are injured in
    a Rapid Support Forces drone strike in Dilling, South Kordofan, Sudan. (Daily
    Sabah)
  - 2026 Strait of Hormuz crisis, Economic impact of the 2026 Iran war
  - The price of West Texas Intermediate crude oil rises by more than five percent
    to US$87.65 per barrel after United States president Donald Trump escalated threats
    related to the Strait of Hormuz. (AFP via SpaceWar.com)
  - Thai prime minister Anutin Charnvirakul orders remote work and the suspension
    of official international trips for government officials, and reduced electricity
    use in government buildings amid supply concerns linked to the Iranian war. (Reuters)
  - Tornadoes of 2026
  - At least two are killed and six are injured after a hailstorm and four possible
    tornadoes strike the vicinity of Kankakee, Illinois, and Wheatfield, Indiana,
    United States. (WLS-TV)
  - The Indonesian rescue agency ends search and rescue operations after a garbage
    landslide at the Bantar Gebang landfill in Bekasi, West Java, on March 8 killed
    seven people, with all individuals previously reported missing accounted for.
    (Reuters)
  - Five people are killed and eleven others are injured when a bus collides with
    a truck on the Kampala–Gulu Highway near Bweyale Town, Kiryandongo District, Uganda.
    (Daily Monitor)
  - Arctic sea ice decline
  - The U.S. National Snow and Ice Data Center reports that Arctic sea ice reached
    about 14.22 million square kilometers, which is among the lowest yearly high points
    recorded in more than four decades of satellite monitoring. (AFP via RFI)
  - Australia–Iran relations, Defection of Iran women's national football team
  - Australia grants humanitarian visas to five Iranian women football players who
    sought asylum, including captain Zahra Ghanbari, Mona Hamoudi, Fatemeh Pasandideh,
    Atefeh Ramezanizadeh, and Zahra Sarbali, citing fears of persecution after refusing
    to sing Iran's national anthem before an Asian Cup match in Gold Coast, Queensland.
    (Reuters)
  - Azerbaijan–Netherlands relations, Iran–Netherlands relations, Reactions to the
    2026 Iran war
  - Dutch foreign minister Tom Berendsen announces the temporary relocation of staff
    and operations of the Netherlands' embassy in Tehran to Baku, Azerbaijan, citing
    security risks to personnel amid the Iranian war. (AFP via Al Arabiya)
  - China–North Korea relations, Impact of the COVID-19 pandemic on public transport
  - Train services between Beijing, China, and Pyongyang, North Korea, are announced
    to resume for the first time since it was suspended six years ago due to the COVID-19
    pandemic. (Yonhap)
  - 2026 Iran war
  - The Iranian intelligence ministry announces the arrest of 30 individuals, including
    one unidentified foreign national, on allegations of espionage during the war,
    accusing the foreign suspect of providing information on the locations and movements
    of Iranian security forces and military facilities to hostile parties. (AFP via
    SpaceWar.com)
  - 2026 Kerzers bus fire
  - Six people are killed and five others are injured in a suspected arson attack
    on a postal bus in Kerzers, Fribourg Canton, Switzerland. (AFP via The Guardian)
  - Shots are fired at the United States consulate in Toronto, Ontario, Canada, with
    no casualties. Police are investigating the shooting as a national security incident.
    (CBS News)
  - Reform of the House of Lords
  - Members of the House of Lords vote to pass a bill to remove hereditary peers and
    heads to King Charles III for royal assent. (NPR)
  - Cardinal Louis Sako, the Patriarch of the Chaldean Catholic Church, based in Iraq,
    retires at the age of 76. (AP) (Vatican News)
  - Malagasy interim president and military leader Michael Randrianirina removes prime
    minister Herintsalama Rajaonarivelo from power and dissolves the entire Cabinet
    without explanation, five months after they were assigned following the 2025 protests.
    (DW)
  - 2025–26 NBA season
  - Bam Adebayo's 83-point game
  - In basketball, Miami Heat player Bam Adebayo scores 83 points in a 150–129 win
    over the Washington Wizards, marking the second-most points in a game in NBA history
    and most since Wilt Chamberlain's 100-point game in 1962. Adebayo’s 36 free throws
    and 43 attempts also set single-game NBA records. (AP) (ESPN)
  - 2026 Winter Paralympics
  - Brazil at the 2026 Winter Paralympics
  - Brazilian skier Cristian Ribera wins Brazil's, Latin America's and South America's
    first ever medal at the Winter Paralympics. (BBC)
