Date: '2026-03-23'
Source_URI: Portal:Current events/2026 March 23
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2025–2026 Iran–United States negotiations
  - United States president Donald Trump says he is postponing his 48-hour ultimatum
    for five days before attacking the Iranian power plants as Iran and the U.S. have
    held "very good and productive conversations" on ending the war. Trump also claims
    that a "15-point plan" focused on Iran's renunciation of the nuclear weapon has
    been dealt. Iran denies any dialogue took place. (Anadolu Agency) (News from the
    States)
  - Iraq in the 2026 Iran war
  - Kata'ib Hezbollah says that it will extend its pause on strikes on the United
    States embassy in Baghdad, Iraq, for five more days. (AFP via Gulf News)
  - A person is killed and another is injured in a strike on a transmission site of
    the Persian Gulf Radio and Television Centre in southern Iran. (AFP via LBCI)
  - 2026 Lebanon war
  - At least one person is killed in an Israeli strike on Hazmieh, Greater Beirut,
    Lebanon. The Israeli military states that the attack targeted a member of the
    Iran's Quds Force in the area. (AFP via Al Arabiya)
  - Economic impact of the 2026 Iran war
  - Brent crude futures fall 11%, trading just below $100 a barrel for the first time
    in days, following the announcement by president Donald Trump about talks with
    Iran to end the war. (The Wall Street Journal)
  - Slovenia becomes first EU country to introduce fuel rationing to cope with extra
    demand by drivers from neighboring countries. (BBC)
  - 2026 Colombian Air Force Lockheed C-130 crash
  - At least 67 people are rescued when a military Lockheed C-130, carrying 125 people,
    crashes in Puerto Leguízamo, Colombia, near the border with Peru. (BNO News)
  - At least one person is killed and several others are injured in an explosion in
    Kwara State, Nigeria. (AP)
  - Climate crisis
  - In its annual State of the Climate report, the World Meteorological Organization
    states that Earth's energy imbalance and ocean heat content reached record levels
    in 2025, driven by rising greenhouse gas emissions. (AFP via CNA)
  - Climate change in Germany, Phase-out of fossil fuel vehicles
  - The Federal Court of Justice of Germany dismisses a lawsuit by Environmental Action
    Germany to ban Mercedes Benz and BMW from selling new combustion engine vehicles
    after 2030. (DW)
  - 2026 Italian constitutional referendum
  - The constitutional amendment that proposed to select members of the High Council
    of the Judiciary through sortition is rejected by a 46% to 54% vote. (Reuters)
  - Following the February 22 elections to the National Assembly of Laos, Thongloun
    Sisoulith is reelected as President of the Lao People's Democratic Republic and
    Sonexay Siphandone as Prime Minister.(Xinhua) (Xinhua)
  - In American football, the Seattle Seahawks signs a four-year deal worth $168 million
    with wide receiver Jaxon Smith-Njigba, with at least $120 million guaranteed,
    making him the highest-paid wide receiver in NFL history. (KUOW)
