      participating in coalition primaries ahead of the presidential race. Reuters reported that the
      results pointed toward a fragmented legislature rather than a commanding majority for any one
      political force, even as the leftist Historic Pact and the conservative Democratic Center emerged
      among the leading blocs. The day also elevated coalition candidates including Roy Barreras,
      Claudia López, and Paloma Valencia, helping define the shape of the presidential field while
      underscoring Colombia's volatile and divided political landscape.
