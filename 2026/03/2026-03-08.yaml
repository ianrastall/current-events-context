    summary: >
      China's foreign minister Wang Yi used his high-profile press conference on March 8 to send a
      dual message: Beijing still wanted structured dialogue with Washington, including preparation for
      a Xi-Trump meeting, but it also intended to criticize the use of force in the Iran crisis and to
      portray itself as a defender of international rules against bloc confrontation. In the context of
      a global oil shock and fast-moving Middle East war, the remarks positioned China as both a rival
      to the United States and a self-described stabilizing actor seeking to exploit diplomatic space
      opened by Western military entanglement.
    details:
      what_happened:
        - "At the National People's Congress press conference, Wang Yi said the agenda for a meeting between Xi Jinping and Donald Trump was on the table."
        - "He said dialogue between the United States and China remained vital even as Washington pressured Beijing's partners."
        - "Wang also called for an end to the Iran war and criticized a return to coercive 'law of the jungle' politics."
