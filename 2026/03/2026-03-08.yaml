    headline: "Iranian succession moves into view after reports of consensus on a new supreme leader"
    summary: >
      Iran's internal power transition became a major political development on March 8 after Reuters,
      citing Iranian media, reported that a member of the Assembly of Experts said a majority consensus
      had been reached on the country’s next supreme leader following the death of Ayatollah Ali
      Khamenei. Reporting around the process centered on Mojtaba Khamenei, whose rise had already been
      widely discussed in Iranian and international coverage, but the state did not fully disclose the
      mechanics, timing, or breadth of the clerical decision. In the middle of war and external
      pressure, the leadership question moved from speculation toward an acknowledged state process.
    details:
      what_happened:
        - "Reuters reported that Iranian media quoted Assembly of Experts member Hosseinali Eshkouri as saying a majority consensus had been reached on the next supreme leader."
        - "The transition followed the reported death of Ayatollah Ali Khamenei amid an ongoing wartime crisis."
        - "Coverage of the succession centered on Mojtaba Khamenei, though the full official decision pathway remained opaque."
        - "The timing made the succession question inseparable from the war, regime continuity, and internal elite cohesion."
      why_it_matters:
        - "Iran's supreme leadership is the central node of the country's political, military, and religious authority."
        - "Any uncertainty or dynastic turn in succession carries major implications for domestic stability and regional conflict management."
      uncertainty_notes:
        - "Public reporting did not fully document the vote count, formal announcement sequence, or all institutional procedures."
        - "Actor identification around the final successor remained partly dependent on elite and state-media signaling."
