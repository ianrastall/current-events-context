      The Lebanon front of the wider regional war escalated markedly on March 8. Israel's military
      said two soldiers were killed in southern Lebanon, the first Israeli troop fatalities since this
      phase of hostilities resumed, while a separate Israeli strike hit an apartment in the Ramada
