    importance: null
    headline: "Iran war disruption drives a fresh oil shock as the Strait of Hormuz is effectively curtailed"
    summary: >
      The widening war involving Iran kept global energy markets under severe strain on March 8, with
      Reuters reporting that the Strait of Hormuz had been rendered virtually shut by mines, drones,
      and the withdrawal of much commercial traffic. Brent crude briefly surged to levels not seen
      since 2022 before retreating, and U.S. crude also remained sharply elevated, underscoring how
      quickly the conflict had turned into a broad supply-and-inflation shock rather than a localized
      military crisis. Markets were highly volatile throughout the day, with some recovery in equities
      after signals from Washington that the fighting might not be prolonged, but the oil move itself
      remained the dominant global macroeconomic development.
    details:
      what_happened:
        - "Reuters reported that the Strait of Hormuz was virtually shut after Iranian mine and drone threats severely disrupted tanker traffic."
        - "Brent crude spiked intraday to roughly $119.50 before settling lower near $99, while WTI remained near the mid-$90s."
        - "The price move reflected fear of a large supply interruption rather than ordinary speculative trading."
        - "Global stock markets partially stabilized later in the session after comments from U.S. President Donald Trump suggesting the war could end relatively soon."
      why_it_matters:
        - "The Strait of Hormuz is one of the world's most important oil transit chokepoints, so prolonged disruption can feed inflation and shipping stress well beyond the Gulf."
        - "The price shock immediately raised the risk that central banks and governments would have to respond to a new energy-driven macroeconomic squeeze."
      uncertainty_notes:
        - "Exact shipping volumes still moving through the strait were fluid during the day."
        - "The duration of the disruption remained unclear."
