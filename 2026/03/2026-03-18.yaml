* id: "evt-2026-03-18-001"
  category: "Armed conflicts and attacks"
  subcategory: "Infrastructure strikes"
  topics: []
  importance: null
  headline: "Coordinated airstrikes on Iran's South Pars gas field and subsequent IRGC threats to Gulf energy infrastructure"
  summary: >
  The operational theater in the Persian Gulf expanded precipitously as Israeli and United States forces executed coordinated drone strikes on the downstream infrastructure of Iran’s South Pars gas field, the largest natural gas reserve globally, immediately prompting an unprecedented retaliatory posture from Tehran. In an asymmetric response to the degradation of their sovereign energy assets, the Islamic Revolutionary Guard Corps (IRGC) Navy explicitly designated major Western-affiliated energy facilities across the Gulf—specifically in Qatar, Saudi Arabia, and the United Arab Emirates—as legitimate military targets equal to American military bases. This exchange signifies a definitive end to any localized containment of the conflict, directly threatening the infrastructure that underpins a vast percentage of global hydrocarbon liquidity and forcing the emergency evacuation of critical global liquefied natural gas (LNG) nodes ahead of anticipated ballistic missile strikes.
  details:
  what_happened:
  - "Israeli and United States drone platforms struck four critical sour gas treatment facilities located at phases 3, 4, 5, and 6 of the South Pars field in Assaluyeh, southern Iran, forcing local authorities to take the processing plants offline to mitigate the spread of catastrophic fires."
  - "In direct retaliation, IRGC Navy Commander Alireza Tangsiri updated Iran's target matrix, officially equating United States-affiliated oil facilities in the Gulf to American military bases and warning that they would come under fire with 'full force'."
  - "The IRGC issued an extraordinary evacuation warning targeting specific Gulf facilities, including the SAMREF refinery and Jubail petrochemical complex in Saudi Arabia, the Al Hosn gas field in the UAE, and the Ras Laffan and Mesaieed complexes in Qatar."
  - "Anticipating imminent kinetic strikes, Qatar initiated the evacuation of its primary LNG production facilities at Ras Laffan Industrial City, a site responsible for approximately 20 percent of the world’s LNG supply, exacerbating global supply chain panic."
  - "Global energy markets reacted violently to the infrastructure strikes; the Dutch TTF gas benchmark rose by 5 percent within the hour, while Brent crude oil spiked by 6.2 percent to eclipse $109.84 per barrel."
  why_it_matters:
  - "The systematic targeting of downstream energy processing plants marks a dangerous evolution from purely military or nuclear targeting to total economic warfare, endangering up to 3.4 million barrels per day of Iranian crude output and threatening the foundational economic pillars of neighboring Gulf states."
  - "The evacuation of Ras Laffan and the credible threat of Iranian ballistic missile strikes on Saudi and Emirati refineries present an unprecedented risk of long-term disruption to global energy markets, heightening the probability of a severe global inflationary wave that will impact central bank interest rate policies."
