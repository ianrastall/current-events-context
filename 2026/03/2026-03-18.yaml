    headline: "Asian equities rise even as oil prices surge on Middle East conflict"
    summary: >-
      Times of India market coverage said Asian indexes including Japan's Nikkei and India's Sensex rose
      on March 18 even as Brent crude climbed above $109 and U.S. stocks fell. The divergence left investors
      balancing local bullishness in Asia against global inflation fears tied to the Middle East war.
    details:
      what_happened:
        - Times of India reported that Japan's Nikkei gained more than 3 percent and India's Sensex 
          rose by more than 600 points.
        - The same coverage said U.S. indexes fell as higher oil prices fed inflation concerns.
        - Brent crude was reported around $109.84 a barrel after renewed threats to Gulf energy 
          infrastructure.
        - Indian authorities also opened an anti-dumping probe into ethyl chloroformate imports from
          China.
      why_it_matters:
        - The trading session showed that oil shocks do not move all regional markets in the same 
          direction or at the same speed.
        - Higher crude prices and shifting rate expectations remained a direct transmission channel 
          from conflict to global finance.
