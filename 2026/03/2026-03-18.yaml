    headline: "Israel says it killed Iran's intelligence minister as missile fire and airstrikes widen
      the conflict"
    summary: >-
      Al Jazeera reported that Israel said it killed Iranian intelligence minister Esmaeil Khatib, adding
      to recent killings of other senior Iranian figures. Other cited coverage described retaliatory missile
      fire toward Tel Aviv and central Israel, Hezbollah rocket launches, and Israeli strikes in Beirut.
      Together the reports pointed to continued escalation across Iran, Israel and Lebanon.
    details:
      what_happened:
        - Al Jazeera reported that Iranian officials confirmed the death of intelligence minister 
          Esmaeil Khatib.
        - The same report placed Khatib after the recent killings of Ali Larijani and Gholamreza 
          Soleimani.
        - Other cited coverage described retaliatory missile fire toward Tel Aviv and central 
          Israel, Hezbollah rocket launches, and Israeli strikes in Beirut.
        - Al Jazeera also reported that Israeli officials signaled they would continue targeting 
          senior Iranian figures.
      why_it_matters:
        - Leadership targeting reduces room for de-escalation and increases the likelihood of 
          additional retaliatory strikes.
        - Parallel fire across Iran, Israel and Lebanon underscored that the conflict was no longer 
          confined to a single front.
      uncertainty_notes:
        - Casualty figures across Tehran, central Israel and Beirut were reported in separate 
          accounts and are not combined here into a single total.
