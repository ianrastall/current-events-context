    headline: "Strike on Iran's South Pars gas field prompts threats to Gulf energy facilities"
    summary: >-
      Regional and market coverage on March 18 said facilities tied to Iran's South Pars gas field were
      struck, after which Iranian officials threatened named energy sites in Saudi Arabia, the United
      Arab Emirates and Qatar. Al Jazeera listed facilities identified in the warning, while market coverage
      tracked Brent crude near $109.84 a barrel and rising inflation concerns. Together the reports pointed
      to a deeper risk that the war would spread from military targets into Gulf energy infrastructure.
    details:
      what_happened:
        - Coverage said facilities linked to South Pars in Assaluyeh were struck, with some 
          processing units reportedly taken offline.
        - Al Jazeera reported threats against specific Gulf energy sites including SAMREF, Jubail, 
          Al Hosn, Ras Laffan and Mesaieed.
        - Market coverage said Brent crude rose to about $109.84 a barrel as traders priced in wider
          supply disruption risk.
      why_it_matters:
        - Threats to named energy facilities raised the risk that the conflict would move beyond 
          military sites and into export and processing infrastructure.
        - Oil and gas price spikes can quickly feed into global inflation, shipping costs and 
          energy-security concerns.
      uncertainty_notes:
        - The cited sources did not align cleanly on operational attribution for the South Pars 
          strike, so the event avoids a definitive attacker label.
