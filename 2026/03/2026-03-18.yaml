* id: "evt-2026-03-18-013"
  category: "Business and economics"
  subcategory: "Labor agreements"
  topics: []
  importance: null
  headline: "WNBA reaches transformative collective bargaining agreement"
  summary: >
  The Women's National Basketball Association (WNBA) and its players' union ratified a landmark, transformative seven-year Collective Bargaining Agreement (CBA) that fundamentally rewrites the economic architecture of women's professional sports. Driven by exponential growth in viewership, attendance, and corporate league popularity over the past two seasons, the players successfully negotiated an equity-based economic model that grants them 20 percent of gross league revenues. The agreement shatters previous compensation ceilings, instituting a $7 million team salary cap, driving average salaries past the half-million-dollar mark, and instituting a $1.4 million supermax. This monumental financial shift successfully eliminates the economic necessity for top-tier American athletes to supplement their incomes in overseas leagues during the offseason, securing domestic talent retention.
  details:
  what_happened:
  - "The WNBA and the WNBPA tentatively agreed to a new seven-year CBA, featuring a mutual opt-out clause after the sixth year, formally aligning player compensation with the league's skyrocketing gross revenue."
  - "The agreement guarantees players approximately 20 percent of gross revenue and raises the team salary cap exponentially from $1.5 million to $7 million."
  - "Base compensation frameworks were radically altered: the average annual salary will surge from $120,000 to approximately $600,000, while the minimum salary will rise to $300,000."
  - "Top-tier 'supermax' contracts will jump to $1.4 million, representing 20 percent of the new team salary cap, a monumental increase from previous maximums."
  why_it_matters:
  - "The CBA establishes a historic benchmark for gender equity in sports economics, converting players into true financial stakeholders by basing profit-sharing on gross, rather than net, revenue, forcing the league to open its books."
  - "The dramatic salary increases definitively end the era in which WNBA athletes were economically forced to play in foreign leagues to maintain a sustainable living."
