  headline: "Thailand's parliament re-elects Anutin Charnvirakul as prime minister"
  summary: >
  Following a snap general election that reshaped the Thai legislative landscape, the National Assembly formally re-elected Bhumjaithai Party leader Anutin Charnvirakul as Prime Minister. Securing a comfortable parliamentary majority of 293 votes, Anutin’s victory solidifies a formidable conservative-centrist coalition government backed by 13 parties, notably including the historically rival Pheu Thai Party. The election decisively marginalized the progressive People's Party, which had previously attempted to table a no-confidence motion against Anutin's administration, prompting the premature dissolution of the House. Despite minor public protests and social media campaigns alleging election irregularities, the parliamentary vote ensures the continuity of the political establishment in Bangkok and underscores the enduring influence of traditional power brokers within Southeast Asia's second-largest economy.
  details:
