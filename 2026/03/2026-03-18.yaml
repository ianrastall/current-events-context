      underground Iranian missile storage sites near the Strait of Hormuz, described as the weapon's first
      combat use. Reports cited Joint Chiefs Chairman Dan Caine and framed the strikes as an effort to
      reduce threats to international shipping at a time of severe disruption around Hormuz.
