* id: "evt-2026-03-18-003"
  category: "Armed conflicts and attacks"
  subcategory: "Airstrikes"
  topics: []
  importance: null
  headline: "Combat debut of U.S. GBU-72 bunker busters against Iranian missile sites in the Strait of Hormuz"
  summary: >
  The United States Air Force executed a highly specialized kinetic operation utilizing the GBU-72 Advanced 5K Penetrator—a state-of-the-art 5,000-pound bunker-buster bomb—to obliterate deeply buried and hardened Iranian anti-ship cruise missile facilities along the coastline of the Strait of Hormuz. This operation marks the first documented combat employment of the precision-guided GBU-72, reflecting a significant technological escalation in Operation Epic Fury. The strikes are a direct effort by United States Central Command to neutralize the asymmetric coastal defense systems that have allowed the IRGC to effectively blockade international shipping through the world's most critical hydrocarbon transit chokepoint, where maritime traffic has plunged by over 95 percent since the outbreak of hostilities.
  details:
  what_happened:
  - "U.S. forces successfully dropped multiple 5,000-pound GBU-72/B Advanced 5K Penetrator munitions onto hardened underground storage facilities harboring Iranian coastal defense cruise missiles near the Strait of Hormuz."
  - "Joint Chiefs Chairman Gen. Dan Caine confirmed the strikes were part of the ongoing Operation Epic Fury, noting the bespoke design of the weapons to penetrate thick concrete and subterranean rock before detonating."
  - "The operation explicitly targeted the anti-ship missile arrays that have facilitated Iran's near-total closure of the Strait of Hormuz, where maritime traffic remains largely restricted to single-digit 'permission-based transits' for Chinese and Indian vessels."
  - "The deployment of the GBU-72 follows repeated refusals by European NATO allies to join a U.S.-led maritime coalition, forcing Washington to undertake unilateral preemptive strikes to secure the waterway under orders from President Donald Trump."
  why_it_matters:
  - "The combat debut of the GBU-72 provides the United States with a highly lethal, intermediate capability between the standard 2,000-pound JDAM and the massive 30,000-pound GBU-57 MOP, optimizing the military's ability to systematically dismantle deeply buried adversary infrastructure without resorting to strategic bombers."
  - "By actively degrading Iran's coastal defense networks, the United States is attempting to forcibly break the economic chokehold on the Strait of Hormuz, which has already caused immense disruptions to global supply chains and driven energy prices to highly destabilizing levels."
