    headline: "Iran launches missiles and drones at the UAE; ballistic missile intercepted over Turkey by NATO"
    summary: >
      Iran continued its regional bombardment on March 9 by launching an estimated 15 ballistic missiles and
      18 drones targeting the United Arab Emirates, demonstrating continued offensive capacity despite sustained
      allied airstrikes on its military infrastructure. In a separate and significant escalation, an Iranian
      ballistic missile violated Turkish airspace and was subsequently intercepted by NATO air defenses,
      with debris falling in Turkey's southeastern Gaziantep Province. The breach of a NATO member's airspace
      by an Iranian projectile marked a dangerous widening of the conflict's geographic footprint and triggered
      formal protests from Ankara.
    details:
      what_happened:
        - The UAE Defense Ministry reported that Iran fired approximately 15 ballistic missiles and 18 drones at targets in the United Arab Emirates.
        - The Turkish Defense Ministry confirmed that an Iranian ballistic missile entered Turkish national airspace without authorization.
        - NATO air defense systems successfully intercepted the missile over Turkish territory.
        - Debris from the intercepted missile fell in Gaziantep Province in southeastern Turkey, raising concerns about civilian safety.
        - The airspace violation prompted a formal diplomatic response from Ankara and triggered consultations within the NATO alliance.
      why_it_matters:
        - The barrage against the UAE demonstrates Iran's continued capacity and will to threaten Gulf state partners of the US despite sustained damage to its military infrastructure from Operation Epic Fury.
        - The violation of Turkish airspace and the NATO interception of an Iranian projectile severely escalate the risk of triggering Article 5 consultations and drawing the broader NATO alliance directly into the conflict.
