  - id: "evt-2026-03-09-002"
    category: "Armed conflicts and attacks"
    subcategory: "Military operation"
    topics:
      - "Middle Eastern crisis"
      - "US-Iran war"
    importance: null
    headline: "U.S. and Israeli forces target Iranian military infrastructure as U.S. combat death toll reaches seven"
    summary: >
      A combined US and Israeli military force conducted extensive airstrikes against Iranian internal security
      and military targets, severely degrading Iran's missile and drone production and launch capabilities.
      Strikes heavily targeted Islamic Revolutionary Guard Corps Ground Forces bases in Esfahan Province,
      an intelligence office in Darreh Shahr, Ilam Province, and naval assets, including a
      Shahid Soleimani-class corvette reported sunk off Bandar Lengeh. Concurrently, US Central Command
      announced the death of a seventh American service member, an Army soldier who succumbed to wounds
      sustained during an Iranian attack in Saudi Arabia on March 1, raising the US fatality count and
      increasing domestic political pressure over the costs of the campaign dubbed Operation Epic Fury.
    details:
      what_happened:
        - IDF and US forces struck key IRGC Ground Forces installations, including the Seyyed ol Shohada Operational Base and the 14th Imam Hossein Division in Esfahan Province.
        - The combined force conducted a strike against a Shahid Soleimani-class corvette off the coast of Bandar Lengeh in the Persian Gulf.
        - Strikes also targeted internal security infrastructure, including an IRGC intelligence office in Darreh Shahr, Ilam Province.
        - US Central Command formally announced the death of a seventh American service member who had been wounded during an Iranian attack in Saudi Arabia on March 1 and subsequently died of his injuries.
        - The aggregate strikes were part of the sustained Operation Epic Fury campaign aimed at dismantling Iran's offensive military capacity.
      why_it_matters:
        - The targeted destruction of IRGC ground forces and internal security units limits Tehran's ability to coordinate retaliatory strikes against allied forces and suppress potential domestic unrest simultaneously.
        - Rising US combat casualties increase both domestic political scrutiny and congressional pressure regarding the scope and duration of Operation Epic Fury.
      uncertainty_notes:
        - "Specific casualty figures among Iranian personnel at the targeted facilities remain unconfirmed by independent sources."
