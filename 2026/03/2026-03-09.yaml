    headline: "Mojtaba Khamenei named supreme leader of Iran"
    summary: >
      Iranian state television announced that Mojtaba Khamenei has been named to succeed his late father,
      Ayatollah Ali Khamenei, as the Supreme Leader of Iran. The hardline cleric's elevation to the country's
      highest office comes during intense, direct military conflict with the United States and Israel. The move
      consolidates his control over the country's war strategy and its powerful Islamic Revolutionary Guard Corps,
      rebuffing calls from the United States for an unconditional surrender and a change in leadership. Iranian
      officials publicly rejected demands from President Donald Trump that Tehran capitulate, signalling continued
      confrontation under the new Supreme Leader.
    details:
      what_happened:
        - Iranian state television formally announced that Mojtaba Khamenei was named as successor to his late father, Ayatollah Ali Khamenei.
        - The transition gives the younger Khamenei central authority over Iran's state apparatus and the Islamic Revolutionary Guard Corps.
        - The appointment occurred amid direct military conflict involving Iran, the United States and Israel.
        - US President Donald Trump had previously demanded unconditional Iranian surrender, which Iranian officials publicly rejected following the succession announcement.
        - The new Supreme Leader's assumption of power was treated by Tehran as a signal of policy and ideological continuity rather than any pivot toward negotiation.
      why_it_matters:
        - The succession ensures hardline policy continuity in Tehran during a period of unprecedented direct warfare and severe domestic stress, foreclosing any near-term diplomatic resolution.
        - It solidifies central command authority over the Islamic Revolutionary Guard Corps and Iran's broader military strategy at a moment when the armed forces are under sustained attack.
      uncertainty_notes:
        - The reviewed file relies on secondary reporting that cited Iranian state television; the listed sources do not include a direct official Iranian decree or transcript.
