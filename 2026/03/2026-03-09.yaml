  - id: "evt-2026-03-09-007"
    category: "Health"
    subcategory: "Health policy"
    topics:
      - "Healthcare reform"
      - "Anti-corruption"
    importance: null
    headline: "Malawi bans 'dual practice' by public health workers to combat corruption"
    summary: >
      The government of Malawi implemented a strict ban prohibiting health workers employed by the state
      from simultaneously operating in or owning private medical clinics, pharmacies, hospitals, or diagnostic
      centers. The directive, attributed in initial reports to the sitting president, aims to eliminate
      documented abuses including medical staff extorting illegal fees from patients entitled to free services,
      diverting patients to their privately owned facilities, and siphoning state-supplied medicines for resale.
      Health workers with ownership stakes in private facilities were granted 30 days to divest or face
      dismissal from public service and potential criminal prosecution.
    details:
      what_happened:
        - The Malawian government officially banned public health workers from operating in or holding ownership of private medical facilities simultaneously with their state employment.
        - Workers with full or partial ownership in private clinics, pharmacies, or diagnostic centers were required to divest within 30 days of the announcement.
        - Non-compliance will result in dismissal from public service and potential legal action under anti-corruption statutes.
        - The policy targets documented practices of diverting public medicines and charging unlawful fees to patients at state facilities.
      why_it_matters:
        - The ban represents a substantive anti-corruption intervention aimed at redirecting public health resources to the intended beneficiaries and rebuilding patient trust in the state healthcare system.
