    headline: "South Korean audit finds long-running safety failures at Muan airport crash site and seven other airports"
    summary: >
      South Korea's Board of Audit and Inspection said the transport ministry had cut costs and wrongly approved unsafe airport structures for more than two decades, findings released as scrutiny continued over the 2024 Jeju Air crash at Muan that killed 179 people. Reuters and KBS reported that 14 localizer installations at eight airports had been built on rigid concrete structures rather than impact-breakable ones required by standards, and that the ministry had kept certifying them for up to 22 years. The audit also cited broader failings in bird-strike prevention and notified authorities of 30 cases of wrongdoing or procedural failure. Although the deadly crash itself happened earlier, the audit was a major March 11 governance event because it shifted responsibility toward long-term regulatory and construction decisions.
    details:
      what_happened:
        - "The state auditor said the ministry built and approved non-compliant localizer support structures at eight airports, including Muan."
        - "Reuters and KBS said 14 localizer installations were placed on rigid concrete mounds or embankments contrary to frangibility standards."
        - "The audit said the ministry had wrongly certified such structures during inspections for up to 22 years."
        - "Authorities were notified of 30 cases of wrongdoing or procedural failure, including wider weaknesses in bird-strike prevention."
      why_it_matters:
        - "The findings turned the post-crash debate from pilot and bird-strike factors toward systemic infrastructure and oversight failures."
        - "Because the audit covered eight airports, it raised questions about aviation safety practices beyond the Muan crash site."
      uncertainty_notes:
        - "A full investigative report into the Jeju Air crash itself was still pending."
