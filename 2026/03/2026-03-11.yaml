        - "Police said three brothers had been apprehended over the bombing at the U.S. Embassy in Oslo."
        - "The March 8 blast damaged the entrance to the consular section but caused no injuries."
        - "Reuters reported police said one suspect likely planted the bomb and the other two were complicit."
        - "Investigators said they were still examining motive and whether any government entity had directed the attack."
      why_it_matters:
        - "The case involved a direct attack on a U.S. diplomatic facility in Europe during a period of heightened international tensions."
        - "Police comments about possible state direction raised the stakes well beyond an ordinary criminal bombing investigation."
      uncertainty_notes:
        - "As of March 11, motive and any foreign direction remained under investigation."
