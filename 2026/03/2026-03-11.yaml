    importance: 8
    headline: "José Antonio Kast is sworn in as president of Chile amid protests and a sharp rightward shift"
    summary: >
      José Antonio Kast was sworn in as Chile's president on March 11 in Valparaíso, completing what Reuters and AP described as the country's sharpest move to the right in decades. In his first address, Kast cast his administration as an "emergency government" for a country beset by organized crime, weak finances, and public insecurity, and he immediately signed decrees aimed at border security and state audits. Reuters also reported anti-Kast protests in Valparaíso and Santiago that were dispersed by police, underscoring the polarized environment surrounding the transfer of power from Gabriel Boric. The inauguration was regionally important because it marked a decisive ideological shift in one of Latin America's most prominent democracies at a moment of wider rightward gains in the region.
    details:
      what_happened:
        - "Kast was sworn in on March 11 and formally took over from outgoing president Gabriel Boric."
        - "Reuters reported that Kast described his administration as an emergency government and promised audits and crackdowns on crime, immigration, and corruption."
        - "He signed decrees focused on border security in Chile's north and a broader review of state finances."
        - "Protests took place in Valparaíso and Santiago, with clashes and crowd dispersal by police reported by Reuters."
      why_it_matters:
        - "The transfer marked a major ideological shift in Chilean politics after years of unrest, security concerns, and economic anxiety."
        - "Kast's program indicated likely changes in migration policy, public security strategy, and Chile's external alignments."
      uncertainty_notes:
        - "Kast still faced a divided Congress, leaving uncertainty over how quickly his legislative agenda could advance."
