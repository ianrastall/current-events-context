    importance: 8
    headline: "Drone strike hits school and clinic in Sudan's White Nile State, killing at least 17 civilians"
    summary: >
      A drone strike hit a secondary school and a primary health clinic in Shukeiri village in Sudan's White Nile State on March 11, reportedly killing at least 17 civilians and injuring others. OHCHR said the area had come under heavy Rapid Support Forces drone attacks since March 4 and reported that at least one health worker was among the dead, while UNICEF separately said at least eight students and a health worker were killed in the school compound attack. AP, quoting local medical sources, reported that the dead included mostly schoolgirls as well as teachers and medical staff. The incident highlighted the widening use of drones against civilian sites in Sudan's war and the collapse of protection for basic education and healthcare facilities.
    details:
      what_happened:
        - "A drone struck a secondary school and a health clinic in Shukeiri village in White Nile State on March 11."
        - "OHCHR reported at least 17 civilians killed, while UNICEF separately reported at least eight students and a health worker among the dead."
        - "AP reported that local medical sources said the dead included mostly schoolgirls, along with teachers and health personnel."
