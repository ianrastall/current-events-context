    importance: 9
    headline: "IEA member countries agree record 400-million-barrel emergency oil release"
    summary: >
      The International Energy Agency and its member countries agreed on March 11 to make 400 million barrels of oil available to the market in response to supply disruptions from the Middle East war, the largest coordinated emergency release in the agency's history. Reuters reported the announcement during the market shock, while a later IEA update detailed how Asia-Oceania stocks would be made available immediately and stocks in the Americas and Europe from the end of March. The release included government and industry-held stocks and was intended to cushion the loss of flows tied to the disruption of Gulf shipping routes rather than solve the underlying security crisis. The measure underscored how rapidly the conflict had moved from military escalation into systemic energy-market intervention.
    details:
      what_happened:
        - "Reuters reported on March 11 that the IEA was moving toward an emergency release from strategic reserves as oil markets reeled from the conflict."
        - "Later reporting and the IEA's own update confirmed a 400 million barrel coordinated release, the largest such action in the agency's history."
        - "The IEA said Asia-Oceania member stocks would be made available immediately, while stocks in the Americas and Europe would start flowing from the end of March."
        - "The IEA said committed volumes included both government-held and industry-held stocks."
      why_it_matters:
        - "The size of the release showed that policymakers viewed the Hormuz-related supply shock as severe enough to justify extraordinary intervention."
        - "Even with reserve releases, the IEA and analysts indicated that market stability still depended on restoring safe energy and shipping flows."
      uncertainty_notes:
        - "The release was designed as a temporary buffer and did not eliminate uncertainty over how long Gulf disruptions would last."
