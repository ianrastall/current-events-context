        - "Seizures included 127,149 tons of waste, 602 tons of polluting agents, 398 tons of F-gases, 75 tons of plant protection products, and 2.3 tons of mercury."
        - "DOJ said the operation also recovered over $10 million in cash and bank accounts, along with vehicles, heavy machinery, firearms, apartments, and companies."
