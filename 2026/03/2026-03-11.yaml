    summary: >
      Europol, joined by authorities from 71 countries and multiple international partners, announced the results of Operation Custos Viridis on March 11, describing a year-long crackdown on organized crime networks involved in waste trafficking and pollution crime. Europol, Reuters, and the U.S. Justice Department all reported 337 arrests, 1,048 inspections, and large seizures including 127,149 tons of waste, 398 tons of fluorinated gases, 2.3 tons of mercury, and millions in cash and bank assets. The operation targeted criminal flows stretching from Europe into Africa, Asia, and Latin America and linked environmental crime to money laundering, corruption, and other transnational offences. The scale of the operation made it one of the most substantial coordinated law-enforcement actions of the day outside war zones.
    details:
