Date: '2026-03-11'
Source_URI: Portal:Current events/2026 March 11
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2025–2026 Iran–United States negotiations
  - Iranian president Masoud Pezeshkian lists preconditions for ending the war between
    Iran, Israel, and the United States. The conditions include recognizing Iran's
    legitimate rights, payment of reparations, and firm international guarantees against
    future aggression. (Xinhua)
  - 2026 Strait of Hormuz crisis
  - The Thailand-flagged bulk carrier is hit by two Iranian missiles shortly after
    passing the Strait of Hormuz. Twenty people are rescued and three are reported
    missing after the vessel catches on fire. (Reuters)
  - Two cargo vessels, the Marshall Islands-flagged Star Gwyneth, operated by Star
    Bulk Carriers, and the Japan-flagged ONE Majesty, operated by Mitsui OSK Lines,
    are struck by unknown projectiles, with no casualties reported. (Kathimerini)
  - A bulk carrier is hit by an unknown projectile 50NM northwest of Dubai, United
    Arab Emirates. (UKMTO)
  - 2026 Iranian strikes on Oman
  - Iran drones strike oil storage facilities at the port of Salalah, causing several
    fuel tanks to burst into flames.(Reuters) (Oil Price)
  - 2026 Iranian strikes on Iraq
  - Two tankers carrying Iraqi oil and gas, Marshall Islands-flagged Safesea Vishnu
    and Malta-flagged Zefyros, catch fire after being struck in Iraqi territorial
    waters off Khor Al Zubair Port and near the Al-Faw port area. An Indian member
    of the first crew is killed in the attack. (Oil Price) (Deccan Herald)
  - Hezbollah–Israel conflict
  - 2026 Lebanon war
  - Seven people are killed and 23 others are injured after an Israeli strike on Temnine
    Et Tahta, Baalbek-Hermel Governorate, Lebanon. Five people are also injured after
    a strike on the nearby village of Aali en Nahri. (BBC News)
  - Hezbollah launches over 100 rockets at Israel, injuring five civilians in Upper
    Galilee. (The Jerusalem Post)
  - Four people are injured in the United Arab Emirates after two drones fall near
    Dubai International Airport. (Xinhua)
  - Kivu conflict
  - A United Nations aid worker from France is killed in a series of explosions caused
    by drone strikes in Goma, Democratic Republic of the Congo, with the occupying
    M23 rebels blaming the Congolese government. (AP)
  - Sudanese civil war
  - At least 17 people are killed in a drone strike on a secondary school and a health
    center in Shukeiri, White Nile State, Sudan. Local authorities and the Sudan Doctors
    Union blame the Rapid Support Forces. (AP)
  - Over 20 people are killed and 23 others injured in a Sudanese Armed Forces drone
    strike Abu Zabad, West Kordofan, Sudan. (Dabanga Sudan)
  - Terrorism in Norway
  - Norwegian police arrest three brothers on suspicion of involvement in a bombing
    outside the U.S. embassy in Oslo on 8 March that caused minor damage but no injuries.
    A terrorist motive is suspected. (AFP via CTV News)
  - Economic impact of the 2026 Iran war
  - 2026 Strait of Hormuz crisis
  - The International Energy Agency agrees to discharge 400 million barrels of oil
    from its members’ strategic reserves, its largest-ever release, to counter soaring
    global energy prices due to the war. Despite the measure, the price of the crude
    barrel rises above US$100 again in international markets. (Al Jazeera) (Forbes)
  - Wynn Resorts says it plans to resume construction on the upcoming Al Marjan Island
    resort in Ras Al Khaimah following a short pause amidst the war. (Reuters) (Khaleej
    Times)
  - United Nations Security Council, 2026 Iran war
  - The UN Security Council approves a resolution (S/RES/2817) condemning Iran's attacks
    on the Gulf Cooperation Council (GCC) states and Jordan. The text, presented by
    Bahrain and co-sponsored by 135 countries, is passed with 13 votes in favor and
    the abstentions of Russia and China. (United Nations Press)
  - Israel–Spain relations
  - Spain permanently withdraws its ambassador to Israel and terminates the position
    after bilateral diplomatic relations worsened this week. (Reuters)
  - Romania–United States relations, 2026 Iran war
  - Romania authorizes the United States to use its air bases to refuel aircraft and
    deploy monitoring and satellite communications equipment in support of military
    operations related to the Iran war, following approval by the Romanian parliament
    and the Supreme Council of National Defence. (AFP via Al Arabiya)
  - Censorship of TikTok, Mass media in Albania
  - The Albanian constitutional court rules that the government's ban on the social
    media platform TikTok violated constitutional protections for freedom of expression
    and press freedom, after authorities blocked the service in 2025 following a fatal
    stabbing linked to a dispute on the platform. (AFP via France 24)
  - Europol reports that more than 330 people in 70 countries have been arrested during
    an international operation against organized networks suspected of trafficking
    illegal waste within Europe and exporting it to Africa, Asia, and Latin America,
    with large quantities of dangerous goods and nearly €10 million (US$11.6 million)
    in assets seized. (Reuters)
  - 2025 Chilean general election
  - José Antonio Kast is sworn in as President of Chile, succeeding Gabriel Boric.
    (Washington Post)
  - 2026 FIFA World Cup, Iran at the FIFA World Cup
  - Iranian sports minister Ahmad Donyamali states that Iran will not participate
    in the 2026 FIFA World Cup to be hosted by Canada, Mexico, and the United States,
    citing security concerns amid the Iran war. (Reuters)
