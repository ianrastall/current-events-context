    importance: 10
    headline: "Iranian attacks hit Gulf transport and energy infrastructure as shipping disruption deepens"
    summary: >
      Iran's campaign against Gulf transport and energy infrastructure escalated on March 11, with attacks reported near Dubai International Airport, Basra port, Khor Al-Zubair, and Oman's Port of Salalah while maritime traffic through and around the Strait of Hormuz remained badly disrupted. Associated Press reported that an attack on Iraq's Basra port killed at least one person and halted operations at Iraq's oil terminals, while two Iranian drones wounded four people near Dubai airport. Reuters separately reported strikes on shipping and port facilities, the use of naval drones against tankers, and intelligence indicating Iran had laid about a dozen mines in the strait, underscoring a deliberate effort to threaten commercial navigation and energy flows across the Gulf.
    details:
      what_happened:
        - "An attack at Iraq's Basra port killed at least one person and forced a halt to operations at the country's oil terminals, according to AP and Iraqi port officials."
        - "AP reported that two Iranian drones struck near Dubai International Airport, wounding four people, while Reuters and Omani authorities reported a major fire at fuel tanks in Salalah after drone strikes."
        - "Reuters reported attacks on commercial vessels and said maritime security firms assessed that naval drones had been used against tankers and other ships in Gulf waters."
        - "Reuters also reported that Iran had deployed roughly a dozen mines in the Strait of Hormuz, complicating any reopening of the waterway."
        - "Maersk said fuel flows and shipping operations were being disrupted, with vessels stranded in the Gulf and operations at Salalah paused."
      why_it_matters:
        - "The attacks extended the war's impact beyond direct military targets and into civilian transport, ports, merchant shipping, and global energy logistics."
        - "Disruption in and around the Strait of Hormuz threatened a major share of globally traded oil and gas, amplifying market volatility and policy responses."
      uncertainty_notes:
        - "Reuters said Iran was suspected in some ship attacks, but responsibility for every individual maritime incident was not independently verified."
