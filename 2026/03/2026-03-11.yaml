      Norwegian police said on March 11 that they had arrested three brothers suspected of carrying out the March 8 bombing at the U.S. Embassy in Oslo, an attack investigators described as terrorism. Reuters reported that the blast from an improvised explosive device damaged the entrance to the embassy's consular section but caused no injuries, and police said the suspects were Norwegian citizens in their 20s. Investigators said they believed one man planted the bomb while the other two were complicit, and both Reuters and the Guardian reported that police were also examining whether the attack could have been ordered by a government entity. The arrests turned an otherwise isolated security incident into a wider counter-terrorism case with international implications because of the target and the tense global security environment.
