    importance: 9
    headline: "UN Security Council adopts Resolution 2817 condemning Iran's attacks on Gulf neighbors"
    summary: >
      The United Nations Security Council adopted Resolution 2817 on March 11, condemning Iran's "egregious attacks" on its regional neighbors and demanding that those attacks stop. The Bahrain-backed measure passed 13-0, with Russia and China abstaining, reflecting unusually broad backing inside the Council despite disagreement over how the wider war began. UN coverage and AP reporting both described the resolution as a direct response to Iranian strikes on Gulf states and Jordan, while Iranian and Russian representatives argued the text was unbalanced because it did not address the U.S.-Israeli strikes that triggered the broader conflict. The vote marked one of the clearest multilateral diplomatic responses of the day to the spreading Gulf crisis.
    details:
      what_happened:
        - "The Security Council adopted Resolution 2817 on March 11, condemning Iran's attacks against regional neighbors."
        - "The resolution passed with 13 votes in favor and abstentions from Russia and China."
        - "UN coverage described the measure as Bahrain-led and focused on Iranian attacks on Gulf states and Jordan."
        - "AP reported the resolution demanded a halt to Iran's attacks on its Gulf neighbors as the war widened."
      why_it_matters:
        - "The vote signaled broad international alarm over the spread of the conflict into Gulf states critical to global trade and energy supply."
        - "It also highlighted the diplomatic isolation facing Iran on this specific issue, even as major powers remained divided over the wider war."
      uncertainty_notes:
        - "Russia and China said the resolution did not adequately address the strikes on Iran that preceded the Gulf attacks."
