Date: '2026-03-07'
Source_URI: Portal:Current events/2026 March 7
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2025–2026 Iran–United States negotiations
  - Iranian ambassador to Russia Kazem Jalali says that Iran is ready for normal talks
    but also rejects the current position by the United States. (TASS)
  - 2026 Iranian strikes on the United Arab Emirates
  - Dubai International Airport suspends operations after an aerial interception near
    the airport during Iranian drone and missile attacks in the region. Airport operations
    later partially resume as the United Arab Emirates (UAE) continues responding
    to the aerial threats. (AFP via Vanguard) (AFP via The Daily Star)
  - Iranian president Masoud Pezeshkian apologizes for Iran's attacks on its Middle
    Eastern neighbors and states that the Interim Leadership Council had agreed not
    to attack them "unless an attack on Iran originates from those countries". The
    military later continues the strikes. The governments of Bahrain, Kuwait, Qatar,
    Saudi Arabia, and the UAE report attacks targeting their territories. (AP) (TRT
    World) (AFP via France 24) (Reuters)
  - The United States embassy in Baghdad, Iraq, is attacked with four rockets. Iraqi
    prime minister Mohammed Shia al-Sudani orders the security forces to pursue the
    perpetrators of the "terrorist act". (Al Jazeera)
  - 2026 Hezbollah–Israel war
  - The Lebanese health ministry reports that Israeli airstrikes on multiple locations
    in southern Lebanon killed eight people, including six in Kherbet Selem and two
    in Kfar Reman. (AFP via Middle East Eye)
  - Russo-Ukrainian war
  - Russian attacks on civilians in the Russo-Ukrainian war, Russian strikes against
    Ukrainian infrastructure
  - Kharkiv Oblast governor Oleh Syniehubov says that Russia has launched a barrage
    of drones and missiles on residential areas in Kharkiv, Ukraine, killing ten people,
    including two children and injuring ten, as well as damaging the city's power
    grids. (CTV News) (BBC News)
  - Insurgency in Khyber Pakhtunkhwa
  - At least four people are killed, including two policemen, and more than 35 others
    are injured, including three seriously, in two separate bombings targeting a police
    patrol van and a market in Wana and Lakki Marwat District, Khyber Pakhtunkhwa,
    Pakistan. (Arab News)
  - Internal conflict in Peru
  - At least 33 people are injured, including three minors and five others seriously,
    in a bombing at a nightclub in Trujillo, La Libertad Department, Peru. No group
    has yet claimed responsibility. (AP)
  - Nigerian bandit conflict
  - At least 45 bandits and three military personnel are killed in a clash between
    Nigerian troops and armed bandits in Dan Musa, Katsina State, Nigeria. (Reuters)
  - 2026 Strait of Hormuz crisis, Economic impact of the 2026 Iran war
  - The Kuwait Petroleum Corporation announces a precautionary reduction in crude
    oil production and refining operations in response to Iranian attacks and threats
    to shipping through the Strait of Hormuz. (AFP via Al-Ahram)
  - 2026 Kenya floods
  - Flash floods in Nairobi, Kenya, disrupt flights and result in at least 23 deaths.
    (Reuters)
  - Sudan's health ministry announces that the country will launch a hepatitis B vaccine
    campaign for newborns in 10 states. (Sudan Tribune)
  - Shield of the Americas
  - United States president Donald Trump meets with leaders from twelve American countries
    for the launching of a new multinational military cooperation initiative called
    Shield of the Americas, led by special envoy Kristi Noem. (Bloomberg).
  - United States–Venezuela relations
  - At the Shield of the Americas summit, U.S. president Trump says that the United
    States formally recognizes the Venezuelan government of Delcy Rodríguez. (Euronews)
  - Soham murders
  - Child murderer Ian Huntley dies in a hospital nine days after being attacked by
    a fellow inmate at HM Prison Frankland in County Durham, England, United Kingdom.
    (BBC News)
  - An improvised explosive device is detonated during a protest outside the residence
    of mayor Zohran Mamdani in New York City, United States. (NBC News)
  - 2026 Nepalese general election
  - Partial preliminary results in Nepal indicate that the Rastriya Swatantra Party
    (RSP) won 60 of 165 first-past-the-post seats, while also leading in 61 other
    consituencies. In Jhapa 5, RSP prime ministerial candidate Balen Shah defeats
    former prime minister K. P. Sharma Oli. (AP) (The Himalayan Times)
  - Guinea dissolves 40 political parties by decree, including the three main opposition
    groups—the Union of Democratic Forces of Guinea, the Rally of the Guinean People,
    and the Union of Republican Forces—for failing to meet legal requirements, and
    orders the seizure of their assets. (AFP via France 24)
  - 2026 Winter Paralympics
  - Russia at the 2026 Winter Paralympics
  - Russia wins their first Winter Paralympics medal since 2014 after Varvara Voronchikhina
    and Alexey Bugaev each won a bronze medal in para alpine skiing. (The Moscow Times)
