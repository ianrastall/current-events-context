    summary: >
      Authorities searched debris in southern Michigan on March 7 after suspected tornadoes and severe storms killed four people, including a 12-year-old boy, and injured at least a dozen others. Reuters reported that multiple homes were destroyed and hundreds of residents were left without power, while AP said the National Weather Service confirmed an EF3 tornado with winds of at least 150 mph in the Union Lake area near Union City. The disaster formed part of a wider severe-weather episode stretching across the U.S. midsection.
