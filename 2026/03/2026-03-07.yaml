    headline: "Israeli raid and airstrikes kill at least 16 in eastern Lebanon"
    summary: >
      Israel escalated operations in Lebanon on March 7 with an airborne special-forces raid near Nabi Chit in the Bekaa Valley followed by heavy airstrikes, leaving at least 16 people dead and 35 wounded according to Lebanese authorities cited by Reuters and AP. Israeli officials said troops had crossed briefly into Lebanon in an operation linked to the long-missing airman Ron Arad, while Hezbollah and Lebanese officials treated the incident as part of the wider regional war tied to the U.S.-Israeli campaign against Iran. Israel also warned that Lebanon would pay a "very heavy price" if the Lebanese state did not restrain Hezbollah, raising fears of broader escalation.
    details:
      what_happened:
        - "Lebanese authorities said Israeli strikes on Nabi Chit killed at least 16 people and wounded 35."
        - "AP reported that Israeli special forces briefly entered Lebanon in a mission tied to the remains of Israeli navigator Ron Arad."
        - "Reuters reported that Israel warned Lebanon it would face severe consequences if Hezbollah were not reined in."
        - "The strikes formed part of a broader expansion of hostilities linked to the regional Iran war."
      why_it_matters:
        - "The operation increased the risk that fighting with Hezbollah could further expand beyond the Israel-Lebanon border zone."
        - "Israeli warnings directed at the Lebanese state, not just Hezbollah, pointed to a more dangerous level of coercion."
      uncertainty_notes:
        - "Casualty figures came from Lebanese authorities and could change as rescue and verification continued."
