    headline: "Trump threatens broader Iran strikes as Tehran says it will pause attacks on neighbours"
    summary: >
      As the U.S.-Israeli war on Iran entered a second week, President Donald Trump said the United States was prepared to hit Iran "very hard" and signalled that he was not interested in negotiations. Iranian President Masoud Pezeshkian apologised to neighbouring states affected by Iranian retaliation and said the temporary leadership council had agreed to suspend attacks on nearby countries unless attacks on Iran originated from their territory. Reuters also reported that Saudi Arabia had warned Tehran that continued attacks on the kingdom or its energy sector could trigger direct Saudi retaliation, underscoring how close the conflict remained to widening across the Gulf even as Iran tried to limit one front of escalation.
    details:
      what_happened:
        - "Trump said Iran would be hit very hard on March 7 and raised the possibility that the war could end only when Iran no longer had functioning military leadership."
        - "Pezeshkian said Iran's temporary leadership council had approved suspending attacks on neighbouring states unless those countries themselves launched attacks on Iran."
        - "Saudi Arabia privately warned Tehran that further attacks on Saudi territory or energy infrastructure could push Riyadh to retaliate directly."
        - "Reuters reported that some Iranian claims about strikes on U.S. and Gulf facilities could not be independently verified."
      why_it_matters:
        - "The statements showed simultaneous pressures toward wider regional war and limited de-escalation."
        - "Any further attacks on Gulf energy infrastructure or U.S. bases risked intensifying the global oil and shipping shock already tied to the conflict."
      uncertainty_notes:
        - "Some battlefield claims by Iranian state-linked actors were not independently verified in the reporting."
