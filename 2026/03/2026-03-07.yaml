      what_happened:
        - "Storms and suspected tornadoes struck southern Michigan on March 6 into March 7, killing four people."
        - "AP reported 12 injuries in the Union Lake area and additional injuries in Cass County."
        - "The National Weather Service confirmed at least one EF3 tornado near Union City."
