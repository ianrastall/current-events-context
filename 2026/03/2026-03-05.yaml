Date: '2026-03-05'
Source_URI: Portal:Current events/2026 March 5
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2026 Iranian strikes on Akrotiri and Dhekelia
  - Spain announces that the frigate Cristóbal Colón will join French aircraft carrier
    Charles de Gaulle and Greek Navy ships to protect the British military bases in
    Cyprus. (AFP via The Straits Times)
  - Italy announces that it will dispatch naval assets to Cyprus. The Dutch navy is
    also joining the European naval task force. (Euronews)
  - 2025–2026 Iran–United States negotiations
  - Iranian foreign minister Abbas Araghchi says that Iran is not seeking a ceasefire
    or negotiations with the United States. (CNBC)
  - 2026 Iranian strikes on Azerbaijan
  - Suspected Iranian drones strike Nakhchivan International Airport in Azerbaijan,
    targeting the passenger terminal. At least two people are injured. (Euronews)
    (Reuters) (BBC News)
  - 2026 Iranian strikes on Bahrain
  - The Bahraini military reports that 74 Iranian missiles and 117 hostile drones
    have been intercepted and destroyed. A missile hit an oil refinery, causing a
    fire. (WAM via Gulf News) (Al Jazeera)
  - 2026 Iranian strikes on Iraq
  - Iraqi forces shoot down a drone that attempted to attack the United States' airbase
    near Baghdad. (Al Jazeera)
  - 2026 Iranian strikes on Qatar
  - The Qatari military says that the country was targeted today by 14 ballistic missiles
    and four drones coming from Iran; all of them were intercepted and no casualties
    were reported. (Al Jazeera)
  - 2026 Iranian strikes on the United Arab Emirates
  - The United Arab Emirates's air defence systems intercept six ballistic missiles
    and 125 drones launched by Iran. Six people were injured by falling debris over
    Abu Dhabi. (Al Jazeera) (The National News)
  - 2026 Kurdish rebellion in Iran
  - United States president Donald Trump says U.S. Air Force jets will provide "extensive
    air cover" for Kurdish forces in any ground offensive against the Iranian government.
    (The Telegraph)
  - 2026 Strait of Hormuz crisis
  - China is reportedly in talks with Iran to allow crude oil and Qatari liquefied
    natural gas vessels safe passage through the Strait of Hormuz. (Reuters)
  - Hezbollah–Israel conflict
  - 2026 Hezbollah–Israel war
  - The Israeli military issues an evacuation order for Dahieh, Beirut, Lebanon, a
    densely populated suburb which is also a stronghold of Hezbollah, telling residents
    to "save your lives and evacuate your homes immediately". Thousands of people
    flee following the warning. (The Times of Israel) (The Los Angeles Times)
  - Russo-Ukrainian war
  - Prisoners of war in the Russo-Ukrainian war
  - Russia and Ukraine exchange prisoners of war, with 200 soldiers returned to each
    side. (Meduza)
  - The Ukrainian Navy shoots down a Russian Naval Aviation Kamov Ka-27 helicopter
    over the Black Sea. (RBC-Ukraine) (ASN)
  - Economic impact of the 2026 Iran war
  - South Korean president Lee Jae Myung orders the activation of a ₩100 trillion
    (about US$68 billion) stabilization fund to address volatility in the country's
    financial markets linked to the Iran war. (AFP via The Economic Times)
  - Tariffs in the second Trump administration
  - Around 24 U.S. states file a lawsuit against the Trump administration after president
    Trump imposed a 10% global tariff, the first lawsuit challenging those tariffs.
    (Reuters)
  - At least six people are killed, eight others are rescued, and six are trapped
    when a nursing home collapses in Belo Horizonte, Minas Gerais, Brazil. (Xinhua)
  - Four people are killed and two others are injured when a Beechcraft 1900 of the
    Algerian Air Force crashes at Boufarik Airport near Boufarik, Blida Province,
    Algeria. (ASN)
  - An Indian Air Force Su-30MKI fighter jet crashes shortly after taking off from
    Jorhat Airport in Karbi Anglong district, Assam, India, killing both pilots. (AP)
    (Deccan Herald)
  - The United Kingdom Maritime Trade Operations reports that an explosion struck
    a tanker anchored in waters about 60 kilometers off the coast of Kuwait, causing
    an oil spill from a damaged cargo tank. (AFP via The New Zealand Herald)
  - Evacuations during the 2026 Iran war
  - Australia and New Zealand deploy military assets, including two RNZAF aircraft,
    and crisis response teams to the Middle East to assist and evacuate their respective
    nationals. (AFP via Al Arabiya)
  - Iran–Lebanon relations
  - The Lebanese cabinet bans activities by members of Iran's Islamic Revolutionary
    Guard Corps within Lebanon and instructs authorities to detain and deport individuals
    linked to the group. The cabinet also introduces a visa requirement for Iranian
    nationals entering the country. (AFP via Al-Ahram)
  - France-Lebanon relations
  - French president Emmanuel Macron announces that France will strengthen its cooperation
    with the Lebanese Armed Forces and provide them with armored transport vehicles
    as well as operational and logistical support. (The Times of Israel)
  - Foreign relations of Ecuador
  - Ecuador declares Cuba's ambassador to the country a persona non grata and orders
    him and all his diplomatic staff to leave the country within 48 hours. Shortly
    after the announcement, a man was filmed by the Associated Press on the roof of
    the Cuban embassy in Quito burning a bag of papers. (AP)
  - United States–Venezuela relations
  - The United States and Venezuela agree to re-establish diplomatic and consular
    relations. (AFP via RFI)
  - Human rights in Belarus
  - Belarusian president Alexander Lukashenko pardons 18 political prisoners, including
    15 for political charges and three who were convicted of unspecified crimes. (Reuters)
  - 2026 Kosovan presidential election
  - In Kosovo, the 120 members of the Kuvendi fail to elect the president. The Kuvendi
    is expected to dissolve, with parliamentary elections scheduled to be set within
    45 days. (DTT-NET) (RKS)
  - 2026 Nepalese general election
  - Nepalis vote to elect 275 seats of the House of Representatives nearly six months
    after the Gen Z protests. (AP)
  - Second cabinet of Donald Trump
  - U.S. president Donald Trump dismisses Kristi Noem as Secretary of Homeland Security
    and nominates Oklahoma senator Markwayne Mullin to replace her. (The Independent)
  - 2026 U.S. House of Representatives election in Texas district 23
  - Brandon Herrera, a gun manufacturer and youtuber presumptively becomes the GOP's
    nominee for the district, after incumbent representative Tony Gonzales drops from
    the race following a scandal involving a former aide. (BBC)
