    headline: "U.S. says it struck military targets on Iran's Kharg Island and warns oil sites could be next"
    summary: "On March 13, 2026, President Donald Trump said U.S. forces struck military targets on Iran's Kharg Island, a strategic hub for Iranian oil exports, while deliberately leaving oil infrastructure untouched for the time being. Reuters and AP reported that Washington paired the strike with a public warning that Iranian interference with shipping through the Strait of Hormuz could trigger direct attacks on energy facilities. The announcement marked a further escalation in the U.S.-Iran war and highlighted the conflict's growing connection to oil markets, regional shipping security, and civilian risk in Iran."
    details:
      what_happened:
        - "Trump said the United States hit all military sites on Kharg Island and had, for the moment, spared the island's oil infrastructure."
        - "Reuters described Kharg as a key Iranian oil export hub, making the strike strategically important beyond its immediate military effect."
        - "Trump publicly warned that Iranian interference with passage through the Strait of Hormuz could lead to attacks on oil infrastructure."
        - "AP reported that the same day also saw an explosion at Tehran's Ferdowsi Square during a Quds Day rally, underscoring the conflict's continuing reach inside Iran."
      why_it_matters:
        - "The strike signaled willingness by Washington to move from military targets toward threats against energy infrastructure if maritime disruption worsens."
        - "Kharg Island's role in Iran's export system means operations there carry consequences for oil flows, shipping insurance, and broader market stability."
        - "The public linkage between military operations and Hormuz transit raised the risk of further escalation across the Gulf."
