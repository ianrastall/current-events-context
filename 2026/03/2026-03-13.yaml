    headline: "Pakistan airstrikes in Afghanistan kill civilians and hit fuel facilities near Kandahar"
    summary: "Pakistan carried out airstrikes in Afghanistan that were publicly detailed on March 13, 2026, hitting Kabul and other locations as fighting between the neighbors entered a third week. Reuters, AP, and U.N.-cited reporting said civilians were killed and injured, while Taliban officials said fuel depots belonging to Kam Air near Kandahar airport were also struck. Pakistan said the operation targeted militant hideouts and support infrastructure, not civilians, leaving casualty totals and several battlefield claims contested."
    details:
      what_happened:
        - "AP reported that Taliban authorities said at least six civilians were killed and more than a dozen injured in strikes on Kabul and other areas."
        - "Reuters cited the United Nations as saying that strikes in Kabul's Pul-e-Charkhi area killed at least four civilians and wounded fourteen."
        - "Taliban officials said Pakistani aircraft also struck fuel depots belonging to Kam Air near Kandahar airport."
        - "Pakistan's information ministry said the operation targeted alleged militant camps and support infrastructure as part of Operation Ghazb lil Haq."
        - "Afghan and Pakistani officials also exchanged conflicting claims about drone activity and retaliatory strikes around Kohat."
      why_it_matters:
        - "The attacks marked a sharp escalation in direct cross-border military action between Pakistan and Taliban-ruled Afghanistan."
        - "Strikes affecting residential areas and aviation fuel infrastructure raised humanitarian and civil-aviation concerns."
        - "The conflicting narratives showed how quickly the border crisis could widen amid weak verification and overlapping insurgent threats."
      uncertainty_notes:
        - "Casualty totals differed by location and source; the overall toll across Afghanistan was still unclear on March 13."
        - "Claims about retaliatory drone strikes and damage in Pakistan were disputed by the two sides."
