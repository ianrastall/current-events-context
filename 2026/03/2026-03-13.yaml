Date: '2026-03-13'
Source_URI: Portal:Current events/2026 March 13
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2026 Iran war
  - 2026 interceptions of Iranian missiles in Turkey
  - Turkey intercepts an Iranian ballistic missile violating its airspace. (Türkiye
    Today) (Caspian Post)
  - 2026 Iranian strikes on Israel
  - At least 58 people are injured by an Iranian ballistic missile strike on northern
    Israel. (The Jerusalem Post)
  - 2026 Strait of Hormuz crisis
  - United States president Donald Trump says that U.S. forces conducted airstrikes
    on military targets on Kharg Island, Iran, and warns that the U.S. may also target
    the island's oil infrastructure if shipping through the Strait of Hormuz is disrupted.
    (AFP via ABS-CBN News)
  - Sinking of IRIS Dena
  - Sri Lanka repatriates the bodies of 84 Iranian sailors killed when the frigate
    IRIS Dena was sunk by a United States submarine off the coast of Galle on 4 March.
    Thirty-two rescued sailors remain in Sri Lanka while authorities continue to host
    other Iranian naval personnel under humanitarian arrangements. (AFP via RFI)
  - U.S. officials say a marine expeditionary unit of 5,000 marines and sailors will
    deploy to the Persian Gulf to reinforce existing forces stationed in the region.
    (The Wall Street Journal) (Forbes)
  - 2026 Lebanon war
  - Twelve medical staff members, including doctors, nurses and paramedics, are killed
    in an Israeli airstrike against a medical facility in Burj Qalaouiyah, Bint Jbeil
    District, Lebanon. (Al Jazeera)
  - Two migrant workers are killed and several other people are injured after security
    forces intercept a drone in an industrial area in Sohar, Oman. (AFP via Daily
    Sun)
  - The Saudi Arabian defense ministry reports that air defenses intercepted and destroyed
    56 hostile drones targeting several areas across the country. (Saudi Gazette)
  - 2026 Afghanistan–Pakistan conflict
  - Six people are killed and several others injured in a Pakistani airstrike on a
    residential area in Kabul, Afghanistan. A fuel depot in Kandahar is also bombed.
    (Reuters)
  - Sudanese civil war
  - Eleven people are killed and 20 others are injured in a drone strike on a fuel
    reserve in western Sudan. (Reuters)
  - Economic impact of the 2026 Iran war
  - Saudi Arabia cuts oil production by 20% after the shutdown of two offshore oil
    fields, including Safaniya. (Reuters)
  - The United States military confirms that all six crew members aboard an Air Force
    Boeing KC-135 Stratotanker died when the aircraft crashed in western Iraq yesterday.
    (AFP via The Times of Israel)
  - 2026 Cuban crisis, Cuba–United States relations
  - Cuban president Miguel Díaz-Canel confirms that Cuba is in talks with the U.S.
    to find solutions to the oil blockade in his country. (BBC News)
  - El Salvador–United States relations, Nuclear power in El Salvador
  - El Salvador and the United States sign Agreement 123 under the Atomic Energy Act
    of 1954 to build a nuclear power plant in El Salvador that is planned to be operational
    by 2030. (El Mundo in Spanish)
  - Illegal drug trade in Latin America
  - Bolivian authorities arrest suspected Uruguayan drug cartel leader during a police
    operation in Santa Cruz de la Sierra. Marset, who is wanted by several countries
    and has a US$2 million reward linked to money laundering allegations, is detained
    along with four other individuals. (AFP via France 24)
  - 2025–2026 Iranian protests
  - The Islamic Revolutionary Guard Corps warns of a stronger response than in January
    if new protests against the regime erupt. (AFP via Al Arabiya)
