    headline: "ASEAN ministers call for an immediate halt to Middle East fighting as energy and trade risks mount"
    summary: "ASEAN foreign and economic ministers held special meetings on March 13, 2026, and called for an immediate halt to the fighting in the Middle East, warning that the conflict was already affecting Southeast Asia through higher energy prices, inflation pressure, and trade disruption. Reuters reported that the Philippines, chairing ASEAN in 2026, convened the discussions as concern grew over the Strait of Hormuz and regional fuel vulnerability. Official ASEAN statements emphasized restraint, civilian protection, stable supply chains, and stronger economic resilience measures."
    details:
      what_happened:
        - "ASEAN foreign ministers met virtually on March 13 and issued a chair's statement expressing serious concern about the Middle East conflict and calling for restraint and a diplomatic solution."
        - "ASEAN economic ministers separately issued a joint statement focused on inflation, trade, energy security, and economic resilience."
        - "Reuters reported that ministers highlighted the region's exposure to oil and LNG disruption linked to threats around the Strait of Hormuz."
        - "The Philippines convened the meetings in its role as 2026 ASEAN chair."
      why_it_matters:
        - "The meetings showed that a Middle East war had become an economic and diplomatic problem for Southeast Asia, not only a distant security issue."
        - "ASEAN's emphasis on supply chains and energy vulnerability reflected the region's dependence on imported fuel and open shipping routes."
        - "The coordinated foreign-policy and economic response indicated concern that a prolonged conflict could undermine growth, prices, and political stability across the bloc."
