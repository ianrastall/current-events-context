    headline: "Drone strike on Adikong market near the Chad border kills 11 and wounds 23"
    summary: "Reporting on March 13, 2026, said a drone strike on the market and fuel reserves at Adikong in West Darfur killed 11 people and injured 23, with victims treated across the border in Adré, Chad. Reuters cited Médecins Sans Frontières, which said this was the second deadly strike on the area in less than a month, while AP reported an earlier lower toll as information emerged. The attack highlighted the widening use of drones in Sudan's civil war and the vulnerability of civilian trading points near the Chad border."
    details:
      what_happened:
        - "Reuters, citing MSF, said eleven people were burned to death and twenty-three were injured when a strike hit the market and fuel reserves at Adikong."
        - "MSF said seven of the injured were children and that the wounded were treated in Adré, Chad."
        - "Reuters reported that this was the second deadly strike on Adikong in less than a month."
        - "AP said initial reports had put the death toll lower before the higher casualty count was circulated in later reporting."
        - "Human rights and aid reporting linked the incident to a broader surge in drone attacks affecting civilians in Darfur and Kordofan."
      why_it_matters:
        - "The strike showed how drone warfare in Sudan is increasingly hitting markets, fuel points, and other civilian lifelines."
        - "Cross-border medical treatment in Chad illustrated the conflict's spillover burden on neighboring states and aid systems."
        - "The changing casualty count reflected the difficulty of verification in remote war zones."
      uncertainty_notes:
        - "The two main reports differed on the initial death toll as casualty information evolved."
        - "Attribution for the strike was reported through medical and humanitarian channels rather than a neutral on-site investigation."
