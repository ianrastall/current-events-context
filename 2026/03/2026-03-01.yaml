Date: '2026-03-01'
Source_URI: Portal:Current events/2026 March 1
Intelligence_Payload:
  Uncategorized:
  - 2026 Iran war
  - Assassination of Ali Khamenei
  - Iran confirms the death of supreme leader Ali Khamenei in an attack yesterday
    in Tehran by Israel and the United States. Forty days of mourning are declared.
    (Al Jazeera)
  - Following Khamenei's death, some Iranians grief while others in the country celebrated
    his death. In Galleh Dar, a monument of Islamic founder Ruhollah Khomeini is toppled.
    Additionally, a statue in Dehloran is toppled. (Reuters)
  - 2026 Iranian strikes on Cyprus
  - Iran launches two ballistic missiles towards Cyprus, not far from the British
    military bases on the island. They were both intercepted before reaching Cyprus.
    Cypriot president Nikos Christodoulides states that the country is not a target
    of Iran. (Cyprus Mail)
  - British Royal Air Force base RAF Akrotiri in Cyprus is hit by a drone after declaring
    a security threat. No casualties are reported. (Cyprus Mail)
  - 2026 Iranian strikes on the United Arab Emirates
  - Multiple Iranian Shahed drones strike French naval air station Camp de la Paix
    in Abu Dhabi, United Arab Emirates. (MENA via The New Arab)
  - 2026 killings of Iranian officials
  - Key Iranian officials Abdolrahim Mousavi, Aziz Nasirzadeh, Mohammad Pakpour and
    Ali Shamkhani are confirmed killed after an airstrike during a meeting yesterday
    in Tehran. (The Hill)
  - Former Iranian president Mahmoud Ahmadinejad is allegedly killed along with his
    bodyguards in an Israeli targeted killing strike on his home in Narmak. However,
    contrary to reports, a close advisor to him confirmed he is alive. (The Times
    of Israel) (Anadolu Agency)
  - High-ranking clerics in Iran declare jihad against Israel and the U.S., issuing
    a fatwa against them. (The Telegraph)
  - The Israeli Air Force launches a new wave of airstrikes across Tehran, targeting
    Islamic Revolutionary Guard Corps (IRGC) and Basij facilities with multiple explosions
    reported. (AA)
  - A person is injured in a drone strike on Duqm port in Oman. (AA)
  - A Palau-flagged tanker is struck by a missile in the Gulf of Oman, injuring four
    crew members. (Reuters)
  - An Iranian drone strikes the Crowne Plaza Hotel in Manama, Bahrain, which houses
    American embassy personnel. No casualties are reported. (Egypt Independent)
  - Nine people are killed and 49 others are wounded in an Iranian ballistic missile
    strike on a synagogue in Beit Shemesh, Jerusalem District, Israel. (The Times
    of Israel) (CNN)
  - The IRGC says it has launched missiles at the United States Navy aircraft carrier
    USS Abraham Lincoln in the Indian Ocean. (BBC News)
  - Three U.S. service members are killed and five others are seriously wounded in
    an Iranian missile strike, according to the United States Central Command. (LBC)
  - Four Popular Mobilization Forces members are killed in an unidentified airstrike
    targeting one of their headquarters in Diyala Governorate, Iraq. (Al Arabiya)
  - The Islamic Republic of Iran Navy's lead Moudge-class frigate IRIS Jamaran is
    sunk by U.S forces off Chabahar Port. (Reuters)
  - Russo-Ukrainian war
  - Southern front of the Russo-Ukrainian war
  - Russian forces launch artillery strikes on Kherson, Ukraine, killing three people
    and wounding two others. (Ukrinform)
  - 2026 Afghanistan–Pakistan war
  - Anti-aircraft fire is reported over Kabul, Afghanistan, as Pakistani warplanes
    launch strikes against Taliban targets. (France 24)
  - Myanmar civil war
  - The Tatmadaw launches airstrikes against a trading junction in the central Magway
    Region of Myanmar, killing 25 people and injuring 20 people. (AP)
  - At least 169 people are killed when insurgents raid a village in Abiemnom County,
    Ruweng Administrative Area, South Sudan. (AP)
  - Reactions to the 2026 Iran conflict
  - Danish shipping firm Maersk says that it is suspending all vessel transits through
    the Strait of Hormuz until further notice due to the ongoing conflict in the Persian
    Gulf. (AFP via Business Recorder)
  - US-Bangla Airlines announces that they will resume flights to Oman and Saudi Arabia
    as scheduled. However, they also announce they will temporarily suspend flights
    to Qatar and the United Arab Emirates. (Dhaka Tribune)
  - At least 17 people are killed and 18 others are critically injured in an explosion
    at an explosives factory in Nagpur district, Maharashtra, India. (NDTV) (DNA)
  - Four people are killed and ten others are missing after a boat carrying migrants
    toward Europe capsizes off the coast of Tobruk, Libya, according to the United
    Nations High Commissioner for Refugees. (Arab News)
  - Six people are killed and seven others are injured when a coach bus collides with
    a truck near Kyakabuga, Kyankwanzi District, Uganda. (Monitor)
  - Two Canadian nationals are killed and 18 others are injured in a bus crash near
    Cumayasa, La Altagracia Province, Dominican Republic. (CTV)
  - 2025–2026 Iran–United States negotiations
  - Iranian foreign minister Abbas Araqchi says that he has told Oman foreign minister
    Badr bin Hamad Al Busaidi that Iran is open to serious efforts at de-escalation.
    (APA)
  - US president Donald Trump claims that the Iranian leadership agreed to talks a
    day after Israel and the US launched strikes against Iran and stated he has agreed
    to do so. However, Iranian security council secretary Ali Larijani ruled out any
    negotiations. (CBS News) (Iran International) (WION)
  - Belgium–Russia relations
  - Belgium's special forces, with French Naval assistance, seize a Russian shadow
    fleet oil tanker in the North Sea. (Le Monde)
  - The Ministerial Council of the Gulf Cooperation Council issues an statement condemning
    the Iranian attacks targeting GCC countries, reaffirming that their territories
    won't be used to launch any attacks against Iran and demanding the cessation of
    those attacks to restore security, peace, and stability in the region. (Gulf Cooperation
    Council)
  - 2026 attack on the United States consulate in Karachi
  - Hundreds of protestors attempted to storm the consulate of the United States in
    Karachi, Pakistan, leading to clashes with security forces which left at least
    22 people dead and multiple others wounded. (AP)
  - 2026 Austin bar shooting
  - Three people are killed, including the perpetrator, and 14 others are injured
    in a mass shooting at a bar in Austin, Texas, United States. The Federal Bureau
    of Investigation is investigating the attack as potential terrorism. (KVUE)
  - 2026 Iranian Supreme Leader election
  - Iran appoints Ayatollah Alireza Arafi to the Interim Leadership Council that assumed
    authority following the assassination of supreme leader Ali Khamenei, with the
    body set to govern alongside president Masoud Pezeshkian and chief justice Gholam-Hossein
    Mohseni-Eje'i until the Assembly of Experts selects a new supreme leader. (AFP
    via Al Arabiya)
  - Venezuelan opposition leader and Nobel Peace Prize laureate Maria Corina Machado
    says she will return to the country in the coming weeks. (Reuters)
  - AI boom, Regulation of artificial intelligence
  - Vietnam's artificial intelligence (AI) law takes effect, mandating labeling of
    AI-generated content and disclosure when users interact with automated systems.
    The law, which applies to domestic and foreign developers, providers, and deployers
    operating in the country, also provides for the creation of a national AI data
    center. (AFP via The Straits Times)
