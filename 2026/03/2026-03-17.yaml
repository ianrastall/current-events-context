    headline: "Pentagon raises 'Golden Dome' missile defense first-phase estimate to $185 billion and
      adds prime contractors"
    summary: >
      Reuters reported that the U.S. expanded its cost estimate for the “Golden Dome” missile defense
      shield to $185 billion and enlisted major defense firms as prime contractors for parts of the program’s
      command-and-control system. Reporting described the added funding as tied to accelerating space-based
      defense components and tracking architectures, while noting that space-based interceptors pose significant
      scalability and affordability risks. Breaking Defense reported Gen. Michael Guetlein describing
      the $10 billion increase as driven by requirements to move faster on specific space capabilities
      (including missile tracking and data network elements), indicating a pace-versus-cost tradeoff.
      Additional defense press reporting similarly emphasized that the cost increase was linked to expanded
      space sensing/tracking and data transport requirements.
    details:
      what_happened:
        - "Reuters reported the program’s cost estimate rose to $185 billion and that additional major
          defense firms were enlisted as prime contractors."
        - "Reuters reported that accelerating space-based capabilities was a key driver and that space-based
          interceptors were seen as a high-risk, high-cost area."
        - "Breaking Defense reported Guetlein saying the increase was intended to accelerate specific
          space programs supporting the architecture (tracking/data layers)."
        - "Air & Space Forces reporting said the estimate increased by $10 billion due to demand for more
          space sensing, tracking, and data transport capabilities, citing Guetlein on March 17."
      why_it_matters:
        - "Large missile-defense architectures can reshape strategic stability calculations, especially
          if space-based components expand rapidly."
        - "Procurement scale and technical risk (particularly for space-based interceptors) create long-tail
          budget exposure and political contention."
