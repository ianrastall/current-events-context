    headline: "Israel reports killing Iran’s security chief as Iran’s new supreme leader rejects de-escalation
      and regional attacks intensify"
    summary: >
      Israel said Iran’s security chief Ali Larijani was killed, as the war’s trajectory continued to
      shift toward leadership targeting and sustained bombardment. At the same time, Reuters reported
      an exclusive account that Iran’s new supreme leader Mojtaba Khamenei rejected de-escalation proposals
      conveyed by intermediaries, demanding that Israel and the U.S. be “brought to their knees” first.
      On the ground, Iranian emergency responders described operating under repeated strikes and severe
      strain; Reuters reported the Iranian Red Crescent citing more than 1,300 deaths in Iran since the
      conflict began. The regional spillover included renewed rocket-and-drone attacks on the U.S. embassy
      compound in Baghdad, underscoring a widening operational theater beyond direct U.S.-Israel–Iran
      exchanges.
    details:
      what_happened:
        - "Israel said Larijani was killed, publishing the claim on March 17 amid ongoing strikes."
        - "Reuters reported that Mojtaba Khamenei rebuffed de-escalation proposals conveyed via intermediaries
          and framed the strait closure and continued fighting as leverage."
        - "Iraqi security sources told Reuters that rockets and multiple drones targeted the U.S. embassy
          in Baghdad; at least one drone was reported to have hit inside the compound, causing fire and
          smoke."
        - "Reuters reported Iranian Red Crescent responders describing repeated-site strikes and extreme
          fatigue, with the organization citing more than 1,300 killed in Iran since the war began."
      why_it_matters:
        - "Leadership targeting and rejection of de-escalation proposals reduces the near-term diplomatic
          “off-ramp” and increases the risk of broader regional escalation through proxies and cross-border
          attacks."
        - "Civilian harm and emergency-system overload in Iran, alongside attacks on U.S. facilities in
          Iraq, raise the probability of further retaliation cycles and international security fallout."
      uncertainty_notes: []
