    importance: null
    headline: "Pakistan air strike on Kabul drug rehabilitation hospital triggers mass-casualty claims
      and escalates cross-border conflict"
    summary: >
      Reuters reported that Afghanistan’s Taliban-led government said a Pakistani air strike hit a drug
      rehabilitation hospital in Kabul, killing at least 408 people and injuring 265—figures Reuters noted
      Pakistan had not verified. Pakistan rejected the allegation, stating the strike targeted military
      installations and “terrorist support infrastructure” and claimed there was no collateral damage.
      Reuters eyewitness reporting described burn damage, rubble, and continuing recovery of bodies, while
      hospital officials cited by Reuters said the facility housed around 2,000 patients at the time.
      Separate reporting from AP and Al Jazeera similarly relayed Taliban casualty claims, Pakistan’s
      denial, and rising international calls for restraint and investigation.
    details:
      what_happened:
        - "Reuters reported the Taliban government said Pakistan struck a Kabul drug rehabilitation hospital,
          citing a death toll of at least 408 and 265 injured that Pakistan did not verify."
        - "Pakistan rejected the hospital-strike account, saying it targeted military installations and
          “terrorist support infrastructure” and asserting no collateral damage."
        - "Reuters described survivors and medical staff reporting multiple explosions, fires, and overwhelmed
          responders, with claims that bodies remained under rubble the next day."
        - "Reuters and other outlets reported the incident feeding into an already-escalating Pakistan–Afghanistan
          confrontation involving air/drone strikes and border fire, with external actors urging de-escalation."
      why_it_matters:
        - "If casualty figures are borne out, the reported strike would represent a major escalation with
          severe civilian-protection implications and heightened risk of retaliatory operations."
        - "The competing narratives (hospital vs. “terror infrastructure”) complicate verification and
          can harden positions, reducing room for negotiated off-ramps."
      uncertainty_notes: []
