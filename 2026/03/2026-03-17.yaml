    importance: null
    headline: "Gulf exporters scramble to bypass the Strait of Hormuz as shipping is halted and oil supply
      disruption deepens"
    summary: >
      Reuters reported that Iran’s actions had halted almost all shipping through the Strait of Hormuz,
      a key chokepoint for global oil and liquefied natural gas flows, pushing Gulf exporters to reroute
      crude through pipeline alternatives such as Saudi and UAE bypass lines. Reuters cited the IEA as
      observing rising use of these alternatives, including increased Saudi exports through Red Sea terminals
      and higher utilization of the UAE’s Habshan–Fujairah route. The IEA’s March 2026 Oil Market Report
      described the Middle East war as producing the largest supply disruption in the history of the global
      oil market, with flows through the strait collapsing from roughly 20 million barrels per day pre-war
      to “a trickle,” and member countries agreeing to a large emergency oil release earlier in March.
      Together, the reporting underscored both the immediacy of maritime disruption and the limits of
      pipeline-based workarounds.
    details:
      what_happened:
        - "Reuters reported that Iran continued to halt “almost all” shipping through the Strait of Hormuz,
          prompting urgent rerouting plans."
        - "Reuters reported Gulf exporters ramping pipeline usage to bypass the chokepoint, including
          Saudi’s East–West and the UAE’s Habshan–Fujairah pipelines."
        - "The IEA reported crude and product flows through the strait plunging from around 20 mb/d to
          a “trickle,” with Gulf producers cutting total oil production sharply as storage filled and
          exports stalled."
        - "The IEA reported member countries agreeing on March 11 to make 400 million barrels available
          from emergency reserves to address the disruption."
      why_it_matters:
        - "A near-standstill at Hormuz is a systemic shock to global energy and downstream products (diesel/jet
          fuel/LPG), with knock-on inflation and supply-chain risks."
        - "Reliance on limited bypass capacity increases strategic vulnerability and can reshape geopolitical
          bargaining power across producer and consumer states."
      uncertainty_notes: []
