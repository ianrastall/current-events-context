      reported EMSC estimating a magnitude 6.0 quake at 15 km depth; no casualties were confirmed in these
      immediate reports. The combined shocks underscored the island’s compounding vulnerability: infrastructure
      stress from fuel and maintenance constraints alongside geological hazard exposure.
