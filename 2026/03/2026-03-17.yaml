    importance: null
    headline: "U.S. aircraft carrier deployed in Iran war heads to port for repairs after onboard fire
      and mass smoke injuries"
    summary: >
      Reuters reported that the U.S. aircraft carrier Gerald R. Ford was expected to temporarily pull
      into Souda Bay on the Greek island of Crete after a fire onboard, amid its deployment supporting
      operations against Iran. Reuters cited U.S. officials saying nearly 200 sailors were treated for
      smoke-related injuries, with one service member flown off the ship, and around 100 sleeping berths
      impacted—details that raised renewed readiness and morale concerns given the carrier’s extended
      deployment. An official statement attributed the fire’s origin to the ship’s main laundry spaces,
      said it was not combat-related, and stated the vessel remained fully operational with no damage
      to the propulsion plant. Additional reporting from USNI News described the scale of smoke inhalation
      treatment and the evacuation of an injured sailor in stable condition.
    details:
      what_happened:
        - "Reuters reported the carrier would temporarily go to Souda Bay after an onboard fire, citing
          U.S. officials."
        - "Reuters reported nearly 200 sailors were treated for smoke-related injuries and that roughly
          100 berths were affected; one service member was evacuated."
        - "Official U.S. naval reporting said the fire started in main laundry spaces, was not combat-related,
          and did not damage the propulsion plant; the carrier remained operational."
        - "USNI News reported more than 200 sailors were treated for smoke inhalation and that an injured
          sailor was medically evacuated and in stable condition."
      why_it_matters:
        - "Carrier readiness is a high-leverage variable in sustained air operations; maintenance interruptions
          can shift force posture and escalation dynamics."
        - "The incident highlights non-combat risks and human-factors strain during prolonged high-tempo
          deployments."
