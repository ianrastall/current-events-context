    headline: "Strait of Hormuz disruption deepens as Gulf oil exports plunge and floating storage swells"
    summary: >
      Shipping and energy markets remained heavily disrupted as the Strait of Hormuz stayed
      mostly closed amid the U.S.-Iran war. Reuters reported that Gulf oil exports fell to
      about 9.71 million barrels per day from about 25.13 million bpd in February, while
      floating storage rose above 50 million barrels as tankers backed up outside the
      chokepoint.
    details:
      what_happened:
        - "Shipping data showed Gulf exports fell to about 9.71 million bpd from about 25.13 million bpd in February."
        - "Floating storage rose above 50 million barrels as cargoes backed up outside the strait."
      why_it_matters:
        - "Sustained disruption of the Strait of Hormuz threatens a major global oil and LNG transit route, feeding shipping stress and price pressure."
        - "The data showed that the wider U.S.-Iran war was still constraining physical energy flows, not just financial markets."
      uncertainty_notes: []
