Date: '2023-09-02'
Source_URI: Portal:Current events/2023 September 2
Intelligence_Payload:
  Uncategorized:
  - 2023 Eritrean clashes in Tel Aviv
  - Clashes occur in Tel Aviv, Israel, between Eritrean asylum seekers, including
    supporters opponents of the government of Isaias Afwerki, and police, resulting
    in 84 demonstrators and 30 officers injured, with 68 arrested. (BBC News)
  - Russian invasion of Ukraine
  - 2022–2023 western Russia attacks
  - The Russian Defense Ministry says that it has destroyed 281 Ukrainian drones in
    the past week, including 29 over western Russia. (South China Morning Post)
  - Crimea attacks
  - The Russian Defense Ministry says that it has thwarted attacks on the Crimean
    Bridge by destroying a Ukrainian boat. (Reuters)
  - Belarus says a Polish military Mi-24 military helicopter breached its airspace,
    flying 1.2 km into its territory. (Reuters)
  - More than 2,000 troops from the CSTO security alliance begin military exercises
    in Belarus. (AP)
  - 2023 Sudan conflict
  - An airstrike in the Kalakla al-Qubba neighbourhood of southwest Khartoum, Sudan
    killed 21 civilians and severely injured six. (Sudan War Monitor)
  - 2023 Greece wildfires
  - Greek firefighters rescue a group of 25 migrants trapped in a forest in the Evros
    region as flames from a wildfire approached. (AP)
  - The Greek Coast Guard rescue more than 150 people, including several children,
    who were heading in small boats from Turkey to the nearby eastern Aegean Sea islands.
    (AP)
  - At least 10 people are killed after lightning strikes across Odisha, India. (The
    Hindu)
  - Seven people are killed after a van collided head-on with a truck in Thatta district,
    Pakistan. (Tribune)
  - Two people are killed after a roof collapse in Erode, India. (The Hindu)
  - Corruption in Ukraine
  - A Ukrainian court places billionaire Ihor Kolomoyskyi under arrest over fraud
    and money laundering charges as part of corruption-related activities. (Al Jazeera)
  - Two people are killed and six others are wounded in a shooting at a wedding reception
    in Ottawa, Ontario, Canada. (Ottawa Citizen)
  - Cypriot police arrest 13 people after a mob smashes storefronts and set numerous
    trash bins on fire during an anti-immigration march in Limassol. (AP)
  - 2023 Gabonese coup d'état
  - Gabon's military government reopens the country's borders, three days after they
    were closed. (AFP via Manila Bulletin)
  - India launches Aditya-L1, its first solar observation mission, to observe the
    solar corona, photosphere and chromosphere, and to study solar winds and solar
    flares and their effect on Earth and near-space weather. (BBC News) (NOS)
