Date: '2023-09-17'
Source_URI: Portal:Current events/2023 September 17
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - 2023 Ukrainian counteroffensive
  - Ukraine says that it has recaptured the village of Klishchiivka, near Bakhmut,
    in Donetsk Oblast. (Reuters)
  - 2023 United Auto Workers strike
  - United Auto Workers president Shawn Fain rejects an offer of a 21% wage increase
    from Chrysler parent company Stellantis as the strike enters its third day. (CBS
    News)
  - A United States Marine Corps pilot ejects from his F-35 fighter jet above North
    Charleston, South Carolina. The pilot lands safely, while the aircraft is missing,
    with search efforts focused on two nearby lakes. (AP)
  - North Korea–Russia relations
  - The 2023 North Korea–Russia summit concludes, with Kim Jong Un departing from
    Artyom, located north of the port of Vladivostok. (CNN)
  - 2023–24 NHL season
  - In ice hockey, Mike Babcock resigns as the head coach of the Columbus Blue Jackets
    before coaching a game for the team, amidst an NHL Players Association investigation
    into his alleged requests for personal photos of players. (AP)
  - Team Jumbo–Visma wins all three Grand Tours of the 2023 UCI World Tour, after
    Sepp Kuss wins the 2023 Vuelta a España. (AD)
