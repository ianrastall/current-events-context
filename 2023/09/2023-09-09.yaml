Date: '2023-09-09'
Source_URI: Portal:Current events/2023 September 9
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Zaporizhzhia Nuclear Power Plant crisis
  - The International Atomic Energy Agency warns of a nuclear threat at the Zaporizhzhia
    Nuclear Power Plant after explosions were heard near the plant amidst the Ukrainian
    counteroffensive. (PBS News)
  - 80th Venice International Film Festival
  - The film Poor Things, directed by Yorgos Lanthimos, wins the 2023 Golden Lion
    award at the Venice International Film Festival. (Euronews)
  - White Terror (Taiwan)
  - Taiwanese President Tsai Ing-wen restores the reputations of victims of the White
    Terror repression, which was carried out by the Kuomintang government from the
    1940s to the 1980s. The ceremony, held in Taipei, marked the first nationwide
    event that addresses crimes committed during the White Terror. (Taipei Times)
  - 2023 Artsakhian presidential election
  - The National Assembly of the breakaway state Republic of Artsakh elects Samvel
    Shahramanyan as its new president. (RFE/RL)
  - 2023 Maldivian presidential election
  - Maldivians vote for a president. No candidate receives a 50% majority, so incumbent
    President Ibrahim Mohamed Solih will face opposition candidate and Malé mayor
    Mohamed Muizzu in the second round on September 30. (Reuters)
  - 2023 WTA Tour
  - 2023 US Open
  - In tennis, American Coco Gauff wins the women's singles title at the 2023 US Open,
    her first major singles title, after defeating Belarusian Aryna Sabalenka in the
    final. (CBS Sports)
