Date: '2023-09-10'
Source_URI: Portal:Current events/2023 September 10
Intelligence_Payload:
  Uncategorized:
  - 2023 Ain al-Hilweh clashes
  - A ceasefire is signed between Fatah and Islamist groups after three days of clashes
    in the Ain al-Hilweh Palestinian refugee camp in Sidon District, Lebanon, which
    killed five people and injured 52 others. (AP)
  - 2023 Sudan conflict
  - Battle of Khartoum
  - At least 43 people are killed and dozens more are injured by an airstrike in Khartoum,
    Sudan. (AP)
  - Russian invasion of Ukraine
  - Crimea attacks
  - Russia says its air defence shot down three Ukrainian drones over Crimea, one
    in the northwest and two in the west of the peninsula. (Reuters)
  - Two foreign aid workers are killed and two others are injured by Russian shelling
    near Chasiv Yar, Donetsk Oblast. (AP)
  - At least 28 people are killed during a boat accident in Mokwa, Niger State, Nigeria.
    The boat carrying more than 100 passengers, mostly women and children, capsized
    along the Niger River. (Al Jazeera)
  - 2023 Malagasy presidential election
  - Madagascar President Andry Rajoelina resigns in order to run for re-election,
    in accordance with the country's constitution. Rajoelina sent his resignation
    letter to the High Constitutional Court following confirmation of his candidature.
    (Reuters)
  - Censorship by Facebook
  - Meta deletes Al Jazeera Arabic presenter Tamer Almisshal's Facebook profile a
    day after a programme aired an investigation into Meta’s censorship of Palestinian
    content. (Al Jazeera)
  - 2023 FIBA Basketball World Cup
  - Germany wins its first FIBA Basketball World Cup, beating Serbia 83–77 in the
    final. Dennis Schröder is named the tournament's Most Valuable Player. (AP)
  - Canada earns its first medal at the FIBA Basketball World Cup and its first medal
    at a global men's basketball tournament since 1936, after defeating the United
    States 127–118 after overtime in the bronze medal game. (AP)
  - Rubiales affair
  - Royal Spanish Football Federation president Luis Rubiales announces his resignation
    after having acted inappropriately during the 2023 FIFA Women's World Cup final.
    (AFP via France 24)
