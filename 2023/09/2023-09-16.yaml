Date: '2023-09-16'
Source_URI: Portal:Current events/2023 September 16
Intelligence_Payload:
  Uncategorized:
  - 2023 Atlantic hurricane season
  - Hurricane Lee weakens into a post-tropical cyclone before making landfall in Nova
    Scotia, Canada. (NBC News)
  - A military plane crashes near Turin, Piedmont, Italy, killing a 5-year-old child
    and injuring four people, including the pilot. (NOS)
  - 2023 Manaus Aerotaxi Embraer EMB-110 Bandeirante crash
  - Fourteen people are killed in a plane crash in Barcelos, Amazonas, Brazil. (BBC
    News)
  - A major fire at the National Museum of Indonesia in Jakarta causes extensive damage,
    including the collapse of roof and outer wall. An unknown number of pre-colonial
    artifacts are damaged or destroyed. (The Diplomat)
  - Islamist insurgency in the Sahel
  - Alliance of Sahel States
  - The military governments of Niger, Mali, and Burkina Faso sign a mutual defence
    pact named the Alliance of Sahel States in case of internal rebellion or external
    military aggression. (Reuters)
  - Mahsa Amini protests
  - Human rights organizations say that Iranian police have arrested the father of
    Mahsa Amini on the first anniversary of her death. (Reuters)
  - Mexican drug war
  - Ovidio Guzmán López, the son of Joaquín "El Chapo" Guzmán, is extradited to the
    United States from Mexico on drug trafficking and money laundering charges. (Reuters)
  - Storm Daniel
  - Libya's top prosecutor announces a probe into the dam collapses which led to the
    floods that killed more than 11,000 people. (AP)
  - Texas Attorney General Ken Paxton is acquitted by the Texas Senate in his impeachment
    trial. (Texas Tribune)
