  - Tashkent explosion
  - One person is killed and 162 others are injured in an explosion at a warehouse
    near the airport in Tashkent, Uzbekistan. (Al Jazeera)
  - 2023 dengue outbreak in Bangladesh
  - Nearly 1,000 people have died of dengue fever in Bangladesh in recent weeks, in
    the country's most severe outbreak of the disease so far. (BBC News)
  - A bluetongue disease outbreak in the Netherlands has spread to 319 sheep and cattle
    farming companies. (NOS)
  - 2023 Rotterdam shootings
  - Three people are killed during two shootings and an arson attack at a teaching
    hospital and a nearby private home in Rotterdam, Netherlands. (Reuters)
  - Crime in Sweden
  - A woman is killed in her house in Uppsala, Sweden, during a bombing attack intended
    to target the neighbor next door, while two men were killed and another was injured
    during two shootings the day before in Stockholm and Jordbro, as deadly violence
    linked to a feud between criminal gangs escalates. (Euronews)
