Date: '2023-09-30'
Source_URI: Portal:Current events/2023 September 30
Intelligence_Payload:
  Uncategorized:
  - Papua conflict
  - Five Free Papua Movement militants are killed during a shootout with Indonesian
    soldiers and police officers in the Papua province. (AP)
  - Armenia–Azerbaijan border crisis
  - Azerbaijan accuses Armenia of using a sniper to kill one of its soldiers in the
    city of Kalbajar. Armenia denies involvement in the incident. (The Star)
  - Mexican drug war
  - Two Morena party pollsters are killed and a third is kidnapped in Juárez, Chiapas,
    Mexico. A note was left on the bodies from the Jalisco New Generation Cartel,
    threatening the government. (CBS News)
  - 2023 Maldivian presidential election
  - Maldivians vote in a run-off election between candidates Mohamed Muizzu and Ibrahim
    Mohamed Solih. (Reuters)
  - 2023 Slovak parliamentary election
  - Slovaks elect the 150 members of the National Council. (Reuters)
  - 2024 United States federal budget
  - The U.S. House of Representatives and U.S. Senate pass a 45-day stopgap measure
    bill backed by House Speaker Kevin McCarthy. President Joe Biden signs the bill,
    averting a government shutdown. (CNN)
  - Aftermath of the 2023 Guatemalan general election
  - The office of the Attorney General of Guatemala seizes the tally sheets of votes
    from the general election and the runoff. The judges of the Supreme Electoral
    Tribunal opposed the seizure but were attacked by police and prosecutors. Electoral
    tribunal officials were also intimidated. (AP) (Prensa Libre)
  - 2023 AFL season
  - Collingwood defeats the Brisbane Lions by four points to win the 2023 AFL Grand
    Final. (The Guardian)
