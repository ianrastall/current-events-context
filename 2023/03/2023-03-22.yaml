Date: '2023-03-22'
Source_URI: Portal:Current events/2023 March 22
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine
  - Zaporizhzhia residential building airstrikes
  - A Russian missile strike on an apartment building in the city of Zaporizhzhia
    kills a civilian and injures 25 others. (AP)
  - A Russian drone strike in Rzhyshchiv kills at least nine civilians and injures
    29 others. (Yahoo)
  - Yemeni Civil War
  - Ten Yemeni soldiers are killed by Houthi Islamists in Harib District, Marib Governorate,
    despite a truce reached between the government and the rebels on Monday. (AFP
    via France 24)
  - Jihadist insurgency in Burkina Faso
  - Ten volunteers and four Burkina Faso Armed Forces soldiers are killed during an
    ambush in Centre-Nord Region, Burkina Faso. Twenty attackers are killed. (France24)
  - One person is killed after a four-storey building collapses in Doha, Qatar. (AP)
  - 2023 vote of no confidence in the government of Pedro Sánchez
  - Spanish Prime Minister Pedro Sánchez's government survives a second vote of no
    confidence presented by far-right party Vox, with independent Ramón Tamames as
    its candidate. (El Periódico)
  - Argentine mathematician Luis Caffarelli wins this year's Abel Prize "for his seminal
    contributions to regularity theory for nonlinear partial differential equations
    including free-boundary problems and the Monge–Ampère equation". He becomes the
    first Latin American to win this prize. (The Guardian)
  - American engineer Robert Metcalfe wins this year's Turing Award for the invention
    of Ethernet. (Reuters)
