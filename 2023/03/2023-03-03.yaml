  - State v. Murdaugh
  - Former lawyer Alex Murdaugh is sentenced to two life sentences in prison to run
    consecutively without the possibility of parole for the murder of his wife Maggie,
    and their 22-year-old son, Paul, on June 7, 2021. (MSNBC)
