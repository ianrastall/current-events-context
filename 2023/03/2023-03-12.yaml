Date: '2023-03-12'
Source_URI: Portal:Current events/2023 March 12
Intelligence_Payload:
  Uncategorized:
  - Iran–Israel conflict during the Syrian civil war
  - Israeli airstrikes at a weapons depot in Masyaf, Hama Governorate, Syria, kill
    a Syrian soldier and two pro-Iranian militants. (Arab News)
  - Israeli–Palestinian conflict
  - Israeli soldiers kill three Palestinian gunmen near Nablus, West Bank, after coming
    under fire. (The Guardian)
  - Kivu conflict
  - Nineteen people are killed by suspected Islamist insurgents in Kirindera, North
    Kivu, Democratic Republic of the Congo. (Reuters)
  - 95th Academy Awards
  - At this year's Oscars, Everything Everywhere All at Once wins seven awards, including
    Best Actress, Best Supporting Actor, Best Original Screenplay, Best Director,
    and Best Picture. (Variety)
  - Malaysian actress Michelle Yeoh becomes the first Asian to win the Best Actress
    award for her performance in Everything Everywhere All at Once. (AFP via ABS-CBN
    News)
  - March 2023 United States bank failures
  - Collapse of Signature Bank
  - New York-based commercial bank Signature Bank is closed down after a bank run
    on its deposits, and is taken into receivership by the Federal Deposit Insurance
    Corporation. (Reuters)
  - Transport in Saudi Arabia
  - Saudi Crown Prince Mohammed bin Salman formally announces the establishment of
    Riyadh Air, a new flag carrier airline of Saudi Arabia. (Reuters)
  - At least 22 people are killed and two others are reported missing after a boat
    heading to Mayotte capsizes off the coast of Madagascar. (Reuters)
  - Thirty people are reported missing after a boat carrying migrants from Libya capsizes
    while crossing the Mediterranean Sea. (Reuters)
