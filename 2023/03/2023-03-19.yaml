Date: '2023-03-19'
Source_URI: Portal:Current events/2023 March 19
Intelligence_Payload:
  Uncategorized:
  - Central African Republic Civil War
  - Nine Chinese nationals are killed and two others are injured when suspected rebels
    storm the Chinese-run Chimbolo gold mine in Ouaka, Central African Republic. (AP)
  - Acquisition of Credit Suisse by UBS
  - UBS Group AG, supported by the Swiss government, reaches a deal to merge with
    Credit Suisse as the latter faces imminent insolvency. (BBC News)
  - At least 19 people are killed and 25 others are injured when their bus falls into
    a ditch in Madaripur District, Dhaka Division, Bangladesh. (WION)
  - Millions of tons of Sargassum inundate coastlines around the Caribbean. (The Guardian)
  - Russian invasion of Ukraine
  - Russian president Vladimir Putin visits Mariupol, Donetsk Oblast, in Russian-occupied
    Ukraine, for the first time since the invasion began. (AP)
  - 2023 Montenegrin presidential election
  - Incumbent president Milo Đukanović wins the first round and will face Jakov Milatović
    in the runoff on 2 April. (Reuters)
  - 2023 Kazakh legislative election
  - Ruling party Amanat wins the election to the Mäjilis. (Reuters)
