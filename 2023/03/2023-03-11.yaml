Date: '2023-03-11'
Source_URI: Portal:Current events/2023 March 11
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - A security guard is killed and eight other people are injured by an explosion
    in Mazar-i-Sharif, Balkh Province, Afghanistan. (Reuters)
  - Herder–farmer conflicts in Nigeria
  - Sixteen people are killed by Fula gunmen at a police checkpoint in Zangon Kataf,
    Kaduna State, Nigeria. (AP)
  - Indonesia's Merapi volcano erupts. Eight villages have been affected by volcanic
    ash. (Reuters) (AFP)
  - Eight miners are killed in Geita Region, Tanzania, when their pit is flooded with
    rainwater. (Xinhua)
  - At least eight people are killed in a collision between two boats near Black's
    Beach in San Diego, California, United States. (Los Angeles Times)
  - 14th National People's Congress
  - Li Qiang is elected as Premier of the People's Republic of China, succeeding Li
    Keqiang. (BBC News)
  - 2022–23 FIS Alpine Ski World Cup
  - Mikaela Shiffrin becomes the world's most successful alpine skier with her 87th
    World Cup victory. (Reuters)
