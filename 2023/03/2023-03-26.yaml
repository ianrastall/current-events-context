Date: '2023-03-26'
Source_URI: Portal:Current events/2023 March 26
Intelligence_Payload:
  Uncategorized:
  - Mediterranean Sea migrant smuggling
  - At least 29 sub-Saharan Africans are killed when two boats sink off the coast
    of Tunisia. (France 24)
  - Tornado outbreak of March 24–26, 2023
  - U.S. President Joe Biden approves an emergency declaration for the state of Mississippi
    following a storm that killed at least 26 people and caused significant damage,
    granting federal aid to affected areas of the state. Carroll, Humphreys, Monroe,
    and Sharkey counties will be the main recipients. (Reuters)
  - Two people are killed and another is missing after a fire breaks out on an oil
    tanker ship near West Nusa Tenggara, Indonesia. (Reuters)
  - A pipeline leak causes an oil spill at Poole Harbour in Dorset, England, in which
    more than 200 barrels of reservoir fluids, including oil, leak into a Site of
    Special Scientific Interest. The RSPB reported sightings of oiled birds. (BBC
    News)
  - China–Honduras relations
  - Honduras switches its formal diplomatic recognition of "China" from the Republic
    of China to the People's Republic of China. (Reuters)
  - 2023 Cuban parliamentary election
  - Citizens in Cuba head to the polls to elect the members of the National Assembly.
    (Bloomberg via Yahoo! News)
  - 2023 Turkmen parliamentary election
  - Citizens in Turkmenistan head to the polls to elect the 125 members of the Assembly.
    (MenaFN)
  - 2023 Israeli judicial reform protests
  - Israeli Prime Minister Benjamin Netanyahu dismisses Defense Minister Yoav Gallant
    after Gallant called on the government to pause discussions on a controversial
    judicial reform bill. (MSN)
