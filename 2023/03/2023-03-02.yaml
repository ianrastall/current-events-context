Date: '2023-03-02'
Source_URI: Portal:Current events/2023 March 2
Intelligence_Payload:
  Uncategorized:
  - 2022 Russian invasion of Ukraine
  - 2022–23 Western Russia attacks
  - 2023 Bryansk Oblast attack
  - Russia accuses a Ukrainian sabotage group of attacking the villages of Lyubechane
    and Sushany in Bryansk Oblast and taking hostages. However, Ukraine accuses Russia
    of staging a false "provocation". (Reuters)
  - Attacks on civilians in the 2022 Russian invasion of Ukraine
  - A Russian missile strike on an apartment building in the city of Zaporizhzhia
    kills three civilians and injures at least four others, according to Ukrainian
    police. (Reuters)
  - Seven people are killed after a boat carrying migrants sinks off Benghazi, Libya.
    (Dawn)
  - Six people are killed and five others are injured by a methane explosion in Harnai
    District, Balochistan, Pakistan. (AP)
  - Six people are killed after a truck rams into a car in Faridabad, India. (The
    Indian Express)
  - Twenty people are injured by severe turbulence on a Condor flight from Frankfurt,
    Germany, to Mauritius. (AP)
  - Brazil–Israel relations
  - Israel criticizes the government of Brazil for allowing two Iranian warships to
    dock in Rio de Janeiro and urges Brazil to send the warships away calling it a
    "dangerous and regretful development". (Reuters)
  - State v. Murdaugh
  - Former lawyer Alex Murdaugh is found guilty on all counts in the for the murder
    of his wife, Maggie, and their 22-year-old son, Paul, on June 7, 2021. He was
    sentenced the next day. (CNN)
  - 2023 Vietnamese presidential election
  - The National Assembly of Vietnam elects Võ Văn Thưởng as the country's new president,
    succeeding Nguyễn Xuân Phúc. (Nikkei Asia)
