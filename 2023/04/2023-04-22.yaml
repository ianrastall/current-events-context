Date: '2023-04-22'
Source_URI: Portal:Current events/2023 April 22
Intelligence_Payload:
  Uncategorized:
  - Mali War
  - At least nine civilians are killed and 60 others are injured in a triple suicide
    bombing outside the airport in Sévaré, Mopti Region, Mali. (Reuters)
  - A Malian Air Force attack helicopter crashes into a residential area of Bamako
    while returning from operations against jihadists near the Mauritanian border.
    Three people on board are killed and six on ground injured. (MENA FN) (AA France)
  - War in Sudan (2023)
  - Evacuation of foreign nationals during the War in Sudan (2023)
  - France and Saudi Arabia announce that they will evacuate their citizens from Sudan,
    joining the United States and the United Kingdom in doing so. (The Washington
    Post) (Gulf News)
  - Two people are killed and twelve others are injured in a fire in a restaurant
    in Madrid, Spain. (Reuters)
  - Japan–North Korea relations
  - Japan places its Self-Defense Forces on high alert as defence minister Yasukazu
    Hamada says that Japan could potentially shoot down the North Korean reconnaissance
    satellite that is expected to be launched by Pyongyang if it falls in Japanese
    territory. (Reuters)
  - Germany–Russia relations
  - Russia announces the expulsion of several German diplomatic personnel in a tit-for-tat
    decision following the expulsion of Russian personnel from Germany. (RFE/RL)
