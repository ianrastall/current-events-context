Date: '2023-04-01'
Source_URI: Portal:Current events/2023 April 1
Intelligence_Payload:
  Uncategorized:
  - In India, a new income tax law comes into effect. It is a significant change on
    the old 1961 statute, and contains a controversial "angel tax" provision seeking
    to capture some of the income entering the country from foreign investors funding
    India's start-ups. (Bloomberg Tax)
  - Tornado outbreak of March 31 – April 1, 2023
  - The toll from yesterday's tornado outbreak rises to 32 people dead and at least
    90 injuries, especially in the states of Arkansas and Illinois. (CNN)
  - Two people are killed and another is injured after a hot air balloon catches fire
    near Teotihuacan, State of Mexico, Mexico. (AP)
  - Russia assumes the Presidency of the United Nations Security Council as part of
    the standard monthly rotation among the council's 15 members. (BBC News)
  - Professor Alan Jamieson of the University of Western Australia's Minderoo-UWA
    Deep Sea Research Centre announces that his team has captured footage of a snailfish
    species, Pseudoliparis belyaevi, swimming at in the Izu–Ogasawara Trench off Japan's
    southern coast. This is the lowest depth recorded for any fish, and closest to
    the estimated maximum depth possible for fish to survive. (BBC News)
