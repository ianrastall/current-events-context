  - Paraguayans head to the polls to elect the next president. (AFP via France 24)
  - 2023 Stanley Cup playoffs
  - The Boston Bruins, who had previously set new NHL records for wins and points
    in a single season, are upset in the first round of the playoffs by the Florida
    Panthers, losing game 7 in overtime after having led the series 3 games to 1.
