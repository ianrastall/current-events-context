Date: '2023-04-12'
Source_URI: Portal:Current events/2023 April 12
Intelligence_Payload:
  Uncategorized:
  - Mali war
  - The village of Tidermène is captured by the Islamic State in the Greater Sahara.
    (Defense Post)
  - NPR announces that it will no longer use Twitter after the social media site labeled
    it and the BBC as "government-funded media". Shortly thereafter, Twitter CEO Elon
    Musk announces that the labelling of the BBC will be changed to "publicly-funded
    media". (BBC News) (CNBC)
  - Twenty-five people are killed and others are missing after a boat carrying migrants
    sinks off the coast of Tunisia. (Al Jazeera)
  - Saudi Arabia–Syria relations
  - Syrian foreign minister Faisal Mekdad meets with Saudi foreign minister Prince
    Faisal bin Farhan Al Saud in Riyadh, Saudi Arabia, in the first such visit between
    the two countries since the start of the Syrian civil war in 2011 in order to
    discuss the security situation in Syria and the return of Syrian refugees. (Al
    Jazeera)
  - Drug liberalization
  - The Federal Ministers Karl Lauterbach and Cem Özdemir present key points on the
    partial legalisation of cannabis in Germany. (Taz)
  - Four soldiers are killed in a mass shooting at a military base in Bathinda, Punjab,
    India. Authorities say that the shooting is not terror-related. (Al Jazeera)
