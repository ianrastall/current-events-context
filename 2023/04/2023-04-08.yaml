Date: '2023-04-08'
Source_URI: Portal:Current events/2023 April 8
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Khyber Pakhtunkhwa
  - 2023 Khyber blast
  - Two soldiers are killed after their vehicle hits a roadside bomb in Khyber Pakhtunkhwa,
    Pakistan. In a separate incident, a police officer is killed and two more injured
    during a grenade attack in Swabi. The Pakistani Taliban claims responsibility
    for both attacks. (Associated Press)
  - At least ten people are killed in Migori, Kenya, when a truck loses control and
    crashes into pedestrians. (Pulse)
  - Chad expels German ambassador Gordon Kricke after he criticises the government
    delaying the 2024 election. (Deutschlandfunk) (Al Jazeera)
  - 2023 Pentagon document leaks
  - Two sets of classified documents of the United States relating to the Russo-Ukrainian
    War are leaked online. The leaks also include intelligence that the United States
    holds on other nations, including North Korea, China, Iran, and the United Arab
    Emirates. (CNN)
  - The documents are compiled from multiple sources, including the Central Intelligence
    Agency, National Security Agency, and the Bureau of Intelligence and Research
    of the State Department. (CNN)
  - Police in Iran announce the installment of cameras in public places to identify
    and penalize women who do not observe dressing codes for hijabs, while also urging
    citizens to confront women who are not sufficiently covered. (Reuters)
