  - Death of Ana Clara Benevides
  - A woman dies at the first of American singer Taylor Swift's concerts at the Estádio
    Olímpico Nilton Santos in Rio de Janeiro, Brazil, during a day when temperatures
    reached . Swift postpones her second concert in the city due to the heat. (The
    Guardian) (AFP via Manila Bulletin)
  - France's Horizons party suspends Loire-Atlantique Senator Joël Guerriau following
    his arrest and formal charge for allegedly administering a date rape drug to MP
    Sandrine Josso, with the Independents caucus in the Senate also suspending him
    and initiating expulsion procedures. (AFP via The Straits Times)
  - 2023 Democratic Republic of the Congo general election
