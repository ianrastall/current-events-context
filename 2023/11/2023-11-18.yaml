  - War in Sudan
  - Battle of Khartoum
  - The Jebel Aulia Bridge, part of the Jebel Aulia Dam complex, is destroyed amid
    heavy fighting in Jabal Awliya, although the dam itself remains intact. It is
    the second bridge in Khartoum to be destroyed in the past week. (Sudan Tribune)
  - Miss Universe 2023
  - Miss Nicaragua Sheynnis Palacios is crowned Miss Universe by her predecessor,
    R'Bonney Gabriel, marking the country's first win in the pageant's history. (CNN)
  - 2023 Uttarakhand tunnel collapse
  - Efforts to rescue 40 workers trapped in a collapsed tunnel in Uttarakhand, India,
    are suspended due to concerns of further cave-ins. (AFP via Dawn)
