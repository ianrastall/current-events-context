Date: '2023-12-10'
Source_URI: Portal:Current events/2023 December 10
Intelligence_Payload:
  Uncategorized:
  - War in Sudan
  - Battle of Khartoum
  - Two people are killed and seven others are wounded in an attack on a Red Cross
    humanitarian aid convoy in Khartoum, Sudan. (BBC News)
  - Abdel Fattah al-Burhan and Hemedti agree to meet in person before the end of the
    year to end the war between the Rapid Support Forces and the Sudanese Armed Forces
    in Sudan. (AP)
  - Yemeni civil war
  - French Navy frigate Languedoc shoots down two drones over the Red Sea that were
    launched from Yemen, according to the French Armed Forces Ministry. (Reuters)
  - A fire at a work camp in Pará, Brazil, kills nine workers. (ABC News)
  - A nationwide power outage occurs in Kenya as a result of possibe sabotage of the
    country's electrical grid, according to Transport Minister Kipchumba Murkomen.
    (BBC News)
  - Inauguration of Javier Milei
  - Javier Milei is sworn in as the President of Argentina. (NPR)
  - After holding an impromptu online poll, X owner Elon Musk restores the suspended
    accounts of far-right conspiracy theorist and radio show host Alex Jones, as well
    as his website InfoWars. More than 2 million people voted in the poll. (CNN)
