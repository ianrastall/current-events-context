Date: '2023-12-27'
Source_URI: Portal:Current events/2023 December 27
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Russian strikes against infrastructure
  - Russian drone and artillery strikes kill at least five people and cause power
    outages for around 70% of households in Kherson, according to Kherson governor
    Oleksandr Prokudin. (AP)
  - Renewable energy in Colombia
  - Colombia approves regulations that encourage local communities and indigenous
    groups to produce energy using renewable sources and sell the energy to the national
    grid. (BBC News)
  - Thousands of union members and activists in Argentina protest a decree from President
    Javier Milei imposing deregulation and austerity measures meant to revive the
    country's economy. (AP)
  - Death of Ana Clara Benevides
  - A forensics report by Rio de Janeiro's Forensic Medical Institute in Brazil finds
    that hyperthermia led to cardiorespiratory arrest that killed Swiftie Benevides.
    It says she did not have preexisting conditions or substance abuse that could
    have led to her death. (Reuters)
  - At least 10 people are killed by thunderstorms and strong winds in the eastern
    Australian states of Queensland and Victoria. (ABC News Australia)
  - A Hellenic Air Force T-2 Buckeye trainer jet crashes in a rural area near Kalamata,
    Greece, killing the pilot. (AP)
