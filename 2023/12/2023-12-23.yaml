  - Nigerian bandit conflict
  - At least 113 people are killed and over 300 others are injured following coordinated
    attacks by local "bandits" on more than 20 communities in Bokkos and Barkin Ladi,
    Plateau State, with hostilities continuing into early Monday. (AFP via The Hindu)
  - Yemeni Crisis
  - United Nations Special Envoy for Yemen Hans Grundberg announces that the conflicting
    parties agree to a new ceasefire and to participate in a UN-led peace process.
    (AFP via The Philippine Star)
  - 2024 Iran–Israel conflict, Israel–Hezbollah conflict
  - Israeli launch airstrikes on Kfar Kila and shell Deir Mimas, Lebanon with an Al-Manar
    cameraman injured. (LOrientleJour)
  - Human rights in India
  - Kashmir conflict
  - Locals in Indian-controlled Kashmir say the Indian Army tortured three detainees
    to death, with five other surviving detainees reporting that they were also subjected
    to torture. (AP)
  - 2024 Russian presidential election
  - The Central Election Commission rejects journalist Yekaterina Duntsova's candidacy
    for president, citing errors in Duntsova's submitted documents. (AFP via France
    24)
  - Israel–Hamas war protests
  - The Arabic edition of Wikipedia is taken offline for one day in protest of the
    ongoing war in Gaza. (Roya News)
