Intelligence_Payload:
  Uncategorized:
  - Israel–Hamas war
  - 2023 attack on the Chem Pluto
  - A drone launched from Iran strikes the Liberian-flagged, Japanese-owned chemical
    tanker Chem Pluto in the Indian Ocean. (Reuters)
  - Kurdish–Turkish conflict
  - Seventeen PKK militants and 12 Turkish soldiers are killed during two days of
