Date: '2023-12-25'
Source_URI: Portal:Current events/2023 December 25
Intelligence_Payload:
  Uncategorized:
  - Myanmar civil war
  - Operation 1027
  - The Ta'ang National Liberation Army of the Three Brotherhood Alliance captures
    the town of Mantong in northern Shan State. (The Irrawaddy)
  - Syrian civil war
  - Iran–Israel conflict during the Syrian civil war
  - High-ranking Iranian general Sayyed Razi Mousavi is killed in an Israeli airstrike
    in Syria. (BBC News)
  - New People's Army rebellion
  - Nine New People's Army rebels are killed by the Philippine Armed Forces during
    clashes near Malaybalay, Bukidnon, amid a unilateral truce declared by the communist
    rebels. (AFP via SCMP)
  - Turkish–Kurdish conflict
  - Twenty-six Kurdish separatist militants and eight civilians are killed by airstrikes
    launched by Turkey in the autonomous region of Rojava in Syria. (AP)
  - War in Sudan
  - Local leaders and government officials in eastern Sudan call on the general population
    to mobilize and prepare for potential Rapid Support Forces attacks. The Sudanese
    Armed Forces is reportedly arming civilians amid fears that they will not be able
    to stop the militia. (Sudan Tribune)
  - Two people are killed and 29 others are injured in a fire at a residential building
    in Seoul, South Korea. (Xinhua via The Star)
  - Sri Lankan President Ranil Wickremesinghe grants amnesty to more than 1,000 convicts
    and releases them from jails across the country to mark Christmas. (Al Jazeera)
