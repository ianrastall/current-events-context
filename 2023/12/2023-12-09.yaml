  Uncategorized:
  - Mexican drug war
  - Eleven members of La Familia Michoacana and three civilians are killed and seven
    injured during a shootout between criminals and civilian farmers from Texcapilla,
    municipality of Texcaltitlán, Mexico. The attack took place in a soccer camp while
    the criminals threatened civilians if they didn't pay tribute.(AP)(Política Expansión)
  - 2023 Sri Lankan blackouts
  - A nationwide power outage occurs in Sri Lanka due to a system failure. (Reuters)
  - A series of tornadoes hits Tennessee, United States, killing six people. (Reuters)
  - 2023 Guayana Esequiba crisis
  - The United Nations Security Council holds a closed-door meeting on the ongoing
    crisis between Venezuela and Guyana over the Guayana Esequiba region, but takes
    no immediate action. (AP)
  - 2023–24 NBA season
  - 2023 NBA In-Season Tournament
  - In basketball, the Los Angeles Lakers win the inaugural NBA In-Season Tournament
    after defeating the Indiana Pacers 123–109 in the championship game. LeBron James
    is named the tournament's most valuable player. (AFP via ABS-CBN News)
  - 2023 Major League Soccer season
  - MLS Cup 2023
  - In association football, the Columbus Crew win their third MLS Cup in franchise
    history, defeating the defending champions Los Angeles FC 2–1. (Columbus Dispatch)
