Date: '2023-06-17'
Source_URI: Portal:Current events/2023 June 17
Intelligence_Payload:
  Uncategorized:
  - 2023 Sudan conflict
  - Battle of Khartoum
  - The Sudanese Air Force launches airstrikes in Khartoum, killing at least 17 people
    and destroying dozens of homes. The armed forces and the Rapid Support Forces
    agree to a 72-hour ceasefire. (BBC News)
  - Anglophone crisis
  - At least ten people are killed during an offensive by the military of Cameroon
    against separatists in the English-speaking Northwest Region. (Xinhua)
  - 2023 Asia heat wave
  - At least 96 people die during a heat wave, which started two days ago, in the
    states of Uttar Pradesh and Bihar, India. (AP)
  - At least eight people are killed and 19 others are missing after a winter storm
    in Rio Grande do Sul, Brazil. (AP)
  - Seven people are injured after a hot air balloon catches fire in Zug, Switzerland.
    (AP)
  - Saudi Arabia–Yemen relations
  - A Yemenia flight with 277 passengers departs from Sanaa International Airport
    for Jeddah's King Abdulaziz International Airport, the first commercial flight
    from Yemen's primary international airport to Saudi Arabia after a seven-year
    blockade. Additional flights have been scheduled to accommodate thousands of Hajj
    pilgrims. (AFP via France 24)
  - 2023 Gorge Amphitheatre shooting
  - Two people are killed and two others wounded during a mass shooting at the Gorge
    Amphitheatre in Grant County, Washington, United States. (AP)
