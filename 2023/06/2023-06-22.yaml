  - The United States Coast Guard announces that they have discovered debris from
    the OceanGate submersible Titan, which went missing while viewing the wreckage
    of the RMS Titanic. (BBC News)
  - All five people aboard the submersible are presumed dead after it was destroyed
    in an implosion. The United States Navy says that a sound they detected several
    days ago may have been the implosion. (Reuters) (Business Insider)
