Date: '2023-06-15'
Source_URI: Portal:Current events/2023 June 15
Intelligence_Payload:
  Uncategorized:
  - 2021–2023 inflation surge
  - The economy of New Zealand enters a recession after gross domestic product fell
    0.1% in the March quarter, as the central bank raises interest rates to a 14-year
    high. Annual growth also slowed to 2.2%, according to Statistics New Zealand.
    (Reuters)
  - Carberry highway collision
  - Fifteen people are killed and ten more injured in a collision between a semi-trailer
    truck and a bus on Manitoba Highway 1 near Carberry, Manitoba, Canada. (CTV News
    Winnipeg)
  - Eighteen people are injured in an explosion at a firecracker warehouse in Bocaue,
    Bulacan, Philippines. (GMA News)
  - Three people are killed and more than 50 others are injured by a tornado in Perryton,
    Texas, United States. (ABC News)
  - Australia–Russia relations
  - Australian Prime Minister Anthony Albanese announces that the parliament will
    pass a law to prohibit the construction of a new Russian embassy in Canberra due
    to national security concerns regarding the embassy's proposed location adjacent
    to Parliament House. (Al Jazeera)
  - Commons Privileges Committee investigation into Boris Johnson, Partygate
  - An inquiry by the UK Parliament concludes that former Prime Minister Boris Johnson
    lied to Parliament about breaking rules during the COVID-19 outbreak in the country.
    (BBC News)
  - 2023 in archosaur paleontology
  - Researchers from the Natural History Museum in London, United Kingdom, discover
    the fossils of a herbivorous dinosaur species named Vectipelta barretti on the
    Isle of Wight. The ankylosaur, with "blade-like spiked armor", is the first of
    its kind found on the island in 142 years and will be added to the collection
    at Dinosaur Isle for public display during the summer. (CBS News)
