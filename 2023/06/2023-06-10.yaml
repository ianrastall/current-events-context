Date: '2023-06-10'
Source_URI: Portal:Current events/2023 June 10
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - 2023 Mogadishu hotel attack
  - Six civilians and three soldiers are killed and ten others are injured by al-Shabaab
    at a hotel in Lido Beach, Mogadishu. All seven attackers are also killed. (AFP
    via Al Arabiya)
  - Russian invasion of Ukraine
  - 2022–2023 bombing of Odesa
  - Russian forces attack Odesa with drones and missiles, killing three civilians
    and injuring 27 others. (Reuters)
  - At least 25 people are killed and 145 others are injured after heavy rains cause
    houses to collapse across Pakistan. (AP)
  - Five people are killed in an explosion at a missile and explosives factory in
    Ankara, Turkey. (Al Jazeera)
  - Two people are killed after a small plane crashes in the Superstition Mountains
    in Arizona, United States. (AP)
  - Fourteen people are killed in wildfires in north-eastern Kazakhstan, while 316
    others are evacuated, according to the Emergency Situations Ministry. Kazakh President
    Kassym-Jomart Tokayev responds by sacking Emergency Situations Minister Yuri Ilyin.
    (Al Jazeera)
  - Chile reports an outbreak of respiratory syncytial virus, which has killed four
    people. (Reuters)
  - Canada–Ukraine relations
  - List of military aid to Ukraine during the Russo-Ukrainian War
  - Canadian Prime Minister Justin Trudeau announces a $500 million military aid package
    to Ukraine (including 288 AIM-7 missiles) and a $10 million humanitarian aid package
    to help victims of the Kakhovka dam collapse. (CNBC)
  - Foreign relations of Romania
  - Romania recalls its ambassador to Kenya after he used a racist slur during a meeting
    with African Group representatives in Nairobi in April. (Al Jazeera)
  - Two people are killed and two more injured during a mass shooting outside the
    entrance of a subway station in Farsta, Stockholm, Sweden. (AP)
  - 2023 French Open
  - In tennis, defending champion Iga Świątek defeats Karolína Muchová 6–2, 5–7, 6–4
    in the final to win the women's singles title at the 2023 French Open. Świątek
    is the first player to defend the title since Justine Henin in 2007 and the first
    woman to defend a major title since Serena Williams at Wimbledon in 2016. (CNN)
  - 2022–23 UEFA Champions League
  - In association football, Manchester City win their first UEFA Champions League
    title with a 1–0 victory over Inter Milan in the final at the Atatürk Olympic
    Stadium in Istanbul, Turkey, with Rodri scoring the winner. Having also won the
    Premier League and FA Cup that season, City become the second English club to
    complete the continental treble after rivals Manchester United in 1999. (CNN)
    (The Guardian)
