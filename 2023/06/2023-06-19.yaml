Date: '2023-06-19'
Source_URI: Portal:Current events/2023 June 19
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - June 2023 Jenin incursion
  - Six Palestinians are killed and 90 others are injured during an IDF raid in the
    Jenin refugee camp in the occupied West Bank. (Al Jazeera) (Al Jazeera)
  - The mayor of the Nepali capital of Kathmandu, Balen Shah, bans the screenings
    of Indian films after dialogue in the recent epic film Adipurush stated that Sita
    from Hindu mythology was born in India instead of Nepal. (Al Jazeera)
  - Indian low-cost airline IndiGo reaches a deal with European aerospace manufacturer
    Airbus to order 500 A320 aircraft, which will be delivered from 2030 to 2035,
    making it the largest single purchase agreement in commercial aviation. (CNN)
  - Titan submersible implosion
  - The submersible Titan, carrying tourists to the wreck of the RMS Titanic, is reported
    missing, with the United States Coast Guard attempting to locate the missing vessel.
    (CBS News)
  - The United Nations General Assembly unanimously adopts the High Seas Treaty, the
    first treaty aimed towards marine conservation in international waters. (The Hill)
  - A report to the Japanese National Diet revealed that from the end of World War
    II to 1996 over 25,000 Japanese citizens were forcibly sterilized under their
    eugenics law, including two nine-year-olds. (BBC News)
  - Qatar–United Arab Emirates relations
  - The foreign ministries of Qatar and the United Arab Emirates announce that they
    will restore diplomatic relations and reopen their embassies in Doha and Abu Dhabi,
    after relations were suspended six years ago during the Qatar diplomatic crisis.
    (Al Jazeera)
  - Moldovan protests
  - The Constitutional Court of Moldova outlaws the Șor Party after accusations that
    the party was trying to undermine the rule of law during the recent protests in
    Moldova. (Reuters)
  - Commons Privileges Committee investigation into Boris Johnson, Partygate
  - MPs vote to support the report issued by Parliament into former Prime Minister
    Boris Johnson. (BBC News)
  - Six people are killed and eight others injured in a shootout between rival gangs
    on a street in Guayaquil, Guayas, Ecuador. (AFP via France 24)
  - Racism in association football
  - The New Zealand national team abandon their friendly against Qatar at half-time
    in protest at a Qatari player's alleged use of a racial slur against New Zealand
    defender Michael Boxall, who is half Samoan. (CNN)
