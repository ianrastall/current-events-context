  - 2023 East Timorese parliamentary election
  - Citizens in East Timor head to the polls to elect the 65 members of the National
    Parliament. (Reuters)
  - May 2023 Greek legislative election
  - Greeks head to the polls to elect the 300 members of parliament. (AP)
  - Moldovan protests
  - More than 75,000 people gather in Chișinău to demonstrate in favor of Moldova
    joining the EU, following a call for a rally by President Maia Sandu in order
    to outdo anti-government and pro-Russian demonstrations organized by the opposition.
