Date: '2023-05-05'
Source_URI: Portal:Current events/2023 May 5
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Battle of Donbas
  - Battle of Bakhmut
  - Wagner Group leader Yevgeny Prigozhin announces that, due to a lack of ammunition,
    his fighters will leave Bakhmut, Donetsk Oblast, on May 10 and hand over their
    positions to units of the Russian Defense Ministry. (CBC News)
  - Insurgency in Jammu and Kashmir
  - Five Indian soldiers are killed by People's Anti-Fascist Front militants during
    an encounter in Rajouri, Jammu and Kashmir. (The Economic Times)
  - The Senate of Bolivia approves legislation aimed at monetizing gold reserves for
    international trade amid concerns of a shortage of dollars. (Reuters)
  - 2023 Ishikawa earthquake
  - A magnitude 6.3 earthquake strikes Ishikawa Prefecture, Japan, killing one person
    and injuring 22 others. (AP)
  - 2023 Africa floods
  - At least 176 people are killed by floods in the villages of Bushushu and Nyamukubi
    in South Kivu, Democratic Republic of the Congo. (Al Jazeera)
  - COVID-19 pandemic
  - The World Health Organization announces that it no longer considers COVID-19 to
    be a global health emergency, instead classifying it as global health threat.
    (ABC News)
  - Azerbaijan–Iran relations
  - The Iranian government expels four Azerbaijani diplomats in response to recent
    expulsions of Iranian diplomats by the Azerbaijani government. (Tasnim)
  - Capital punishment in Myanmar
  - Myanmar's military junta commutes 38 death sentences to life imprisonment as part
    of a wider amnesty. (Al Jazeera)
  - Belgian authorities arrest an Iraqi al-Qaeda member and charge him with murder,
    terrorism, war crimes, and crimes against humanity, for his role in the killings
    of at least 376 people and the injuring of over 2,300 others more than a decade
    ago in Iraq. (AP)
