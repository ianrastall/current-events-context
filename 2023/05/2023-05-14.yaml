Date: '2023-05-14'
Source_URI: Portal:Current events/2023 May 14
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Battle of Donbas
  - The Russian Ministry of Defence announces the deaths of two of their commanders
    in Bakhmut and the village of Sontsivka west of Donetsk. (Novaya Gazeta Europe)
  - 2023 North Indian Ocean cyclone season
  - Bangladesh and Myanmar order massive evacuations as Cyclone Mocha makes landfall
    in both countries' coastal areas. Six people are killed in Myanmar, with about
    90% of the city of Sittwe being destroyed. (BBC News)
  - At least 26 people are killed when a van crashes into a truck in Tamaulipas, Mexico.
    (AP)
  - 2023 visit by Volodymyr Zelenskyy to Europe
  - Ukrainian President Volodymyr Zelenskyy meets with German Chancellor Olaf Scholz
    in Berlin, Germany. (BBC News)
  - 2023 Turkish presidential election, 2023 Turkish parliamentary election
  - Turks head to the polls to elect a president for a term of five years as well
    as the members of the Grand National Assembly. (Al Jazeera)
  - 2023 Thai general election
  - Thais head to the polls to elect the members of the House of Representatives.
    (Los Angeles Times)
  - Prime Minister of Belarus Roman Golovchenko addresses the nation on the anniversary
    of the 1995 Belarusian referendum, one day after it was reported that President
    Alexander Lukashenko had been hospitalised. (BBC News)
