Date: '2023-05-22'
Source_URI: Portal:Current events/2023 May 22
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - 2022–2023 Western Russia attacks
  - 2023 Belgorod Oblast attack
  - Governor of Belgorod Oblast Vyacheslav Gladkov says that Ukrainian "sabotage groups"
    have entered Grayvoronsky District. Ukrainian media reports that the cross-border
    excursion is being performed by the Russian rebel opposition groups, the Russian
    Volunteer Corps and the Freedom of Russia Legion. The Freedom of Russia Legion
    reports that it has captured the Russian towns of Kozinka and Gora-Podol. A bridge
    crossing the Vorskla near Grayvoron is destroyed in an explosion. (The New York
    Times) (Ukrainska Pravda via Yahoo! News) (Meduza) (Reuters)
  - Israeli–Palestinian conflict
  - Israeli security forces kill three Al Aqsa Martyrs Brigades militants and injure
    six others during a raid in Nablus, West Bank. (ABC News)
  - The Irish Data Protection Commissioner fines Meta, the parent company of Facebook
    and Instagram, a record €1.2 billion ($1.3 billion) for violating General Data
    Protection Regulations protections. (ABC News)
  - 2023 Mahdia school fire
  - At least 19 children are killed in a fire at a secondary school in Mahdia, Guyana.
    (BBC News)
  - Six people are killed and seven others are injured in a fire at a house in Abu
    Dhabi, United Arab Emirates. (AP)
  - Seventeen people are injured by a magnitude 4.9 earthquake near Sarab, East Azerbaijan,
    Iran. (Kuwait Times)
  - Seven people are killed and 18 others are injured after a roof collapses at a
    school during a storm in Phichit province, Thailand. (AP)
  - 2020–2023 H5N1 outbreak
  - Brazil declares an animal health emergency for the next 180 days after the detection
    of the influenza A virus subtype H5N1 for the first time in the country. (Reuters)
  - Papua New Guinea–United States relations
  - Papua New Guinea and the United States sign a security pact that will see American
    troops stationed in the country. (RNZ)
  - Palau–United States relations
  - Palau and the United States sign an agreement to renew the countries' Compact
    of Free Association for an additional 20 years. (Island Times)
  - 2023 Lafayette Square U-Haul crash
  - A U-Haul truck crashes into the north barriers of the Lafayette Square in Washington,
    D.C., United States. (CBS News)
  - Belarusian democracy activist Roman Protasevich is pardoned by president Alexander
    Lukashenko and released from custody. Protasevich had been sentenced to eight
    years in prison on May 3. (Al Jazeera)
