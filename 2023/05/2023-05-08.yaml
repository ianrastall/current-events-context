Date: '2023-05-08'
Source_URI: Portal:Current events/2023 May 8
Intelligence_Payload:
  Uncategorized:
  - 2023 Manipur violence
  - The death toll from the ethnic clashes in Manipur, India, between Metei Hindus
    and Kuki Christians, increases to 60. At least 230 others are injured. (Times
    Now)
  - Sudanese nomadic conflicts
  - Twenty-five people are killed during clashes between the Hausa and Nuba tribes
    in Kosti, Sudan. (AP)
  - Ethiopian civil conflict
  - The head of the Prosperity Party in Haruka Woreda, in Ethiopia's Afar Region,
    is shot and killed alongside his brother by unknown gunmen while returning from
    the city of Adama, Oromia. It is the third assassination targeting the party's
    members in the past month. (Addis Standard)
  - 2023 Rajasthan MiG-21 crash
  - Three women are killed and three others are injured when a MiG-21 aircraft of
    the Indian Air Force crashes into a house in Hanumangarh, Rajasthan. The pilot
    safely ejects from the aircraft. (The Times of India)
  - Blasphemy law in Iran, Capital punishment in Iran
  - Iran executes two men for blasphemy. (DW)
