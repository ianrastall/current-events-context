  - 2023 Crimean–Congo hemorrhagic fever outbreak
  - Namibia declares an outbreak after a person dies of Crimean–Congo hemorrhagic
    fever in Windhoek. (Reuters)
  - 2023 Cardiff riot
  - Rioting occurs in Ely, Cardiff, Wales, United Kingdom, after two teenage boys
    were killed when their e-bike collided with a bus as they were being pursued by
    police. (BBC News)
