Date: '2023-07-15'
Source_URI: Portal:Current events/2023 July 15
Intelligence_Payload:
  Uncategorized:
  - Iran–Israel proxy conflict, Israel–Hezbollah conflict
  - IDF fires warning shots and uses riot dispersal implements on 18 people entailing
    journalists and parliamentarian member Qassem Hashem, a member of the Lebanese
    Arab Socialist Ba’ath Party that crossed the Lebanese border walking 80 meters
    into Israeli-occupied Shebaa Farms/Mount Dov region and walking up to Israel’s
    border barrier, according to Ali Shoeib, a Hezbollah-affiliated correspondent.
    (Times Of Israel)
  - 2023 South Korea floods
  - Thirty-seven people are killed, several others are missing, and many are injured
    in South Korea when torrential rains cause landslides and the overflow of a dam
    in North Chungcheong, prompting the evacuation of over 4,700 people nationwide.
    Prime Minister Han Duck-soo calls for the deployment of the military to conduct
    search and rescue operations. (AP)
  - A wildfire prompts the evacuation of over 2,000 residents on La Palma, Canary
    Islands, Spain, decimating around 4,500 hectares and destroying about a dozen
    homes. (AP)
  - A fire breaks out and destroys the Royal Albion Hotel, a 196-year-old Grade II*
    listed building, in Brighton and Hove, England, United Kingdom. (Sky News) (iNews)
  - 2023 European heat waves
  - The Italian health ministry issues an "extreme" health risk warning for 16 cities,
    including Florence and Rome, as the European Space Agency reports that potential
    record-breaking temperatures of up to could be reached. (CNN)
  - North Korea–Russia relations
  - Russia announces that it will investigate whether the North Korean Hwasong-18
    missile landed in the country's exclusive economic zone. (Reuters via NBC News)
  - South Korea–Ukraine relations
  - South Korean President Yoon Suk-yeol makes an unannounced visit to Kyiv and meets
    with Ukrainian President Volodymyr Zelenskyy, announcing that South Korea will
    pledge US$150 million in additional aid to Ukraine. (AP via The Guardian)
  - Four people are killed in a mass shooting in Hampton, Georgia, United States.
    (Metro) (The New York Times)
  - 2023 WTA Tour
  - 2023 Wimbledon Championships
  - In tennis, Markéta Vondroušová of the Czech Republic defeats Ons Jabeur of Tunisia
    in the final, 6–4, 6–4 to win the women's singles title at the 2023 Wimbledon
    Championships, becoming the first unseeded player in history to win the Wimbledon
    title. (AFP via ABS-CBN News)
