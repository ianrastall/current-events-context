Date: '2023-07-01'
Source_URI: Portal:Current events/2023 July 1
Intelligence_Payload:
  Uncategorized:
  - Nahel Merzouk protests
  - Riots continue across France. More than 1,300 people have been arrested, and 79
    police officers have been injured. (BBC News)
  - Looters raid a gun shop in Marseille, stealing eight hunting rifles and ammunition
    before police intervene. (Sky News)
  - President Emmanuel Macron cancels a state visit to Germany, which would have been
    the first state visit in 23 years. (CBS News)
  - 2023 Western North America heat wave
  - Authorities announce that more than 100 people have died across Mexico as a result
    of two weeks of heat waves in the country. (Reuters)
  - 2023 Buldhana bus accident
  - At least 25 people are killed when a wedding bus crashes and catches fire in Buldhana
    district, Maharashtra, India. (CNN)
  - Eight people are killed after a fire breaks out in an under-repair nightclub in
    Phnom Penh, Cambodia. (Shine)
  - Four people are injured in a mass shooting in Mississauga, Ontario, Canada. (Global
    News)
  - 2023 East Timorese parliamentary election
  - Xanana Gusmão is sworn in as prime minister of East Timor. (AP)
  - European Space Agency Science Programme
  - The European Space Agency successfully launches the Euclid space telescope to
    study dark matter and dark energy at the second Lagrange point, 1.5 million kilometers
    from Earth. (AFP via ABS-CBN News)
