Date: '2023-07-17'
Source_URI: Portal:Current events/2023 July 17
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - 2023 Crimean Bridge explosion
  - A couple are killed and their daughter is injured by explosions at the Crimean
    Bridge. (Reuters) (The Guardian)
  - Black Sea Grain Initiative
  - The agreement to allow safe passage of grain exports from Ukrainian ports, in
    effect since July 2022, expires following Russia's refusal to renew the deal.
    (Reuters)
  - Afghan conflict
  - Three children are killed and two others are injured when a mortar warhead explodes
    in Dara-i Sufi Payin District, Samangan Province, Afghanistan. (Khaama Press)
  - 2023 Pacific typhoon season
  - Monsoon rains aggravated by Tropical Storm Talim have affected the northern Philippines,
    killing a person during a landslide in Rizal. Nine crew members of a fishing vessel
    who went missing off Camarines Norte are rescued off Camarines Sur. (The Philippine
    Star) (Abante Tonite)
  - 2023 Greece wildfires
  - Two wildfires near the Greek seaside towns of Lagonisi, East Attica, and Loutraki,
    Corinthia, cause significant property damage and prompt the evacuation of thousands.
    The Athens urban area and most of southern Greece are on the second highest level
    of wildfire alert. (AP via ABC News)
  - Fifteen people are killed, six others are injured and thirteen more are missing
    during landslides caused by heavy rains in Quetame, Colombia. (DW)
  - Thirteen people are killed and five others are injured when a building collapses
    in Cairo, Egypt. (Al-Ahram)
  - Five people are killed and seven others are injured when a Cessna 208 aircraft
    crashes into a hangar at an aerodrome in the village of Chrcynno, Poland. (AFP
    via NDTV)
  - The World Health Organization reports that the avian influenza is responsible
    for killing dozens of cats across 13 regions of Poland, marking the first instance
    of the virus affecting a large number of felines over an extensive area. (Global
    News)
  - Political status of Western Sahara, Israel–Morocco relations
  - Israel recognizes Morocco's sovereignty over Western Sahara. (The Jerusalem Post)
  - Shakahola Forest incident
  - The number of people who died in Kenya after following a pastor who ordered them
    to fast to death in order to meet Jesus increases to 403 as the bodies of twelve
    more people are exhumed. (AP)
  - A Kenyan magistrate court acquits former British-based evangelist Gilbert Deya,
    who claimed to aid infertile couples conceive through prayer, due to insufficient
    prosecution evidence connecting Deya to the trafficking of five children between
    1999 and 2004. (AFP via The Manila Times)
  - Singaporean Parliament Speaker Tan Chuan-Jin and backbencher Cheng Li Hui resign
    from the Parliament of Singapore and the ruling People's Action Party after admitting
    to having an extramarital affair. (CNA)
