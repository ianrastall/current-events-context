Date: '2023-07-06'
Source_URI: Portal:Current events/2023 July 6
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - 2022–2023 Russian strikes against Ukrainian infrastructure
  - Russia launches a Kalibr cruise missile attack on Lviv from the Black Sea, killing
    10 civilians and injuring 48 others. Ukrainian forces say that they shot down
    seven of the ten missiles. (Reuters) (Lviv City Council)
  - Arab–Israeli conflict
  - Israel shells Lebanon in response to rocket fire from the Lebanese side of the
    border. (Al Jazeera)
  - The Islamic Revolutionary Guard Corps Navy captures a commercial ship in the Persian
    Gulf involved in smuggling activity. (RFE/RL)
  - Indonesia–Netherlands relations, Foreign relations of Sri Lanka
  - The Dutch government announces plans to repatriate 478 colonial-era artifacts
    to Indonesia and Sri Lanka. (AFP via The Jakarta Post)
  - A large fire on a cargo ship docked at the Port Newark–Elizabeth Marine Terminal
    in the Port of New York and New Jersey, United States, kills two firefighters
    and injures five others. (Reuters)
  - Eight people are killed by a landslide in Shangla District, Khyber Pakhtunkhwa,
    Pakistan. (Reuters)
  - 2023 Asia heat wave
  - The government of Beijing, China, orders employers to suspend outdoor work due
    to extreme temperatures expected to reach . (AP)
  - Geologists predict an imminent eruption of the Fagradalsfjall volcano in Iceland
    due to land uplift and earthquake swarms in the Reykjanes Peninsula. The volcano
    last erupted in 2022. (Iceland Review)
  - Wimbledon school crash
  - Two children are killed and 16 other people are injured when a car crashes into
    a primary school in Wimbledon, London, United Kingdom. (BBC News)
