Date: '2023-07-10'
Source_URI: Portal:Current events/2023 July 10
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine
  - Russian forces strike a residential area in Orikhiv, Zaporizhzhia Oblast, killing
    seven civilians and injuring 11 others, according to Governor Yuriy Malashko.
    (Reuters)
  - Russian military commissariats attacks
  - Stanislav Rzhitsky, deputy chief in charge of military mobilization in the Russian
    city of Krasnodar and commander of the Russian Navy submarine B-265 Krasnodar,
    is shot dead near the city's sports complex. (The Guardian) (Reuters via The Jerusalem
    Post)
  - European Union–United States relations
  - The European Commission and the U.S. government sign a new data communication
    agreement aimed at resolving legal uncertainties that European and American companies
    face when transferring personal data. However, non-profit organization NOYB plans
    to challenge the agreement. (Reuters)
  - European migrant crisis
  - Spain's Maritime Safety and Rescue Society rescues 86 people from a pirogue off
    the Canary Islands after human rights defender Helena Maleno reports that three
    boats carrying around 300 people from Senegal have gone missing since June. (AP
    via VOA)
  - Six people are killed and three others are reported missing after heavy rains
    trigger landslides in Kyushu and Chūgoku, Japan. (The Guardian)
  - Two people are killed and six others are injured when a building catches fire
    in Leishan County, Guizhou, China. (The Guardian)
  - Effects of climate change
  - The World Meteorological Organization reports that the Earth experienced its hottest
    week on record at the beginning of July, attributing the unprecedented temperatures
    to climate change and the early stages of El Niño. (AFP via RFI)
  - In a study published in the medical journal Nature Medicine, researchers from
    the Barcelona Centre for International Health Research and Inserm estimate that
    Europe's record heat waves in 2022 resulted in 61,672 deaths. (AP)
  - Volcanism of Iceland
  - Icelandic volcano Litli-Hrútur begins erupting. (Metro)
  - Enlargement of NATO
  - Sweden–NATO relations
  - Turkish president Recep Tayyip Erdoğan agrees to send Sweden's NATO accession
    protocol to the Grand National Assembly. (AP)
  - China–Solomon Islands relations
  - China and the Solomon Islands sign a cooperation agreement between the People's
    Police and the Royal Solomon Islands Police Force during Prime Minister Manasseh
    Sogavare's official visit to Beijing in an effort to strengthen their "comprehensive
    strategic partnership". (Reuters)
  - North Korea–United States relations
  - North Korea threatens to shoot down any U.S. reconnaissance aircraft breaching
    its airspace following U.S. plans to deploy a ballistic missile submarine near
    Korea. (AFP via France 24)
  - Iran and weapons of mass destruction, Nuclear program of Iran
  - The U.S. Office of the Director of National Intelligence says that Iran is not
    developing a nuclear weapon. However, it also warns that Iran has ramped up activities
    that could help develop one. (AP)
  - School attacks in China
  - Six people, including three children, are killed and another person is injured
    in a mass stabbing at a kindergarten in Lianjiang, Guangdong. The suspect is detained
    by the police. (India Today)
  - German businessman Hans Peter Walter Mack, 62, suspected of running a child sex
    trafficking ring in Thailand, is found mutilated with a chainsaw in a freezer
    in Pattaya. (Metro)
  - 2023 Dutch general election
  - Prime Minister Mark Rutte announces his retirement from politics following the
    collapse of his cabinet. (AP)
  - 2023 Uzbek presidential election
  - Uzbek authorities announce that incumbent president Shavkat Mirziyoyev has been
    re-elected with 87.1% of the votes. (Reuters)
