Date: '2023-08-08'
Source_URI: Portal:Current events/2023 August 8
Intelligence_Payload:
  Uncategorized:
  - 2023 Sudan conflict
  - Battle of Omdurman
  - Clashes occur in the Abrof neighborhood of Omdurman, Khartoum, Sudan, between
    the Rapid Support Forces and the Sudanese Armed Forces. (Dabanga Sudan)
  - Western Australia repeals a five-week-old law aimed at protecting Aboriginal sacred
    sites in the state, citing complexities in implementing the law. (AFP via Manila
    Bulletin)
  - The World Bank halts new lending to Uganda in response to the Anti-Homosexuality
    Act bill, approved months ago. (Reuters)
  - 2023 Pacific typhoon season
  - Typhoon Khanun
  - The South Korean government evacuates over 36,000 participants of the 25th World
    Scout Jamboree from their campsite at Saemangeum, North Jeolla, ahead of Khanun's
    expected landfall. (AFP via The Australian)
  - 2023 Iberian wildfires
  - In Portugal, 7,000 hectares of forest have burned down and 1,400 people have been
    evacuated. (NOS)
  - 2023 heat waves
  - The European Union's Copernicus Climate Change Service reports that July 2023
    was the hottest July on record, while this year is the third-warmest year to date.
    (Reuters)
  - UK Electoral Commission data breach
  - A cyberattack on the Electoral Commission of the United Kingdom during 2021–2022
    is revealed. (The Register)
  - Geraldo Martins is appointed as the prime minister of Guinea-Bissau. (AFP via
    New Vision)
  - Prime Minister of Vanuatu Ishmael Kalsakau reshuffles the cabinet and appoints
    two new ministers ahead of a no-confidence vote. (RNZ)
  - In association football, the USL Championship club Sacramento Republic FC signs
    13-year-old Da’vian Kimbrough, making him the youngest player in American sports
    history. (San Francisco Chronicle)
