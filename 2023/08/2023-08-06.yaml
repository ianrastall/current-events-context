Date: '2023-08-06'
Source_URI: Portal:Current events/2023 August 6
Intelligence_Payload:
  Uncategorized:
  - 2023 Sudan conflict
  - Darfur campaign
  - Siege of Zalingei
  - The Rapid Support Forces claim the state of Central Darfur, Sudan, after capturing
    the capital of Zalingei from the Sudanese Armed Forces. (Radio Dabanga)
  - Russian invasion of Ukraine
  - 2023 Ukrainian counteroffensive
  - An Armed Forces of Ukraine missile damages a bridge connecting the Russian-occupied
    Kherson Oblast and Crimea over the Chonhar Strait. (Reuters)
  - Israeli–Palestinian conflict
  - Israeli soldiers open fire against a vehicle in Jenin in the occupied West Bank,
    killing three people. (Al Jazeera)
  - The American film Barbie becomes the first film by a solo female director (Greta
    Gerwig) to surpass $1 billion in the worldwide box office. (AFP via France 24)
  - 2023 Hazara Express derailment
  - At least 34 people are killed and at least 100 others are injured when ten carriages
    of a Hazara Express train derail near the Sarhari railway station in Nawabshah,
    Sindh, Pakistan. (AFP via VOA)
  - 2023 European heat waves, 2023 Iberian wildfires
  - The ongoing forest fires in Spain and Portugal have burned about 6,200 hectares.
    (NOS)
  - A minibus plunges into a ravine near Demnate, Béni Mellal-Khénifra, Morocco, killing
    24 people. (BBC News)
  - Welsh singer and convicted sex offender Ian Watkins is stabbed and seriously injured
    in the Wakefield Prison. (BBC News)
  - The Supreme Court of the Maldives bars former president Abdulla Yameen from running
    for office while he serves an 11-year prison sentence. (Reuters)
  - Government censorship of Telegram
  - Iraq blocks the Telegram app over concerns about its leakage of official state
    data and personal information. (Reuters)
  - 2023 Netball World Cup
  - Australia wins a record 12th Netball World Cup title after defeating England 61–45
    in the gold medal match in Cape Town, South Africa. (The Guardian)
  - 2023 FIFA Women's World Cup
  - The United States, two-time defending champions, are eliminated from the tournament
    after losing to Sweden in a penalty shoot-out in the round of 16, marking their
    earliest exit from the FIFA Women's World Cup. (AFP via Manila Bulletin)
