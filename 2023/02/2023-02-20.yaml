Date: '2023-02-20'
Source_URI: Portal:Current events/2023 February 20
Intelligence_Payload:
  Uncategorized:
  - British authorities repatriate 77 pieces of Khmer jewellery from indicted art
    trafficker Douglas Latchford's family to the Ministry of Culture and Fine Arts
    of Cambodia. (AFP via The Jakarta Post)
  - Aftermath of the 2023 Turkey–Syria earthquake
  - A magnitude 6.4 earthquake strikes southeastern Turkey and Syria, killing eight
    people and injuring 600 others. The earthquake is also felt in Lebanon and Egypt.
    This aftershock comes fourteen days after the main earthquake killed more than
    47,000 people. (Associated Press)
  - Ukraine–United States relations
  - 2023 visit by Joe Biden to Ukraine
  - U.S. President Joe Biden makes an unannounced visit to Kyiv, Ukraine, where he
    meets with President Volodymyr Zelenskyy. (The Guardian)
  - C. B. Claiborne appears at a Duke home game, where he is honored by players wearing
    his name and 23, his jersey number. (Duke Chronicle)
