Date: '2023-02-25'
Source_URI: Portal:Current events/2023 February 25
Intelligence_Payload:
  Uncategorized:
  - Nineteen athletes are injured by small explosions during the Mount Cameroon Race
    of Hope in Buea, Southwest Region, Cameroon. The Ambazonia Defence Forces claim
    responsibility for the incident. (Reuters)
  - On the Adamant wins the Golden Bear at the 73rd Berlin International Film Festival.
    (Variety)
  - Refiner PKN Orlen announces that Russia has suspended oil exports to Poland via
    the northern branch of the Druzhba pipeline. (Reuters)
  - Thirteen people are killed and several others are injured when a bus collides
    with a van in Rahim Yar Khan, Punjab, Pakistan. (AP)
  - Mexico–Peru relations, 2022–2023 Peruvian protests
  - Mexico says that it will maintain its ambassador in Peru despite the latter withdrawing
    its ambassador from Mexico in protest of Mexican President Andrés Manuel López
    Obrador's support of former Peruvian President Pedro Castillo. (Reuters)
  - 2023 Nigerian presidential election, 2023 Nigerian Senate election, 2023 Nigerian
    House of Representatives election
  - Nigerians head to the polls to elect their new president and members of the National
    Assembly. (Reuters)
