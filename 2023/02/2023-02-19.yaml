Date: '2023-02-19'
Source_URI: Portal:Current events/2023 February 19
Intelligence_Payload:
  Uncategorized:
  - Libyan Crisis
  - The African Union announces the organization of a peace conference to address
    the instability in Libya. (AFP via France 24)
  - 76th British Academy Film Awards
  - The 76th British Academy Film Awards are held in London, with the German film
    All Quiet on the Western Front winning the most awards with seven, including Best
    Film. (BBC News)
  - 2023 Kallar Kahar bus accident
  - Fourteen people are killed and 63 others are injured when a bus crashes and overturns
    near Kallar Kahar, Chakwal District, Punjab, Pakistan. (AP)
  - 2023 São Paulo floods and landslides
  - At least 43 people are killed in São Sebastião and another person is killed in
    Ubatuba during floods and landslides in São Paulo, Brazil. (Al Jazeera)
  - Six people are killed, including the vice mayor of Aparri, Cagayan, Philippines,
    when their car is ambushed in Bagabag, Nueva Vizcaya, by unknown gunmen. (Philippine
    Daily Inquirer)
  - 2023 Bangladeshi presidential election
  - Shahabuddin Chuppu, of the ruling Awami League, is elected by the Jatiya Sangsad
    as the new president of Bangladesh, succeeding Mohammad Abdul Hamid. (Hindustan
    Times)
  - 2023 NASCAR Cup Series
  - Ricky Stenhouse Jr. wins the 65th running of the Daytona 500. (ESPN)
