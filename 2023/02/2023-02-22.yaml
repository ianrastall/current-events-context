Date: '2023-02-22'
Source_URI: Portal:Current events/2023 February 22
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - 2023 Nablus clashes
  - Eleven Palestinians are killed and 102 more injured when Israeli troops storm
    Nablus, in the West Bank. (Al Jazeera)
  - Somali Civil War
  - Ten people are killed when al-Shabaab gunmen storm a house in Mogadishu where
    several lawmakers are staying. All four attackers are killed by soldiers. (Reuters)
  - Jihadist insurgency in Burkina Faso
  - At least 15 soldiers are killed during an ambush in Tin-Akoff Department, Oudalan
    Province. Several of the attackers are killed in the ensuing gunfight. (Daily
    Sabah)
  - At least five people are killed and 48 others are reported missing following a
    collapse at a coal mine in Alxa League, Inner Mongolia, China. Search and rescue
    operations are underway. (Reuters)
  - Five people are killed when a Beechcraft BE20 crashes shortly after takeoff near
    College Station, Little Rock, Arkansas, United States. (AP)
  - Four people are killed in a plane crash near Trenčianske Stankovce, Trenčín Region,
    Slovakia. (AP)
  - Moldova–Russia relations, Russia–Transnistria relations
  - Russian President Vladimir Putin revokes a 2012 foreign policy decree which underpinned
    Moldova's sovereignty in resolving the political status of the breakaway Transnistria
    region. (Reuters)
  - Germany–Iran relations
  - Germany expels two employees of the Iranian embassy in response to Iran sentencing
    pro-monarchist dual German-Iranian Jamshid Sharmahd to death over a 2008 bombing
    in Iran. (Reuters)
