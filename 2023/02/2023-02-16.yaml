Date: '2023-02-16'
Source_URI: Portal:Current events/2023 February 16
Intelligence_Payload:
  Uncategorized:
  - 2018–2023 Haitian crisis
  - Canada–Haiti relations
  - Canada announces that it will deploy navy vessels to Haiti for intelligence-gathering
    amid a worsening security situation in the Caribbean country. (AP)
  - Nagorno-Karabakh conflict
  - Armenia submits a peace treaty to Azerbaijan in an effort to end the decades-long
    conflict between the two countries. (Daily Sabah)
  - YouTube CEO Susan Wojcicki announces that she will step down and will be succeeded
    by chief product officer Neal Mohan. (The Verge)
  - The CAC 40, the benchmark stock market index for the 40 largest market caps on
    the Euronext Paris, Europe's second-largest stock exchange market, reaches a record
    intraday value of 7,387.29 points. (CNBC)
  - 2023 Turkey–Syria earthquake
  - The death toll from the earthquakes in Turkey increases to 43,850, as the World
    Health Organization declares northwestern Syria as the zone of greatest concern,
    citing the slow delivery of humanitarian aid. (Al Jazeera)
  - Climate change in Antarctica
  - The National Snow and Ice Data Center of the United States reports that the Antarctic
    sea ice decreased to within the week, the smallest remaining ice area since records
    began in 1979. (AFP via ABS-CBN News)
  - A Da Nang court sentences four South Korean men to imprisonment for smuggling
    around 200 South Koreans into Vietnam during the COVID-19 pandemic when the country
    suspended the entry of all foreigners from 2020 to 2021. (AFP via Al Arabiya)
  - Russia in the Council of Europe
  - Lawmakers in the State Duma vote to withdraw Russia from 21 conventions of the
    Council of Europe. (RFE/RL)
  - The Portuguese government announces the end of the Portugal Golden Visa investor
    program, as well as a ban on new licenses for Airbnbs, due to a severe housing
    shortage and rising rents. (Reuters)
  - 2022–23 FIS Alpine Ski World Cup
  - FIS Alpine World Ski Championships 2023
  - American alpine skier Mikaela Shiffrin wins her seventh career alpine world championships
    gold medal in the women's giant slalom of the 2023 edition in the French Alps,
    making her the most successful skier in the modern era with an overall tally of
    13 medals from 16 career world championship races. (AP via The Guardian)
