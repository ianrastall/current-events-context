Date: '2023-02-07'
Source_URI: Portal:Current events/2023 February 7
Intelligence_Payload:
  Uncategorized:
  - Global spread of H5N1
  - Peru's Ministry of Environment reports that the H5N1 influenza A virus has killed
    585 sea lions and more than 55,000 birds within its protected areas in recent
    weeks. (AFP via Hindustan Times)
  - 2023 Brazilian Congress attack
  - The Federal Police arrest the military police officer in charge of security during
    the January 8 attack against the Brazilian Congress. (Reuters)
  - Luffy robberies
  - Two of four Japanese gang leaders based in the Philippines are deported on suspicion
    of ordering around 2,300 robberies and phone fraud activities with a total value
    of () in Japan. (AFP via The Manila Times)
  - Munster Technological University ransomware attack
  - Munster Technological University in the Republic of Ireland announces that it
    is investigating an incident involving its computer and telephone systems, saying
    that campuses in County Cork will be closed as a result. (RTÉ)
  - Nduga hostage crisis
  - The Free Papua Movement, led by Egianus Kogoya, burn a Susi Air plane and take
    15 passengers hostage in Paro Airport, Nduga Regency, Highland Papua, Indonesia.
    (SCNOW)
  - Politics of the United Kingdom
  - 2023 British cabinet reshuffle
  - British Prime Minister Rishi Sunak carries out the first significant reshuffle
    of his majority government. The reshuffle filled the vacancy left by Nadhim Zahawi
    after he was dismissed as Chairman of the Conservative Party and Minister without
    Portfolio on 29 January 2023. (BBC News)
  - 2023 Solomon Islands protests
  - Police use tear gas to disperse protesters after the governor of Malaita province,
    Daniel Suidani, is removed in a no-confidence vote. Suidani was one of the strongest
    critics of the government's approach to China. (The Guardian)
  - 2022–23 NBA season
  - During a regular-season game against the Oklahoma City Thunder, LeBron James records
    his 38,388th career NBA point, surpassing Kareem Abdul-Jabbar as the NBA all-time
    scoring leader. (ESPN)
