Date: '2023-02-05'
Source_URI: Portal:Current events/2023 February 5
Intelligence_Payload:
  Uncategorized:
  - 65th Annual Grammy Awards
  - American singer Beyoncé sets a Grammy Awards record for the most wins with 32
    wins, surpassing Hungarian conductor Georg Solti. (NPR)
  - Eight people in Austria and two others in Switzerland are killed by a series of
    avalanches. (BBC News)
  - At least eight people are killed and 42 others are injured when a bus crashes
    and overturns in Afyonkarahisar Province, Turkey. (ABC News)
  - South Africa reports imported cases of cholera in two sisters who travelled to
    Malawi. (Reuters)
  - 2022–2023 Peruvian protests
  - The government extends the state of emergency in the Apurímac, Arequipa, Cuzco,
    Madre de Dios, Moquegua, Puno, and Tacna departments until April 7. (AFP via VOA)
  - 2023 Cypriot presidential election
  - Cypriots head to the polls to elect their new President. (AFP via France 24)
  - A runoff is called for 12 February between Nikos Christodoulides and Andreas Mavroyiannis.
    (The Guardian)
  - 2023 Ecuadorian constitutional referendum
  - Ecuadorians head to the polls for a non-binding referendum on a constitutional
    reform. (Infobae)
  - 2023 Monegasque general election
  - Monegasques head to the polls to elect the members of their Parliament. (Euronews)
  - People's Deputy of Ukraine Davyd Arakhamia announces that military intelligence
    chief Kyrylo Budanov will replace Oleksii Reznikov as Minister of Defense following
    a corruption scandal. (AFP via ABS-CBN News)
