Date: '2023-10-20'
Source_URI: Portal:Current events/2023 October 20
Intelligence_Payload:
  Uncategorized:
  - 2023 Nigerien crisis
  - The French Armed Forces confirms that 1,500 troops will leave Niger by the end
    of the year, following the military junta's request. (AFP via Le Monde)
  - Israeli–Palestinian conflict
  - Israel–Hamas war
  - Evacuations during the Israel–Hamas war
  - Israel announces the total evacuation of Kiryat Shmona, a city of 20,000 near
    the border with Lebanon, amid increasing tensions with the militant group Hezbollah.
    (The Jerusalem Post)
  - Israel–Hamas war hostage crisis
  - Hamas releases two American hostages following mediation by Egypt and Qatar. (AFP
    via France 24)
  - Russian invasion of Ukraine
  - Battle of Avdiivka
  - Ukrainian forces repel Russian forces from Avdiivka, Donetsk Oblast, saying it
    has destroyed at least 175 vehicles, including 55 tanks. (Forbes)
  - Foreign relations of Colombia, Foreign relations of the State of Palestine
  - Colombian President Gustavo Petro announces the establishment of an embassy to
    the State of Palestine in Ramallah in the West Bank, and also announces humanitarian
    aid to the Gaza Strip amid the ongoing war. (AA)
  - Foreign relations of Italy, Foreign relations of the State of Palestine
  - Italian Prime Minister Giorgia Meloni tells the Cairo Peace Summit the international
    community must avoid an escalation in the war in Gaza and set a roadmap towards
    a two-state solution. (Al Jazeera)
  - Foreign relations of Greece, Foreign relations of the State of Palestine
  - Greek Prime Minister Kyriakos Mitsotakis calls for a new peace process envisioning
    an independent State of Palestine alongside Israel, saying "no military intervention
    can replace a viable political solution". (Al Jazeera)
  - October 2023 Speaker of the United States House of Representatives election
  - The Republican majority fails to deliver enough votes for Jim Jordan to become
    House Speaker on the third vote, with Jordan also losing a subsequent secret ballot
    among Republican members, thereby ending his nomination. (CNN)
