Date: '2023-10-06'
Source_URI: Portal:Current events/2023 October 6
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Turkish involvement in the Syrian civil war
  - October 2023 Northern Syria clashes
  - Two Turkish soldiers are killed when the Syrian Army fires on their positions
    with artillery in northern Syria. (SOHR)
  - Israeli–Palestinian conflict
  - A 19-year-old Palestinian man is shot and killed by Israeli settlers attacking
    the city of Huwara, Palestine. (Al Jazeera)
  - Oaxaca migrant bus crash
  - Seventeen people are killed and fifteen others are injured after a bus carrying
    migrants from Venezuela crashes in Oaxaca, Mexico. (Reuters)
  - Floods and mudslides triggered by heavy rain occur in Sri Lanka, with five people
    killed and five others injured when a tree falls on a bus in Colombo. Another
    person is killed by a falling rock in Galle District. (AP)
  - Six people are killed and 38 others are injured in a fire at a six-storey residential
    building in Mumbai, India. (AP)
  - A Piper PA-34 Seneca training plane crashes in Chilliwack, British Columbia, Canada,
    killing all three on board. (Vancouver Sun)
  - Iranian activist Narges Mohammadi is awarded the Nobel Peace Prize for her support
    of feminism and human rights. (BBC News) (The Guardian)
  - Charlot Salwai is elected as Prime Minister of Vanuatu following a no-confidence
    vote against Sato Kilman. (AFP via Barron's)
