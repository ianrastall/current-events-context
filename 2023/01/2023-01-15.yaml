Date: '2023-01-15'
Source_URI: Portal:Current events/2023 January 15
Intelligence_Payload:
  Uncategorized:
  - Kivu conflict
  - Allied Democratic Forces insurgency
  - Kasindi church bombing
  - Ten people are killed and 39 others are injured when a bomb explodes at a Pentecostal
    church in Kasindi, North Kivu, Democratic Republic of the Congo. The Islamic State
    has claimed responsibility for the attack. (Al Jazeera)
  - Afghanistan conflict
  - Former lawmaker Mursal Nabizada and one of her bodyguards are shot and killed
    in Kabul inside her home, while her brother and a second security guard are injured.
    Taliban police spokesman Khalid Zadran condemns the killing and says that a "serious
    investigation has been launched". (AFP via Arab News)
  - Jihadist insurgency in Burkina Faso
  - Jihadists kidnap dozens of women in Arbinda, Sahel Region, Burkina Faso, according
    to local officials. (BBC News)
  - Yeti Airlines Flight 691
  - A plane which had departed from Kathmandu crashes in Pokhara, Gandaki Province,
    Nepal, killing all 72 people on board. (BBC News) (Reuters)
  - 2022–2023 California floods
  - President of the United States Joe Biden issues a major disaster declaration for
    the state of California following major flooding. (The Guardian)
  - A light aircraft crashes in Nasrec, Johannesburg, South Africa, killing all three
    people on board. (UrduPoint)
  - Two suspected drug traffickers are killed in a shootout with United States Customs
    and Border Protection officials off the coast of Puerto Rico. (AP)
  - The Jamaica Constabulary Force seizes $80 million worth of cocaine from a cargo
    ship at the port of Kingston. (Reuters)
