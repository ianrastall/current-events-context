Date: '2023-01-26'
Source_URI: Portal:Current events/2023 January 26
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - 2022 Russian invasion of Ukraine
  - 2022–2023 Russian strikes against Ukrainian infrastructure
  - Russia launches a wave of cruise missile and Shahed 129 drone strikes across Ukraine,
    targeting major cities and critical infrastructure, killing at least 11 people
    and injuring 11 others. Ukrainian general Valerii Zaluzhnyi says that at least
    20 missiles have been intercepted over the capital Kyiv. (The Guardian)
  - Somali Civil War
  - American military intervention in Somalia
  - A U.S. military raid in northern Somalia kills senior Islamic State member Bilal
    al-Sudani and ten other insurgents. No U.S. military casualties are reported in
    the operation, which was ordered by U.S. President Joe Biden. (NBC News)
  - Israeli–Palestinian conflict
  - 2023 Jenin killings
  - Four Al-Qassam terrorists, three Islamic Jihad members and two Palestinian civilians
    are killed and 20 others are injured during a raid and subsequent gunfight by
    Israeli soldiers in Jenin, in the West Bank. In a separate raid in Al-Ram, a Palestinian
    man is killed and two others are injured by Israeli soldiers. (AP) (Al Jazeera)
  - Aftermath of the 2022 Haitian crisis
  - Ten police officers are killed, one is critically injured and another is missing
    during a series of attacks in Port-au-Prince, Haiti, by the Gan Grif gang. (Al
    Jazeera)
  - At least 21 people are killed after a passenger bus en route from N'Djamena to
    Abéché crashed into a truck near Oum Hadjer, Batha Est Department, Chad. (Reuters)
  - Hong Kong–United States relations
  - U.S. President Joe Biden grants a two-year extension to the Deferred Enforced
    Departure immigration status of Hong Kong residents, citing increasing tensions
    between Hong Kong and mainland China. (AFP via GMA News Online)
  - 2023 Tokelauan general election
  - Tokelauans head to the polls to elect the members of the General Fono. (RNZ)
