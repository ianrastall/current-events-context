Date: '2023-01-30'
Source_URI: Portal:Current events/2023 January 30
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Khyber Pakhtunkhwa
  - 2023 Peshawar mosque bombing
  - At least 100 people are killed and 225 others are injured when a suicide bomber
    detonates his explosive belt at a mosque in Peshawar, Khyber Pakhtunkhwa, Pakistan.
    The mosque is located inside a compound that includes the headquarters of the
    provincial police force and a counter-terrorism department. (Al Jazeera)
  - Islamist insurgency in the Sahel
  - Jihadist insurgency in Burkina Faso
  - Ten police officers, two Volunteers for the Defense of the Homeland personnel,
    and a civilian are killed in a terrorist attack by at least 15 jihadists in Falagountou,
    Séno, while five other police officers are injured and ten people are missing.
    (AFP via ABS-CBN News)
  - Syrian civil war
  - Fifteen people are injured after a bomb explodes near a bus carrying police officers
    near Khirbet Ghazaleh, Daraa Governorate, Syria. (AP)
  - British sports-fashion retailer JD Sports says that the stored data of 10 million
    customers "may have been accessed" in a cyberattack, including names, addresses,
    email addresses, phone numbers, order details, and the final four digits of debit
    card numbers. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - The Biden administration announces that the United States will end its COVID-19
    emergency proclamation on May 11 after being imposed for three years. (Forbes)
  - Aging of China
  - The Chinese province of Sichuan announces the abolition of its three-child policy
    and the restrictions on birth registration for single parents on February 15,
    citing the country's population decline. (AFP via ABS-CBN News)
  - Foreign relations of Kiribati
  - Prime Minister of Fiji Sitiveni Rabuka confirms that Kiribati will rejoin the
    Pacific Islands Forum after leaving the organization last year due to a dispute.
    (The Guardian)
  - 2022–2023 Peruvian protests
  - The Organization of American States passes a resolution asking the government
    of Dina Boluarte to convene elections soon in an attempt to reduce the level of
    violence in Peru, which has already killed 65 people. (La Prensa Latina) (Infobae)
