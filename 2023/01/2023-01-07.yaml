Date: '2023-01-07'
Source_URI: Portal:Current events/2023 January 7
Intelligence_Payload:
  Uncategorized:
  - Boko Haram insurgency
  - Thirty-five Islamic State members are killed during a fight with Boko Haram militants
    in Lake Chad, resulting in the dislodgement of Islamic State from two of its enclaves.
    (Punch)
  - Five people are killed and 23 others are injured in a bus crash in Diyarbakır,
    Turkey. (Armenpress)
  - Five people are killed and ten others are missing after a boat carrying migrants
    sinks off the coast of Tunisia. (Al Jazeera)
  - 2023 Mexico City Metro train crash
  - One person is killed and 57 others are injured when two trains crash on Line 3
    of the Mexico City Metro in Mexico City. (The Guardian) (Excélsior in Spanish)
  - Two people are killed and another person is injured when a roof collapses in Alexandria,
    Egypt. (The Washington Post)
  - Twenty-one people are killed and 49 others are injured when a bus heading for
    Nairobi, Kenya, crashes after crossing the border from Uganda. (AFP via Barron's)
  - One person is killed and 60 others are injured in a prison riot in Pathein, Myanmar.
    (AFP via Hindustan Times)
  - South Sudanese authorities arrest six journalists from the country's public broadcaster
    on suspicion of distributing unauthorized footage of President Salva Kiir Mayardit
    that went viral internationally in December. (AP via ABC News Australia)
  - 2023 Speaker of the United States House of Representatives election
  - Kevin McCarthy is elected speaker of the United States House of Representatives
    after fifteen rounds of voting, the most rounds since 1860. (BBC News)
