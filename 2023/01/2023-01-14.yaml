Date: '2023-01-14'
Source_URI: Portal:Current events/2023 January 14
Intelligence_Payload:
  Uncategorized:
  - 2022 Russian invasion of Ukraine
  - 2022–2023 Russian strikes against Ukrainian infrastructure
  - 2023 Dnipro residential building airstrike
  - Russia strikes a nine-story residential building in Dnipro with a cruise missile,
    killing at least 40 people, injuring 73 others and leaving dozens more missing.
    (Reuters) (Al Jazeera)
  - Foreign aid to Ukraine during the Russo-Ukrainian War
  - UK Prime Minister Rishi Sunak confirms that the United Kingdom will send 14 Challenger
    2 main battle tanks to Ukraine in the coming weeks, as well as 30 self-propelled
    AS-90 howitzers. Ukrainian troops will also be trained by the British Armed Forces
    to operate the tanks. (Reuters)
  - Somali Civil War
  - Eleven people are killed and more than 50 injured by an al-Shabaab suicide car
    bombing in Buloburde, Hiran. (VOA)
  - Israeli–Palestinian conflict
  - Two Palestinian Islamic Jihad members are killed by Israeli soldiers during a
    raid in Jaba, in the West Bank. (Al Jazeera)
  - Miss Universe 2022
  - Miss America R'Bonney Gabriel is crowned Miss Universe by her predecessor, Harnaaz
    Sandhu. (CNN)
  - Capital punishment in Iran
  - Iran announces the execution of dual British Iranian citizen Alireza Akbari, who
    had served as a deputy for the ministry of defense, on charges of spying for the
    United Kingdom. British Prime Minister Rishi Sunak condemns Akbari's execution.
    (Reuters)
  - 2022–2023 Peruvian political protests
  - The government declares a 30-day state of emergency in Lima and three other regions
    in response to the violent protests. (AFP via Gulf News)
  - Euston shooting
  - Six people are injured by a mass drive-by shooting in London, United Kingdom.
    (BBC News)
  - 2023 Czech presidential election
  - Retired general Petr Pavel and former Prime Minister Andrej Babiš advance to a
    runoff vote in the Czech presidential election, which will be held on January
    27–28. (DW)
