Date: '2023-01-12'
Source_URI: Portal:Current events/2023 January 12
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Israeli soldiers raid the village of Qabatiya in the West Bank, killing two Palestinian
    men. In a separate incident, Israeli forces arrest an 18-year-old Palestinian
    man and kill his father in the Qalandia refugee camp. (AP via The Washington Post)
    (Ynetnews)
  - 2022–2023 Peruvian political protests
  - The city of Cusco is placed under red alert after one person is killed and 17
    others are injured in clashes between protesters and police. (CNN)
  - 2021–2023 inflation surge
  - The National Institute of Statistics and Census of Argentina records a 94.8% inflation
    rate for its economy in 2022, the highest since 1991. (AFP via Buenos Aires Times)
  - Tornado outbreak of January 12, 2023
  - A tornado outbreak in the US states of Alabama and Georgia damages several towns
    and kills at least six people. (USA Today)
  - A truck crashes into several minibus taxis at an intersection in Roodepoort, Gauteng,
    South Africa, killing five people and injuring nine others. (News24)
  - An explosion at a propane store in Saint-Roch-de-l’Achigan, Quebec, Canada leaves
    three people missing. (CFCF-DT)
  - Swedish mining company LKAB discovers Europe's largest known deposit of rare-earth
    elements in Kiruna, Sweden. (Reuters)
  - The World Meteorological Organization of the United Nations reports an average
    global temperature of about 1.15°C above pre-industrial levels in 2022, confirming
    that the last eight years were the highest temperatures recorded on Earth since
    records began. (AFP via The Philippine Star)
  - 2023 Beninese parliamentary election
  - The Constitutional Court declares that the parties supporting President Patrice
    Talon, including the Progressive Union for Renewal and the Republican Bloc, have
    won a majority of 81 out of 109 seats in the National Assembly. The parties have
    been accused of electoral fraud by the opposition Democrats party, who plan to
    contest the results. (AFP via RFI)
  - International response to the treatment of women by the Taliban
  - Cricket Australia announces the withdrawal of the Australia national team from
    their One Day International matches against Afghanistan scheduled for March in
    response to the Taliban government's recent prohibitions of education and employment
    for women. (CNN)
