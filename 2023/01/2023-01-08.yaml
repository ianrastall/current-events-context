Date: '2023-01-08'
Source_URI: Portal:Current events/2023 January 8
Intelligence_Payload:
  Uncategorized:
  - 2022–2023 North Kosovo crisis
  - NATO rejects Serbia's request to deploy up to 1,000 Serbian troops and military
    police in North Kosovo. (Reuters)
  - 2023 Brazilian Congress attack
  - Pro-Bolsonaro protesters storm the National Congress, the Supreme Federal Court,
    and the Palácio do Planalto in Brasília, Brazil. (France 24)
  - Kaffrine bus crash
  - At least 40 people are killed and 87 others are injured when two buses collide
    in Gniby, Kaffrine Department, Senegal. (Al Jazeera)
  - A truck crashes into a funeral procession in Nanchang County, Jiangxi, China,
    killing 19 people and injuring 20 others. (AFP via South China Morning Post)
  - Islamic terrorism in Europe, Terrorism in Germany
  - North Rhine-Westphalia Police arrest two Iranian brothers in Castrop-Rauxel, Ruhr,
    Germany, on suspicion of planning an Islamic terrorist attack using chemical weapons.
    (BBC News)
  - 2023 Beninese parliamentary election
  - Citizens in Benin head to the polls to elect the 109 members of the National Assembly.
    (Al Jazeera)
  - Chinese government response to COVID-19
  - China scraps COVID-era quarantine requirements for arriving travelers, restoring
    normalcy at the border. (Skift)
  - 2023 ATP Tour, 2023 WTA Tour
  - 2023 United Cup
  - The United States tennis team wins the inaugural edition of the United Cup after
    defeating Italy 4–0 in the final at the Ken Rosewall Arena in Sydney. (AP via
    The Indian Express)
  - 2022–23 FIS Alpine Ski World Cup
  - American alpine skier Mikaela Shiffrin equals fellow American Lindsey Vonn's record
    of 82 wins, the most by a woman in the FIS Alpine Ski World Cup, after winning
    the giant slalom at Kranjska Gora, Slovenia. (CNN)
