Date: '2004-02-06'
Source_URI: Portal:Current events/2004 February 6
Intelligence_Payload:
  Uncategorized:
  - U.S. and Iraqi forces capture more than 100 suspected guerrillas in raids across
    Iraq.
  - Ministers of Finance from Europe, North America, and Asia meet in Florida. They
    are focusing on the strength and stability of the U.S. dollar.
  - Russian billionaire Viktor Vekselberg purchases a huge private collection of Fabergé
    art pieces, including nine Fabergé eggs, from the Forbes family. The collection
    had been expected to go up for auction in April.
  - Gerhard Schröder announces his intention to resign from his post as chairman of
    the Social Democratic Party but to continue as Chancellor of Germany.
  - An earthquake, measuring 6.9 on the Richter scale, occurs in the Papua province
    of Indonesia and kills at least 23 people.
  - At least 39 people are killed and around 120 injured in an explosion aboard a
    train on the Moscow Metro (subway) during the morning rush hour. The authorities
    are investigating the apparent bombing, which may be connected to a series of
    attacks in the Russian capital. President Vladimir Putin publicly blames the blast
    on Chechen militants and their leader, Aslan Maskhadov. The Chechen rebel leadership
    issues a statement denying responsibility.
  - A party of cockle pickers—believed to be Chinese immigrants – is caught by tides
    in Morecambe Bay, Lancashire, England, drowning at least 19 people.
  - The UK Home Office confirms that Maxine Carr, convicted with Ian Huntley concerning
    the Soham murders of 2001, could be released from prison in the next few days.
  - Parliamentarians in Iran end their sit-in of the country's parliament but vow
    to continue fighting the mass disqualification of reformist candidates by the
    conservative Council of Guardians.
  - In Australia, the Music Industry Piracy Investigations organization uses an Anton
    Piller order to raid offices of P2P companies Sharman Networks and Brilliant Digital
    Entertainment, the homes of their key executives, as well as several internet
    service providers and universities.
  - 'Democratic Presidential Primaries: Howard Dean tells his supporters that he must
    win the Wisconsin Democratic primary in order to stay in the Democratic presidential
    race.'
  - 'Electronic voting: The U.S. military abandons plans for a trial of Internet voting
    (Secure Electronic Registration and Voting Experiment) in the upcoming presidential
    election.'
  - American and British study reports that the 1918 flu virus may have had a unique
    bird-like protein. The past outbreak, which killed people, has hallmarks of the
    current outbreak of bird flu in east Asia.
  - The body of Carlie Brucia, a girl reported missing on Sunday, February 1, 2004
    is discovered. Suspect Joseph P. Smith is charged with the murder.
  - U.S. President George W. Bush appoints an Iraq Intelligence Commission to investigate
    United States intelligence capabilities, specifically regarding the 2003 invasion
    of Iraq and Iraq's weapons of mass destruction. The commission is headed by Governor,
    and former Senator, Chuck Robb and Judge Laurence Silberman.
