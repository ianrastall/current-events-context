Date: '2004-02-10'
Source_URI: Portal:Current events/2004 February 10
Intelligence_Payload:
  Uncategorized:
  - 'Same-sex marriage in the United States: A majority of Americans (two to one margin)
    respond they do not want laws in their states that would legalize same-sex marriages.
    The poll is taken after the Massachusetts Supreme Judicial Court ruling.'
  - A group of 200 AIDS doctors in the United States calls for a boycott of pharmaceutical
    company Abbott Laboratories to protest the company's recent 401% price hike on
    its anti-HIV drug Norvir.
  - An Italian intelligence report states that Italy is a departure point, as well
    as focus of logistic and financial support, for suicide bombers linked to al-Qaida
    and active against United States-led forces in Iraq. The suicide bombers were
    drawn from Muslim youths living on the fringes of society in Western Europe.
  - The French National Assembly votes (494 to 36) to ban hijab and all other conspicuous
    religious symbols from state schools.
  - The White House rebuts Democrats' accusations that Bush shirked his military responsibilities,
    releasing pay records for the President's National Guard service between May 1972
    and May 1973.
  - The oil cartel OPEC announces further limits on the output of crude by one million
    barrels a day beginning April 1, 2004. If all member states stick to the agreement,
    OPEC's daily output will be cut by about 10 percent.
  - Recent violence in Haiti has spread as anti-government forces take control of
    eight towns in Western Haiti. 46 people are dead thus far. Government forces in
    Cap-Haïtien (second largest city in Haiti) built flaming barricades to keep the
    rebel forces out of the city. The United Nations urges Haitians on both sides
    to stop the violence.
  - Hundreds of militants and their supporters staged a protest against the Palestinian
    Authority in the Gaza Strip for putting on trial four men charged in the bombing
    of a United States diplomatic convoy which killed three Americans. The closed
    military trial began on February 7.
  - 'Occupation of Iraq: A large car bomb explodes in the central Iraqi town of Iskandariya,
    south of Baghdad, killing at least 50 people.'
  - An Iranian airliner crashes on arrival at Sharjah airport in the United Arab Emirates,
    killing at least 35 people. A few people are thought to have survived.
  - '2004 Philippine elections: The 90-day campaigning period for the president, vice-president,
    and senators starts this day with no less than six qualified candidates, half
    of which have no previous political experience. The current president, Gloria
    Macapagal-Arroyo is seeking a full six-year term. The elections will be held on
    May 10.'
  - The missing Russian politician Ivan Rybkin unexpectedly reappears in Kiev, the
    capital of neighboring Ukraine, and is said to be on his way back to Moscow. According
    to his own words he "was entitled to two or three days of private life".
  - Canada's auditor-general, Sheila Fraser, releases a scathing report on a CA$250-million
    sponsorship fund that had a major portion of its funds directed to firms friendly
    to the ruling Liberal party; the resulting scandal and inquiry is quite likely
    to affect the coming election. Alfonso Gagliano, a former cabinet minister involved
    in the scandal, is removed from his post as ambassador to Denmark and recalled
    to Canada.
