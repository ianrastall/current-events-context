Date: '2004-02-25'
Source_URI: Portal:Current events/2004 February 25
Intelligence_Payload:
  Uncategorized:
  - Libya's Foreign Minister, Abdulrahman Shalgam, issues a statement reaffirming
    its acceptance of culpability for the 1988 bombing of Pan Am Flight 103 over Lockerbie,
    after the Prime Minister Shukri Ghanem, in an interview for the BBC, claimed Libya
    had "bought peace" with the $2.7bn compensation payments, but had not accepted
    guilt. (BBC) (Mercury News)
  - A wolverine, the state animal of Michigan, has been spotted in that state for
    the first time in 200 years.
  - The California Public Employees' Retirement System, CalPERS, a major shareholder
    in The Walt Disney Company, indicated that it will withhold its votes from Disney
    chief executive Michael Eisner at next week's shareholders' meeting, a new sign
    of a growing rebellion against Eisner's leadership, (TheStreet)
  - The controversial film, The Passion of the Christ opens in theaters in the United
    States. Jewish leaders fear the film will stoke antisemitism, while some Christians
    laud the realistic depiction of the last 12 hours in the life of Jesus. (Washington
    Post) A woman in Wichita, Kansas, collapses and dies of a massive heart attack
    while viewing the harrowing Crucifixion scene. (KAKE)
  - Pakistani leaders pressure Muslim militants in Kashmir to declare a ceasefire
    with India. Meanwhile, Indian Prime Minister Atal Bihari Vajpayee tries to gain
    Muslim votes for his Bharatiya Janata Party with the prospect of peace with Pakistan.
    (Reuters) (Reuters)
  - In the northern Uganda city of Lira, protests and riots cause at least nine deaths
    after the Ugandan army announces it killed 21 members of the Lord's Resistance
    Army, a rebel group, in retaliation for an attack on a refugee camp at Barlonyo.
    (CNN)
  - King Norodom Sihanouk of Cambodia, who recently made a statement in support of
    same-sex marriage, responded to an "insulting" e-mail by announcing he is not
    gay. The king is 81 years old and has 14 children. (Telegraph)
  - 'Guantanamo Bay: The Pentagon announces that the first charges are to be filed
    against two of the six hundred detainees of the detention camp, but human rights
    groups have had their request to observe the military tribunals turned down. The
    defendants are named as Ali Hamza Ahmad Sulayman al-Bahlul and Ibrahim Ahmed Mahmoud
    al Qosi, both alleged to be Al-Qaeda members and charged with "conspiracy to commit
    war crimes". (BBC) The Pentagon also confirms that even if cleared by the tribunals,
    the defendants may still not be released. (BBC)'
