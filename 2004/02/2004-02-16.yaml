Date: '2004-02-16'
Source_URI: Portal:Current events/2004 February 16
Intelligence_Payload:
  Uncategorized:
  - 'Temple in Jerusalem: An 800-year-old wall holding back part of the hill jutting
    out from the Western Wall leading up to the Mughrabim Gate partially collapses.
    Authorities believe a recent earthquake may be responsible. (BBC) (Sydney Morning
    Herald)'
  - India and Pakistan begin formal peace negotiations, with Kashmir on the agenda.
    (BBC)
  - L. Paul Bremer, the United States administrator of Iraq states he will veto any
    interim constitution that would make Islam "the chief source of law", as opposed
    to "a source of inspiration for the law." Many Iraqi women express fears that
    the rights they hold under Iraq's longtime secular system may be denied them in
    the interim constitution based upon Islam as "the chief source of law." (NYT)
  - The United States states that Afghanistan's elections scheduled for this June
    may have to be postponed because of security problems and the failure to register
    enough voters. Only 8% of eligible Afghan voters have been enrolled to date. (NYT)
  - The Taiwan (ROC)'s pro-independence president, Chen Shui-bian, states that Taiwan
    may eventually reunify with Mainland China. Nonetheless, Chen rejects the People's
    Republic of China's one country, two systems formula which was applied to Hong
    Kong and Macau. This is a new step for Chen who, shortly after taking office in
    2000, had said unification was just one option—comments widely seen as a push
    for independence for the island. (NYT)
  - The territory of Nunavut, Canada, holds its second general election since its
    creation. Of the 19 members, one is chosen by acclamation. Eight members of the
    previous government are returned to office, and five are defeated. The members
    will elect a premier on March 5.
  Same-sex marriage in the United States:
  - Officials at the city and county of San Francisco, California, estimate by the
    end of the day that they will have issued 2,000 licenses for same-sex marriages
    in the four days since they started granting legal recognition to gay and lesbian
    unions. (Mercury News)
  - The San Francisco Chronicle reports that the decision of San Francisco's mayor,
    Gavin Newsom, to express his opinion on same-sex marriage was because of George
    W. Bush's stance on the issue. (Miami Herald)
