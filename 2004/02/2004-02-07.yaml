Date: '2004-02-07'
Source_URI: Portal:Current events/2004 February 7
Intelligence_Payload:
  Uncategorized:
  - Nearly 400 members of Yasser Arafat's Fatah faction of the Palestine Liberation
    Organization resign in protest over corruption, mismanagement and a lack of direction
    with Fatah.
  - 'U.S. Presidential Election, 2004: In the race for the Democratic presidential
    nomination, Senator John Kerry wins the caucuses in Michigan and Washington.'
  - Sri Lankan President Chandrika Kumaratunga dissolves parliament.
  - 'Carnival: The Krewe du Vieux parades through the Faubourg Marigny and French
    Quarter neighborhoods of New Orleans, Louisiana, starting that city''s "Mardi
    Gras" season of parades.'
  - In a Gaza military court, four suspects, without legal representation, are charged
    with possession of explosives and planting bombs in the same area as a bombing
    attack on a United States diplomatic convoy. The suspects are not charged with
    the bombing. The United States last week announced a reward for information leading
    to the apprehension of the attackers.
  - Chechnya's spiritual leader, Chief Mufti Akhmad Shamayev, condemns the Moscow
    subway car bombing. Investigators question hospitalized rush hour commuters and
    examine documents retrieved from the blast site.
  - Israeli Airforce helicopter gunship fires a missile and destroys a car carrying
    Islamic Jihad members in Gaza City, killing a leading Islamic Jihad militant and
    an 11-year-old boy.
  - Up to 4000 protesters in Albania threw rocks and tried to storm the offices of
    Prime Minister Fatos Nano whom they have accused of creating policies that impoverish
    Albanians.
  - Ivan Rybkin, candidate in the Russian presidential election, is reported missing.
