Date: '2004-02-15'
Source_URI: Portal:Current events/2004 February 15
Intelligence_Payload:
  Uncategorized:
  - Iraqi lawyers say Saddam Hussein is unlikely to stand trial for at least another
    two years. (Hi Pakistan)
  - United Nations Afghanistan envoy voices disdain at the "brutal and cold-blooded"
    murder of four deminers working to eradicate landmines in Afghanistan. (UN)
  - Canadian Prime Minister Paul Martin goes on record that anyone found to be culpable
    in the sponsorship scandal, including himself, will be immediately discharged.
    The issue could delay the upcoming election until after the public enquiry is
    completed.
  - 'Same-sex marriage in the United States: Officials at the city and county of San
    Francisco, California, turn away hundreds of would-be same-sex newlyweds after
    thousands of gay and lesbian couples show up to marry over the weekend. The city
    claims it can only handle between 400 and 600 marriages a day, or about one a
    minute. (365Gay) (AP) (Washington Post) (USA Today) (SF Chronicle)'
  - Thousands of protestors in Madrid and other Spanish cities march in opposition
    to the U.S. occupation of Iraq. The protests mark the one-year anniversary of
    the large protests against the U.S. invasion of Iraq. (Newsday)
  - Scientists at the California Institute of Technology announce the discovery of
    a galaxy which is the farthest known object in the universe. The galaxy was found
    with the help of the magnification effect from the Abell 2218 galaxy cluster.
    (AP)
  - Russian rescue workers are digging through what remains of an indoor water park
    in Moscow after the roof collapsed yesterday. At least 25 people have been killed,
    more than 100 people are injured, and at least 17 people are missing. (AP) (CNN)
  - Two fires sweep through China, one in a shopping center and the other in a temple,
    killing at least 90 and injuring 71. (AP)
  - The British government draws up plans to break up the BBC in the wake of the Hutton
    inquiry. (Times) (AFP)
  - Iraqi police arrest Mohammed Zimam Abdul-Razaq, a member of the Baath Party and
    number 41 on the U.S. military's list of most wanted Iraqis. (AP)
  - Iran offers to sell nuclear reactor fuel on the international market under the
    supervision of the United Nations nuclear watchdog, the International Atomic Energy
    Agency. (NYT)
  - Eddie Guerrero becomes the first Hispanic-American to win the WWE Championship
    by defeating Brock Lesnar at WWE No Way Out.
