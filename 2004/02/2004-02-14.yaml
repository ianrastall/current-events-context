Date: '2004-02-14'
Source_URI: Portal:Current events/2004 February 14
Intelligence_Payload:
  Uncategorized:
  - A new U.S.-sponsored satellite TV channel called Alhurra (The Free One) begins
    broadcasting in the Middle East and pledges to provide accurate and balanced news,
    but faces a skeptical Arab audience.
  - Marco Pantani, world-renowned cyclist, winner of the 1998 Tour de France and the
    1998 Giro d'Italia, is found dead in a hotel in the Adriatic city of Rimini, Italy.
  - 'Same-sex marriage in the United States: Staff advisors for U.S. President George
    W. Bush say he will support the proposed Federal Marriage Amendment to the U.S.
    Constitution which would outlaw same-sex marriage and federalize marriage law,
    which has been set by individual states since the founding of the country.'
  - U.S. President hopeful John Kerry scores two more Democratic primary victories
    in the State of Nevada and the federally controlled District of Columbia.
  - In Moscow, a roof collapses killing about 25 and injuring at least 110.
  - Approximately 550 qualified candidates suddenly drop out of Iran's parliamentary
    election.
  - 'Occupation of Iraq: At least 20 people are killed in the town of Falluja as up
    to 50 gunmen attack government buildings, in one of the largest guerrilla attacks
    so far seen in Iraq.'
  - 'ROC presidential election, 2004: Candidates Lien Chan of the Pan-Blue Coalition
    and President Chen Shui-bian of the Pan-Green Coalition participate in a televised
    debate.'
  - Disney Channel airs the last episode of Lizzie McGuire called "Magic Train".
