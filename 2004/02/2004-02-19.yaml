Date: '2004-02-19'
Source_URI: Portal:Current events/2004 February 19
Intelligence_Payload:
  Uncategorized:
  - One Dane and five of the nine Britons held without trial as terror suspects at
    Guantanamo Bay are to be released, probably within the next two weeks, according
    to British Foreign Secretary Jack Straw. The soon-to-be-released captives have
    been amongst the 660 detainees at the US base in Cuba, held for the past two years
    as suspected Al-Qaida or Taliban 'combatants'. (BBC) (BBC)
  - Former Enron CEO Jeffrey Skilling surrenders to the FBI in Houston and is arraigned
    on charges of fraud and insider trading. Skilling pleads not guilty and the judge
    sets bail at and confiscates Skilling's passport. (CNN)
  - Lt. Gurgen Markarian, an Armenian military officer attending a NATO Partnership
    for Peace program, is hacked to death with an axe and a knife by Lt. Ramil Safarov,
    an Azerbaijani participant. The officers were attending an English language course
    at the Hungarian Military University within the framework of the Partnership for
    Peace program, which is aimed at increasing cooperation between neutral and former
    Soviet bloc nations and NATO in peacekeeping and other areas. (NYT)
  - European Commission President Romano Prodi vows stronger action to combat anti-Semitism
    in Europe. Prodi states that some criticism of Israel was inspired by "what amounts
    to anti-Semitic sentiments and prejudice." Youths from the large Arab immigrant
    communities in France, Belgium and other European countries are blamed for the
    rise in attacks against Jews in Europe. The European Union's European Monitoring
    Centre on Racism and Xenophobia in Vienna, Austria, found the increase of anti-Semitic
    attacks was "committed above all either by right-wing extremists or radical Islamists
    or young Muslims mostly of Arab descent." (Haaretz)
  - Reformist newspapers Shargh and Yas-e-no are shut down by the Iranian judiciary,
    only one day before the parliament elections.(BBC)
  - 'The Kuwaiti newspaper A-Siasa reports that Palestinian and international terrorist
    organizations have decided at a recent Beirut conference to launch a wave of terror
    attacks against Israeli and Jewish interests worldwide. According to the report,
    there will also be similar attacks against coalition troops in Iraq and Afghanistan.
    The conference, which took place at the start of February, was also said to have
    been attended by senior members of the Syrian, Lebanese and Iranian intelligence
    services who presented a list of Israeli intelligence officials to be assassinated.
    Organizations in attendance included: Al-Qaeda, Ansar al-Islam, Hezbollah, Hamas,
    Islamic Jihad. (Haaretz) (Al Bawaba)'
  - The International Atomic Energy Agency (IAEA), the United Nations nuclear agency,
    finds undeclared components in Iran compatible with advanced uranium centrifuge
    designs, increasing Western concerns that it may be developing nuclear weapons.
    (Haaretz)
  - The United Kingdom decides to award an honorary knighthood to Nazi-hunter Simon
    Wiesenthal in recognition of a "lifetime of service to humanity". The knighthood
    also recognized the work of the Los Angeles-based Simon Wiesenthal Center, which
    was founded in 1977 to promote remembrance of the Holocaust and the defense of
    human rights. (Haaretz)
  - 'ROC presidential election, 2004: Lagging behind his rival Lien Chan in opinion
    polls, President Chen Shui-bian promises not to declare Taiwan independence if
    he is re-elected. (BBC)'
  - States of emergency are declared in Nova Scotia and Prince Edward Island, Canada,
    after a prolonged blizzard dumps 90 centimetres of snow on the provinces. This
    doubles the previous record, set in the 1950s. Roads are completely impassable,
    blocked with drifts of up to 3 to 4 metres. (CBC)
  - It is reported that billionaire Philip Anschutz is purchasing the San Francisco
    Examiner for an estimated .
  Same-sex marriage in the United States:
  - The White House reserves judgement on the Federal Marriage Amendment, a proposed
    constitutional amendment to define marriage as a "union of a man and a woman",
    until Massachusetts legislature and San Francisco courts take further action.
    Media reports speculate that the White House will probably also keep their opinion
    quiet until Democratic presidential candidate John Kerry takes a stand on the
    issue. (Washington Times)
  - San Francisco sues California to force the state to accept marriage licenses it
    altered to remove reference to bride and groom and recognize same-sex marriage.
    (Kansas City Star)
  - Laura Bush states that same-sex marriage is "a very, very shocking issue" for
    some people. She hopes the subject can be debated by Americans together, rather
    than it be settled by a Massachusetts court or the mayor of San Francisco. (USA
    Today)
