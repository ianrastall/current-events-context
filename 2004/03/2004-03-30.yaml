Date: '2004-03-30'
Source_URI: Portal:Current events/2004 March 30
Intelligence_Payload:
  Uncategorized:
  - A suicide bomber sets off a small explosion inside the Bolivian Congress. The
    bomber – a miner, protesting unpaid pensions – and the chief congressional security
    guard are killed; several bystanders are wounded. (BBC) (USA Today)
  - French President Jacques Chirac retains his prime minister, Jean-Pierre Raffarin,
    but asks Raffarin to reform the country's government. (Washington Post)
  - New Jersey physicist Greg Olsen pays $20 million to conduct environmental research
    for eight days aboard the International Space Station. (Miami Herald)
  - Police in Uzbekistan raid a militant's hideout south of the capital, Tashkent.
    Fighting has caused 23 deaths in the area. (Reuters)
  - The Philippines prevents a "Madrid-level attack" after arresting four members
    of the Muslim extremist Abu Sayyaf group. (SFGate)
  - The White House allows Condoleezza Rice, the president's National Security Advisor,
    to publicly testify under oath on the investigation into the September 11, 2001
    attacks. (XINHUA) (CNN)
  - Eight men are arrested after a series of raids in the UK under the Terrorism Act
    2000. Half a ton of ammonium nitrate fertiliser was found during the raids. (Guardian)
  - 'SCO v. IBM: IBM has applied for a declaratory judgment that it does not infringe
    the SCO Group''s copyrights. (Groklaw) (ZDNET)'
