Date: '2004-03-28'
Source_URI: Portal:Current events/2004 March 28
Intelligence_Payload:
  Uncategorized:
  - Abdel Aziz al-Rantissi, leader of Hamas, states that God has declared war on the
    United States. (NYTimes) (abs-cbnNEWS) (Reuters) (INDOlink)
  - Cambridge University wins a controversial victory in the 150th Boat Race by six
    lengths, with a total time of 18:47 minutes. (BBC)
  - The Arab League summit is postponed. The meeting was put off indefinitely because
    of differences of opinion regarding ways to encourage reform in the region, including
    democratization. (VOA) (BBC)
  - UK Home Secretary David Blunkett prepares to publish a white paper on organized
    crime that will unveil new details of the Serious Organised Crime Agency, the
    proposed "British FBI". (Ananova)
  - Israeli State Attorney Edna Arbel recommends that Prime Minister Ariel Sharon
    be indicted for taking bribes. (AP)
  - The French regional elections result in massive losses for the governing conservative
    parties and victories for socialist-green alliances in at least 20 of 22 regions.
    (BBC) (Spiegel) (Yahoo France)
  - A coup attempt in the Democratic Republic of the Congo fails. (BBC)
  - Tennis greats Roger Federer and Rafael Nadal played each other for the first of
    many times in their careers10 Years Since Rivalry Began archived from the original
    on 2014-03-28
  - The skeletal remains of Cecilia Zhang are found in a Toronto ravine after her
    high-publicity kidnapping. (Toronto Star)
