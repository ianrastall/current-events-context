Date: '2004-03-21'
Source_URI: Portal:Current events/2004 March 21
Intelligence_Payload:
  Uncategorized:
  - Jimmy Carter, former US president and 2002 Nobel Peace Prize winner, vehemently
    condemns George W. Bush and Tony Blair for waging an unnecessary war "based upon
    lies and misinterpretations" in order to oust Saddam Hussein. He claims that Blair
    had allowed his better judgment to be swayed by Bush's desire to finish a war
    that his father had started. (Independent)
  - 'Malaysian general election: Voting gets underway all over Malaysia to decide
    the new holders of seats in Parliament and various state assemblies. Secular ruling
    coalition Barisan Nasional wins a two-thirds majority and wrests back the state
    of Terengganu from Islamist party PAS. A recount is pending for the closely contested
    state of Kelantan. (Malaysiakini)'
  - The second race of the 2004 Formula One championship, in Malaysia, is won by Michael
    Schumacher. (BBC)
  - Measurements taken at Mauna Loa Observatory show carbon dioxide readings of 379
    parts per million, up by 3 ppm in one year; average increase for the past decade
    has been . The reason for this accelerated buildup in a greenhouse gas requires
    further analysis. (AP)
  - Al-Qaeda claims to have purchased "smart briefcase bombs" with nuclear capabilities
    on the black market. (AP)
  - 'Salvadoran presidential election: Voting takes place to elect a new president
    of El Salvador. (BBC)'
  - 'ROC presidential election: Taiwan''s High Court has ordered all ballot boxes
    to be sealed, in order to preserve evidence. However, a recount of votes was not
    ordered. Various protests are held throughout the island. (AP)'
