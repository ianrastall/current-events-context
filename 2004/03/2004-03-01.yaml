Date: '2004-03-01'
Source_URI: Portal:Current events/2004 March 1
Intelligence_Payload:
  Uncategorized:
  - Prime Minister Ahmed Qurei blasted ongoing Israeli extrajudicial executions of
    Palestinian activists, which claimed two more lives on Sunday, and blamed Israel
    for the weekend of violence, whilst accusing his Israeli counterpart's government
    of trying "to kill any possibility for (achieving a) mutual cease-fire".West Bank
    Barrier Work Halted (BBC) archived from the original on 2014-03-28
  - The People's Republic of China puts in place new rules for the trading of derivatives
    by financial institutions, part of a broader process by which China has in recent
    years sought to integrate its own economy with finance capitalism around the world.
    The China Banking Regulatory Commission receives praise from the New York-based
    International Swaps and Derivatives Association.ISDA Applauds CBRC Derivatives
    Rules (ISDA press release). Archived from the original on 2014-03-28
  - Jean-Bertrand Aristide claims that his resignation as President of Haiti was forced
    and that he was kidnapped by American forces and forced to leave the country against
    his will. United States Vice President Dick Cheney rejects the accusation. (Democracy
    Now!) (Reuters) (CNN)
  - The UK Conservative Party withdraws from the Butler Inquiry into intelligence
    on Iraq's weapons of mass destruction, claiming the way its terms of reference
    have been interpreted is too narrow. The Liberal Democrats claim that this was
    obvious from the beginning. (BBC) (Guardian) (Independent, UK)
  - President of Russia Vladimir Putin names Mikhail Fradkov as his new prime minister.
    (BBC)
  - Marc Dutroux, alleged Belgian child molester and murderer of four girls, goes
    on trial. (BBC)
  - 'Same-sex marriage in the United States: President of the United States George
    W. Bush urges passage of a constitutional amendment to define marriage as between
    one man and one woman, as the only way to stop "municipal and judicial activists"
    from issuing marriage licenses to same-sex couples. "If we are to prevent the
    meaning of marriage from being changed forever, our nation must enact a constitutional
    amendment." John Kerry denounces the amendment as "toying" or "tampering" with
    the Constitution of the United States for partisan advantage. (Washington Times)'
  - 'The winners of the BAFTA Games Awards are announced. The controversial and popular
    Grand Theft Auto: Vice City sweeps the pool, with five awards. (Digit Magazine)'
  - Several hundred United States, French, and Canadian troops are deployed to Haiti.
    (Age)
  - Palau National Congress' debate about whether to propose several constitutional
    amendments to Palau voters or ask them to consider more changes at a Constitutional
    Convention ended without an accord. (Guam Pacific Daily News)
