Date: '2004-03-04'
Source_URI: Portal:Current events/2004 March 4
Intelligence_Payload:
  Uncategorized:
  - The guilty verdict for Moroccan al-Qaeda suspect Mounir el Motassadeq's involvement
    in the September 11, 2001 attacks is overturned by the German appeals court, which
    orders a retrial. (Globe and Mail)
  - Three American Muslims accused of using paintball games to train for a jihad (holy
    war) are found guilty of conspiracy charges. (Fox news)
  - Horst Köhler resigns as the head of the International Monetary Fund in order to
    accept the nomination for Presidency of Germany.
  - Michael Dell, head of Dell Computers announces that he will step down as CEO of
    the computer manufacturer. However, he will still retain his position as chairman
    of the board. Dell president and COO, Kevin Rollins will assume the role of CEO.
    (CNN)
  - A significant copyright ruling by Supreme Court of Canada discusses fair dealing.
    (text of ruling)
  - Chinese authorities release Wang Youcai, a day after Rabiya Kadeer's release (BBC)
  - Israeli tanks (around 15 armoured vehicles escorted by several bulldozers) enter
    the town of Rafah in the southern Gaza Strip, exchanging gunfire with resistance
    and later demolishing a four-storey building, claiming "anti-terrorist operations".
    (Australian)
  - The Prime Minister of Malaysia dissolves the national parliament and all state
    assemblies except Sarawak's, paving the way for the general election to be held
    within 60 days as dictated by the constitution. (BBC)
  U.S. presidential election, 2004:
  - Controversy erupts over the US Republican Party's use of imagery from the September
    11, 2001 attacks in campaign advertising, with some supporting the President,
    like Republican ex-New York City mayor Rudolph Giuliani, and some victims' families
    objecting strongly. (AP) (Guardian) (BBC) (Scotsman)
  - US Democratic Party labels the Bush campaign an "attack machine" which they vow
    to thwart at every turn. "Fund raising and the race to define your opponent before
    he defines you that's what it's all about," said one Democratic strategist yesterday.
    (Washington Times) The White House defends the use of images from the 2001 terror
    attacks in adverts for President Bush's re-election campaign. Karen Hughes states,
    "It's a reminder of our shared experience as a nation ... not just some distant
    tragedy from the past. It really defined our future". (BBC)
