Date: '2004-03-29'
Source_URI: Portal:Current events/2004 March 29
Intelligence_Payload:
  Uncategorized:
  - 'Foreign relations of Taiwan: Dominica switches diplomatic recognition from the
    Republic of China to the People''s Republic of China. (Channel News Asia).'
  - 'ROC presidential election, 2004: The Pan-Blue Coalition drops its demand for
    another round of voting by members of the military and the police who were put
    on a heightened state of alert on election day. Chen Shui-bian and Annette Lu
    sign letters promising not to contest the Pan-Blue petition for a recount.(Miami
    Herald)(Bloomberg)'
  - An explosion occurs close to the main bazaar in Tashkent, Uzbekistan, killing
    two and injuring around twenty; preliminary reports point to two female suicide
    bombers. Also in the capital, three police officers are shot dead; and, in the
    city of Bukhara, another explosion at a suspected terrorist bomb factory claims
    ten fatalities. (Reuters) (BBC)
  - The Republic of Ireland becomes the first country to ban tobacco smoking in all
    enclosed workplaces (including bars and restaurants); infringers risk a €3,000
    (US$3,600) fine. (BBC)
  - NATO welcomes seven new members, as Bulgaria, Estonia, Latvia, Lithuania, Romania,
    Slovakia and Slovenia formally became members by depositing their instruments
    of accession with the United States' government, though the countries will join
    officially next month at a NATO meeting. All but Slovenia were formerly members
    of the Warsaw Pact. (BBC) (NATO)
  - Nanoparticles allegedly cause brain damage in fish, according to a study of the
    toxicity of synthetic carbon molecules called "buckyballs". (NewScientist)
  - Scientists discover methane in the Martian atmosphere and state it could mean
    there is life on the Red Planet. (Space.com)
  - Spain is reported to be considering doubling her number of troops stationed in
    Afghanistan. (BBC) (CNN)
