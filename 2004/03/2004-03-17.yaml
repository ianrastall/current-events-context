Date: '2004-03-17'
Source_URI: Portal:Current events/2004 March 17
Intelligence_Payload:
  Uncategorized:
  - 'ROC presidential election, 2004: Nobel laureate Lee Yuan-tseh endorses Chen Shui-bian
    for the second time. (Seattle PI)'
  - 'Unrest in Kosovo: After two Albanian children are found drowned in the Ibar river
    in Kosovo, with a third still missing, riots erupt in the town of Kosovska Mitrovica
    and later spread to the entire province. Mitrovica Serbs are blamed by Albanian
    media for forcing the children into the river, but this is later denied by United
    Nations officials. At least 22 people are killed by the end of the day with hundreds
    injured in clashes between Serbs and Albanians; enclaves of Kosovo Serbs elsewhere
    in the province experience attacks by Kosovo Albanians as well as offices of UN
    officials which were abandoned. In reaction to the violence in Kosovo, demonstrators
    in Serbia march in Belgrade and set ablaze mosques in Belgrade and Nish. (B92)
    (B92) (SwissInfo) (NYT) (BBC) (CNN) (B92) (RTS, in Serbian)'
  - 'Occupation of Iraq: A car bomb flattens the Mount Lebanon Hotel in central Baghdad
    at 20:10 (UTC+3), killing at least 17 people and injuring 45 more. (BBC) (CNN)
    (Democracy Now!)'
  - Utah bans execution by firing squad. (BBC)
  - 'Ohio highway sniper attacks: Suspect Charles A. McCoy Jr. is arrested in Las
    Vegas, Nevada. (MSNBC)'
