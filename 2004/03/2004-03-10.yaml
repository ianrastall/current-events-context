Date: '2004-03-10'
Source_URI: Portal:Current events/2004 March 10
Intelligence_Payload:
  Uncategorized:
  - 'ROC presidential election, 2004: Wei Chueh, one of four Buddhist masters in Taiwan,
    controversially endorses Lien Chan. (BBC)'
  - National Hockey League hockey player Todd Bertuzzi is suspended for the remainder
    of the season and for the entire Stanley Cup playoffs for his hit on Steve Moore,
    which left him with two broken vertebrae in his neck. The Vancouver police department
    is also looking into the incident. (TSN)
  - Girls Gone Wild videos of minors exposing their breasts are not child pornography,
    according to a Florida court. (FOX) (AP)
  - U.S. officials tell of their plans to impose sanctions against Syria under the
    Syria Accountability and Lebanese Sovereignty Restoration Act. The Bush administration
    accuses Syria of sponsoring terrorism and developing chemical and biological weapons.
    (CNN)
  - Kodak sues Sony over alleged violations of Kodak's patents on digital camera technology.
    (USA Today)
  - 'U.S. presidential election: The Bush reelection campaign charges that an anti-Bush
    ad campaign funded with "soft money" from billionaire George Soros funding violates
    campaign finance laws. The Bush camp plans to file a complaint with the Federal
    Election Commission regarding a planned anti-Bush advertising campaign by The
    Media Fund. (CNN)'
  - 'Canadian federal election: Monia Mazigh, the wife of former Syrian deportee Maher
    Arar, announces her run for candidacy with the NDP in the riding of Ottawa South.
    (Globe and Mail)'
  - Lee Boyd Malvo is sentenced to life in prison without parole by a Virginia judge
    for his role in the Beltway Sniper Attacks.(CNN)
  - Tracy McGrady of the Orlando Magic scores 62 points against the Washington Wizards,
    setting the record for most points scored in one game for the Orlando Magic franchise.
