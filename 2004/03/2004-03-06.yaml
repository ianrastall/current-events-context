Date: '2004-03-06'
Source_URI: Portal:Current events/2004 March 6
Intelligence_Payload:
  Uncategorized:
  - Tens of thousands demonstrate in Caracas, Venezuela, against what they see as
    the government's fraud committed by the National Electoral Council related to
    the realization of a presidential referendum in mid-2004.
  - The United States puts forth a UN Security Council resolution seeking to freeze
    the assets of Charles Taylor, the exiled former president of Liberia. The U.S.
    also announces that it is pledging to help rebuild Liberia's armed forces and
    that it supports the cancellation of Liberia's international debt, providing that
    economic reforms are implemented. (BBC)
  - Singer David Crosby is arrested in New York City after marijuana and a handgun
    were found in a suitcase Crosby accidentally left behind at his hotel. (CNN)
  - Palestinians are killed and wounded in attack on the main crossing point between
    the Gaza Strip and Israel. Hamas, Islamic Jihad, and the al-Aqsa Martyrs Brigades
    claim responsibility. (BBC)
  - Teenagers released from Guantanamo Bay's Camp X-Ray recall the place fondly. (Guardian)
  - Turkish politicians claim that there is political consensus within Turkey to join
    the European Union, despite the EU's demands for changes before that can occur.
    (IHT)
  - Up to 80,000 people march through the Turkish capital Ankara against plans to
    reform the country's civil service. The marchers fear that the reforms could lead
    to the civil service becoming politicised or losing its secular status. (BBC)
  - 'Canadian federal election: Former deputy prime minister Sheila Copps loses the
    Liberal constituency nomination to current Transport Minister Tony Valeri by 311
    votes. She will likely appeal; there is some speculation that if the loss remains,
    she will either run as an independent or for the New Democratic Party. (Toronto
    Star)'
  - The scientists of the Russian polar research station near the North Pole are evacuated
    from their shifting and cracking ice floe by two Russian helicopters via Norway's
    Spitzbergen island. (BBC)
