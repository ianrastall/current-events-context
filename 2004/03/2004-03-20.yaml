Date: '2004-03-20'
Source_URI: Portal:Current events/2004 March 20
Intelligence_Payload:
  Uncategorized:
  - 'ROC presidential election: Chen Shui-bian is declared the winner over Lien Chan
    by fewer than 30,000 votes of nearly 13,000,000 cast (0.25%). Lien calls the result
    unfair and demands it be voided. A controversial referendum is invalidated by
    low turnout. (BBC) (CNN)'
  - Former Queen Juliana of the Netherlands dies aged 94. (BBC) (Royal Household)
  - On the first anniversary of the 2003 invasion of Iraq, millions join protests
    in cities across the world to demonstrate against the war and the continued occupation.
    In London two Greenpeace protesters evade newly tightened security and scale the
    Houses of Parliament's Clock Tower to unfurl a banner calling for the truth to
    be told by the UK government. (Democracy Now!) (Reuters) (AFP) (BBC) (CNN)
  - The BBC announces that actor Christopher Eccleston is to play Doctor Who when
    the show makes its eagerly awaited return to television in 2005. (BBC)
  - Stephen Harper is elected as leader of the Conservative Party of Canada, winning
    56% of the possible points on the first ballot. (Global TV) (CBC) (Globe and Mail)
  - A Methodist church jury in Bothell, Washington acquits a lesbian minister of violation
    of church rules. (AP)
