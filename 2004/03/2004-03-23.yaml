Date: '2004-03-23'
Source_URI: Portal:Current events/2004 March 23
Intelligence_Payload:
  Uncategorized:
  - 'Unrest in Kosovo: an UNMIK police patrol is attacked on the Pristina–Podujevo
    road. A UN police officer from Ghana is killed, a local police officer later dies
    of his wounds, and their translator is also wounded but in stable condition. (Kosovo.net)'
  - United States Secretary of Defense Donald Rumsfeld and Secretary of State Colin
    Powell defend their pre-September 11 actions, saying that even if Osama bin Laden
    had been killed, the attacks on the World Trade Center and The Pentagon would
    have still occurred. Former Secretary of State Madeleine Albright and former Secretary
    of Defense William Cohen also testify before the National Commission on Terrorist
    Attacks Upon the United States. (AP via SFGate)
  - Abdel Aziz al-Rantissi is chosen to lead Hamas in the Gaza Strip, and the movement's
    exiled politburo chief Khaled Meshaal is chosen as its overall leader. (BBC) (Washington
    Post)
