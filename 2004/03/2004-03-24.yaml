Date: '2004-03-24'
Source_URI: Portal:Current events/2004 March 24
Intelligence_Payload:
  Uncategorized:
  - The World Trade Organization makes a preliminary ruling that United States laws
    prohibiting Internet gambling violate international trade agreements, in response
    to a complaint by Antigua and Barbuda. The Bush administration vows to appeal,
    while some members of the United States Congress say they would rather allow a
    trade war or withdraw from future WTO talks than repeal laws against online gambling.
    (BBC) (Seattle PI)
  - Danish artist Marco Evaristti paints an iceberg in Greenland red, using 780 gallons
    of paint. (USA Today)
  - A bomb is discovered on a TGV railway between Paris and Geneva near Troyes, France.
    (ONE News)
  - 'Elk Grove Unified School District v. Newdow: The United States Supreme Court
    hears oral arguments over the constitutionality of the "under God" clause of the
    Pledge of Allegiance. (WTHR) (CNN)'
  - The British explorer David Hempleman-Adams sets an altitude record for a flight
    in a wicker basket balloon. (Bloomberg)
  Israeli-Palestinian conflict:
  - The leader of Hamas states that the group has no plans to attack U.S. targets,
    retreating from earlier threats by its armed wing. However, Israeli Prime Minister
    Ariel Sharon is announced as a new target, instead. (News Limited)
  - Sharon states that Israel has a "natural right" to pursue those who would destroy
    it. (Jewish Press)
  - Hussam Abdo, a 14-year-old Palestinian suicide bomber fails to detonate his bomb-vest
    at an Israeli checkpoint outside Nablus. The child was paid $23 and promised sex
    in heaven as his reward. An armed wing of Fatah takes responsibility for sending
    the boy.
