Date: '2004-03-15'
Source_URI: Portal:Current events/2004 March 15
Intelligence_Payload:
  Uncategorized:
  - Four U.S. Baptist missionaries working on a water purification project are killed
    in a drive-by shooting in the northern Iraqi city of Mosul. (CNN)
  - Pavlo Lazarenko, former prime minister of Ukraine, stands trial in a U.S. federal
    court in San Francisco for money laundering. (AP)
  - 'Same-sex marriage in the United States: Commissioners of Multnomah County, Oregon,
    dismiss state attorney general Hardy Myers'' non-binding opinion that same-sex
    marriages are illegal and vow to continue issuing marriage licenses to same-sex
    couples. (Seattle Times)'
  - Newly elected Spanish Prime Minister José Luis Rodríguez Zapatero announces his
    government's opposition to the invasion and continued occupation of Iraq and his
    intention to withdraw Spanish troops from Iraq by June 30, unless they are part
    of a U.N. force. (BBC)
  - Astronomers announce the discovery of 90377 Sedna, a Pluto-like planetoid which
    is the most distant individual object known to orbit the Sun. (Caltech) (BBC)
    (The Australian)
  - Iran will reallow the entry of UN nuclear inspectors after March 27, says International
    Atomic Energy Agency chief Mohamed ElBaradei. (BBC) (AFP)
  - Haiti recalls its ambassador of neighbouring Caribbean state Jamaica, where ousted
    president Jean-Bertrand Aristide is said to be making a personal visit. Haiti
    also threatens to boycott a 2-day Caricom meeting. (AP) (BBC) (Reuters)
  - In the aftermath of nomination day for the Malaysian general election, Barisan
    Nasional wins four more seats in various state assemblies and another parliamentary
    seat, uncontested. (ChannelNewsAsia) (Toronto Star)
  - Exiled Syrian Kurds storm the Syrian consulate in Geneva and other Kurds protest
    in Turkey and Germany at weekend violence in northeast Syria. (BBC)
