Date: '2004-03-16'
Source_URI: Portal:Current events/2004 March 16
Intelligence_Payload:
  Uncategorized:
  - Rwandan President Paul Kagame accuses France of direct involvement in the 1994
    genocide. (BBC)
  - 'March 11, 2004 Madrid attacks: Spanish police identify six Moroccans suspected
    to have carried out the Madrid attacks. Five of the suspects are still at large
    but one is in custody. (BBC) (Washington Post)'
  - George W. Bush calls on his Iraq War allies to stick with the United States. (Reuters)
  - An explosion at an apartment building in Arkhangelsk, Russia, kills 32. (Al-Jazeera)
  - The Federal Reserve votes to keep interest rates unchanged, primarily since new
    hiring has continued to lag in the United States. (Forbes)
