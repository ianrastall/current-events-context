Date: '2004-03-11'
Source_URI: Portal:Current events/2004 March 11
Intelligence_Payload:
  Uncategorized:
  - 'March 11, 2004 Madrid attacks: 10 bombs on Madrid commuter trains kill at least
    190 people and wound more than 1247, the largest toll in any bombing in Europe
    (the 1988 Lockerbie bombing killed more but wounded fewer). (Washington Post)
    (BBC) (La Vanguardia) (CincoDías) (El Semanal) (Renfe) (Le Monde) (CBC) (Reuters)
    (CNN) Purported al-Qaida statement: (Al-Jazeera)'
  - The Spirit rover takes the first picture ever of Earth from the surface of another
    planet which happens to be Mars. (Space.com)
  - Four British prisoners who had been arrested on their return from Guantanamo Bay
    are released without charge. A fifth was not arrested on arrival. A further four
    remain in the Cuban camp. British newspapers vie for the rights to their stories,
    with offers in the range of £300,000. Compensation lawsuits from the returned
    five are expected against the US and UK governments. (Guardian) (BBC) (BBC)
  - 'Same-sex marriage in the United States: The California Supreme Court issues an
    interim stay ordering San Francisco officials to stop issuing marriage licenses
    to same-sex couples. The court said it would hear oral arguments regarding the
    controversy in May or June. The state says it did not register any of the thousands
    of recent gay marriages. (FOX/AP) (365Gay) (Washington Times)'
  - A Maryland woman and former Democratic congressional aide, Susan Lindauer, is
    arrested on charges of conspiracy against the United States, acting as an Iraqi
    spy before and during last year's invasion. (CNN) (Smoking Gun)
  - An Australian Senate report on poverty is immediately dismissed by Prime Minister
    John Howard. The report shows between 2 and Australians, or up to 19 per cent
    of the population, are living in poverty. (Age) (West Australian) (Australian)
    (Channelnewsasia)
  - 'SCO v. IBM: BayStar Capital, an investment company, confirms tie between Microsoft
    and SCO. (Business Week) (CNet) (Newsforge) (Groklaw)'
  - Pop singer George Michael announces that he will stop selling his music. Instead,
    he plans to distribute it freely over the Internet and pass on any donations to
    charity. (E! Online)
