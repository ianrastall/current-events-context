Date: '2004-03-25'
Source_URI: Portal:Current events/2004 March 25
Intelligence_Payload:
  Uncategorized:
  - The 2004 Abel Prize in mathematics is announced to be awarded to Michael F. Atiyah
    and Isadore M. Singer for their index theorem. (Aftenposten)
  - The terrorist group AZF suspends its bombing campaign in France but continues
    to demand money from the government. News agencies report that the government
    placed notices in Libération newspaper to contact the terrorists. (BBC)
  - The House of Representatives of US state of Georgia passes a ban on genital piercings
    for women, including consenting adults, as part of a bill to ban female genital
    mutilation as performed by some Muslim populations, among others. The ban does
    not apply to men. The provision is not included in the version passed by Georgia's
    Senate. (AP)
  - Five planets (Mercury, Venus, Mars, Jupiter, and Saturn) array across the evening
    sky in a night show that will not be back for another three decades. (AP)
  - A prototype of a mechanized five-ton disaster-rescue robot, the T-52 Enryu, is
    unveiled in Japan. (AFP)
