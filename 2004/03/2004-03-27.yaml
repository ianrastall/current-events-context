Date: '2004-03-27'
Source_URI: Portal:Current events/2004 March 27
Intelligence_Payload:
  Uncategorized:
  - John Kerry joins other Democrats calling for National Security Advisor Condoleezza
    Rice to testify before the September 11 commission and states the White House
    should learn from President Franklin Delano Roosevelt's openness during an inquiry
    after Pearl Harbor. (The Atlanta Journal-Constitution)
  - 'ROC presidential election, 2004: 500,000 Pan-Blue protesters take to the streets
    in Taipei to demand a recount. (Reuters)'
  - NASA succeeds in a second attempt to fly its X-43A experimental airplane from
    the Hyper-X project, attaining speeds in excess of Mach 7, the fastest ever air-breathing
    hypersonic flight. (CNN)
  - In Brussels, European Union Leaders express a sense of unity in the aftermath
    of the Madrid train bombings, and state that there is a new impetus to reaching
    a deal on the Union's draft constitution. (IHT)
  - A powerful cyclone hits the coast of southern Brazil. Brazilian and U.S. meteorologists
    disagree over whether Cyclone Catarina is a hurricane, the first ever recorded
    in the South Atlantic. (AP)
