Date: '2004-03-12'
Source_URI: Portal:Current events/2004 March 12
Intelligence_Payload:
  Uncategorized:
  - 'Same-sex marriage in the United States: Oregon''s attorney general issues his
    opinion on same-sex marriage within Oregon. He concludes that current state law
    prohibits issuing marriage licenses to same-sex couples, but that the Oregon Supreme
    Court is likely to conclude those statutes violate the state''s constitution.
    The Wisconsin State Senate approves state constitution amendment to ban same-sex
    marriages or civil unions, to counter efforts elsewhere to legalize such partnerships.
    (Oregon Attorney General''s opinion—PDF) (Wisconsin State Journal)'
  - A Utah woman is charged with murder when her child is stillborn, after allegedly
    refusing a Caesarean section. (Reuters) (SF Chronicle) (Toronto Star)
  - 'March 11, 2004 Madrid attacks: Millions of people pack rainswept streets across
    Spain in protest against the recent Madrid bombings. (Reuters)'
  - The parliament of South Korea votes to impeach President Roh Moo-hyun, saying
    he "breached election rules" by calling for support for the Uri Party. Prime Minister
    Goh Kun will run the country until the Constitutional Court rules on the issue.
    Roh's supporters dismiss the move as a power play to influence the upcoming April
    elections. Thousands protest in support of Roh. (Reuters) (BBC) (BBC)
  - 'Guantanamo Bay: Recently released British Camp X-Ray inmate Jamal al-Harith is
    interviewed by the Daily Mirror, alleging physical assaults and psychological
    torture. (Daily Mirror) (BBC)'
  - Iraqi insurgents kill two U.S. soldiers in a roadside bomb attack near the Sunni
    Triangle town of Habbaniyah. (AP)
  - Iraqi police are responsible for killing two U.S. civilians, local investigators
    state. (UPI)
  - The U.S. government announces its intention to stockpile as many as doses of an
    experimental anthrax vaccine. (AP)
  - 'ROC presidential election, 2004: An ad comparing Chen Shui-bian to Adolf Hitler
    is withdrawn after protests by Jewish leaders.(CNN)'
