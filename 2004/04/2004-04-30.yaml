Date: '2004-04-30'
Source_URI: Portal:Current events/2004 April 30
Intelligence_Payload:
  Uncategorized:
  - U.S. newscast Nightline is taken off the air by several stations owned by the
    Sinclair Broadcast Group because of its planned airing of a list of U.S. soldiers
    killed in Iraq. Sinclair claims it is a political ploy, while network ABC says
    it is meant as "an expression of respect which simply seeks to honor those who
    have laid down their lives for this country.
  - 'President George W. Bush expresses his "disgust" at images of Iraqi prisoners
    being mistreated by U.S. soldiers: "Their treatment does not reflect the nature
    of the American people."'
  - Macedonian officials admit that they staged a bogus gun-battle with "terrorists"
    in March 2002 and that they knew the seven men slain had no terrorist connections.
    Four members of the security forces face murder charges for their staged killing.
  - Diego Maradona leaves hospital after 12 days of treatment for heart and breathing
    problems.
  - After 25 years, Bob Edwards hosts NPR's Morning Edition for the last time.
