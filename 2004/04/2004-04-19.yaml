Date: '2004-04-19'
Source_URI: Portal:Current events/2004 April 19
Intelligence_Payload:
  Uncategorized:
  - Ten Iraqi Kurds and North Africans are arrested by UK police on suspicion of violating
    the Terrorism Act 2000. The arrests are made in dawn raids in Greater Manchester
    and other parts of the North and Midlands. (BBC)
  - The law firm Davis Polk & Wardwell makes public a 463-page report on accounting
    and corporate governance issues affecting oil giant Royal Dutch/Shell. The report,
    prepared at the request of Shell's audit committee, explains how lax standards
    have allowed the company to vastly overstate the extent of its oil and natural
    gas reserves. (company website)
  - 'Boston Marathon: A new world record of 1:18:27 is set in the men''s wheelchair
    division by a South African (Ernst Van Dyk). Kenyans win the women''s race and
    the men''s for the 13th time in fourteen years. (Boston Globe)'
  - The 10th TV turnoff week starts.
  - Argentine doctors report that soccer superstar Diego Maradona has suffered a major
    heart attack in Buenos Aires and is in a hospital in intensive care. (news.com.au)
