Date: '2004-04-09'
Source_URI: Portal:Current events/2004 April 9
Intelligence_Payload:
  Uncategorized:
  - Henry C. Lee arrives in Taipei to investigate the March 19, 2004 assassination
    attempt in Taiwan.
  - 'Basketball: The Euroleague Final Four tournament will be held in Tel Aviv, Israel
    despite concerns over Palestinian terrorism. Maccabi Tel Aviv, Israel beats Zalgiris
    Kaunas, Lithuania to qualify.'
  - Good Friday - Ruben Enaje is crucified for the 18th time in San Pedro Cutud, Philippines.
  Iraq Occupation and Insurgency:
  - South Korea announces the deployment of 3,700 soldiers in Iraq by August, despite
    recent attacks. The augmentation will make it the coalition's third largest contingent.
    (World Tribune)
  - Japan refuses to withdraw troops from Iraq in the face of the death threats from
    insurgents holding three of its citizens. (BBC)
  - Coalition forces retake Kut, meeting little opposition.
  - US Marines resume their advance into Fallujah, after a pause to allow humanitarian
    supplies to enter the city. An attempt to use the pause to negotiate terms of
    surrender fails when the representatives from the city fail to show.
  - United Nations Secretary-General Kofi Annan urges stepped-up efforts to protect
    civilians and end the violence in the deteriorating security situation in Iraq.
    (UN)
