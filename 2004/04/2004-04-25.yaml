Date: '2004-04-25'
Source_URI: Portal:Current events/2004 April 25
Intelligence_Payload:
  Uncategorized:
  - The Arab League Conference commences in Cairo. (INN)
  - Alan Kay, co-inventor of the Smalltalk programming language, receives the 2003
    ACM Turing Award, including US$100,000. (Dr.Dobb's Journal)
  - 'Austrian presidential election: Heinz Fischer (SPÖ) wins with 52% against Foreign
    Minister Benita Ferrero-Waldner (ÖVP). (The Guardian)'
  - Arsenal F.C. wins the English football league title for the 13th time.
  - 'Abortion in the United States: Hundreds of thousands march in Washington, D.C.
    to protest President Bush''s anti-abortion policies. (AP) (Democracy Now!)'
