Date: '2004-04-06'
Source_URI: Portal:Current events/2004 April 6
Intelligence_Payload:
  Uncategorized:
  - The Standing Committee of the National People's Congress rules that the right
    to amend the Basic Law of Hong Kong belongs to the National People's Congress.
    The Standing Committee also issued an "interpretation" (effectively an amendment)
    of the Basic Law which set out an additional step required for any changes in
    Hong Kong's political structures. (CNN)
  - State security in the People's Republic of China is on high alert as disgraced
    Premier Zhao Ziyang seems to be near death.(CNN)
  - The parliament of Lithuania narrowly votes to impeach President Rolandas Paksas
    for violating the constitution. Parliamentary speaker Arturas Paulauskas will
    act as president for two months pending new elections. (BBC)
  - ABC reports that British government sources believe that suspects arrested last
    week in the UK may have been plotting to make an improvised chemical weapon using
    the toxic agent osmium tetroxide. (ABC/US) (BBC)
  - Palestinian officials state that the Palestine Liberation Organization (PLO) asks
    Hamas fighters to join a decision making body to run the Gaza Strip if Israel
    pulls out. (Al Jazeera)
  - IBM requests that the court dismiss the SCO Group's copyright charges against
    it "with prejudice". (Salt Lake Tribune)
  - University of Connecticut becomes the first NCAA Division I school to win the
    men's and the women's U.S. amateur national basketball championships in the same
    season, after the women's team three-peats. (ESPN) (Sports Illustrated)
  Iraq:
  - Shiites want Iraqi political control by June 30 but say the violence the Mahdi
    Army has incited since Sunday is dangerous. (Christian Science Monitor)
  - Iraqi insurgents and rebellious Shiites challenge Coalition occupation forces.
    At least 30 Iraqis are killed. Sixteen Iraqis died in battles with Marines in
    Fallujah. At least 18 American soldiers and more than 116 Iraqis have died in
    three days of clashes. A Salvadoran soldier and one from Ukraine also are killed.
    (AP) (Democracy Now!)
  - Militant cleric Moqtada Sadr rallies his Mahdi Army militia in a third day of
    urban warfare with coalition forces after fleeing to a refuge close to Shia Islam's
    holiest shrine. (Financial Times)
  - Muqtada al-Sadr is accused of confiscating the "khums" (or donations) of worshipers
    to mosques and shrines in southern Iraq. (Al Jazeera)
  - United States civilian administrator Paul Bremer states that there is "no question"
    that coalition forces are in control. "I know if you just report on those few
    places, it does look chaotic. But if you travel around the country ... what you
    find is a bustling economy, people opening businesses right and left, unemployment
    has dropped." (CNN)
