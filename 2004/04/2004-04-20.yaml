Date: '2004-04-20'
Source_URI: Portal:Current events/2004 April 20
Intelligence_Payload:
  Uncategorized:
  - In Singapore, a Circle MRT line tunnel being dug under the Nicoll Highway collapses,
    killing two. Two more are missing and feared dead. (Straits Times)
  - Indian Elections
  - First phase of the Indian General Elections begin. Almost half the country's constituencies
    vote.
  - A spokesman for Saudi Arabia strongly denies John Kerry's assertion that it had
    made an agreement with United States President George W. Bush to manipulate the
    price of oil for political purposes as the U.S. election approaches. The assertion
    stems from material in Bob Woodward's new book, Plan of Attack, detailing the
    Bush Administration's preparation for the invasion of Iraq. (NYT) (AP) (Democracy
    Now!)
  - 'United Kingdom referendum on the European Constitution: P.M. Tony Blair confirms
    that a referendum will be held on the UK''s ratification of the future EU constitution.
    (BBC).'
  - NASA launches Gravity Probe B in an effort to test Einstein's general theory of
    relativity. (NASA)
  Iraq Occupation and Insurgency:
  - 12 mortars were fired on Abu Ghraib Prison by insurgents. 22 detainees were killed
    and 92 wounded.
  - Iraqi security forces who fled the fighting in Fallujah begin to return to the
    city. (AP)
