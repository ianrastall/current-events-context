Date: '2004-04-24'
Source_URI: Portal:Current events/2004 April 24
Intelligence_Payload:
  Iraq Occupation and Insurgency:
  - Suicide bombers detonate boats alongside two oil tankers and a coalition boat
    in the Persian Gulf, targeting Iraq's main oil terminal, Basra. (Reuters)
  - A bomb in Baghdad's Sadr City market kills 12 Iraqis. In a separate incident,
    five US soldiers are killed in a rocket attack on a military base north of Baghdad.
    (CNN) (AP)
  - Leaders of Australia and Bulgaria visited their troops Sunday. Australian Prime
    Minister John Howard joined Australian troops in Baghdad for ceremonies honoring
    the country's war dead. Bulgarian President Georgi Parvanov visited his country's
    troops two days after a Bulgarian soldier was shot dead in Karbala, the sixth
    from that country to die in the war.
  Uncategorized:
  - In the Cyprus reunification referendum, 65% of Turkish Cypriot voters accept and
    75% of Greek Cypriot voters reject the Annan Plan. (BBC) (BBC)
  - Forgent Networks sues 31 companies for infringement of their software patent,
    which they claim is used in the JPEG standard. (AP)
