Date: '2004-04-26'
Source_URI: Portal:Current events/2004 April 26
Intelligence_Payload:
  Uncategorized:
  - In an open letter to Tony Blair, 52 former high ranking British diplomats, including
    former ambassadors to Iraq and Israel, condemn the Prime Minister's foreign policy
    stance in the Middle East as "doomed to failure" and also condemn George W. Bush's
    recent endorsement of Ariel Sharon's offer to withdraw settlers from the Gaza
    Strip while leaving some in the West Bank as "one-sided and illegal and which
    will cost yet more Israeli and Palestinian blood."
  - 'Indian general election, 2004: The second phase of elections in the world''s
    largest democracy takes place. Many key states such as Uttar Pradesh, Maharashtra
    and Bihar vote; exit polls favour the opposition (BBC)'
  - The design of the new United States fifty-dollar bill is announced. (U.S. Treasury)
    (IHT) (CNN)
  - Authorities in Jordan announce that they have broken up an attempt to set off
    massive explosions in Amman, possibly including the release of toxic chemicals.
    Alleged targets include the office of the Prime Minister, Jordanian intelligence
    headquarters, and the US embassy. The plot is attributed to Al Qaida operative
    Abu Musab al-Zarqawi. (CNN)
  - Three Irishmen arrested in Colombia in August 2001 on charges of training FARC
    rebels are acquitted. (BBC)
  - The Hong Kong democracy movement suffers a setback as the Standing Committee of
    the National People's Congress declares Hong Kong will not have direct elections
    for Chief Executive in 2007 nor for all its Legislative Councillers in 2008.
  - A landslide buries a village in southern Kyrgyzstan, and emergency officials state
    that up to 33 people are missing and feared dead.
  - Nick Holonyak Jr., inventor of the light-emitting diode (LED), receives the 10th
    annual Lemelson-MIT Prize, awarded to prominent inventors by the Massachusetts
    Institute of Technology. (AP)
  - Norwegian chess prodigy Magnus Carlsen (13) becomes the world's youngest international
    Grandmaster (GM), and the second youngest ever, after four wins and four draws
    out of nine games in the 6th Dubai Open Chess Championship. (Aftenposten)
