Date: '2004-04-07'
Source_URI: Portal:Current events/2004 April 7
Intelligence_Payload:
  Uncategorized:
  - Study reports estimates of how long it took for the last four reversals of the
    Earth's magnetic field. It also reports that the turnarounds occur more quickly
    nearer the equator than at higher latitudes closer to the poles. (MSN)
  - 'Same-sex marriage in the United States: Represented by the ACLU, New York State
    Assembly man Daniel O''Donnell and his partner and 12 other same sex couples file
    suit against the New York Department of Health to strike down a state law defining
    marriage as between "a man and a woman." (365Gay.com) (Newsday)'
  Occupation of Iraq -- Iraq Insurgency:
  - Baghdad office of Shiite leader Moqtada al-Sadr is surrounded by U.S. tanks and
    troops amid efforts to arrest the Iraqi cleric. Some 500 armed Sadr militia burn
    tires, forming roadblocks and promising jihad near the office. Snipers have also
    been placed in homes in the neighborhood in the Baghdad slum of Sadr City. (UPI
    photo) (Democracy Now!)
  - Militants inside the Abdul-Aziz al-Samarrai mosque shoot at US Marines, and Lt.
    Col. Brennan Byrne orders his men to return fire. "If they use the mosque as a
    military machine, then it's no longer a house of worship and we strike", he said.
    (AP)
