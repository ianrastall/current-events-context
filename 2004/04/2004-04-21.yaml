Date: '2004-04-21'
Source_URI: Portal:Current events/2004 April 21
Intelligence_Payload:
  Uncategorized:
  - A grand jury indicts Michael Jackson on charges of child molestation. (FoxNews)
    (→ Trial of Michael Jackson)
  - Mordechai Vanunu, who leaked Israeli nuclear-weapons secrets in 1986, is released
    from prison after 18 years. (Guardian) (BBC)
  - Two car bombs explode outside the General Security headquarters of Saudi Arabia
    in Riyadh, killing nine and wounding 125. (AP) (CNN)
  Iraq Occupation and Insurgency:
  - Three car bombs explode outside police stations in Basra, killing 68 people and
    wounding over 100 more. Iraqi officials blame suicide bombers for the terrorism.
    23 of the casualties are school children. A fourth car bomb explodes in Zubeir,
    south of Basra, killing three and wounding four. British soldiers assisting the
    wounded are pelted with stones, injuring four, two seriously. (BBC) (NYT)
  - The Iraqi Governing Council chooses a tribunal of judges and prosecutors to try
    Saddam Hussein. Salem Chalabi, nephew of Ahmed Chalabi, will chair the tribunal.
    (Toronto Star)
