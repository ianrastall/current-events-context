Date: '2004-04-13'
Source_URI: Portal:Current events/2004 April 13
Intelligence_Payload:
  Uncategorized:
  - The Bangkok Subway opens for limited public trials. (Channel NewsAsia)
  - Shanghai modifies its interpretation of the People's Republic of China's One Child
    Policy, allowing all divorced residents who remarry to have a second child without
    penalty. (VOA) (Guardian)
  - A provisional report from the September 11 Commission states that the FBI was
    hampered in its fight against terrorism by poor intelligence, insufficient staffing
    and resources and a bureaucratic culture. (Sydney Morning Herald) (Washington
    Post)
