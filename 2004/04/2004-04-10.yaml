Date: '2004-04-10'
Source_URI: Portal:Current events/2004 April 10
Intelligence_Payload:
  Iraq Occupation and Insurgency:
  - Iraq marks the anniversary of Saddam Hussein's fall with fighting and bloodshed.
    Kurds, in the relatively stable north, celebrate with parties and the melting
    of an ice statue of the ousted dictator. (Al Jazeera)
  - Al Arabiya reports an Iraqi rebel group in Falluja threatens to target Christians,
    assassinate or kidnap priests, and destroy churches. Saraya wal Mujahideen also
    calls on the Pope and the United Nations to stop the town's siege. (Reuters)
  Uncategorized:
  - More than a thousand Nepalis are arrested in Kathmandu for taking part in a demonstration
    calling on their king to restore democracy. (Morning Star)
  - Responding to requests by the September 11th Commission, the White House releases
    a newly declassified President's Daily Brief from a month before the September
    11, 2001 attacks warning of possible al-Qaeda activity, including planned hijackings,
    within the United States. (CNN) (Briefing in PDF format) (Smoking Gun)
  - Researchers develop a small device called "the CPOD" which does for people what
    black boxes do for airplanes. (NASA)
