Date: '2004-04-23'
Source_URI: Portal:Current events/2004 April 23
Intelligence_Payload:
  Uncategorized:
  - DaimlerChrysler announces it will no longer financially support Mitsubishi Motors
    and will try to sell its current stake. (Taipei Times)
  - Muqtada al-Sadr threatens U.S. troops with suicide attacks if they move against
    him in Najaf. (Arab News) (Reuters)
  - Palestinian gunmen attack a police station in the Gaza Strip, freeing three men
    arrested for the October 2003 bomb attack against an American diplomatic convoy.
    A fourth man arrested for the bombing refuses to leave the police station. (AP)
  - A major fire in downtown Bangkok leaves thousands of residents homeless. Hundreds
    of buildings, including several hotels, are destroyed in the area near the Australian
    and German embassies. (AP)
  - 'Ryongchon disaster: Breaking from previous precedent, the North Korean government
    asks for and receives United Nations recovery assistance. (CNN)'
