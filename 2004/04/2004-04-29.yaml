Date: '2004-04-29'
Source_URI: Portal:Current events/2004 April 29
Intelligence_Payload:
  Uncategorized:
  - 'Abu Ghraib torture and prisoner abuse: Photographs showing Iraqi prisoners in
    the Abu Ghraib prison outside Baghdad being tortured, abused, humiliated by U.S.
    soldiers spark outrage around the world. Six soldiers face courts martial and
    their commanding officer is suspended. (BBC)'
  - Google announces plans for an initial public offering to raise as much as US$2.72
    billion. The IPO will be unconventional in that it will use an auction process
    and a complex averaging formula designed to prevent brokers' elite customers from
    winning more shares than average investors. (SF Chronicle) (The Age)
  - Ten U.S. soldiers are killed in three attacks in Iraq, raising the number of U.S.
    combat deaths in April to 126. More U.S. troops have been killed this month than
    during the six weeks of "major combat" in 2003. (Washington Post)
  - President George W. Bush and Vice President Dick Cheney meet in private with all
    10 members of the 9/11 Commission. (PolitInfo)
  - Federal authorities file the first criminal charges under the CAN-SPAM Act of
    2003 against a group that had spammed ads for allegedly worthless "diet patch"
    products. (Detroit Free Press)
  - The last Oldsmobile is produced in Lansing, Michigan (CNN).
  - 'Maccabi Tel-Aviv, Israel, beats CSKA Moscow, Russia in the Euroleague and qualifies
    for the finals. Final score: 93-85. (AP)'
