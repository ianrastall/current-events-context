Date: '2004-04-27'
Source_URI: Portal:Current events/2004 April 27
Intelligence_Payload:
  Uncategorized:
  - In heavy fighting outside Najaf, Iraq, U.S. forces kill 64 insurgents and destroy
    an anti-aircraft weapon.
  - A bomb explosion and gun battle occur in Damascus, Syria between security forces
    and a "terrorist group," in which four people are killed and a vacant United Nations
    building badly damaged. The identity and motives of the attackers is unclear but
    Islamist militants are the prime suspects. (BBC).
  - South African president Thabo Mbeki is sworn in for a second term after being
    overwhelmingly reelected on April 14. The event is marred by controversy over
    the attendance of Zimbabwean president Robert Mugabe.
