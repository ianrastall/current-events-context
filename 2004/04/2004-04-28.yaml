Date: '2004-04-28'
Source_URI: Portal:Current events/2004 April 28
Intelligence_Payload:
  Uncategorized:
  - 'Republic of China presidential election, 2004: The Judicial Yuan schedules a
    vote recount for 10 May.'
  - Cable TV giant Comcast abandons its US$66bn bid to take over Disney, citing a
    lack of interest from the Disney board. (BBC)
  - More than 100 suspected Jemaah Islamiah militants die during their attacks on
    security outposts in Thailand's Muslim-dominated southern provinces of Pattani,
    Yala and Songkhla. (BBC)
  Iraq occupation and resistance:
  - Intense fighting breaks out in Fallujah as U.S. forces respond to attacks on their
    positions by insurgents. Artillery and AC-130 gunships are used to bombard guerrilla
    positions, but the number of casualties is as yet unknown. (BBC)
  - According to a CNN/USA Today/Gallup poll, 71 percent of Iraqis see the U.S. troops
    in their country as "occupiers" while 19 percent see them as "liberators," although
    61 percent say that ousting Saddam Hussein was worth any hardships they had suffered.
    Still, 57 percent would like U.S./British forces to leave immediately. (CNN) (USA
    Today)
