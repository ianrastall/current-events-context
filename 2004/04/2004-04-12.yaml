Date: '2004-04-12'
Source_URI: Portal:Current events/2004 April 12
Intelligence_Payload:
  Uncategorized:
  - Lieutenant General Ricardo S. Sanchez states that the mission of the U.S. forces
    is to kill or capture Muqtada al-Sadr. (Defenselink)
  - Argentine president Néstor Kirchner spends his fourth day in hospital for a bleeding
    peptic ulcer. (Mercopress)
  - Pakistani opposition leader Javed Hashmi, president of the Alliance for Restoration
    of Democracy is sentenced to 23 years in prison for inciting mutiny and sedition
    in the armed forces. He distributed a letter critical of Pakistani president Pervez
    Musharraf. (BBC) (Hi Pakistan) (Xinhuanet)
  - Canada starts its largest seal hunt in 50 years. (BBC) (Independent) (CNN)
  - West Indies captain Brian Lara sets the highest score in Test cricket - 400 not
    out on the third day of the fourth Test against England in Antigua. He makes his
    400 in 773 minutes off 582 balls, hitting 43 fours and four sixes. (BBC)
