Date: '2004-10-19'
Source_URI: Portal:Current events/2004 October 19
Intelligence_Payload:
  Uncategorized:
  - In Minsk, Belarus, protests continue over the results of Monday's referendum,
    which permitted President Alexander Lukashenko to seek a third term. At least
    30 protesters are arrested, including opposition leader Anatoly Lebedko. Supporters
    say Lebedko was badly beaten by police and was refused treatment for his injuries.
    (BBC)
  - Hassan Rowhani, the head of Iran's Supreme National Security Council, says that
    he believes Iran's interests would be better served by the election of Republican
    incumbent George W. Bush, rather than Democrat John Kerry, to the US Presidency.
    (Yahoo News/AP) (Link dead as of 22:35, 14 January 2007 (UTC))
  - British police charge Muslim cleric Abu Hamza al-Masri with 16 crimes, including
    encouraging the murder of non-Muslims. (Reuters) (Link dead as of 22:35, 14 January
    2007 (UTC))
  - British and German officials announce that, on Thursday, representatives of France,
    the United Kingdom, and Germany will meet in Vienna with Iranian officials to
    offer Iran a final chance to halt uranium enrichment plans before proposed U.N.
    sanctions are imposed. (Reuters) (Link dead as of 22:35, 14 January 2007 (UTC))
  - Thai officials say that Myanmar's military has removed the current prime minister
    of Myanmar, General Khin Nyunt, from office and placed him under house arrest.
    (BBC)
  - Polytechnic University of the Philippines celebrates its centennial founding.
  - In its annual report on national militaries, the International Institute for Strategic
    Studies says that the US-led invasion of Iraq has, at least for the short term,
    increased the risk of terrorism. (ABC) (Reuters) (Link dead as of 22:35, 14 January
    2007 (UTC))
  - A team of explorers reached the bottom of the world's deepest cave, located in
    Krubera. The depth reached was 2,080 meters (6,824 feet), setting a world record.
    (National Geographic)
  Conflict in Iraq:
  - An unknown militant group kidnaps Margaret Hassan, head of the international charity
    CARE International, in Baghdad, Iraq. Ms. Hassan holds British, Irish and Iraqi
    citizenship. (Reuters) (Link dead as of 22:35, 14 January 2007 (UTC)), (AAP Australia)
  - A mortar attack on an US army compound in central Baghdad kills a U.S. contractor,
    while another mortar attack, on an Iraqi National Guard base in Mushahida, kills
    four guardsmen and injures 80. Iraqi security forces, backed by U.S. Marines,
    arrest 100 suspected insurgents south of Baghdad. Three car bombs kill two Iraqis
    in Mosul. (BBC)
