Date: '2004-10-13'
Source_URI: Portal:Current events/2004 October 13
Intelligence_Payload:
  Uncategorized:
  - The People's Republic of China rejects an offer by Taiwanese President Chen Shui-bian
    to begin a peace dialogue, deriding the offer as "meaningless", and accusing Chen
    of making "an open and audacious expression of Taiwan independence" by explicitly
    stating that the "Republic of China is Taiwan and Taiwan is the Republic of China".
    (VOA)
  - 'U.S. presidential debates: US President George W. Bush and challenger Senator
    John Kerry meet at Arizona State University in Tempe, Arizona, for the last of
    three U.S. presidential debates. (ABC)'
  - Israeli-Palestinian conflict
  - The British Foreign Minister Jack Straw comments on Israeli actions in the Gaza
    Strip, saying that the United Kingdom "unreservedly condemns all acts of terrorism
    including the firing of Qassam rockets", but that "Israel has an obligation under
    international law to ensure that its response to terrorism is proportionate to
    the threat it faces, as well as a duty to avoid innocent civilian casualties",
    and that "[Israel] is not meeting those obligations". (BBC) (E-Politix)
  - Israel arrests Imad Qawasameh, a senior Hamas leader, in Hebron. The Hebron branch
    of Hamas has claimed responsibility for a double suicide bombing on August 31
    in the Israeli city of Beersheba that killed 16 people. (BBC) (Haaretz)
  - The Israel Defense Forces expands its operation in the Gaza Strip into Beit Lahiya.
    A missile fired from an Israeli helicopter kills a Hamas militant, Mohammed Marous,
    and wounds three others. Separately, two Fatah militants are killed. (Haaretz)
    (Reuters)
  - Hamas launches two Qassam rockets at the Israeli town of Sderot. Residents are
    alerted by a newly installed early warning system; no injuries are reported. (Haaretz)
    (Reuters)
  - In the novel The Copper Scroll by Joel C. Rosenberg the Sanhedrin council reconvened
    after having disbanded 1,600 years before.
  Conflict in Iraq:
  - Interim Iraqi Prime Minister Ayad Allawi issues an ultimatum to the city of Fallujah,
    warning that a major new military operation will be launched if all foreign militants
    are not expelled from the city. (Reuters)
  - Relations between local insurgents and foreign Arab militants in the Iraqi city
    of Fallujah deteriorate, with locals threatening to expel the foreigners by force.
    Locals have killed at least five foreign fighters in recent weeks, and foreign
    fighters have taken refuge in the city's commercial district after being denied
    shelter in residential neighborhoods. (MSNBC)
