Date: '2004-10-07'
Source_URI: Portal:Current events/2004 October 7
Intelligence_Payload:
  Uncategorized:
  - In Canada, a last minute compromise between the current minority federal government
    and the two largest opposition parties ends a dispute over the wording of the
    throne speech and avoids a premature dissolution of parliament. (Toronto Star)
  - 'The FBI seizes the servers of the open-publishing network Indymedia in the U.S.
    and the UK, disabling Indymedia websites in many countries. No reason was given.
    (IMC: 1, 2)'
  - Three car bombs are detonated in Egyptian towns in the Sinai Peninsula frequented
    by Israeli tourists. The largest explosion, which killed at least 34 and wounding
    105, was at the Hilton Taba in Taba, near the border with Israel. The other two
    explosions occurred at the towns of Ras al-Sultan and Nuweiba, killing two Israelis
    and four Egyptians. A group calling itself Jamayia al-Islamia al-Alamiya ("World
    Islamist Group") later claims responsibility and threatens further attacks. (Al
    Jazeera) (Haaretz) (The Australian) (ABC) (CNN)
  - ', one of Canada''s four Victoria-class submarines, is taken under tow, after
    being adrift for two days following an onboard fire that crippled the boat. One
    member of the crew has died. (BBC: 1, 2) (Pravda)'
  - Austrian author Elfriede Jelinek is awarded the Nobel Prize in Literature for
    "her musical flow of voices and counter-voices in novels and plays that with extraordinary
    linguistic zeal reveal the absurdity of society's clichés and their subjugating
    power". (Nobel Prize) (ABC)
  - Two bombs explode in the Pakistani city of Multan, killing 39 people at a memorial
    for murdered Sunni leader Azam Tariq. (BBC)
  - Israeli-Palestinian conflict
  - The United Nations issues a special report warning of an imminent humanitarian
    crisis in the Gaza Strip. The report says that 72.5 percent of Palestinians will
    be living in poverty by the end of 2006, that Israeli restrictions are hampering
    emergency aid deliveries, and that, since September 28, 82 Palestinians and 5
    Israelis, including 26 children, have been killed. (BBC) (UN)
  - Witnesses say that two Palestinian children were killed when the Israeli military
    shelled a crowd near the Jabaliya refugee camp. Israel says that an Israeli helicopter
    gunship fired at two people attempting to launch a Qassam rocket. (BBC)
  - Norodom Sihanouk, King of Cambodia, announces his abdication. His successor will
    be chosen by a special council. (CNN)
