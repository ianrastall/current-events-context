Date: '2004-10-10'
Source_URI: Portal:Current events/2004 October 10
Intelligence_Payload:
  Uncategorized:
  - Typhoon Ma-on, the strongest storm to strike eastern Japan in a decade, kills
    six people in the Tokyo area. (Channel News Asia)
  - 'Israeli-Palestinian conflict: Palestinian witnesses say that a missile fired
    from an Israeli helicopter destroyed a home in the Gaza Strip town of Jabaliya,
    killing a schoolteacher and wounding six others. (BBC)'
  - Somalia's transitional parliament elects Abdullahi Yusuf, a former army officer,
    interim president. He will be Somalia's first head of state since 1991, when tribal
    warlords overthrew the ruling military dictatorship. The election was held in
    Nairobi, Kenya, since the situation in Somalia remains dangerous. (BBC) (ABC)
  - 'Conflict in Iraq: Two car bombs explode in Baghdad, killing at least 10 people
    and wounding 17, including a US soldier. (AP)'
  - '2004 Atlantic hurricane season: Tropical Storm Matthew floods southeastern Louisiana,
    dropping as much as 7 inches () of rain. (CNN)'
  - Christopher Reeve who played Superman in the movie passes away.
