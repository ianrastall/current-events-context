Date: '2004-10-01'
Source_URI: Portal:Current events/2004 October 1
Intelligence_Payload:
  Uncategorized:
  - The University of Manchester, the largest university in the United Kingdom outside
    London, is created by the merger of the Victoria University of Manchester and
    UMIST. (BBC)
  - Ichiro Suzuki, a Japanese baseball star now playing for Major League Baseball's
    New York Yankees, breaks George Sisler's 84-year-old record for hits in a season,
    prompting praise from Japanese prime minister Junichiro Koizumi and celebrations
    in both Seattle and Tokyo. (CNN/SI)
  - Mount St. Helens in the U.S. state of Washington awakens, with a minor eruption
    of steam, smoke, and ash. (Fox News) (CNN)
  - The government of Denmark is investigating whether it can claim ownership of the
    North Pole, by studying how far the underwater portion of Greenland, a Danish
    territory, extends. Canada and Russia are already undertaking similar investigations
    regarding their own claims. (Toronto Star)
  - 'U.S. presidential debates: "Instant-response" polls of viewers of last night''s
    U.S. presidential debate show that a majority of viewers thought the challenger,
    John Kerry, won the contest. (The Guardian) (BBC) (Indianapolis Star) (CBS)'
  - At least 19 people are killed in an explosion—suspected to be a suicide bombing—at
    a Shia mosque in the Pakistani city of Sialkot (located near the border of Indian-controlled
    Kashmir). The attack follows the killing of a leading Sunni cleric. (BBC)
  - '2004 Irish presidential election: Mary McAleese is appointed to a second seven-year
    term as President of Ireland, without an election, when no other candidate secures
    the necessary nominations. This is the third time a sitting president has been
    reappointed unopposed, following President Seán T. O''Kelly in 1952 and President
    Patrick Hillery in 1983. (Irish Examiner) (RTÉ)'
  - Israeli-Palestinian conflict
  - 2004 Israeli operation in the northern Gaza Strip
  - Israeli troops, backed by tanks and other military vehicles, enter the northern
    Gaza Strip city of Jabaliya, and the nearby towns of Beit Hanoun and Beit Lahiya.
    At least five Palestinians are killed by Israeli rocket strikes on Jabaliya. (BBC)
    (The Guardian)
  - 'The Israeli military releases unmanned drone footage of the Gaza Strip showing
    what Israel says are Palestinian militants loading rockets into a van marked "UN".
    The UN dismisses the claim, saying that the footage actually shows a stretcher
    being loaded into a van. (Islam Online) (Haaretz: 1, 2)'
  - 'Same-sex marriage debates: The cabinet of Spanish Prime Minister José Luis Rodríguez
    Zapatero approves a bill to legalize same-sex marriage; the government believes
    that the bill will pass the full parliament. (CNN) (BBC)'
  Conflict in Iraq:
  - U.S. and Iraqi government forces attack the insurgent-held city of Samarra in
    northern Iraq. U.S. officials say over 100 militants were killed and 37 were captured,
    while local doctors say at least 80 people died, and 100 were wounded, including
    civilians. (BBC) (Canada.com News) (The Independent)
  - U.S. officials say that U.S. forces rescued Yahlin Kaya, a Turkish construction
    worker who had been held hostage by militants, during today's assault on the city
    of Samarra. (Reuters) (The Australian)
