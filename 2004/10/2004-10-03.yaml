Date: '2004-10-03'
Source_URI: Portal:Current events/2004 October 3
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: On the third day of the assault on Samarra, which has left
    125 insurgents and 70 civilians dead, U.S. and Iraqi government officials say
    they have secured 70 percent of the city. (AP) (BBC)'
  - The Prime Minister of Slovenia, Anton Rop, concedes defeat in today's parliamentary
    elections. Early results suggest the opposition will make large gains at the expense
    of the current government. (BBC)
  - Israeli-Palestinian conflict
  - In interview with the CBC, UNRWA commissioner Peter Hansen says that he is sure
    that members of Hamas are also members of UNRWA. The Canadian Department of Foreign
    Affairs, which has designated Hamas a terrorist organization said it "will immediately
    seek clarification from Mr. Hansen directly and from UN authorities". (CBC) He
    later said it would "have been outright dishonest to say that among a population
    with about 30% support for Hamas that none of them worked for us" (The Guardian)
  - The United Nations Relief and Welfare Agency (UNRWA) demands an apology from Israel
    over claims that Gaza militants used a UN vehicle to transport a homemade Qassam
    rocket. The UN body showed what it said was the ambulance seen in footage released
    by the Israel Defense Forces and presented its driver and rescue workers to reporters.
    (Haaretz) (Jerusalem Post)
  - United Nations Secretary-General Kofi Annan requests that Israel halt its current
    military operations in the Gaza Strip, saying that they have led to "the deaths
    of scores of Palestinians, among them many civilians, including children". He
    also urges the Palestinian Authority to convince Hamas to halt the firing of rockets
    into Israel. (Jerusalem Post)
  - At least four civilians—a deaf man and three children—were killed today during
    Israeli raids in the Gaza Strip town of Jabaliya. More than 60 Palestinians, including
    civilians, have been killed during Israel's current offensive into Gaza. Israeli
    Prime Minister Ariel Sharon says the Gaza operation will continue until Qassam
    rocket attacks end. (BBC) (Toronto Star)
  - Two Palestinians are killed by an Israeli helicopter-launched missile moments
    after they launch a Qassam rocket into Israel. (Reuters)
  - Pope John Paul II beatifies five persons, including Anne Catherine Emmerich, a
    German nun, and Karl I, last emperor of the Austro-Hungarian Empire, in a ceremony
    in Rome. John Paul II has made a total of 1,340 beatifications (including today's),
    more than all previous popes combined. (Reuters)
