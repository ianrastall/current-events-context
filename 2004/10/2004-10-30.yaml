Date: '2004-10-30'
Source_URI: Portal:Current events/2004 October 30
Intelligence_Payload:
  Conflict in Iraq:
  - United States armed forces officials say that eight Marines have been killed and
    nine wounded near Falluja. (BBC) (Reuters)
  - A car bomb kills seven and wounds 19 outside an office of Saudi owned Al-Arabiya
    television station in Baghdad. (Reuters) (BBC)
  Uncategorized:
  - Italian Prime Minister Silvio Berlusconi indicates that he will likely withdraw
    the controversial nomination of Rocco Buttiglione to the European Union Commission
    which caused deadlock in the European Parliament this week. (BBC)
