Date: '2004-10-17'
Source_URI: Portal:Current events/2004 October 17
Intelligence_Payload:
  Uncategorized:
  - A two meter long section of a Chinese scientific satellite strikes a house in
    Penglai, Sichuan, China. No one is hurt. (CNN)
  - 'Israeli-Palestinian Conflict: Israel Defense Forces troops enter the southern
    Gaza Strip refugee camp of Rafah with ten tanks and three bulldozers. (BBC)'
  - The UK ambassador to Uzbekistan is recalled and suspended after criticizing the
    use of intelligence allegedly obtained under torture by the Uzbekistan government.
    (BBC)
  - About 20,000 protesters march in London, United Kingdom, to demand an end to the
    "illegal occupation" of Iraq. (Reuters) (The Scotsman)
  - Approximately 10,000 people gather at the Lincoln Memorial in Washington, D.C.,
    for the Million Worker March, a pro-labor and anti-war demonstration.
  Conflict in Iraq:
  - Heavy fighting in Fallujah continues as U.S. tanks blockade the city and insurgent
    targets are hit by air and artillery. Hospital officials say four civilians, including
    a child, were killed. (Reuters) (ABC)
  - A mortar round hits an arms collection depot in the Sadr City suburb of Baghdad
    shortly before the scheduled visit of Iraqi Prime Minister Iyad Allawi, killing
    two Iraqi National Guard members and a civilian. In Latifiyah (25 miles south
    of Baghdad), gunmen ambush and kill nine Iraqi policemen who were returning from
    training in Jordan. (Reuters) (ABC)
