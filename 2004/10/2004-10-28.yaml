Date: '2004-10-28'
Source_URI: Portal:Current events/2004 October 28
Intelligence_Payload:
  Uncategorized:
  - In Latvia, Indulis Emsis, the first Green Party prime minister steps down when
    the country's minority coalition government dissolves after the parliament rejects
    its 2005 budget. (CNN)
  - An article in the Washington Times, citing US Defense Department official John
    A. Shaw, alleges that Russian special forces moved weapons, explosives, and related
    materials out of Iraq and into Syria, Lebanon, and possibly Iran, shortly before
    the U.S. invasion of Iraq in March 2003. Russia denies the allegation, calling
    the claims "absurd". U.S. officials later say they cannot corroborate the claim,
    but are investigating. (Washington Times) (VOA) (Interfax)
  - A Los Angeles-based company, Allerca, announced that within three years it will
    be able to produce a hypoallergenic cat using genetic modification. At the same
    time, the company denied that it will be able to do the same for dogs, because
    whereas cats have a single gene that produces the allergenic protein, dogs have
    many allergenic proteins controlled by multiple genes. (San Jose Mercury News)
    (New Scientist)
  - A methane gas explosion in Russia's Listvyazhnaya mine, which is located in Siberia
    near the border with Mongolia, kills 13 people and injures 23. (Reuters)
  - A total lunar eclipse, visible in western Europe, western Africa, and most of
    North and South America, takes place. It lasts for 3 hours, 40 minutes (1:15 to
    4:54 UTC); the next total lunar eclipse will not occur until March 2007. (NASA)
    (Seattle Times)
  U.S. presidential election:
  - Election officials in Broward County, Florida, report that over 50,000 absentee
    ballots for next Tuesday's U.S. presidential election are missing. Officials mailed
    60,000 absentee ballots earlier this month, but only 2,000 were delivered. (BBC)
  - 'Iraq explosives issue: US presidential candidates George W. Bush and John Kerry
    accuse each other regarding Monday''s announcement by the International Atomic
    Energy Agency that 380 tons () of explosives are missing from the Al Qa''qaa industrial
    facility in Iraq. (Japan Today)'
