Date: '2004-12-02'
Source_URI: Portal:Current events/2004 December 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraq War
  - The U.S. military, citing security concerns for the Iraqi transitional parliamentary
    election scheduled for January 30, 2005, announces the deployment of 1,500 additional
    troops to Iraq and tour extensions bringing the number to an all-time high of
    150,000. (Reuters) (CNN)
  Disasters and accidents:
  - India announces a new effort to survey and decontaminate the area affected by
    the December 3, 1984, Bhopal chemical disaster. (BBC)
  International relations:
  - Nuclear program of Iran
  - United Nations inspectors wishing to inspect the Parchin military complex southeast
    of Tehran and Lavizan II in northeastern Tehran lack the legal authority according
    to United Nations diplomats. (Reuters)
  - The European Union takes over from NATO in peacekeeping operations in Bosnia and
    Herzegovina, largely replacing the NATO-led SFOR with a new Eufor. (BBC)
  Law and crime:
  - The Inter-American Court of Human Rights upholds Peru's conviction and continued
    imprisonment of U.S. citizen Lori Berenson on terrorism charges. (BBC) (AP)
  - A spokesman for George W. Bush requests that Myanmar release dissident opposition
    leader Aung San Suu Kyi, whose house arrest was recently extended. (BBC)
  - The life sentence of Mijailo Mijailović, killer of Swedish minister Anna Lindh,
    is confirmed by the Swedish Supreme Court. (BBC) (Reuters) (Bloomberg)
  - British Member of Parliament and anti-war activist George Galloway wins his libel
    case against the Daily Telegraph, which during the invasion of Iraq had published
    a story suggesting that Galloway had been in the pay of Saddam Hussein. (BBC)
  Politics and elections:
  - 2004 United States election voting controversies
  - The U.S. House Committee on the Judiciary requests Ohio Secretary of State Ken
    Blackwell to respond to alleged voting irregularities. (House.gov (PDF))
  - U.S. President George W. Bush nominates Nebraska Governor Mike Johanns to become
    the next Secretary of Agriculture. If confirmed by the Senate, Johanns would fill
    the Cabinet position currently held by resigning Secretary Ann Veneman. (Reuters)
    (Transcript)
