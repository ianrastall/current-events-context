Date: '2004-12-07'
Source_URI: Portal:Current events/2004 December 7
Intelligence_Payload:
  Uncategorized:
  - The New Zealand Special Air Service (NZSAS) is awarded the United States Presidential
    Unit Citation for services in Afghanistan.
  - Frans van Anraat is arrested in the Netherlands for shipping chemical weapons
    precursors to Saddam Hussein during the Iran–Iraq War (CNN)
  - High-profile New York State Attorney General Eliot Spitzer, a Democrat, announces
    his campaign for Governor in 2006. (Yahoo)
  - Israeli-Palestinian conflict
  - Two Hamas militants, two Islamic Jihad members, and an Israeli soldier have died
    following clashes in the central Gaza Strip. (BBC)
  - Shahar Dvir-Zeliger, a Jewish settler in Nablus, is sentenced to eight years imprisonment
    for membership of an extremist group. He was found guilty of being a member of
    the Bat Ayin cell, which has killed eight Palestinians. (BBC)
  - An entire Israel Defense Forces elite unit is suspended from duty while investigations
    continue into what B'Tselem alleges was a killing of an unnarmed injured Palestinian
    man. (BBC)
  - The U.S. military discusses plans for mandatory visibly worn ID badges, forced
    labor, DNA testing, and retina scans at "citizen processing centers" for all residents
    of the rebellious Iraqi city of Fallujah, saying they plan to make it a model
    city for the whole of Iraq. (Boston Globe)
  - Hamid Karzai is inaugurated as President of Afghanistan. (CNN) (BBC)
  2004 U.S. presidential election controversy:
  - Ken Blackwell, Ohio Secretary of State and co-chair of the 2004 George W. Bush
    campaign in Ohio – certifies election results. Two parallel vote count efforts
    are pending, one claims evidence that John Kerry is the legitimate winner of Ohio.
    (Associated Press) (NYT)
