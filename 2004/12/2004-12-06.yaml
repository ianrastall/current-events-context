Date: '2004-12-06'
Source_URI: Portal:Current events/2004 December 6
Intelligence_Payload:
  Uncategorized:
  - Former Houston Rockets star Calvin Murphy acquitted of charges that he molested
    his five daughters. (Houston Chronicle)
  - Sinn Féin leader Gerry Adams recommends that Sinn Féin support a British-Irish
    power-sharing plan for Northern Ireland that involves the public decommissioning
    of the arms held by the Irish Republican Army. Ian Paisley of the loyalist Democratic
    Unionist Party may become first minister of Northern Ireland, with former IRA
    member Martin McGuinness as his deputy. (BBC)
  - United Nations Secretary-General Kofi Annan has come under fire after reports
    claim that his son received payments from a Swiss company that won a lucrative
    contract under the UN Oil for Food program. (BBC)
  - The U.S. consular compound in Jeddah, Saudi Arabia, is stormed by gunmen, who
    kill nine Saudis in a four-hour battle but do not gain entry to the consulate
    building itself. Saudi security forces kill three of the gunmen, arrest two others,
    and pursue several more. There are no Americans dead, though some are slightly
    wounded. (BBC) (Reuters/AFP)
  - In Spain the Basque separatist group ETA detonate seven bombs in bars, cafes and
    town squares across the country. The cities attacked are León, Ávila, Santillana
    del Mar, Ciudad Real, Málaga, Valladolid, and Alicante. All the attacks were preceded
    by warnings and nobody was seriously hurt. (BBC)
  - 'Ukrainian presidential election controversy: EU foreign policy chief Javier Solana
    has returned to Ukraine for talks on the country''s political crisis.(BBC)'
