Date: '2004-12-16'
Source_URI: Portal:Current events/2004 December 16
Intelligence_Payload:
  Uncategorized:
  - Belgian child killer Marc Dutroux loses an appeal against his life sentence. (Expatica)(News.Com)
  - Leaders of the European Union, meeting in Brussels, agree to invite Turkey to
    begin negotiations to join the EU from 2005, about 36 years after they first applied
    to join. (BBC)
  - In the Western Districts of Nepal, nearly 50 people are killed in clashes between
    Nepalese troops and Maoist rebels. (BBC)
  - A commuter in Zimbabwe who allegedly insulted President Robert Mugabe could face
    up to five years in prison for undermining the president's authority. (BBC)
  - South Korean high-speed rail system, Korea Train Express open between Seoul and
    Busan.
  - Inuit leaders want to sue the U.S. government at the Inter-American Commission
    on Human Rights for causing global warming. They view the melting of the polar
    icecap in the Arctic as a threat to their existence as a people, an assault on
    their basic human rights. The announcement is expected today in Buenos Aires at
    the 10th round of international talks on climate change. (NYT) (Democracy Now!)
  - The British final court of appeal, the Law Lords, rule that the suspension of
    habeas corpus for foreign nationals detained under the Anti-terrorism, Crime and
    Security Act 2001 is illegal, being incompatible with the European Convention
    on Human Rights. (BBC) (judgment)
  - Cambodian soldiers discover a cache of Angkor Wat-era carvings that were to be
    smuggled out of the country. (Reuters)
  - Thai security forces pursue 100 people connected to the unrest in the south of
    the country. Four Islamic teachers have been arrested on suspicion of inciting
    terrorism. (Channel News Asia) (Reuters)
  - Former chess champion Bobby Fischer has been offered residency in Iceland. He
    is currently detained in Japan, and is wanted by the United States. (BBC)(Reuters)
  - Researchers at the University of Tübingen report the discovery of a 30,000- to
    37,000-year-old flute, the earliest musical instrument ever found.
