Date: '2004-12-28'
Source_URI: Portal:Current events/2004 December 28
Intelligence_Payload:
  Uncategorized:
  - The Shiveluch volcano on Russia's Kamchatka Peninsula erupts, causing a large
    earthquake and producing a plume of hot ash. (webcam)
  - Israeli-Palestinian conflict
  - An Israeli unmanned drone attempts to kill two suspected Hamas militants in Khan
    Yunis allegedly on their way to launch an attack on Israelis in Gush Katif with
    mortar weapons.
  - An Israeli tank fires a shell in Khan Yunis wounding at least nine Palestinians,
    including a 13-year-old boy. IDF officials say they were opening fire at the source
    of Qassam rockets fired by Palestinians that landed in Neve Dekalim. No injuries
    are reported from the Qassam rocket attacks. (BBC) (Haaretz)
  - 'Conflict in Iraq: In an apparent coordinated attack, insurgents raid a police
    station in Dijla and execute 12 police officers. Three Iraqi policemen are shot
    at a checkpoint outside of Tikrit. Four policemen and one national guardsman are
    gunned down at a police station in Ishaki. A local police commander is assassinated
    in Baquba. A car bomb detonated near a US-Iraqi military convoy in Samarra kills
    three national guardsmen and three civilians. All these attacks occurred in the
    Sunni Triangle. (BBC)'
  - Susan Sontag died of cancer, at age 71.
  - Jerry Orbach died of cancer, at age 69.
  - The death toll from tsunamis resulting from the Indian Ocean earthquake is known
    to be at least 59,000 and still rising. (BBC)
  - In Colombia, government soldiers search for at least seven people taken hostage
    by FARC rebels last Friday. Kidnappers have not made any demands yet. (BBC)
  - 'Ukrainian presidential election: Prime Minister Viktor Yanukovych challenges
    the result of the re-run of the presidential election and threatens to take the
    case to the Supreme Court. (Guardian) (BBC)'
  - An explosion at a scrap metal plant in Muskogee, Oklahoma, US, kills two workers.
    The blast is felt about away. The company is later fined for workplace violations.
