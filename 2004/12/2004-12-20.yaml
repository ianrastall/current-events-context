Date: '2004-12-20'
Source_URI: Portal:Current events/2004 December 20
Intelligence_Payload:
  Uncategorized:
  - Analysts attribute a sharp drop in the price of crude oil to the unexpected outcome
    of the auction of Yukos' Siberian production unit yesterday. The value of the
    January futures contract fell 64 cents to $45.64 on the Nymex.
  - China announces reforms to its legal system effective in 2005, including the introduction
    of jury trials and a 10% increase in the number of judges. Jurors will be elected
    to a five-year term, and must have at least two years' university education. (BBC)
    (Xinhua)
  - The Head of the Egyptian Coptic Orthodox Church, Pope Shenouda III, has gone into
    seclusion in a desert monastery to draw attention to grievances among Egyptian
    Christians. (BBC)
  - U.S. Defense Secretary Donald Rumsfeld has admitted that he had used a machine
    to sign letters of condolence to relatives of more than 1,000 troops killed in
    Iraq and Afghanistan, but pledged to sign the letters personally in future. (BBC)
  - In Sudan, fighting has not stopped after a ceasefire between government troops
    and rebels. Although the government of Sudan has said that they have stopped the
    Darfur offensive, there are still reports of battles. Foreign Minister Mustafa
    Osman Ismail rules out any withdrawal from the positions government troops have
    taken. An observing African Union helicopter was shot at. (BBC)(Iafrica)
  - Prachanda, leader of the Maoist guerillas in Nepal, announces his intention to
    disrupt elections if the government refuses to abolish the monarchy. Prime Minister
    Sher Bahadur Deuba has given them until January 13, 2005, to begin peace talks.
    (Reuters)
  - An explosion in a Chinese coal mine kills 14. (Reuters)(BBC)
  - African National Congress of South Africa accuses U.S. officials covering up adverse
    side effects of AIDS medications. (Iafrica) (Reuters)
