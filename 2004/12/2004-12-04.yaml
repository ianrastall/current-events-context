Date: '2004-12-04'
Source_URI: Portal:Current events/2004 December 4
Intelligence_Payload:
  Uncategorized:
  - The Mozambique presidential election vote count continues in all of the country,
    with Frelimo and its candidate Armando Guebuza leading, according to the preliminary
    results already known, and especially in Maputo, Gaza and Inhambane, traditional
    regions of influence for the party in power. (Wikinews)
  - Militants blow up a vehicle in Pulwama, Jammu and Kashmir, India killing a major,
    nine soldiers of the Rashtriya Rifles and two civilians using an improvised explosive
    device. (Reuters)
  - Peruvian-born María Julia Mantilla García is crowned Miss World. (Reuters)
