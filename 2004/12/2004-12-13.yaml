Date: '2004-12-13'
Source_URI: Portal:Current events/2004 December 13
Intelligence_Payload:
  Uncategorized:
  - Self-confessed cannibal Yoo Young-Chul, convicted of killing 20 people, mostly
    prostitutes, is sentenced to death in Seoul, South Korea. (Xinhua)
  - France's highest administrative court, the Conseil d'État, bans Hizbullah's al-Manar
    TV station on the grounds that it incites racial hatred and antisemitism. (BBC)
  - The jury in the Scott Peterson trial recommends that he be sentenced to death
    for the murder of his wife and unborn son. (CNN)
  - Augusto Pinochet is charged by Chilean prosecutors for alleged involvement in
    murder and "disappearances" in Chile in the 1970s, and is placed under house arrest.
    (BBC)
  - United States Environmental Protection Agency Administrator Michael O. Leavitt
    is nominated by President George W. Bush to succeed outgoing Secretary of Health
    and Human Services Tommy Thompson in the Cabinet-level post. (Bloomberg)
  - 'Foreign policy of the George W. Bush administration: Human Rights Watch, a New
    York-based NGO claims that another three prisoners have died while in U.S. detention
    in Afghanistan. (BBC)'
  - Hundreds of protesters have gathered in Cairo outside Egypt's Supreme Judiciary
    buildings, defying a ban on public protests, to call for an end to Hosni Mubarak's
    23-year presidency of Egypt. (BBC)
  - 'Romanian presidential election, 2004: Prime Minister Adrian Nastase concedes
    defeat to opposition candidate Traian Basescu after a close contest. With 99%
    of the vote counted, Basescu took 51.23% of the vote to Nastase''s 48.77%. (BBC)'
  2004 United States election voting controversies:
  - As required by the United States Constitution, members of the Electoral College
    meet in all 50 state capitols and the District of Columbia to cast their electoral
    votes, including an unexpected single vote for John Edwards by an elector in Minnesota.
    (Minneapolis Star Tribune)
  - All members of the Ohio delegation of the Electoral College cast their ballots
    for George W. Bush while a legal recount is still ongoing, after a written request
    by 11 Democratic congressmen (pdf) to suspend voting. (ABC) (ABC)
  - The House Judiciary Committee hears testimony at a forum in Columbus, Ohio, regarding
    problems with the 2004 presidential election. (freepress.org) (statements) (audio,
    mp3) (video, wmv)
  Conflict in Iraq:
  - At least 13 people die following a car bomb attack on a U.S. checkpoint near the
    Green Zone in Baghdad, Iraq. (The Guardian)
  - The United States Army launches another air raid on the Iraqi city of Fallujah
    after eight US Marines were killed by insurgents over the weekend. (ABC {aus})
