Date: '2004-12-29'
Source_URI: Portal:Current events/2004 December 29
Intelligence_Payload:
  Uncategorized:
  - The Popular Front for the Liberation of Palestine (PFLP) announces its support
    for Mustafa Al-Barghouti in the 2005 Palestinian presidential election. (Al Jazeera)
    (BBC)
  - 'For the fifth straight business day, the U.S. dollar hits a new low against the
    euro: 1.3646 USD to 1 EUR. (AP)'
  - 2004 Indian Ocean earthquake
  - The death toll from the Indian Ocean earthquake and subsequent tsunamis on December
    26 reaches more than 80,000. (washingtonpost.com)
  - The Red Cross issues a statement saying that the number of dead is likely to rise
    above 100,000. (BBC)
  - The United States, Australia, Japan and India have formed an international coalition
    to lead aid efforts after the 2004 Indian Ocean earthquake. (BBC)
  - 'Arab-Israeli Conflict: The Knesset passes a law against terrorism and against
    support of terrorism. The controversial law prohibits funding terrorists. It also
    prohibits aiding the families of perceived terrorists and institutes inciting
    for terrorism. The law will give Israel the right to confiscate property and funds
    of any perceived terrorist organization, even though if they do not target Israel
    or Israelis. The law is part of the state''s legal war against terrorism and was
    approved 62–6. (Haaretz)'
  - The Russian parliament passes a law abolishing several state holidays, including
    November 7, the anniversary of the 1917 October Revolution. (CNN)
  - In Uganda, tribal leaders are trying to set up a meeting between the government
    and the Lord's Resistance Army. (BBC)
  - Colombian police announce that they have apprehended Dagoberto Flores Rios, a
    member of the Norte del Valle drug cartel. The United States government had offered
    a $5 million reward for his capture of Niece B.(Jamaica Observer) (BBC)
  - The Russian Aviation and Space Agency says that as of 2006, it will charge the
    U.S. for transporting astronauts to the International Space Station. (BBC)
  - The Canada–United States Safe Third Country Agreement went into effect.
