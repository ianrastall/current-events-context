Date: '2004-12-17'
Source_URI: Portal:Current events/2004 December 17
Intelligence_Payload:
  Uncategorized:
  - United States Secretary of Defense Donald Rumsfeld faces criticism from both Democrats
    and Republicans following a dismissive reply to a soldier in Iraq when questioned
    about vehicle armor. (CNN)
  - Cuban authorities put up photos of abused Iraqi prisoners in front of the US interests
    section in Havana after the U.S. displayed Christmas decorations in a protest
    against Cuba's human rights record. (BBC)
  - The United States declares Hizbullah's al-Manar TV channel to be a terrorist organization.
    (White House Official Statement) (Al-Jazeera)
  - A public inquiry into the deaths of 85 Muslim protesters in southern Thailand
    claims the killings were "not deliberate". 78 people suffocated to death after
    being piled into army trucks by Thai security forces; 7 were shot at the separatist
    protests on October 25. (BBC)
  - U.S. President George W. Bush signs the Intelligence Reform and Terrorism Prevention
    Act, creating the office of the Director of National Intelligence to oversee the
    country's fifteen spy agencies. (ABC News)
  - U.S. President George W. Bush, speaking to business executives and economists
    at the White House, vows to push through big reforms to the Social Security program,
    including partial privatization of the state pension fund, during his second term.
    (BBC)
  - The E.U. states that Turkey must recognize the ethnic-Greek government of E.U.
    member state Cyprus before it can begin negotiations for E.U. membership. Currently
    Turkey is the only country that recognizes the Turkish Republic of Northern Cyprus.
    (ITV) (Turkish Press)
  - Police in West Java, Indonesia, say that they have found nine home-made bombs
    on a bus during a security operation. (Channel News Asia)(Jakarta Post)
  - Three suspected IRA members who were accused of training rebels in Colombia flee
    while on bail. An appellate court overturned their earlier acquittals yesterday.
    They had been sentenced to prison for 17 years. (BBC) (Ireland Online)
  - Bhutan's ban on the sale of all tobacco products comes into effect. (Hindustan
    Times) (BBC)
  - Russia intends to allow Polish officials to see files related to the Katyn massacre.
    (BBC)
  - The United Nations finds a surveillance bug in its European headquarters in Geneva
    in a room used by ministers from major powers last year during private talks on
    Iraq. (BBC)
  Israeli-Palestinian Conflict:
  - The Labour Party and Ariel Sharon's Likud Party reach an agreement, forming a
    unity government in order to implement Israel's unilateral disengagement plan
    of 2004. In return, the Labor will receive eight cabinet portfolios, including
    "peace/disengagement minister" specially suited for Shimon Peres and Internal
    Affairs. (Yahoo/Reuters) (BBC)
  - Israeli forces, accompanied by armored bulldozers and helicopter gunships, raid
    the Gaza Strip town of Khan Yunis, killing eight Palestinians, including two civilians,
    and wounding twenty-four, after 50 mortar shells were fired on the Gush Katif
    settlements and caused injuries to some Israeli soldiers and killed a Thai worker.
    (BBC) (Maariv) (Haaretz)
  - In retaliation for the Israeli raid, Palestinians from Hamas and the Abu-Reish
    faction shoot at least five anti-tank missiles, wounding two Israeli soldiers.
    (BBC) (Haaretz) (Maariv) (CTV Canada)
  - Hundreds of Palestinians flee homes in the area, fearful that Israeli troops will
    destroy their homes. They take refuge in nearby hospital and a stadium, while
    others have moved to relatives who live further to the centre of the Gaza Strip.
    (BBC) (Haaretz)
  - In Rafah, five Palestinians are trapped when the tunnel they were digging collapsed.
    Rescue efforts, with the assist of Israeli bulldozers, are in progress though
    estimations are that the five are dead. (Haaretz) (Yahoo\Reuters)
