Date: '2004-12-08'
Source_URI: Portal:Current events/2004 December 8
Intelligence_Payload:
  Uncategorized:
  - Delegates from twelve South American countries meeting in Cuzco, Peru, sign a
    deal creating the South American Community of Nations, a bloc modelled on the
    European Union. (BBC)
  - The Israeli government indicates that it will recognize same-sex partnerships
    for certain benefits, and will introduce legislation formalizing this status.
    (365gay.com)
  - 'Civil unions in New Zealand: Parliament passes civil union legislation by 65
    votes to 55. The new law provides a way for de facto couples, including same-sex
    couples, to gain legal recognition of their relationships, but stops short of
    same-sex marriage. (Scoop) (TVNZ)'
  - The White House affirms that, despite reports to the contrary, John Snow will
    remain Treasury Secretary during President George W. Bush's second term of office.
    Meanwhile, Secretary of Veterans Affairs Anthony Principi announces his expected
    resignation. (CNN)
  - The United States Senate follows the U.S. House of Representatives in approving
    a complete overhaul of government intelligence services, creating the post of
    United States Director of National Intelligence. (BBC)
  - The European Union says it is not ready to lift its 15-year-old arms embargo on
    the People's Republic of China, set after the Tiananmen Square protests of 1989.
    (BBC)
  - Malaysian Deputy Home Affairs Minister Tan Chai Ho announces that once an extended
    amnesty sought by Indonesia comes to an end later that year, illegal immigrants
    will face up to five years in prison and a whipping; their employers will also
    be punished. More than 18,000 undocumented migrants have already been whipped
    since the 2002 amendment to the Malaysian Immigration Act. (China View) (Channel
    News Asia)
  - IBM announces that it will sell its PC hardware business to Lenovo, a Chinese
    computer company. (BBC)
  - Sri Jayendra Saraswathi, a senior Hindu cleric, has been denied bail over his
    murder charge in India's southern Tamil Nadu state. (BBC)
  - The Times reports that Dr. Nikolai Korpan, who treated Ukrainian presidential
    candidate Viktor Yushchenko in Vienna, announced Yushchenko had been poisoned,
    and that the specific poison would be identified within days, but later denied
    the report, saying he had been cited wrongly and that it would be hard to gain
    hard evidence for a poisoning. (Times Online) (Yahoo News) (Link dead as of 00:47,
    2007 (UTC))
