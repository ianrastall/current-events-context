Date: '2004-12-12'
Source_URI: Portal:Current events/2004 December 12
Intelligence_Payload:
  Uncategorized:
  - According to the Washington Post the Bush administration used wire taps to intercept
    a number of phone conversations of Mohamed ElBaradei, Director General of the
    United Nations International Atomic Energy Agency in hope of finding information
    that would help remove ElBaradei from his post. (CNN) (The Washington Post)
  - Israeli-Palestinian conflict
  - At least five Israeli soldiers are killed and 10 are injured as a tunnel rigged
    with 1500 kg of explosives exploded near the Rafah crossing between Rafah and
    Egypt. Hamas and an al-Aqsa Martyrs' Brigades' offshoot called "Fatah Hawk" claimed
    joint responsibility. (Haaretz) (CNN)
  - Five Palestinian schoolchildren were wounded, receiving shrapnel wounds from Israeli
    Tank Fire. (Ha'Aretz)
  - Jailed Palestinian leader Marwan Barghouti withdraws his nomination in the Palestinian
    presidential election just ten days after announcing his candidacy, and instead
    endorses Fatah candidate Mahmoud Abbas. (BBC)
  - 'Romania presidential run-off: Exit polls show that the difference between the
    two candidates (Traian Basescu and Adrian Nastase) is very small, estimated at
    less than 0.01%. (BBC)'
  - A bomb blast in a General Santos City, Philippines, supermarket leaves at least
    58 people injured and 15 dead.(AOL news)
  2004 U.S. presidential election controversy:
  - The U.S. House Committee on the Judiciary will be holding a congressional forum
    in Columbus concerning new evidence of election irregularities and fraud in Ohio,
    the issue of Ohio electors meeting while recounts and litigation are pending,
    and to discuss legislative and other responses to the problems, on Dec. 13. (pdf)
  - The Civil Rights Coalition schedules a protest for Dec. 18, demanding a re-vote
    in "areas where substantive disenfranchisement took place" and the prosecution
    of officials involved in "election fraud." (Civil Rights Coalition)
