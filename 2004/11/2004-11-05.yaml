Date: '2004-11-05'
Source_URI: Portal:Current events/2004 November 5
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian Conflict: Two Palestinian children are killed by an explosion
    in the refugee camp of Khan Yonis in the Gaza Strip. Hospital officials say it
    was from a tank shell that hit a house. Israeli spokesmen said there had been
    no army fire in the area. They believe it was either caused when a Palestinian
    mortar misfired or by the detonation of a roadside bomb. (Reuters)'
  - Dutch–Moroccan Muslim Mohammed Bouyeri, identified by the Dutch media as "Mohammed
    B.", is to be charged for murdering filmmaker Theo van Gogh and for being a member
    of a group with "terrorist intentions". (Reuters)
  - 'Illness of Yasser Arafat: Israel refuses to allow Yasser Arafat to be buried
    in Jerusalem. The ailing leader of the Palestinian Authority is still in a coma,
    which might be reversible; an aide rejects reports that Arafat is "brain dead".
    Palestinians claim they will only trust a successor who is "determined and steadfast
    on the fundamental Palestinian rights", some say who is less willing to compromise.
    (Reuters)'
  - Voters in the north east of England decisively reject plans for a devolved assembly
    for the region. With a turnout of 47.8% 197,310 vote for and 696,519 vote against
    the plans. It is a serious setback for the British Deputy Prime Minister, John
    Prescott, who had championed the plans. (BBC)
  - 'Same-sex marriage in Canada: A judge in Saskatchewan rules that same-sex couples
    must enjoy the right to equal marriage in that province. (CBC)'
  - 'Episcopal Church: The Annual Convention of the Episcopal Diocese of Pittsburgh
    approves an amendment to its Constitution which allows it to differ with the opinion
    of the national church on issues which the diocese believes to be "contrary to
    the historic faith and order" of the church. (Diocese of Pittsburgh)'
  Conflict in Iraq:
  - 'United Nations Secretary General Kofi Annan warns that an assault on Falluja
    may result in a Sunni Muslim boycott of January elections. British ambassador
    to Iraq Jones Parry states: "You can''t have an area the size of Falluja operating
    as a base for terrorism." Iraqi Interim Prime Minister Iyad Allawi describes Annan''s
    letter as confused and unclear. (Reuters)'
  - Two U.S. soldiers are killed and five wounded when fighting breaks out near a
    base on the outskirts of Falluja. After weeks of intensive airstrikes, U.S. and
    Iraqi troops seal off all roads to the city. They drop leaflets and play loudspeaker
    messages encouraging all civilians to leave, but say they would arrest any men
    under 45. Near Baghdad, two children are killed when a mortar shell lands near
    a police station. (Reuters)(BBC)
