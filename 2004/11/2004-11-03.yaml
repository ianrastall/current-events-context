Date: '2004-11-03'
Source_URI: Portal:Current events/2004 November 3
Intelligence_Payload:
  Uncategorized:
  - Khalifa bin Zayed Al Nahyan, the son of Sheikh Zayed bin Sultan Al Nahyan who
    died yesterday, is elected President by the United Arab Emirates' federal council.
    (Reuters)
  - Sgt. Charles Robert Jenkins, who crossed over the DMZ to North Korea in 1965,
    pleads guilty to desertion and aiding the enemy at his court martial in Japan.
    He is sentenced to 30 days in prison and given a dishonorable discharge. (BBC)
  - The Republic of China (Taiwan) establishes diplomatic relations with Vanuatu,
    bringing its international recognition to 27 countries. (CNN)
  2004 U.S. Presidential election:
  - Senator John Kerry concedes to President George W. Bush "The outcome should be
    decided by voters, not a protracted legal process", Kerry said. "I would not give
    up if there was a chance we could prevail." (Reuters) (BBC)
  - Republican President George W. Bush wins the popular vote, receiving more votes
    than Democratic Senator John Kerry. (51.6% to 48.4%, to ) Claiming victory in
    the swing state of Ohio, Bush will probably have more than the 270 votes needed
    when the U.S. Electoral College meets on December 13. (CNN)
  - The Republican Party widens its majority in the Senate and House of Representatives.
    Democratic Senate Minority Leader Tom Daschle concedes defeat to Republican challenger
    John Thune, thus becoming the first Senate leader in 52 years to lose a re-election
    bid and leaving the leadership of the Democratic Party in the Senate open. (CNN)
  - The Electronic Frontier Foundation (EFF) reports that on November 2, touch-screen
    electronic voting machines in at least six U.S. states had incorrectly recorded
    their choices, including for the presidential election. Incorrectly recorded votes
    make up roughly 20 percent of the e-voting problems. (EFF)
  - 'Same-sex marriage in the United States: Gay rights activists suffer a severe
    setback when state constitutional amendments prohibiting same-sex marriage are
    passed in eleven states: Arkansas, Georgia, Kentucky, Michigan, Mississippi, Montana,
    North Dakota, Oklahoma, Ohio, Oregon, and Utah. The measures in Oregon, Mississippi,
    and Montana ban same-sex marriage only, while Arkansas, Georgia, Kentucky, North
    Dakota, Oklahoma, Ohio, and Utah ban both same-sex marriage and civil unions and
    Michigan bans granting any benefits whatsoever to same-sex couples.'
  Conflict in Iraq:
  - A roadside bomb kills a U.S. soldier and wounds another in Salman Pak, south of
    Baghdad. An Iraqi Oil Ministry official is shot dead while leaving his house in
    Baghdad. The militant group Army of Ansar al-Sunna release a video on their website
    confirming the beheading of an Iraqi officer kidnapped in Mosul. In Tikrit, fires
    continue to burn from major oil wells and a pipeline attacked earlier, halting
    oil exports. The militant Brigades of Iraq's Honorable People release videos showing
    beheadings of three Iraqi security guards kidnapped in Baghdad. (Reuters) (BBC)
  - The court martial begins for nine U.S. marines charged with the death of an Iraqi
    prisoner who died after being dragged by his neck to a pen at Camp Whitehorse
    jail near Nassiriyah. (Reuters)
  - Hungary announces the withdrawal of its 300 troops by the end of next March. Poland
    says it will scale back the 2,500 troops stationed in Iraq early next year. (Reuters)
    (BBC)
  Puerto Rico General Elections:
  - The State Commission of Elections of Puerto Rico preliminarily certifies Aníbal
    Acevedo Vilá as the winning candidate for Governor of Puerto Rico, and Luis Fortuño
    as Resident Commissioner after computing 98.3% of the total votes. A full recount
    will begin on November 9 to announce the official winner. (El Nuevo Día) (CEE-PUR)
  - The Senate of Puerto Rico and the House of Representatives will be dominated by
    the New Progressive Party for the new term. Future senators from the party have
    already decided certain positions for once they are in office, and how do they
    plan to work with a governor of the opposing party. (El Nuevo Día)
