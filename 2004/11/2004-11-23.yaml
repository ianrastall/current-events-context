Date: '2004-11-23'
Source_URI: Portal:Current events/2004 November 23
Intelligence_Payload:
  Uncategorized:
  - CBS News anchor Dan Rather resigns from CBS Evening News effective in March 2005.
    He will remain a correspondent for 60 Minutes news magazine and other assignments.
    (Reuters)
  - '2004 Ukrainian presidential election: Opposition leader Viktor Yushchenko declares
    himself winner and takes a symbolic oath of office at a parliament special session,
    boycotted by pro-government MPs. Crowds of around 200,000 Yushchenko supporters
    rally outside the parliament building in Kiev. Freedom House releases a statement
    saying that the runoff election was "tainted by massive voter fraud." Russian
    Foreign Ministry expresses "extreme concern" about the disobedience actions by
    the Ukrainian opposition. (BBC) (Reuters) (FH)'
  - The city governments of Lviv, Ternopil, Vinnytsia and Ivano-Frankivsk announce
    their support for Yushchenko. A crowd estimated at 200,000 surrounds the Parliament
    building in Kiev, calling for Yanukovych to step down. (The Guardian)
  - Conflict in Iraq
  - Officials from the Arab League, Organisation of the Islamic Conference, G8 nations,
    People's Republic of China and UN Secretary General Kofi Annan convene at Sharm
    el-Sheikh, Egypt to discuss and issue declarations on Iraq. (BBC) (Reuters)
  - A second cleric of the Sunni Muslim Clerics Association in two days is gunned
    down in Miqdadiya near Baquba on his way to a mosque. (Reuters)
  - The popular MMORPG World of Warcraft was released on this day, on the 10th anniversary
    of the Warcraft franchise.
