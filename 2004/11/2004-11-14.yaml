Date: '2004-11-14'
Source_URI: Portal:Current events/2004 November 14
Intelligence_Payload:
  Uncategorized:
  - Iran has agreed to curb most of its uranium enrichment with three EU countries,
    France, Germany and the UK. (BBC) (EUObserver.com)
  - The Belgian political party Vlaams Blok changes its name to Vlaams Belang (Flemish
    Interest) after being banned for being racist. (AFP)
  - The Basque separatist party Batasuna calls for talks with a view to ending armed
    conflict in Spain. (BBC)
  - Fierce storms cause three shipwrecks off Algiers. At least one sailor has been
    killed and 18 are missing. (BBC)
  - Ugandan President Yoweri Museveni declares a week-long truce with the Lord's Resistance
    Army starting Monday. (BBC)
  - The BBC based on a water test of one well claims thousands in India still face
    a risk of poisoning after the Union Carbide Bhopal disaster 20 years ago that
    killed at least 4000 people. (BBC)
  - Kidnappers release two female relatives of Iraqi interim Prime Minister Iyad Allawi.
    (Reuters)
  - UK shadow arts minister Boris Johnson is sacked by Michael Howard following allegations
    about his private life. (BBC)
  - Two bodyguards of former Palestinian prime minister Mahmoud Abbas (Abu Mazen)
    are killed as they exchange fire with masked Gunmen as Abbas pays a visit to a
    mourning tent for Yasser Arafat in Gaza City. (Haaretz)(BBC)
  - Japan's trade minister Shoichi Nakagawa says he believes that a Chinese submarine,
    which Tokyo says intruded into Japanese waters last week, is linked to gas exploration
    by China in a remote island area claimed by both countries. (VOA)
  - Elections to choose the successor to Yasser Arafat are to be held on 9 January
    2005, Palestine Authority interim President Rawhi Fattuh announced today. (BBC)
  - The animated/live action dramedy Tom Goes to the Mayor airs for the first time
    on Adult Swim in America.
  - Researchers claim to have found a site that may be a candidate for the lost city
    of Atlantis on the bottom of the east Mediterranean, 80 kilometers southeast of
    Cyprus. The Cypriot government disputes the claim, saying more evidence is needed.
    (CNN)
