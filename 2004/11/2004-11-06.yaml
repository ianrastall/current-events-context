Date: '2004-11-06'
Source_URI: Portal:Current events/2004 November 6
Intelligence_Payload:
  Uncategorized:
  - Talks between Iran and three European Union members, France, Germany, and the
    United Kingdom, on the Iranian nuclear program end without an agreement and no
    further meetings planned. Iran has offered a six-month suspension of its uranium
    enrichment program. The European Union seeks an indefinite halt to the program.
    The issue is expected to be referred to the United Nations Security Council at
    the November 25 meeting of the International Atomic Energy Agency. (Reuters) Others
    report, however, that a preliminary agreement has been reached. (AP) (BBC)
  - An express train has collided with a stationary car near the village of Ufton
    Nervet, England. It is thought that nine carriages of the 17:35 First Great Western
    service between London Paddington and Plymouth have been derailed. Six people
    have reportedly been killed, with around 150 more injured. (BBC)
  - An Indian spokesman says the Indian Army has been conducting counter-insurgency
    operations on the border of Burma. Two Indian soldiers and 13 rebels have been
    killed so far. (BBC)
  - Chilean army commander General Juan Emilio Cheyre releases a statement saying
    abuses under Augusto Pinochet were "punishable and morally unacceptable acts of
    the past", reversing its previous stance that they were excesses carried out by
    individual officers. (BBC)
  - African Union mediators adjourn negotiations with Sudan on the Darfur conflict
    after numerous security issues are not agreed upon, mainly a no-fly zone in Darfur.
    (Reuters) (BBC)
  - 'Conflict in Iraq: Three suicide car bombs in Samarra kill 19 Iraqi police, two
    Iraqi National Guardsmen, two Iraqi Rapid Reaction Forces, and 11 civilians, with
    48 wounded. In Ramadi, an Iraqi is killed and 20 U.S. Marines are wounded after
    a shoot-out between the Marines and rebels. A physician at Fallujah General Hospital
    reports two dead and maintains no foreign fighters have been admitted to his hospital.
    (Reuters) (BBC)'
  - Nine French peacekeepers and a U.S. citizen are killed in the rebel-held town
    of Bouake in Côte d'Ivoire after government warplanes bomb the town to root out
    insurgents. In response, the French military launches attacks which destroy two
    warplanes at Yamoussoukro airport. (CNN) (BBC)
  - At an anti-nuclear waste shipment protest rally near the French town of Avricourt
    a protester, Sébastien Briat, is killed after a train severs his leg. The 23-year-old
    French man was protesting against the CASTOR transport. (BBC)
  - 'Arab-Israeli Conflict: The Lebanese Militant group, Hezbollah, has flown a reconnaissance
    drone over Israeli territory for the first time. (BBC)'
  - Burt Rutan of Scaled Composites is officially awarded the Ansari X Prize for the
    first privately funded space flight. (AP)
  - The Iraq interim government declares a state of emergency ahead of an expected
    assault on the rebel stronghold of Fallujah.
  - 'Illness of Yasser Arafat: A spokesman for Yasser Arafat claims that all the Palestinian
    president''s vital functions are fine although it remains unclear why Arafat has
    not regained consciousness and if or when he will. (AP) (The Age)'
  - The Ralph Nader/Peter Camejo campaign has filed a challenge to the voting results
    in New Hampshire after receiving numerous complaints from voting rights activists.
    This effort is widely encouraged by Democrats and Independents due to suspected
    flaws related to Diebold Election Systems voting machines. (Portland Independent
    Media Center) (Nashua Telegraph)
