Date: '2004-11-24'
Source_URI: Portal:Current events/2004 November 24
Intelligence_Payload:
  Uncategorized:
  - '2004 U.S. presidential election controversy: The U.S. Government Accountability
    Office plans to investigate complaints of several systemic problems with this
    month''s elections. (CNN)'
  - Ohio law requires state officials to perform a recount when called for by candidates
    on the ballot, but a federal judge today declared that the results can be declared
    final before the recount occurs. (CNN)
  - Justice Through Music has posted a minimum $200,000 reward for specific evidence
    of vote fraud in the recent election in light of the many instances of reported
    voter irregularities. (eMediaWire)
  - 'Iran''s nuclear program: The European Union rejects a request by Iran to be allowed
    to continue using uranium enrichment centrifuges. (Reuters)'
  - U.S. Department of Agriculture officials have announced that the possible U.S.
    case of mad cow disease from the previous week has tested negative twice in tests
    run by the National Veterinary Services Laboratory. (Sac. Bee) (Wisc. Ag.)
  - Despite earlier reports that Ukraine's Prime Minister Viktor Yanukovych and opposition
    leader Viktor Yushchenko had agreed to hold talks over the country's heavily disputed
    elections, this now seems unlikely. Protests continue, with an official election
    result due to be announced at around 1400 UTC. (BBC)
  - Indonesian police officials announce the arrest of four suspects wanted concerning
    the 2004 Australian Embassy bombing in Jakarta. (BBC) (CNN)
  Israeli-Palestinian conflict:
  - Israeli Defence Force officer claims, he was right to repeatedly shoot an unarmed
    13-year-old Palestinian girl in Gaza, saying he would have killed her even if
    she was three years old.
