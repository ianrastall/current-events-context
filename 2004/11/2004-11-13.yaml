Date: '2004-11-13'
Source_URI: Portal:Current events/2004 November 13
Intelligence_Payload:
  Uncategorized:
  - US Troops are preventing a Red Crescent aid convoy from entering the city of Falluja,
    reportedly for safety reasons (Reuters)
  - 'Conflict in Iraq: Hundreds of US Troops are diverted from Falluja as insurgents
    appear to take control of the northeastern city of Mosul. (BBC)'
  - Iran is reportedly concluding a deal with the European Union which would spare
    it from possible United Nations sanctions over its nuclear arms programme. (Reuters)
  - Former Afghan leader Mullah Mohammed Omar has made a rallying call to his Taliban
    forces. He sent a two-page message to the Afghan Islamic Press agency to mark
    the Muslim Eid ul Fitr festival. (BBC)
  - A fire has badly damaged a mosque in the south-eastern village of Helden, Netherlands,
    in the latest of a series of attacks on Dutch Muslim sites. (BBC)
