Date: '2004-11-27'
Source_URI: Portal:Current events/2004 November 27
Intelligence_Payload:
  Uncategorized:
  - Prominent Chinese dissident Liu Jingsheng is released. (BBC)
  - Virginia Tech begins its reign of dominance over UVA, the Hokies clinch the Commonwealth
    Cup in a 24-10 win at Lane Stadium. The Hokies continue to hold the Commenwealth
    Cup for over 4000 days following this victory.
  - Roman Catholic Pope John Paul II presents Eastern Orthodox Patriarch Bartholomew I
    with reliquaries containing the bones of 4th-century Patriarchs Gregory Nazianzus
    and John Chrysostom, brought back to Rome as loot from Constantinople during the
    Crusades. The ceremony is applauded as a notable gesture of ecumenism between
    the divided churches. (BBC) (Reuters)
  - According to the chairman of the Duma commission investigating the Beslan school
    massacre, there is indirect evidence of involvement by a foreign intelligence
    agency; however, the agency remains unnamed. (Interfax)
  - Colombian Defense Minister Jorge Alberto Uribe claims that FARC rebels plotted
    to assassinate U.S. President George W. Bush during his recent visit to the country.
    The U.S. Secret Service declines to comment. (BBC), (CNN)
  - Lieutenant General Joginder Jaswant Singh is named the next chief of army staff
    of the Indian Army. He will be the first Sikh to become the chief. (Times of India)
    (The Tribune, India)
  Ukraine presidential election, 2004:
  - Ukraine's parliament votes for the annulment of the election results and asks
    President Leonid Kuchma to dissolve the country's Central Election Committee.
    This is a non-binding request as the parliament cannot annul the results itself.
    (CNN)
  - Dutch Foreign Minister Bernard Bot says that the EU believes fresh elections are
    the best option for Ukraine. (Reuters)
