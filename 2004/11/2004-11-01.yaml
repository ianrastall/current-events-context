Date: '2004-11-01'
Source_URI: Portal:Current events/2004 November 1
Intelligence_Payload:
  Uncategorized:
  - The Grímsvötn volcano under the Vatnajökull glacier in Iceland erupts (BBC).
  - An inquiry by the Egyptian Interior Ministry into last month's bombings of hotels
    in the Sinai concludes that the perpetrators received no external help, contradicting
    assertions by Israeli officials that the blasts were linked to al-Qaeda. (Reuters)
    (BBC)
  - Over 300 mm of rain fall on Venice, Italy, flooding an estimated 80% of the city
    and shutting down the public transit system. (Reuters) (SBS)
  - Chief Justice of the U.S. Supreme Court William H. Rehnquist, who has been undergoing
    radiation and chemotherapy treatments for thyroid cancer, announces he will delay
    his return to the courtroom on the advice of his doctors. (CNN)
  - 'Israeli-Palestinian conflict: A suicide bombing by a 16-year-old Palestinian
    boy in Tel Aviv kills three and wounds over 30 people. The Marxist Popular Front
    for the Liberation of Palestine claims responsibility. (Reuters) (BBC)'
  - Martial law is imposed in parts of China's Henan province after fighting between
    Hui Chinese and Han Chinese ethnic groups kills between 7 and 148 people. (Time)
    (BBC)
  - Bank of Japan began to issue new Japanese yen banknotes, known as Series E.
  Conflict in Iraq:
  - The deputy governor of Baghdad, Hatem Kamil, is assassinated. The militant group
    Army of Ansar al-Sunna claims responsibility. (Reuters) (BBC)
  - A Reuters cameraman is shot dead by suspected sniper fire. In Ramadi, hospital
    officials report six dead from fighting between United States armed forces and
    rebels. A U.S. citizen, an unidentified Nepali and four Iraqi workers are taken
    hostage at gunpoint from their office in Baghdad. (Reuters) (BBC)
