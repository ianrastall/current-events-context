Date: '2004-11-15'
Source_URI: Portal:Current events/2004 November 15
Intelligence_Payload:
  Uncategorized:
  - 'China and the United Nations: The President of the Republic of China Chen Shui-bian
    declares he will push to get the ROC included in the United Nations under the
    name Taiwan. The People''s Republic of China condemns the move as a political
    trick to create an independent Taiwan. (Yahoo) (ABC US) (Reuters)'
  - The European Space Agency's ion propulsion spacecraft SMART-1 enters into lunar
    orbit, 14 months after its launch. (Space.com)(SpaceDaily.com)
  - Media magnate Conrad Black has been sued for fraud by the U.S. Securities and
    Exchange Commission. (BBC) (Bloomberg)
  - Vanuatu's Council of Ministers drops its opposition to a surprise decision by
    Prime Minister Serge Vohor to establish diplomatic relations with the Republic
    of China (Taiwan). (Reuters)
  - U.S. President George W. Bush accepts the resignation of Secretary of State Colin
    Powell. He is the sixth Cabinet member to resign since the re-election of President
    Bush. (CNN) (BBC). Other resignations today include Agriculture Secretary Ann
    Veneman (Reuters) , Energy Secretary Spencer Abraham (Reuters) and Education Secretary
    Rod Paige.
  - Bhutan announces a nationwide ban on tobacco sales. (BBC)
  - Candidate cities for the 2012 Summer Olympics (Paris, London, Madrid, Moscow,
    and New York City) submit 120 copies of their candidate files to the International
    Olympic Committee. The IOC will announce the winning candidate in Singapore in
    July 2005. (IOC) (IOC – candidacy procedures (PDF)) (Guardian)
  - The United States Secretary of State is to visit the West Bank next week for talks,
    Palestinian Foreign Minister Nabil Shaath said today. (BBC)
  Conflict in Iraq:
  - US troops in Falluja have launched new air strikes and artillery attacks against
    suspected rebel positions. (BBC)
  - The US military says they believe civilian casualties are low in Falluja because
    so many people fled the city before the assault began, but this is disputed by
    some eyewitnesses. The military is still refusing to allow aid workers in and
    casualty figures cannot yet be confirmed. (BBC)(Gulf Daily News)(AP)
