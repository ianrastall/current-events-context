Date: '2004-11-11'
Source_URI: Portal:Current events/2004 November 11
Intelligence_Payload:
  Uncategorized:
  - The Comparative Toxicogenomics Database is launched on the web and revolutionizes
    chemical-gene-disease information for research scientists.
  - Deputy director of central intelligence John E. McLaughlin and some other senior
    officials in the CIA resign amid conflict with new director Porter Goss's chief
    of staff, Patrick Murray. (Washington Post) (AFP)
  - Scott Peterson is found guilty of murder in the first degree of his wife, Laci
    Peterson, and in the second degree of his unborn son, Connor. The penalty phase
    of the trial was scheduled for November 22, 2004. (CNN)
  - 'Conflict in Iraq: The United States Armed Forces report that insurgents in Falluja,
    Iraq, are trapped. Hundreds of insurgents, 18 U.S. soldiers and five members of
    the Iraqi security forces have been killed in four days of fighting. (Reuters)'
  - President of the United States George W Bush states that it is possible for a
    Palestinian state to arise in the next four years but that it would depend greatly
    upon who they elect to replace Yasser Arafat. (Reuters)
  - Ilda Boccassini, an Italian prosecutor in the Milan corruption trial, asks the
    court to sentence Italian Prime Minister Silvio Berlusconi to eight years' imprisonment
    for bribing judges. (Reuters)
  - 'Iran''s nuclear program: The International Atomic Energy Agency delays issuing
    its report on Iran''s nuclear activities as Iran, France, Germany and Britain
    remain deadlocked in talks aimed at freezing Iran''s uranium enrichment program.
    (Reuters)'
  - Death of Yasser Arafat
  - Yasser Arafat's funeral procession is held in Cairo, Egypt. Arafat is given full
    military honours and his coffin is led by a horse-drawn carriage. Leaders of Muslim
    and Arab countries as well as other dignitaries attend, including Khaled Meshaal,
    head of Hamas, who is currently sought by Israel. (Reuters)(BBC)
  - Israel has barred the entire population of the Gaza Strip from attending Yassir
    Arafat's funeral in Ramallah, and has sealed off many West Bank towns. (BBC)
  - Ramallah is described as in a state of "chaos" as tens of thousands of people
    pack the area in and around the Muqata, prior to Arafat's burial. Gunmen in the
    crowd shot repeatedly into the air, but there is no serious violence; and plans
    for Arafat to lie in state appear to have been dropped due to the huge crowd.
    He was buried in soil from Al Quds.(BBC)
