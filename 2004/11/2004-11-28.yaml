Date: '2004-11-28'
Source_URI: Portal:Current events/2004 November 28
Intelligence_Payload:
  Uncategorized:
  - Swiss voters overwhelmingly approve government proposals to permit research using
    stem cells of human embryos. (BBC)
  - An explosion in a coal mine in the Chinese central province of Shaanxi leaves
    187 men trapped underground. Official figures show 4,153 mining accident deaths
    in the last nine months, while 119 miners are still missing from a November 20
    iron mine fire in Hebei. (BBC) (Xinhua) (Xinhua)
  - 'Conflict in Iraq: 42 primarily Shi''a parties release a statement saying a postponement
    of elections would be illegal. The U.S. military reports a U.S. soldier is killed
    by a roadside bomb in Duluiya north of Baghdad and that troops discover 17 more
    corpses in Mosul, raising the number found to at least 50 in two weeks. Hospital
    officials in Ramadi say two people are killed and three wounded when U.S. troops
    fire on suspected insurgents. (Reuters) (BBC)'
  - An oil tanker, the Athos 1, leaks approximately 30,000 US gallons ( of crude oil
    into the Delaware River in the eastern United States while pulling into a Citgo
    oil refinery. The Coast Guard closes part of the river to commercial traffic while
    cleanup begins. (Reuters)
  2004 Ukrainian presidential election:
  - Russia intimates that its opposition to fresh elections might not be unshakable.
    (BBC)
  - The Donetsk regional council is to hold a referendum on 5 December on giving the
    region the status of a republic within Ukraine. (BBC)
