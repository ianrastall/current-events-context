Date: '2004-11-04'
Source_URI: Portal:Current events/2004 November 4
Intelligence_Payload:
  Uncategorized:
  - The shutdown of the Number 2 Balakovo nuclear reactor in the Saratov region of
    southern Russia due to a turbine malfunction causes widespread local panic. Local
    pharmacies' supplies of iodine sell out; residents flee, urging each other to
    drink vodka and avoid public water. Engineers at the plant find no leak of radiation.
    A number of people are hospitalized for iodine overdose; the government and media
    are criticized for poor coordination. (Bellona)
  - The Number 4 Rivno nuclear reactor of Ukraine is shut down after 19 days of operation
    due to an oil leak. No leak of radiation is found.
  - Spammer Jeremy Jaynes, rated the world's eighth most-prolific spammer, is convicted
    of three felony charges of sending thousands of junk e-mails through servers located
    in Virginia, and is recommended to be sentenced to nine years' imprisonment. His
    sister is fined $7500 for related offences. (Computerworld) (CBC)
  - President designate of the European Commission José Manuel Barroso announces that
    Franco Frattini from Italy and Andris Piebalgs from Latvia will complete his commission.
  - Russian President Vladimir Putin signs a bill approving parliament's ratification
    of the Kyoto protocol bringing the number of countries bound by the treaty to
    126. (Reuters)
  - The Israeli senior commander in the Gaza Strip, Brig. Gen. Shmuel Zakai, resigns
    amid allegations of telling the press Prime Minister Ariel Sharon ordered to increase
    Operation Days of Penitence on Day 14 while the army considered the operation
    extracted itself. (BBC)
  - The United States recognizes the Republic of Macedonia under its constitutional
    name rather than the name "former Yugoslav Republic of Macedonia" used by the
    United Nations, the first major foreign policy move by the re-elected Bush administration.
    The move outrages Greece, who had the European Union's support in lobbying against
    recognition since Macedonia's independence in 1991. (Reuters) (BBC)
  - Elizabeth Edwards, wife of former Democratic vice presidential candidate John
    Edwards, announces that she has breast cancer.
  - Yasser Arafat, who is on a life-support machine, has been officially declared
    brain-dead while in intensive care at a hospital in Paris, according to medical
    sources inside the hospital. (Seattle Times) (BBC)
  - The High Court in the Republic of China rejects a petition by the Kuomintang to
    nullify the March 2004 presidential election result that saw Chen Shui-bian re-elected
    president by a margin of 0.2% over Lien Chan. The KMT plans to appeal to the Supreme
    Court. (BBC)
  - Researchers of Type 2 diabetes at a Winnipeg laboratory announce that they have
    isolated a previously hypothetical second substance, called hepatic insulin sensitizing
    substance or HISS, that participates in sugar storage along with insulin. (Globe
    and Mail)
  - 'Same-sex marriage in Canada: Two lesbian couples denied marriage licences file
    a lawsuit against the governments of Canada and of Newfoundland and Labrador,
    asking for the legalization of same-sex marriage in that province. (365Gay)'
  - Olympic gold medalist Michael Phelps arrested and charged with driving under the
    influence. Maryland State Police say Phelps was stopped around 11:30 Thursday
    night, near the intersection of Route 13 and Bateman Street in Salisbury, after
    a trooper spotted an SUV that failed to stop at a stop sign. Beside the charge
    of driving under the influence, Phelps was also charged with driving while impaired
    by alcohol, violation of a license restriction, and failure to obey a traffic
    control device. (WBAL Radio)
  Conflict in Iraq:
  - The NGO aid agency Médecins Sans Frontières ends work in Iraq due to the "escalating
    violence" and "the warring parties have repeatedly shown their disrespect for
    independent humanitarian assistance." (BBC)
  - A suicide car bomb and mortar fire kills three Black Watch(Scottish) soldiers
    and an Iraqi translator south of Baghdad at Camp Dogwood. (BBC)
