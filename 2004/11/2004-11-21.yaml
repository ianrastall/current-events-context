  - Hifikepunye Pohamba, the candidate of the ruling South-West Africa People's Organisation
    party, is declared the winner of the Namibian presidential election with 76% of
    the vote. He succeeds Sam Nujoma, who is retiring after serving as president for
    15 years. (BBC)
  - Ukraine holds the second vote in a run-off presidential election today. Voters
    will decide between Moscow-oriented Prime Minister Viktor Yanukovych and western-leaning
    reformer Viktor Yushchenko. Observers have expressed concern over possible Russian
    interference, election abuses, and bias in reporting by the state media. With
    74% of vote counted, Yanukovych leads Yushchenko 49–48%. Yushchenko has alleged
    that massive election fraud has taken place. (BBC) (BBC)
  - The Electoral Commission of the Iraq interim government schedules parliamentary
    elections for January 30, 2005. Reuters
  - The Grand Canyon is artificially flooded to bring natural sediment to the ecosystem.
    (CNN)
