  - The Nintendo DS was released in North America.
  Israeli-Palestinian conflict:
  - U.S. Secretary of State Colin Powell arrives in Israel for talks with leaders
    of both sides of the conflict with an aim to restarting the stalled peace process.
    (BBC)
  - Three Fatah militants are killed in a gunfight with YAMAM, an Israeli Police counterterrorist
    unit. Among those killed is Mohammed Rassan Sheikh, who hid in Arafat's compound.
    One Israeli police officer sustained light injuries.(Haaretz)
  - In the Gaza Strip, the IDF foils an attack on Kissufim road to Gush Katif, killing
