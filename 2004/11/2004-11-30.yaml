Date: '2004-11-30'
Source_URI: Portal:Current events/2004 November 30
Intelligence_Payload:
  2004 U.S. presidential election controversy:
  - Attorneys for Green Party presidential candidate David Cobb asked a federal court
    to take jurisdiction of, and ultimately dissolve, a temporary restraining order
    issued by a Delaware County, Ohio, judge attempting to prevent Cobb from seeking
    a recount of the presidential ballots cast in that county.
  - Attorneys representing John Kerry filed papers to join the Cobb/Badnarik Ohio
    recount case.
  - If the Ohio recount does not begin before the votes are certified, then electors
    will be chosen before the recount begins.
  Uncategorized:
  - The U.S. Department of Commerce imposes heavy tariffs against shrimp imported
    to the U.S. from China and Vietnam. (Bloomberg)
  - Ken Jennings ends his 75-episode streak on Jeopardy!, becoming the foremost game
    show contestant in international television history.
  - In Ottawa, Canada, sporadic violence occurs in protests against U.S. President
    George W. Bush's first official visit to Canada. (CBC) (Globe and Mail)
  - U.S. Department of Homeland Security Secretary Tom Ridge resigns. This is the
    latest in a string of resignations after the 2004 presidential election. (CNN)
    (Yahoo)
  - A report from the International Committee of the Red Cross, recently leaked to
    the New York Times, describes the treatment of prisoners at the U.S. base in Guantánamo
    Bay, Cuba as being "tantamount to torture". The U.S. military disputes this. (New
    York Times)
  - More than 300 persons have died in flooding and landslides in Quezon Province,
    in the northern Philippines. Illegal logging is blamed. (Reuters Alertnet)(ABS-CBN)
    (SwissInfo) (ABC News)
  - Traian Basescu, the leader of the Romanian opposition alliance Justice and Truth,
    demands a re-run of the 2004 legislative elections, claiming that 160,000 void
    ballots were awarded to Adrian Nastase and his Social Democratic Party. (BBC)
    (Guardian)
  - Portuguese President Jorge Sampaio dissolves the parliament after Prime minister
    Pedro Santana Lopes fails to present a plan to solve cabinet instability. The
    elections are expected to be scheduled to February 2005. (CNN) (BBC)
  - U.K. Home Secretary David Blunkett defends his actions after newspaper allegations
    that he used his position to acquire a fast-track visa application for his former
    lover's nanny, ordering an independent enquiry into his own actions and denying
    any impropriety, whilst apologising for inadvertently misusing government funds
    to obtain her a first class train ticket. (BBC)
  - A South African court rules that the common law concept of marriage must be extended
    to include same-sex couples. Although the ruling does not immediately permit same-sex
    marriage in South Africa, it is considered a major step in that direction. (365gay.com)
