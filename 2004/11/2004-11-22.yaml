Date: '2004-11-22'
Source_URI: Portal:Current events/2004 November 22
Intelligence_Payload:
  Uncategorized:
  - '2004 Ukrainian presidential election: Ukraine''s electoral commission declares
    Prime Minister Viktor Yanukovych the winner. Opposition leader Viktor Yushchenko
    calls for supporters to protest "the total falsification of the vote". Observers
    from the Organization for Security and Co-operation in Europe (OSCE) say the run-off
    vote "did not meet international standards", and the senior U.S. election observer,
    Senator Richard Lugar, notes a "concerted and forceful program of election day
    fraud". (Reuters) (BBC)'
  - European Parliament lawmakers urge European Commission president José Manuel Barroso
    to suspend Transport Commissioner Jacques Barrot, after it was revealed that Barrot
    was involved in a party funding scandal in 2000. (CNN)
  - 'Iran''s nuclear program: Iran declares that it will suspend its uranium enrichment
    programme to comply with a European Union-brokered deadline. Iran will review
    its decision in three months. The EU seeks to have the suspension made permanent
    and is willing to provide economic and political incentives. (Reuters)(BBC)'
  - A mechanical failure has been blamed for an oil spill on the eastern coast of
    Canada. Experts estimate 170,000 litres of oil have been spilled into the Atlantic
    Ocean off the coast of Newfoundland, covering an area 9 km long by 1 km wide.
    (CBC)
  - A Gulfstream II airplane heading to pick up former United States President George
    H. W. Bush crashes before landing, killing all three people on board, in Houston,
    Texas. (CNN)
  - The American Journal of Psychiatry reports researchers from the University of
    Southern California conclude in a study of 1,000 Mauritian children that malnutrition
    and a poor diet are strongly correlated to a low IQ and anti-social behavior.
    (BBC) (AJP)
  - The United Nations is investigating 150 sexual abuse allegations involving civilian
    staff and soldiers on the peace-keeping mission in the Congo, some reportedly
    caught on video. (Reuters)
  - An Israeli military court indicts an unidentified outpost commander in charge
    of soldiers who killed a 13-year-old Palestinian girl in the Gaza Strip on October
    5. (Haaretz)
  - In the Canadian province of Alberta, the Progressive Conservative party under
    Premier Ralph Klein is re-elected to a 10th consecutive term, and the fourth for
    Klein. The PCs drop to from 74 to 60 seats in the 83-seat legislature.(Edmonton
    Journal) (CBC)
