Date: '2004-11-25'
Source_URI: Portal:Current events/2004 November 25
Intelligence_Payload:
  Uncategorized:
  - India proposes to Pakistan that India grant Kashmir a large amount of autonomy,
    in order to end the state of war between the two countries, but that the current
    border can not be modified. Pakistan recently proposed that Kashmir be demilitarized,
    split along ethnic/religious lines and granted independence or transferred to
    United Nations control. (Reuters)
  - The Ukrainian Supreme Court bars publication of the presidential election results,
    delaying inauguration, and decides to examine a complaint alleging fraud on November
    28. (Reuters)
  - 'Iran''s nuclear program: Just three days after an agreement with the European
    Union took effect, Iran prevents the International Atomic Energy Agency (IAEA)
    from sealing centrifuges at the Natanz enrichment facility. The IAEA begins its
    meeting to decide whether or not to refer the matter to the United Nations Security
    Council. (Reuters)'
  - A previously scheduled EU–Russia summit in The Hague is overshadowed by the Ukraine
    presidential election crisis. (official EU) (BBC)
  - Gang war between rival groups of Camorra continues in Naples, Italy. (SwissInfo)
    (Scotsman) (BBC)
  - The Indian political party Congress Jananayaka Peravai merges into the Indian
    National Congress.
