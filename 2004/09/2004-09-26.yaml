Date: '2004-09-26'
Source_URI: Portal:Current events/2004 September 26
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: U.S. Secretary of State Colin Powell says, in an interview
    on the ABC television interview program This Week, that the insurgency in Iraq
    is worsening, and that the aim of the insurgents is to disrupt the upcoming elections.
    (BBC) (Reuters)'
  - Pakistani security forces kill al-Qaeda member Amjad Farooqi, who is suspected
    of involvement in the murder of U.S. reporter Daniel Pearl. (Reuters) (BBC)
  - Several earthquakes over the weekend centered below Mount St. Helens in the U.S.
    state of Washington prompt scientists to issue a rare warning that the volcano
    could erupt soon. (USGS/CVO)
  - The relaunch of Doctor Who is officially announced by the BBC.
  - British Royal Air Force fighter planes escort a Greek Olympic Airlines plane to
    Stansted Airport in London after an anonymous caller warns of a bomb on board.
    (AFP) (news.telegraph)
