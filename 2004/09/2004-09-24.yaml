Date: '2004-09-24'
Source_URI: Portal:Current events/2004 September 24
Intelligence_Payload:
  Uncategorized:
  - Scientists announce that they have deciphered the complete DNA sequence of Legionella
    pneumophila, one of the bacteria that causes Legionnaires' Disease. (BBC)
  - 'Conflict in Iraq: The Muslim Council of Britain sends a delegation to Baghdad
    in the hopes of securing the release of Kenneth Bigley. (BBC)'
  - 'Same-sex marriage in Canada: The Nova Scotia Supreme Court strikes down the province''s
    law forbidding same-sex marriages, making it the sixth of Canada''s provinces
    and territories to legalize same-sex marriage. Neither the federal nor the Nova
    Scotia government had opposed the court challenge. (CBC)'
