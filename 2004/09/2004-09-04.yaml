Date: '2004-09-04'
Source_URI: Portal:Current events/2004 September 4
Intelligence_Payload:
  Uncategorized:
  - 2.5 million Florida residents are ordered to evacuate their homes in preparation
    for Hurricane Frances, which has already hit the Bahamas and Turks and Caicos
    Islands. Frances is currently a strong Category Two Hurricane, and will be very
    near the east coast of Florida by late tonight or early next morning. (BBC) (NOAA/NHC)
  - The X Factor makes its worldwide debut premiering for the first time in the UK
    and will later go on to become the biggest show in television history.
  - In American football, Bellevue defeats De La Salle with a score of 39-20, ending
    De La Salle's 151-winning streak, which was the longest in high school football.
    (Seattle Post-Intelligencer)
  - In AFL Essendon Bombers won their most recent final against Melbourne Demons with
    a score of 104-99
