Date: '2004-09-15'
Source_URI: Portal:Current events/2004 September 15
Intelligence_Payload:
  Uncategorized:
  - 'China and the United Nations: For the 12th consecutive year, the General Assembly
    of the United Nations rejects a request for the Republic of China (Taiwan) to
    be represented in the United Nations. This reiterates the Assembly''s position
    that Resolution 2758, which recognized the People''s Republic of China rather
    than the Republic of China as the sole legitimate representative of "China", prevents
    Taiwan from being separately represented. The ROC''s supporters argue that the
    resolution did not give the People''s Republic the exclusive right to represent
    the people of Taiwan. (Straits Times) (Reuters) (Resolution requesting representation)'
  - South Africa decides to recognize the Sahrawi Arab Democratic Republic (SADR)
    because Morocco refuse to discuss the territory self-determination."Once that
    process was stopped and Baker resigned and Morocco said its (sovereignty claim)
    was not negotiable, then we were left with no choice" declared Nkosazana Dlamini-Zuma.
    Recognition of the SADR by South Africa had been promised by Nelson Mandela in
    1994, but had been postponed by pressures from other countries, as the United
    States, France or Palestine. Thabo Mbeki stated on a speech to the Pan-African
    Parliament that the international community should press for Western Sahara's
    self-determination in the same way as it had done to end South Africa's apartheid.
    Morocco reacted recalling its ambassador in South Africa for consultations, considering
    the recognition "partial, surprising and inopportune". (Afrol News) (Iol News)
    (BBC News) Joint communiqué on the establishment of diplomatic relations between
    South Africa and the SADR
  - Canada's federal government and its provincial and territorial leaders reach an
    accord to increase funding for the country's national health care system. In exchange
    for an increase in federal funding of CAD over the next six years, provincial
    and territorial leaders agree to reforms intended to reduce patient waiting times.
    (Toronto Star)
  - In a report released today, the U.S. State Department for the first time places
    the Kingdom of Saudi Arabia on its list of "countries of particular concern" (CPCs)
    that engage in "particularly severe violations" of religious freedom. A designation
    as a CPC requires the State Department to take whatever steps are necessary—up
    to the level of sanctions—to increase religious tolerance in the designated country.
    (CNN.com) (State Department report)
  - Six Palestinian gunmen and four others are killed by Israeli troops. (Reuters)
    (BBC)
  - In Afghanistan, three Americans are sentenced to up to 10 years imprisonment for
    illegally detaining and torturing Afghans, and for running an illegal private
    jail in Kabul. The defiant Americans—Jonathan Idema, Brent Bennett, and Edward
    Caraballo—say they intend to appeal the decision. (CNN)
  - 'A Countryside Alliance rally outside Britain''s Parliament buildings, in opposition
    to a bill that would ban fox-hunting, descends into violence as protesters and
    police clash. Some protesters successfully breach security and enter the floor
    of the House of Commons. The bill later passes 339–155. (BBC: 1, 2)'
  - Five crew members of an Irish yacht, who had been adrift in a liferaft for seven
    days after abandoning their ship, are rescued by helicopter off the Cornwall coast
    of Britain. The crew members ran out of water on Monday and were running low on
    food when rescued. (BBC) (RTÉ)
  - 'Both the European Union and the government of the United States express concern
    about Russian President Vladimir Putin''s announcement that, as a means of responding
    to terrorism, he would significantly alter Russia''s political system. The Russian
    government rejects the United States'' concerns as inappropriate interference
    in Russia''s internal affairs. (Reuters: 1, 2)'
  - In Southern California, the radio system linking air traffic controllers to high-altitude
    planes breaks down at 17:00 local time, Tuesday (0000 UTC September 15), prompting
    the U.S. Federal Aviation Administration (FAA) to halt outgoing flights for three
    hours at Los Angeles International and several other airports. (CNN)
  2004 Atlantic hurricane season:
  - As of 13:00 local time (1800 UTC September 15), the center of Hurricane Ivan is
    located about south of the coast of Alabama and is moving northward at about (14 mph).
    The hurricane is now projected to make landfall along the Gulf Coast of the United
    States very early on Thursday. Forecasters now predict that there is little risk
    that the hurricane will pass over New Orleans. A hurricane warning is in effect
    for the Gulf Coast from New Orleans to the Florida Panhandle. (NOAA/NHC) (Washington
    Post)
  - As Hurricane Ivan approaches the Gulf Coast of the United States, an estimated
    people, including residents of metropolitan New Orleans, are advised to evacuate.
    The situation is particularly dangerous for New Orleans, since a direct or close
    hit by the hurricane could breach the levees around the city, causing its streets
    to fill with a mixture of floodwater, raw sewage, gasoline, and chemicals. (CNN)
