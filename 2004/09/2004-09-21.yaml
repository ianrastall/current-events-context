Date: '2004-09-21'
Source_URI: Portal:Current events/2004 September 21
Intelligence_Payload:
  Uncategorized:
  - Three members of Texans for a Republican Majority, a political action committee
    founded by Tom DeLay, Majority Leader of the U.S. House of Representatives, are
    indicted by a grand jury in Travis County, Texas, on charges of money laundering
    and accepting illegal campaign contributions. (Reuters)
  - U.S. President George W. Bush addresses a skeptical United Nations audience to
    discuss his plans regarding Iraq. (Boston Globe)
  - '2004 Atlantic hurricane season: The number of people confirmed dead in Haiti
    from the effects of Hurricane Jeanne rises to at least 691, with the number of
    missing at more than 1,000. The city of Gonaïves remains flooded, and thousands
    are homeless. (ABC News)'
  - The U.S.]Department of Homeland Security intercepts a United Airlines flight from
    London, so that Yusuf Islam, the musician formerly known as Cat Stevens, can be
    arrested and deported for allegedly financially supporting groups linked to terrorism.
    (MSNBC)
  - Syria begins a "phased redeployment" of its forces in Lebanon (currently estimated
    at 20,000 troops), moving about 1,000 troops out of bases south of Beirut; it
    is not clear whether they will be redeployed in Lebanon or Syria. Earlier this
    month, UN Security Council Resolution 1559, drafted by the United States and France,
    called for all foreign troops to leave Lebanon. (CNN.com)
  - Defying a recent United Nations resolution, Iran announces that it will continue
    converting 37 tons () of yellowcake uranium into uranium hexafluoride, a requirement
    for producing nuclear power plant fuel, but which some fear might be used to build
    nuclear weapons. (Reuters)
  - 'Conflict in Iraq: Tawhid and Jihad, a militant group led by Abu Musab al-Zarqawi,
    beheads American hostage Jack Hensley. The group threatens to behead the remaining
    hostage, Briton Kenneth Bigley, within 24 hours unless the United States meets
    its demands. Eugene Armstrong was beheaded yesterday. (Reuters)'
  - An earthquake swarm is currently in progress in the Adobe Hills about 18 miles
    () east of California's Mono Lake. Over 600 earthquakes have been recorded since
    September 18, including events of moment magnitude 4.8, 5,4, and 5.5. (California
    Integrated Seismic Network) (U.S. Geological Survey) (CNN/AP)
  - The United States formally lifts its general trade and aviation sanctions against
    Libya today, in response to Libya's decision last year to permit the removal of
    many of its weapons of mass destruction. (Reuters)
  - Green Day's quadruple platinum "Punk Rock Opera" American Idiot is released.
