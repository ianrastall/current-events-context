Date: '2004-09-06'
Source_URI: Portal:Current events/2004 September 6
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: Near the Sunni city of Fallujah, seven U.S. Marines and three
    Iraqi soldiers are killed in an ambush. Elsewhere, U.S. troops, backed by U.S.
    planes and Iraqi forces, raid the city of Najaf. The U.S. military tells residents
    to flee, mounts a pincer movement to trap the Mahdi army in the city center, and
    raids Moqtada al-Sadr''s house again. (News Interactive) (BBC)'
  - The heart bypass surgery being performed on former United States President Bill
    Clinton is successfully completed. Clinton will spend the night in the intensive
    care unit of New York-Presbyterian Hospital before being moved to the general
    care unit tomorrow. Full recovery from the surgery could take a month. (CNN)
