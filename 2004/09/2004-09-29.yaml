Date: '2004-09-29'
Source_URI: Portal:Current events/2004 September 29
Intelligence_Payload:
  Uncategorized:
  - The People's Republic of China accuses Taiwanese Premier Yu Shyi-kun of "clamoring
    for war" after he said Taiwan would defend itself by firing missiles at Shanghai
    in the event of an attack of Taipei or Kaohsiung by the PRC. (BBC) (VOA)
  - Forty-three North Koreans, reportedly seeking asylum, use MFI ladders to scale
    the walls of the Canadian Embassy in Beijing, China. (Globe and Mail)
  - 'U.S. presidential campaign: Former Republican President Dwight Eisenhower''s
    son John Eisenhower endorses Democrat John Kerry''s presidential bid. (The Union
    Leader)'
  - Scaled Composites SpaceShipOne, an experimental spaceplane, makes the first competitive
    flight for the Ansari X Prize. Although a roll problem caused the mission to be
    aborted early, SpaceShipOne nonetheless reached an estimated 109.1 km (358,000 ft),
    which qualifies as a spaceflight. (Space.com) (New Scientist)
  - Conflict in Iraq
  - Kenneth Bigley, a British hostage held in Iraq, appeared alive in a video broadcast
    by Al Jazeera. Seen in a cage wearing an orange jumpsuit, Bigley said "Tony Blair
    is lying. He doesn't care about me". (BBC)
  - Reports that ransom was paid to secure yesterday's release of two Italian aid
    workers raise fears that the burgeoning hostage crises will worsen. Gustavo Selva,
    an Italian lawmaker, states that "The sum () is probably correct". To date about
    130 foreigners have been taken hostage. About 30 of these have been killed. (Reuters)
  - Arab-Israeli conflict
  - Five masked men armed with bats and chains attack Chris Brown and Kim Lamberty,
    members of Christian Peacemaker Teams outside the Israeli settlement of Ma'on
    in Hebron while the volunteers were escorting Palestinian children to school.
    CPT alleges the assaults are part of an ongoing pattern of intimidation by Israeli
    Settlers. (BBC) (Haaretz) (Al Jazeera)
  - 2004 Israeli operation in the northern Gaza Strip
  - Five Palestinians, including Hamas member Tawfik Ali Charafi, are killed during
    Israeli raids in the Jabaliya refugee camp in the Gaza Strip and Nablus in the
    West Bank. The Israeli government claims the troops entered in retaliation for
    at least four rockets being fired at the Israeli town of Sderot on September 28.
    (BBC) (Reuters) (Al Jazeera) (Haaretz)
  - Two Israeli children, aged three and five, are killed after a Qassam rocket attack
    from Palestinian terrorists on the town of Sderot. Hamas claimed the attack was
    launched in retaliation for the Israeli raid of the Jabaliya refugee camp, which
    left four Palestinians dead. (BBC) (Haaretz)
  - Two Palestinian teenagers are killed and power supplies are knocked out after
    an Israeli raid on the Jabaliya refugee camp. The raid was launched in retaliation
    for the rocket attacks on the town of Sderot which left two children dead. (BBC)
  - Two men, Rahim al-Nashiri and Jamal Mohammed al-Bedawi, who were found guilty
    of organizing the October 12, 2000, bombing of the USS Cole, are sentenced to
    death by a court in Yemen. (BBC)
  - The asteroid 4179 Toutatis passes within miles ( kilometers, or about four times
    the distance from Earth to the Moon) of Earth. Toutatis is the largest known asteroid
    to pass this close to Earth. (Space.com)
  - The Montreal Expos play their last game at the Olympic Stadium in Montreal against
    the Florida Marlins in front of over 30,000 fans
