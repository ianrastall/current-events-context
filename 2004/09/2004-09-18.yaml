Date: '2004-09-18'
Source_URI: Portal:Current events/2004 September 18
Intelligence_Payload:
  Uncategorized:
  - In Kirkuk, Iraq, a suicide car bomb attack on the Iraqi National Guard headquarters
    in Kirkuk kills 23, and prominent Shia cleric Sheikh Kadhim al-Hany is ambushed
    and killed. (BBC)
  - 'Darfur Conflict: The United Nations Security Council passes a resolution threatening
    Sudan with sanctions if it does not act to control the Arab militias accused of
    genocide in Darfur. The resolution passes 11–0, with the People''s Republic of
    China, Russia, Pakistan, and Algeria abstaining. (MSNBC)'
  - 'Nader ballot access disputes: The Florida Supreme Court orders that Reform Party
    candidate Ralph Nader be included on the ballot in Florida for the upcoming U.S.
    presidential election. (Reuters) (BBC) (CNN)'
