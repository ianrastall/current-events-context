Date: '2004-09-05'
Source_URI: Portal:Current events/2004 September 5
Intelligence_Payload:
  Uncategorized:
  - Two large earthquakes strike western Japan, the first measuring 6.9 and the second
    7.3 on the Richter scale. Tsunamis 1– (3–7 ft) are expected to hit the Pacific
    coast. (Reuters)
  - Women on Waves, a group that provides abortions in international waters for women
    in countries where the procedure is outlawed, is denied access to Portuguese territorial
    waters. The Portuguese government has placed warships in the vicinity to enforce
    the decision. (Indymedia)
  - Iraqi officials now say that contrary to earlier reports, Izzat Ibrahim ad-Douri,
    the deputy commander of Iraq's armed forces during the rule of Saddam Hussein,
    has not been captured. Medical tests now show that the man who had been identified
    as Izzat Ibrahim is actually one of his relatives. Seventy of Izzat Ibrahim's
    supporters are now dead and 80 have been captured. Izzat Ibrahim ad-Douri is number
    six on the U.S.'s list of the 55 most wanted Iraqis. (CNN) (Reuters)
  - Hurricane Frances, a Category Two Hurricane, moves across Florida. Insurance claims
    for damages are estimated to be between USD 2 and . At least two deaths are attributed
    to Frances in the Bahamas, and one in Gainesville, Florida. (NOAA/NHC) (MSNBC)
