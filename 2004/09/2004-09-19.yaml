Date: '2004-09-19'
Source_URI: Portal:Current events/2004 September 19
Intelligence_Payload:
  Uncategorized:
  - The former General Secretary of the Communist Party of China, Jiang Zemin, resigns
    from his last official post, the Chairman of the Central Military Commission,
    and is replaced by Hu Jintao. (CNN) (IOL) (The Australian)
  - Two Palestinian women, who the Israeli government alleges intended to carry out
    suicide bomb attacks, voluntarily surrender to Israeli authorities. (INN) (Melbourne
    Herald Sun)
  - Iran rejects a unanimous United Nations International Atomic Energy Agency resolution
    calling on Iran to freeze its uranium enrichment activities. Iran threatens to
    prevent UN inspections of its nuclear program. (Reuters)
  - The George E. Trelease Memorial Baseball Park at Western New England College in
    Springfield, Massachusetts, is dedicated. (Western New England College Athletics)
  - The Parliament of Turkey adjourns without passing an important reform of its penal
    code—intended to prepare the country for membership in the European Union—due
    to a dispute over a controversial proposal (opposed by the EU) to criminalize
    adultery. (ABC News) (Bloomberg)
