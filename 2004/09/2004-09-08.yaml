Date: '2004-09-08'
Source_URI: Portal:Current events/2004 September 8
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Russia (Chechnya): Russian President Vladimir Putin''s government
    offers rubles (USD ) for information leading to the arrest of Chechen rebel leaders
    Shamil Basayev and Aslan Maskhadov. Maskhadov was the last democratically elected
    leader of Chechnya. (BBC) (Guardian)'
  - U.N. officials say a ten-year-old Palestinian girl is in critical condition after
    being hit by "indiscriminate" gunfire from Israeli forces while sitting in school.
    Israel alleges that it exchanged fire with militants in the area but says it did
    not fire at buildings. (UN) (AP) (AFP) (The Scotsman)
  - A federal judge in Lincoln, Nebraska, US, strikes down the Partial-Birth Abortion
    Ban Act, citing a lack of an exception to protect the health of the mother. This
    is the third time the controversial law has been declared unconstitutional by
    a federal judge within the last month. It is almost assured that the government
    will appeal the decision to the Supreme Court. (CNN.com)
  - Italians outraged by the latest kidnapping in Iraq—of two Italian aid workers—gather
    to protest outside Prime Minister Silvio Berlusconi's offices in Rome. (New Zealand
    Herald)
  - The NASA unmanned spacecraft Genesis crash-lands as its parachute fails to open.
    The damage to the science instruments and collected samples on board is not yet
    known. (BBC)
  2004 U.S. presidential election:
  - The National Board of the Log Cabin Republicans votes 22–2 against endorsing George
    W. Bush, citing his support for a constitutional amendment to define marriage
    in the U.S. The LCR is the largest group of gay men and lesbians in the Republican
    Party. This is the first time in the group's ten-year history that it has not
    endorsed the Republican candidate for president. (MSNBC)
  - US Democrats and Republicans wrangle over Vice President Dick Cheney's remarks
    about Democratic candidate John Kerry and terrorism. Cheney originally said, "It's
    absolutely essential that eight weeks from today, on Nov. 2, we make the right
    choice, because if we make the wrong choice then the danger is that we'll get
    hit again and we'll be hit in a way that will be devastating from the standpoint
    of the United States." The Kerry campaign interpreted this remark as a claim that,
    if John Kerry was elected, America would be hit by a devastating terrorist attack.
    The next day, Cheney told the Cincinnati Enquirer, "I did not say if Kerry is
    elected, we will be hit by a terrorist attack." Democrats contend that Cheney's
    original statement reveals that Republicans "have consciously adopted a strategy
    of using Americans' justifiable fear of a future terrorist attack as a political
    tool." Democratic VP candidate John Edwards says that Cheney's remark shows that
    he and Bush "will do anything and say anything to save their jobs". (BBC) (The
    Daily Misleader)
  - CBS News announces the discovery of newly uncovered records of United States President
    George W. Bush's service in the Air National Guard. These documents are known
    as the Killian memos. The Democratic campaign concludes (1) that the records show
    then Lieutenant Bush disobeyed orders, and (2) that the Bush campaign lied about
    having made all such records public. (Nashville Tennessean/AP) Within hours, several
    bloggers question the authenticity of the memos, which prove to be modern forgeries
    produced with Microsoft Word rather than historic documents made on a typewriter;
    nevertheless, the documents heightened awareness of facts related tangentially
    to the memo, including that President Bush avoided duty in Vietnam at a time in
    which avoidance of such service was both highly in demand and difficult to obtain.
