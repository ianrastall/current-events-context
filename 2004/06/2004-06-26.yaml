Date: '2004-06-26'
Source_URI: Portal:Current events/2004 June 26
Intelligence_Payload:
  Uncategorized:
  - Pakistan's Prime Minister Zafarullah Khan Jamali resigns. (BBC)
  - U.S. presidential election
  - The United States Green Party, in a rebuff to Ralph Nader, nominates Texas lawyer
    David Cobb as their candidate for President of the United States. This means that
    Nader will need to attain ballot access on his own in over 23 states, instead
    of being able to be placed on the ballots automatically as the Green Party candidate.
    Nader has announced that he may attempt to gain access as the Reform Party candidate.
    (The Progress Report)
  - 'Ralph Nader holds a second convention in Portland to put his name on the presidential
    ballot in Oregon. This attempt is supported by conservative groups who hope his
    name will draw votes in this swing state from Democratic hopeful John Kerry. (Portland
    Oregonian) The outcome of the convention is still unknown: 943 forms were collected,
    but 1000 valid signatures are needed; many forms had more than one signature on
    them, however, the state elections board will require several weeks to validate
    all of the signatures.'
  - The Download.ject attack on Internet Explorer users is neutralised for the moment,
    with the Russian server containing the backdoor program having been shut down.
    Security experts warn that the IE vulnerabilities still exist and a copycat attack
    is still possible. (CNet) (Information Week)
  - Czech Prime Minister Vladimír Špidla resigns after narrowly surviving a vote of
    no confidence. (BBC)
  - Yasser Arafat, President of the Palestinian Authority, commits to refrains from
    attacks on the Olympics scheduled for this August in Athens, Greece. (WAFA)
  - Six Palestinians, including Nayef Abu Sharkh, head of the Nablus old city part
    of the Al Aqsa Brigades, and Jaafar Masri, the leader of Hamas' military wing
    in Nablus, are killed during an Israeli operation, according to Palestinian sources.
    (CNN)
