Date: '2004-06-29'
Source_URI: Portal:Current events/2004 June 29
Intelligence_Payload:
  Uncategorized:
  - Chaudhry Shujaat Hussain, the head of the ruling party in Pakistan, is elected
    as the new interim Prime Minister of the nation after the resignation of Zafarullah
    Khan Jamali. (Guardian)
  - The United States Supreme Court rules 5–4 in Ashcroft v. ACLU that the Child Online
    Protection Act is likely in violation of the First Amendment's guarantee of free
    speech. The case will be reheard at a lower court. (MSNBC)
  - European Union leaders formally nominate Portuguese Prime Minister José Manuel
    Barroso to the post of European Commission president. (BBC)
  - Albertan MLA Gary Masyk blames Premier Ralph Klein for causing the defeat of the
    Conservative Party of Canada in the 2004 federal election, and leaves the Progressive
    Conservative Party for the newly formed Alberta Alliance.
