Date: '2004-06-10'
Source_URI: Portal:Current events/2004 June 10
Intelligence_Payload:
  Uncategorized:
  - Votes are counted on Super Thursday in the UK as elections are held for the European
    Parliament, local council elections and for Mayor of London and the London Assembly.
    The local council elections show major losses for the Labour Party, attributed
    by Labour to protest voting over the 2003 invasion of Iraq. (BBC) (Guardian) (Guardian)
    (Daily Telegraph) (Daily Telegraph) (results from Guardian)
  - Voting begins in the four-day-long European Parliament election; the United Kingdom
    and the Netherlands vote today. The Dutch authorities, in breach of an EU-wide
    reporting embargo, release their results in the early evening. (BBC)
  - Mathematics professor Louis de Branges de Bourcia claims a proof of the Riemann
    hypothesis, a long-standing and fundamental mathematical problem for a solution
    of which the Clay Mathematics Institute has offered a USD $ prize. (CNet) (Purdue
    University press release)
  - The U.S. State Dep't. announces that its Patterns of Global Terrorism report for
    2003 was incomplete and partially incorrect. Instead of a decrease in terrorist
    attacks and casualties since 2002, the revised version will show a "sharp increase"
    over the previous year. (Press briefing), (Guardian)
  - A polling organization announces that there is broad support in the U.S. state
    of California for a November ballot measure to limit the effect of the "three
    strikes" sentencing law. The Field Poll shows the measure, which would impose
    the 25-years-to-life only if the third felony is a serious or violent crime, is
    supported by 76% of those asked, opposed by 14 percent. (Sacramento Bee)
  - Turkey releases four Kurdish prisoners. (Salt Lake Tribune)
  - Pakistani paramilitary troops launch an offensive, hunting for foreign fighters
    in the tribal areas on the border with Afghanistan. (Asian times)
  - The Zimbabwean cricket team is suspended from playing Test matches by the ICC
    till the end of 2004 due to their policy of racial bias in team selection.
  - Apple Computer announces its new top-of-the-line Mac G5 will use water-cooling
    technology. ITworld
  - Martha Stewart asks a federal judge to throw out charges of obstructing justice,
    claiming false evidence. (Bloomberg)
  - Musician Ray Charles dies due to liver failure/hepatitis C at his home in Beverly
    Hills, California, surrounded by family and friends.
