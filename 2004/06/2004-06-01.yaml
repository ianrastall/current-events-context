Date: '2004-06-01'
Source_URI: Portal:Current events/2004 June 1
Intelligence_Payload:
  Uncategorized:
  - RoC Premier Yu Shyi-kun is prevented for six hours from delivering a key government
    report on the floor of the Legislative Yuan when opposition lawmakers, refusing
    to recognize President Chen Shui-bian's narrow re-election on March 20, tore up
    his report and unfurled banners and placards with the words "no truth, no president"
    and "bogus regime". (TheStraitsTimes) (Channelnewsasia)
  - The International Atomic Energy Agency (IAEA) releases a new report in which Iran
    amends its claims. Iran now states that it imported parts for centrifuges capable
    of making bomb-grade uranium that it previously said were made in the country.
    Highly enriched uranium (weapons grade 36% uranium-235) is found at a Farayand,
    a site previously unknown to the IAEA. (Reuters)
  - Ghazi Mashal Ajil al-Yawer, a powerful Sunni Muslim tribal leader and critic of
    the U.S.-led occupation, is named president of Iraq's incoming government, after
    Iraqi leaders reject the Americans' preferred candidate for the post.
  - Shi'ite Muslims in Karachi, enraged by a mosque bombing that killed 20 worshippers,
    battle police and burn U.S. fast food restaurants as the government struggles
    to contain a third day of violence in Pakistan's largest city. (CNN) (BBC)
  - Democrat Stephanie Herseth narrowly defeats Republican Larry Diedrich in a closely
    watched by-election for South Dakota's US House seat. (The Guardian) (CNN) (Reuters)
  - The Zimbabwe government proposes new terms for all Internet service providers
    that will force them to block content or report "malicious messages" to the authorities.
    (BBC)
  - Norway becomes the world's second nation after Ireland to ban smoking in all bars
    and restaurants. (Reuters)
  - Jennifer Hawkins, a twenty-year-old Australian, wins the Miss Universe contest,
    held in Quito, Ecuador. (AP)
  - Dr. Jiang Yanyong disappears days before the 15th anniversary of the Tiananmen
    Square Massacre.
