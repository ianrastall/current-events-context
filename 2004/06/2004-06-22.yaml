Date: '2004-06-22'
Source_URI: Portal:Current events/2004 June 22
Intelligence_Payload:
  Uncategorized:
  - The United States Supreme Court rules that Health Maintenance Organizations cannot
    be sued in state courts under malpractice laws. (Forbes)
  - The Iranian Islamic Republic News Agency reports Iran could soon free eight British
    military sailors seized yesterday on the Iranian side of the Shatt al-Arab waterway
    shared with Iraq if interrogations show they had "no bad intention." (ABC)
  - An Islamic militant group beheads Kim Sun-il, a South Korean contractor, according
    to Al Jazeera television. (Al Jazeera)
  - Imran Khan, Pakistani cricketer and politician, and Jemima Khan, daughter of the
    late Anglo-French billionaire Sir James Goldsmith, announce their divorce. (Arab
    News)
  - The RIAA, in its anti-piracy campaign, sues 482 more John Does that could possibly
    be file sharing users. (newsfactor.com)(Dallas News) (Reuters)
  - Francisco Ortiz Franco, editor of Mexican newsweekly Zeta, is ambushed and killed
    by gunmen in Tijuana. Ortiz Franco and Zeta were particularly well known for their
    work in investigating drug trafficking and reporting government corruption. (BBC)
