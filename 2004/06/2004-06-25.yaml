Date: '2004-06-25'
Source_URI: Portal:Current events/2004 June 25
Intelligence_Payload:
  Uncategorized:
  - After Siemens AG threatens to move thousands of jobs from North Rhine-Westphalia
    to Hungary, IG Metall (a trade union) agrees to a 40-hour work week for the same
    pay they currently receive for working 35. The agreement reduces by €5 the cost
    of each Siemens mobile phone manufactured under the new agreement. IG Metall workers
    had enjoyed the 35-hour work week since 1984. (Deutsche Welle) (IHT)
  - Republican Jack Ryan withdraws from the contest for U.S. Senate seat from Illinois
    under pressure from the party amid allegations that he took his ex-wife, actress
    Jeri Ryan, to some sex clubs. (Reuters)
  - British Attorney General Lord Goldsmith says that he is "unable to accept" that
    the U.S. military tribunals will yield a fair trial for prisoners at Guantanamo
    Bay, Cuba. (Scotsman) (BBC)
  - In an open letter, Ralph Nader warns Canadians against voting for the Conservative
    Party in the federal election on June 28, 2004. (CBC)
  - A treasured guitar owned by Eric Clapton fetches a record USD $959,500 at a charity
    auction. (BBC)
  - The government of Norway, the third-largest petroleum-exporting nation, ends a
    week-long oil workers' strike by imposing wage and pension terms on the contending
    sides. (The Street.com)
