Date: '2004-06-18'
Source_URI: Portal:Current events/2004 June 18
Intelligence_Payload:
  Uncategorized:
  - Russian President Vladimir Putin says that Russia had warned the United States
    several times that Saddam Hussein was planning terrorist attacks against the US.
    (BBC) (Pravda.RU) (Khaleej Times)
  - The television station Al-Arabiya reports that kidnapped hostage Paul Johnson
    has been beheaded by Al-Qaida militants. (CNN)
  - Ichthyologists claim to have discovered a new species of Chimaera fish off the
    coast of Brazil. (CNN)
  European Union Intergovernmental Conference:
  - The latest meeting of the European Council in Brussels ends in the agreement of
    a constitution for the European Union. (BBC)
  - Leaders of the European Union grant candidate country status to Croatia. Talks
    on accession are due to begin early next year. (BBC) (Irish Times Online)
  - No consensus is reached on a candidate for head of the European Commission. (BBC)
