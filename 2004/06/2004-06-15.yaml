Date: '2004-06-15'
Source_URI: Portal:Current events/2004 June 15
Intelligence_Payload:
  Uncategorized:
  - Tim Berners-Lee receives the Millennium Technology Prize in Helsinki. (Technology
    awards)
  - Janis Karpinski, the United States Brigadier General at the center of the Abu
    Ghraib prisoner abuse in Iraq, says that she was "ordered from the top" to treat
    detainees "like dogs", as they are treated in Guantanamo. (BBC) (Guardian) (Voice
    of America)
  - Bombs detonated against oil pipelines in Iraq result in the main Iraqi oil terminal
    being shut down for at least 10 days, an estimated revenue loss of USD to the
    Iraqi government. (NYT) (BBC)
  - A militant Islamic group that has been identified as connected to Al Qaida releases
    a video-tape where they state they will kill an American hostage, Paul Johnson,
    if group members are not released from Saudi Arabian prisons in 72 hours. (BBC)
  - FARC guerrillas massacre 34 coca farmers in Norte de Santander department, Colombia,
    in the worst such attack since President Álvaro Uribe took office. (BBC) (AP)
  - U.S. Rep. Chris Bell files an ethics complaint against House Majority Leader Tom
    DeLay. (CNN)
  - Apple Computer launches its iTunes Music Store digital music service in the United
    Kingdom, France and Germany. The price for a single track will be 79 pence or
    99 euro cents. (Forbes) (The Register)
  - The Detroit Pistons win their first NBA Championship since 1990 by defeating the
    widely favored Los Angeles Lakers 4–1 in a best-of-seven series. The Pistons swept
    all three of their home games, a first in the 20 years of the 2–3–2 game format.
    The final game's score was 100–87. (NBA.com)
