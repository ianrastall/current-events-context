Source_URI: Portal:Current events/2004 June 17
Intelligence_Payload:
  Uncategorized:
  - The Pentagon confirms a report in The New York Times that CIA chief George Tenet –
    who steps down from the post next month – was allowed by U.S. Secretary of Defense
    Donald Rumsfeld to have an Iraqi prisoner secretly detained in alleged violation
    of the Geneva Convention. (BBC) (NYT)
