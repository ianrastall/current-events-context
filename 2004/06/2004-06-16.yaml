Date: '2004-06-16'
Source_URI: Portal:Current events/2004 June 16
Intelligence_Payload:
  Uncategorized:
  - EU leaders meet in Brussels to try to agree on the draft European constitution
    amid the showing of popular discontent with national governments in the recent
    European Parliament election. (BBC) (Guardian)
  - The US's 9/11 Commission states that although meetings between al Qaeda representatives
    and Iraqi government officials had taken place, it has found "no credible evidence"
    of a "collaborative relationship" between Saddam Hussein's Iraq and al Qaeda in
    the 9/11 attacks or in any other strike against U.S. interests. It also finds
    that the original plan involved ten jets and that there was dispute within the
    terrorist network about its implementation until only shortly before September
    11. (Washington Post) (AP) (BBC)
  - Iraqi Shia cleric Moqtada al-Sadr calls upon members of his Mahdi Army to return
    to their homes and end their attacks. (NYT)
  - The trial begins of Mikhail Khodorkovsky, Russian oil tycoon on charges of tax
    evasion and fraud; the proceedings are later adjourned. (VOA) (BBC)
  - 25 people die and 100 hurt in a train derailment on the Konkan Railway in India,
    near the western city of Mumbai. (Times of India)
  - Jiang Yanyong's wife, Hua Zhongwei, is reported to have been freed from detention
    incommunicado in China and returned to the couple's Beijing home. (Reuters)
  - The Diplomats and Military Commanders for Change, a group of 27 retired U.S. diplomats
    and military officers, publishes an open letter that states that U.S. President
    George W. Bush has so harmed international relations that only a new leader can
    repair them. (BBC) (Newsweek) (CNN)
  - A computer virus capable of infecting cellphones running the Symbian OS with Bluetooth
    capabilities, "Cabir", has been developed by software experts. (Forbes) (BBC)
    (Reuters)
  - The Bloomsday centennial is commemorated in Dublin and around the world. (IHT)
    (Reuters UK)
  - The Hong Kong securities-industry watchdog obtained a court order freezing all
    assets belonging to hedge fund manager Charles Schmitt, or his fund of funds,
    CSA Absolute Return. Mr. Schmitt himself is in the custody of Hong Kong authorities
    on suspicions that he's misappropriated investor funds. (TheStreet.com)
