Date: '2004-06-05'
Source_URI: Portal:Current events/2004 June 5
Intelligence_Payload:
  Uncategorized:
  - Former U.S. President Ronald Reagan dies at the age of 93 from complications of
    Alzheimer's disease. (SF Chronicle) (BBC) (Reuters) (Washington Post)
  - An outbreak of pseudomembranous colitis, a Clostridium difficile infection, is
    believed to have killed as many as 89 people in hospitals in Montreal, Quebec
    and Calgary, Alberta. (CBC)
  - Noël Mamère, mayor of Bègles (near Bordeaux), France, celebrates the first same-sex
    marriage in France, between Bertrand Charpentier and Stéphane Chapin. Interior
    minister Dominique de Villepin states that the wedding is illegal and announces
    that the mayor will face censure. Mamère claims he is interpreting French law,
    inspired by similar actions in San Francisco and other US cities. (swissinfo)
  - North Light wins the 225th Epsom Derby, the second race in the British Triple
    Crown of Thoroughbred Racing. (BBC)
  - 'Belmont Stakes: Birdstone defeats Smarty Jones to prevent Smarty Jones from winning
    the United States Triple Crown of Thoroughbred Racing. (ESPN)'
