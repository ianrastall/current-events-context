Date: '2004-06-27'
Source_URI: Portal:Current events/2004 June 27
Intelligence_Payload:
  Uncategorized:
  - Fahrenheit 9/11 breaks the record for highest opening-weekend earnings in the
    United States for a documentary, earning US$23.9 million. (Box Office Mojo).
  - In the 2004 Serbian presidential election, Boris Tadic defeats Tomislav Nikolic
    in the run-off, with 53.7% to 45.0% of the votes. (ABC).
  - In the 2004 Lithuanian presidential election, Valdas Adamkus wins in the run-off
    against Kazimiera Prunskiene, with 52.1% to 47.8% of votes (BBC).
  - The Taliban kill 16 Afghans after stopping a bus and forcing the sixteen to alight,
    possibly to get the victims' voter registration cards for elections scheduled
    in September of this year. (PakTribune) (NYT)
  - Palestinians detonate 150 kg (330 lb) of explosives placed in a 300-meter (1000 ft)
    long tunnel against an Israeli army position in the Gaza Strip. 2000 Palestinians
    rush into the streets of Gaza City to celebrate. (Guardian)
  - Gay pride celebrations, parades and protests are held globally, marking the 35th
    anniversary of the Stonewall Riots, the traditional birth of the modern LGBT civil
    rights movement. (Salt Lake Tribune)
  - Patrick Dempsey races a Panoz GTS at the second race at the Mid-Ohio Sports Car
    Course.
  - Colombian Soccer Team Independiente Medellín beats their rival and city's other
    major club Atlético Nacional in the finals of the 2004 Copa Mustang I.
  - Muse holds a headlining concert in Glastonbury.
  Iraq Occupation and resistance:
  - Iraqi insurgents kidnap three Turkish citizens and threaten to decapitate them.
    (NYT) (BBC)
