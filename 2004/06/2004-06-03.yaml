Date: '2004-06-03'
Source_URI: Portal:Current events/2004 June 3
Intelligence_Payload:
  Uncategorized:
  - The Bilderberg Group meets near Milan, Italy. (BBC)
  - All outgoing flights from the UK are temporarily grounded following an air traffic
    control computer failure. (BBC)
  - Central Intelligence Agency director George Tenet tenders his resignation, citing
    "personal reasons". He will serve as CIA Director until mid-July. John McLaughlin,
    the deputy director for the CIA will become the acting Director until a permanent
    Director is chosen and confirmed by Congress. (AP) (BBC) (Reuters)
  - 'Iraqi prisoner abuse scandal: Two U.S. Marines, Pfc. Andrew J. Sting and Pfc.
    Jeremiah J. Trefney, have been jailed for between eight to twelve months after
    pleading guilty to prisoner abuse at Al Mahmudiya prison in Iraq which occurred
    after the events at Abu Ghraib prison. (CNN) (BBC)'
  - The Organization of the Petroleum Exporting Countries will raise output by barrels
    a day from July 1 and by another from August 1. (IHT) (BBC)
