Date: '2004-06-19'
Source_URI: Portal:Current events/2004 June 19
Intelligence_Payload:
  Uncategorized:
  - Witnesses and hospital officials say that 22 Iraqis, among them children, women,
    and youths, are killed in a U.S. air strike in a residential neighborhood in Fallujah.
    U.S. officials say that they targeted an Abu Musab al-Zarqawi safe house. (Reuters)
    (CBC) Iraqi locals dispute the American account. (BBC)
  - OpenBeOS becomes Haiku (operating system), announced at the first WalterCon in
    Columbus, Ohio.
  - An asteroid discovered by NASA named 2004 MN4 that may hit earth in 2029.
