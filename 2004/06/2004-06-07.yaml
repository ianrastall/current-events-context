Date: '2004-06-07'
Source_URI: Portal:Current events/2004 June 7
Intelligence_Payload:
  Uncategorized:
  - The United Nations Relief and Works Agency for Palestine Refugees in the Near
    East (UNRWA) opens its two-day conference on Humanitarian Needs of Palestinian
    Refugess opens in Geneva, Switzerland. Participation in the conference is by invitation
    only. Israel is excluded from the conference. (UNRWA) (IMRA)
  - Gunmen attack a BBC news team in Riyadh, Saudi Arabia, killing cameraman Simon
    Cumbers and seriously injuring correspondent Frank Gardner. (BBC)
  - 'U.S.-led occupation of Iraq: The UN Security Council reaches a compromise agreement
    on the draft resolution on Iraq. (BBC)'
  - 'North American Free Trade Agreement: Department of Transportation v. Public Citizen,
    the United States Supreme Court opens US roads to trucks from Mexico, enforcing
    a key component of the NAFTA agreement over the protests of some environmentalists
    and Teamsters. (Washington Post)'
  - A civil trial begins in San Francisco, California, in the U.S. Justice Department's
    effort to prevent the purchase of PeopleSoft by Oracle Corporation. Antitrust
    authorities contend that the proposed acquisition of PeopleSoft, for USD , would
    effectively monopolize the market for enterprise software. (NYT)
  - The Tampa Bay Lightning defeat the Calgary Flames in Game 7 of the Stanley Cup
    Finals 2–1, their first Stanley Cup victory. (ESPN) (SI.com) (TSN)
