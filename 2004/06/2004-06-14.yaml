Date: '2004-06-14'
Source_URI: Portal:Current events/2004 June 14
Intelligence_Payload:
  Uncategorized:
  - Cartoon Network relaunches itself with a new logo and slogan "This is Cartoon
    Network."
  - Mohamed ElBaradei, Director General of the International Atomic Energy Agency
    accuses Iran of "less than satisfactory" cooperation during the IAEA's investigation
    of its nuclear program. ElBaradei demands "accelerated and proactive cooperation"
    from Iran, while Iran rejects further restrictions on nuclear programs. (NYT)
    (BBC)
  - The Supreme Court of the United States overturns a Ninth Circuit Court of Appeals
    ruling (Newdow v. United States Congress) that would have removed the phrase under
    God from the Pledge of Allegiance by an 8–0 ruling that the father cannot file
    a complaint on behalf of his noncustodial daughter. (AP)
  European Parliament election:
  - Near-complete preliminary results show general defeat of governing parties and
    slight perceived rise of eurosceptic parties, but the balance of power in the
    Parliament remains similar despite the 10 new member states. (BBC)
  - Sinn Féin wins its first European Election seat in the Republic of Ireland surprising
    governing parties Fianna Fáil and the Progressive Democrats, and another in Northern
    Ireland. (E.U. Business) (BBC)
