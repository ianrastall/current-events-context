Date: '2004-06-11'
Source_URI: Portal:Current events/2004 June 11
Intelligence_Payload:
  Uncategorized:
  - On the third anniversary of the execution of Timothy McVeigh for his role in the
    Oklahoma City bombing, the penalty phase of his co-accomplice, Terry Nichols,
    ends in a deadlocked jury over the issue of handing out a death penalty verdict.
    By law, the judge in the case must sentence Nichols to life in prison (a term
    he is already serving). (CNN)
  - Ken Livingstone is re-elected Mayor of London for a second four-year term after
    polling 828,380 first and second preference votes, defeating his nearest rival
    Conservative Steve Norris by 161,202 votes. (Guardian)
  - Eleven Chinese road construction workers and an Afghan guard are murdered in their
    sleep south of the Afghan city of Kunduz. Four more Chinese are hospitalized for
    wounds suffered in the same attack. The dead are among more than 100 engineers
    and workers engaged on a World Bank project to build a road from Kabul to the
    Tajikistan border. Mullah Dadullah, one of the top Taliban commanders, recently
    issued orders to his fighters to strike at road builders. (NYT)
  - The Cassini–Huygens probe approaches within of Phoebe, the outermost moon of the
    planet Saturn. (Wired News) (BBC)
  - Ronald Reagan's funeral held at Washington National Cathedral and burial service
    at the Ronald Reagan Presidential Library later in the day. (White House) (Washington
    National Cathedral)
