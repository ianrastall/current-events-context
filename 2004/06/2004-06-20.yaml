Date: '2004-06-20'
Source_URI: Portal:Current events/2004 June 20
Intelligence_Payload:
  Uncategorized:
  - India and Pakistan agreed in Qingdao, China, to extend a nuclear testing ban and
    to set up a hotline between their foreign secretaries aimed at preventing misunderstandings
    that might lead to a nuclear war. (CNN)
  - The Philippine Congress announces that Gloria Arroyo has been reelected to a second
    term as President of the Philippines in the 2004 general election. (Reuters)
  - Researchers find SARS in human tears, shedding light on one of the ways the virus
    propagates, as well as an early-warning test. (CTV) (ABC Online Australia)
