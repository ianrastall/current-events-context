Date: '2004-06-13'
Source_URI: Portal:Current events/2004 June 13
Intelligence_Payload:
  Uncategorized:
  - Results of Serbian presidential elections show expected lead of Tomislav Nikolic
    with 30.1% of votes, followed with Boris Tadic with 27.3%; but it comes as a surprise
    that Bogoljub Karic has 19.3% of votes, more than government's candidate Dragan
    Maršicanin with 13.3%. Second round will be held on Sunday 27 June. (cesid.org)
  - Taiwanese pop singer A-Mei cancels a concert in the mainland Chinese city of Hangzhou
    after protesters accused her of supporting Taiwan independence. (BBC)
  - 'Australian federal election, 2004: The Australian Labor Party slightly backs
    away from its promise to withdraw the country''s troops from Iraq by Christmas
    if it wins. (VOA)'
  - 'Football (soccer): In Euro 2004, Zinedine Zidane scores two second-half goals
    in added time to lead France to a 2–1 win over England. Fabien Barthez saved a
    David Beckham penalty earlier in the second half to help make France''s win possible.
    (BBC)'
  - 'Internet censorship in mainland China: Access to Wikimedia has been blocked by
    the People''s Republic of China. (ITworld) (China Tech News) (Slashdot)'
