Date: '2004-06-30'
Source_URI: Portal:Current events/2004 June 30
Intelligence_Payload:
  Uncategorized:
  - In an unprecedented move, the Archbishops of Canterbury and York write to Tony
    Blair on behalf of all 114 Anglican bishops, expressing deep concern about UK
    government policy and criticising coalition troops' conduct in Iraq. They cite
    the abuse of Iraqi detainees, which they say has been "deeply damaging" – and
    state that the government's apparent double standards "diminish the credibility
    of western governments". (BBC) (The Scotsman)
  - The United States Federal Reserve raises the federal funds interest rate for the
    first time in four years, by a quarter point. (ABC News)
  - Gloria Macapagal-Arroyo is sworn into a new six-year term as president of the
    Philippines following a disputed victory in the May 2004 presidential election.
    (VOA)
  - 'Iraq Occupation and resistance: The United States formally hands over legal custody
    of Saddam Hussein to the new Iraqi government. The trial of Saddam Hussein is
    expected to take place in January. (BBC)'
  - The Spanish minister of justice, Juan Fernando López Aguilar, announces a number
    of social bills to be introduced, including one that will legalize same-sex marriage
    in Spain, one that will introduce rights for common-law couples, and one that
    will allow transgendered people to legally change their name and sex designation
    without the requirement of surgery. (abc.es)
  - The Israeli Supreme Court issues a landmark ruling that a 30-kilometer planned
    stretch of the separation barrier in eastern Jerusalem violates the legal rights
    of the local Palestinian population to an extent not justified by security concerns,
    and therefore must be changed. (Haaretz)
