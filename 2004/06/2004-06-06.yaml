Date: '2004-06-06'
Source_URI: Portal:Current events/2004 June 6
Intelligence_Payload:
  Uncategorized:
  - Heads of state and war veterans mark the sixtieth anniversary of the D-Day invasion
    of Nazi-controlled Europe in World War II. An estimated 250,000 people died in
    the Battle of Normandy. (BBC)
  - Palestinian Fatah leader Marwan Barghouti is sentenced to five life terms plus
    forty years by an Israeli court for his role in Palestinian terrorism. (CNN)
  - 'U.S.-led occupation of Iraq: Brigadier General Mark Hertling, a top US commander
    in charge of Najaf, Iraq, states "The Moqtada militia is militarily defeated.
    We have killed scores of them over the last few weeks, and that is in Najaf alone. ...
    The militia have been defeated, or have left." US Coalition patrols and checkpoints
    are still active around Najaf and its twin city of Kufa, Iraq. (News.com.au)'
  - 'French Open: Gastón Gaudio wins the men''s singles title, defeating compatriot
    Guillermo Coria 0–6, 3–6, 6–4, 6–1, 8–6. (AP)'
