Date: '2004-06-24'
Source_URI: Portal:Current events/2004 June 24
Intelligence_Payload:
  Uncategorized:
  - Princess Caroline of Monaco obtained a judgment from the European Court of Human
    Rights condemning Germany for non-respect of her right to a private life. The
    seven judges who examined her request ruled that German jurisdictions have misunderstood
    this right by refusing to forbid publication of photographs depicting Caroline
    in scenes of her daily life.
  - Murder of Ronald Gajraj, who had made Guyanese death squad allegations.
  - Computer criminals place malicious JavaScript on major bank and corporate websites,
    such that Internet Explorer for Windows users merely viewing the pages in question
    are infected with Download.ject. Microsoft has yet to issue a patch for the browser.(ZDNet)
    (CNN) (Miami Herald) (SANS Internet Storm Center) (CERT) (Microsoft)
  - Iraqi insurgents explode multiple car bombs and seize police stations in a six-city
    offensive, killing over 100 and wounding at least 320, nearly all Iraqis. U.S
    officials accuse Abu Musab al-Zarqawi's network of involvement. (AP)
  - Bombs explode in Ankara and Istanbul, Turkey, killing three and wounding at least
    18. (Reuters)
  - '"The gun that killed nine million people", the Browning with serial no. 19047
    which Gavrilo Princip used to assassinate Archduke Franz Ferdinand of Austria,
    is found in a Jesuit house in Austria and will be put on display in the Vienna
    museum of military history. (Scotsman)'
