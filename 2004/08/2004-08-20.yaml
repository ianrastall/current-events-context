Date: '2004-08-20'
Source_URI: Portal:Current events/2004 August 20
Intelligence_Payload:
  Uncategorized:
  - US Airways, struggling to avoid a second bankruptcy, asks pilots to accept a 16.5%
    pay cut. (CNN)
  - Three individuals in the United States are arrested and charged with supporting
    the Palestinian militant group Hamas over a 15-year period. (Washington Times)
  - Homeland Security official Asa Hutchinson apologizes for a database mix-up that
    causes U.S. Senator Ted Kennedy to be held up at airline gates three times, on
    suspicion that he is a terrorist. (Information Week)
  - Maoist rebels shoot a police officer and detonate two bombs in Kathmandu, the
    capital of Nepal. (Toronto Star)
  - Refugee camps in Darfur are hit by hepatitis E, a deadly virus. (AllAfrica.com)
