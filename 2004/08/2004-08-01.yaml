Date: '2004-08-01'
Source_URI: Portal:Current events/2004 August 1
Intelligence_Payload:
  Uncategorized:
  - Lawyers reveal that African American workers are to sue Eastman Kodak Co., charging
    that the firm paid them less and promoted them less often than white colleagues.
    (Reuters)
  - The U.S. raises the security alert level to high for the World Bank and the International
    Monetary Fund in Washington, D.C., the New York Stock Exchange and companies in
    the New York City area on Sunday after intelligence signals a possible al Qaeda
    attack. (Reuters)
  - Kuwait bans Michael Moore's Fahrenheit 9/11 because it deems the movie insulting
    to the Saudi Arabian royal family and critical of America's invasion of Iraq.
    (AP)
  - Four car bombs explode just minutes apart outside neighboring four churches in
    central Baghdad and one car bomb explodes at a church in Mosul during Sunday evening
    services, killing 5 and injuring at least 46 people, witnesses say. The attacks
    appeared to be the first targeting churches during the 15-months of violent insurgency.
    (AP) CNN
  - Chinese authorities say they have shut down nearly 700 websites and arrested 224
    people in a new campaign against internet pornography. (BBC)
  - The French Ambassador to Chad, Jean Pierre Bercot, says that France will deploy
    200 soldiers to help secure Chad's eastern border with Sudan's conflict-torn Darfur
    region. The troops will also bring humanitarian aid to tens of thousands of Darfur
    refugees in Chad. (BBC)
  - World Trade Organization members agree on a revised draft deal that aims to revive
    stalled talks on freeing up trade between rich and poor nations. Key WTO members
    accept proposals to cut the subsidies wealthy countries give their farmers for
    exports. International non-governmental organizations (NGOs) denounced the results
    as a sell-out of poor countries and the environment. (BBC) (OneWorld.net)
  - Over 311 people are killed and 276 injured in a fire which swept a market in Asunción,
    Paraguay. (AP) (CNN)
