Date: '2004-08-04'
Source_URI: Portal:Current events/2004 August 4
Intelligence_Payload:
  Uncategorized:
  - The National Institutes of Health decides not to override drug patents to allow
    generic production of anti-AIDS drug Norvir in the United States, despite claims
    of price gouging by patients' groups and some members of Congress. (ABC)
  - U.S. aviation regulators threaten to cap commercial flights at Chicago's O'Hare
    airport to reduce delays that are affecting the nation's aviation system. (Reuters)
  - Saddam Hussein wants to be transferred to a Swedish jail to await his trial. (Khaleej
    Times)
  - The death toll from monsoon flooding in India exceeds 1,000. (MSNBC)
  - NASA dedicates its new supercomputer 'KC' to the memory of India-born astronaut
    Kalpana Chawla, one of the seven crew members who died when the space Shuttle
    Columbia disintegrated in mid-air in 2003. (NDTV)
  - A bomb explodes near an electrical substation outside Athens, nine days prior
    to the beginning of the Olympic Games. (Melbourne Herald Sun)
  - The FBI warns that Mumbai, Delhi, or Bangalore could be the target of terrorist
    attacks. (Times Of India)
  - A ceremony is held at London's Cenotaph to commemorate the 90th anniversary of
    the United Kingdom's entry into the First World War. Four of the 23 surviving
    British veterans of the war, aged between 103 and 108, are well enough to attend.
    (BBC)
  - Mary Kay Letourneau is released from a Washington prison after serving a sentence
    of over seven years for statutory rape. The former elementary school teacher became
    notorious for her sexual involvement with one of her male students, who was 12
    years old when the illicit relationship began. She bore two children by the boy,
    who is now 21 years old. (FOX News)
