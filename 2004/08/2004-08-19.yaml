Date: '2004-08-19'
Source_URI: Portal:Current events/2004 August 19
Intelligence_Payload:
  Uncategorized:
  - An ongoing battle, apparently between a combination of U.S. and Iraqi forces,
    and the al-Mahdi Army of Muqtada al-Sadr, damages two of minarets of the Imam
    Ali Mosque in Najaf, Iraq, which al-Sadr's forces occupied. (CNN)
  - Artillery and mortar fire again rock Georgia's breakaway republic of South Ossetia,
    scuppering efforts to enforce a ceasefire. (BBC)
  - At the Non-Aligned Movement summit in Durban, South African President Thabo Mbeki
    calls for reform of the UN and other international institutions, saying that developing
    countries should not allow powerful nations to dictate the world on their own
    terms. (BBC)
  - A jury including U.S. talk show host Oprah Winfrey convicts Dion Coleman of murder
    after two hours of deliberation. (BBC)
  - Israel's prime minister, Ariel Sharon, vows to press on with his disengagement
    plan, despite it receiving another rejection from his Likud party. (BBC)
  - Nature magazine reveals that five new satellites and a further candidate moon
    have been discovered orbiting Neptune, bringing its tally to 13. (BBC)
  - Shares of stock in Google, Inc. begin trading on the NASDAQ stock exchange at
    around $100 per share in one of the most highly anticipated initial public offerings
    of the year. It is estimated that the IPO raised a total of , the third highest
    ever for an IPO. (Reuters) (CBS MarketWatch)
  - Hungarian prime minister Péter Medgyessy resigns following a row with his Socialist
    party's liberal coalition partner, the Free Democrats. (BBC)
