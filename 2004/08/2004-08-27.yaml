Date: '2004-08-27'
Source_URI: Portal:Current events/2004 August 27
Intelligence_Payload:
  Uncategorized:
  - Between 5,000 and 6,000 participants take part in the Critical Mass bicyclist
    ride as part of the 2004 Republican National Convention protest activity. The
    monthly NYC Critical Mass ride usually attracts about 1500 riders. Police eventually
    arrested 264 people for deliberately blockading roads during the event. This is
    the first time the NYPD made any significant arrests of Critical Mass participants.
    (NYC-IMC)
  - Interbrew completes its merger with Ambev. Both were among the top five largest
    breweries in the world, and together they will become the largest, when measured
    by volume. The merged company will be called InBev (Bloomberg)
  - The FBI has launched a full espionage investigation into Larry Franklin after
    obtaining evidence pointing to a high-ranking spy in the Pentagon. According to
    CBS News, the spy has been giving classified secrets to Israel which could compromise
    U.S. national security. Israel denies the charges.
  - Following the intervention of Grand Ayatollah Ali al-Sistani, an agreement is
    found to end the standoff in Najaf. Although the terms are not clear, the deal
    requires both the al-Sadr militia and U.S. troops to leave the city, to be replaced
    by the police interim government. Responsibility for the Imam Ali Mosque goes
    to Sistani. (BBC) This resolution occurs two days before the one-year anniversary
    of the assassination of Sayed Mohammed Baqir al-Hakim, a prominent Shi'ite cleric
    from Najaf.
  - The Russian Federal Security Service announces that traces of the explosive hexogen
    have been found in the wreckage of the two Russia airliners which crashed on August
    24, 2004. The Islamic group "the Islambouli Brigades" claims responsibility. (AP)
  - Enzo Baldoni, an Italian journalist kidnapped by Islamic militants in Iraq, is
    killed by his kidnappers. (Reuters)
  - The Interior Minister of France announces that the number of anti-Semitic attacks
    in France this year is more than double that of the same period last year. (Reuters)
