Date: '2004-08-26'
Source_URI: Portal:Current events/2004 August 26
Intelligence_Payload:
  Uncategorized:
  - Chile's Supreme Court strips former military ruler Augusto Pinochet of his immunity
    from prosecution, allowing him to be prosecuted for alleged crimes including involvement
    in murder and torture. (BBC)
  - Najaf standoff
  - Twenty-five people are killed and 100 wounded during a mortar attack on the main
    mosque in the Iraqi city of Kufa. 20 Shiite marchers in Kufa are killed and 70
    wounded by gunfire. The identity of the attackers is unknown, reportedly though
    a source of gunfire was near an Iraqi National Guard base. (BBC) (Reuters) (CNN)
    (Albawaba)
  - Grand Ayatollah Ali al-Sistani begins negotiations with Shiite cleric Moqtada
    al-Sadr in a bid to end the fighting in Najaf for three weeks. Sistani tells thousands
    of Iraqis heading to the holy city to wait on the outskirts of Najaf. (khaleejtimes)
    Ayatollah Sistani calls a pause in fighting, telling protesters to stay home,
    and urging all forces to withdraw. US and Iraqi troops suspend attacks for 24
    hours. (CSMonitor) (Reuters)
  - Abu Hamza al-Masri, a well known Muslim cleric currently residing in the United
    Kingdom, is arrested under the Terrorism Act 2000 which covers the "commission,
    preparation or instigation of acts of terrorism". (Reuters)
