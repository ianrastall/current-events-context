Date: '2004-08-28'
Source_URI: Portal:Current events/2004 August 28
Intelligence_Payload:
  Uncategorized:
  - In a video circulating on the Internet, former Texas lieutenant governor Ben Barnes
    apologizes for his role in getting current United States President George W. Bush
    into the Texas Air National Guard in 1968. (Chicago Sun-Times)
  - 'Free and Open Source Software advocacy: TheOpenCD, the Free Software Foundation
    and the Open Source Initiative celebrate the first annual Software Freedom Day.'
  - A precious icon is returned to the Kremlin's Cathedral of the Assumption by a
    Roman Catholic Cardinal as a goodwill gesture from the Pope to the Russian Orthodox
    Church. The image is an 18th-century copy of the Our Lady of Kazan, one of Russia's
    most sacred images. (BBC)
