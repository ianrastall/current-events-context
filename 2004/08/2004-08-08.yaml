Date: '2004-08-08'
Source_URI: Portal:Current events/2004 August 8
Intelligence_Payload:
  Uncategorized:
  - U.S. intelligence officials and non-government experts conclude that diplomatic
    efforts to prevent the proliferation of nuclear weapons to Iran and North Korea
    have failed to slow their weapons development programs.
  - Sudan seeks support from states attending the Arab League summit in Cairo, Egypt
    to forestall possible United Nations sanctions against their country regarding
    its support for the Arab Janjaweed accused of ethnic cleansing in Darfur. Arab
    League Secretary General Amr Moussa states that the Arab League states are inclined
    to help Sudan avoid sanctions. (Reuters)
  - Militants in Iraq kidnap the Iranian Consul assigned to Karbala, stating that
    the consul has been acting in ways incompatible with his diplomatic status. (Reuters)
  - Palestinian Authority Justice Nahed Arreyes resigns, stating that he has been
    stripped of much of his authority over the legal system. (AP)
  - An Iraqi judge issues an arrest warrant for Ahmed Chalabi on the charge of counterfeiting.
    Chalabi denies the charge. (Voice of America)
  - A tour bus belonging to the Dave Matthews Band dumped an estimated 800 pounds
    of human waste from the bus's septic tank onto a passenger sightseeing boat on
    the Chicago River below.
