Date: '2004-08-18'
Source_URI: Portal:Current events/2004 August 18
Intelligence_Payload:
  Uncategorized:
  - In a statement issued from his Baghdad office, Shiite Muslim cleric Muqtada al-Sadr
    agrees to order his militia to leave the Imam Ali Mosque in Najaf, Iraq, after
    threats by Prime Minister Iyad Allawi's government to "liberate" it. Al-Sadr further
    agrees to disband his Jaish-i-Mahdi militia, and enter the "mainstream political
    process". It remains unclear when the withdrawal will actually take place. (CNN)
    (Reuters)
  - The government of Colombia announces that it offered, in July, to trade 50 imprisoned
    guerrillas in return for hostages being held by the Revolutionary Armed Forces
    of Colombia. (BBC)
  - In Dublin, Ireland the Dublin Port Tunnel excavation works were completed and
    the final tunnel boring machine breakthrough ceremony took place.
