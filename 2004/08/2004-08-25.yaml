Date: '2004-08-25'
Source_URI: Portal:Current events/2004 August 25
Intelligence_Payload:
  Uncategorized:
  - Astronomers announce the discovery of a third extrasolar planet orbiting Mu Arae.
    The planet may be the first rocky world detected orbiting a star other than the
    Sun.
  - The Bank of Canada rolls out a new $20 bill, the latest piece of paper money to
    be given new anti-counterfeiting technology and a facelift. (CBC)
  - Sir Mark Thatcher, son of former British Prime Minister Margaret Thatcher, is
    arrested at his home in Cape Town, South Africa, on charges related to his alleged
    involvement in an attempted coup in Equatorial Guinea. He is later released on
    bail, and is to return to court on November 25. (BBC) Meanwhile, his "distressed"
    mother returns from holiday in the US. (Guardian/Reuters) (AP)
  - Welsh nationalist MP Adam Price announces his intention to impeach Prime Minister
    Tony Blair, with the support of other Welsh and Scottish nationalist MPs. (BBC)
    (icWales)
  - Police in Toronto shoot and kill a man holding a woman hostage outside Union Station.
    (CBC) Timeline (Toronto Star)
  - Machine guns and explosives are found in a van in Montreal. Police look for links
    to organized crime. (Toronto Star)
  - Soft drinks company Rubicon announces the release of the Sensory Straw, which
    has four small holes rather than one large one, an innovation said to improve
    the drinking experience. (Marketing Magazine)
