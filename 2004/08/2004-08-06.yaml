Date: '2004-08-06'
Source_URI: Portal:Current events/2004 August 6
Intelligence_Payload:
  Uncategorized:
  - Pacific Islands Forum leaders call for assistance for Nauru to prevent the emergence
    of another "failed state". (The Age)
  - 'U.S. Senate election, 2004: Alan Keyes, a resident of Maryland, indicates he
    will seek the Republican nomination for the Illinois seat, to run against Barack
    Obama. (CNN)'
  - Mohammed M. Hossain and Yassin M. Aref, leaders of the Masjid as-Salam mosque
    in Albany, New York, are arrested for their part in an alleged plot (actually
    an FBI sting operation) to use an RPG-7 to assassinate a Pakistani diplomat in
    New York City.
  - A Kuwaiti transport company says it is willing to pay millions of dollars ransom
    to secure hostages' release. (Times of India)
  - In Derry, Northern Ireland, police are attacked by people carrying petrol bombs.
    (Reuters)
  - Saudi police arrest terror suspect Faris al-Zahrani. (ABC)
  - Israel reopens the Gaza–Egypt border crossing after a three-weeks shutdown, allowing
    1,500 Palestinians on the Egyptian side to return home. (AP)
  - Two Afghan men deny being enemy fighters, in appearances before U.S. military
    tribunals reviewing the status of Guantanamo Bay detainees. For the first time,
    the US allows journalists to attend the hearings. (BBC)
  - Radical Iraqi Shia cleric Moqtada Sadr calls for a truce to be restored after
    a day of heavy fighting between his militia and U.S. troops in Najaf. (BBC)
  - The U.S. claims that over 300 of Sadr's fighters have been killed in two days
    of clashes. (Reuters)
  - Chess master Bobby Fischer, apparently seeking to avoid deportation to, and trial
    in the U.S., says he is renouncing his U.S. citizenship. (AFP)
