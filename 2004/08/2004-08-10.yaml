Date: '2004-08-10'
Source_URI: Portal:Current events/2004 August 10
Intelligence_Payload:
  Uncategorized:
  - The South Korean government announces that the country's capital is to be moved
    from Seoul to a new site at Gongju in South Chungcheong province. (BBC)
  - Bombs explode at two small hotels and a gas plant in the Turkish city of Istanbul,
    killing two people and injuring at least nine. (BBC)
  - The U.S. deals a major blow to German prosecutors at the re-trial of Moroccan
    Mounir al-Motassadek, one of the only 9/11 suspects to face justice to date, by
    refusing to allow an alleged al-Qaeda member to testify via videolink, citing
    security concerns and the need to protect secret information. (BBC)
  - Libya agrees to pay USD to some victims of the 1986 Berlin discotheque bombing.
    (BBC)
  - U.S. President George W. Bush announces his intention to have Porter J. Goss confirmed
    as the new director of the CIA. (WashPost)
  - A trove of 250 pages of previously unknown poetry by British poet Philip Larkin
    is found in Hull University library. (BBC) (Scotsman)
