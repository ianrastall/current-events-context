Date: '2004-08-22'
Source_URI: Portal:Current events/2004 August 22
Intelligence_Payload:
  Uncategorized:
  - US journalist Micah Garen, who was kidnapped in Iraq more than a week ago, is
    released in the southern city of Nasiriyah. (Comcast)
  - Singapore's new Prime Minister Lee Hsien Loong, hoping to quell Beijing's fury
    over his July 10–12 visit to Taiwan, says that he will not support the island
    if the People's Republic of China attacks it in retaliation for any push for Taiwan
    independence. (Yahoo! India)
  - A Venezuelan military airplane crashes as it approaches its base in the central
    industrial state of Aragua, killing all 25 on board. (Bloomberg)
  - Arsonists raze a Jewish community centre in Paris, leaving behind menacing graffiti
    including swastikas and the words "Jews get out." (CTV)
  - A Bangladeshi mob torches a passenger train, a day after a grenade attack on a
    political rally killed 19 people and injured hundreds. (CBC News)
  - Armed robbers steal the Edvard Munch paintings The Scream and Madonna from the
    Munch Museum in Oslo. (BBC) (Aftenposten)
