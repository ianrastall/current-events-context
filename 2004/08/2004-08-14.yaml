Date: '2004-08-14'
Source_URI: Portal:Current events/2004 August 14
Intelligence_Payload:
  Uncategorized:
  - Gunmen kill at least 156 people – mainly women and children – in an overnight
    raid on the Gatumba camp for Congolese Tutsi refugees in Burundi, the UN says.
    (BBC)
  - An ailing Pope John Paul II visits the grotto of Lourdes on a two-day pilgrimage
    to one of the Roman Catholic world's most revered shrines. (BBC)
  - US planes bomb the city of Samarra, north-west of Baghdad. In Najaf, a fragile
    ceasefire holds, with Muqtada al-Sadr making defiant statements but continuing
    negotiations. The Allawi government decides to withdraw from the negotiations
    in the afternoon. (BBC) (BBC) (BBC)
  - India hangs convicted rapist and murderer Dhananjoy Chatterjee at dawn in Alipore
    jail, Kolkata – the country's first execution in nine years. (BBC)
