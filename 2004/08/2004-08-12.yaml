Date: '2004-08-12'
Source_URI: Portal:Current events/2004 August 12
Intelligence_Payload:
  Uncategorized:
  - Lee Hsien Loong is sworn in as the third Prime Minister of Singapore. (Taipei
    Times) (VOA)
  - New Jersey Governor Jim McGreevey resigns his post effective November 15, saying
    that his extramarital homosexual affair would leave the governor's office "vulnerable
    to rumors, false allegations and threats of disclosure.". (CNN)
  - Unanimously determining that San Francisco's same-sex marriages are illegal, the
    California Supreme Court votes 5–2 to annul all 4,000 such marriages performed
    in San Francisco this year. (San Francisco Chronicle) (CNN) (BBC)
  - EU Commission President-designate José M. Durão Barroso announces the portfolios
    assigned to the members of his new European Commission. (EU Press Release)
  - A Roman Catholic seminary at St Poelten in Austria is shut down following allegations
    of sexual impropriety. (BBC)
  - In Najaf, US forces besiege the Imam Ali Mosque, where followers of the radical
    Shia cleric Moqtada al Sadr are barricaded. (BBC)
