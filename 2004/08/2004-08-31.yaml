Date: '2004-08-31'
Source_URI: Portal:Current events/2004 August 31
Intelligence_Payload:
  Uncategorized:
  - The WTO authorizes the imposition of sanctions against the United States for persistent
    violation of global trade laws. (NYT)
  - A female suicide bomber kills ten and injures 51 others near a subway station
    in Moscow. (CNN) (Reuters) (BBC)
  - Despite demands from Iraqi resistance Islamist militant elements threatening to
    kill two French hostages, France upholds its law on secularity and conspicuous
    religious symbols in schools, specifically its ban on Muslim hijabs. (ABC News)
    (Reuters)
  - In Iraq, the radical Islamist group, Army of Ansar al-Sunna, kill 12 Nepali civilians
    employed as cooks and cleaners, stating "We have carried out the sentence of God
    against 12 Nepalis who came from their country to fight the Muslims and to serve
    the Jews and the Christians ... believing in Buddha as their God" (Reuters)
  - Repeated attacks on pipelines linked to southern oil fields have significantly
    hampered oil exports from Iraq. (Washington Post) (Moscow Times)
  - Former Yugoslav President Slobodan Miloševic, a University of Belgrade Faculty
    of Law graduate, opens his defence at the trial which accuses him of genocide,
    crimes against humanity and war crimes for his alleged role in the conflicts in
    which tens of thousands were killed. He maintains the charges are 'unscrupulous
    lies'. (BBC News) (Reuters)
  - Palestinian suicide bombers kill at least 16 Israelis and wound more than 91 others
    aboard two city buses in Beer Sheva, Israel in the first successful Palestinian
    suicide bombings since March 14, 2004, with Hamas claiming responsibility. (BBC)
    (Haaretz)
  - Afghan police say a United States bombing raid killed at least six civilians in
    the eastern province of Kunar. (Reuters) (BBC)
  - '2004 Atlantic hurricane season: Hurricane Frances affects the British Virgin
    Islands, the United States Virgin Islands and the northern-east part of Puerto
    Rico. (AP/The Star Tribune)'
  - 'California Governor and former Hollywood star Arnold Schwarzenegger extols the
    United States as a greater source of good in the world than the UN: "If you believe
    this country, not the United Nations, is the best hope of democracy in the world,
    then you are a Republican", he shouts, at the Republican National Convention.
    (Washington Times) (BBC)'
  - Following a dramatic intra-party campaign, Betty Castor and Mel Martinez win primary
    elections in Florida for the U.S. Senate election, 2004. The seat is the most
    heavily contested in the U.S. Congress, with over budgeted among twelve candidates'
    campaigns. (AP/Bradenton Herald)
  - 'The two smallest extrasolar planets ever discovered are announced: one orbiting
    55 Cancri in the constellation Cancer, and another orbiting Gliese 436 in the
    constellation Leo. They are both around the size of Neptune. (Globe and Mail)'
  - The Cleveland Indians baseball team beats the New York Yankees 22–0, the Yankees'
    worst loss in their 101-year history. (ESPN box score)
