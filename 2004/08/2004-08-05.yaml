Date: '2004-08-05'
Source_URI: Portal:Current events/2004 August 5
Intelligence_Payload:
  Uncategorized:
  - At least seven Iraqis and a U.S. soldier die in clashes; and a U.S. helicopter
    is shot down, injuring two. (BBC)
  - The U.S. FCC issues a preliminary ruling that providers of broadband communications
    (including cable modem, DSL, broadband over power line, and wireless) and VoIP
    communications are subject to the 1994 CALEA statutes which require providers
    to assist law enforcement authorities in wiretapping. (The Register)
  - Assembly demo party was held in Helsinki for the 13th time.
