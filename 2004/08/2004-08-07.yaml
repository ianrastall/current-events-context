Date: '2004-08-07'
Source_URI: Portal:Current events/2004 August 7
Intelligence_Payload:
  Uncategorized:
  - In the Asian Cup 2004 soccer final, Japan defeats China 3–1, prompting clashes
    between Chinese fans and police in Beijing. A Japanese diplomat's car is attacked
    and the Japanese players and fans are bussed out from Workers' Stadium, under
    guard. (Asian Cup Official Website) (BBC)
  - The Iraqi Interim Government bans Al Jazeera from operating in Iraq for 30 days;
    police order staff from their Baghdad newsroom.
  - 'U.S.-led occupation of Iraq: It is reported that, on July 29, members of the
    Oregon National Guard witnessed detainees being beaten and tortured in the grounds
    of the Iraqi Ministry of the Interior in Baghdad, and immediately intervened—only
    to subsequently receive orders from their superior officers to "stand down" and
    leave the grounds. (Portland Oregonian)'
