Date: '2004-08-23'
Source_URI: Portal:Current events/2004 August 23
Intelligence_Payload:
  Uncategorized:
  - 'Politics of Taiwan: The Legislative Yuan proposes a package of amendments by
    217–1 that includes halving the number of legislators and abolishing the National
    Assembly. (Taiwan News) (BBC)'
  - Mexican officials announce the arrest in Mexicali of Gilberto Higuera Guerrero,
    a suspected drug kingpin with ties to the Arellano Félix gang. Higuera is accused
    of smuggling narcotics into the U.S. from Mexico, and the U.S. State Department
    has offered a $ reward for Higuera's capture. (CNN)
  - U.S. Marines and Shi'ite militiamen fight several fierce battles around the Imam
    Ali Mosque, a shrine in Najaf, Iraq in some of the heaviest fighting since the
    20-day-old rebellion erupted. (Reuters)
  - A Ukrainian-Canadian soldier's Victoria Cross, which vanished from the Canadian
    War Museum about 30 years ago, will be back on public display Monday. Cpl. Filip
    Konowal received the Commonwealth's highest decoration for valour for his bravery
    in the battle for Hill 70 in France in 1917. (CBC) (National Post) (Toronto Star)
  - El Vocero reports that 50 out of 129 illegal immigrants travelling by boat from
    the Dominican Republic to Puerto Rico have been massacred by the ship's captains.(El
    Vocero, in Spanish)
