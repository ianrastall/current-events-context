Date: '2004-07-24'
Source_URI: Portal:Current events/2004 July 24
Intelligence_Payload:
  Uncategorized:
  - An Iranian court clears Mohammad Reza Aghdam-Ahmadi, the intelligence agent accused
    of killing the Iranian-Canadian journalist Zahra Kazemi, of charges of "semi-intentional
    murder", stating that the blood money should be paid from the state's treasury.
    (BBC)
  - A militant group kidnaps an Egyptian diplomat, Mohamed Mamdouh Qutb, in Baghdad,
    Iraq. (BBC)
  - A roadside bomb explodes in Karachi, Pakistan, killing an electrician and wounding
    six others. The victims were all students and staff at an Islamic seminary, and
    appear to be the targets of the attack. (BBC)
  - In Mexico Judge César Flores refuses to authorize an arrest warrant for former
    president Luis Echeverría and other officials under the accusations of genocide
    for the killing of students during the "dirty war". Prosecutors are expected to
    appeal the decision. (BBC)
  - During the third inning of a New York Yankees-Boston Red Sox game at Fenway Park,
    Jason Varitek and Alex Rodriguez get into a fight, igniting a bench-clearing brawl.
    The Red Sox win the game 11-10 on a walk-off home run by Bill Mueller.
