Date: '2004-07-15'
Source_URI: Portal:Current events/2004 July 15
Intelligence_Payload:
  Uncategorized:
  - Canada recalls its ambassador to Iran to protest Iran's refusal to allow Canadians
    to attend the trial of an Iranian intelligence agent charged in the death of Montreal-based
    photographer and journalist, Zahra Kazemi. (Globe & Mail) (Channel News Asia)
  - Voting takes place in the Birmingham Hodge Hill and Leicester South parliamentary
    by-elections in the United Kingdom. The Labour Party retains Hodge Hill, narrowly,
    but loses Leicester South to the Liberal Democrats. The Conservative Party is
    pushed into third place in both seats. (BBC)
  - The Cambodian parliament votes to reappoint Hun Sen as Prime Minister, following
    an 11-month deadlock. (BBC) (Xinhua)
  - The United States House of Representatives passes a resolution condemning the
    International Court of Justice ruling on the Israeli West Bank barrier. (Jerusalem
    Post)
  - New Zealand imposes diplomatic sanctions on Israel after an incident involving
    two alleged Mossad agents committing passport fraud. (BBC) (New Zealand Herald)
    (Independent) (TVNZ) (VOA)
  - A United Nations report says that life expectancy in some parts of Africa has
    dropped to below 33 years, due to the AIDS epidemic. (Medical News Today)
  - The U.S. bankruptcy court for Manhattan approved the reorganization plan of notorious
    energy-trading company Enron, which is now likely to formally emerge from chapter
    11 later this year. (Washington Post)
