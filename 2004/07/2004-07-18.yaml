Date: '2004-07-18'
Source_URI: Portal:Current events/2004 July 18
Intelligence_Payload:
  Uncategorized:
  - The trial for the murder of Canadian journalist Zahra Kazemi in Iran ended abruptly
    on the second day of the proceedings. The lawyers of the Kazemi family insisted
    that the time has not been enough for proofs to be given, witnesses to be brought
    to court, and the murderer to be identified.
  - Thousands of Palestinians take to the streets to protest appointments by Yasser
    Arafat. Palestinian gunmen attack and burn down a security force post in the Gaza
    Strip town of Khan Younis manned by forces loyal to Moussa Arafat, the cousin
    of Yasser Arafat. The security forces flee. (Haaretz) (Reuters)
  - U.S. President George W. Bush states that the establishment of a Palestinian state
    by the end of 2005 is unlikely due to instability and violence in the Palestinian
    Authority. (Maariv) (Jerusalem Post)
  - Argentina holds a national day of mourning to mark the tenth anniversary of the
    AMIA Jewish community centre bombing. (BBC) (MercoPress)
  - Bolivia holds a referendum on gas exports. (BBC)
