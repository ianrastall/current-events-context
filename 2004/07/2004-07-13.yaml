Date: '2004-07-13'
Source_URI: Portal:Current events/2004 July 13
Intelligence_Payload:
  Uncategorized:
  - Khaled al-Harbi, a disabled militant Saudi sheikh linked to al-Qaeda and Osama
    bin Laden, turns himself in to the Saudi authorities in Tehran under an amnesty
    program of the Saudi King. (BBC)
  - Al Jazeera television reports that a Bulgarian hostage held in Iraq by suspected
    al-Qaeda ally Abu Musab al-Zarqawi has been executed. A video tape of the murder
    was provided to Al Jazeera. The group vows to execute another hostage within 24
    hours. (Reuters)
  - The United States Department of State adds the Continuity Irish Republican Army
    (CIRA) to its list of foreign terrorist organisations, which means that CIRA assets
    in the US will be frozen and visas denied to members of CIRA. (BBC)
  - A rough cut of U2's new album is stolen in Nice, France. The album is scheduled
    for release in November. (BBC)
