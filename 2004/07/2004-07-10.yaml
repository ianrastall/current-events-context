Source_URI: Portal:Current events/2004 July 10
Intelligence_Payload:
  Uncategorized:
  - The World Health Organisation says that six months into its project against AIDS,
    440,000 people in developing nations have received antiretroviral drugs. Despite
    being 60,000 short of its target, the organisation says it is still hopeful of
    achieving its aim of distributing to 3,000,000 people by the end of 2005 (BBC)
