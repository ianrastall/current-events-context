Date: '2004-07-22'
Source_URI: Portal:Current events/2004 July 22
Intelligence_Payload:
  Uncategorized:
  - Police seal off the Washington, DC, office building housing John Kerry's presidential
    campaign headquarters after an envelope containing a suspicious white powder is
    opened by a Kerry staff member. (ABC News)
  - Major North American brewers Coors and Molson announce they will go ahead with
    a proposed merger, creating the world's fifth-biggest brewing company. (Toronto
    Star)
  - In the United States, the 9/11 Commission releases its unanimous final report.
    The report harshly criticizes American intelligence agencies. (Democracy Now!)
  - The 9/11 Commission releases a transcript of the hijackers' conversation in the
    final moments of United Airlines Flight 93, which details how the hijackers forced
    the plane into the ground in Pennsylvania. (Reuters)
  - United States and Afghan forces kill 10 suspected Islamic militants and arrest
    five others. (Reuters)
  - The United Nations raises its threat warning level for the Gaza Strip to "Phase
    Four" (the maximum is five) and plans to evacuate non-essential foreign staff
    from the Gaza Strip. (Reuters)
  - Kenya calls on its citizens to leave Iraq, after the recent abductions of three
    Kenyan citizens (AP)
  - In Canada, one person is reported to have died and five others hospitalized due
    to an E. coli contamination (AFP)
  - In Turkey a passenger train travelling between Istanbul and Ankara derails at
    about 18:45 local time (16:45 UTC) near Pamukova in Sakarya Province. Initial
    fatality reports from the government suggested that 139 people were killed; this
    was reduced to approximately 30, without explanation, a few hours later, and the
    actual number is unclear. (BBC)
  - Following Canadian Prime Minister Paul Martin's cabinet shuffle two days earlier,
    Leader of the Opposition Stephen Harper announces a reshuffled Conservative Shadow
    Cabinet. (CBC)
  - Ignacio Carrill, the Special Prosecutor for Past Social and Political Movements
    in Mexico, presents the findings of the investigation into the "dirty war", where
    it classifies the killings by government forces as genocide, and requests warrants
    be issued for the arrest of former president Luis Echeverría and 11 other ex-government
    figures. (BBC) (La Jornada in Spanish)
  - 'Same-sex marriage in the United States: the House of Representatives today passes
    legislation preventing federal courts from ordering courts in other states recognize
    same-sex marriage granted elsewhere. (The NewStandard)'
