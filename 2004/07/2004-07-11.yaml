Date: '2004-07-11'
Source_URI: Portal:Current events/2004 July 11
Intelligence_Payload:
  Uncategorized:
  - Ashraf Jehangir Qazi is nominated by Kofi Annan to be the UN new envoy to Iraq.
    (Rediff News)
  - Boris Tadic is inaugurated as the President of Serbia after winning the Serbian
    presidential election, 2004. (Bulgarian News Network)
  - Flash floods caused by severe hail and rain strike Edmonton, Alberta (Canada),
    causing widespread damage including structural damage to the West Edmonton Mall.
    (CBC News)
  - Monsoon rains force millions of people to flee their homes in India, Nepal and
    Bangladesh. At least 80 people are reported killed. (BBC)
