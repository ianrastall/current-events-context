Date: '2004-07-06'
Source_URI: Portal:Current events/2004 July 6
Intelligence_Payload:
  Uncategorized:
  - Major Harry Schmidt of the United States Air Force is found guilty of dereliction
    of duty in a "friendly fire" bombing that killed four and seriously wounded eight
    Canadian soldiers in Afghanistan in 2002, given an official reprimand and fined
    US$5,672, which will be made in two monthly payments of US$2,836. (CNN) (Washington
    Post)
  - President of Austria Thomas Klestil dies of a heart attack, just two days before
    he was due to leave office. (BBC)
  - Islamic Response claims that United States Marine Corps Corporal Wassef Ali Hassoun
    has been taken to a place of safety after he promised to desert from the Marine
    Corps. (BBC)
  - A car bomb in the Khalis section of Baghdad kills 13 people attending the wake
    of individuals killed two days ago in a previous attack. (Boston Globe)
  - United Nations Secretary-General Kofi Annan calls upon African Union leaders to
    take action to resolve the crisis in Darfur where an estimated 30,000 black Sudanese
    have been killed by Sudanese Arabs in cultural and racial strife. (BBC)
  - U.S. Democratic Party presumptive presidential candidate John Kerry picks former
    rival John Edwards to be his running mate. (MSNBC) (BBC) (Democracy Now!)
  - In a huge front-page headline, the New York Post mistakenly reports that Kerry
    had picked Richard A. "Dick" Gephardt.
  - The U.S. Senate Select Committee on Intelligence uncovers that, before the War
    on Iraq, the Central Intelligence Agency (CIA) was told by relatives of Iraqi
    scientists that Iraq's programs to develop unconventional weapons had been abandoned.
    (Guardian)
