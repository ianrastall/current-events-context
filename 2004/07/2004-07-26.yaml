Date: '2004-07-26'
Source_URI: Portal:Current events/2004 July 26
Intelligence_Payload:
  Uncategorized:
  - The 2004 Democratic National Convention opens in Boston, Massachusetts. (BBC)
    (Guardian)
  - The International Maritime Bureau says that deaths due to piracy doubled in the
    first month of 2004 compared with the same period in 2003, to 30 people. Half
    of the killings were in Nigerian waters. Despite the increased violence, the total
    number of piracy attacks fell. In the economically critical Straits of Malacca
    however, attacks rose by a third. (BBC)
  Violence in Iraq:
  - A suicide bomber attacks near a U.S base in the northern city of Mosul, killing
    two civilians and an Iraqi security guard. Three U.S soldiers and an Iraqi security
    guard were wounded.
  - The Iraqi interim Interior Ministry's Deputy Chief of Tribal Affairs, Col. Musab
    al-Awadi, is assassinated in Baghdad, along with two of his bodyguards.
  - Insurgents kill two Iraqi women working as cleaners for British forces in Basra
    in southern Iraq.
  - Militants threaten to kill two Jordanian truck drivers they captured within 72
    hours if their Jordanian employer does not stop doing business with the U.S. military.
    (AP)
