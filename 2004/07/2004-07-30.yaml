Date: '2004-07-30'
Source_URI: Portal:Current events/2004 July 30
Intelligence_Payload:
  Uncategorized:
  - The United Nations Security Council passes a US-drafted resolution 1556 demanding
    the Sudanese government end atrocities in the Darfur conflict; however, aid groups
    criticize the weakening of the resolution at the insistence of China, Pakistan,
    and Russia. (BBC)
  - Three people are killed and eight wounded in three suicide bomber attacks outside
    the U.S. and Israeli embassies and the Uzbek chief prosecutor's office in Tashkent,
    Uzbekistan. The Islamist group Hizb ut-Tahrir is blamed by Uzbek President Islam
    Karimov. Other unnamed sources point to al-Qaeda. (FOXNews) (AP)
  - A natural gas pipeline explodes in Ghislenghien, near Ath (thirty kilometres southeast
    of Brussels), killing 18 people and leaving over 120 wounded, some critically.
    (Reuters) (CNN)
  - New York Mets trade left-handed pitching prospect Scott Kazmir to the Tampa Bay
    Devil Rays for Victor Zambrano and Bartolome Fortunato
