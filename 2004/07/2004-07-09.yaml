Date: '2004-07-09'
Source_URI: Portal:Current events/2004 July 9
Intelligence_Payload:
  Uncategorized:
  - In its advisory opinion asked for by the United Nations General Assembly the International
    Court of Justice states that the Israeli West Bank barrier is illegal and calls
    for the General Assembly and the Security Council to remedy the situation. (New
    Straits Times) (NZZ) (BBC)
  - The final report of the US Senate Intelligence Committee states that the Central
    Intelligence Agency described the danger presented by weapons of mass destruction
    in Iraq in an unreasonable way, largely unsupported by the available intelligence.
    (BBC)
  - Ahmed Nazif is appointed the new Prime Minister of Egypt after the resignation
    of previous Prime Minister Atef Obeid and his entire cabinet. (BBC)
