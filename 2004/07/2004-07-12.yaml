Date: '2004-07-12'
Source_URI: Portal:Current events/2004 July 12
Intelligence_Payload:
  Uncategorized:
  - Montenegro adopts new state symbols including a new red flag bearing King Nikola's
    coat of arms.
  - Pedro Santana Lopes becomes the prime minister of Portugal. (BBC)
  - The Philippines announces the withdrawal of its forces from Iraq. (Reuters)
  - The United States Department of Homeland Security asks the Justice Department's
    office of legal counsel to research on the legal requirements for postponing the
    November elections, stating that they are concerned that terrorists might disrupt
    the elections. (Newsday)
  - Albertan Premier Ralph Klein announces that the province has completed repayment
    of its public debt, which once stood at CAD $23 billion. (CBC)
