Date: '2004-07-23'
Source_URI: Portal:Current events/2004 July 23
Intelligence_Payload:
  Uncategorized:
  - The United States Senate and House of Representatives pass a joint resolution
    declaring the armed conflict in the Sudanese region of Darfur to be genocide.
    (CNN)
  - An 18-year-old Palestinian, Hassan Zaanin, is shot dead in Beit Hanoun in the
    Gaza Strip when he and his family attempt to stop Palestinian gunmen from planting
    an anti-tank explosive outside their house. (Haaretz) (BBC)
  - An arrest is made in Toronto in the Cecilia Zhang murder case, nine months after
    she was abducted. (Toronto Star)
  - The bridge in Mostar dividing Croatian and Bosniak communities is opened 11 years
    after it was destroyed in the Bosnian war. (BBC)
  - A special prosecutor files genocide charges against former President of Mexico
    Luis Echeverría for actions taken by the Mexican military during a student protest
    in 1971.
