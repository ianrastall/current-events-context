Date: '2004-07-20'
Source_URI: Portal:Current events/2004 July 20
Intelligence_Payload:
  Uncategorized:
  - People for the Ethical Treatment of Animals releases a video of gross cruelty
    to chickens taken at Pilgrim's Pride, one of KFC's suppliers in West Virginia.
    The supplier will investigate the claims. (The Independent) (FOX News)
  - Sandy Berger resigns as a foreign affairs advisor to John Kerry's presidential
    campaign after it is reported that Berger was under investigation for allegedly
    illegally taking classified documents belonging to the U.S. National Archives,
    intended for review by the 9/11 Commission, related to the Clinton administration's
    handling of millennium terror threats. (Reuters)
  - Canadian Prime minister Paul Martin announces his new cabinet, which includes
    new faces such as ice hockey great Ken Dryden and former BC premier Ujjal Dosanjh.
    (CBC)
  - Gloria Arroyo, President of the Philippines, confirms that hostage Angelo de la
    Cruz has been freed by his captors after their demands for a one-month-early withdrawal
    of all 51 Filipino troops from Iraq were met. (Reuters)
  - Ahmed Qurei, Prime Minister of the Palestinian Authority, agrees to withdraw his
    resignation, three days after tendering it. Qurei is maintaining a threat to quit
    "because he has no powers". (Reuters)
  - Human Rights Watch releases a report stating that Sudanese government documents
    confirm support for the Arab Janjaweed militia in their campaign of ethnic cleansing
    against African Muslims in Darfur.
  - The United States House of Representatives votes to override a proposal by the
    Financial Accounting Standards Board that would require publicly traded companies
    to record all forms of share-based payments to employees, including stock options,
    as expenses. Similar legislation remains stalled in the United States Senate.
  - The European Union approves a 50-50 merger between BMG and Sony. (CNN)
