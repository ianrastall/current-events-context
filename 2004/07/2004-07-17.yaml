Date: '2004-07-17'
Source_URI: Portal:Current events/2004 July 17
Intelligence_Payload:
  Uncategorized:
  - Allegations surface that Iyad Allawi himself summarily executed six prisoners
    at a Baghdad police station one week before becoming Iraqi prime minister, to
    "send a clear message to the police on how to deal with insurgents". His office
    completely denies the event. (SMH) (Age)
  - The Prime Minister of the Palestinian Authority, Ahmed Qurei, submits his resignation
    during chaos in the Gaza Strip as gunmen kidnapped several people, including the
    chief of police of the Gaza Strip, demanding reform of the Palestinian security
    force. Yasser Arafat refuses to accept the resignation. (Reuters)
  - The Asian Cup 2004 kicks off in Beijing, China. Hosts PR China ties Bahrain 2:2
    in the opening match.
