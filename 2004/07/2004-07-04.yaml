Date: '2004-07-04'
Source_URI: Portal:Current events/2004 July 4
Intelligence_Payload:
  Uncategorized:
  - Greece wins the Euro 2004 football tournament by defeating host nation Portugal
    1–0. (ESPN) (Euro 2004 Official Website)
  - In New York City, groundbreaking takes place at the site of One World Trade Center,
    due to be completed in 2013. (Reuters/archive.org)
  - Polio spreads across Nigeria and ten other African nations after vaccinations
    are suspended in Kano province, on rumors that the vaccine was adulterated to
    cause infertility and AIDS. (New Era via All Africa)
  - Roger Federer wins the men's Wimbledon championship for the second straight year,
    defeating Andy Roddick in four sets. (Rediff News)
