Date: '2004-07-25'
Source_URI: Portal:Current events/2004 July 25
Intelligence_Payload:
  Israeli-Palestinian conflict:
  - The Al-Aqsa Martyrs' Brigades seizes the governor's office in the Gaza Strip town
    of Khan Yunis, demanding that Yasser Arafat's cousin Moussa Arafat be dismissed
    from his post as Gaza's security chief. In a separate attack, unidentified people
    storm a police station and burn the structure. (AP)
  - The "Human Chain" rally of 130,000 Israelis protesting against Israel's plan to
    unilaterally disengage from the Gaza Strip ends peacefully. About 130,000 people
    formed a 90 km human chain from the Gaza Strip to Jerusalem. (Maariv)
  Violence in Iraq:
  - Fifteen insurgents are killed in a five-hour battle near the guerrilla stronghold
    of Buhriz near Baquba in which small-arms, artillery, and mortars are used.
  - A U.S soldier is killed in a roadside bomb attack near Baiji, 90 miles south of
    Mosul.
  - A former government official is killed in Baghdad.
  - Guerillas murder two police officers in Mahumudiya, 25 miles south of Baghdad.
  - A police officer, a Kurdish Patriotic Union of Kurdistan fighter, and a Kurdish
    woman and her two sons are killed in Kirkuk. (AP)
