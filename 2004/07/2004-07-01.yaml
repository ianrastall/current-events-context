Date: '2004-07-01'
Source_URI: Portal:Current events/2004 July 1
Intelligence_Payload:
  Uncategorized:
  - The Iraqi Special Tribunal holds the first hearing in the trial of Saddam Hussein.
    (BBC) (Guardian)
  - The U.S. Centers for Disease Control announce that three organ transplant recipients
    have died from rabies infection after receiving organs from a donor infected with
    the rabies virus. This is a medical rarity, as human rabies infections in the
    developed world are extremely rare. (CNN)
  - A Qatari court sentences two Russian intelligence officers to 25 years in prison
    for assassination of Zelimkhan Yandarbiyev, a suspected terrorist and leader of
    Chechen separatists, on February 13, 2004. (Pravda) (Washington Times)
  - The Cassini–Huygens unmanned probe becomes the first spacecraft to orbit Saturn,
    and prepares to study the planet and its satellites. (Space.com)
  - The International Ship and Port Facility Security Code, a set of security restrictions
    designed by the UN's International Maritime Organization in response to the September
    11, 2001 attacks, goes into effect. (Reuters)
  - More than 200,000 Hong Kong residents march to demand greater democracy on the
    seventh anniversary of the handover. (VOA)
  - Famous actor Marlon Brando dies of pulmonary fibrosis.
