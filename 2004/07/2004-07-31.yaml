Date: '2004-07-31'
Source_URI: Portal:Current events/2004 July 31
Intelligence_Payload:
  Uncategorized:
  - A plea bargain in a US court reveals details of an alleged Libyan plot to assassinate
    Saudi Arabian Crown Prince Abdullah. Leading US Muslim activist Abdurahman Alamoudi,
    founder of the American Muslim Council, admits taking part in the plot, as he
    pleads guilty to three charges of illegal dealings with Libya. US Attorney General
    John Ashcroft says the case has provided "critical intelligence" in the war on
    terror. (BBC)
  - The Olympic Stadium in Berlin is given a new lease of life after a four-year renovation.
    The stadium is to stage the Football World Cup 2006 final, Germany's biggest sporting
    spectacle since reunification, exactly 70 years after the infamous Nazi Olympics.
    (BBC)
  - Valve & Sierra's joint WON system was permanently shut down, and replaced by Valve's
    new Steam client.
  - The Vatican denounces feminism, claiming that it would blur differences between
    men and women and threatens the institution of the traditional family of one man
    and one woman, stating that the drive for equality makes "homosexuality and heterosexuality
    virtually equivalent, in a new model of polymorphous sexuality". (AP)
  - Iran states that it has resumed building nuclear centrifuges to enrich uranium,
    reversing an October 2003 pledge to Britain, France and Germany to suspend all
    uranium enrichment-related activities. The United States contends that the purpose
    is to produce weapons grade uranium. (Reuters)
