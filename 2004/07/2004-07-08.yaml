Date: '2004-07-08'
Source_URI: Portal:Current events/2004 July 8
Intelligence_Payload:
  Uncategorized:
  - US Marine Corporal Wassef Ali Hassoun appears unharmed at the US Embassy in Beirut.
    Hassoun disappeared from his unit in Iraq on June 21, and was incorrectly reported
    as having been beheaded by the group that captured him. The United States Navy
    has launched an investigation into the incident. (Reuters) (BBC)
  - Mexico and Venezuela become associate members of Mercosur (the Southern Common
    Market). (BBC)
  - The Republic of China Defense Ministry reveals that the Chiang family has asked
    that Chiang Kai-shek and Chiang Ching-kuo both be buried in the Wu Chih-shan Military
    Cemetery in Taipei County (now New Taipei City). The state burial was scheduled
    for spring 2005 (Taiwan News)(Reuters) but was later indefinitely postponed.
  - India presents its national budget, raising its defence expenditure. (Rediff India)
