Date: '2004-01-19'
Source_URI: Portal:Current events/2004 January 19
Intelligence_Payload:
  Uncategorized:
  - Cargo ship MS Rocknes with a crew of 30 including the pilot capsizes near Bergen,
    Norway at 1630 local time (1530 UTC). Two people are reported dead and 24 still
    missing the morning after the accident. The ship was carrying a heavy load of
    rocks for use as shielding on top of a gas pipeline to Emden, Germany, from the
    Norwegian Ormen Lange offshore gas field.
  - The English Court of Appeal calls for an end to the prosecution of parents whose
    babies may have died of Sudden Infant Death Syndrome (cot death) in cases where
    the only evidence is contended expert testimony.
  - The European Space Agency releases detailed colour images of the surface of Mars,
    taken by its orbiting Mars Express probe.
  - NASA's Spirit rover arrives at its initial destination, a rock named "Adirondack",
    and prepares for analysis.
  - 'U.S. presidential election, 2004: The Iowa caucuses yield unexpectedly strong
    results for Democratic candidates John Kerry, who earns 38% of the state''s delegates
    and John Edwards, who takes 32%. Former front-runner Howard Dean slips to 18%,
    and Richard A. "Dick" Gephardt''s fourth-place (11%) finish prompts him to end
    his presidential bid.'
  - Yigal Amir, assassin of Yitzhak Rabin, plans to marry.
  - '"Snow White and The Madness of Truth" displayed at a Stockholm museum is again
    vandalized. A Russian-Jewish artist floats another image in the pool, that of
    Mijailo Mijailovic, the murderer of Swedish foreign minister Anna Lindh.'
  - José María Aznar's government in Spain is dissolved prior to March general elections.
    He has said he will not run for a third term of office.
