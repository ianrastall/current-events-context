Date: '2004-01-06'
Source_URI: Portal:Current events/2004 January 6
Intelligence_Payload:
  Uncategorized:
  - The man charged for the murder of Sweden's FM Anna Lindh on September 10, Mijailo
    Mijailovic, through his defence lawyer requests an interrogation to give critical
    details on the stabbing. Seemingly Mijailovic thereby confesses the assault.
  - 'The Daily Mirror, a British tabloid, publishes the blacked out portion of a letter
    wherein Diana, Princess of Wales alleged that someone was trying to kill her.
    The relevant portion reads: "[M]y husband is planning ''an accident'' in my car,
    brake failure & serious head injury in order to make the path clear for him to
    marry." The part "my husband" (referring to Charles, Prince of Wales) had been
    previously blacked out, and the word "him" replaced with "Charles" in transcripts
    of the letter released by Diana''s butler, Paul Burrell. The revelation comes
    on the same day the inquest into the death of Diana and her lover Dodi Al-Fayed
    is officially opened.'
  - Pakistan is cited as the source of nuclear weapon technology supplied to Libya,
    Iran and North Korea. The components intercepted at sea by Italy en route to Libya
    were fabricated in Malaysia. There is no evidence that the Pakistani government
    of President Pervez Musharraf knew about the transfer of technology of Libya.
  - Pakistan and India have agreed to a new round of talks to settle the Kashmir dispute.
    The talks will begin in February 2004.
  - 'Exploration of Mars: The first color images have been released from the Spirit
    rover on Mars. They are the highest resolution images ever taken on the surface
    of another planet. It has also been announced by NASA that they plan to name the
    rover''s landing site on Mars "Columbia Memorial Station" in honor of the crew
    of STS-107.'
