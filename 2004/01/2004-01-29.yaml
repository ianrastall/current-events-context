Date: '2004-01-29'
Source_URI: Portal:Current events/2004 January 29
Intelligence_Payload:
  Uncategorized:
  - A 60-ton sperm whale carcass explodes in downtown Tainan, Taiwan, causing traffic
    delays and showering vehicles and pedestrians with blood and entrails.
  - A report submitted today to the State of Maryland states that the electronic voting
    machines made by Diebold Election Systems "have such poor computer security and
    physical security that an election could be disrupted or even stolen by corrupt
    insiders or determined outsiders". The machines have been purchased by a number
    of states in the United States.https://www.nytimes.com/2004/01/29/technology/29CND-SECU.html
    This is the third report to state that the machines do not meet the security requirements
    of an election. Previous reports are available online.
  - 'Hutton Inquiry: The BBC Director-General, Greg Dyke, resigns in the continuing
    fall-out from the report. Mr Dyke is the second high-ranking BBC official to resign.
    Mark Byford is appointed Acting Director-General. The UK media in general condemns
    the report as a whitewash.'
  - The Al-Aqsa Martyrs' Brigades of Fatah claim responsibility for a suicide bombing
    aboard a city bus, in which Ali Yusuf Jaara, a member of the Palestinian police
    force, kills 10 Israelis and wounds more than 50, outside the Prime Minister's
    residence in Jerusalem. Simultaneously with the bombing, Shaul Mofaz, Israeli
    Defense Minister, is meeting with American envoys Wolfe and Sauterfield, who have
    requested an easing-up of conditions for the Palestinians. The explosion also
    coincides with a German-brokered prisoner swap between Israel and the Lebanese
    guerrilla group Hezbollah.
