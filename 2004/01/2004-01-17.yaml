Date: '2004-01-17'
Source_URI: Portal:Current events/2004 January 17
Intelligence_Payload:
  Uncategorized:
  - Planned NASA servicing missions for the Hubble Space Telescope are cancelled.
    Safety concerns are cited as the main reason behind the decision.
  - 'Human cloning: Fertility expert Dr. Panos Zavos claims to have successfully transplanted
    a two-week-old embryo into a 35-year-old woman. He said he had not done the act
    anywhere where "the spirit of the law" was against such a procedure.'
  - George Papandreou of Greece promised that he will suggest to sign a mutual agreement
    with Turkey for lowering their defense military expenses. (Greek).
  - 'Protesters call for resignation of German Federal Police chief Ulrich Kersten:
    about 6,000 people demonstrates against moving Germany''s Federal Police (BKA)
    headquarters from Wiesbaden to Berlin.'
