Date: '2004-01-16'
Source_URI: Portal:Current events/2004 January 16
Intelligence_Payload:
  Uncategorized:
  - Chen Shui-bian makes a televised address reiterating the Four Noes and One Without
    pledge and announcing the two questions for a referendum to coincide with the
    ROC presidential election, 2004 on March 20.
  - U.S. President George W. Bush appoints Charles Pickering to the United States
    Court of Appeals. His nomination was filibustered in the U.S. Senate, so President
    Bush made a recess appointment.
  - 'Earthquake in Iran: Iran updates the death toll from the Bam earthquake to 41,000
    people. The final figure could be as high as 45,000.'
  - The People's Republic of China arrests a top Hong Kong official into custody over
    suspicion of espionage for the United Kingdom.
  - 'Nunavut general election, 2004: Premier Paul Okalik of Nunavut, Canada, requests
    a dissolution of the territory''s legislature and an election call for February
    16.'
  - On or around this date, the United States national debt passes US$7 trillion.
