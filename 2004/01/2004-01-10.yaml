Date: '2004-01-10'
Source_URI: Portal:Current events/2004 January 10
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: Protests in the city of Amarah because of unemployment occur.
    Police officers and soldiers open fire on demonstrators. Five or six are killed
    and one or eleven wounded.'
  - In publicity for a new book for which former U.S. Treasury Secretary Paul O'Neill
    is the primary source, 60 Minutes reveals O'Neill's claims that the Bush administration
    was making plans for an invasion of Iraq within days of Bush's inauguration. Bush
    officials note that regime change in Iraq had been official U.S. policy since
    1998, three years before Bush took office. O'Neill, fired for his opposition to
    tax cuts, also characterized Bush as so disengaged in cabinet meetings that he
    "was like a blind man in a roomful of deaf people". On the positive side, O'Neill
    also described Bush as such a good listener that he (O'Neill) was able to give
    a non-stop monologue for nearly an hour in a one-on-one meeting.
  - 'SCO v. IBM: SCO Group claims that it has "low-level talks" with Google about
    a possible license agreement related to Linux.'
  - 'Iraq and weapons of mass destruction: On January 9, 2004, Danish troops discovered
    decade-old mortar rounds containing suspicious liquid buried in Southern Iraq.
    Initial tests now indicate that the rounds contain the banned chemical weapon
    blister gas. Final tests should be available in two days.'
  - A speed boat carrying illegal immigrants from Albania, bound for Italy broke down
    and capsized. There were 11 survivors, while as many as 21 died due to drowning
    and exposure. Two have been arrested by Albanian authorities for people smuggling,
    while other senior officials have been implicated in connection with the tragedy.
