Date: '2004-01-08'
Source_URI: Portal:Current events/2004 January 8
Intelligence_Payload:
  Uncategorized:
  - The is christened by Queen Elizabeth II.
  - An RTÉ Prime Time investigation accuses the Garda Síochána, the Republic of Ireland's
    police force, of violent abuse of people arrested. Irish Minister of State Dick
    Roche accuses Gardaí of "torture" of one student beaten up in a Dublin police
    station, while a former judge accuses police of committing perjury in his courts.
    The Gardaí deny all allegations.
  - The United States withdraws a group of 400 weapons inspectors from Iraq after
    finding nothing of substance. 1400 inspectors remain.
  - 'Occupation of Iraq: Nine United States soldiers are reported killed after a Black
    Hawk helicopter makes an emergency landing near the central Iraqi town of Falluja.'
  - The Carnegie Endowment for International Peace publishes a report accusing the
    United States of "systematically misrepresenting" the threat posed by "Iraq's
    weapons of mass destruction".
  - The New Jersey legislature passes a bill creating a domestic partnership status
    for same-sex couples, with many of the same legal rights as marriage. It becomes
    the fifth U.S. state to offer such a status to same-sex couples.
