Date: '2004-01-20'
Source_URI: Portal:Current events/2004 January 20
Intelligence_Payload:
  Uncategorized:
  - '2004 Canadian Federal Election: Belinda Stronach officially announces her run
    for leadership of the Conservative Party of Canada.'
  - Martha Stewart pleads not guilty to five criminal counts that include conspiracy,
    obstruction of justice and securities fraud stemming from a sale of ImClone stock
    in 2001. Conviction on any of the charges against her could put Ms. Stewart in
    federal prison. The five counts carry a total prison term of 30 years and a $1.25
    million fine.
  - Colonel Rashid Abu Shbak of the Palestinian Authority, said that information was
    still coming in and the investigating team had been upgraded, but he had no new
    leads on who was behind the bombing attack of an American diplomatic convoy on
    October 15, 2002. Three people died in the attack. U.S. officials have been stopped
    from going to Gaza since the attack. No decision has been made yet on when they
    might be allowed to return. Col. Shbak blamed Israel for the lack of progress
    in the investigation.
