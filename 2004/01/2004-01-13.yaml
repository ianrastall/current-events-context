Date: '2004-01-13'
Source_URI: Portal:Current events/2004 January 13
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian Conflict: Tom Hurndall, a British peace activist with the
    International Solidarity Movement, dies after being shot in the head by an Israeli
    soldier on April 11, 2003. The Israeli government say that they may consider bringing
    manslaughter charges against the soldier; the man''s family claim that he should
    be tried for murder.'
  - 'Education in Greece: Debate over the private universities issue and George Papandreou,
    junior''s suggestions (see 9 January) between New Democracy and PASOK. (Greek)'
  - The Constitutional Court of Italy strikes down a law enacted to give Prime Minister
    Silvio Berlusconi immunity from prosecution while in office.
  - British serial killer Dr Harold Shipman is found dead in his cell.
  - The Bichard Inquiry into events preceding the Soham murders formally opens
  - 'Occupation of Iraq: A United States Army] AH-64 Apache attack helicopter is shot
    down near the central Iraqi town of Habbaniya, but is able to land without casualties.'
  - A Yak-40 airliner en route from Termez in Uzbekistan crashes near the capital
    Tashkent, killing all 37 crew and passengers, including the U.N.'s top official
    in the country, Richard Conroy.
  - Robin Cook says that the British Museum's Parthenon Marbles must be returned to
    Greece. (Greek), (English), (Background, English)
