Date: '2004-01-04'
Source_URI: Portal:Current events/2004 January 4
Intelligence_Payload:
  Uncategorized:
  - The Loya jirga adopts a new Constitution of Afghanistan
  - A military court in Israel sentences five Israelis to one year in jail for refusing
    to serve in the military because of Israel's occupation of the West Bank and Gaza
    Strip. (Compare conscientious objector)
  - 'Exploration of Mars: American Mars probe "Spirit" mission is successful and is
    sending back images. Spirit is alive after rolling to a stop on the surface of
    Mars; confirmed by NASA''s Deep Space Network ( PST).'
  - Mikhail Saakashvili becomes president-elect of Georgia, following the Presidential
    elections. He had been widely expected to win following the November 23, 2003,
    ousting of President Eduard Shevardnadze.
  - 'Bolivian Gas War: In a televised speech, Bolivian President Carlos Mesa announces
    that a national referendum will be held on 28 March to resolve the issue of how
    Bolivia''s large natural gas reserves will be exploited.Forbes Article announcing
    a referendum, to be held March 28, to discuss the exploitation of Bolivia''s Natural
    gas reserves'
  - Britney Spears abruptly marries a childhood friend, Jason Allen Alexander, in
    a Las Vegas wedding chapel at ; by afternoon, the couple have arranged an annulment,
    which is expected to be made official when the courts reopen on Monday.
