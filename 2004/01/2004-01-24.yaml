Source_URI: Portal:Current events/2004 January 24
Intelligence_Payload:
  Uncategorized:
  - Mars Exploration Rover Mission
  - NASA isolates the flash memory aboard Spirit as the most probable cause of communications
    problems; work continues on a method to operate the rover without it.
  - MER-B Opportunity successfully lands on Mars and continues communications through
    all stages.
