Date: '2004-01-25'
Source_URI: Portal:Current events/2004 January 25
Intelligence_Payload:
  Uncategorized:
  - Georgia's new president, Mikhail Saakashvili, is sworn in.
  - Chess player Viswanathan Anand wins in group A of the Corus chess tournament.
    Thirteen-year-old Norwegian prodigy, Magnus Carlsen, wins in group C.
  - 'David Kay says, in his opinion, Iraq had no banned WMD stockpiles: "I don''t
    think they existed", Kay said, "What everyone was talking about is stockpiles
    produced after the end of the last (1991) Gulf War, and I don''t think there was
    a large-scale production program in the ''90s." David Kay also says that part
    of Saddam Hussein''s secret weapons programme may have been hidden in Syria. Syria
    denies receiving Iraq arms.'
  - Indonesia announces that millions of birds have died from avian influenza in the
    last few months.
  - 'Golden Globe Awards: Major winners include The Lord of the Rings: The Return
    of the King, Lost in Translation, and Angels in America.'
  - Hungarian footballer Miklós Fehér dies in a match between Benfica and Vitória
    Guimarães in Portugal. Benfica will subsequently retire his number 29 shirt.
