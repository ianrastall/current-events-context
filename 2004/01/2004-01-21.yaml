Date: '2004-01-21'
Source_URI: Portal:Current events/2004 January 21
Intelligence_Payload:
  Uncategorized:
  - The International Olympic Committee urges Athens to continue working round-the-clock
    for the 2004 Summer Olympics. The deadline is for August 13.
  - Norwegian Crown Prince Haakon Magnus's wife Crown Princess Mette-Marit gives birth
    to a daughter, at 0913 local time (0813 UTC), at Rikshospitalet University Hospital
    in Oslo. The newborn princess, named Ingrid Alexandra, weighs in at 3,686 grams
    and is 51 cm tall. She is second in succession to the Norwegian throne.
  - The latest World Economic Forum event opens in Davos, Switzerland, with a keynote
    address by Iranian President Mohammad Khatami.
  - The Royal Canadian Mounted Police raid the residence of Ottawa Citizen reporter
    Juliet O'Neill for the purposes of searching for evidence of leaked information
    in the Maher Arar deportation scandal. It was widely denounced by media groups
    and civil libertarians
