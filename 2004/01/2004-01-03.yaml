Date: '2004-01-03'
Source_URI: Portal:Current events/2004 January 3
Intelligence_Payload:
  Uncategorized:
  - A Boeing 737, Flight 604, flown by Egyptian charter company Flash Airlines headed
    for Cairo crashes into the Red Sea minutes after take-off from the holiday resort
    of Sharm el-Sheikh in Egypt. All 148 people on board are killed, of whom more
    than 120 were French tourists. Though both United Kingdom Prime Minister Tony
    Blair and Egyptian President Hosni Mubarak were in the area, neither were involved
    in the incident, contrary to initial reports.
  - The BBC cancels the appearance of Coca-Cola sponsorship credits in the music charts
    in its BBC One Top of the Pops show, after criticism from politicians and health
    campaigners that it would be promoting junk food and unhealthy drink products
    to teenagers.
  - Ricardo Palmera, better known as Simon Trinidad, one of top seven Colombian rebel
    group, FARC (Revolutionary Armed Forces of Colombia) is arrested in Ecuador.
  - 'Exploration of Mars: The first of the Mars Exploration Rovers, Spirit, has successfully
    landed on the Martian surface with a "very strong signal" being received from
    the lander. It was a tense few minutes as no signal was received from the lander
    during the minutes while it bounced over the surface. Mission Control is described
    as being a wild place with the mission scientists very happy. The first pictures
    are expected at the earliest around 0730 UTC'
  - The People's Republic of China's fifth-largest brokerage is seized by China Securities
    Regulatory Commission and local authorities for "illegal and irregular management
    operations and disorderly management." The unusual move to clamp down on China
    Southern Securities is a high-profile attempt to stem corruption.
