Date: '2004-01-23'
Source_URI: Portal:Current events/2004 January 23
Intelligence_Payload:
  Uncategorized:
  - David Kay steps down from Iraq Survey Group. George Tenet names former UN weapons
    inspector Charles Duelfer to succeed Kay.
  - The International Monetary Fund has joined the World Bank in forgiving of the
    $6.5bn debt owed by Nicaragua, sharply reducing the nation's overall debt payments.
  - The European Space Agency's Mars Express orbiter directly detects water ice in
    the southern polar region of the planet Mars.
  - NASA's Spirit rover communicated with Earth in a signal detected by NASA's Deep
    Space Network antenna complex near Madrid, Spain, at 12:34 Universal Time ( PST)
    this morning. The transmissions came during a communication window about 90 minutes
    after Spirit woke up for the morning on Mars. The signal lasted for 10 minutes
    at a data rate of 10 bits per second. Mission controllers at NASA's Jet Propulsion
    Laboratory, Pasadena, California, plan to send commands to Spirit seeking additional
    data from the spacecraft during the subsequent few hours. The flight team for
    NASA's Spirit received data from the rover in another communication session that
    began at 13:26 Universal Time ( PST) and lasted 20 minutes at a data rate of 120
    bits per second.
  - A Thai man suspected of having bird flu died, according to the Public Health Ministry.
  - At least 51 people, including a bridegroom, were killed on Friday when a fire
    ripped through a makeshift wedding hall in the southern Indian state of Tamil
    Nadu during a marriage ceremony.
  - An explosion has killed two people at Zhengzhou railway station, one of the People's
    Republic of China's biggest transport hubs.
