Date: '2004-01-09'
Source_URI: Portal:Current events/2004 January 9
Intelligence_Payload:
  Uncategorized:
  - 'Education in Greece: George Papandreou, junior talks about the possibility to
    allow private universities in Greece. (Greek)'
  - Turkey fully abolishes the death penalty.
  - The US lowers the terrorism advisory level to yellow (elevated) from orange (high).
  - Bangladesh bans books published by the Ahmadiyya movement, an Islamic sect.
  - 'Exploration of Mars: Engineers at JPL decide to turn the Mars Spirit Rover around
    on its lander after it was found the airbags could not be retracted enough to
    allow it to move off in a forward direction. It is expected the rover will drive
    off sometime next week. The Rover has also stood up and deployed its front wheels.'
  - 'Two volcanoes erupt: the Piton de la Fournaise on Réunion Island, and the Volcán
    de Fuego near Antigua Guatemala, Guatemala. The eruption in Guatemala is not thought
    to be serious enough to require evacuations.'
  - In Guatemala City, fifteen people die and twenty are hurt when a public bus collides
    with a crane.
  - 'Enron Corporation: Former Assistant Treasurer Lea Fastow and wife of Andrew Fastow,
    failed to respond to a plea agreement by the deadline. The offer would have allowed
    her to plead guilty in federal court to lesser charges and serve five months in
    return for her testimony. Her trial for conspiracy to commit wire fraud, money
    laundering, and tax evasion is scheduled to start February 10.'
