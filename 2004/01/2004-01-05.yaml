Date: '2004-01-05'
Source_URI: Portal:Current events/2004 January 5
Intelligence_Payload:
  Uncategorized:
  - A British and a German Member of the European Parliament both receive letter bombs
    in the post. This follows an earlier letter bomb sent to the President of the
    European Commission, Romano Prodi.
  - Ulster Unionist Party defector Jeffrey Donaldson and two other MLAs join Rev.
    Ian Paisley's Democratic Unionist Party, pushing the DUP's numbers in the Northern
    Ireland Assembly to 33.
  - Jaap de Hoop Scheffer of the Netherlands became the new Secretary General of NATO,
    replacing Britain's Lord Robertson.
  - The United States begins tracking foreign arrivals according to the new United
    States Visitor and Immigrant Status Indicator Technology (US-VISIT) program.
  - Pakistan President Pervez Musharraf and Indian Prime Minister Atal Bihari Vajpayee
    meet face-to-face to discuss improving relations between their two countries.
  - South Asian Association for Regional Cooperation (SAARC), which comprises India,
    Pakistan, Sri Lanka, Nepal, Bangladesh, Bhutan and the Maldives, signs the South
    Asia Free Trade Agreement, a draft agreement to eliminate tariffs by 2016.
  - Norwegian prosecutors announce that they have abandoned their attempts to prosecute
    Jon Johansen for his release of the DeCSS DVD decryption software.
  - Panhellenic Socialist Movement, the ruling political party of Greece, is about
    to change leadership. The official report is expected to be published on January
    7, 2004. It is expected by many that the new leader will be George Papandreou,
    junior. See and (Greek)
  - A potential local root vulnerabilityhttp://isec.pl/vulnerabilities/isec-0013-mremap.txt
    has been found in Linux 2.2, 2.4, and 2.6, and Linux Kernel developers have corrected
    the issue in 2.4 and 2.6; distributors are expected to offer the patches soon,
    for the benefit of those users who do not compile their own kernels.
  - Chris Moyles presented The Chris Moyles Show on BBC Radio 1 in the Breakfast Show
    slot for the first time. The show subsequently went on to become the longest running
    incarnation of the Radio 1 Breakfast slot, with Moyles holding the position until
    September 2012.
