Date: '2004-01-11'
Source_URI: Portal:Current events/2004 January 11
Intelligence_Payload:
  Uncategorized:
  - 'Exploration of Mars: NASA''s Spirit rover now has its arm and all six of its
    wheels free, and only a single cable must be cut before it can turn and roll off
    its lander onto the soil of Mars. As that milestone is completed, scientists are
    taking opportunities to take extra pictures and gather other data.'
  Occupation of Iraq:
  - U.S. military records show that attacks against coalition soldiers have decreased
    by 22% in the four weeks following the capture of Saddam Hussein.
  - More protests in Amarah take place. Demonstrators, many of them related to the
    victims of January 10, requested compensation. No significant violence reported.
