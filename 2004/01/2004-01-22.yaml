Date: '2004-01-22'
Source_URI: Portal:Current events/2004 January 22
Intelligence_Payload:
  Uncategorized:
  - 'Mars Exploration Rover Mission: MER-A Spirit rover stops transmitting meaningful
    data and has thought to have gone into safe mode. The cause of this is unknown
    but the rover is still able to send back a simple acknowledgement tone.'
  - Staff members of the United States Republican Party are accused of infiltrating
    Democratic Party computers and making copies of confidential files stored on the
    compromised computers. The infiltrations reportedly began in early 2002.
  - Maher Arar sues the United States government for having deported him to Syria
    and not Canada, his country of citizenship. He was reportedly tortured in Syria.
  - 'Enron Corporation: Richard Causey, former chief accounting officer was indicted
    in Houston, Texas, on federal charges of securities fraud and conspiracy for his
    role in masking Enron''s faltering fiscal health in late 2001. He has pled not
    guilty.'
  - Zimbabwe's only independent daily newspaper resumes publishing.
