Date: '2004-01-18'
Source_URI: Portal:Current events/2004 January 18
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: At around local time ( GMT) in Baghdad, Iraq, an insurgent
    suicide bomber driving a car filled with explosives blew himself up while attempting
    to enter "Assassin''s Gate." Early reports said that about 18 people, including
    16 Iraqi civilians and two United States Department of Defense workers were killed,
    while another 56 Iraqi civilians were wounded.'
  - Israeli Prime Minister Ariel Sharon praises the Israeli ambassador to Sweden,
    Zvi Mazel, for vandalising the artwork entitled "Snow White and The Madness of
    Truth" displayed at a Stockholm museum. The piece, created by an Israeli-born
    composer/musician, consists of a white float carrying a picture of a Palestinian
    suicide bomber in a pool of blood-coloured water. Mazel was caught on surveillance
    video disconnecting the electric power from the display and throwing a lamp into
    the water. Mazel says, "This exhibit was the culmination of dozens of anti-Israel
    and anti-Jewish events in Sweden."
