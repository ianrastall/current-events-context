Date: '2004-05-16'
Source_URI: Portal:Current events/2004 May 16
Intelligence_Payload:
  Uncategorized:
  - Voters in the Dominican Republic go to the polls to elect a new president; with
    79% of the vote counted, former president Leonel Fernández is declared the winner.
    (BBC)
  - The Israeli army announces its intention to demolish hundreds of additional houses
    in the Rafah refugee camp in the Gaza Strip along the border with Egypt after
    the Supreme Court rejects a petition against the demolitions. In the past, the
    IDF has found dozens of tunnels hidden underneath homes allegedly used to smuggle
    guns, ammunition, explosives, fugitives, drugs and other illegal materials into
    Gaza. The court had previously issued a temporary injunction after 88 homes had
    been destroyed leaving more than 1000 people homeless (UNRWA figures disputed
    by the Israeli army). (BBC) (Haaretz) (Maariv)
  - 'French European Union parliamentarian Paul Marie Couteax declares: "I have no
    hesitation in saying that we must consider giving the Arab side a large enough
    force, including a large enough nuclear force, to persuade Israel that it cannot
    simply do whatever it wants. That is the policy my country (France) pursued in
    the 1970s when it gave Iraq a nuclear force."(JPost)'
