Date: '2004-05-03'
Source_URI: Portal:Current events/2004 May 3
Intelligence_Payload:
  Uncategorized:
  - The US is starting to lose its dominance in the sciences; "the rest of the world
    is catching up", according to John E. Jankowski of the National Science Foundation.
    Scientists from Europe and now other countries are now publishing more papers
    in major professional journals than scientists from the U.S.. New York Times p.A1.
  - 'An Egyptian court rejects the petition of an Egyptian movie producer seeking
    to establish an Egyptian-Israeli friendship organization stating: "Egyptian society
    does not need a friendship association with Israel. The Egyptian public and Arabs
    do not need such false friendships, as demonstrated by the attacks on the Palestinian
    people." (INN)(HaAretz)'
  - French police seek 500 kg (1,100 lb) of ammonium nitrate fertilizer stolen from
    the port of Honfleur at the mouth of the Seine River. The fertilizer can be converted
    easily into a powerful explosive. Such an explosive was used in the 1995 Oklahoma
    City bombing. AZF suspended operations inside France while the group seeks to
    upgrade its arsenal. (NYT)
  - Mexico and Peru recall their ambassadors from Cuba, citing recent "offensive"
    comments by Cuban head of state Fidel Castro. The Cuban ambassador to Mexico is
    also expelled, for "activities incompatible with his diplomatic status". (VOA)
    (BBC)
  - At US$38.21 per barrel of crude, oil prices hit their highest level since 1990.
    (AP)
  - In an open letter to George W. Bush more than 50 former high-ranking United States
    diplomats (including former ambassadors to Saudi Arabia and Qatar) complain about
    the Bush administration's policy towards the Middle East claiming that the President's
    approach, and specifically his endorsement of Israeli Prime Minister Ariel Sharon's
    disengagement plan, is losing the U.S. "credibility, prestige and friends". The
    letter follows a similar one written by 52 former British diplomats sent to Tony
    Blair a few days earlier. (BBC)
