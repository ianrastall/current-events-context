Date: '2004-05-21'
Source_URI: Portal:Current events/2004 May 21
Intelligence_Payload:
  Uncategorized:
  - Russian President Vladimir Putin announces that his country will pursue ratification
    of the Kyoto Protocol. Ratification will make the protocol take effect and impose
    trade restrictions on non-participating countries, such as Australia and the United
    States. (Independent)
  - The Supreme Court of Canada, in a 5–4 decision, rules in a case between U.S. biotechnology
    firm Monsanto Company and farmer Percy Schmeiser that Monsanto holds a patent
    on the Roundup Ready gene inserted in its canola seed and can control the use
    of the plant. The court previously decided that a higher life form, the Harvard
    mouse, could not be patented. (CBC)
  - Mark Thompson, Chief Executive of Channel 4, is appointed as the new Director-General
    of the BBC. (BBC)
  - Active underwater volcano found off coast of Antarctica. New find explains discolored
    water surrounding the site. (Newswise) (US NSF)
  - TechTV airs the final episode of their second highest rated series, Call for Help,
    in advance of their takeover and merger by G4.
  - Alex Rodriguez makes his first appearance at Ameriquest Field in Arlington after
    being traded by the Texas Rangers to the New York Yankees.
