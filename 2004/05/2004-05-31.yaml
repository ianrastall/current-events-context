Date: '2004-05-31'
Source_URI: Portal:Current events/2004 May 31
Intelligence_Payload:
  Uncategorized:
  - 'Memorial Day: President Bush honors the United States'' war dead of past conflicts,
    and says that "two terror regimes are gone forever" in Iraq and Afghanistan as
    US deaths there climb to 1,000. (Reuters)'
  - Singapore's governing People's Action Party endorses Lee Hsien Loong, current
    deputy prime minister and son of former Prime Minister Lee Kuan Yew, as the next
    prime minister. (BBC)
  - A bomb explodes at a Shi'a mosque in Karachi, Pakistan, during evening prayers.
    Around 15 people are killed, dozens more are injured, the building is seriously
    damaged, and rioting Shi'ites take to the streets. (BBC)
  - U.S. and Egypt fear an Islamist takeover of the Gaza Strip as a result of a possible
    Israeli pullout. They debate the role of Arafat, as Prime Minister Sharon confronts
    his own cabinet's opposition led by Netanyahu. (HaAretz)
