Date: '2004-05-10'
Source_URI: Portal:Current events/2004 May 10
Intelligence_Payload:
  Uncategorized:
  - Turkey begins construction of the Marmaray Tunnel, a railway tunnel under the
    Bosporus. (Moscow Times)
  - A judicial recount in the 2004 Taiwanese presidential election begins. (VOA) (CNA)
  - The Arab League agrees to hold a summit in Tunis. The summit originally scheduled
    for March of this year was scrapped over differences between the participants.
    (NYT)
  - At the Commonwealth military cemetery in Gaza City where 3000 World War I casualties
    are buried, Palestinian vandals desecrate 32 graves, breaking headstones and affixing
    photographs of Iraqi POW abuse to others. (NYT)
  - The Palestinian Cabinet announces plans to hold municipal elections, starting
    with Jericho and followed by some Gaza Strip municipalities. The elections, starting
    in August, will replace mayors appointed by the Palestine Authority. The previous
    elections, for president and legislature, were held in 1996. (NYT), (VOA)
  - President George W. Bush is expected to impose economic sanctions on Syria, alleging
    support of terrorism and failure to stop guerrillas from entering Iraq. (NYT),
    (Reuters)
  - The United States Armed Forces destroy the Baghdad headquarters of Moqtada al-Sadr.
    The building had been evacuated by al-Sadr's forces. There were no casualties.
    (NYT)
  - 'Philippine elections: About Filipinos go to the polls to elect candidates for
    national and local positions from the President down to municipal councilors.
    (BBC)'
  - Canadian bureaucrat Chuck Guite and GroupeAction president Jean Brault have been
    arrested and charged with six counts each of fraud in connection with the Liberal
    sponsorship scandal. (CTV)
  - The United States Department of Justice reopens an investigation into the 1955
    murder of Emmett Till, an important event during the American civil rights movement.
    (NYT)
  - Voting concludes in the marathon elections in India. (IHT)
  - The first Dutch soldier dies in the occupation of Iraq. (Radio Netherlands)
