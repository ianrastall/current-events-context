Date: '2004-05-19'
Source_URI: Portal:Current events/2004 May 19
Intelligence_Payload:
  Uncategorized:
  - Citing "insufficient evidence", US Federal Judge Adalberto Jordan acquits environmental
    group Greenpeace on charges under the "sailormongering" statute. A record total
    of more than 100,000 people worldwide sent protest messages to George W. Bush
    and US Attorney General John Ashcroft demanding that the case be dropped. (Greenpeace)
    (OneWorld.net) (BBC)
  - Last episode of the hit TV-show Angel is sending
  - US Army kills 40 and wounds 117 others during an attack in Iraq near the border
    with Syria. Brigadier General Mark Kimmitt, deputy director of operations for
    the US military in Iraq, tells Reuters the attack was within the military's rules
    of engagement, denying reports that the victims were members of a wedding party.
    He says a large amount of money, Syrian passports and satellite communications
    equipment was found at the site after the attack. (Guardian) (Reuters) (NYT)
  - At least ten Palestinians are killed in Rafah, Gaza Strip, by an explosion following
    warning shots fired by the IDF. The road used by the Palestinians was strewn with
    explosives. (BBC) (CNN) (FOX)
  - The British House of Commons is temporarily suspended after a purple flour bomb
    thrown by a Fathers 4 Justice protester hits Tony Blair during Prime Minister's
    Questions. (BBC)
  - The Nationalist Party of China (KMT) and the People First Party announce plans
    to merge after a unanimous vote by the KMT Central Standing Committee. (BBC)
  - A third outspoken Hong Kong radio talk show host, Allen Lee, quits his program,
    questioning the status of media freedom in the special administrative region;
    he also resigns from his seat in the Chinese National People's Congress. (VOA)
    (BBC)
  - Rudy Giuliani testifies before the 9/11 Commission, where he defends the work
    of his commissioners. (AP)
  - Manmohan Singh is asked by India's Congress party to become Prime Minister and
    form new government. (Reuters)
  - In football, Valencia wins the UEFA Cup, defeating Olympique Marseille 2–0. (UEFA.com)
  Iraqi abuse scandal at Abu Ghraib prison:
  - The Denver Post has uncovered Pentagon documents that show more than twice as
    many allegations of detainee abuse (75) are being investigated by the military
    than previously known. Twenty-seven of the abuse cases involve deaths; at least
    eight are believed to be homicides. (Denver Post)
  - 'The first U.S. soldier is sentenced after pleading guilty: Spc. Jeremy Sivits
    receives one year in prison, demotion and a dishonorable discharge. (CNN)'
  - At least one British soldier is arrested for creating the faked British abuse
    photos. (CNN)
