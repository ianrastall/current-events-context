Date: '2004-05-28'
Source_URI: Portal:Current events/2004 May 28
Intelligence_Payload:
  Uncategorized:
  - A court in Chile strips former dictator Augusto Pinochet of his immunity from
    prosecution, paving the way for him be tried for human rights abuses in the 1970s
    and 1980s. (BBC)
  - A 6.1-magnitude earthquake strikes on Iran's Caspian Sea coast. Some 20 deaths
    and minor damage are reported. (BBC)
  - G4 and TechTV officially merge to form the G4techTV network.
