Date: '2004-05-11'
Source_URI: Portal:Current events/2004 May 11
Intelligence_Payload:
  Uncategorized:
  - Nine factory workers in Glasgow, Scotland, are killed in a midday explosion at
    the Stockline Plastics factory. (BBC)
  - 'Israeli-Palestinian conflict: Six Israeli soldiers are killed in the Gaza Strip
    during an incursion when their armored personnel carrier triggered an explosive
    device. Hamas and Islamic Jihad claim to hold a portion of the remains of the
    soldiers: "We possess the remains of your bodies that were thrown into the streets
    of Gaza. We have our demands to hand them over to the Zionist occupier" (HaAretz)'
  - Thai Prime Minister Thaksin Shinawatra buys a 30% stake in Liverpool Football
    Club for approximately £60 million (~ USD100 million). It is unclear whether most
    of the money originates from the Thai government or is the prime minister's own
    money. It is hoped that the purchase will assist with the development of football
    in Thailand. (BBC) (Guardian)
  - Gosselin Sextuplets are born in Hershey Pennsylvania
  - Gene Sprague committs suicide by jumping off of the Golden Gate Bridge in San
    Francisco, CA as seen in the movie The Bridge
  Iraq Occupation and resistance:
  - Hundreds of civilians march to the Muslim shrines in Najaf, calling upon Moqtada
    al-Sadr to remove his Mahdi Army from the city. (NYT)
  - Video is released of the decapitation of Nick Berg, a U.S. civilian, murdered
    by an Islamist group allegedly in retaliation for the abuse of prisoners at Abu
    Ghraib Prison. (Reuters) (Arabnews) (NYPost) (Radio Free Europe)
