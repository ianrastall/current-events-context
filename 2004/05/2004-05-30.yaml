Date: '2004-05-30'
Source_URI: Portal:Current events/2004 May 30
Intelligence_Payload:
  Uncategorized:
  - Thousands of people in Hong Kong take to the streets to commemorate the 15th anniversary
    of the Tiananmen Square protests of 1989, and to protest Beijing's recent moves
    to limit their autonomy. (VOA) (BBC)
  - Pakistan test-fires a ballistic missile capable of carrying a nuclear warhead,
    but claims it will not increase tensions with India. (PakistanLink)
  - Saudi commandos storm the Khobar housing compound where Islamic militants were
    holding several dozen hostages, ending with 22 dead. (BBC)
  - Thousands of Pakistani Sunni Muslims riot in Karachi, ransacking property, setting
    fire to four banks, and stoning vehicles after Mufti Nizamuddin Shamzai, an influential
    pro-Taliban cleric, is killed in a drive-by shooting. (NYT) (BBC)
  - Buddy Rice wins the 2004 Indianapolis 500 driving for Rahal Letterman Racing.
    (VOA) (Sports Illustrated)
  - An F2 tornado on May 30 affected portions of the Indianapolis Metropolitan Area
    on the same day the Indianapolis 500 was taking place. The tornado missed the
    Indianapolis Motor Speedway by six miles and forced post-racing events to be held
    indoors. The tornado did however cause extensive damage across southern and eastern
    Marion County south of the downtown area. While 26 people were injured, over 700
    structures were damaged by the storm.
