Date: '2004-05-09'
Source_URI: Portal:Current events/2004 May 9
Intelligence_Payload:
  Uncategorized:
  - Chechen president Akhmad Kadyrov is killed in a landmine bomb blast under a VIP
    stage during a World War II memorial victory parade in Grozny, Chechnya. (Reuters)
    (AP) (BBC)
  - The scandal about U.S. torture in Iraq widens as The New Yorker reports about
    guards setting dogs against naked prisoners. (The New Yorker)
  - Twenty-two passengers, two stoweaways and crew are injured when an American Eagle
    ATR 42, flight 1450, crash-lands in San Juan, Puerto Rico. (AP)
