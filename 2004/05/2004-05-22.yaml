Date: '2004-05-22'
Source_URI: Portal:Current events/2004 May 22
Intelligence_Payload:
  Uncategorized:
  - Michael Moore's movie Fahrenheit 9/11 is awarded the Palme d'Or at the Cannes
    Film Festival.
  - Spain's Crown Prince Felipe marries Letizia Ortiz in Madrid. (Bloomberg)
  - The Commonwealth Secretariat announces it will re-admit Pakistan to the Commonwealth,
    five years after its suspension. Continuing concerns about democracy will be monitored.
    (BBC)
  - Manmohan Singh is sworn in as Prime Minister of India. (BBC)
  - English Premier League football side Manchester United defeat Millwall of the
    First Division 3–0 to win the FA Cup. (BBC)
  - The village of Hallam, Nebraska is almost completely destroyed by the widest tornado
    on record with a peak width of 2.5 miles wide.
