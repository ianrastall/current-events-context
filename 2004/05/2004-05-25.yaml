Date: '2004-05-25'
Source_URI: Portal:Current events/2004 May 25
Intelligence_Payload:
  Uncategorized:
  - As many as 1,000 people are killed in floods in the Dominican Republic and Haiti.
    (CNN) (BBC) (→ May 2004 Caribbean floods)
  - France bans the use of Bayer CropScience Imidacloprid on maize seeds. Gaucho is
    claimed to be harmful to bees. (Rtrs)
  - Viacom's MTV Networks unit announces plans for the LOGO channel, the first LGBT-themed
    major cable television service in the United States, set for a February 17, 2005,
    debut. (Bloomberg) (Reuters) (CNN)
  - The Abel Prize is awarded in a ceremony in Oslo for the Atiyah-Singer index theorem.
    (AP)
  - 'Tennis: At the French Open, a new world record for the longest match in the sport''s
    recorded history is set when Frenchman Fabrice Santoro beats Arnaud Clément 6-4,
    6-3, 6-7 (5), 3-6, 16-14 after playing for 6 hours and 33 minutes, split over
    two days. (ESPN)'
  - Phish announces the popular jamband is breaking up.
