Date: '2004-05-08'
Source_URI: Portal:Current events/2004 May 8
Intelligence_Payload:
  Uncategorized:
  - Israel makes the first permanent appointment of an Arab to its Supreme Court as
    Salim Jubran is selected unanimously; Esther Hayut and Elyakim Rubinstein are
    also selected unanimously. Edna Arbel, the former state prosecutor who recommended
    indicting Prime Minister Ariel Sharon on bribery charges, is selected amongst
    considerably more controversy and opposition. (Haaretz)
  - 'Computer security: German authorities arrest an 18-year-old high school student
    on suspicion that he is responsible for creating the Sasser worm, which has infected
    hundreds of thousands of computers worldwide by exploiting a flaw in the Windows
    2000 and Windows XP operating systems. According to CNET, a US$5 million reward
    from Microsoft was instrumental in leading investigators to the suspect. (AP)
    (CNET)'
  - Turkish prime minister Recep Tayyip Erdogan wraps up a landmark visit to Greece.
    Both sides pledge cooperation—Erdogan visits the Turkish minority in Thrace and
    urges reconciliation, and his Greek counterpart Costas Karamanlis says Greece
    will support Turkey's EU bid, marking a high point in Greco-Turkish relations.
    (BBC) (BBC) (BBC)
