Date: '2004-05-20'
Source_URI: Portal:Current events/2004 May 20
Intelligence_Payload:
  Uncategorized:
  - Chen Shui-bian is sworn into a second term as President of the Republic of China
    in Taipei, while the High Court has yet to rule on a recount of the presidential
    election that concluded two days before. About 400 dignitaries, including 15 foreign
    heads of state, attend. (BBC)
  - United States forces and Iraqi police raid the home of controversial Iraqi Governing
    Council member Ahmed Chalabi, arresting several members of the Iraqi National
    Congress and seizing documents. The US severs its financial ties with the group,
    and accuses it of currency exchange racketeering, theft, and obstructing the Oil
    for food investigation. (MSNBC)
  - The United States pushes for the UN Security Council to renew Resolution 1487
    that would exempt U.S. troops and officials from prosecution by the International
    Criminal Court. (Reuters) (OneWorld.net)
