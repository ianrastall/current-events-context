Date: '2004-05-29'
Source_URI: Portal:Current events/2004 May 29
Intelligence_Payload:
  Uncategorized:
  - The World War II Memorial is dedicated in Washington, D.C., with around 200,000
    people attending the ceremony. (Reuters) (CNN)
  - Islamist militants attack two oil industry installations and a foreign workers'
    housing complex in Khobar, Saudi Arabia, killing at least 11 people and taking
    some 50 hostages. Saudi police attempt to storm the housing complex but withdraw
    after taking casualties. A previously unknown militant group styling itself "The
    Jerusalem Squadron" claims responsibility and says they are attacking "zionists
    and crusaders" who are there to "steal our oil and resources". (CNN) (BBC)
  - U.S. District Judge Nancy Gertner (in Massachusetts) rules that stating that someone
    is homosexual does not constitute libel or slander. (AP)
  - India flies its first multi-purpose civilian aircraft, NAL Saras in Bangalore.
    (Times of India )
  - An earthquake measuring 4.4 on the Richter scale occurs in the border area between
    Haiti and the Dominican Republic. (BBC)
