Date: '2004-05-05'
Source_URI: Portal:Current events/2004 May 5
Intelligence_Payload:
  Uncategorized:
  - Parliament grounds and adjoining footpaths in New Zealand host 15,000 people (many
    of whom have participated in several days of route march – "hikoi") protesting
    about the proposed law that is expected to change the ownership of foreshore and
    seabed.
  - The Dalai Lama ends his visit to Canada with a ceremony initiating thousands in
    Tibetan Buddhism. (Toronto Star)
  - Israeli company Givot Olam announces that from a previously known oil reserve
    near Kfar Saba believed to contain barrels ( m3) of oil, 20% of it is extractable.
    (INN) (Haaretz)
  - During a raid in Gaza Israeli troops kill a police captain and wound 15 people,
    in an area that is used to fire Qassam rockets into Israeli towns. (Reuters)
  - Maya artifacts are discovered in Cival, a ruined city in the Petén region of Guatemala,
    suggesting an earlier development of dynastic customs than previously known. (Washington
    Post)
  - Three bombs explode in Athens outside a single police station, 100 days before
    the start of the Olympic Games. One policeman was injured. (BBC) (Boston Herald)
  - George W. Bush speaks on the Al Arabiya and Alhurra Arabic-language television
    networks, stating he was 'appalled' at the conduct of U.S. soldiers in Abu Ghraib
    prison in Iraq. (Toronto Star)
  - Houston Astros baseball pitcher Roger Clemens records his 4,137th career strikeout
    to place him second on the all-time list behind Nolan Ryan. (AP) (Reuters)
  - A judge of the Ontario Superior Court, overseeing the bankruptcy and reorganization
    of Air Canada, approved an amended "standby purchase agreement" from Deutsche
    Bank, which stands to become a major owner of equity in the revived airline. (Globe
    and Mail)
  - President of the breakaway Georgian republic of Ajaria, Aslan Abashidze is forced
    to resign by Georgian president Mikhail Saakashvili. (BBC) (Independent) (Guardian)
    (Washington Post)
  - Supreme Court of India announced the judgment in the favor of "Vedic Astrology".
    Supreme Court of India accepted "Vedic Astrology" as a science. Also, Supreme
    Court of India orders to the Government of India, to introduce "Vedic Astrology"
    as a course at university level through the country. A well known astrologer K.
    N. Rao was the petitioner who filled the case against the Government of India.
