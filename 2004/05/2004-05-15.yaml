Date: '2004-05-15'
Source_URI: Portal:Current events/2004 May 15
Intelligence_Payload:
  Uncategorized:
  - A 145 mm artillery shell is used as an improvised bomb on a road against US troops
    in Iraq. The shell explodes and two soldiers receive mild exposure to a nerve
    agent. (Fox News) (Seattle Post-Intelligencer)
  - Ukraine wins the 49th annual Eurovision Song Contest. (BBC)
  - FIFA announces that the 2010 Football World Cup will be held in South Africa.
    (BBC)
  - Smarty Jones wins the Preakness Stakes by 12 lengths. (AP)
  - Arsenal defeat Leicester City 2-1 in the Premier League to become the first team
    to go unbeaten in the top tier English league since Preston North End in the 1888-1889
    season, going 26W-12D-0L. (BBC)
