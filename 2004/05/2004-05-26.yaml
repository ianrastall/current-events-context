Date: '2004-05-26'
Source_URI: Portal:Current events/2004 May 26
Intelligence_Payload:
  Uncategorized:
  - A signed peace accord marks an end to the 21-year civil war in Sudan. The Darfur
    conflict continues. (AP)
  - Archaeologists discover what they term the 'world's oldest university' in Alexandria,
    Egypt. It dates from the 5th century AD. (Toronto Star)
  - FBI Director Robert Mueller and United States Attorney General John Ashcroft state
    that Al Qaeda may be planning a terrorist strike over the coming months. Multiple
    FBI officials contend that there is no recent intelligence to suggest a significant
    change in the US's security situation, and critics question the validity and timing
    of the public warning.(NYT) Seven people wanted for questioning are also named.
  - Journalist Peter Hounam, who had revealed Israel's secret nuclear program, is
    arrested in Jerusalem and denied access to a lawyer. He is released and expelled
    from the country the following day. (BBC) (BBC)
  - A man armed with a knife enters the mansion of Puerto Rican governor Sila María
    Calderón and takes a secretary hostage. Calderón negotiates with him for the hostage's
    release, and the perpetrator is arrested soon after. (CNN)
  - 'Football: FC Porto defeat AS Monaco FC 3–0 in the final of the UEFA Champions
    League (BBC)'
