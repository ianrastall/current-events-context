Date: '2004-05-14'
Source_URI: Portal:Current events/2004 May 14
Intelligence_Payload:
  Uncategorized:
  - Vatican foreign minister Archbishop Giovanni Lajolo says torture of prisoners
    is a "more serious" blow for U.S. than September 11 (Al Jazeerah). American reaction
    is negative. (Catholic News)
  - The British tabloid newspaper The Daily Mirror, which published photos allegedly
    depicting British Army soldiers abusing Iraqi prisoners, concedes that it was
    hoaxed, apologises, and sacks its editor Piers Morgan. (BBC) (Al Bawaba) (Reuters)
  - Frederik, Crown Prince of Denmark, marries Australian Mary Donaldson in Copenhagen.
    The service is attended by royalty and dignitaries from around the world, amidst
    very high security in the face of terrorism fears. (BBC)
  - Roh Moo-hyun is reinstated as President of South Korea after that country's Constitutional
    Court overturns the National Assembly's March 12 impeachment vote against him.
    (KBS News)
  - Polish Prime Minister Marek Belka loses a parliamentary vote of confidence, less
    than two weeks after he was appointed to the post. He will continue in a caretaker
    capacity until a new candidate is appointed. (BBC) (PolitInfo)
  - The impact crater of the "Great Dying"—the end-Permian event, the largest extinction
    event in the history of life on Earth—appears to be a 125-mile (200-km)-wide crater
    called "Bedout" off the northwestern coast of Australia. (UCSB Press release)
  American occupation of Iraq and Iraqi resistance:
  - Mohammad's Army, in an interview with IWPR, states "We want to inform America
    that its attempt to stir up sectarian discord is a failure." (IWPR)
