Date: '2004-05-13'
Source_URI: Portal:Current events/2004 May 13
Intelligence_Payload:
  Uncategorized:
  - Scaled Composites sets a new civilian altitude record of 60 kilometres in a craft
    called SpaceShipOne during a test flight above California's Mojave Desert in preparation
    for the X-Prize. (CNN) (SPACE)
  - 'Abu Ghraib prisoner abuse: Some members of the British government begin to distance
    themselves from the Bush administration and Prime Minister Tony Blair. Peter Hain,
    Leader of the House of Commons, tells Parliament that the pictures are "appalling
    and possibly in breach of the Geneva Convention". (The Independent) (Guardian)'
  - Yang Jianli, a Chinese dissident with U.S. residency, is sentenced to five years
    in prison by the People's Republic of China for illegally entering the country
    and "spying for Taiwan". (BBC)
  - 'Indian general elections: Sonia Gandhi''s opposition Congress Party scores an
    upset victory as the vote is tallied for the formation of the 14th Lok Sabha.
    The ruling BJP-led coalition concedes defeat, and Prime Minister Atal Bihari Vajpayee
    resigns. (Indian Express) (CNN)'
  - The television sitcom Frasier airs its final episode, bringing to an end Kelsey
    Grammer's 23 years playing the character Frasier Crane. (Newsday)
  - A joint Polish–Egyptian archaeological team claims to have discovered the Library
    of Alexandria. (BBC)
  - Ontario New Democratic Party candidate Andrea Horwath wins the provincial riding
    of Hamilton East, returning the NDP to official party status in the Ontario Legislature.
    The by-election was held to replace Liberal MPP Dominic Agostino, who had died
    in office.
  Iraq Occupation and resistance:
  - A poll commissioned by the US-led Coalition Provisional Authority has found that
    80% of Iraqis distrust the occupying government and 82% want the U.S. and its
    allies to leave Iraq. (Seattle Times)
