Date: '2008-03-02'
Source_URI: Portal:Current events/2008 March 2
Intelligence_Payload:
  Uncategorized:
  - A Lufthansa Airbus 320 nearly crashes while landing in Hamburg, Germany due to
    high winds. The pilot was able to stabilize the plane and successfully landed
    on the second try. No one was injured. (Stern)
  - 'South American diplomatic crisis: President Hugo Chávez orders the closure of
    the Venezuelan embassy in Colombia and moves ten battalions to the Colombian-Venezuelan
    border in response to the killing of FARC leader Raúl Reyes in Ecuador by Colombian
    armed forces the previous day. Rafael Correa, the President of Ecuador, orders
    troops to the Colombian border. The Colombian government accuses Correa of having
    "a relationship and commitments" with FARC. (AP via Google News) (AP via Google
    News) (BBC News)'
  - Two bombings in quick succession hit a Russian police convoy in the town of Khasavyurt
    in the Republic of Dagestan. (AP via Fox News)
  - Eight people are killed in violent protests in Yerevan, Armenia, following protests
    over the outcome of the latest presidential election. (Reuters via The Sydney
    Morning Herald)
  - President of Iran Mahmoud Ahmadinejad arrives in Baghdad for the first state visit
    to Iraq by an Iranian president since the Iran-Iraq War. (AP via The Hindu)
  - Russian voters go to the polls to decide the country's next president. Dmitry
    Medvedev of the United Russia wins the election and is expected to succeed Vladimir
    Putin as the President of Russia. (The Independent)
