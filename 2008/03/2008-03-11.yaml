Date: '2008-03-11'
Source_URI: Portal:Current events/2008 March 11
Intelligence_Payload:
  Uncategorized:
  - '2008 United States presidential election: Illinois Senator Barack Obama wins
    the Mississippi Democratic primary. (The New York Times)'
  - The United States House of Representatives fails to override President Bush's
    veto of a bill outlawing waterboarding and other interrogation techniques. (AP
    via Google News)
  - Admiral William Fallon resigns as Commander of the U.S. Central Command due to
    reports in Esquire Magazine of disagreement with President George W. Bush over
    the administration's policy with Iran. (Reuters)
  - Cricket Australia and the Pakistan Cricket Board announce that the tour of Pakistan
    by the Australia national cricket team has been postponed due to security issues.
    (The Age)
  - The launches from Kennedy Space Center carrying the crew of STS-123, the Japanese
    Experiment Module, and Dextre. The ship will rendezvous with the International
    Space Station. (NASA)
  - At least 12 people are killed when a bomb explodes at offices of Pakistan's Federal
    Investigation Agency in Lahore. (AFP)
