Date: '2008-03-26'
Source_URI: Portal:Current events/2008 March 26
Intelligence_Payload:
  Uncategorized:
  - The Space Shuttle Endeavour lands at Cape Canaveral, Florida in a rare nighttime
    landing ending a 16-day mission to the International Space Station. (The New York
    Times)
  - Ford Motor Company announces it will sell its British luxury-car brands Jaguar
    and Land Rover to India's Tata Motors for $2.3 billion. (MarketWatch)
  - The United States embassy in Cairo confirms that the crew of a United States Navy-contracted
    ship killed an Egyptian when it opened fire on a small boat near the Suez Canal.
    (AFP via Google News)
  - The South Korean government decides to vote for a resolution on North Korean human
    rights violations in the United Nations Human Rights Council. (Chosun Ilbo)
  - A 41 km × 2.5 km chunk of ice (102.5 km², see size comparisons) breaks away from
    the Antarctic Wilkins ice shelf, heralding the disintegration of the remaining
    14,000 km2. (BBC News) (CNN)
  - A Californian federal judge has ruled that the heirs of Jerry Siegel have a valid
    claim to a share in the United States copyright which Time Warner holds in the
    Superman character. (NY Times)
  2008 unrest in Tibet:
  - The first foreign journalists allowed in Tibet since the outbreak of the unrest
    arrive in Lhasa. (AP via Google News)
  - The President of the United States of America George W. Bush calls the President
    of the People's Republic of China Hu Jintao to raise concerns about events in
    Tibet. (AP via Fox News)
  Iraq war:
  - The death toll from the Battle of Basra (2008) rises to 40 dead and 200 injured
    in two days of fighting between Shiite militias and the Iraqi military. (UK Press
    via Google News)
  - A federal indictment of a former official of Life for Relief and Development claims
    that Saddam Hussein's Iraqi Intelligence Service paid for a U.S. congressional
    delegation's trip to the country during the buildup to the war. A spokesman for
    the Department of Justice said the congressmen on the State Department-approved
    trip were not aware of this, and that "[n]one of the congressional representatives
    are accused of any wrongdoing." (CNN)
