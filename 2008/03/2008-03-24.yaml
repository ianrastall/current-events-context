Date: '2008-03-24'
Source_URI: Portal:Current events/2008 March 24
Intelligence_Payload:
  Uncategorized:
  - Serbia formally proposes partitioning Kosovo along ethnic lines, asking the United
    Nations to ensure that Belgrade can control key institutions and functions in
    areas of the newly independent country where Serbs form a majority. (The International
    Herald Tribune)
  - Relatives of victims of the Virginia Tech shooting report that the Government
    of Virginia will offer victims compensation of US$100,000 to forestall law suits.
    (AP via Houston Chronicle)
  - The Bhutan Peace and Prosperity Party wins Bhutan's first democratic general election,
    making Lyonpo Jigme Thinley the new Prime Minister elect. (Reuters)
  - The United States Department of Justice approves the merger of Sirius Satellite
    Radio and XM Satellite Radio. (The Wall Street Journal)
  - The Federal Bureau of Investigation identifies the bodies of two United States
    citizens working as contractors in Iraq kidnapped more than a year ago. (AP via
    Google News)
  - Marleen Veldhuis of the Netherlands] and Federica Pellegrini of Italy break world
    records at the final day of the European Swimming Championships in Eindhoven,
    Netherlands. (CNN)
  - Comoran army helicopters drop leaflets on the island of Anjouan warning the population
    of the imminent landing of its troops backed by African Union contingents. (france24)
  - Yusuf Raza Gilani of the Pakistan People's Party is elected Prime Minister of
    Pakistan by the National Assembly and vows to free Chief Justice Iftikhar Chaudhry
    and other judges from house arrest. (BBC News)
  - Former President of the Philippines Corazon Aquino, the leader of the 1986 People
    Power Revolution, is diagnosed with colon cancer. (Philippine Daily Inquirer)
  - The Olympic flame of the 2008 Summer Olympics is lit in Olympia, despite disruption
    by three protesters from Reporters Without Borders, among whom was Robert Ménard.
    (CNN) (Reporters Without Borders)
