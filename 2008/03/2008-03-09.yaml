Date: '2008-03-09'
Source_URI: Portal:Current events/2008 March 9
Intelligence_Payload:
  Uncategorized:
  - Swedish Minister for Foreign Affairs Carl Bildt says that Kosovo may become a
    European Union member state even if it is not a member of the United Nations.
    (Xinhua News Agency)
  - Kosovar Prime Minister Hashim Thaçi unveils a "Welcome to the Republic of Kosovo"
    sign (in Albanian, Serbian, and English) at the border with Serbia. (EuroNews)
  - Venezuela announces that it will reopen its embassy in Colombia and welcome back
    Colombian diplomats expelled during the regional diplomatic crisis. (AP via Google
    News)
  - French voters go to the polls for the municipal elections. (BBC News)
  - The Socialist Workers' Party wins the Spanish general election, with the People's
    Party conceding defeat. (BBC News)
  - An Ariane 5 rocket launches the first Automated Transfer Vehicle, Jules Verne,
    from the Guiana Space Centre in French Guiana. The spaceship will rendezvous with
    and provide supplies to the International Space Station on March 29. (ESA)
  - An Argentine train headed for Mar del Plata from Buenos Aires slams into a bus
    at a rural rail crossing near Dolores, killing 26 people and leaving at least
    60 others injured. (Gaulia.com - Actualidad) (Xinhua News Agency)
  - An official reports that last week a flight crew prevented an apparent attempt
    to crash a Chinese jetliner. (Reuters)
