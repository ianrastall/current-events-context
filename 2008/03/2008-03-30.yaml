Date: '2008-03-30'
Source_URI: Portal:Current events/2008 March 30
Intelligence_Payload:
  Uncategorized:
  - WrestleMania XXIV takes place from the Citrus Bowl with an all-time attendance
    record for the stadium at over 70,000 people.
  - Aloha Airlines, a Hawaii based airline which operates inter-island and trans-Pacific
    flights, has suspended all passenger services effective March 31, 2008, due to
    bankruptcy. (Honolulu Advertiser)
  - The enlargement of the EU's borderless zone to eight Eastern European countries
    and Malta is completed through the lifting of air border controls between them
    and the 15 countries already part of the area. (European Commission)
  - French architect Jean Nouvel wins one of the world's premier architecture honors,
    the Pritzker Prize. (The New York Times) (Gaulia) (Time Magazine)
  - 'Battle of Basra (2008): Shiite cleric Muqtada al-Sadr calls for his followers,
    the Mahdi Army, to lay down their arms and end their fighting with the Iraqi Army
    in Basra. (Fox News)'
  - North Korea threatens to cut off dialogue with South Korea over comments a South
    Korean military official reportedly made last week about a possible pre-emptive
    strike against the country. (Bloomberg)
  - A privately registered Cessna 501 Citation carrying five people crashes into two
    homes in Farnborough, Kent, United Kingdom, after taking off from London Biggin
    Hill Airport. (BBC News) Onboard were former racing drivers Richard Lloyd and
    David Leslie. (Sky News)
  - In track cycling, Ellen van Dijk won the women's scratch at the 2008 UCI Track
    Cycling World Championships. (Cylingnews) (WielerRevue)
