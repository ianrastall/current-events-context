Date: '2008-03-07'
Source_URI: Portal:Current events/2008 March 7
Intelligence_Payload:
  Uncategorized:
  - Václav Klaus is sworn in for another term as the President of the Czech Republic.
    (Xinhua)
  - Eight people are killed in separate attacks in central and western Kenya. (AP
    via USA Today)
  - In Germany the former Stasi informant Holm Singer won an interim injunction to
    prevent an exhibition from including his name and clandestine activities. (Reuters)
  - Former Olympic gold medalist Marion Jones reports to a Texas jail to begin a six-month
    sentence for perjury regarding past steroid use. (BBC News)
  - Colombia confirms the killing of FARC leader Iván Ríos by his chief of security.
    (AP via International Herald Tribune)
  - A United States Department of Labor report shows that the United States economy
    lost 63,000 jobs in February. (AFP)
  - The President of Venezuela Hugo Chávez calls for a cooling of tensions with Colombia
    at a summit of the Rio Group presidents in the Dominican Republic. The Rio Group
    later approves a declaration aimed at reducing tensions between, Ecuador, Venezuela
    and Colombia. (AP via Google News) (The Globe and Mail)
  - Pakistan's Election Commission announces the completed results of parliamentary
    election. (Reuters)
