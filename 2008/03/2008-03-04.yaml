Date: '2008-03-04'
Source_URI: Portal:Current events/2008 March 4
Intelligence_Payload:
  Uncategorized:
  - Brett Favre, quarterback of the Green Bay Packers announces his retirement from
    the NFL after 17 years.
  - First Minister of Northern Ireland Ian Paisley announces his intentions to stand
    down from the post in May 2008 and, at the same time, resign as leader of the
    DUP, a party he has led for almost 40 years. (RTÉ)
  - At least four people are killed and 14 injured in a suicide bombing at a naval
    college in the Pakistani city of Lahore. (BBC News)
  - United States Assistant Secretary of State for European and Eurasian Affairs Dan
    Fried estimates that Kosovo will need about $2 billion in foreign aid to become
    economically viable, and says that the United States will participate in a major
    donors' conference on Kosovo in June. (Reuters)
  - India wins cricket's Commonwealth Bank Series in Australia. (BBC Sport)
  United States presidential election, Super Tuesday II:
  - Arizona Senator John McCain wins the Vermont, Texas, Rhode Island, and Ohio Republican
    primaries, giving him enough delegates to be able to win the Republican Party
    nomination. (MSNBC)
  - Former Governor of Arkansas Mike Huckabee withdraws his candidacy. (CNN)
  - Illinois Senator Barack Obama wins the Vermont Democratic primary. (MSNBC)
  - New York Senator Hillary Clinton wins the Rhode Island, Ohio, and Texas Democratic
    primaries.(ABC News)
