Date: '2008-03-25'
Source_URI: Portal:Current events/2008 March 25
Intelligence_Payload:
  Uncategorized:
  - Liechtenstein recognizes Kosovo as an independent state. (Government of Liechtenstein)
  - French President Nicolas Sarkozy says he might boycott the opening ceremony of
    the Beijing Olympics if China continues its crackdown in Tibet. (Reuters)
  - 'Adam Air Flight 574: A final report finds the 102 on board died when pilots preoccupied
    with an instrument failure did not realise the 737 was descending out of control.
    (Xinhua) (Wikinews)'
  - 'Iraq War: Heavy fighting rages in Basra as thousands of Iraqi troops battle Shia
    militants. (BBC News)'
  - The Comoros army supported by African Union troops invade Anjouan. (BBC News)
  - The Tibetan government in exile estimates that the death toll in the 2008 unrest
    in Tibet is approximately 140. (AP via The International Herald Tribune)
  - In Sitka, Alaska a man with a knife kills four people and seriously injures one
    other before being subdued by police. (ADN)
