Date: '2008-03-06'
Source_URI: Portal:Current events/2008 March 6
Intelligence_Payload:
  Uncategorized:
  - The discovery of the Rings of the Saturnian moon Rhea, the first known rings around
    a moon, is announced. (NASA)
  - The United States Senate passes legislation providing for more rigorous inspection
    of toys and other playthings imported into the United States. (AP via USA Today)
  - At least eight people, including four children, are killed and dozens wounded
    in a shooting attack on the Mercaz HaRav yeshiva in Jerusalem. (AP via WTVJ)
  - At least 54 people die and 130 are injured as two bombs explode in Baghdad, Iraq.
    (BBC News)
  - Viktor Bout, one of the world’s most notorious arms dealers, is arrested at a
    hotel in Thailand. (The New York Times)
  - Paul Burrell, Princess Diana's butler, refuses to be questioned about whether
    he lied to the inquest into her death in 1997. (Reuters)
  - A bomb causes minor damage to the door of a U.S. military recruiting center in
    Times Square, New York City. (Reuters)
  - Philippine authorities arrest three people accused of plotting terrorist attacks
    on foreign embassies in Manila. (BBC News)
