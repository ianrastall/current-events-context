Date: '2008-03-19'
Source_URI: Portal:Current events/2008 March 19
Intelligence_Payload:
  Uncategorized:
  - An audio tape with a voice believed to be Al-Qaeda leader Osama bin Laden's is
    released, criticizing the European Union for allowing publication of cartoons
    that he claims insulted the Prophet Mohammed and threatening a strong reaction.
    (AP via Google News)
  - Early elections are called for May 2008 in Kuwait after a crisis between the cabinet
    and parliament leads the emir Sabah al-Sabah to dissolve parliament. (BBC News)
  - Bulgaria, Croatia, Hungary and Monaco jointly recognize Kosovo's independence.
    (Ministry of Foreign Affairs, Bulgaria) (AFP via Google News) (Balkan Insight)
  - Foreign Minister of Russia Sergey Lavrov states that "the Albanians in Macedonia
    have already made demands that they be granted such autonomy...which could be
    seen as a move towards independence." The Foreign Ministry also linked the events
    in Tibet with the declaration of independence by Kosovo, showing a growing movement
    of groups seeking independence. (Makfax) (Ria Novosti)
  - The Parliament of Pakistan elects Fahmida Mirza as its first female speaker. (BBC
    News)
