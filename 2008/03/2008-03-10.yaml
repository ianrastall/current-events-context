Date: '2008-03-10'
Source_URI: Portal:Current events/2008 March 10
Intelligence_Payload:
  Uncategorized:
  - Eight United States Army soldiers are killed in two bombings in Iraq. (AP via
    Google News)
  - The Serbian government adopts a policy to dismiss the National Assembly of Serbia
    and hold elections later in the year. (Xinhua)
  - Governor of New York Eliot Spitzer is linked with a criminal investigation of
    an international online prostitution ring. (The New York Times)
  - Yahoo! tops the list in the first attempt to quantify the data collected from
    Web users for Internet marketing. (The New York Times)
  - The Nationalist Party wins the general election in Malta, by a relative majority
    of 1,580 vote over the Labour Party. (Department of Information, Malta)
  - Sri Lankan voters in the Batticaloa district, an area formerly controlled by the
    Tamil Tigers, go to the polls in local government elections for first time in
    ten years. (BBC News)
