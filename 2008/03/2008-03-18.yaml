Date: '2008-03-18'
Source_URI: Portal:Current events/2008 March 18
Intelligence_Payload:
  Uncategorized:
  - In an address to the Israeli Knesset, German Chancellor Angela Merkel says "Germany
    will always stand by the Jewish state." (Reuters)
  - The United States Federal Reserve System cuts the federal funds rate by 75 basis
    points to 2.25%. (AP via Yahoo! Finance)
  - The United States embassy in Yemen is closed after three mortar shells detonate
    near the embassy compound. Two people are killed in the attack. (CNN) (AFP via
    Google News)
  - The Organization of American States condemns Colombia's recent raid into Ecuador's
    territory as "a clear violation of the OAS charter." (VOA)
  - Police in Manipur, India claim a rebel group has killed seven migrant workers.
    (BBC News)
  - '2008 National People''s Congress: At the concluding press conference, Premier
    of the People''s Republic of China Wen Jiabao asserts the Chinese government exercised
    restraint in suppressing the 2008 unrest in Tibet. Wen also accused the Dalai
    Lama of inciting the protests. (Xinhua) (AP via Google News)'
  - Canada and Japan recognize Kosovo's independence. (CBC) (Ministry of Foreign Affairs
    of Japan)
  - French Foreign Minister Bernard Kouchner says the EU should consider punishing
    China's crackdown in Tibet with a boycott of the opening ceremony of the Olympic
    Games in Beijing. (International Herald Tribune)
  - The Netherlands sets a new world record in the 400-metres relay at the European
    swimming championships in Eindhoven. (Associated Press)
  - Sweden’s Supreme Court rules in favor of late film director Vilgot Sjöman who
    had sued a TV channel for copyright infringement after it ran three commercial
    breaks during the director's film. (Dagens Nyheter) (SR International)
