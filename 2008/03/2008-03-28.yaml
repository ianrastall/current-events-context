Date: '2008-03-28'
Source_URI: Portal:Current events/2008 March 28
Intelligence_Payload:
  Uncategorized:
  - Norway and South Korea recognize Kosovo as an independent state. (Government of
    Norway) (Government of South Korea)
  - 'Dwain Chambers: BBC, Sky Sports & The Sun newspaper are all carrying reports
    that Chambers is to announce he is to become an English rugby league player with
    Castleford Tigers. Chambers was previously an athlete and American Football player.
    (BBC News)'
  - '2008 unrest in Tibet: About 18 protesting Tibetan exiles scale the walls of the
    United Nations compound in Kathmandu, Nepal as Nepalese police arrest another
    40 protestors. (AP via The International Herald Tribune)'
  - North Korea fired a volley of missiles into the sea warning that it might stop
    disabling its nuclear facilities unless the United States dropped its demands
    for more details about North Korea's nuclear arsenal. A day before, North Korea
    expelled 11 South Korean officials from an industrial park north of the border
    that separates the two Koreas. (Reuters via The Washington Post)
  - Australian swimmer Eamon Sullivan breaks the 50m Freestyle World Record with a
    time of 21.28 seconds. (AP via The International Herald Tribune)
