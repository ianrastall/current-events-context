Date: '2008-03-27'
Source_URI: Portal:Current events/2008 March 27
Intelligence_Payload:
  Uncategorized:
  - '2008 Mahdi Army revolt: Iraqi authorities impose a curfew until Sunday in a bid
    to stop clashes with Shiite militants. (AFP via France 24)'
  - Geert Wilders releases his controversial anti-Islam film, Fitna. (BBC News)
  - Puerto Rican Governor Aníbal Salvador Acevedo Vilá and twelve others are charged
    with electoral fraud. (Reuters)
  - Germany scraps plans to build the Transrapid high-speed monorail link between
    the Bavarian capital Munich and its airport because of a massive overrun in costs.
    (Deutsche Welle)
  - Airbus parent EADS wins a £13 billion contract for airtankers from the United
    Kingdom. (The International Herald Tribune) (Wikinews)
  - The oldest known recording of a human voice, created with a phonautograph by Édouard-Léon
    Scott de Martinville on April 9, 1860 is replayed by American researchers. (The
    New York Times)
  - A gunman opens fire at Doctors Hospital in Columbus, Georgia, United States, killing
    two people and critically wounding one other who later died of his injuries before
    being shot and wounded by police. (WTVM)
