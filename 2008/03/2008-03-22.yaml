Date: '2008-03-22'
Source_URI: Portal:Current events/2008 March 22
Intelligence_Payload:
  Uncategorized:
  - Ma Ying-jeou is elected President of the Republic of China with more than 58%
    of the votes in the 2008 presidential election, handing the presidency back to
    the Kuomintang (KMT) after eight years under the Democratic Progressive Party.
    (Bloomberg)
  - Magdi Allam, the most prominent Muslim in Italy, converts to Catholicism and is
    baptized by Pope Benedict XVI. (AP via Yahoo! News)
  - A Ukrainian tug and a China-registered bulk carrier have collided east of the
    Brothers Island on the Urmston Channel in Hong Kong at night; the tug has sunk,
    7 crew members on board were rescued, but the remaining 18 crew members were missing.
    (HK Government Press Releases)
