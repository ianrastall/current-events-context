Date: '2008-03-13'
Source_URI: Portal:Current events/2008 March 13
Intelligence_Payload:
  Uncategorized:
  - 'Darfur Conflict: Chad''s President Idriss Déby and Sudan''s President Omar al-Bashir
    meet in Senegal to sign the Dakar Agreement, the sixth peace agreement in five
    years. (BBC News)'
  - The Canadian House of Commons extends the Canadian military mission in Afghanistan
    until 2011. (CBC)
  - The body of Mar Paulos Faraj Rahho, the Chaldean Catholic archbishop of Mosul
    who was kidnapped in Iraq on February 29, is found in a shallow grave close to
    the city. (Reuters)
  - The price of gold reaches $1000 per troy ounce for the first time. (BBC News)
  - Serbian President Boris Tadić disbands parliament and calls an early general election
    for May 11. (BBC News)
  - 'Democratic Party (United States) presidential primaries, 2008: Geraldine Ferraro
    resigns from the Clinton campaign after making comments that "if Obama was a white
    man, he would not be in this position." (The New York Times)'
  - The U.S. dollar, after repeatedly testing 100 yen in Asian dealings and early
    European action, breaks through to touch 99.75, its lowest level since November
    1995. (Reuters)
  - Melbourne, Adelaide and Hobart experience some of their warmest weather of record
    for this season as result of an Australian autumn heatwave. (The Age)
  - Leaders of the European Union meet in Brussels, Belgium with climate change and
    energy security dominating the agenda. (BBC News)
  - Turkish prosecutor Abdurrahman Yalçınkaya asks the Constitutional Court of Turkey
    to ban the ruling Justice and Development Party for anti-secular activities. (BBC
    News)
