Date: '2008-03-05'
Source_URI: Portal:Current events/2008 March 5
Intelligence_Payload:
  Uncategorized:
  - The first plenary session of the 11th National People's Congress begins in China.
    Premier Wen Jiabao delivers the last annual government report in his first term
    of office. (Xinhua)
  - Jimmy Wales, co-founder of Wikipedia, is facing allegations that he used the Wikimedia
    Foundation funds to pay for personal expenses. (The Washington Post)
  - U.S. Republican presidential nominee John McCain is endorsed by President George
    W. Bush. (ABC News)
  - Warren Buffett, CEO of Berkshire Hathaway, is named the richest person in the
    world by Forbes magazine. (Forbes)
  - Saudi Arabia announces plans to execute a Canadian man and a Saudi friend convicted
    of murder by beheading them in public. (Arab News) (Canwest News)
  - A manmade flood is created in the Grand Canyon in Arizona in an attempt to replenish
    the ecosystem in the gorge. (CNN)
