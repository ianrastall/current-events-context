Date: '2008-03-14'
Source_URI: Portal:Current events/2008 March 14
Intelligence_Payload:
  Uncategorized:
  - Queen Elizabeth officially opens London Heathrow Airport's new Terminal 5. (The
    New York Times)
  - Colombian Ministry of National Defense Juan Manuel Santos says the government
    will pay US$2.5 million to Pedro Pablo Montoya, the FARC rebel who killed Iván
    Ríos. (BBC News)
  - Muhammed Rahim, an al-Qaeda member who helped Osama bin Laden escape from Tora
    Bora, Afghanistan in 2001, is taken to the Guantanamo Bay detention camp. (BBC
    News)
  - After a summit in Brussels, European Union leaders agree to a 20% reduction in
    greenhouse gases by 2020. (BBC News)
  - United States investment bank Bear Stearns gets emergency funding from JPMorgan
    Chase, with the Federal Reserve Bank of New York's backing. (BBC News)
  - An EF2 tornado hits Atlanta, Georgia, damaging many buildings including the CNN
    Center, the Georgia Dome, the World Congress Center and the Philips Arena. (BBC
    News)
  - Iranian voters go to the polls in legislative election. Nearly 90 percent of reformist
    candidates have been disqualified from the election. (BBC News)
  - Seven are reported dead in Lhasa, Tibet as protests turn violent. Protests began
    Monday on the anniversary of the failed 1959 Tibetan uprising with calls for the
    release of detained Buddhist monks. Other protests followed calling for Tibetan
    independence and displaying the banned Tibetan national flag. (CNN) (AP via the
    Houston Chronicle)
  - Venezuelan President Hugo Chávez dares the United States to designate Venezuela
    as a state sponsor of terrorism. (AP via CNN)
  - Saint Patrick's Day happens today, not the usual March 17th. (USA Today)
