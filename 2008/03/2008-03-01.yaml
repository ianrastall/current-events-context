Date: '2008-03-01'
Source_URI: Portal:Current events/2008 March 1
Intelligence_Payload:
  Uncategorized:
  - Two IDF soldiers and at least 50 Palestinians are killed during an Israeli military
    operation in the Gaza Strip. (Jerusalem Post)
  - A wind storm in Europe kills four people in Austria, two people in Germany, and
    two people in the Czech Republic. (AFP)
  - The President of Armenia Robert Kocharyan declares a state of emergency following
    anti-government protests in Yerevan. (Reuters)
  - Raúl Reyes, the second in command of the FARC guerilla organization, is killed
    in a Colombian military operation in northern Ecuador. (El Tiempo)
  - Renewed violence erupts in the Abyei region of Sudan. Approximately 70 deaths
    are reported and analysts warn that further conflict could threaten the peace
    process. (Reuters Alertnet)
