Date: '2008-03-20'
Source_URI: Portal:Current events/2008 March 20
Intelligence_Payload:
  Uncategorized:
  - Yves Leterme is sworn in as Prime Minister of Belgium. (The Guardian)
  - The Vice-President of the United States Dick Cheney makes an unannounced visit
    to Afghanistan to hold discussions with the President of Afghanistan. (Reuters)
  2008 unrest in Tibet:
  - The Xinhua news agency reports for the first time that protests have spread to
    neighbouring provinces of Sichuan and Gansu as the Chinese authorities attempt
    to regain control. (AP via Google News)
  - The Dalai Lama offers to meet with senior Chinese officials including the President
    of the People's Republic of China Hu Jintao. (Canadian Press via Google News)
  - China dispatches convoys to Tibet consisting of thousands of soldiers and hundreds
    of police vehicles. (AFP via Google News)
