Date: '2008-03-23'
Source_URI: Portal:Current events/2008 March 23
Intelligence_Payload:
  Uncategorized:
  - Farouk Abdulhak, prime suspect in the murder of Martine Vik Magnussen, turns up
    in Yemen. (Daily Telegraph)
  - U.S. military casualties in the Iraq War reach 4,000. (CNN)
  - An agreement on talks to resolve the Fatah–Hamas conflict is reached in Sana'a,
    Yemen. (Washington Post)
  - Kimi Räikkönen of Finland wins the Malaysian Grand Prix in Sepang. (BBC News)
  - Rajiv Gandhi International Airport in Hyderabad, Telangana India is constructed
    officially replacing Begumpet Airport which commences civil operations.
