Date: '2008-03-03'
Source_URI: Portal:Current events/2008 March 3
Intelligence_Payload:
  Uncategorized:
  - The remains of Padre Pio, the Capuchin monk who died in 1968 after living for
    decades with inexplicable, bleeding wounds on his hands and feet, are exhumed.
    (AP via International Herald Tribune)
  - Iran considers shutting down private access to Internet service during its legislative
    elections. (International Herald Tribune)
  - The U.N. Security Council approves a third round of sanctions against Iran with
    near unanimous support. (AP via Yahoo! News)
  - A U.S. Navy submarine conducts at least one missile strike using Tomahawk cruise
    missiles in Somalia. The attack was aimed at Saleh Ali Saleh Nabhan, an al-Qaeda
    terrorist. (AFP via Google News) (AP via Yahoo! News) (CNN)
  - A Pentagon report to the United States Congress states that the Peoples Republic
    of China's reluctance to explain the extent and purpose of its military buildup
    poses a risk to stability in Asia. (AP via Google News)
  - Androulla Vasiliou replaces Markos Kyprianou as European Commissioner for Health.
    (European Council)
  - Earth Liberation Front sets fires to five model luxury homes in Woodinville, Washington
    in an act of eco-terrorism. (CNN) (AP via Yahoo! News) (KIRO-TV)
  - A gunman opens fire at a Wendy's restaurant in West Palm Beach, Florida, killing
    one person and critically wounding three others before committing suicide. (ABC
    News) (AP via Yahoo! News)
  - Albertans go to the polls in a provincial general election, electing an eleventh
    straight Progressive Conservative government. (CBC)
