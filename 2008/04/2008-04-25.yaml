Date: '2008-04-25'
Source_URI: Portal:Current events/2008 April 25
Intelligence_Payload:
  Uncategorized:
  - Some forty people are injured when the floor of a Mennonite church collapses during
    a Christian rock concert in Abbotsford, British Columbia. (CTV), (CBC)
  - Two people are killed and more than a dozen injured after a semitrailer crashes
    into a Chicago Transit Authority station during rush hour. (AP via International
    Herald Tribune)
  - 'Sri Lankan Civil War: At least 24 people are killed by a blast on a bus near
    Colombo. (BBC News)'
  - Actor Wesley Snipes is sentenced to three years in prison for tax violations.
    (The New York Times)
  - A United States military-contracted vessel fires warning shots in front of two
    boats in the Persian Gulf, causing the boats to leave. (AP via MSNBC)
  - Students and their families in various locations across the United States participate
    in the nationally-recognized 13th annual Day of Silence. (Seattle Post-Intelligencer)
