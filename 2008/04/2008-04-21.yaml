Date: '2008-04-21'
Source_URI: Portal:Current events/2008 April 21
Intelligence_Payload:
  Uncategorized:
  - Rioting breaks out in Montreal after the Montreal Canadiens of the NHL win their
    first round playoff series against the Boston Bruins. Several police cars are
    torched, but there are no reports of any serious injuries. (Canadian Press via
    Globe and Mail)
  - A missile hits the headquarters of the Supreme Islamic Iraqi Council political
    party in Baghdad. No one is reported injured. (Reuters)
  - A boat carrying Haitian immigrants capsizes off the coast of the Bahamas. At least
    20 deaths are reported by the United States Coast Guard. (BBC News)
