Date: '2008-04-18'
Source_URI: Portal:Current events/2008 April 18
Intelligence_Payload:
  Uncategorized:
  - CNN news anchor Richard Quest is arrested for possession of methamphetamine in
    New York's Central Park. (Reuters)
  - A Texas judge rules that 418 children taken from the YFZ Ranch should remain in
    state custody for 60 days. (Ft. Worth Star-Telegram)
  - South Korea agrees to open its market to beef from the United States ahead of
    trade talks. (Reuters via The Washington Post)
  - A magnitude 5.2 earthquake occurs at 04:37 Central Standard Time with its epicenter
    six miles (10 km) from West Salem, Illinois. Effects are felt as far off as Evansville,
    St. Louis, Indianapolis, Detroit and Cleveland. While shaking was reported in
    Chicago, St. Louis and Cincinnati, there are few reports of damage. (AP via Yahoo!
    News) (USGS)
