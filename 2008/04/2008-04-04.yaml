Date: '2008-04-04'
Source_URI: Portal:Current events/2008 April 4
Intelligence_Payload:
  Uncategorized:
  - Former commander of the rebel Kosovo Liberation Army during the 1998–99 war Ramush
    Haradinaj is acquitted of war crimes charges by the International Criminal Tribunal
    for the former Yugoslavia. (AP via The International Herald Tribune)
  - United States airline Skybus announces that it will be shutting down Saturday
    and cancels all flights. (Columbus Dispatch)
  - The United States Department of State renews the contract of Blackwater Worldwide
    to provide security in Iraq despite a number of ongoing investigations. (ABC News)
  - A suicide bomb attack kills three policemen and a civilian in southern Afghanistan.
    (AP via Google News)
  - The luxury yacht Le Ponant is seized by pirates off the Somalian coast. (BBC)
