Date: '2008-04-16'
Source_URI: Portal:Current events/2008 April 16
Intelligence_Payload:
  Uncategorized:
  - A Zimbabwean judge clears two British journalists of reporting on the 2008 presidential
    election without accreditation. (AP via the San Francisco Chronicle)
  - Around 44 people, mostly children, die after a bus plunges into the Narmada River
    in the western Indian state of Gujarat. (BBC News)
  - The United States Supreme Court upholds the constitutionality of lethal injection
    as a form of capital punishment over Eighth Amendment "cruel and unusual punishment"
    challenges. (BBC News)
