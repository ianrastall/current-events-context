Date: '2008-04-29'
Source_URI: Portal:Current events/2008 April 29
Intelligence_Payload:
  Uncategorized:
  - Economy of the United States
  - The S&P/Case-Shiller index of United States real estate pricing shows a decline
    of 12.7% from February 2007 to February 2008, with 17 of 20 regions showing falls.
    (BBC News)
  - The United States Consumer Confidence Index falls again in April due to concerns
    over the rising price of petroleum and weaker job prospects. (AP via Google News)
  - Grand Theft Auto IV is released worldwide, sparking a windfall of sales. The game
    would go on to become the fastest selling game in 24 hours by selling 609,000
    copies. (TeamBox) (Ars Technica)
  - The Secretary-General of the United Nations Ban Ki-moon establishes a task force
    to tackle the 2007–2008 world food price crisis. (AP via Google News)
  - An explosion in the Nangarhar Province of Afghanistan kills at least 15 Afghans
    with another 25 injured. (Reuters via The Washington Post)
  - The European Union signs the Stabilisation and Association Agreement with Serbia
    prior to the decisive elections on 11 May 2008, but makes ratification conditional
    on full cooperation with the ICTY. (EUobserver)
  - Lithuania blocked the beginning of talks on a strategic deal between the European
    Union and Russia because of ongoing disputes with Moscow (M & C News)
