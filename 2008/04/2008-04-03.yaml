Date: '2008-04-03'
Source_URI: Portal:Current events/2008 April 3
Intelligence_Payload:
  Uncategorized:
  - An Antonov An-28 operated by Blue Wing Airlines crashes upon landing in Benzdorp,
    Suriname. All nineteen on board are presumed dead. (BBC News)
  - Bagatur is named the acting Chairman of Inner Mongolia, succeeding Yang Jing,
    who is the new minister in charge of the State Ethnic Affairs Commission.(Xinhua)
  - Jules Verne, the first European Automated Transfer Vehicle, successfully performs
    a fully automated docking with the International Space Station. (ESA)
  - In a procedural decision, the European Court of Justice overturns the addition
    of the Kurdish rebel organization PKK to the EU's terrorist blacklist. (BBC News)
  - Serbian Minister on Kosovo Slobodan Samardžić submits to UNMIK a plan suggesting
    Kosovo's division into cantons along ethnic lines. (Tanjug via Portalino)
  - Greek and Turkish Cypriots open a crossing at Ledra Street, a main shopping street
    in Cyprus' divided capital Nicosia that has come to symbolize the island's ethnic
    partition. (AP via The International Herald Tribune)
  - The Iraqi military says a suicide bomber has attacked a checkpoint near Mosul,
    killing 7 people and wounding 12. (AP via Google News)
  - At its summit in Bucharest, NATO invites Albania and Croatia to join the alliance.
    (Washington Post)
  Zimbabwean presidential election, 2008:
  - Police in riot gear surround a hotel in Harare housing foreign journalists. New
    York Times correspondent Barry Bearak, Daily Telegraph correspondent Stephen Bevan,
    and two others are arrested. (The Christian Science Monitor)
  - MDC Secretary-General Tendai Biti reports that police have begun raiding opposition
    party offices in an apparent "crackdown". (AP via MSNBC)
