Date: '2008-04-15'
Source_URI: Portal:Current events/2008 April 15
Intelligence_Payload:
  Uncategorized:
  - A five-year ban preventing prominent Malaysian Opposition figure Anwar Ibrahim
    from running for office in Malaysia effectively expires midnight (MST). (BBC News)
    (Reuters)
  - A plane from Hewa Bora Airways crashes in the Democratic Republic of Congo, killing
    at least 44. (Associated Press) (Radio Okapi)
  - 'Iraq War: Two separate bombings in Baquba and Ramadi kills at least 60. (CNN)'
  - Six students and a teacher from Manukau City's Elim Christian College die in a
    canyoning trip on the Mangatepopo Stream in the North Island's Tongariro National
    Park in New Zealand. (News Limited)
  - Pope Benedict XVI visits the United States, starting in Washington, D.C.
