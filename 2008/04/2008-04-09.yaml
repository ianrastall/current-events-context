Date: '2008-04-09'
Source_URI: Portal:Current events/2008 April 9
Intelligence_Payload:
  Uncategorized:
  - The Olympic torch relay through San Francisco descends into confusion as the first
    runner in the elaborately planned relay disappears into a warehouse on a waterfront
    pier. (MarketWatch)
  - The body representing all National Olympic Committees says it had deleted a mention
    of Tibet in its Beijing Games declaration after a debate among its members. (The
    International Herald Tribune)
  - American Airlines cancels more than 1,000 flights in order to make sure some wiring
    on its fleet of 300 MD-80 jetliners was secured correctly inside wheel wells.
    (The New York Times)
  - Police in Nepal shoot dead six Maoists the day before the holding of Constituent
    Assembly elections. (ABC Radio Australia)
  - Her Majesty's Most Honourable Privy Council approves changes to the system of
    government on Sark, ending about 450 years of feudalism on the Channel Island.
    (The Independent)
