Date: '2008-04-07'
Source_URI: Portal:Current events/2008 April 7
Intelligence_Payload:
  Uncategorized:
  - The European Commission approves the use of mobile phones on European flights.
    (Gaulia.com)
  - The Kansas Jayhawks defeat the Memphis Tigers in overtime, 75-68, to win the 2008
    U.S. Division I men's college basketball championship. (ESPN)
  - The Washington Post wins six Pulitzer Prizes including the Pulitzer Prize for
    Public Service for a series of articles of poor conditions for veterans at the
    Walter Reed Army Medical Center. (The Washington Post)
  - 2008 Summer Olympics
  - The Olympic torch is extinguished by officials as police are confronted by protesters
    during the Olympic torch relay through Paris. (BBC News)
  - U.S. Senator (D-NY) Hillary Clinton calls on President George W. Bush to boycott
    the opening ceremony at the Summer Olympics in Beijing. (ABC News)
  - The head of the International Olympic Committee Jacques Rogge says he's "very
    concerned" about unrest in Tibet and other issues associated with the Summer Olympics.
    (France 24)
  - The Beijing Organizing Committee for the Games of the Summer Olympiad claims that
    the "Olympic torch has received a warm welcome worldwide." (Beijing 2008)
  - China and New Zealand sign a free trade agreement. This is China's first trade
    agreement with a developed nation. (The New York Times)
