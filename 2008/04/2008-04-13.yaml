Date: '2008-04-13'
Source_URI: Portal:Current events/2008 April 13
Intelligence_Payload:
  Uncategorized:
  - Trevor Immelman of South Africa wins the 2008 Masters Tournament. (Reuters via
    ABC)
  - Robert Zoellick, the president of the World Bank, calls for immediate action to
    tackle rising food prices which have caused rioting in several countries. (AP
    via Google News)
  - Deputy Prime Minister of Kosovo Hajredin Kuçi announces that the newly independent
    country plans to open 20 embassies abroad. (PressTV)
  - The Prime Minister of Australia Kevin Rudd announces that current Governor of
    Queensland Quentin Bryce will become Australia's next Governor-General. Ms Bryce
    will be the first woman appointed to the role. (News.com.au)
  - Thousands of pro-China demonstrators gathered in front of the Canadian Parliament
    Building in Ottawa to show their support for the Chinese government and 2008 Beijing
    Olympics. (CTV)
