Date: '2008-04-28'
Source_URI: Portal:Current events/2008 April 28
Intelligence_Payload:
  Uncategorized:
  - Tornadoes of 2008
  - Tornadoes sweep through central and southeastern Virginia injuring more than 200
    people and damaging multiple houses. (AP via The Southern Ledger)
  - The National Weather Service states that tornadoes hit Suffolk, Virginia, Colonial
    Heights, Virginia and Brunswick County, Virginia. (AP via Google News)
  - The Governor of Virginia Timothy Kaine declares a state of emergency in southern
    Virginia. (AP via Google News)
  - Officials with the Texas Department of Family and Protective Services find that
    31 of the 53 girls between ages 14 and 17 seized from the YFZ Ranch have been,
    or are currently, pregnant. (AP via Fox News)
  - General Motors announces that it will cut production of pickup trucks and sport
    utility vehicles in three plants in Michigan and one in Oshawa, Ontario and negotiate
    layoffs with the United Auto Workers and Canadian Auto Workers. (Reuters via The
    Guardian)
  - The United States Armed Forces says that three American soldiers have been killed
    in rocket or mortar attack in eastern Baghdad. (AP via Google News)
  - The Supreme Court of the United States issues a decision upholding an Indiana
    law requiring voters to provide photo identification. (Reuters)
  - Mars, Incorporated announces that it is buying the Wm. Wrigley Jr. Company, the
    world's largest chewing gum manufacturer, in a deal worth $23 billion. The deal
    is being partly financed by Warren Buffett's Berkshire Hathaway company. (Bloomberg)
  - Two passenger trains collide in Zibo in Shandong province in eastern China resulting
    in the deaths of at least 71 people. (UK Press Association via Google News) (AFP
    via Google News) (AP via Yahoo! News)
