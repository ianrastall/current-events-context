Date: '2008-04-01'
Source_URI: Portal:Current events/2008 April 1
Intelligence_Payload:
  Uncategorized:
  - A human rights group in Sri Lanka has blamed local security forces for the massacre
    of 17 aid workers in 2006 and accused the government of a cover-up. (BBC News)
  - The Swedish national postal service will merge with its Danish counterpart, the
    new group will be based in Stockholm. (Reuters)
  - Finland's Foreign Minister Ilkka Kanerva is forced to resign after a scandal involving
    200 text messages sent to a stripper. (AP via CNN.com)
  - India warns the Dalai Lama not to anger the People's Republic of China. (BBC News)
  - Delays in releasing the official results of parliamentary and presidential elections
    in Zimbabwe are met with widespread speculation and concerns over possible vote
    rigging. (CNN) (BBC News)
