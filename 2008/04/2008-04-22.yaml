Date: '2008-04-22'
Source_URI: Portal:Current events/2008 April 22
Intelligence_Payload:
  Uncategorized:
  - Costa Rica rejects an application for political asylum by former Colombian Senator
    Mario Uribe following orders for Uribe's arrest on charges of ties with paramilitary
    groups. Uribe is then arrested. (AP via Google News) (AP via Fox News)
  - A U.S. federal grand jury in Las Vegas, Nevada, indicts a man on charges of possessing
    the toxin ricin and on weapons charges. (AP via Google News)
  - Ben-ami Kaddish, a former U.S. Army mechanical engineer, is arrested on charges
    of disclosing national defense information to Israel. (FOX News)
  - The United States Secretary of State Condoleezza Rice says that former President
    of the United States Jimmy Carter was advised not to hold talks with Hamas. (Reuters)
  - Zimbabwe churches claim that people are being tortured, abducted and some murdered
    in a campaign of political retribution against the opposition Movement for Democratic
    Change. (AP via Google News)
  - 'Democratic Presidential primaries: Hillary Clinton wins the Pennsylvania Primary.
    (CNN)'
