Date: '2008-04-06'
Source_URI: Portal:Current events/2008 April 6
Intelligence_Payload:
  Uncategorized:
  - Mark Penn resigns as chief strategist for the Hillary Clinton 2008 presidential
    campaign. This comes in the wake of revelations that he performed lobbying work
    for the Colombian government, regarding a free trade pact that Senator Clinton
    opposes. (NPR)
  - One man grabs the Olympic torch before police wrestle him to the ground as thousands
    of anti-China protesters disrupt the Olympic torch relay through London. (The
    Daily Telegraph) (BBC News)
  - President of the United States George W. Bush and President of Russia Vladimir
    Putin hold their final talks in their current positions. (AP via Google News)
  - At least ten people including Government minister Jeyaraj Fernandopulle are killed
    in an explosion near Colombo, Sri Lanka. (BBC News)
  - Vandals desecrate 148 Muslim graves in France's biggest World War I cemetery at
    Notre Dame de Lorette outside Arras in northern France. (Reuters)
  Iraq War:
  - Gunmen kidnap 42 university students near the Iraqi city of Mosul. They are later
    released unharmed. (AP via Yahoo! News)
  - Twenty people are killed and 50 injured in overnight clashes in Sadr City in Baghdad.
    (AP via Yahoo! News) (CNN)
  - A rocket attack on the Green Zone in Baghdad results in the death of two United
    States Army soldiers and 17 injuries. (AP via Google News)
