Date: '2008-04-10'
Source_URI: Portal:Current events/2008 April 10
Intelligence_Payload:
  Uncategorized:
  - Mayor Anders Lago of Södertälje, Sweden, says that his small city of about 80,000
    is currently home to nearly 6,000 Iraqis. "More refugees than the United States
    and Canada together". (The International Herald Tribune)
  - Frontier Airlines files for bankruptcy protection. (AP via Google News)
  - A suicide car bomber attacks a NATO convoy in Kandahar, resulting in the death
    of eight citizens. (Reuters)
  - Nepal prepares for an election that will decide the new Constituent Assembly,
    tasked with rewriting the constitution. The fate of the monarchy is also at stake.
    (The New York Times)
  2008 Summer Olympics:
  - The European Parliament passes a resolution in favor of a boycott of the opening
    ceremonies of the Beijing Olympiad. (Deutsche Welle)
  - IOC president Jacques Rogge calls for China to respect its commitment to improve
    human rights ahead of the Beijing Games. (The Herald)
  - The Olympic torch arrives in Buenos Aires for the Olympic torch relay under heavy
    security. (AFP via ABC News Australia)
