Date: '2008-02-26'
Source_URI: Portal:Current events/2008 February 26
Intelligence_Payload:
  Uncategorized:
  - A shutdown at the Turkey Point Nuclear Generating Station causes a loss of electricity
    for millions in Florida. (Reuters)
  - Researchers announce they have sequenced the genome of corn. (Reuters)
  - A bomb blast in Khost, Afghanistan kills five police officers on their way to
    work. (AFP via Google News)
  - A man who dubbed himself "Osama bin London" is found guilty of running terrorist
    training camps in the United Kingdom. (Reuters)
