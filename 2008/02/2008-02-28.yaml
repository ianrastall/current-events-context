Date: '2008-02-28'
Source_URI: Portal:Current events/2008 February 28
Intelligence_Payload:
  Uncategorized:
  - Germany becomes the first country to formalize its recognition of Kosovo by renaming
    its diplomatic office in Pristina into an embassy. (Novinite, Sofia News Agency)
  - The Israeli Air Force launches a series of air strikes into Gaza following Hamas
    rocket attacks, with 32 confirmed dead. (BBC News)
  - Ecuador suspends oil exports after a landslide cuts off its main pipeline. (AFP)
  - International media report that Prince Henry of Wales has been serving in the
    Helmand province of Afghanistan. (ABC News Australia)
  - The Federal Bureau of Investigation will review a denial by baseball star Roger
    Clemens that he ever used steroids or human growth hormone. (Bloomberg)
  - A large explosion hits a shopping mall in Waukegan, Illinois. (BBC News)
  - At least ten militants are killed in a rocket attack on a house in the Pakistani
    village of Kalosha in South Waziristan near the Afghanistan border. (BBC News)
  - The former Prime Minister of Thailand Thaksin Shinawatra returns to Thailand to
    face corruption charges. (BBC News)
  - Kofi Annan announces that Kenyan President Mwai Kibaki and opposition leader Raila
    Odinga have agreed to form a coalition government to resolve the country's political
    crisis. (VOA)
  - Applied mathematicians at Brown University have proven four theorems concerning
    the optimality of centroid estimators. (Brown University)
