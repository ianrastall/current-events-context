Date: '2008-02-07'
Source_URI: Portal:Current events/2008 February 7
Intelligence_Payload:
  Uncategorized:
  - A gunman kills five and wounds two people at city hall before being shot and killed
    by police in Kirkwood, Missouri. (St. Louis Post-Dispatch) (Reuters)
  - Four people die and dozens are hurt in an explosion at a sugar refinery in Port
    Wentworth, Georgia. (CNN)
  - The United States Congress approves a $168 billion economic stimulus package and
    sends it to President George W. Bush for his approval. (The New York Times)
  - The Slovakian Parliament vote on the Lisbon Treaty ratification is indefinitely
    postponed. (SkToday.com)
  - The National Assembly of France approves the Treaty of Lisbon by 336 votes to
    52. (AP via Google News)
  - Space Shuttle Atlantis launches successfully on its STS-122 mission. (Fox News)
  - British Muslim cleric Abu Hamza al-Masri will be extradited to the United States
    to face terror charges. (BBC News)
  - There are mass arrests in the United States and Italy in an anti-Mafia sweep including
    three suspected senior members of the Gambino crime family. (Reuters)
  - '2008 United States presidential election: Former Governor of Massachusetts Mitt
    Romney suspends his campaign. (CNN)'
  - The Orthodox Church of Greece elects a new leader, Archbishop Ieronymos II of
    Athens. (CNN)
  - NATO meets in Vilnius, Lithuania.
  - No agreement on Afghanistan ahead of NATO meeting. (AFP via Google News)
  - Robert Gates will discuss the need to boost NATO forces in Afghanistan. (Presszoom)
  - The United States Secretary of State Condoleezza Rice and United Kingdom Secretary
    of State for Foreign and Commonwealth Affairs David Miliband visit Afghanistan.
    (AP via Google News)
  - Rio Tinto rejects BHP Billiton's $147 billion hostile takeover bid. (Financial
    Times)
  - WHO declares global tobacco control efforts and an approach to avoid tens of millions
    of premature deaths by the middle of this century. (WHO)
