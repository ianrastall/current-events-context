Date: '2008-02-09'
Source_URI: Portal:Current events/2008 February 9
Intelligence_Payload:
  Uncategorized:
  - 'Writers Guild of America strike (2007–present): Hollywood writers reach tentative
    agreement with the major movie studios. (The Washington Post)'
  - A suicide bomber kills 20 people at an opposition rally in Pakistan. (AFP)
  - A fire at Camden Market in London, England forces the evacuation of residents.
    The London Ambulance Service reports no casualties. (BBC News)
  - The Grand National Assembly of Turkey votes to change the Constitution of Turkey
    removing a ban on wearing religious head cover in Turkish universities. (The New
    York Times)
  - The military government of Myanmar announces a national referendum to pass a new
    constitution will be held in May, and that democratic multi-party elections will
    take place in 2010. (CNN)
  - The February 9th Killer rapes, and strangles Damiana Castillo in West Valley City,
    Utah, USA.
  2008 United States presidential election:
  - Former Governor of Arkansas Mike Huckabee wins the Kansas Republican Party caucus
    and the Louisiana primary. (The Washington Post) (Reuters)
  - Illinois Senator Barack Obama wins Democratic Party caucuses in Nebraska, Washington
    and the U.S. Virgin Islands and the primary in Louisiana. (AP via Yahoo! News)
  - Arizona Senator John McCain wins the Washington Republican primary. (The Oregonian)
