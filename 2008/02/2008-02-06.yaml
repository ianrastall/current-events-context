Date: '2008-02-06'
Source_URI: Portal:Current events/2008 February 6
Intelligence_Payload:
  Uncategorized:
  - A state of emergency is declared in Tungurahua Province in Ecuador because of
    increased activity by Tungurahua volcano. (Bloomberg)
  - A $158 billion plan to stimulate economic growth in the United States fails in
    the U.S. Senate on a procedural vote 58-41, just short of the 60 votes needed
    to advance. (Reuters)
  - The Turkish freighter ship UND Adriyatik catches fire off Croatia. (Jutarnji List)
    (Reuters)
  - President of Italy Giorgio Napolitano dismisses the parliament; the cabinet sets
    early elections for 13 and 14 April. (CNN)
  - The United States Centers for Disease Control says that an infected mother can
    transmit HIV to her baby via pre-chewed food. (Reuters)
