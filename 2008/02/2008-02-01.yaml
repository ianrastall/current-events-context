Date: '2008-02-01'
Source_URI: Portal:Current events/2008 February 1
Intelligence_Payload:
  Uncategorized:
  - A small plane crashes at Mount Airy, North Carolina, resulting in the death of
    six passengers. (WSLS)
  - 'Iraq War: At least 43 people are killed and 85 injured as a result of two bombings
    in markets in central Baghdad. (News Limited)'
  - RORO ferry runs aground in Blackpool, England, after its cargo shifts in heavy
    seas. All passengers and crew are airlifted to safety. (Blackpool Gazette)
  - A third fiber-optic submarine communications cable, FALCON, is cut two days after
    SEA-ME-WE 4 and FLAG were damaged. (BBC News)
