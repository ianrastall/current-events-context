Date: '2008-02-21'
Source_URI: Portal:Current events/2008 February 21
Intelligence_Payload:
  Uncategorized:
  - A Santa Barbara Airlines Flight 518 is reported missing in Venezuela with 46 people
    on board. (AFP via Google News)
  - The European Broadcasting Union considers relocating the 2008 Eurovision Song
    Contest, scheduled to be held in Belgrade, due to security concerns. In the meantime,
    the Serbian National Final for the Eurovision Song Contest is postponed. (Expressen)
  - The United States Navy shoots down USA 193, a spy satellite in a decaying orbit,
    over the Pacific Ocean. (AP via Breitbart.com) Officials believe the targeted
    hydrazine fuel tank was destroyed, and no longer poses a threat. (FoxNews.com)
    (U.S. DoD video)
  - A special prosecutor clears South Korean president-elect Lee Myung-bak of fraud
    allegations. (AP via Newsday)
  - A magnitude 7.5 earthquake strikes the Indonesian province of Aceh. (Indonesia
    Tsunami Bulletin)
  - Singapore is elected by the International Olympic Committee as the first city
    to host the Youth Olympic Games in 2010. (IOC)
  - An earthquake of 6.3 Magnitude hits 11.1 miles east/southeast of Wells, Nevada.
    It is 2.2 miles deep, and is felt as far away as Twin Falls, Idaho, about 125
    miles away, and Salt Lake City, Utah, about 180 miles away. (USGS)
  - Gazprom, Total and StatoilHydro incorporate the Shtokman Development Company,
    a joint operating company to develop the giant Shtokman gas field. (Reuters)
  2008 protests in Serbia:
  - At least 500,000 Serbs rally in Belgrade to protest against Kosovo's declaration
    of independence over the weekend. (BBC News)
  - A group of protesters breaks into the United States embassy in Belgrade and sets
    fire to part of the consular office. (Reuters)
  - A charred body of a protester is found in the United States embassy. (The Age)
  - The British, German, Croatian, Belgian and Turkish embassies were also attacked.
    (BBC News)
