Date: '2008-02-05'
Source_URI: Portal:Current events/2008 February 5
Intelligence_Payload:
  2008 United States presidential election:
  - Voters in 24 states go to the polls to determine presidential nominees for the
    Democratic and Republican parties. (BBC News)
  - Democratic Party
  - The Democratic Party holds their first Democrats Abroad primary for Americans
    living overseas. (TIME)
  - Illinois Senator Barack Obama wins the Alaska, Alabama, Colorado, Connecticut,
    Delaware, Georgia, Idaho, Illinois, Kansas, Minnesota, Missouri, North Dakota,
    and Utah Democratic contests. (Bloomberg News)
  - New York Senator Hillary Clinton wins the American Samoa, Arizona, Arkansas, California,
    Massachusetts, New Jersey, New York, Oklahoma and Tennessee Democratic contests.
    (Reuters) (ABC News) (San Francisco Chronicle)
  - Republican Party
  - Former Governor of Arkansas Mike Huckabee wins the Alabama, Arkansas, Georgia,
    Tennessee and West Virginia Republican contests. (USA Today) (Reuters)
  - Arizona Senator John McCain wins the Arizona, California, Connecticut, Delaware,
    Illinois, Missouri, New Jersey, New York, and Oklahoma Republican contests. (The
    New York Times) (San Francisco Chronicle) (Reuters)
  - Former Governor of Massachusetts Mitt Romney wins the Alaska, Colorado, Massachusetts,
    Minnesota, Montana, North Dakota, and Utah Republican contests. (CNN) (Fox News)
  Uncategorized:
  - The Red Cross estimates that hundreds of civilians have been killed in the Battle
    of N'Djamena in Chad. (AP via KGAN)
  - Israeli attacks kill eight Hamas members on the Gaza Strip as Hamas claims responsibility
    for the Dimona attack. (AP via Google News)
  - Philippine House Speaker Jose de Venecia Jr. was ousted by the majority of the
    representatives of the House of Representatives and Davao City Rep. Prospero Nograles
    was elected as the 13th House Speaker and the first Speaker from Mindanao. (Philippine
    Daily Inquirer)
  - '2008 Chinese winter storms: Chinese Premier Wen Jiabao visits disaster-affected
    region in Guizhou Province, one of the worst-hit provinces, to direct relief efforts.
    This is his third trip to disaster regions in eight days. (China Daily)'
  - A major tornado outbreak across the Southern United States leaves 57 people dead,
    and causes some polling places to be closed early. The hardest hit areas are in
    Alabama, Kentucky, Tennessee, Mississippi, and Arkansas, including the Memphis
    area, northern Middle Tennessee and Jackson, Tennessee. (MSNBC) (AP via Yahoo!
    News)
  - WTO approves Ukraine to become a new member. (WTO)
