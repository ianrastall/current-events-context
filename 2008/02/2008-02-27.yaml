Date: '2008-02-27'
Source_URI: Portal:Current events/2008 February 27
Intelligence_Payload:
  Uncategorized:
  - Colombian FARC rebels release four former members of Congress, held hostage since
    2001 and 2002, in a deal brokered by Venezuelan president Hugo Chávez. (BBC News)
  - A roadside bomb in Afghanistan results in the death of two NATO soldiers. (AP
    via USA Today)
  - The biggest earthquake in nearly 25 years hits England (5.2 on Richter scale).
    (BBC News)
  - A gunman kills four at a public housing complex in Bristol, Tennessee, before
    committing suicide. (AP via Google News)
  - Microsoft is fined a record €899 million by the EU anti-trust commission. (The
    New York Times)
