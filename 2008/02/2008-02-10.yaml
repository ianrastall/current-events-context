Date: '2008-02-10'
Source_URI: Portal:Current events/2008 February 10
Intelligence_Payload:
  Uncategorized:
  - The wooden portion of Namdaemun Gate in Seoul, South Korea is destroyed in a suspicious
    fire. (BBC News)
  - A suicide car bomb at a market in Balad, Iraq kills 25. U.S. Secretary of Defense
    Robert Gates also arrives in Iraq from a Germany security conference to meet with
    Iraqi leaders, General David Petraeus and U.S. Ambassador to Iraq Ryan Crocker.
    (CNN)
  - 'Association football: Egypt beats Cameroon 1-0 to win the 2008 Africa Cup of
    Nations in Ghana. (BBC News)'
  - Ten people are trampled to death at a rock concert in Bandung, Indonesia. (AFP)
  - Over five hundred people are evacuated from the North Sea oil rig Safe Scandinavia,
    northeast of Aberdeen, Scotland after a hoax bomb scare. (RTÉ News)
  - '"Anonymous" protests the policies of the Church of Scientology at different locations
    around the world. (The Scotsman) (The Star) (Adelaid) (Indymedia) (The Guardian)
    (Newsweek)'
  - The 2008 (or 50th) Grammy Awards took place at the Staples Center in Los Angeles,
    California, United States.
  Democratic Party (United States) presidential primaries, 2008:
  - Illinois Senator Barack Obama wins the Maine caucus. (AP via Yahoo! News)
  - Patti Solis Doyle resigns as campaign manager for New York Senator Hillary Clinton.
    Maggie Williams replaces her. (AP via Yahoo! News)
