Date: '2008-02-14'
Source_URI: Portal:Current events/2008 February 14
Intelligence_Payload:
  Kosovo:
  - Former Kosovo Prime Minister Bajram Rexhepi says the province will unilaterally
    declare independence within the next 4 days. (Sofia Echo)
  - Police in Kosovska Mitrovica report an explosion. (AFP via Google News)
  Uncategorized:
  - The United States House of Representatives approves contempt of Congress citations
    against Harriet Miers and Joshua Bolten in the U.S. Attorneys controversy. (The
    Washington Post)
  - A gunman opens fire at a lecture hall at Northern Illinois University, injuring
    as many as 18 students and with at least six people dead including the gunman.
    (Canadian Press via Google News) (CNN)
  - President Vladimir Putin says Russia would target its missiles at Ukraine if it
    threatened Russia's national security. (Interfax)
  - The United States Navy will use an SM-3 missile to destroy USA 193, a broken National
    Reconnaissance Office spy satellite which contains unused hydrazine fuel. (BBC
    News) (AP via Google)
  - Kiribati now has the largest protected marine reserve in the world. (Reuters)
  - The Wallraf-Richartz Museum in Cologne has announced that its painting The Seine
    at Port Villez, thought to be by Claude Monet, is a forgery. (AFP via Google News)
