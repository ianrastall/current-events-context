Date: '2008-02-12'
Source_URI: Portal:Current events/2008 February 12
Intelligence_Payload:
  2008 United States presidential election:
  - Illinois Senator Barack Obama wins the District of Columbia, Maryland and Virginia
    Democratic primaries. Obama now leads Sen. Hillary Clinton in the delegate count
    for the first time since early in the campaign. 2006/POLITICS/02/12/potomac.primaries/index.html
    (CNN) 2006/02/12/us/politics/12cnd-campaign.html (The New York Times)
  - Arizona Senator John McCain wins the District of Columbia, Maryland and Virginia
    Republican primaries. (The New York Times)
  Uncategorized:
  - European Space Agency's Columbus module is attached to the International Space
    Station. (The New York Times)
  - The U.S. Senate votes to grant immunity to telecommunications companies for their
    role in NSA call database. (The New York Times)
  - Chilean opera singer Ernesto "Tito" Beltran is sentenced to two years in jail
    by a Swedish court for rape during a concert tour in 1999. (BBC News)
  - Russia and Ukraine resolve a dispute over Ukraine's natural gas debt which saw
    Gazprom threatening to cut off supplies. (AFP)
  - Members of the Writers Guild of America vote to end the WGA strike that had been
    in effect for just over three months. (CNN)
