Date: '2008-02-24'
Source_URI: Portal:Current events/2008 February 24
Intelligence_Payload:
  80th Academy Awards:
  - Marion Cotillard wins the Academy Award for Best Actress for her portrayal of
    Édith Piaf in La Vie en rose, while Daniel Day-Lewis takes home the Academy Award
    for Best Actor for his role in There Will Be Blood. (News Limited)
  - No Country for Old Men wins the Academy Award for Best Picture while the Coen
    brothers win the Academy Award for Directing. (ABC News)
  Uncategorized:
  - A Virgin Atlantic Boeing 747 becomes the first commercial aircraft to make a flight
    powered by biofuel flying between Heathrow and Amsterdam. (CNN)
  - The National Assembly of People's Power unanimously selects Raúl Castro to succeed
    his brother Fidel as President of Cuba. (BBC News)
  - Ralph Nader enters the 2008 United States presidential election as an independent
    candidate. (CNN)
  - The Ugandan government and the Lord's Resistance Army sign a permanent ceasefire.
    (BBC News)
  - 'Cypriot presidential election, 2008: Demetris Christofias is elected President
    of Cyprus, defeating Ioannis Kasoulidis. (AFP)'
  - Pakistani censors cause most of the Earth's Internet users to lose access to the
    Internet site YouTube for up to two hours. (AP via Google News)
  - Tottenham Hotspur Football Club win the 2008 League Cup after beating Chelsea
    F.C. 2-1 after extra time. (The Herald)
