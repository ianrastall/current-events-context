Date: '2008-02-13'
Source_URI: Portal:Current events/2008 February 13
Intelligence_Payload:
  Uncategorized:
  - The United States Senate passes legislation to ban the Central Intelligence Agency
    from using certain interrogation methods including waterboarding. (AFP)
  - Former Major League Baseball pitcher Roger Clemens testifies to the United States
    House Committee on Oversight and Government Reform regarding performance enhancing
    drugs. (ESPN)
  - The Iraqi Parliament adopts an accord on the budget, detainees and federalism,
    setting provincial elections for late 2008. (AP via Google News)
  - The Swedish government rejects the Nord Stream underwater natural gas pipeline
    from Russia to Germany. (The Local)
  - Hezbollah commander Imad Mugniyah is killed by a bomb attack in Damascus, Syria.
    (Reuters)
  - Prime Minister Kevin Rudd issues a formal apology to the Indigenous Stolen Generation
    on behalf of the Parliament of Australia. (ABC News Australia)
  - Ch K-Run's Park Me In First, a.k.a. Uno wins Best in Show at the Westminster Kennel
    Club Dog Show, the first beagle to win the show. (ESPN)
  - An explosion in Vancouver, British Columbia destroys a Starbucks and Taco Del
    Mar. Police report arson, originating in the taco restaurant. (Canadian Press)
  - Malaysian Parliament dissolved for The 13th Malaysian general election. (BBC News)
