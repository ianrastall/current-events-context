Date: '2008-02-08'
Source_URI: Portal:Current events/2008 February 8
Intelligence_Payload:
  Uncategorized:
  - The Serbian minister for Kosovo claims that his government has information that
    the province's Albanian leadership will declare independence on February 17. (AFP
    via Google News)
  - A 5.4 Mw earthquake southeast of Mexicali, Mexico causes 400,000 people to lose
    power. (CNN) (USGS)
  - The Nebraska Supreme Court rules the electric chair unconstitutional. (AFP via
    Google News)
  - Hamas militants launch nearly 20 rockets at nearby Israeli towns. (BBC News)
  - A fire in a nursing home in Egg, Austria kills at least 11 people. (BBC News)
  - A student shoots two students and kills herself at Louisiana Technical College
    in Baton Rouge, Louisiana. (CNN)
  - Scotland Yard detectives investigating the death of former Prime Minister of Pakistan
    Benazir Bhutto say that she died from the effect of a bomb blast not gunfire.
    (BBC News)
  - A woman attacks two pilots on Eagle Airways Flight 2279 from Blenheim to Christchurch,
    New Zealand. The aircraft lands safely at Christchurch and the suspect is arrested
    and charged with hijacking and three counts of assault. (New Zealand Herald)
  - The man accused of the Gurgaon kidney scandal is arrested in Nepal. (NDTV India)
