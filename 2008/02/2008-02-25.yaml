Date: '2008-02-25'
Source_URI: Portal:Current events/2008 February 25
Intelligence_Payload:
  Uncategorized:
  - The New York Philharmonic becomes the first American musical ensemble to perform
    in North Korea. (Time)
  - A suicide bomber in Rawalpindi, Pakistan, kills 8 people including Pakistan's
    Surgeon General, Lieutenant General Mushtaq Ahmed Baig. (The Washington Post)
  - Chairman of the United States Federal Communications Commission Kevin Martin says
    he is "ready, willing and able," to prevent broadband Internet service providers
    from interfering with the speed of their subscribers' Internet access. (Reuters)
  - Hungary agrees to join the South Stream gas pipeline project. (Reuters)
  - Lee Myung-bak is sworn in as President of South Korea. (Bloomberg)
