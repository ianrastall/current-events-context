Date: '2008-02-19'
Source_URI: Portal:Current events/2008 February 19
Intelligence_Payload:
  2008 United States presidential election:
  - Arizona Senator John McCain wins the Wisconsin and Washington Republican Party
    primary election. (The New York Times) (The New York Times)
  - Illinois Senator Barack Obama wins the Democratic Party Wisconsin primary and
    the Hawaii caucus. (Reuters via The Melbourne Age) (AFP)
  Uncategorized:
  - At least eight Iraqi police are killed attempting to defuse a cache of rockets.
    (BBC News)
  - Fidel Castro retires, resigning as the President of Cuba (after 49 years in office)
    and as Commander in Chief of the Armed Forces, effective 24 February 2008 upon
    the election of his successor. (AFP via News Limited) (Granma) (Reuters UK)
  - Chaudhry Shujaat Hussain, the chairman of Pakistan's governing party, the pro-Musharraf
    Pakistan Muslim League (Q) (PML-Q) concedes defeat after preliminary results show
    that it cannot retain a majority in the Parliament of Pakistan. (AFP/AP via The
    Melbourne Age)
  - Serbian national selection for Eurovision Song Contest is cancelled after eruption
    of mass protests due to Kosovo's unilateral independence declaration 2 days earlier.
