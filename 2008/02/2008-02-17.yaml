Date: '2008-02-17'
Source_URI: Portal:Current events/2008 February 17
Intelligence_Payload:
  Uncategorized:
  - California-based Hallmark/Westland Meat Packing Company voluntarily recalls just
    over 143 million pounds (65 million kilograms) of raw and frozen beef products,
    considered the largest meat recall in the United States, following an investigation
    into animal cruelty. (AP)
  - Cypriot President Tassos Papadopoulos is eliminated in the first round of the
    Cypriot presidential election. (Reuters)
  - Kosovo declares its independence
  - The parliament of Kosovo declares independence from Serbia. (BBC)
  - Two hand grenades are thrown at international community buildings in Kosovska
    Mitrovica. (BBC)
  - President of the United States George W. Bush offers a $700 million aid package
    to Tanzania. (AP via Google News)
  - Dozens of people are killed and dozens more injured as a bomb explodes in a dog
    fighting match in Kandahar, Afghanistan. (AP via Google News)
  - Sir David Li resigns from the Executive Council of Hong Kong following a United
    States Securities Exchange Commission investigation of insider trading in Dow
    Jones. (AFP)
  - Ryan Newman wins the 50th Daytona 500. (FOX)
