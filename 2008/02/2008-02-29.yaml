Date: '2008-02-29'
Source_URI: Portal:Current events/2008 February 29
Intelligence_Payload:
  Uncategorized:
  - Northrop Grumman and EADS win a US$35 billion U.S. Air Force contract to build
    a new refueling plane, the KC-45, shutting out Boeing. (Reuters)
  - A White House official resigns after admitting to plagiarism in columns published
    by the Fort Wayne, Indiana News-Sentinel. (AP via Google News)
  - The U.S. Department of Agriculture stands down two employees as part of its investigation
    of the biggest meat recall in United States history. (The Wall Street Journal)
  - The British Ministry of Defence announces that Prince Harry will have to return
    home from his deployment in Afghanistan as recent publicity made it too dangerous
    for him to stay there. (AP via The International Herald Tribune)
  - Turkey has announced a complete withdrawal and end to operations in northern Iraq.
    (BBC News)
  - Ricin is found in a Las Vegas hotel room of a man who was admitted to the hospital
    in mid-February. The area affected is under quarantine. Officials do not suspect
    any relation with terrorism. (CNN)
  - Three policemen are killed in Pakistan's North West Province after a bomb explodes
    near their vehicle. At least 27 people are later killed in a suicide bomb attack
    on the funeral of one of the policemen. (BBC News)
  - The Presidency Council of Iraq approves the execution of Saddam Hussein's cousin
    Ali Hassan al-Majid, widely known as "Chemical Ali", for his role in the Al-Anfal
    Campaign against Iraqi Kurds in the 1980s. (AP via ABC News)
  - The African Union says its troops will arrive in the Comoros in a few days. (Reuters)
