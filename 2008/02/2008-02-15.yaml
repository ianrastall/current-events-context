Date: '2008-02-15'
Source_URI: Portal:Current events/2008 February 15
Intelligence_Payload:
  Uncategorized:
  - A Cook County, Illinois, probate judge declares adventurer Steve Fossett to be
    legally dead five months after he disappeared in the Nevada desert. (Chicago Tribune)
  - A home-made bomb explodes near the headquarters of the Federal District Police
    in Mexico City. One person is killed and two injured. (The International Herald
    Tribune)
  - Political parties in Kenya agree to set up an independent panel to review the
    disputed 2007 presidential elections. (BBC News)
