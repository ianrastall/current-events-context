Date: '2008-02-11'
Source_URI: Portal:Current events/2008 February 11
Intelligence_Payload:
  Uncategorized:
  - Judge John Kessler declares a mistrial in the case of China Arnold, who allegedly
    microwaved her baby to death. (Dayton Daily News)
  - The United States files charges against six alleged al-Qaeda operatives including
    Khalid Sheikh Mohammed in connection with the September 11, 2001 attacks, seeking
    the death penalty for war crimes and murder. (Sky News)
  - Paintings by Paul Cézanne, Edgar Degas, Vincent van Gogh, and Claude Monet are
    stolen from the Foundation E.G. Bührle, a museum in Zürich. (AFP)
  - The Singapore Flyer, the largest Ferris wheel in the world (30 meters higher than
    London Eye), starts to turn. (The Straits Times)
  - Gregg Bergersen, a United States Defense Department Analyst, is arrested and charged
    with espionage after being accused of leaking American military secrets to the
    Chinese government. (CNN)
  2008 East Timor assassination attempts:
  - President of East Timor José Ramos-Horta is shot and wounded in an attack at his
    home. Rebel leader Alfredo Reinhado, who led the attack, is killed. (ABC News
    Australia) (Melbourne Age)
  - Prime Minister of East Timor Xanana Gusmão escapes unhurt from an attack on his
    motorcade.
