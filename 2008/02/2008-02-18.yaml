Date: '2008-02-18'
Source_URI: Portal:Current events/2008 February 18
Intelligence_Payload:
  Uncategorized:
  - The Government of Kosovo holds its first meeting after the declaration of the
    independence of the country.(Office of the Prime Minister of Kosovo)
  - Voters in Pakistan go to the polls in the Pakistani general election, 2008. (AP
    via Sydney Morning Herald) Early results show that anti-Musharraf parties Pakistan
    People's Party and Pakistan Muslim League (N) are emerging as victorious. Pakistan
    Muslim League (Q), the party supporting Pervez Musharraf, has been defeated with
    its leaders losing their seats. (Geo Television Network)
  - An international conference aiming to ban the use of cluster bombs opens in Wellington,
    New Zealand. (TVNZ)
  - A suicide bombing targeting a Canadian military convoy kills at least 37 Afghan
    civilians and injures three Canadian soldiers in Spin Boldak, Afghanistan. (CTV)
  - In China, the trial of human rights activist Yang Chunlin commenced in the city
    of Jiamusi. Yang helped organise a petition entitled, "We want human rights, not
    the Olympics", and is accused of "inciting subversion of state power". (Radio
    Free Asia)
