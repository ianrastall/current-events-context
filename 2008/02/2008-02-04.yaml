Date: '2008-02-04'
Source_URI: Portal:Current events/2008 February 4
Intelligence_Payload:
  Uncategorized:
  - The Versailles Assembly, bringing together both the French Senate and the Chamber
    of Deputies, votes 560 to 181 in favour of amending the constitution to allow
    adoption of the EU Lisbon Treaty. (EU Observer)
  - United States district court judge Florence-Marie Cooper rules that President
    George W. Bush cannot exempt the United States Navy from complying with environmental
    laws banning sonar training. (AP via San Jose Mercury News)
  - Thomas S. Monson is chosen as the 16th president of The Church of Jesus Christ
    of Latter-day Saints. (AP via Google News)
  - Iran launches the Kavoshgar-1 research rocket to inaugurate a newly built space
    center. (BBC News) (PressTV)
  - A suicide bomber kills a woman and injures at least 10 people in Dimona, Israel.
    (BBC News)
  - Chadian rebels claim to have withdrawn voluntarily from N'Djamena. (AP via Google
    News)
  - The United States military says that it accidentally killed nine Iraqi civilians
    in an operation targeting Al-Qaeda south of Baghdad. (AP via Google News)
  - '2008 submarine cable disruption: the Egyptian transport ministry reports that
    footage of the areas where cables were snapped or damaged shows no maritime traffic.
    (Khaleej Times)'
  - U.S. President George W. Bush introduces a Federal budget of $3.1 trillion and
    a near-record deficit just ahead — $410 billion. (The New York Times)
