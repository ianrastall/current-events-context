Date: '2008-06-22'
Source_URI: Portal:Current events/2008 June 22
Intelligence_Payload:
  Uncategorized:
  - The Global Anglican Future Conference, a forum for conservative bishops and leaders
    of the Anglican Communion, opens in Jerusalem as an alternative to the Fourteenth
    Lambeth Conference. (BBC News)
  - Tarija Department becomes the fourth Bolivian department to vote for greater autonomy
    from the government of the President of Bolivia Evo Morales. (AFP via Google News)
  - A female suicide bomber kills at least 16 people and injures another 40 in Baquba,
    Iraq. (CNN)
  - Saudi Arabia offers to increase its oil production slightly at an oil summit in
    Jeddah. (The New York Times)
  - Zimbabwe Electoral Crisis
  - Zimbabwean opposition leader Morgan Tsvangirai pulls out of the June 27 run-off
    presidential election after President Robert Mugabe's supporters attacked his
    rally. (Reuters) (Bloomberg)
  - '2008 Pacific typhoon season: Typhoon Fengshen in the Philippines'
  - The death toll in the Philippines from Typhoon Fengshen rises to at least 155
    according to Red Cross estimates with 59 people dead and 40 people missing in
    Iloilo province alone. (AP via Google News) (AP via Google News)
  - A large bus collides head-on with a smaller minibus in Cox's Bazar, Bangladesh,
    leaving nine dead. (The International Herald Tribune)
