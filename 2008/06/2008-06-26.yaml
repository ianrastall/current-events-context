Date: '2008-06-26'
Source_URI: Portal:Current events/2008 June 26
Intelligence_Payload:
  Uncategorized:
  - The Internet Corporation for Assigned Names and Numbers (Icann) relaxes rules
    on the creation of top-level domain names like .com or .edu, which could pave
    the way for companies or individuals to create an array of new addresses for the
    Web. Icann also approves measures that will allow top-level domain names to be
    written in scripts such as Arabic or Cyrillic. (The Wall Street Journal) (CNN)
    (Reuters)
  - A former Taliban fighter claims that members of the Pakistan military secretly
    supported the insurgency in Afghanistan by providing training and material support.
    (Canadian Press via Google News)
  - North Korea releases details of its nuclear program and the United States removes
    it from its list of state sponsors of terrorism. (Bloomberg)
  - The Austrian SPÖ states that in the future, it wants to hold referendums on EU
    treaties. (STANDARD)
  - A report published in the journal Nature says a 365 million-year-old fossil of
    a four-legged fish found in Latvia sheds new light on the process of evolution.
    The creature, named Ventastega curonica, had a fish-like body but the head of
    an animal more suited to land than water. (BBC News) (The Daily Telegraph) (Science
    News)
  - Irish and British transport ministers agree to a mutual driver disqualification
    scheme. (RTÉ) (BBC News)
  - In a 5–4 decision, the Supreme Court of the United States holds in District of
    Columbia v. Heller that the Second Amendment to the United States Constitution
    protects an individual right to own a firearm and keep it on their property, ruling
    a District of Columbia gun control law unconstitutional and putting many other
    similar measures in jeopardy. (CNN)
  - A bus and a truck collide in China's Henan Province, leaving five dead and eight
    injured. (Xinhua)
