Date: '2008-06-10'
Source_URI: Portal:Current events/2008 June 10
Intelligence_Payload:
  Uncategorized:
  - Two Kenyan ministers – Roads Minister Kipkalya Kones and Assistant Home Affairs
    Minister Lorna Laboso – die in a plane crash near Narok in western Kenya while
    traveling to campaign in by-elections. (BBC News)
  - President of Venezuela Hugo Chávez revokes an intelligence law that opposition
    groups and the Roman Catholic church claim would have forced citizens to become
    government informants and asks the National Assembly to develop new legislation.
    (Bloomberg)
  - A Moroccan court sentences 29 people to prison sentences for recruiting people
    to fight for militants in Iraq. (Reuters)
  - President George W. Bush attends the final United States-European Union summit
    of his Presidency with agreements to tighten sanctions against Iran for its nuclear
    program. (AP via Google News)
  - United States Republican senators block moves to levy a windfall profits tax on
    oil companies. (MarketWatch)
  - Water from the Tangjiashan Lake, created in the 2008 Sichuan earthquake, floods
    the abandoned town of Beichuan. (Reuters)
  - South Korea's cabinet, led by Prime Minister Han Seung-soo, offers to resign following
    widespread protests at decisions to resume US beef imports in South Korea. (BBC
    News) (CNN)
  - Sudan Airways Flight 109 crashes on landing at Khartoum International Airport
    in Khartoum, Sudan, with around 200 on board. The death toll is 28 with 66 people
    unaccounted for.(CNN) (BBC News) (AFP/Reuters via ABC News)
  - A series of strong thunderstorms track through Southern Quebec, causing heavy
    damage south of Montreal and leaving over 250,000 people out of electricity. Champlain
    Bridge is closed for several hours after a wind gust causes seven semi-trailers
    to tip on their side. (CBC) (SRC)
