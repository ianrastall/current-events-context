Date: '2008-06-14'
Source_URI: Portal:Current events/2008 June 14
Intelligence_Payload:
  Uncategorized:
  - Argentine police arrest farm leader Alfredo de Angeli and 14 other farmers in
    an order to end the farmers strike. (Bloomberg)
  - Condoleezza Rice, the United States Secretary of State, criticises a planned expansion
    of Israeli housing in East Jerusalem as "not helpful" to the Middle East peace
    process. (AP via Google News)
  - The Space Shuttle Discovery lands having successfully completed mission STS-124.
    (Reuters) (NASA)
  - The President of the United States George W. Bush and the President of France
    Nicolas Sarkozy warn Syria to break with Iran and state that they will not allow
    Iran to obtain nuclear weapons. (AFP via Google News)
  - A fire breaks out at Campsfield House, a privately run Immigration detention Centre
    near Oxford in the United Kingdom. (BBC News)
  - A roadside bomb in Farah Province of Afghanistan kills 4 United States troops.
    (AP via Google News) (AP via Google News)
  - The magnitude 6.8 Mw 2008 Iwate earthquake shakes Iwate and Miyagi Prefectures
    on Japan's main island of Honshū, killing at least 6 people and injuring at least
    8 others.(BBC News) (AFP via News Limited) (AP via Forbes)
  - The French Defense Ministry announces France is increasing its military presence
    in Djibouti following border clashes with Eritrea. France has a mutual defense
    agreement with Djibouti. (Xinhua)
