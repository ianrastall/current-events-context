Date: '2008-06-30'
Source_URI: Portal:Current events/2008 June 30
Intelligence_Payload:
  Uncategorized:
  - An International Security Assistance Force attack in Khost province results in
    the death of 33 militants. (AP via Google News)
  - Chrysler announces that it will indefinitely close a minivan plant in South St.
    Louis, Missouri and cut production at another due to falling demand for large
    vehicles. (AP via Google News)
  - The Court of Arbitration for Sport upholds a two year ban against cyclist Floyd
    Landis meaning that he will lose his 2006 Tour de France title. (AP via Google
    News)
  - The African Union meets at Sharm el-Sheikh in Egypt with Robert Mugabe recently
    reelected as President of Zimbabwe representing Zimbabwe. (The Herald via AllAfrica)
  - Peru's largest federation of mining unions commences strike action in order to
    pressure the Congress of Peru to pass legislation to improve labor benefits. (Reuters
    via The Guardian)
  - An Ilyushin Il-76 crashes minutes after takeoff from Khartoum International Airport.
    All four Russian crew were killed. It is the second major air crash in the country
    this week. (Jerusalem Post)
