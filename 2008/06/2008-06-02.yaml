Date: '2008-06-02'
Source_URI: Portal:Current events/2008 June 2
Intelligence_Payload:
  Uncategorized:
  - Discoveries of exoplanets
  - Astronomers using the Mount John University Observatory discover MOA-2007-BLG-192-L
    b, the smallest known extrasolar planet which does not orbit a pulsar. (PhysOrg.com)
  - 2008 Danish embassy bombing in Islamabad
  - A suicide bomber strikes outside the Danish embassy in the Pakistani capital Islamabad
    with at least eight people dead. (CNN)
  - Subprime mortgage crisis
  - Wachovia, the fourth largest bank in the United States, fires its Chief Executive
    Officer, G. Kennedy Thompson, due to losses incurred in the subprime mortgage
    crisis. (Bloomberg)
  - The Bank of England says that new mortgage approvals in the United Kingdom in
    April were at record lows. (The Guardian)
  - The International Atomic Energy Agency will send an inspection team to Syria to
    investigate claims by the United States that it was secretly building a nuclear
    reactor. (Reuters)
  - The United Nations Security Council goes on a mission to Africa with the first
    leg of the mission to Djibouti to discuss the Somali Civil War. (BBC News)
  - The United Nations Security Council unanimously passes a declaration allowing
    foreign naval vessels to enter Somali territorial waters to deal with pirates.
    (BBC News)
  - A SNCF train runs into a school bus at a level crossing at Mesinges, near the
    town of Allinges in the mountainous Haute Savoie area of France with at least
    six people killed. (France 24)
  Supreme Court of the United States:
  - In United States v. Santos, by a 5-4 decision, the United States Supreme Court
    takes a narrow interpretation of federal laws regarding money laundering, and
    uses the decision in Cuellar v. United States to unanimously overturn the money
    laundering conviction of Humberto Cuellar. (Fox News)
  - The Supreme Court refuses to hear Major League Baseball Advanced Media v. C.B.C.
    Major League Baseball had sought to overturn a judgement against them in state
    court in Missouri that permitted C.B.C. to run fantasy baseball leagues using
    real player names without a license from MLB. (Sports Illustrated)
