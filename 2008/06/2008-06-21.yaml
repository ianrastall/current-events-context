Date: '2008-06-21'
Source_URI: Portal:Current events/2008 June 21
Intelligence_Payload:
  Uncategorized:
  - France and Algeria sign an agreement that could lead to French nuclear power technology
    being employed in Algerian reactors. (BBC News)
  - Militants in Pakistan fire mortars on a NATO base and Afghan army base. (Economic
    Times in Pakistan)
  - An employee for the United Nations High Commissioner for Refugees in Somalia is
    kidnapped. (AP via International Herald Tribune)
  - The Government of the Central African Republic signs a peace deal with two rebel
    groups which promises amnesty for rebel soldiers. (AP via International Herald
    Tribune)
  - Militants in Delta State, Nigeria, blow up a Chevron oil pipeline leading to a
    cessation of production by Chevron in Nigeria. (Bloomberg)
  - '2008 Pacific typhoon season: Typhoon Fengshen in the Philippines'
  - The death toll in the Philippines from Typhoon Fengshen rises to at least 20 from
    flooding and landslides. Ten people drown after the Rifao River overflows its
    banks and sweeps away three houses in South Upi, Maguindanao. (Xinhua)
  - At least four people die with the balance missing when the ferry MV Princess of
    the Stars, carrying 700 passengers, sinks near Sibuyan island in the wake of Typhoon
    Fengshen. (Reuters) (Reuters)
  - South Korea renegotiates its beef import deal with the United States following
    widespread protests at the original deal due to concerns over mad cow disease.
    (Bloomberg)
  - Four ISAF soldiers are killed by a bomb in Afghanistan. (AP via MSNBC)
  - Sudan Airways is grounded for a month by the Civil Aviation Authority of Sudan
    for violations prior to their most recent crash. (BBC News) (Reuters)
  - 'UEFA Euro 2008: Russia beat Netherlands 3-1 after extra time, advancing to the
    semi-finals. (UEFA Euro 2008 website)'
