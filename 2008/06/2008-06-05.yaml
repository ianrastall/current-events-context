Date: '2008-06-05'
Source_URI: Portal:Current events/2008 June 5
Intelligence_Payload:
  Uncategorized:
  - An Irish opinion poll shows the EU Treaty of Lisbon heading for defeat. (The Irish
    Times)
  - American and British diplomats are detained in Zimbabwe. (France24)
  - United States Secretary of Defense Robert Gates announces the resignation of United
    States Secretary of the Air Force Michael Wynne and his Chief of Staff General
    T. Michael Moseley over the 2007 United States Air Force nuclear weapons incident.
    (The Washington Post)
  - The USS Essex, USS Juneau, USS Harpers Ferry and USS Mustin depart the coast of
    Burma as the State Peace and Development Council maintains its refusal of the
    ships' aid in Cyclone Nargis relief. (AP via Google News)
  - Khalid Sheikh Mohammed and four others are arraigned at Guantanamo Bay detention
    camp under the Military Commissions Act of 2006, and charged with crimes related
    to the September 11, 2001 attacks. (AP via Google News)
  - Prosecutor Luis Moreno-Ocampo of the International Criminal Court reports that
    crimes in the War in Darfur "required the sustained mobilization of the entire
    State apparatus" of Sudan. (allAfrica.com) (BBC News)
  - A fire destroys major parts of the Rådhuset court house in Stockholm, the architectural
    landmark designed by Carl Westman. (The Local) (Svenska Dagbladet)
  - Turkey's Constitutional Court reinstates a ban on the hijab in universities, citing
    the constitution's secular principles. (BBC News)
  - Prime Minister of Israel Ehud Olmert says that "the end of Iran's nuclear program
    is near". (Haaretz)
  - Burma detains activist and comedian Zarganar who has been involved in private
    relief efforts for the victims of Cyclone Nargis and seize his computer and banned
    films including Rambo. (Reuters)
