Date: '2008-06-06'
Source_URI: Portal:Current events/2008 June 6
Intelligence_Payload:
  Uncategorized:
  - After five years of searching, the Caribbean Monk Seal is declared officially
    extinct (MSNBC)
  - Japan and North Korea resume bilateral talks, last held in September 2007. (BBC
    News)
  - Colombia and Ecuador restore relations following the Andean diplomatic crisis
    in March. (BBC News) (Reuters)
  - A Venezuelan National Guard sergeant and 3 more people are captured in the Colombian
    Department of Vichada with 40,000 AK-47 rounds for the rebel group FARC. (El Tiempo)
    (Noticias24)
  - The Diet of Japan recognizes the Ainu as an indigenous people for the first time.
    (BBC News) (Yomiuri Shimbun)
  - The Yulia Tymoshenko Bloc-Our Ukraine Bloc coalition loses its majority in Ukraine's
    Verkhovna Rada after two deputies quit. (BBC News)
  - The America's Climate Security Act of 2007, a greenhouse gas emissions reduction
    bill, stalls in the U.S. Senate after a 48-36 vote fails to invoke cloture on
    a Republican filibuster. Presidential candidates John McCain and Barack Obama
    were among six senators absent from the vote who expressed support for the bill.
    (AP via San Jose Mercury News) (BBC News)
  - A rush-hour explosion targeting a bus in Colombo, Sri Lanka kills at least 21
    people and injures 80. (BBC News)
  - The price of a barrel of crude oil rises a single-day record of nearly US$11,
    settling at a new record of US$138.54. (CNN)
  - Joseph Muscat becomes the leader of the Malta Labour Party, to become the opposition
    leader of Malta, to take the place of Charles Mangion, after the resignation of
    Alfred Sant. (Times of Malta)
