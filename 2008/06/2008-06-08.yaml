Date: '2008-06-08'
Source_URI: Portal:Current events/2008 June 8
Intelligence_Payload:
  Uncategorized:
  - Two bombs explode at a train station near Algiers, Algeria, killing at least 12
    people. (BBC News)
  - A fire sweeps through the historic Texas Governor's Mansion, leaving much of the
    152-year-old building charred and severely damaged. (AP via Google News)
  - A dispute between Southern Sudan and the central Sudanese government over Abyei
    will go to international arbitration. (BBC)
  - Robert Kubica of the BMW Sauber team wins the 2008 Canadian Grand Prix, becoming
    the first Pole to win a Formula One Grand Prix auto race, and giving BMW its first
    win as a constructor. (F1-live) (Formula1) (Wikinews)
  - At least two people have been killed as an earthquake rocked southern Greece,
    collapsing buildings and causing panic. (CNN)
  - The government of Southern Sudan withdraws its mediation efforts at the Juba talks
    between Uganda and the rebel Lord's Resistance Army. (The Uganda Monitor)
  - At least 37 miners go missing after an explosion in a Ukrainian coal mine causes
    it to collapse. (RTÉ) (BBC News)
  - At least 7 people are killed and 10 injured in a stabbing spree in Tokyo, Japan,
    coinciding on the 7th anniversary of the Osaka school massacre. (RTÉ) (BBC News)
  - In tennis, Rafael Nadal wins the men's singles title at the 2008 French Open for
    the fourth year in a row, equalling Bjorn Borg's record. (BBC News)
  - A day of mourning is declared in Russia's Kaliningrad Region as the death toll
    from Thursday's explosion and fire on the MV Yenisei reaches eight, with two missing.
    (Xinhua) (Wikinews)
