Date: '2008-06-15'
Source_URI: Portal:Current events/2008 June 15
Intelligence_Payload:
  Uncategorized:
  - Anjouan, an island part of the Union of the Comoros, hold its first presidential
    election since the 2008 invasion of Anjouan which ousted Mohamed Bacar. (AFP via
    Google News)
  - Six members of the Kuratong baleleng Philippines crime gang, as well as a police
    officer are killed in a shootout with police officers in Manila. (AFP via Google
    News)
  - 'August: Osage County wins the 62nd Tony Award for best play while In the Heights
    wins best musical. (AP via Google News)'
  - The American International Group (AIG), the world's largest insurance company,
    removes Martin J. Sullivan as its CEO due to losses caused by the subprime mortgage
    crisis. (Reuters)
  - Tiger Woods and Rocco Mediate will play in an 18-hole playoff to determine the
    winner of the 2008 U.S. Open Golf Championship. (The Washington Times)
  - Shiite cleric Muqtada al-Sadr claims that he is developing a new force to fight
    United States forces in Iraq. (CNN)
  - Afghanistan
  - The President of Afghanistan Hamid Karzai warns the Taliban that he will send
    forces into Pakistan in hot pursuit of militants. (AP via Google News)
  - More than 15 Taliban insurgents are killed as NATO and Afghan forces attempt to
    recapture the hundreds of prisoners who escaped following the Kandahar prison
    raid. (Reuters)
  - The Prime Minister of Pakistan Yusuf Raza Gillani warns that Pakistan will not
    tolerate incursions over its borders. (BBC News)
  - Heavy rain in southern China causes flooding with at least six people dead, four
    missing and 150,000 people evacuated from Guangdong and Guangxi provinces. (AP
    via Google News)
  - Japanese rescue squads resume the search for missing people after the 2008 Iwate
    earthquake including seven people feared buried by a mudslide at a hot springs
    hotel in mountains outside the town of Kurihara, Miyagi. (BBC News)
  - The constitution of Kosovo comes into effect. (BBC News)
