Date: '2008-06-07'
Source_URI: Portal:Current events/2008 June 7
Intelligence_Payload:
  Uncategorized:
  - Big Brown becomes the first Triple Crown favorite to place last in the 2008 Belmont
    Stakes in New York. The undefeated colt previously won the 2008 Kentucky Derby
    and the 2008 Preakness Stakes. The 38/1 longshot Da'Tara wins in a wire-to-wire
    finish. The last Triple Crown winner was Affirmed in 1978. (The Ledger)
  - The Lord's Resistance Army, reportedly drafting recruits and acquiring new weapons,
    kills at least 23 people in attacks against south Sudanese troops. (Reuters) (BBC
    News)
  - Hillary Clinton suspends her presidential campaign and endorses Barack Obama as
    the Democratic candidate for President of the United States in the 2008 election.
    (CNN)
  - UEFA Euro 2008 begins in Austria and Switzerland. (Swissinfo)
  - Attackers exchange gunfire with guards at Kosovo's Prime Minister Hashim Thaçi's
    home. (BBC News)
  - Cuba offers free sex reassignment surgery. (Reuters)
  - In tennis, Ana Ivanovic defeats Dinara Safina to win the French Open. (ESPN)
  - Plymouth Argyle goalkeeper, Luke McCormick is held on suspicion of causing death
    by dangerous driving. (Sky News)
