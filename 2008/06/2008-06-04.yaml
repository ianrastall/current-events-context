Date: '2008-06-04'
Source_URI: Portal:Current events/2008 June 4
Intelligence_Payload:
  Uncategorized:
  - The Detroit Red Wings defeat the Pittsburgh Penguins 3-2 in the sixth game to
    win the 2008 Stanley Cup Finals 4-2. (AP via Google News) (CBC)
  - Al-Qaeda claims responsibility for the 2008 Danish embassy bombing stating it
    was revenge for the Jyllands-Posten Muhammad cartoons controversy. (Bloomberg)
  - Tony Rezko, a Chicago property developer and former fundraiser for Barack Obama,
    is convicted on 16 charges of corruption. (Chicago Tribune via Los Angeles Times)
  - A coolant leak at Krško Nuclear Power Plant in Slovenia triggers the European
    Union's ECURIE nuclear emergency alert system. Slovenian authorities state the
    situation is under control, with no radiation leak into the environment. (BBC
    News)
  - Reassembly of the Obelisk of Axum begins in Axum, after the monument was returned
    to Ethiopia from Italy in 2005. (BBC News)
  - The International Olympic Committee releases a shortlist of 2016 Summer Olympics
    bids consisting of Chicago, United States; Tokyo, Japan; Madrid, Spain; and Rio
    de Janeiro, Brazil. (Sports Network)
  - Zimbabwean police detain Movement for Democratic Change leader Morgan Tsvangirai
    while campaigning in the second round of the Zimbabwe presidential election. He
    is later released after eight hours in detention. (The Times) (BBC News)
  - Lithuanian Prime Minister Gediminas Kirkilas announces plans to avoid recession
    as growth of the Lithuanian economy slows. (Bloomberg)
  - The Malaysian government announces a 40% increase in fuel prices, with gasoline
    rising from 1.92 ringgit (US$0.61) per litre to 2.70 ringgit by midnight. (BBC
    News) (International Herald Tribune)
