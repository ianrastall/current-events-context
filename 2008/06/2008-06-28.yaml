Date: '2008-06-28'
Source_URI: Portal:Current events/2008 June 28
Intelligence_Payload:
  Uncategorized:
  - The state government of India's Jammu and Kashmir has rebuked the decision to
    transfer forested land to Amarnath shrine following wide protests across the state.
    (BBC News)
  - The Los Angeles Dodgers become only the fifth team in modern major league baseball
    history to win a game in which they didn't get a hit, defeating the Anaheim Angels
    1-0. (AP via Yahoo! Sports)
  - Thousands of people riot in Guizhou province in southern China following the death
    of a girl and a perceived government coverup. (Reuters)
  - Thousands of people rally in Paris in support of the European Union removing the
    People's Mujahedin of Iran from its list of terrorist organisations. (VOA)
  - Police in South Korea use water cannons to disperse thousands of people protesting
    in Seoul about the resumption of beef imports from the United States. (BBC News)
  - The Community Assembly of Kosovo and Metohija, elected in May by the Serbian population,
    convenes its first meeting, in defiance of the Republic of Kosovo. (BBC News)
  - Médecins Sans Frontières claims that South Africa has expelled 450 Zimbabwean
    refugees. (AP via Google News)
  - Wendy Alexander resigns as the leader of the Scottish Labour Party following a
    ruling from the Scottish Parliament's ethics committee over political donations.
    (BBC News) (AFP via Yahoo! News)
  - Pakistan commences a military operation against Taliban militants in the Khyber
    Agency near Peshawar. (AP via The Guardian)
  - Filipino boxer Manny Pacquiao beats the American David Díaz to win the WBC world
    lightweight title. Pacquiao becomes the first Asian boxer to win four titles in
    four different weight divisions. (Yahoo! Sports)
