Date: '2008-06-01'
Source_URI: Portal:Current events/2008 June 1
Intelligence_Payload:
  Uncategorized:
  - Thirteen people are killed and 14 others injured in a bus crash in Anzoátegui,
    Venezuela. (Xinhua)
  - At least 8 people are suffocated at the Samuel K. Doe stadium in Monrovia, Liberia
    in a 2010 World Cup qualification match between Liberia and Gambia. (AP via CNNSI)
  - The Rajasthan Royals led by Shane Warne win the first Indian Premier League cricket
    competition defeating the Chennai Super Kings in the final at the DY Patil Stadium
    in Navi Mumbai. (AAP via Fox Sports)
  - '2008 United States presidential election: New York Senator Hillary Clinton wins
    the Puerto Rico Democratic primary, 2008. (The Guardian)'
  - The Australian Army ends its combat role in Iraq, as about 500 troops withdraw
    from Nasiriyah. (Reuters)
  - Macedonian voters go to the polls for the Macedonian parliamentary election, 2008
    with reports of violence in ethnic Albanian areas. The Prime Minister of Macedonia
    Nikola Gruevski claims victory for his centre-right party. (Reuters) (BBC News)
  - Voters in the Bolivian departments of Beni and Pando go to the polls for autonomy
    referendums. (AP via CNN)
  - A large fire breaks out at Universal Studios Hollywood in Los Angeles. There was
    at least one explosion. (Sky News)
