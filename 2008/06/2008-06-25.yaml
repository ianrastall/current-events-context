Date: '2008-06-25'
Source_URI: Portal:Current events/2008 June 25
Intelligence_Payload:
  Uncategorized:
  - EU's representative in Kosovo Pieter Feith says he expects Montenegro will recognize
    Kosovo's unilateral independence "as soon as possible", as it would "contribute
    to regional stability". (B92)
  - Zimbabwean President Robert Mugabe is stripped of his honorary Order of the Bath
    knighthood, upon the advice of the UK Secretary of State for Foreign and Commonwealth
    Affairs. (The Guardian)
  - United States Supreme Court
  - The US Supreme Court rules in Exxon Shipping Co. v. Baker that the damages awarded
    in the Exxon Valdez case were excessive and reduces them from $2.7 billion to
    $507 million. (AFP via Google News)
  - The US Supreme Court rules in Kennedy v. Louisiana that the death penalty may
    not be used for crimes which did not result in the death of another person. (The
    New York Times)
  - Violent protests over the Amarnath shrine immobilize Srinagar and other parts
    of Indian Jammu and Kashmir. (BBC News)
  - China reopens Tibet to foreign tourists as a ban imposed during the Tibetan unrest
    is lifted. (BBC News)
  - The Italian Senate passes a bill which the opposition claims is designed to ameliorate
    the legal troubles of Prime Minister Silvio Berlusconi. (BBC News)
  - Saudi Arabia announces that it is holding 520 al-Qaeda-linked militants in the
    insurgency in Saudi Arabia arrested in 2008. (BBC News)
  - The Supreme Court of Pakistan delays by-elections until it can handle the appeal
    of disqualified candidate Nawaz Sharif, former Prime Minister and leader of the
    Pakistan Muslim League (N). (BBC News)
  - A worker at a plastics plant in Henderson, Kentucky shoots and kills five people
    and wounds another before killing himself. (WYMT-TV)
  - The Government of New Zealand agrees to hand over $NZ420 million in forestry assets
    to seven Maori tribes as part of the reconciliation process. (AFP via Google News)
  - The Prime Minister of Israel Ehud Olmert strikes a deal with the Labor Party to
    avoid dissolution of the Knesset in return for Olmert holding a leadership contest
    for the Kadima party by September. (BBC News)
