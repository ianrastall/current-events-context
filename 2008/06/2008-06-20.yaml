Date: '2008-06-20'
Source_URI: Portal:Current events/2008 June 20
Intelligence_Payload:
  Uncategorized:
  - A female Iranian student who accused the vice-chancellor of her university of
    sexually harassing her was arrested. The charges against her aren't clear. The
    vice-chancellor was also arrested.BBC News
  - '2008 Pacific typhoon season: Typhoon Fengshen in the Philippines'
  - At least two people die in a landslide in Cotabato City in Mindanao as Typhoon
    Fengshen hits the Philippines. (Bloomberg)
  - UAE wins the first ever Arab Cup of Ice Hockey by defeating Kuwait 4-1. (National
    Team Scores)
  - Thai Political Crisis
  - People's Alliance for Democracy marched to the Government House in Bangkok demand
    that the Prime Minister, Samak Sundaravej step down. (BBC News)
  - The Franco-American Jason-2 satellite launches, with a mission of furthering the
    study of physical oceanography. (BBC News)
  - Police in Nepal detain more than 700 Tibetan exiles protesting outside the Chinese
    embassy and arrest three activists for alleged anti-China activities. (AFP via
    Google News)
  - A suicide bomb attack in southern Afghanistan kills 6 civilians. (BBC News)
  - Phoenix lander exploration of Mars
  - After white patches uncovered by digging from the Phoenix lander are found to
    have sublimated by the lander's cameras, NASA believes it has found water ice
    on Mars. (NASA)
  - The European Union agrees to lift the sanctions it has imposed on Cuba since the
    2003 Cocktail Wars dispute. (RTÉ) (BBC News)
  - Twelve people are trampled to death trying to escape a police raid in northern
    Mexico City. (CNN)
