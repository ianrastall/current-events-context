Date: '2008-06-29'
Source_URI: Portal:Current events/2008 June 29
Intelligence_Payload:
  Uncategorized:
  - A ship arrives in North Korea carrying food aid from the United States as part
    of a deal between North Korea, the US and the United Nations. (CNN)
  - Katie Hoff and Michael Phelps set world records for the 400-meter individual medley
    at the United States Olympics swimming trials in Omaha, Nebraska. (AP via Google
    News)
  - Two medical helicopters collide in Flagstaff, Arizona, resulting in seven deaths
    and three people being critically injured. (AP via Google News)
  - Spain wins the UEFA Euro 2008 championship defeating Germany 1-0 in the final
    through a goal by Fernando Torres. (BBC News)
  - China will commence a new range of talks with representatives of the Dalai Lama
    in early July. (AFP via Google News)
  - At least six people die and 39 are laid by bomb blasts in Assam, India, with the
    United Liberation Front of Asom believed to be responsible. (AFP via Google News)
  - The Israeli cabinet votes in favour of a prisoner swap with Hezbollah. (AP via
    Forbes)
  - Voters in Mongolia go to the polls for the Mongolian legislative election, 2008.
    (BBC News)
  - An investigation into the crash of a Black Hawk helicopter on HMAS Kanimbla that
    killed two concludes excessive loading on the engine caused it to lose power.
    (The Australian)
  - Robert Mugabe is sworn in for his sixth term as President of Zimbabwe after a
    controversial run-off presidential election in which opposition leader Morgan
    Tsvangirai withdraws his candidacy due to election-related violence. (AFP via
    Google News)
  - An aide of Malaysian politician Anwar Ibrahim lodges a police report claiming
    that he had been sodomised by Anwar. (BBC News)
