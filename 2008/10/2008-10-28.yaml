Date: '2008-10-28'
Source_URI: Portal:Current events/2008 October 28
Intelligence_Payload:
  Uncategorized:
  - Tamil Tiger terrorists have carried out unsuccessful air strikes on oil tanks
    near the capital, Colombo, and an army camp in Mannar, north-western Sri Lanka.
    (AFP via Google)
  - At its Professional Developers Conference, Microsoft delivers a pre-beta release
    of Windows 7 to developers, and announces plans to release a full Windows 7 beta
    early in 2009. (The New York Times)
  - North Korea issues a statement declaring that it will turn South Korea into "debris"
    if the South does not stop all "confrontational activities". (CNN)
  - Iran opens a naval base in the town of Jask, just outside the Strait of Hormuz
    entrance to the Persian Gulf. (BBC News)
