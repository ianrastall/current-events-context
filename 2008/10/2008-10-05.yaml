Date: '2008-10-05'
Source_URI: Portal:Current events/2008 October 5
Intelligence_Payload:
  Subprime mortgage crisis:
  - The German government moves to back troubled Hypo Real Estate with a 50 billion
    euro rescue plan. (MarketWatch)
  - German Chancellor Angela Merkel announces that Germany will explicitly guarantee
    the deposits in banks held by its citizens. (MarketWatch)
  - Russian President Dmitry Medvedev ordered the Defense Ministry, law enforcement
    agencies and the Foreign Ministry to investigate a bombing in the South Ossetian
    capital, Tskhinvali, on 3 October, 2008. A car, carrying weapons, was detained
    by Russian peacekeepers in Georian village and transported to Tskhinvali, where
    it exploded. EU and Organisation for Economic Co-operation and Development earlier
    condemned this 'act of terrorism'. Georgian authorities claimed 'Russian special
    services' 'were behind' the blast that left 7 servicemen of Russian peacekeeping
    forces dead. (Rustavi 2) (RIAN) (NY Times)
  - Earlier, on October 2, an attempt of assassination of head of the Akhalgori Ossetian
    administration, Anatoli Margiev failed. He survived the explosion of a bomb planted
    on a road in Georgian village while driving to Tskhinvali, South Ossetia. (Rustavi
    2)
  - Russian troops are dismantling positions in security zones on the border of South
    Ossetia and Georgia created after the war, a Georgian Interior Ministry official
    said. (AP via Google News).
  Uncategorized:
  - 'Rugby League: The Manly-Warringah Sea Eagles win the 2008 NRL Grand Final, defeating
    the Melbourne Storm 40-0. (AAP via the Melbourne Age)'
  - Thai police arrest former mayor of Bangkok and protest leader Chamlong Srimuang
    on charges of insurrection. (AP via Newsday)
  - 2008 South Ossetia war
  - Authorities detain separatist leader and impose curfew in anticipation of a separatist
    rally to be held on Monday in Kashmir. (BBC News)
  - Apirak Kosayothin is re-elected as Governor of Bangkok. (Thai News Agency)
  - Pakistani president Asif Ali Zardari acknowledges his government's consent to
    US air strikes in Pakistan and says India has never been a threat. (BBC News)
  - Senior British Commander says military victory in Afghanistan is impossible. (CBC
    News)
