Date: '2008-10-16'
Source_URI: Portal:Current events/2008 October 16
Intelligence_Payload:
  Uncategorized:
  - An earthquake of Richter scale 6.5 magnitude strikes the Pacific coasts of Guatemala
    and Mexico. (Reuters)
  - An explosion at a coal mine in Shizuishan city in the Ningxia Hui Autonomous Region
    in the People's Republic of China results in at least 16 deaths. (AP via IHT)
  - '2008 Cambodian-Thai stand-off: Cambodia and Thailand agree to joint border controls
    following a recent clash. (AFP via the Sydney Morning Herald)'
  - The United States Environmental Protection Agency sets a new standard, cutting
    the amount of lead that can be released into the atmosphere by 90 percent. (CNN)
  - United States economy
  - The United States consumer price index remains unchanged during September as falling
    costs for clothes, gasoline and new cars helped to offset rising food and medical
    prices. (AP via CNN)
  - Industrial production in the United States falls by 2.8% due to the impact of
    hurricanes, a strike at Boeing and the credit crunch. (Bloomberg)
  - Ilham Aliyev, President of Azerbaijan wins an 89.04 percent landslide victory
    in the Azerbaijani presidential election to get re-elected. The Organization for
    Security and Cooperation in Europe criticizes the elections, though it notes progress.
    (CNN) (OSCE/ODIHR)
  - '2008 British Columbia pipeline bombings: A second blast hits a gas pipeline in
    northern British Columbia near the town of Dawson Creek. (CBC)'
