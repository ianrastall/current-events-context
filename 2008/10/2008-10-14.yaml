Date: '2008-10-14'
Source_URI: Portal:Current events/2008 October 14
Intelligence_Payload:
  Uncategorized:
  - The United Arab Emirates recognizes Kosovo as an independent and sovereign state.
    (Emirates News Agency)
  - Indian novelist Aravind Adiga wins the Man Booker Prize for his debut The White
    Tiger. (The Canberra Times)
  - In Canada's 40th general election, the ruling Conservative Party gains 19 seats
    and wins another minority government. Stephen Harper is re-elected as Prime Minister.
    (CTV News)
  - Zimbabwe riot police disrupt a student protest in Harare as the students attempt
    to present a petition to Parliament. (The Times)
  - '2008 Cambodian-Thai stand-off: Thailand states that it is prepared to respond
    militarily if attacked by Cambodia after Cambodia issues an ultimatum to withdraw
    from disputed border areas. (AP via Google News)'
  - Double murderer Richard Cooey is executed at the Southern Ohio Correctional Facility
    in Lucasville, Ohio, despite his claims that his obesity made lethal injection
    inhumane. (UPI)
  - United States President George W. Bush announces new measures to attack the current
    economic crisis including plans for the U.S. government to buy stakes in major
    banks. (ABC News Australia)
  - Yehude Simon swears in as the new prime minister of Peru after the resignation
    of Jorge Del Castillo following the oil kickback scandal in Peru.(BBC)
