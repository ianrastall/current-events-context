Date: '2008-10-26'
Source_URI: Portal:Current events/2008 October 26
Intelligence_Payload:
  Uncategorized:
  - United States Special Operations Forces, stationed in Iraq, launch a cross-border
    raid in Syria, attacking a civilian building under construction near Abu Kamal,
    Syria. The Syrian government states 8 civilians were killed. (Sky News) (SANA)
    (IHT)
  - A shooter kills two people and injures another at the University of Central Arkansas
    in Conway, Arkansas. (CNN)
  - A light aircraft en route from Gloucester, England, to Kilrush, Ireland, crashes
    in the Wicklow Mountains of Ireland, killing four people. (RTÉ)
  - Kadima Party leader and Acting Prime Minister of Israel Tzipi Livni abandons efforts
    to form a coalition government and calls for early elections. (CNN)
  - Óscar Tulio Lizcano, a Conservative congressman kidnapped by the FARC in August
    2000, is freed by the military in Chocó Department, Colombia. (BBC News)
  - Municipal elections take place in Chile. The conservative opposition Alliance
    for Chile reaches 40% of the mayoral vote, winning an election for the first time
    in 50 years, in what is considered a barometer for the 2009 presidential election.
    (El Mercurio)
  Georgian–Abkhazian conflict:
  - President of Abkhazia, Sergei Bagapsh, accused Georgia of 'massive provocations
    with the use of armed force' after Georgians opened 'heavy fire' on Abkhazian
    border guards on Inguri river, part of the Georgian-Abkhazian border. (Kasparov.ru)
  - A Georgian source claims a shootout occurred between the Russian 'occupational
    forces' and Abkhazian 'militiamen'. (Rustavi2)
