Date: '2008-10-29'
Source_URI: Portal:Current events/2008 October 29
Intelligence_Payload:
  Uncategorized:
  - The United States Treasury Department spends US$125 billion of its $700 billion
    bailout fund on nine banks, some of whom had argued that they did not need the
    money. (CNN)
  - The Philadelphia Phillies win the 2008 World Series 4 games to 1, defeating the
    Tampa Bay Rays 4-3 in Game 5. (The New York Times)
  - India's Viswanathan Anand retains the World Chess Championship title in Bonn,
    Germany, by defeating Russia’s Vladimir Kramnik. (CNN-IBN)
  - Danish-based low-cost carrier Sterling Airlines files for bankruptcy and stops
    all passenger flights after its cash-strapped Icelandic investors were unable
    keep the company afloat.(The Guardian)
  - 'Suicide bombers attack targets in Somalia: Hargeisa, the capital of the self-proclaimed
    republic of Somaliland, and Bosaso, a city in the autonomous state of Puntland.
    (BBC News)'
  - At least 100 people die after a 6.4 magnitude earthquake in Pakistan in the city
    of Ziarat. (CNN)
  - Mohamed Nasheed of the Maldivian Democratic Party is elected President of the
    Maldives in the country's first democratic election. (AFP via Google)
