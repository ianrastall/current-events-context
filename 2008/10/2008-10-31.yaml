Date: '2008-10-31'
Source_URI: Portal:Current events/2008 October 31
Intelligence_Payload:
  Uncategorized:
  - Libya pays US$1.5 billion in compensation for past terrorist attacks to the United
    States, clearing the way for normal diplomatic ties between the two countries.
    (AFP via ABC)
  - Seven people are killed in Tibet's worst snowstorm in recorded history. (Xinhua).
  - A new study by the University of East Anglia's Climatic Research Unit shows that
    the warming of Earth's polar regions is caused by humans. (CNN)
  - The third pipeline bombing in the month of October targets an EnCana-operated
    gas pipeline near the town of Dawson Creek, British Columbia in Canada. (CBC)
