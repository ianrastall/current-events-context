Date: '2008-10-15'
Source_URI: Portal:Current events/2008 October 15
Intelligence_Payload:
  Uncategorized:
  - '2008 Atlantic hurricane season: Hurricane Omar strengthens to a Category 3 hurricane
    as it nears the United States and United States Virgin Islands. (AP via ABC News)'
  - The Philadelphia Phillies defeat the Los Angeles Dodgers 5-1 in the fifth game
    of the 2008 National League Championship Series winning the series 4-1 and advancing
    to the 2008 World Series. (New York Times)
  - Retail sales in the United States decline by 1.2% in September 2008, a third successive
    month in decline and the sharpest decline in three years, further evidence that
    the United States economy is in a recession. (USA Today)
  - The International Maritime Bureau claims that pirates have hijacked a bulk carrier
    with 21 crew members in the Gulf of Aden near Somalia. (AP via the Charlotte Observer)
  - '2008 Cambodian-Thai stand-off: Cambodia claims that Thai forces are grouping
    near the disputed area with later reports of an exchange of gunfire resulting
    in the death of two Royal Cambodian Army soldiers. (AFP via Google News), (AFP
    via Google News), (AP via Google News)'
  - The Waki Commission releases its report into the 2007–2008 Kenyan crisis which
    followed the disputed Kenyan presidential election, 2007. The Report found that
    senior politicians and businessmen—including up to six unnamed current cabinet
    ministers—had planned, financed and perpetrated the violence. (CNS News)
