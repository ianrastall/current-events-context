Date: '2008-10-09'
Source_URI: Portal:Current events/2008 October 9
Intelligence_Payload:
  Uncategorized:
  - Narcoterrorist attack on a military convoy by Shining Path guerrillas kills 19
    including women and children in southeast Peru. (AFP via Yahoo News)
  - Montenegro and Macedonia recognize Kosovo, bringing the total number of United
    Nations members recognising Kosovo to fifty. (International Herald Tribune)
  - The U.S. National Security Agency is accused of listening to Americans' private
    phone conversations.(ABC News)
  - '2008 Pacific hurricane season : Tropical Storm Odile forms south of Mexico while
    Hurricane Norbert weakens to tropical storm strength northwest of Odile. (AP via
    Google News)'
  - North Korea has forbidden ships to sail in an area of the Yellow Sea as it prepares
    for the launch of 10 short-range missiles. (Reuters) (BBC News)
  - Democratic Republic of the Congo accuses Rwanda of sending troops across the border,
    threatening the city of Goma. (BBC News)
  - Court in the United Kingdom hears of how two doctors planned car bomb attacks
    on London and Glasgow airports in revenge for how UK was treating Muslims (BBC
    News)
  - NATO plans on sending seven warships to protect United Nations food aid from Piracy
    in Somalia. (Radio Netherlands Worldwide)
  - North Korea ends its nuclear freeze as it prepares to restart a nuclear facility
    (AP via Yahoo News)
  - No candidate wins a majority in the Maldives' first democratic presidential election;
    the incumbent Maumoon Abdul Gayoom will face Mohamed Nasheed in a runoff. (Minivan
    News)
  - Los Zetas of the Gulf Cartel suspected killers of 5 police near Guadalajara during
    nationwide crackdown in Mexico. (AP via Yahoo News)
  Nobel Prize:
  - French writer Jean-Marie Gustave Le Clézio is announced the winner of the 2008
    Nobel Prize in Literature.
  Global financial crisis of September–October 2008:
  - Head of International Monetary Fund says the US financial crisis threatens to
    send the world into a recession. IMF releases World Economic Outlook report with
    gloomy projections for the global financial system. (Deutsche Welle)
  - The Dow Jones Industrial Average falls by 678.91 points to 8,579.19 points. (New
    York Times)
  - Greece introduces a 100,000 Euro guarantee for the 230 billion Euro bank deposits
    in the country for three years, well above the EU-wide Ecofin-mandated minimum
    of 50,000 Euro for one year, and gives assurances that the Greek banking system
    is stable, while the Greek central bank announces a drop in the expected growth
    of the Greek economy to 3.3% (from 4%) because of decreased consumption caused
    by high petrol and food prices. (ekathimerini), (ekathimerini), (Forbes), (Wikinews)
  - Kaupthing Bank, Iceland's largest bank, is nationalized by the country's Financial
    Supervisory Authority. (Bloomberg)
  War on Terrorism:
  - NATO commander U.S. Army Gen. Bantz J. Craddock asks member countries for authority
    to target drug trade in Afghanistan. (Reuters)
  - U.S. claims 27 militants killed in military operations in Afghanistan (AFP via
    Yahoo News)
  - Suicide bomber attacks police headquarters in Pakistani capital of Islamabad,
    wounding eight. Two air strikes northwest of Pakistan kill 20 militants. (Reuters)
  - US missile strikes in northwest of Pakistan kill at least nine. (BBC News) (AP
    via Yahoo News)
  - A roadside bomb in north-western Pakistan hits a school bus and a prison vehicle,
    killing four school children and at least six others. (BBC News)
