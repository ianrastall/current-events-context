Date: '2008-10-23'
Source_URI: Portal:Current events/2008 October 23
Intelligence_Payload:
  Uncategorized:
  - The New York City Council votes 29–22 in favor of extending the term limit on
    the office of the Mayor to three consecutive four-year terms from two consecutive
    four-year terms. This allows current Mayor Michael Bloomberg to run for office
    again in the next mayoral election in November 2009. (WCBS)
  - Ivo Pukanić, the owner of the Croatian weekly newspaper Nacional, is assassinated
    in a car bomb attack in Zagreb. (BBC News)
