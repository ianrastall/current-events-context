Date: '2008-10-11'
Source_URI: Portal:Current events/2008 October 11
Intelligence_Payload:
  Global financial crisis of September–October 2008:
  - United States President George W. Bush commits to collaborative action with G7
    finance ministers. (BBC News)
  - The International Monetary Fund warns of a global meltdown and offers to lend
    to countries if needed. (BBC News)
  Uncategorized:
  - Former South African President Thabo Mbeki will mediate between the Movement for
    Democratic Change and Zimbabwean President Robert Mugabe's government after Mugabe
    takes control of ministries that command the military and the police, an action
    that allegedly violates the power-sharing agreement reached last month. (AFP via
    Yahoo News)
  - The U.S. State Department removes North Korea from its list of sponsors of terrorism.
    (BBC News)
  - An earthquake struck southern Russia with tremors felt across five Russian regions.
    The epicentre was in Chechnya, with 12 dead. (Russia Today)
  - '2008 Pacific hurricane season: Hurricane Norbert reaches Category 3 strength
    as it nears Baja California in Mexico. (Canadian Press via Google News)'
  - Turkey bombs Kurdish military targets in northern Iraq. (AP via Yahoo News ) (Voice
    of America)
  - Malaysia's opposition leader Anwar Ibrahim says he expects to seize power by December
    by winning over defectors of the ruling Barisan Nasional government. (Reuters
    via Yahoo News)
  - Singapore Police Commissioner Khoo Boon Hui is elected the new president of Interpol.
    (Channel NewsAsia)
  - European Union monitors in Georgia confirm that Russia has met the withdrawal
    deadline. (Irish Times)
  - Austrian right-wing politician and Governor of Carinthia Jörg Haider is killed
    in an automobile accident near Klagenfurt in Carinthia, his political stronghold.
    (BBC News)
  - Extrajudicial killings in the Philippines decrease as noted by the Commission
    on Human Rights. (Inquirer).
  - The University of Toledo's Rockets stunned the Michigan Wolverines 13-10 at the
    Big House, in the first ever match up between the two schools, only fifty miles
    apart.
