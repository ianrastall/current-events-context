Date: '2008-10-22'
Source_URI: Portal:Current events/2008 October 22
Intelligence_Payload:
  Uncategorized:
  - Western donors pledge US$4.5 billion toward the rebuilding of Georgia, which suffered
    from damage inflicted during short war with Russia, South Ossetia and Abkhazia
    in August. (The New York Times)
  - The Indian Space Research Organisation successfully launches Chandrayaan-1, the
    country's first unmanned lunar exploration mission. (The Indian Express)
  - The Macau security law draft was unveiled; it is based on the Article 23 of the
    Macau Basic Law, similar to the failed anti-subversion bill in Hong Kong based
    on Hong Kong Basic Law Article 23, which drew over 500,000 protesters in 2003.
    (The Standard)
  - Three African trade blocs – COMESA, SADC, and the EAC – agree to merge to form
    a bloc consisting of 26 countries and 757 million people. (Xinhua)
