Date: '2008-10-19'
Source_URI: Portal:Current events/2008 October 19
Intelligence_Payload:
  Uncategorized:
  - Afghan officials claim that the Taliban has executed as many as 30 of 50 people
    captured on a bus in Kandahar Province. (International Herald Tribune)
  - A bridge under construction for the Delhi Mass Rapid Transit System in East Delhi
    collapses, killing 1 and leaving at least 9 injured. (IBN Live)
  - Cambodia agrees to release 13 Royal Thai Army soldiers captured during recent
    fighting in the 2008 Cambodian-Thai stand-off. (Radio Australia)
  - Retired General and former Secretary of State Colin Powell endorses Barack Obama
    for President of the United States. (Reuters)
