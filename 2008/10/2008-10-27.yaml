Date: '2008-10-27'
Source_URI: Portal:Current events/2008 October 27
Intelligence_Payload:
  Uncategorized:
  - Alaskan Senator Ted Stevens is found guilty on all seven counts of lying on United
    States Senate financial documents. (AP via Google News)
  - The Washington, D.C. Metro announces it will randomly search "backpacks, gym bags
    and any other containers that riders carry with them onto the bus and rail system"
    during periods of increased threat. (The Washington Post)
  - Nine major US banks will receive a $US123 billion capital injection from the federal
    government, says a Treasury Department official. (Sky News)
  - Line m2 of the Lausanne Metro starts revenue service, making Lausanne, Switzerland,
    the smallest city in the world to have a metro system. (swissinfo)
  - Pakistani intelligence officials claim that a US missile strike in South Waziristan
    has killed up to twenty people. The BBC claims that about 80 people were killed
    during US strikes into Pakistan over the past month.(AP via The Guardian) (BBC
    News)
  - Two Neo-Nazi white supremacists are arrested for plotting to assassinate US presidential
    candidate Barack Obama. (Reuters)
  - Georgian President Mikheil Saakashvili dismisses Prime Minister Lado Gurgenidze,
    and nominates Grigol Mgaloblishvili as the country's new prime minister, following
    the 2008 South Ossetian war. (AFP via Google News)
  Kivu conflict:
  - Tutsi rebels under Laurent Nkunda are reportedly advancing on the city of Goma
    in the Democratic Republic of the Congo. (Reuters)
  - MONUC peacekeeping forces are engaged in heavy fighting against rebels. (BBC News)
