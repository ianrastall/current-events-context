Date: '2008-09-22'
Source_URI: Portal:Current events/2008 September 22
Intelligence_Payload:
  Uncategorized:
  - Herman Simm, a former head of security at the Estonian Defense Ministry, and his
    wife Heete Simm, who works as a lawyer at Estonia's National Police Board, are
    arrested on suspicion of spying for Russia. (The International Herald Tribune)
  - Four people die in Puerto Rico as a result of heavy rains. (AP via Fox News)
  - South Africa's ruling African National Congress party names deputy president Kgalema
    Motlanthe as the successor to President Thabo Mbeki. (Bloomberg News)
  - More than 18,000 archived radio programs are indefinitely lost after the main
    computer server at Sweden's National Radio crashed last month. (Resume)
  - 'Liberal Democratic Party (Japan) leadership election, 2008: Japan''s ruling Liberal
    Democratic Party chooses former Foreign Minister of Japan Taro Aso as the next
    Prime Minister of Japan replacing Yasuo Fukuda. (AFP)'
  - Edward Natapei is elected the new Prime Minister of Vanuatu following the 2008
    general elections replacing Ham Lini. (The International Herald Tribune)
  - 15 people, including 11 foreign nationals, are kidnapped near Aswan in southern
    Egypt. (BBC News)
  - Radiocarbon dating estimates that Stonehenge was constructed around 2300 BC. (BBC
    News)
  - The Emergency Economic Stabilization Act of 2008 is debated on by the 110th United
    States Congress. (The New York Times)
  - The Dow Jones Industrial Average falls by 370 points due to uncertainty over the
    plan. (The New York Times)
  - A car is driven into a group of people in Jerusalem in what Israeli authorities
    are describing as a "terror attack". (BBC News)
