Date: '2008-09-23'
Source_URI: Portal:Current events/2008 September 23
Intelligence_Payload:
  Uncategorized:
  - Pakistani soldiers and tribesmen reportedly shoot down a suspected U.S. military
    drone near the village of Jalal Khel in South Waziristan. The report comes a day
    after intelligence officers said two United States helicopters crossed a mile
    into Pakistan over North Waziristan, but flew off after Pakistani troops and tribesmen
    opened fire. (AP via Google News)
  - Government officials say that the Federal Bureau of Investigation is looking into
    possible fraud for mortgage financing companies Fannie Mae and Freddie Mac, Lehman
    Brothers, and insurer American International Group. (AP via CNNMoney)
  - The Large Hadron Collider near Geneva is shut down until the northern spring while
    engineers probe magnet failures. (BBC News)
  - Ben Bernanke, the Chairman of the Federal Reserve, warns the United States Congress
    that failure to pass the Emergency Economic Stabilization Act of 2008 quickly
    would make a recession more likely. (AP via Miami Herald)
  - Japanese investment bank Nomura Holdings acquires the European, Asian and Middle
    Eastern equities and investment banking operations of Lehman Brothers. (MarketWatch)
  - Sweden's National Television issues a public apology for a "misleading" report
    on comments made by foreign minister Carl Bildt about Sweden's intelligence services.
    (The Local)
  - Colin Barnett is sworn in as the 29th Premier of Western Australia. (The West
    Australian)
  - Eleven die in a school shooting in Kauhajoki, Finland. (BBC News)
