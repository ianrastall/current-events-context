Date: '2008-09-21'
Source_URI: Portal:Current events/2008 September 21
Intelligence_Payload:
  Uncategorized:
  - Mad Men wins the Emmy Award for Best Drama and 30 Rock wins for Best Comedy at
    the 60th Primetime Emmy Awards. (Reuters)
  - Goldman Sachs and Morgan Stanley, the two last remaining independent investment
    banks on Wall Street, become bank holding companies as a result of the subprime
    mortgage crisis. (The New York Times)
  - The number of babies in China hospitalized due to adulterated milk products and
    infant formula reaches 12,892. (CNN)
  - The Social Democrats, led by Borut Pahor, presumably win the Slovenian parliamentary
    election. (AFP via Melbourne Herald Sun)
  - The United States wins the Ryder Cup for the first time since 1999. (The Times)
  - Israeli Prime Minister Ehud Olmert officially submits his resignation to President
    Shimon Peres. Foreign Minister Tzipi Livni begins talks on forming a new government.
    (AP via Google News)
  - Tyrone beat Kerry 1-15 to 0-14 to win the All-Ireland Senior Football Championship
    2008. (RTÉ)
  - The New York Yankees beat The Baltimore Orioles, 7-3, at their last home game
    at Yankee Stadium. This is the last time the New York Yankees play at Yankee Stadium
    before moving to the New Yankee Stadium across the street. (Yankees.com)
