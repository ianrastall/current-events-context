Date: '2008-09-02'
Source_URI: Portal:Current events/2008 September 2
Intelligence_Payload:
  Uncategorized:
  - New study shows that children of older fathers are at higher risk of psychological
    conditions such as bipolar disorder, autism and schizophrenia. (Reuters)
  - A gunman goes on a shooting spree that leaves 6 people, including a police deputy,
    dead, and four injured, in Alger, Washington, United States.(CBS News)
  - The United States Environmental Protection Agency vetoes plans by the Army Corps
    of Engineers to build the world's largest water pump on the Mississippi River
    Delta raising concerns about the impact on wetlands. (AP via Minneapolis StarTribune)
  - Republican Party adopts a platform at its national convention that is critical
    of George W. Bush and John McCain for their support of government bailouts of
    companies. (Bloomberg)
  - A memorial service is held for the 229 victims of Swissair Flight 111, with some
    present complaining about a perceived lack of action by the authorities to prevent
    future disasters. (Canadian Press) (Wikinews)
  2008 Atlantic hurricane season:
  - Hurricane Gustav weakens to a tropical depression. (Sydney Morning Herald)
  2008 Thai political crisis:
  - Thai Prime Minister Samak Sundaravej declares a state of emergency in Bangkok
    after clashes between groups of pro- and anti-government protesters resulted in
    one death and 43 injuries. (BBC News)
  - Anupong Paochinda, the Commander-in-Chief of the Royal Thai Army, states that
    the Army "will not use force" in enforcing the state of emergency. (AP via Google
    News)
