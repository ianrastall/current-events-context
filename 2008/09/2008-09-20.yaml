Date: '2008-09-20'
Source_URI: Portal:Current events/2008 September 20
Intelligence_Payload:
  Uncategorized:
  - A fire in a nightclub in the southern Chinese city of Shenzhen results in 43 dead
    and another 51 injured. (AFP via ABC News Australia)
  - The Ugandan Lord's Resistance Army has launched a surprise offensive in Southern
    Sudan hitting an army base and villages in the nearby Democratic Republic of the
    Congo. (BBC News)
  - Residents of Galveston Island, Texas are advised that they can return home next
    Wednesday but there will be little or no services after Hurricane Ike destroyed
    much of the town. (CNN)
  - The Bush administration asks the United States Congress for $700 billion to buy
    mortgage-related assets to try to resolve the subprime mortgage crisis. (AP via
    USA Today)
  - South African President Thabo Mbeki agrees to resign after the ruling African
    National Congress requested him to step down.(Reuters Africa via Google News)
  - Pakistan detains 13 Indian fishermen after they drifted in Pakistani waters. (Press
    Trust of India)
  War in North-West Pakistan:
  - A suicide bomber attacks a Pakistan Army convoy, killing eight soldiers. (France
    24)
  - The 2008 Marriott Hotel bombing occurs. (AP via Google News)
