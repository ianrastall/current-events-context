Date: '2008-09-19'
Source_URI: Portal:Current events/2008 September 19
Intelligence_Payload:
  Uncategorized:
  - Four people die in a plane crash in Columbia, South Carolina with Travis Barker,
    formerly of Blink 182, and DJ AM being critically injured. (AP via CNN)
  - Financial crisis of 2007–2010
  - The U.S. Securities and Exchange Commission and United Kingdom Financial Services
    Authority take emergency action to temporarily ban short-selling of financial
    companies stock. (AP via Google News)
  - The United States Department of the Treasury guarantees money market mutual funds
    up to an amount of $50 billion to guarantee their viability. (The New York Times)
  - The New York Stock Exchange responds positively to these initiatives with the
    Dow Jones Industrial Average rising by 390 points. (The New York Times)
  - Nigerian Oil Crisis
  - The Movement for the Emancipation of the Niger Delta announces that it has blown
    up a pipeline operated by Royal Dutch Shell. (BBC News)
  - Nigerian oil production has been reduced by 280,000 barrels per day since renewed
    attacks on oil facilities began. (Bloomberg)
  - Professor Stephen Hawking unveils the Corpus Clock, a 'terrifying' new way to
    read the time, at Corpus Christi College, Cambridge, England. (BBC News)
