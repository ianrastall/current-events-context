Date: '2008-09-09'
Source_URI: Portal:Current events/2008 September 9
Intelligence_Payload:
  Uncategorized:
  - UNITA accepts defeat in the Angolan legislative election, 2008, the first parliamentary
    elections in Angola in 16 years, in which the ruling Popular Movement for the
    Liberation of Angola wins more than 80% of the votes. (BBC)
  - Al Franken wins a primary election for the Minnesota Democratic–Farmer–Labor Party
    to challenge incumbent Senator Norm Coleman in the Minnesota Senate election.
    (AP via Google News)
  - The military of Sri Lanka declares 12 of its soldiers and one policeman killed
    in a suicide attack by the Tamil Tigers in Mullaittivu. (BBC News)
  - Prime Minister of Malaysia Abdullah Ahmad Badawi states that the governing United
    Malays National Organisation (UMNO) will punish Ahmad Ismail, a party official,
    for a series of statements he made about Malaysia's ethnic Chinese population.
    (Wall Street Journal)
  - The United Nations decides to withdraw aid workers from Tamil Tiger-held areas
    of Sri Lanka. (BBC News)
  - Hurricane Ike makes its second landfall on Cuba, near San Cristóbal, north of
    the Isle of Youth, on its way into the Gulf of Mexico. (CNN)
  - A Thai court rules that Prime Minister Samak Sundaravej must be removed from office
    for receiving payment for appearing on a television cooking show. (AP via Google
    News)
  - US President George W. Bush pledges 4,500 troops to Afghanistan over the next
    few months and orders 8,000 troops currently stationed in Iraq to be home by February.
    (CBC News)
  - Apple Inc. unveils the revamped iPod line-up including the redesigned, fourth-generation
    iPod Nano. (Reuters)
  - Georgian opposition members demand President of Georgia Mikheil Saakashvili's
    resignation. Saakashvili believes he will "survive the crisis politically". (Washington
    Post)(Newstin)
