Date: '2008-09-17'
Source_URI: Portal:Current events/2008 September 17
Intelligence_Payload:
  Uncategorized:
  - The emerging 2008 baby milk scandal shows evidence of coverup by officials during
    the Olympics. (MSNBC)
  - The Dow Jones Industrial Average falls by 440 points as the bailout of the American
    International Group by the Federal Reserve fails to reassure jittery investors.
    (The New York Times)
  - Foreign Minister of Israel Tzipi Livni is selected as the new leader of the Kadima
    party, putting her in position to possibly become the first female Prime Minister
    of Israel since Golda Meir. (Reuters)
  - Rwanda becomes the first nation where women outnumber men in parliament. (BBC
    News)
  - Islamic Jihad claim responsibility for an attack on the U.S. embassy in Yemen
    that results in 16 confirmed deaths. (The New York Times)
  - The BBC reports that British bank HBOS is in advanced talks with Lloyds TSB as
    HBOS share prices plummet as a result of exposure to the subprime mortgage crisis.
    (AP via International Herald Tribune)
  - India deploys Sukhoi Su-30MKI fighter jets capable of carrying nuclear warheads
    in Jammu and Kashmir amidst continuing ceasefire violations with Pakistan along
    the Line of Control. (Times of India)
  - '2008 Thai political crisis: Somchai Wongsawat has been elected as the next Prime
    Minister of Thailand by the National Assembly of Thailand with King Bhumibol Adulyadej
    having to endorse the selection. (AFP via The Canberra Times)'
  - BAA Limited decides to sell Gatwick Airport following a recent ruling by the United
    Kingdom Competition Commission. (BBC News)
  - The International Astronomical Union classifies Haumea as the fifth dwarf planet
    in the Solar System and names it after the Hawaiian goddess of childbirth and
    fertility. (IAU press release)
  - Papua New Guinea launches the National Television Service, a free-to-air state-run
    channel which competes with EM TV. (ABC News Australia)
  2008 Russian financial crisis:
  - Trading is suspended for the second day in succession on Russia's two main stock
    exchanges (the MICEX and the dollar-denominated RTS) after shares fall dramatically,
    forcing the central bank in Moscow to intervene. (The Times) (Bloomberg)
  - Russia's government lends the country's three biggest banks, Sberbank, VTB Bank
    and Gazprombank, as much as 1.13 trillion rubles ($44 billion) for at least three
    months to boost liquidity. (Bloomberg)
