Date: '2008-09-04'
Source_URI: Portal:Current events/2008 September 4
Intelligence_Payload:
  Uncategorized:
  - Senator John McCain officially accepts the nomination of the Republican Party
    in the 2008 United States presidential election. (The New York Times)
  - Former United States political lobbyist Jack Abramoff is sentenced to four years
    in prison for his role in the Jack Abramoff scandals. (CBS)
  - The death toll from flooding in Haiti caused by Tropical Storm Hanna rises to
    61. (CNN)
  - The Government of Thailand agrees to hold a referendum to resolve the 2008 Thai
    political crisis. (AP via Google News)
  - Tata Motors suspends work at its Tata Nano plant at Singur, West Bengal, due to
    continued agitations from the Trinamul Congress. (The Hindu)
  - Physicists at the Fermi National Accelerator Laboratory report the discovery of
    the , a "doubly-strange" baryon containing two strange quarks and a bottom quark.
    (Science Daily)
