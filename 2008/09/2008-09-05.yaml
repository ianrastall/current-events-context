Date: '2008-09-05'
Source_URI: Portal:Current events/2008 September 5
Intelligence_Payload:
  Uncategorized:
  - Five hundred people have died in the Haitian town of Gonaïves as a result of flooding
    caused by Tropical Storm Hanna. (Reuters via News Limited)
  - According to several news reports, the US government plans to take control of
    Fannie Mae and Freddie Mac in a takeover plan. (MSNBC)
  - Estimates of sea-level rise due to global warming are scaled back. (Reuters)
  - Condoleezza Rice becomes the first United States Secretary of State to visit Libya
    since 1953. (AP via the New York Daily News)
  - Pakistan reinstates Supreme Court judges ousted by former President Pervez Musharraf.
    (CNN)
  - The unemployment rate in the United States rises to its highest level since December
    2003 after the US economy loses 84,000 jobs in August 2008. (BBC News)
  - La Princesse, a giant mechanical spider, starts to roam the streets of Liverpool,
    England, as part of the 2008 European City of Culture celebrations. (BBC News)
  - The European Union's Rosetta spacecraft performs a flyby of the asteroid 2867
    Šteins. (AFP)
  Australia:
  - Quentin Bryce is sworn in as the first female Governor-General of Australia. (AAP
    via The Melbourne Age)
  - Morris Iemma resigns as Premier of New South Wales following a loss of support
    in the Australian Labor Party caucus, and is replaced by Nathan Rees. (Sydney
    Morning Herald)
