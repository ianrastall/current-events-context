Date: '2008-09-25'
Source_URI: Portal:Current events/2008 September 25
Intelligence_Payload:
  Uncategorized:
  - Pakistani and United States forces exchange fire on the Afghan-Pakistan border.
    (The New York Times)
  - Senior members of the United States Congress agree on a legislative deal to bail
    out the U.S. financial system from lingering effects of the subprime mortgage
    crisis. (AFP via News Limited)
  - The Texas Supreme Court denies a petition by the Bob Barr US Presidential campaign
    seeking removal of Senators Barack Obama and John McCain from that state's ballot
    due to both candidates missing the filing deadline. (TX Supreme Court) (Nolan
    Report) (Dallas Morning News)
  - An effigy of Barack Obama is found hanging from a tree at George Fox University
    in Newberg, Oregon. (AP via Google News)
  - A young Canadian man is found guilty in the 2006 Toronto terrorism case of participating
    in a plot to storm the Parliament of Canada and behead the Prime Minister of Canada,
    Stephen Harper. (AP via CNN)
  - United States economy
  - Jobless claims in the United States rise to a seven-year high while orders for
    durable goods fall to their lowest level in 18 months, underscoring the weakness
    of the United States economy. (Fox Business)
  - Home sales in the United States during August 2008 fall to a 17-year low. (Bloomberg)
  - Following the purchase of British Energy by Electricité de France, plans for a
    new Hinkley Point C nuclear power station have been announced. (Nuclear News)
  - The death toll from Typhoon Hagupit rises to 18 with 10 people dead in the People's
    Republic of China as well as 8 people killed earlier in the Philippines. (CNN)
  - Kgalema Motlanthe is sworn in as the third post-apartheid President of South Africa.
    (AFP)
  - Dark flow, a new and unexplained cosmic phenomenon, is observed by astronomers
    for the first time. (The Daily Telegraph)
  - Shenzhou 7, the third manned Chinese spaceflight, is successfully launched with
    three crew members, with a planned first Chinese spacewalk. (Xinhua)(The New York
    Times)
