Date: '2008-09-01'
Source_URI: Portal:Current events/2008 September 1
Intelligence_Payload:
  Uncategorized:
  - U.S. Republican Vice Presidential candidate Sarah Palin's 17-year-old daughter
    Bristol is revealed to be five months pregnant. (BBC) (Telegraph.co.uk) (AP) (Al
    Jazeera) (Wall Street Journal)
  - The U.S. military hands control of Al Anbar Governorate over to the Iraqi government.
    (BBC)
  - An ACLU lawsuit challenges gag orders in National Security Letters. (AP via Google
    News) (BBC)
  - Japanese Prime Minister Yasuo Fukuda abruptly resigns less than a year after taking
    office, triggering a leadership election. (BBC)
  - A Government of Orissa report states 558 houses and 17 places of worship were
    burnt in the 2008 Orissa violence. (Times of India)
  - Robert French is sworn in as the 12th Chief Justice of Australia. (ABC (Australia))
  - Manchester City Football Club is bought out by the Abu Dhabi United Group for
    Investment and Development Limited, the consortium led by Sheikh Mansour bin Zayed
    Al Nahyan. This effectively made City the richest Football Club in the world.
    It also made Transfer Deadline Day one of the most memorable, with City's new
    found wealth allowing them to bid for such players as Dimitar Berbatov, Fernando
    Torres, Mario Gomez and David Villa. They eventually signed Robinho for a British
    Record Fee of £32.5million. The takeover and the Robinho deal as a whole sent
    shockwaves throughout the Sporting world. (Independent)
  2008 Atlantic hurricane season:
  - Tropical Storm Hanna becomes Hurricane Hanna (2008) with hurricane warnings issued
    for the Bahamas and the Turks and Caicos. (MSNBC)
  - Tropical Storm Ike (2008) forms east of the Leeward Islands. (Miami Herald)
  - Hurricane Gustav weakens to a tropical storm in central Louisiana after being
    responsible for 7 deaths in the United States and more than 90 in the Caribbean.
    (UPI)
  2008 South Ossetia war:
  - The European Union suspends talks on a new partnership agreement with Moscow until
    Russian troops have withdrawn from Georgia. (BBC)
  - Russia accuses the West of sending weapons to Georgia along with aid, while the
    European Union considers possible sanctions against Russia. (CNN)
