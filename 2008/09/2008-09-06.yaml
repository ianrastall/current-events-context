Date: '2008-09-06'
Source_URI: Portal:Current events/2008 September 6
Intelligence_Payload:
  Uncategorized:
  - '2008 Pacific hurricane season: Tropical Storm Lowell forms off the coast of Mexico.
    (AP via Houston Chronicle)'
  - Komlan Mally resigns as prime minister of Togo, after less than a year in office.
    (Xinhua)
  - Darren Aronofsky's The Wrestler wins the Golden Lion for best film at the Venice
    Film Festival. (AP via Google News)
  - Nuclear Suppliers Group clears Indo-US nuclear deal. (CNN-IBN)
  - '2008 Cairo landslide: At least 18 people are killed and 22 injured when dozens
    of homes in northern Cairo collapse after being hit by a massive rockslide. (AFP
    via Google News)'
  - The 2008 Summer Paralympic Games begin in Beijing. (BBC News)
  - 2008 Atlantic hurricane season
  - Tropical Storm Hanna makes landfall in the United States on the border between
    North Carolina and South Carolina. (AFP via the Melbourne Age)
  - Hurricane Ike reaches Category 4 strength as it prepares to hit Turks and Caicos.
    (AP via Google News)
  - Pakistan
  - The Electoral College of Pakistan elects Asif Ali Zardari of the Pakistan People's
    Party as the next President of Pakistan. (The New York Times)
  - A car bomb in Peshawar in northwest Pakistan kills at least thirty people. (BBC
    News)
