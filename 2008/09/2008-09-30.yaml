Date: '2008-09-30'
Source_URI: Portal:Current events/2008 September 30
Intelligence_Payload:
  Uncategorized:
  - 2008 Chinese milk scandal
  - Dutch food giant Unilever began recalling Lipton-brand milk tea powder in Hong
    Kong and Macau after they were found to contain traces of melamine. (CBS News)
  - Chinese police report having arrested 22 people on Monday over melamine tainted
    milk products. (BBC News)
  - Shares of major Irish banks rise sharply following the announcement of a State
    guarantee of all deposits in Allied Irish Banks, Bank of Ireland, Anglo Irish
    Bank, Irish Life & Permanent, Irish Nationwide Building Society and EBS, worth
    an estimated €400 billion. The guarantee includes Bank of Ireland branches in
    Northern Ireland while the coverage of AIB's subsidiary, First Trust is still
    under discussion. Deposits in foreign-owned banks remain guaranteed to €100,000.
    (RTÉ News) (BBC News)
  - 147 people are dead after a human stampede at the Chamunda Hindu temple near Jodhpur
    in India. (Reuters), (CNN), (AFP via The Canberra Times)
  - At least 35 people die when a bus collides with a milk tanker and catches fire
    in central Pakistan, police say. (News 24)
  - 30 suspected mobsters arrested around Naples in "war against the Camorra". (BBC
    News)
  - The Dow Jones Industrial Average goes up almost 500 points, following its largest
    one day point drop in history yesterday.(Yahoo Finance)
  Piracy in Somalia:
  - Pirates deny reports of three of their own killed in a shoot-out aboard the Ukrainian
    ship (MV Faina) off the African coast. (CBC News) (BBC News)
