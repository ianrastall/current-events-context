Date: '2008-09-27'
Source_URI: Portal:Current events/2008 September 27
Intelligence_Payload:
  Uncategorized:
  - A bomb blast in Delhi, India kills 2 and injures 23. (TOI)
  - '2008 Atlantic hurricane season: Tropical Storm Kyle strengthens into Hurricane
    Kyle with predictions that it will make landfall in the New England region of
    the United States or Canada''s Maritime Provinces on Sunday. (Reuters)'
  - The United States Senate passes a large spending bill including $25 billion in
    taxpayer subsidised loans for automakers and the end of offshore drilling bans.
    (AP via Google News)
  - The People's Council of Turkmenistan, implementing changes approved in the Constitution,
    passes a vote to abolish itself and allow opposition parties. (BBC News)
  - During mission Shenzhou 7, Zhai Zhigang successfully performs the first spacewalk
    by a Chinese astronaut, as China becomes the third country to carry out extra-vehicular
    activity independently. (CNN)
  - In Australian football, the Hawthorn Football Club defeats the Geelong Football
    Club in the 2008 AFL Grand Final by 115 points to 89. (ABC News Australia)
  - '2008 Damascus car bomb: A suspected car bomb targeting a military installation
    in Damascus, Syria kills at least 17 and injures 14 others. (BBC News)'
  - A 12.9 million digit Mersenne prime is discovered. (AP via Los Angeles Times)
  - Government officials announce plans to nationalise British bank Bradford & Bingley
    in the aftermath of the subprime mortgage crisis. (BBC News)
  - United Nations Security Council passed Resolution 1835 on Iran, calling for compliance
    with previous resolutions, with no further sanctions. (BBC News)
