Date: '2008-05-03'
Source_URI: Portal:Current events/2008 May 3
Intelligence_Payload:
  Uncategorized:
  - Microsoft withdraws its bid for Yahoo! after the two companies fail to reach agreement
    on a price. (The New York Times)
  - '2008 United States presidential election: The Guam caucuses result in a near-perfect
    tie, with Barack Obama ahead by only 7 ballots in 4,521. (AP via Google News)
    (AP via Yahoo! News)'
  - Big Brown wins the 2008 Kentucky Derby. Eight Belles, the only filly in the field,
    breaks down after finishing second in the race, and is euthanized. (NBC Sports)
  - At least 18 prisoners are killed during a fight in a jail in Tegucigalpa, the
    capital of Honduras. This follows the recent deaths of nine prisoners in a riot
    in San Pedro Sula with both riots being blamed on overcrowding and gang rivalry.
    (BBC News)
  - In Chilean Patagonia, almost all Chaitén's inhabitants flee the capital city of
    Palena Province when a nearby volcano erupts after being inactive for 450 years.
    (The Telegraph)
