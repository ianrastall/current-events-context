Date: '2008-05-25'
Source_URI: Portal:Current events/2008 May 25
Intelligence_Payload:
  Uncategorized:
  - The opposition Bharatiya Janata Party wins the most seats in elections for the
    Karnataka legislature, India. (Radio Australia)
  - USA Tornadoes of 2008
  - A severe storm in Hugo, Minnesota kills one person with another 20 missing with
    unconfirmed reports of a tornado. (AP via Google News)
  - Seven people are killed and dozens more injured as a tornado hits Parkersburg,
    Iowa. (AP via WCCO)
  - The Phoenix lander arrives at Mars, landing successfully in the "Green Valley"
    region of Vastitas Borealis. (NASA)
  - New Zealand driver Scott Dixon wins the 2008 Indianapolis 500 ahead of Vitor Meira.
    (AP via Google News)
  - Laurent Cantet's film Entre les murs (The Class) wins the Palme d'Or at the 2008
    Cannes Film Festival. (Canadian Press via Google News)
  - The former President of Malawi Bakili Muluzi is arrested in Lilongwe after returning
    from the United Kingdom in relation to an alleged coup attempt. (Reuters)
  - Michel Suleiman is elected as President of the Republic of Lebanon. (BBC News)
  - 2008 Sichuan earthquake
  - China's Cabinet states that the death toll from the earthquake has reached 62,664.
    (AP via Google News)
  - An aftershock measuring 6.0 on the Richter scale topples thousands of building
    in Sichuan Province and injures hundreds of people. (The New York Times)
  - The Secretary-General of the United Nations Ban Ki-moon hosts a conference in
    Myanmar with representatives of 50 nations on how to aid in recovery from Cyclone
    Nargis. (AP via Forbes)
  - At Brussels Airport, a Boeing 747 cargo airliner from American operator Kalitta
    Air crashes at the end of the runway during takeoff and breaks in two. All 5 crewmembers
    survive. (AP via CNN)
