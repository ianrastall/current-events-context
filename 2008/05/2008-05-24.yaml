Date: '2008-05-24'
Source_URI: Portal:Current events/2008 May 24
Intelligence_Payload:
  Uncategorized:
  - Dima Bilan of Russia wins the Eurovision Song Contest 2008 with the song "Believe"
    with 272 points. (AP via The International Herald Tribune)
  - 'Tornadoes of 2008: Two people from Colorado die in a tornado south of Pratt,
    Kansas as more than a dozen tornadoes hit Kansas. (AP via Forbes)'
  - Three people are killed and another three injured in a helicopter crash on Santa
    Catalina Island, California near Two Harbors, California. (AP via Google News)
  - Munster win the Heineken European Rugby Cup against Toulouse, 16 to 13. (RTÉ)
  - In continuing battles against anti-foreigner violence in South Africa, police
    shoot and kill one man in Johannesburg. The Red Cross warns it is struggling to
    help the thousands of displaced people. (AFP via Google News) (AFP via Google
    News)
  - Flooding in Chile kills at least five people, displaces at least 15,000 people
    and closes the Pan American Highway south of Santiago. (BBC News)
  - 'Cyclone Nargis: The authorities in Myanmar allow foreign help into the country
    following initial resistance. (Reuters)'
  - Wen Jiabao, the Premier of China, estimates that the eventual death toll from
    the 2008 Sichuan earthquake could rise as high as "80,000 or more". (CBC)
  - Prince Joachim of Denmark marries French Marie Cavallier. Prince Joachim was previously
    married to Hong Kong-born Alexandra Manley. (The Danish Monarchy)
  Colombia:
  - According to the Colombian Minister of Defense, Juan Manuel Santos, FARC founder
    and commander Tirofijo died on March 26. (El Tiempo) (Semana) The death was confirmed
    a day after in a video released to channel teleSUR. Noticias24
  - A 5.9 earthquake with its epicentre in the Department of Meta strikes the Central
    and West areas of the country; at least 11 people are killed with over 4000 injuries
    reported. (Hindustan Times) (USGS)
