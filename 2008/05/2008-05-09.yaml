Date: '2008-05-09'
Source_URI: Portal:Current events/2008 May 9
Intelligence_Payload:
  Uncategorized:
  - Pakistan's two main coalition leaders, Asif Ali Zardari and Nawaz Sharif meet
    in London to discuss the removal of judges by Musharraf (AP via CNN)
  - Commander Esteban Robles Espinosa of Mexico City's investigative police force
    was shot dead as he left his home. (CNN)
  - The price of crude oil reaches a new record high of US$125.98 a barrel. (BBC News)
  - The United States Military denies the capture of al-Qaeda in Iraq leader Abu Ayyub
    al-Masri. (BBC News)
  - Israeli Prime Minister Ehud Olmert denies taking bribes from businessman Moshe
    Talansky. (BBC News)
  - A Zimbabwean policeman tells the BBC the presidential runoff election will be
    rigged by war veteran militias. (BBC News)
  Cyclone Nargis:
  - A spokesman for the World Food Programme says that Myanmar's refusal to give visas
    to relief experts is "unprecedented" in the history of humanitarian assistance.
    (AP via Google News)
  - The World Food Programme suspends shipments to Myanmar after the State Peace and
    Development Council seizes supplies shipped to the country. (AP via The Houston
    Chronicle)
  - The World Food Programme says that it will resume food shipments on Saturday while
    warning of further rain in Myanmar next week. The United States has been granted
    permission to send one C-130 Hercules carrying relief aid on Monday. (AP via Google
    News)
  2008 unrest in Lebanon:
  - Hezbollah gains control of large sections of Beirut as a pro-government television
    station is forced off the air. (AFP via News Limited)
  - The United States Secretary of State Condoleezza Rice accuses Hezbollah backed
    by Syria and Iran of killing "innocent civilians". (AP via USA Today)
