Date: '2008-05-07'
Source_URI: Portal:Current events/2008 May 7
Intelligence_Payload:
  Uncategorized:
  - The genome of the platypus is sequenced. (BBC News)
  - Silvio Berlusconi, the Prime Minister of Italy, appoints his new Cabinet. (AP
    via The International Herald Tribune)
  - Hillary Clinton vows to remain as a candidate in the 2008 United States presidential
    election despite financial problems which required her to lend her campaign $6.4
    million dollars and dwindling chances of winning the Democratic Party nomination.
    (BBC News)
  - Brian Cowen, TD is elected as Irish Taoiseach by 88 votes to 76. (RTÉ)
  - Dmitry Medvedev assumes the role of the President of Russia. (BBC News)
  - CFR Cluj wins its first Championship Title in Romania.
