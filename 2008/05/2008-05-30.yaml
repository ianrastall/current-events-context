Date: '2008-05-30'
Source_URI: Portal:Current events/2008 May 30
Intelligence_Payload:
  Uncategorized:
  - In the United States, Sameer Mishra wins the 81st Scripps National Spelling Bee,
    the winning word was "guerdon", a noun meaning a reward. (USA Today)
  - A gunman shoots dead a magistrate and a Perry County, Kentucky, employee before
    killing himself in a convenience store near Hazard, Kentucky, United States. (AP
    via Yahoo! News)
  - Agathon Rwasa returns to Burundi from exile in Tanzania after an agreement between
    his Party for the Liberation of the Hutu People and the government. (BBC News)
  - A crane collapses in the Upper East Side of New York City resulting in the death
    of at least two people (AP via Google News), while another crane collapses in
    Shanghai's Pudong district, killing three. (Xinhua)
  - Former Croatian Army general Mirko Norac is sentenced by a Croatian court to seven
    years in prison for his role in the 1993 Operation Medak Pocket; Rahim Ademi is
    acquitted. (BBC News)
  - Grupo TACA Flight 390, an Airbus A320 flying from San Salvador, El Salvador, crashes
    in Tegucigalpa, Honduras, after failing to land due to a wet runway. 18 casualties
    are reported, including the chairman of the Central American Bank for Economic
    Integration who suffered a heart attack after the crash. (CNN) (Noticias24)
  - The Texas Department of Family and Protective Services reaches agreement with
    some of the families of the YFZ Ranch to start returning the children on Monday.
    (Canadian Press via Google News)
  - Cyclone Nargis
  - Aid agencies say logistical difficulties hamper Burma aid deliveries; to date,
    the United Nations reports about 180 planes carrying relief supplies have been
    unloaded in Rangoon. (VOA)
  - The pro-military junta newspaper New Light of Myanmar criticises foreign aid for
    victims of Cyclone Nargis stating that they could survive from eating frogs and
    fish in the Irrawaddy River delta.(AFP)
  - Burma begins evicting cyclone refugees from relief camps. (Reuters)
  - Fishermen in Spain, Portugal and Italy strike to protest against high fuel prices;
    Spain's economy minister says his government cannot cut fuel taxes, but is looking
    into ways to help fishermen. (VOA)
  - Sadr supporters protest against a planned U.S.–Iraq security agreement to replace
    the current United Nations mandate for U.S. troops in Iraq, which expires at end
    of 2008. (VOA)
  - Zimbabwe's Morgan Tsvangirai claims ruling party status as the leader of the opposition
    Movement for Democratic Change, delivers a "state of the nation" address to elected
    lawmakers from his party, and promises a "new era of opportunity" for Zimbabwe.
    (VOA)
  - Silverjet, an all-business class airline, suspends all flights after entering
    administration due to rising fuel costs. (BBC News)
