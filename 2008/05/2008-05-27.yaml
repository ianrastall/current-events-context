Date: '2008-05-27'
Source_URI: Portal:Current events/2008 May 27
Intelligence_Payload:
  Uncategorized:
  - Khilafat Centenary celebrated around the world by the Ahmadiyya Muslim Community.
    (CNN)
  - Rights groups say afghan women committing suicide at alarming rate; Women rights
    groups say that last year, almost 500 women chose death or disfigurement to life
    of despair by setting themselves on fire to escape forced marriages, slavery or
    sexual and other types of abuse.(VOA)
  - Argentine farmers announce that they will stop selling grain for export from 28
    May to 2 June in a deepening row with the federal government over export taxes.
    (AFP)
  - The Russian Constitutional Court meets in its first session since it relocated
    from Moscow to the historical building of the Governing Senate at the Decembrists
    Square in Saint Petersburg. (Itar-Tass)
  - The S&P/Case-Shiller index shows a record annual decline in United States house
    prices of 14.1%. (CEP News)
  - Aung San Suu Kyi
  - The State Peace and Development Council extends Aung San Suu Kyi's house arrest
    by one year. (AFP via Google News)
  - Police in Burma detain more than a dozen members of Aung San Suu Kyi's National
    League for Democracy. (AP via Google News)
  - In the aftermath of the Sichuan earthquake, the People's Republic of China evacuates
    100,000 people from Mianyang as engineers prepare to drain the landslide dam-created
    Tangjiashan Lake.(CNN)
  - Thabo Mbeki, the President of South Africa, leaves for Japan to attend a conference
    on African development despite concerns about the 2008 South African riots. (AFP)
  - Protesting soldiers seize the deputy head of the Army of Guinea a week after Lansana
    Kouyate is dismissed as Prime Minister. (BBC News)
  - Leiden University Medical Center scientists decipher the first complete DNA sequence
    of a woman. (MSNBC)
