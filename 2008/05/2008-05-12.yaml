  2008 unrest in Lebanon:
  - Hezbollah clash with forces loyal to Druze leader Walid Jumblatt in the Shouf
    mountains, and with Sunni supporters of the government in Tripoli. (BBC News)
  - United States President George W. Bush offers to help improve the Lebanese Armed
    Forces. (BBC News)
