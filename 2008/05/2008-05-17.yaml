Date: '2008-05-17'
Source_URI: Portal:Current events/2008 May 17
Intelligence_Payload:
  Uncategorized:
  - Sri Lankan troops capture the town of Palampiddi Junction from the Liberation
    Tigers of Tamil Eelam killing at least 34 rebel troops. (Bloomberg)
  - More than 3,000 people are evacuated from Lafayette, Louisiana, after two of six
    derailed train cars start leaking hydrochloric acid. (CNN), (AP via the Guardian)
  - The President of the United States George W. Bush states that a Palestinian state
    can be "defined" by the end of his Presidency including the issue of borders and
    right to resettlement. (Bloomberg)
  - An assassination threat delays the return of Morgan Tsvangarai to Zimbabwe to
    contest a runoff election to decide the presidential election. (The Guardian)
  - Islamic Courts Union rebels claim to have captured the town of Jilib in Somalia.
    (AP via Forbes)
  - '2008 Sichuan earthquake: China recommends the evacuation of seriously injured
    people from Beichuan due to concerns about rising water levels of a lake in the
    area. (Reuters)'
  - '2008 FA Cup Final: Portsmouth defeats Cardiff by a scoreline of 1-0 to lift the
    trophy for the second time in their history. (The Football Association)'
