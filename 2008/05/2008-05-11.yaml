Date: '2008-05-11'
Source_URI: Portal:Current events/2008 May 11
Intelligence_Payload:
  2008 attack on Omdurman and Khartoum:
  - Sudan's government halts an attack on the country's capital Khartoum by hundreds
    of rebels from Darfur. (Al-jazeera)
  - Sudan breaks diplomatic ties with Chad, claiming it backed the rebel attack. (BBC
    News)
  - Sudan's ambassador to the United Nations Abdalmahmood Abdalhaleem says there is
    proof that Chad supported the rebels. Opposition leader Hassan al-Turabi is arrested.
    (BBC News)
  Cyclone Nargis:
  - The International Federation of the Red Cross says that the cargo ship carrying
    the first load of food aid from the Red Cross for survivors of Cyclone Nargis
    has sunk in the Irrawaddy River. (Reuters) (AP via Yahoo! News)
  - The official death toll for Cyclone Nargis rises to 28,458. (Vatican Radio)
  Uncategorized:
  - Pakistan's two main coalition leaders, Asif Ali Zardari and Nawaz Sharif meet
    with U.S. Assistant Secretary of State Richard Boucher in London to discuss the
    removal of judges by President Pervez Musharraf, but fail to reach an agreement.
    (AP via CNN)
  - Run-offs in the Zimbabwean presidential election, according to George Chiweshe,
    the elections commissioner, must be delayed past the time allotted by law, up
    to a year, until funding can be found. (AP via CNN)
  - Serbian voters go to the polls in the Serbian parliamentary election, 2008. A
    pro-Europe coalition associated with the President of Serbia Boris Tadić wins
    the most votes. (BBC News) (Sydney Morning Herald)
