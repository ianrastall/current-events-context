Date: '2008-05-15'
Source_URI: Portal:Current events/2008 May 15
Intelligence_Payload:
  Uncategorized:
  - '2008 Andean diplomatic crisis: Interpol confirms that Colombia did not tamper
    with computer files in hardware seized from Raul Reyes. This alleged that Venezuela
    and Ecuador provided funding, assistance and drug routes to the terrorist group
    Revolutionary Armed Forces of Colombia. However, Interpol stated that they had
    not looked at the content of the files, only their authenticity. (BBC News) (CNN)'
  - Mergers and Acquisitions
  - CBS Corporation agreed to buy the popular computer and technology website CNET
    Networks for $1.75 billion. (BBC News)
  - General Electric has stated that it wants to auction off its domestic appliances
    business. GE has been involved in that field of business since 1907. (Bloomberg.com)
  - The California Supreme Court rules that a ban on same-sex marriage is unconstitutional
    under the California state constitution. (Sacramento Bee) (AP via Yahoo! News)
  - Economy of the United States
  - The number of United States workers filing jobless claims for initial unemployment
    benefits rises by 6,000 while the number on benefit rolls after a first week of
    aid hit a four-year high. (Reuters)
  - The Federal Reserve System reports that the industrial output of the nations factories,
    mines and utilities fell by 0.7% in April in a broad-based decline led by motor
    vehicles. (MarketWatch)
  - Burma
  2008 Sichuan earthquake:
  - The death toll from the earthquake reaches nearly 20,000. (BBC News)
  - The Government of China predicts that the death toll could reach 50,000. (The
    Telegraph)
  - Myanmar's military junta, the State Peace and Development Council, claims that
    the Burmese constitutional referendum, 2008 approved their new constitution of
    Myanmar with a 92.4% majority. (AFP)
  - The State Peace and Development Council warns that legal action will be taken
    against those people that hoard or trade international foreign aid as the death
    toll from Cyclone Nargis rises to 43,000. (AP via Google News)
