Date: '2008-05-26'
Source_URI: Portal:Current events/2008 May 26
Intelligence_Payload:
  Uncategorized:
  - The International Atomic Energy Agency releases a report accusing Iran of hiding
    information about alleged studies of producing nuclear warheads and defying demands
    to suspend its uranium enrichment. (AFP)
  - China relaxes its one-child policy to allow parents of children killed in the
    2008 Sichuan earthquake to have another child. (Canadian Press via Google News)
  - Westpac signs an implementation agreement for its take over of the St George Bank,
    creating the largest bank in Australia with a market capitalisation of A$66 billion.
    (The Australian)
  - Nepalese authorities ban rallies and mass meetings in Kathmandu prior to the first
    meeting of the Nepalese Constituent Assembly which is expected to declare Nepal
    a republic. (BBC News)
  - A court in Ethiopia sentences former ruler Mengistu Haile Mariam to death for
    his role in the Red Terror. (BBC News)
  - Embattled Canadian Minister of Foreign Affairs Maxime Bernier resigns after admitting
    to having left confidential documents unsecured in a private home. (CBC)
  - The BJP wins a plurality in elections in the Indian state of Karnataka. (BBC News)
  - The caretaker government of Bangladesh will establish a truth commission to deal
    with past corruption by politicians. (BBC News).
  - The European Beaver will be reintroduced to Scotland after 400 years. (AFP)
