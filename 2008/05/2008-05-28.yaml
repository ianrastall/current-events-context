Date: '2008-05-28'
Source_URI: Portal:Current events/2008 May 28
Intelligence_Payload:
  Uncategorized:
  - Engineers announce that the Leaning Tower of Pisa has been stabilized for the
    first time, and will remain stable for 200 more years. (BBC News)
  - Australian paleontologists discover Materpiscis, a 380-million-year-old placoderm
    fish which is the earliest known animal to bear live young. (BBC News), (ABC News
    Australia)
  - The Governor of New York David Paterson directs New York state agencies to recognise
    gay marriages performed in other jurisdictions such as Canada, California and
    Massachusetts. (The New York Times)
  - In Dublin, over 100 countries, not including the United States, Russia, or China,
    agree to the Convention on Cluster Munitions banning cluster bombs. (RTÉ) (AFP
    via Yahoo! News)
  - Ehud Barak, the Defense Minister of Israel and Leader of the Labor Party, calls
    for the resignation of the Prime Minister of Israel Ehud Olmert to step aside
    to face corruption allegations. (AP via Google News)
  - The Majlis of Iran elects Ali Larijani as its new Speaker. (AFP via Google News)
  - Nepal
  - The Nepalese Constituent Assembly meets for the first time since the Nepalese
    Constituent Assembly election, 2008 with the Assembly expected to establish a
    new Constitution of Nepal. (BBC News)
  - The Nepalese Constituent Assembly declares Nepal to be a federal, democratic republic
    abolishing the 240-year-old Nepalese monarchy. (Sify)
