Date: '2008-05-20'
Source_URI: Portal:Current events/2008 May 20
Intelligence_Payload:
  Uncategorized:
  - Ten thousand Iraqi troops enter Sadr City in Baghdad to seize control from Shiite
    militants. (CBS News)
  - The SPLA attacks Sudanese government soldiers at Abyei, a disputed town at the
    border of South Sudan. (BBC News)
  - Cyclone Nargis
  - The Secretary-General of the United Nations Ban Ki-moon leaves for Burma calling
    the situation critical. (AFP)
  - Burma commences a three day period of mourning for victims of Cyclone Nargis and
    allows entry to foreign aid workers from neighboring countries. (AP via Google
    News)
  - '2008 United States presidential election: Voters in Oregon and Kentucky go to
    the polls to vote in primary elections. (The New York Times)'
  - Senator Hillary Clinton of New York wins the Kentucky Democratic primary, 2008.
    (CNN)
  - Senator Barack Obama of Illinois is projected to win the Oregon Democratic primary,
    2008. (Boston Globe)
  - A 24-hour strike by employees of the National Railway Company of Belgium ends
    rail services in Belgium and to France, Germany and the Netherlands. (AFP)
  - Ma Ying-jeou is sworn in as the President of the Republic of China (Taiwan) with
    Liu Chao-shiuan as his Premier. (BBC News)
  - Manoel de Oliveira is awarded a palme d'or for his lifetime career achievement
    at the 2008 Cannes Film Festival. (Festival website)
