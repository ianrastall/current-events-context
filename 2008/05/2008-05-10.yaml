Date: '2008-05-10'
Source_URI: Portal:Current events/2008 May 10
Intelligence_Payload:
  May 2008 tornado outbreak sequence:
  - A tornado kills at least nine in Picher, Oklahoma. (KTUL.com) (AP via Yahoo! News)
  - A swarm of tornadoes in southwest Missouri kills at least 12 people with much
    of the damage in Newton County, Missouri. (Reuters) (AP via Google News) (NOAA)
  Uncategorized:
  - '2008 United States presidential election: Illinois Senator Barack Obama takes
    the lead in support from superdelegates to the Democratic National Convention
    (The New York Times)'
  - News Corporation withdraws its bid to purchase the New York City newspaper Newsday.
    (The New York Times)
  - '2008 attack on Omdurman and Khartoum: Hundreds of Darfur rebels from the Justice
    and Equality Movement reach the outskirts of Khartoum and engage in clashes with
    the Sudanese military. (AP via Google News)'
  - Russia's air force chief Col.-Gen. Alexander Zelin accuses NATO fighters of launching
    "air attacks" during escort of Russian bombers. (AP via CNN.com)
  - Muqtada al-Sadr and the Iraqi Government announced a ceasefire in Baghdad's Sadr
    district. (CNN)
  - 'Ninawa campaign: The Iraqi Army launched a major operation in the northern city
    of Mosul against al-Qaeda and its allies. (BBC News)'
  - Morgan Tsvangarai, the Leader of the Movement for Democratic Change in Zimbabwe,
    announces that he will contest a runoff election in the Zimbabwean presidential
    election, 2008. (BBC News)
  - Voters in Burma go to the polls for the Burmese constitutional referendum, 2008
    despite the widespread devastation caused by Cyclone Nargis with widespread concerns
    about the legitimacy of the process. (BBC News)
  - Negotiators from Pakistan's two major coalition parties meet in London, but fail
    to reach an agreement. (AP via CNN)
  2008 unrest in Lebanon:
  - The Prime Minister of Lebanon Fuad Saniora accuses Hezbollah of staging "an armed
    coup" against Lebanon. (AP via The International Herald Tribune)
  - The Lebanese Army overturns two key government decisions in order to reduce tension
    between Hezbollah and the Government of Lebanon. (YA Libnan)
