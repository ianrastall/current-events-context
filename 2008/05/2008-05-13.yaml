Date: '2008-05-13'
Source_URI: Portal:Current events/2008 May 13
Intelligence_Payload:
  Uncategorized:
  - U.S. federal prosecutors have filed a new indictment against baseball slugger
    Barry Bonds, charging him with 14 counts of lying to a grand jury and one count
    of obstruction of justice when he denied knowingly using performance-enhancing
    drugs. (AP via Yahoo! News)
  - Wayne Swan, the Treasurer of Australia, delivers his first budget establishing
    $40 billion funds for infrastructure, health and education. (News Limited)
  - Hewlett-Packard agrees to buy Electronic Data Systems for $13.9 billion dollars.
    (Bloomberg)
  - Ministers from Nawaz Sharif's party Pakistan Muslim League (N) resign from the
    Government of Pakistan. (BBC News)
  - 2008 United States presidential election
  - A series of bomb blasts hits the Indian city of Jaipur, killing at least 60 people
    and injuring 150. (BBC News)
  - Eleven people are killed and 20 wounded in clashes between Iraqi militias and
    the United States Army in the Sadr City district of Baghdad. (BBC News)
  - The United States Department of Defense drops charges against Mohammed al Qahtani,
    who was suspected of being the "20th hijacker" in the September 11, 2001 attacks.
    (BBC News)
  - Colombian warlord extradition
  2008 Sichuan earthquake:
  - The death toll from the earthquake reaches 12,000. (CNN)
  - The Chinese government launches a massive rescue operation to search for survivors.
    (BBC News)
  Cyclone Nargis:
  - The State Peace and Development Council continues to block foreign aid workers
    from entering Burma. (BBC News)
  - The United Nations call for the opening of an air corridor to bring aid to the
    victims. (BBC News)
  - West Virginia voters go to the polls in the Democratic Party primary to elect
    28 delegates to the 2008 Democratic National Convention. New York Senator Hillary
    Clinton obtains a clear victory. (Washington Post)
  - Senator Clinton welcomes the vote in West Virginia as an "overwhelming vote of
    confidence" in her campaign.
  - Colombia extradites 14 former paramilitary leaders, including Salvatore Mancuso,
    Rodrigo Tovar Pupo, and Diego Murillo Bejarano, to the United States where they
    have been charged with drug trafficking. (BBC News)
  - President of Colombia Álvaro Uribe says that the assets of warlords will be confiscated
    to compensate victims.
