Date: '2008-05-14'
Source_URI: Portal:Current events/2008 May 14
Intelligence_Payload:
  Uncategorized:
  - The discovery of G1.9+0.3, the youngest known supernova remnant in the Milky Way
    Galaxy, is announced. (NASA)
  - Food prices center stage at EU-Latin America summit. (Reuters)
  - Democrat Marc Dann resigns as the Ohio Attorney General following a sexual harassment
    scandal involving several of his aides and an admitted affair with a subordinate.
    (Akron Beacon Journal)
  - '2008 United States presidential election: John Edwards, a former contender to
    be the Democratic Party nominee, endorses the bid of Barack Obama. (BBC News)'
  - The United States Department of the Interior declares that the polar bear is a
    threatened species due to declining levels of Arctic Ocean ice as a result of
    global warming. (AP via The New York Times)
  - A suicide bomber kills at least 22 people and injures 40 in an attack on a funeral
    in a village west of Baghdad. (AP via Yahoo! News) (BBC News)
  - Israel
  - The Prime Minister of Israel Ehud Olmert warns Hamas that Israel will "not tolerate"
    attacks. (AP via Google News)
  - The President of the United States George W. Bush starts a trip to the Middle
    East where he will celebrate Israel's sixtieth anniversary and meet with King
    Abdullah of Saudi Arabia. (BBC News)
  - A Katyusha rocket fired at the Israeli city of Ashqelon struck a clinic in the
    third floor of the Huzot shopping mall. This attack resulted in three people seriously
    injured, two moderately injured and eleven people suffered minor wounds. The Popular
    Front for the Liberation of Palestine claims responsibility. (Haaretz)
  - NATO raises concerns about an increase in insurgent attacks in Afghanistan and
    raises concern that it is partly due to agreements between Pakistan and militants
    in the Federally Administered Tribal Areas of Pakistan. (Reuters)
  - 2008 Sichuan earthquake
  - Xinhua reports that the confirmed death toll from the 2008 Sichuan earthquake
    has reached nearly 15,000. Nearly sixty thousand people remain missing near the
    epicentre of the earthquake. (The Telegraph) (AP via Google News)
  - Xinhua reports that 2,000 People's Liberation Army troops have been sent to repair
    "extremely dangerous cracks" in the Zipingku Dam, upriver from Dujiangyan City
    in Sichuan province. (AP via Google News)
  - Cyclone Nargis
  - The United Nations is warning that another cyclone could be forming near Myanmar
    which was devastated by Cyclone Nargis. (AP via Fox News)
  - Thailand claims that the State Peace and Development Council will allow 30 Thai
    doctors to visit the Irrawaddy River Delta region worst hit by the cyclone. (AFP
    via The Times of South Africa) (AP via Yahoo! News)
  - The Prime Minister of Thailand Samak Sundaravej fails to convince the State Peace
    and Development Council to open up for international relief efforts and allow
    foreign aid workers into the country. (Reuters)
  - A car bomb explodes in a civil guards barracks in the town of Legutiano in the
    Basque Country of Spain killing at least one person and injuring several others.
    (AFP via Google News)
  - In football, Zenit St Petersburg of Russia win the 2008 UEFA Cup after defeating
    Scottish side Rangers 2–0 in the final. (BBC News)
