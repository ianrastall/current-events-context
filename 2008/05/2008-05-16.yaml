Date: '2008-05-16'
Source_URI: Portal:Current events/2008 May 16
Intelligence_Payload:
  Uncategorized:
  - 10 people were shot at a branch of the Rizal Commercial Banking Corporation (RCBC)
    in Cabuyao, Laguna, Philippines, with 9 dead and 1 in critical condition in what
    could be one of the bloodiest bank robberies in the nation's history. USA Today.com
    - 9 killed during Philippine bank robbery
  - Leonel Fernández is re-elected as the President of the Dominican Republic in the
    2008 presidential election. (AP via International Herald Tribune)
  - A pipeline explosion near Lagos, Nigeria, kills up to 100 people. (Times Online)
  - A strong aftershock to the 2008 Sichuan earthquake knocks out roads and communications
    to some of the worst affected areas disrupting rescue efforts. (AP via Forbes)
  - Former United States Olympic sprinter Tim Montgomery is sentenced to 46 months
    imprisonment for his involvement in a check fraud and money laundering scheme.
    (Reuters)
  - The United States reaches a deal with North Korea to resume food aid with 500,000
    tonnes of food to be sent to North Korea during the next year. (AFP via Google
    News)
  - The State Peace and Development Council in Burma doubles the death toll from Cyclone
    Nargis to 78,000 with 55,917 people missing and 19,359 people injured. (The New
    York Times)
  - The Court of Arbitration for Sport overturns the IAAF's decision to ban South
    African double-amputee runner Oscar Pistorius from its competitions, thus clearing
    the way for him to attempt to become the first leg amputee to participate in the
    Olympic Games. (BBC News)
  - A suicide bomber kills at least nine people, including 7 police, and wounds 90
    in Sri Lanka's capital Colombo. (BBC News)
  - The President of the United States George W. Bush arrives in Saudi Arabia to discuss
    rising fuel prices with King Abdullah of Saudi Arabia. Saudi Arabia later announces
    plans to raise its output by 300,000 barrels a day. (AP via Google News) (Bloomberg)
  - The runoff election for the 2008 presidential election between the President of
    Zimbabwe Robert Mugabe and Morgan Tsvangirai of the Movement for Democratic Change
    is set for June 27. (BBC News) (AP via Yahoo! News)
  - Al-Qaeda leader Osama bin laden leaves an audio message on the Internet vowing
    to continue the fight against Israel. (RTÉ)
