Date: '2008-05-22'
Source_URI: Portal:Current events/2008 May 22
Intelligence_Payload:
  Uncategorized:
  - A bomb in Exeter, England explodes in the Princesshay shopping centre linked to
    Islamic terrorism.(BBC) (CNN)
  - California Governor Arnold Schwarzenegger declares a state of emergency in Santa
    Cruz County for the ongoing Summit Fire burning in the Santa Cruz Mountains. (CNN)
    (KSBW)
  - 'Weld County Tornado: One person is killed and at least 100 are injured in Weld
    County, Colorado after a tornado tears through the county. Colorado Governor Bill
    Ritter declares a state of emergency and activates the Colorado National Guard
    in the affected region. (The Denver Post)(ABC 7)'
  - Two civilians and a Lithuanian soldier are killed as an Afghan protest over the
    Koran shooting outside the Chagcharan Airfield in the Ghor Province of Afghanistan
    turns violent. (CNN)
  - The death toll from the 2008 Sichuan earthquake rises to 51,151 with 29,328 still
    missing. (AFP via Times of South Africa)
  - The President of Georgia Mikheil Saakashvili claims victory for his United National
    Movement party in the Georgian legislative election, 2008 with the Opposition
    claiming that the vote had been rigged. (Reuters)
