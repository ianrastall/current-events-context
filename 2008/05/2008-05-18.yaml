Date: '2008-05-18'
Source_URI: Portal:Current events/2008 May 18
Intelligence_Payload:
  Uncategorized:
  - A senior Revolutionary Armed Forces of Colombia commander known as "Karina" surrenders
    to Colombian authorities. (CNN)
  - Russia wins the 2008 IIHF World Championship defeating Canada 5-4 in overtime.
    (AFP via Google News)
  - Ahmed Ali Ahmed, one of the leaders of al-Qaeda in Iraq, is sentenced to death
    for killing Archbishop Paulos Faraj Rahho. (Reuters)
  - General Than Shwe, the Burmese leader, visits victims of Cyclone Nargis. (BBC
    News)
  - Approximately 16,000 people are evacuated in Chofu, Japan while a World War II
    era bomb is defused. (Bloomberg)
  - Gordon Brown, the UK Prime Minister, says that people should support a bill permitting
    the use of human-animal embryos. (BBC News)
  2008 Sichuan earthquake:
  - The death toll from the earthquake reaches 32,477, with 14,000 still missing and
    205,000 people evacuated. (San Francisco Chronicle) (Bloomberg)
  - The People's Republic of China declares three days of national mourning for victims
    of the earthquake and suspends the 2008 Summer Olympics torch relay. (AP via Forbes)
