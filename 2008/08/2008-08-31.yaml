Date: '2008-08-31'
Source_URI: Portal:Current events/2008 August 31
Intelligence_Payload:
  Hurricane Gustav:
  - New Orleans mayor Ray Nagin orders the mandatory evacuation of the city ahead
    of Gustav. (NYT)
  - President George W. Bush and Vice President Dick Cheney cancel visits to the 2008
    Republican National Convention due to Gustav. (Los Angeles Times)
  Uncategorized:
  - Heavy rains in central Japan cause flooding in Okazaki city forcing evacuation
    of thousands of people. (CNN)
  - Journalist Magomed Yevloyev, owner of the non-government news agency Ingushetiya.ru,
    is shot dead in police custody in Ingushetia. (BBC) (The Australian) (AP)
  - The death toll of the 2008 Panzhihua earthquake rises to 32, with 467 others injured.
    More than 250,000 houses have been damaged or destroyed. (BBC)
