Date: '2008-08-05'
Source_URI: Portal:Current events/2008 August 5
Intelligence_Payload:
  Uncategorized:
  - Rwanda formally accuses senior French officials, including former Prime Minister
    Dominique de Villepin and late President François Mitterrand, of involvement in
    the 1994 Rwandan Genocide and calls for them to be put on trial. (Reuters)
  - U.S. President George W. Bush, on his way to Beijing to attend the Olympics, stops
    in South Korea and Thailand. (FOX News)
  - A 6.0 magnitude earthquake strikes Sichuan, China, according to the US Geological
    Survey. (RTÉ News) (CNN)
