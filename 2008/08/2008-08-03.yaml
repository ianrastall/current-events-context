Date: '2008-08-03'
Source_URI: Portal:Current events/2008 August 3
Intelligence_Payload:
  Uncategorized:
  - 162 people die in a stampede at a Hindu temple in Naina Devi in the northern Indian
    state of Himachal Pradesh. (AFP via Google News)
  - North Korea says that it will expel "unnecessary" South Korean staff from the
    Kumgangsan resort and threatens military action in an escalation of tension over
    the shooting of a South Korean tourist. (Reuters)
  - The third launch of privately developed SpaceX launcher Falcon 1 fails to reach
    orbit. (Spaceflightnow.com)
  - Australia's Civil Aviation Safety Authority launches an investigation into safety
    at Qantas after three emergencies in two weeks, beginning with the explosion aboard
    Qantas Flight 30. (ABC News)
  - At least 21 street cleaners are killed by a roadside bombing in Mogadishu, Somalia.
    (CNN)
  - 12 people are killed when a minibus explodes in Baghdad, Iraq. (CNN)
  - 11 climbers are feared to have died in an avalanche at K2 mountain in Pakistan.
    (CNN)
