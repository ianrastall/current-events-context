Date: '2008-08-11'
Source_URI: Portal:Current events/2008 August 11
Intelligence_Payload:
  Uncategorized:
  - An air strike by the United States kills 25 Taliban militants and 8 civilians
    in Orūzgān Province in southern Afghanistan. (The Australian)
  - The United States team wins the 4x100 men's freestyle relay setting a new world
    record with France and Australia finishing second and third respectively. The
    top five teams all broke the previous world record and Australia's Eamon Sullivan
    in the lead-off leg broke the record for 100m. (The New York Times) (SI via CNN)
  - Taliban fighters force Pakistani troops to retreat from an outpost near the border
    with Afghanistan. (The New York Times)
  - The Autonomous Region in Muslim Mindanao in the Philippines are holding elections
    using for the first-time electronic voting as precedent to the Presidential elections
    in 2010. (ABS-CBN)
  2008 South Ossetian War:
  - According to Ossetian and Russian sources, Georgian attacks leave 2000 dead in
    South Ossetia, most of which civilian population of Tskhinvali. (The Guardian)
  - Breakaway republic of Abkhazia launched an attack on Georgian forces in the Kodori
    Valley, the region of Abkhazia under control of Georgians, where the parallel
    Tbilisi-backed "Government of the Autonomous Republic of Abkhazia in exile" is
    situated. (AFP via News.Com.Au) (Al Jazeera)
  - Fearing an air raid, the President of Georgia Mikheil Saakashvili run for cover
    during an interview in Gori. (CNN) (CNN via YouTube)
  - Russia is attacking Georgia in a cyberwar. (Ars Technica)
  - The President of the United States George W. Bush warns Russia to respect "Georgia’s
    territorial integrity and sovereignty. (The New York Times)
