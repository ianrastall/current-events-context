Date: '2008-08-21'
Source_URI: Portal:Current events/2008 August 21
Intelligence_Payload:
  Uncategorized:
  - Somali pirates captured a total of three vessels in two days. (Xinhuanet)
  - US District Judge Jeremy Fogel of the Northern District of California denies a
    motion by Universal Studios to dismiss a lawsuit against it alleging that Universal
    sent a DMCA takedown notice in bad faith. (text of the order via EFF) (Ars Technica)
  - The United States Food and Drug Administration approves irradiation of lettuce
    and spinach to kill E. coli and other dangerous germs. (AP via Google News)
  - '2008 Wah bombing: Two suicide bombings occur in the cantonment city of Wah Cantonment
    in Pakistan killing at least 76 people and injuring 110. (Xinhua)'
  - One student is killed in a shooting at Central High School in Knoxville, Tennessee.
    (Knoxville News-Sentinel)
  - At least 74 people die in northern India as a result of heavy monsoon rains. (AP
    via Google News)
