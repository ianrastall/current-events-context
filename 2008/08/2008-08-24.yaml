Date: '2008-08-24'
Source_URI: Portal:Current events/2008 August 24
Intelligence_Payload:
  Uncategorized:
  - A suicide bomber attacks a feast in Baghdad's Abu Ghraib district resulting in
    at least 21 deaths. (BBC News)
  - A small plane crashes east of Guatemala City, killing ten and injuring four. (Canadian
    Press via Google News)
  - Iran Aseman Airlines Flight 6895, a Boeing 737, crashes in Bishkek, Kyrgyzstan
    shortly after takeoff, killing 71 people. (AFP via Google News)
  - Protesters in the Indian state of West Bengal "lay siege" to the factory producing
    the Tata Nano, in a dispute over land expropriation. (BBC News)
  2008 South Ossetia War:
  - A train carrying oil products hits a landmine and catches fire. A Georgian Interior
    Ministry spokesman blamed Russia for the blast. (CNN)
  - The United States Navy's destroyer, the USS McFaul, arrives at the Black Sea port
    of Batumi to deliver aid for Georgia. (Bloomberg)
  - United States warns that Russia is establishing permanent facilities in Georgia.
    (Xinhua)
  2008 Summer Olympics:
  - Samuel Wanjiru of Kenya wins the gold medal in the men's marathon at the 2008
    Summer Olympics setting a new Olympic record of 2:06:32. (AP via Yahoo! News)
  - The United States wins the gold medal in men's basketball at the 2008 Summer Olympics.
    (ESPN)
  - The Summer Olympics concludes after 16 days with the closing ceremony. (Xinhua)
