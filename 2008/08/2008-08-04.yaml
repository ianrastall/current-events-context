Date: '2008-08-04'
Source_URI: Portal:Current events/2008 August 4
Intelligence_Payload:
  Uncategorized:
  - U.S. conservative political commentator Robert Novak retires after 45 years. The
    only reason for retirement was a previously discovered brain tumour. Novak is
    also involved in the CIA leak scandal. (CBS News)
  - Eleven climbers from an international expedition are reported dead after ice fall
    took out the fixed ropes on part of the route on K2 mountain in the Himalayas.
    (AP via Yahoo! News)
  - A police post near Kashgar in the Xinjiang Uyghur Autonomous Region of China is
    attacked, leaving 16 officers dead and 16 others injured. (BBC News)
