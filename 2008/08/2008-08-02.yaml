Date: '2008-08-02'
Source_URI: Portal:Current events/2008 August 2
Intelligence_Payload:
  Uncategorized:
  - Latvia holds a constitutional referendum on whether to allow referendums on dissolving
    parliament and calling early elections. Although the vote was invalidated, as
    turnout did not meet the 50% threshold, the results (96% in favour of the change)
    are considered likely to press politicians to adopt a similar measure nonetheless.
    (AFP) (Reuters)
  - Two climbers from an international expedition perish after ice fall on K2 mountain
    in the Himalayas, and six members of the team have gone missing. (BBC News)
  - The International Olympic Committee strips the United States 2000 Summer Olympics
    4×400 metre relay team of their gold medal after team member Antonio Pettigrew
    admits to doping. (Reuters)
  - Members of the South Asian Association for Regional Cooperation meet to discuss
    trade, terrorism, and poverty. Tensions between India and Pakistan threaten to
    overshadow the eight-nation gathering. (AFP via Google News) (Reuters)
