Date: '2008-08-14'
Source_URI: Portal:Current events/2008 August 14
Intelligence_Payload:
  Uncategorized:
  - Donald Tusk, the Prime Minister of Poland, announces that the United States and
    Poland have reached an agreement on basing missile defense in Poland. (AP via
    Google News)
  - The Consumer Price Index in the United States rises by .8 per cent in July 2008
    giving an annual inflation rate of 5.6 per cent, the highest in 17 years. (The
    Times)
  - 2008 Summer Olympics
  - Judge Jamie S. Perri of New Jersey's Superior Court rules that the Communications
    Decency Act exempts the Wikimedia Foundation from liability in a defamation suit
    filed by literary agent Barbara Bauer. (Ars Technica)
  2008 South Ossetia war:
  - Russia says it will support whatever decision the people of breakaway republics
    of Abkhazia and South Ossetia will make during referendum on the future of their
    land (International Herald Tribune) (The New York Times)
  - Analysts 'see the conflict as a gamble initiated by Georgia, which is seeking
    EU and NATO membership, to test the strength of its Western allies in the face
    of Russia's unwillingness to see the West encroaching on its doorstep.' (CNN)
  - An Amnesty International worldwide movement for human rights reported on August,
    14, that the assault of the Georgian Army on Tskhinvali included '14 hours of
    bombardment' of the city. Amnesty International is still gathering information
    on the reported heavy civilian casualties, as well as reported bombings of non-military
    targets leading to deaths of civilians and the destruction of civilian buildings.
    (Amnesty International)
  - Russia appeared 'to be handing over a key Georgian city Thursday', U.S. officials
    said. Senior U.S. General James Cartwright claims that 'Russian forces seemed
    to be complying with an internationally-mediated cease-fire'. (CNN)
  - Georgia's Prime Minister Lado Gurgenidze claimed that more than 100 Russian vehicles,
    some of them armoured, had gathered outside the major western Georgian town of
    Zugdidi. However, Robert Gates, the US Secretary of Defense, said that the Russian
    army is 'withdrawing their forces back towards Abkhazia and towards South Ossetia'
    US warns Russia of lasting impact (BBC News)
  - Russian forces say they will start to return control of the key town of Gori to
    Georgia soon. 'For another two days Russian troops will stay in the region to
    ... hand over control functions to Georgian law-enforcement bodies, after which
    they will leave," Major-General Vyacheslav Borisov as quoted by Russian news agencies.
    (Reuters)
  - Georgian police return to the town of Gori as the Armed Forces of the Russian
    Federation leave. (CNN)
  - China's Liu Zige wins the 2008 Beijing Olympics' women's 200-meters-butterfly
    gold setting a world record of two minutes and 04.18 seconds. (China Daily)
  - The Australian team of Stephanie Rice, Bronte Barratt, Kylie Palmer and Linda
    Mackenzie wins the 800 metre freestyle relay breaking the existing world record
    by six seconds. China and the United States finish second and third respectively.
    (AP via Google News)
