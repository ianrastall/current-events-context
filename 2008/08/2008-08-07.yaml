Date: '2008-08-07'
Source_URI: Portal:Current events/2008 August 7
Intelligence_Payload:
  Georgian-Ossetian conflict:
  - Georgian and separatist South Ossetian forces have exchanged fire again near the
    town of Tskhinvali, wounding up to 20 people, officials say. (BBC News)
  - The Russian Foreign Ministry said it was concerned over Georgia's "military preparations,"
    while a Georgian official said Russia would further undermine its role as peacekeeper
    if it failed to convince the South Ossetian side on talks. (Civil Georgia) (Civil
    Georgia)
  - Mikheil Saakashvili, Georgia's president, offers an immediate ceasefire to South
    Ossetian authorities. (BBC News)
  Business and economy:
  - The New York State Attorney General Andrew Cuomo reaches a $7 billion settlement
    with Citigroup to buy back auction rate securities from about 40,000 clients throughout
    the United States. (AP via Google News)
  - Claims for unemployment benefits in the United States rise to 455,000, the highest
    level since March 2002. (USA Today)
  Law and crime:
  - Salim Hamdan, Osama Bin Laden's former driver, is sentenced to 66 months in prison
    for war crimes. (The New York Times)
  - The Mayor of Detroit Kwame Kilpatrick is ordered to go to jail for violating the
    terms of his bond for an ongoing perjury trial. (NPR)
  Politics and elections:
  - The leaders of the 2008 Mauritanian coup d'état promise to hold elections as soon
    as possible. (Xinhua)
  - Pakistan's ruling coalition announces it will seek the impeachment of President
    Pervez Musharraf. (AP via Google News)
  Sport:
  - The National Olympic Committee officially announces Durban, South Africa, will
    be the host city of the 123rd IOC Session.(Hong Kong Government Press Release)
