Date: '2008-11-06'
Source_URI: Portal:Current events/2008 November 6
Intelligence_Payload:
  Uncategorized:
  - Lindsay Roy of the Scottish Labour Party wins the Glenrothes by-election despite
    concerns that his party may lose the seat to the Scottish National Party. (BBC
    News)
  - According to officials, an explosion kills at least 11 people aboard a minibus
    in the North Caucasus city of Vladikavkaz, Russia. (BBC News)
  - Jigme Khesar Namgyel Wangchuck is coronated as the fifth King of Bhutan, replacing
    his father Jigme Singye Wangchuck, who abdicated his power, making him the world's
    youngest monarch. (BBC News)
  - Tropical Storm Paloma, the 16th named storm of the 2008 Atlantic hurricane season,
    forms off the coast of Nicaragua with the potential to become a hurricane within
    24 hours. (AP via Yahoo News)
  - Philosopher and academic Jean-Luc Marion is elected to become a member of the
    French Academy, replacing the late Jean-Marie Lustiger. (Académie française)
  - Johnson Toribiong is declared the winner of the Palauan presidential election
    and will succeed Thomas Remengesau Jr. as President. (Pacific Magazine)
