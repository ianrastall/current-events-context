Date: '2008-11-22'
Source_URI: Portal:Current events/2008 November 22
Intelligence_Payload:
  Uncategorized:
  - The government of Colombia confirms that the eruption of Nevado del Huila, a volcano
    in southern Colombia, has led to at least 10 deaths in recent days and the evacuation
    of 12,000 people. (BBC)
  - The Kurdistan Workers Party claims responsibility for bombing an oil pipeline
    between Iraq and Turkey. (ABC News Australia)
  - Saudi Arabia's Royal Navy joins NATO's mission in combating piracy in Somalia.
    (Bloomberg)
  - New Zealand's national rugby league team defeats Australia's team 34 to 20 in
    the final of the 2008 Rugby League World Cup. (IHT)
  - Studies reveal children in the Northern Hemisphere born in the autumn months have
    the highest rates of asthma, probably caused by winter viruses like RSV. (U.S.
    News & World Report) (AJRCCM study)
  - Zimbabwe refuses to grant visas for Kofi Annan, Jimmy Carter and Graça Machel,
    who were traveling to the country on a humanitarian mission. (VOA News)
  - The Asia-Pacific Economic Cooperation's annual summit opens in Lima, Peru, amid
    an ongoing economic crisis that is expected to lead discussions. (Reuters)
