Date: '2008-11-10'
Source_URI: Portal:Current events/2008 November 10
Intelligence_Payload:
  Uncategorized:
  - Reports surface that a United States nuclear weapon was lost somewhere in the
    ice after the January 21, 1968 crash of a B-52 Stratofortress outside Thule Air
    Base, Greenland. (BBC News)
  - Ryanair Flight 4102 is forced to make an emergency landing at Rome's Ciampino
    Airport after several birds were sucked into its engines as it prepared to land.
    (BBC News)
  - Italian Prime Minister Silvio Berlusconi repeats a comment that United States
    President-elect Barack Obama is "young, handsome and also tanned," refusing to
    apologize for remarks he insisted are "flattering". (The Moscow Times)
  - India wins the Border-Gavaskar Trophy by defeating Australia 2-0 in the five-Test-match
    cricket series. (CricketNext.in)
  - An earthquake of magnitude 6.5 on Richter scale shakes western China's Qinghai
    province. (CNN)
  Global financial crisis of 2008:
  - The United States government announces a second bailout of American International
    Group; the total value of the new plan, roughly US$150 billion, represents the
    largest government support package extended to a private company in US history.(MarketWatch)
  - American retail chain Circuit City files for protection from its creditors under
    Chapter 11 of the United States Bankruptcy Code. (MarketWatch)
  - Sweden's Financial Supervisory Authority announces that it is revoking the banking
    licence of the struggling Carnegie Investment Bank. (Reuters)
  - Stocks gain worldwide after China announces a stimulus package involving US$586
    billion to finance programs in 10 major domestic areas in the next two years.
    (CNN)
