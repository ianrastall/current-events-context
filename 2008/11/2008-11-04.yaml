Date: '2008-11-04'
Source_URI: Portal:Current events/2008 November 4
Intelligence_Payload:
  Uncategorized:
  - Mexican Interior Minister Juan Camilo Mouriño dies along with at least 12 others
    after the airplane he was on crashes into rush-hour Mexico City traffic. (BBC
    News)
  - The Straits Exchange Foundation and the Association for Relations Across the Taiwan
    Straits sign four agreements for the Three Links across the Taiwan Strait, a major
    step in normalizing Cross-Strait relations. (CNN)
  - Australia Viewed wins the Melbourne Cup in a historic photo finish, followed by
    Bauer, second, and C'est la Guerre, third. (About.com)
  - Michael Crichton, author of several famous novels including Jurassic Park, The
    Lost World, and The Andromeda Strain, dies at age 66. (Gale Cengage Learning)
  United States general elections:
  - Democrat Barack Obama wins the 2008 United States presidential election after
    beating Republican John McCain, becoming the first African American to be elected
    to the office of President of the United States. Joe Biden will become the 47th
    Vice President of the United States. (CNN)
  - The Democratic Party picks up at least five seats in the Senate and modestly expands
    control in the House of Representatives. (BBC News)
