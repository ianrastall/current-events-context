Date: '2008-11-20'
Source_URI: Portal:Current events/2008 November 20
Intelligence_Payload:
  Uncategorized:
  - United States Attorney General Michael Mukasey collapses while giving a speech
    to the Federalist Society in Washington, D.C. (Politico)
  - The Swedish Parliament ratifies the Treaty of Lisbon. (Dagens Nyheter)
  - NASA's Mars Reconnaissance Orbiter discovers evidence of enormous underground
    deposits of water ice on Mars; one such deposit, under Hellas Planitia, is estimated
    to be the size of Los Angeles. (NASA)
  - At least one person is dead and twenty injured after a bomb is thrown into a People's
    Alliance for Democracy protest compound in Bangkok, Thailand. (ABC)
  - Five Guantánamo Bay detainees who successfully argued Boumediene v. Bush before
    the Supreme Court are ordered freed by Judge Richard J. Leon of the District Court
    for Washington, D.C. (The New York Times)
  Global financial crisis of 2008:
  - 'Automotive industry crisis: Executives of the top three U.S. automakers (Ford
    Motor Company, General Motors, and Chrysler) testify before Congress for a bailout
    package. (AP via Google)'
  - French automaker PSA Peugeot Citroën announces plans to cut 2,700 jobs due to
    falling demand in Europe. (BBC News)
  Piracy in Somalia:
  - The Russian Navy announces that it will deploy more warships in the Gulf of Aden
    to curb piracy. (AFP via Google)
  - The Indian Navy receives permission from the Somali government to enter its territorial
    waters in pursuit of pirates. (CNN-IBN)
