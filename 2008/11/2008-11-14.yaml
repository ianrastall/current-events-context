Date: '2008-11-14'
Source_URI: Portal:Current events/2008 November 14
Intelligence_Payload:
  Uncategorized:
  - At a summit in Nice, France, the European Union and Russia agree to refrain from
    deploying missiles or missile defense systems at least before mid-2009, when a
    pan-European security framework is discussed between Russia, the United States
    and the EU. (Xinhua)
  - General Ann E. Dunwoody becomes the first female four-star general in the history
    of the United States Army. (BBC News)
  - An Italian court convicts 16 and acquits 13 police officers of beating protesters
    at the 2001 G8 summit in Genoa.(The Telegraph)
  - The Eurozone enters its first recession as the combined gross domestic product
    of the 15 members dropped 0.2% in the second and third quarters of 2008. (Sky
    News)
  - India's Chandrayaan-1 unmanned lunar exploration mission successfully lands the
    Moon Impact Probe on the south pole of the Moon. (The Times of India)
  - The Montecito Tea Fire in California burns 2,500 acres and damages more than 100
    homes and the campus of Westmont College. (Los Angeles Times)
  - An investigation concludes that wake turbulence is the most likely cause of the
    November 4, 2008, airplane crash in Mexico City that killed, among others, Secretary
    of the Interior Juan Camilo Mouriño and José Luis Santiago Vasconcelos. (Reuters)
