Date: '2008-11-07'
Source_URI: Portal:Current events/2008 November 7
Intelligence_Payload:
  Uncategorized:
  - Hurricane Paloma strengthens to Category 2 strength as it lashes the Cayman Islands.
    (AFP via Google News)
  - A doctored photo of North Korean Kim Jong-il, released Wednesday, renews speculation
    about the leader's health. (BBC News)
  - A two-story school in Pétion-Ville, Haiti, collapses with 500 students inside,
    killing at least 75 people. (Reuters)
  - Malaysian blogger Raja Petra Kamarudin is released from detention under the Internal
    Security Act after a court ruled that his detention was illegal. (BBC News)
  - President of Afghanistan Hamid Karzai opens a new terminal at Kabul International
    Airport. (BBC News)
  - Unemployment in the United States reaches its highest rate in 14 years. (BBC News)
  - The Kivu conflict in the Democratic Republic of the Congo continues while the
    United Nations meets to discuss peace talks. (VOA)
