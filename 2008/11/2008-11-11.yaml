Date: '2008-11-11'
Source_URI: Portal:Current events/2008 November 11
Intelligence_Payload:
  Uncategorized:
  - Peter Eastgate of Denmark wins the 2008 World Series of Poker main event, the
    $10,000 No-Limit Hold'em World Championship, winning over US$9.1 million. (ESPN)
  - The RMS Queen Elizabeth 2 sets sail on her final voyage before she is refurbished
    and turned into a hotel in Dubai, United Arab Emirates. (BBC News)
  - Germany announces new charges against John Demjanjuk in the deaths of 29,000 people
    at the Sobibor extermination camp in Poland during the Holocaust. (BBC News)
  - A Holocaust survivor group announces the abandonment of negotiations with the
    LDS Church over the latter's continued posthumous baptism of Jews killed in the
    Holocaust. (CNN)
  - Egypt's antiquities chief, Zahi Hawass, announces the discovery of a 4,300-year-old
    pyramid belonging to Queen Sesheshet, mother of King Teti. (CNN)
  - Former President Chen Shui-bian of the Republic of China is arrested while the
    anti-corruption prosecutors have asked a three-judge panel to formally detain
    the former President. (CNN)
  - The Indian Navy foils an attempt by Somali pirates to hijack a merchant ship in
    Gulf of Aden. (The Indian Express)
  - Mohamed Nasheed is sworn in as the new President of the Maldives. (CNN)
  2008 Russian financial crisis:
  - Russian regulators halt trading on one of the country's two main stock indexes,
    the MICEX, after it fell 6.5%, dragged down by commodity and banking shares. (AP
    via Google News)
