Date: '2008-11-03'
Source_URI: Portal:Current events/2008 November 3
Intelligence_Payload:
  Uncategorized:
  - A report issued by an independent investigator hired by the Alaska Personnel Board
    finds that Republican Vice Presidential candidate and Governor of Alaska Sarah
    Palin did not violate the law with regards to the so called "Troopergate scandal".
    However, a previous, separate legislative investigation concluded that she did
    abuse her office. (MSNBC)
  - ARATS president Chen Yunlin, the official delegation of the People's Republic
    of China, arrives in Taiwan for talks with SEF chairman Chiang Pin-kung. (CNN)
  - Itaú and Unibanco announce they will merge their banking, credit, and insurance
    operations, creating the largest financial services group in Brazil and the Southern
    Hemisphere. (Folha de S. Paulo)
  - The Bangladeshi government schedules general elections on December 18, 2008, which
    will end the rule of the one and half year military-backed interim government.
    (BBC News)
