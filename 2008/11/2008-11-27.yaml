Date: '2008-11-27'
Source_URI: Portal:Current events/2008 November 27
Intelligence_Payload:
  Uncategorized:
  - An Airbus A320 owned by Air New Zealand with 7 people aboard crashes into the
    sea off the southern French coast during a training flight, exactly 29 years to
    the day (NZDT) after Air New Zealand Flight 901 crashed in Antarctica. (CNN)
  - A Polish ABW secret service report says the shooting incident in Georgia involving
    Polish President Lech Kaczyński and Georgian President Mikheil Saakashvili was
    most likely "a provocation" staged by the Georgians (The Warsaw Voice)
  - '2008 Santa Catarina floods: The Brazilian federal government authorizes nearly
    2 billion reais (881 million U.S. dollars) in emergency relief funds. (Reuters)'
  - Russia and Brazil call for the first BRIC (Brazil, Russia, India, China) summit
    of major emerging market countries in Russia to respond to the financial crisis
    in 2009. (Reuters)
  - A suicide car bomb explodes near the United States embassy in Kabul, Afghanistan,
    with at least one person dead. (AP via The New York Times)
  - An Australian soldier is killed and several injured in fighting in Oruzgan Province,
    Afghanistan. (Sydney Morning Herald)
  2008 Thai political crisis:
  - The government declares a state of emergency over two airports. (BBC News) (BangkokPost.com)
  - The Criminal Court of Thailand throws out a defamation lawsuit brought by former
    Prime Minister Thaksin Shinawatra against the People's Alliance for Democracy.
    (Bangkok Post)
  - Thai companies, agencies and some schools send their employees/students home for
    security reasons and after the coup rumours. (Nation Multimedia)
  - People's Alliance for Democracy protesters close down Don Mueang International
    Airport a day after closing down Suvarnabhumi Airport, leaving Bangkok without
    any airports. (AFP via ABC) The international transferring is moved to the closest
    U-Tapao International Airport, but it will take more than one and a half hours
    to reach Bangkok by car. (Nation Multimedia)
