Date: '2008-11-12'
Source_URI: Portal:Current events/2008 November 12
Intelligence_Payload:
  Uncategorized:
  - A judge in Taipei, Taiwan, rules that the former President Chen Shui-bian, should
    be held in jail while prosecutors seek his conviction on charges of money laundering
    and corruption. (The New York Times)
  - India's Chandrayaan-1 lunar exploration mission successfully completes its journey
    to the Moon, entering its intended operational orbit above the surface. (CNN-IBN)
  - India successfully test fires the first Sagarika submarine-launched ballistic
    missile from a land-based launcher. (The Times of India)
  - North Korea announces that it will close its land border with South Korea on December
    1, 2008. (BBC News)
  2008 Russian financial crisis:
  - Russia's two main stock exchanges are suspended for one hour after the market
    opened with a more than 10% decline in response to trends on global markets and
    falling oil prices. (Interfax via OnNet.pl Biznes)
  - Trade in Russian shares has been shifting to London traded Global Depositary Receipts
    during frequent suspensions in Moscow, dictated by rules imposed by the regulator
    to reduce volatility on Moscow's increasingly illiquid stock market.(Forbes)
