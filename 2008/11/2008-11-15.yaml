Date: '2008-11-15'
Source_URI: Portal:Current events/2008 November 15
Intelligence_Payload:
  Uncategorized:
  - Over 1 million people in 300 cities protest the passing of California's Proposition
    8. (USAToday)
  - At least 12 miners die in mine explosions in Petrila, Romania. (ABC)
  - The G20 meets in Washington, D.C. to discuss responses to the current economic
    crisis. (BBC News)
  - Mission STS-126 commences with the launch of Space Shuttle Endeavour. The spacecraft
    will deliver equipment required to increase the crew capacity of the International
    Space Station from three to six members. (NASA)
  - Israel shuts down Gaza border crossings after Qassam rockets are launched toward
    Israel in breach of an armistice. (ABC)
  - A fiery bus-truck collision in Burkina Faso kills at least 60 people. (CNN)
  - The webcomic Square Root of Minus Garfield started.
