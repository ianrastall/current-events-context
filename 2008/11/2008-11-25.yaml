Date: '2008-11-25'
Source_URI: Portal:Current events/2008 November 25
Intelligence_Payload:
  Uncategorized:
  - Reports indicate that U.S. President-elect Barack has decided to keep Robert Gates
    as the United States Secretary of Defense and tap Marine General James L. Jones
    as National Security Advisor. (USA Today)
  - The U.S. Federal Reserve announces a new US$800 billion "stimulus" package in
    which it will buy debt and mortgage-backed securities and make loans to holders
    of consumer debt (BBC News)
  - Armenia retains their championship title by beating China 2.5-1.5 in the 11th
    and final round at the 38th Chess Olympiad in Dresden, Germany. (AP via Google
    News)
  - Three people are killed in a car bombing near the Udelnaya Metro station in Saint
    Petersburg, Russia. (AFP via Google News)
  - BHP Billiton, the world's largest mining company, withdraws a $66 billion bid
    for the Rio Tinto Group due to the global financial crisis. (Bloomberg)
  - Israel again seals off the Gaza Strip in response to rocket attacks. (AFP via
    ABC News Australia)
  2008 Thai political crisis:
  - About 10,000 protesters from the People's Alliance for Democracy surround Prime
    Minister Somchai Wongsawat's temporary office at Don Mueang International Airport
    in Bangkok, Thailand. (AFP via Google News)
  - Thousands of tourists are left stranded at Suvarnabhumi Airport after protests
    against the return of the Prime Minister of Thailand from the APEC Peru 2008 summit.
    (Melbourne Herald-Sun)
