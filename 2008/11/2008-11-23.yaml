Date: '2008-11-23'
Source_URI: Portal:Current events/2008 November 23
Intelligence_Payload:
  Uncategorized:
  - Mario Fernando Hernández, a Liberal Party member of the Honduran National Congress,
    is shot dead in San Pedro Sula. (ABC News Australia)
  - Mahmoud Abbas is appointed as the President of the "State of Palestine" by the
    Central Council of the Palestinian National Authority. (BBC)
  - Human rights activists and opposition politicians in Russia's southern republic
    of Ingushetia say that the predominantly Muslim region is now in a state of civil
    war. (BBC)
  - One person is killed and several injured in an apparent failed coup attempt in
    Guinea-Bissau, hours after the controversial results of the parliamentary election
    were announced where the African Party for the Independence of Guinea and Cape
    Verde won 67 of 100 seats. (BBC News)
  - The government of Burundi abolishes capital punishment and bans homosexuality.
    Genocide and war crimes are now recognized as illegal activities. (Gulf Times)
  - Scientists led by the University of Calgary are searching for the remains of a
    meteorite that is believed to have struck northern Canada, around the border of
    Alberta and Saskatchewan, overnight. (CBC)
  - Venezuelans go to the polls for regional elections. Allies of President Hugo Chávez
    win 17 of 21 governorships, but the opposition wins in the two biggest states
    of Miranda and Zulia as well as the mayorship of Caracas. (Reuters), (BBC)
  - The Dalai Lama warns that he is losing confidence in Chinese officials and that
    the Tibetan people are facing "great danger". (AFP via Google News)
  - The Calgary Stampeders defeat the Montreal Alouettes 22-14 to win the 96th Grey
    Cup. (TSN)
  - The Columbus Crew defeat New York Red Bulls 3-1 to win MLS Cup 2008. (ESPN)
