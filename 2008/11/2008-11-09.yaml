Date: '2008-11-09'
Source_URI: Portal:Current events/2008 November 9
Intelligence_Payload:
  Uncategorized:
  - A total of €750 million of cocaine is seized off the coast of Ireland, in the
    largest such seizure in the country's history. (The Sunday Business Post)
  - The Latvian government effectively nationalizes the country's second-largest bank,
    Parex, acquiring a controlling 51% stake for the symbolic sum of just two lati.(Reuters)
  - The owner of the Haitian school that collapsed is arrested on charges of involuntary
    manslaughter. (UPI)
  - An accident aboard K-152 Nerpa, a nuclear-powered Russian Navy submarine doing
    a test run in the Sea of Japan, kills more than 20 people. (Al Jazeera)
  - Huda bin Abdul Haq, Imam Samudra, and Amrozi bin Nurhasyim are executed by firing
    squad on Kambangan Island in Indonesia for their involvement in the 2002 Bali
    bombings. (BBC News)
  - An anti-police riot in Shenzhen, China involving 400 people, takes place after
    a police official threw a walkie-talkie at a motorcyclist causing his death. (AFP
    via Yahoo! News)
