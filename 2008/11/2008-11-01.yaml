Date: '2008-11-01'
Source_URI: Portal:Current events/2008 November 1
Intelligence_Payload:
  Uncategorized:
  - Floods kill 24 people in Vietnam including 11 in the central province of Nghệ
    An. (BBC News)
  - Nineteen Moro Islamic Liberation Front rebels are killed by Filipino military
    air strikes in the southern part of the island of Mindanao. (AFP via ABC)
  - A strong aftershock measuring 5.0 on the Richter magnitude scale hits southwestern
    Pakistan three days after it was struck by a 6.4 magnitude earthquake. (AFP via
    ABC)
  - India's first lunar mission, Chandrayaan-1, transmits two pictures of the Earth
    while en route to the Moon. (The Hindu)
