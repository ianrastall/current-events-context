Date: '2008-11-02'
Source_URI: Portal:Current events/2008 November 2
Intelligence_Payload:
  Uncategorized:
  - Lewis Hamilton wins the 2008 Formula One Drivers' Championship, beating Felipe
    Massa by one point to become the youngest and first black Formula One World Champion
    in history. (Sky News)
  - Sébastien Loeb of Citroën becomes the first World Rally Championship driver to
    become World Champion for the fifth consecutive time. (BBC News)
  - Rupiah Banda of the Movement for Multi-Party Democracy is sworn in as President
    of Zambia after being elected on October 30. (Canadian Press via Google)
