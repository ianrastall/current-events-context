Date: '2008-11-26'
Source_URI: Portal:Current events/2008 November 26
Intelligence_Payload:
  Uncategorized:
  - The United Nations Security Council gave the green light to a plan by UN Secretary
    General Ban Ki-moon on the deployment of an EU civilian police and justice mission
    in Kosovo.(Reuters)
  - The Czech constitutional court unanimously ruled that the disputed parts of the
    Lisbon Treaty are in line with the Czech Constitution.(Bloomberg)
  - Woolworths Group PLC agrees to put its chain of 815 stores in the United Kingdom
    and DVD distribution businesses into administration with 30,000 jobs at risk.
    (Times Online)
  - The European Union proposes a €200 billion stimulus package that will include
    already-spent money (BBC News) (WSJ) (IHT) (Al Jazeera)
  - U.S. President-elect Barack Obama announces that he will create a new "economic
    recovery board," headed by Paul Volcker, designed to provide "fresh perspective"
    on the current economic issues (CNN)
  - At least 80 people are dead and over 250 wounded in coordinated terrorist strikes
    across Mumbai, India. (The Times of India)
  - Vitaly Karayev, the mayor of Vladikavkaz, the capital of North Ossetia-Alania
    in Russia is assassinated. (BBC)
  - The Greenlandic self-government referendum passes with 75% approval. (BBC)
  - Edna Parker, the oldest living person in the world, died at age 115 in her hometown
    of Shelbyville, Indiana. (Shelbyville News) (BBC News)
  2008 Thai political crisis:
  - The People's Alliance for Democracy claims to be in complete control of Suvarnabhumi
    Airport, Bangkok's international airport. (Sydney Morning Herald)
  - Thai authorities evacuate thousands of passengers from Suvarnabhumi Airport. (ABC
    News Australia)
  - Thai Prime Minister Somchai Wongsawat rejects calls for election. BBC News adde
