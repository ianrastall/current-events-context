Date: '2008-11-28'
Source_URI: Portal:Current events/2008 November 28
Intelligence_Payload:
  Uncategorized:
  - Five people are arrested in France and Romania as a result of an investigation
    into the killing of Brahim Deby, a son of the President of Chad Idriss Deby. (AP
    via Google News)
  - 'Black Friday: As the Christmas shopping season begins in the United States, two
    are shot at a Toys R Us store in Palm Desert, California, and a Wal-Mart employee
    is crushed in a stampede after shoppers broke down a front door in Valley Stream,
    New York. (KABC)(Bloomberg)'
  - 'November 2008 Mumbai attacks: Indian security forces attack a Jewish centre in
    Mumbai where gunmen are holding an unknown number of hostages. (BBC)'
  - United Kingdom Conservative Party Shadow Minister Damian Green is arrested for
    alleged leaking of Government immigration statistics (BBC)
  - Canada faces a parliamentary crisis as the opposition Liberals, NDP and Bloc Québécois
    reject the policies in the Conservative minority government's "economic update."
    Following talks between the Liberals and NDP, plans are unveiled to hold a vote
    of no confidence and replace the Conservatives with a Liberal-NDP coalition. (Globe
    and Mail)
  2008 Thai political crisis:
  - The Prime Minister of Thailand, Somchai Wongsawat, declares a state of emergency
    to allow police to clear Bangkok's two international airports of protesters. (Radio
    Australia)
  - The government deputy spokesman has announced that PM Somchai will still stay
    in Chiang Mai because of unsettled army situation and closure of the two airports
    in Bangkok. (Nation Multimedia)
  - People's Alliance for Democracy has prepared the third set of its leaders, in
    case its first and second set are arrested or assassinated, but have not announced
    the leaders' names yet. (Bangkok Post)
  - ASTV, a station that broadcast a People's Alliance for Democracy's demonstration
    is bombed with grenades and gunfire on early morning of Friday (GMT +7). (Nation
    Multimedia)
  - About 5,000 Muslim Haj pilgrims are unable to leave the airport to Mecca. (Bangkok
    Post)
