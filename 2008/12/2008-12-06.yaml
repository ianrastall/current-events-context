Date: '2008-12-06'
Source_URI: Portal:Current events/2008 December 6
Intelligence_Payload:
  Uncategorized:
  - Filipino boxer Manny Pacquiao defeats Mexican American Oscar De La Hoya during
    a welterweight bout at the MGM Grand Garden Arena in Las Vegas, Nevada. (Inquirer)
  - United States President-elect Barack Obama nominates General Eric Shinseki to
    be the next Secretary of Veterans Affairs. (Reuters via ABC News Australia)
  - India arrests two men accused of providing mobile phone cards to the gunmen in
    the November 2008 Mumbai attacks. (Reuters via News Limited)
  - The Republic of Ireland recalls all Irish pork products after the discovery of
    contaminated fodder. (RTÉ)
  - Joseph Cao defeats William J. Jefferson in Louisiana's 2nd congressional election,
    a major upset victory for the Republican Party. He is the first Vietnamese American
    ever to be elected to the U.S. House of Representatives. (The Hill)
