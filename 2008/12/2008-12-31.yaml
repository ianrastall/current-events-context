Date: '2008-12-31'
Source_URI: Portal:Current events/2008 December 31
Intelligence_Payload:
  Uncategorized:
  - Several bombs and further threats by a disgruntled resident lead police to evacuate
    downtown Aspen, Colorado, United States. (New York Times)
  - Israel rejects a proposed stoppage of Operation Cast Lead that would also have
    ceased rocket attacks from Hamas so humanitarian aid could be delivered to affected
    areas in the Gaza Strip. (Bloomberg)
  - A car bomb explodes in Bilbao, Spain, and is blamed on Euskadi Ta Askatasuna,
    a Basque nationalist and separatist organisation. (CNN)
  - One of the world's biggest accumulations of dinosaur fossils is found near Zhucheng,
    China. (Reuters) (BBC)
