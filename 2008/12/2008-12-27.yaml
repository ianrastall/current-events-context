Date: '2008-12-27'
Source_URI: Portal:Current events/2008 December 27
Intelligence_Payload:
  Uncategorized:
  - President of Pakistan Asif Ali Zardari accepts that "non-state actors" exist in
    the country and vows to root out terrorism there. (Reuters)
  - The Gävle goat, a large Swedish yule goat, is torched by vandals for the 23rd
    time since its construction in 1966. (BBC News)
  - On the eve of its centenary, Woolworths Group begins closing its stores in the
    United Kingdom. (BBC)
  Gaza–Israel conflict:
  - Israel launches Operation Cast Lead against Hamas in the Gaza Strip, killing at
    least 271 people and wounding at least 800. (CNN) (PressTV.ir)
  - One person is killed and at least six others wounded when rockets fired from the
    Gaza Strip strike Netivot and Eshkol Regional Council, Israel. (Ynet)
