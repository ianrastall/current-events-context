Date: '2008-12-29'
Source_URI: Portal:Current events/2008 December 29
Intelligence_Payload:
  Uncategorized:
  - President of Somalia Abdullahi Yusuf Ahmed resigns. Parliamentary Speaker Adan
    Mohamed Nuur Madobe will take over for 30 days, in which time the legislature
    will select a new head of state. (BBC)
  - Bangladeshis vote in their country's general election. (BBC)
  - Liverpool F.C. player Steven Gerrard is arrested following an altercation at a
    Southport nightclub and subsequently charged with Section 20 grievous bodily harm.
    (BBC)
  - An Ebola outbreak in West Kasai in the Democratic Republic of Congo kills 11 people.
    (BBC)
