Date: '2008-12-22'
Source_URI: Portal:Current events/2008 December 22
Intelligence_Payload:
  Uncategorized:
  - Results of Turkmenistan's parliamentary election of December 14 are announced.
    (VOA News)
  - 'Romanian legislative election, 2008: Emil Boc is sworn in as the new Prime Minister
    and will lead a coalition government of the Democrat Liberals and Social Democrats.
    (b92.net) Mircea Geoană becomes the new head of the Senate and Roberta Alma Anastase
    the new president of the Chamber of Deputies. (AP via Google)'
  - President of Guinea Lansana Conté dies at age 74. If the Supreme Court declares
    the position vacant, National Assembly Speaker Aboubacar Somparé will take over
    for 60 days. (AFP via the Canberra Times)
  - An impoundment at the Tennessee Valley Authority's coal-fired power plant in Kingston,
    Tennessee, fails, resulting in a large volume of fly ash slurry being spilled
    onto surrounding land and the adjacent Emory and Clinch Rivers. (KnoxNews.com)
  - A jury finds five men guilty of conspiring to kill soldiers at Fort Dix, New Jersey,
    United States. (CNN)
  - Nine human heads and decapitated bodies, believed to belong to eight soldiers
    and one high-ranking former police officer, are found in Chilpancingo, Guerrero,
    Mexico. (CNN)
  - Automobile dealers in Mexico demand a US$3 billion bailout package during the
    automotive crisis. (CNN)
  - The United States and Mexico pledge $1.4 billion for the Mérida Initiative, a
    security cooperation for combating drug trade, transnational crime, and money
    laundering. (CNN)
  - Toyota Motor Corporation, the world’s largest automaker, forecasts its first operating
    loss in 70 years, due to the automotive crisis. (New York Times)
