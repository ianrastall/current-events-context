Date: '2008-12-04'
Source_URI: Portal:Current events/2008 December 4
Intelligence_Payload:
  Uncategorized:
  - Prime Minister Vladimir Putin says Russia may be forced to cut gas supplies to
    Ukraine if the latter "does not fulfil the agreements" on payment for gas already
    consumed. (BBC News)
  - President of Uruguay Tabaré Vázquez resigns as the leader of the Socialist Party
    following a row over the vetoing of an abortion decriminalisation bill. (BBC)
  - The Argentine National Congress approves the seizure of Aerolíneas Argentinas,
    the country's biggest airline carrier. (BBC)
  - The body of the first President of Afghanistan Mohammed Daoud Khan is identified,
    three decades after he died. (BBC)
  - '2008 Canadian parliamentary dispute: At the request of Prime Minister Stephen
    Harper, Governor General of Canada Michaëlle Jean prorogues the parliament until
    January 26, 2009, to avoid a confidence motion by a newly-formed coalition of
    opposition parties. (CBC) (CTV)'
