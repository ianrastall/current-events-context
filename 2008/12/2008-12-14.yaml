Date: '2008-12-14'
Source_URI: Portal:Current events/2008 December 14
Intelligence_Payload:
  Uncategorized:
  - At least 28 people are dead and 22 missing after the ferry Maejan capsizes in
    the northern Philippines. (AFP via News Limited)
  - A bus crash in Minya, Egypt, kills 57 people. (AP via Google)
  - Turkmenistan holds an early parliamentary vote with only candidates from the Democratic
    Party and associated organizations standing for election. (Reuters)
  - Uganda, Democratic Republic of the Congo, and Southern Sudan launch an operation
    against the Lord's Resistance Army insurgency in the DRC's Garamba National Park.
    (BBC)
  - Al-Baghdadia TV journalist Muntadhar al-Zaidi is subdued after throwing both his
    shoes at United States President George W. Bush during his farewell speech in
    Iraq. (CNN)
