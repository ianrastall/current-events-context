Date: '2008-12-26'
Source_URI: Portal:Current events/2008 December 26
Intelligence_Payload:
  Uncategorized:
  - China's People's Liberation Army Navy begins escorting three warships (two destroyers
    and one replenishment oiler) to the Gulf of Aden to combat piracy in Somalia.
    (Xinhua)
  - Ten suspected former members of the Kosovo Liberation Army are arrested in Serbia.
    (BBC)
  - Pakistan deploys between five and twenty thousand additional troops along its
    border with India. (Washington Post)
  - South Korean television workers strike to protest legislation that would permit
    cross-ownership of newspapers and broadcasters. (Joongang Daily)
  - China's J-10B, the newest member of the Chengdu J-10 family (also known as the
    FC-20), makes a successful maiden flight at Chengdu. About 36-100 of these J-10Bs
    will be delivered to the Pakistani Air Force this year under the designation "FC-20".
