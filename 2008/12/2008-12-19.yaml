Date: '2008-12-19'
Source_URI: Portal:Current events/2008 December 19
Intelligence_Payload:
  Administration of United States President-elect Barack Obama:
  - Republican Party Representative Ray LaHood of Illinois is nominated as the next
    Secretary of Transportation. (CNN)
  - Democratic Party Representative Hilda Solis of California is nominated as the
    next Secretary of Labor. (CNN)
  - Venture capitalist Karen Mills is chosen to head the Small Business Administration.
    (CNN)
  - Former Mayor of Dallas, Texas, Ronald Kirk is selected for the position of Trade
    Representative. (CNN)
  Uncategorized:
  - U.S. President George W. Bush's administration files a trade case to the World
    Trade Organization against the People's Republic of China over the alleged use
    of export subsidies to promote Chinese-made goods. (AP via Fort Worth Star-Telegram)
  - Rangzieb Ahmed, the highest-ranked al-Qaeda operative in the United Kingdom, becomes
    the first person convicted of the charge of directing terrorism. (News Limited)
  - President Bush announces a $17.4 billion emergency bailout of the automobile industry
    to protect General Motors and Chrysler from bankruptcy during the current automotive
    crisis. The plan is conditional on the companies' reorganization by March 31,
    2009, to show that they can return to viability. (New York Times)
  - Internet and telephone transmissions between Europe, the Middle East, and Asia
    are seriously disrupted. The FLAG, SEA-ME-WE 3, and SEA-ME-WE 4 submarine communications
    cables are believed to have been cut for the second time this year. (BBC)
  - Three resignations ensue when Anglo Irish Bank chairman Sean Fitzpatrick admits
    to concealing a total of €87 million in loans. (RTÉ)
  - Thirty prisoners burn down and escape their jail in Vanuatu. Two Members of Parliament
    are later arrested for harboring some of the fugitives. (Radio Australia) (Channel
    NewsAsia)
