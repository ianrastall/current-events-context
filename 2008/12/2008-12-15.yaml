Date: '2008-12-15'
Source_URI: Portal:Current events/2008 December 15
Intelligence_Payload:
  Uncategorized:
  - Montenegro presents its official application for European Union membership to
    current EU Council President Nicolas Sarkozy, hoping to win candidate status in
    2009. (EU Observer)
  - The House of Representatives of Thailand selects Abhisit Vejjajiva of the Democrat
    Party as the new Prime Minister. (New York Times) (BBC)
  - President of Romania Traian Băsescu nominates Emil Boc, President of the Democratic
    Liberal Party, as Prime Minister. (Xinhua) (BBC)
  - Hundreds of thousands of houses in Maine, Massachusetts, New York, and New Hampshire
    are left without electricity after an ice storm. (New York Times)
  - Israel releases 224 captive Palestinians from prison. (Associated Press)
  - Anthony Pellicano is sentenced to 15 years in jail for an illegal wiretapping
    operation. (Los Angeles Times)
  - High tides cause flooding in Majuro, the capital of the Marshall Islands, requiring
    the evacuation of 300 people. (Radio New Zealand)
