Date: '2008-12-10'
Source_URI: Portal:Current events/2008 December 10
Intelligence_Payload:
  Uncategorized:
  - Talks on North Korea's nuclear program stall in a dispute over verification. (BBC)
  - 'Automotive industry crisis of 2008: The White House and U.S. Congress agree on
    a proposal for a US$15 billion bailout package for three major US automakers.
    (AFP)'
  - 'Global food price crisis: The Food and Agriculture Organization of the United
    Nations estimates that 963 million people are suffering from prolonged food deficiency
    around the world. (Bloomberg)'
  - The Rio Tinto Group announces plans to cut 14,000 jobs worldwide. (ABC News Online)
  - The first democratic election takes place on the Channel Island of Sark, a British
    crown dependency. (BBC NEWS)
  - After monitoring stellar orbits around Sagittarius A* (the supermassive black
    hole in center of the Milky Way) for 16 years, scientists estimate the object's
    mass at 4.31 million solar masses. (arΧiv.org) (MSNBC)
  - Scientists say they have found evidence for water vapour and carbon dioxide in
    the atmosphere of the extrasolar planet HD 189733 b. (NY Times) (Nature)
  - Former President of Finland Martti Ahtisaari receives Nobel Peace Prize in Oslo.
