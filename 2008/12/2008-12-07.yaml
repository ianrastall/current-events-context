Date: '2008-12-07'
Source_URI: Portal:Current events/2008 December 7
Intelligence_Payload:
  Uncategorized:
  - Mary Jo Kilroy wins the final outstanding United States House of Representatives
    seat in the 2008 general elections by capturing the 15th congressional district
    of Ohio. This translates to an overall gain of 21 seats for the Democratic Party
    in the House. (The Hill)
  - The government of the People's Republic of China lodges a protest for a meeting
    between French President Nicolas Sarkozy and the Dalai Lama in Poland. (Voice
    of America)
  - Rioters rampage through central Athens after a Greek law enforcement officer shoots
    dead a teenager. (New York Times)
  - The German Federal Archives has provided Wikipedia with 100,000 historical images
    that cover periods such as the Weimar Republic, the colonial era, the Third Reich,
    and post-reunification. (Deutsche Welle)
