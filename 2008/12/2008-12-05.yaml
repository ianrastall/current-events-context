Date: '2008-12-05'
Source_URI: Portal:Current events/2008 December 5
Intelligence_Payload:
  Uncategorized:
  - The Federated States of Micronesia recognize Kosovo. (New Kosova Report)
  - O. J. Simpson is sentenced to 15-33 years in prison with eligibility for parole
    after 9 years for kidnapping and robbery of two sports memorabilia dealers in
    a Las Vegas, Nevada, casino. (Los Angeles Times) (AFP via Melbourne Age)
  - 'Global financial crisis of 2008: the United States Department of Labor reports
    that nonfarm payrolls contracted by 533,000 in November, the worst monthly job
    loss since 1974. (MarketWatch)'
  - 'Sri Lankan Civil War: the Sri Lankan military enters Alampil, nearing the primary
    LTTE-held town of Mullaitivu. (BBC)'
  - NASA delays the launch of the Mars Science Laboratory by two years because of
    lengthening delays and lingering technical issues. (NY Times)
  - A bombing in the Pakistani province of Peshawar kills 17 people. (Associated Press)
  - MIT says it has succeeded in using radio waves to mix 50,000,000 °C plasma at
    its Alcator C-Mod fusion reactor. (Electronic Engineering Times)
  - First commercial use of Evolved HSPA cellular technology by Australian operator
    Telstra. (ITWire)
