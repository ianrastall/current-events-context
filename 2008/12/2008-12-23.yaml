Date: '2008-12-23'
Source_URI: Portal:Current events/2008 December 23
Intelligence_Payload:
  Uncategorized:
  - Indian Prime Minister Manmohan Singh denies reports of possible war with Pakistan
    over the November terrorist attacks in Mumbai. (CNN-IBN)
  - 'Sri Lankan Civil War: Heavy fighting continues as part of the Northern offensive
    between the country''s Army and the Liberation Tigers of Tamil Eelam around the
    city of Kilinochchi. (BBC)'
  - A military coup is announced in Guinea, hours after the death of President Lansana
    Conté. (BBC)
  - The world's fifteen leading gas-producing countries sign the charter of the Gas
    Exporting Countries Forum, making it a formal organization.(Xinhua) (BBC) (RBC)
    (RFE/RL)
  - Fiji expels acting New Zealand High Commissioner Caroline McDonald. In retaliation,
    New Zealand declares acting Fiji High Commissioner Cama Tuiloma persona non grata.
    (New Zealand Herald)
