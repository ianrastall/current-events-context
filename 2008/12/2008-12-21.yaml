Date: '2008-12-21'
Source_URI: Portal:Current events/2008 December 21
Intelligence_Payload:
  Uncategorized:
  - China's People's Liberation Army Navy deploys three warships (two destroyers and
    one replenishment oiler) to the Gulf of Aden to join the Combined Task Force 150
    in fighting Somali piracy. (Associated Press)
  - The winning design for the replacement of the iconic Routemaster double-decker
    bus is announced by London mayor Boris Johnson. (BBC News)
  - Continental Airlines Flight 1404 skids off the runway at Denver International
    Airport, injuring 38 of the 110 passengers on board. (Bloomberg)
  - Iranian police raid and close Nobel Peace Prize laureate Shirin Ebadi's Children's
    Rights Support Association prior to a planned celebration of Human Rights Day.
    (Reuters via International Herald Tribune)
  - Canada announces a US$3.3 billion bailout for its troubled automotive industry.
    (CNN)
  - '2008 Russian financial crisis: Russian Internal Troops quell a protest in Vladivostok
    over higher tariffs on imported used automobiles. (AFP via News Limited)'
  - Clashes between rioters and the Hellenic Police continue near the National Technical
    University of Athens in Greece. (AFP via Google News)
  - The Oberoi Trident and Taj Mahal Palace & Tower hotels in Mumbai reopen less than
    a month after the November terrorist attacks. (BBC)
