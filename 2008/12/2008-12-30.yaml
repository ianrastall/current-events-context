Date: '2008-12-30'
Source_URI: Portal:Current events/2008 December 30
Intelligence_Payload:
  Uncategorized:
  - Eight of eleven snowmobilers buried by avalanches in British Columbia, Canada,
    are found dead. (CTV News)
  - Illinois Governor Rod Blagojevich appoints former Democratic Illinois Attorney
    General Roland Burris to President-elect Barack Obama's vacated United States
    Senate seat. Democratic Senate leaders and Secretary of State Jesse White say
    they will not accept the appointment. (Chicago Sun-Times) (ABC7 Chicago)
  - Following the Jammu and Kashmir state assembly elections, the National Conference
    and National Congress parties agree to form a coalition government. (BBC)
  - Sheikh Hasina's Awami League wins a supermajority in Bangladesh's National Assembly.
    (Rediff)
  - Herman Van Rompuy is sworn in as Belgium's new Prime Minister, replacing Yves
    Leterme. (Reuters)
  - The National Council for Democracy and Development, the ruling military junta
    of Guinea after a recent coup, appoints Kabiné Komara as the country's new Prime
    Minister. (BBC)
