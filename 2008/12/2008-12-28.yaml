Date: '2008-12-28'
Source_URI: Portal:Current events/2008 December 28
Intelligence_Payload:
  Uncategorized:
  - Operation Cast Lead
  - The Israel Defense Forces continue airstrikes against Hamas in the Gaza Strip
    as the number of Palestinian casualties approaches 300. (ABC News)
  - The United States vetoes a United Nations Security Council resolution aimed at
    stopping Israeli airstrikes against Gaza. UN Secretary-General Ban Ki-moon and
    the United Kingdom, European Union, Russia, France, and China all call for a ceasefire.
    (PressTV) (CNN) (Xinhua)
  - '2008 Garamba offensive: Uganda''s People''s Defence Force accuses the Lord''s
    Resistance Army of hacking to death 45 people in a church in the Democratic Republic
    of the Congo. (France 24)'
  - A suicide bomber kills at least 16 people, 14 of them children, and injures 58
    in Afghanistan's Khost Province. (BBC)
  - A suicide bomber kills five Department of Civil Defence members and injures four
    others in Wattala, Sri Lanka. (BBC)
  - Ghanaians vote in the presidential election run-off between Nana Akufo-Addo and
    John Atta Mills. (BBC)
  - Mexican authorities arrest Army Major Arturo González Rodríguez for selling information
    to the Beltrán Leyva drug cartel. (BBC)
  - Four boats carrying approximately 1,700 illegal Libyan migrants arrive on the
    Italian island of Lampedusa. (BBC)
  - James Tanis wins Bougainville's Presidential election and will succeed Joseph
    Kabui, who died on June 7. (ABC Radio)
  - Vietnam national football team won 2008 AFF Suzuki Cup
  - '2008 NFL season: In American football, the Detroit Lions finishes their season
    by going winless, making them the first team in the NFL to finish a season with
    an 0-16 record and the first to go winless since the 1976 Tampa Bay Buccaneers.
    (Fox News)'
