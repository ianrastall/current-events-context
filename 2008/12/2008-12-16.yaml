Date: '2008-12-16'
Source_URI: Portal:Current events/2008 December 16
Intelligence_Payload:
  Uncategorized:
  - Bilal Abdullah is convicted for his roles in the 2007 attack on Glasgow International
    Airport and an attempted bombing of London's West End. (BBC)
  - President of Somalia Abdullahi Yusuf Ahmed names former Interior Minister Mohamoud
    Mohamed Gacmodhere as Prime Minister, but incumbent PM Nur Hassan Hussein is supported
    in a parliamentary vote, requiring a confidence motion before Ahmed could replace
    Hussein. (Xinhua)
  - Five sticks of dynamite are found in the Printemps department store on the Boulevard
    Haussmann in Paris. (BBC News)
  - United Nations special envoy to Niger Robert Fowler and Canadian diplomat Louis
    Guay are reported to be missing in Niger. (CNN)
  - The Illinois House of Representatives votes unanimously to begin an impeachment
    inquiry against Governor Rod Blagojevich for corruption. (New York Times)
  - The Association of Southeast Asian Nations signs a charter to make itself a legal
    entity. (BBC)
  - Twenty-four Russian tourists are killed when their bus plummets into a ravine
    near Eilat in southern Israel, making this road accident the deadliest in the
    state's history. (Jerusalem Post)
  Global financial crisis of 2008:
  - The United States consumer price index fell in November by 1.9% on a non-seasonally
    adjusted basis, the U.S. Labor Department reports, the biggest decline since the
    nadir of the Great Depression in January 1932. (MarketWatch)
  - Construction permits for single-family homes fell in October by 12.3% to a seasonally
    adjusted annual rate of 412,000, marking a 27-year low, the U.S. Commerce Department
    reports. (MarketWatch)
