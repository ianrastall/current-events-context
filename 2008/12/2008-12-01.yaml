Date: '2008-12-01'
Source_URI: Portal:Current events/2008 December 1
Intelligence_Payload:
  Uncategorized:
  - In Canada, the Liberal Party, New Democratic Party, and Bloc Québécois sign an
    agreement to form a coalition Government with Stéphane Dion as leader, with the
    intention of toppling the Conservative Government that was elected less than two
    months before. (CTV News)
  - A suicide bomb attack kills 10 people, including two policemen, in the southern
    province in Helmand in Afghanistan. (BBC)
  - United States President-elect Barack Obama announces his national security team
    to his transition advisory board, among them being Senator Hillary Clinton of
    New York, who was nominated Secretary of State. (Reuters)
  2008 Thai political crisis:
  - The People's Alliance for Democracy leaves protesting at the Thai Government House
    and distributes protesters to Bangkok's two airports, Suvarnabhumi and Don Muang,
    for security reasons. (Nation Multimedia)
  - Flights to Bangkok are canceled and moved to other parts of the country, such
    as Phuket, Chiang Mai and Chonburi. (BBC News), (Bangkok Post)
