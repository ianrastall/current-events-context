Date: '2008-12-09'
Source_URI: Portal:Current events/2008 December 9
Intelligence_Payload:
  Uncategorized:
  - Democratic Illinois Governor Rod Blagojevich is arrested by Federal Bureau of
    Investigation agents at his Chicago home, amidst allegations of corruption and
    pay-to-play regarding the replacement for United States President-elect Barack
    Obama in the Senate. (MarketWatch)
  - Almost 1,400 workers are laid off in the Republic of Ireland as a result of the
    2008 Irish pork crisis. (BBC)
  - Sony Corporation announces plans to cut 8,000 jobs and close 10% of its manufacturing
    plants. (BBC)
  - United Nations-mediated peace talks commence in Nairobi, Kenya, between the government
    of the Democratic Republic of the Congo and the National Congress for the Defence
    of the People. (CNN)
  - Canadian Member of Parliament Bob Rae announces his withdrawal from the leadership
    campaign of the Liberal Party, leaving the position (and that of the Leader of
    the Opposition and the leadership of the proposed opposition coalition) open to
    fellow MP Michael Ignatieff. (CBC)
  - Former Prime Minister of the Republic of Macedonia Vlado Bučkovski is sentenced
    to three and a half years in jail for abuse of power. (Forbes)
