Date: '2008-12-03'
Source_URI: Portal:Current events/2008 December 3
Intelligence_Payload:
  Uncategorized:
  - Speaker of the House of Commons of the United Kingdom Michael Martin accuses Scotland
    Yard of not having a search warrant before its officers entered Member of Parliament
    Damian Green's Commons office and failing to inform Serjeant-at-Arms Jill Pay
    that she was entitled to request one. (BBC News) (Hansard)
  - Zimbabwe's Republic Police quell a march by doctors and nurses to protest against
    the 2008 cholera outbreak. (BBC)
  - Queen Elizabeth II addresses the House of Commons with her traditional Speech
    from the Throne, outlining the Labour government's legislative program for the
    2008/09 parliamentary session. (BBC)
