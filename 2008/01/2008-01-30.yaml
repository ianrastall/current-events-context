Date: '2008-01-30'
Source_URI: Portal:Current events/2008 January 30
Intelligence_Payload:
  Uncategorized:
  - United States District Court judge Stanwood Duval dismisses a class action suit
    against the U.S. Army Corps of Engineers over flooding from a levee breach in
    New Orleans, Louisiana after Hurricane Katrina. (AP via Google News)
  - Russian Finance Minister Alexei Kudrin and state electricity chief Anatoly Chubais
    call for a less hawkish foreign policy. Analysts claim the two are close to the
    likely next President of Russia Dmitry Medvedev. (The Guardian)
  - The United States Federal Reserve cuts the federal funds rate by half a point
    to 3 per cent, the second cut in this key interest rate in eight days as it acts
    to head off a recession. (The New York Times)
  - The Government of Australia announces that it will apologize to the "stolen generation"
    of indigenous Australians in the Parliament of Australia on February 13. (AAP
    via Melbourne Herald-Sun)
  - As snowstorms continue to worsen in China, Premier Wen Jiabao offers an apology
    to the public while visiting Changsha train station in Hunan as millions are stranded
    in train stations waiting to go home during Chinese New Year. (CNN)
  - Government probe finds that Israel "failed ... to provide an effective military
    response to the challenge posed to it by the war in Lebanon." (BBC News)
  - Internet services are disrupted in the Middle East after an undersea cable in
    the Mediterranean Sea is damaged. (BBC News)
  2008 United States presidential election:
  - Former North Carolina Senator John Edwards withdraws his candidacy. (CNN)
  - Former Mayor of New York City Rudy Giuliani withdraws his candidacy and endorses
    John McCain. (The New York Times)
  - Republican candidates debate at the Ronald Reagan Presidential Library in Simi
    Valley, California. (CNN)
