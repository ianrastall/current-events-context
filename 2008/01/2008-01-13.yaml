  Uncategorized:
  - Atonement wins the Golden Globe for Best Motion Picture - Drama at the 65th Golden
    Globe Awards. Sweeney Todd wins the Golden Globe Award for Best Motion Picture
    - Musical or Comedy. (AP via Google News)
  - Floods in Mozambique kill 50 people, lead to the evacuation of 30,000 and make
    72,000 homeless. (AFP via ABC News Australia)
