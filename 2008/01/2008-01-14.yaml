Date: '2008-01-14'
Source_URI: Portal:Current events/2008 January 14
Intelligence_Payload:
  Uncategorized:
  - Alvaro Colom is sworn in as President of Guatemala. (AP via Google News)
  - MESSENGER, a NASA mission, flies by Mercury, the second spacecraft to do so and
    the first in thirty-three years. (BBC News)
  - The Taliban attacks the Serena Hotel in Kabul, resulting in the deaths of at least
    six people. (AP via Google News)
  - The European Commission opens two new probes on alleged anti-competitive behavior
    by Microsoft Corporation. (AP via The Melbourne Age)
  - 'War in Waziristan: At least seven Pakistani soldiers die in a clash with pro-Taliban
    militants in a tribal area near the Afghan border. Twenty-three tribal militants
    also die in the fighting in Mohmand agency. (BBC News)'
  - Prime Minister of Israel Ehud Olmert warns that "all options are being taken into
    consideration" to stop Iran from going nuclear. (Ynet News) (AP via Yahoo! News)
  - Bobby Jindal is sworn in as the 56th Governor of Louisiana. He is the first Indian
    American governor in U.S. history. (NPR)
