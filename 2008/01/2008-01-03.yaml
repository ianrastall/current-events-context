Date: '2008-01-03'
Source_URI: Portal:Current events/2008 January 3
Intelligence_Payload:
  2008 United States presidential election:
  - Voters in Iowa go to the polls for the first caucus to determine presidential
    nominees for the Democratic and Republican parties. (BBC News)
  - Illinois Senator Barack Obama wins the Democratic caucus. (CNN)
  - Former Governor of Arkansas Mike Huckabee wins the Republican caucus. (CNN)
  - Senators Christopher Dodd and Joseph Biden withdraw their candidacy. (AP via Yahoo!
    News)
  Uncategorized:
  - 'Benazir Bhutto assassination: President of Pakistan Pervez Musharraf denies any
    role in Benazir Bhutto''s death. (CNN)'
  - The price of gold reaches a new record of $865.35 per troy ounce in the a.m. London
    Gold Fixing, breaking the previous high of 21 January 1980. (LBMA)
