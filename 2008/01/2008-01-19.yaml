Source_URI: Portal:Current events/2008 January 19
Intelligence_Payload:
  Uncategorized:
  - Adolfo Nicolás is elected as the thirtieth Superior General of the Society of
    Jesus. (BBC News)
  2008 United States presidential election:
  - Voters in Nevada and South Carolina go to the polls to determine presidential
    nominations for the Republican and Democratic parties.
  - Former Governor of Massachusetts Mitt Romney wins the Nevada Republican caucus.
    (The New York Times)
  - 'Nevada Democratic caucus: New York Senator Hillary Clinton wins 51% of state
    delegates, but Illinois Senator Barack Obama wins the state''s national delegates
    13 to 12. (CNN)'
  - Arizona Senator John McCain wins the South Carolina Republican primary. (CNN)
  - California Congressman Duncan Hunter withdraws his candidacy. (CNN)
