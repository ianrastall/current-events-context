Date: '2008-01-15'
Source_URI: Portal:Current events/2008 January 15
Intelligence_Payload:
  Uncategorized:
  - 20 Palestinians are killed by the Israeli Defense Forces including 14 fighters
    and five civilians, with 55 people wounded. Hamas leader Mahmoud Zahar's son is
    killed. Dozens of rockets are fired into Israel by Hamas, landing in the town
    of Sderot, injuring 4 Israelis. An Ecuadorian laborer is also shot and killed
    by Hamas. (The Washington Post)
  - '2008 United States presidential election: Mitt Romney wins the Republican Michigan
    primary with John McCain finishing second. Hillary Clinton wins the Democratic
    contest but she was the only leading contender in that election. Democratic candidates
    brace for a competitive primary in Nevada while Republicans contend for the South
    Carolina primary. (Canadian Press via Google News) (AP via Google News) (CNN)
    (MSNBC)'
  - 'Bombing of northern Iraq: Turkish warplanes bomb Kurdish rebel hideouts in northern
    Iraq, in the fourth aerial attack on rebel positions since the military launched
    a bombing campaign on 16 December. (Ynet)'
  - 'War in Afghanistan (2001–present): The Pentagon announces plans to send 3,200
    additional Marines to Afghanistan. (BBC News)'
  - The U.S. Food and Drug Administration allows the production and sale of foods
    derived from cloned animals. (BBC News)
