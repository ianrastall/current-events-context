Date: '2008-01-07'
Source_URI: Portal:Current events/2008 January 7
Intelligence_Payload:
  Uncategorized:
  - Litokwa Tomeing is elected as President of the Marshall Islands. (Radio New Zealand)
  - The Supreme Court of the United States hears arguments on whether execution by
    lethal injection is a violation of the Constitution's ban on "cruel and unusual
    punishment." (BBC News)
  - The war crimes trial of former Liberian President Charles Taylor resumes at The
    Hague, Netherlands. (CNN)
  - A warehouse fire in Icheon, South Korea, kills at least 40. (BBC News)
  - Portions of Eastern Australia are affected by the worst floods in the last 20
    years. (BBC News)
  - Two United States Navy F/A-18 Super Hornets, a F/A-18E and two-seat F/A-18F, flying
    off the aircraft carrier USS Harry S. Truman, crash in the Persian Gulf. The aviators
    were safely recovered. There was no indication of hostile fire. (CNN)
  - The government of Tanzania cannot account for Sh$260 million (approx US$200,000)
    in aid from the Global Fund initiative to fight AIDS and HIV. (allAfrica)
