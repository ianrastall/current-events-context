Date: '2008-01-09'
Source_URI: Portal:Current events/2008 January 9
Intelligence_Payload:
  Uncategorized:
  - China will ban stores from handing out plastic bags as of June 2008. (BBC)
  - After conducting further research, NASA astronomers have determined that asteroid
    2007 WD5 now has a 0.01% chance of striking Mars on January 30, 2008, effectively
    ruling out an impact. (NASA)
  - India's Tata Motors launches the world's cheapest production car, Tata Nano, in
    Pragati Maidan, Delhi. (CNN-IBN)
  - The price of gold in the London Gold Fixing rises above €600 per troy ounce for
    the first time. (€603.528, a.m. Fixing.) (LBMA)
  - Nigeria's Economic and Financial Crimes Commission charges Lucky Igbinedion, the
    former governor of Edo State, with 142 counts of money laundering. He is the eighth
    governor charged with corruption-related charges. (BBC News)
  - Peter de Villiers is appointed the first black coach of the South African rugby
    union team. (The Times)
