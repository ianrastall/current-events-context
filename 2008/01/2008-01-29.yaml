Date: '2008-01-29'
Source_URI: Portal:Current events/2008 January 29
Intelligence_Payload:
  Uncategorized:
  - 20 civilians including 11 children die and 14 are wounded after a mine explodes
    targeting a school bus in Madhu, Sri Lanka. (Sunday Times)
  - Iran's judiciary sentences 54 Baháʼí religion followers for "anti-regime propaganda."
    (AFP via Yahoo! News)
  - Snow storms cut the Beijing-Guangzhou railway and paralyze China's Chunyun period.
    (AP via The Houston Chronicle)
  - The United States House of Representatives passes a $146 billion economic stimulus
    package. (AP via The New York Times)
  - Venezuelan gunmen hold 30 hostages in a bank in Guárico state before fleeing the
    scene in an ambulance with several hostages. The gunmen are subsequently captured.
    (The Guardian) (AP via Google News)
  - Near-Earth asteroid passes Earth at a distance of 334,000 miles (537,500 km),
    and observations reduce the estimate of its size from 2,000 feet (610 m) diameter
    to 800 feet (250 m). (News Limited)
  - A missile strike by the Pakistan Army in North Waziristan kills ten suspected
    militants. (Reuters)
  - A car bomb in Thenia, Algeria kills at least three people. (Canadian Press via
    Google News)
  2008 United States presidential election:
  - Voters in Florida go to the polls to determine presidential nominees.
  - New York Senator Hillary Clinton wins the Democratic primary with no delegates
    awarded. (CNN)
  - Arizona Senator John McCain wins the Republican primary. (CNN) (The New York Times)
