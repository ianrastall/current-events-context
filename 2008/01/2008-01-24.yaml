Date: '2008-01-24'
Source_URI: Portal:Current events/2008 January 24
Intelligence_Payload:
  Uncategorized:
  - Australia's longest running magazine, The Bulletin, is closing down after almost
    130 years of publishing. (ABC News Australia)
  - A medical student at the Karolinska Institute in Stockholm is expelled when it
    turns out that he was paroled from a maximum-security prison after being convicted
    of murder in 2000. (The New York Times)
  - Italian Prime Minister Romano Prodi is forced to resign following a lost vote
    of confidence in the Senate. (BBC News)
  - An Australian girl spontaneously switches blood types and adopts her donor's immune
    system following a liver transplant in the first known case of its type. (Breitbart)
  - The Brazilian government passes legislation aimed at curbing Amazon deforestation.
    (BBC News)
  - Jérôme Kerviel is blamed for worsening the January 2008 stock market downturn
    by allegedly losing €4.9 billion ($7 billion) for French bank Société Générale.
    (The Daily Mail)
