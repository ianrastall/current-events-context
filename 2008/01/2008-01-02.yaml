Date: '2008-01-02'
Source_URI: Portal:Current events/2008 January 2
Intelligence_Payload:
  Uncategorized:
  - Crude oil prices surge past $100 a barrel briefly in trading on the New York Mercantile
    Exchange. (AP via Yahoo! Finance)
  - 'Islamic insurgency in Algeria (2002–present): A suicide attack kills at least
    three people in Naciria, east of Algiers. (BBC News)'
  - A bomb targeting a military bus in Colombo, Sri Lanka kills at least four people
    including 2 soldiers and injures another 20. (BBC News)
  - Technip is awarded a $1.2 billion contract to develop the Pazflor oil deposit
    in Angola. Acergy is awarded a $700 million contract to assist in petroleum production
    at Pazflor. (Bloomberg)
  - A fire at the Royal Marsden Hospital in London, England forces its evacuation.
    (BBC News)
  Clashes in Kenya (2007-present):
  - Both sides in Kenya's disputed election accuse the other of violence as diplomatic
    efforts intensify to defuse the country's political crisis. (BBC News)
  - There were reports of several more deaths overnight, with two police officers
    killed in Kericho by youths armed with bows and arrows. (BBC News)
