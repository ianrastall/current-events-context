Date: '2008-07-11'
Source_URI: Portal:Current events/2008 July 11
Intelligence_Payload:
  Uncategorized:
  - Chinese restaurants in Beijing are told not to serve dog meat during 2008 Summer
    Olympics, but can continue to serve Donkey meat (The Times of India)
  - At a donors' conference in Brussels, 1.2 billion euros (1.9 billion U.S. dollars)
    are pledged to Kosovo's socio-economic development. (MarketWatch) (Xinhua)
  - The U.S. federal government's Office of Thrift Supervision closes down the IndyMac
    Bank, the largest savings and loan bank in the Los Angeles area, after determining
    that it is unlikely to be able to meet depositors' demands. (AP via Google News)
  - Wildfires force 10,000 Californians to evacuate their houses in the foothills
    of the Sierra Nevada, with one man dying in Butte County after refusing to evacuate.
    (Bloomberg)
  - The Prime Minister of Lebanon Fuad Siniora forms a 30-member national government.
    (AFP via Google News)
  - The President of South Korea Lee Myung-bak proposes resumption of stalled summit
    talks with North Korea. (AP via The International Herald Tribune)
  - The first global study of coral reefs finds that one-third of coral-building species
    face extinction. (BBC News)
  - British politician David Davis wins the Haltemprice and Howden by-election, caused
    when he resigned his seat to highlight his concerns over civil liberties. (BBC
    News)
