Date: '2008-07-25'
Source_URI: Portal:Current events/2008 July 25
Intelligence_Payload:
  Uncategorized:
  - Congressman Dennis Kucinich (D-Ohio) presents the articles for the impeachment
    of President George W. Bush to the U.S. House Judiciary Committee. (Fox News)
  - A series of seven bomb blasts rock Bangalore, India, killing 2 and injuring 20.
    (TOI)
  - Qantas Flight 30 makes an emergency landing in Manila after an unknown event causes
    a hole in the plane. (AFP via Google News)
  - Google announces that it has indexed over 1 trillion unique web pages. (San Jose
    Mercury News)
  - Kapiliele Faupala is crowned the new King of Wallis (Uvea), succeeding the late
    Tomasi Kulimoetoke II, who died in 2007. (Pacific Magazine)
  - Carol Vorderman announces she is quitting her position on UK gameshow Countdown
    after 26 years.
