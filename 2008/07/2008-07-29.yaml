Date: '2008-07-29'
Source_URI: Portal:Current events/2008 July 29
Intelligence_Payload:
  Uncategorized:
  - The International Olympic Committee lifts its ban on Iraqi athletes participating
    in the Beijing Olympics following assurances from the Government of Iraq about
    the independence of the Iraqi Olympic Committee. (AP via Google News)
  - United States Senator Ted Stevens of Alaska is indicted on seven counts related
    to his conduct as a Senator. (Wall Street Journal)
  - World Trade Organization trade talks in Geneva collapse after disagreements between
    developed and developing nations over access to agricultural markets. (Deutsche
    Welle)
  - Turkey bombs Kurdistan Workers Party (PKK) positions in the north of Iraq, killing
    dozens of guerillas two days after the 2008 Istanbul bombings which Turkey believes
    the PKK is responsible for. (AP via Times of India)
  - A 5.4 magnitude earthquake occurs in the Los Angeles, California, area, about
    two miles (3 km) southwest of Chino Hills. The earthquake is felt from Los Angeles
    to San Diego and more slightly in Las Vegas, Nevada. (USGS) (AP via WFAA)
  - President of the United States George W. Bush approves the execution of Army Private
    Ronald A. Gray, who was convicted in 1988 of multiple rapes and murders. It is
    the first American military execution approved since 1961. Further appeals are
    expected before he is executed. (CNN)
  - The government of Australia ends its mandatory detention of all asylum seekers.
    (BBC News)
