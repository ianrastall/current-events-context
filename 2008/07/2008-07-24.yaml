Date: '2008-07-24'
Source_URI: Portal:Current events/2008 July 24
Intelligence_Payload:
  Uncategorized:
  - Three former aides to former Governor of New York Eliot Spitzer and the former
    head of the New York State Police are charged with ethics violations over improper
    use of travel records of former Republican New York State Senate majority leader
    Joseph Bruno. (AP via Google News)
  - Max Mosley, head of the Fédération Internationale de l'Automobile, wins his privacy
    case against the News of the World, after the paper alleged he took part in a
    Nazi-themed BDSM orgy. (The Guardian) (BBC News)
  - Voters in Glasgow East go to the polls for the Glasgow East by-election, 2008
    with the Scottish National Party (SNP) claiming a historic victory over the Scottish
    Labour Party candidate after a massive swing in favour of the SNP. (Press Association
    via Google News) (The Telegraph)
  - A strong earthquake with a preliminary magnitude of 6.8 hits off the coast of
    Honshu, Japan with reports of landslides, injuries and disruption to transport
    and power supplies. (BBC News)
  - More than 200,000 people attend Obama’s speech at the Victory Column in Berlin,
    Germany -- the largest crowd Obama addressed throughout his presidential campaign.
    (FactCheck.org)
  2008 Beijing Olympics:
  - Iranian weightlifter Hossein Rezazadeh pulls out of Olympics upon recommendation
    of the national team's medical commission. (AFP via Google News)
  - The International Olympic Committee bans Iraq from participating in the 2008 Summer
    Olympics because the Government of Iraq seized control of Iraq's Olympic Committee.
    (Bloomberg)
