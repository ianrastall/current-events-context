Date: '2008-07-06'
Source_URI: Portal:Current events/2008 July 6
Intelligence_Payload:
  Uncategorized:
  - Gunmen kill a United Nations official in Mogadishu as he leaves a mosque and injure
    two others. (AP via CNN)
  - Rafael Nadal of Spain wins the 2008 Wimbledon Championships for the first time
    defeating Roger Federer of Switzerland in a marathon match, winning 6-4, 6-4,
    6-7 (5), 6-7 (8), 9-7. (AP via The New York Times)
  - NBC agrees to buy the Weather Channel. (Bloomberg)
  - The United Arab Emirates forgives the 7 billion dollars (USD) of foreign debt
    Iraq owes it. (CNN)
  - World leaders arrive in Japan for the G8 summit to be held in Tōyako, Hokkaidō.
    (Reuters)
  - An explosion near the Red Mosque in the Pakistani capital Islamabad kills at least
    10 people. The attack came on the first anniversary of the deadly siege and storming
    of the Red Mosque. (France 24)
