Date: '2008-07-08'
Source_URI: Portal:Current events/2008 July 8
Intelligence_Payload:
  Uncategorized:
  - The United States and the Czech Republic sign an initial agreement to base a United
    States missile defense system in the Czech Republic. (AP via Google News)
  - Russian Foreign Minister Sergey Lavrov responds to this development, "We will
    be forced to react not with diplomatic, but with military-technical methods."
    (The Times)
  - The President of Iran Mahmoud Ahmadinejad indicates that he does not expect an
    attack by the United States or Israel because he considers George W. Bush to be
    a lame duck president. (Bloomberg)
  - Leaders of the G8 nations meeting at the 34th G8 summit in Japan agree to a target
    of cutting world greenhouse gas emissions by at least 50% by 2050. (BBC News)
  - The former Prime Minister of Thailand Thaksin Shinawatra goes on trial facing
    corruption charges. (BBC News)
  - The Prime Minister of Pakistan Yousaf Raza Gillani denies any involvement in the
    2008 Indian embassy bombing in Kabul. The Government of Afghanistan has hinted
    that it believes that Pakistan's Inter-Services Intelligence had some involvement.
    (AP via Yahoo! News) (Reuters)
  - Zambian President Levy Mwanawasa is stable after undergoing an operation to improve
    his breathing, his deputy says. (BBC News)
  - The UNESCO World Heritage Committee votes in Quebec City and adds 27 new sites
    to the World Heritage List. (Unesco)
