Date: '2008-07-01'
Source_URI: Portal:Current events/2008 July 1
Intelligence_Payload:
  Uncategorized:
  - At least 38 people die as a motorised ferry sinks in Myanmar's Irrawaddy Delta.
    (CNN)
  - Police in Portugal announce that they are closing the investigation on the disappearance
    of Madeleine McCann. (NineMsn news)
  - Natalie Coughlin and Aaron Peirsol break world records for the 100 metres backstroke
    at the United States Olympic trials. (AFP via Sydney Morning Herald)
  - A jury orders pharmaceutical companies GlaxoSmithKline and Novartis to pay $114
    million in compensation to the Government of Alabama for overcharging for Medicaid
    prescription drugs. (AP via Google News)
  - Starbucks announces that it will close 600 underperforming coffee shops in the
    United States. (AP via CNN Money)
  - A man stabs five people to death in a Shanghai police station. (AP via Google
    News)
  - A four-day state of emergency is declared in Mongolia after violent protests following
    the legislative elections. (BBC News)
  - Thousands of citizens battle local government officials in a major riot in Guizhou
    in China over a police cover-up dealing with the death of a local girl. (Straitstimes)
