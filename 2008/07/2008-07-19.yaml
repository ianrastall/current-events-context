Date: '2008-07-19'
Source_URI: Portal:Current events/2008 July 19
Intelligence_Payload:
  Uncategorized:
  - In Jammu and Kashmir 10 Indian army soldiers are killed in land mine attack claimed
    by Hizbul Mujahideen (Times of India)
  - Iran advises a high-level meeting between it, the United States and European Union
    in Geneva over its nuclear program saying that it will not suspend production
    of enriched uranium. (Radio Netherlands)
  - '2008 Cambodian-Thai stand-off: Some 500 Thai and 1,000 Cambodian troops have
    massed near Prasat Preah Vihear temple on the border between the two countries,
    increasing their presence on the fifth day of the tense stand-off. (France 24)'
  - Fourteen people are killed, 29 injured and several are missing after a bus crash
    in Khare Khola, Nepal 100 miles west of Kathmandu. (AP via Google News)
  - Pope Benedict XVI apologizes to victims of abuse by Roman Catholic Church clergy
    in Australia during a mass in St Mary's Cathedral, Sydney for World Youth Day
    2008. (BBC News)
