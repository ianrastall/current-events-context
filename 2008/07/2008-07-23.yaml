Date: '2008-07-23'
Source_URI: Portal:Current events/2008 July 23
Intelligence_Payload:
  Uncategorized:
  - Prime Minister of Nepal Girija Prasad Koirala submits his resignation to the new
    President Ram Baran Yadav to pave the way for the forming of new government. (Zee
    News)
  - Militants who formed the Movement for the Emancipation of the Niger Delta announce
    that unless the Nigerian Army withdraws from the area and their development demands
    are met, they will shut down oil and gas production from Bonny Island. (AP via
    Google News)
  - The European Union suspends payments to two Bulgarian agencies due to concerns
    over corruption and organized crime. (BBC News)
  - Cape Verde officially joins the World Trade Organization, becoming its 153rd member.
    (WTO News)
  - Hurricane Dolly makes landfall on South Padre Island, Texas, with sustained winds
    of 95 mph (150 km/h). (CNN) (NHC)
