Date: '2008-07-05'
Source_URI: Portal:Current events/2008 July 5
Intelligence_Payload:
  Uncategorized:
  - In rugby union, New Zealand defeat World Cup winners South Africa 19–8 in the
    opening match of the Tri Nations. (The International Herald Tribune)
  - Margaret Hoelzer sets a world record for the 200 metre backstroke at the United
    States Olympic trials in Omaha, Nebraska. (AP via CNNSI)
  - The Mississippi River reopens for traffic after recent flooding. (AP via Forbes)
  - Venus Williams defeats sister Serena 7-5, 6-4 at the 2008 Wimbledon Championships
    Ladies' Final. (BBC News)
