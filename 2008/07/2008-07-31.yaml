Date: '2008-07-31'
Source_URI: Portal:Current events/2008 July 31
Intelligence_Payload:
  Uncategorized:
  - The Governor of California Arnold Schwarzenegger acts to end a budget crisis by
    firing 22,000 California state workers and cutting the pay of 200,000 more. (BBC)
  - NASA announces discovery of water on Mars. (AFP by Google News)
  - A Raytheon Hawker 800 corporate jet crashes in Owatonna, Minnesota, resulting
    in at least eight deaths. (AP via Google News) (Wikinews Article)
  - The Governor of Massachusetts Deval Patrick signs legislation allowing gay and
    lesbian couples from other states to get married in Massachusetts. (Boston Globe)
  - Radovan Karadžić, former Bosnian Serb leader, announces that he will defend himself
    at his trial for war crimes at the International Criminal Tribunal for the former
    Yugoslavia. (BBC News)
  - Anwar Ibrahim, former Deputy Prime Minister of Malaysia, will contest a by-election
    to return to parliament after his wife Wan Azizah Wan Ismail vacated her Permatang
    Pauh seat in Penang. (AFP via Google News)
  - A Thai court sentences Pojaman Shinawatra, the wife of former Prime Minister of
    Thailand Thaksin Shinawatra, to jail for three years for tax evasion. (AP via
    CNN)
