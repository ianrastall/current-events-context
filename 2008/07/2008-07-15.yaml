Date: '2008-07-15'
Source_URI: Portal:Current events/2008 July 15
Intelligence_Payload:
  Uncategorized:
  - 18 people are injured after a funfair ride composed of a spinning arm with a compartment
    at one end which carries passengers collapses at the Liseberg theme park Gothenburg,
    Sweden. (BBC News) (AP via Google News)
  - General Motors announces plans to suspend its dividend, sell off assets and cut
    20% off salaried costs in a response to slumping car sales. (CNNMoney)
  - A videotape of an interrogation of terrorism suspect Omar Khadr by Canadian officials
    at the Guantanamo Bay detention camp is released publicly. (The New York Times)
  - A suicide bomber at an Iraqi Army base near Baquba kills at least 35 people and
    injures another 55. (RTÉ) (AP via Yahoo! News) (The New York Times)
  - An earthquake with a 6.3 magnitude strikes near the island of Rhodes in Greece,
    leading to one death. (AP via Google News)
  - Belgian prime minister Yves Leterme resigns after less than four months in office.
    King Albert II does not accept his resignation. (AFP via Google News)
