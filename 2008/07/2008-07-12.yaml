Date: '2008-07-12'
Source_URI: Portal:Current events/2008 July 12
Intelligence_Payload:
  Uncategorized:
  - Okmok Caldera on the island of Umnak in the Aleutian Islands erupts, forcing the
    evacuation of the eastern side of the island to Unalaska Island. (Reuters)
  - French President Nicolas Sarkozy announces that Syria and Lebanon have agreed
    to establish embassies in each other's capitals. (AP via CNN)
  - Six party talks being held in Beijing agrees on steps to verify the end of North
    Korea's nuclear weapons program. (Al Jazeera)
  - North and South Korea exchange words over the death of a South Korean tourist
    shot dead at the Kumgangsan resort in North Korea. (AP via Google News) (AP via
    The Guardian)
