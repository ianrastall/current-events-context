Date: '2008-07-09'
Source_URI: Portal:Current events/2008 July 9
Intelligence_Payload:
  Uncategorized:
  - Questioned about conspiratorial ties at a town hall meeting in Portsmouth, Ohio,
    Senator John McCain does not deny he was president of the New Citizenship Project
    (forerunner of the neo-conservative Project for the New American Century). Instead
    he states his pride in the 9/11 Commission. (therawstory) (Current.com)
  - India formally submits the nuclear safeguards agreement to IAEA to implement the
    United States-India Peaceful Atomic Energy Cooperation Act. (The Washington Post)
  - The Senate of the United States approves legislation overhauling the rules for
    eavesdropping and offering immunity to telecom companies who may have violated
    wiretapping and privacy laws after the September 11, 2001 attacks. (AP via The
    New York Times)
  - Five peacekeepers are killed and another 17 missing following an ambush on a patrol
    by the joint United Nations/African Union peacekeeping mission in Darfur. (AP
    via Google News)
  - Three members of the Turkish police force are killed during an armed attack on
    the United States consulate in Istanbul with three attackers also dead. The US
    ambassador states that it is an "obvious case of terrorism". (Hurriyet) (CNN)
  - Iran test-fires nine long- and medium-range missiles, including the Shahab-3.
    (Reuters via The New York Times)
  - A road crash near Potosí in southern Bolivia leaves at least 47 dead. It is unclear
    if the vehicle was a bus or a truck. (BBC News) (ABC News)
  - Tillman Thomas succeeds Keith Mitchell as the new Prime Minister of Grenada following
    the general elections. (The Nation)
