Date: '2008-07-07'
Source_URI: Portal:Current events/2008 July 7
Intelligence_Payload:
  Uncategorized:
  - Austrian People's Party leader Wilhelm Molterer pulls his party out of the ruling
    grand coalition, forcing a snap general election. (BBC News)
  - Hurricane Bertha becomes the first hurricane of the 2008 Atlantic hurricane season.
    (Reuters)
  - A suicide car bomber strikes outside the Indian embassy in Kabul, Afghanistan,
    with at least 41 people killed. (Reuters) (AFP via The Melbourne Age) (BBC News)
  - 'MV Princess of the Stars disaster: Ship owner Sulpicio Lines ask a court to stop
    the Board of Marine Inquiry''s investigation and sue the body for allegedly contributing
    to unfair negative publicity surrounding Sulpicio. (ABS-CBN News)'
  - The Church of England's governing body votes to allow female bishops. (BBC News)
  - Unenriched uranium leaks into the Gaffière and Lauzon rivers from the Tricastin
    Nuclear Power Center in Bollène, France resulting in the plant being closed. (BBC
    News)
