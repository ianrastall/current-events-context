Date: '2008-07-10'
Source_URI: Portal:Current events/2008 July 10
Intelligence_Payload:
  Uncategorized:
  - The Capitoline Wolf, a statue once thought to be an Etruscan work, is shown to
    be from the 13th century CE. (BBC News)
  - China claims to have foiled the disruption of the 2008 Summer Olympics by suspected
    terrorists of separatist East Turkestan Islamic Movement from Xinjiang province.
    (BBC News)
  - The Senate of the United States confirms the appointment of General David Petraeus
    as the Commander of the United States Central Command and Raymond T. Odierno as
    the Commander of the Multinational Force Iraq replacing General Petraeus. (AP
    via Google News)
  - Georgia recalls its ambassador from Moscow after Russian fighters entered Georgian
    airspace. (Civil Georgia)
  - Midnight's Children by Salman Rushdie is awarded The Best of the Booker, as the
    best novel to have won a Man Booker Prize in the first 40 years of its existence.
    (BBC News)
  Iran:
  - The United States Secretary of State Condoleezza Rice warns Iran that it should
    have no doubt that the United States will defend its allies including Israel.
    (Reuters)
  - French petroleum company Total S.A. refuses to invest in Iran because it is "too
    politically risky". (BBC News)
  - Iran claims to have tested more medium and long range missiles a day after test
    firing the Shahab-3. (CNN)
