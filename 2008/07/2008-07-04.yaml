Date: '2008-07-04'
Source_URI: Portal:Current events/2008 July 4
Intelligence_Payload:
  Uncategorized:
  - A fire sweeps through the Biological Museum at Djurgården in Stockholm, leaving
    parts of the 115-year-old landmark charred and severely damaged. (Svenska Dagbladet)
    (Dagens Nyheter)
  - After 69 years, the Embassy of the United States in Berlin, Germany, returns to
    its old site near the Brandenburg Gate. At the celebration, Chancellor Angela
    Merkel, former U.S. President George H. W. Bush and the U.S. Ambassador to Germany
    William Timken open the new chancery on Pariser Platz in the center of Berlin.
    Spiegel (German)
  - Georgian forces shell Tskhinvali in South Ossetia. (BBC News)
  - Four people are shot dead in Milwaukee, Wisconsin, during a street party. (AP
    via The New York Times)
  - Íngrid Betancourt returns to France two days after her rescue. (The New York Times)
