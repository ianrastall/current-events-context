Date: '2008-07-14'
Source_URI: Portal:Current events/2008 July 14
Intelligence_Payload:
  Uncategorized:
  - The United States Federal Reserve tightens mortgage regulation in an attempt to
    stamp out the practices that led to the subprime mortgage crisis. (AFP via Google
    News)
  - United States President George W. Bush lifts a ban on offshore oil drilling. (AFP
    via Google News)
  - Etihad Airways from the United Arab Emirates buys 100 fuel-efficient aircraft
    from Airbus and Boeing. (Reuters)
  - Luis Moreno-Ocampo, the Prosecutor for the International Criminal Court, accuses
    Sudanese president Omar al-Bashir of genocide, crimes against humanity and war
    crimes in Darfur. (BBC)
  - Scientists at Walter and Eliza Hall Institute of Medical Research, Melbourne make
    a potential breakthrough in curing Malaria. (BBC News)
  - International Astronomical Union's Working Group for Planetary System Nomenclature
    classifies Makemake as the newest dwarf planet. (Universe Today)
  - The Taliban attack an outpost in Afghanistan, killing 9 ISAF soldiers. (Reuters)
    (International Herald Tribune)
  - Dayana Mendoza of Venezuela wins Miss Universe 2008. (Sydney Morning Herald)
  - Belgian-Brazilian brewer InBev buys St. Louis, Missouri-based Anheuser-Busch for
    US$52 billion. (MSNBC)
  - Mass protests in South Korea regarding Japan's claim over Dokdo. Crowds in Seoul
    burned flags in front of the Japanese embassy, while the South Korean envoy in
    Tokyo left Japan. (Phoenix TV Hong Kong) (Hindu) (Chosun) (Hani)
