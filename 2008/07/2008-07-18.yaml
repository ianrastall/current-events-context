Date: '2008-07-18'
Source_URI: Portal:Current events/2008 July 18
Intelligence_Payload:
  Uncategorized:
  - A report by the Civil Rights Division of the United States Department of Justice
    finds that the Cook County Jail, which houses 9,800 people, systematically violated
    the constitutional rights of its inmates. (The New York Times)
  - A Cambodian general states that a border stand off between Cambodia and Thailand
    came close to a shootout last night over land near the World Heritage nominated
    Prasat Preah Vihear temple. (AP via Google News)
  - King Albert II of Belgium rejects the resignation of Prime Minister Yves Leterme,
    as no compromise was reached on devolution to the regions. (BBC News)
  - Australia's Qantas Airways announces plans to cut 1,500 jobs worldwide. (Reuters)
