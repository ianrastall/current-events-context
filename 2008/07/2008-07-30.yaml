Date: '2008-07-30'
Source_URI: Portal:Current events/2008 July 30
Intelligence_Payload:
  Uncategorized:
  - The United States Food and Drug Administration finds the salmonella strain responsible
    for the 2008 United States salmonellosis outbreak in irrigation water at a serrano
    pepper at a farm in Nuevo León, Mexico. (The Los Angeles Times)
  - Prime Minister of Israel Ehud Olmert announces his intention to resign as Prime
    Minister in two months as his Kadima party chooses a new leader. He will also
    resign as Chairman of Kadima effective in two months. One reason for resignation
    is the corruption scandal in which Olmert is embattled. (BBC News)
  - U.S. President George W. Bush signs The Housing and Economic Recovery Act of 2008
    in response to the subprime mortgage crisis. (Reuters)
  - In the United Kingdom, the Appellate Committee of the House of Lords rejects an
    appeal by alleged British computer hacker Gary McKinnon against extradition to
    the United States to face charges of hacking into Pentagon and NASA computers.
    (AP via The Washington Post)
  - Australia
  - Air safety investigators from the Australian Transport Safety Bureau confirm an
    oxygen cylinder was responsible for an explosion on board Qantas Flight 30 on
    25 July 2008. (ABC News Australia)
  - The High Court of Australia rules that Australian aborigines control 80% of the
    coast of the Northern Territory. (TVNZ)
  - Bosnian Serb leader Radovan Karadžić is flown to The Hague to face a trial in
    the International Criminal Tribunal for the former Yugoslavia. (BBC News)
  - NASA confirms a liquid lake on Titan. (NASA)
