Date: '2008-07-20'
Source_URI: Portal:Current events/2008 July 20
Intelligence_Payload:
  Uncategorized:
  - Golfer Pádraig Harrington of Ireland wins his second successive Open Championship
    (British Open). (AP via Google News)
  - The Dark Knight sets a new record for box office receipts for an opening weekend
    in the United States with US$158.4 million earned between Friday and Sunday. (Entertainment
    Weekly)
  - The Colombian diaspora celebrates Colombia's Independence Day with concerts and
    marches against violence, kidnapping and the FARC in Bogotá, Leticia, the country's
    other 1,119 cities and municipalities, and events in cities around the world including
    Paris (attended by Ingrid Betancourt), London, Washington, D.C., New York City
    and Miami. (BBC News) (El Tiempo)
  - At least 13 Afghan police and civilians are killed in an airstrike by NATO forces
    two weeks after an airstrike killed 52 civilians at a wedding. (BBC News)
  - Beijing introduces traffic restrictions and factory closures in an effort to reduce
    air pollution for the 2008 Summer Olympics. (Reuters)
  - 500,000 people attend the closing mass of World Youth Day 2008 in Sydney, Australia,
    celebrated by Pope Benedict XVI, who announces Madrid as the host city for the
    next World Youth Day in 2011. (Sydney Morning Herald)
  - 1,600,000 people attend the Loveparade in Dortmund, Germany. (AFP via Google News)
