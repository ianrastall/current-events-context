Date: '2008-07-28'
Source_URI: Portal:Current events/2008 July 28
Intelligence_Payload:
  Uncategorized:
  - A United States Predator drone launches a missile strike on a Pakistani madrassa
    killing six people reportedly including al-Qaeda member Abu Khabab al-Masri.(The
    Times)
  - King George Tupou V of Tonga relinquishes many of his powers, ending centuries
    of absolute monarchy. (AP via Google News)
  - An internal U.S. Department of Justice report is released finding that Monica
    Goodling, a senior aide to former U.S. Attorney General Alberto Gonzales, illegally
    based hiring decisions on political affiliation. (The New York Times)
  - Suicide bombers target Kurdish political protesters in Kirkuk and Shiite pilgrims
    in Baghdad killing at least 48 people and wounding 249. (The New York Times)
  - Human Rights Watch has called for military aid to Kenya to be halted until an
    inquiry is held into a crackdown in the west of the country. (BBC News)
  - A fire destroys the Grand Pier at Weston-super-Mare, Somerset, England. (BBC News)
  - The hole in Qantas Flight 30, a Boeing 747 that made an emergency landing on July
    25, is believed to have been caused by the explosion of an oxygen tank. Terrorism
    is not suspected. (CNN)
  - Qantas Flight 692, a Boeing 737-800, is forced to turn back to Adelaide after
    an undercarriage door fails to close after takeoff. No one is injured. (Sydney
    Daily Telegraph)
  - Navanethem Pillay is appointed to succeed Louise Arbour as the United Nations
    High Commissioner for Human Rights. (AFP via Google News)
