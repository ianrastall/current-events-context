Date: '2011-02-19'
Source_URI: Portal:Current events/2011 February 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least two people are killed in the Ivory Coast after Ivorian forces open fire
    on protesters urging the resignation of President Laurent Gbagbo. (BBC)
  - Riots occur in the Moroccan city of Tangier over utility costs. (Reuters)
  - Thousands of people rally in Spanish municipality of Bilbao calling for the legalization
    of the new separatist party Sortu. (BBC)
  - Pirates seize a yacht with four Americans off the coast of Oman. (Al Jazeera)
  - Police shoot tear gas and water cannons as thousands of people protest against
    an authorized neo-Nazi march in Dresden. (Deutsche Welle)
  2011 Libyan civil war:
  - Human Rights Watch claims that Libyan security forces have killed 84 people over
    the past three days. (Human Rights Watch)
  - Libyan exiles claim that the total death toll could be as high as 120 with reports
    that snipers have fired at funerals in Benghazi. (Sky News)
  - A businessman calls for help from Benghazi, saying hospitals are overwhelmed and
    blood is running out. (Al Jazeera)
  2011 Bahraini protests:
  - Demonstrators chase away riot police in Manama. (Deutsche Welle)
  2011 Yemeni protests:
  - At least five people are killed in demonstrations in several cities across Yemen.
    (BBC)
  2010-2011 Algerian protests:
  - Police break up a pro-democracy protest in the capital Algiers. (Al Jazeera) (The
    Times of India)
  Israeli–Palestinian conflict:
  - 8 Palestinians are injured while on restricted lands when their anti-barrier protests
    are broken up by Israeli forces using live ammunition and tear gas among other
    agents to disperse the protesters. (International Middle East Media Center) (Palestine
    News Network)
  - Demonstrators gather outside the U.S. embassy in Tel Aviv to protest yesterday's
    U.S. veto at the United Nations and call for an end to the “US-supported occupation”.
    (The Jerusalem Post)
  Arts and culture:
  - Iranian director Asghar Farhadi wins three awards, including the Golden Bear,
    for his film Nader and Simin, A Separation as the 61st Berlin International Film
    Festival ends. There are other winners from Argentina, Albania, Germany and Hungary.
    (Deutsche Welle)
  Business and economy:
  - International Petroleum Investment Company makes a $4billion bid for the remaining
    53% of shares of Compañía Española de Petróleos.(The Wall Street Journal)
  International relations:
  - The United States vetoes a draft of a U.N. Security Council resolution critical
    of Israeli settlements in the West Bank. (Reuters) (Haaretz) (UN News Centre)
  Politics:
  - Cuba frees Ivan Hernandez, a dissident who refused to go into exile in Spain.
    (BBC)
  - The return of former Madagascan President Marc Ravalomanana, in exile in South
    Africa, is blocked by the government on the island. Tear gas is fired to disperse
    supporters at the international airport. (Reuters) (AFP via Google News)
  - Governor of Wisconsin Scott Walker rejects union concessions on the state budget
    as protests continue in the state capital. (Milwaukee Journal-Sentinel)
  - Thousands of political prisoners of former President of Tunisia Zine al-Abidine
    Ben Ali are released in Tunisia. (France 24)
  - Authorities in the People's Republic of China crack down on political activists
    as calls spread online for a "Jasmine Revolution" on Sunday. (AP via The Washington
    Post)
  - Ahmed Shafik, the Prime Minister of Egypt, announces that the Government will
    release more than 200 political prisoners. (Antara News)
  Science:
  - Iran's defense minister Ahmad Vahidi unveils 32 scientific and research projects
    conducted at Malek Ashtar Industrial University. (Press TV)
  Sports:
  - The 2011 Cricket World Cup begins with co hosts India and Bangladesh playing each
    other in Dhaka, Bangladesh.
