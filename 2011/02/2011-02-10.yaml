Date: '2011-02-10'
Source_URI: Portal:Current events/2011 February 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 16 people have been killed the Southern Sudanese state of Jonglei, breaking
    a ceasefire agreed last month. (Al Jazeera)
  - A suicide bomber attacks a Pakistan Army recruitment centre in northwestern Pakistan
    causing at least 27 deaths and 40 injuries. (Reuters) (AP via Courier Mail) (BBC)
    (Sify)
  - The FARC organisation releases the first of five hostages promised this week as
    a gesture of peace to the government in Colombia. (BBC)
  - Israeli forces remove Palestinian tents near Nablus of which 8 were reportedly
    used as homes.(Jerusalem Post)(Arab News)
  2011 Egyptian protests:
  - Protests against the Mubarak regime go on nationwide for a seventeenth consecutive
    day. (The Guardian) (Al Jazeera)
  - Egyptian President Hosni Mubarak refuses to resign in an address to the nation.
    (Al Jazeera) (The Guardian)
  Arts and culture:
  - Vietnam is to host the debut International Choir Festival. (Vietnam News)
  - World Youth Day 2011 organizers announce Pope Benedict XVI’s schedule of activities
    for the multi-day event, which will take place Aug. 18-21 in Madrid, Spain. (Catholic
    News Agency)
  Disasters:
  - Eight people are killed in a warehouse fire in Perm, Russia. (Itar Tass) (AFP
    via Google News)
  - A Manx2 flight from Belfast to Cork crashes on landing, killing six and injuring
    at least another six. It is the deadliest in Irish aviation since 1968. (The Guardian)
    (RTÉ) (CBC News)
  - Three people are dead, and two others are missing after a natural gas line rupture
    and explosion in the city of Allentown, Pennsylvania. (CNN)
  - A snowstorm hits the Southeastern United States and Tennessee Valley with warnings
    in place across ten states. (CNN)
  International relations:
  - Cuban Information and Communications Minister Medardo Diaz welcomes the arrival
    of an undersea fibre-optic cable linking it to Venezuela, which offered to help
    the island speed up its internet connection after the United States refused. (BBC)
  - North Korea reports that it will not conduct further talks with South Korea, citing
    a perceived lack of seriousness on South Korea's part. (MSNBC)
  - Reuters reports that India and Pakistan have agreed to resume peace talks that
    were broken off after the 2008 Mumbai attacks. (Reuters) (Al Jazeera)
  Law and crime:
  - The trial of Indonesian Muslim cleric Abu Bakar Bashir on terrorism charges begins
    in Jakarta. (AAP via The Age) (BBC)
  Politics and elections:
  - Blind Chinese activist Chen Guangcheng says, in a secretly shot video, that he
    is still under house arrest after being released from prison. (BBC) (Radio Television
    Hong Kong) (AFP via Google News)
  - The British House of Commons votes 234-22 against prisoners receiving the right
    to vote. (BBC)
  - Former British Labour MP Eric Illsley is jailed for 12 months for dishonestly
    claiming parliamentary expenses. The sentence comes on the same day that Jim Devine,
    another former Labour MP, is convicted of dishonestly claiming £8,385 of expenses
    by using false invoices for cleaning and printing work. (BBC)
  Sport:
  - Utah Jazz head coach Jerry Sloan, the longest-tenured coach in any of North America's
    four major leagues, announces his resignation effective immediately. Sloan, inducted
    in the Basketball Hall of Fame in 2009, had been with the Jazz since 1988. (ESPN)
  - Ray Allen scores his 2,561st 3-point shot, passing Reggie Miller for the all-time
    NBA record for 3-point field goals made.
