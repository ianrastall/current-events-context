Date: '2011-02-09'
Source_URI: Portal:Current events/2011 February 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali pirates seize an oil supertanker off the coast of Oman. (BBC)
  - At least seven people are killed and dozens of others are injured during three
    explosions in Kirkuk, Iraq. (Al Jazeera)
  - Serial blasts rock Russia's Grozny, at least five people are wounded. (People's
    Daily)
  2011 Egyptian protests:
  - Nationwide protests against President Hosni Mubarak and his regime continue for
    a sixteenth day. (Al Jazeera) (The Guardian)
  - Labour unions involving thousands of workers go on a nationwide strike, boosting
    the pro-democracy demonstrations occurring across the country. (Al Jazeera)
  - Human rights groups say the military is secretly detaining and torturing hundreds
    and possibly thousands of suspected government opponents and has been doing so
    since the protests started. (The Guardian)
  - The government threatens a crackdown as the protests spread. (Khaleej Times) (Voice
    of America)
  - Egyptians mourn those killed for protesting against their government. (Al Jazeera)
  - After being released by the authorities, Google executive Wael Ghonim addresses
    the crowds in Tahrir Square. (The Guardian)
  Business and economy:
  - The Guardian publishes WikiLeaks cables claiming that Saudi Arabia had exaggerated
    its crude oil reserves by nearly 40% and will have trouble keeping a cap on oil
    prices. (The Guardian)
  - A leaked memo shows Nokia chief executive Stephen Elop's belief that the company
    is too slow in its response to trend changes. (Al Jazeera)
  - Activision Blizzard announces that it is dissolving its Guitar Hero division and
    not publishing any more games. (Gamasutra)
  - ConocoPhillips and Marathon Oil announce plans to shut down a liquefied natural
    gas plant in Kenai, Alaska, United States. (AP via KTUU)
  - Project Merlin
  - 9 February - Project Merlin, an agreement on aspects of banking activity in the
    United Kingdom, is agreed between the coalition government and the country's four
    major high street banks. (BBC)
  - Liberal Democrat peer Lord Oakeshott resigns as a Treasury spokesman in the House
    of Lords after making an outspoken attack on the agreement. (BBC)
  Disasters:
  - A major fire breaks out in Bombay House, a historic building in Mumbai, India,
    which serves as the headquarters of the Tata Group, resulting in at least three
    deaths. (Press Trust of India via IBN-Live)
  - Thieves tapping a Pemex oil pipeline cause a diesel fuel spill south of Tijuana
    in Mexico. (Reuters)
  - Two small planes (took off from Langley Regional Airport) collide mid-air near
    Mission, British Columbia, in western Canada, with at least one person dead. (CTV)
  - An explosion occurs in Allentown, Pennsylvania, United States, resulting in two
    people being missing. (The Morning Call)
  International relations:
  - President of France Nicolas Sarkozy calls for an end to government ministers holidaying
    abroad after it emerges they went to countries such as Egypt and Tunisia while
    anti-regime protests were underway. The controversy has led to calls for resignations.
    (Al Jazeera)
  - Korean talks
  - South Korea agrees in principle to resume discussions with North Korea on humanitarian
    issues including reuniting families separated by the Korean War. (BBC)
  - Military talks end without agreement as North Korea refuses to apologise for the
    Bombardment of Yeonpyeong. (Yonhap)
  - U.S. Homeland Security Secretary Janet Napolitano claims the possibility of terrorism
    being carried out against the country "has evolved significantly" and, she claims,
    is "at its most heightened state" since the 9/11 attacks". (BBC)
  - In a new agreement, Denmark and Russia will for the first time, cooperate within
    military. (Jyllandsposten)
  Law and crime:
  - Prime Minister of Italy Silvio Berlusconi brands "disgusting" a request by prosecutors
    in Milan to have him put on trial immediately in relation to sexual relations
    with underage prostitutes which allegedly occurred at one of his house parties.
    (BBC)
  - Detectives investigating claims over tabloid phone hacking in Britain are re-examining
    whether a string of high-profile individuals and celebrities were targeted. Scotland
    Yard is taking a second look. (Radioaire)
  - Jimmy Lemi Milla, a South Sudanese minister, and his bodyguard are shot dead apparently
    as a result of a personal dispute. (Al Jazeera)
  - The trial of former President of Liberia Charles Taylor is adjourned until Friday
    after he does not attend court in The Hague. (BBC)
  - Daniel Patrick Boyd pleads guilty to terrorism charges in a trial in the US state
    of North Carolina. (AP via Minneapolis Tribune)
  Politics and elections:
  - Spanish Basque nationalists announce a new political party named Sortu (meaning
    "born" in the Basque language), categorically rejecting all violence, including
    that of ETA. (Deutsche Presse-Agentur)
  - The Cabinet of Pakistan submit their resignations to the prime minister, who intends
    to appoint a smaller cabinet in order to reduce government spending at a time
    of economic crisis. (AFP via Google News)
  - US Representative Chris Lee representing New York's 26th congressional district
    resigns after it is revealed that he sent a racy photo to a woman who was not
    his wife. (New York Times)
  - The United States Democratic Leadership Council consisting of centrist Democrats
    announces that it will wind up. (The New Republic)
  - The Chamber of Councillors of Tunisia passes legislation allowing the President
    to rule by decree. (BBC)
  Sport:
  - Owners and players in the United States National Football League resume talks
    in an effort to avoid a lockout next season. (ESPN)
  - The Florida Panthers National Hockey League team acquires Jack Skille, Hugh Jessiman
    and David Pacan from the Chicago Blackhawks in exchange for Michael Frolik and
    Alexander Salak. (National Hockey League)
