Date: '2011-02-11'
Source_URI: Portal:Current events/2011 February 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - The death toll from clashes between rebels loyal to George Athor and the army
    in Southern Sudan rises to 100. (BBC)
  - Bolivian President Evo Morales abandons an event in the south of the country after
    crowds booed him and threw dynamite in a protest over rising food prices. (BBC)
    (AP via Google News) (UPI)
  - Israeli forces fire gas agents and rubber-coated bullets against Palestinian protesters
    in Silwan, injuring dozens.(Muslim News)(The Palestine Telegraph)
  Egyptian Revolution of 2011 / Downfall of Hosni Mubarak:
  - Protests continue following last night's non-resignation speech of President of
    Egypt Hosni Mubarak. (Al Jazeera) (The Guardian)
  - Thousands of pro-democracy demonstrators march on state television and presidential
    palaces as "Farewell Friday", the eighteenth day of protests against the Mubarak
    regime, gets underway. (Al Jazeera)
  - Opposition leader Mohamed ElBaradei warns "Egypt will explode" in response to
    Mubarak's non-resignation speech last night. (CNN)
  - Military leaders pledge to end the 30-year state of emergency law when the protests
    end. (Al Jazeera)
  - The Mubaraks flee Cairo and head for the Red Sea resort of Sharm el-Sheikh. (Xinhua)
    (CBS News) (Ynetnews)
  - At least 5 people are killed by police in Arish in the North Sinai Governorate.
    (The Guardian)
  - Prime Minister of Denmark Lars Løkke Rasmussen, speaking in Copenhagen, becomes
    the first European Union leader to tell Mubarak to resign, saying Mubarak is "history"
    and that he "made a huge blunder yesterday" by giving his non-resignation speech.
    (CP via Google News)
  - Vice President Omar Suleiman announces on state television the resignation of
    Hosni Mubarak as President of Egypt after 30 years in power. (BBC) (Al Jazeera)
  - Hosni Mubarak resigns as President of Egypt and hands power to Mohamed Hussein
    Tantawi, head of the Supreme Council of the Armed Forces. (Washington Post) (Reuters)
  Business and economy:
  - The U.S. Department of Agriculture says it has deregulated a genetically engineered
    corn. See genetically modified food. The corn in question is designed for the
    manufacture of ethanol. (Reuters)
  Culture:
  - A road in Copenhagen, Denmark has been proposed a new name after former US president
    Ronald Reagan. (Jyllandsposten)
  Disasters:
  - The first investigation into yesterday's plane crash at Cork Airport is expected
    within a month; the airport remains closed today. (RTÉ)
  International relations:
  - An American man is held responsible for the "cold-blooded murder" of two men in
    Lahore, Pakistan, by city police chief Aslam Tareen. (BBC)
  - China's foreign minister Yang Jiechi visits Zimbabwe as the countries agree a
    $10 billion trade deal. (BBC)
  - North Korea asks its embassies worldwide to appeal for aid to feed its population.
    (The Independent)
  Law and crime:
  - Computer security company McAfee says hackers based in the People's Republic of
    China have targeted computer networks of global oil companies and individuals
    in Kazakhstan, Taiwan, Greece, and the United States, to steal information starting
    in 2009. (The Straits Times) (Global Times)
  - Former President of Liberia Charles Taylor's trial in The Hague is extended. (BBC)
  - Seven Somali pirates are charged with firearms offences in a Malaysian court,
    in a move that could see them hanged. (Reuters)
  - Indonesian police arrest 13 people over two incidents of religious violence in
    which three people were killed and churches burnt. (Bangkok Post)
  Politics and elections:
  - Chinese activist Chen Guangcheng and his wife are reportedly beaten after filming
    a secret video showing their house arrest. (BBC) (Radio Television Hong Kong)
  Anniversary of Iranian Revolution:
  - Iran marks the 32nd anniversary of its Revolution. (IRINN)
  - President Mahmoud Ahmadinejad insists that the nation remains determined to continue
    its nuclear path. (Press TV)
  - Ahmadinejad said that the new Middle East will be formed soon where there will
    be no room for the United States and Israel. (IRNA)
  - Iranian opposition leader Mehdi Karroubi is placed under house arrest after calling
    for demonstrations in support of the uprisings in Egypt and Tunisia. (The Independent)
