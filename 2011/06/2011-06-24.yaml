Date: '2011-06-24'
Source_URI: Portal:Current events/2011 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - The New York Times reports that a cell phone belonging to Osama bin Laden's courier
    contains contacts with Harakat-ul-Mujahedeen indicating possible ties with Pakistan's
    intelligence agencies. (The New York Times)
  - Hillary Clinton, the United States Secretary of State, warns of a possible escalation
    of the 2011 Syrian uprising as Syrian Army forces mass near the border with Turkey.
    (Sky)
  - Three explosions hit the Myanmar cities of Naypyidaw, Mandalay and Pyin U Lwin.
    (Reuters)
  Business and economy:
  - Italian Mario Draghi is appointed as the next President of the European Central
    Bank, replacing Jean-Claude Trichet on November 1. (Reuters via France 24)
  Disasters:
  - Mudslides isolate 1,200 in Japan's Nagano Prefecture. (Kyodo News)
  - Tropical Storm Meari hits the Philippines, leaving 11 people missing and over
    40,000 displaced. (Xinhua)
  - The Souris River floods to record levels and overflows levee banks in the US town
    of Minot, North Dakota. (MSNBC)
  - At least two people are killed and dozens injured after a tractor-trailer truck
    collides with the California Zephyr Amtrak train on US Route 95 in Nevada. (Reuters)
  Law and crime:
  - The International Criminal Tribunal for Rwanda passes judgement on six suspects
    in relation to massacres in the former Butare Province including Pauline Nyiramasuhuko,
    former Minister for Family and Women Affairs with Nyiramasuhuko receiving a life
    sentence. (The New Times) (CNN)
  - United States District Court judge Tanya Walton Pratt halts enforcement of an
    Indiana state law cutting funding for Planned Parenthood and other organisations
    that provide abortions. (Indianapolis Star)
  - Canadian business man Conrad Black is sentenced to another 13 months in jail in
    the United States for fraud. (The Globe and Mail)
  - Levi Bellfield is sentenced to life imprisonment for the murder of Milly Dowler.
    (BBC)
  Movies:
  - Cars 2
  - Bad Teacher
  - Double Dhamaal
  - A Better Life
  Politics:
  - The New York Senate votes to legalise same-sex marriage in New York, assuring
    passage of the legislation and making New York the largest state to approve such
    legislation since California reversed its legalization in 2008. (Washington Post)
  Sport:
  - Applications begin for second chance tickets for the 2012 Summer Olympics in London,
    England. (The Daily Telegraph)
