Date: '2011-06-19'
Source_URI: Portal:Current events/2011 June 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Spanish protests: More than 100,000 people, the "indignant", march on Madrid
    and other Spanish cities to protest government cuts, unemployment and the policies
    of the European Commission. (The Age) (The Financial Times) (Press TV) (Reuters
    Africa) (BBC)'
  - Monitors say the northern Sudanese army is massing in South Kordofan, amid fighting
    with southern-aligned groups in the state. (Reuters)
  - 16 people are killed in clashes between the army and militants in southern Yemen.
    (Reuters) (China Radio International)
  2011 Libyan civil war:
  - NATO confirms it killed civilians in an airstrike on a residential neighborhood
    in Tripoli, as Gaddafi's forces uses artillery fire to kill rebels and civilians
    in Misrata.(Khallej Times)
  Arts and culture:
  - The Philippines commemorates the 150th birth anniversary of José Rizal with the
    unveiling of the world's tallest statue of him in his hometown of Calamba, Laguna.
    (Philippine Daily Inquirer)
  - Alyssa Campanella, Miss California, is crowned as Miss USA. (NPR)
  Business and economy:
  - The Boeing 747-8 makes its international debut at the 2011 Paris Air Show. (Kuwait
    Times)
  Disasters:
  - More than two million people are reported to have been displaced or otherwise
    affected by flooding in the Chinese province of Zhejiang. (AP via MSNBC)
  International relations:
  - Hundreds of Vietnamese citizens protest outside the Chinese embassy in Hanoi for
    the third straight week as tensions escalate over disputed areas of the South
    China Sea. (Taiwan News)
  Law and crime:
  - Six foreigners including two Britons and an American are jailed for lengthy terms
    in Somalia after the seizure of a plane containing $3.6 million in ransom for
    pirates. (AFP via France24)
  - An Indonesian woman is beheaded in Saudi Arabia for killing a Saudi woman. (Jakarta
    Post)
  Politics and elections:
  - Members of the Parliament of Iran sign a scroll to impeach Foreign Minister Ali
    Akbar Salehi following the appointment of Mohammad Sharif Malekzadeh as deputy
    foreign minister.(PressTV)
  - The Somali Prime Minister, Mohamed Abdullahi Farmajo, resigns. (BBC)
  - Russian human rights activist Yelena Bonner dies aged 88. (RIA Novosti) (CNN)
  - Burmese opposition figure Aung San Suu Kyi celebrates her first birthday in freedom
    for more than 10 years. (Al Arabiya) (AP via Google News) (Hindustan Times)
  Sports:
  - Northern Ireland golfer Rory McIlroy wins the 2011 U.S. Open. (Washington Post)
