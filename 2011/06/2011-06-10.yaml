Date: '2011-06-10'
Source_URI: Portal:Current events/2011 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sudan's military bombs a village in Unity State, amid increasing tensions with
    South Sudan. (BBC)
  - The Somali interior minister, Abdi Shakur Sheikh Hassan, is killed by a female
    suicide bomber at his house in the capital Mogadishu. (BBC)
  2011 Syrian uprising:
  - The Syrian Army begins operations to "restore security" to Jisr al-Shughour and
    the surrounding area. (BBC)
  - Turkish Prime Minister Recep Tayyip Erdoğan describes the crackdown as "inhumane".
    (Al Jazeera)
  - Thousands protest across the country, with at least 23 deaths reported. (Al Jazeera)
    (Trend News Agency Azerbaijan)
  2011 Libyan civil war:
  - Fresh NATO airstrikes take place over the capital Tripoli. (Al Jazeera)
  - The African Union calls for Muammar Gaddafi to step down and leave Libya. (All
    Africa)
  Business and economy:
  - The People's Republic of China's only ratings house that grades sovereign entities,
    the Dagong Global Credit Rating Company, states that the United States is already
    defaulting on its debt by allowing the U.S. dollar to devalue against other currencies,
    diminishing the wealth of China as a U.S. creditor. (AFP via Yahoo!)
  - The South Korean Central Bank raises its benchmark interest rate by 25 basis points
    to 3.25 percent. (Dow Jones via The Australian)
  Disasters:
  - At least 14 people are killed as a van falls into a canal in Azad Kashmir in Pakistan.
    (Xinhua)
  - Radioactive cesium above Japanese legal limits is found in tea from the Shizuoka
    Prefecture, located 300 kilometres from the earthquake-damaged Fukushima Daiichi
    Nuclear Power Plant. (NHK)
  - The British Environment Agency declares drought in five English counties – Lincolnshire,
    Cambridgeshire, parts of Bedfordshire, Northamptonshire and Norfolk – following
    a dry spring. (Sky News)
  International relations:
  - Iran has reportedly been caught on 10 separate occasions trying to send arms to
    terrorist groups, including Hamas and the Taliban. (Jerusalem Post)
  South China Sea dispute:
  - Vietnam said that a Chinese fishing boat had purposefully torn away a seismic
    research cable laid by Vietnam's Petrovietnam oil company inside Vietnam’s 200
    nautical mile exclusive economic zone. (RIA Novosti) (BBC)
  - In response, China warns Vietnam to stop all activities in the disputed waters.
    (RIA Novosti) (BBC)
  - After that, Vietnam announces a live-ammunition military drill in the area. (Forbes)
  Law and crime:
  - Yuri Budanov, a Russian colonel convicted of strangling an 18-year-old Chechen
    girl during the Chechen War, is shot dead in Moscow. (AFP via Google News) (RIA
    Novosti)
  - Hundreds of Mainland Chinese and Taiwanese people are arrested in several countries
    across Asia during a crackdown on a telephone scam network. (AFP via Google News)
  Politics and elections:
  - Sinn Fein's Paul Maskey wins the West Belfast by-election. (BBC)
  Sports:
  - The Vancouver Canucks defeat the Boston Bruins by a score of 1–0 in Game 5 of
    the 2011 Stanley Cup Finals, to take a 3–2 series lead. (NHL)
  - Persepolis F.C. win their fifth title in the Iranian Hazfi Cup after defeating
    Malavan F.C. in the final. (Varzesh3)
