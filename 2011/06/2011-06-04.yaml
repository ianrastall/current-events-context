Date: '2011-06-04'
Source_URI: Portal:Current events/2011 June 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least seven people are killed in an exchange of fire between pro-government
    forces and mutineering soldiers in Bobo-Dioulasso, Burkina Faso. (BBC)
  - North Sudan dismisses calls by the United Nations Security Council to leave the
    disputed Abyei region on the border with South Sudan. (Reuters)
  - Tens of thousands of people gather in Hong Kong to remember the victims of the
    1989 Tiananmen Square protests. (CNN) (Washington Post) (Japan Today) (Times of
    India)
  - Two terrorist suspects wanted in connection with the shooting of two Indonesian
    police officers are killed in a raid in Poso, Central Sulawesi. (Jakarta Post)
  - Senior Islamic militant Ilyas Kashmiri, the leader of Harkat-ul-Jihad al-Islami,
    is killed in a US drone attack in South Waziristan in Pakistan. (BBC) (Al Jazeera)
  Arab Spring:
  - NATO begins using attack helicopters for the first time in air operations over
    Libya. (NATO)
  - The Syrian human rights group Sawasiah claims that at least 63 protestors were
    killed on Friday. (Reuters via Haaretz)
  - 'Yemeni uprising: Several senior Yemeni officials injured in yesterday''s attacks
    are taken to Saudi Arabia for treatment. (Reuters)'
  - 'Yemeni uprising: President Ali Abdullah Saleh is also flown to Saudi Arabia for
    treatment after being wounded. (BBC)'
  - 'Yemeni uprising: Russia evacuates its diplomats from the capital Sana''a. (UPI)'
  - United Nations Secretary-General Ban Ki-moon urges dialogue in Bahrain after protests.
    (UPI)
  Business and economy:
  - Bangladesh receives a loan from the World Bank to strengthen regional co-operation
    on wildlife protection. (Straits Times)
  Disasters:
  - Thousands of people are evacuated in Chile ahead of a possible eruption of the
    Puyehue-Cordón Caulle volcano. (CNN Chile - Spanish)
  International relations:
  - The Philippines accuses China of intimidating rival claimants to areas of the
    South China Sea, and violating its territorial waters. (AFP via Google News)
  - Japan and the People's Republic of China agree to resume defense relationships
    suspended since a disagreement over the Senkaku Islands. (NHK World)
  Law and crime:
  - The Cairo Criminal Court sentences former finance minister Youssef Boutros Ghali
    to 30 years imprisonment in absentia for abuse of power. (Xinhua)
  Politics:
  - Indian guru Swami Ramdev starts a hunger strike against corruption in the Government
    with thousands joining in but the camp is broken up. (Al Jazeera), (Hindustan
    Times)
  - Former United States Secretary of State Lawrence Eagleburger dies. (AP via MSNBC)
  Sports:
  - In horse racing, Pour Moi wins the Epsom Derby. It is the first French horse to
    win the Derby since 1976. (BBC)
  - Li Na of the People's Republic of China becomes the first Asian tennis player
    to win a major title winning the 2011 French Open. (Bloomberg)
