Date: '2011-06-26'
Source_URI: Portal:Current events/2011 June 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Vietnamese protesters march in the capital Hanoi for the fourth successive week
    calling on the People's Republic of China to stop entering Vietnamese territorial
    waters on the South China Sea. (AP via MSNBC)
  - At least 25 people are killed and many others are wounded after a bomb explodes
    in Maiduguri. (BBC) (The Guardian)
  Arab Spring:
  - '2011 Syrian uprising: A Syrian military spokesman says more than 400 members
    of security forces have been killed in the months-long unrest as videos surface
    allegedly showing children killed in the violence. (CNN)'
  - '2011 Syrian uprising: French newspaper Le Figaro reports that Hezbollah has transferred
    hundreds of missiles from Syria to Lebanon, fearing the fall of the Syrian government
    in the ongoing Syrian uprising. (Haaretz)'
  - '2011 Libyan civil war: Rebels and regime forces clash about 80 km (50 miles)
    south-west of the capital, Tripoli as rebels make a push towards the capital.
    (BBC)'
  Israeli–Palestinian conflict:
  - Following accusations by the Foreign Press Association that Israel is intimidating
    journalists on the 10-ship flotilla due to sail to the Gaza Strip, Prime Minister
    Benjamin Netanyahu says that the journalists will not to be sanctioned. (The Guardian)
    (The Jerusalem Post)
  - Israeli troops begin to dismantle part of the controversial West Bank barrier
    near the Palestinian village of Bilin, four years after a court ordered it to
    be re-routed. (BBC)
  - A bomb causes a large explosion near the United Nations compound in Gaza City
    on the Gaza Strip. (BBC)
  Arts and culture:
  - More than one million people participate in São Paulo's 15th Gay Pride March following
    the recent improvement in the legal rights afforded to the country's gay community.
    (BBC)
  - It is confirmed that Daniel Craig, the current James Bond, has married the Academy
    Award-winning actress Rachel Weisz at a private ceremony in the U.S. state of
    New York. (BBC)
  Glastonbury Festival 2011 in Pilton, Somerset:
  - Beyoncé makes her debut at the Glastonbury Festival, becoming one of only a small
    number of women to have headlined. (BBC) (The Guardian)
  - Christopher Shale, a senior member of British Prime Minister David Cameron's Conservative
    constituency association, is found dead in a portaloo; Shale died hours after
    a critical strategy document credited to him was published in a Sunday newspaper.
    (BBC) (The Guardian)
  Disasters:
  - The bodies of six mountaineers are found on Neige Cordier in the French Alps after
    apparently having been killed by an avalanche. (BBC) (The Guardian) (CNN)
  Eruption of Puyehue-Cordón Caulle in Chile:
  - Ash cloud from the 2011 Puyehue-Cordón Caulle eruption continues to disrupt flights
    between Australia and New Zealand. (The Sydney Morning Herald)
  - The Chilean airline LAN cancels 39 flights in Chile and Argentina due to ash cloud
    from the 2011 Puyehue-Cordón Caulle eruption. (AP via AM 1150)
  Law and crime:
  - The so-called "LulzSec" hackers have reportedly disbanded after a final data dump
    including information from AOL Inc. and AT&T. (Reuters)
  - The sentence for a drug possession conviction of the nephew of deposed Tunisian
    President, Zine el Abidine Ben Ali, is increased after he appeals it. (CNN)
  Politics:
  - The Senate of Canada passes a back-to-work bill imposing a labour contract for
    48,000 Canada Post employees resulting in a return-to-work by Tuesday. (CBC)
  Science:
  - The strain of E. coli blamed for 46 deaths in Germany appears to have resurfaced
    in France, sickening eight people, who have been hospitalized in Bordeaux. (CNN)
  Sports:
  - In association football, Club Atlético River Plate of Argentina are relegated
    for the first time in their 110-year history. The result enrages River Plate hooligans,
    who riot inside and outside the stadium; at least 35 police and 55 civilians are
    reported to be injured. (Associated Press via USA Today)
  - In car racing, Sebastian Vettel of Red Bull wins the European Grand Prix in Valencia.
    (BBC Sport) (The Sunday Business Post) (The Guardian)
  - A former goalkeeper for the South Korea national football team turns himself in
    for involvement in a match fixing scheme for K-League matches. (Yonhap News)
