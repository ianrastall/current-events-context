Date: '2011-06-18'
Source_URI: Portal:Current events/2011 June 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Burma accuses the Kachin Independence Army of starting deadly fighting near the
    Chinese border. (AFP via Google News) (Asian Correspondent) (BBC)
  - South Korean troops mistakenly fire on a Chinese passenger plane as it flies near
    the disputed Northern Limit Line on the border with North Korea; there are no
    casualties. (Yonhap) (Reuters)
  - Syrian troops raid the town of Bdama near the Turkish border in an attempt to
    crush a nationwide uprising. (BBC)
  Arts and culture:
  - American musician Clarence Clemons, best known for his work with Bruce Springsteen's
    E Street Band, dies from complications of a stroke. (Bruce Springsteen)
  Business and economy:
  - Oil prices hit a four-month low, with oil now at USD $93 per barrel. (Reuters)
  Politics:
  - Former Zambian President Frederick Chiluba dies aged 68. (AP via Google News)
    (IOL)
  - Pro-democracy activists in Morocco call for renewed demonstrations, saying reforms
    proposed by King Mohammed VI are not enough. (Al Jazeera)
  - Some Saudi Arabian women challenge a ban on female drivers, posting accounts and
    pictures of themselves driving automobiles. (The Guardian) (Gulf NEWS) (Sky News)
    (The New York Times) (Reuters)
  - Mike Rawlings is elected as the Mayor of the US city of Dallas, Texas, with Betsy
    Price elected as the Mayor of Fort Worth, Texas and Beth van Duyne elected as
    the mayor of Irving Texas. (NBC Dallas Fort Worth)
  - Russian human rights activist Yelena Bonner, the widow of Soviet dissident and
    Nobel Peace Prize winner Andrei Sakharov, dies in the city of Boston, MA, USA.
    (RIA Novosti)
  Science:
  - NOAA states that 2011 is already one of the most extreme weather years on record.
    (Scientific American)
