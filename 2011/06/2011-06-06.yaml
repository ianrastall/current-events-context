Date: '2011-06-06'
Source_URI: Portal:Current events/2011 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Libyan civil war: Rebels retake the town of Yafran in the west of the country.
    (New York Times) (al Jazeera)'
  - '2011 Bahraini protests: Medical staff who treated anti-government demonstrators
    are charged with attempting to overthrow the monarchy. (Al Jazeera)'
  - Two United States drone missiles kill 14 people in Pakistani Taliban compounds
    near Wana in South Waziristan. (Dawn). (AAP via Herald Sun)
  - '2011 Yemeni uprising: Armed men affiliated with al-Qaeda kill seven soldiers
    and injure 12 others near the city of Zinjibar. (Reuters)'
  - Shooting takes place in Kaduqli in Sudan's South Kordofan state, where armed groups
    allied to South Sudan are based. (Reuters)
  - 2011 Xilinhot incident
  2011 Syrian uprising:
  - At least 120 members of the Syrian security forces are killed in clashes in the
    northern town of Jisr al-Shughour, according to state media. (AP via Google News)
    (BBC) (Syrian Arab News Agency)
  - Syrian blogger Amina Abdallah is kidnapped by armed men in Damascus. (The Guardian)
  - Around 100 people are detained after ethnic unrest in the Inner Mongolia region
    of China. (Hong Kong Standard)
  Business and economy:
  - North Korea is to establish a special economic zone on two islands close to the
    Chinese border. (Straits Times)
  - Bloomberg reports Italian company Prada SpA is planning an initial public offering
    for the Hong Kong Stock Exchange. (Bloomberg)
  - The Tokyo Metropolitan Government changes working hours of its staff in order
    to conserve energy from the shortages caused by the Fukushima Daiichi nuclear
    disaster. (AP via Washington Post)
  - Hacker group Lulz Security claims to have again compromised Sony's online security
    system and posted the results online. (Reuters)
  - Apple Inc. launches its new iCloud service at the Apple Worldwide Developers Conference.
    (Sydney Morning Herald)
  Disasters:
  - At least 21 people die as two coal mines in the People's Republic of China flood.
    (AFP via Inquirer)
  - Test results will confirm whether the German E. Coli outbreak came from vegetable
    sprouts grown in the Uelzen area. (Sky News)
  - Residents of three Western United States towns - Springerville, Arizona, Eagar,
    Arizona and Luna, New Mexico - are warned to prepare for evacuation ahead of the
    Wallow Fire. one of the biggest in Arizona history. (Arizona Daily Star)
  - At least seventeen people are dead and another 15 remain missing after a speedboat
    sinks in Banjarmasin, the capital of the Indonesian province of South Kalimantan.
    (Jakarta Post)
  International relations:
  - A European Union delegation visits North Korea to investigate claims of food shortages.
    (Yonhap News)
  - The People's Daily, a Chinese stated-owned newspaper, accuses Internet search
    engine giant Google of becoming a "political tool" after it claimed that computer
    hacking aimed at it came from China. (Reuters)
  - The United Nations Committee Against Torture calls for the Government of Ireland
    to set up a statutory inquiry into allegations of poor treatment of women committed
    to the Magdalene Laundries. (Irish Times)
  Law and crime:
  - The Supreme Court of India calls on the Indian government to explain why police
    were sent in to disperse a peaceful anti-corruption demonstration. (Straits Times)
  - Abu Bakar Bashir, a prominent Indonesian cleric, rejects his terrorism trial as
    "outside Islamic law." (Al Jazeera)
  - Former International Monetary Fund chief Dominique Strauss-Kahn will be arraigned
    on sexual assault charges in the US state of New York. (The Telegraph)
  - The sodomy trial of Malaysian opposition leader Anwar Ibrahim is delayed after
    the presiding judge Mohamad Zabidin Diah dismisses the defence's efforts to have
    him replaced. (AP via MSNBC) (Bernama)
  - The United States Federal Bureau of Investigation announces that it has arrested
    13 members of the Mafia in the city of Philadelphia in relation to an illegal
    gambling operation. (NBC Philadelphia)
  Politics and elections:
  - The outgoing speaker of the House of Representatives in Nigeria, Dimeji Bankole,
    is arrested on fraud charges. (Daily Nation) (The Africa Report)
  - France announces that it will stop teaching indigenous languages in schools in
    all of its Overseas departments and territories of France. (RNZI)
  - Ollanta Humala is elected President of Peru in the Peruvian general election,
    defeating opposition leader Keiko Fujimori. (BBC), (Reuters via Yahoo News)
  - U.S. House Representative Anthony Weiner of New York admits sending a risqué picture
    of himself to a college student on Twitter. (Associated Press)
  - Austan Goolsbee announces plans to leave the position of Chairman of President
    of the United States Council of Economic Advisers by September. (New York Times)
  Sports:
  - The Golden State Warriors in the North American National Basketball Association
    appoints Mark Jackson as the new coach. (NBA)
  - in the North American National Hockey League Stanley Cup Finals, the Boston Bruins
    beat the Vancouver Canucks 8-1 in Game 3 with the Canucks leading 2-1 overall.
    (Boston Globe)
