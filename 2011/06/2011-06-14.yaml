Date: '2011-06-14'
Source_URI: Portal:Current events/2011 June 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Canada recognises the rebel National Transitional Council of Libya as the country's
    legitimate government with the Canadian House of Commons voting to extend its
    mission in Libya by three and a half months. (CBC), (CBC)
  - Pakistan's Directorate for Inter-Services Intelligence has arrested Central Intelligence
    Agency informants who contributed to the raid on Osama bin Laden. (New York Times)
  2011 Syrian uprising:
  - Security forces widen an operation in the north of the country as part of a crackdown
    on protests. (Al Jazeera)
  Iraq War:
  - Time reports that a Federal Grand Jury is investigating claims of war crimes and
    torture by the US Central Intelligence Agency at Iraq's Abu Ghraib prison in 2003.
    (Time Magazine)
  - A series of attacks on the town of Baqubah result in at least seven deaths and
    17 injuries. (AFP via Yahoo! News)
  Arts and culture:
  - A new diary by Che Guevara of his time fighting in the Cuban Revolution between
    1956 and 1958 is published. (The Guardian)
  Business and economy:
  - Gaza's unemployment rate was among the world's highest, at 45.2% in late 2010
    according to the UN. (BBC)
  - Air Canada services face disruption as customer service agents affiliated with
    the Canadian Auto Workers start a strike. (Financial Post)
  Disasters:
  - Airspace restrictions are in place in East Africa after the Nabro Volcano erupts
    in Eritrea. (Al Jazeera)
  - An elderly man dies following aftershocks to the 2011 Christchurch earthquake
    in Christchurch, New Zealand, with additional buildings to be demolished. (New
    Zealand Herald), (TV New Zealand)
  - At least two people die as a building collapses in Nairobi, Kenya. (Capital FM)
  - The first child dies during the 2011 E. coli O104:H4 outbreak in Germany with
    a total of 36 deaths in Germany and one in Sweden. (Xinhua)
  - Arizona fires
  - Small communities near the US town of Sierra Vista, Arizona are evacuated due
    to a wildfire that started in Coronado National Memorial. (Arizona Daily Star)
  - The Wallow Fire becomes the largest wildfire in Arizona history. (Incident Information)
  International relations:
  - The United Nations declares Nepal free of land mine fields after the last remaining
    land mine is destroyed. (AP)
  - The United States issues a terrorist-related travel warning for the Philippines.
    (CNN)
  Law and crime:
  - In the first case of its kind to be heard in the United Kingdom, a former juror
    who admitted contacting a defendant via Facebook has been convicted of contempt
    of court. (BBC)
  - Another land campaigner is shot dead in Brazil's Amazon basin with five activists
    shot dead in the past month. (BBC)
  Politics:
  - British Prime Minister David Cameron has announced major changes to plans for
    reforms of the NHS in England saying that the government has made mistakes, but
    he insists it has not made "a humiliating U-turn". (BBC)
  - Members of the United Kingdom's two main teaching unions, the National Union of
    Teachers and the Association of Teachers and Lecturers have voted to take industrial
    action over changes to their pensions. They are first expected to walk out on
    30 June. Other public sector workers may join them on that day. (BBC)
