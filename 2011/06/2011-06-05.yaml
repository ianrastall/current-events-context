Date: '2011-06-05'
Source_URI: Portal:Current events/2011 June 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Arab Spring
  - '2011 Yemeni uprising: Two people are killed and fifteen injured in a hand grenade
    attack on a pro-opposition military facility in Sana''a, Yemen. (Sky News)'
  - '2011 Yemeni uprising: Gunmen attack the Presidential palace in Taiz resulting
    in the death of four soldiers. (AP via Yahoo News)'
  - '2011 Syrian uprising: Residents in the city of Hama strike in memory of those
    killed in the pro-democracy protests. (AFP via Google News)'
  - 25 people are killed by security forces during a large demonstration in Jisr al-Shaghour,
    northwest Syria. (CNN)
  - Israeli forces fire on pro-Palestinian protesters attempting to breach the Syrian–Israeli
    border in the Golan Heights on Naksa Day, marking the anniversary of the 1967
    Six-Day War; Syrian sources claim that close to 20 people are killed and over
    325 injured, while Israeli officials confirm at least 12 injures. (Al-Jazeera)
    (The Telegraph) (Ynetnews) (The Jerusalem Post), (AP via Forbes)
  - A NATO helicopter crashes in eastern Afghanistan resulting in at least two deaths,
    with the Taliban claiming to have shot it down. (Reuters)
  - Nearly 30 people are injured in an explosion in the Kenyan capital Nairobi. (Reuters)
  - Fighting breaks out in Sudan's South Kordofan region. (Reuters) (AFP via Google
    News)
  Pakistan terrorism:
  - Six people are killed and 15 injured by an explosion at a bus stand in Matni,
    northern Pakistan. (CNN)
  - A suicide bomber attacks a bakery in Nowshera, killing at least 18 people. (AP
    via Houston Chronicle) (BBC)
  Arts and culture:
  - Pope Benedict XVI celebrates Mass in the Croatian capital Zagreb. (UPI) (Vatican
    Radio)
  Disasters:
  - Evacuations are ordered in town of Hamburg in the US state of Iowa as the Missouri
    River partially breaches levee banks. (AP via Google), (CNN)
  - At least one person is dead and 29 are injured after an underground fuel pipe
    explodes in Nairobi, Kenya. (AP via Atlanta Journal Constitution)
  International relations:
  - Hundreds of people in Vietnam take part in a rare demonstration against Chinese
    naval operations in disputed waters in the South China Sea. (BBC) (Philippine
    Inquirer)
  Politics and elections:
  - Voters in Portugal go to the polls for the Portuguese legislative election after
    months of a caretaker government and financial problems that led to a request
    for an international bailout - the opposition Social Democrats led by Pedro Passos
    Coelho won. (CNN) (AFP via France24), (AP via Yahoo), (The Guardian)
  - Voters in the Republic of Macedonia go to the polls for parliamentary elections.
    (AFP via Manilla Bulletin)
  - Voters in Peru go to the polls for the second round of the Peruvian general election
    with Ollanta Humala claiming victory over Keiko Fujimori. (Washington Post), (Reuters),
    (Bloomberg via SFGate), (Reuters via Yahoo News)
  - Shops and schools are closed in Bangladesh due to an anti-government strike. (AP
    via MSNBC)
  - Tens of thousands of people protest outside the Parliament of Greece in Athens
    against budget cuts. (AP via CNBC)
  Sport:
  - Rafael Nadal wins the men's singles at the 2011 French Open for a sixth time defeating
    Roger Federer, tying with Björn Borg for most French Open titles won at Roland
    Garros. (NBC Sports), (New York Times)
  - In North American basketball, the Miami Heat beat Dallas Mavericks 88-86 in game
    3 of the 2011 NBA Finals. (Dallas Morning News)
