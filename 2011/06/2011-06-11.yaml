Date: '2011-06-11'
Source_URI: Portal:Current events/2011 June 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 4,300 Syrians flee into Turkey amid a government crackdown on protests.
    (Al Jazeera)
  - '2011 Bahraini protests: More than 10,000 people join an opposition rally for
    the first time in months calling for reform. (Al Jazeera)'
  - Fazul Abdullah Mohammed, mastermind of the 1998 United States embassy bombings
    in Kenya and Tanzania, is killed in Somalia. (Reuters) (Xinhua)
  - '2011 Yemeni uprising: Yemeni President Ali Abdullah Saleh''s health is in poor
    condition a week after a bomb blast injured him and killed several others. (AFP
    via Google News)'
  - '2011 Libyan civil war: Rebels make further gains west of Tripoli, battling in
    Zawiya just 30 miles from the capital. (Forbes)'
  Arts and culture:
  - South Korea welcomes the return of ancient Korean royal books looted by French
    troops in 1866, during an invasion of Ganghwa Island in retaliation for Koreans'
    persecution of French Catholic missionaries. (Yonhap)
  - Entertainer Bruce Forsyth is knighted in the Queen's Birthday Honours. Others
    recognised for their contribution to society include actor Colin Firth, and the
    team which secured England's Ashes victory over Australia. (BBC)
  Law and crime:
  - Media censorship laws in Burma relating to sport, entertainment, lottery and fairytales
    are eased slightly, though restrictions on news titles remain. (Bangkok Post)
    (Australia Network News)
  Politics:
  - Over half a million people demonstrate in Rome, Italy, demanding same sex rights.
    (AGI) (RIA Novosti)
  - Two officials are detained in China after 1,500 people clashed with riot police
    over the death of a local legislator in police custody. (Bangkok Post) (Times
    of India)
