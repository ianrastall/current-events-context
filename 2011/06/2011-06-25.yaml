Date: '2011-06-25'
Source_URI: Portal:Current events/2011 June 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 10 people are killed in clashes in northern Kenya amid a severe drought
    affecting East Africa. (Al Jazeera)
  - Computer hacking group LulzSec announces that it is disbanding. (Business Insider)
  - Forces from Mauritania and Mali clash with Al-Qaeda militants in Mali, destroying
    a base; several bodies are later found. (Modern Ghana) (Focus Information Agency)
    (CNN)
  - Five people are killed and 25 injured in clashes with police in the Puno region,
    Peru, in protests over mining projects. (CNN)
  Arab Spring:
  - '2011 Syrian uprising: Over 1,000 Syrians flee into Lebanon to escape the unrest.
    (Al Jazeera)'
  - '2011 Syrian uprising: Syrian forces attempt to reinforce the border with Turkey.
    (The Guardian)'
  - '2011 Syrian uprising: The Syrian military moves into two villages, one on the
    border with Turkey and the other on the border with Lebanon, with civilians reportedly
    being shot in the village near Lebanon. (BBC News), (AFP via Al Jazeera)'
  - '2011 Syrian uprising: Syria''s deputy foreign minister says anti-regime protests
    have been ignited and fueled by "extremist" groups with religious affiliations
    while a human rights group says 1,337 protesters have been killed since anti-regime
    protests began. (CNN)'
  - '2011 Egyptian revolution: Dozens of people are injured in Cairo in clashes between
    supporters and opponents of putting former President of Egypt Hosni Mubarak on
    trial for corruption. (The Jerusalem Post)'
  - '2011 Libyan civil war: Seventeen top footballers, some former members of the
    national team, defect to the side of the rebels, arriving to cheering crowds in
    the rebel stronghold of Zintan in western Libya. (CNN) (BBC)'
  War in Afghanistan (2001–2021):
  - 35 people are killed in a suicide car bomb attack in Afghanistan's Logar Province.
    (Reuters)
  Disasters:
  - 10 people are killed in Vietnam by storms, seven of which were struck by lightning.
    (Times of India)
  - A strengthening tropical storm affects parts of eastern China, causing flooding,
    while a prolonged drought plagues the northwest of the country. (UPI) (Xinhua)
  - The death toll from the California Zephyr Amtrak train colliding with a truck
    in the U.S. state of Nevada rises to six, with two dozen passengers unaccounted
    for. (RGJ), (AP via Forbes)
  Law and crime:
  - Alleged personal details of former Prime Minister of the United Kingdom Tony Blair
    are published online by computer hackers. (Daily Telegraph)
  - Former Egyptian trade minister, Rashid Mohamed Rashid, is convicted in absentia
    of profiteering and unlawfully taking money from the country's Export Development
    Fund and is sentenced to five years in prison and fined nearly 9.4 million Egyptian
    pound ($1.6 million). (CNN)
  Politics:
  - New York Governor Andrew Cuomo signs New York State's Marriage Equality Law, legalizing
    same-sex marriage in New York, and making New York the largest U.S. state to approve
    such legislation since California reversed its legalization in 2008. (CNN)
  Release of Chinese dissidents:
  - Activist Hu Jia is released after serving three and a half years in jail for criticising
    human rights conditions in China. (Al Jazeera) (AFP via Google News) (Voice of
    Russia)
  - Four associates of Chinese artist and dissident Ai Weiwei are released. (BBC)
  Science:
  - The number of adults with diabetes in the world has more than doubled since 1980,
    according to a new study. (BBC)
