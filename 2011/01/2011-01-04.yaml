Date: '2011-01-04'
Source_URI: Portal:Current events/2011 January 4
Intelligence_Payload:
  Business and economy:
  - Pink Floyd sign a new five-year record deal with EMI after winning a lawsuit regarding
    digital distribution. (BBC)
  - Value added tax in the United Kingdom is increased from 17.5% to 20%, its highest
    ever rate. (BBC)
  Disasters and accidents:
  - Russia begins an operation to free 500 people stranded in ships by ice in the
    Sea of Okhotsk. (BBC)
  - More evacuations take place in Queensland, Australia, as flood waters continued
    to rise and the Australian prime minister says damages could amount to hundreds
    of millions of dollars. (CNN)
  Law and crime:
  - Salmaan Taseer, the Governor of the Pakistani province of Punjab, is assassinated
    by Malik Mumtaz Hussain Qadri, one of his security guards at Koshar Market, Islamabad.
    (CNN)(BBC)
  - 51-year-old Texan Cornelius Dupree, freed on parole in July 2010 after serving
    30 of a 75 year sentence for aggravated robbery, has his conviction quashed after
    he was found to be innocent of the crime through DNA evidence. (BBC)
  Politics:
  - The Economic Community of West African States says the situation in Côte d'Ivoire
    is still in a "stalemate", amid the threat of force to remove Laurent Gbagbo.
    (Reuters)
  - Sudanese President Omar al-Bashir goes to Juba to meet with Southern Sudanese
    President of the Government Salva Kiir Mayardit ahead of Southern Sudan's independence
    referendum. (BBC)
  - '2010–2011 Tunisian protests: Reports continue to leak out of the country regarding
    civil unrest with claims that protests have spread to the city of Thala, where
    the ruling Constitutional Democratic Rally''s offices have been attacked. (Al
    Jazeera English)'
  Science and technology:
  - 10-year-old Canadian Kathryn Aurora Gray becomes the youngest person ever to discover
    a supernova. (BBC)
