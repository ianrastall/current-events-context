Date: '2011-04-20'
Source_URI: Portal:Current events/2011 April 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Ivorian Civil War
  2011 Libyan civil war:
  - Renowned photographers Tim Hetherington and Chris Hondros are killed and four
    others injured in Misrata. (CBC)
  - France and Italy are to send military officers to Libya to train rebels. (IBN
    Live)
  2011 Syrian protests:
  - Protests continue in Syria despite the lifting of the state of emergency law.
    (Al Jazeera)
  - Opposition figure Mahmud Issa is arrested after giving a television interview.
    (Times of India)
  2011 Yemeni protests:
  - The United Nations Security Council fails to come up with an agreed public statement
    at its first meeting to discuss the crisis in Yemen as violence continues. (BBC)
  - Pro-Ouattara forces attempt to remove remaining militia loyal to deposed President
    Laurent Gbagbo. (AFP via Google News)
  Law and crime:
  - Two prominent Chinese human rights lawyers Jiang Tianyong and Liu Xiaoyuan are
    released. (BBC) (Angola Press) (Al Jazeera)
  Politics and elections:
  - President Goodluck Jonathan of Nigeria wins the presidential election held on
    16 April. (This Day Live)
