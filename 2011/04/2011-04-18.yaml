Date: '2011-04-18'
Source_URI: Portal:Current events/2011 April 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - A 16-year-old Israeli boy injured by a Palestinian missile attack on his school
    bus on April 7 dies. (BBC) (Wikinews)
  - Suspected Muslim insurgents detonate a bomb in southern Thailand, killing one
    and injuring 23 people. (Straits Times)
  - Suicide bombing in Iraq kills 9 and wounds 25. (BBC)
  2011 Libyan civil war:
  - Gaddafi's forces kill over 100 civilians in grad rocket attacks in the Nafusa
    Mountains of Libya. (Al Jazeera)
  - Gaddafi's forces commit mass rape of women in battle of Misrata. (The First Post)
    (Ottawa Citizen)
  2011 Syrian protests:
  - Eight killed in Syrian Protests. (BBC)
  - Syrian city of Homs "boiling" after deaths of 25 protesters. (Haaretz)
  - A Syrian officer is reportedly killed for his unwillingness to open fire at protesters.
    (Haaretz)
  Disasters:
  - Storms in Guangdong, southern China, kill at least 18 people and leave 150 injured.
    (BBC) (Xinhua)
  - A landslide kills 10 people in Indonesia's East Java province. (Jakarta Post)
    (The Hindu)
  - 14 people killed in mudslide in Colombia. (BBC)
  International relations:
  - An anti-piracy conference opens in Dubai, United Arab Emirates. (Al Jazeera)
  Politics:
  - Ugandan opposition leader Kizza Besigye is arrested during a protest against high
    food and fuel prices in the capital Kampala. (Reuters) (Al Jazeera)
  Sports:
  - 2011 Boston Marathon
  - Geoffrey Matai of Kenya sets a new record for the fastest time to run the Boston
    Marathon, completing its 26-mile course with a time of 2:03:02. (New York Times)
