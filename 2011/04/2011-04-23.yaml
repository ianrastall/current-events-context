Date: '2011-04-23'
Source_URI: Portal:Current events/2011 April 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Cambodia and Thailand clash on their border. (BBC) (Al Jazeera)
  - Arab Spring
  - '2011 Syrian protests: At least twelve people are killed by security forces during
    funerals. (Reuters)'
  - '2011 Syrian protests: The United Nations Secretary-General Ban Ki-moon condemns
    the killing by the government of at least 300 people since mid-March. (RIA Novosti)'
  - '2011 Libyan civil war: The United States Air Force confirms an air strike by
    a predator drone in Misrata. (BBC) (CBC)'
  - 2011 Yemeni protests
  - President Ali Abdullah Saleh of Yemen agrees to step down under a 30-day transition
    plan to end increasingly violent unrest over his rule. (BBC) (Al Jazeera)
  Arts and culture:
  - The guest list for the wedding of Prince William and Catherine Middleton is announced.
    (CNN) (BBC)
  Law and crime:
  - Police in China raid a Tibetan monastery in Sichuan, killing two people according
    to a rights group. (BBC) (Radio Television Hong Kong)
