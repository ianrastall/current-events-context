Date: '2011-04-11'
Source_URI: Portal:Current events/2011 April 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2011 Syrian protests
  - Students take part in a demonstration at Damascus University to express solidarity
    with protesters killed in the unrest. (Al Jazeera) (Al Bawaba) (Press TV)
  - Student killed after Syria forces attack protest in Damascus University. (Haaretz)
  - 2011 Minsk Metro bombing
  - '2011 Libyan civil war: Libyan rebels reject an African Union peace plan because
    it does not include the removal of Gaddafi from Libya. (Reuters)'
  - Fighting between rebels and government forces kill 27 people in the Central African
    Republic. (AFP via Google News)
  2011 Egyptian revolution:
  - Demonstrators remain in Tahrir Square calling for the acceleration of reforms.
    (Reuters)
  - The Prime Minister of Egypt Essam Sharaf apologises for violence against the protesters
    in Tahrir Square and calls for a judicial investigation. (Al-Jazeera)
  - At least 11 people are killed and dozens are injured in a bomb explosion at Kastrychnitskaya
    metro station in Minsk. (RT) (Reuters via Yahoo News)
  2010-2011 Ivorian crisis/Second Ivorian Civil War:
  - Laurent Gbagbo is captured and arrested in Abidjan. Gbagbo has been reportedly
    taken to the headquarters of Alassane Ouattara. French reports claim he was captured
    by Ouattara supporters while contradictory reports suggest he was captured by
    French special forces. (Washington Post) (France 24) (AFP via Sydney Morning Herald)
  Arts and culture:
  - The French law banning the burqa and niqab comes into effect. (AFP via News Limited)
    (BBC)
  Business and economy:
  - Mexican businessman Carlos Slim is again the richest man in the world according
    to the Forbes list of billionaires. (BBC)
  - Intel announces (former codename "Oak Trail") Atom processor will be in devices
    beginning in May, especially designed for netbook and tablet devices. (Intel Release).
  - Highland Capital has brought an adversary proceeding within the U.S. bankruptcy
    court, New York, in regard to the Lyondell reorganization, against the securities
    unit of UBS AG for third-party inferenece with a contract between Highland and
    Lyondell. (BusinessWeek)
  Disasters:
  - Over 14,000 people are still missing in Japan, a month after the 2011 Tōhoku earthquake
    and tsunami. (Kyodo News)
  - The President of the Tokyo Electric Power Co. visits the government offices of
    Fukushima Prefecture and the command centre for the Fukushima I nuclear accidents
    to apologise. (Kyodo) (CNN)
  - The government of Japan announces plans to evacuate more towns near the Fukushima
    I Nuclear Power Plant as the crisis continues. (CNN)
  - Japan is hit by a magnitude 6.6 aftershock one month after the main earthquake,
    knocking out power to Fukushima I for nearly an hour. (Washington Post)
  International relations:
  - India repatriates 39 Pakistani prisoners in a goodwill gesture. (Times of India)
    (Dawn)
  Law and crime:
  - Authorities in Tajikistan are to ban divorce by text message. (CP)
  - Egyptian blogger Maikel Nabil is sentenced to three years in prison by a military
    court for criticising the army. (BBC) (AP via Google News)
  - Farooque Ahmed is sentenced to 23 years in jail in the US for plotting attacks
    on the Washington Metro system. (Washington post)
  - Nepalese Energy Minister Gokarna Bista is stabbed in Katmandu. (AP via Silicon
    Valley Mercury)
  Politics:
  - Uganda's opposition leader Kizza Besigye is arrested after calling for a protest
    against recent fuel price increases. (AFP via Google News) (BBC)
  - Stephen Smith, the Australian Minister for Defence, orders an investigation into
    the way women are treated at the Australian Defence Force Academy following recent
    sexual abuse allegations. (ABC News Australia)
  - The President of Yemen Ali Abdullah Saleh welcomes a proposal by the Gulf Cooperation
    Council that would see him stand aside for his Vice-President. (Reuters via Ynet)
  - British Prime Minister David Cameron is criticised by the University of Oxford
    for an "incorrect and highly misleading" claim that only one black student was
    enrolled there in 2009. During a question and answer session on the effect of
    higher tuition fees on poorer students, Cameron had called the figures "disgraceful".
    The University says that at least 26 black students started there that year. (BBC)
  - In a confidential letter to Liberal Democrat leader Nick Clegg, the party's former
    leader of Liverpool City Council, Warren Bradley, urges Clegg to pull out of the
    coalition government before the Lib Dems "disappears into the annals of history".
    (BBC)
  - Former Governor of Massachusetts Mitt Romney announces that he will be a candidate
    for the Republican Party nomination for President of the United States. (The Guardian)
  - Vincent C. Gray, the Mayor of Washington DC is arrested while protesting about
    a US budget deal. (CNN)
  Sports:
  - American businessman Stan Kroenke acquires 62.89% of Premier League club Arsenal.
    (BBC)
  - Australian cricket player Shane Watson breaks the world record for number of sixes
    in a One Day International in the second match in the series against Bangladesh.
    (Super Sport)
  - The U.S. Attorney's office for San Diego announces that 10 individuals have been
    indicted on charges relating to an alleged point shaving scheme involving college
    basketball games. The accused include two former players and a former assistant
    coach for the University of San Diego men's team. (The San Diego Union-Tribune)
