Date: '2011-04-22'
Source_URI: Portal:Current events/2011 April 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Cambodia and Thailand exchange fire across their mutual border; with casualties
    on both sides. (The Hindu) (Bangkok Post) (BBC)
  - 3 people are killed and 3 others are wounded as a result of a blast in a factory
    in the Gaza Strip. (AFP via Google News) (PNN)
  - Arab Spring
  - '2011 Syrian protests: At least 88 people are killed as a result of police firing
    at massive "Great Friday" anti-government protests across the country, the deadliest
    day of protest there yet. (Al Jazeera) (Press TV)'
  - '2011 Yemeni protests: Rallies occur in Sana''a. (Al Jazeera) (BBC) (Press TV)'
  - '2011 Omani protests: Thousands of protesters demonstrate in pro-reform protests
    in Oman. (The National) (Al Jazeera) (Press TV)'
  - '2011 Bahraini protests: Non-governmental organisations call upon Bahrain to end
    a crackdown on doctors and patients who joined anti-government protests. (Reuters)
    (BBC) (Press TV)'
  - '2011 Libyan civil war: The head of America''s military says the war is moving
    towards stalemate, even after its air strikes destroy 30-40 per cent of Libya''s
    ground forces. American senator John McCain visits Benghazi. (BBC)'
  - '2011 Egyptian revolution: The detention of former Egyptian President Hosni Mubarak
    is extended by a further 15 days. (The Times of India) (Al Jazeera)'
  - Amid a protest against the construction of a new Tesco superstore in the Stokes
    Croft area of the English city of Bristol, 9 people are arrested and 8 police
    officers are injured. (BBC)
  - A farmer in Los Pozos, Veracruz, Mexico opens fire outside a local church after
    its Good Friday sermon, killing a woman and two children. (WLOS)
  Arts and culture:
  - Good Friday celebrations occur internationally. (The Sydney Morning Herald) (The
    Times of India) (Malaysia Star) (BBC)
  - 24 Filipinos are nailed to crosses in to San Fernando, near Manila, though celebrations
    are cancelled in Syria due to ongoing incidents there. (Daily Mail)
  - Pope Benedict XVI becomes the first pontiff to take part in a televised question-and-answer
    session, a pre-recorded programme for Italian television. (BBC) (The Guardian)
  - Anne Robinson leaves The Weakest Link, prompting the BBC to end the quiz show.
    (The Guardian)
  Disasters:
  - Dozens of people are feared dead in a landslide in the southern Philippines. (Xinhua)
    (BBC)
  - The United Nations says children in drought-infected Somalia are suffering some
    of the highest malnutrition rates in the world. (BBC)
  - Japan's government announces a 4 trillion yen emergency budget to deal with the
    earthquake and tsunami that devastated the country last month. (BBC)
  - Tornado outbreak sequence of April 19-24, 2011:2011 St. Louis tornado
  International relations:
  - France calls for changes to the Schengen Agreement after Italy allows people from
    Tunisia and Libya into the passport-free Schengen Area. (BBC)
  - New research reveals Apple and Google are running their iPhone and Android software
    to build gigantic databases from owners' movements as governments move to investigate.
    (The Guardian) (Xinhua) (The New York Times)
  Politics and elections:
  - Advance voting for the Canadian federal election, 2011 coincides with Easter.
    (CBC News) (CBC News)
