Date: '2011-04-10'
Source_URI: Portal:Current events/2011 April 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - United Nations and French forces open fire on the residence of the President of
    Côte d'Ivoire Laurent Gbagbo in response to recent attacks. (AP via Times Union)
  - 2011 Syrian protests
  - Eyewitnesses claim that Syrian security forces killed four protesters in the coastal
    city of Banias. (AP via Forbes)
  - Eyewitnesses report that Daraa where dozens of protesters were shot on Friday
    is 80 per cent paralysed. (Al-Jazeera)
  - An African Union mission arrives in Libya to negotiate a settlement in the 2011
    Libyan civil war between Muammar Gaddafi and his opponents. (BBC)
  Arts and culture:
  - U2's 360° Tour becomes the highest grossing music tour of all time following a
    show in Rio de Janeiro, Brazil. (NME via Bigpond Music)
  Business and economics:
  - The People's Republic of China records its first trade deficit in six years with
    rising commodity prices blamed. (AP via CBS Moneywatch)
  Disasters:
  - Wildfires in the US state of Texas destroy more than 230,000 acres of land, including
    about 20 homes in the small town of Fort Davis. (Reuters)
  Law and crime:
  - Beijing police arrest at least a dozen members of a Christian house church for
    attempting to hold a church service in public after they are evicted from their
    usual place of worship. (AP via Star Tribune)
  - A British Royal Navy sailor is charged with murdering an officer and attempted
    murder of three crew members aboard a nuclear submarine HMS Astute on Friday night
    in Southampton. (AP via Yahoo News), (AFP via ABC News)
  Politics and elections:
  - Peruvians vote in presidential elections with the most likely result a runoff
    between Ollanta Humala and either Pedro Pablo Kuczynski or Keiko Fujimori. (BBC),
    (AP via Newsday), (New York Times), (BBC)
  - The governing Democratic Party of Japan loses 70 seats in local government elections
    due to concerns over handling of the Fukushima I nuclear accidents. (Reuters via
    Yahoo! News)
  Sport:
  - Sebastian Vettel of Red Bull Racing wins the 2011 Malaysian Grand Prix. (News
    Limited)
  - South African golfer Charl Schwartzel wins the United States 2011 Masters Tournament.
    (NineMSN), (CBS Sports)
