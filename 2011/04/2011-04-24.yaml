Date: '2011-04-24'
Source_URI: Portal:Current events/2011 April 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - More than 500 people are killed in Nigeria. (BBC) (Al Jazeera)
  - Military clashes kill 57 people in Sudan. (CNN) (BBC) (Al Jazeera)
  - NATO fires on Iranian fishermen, wounding them and killing some civilians. (Press
    TV)
  - At least 4 people are wounded at the entrance of a Catholic church after Easter
    Mass in Baghdad. (BBC)
  - A group of 15 Israeli Jewish worshipers entered the Palestinian city of Nablus
    to pray in the Jewish holy site Joseph's Tomb, without coordinating their visit
    with the IDF as required by law. After finishing praying, as the Jewish worshipers
    were leaving Nablus, their cars came under fire from a Palestinian Authority police
    jeep. Five Israelis were injured in the attack and the nephew of Israeli Culture
    and Sport Minister Limor Livnat was killed.(The Jerusalem Post) (Ynet)
  - After the shooting, Ynet reports "Palestinian sources reported local Palestinian
    youths gathered around the Joseph Tomb's compound shortly after the incident and
    set it on fire." (Ynet) (The Jerusalem Post)
  Arab Spring:
  - 'Tunisian revolution: Thousands of people demonstrate in Tunis to demand both
    the resignation of interim prime minister Beji Caid el Sebsi, a link with the
    old guard brought down in January''s popular revolution, and the prosecution of
    Zine El Abidine Ben Ali, who fled to Saudi Arabia after being ousted, on charges
    such as murder and drug-trafficking. (Press TV)'
  - '2011 Syrian protests: Police and soldiers open fire from rooftops in Jabla, killing
    and injuring nearby people; no protest was taking place at the time. An independent
    investigation is urged into Friday''s massacre of close to 100 people as well
    as Saturday''s killings of mourners at the funerals. (BBC) (CNN) (Al Jazeera)'
  - '2011 Moroccan protests: Thousands of people participate in massive peaceful demonstrations
    against the government on streets across Morocco, calling for an end to corruption
    and torture. (Press TV) (Al Jazeera)'
  - '2011 Saudi Arabian protests: Amid demonstrations by the unemployed, women protesters
    gather to demand a vote but are defeated and rounded up by authorities. (Press
    TV)'
  - '2011 Yemeni protests: Mass protests continue nationwide in defiance of the Saleh
    regime''s claims the country''s leader is to soon resign from his 32-year rule;
    protesters demand his immediate removal from power. (BBC) (CNN) (Al Jazeera) (Press
    TV)'
  - '2011 Libyan civil war: Deaths continue to climb in the besieged Libyan city of
    Misrata, while Spanish photojournalist Manu Brabo telephones his parents from
    the military prison in which he is being held in Tripoli. (CNN) (BBC)'
  - '2011 Egyptian revolution: Hosni Mubarak, ousted from the presidency by popular
    revolution in February, is to be moved to a military hospital in Cairo amid pressure
    to have him stand trial over corruption and the killing of protesters. (BBC) (Press
    TV) (Al Jazeera)'
  Arts and culture:
  - Pope Benedict XVI blesses Easter Mass in Saint Peter's Square in Vatican City,
    calling for diplomacy and dialogue to bring ongoing events in Libya to a peaceful
    conclusion. (BBC)
  - Bahrain's Crown Prince Salman bin Hamad bin Isa Al Khalifa vows with "deep regret"
    not to attend Friday's wedding of Prince William and Catherine Middleton in the
    UK due to his preoccupation with a popular uprising among his own people against
    his father's long-running rule. (BBC) (Al Jazeera)
  Disasters:
  - At least 10 people are killed due to floods and landslides brought on by torrential
    rain in Rio Grande do Sul. (BBC)
  - A magnitude 6.2 earthquake hits southeastern Sulawesi in Indonesia. (Reuters Africa)
    (NPR)
  - Flooding on the Red River of the North forces the evacuation of the Roseau River
    Anishinabe First Nation community in Manitoba. (Winnipeg Sun)
  Politics and elections:
  - Vanuatu Prime Minister Sato Kilman is ousted in a vote of no confidence. Serge
    Vohor becomes the new Prime Minister of Vanuatu.
  - In the United Kingdom, Secretary of State for Energy and Climate Change Chris
    Huhne of Liberal Democrats threatens legal action over "untruths" told by Conservatives
    opposed to the Alternative Vote system as the country prepares to vote on the
    issue. (BBC)
  Scottish football:
  - UK police express relief after an Old Firm match between Celtic and Rangers plays
    out without descending into expected violence related to parcel bombs sent amid
    increasing sectarian tensions. (The New York Times) (The Irish Times) (The Guardian)
  - Celtic manager Neil Lennon is reported to the Strathclyde Police after making
    a gesture, but police announce they will not pursue the matter. (The Guardian)
