Date: '2011-07-30'
Source_URI: Portal:Current events/2011 July 30
Intelligence_Payload:
  Armed conflict and attacks:
  - At least thirteen people are killed when gunmen open fire at passengers near a
    bus stop in Quetta, Pakistan. (Xinhua)
  - Suspected Communist Party of the Philippines New People's Army forces attack a
    police station in Agusan del Sur killing a civilian and wounding two police officers.
    (Xinhua)
  Libyan Civil War:
  - (NATO claims to have destroyed three television distribution facilities in an
    airstrike on Tripoli, Libya. (NATO)
  Arts and culture:
  - Zara Phillips, granddaughter of Queen Elizabeth II, marries England rugby union
    international Mike Tindall in a ceremony at Canongate Kirk, Edinburgh, Scotland.
    (BBC)
  Disasters:
  - At least 17 people are killed in a fire at a shoe factory in the Vietnamese city
    of Hai Phong. (BBC)
  Law and crime:
  - News International phone hacking scandal
  - The Metropolitan Police launches Operation Tuleta to investigate allegations of
    computer hacking by News International journalists. (BBC)
  - The Mexican media reports that hitman José Antonio Acosta Hernández, associated
    with the La Línea gang, is arrested in Chihuahua in connection to killing United
    States consular official and murders at a Juarez birthday party. (El Paso Times)
  - Four people are shot and one killed after a George Clinton concert in the US city
    of Cleveland, Ohio. (19 Action News)
  Sports:
  - 'In mixed martial arts, Dan Henderson defeats fellow former Pride Fighting Championships
    title holder Fedor Emelianenko via knockout in the first round of their bout at
    Strikeforce: Fedor vs. Henderson. (Sherdog)'
  - In Round 19 of the Australian Football League season, defeats by a near-record
    186 points; the loss results in Dean Bailey being sacked as coach of the latter
    team the following day. The Australian
