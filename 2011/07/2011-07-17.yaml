Date: '2011-07-17'
Source_URI: Portal:Current events/2011 July 17
Intelligence_Payload:
  Armed conflict and attacks:
  - Arab Spring
  - '2011 Egyptian revolution: Ousted Egyptian leader Hosni Mubarak suffers stroke,
    falls into coma. (Haaretz) (ABC)'
  - '2011 Syrian uprising: Syrian forces mass in the east of the country near the
    Iraqi border where dozens of soldiers have defected. (New York Times)'
  - '2011 Syrian uprising: Troops storm a town near the border with Lebanon, rounding
    up more than 500 people. (Al Jazeera)'
  - '2011 Libyan civil war: NATO planes destroy a military storage facility and other
    targets on the outskirts of Tripoli. (Al Jazeera)'
  - '2011 Bahraini uprising: The Shia al-Wafiq opposition group quits national talks
    aimed at ending the political crisis in the country. (BBC)'
  Arts and entertainment:
  - Warner Bros. has reported that Harry Potter and the Deathly Hallows – Part 2,
    the final instalment of the Harry Potter film series has broken box office records,
    taking $92.1m (£57m) in North America on Friday, its opening day. (Box Office
    Mojo)
  Disasters:
  - The United Nations delivers aid to parts of Somalia controlled by al-Shabab militants
    for the first time since they ended the ban on food supplies. (BBC)
  - A passenger bus collides with a truck near Mashkovo in Russia's Tambov Oblast
    with at least 5 people dead and 17 injured. (UPI)
  - Mount Lokon, a volcano on Sulawesi in Indonesia erupts again sending ash 3,500
    metres in the air. (AFP via Google News)
  - Tropical Storm Bret forms off the coast of the Bahamas. (National Hurricane Centre)
  - At least two people are killed and 35 injured due to a bus crash on Interstate
    390 near the US town of Bath, New York. (Democrat and Chronicle)
  - At the conclusion of Ottawa Bluesfest, strong winds from a sudden thunderstorm
    cause one of the main stages to collapse at around 7:30 pm EDT, injuring three
    people. (The Toronto Star)
  Law and crime:
  - Crowds gather outside the jail in Orange County, Florida for the release of Casey
    Anthony who was recently cleared of murdering her daughter Caylee. (Fox News)
    (Reuters)
  Politics:
  - News International phone hacking scandal
  - British Home Secretary Theresa May will address MPs on Monday following revelations
    that the Metropolitan Police hired former News of the World deputy editor Neil
    Wallis to give PR advice. (BBC)
  - Rupert Murdoch's News Corporation takes out a second series of adverts in Britain's
    Sunday newspapers apologising for wrongdoing at the News of the World. (CNBC)
  - Former News International Chief Executive Rebekah Brooks is arrested by police
    investigating phone hacking and corruption at the organisation. (Sky News) (Mail
    Online) (BBC)
  - Metropolitan Police Commissioner Sir Paul Stephenson resigns over the phone hacking
    affair. (BBC)
  - Former Uruguayan dictator Juan María Bordaberry dies under house arrest for murders
    committed during his time in power. (AFP via Google News)
  - Voters in São Tomé and Príncipe go to the polls for a presidential election with
    a runoff election necessary with the leading candidate Pinto da Costa failing
    to achieve an absolute majority. (AFP via France 24)
  Sports:
  - Japan wins the FIFA Women's World Cup 2011 by beating the United States 3-2 in
    the Penalty Shootout. (NBC Sports), (Wall Street Journal)
  - Northern Ireland golfer Darren Clarke wins the 2011 Open Championship. (Herald-Sun)
