Date: '2011-07-24'
Source_URI: Portal:Current events/2011 July 24
Intelligence_Payload:
  Armed conflict and attacks:
  - A Thai military helicopter crashes near the Myanmar border, the third in a week,
    with three people feared dead in the latest crash. (AP via MSNBC)
  - A car bomb in the Yemeni port of Aden kills at least eight Army soldiers and wounds
    scores. (Canadian Press via Winnipeg Free Press)
  Arts and culture:
  - Japanese television switches totally to digital television from midday. (Japan
    Times)
  Politics:
  - Timothy Geithner, the United States Secretary of the Treasury, says that President
    Barack Obama will not invoke the United States Constitution to raise the debt
    ceiling unilaterally. The idea has been under consideration due to the 14th amendment
    requiring that "the validity of the public debt of the United States [...] shall
    not be questioned." (Reuters)
  - Democratic Party leaders call for the United States House Committee on Ethics
    to investigate claims that Rep David Wu of Oregon had sexually assaulted a teenager.
    (Washington Post)
  Sport:
  - The 2011 Tour de France finishes in Paris with cyclist Cadel Evans becoming the
    first Australian to win the event. (Herald Sun), (AP via France24)
  - Uruguay defeats Paraguay 3-0 in the finals of the 2011 Copa América, capturing
    their 15th title and becomes the nation with most Copa América titles. (AP via
    NBC Sports)
  Science:
  - The Tevatron collider near Chicago produces results similar to recent results
    from the Large Hadron Collider (LHC) in the on-going search for the Higgs Boson.
    (BBC News)
