Date: '2011-07-26'
Source_URI: Portal:Current events/2011 July 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Police in Norway begin naming the victims of the 2011 Norway attacks. (BBC)
  Business and economy:
  - The Reserve Bank of India increases interest rates to 8% in an effort to contain
    inflation which is currently at 9.44%. (BBC)
  - Britain's Trinity Mirror reviews its editorial guidelines in light of the News
    of the World phone hacking affair. (AP via Yahoo News)
  - U.S. Senator Al Franken of Minnesota, in a letter to the Justice Department and
    the Federal Communications Commission, demands that they block the effort of telephone
    giant AT&T to buy rival T-Mobile USA. (Reuters)
  Disasters:
  - A Moroccan military transport plane crashes into a mountain in the south of the
    country killing 78 of 81 on board. (BBC News) (Al Jazeera)
  International relations:
  - Senior North Korean diplomat Kim Kye Gwan heads to the United States for discussions
    on reopening the six-party talks on his country's nuclear weapons program. (Yonhap
    News)
  Law and crime:
  - Senegalese rapper and government critic Omar Toure is arrested. (BBC)
  - Sri Lankan police hunt for 20 local television actresses alleged to be part of
    a prostitution ring. (Xinhua)
  - A shootout at a prison in Ciudad Juárez, Mexico, leaves 17 dead. (Fox News)
  - David Cecil, an unemployed truck driver, is charged with hacking into Platform
    Networks's network. (Kansas City Star)(CBS News)(The Australian)
  Politics:
  - Nguyễn Tấn Dũng is re-elected Prime Minister of Vietnam. (Government Web Portal
    of Vietnam)
  - David Wu resigns as a member of the United States House of Representatives following
    allegations of an unwanted sexual encounter with an 18-year-old. (New York Times)
  - Luis Gutiérrez, an Illinois member of the United States House of Representatives,
    is arrested outside the White House in Washington, D.C., during protests calling
    for immigration reform. (Rollcall)
  Science:
  - A dog is discovered carrying the hendra virus in the Australian state of Queensland
    near the town of Beaudesert. It is the first time the virus has been detected
    in a species other than flying foxes, horses or humans. (AAP via News Limited)
