Date: '2011-07-31'
Source_URI: Portal:Current events/2011 July 31
Intelligence_Payload:
  Armed conflict and attacks:
  - At least 9 people including a suspect are killed and 28 others are injured in
    a knife attack in Kashgar, west Xinjiang, China, marking the second attack of
    the month in Xinjiang. (CRI) (Xinhua) (The Washington Post)
  Ramadan Massacre:
  - At least 121 people are killed in a Syrian Army tank raid on the town of Hama
    and over 150 people are reportedly killed across the country. (Al Jazeera), (Al-Jazeera),
    (Al-Arabiya)
  Disasters and accidents:
  - At least seven people drown after a collision between a pleasure boat and a barge
    in central Moscow, Russia. (The Moscow News) (The Jerusalem Post)
  - No-one was killed when a Caribbean Airlines Boeing 737 plane crashed and split
    in two at the Cheddi Jagan International Airport, Guyana (The Trinidad Guardian)
  Law and crime:
  - Mexican Federal Police say suspected cartel leader José Antonio Acosta Hernández,
    who was arrested on Friday, has confessed to ordering the murder of 1,500 people
    in the country's northern state of Chihuahua. (BBC)
  Politics:
  - 2011 U.S. debt ceiling crisis
  - The Senate of the United States fails to pass legislation lifting the debt ceiling
    with compromise talks continuing. (CNN), (New York Times)
  - Barack Obama, the President of the United States, and Congressional leaders reach
    a deal on extending the debt ceiling. (Economic Times), (Washington Post)
