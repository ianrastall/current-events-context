Date: '2011-07-27'
Source_URI: Portal:Current events/2011 July 27
Intelligence_Payload:
  Armed conflict and attacks:
  - 2011 Norway attacks
  - Norwegian police start releasing the names of the victims of the 2011 Norway attacks.
    (AP via News Limited)
  - The Prime Minister of Norway Jens Stoltenberg promises to set up a security review.
    (Reuters via France 24)
  - NATO intervenes in the border clashes between Kosovo and Serbia. (BBC News)
  War in Afghanistan (2001–2021):
  - Ghulam Haidar Hameedi, mayor of Kandahar, is killed in a suicide bombing. (AFP
    via Gulf News)
  Business and economy:
  - The Australian dollar reaches a post-float record against the United States dollar
    based on higher than expected consumer price index figures and concerns over a
    US default. (AAP via Yahoo Finance)
  Disasters:
  - Seventeen people are killed in landslides in South Korea caused by heavy rain
    including eight in the town of Chuncheon. (Yonhap) (AP)
  - The United Nations World Food Programme prepares an airlift to Mogadishu in Somalia
    to help relieve the 2011 Horn of Africa famine. (AFP via France24)
  - At least seventeen people are dead and 25 missing after Severe Tropical Storm
    Nock-ten (Juaning) hits the Philippines. (Xinhua)
  - A tropical storm watch is issued for Tropical Storm Don in the US state of Texas
    between Port Mansfield north to San Luis Pass. (National Hurricane Centre), (AP
    via Houston Chronicle)
  International relations:
  - The Government of the United Kingdom expels Libyan diplomats loyal to Muammar
    Gaddafi from the United Kingdom and recognises the National Transitional Council.
    (The Globe and Mail)
  Law and crime:
  - The Israeli army arrests two men involved in running the Freedom Theatre founded
    in Jenin by murdered Israeli actor Juliano Mer-Khamis. (Ma'an) (Ynet)
  - An unruly crowd riots on Hollywood Boulevard outside Grauman's Chinese Theatre
    in Hollywood, California after being refused admission to a documentary on the
    Electric Daisy Carnival. (CBS Los Angeles), (NBC Los Angeles)
  - Two men are convicted in St John's, Antigua of the 2008 murders of British honeymoon
    couple Ben and Catherine Mullany. (The Telegraph)
  - News International phone hacking scandal
  - Former Daily Mirror editor Piers Morgan says comments he made in 2009 on BBC Radio
    4's Desert Island Discs do not suggest he printed stories obtained through illegal
    reporting. In the programme, he had spoken of "running the results" of work by
    third parties who did "rake through bins... tap people's phones". (BBC)
  - An 18 year old man in the Shetland Islands of Scotland is arrested on suspicion
    of launching multiple distributed denial of service attacks in association with
    LulzSec and Anonymous. (BCC)
  Politics:
  - Republicans in the United States House of Representatives announce they will delay
    a vote on extending the debt ceiling until Thursday due to concerns over level
    of proposed savings not being sufficient. (Washington Post)
  - Spanish protesters known as the "Indignants" begin a march from Madrid to Brussels
    in Belgium to protest at cuts in government expenditure in Spain. (BBC)
