Date: '2011-07-23'
Source_URI: Portal:Current events/2011 July 23
Intelligence_Payload:
  Armed conflict and attacks:
  - '2011 Norway attacks: The death toll from the shootings on Utøya and bombing in
    Oslo reaches at least 92. (BBC) (AP via MSNBC)'
  - Anders Behring Breivik, the man arrested in connection with terrorism in Norway,
    reveals himself as to have anti-Muslim and right-wing extremist views, stating
    that the attacks were "atrocious, but necessary." (Dokument) (Dagbladet) (Daily
    Mail)
  - '2011 Syrian uprising: The United Nations says Syrian forces may have committed
    crimes against humanity amid the ongoing protests. (Capital FM Kenya) (Times of
    Oman)'
  - '2011 Libyan civil war: Rebels claim to have fired rockets at a meeting of senior
    Gaddafi-regime officials in the capital Tripoli. (Al Jazeera)'
  - '2011 Mumbai bombings: The death toll from the attacks rises to 22. (AFP via Google
    News) (Times of India)'
  - Gatluak Gai, a key South Sudanese rebel leader who signed a peace deal with the
    Sudanese government this week, is killed. (BBC)
  Arts and entertainment:
  - English singer Amy Winehouse, 27, is found dead at her London home. (BBC) (News24)
  Business and economy:
  - Workers at the Escondida copper mine in northern Chile vote to continue a strike
    for a second day. (AFP via France24)
  Disasters:
  - Two CRH bullet trains collide in near Wenzhou, Zhejiang province, China, killing
    at least 35. (AFP via Google News) (VoA) (Xinhuanet.com) (New York Times)
  - 2011 Horn of Africa famine
  - Unicef states that a child dies from malnutrition every six minutes (250 a day)
    in Somalia. (The Sun)
  - Somalia's Prime Minister Abdiweli Mohamed Ali accuses al-Shabab of preventing
    people from leaving the region in search of food as central government condemns
    militants from blocking aid workers. (Voice of America)
  International relations:
  - Kim Sung-hwan, the South Korean Minister for Foreign Affairs, meets with Pak Ui-chun,
    his North Korean counterpart, on the sidelines of an ASEAN meeting in Bali, Indonesia.
    (Yonhap)
  Law and crime:
  - Asylum seekers at the Scherger Immigration Detention Centre near Weipa in the
    Australian state of Queensland start harming themselves in protest. (AAP via Sydney
    Morning Herald)
  - News International phone hacking scandal
  - Claims of phone hacking at the Daily Mirror and other Trinity Mirror publications
    are made by former Mirror journalist James Hipwell. (The Independent) (BBC) (The
    Guardian)
  - A gunman fatally shoots six people, including himself, and wounds four others
    in a shooting in Grand Prairie, Texas. (The Guardian)
  - Daryoush Rezaei, an Iranian scientist, is shot dead outside his home in Tehran.
    It was reported that the scientist had links to the country's nuclear programme.
    (BBC)
  Politics:
  - Nearly 4,000 employees of the US Federal Aviation Administration are furloughed
    due to Congressional authorisation for its programs lapsing. (FAA)
  - Voters in Sri Lanka go to the polls for local elections, with one person dying
    in clashes between supporters of rival parties in the Anuradhapura district. (BBC)
  - Voters in Latvia go to the polls for the Latvian parliamentary dissolution referendum
    with 95 per cent of voters supporting dissolution of the Saeima. (AP)
  - General John M. Shalikashvili, a Polish-American former Chairman of the Joint
    Chiefs of Staff under President Bill Clinton during the Post-Cold War years and
    the Bosnian conflicts who had suffered a major stroke several years ago, dies.
  - South Vietnamese premier and general Nguyễn Cao Kỳ dies at age 80 in Kuala Lumpur,
    Malaysia.
  Science:
  - CERN's Large Hadron Collider (LHC) produces notable fluctuations in search for
    Higgs Boson particle. (BBC News)
  Sport:
  - Australian cyclist Cadel Evans wins the right to wear the yellow jersey on the
    final stage of the 2011 Tour de France. (News Limited)
  - The world footballing body FIFA bans former presidential candidate Mohamed Bin
    Hammam for life over claims he tried to buy presidential votes. (BBC)
