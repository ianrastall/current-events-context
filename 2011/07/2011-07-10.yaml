Date: '2011-07-10'
Source_URI: Portal:Current events/2011 July 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Bangladeshi police fire tear gas at Islamist activists trying to enforce a general
    strike in the town of Keraniganj with dozens hurt in the riots. (AP via Washington
    Post), (Reuters)
  War in Afghanistan (2001–2021):
  - Three NATO service members are killed in separate attacks in Afghanistan. (AP
    via Washington Post)
  Business and economy:
  - News International
  - The final edition of the News of the World is published in the United Kingdom.
    (The Guardian)
  - The Government of the United Kingdom looks for ways to stop News International
    taking over BSkyB as evidence emerges that senior executives mounted a cover-up
    of the News of the World phone hacking affair. (The Independent)
  Disasters:
  - A strong earthquake of 7.1 magnitude occurs off the coast of Honshu in Japan sparking
    a tsunami warning. (AP via Washington Post)
  - A fire in a retirement home in the village of Beloye in the western Ukraine kills
    16 people. (RIA Novosti)
  - A hundred people are injured as the Kalka Mail is derailed near the town of Fathepur
    Malwa in the Indian state of Uttar Pradesh. (IBN Live)
  - The cruise ship Bulgaria sinks in the Volga River near Bolgar, Russia. At least
    110 of the 196 on board go down with the ship and drown, while 80 were rescued
    alive. (BBC Europe)
  Law and crime:
  - Twenty prisoners escape from a jail in the town of Tumaco in Colombia's Nariño
    Department with three people recaptured. (BBC)
  Politics:
  - The Prime Minister of Australia Julia Gillard announces the details of a plan
    to introduce a carbon tax. (Sydney Morning Herald)
  - Pro-Palestinian activists begin a week of protests on the West Bank. (Jerusalem
    Post)
  Sports:
  - In association football, Mexico wins the 2011 FIFA U-17 World Cup, defeating Uruguay
    2–0 at Estadio Azteca in Mexico City. (Official FIFA U-17 World Cup Website)
