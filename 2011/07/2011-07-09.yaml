Date: '2011-07-09'
Source_URI: Portal:Current events/2011 July 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Syrian uprising: Human Rights Watch issues a report claiming that Syrian
    Army soldiers have been issued orders to shoot protesters participating in demonstrations.
    (AP via MSNBC)'
  - Argentine singer-songwriter Facundo Cabral is assassinated in an apparent ambush
    in Guatemala City. (BBC)
  Business and economy:
  - Inflation in China rises to its highest level in three years. (Reuters) (Xinhua)
  - A Milan court orders Fininvest, Prime Minister of Italy Silvio Berlusconi's family
    company, to pay 560 million euros in damages to Compagnie Industriali Riunite
    in a long running legal dispute. (Dow Jones via Wall Street Journal)
  International relations:
  - South Sudan secedes from Sudan, becoming a sovereign state. (Los Angeles Times)
  Politics:
  - Malaysian police fire tear gas and arrest hundreds of people as more than 20,000
    people march in the 2011 Bersih 2.0 rally demanding electoral reform in Kuala
    Lumpur. (Bloomberg via Business Week) (AP via Seattle Post-Intelligencer) (BBC)
  Sport:
  - The Queensland Reds of Australia defeats the Canterbury Crusaders of New Zealand
    18-13 to win the Super Rugby championship. (The Roar)
  - Derek Jeter, shortstop for the New York Yankees, becomes the 28th member of the
    3,000 hit club in Major League Baseball history by means of a home run off David
    Price of the Tampa Bay Rays. (The New York Times)
