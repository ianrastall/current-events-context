Date: '2011-05-30'
Source_URI: Portal:Current events/2011 May 30
Intelligence_Payload:
  Armed conflict and attacks:
  - An explosion at an army barrack in northern Nigeria kills 12 people. (Reuters)
  - Documents discovered in a Russian archive suggest that Adolf Hitler ordered Rudolf
    Hess to go to the United Kingdom to negotiate with Winston Churchill over a World
    War II peace deal in 1941. (The Scotsman)
  War in Afghanistan (2001–2021):
  - United States Marine Corps General John Toolan issues a statement apologising
    for the deaths of nine Afghan civilians in a NATO bombing raid on behalf of himself,
    General David Petraeus and Lieutenant General David Rodriguez. (AAP via Herald-Sun),
    (Sky News Australia)
  - Taliban insurgents including suicide bombers attack a NATO base in Herat. (Reuters
    via MSNBC)
  Arab Spring:
  - '2011 Syrian uprising: 11 people are killed and scores injured in a military crackdown
    on protests. (Al Arabiya)'
  - '2011 Yemeni uprising: Four Yemeni army soldiers are killed and dozens injured
    in an ambush while travelling to the al Qaeda held city of Zinjibar. (Reuters)'
  - '2011 Yemeni uprising: Yemeni security forces kill at least 20 people in the city
    of Taiz. (BBC)'
  - '2011 Libyan civil war: Al Jazeera captures "western troops on the ground" in
    Libya, the first time this has been confirmed. (The Guardian)'
  2011 Spanish protests:
  - Thousands of anti-government demonstrators vote to continue a mass sit-in against
    economic cuts in Madrid, following last Friday's targeting of civilians in Barcelona
    by police with batons and rubber bullets. (BBC) (iAfrica)
  Business and economy:
  - Germany's ruling coalition led by Chancellor Angela Merkel pledges to end all
    nuclear power by 2022. (BBC)
  - The Development Bank of Japan announces plans to establish a 50 billion yen fund
    to assist auto parts manufacturers hurt by the 2011 Tōhoku earthquake and tsunami.
    (Daily Yomiuri)
  Disasters:
  - The death toll from an E. coli outbreak in Germany rises to 14 as it spreads to
    other parts of northern Europe. (Reuters via MSNBC)
  - The Associated Press claims that an unreleased U.S. Agency for International Development
    report claims that the death toll from the 2010 Haiti earthquake was much less
    than claimed by the Government of Haiti. (AP via Washington Post)
  - At least 26 people die following a bus crash near Guwahati, the capital of India's
    Assam state. (AP via San Francisco Chronicle)
  Law and crime:
  - Eun Jin-soo, a former aide to the President of South Korea Lee Myung-bak, is arrested
    on bribery charges. (Yonhap)
  - A human rights advocate claims that Saudi Arabia has released Manal al-Sherif,
    detained for breaking the law against women drivers. (AP via Huffington Post)
  - The sons of former President of Egypt Hosni Mubarak, Alaa Mubarak and Jamal Mubarak,
    are detained in custody for another 15 days over accumulating wealth by unfair
    means. (Al-Arabiya)
  Politics:
  - A Han Chinese man is to face trial for the killing of a Mongolian man, amid a
    crackdown on ethnic protests in the Inner Mongolia region of China. (AP via Google
    News)
  - Voters in Italian cities including Milan and Naples go to the polls for the second
    round of local government elections with candidates supported by Prime Minister
    Silvio Berlusconi losing in both cities. (BBC), (Voice of America)(Bloomberg BusinessWeek)
  Science:
  - Space Shuttle Endeavour undocks from the International Space Station to return
    to earth on its final mission. (MSNBC)
  Sport:
  - Ohio State football head coach Jim Tressel resigns amidst a scandal over NCAA
    rules violations committed by him and members of the team. (ESPN)
