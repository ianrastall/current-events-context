Date: '2011-05-22'
Source_URI: Portal:Current events/2011 May 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Libyan civil war: NATO warplanes attack the port of Tripoli and the residence
    of Libyan leader Muammar Gaddafi. (AFP via France 24)'
  - Gunmen wearing explosive suicide vests storm a government building in Khost, Afghanistan.
    (AP via Forbes)
  - A series of bomb attacks around the Iraqi capital of Baghdad kills at least 18
    people, including 7 policemen. (AFP via ABC News Australia)
  - African Union and Somali troops advance on Mogadishu's Bakara market, a rebel-held
    area, amid intense fighting. (Reuters)
  - Three explosions rock a Pakistan Air Force base in the southern city of Karachi.
    (AP via Yahoo! News)
  - The UK's military operation in Iraq will officially end at midnight, after the
    Royal Navy completes its training of Iraqi sailors. (BBC)
  - The Taliban warn that Kazakhstan's decision to send troops to Afghanistan will
    have "severe consequences". (Trend News Agency)
  2011 Yemen protests:
  - Yemeni President Ali Abdullah Saleh reportedly refuses to sign a Gulf-brokered
    accord allowing him to resign within 30 days in exchange for immunity; the opposition
    signed the deal yesterday. (BBC) (Al Jazeera)
  - The embassy of the United Arab Emirates is attacked in the capital Sana'a as it
    holds a meeting of Arab and Western mediators leading to an evacuation by helicopter.
    (AFP via Google News), (CNN)
  Sudanese seizure of Abyei:
  - South Sudan says the capture of the disputed Abyei region is a "declaration of
    war". (Arab News)
  - The United Nations Security Council calls on Sudan to withdraw its forces. (Reuters)
  Arts and culture:
  - The Tree of Life, directed by Terrence Malick and starring Brad Pitt, wins the
    Palme d'Or at the 2011 Cannes Film Festival. (Bloomberg)
  - The BBC television series Sherlock wins two prizes at the 2011 British Academy
    Television Awards ceremony in London, including best drama series. (BBC)
  - The infamous hat worn by Princess Beatrice at the 2011 Royal Wedding has been
    sold on auction site eBay for £81,100.01. Funds raised from the sale will go to
    the charities UNICEF and Children in Crisis. (BBC)
  Business and economy:
  - US company Jimmy Choo is sold to private equity firm Labelux for $800 million.
    (New York Times)
  Disasters:
  - The Government of Iceland imposes a flight ban, following the eruption of Iceland's
    most active volcano, Grímsvötn. (BBC)
  Tornado outbreak sequence of May 21–26, 2011 in the Central United States:
  - Tornados hit the city of Minneapolis, Minnesota, damaging scores of homes and
    killing at least one person. (AP via Saint Cloud Times) (Minneapolis Star-Tribune)
  - A curfew is introduced in Minneapolis following reports of looting and gunfire.
    (Fox Twin Cities)
  - The city of Joplin, Missouri, is hit by a tornado, causing "major damage" in the
    downtown area and at least 30 fatalities. (News Leader), (CNN), (News Leader),
    (Reuters via Yahoo News)
  - Jay Nixon, the Governor of Missouri, declares a state of emergency in the state
    following the Joplin tornado and activates the Missouri National Guard. (Missouri
    Governor)
  - Patients are evacuated from St John's Regional Medical Centre in Joplin due to
    damage caused by the tornado. (News-Leader)
  - Tornado warnings were posted in states from Texas to Michigan. (AP)
  - Interstate 44 is closed near Joplin after the tornado hit. (News Leader)
  International relations:
  - The Prime Minister of Japan Naoto Kan, the Premier of China Wen Jiabao and the
    President of South Korea Lee Myung Bak meet in Japan and agree to improve cooperation
    on nuclear and economic issues. (Bloomberg via San Francisco Chronicle)
  Law and crime:
  - Hamid Baqai, the Chief of Staff of the Iranian President, is banned from public
    office for four years, after it was exposed that he was involved in a multi-million
    dollar embezzlement during the construction of a building on Kish Island in 2010.
    (NCR)
  - Scottish newspaper The Sunday Herald names a footballer accused of being linked
    to a privacy superinjunction by users of social networking website Twitter, arguing
    that the injunction is only enforceable under English law and does not apply in
    Scots law. (BBC)
  - The Attorney General for England and Wales is being asked to consider prosecuting
    a journalist who allegedly broke a privacy order on Twitter in respect of another
    footballer who has taken out an injunction. (BBC)
  Politics and elections:
  - Voters in Vietnam go to the polls for a parliamentary election. (AP via Google
    News)
  - Voters in Cyprus go to the polls for a parliamentary election. (BBC)
  - 20,000 people attend an anti-nuclear rally in Switzerland. (Swiss Info)
  - Police officers from more than 40 forces unveil plans for protests against funding
    cuts authorised by the British government, including a "national day of action"
    in July. (The Observer)
  - In local and regional elections in Spain, the conservative People's Party performs
    well, while the ruling Socialist Party suffers heavy losses. (Bloomberg)
  - Tim Pawlenty, ex-Governor of Minnesota, announces his candidacy for the Republican
    nomination as President of the United States. (Tim Pawlenty)
  2011 Georgian protests:
  - Approximately 10,000 protesters march in Tbilisi and Batumi calling for early
    elections and the ouster of President Mikhail Saakashvili. (Al Arabiya)
  - Georgian protesters and police reportedly clash in Tbilisi. (Bloomberg News)
  - Protesters reportedly attack a government-controlled television building in the
    western city of Batumi. (Reuters Africa)
  2011 Spanish protests:
  - People continue to peacefully protest against cuts and unemployment in cities
    across Spain as the country votes in regional elections; the number of participants
    increases despite a government ban on such occurrences. (BBC)
