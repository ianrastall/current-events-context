Date: '2011-05-28'
Source_URI: Portal:Current events/2011 May 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Libyan civil war: Fresh explosions are heard in the Libyan capital Tripoli
    as NATO bombing continues. (Al Jazeera)'
  - '2011 Egyptian revolution: Ousted President of Egypt Hosni Mubarak receives the
    first ruling against him, being fined US$34 million for cutting off communications
    services during the revolution that overthrew him. (BBC)'
  - The Department of Homeland Security advises that the United States Department
    of Defense's largest supplier Lockheed Martin has been hit by hackers. (Reuters
    via MSNBC)
  Disasters and accidents:
  - 39 people are injured after an express train derails and catches fire in a tunnel
    on Hokkaido, Japan. (AFP via Google News)
  - At least 10 people in Germany die after eating cucumbers infected with E. coli.
    (BBC)
  International relations:
  - Vietnam accuses the People's Republic of China of "violating" its sovereignty
    after Chinese ships damaged a Petrovietnam boat in the disputed Spratly Islands.
    (Channel NewsAsia)
  - North Korea releases Eddie Jun, a United States citizen who was held in custody
    for half a year. (The Chosun Ilbo)
  Politics:
  - Martial law is declared in the city of Xilinhot, Inner Mongolia, China after days
    of protests. (CNN) (Pakistan Daily Times)
  - Protesting indigenous people take over half of the city of Puno in south-eastern
    Peru, demanding an end to a Canadian mining project. (BBC)
  - Malta votes on the introduction of divorce. (Times of Malta)
  Sport:
  - FC Barcelona wins the 2010-11 UEFA Champions League beating Manchester United
    F.C. 3-1 in the 2011 UEFA Champions League Final. (AP via MSNBC)
  - Chennai Super Kings beats Royal Challengers Bangalore in the final of 2011 Indian
    Premier League.
  - Mohamed Bin Hammam withdraws from the race to be President of FIFA as a result
    of bribery allegations. (Sky News)
