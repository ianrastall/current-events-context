Date: '2011-11-01'
Source_URI: Portal:Current events/2011 November 1
Intelligence_Payload:
  Arts and culture:
  - The President of the United States, Barack Obama, makes Fort Monroe in Hampton,
    Virginia, a National Monument. (Reuters)
  Business and economy:
  - The FBI and U.S. Securities and Exchange Commission launch an investigation into
    MF Global after $600 million of customers' money went missing. (CNN)
  - The Palestinian Authority is hit by hackers disrupting Palestinian internet and
    mobile phone services. A link has been suggested to Palestine's UNESCO bid. (Reuters)
    (Jerusalem Post)
  - The United Kingdom Office for National Statistics releases GDP figures indicating
    growth of 0.5% compared to a 0.1% figure in the previous quarter. (BBC)
  Disasters:
  - Over 1.5 million people are still without power and four states declare a state
    of emergency after a nor'easter hits the Eastern United States. (CNN)
  - LOT Polish Airlines Flight 016 makes a successful emergency landing at Warsaw
    Chopin Airport. (CNN)
  - At least seven people are killed and 200 injured following an explosion caused
    by two trucks carrying explosives crashing in Fuquan City in China's Guizhou Province.
    (CNN)
  - A boat carrying 70 asylum seekers en route to Australia sinks off the coast of
    Java in Indonesia with eight confirmed deaths and fifteen people missing. (AAP
    via The Melbourne Age)
  International relations:
  - Almazbek Atambayev, the newly elected President of Kyrgyzstan, states that a lease
    for a United States air base in Manas will not be renewed when it expires in 2014.
    (AP via Washington Post)
  Politics:
  - At least twelve people are arrested in London outside the Parliament of the United
    Kingdom after a protest against anti-squatting legislation turns violent. (BBC)
  - The City of London Corporation pauses its legal action against Occupy London protesters
    outside St Paul's Cathedral after the church halted its own action and expressed
    a wish to enter into dialogue with the demonstrators. (BBC)
  Science:
  - China launches the unmanned Shenzhou 8 spacecraft, intending to robotically dock
    it with the orbiting Tiangong 1 space station module. If successful, the mission
    will mark China's first orbital docking, and will be a major milestone in its
    efforts to construct a full-scale space station. (BBC)
  Sports:
  - In horse racing, French horse Dunaden wins the 2011 Melbourne Cup. (ABC News Australia)
