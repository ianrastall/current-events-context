Date: '2011-11-23'
Source_URI: Portal:Current events/2011 November 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Egypt protests: Violent anti-regime protests enter their fifth day in Cairo''s
    Tahrir Square, with 35 people killed and over 3,200 injured to date in clashes
    between protesters and security forces. (CNN)'
  Disasters:
  - Six people, including three children, are killed in an air crash in the Superstition
    Mountains in the U.S. state of Arizona. (Sydney Morning Herald)
  International relations:
  - The United States announces that it will stop observing the 1990 Treaty on Conventional
    Armed Forces in Europe. The decision comes four years after Russia withdrew compliance
    from the treaty. (Spacewar)
  - In a warning to Syrian President Bashar al-Assad to step down, Turkish Prime Minister
    Recep Tayyip Erdoğan calls al-Assad's ongoing crackdown on protests cowardice,
    comparing al-Assad to past dictators such as Adolf Hitler and Muammar Gaddafi.
    (CNN)
  - Yemeni president Ali Abdullah Saleh legally agrees to step down. (The Guardian)
  Science:
  - The European Space Agency claims to have made contact with Russia's stranded Fobos-Grunt
    probe, two days after the closure of the spacecraft's window for launch to Mars.
    (Discovery.com)
  Sports:
  - Uzbek midfielder Server Djeparov is named Asian Footballer of the Year for the
    second time, in a ceremony held at the Asian Football Confederation headquarters.
    (Goal.com)
