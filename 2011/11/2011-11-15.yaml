Date: '2011-11-15'
Source_URI: Portal:Current events/2011 November 15
Intelligence_Payload:
  Armed conflict and attacks:
  - A suspected drone attack in Pakistan's North Waziristan province kills six militants.
    (BBC)
  - The New York Police Department evicts Occupy Wall Street protesters from Zuccotti
    Park. (ABC)
  - Following months of violent protests against his 33-year rule, Yemen's President
    Ali Abdullah Saleh says he will leave office "within 90 days" of an agreement
    regarding elections with the regional Gulf Cooperation Council.(CNN)
  Syrian uprising:
  - After a meeting with Russian officials in Moscow, the opposition Syrian National
    Council calls for UN peacekeepers to be introduced into Syria. (CNN)
  - Pressure is applied to the Syrian government from many sides as Turkey threatens
    to cut electricity to its southern neighbor, while the European Union increases
    sanctions on the regime. (CNN)
  - The Jordanian embassy in Damascus is attacked after Jordan’s King Abdullah II
    criticizes the violent crackdown on protesters and calls for Syrian President
    Bashar al-Assad to step down. (ABC-Australia) (The Washington Post)
  International relations:
  - Following several acts of self-immolation by Tibetans in Tibet, exiled Tibetans
    in India urge the Chinese government to end its repressive policies restricting
    the religious freedom of Tibetans. (The Tibet Post)
  Law and crime:
  - Chinese artist Ai Weiwei pays 8.45 million yuan in taxes after receiving a large
    number of donations from supporters who believe the debt was politically motivated
    because of his criticism of the Chinese government. (CNN)
  - Police in the English city of Birmingham arrest four men in the Sparkhill district
    in a major anti-terrorism operation. (BBC)
  Politics:
  - The first Gas Summit of the Gas Exporting Countries Forum opens in Doha. (Gulf
    Times) (AFP) (Trend News Agency)
  - Nauru swears in its third President in less than a week, as President Freddie
    Pitcher, in office for just six days, is ousted in a 9-8 vote of no confidence.
    Sprent Dabwido is sworn in as the new president. (Sydney Morning Herald)
  - The New York Police Department clears Occupy Wall Street protesters from Zuccotti
    Park. (New York Times)
  - Negotiators from the United States Senate and House of Representatives reach a
    partial budget agreement. (Federal Times)
