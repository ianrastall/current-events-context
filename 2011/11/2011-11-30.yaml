Date: '2011-11-30'
Source_URI: Portal:Current events/2011 November 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - A mass shooting occurs in east Texas, United States. Four children are killed,
    all less than 5 years old. (CNN)
  Business and economy:
  - Up to two million public sector workers in the United Kingdom commence a 24-hour
    strike over pension reforms, affecting schools, hospitals, airports, ports and
    government offices nationwide. (BBC)
  Law and crime:
  - It is announced that Laurent Gbagbo, the former President of Côte d'Ivoire, has
    been transferred to the International Criminal Court in The Hague, Netherlands,
    to face trial for crimes against humanity. (CNN)
  International relations:
  - United States Secretary of State Hillary Clinton arrives in Burma to urge political
    reforms. (Reuters)
  2011 attack on British embassy in Iran:
  - The Iranian Foreign Ministry calls the attacks "unacceptable", stating that they
    happened despite the efforts of the embassy guards. Police arrest 12 protesters
    in connection with the attacks. (Fars News)
  - Speaker of the Iranian Parliament Ali Larijani claims that the students represent
    Iran's public opinion, and attacks Britain. (Fars News)
  Science:
  - Researchers at Washington State University develop an artificial bone "scaffold"
    which can be produced using 3D printers, potentially allowing doctors to quickly
    print replacement bone tissue for injured patients. (BBC)
