Date: '2011-11-08'
Source_URI: Portal:Current events/2011 November 8
Intelligence_Payload:
  2011 Syrian uprising:
  - The Syrian government continues its crackdown on protesters and army defectors
    in the city of Homs, killing dozens of civilians in the process. (Al Jazeera)
  - The United Nations reports that the death toll of the eight-month-old Syrian uprising
    has reached 3,500. (BBC)
  Business and economy:
  - Russia starts commercial natural gas deliveries to Central Europe via the Nord
    Stream, the world's longest submerged pipeline. (The Local)
  - A record number of Americans — 49.1 million — are living below the poverty line,
    based on a new census measure. (Washington Post)
  Disasters:
  - Flooding in Thailand reaches the residence of the Prime Minister Yingluck Shinawatra
    in Bangkok, forcing her to withdraw from the Hawaii APEC summit to deal with the
    crisis. (Bangkok Post) (Reuters)
  - At least 16 people are killed in a stampede during a religious festival in the
    Indian city of Haridwar, Uttarakhand. (CNN)
  - A British Red Arrows pilot dies after being accidentally ejected from his BAE
    Hawk jet aircraft while on the ground at RAF Scampton in Lincolnshire. (The Telegraph)
  International relations:
  - The International Atomic Energy Agency releases a report that says that Iran has
    carried out activities relevant to the development of a nuclear device, and that
    the project may still be under way. (The New York Times) (CNN)
  - Human rights groups send an open letter to the President of the People's Republic
    of China, Hu Jintao, pressing the Chinese government to address the underlying
    causes of protests that have led 11 Tibetans to set themselves on fire since March.
    (The Tibetan Post)
  - Journalists report comments by French President Nicolas Sarkozy to US President
    Barack Obama at the G20 summit in Cannes, in which Sarkozy called Israeli Prime
    Minister Benjamin Netanyahu a "liar". (BBC)
  Politics and elections:
  - The Australian Senate votes to introduce a controversial carbon tax, a form of
    carbon pricing. (The West Australian via Yahoo! 7 News)
  - Voters in Liberia go to the polls for the second round of a presidential election,
    with the incumbent President, Ellen Johnson Sirleaf, likely to be re-elected.
    (Wall Street Journal)
  - Voters in the United States vote in state, municipal, and local elections.
  - Brodie Clark, head of the UK Border Agency, resigns after saying that comments
    made by Home Secretary Theresa May amounted to "constructive dismissal", and states
    that he will launch legal proceedings against the government. (BBC)
  Resignation of Silvio Berlusconi:
  - Prime Minister of Italy Silvio Berlusconi narrowly wins a key budget vote in the
    Italian Parliament, but loses his parliamentary absolute majority as both allied
    and opposition politicians call on him to resign. (Reuters)
  - Berlusconi announces that he will resign after the parliament passes a budget
    law. (Reuters)
  - Democratic Governor Steve Beshear is re-elected Governor of Kentucky. (CNN)
  - Republican Phil Bryant is elected Governor of Mississippi. (Jackson Clarion Ledger)
  - Democrat Jonathan Rothschild is elected Mayor of Tucson, Arizona. (Tucson Sentinel)
  - Democrat Greg Stanton is elected Mayor of Phoenix, Arizona, in a runoff election.
    (Ahwatukee Foothills News)
  Science:
  - NASA observes the asteroid YU55 as it makes a close Earth flyby, passing within
    0.85 lunar distances (about 201,700 miles) of the Earth. YU55 is approximately
    across, and is the largest asteroid to make a close pass since 1976. (BBC) (WSJ)
    (SLOOH)
  - A Scottish-designed bionic leg exoskeleton, designed to allow handicapped people
    to walk, is approved for sale in the United Kingdom. (BBC)
  Sports:
  - Indian cricketer Sachin Tendulkar becomes the first player in history to score
    15,000 Test runs. (The Guardian)
