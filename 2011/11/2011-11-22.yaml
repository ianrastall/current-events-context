Date: '2011-11-22'
Source_URI: Portal:Current events/2011 November 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Egyptian revolution: Three American University in Cairo students are arrested
    after throwing firebombs at security forces amid ongoing protests in Cairo, Egypt.
    (CBS News)'
  Business and economy:
  - Multinational public transport company Arriva wins a major public bus and rail
    transport contract in Stockholm, Sweden. (Stockholm Transit – in Swedish)
  Politics and elections:
  - Darren Scully, the mayor of the Irish town of Naas, resigns after the latest in
    a series of scandals, having made radio comments about the "aggressive attitude"
    of "black Africans". A police investigation into his actions is underway. (RTE
    News) (Daily Mail) (Irish Times)
  Science:
  - Scientists discover Bulbophyllum nocturnum, the first orchid known to flower at
    night, in New Britain off the coast of Papua New Guinea. (BBC)
  - American evolutionary biologist Lynn Margulis dies aged 73. (National Center for
    Science Education)
