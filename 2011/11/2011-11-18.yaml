Date: '2011-11-18'
Source_URI: Portal:Current events/2011 November 18
Intelligence_Payload:
  Uncategorized:
  - Hewlett-Packard adds Ralph Whitworth of Relational Investors, the corporate-governance
    activists—to its board of directors. (Bloomberg)
  - Former President of the Philippines Gloria Macapagal-Arroyo is arrested over charges
    of electoral fraud. (BBC)
  - A verdict is due in the trial of former Commander of the Sri Lankan Army, Sarath
    Fonseka, on charges of "spreading disaffection". (BBC)
  - The Los Angeles County Sheriff's Department reopens its investigation into the
    death of film star Natalie Wood after receiving fresh information. Wood drowned
    off the coast of California in 1981. (BBC)
  - The video game, Minecraft, officially releases.
