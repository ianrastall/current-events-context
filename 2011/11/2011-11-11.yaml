Date: '2011-11-11'
Source_URI: Portal:Current events/2011 November 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - An armed hijacker claiming to have a bomb takes control of a ferry on the Sea
    of Marmara near the Turkish port of Izmit but is later killed by the Turkish military.
    (AP via Google) (Jerusalem Post)
  Arab Spring:
  - '2011 Syrian uprising: 250 Syrians, mostly civilians, have been killed so far
    this month, as the violence escalates in Syria''s eight-month-old crackdown on
    pro-democracy protests and attacks on security forces increase. (CBC) (MSNBC)'
  - '2011 Yemeni uprising: At least seven people die after forces loyal to the President
    of Yemen Ali Abdullah Saleh shell the city of Taez. A further 32 were injured.
    (Al-Arabiya) (CNN)'
  Arts and culture:
  - First-person shooter video game Modern Warfare 3, published by Activision, sells
    over 6.5 million copies in North America and United Kingdom, setting a new record.
    (Los Angeles Times)
  - 'Action-adventure video game The Elder Scrolls V: Skyrim by Bethesda was first
    released for the PlayStation 3, Xbox 360, and PC.'
  Disasters:
  - Francisco Blake Mora, the Mexican Secretary of the Interior, dies in a plane crash
    on a way to a meeting with judicial officials. (Huffington Post)
  Law and crime:
  - The Supreme Court of Papua New Guinea issues orders for the arrest of Deputy Prime
    Minister Belden Namah and Attorney General Allan Marat over contempt of court
    charges. (AAP via Yahoo News Australia)
  - The former Prime Minister of Ukraine Yulia Tymoshenko, already serving a seven-year
    sentence for abuse of office, is charged with tax evasion, theft and concealing
    foreign currency revenues. (Reuters)
  - Sidney Nsubuga Enoch is jailed for 35 years in Uganda for the murder of gay activist
    David Kato in January. (Reuters)
  - Washington Nationals baseball catcher Wilson Ramos is found alive in Venezuela
    near where he was kidnapped on Wednesday. (NBC Sports) (CNN)
  Politics and elections:
  - Michael D. Higgins is inaugurated as the ninth President of Ireland. (RTÉ)
  - Danny Philip resigns as the Prime Minister of the Solomon Islands before the National
    Parliament votes on a no confidence motion. (ABC News Australia)
  - Lucas Papademos is sworn as the Prime Minister of Greece. (Reuters via Sydney
    Morning Herald)
  - The Senate of Italy passes austerity measures demanded by the European Union.
    (Reuters via Sydney Morning Herald)
  Sport:
  - The Gold Coast in the Australian state of Queensland is chosen as the host city
    for the 2018 Commonwealth Games ahead of Hambantota in Sri Lanka. (The Australian)
  - London in the United Kingdom wins the rights to host the 2017 World Athletics
    Championships ahead of Doha, Qatar. (The Guardian)
  - In Major League Baseball, the Florida Marlins officially change their name to
    the Miami Marlins. ESPN.com
  - 2011 Southeast Asian Games, the largest multi-sport event in the region, was opened
    in Palembang by the President of Indonesia, Susilo Bambang Yudhoyono. (The Jakarta
    Post)
