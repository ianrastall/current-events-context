Date: '2011-11-21'
Source_URI: Portal:Current events/2011 November 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two people are injured after Syrian soldiers attack buses carrying Turkish citizens
    returning through Syria from a hajj pilgrimage to Saudi Arabia. (CNN)
  2011 Egyptian revolution:
  - At least 11 people are killed in ongoing clashes between Egyptian protesters and
    security forces in Cairo's Tahrir Square. (BBC)
  - The Cabinet of Prime Minister Essam Sharaf submits its resignation to the Supreme
    Council of the Armed Forces, but its resignation is officially rejected. (BBC)
    (Al Arabiya)
  International relations:
  - The United States, United Kingdom, and Canada impose further sanctions against
    Iran's nuclear program. (CNN)
  - The President of Russia Dmitry Medvedev states that the decision to go to war
    with Georgia in 2008 prevented the eastward enlargement of NATO. (Reuters)
  Law and crime:
  - The trial begins of the three most senior surviving members of Cambodia's Khmer
    Rouge regime, on charges of genocide and crimes against humanity. (BBC)
  - Dutch baseball player Greg Halman of the Seattle Mariners is stabbed to death,
    with his brother as a suspect. (AP via BET)
  Politics and elections:
  - Voters in the Marshall Islands go to the polls for a general election. (Radio
    New Zealand)
  - A Congressional panel fails to agree on proposals to cut the United States' national
    budget deficit by $1.2 trillion, leading to automatic budget cuts. (CBC)
