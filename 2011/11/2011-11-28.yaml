Date: '2011-11-28'
Source_URI: Portal:Current events/2011 November 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Yemeni uprising: At least 25 people are killed in fighting between Sunni
    and Shia groups in Yemen. (Al-Jazeera)'
  - Saboteurs attack Egypt's gas pipeline to Israel and Jordan, destroying a section
    of the pipeline west of al-Arish in Sinai. (Reuters)
  Business and economy:
  - Fitch Ratings maintains the credit rating of the United States government at AAA,
    but downgrades its outlook on the government to negative. This follows rival ratings
    agency Standard & Poor's downgrade of the U.S. credit rating in August. (Fox Business)
  - Jed S. Rakoff, a judge at the U.S. District Court in Manhattan, denies approval
    to a settlement agreement between the Securities and Exchange Commission and the
    investment bank Citigroup, which the SEC has charged with deceiving investors
    about the conditions under which a certain portfolio's investments had been chosen.
    (New York Times)
  International relations:
  - The government of Sudan expels Kenya's ambassador, following the Kenyan High Court's
    ruling that it will arrest Omar al-Bashir, the President of Sudan, if he enters
    Kenya. (CNN)
  - The 2011 United Nations Climate Change Conference (also known as COP 17) begins
    in Durban, South Africa. (Joburg.org.za)
  Politics and elections:
  - Voters in Egypt go to the polls for the first round of voting in parliamentary
    elections. (Reuters)
  - The Prime Minister of Kuwait, Sheikh Nasser Mohammed Al-Ahmed Al-Sabah, and his
    cabinet resign after protesters storm the national Parliament. (Reuters via ABC
    News Australia)
  - Ante Marković, the last Prime Minister of Yugoslavia, dies aged 87 in the Croatian
    capital Zagreb. (AP via Washington Post)
  - Voters in the Democratic Republic of the Congo go to the polls for a general election,
    with outbreaks of election violence reported. (Wall Street Journal)
