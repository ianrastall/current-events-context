Date: '2011-11-29'
Source_URI: Portal:Current events/2011 November 29
Intelligence_Payload:
  Business and economy:
  - American Airlines, the world's fourth-largest airline, files for Chapter 11 bankruptcy.
    (CNN) (Reuters)
  International relations:
  - Six staff members at the British embassy in Tehran are taken hostage after the
    embassy is stormed by Iranian students. (BBC) (AP via Times of India)
  - The UN Security Council condemns the attack on the British embassy. (CNN-IBN)
  - FARS News Agency states that Iranian police have secured the release of the six
    hostages. (USA Today)
  - A new Russian anti-missile early-warning facility equipped with Voronezh-DM radar
    opens in Kaliningrad Oblast. (Voice of America)(BBC)
  Law and crime:
  - Dr. Conrad Murray is sentenced to four years in jail for involuntary manslaughter
    in Los Angeles in connection to the death of Michael Jackson in 2009. (CNN), (AP
    via Sydney Morning Herald)
  - Anders Behring Breivik is declared to have been criminally insane when he committed
    the 2011 Norway attacks that killed 77 people. (The Telegraph)
  - Seven people, including a toddler, are shot while recording a music video in Oakland,
    California. (AP via Google News)
  Politics and elections:
  - The Prime Minister of Thailand, Yingluck Shinawatra, is hospitalised in Bangkok
    with suspected food poisoning. (AP via Times of India)
