Date: '2011-11-19'
Source_URI: Portal:Current events/2011 November 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Syrian uprising: At least 19 people are killed across Syria by security
    forces as protests continue against the regime of President Bashar al-Assad. (CNN)'
  - At least two people are killed and over 600 injured in violent clashes with police
    in Cairo's Tahrir Square, following mass protests against Egypt's post-revolutionary
    military leadership. (BBC) (Al-Jazeera)
  - Muammar Gaddafi's fugitive son Saif al-Islam Gaddafi, who is wanted by the International
    Criminal Court, is captured in Libya. (CNN) (BBC)
  International relations:
  - Tajikistan hints that it may release a Russian pilot detained on charges of smuggling,
    after Russia deports hundreds of Tajik migrant workers. (The Independent)
  Law and crime:
  - Roger Dean, an Australian nurse, is charged with murder in relation to the deaths
    of five residents of a nursing home in the Sydney suburb of Quakers Hill. (The
    Australian)
  - English Attorney General Dominic Grieve QC seeks leave to prosecute Sky News for
    contempt of court over its reporting of the 2009 kidnapping of Paul and Rachel
    Chandler, after the news channel allegedly breached an injunction preventing the
    disclosure of the couple's welfare. (BBC)
  - Four Metropolitan Police officers are stabbed while chasing a suspect in Kingsbury,
    north London. Two of the officers suffer serious injuries, while a 32-year-old
    male is arrested for attempted murder. (BBC)
  Science:
  - The United States successfully tests a new hypersonic weapon system, capable of
    striking targets away in under 30 minutes, as part of its Prompt Global Strike
    program. (BBC)
