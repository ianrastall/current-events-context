Date: '2011-11-27'
Source_URI: Portal:Current events/2011 November 27
Intelligence_Payload:
  Disasters:
  - The cargo ship MV Swanland founders in the Irish Sea; two of her eight crew members
    are rescued. (BBC)
  - In Canada, Chinook windstorms tear through Alberta and Saskatchewan, producing
    a dust storm in downtown Calgary and causing millions of dollars in damage. The
    windstorms fuel a grass fire that grows to two kilometres wide near Lethbridge,
    Alberta, before being contained, and gusts reach a maximum speed of . (National
    Post) (Calgary Herald) (Montreal Gazette) (Medicine Hat News) (Metro News)
  International relations:
  - The Arab League approves sanctions against Syria amid the nation's ongoing violent
    uprising. The Syrian government calls the League's move "an unprecedented measure".
    (The Telegraph)
  Sports:
  - In Canadian football, the BC Lions defeat the Winnipeg Blue Bombers 34–23 to win
    the 99th Grey Cup. (Vancouver Sun)
  - Gary Speed, the manager of the Welsh national football team, is found dead at
    his home in Cheshire, England, having apparently committed suicide. (BBC)
