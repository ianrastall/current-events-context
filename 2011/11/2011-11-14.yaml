Date: '2011-11-14'
Source_URI: Portal:Current events/2011 November 14
Intelligence_Payload:
  Arts and culture:
  - British television soap Coronation Street becomes the first prime time television
    show in the UK to use product placement after signing a deal with the Nationwide
    Building Society. A Nationwide cash machine is seen on screen in an episode. (Sky
    News)
  Disasters:
  - The death toll from the 2011 Thailand floods rises to 562. (Bangkok Post)
  International relations:
  - Libya's National Transitional Council criticizes Niger's offer of asylum to ousted
    Libyan dictator Muammar Gaddafi's son, Saadi Gaddafi, for whom Interpol has issued
    an arrest warrant, saying Niger's position is "hostile" and a "challenge" to Libya.
    (CNN)
  - Three French aid workers with Triangle Generation Humanitaire kidnapped in Yemen
    in May are freed. (Associated Press)
  Law and Order:
  - Anders Breivik goes on trial for terrorism in Norway. (DR.dk)
  - The Leveson Inquiry into phone hacking gets underway in London. (BBC)
  - At London's Old Bailey the trial begins of two men accused of the 1993 murder
    of Stephen Lawrence. (BBC)
  - Riot police shut down the Occupy Portland and Occupy Oakland rallies. Dozens of
    people are arrested. (Los Angeles Times) (BBC) (New Zealand Herald)
  Politics:
  - British Member of Parliament Alan Keen, the Labour Party member for Feltham and
    Heston, dies at the age of 73. (The Independent)
  - 200,000 people protest in Bogotá, Colombia, against government cuts in public
    education. (BBC)
