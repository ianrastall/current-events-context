Date: '2011-11-06'
Source_URI: Portal:Current events/2011 November 6
Intelligence_Payload:
  Disasters:
  - A 5.6 magnitude earthquake, the largest in the state's history, strikes 21 miles
    NNE of Shawnee, Oklahoma, USA, causing significant damage. (USGS) (Fox News)
  - A landslide kills 18 and injures dozens in Manizales, Caldas, Colombia (CNN)
  - Eleven Hungarian tourists die after a bus overturns near the Egyptian resort of
    Hurghada. (AP via Winnifred Free Press)
  Politics and elections:
  - Thousands of people protest in Washington DC against the proposed Keystone XL
    project. (CBS News)
  - The two leading Greek political parties reach an agreement to form a coalition
    government with the Prime Minister of Greece George Papandreou to resign once
    the new government is formed. (Washington Post)
  Sports:
  - The New York City Marathon begins with over 45,000 runners participating in the
    26.2-mile run with Geoffrey Mutai and Firehiwot Dado winning the men's and women's
    races, respectively. (Fox News) (Huffington Post), (AP via Yahoo News)
