Date: '2011-11-13'
Source_URI: Portal:Current events/2011 November 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least six people are dead and four injured after a bomb in a donkey cart explodes
    in Mastak in Pakistan. (AFP via Google News)
  - The Yemeni Army and tribal fighters kill nine suspected Al Qaeda militants in
    fighting in the town of Zinjibar. (Reuters)
  - Members of Occupy London report harassment during Remembrance Sunday services
    at St Paul's Cathedral. (The Guardian)
  International relations:
  - Undercover British police officer Mark Kennedy admits that, in the guise of an
    environmental activist, he was used by the police forces of 22 countries, was
    responsible for the closing down of the Youth House community centre in Copenhagen,
    and committed two crimes on behalf of German police between 2004 and 2009, one
    of which was arson. (The Guardian)
  Frisking of A. P. J. Abdul Kalam by the United States:
  - Former President of India A. P. J. Abdul Kalam is frisked and has his clothes
    inspected for explosives by officials in New York, with the United States apologising
    for its breach of protocol. (BBC) (Wall Street Journal) (Straits Times)
  - India threatens retaliatory action against the United States and the Congress
    utters its condemnation. (Times of India) (Hindustan Times) (NDTV)
  Law and crime:
  - Belden Namah, the Deputy Prime Minister of Papua New Guinea, and Allan Marat,
    the Attorney General, agree to hand themselves into Police following a ruling
    by the Supreme Court. (News Limited)
  - Law enforcement in Brazil occupy Rocinha, Rio de Janeiro's biggest favela or slum,
    in a bid to clean the city ahead of the 2014 FIFA World Cup and 2016 Summer Olympics.
    (AP via MSNBC)
  - Former South African rugby union player Solly Tyibilika is shot dead in a bar
    in Cape Town. (Bigpond News) (BBC)
  - The police in the US city of Portland, Oregon close down the Occupy Portland site
    resulting in 50 arrests. (Reuters)
  Politics:
  - An Israeli cabinet committee passes legislation backed by prime minister Binyamin
    Netanyahu to limit potentially tens of millions in foreign funding to non-government
    organizations. (Jerusalem Post)
  - Voters in South Ossetia, a breakaway region of Georgia, go to the polls for a
    presidential election and a referendum. (RIA)
  - The President of Italy Giorgio Napolitano nominates Mario Monti to be the new
    Prime Minister. (CNN Money)
