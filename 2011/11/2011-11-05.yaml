Date: '2011-11-05'
Source_URI: Portal:Current events/2011 November 5
Intelligence_Payload:
  Armed conflict and attacks:
  - The Islamist terrorist group Boko Haram claims responsibility for a series of
    bomb and gun attacks in the north-eastern Nigerian town of Damaturu that have
    killed at least 63 people. (BBC)
  - Canadian Freedom Waves to Gaza organizers say activists on the Canadian ship Tahrir
    that, along with the Irish MV Saoirse, who were headed to the Gaza Strip, were
    intercepted by Israeli troops. The activists refused to voluntarily leave the
    ship; Israel says no one was hurt.(The Globe and Mail) (CBC) (Salem-News.com)
    (Jerusalem Post) (Ynetnews.com)
  Disasters:
  - Rescuers pull a further 45 trapped coal miners to the surface in Sanmenxia in
    the People's Republic of China, with eight miners reportedly having died. (AP
    via Washington Post) (CNN) (BBC)
  - Residents of El Hierro in Spain's Canary Islands are evacuated following continuing
    volcanic activity. (AP via Fox News)
  Law and crime:
  - A Pakistan anti-terror court indicts two police officers and five alleged members
    of the Taliban for the murder of former Prime Minister of Pakistan Benazir Bhutto.
    (Dawn)
  Politics and elections:
  - South Belfast MP Alasdair McDonnell is elected leader of Northern Ireland's Social
    Democratic and Labour Party, replacing Margaret Ritchie who stepped down in September.
    (BBC)
  Sports:
  - Al-Sadd wins the 2011 AFC Champions League beating Jeonbuk Hyundai Motors 2-2
    (4-2 in penalties) in the 2011 AFC Champions League Final. (AFC)
