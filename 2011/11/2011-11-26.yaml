Date: '2011-11-26'
Source_URI: Portal:Current events/2011 November 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 26 Pakistani soldiers are killed after a NATO helicopter opens fire on a Pakistani
    checkpoint, sparking outrage from the Pakistani government. (CNN)
  - Colombian military forces raid a FARC rebel hideout in the province of Caquetá,
    freeing police sergeant Luis Alberto Erazu, who had been held hostage by FARC
    for 12 years. Four other hostages are killed by the rebels during the raid. (Miami
    Herald)
  New Zealand general election and voting method referendum:
  - Voters in New Zealand go to the polls for a general election and voting method
    referendum. (NZ Stuff)
  - The New Zealand National Party, led by incumbent Prime Minister John Key, wins
    60 seats, one short of the 61 required for a majority. ACT New Zealand and United
    Future New Zealand indicate that they will work with the National Party to form
    a coalition government. (Television New Zealand)
  - The Mixed Member Proportional voting system, on early votes only, wins a majority
    of the vote in the referendum and will be kept. Full results will be released
    on 10 December 2011. (The Dominion Post via New Zealand Stuff)
  Science:
  - NASA launches the robotic Mars Science Laboratory, the largest rover yet sent
    to Mars, with the aim of finding evidence for past or present life on Mars. (BBC)
  Sports:
  - NBA team owners and players reach an agreement to end the 149-day NBA lockout
    and to begin the current NBA season on Christmas Day. (ESPN)
