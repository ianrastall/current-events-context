Date: '2011-11-07'
Source_URI: Portal:Current events/2011 November 7
Intelligence_Payload:
  Arts and culture:
  - The Swedish Enforcement Administration (Kronofogden) announces the public auction
    of seven paintings originally believed to be painted by German leader Adolf Hitler.(TT
    via Dagens Nyheter) (Swedish)
  Business and economy:
  - Gary Gensler, chairman of the U.S. Commodity Futures Trading Commission, recuses
    himself from that agency's investigation into the bankruptcy of MF Global. (Wall
    Street Journal)
  - Barnes & Noble, a company best known for its chain of book stores, enters the
    tablet computer market with the Nook Tablet, an extension of its line of Nook
    eReaders. (Reuters)
  Disasters:
  - Flooding continues in Italy with seven people having died in the past week and
    thousands of people ordered to evacuate in Turin as the Po River continues to
    rise. (BBC)
  Law and crime:
  - Conrad Murray is found guilty of involuntary manslaughter in relation to the death
    of American entertainer Michael Jackson. (USA Today)
  - Venezuelan terrorist Carlos the Jackal stands trial in Paris over four bomb attacks
    in the early 1980s that killed 11 people. (BBC)
  Politics:
  - The opposition National Democratic Party, led by Orlando Smith, defeats incumbent
    Premier Ralph T. O'Neal's Virgin Islands Party, winning 9 seats of the 13 seats
    in the 2011 British Virgin Islands general election. (Virgin Islands News)
  - An inquiry is launched following claims identity checks on travellers entering
    the United Kingdom from outside Europe were scaled back during the summer. Home
    Secretary Theresa May tells the House of Commons she does not know how many entered
    the country without proper checks. (BBC)
  - Voters in the Canadian province of Saskatchewan go to the polls with the Saskatchewan
    Party led by Premier Brad Wall winning in a landslide. (CBC News)
  Sports:
  - Former world champion boxer Joe Frazier dies of liver cancer. (ESPN) (ABC News
    America)
