Date: '2011-11-24'
Source_URI: Portal:Current events/2011 November 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three roadside bombs detonate in the Iraqi city of Basra, killing at least 19
    people and injuring 67. (CNN)
  Business and economies:
  - India's government decides to relax rules concerning the operation of foreign-owned
    retailers such as Wal-Mart and Tesco within India. (The New York Times)
  Politics and elections:
  - The Speaker of the Australian House of Representatives Harry Jenkins resigns to
    be replaced by Opposition MP Peter Slipper. (The Australian) (The Australian)
