Date: '2011-11-20'
Source_URI: Portal:Current events/2011 November 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 13 people are killed and as many as 900 injured as violent protests continue
    in Cairo's Tahrir Square against Egypt's ruling military government. Security
    forces attempt to disperse the crowds with tear gas and baton charges. (BBC)
  - '2011 Syrian uprising: Two rocket-propelled grenades hit the headquarters of Syria''s
    ruling Ba''ath Party in Damascus amid ongoing anti-government protests. (BBC)
    (Reuters)'
  - Jose Pimentel, a 27-year-old Dominican-American, is arrested in New York City
    after planning to detonate pipe bombs, according to New York mayor Michael Bloomberg.
    The suspect is believed to have Al-Qaeda sympathies, although no wider conspiracy
    is suspected. (CNN)
  International relations:
  - The President of Turkey, Abdullah Gül, commences a three-day state visit to the
    United Kingdom. (BBC)
  Law and crime:
  - A man is charged with attempted murder following Saturday's stabbing of four Metropolitan
    Police officers in Kingsbury, north London. (BBC)
  Politics and elections:
  - Voters in Spain go to the polls for a general election, with the centre-right
    Popular Party winning a parliamentary majority. (AP via MSNBC) (BBC)
