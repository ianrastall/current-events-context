Date: '2011-12-02'
Source_URI: Portal:Current events/2011 December 2
Intelligence_Payload:
  Armed conflict and attacks:
  - Muslim rioters attack liquor stores and massage parlors in Zakho in the Kurdistan
    region of northern Iraq after Friday prayers. The attacks later extended to include
    Christian-owned shops and businesses in other cities including Dohuk and Simele.
    (USA Today)
  Business and economy:
  - In the U.S., the Agriculture Committee of the U.S. House of Representatives votes
    to issue a subpoena to Jon Corzine, former Governor of New Jersey, in connection
    with the collapse of MF Global and the disappearance of customer funds. (Committee
    press release)
  International relations:
  - United States Secretary of State Hillary Clinton meets with Aung San Suu Kyi,
    Burma's pre-eminent pro-democracy activist, to promote democratic reforms. (AP
    via Google)
  - The United Nations Human Rights Council denounces the crimes against humanity
    during the 2011 Syrian uprising which killed over 4,000 people since the uprising
    started in March. (CNN)
