Date: '2011-12-25'
Source_URI: Portal:Current events/2011 December 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Sudanese People's Armed Forces claim that the leader of the Justice and Equality
    Movement in Darfur, Khalil Ibrahim, has been killed. (Xinhua)
  - At least 39 people are killed and many injured in a series of attacks against
    churches in Nigeria during Christmas prayers. The Islamic group Boko Haram claims
    responsibility. (USA Today)
  - The Syrian opposition urge the Arab League to visit the city of Homs before the
    government reportedly uses force to end dissent in the area. (Al Jazeera)
  Arts and culture:
  - Pope Benedict XVI delivers the annual Christmas message at Saint Peter's Square
    in Vatican City. (CNN)
  Disasters and accidents:
  - At least 38 migrants from Haiti are found dead after their boat sank off the east
    coast of Cuba. (Al Jazeera)
  - State Emergency Service volunteers respond to more than 3000 calls for help after
    Melbourne, Australia is hit by a series of storms bringing rainstorms, hail and
    a tornado. (The Australian)
  Law and crime:
  - Faezeh Hashemi, the daughter of former President of Iran Akbar Hashemi Rafsanjani,
    stands trial on charges of making anti-regime propaganda. (Yahoo Maktoob)
  Science:
  - The warmest temperature ever recorded at the South Pole is set with a top of -12.3°C
    set at the Amundsen–Scott South Pole Station. (Weather Underground)
