Date: '2011-12-03'
Source_URI: Portal:Current events/2011 December 3
Intelligence_Payload:
  Armed conflict and attacks:
  - At least 23 people are killed in Syria. (BBC)
  Arts and culture:
  - Indian cinema actor, director and producer Dev Anand dies of a heart attack in
    London. (BBC)
  Disasters:
  - At least 33 people die and 13 are injured in a crash between a truck and a bus
    near the Bahia city of Milagro in northeastern Brazil. (CNN)
  - At least eight children have died in the past few weeks in Ecuador's Amazon basin
    after being bitten by rabid bats. (AFP via HeraldSun)
  Politics:
  - Students protesting against the Irish financial crisis occupy the office of Fine
    Gael lawmaker Anthony Lawlor ahead of the forthcoming Budget Day. (The Journal)
    (Irish Central) RTE
  - The governing Australian Labor Party changes its platform in support of gay marriage
    at its conference in Sydney, paving the way for legislation. (The Australian)
  - Herman Cain announces that he will suspend his campaign for Republican nomination
    in the United States presidential election following a series of sexual harassment
    and other misconduct allegations. (CBS)
