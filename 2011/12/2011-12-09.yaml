Date: '2011-12-09'
Source_URI: Portal:Current events/2011 December 9
Intelligence_Payload:
  Business and economy:
  - Credit rating agency Moody's downgrades the ratings of France's three biggest
    banks, Crédit Agricole, BNP Paribas and Société Générale. (BBC)
  - Stock prices rise at stock exchanges around the world, and some analysts see this
    as a reaction to a fiscal agreement among the leaders of the eurozone. (Reuters)
  Disasters:
  - AMRI Hospital fire tragedy
  - 40 confirmed people die in a fire in the AMRI Hospital in the Indian city of Kolkata.
    (AP via Google News) (IBN Live)
  - The Government of West Bengal cancels the hospital's license following the fire.
    (Times of India)
  International relations:
  - David Cameron, the Prime Minister of the United Kingdom, refuses to join a European
    Union financial crisis accord after negotiations in Brussels. (BBC)
  - Croatia's President Ivo Josipović and Prime minister Jadranka Kosor sign the accession
    treaty of Croatia to the European Union, to become the 28th member state on July
    1, 2013. (AP via Google News)
  Law and crime:
  - Joshua Komisarjevsky, found guilty of the Cheshire, Connecticut home invasion
    murders, is sentenced to death by lethal injection. (ABC News)
  - Camorra's Michele Zagaria caught in underground bunker (ANSAmed)(Time)(EuroNews)
  Politics and elections:
  - Incumbent President of the Democratic Republic of the Congo Joseph Kabila is declared
    the winner of the Congolese general election but lead opposition candidate Étienne
    Tshisekedi disputes the outcome. (Bigpond) (AP via Google News)
