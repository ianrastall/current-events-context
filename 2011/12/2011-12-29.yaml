Date: '2011-12-29'
Source_URI: Portal:Current events/2011 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Syrian uprising: At least 10 people are killed in clashes in the city of
    Homs as Arab League monitors continue their inspection of Syria''s conflict zones.
    (BBC)'
  - Seven kidnappers are killed and two hostages rescued in a police raid in China's
    Xinjiang Province, according to state media. One police officer was also reportedly
    killed. (Reuters)
  - Turkish warplanes launch airstrikes aimed at Kurdish militants, accidentally killing
    35 smugglers that were suspected as guerillas. (MSNBC)
  - '2011 Egyptian revolution: Egyptian security forces storm the offices of non-governmental
    organisations across the country. (Al Jazeera)'
  Arts and culture:
  - New York Mayor Michael Bloomberg states that there is 'no chance' that the National
    September 11 Museum will open on time (September 11, 2012), due to a financial
    dispute. (MSNBC)
  Business and economy:
  - The United States sells 84 F-15 fighter jets to Saudi Arabia.(Reuters)
  Disasters:
  - At least 15 people are killed and dozens injured in an explosion in the Burmese
    city of Rangoon. (BBC)
  - At least 14 people die in a multi-vehicle accident on the Pan American Highway
    on the outskirts of the Venezuelan capital Caracas. (El Universal)
  - Mount Cleveland, a volcano in the U.S. state of Alaska, erupts, causing an air
    traffic alert to be issued. (Reuters)
  - A Russian nuclear submarine, the K-84 Ekaterinburg, is forced to partially submerge
    itself at a shipyard in Murmansk to douse a blaze on its hull. No radiation leaks
    are reported. (Reuters)
  Geography:
  - The Pacific Island nations of Samoa and Tokelau move from east to west of the
    International Date Line in order to align their time zone better with their main
    trading partners, meaning that they will not mark December 30 this year. (AP via
    Chicago Tribune) (RNZI)
  Politics and elections:
  - Kim Jong-un is acknowledged as the new supreme leader of North Korea at the conclusion
    of a state funeral for his father. (AP via MSNBC)
  - Around 500 people protest in the Russian capital Moscow against the detention
    of opposition leader Sergei Udaltsov. (The Guardian)
  - General elections take place in Jamaica, with preliminary results showing the
    Opposition People's National Party led by Portia Simpson Miller in a winning position.
    (RTÉ) (BBC)
  - The Rajya Sabha, the Upper House of the Parliament of India, adjourns for the
    year without voting on the Lokpal anti-corruption bill advocated by Anna Hazare
    and his followers. (Reuters)
  - Poland announces an amnesty for illegal immigrants from January 1, 2012. (Reuters)
  Sport:
  - Rosman García, a Venezuelan former relief pitcher who played for the Texas Rangers
    during the 2003–2004 baseball seasons, is killed in a car crash in Valencia, Venezuela.
