Date: '2011-12-12'
Source_URI: Portal:Current events/2011 December 12
Intelligence_Payload:
  Business and economy:
  - Credit rating agency Moody's in its weekly credit report dismisses the significance
    of last week's EU agreement, saying it "does not change our view that risks to
    the cohesion of the euro area continue to rise." (Reuters)
  International relations:
  - United States President Barack Obama has asked Iran for the RQ-170 Sentinel that
    was captured near Kashmar on December 4. (CNN)
  Law and crime:
  - A Chinese fishing boat captain allegedly stabs a Republic of Korea Coast Guard
    officer, killing him, after his boat is stopped for illegally fishing in South
    Korean waters. (AP via Washington Post)
  Politics and elections:
  - Canada announces that it will withdraw from the Kyoto Protocol, because the country
    would face large penalties because of treaty violations.(Reuters)
  - The Supreme Court of Papua New Guinea rules that the August 2011 election of Peter
    O'Neill as Prime Minister was unconstitutional and orders the reinstatement of
    former Prime Minister Michael Somare to office. (RNZI)
  - The House of Representatives of the Philippines impeaches Chief Justice Renato
    Corona after 188 representatives signed a complaint. This is the second impeachment
    passed in the year after the impeachment of Ombudsman Merceditas Gutierrez early
    in March. (GMA News.tv)
