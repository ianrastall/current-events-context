Date: '2011-12-07'
Source_URI: Portal:Current events/2011 December 7
Intelligence_Payload:
  Arts and culture:
  - The United States commemorates the 70th anniversary of the attack on Pearl Harbor,
    Hawai'i. (AP via WVEC)
  Business and economy:
  - The board of Japan's Olympus Corporation announces its plans to resign early next
    year due to its accounting scandal. (Reuters)
  Law and crime:
  - The former President of Israel Moshe Katsav arrives at a prison outside Tel Aviv
    to start a seven year term for rape. (BBC)
  - The former Governor of the US state of Illinois Rod Blagojevich is sentenced to
    14 years in jail for corruption. (Reuters)
  - Security expert and anti-corruption activist Alfredo Landaverde is killed in Honduras,
    a day after journalist Luz Marina Paz Villalobos is killed, leading to a ban on
    a motorcycle passengers. (The Guardian) (NY Times)
  Politics and elections:
  - Former President of the Soviet Union, Mikhail Gorbachev says that the Russian
    authorities must acknowledge the recent street protests, annul the results of
    Sunday’s parliamentary election and hold a new poll. (RT)
  - Egypt's Freedom and Justice Party claims to have won a majority of seats in the
    runoff election. (Ynet News)
  Science:
  - The Russian Federal Space Agency officially gives up attempting to rescue Fobos-Grunt
    and Yinghuo-1, and expects them to fall back to Earth in January 2012. (Space.com)
