Date: '2011-12-05'
Source_URI: Portal:Current events/2011 December 5
Intelligence_Payload:
  Armed conflict and attacks:
  - There are reports of more than 60 bodies being taken to hospitals in the Syrian
    town of Homs. (Jerusalem Post)
  Eurozone debt crisis:
  - Nicolas Sarkozy, the President of France, and Angela Merkel, the Chancellor of
    Germany, call for a new European Union Treaty to help prevent future Eurozone
    crises. (BBC)
  - There are widespread reports that credit ratings agency Standard & Poors will
    put 15 nations in the Eurozone under review for a possible downgrade, including
    France and Germany. (Bloomberg) (Sky News)
  Law and crime:
  - Former Côte d'Ivoire President Laurent Gbagbo appears before the International
    Criminal Court to face charges of crimes against humanity. (Reuters India)
  - Julian Assange is allowed a final appeal to the Supreme Court of the United Kingdom
    against his extradition to Sweden to answer questions over sexual assault allegations.
    (Wall Street Journal)
  Politics and elections:
  - Peru declares a state of emergency in four provinces amid protests over a mining
    project. (Andina)
  Russian election:
  - Preliminary results are released from the Russian legislative election showing
    the ruling United Russia winning 50 percent of the vote, well down on its 2008
    vote. (AP via Google News)
  - European monitors criticise the election saying that rules favoured United Russia
    and claiming that it was marred by violations. (Deutsche Welle)
