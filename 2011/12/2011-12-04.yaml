Date: '2011-12-04'
Source_URI: Portal:Current events/2011 December 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 45,000 citizens of Koblenz, Germany, are allowed to return home after bomb squads
    defused World War II bombs that were hidden under the Rhine for almost 65 years.
    (CNN)
  Business and economy:
  - Australia approves exports of uranium to India. (Al Jazeera)
  Politics and elections:
  - Transparency International releases the 2011 Corruption Perceptions Index, declaring
    North Korea and Somalia the most corrupt nations in the world, and New Zealand
    the least corrupt. (CNN.com) (Transparency.org)
  - Voters in Slovenia go to the polls for a parliamentary election with early results
    showing Positive Slovenia with an early lead. (Reuters) (AP via Newsday)
  - Voters in Croatia go to the polls for a parliamentary election with an exit poll
    showing the centre-left Kukuriku coalition set to win a majority. (BBC)
  - Islamist parties win the first stage of the Egyptian parliamentary election, with
    the Muslim Brotherhood-aligned Freedom and Justice Party first at 37% of the vote,
    and the more hardline Salafi Al-Nour Party in second place with 24% of the vote.
    (AFP)
  - The President of Peru Ollanta Humala declares a state of emergency in the Cajamarca
    region to stop anti-mining protests. (Bloomberg via Business Week)
  Russian election:
  - Voters in Russia go to the polls for an election for the State Duma. (LA Times
    via Seattle Times) (New York Times)
  - Independent exit polls suggest the governing United Russia party failed to get
    a majority in the Duma, amid accusations of massive voter harassment and DDoS
    attacks targeting blogs. (Reuters)
  Sport:
  - Former Brazilian football captain Sócrates dies in hospital in São Paulo from
    complications of food poisoning. (The Telegraph)
  - American golfer Tiger Woods wins the Chevron World Challenge, his first tournament
    win in over two years. (AP via NPR)
  - In lawn tennis, Spain wins the 2011 Davis Cup. (AFP via The Australian)
