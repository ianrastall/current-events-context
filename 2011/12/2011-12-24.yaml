Date: '2011-12-24'
Source_URI: Portal:Current events/2011 December 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Arab League monitors meet Syria's foreign minister, a day after deadly bombings
    occurred in the capital Damascus. (Al Jazeera)
  - Government troops in Yemen fire on anti-government protesters demanding the trial
    of President Ali Abdullah Saleh, killing at least nine people. (Pakistan Observer)
    (Boston Globe)
  - Gun battles in Nigeria between government troops and Islamist Boko Haram militants
    kill 68 people. (Reuters)
  Arts and culture:
  - The Buddha Memorial Center of Fo Guang Shan in Kaohsiung, Taiwan, housing a tooth
    relic of Gautama Buddha, is consecrated. (Xinhua)
  - Dutch actor and singer Johannes Heesters, the world's oldest performer, dies at
    the age of 108. (Bild)
  Business and economy:
  - A former official of the central bank of the People's Republic of China states
    that the People's Bank of China could lower the country's reserve requirements
    in 2012. (Reuters)
  Politics and elections:
  - North Korean media name Kim Jong-un – the son and successor of late leader Kim
    Jong-il – as the Supreme Commander of the Korean People's Army. (Straits Times)
  - Tens of thousands of people protest across Russia against parliamentary elections
    that they allege were rigged in favour of the ruling United Russia party. (RIA
    Novosti)
  - Cuba announces that it will release 2,900 prisoners – including some political
    prisoners – in the next few days. (BBC)
  - Libya celebrates its independence for the first time in 42 years; independence
    celebrations were banned under the regime of former dictator Muammar Gaddafi.
    (Tripoli Post)
