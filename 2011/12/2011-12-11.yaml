Date: '2011-12-11'
Source_URI: Portal:Current events/2011 December 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Yemeni uprising: Hundreds of thousands of protesters demonstrate in Yemen
    calling for the trial of President Ali Abdullah Saleh. (Voice of Russia)'
  - Two people are injured during a gun battle at Tripoli International Airport between
    militia and the Libyan army.(IOL)
  2011 Syrian uprising:
  - A general strike is observed in several regions of Syria. (The Telegraph)
  International relations:
  - North Korea warns of "unexpected consequences" if South Korea lights a Christmas
    tree near their mutual border. (BBC) (Yonhap)
  - The 2011 United Nations Climate Change Conference finishes in Durban in South
    Africa with an agreement to begin negotiations on a new treaty. (USA Today)
  Law and crime:
  - Former leader of Panama Manuel Noriega is extradited home from France and the
    United States where he has been serving jail sentences for the past 22 years to
    serve more time for his role in the murder of political opponents. (Reuters via
    the Guardian)(The Australian)(LA Times)
  - A 16-year-old teenager in the U.S. state of Ohio is charged with murder in a deadly
    Craigslist robbery scheme.(ABC)
  Politics:
  - International monitors say that elections in the Democratic Republic of the Congo
    lacked credibility. (AP via Google News)
  - In a protest in London about the elections in the Democratic Republic of the Congo
    139 people are arrested.(The Guardian)
  - Parliamentary elections take place in Côte d'Ivoire. (BBC)
  - Russian President Dmitry Medvedev orders an inquiry into the disputed results
    of the parliamentary elections. (Reuters)
  - Around 1,000 people protest in Taipei, demanding that the government make a weekly
    day off a legal right for Taiwan's 200,000 foreign live-in caregivers. (Straits
    Times)
  - Dominique de Villepin announces his candidacy for President of France. (BBC)
