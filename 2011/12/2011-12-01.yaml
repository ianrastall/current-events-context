Date: '2011-12-01'
Source_URI: Portal:Current events/2011 December 1
Intelligence_Payload:
  Disasters:
  - One person dies and 16 others are injured in three separate chain-reaction crashes
    involving 176 cars in Nashville, Tennessee, United States. (CNN)
  Politics and elections:
  - The 2010–2011 Belgian government formation draws to a close as six parties come
    to an agreement which will see PS leader Elio Di Rupo become Prime Minister. The
    deal, however, still has to be approved by the parties' conventions, and the cabinet
    makeup is not yet defined. (EUobserver)
