Date: '2011-10-10'
Source_URI: Portal:Current events/2011 October 10
Intelligence_Payload:
  Arts and culture:
  - Iranian actress Marzieh Vafamehr is sentenced to 90 lashes of the cane and a year's
    jail in Tehran for appearing in the film My Tehran For Sale which criticises the
    Government of Iran's harsh policies on the arts. (ABC News Australia)
  Business and economy:
  - France and Belgium agree to break up and partially nationalize Dexia, Belgium's
    largest bank. (Globe and Mail)
  - American economists Thomas J. Sargent and Christopher A. Sims win the 2011 Nobel
    Memorial Prize in Economic Sciences. (Bloomberg via Business Week)
  - The Bank of Greece announces the bail-out and takeover of Proton Bank via that
    country's Financial Stability Fund. (Reuters)
  Law and crime:
  - The trial of two South African farm workers for the murder of Afrikaner Weerstandsbeweging
    white supremacist Eugène Terre'Blanche begins. (Daily Telegraph)
  - Governor Rick Scott of Florida signs the death warrant for Oba Chandler, convicted
    of the murder of three women in 1989, with the execution set for November 15.
    (Orlando Sentinel)
  - The trial of Vincent Tabak, who is accused of murdering British landscape architect
    Joanna Yeates, begins at Bristol Crown Court. (BBC)
  Politics and elections:
  - The president of Equatorial Guinea and the first lady met the president of Gabon
    to inaugurate the new Corisco International Airport. (Oficina de Información y
    Prensa de Guinea Ecuatorial)
  Sport:
  - In basketball, National Basketball Association Commissioner David Stern cancels
    the first two weeks of the 2011–12 NBA season due to the ongoing lockout. (CBS
    Sports)
