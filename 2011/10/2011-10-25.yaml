Date: '2011-10-25'
Source_URI: Portal:Current events/2011 October 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Philippine civil defence official estimates that approximately 10,000 people
    in the southern Philippines have fled their homes due to fighting between Abu
    Sayyaf rebels and government forces. (AFP via News Limited)
  - '2011 Yemeni uprising: Fifteen people die in clashes in the Yemeni cities of Sana''a
    and Taiz. (Daily Star)'
  Aftermath of Libyan Civil War:
  - The bodies of ousted Libyan dictator Muammar Gaddafi, his son and advisor Mutassim
    Gaddafi, and former defence minister Abu-Bakr Yunis Jabr are buried in unmarked
    graves by the National Transitional Council. (BBC)
  Arts and culture:
  - First-person shooter video game Battlefield 3, developed by Electronic Arts, is
    released in North America. (ABC News)
  Disasters and accidents:
  - Floodwaters continue to rise on the outskirts of the Thai capital Bangkok, with
    floodwaters having reached Don Mueang International Airport, leading to the cancellation
    of many flights. (Bangkok Post) (Bloomberg via Business Week)
  - Following severe flooding in Ireland and parts of the United Kingdom, two apparent
    flood deaths are reported in the Irish capital Dublin. (RTÉ) (BBC)
  - One person is killed and fourteen people injured in an explosion in the Swiss
    city of Yverdon-les-Bains. (AP)
  - Hurricane Rina strengthens to Category 2 strength as it advances towards Cancun
    and other resorts on the Mexican Riviera. (CBS News)
  - The death toll from the 2011 United States listeriosis outbreak rises to 28, with
    133 people in 26 states reportedly suffering from the disease. (AP via Washington
    Post)
  Turkish earthquake:
  - The death toll of eastern Turkey's recent earthquake reaches 366, as emergency
    services continue to search the rubble of Van for survivors. (The Guardian)
  - Turkey accepts an offer of assistance from Israel. (Jerusalem Post)
  Law and crime:
  - Police arrest 75 people outside Oakland City Hall in the U.S. state of California
    while clearing the campsite of the Occupy Oakland protest. (CBS News)
  - The United States Government commences legal action against Teodoro Nguema Obiang
    Mangue, the Minister of Agriculture and Forestry in Equatorial Guinea and the
    son of the President of Equatorial Guinea Teodoro Obiang Nguema Mbasogo, to seize
    US$70.8 million in assets allegedly gained from graft and corruption. (Los Angeles
    Times)
  Science and technology:
  - The last of the United States' nine-megaton B53 warheads, formerly the most powerful
    nuclear weapons in the country's nuclear arsenal, is disassembled near Amarillo,
    Texas, having been in service since 1962. (AP) (BBC)
  - Space telescope observations indicate that the supernova RCW 86, first seen by
    Chinese astronomers in 185 AD, expanded at an unprecedented rate due to the formation
    of a vacuum-like "cavity" around it in the early stages of the death of its star.
    The supernova's rapid expansion had previously been one of astronomy's most enduring
    mysteries. (BBC)
