Date: '2011-10-22'
Source_URI: Portal:Current events/2011 October 22
Intelligence_Payload:
  International relations:
  - North Korea agrees, for the first time in 6 years, to let the United States search
    for the remains of American soldiers killed during the Korean War. (BBC)
  Disasters:
  - A pedestrian suspension bridge collapse in Bijanbari, near Darjeeling, West Bengal,
    India, kills at least 34 people and injures over 100. (Hindustan Times) (All India
    Radio)
  Politics and elections:
  - National Transitional Council chairman Mahmoud Jibril announces that Libyan elections
    will occur "within months". (CNN)
  - Morocco, Togo, Guatemala and Pakistan are elected to the United Nations Security
    Council, with a fifth seat still undecided. (CNN)
  - Saudi heir Crown Prince Sultan bin Abdulaziz Al-Saud dies, leaving questions as
    to the succession in the kingdom. Hard-line conservative Prince Nayef bin Abdul-Aziz
    becomes likely successor. (CNN)
  - Voters in the US state of Louisiana go to the polls for a gubernatorial election
    with incumbent Governor Bobby Jindal expected to be elected in the first round.
    (AP via Fox News)
