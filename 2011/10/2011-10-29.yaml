Date: '2011-10-29'
Source_URI: Portal:Current events/2011 October 29
Intelligence_Payload:
  2011 Syrian uprising:
  - Syrian security forces attack the city of Homs with fighter jets and tanks, killing
    at least 3. (CNN)
  War in Afghanistan (2001–2021):
  - A suicide bomber targets a NATO convoy in the Afghanistan capital of Kabul, killing
    at least four Afghans, eight civilians, and five members of the International
    Security Assistance Force. (CNN)
  - A rogue member of the Afghan National Army opens fire on Australian Army soldiers
    in Kandahar Province killing four, including an Afghan interpreter. (The Australian)
  Business:
  - The Australian airline Qantas grounds its entire fleet due to an ongoing union
    dispute, with a lockout to start on October 31, 2011. (AFP via West Australian)
  Disasters:
  - Thirty people are feared dead after a footbridge in India's Arunachal Pradesh
    collapses into the Kameng River. (AP via The Washington Post)
  - A rare October snow storm hits the Northeastern United States and mid-Atlantic
    United States, leaving millions without power and killing two. (CNN)
  - At least three people die in an explosion in a grain elevator in the US town of
    Atchison, Kansas. (AP via News OK)
