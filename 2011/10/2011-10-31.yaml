Date: '2011-10-31'
Source_URI: Portal:Current events/2011 October 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three people are killed in attacks on the offices of the International Relief
    and Development (IRD) in the Afghan city of Kandahar. (AFP via Yahoo News)
  Business and economy:
  - Australian airline Qantas resumes flights after a ruling by Fair Work Australia.
    (The Australian)
  - The Government of Japan intervenes to reduce the exchange rate of the Japanese
    yen with the United States dollar after the yen reached record highs. (Reuters)
  - US brokerage firm MF Global files for Chapter 11 bankruptcy after declaring £4bn
    of Eurozone debt exposure. (BBC)
  International relations:
  - UNESCO becomes the first United Nations agency to admit Palestine as a full member,
    with the United States withdrawing funding in protest. (AFP via Adelaide Now)
    (CBS News)
  Law and crime:
  - A jury in the US state of Arizona convicts Mark Goodeau on all charges related
    to the Baseline Killer murders. (AP via Atlanta Journal Constitution)
  Politics and elections:
  - Kizza Besigye, the leader of Uganda's political opposition, is arrested while
    leading a "walk to work" protest. (AFP via Google)
  - The Rt Rev Graeme Knowles resigns as Dean of London's St Paul's Cathedral as protests
    by Occupy London demonstrators continue. (BBC)
  - Abdurrahim El-Keib is named as the new interim Prime Minister of Libya by the
    country's National Transitional Council. (BBC)
  - The Prime Minister of Greece George Papandreou calls a referendum on the new European
    Union debt deal. (AP via Google News)
  Science:
  - The United Nations Population Division estimates that the world population has
    reached seven billion people. (Los Angeles Times)
