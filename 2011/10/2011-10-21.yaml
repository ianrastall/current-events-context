Date: '2011-10-21'
Source_URI: Portal:Current events/2011 October 21
Intelligence_Payload:
  Libyan Civil War:
  - NATO commander James G. Stavridis announces that NATO plans to conclude its Libyan
    military intervention, Operation Unified Protector, on October 31. (AFP via Google
    News)
  Iraq War:
  - The President of the United States, Barack Obama, announces a plan to withdraw
    all of the remaining American military forces from Iraq by the end of 2011. (CBS
    News)
  Business and economy:
  - Verizon Communications reports that its third-quarter earnings have doubled. (Wall
    Street Journal)
  Disasters:
  - The Government of Japan announces a $157 billion additional budget to cover the
    costs of recovering from March's earthquake and tsunami. (The Guardian)
  Law and crime:
  - Gunmen kill three people near Freeport-McMoRan's gold and copper mine in Indonesia's
    Papua province. (Reuters via The Guardian)
  Politics and elections:
  - Jay Weatherill is sworn in as the new Premier of South Australia after being officially
    elected as the leader of the state Australian Labor Party. (The Australian)
  - The President of Cameroon Paul Biya is declared the winner of the Cameroonian
    presidential election held on October 6. (AFP via Google News)
  - London's St Paul's Cathedral is forced to close its doors to visitors for the
    first time since the Second World War after protesters set up camp on its doorstep.
    (BBC)
