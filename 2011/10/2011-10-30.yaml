Date: '2011-10-30'
Source_URI: Portal:Current events/2011 October 30
Intelligence_Payload:
  Armed conflict and attacks:
  - A United States drone attack kills six militants in Pakistan's North Waziristan
    region. (AP via Google News)
  - The interim Prime Minister of Libya Mahmoud Jibril confirms the presence of chemical
    weapons in Libya under the Gaddafi regime and announces that weapons inspectors
    would be visiting the country to help get rid of them. (AP via Washington Post)
  Business and economy:
  - Fair Work Australia orders the Australian airline Qantas and its unions to reach
    an agreement within 21 days meaning that services will resume on Monday. (News
    Limited)
  International relations:
  - The Commonwealth Heads of Government Meeting 2011 finishes in the Australian city
    of Perth. (The West Australian)
  Politics and elections:
  - Voters in Colombia go to the polls for local gubernatorial and mayoral elections,
    including the mayors of Bogotá, Medellín, and Cali. (Americas Society)
  - Gustavo Petro is elected Mayor of Bogotá. (Washington Post)
  - Aníbal Gaviria of the Colombian Liberal Party is elected Mayor of Medellín, narrowly
    defeating former Mayor Luis Pérez. (Colombia Reports)
  - Rodrigo Guerrero, an independent, is elected Mayor of Cali. (Colombia Reports)
  - Campo Elias Teran of the Alianza Social Independiente is elected Mayor of Cartagena
    with 54.89%. (Colombia Reports)
  - Green Party candidate Sergio Fajardo is elected Governor of Antioquia Department.
    (Financial Times)
  - Voters in Kyrgyzstan go to the polls for a Presidential election with Almazbek
    Atambayev winning in a landslide. (The Hindu)
  - Voters in Bulgaria went to the polls for the second round of a presidential election
    with Rosen Plevneliev of Citizens for European Development of Bulgaria being elected.
    (AP via Atlanta Journal-Constitution)
