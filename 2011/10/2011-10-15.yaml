Date: '2011-10-15'
Source_URI: Portal:Current events/2011 October 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Yemeni protests: At least nine people are killed and dozens injured in the
    Yemeni capital Sana''a after security forces use tear gas and live ammunition
    to disperse anti-government protesters. (VoA) (BBC)'
  - Yemeni officials report that Ibrahim al-Banna, the media chief of Al-Qaeda in
    the Arabian Peninsula, has been killed along with six other militants in a Friday
    air strike in Yemen's Shabwa Governorate. (BBC)
  - Afghan and U.S. forces repel a Taliban raid on a NATO base in Afghanistan's Panjshir
    Province, reportedly killing four militants. (Washington Post) (BBC)
  Business and economy:
  - The United States Department of Commerce reports that U.S. retail sales rose at
    their fastest rate for seven months in September, having risen by 1.1% over the
    previous month. (BBC)
  - U.S. energy company Kinder Morgan agrees to buy natural gas exploration and pipeline
    company El Paso for $21.1 billion in cash and stock. (New York Times)
  Occupy Wall Street protests:
  - Activists affiliated with the Occupy Wall Street movement, which opposes economic
    inequality and corporate greed, take to the streets in numerous cities worldwide,
    including Sydney, Rome, Bucharest, Taipei, Tokyo, Toronto, Berlin, and Madrid,
    in a day of coordinated mass protests. (BBC) (Xinhua) (Seattle Times) (BusinessWeek)
    (Maclean's) (Wall Street Journal) (Toronto Sun) (Times of India) (BusinessWeek)
    (San Diego Union-Tribune) (BusinessWeek) (HuffingtonPost)
  - Riot police clash with protesters in Rome, with at least 70 people reportedly
    injured after masked rioters infiltrate the peaceful protests and attack property
    in the city. (BBC)
  Sport:
  - France defeats Wales 9-8 in the 2011 Rugby World Cup semi-final at Eden Park in
    Auckland, New Zealand. (The Telegraph)
  - The Netherlands becomes the first European country to win a professional world
    baseball championship since 1938, after defeating Cuba 2-1 in the 2011 Baseball
    World Cup final in Panama City, Panama. (Nu.nl)
