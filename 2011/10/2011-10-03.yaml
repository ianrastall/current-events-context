Date: '2011-10-03'
Source_URI: Portal:Current events/2011 October 3
Intelligence_Payload:
  Armed conflict and attacks:
  - A mosque in the Israeli village of Tuba-Zangaria is torched. (Haaretz)
  North Caucasus insurgency:
  - Two police officers are killed in a suicide car bombing in Kizilyurt, Dagestan,
    Russia. (CNN)
  Business and economy:
  - The United States Supreme Court announces that it won't hear a much-noted dispute
    on the width of the "first sale" doctrine in copyright law. (Washington Post)
  Disasters:
  - Eight people are injured following an explosion and fire at a factory in Surrey,
    United Kingdom. (BBC)
  Law and crime:
  - An Italian appeals court overturns Amanda Knox's 26-year sentence for murder and
    sexual assault. (The Telegraph) (CBC News)
  - A US court sentences two more Somali pirates to life in prison for capturing a
    yacht off the coast of Africa in February. (AFP via Google News)
  Politics:
  - Helle Thorning-Schmidt presents her new coalition government, thereby becoming
    the 41st and the first female Prime Minister of Denmark. She takes over the office
    from Lars Løkke Rasmussen. (Winnipeg Free Press)
  - Advocates for prisoners in the US state of California claim that more than 12,000
    inmates are now participating in a hunger strike over prison conditions. (Los
    Angeles Times)
  Science:
  - Bruce Beutler of the US, Jules A. Hoffmann of France and Ralph Steinman of Canada
    (posthumously) share the Nobel Prize in Physiology or Medicine for research into
    the immune system. (AP via New Zealand Herald) (BBC)
  Sport:
  - US golfer Tiger Woods drops out of the top 50 in the world ranking for the first
    time in nearly 15 years, ending a streak of 778 consecutive weeks inside the top
    50, dating to when Woods was No. 61 on October 13, 1996. (Los Angeles Times)
