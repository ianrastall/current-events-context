Date: '2011-10-01'
Source_URI: Portal:Current events/2011 October 1
Intelligence_Payload:
  2011 Libyan civil war:
  - In the heavily besieged city of Sirte, heavy fighting continues as aid workers
    from the International Committee of the Red Cross deliver desperately needed medical
    supplies. Due to growing fears of a humanitarian disaster, National Transitional
    Council (NTC) forces have granted safe passage to European aid workers' vehicles.
    (Reuters)
  Law and crime:
  - Malik Mumtaz Hussain Qadri, the self-confessed assassin of Pakistani politician
    Salmaan Taseer, is sentenced to death by a Pakistani court. (Express Tribune)
  Politics:
  - China calls on Myanmar to protect interests of Chinese companies after President
    Thein Sein halted the controversial Chinese-backed Myitsone Dam project. (Reuters)
    (Spokesperson's remarks)
