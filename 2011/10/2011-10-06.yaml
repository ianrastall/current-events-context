Date: '2011-10-06'
Source_URI: Portal:Current events/2011 October 6
Intelligence_Payload:
  Arts and culture:
  - Swedish poet Tomas Tranströmer is awarded the 2011 Nobel Prize in Literature.
    (Nobel Foundation) (The Guardian) (The Washington Post)
  Business and economy:
  - Production at the Japanese plants of carmaker Toyota returns to normal following
    the 2011 Tōhoku earthquake and tsunami. (Kyodo)
  - The Bank of England injects a further £75bn into the British economy through quantitative
    easing. (BBC)
  Disasters:
  - Tropical Storm Jova forms off the Pacific coast of Mexico. (NHC)
  International relations:
  - South Korea rejects North Korea's demands that two citizens from the north who
    crossed the border be repatriated. (Yonhap)
  Law and crime:
  - The trial of Ichirō Ozawa, a powerful faction leader in the ruling Democratic
    Party of Japan, over a political funding scandal begins today in Japan. (AFP via
    Google News)
  Politics and elections:
  - Voters in Canada's most populous province Ontario go to the polls for a general
    election with the Ontario Liberal Party, led by Dalton McGuinty, winning another
    term under a slight minority government.(The Globe and Mail) (CTV)
