Date: '2011-10-27'
Source_URI: Portal:Current events/2011 October 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - 18 people are killed and at least 36 wounded by twin bombings in the Iraqi capital
    Baghdad. (Belfast Telegraph)
  - A bomb explodes in a food market in the Pakistani city of Peshawar, injuring at
    least 11 people. (Washington Post)
  Aftermath of Libyan civil war:
  - The United Nations Security Council confirms that the NATO-enforced no-fly zone
    over Libya will be terminated on October 31. (Montreal Gazette) (BBC)
  - The lawyer acting for the family of former Libyan dictator Muammar Gaddafi, who
    was killed on October 20, announce they will file war crime complaints against
    NATO in the International Criminal Court. (CNN)
  Business and economy:
  - Trading on the Australian Stock Exchange is suspended for four hours due to a
    technical fault. (News Limited) (Herald-Sun)
  - The Bank of Korea reports that the South Korean economy grew at the slowest rate
    in three quarters. (Yonhap)
  Eurozone rescue deal:
  - Reports indicate that European private banks have agreed to accept a 50% loss
    on Greek bonds, therefore removing the last apparent roadblock to a solution for
    the European sovereign debt crisis. (AP via Atlanta Journal-Constitution)
  - European Union leaders agree to a deal to reduce Greece's debts and provide an
    additional 100 billion euros for a bailout fund. (AP via USA Today)
  Disasters:
  - The death toll from the 2011 Van earthquake in Turkey reaches 523, with rain and
    snow making conditions worse for people left homeless by the earthquake. (AP via
    Seattle Post-Intelligencer)
  - Twelve thousand people are evacuated from the German city of Halle, following
    the discovery of an unexploded World War II-era bomb. (Big pond News)
  2011 Thailand floods:
  - Tens of thousands of people attempt to flee the Thai capital Bangkok as floodwaters
    rise. (News Limited)
  - The Governor of Bangkok, Sukhumphand Baripatra, urges people in the flood-threatened
    Sai Mai District to evacuate. (Bangkok Post)
  Law and crime:
  - Scottish serial murderer Robert Black is convicted of the 1981 murder of Northern
    Irish schoolgirl Jennifer Cardy. (BBC)
  Politics and elections:
  - Dr Giles Fraser, the canon chancellor of London's St Paul's Cathedral, announces
    his resignation from the post, as police prepare to remove Occupy London protesters
    from the cathedral's churchyard. Dr Fraser said he could not condone the use of
    violence against the demonstrators. (BBC) (The Guardian)
  - The moderate Islamist Renaissance Party (Nahda) officially wins the Tunisian Constituent
    Assembly election, gaining more than 41% of the vote and securing 90 of the 217
    parliamentary seats being contested. (BBC)
  - Nayef bin Abdul-Aziz Al Saud, the Saudi Arabian Minister of the Interior, is named
    as the new Crown Prince of Saudi Arabia, following the death of Sultan bin Abdul-Aziz
    Al Saud on October 22. (AP via Washington Post)
  Elections in Ireland:
  - Voters go to the polls to elect a successor to Mary McAleese in a presidential
    election. (RTÉ News) (The New York Times)
  - Voters also go to the polls in two constitutional referendums on the Twenty-ninth
    Amendment and Thirtieth Amendment, with the Irish Council for Civil Liberties
    saying the information provided to voters in advance was "tardy and inadequate".
    (The Irish Times)
  Science:
  - Researchers in the United Kingdom use a pioneering gene therapy technique to treat
    sufferers of ocular defects such as retinal choroideremia. (BBC)
  Sports:
  - The St. Louis Cardinals defeat the Texas Rangers 10-9 in the 11th Inning of Game
    6 of the World Series. The win forces Game 7, also to occur in St. Louis, Missouri.
    (Washington Post)
