Date: '2011-10-07'
Source_URI: Portal:Current events/2011 October 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - The ongoing allied war in Afghanistan marks its tenth anniversary, with the death
    toll among ISAF personnel reaching 2,670. (AFP via Sydney Morning Herald)
  Disasters:
  - At least 35 people are killed in an expressway accident in the north Chinese port
    city of Tianjin, while another 10 are killed in a 24-car pileup in the Lianyungang–Khorgas
    Expressway's Anhui section. (Xinhua) (China Daily)
  International relations:
  - The Norwegian Nobel Committee announce the winners of the Nobel Peace Prize in
    Oslo, with the prize being shared between the President of Liberia Ellen Johnson
    Sirleaf, Liberian activist Leymah Gbowee and Yemeni women's rights activist Tawakkol
    Karman. (AFP via Google News) (News Limited)
  - A South Korean presidential aide warns that North Korea could conduct a third
    nuclear weapons test if disarmament negotiations do not resume. (Yonhap)
  Law and crime:
  - The NYPD busts a Queens-based identity theft and retail crime ring, arresting
    over 110 people. It was the largest identity theft ring in the history of the
    United States, making an annual profit of over $13 million. (New York Daily News)
    (Reuters)
  Politics and elections:
  - Alison Redford of the Progressive Conservatives is sworn in as the first female
    Premier of the Canadian province of Alberta. (CBC)
  - In the United States, the Occupy Wall Street protests spread from New York to
    other major cities. (Reuters) (BBC)
  Sport:
  - The Detroit Tigers defeat the New York Yankees in Game 5 of the 2011 American
    League Division Series. They move on to play the Texas Rangers in the 2011 ALCS.
    (New York Times)
  - The Milwaukee Brewers defeat the Arizona Diamondbacks in Game 5 to move onto the
    2011 National League Championship Series. (USA Today)
  - Spanish torero ('bullfighter') Juan José Padilla is gored by a bull in Zaragoza,
    almost dying from his injuries. (Daily Mail)
