Date: '2011-10-08'
Source_URI: Portal:Current events/2011 October 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Libyan civil war: After a lengthy and bloody siege, National Transitional
    Council forces approach the center of the city of Sirte, facing heavy resistance
    from troops loyal to the ousted dictator Muammar Gaddafi. (Channel 4 News)'
  - Rocket fire and gunshots are reported in the Afghan city of Kandahar. (Xinhua)
  International relations:
  - The United Nations High Commissioner for Refugees opens a new refugee camp in
    western Ethiopia for refugees from Sudan and South Sudan. (BNO News)
  Law and crime:
  - Indonesian police arrest four people in connection with the suicide bombing of
    a mosque in Cirebon, West Java. (Jakarta Post)
  Sport:
  - In horse racing, the Australian mare Black Caviar ties the record set by Phar
    Lap for consecutive victories, with an unbeaten run of 14 wins. (ABC News Australia)
  - In rugby league, Leeds Rhinos win the European Super League Grand Final at Old
    Trafford by defeating St Helens 32-16. (BBC)
  Transportation:
  - Stages 4 and 5 of Circle MRT line began operations, with all 12 stations along
    the Stage 4 and 5 of the MRT line from Caldecott to HarbourFront (except Bukit
    Brown) being opened at the same time operated by SMRT Trains Ltd.
