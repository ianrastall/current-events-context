Date: '2011-08-07'
Source_URI: Portal:Current events/2011 August 7
Intelligence_Payload:
  Armed conflict and attacks:
  - '2011 Yemeni uprising: Yemeni President Ali Abdullah Saleh leaves hospital in
    Saudi Arabia after injuries sustained during the ongoing uprising. (CNN)'
  - '2011 Libyan civil war: Rebels report more gains south of the capital Tripoli.
    (Reuters)'
  - '2011 Bahraini uprising: Two opposition MPs are released from prison. (Al-Masry
    Al-Youm)'
  - Fighting erupts in the Somali capital Mogadishu a day after al Shabaab rebels
    had reportedly left the city. (Reuters)
  - Australian French Resistance leader Nancy Wake dies in London at the age of 98.
    (Sydney Daily Telegraph)
  2011 Syrian uprising:
  - The Syrian army attacks the city of Deir ez-Zor according to opposition activists.
    (Al Jazeera) (BBC)
  - The Arab League calls on Syrian authorities to end the violence against civilians.
    (Kuwait News Agency) (Emirates 24/7)
  - Saudi Arabia withdraws its ambassador to Syria in protest at the violence. (BBC)
    (Al Jazeera)
  Disasters and accidents:
  - One person is killed and six are missing after a landslide in eastern Malaysia.
    (Xinhua)
  Law and crime:
  - 2011 London riots
  - The Metropolitan Police Service restores order in Tottenham, north London, after
    a riot on Saturday night in which twenty-six police officers were injured. (AFP
    via Hindustan Times) (BBC)
  - Outbreaks of looting and civil disorder are reported in a number of areas including
    Hackney, Brixton and Walthamstow. (The Guardian) (The Telegraph)
  - Nepal bans smoking in public places. [https://web.archive.org/web/20110808012552/http://www.straitstimes.com/BreakingNews/Asia/Story/STIStory_699698.html
    (Straits Times)
  Science and technology:
  - The Cambridgeshire Guided Busway, the longest guided busway in the world, opens
    after years of delays. (BBC)
