Date: '2011-08-12'
Source_URI: Portal:Current events/2011 August 12
Intelligence_Payload:
  Armed conflict and attacks:
  - Two bombers kill themselves in an attempted attack in the Philippines city of
    Kidapawan in Cotabato province. (Philippines Star)
  - '2011 Syrian uprising: Massive protests are planned against the President Bashar
    al-Assad, after recent raids by the Army. (Al Arabiya)'
  Business and economy:
  - Chinese Bullet trains on the Beijing–Shanghai High-Speed Railway are withdrawn
    and all sections of track are inspected following a recent crash. (Wall Street
    Journal)
  Law and crime:
  - The United States Court of Appeals for the Eleventh Circuit strikes down the health
    insurance mandate of President Barack Obama's Patient Protection and Affordable
    Care Act. (AP via Washington Post)
  Sport:
  - In rugby league, Darren Lockyer of the Brisbane Broncos plays his 350th match
    in first grade setting a new record for the National Rugby League. (Sydney Morning
    Herald)
  Disasters:
  - A passenger train derails at Baby, Piotrków County, Poland. One passenger is killed
    and 45 are injured. (BBC)
