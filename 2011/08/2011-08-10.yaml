Date: '2011-08-10'
Source_URI: Portal:Current events/2011 August 10
Intelligence_Payload:
  Armed conflict and attacks:
  - The People's Republic of China's first aircraft carrier, the refitted Soviet aircraft
    carrier Varyag, commences its first sea trial under the Chinese flag. (Bloomberg)
    (Reuters)
  - A US drone missile attack kills at least 18 people in Pakistan's North Waziristan
    district. (Dawn)
  Korean Peninsula:
  - The Yonhap news agency reports that sources have advised them that North Korea
    is plotting to assassinate Kim Kwan-jin, currently South Korea's defence minister.
    (Yonhap News)
  - North and South Korea exchange artillery fire near Yeonpyeong Island. (Bloomberg)
  Arts and culture:
  - The south ridge of Aoraki / Mount Cook, New Zealand's highest mountain, is renamed
    Hillary Ridge after Sir Edmund Hillary, the first man to conquer Mount Everest.
    (Reuters)
  Business and economy:
  - Stock markets in Asia and Australia continue to rebound after the United States
    Federal Reserve promises to keep interest rates near zero for two years. (CNBC)
  - The trade surplus of the People's Republic of China rises to US$31.5 billion in
    July, the highest level in two years. (Bloomberg)
  - Australia's Civil Aviation Safety Authority gives Tiger Airways the all clear
    to resume operations after a six-week suspension for safety violations. (Sydney
    Morning Herald)
  Law and crime:
  - Australian crime figure Judy Moran is sentenced to 26 years in jail for her part
    in the murder of Des "Tuppence" Moran in Melbourne with the actual murderer Geoffrey
    Armour also sentenced to 26 years. (Sydney Morning Herald)
  - News International phone hacking scandal
  England riots:
  - Rioting hits other English cities including Manchester, Salford, Liverpool, Nottingham
    and Birmingham, though London is largely quiet. (BBC)
  - The Prime Minister of the United Kingdom, David Cameron, holds another cabinet
    meeting to discuss responses to the riots with police authorised to use water
    cannon and rubber bullets. (CNN) (The Guardian)
  - Police from Scotland are sent to England to help combat riots and disorder. (BBC)
  - Former News of the World news editor Greg Miskiw is arrested, then later bailed
    as the investigation into phone-hacking continues. (BBC)
