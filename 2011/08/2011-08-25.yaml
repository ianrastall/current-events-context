Date: '2011-08-25'
Source_URI: Portal:Current events/2011 August 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - More than 50 people are killed in an attack on a casino in Monterrey, Nuevo León,
    Mexico. (BBC News) (AP via Youtube)
  - Libya's National Transitional Council announces plans to move its headquarters
    to Tripoli following the capture of the city from Muammar Gaddafi. (AFP via The
    Australian)
  - 17 rockets and mortars are fired from Gaza at southwestern Israeli cities. 2 people,
    one of them a nine-month-old baby, are hurt in the attack. (Arutz Sheva)
  Arts and culture:
  - Gunmen attack prominent Syrian political cartoonist Ali Farzat, beating him badly
    and breaking both of his hands, with the beating believed to be related to cartoons
    critical of President of Syria Bashar Assad and his family. (AP via Boston Globe)
  Business and economy:
  - Berkshire Hathaway, the conglomerate headed by Warren Buffett, announces a plan
    to invest $5 billion in Bank of America. (DealBook)
  Disasters:
  - At least 19 people are feared dead in Zimbabwe after a haulage truck and bus collide
    (Radio VoP)
  - The RAF gives the Red Arrows clearance to fly again following Saturday's fatal
    crash at the Bournemouth Air Festival, but cannot confirm if they will fly at
    similar events this year. (BBC)
  - '2011 Pacific typhoon season: At least one person in the Philippines is missing
    and several towns are flooded as a result of Typhoon Nanmadol which is now heading
    for Taiwan. (Washington Post)'
  Hurricane Irene:
  - New York City announces its plans to shut down subways, buses and commuter trains
    ahead of the likely arrival of Hurricane Irene. (NBC News)
  - The US city of Norfolk, Virginia declares a mandatory evacuation of lowlying areas
    by 8am Saturday morning. (Norfolk Government)
  Law and crime:
  - London's Metropolitan Police Service says that it has now made over 2,000 arrests
    in connection with the riots which occurred in London. (BBC)
  - A 61-year-old man is arrested after making threats to the British Conservative
    Party MP Louise Mensch via email and social networking sites. (BBC)
  - Police in Austria have arrested an 80-year-old man for allegedly imprisoning and
    sexually abusing his two daughters over a period of 40 years. (BBC)
  Politics:
  - Former Iranian Prime Minister Mir-Hossein Mousavi is hospitalized after a heart
    attack. (Balatarin)
  - A protester is arrested for throwing a paint bomb at British Deputy Prime Minister
    Nick Clegg as he arrives at a Liberal Democrats party meeting in Glasgow. (BBC)
  Sports:
  - The New York Yankees hit three grand slam home runs in a single game, the first
    time such a feat has occurred, to win over the Oakland Athletics. (The New York
    Times)
