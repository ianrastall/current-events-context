Date: '2011-08-06'
Source_URI: Portal:Current events/2011 August 6
Intelligence_Payload:
  Armed conflict and attacks:
  - '2011 Syrian uprising: The Gulf Co-operation Council urges an end to the "bloodshed"
    in Syria, and calls for reforms. (Al Arabiya)'
  - The Islamist al-Shabaab rebels in Somalia pull out of the capital Mogadishu. (BBC)
  - Police in Saudi Arabia shoot dead a gunman who fired at the palace of Prince Nayef
    bin Abdul-Aziz Al Saud in Jeddah. (Al Jazeera)
  - A NATO Chinook helicopter crashes in the Sayd Abad district of Afghanistan's Wardak
    province after being shot down by the Taliban with 37 deaths. (Dawn) (New York
    Times)
  - At least 20 of the U.S. Navy SEALs killed in the attack were members of SEAL Team
    Six, the unit that carried out the operation that killed Osama Bin Laden. The
    Associated Press and CNN later reported that none of the unit members that participated
    in the raid were involved. (AP)
  Law and crime:
  - English rioters set police cars on fire on the High Road in the London suburb
    of Tottenham after Metropolitan Police shot Mark Duggan on Thursday. (BBC)
  Disasters and accidents:
  - 500,000 people are evacuated in eastern China as Typhoon Muifa approaches. (Channel
    NewsAsia)
  International relations:
  - Asylum seekers at the Christmas Island Immigration Reception and Processing Centre
    off the Indian Ocean coast of Western Australia start a hunger strike in protest
    at their deportation to Malaysia. (The West Australian)
  Culture:
  - Ilya Shikshin won the European Go Championship
