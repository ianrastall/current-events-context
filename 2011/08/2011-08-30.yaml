Date: '2011-08-30'
Source_URI: Portal:Current events/2011 August 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three suicide bombings leave 9 dead and 20 wounded in Grozny, the capital of the
    Republic of Chechnya, Russia. (CNN)
  - The Libyan National Transitional Council gives an ultimatum to supporters of Muammar
    Gaddafi in Sirte to surrender by the end of Eid ul-Fitr on Saturday. (The Scotsman)
  Arts and culture:
  - Muslims celebrate Eid ul-Fitr marking the end of Ramadan, the month of fasting.
    In Indonesia, however, the government rules that the end of Ramadan should be
    delayed one day. (Wall Street Journal) (Hindustan Times)
  Business and economy:
  - Lehman Brothers Holdings Inc. asks a bankruptcy court to let creditors vote on
    a reorganization plan that would pay its creditors, on average, $0.20 on the dollar.
    (Reuters)
  Disasters:
  - Monsoonal rain causes heavy floods in the Indian state of Gujarat. (IBN Live)
  - Nineteen coal miners are rescued from a flooded pit in China's Heilongjiang Province.
    (Xinhua)
  - At least 25 people are killed and thousands displaced due to floods in Ibadan,
    southwest Nigeria over the weekend.
  - The Popocatepetl volcano south of Mexico City starts spewing ash into the sky.
    (AP via Washington Post)
  - A TTC bus collides with a hydraulic crane mounted on a construction truck on Lawrence
    Avenue Toronto, killing one and injuring thirteen, in the first such incident
    since the Russell Hill subway accident in 1995. (Globe and Mail) (Vancouver Sun)
    (The Hamilton Spectator)
  Hurricane Irene:
  - The death toll from Hurricane Irene reaches 40 in the contiguous United States
    plus three people in the Dominican Republic and one in Puerto Rico. (NZ Stuff)
    (Associated Press)
  - The New England state of Vermont suffers its worst flooding in 100 years. (Associated
    Press)
  - The U.S. state of New Jersey suffers extensive flooding with Passaic County, Mercer
    County and Middlesex County worst affected. (International Business Times)
  Law and crime:
  - While reportedly on his way to surrender to police in Atlanta, Georgia to face
    murder charges, former National Basketball Association player Javaris Crittenton
    is arrested by the FBI at John Wayne Airport in Orange County, California. (Associated
    Press via ESPN)
  Politics:
  - Kenneth E. Melson is replaced as the acting head of the United States Bureau of
    Alcohol, Tobacco, Firearms and Explosives as a result of a controversial gun trafficking
    operation called Operation Fast and Furious. (Washington Post)
  - Environmentalists, citing greenhouse gas emissions and risks of oil spills, including
    climatologist James Hansen are arrested outside the White House in Washington
    D.C. in a protest to urge President Barack Obama to reject TransCanada Corp.'s
    $7 billion proposed Keystone Pipeline extension from the Athabasca Oil Sands in
    northern Alberta in Canada to the US Gulf Coast. (AP via Sydney Morning Herald)(Bloomberg)
    (The Nation) (The New York Times) (NPR)
  New Japanese Prime Minister:
  - The Cabinet of former Prime Minister of Japan Naoto Kan resigns en masse following
    the election of Yoshihiko Noda as the presumptive Prime Minister. (Nikkei)
  - The Diet of Japan approves Noda as the new Prime Minister. |(Hindustan Times)
