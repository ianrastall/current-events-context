Date: '2011-08-14'
Source_URI: Portal:Current events/2011 August 14
Intelligence_Payload:
  Armed conflict and attacks:
  - '2011 Syrian uprising: Syrian Navy gunboats fire heavy machine guns targeting
    waterfront districts in Latakia, as ground troops and security agents backed by
    armor storm several neighborhoods. Up to 26 people are killed. (Haaretz) (Ynet
    News)'
  - Iran confirms the arrest of the second-in-command of the Kurdistan Workers' Party
    (PKK), Murat Karayılan, by the country's intelligence agency. (PressTV)
  - Anti-Muammar Gaddafi rebels make major progress in the 2011 Libyan civil war,
    advancing into Zawiya, only 50 km west of the capital city, Tripoli. (Reuters)
  Law and crime:
  - Egyptian activist Asmaa Mahfouz is charged with inciting violence in what seems
    to be a clear violation of human rights. (Al-Ahram) (Almasry Alyoum) (Associated
    Press) (Washington Post)
  - Six people are killed in a stabbing incident on the Channel Island of Jersey (BBC)
  - 2011 England riots
  - A third person is charged with the murder of three men hit by a car in Birmingham.
    (BBC)
  Politics:
  - Former Governor of Minnesota Tim Pawlenty announces the end of his campaign for
    the Republican Party nomination in the 2012 United States presidential election
    following a poor result in the Ames Straw Poll. (Washington Post)
  - Jhala Nath Khanal resigns as the Prime Minister of Nepal due to the failure of
    Nepalese political parties to adopt a constitution or end infighting. (AP via
    Houston Chronicle)
  Sport:
  - American golfer Keegan Bradley wins the United States 2011 PGA Championship at
    the Atlanta Athletic Club, defeating Jason Dufner in a playoff. (Atlanta Journal
    Constitution), (CBS Sports)
