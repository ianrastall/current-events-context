Date: '2011-08-16'
Source_URI: Portal:Current events/2011 August 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2011 Libyan civil war
  - National Transitional Council forces in Libya began cutting off supply lines to
    Tripoli after a 48 hour operation capturing key towns around the capital and surrounding
    the city. (Reuters via Yahoo) (Reuters via Yahoo)
  - The Israeli Air Force launches an air strike east of Gaza City, killing a Hamas
    gunman, in response to a rocket launched at Israel which landed in the Negev Desert.
    (Jerusalem Post)
  - A United States drone attack in the Pakistani province of North Waziristan kills
    four militants. (AFP via Dawn)
  Arts and culture:
  - BBC Magazines agrees a £12m deal to sell the Radio Times – together with ten other
    titles – to Exponent, owner of thetrainline.com.(BBC)
  Business and economy:
  - Australian airline Qantas announces that it will be cutting 1000 jobs while steel
    maker OneSteel announces the loss of 400 jobs. (AAP via News Limited)
  - The economy of Germany grows by only 0.1% in the second quarter of 2011, raising
    concerns about the European economy as a whole. (AP via Washington Post)
  Law and crime:
  - Indian social activist Anna Hazare is arrested in New Delhi ahead of a proposed
    fast against corruption. (IBN Live)
  - Detained illegal immigrants injure 15 policemen and 3 soldiers in a riot in Malta.
    (Times of Malta)
  News of the World phone hacking scandal:
  - MPs release a letter sent to News International in 2007 by former News of the
    World Royal editor Clive Goodman, in which he alleges senior staff at the newspaper
    were aware of phone hacking activities. (BBC)
  2011 England riots:
  - Two men who set up a Facebook site to incite violence during the riots are sentenced
    to four years imprisonment at Chester Crown Court. (BBC)
  Politics:
  - Chinese Vice-Premier Li Keqiang visits Hong Kong on a three-day official tour;
    observers indicate that this solidifies his status as the next Premier of China.
    (Wall Street Journal)
  Sports:
  - Former Brazilian football star Zico signs a contract to manage the Iraq national
    football team. (SAG)
  Other:
  - In Canada, the Canadian Forces Maritime Command and the Canadian Forces Air Command
    are restored to their pre-1968 service titles, the Royal Canadian Navy and the
    Royal Canadian Air Force respectively. At the same time, the Canadian Forces Land
    Forces Command is redesignated the Canadian Army. (BBC)
