Date: '2011-08-27'
Source_URI: Portal:Current events/2011 August 27
Intelligence_Payload:
  Armed conflict and attacks:
  - Dozens of dead bodies are found at the Abu Salim Hospital in Tripoli which had
    been abandoned by medical staff earlier in the week when it came under heavy gunfire.
    (NPR)
  Hurricane Irene:
  - At least 65 million people on the East Coast of the United States will be in the
    direct path of Hurricane Irene over the next few days. (News Limited)
  - Hurricane Irene makes landfall in the U.S. state of North Carolina near Cape Lookout.
    (Washington Post) (ABC News)
  - At least 4 people die in North Carolina as a result of Hurricane Irene. (CBS News)
    (CNN)
  Politics:
  - The Parliament of India debates the Jan Lokpal anti-corruption legislation, prompted
    in part by an ongoing hunger strike by social activist Anna Hazare. (Hindustan
    Times)
  - Voters in Singapore go to the polls for the presidential election. (Link TV) (AFP
    via Google News)
  - Hundreds of thousands of Canadians attend events and tributes across Canada in
    honour of Jack Layton, as an unprecedented state funeral is held. (CBC News)
  Sport:
  - In rugby union, the Australian Wallabies defeat the New Zealand All Blacks to
    win the 2011 Tri Nations Series. (3 News)
  - In cricket, the Leicestershire Foxes win the Friends Life T20 Cup, beating Somerset
    Sabres by 18 runs in the final. Both teams reached the final after winning a one
    over eliminator, the first time such decider had been used in the finals of the
    competition.
