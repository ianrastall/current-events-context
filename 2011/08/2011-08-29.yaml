Date: '2011-08-29'
Source_URI: Portal:Current events/2011 August 29
Intelligence_Payload:
  2011 Libyan civil war:
  - The National Transitional Council in Libya raises concerns about mass killing
    of political prisoners by the former government. (AM via ABC News Online), (AP
    via France 24)
  - National Transitional Council fighters converge on Muammar Gaddafi's home town
    of Sirte. (Reuters)
  - Several members of the Gaddafi family are reported as having fled to Algeria.
    (BBC)
  Disasters:
  - Stock, bond and commodities markets open as usual in the United States despite
    the impact of Hurricane Irene on New York City. (Bloomberg)
  - Typhoon Nanmadol hits Taiwan after killing 11 people in the Philippines. (AP via
    Google News)
  - Floods hit northern India with transport services disrupted in Mumbai and 15 villages
    isolated in Maharashtra state. (NewsxLive)
  Politics and elections:
  - The ruling Democratic Party of Japan selects a replacement for Naoto Kan as party
    leader and Prime Minister of Japan with current Minister of Finance Yoshihiko
    Noda winning the ballot. (Wall Street Journal) (Reuters) (The Australian)
  - Baburam Bhattarai of the Unified Communist Party is elected as Prime Minister
    of Nepal by the Parliament. (Himalayan Times)
  - Alexander Ankvab is elected President of partially recognized Abkhazia during
    elections held on August, 26. The elections are characterised by the Western media
    and independent observers as "democratic", but not recognized by Georgia.(The
    New York Times)(Washington Post)(Taz)
  - Toomas Hendrik Ilves is re-elected by an electoral body to another term as President
    of Estonia. (Reuters)
