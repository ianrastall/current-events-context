Date: '2011-08-28'
Source_URI: Portal:Current events/2011 August 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 29 people are killed in a suicide bombing in Baghdad's largest Sunni
    mosque including Khalid al-Fahdawi, a member of the Council of Representatives
    of Iraq. (AP via Google News)
  Arts and culture:
  - The Notting Hill Carnival, the world's second largest street festival, gets underway
    peacefully in London with a heavy police presence due to recent riots. (The Guardian)
  - The 2011 MTV Video Music Awards conclude in Los Angeles with Katy Perry winning
    Video of the Year for Firework. (Entertainment Weekly)
  Disasters:
  - Typhoon Nanmadol kills eight people in the Philippines and is headed for Taiwan.
    (Taiwan News)
  - Five people are killed and at least 27 injured when a tram derails in the Santa
    Teresa neighborhood of Rio de Janeiro. (BBC)
  Hurricane Irene:
  - Effects of Hurricane Irene in New York
  - The storm reaches New York City with 370,000 people having been evacuated from
    low-lying areas. (AFP via Sydney Morning Herald)
  - A confirmed tornado in Delaware destroys a home and damages others. (ABC News)
  - At least five people died in Maryland as a result of Hurricane Irene. (International
    Business Times)
  - The state of Vermont is badly affected by the storm with the towns of Wilmington,
    Brattleboro and Dover all badly flooded and at least one death. (CNN)
  - Numerous covered bridges in Vermont are destroyed or damaged by flooding caused
    by Irene including a covered bridge in Quechee and the Bartonsville Covered Bridge
    near Rockingham, which was swept away by flooding. (The New York Times) (KHQ-TV)
  Law and crime:
  - The Government of the United Kingdom pledges to raise the issue of the murder
    of WPC Yvonne Fletcher, allegedly by a Libyan official outside the embassy in
    London in 1984, with the new government in Tripoli. (Press Association via Google)
  Politics:
  - Indian social activist Anna Hazare breaks a hunger strike after Parliament passes
    strong anti-corruption laws. (Times of India)
  - Tony Tan Keng Yam becomes the President-elect of Singapore after winning the presidential
    election. (Press Trust of India via Hindustan Times)
  - Nepal elects Baburam Bhattarai as its new Prime Minister. (CNN)
