Date: '2011-09-13'
Source_URI: Portal:Current events/2011 September 13
Intelligence_Payload:
  Armed conflict and attacks:
  - Investigators in Gothenburg, Sweden, now think that the four men arrested for
    the 2011 failed Gothenburg terrorist attack have links to the terrorist network
    Al-Qaida. (CBC)
  - Taliban insurgents attack the United States embassy, NATO headquarters and police
    buildings in the Afghan capital Kabul. (BBC)
  Economics and business:
  - U.S. bankruptcy court judge Mary Walrath rejects a reorganization plan submitted
    by Washington Mutual, holding that the Debtors erred by planning to pay senior
    debtholders a contract rate of interest rather than the federal judgment rate.
    (Wall Street Journal Online)
  Disasters:
  - 12.3 million people have been displaced and 11.2 million homes affected, as well
    as 1.7 million acres of fertile land inundated, in the wake of the monsoonal 2011
    Sindh floods in Pakistan. The death toll from the flooding currently stands at
    270. (Express Tribune)
  - At least 11 people are killed and over 228 injured in a collision between a bus
    and train in the suburb of Flores in the Argentine capital of Buenos Aires. (Buenos
    Aires Herald)
  - The Pagami Creek wildfire in the Boundary Waters Canoe Area Wilderness of the
    U.S. state of Minnesota spreads to over 100,000 acres, with smoke drifting across
    the Midwest. (Lakeland Times) (Duluth News)
  - Pakistani Taliban gunmen opened fire on a Peshawar school bus that kills 15 people.
    (The Guardian)
  Health:
  - Over 5,000 people have reportedly been infected by an outbreak of dengue fever
    in Pakistan. (ARY News)
  Politics and elections:
  - Voters in New York's 9th congressional district go to the polls for a special
    election to replace former member of the United States House of Representatives
    Anthony Weiner with Republican Bob Turner winning a tight race with Democrat David
    Weprin (New York Times) (The Atlantic Monthly) (AP)
  - Voters in Nevada's 2nd congressional district go to the polls for a special election
    to replace former member of the United States House of Representatives, Senator
    Dean Heller, with Republican Mark Amodei defeating Democrat Kate Marshall. (New
    York Times) (AP)
  - The date of the Venezuelan presidential election is set for 7 October, 2012. (BBC)
  - The British House of Commons Culture, Media and Sport Committee announces its
    intention to recall James Murdoch as its probe into the News International phone
    hacking scandal continues. (BBC)
  - The United Kingdom Boundaries Commission publishes proposals to redraw constituency
    boundaries in England and Northern Ireland to reduce the number of MPs in the
    House of Commons from 650 to 600 at the next general election. Proposals for Scotland
    and Wales will be announced later. (BBC)
  - Unions in the United Kingdom call on members to stage a nationwide "day of action"
    on 30 November in protest at changes to public sector pensions. (BBC)
