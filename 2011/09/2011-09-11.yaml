Date: '2011-09-11'
Source_URI: Portal:Current events/2011 September 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - A truck bomb at a military outpost in Wardak Province, Afghanistan, kills several
    civilians. (Miami Herald)
  - Police in Gothenburg, Sweden, arrest four people after a suspected failed terrorist
    attack. (Sky News)
  Tenth anniversary of the September 11, 2001 terrorist attacks:
  - Memorial ceremonies are held at New York's Ground Zero and elsewhere in the United
    States, to commemorate the tenth anniversary of the September 11 attacks. Ceremonies
    are also held worldwide to mark the anniversary of the attacks. (Yahoo News via
    AP)
  - The National September 11 Memorial, located on the site of the former World Trade
    Center, opens in New York City. (Daily Sundial)
  Disasters:
  - At least 22 people are dead in the Indian state of Orissa as a result of flooding.
    (IBN)
  Law and crime:
  - UK police raid the Greenacre caravan site in Leighton Buzzard, rescuing 24 men
    who had been held there as slaves in squalid conditions . (The Guardian)
  Politics and elections:
  - Voters in Guatemala go to the polls for a general election. (Christian Science
    Monitor)
  Sport:
  - In tennis, Samantha Stosur of Australia wins the Women's Singles in the 2011 US
    Open, defeating Serena Williams of the United States 6-2, 6-3. (New York Times)
