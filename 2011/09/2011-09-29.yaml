Date: '2011-09-29'
Source_URI: Portal:Current events/2011 September 29
Intelligence_Payload:
  Armed conflict and attacks:
  - '2011 Yemeni uprising: Heavy fighting is reported in the northern suburbs of Sana''a,
    Yemen''s capital. (Reuters)'
  Business and economy:
  - Maple Group, a consortium of Canadian concerns, says it is extending its bid to
    take over Canada's largest stock market operating company, TMX Group. (Reuters)
  Disasters:
  - 2011 Pacific typhoon season
  - The Hong Kong Stock Exchange closes as Typhoon Nesat nears China's Hainan Island
    with schools, transport services and government offices also closing. (Bloomberg)
    (Reuters) (AFP via The Australian)
  - China upgrades its emergency response to deal with two typhoons, Nesat and Nalgae,
    expected to hit over the next few days. (People's Daily)
  - The death toll in the Philippines from Typhoon Nesat rises to 35 with dozens missing.
    (AFP via Herald Sun)
  - Eighteen people are feared dead after a small plane crashes in the Bohorok region
    of Indonesia's North Sumatra province. (AP via San Jose Mercury News)
  Law and crime:
  - Australian criminal Matthew Johnson is found guilty of the murder of drug boss
    Carl Williams in Victoria's Barwon Prison. (ABC News Australia) (Melbourne Herald-Sun)
  - The United Kingdom's Department for Transport announces a consultation process
    on raising the motorway speed limit to 80mph (128km/h). (BBC) (Sky News)
  Politics:
  - The German Bundestag votes to approve the European Financial Stability Facility.
    (The Guardian)
  Science:
  - The People's Republic of China successfully launches the Tiangong 1 space laboratory,
    the country's first space station module, from the Jiuquan Satellite Launch Center
    in Gansu Province. (China Daily)
  Sport:
  - Iran beats China 3-1 to win the 2011 Asian Men's Volleyball Championship held
    in Tehran. (Asianvolleyball)
