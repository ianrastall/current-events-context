Intelligence_Payload:
  2011 Chilean Air Force CASA 212 crash:
  - Four bodies are recovered from the ocean after an airplane of the Chilean Air
    Force crashed near Robinson Crusoe Island on Friday. (CBC)
  - The Chilean Minister of National Defense Andrés Allamand Zavala confirms that
    all 21 passengers of the flight died in the crash, including TV presenter Felipe
    Camiroaga. (La Tercera)
