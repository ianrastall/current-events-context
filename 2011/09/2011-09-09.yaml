Date: '2011-09-09'
Source_URI: Portal:Current events/2011 September 9
Intelligence_Payload:
  Arab Spring:
  - '2011 Yemeni uprising: Over a million people protest against Yemeni President
    Ali Abdullah Saleh in one of the Yemeni opposition''s largest protests. (CNN)'
  - '2011 Syrian uprising: Syrians engage in mass Friday protests against the Syrian
    government, calling on the international community for assistance against President
    Bashar al-Assad''s regime. (Al Jazeera)'
  - About 3,000 Egyptian protesters storm the Israeli embassy in Cairo.(CNN)
  Disasters:
  - A 6.4 magnitude earthquake occurs off the coast of Vancouver Island in Canada's
    British Columbia province. (Victoria Times Colonist)
  Science:
  - Australopithecus sediba skeletons found at the Cradle of Humankind site in South
    Africa are dated at 2 million years old, suggesting that the hominid species could
    be a transitional fossil between apes and humans. (The Australian)
  Sport:
  - In rugby union, the 2011 Rugby World Cup begins in New Zealand, with New Zealand's
    All Blacks playing Tonga's Sea Eagles in Auckland. (The Telegraph)
