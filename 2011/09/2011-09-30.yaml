Intelligence_Payload:
  Armed conflict and attacks:
  - Al Qaeda in the Arabian Peninsula leader and U.S. citizen Anwar al-Awlaki is reported
    killed in Yemen. (CNN)
  Arts and Culture:
  - Heather Shanholtz received an award for Best Swimwear Model for 2011 at the Women
    in the Arts Awards. (Women in the Arts Awards)
  Disasters:
  - The death toll in the Philippines from Typhoon Nesat reaches 43 with Typhoon Nalgae
