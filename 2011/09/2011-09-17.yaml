Date: '2011-09-17'
Source_URI: Portal:Current events/2011 September 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Libyan civil war: forces loyal to deposed Libyan dictator Muammar Gaddafi
    launch a counter-attack against opposition fighters in the towns of Bani Walid
    and Sirte. (Al-Jazeera)'
  Disasters:
  - At least three people are killed and 25 injured in a train crash near the Alawwa
    railway station, 60 kilometres north of Colombo in Sri Lanka. (AFP via News Limited)
  - The US National Transportation Safety Board begins its investigation into Friday's
    Reno air crash, which killed at least three people and injured dozens. (BBC)
  - A North American T-28 Trojan crashes at an air show at the Eastern WV Regional
    Airport near Martinsburg, West Virginia, killing the pilot. (The Journal of Martinsburg)
    Aviation Safety Network
  - A strong 6.6 magnitude earthquake and a series of aftershocks occur off the coast
    of Honshu in Japan. (AFP via Hindustan Times)
  International relations:
  - Former Prime Minister of Thailand Thaksin Shinawatra visits Cambodia for high-level
    talks with the government of Cambodia over a variety of issues, including the
    ownership of the disputed Preah Vihear Temple. (Voice of America)
  - Two people in Finland are held for investigation into alleged involvement in international
    terrorist activities. (CNN)
  Law and crime:
  - Tanzanian authorities charge four people with negligence in relation to the Zanzibar
    ferry sinking that cost at least 240 lives on September 10. (AP via New York Times)
  Politics and elections:
  - Hundreds of United States citizens rally to peacefully occupy Wall Street, demonstrating
    against corporate dominance and perceived tax evasion by the super-rich. The movement
    is reportedly inspired by the periodic protests tactic of the Arab Spring. (Al-Jazeera)
  - Voters in Latvia go to the polls for a parliamentary election. (NPR)
  Television:
  - Cookie Jar TV on CBS Premieres of Danger Rangers and The Doodlebops
  - 'The Hub Season Premiere of My Little Pony: Friendship Is Magic'
