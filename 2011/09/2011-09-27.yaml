Date: '2011-09-27'
Source_URI: Portal:Current events/2011 September 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - An explosion destroys the Arab Gas Pipeline in Egypt's Sinai Peninsula supplying
    natural gas to Jordan and Israel. (Reuters)
  - Australian Minister for Defence Stephen Smith announces that women will be serving
    in frontline-combat roles in the Australian military within five years. (ABC News
    Online)
  - Abu Sayyaf gunmen attack pro-government militia in the township of Sumisip on
    Basilan Island in the Philippines, with six people reported killed and five wounded.
    (AP)
  - A suicide bomber kills at least two people in the city of Lashkar Gah in Afghanistan's
    Helmand Province. (AP via Forbes)
  North Caucasus insurgency:
  - One policeman and seven civilians die as a result of car bombing in the Republic
    of Dagestan, Russia. (Reuters)
  2011 Syrian uprising:
  - The Syrian Army launches an attack on the town of Rastan near the city of Homs.
    (Reuters via Alertnet)
  Business and economy:
  - Visitors to Australia face delays as Australian Customs and Border Protection
    Service staff go on strike over a pay dispute. (Daily Telegraph)
  - South Korea's Financial Services Commission announces plans to pump more money
    into suspended local savings banks. (Yonhap News)
  - Thousands of airline passengers are stranded at Ninoy Aquino International Airport
    in Manila after Philippine Airlines staff stage a walkout. (Philippines Star)
  - Defence company BAE Systems confirms almost 3,000 jobs will be lost among its
    UK workforce. (Sky News)
  - The board of LCH.Clearnet, an independent European clearing house, reportedly
    approves of a takeover proposal by the London Stock Exchange. (Reuters)
  Disasters:
  - Typhoon Nesat hits the island of Luzon in the Philippines with at least sixteen
    deaths, 100,000 people evacuated and the capital Manila brought to a standstill.
    (AFP via Inquirer) (Reuters) (AP via Fox News) (AFP via Sydney Morning Herald)
  - More than 80 people have died and more than two million affected by floods in
    India with the states of Orissa, Uttar Pradesh and Bihar worst affected. (BBC)
  - At least 37 people are killed, including 30 schoolchildren, and another seventy
    critically injured following a school bus accident at Kallar Kahar in the Punjab
    province of Pakistan. (Express Tribune)
  - One miner is killed and another injured following an underground roof collapse
    at Kellingley Colliery in North Yorkshire, one of the United Kingdom's deepest
    remaining mines. (BBC)
  International relations:
  - Israel approves the construction of 1,100 homes in the Jewish settlement of Gilo
    on the outskirts of Jerusalem. (BBC)
  Law and Crime:
  - CEOs of Iranian Melli Bank and Saderat Bank resign from their positions as a result
    of $2.6 billion bank fraud. (TABNAK)
  - Fugitive hijacker George Wright is caught in Portugal, thirty-nine years after
    he and members of the Black Liberation Army took control of Delta Air Lines Flight
    841 and flew it to Algeria. (CNN)
  - The trial of Dr Conrad Murray for manslaughter in connection to the death of American
    singer Michael Jackson begins in California. (ABC News America)
