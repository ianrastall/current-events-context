Date: '2011-09-25'
Source_URI: Portal:Current events/2011 September 25
Intelligence_Payload:
  Armed conflict and attacks:
  - A suicide bombing near a church in Central Java, Indonesia, kills at least two
    people and injures several others. (BBC)
  - Four consecutive bombings kill at least 10 people and injure 70 others in the
    Iraqi city of Karbala. (CNN)
  - The United Nations Security Council urges all sides in the 2011 Yemeni uprising
    to "show maximum restraint". (Al Jazeera)
  - Gunfire is reported at a Central Intelligence Agency (CIA) compound in the Afghan
    capital Kabul. (BBC)
  Disasters:
  - A Buddha Air flight taking tourists to see Mount Everest crashes in Nepal, killing
    19 people. (AFP via Sydney Morning Herald)
  - An out-of-control forest fire near the Canadian town of Fort McMurray in Alberta
    causes the closure of Highway 63. (Vancouver Sun)
  Law and crime:
  - At least five people are shot dead in two locations in the US state of Indiana.
    (AP via ABC News America)
  Politics:
  - Senate elections in France result in a left-wing majority, headed by the Socialist
    Party, for the first time in the history of the Fifth Republic. (Le Monde)
  - King Abdullah of Saudi Arabia announces reforms giving women the right to vote
    and run in municipal elections. (BBC)
  - The Prime Minister of Jamaica Bruce Golding announces plans to step down as soon
    as the Jamaica Labour Party announces its new leader in December. (Go Jamaica)
  Sport:
  - In athletics, Patrick Makau Musyoki of Kenya breaks the world record for the marathon
    at the Berlin Marathon, pending official ratification by the International Association
    of Athletics Federations. (AP via the Wall Street Journal)
  Television:
  - CBS Season Premieres of CBS News Sunday Morning, 60 Minutes, The Amazing Race
    and The Good Wife
