Date: '2011-09-10'
Source_URI: Portal:Current events/2011 September 10
Intelligence_Payload:
  Disasters:
  - The MV Spice Islander I, a passenger ferry, sinks off the coast of Zanzibar, leaving
    at least 187 people dead. (BBC) (Daily Telegraph)
  - U.S. President Barack Obama declares a state of emergency in the state of Texas,
    amid wildfires that have already destroyed at least 1,300 homes. (CNN)
  Politics:
  - G8 nations pledge at least $40 billion to help Arab countries reconstruct and
    implement democracy following the turmoil of the Arab Spring. (BBC)
  Post-Mubarak transition in Egypt:
  - Protesters storm the Israeli embassy in Cairo, forcing the Israeli ambassador
    to Egypt to flee. (Sydney Morning Herald)
  - The Supreme Council of the Armed Forces, the ruling military junta of Egypt, declares
    a national state of emergency. (Businessweek.com)
  Sports:
  - In boxing, Vitali Klitschko defeats Tomasz Adamek by technical knockout to retain
    the WBC Heavyweight Championship of the World in Wrocław, Poland. (Taipei Times)
  - 'In mixed martial arts, Daniel Cormier and Josh Barnett advance to the finals
    of the Strikeforce World Grand Prix Heavyweight Tournament by defeating Antônio
    "Bigfoot" Silva and Sergei Kharitonov, respectively, at Strikeforce: Barnett vs.
    Kharitonov in Cincinnati, Ohio, US. (Sherdog)'
