Date: '2011-09-21'
Source_URI: Portal:Current events/2011 September 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Yemeni uprising: Yemeni government forces break a recently-established ceasefire
    by firing mortar rounds at mourners at the funerals of protesters. (AP via The
    Australian)'
  - Parts of the Pakistani city of Quetta observe a shutdown in response to the killing
    of 29 Shiite protesters on Tuesday. (Daily Times)
  Arts and culture:
  - US rock band R.E.M. announce they are splitting up. (The Telegraph)
  Business and economy:
  - Google+, the social network service developed by search engine giant Google, is
    released to the general public. (Wall Street Journal via The Australian)
  - United Technologies Corporation announced that it reached an agreement to purchase
    Goodrich Corporation, manufacturer of spacecraft attitude control systems, for
    US$18.4B. (United Technologies)
  Disasters:
  - Indonesian search and rescue agencies continue to search for survivors after a
    boat sinks off the coast of Bali, with 11 people confirmed dead and 14 missing.
    (Straits Times)
  - Typhoon Roke bears down on northeastern Japan, with four people reported dead
    due to flooding. (Chicago Sun Times)
  - The death toll from the 2011 Sikkim earthquake rises above 100. (News Limited)
    (Voice of America)
  International relations:
  - The governments of North Korea and South Korea meet but fail to reach an agreement
    on the resumption of Six-party talks on North Korea's nuclear weapons program.
    (AP via Fox News)
  - South Korean religious leaders leave for North Korea on a rare visit. (Yonhap)
  - Two American hikers, Shane Bauer and Josh Fattal, are set free on bail by Iran
    as a humanitarian gesture, after being detained in prison for over two years under
    allegations of espionage. (Chron)
  - Turkey signs an accord with North Cyprus to explore for oil and gas in the Mediterranean
    in response to a decision by the Government of Cyprus to drill for oil. (AFP via
    Google)
  Troy Davis case:
  - The United States Supreme Court decides to delay the execution of Troy Davis,
    superseding the Georgia State Board of Pardons and Paroles rejection of the request
    for death row clemency. (ABC News) (USA Today)
  - Shortly thereafter, the United States Supreme Court refuses to delay the execution
    of Troy Davis; Davis' execution goes ahead as scheduled. (Washington Post) (Atlanta
    Journal Constitution)
  Sports:
  - The Union Cycliste Internationale (UCI) announces that the United States will
    host the 2015 UCI World Championships in Richmond, Virginia. (Richmond Times-Dispatch)
    (Associated Press)
