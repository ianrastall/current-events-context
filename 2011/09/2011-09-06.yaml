Date: '2011-09-06'
Source_URI: Portal:Current events/2011 September 6
Intelligence_Payload:
  Arts and culture:
  - English musician PJ Harvey wins her second Mercury Prize for best album from the
    United Kingdom and Ireland for her album Let England Shake. (New York Times)
  Disasters:
  - A Russian Air Force Mikoyan MiG-31 crashes in Perm Krai in the Ural Mountains.
    (RIA Novosti)
  - A wildfire destroys at least 118,500 acres and destroys over 700 homes in Central
    Texas since Saturday with two deaths. (CNN) (Houston Chronicle)
  - A tropical storm watch is in place for Bermuda as Hurricane Katia gets closer.
    (National Hurricane Centre)
  Economics:
  - The Swiss National Bank introduces a minimum exchange rate of 1.20 CHF/EUR to
    prevent the overvaluation of the Swiss franc. (BBC)
  Law and crime:
  - Margaret Moran, the former British Labour Party MP for Luton South is charged
    on 21 counts relating falsely claiming Parliamentary expenses. (BBC)
  - A mass shooting at an International House of Pancakes restaurant in Carson City,
    Nevada, leaves four dead, including the shooter, and six wounded. (AP)
  News International phone hacking scandal:
  - Four former News International executives are recalled by the House of Commons
    Culture, Media and Sport Select Committee to face further examination over phone
    hacking within the organisation. (BBC)
