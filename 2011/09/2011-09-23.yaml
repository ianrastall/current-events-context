Date: '2011-09-23'
Source_URI: Portal:Current events/2011 September 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Yemeni uprising: The President of Yemen, Ali Abdullah Saleh, returns from
    Saudi Arabia after a three-month absence, amid an increase in political unrest
    and violence in Yemen. (Al-Jazeera)'
  - Thousands of mourners gather in Kabul for the funeral of former President of Afghanistan
    Burhanuddin Rabbani, who was killed by a suicide bomber earlier in the week. (BBC)
  Business and economy:
  - Global stock markets fall for a second day amid fears of a deepening economic
    crisis. (Sydney Morning Herald) (Bloomberg) (CNBC) (Sky News)
  - Thousands of Toyota workers in Australia go on strike over a pay dispute. (ABC
    News Australia)
  - Fitch Ratings predicts that financial returns on commercial property in the United
    States will stabilize, though slowly, in the months ahead. (Reuters)
  Disasters:
  - Floods in the Filipino province of Maguindanao affect 16,000 families. (Inquirer)
  International relations:
  - Israeli–Palestinian conflict
  - During the opening of the General Assembly of the United Nations, the President
    of the Palestinian National Authority, Mahmoud Abbas, makes a bid for UN recognition
    in a unilateral declaration of a Palestinian state, which would exist in the Gaza
    Strip and the West Bank, and have East Jerusalem as its capital. (Washington Post)
    (Sky News)
  - The quartet of Middle East negotiators - the United States, European Union, Russia
    and the United Nations - call on both Israel and Palestine to resume negotiations.
    (BBC)
  Law and crime:
  - South Korean prosecutors raid the offices of seven savings banks whose operations
    were suspended last week, with the president of one bank committing suicide. (Yonhap)
  Politics:
  - Patriotic Front leader Michael Sata is declared the winner of the Zambian presidential
    election. (BBC)
  - The United States House of Representatives passes a resolution providing funding
    for the Government through to November 18, but the Senate vows to reject it, making
    a government shutdown from October 1 possible. (Washington Post)
  Science:
  - NASA's 1991-era Upper Atmosphere Research Satellite is expected to fall from orbit
    sometime this evening Greenwich Mean Time. (BBC)
