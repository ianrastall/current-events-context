Date: '2011-09-28'
Source_URI: Portal:Current events/2011 September 28
Intelligence_Payload:
  Armed conflict and attacks:
  - The Prime Minister of New Zealand John Key announces that a second New Zealand
    Special Air Service soldier has died in fighting in Afghanistan. (Xinhua)
  Business and economy:
  - Greek transport workers commence a two-day strike over the latest austerity measures
    passed by the Hellenic Parliament overnight. (ABC News Australia)
  - The first Boeing 787 Dreamliner arrives in Tokyo, Japan, to commence service with
    All Nippon Airways. (AFP via Sydney Morning Herald)
  Disasters:
  - The United States Centers for Disease Control and Prevention links an outbreak
    of listeriosis that has caused 13 deaths and 72 illnesses in 18 states to infected
    cantaloupes from Colorado. (CNN)
  - Residents and authorities in the Philippines clean up after Typhoon Nesat which
    killed at least 20 people, most in and near the capital Manila. (AP via The Guardian)
    (AP via The Star-Tribune)
  - A stampede on a docked ferry in Indonesia's East Java province results in eight
    deaths and dozens more injured. (TV New Zealand)
  - The Chinese city of Shanghai shuts down line 10 of its metro system and slows
    down train speed following a collision that injured 271 people. (Bloomberg via
    Business Week)
  - The iconic sport and concert venue K.B. Hallen, Copenhagen from 1938 burns down.
    (Copenhagen Post)
  International relations:
  - Japan asks South Korea to block plans to build a monument to Korean World War
    II "comfort women" near the Japanese embassy in Seoul. (Yonhap)
  Law and crime:
  - Australian newspaper columnist Andrew Bolt loses an action in the Federal Court
    of Australia in relation to breaches of the Racial Discrimination Act in columns
    about nine prominent aborigines. (The Australian)
  - The FBI arrests Rezwan Ferdaus, a 26-year-old American citizen, for plotting to
    fly remotely-controlled planes filled with explosives into The Pentagon and the
    United States Capitol in Washington, D.C. (BBC)
  Politics:
  - Henry Tang resigns as the Chief Secretary for Administration in Hong Kong with
    the expectation that he will run for Chief Executive of Hong Kong in next year's
    election. (Bloomberg via Business Week)
  Sport:
  - In baseball, the St. Louis Cardinals and the Tampa Bay Rays qualify for wild card
    positions in the playoffs for the 2011 Major League Baseball season, while the
    Philadelphia Phillies complete their season with 102 wins, breaking their franchise
    record set in 1976 for most wins in a season. (AP via Wall Street Journal) (Atlanta
    Journal Constitution) (CSN Philly)
