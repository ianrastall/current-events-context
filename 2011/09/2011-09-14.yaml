Date: '2011-09-14'
Source_URI: Portal:Current events/2011 September 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - More than twenty people are killed and scores injured in attacks in Iraq, including
    16 people killed in a car bombing in Babil Province. (AP via Washington Post)
  Taliban attack on Kabul:
  - A Taliban attack on the centre of the Afghan capital Kabul ends with 11 people
    dead. (The Telegraph)
  - The United States Secretary of Defense Leon Panetta warned that the United States
    would retaliate against the Pakistan-based Haqqani network of terrorists that
    it believes was responsible. (AFP via Google News)
  Arts and culture:
  - Archaeologists in the US state of Maryland claim to have found a fort in the Zekiah
    Swamp in Charles County built to protect the "friendly" Piscataway Indians in
    1680. (Baltimore Sun)
  Business and economy:
  - Robert Zoellick, the President of the World Bank, claims that the world economy
    has entered the "danger zone", with the United States, European Union and Japan
    having to make tough decisions. (Reuters)
  Disasters:
  - Tropical Storm Maria is strengthening in the Atlantic Ocean with a hurricane watch
    issued in Bermuda for when it arrives either late tonight or tomorrow. (National
    Hurricane Centre via NOLA)
  Law and crime:
  - The acquittals of former Premier of Western Australia Brian Burke, former Cabinet
    Minister Julian Grill and former public servant Nathan Hondros on corruption charges
    are overturned by the Court of Appeal in Perth, with the three set to face a retrial.
    (AAP via Sydney Morning Herald)
  - A French Appeals Court clears former Prime Minister Dominique de Villepin of charges
    of involvement in a smear campaign against current President Nicolas Sarkozy.
    (Irish Times)
  - Paul Tiensten, a former Minister in Papua New Guinea, flees to Australia after
    being summonsed in East New Britain Province to face charges of fraud and corruption.
    (AAP via The Australian)
  - Two days after his release from prison, British Conservative peer Lord Hanningfield
    is arrested on suspicion of fraudulently claiming expenses during his time as
    leader of Essex County Council. (BBC)
  - In a court case concerning the theft of Kevlar-related trade secrets, DuPont is
    awarded US$920 million in damages.(BBC)
  Politics and elections:
  - The Australian government's Minister for Broadband, Communications and the Digital
    Economy, Stephen Conroy, announces an inquiry into the national media. (SBS)
  Science:
  - NASA announces plans for a Space Launch System to replace the Space Shuttle program
    with the first flight tentatively scheduled for 2017. (New York Times)
