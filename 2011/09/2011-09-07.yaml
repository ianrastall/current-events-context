Date: '2011-09-07'
Source_URI: Portal:Current events/2011 September 7
Intelligence_Payload:
  Armed conflict and attacks:
  - At least eleven people are killed following bombings in the Pakistan city of Quetta.
    (Dawn)
  - A bomb explosion outside the Delhi High Court in the Indian court in New Delhi
    kills at least nine people and injures another 45. (AP via Forbes) (Reuters via
    ABC News Australia)
  Arts and culture:
  - ICM Registry – the company that sponsors the .xxx Internet top-level domain for
    adult entertainment, planned for launch in 2012 – is giving organisations and
    people in the public eye the opportunity to block their names from being used
    by websites with the suffix. (BBC)
  Business and economy:
  - The economy of Australia recovers, achieving 1.2% growth in the second quarter
    after floods led to a contraction of .9% in the second quarter. (Dow Jones via
    The Australian)
  - The Swedish car maker Saab Automobile files for bankruptcy in a self-managed reconstruction
    process. (AP via Forbes)
  Disasters:
  - A Yak Service Yak-42 carrying the KHL hockey team Lokomotiv Yaroslavl crashes
    near Yaroslavl, Russia, killing 44. (Lenta.ru)
  - Tropical Storm Nate is set to arrive at the Atlantic coast of Mexico tonight or
    tomorrow morning. (National Hurricane Centre)
  Tropical Storm Lee remnants in the northeastern United States:
  - Ten thousand people are ordered to evacuate in Broome County in the US state of
    New York due to flooding of the Chenango River and the Susquehanna River. (Press
    Connects)
  - Flash flood warnings are issued in Washington DC, Virginia and Maryland. (Washington
    Post)
  - Heavy rain in the middle of Pennsylvania causes 1000 students in the Derry Township
    School District to be stranded at the Hershey Middle School. (Patriot News)
  International relations:
  - The Prime Minister of India Manmohan Singh and the Prime Minister of Bangladesh
    Sheikh Hasina sign an accord ending four decades of disputes over the borders
    of India and Bangladesh. (IBN Live)
  Politics:
  - Scottish First Minister Alex Salmond unveils a legislative programme for the coming
    year which includes plans to create a single police force and a single fire service
    for Scotland. (BBC)
  - Republican Party candidates in the 2012 US presidential election hold a debate
    in California's Simi Valley. (AP)
