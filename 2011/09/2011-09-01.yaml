Date: '2011-09-01'
Source_URI: Portal:Current events/2011 September 1
Intelligence_Payload:
  Armed conflict and attacks:
  - At least four people, including a high-ranking security service officer, are killed
    in a series of bombings and shootings across Russia's North Caucasus. (Voice of
    America)
  - '2011 Libyan civil war: Libya''s National Transitional Council extends the deadline
    for tribal leaders in Muammar Gaddafi’s hometown of Sirte to surrender in order
    to avoid further fighting. (The Christian Science Monitor)'
  - Three Pakistani soldiers and one Indian soldier are killed following an attack
    by Indian border forces on a Pakistani checkpost along the Line of Control. (Express
    Tribune)
  Arts and culture:
  - The remains of Australian bushranger Ned Kelly are found in the former HM Prison
    Pentridge in Melbourne, Victoria. (The Courier-Mail)
  - Protesters from the Palestine Solidarity Campaign disrupt a concert given by the
    Israel Philharmonic Orchestra for the BBC Proms at London's Royal Albert Hall.
    (BBC)
  Business and economy:
  - The world's largest food group, Nestlé SA, opens a new production unit in Konolfingen,
    Switzerland, and its CEO affirms that the company is committed to its home country,
    despite problems created by the unusually strong Swiss franc against the euro.
    (Reuters)
  - Former Dutch Minister of Economic Affairs and Minister of Education, Culture and
    Science, Maria van der Hoeven, takes office as Executive Director of the International
    Energy Agency. (Wall Street Journal)
  Disasters:
  - Louisiana Governor Bobby Jindal declares a state of emergency after Tropical Storm
    Lee forms in the northern Gulf of Mexico. (CNN)
