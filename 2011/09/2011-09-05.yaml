Date: '2011-09-05'
Source_URI: Portal:Current events/2011 September 5
Intelligence_Payload:
  Armed conflict and attacks:
  - Turkish air force strikes kill four members of the PKK in Northern Iraq. (Yahoo)
  - One person is killed and two injured by Iranian artillery shelling near the Iraqi
    border town of Siydah Khan, near Arbil. (Reuters)
  - Sky News reports that 30,000 Libyans may be missing as a result of the civil war.
    (Sky News)
  - A mosque in the Palestinian village of Kasra, north of Jerusalem, is attacked
    overnight, residents say. (BBC)
  - The government of Pakistan reports the arrest of senior Al-Qaeda chief Younis
    al-Mauritani. BBC
  - A convoy of troops loyal to former Libyan leader Muammar Gaddafi crosses the border
    with Niger arriving in Agadez. (Associated Press)
  Disasters:
  - Rescuers in Japan look for survivors of Typhoon Talas, which has killed at least
    35 people, with the Wakayama Prefecture on the Kii Peninsula the worst affected.
    (AP via Google News) (Japan Times)
  - The 2011 Somalian famine, which has killed 30,000 children and tens of thousands
    more adults, spreads to the Bay Region of Somalia. (New YorK Times)
  2011 Atlantic hurricane season:
  - Approximately 5,000 people are evacuated from their homes near the U.S. city of
    Austin, Texas, with wildfires caused in part by Tropical Storm Lee causing concerns
    in other parts of the state. (Xinhua) (Austin Statesman) (USA Today)
  - Hurricane Katia strengthens to Category 4 strength but no warnings are in place.
    (National Hurricane Centre)
  - The remnants of Tropical Storm Lee cause flooding in parts of the Southern United
    States. (USA Today)
  International relations:
  - South Korea announces that it will start sending emergency aid to North Korea
    next week after devastating floods. (Yonhap)
  Law and crime:
  - The trial of former French President Jacques Chirac on embezzlement charges begins
    in Paris. (AFP via France 24)
  - Turkish hackers gain access to the websites of several companies, including Vodafone,
    the Daily Telegraph and UPS, redirecting visitors to a site set up by the group.
    (BBC)
  Politics:
  - The President of the United States Barack Obama kicks off his re-election campaign
    with an appearance at the AFL–CIO Labor Day parade in the city of Detroit. (Washington
    Times)
  - In the United Kingdom the first wave of independent state-funded schools, known
    as free schools, open their doors as the new academic year begins. (BBC)
  Television:
  - American Network is Changing to Tiin
