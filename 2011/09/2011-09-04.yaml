Date: '2011-09-04'
Source_URI: Portal:Current events/2011 September 4
Intelligence_Payload:
  Armed conflict and attacks:
  - At least 24 people are killed in violence across Syria. (The Times of India)
  Disasters:
  - Tropical Storm Lee makes landfall near the US city of Lafayette, Louisiana, with
    the Gulf Coast hit by tornados. (Reuters)
  - Wildfires continue to burn in the US state of Texas, destroying tens of thousands
    of acres of land. (The Statesman)
  Politics and elections:
  - Voters in the German state of Mecklenburg-Vorpommern go to the polls for a state
    election with the Social Democrats and Greens performing well and the Christian
    Democrats and Free Democrats performing poorly. (PA via Google News)
  Sport:
  - Sonya Thomas wins the United States Chicken Wing Eating Championship by consuming
    183 Buffalo wings in twelve minutes. (Buffalo News)
  2011 World Championships in Athletics:
  - The United States tops the medal count at the World Championships. (Yonhap News)
  - The Jamaican 4x100-meter relay team of Nesta Carter, Michael Frater, Yohan Blake
    and Usain Bolt sets a new world record. (Yonhap)
  Science:
  - The Emperor penguin who was washed up on a New Zealand beach in June is released
    back into the Southern Ocean. (BBC) (New Zealand Herald)
