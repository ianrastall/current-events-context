Date: '2011-09-02'
Source_URI: Portal:Current events/2011 September 2
Intelligence_Payload:
  Armed conflict and attacks:
  - The South Korean military resumes building a naval base on the island of Jeju-do
    after police clear the site of protesters. (Yonhap)
  Business and economy:
  - A court in Düsseldorf orders Samsung to stop selling its new tablet computer,
    Galaxy Tab, acting on a lawsuit brought by Apple. (Reuters)
  2010 Gaza flotilla raid:
  - Turkey expels Israel's ambassador and cancels all military agreements with Israel,
    hours before a UN report investigating the raid is published. (BBC) (The New York
    Times)
  - The UN report finds that the IDF acted 'legitimately' in trying to enforce Israel's
    blockade of the Gaza Strip, except for the lack of a final warning to the activists
    and the use of "excessive" force. (Jerusalem Post)
  Politics:
  - The Prime Minister of Japan Yoshihiko Noda announces his new Cabinet with Jun
    Azumi as Minister of Finance and Kōichirō Genba as Minister for Foreign Affairs.
    (AFP via Google News)
