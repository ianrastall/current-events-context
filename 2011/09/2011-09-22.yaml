Date: '2011-09-22'
Source_URI: Portal:Current events/2011 September 22
Intelligence_Payload:
  Armed conflict and attacks:
  - At least five people are killed in a bus bombing in Pakistan's Bajaur Agency.
    (Xinhua)
  Business and economy:
  - World stock markets plunge amid growing global fears of recession. (Sky News)
  - Facebook makes major changes to its social networking interface, updating its
    profile page, adding an app store, and amending its news feed with a "timeline"
    feature. (CNN) (MSNBC)
  - Hewlett-Packard fires CEO Léo Apotheker, replacing him with former eBay CEO Meg
    Whitman. (Wall Street Journal via The Australian)
  Disasters:
  - Typhoon Roke passes through the Japanese island of Honshu, causing 13 deaths,
    and arrives in Hokkaido. (AP via ABC News America)
  - At least four people are killed and 18 injured in a factory fire in the suburb
    of Dombivli in the Indian city of Mumbai. (IBN Live)
  - Heavy floods and related disasters across China, especially in the drainage basin
    of the Han and Wei Rivers, leave 90 dead and 22 missing. (Xinhua) (AFP via Google)
  - '2011 Pacific hurricane season: Hurricane Hilary reaches category 3 strength off
    the coast of Mexico, but is not expected to make landfall. (NHC)'
  International relations:
  - The Anniston Chemical Activity destroys its last mustard gas shells, becoming
    the fifth of nine US chemical weapons depots to close under terms of the Chemical
    Weapons Treaty. (Anniston Star)
  - Pope Benedict XVI commences a state visit to Germany. (The Telegraph)
  - China warns the United States over its proposed sale of newer versions of the
    General Dynamics F-16 Fighting Falcon to Taiwan. (Reuters)
  - Representatives of the United States and European nations walk out of the General
    Assembly of the United Nations during an accusatory speech by the President of
    Iran, Mahmoud Ahmadinejad. (AFP via The Australian)
  Law and crime:
  - The Federal Bureau of Investigation arrests suspected members of the computer
    hacking groups LulzSec and Anonymous in the US cities of Phoenix, Arizona and
    San Francisco. (Fox News)
  Politics and elections:
  - The first President of Cape Verde, Aristides Pereira, dies in Portugal at the
    age of 87. (Washington Post)
  - The Italian Chamber of Deputies rejects a request to arrest Marco Milanese, a
    former aide to the Minister of Economy and Finance, Giulio Tremonti, on corruption
    charges. (Bloomberg)
  - Tens of thousands of students protest in the Chilean capital Santiago for increased
    education expenditure. (AP)
  - Former television journalist Shelly Yachimovich is elected as the head of the
    Israeli Labor Party. (AP via Yahoo News)
  Science:
  - CERN researchers affiliated with the OPERA experiment report experimental results
    that appear to show neutrinos exceeding the speed of light. (BBC)
