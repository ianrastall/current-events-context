Date: '2011-09-18'
Source_URI: Portal:Current events/2011 September 18
Intelligence_Payload:
  Arab Spring:
  - '2011 Syrian uprising: Syrian activists call for mass protests in schools against
    the regime of President Bashar al-Assad as the school year begins. (Haaretz)'
  - '2011 Syrian uprising: Syrian opposition groups claim that at least four people
    have been killed across Syria. (CNN)'
  - '2011 Libyan civil war: Heavy fighting continues in the Libyan towns of Sirte
    and Bani Walid, with eight anti-Gaddafi fighters killed on Saturday. (BBC)'
  - '2011 Yemeni uprising: Witnesses claim that at least 26 people were killed and
    dozens wounded after security forces open fire on protesters in Sana''a. (AP via
    The Guardian)'
  Arts and culture:
  - The 63rd Primetime Emmy Awards for television programs broadcast in the United
    States are held in Los Angeles with Mad Men winning the outstanding drama series
    and Modern Family winning the Outstanding Comedy. (The Guardian) (USA Today)
  2011 Sikkim earthquake:
  - A magnitude 6.9 earthquake occurs in northwestern Sikkim, northern India, causing
    shaking in parts of India, Nepal, Bhutan, Bangladesh and Tibet Autonomous Region.
    At least thirty seven deaths are reported. (Times of India) (Bangladesh News 24
    Hours) (CNN) (The Australian)
  Law and crime:
  - Former head of the International Monetary Fund Dominique Strauss-Kahn gives his
    first television interview on the French television network TF1 since rape charges
    against him were dropped in New York City. (BBC)
  - Police in Brazil arrest two people in connection with the murder of environmental
    activist José Cláudio Ribeiro da Silva and his wife Maria do Espírito Santo in
    Pará State. (AP via Daily Bulletin)
  Politics and elections:
  - Negotiations begin as Latvian politicians seek to form a new government after
    yesterday's election, with the Social Democratic Party "Harmony" having won the
    most seats and Zatlers' Reform Party and Unity also doing well. (Reuters)
  - Sinn Fein announces that Martin McGuinness, current Deputy First Minister of Northern
    Ireland and former Irish Republican Army commander, will be a candidate for the
    Irish presidential election with John O'Dowd serving as acting Deputy First Minister.
    (Financial Times)
  Berlin election:
  - Voters in the German capital of Berlin go to the polls for a state election, with
    current mayor Klaus Wowereit and his Social Democrats doing well. (Reuters)
  - The Pirate Party enters a state parliament for the first time while the Free Democrats
    achieve 2% of the vote. (BBC)
  Sport:
  - In golf, Lexi Thompson of the United States becomes the youngest player to win
    a LPGA event winning the Navistar LPGA Classic at age 16. (USA Today)
