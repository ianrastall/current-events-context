Date: '2011-09-26'
Source_URI: Portal:Current events/2011 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011 Libyan civil war: Forces loyal to the National Transitional Council (NTC)
    enter Muammar Gaddafi''s stronghold of Sirte, as the NTC''s three-day assault
    on the city intensifies. (BBC)'
  - The President of Indonesia, Susilo Bambang Yudhoyono, orders the National Police's
    Detachment 88 counter-terrorism squad to investigate a recent suicide bombing
    in Solo, Java. (The Australian)
  Arts and culture:
  - Some of the Dead Sea Scrolls are published online in a joint project between Israel's
    national museum and Google. (AP)
  Business and economy:
  - Asian and European stock markets open lower in response to the ongoing sovereign
    debt crisis in Europe. (BusinessWeek) (Bloomberg) (IBN) (Sky News)
  Disasters:
  - More than 100,000 people in the Philippines are evacuated ahead of Typhoon Nesat,
    with Albay province lying directly in the storm's pathway. (AP via NineMSN)
  International relations:
  - Tuvaluan Prime Minister Willy Telavi signs an agreement to establish diplomatic
    relations with Abkhazia during an official visit to Sukhumi. (RNZI)
  Law and crime:
  - Six people appear in court on terrorism charges, a week after being arrested in
    the English city of Birmingham. (Reuters via ABC News Australia)
  - US actor Charlie Sheen settles his lawsuit with Warner Brothers and Two and a
    Half Men creator Chuck Lorre. (Hollywood Reporter)
  Politics:
  - About 300 students at Auckland University occupy a university building to protest
    increases in student fees. (New Zealand Herald)
  - Kenyan Nobel Peace Prize laureate Wangari Maathai dies while undergoing cancer
    treatment at the age of 71. (BBC)
  - The British Labour Party votes to scrap the tradition of Shadow Cabinet elections
    at their annual conference in Liverpool. (BBC)
  - The United States Senate reaches a temporary deal to avoid a government shutdown.
    (The Globe and Mail)
  - The Prime Minister of Spain José Luis Rodríguez Zapatero dissolves the Cortes
    Generales and calls a general election for November 20. (Fox News Latino)
