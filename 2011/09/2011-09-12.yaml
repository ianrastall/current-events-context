Date: '2011-09-12'
Source_URI: Portal:Current events/2011 September 12
Intelligence_Payload:
  Arts and culture:
  - The EU Council votes to extend the copyright on sound recordings from 50 to 70
    years. (BBC)
  - British comedian David Walliams completes a 140-mile charity swim along the River
    Thames, raising £1 million in aid of the BBC's Sport Relief. (BBC)
  - Leila Lopes of Angola is named Miss Universe 2011. (LA Late)
  Business and economy:
  - Stocks on Asian markets fall sharply due to renewed concerns over the Eurozone
    debt crisis. (Market Watch)
  - The UK's Independent Commission on Banking recommends that British banks should
    separate their retail banking divisions from investment banking arms to safeguard
    against riskier banking activities. (BBC)
  Disasters:
  - At least 75 people are killed by a petrol pipeline explosion in Nairobi, Kenya.
    (BBC)
  - At least 19 people die in a bus crash on the Indonesian island of Java. (Jakarta
    Post)
  - At least 240 bodies have been recovered off the coast of Zanzibar following Saturday's
    ferry sinking. (Xinhua)
  - An explosion occurs at the Marcoule nuclear power plant in southern France, killing
    one person and injuring four. (BBC)
  Law and crime:
  - Police in Kenya are searching for a gang who killed a British tourist and kidnapped
    his wife at a beachside resort. (BBC)
  - Former British Conservative peers Lord Taylor of Warwick and Lord Hanningfield
    are released early from prison sentences for fiddling parliamentary expenses.
    (BBC)
  Politics:
  - Bernard Hogan-Howe is named as the new Commissioner of London's Metropolitan Police.
    (BBC)
  Sport:
  - In tennis, Novak Djokovic of Serbia wins the Men's Singles at the 2011 US Open
    defeating Rafael Nadal of Spain 6-2, 6-4, 6-7 (3-7), 6-1. (New York Times)
