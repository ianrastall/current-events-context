Date: '2011-03-30'
Source_URI: Portal:Current events/2011 March 30
Intelligence_Payload:
  Armed conflict and attacks:
  - 2010–2011 Ivorian crisis
  Arab Spring:
  - 2011 Syrian protests
  - Bashar al-Assad, the Syrian president, addresses the nation amid unrest. (Al Jazeera)
    (AFP via Google News)
  - Syrian Army troops open fire on protesters in front of the mayor's office in Latakia.
    (USA Today)
  - 2011 Libyan civil war
  - Muammar Gaddafi's forces capture the town of Ra's Lanuf. (AFP via Google News)
  - After rebels retreat outside Ra's Lanuf, the coalition has begun launching air-strikes
    at Gaddafi's forces again. (Al Jazeera)
  - The British government confirms that the Libyan Foreign Minister, Moussa Koussa,
    has resigned and defected to Britain. (Al Jazeera) (BBC)
  - Reuters reports that the President of the United States Barack Obama has signed
    an order authorising covert help for the rebels. (Reuters)
  - 2011 Bahraini protests
  - Prominent Bahraini blogger Mahmood Al-Yousif is arrested as the 2011 Bahraini
    protests continue. (Global Voices Online)
  - UN Human Rights Watch announces that Bahrain authorities are harassing and isolating
    hospital patients wounded in anti-government protests. (The Independent) (UN Human
    Rights Watch)
  - Forces loyal to Alassane Ouattara enter Yamoussoukro, the capital of the Ivory
    Coast. (Al Jazeera) (AP via Houston Chronicle)
  Arts and culture:
  - 45,000 Inca artefacts taken by Yale University from Machu Picchu almost a century
    ago, and described by the president as "the dignity and pride of Peru", arrive
    in Lima after a long campaign by Peruvians to have them returned. (BBC)
  - The finalists for the Man Booker International Prize are announced, including
    Wang Anyi, Juan Goytisolo, James Kelman, John le Carré, Amin Maalouf, David Malouf,
    Dacia Maraini, Rohinton Mistry, Philip Pullman, Marilynne Robinson, Philip Roth,
    Su Tong and Anne Tyler. (Man Booker Prize)
  - The oldest copy of Codex Holmiensis, dating from 1280, is returned to Denmark
    after 300 years in Sweden. (Danish)
  - The orca Tilikum resumes performing shows at Seaworld Orlando 13 months after
    being involved in the death of trainer Dawn Blancheau. (ABC News America)
  - The former Governor of California Arnold Schwarzenegger returns to acting in an
    animated television series. (AP via MSNBC)
  - British Labour Party leader Ed Miliband announces that he is engaged to his partner
    Justine Thornton. (The Telegraph)
  Business and economy:
  - The Australian dollar reaches a 29 year high against the US dollar due to high
    demand for commodities. (BBC) (Market Watch)
  - Google announces plans to make the U.S. city of Kansas City, Kansas the first
    site in its ultra-high speed broadband network. (Google)
  - Obama Administration endorses Pickens plan for natural gas vehicles. (Dallas News)
  Disasters:
  - Fukushima I Nuclear Power Plant
  - The Tokyo Electric Power Co. says that it will scrap at least four units at the
    Fukushima I Power Plant and warns that fixing the problem will be a drawn out
    process. (Kyodo)
  - The United States and France announce plans to help Japan as Fukushima I nuclear
    accidents continue. (Reuters)
  - Flooding across southern Thailand results in eleven deaths with thousands of people
    stranded. (AFP via Channel News Asia)
  - The U.S. state of Washington issues flood warnings. (Komo News)
  - 19 people are trapped after a tunnel under construction collapses in southwest
    China. (The Straits Times)
  International relations:
  - Former U.S. President Jimmy Carter ends a three-day visit to Cuba, saying that
    the American trade embargo and travel ban has damaged the people and disrupted
    progress. (BBC)
  - Kuwait recalls its ambassador to Iran after it convicted three people on charges
    of spying for Iran. (Al Arabiya)
  - The South Korean military holds a live-fire drill on Yeonpyeong Island which was
    shelled by North Korea last year. (Yonhap)
  - The Yonhap news agency in South Korea reports that the People's Republic of China
    has reinforced fences and increased patrols along its border with North Korea
    in order to stop a flow of refugees. (AFP via Yahoo! News)
  Law and crime:
  - Three Filipinos are executed on drug charges in the People's Republic of China.
    (Yahoo! News Philippines)
  - A man suspected of being Umar Patek wanted for his alleged role in the 2002 Bali
    bombings is arrested in Pakistan. (The Australian)
  - Diamonds worth millions are stolen from the BaselWorld Watch and Jewellery Fair
    in Basel, Switzerland. (The Daily Telegraph)
  Politics:
  - The State Peace and Development Council military government is officially dissolved
    in Burma. (BBC)
  - Egypt's transitional government promises to hold the Egyptian presidential election
    by November. (Al Masry Al Youm)
  Science:
  - The first virophage virus found in a natural environment is discovered in Organic
    Lake in East Antarctica. (Nature) (PhysOrg)
  Sport:
  - Michael Clarke is announced as the captain of the Australia national cricket team
    in both test cricket and One Day Internationals replacing Ricky Ponting. (The
    Daily Telegraph)
  2011 Cricket World Cup:
  - The World Cup semi-final in Mohali between India and Pakistan is watched by over
    1 billion people as both countries come to a standstill and both prime ministers
    attend. (BBC News)
