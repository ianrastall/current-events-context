Date: '2011-03-29'
Source_URI: Portal:Current events/2011 March 29
Intelligence_Payload:
  Arab Spring:
  - 2011 Syrian protests
  - Bashar al-Assad, the Syrian president, accepts the resignation of the country's
    government, following two weeks of anti-government protests that have gripped
    Syria. However Muhammad Naji al-Otari, the resigning prime minister will continue
    to serve as caretaker Prime Minister. (Al Jazeera) (Syrian Arab News Agency) (SBS
    World News)
  - 2011 Libyan civil war
  - Sweden, a non-NATO member, adds eight JAS Gripen jetfighters to the international
    Libyan no-fly zone. (DU)
  - Gaddafi forces push back rebels who were gathered east of Muammar Gaddafi's hometown
    of Sirte. (Haaretz)
  - An international conference takes place in London, England, to discuss the military
    action and future of Libya. (Al Jazeera) (BBC)
  - Coalition forces bomb missile dumps in Tripoli. (CBS)
  - 2011 Bahraini protests
  - Bahrain's parliament accepts the resignations of 11 out of 18 Al-Wefaq MPs who
    stepped down on February 14, 2011 in protest at violence against pro-democracy
    demonstrators. (Bahrain News Agency)
  - 2011 Omani protests
  - Authorities in Oman arrest some protesters and clear blockades in the city of
    Sohar. (UPI)
  2010-2011 Ivorian crisis:
  - Fighters backing internationally recognised president Alassane Ouattara launch
    a "general offensive" in the west, centre-west and east of Ivory Coast. (France
    24)
  Business and economy:
  - The President of the Federal Reserve Bank of St. Louis, James Bullard, says that
    the continued purchase of U.S. Treasuries by the Federal Reserve is "feeding the
    fire" of inflation, and should be tapered off. (Reuters)
  - GE Energy To Buy 90% Stake In Converteam For $3.2Billion (WSJ)
  Disasters and accidents:
  - Around 4,000 bodies of people who died in the 2011 Tōhoku earthquake and tsunami
    in Iwate Prefecture, Miyagi Prefecture and Fukushima Prefecture remain unidentified.
    (Kyodo)
  - North Korea is reported to be on a state of high alert for radiation from the
    Fukushima I accidents. (Yonhap) (Sydney Telegraph)
  - Nine hospital patients in the US state of Alabama die after being treated with
    Intravenous therapy feeding bags with the manufacturer withdrawing the product.
    (AP via Montgomery Advertiser)
  International relations:
  - Local residents on Italy's southern islands protest over the arrival of more migrants
    from North Africa on boats. (Reuters) (AFP via Google News)
  - India and Pakistan agree to set up a "terror hotline" to share information about
    terror threats. (Channel News Asia) (Indian Express)
  Law and crime:
  - China arrests two activists on charges of subversion after calling for 'Jasmine'
    protests similar to those in the Middle East. (Straits Times) (Times Online Sri
    Lanka) (Bangkok Post)
  - Wanted Ugandan rebel leader Joseph Kony, leader of the Lord's Resistance Army,
    returns to eastern Democratic Republic of the Congo. (Reuters)
  - The Israeli Knesset approves an amendment to the Nationality Law in a 37-11 vote.
    The amendment empowers the Israeli court system to revoke the citizenships of
    Israeli citizens convicted of terrorism, aiding the enemy in wartime, causing
    war, serving in enemy forces or espionage.(Seattle Times) (Jerusalem Post)
  Politics:
  - Burma is to swear in a new President within two days, marking a transfer from
    military to civilian government. (Channel News Asia)
  - José Alencar, the former Vice-President of Brazil between 2003 and 2010, dies
    after a long battle of cancer. (BBC)
  Sport:
  - Ricky Ponting steps down as the captain of the Australian cricket team in both
    Tests and One Day Internationals. (Sportal)
  - Arrest warrants are issued for Tampa Bay Buccaneers cornerback Aqib Talib and
    his mother on charges of aggravated assault with a deadly weapon in Garland, Texas.
    (Tampa Tribune)
