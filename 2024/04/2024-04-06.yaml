Date: '2024-04-06'
Source_URI: Portal:Current events/2024 April 6
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Kharkiv strikes
  - A Russian drone strike on Kharkiv kills eight civilians and injures ten others.
    At least nine high-rise buildings and a petrol station are badly damaged. (Al
    Jazeera) (Reuters)
  - Syrian civil war
  - Eight children are killed and two more injured by a roadside bomb in Daraa Governorate,
    Syria. (AP)
  - Myanmar civil war, Karen conflict
  - The Karen National Union captures the town of Myawaddy in Kayin State as hundreds
    of junta troops surrender and hand over their weapons to rebel forces. (BBC News)
  - 2024 Central Asian floods
  - Orsk Dam collapse
  - Around 2,500 houses are flooded and at least four people are killed after the
    Orsk dam in Orenburg, Russia, bursts due to maintenance errors following heavy
    rainfall. Around 47,000 people in Russia and Kazakhstan are evacuated. Kazakh
    President Kassym-Jomart Tokayev calls it one of the "worst natural disasters in
    the past 80 years". (The Independent) (Het Laatse Nieuws) (Tass)
  - 2024 raid on the Mexican embassy in Ecuador
  - Nicaragua suspends diplomatic relations with Ecuador following the raid on the
    Mexican embassy in Quito, Ecuador. (Al Arabiya)
  - Mass shootings in the United States
  - 2024 Doral shooting
  - Two people, including the perpetrator, are killed and seven others are injured
    in a mass shooting at a bar in Doral, Florida, United States. (Reuters) (WFOR-TV)
  - 2024 Slovak presidential election
  - Slovaks vote in the second round of the presidential election between Ivan Korčok
    and Peter Pellegrini. Peter Pellegrini wins with over 53% of the vote. (France
    24) (BBC News)
  - 2023–24 Copa del Rey
  - In association football, Athletic Bilbao win their first major trophy in 40 years
    after defeating Mallorca in the Copa del Rey final. (The Guardian)
