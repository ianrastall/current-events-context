Date: '2024-04-08'
Source_URI: Portal:Current events/2024 April 8
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Battle of Chasiv Yar
  - Heavy fighting between Russian and Ukrainian troops occurs around the city of
    Chasiv Yar, with Ukraine describing the situation as "difficult" and "tense".
    (Al Jazeera)
  - Shelling kills three civilians in Huliaipole, Zaporizhzhia Oblast. (Al Jazeera)
  - Ukraine claims to have damaged the Russian Navy missile ship in the Baltic Sea
    near Kaliningrad. (Kyiv Independent)
  - War in Sudan
  - Humanitarian impact of the war in Sudan
  - Khartoum reports 384 cases of dengue fever which are attributed to the ongoing
    humanitarian crisis in Sudan. (Al Taghyeer)
  - Over 100 civilians in South Kordofan are killed after allies of the Rapid Support
    Forces launch attacks in villages across the state. (Dabanga Sudan)
  - Israel–Hamas war
  - Israeli invasion of the Gaza Strip, Rafah offensive
  - Israeli Prime Minister Benjamin Netanyahu says he has ordered an invasion of Rafah
    in the southern Gaza Strip with a date "being set" for the ground offensive. (The
    Telegraph) (NU.nl)
  - 2024 Iran–Israel conflict, Israel–Hezbollah conflict
  - Hezbollah shoots down an Israeli Hermes 900 drone, for the first time in the conflict.(Hareetz)
  - Protesters set fire to government buildings and dozens of vehicles in the Mexican
    state of Guerrero amid anger over the police killing of a college student in March
    and the kidnapping of 43 students in 2014. Governor Evelyn Salgado Pineda's office
    in Chilpancingo is ransacked. (AP)
  - Solar eclipse of April 8, 2024
  - A total solar eclipse occurs in North America for the first time since 2017. It
    is the last total solar eclipse to be visible in the contiguous United States
    until 2044. (Fox Weather)
  - 2024 NCAA Division I men's basketball tournament
  - In college basketball, Connecticut repeats as national champions, becoming the
    first program to do so since the Florida Gators did so in 2006 and 2007. (Patch)
