Date: '2024-04-10'
Source_URI: Portal:Current events/2024 April 10
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Kharkiv strikes
  - Russian airstrikes in Kharkiv Oblast kill at least three people and injure four
    others. (Reuters)
  - Odesa strikes
  - Four people are killed and seven others are injured in a Russian missile strike
    in Odesa. (Reuters)
  - Israel–Hamas war
  - An Israeli attack in Gaza kills three civilians related to Ismail Haniyeh. (Haaretz)
  - 2023–2024 video game industry layoffs
  - American video game company Epic Games announces that it will lay-off around 870
    employees, roughly one-sixth of its workforce, due to slower growth than expected.
    (CBC via Yahoo! News)
  - A bus carrying Eid Al-Fitr pilgrims collides and plunges into a ditch in Balochistan,
    Pakistan, killing seventeen people and injuring 16 others. (AP)
  - Five people are killed and 35 others are injured in a fire at the New Lucky House
    in Kowloon, Hong Kong. (Reuters)
  - A person is killed by flooding in Mississippi, United States, as severe weather
    hits the Southern United States. (CBS News)
  - 2024 South Korean legislative election
  - South Koreans vote for members of the National Assembly. The opposition, primarily
    consisting of the Democratic Party, its alliance and the Rebuilding Korea Party,
    wins the election in a landslide, increasing their legislative majority but falling
    short of the two-thirds supermajority needed to pass constitutional amendments
    or override the veto of President Yoon Suk Yeol. (Reuters)
  - 2024 United States presidential election
  - Cornel West names Melina Abdullah as his VP pick as part of his presidential campaign.
    (Politico)
