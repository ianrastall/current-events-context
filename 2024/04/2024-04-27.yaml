Date: '2024-04-27'
Source_URI: Portal:Current events/2024 April 27
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks in Russia during the Russian invasion of Ukraine
  - Ukraine says that it attacked two oil refineries and an airfield in Krasnodar
    Krai, Russia, using drones. (Al Arabiya) (Reuters)
  - Russian strikes against Ukrainian infrastructure
  - Russian missiles strike Ukrainian power plants and natural gas storage facilities
    in Lviv, Ivano-Frankivsk, and Dnipropetrovsk Oblasts. (Reuters) (Reuters)
  - Israeli–Palestinian conflict
  - A humanitarian aid flotilla headed for Gaza was halted in Turkey after Guinea-Bissau
    withdrew its flag from two out of three vessels. (Reuters)
  - Tornadoes of 2024
  - Tornado outbreak sequence of April 25–28, 2024
  - At least three fatalities are reported in Oklahoma as a tornado outbreak impacts
    the central United States. (CNN)(AP)
  - At least five people are killed and at least 33 others are injured by a tornado
    in Guangzhou, China. (CNN)
  - A magnitude-6.5 earthquake strikes off the southwestern coast of Java island,
    Indonesia. The epicenter of the earthquake was located about 150 kilometers away
    from Garut, West Java. At least four people are injured and some buildings are
    damaged. (The Jakarta Post)
  - A munitions truck explodes at a military base in Kampong Speu province, Cambodia,
    killing 20 soldiers and destroying multiple buildings. (Al Jazeera) (DW)
  - At least one person is killed in a stab attack in Koszalin's Rokosowo district,
    Poland. Łukasz R. was charged and arrested on April 29. (KoszalinInfo)
  - Crocus City Hall attack
  - Authorities in Russia arrest a fifth suspect in last month's attack on a music
    venue in Krasnogorsk, Moscow Oblast, Russia, a Tajik man accused of providing
    the attackers with financing and communication. (AP)
  - LGBT rights in Iraq
  - Iraq's parliament votes to criminalize same-sex relationships, to be punishable
    by a maximum of 15 years in prison. (Reuters)
  - Three police officers are killed during an ambush in Cañete, Chile, after receiving
    false emergency calls. They are shot dead before their vehicle is set on fire.
    (Reuters)
  - 2024 United States presidential election
  - 2024 Constitution Party presidential primaries
  - Randall Terry, an anti-abortion activist and candidate in the 2012 Democratic
    Party presidential primaries, wins the nomination for the Constitution Party.
    (Ballot Access News)
  - Elected British politicians who have changed party affiliation
  - Conservative MP Dan Poulter defects to the Labour Party. (BBC News)
  - Several Palmeiras players are attacked and injured by Corinthians fans during
    a pitch invasion at a futsal final in São Paulo, Brazil. (UOL)
