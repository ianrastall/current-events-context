Date: '2024-04-03'
Source_URI: Portal:Current events/2024 April 3
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Ukraine lowers the age of conscription from 27 years to 25. (The Guardian) (The
    New York Times)
  - The United States Army Corps of Engineers begins dredging the San Juan Bay in
    Puerto Rico to open space for a new natural gas terminal that is expected to add
    $400 million to the local economy. (AP News)
  - 2024 Hualien earthquake
  - A magnitude 7.4 earthquake strikes off the coast of Taiwan, prompting tsunami
    warnings for Okinawa Prefecture, Japan. A large section of the uninhabited Guishan
    Island collapses into the ocean. Nine people are killed in Taiwan, including four
    by rockfalls, with more than 930 others injured. (AP) (Al Jazeera)
  - Seven people, including two children are killed in a fire at a tailoring shop
    in Aurangabad, India. (AP News)
  - China–Philippines relations, Territorial disputes in the South China Sea
  - The Philippines says that it will respond to any Chinese attempts to interfere
    with its resupply of troops in the South China Sea. (Reuters)
  - Cross-Strait relations
  - The National Defense Ministry of Taiwan says that more than 30 Chinese PLA Air
    Force warplanes have entered Taiwanese airspace and that at least nine PLA Navy
    warships have been detected around Taiwan. The ROC Armed Forces are deployed in
    response to the violation. (Times Now News)
  - LGBT rights in Uganda
  - Uganda's Constitutional Court upholds the Anti-Homosexuality Act, 2023, which
    prescribes the death penalty for certain homosexual acts. (South China Morning
    Post)
  - Businesswoman Sam Mostyn is appointed as the next Governor General of Australia
    and will succeed David Hurley on 1 July. (Canberra Times)
