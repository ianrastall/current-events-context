    and a Swedish-Iranian citizen. (Al Jazeera)
  - Territorial disputes in the South China Sea
  - China issues new regulations allowing its national coastguard to detain foreigners
    accused of illegally entering China's claimed territorial waters and adjacent
    waters. (Al Jazeera)
  - 2024 French legislative election
  - Over 600,000 people march in cities across France to protest against the far-right
    National Rally party. (Reuters)
  - Honduran gang crackdown
  - Honduran President Xiomara Castro announces new measures to reduce gang activity
    in Honduras, including building a 20,000-capacity "megaprison" and plans to designate
    gang members as terrorists. (Al Jazeera)
  - Thousands of women march in São Paulo, Brazil, in protest of a bill that would
