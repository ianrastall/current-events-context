    fighting reportedly underway. (Al Arabiya)
  - Somali Civil War
  - Puntland–Somaliland dispute
  - Las Anod conflict
  - Somaliland imposes a curfew following a clash between soldiers and civilians that
    resulted in nine deaths and many injuries in Erigavo, Sanaag, Somaliland. (Idil
    News) (Hiiraan Online) (Horseed Media)
  - Arrest of Imran Khan
  - Six people, including four paramilitary soldiers, are killed in clashes between
    security forces and supporters of former Pakistani Prime Minister Imran Khan in
    Islamabad. The protesters, led by Khan's Pakistan Tehreek-e-Insaf party, are calling
    for Khan's immediate release from prison. (Reuters)
  - Unidentified gunmen ambush a group of motorcycle taxis returning from a religious
    ceremony in Bria, Haute-Kotto, Central African Republic, killing 10 people. (AP)
  - 2021–present United Kingdom cost-of-living crisis
  - Multinational car manufacturing company Stellantis announces that it will close
    its van-production factory in Luton, England, putting 1,100 jobs at risk, citing
    the UK's economic conditions and the government's zero-emission vehicle (ZEV)
    mandate as reasons for its closure. (The Guardian)
  - 2024 Red Sea tourist boat disaster
  - Four people are found dead and five others are rescued from a tourist boat that
    sank yesterday off the coast of Marsa Alam, Red Sea Governorate, Egypt. Seven
    others are still missing. (The Guardian)
  - Winter of 2024–25 in the Gaza Strip
  - A winter storm floods refugee camps across the Gaza Strip, leading to several
    thousands of shelters being damaged or destroyed, and worsening refugee exposure
    to cold and illness. (Reuters)
  - Five people are killed and 20 others are reported missing when a motorboat capsizes
    in Warri, Delta State, Nigeria. (Reuters)
  - Five people are killed and another is in critical condition when a Cessna 206
    Stationair aircraft crashes into the Pico Blanco mountain near San José, Costa
    Rica. (DW) (The Tico Times)
  - Censorship in Iraq
  - The Iraqi Ministry of Communications blocks access to the IMDb website, citing
    concerns of "immoral content". (Intellinews) (Shafaq News)
  - LGBT rights in Hong Kong
  - Chief justice Andrew Cheung of the Hong Kong Court of Final Appeal rules to uphold
    housing and inheritance rights for same-sex couples in the city. (Al Jazeera)
  - The Bangladesh Police fire tear gas at more than 2,000 Hindus protesting in Chittagong,
    Bangladesh, against the arrest of Chinmoy Krishna Das, a Hindu leader and ISKCON
    monk, on sedition charges. One is killed, and 27 are injured. (Hindustan Times)
    (Al Jazeera) (The Times of India)
  - Japanese space program
  - JAXA aborts an Epsilon S engine test after a fire occurs at the Tanegashima Space
    Center in Kagoshima Prefecture, Japan. (DW) (CNA)
  - Social media platform Bluesky says it will comply with rules set by the European
    Union after being accused of violating digital regulations under the Digital Services
    Act. (Luxemburg Times) (Bloomberg)
