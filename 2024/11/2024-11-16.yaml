Date: '2024-11-16'
Source_URI: Portal:Current events/2024 November 16
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Balochistan
  - Seven paramilitary soldiers are killed and 18 are wounded by a Balochistan Liberation
    Army attack on a checkpoint in Kalat District, Balochistan, Pakistan. (Reuters)
  - Miss Universe 2024
  - Danish model Victoria Kjær Theilvig is crowned Miss Universe, becoming the first
    Dane to win the competition. (CNN) (AP)
  - 2023–2024 mpox epidemic
  - California confirms its first case of Clade I mpox in a person who travelled to
    East Africa, becoming the first confirmed case of Clade I mpox in the United States.
    (Reuters)
  - At least 13 people are killed and 80 rescued after a building collapses in Dar
    es Salaam, Tanzania. (Reuters)
  - APEC Peru 2024
  - At the Asia-Pacific Economic Cooperation summit in Peru, outgoing U.S. President
    Joe Biden meets with Chinese President Xi Jinping for their final meeting before
    Biden leaves office on January 20th. During the meeting, Biden and Xi talk about
    topics like cyber crime, trade, Taiwan, and Russia. Xi also said that his team
    will work with the incoming Trump administration. (Reuters)
  - 2024 Wuxi stabbing attack
  - Eight people are killed and 17 others are injured in a stabbing spree at the in
    Yixing, Jiangsu, China. The suspect, a 21-year-old student, is arrested. (CNN)
    (Reuters)
  - A man barricades himself inside his father's restaurant in Issy-les-Moulineaux,
    France, taking restaurant employees as hostages. The hostages are later rescued
    and the man is arrested. (BFM TV) (The Jerusalem Post)
  - Argentina orders the arrest of 61 Brazilian citizens currently living in Argentina
    who are accused of participating in the January 8 Brazilian Congress attack. (Reuters)
  - 2024 Gabonese constitutional referendum
  - Citizens of Gabon vote on a proposed new constitution, including replacing the
    current semi-presidential system with a presidential system following the 2023
    coup. (DW)
