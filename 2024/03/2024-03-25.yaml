Date: '2024-03-25'
Source_URI: Portal:Current events/2024 March 25
Intelligence_Payload:
  Uncategorized:
  - Boko Haram insurgency
  - Seven Chadian soldiers conducting a patrol near Lake Chad are killed in an IED
    bombing. Chadian president Mahamat Déby accuses jihadist group Boko Haram of being
    behind the attack. (AP)
  - Seventeen people are killed and another is injured when a passenger van collides
    with a dump truck and catches fire in Antipas, Cotabato, Philippines. (AFP via
    Barron's)
  - Puerto Rico declares an epidemic of dengue fever following an increase in cases.
    (AP)
  - Israel–Hamas war
  - United Nations Security Council Resolution 2728
  - The UN Security Council passes a resolution calling for an immediate ceasefire
    in the Gaza Strip and the release of hostages held by Hamas, with the United States
    abstaining. Israeli Prime Minister Benjamin Netanyahu cancels a planned visit
    to the U.S. in response to the abstention. (Reuters)
  - An investigation by Humo magazine and the website reveals that Belgian Vlaams
    Belang politician Filip Dewinter worked as a "senior political advisor" for China
    for several years. (NOS)
