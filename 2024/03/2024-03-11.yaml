    (Reuters)
  - LATAM Airlines Flight 800
  - A LATAM Airlines Boeing 787-9 enroute between Sydney and Auckland loses altitude
    due to a technical issue, injuring 50 passengers and crew. (BBC News)
  - Five skiers are found dead after they went missing two days ago while travelling
    from the town of Zermatt to the village of Arolla in Switzerland. A sixth skier
    is still missing. (AP)
  - Two New Zealand skiers are killed and another is injured during an avalanche on
    Mount Yotei in Hokkaido, Japan. (The Guardian)
  - A man fatally stabs his wife and three children then himself in Manoa of Honolulu,
    Hawaii, U.S.. (The Guardian)
  - Former Conservative Party deputy chairman and Ashfield MP Lee Anderson defects
    to Reform UK, becoming the party's first member of parliament. Anderson was suspended
    by the Conservatives after claiming that London mayor Sadiq Khan was "controlled"
    by radical Islamists. (BBC News)
