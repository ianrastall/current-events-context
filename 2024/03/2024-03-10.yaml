Date: '2024-03-10'
Source_URI: Portal:Current events/2024 March 10
Intelligence_Payload:
  Uncategorized:
  - Haitian crisis
  - The U.S. military airlifts non-essential personnel from the U.S. embassy in Port-au-Prince,
    Haiti, amid escalating violence in the country. (Reuters)
  - 96th Academy Awards
  - Oppenheimer wins an Oscar for Best Picture. Director Christopher Nolan wins Academy
    Award for Best Director, and lead actor Cillian Murphy wins the Best Actor award.
    (The Guardian) (NBC News) (BBC News)
  - 20 Days in Mariupol (directed by filmmaker Mstyslav Chernov), a documentary that
    focuses on the siege of Mariupol during the Russian invasion of Ukraine, wins
    an Oscar for Best Documentary. (The Guardian)
  - The painting Head of an Old Farmer's Wife in a White Hat by Vincent van Gogh is
    sold at auction for more than €4.5 million. (NOS)
  - Five people are killed after an IAI Astra 1125 private jet crashes near Hot Springs,
    Virginia, United States. (The Independent)
  - One skier is killed and two others are injured after falling in Mount Washington
    in New Hampshire, United States. (AP)
  - Following a laboratory investigation, eight children and one adult in Zanzibar
    are found to have died of chelonitoxism after consuming sea turtle meat, a local
    delicacy. Another 78 people were hospitalized. (NOS)
  - 2024 Portuguese legislative election
  - Citizens in Portugal vote for the 230 seats of the Assembly of the Republic. (DW)
