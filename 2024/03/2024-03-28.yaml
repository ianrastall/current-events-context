Date: '2024-03-28'
Source_URI: Portal:Current events/2024 March 28
Intelligence_Payload:
  Uncategorized:
  - Myanmar civil war
  - Operation 0307
  - The Kachin Independence Army captures the town of Lweje and its nearby border
    crossings in Kachin State, Myanmar, after junta forces abandoned their posts and
    fled across the border into China. (Irrawaddy)
  - Coal phase-out
  - Slovakia's Slovenské elektrárne shuts down operations at its Vojany Power Station,
    the last coal-fired power plant in the country. (Euronews)
  - 2023–24 South-West Indian Ocean cyclone season
  - Cyclone Gamane makes landfall in Madagascar, killing at least eleven people and
    causing widespread flooding, according to local officials. (AP)
  - Mamatlakala highway accident
  - A bus carrying Christian pilgrims from Botswana crashes in Limpopo, South Africa,
    killing 45 people. (Reuters)
  - A Russian Sukhoi Su-35 crashes into the Black Sea off Sevastopol, Crimea. The
    pilot is reported to have safely ejected. (Reuters)
  - Israel–Hamas war
  - South Africa v. Israel
  - The International Court of Justice, in a unanimous decision, orders Israel to
    allow humanitarian aid to enter the Gaza Strip unimpeded, warning that famine
    is already occurring. (Reuters) (The Guardian)
  - United States v. Bankman-Fried
  - A federal court in the United States sentences Sam Bankman-Fried to 25 years in
    prison for stealing $8 billion in a cryptocurrency fraud. (Reuters)
  - Russian interference in European politics
  - The Czech information service reveals that Russia paid hundreds of thousands of
    euros through its "Voice of Europe" website to European politicians in order to
    influence European elections. (Parool)
