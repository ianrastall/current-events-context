Date: '2024-03-02'
Source_URI: Portal:Current events/2024 March 2
Intelligence_Payload:
  Uncategorized:
  - Israel–Hamas war
  - Humanitarian aid during the Israel–Hamas war
  - The U.S. military begins airdropping humanitarian aid into the Gaza Strip. (BBC
    News)
  - Israeli invasion of the Gaza Strip
  - The Gaza Health Ministry reported that at least 92 Palestinians are killed in
    Israeli attacks in the past 24 hours. (Al Jazeera)
  - Fifteen people are killed in an Israeli attack on a home in Deir el-Balah, while
    another eleven are killed in an attack on a tent housing displaced Palestinians
    near Tal Al-Sultan Hospital in Rafah. (Al Jazeera)
  - Red Sea crisis
  - Yemen's internationally-recognized government reports that the abandoned ship
    that was struck by a Houthi anti-ship missile has sunk. (Reuters) (Nederlands
    Dagblad)
  - Italian Navy destroyer Caio Duilio shoots down a Houthi drone in self-defence
    while in the Red Sea. (Reuters)
  - Russian invasion of Ukraine
  - Bombing of Odesa
  - Eight people, including two children, are killed and eight others are injured
    in a Russian drone strike on an apartment block in Odesa, Ukraine. (Ukrinform)
  - 2024 Pakistan floods
  - Twenty-two people are killed and 25 others are injured across Pakistan by heavy
    snow and rainfall. (Dawn)
  - Three people are killed after a Van's RV-10 crashes near Barreiras, Bahia, Brazil.
    (Aviation Safety Network)
  - More than 30 people are injured after a bus lost control and overturned in Tamil
    Nadu, India. (The Indian Express)
  - Two people were killed and four others are injured after a fight escalated into
    a shooting at an apartment complex frequented by University of North Carolina
    at Pembroke students. A teenage student was among the dead. (WBTW)
  - Northumberland National Park announces that the Sycamore Gap tree which was illegally
    felled last September is to go on public display. (BBC News)
  - 2024 United States presidential election
  - 2024 Republican Party presidential primaries
  - Republican Party caucuses are held in Idaho, Michigan, and Missouri for the 2024
    United States presidential election. Former president Donald Trump wins all three
    contests. (CBS News) (AP)
  - 2024 Dunkley by-election
  - In Australia, Jodie Belyea retains the seat of Dunkley for the Australian Labor
    Party despite a notable swing towards the Liberal Party. (ABC News Australia)
