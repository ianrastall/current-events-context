Date: '2024-05-11'
Source_URI: Portal:Current events/2024 May 11
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks in Russia during the Russian invasion of Ukraine
  - Three people are killed in a Ukrainian strike in Donetsk. Separately, two people
    are killed in Ukrainian strikes in Belgorod and Kursk. (Reuters)
  - Eurovision Song Contest 2024
  - Switzerland's entry, "The Code" by Nemo, wins this year's Eurovision contest.
    (DW)
  - Dutch musician Joost Klein is disqualified from the Eurovision final over reported
    verbal threats, which are under investigation by Swedish authorities. This is
    the first time that a performer has been disqualified during the festival. (Aftonbladet)
  - The Norwegian announcer for Eurovision, Alessandra Mele, announces that she will
    withdraw from announcing votes while declaring support for Palestine in the ongoing
    war. (Times of Israel)
  - 2024 Afghanistan–Pakistan floods
  - The death toll from the ongoing flooding in northern Afghanistan increases to
    300, with more than 1,000 houses destroyed. (AP)
  - 2024 Rio Grande do Sul floods
  - The death toll from the ongoing heavy flooding in southern Brazil increases to
    136, with 125 still missing, and more than 300,000 people displaced. (Reuters)
  - At least 28 people are killed after heavy rains in the Agam and Tanah Datar districts
    in West Sumatra, Indonesia, which triggered a flash flood and cold lava flow from
    Mount Marapi. (Al Jazeera)
  - Eleven people are killed and 53 others are injured when a bus crashes in West
    Java, Indonesia. (AP)
  - 2023–2024 Georgian protests
  - Fifty thousand people march in Tbilisi, in protest of the proposed Law on Transparency
    of Foreign Influence. (Reuters)
