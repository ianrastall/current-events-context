Date: '2024-05-29'
Source_URI: Portal:Current events/2024 May 29
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Military aid to Ukraine during the Russo-Ukrainian War, Russia–NATO relations,
    Ukraine–NATO relations
  - Sweden announces a package of $1.23 billion in military aid to Ukraine, the largest
    given by Sweden so far. (AP)
  - France and Germany announce that French and German weapons sent to Ukraine, including
    long-range missiles, are permitted to target bases inside Russia. (CNN)
  - The Polish Defence Ministry says it has given Ukraine permission to use Polish-supplied
    weapons to strike targets inside Russian territory. (Babel)
  - Israel–Hamas war
  - Rafah offensive
  - Israel says that it has taken full control of the Egypt–Gaza border after capturing
    the Philadelphi Corridor. (Reuters) (DW)
  - Two Israeli soldiers who were seriously wounded by a vehicle-ramming attack the
    day before succumb to their injuries. (Times of Israel)
  - 2024 Iran–Israel conflict, Israel–Hezbollah conflict, Syrian civil war
  - One civilian, three Hezbollah members and ten injured in an IDF airstrike Baniyas
    and Homs, Syria.(Reuters)
  - 2023–2024 Sundhnúkur eruptions
  - The town of Grindavík, Iceland, and the nearby Blue Lagoon are evacuated due to
    volcanic activity. (BBC News)
  - At least 28 people are killed when a bus falls into a ravine in Washuk District,
    Balochistan, Pakistan. (Al Jazeera)
  - 2024 Indian heat wave
  - The India Meteorological Department records a record-high temperature of in Delhi,
    resulting in one death. (CBS News) (Al Jazeera)
  - Brazil–Israel relations
  - Brazil recalls its ambassador to Israel amid an ongoing diplomatic crisis between
    the two countries. (Reuters)
  - Amnesty International says that the number of executions recorded globally in
    2023 was the highest since 2015 and up more than 30% from 2022, with Iran carrying
    out 74% of the global total. The figures exclude China, because execution numbers
    are considered a state secret. (BBC News)
  - Four people are injured in a mass shooting in Dalston, London, UK. (BBC News)
  - 2024 Malagasy parliamentary election
  - Citizens of Madagascar vote for members of the National Assembly. (Africanews)
  - 2024 South African general election
  - South Africans vote for members of the National Assembly and provincial legislatures.
    (The Guardian)
  - 2024 Vanuatuan constitutional referendum
  - Vanuatuans hold the first national constitutional referendum to vote on amendments
    related to party switching. (Radio Free Asia)
  - 2023–24 UEFA Europa Conference League
  - In association football, Olympiacos win their first UEFA Europa Conference League
    title after defeating Fiorentina by a score of 1–0 in the final, becoming the
    first Greek team to win a major European club trophy. (AP)
