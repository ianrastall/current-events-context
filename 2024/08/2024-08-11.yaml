Date: '2024-08-11'
Source_URI: Portal:Current events/2024 August 11
Intelligence_Payload:
  Uncategorized:
  - Islamic State–Taliban conflict
  - 2024 Kabul bus bombing
  - At least one person is killed and eleven others are injured in an Islamic State
    minibus bombing in Dasht-e-Barchi, Kabul, Afghanistan. (DW)
  - Russian invasion of Ukraine
  - Kyiv strikes
  - Two people, including a 4-year-old child, are killed and three others are injured
    in a Russian KN-23 ballistic missile attack in Kyiv, Ukraine. (Reuters)
  - 2024 Kiteezi landslide
  - The death toll from a landslide at the Kiteezi Rubbish Dump in Kampala, Uganda,
    increases to 21. (Reuters)
  - Two people are killed and twelve families are displaced in an explosion possibly
    attributed to a gas leak in Bel Air, Maryland, United States. (AP)
  - Iran–European Union relations
  - In a phone call with European Council President Charles Michel, Iranian president
    Masoud Pezeshkian accuses the European Union of facilitating Israeli crimes against
    humanity and terrorism in the Gaza Strip by implementing double standards that
    destabilize the Middle East and increase the chances of a global war. (Al Jazeera)
  - 2024 Rwandan general election
  - Incumbent president Paul Kagame is sworn in for a fourth term in office. (Reuters)
  - 2024 Summer Olympics
  - The 2024 Summer Olympics conclude with the closing ceremony taking place at the
    Stade de France in Paris, France. (BBC News)
  - The United States finish atop the medal table with 40 gold medals and 126 total
    medals, ahead of China who finished with 40 gold medals and 91 total medals, with
    silver medals being the tiebreaker. (BBC News)
