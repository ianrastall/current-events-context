  - Red Sea crisis
  - A Palau-flagged cargo ship en route to Egypt is set on fire after being hit by
    an anti-ship missile in the Gulf of Aden, according to the United Kingdom Maritime
    Trade Operations. No casualties are reported. (AP)
  - War in Sudan
  - The World Food Programme releases a report stating that more than 95% of Sudan's
    population cannot afford a meal a day. (Barron's)
  - 2024 Guangzhou bridge collapse
  - Five people are killed when a barge collides with the in Guangzhou, China. (Reuters)
    (The New York Times)
  - 2024 València residential complex fire
  - Nine people are killed, 15 others are injured and one is missing during a fire
    at a 14-storey residential building in Valencia, Spain. (AP)
  - At least eight people are killed during floods and landslides in the Brazilian
    state of Rio de Janeiro. (AP)
  - Murder of Kathleen Jo Henry
  - An Alaskan jury finds Brian Smith guilty of the murder of Kathleen Jo Henry and
    Veronica Abouchuk. (ABC News)
  - A court in Panama orders the arrest of former president Ricardo Martinelli, who
    is under protection of the Nicaraguan embassy in Panama City. (ABC News)
  - A majority of citizens of Westlock voted to ban public display of pride flags.
  - 2024 AT&T outage
  - More than 71,000 customers of US mobile carrier AT&T experience network outages.
