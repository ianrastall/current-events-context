Date: '2024-02-27'
Source_URI: Portal:Current events/2024 February 27
Intelligence_Payload:
  Uncategorized:
  - Red Sea crisis
  - Operation Aspides
  - German Navy warship Hessen shoots down two drones launched by Houthi forces in
    Yemen as part of the European Union's mission to protect international shipping
    in the Red Sea. (Reuters)
  - Russian invasion of Ukraine
  - Eastern Ukraine campaign
  - The Ukrainian military withdraws from the villages of Sieverne and Stepove near
    Avdiivka, Donetsk Oblast, following the announcement of its withdrawal from the
    nearby village of Lastochkyne on February 26. (Reuters)
  - Japanese technology company Sony announces it will cut 900 jobs across its global
    workforce and has also proposed the closure of London Studio as part of the restructuring.
    (Sony Interactive Entertainment press release)
  - Thirty-one people are killed and ten more injured after a bus en route from Mali
    to Burkina Faso crashes on a road in Koumantou. (AP)
  - Multiple tornadoes spawn from a very rare late season tornado outbreak. (February
    27-28, 2024 Tornadoes)
  - Two people are killed in Conakry, Guinea, during protests related to an ongoing
    nationwide strike. (Reuters)
  - The Smokehouse Creek Fire in the Texas panhandle continues to spread, with almost
    200,000 acres currently on fire. (CNN)
  - 1974 Mitsubishi Heavy Industries bombing
  - The identity of a deceased man is confirmed by a DNA test to be Satoshi Kirishima,
    who participated in a 1974 bombing. (BBC News)
  - In the Netherlands, the Marengo trial concludes after six years. Of the 17 prosecuted
    people, three people, including Ridouan Taghi and Saïd Razzouki, are sentenced
    to life imprisonment for their role in ten murders. (NOS)
  - Russian human rights activist Oleg Orlov is sentenced to 2 and a half years in
    prison for "repeatedly discrediting" the Russian military. (AP)
  - 2024 Republican Party presidential primaries, 2024 Democratic Party presidential
    primaries
  - Michigan holds its Republican and Democratic primaries. Former President Donald
    Trump and incumbent President Joe Biden are the respective winners. (VOA) (The
    New York Times)
