Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis (2023–present)
  - Attacks on U.S. bases in Iraq, Jordan, and Syria
  - February 2024 United States airstrikes in Iraq and Syria
  - The U.S. military launches airstrikes against the Islamic Revolutionary Guard
    Corps (IRGC) and other Iran-backed groups in Iraq and Syria, in response to a
    drone attack that killed three American troops in Jordan. CENTCOM says more than
    85 targets were hit with 125 "precision munitions". (NBC News) (BBC News)
  - 2024 Iran–Israel conflict, Israel–Hezbollah conflict
  - Three Amal Movement militants killed in Bayt Lif, Lebanon. (Lebanon Debate)(NaharNet)
  - 1974 Mitsubishi Heavy Industries bombing
  - DNA tests confirm the identity of a man who claimed that he was the fugitive Satoshi
    Kirishima before dying of cancer in late January. (Kyodo News)
  - 1Malaysia Development Berhad scandal
  - The Malaysian Pardons Board headed by the Yang di-Pertuan Agong reduces the prison
    term of former Malaysian Prime Minister Najib Razak from 12 years to 6 years of
    imprisonment. (Reuters via Rappler)
  - 2023 Guatemalan general election
  - The European Council applies sanctions to Attorney General of Guatemala María
    Consuelo Porras and three of her collaborators, as well as to a judge, for undermining
    democracy, the rule of law, and the transfer of power. (Prensa Libre)
  - Ice hockey at the Olympic Games
  - In ice hockey, the National Hockey League announces that NHL players will be allowed
    to play at the Winter Olympics in 2026 and 2030, making it the first time the
    league has allowed its players to participate since 2014. (The Athletic)
  - Twenty-three-year-old boxer Kazuki Anaguchi dies from subdural hematoma caused
    by injuries resulting from a December 2023 boxing match against boxer Seiya Tsutsumi.
    (ESPN) (CBS Sports)
