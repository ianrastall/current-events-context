Date: '2024-02-03'
Source_URI: Portal:Current events/2024 February 3
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks in Russia during the Russian invasion of Ukraine
  - A Lukoil oil refinery in Volgograd Oblast, Russia, is attacked by Ukrainian long-range
    drones, causing a large fire and disrupting operations. Volgograd governor Andrey
    Bocharov says that the attack was repelled by air defences. (Kyiv Post)
  - Eastern Ukraine campaign
  - At least 28 civilians are killed by Ukrainian shelling in Russian-occupied Lysychansk,
    Luhansk Oblast, according to Russian-appointed local officials. The officials
    added that ten others were rescued after being trapped under rubble. (AP)
  - Red Sea crisis
  - 2024 missile strikes in Yemen
  - The United States and United Kingdom launch airstrikes against 36 Houthi targets
    in Yemen, including underground weapons storage facilities, missile systems, radars,
    and command and control centres. (Reuters)
  - 2024 Chile wildfires
  - Chile declares a state of emergency as wildfires kill at least 51 people across
    the country, while hundreds more are reported missing. Multiple fires have been
    reported in Valparaíso and Viña del Mar. More than 1,100 buildings are destroyed.
    (Reuters)
  - 2024 United States presidential election
  - 2024 Democratic Party presidential primaries
  - U.S. President Joe Biden wins the 2024 South Carolina Democratic presidential
    primary. (NBC News)
  - 2024 Northern Ireland Executive formation
  - In a power sharing deal, Michelle O'Neill becomes the First Minister of Northern
    Ireland, marking the first time that the position is held by an Irish nationalist,
    while the Democratic Unionist Party's Emma Little-Pengelly becomes deputy first
    minister. (BBC News)
