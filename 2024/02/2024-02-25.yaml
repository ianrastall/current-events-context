  - Israel–Hamas war protests
  - Israel–Hamas war protests in the United States
  - Self-immolation of Aaron Bushnell
  - An active-duty United States Air Force member sets himself on fire outside the
    Israeli embassy in Washington, D.C. as a form of protest against the Israeli invasion
    of the Gaza Strip and dies later that day. (BBC News) (NPR)
  - 2024 Belarusian parliamentary election
  - Voting begins in elections to the National Assembly of the Republic of Belarus,
    the All-Belarusian People's Assembly, and local councils, with only four pro-government
    parties permitted to run. Opposition activist Sviatlana Tsikhanouskaya urges Belarusians
    to boycott the elections, stating that she will hold elections to the Coordination
    Council in May. (Politico)
  - Incumbent President of Belarus Alexander Lukashenko announces that he will run
    in the next Belarusian presidential election. (Reuters)
  - 2024 EFL Cup final
  - Liverpool defeat Chelsea 1–0 after extra time at Wembley Stadium to win the 2023–24
    EFL Cup. (BBC Sport)
