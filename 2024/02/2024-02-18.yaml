    Palestinian citizens of Israel's access to the al-Aqsa Mosque in Jerusalem during
    the month of Ramadan due to security concerns. (The Times of Israel)
  - Ethnic violence in Papua New Guinea
  - At least 64 people are killed during inter-tribal fighting between the Ambulin
    and Sikin tribes near Wabag, Enga Province, Papua New Guinea. (France 24)
  - Moro conflict
  - Six soldiers and three Dawlah Islamiyah–Maute Group militants are killed in a
    series of military encounters in Munai, Lanao del Norte, Philippines. (Anadolu
    Agency) (The Philippine Star)
  - 77th British Academy Film Awards
  - The Oppenheimer film wins seven awards and 13 nominations at the British Academy
    Film Awards, the most at the event. (ABC News)
  - 2024 Burnsville shooting
  - Two police officers and a paramedic are killed while responding to a domestic
    dispute in Burnsville, Minnesota, United States. The perpetrator is also killed.
    (CNN) (AP)
