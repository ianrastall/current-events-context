Date: '2024-02-11'
Source_URI: Portal:Current events/2024 February 11
Intelligence_Payload:
  Uncategorized:
  - Israel–Hamas war
  - Israel–Hamas war hostage crisis
  - Hamas announces the death of two Israeli hostages and says that eight others have
    been seriously injured by Israeli airstrikes on the Gaza Strip in the past 96
    hours. (Reuters)
  - Myanmar civil war
  - Myanmar's military junta announces that all men aged 18 to 35 and all women aged
    18 to 27 will be required to complete two years of mandatory military service,
    amid territorial losses to anti-military junta forces in the ongoing civil war.
    (Reuters)
  - Insurgency in Balochistan
  - Two Basij members are killed in an attack on an outpost in Sistan and Baluchestan
    province, Iran. (Iran International)
  - 2024 Maco landslide
  - The death toll from the landslide in Maco, Davao de Oro, Philippines, five days
    ago, increases to 54 people. Sixty-three others are still missing. (Al Jazeera)
  - Lakewood Church shooting
  - A woman carries out a shooting at Lakewood Church, Houston, Texas, United States.
    She is shot and killed by an off-duty Houston police officer. (The Washington
    Post)
  - A drive-by spree shooting in California, United States kills four people and injures
    a 13-year-old. All three suspects have been arrested and unharmed. (GVA)
  - 2024 Finnish presidential election
  - Alexander Stubb is elected President of Finland with 51.6% of the vote.(Yle)
  - 2023 NFL season
  - Super Bowl LVIII
  - In American football, the Kansas City Chiefs win the Super Bowl for the second
    consecutive year, defeating the San Francisco 49ers 25–22. The Chiefs are the
    first team to repeat as Super Bowl champions since 2005. (BBC Sport)
  - 2023 Africa Cup of Nations
  - In association football, hosts Ivory Coast win their third Africa Cup of Nations
    by defeating Nigeria 2–1 in the final. Sébastien Haller scores the winning goal
    in the 81st minute. (The Guardian)
