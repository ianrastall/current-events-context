Date: '2024-02-04'
Source_URI: Portal:Current events/2024 February 4
Intelligence_Payload:
  Uncategorized:
  - Abyei border conflict
  - Thirty-seven people are killed during fights over a suspected land feud in the
    disputed region of Abyei on the border between South Sudan and Sudan. (AP)
  - 66th Annual Grammy Awards
  - Miley Cyrus wins Record of the Year, her first Grammy Award, for her 2023 single
    "Flowers". (CBS News)
  - Taylor Swift wins Album of the Year for Midnights, becoming the first artist to
    win the award four times. She also announces the release of a new album, The Tortured
    Poets Department, on April 19, 2024. (Variety)
  - 2024 Chile wildfires
  - The death toll from major wildfires in Valparaíso, Chile, increases to at least
    112 people, with between 3,000 and 6,000 houses damaged in the fires. (BBC News)
  - 2024 Salvadoran general election
  - Salvadorans vote to elect the president, vice president, and Legislative Assembly.
    With over 80% of the popular vote, Nayib Bukele wins re-election in a first-round
    landslide. (BBC News) (Reuters)
  - President of Namibia Hage Geingob dies at the age of 82, and is succeeded by Vice-President
    Nangolo Mbumba on an acting basis. (The Namibian)
