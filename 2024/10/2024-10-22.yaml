Date: '2024-10-22'
Source_URI: Portal:Current events/2024 October 22
Intelligence_Payload:
  Uncategorized:
  - 2024 Iran–Israel conflict
  - Israeli retaliation leak, Israel–United States relations
  - The FBI announces an investigation into the leaking of classified U.S. intelligence
    documents regarding military plans for Israeli retaliation against Iran. (Reuters)
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - An Israeli drone strike on Beit Lahia in the Gaza Strip, kills at least fifteen
    people, including several women and children. (Al Jazeera)
  - Islamic State insurgency in Iraq
  - Prime Minister of Iraq Mohammed Shia' Al Sudani announces the death of several
    Islamic State senior members, including the group's leader in Iraq, in a military
    operation in Saladin Governorate, Iraq. (The Washington Post)
  - Eleven people are killed after a fuel truck explosion on a highway near Kampala,
    Uganda. (AP)
  - 2024 McDonald's E. coli outbreak
  - The U.S. Center for Disease Control announces that one person has died and at
    least 48 others have become ill in an E. coli outbreak linked to McDonald's Quarter
    Pounder beef sandwiches in ten western and midwest states with the first case
    confirmed on 27 September. (BBC News)
  - 2024 United States presidential election
  - Foreign interference in the 2024 United States elections
  - The presidential campaign of former U.S. President Donald Trump files a formal
    complaint to the Federal Election Commission against the United Kingdom's Labour
    Party, accusing the Labour Party of "blatant foreign interference" in the election
    to support the Kamala Harris presidential campaign. (BBC News)
