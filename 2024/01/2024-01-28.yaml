Date: '2024-01-28'
Source_URI: Portal:Current events/2024 January 28
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis (2023–present)
  - Attacks on U.S. bases in Iraq, Jordan, and Syria
  - Tower 22 drone attack
  - Three American soldiers are killed and 47 others are injured in a drone attack
    upon a U.S. base in Rukban, Mafraq Governorate, Jordan, near the border with Syria,
    by Islamic Resistance in Iraq militants. (CNBC)
  - Turkey–Islamic State conflict
  - 2024 Istanbul church shooting
  - A Turkish man is shot dead by two masked gunmen at an Italian Roman Catholic church
    in Sarıyer, Istanbul, Turkey. The Islamic State claims responsibility. (AP)
  - Insurgency in the Maghreb
  - Twenty-two people are killed during a mass shooting at the village of Motogatta
    in the Tillabéri Region, in Niger. (Barron's)
  - In Afghanistan, ten vehicles crash on the main highway linking Kabul and the eastern
    Nangarhar Province, killing 17 people and wounding ten others. Separately, 15
    people are killed during four collisions in Laghman Province, near the end of
    the same highway. (AP)
  - A Piper PA-46 crashes in the rural area of Itapeva, Minas Gerais, Brazil, killing
    all seven people on board. (O Globo)
  - Six hundred hectares of forest are destroyed by fire in Los Alerces National Park,
    a UNESCO World Heritage Site in Patagonia, Argentina. (NOS)
  - A local official in South Kivu, Democratic Republic of Congo, reports that an
    overloaded wooden boat, on board 50 people, has capsized on Lake Kivu on Sunday.
    Three people died, while search is ongoing for about 37 others. (AP via Africanews)
  - Environmental protesters throw pumpkin soup at the Mona Lisa in the Louvre in
    Paris, France. The painting is protected by bulletproof glass and was not damaged.
    (BBC News)
  - 2024 ATP Tour
  - 2024 Australian Open
  - In tennis, Jannik Sinner defeats Daniil Medvedev in the final, 3–6, 3–6, 6–4,
    6–4, 6–3, to win the men's singles title at the 2024 Australian Open. It is Sinner's
    first major singles title and the first for an Italian player at the tournament.
    (CNN)
  - 2023 NFL season
  - In American football, the Kansas City Chiefs defeat the Baltimore Ravens and the
    San Francisco 49ers defeat the Detroit Lions to advance to Super Bowl LVIII. (USA
    Today)
