Date: '2024-01-31'
Source_URI: Portal:Current events/2024 January 31
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Crimea attacks
  - The Ukrainian Air Force launches a wave of Storm Shadow cruise missile strikes
    on Russian military infrastructure in Crimea, with explosions reported near Sevastopol
    International Airport. Russia says it shot down 20 Ukrainian missiles over the
    Black Sea. (The Telegraph)
  - Russia and Ukraine conduct a prisoner exchange on the border, with 195 soldiers
    being returned to Russia, and 207 military personnel and civilians being returned
    to Ukraine, respectively. The deal was facilitated by the United Arab Emirates.
    (BBC News)
  - Iraqi conflict
  - Attacks on U.S. bases in Iraq, Jordan, and Syria
  - Kata'ib Hezbollah suspends operations against the U.S. military in Iraq, in order
    to "prevent embarrassment of the Iraqi government". (Reuters)
  - A hangar currently under construction collapses in Boise, Idaho, United States,
    killing three people and injuring nine. (ABC News)
  - Opioid epidemic in the United States
  - The Governor of Oregon Tina Kotek declares a 90-day state of emergency in Portland
    in response to record deaths from fentanyl. (CNN)
  - Sultan Ibrahim Iskandar of Johor becomes the 17th Yang di-Pertuan Agong of Malaysia.
    (Reuters)
