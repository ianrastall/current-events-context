Date: '2024-01-14'
Source_URI: Portal:Current events/2024 January 14
Intelligence_Payload:
  Uncategorized:
  - 2024 Ecuadorian conflict
  - All 178 prison employees who were held hostage in at least seven prisons are released.
    (Al Jazeera)
  - 2023 Israel–Hamas war hostage crisis
  - Around 120,000 people attend the start of a 24-hour rally in Tel Aviv's Hostages
    Square to mark 100 days since 240 hostages were kidnapped into Gaza during the
    2023 Hamas-led attack on Israel on October 7. (The Times of Israel)
  - Syrian civil war, 2024 Iran–Israel conflict, Israel–Hezbollah conflict
  - Five IDF soldiers and four Syrian Glory of Islam Brigade militants killed in a
    fire fight in Shebaa, Israel.(JNS)
  - 2023–2024 Sundhnúkur eruptions
  - The Reykjanes volcano erupts near the town of Grindavík, Iceland, with one fissure
    forming inside the town limits. (CNN)
  - Five migrants die while attempting to cross the English Channel after their small
    boat overturned. Dozens more are rescued, according to the French Maritime Prefecture.
    (BBC News)
  - India–Maldives relations
  - The Maldives calls for the complete withdrawal of the Indian Armed Forces from
    its territory by March 15 amid a diplomatic dispute between the two countries.
    India currently has around 80 troops stationed on the archipelago. (Reuters)
  - Inauguration of Bernardo Arévalo
  - In Guatemala, the Constitutional Court aligns itself with the outgoing ruling
    party and denies legal recourse to Semilla, affirming that Semilla's elected members
    of Congress must assume office as "independents", thereby disqualifying them from
    running for the presidency of the Congress. The legislature of the outgoing Congress
    subsequently announces a delay in the investiture of the incoming legislature,
    as well as in the presidential investiture of Bernardo Arévalo. (Prensa Libre)
  - Despite the Constitutional Court's ruling, Samuel Pérez Álvarez, a member of Semilla,
    is elected President of the Congress with 92 votes. (Prensa Libre)
  - 2024 Comorian presidential election
  - The Comoros hold the first round of presidential elections. (Reuters)
  - Abdication of Margrethe II
  - Frederik X is proclaimed King of Denmark following his mother's abdication. (AP)
