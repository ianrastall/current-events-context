Date: '2024-01-10'
Source_URI: Portal:Current events/2024 January 10
Intelligence_Payload:
  Uncategorized:
  - Red Sea crisis
  - United Nations Security Council Resolution 2722
  - The United Nations Security Council adopts a resolution condemning Houthi attacks
    on merchant ships in the Red Sea. (The Washington Post)
  - Somali Civil War
  - Al-Shabaab insurgents capture a United Nations helicopter carrying seven people,
    killing one person and abducting five others, while the seventh person is missing.
    The helicopter landed in al-Shabaab-controlled territory after encountering "a
    defect" shortly after takeoff from Beledweyne, Hiran, Somalia. (AP)
  - The U.S. Securities and Exchange Commission approves eleven spot Bitcoin exchange-traded
    funds in a landmark decision. (Reuters)
  - 2024 Papua New Guinean unrest
  - Riots occur in Port Moresby, Papua New Guinea, following a strike by police over
    a reduction in their pay. Ten people are killed and 13 others are seriously injured
    as a result of the riots. (RNZ) (The National)
  - Capital punishment in Pakistan
  - The Supreme Court of Pakistan upholds the 2019 death sentence upon former leader
    Pervez Musharraf, who lived in exile in Dubai, United Arab Emirates, until his
    death in February 2023. (Dawn)
  - The 2024 European Men's Handball Championship begins in Germany. (The Local)
  - The 2024 UEC European Track Championships begins in the Netherlands. (The Irish
    Times)
