Date: '2024-01-17'
Source_URI: Portal:Current events/2024 January 17
Intelligence_Payload:
  Uncategorized:
  - Red Sea crisis
  - 2024 missile strikes in Yemen
  - The United States Central Command says another round of U.S. strikes has destroyed
    14 anti-ship missiles in Yemen that were being prepared to launch at merchant
    vessels and U.S. Navy ships in the region. (Reuters)
  - Operation Prosperity Guardian
  - The United States redesignates the Yemen-based Houthis as a terrorist organization
    in response to continuing attacks in the Red Sea. (Reuters) (Archive)
  - 2024 Iran–Pakistan border skirmishes
  - 2024 Iranian missile strikes in Pakistan
  - Pakistan recalls its ambassador to Iran in response to the missile attack on its
    territory that killed two civilians. (The Washington Post)
  - 2024 Ecuadorian conflict
  - Public prosecutor , who was investigating the takeover of the TC Televisión newsroom
    by armed men, is killed in Guayaquil, Ecuador. (Al Jazeera)
  - At least 19 people are killed and three others are missing in an explosion at
    a fireworks factory in Suphan Buri, Thailand. (AP)
  - Three people are killed and 77 others are injured in an explosion caused by explosives
    stored for use in illegal mining operations at several buildings in Ibadan, Nigeria.
    (AP)
  - Three people are killed when a power line falls on a car during a major winter
    storm in Portland, Oregon, United States. (AP)
  - 2024 Bashkortostan protests
  - Thousands of people protest the trial of Bashkir activist Fail Alsynov in Baymak,
    Bashkortostan, Russia. Clashes with police are reported. (RFE/RL)
  - Lèse-majesté in Thailand
  - Thai activist Arnon Nampa is sentenced to four years in prison for posting a royal
    insult on social media in 2021. (CNA)
  - Three people are killed and five others injured during a mass shooting against
    a group of men outdoors in Morvant, Trinidad and Tobago. (AP)
  - Former Guatemalan President Alejandro Giammattei is barred from entering the U.S.
    after the State Department accuses him of "significant corruption". (Reuters)
  - UK Home Secretary James Cleverly announces a ban on Hizb ut-Tahrir, an Islamic
    fundamentalist movement, for its support of Hamas and "violently antisemitic rhetoric".
    (The Algemeiner)
