Date: '2020-07-12'
Source_URI: Portal:Current events/2020 July 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Darfur
  - Nine people were killed and twenty others injured during a shooting on a camp
    for internally displaced people in Kutum, Sudan. (Al Jazeera)
  - 2020 Armenian–Azerbaijani skirmishes; Nagorno-Karabakh conflict
  - Armenian and Azerbaijani forces exchange fire on the border, leaving three Azeri
    soldiers dead and five wounded, according to Azerbaijan's Ministry of Defence.
    No Armenian casualties are reported. (The Eurasian Times) (Armenia Radio)
  Business and economy:
  - The McClatchy company, one of the largest and most respected American news publishers,
    announces that hedge fund Chatham Asset Management won its bankruptcy sale in
    a court-supervised auction. Chatham, which owns the National Enquirer, has been
    an investor in the company since 2009. Court confirmation, likely at a hearing
    on July 24, is required. McClatchy has been burdened by heavy debt from its large
    pension obligations and the acquisition of newspaper chain Knight Ridder. (Reuters)
    (The New York Times)
  Disasters and accidents:
  - A fire, followed by an explosion, breaks out on the USS Bonhomme Richard at the
    U.S. Naval base in San Diego, California. At least 18 sailors are currently hospitalized.
    It is unclear where the fire started or what the source of the explosion was.
    (The New York Times) (The Hill)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Japan, Japan–United States relations
  - U.S. military officials report 61 cases of COVID-19 at Marine Corps Air Station
    Futenma and Camp Hansen. Governor of Okinawa Prefecture Denny Tamaki said late
    on Saturday that "Okinawans are shocked by what we were told", and demanded more
    action from the U.S. military which has since put the two bases under lockdown.
    (AP News)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Florida
  - Florida reports 15,299 cases, a new single-day record. (The Guardian)
  - COVID-19 pandemic in Mexico
  - The death toll in Mexico rises above 35,000, surpassing Italy. (Reuters)
  Law and crime:
  - Aftermath of the Sudanese Revolution
  - Amid a series of reforms, Sudan bans female genital mutilation, decriminalizes
    apostasy, ends public flogging and lifts a 36-year ban on the consumption of alcohol
    for non-Muslims, according to Justice Minister Nasreldin Abdelbari. (BBC News)
  - China releases law professor Xu Zhangrun, who had criticized CCP General Secretary
    Xi Jinping and the Chinese Communist Party (CCP), from detention after six days.
    (Reuters)
  - Police in Boston and in New York are investigating attacks on statues of the Virgin
    Mary at local Catholic churches. In Boston, a statue outside St. Peter’s Church
    in Dorchester neighborhood was set on fire, causing serious damage. In New York,
    an unidentified man was shown on security videotape painting the word “idol” on
    a statue outside Cathedral Prep School in Queens. (Catholic News Agency)
  Politics and elections:
  - 2020 Polish presidential election
  - The second round of the latest presidential election in Poland takes place. Incumbent
    President Andrzej Duda faces Mayor of Warsaw Rafał Trzaskowski. (The Guardian)
