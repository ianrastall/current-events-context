Date: '2020-07-01'
Source_URI: Portal:Current events/2020 July 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen; Iran–Saudi Arabia proxy conflict
  - A Saudi-led coalition begins a military offensive against the Houthis, carrying
    out airstrikes against the capital Sanaa, as well as the provinces of Ma'rib,
    al-Jawf, al-Bayda, Hajjah and Saada. The local news describe the airstrikes as
    "violent" and reports scores of people injured. This is said to be the response
    to missile and drone attacks against Saudi Arabia from last week to last night.
    (Reuters)
  - Irapuato massacres
  - Gunmen kill at least 24 people in a mass shooting at a drug rehabilitation center
    in Irapuato, Guanajuato, Mexico. (Reuters)
  - 2020 Oromia Clashes
  - An Ethiopian military crackdown on protests in Oromia Region leaves 81 protesters
    dead, while several prominent politicians, such as Jawar Mohammed, have been detained.
    The protests began following the death of Oromo musician Hachalu Hundessa. (BBC
    News)
  Arts and culture:
  - Removal of Confederate monuments and memorials, List of monuments and memorials
    removed during the George Floyd protests
  - The monument of Confederate General Stonewall Jackson is removed from Monument
    Avenue in Richmond, Virginia. (ABC News)
  - Weinstein effect, Fox News controversies
  - Fox News fires America's Newsroom anchor Ed Henry following allegations of sexual
    misconduct by a former employee. (CNN)
  - The Finnish Air Force Command formally ends the use of the swastika in its imagery,
    according to the Air Force Command. However, the swastika will remain on some
    Air Force unit flags and decorations. (BBC News)
  - The Academy of Motion Picture Arts and Sciences, responding to recent criticism
    about the lack of racial diversity among the nominees in major Oscar award categories,
    invites 819 people to become new members. Of the invitees, 49% are from outside
    the US, 45% are women, and 36% are non-white. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - California Governor Gavin Newsom restricts the indoor operations of certain businesses
    in 19 counties for a minimum of three weeks to stop the spread of COVID-19. (Los
    Angeles Times)
  - COVID-19 pandemic in Pennsylvania
  - Pennsylvania Governor Tom Wolf says that masks will be required inside and outside.
    (The Hill)
  - COVID-19 pandemic in Ohio
  - Dayton becomes the first city in Ohio to mandate masks. (Cincinnati.com)
  - COVID-19 pandemic in Florida
  - Miami-Dade County is expected to mandate masks as it deals with surging cases.
    (Miami Herald)
  - COVID-19 pandemic in Brazil
  - The COVID-19 death toll in Brazil passes 60,000. (Reuters)
  - The UN Security Council demands "immediate cessation of hostilities" in conflict
    zones around the world, due to the impact of the COVID-19 pandemic. These "durable
    humanitarian pauses", which do not apply to military operations against ISIL and
    Al-Qaeda, should begin immediately and be for at least 90 consecutive days to
    allow for delivery of humanitarian assistance and medical evacuations. This is
    the first resolution related to the COVID-19 pandemic that the council has passed.
    (NPR)
  International relations:
  - France–Turkey relations
  - France suspends its involvement in NATO's naval operation in the Mediterranean
    Sea enforcing an arms embargo on Libya, following an investigation into an incident
    between French and Turkish warships. France accuses the Turkish Naval Forces of
    harassing its Courbet warship, while attempting to inspect a Turkish civilian
    vessel suspected of breaching the arms embargo. (Al Jazeera)
  - Hong Kong–United Kingdom relations, 2019–20 Hong Kong protests
  - Prime Minister Boris Johnson says up to three million Hong Kong residents will
    be offered citizenship in the United Kingdom, following the passing of a controversial
    new national security law by China. Under the British government's plans, Hong
    Kongers will be able to settle in the UK for five years under political asylum,
    and after a further year will be able to apply for citizenship. Foreign Secretary
    Dominic Raab says there will be "no limits on numbers or quotas", due to the UK's
    "historic commitment to the people of Hong Kong". (BBC News)
  - Foreign relations of Taiwan, Foreign relations of Somaliland
  - Taiwan announces it will mutually establish representative offices with the unrecognized
    breakaway state of Somaliland. While relations are not diplomatic at this point,
    further establishment of diplomatic relations would make Taiwan the first sovereign
    state to recognize Somaliland and the first new diplomatic ally that Taiwan has
    gained in 13 years. (Bloomberg News)
  Law and crime:
  - 2019–20 Hong Kong protests
  - Police in Hong Kong arrest over 300 people on the previously banned 1 July march
    and after the passing of the new national security law. The new law punishes crimes
    considered as subversion, terrorism and collusion with foreign forces with up
    to life in prison. It also allows extradition to the Mainland for trial. (Reuters)
  - Censorship in Turkey
  - President Recep Tayyip Erdoğan vows tighter control over "immoral" social media
    following alleged insults to his daughter and son-in-law when they announced the
    birth of their fourth son on Twitter. Erdoğan specifically mentioned Twitter,
    YouTube and Netflix. Interior Minister Süleyman Soylu announced the arrest of
    a number of social media users for "insulting tweets". (Al Jazeera)
  - The Guardia di Finanza seizes over $1.2 billion (~€1 billion) worth of fenethylline
    tablets at a port in Salerno, Campania, Italy. It is believed that the amphetamines
    were manufactured by ISIL and originated in Syria. The haul, amounting to 14 metric
    tonnes of contraband, is the largest drug bust in history. (CNN)
  Sports:
  - After hospitalization in intensive care due to a sudden immune system disorder
    during a training camp in France, the situation of Dutch world champion short
    track speed skater Lara van Ruijven becomes critical. (NOS) (Telegraaf)
