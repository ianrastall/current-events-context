Date: '2020-07-08'
Source_URI: Portal:Current events/2020 July 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Internal conflict in Myanmar
  - Amnesty International says it has conducted a report which says that Myanmar's
    armed forces "have killed civilians, including children in indiscriminate air
    attacks" in Rakhine and Chin states, urging the United Nations Security Council
    to launch a war crimes investigation. Myanmar has been fighting the separatist
    Arakan Army in the region. The government did not immediately respond to calls
    for comment. (Al Jazeera)
  - Insurgency in the Maghreb
  - At least 180 bodies have been found in mass graves in Djibo, Burkina Faso, where
    soldiers are fighting jihadists. It is suspected that the government forces were
    involved in mass extrajudicial executions. (BBC News)
  - July 2020 Afghanistan attacks
  - A suicide bomber kills three people when he drives a military vehicle packed with
    explosives near the provincial governor's residence in Kandahar, Afghanistan.
    The Taliban claims responsibility. (Reuters)
  - Insurgency in Jammu and Kashmir
  - Local Bharatiya Janata Party leader Sheikh Wazeem Bari and two members of his
    family are shot dead in Bandipore district, Jammu and Kashmir. Senior Ministry
    of Home Affairs official K. Vijay Kumar blames the Islamic terrorist group Jaish-e-Mohammed.
    (Hindustan Times)
  Business and economy:
  - Impact of the COVID-19 pandemic on airlines
  - Delta Air Lines ends service to 11 airports in an effort to reduce domestic flights
    by 80% and international flights by 90% due to aviation restrictions caused by
    the COVID-19 pandemic. (Business Insider)
  Disasters and accidents:
  - One person is killed and four others injured when a 20-metre crane collapses at
    a building site where flats were being constructed in the Bow district of East
    London, United Kingdom. (Reuters)
  - American actress Naya Rivera is declared missing at Lake Piru in the Los Padres
    National Forest of Ventura County, California, after she reportedly rented a boat
    and swam in the lake with her four-year-old son. Rivera's son was found on the
    boat unharmed, while the Ventura County Sheriff's Office have initiated a search
    and rescue operation for the actress. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - The United States surpasses three million cases of COVID-19 and sets a daily record
    of 62,021 new cases. (USA Today) (USA Today2)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Romania
  - Romania surpasses 30,000 cases of COVID-19 and sets a daily record of 555 new
    cases. (Romania Insider)
  International relations:
  - Mexico–United States relations, Canada–United States relations
  - U.S. President Donald Trump hosts a meeting at the White House with Mexican President
    Andrés Manuel López Obrador to discuss the new United States–Mexico–Canada Agreement.
    Canadian Prime Minister Justin Trudeau declines to attend. (The Washington Post)
  - Lithuania–Russia relations
  - Lithuania bans Russian state-owned television network RT due to its connection
    with Dmitry Kiselyov, who is sanctioned by the European Union for his role in
    the 2014 Ukrainian crisis. (LRT)
  Law and crime:
  - Affordable Care Act legal challenges, Contraceptive mandate
  - In a 7–2 decision on Little Sisters of the Poor Saints Peter and Paul Home v.
    Pennsylvania, the United States Supreme Court upholds regulations that allow employers
    with religious or moral objections to decline to provide contraception coverage
    under the Affordable Care Act. (The New York Times) (The Washington Post)
  - The Supreme Court of the United States rules in favor of the Little Sisters of
    the Poor. The victory at the court comes after nine years of their legal fight
    against the Obama-era “contraception mandate”. (Catholic News Agency)
  - Former Governor of Chihuahua and wanted fugitive César Duarte Jáquez is arrested
    by police in Miami, Florida, after being in hiding since 2017. He is wanted on
    corruption charges in Mexico, after allegedly misappropriating public funds. (Reuters)
  Politics and elections:
  - Politics of Ivory Coast
  - Ivory Coast's Prime Minister and candidate for the presidential election Amadou
    Gon Coulibaly dies in office after falling ill at a ministerial meeting. He had
    recently returned from France after undergoing treatment for heart problems. (BBC
    News)
  Sports:
  - Impact of the COVID-19 pandemic on sports, Impact of the COVID-19 pandemic on
    association football
  - Major League Soccer resumes its 2020 season after a four-month hiatus caused by
    the COVID-19 pandemic with a month-long tournament in Orlando, Florida. FC Dallas
    will sit out the tournament after 10 players and a coach were diagnosed with COVID-19.
    (Fox News)
