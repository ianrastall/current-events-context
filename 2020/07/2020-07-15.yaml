Date: '2020-07-15'
Source_URI: Portal:Current events/2020 July 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Saudi-led coalition airstrikes kill at least seven civilians when they hit houses
    in the Al Jawf Governorate of Yemen. The Houthis report nine killed, two of them
    children. The coalition did not immediately comment on the airstrike. (Reuters)
  Arts and culture:
  - George Floyd protests in the United Kingdom
  - A statue of Black Lives Matter protester Jen Reid is briefly erected without permission
    on the plinth of the toppled statue of Edward Colston in the city center of Bristol
    before being removed the next day. (CBS News)
  Business and economy:
  - Fiat Chrysler Automobiles and Groupe PSA announce that when their planned merger
    is completed, expected in 2021, the merged company will be known as Stellantis.
    (Detroit Free Press)
  Disasters and accidents:
  - 2020 Iran explosions
  - At least seven ships are burnt following an unspecified incident in the Iranian
    port city of Bushehr. (Al Arabiya) (Bloomberg)
  - At least 50 people have been killed and more than two million affected by heavy
    monsoon flooding in Assam, India. (BBC News)
  - A record-setting rainstorm causes flash flooding in Palermo, Italy. The meter
    of water turns streets into rivers and traps motorists in their cars. Palermo
    mayor Leoluca Orlando says this "water bomb" dropped as much rain in two hours
    as the Sicilian capital gets in a full year. Two people are reported drowned;
    that has not been confirmed. (VOA) (EuroNews)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia announces the biggest daily rise of 87 new COVID-19 deaths, taking the
    nationwide death toll at 3,797. The country also announces their biggest daily
    rise of 1,414 new recoveries, taking the nationwide tally to 39,050. The cumulative
    cases reach 80,000. (detikNews)
  - COVID-19 pandemic in India
  - India reimposes a two-week lockdown in parts of the country as the country records
    30,000 new daily cases. (Time)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Alabama
  - Governor Kay Ivey issues a mandatory statewide face mask order through July 31.
    (The Hill)
  - COVID-19 pandemic in Florida
  - Florida exceeds 300,000 cases of COVID-19. (CBS News)
  - COVID-19 pandemic in Michigan
  - Michigan reports 891 new cases, its highest single-day new case total since May
    14. (MLive.com)
  Law and crime:
  - Killing of George Floyd
  - A new police body camera video emerges of George Floyd pleading with officers
    before his death. (BBC News)
  - A lawsuit is filed against the Minneapolis police officers involved in Floyd's
    death. (The Chicago Tribune)
  - Crime in Norway
  - A woman dies and two more people are injured during a series of stabbings in Sarpsborg,
    Norway. A Norwegian man, who had a relationship with the two wounded victims,
    is arrested. (BBC News)
  - 2020 Twitter bitcoin scam
  - The Twitter accounts of notable people and businesses, including Elon Musk, Joe
    Biden, Bill Gates and Apple Inc., are hijacked to promote a Bitcoin scam. (CNBC)
  Politics and elections:
  - 2020 United States presidential election
  - Donald Trump 2020 presidential campaign
  - President Trump replaces Brad Parscale as campaign manager with Bill Stepien,
    former White House political director and a field director for the 2016 presidential
    campaign. Parscale, who has reportedly been blamed for the poorly attended rally
    in Tulsa, Oklahoma, last month, will stay on as senior adviser. (BBC News) (UPI)
  - 2020 North Macedonian parliamentary election
  - Voters in North Macedonia head to the polls to elect the members of the country's
    assembly. It is the first election after the country adopted its new name following
    a decade-long dispute. The election had to be postponed once due to the ongoing
    COVID-19 pandemic. (The Guardian)
  - Politics of Peru
  - Prime Minister of Peru Vicente Zeballos resigns in the face of harsh criticism
    of his management of the COVID-19 pandemic. He is succeeded by Pedro Cateriano.
    (Expreso)
