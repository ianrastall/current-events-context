Date: '2020-07-19'
Source_URI: Portal:Current events/2020 July 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War; Libya-Sudan relations
  - Sudanese forces arrest about 160 people on the border with Libya who were en-route
    to enter the neighboring country to operate as "mercenaries". A General for the
    Rapid Support Forces says that "sending Sudanese to fight in Libya as mercenaries
    is unacceptable". (AFP via Al Arabiya)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong records its highest one-day increase in cases since the pandemic began,
    with 108 new cases, including 83 local transmission cases and 25 imported cases.
    (BBC News)
  - Chief Executive Carrie Lam announces new measures including plans to make it compulsory
    to wear masks inside any public indoor venue and a new order for non-essential
    civil servants to work from home. (France 24)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports its highest one-day increase in COVID-19 deaths and recoveries,
    with 127 new deaths bringing the nationwide death toll to 4,143, and 2,133 new
    recoveries bringing the nationwide number of recoveries to 45,401. (detikHealth)
    (Reuters)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Texas
  - Texas Governor Greg Abbott announces that five United States Navy teams would
    be deployed to hospitals in Harlingen, Del Rio, Eagle Pass, and Rio Grande City.
    (Texas Tribune)
  International relations:
  - Israel–European Union relations
  - The Israeli government approves the subsea EastMed pipeline which will supply
    Europe with natural gas. The construction of the pipeline is expected to be completed
    by 2025, and will provide an estimated 10 billion cubic meters of gas per year.
    (Reuters)
  Law and crime:
  - George Floyd protests
  - George Floyd protests in Oregon
  - George Floyd protests in Portland
  - Portland Mayor Ted Wheeler renews calls for federal troops to leave the city,
    accusing them of "using abusive tactics against protesters." (BBC News)
  - 2019–2020 Iranian protests, Capital punishment in Iran
  - Iran halts the execution of three young men who were sentenced to death for taking
    part in anti-government protests last year. Their lawyer says a request for a
    new trial was accepted by the Supreme Court after a hashtag against their executions
    went viral. (BBC News)
  - An Algerian man in Antwerp, Belgium, dies after a police officer knelt on his
    back during an arrest outside a bar. The death was compared to that of George
    Floyd. (BBC News)
  - Officials in Sierra Leone report that four protesters, looking to block the movement
    of a power generator to another town, were killed in the city of Makeni in Saturday's
    protests after both police and soldiers opened fire on them. The government had
    acknowledged "potential loss of life" but had not provided details. (Reuters)
  - A shooting at the home of U.S. District Judge Esther Salas leaves her son dead
    and her husband injured. Salas herself is not injured. Law enforcement officials
    say the gunman was dressed in a FedEx uniform. (AP) (CNN)
  Politics and elections:
  - 2020 Syrian parliamentary election
  - Syrians head to the polls to elect 250 seats of parliament. It is expected that
    President Bashar al-Assad and his party will win most seats. It is also the first
    time the elections are being held in areas formerly controlled by anti-Assad forces.
    (DW)
  - Kuwait's ruler, Emir Sabah Al-Ahmad Al-Jaber Al-Sabah, 91, undergoes successful
    surgery and medical treatment. Crown Prince Nawaf Al-Ahmad Al-Jaber Al-Sabah,
    who is 83, temporarily assumes some of the powers and will maintain such powers
    until "the health event is over". (AP)
  Science and technology:
  - Emirates Mars Mission
  - Mitsubishi Heavy Industries successfully launches Hope, a United Arab Emirates
    space probe to Mars, from Tanegashima Space Center in Japan. It is the first mission
    to Mars from the Arab world. (The Independent)
