Date: '2020-07-05'
Source_URI: Portal:Current events/2020 July 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - A local politician is abducted and killed by Al-Shabaab militants in Bal'ad, Middle
    Shabelle, Somalia. (Voice of America)
  - American-led intervention in Iraq (2014–2021)
  - A Katyusha rocket falls in the Green Zone of Baghdad, Iraq, injuring a child and
    damaging a house. Iraqi security forces also thwart another rocket launched at
    Camp Taji, which houses U.S. troops. Also, a MIM-104 Patriot defense system shoots
    down a missile launched against the U.S. embassy. (Al Arabiya)
  - Second Libyan Civil War
  - The Government of National Accord (GNA) warns of a "response in the right place
    and at the right time" after a "foreign air force" bombed the Al-Watiya Air Base
    in an overnight air raid, according to the GNA's Deputy Defence Minister Salah
    al-Namrush. Al-Namrush did not specify which foreign air force was behind the
    raid, which is believed to have targeted a Turkish anti-aircraft missile system.
    (Al Jazeera)
  - Hachalu Hundessa riots
  - The death toll amid civil unrest in Oromia Region, Ethiopia, rises to 166 people,
    including 11 security personnel. More than 1,000 people have been arrested. (BBC
    News)
  Arts and culture:
  - COVID-19 pandemic in India
  - The government extends the lockdown in the city of Agra and delays the reopening
    of the Taj Mahal for tourists and visitors after a spike in COVID-19 cases in
    the country. (Reuters)
  Business and economy:
  - Mercedes-Benz announces that it will be recalling 668,954 vehicles in China over
    possible issues with oil leakage. (AP)
  Disasters and accidents:
  - 2020 Kyushu floods
  - The death toll from floods in Kumamoto Prefecture, Japan, rises to 20 and 14 people
    remain missing. Prime Minister Shinzo Abe meets with a disaster task force team
    to step up rescue efforts. Meanwhile, weather agencies warn people to remain alert
    as more rains are predicted. (Reuters)
  - Eight people are feared dead following a mid-air collision between two planes
    flying over Lake Coeur d'Alene in Idaho, US, both of which then crashed into the
    waters. Two of the victims' bodies have already been recovered. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Michigan
  - Michigan reports no new deaths from COVID-19 for the first time since March 17.
    (MLive.com)
  - COVID-19 pandemic in Iran
  - Iran's Ministry of Health and Medical Education reports the highest daily death
    toll to date from COVID-19, recording 163 deaths. Iran's cases reach 240,438 while
    the deaths jump to 11,571. (Reuters)
  Law and crime:
  - List of mass shootings in the United States in 2020
  - At least two people are killed and eight injured, four critically, in a mass shooting
    at a nightclub in Greenville, South Carolina. No suspects have been arrested.
    (WYFF) (AP) (CNN)
  - In Atlanta, a large group of people were watching fireworks when a gunfight broke
    out after a car hit a pedestrian. Fourteen people were wounded, of which two were
    declared dead at the hospital. (WSB-TV)
  - The incidents were part of a violent Independence Day weekend across in the United
    States which left 160 people dead and over 500 more wounded in shootings. (The
    Guardian)
  - COVID-19 pandemic in Arizona, Face masks during the COVID-19 pandemic in the United
    States
  - An Arizona woman in Scottsdale is arrested at Target after pulling face masks
    off the displays. (popculture.com) (New York Daily News)
  - A bus driver in the French city of Bayonne is left brain dead after reportedly
    being assaulted by passengers who refused to wear face masks. Bus services in
    the city have been severely disrupted as drivers refuse to work following the
    incident. (BBC News)
  Politics and elections:
  - 2020 Dominican Republic general election
  - After having been postponed once due to the COVID-19 pandemic, general elections
    are held in the Dominican Republic. The electorate can vote for the new members
    of the Senate and Chamber of Deputies as well as the country's next president.
    (BBC News)
  - Conservative candidate and opposition leader Luis Abinader is proclaimed the winner,
    ending 16 years of centre-left rule. (BBC News)
  - 2020 Croatian parliamentary election
  - Croatia holds parliamentary elections amid the COVID-19 pandemic. Rising infection
    rates and the pandemic's effects on the economy might influence the outcome of
    the election. (Reuters)
  - 2020 New Caledonian independence referendum
  - The Labour Party (New Caledonia) expresses its support for independence from France
    in the upcoming referendum, the party leader Louis Kotra Uregei says after abstaining
    in 2018. (RNZ)
  - Yuriko Koike wins her second term as Governor of Tokyo. (AP)
