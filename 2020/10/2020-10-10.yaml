Date: '2020-10-10'
Source_URI: Portal:Current events/2020 October 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - October 2020 Afghanistan attacks
  - A bomb kills at least five people and injures another nine in Grishk District,
    Helmand Province. (TOLOnews)
  - A bus hits a roadside bomb, killing two people and injuring another ten in Shindand
    District, Herat Province. (TOLOnews)
  - 2020 Kyrgyzstan protests
  - Kyrgyzstan special forces detain former President Almazbek Atambayev in a raid
    on his compound. Atambayev was freed from prison by anti-government protesters
    on October 5. (BBC News)
  Arts and culture:
  - Luis Fonsi's Despacito music video becomes the first video on YouTube to surpass
    seven billion (7,000,000,000) views. (Archive)
  Disasters and accidents:
  - 2020 Atlantic hurricane season
  - Hurricane Delta
  - Delta weakens to a tropical storm. (Sky News)
  - Over 700,000 power outages are reported in the U.S. states of Louisiana, Texas,
    and Mississippi. (CBS News)
  - 2020 wildfire season
  - Wildfires kill at least two people in Syria. (Al Jazeera English)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the Czech Republic
  - The government mull reimposing a lockdown as the health ministry reports 8,618
    new cases on Friday, surpassing the previous record set on Thursday and reached
    a fourth straight daily record for the country where infection rate per capita
    (398 per 100,000) is the highest in the European Union. (Arab News)
  - COVID-19 pandemic in France
  - The number of confirmed cases in France increases by 26,896 to 718,873, setting
    a record for the largest number of reported cases since the beginning of the pandemic.
    (The Hill)
  - COVID-19 pandemic in Germany
  - The number of confirmed cases in Germany increased by 4,721 to 319,381, according
    to data from the Robert Koch Institute for infectious diseases. It is the highest
    number of reported cases in a single day since April as the country tightens its
    restrictions in Berlin and Frankfurt. (Al Jazeera)
  - COVID-19 pandemic in the Republic of Ireland
  - National Public Health Emergency Team reports 1,012 new cases in Ireland in 24
    hours. It is the highest number of reported cases in Ireland since April, when
    1,068 cases were reported. (The Irish Times)
  - COVID-19 pandemic in Portugal
  - Portugal registers 1,646 new daily cases, bringing the cumulative total of confirmed
    cases to 85,574. This is the highest daily increase for the country since the
    beginning of the pandemic. (DGS)
  - COVID-19 pandemic in Ukraine
  - The number of daily deaths in Ukraine exceeds 100 for the first time since the
    pandemic began, jumping to 108, according to a statement from the NSDC, with a
    total of 4,887 deaths being recorded since the first cases were reported in the
    country. (Reuters)
  - COVID-19 pandemic in Russia
  - Russia reports 12,846 cases, their highest since the start of the pandemic. The
    number of cases reaches to 1,285,084. (Reuters)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York (state)
  - New York governor Andrew Cuomo announces that 826 people have been hospitalized
    with COVID-19, the highest number since July 15. (ABC News)
  - COVID-19 pandemic in Michigan
  - The Michigan Department of Health and Human Services reports that around 104,000
    people in Michigan have recovered since the start of the pandemic. However, the
    state reported 1,522 new cases and 15 deaths, bringing the statewide total number
    of cases to 134,656 and death toll to 6,891. (Mlives.com)
  - COVID-19 vaccination in the United States
  - Health and Human Services Assistant Secretary for Preparedness and Response Robert
    Kadlec says that the United States might expect deliveries of a COVID-19 vaccine
    in January 2021. (Wink News)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Manitoba
  - The Manitoba government announced 97 new cases of COVID-19 in the province, setting
    a single-day record since the first cases reported in Manitoba. (CTV News)
  - COVID-19 pandemic in Mexico, COVID-19 vaccination in Mexico
  - Mexico announces that it will pay $159.88 million to the World Health Organization
    to secure vaccine access through the agency’s COVAX plan. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Iran
  - Iran imposes additional restrictions for its capital Tehran. The new restrictions
    include making everyone wear a mask while indoors mandatory, and there is a fine
    of 500,000 rials ($1.6) for violators who do not comply with the new rules. A
    partial shutdown implemented in the city last week is extended until October 16.
    (Al Jazeera)
  - COVID-19 pandemic in Nepal
  - Nepal reports 5,008 new infections in the past 24 hours and taking the nationwide
    total at 105,684, the highest single day record of reported cases since the first
    cases were detected on January 23. (PTI via Financial Express)
  - COVID-19 pandemic in Brazil
  - The number of COVID-19 deaths in Brazil exceeds 150,000. (Reuters)
  International relations:
  - North Korea and weapons of mass destruction
  - North Korea holds a rare nighttime military parade featuring missiles to mark
    the 75th anniversary of the Workers' Party. This was the country’s first military
    parade in two years. (BBC News)
  Law and crime:
  - George Floyd protests, 2020–2021 United States racial unrest
  - Shooting of Alvin Cole
  - Authorities in Wauwatosa, Wisconsin, announce that 28 people have been arrested
    during the third night of protests over the lack of charges against Joseph Mensah,
    the officer accused of killing 17-year-old Alvin Cole. (ABC News)
  - Demonstrations are held in Wauwatosa for a fourth consecutive day following the
    Milwaukee County District Attorney's decision not to prosecute Joseph Mensah for
    the fatal shooting of Alvin Cole. (Milwaukee Journal Sentinel)
  - George Floyd protests in Kentucky
  - Over 500 people march at Tyler Park in Louisville to march in the name of Breonna
    Taylor. Rep. John Yarmuth, State Rep. Charles Booker, Kentucky State Senator Morgan
    McGarvey, and Louisville Urban League President Sadiqa Reynolds speak at the Tyler
    Park protest. (The Courier-Journal)
  - Protests over responses to the COVID-19 pandemic
  - COVID-19 pandemic in Israel, Corruption in Israel
  - Protesters gather to call for the resignation of Prime Minister Benjamin Netanyahu
    for allegations of corruption and his response to the COVID-19 pandemic in the
    country. (AP)
  - Omnibus Law on Job Creation, Indonesia omnibus law protests
  - Authorities in Jakarta were cleaning up burned-out cars, government offices and
    bus shelters that were set ablaze by protesters enraged over an omnibus law they
    critics say will cripple labour rights and harm the environment. The authorities
    estimate the damage from the protest is Rp. 55 billion (US$3.7 million). (The
    Washington Post)
  Politics and elections:
  - 2020 Belarusian protests
  - Alexander Lukashenko, disputed President of Belarus, visits opposition activists
    in a prison in Minsk. (ABC News)
  Science and technology:
  - 2020 in spaceflight
  - Boulders are discovered on the Bennu asteroid by NASA's OSIRIS-REx spacecraft,
    which is expected to collect samples from the asteroid's surface later this month.
    (Space.com)
  - NASA announces that the SpaceX Crew-1 mission to the International Space Station
    would be delayed to mid-November. Furthermore, NASA calls for SpaceX satellite
    to investigate the issue that caused a GPS Block III to abort two seconds before
    launching on October 2. (CBS News)
  Sports:
  - 2020 French Open
  - Iga Świątek of Poland beats Sofia Kenin of the United States in the final of the
    Women's Singles 6–4, 6–1. Świątek became the first Polish tennis player to win
    a Grand Slam singles title. (The Washington Post)
