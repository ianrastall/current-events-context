Date: '2020-10-17'
Source_URI: Portal:Current events/2020 October 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Nagorno-Karabakh conflict, 2020 Ganja ballistic missile attacks
  - Azeri authorities say 13 civilians were killed and more than 40 others wounded
    by an Armenian Scud missile attack on Ganja, Azerbaijan. The Armenian Defence
    Ministry says it is not true while Turkey calls the strike a "war crime". (Al
    Jazeera)
  - Azerbaijan says its troops have captured the city of Füzuli in Nagorno-Karabakh.
    Azerbaijani President Ilham Aliyev tweets "Fuzuli city was liberated from the
    occupiers. Fuzuli is ours! Karabakh is Azerbaijan! I cordially congratulate all
    the people of Azerbaijan on this occasion." (Trend)
  - Armenian air defences shoot down three Azerbaijani drones operating in its national
    airspace, according to the Ministry of Defence of Armenia. (Urdupoint)
  - Armenia and Azerbaijan announce they are again attempting to establish a ceasefire.
    (CBC)
  - Iraqi insurgency (2017–present)
  - At least eight Sunni Arabs are massacred by unknown men in Balad. The area is
    controlled by the Asa'ib Ahl al-Haq militia prompting accusations against the
    militia. (Xinhua) (The Jerusalem Post)
  Arts and culture:
  - Impact of the COVID-19 pandemic on cinema, COVID-19 pandemic in New York
  - New York Governor Andrew Cuomo announces that movie theaters in counties with
    no cluster zones in the state can reopen on October 23 with restrictions up to
    25% in capacity with a maximum of 50 people per screen. However, movie theaters
    in New York City will remain closed. (Variety)
  Disasters and accidents:
  - 2020 California wildfires
  - According to the California Department of Forestry and Fire Protection, California
    wildfires have consumed around 1 million acres (1,600 sq. miles) over the past
    month. This represents approximately 1% of California's land area. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - Italy reports 10,925 new infections in the past 24 hours, a new record for a single
    day in the country since the pandemic began. As a result, Prime Minister Giuseppe
    Conte is slated to announce new restrictions tomorrow. (Corriere della Sera) (Reuters)
  - Lombardy announces new restrictions ordering all bars closed at midnight effective
    today, with bars only able to serve customers seated at tables after 6 p.m. local
    time, and the sale of takeaway alcohol is also banned after that time. The region
    also prohibits the consumption of food and drink in all outside public areas under
    the new restrictions. (RFI)
  - COVID-19 pandemic in Austria
  - Austria reports 1,747 new infections in the past 24 hours, a new one-day record
    for the country since the pandemic began. (Reuters)
  - COVID-19 pandemic in Cyprus
  - Cyprus reports 202 new infections in the past 24 hours, a new record for the country
    that suggests the virus is spreading at a rapid pace as Cypriots fail to follow
    hygiene and social distancing protocols. (Financial Mirror)
  - COVID-19 pandemic in France
  - France reports a record 32,427 new cases in the past 24 hours as curfew goes into
    effect in Paris and other major cities in a bid to contain the outbreak. (Bloomberg)
  - COVID-19 pandemic in Germany
  - The number of new cases in Germany rises by 7,830 in the past 24 hours, a record
    for the third consecutive day. (DPA International)
  - COVID-19 pandemic in Ukraine
  - Ukraine reports a record 6,410 new cases in the past 24 hours, according to a
    statement from the NSDC. In addition, 109 patients have died in the past 24 hours,
    the highest daily death toll since the start of the pandemic. (Swiss Info)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Iran
  - Iran surpasses 30,000 COVID-19 deaths. (AP)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports 869 new infections in the past 24 hours, its highest daily count
    so far since the beginning of the outbreak. Of these new cases, 451 cases were
    from Sabah. (New Straits Times)
  - COVID-19 pandemic in Thailand
  - Thailand reports its first two locally transmitted cases of COVID-19 in more than
    one month, after two Myanmar nationals living near the border with the country
    tested positive. (CNA)
  - COVID-19 pandemic in Bangladesh
  - Information Minister Hasan Mahmud is hospitalized at Square Hospital in Dhaka
    after testing positive for COVID-19. (Bdnews24.com)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Indiana
  - Indiana's Department of Health reports a record 2,521 new cases in a single day.
    That brings the state's cumulative total to 145,977 cases. This total includes
    100 cases that were delayed in reporting "due to a technical issue." (The Indianapolis
    Star)
  - COVID-19 pandemic in Ohio
  - Ohio's Department of Health reports 2,234 new cases in the last 24 hours, which
    sets a new record for the fourth consecutive day. (WFMJ-TV)
  - The United States reports 70,450 new cases in the last 24 hours, the highest number
    since July 24. (The New York Times)
  - COVID-19 vaccine
  - Russia is to begin clinical trials of its Sputnik V vaccine in India. (Reuters)
  Law and crime:
  - End SARS
  - The Nigerian Army announces a cyber warfare operation as protests against police
    brutality in the country continue. (Premium Times)
  Politics and elections:
  - 2020 New Zealand general election
  - Citizens of New Zealand head to the polls to elect the members of the country's
    House of Representatives. Next to the general election, the voters also decide
    about the country's policy regarding recreational marijuana and euthanasia. (The
    Guardian)
  - Prime Minister Jacinda Ardern wins a second term in a historic landslide. Ardern's
    Labour Party becomes the first party to win a majority since the proportional
    system was introduced in 1996. (TVNZ) (NBC News)
