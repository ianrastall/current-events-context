Date: '2020-10-11'
Source_URI: Portal:Current events/2020 October 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - October 2020 Afghanistan attacks
  - At least 13 people, including ten Afghan soldiers, are killed and another three
    injured in a roadside bombing attack in Sar-e Pol Province. (TOLOnews)
  - 2020 Nagorno-Karabakh conflict
  - Azerbaijan says an Armenian missile strike on its second-largest city Ganja has
    destroyed a residential apartment building, killing nine people and injuring dozens
    of others. Armenia rejects reports of the strike. Blasts are also heard in Stepanakert
    as clashes resume in Nagorno-Karabakh. (BBC News) (Caspian News)
  - Insurgency in Khyber Pakhtunkhwa
  - Insurgents kill at least two Pakistani soldiers and injure three others in Manra
    Mendara, North Waziristan, Khyber Pakhtunkhwa, Pakistan. (Dawn)
  Disasters and accidents:
  - 2020 Atlantic hurricane season
  - Two people are reported to be dead following the aftermath of Hurricane Delta
    in Louisiana. (CNN) (Global News)
  - List of explosions
  - A gas explosion kills at least five people and injures another nine in Ahvaz,
    Khuzestan Province, Iran. (Reuters)
  - European migrant crisis
  - A migrant boat capsizes off the coast of Tunisia, killing at least 11 people,
    who were all women and children, according to the Tunisian Navy. Around 20 others
    are still missing. (Reuters)
  - A collision between a bus and a train kills 20 people and injures another in Thailand.
    (Reuters)
  - Floods kill at least two people in Cambodia and five in Vietnam. (Al Jazeera)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York (state)
  - The COVID-19 infection rate in New York drops to its lowest in two weeks for the
    first time since September 24. However, the state continues to battle COVID-19
    clusters in Hasidic Jewish communities in Orange County, Rockland County, Brooklyn,
    and several areas in the Queens borough. (NNY360.com) (Newsday)
  - COVID-19 pandemic in Florida
  - Florida's Department of Health reports 5,570 additional COVID-19 cases, the highest
    number of reported cases in a single day since August. It comes a day after Florida
    did not report any new cases or deaths because officials were left combing through
    400,000 test results a private lab resent Friday night. (Miami Herald)
  - COVID-19 pandemic in Kentucky
  - Kentucky governor Andy Beshear and his family enter quarantine after a member
    of his security detail who drove with his family tested positive for COVID-19.
    (The Hill)
  - COVID-19 pandemic in Colorado
  - Colorado Governor Jared Polis extends the statewide mask mandate for 30 days.
    (KKTV-TV)
  - COVID-19 pandemic in California
  - California reports 2,209 hospitalizations, the lowest in the state since April.
    (Los Angeles Times) (Mercury News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Kerala
  - The state of Kerala passes Maharashtra to become the state with most number of
    new COVID-19 cases, with 11,755 new cases being reported, the highest ever for
    the state. (The Indian Express)
  - India surpasses seven million COVID-19 cumulative cases, becoming the second country
    to reach that milestone after the United States. (AP via ABC News)
  - COVID-19 pandemic in Iran
  - Two high-ranking Iranian officials, Mohammad Bagher Nobakht and Ali Akbar Salehi,
    test positive for COVID-19. (Al Arabiya)
  - Iran announces its highest single-day death toll from the virus, with 251 confirmed
    deaths in the last 24 hours, the same day that the country surpasses 500,000 COVID-19
    cases. (AP via ABC News)
  - COVID-19 pandemic in Indonesia, 2020 Indonesia large-scale social restrictions
  - It is announced that the Indonesian capital Jakarta will restart its "transitional"
    eased large-scale social restrictions effective tomorrow, after a pace of infections
    has slowed within two weeks, according to a statement from the governor Anies
    Baswedan. (Reuters)
  - COVID-19 pandemic in Lebanon
  - The Interior Ministry ordered the closure of pubs, bars, nightclubs and amusement
    parks until further notice in a bid to curb the spread of COVID-19. In addition,
    169 towns and village across Lebanon were put into a local lockdown, which will
    begin tomorrow at 6:00 a.m. local time. (The Daily Star)
  - COVID-19 pandemic in South Korea
  - Prime Minister Chung Sye-kyun announces that South Korea will begin easing social
    distancing rules from Level 2 to Level 1 nationwide tomorrow, allowing limited
    audiences at sporting events and the reopening of nightly entertainment facilities,
    as long as they comply with anti-virus health protocols, as new cases have been
    edging lower in recent weeks. However, some restrictions will be kept in place
    in Seoul Capital Area and other high-risk facilities. (The Jakarta Post) (Yonhap
    News Agency)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - Montpellier and Toulouse both announce maximum alert status for the city and their
    respective surrounding towns effective October 13, joining Paris, Marseille and
    four other cities due to soaring cases and hospitalization in France. (The Washington
    Post)
  - COVID-19 pandemic in Greece
  - Greece reports 13 new deaths taking the nationwide total to 449, a new record
    since the beginning of the pandemic. (Ekathimerini)
  - COVID-19 pandemic in Russia
  - Russia registers 13,634 new cases in the last 24 hours, taking the cumulative
    nationwide total to 1,298,718, the fourth highest in the world. This marks a new
    record of confirmed cases in a single day since the first cases were confirmed
    in January. (Times of India)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom is expected to test the BCG vaccine on frontline care workers
    to see if it's effective against COVID-19. (Reuters)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia
  - Victorian premier Daniel Andrews extends its state of emergency and state of disaster
    across the state for the next four weeks until November 8. (7 News)
  - COVID-19 pandemic in New Zealand
  - The government announces that they have signed a deal with Pfizer and BioNTech
    to purchase 1.5 million vaccine doses for 750,000 people in the country. (New
    Zealand Herald)
  International relations:
  - Iran–United States relations, Iranian intervention in Iraq
  - Kata'ib Hezbollah, an Iran-backed militia, announces that they have agreed to
    ceasefire operations against United States interests in Iraq. (Washington Post)
  Law and crime:
  - 2020 Belarusian protests
  - Riot police in Belarus use water cannons and stun grenades to break up mass protests
    against disputed President Alexander Lukashenko. (BBC News)
  Politics and elections:
  - 2020 Lithuanian parliamentary election
  - The first round of parliamentary elections in Lithuania takes place. Voters are
    asked to elect the 141 members of the Seimas amidst a rapid increase of COVID-19
    cases, causing fears of a low voter turnout. (DW)
  - 2020 Northern Cypriot presidential election
  - Voters in Northern Cyprus vote to select the president after being delayed for
    months due to the COVID-19 pandemic. The election council reports that nationalist
    Prime Minister Ersin Tatar narrowly defeated pro-reunification incumbent Mustafa
    Akıncı. As neither candidate received a majority of the vote, a run-off will be
    held on October 18. (Al Jazeera)
  - 2020 Tajik presidential election
  - Voters in Tajikistan head to the polls to elect the country's President. Long-time
    authoritarian leader Emomali Rakhmon is highly expected to be declared the clear
    victor of the election. (DW)
  Sports:
  - 2020 French Open
  - Rafael Nadal of Spain defeats Novak Djokovic of Serbia in the final of the Men's
    Singles 6–0, 6–2, 7–5. With the win, Nadal equalled Roger Federer's all-time record
    of 20 Grand Slam singles titles. (The Sydney Morning Herald)
  - 2020 NBA Finals
  - The Los Angeles Lakers win the NBA Finals following their 106–93 victory against
    the Miami Heat in game 6, bringing an end to the 2020 NBA Bubble in Orlando. (NBC
    News)
