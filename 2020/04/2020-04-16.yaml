Date: '2020-04-16'
Source_URI: Portal:Current events/2020 April 16
Intelligence_Payload:
  Health and environment:
  - COVID-19 pandemic
  - The number of confirmed coronavirus cases passes two million worldwide. (Foreign
    Policy)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Eswatini
  - Eswatini reports the country's first death from COVID-19, as total cases rise
    to 17. (National Post)
  - COVID-19 pandemic in Nigeria
  - At least 18 people in Nigeria have been killed by police during the enforcement
    of measures to curb the spread of COVID-19. (De Telegraaf)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The government extends the country's lockdown for at least another three weeks.
    (BBC News)
  - The COVID-19 critical care NHS Nightingale Hospital Birmingham is opened inside
    the National Exhibition Centre in Solihull, England. It can treat up to 4,000
    COVID-19 patients. (BBC News)
  - COVID-19 pandemic in Germany
  - The Robert Koch Institute reports 2,866 new confirmed cases and 315 more deaths
    from COVID-19, the highest daily death toll in the country to date, bringing Germany's
    death toll to 3,569 and 130,450 total cases. (Reuters)
  Law and crime:
  - Police discover the bodies of 17 people inside a morgue built for four at a nursing
    home in New Jersey, United States, following an anonymous tip-off. (BBC News)
  - COVID-19 pandemic in India
  - Tablighi Jamaat leader Muhammad Saad Kandhlawi is charged with manslaughter after
    a gathering the organization held in Delhi on March 3 was linked to 1,023 coronavirus
    cases across 17 Indian states. Police say he ignored two notices to end the religious
    event at a mosque in Delhi, though he denies any wrongdoing. (BBC News)
  - Saudi Arabia executes a 33-year-old Yemeni man convicted for an attack on a Spanish
    dance troupe last year, which resulted in two dancers injured. The attack was
    claimed by the affiliate of al-Qaeda in the region. (Al Jazeera)
  Politics and elections:
  - COVID-19 pandemic in Brazil, Impact of the COVID-19 pandemic on politics
  - Brazilian President Jair Bolsonaro fires Health Minister Luiz Henrique Mandetta
    amid disagreements over the federal government's response to the coronavirus pandemic.
    He is replaced by Nelson Teich. (CNN)
