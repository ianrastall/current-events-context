Date: '2020-04-24'
Source_URI: Portal:Current events/2020 April 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen, COVID-19 pandemic in Yemen
  - The Saudi-led coalition announces the extension of a unilateral ceasefire by one
    month to fight the pandemic. The Houthis did not accept the coalition's previous
    ceasefire that expired Thursday. Reportedly, the Houthis "want a lifting of air
    and sea blockades imposed by the coalition to the regions they control before
    agreeing to a ceasefire". (Reuters)
  - Internal conflict in Myanmar
  - Unknown gunmen attack the headquarters of the government-backed Pan Say militia
    in Muse, Shan State. The attackers opened fire with small arms and artillery before
    fleeing in cars and motorbikes. No group has claimed responsibility for the attack.
    (The Irrawaddy)
  - Kivu conflict
  - 'An attack by members of the Democratic Forces for the Liberation of Rwanda in
    Virunga National Park, Democratic Republic of the Congo, leaves 17 people dead:
    12 park rangers and five civilians. (Al Jazeera)'
  Business and economy:
  - COVID-19 pandemic in Indonesia
  - The government bans vehicles from entering or leaving the Jakarta metropolitan
    area to prevent Mudik, a local observance in which migrants and migrant workers
    return home for Ramadan. (The Jakarta Post)
  - Economic impact of the COVID-19 pandemic in the United States
  - President Donald Trump signs a billion interim coronavirus relief bill that will
    add another $310 billion to the small-business Paycheck Protection Program, as
    well as provide billions in aid to hospitals and for testing. (Axios)
  Health and environment:
  - COVID-19 pandemic in the United States
  - More than 50,000 people have now died in the United States from COVID-19, according
    to data from Johns Hopkins University. (BBC News)
  Law and crime:
  - Saudi Arabia says it will end flogging as a form of punishment, according to a
    government document. (Reuters)
  - Six activists of the Free Papua Movement are sentenced by an Indonesian court
    to 8–9 months in prison for treason. The ruling is condemned by Amnesty International
    and Human Rights Watch as a violation of their freedom of speech and assembly.
    (Reuters)
  Politics and elections:
  - Brazilian Minister of Justice Sérgio Moro resigns, claiming President Jair Bolsonaro
    is criminally interfering with the country's law enforcement. (Reuters)
