Date: '2020-04-21'
Source_URI: Portal:Current events/2020 April 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Mozambique (2017–present)
  - Mozambique police say 52 male villagers were killed by Islamist militants earlier
    this month in the Muidumbe District, Cabo Delgado Province, after they refused
    to join their ranks. (Reuters)
  - Internal conflict in Myanmar
  - A World Health Organization worker collecting coronavirus samples is killed after
    his United Nations–marked vehicle was hit by gunfire in Rakhine State, Myanmar.
    Both the Myanmar Army and Arakan Army rebels deny any involvement in the attack.
    (BBC News)
  Arts and culture:
  - COVID-19 pandemic in Spain
  - The city council of Pamplona announces the suspension of the San Fermín festival
    scheduled for July, for the fifth time in its history. (The Guardian)
  Business and economy:
  - Cannabis in Lebanon
  - The Lebanese Parliament legalizes cannabis farming for medicinal purposes, in
    hopes that it will bring revenue to the country. (Reuters)
  - Oil Prices
  - Crude Oil prices fell to a 21 year low with seller's paying as much as 30 dollars
    a barrel to take it off their hands. (Washington Post
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Russia
  - Russia reports 5,642 new confirmed cases and 51 more deaths from COVID-19, the
    highest daily death toll in the country to date, bringing Russia's death toll
    to 456 and 52,763 total cases. (TASS)
  - A 56-year-old urologist becomes the first Russian doctor to die from COVID-19
    at a hospital in Moscow. (The Moscow Times)
  International relations:
  - China–United States relations, COVID-19 pandemic in Missouri
  - Missouri becomes the first U.S. state to file a lawsuit against the Chinese government
    over the coronavirus pandemic, claiming the government is responsible for the
    virus's negative impact on the state's economy and that the nation is "hoarding"
    masks. A Chinese Foreign Ministry spokesman says his country is "not under the
    jurisdiction of U.S. courts"; that "abuse of litigation" does not help the "epidemic
    response at home in the United States and also runs counter to international cooperation".
    (Reuters)
  Law and crime:
  - 2020 Nova Scotia attacks
  - The death toll in last Sunday's killing spree in Nova Scotia, Canada, rises to
    at least 23, including the perpetrator. (CBC News)
  - Pio Tikoduadua, a member of Fiji's National Federation Party, is arrested after
    he uploaded a video to Facebook denouncing police brutality. His party demands
    his immediate release. (RNZ)
  - Baakline attack
  - A man kills his wife, brother and seven others in Baakline, Lebanon, in the country's
    worst mass shooting in years, before being arrested. It is suspected they were
    honor killings. (Reuters)
  - Spanish National Police Corps officers arrest former rapper and ISIL militant
    Abdel-Majed Abdel Bary and two other men, after raiding their apartment overnight
    in Almería. Abdel Bary is suspected of being a member of the The Beatles cell,
    who were responsible for beheading Western hostages in Syria. (AP)
  Politics and elections:
  - 2020 Kiribati parliamentary election
  - Kiribatians head to the polls to elect members of the House of Assembly in the
    second round of voting. (RNZ)
  - 2019–2020 Chilean protests
  - Protests against the Chilean government in commemoration of the International
    Workers' Day are suppressed by the police, citing social distancing laws established
    due to the coronavirus pandemic. (BBC News)
