Date: '2020-04-02'
Source_URI: Portal:Current events/2020 April 2
Intelligence_Payload:
  Business and economy:
  - The United States Food and Drug Administration asks companies to stop selling
    all forms of the heartburn drug Ranitidine (Zantac). The agency says some medications
    contain a nitrosamine impurity called N-Nitrosodimethylamine (NDMA), a probable
    human carcinogen. (The Independent)
  Health and environment:
  - COVID-19 pandemic
  - The number of confirmed cases of COVID-19 reaches more than one million worldwide.
    (Sky News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Lebanon
  - The Philippines ambassador to Lebanon, Bernardita Catalla, dies from COVID-19
    in Beirut, according to the Department of Foreign Affairs. (The New Arab)
  - COVID-19 pandemic in Taiwan
  - Taiwan donates 10 million masks to countries hardest hit by COVID-19. (ABC News)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Fiji
  - Fiji announces a lockdown of the capital Suva, beginning tomorrow, as two more
    cases are confirmed. (RNZ)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - Spain records its deadliest day with 950 deaths, exceeding 10,000, as employment
    falls by 834,000 jobs in 15 days. (El Periódico) (La Vanguardia)
  - COVID-19 pandemic in France
  - France reports 1,355 more deaths from COVID-19, the highest daily death toll in
    the country to date, bringing the country's death toll to 5,387, the new figures
    include deaths in retirement homes for the first time. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 4,244 new cases and 569 more
    deaths from COVID-19, the highest daily death toll in the country to date, bringing
    the United Kingdom's death toll to 2,921 and 33,718 confirmed cases. (The Guardian)
  - Scottish comedian and member of comedy double act Little and Large, Eddie Large,
    dies due to complications from COVID-19 at Southmead Hospital in Bristol. (BBC
    News)
  - The National Health Service announces that two more Nightingale field hospitals
    will be built at Harrogate Convention Centre in Harrogate, North Yorkshire, and
    the University of the West of England in Bristol. (BBC News)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Zambia
  - Zambia reports the country's first death from COVID-19 as confirmed cases rise
    to 39; the patient had underlying health conditions, according to Health Minister
    Chitalu Chilufya. (CGTN)
  - COVID-19 pandemic in Malawi
  - In an address to the nation, President Peter Mutharika reports Malawi's first
    confirmed cases of COVID-19. (CGTN)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Ecuador
  - The Mayor of Guayaquil, Cynthia Viteri, herself infected with COVID-19, condemns
    the federal government's response to the pandemic as the virus rapidly spreads
    inside the city. A joint military and police task force has collected at least
    150 bodies off the streets. The government's spokesman Jorge Wated apologizes
    in a message broadcast on state television. (France 24) (CBS News)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Guam
  - United States Navy Captain Brett Crozier is dismissed as the commander of the
    USS Theodore Roosevelt aircraft carrier after he publicly raised concerns about
    a COVID-19 outbreak on the ship. U.S. Navy Secretary Thomas Modly says the commander
    "exercised extremely poor judgement". At least 100 people aboard the vessel have
    been reportedly infected. (BBC News)
  Law and crime:
  - American rapper 6ix9ine is released early from prison due to coronavirus concerns.
    (Complex)
  - A court in Pakistan overturns the convictions of four men for the murder of Daniel
    Pearl. The men have been jailed for 18 years. (CNN)
  Politics and elections:
  - Impact of the COVID-19 pandemic on politics
  - 2020 Democratic National Convention
  - The Democratic National Convention is postponed from July 13 to August 17 due
    to COVID-19 concerns. (Vox)
  - COVID-19 pandemic in the United States
  - United States President Donald Trump invokes the Defense Production Act to clear
    up supply-chain issues encountered in the manufacturing of ventilator machines.
    (CNN)
