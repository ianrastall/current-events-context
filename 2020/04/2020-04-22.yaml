Date: '2020-04-22'
Source_URI: Portal:Current events/2020 April 22
Intelligence_Payload:
  Disasters and accidents:
  - Tornado outbreak of April 22–23, 2020
  - Tornadoes touch down in the South Central United States, killing seven people
    and injuring dozens more. (The New York Times)
  - A semi-trailer crashes into two police cars along the Eastern Freeway near Kew,
    Victoria, Australia. Four police officers are killed, making it the deadliest
    incident for law enforcement in the history of Victoria. (News.com.au)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - The Indian Council of Medical Research advises all states to suspend using COVID-19
    rapid test kits for two days, after some kits were found to be faulty. (CNN)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 4,451 new confirmed cases and
    759 more deaths from COVID-19, bringing the United Kingdom's total cases to 133,495
    and the death toll to 18,100. (ITV)
  Science and technology:
  - Iran's Islamic Revolutionary Guard Corps deploys the country's first military
    satellite, using a new satellite carrier called "Ghased" ("Messenger"). (Deutsche
    Welle)
