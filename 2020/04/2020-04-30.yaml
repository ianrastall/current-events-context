Date: '2020-04-30'
Source_URI: Portal:Current events/2020 April 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Texas man opens fire with an AK-47 style rifle at the Cuban Embassy in Washington,
    D.C., in a suspected hate crime. No one is injured, and the shooter is arrested
    and charged. (The Washington Post) (Associated Press)
  Business and economy:
  - Syrian businessman and Syriatel owner Rami Makhlouf makes an "unprecedented" public
    appeal to his cousin, President Bashar al-Assad, on Facebook, saying a "cadre
    of officials" are seeking to seize his assets. Makhlouf, who was a part of President
    al-Assad's inner circle, says he will pay the President himself but not the state.
    (The Washington Post)
  Disasters and accidents:
  - Tornadoes of 2020
  - The 2020 tornado season in the United States is named the deadliest tornado season
    since 2011, particularly due to the outbreaks on March 2–3 and Easter Sunday.
    (Fox News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Yemen
  - Officials in Yemen report the country's first deaths from COVID-19 in the port
    city of Aden. (BBC News)
  - COVID-19 pandemic in Tajikistan
  - Tajikistan reports its first confirmed cases of COVID-19. Five people have tested
    positive for the virus in the capital Dushanbe, and 10 others in the northern
    Sughd Region, according to the state-run news agency Khovar. (Al Jazeera)
  Politics and elections:
  - 2020 United States anti-lockdown protests
  - COVID-19 pandemic in Michigan
  - Armed protesters storm the House chamber of the Michigan State Capitol to demand
    that Governor Gretchen Whitmer lifts the stay-at-home order. (Forbes) (New York
    Daily News)
  - COVID-19 pandemic in Russia
  - Russian Prime Minister Mikhail Mishustin temporarily steps down after being diagnosed
    with COVID-19; he will be replaced by Andrey Belousov. (Reuters)
  - The government of Sudan criminalises female genital mutilation. (The New York
    Times)
  Science and technology:
  - Artemis program
  - NASA officially selects SpaceX, Blue Origin and Dynetics to build its next-generation
    lunar lander to carry American astronauts to the Moon by 2024. (Reuters)
  Sports:
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in France
  - The Ligue de Football Professionnel awards Paris Saint-Germain F.C. the 2019–20
    Ligue 1 title after ending the season early. It is PSG's ninth Ligue 1 title.
    Amiens SC and Toulouse FC are subsequently relegated to Ligue 2. (BBC Sport)
