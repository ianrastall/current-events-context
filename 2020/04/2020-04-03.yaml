Date: '2020-04-03'
Source_URI: Portal:Current events/2020 April 3
Intelligence_Payload:
  Arts and culture:
  - Prague removes the controversial monument of Soviet General Ivan Konev, prompting
    anger from the Russian Embassy and Czech President Milos Zeman. Prague 6's local
    assembly voted to remove the Soviet-era monument in 2019. (RFERL)
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - Ford Motor Company extends the suspension of vehicle and engine production at
    most of its manufacturing sites in Europe to May 4 due to the COVID-19 pandemic.
    (Reuters)
  - COVID-19 pandemic in the Dominican Republic
  - The World Bank releases US$150 million to support the Dominican Republic's efforts
    to contain COVID-19. (Dominican Today)
  Disasters and accidents:
  - Cyclone Harold
  - Twenty-seven people died in Solomon Islands after their boat capsized during the
    Cyclone Harold. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in the Philippines
  - The Philippines records its single largest daily increase in casualties with 29
    deaths, bringing the total deaths in the country to 136. (CNA)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the Dominican Republic
  - The Governor of the Duarte Province, Luis Núñez, tests positive for COVID-19 just
    after his wife dies from the virus. (Dominican Today)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 684 more deaths from COVID-19,
    the highest daily death toll in the country to date, bringing the country's death
    toll to 3,605 and 38,168 confirmed cases. (Sky News)
  - COVID-19 pandemic in Switzerland, Impact of the COVID-19 pandemic on prisons
  - Police surround the Champ-Dollon prison in Geneva, Switzerland, after dozens of
    prisoners refuse to return to their cells because of new coronavirus measures.
    (Reuters)
  - COVID-19 pandemic in Spain
  - Spain's Ministry of Health reports 7,500 new cases and 932 more deaths from COVID-19,
    bringing the country's death toll to 10,935 and 117,710 confirmed cases. (The
    Independent)
  - The country overtakes Italy in the number of positives and becomes the second
    country in the world with more coronavirus cases. (Reuters)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in the Falkland Islands
  - The United Kingdom's Falkland Islands reports their first confirmed case of COVID-19.
    The patient is reported to be in stable condition at King Edward VII Memorial
    Hospital in Stanley. (Reuters)
  - COVID-19 pandemic in Suriname
  - Suriname reports the country's first death from COVID-19 as confirmed cases rise
    to 10. (TASS)
  Law and crime:
  - Pakistan-United States relations
  - Following criticism by the US government, the government of Sindh prevents the
    release of Ahmed Omar Saeed Sheikh and three other men. Yesterday, the Sindh High
    Court overturned their convictions for the murder of Daniel Pearl. The Pakistani
    Foreign Minister says the "[release] order shall be challenged at a higher forum".
    (Outlook India)
