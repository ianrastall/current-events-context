Date: '2020-04-01'
Source_URI: Portal:Current events/2020 April 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - Turkish military intervention in the Second Libyan Civil War
  - A Turkish Naval Forces warship launches missiles at LNA positions near the city
    of Ajaylat in western Libya. (Middle East Monitor)
  - GNA forces say they shot down a Wing Loong drone used by the LNA over Ajaylat
    as clashes continue. (Libya Observer)
  Business and economy:
  - Whiting Petroleum Corporation declares bankruptcy. Whiting was once the largest
    oil producer in the Bakken shale region. (Reuters)
  - COVID-19 pandemic in the United States
  - Hobby Lobby is expected to reopen in states with stay-at-home orders. (CBS News)
  Disasters and accidents:
  - COVID-19 pandemic in California
  - Federal authorities charge 44-year-old Eduardo Moreno, a railroad engineer, with
    train-wrecking after he allegedly derailed a train near USNS Mercy to bring attention
    to the U.S. government's response to the pandemic. (NBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - China reports 130 asymptomatic cases of COVID-19. This is its first time reporting
    asymptomatic cases. (Bloomberg)
  - COVID-19 pandemic in Israel
  - Israeli Health Minister Yaakov Litzman tests positive for COVID-19 and will go
    into quarantine, as total number of cases in Israel rises to 6,092. (The Jerusalem
    Post)
  - COVID-19 pandemic in Yemen, Impact of the COVID-19 pandemic on prisons
  - Yemen's internationally recognised government releases more than 470 prisoners
    from detention facilities in areas under its control amid growing concerns the
    virus could spread in Yemen's overcrowded jails. The United Nations Human Rights
    Council has called for the release of all political prisoners. (The National)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Cuba
  - The government announces that all flights to and from the island nation are suspended,
    as of midnight on April 1. (WSVN)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Florida
  - Governor Ron DeSantis issues a stay-at-home order. (NBC News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - Italy extends its lockdown to April 13. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 563 more deaths from COVID-19,
    the highest daily death toll in the country to date, bringing the country's death
    toll to 2,352 and 29,474 cases. (BBC News)
  - Chief Minister Howard Quayle confirms the Isle of Man's first death from COVID-19,
    a patient with underlying health conditions at Noble’s Hospital. (BBC News)
  - Former Prime Minister of Somalia Nur Hassan Hussein dies from COVID-19 in London.
    (Voice of America)
  - COVID-19 pandemic in France
  - France reports 509 more deaths from COVID-19, bringing the country's death toll
    to 4,032 and 56,989 cases, with 6,017 of those patients reported in a serious
    condition requiring life support. (Reuters)
  International relations:
  - Russia–United States relations, COVID-19 pandemic in the United States
  - Russia is expected to send a plane with masks and medical supplies to the United
    States to help fight the COVID-19 pandemic. (Politico)
  - United States–Venezuela relations
  - United States President Donald Trump announces that United States Navy ships will
    be deployed to Venezuela on an anti-drug mission. (ABC News)
  Law and crime:
  - COVID-19 pandemic in the Dominican Republic
  - 19,517 people are arrested in the Dominican Republic for breaking curfew. (Dominican
    Today)
  Politics and elections:
  - Politics of San Marino
  - Grazia Zafferani and Alessandro Mancini are sworn in as Captains Regents of San
    Marino. (San Marino News)
