Date: '2020-04-09'
Source_URI: Portal:Current events/2020 April 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Five rockets hit Bagram Airfield in Afghanistan, with no casualties reported.
    The Taliban denies responsibility and ISIL claims responsibility. (Reuters)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, 2020 Russia–Saudi Arabia oil price war
  - OPEC+ holds an emergency meeting to try to agree on output cuts due to decreased
    demand for oil due to the coronavirus pandemic. Russia says it has "no plans to
    discuss oil markets with the leadership of Saudi Arabia or the U.S. on Thursday".
    (CNBC)
  Disasters and accidents:
  - 2019–20 South Pacific cyclone season
  - Cyclone Harold
  - Cyclone Harold hits Tonga. (The Washington Post)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - The Robert Koch Institute reports 4,974 new confirmed cases and 246 more deaths
    from COVID-19, bringing Germany's death toll to 2,107 and 108,202 cases. This
    marks the largest daily increase of deaths for Germany. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 881 more deaths from COVID-19,
    bringing the UK's death toll to 7,978 with 65,077 total confirmed cases. (Metro)
  - COVID-19 pandemic in Spain
  - Spanish Congress of Deputies approves an extension of the State of Alarm to 26
    April. With more than 140.000 reported cases, the country becomes the second in
    the world with number of cases, overtaking Italy. (EFE)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Michigan
  - Michigan's death toll from COVID-19 surpasses 1,000. The state has 1,076 deaths
    and 21,504 cases as of this date. Governor Gretchen Whitmer also extends the state's
    stay-at-home order, which was set to expire on April 13, until April 30, and adds
    several new social distancing restrictions. (MLive.com) (MLive.com 2)
  International relations:
  - Impact of the COVID-19 pandemic on politics
  - Taiwan strongly rejects accusations from the World Health Organization's Director-General
    Tedros Adhanom that it "condoned racist attacks" on him, and demands an apology.
    He has accused Taiwan's Ministry of Foreign Affairs of "waging a months-long campaign
    against him, including death threats and racist abuse." (ABC News) (Reuters)
  Law and crime:
  - Prisoners riot in Russia's high-security Penal Colony No 15 in the Siberian city
    of Angarsk over complaints of mistreatment by the guards. Fire on the grounds
    spread to three buildings including a woodwork factory. (Reuters) (BBC News)
