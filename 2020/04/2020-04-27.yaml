Date: '2020-04-27'
Source_URI: Portal:Current events/2020 April 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - In a televised address, Field Marshal Khalifa Haftar says his Libyan National
    Army is accepting a "popular mandate" to rule the country, seemingly declaring
    himself the ruler of Libya and dismissing the House of Representatives. An adviser
    to the Tripoli-based Government of National Accord says Haftar has exposed himself
    as an authoritarian. (Reuters)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, Coronavirus recession
  - Offshore drilling contractor Diamond Offshore Drilling files for bankruptcy due
    to the oil price collapse, following the reduction in oil demand during the global
    coronavirus pandemic. (The Wall Street Journal)
  - Impact of the COVID-19 pandemic on aviation
  - Delta Air Lines announces it is suspending flights to several small-hub airports
    after losing $534 million in the first quarter of this year due to aviation restrictions
    caused by the coronavirus pandemic. (MLive.com)
  Health and environment:
  - COVID-19 pandemic
  - The number of worldwide cases of COVID-19 surpasses three million. The United
    States accounts for more than a third of the total cases. (Reuters)
  - COVID-19 pandemic in New Zealand
  - Prime Minister Jacinda Ardern reports no new community transmissions of COVID-19
    for the first time since the pandemic began, effectively eliminating the spread
    of the virus. (BBC News)
  Law and crime:
  - Censorship in Vietnam
  - A court in Vietnam sentences a man to one and a half years in jail for posting
    anti-government content on Facebook. (Reuters)
  Politics and elections:
  - Joe Biden 2020 presidential campaign
  - Speaker of the House Nancy Pelosi officially endorses former Vice President Joe
    Biden, the presumptive nominee in the Democratic Party primaries. (The New York
    Times)
  - The Ankara prosecutor's office launches an investigation into a lawyers' organization
    which condemned the head of the Directorate of Religious Affairs for implying
    that homosexuality causes human immunodeficiency virus (HIV). The investigation
    is launched on the basis that the organization may have insulted Turks' religious
    values. (Reuters)
  Science and technology:
  - USS Nimitz UFO incident, USS Theodore Roosevelt UFO incidents
  - The Pentagon formally releases three videos of "unidentified aerial phenomena"
    encountered by United States Navy pilots after determining the videos "do not
    reveal any sensitive capabilities or systems". The footage was previously leaked
    by Luis Elizondo in 2017. (CNN)
