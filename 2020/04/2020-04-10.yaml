Date: '2020-04-10'
Source_URI: Portal:Current events/2020 April 10
Intelligence_Payload:
  Business and economy:
  - Economic impact of the COVID-19 pandemic, COVID-19 pandemic in Europe
  - EU finance ministers agree on a billion loan package to alleviate the economic
    fallout of the coronavirus pandemic. (The New York Times)
  Health and environment:
  - COVID-19 pandemic
  - The first United Nations Security Council meeting on the pandemic is held in a
    closed video-conference session. (AIR)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Yemen
  - Yemen reports its first confirmed case of COVID-19, a patient in the Hadhramaut
    Governorate. (Gulf News)
  - COVID-19 pandemic in Iran
  - Iran's Ministry of Health and Medical Education reports 1,972 new confirmed cases
    and 122 more deaths from COVID-19, bringing the country's death toll to 4,232
    and 68,192 total cases, while 3,969 people remain in critical condition with the
    virus. (Reuters)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - The Robert Koch Institute reports 5,323 new confirmed cases and 266 more deaths
    from COVID-19, bringing Germany's death toll to 2,373 with 113,525 total cases.
    (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 980 more deaths from COVID-19,
    the highest daily death toll in the country to date, bringing the UK's death toll
    to 8,958. (The Guardian)
  - NHS England announces two more temporary NHS Nightingale Hospitals to treat COVID-19
    patients in Washington, and Exeter. (NHS England)
  - COVID-19 pandemic in Belgium
  - Belgium reports 1,684 new confirmed cases and 494 more deaths from COVID-19, its
    highest daily death toll to date, bringing the country's death toll to 3,019 and
    26,667 total cases. (Anadolu Agency)
  - COVID-19 pandemic in the Republic of Ireland
  - The Republic of Ireland's Taoiseach Leo Varadkar extends stay-at-home coronavirus
    restrictions until May 5. (Reuters)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - Johns Hopkins University records 2,108 more deaths from COVID-19 in the United
    States, the highest daily death toll in the country to date, bringing the U.S.
    death toll to 18,693 and 500,399 confirmed cases. The U.S. becomes the first country
    to report over 2,000 COVID-19 deaths in a single day. (BBC News)
  - Impact of the COVID-19 pandemic on education
  - Students of Outside Creek Elementary School in California attend classes despite
    Governor Gavin Newsom's order to close all schools in the state. (Boston)
  - Kivu Ebola epidemic
  - In a major setback for efforts to declare the end of the outbreak on Sunday, the
    Democratic Republic of the Congo reports the first case of Ebola since February.
    The outbreak has killed more than 2,200 people since August 2018. (Reuters)
  Law and crime:
  - A prison riot breaks out at a high-security prison in Angarsk, Irkutsk Oblast,
    Russia, allegedly in response to an officer beating an inmate. Large sections
    of the prison are set on fire, and casualties are reported. (BBC News)
  Politics and elections:
  - 2020 Kiribati parliamentary election
  - Kiribati postpones its parliamentary elections for a week. (RNZ)
  Science and technology:
  - The European Space Agency/JAXA space probe BepiColombo makes its final gravity
    assist around Earth, and is now on course for Venus, where it will make several
    gravity assist manoeuvres before finally arriving at Mercury in 2025. (BBC News)
