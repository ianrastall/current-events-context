Date: '2020-04-11'
Source_URI: Portal:Current events/2020 April 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - The United Nations humanitarian coordinator for Libya condemns the cut-off of
    water supply to the capital Tripoli, after an armed group seized a Great Man-Made
    River control station. The armed group is reportedly using the water cut-off,
    affecting two million people, to secure the release of detained family members.
    (Al Jazeera)
  - Boko Haram insurgency
  - Chad reportedly ends its military participation with the Multinational Joint Task
    Force (MNJTF) countering Boko Haram, saying Chadian ground forces will no longer
    operate outside its borders. (Reuters)
  Arts and culture:
  - Paul McCartney's handwritten copy of The Beatles' "Hey Jude" is sold in a virtual
    auction for , almost six times its estimated value. (CNN)
  Disasters and accidents:
  - Anak Krakatoa, part of the Krakatoa complex in Indonesia's Sunda Strait, erupts.
    (Channel 9)
  - 2020 Chernobyl Exclusion Zone wildfires
  - A village near the mostly abandoned town of Poliske is evacuated, as forest fires
    continue to spread inside the Chernobyl Exclusion Zone, Ukraine. (Euronews)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Brazil
  - Brazil becomes the first country in the Southern Hemisphere to surpass 1,000 deaths
    from COVID-19, as the death toll rises to 1,068 and 19,789 total cases, according
    to Johns Hopkins University. (BBC News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 917 more deaths from COVID-19,
    bringing the UK's death toll to 9,875. Victims in the latest figures were aged
    between 11 and 102, while 33 people had no known underlying health conditions.
    (Sky News)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - With 20,071 deaths, the United States' death toll from COVID-19 passes that of
    Italy and becomes the country with the highest number of known COVID-19 deaths
    in the world. (CNBC)
  International relations:
  - Economic impact of the COVID-19 pandemic
  - Sudan's Health Minister Akram Ali Altom says that his country urgently needs million
    to combat the COVID-19 pandemic. While the country has registered relatively few
    cases and two deaths, Altom says that if it spreads, the country is not prepared
    to face it. (Reuters)
