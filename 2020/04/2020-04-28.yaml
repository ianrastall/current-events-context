Date: '2020-04-28'
Source_URI: Portal:Current events/2020 April 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Afrin bombing
  - A suicide bombing, using a fuel tanker, detonates at a busy market killing at
    least 53 civilians, including 11 children, in Turkish-occupied Afrin, Syria. The
    Turkish defense ministry accused the People's Protection Units (YPG) of "carrying
    out the attack." (Rudaw) (Al Jazeera)
  Business and economy:
  - American movie theater chain AMC Theatres states it will no longer host movies
    produced by Universal Studios, in response to The Wall Street Journal reporting
    that NBCUniversal plans to release its movies simultaneously in cinemas and streaming
    moving forward. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - The United States surpasses one million cases of COVID-19. (CNN)
  - COVID-19 pandemic in North Carolina
  - A pug in Chapel Hill, North Carolina, becomes the first dog in the United States
    to test positive for COVID-19. Three of the humans it lives with have also tested
    positive for the disease. (WRAL-TV)
  International relations:
  - Bolivia–Chile relations
  - Bolivia and Chile agree on a deal to return home hundreds of Bolivian migrants
    stranded at a makeshift camp in Santiago. The migrants will be transported to
    Iquique where they will spend 14 days in quarantine before finally returning to
    Bolivia. (Reuters)
  - Colombia formalizes its membership with the Organisation for Economic Co-operation
    and Development (OECD), becoming the 37th nation in the organization. (OECD)
  - Czech Republic–Russia relations
  - Mayor of Prague's sixth municipal district Ondřej Kolář announces on Prima televize
    that he is under police protection after a Russian man made attempts on his life,
    possibly due to his removal of a statue of World War II-era Soviet Marshal Ivan
    Konev from the city's square. Prime Minister Andrej Babiš condemns this as foreign
    interference, while Kremlin Press Secretary Dmitry Peskov dismisses allegations
    of Russian involvement as "another hoax". (Reuters)
  - India–United States relations
  - The Indian Ministry of External Affairs condemns the United States Commission
    on International Religious Freedom after the Commission in its annual report recommends
    placing India on the "countries of particular concern" blacklist over the Citizenship
    Amendment Act, the revocation of Jammu and Kashmir's special status, and controversial
    comments made by Home Minister Amit Shah, among others. (Al Jazeera)
  Law and crime:
  - Impact of the COVID-19 pandemic on prisons
  - A prison riot at the Lurigancho jail over demands for better sanitary measures
    and COVID-19 medical care in San Juan de Lurigancho, Peru, leaves nine inmates
    dead, according to the National Penitentiary Institute. (Reuters)
  Politics and elections:
  - 2019–2020 Lebanese protests
  - Protests erupt in major cities across Lebanon for the second day over the country's
    continuing economic problems. Banks and vehicles are set on fire, and clashes
    between the protestors and the army in Tripoli leave around 40 soldiers injured.
    (Reuters)
  Science and technology:
  - A fast radio burst is detected from the Magnetar SGR 1935+2154, the first ever
    detected inside the Milky Way, and the first to be linked to a known source. (Astronomer's
    Telegram)
  Sports:
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in France
  - France officially ends the 2019–20 Ligue 1 and 2019–20 Ligue 2 football seasons
    after banning all sporting events in the country until September. It is not yet
    known whether the governing body Ligue de Football Professionnel will void the
    seasons. (BBC News)
