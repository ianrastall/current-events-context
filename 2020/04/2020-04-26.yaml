Date: '2020-04-26'
Source_URI: Portal:Current events/2020 April 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Southern Transitional Council (STC) forces say they are in full control of all
    sovereign state institutions in the port city of Aden, after capturing the Yemen
    Oil and Gas Corporation refinery, Aden International Airport, the central bank
    headquarters and the seaport. Yesterday, the STC declared self-rule in southern
    Yemen. (Xinhuanet)
  - Governors in the southern Yemeni Governorates of Hadhramaut, Abyan, Shabwah, Al
    Mahrah, and the island of Socotra reject the STC's claim to self-rule and declare
    their loyalty to President Abdrabbuh Mansur Hadi. (Al Jazeera)
  Health and environment:
  - COVID-19 pandemic in Saudi Arabia
  - King Salman issues an order to partially lift the curfew in all regions of the
    country except Mecca, where a 24-hour curfew continues. Saudi authorities report
    16,299 infections and 136 deaths nationwide. (Al Jazeera)
  Law and crime:
  - Capital punishment in Saudi Arabia
  - King Salman issues a royal decree, declaring that people will no longer be executed
    for crimes they were convicted of when they were minors. (Reuters)
  - Aftermath of the 2019 El Paso shooting
  - A survivor of the terrorist mass shooting that occurred at El Paso, Texas in August
    2019 dies after nine months of hospitalization, raising the death toll to 23.
    (The New York Times)
