Date: '2020-04-12'
Source_URI: Portal:Current events/2020 April 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan; Afghan peace process
  - A Taliban spokesman announces the release of 20 government prisoners in response
    to the latter's release of 300 Taliban prisoners since Wednesday. (Reuters)
  - Yemeni Civil War
  - Yemeni troops recapture a strategic military base on the island of Socotra from
    the separatist Southern Transitional Council (STC). STC forces, which seized control
    of the base on February 18, fled before the operation began. (Middle East Monitor)
  - Kashmir conflict
  - An exchange of artillery fire between India and Pakistan across the Line of Control
    (LoC), kills three civilians, including a child, in Indian-administered Jammu
    and Kashmir, according to Kashmir Police Chief K. Vijay Kumar. Pakistan Army general
    Babar Iftikhar says two Pakistani civilians are injured. (U.S. News & World Report)
  Arts and culture:
  - Today Pope Francis livestreames the Urbi et Orbi blessing for the second time
    in just a month. Usually given on Christmas and Easter, this year the pope also
    gave the blessing on March 27, during a special prayer service for the end of
    the coronavirus. (CRUX)
  Business and economy:
  - 2020 Russia–Saudi Arabia oil price war
  - OPEC and allies strike a deal to cut oil production by 9.7 million barrels per
    day, the largest such cut agreed upon, starting May 1. (BBC News)
  Disasters and accidents:
  - 2020 Easter tornado outbreak
  - A tornado outbreak occurs in the Southeastern United States. Mississippi declares
    a tornado emergency. (Weather)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in the Philippines
  - The Philippines reports 220 new confirmed cases and 50 more deaths from COVID-19,
    the highest daily death toll in the country to date, bringing the country's death
    toll to 297 with 4,648 total cases. (Reuters)
  - COVID-19 pandemic in Israel
  - Former Chief Rabbi of Israel Eliyahu Bakshi-Doron dies from COVID-19 at Shaare
    Zedek Medical Center in Jerusalem. (U.S. News & World Report)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Saba
  - The first confirmed case of COVID-19 is reported on the Dutch Caribbean island
    of Saba. (Mas Noticia)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - The death toll from coronavirus in Italy has reached 19,889 people. Italy has
    the second highest number of deaths in the world, after the United States. (Corriere
    della Sera)
  - COVID-19 pandemic in the United Kingdom
  - Prime Minister Boris Johnson is released from hospital after days in intensive
    care. (Orlando Sentinel)
  - The Department of Health and Social Care reports 737 more deaths from COVID-19,
    bringing the UK's death toll to 10,612. The UK becomes the fourth country in Europe,
    after Italy, Spain and France, to surpass 10,000 deaths from COVID-19. (The Independent)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Somalia
  - Justice Minister of Hirshabelle State, Khalif Mumin Tohow, becomes the second
    person to die from COVID-19 in Somalia. The state minister recently travelled
    back from the United Kingdom. (Middle East Monitor)
  Law and crime:
  - Former Bangladesh Army officer Abdul Majed is executed for his involvement in
    the 1975 assassination of Sheikh Mujibur Rahman, the country's first president.
    (BBC News)
