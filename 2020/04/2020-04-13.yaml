Date: '2020-04-13'
Source_URI: Portal:Current events/2020 April 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - 2019–20 Western Libya offensive
  - GNA forces recapture the city of Sabratha, and the nearby town of Sorman in the
    Zawiya District, while seizing armored vehicles and weapons belonging to the Libyan
    National Army. (Anadolu Agency)
  - The Libyan National Army confirms one of its Mi-35 helicopters has been shot down
    near Misrata, killing three crew members onboard. (Al Masdar News)
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - The Walt Disney Company reports it is entering a billion unsecured credit agreement,
    possibly to make up for shortfalls in its theme park division. Citibank, N.A.
    is the main broker of the deal. (Reuters)
  Disasters and accidents:
  - 2020 Easter tornado outbreak
  - The tornado outbreak continues from Easter Sunday across the Southeastern United
    States. At least 30 people are confirmed dead. (USA Today)
  - Fiji declares a 30-day state of natural disaster in areas affected by Cyclone
    Harold. (RNZ)
  - 2020 Chernobyl Exclusion Zone wildfires
  - Wildfires in the Chernobyl Exclusion Zone, Ukraine, reach the abandoned city of
    Pripyat, away from the Chernobyl Nuclear Power Plant. (The Guardian)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 4,342 new confirmed cases and
    717 more deaths from COVID-19, bringing the UK's death toll to 11,329 and 88,621
    total cases. (Reuters)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Guam
  - COVID-19 pandemic on USS Theodore Roosevelt
  - The United States Navy confirms the first death of a sailor serving aboard the
    aircraft carrier USS Theodore Roosevelt. Over 500 sailors on the ship have tested
    positive for the virus. (BBC News)
  - COVID-19 pandemic in Wyoming
  - Wyoming's Governor Mark Gordon reports the state's first death from COVID-19 in
    Johnson County, meaning all 50 U.S. states have now recorded a fatality from the
    virus. (Reuters)
  Politics and elections:
  - Joe Biden 2020 presidential campaign
  - Less than a week after dropping out of the race, U.S. Senator Bernie Sanders officially
    endorses former Vice President Joe Biden, the presumptive nominee in the general
    election. (The New York Times)
  - Donald Trump 2020 presidential campaign
  - U.S. President Donald Trump's re-election campaign files a defamation lawsuit
    against Wisconsin TV station WJFW-TV for airing an advertisement by Priorities
    USA Action which criticizes Trump's response to COVID-19. (International Business
    Times)
