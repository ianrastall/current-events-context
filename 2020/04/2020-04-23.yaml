Date: '2020-04-23'
Source_URI: Portal:Current events/2020 April 23
Intelligence_Payload:
  Business and economy:
  - COVID-19 pandemic in the United States; Unemployment in the United States
  - Over the last week, 4.4 million Americans filed for unemployment benefits. Since
    mid-March, 26.4 million have filed, which is more than 15 percent of the workforce.
    (BBC News)
  - COVID-19 pandemic in Italy, Impact of the COVID-19 pandemic on aviation
  - Italian Minister of Economic Development Stefano Patuanelli announces the government
    will nationalize the country's main flag carrier Alitalia by June, claiming the
    airline will go bankrupt otherwise. This reverses earlier plans to have it fully
    privatized. (Reuters)
  - Facebook removes "pseudoscience" and "conspiracy theory" as options for targeted
    ads, as criticism mounts against social media for their role in spreading misinformation
    about the coronavirus. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan
  - Fifty crew members on the cruise ship Costa Atlantica test positive for COVID-19
    after it docks in Nagasaki, Japan. (Reuters)
  Law and crime:
  - Two former high-ranking members of the Syrian Army go on trial in Koblenz, Rhineland-Palatinate,
    Germany, for alleged war crimes committed during the Syrian Civil War. This is
    the first time that Syrian military officials are being prosecuted for their roles
    in the conflict. (Al Jazeera) (Reuters)
  Politics and elections:
  - 2020 Kiribati parliamentary election
  - Results show that four women win seats in the parliament and that most ministers
    of the current government keep their seats, including President Taneti Mamau.
    However, it is too early to say whether he would be his party's nomination for
    President again. (RNZ)
  - Lesotho Prime Minister Tom Thabane rejects a deal between South African mediators
    and his coalition government asking him to resign amid accusations that he was
    involved in the murder of his ex-wife. (Reuters)
  Sports:
  - 2020 NFL season, Impact of the COVID-19 pandemic on sports
  - In American football, the National Football League starts its draft for the 2020
    season, with the Cincinnati Bengals selecting Joe Burrow with the first overall
    pick. The draft's public events in Las Vegas were canceled, with teams selecting
    players from private offices to comply with social distancing guidelines. (NFL)
