Date: '2020-04-25'
Source_URI: Portal:Current events/2020 April 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - The separatist Southern Transitional Council (STC) announces the establishment
    of a self-rule administration in southern Yemen. The internationally-recognized
    government describes this move as "catastrophic." STC forces are deployed in the
    city of Aden as emergency rule is declared. (Reuters)
  Health and environment:
  - The Lost Apple Project, a non-profit conservationist society based in the Pacific
    Northwest, announces the rediscovery of ten cultivars of apples previously thought
    to be extinct. The decad almost doubles the total amount of species the society
    has rescued, bringing the total to 23. (CNN)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care confirms the UK's death toll from COVID-19
    has exceeded 20,000. It joins the United States, Italy, Spain and France as the
    fifth nation to reach this total. (BBC News)
  International relations:
  - Bangladesh–Myanmar relations
  - Foreign Minister of Bangladesh AK Abdul Momen says that it is not the responsibility
    of his country to rescue more than 500 Rohingya refugees who have been at sea
    for weeks. Momen tells Al Jazeera they "should ask the Myanmar government first
    because they are their citizens". (Al Jazeera)
  Sports:
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in the Netherlands
  - The 2019–20 Eredivisie season is declared void by the Royal Dutch Football Association.
    (Sky Sports)
