Date: '2020-04-06'
Source_URI: Portal:Current events/2020 April 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mali War
  - Gunmen on motorbikes attack a military base in Bamba, Gao, Mali, killing at least
    25 soldiers. No group has claimed responsibility for the attack. (Xinhuanet) (Al
    Jazeera)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, COVID-19 pandemic in the United Kingdom
  - British department store retailer Debenhams files for administration due to "unprecedented"
    circumstances caused by the United Kingdom's coronavirus lockdown. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - Prime Minister Boris Johnson is admitted to intensive care at St Thomas' Hospital
    in London as his COVID-19 symptoms worsen. Foreign Secretary Dominic Raab, as
    First Secretary of State, will assume Johnson's duties while he remains in the
    ICU. (ITV)
  - COVID-19 pandemic in France
  - France reports 833 more deaths from COVID-19, the highest number of deaths recorded
    in a single day, bringing the country's death toll to 8,911 and the number of
    cases to 98,010. Health Minister Olivier Véran says, "We have not reached the
    end of the ascent of this epidemic." (BBC News)
  - President Emmanuel Macron eases some lockdown restrictions for people on the autism
    spectrum following the requests of disability groups. (Metro)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Barbados
  - Barbados reports its first death from COVID-19, an 81-year-old man with diabetes
    who recently travelled to the United Kingdom. (Voice Online)
  Law and crime:
  - Economic impact of the COVID-19 pandemic, COVID-19 pandemic in Ivory Coast
  - Police and protesters clash in Ivory Coast, after the latter dismantled a half-built
    COVID-19 testing center over fears that people using the facility would spread
    the virus through their district. (Reuters)
  - Right-wing terrorism in Russia, Russia–United States relations
  - In an unprecedented move, the Trump administration designates a white supremacist
    group, based in Russia, as a terrorist organization, and imposes individual sanctions
    on its leaders. The organization, , is believed to have trained the perpetrators
    of a series of terrorist attacks in Gothenburg, Sweden, in 2016. (Associated Press)
  Politics and elections:
  - Impact of the COVID-19 pandemic on politics
  - 2020 Wisconsin Democratic primary, 2020 Wisconsin Republican primary, COVID-19
    pandemic in Wisconsin
  - The Wisconsin Supreme Court overturns Governor Tony Evers's order to postpone
    tomorrow's primary elections. Furthermore, the Supreme Court of the United States
    rules 5–4 in favor of the Republican National Committee to overturn a lower court
    decision extending absentee ballot eligibility in the Wisconsin primary election
    to those ballots postmarked by April 13, ruling that ballots postmarked after
    April 7 will be invalidated. (Politico) (CNBC)
  - COVID-19 pandemic in Poland, 2020 Polish presidential election
  - Deputy Prime Minister Jarosław Gowin tenders resignation over disagreement with
    the ruling Law and Justice (PiS) party as to the upcoming presidential election.
    He stated at a press conference that the election scheduled for May 10, should
    be postponed, while the government pushes for the election amid the coronavirus
    pandemic. Gowin also resigns as Minister of Science and Higher Education. (Radio
    Poland)
  - Polish MPs, with 230–226 votes and two abstained, pass a bill under which the
    presidential election in May will be held by postal vote only. The bill now goes
    to the upper house, the Senate, for debate. (Radio Poland)
