Date: '2020-04-18'
Source_URI: Portal:Current events/2020 April 18
Intelligence_Payload:
  Arts and culture:
  - COVID-19 pandemic in Iran
  - Iran parades disinfection vehicles, mobile hospitals, and other medical equipment
    to mark Army Day as their death toll rose to 4,598. (Reuters)
  Business and economy:
  - COVID-19 pandemic in Bangladesh, economic impact of the COVID-19 pandemic
  - Hundreds of garment workers march in Chittagong, Bangladesh, demanding factory
    owners pay them last month's wages following delays. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Taiwan
  - Taiwan quarantines 700 Navy sailors after three cases of COVID-19 were confirmed
    on board a vessel that recently returned from the island nation of Palau. (Reuters)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 5,526 new confirmed cases and
    888 more deaths from COVID-19, bringing the United Kingdom's death toll to 15,464
    and 114,217 total cases. (RTÉ)
  International relations:
  - COVID-19 pandemic in the United Arab Emirates, Pakistan–United Arab Emirates relations
  - Pakistan begins repatriating some of its citizens from the United Arab Emirates,
    after the UAE threatened to review its labor ties with countries that refuse to
    take their nationals back during the pandemic. (Reuters)
  Law and crime:
  - Forty-four suspected Boko Haram members are found dead, apparently due to poisoning,
    inside a prison in N'Djamena, Chad. (The Guardian)
  - Impact of the COVID-19 pandemic on prisons
  - Bonanno crime family mobster Vincent Asaro is granted compassionate release and
    released from the United States Medical Center for Federal Prisoners in Missouri
    due to the coronavirus pandemic. (CNN)
  Politics and elections:
  - 2019–20 Hong Kong protests
  - Convener of the Civil Human Rights Front of Hong Kong, Jimmy Sham, warns police
    to expect "more resistance than ever" as veteran pro-democracy activists are arrested
    in a mass raid. Sham also says plans for a mass rally on July 1 are underway.
    (Radio Television Hong Kong)
  - Vice-convener of Sham's organization, Figo Chan, is also arrested Saturday afternoon
    by Hong Kong police. (Hong Kong Free Press)
  Science and technology:
  - Several hospitals across the Czech Republic, and authorities at Prague Airport
    say they have thwarted numerous cyberattacks against them since yesterday. (Reuters)
