Date: '2020-12-24'
Source_URI: Portal:Current events/2020 December 24
Intelligence_Payload:
  Uncategorized:
  - Metekel conflict
  - Metekel massacre
  - The Ethiopian National Defense Force clashes with armed bandits involved in yesterday's
    massacre, killing 42 of them and seizing weapons. (Al Arabiya English)
  - Boko Haram insurgency
  - Pemi attack
  - Boko Haram jihadists storm Pemi, a Christian village in Borno State, Nigeria,
    shooting people and burning down a church and a hospital, killing at least 11
    civilians. A priest is kidnapped. (BBC News)
  - Insurgency in the Maghreb
  - Niger says seven troops and 11 Islamist militants have been killed in clashes
    in Tillabéri, ahead of Sunday's general election. (Arab News)
  - War in Afghanistan
  - December 2020 Afghanistan attacks
  - Gunmen on a motorbike shoot dead a women’s rights activist and her brother near
    their home in Kohistan, Afghanistan. (Al Jazeera)
  - Economic impact of the COVID-19 pandemic in the United States, CARES Act
  - Republicans in the House block an attempt by Democrats, empowered by a veto threat
    from President Donald Trump if not amended, to pass a $2,000 relief bill for Americans.
    However, House Speaker Nancy Pelosi announces that the House will still hold a
    vote on the bill on Monday. (CNBC) (NBC News)
  - European migrant crisis
  - At least 20 African migrants die when their boat sinks off the coast of Tunisia
    as they tried to cross the Mediterranean Sea to the Italian island of Lampedusa.
    The coast guard confirmed they had rescued people and were searching for others
    who were on the boat, which was carrying a total of 45 people. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - Travel restrictions related to the COVID-19 pandemic, Variant of Concern 202012/01
  - The Centers for Disease Control and Prevention announces that American passengers
    traveling from the United Kingdom will be required to test negative for COVID-19
    within 72 hours due to the emergence of a new variant of SARS-CoV-2. The order
    is expected to take effect on December 28. (MarketWatch)
  - United Airlines and Delta Air Lines will require passengers from the United Kingdom
    to test negative for COVID-19 due to the emergence of a new variant of SARS-CoV-2.
    (Reuters)
  - COVID-19 pandemic in California
  - California surpasses two million cases of COVID-19, becoming the first U.S. state
    to do so. (CBS News)
  - COVID-19 pandemic in Arkansas
  - Arkansas reports 3,204 new cases on Christmas Eve, a new single-day record. (Arkansas
    Democrat-Gazette)
  - COVID-19 pandemic in Mexico, COVID-19 vaccine
  - Mexico begins vaccinations with the Pfizer-BioNTech vaccine. An intensive care
    unit nurse in Mexico City becomes the first person in the country to receive the
    vaccine. (The Washington Post)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario reports 2,447 cases on Christmas Eve, a new single-day record. (The Chronicle-Journal)
  - COVID-19 pandemic in Quebec
  - Quebec reports 2,349 cases over the past 24 hours, a new single-day record. (Montreal
    Gazette)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan
  - Tokyo reports a record 888 new cases in the past 24 hours, bringing the total
    number of confirmed cases in the prefecture to 54,018. (NHK World)
  - Nationwide, a record 3,743 new cases are reported in Japan in the past 24 hours.
    (The Japan Times)
  - COVID-19 pandemic in mainland China, Variant of Concern 202012/01, travel restrictions
    related to the COVID-19 pandemic
  - China says it will suspend all direct flights to and from the United Kingdom indefinitely
    due to the new variant of SARS-CoV-2. (CNA)
  - COVID-19 pandemic in Indonesia, Variant of Concern 202012/01
  - Indonesia issues a ban on travellers from the United Kingdom and restricts entry
    to people from mainland Europe and Australia to prevent the spread of the new
    variant of SARS-CoV-2. COVID-19 Task Force Chief Doni Monardo says that these
    measures will remain in place until January 8. (Reuters)
  - COVID-19 pandemic in Israel
  - Prime Minister Benjamin Netanyahu and the Health Ministry announce that a third
    nationwide lockdown will begin from December 27 at 5:00 p.m. local time for at
    least two weeks in order to curb the resurgence of COVID-19. (The Times of Israel)
  - COVID-19 pandemic in Malaysia
  - Malaysia surpasses 100,000 cases of COVID-19. (CNA)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - Germany reports the first case of a new variant of SARS-CoV-2 from the United
    Kingdom after a woman who flew from London to Frankfurt this weekend tested positive
    for COVID-19. (DW)
  - COVID-19 pandemic in Italy
  - Italy surpasses two million cases of COVID-19. (ANSA)
  - COVID-19 pandemic in Russia
  - Russia reports a record 29,935 new cases and 635 deaths in the past 24 hours,
    thus bringing the nationwide totals to 2,963,688 confirmed cases and 53,096 deaths.
    (Arab News)
  - COVID-19 pandemic in Serbia, COVID-19 vaccine
  - Serbia officially begins its vaccination programme against COVID-19, with Prime
    Minister Ana Brnabić becoming the first person to receive the Pfizer-BioNTech
    vaccine. (Anadolu Agency)
  - COVID-19 pandemic in Turkey, COVID-19 vaccine
  - Turkey announces that CoronaVac is 91.25% effective in preventing COVID-19 based
    on data in interim studies. These initial results follow Phase III trials that
    involved 7,371 volunteers. (Daily Sabah)
  - COVID-19 pandemic in Ukraine
  - Ukraine surpasses one million cases of COVID-19. (Kyiv Post)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Argentina, COVID-19 vaccine
  - Over 300,000 doses of Russia's Sputnik V vaccine arrive in Argentina. (Livemint)
  - COVID-19 pandemic in Chile, COVID-19 vaccine
  - Chile begins its vaccination campaign against COVID-19 after the arrival of 10,000
    doses of Pfizer-BioNTech vaccine to the country. (Prensa Latina)
  - European Union–United Kingdom relations, Trade negotiation between the UK and
    the EU
  - The United Kingdom and the European Union agree on a post-Brexit trade deal. (BBC
    News)
  - In Pakistan, the Sindh High Court orders the release of Ahmed Omar Saeed Sheikh,
    initially sentenced to death for the kidnapping and murder of American journalist
    Daniel Pearl in Karachi in 2002. The government opposes his release on the basis
    of public safety; both the government and Pearl's family will appeal the decision.
    (Al Jazeera)
  - A 37-year-old man is charged with murder and hate crimes in Los Angeles, California,
    U.S., after killing a 82-year-old man in a hospital room for praying. Both men
    were in the hospital after testing positive for COVID-19. (BBC News)
  - The President of Burundi, Évariste Ndayishimiye, pardons four journalists jailed
    since 2019 for offences related to "undermining state security" following a petition
    by human rights groups and the journalists themselves. (Reuters)
  - 2020 Moldovan presidential election
  - Maia Sandu is sworn in as the first female President of Moldova. (Radio Free Europe/Radio
    Liberty)
