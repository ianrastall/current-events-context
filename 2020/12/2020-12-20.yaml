Date: '2020-12-20'
Source_URI: Portal:Current events/2020 December 20
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan; December 2020 Afghanistan targeted killings
  - A car bombing in Kabul targeting Khan Mohammad Wardak, a lawmaker, kills nine
    people and wounds more than 20 others. Wardak is among the injured. Attacks also
    occur in Logar, Nangarhar, Helmand, and Badakhshan, with an unknown number of
    civilians and security forces killed. No group claims responsibility for these
    attacks. (Reuters)
  - Iraqi conflict
  - Eight rockets are fired at the U.S. Embassy in Baghdad, Iraq, prompting the activation
    of C-RAM air defences. (ABC News)
  - Economic impact of the COVID-19 pandemic in the United States
  - Senate Majority Leader Mitch McConnell announces that Congress has reached a deal
    on a $900 billion COVID-19 relief package that includes a new round of direct
    payments and help for families, businesses and unemployed Americans. (The New
    York Times)
  - 2020 Pacific typhoon season
  - Tropical Storm Krovanh (Vicky) makes landfall in the Philippines, resulting in
    the deaths of at least eight people and forcing the evacuation of nearly 10,000
    others. (AFP via New Straits Times)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New Jersey
  - Amazon announces that they will close the Robbinsville Township facility, also
    known as the PNE5, after several workers tested positive for COVID-19. (CNBC)
  - COVID-19 vaccination in the United States
  - The United States begins shipping the COVID-19 vaccine made by Moderna. (Wall
    Street Journal)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Nunavut
  - Nunavut reports its first two deaths from COVID-19 complications. (Toronto Star)
  - Variant of Concern 202012/01
  - The federal government restricts travel to and from the United Kingdom for 72
    hours from tomorrow due to emergence to a new variant of SARS-CoV-2. The restrictions
    do not apply to cargo flights or stops where passengers do not disembark. (CTV
    News)
  - COVID-19 pandemic in El Salvador
  - El Salvador bans travelers who have been in the United Kingdom or South Africa
    in the last 30 days or whose flights included a layover in those countries. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record 221 new deaths in the past 24 hours, bringing the nationwide
    death toll to 19,880. (detikHealth)
  - COVID-19 pandemic in Iran, Variant of Concern 202012/01
  - Iran suspends flights to and from the United Kingdom for two weeks due to the
    emergence of a new variant of SARS-CoV-2 that was discovered in the UK. (Reuters)
  - COVID-19 pandemic in Israel, Variant of Concern 202012/01
  - Israel bans entry of travelers from Denmark, South Africa, and the United Kingdom
    due to the discovery of a new variant of SARS-CoV-2 in the latter country. Israeli
    citizens arriving from those countries will be required to quarantine at state-run
    quarantine hotels for up to 14 days. (The Jerusalem Post)
  - COVID-19 pandemic in Qatar, COVID-19 vaccine
  - The Ministry of Public Health approves the authorization of the Pfizer-BioNTech
    vaccine for emergency use in Qatar. (Gulf Times)
  - COVID-19 pandemic in Saudi Arabia, Variant of Concern 202012/01
  - Saudi Arabia suspends all international passenger flights for one week as well
    as all entry through land and sea ports in response to a new variant of the SARS-COV-2
    that was discovered in the United Kingdom. (Arab News)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 1,097 new confirmed cases in the past 24 hours, bringing
    the nationwide total to 49,665 cases. (CNA)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Belgium, Variant of Concern 202012/01
  - Belgium bans entry for incoming rail and air passengers from the United Kingdom
    for at least 24 hours, beginning at midnight. Virologist Marc Van Ranst said yesterday
    that a variant of SARS-COV-2 from the United Kingdom had been found in four cases
    from a sample of 2,000 analyses in his laboratory. (VRT)
  - COVID-19 pandemic in Bulgaria
  - The government announces the suspension of all flights between Bulgaria and the
    United Kingdom from tomorrow until January 31. Anyone who already arrived from
    the UK is required to quarantine for 10 days. (Sofia Globe)
  - COVID-19 pandemic in Denmark, Cluster 5
  - Denmark will exhume four millions of minks to prevention pollution contamination.
    This work will begin in May 2021, when the risk of coronavirus contamination from
    the dead animals has been eliminated. (DW)
  - COVID-19 pandemic in Greece, Variant of Concern 202012/01
  - Greece introduces a seven-day quarantine for people arriving from the United Kingdom
    beginning tomorrow at 6:00 a.m. local time due to the discovery of a new variant
    of SARS-COV-2 in the country. (Greek Travel Pages)
  - COVID-19 pandemic in the Republic of Ireland, Variant of Concern 202012/01
  - Minister for Transport Eamon Ryan announces that the government will impose a
    48-hour ban on flights to and from the United Kingdom from tomorrow following
    emergence of a new variant of SARS-CoV-2, while ferries will be limited to freight
    travel. (RTE)
  - COVID-19 pandemic in the Netherlands, Variant of Concern 202012/01
  - The government orders a ban on passenger flights from the United Kingdom from
    6:00 a.m. today until at least January 1 due to the spread of a new variant of
    SARS-CoV-2 in the UK, with a case of the variant already having been reported
    in the Netherlands. (The Independent)
  - COVID-19 pandemic in Turkey, Variant of Concern 202012/01
  - Turkey temporarily suspend flights from the United Kingdom, the Netherlands, Denmark,
    and South Africa due to concerns over a new variant of SARS-CoV-2. (Daily Sabah)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports a record 35,928 new cases in the past 24 hours. The
    government data also shows that 90% of local authorities in England have reported
    an increase in cases during the past week. (The Daily Telegraph)
  - 2020 H5N8 outbreak
  - Over 8,000 ducks are expected to be culled after a third case of H5N8 avian influenza
    was confirmed at a farm in Norfolk, UK. (Eastern Daily Press)
  - 2020 Tarlac shooting
  - An off-duty police officer kills two unarmed neighbors in Paniqui, Tarlac, Philippines
    after opening fire against them following a dispute. The filmed incident circulates
    on social media hours later and sparks nationwide protests against police brutality
    and impunity. (BBC News) (Rappler)
  - President of Nepal Bidya Devi Bhandari and Prime Minister KP Sharma Oli dissolve
    the incumbent House of Representatives, the lower house of the Parliament. (The
    New York Times)
  - Impact of the COVID-19 pandemic on sports
  - COVID-19 pandemic in North America, Impact of the COVID-19 pandemic on ice hockey
  - The National Hockey League announces its truncated 2020–21 season will begin on
    January 13 and run for 56 games per team, ending on May 8. (WEYI-TV)
