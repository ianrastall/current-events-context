Date: '2020-02-24'
Source_URI: Portal:Current events/2020 February 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Volkmarsen ramming attack
  - Nearly 60 people are injured when a car rams civilians at a carnival parade in
    Volkmarsen, Hesse, Germany. A 29-year-old German national is arrested by police.
    (BBC News)
  - Gaza–Israel conflict, Israeli–Palestinian conflict
  - Israeli Prime Minister Benjamin Netanyahu threatens the leadership of the Gaza
    Strip with war if rocket attacks continue. (News AU)
  - Second Libyan Civil War, Libyan peace process
  - Both of Libya's rival governments, the Government of National Accord and Tobruk-based
    House of Representatives, pull out of UN-sponsored peace talks in Geneva. (Al
    Jazeera)
  - North East Delhi riots
  - Violent clashes in New Delhi, India, between Hindu and Muslim protestors over
    the Citizenship Amendment Act during U.S. President Donald Trump's visit leave
    13 people dead and at least 150 injured. (The Guardian)
  - 2020 Toronto machete attack
  - A 17-year-old boy is arrested and charged with first-degree murder after stabbing
    two women, one of them fatally, at a massage parlor in Toronto, Ontario, Canada.
    (Global News)
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - The Dow Jones Industrial Average drops more than 3% as the coronavirus pandemic
    spreads outside China. This follows benchmark indices falling sharply in Europe
    after steep declines across Asia. (Barrons) (Wall Street Journal)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Iran
  - Armenia has closed its border from Meghri with Iran and suspended all flights
    from Armenia to Iran for the next two weeks due to increasing cases of coronavirus
    in Iran. (Prime Minister of Armenia's Facebook page)
  - The General Authority of Oman's Civil Aviation announced the suspension of all
    flights between the sultanate and the Islamic Republic of Iran until further notice.
    (CNN)
  - COVID-19 pandemic in Italy
  - Seventy-four more coronavirus cases are confirmed in Italy, bringing the number
    to 229. Four more virus-related deaths are confirmed, bringing the death toll
    to seven. (La Repubblica)
  - COVID-19 pandemic in South Korea
  - Vietnamese airline Bamboo Airways suspends flights to South Korea starting February
    26. (CNN)
  - COVID-19 pandemic in the United States
  - The total number of infected in the United States is now 53 people, up from 34
    two days ago. (CNN)
  - Pakistan International Airlines suspends flights to China until March 15. (Geo
    News)
  - A 300-bed isolation ward has been set up in Islamabad for Chinese citizens returning
    to Pakistan after vacations. (ARY News)
  - Kuwait, Iraq, Afghanistan, Oman and Bahrain confirm their first cases of coronavirus.
    (Gulf News) (Straits Times) (Fox News)
  - Spain confirms its third case in Tenerife, Canary Islands, from an Italian tourist.
    (El Periódico)
  International relations:
  - India–United States relations
  - U.S. President Donald Trump visits India and meets Prime Minister Narendra Modi
    to discuss the sale of American military jets to India. (NPR) (ARY News)
  Law and crime:
  - The United States wants the United Kingdom to extradite WikiLeaks creator Julian
    Assange, who might face American espionage charges. (NBC News)
  - Prime Minister of Lesotho Tom Thabane appears in court and hears the charges against
    him in a pre-trial hearing. He denies involvement in the murder of his former
    wife and requests immunity from the higher court. (Reuters)
  - Harvey Weinstein sexual abuse cases
  - U.S. film producer Harvey Weinstein is found guilty of rape, and not guilty of
    predatory sexual assault. (The New York Times)
  - The United Kingdom bans Sonnenkrieg Division, the UK branch of the American Neo-Nazi
    organization Atomwaffen Division, as a terrorist group in response to the Hanau
    shootings last week. (The Guardian)
  Politics and elections:
  - 2020 Dominican Republic municipal elections, Timeline of 2020 Dominican Republic
    Municipal Election Protests
  - The Organization of American States begins an audit of the suspended elections.
    (Dominican Today)
  - Protests in Santo Domingo continue for the fifth day. (Dominican Today)
  - 2020 Malaysian constitutional crisis
  - Prime Minister Mahathir Mohamad resigns. (CNN)
