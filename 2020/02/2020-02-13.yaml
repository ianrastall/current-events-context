Date: '2020-02-13'
Source_URI: Portal:Current events/2020 February 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - U.S. Defense Secretary Mark Esper says that the U.S. and the Taliban have negotiated
    a proposal for a seven-day reduction of violence in Afghanistan. (Reuters)
  - Iran–Israel conflict during the Syrian Civil War
  - The Israeli Air Force launches an air raid on Iranian targets in the Syrian capital
    Damascus. Syrian state media says the Air Defense Force intercepted several missiles.
    (The Jerusalem Post)
  - Around two dozen heavily armed men dressed in military fatigues storm a court
    building in El Progreso, north-western Honduras, freeing Alexander Mendoza, a
    senior leader of the MS-13 gang and killing four police officers. Honduran President
    Juan Orlando Hernández offers a $80,000 reward for information leading to Mendoza's
    recapture. (BBC News)
  Arts and culture:
  - 45th César Awards
  - The entire board of France's César Awards resigns following controversy over the
    Academy giving Roman Polanski's An Officer and a Spy 12 award nominations, the
    most out of any film this year. (BBC News)
  Business and economy:
  - American newspaper publisher McClatchy, whose assets include the Miami Herald
    and The Sacramento Bee, files for Chapter 11 bankruptcy protection. (The Hill)
  - Canadian airplane manufacturer Bombardier sells its remaining stake in the A220
    model, previously called the C-Series, to France's Airbus, effectively closing
    its commercial aviation line of business. (CBC)
  - Cannabis in the United Kingdom
  - The Food Standards Agency gives producers of Cannabidiol-related products until
    March 2021 to register their goods, or they will be pulled from the market. (BBC
    News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Mainland China
  - Chinese officials report 15,152 new confirmed cases of the 2019-nCoV acute respiratory
    disease (COVID-19) and 254 new deaths in mainland China, the largest single day
    increase since the pandemic began. However, the number of confirmed cases now
    also includes the number of clinically diagnosed patients in Hubei province. (CNBC)
  - COVID-19 pandemic in Japan
  - Japan's Ministry of Health, Labour and Welfare reports the country's first death
    related to the COVID-19 pandemic, a woman in her 80s. (The Japan Times)
  International relations:
  - Sudan–United States relations
  - As part of government efforts to remove the country from a list of State Sponsors
    of Terrorism, Sudan agrees to compensate the families of sailors killed in an
    al-Qaeda attack against the USS Cole. (Reuters)
  - United States–Venezuela relations
  - Venezuelan Foreign Affairs minister Jorge Arreaza announces that his government,
    led by Nicolás Maduro, will take the U.S. to the International Criminal Court
    for alleged "crimes against humanity". (Washington Post)
  Law and crime:
  - The Indonesian government declares that all nationals who join ISIL automatically
    lose their citizenship, and refuses to repatriate fighters captured in Syria.
    (The Jakarta Post)
  Politics and elections:
  - 2020 British cabinet reshuffle
  - Amid a cabinet reshuffle by Prime Minister Boris Johnson, Sajid Javid resigns
    as the United Kingdom's Chancellor of the Exchequer after reportedly refusing
    to sack his adviser team. Javid is replaced by Chief Secretary to the Treasury
    Rishi Sunak, who becomes the first Hindu to hold the senior position. (Sky News)
    (The Yorkshire Post)
  - The Attorney General for England and Wales Geoffrey Cox is sacked by Johnson.
    (The Independent)
  - Secretary of State for Northern Ireland Julian Smith, Business Secretary Andrea
    Leadsom and Environment Secretary Theresa Villiers all leave the government. (BBC
    News)
  - The U.S. Senate votes 55–45 to pass a measure requiring President Donald Trump
    to win approval from Congress before taking further military actions against Iran.
    (Al Jazeera)
