Date: '2020-02-22'
Source_URI: Portal:Current events/2020 February 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kashmir conflict
  - Two Kashmiri civilians alleged to be Lashkar-e-Taiba militants are killed by Indian
    soldiers at Anantnag, Jammu and Kashmir, in a counter-terrorism operation. (DNA
    India) (ARY News)
  - Five terrorists are killed in Peshawar, Khyber Paktunkhwa, Pakistan, by the Counter-Terrorism
    Department (CTD) in a heavy exchange of fire during a search operation. (Geo News)
  Disasters and accidents:
  - Daredevil and flat Earth conspiracy theorist Mike Hughes dies after crashing in
    his homemade rocket near Barstow, California. He was attempting to prove the Earth
    was flat as part of a documentary series with Science Channel. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Italy
  - Italy confirms that a 78-year-old man in Padua, Veneto, and a woman in her 70s
    in Codogno, Lombardy, have died after contracting the virus. They are the first
    two coronavirus deaths in Italy. (Tgcom24)
  - 58 more coronavirus cases are confirmed in Italy, bringing the number of cases
    to 79. (Open)
  - COVID-19 pandemic in South Korea
  - South Korea confirms that 229 more people have contracted the coronavirus in the
    country, raising the total number to 433. (BBC News)
  - COVID-19 pandemic in the United States
  - The United States reports 34 confirmed cases of the illness and expects more.
    (The New York Times)
  - COVID-19 pandemic in Iraq
  - The first coronavirus case is confirmed in Iraq. (Anadolu Agency)
  - COVID-19 pandemic in Oceania
  - Samoa bans all cruise ships from visiting the country amid growing efforts to
    keep the virus away. (RNZ)
  - France shuts down its first nuclear power reactor, at the Fessenheim Nuclear Power
    Plant. (Deutsche Welle)
  Law and crime:
  - Lesotho PM Tom Thabane is granted sick leave until 27 February when he is due
    to appear in court for the murder of his former wife. (Reuters)
  Politics and elections:
  - 2020 Dominican Republic municipal elections
  - The Dominican Republic government wants the Organization of American States to
    investigate what occurred in the controversial February 16 elections. (Dominican
    Today)
  - 2020 Togolese presidential election
  - Voters in Togo head to the polls to elect the country's president. Incumbent president
    Faure Gnassingbé, accused of an authoritarian rule, seeks to run for a fourth
    term which was made possible by a constitutional amendment in 2019. (DW)
  - 2020 Democratic Party presidential primaries
  - Senator Bernie Sanders wins the Nevada Caucus. (CNN)
