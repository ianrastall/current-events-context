Date: '2020-02-20'
Source_URI: Portal:Current events/2020 February 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war, Northwestern Syria offensive (December 2019–March 2020), Turkish
    involvement in the Syrian Civil War
  - Turkish-backed rebels launch an offensive in the Idlib Governorate against government
    forces. A Russian air strike kills two Turkish soldiers and injures five others,
    while Turkey says a retaliatory strike killed 50 Syrian troops. Several tanks
    and armoured personnel carriers are destroyed near the village of Nayrab. (News
    AU) (Al Jazeera)
  - Turkey formally requests the deployment of Patriot surface-to-air missile systems
    by its NATO ally United States on the Syria–Turkey border to deter Syrian and
    Russian air strikes on its troops. (The Telegraph) (Al Masdar News)
  Art and culture:
  - An 18th-century Ethiopian ceremonial crown, one of the 20 in existence, is returned
    to Prime Minister Abiy Ahmed. It was discovered in the Netherlands in 1998, and
    was held by Dutch authorities until now so it could be returned when the country
    was more politically stable. (BBC News)
  Business and economy:
  - Morgan Stanley purchases electronic trading firm E-Trade for US$13 billion, in
    the largest banking deal since the 2008 financial crisis. (The Guardian)
  Disasters and accidents:
  - 2020 Wallan derailment
  - A XPT train derails in Victoria, Australia, killing two people. (The Guardian)
  - A 200-car pileup in La Prairie, Quebec, Canada, kills two people and injures 69
    others. (News AU)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in South Korea
  - South Korea reports its first death from COVID-19. (Sputnik)
  - Two Japanese passengers who were on board of the Diamond Princess cruise ship
    have died from the disease. Both, a man and a woman in their 80s, had underlying
    health conditions. (BBC News)
  - Australia extends its ban on travel from China for the fourth week in a row. (The
    Guardian)
  International relations:
  - The Guardian reveals that Australian ambassador to Myanmar Andrea Faulkner met
    with Commander-in-chief of the Burmese Armed Forces Min Aung Hlaing last month
    to discuss improving relations between the two nations and possibly training Hlaing's
    officers in Australia, among others. Human Rights Watch criticized this meeting
    as enabling Hlaing's genocide against the Rohingya. (The Guardian)
  Law and crime:
  - Weeks after the First Lady of Lesotho Maesiah Thabane was arrested and charged
    with the killing of former First Lady Lipolelo Thabane, it is announced that current
    Prime Minister of Lesotho Tom Thabane will also be charged with the murder in
    the upcoming hours. He also announced he will be stepping down at the end of July
    citing old age. (Reuters)
  - Criminal charges brought in the Mueller special counsel investigation
  - U.S. District Court for the District of Columbia Judge Amy Berman Jackson sentences
    Roger Stone, long-time adviser and ally to the President of the United States
    Donald Trump, to 40 months in federal prison for seven charges of obstruction,
    lying to Congress and witness tampering. (CNN) (BBC News)
  - New Mexican Attorney General Hector Balderas sues Google for allegedly collecting
    private information of the state's schoolchildren without parental consent. (Reuters)
  Politics and elections:
  - 2020 Dominican Republic municipal elections
  - Protests happen in major Dominican Republic cities over the election problems.
    (Dominican Today)
  - Col. Ramón A. Guzmán and Claro telecom technician Manuel Antonio Regalado were
    arrested for the election sabotage. (Dominican Today)
  - South Sudanese President Salva Kiir Mayardit and SPLM-IO leader Riek Machar agree
    to form a unity government by Saturday, in a major step to end the South Sudanese
    Civil War. (Al Jazeera)
  - The California State Legislature unanimously passes a resolution apologizing for
    the state's role in interning Japanese-Americans during World War II. (The Guardian)
  - Aftermath of the 2020 Irish general election
  - The 33rd Dáil Éireann meets for the election of the Taoiseach (head of government)
    and Ceann Comhairle (speaker of parliament).
  - Seán Ó Fearghaíl of Fianna Fáil is re-elected as Ceann Comhairle. No candidate
    for Taoiseach attains the 80 votes required to form a government. The Dáil adjourns
    until March 5. (RTÉ)
  - Incumbent Taoiseach Leo Varadkar offers his resignation to President Michael D.
    Higgins, but will remain as Taoiseach in a caretaker capacity until the formation
    of a new government. (Sky News)
