Date: '2020-02-10'
Source_URI: Portal:Current events/2020 February 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Auno attack
  - Boko Haram militants kill at least 30 people, burning them to death while they
    were sleeping in their vehicles in Borno State, Nigeria. Women and children are
    kidnapped. (BBC News)
  - Syrian civil war, Northwestern Syria offensive (December 2019–March 2020)
  - Turkey says Syrian shelling killed five of its troops at an observation post at
    Taftanaz Military Airbase in Idlib Governorate. The Turkish government says it
    "retaliated against the attack to destroy all enemy targets and avenging our fallen
    troops". (AP News) (BBC News)
  - Russian and Syrian Air Force warplanes carry out airstrikes on civilian settlements
    in Aleppo and Idlib provinces, killing at least 17 to 25 civilians including six
    children. (AA) (MSN) (DW)
  - A car bomb kills four people and injures 15 others in the Turkish-occupied city
    Afrin, in Aleppo Governorate. (France 24)
  Business and economy:
  - Climate change mitigation, Individual and political action on climate change
  - Dozens of climate activists surround the offices of American investment management
    company BlackRock in central Paris and vandalize the building, demanding they
    disinvest from the fossil fuel industry. (Reuters)
  - Brexit
  - UK government minister Michael Gove says an IT system for the prospective "smart"
    border will not be ready before 2025. (The Independent) (Financial Times)
  Disasters and accidents:
  - COVID-19 pandemic
  - Tedros Adhanom Ghebreyesus, head of the World Health Organization, warns that
    overseas cases of the virus could be the "tip of the iceberg". (Yahoo! News)
  - COVID-19 pandemic in Mainland China
  - In a rare public appearance and wearing a mask, Xi Jinping visits a hospital in
    Beijing, and urges "more decisive measures" to combat the virus. (BBC News)
  Law and crime:
  - A court in Israel sentences Sheikh Raed Salah to 28 months in prison for "inciting
    to terror". (Al Jazeera)
  - Chinese cyberwarfare
  - A federal grand jury in the United States charges four members of China’s People's
    Liberation Army with the 2017 Equifax hack. (CNN)
  - Mohiussunnath Chowdhury is convicted of planning terrorist attacks in London.
    (BBC News)
  - The U.S. Justice Department files lawsuits against King County, Washington and
    the state of New Jersey over their use of sanctuary cities. (Reuters)
  Politics and elections:
  - The president of Germany's CDU party, Annegret Kramp-Karrenbauer, announces that
    she will resign as the party's president and not be a candidate for the federal
    chancellorship in the next election. (Der Spiegel) (The Guardian)
  - The administration of Philippine President Rodrigo Duterte moves to cancel the
    franchise of ABS-CBN, the Philippines' largest broadcast media network, by lodging
    a complaint against it to the Supreme Court of the Philippines. Members of the
    Philippine press condemn the actions in moving for the cancellation of the franchise
    of ABS-CBN. (The New York Times) (Rappler) (GMA News Online)
