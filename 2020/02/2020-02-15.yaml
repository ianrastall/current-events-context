Date: '2020-02-15'
Source_URI: Portal:Current events/2020 February 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - The Houthis accuse Saudi Arabia of airstrikes that killed 30 people, including
    civilians, in Al Jawf Governorate. The Houthis say women and children were among
    those killed in the strike, which was said to be a retaliation for the downing
    of a coalition plane the previous day. (Reuters)
  Disasters and accidents:
  - Storm Dennis
  - The British Army is deployed to help with rescue efforts as the bomb cyclone kills
    two people. (UPI)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in France
  - The first death from the disease inside Europe occurs in France. He was an 80-year-old
    Chinese tourist who had arrived in Paris with symptoms of the illness on January
    16. (BBC News)
  International relations:
  - Australia–United Kingdom relations
  - Several senior Australian MPs cancel a planned trip to the United Kingdom next
    month due to the latter allowing Huawei to help build its national 5G network.
    Australia had banned the Chinese telecom from participating in their network due
    to security concerns. (BBC News)
  - India–Turkey relations
  - Indian Ministry of External Affairs spokesman Raveesh Kumar tells Turkish President
    Recep Tayyip Erdoğan to "not interfere in India's internal affairs" after he and
    Pakistani Prime Minister Imran Khan issued a joint declaration yesterday condemning
    the lockdown in Jammu and Kashmir. (Al Jazeera)
  Politics and elections:
  - 2020 Labour Party leadership election
  - Shadow First Secretary of State Emily Thornberry is eliminated from the UK Labour
    leadership race after falling two nominations short of advancing to the next round.
    (BBC News)
  Science and technology:
  - Microsoft removes a security update four days after its release, upon receiving
    complaints that the update has been responsible for system freezes, boot problems,
    and installation issues for Windows. (Bleeping Computer)
