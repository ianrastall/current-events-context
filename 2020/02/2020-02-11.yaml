Date: '2020-02-11'
Source_URI: Portal:Current events/2020 February 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war, Northwestern Syria offensive (December 2019–March 2020)
  - The Syrian Army and allied militia groups secure the entire length of the strategic
    M5 Motorway, connecting Damascus and Aleppo, for the first time since 2012. (Reuters)
  - A Syrian Air Force Mi-17 helicopter is shot down by Turkish-backed rebel forces
    near the village of Nayrab in Idlib Governorate, killing both pilots. (Haaretz)
  - February 2020 Kabul bombing
  - A suicide bombing in Afghanistan's capital Kabul kills six people and injures
    twelve others. (The Guardian)
  - 2020 Iranian attack on U.S. forces in Iraq
  - The Pentagon confirms that the number of U.S. troops who suffered traumatic brain
    injuries from the Iranian attacks in January is higher than previously stated,
    now being at 109. (DW)
  - 2019–20 Lebanese protests
  - Lebanese protesters attempt to block a confidence vote, and 400 people are injured.
    The Lebanese Cabinet wins the vote. (MSN) (NBC)
  Arts and culture:
  - Westminster Kennel Club Dog Show
  - Siba, a standard Poodle, wins Best in Show Award. (Fox News) (ESPN) (The Guardian)
  Business and economy:
  - New York v. Deutsche Telekom
  - Victor Marrero, a U.S. District Judge for the Southern District of New York, approves
    the $26 billion USD merger of T-Mobile US and Sprint Corporation. (NBC)
  - UK Prime Minister Boris Johnson approves the High Speed 2 railway project, after
    many delays and the project going billions of pounds overbudget. (The Guardian)
  - Softbank, the Japanese venture capital giant, announced fourth quarter results.
    They were dismal, due especially to Softbank's losses on its Vision Fund. (Reuters)
  Disasters and accidents:
  - Storm Ciara kills six people in Europe. (MSN)
  - A boat carrying Rohingya refugees capsizes in the Bay of Bengal while trying to
    reach Malaysia. Fifteen are confirmed dead and dozens are missing, a Bangladesh
    Coast Guard official says. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Mainland China
  - The death toll of the coronavirus pandemic in China surpasses 1,000. Hubei province
    reported 103 deaths in a single day, the highest single-day toll of the pandemic.
    (DW)
  International relations:
  - Philippines–United States relations
  - The President of the Philippines Rodrigo Duterte terminates the Visiting Forces
    Agreement with the United States. Foreign Secretary Teodoro Locsin Jr. confirms
    that the Embassy of the United States, Manila, has been formally notified. The
    termination will take effect after 180 days. (Reuters) (The Guardian)
  - Aftermath of the Sudanese Revolution
  - Sudan's ruling military council agrees to hand over ousted dictator Omar al-Bashir
    to the International Criminal Court in The Hague to face charges of crimes against
    humanity in Darfur. (The Guardian)
  Law and crime:
  - Love v Commonwealth
  - The High Court of Australia finds that Aboriginal Australian people are not "aliens"
    under the Australian Constitution, even if they were not born in Australia and
    do not have Australian citizenship, and they cannot be deported. (ABC News) (SBS
    News)
  - Venezuela makes its civilian militia a new branch of the armed forces. (Reuters)
  Politics and elections:
  - 2020 Democratic Party presidential primaries, 2020 New Hampshire Democratic primary
  - Registered Democrats and independents in the U.S. state of New Hampshire vote
    in the first official Democratic presidential primary of the election year. It
    comes after the controversial Iowa caucuses that occurred a week earlier. (CBS
    News)
  - Vermont Senator Bernie Sanders narrowly defeats former South Bend, Indiana mayor
    Pete Buttigieg to win the primary. (Vox)
  - Entrepreneur Andrew Yang suspends his presidential campaign. (PBS)
  - Colorado Senator Michael Bennet suspends his presidential campaign. (NBC News)
