Date: '2020-02-27'
Source_URI: Portal:Current events/2020 February 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war, Northwestern Syria offensive (December 2019–March 2020), Turkish
    involvement in the Syrian Civil War
  - Syrian opposition groups backed by Turkey recapture the strategic city of Saraqib,
    lift the siege on four Turkish observation points and cut the M5 highway. (SOHR)
    (Xinhua)
  - A Turkish sniper kills a Syrian lieutenant colonel in Syria's Tell Abyad countryside.
    (SOHR)
  - Three Turkish soldiers are killed in Syrian Army attacks in Idlib, bringing the
    number of Turkish soldiers killed in Syria to 21. (The Jerusalem Post)
  - 36 Syrian Army troops and 25 Turkish-backed rebels are killed, bringing the total
    death toll in Idlib since December to 1,186 opposition fighters and 1,136 Syrian
    government soldiers. (SOHR)
  - Airstrikes kill at least 33 Turkish troops and injures 39 others in Jabal Zawiya,
    Idlib Governorate. (Daily Sabah) (BBC News)
  - Turkey says it has 'neutralized' 1,709 Syrian government elements in Idlib since
    10 February 2020 and that it has destroyed 55 tanks, 3 helicopters, 18 armored
    vehicles, 29 howitzers, 21 military vehicles, 4 Docka anti-aircraft guns, 6 ammunition
    depots and 7 mortars in the operations. (Anadolu Agency)
  - Turkey opens its border with Syria and allows Syrian refugees free passage to
    Europe effective immediately for the next 72 hours. (Middle East Eye)
  - Turkish Foreign Minister Mevlüt Çavuşoğlu and NATO Secretary General Jens Stoltenberg
    hold talks amid the escalation in Idlib with Syria and Russia. (AP)
  - Twitter, Facebook and Instagram are blocked in Turkey, while YouTube and WhatsApp
    are partially restricted. It is understood that the measures are intended to protect
    details surrounding troop and equipment deployments. (Netblocks)
  - A cyber attack in Australia forces the cancellation of wool sales across the country.
    (ABC AU)
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - The Dow Jones Industrial Average enters correction territory after plunging 700
    points at opening. (USA Today)
  - Markets are on pace for their worst week since the 2008 financial crisis. (Market
    Watch)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Iran
  - Vice President for Family Affairs Masoumeh Ebtekar is infected with the novel
    coronavirus. (Washington Post)
  - COVID-19 pandemic in Italy
  - 236 more coronavirus cases are confirmed in Italy, bringing the number to 655.
    Five more virus-related deaths are confirmed, bringing the death toll in the country
    to seventeen. Forty-five people recovered from the disease. (La Repubblica)
  - COVID-19 pandemic in the United States
  - A woman is diagnosed with the coronavirus after a possible person-to-person transmission.
    It would be the first case of transmission in the United States with no known
    contacts to overseas cases. (NBC)
  - Saudi Arabia temporarily suspends entry to the kingdom for the Umrah Islamic pilgrimage
    and visits to al Al-Masjid an-Nabawi in Medina due to fears over the spread of
    the deadly novel coronavirus. (Reuters)
  - Saudi Arabia blocks all foreign pilgrims from entering the country. This block
    happens just before the Ramadan fasting. (ABC AU)
  - Prime Minister of Japan Shinzo Abe announces that all junior and high schools
    will be asked to close from March 2 until their upcoming spring break to help
    fight the coronavirus pandemic. (Reuters)
  - Estonia confirms their first case. (Al Jazeera)
  - Greece confirms its second and third cases and cancels all Carnival-related events.
    (Reuters)
  - The first case in San Marino is confirmed. (Alta Rimini)
  - The decision to build a third runway at Heathrow Airport is found to be unlawful
    by the Court of Appeal because the British government did not take into account
    its commitments under the Paris Agreement to combat climate change. (BBC News)
  International relations:
  - European migrant crisis
  - A senior Turkish official tells Reuters that Turkey "will no longer stop Syrian
    refugees from reaching Europe". (Reuters)
  Science and technology:
  - Astronomers discover the largest known explosion ever in the history of the Universe,
    which occurred in the Ophiuchus galaxy cluster. It replaces MS 0735.6+7421. As
    space and ground telescopes that study radio emissions improve (which are better
    than X-ray observations for detecting these), more similar explosions, or "giant
    radio fossils", may be found. (Phys) (CNN) (Astrophysics via arXiv at Cornell
    University)
