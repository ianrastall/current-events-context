Date: '2020-02-23'
Source_URI: Portal:Current events/2020 February 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israel kills two members of Islamic Jihad in an aerial attack near Damascus, Syria.
    (Al Jazeera)
  Arts and culture:
  - The Carnival of Aalst in Belgium goes ahead despite UNESCO withdrawing its recognition
    of the event as a Masterpiece of the Oral and Intangible Heritage of Humanity
    because of Jewish caricatures. (Reuters) (newsmonkey)
  Disasters and accidents:
  - 2020 Iran–Turkey earthquakes
  - An earthquake in West Azerbaijan Province, Iran, kills at least nine people and
    injures more than a hundred others. (Daily Sabah)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Italy
  - Seventy-six more coronavirus cases are confirmed in Italy, bringing the number
    of the cases in the country to 155. (La Repubblica)
  - A 68-year-old woman dies of coronavirus in Crema, Italy, bringing the number of
    deaths in the country to three. (Tgcom24)
  - COVID-19 pandemic in South Korea
  - South Korea confirms that 169 more people have contracted the coronavirus in the
    country, raising the total number to 602. (BBC News)
  - COVID-19 pandemic in Iran
  - Pakistan closes its border from Taftan with Iran due to increasing cases of coronavirus
    in Iran. (Geo News)
  - Turkey closes its border with Iran and halted incoming flights due to more cases
    of coronavirus in Iran. (Reuters)
  - Afghanistan suspends travel between it and Iran and reported three suspected virus
    cases in Herat. (TRT World)
  Politics and elections:
  - 2020 Comorian legislative election
  - The second round of the latest election in Comoros takes place. The election is
    still boycotted by the political opposition. (RFI)
  - 2020 Dominican Republic municipal elections
  - Protests begin in New York and Massachusetts in the United States, Paris in France,
    Toronto in Canada, Madrid, Navarre, and Barcelona in Spain, San Juan, Puerto Rico,
    and London in England. (Dominican Today)
  - Protestors demand the Central Electoral Board resign. (Dominican Today)
