Date: '2020-06-21'
Source_URI: Portal:Current events/2020 June 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Forbury Gardens stabbings
  - The fatal mass stabbing yesterday at Forbury Gardens in Reading, United Kingdom,
    is declared by the police to have been a terrorist attack. (BBC News)
  - Yemeni Civil War
  - Forces of the Southern Transitional Council (STC) seize control of the island
    of Socotra. President Abdrabbuh Mansur Hadi condemns it as a "full-fledged" coup,
    while the governor of the island condemns the United Arab Emirates and Saudi Arabia
    for "turning a blind eye". (Reuters)
  - Afghan peace process
  - The Afghan government accuses the Taliban of kidnapping about 60 civilians in
    the last week in the province of Daykundi. The Taliban deny the accusation and
    blames the government for civilian casualties during the past week. At least 26
    women and children have been freed and elder tribal leaders are mediating for
    the release of the rest of abductees. (Reuters)
  - Somali Civil War
  - Two bombs explode in front of a military official's house in Wanlaweyn, killing
    four people. In another attack, in Galmudug, three men drove a car packed with
    bombs against a checkpoint after ignoring orders to stop, killing three soldiers.
    (Al Jazeera)
  - Second Libyan Civil War, Egypt–Libya relations
  - The Government of National Accord's Presidential Council says Egyptian president
    Abdel Fattah el-Sisi's threats to take military action in Libya constitutes "a
    declaration of war" on the country. (The Libya Observer)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Spain
  - The state of emergency in Spain officially finishes after more than 100 days.
    (The Guardian)
  - COVID-19 pandemic in Brazil
  - Brazil's Ministry of Health reports 641 more deaths from COVID-19, bringing the
    death toll in the country to over 50,000. (BBC News)
  Law and crime:
  - List of mass shootings in the United States in 2020
  - One person is killed while eleven others are injured during a mass shooting in
    Minneapolis, Minnesota. The incident involved people shooting at one another.
    (The New York Times)
  Politics and elections:
  - 2020 Serbian parliamentary election
  - Parliamentary elections are held in Serbia roughly one month after the measures
    to fight the COVID-19 pandemic were lifted. (Reuters)
