Date: '2020-06-29'
Source_URI: Portal:Current events/2020 June 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - June 2020 Afghanistan attacks
  - At least 23 civilians are killed when rockets hit a cattle market in Sangin, Helmand.
    The government and the Taliban blame each other for the attack. (Reuters)
  - 2020 Pakistan Stock Exchange attack
  - An attack on the Pakistan Stock Exchange building in Karachi leaves at least seven
    people dead. The Balochistan Liberation Army (BLA) claims responsibility. However,
    the BLA's claim could not be independently verified. (Reuters)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, Impact of the COVID-19 pandemic on the
    arts and cultural heritage
  - Cirque du Soleil files for bankruptcy in Canada and cuts 3,500 jobs. (CNN)
  Disasters and accidents:
  - At least 32 people die when their ferry collides with another vessel and sinks
    in the Buriganga River, near Bangladesh's capital Dhaka. There are still about
    20 passengers missing. (BBC News)
  International relations:
  - Iran–United States relations
  - Iran issues an arrest warrant against U.S. President Donald Trump and asks Interpol
    for help. Tehran prosecutor Ali Alqasimehr accuses Trump and 30 others of "murder
    and terrorism charges" for the killing of Qasem Soleimani in January. Interpol
    refuses the request. (Al Jazeera)
  - Censorship in India, China–India relations
  - The Indian Ministry of Information Technology blocks 59 Chinese apps, including
    video sharing app TikTok, citing security and privacy concerns. The bans come
    as tensions mount between the two countries over the recent border skirmishes.
    (Times of India)
  - China–United States relations
  - The United States formally revokes Hong Kong's special trade status; it is now
    seen as equivalent to mainland China. (Reuters)
  Law and crime:
  - Fillon affair
  - Former Prime Minister of France François Fillon and his wife Penelope are found
    guilty in a fake jobs case, in which Penelope was paid €1.156 million for work
    she did not do as a parliamentary aide. François is sentenced to five years in
    prison, three of them suspended, and is barred from office for ten years; Penelope
    will also serve a three year suspended sentence. (BBC News)
  - Golden State Killer
  - Joseph James DeAngelo pleads guilty to all of the charges pressed against him,
    including 13 counts of first-degree murder. (The Sacramento Bee)
  Science and technology:
  - Social media use by Donald Trump
  - Reddit bans approximately 2,000 communities for violating its rules on hate speech,
    including The_Donald, which was dedicated to U.S. President Donald Trump and his
    supporters. (The New York Times)
  - Twitch suspends U.S. President Donald Trump's account due to "hateful conduct"
    from two videos from 2015 and 2016 in which he made comments about Mexicans, which
    were found to be offensive and in breach of their community guidelines. (The New
    York Times)
