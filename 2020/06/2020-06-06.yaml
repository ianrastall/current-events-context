Date: '2020-06-06'
Source_URI: Portal:Current events/2020 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - 2019–20 Western Libya campaign
  - The Government of National Accord (GNA) says its forces have taken full control
    of Bani Walid, including Bani Walid Airport, and Al ‘Urban without facing any
    resistance, as Libyan National Army forces abandon their positions. (The Libya
    Observer)
  - GNA forces state that they have discovered 160 bodies in and around a hospital
    in the recently captured Tarhuna, including the bodies of women and young children,
    which the GNA Ministry of Health remark appear to have only recently been killed.
    (The Libya Observer)
  - GNA forces say they have begun a military operation to recapture the coastal city
    of Sirte from pro-Haftar forces. (Daily Sabah)
  - Egyptian President Abdel Fattah el-Sisi says Khalifa Haftar supports a ceasefire
    starting Monday, June 8, with the condition that all "foreign mercenaries leave
    Libyan territory". (Al Jazeera)
  Health and environment:
  - COVID-19 pandemic in Vatican City
  - Vatican Press Secretary announces that the last remaining patient has recovered
    and that there are zero active cases in the state. (Vatican News)
  Law and crime:
  - George Floyd protests
  - George Floyd protests in the United Kingdom
  - Tens of thousands of people demonstrate against racism in the United Kingdom.
    A protest on Whitehall in London turns violent and a mounted officer falls from
    her horse, which then bolts. (Sky News) (BBC News)
  - Buffalo police shoving incident
  - Two Buffalo police officers are charged with assault after they were recorded
    on video violently shoving a 75-year-old man to the ground and causing him to
    be hospitalized with a head injury. (The Washington Post)
  - The government of Malaysia rejects a USD$3 billion settlement offered by Goldman
    Sachs in a lawsuit over the 1MDB scandal. (Reuters)
  Politics and elections:
  - 2020 Kaohsiung mayoral recall vote
  - Incumbent mayor of Kaohsiung and former presidential candidate Han Kuo-yu is removed
    from office after 939,090 people voted for his recall, vastly exceeding the minimum
    threshold of 574,996 votes. This marks the first time a mayor has been successfully
    recalled in Taiwan. (Central News Agency)
