Date: '2020-06-28'
Source_URI: Portal:Current events/2020 June 28
Intelligence_Payload:
  Arts and culture:
  - List of name changes due to the George Floyd protests
  - Princeton University says it will remove the name of former U.S. President Woodrow
    Wilson from its public policy school and a residential college, calling him "a
    racist". Christopher L. Eisgruber says that "Woodrow Wilson's racist thinking
    and policies make him an inappropriate namesake for a school or college whose
    scholars, students and alumni must stand firmly against racism in all its forms".
    (Al Jazeera)
  Business and economy:
  - Following negotiations with creditors, Chesapeake Energy applies for Chapter 11
    bankruptcy in the United States. It will seek to restructure its debts in order
    to continue operations. The company is experiencing cash flow and liquidity issues
    due to low energy prices and large amounts of debt. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - The worldwide COVID-19 case total surpasses 10 million while the worldwide death
    total surpasses 500,000. The United States remains the leading nation in cases,
    accounting for over 25 percent of both cases and deaths worldwide. (NBC News)
    (Al Jazeera)
  International relations:
  - Second Libyan Civil War, Libya–Sudan relations
  - Sudan says it has detained 122 of its nationals, including eight children, who
    were heading to neighboring Libya to fight as "mercenaries". Sudanese Foreign
    Minister Asma Mohamed Abdalla says, "We cannot get involved in a conflict in any
    neighboring country." (Arab News)
  Politics and elections:
  - 2020 Icelandic presidential election
  - Incumbent president Guðni Th. Jóhannesson wins re-election with 92% of the votes.
    (Euronews)
  - 2020 Polish presidential election
  - Voters in Poland head to the polls to elect their next president. The election
    had to be postponed once due to the ongoing COVID-19 pandemic. (DW)
  - Incumbent president Andrzej Duda wins the first round of voting. He will face
    Mayor of Warsaw Rafał Trzaskowski in a second-round runoff. (BBC News)
  - Reactions to the George Floyd protests
  - The Mississippi Legislature votes to remove the Confederate battle flag from its
    126-year-old state flag and to form a commission to redesign a new flag. Mississippi
    is the last U.S. state to display the Confederate battle emblem. The bill now
    heads to Governor Tate Reeves to sign into law. (NPR)
  Sports:
  - 2020 NFL season
  - The New England Patriots reach an agreement to sign quarterback Cam Newton. He
    will replace the Patriots' longtime quarterback Tom Brady, who left the team in
    March. (AP)
