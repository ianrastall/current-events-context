Date: '2020-06-05'
Source_URI: Portal:Current events/2020 June 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - 2019–20 Western Libya campaign
  - Turkish-backed GNA forces enter the strategic Libyan National Army-held town of
    Tarhuna, west of Tripoli. The town is considered to be a stronghold for Field
    Marshal Khalifa Haftar. The GNA operations room say its forces have reached the
    centre of the town. (Reuters)
  - 2020 Democratic Republic of the Congo massacres
  - The High Commissioner for Human Rights of the United Nations, Michelle Bachelet,
    says that more than 1,300 civilians have been killed in recent months and half
    a million displaced in three provinces of the Democratic Republic of the Congo
    amid a resurgence of attacks on the civilian population by different armed groups.
    Bachelet says these attacks "may amount to crimes against humanity and war crimes".
    (Al Jazeera)
  - Mali War, Operation Barkhane
  - The French Minister of the Armed Forces Florence Parly says that AQIM emir Abdelmalek
    Droukdel, along with members of his inner circle, had been killed in northern
    Mali on 3 June 2020. She also says that French forces had also captured a senior
    AQIM commander in an operation in May. (BBC News)
  - List of mass shootings in the United States in 2020
  - Seven people are killed in an overnight shooting and arson at a residence in Valhermoso
    Springs, Alabama. Police believe the incident was a targeted attack, but no suspects
    are in custody. (ABC News) (WAFF-TV)
  Disasters and accidents:
  - Five people are killed after a Cessna 210 Centurion crashes near Puerto Vallarta,
    Mexico. (Aviation Safety Network)
  - Five people are killed after a Piper PA-31T Cheyenne crashes in Eatonton, Georgia,
    United States. (Aviation Safety Network)
  - A three-alarm fire causes major damage to Amazon's distribution center in Redlands,
    California. Despite the extent of the damage and the collapse of the roof, no
    injuries are reported as the staff was safely evacuated. The cause of the fire
    is currently under investigation. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York City
  - New York City reports its first day without COVID-19 deaths since March 11. (CNBC)
  - COVID-19 pandemic in the United Kingdom
  - The COVID-19 death toll in the United Kingdom passes over 40,000. (The Independent)
  Law and crime:
  - Buffalo police shoving incident
  - 57 members of the Buffalo Police Department's Emergency Response Team resign in
    protest of the city's decision to suspend two officers after injuring a 75-year-old
    on Thursday. (ABC News)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - Former Vice President Joe Biden surpasses the required 1,991 delegates to win
    the Democratic nomination. He will face off against incumbent President Donald
    Trump in the general election in November. (NPR)
  - 2020 Saint Kitts and Nevis general election
  - Citizens of Saint Kitts and Nevis head to the polls in the country's latest general
    election. (Foreign Brief)
