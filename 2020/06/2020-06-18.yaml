Date: '2020-06-18'
Source_URI: Portal:Current events/2020 June 18
Intelligence_Payload:
  Health and environment:
  - COVID-19 pandemic in Canada
  - The total number of COVID-19 cases in Canada surpasses 100,000, with 8,266 deaths
    recorded. (Reuters)
  International relations:
  - India–Nepal relations
  - The upper house of Nepal's parliament approves a new map for the country which
    includes territories controlled by India. The map requires the approval of President
    Bidhya Devi Bhandari. India opposes the move, saying that the decision to include
    Limpiyadhura, Lipulekh and Kalapani is not based on evidence or historical facts.
    (Al Jazeera)
  - 2020 United Nations Security Council election
  - After a second round of voting, Kenya defeats Djibouti in becoming a non-permanent
    member on the United Nations Security Council starting in 2021. They will join
    four other newly-elected members, India, Ireland, Norway and Mexico. (Al Jazeera)
  Law and crime:
  - Department of Homeland Security v. Regents of the University of California, Immigration
    to the United States
  - The U.S. Supreme Court rules in a 5–4 decision that the rescission of the Deferred
    Action for Childhood Arrivals (DACA) policy was "arbitrary and capricious" under
    the Administrative Procedure Act (APA) and reversed the order rescinding it. Chief
    Justice John Roberts casts the deciding vote, along with the four liberal Justices.
    (NPR)
  Politics and elections:
  - Aftermath of the 2020 Burundian general election
  - Évariste Ndayishimiye takes office as the President of Burundi, following the
    sudden death of his predecessor Pierre Nkurunziza, his inauguration was advanced
    to June 18. (Al Jazeera)
  - Brazil's Education Minister Abraham Weintraub announces his resignation. He did
    not give a reason; it is believed to be due to derogatory remarks he made about
    the Supreme Federal Court. (Reuters)
  Science and technology:
  - Censorship in the United States, Donald Trump on social media
  - Facebook removes a post condemning antifa by U.S. President Donald Trump's re-election
    campaign, stating the post's symbol for the group was similar to the one used
    by the Nazis to identify political prisoners. (BBC News)
  - Australian Prime Minister Scott Morrison says "all levels of government", as well
    as essential service providers and businesses, are being targeted by a sophisticated
    state-backed cyberattack. Morrison did not say which state is behind the attack.
    (BBC News)
  Sports:
  - COVID-19 pandemic in the State of Palestine
  - Local sporting events, such as equestrianism, resume in the Gaza Strip today.
    As of tomorrow, football competitions will be played without spectators. (Reuters)
  - In Germany Matthias Grosse is appointed as president of the national German speed
    skating association, . This is seen by national and international media as very
    remarkable as controversial person and parter of drug banned speed skater Claudia
    Pechstein. (Der Spiegel) (De Volkskrant) (Deutschlandfunk)
