Date: '2020-06-13'
Source_URI: Portal:Current events/2020 June 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Monguno and Nganzai massacres
  - ISWAP kills over 20 soldiers and 40 civilians in attacks in Monguno and Nganzai
    in Borno, Nigeria – four days after they killed 82 civilians in Gubio. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - Coalition spokesman Turki al-Malki says the armed forces destroyed a ballistic
    missile targeting the Saudi border city of Najran. In a statement, the spokesman
    said the missile was launched from the Yemeni city of Saada and that some people
    were slightly injured when it was destroyed. The Houthis did not claim responsibility.
    (Al Jazeera)
  Health and environment:
  - COVID-19 pandemic in Chile
  - More than 3,100 deaths are officially reported in the country. However, an investigation
    reported the Ministry of Health told the World Health Organization that the death
    toll reached 5,000 cases. (France24)
  - Jaime Mañalich is succeeded by Enrique Paris as Minister of Health. (France24)
  International relations:
  - Czech Republic–Poland relations, COVID-19 pandemic in Poland
  - Poland's Ministry of National Defence admits its army briefly invaded and occupied
    the Czech Republic for several days last month in a "misunderstanding", the Polish
    soldiers took up positions near a chapel on the Czech side of the border in Moravia
    as part of coronavirus measures, and prevented Czech visitors from the site. (BBC
    News)
  Law and crime:
  - Killing of Rayshard Brooks
  - Protestors set fire to a Wendy's restaurant in Atlanta, Georgia, U.S., in response
    to Rayshard Brooks' death the evening before. Outside the restaurant the previous
    day, two police officers shot Brooks after he attempted to escape from them after
    a tussle in which he took one of the officer's taser and discharged it at one
    of them following a DUI investigation. (The Guardian)
  - COVID-19 pandemic in the United Kingdom; Crime in Greater Manchester
  - A man is killed, a woman raped and three others stabbed at two "quarantine raves"
    late Saturday that attracted 6,000 people in Greater Manchester. They were a clear
    breach of coronavirus legislation. (BBC News)
  - A court in China sentences an Australian man to death for drug trafficking. The
    man had been arrested in 2013 at Baiyun Airport in Guangzhou. The Australian government
    condemns the verdict. (Reuters)
  - Colombian businessman Alex Saab is arrested in Cape Verde a week after Colombian
    authorities froze his assets following the opening an investigation against him
    for alleged money laundering. The Nicolás Maduro-led Government of Venezuela denounces
    the arrest as an arbitrary detention and violation of international law. (Reuters)
  Politics and elections:
  - George Floyd protests
  - George Floyd protests in the United States
  - George Floyd protests in California
  - Protesters gather outside the One America News Network headquarters in San Diego,
    California, US for their misinformation about the Buffalo police shoving incident,
    including labeling protester Martin Gugino as a “Antifa provocateur”. (Times of
    San Diego)
  - George Floyd protests in the United Kingdom
  - Protests organized by Black Lives Matter are cancelled in London before the arrival
    of counter-protesters, including members of the far-right, although some BLM supporters
    arrived. Far-right protesters and police clashed at a demonstration in Trafalgar
    Square. (BBC News) (Reuters) (The Times)
  - French riot police clash with anti-racism protesters in central Paris, as thousands
    march onto the Place de la République to protest police brutality against the
    country's immigrants. (Reuters)
  - 2020 Polish presidential election, LGBT rights in Poland
  - President Andrzej Duda compares the "LGBT ideology" to "communist indoctrination"
    ahead of the upcoming presidential elections. Opposition candidate Robert Biedroń
    condemns his remarks. (Reuters)
