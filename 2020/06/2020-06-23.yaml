Date: '2020-06-23'
Source_URI: Portal:Current events/2020 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - The Houthis launch ballistic missiles and drones against Saudi Arabia, including
    its capital Riyadh. Saudi-led coalition spokesman Turki al-Maliki says that Saudi
    forces "managed to intercept and destroy" the missiles and drones. The military
    says that they destroyed "eight booby-trapped unmanned aircraft [used by the Houthis]
    to target civilian objects and civilians in the kingdom". (Al Jazeera)
  - Somali Civil War (2009–present)
  - Two civilians are killed after a suicide bombing occurs at a Turkish military
    installation in Mogadishu, Turkey's largest overseas military base. Al-Shabaab
    claims responsibility. (The New York Times)
  Disasters and accidents:
  - 2020 Oaxaca earthquake
  - A major earthquake strikes southern Mexico, with its epicenter 15 miles (24.1km)
    northeast of Santa María Xadani, Oaxaca, resulting in the death of five people.
    It was measured at 7.4 magnitude and a tsunami warning was issued. (CNN)
  Health and environment:
  - COVID-19 vaccine
  - Imperial College London administers the first dose of their proposed COVID-19
    vaccine, which is undergoing a clinical trial. (Imperial College London)
  International relations:
  - North Korea–South Korea relations
  - Amid increasing tensions and in spite of warnings from the South Korean government,
    hundreds of thousands of anti-Kim leaflets are floated across the border by a
    group of North Korean defectors. (Associated Press)
  Law and crime:
  - Killing of Rayshard Brooks
  - Fulton County authorities charge a woman with arson in relation to an Atlanta
    Wendy's restaurant being burnt down the day after police killed Rayshard Brooks
    there after he fled when they tried to arrest him for DUI. The woman's lawyer
    said she was Brooks' girlfriend. (The New York Post) (The New York Post)
  - A court in Kyrgyzstan sentences former President Almazbek Atambayev to 11 years
    in prison on corruption charges, which he denies. (Reuters)
  - A court in Turkey sentences a former mayor of a Kurdish city and opposition member
    to 16 years in prison for "being a member of a terrorist group, abusing power
    and inciting to violence and hatred". The head of a local human rights organization
    says "all the charges against her are fabricated". (Al Arabiya)
  - American porn star Ron Jeremy is charged with the rape of three women and sexual
    assault of another. (The Guardian)
  Politics and elections:
  - 2020 Kiribati presidential election
  - Incumbent Taneti Maamau is re-elected as President of Kiribati with 26,053 votes
    to 17,866 votes by Banuera Berina, in a blow for Taiwan and its efforts to regain
    recognition from the Pacific country. (RNZ)
  - 2020 Malawian presidential election
  - After the results of the last general election in Malawi were annulled by the
    country's Constitutional Court in February, new elections are held. (BBC News)
  - 2020 Singaporean general election
  - President Halimah Yacob dissolves Parliament and polling day is set on 10 July.
    (CNA)
  - 2020 Kentucky Democratic presidential primary, 2020 United States Senate election
    in Kentucky
  - Voters in Kentucky head to the polls to nominate a Democrat to face Senate Majority
    leader Mitch McConnell. Former Vice President Joe Biden also won the state primary.
    (CNN) (The Hill)
  Sports:
  - 2020 NASCAR Cup Series
  - George Floyd protests § Sports industry
  - NASCAR and the Federal Bureau of Investigation conclude their investigation of
    the noose found in the garage area of Bubba Wallace, the lone African-American
    driver in the series, at Talladega Superspeedway. The investigation concluded
    the "noose" was in fact the garage door pull, and had not been touched or moved
    since early last fall. (ABC News)
