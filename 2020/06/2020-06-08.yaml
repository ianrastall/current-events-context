Date: '2020-06-08'
Source_URI: Portal:Current events/2020 June 8
Intelligence_Payload:
  Uncategorized:
  - Second Libyan Civil War
  - 2019–20 Western Libya campaign, Turkish military intervention in the Second Libyan
    Civil War
  - Turkish-backed GNA forces enter the Libyan National Army-held city of Sirte and
    capture two districts. (Anadolu Agency)
  - The United Nations Support Mission in Libya (UNSMIL) says it has received "numerous"
    reports of looting and destruction of public and private property in the town
    of Tarhuna, which was recently captured by GNA forces. Videos uploaded to social
    media appear to show GNA fighters torching the homes of families accused of supporting
    Khalifa Haftar. (Reuters)
  - Mali War
  - The government orders an inquiry into the killing of 43 civilians in two villages
    in Mopti. Human rights groups accused the Malian Armed Forces of being responsible
    for the killings, in a volatile part of the country that has seen a resurgence
    of insurgent attacks. (Al Jazeera)
  - Multinational energy company BP announces in a conference call that it is cutting
    15% of its workforce, which is roughly 10,000 jobs. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in New Zealand
  - New Zealand has no active cases, as the last remaining patient is reported to
    have recovered. (Stuff)
  - New Zealand moves to its lowest alert level effective midnight local time (12
    UTC), removing most restrictions but maintaining strict border controls. (Stuff)
  - COVID-19 pandemic in South Africa
  - Most schools in South Africa re-open after Education Minister Angie Motshekga
    says that efforts to contain the virus allowed 95% of schools to return to classes.
    South Africa has recorded nearly 50,000 cases and almost 1,000 deaths. (Reuters)
