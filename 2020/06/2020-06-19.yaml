Date: '2020-06-19'
Source_URI: Portal:Current events/2020 June 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Operations Claw-Eagle and Claw-Tiger
  - Five Kurdish civilians near Dohuk in the Kurdistan Region of Iraq are killed by
    Turkish airstrikes. (AFP)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Brazil
  - Brazil's Ministry of Health reports 54,771 new cases and that there are now 1,032,913
    confirmed cases of COVID-19 in the country, becoming the second country in the
    world, after the United States, to surpass one million cases. (BBC News) (Bloomberg)
  International relations:
  - Nuclear program of Iran
  - The International Atomic Energy Agency (IAEA) passes a resolution, the first since
    2012, calling on Iran to open two of its nuclear sites to international inspectors.
    Iran strongly opposes the IAEA resolution, which it says was "based on false allegations"
    from Israel. (Middle East Eye)
  - The Caribbean Community (CARICOM) says "sorry is not enough" from British financial
    institutions that benefited from the Atlantic slave trade, and demands reparations
    from the United Kingdom. This comes after the Bank of England apologized for the
    "inexcusable connections" of some of its past governors and directors to slavery.
    (Reuters)
  Law and crime:
  - COVID-19 pandemic in Zimbabwe
  - Health Minister Obadiah Moyo is arrested and accused of corruption in government
    procurement of around $60 million worth of medical equipment. (Reuters)
  - Shooting of Breonna Taylor
  - Louisville Mayor Greg Fischer announces the immediate termination of LMPD Officer
    Brett Hankison over violating departmental policy on the use of force against
    Breonna Taylor. Hankison is one of three officers involved in the shooting, and
    prior to the incident had previously been investigated and disciplined for alleged
    misconduct. (The Courier-Journal)
  - Abortion in Tennessee, Heartbeat bill
  - Lawmakers in the U.S. state of Tennessee pass the country's toughest anti-abortion
    laws, banning the procedure from the moment of fetal heartbeat at around six weeks
    of pregnancy. Governor Bill Lee hails the law while several organizations say
    they plan to go to the courts over the issue. (Reuters)
  - Shooting of Matthew Hunt
  - A police officer is killed and another seriously injured in a shooting in Massey,
    New Zealand. This is the first time a law enforcement officer in New Zealand has
    been killed in the line of duty since 2009. The shooter fled, injuring a civilian
    in the process, but he has since been arrested. (BBC News)
  Politics and elections:
  - 2020 Belarusian presidential election
  - President Alexander Lukashenko announces the arrest of main opposition rival Viktar
    Babaryka for possible financial crimes. (Moscow Times)
  - 2020 Hong Kong legislative election
  - Activist Joshua Wong announces he is running for the legislature, setting up a
    new legal battle with authorities after he was barred from running in the previous
    election. (Reuters)
  - Tens of thousands of protesters descend on the Malian capital of Bamako, demanding
    President Ibrahim Boubacar Keïta resign over his failure to solve the country's
    myriad of problems. (Reuters)
  Science and technology:
  - The world’s second-largest egg is discovered on Seymour Island, Antarctica. The
    egg, which is also the very first fossil egg from Antarctica and the largest soft-shelled
    egg ever discovered, may challenge the notion that mosasaurs and plesiosaurs were
    fully viviparous according to scientists. (CBC)
  Sports:
  - 'Numerous professional wrestlers and others in the professional wrestling industry,
    particularly in the United Kingdom, are accused of sexual abuse, sexual misconduct
    and other forms of physical and mental abuse on social media, using the hashtag
    #SpeakingOut. (Sports Illustrated)'
  - WWE releases a statement, indicating a "zero tolerance" policy on several types
    of abuse, and later in the day come to terms on the release of Gentleman Jack
    Gallagher after he is accused of sexual assault (Wrestling Observer/Figure Four
    Online)
  - All Elite Wrestling release a statement saying that Jimmy Havoc has entered a
    rehabilitation facility and will evaluate his status in the company after his
    treatment is completed, after he is accused of domestic abuse and rape, and of
    punching a fan. (Wrestling Observer/Figure Four Online)
  - The National Wrestling Alliance announces that Vice President Dave Lagana has
    resigned from the company after he is accused of sexual assault. (Pro Wrestling
    Sheet)
