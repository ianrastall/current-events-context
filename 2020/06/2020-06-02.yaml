Date: '2020-06-02'
Source_URI: Portal:Current events/2020 June 2
Intelligence_Payload:
  Business and economy:
  - A US$5 billion class action lawsuit is filed against Alphabet Inc. and Google,
    alleging the company violates users' right to privacy by tracking them in Chrome's
    incognito mode. (BBC News)
  Health and environment:
  - COVID-19 pandemic in India
  - India approves the use of remdesivir to treat emergency COVID-19 cases that require
    immediate attention. (The Jakarta Post)
  International relations:
  - Philippines–United States relations
  - President Rodrigo Duterte suspends for six months the termination of the Philippines–United
    States Visiting Forces Agreement. Foreign Affairs Secretary Teodoro Locsin Jr.
    says the decision comes due to "political and other developments in the region".
    (Al Jazeera)
  - United States–Venezuela relations
  - U.S. Secretary of State Mike Pompeo announces sanctions on four shipping firms
    for transporting oil from Venezuela. Three firms are based in the Marshall Islands
    and another in Greece. Venezuelan Foreign Minister Jorge Arreaza responds by saying
    Pompeo has a "criminal obsession" with Venezuela. (Reuters)
  Law and crime:
  - George Floyd protests in Washington, D.C.
  - James N. Miller, former U.S. Under Secretary of Defense for Policy, announces
    his resignation from the Defense Science Board, citing disagreement with the Trump
    administration's actions against protestors in Washington, D.C. (The Washington
    Post)
  - In France, despite being banned by the police headquarters, a demonstration organized
    by the Justice pour Adama movement in Paris gathered 20,000 participants. They
    were protesting for charges against police officers who had killed a young black
    man, Adama Traoré, during his arrest in 2016. They also demonstrated in support
    of the Black Lives Matter movement in the United States, and in protest against
    police violence against black and Arab individuals in France in general. Some
    clashes occur at the end of the event. Other smaller demonstrations took place
    in the towns of Lyon, Marseille and Lille. (France 24)
