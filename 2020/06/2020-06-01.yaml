Date: '2020-06-01'
Source_URI: Portal:Current events/2020 June 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - ISIL-linked militants attack a police station in South Kalimantan, Indonesia,
    killing an officer. One of the militants is shot dead as he tries to attack other
    policemen. (Jakarta Globe)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Armenia
  - Prime Minister Nikol Pashinyan, his wife and their four children test positive
    for COVID-19. (Reuters)
  - COVID-19 pandemic in Hong Kong
  - The annual Tiananmen Square massacre vigil in Hong Kong is banned for the first
    time since 1990 citing health concerns due to COVID-19. The Hong Kong Alliance
    in Support of Patriotic Democratic Movements of China, who organize the vigil,
    say the ban signals the end of Hong Kong's "one country, two systems". (BBC News)
  - Kivu Ebola epidemic
  - The World Health Organization reports six new cases of ebola, and UNICEF reports
    five deaths, in a renewed outbreak of the disease in Mbandaka, Équateur Province,
    Democratic Republic of the Congo. (CNN)
  International relations:
  - United States–Zimbabwe relations, George Floyd protests
  - Zimbabwe summons the U.S. envoy for comments by U.S. National Security Advisor
    Robert C. O'Brien suggesting that Zimbabwe is among "foreign adversaries" that
    could face retaliation for trying to foment unrest in the U.S. over the killing
    of George Floyd. (AP News)
  Law and crime:
  - Killing of George Floyd
  - George Floyd protests
  - Shooting of James Scurlock
  - Prosecutors conclude a bar owner who fatally shot a protester during protests
    in Omaha, Nebraska, acted in self-defense and therefore will not press charges
    against him. (Omaha World-Herald)
  - Shooting of David McAtee
  - Police and National Guard troops open fire on a group of protesters after allegedly
    being fired upon in Louisville, Kentucky, resulting in the death of David McAtee,
    a local barbecue shop owner. An investigation is ongoing, while the LMPD Chief
    has been fired, as the officers involved in the shooting did not have their body
    cameras turned on. (Associated Press)
  - George Floyd protests in Washington, D.C.
  - An active duty military police battalion of 200 to 250 troops are deployed in
    the U.S. capital Washington, D.C., to provide security as protests continue. Defense
    officials say the troops are from Fort Bragg in North Carolina. (CNN)
  - Forty cities across the United States impose overnight curfews in order to quell
    the violence from the protests. (CNN)
  - Two protesters are shot and killed during riots in Davenport, Iowa. In a separate
    incident, a police vehicle is ambushed, resulting in the wounding of an officer.
    (The Des Moines Register)
  - Two bystanders are shot and killed by "outside agitators" during protests in Cicero,
    Illinois. (CBS Chicago)
  - Police shoot and kill an armed man wearing body armor at a protest in Las Vegas.
    In another incident, a policeman is shot and critically injured. (Reno Gazette
    Journal)
  - Anonymous sources suggest President Donald Trump is considering invoking the 1807
    Insurrection Act to deploy the military to respond to protests throughout the
    country. (NBC News)
  - Four police officers are shot in St. Louis amid rioting in the downtown area of
    the city. (New York Post)
  - An independent autopsy concludes George Floyd died of "asphyxiation from sustained
    pressure" and that there was "neck and back compression that led to a lack of
    blood flow to the brain" and that Floyd died at the scene of his arrest and not
    at the hospital, contradicting the Hennepin County, Minnesota coroner's report.
    (USA Today)
  - Two police vehicles drive into a crowd of protesters in New York. Similar vehicle
    incidents also occur in Denver and Minneapolis. (USA Today)
