Date: '2020-06-10'
Source_URI: Portal:Current events/2020 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - A gunman opens fire at a police station in Paso Robles, California, injuring a
    deputy with the San Luis Obispo Sheriff's Office. He then flees and kills a transient,
    leading to a manhunt. (The San Francisco Chronicle)
  Disasters and accidents:
  - 2020 Assam gas and oil leak
  - Two firefighters are killed and four others are injured in a Baghjan gas well
    blowout fire in Assam, Northeast India. (Indian Express)
  International relations:
  - North Korea–South Korea relations
  - A day after North Korea severed its hotlines with South Korea over defectors who
    sent anti-Pyongyang leaflets to the border, South Korea announces it is taking
    legal action against two organisations that conducted such operations, saying
    that they "have created tension between the two Koreas and caused danger to the
    border-area residents' lives and safety". (Reuters)
  - Territorial disputes of India and Nepal
  - The Nepali parliament moves to approve a new map and revision of the national
    emblem which includes territory in India's Uttarakhand state. (Times of India)
  Law and crime:
  - Assassination of Olof Palme
  - Sweden closes the case of the murder of Prime Minister Olof Palme in 1986 after
    34 years of investigation, indicating Stig Engström as the suspected murderer.
    (CNN)
  - Killing of George Floyd, Police reform in the United States
  - Several people, including George Floyd's brother, testify about police brutality
    and systemic racism before the U.S. House Judiciary Committee in support of the
    Justice in Policing Act of 2020. (NPR)
  Politics and elections:
  - 2020 Polish presidential election, LGBT rights in Poland
  - Ahead of the upcoming presidential election, President Andrzej Duda vows to ban
    teaching about LGBT issues in Polish schools in a bid to secure re-election. Duda
    is a staunch ally of the ruling right-wing populist Law and Justice party. (Reuters)
  - 2020 Sri Lankan parliamentary election
  - Sri Lanka postpones, for a second time, the election from June 20 to August 5
    due to the COVID-19 pandemic. (Reuters)
  Sports:
  - Modern display of the Confederate battle flag
  - NASCAR announces that the display of the Confederate flag will be prohibited from
    all of its events and properties. (ESPN)
