Date: '2020-06-20'
Source_URI: Portal:Current events/2020 June 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Forbury Gardens stabbings
  - Three people are killed and three others injured in a mass stabbing at Forbury
    Gardens in Reading, Berkshire, United Kingdom. A suspect was arrested by Thames
    Valley Police. (The Daily Telegraph)
  Arts and culture:
  - A statue of former Soviet Union leader Vladimir Lenin is officially unveiled in
    the German city of Gelsenkirchen, North Rhine-Westphalia. It is first ever statue
    of a Soviet figure in the former West Germany. Despite strong opposition from
    local officials, the state court in Münster has blocked attempts to remove it.
    (Euronews)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Arizona
  - The City of Phoenix and Maricopa County officials pass a mandate requiring all
    residents to wear masks in "places of public accommodation". The mandate makes
    exemptions for children under two years old and people with certain health conditions.
    (AZCentral)
  - COVID-19 pandemic in Australia
  - Following a new spike in coronavirus infections, Victoria delays its easing of
    restrictions and imposes new limits on the size of gatherings. (News.com.au)
  - COVID-19 pandemic in India
  - India reports its highest toll of cases to date, recording 14,516 cases, reaching
    a total of 395,047 and 12,948 deaths. The government in the capital New Delhi
    orders hospitals to cancel any leave and have workers return to duty immediately.
    (Reuters)
  International relations:
  - North Korea–South Korea relations
  - The North Korean state news agency KCNA reports that "enraged" North Koreans are
    preparing to launch propaganda leaflets across the Military Demarcation Line,
    in response to propaganda leaflets sent by North Korean defectors. (Reuters)
  Law and crime:
  - U.S. President Donald Trump fires the United States Attorney for the Southern
    District of New York Geoffrey Berman, whose office had been investigating the
    president's personal lawyer, Rudy Giuliani. (Reuters)
  - A court in the Democratic Republic of the Congo sentences former president's chief
    of staff Vital Kamerhe to 20 years in prison for "diverting public funds worth
    48.8M dollars". (Al Jazeera)
  Politics and elections:
  - 2020 Belarusian presidential election
  - Internet access is interrupted and hundreds are detained after mass protests break
    out in Belarus over the arrest of opposition candidate Viktar Babaryka, including
    reporters from Radio Free Europe/Radio Liberty. (Radio Free Europe/Radio Liberty)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - COVID-19 pandemic in Australia, 2020 AFL season
  - The 2020 AFL season is threatened with another postponement after an Essendon
    player tests positive for coronavirus, leading to all players in the club being
    quarantined. The Essendon v Melbourne match set for 21 June is subsequently cancelled.
    (News.com.au)
