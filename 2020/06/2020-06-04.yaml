Date: '2020-06-04'
Source_URI: Portal:Current events/2020 June 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - 2019–20 Western Libya campaign
  - The Government of National Accord (GNA) says they are in full control of the Libyan
    capital, Tripoli, after forces of the Libyan National Army (LNA), loyal to Field
    Marshal Khalifa Haftar, retreat from the capital after months of intense clashes
    in the city. (Reuters)
  - The GNA recaptures Tripoli International Airport on the outskirts of the capital
    following the withdrawal of LNA forces. (BBC News)
  Arts and culture:
  - Removal of Confederate monuments and memorials
  - Virginia Governor Ralph Northam orders the removal of the Robert E. Lee Monument
    in the state capital Richmond, saying, "In Virginia, we no longer preach a false
    version of history". (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Senegal
  - After violent protests erupt across the country against a lockdown imposed to
    combat the virus, the government announces it will "relax" the restrictions. Interior
    Minister Aly Ngouille Ndiaye says the curfew will be shortened and inter-regional
    travel ban lifted. (Reuters)
  - COVID-19 pandemic in Brazil
  - Brazil surpasses Italy with the third-highest COVID-19 death toll. (The Guardian)
  International relations:
  - North Korea–South Korea relations
  - North Korea issues a warning that it would end a 2018 inter-Korean military agreement
    if South Korea fails to stop defectors and activists from sending anti-Pyongyang
    leaflets into the demilitarized zone (DMZ). (DW)
  - Iran–United States relations
  - U.S. Navy veteran Michael R. White is released from Iranian custody. White was
    under house arrest for nearly two years and is now en-route to Zurich, Switzerland.
    (Al Jazeera)
  Law and crime:
  - George Floyd protests
  - George Floyd protests in California
  - Los Angeles officials announce an end to the county-wide curfew amid continuing
    protests. (Los Angeles Times)
  - Buffalo police shoving incident
  - Two Buffalo police officers are suspended without pay after shoving a 75-year-old
    protestor to the ground. He has been hospitalized from the resulting head injury.
    (The New York Times)
  - Shooting of Ahmaud Arbery
  - One of the suspects involved in the shooting death of Ahmaud Arbery testifies
    that the gunman who shot and killed Arbery had shouted a racial slur at the victim
    moments after his death. The allegation opens up the possibility for hate crime
    charges. (The Washington Post)
  - Freedom of religion in Russia
  - A court in Russian-controlled Crimea jails a Jehovah's Witness for six years for
    practicing an outlawed religion in the territory. (Reuters)
  - Riots break out and the governor’s palace is attacked in Guadalajara, Mexico,
    after police officers in Ixtlahuacán de los Membrillos beat a young worker to
    death for not wearing a medical mask. (Puerto Vallarta Daily News)
  Politics and elections:
  - 31st anniversary of the 1989 Tiananmen Square protests, 2019–20 Hong Kong protests
  - The mass annual vigil commemorating the 1989 Tiananmen Square protests at Victoria
    Park, Hong Kong, is banned by the city police for the first time, citing concerns
    of local COVID-19 transmissions. Local commemorations are held across the city.
    (Hong Kong Free Press)
  - Tens of thousands of people, in multiple locations across Hong Kong, defy the
    ban against gatherings to observe the anniversary, carrying lit candles and chanting
    democracy slogans. The largest group, in Victoria Park, heard Lee Cheuk-yan, former
    Chairman of the Hong Kong Alliance in Support of Patriotic Democratic Movements
    in China, read the Alliance's manifesto and vow to return next year. (South China
    Morning Post) (International Business Times)
