Date: '2020-06-14'
Source_URI: Portal:Current events/2020 June 14
Intelligence_Payload:
  Uncategorized:
  - Afghan peace process; Taliban insurgency; June 2020 Afghanistan attacks
  - The Interior Ministry accuses the Taliban of killing or wounding more than 400
    Afghan security forces personnel in the last week and said the insurgent group
    had increased attacks ahead of expected peace talks. He also accused them of attacking
    religious scholars to put "psychological pressure" on the government. (AFP via
    Al Arabiya)
  - Kurdish–Turkish conflict (2015–present)
  - The Turkish Defense Ministry says that military jets successfully targeted PKK
    militants in Sinjar and Qandil, Iraq, among other places, as part of Operation
    Claw. The ministry claimed it was in response to increased militant attacks on
    Turkish bases. (Reuters)
  - A drone strike in northwestern Syria kills two high-ranking members of the Guardians
    of Religion Organization, linked to al-Qaeda, according to opposition war monitors.
    (AP via Al Arabiya)
  - At least 19 people are killed and more than 172 injured Saturday after a liquefied
    gas tanker exploded on a Chinese highway near the city of Wenling. Close to 100
    fire trucks responded. Some people are still missing. (UPI)
  - COVID-19 pandemic
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Egypt
  - Egypt reports the highest daily rise in both active cases and deaths since the
    start of the pandemic. (Reuters)
  - COVID-19 pandemic in Ghana
  - Ghanaian Minister of the Health Kwaku Agyemang-Manu is hospitalized with COVID-19.
    (VOA)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Florida
  - Florida reports two consecutive days of 2,000-plus new COVID-19 cases as more
    counties reopen their beaches. Miami's mayor says this information does not include
    data from Memorial Day weekend and the George Floyd protests. (ABC News)
  - Morocco's state-run news agency Maghreb Arabe Press reports that King Mohammed
    VI has undergone successful heart surgery in Rabat; the king underwent a similar
    surgery two years ago in Paris. (Reuters)
