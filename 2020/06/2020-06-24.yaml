Date: '2020-06-24'
Source_URI: Portal:Current events/2020 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, Central Libya offensive (2020)
  - The speaker of the Libyan House of Representatives, Aguila Saleh Issa, asks Egypt
    to intervene in Libya if the armed forces of the Government of National Accord
    attempt to capture the city of Sirte. (Al Jazeera)
  Business and economy:
  - Segway Inc. announces that production of its personal transporter will end on
    July 15. Production began in 2001. (BBC News)
  - Bayer AG announces it has agreed to pay US$10 billion to resolve thousands of
    lawsuits regarding claims that the Monsanto herbicide Roundup causes cancer. Court-appointed
    mediator Kenneth Feinberg says the deal is a "constructive and reasonable" resolution.
    (NBC News)
  - Japanese manufacturing company Olympus announces it is exiting the camera business
    after 84 years, stating its financial losses caused by their inability to compete
    with smartphone cameras was a major factor in the decision. (BBC News)
  International relations:
  - North Korea–South Korea relations
  - The North Korean state news agency KCNA reports that the country will suspend
    military action plans against the South after a meeting of the Central Military
    Commission presided by Kim Jong-un. North Korea had protested against defectors
    sending leaflets to the border, and Kim's sister Kim Yo-jong had threatened a
    military response. (Al Jazeera)
  - COVID-19 pandemic in Europe
  - Ambassadors for EU member states meet today to develop criteria for reopening
    external borders to travelers on July 1. European Commission guidance is that
    non-EU countries whose COVID-19 status, e.g., the number of new infections, the
    trend in new infections, and testing and tracing, are comparable or better than
    the EU average will make the safe list. Other factors, such as reciprocity and
    links to the EU, will also be considered. Travelers from countries such as Brazil,
    Russia, and the United States may be barred based on these rules. (BBC News) (The
    New York Times)
  - Iran–United States relations; United States–Venezuela relations
  - U.S. Secretary of State Mike Pompeo announces sanctions on five Iranian ship captains
    who delivered fuel to Venezuela and reaffirms support for disputed President Juan
    Guaidó over Nicolás Maduro. (Reuters)
  Law and crime:
  - War crimes in the Kosovo War
  - The Specialist Prosecutor's Office announces that it has submitted for court approval
    an indictment against President Hashim Thaçi and nine other former Kosovo Liberation
    Army fighters alleging that they committed war crimes and crimes against humanity
    during the Kosovo War. Following the announcement, President Thaçi cancels his
    upcoming trip to the United States. (Sydney Morning Herald)
  - George Floyd protests
  - The U.S. Senate fails to invoke cloture on a 55–45 vote effectively tabling a
    police misconduct bill introduced by the Republicans, after the Democrats argued
    that it did not do enough to incentivize change. (Reuters)
  - Leaders of the Capitol Hill Autonomous Zone announce the zone's disestablishment.
    (CNN)
  Politics and elections:
  - 2020 Mongolian legislative election
  - Mongolian voters head to the polls to elect the members of the State Great Khural.
    A record number of more than 600 candidates are competing for the 76 seats in
    the parliament. (Bloomberg)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - Former Boston Red Sox player Eddie Kasko dies at age 88. (Boston)
  - 2020 Major League Baseball season
  - Major League Baseball Commissioner Rob Manfred unilaterally implements a 60-game
    season. Players will report to training camps on July 1 in order to resume spring
    training and prepare for a July 23 or 24 Opening Day. (ESPN)
  - English football club Leeds United F.C. issue an apology after a cardboard cutout
    of former al-Qaeda leader Osama bin Laden was displayed in the stands at their
    Elland Road stadium. (The New Zealand Herald) (BBC Sport)
