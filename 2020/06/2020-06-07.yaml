Date: '2020-06-07'
Source_URI: Portal:Current events/2020 June 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Jammu and Kashmir
  - Protests erupt in Kashmir after Indian Army troops kill nine militants and destroy
    a house with explosives. Protesters demand an end to the Indian occupation of,
    and direct federal rule over, the territory. (Al Jazeera)
  - A Ku Klux Klan leader drives a car into a group of protesters during the George
    Floyd protests in Virginia, injuring a person. The attacker may face hate crime
    charges. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - The number of worldwide cases of COVID-19 surpasses seven million. The United
    States remains the global epicenter, accounting for approximately 26% of all reported
    and confirmed cases in the world. (CNN)
  - COVID-19 pandemic in Brazil
  - The Brazilian government alters the country's COVID-19 death toll on the Health
    Ministry's website following a change in protocol for the release of pandemic-related
    data to the general public. President Jair Bolsonaro orders interim minister Gen.
    Eduardo Pazuello to limit the number of divulged deaths to under 1,000 per day.
    (The Guardian) (O Estado de S. Paulo)
  - COVID-19 pandemic in Saudi Arabia
  - The total tally of cases in Saudi Arabia exceeds 100,000. (Reuters)
  Law and crime:
  - List of monuments and memorials removed during the George Floyd protests
  - George Floyd protests in the United Kingdom
  - The statue of Edward Colston, a 17th-century slave trader, is pulled down by anti-racism
    demonstrators and thrown into Bristol Harbour, England. (The Guardian)
  - George Floyd protests in Richmond, Virginia
  - Black Lives Matter supporters tear down the 128-year-old statue of Confederate
    General Williams Carter Wickham in Monroe Park in Richmond, Virginia. (The Hill)
  - Shooting of Iyad Halaq
  - Israeli Prime Minister Benjamin Netanyahu expresses his condolences for the death
    of a Palestinian man with autism and says he "expects a full investigation into
    the matter" from Interior Security Minister Amir Ohana. (Reuters)
  - 2020 boogaloo killings
  - The Federal Bureau of Investigation is investigating a possible link between the
    May 30 drive-by shooting that killed a Federal Protective Service officer at Oakland,
    California, to a shootout in the Santa Cruz Mountains yesterday, which left a
    deputy dead and two other officers injured. The gunman, who was armed with a rifle
    and improvised explosive devices, was also wounded and taken into custody. (ABC
    News)
  - The Philippine Department of Justice probes the proliferation of sockpuppet Facebook
    accounts that have been using the identities of students and journalists involved
    in protests against the passage of an anti-terrorism bill. (Bloomberg)
  Politics and elections:
  - Killing of George Floyd
  - The Minneapolis City Council passes a resolution to begin the process of abolishing
    the Minneapolis Police Department. Mayor Jacob Frey has publicly opposed the measure.
    (Star Tribune)
