Date: '2020-06-27'
Source_URI: Portal:Current events/2020 June 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - June 2020 Afghanistan attacks; War in Afghanistan
  - Two Afghanistan Independent Human Rights Commission workers are killed when a
    bomb attached to their vehicle explodes in Kabul. The Taliban denies responsibility
    and no other group has claimed responsibility. The attack is condemned by the
    United Nations. (Reuters)
  - Insurgency in Cabo Delgado
  - An ISIL-affiliated group attacks a town near billion-dollar gas projects managed
    by Total S.A. and Exxon Mobil in Mocímboa da Praia, Mozambique. An army spokesman
    reports that the armed forces suffered casualties in the attack. (Reuters)
  Arts and culture:
  - Hinduism in Pakistan
  - The government of Prime Minister Imran Khan approves a grant of Rs100 million
    for the construction of the first Hindu temple in the capital of Islamabad. (DAWN)
  Health and environment:
  - COVID-19 pandemic in India
  - India surpasses 500,000 cases after reporting 18,552 new cases in the last 24
    hours, the highest toll to date. India also reports a total 15,685 deaths from
    the disease. (AP News)
  International relations:
  - Libyan Civil War, Wagner Group
  - Libya's international-recognized government, the Government of National Accord,
    calls for the United States and the European Union to impose sanctions on individuals
    and "mercenaries", after its National Oil Corporation stated that Russian mercenaries
    and other foreign actors had forced their way into the Sharara oilfield. (Al Jazeera)
  Law and crime:
  - Red Bluff shooting
  - An employee is killed and four others injured in a mass shooting at a Walmart
    distribution center in Red Bluff, California, United States. The shooter was then
    confronted by responding police officers and fatally shot during a shootout. (AP
    News)
  - George Floyd protests
  - One person is killed and another injured when a gunman opened fire at people protesting
    the shooting of Breonna Taylor in Louisville, Kentucky, United States. (AP News)
  Politics and elections:
  - Hong Kong 1 July marches
  - Police in Hong Kong ban the 1 July march for the first time in 17 years. In a
    letter of objection addressed to protest organizer and convenor of the Civil Human
    Rights Front (CHRF) Jimmy Sham, police cite "persisting social unrest" and vandalism.
    Chief Secretary Matthew Cheung rejects an appeal by the CHRF who have said they
    will appeal the ban. (Hong Kong Free Press)
  - 2020 Icelandic presidential election
  - Citizens of Iceland cast their vote in the latest presidential elections. Incumbent
    president Guðni Th. Jóhannesson is expected to be the clear winner of the election.
    (DW)
  - Irish government formation
  - Following long negotiations, the new Irish government is voted into office by
    Dáil Éireann. The government is formed after a historic coalition deal between
    Fianna Fáil, Fine Gael and the Green Party. Fianna Fáil leader Micheál Martin
    takes office as Taoiseach (Prime Minister), with outgoing Taoiseach Leo Varadkar
    as Tánaiste (Deputy Prime Minister), due to return to the post in December 2022
    as part of the coalition deal. (RTÉ)
  - 2020 Malawian presidential election
  - Lazarus Chakwera has been elected President with 58.57% of the votes. (Nyasa Times)
