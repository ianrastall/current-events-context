Date: '2020-06-11'
Source_URI: Portal:Current events/2020 June 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Maghreb insurgency
  - At least 10 Ivorian soldiers are killed and six others wounded at the border with
    Burkina Faso when an armed group ambushed them; one of the attackers was also
    killed. It is the first attack in the country since the 2016 Grand-Bassam shootings.
    (Al Jazeera)
  Disasters and accidents:
  - The death toll from the sinking of a ship carrying 53 migrants off the coast of
    Tunisia on Tuesday rises to at least 46 as more bodies are recovered from the
    sea. (Reuters)
  - The Ministry of Emergency Management of China says that flooding in south and
    central China has killed more than a dozen people and forced hundreds of thousands
    to seek emergency shelter since 2 June. (Al Jazeera)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - The United States surpasses two million cases of COVID-19, the first country in
    the world to do so. (CNN)
  International relations:
  - Iraq–United States relations, Withdrawal of U.S. troops from Iraq (2020)
  - The United States and Iraq begin negotiations, conducted remotely, to discuss
    the withdrawal of U.S. troops and countering Iranian influence. (The New York
    Times)
  - United States war crimes
  - U.S. President Donald Trump authorizes sanctions against the International Criminal
    Court in retaliation for their investigation into potential war crimes by U.S.
    officials. (CNN)
  Law and crime:
  - Bærum mosque shooting
  - A court in Norway sentences Philip Manshaus to 21 years in prison for the racially-motivated
    murder of his stepsister and for attempting to kill Muslim worshippers. It is
    the longest prison sentence allowed by law. The prison term contains a provision
    that his release can be put off indefinitely should he still be considered a threat
    to society. (Al Jazeera)
  - Turkey–United States relations, 2016–present purges in Turkey
  - A court in Turkey sentences a U.S. Consulate employee, Metin Topuz, to 8 years
    and 9 months in prison on charges of aiding the followers of Fethullah Gülen,
    the U.S.-based preacher who is accused in Turkey of being the mastermind behind
    a failed coup attempt in 2016 against Erdoğan. The U.S. Embassy in Ankara releases
    a statement on Twitter saying officials were "deeply disappointed" in the decision.
    (The New York Times)
  - An attacker, believed to be a former student, kills the deputy head and injures
    five others with a knife at a school in Vrútky, Slovakia, before being killed
    by responding police officers. (BBC News)
  - The Senate of the Republic of Colombia approves a resolution banning the testing
    of cosmetics on animals, as well as the commercialization of cosmetics which are
    actively tested on animals. (La FM)
  Politics and elections:
  - Dalton Tagelagi is elected new Premier of Niue by the Assembly. (RNZ)
  Sports:
  - 2020 AFL season, George Floyd protests in Australia
  - After a ten-week suspension due to the COVID-19 pandemic, the 2020 AFL season
    resumes with Collingwood facing Richmond at the MCG. Before the match began, both
    teams knelt to show solidarity with the George Floyd protests. The match finished
    in a draw. (News.com.au)
