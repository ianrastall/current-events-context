Date: '2020-06-22'
Source_URI: Portal:Current events/2020 June 22
Intelligence_Payload:
  Business and economy:
  - Coronavirus recession, Immigration to the United States
  - U.S. President Donald Trump suspends the entry of some skilled and seasonal workers
    entering the United States, claiming it will open jobs to citizens. Business groups
    criticize this move as stifling economic recovery. (Reuters)
  International relations:
  - India–Nepal relations
  - Nepalese authorities stop officials of the Water Resources Department of the Bihar
    government from carrying out infrastructural maintenance work in Indian territory
    along the India–Nepal border, claiming the area as part of its territory. The
    incident comes four days after the lower house of the Nepalese parliament approved
    a new map of the country that included Indian territory in the Indian state of
    Uttarakhand. (Times of India)
  - China–United States relations
  - The U.S. State Department adds four Chinese media organizations, including the
    public broadcasting service China Central Television, to its list of organizations
    participating in "foreign missions" due to their connections with the ruling Communist
    Party. They will be required to report all their employees and any real estate
    holdings to the American government. (Al Jazeera)
  - China announces its decision to join the United Nations Arms Trade Treaty. (AFP
    via The Jakarta Post)
  - Thousands of Palestinians and dozens of foreign diplomats attend a rally in Jericho
    to oppose Israel's plan to unilaterally annex the Jordan Valley and the settlements
    in the occupied West Bank. (Al Jazeera)
  Law and crime:
  - A police officer of the New York City Police Department is suspended without pay
    after he is captured on camera using a chokehold against a 35-year-old man in
    Queens. The use of chokeholds by police was recently banned, both in New York
    City and the state of New York. (The Independent)
  - Two suspects are arrested in Oregon in connection to a mass shooting at a residence
    in Valhermoso Springs, Alabama, on June 4 that killed seven people. (WBRC)
  Politics and elections:
  - 2020 Kiribati presidential election
  - Citizens in Kiribati head to the polls to elect their President. The main issue
    of the election is whether to maintain relations with China or Taiwan. Incumbent
    Taneti Maamau, who switched recognition from Taiwan to China last year, is facing
    candidate Banuera Berina who favors re-establishing relations with Taiwan. (RNZ)
  Science and technology:
  - Apple's transition to ARM processors
  - Apple Inc. announces a transition of its personal computer products from using
    Intel processors to using ARM-based processors designed by Apple. Since 2006,
    the company has used Intel processors in its computer offerings. (The Verge)
  Sports:
  - 2020 NASCAR Cup Series
  - George Floyd protests § Sports industry
  - NASCAR launches an investigation after a noose was found in the garage area of
    Bubba Wallace, the lone African-American driver in the series, at Talladega Superspeedway,
    in Talladega, Alabama, vowing to "eliminate [those responsible] from the sport".
    Wallace had recently successfully pushed NASCAR to enforce a five-year-old ban
    on the Confederate flag being displayed at its race tracks and properties. A plane
    pulling a banner with a Confederate flag and the phrase "Defund NASCAR" flew over
    the race track on June 21. (CTV News) (BBC News)
  - The United States Department of Justice and Federal Bureau of Investigation launch
    their own investigations in order to determine whether criminal charges can be
    brought. (USA Today)
