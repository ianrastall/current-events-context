Date: '2020-08-16'
Source_URI: Portal:Current events/2020 August 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - At least 12 people are killed when five al-Shabaab gunmen storm a beachfront hotel
    in Mogadishu after detonating a car bomb in front of the building. The attackers
    were later killed by security forces. (BBC News)
  Disasters and accidents:
  - MV Wakashio oil spill
  - Mauritius says it will seek "compensation from the owner and the insurer" of MV
    Wakashio, which broke apart the previous day after leaking hundreds of tonnes
    of fuel oil. The Japanese company in charge of the ship pledged to compensate
    for the damage. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - The number of deaths from COVID-19 in India surpasses 50,000. (Hindustan Times)
  - COVID-19 pandemic in South Korea
  - The number of daily new COVID-19 cases in South Korea tops 200 for the first time
    in five months, with 279 new cases reported in the last 24 hours. The cases are
    traced to several conservative churches in the Seoul Capital Area. (Reuters)
  - COVID-19 pandemic in the Philippines
  - The Department of Health announces a new single-day record-high increase of 40,397
    recoveries in the Philippines, bringing the total number of patients discharged
    to 112,586. (Inquirer)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Florida
  - The Florida Department of Health reports 3,779 cases, the state's lowest since
    June 23. (The Miami Herald)
  - COVID-19 pandemic in Georgia
  - Georgia Governor Brian Kemp signs an executive order that permits local officials
    to issue mask mandates in their cities. (Newsweek)
  - COVID-19 pandemic in Italy
  - The government orders the closure of nightclubs and makes masks mandatory for
    12 hours between 6:00 p.m. local time and 6:00 a.m. local time. (Euronews)
  - The temperature reaches in Death Valley, California amidst a historic heat wave
    in the western United States. If verified, it is the hottest temperature recorded
    on Earth in the month of August, and the hottest in any month since 1931. (The
    Washington Post)
  International relations:
  - Belarus–Russia relations, 2020 Belarusian protests
  - Russia says it is "ready to assist Belarus in accordance with a collective military
    pact if necessary" as opposition leader in-exile Sviatlana Tsikhanouskaya calls
    for a massive march. (Reuters)
  - Israel–United Arab Emirates peace agreement
  - The United Arab Emirates unblocks telephone lines between the country and Israel,
    as well as allowing people in the country to access Israeli websites. Israeli
    Communications Minister Yoaz Hendel congratulates the Emirati government for the
    move. (AP)
  - Iran–United Arab Emirates relations
  - The Emirati government summons the Iranian chargé d'affaires in Abu Dhabi to protest
    a speech by Iranian President Hassan Rouhani which called the UAE's peace agreement
    with Israel "a treacherous act." The Emirati government labeled these remarks
    as "unacceptable, inflammatory and carrying serious repercussions for the security
    and stability of the Arabian Gulf region." (Al Arabiya)
  Politics and elections:
  - COVID-19 pandemic
  - Protests over responses to the COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - Impact of the COVID-19 pandemic on education
  - Hundreds of GCE Advanced Level students protest outside the Department for Education
    headquarters in London demanding for a reassessment of their final-year performance
    by the Ofqual, which has used an algorithm to assess students' performances in
    lieu of the exams that were cancelled due to the COVID-19 pandemic. Critics claim
    the Ofqual's algorithm to be "flawed" as the grades issued differ significantly
    from those predicted by teachers. Education Secretary Gavin Williamson had issued
    a statement clarifying that students may use their teacher's predicted grades
    or results from any trial exam, although the Ofqual issued a separate statement
    favouring teacher evaluations over trial exams. Students are requesting for an
    intervention from Prime Minister Boris Johnson. (AP via SCMP)
  - COVID-19 pandemic in Spain
  - Hundreds of protesters at the Plaza de Colón in Madrid demand the government rescinds
    the compulsory wearing of face masks in public, which had been imposed following
    the resurgence of COVID-19 cases in July. Protesters claim that such restrictions
    are an attempt by the government to curtail people's freedoms. (AFP via The Straits
    Times)
  - Impact of the COVID-19 pandemic on politics
  - COVID-19 pandemic in New Zealand, 2020 New Zealand general election
  - Prime Minister Jacinda Ardern postpones the upcoming general election from 19
    September to 17 October due to a recent resurgence of COVID-19 cases. (Stuff)
    (CNN)
  - 2020 Belarusian protests
  - Tens of thousands protest in the Belarusian capital Minsk calling for President
    Alexander Lukashenko to step down. It is believed to be the largest protest in
    Belarusian history. (The Guardian)
  - In a defiant speech, Alexander Lukashenko addresses supporters in Independence
    Square, Minsk, where he claims Belarus would "die as a state" if new elections
    were held, and accuses NATO of "massing on the border". Opposition critics say
    most of those at the rally were coerced into attending and had been bussed in
    from other parts of the country. (Sky News)
  - The Belarusian Ambassador to Slovakia, Igor Leshchenya, defects to the opposition
    after posting a video declaring his support for the protests. (The Independent)
  - 2020 Thai protests
  - More than 10,000 people march against the government, demanding their resignation
    and a curb to its monarchy's power. The protesters also demand a change in the
    constitution. Meanwhile, dozens held pro-monarchy counter-protests. (Al Jazeera)
  - Politics of the Dominican Republic
  - Luis Abinader is sworn in as President after winning the 2020 general elections.
    He succeeds Danilo Medina. (The New York Times)
