Date: '2020-08-15'
Source_URI: Portal:Current events/2020 August 15
Intelligence_Payload:
  Business and economy:
  - Argentine debt restructuring
  - The government approves a proposed deal with the U.S. Securities and Exchange
    Commission (SEC) to restructure around $65 billion in foreign government bonds,
    following President Alberto Fernández's successful negotiations with creditors
    and the International Monetary Fund the previous week after the country defaulted
    in May. The government plans to submit the proposal to the SEC on August 17. (Reuters)
  - COVID-19 pandemic in Europe
  - The MSC Grandiosa disembarks from Genoa, Italy, on a seven-day cruise in the Mediterranean
    Sea, the first major cruise ship to sail in the Sea in almost five months because
    of the COVID-19 pandemic. (BBC News)
  Disasters and accidents:
  - MV Wakashio oil spill
  - The Japanese bulk carrier Wakashio, which stranded on a reef in Mauritius last
    month, breaks in half. Approximately 1,000 tonnes of oil spilled into the ocean.
    Most of the oil had been pumped out before the ship broke in half in the afternoon.
    Around 166 tonnes of oil remained after the break, and authorities are working
    to remove it. Scientists call it the biggest environmental disaster ever in Mauritius.
    France says it will help with the cleanup. Japan's ministry of environment announced
    that it will send officials and other specialists to look at the damage. (Reuters)
  - Two lighter vessels capsize in the Bay of Bengal, near the island of Bhasan Char
    in Bangladesh. The country's Inland Water Transport Authority report that 13 crew
    members from one vessel en route to the Narayanganj District from Chittagong are
    missing, while all 12 crew members from the other vessel were rescued. (Anadolu
    Agency)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Denmark
  - Prime Minister Mette Frederiksen mandates the wearing of face masks on all public
    transport in the country, effective August 22, in an effort to control the spread
    of the virus. (AFP via Daily Sabah)
  - COVID-19 pandemic in France
  - The daily number of new COVID-19 cases in France tops 3,000 for the first time
    since lockdown eased. (France 24)
  - COVID-19 pandemic in Malta
  - Malta reports 72 new COVID-19 cases in the last 24 hours. It is the highest single
    increase in new cases in the country since the pandemic began. (Times of Malta)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland reports 200 new cases but no deaths in the last 24 hours. This is the
    highest number of daily cases since May. (The Irish Times)
  - COVID-19 pandemic in Russia, COVID-19 vaccine
  - Russia announces the production of the first batch of its Sputnik V vaccine. (Hindustan
    Times)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in South Korea
  - South Korea reports 166 new cases of COVID-19. From that number, 139 were traced
    to Seoul and Gyeonggi Province and a significant portion of them were linked to
    cluster infections involving churchgoers. It is the highest number of reported
    new cases since March 11. (Kyodo News)
  - After a spike in new cases, the government decides to tighten social distancing
    measures in Seoul and surrounding areas. Many measures that are to be implemented
    include restricting numbers of gatherings and sports events played behind closed
    doors. (Tempo)
  - COVID-19 pandemic in Indonesia
  - Minister of State Owned Enterprises and chief of the COVID-19 recovery team, Erick
    Thohir, announces that the government would bar foreign visitors until the completion
    of a vaccine. Indonesian scientists are testing a COVID-19 vaccine with Sinovac
    Biotech, which Thohir says is likely to be completed next year. (Kyodo News)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Algeria
  - Algeria begins to reopen their mosques, beaches, cafes, and parks five months
    after their lockdown. (ABC News)
  - COVID-19 pandemic in South Africa
  - President Cyril Ramaphosa announces a plan to ease nearly all restrictions on
    the economy from August 17, including lifting a controversial ban on the sale
    of alcohol and tobacco that had been imposed in July, as infections peak. (BBC
    News)
  International relations:
  - Travel restrictions related to the COVID-19 pandemic
  - COVID-19 pandemic in the Netherlands
  - The government of the Netherlands issues a travel warning advising the public
    not to travel to some places, including Paris, the region surrounding Marseilles,
    Brussels, Ibiza and Mallorca. The warnings come as a response to an increase in
    new cases in Spain, France and Belgium. (NL Times)
  - Aftermath of the 2020 Belarusian presidential election
  - The leaders of the Baltic states, Estonia, Latvia and Lithuania, issue a joint
    statement calling on Belarus to hold a new "free and fair" election with international
    observers. (RFE/RL)
  - Poland–United States relations
  - U.S. Secretary of State Mike Pompeo and Polish Defence Minister Mariusz Błaszczak
    sign an agreement in Warsaw to redeploy about 1,000 U.S. troops from Germany to
    Poland so as to bring the total to 5,500. The agreement also includes a potential
    increase to 20,000 U.S. troops if Poland is under threat. (BBC News)
  - Israel and the United Nations
  - Israeli Foreign Minister Gabi Ashkenazi condemns the UN Security Council's decision
    not to extend an arms embargo on Iran. Ashkenazi argues that Iran "will lead to
    further Middle East instability". (Reuters)
  - Afghanistan–France relations, Afghan peace process
  - Amidst the release of "hardcore" Taliban prisoners, the French government asks
    the Afghan government not to release those involved in the killing of French citizens.
    (Reuters)
  Law and crime:
  - George Floyd protests
  - George Floyd protests in Georgia
  - Antifa militants, far-right groups, and pro-Confederacy groups clash at Stone
    Mountain, near the city of Stone Mountain, Georgia. (The Daily Beast)
  - George Floyd protests in Michigan
  - Members of the right-wing group Proud Boys clash with counter-protesters in Kalamazoo,
    Michigan, with police carrying out nine arrests, including a local newspaper reporter.
    (AP)
  - 2020 Thai protests
  - Student activist Parit Chiwarak is released on bail after being arrested on Friday
    for co-organising a rally in July. He was charged with violating the COVID-19
    measures and breaching internal security. Protests have been taking place in Thailand
    since July against the government. Parit Chiwarak has said he will continue to
    protest against the government and for reforms in the Thai monarchy. (Reuters)
  - Thai King Vajiralongkorn commutes the death sentence of two Burmese nationals
    convicted of the rape and murder of two British backpackers in 2014 in Ko Tao.
    The royal decree was issued to commemorate the birthday of the King, on July 28,
    to "illustrate the king's clemency". The pair now serve life in prison. (BBC News)
  Politics and elections:
  - 2020 Belarusian protests
  - President Alexander Lukashenko issues an appeal to Russian President Vladimir
    Putin as he considers the protests "not a threat to just Belarus anymore". Statements
    by both sides contained a pointed reference to the Union State between the two
    countries. Meanwhile, opposition candidate leader Sviatlana Tsikhanouskaya, who
    is exiled in Lithuania, calls for more protests. (Reuters)
  Sports:
  - Impact of the COVID-19 pandemic on sports, 2019–20 Chinese Basketball Association
    season
  - In basketball, the Guangdong Southern Tigers win their 10th CBA championship,
    bringing an end to the 2019–20 CBA season, which was paused due to the ongoing
    COVID-19 pandemic. (South China Morning Post)
