Date: '2020-08-29'
Source_URI: Portal:Current events/2020 August 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro conflict
  - A soldier is killed and seven others injured after clashing with Abu Sayyaf militants
    in Patikul, Sulu, Philippines. Two militants also die in the fight. (Manila Bulletin)
  Disasters and accidents:
  - European migrant crisis
  - The Italian coast guard responds to a distressed rescue ship funded by English
    street artist Banksy, which overcrowded and stalled off the coast of Lampedusa
    in the Mediterranean Sea after it attempted to rescue more than 200 migrants.
    At least one migrant had died by the time the coast guard arrived. (AFP via Macau
    Business)
  - Collapse of Juxian Restaurant
  - A restaurant building in Linfen, Shanxi, China, collapses, killing at least 29
    people. (U.S. News & World Report)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - India will reopen underground train networks and allow sports and religious events
    in a limited manner from September as part of the government's efforts to revive
    the economy, even as COVID-19 infections soar in the country. (Reuters)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports 3,308 new cases in the last 24 hours, which is a new record
    high for the third consecutive day since the pandemic began in the country. (detikHealth)
  - Bogor imposes a nightly curfew and community social restrictions aimed for the
    residents to prevent the further spread of COVID-19. Under those rules, restaurants,
    malls and cafés will restrict the operation until 6:00 p.m local time and any
    residents will stay at home at 9:00 p.m. local time. These restrictions are enforced
    until September 11. (iNews)
  - COVID-19 pandemic in Myanmar
  - Myanmar's foreign ministry announces the extension of temporary entry restrictions
    to all visitors, including the suspension of all visas, until September 30. (Xinhua)
  - COVID-19 pandemic in Turkey
  - Istanbul reimposes a ban on indoor ceremonies, with the exception of weddings,
    in the wake of some rising infections. (Daily Sabah)
  - COVID-19 pandemic in Oceania
  - Samoa extends the state of emergency until September 27. Prime Minister Tuilaepa
    Aiono Sailele Malielegaoi says he fears the practice of congregating in large
    numbers would likely see the virus entering the (at this time) COVID-19-free country.
    (RNZ)
  International relations:
  - Israel–United Arab Emirates peace agreement, Israel–United Arab Emirates relations
  - Khalifa bin Zayed Al Nahyan of the United Arab Emirates issues a decree abolishing
    a law that mandated an economic boycott on Israel following the approval of the
    historic peace deal between the two countries. On the Israeli side, the first
    El Al commercial flight from Israel to the UAE is expected on Monday. (Al Arabiya
    English)
  - Azerbaijan–Russia relations
  - A senior advisor to Azerbaijani President Ilham Aliyev accuses Russia of arming
    Armenia since the start of the recent border clashes. (Reuters)
  - Czech Republic–Taiwan relations, China–Czech Republic relations, One-China policy
  - Czech Senate President Miloš Vystrčil travels to Taiwan on an official visit to
    promote business links between the two countries, despite the Czech Republic maintaining
    unofficial relations with Taiwan as it recognizes the One-China policy of the
    People's Republic of China (PRC). In response to the visit, the PRC's foreign
    ministry warns the Czech government of "possible consequences" for Czech companies
    with operations in mainland China. (Reuters)
  Law and crime:
  - Protests over responses to the COVID-19 pandemic, COVID-19 pandemic in Germany
  - Police in Berlin disperse around 18,000 anti-lockdown protesters massed in the
    Brandenburg Gate, despite a ruling from the city's administrative court the previous
    day that overturned the government's ban on public demonstrations. Police claim
    "most" of the protesters failed to observe "the minimum" social distancing measures
    implemented in the city. (AFP via Bangkok Post)
  - George Floyd protests in Portland, Oregon, killings of Aaron Danielson and Michael
    Reinoehl
  - A person is shot and killed, and several others arrested, amidst a violent confrontation
    between Black Lives Matter protesters and a large caravan of supporters of President
    Donald Trump in Portland, Oregon. The shooting victim is later identified as a
    member of the far-right Patriot Prayer. (AP)
  - George Floyd protests in Canada
  - Black Lives Matter protesters topple the historic 125-year-old Macdonald Monument
    of Sir John A. Macdonald, the first Prime Minister of Canada, in downtown Montreal.
    The incident draws condemnation from political leaders, including Quebec Premier
    François Legault. (Al Jazeera)
  - Sweden bans far-right Danish leader Rasmus Paludan from entering the country for
    two years in response to last night's unrest in the city of Malmö, in which hundreds
    of Muslim youths clashed with police following the burning of a Quran. Malmö police
    say his behaviour posed "a threat to the fundamental interests of society". (Euronews)
  Politics and elections:
  - 2020 Belarusian protests, Censorship in Belarus
  - The Belarusian Association of Journalists revokes the accreditation of several
    foreign journalists covering the anti-government protests, resulting in the detention
    or deportation of some of those journalists. (AP via East Bay Times)
  - MV Wakashio oil spill
  - Protests erupt in Port Louis, Mauritius, over the government's handling of the
    disaster and after dozens of dolphins are found dead on the beaches. Meanwhile,
    Prime Minister Pravind Jugnauth blames bad weather for the slow response to the
    disaster as task teams from France and the United Nations arrive. (AP)
  - 2020 Liberal Democratic Party (Japan) leadership election
  - The Liberal Democratic Party in Japan is set to pick the next Prime Minister around
    September 15 after the sudden resignation of current Prime Minister Shinzo Abe.
    Former defense minister Shigeru Ishiba and former foreign minister Fumio Kishida
    announce they intend to run but Chief Cabinet Secretary Yoshihide Suga and defense
    minister Taro Kono are considered the potential candidates. Environment minister
    Shinjiro Koizumi is also a candidate but deemed "too young" by party's veterans.
    (Reuters)
  Sports:
  - The Indonesian Youth and Sports Ministry and the National Sports Committee of
    Indonesia officially recognize esports as a sport, following a week-long virtual
    conference held by the latter. This would allow esports to be included in official
    national multi-sport competitions along with traditional sports. (The Jakarta
    Post)
