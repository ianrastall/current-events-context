Date: '2020-08-30'
Source_URI: Portal:Current events/2020 August 30
Intelligence_Payload:
  Arts and culture:
  - Following the death of American actor Chadwick Boseman two days prior, the tweet
    by his family announcing his death becomes the most-liked tweet in history with
    over 7.1 million likes. It surpasses a tweet made by former U.S. President Barack
    Obama in the aftermath of the Unite the Right rally in 2017, which has over 4.3
    million likes. (CNN)
  Disasters and accidents:
  - European migrant crisis
  - At least three migrants die when their boat catches fire off the coast of Crotone,
    Calabria, Italy. Another five migrants are injured as well as two police officers
    who tried to help them. (Reuters)
  - Floods across Italy kill two people, injure some others, and leave one more missing.
    Severe damage to homes and other buildings is reported, and evacuations are ongoing
    in areas of some cities. (3bmeteo)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - India reports 78,761 new cases in the past 24 hours, thus marking the highest
    single-day rise in case numbers recorded anywhere in the world. The record was
    previously set by the United States, which reported 77,638 new cases on July 17.
    This puts India's overall case tally to 3.5 million. (France 24)
  - COVID-19 pandemic in South Korea
  - South Korea begins to restrict operations of restaurants, bakeries, and franchise
    coffee chains in the Seoul Capital Area in an effort to contain the spread of
    COVID-19. Restaurants and bakeries can operate dine-in services until 9 p.m.,
    and only takeaway and delivery will be permitted from 9 p.m. to 5 a.m.. For franchise
    coffee chains, only takeout or delivery will be permitted regardless of operating
    hours. These restrictions will exist until September 7. (Yonhap News Agency)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - More than 1,700 people in the United Kingdom are reported to have tested positive
    for COVID-19 in the last 24 hours, the largest weekend number since the middle
    of May, and the highest number of reported cases since June 4. (The Guardian)
    (Reuters)
  - COVID-19 pandemic in Greece
  - The number of cases in Greece reaches 10,000. (Madison.com)
  - COVID-19 pandemic in Colombia
  - The number of confirmed cases in Colombia reaches 600,000, ahead of the end of
    more than five months of lockdown. (National Post)
  - COVID-19 pandemic in New Zealand
  - Prime Minister Jacinda Ardern mandates the wearing of face masks on public transport
    in Auckland once the city's alert level 3 restrictions are lifted at 11:59p.m.
    local time, following a report of two new cases. (The Guardian)
  International relations:
  - Greek–Turkish relations, Aegean dispute
  - Turkey demands that Greece withdraws its troops from the Aegean island of Kastellorizo,
    saying Greece had violated the 1947 peace treaty, which called for the formerly
    Italian-occupied Kastellorizo to be demilitarized, with a recent troop deployment.
    The Greek government says the event was a "routine troop rotation". (Bloomberg)
  - Belarus–Germany relations, 2020 Belarusian protests
  - The German foreign ministry announces it will summon the Belarusian ambassador
    in Berlin, after the Belarusian Association of Journalists revoked the accreditation
    of several foreign journalists covering the anti-government protests the previous
    day, including members of the German media. (AFP via The Local)
  Law and crime:
  - France–Russia relations
  - French Minister of the Armed Forces Florence Parly reveals that a lieutenant-colonel
    of the army stationed at a NATO base in Italy has been arrested and indicted on
    charges of espionage on behalf of another government, after he was reported to
    have supplied "sensitive" documents to an officer of the GRU, a Russian military
    intelligence agency. (AFP via NDTV)
  Politics and elections:
  - 2020 Montenegrin parliamentary election
  - Montenegrins head to the polls to elect a new session to parliament. Neither the
    ruling pro-Western coalition, dominated by the Democratic Party of Socialists,
    nor the pro-Russian and Serbia opposition are projected to have a majority. (Reuters)
  - Following exit polls, the Montenegrin opposition led by Zdravko Krivokapić claims
    victory in the election with Krivokapić saying "the regime has fallen". (AP)
