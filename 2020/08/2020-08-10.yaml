Date: '2020-08-10'
Source_URI: Portal:Current events/2020 August 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Pakistan
  - 2020 Chaman bombing
  - A motorcycle bomb kills five people and injures 20 others in Chaman, Killa Abdullah,
    Balochistan, Pakistan. (Dawn)
  - 2020 Democratic Republic of the Congo massacres
  - Nineteen people are killed in massacres in three villages in Ituri Province in
    the Democratic Republic of the Congo. (Al Jazeera English)
  Business and economy:
  - McDonald's files a US$40 million lawsuit against former CEO Steve Easterbrook,
    equal to the worth of his severance package, for allegedly lying to investigators
    about the extent of his sexual relationships with three employees. (CNN)
  - Toshiba exits the personal computer (PC) market after 35 years, by selling its
    final stake in PC manufacturer Dynabook Inc. (BBC News)
  Disasters and accidents:
  - 2020 Kerala floods
  - A landslide during floods at a tea plantation in Kerala, India, leaves at least
    49 people dead. It is feared that many more people are buried under debris. (Sky
    News)
  - MV Wakashio oil spill
  - Mauritian Prime Minister Pravind Jugnauth warns that the tanker may "break in
    two" as the country awaits help from other nations that have pledged aid amid
    a state of emergency. Jugnauth adds the nation lacks the skills and resources
    needed to relocate the wrecked vessel, and that the nation will likely never recover
    from the ecological damage done by the spill. (BBC News) (CBS)
  - 2020 Volgograd explosion
  - An explosion at a gas station in Volgograd, Volgograd Oblast, Russia, injures
    at least 13 people and creates a -sized blaze. It is believed that it was caused
    by an electrical fire. (The Independent)
  - A gas explosion in Baltimore, Maryland, United States, leaves at least one dead
    and four injured. Homes were damaged or destroyed. (BBC News)
  - August 2020 Midwest derecho
  - A powerful derecho with winds over 100 mph sweeps across the Midwestern United
    States and leaves four dead and causes $11 billion USD in damage.
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Guam
  - Guam Governor Lou Leon Guerrero tests positive for COVID-19. (Pacific Island Times)
  - COVID-19 pandemic in Spain
  - Spanish actor Antonio Banderas announces via Twitter that he has tested positive
    for COVID-19. (CNN)
  International relations:
  - Afghan peace process
  - A day after the loya jirga approved of the release of "hardcore" Taliban prisoners,
    President Ashraf Ghani signs the order to release them. Taliban spokesman Suhail
    Shaheen says the Taliban "is ready" for talks. U.S. Special Envoy Zalmay Khalilzad
    welcomed the agreement. (Reuters)
  Law and crime:
  - Hong Kong national security law
  - Hong Kong entrepreneur and pro-democracy activist Jimmy Lai and his son are arrested
    under the national security law for allegedly conspiring with foreign powers.
    He is so far the most high-profile figure to be charged under the law. The police
    also search the offices of his company Next Digital shortly after his arrest.
    Activist Agnes Chow was also arrested. (The Guardian) (South China Morning Post)
  - Rioting and looting occurs in Chicago, U.S., after a police shooting. Thirteen
    police officers are injured, two people are shot, and more than 100 are arrested.
    (Chicago Tribune)
  - A shooting involving the Secret Service occurs on Pennsylvania Avenue near the
    White House, Washington, D.C., U.S. A civilian, identified only as a 51-year-old
    man, has been transported to a local hospital. (ABC News)
  - A US Air Force UH-1N is shot at near Manassas, Virginia, injuring one of two pilots
    while flying ten miles northwest of Manassas on a training mission at an altitude
    of 1,000 feet. It lands safely at Manassas Regional Airport west of Washington,
    DC, and the pilot is taken to hospital where they are treated and released. (CNN)
  Politics and elections:
  - 2020 Belarusian presidential election, 2020 Belarusian protests
  - During the second day of protests across Belarus, police fire rubber bullets to
    disperse protesters in the capital Minsk, wounding a journalist. About 30 people
    are arrested in the city; some protestors were beaten by police. (BBC News)
  - A protester in Minsk is killed after being shot by police officers. It is the
    first death during the protests. (Euronews)
  - 2020 Trinidad and Tobago general election
  - Citizens of Trinidad and Tobago cast their votes in the country's general election.
    (Foreign Brief)
  - 2019–2020 Lebanese protests, aftermath of the 2020 Beirut explosions
  - Prime Minister Hassan Diab announces the resignation of the entire government
    as protests grow over their handling of the Beirut explosions on 4 August. (Reuters)
  Sports:
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in the United States
  - The Mountain West Conference becomes the second NCAA Division I FBS league to
    call off its football season, as well as all other fall sports. This follows the
    lead of the Mid-American Conference, which announced an identical plan two days
    earlier. (Mountain West Conference) (ESPN)
