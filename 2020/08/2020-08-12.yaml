Date: '2020-08-12'
Source_URI: Portal:Current events/2020 August 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Operations Claw-Eagle and Tiger, Iraq–Turkey relations
  - Iraq cancels a ministerial meeting and summons the Turkish ambassador as Iraq
    blames Turkey for a drone strike that killed two high-ranking Iraqi military officers.
    Officials called it a "blatant Turkish drone attack" in the autonomous Kurdish
    region in northern Iraq. (Al Jazeera)
  - Insurgency in Cabo Delgado
  - Islamist insurgents linked to ISIL seize control of the port city of Mocímboa
    da Praia in northern Mozambique, after days of heavy fighting with government
    forces. Soldiers reportedly abandoned their positions and fled the city on boats
    after becoming outnumbered, as several fellow soldiers were killed by the militants.
    (BBC News)
  - Clashes between armed civilians and soldiers in Tonj, Warrap, South Sudan, during
    a disarmament exercise leave 127 dead since Saturday, an army spokesman says.
    A total of 45 of those killed were part of the security forces while the rest
    were youths from the area. (AFP via Al Arabiya)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, COVID-19 recession
  - Economic impact of the COVID-19 pandemic in the United Kingdom
  - The United Kingdom's economy officially enters recession for the first time since
    2009, according to Chancellor Rishi Sunak. (BBC News)
  Disasters and accidents:
  - Stonehaven derailment
  - A ScotRail train derails near Stonehaven, Aberdeenshire, Scotland, following torrential
    rain and thunderstorms, killing three people, including the driver. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - France reports the largest rise of COVID-19 cases since the lockdown was lifted
    in May, with 2,524 new cases being reported in the last 24 hours. (BBC News)
  - COVID-19 pandemic in Germany
  - The number of COVID-19 cases in Germany rises by 1,226, which is the biggest daily
    rise since May, according to the Robert Koch Institute, as the health minister
    warns of outbreaks in nearly all parts of the country due to vacation returnees
    and partygoers. (Swiss Info) (The New York Times)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Peru
  - President Martín Vizcarra bans family gatherings and extends a lockdown to five
    more regions, following a 75% surge in COVID-19 cases among children and adolescents.
    (Reuters)
  - COVID-19 pandemic in Venezuela
  - Jorge Rodríguez, incumbent Minister of Popular Power for Communication and Information
    announces he tested positive for COVID-19. (The New York Times)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New Hampshire
  - New Hampshire Governor Chris Sununu issues a mask mandate for gatherings with
    more than 100 people. Masks will be required at the Laconia Motorcycle Week, which
    is expected to be held on August 22 and 23. The move comes after few attendees
    of the Sturgis Motorcycle Rally in South Dakota appeared to wear masks. (CBS News)
  - The United States reports more than 1,500 new deaths caused by COVID-19, making
    today the deadliest day for the country since the end of May. (CNBC)
  - COVID-19 pandemic in Australia
  - Australia suffers the deadliest day of the pandemic when Victoria reports 21 deaths
    in the last 24 hours. (9 News)
  International relations:
  - Belarus–Lithuania relations, 2020 Belarusian protests
  - Lithuania allows "unrestricted entry" to all Belarusians "for humanitarian purposes"
    amid anti-government protests and political repression in neighbouring Belarus.
    Existing COVID-19 restrictions will not apply to Belarusians. (The Baltic Times)
  - Jordan–Syria relations, COVID-19 pandemic in Jordan, COVID-19 pandemic in Syria
  - Jordan announces it will close its only trade land border crossing with Syria
    for a week beginning on Thursday morning after a sharp spike in COVID-19 cases
    coming from its northern neighbour. (TRT World)
  Law and crime:
  - COVID-19 pandemic in the United States
  - Face masks during the COVID-19 pandemic in the United States
  - The Ocala, Florida, City Council overrides Ocala Mayor Kent Guinn’s veto of the
    Council's earlier emergency ordinance that requires people to wear masks inside
    businesses. (WCJB-TV)
  - George Floyd protests
  - George Floyd protests in Indiana
  - Two Indianapolis police officers are expected to face charges for using excessive
    force during protests over the death of George Floyd. (ABC News)
  - Hong Kong pro-democracy activists Jimmy Lai and Agnes Chow are released on bail.
    Lai makes no comment while Chow says that her arrest amounts to "political persecution
    and political suppression". (Al Jazeera)
  Politics and elections:
  - 2020 Bougainvillean general election
  - Elections for the House of Representatives and the president of Bougainville start
    taking place. The outcome of the election might have a major impact on the region's
    future as it follows last year's non-binding independence referendum which saw
    98% of the voters approving independence from Papua New Guinea. The election is
    held a week after the first case of COVID-19 was confirmed in the region and is
    scheduled to run until the first of September. (RNZ)
  - Impact of the COVID-19 pandemic on politics, COVID-19 pandemic in New Zealand
  - Prime Minister Jacinda Ardern delays dissolution of Parliament until 17 August,
    due to resurgence of COVID-19. (ABC News Australia)
  Science and technology:
  - Palaeontologists at the University of Southampton report the discovery of a new
    species of theropod dinosaur called Vectaerovenator inopinatus on the Isle of
    Wight, England. The species belongs to the same group as the Tyrannosaurus and
    modern-day birds. It lived roughly 115 million years ago during the Cretaceous
    period. (BBC News)
  Sports:
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in France
  - France cancels the rescheduled 2020 Paris Marathon, which would have taken place
    on November 15, due to COVID-19. (BBC Sport)
