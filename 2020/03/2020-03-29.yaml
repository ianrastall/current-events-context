Date: '2020-03-29'
Source_URI: Portal:Current events/2020 March 29
Intelligence_Payload:
  Business and economy:
  - Impact of the COVID-19 pandemic on aviation
  - COVID-19 pandemic in Hubei, COVID-19 pandemic in mainland China
  - China resumes domestic flights to the Hubei province. Wuhan is expected to resume
    flights on April 8. (Financial Express)
  - COVID-19 pandemic in Nepal
  - Nepal Airlines will allow rescue flights to take stranded tourists back to their
    countries, but only if embassies requested it. (Nepali Times)
  - COVID-19 pandemic in the United Arab Emirates, transportation in Dubai
  - The Dubai Roads and Transport Authority announces that the Dubai Tram and Dubai
    Metro will be suspended until April 5 as sterilization continues in Dubai. (Gulf
    News)
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in Michigan
  - The 2020 North American International Auto Show, originally scheduled from June
    9–20 in Detroit, has been cancelled due to the designation of the TCF Center as
    a temporary hospital. (Click On Detroit)
  Disasters and accidents:
  - An IAI Westwind jet, chartered by the Philippine government for a medical evacuation
    flight to Haneda Airport in Japan, crashes upon takeoff at Ninoy Aquino International
    Airport in Manila. All eight people onboard are killed. (RT)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in New Zealand
  - New Zealand's Ministry of Health reports its first death from COVID-19, a woman
    in her 70s. (Newstalk ZB)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Andorra
  - Thirty-nine health workers from Cuba arrive in Andorra, as the country's confirmed
    cases and death toll per capita becomes one of the highest in the world. (Diari
    d'Andorra)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York
  - New York Governor Andrew Cuomo extends the stay-at-home order for non-essential
    workers to April 15. (Business Insider)
  International relations:
  - North Korea–South Korea relations, Japan–North Korea relations, North Korea and
    weapons of mass destruction
  - North Korea fires two short-range ballistic missiles into the ocean, the latest
    in an unprecedented flurry of launches. Both South Korea and Japan condemn the
    launching. (Reuters)
  Politics and elections:
  - 2020 Malian parliamentary election
  - After having been postponed several times, parliamentary elections are being held
    in war-torn Mali. The election is overshadowed by the recent kidnapping of the
    leading opposition politician Soumaïla Cissé and the first reported COVID-19 death
    in the country. (DW)
