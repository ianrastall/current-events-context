Date: '2020-03-02'
Source_URI: Portal:Current events/2020 March 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Houthi forces capture the city of Al Hazm, the capital of Al Jawf Governorate
    in Yemen. (Middle East Monitor) (Al Jazeera)
  - Syrian Civil War, Northwestern Syria offensive (December 2019–March 2020)
  - Syrian rebels backed by Turkey recapture four towns and villages from the Syrian
    government forces in Idlib, raising the number of towns and villages recaptured
    since February 24 to 30. (SOHR)
  - Syrian government forces backed by Russian airstrikes recapture the city of Saraqib
    four days after its capture by the rebels. (SOHR)
  - War in Afghanistan (2001–2021), Afghan peace process
  - The Taliban say there will be no intra-Afghan talks if about 5,000 of their prisoners
    are not released. (Reuters)
  - The Taliban announce the end of the period of reduction in violence. They say
    they will not attack foreign troops, but continue their operations against Kabul
    government troops. According to Belga news agency, it is unclear what the announcement
    means for the U.S.–Taliban agreement signed on February 29. (Belga via Het Laatste
    Nieuws)
  - European migrant crisis
  - Hellenic Police border guards open fire on migrants attempting to illegally enter
    Greece by crossing the border from Turkey, killing a Syrian man. (France 24) (Middle
    East Monitor)
  - The Hellenic Army's IV Army Corps announces a 24-hour snap military drill on the
    border with Turkey, and warns civilians to stay away from the area. (Anadolu Angency)
  - Moro conflict
  - A soldier was killed and two injured after Islamic State-linked militants opened
    fire against them. Two terrorists were also killed. (Xinhua)
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - The Japan Sumo Association announces its spring tournament in Osaka will take
    place with no spectators. (News On Japan)
  - The Dow Jones Industrial Average rebounds 1,294 points to end its seven day decline.
    (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - Saudi Arabia reports its first case. (Arab News)
  - Indonesia confirms its first case of the coronavirus. (Kompas) (Reuters)
  - COVID-19 pandemic in Europe
  - Andorra reports its first case. (El Periódico) (Reuters)
  - Portugal reports its two first cases. (Reuters)
  - Russia reports its first case in Moscow. (Urdu Point)
  - COVID-19 pandemic in the United States, COVID-19 pandemic in Washington (state)
  - Two dozen more cases are reported in the U.S., bringing the total number of infected
    Americans to 102. Four deaths also occur in the state of Washington, bringing
    the total death toll in the U.S. to six. Washington and Florida issue state emergencies.
    (CNN)
  - Ecuador reports its first cases in Guayaquil. (Reuters)
  - Morocco reports its first case. (Hespress)
  - Tunisia confirms its first case. (The Punch)
  - The Dominican Federation of Municipalities call for all mayors to remain vigilant
    with the threat of the coronavirus. (HOY DR)
  International relations:
  - The United Kingdom and the European Union start post-Brexit trade talks. Last
    week, each side publicly set its negotiating mandate. (The Economist) (The Irish
    Times)
  - Japan–North Korea relations
  - North Korea fires two short-range projectiles from the coast of Wonsan before
    landing in the sea dividing the Korean Peninsula and Japan. Japan's Defence Ministry
    says it had not detected any projectile landing in its territory and that no ship
    or aircraft in the area had been damaged. (The Guardian)
  - Libyan peace process
  - The head of the United Nations Support Mission in Libya Ghassan Salamé resigns
    citing stress and health concerns. In a statement on Twitter, Salamé says he has
    been frustrated with foreign powers, particularly France and Russia for covertly
    backing Khalifa Haftar's forces in the civil war. (The Guardian)
  Law and crime:
  - A hostage situation occurs at the V-Mall in San Juan, Philippines. The suspect,
    a disgruntled security guard, took about 60 to 70 people hostage and shot and
    injured another security guard. The crisis is resolved after ten hours, with the
    suspect being arrested following an official apology and the resignation of his
    bosses for alleged corruption. (CNN Philippines)
  Politics and elections:
  - 2020 Dominican Republic municipal elections
  - Industrial Associations Federation's president Ramón Porfirio Báez announces the
    election crisis is beginning to hurt the economy. (Dominican Today)
  - Former Santo Domingo mayor Roberto Salcedo Sr. resigns from the government and
    the Dominican Liberation Party. (Dominican Today)
  - 2020 Guyanese general election
  - People of Guyana head to the polls to elect the members of their National Assembly.
    (AlJazeera)
  - 2020 Israeli legislative election
  - Israelis head to the polls for the third time in less than a year. (Reuters)
  - 2020 Democratic Party presidential primaries
  - Minnesota Senator Amy Klobuchar suspends her presidential campaign, and joins
    fellow former contenders Pete Buttigieg and Beto O'Rourke in announcing their
    endorsement of Joe Biden. (The New York Times)
  - MSNBC political anchor Chris Matthews resigns over criticism of making sexist
    comments and comparing Bernie Sanders' campaign to the Nazi invasion of France.
    (The New York Times)
