Date: '2020-03-24'
Source_URI: Portal:Current events/2020 March 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in the United States, COVID-19 pandemic in Missouri
  - FBI agents shoot dead an armed man during an arrest operation in Belton, Missouri,
    U.S. The man was suspected of plotting a bombing attack, with far-right motivations,
    at a Kansas City hospital believed to be treating COVID-19 patients. (ABC News)
    (CNN)
  Arts and culture:
  - Economic impact of the COVID-19 pandemic, COVID-19 pandemic in mainland China
  - The Badaling section of the Great Wall of China reopens to visitors. (CNN)
  - Impact of the COVID-19 pandemic on the 2020 Summer Olympics
  - After the Summer Olympics is postponed, the Tokyo station's Olympic countdown
    clock displaying the number of days until the Games (a local tourist attraction)
    is switched to show the current date and time. (The Japan Times)
  Disasters and accidents:
  - Mozambique people smuggling disaster
  - 64 Ethiopian illegal immigrants are found dead and 14 alive inside a cargo container
    on a lorry in Tete Province, Mozambique, apparently having died of asphyxiation.
    (Al Jazeera)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - Premier Li Keqiang says that the spread of the epidemic has been basically blocked
    and the outbreak controlled within China. (State Council Information Office)
  - 2020 Hubei lockdowns, COVID-19 pandemic in Hubei
  - China is expected to end lockdowns on most of the Hubei province. Wuhan, the epicenter
    of the coronavirus, is expected to reopen on April 8. (ABC News)
  - COVID-19 pandemic in India, Indian local government response to the COVID-19 pandemic
  - Complete lockdowns are announced in 30 states and union territories of India in
    an effort to stop the spread of COVID-19. (The Times of India)
  - COVID-19 pandemic in Nepal
  - Nepal enters in a total and nationwide lockdown for a week. (Kathmandu Post)
  - COVID-19 pandemic in Saudi Arabia
  - Saudi Arabia reports the country's first death from COVID-19, as the total number
    of cases rises to 767. The patient was an Afghan expatriate. (Gulf News)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in New Zealand
  - New Zealand reports 40 new cases of coronavirus. (Stuff NZ)
  - COVID-19 pandemic in Australia
  - Australia announces a nationwide lockdown, outlawing all travel interstate and
    overseas, and closing the nation's borders. Schools remain open in some locations.
    (News.com.au)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - Spain's Ministry of Health reports 514 more deaths from COVID-19, the highest
    daily death toll in the country to date. (BBC News)
  - The Palacio de Hielo ice rink in Madrid begins to be used as a morgue as the city's
    funeral homes are not able to hold all COVID-19 victims. (CNN)
  - COVID-19 pandemic in France
  - Cameroonian musician and songwriter Manu Dibango dies from COVID-19 in Paris,
    France. (BBC News)
  - France reports 2,444 new confirmed cases of COVID-19 and 240 more deaths, bringing
    the country's total to 22,300 cases and over 1000 deaths. (France 24)
  - COVID-19 pandemic in Poland
  - 'The government introduces new measures over the ongoing coronavirus pandemic
    in the country: a ban on gatherings of more than two people, from the current
    50. However, the number of people allowed to take part in religious services,
    including funerals, is limited to five. The new restrictions are to last until
    at least 11 April. (BBC News)'
  - Prime Minister Mateusz Morawiecki tells at a news conference on Tuesday that the
    presidential election, scheduled for 10 May, will not be affected by the coronavirus
    pandemic and will go ahead as planned. (TVN24)
  - COVID-19 pandemic in Vatican City
  - Roman Curia confirms three more cases, raising to four. (Il Messaggero)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Chile
  - Despite a week-long lockdown, Easter Island (Rapa Nui) reports its first case
    of coronavirus. (CNN Chile)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Egypt
  - Egypt declares a two-week nationwide curfew between 7pm and 6am to prevent the
    spread of the virus. Those who break the curfew will be fined up to 4,000 pounds
    or be jailed, according to Prime Minister Mostafa Madbouly. (Reuters)
  - COVID-19 pandemic in Libya
  - The National Centre for Disease Control reports Libya's first confirmed case of
    COVID-19, a patient at a hospital in Tripoli. The World Health Organization has
    warned that the virus could cause Libya's already struggling health system to
    collapse. (Reuters)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - The number of confirmed cases of COVID-19 in California reaches 2,226, with 42
    deaths. (Los Angeles Times)
  - COVID-19 pandemic in New York
  - U.S. Vice President Mike Pence says FEMA will send 4,000 ventilators to New York
    in the next 48 hours. The state now has at least 20,000 confirmed cases of COVID-19.
    (Washington Examiner)
  - COVID-19 pandemic in Michigan
  - Detroit Mayor Mike Duggan confirms nine members of the Detroit Police Department
    have tested positive for COVID-19, with one death, a 38-year-old male dispatcher.
    An additional 233 officers have been quarantined since Sunday. (MLive.com)
  - COVID-19 pandemic in Florida
  - Playwright Terrence McNally dies from complications of COVID-19 in Florida. (BBC
    News)
  - A man in the Chinese province of Yunnan dies after testing positive for hantavirus.
    (Newsweek)
  International relations:
  - South Korea–United States relations, COVID-19 pandemic in the United States
  - South Korea President Moon Jae-in says that President Donald Trump asked the country
    to send medical equipment to the United States to help fight the coronavirus.
    (Reuters)
  Science and technology:
  - Chinese space program
  - China launches three military surveillance satellites on a Long March 2C rocket.
    (Space.com)
  Sports:
  - Impact of the COVID-19 pandemic on the 2020 Summer Olympics
  - The 2020 Summer Olympics has been postponed for the first time in the modern Olympic
    Games history to 2021 in response to the COVID-19 pandemic. (The Guardian)
