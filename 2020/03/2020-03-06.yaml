Date: '2020-03-06'
Source_URI: Portal:Current events/2020 March 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - 6 March 2020 Kabul shooting
  - At least 32 people are killed and 81 are injured when gunmen attack a ceremony
    in Kabul, Afghanistan. Afghan politician Abdullah Abdullah was present and escapes
    unharmed. ISIL claims responsibility for the attack. (Reuters)
  - Two suicide bombers on a motorcycle detonate their explosives near the United
    States embassy in Tunis, Tunisia, killing a policeman and wounding five others.
    (Middle East Eye)
  Disasters and accidents:
  - United States tornado outbreak of March 2–3, 2020
  - U.S. President Donald Trump approves a disaster declaration for all areas affected
    by the tornadoes. (WSMV Nashville)
  - The National Weather Service concludes the EF3 tornado that went through Davidson,
    Wilson, and Smith counties in Tennessee was confirmed on the ground for , becoming
    the second longest path a tornado has taken in Tennessee. (NWS)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - Bhutan confirms its first COVID-19 case. (Hindustan Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Serbia
  - Serbia reports its first case. (Reuters)
  - COVID-19 pandemic in Vatican City
  - The Vatican City reports its first case. (Reuters)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Florida
  - Florida confirms its first two deaths from the coronavirus. (CBS News)
  - COVID-19 pandemic in Oklahoma
  - Oklahoma confirms its first case of COVID-19 in Tulsa County. (The Oklahoman)
  Law and crime:
  - The Committee on the Rights of the Child of the United Nations condemns the government
    of the Cook Islands for criminalizing homosexual sex. (RNZ)
  Politics and elections:
  - 2020 Guyanese general election
  - Police in Georgetown, Guyana, surround the nation's election commission after
    there are accusations that the elections results were altered to help incumbent
    President David A. Granger win the election. (Reuters)
  Science and technology:
  - SpaceX CRS-20
  - SpaceX successfully launches a Dragon spacecraft in orbit to resupply the International
    Space Station. This marks the last launch of a Dragon spacecraft, soon to be replaced
    by Dragon 2, and the 50th successful recovery of a Falcon 9 first stage booster.
    (Space.com)
