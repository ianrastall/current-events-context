Date: '2020-03-27'
Source_URI: Portal:Current events/2020 March 27
Intelligence_Payload:
  Arts and culture:
  - Impact of the COVID-19 pandemic on cinema
  - Cinema of China, COVID-19 pandemic in mainland China
  - China's Film Bureau closes cinemas that had re-opened after the epidemic's first
    wave, without giving a reason. (The Guardian)
  - Impact of the COVID-19 pandemic on religion
  - Pope Francis delivers a special Urbi et Orbi blessing in an empty Saint Peter's
    Square, praying for the end of the coronavirus pandemic and offering a plenary
    indulgence to repentant sinners before San Marcello al Corso's miraculous crucifix,
    which was moved from its original church in Rome two days ago. (Vatican News)
    (Aleteia)
  Business and economy:
  - Economic impact of the COVID-19 pandemic in the United States
  - The House of Representatives passes a $2 trillion stimulus relief bill as an effort
    to save the economy during the coronavirus pandemic. President Donald Trump signs
    the bill. (CBS News) (Business Insider)
  Disasters and accidents:
  - 2020 New York City Subway fire
  - One person is killed and 16 people are injured, four with life-threatening injuries,
    after a New York City Subway caught fire near the Central Park North–110th Street
    station in Harlem. The fire has been treated as suspicious. (NBC News)
  - Mount Merapi erupts in Indonesia, sending ash of 5 kilometers in the air. (Manila
    Times)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Uzbekistan
  - Uzbekistan reports the first death from COVID-19, a 72-year-old woman with underlying
    health conditions in the city of Namangan. (Reuters)
  - COVID-19 pandemic in Iran
  - In Iran, 300 people die and 1,000 people become ill after drinking methanol to
    save themselves from COVID-19. (Star Tribune)
  - Olympic silver medalist Ehsan Haddadi tests positive for COVID-19. (ISNA)
  - COVID-19 pandemic in the Philippines
  - The Philippines passes a legislation granting emergency powers to President Rodrigo
    Duterte as part of its measures to deal with the coronavirus pandemic as confirmed
    cases rise to 707. (Voice of America)
  - COVID-19 pandemic in Jordan
  - Jordan reports its first death from COVID-19, a woman in her 80s, as cases rise
    to 235. (Reuters)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in South Africa
  - South Africa reports its first two deaths from COVID-19, both occurring at hospitals
    in Western Cape province. The government also announces a 21-day lockdown as cases
    surpass 1,000. (Gulf News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - The number of people who tested positive in Italy jumps to 86,498, while the death
    toll rose to 9,134. Italy is the country with the highest death toll in the world
    and second for number of cases. (BBC News)
  - COVID-19 pandemic in the United Kingdom
  - Prime Minister Boris Johnson tests positive for COVID-19. He will self-isolate
    at 10 Downing Street. (BBC News)
  - Secretary of State for Health and Social Care Matt Hancock tests positive for
    COVID-19. (The Guardian)
  - The Department of Health and Social Care reports 185 more deaths from COVID-19,
    the highest daily death toll in the country to date, bringing the death toll in
    the United Kingdom to 769. (Sky News)
  - Scientists in Oxford are expected to recruit 510 adults without COVID-19 to test
    a COVID-19 vaccine. (The Guardian)
  - COVID-19 pandemic in Scotland, Healthcare in Scotland
  - Hospitals in Scotland are expected to get testing kits from South Korea as an
    effort to increase testing for COVID-19. (BBC News)
  - A temporary mortuary is being built at Birmingham Airport, with capacity to hold
    up to 12,000 bodies as the virus spreads in the region. (The Guardian)
  - COVID-19 pandemic in Russia
  - President Vladimir Putin orders that the week between 28 March and 5 April will
    be a nationwide paid holiday and declares the closing of all restaurants and shops
    during this week. (The Moscow Times)
  - COVID-19 pandemic in Hungary
  - Prime Minister Viktor Orbán announces a two-week national lockdown in response
    to the coronavirus pandemic. (Reuters)
  - COVID-19 pandemic in Cyprus
  - Cyprus' government is set to release 50 prisoners in order to contain the spread
    of the virus in the island. (Cyprus Mail)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - New York Governor Andrew Cuomo announces that eight hospitals will be built as
    the number of cases in New York surge. (Reuters)
  - COVID-19 pandemic in California
  - The USNS Mercy, which has 1,000 beds, arrives in Los Angeles to offer assistance
    during the COVID-19 crisis. (Los Angeles Times)
  - COVID-19 pandemic in Tonga
  - Prime Minister Pohiva Tu'i'onetoa announces that the country would be under a
    lock-down between 29 March and 5 April. (RNZ)
  - Misinformation related to the COVID-19 pandemic
  - Fox Business fires its primetime host Trish Regan after she claimed the coronavirus
    is a Democratic Party ploy to impeach President Donald Trump. (CNN)
  International relations:
  - China–United States relations, COVID-19 pandemic in the United States
  - Chinese leader Xi Jinping offers advice to United States President Donald Trump
    on how to contain the coronavirus pandemic. (Reuters)
  - North Macedonia–NATO relations
  - North Macedonia becomes the 30th member of NATO after over a year of negotiations.
    (Defense News)
  - Syria–United Arab Emirates relations
  - Abu Dhabi crown prince Mohammed bin Zayed Al Nahyan and Syrian President Bashar
    al-Assad discusses the COVID-19 pandemic on phone. (Reuters)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - 2019–20 NBA season
  - The Utah Jazz announces that Rudy Gobert and Donovan Mitchell are cleared of coronavirus
    after becoming the first National Basketball Association players to test positive
    on March 11. (CBS News)
