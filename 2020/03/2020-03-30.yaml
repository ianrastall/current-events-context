Date: '2020-03-30'
Source_URI: Portal:Current events/2020 March 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Coalition warplanes carry out an air raid on the Yemeni capital Sanaa, bombing
    the Presidential Palace compound, a military school and airbase adjacent to Sanaa
    International Airport. The Houthi-run Almasirah TV channel says 70 horses were
    killed in the raid on the school. (Middle East Monitor)
  - Somali Civil War, Somali Civil War (2009–present)
  - Abdisalan Hassan, governor of the Nugal region, is killed in a suicide bombing.
    Al-Shabaab claims responsibility. (Al Jazeera)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, Impact of the COVID-19 pandemic on sports
  - COVID-19 pandemic in the United States
  - USA Rugby files for chapter 11 bankruptcy citing "insurmountable financial constraints"
    amid the coronavirus pandemic. (The Guardian)
  - COVID-19 pandemic in mainland China, 2020 Hubei lockdowns
  - Wuhan, the epicenter of the COVID-19 pandemic, reopens its stores and shopping
    centers. (USA Today)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Premier Doug Ford extends the province's state of emergency for another two weeks.
    (CTV News)
  - COVID-19 pandemic in Panama
  - Panama's Ministry of Health reports a total of 989 cases of COVID-19 in the country,
    of which 24 people have died. (TVN)
  - COVID-19 pandemic in the United States
  - U.S. state and local government response to the COVID-19 pandemic
  - COVID-19 pandemic in New York City
  - The USNS Comfort arrives in New York City to relieve the area's hospitals of non-coronavirus
    patients. (The Hill)
  - The USTA Billie Jean King National Tennis Center in Queens, New York City, will
    be converted into a temporary 350-bed field hospital to treat overflow patients
    from other hospitals in New York. (Wall Street Journal)
  - COVID-19 pandemic in Virginia, COVID-19 pandemic in Maryland
  - Maryland Governor Larry Hogan and Virginia Governor Ralph Northam issue stay-at-home
    orders. Virginia's stay-at-home order will remain in effect until June 10. (Washington
    Post)
  - COVID-19 pandemic in Mexico
  - Mexico declares a national health emergency and extends the suspension of all
    non-essential activities until April 30. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan
  - Japanese comedian Ken Shimura dies from pneumonia several days after being diagnosed
    with COVID-19. (The Japan Times)
  - COVID-19 pandemic in Israel
  - Prime Minister Benjamin Netanyahu and some of his cabinet members self-quarantine
    after an aide tests positive for COVID-19. (Anadolu Agency)
  - COVID-19 pandemic in Syria
  - The government reports the country's first death from COVID-19. (BBC News)
  - COVID-19 pandemic in Malaysia
  - Malaysia begins a nationwide disinfection to help curb the spread of COVID-19.
    (Straits Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - Fernando Simón, Director of the Center for Coordination of Health Alerts and Emergencies
    of the Spanish Ministry of Health, becomes the second member of the Technical
    Committee to test positive for COVID-19. (RTVE)
  - COVID-19 pandemic in Denmark
  - Prime Minister Mette Frederiksen says that the country will lift lockdowns after
    Easter if COVID-19 cases and death numbers remain stable. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 180 more deaths from COVID-19,
    bringing the United Kingdom's death toll to 1,415. (Sky News)
  - COVID-19 pandemic in France
  - France reports 418 more deaths from COVID-19, the highest daily death toll in
    the country to date, bringing the country's death toll to 3,024 and 44,550 cases.
    (Metro)
  - Former President of the People's Republic of the Congo Joachim Yhombi-Opango dies
    from COVID-19 at a hospital in Neuilly-sur-Seine. He is the first state leader
    (former or current) to have died from COVID-19. (Le Figaro)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Botswana
  - Botswana reports their first confimed cases of COVID-19. Health Minister Lemogang
    Kwape says the three patients are currently in quarantine and had recently travelled
    to Britain and Thailand. (Reuters)
  - COVID-19 pandemic in Libya
  - The Government of National Accord (GNA) frees 466 prisoners from jails in Tripoli
    to prevent the spread of COVID-19. The GNA also announces an extended curfew from
    2pm to 7am in the areas it controls. (Al Jazeera)
  Law and crime:
  - The Singer Laren museum says that the Vincent van Gogh painting The Parsonage
    Garden at Nuenen was stolen in a raid. (AP News)
  Politics and elections:
  - Impact of the COVID-19 pandemic on politics; COVID-19 pandemic in Hungary
  - Parliament votes 137 to 53 in favor of passing legislation to create a state of
    emergency without a time limit, grant Prime Minister Viktor Orbán the ability
    to rule by decree, suspend the parliament with no elections, and establish prison
    sentences for spreading fake news and leaving quarantine. (DW)
  Sports:
  - COVID-19 pandemic in Japan, Impact of the COVID-19 pandemic on sports
  - After getting postponed a week before, the 2020 Summer Olympics has been rescheduled
    to July 23, 2021, while the 2020 Summer Paralympics is now taking place for August
    24, 2021. (The Guardian)
