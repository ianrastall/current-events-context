Date: '2020-03-25'
Source_URI: Portal:Current events/2020 March 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Kabul gurdwara attack
  - Gunmen kill 25 worshippers at a gurdwara in Kabul, Afghanistan. ISIL claims responsibility.
    (Reuters)
  - Libyan Civil War
  - 2019–20 Western Libya offensive
  - Forces loyal to the GNA assault the Okba Ibn Nafa Air Base, west of Tripoli, while
    the Libyan National Army captures several towns near the Berber city of Zuwarah,
    including Zaltan, Jumayl and Ras Ajdir. (Reuters)
  Arts and culture:
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in Egypt
  - Egypt begins disinfection on the Giza pyramid complex as an effort to contain
    COVID-19. (Reuters)
  - Impact of the COVID-19 pandemic on cinema, COVID-19 pandemic in mainland China
  - 'China announces that The Avengers, Avengers: Age of Ultron, Avengers: Infinity
    War, Avengers: Endgame, Avatar, Inception, and Interstellar will be re-released
    in theaters following the end of their lockdowns as a hope to revive their cinemas.
    (CNET)'
  Business and economy:
  - Economic impact of the COVID-19 pandemic in the United States
  - The United States Senate and the Trump administration reaches a $2 trillion stimulus
    package deal following talks with Treasury Secretary Steven Mnuchin. The bill
    passes, and is expected to go to the United States House of Representatives. (The
    Washington Post) (CNBC)
  Disasters and accidents:
  - 2020 Kuril Islands earthquake
  - A magnitude 7.5 earthquake hits the Kuril Islands town Severo-Kurilsk in Russia's
    Far East. (Newsweek)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - ​India goes under a nationwide lockdown to contain the coronavirus pandemic. (BBC
    News)
  - COVID-19 pandemic in the Palestinian territories
  - Palestine reports its first death from COVID-19 in the West Bank, the patient
    was a woman in her 60s. (The New Arab)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - The United States has its deadliest COVID-19 day to date, with 223 related deaths.
    (CNN)
  - COVID-19 pandemic in New York (state)
  - New York City records 81 more deaths from COVID-19, bringing the city's death
    toll to 280. Mayor Bill de Blasio has warned that more than half of all New Yorkers
    could become infected. (New York Post)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in New Zealand
  - New Zealand declares a national state of emergency as the number of confirmed
    COVID-19 cases rise to 205. (New Zealand Herald)
  - COVID-19 pandemic in the Solomon Islands
  - Solomon Islands declare state of emergency due to COVID-19. (RNZ)
  - COVID-19 pandemic in Samoa
  - Samoan Prime Minister Tuilaepa Aiono Sailele Malielegaoi announces that people
    will be fined for breaking the new restrictions of movement due COVID-19. (RNZ)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Hungary
  - The Foreign and Commonwealth Office confirms that Steven Dick, a 37-year-old diplomat
    to their mission in Budapest, has died from COVID-19. (Yahoo News)
  - COVID-19 pandemic in Spain
  - Spain surpasses China in the number of COVID-19-related deaths and becomes the
    country with the second-most deaths, after an increase of 738 in a single day.
    (Independent)
  - First Deputy Prime Minister Carmen Calvo tests positive for COVID-19. She was
    admitted to hospital on Sunday and becomes the third member of the Spanish government
    to be diagnosed with the virus. (CNBC)
  - COVID-19 pandemic in the United Kingdom
  - Charles, Prince of Wales tests positive for COVID-19 while Camilla, Duchess of
    Cornwall tests negative; both now self-isolate due to the health classifications.
    (BBC News)
  - The first death from COVID-19 is confirmed in the Channel Islands, an elderly
    patient at a hospital in Jersey. (ITV News)
  - COVID-19 pandemic in France
  - President Emmanuel Macron announces the launch of military and investments in
    their health system in an attempt to fight COVID-19. (France 24) (Euronews)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Mali, COVID-19 pandemic in Guinea-Bissau
  - The first COVID-19 cases are confirmed in Mali and Guinea-Bissau. (Anadolu Agency)
  Law and crime:
  - COVID-19 pandemic in the Philippines
  - President Rodrigo Duterte signs a law granting him special temporary powers to
    direct the operations of private hospitals and take over public transportation.
    (NPR)
  - Assassination of Jamal Khashoggi, Saudi Arabia–Turkey relations
  - Turkey indicts 20 Saudis for the assassination of Jamal Khashoggi. (The New York
    Times)
  - Transportation in Dubai, COVID-19 pandemic in the United Arab Emirates
  - Dubai lifts their ban on trucks weighing 2.5 tonnes as an effort to contain COVID-19.
    (Gulf News)
  - Former Ukrainian Foreign Minister Leonid Kozhara is arrested by security forces
    on charges of murdering advertising mogul Sergiy Starytsky. (Deutsche Welle)
  Politics and elections:
  - 2020 Russian constitutional referendum, COVID-19 pandemic in Russia
  - President Vladimir Putin postpones a referendum on constitutional changes that
    could extend his time in office for two more six-year terms because of the COVID-19
    pandemic. Putin's current term runs through 2024. (BBC News)
  - Impact of the COVID-19 pandemic on politics
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Ohio
  - The Ohio Senate passes a coronavirus relief bill, which includes extending mail-in
    voting for the Ohio primary by April 28. (Cleveland.com)
  - COVID-19 pandemic in Kosovo, Government of Kosovo
  - A motion of no confidence filed by junior coalition partner Democratic League
    of Kosovo (LDK) against Prime Minister Albin Kurti passes with 82—32 votes, toppling
    the Kurti cabinet. Vetëvendosje now has 15 days to nominate a new Prime Minister.
    (Deutsche Welle) (The New York Times via The Indian Express) (The Guardian)
