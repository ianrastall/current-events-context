Date: '2020-03-08'
Source_URI: Portal:Current events/2020 March 8
Intelligence_Payload:
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - The first COVID-19 death is confirmed in Canada. (CBC News)
  - COVID-19 pandemic in Mexico
  - Women in Mexico march despite COVID-19 concerns and protests being cancelled in
    other parts of the world due to concerns over the spread of the disease. (NPR)
  - Women protest femicides in all major cities in Mexico, despite raise of COVID-19
    cases. (The Washington Post)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California, COVID-19 pandemic in Connecticut
  - Connecticut confirms its first case of COVID-19 in Wilton, which is believed to
    have been contracted during a trip to California. (The New York Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Albania
  - Albania reports its first case. (Reuters)
  - COVID-19 pandemic in Moldova
  - Moldova reports its first case. (Reuters)
  - COVID-19 pandemic in Italy
  - Chief of Staff of the Italian Army Salvatore Farina tests positive for COVID-19
    and self-isolates, as well as President of Piedmont Alberto Cirio. (BBC News)
  - COVID-19 pandemic lockdown in Italy
  - Italian Prime Minister Giuseppe Conte extends the quarantine lockdown, to cover
    all the region of Lombardy and 14 other northern provinces, affecting over a quarter
    of the national population. (BBC News)
  - The number of virus-related deaths in Italy rise to 366, while the confirmed cases
    are 7,375. (Sky Tg24)
  - Inmates at several prisons in Italy revolt with reports of riots at prisons in
    Modena, Foggia, Naples, Frosinone and Alessandria due to fears the coronavirus
    lockdowns will end visits from relatives. At least eight inmates, six in Modena,
    have died of overdose after assaulting the prison's pharmacy, while about 20 escaped
    in Foggia. (Open)
  - COVID-19 pandemic in Portugal
  - President of Portugal Marcelo Rebelo de Sousa self-isolates after a COVID-19 case
    is confirmed in a school he visited a few days ago. (U.S. News & World Report)
  - COVID-19 pandemic in Russia
  - Three new COVID-19 cases are registered in Russia (one is in Kaliningrad Region,
    one is in Belgorod Region, one is in Moscow Region). All of them visited Italy
    within the past 14 days. (Sputnik)
  - COVID-19 pandemic in Iran
  - Twenty-seven people have died from methanol poisoning in Iran after rumors that
    drinking alcohol can help cure the coronavirus infection, state news agency IRNA
    reported on Monday. (BOL News)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - California U.S. Senator and former presidential candidate Kamala Harris endorses
    former Vice President Joe Biden in his campaign for the Democratic nomination
    for the presidency. (The New York Times)
  - Civil rights activist Jesse Jackson endorses Vermont U.S. Senator Bernie Sanders
    in his campaign for the Democratic nomination for the presidency. (The New York
    Times)
  Law and crime:
  - Following the death of 25-year-old Ingrid Escamilla, who was killed by her boyfriend
    in February, women march against violence against women in Mexico's capital on
    International Women's Day, ahead of the 24-hour female strike scheduled for Monday.
    (Sputnik)
  Sports:
  - 2020 ICC Women's T20 World Cup Final
  - Australia wins the tournament, beating India by 85 runs, to win their fifth title.
    (BBC Sport)
