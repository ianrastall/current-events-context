Date: '2020-03-22'
Source_URI: Portal:Current events/2020 March 22
Intelligence_Payload:
  Arts and culture:
  - COVID-19 pandemic in Vatican City
  - Pope Francis, in a call for a worldwide prayer, announces he will hold a special
    service to pray for the end of the coronavirus pandemic. (Reuters)
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in the United Arab Emirates
  - Dubai-based airline Emirates announces that it will be suspending all passenger
    flights effective March 25 in response to the coronavirus pandemic, but will continue
    to operate cargo flights for essential goods. (Associated Press)
  - Economy of the United States, COVID-19 pandemic in the United States
  - The U.S. Senate votes down a coronavirus relief stimulus bill. (CNBC)
  - U.S. Senate Majority Leader Mitch McConnell is expected to set up a second vote
    on a coronavirus relief stimulus bill for Monday. (The Hill)
  Disasters and accidents:
  - 2020 Zagreb earthquake
  - A 5.3-magnitude earthquake hits Zagreb, Croatia. Seventeen people are injured;
    one passes away. The earthquake is Zagreb's largest since 1880. (RT) (BBC News)
    (Bloomberg News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - India observes a 14-hour nationwide self-imposed Janata Curfew amid the coronavirus
    pandemic. (The Economic Times)
  - India suspends the entry of international flights due to the coronavirus. (NDTV)
  - COVID-19 pandemic in the Palestinian territories
  - The Palestinian National Authority confirms the first cases of COVID-19 in the
    Gaza Strip. Both patients are Palestinian men in their 30s who recently returned
    from Egypt. They are being held in quarantine in the border town of Rafah. (Haaretz)
  - COVID-19 pandemic in Afghanistan
  - Afghanistan's Ministry of Public Health reports its first death from COVID-19,
    a 40-year-old man in Balkh Province. (Reuters)
  - COVID-19 pandemic in Uzbekistan
  - Uzbekistan orders companies in Tashkent to do remote working and makes protective
    masks as an effort to contain the coronavirus. (Reuters)
  - COVID-19 pandemic in mainland China, 2020 Hubei lockdowns
  - China reports only one domestic case of COVID-19 but reports 45 imported cases.
    (CNN-News 18)
  - The Civil Aviation Administration of China says that flights to Beijing will be
    diverted to 12 Chinese airports for screening amid the coronavirus pandemic. (China
    Daily)
  - COVID-19 pandemic in Iraq
  - Iraq issues a lockdown until March 28 in an effort to contain the coronavirus.
    (Al Arabiya)
  - COVID-19 pandemic in Turkey
  - Turkey's Ministry of Health reports that the country's COVID-19 death toll stands
    at 30, with a total of 1,236 confirmed cases. (Hürriyet Daily News)
  - COVID-19 pandemic in Syria
  - The government announces the war-torn country's first confirmed case of COVID-19.
    (Daily Sabah)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - Italy raises its COVID-19 death toll to 5,476. (WION)
  - COVID-19 pandemic in Spain
  - Prime Minister of Spain Pedro Sánchez tells the Congress of Deputies the country
    will to extend its state of alarm, implemented due to the coronavirus, for an
    additional 15 days. (CNN) (El País)
  - Spain's Ministry of Health reports 394 more deaths from COVID-19, the highest
    number of deaths in a single 24-hour period in the country to date. The total
    number of confirmed cases now stands at 28,572 with 1,720 deaths. Prime Minister
    Pedro Sánchez says "the worst is yet to come". (Reuters)
  - Tenor Plácido Domingo announces he has tested positive for COVID-19. (Daily Mirror)
  - COVID-19 pandemic in the Czech Republic
  - The Czech Republic reports the country's first death from COVID-19, a 95-year-old
    man from the capital city of Prague. (Radio Prague International)
  - COVID-19 pandemic in Romania
  - Romania reports the country's first death from COVID-19, a 67-year-old man from
    the town of Filiași. (Romania-Insider)
  - COVID-19 pandemic in France
  - French Health Minister Olivier Véran confirms the first death of a doctor treating
    COVID-19 patients. (France 24)
  - COVID-19 pandemic in Greece
  - Prime Minister Kyriakos Mitsotakis orders a nationwide lockdown starting March
    23. (Greek Reporter)
  - COVID-19 pandemic in Andorra
  - Andorra reports its first death from COVID-19. (The New York Times)
  - COVID-19 pandemic in Germany
  - Chancellor of Germany Angela Merkel self-isolates after being in contact with
    a doctor infected with COVID-19. (CNBC)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Colombia
  - Riots break out at several prisons in Colombia over COVID-19 fears. Residents
    report explosions and gunfire inside La Modelo prison in the capital Bogotá. Inmates
    release a statement demanding the government allow vulnerable prisoners to be
    granted house arrest. (Colombia Reports)
  - Colombian Justice Minister Margarita Cabello Blanco says 23 prisoners are dead
    and 83 others are injured following an attempted "mass criminal escape" at La
    Modelo prison and other detention centers. Two guards are also in critical condition.
    (Reuters)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York
  - Former film producer and convicted sex offender Harvey Weinstein tests positive
    for COVID-19. He is put in isolation at the Wende Correctional Facility. (The
    Daily Beast)
  - COVID-19 pandemic in Ohio, COVID-19 pandemic in Louisiana
  - Louisiana declares a lockdown due to the coronavirus. (Reuters)
  - Ohio Governor Mike DeWine issues a stay-at-home order. Grocery stores, pharmacies
    and manufacturing industries deemed "essential" will remain open. (Cleveland)
  - COVID-19 pandemic in Maryland
  - Ocean City, Maryland announces that their beaches will be closed to slow down
    the spread of coronavirus. (The Indianapolis Star)
  - U.S. Senator from Kentucky Rand Paul tests positive for COVID-19. Mitt Romney
    and Mike Lee self-quarantine for 14-days despite not testing. (Politico) (The
    Hill)
  - COVID-19 pandemic in Australia
  - Prime Minister Scott Morrison announces the country is shutting down non-essential
    services effective midday Monday for pubs, clubs, gyms, cinemas and places of
    worship, while restaurants and cafes will have to switch to takeaway only. The
    number of cases in Australia has risen to 1,315. (BBC News)
  International relations:
  - Italy–Russia relations, COVID-19 pandemic in Italy
  - The Russian military sends medical help and disinfection tools to Italy to battle
    the coronavirus. (Reuters)
  Politics and elections:
  - 2020 Guinean legislative election, 2020 Guinean constitutional referendum
  - Despite violent protests, boycotts from the political opposition and fears about
    potential coronavirus infections, legislative elections are held in Guinea next
    to a controversial referendum. (Al Jazeera)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - COVID-19 pandemic in Australia
  - The 2020 AFL season has been postponed to May 31 after South Australia and Western
    Australia close their borders to all non-essential travelers, and both New South
    Wales and Victoria engage a total lockdown. (News.com.au)
  - Impact of the COVID-19 pandemic on the 2020 Summer Olympics
  - Fans attend the Olympic flame despite the coronavirus. (Republic TV)
  - After ruling out cancelling the Olympics, the International Olympic Committee
    considers postponing the Olympics to 2021. They set a deadline to decide within
    the next four weeks. (USA Today)
  - The Canadian Olympic Committee and Canadian Paralympic Committee announce that
    they will not be sending athletes to the Summer Games in 2020. (CBC News)
