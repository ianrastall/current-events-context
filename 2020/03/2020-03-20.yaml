Date: '2020-03-20'
Source_URI: Portal:Current events/2020 March 20
Intelligence_Payload:
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in Japan, Economic impact of the COVID-19 pandemic in the United
    Kingdom
  - Japanese car manufacturer Nissan suspends production indefinitely at its major
    Nissan Motor Manufacturing UK plant in Sunderland, Tyne and Wear, over the coronavirus
    pandemic. (Evening Chronicle)
  - The British government announces a stimulus plan to counter the socioeconomic
    impacts of the coronavirus pandemic, which includes the government paying a portion
    of citizens' wages. (Bloomberg News)
  - Economic impact of the COVID-19 pandemic in the United States
  - The United States moves Tax Day from April 15 to July 15 due to the spread of
    the coronavirus. (CNN)
  - United Airlines announces it will cancel 95 percent of its international flights
    starting next month. (USA Today)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Argentina
  - Argentina begins a mandatory national quarantine until March 31, restricting people
    to their homes to prevent the spread of the coronavirus. People will only be allowed
    to leave their homes to shop for basic goods, like food and medicine, according
    to President Alberto Fernández. (Reuters)
  - COVID-19 pandemic in Paraguay
  - The first death from COVID-19 is reported in Paraguay, a 69-year-old man who had
    been hospitalized in intensive care, while the total of those infected rises to
    18. (The New York Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - The death toll from COVID-19 in Spain exceeds 1,000 while the total number of
    those infected reaches 20,000. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - NHS England increases the United Kingdom's COVID-19 death toll to 184. The patients
    who died were aged between 50 and 99 and had underlying health conditions. (Sky
    News) (ITV News)
  - COVID-19 pandemic in Poland
  - Poland declares a 'state of epidemic' amid the coronavirus pandemic, Prime Minister
    Mateusz Morawiecki announces at a press conference late on Friday. Two-week suspension
    of schools, introduced earlier this month, would be extended until after the Easter
    holidays. The government announces that fines for anyone breaking coronavirus
    quarantine increase from the current PLN 5,000 up to PLN 30,000 (EUR 6,600, USD
    7,050). (Politico Europe)
  - COVID-19 pandemic in Iceland
  - The first death from COVID-19 is confirmed in Iceland. (The Guardian)
  - COVID-19 pandemic in Oceania
  - Papua New Guinea reports its first confirmed case of COVID-19, a male patient
    from Spain currently being isolated in Lae. The country will also close its borders.
    (Papua New Guinea Today) (Radio New Zealand)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hubei, COVID-19 pandemic in mainland China
  - China reports zero domestic cases of COVID-19 for a second consecutive day. (The
    Hill)
  - The World Health Organization says China reporting zero domestic cases of COVID-19
    for two days in a row should "give the world hope." (SBS World News)
  - COVID-19 pandemic in Sri Lanka
  - The Sri Lankan government imposes a nationwide curfew to contain COVID-19. Mosques
    across the nation are closed. (Reuters)
  - COVID-19 pandemic in Israel
  - Israel reports its first death from COVID-19, an 88-year-old Holocaust survivor
    with pre-existing health conditions. (The Jerusalem Post) (The Times of Israel)
  - COVID-19 pandemic in Iran
  - Iran's Ministry of Health and Medical Education says the country's COVID-19 death
    toll stands at 1,433, and confirms 1,237 new cases, bringing the total number
    of cases to 19,644 and 1,433 deaths. (Anadolu Agency)
  - COVID-19 pandemic in the Philippines
  - Disinfection begins in La Trinidad, the capital of the Philippines province Benguet,
    in an effort to contain the coronavirus. (Sun.Star)
  - COVID-19 pandemic in the United Arab Emirates
  - The United Arab Emirates announces its first two deaths from COVID-19. (The New
    York Times)
  - Dubai Municipality begins an 11-day sterilization campaign in an effort to contain
    the coronavirus. (Gulf News)
  - COVID-19 pandemic in Nepal
  - In a special TV address, Prime Minister KP Sharma Oli announces the suspension
    of all international flights until 31 March and internal long-distance public
    bus routes, while orders the closure of all non-essential public and private office
    until 3 April. (Reuters)
  - The Supreme Court stops all non-urgent legal proceedings at all levels across
    the country. The National Assembly also suspends its activity indefinitely. (The
    Himalayan Times) (My Republica)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Cuba
  - In an effort to further prevent the spread of COVID-19, Cuba announces a ban on
    tourism and most air travel, starting Tuesday. This restriction does not apply
    to citizens and residents. (Miami Herald)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Illinois
  - Illinois Governor J. B. Pritzker issues a statewide stay-at-home order for all
    Illinoisans except for essential errands such as grocery shopping or for medical
    services. (WMAQ-TV)
  - COVID-19 pandemic in New York
  - New York Governor Andrew Cuomo issues a statewide stay-at-home order for all New
    Yorkers except for essential errands such as grocery shopping or for medical services.
    (CNN)
  - COVID-19 pandemic in Connecticut
  - Connecticut Governor Ned Lamont issues a statewide stay-at-home order for all
    Connecticuters except for essential errands such as grocery shopping or for medical
    services. (United Press International)
  - COVID-19 pandemic in Michigan
  - A fourth death from COVID-19 is reported in Michigan, a man in his 50s with underlying
    health conditions in Oakland County. (MLive)
  - COVID-19 pandemic in Arizona
  - Arizona records its first death from COVID-19, a Maricopa County man in his 50s
    with underlying health conditions. (KPNX)
  - The Donald Trump administration announces it will limit nonessential travel between
    the United States and Mexico. (CNN)
  - The Washington Post reports that U.S. intelligence agencies repeatedly warned
    President Trump about the threats posed by COVID-19 in January and February, but
    administration officials say they "just couldn't get him to do anything about
    it." (The Washington Post)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Madagascar
  - Madagascar confirms its first cases of COVID-19. (National Post)
  Law and crime:
  - Capital punishment in India
  - India executes four men convicted of the 2012 Delhi gang rape and murder case.
    (Reuters)
  - Cannabis in Ghana
  - The parliament of Ghana votes to legalize the medical and industrial use of cannabis.
    (GhanaWeb)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - 2020 Summer Olympics
  - International Olympic Committee President Thomas Bach says that canceling the
    2020 Summer Olympics due to the coronavirus pandemic "is not on the agenda," but
    says it is too early to make a decision. (The New York Times)
