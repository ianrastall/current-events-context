Date: '2020-03-26'
Source_URI: Portal:Current events/2020 March 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kabul gurdwara attack
  - A bomb explodes near a Sikh crematorium in Kabul, wounding a child and disrupting
    funerals for 25 people bombed and shot the day prior. (Times of India)
  - Mali War
  - Malian opposition leader Soumaïla Cissé and six others are taken hostage by jihadists
    in the northern Tombouctou Region. Cissé's bodyguard was killed and two others
    injured in the ambush. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - The death toll from COVID-19 in the U.S. reaches 1,200. The total number of cases
    in the country is 83,097. The U.S. has surpassed China in number of active cases,
    making it the country with the most cases in the world. (Worldometer)
  - U.S. state and local government response to the COVID-19 pandemic
  - COVID-19 pandemic in Colorado
  - Colorado Governor Jared Polis issues a stay-at-home order until April 11. (Chicago
    Suntimes)
  - COVID-19 pandemic in New Hampshire
  - New Hampshire Governor Chris Sununu issues a stay-at-home order until May 4. (WMUR)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Samoa
  - Samoa begins a national lockdown announced by the Prime Minister. Those who do
    not comply with the lockdown's requirements will be fined. (RNZ)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - The Congress of Deputies approves extending the Alarm Status until 12 April. (El
    País)
  - Spain's Ministry of Health reports 655 more deaths from COVID-19, bringing the
    country's death toll to over 4,000. (Reuters)
  - Real Madrid CF's Santiago Bernabéu Stadium is to be used to store medical materials.
    (The Guardian)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports 103 more deaths from COVID-19,
    the highest daily death toll in the country to date, bringing the death toll in
    the United Kingdom to 578 and 11,658 confirmed cases. (BBC News)
  - An 84-year-old inmate at HMP Littlehey in Cambridgeshire has become the first
    UK prisoner to die from COVID-19, according to the Ministry of Justice. (The Guardian)
  - COVID-19 pandemic in the Republic of Ireland
  - The Republic of Ireland reports 255 new confirmed cases of COVID-19 and 10 more
    deaths, doubling the country's death toll to 19. The median age of the 19 patients
    who have died is 79 years old. (Metro)
  - COVID-19 pandemic in France
  - France reports 365 more deaths from COVID-19, bringing the country's total to
    1,696. French health authorities say 3,375 people with the virus remain in serious
    condition requiring life support. (France 24)
  - COVID-19 pandemic in Armenia
  - Ministry of Health confirms the first death in the country from COVID-19. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - China announces that travel will be suspended to the country as imported cases
    increase. (Newsweek)
  - COVID-19 pandemic in the United Arab Emirates
  - The United Arab Emirates is expected to impose night curfew to tackle COVID-19
    as the country begins a nationwide disinfection campaign. (Middle East Eye)
  - COVID-19 pandemic in Afghanistan
  - Afghanistan is to release 10,000 prisoners over the age of 55 in response to the
    coronavirus pandemic. Those released will not include members of the Taliban and
    ISIL. (Reuters)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Nicaragua
  - Nicaragua reports the country's first death from COVID-19, a patient with HIV/AIDS.
    (Reuters)
  - COVID-19 pandemic in Venezuela
  - Venezuelan Vice President Delcy Rodríguez reports the country's first death from
    COVID-19. (Reuters)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Ethiopia
  - Ethiopian President Sahle-Work Zewde pardons more than 4,000 prisoners in an attempt
    to prevent coronavirus spread. (CNN)
  International relations:
  - Iran–United States relations, Iraq–United States relations
  - The United States Treasury Secretary imposes fresh sanctions on Iran, blacklisting
    20 Iran- and Iraq-linked companies and individuals. (Reuters)
  - 2020 G20 Riyadh summit
  - World leaders convene virtually to coordinate a response to the ongoing coronavirus
    pandemic. (ABC News)
  - United States–Venezuela relations
  - The United States Justice Department announces charges against Venezuelan President
    Nicolás Maduro for drug trafficking, offering up to a $15 million award for his
    arrest. (CBS News) (Reuters)
  Law and crime:
  - Christchurch mosque shootings
  - Brenton Tarrant pleads guilty to murdering 51 people and attempting to murder
    40 as well as a terrorism charge in relation to two mass shootings in Christchurch,
    New Zealand, on 15 March 2019. (BBC News)
  - A Texas man is arrested for making death threats to House Speaker Nancy Pelosi
    and other Democrats on Facebook. (New York Times)
  Science and technology:
  - The United States Space Force launches its first satellite into space aboard an
    Atlas V rocket. (CBS News)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - 2020 WNBA draft
  - The WNBA draft will go as planned on April 17, but will be a virtual event due
    to the coronavirus. (Reuters)
  - The 2020 Indianapolis 500 will be delayed until August 23, marking the first time
    in history that the event will not be held in May. (Indianapolis Star)
  - The Candidates Tournament 2020 is suspended after seven of 14 matches, following
    Russia's closure of international air traffic. (chess24.com)
