Date: '2020-09-05'
Source_URI: Portal:Current events/2020 September 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mali War
  - Operation Barkhane
  - Ten Malian soldiers are killed during an ambush in Nara, Koulikoro, Mali. The
    attackers placed mines, which caused explosions after the army's vehicle passed,
    and then opened fire against the soldiers. (Koaci)
  - Two French soldiers are killed when their armoured vehicle hits an IED in Kidal
    Region. (France 24)
  - Somali Civil War
  - Clashes between armed civilians and Al-Shabaab militants leaves 14 civilians and
    16 militants dead in Galmudug, central Somalia. They began when the Islamist militants
    demanded villagers surrender their weapons and livestock. (Al Jazeera)
  Disasters and accidents:
  - 2020 Pacific typhoon season
  - Typhoon Haishen approaches Japan, threatening the coasts of Okinawa and the island
    of Kyushu. Chief Cabinet Secretary Yoshihide Suga says the government is setting
    up a crisis response team and urges people to take precautions. Officials compare
    the typhoon to Typhoon Vera, which in 1959 killed more than 5,000 people. (ABC
    News)
  - The Rodong Sinmun reports that the North Korean government has "punished" local
    officials for failing to evacuate residents amid the landfall of Typhoon Maysak,
    resulting in a "serious incident" involving numerous casualties. (Kyodo News)
  - 2020 California wildfires
  - The El Dorado Fire grows to , prompting emergency evacuations in Oak Glen, Mountain
    Home Village, Yucaipa, and Forest Falls. (Fox News) (The Desert-Sun)
  - The Pacific Gas and Electric Company warns customers that power could be shut
    off in some areas of California due to extreme weather and high winds. (The Mercury
    News)
  - 2020 Atlantic hurricane season
  - Two more people in Louisiana die from Hurricane Laura, bringing the statewide
    death toll to 25. A 52-year old man in Grant Parish died from heat-related illness
    while removing storm debris, and a 25-year old man in Natchitoches Parish died
    from electrocution. (Time)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - Impact of the COVID-19 pandemic on education
  - COVID-19 pandemic in New York
  - More than 20 students at New York University are suspended for violating their
    COVID-19 policies. (NBC News)
  - COVID-19 pandemic in Massachusetts
  - Northeastern University dismisses 11 students for violating COVID-19 guidelines.
    (CBS News)
  - COVID-19 pandemic in Hawaii
  - Hawaii County closes their beaches and shoreline parks through September 19 in
    an effort to stop the spread of COVID-19. (The Honolulu Star-Advertiser)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Delhi
  - Delhi records 2,973 cases, the city's highest since June 26. (The Times of India)
  - India surpasses four million cases after reporting 86,432 new infections in the
    past 24 hours. The health ministry also reports 1,089 deaths for a total of 69,561.
    (AP)
  - COVID-19 pandemic in Iran
  - Schools, including Islamic seminaries, reopen to some 15 million students after
    a seven-month closure. (AAP via The Canberra Times)
  - COVID-19 pandemic in South Korea
  - 510 cases in South Korea are linked to anti-government protests. (CNN)
  - COVID-19 pandemic in South Africa
  - South Africa is expected to begin a trial of the NVX-CoV2373, a vaccine candidate
    produced by Novavax. Around 2,904 volunteers are expected to be selected, who
    are aged from 18 to 64 years. (MyJoyOnline)
  - COVID-19 pandemic in Portugal
  - Portugal reports 486 cases, their biggest increase since their lockdown was lifted
    in May. (Reuters)
  - Climate movement
  - Environmental activists of the Extinction Rebellion movement in England gather
    around several printing presses used by the Rupert Murdoch-owned publishing company
    News Corp in the towns of Broxbourne, Hertfordshire, and Knowsley, Merseyside,
    criticising the coverage of global warming by News Corp-owned newspapers. At least
    34 protesters are arrested, while the protests lead to delays in the dissemination
    of the newspapers. (DW) (Reuters via The Sydney Morning Herald)
  Law and crime:
  - Protests over responses to the COVID-19 pandemic
  - COVID-19 pandemic in Australia
  - Twenty unmasked protesters are arrested during anti-lockdown protests at the Shrine
    of Remembrance in Melbourne. (SBS)
  - COVID-19 pandemic in Israel
  - Israelis protest against Prime Minister Benjamin Netanyahu for his response to
    the outbreak as cases increase in the country, as well as calling for his resignation.
    (ABC News)
  - 2020 Belarusian protests
  - Opposition activist Olga Kovalkova flees to Poland after her release from prison.
    Kovalkova reported that authorities warned her of further arrests if she did not
    leave the country. Kovalkova had been sentenced to 10 days in prison on August
    25. (Reuters)
  - Killing of Daniel Prude
  - The fourth night of protests in Rochester, New York, over the death of Daniel
    Prude, becomes the largest so far, and again it ends with pepper balls, tear gas,
    and fireworks. Rochester Police Department arrests nine people, including two
    on felony charges. Three officers are also treated at the hospital for injuries.
    A U-Haul truck is set on fire in a parking lot before firefighters arrive to put
    it out. (The Democrat & Chronicle)
  Sports:
  - 2020 Kentucky Derby
  - The 146th Kentucky Derby is held after being delayed for four months due to the
    COVID-19 pandemic. In an upset, racehorse Authentic wins the Derby over the favored
    Tiz the Law, precluding the latter's chances of winning this year's Triple Crown.
    (The Washington Post) (WLKY-TV)
