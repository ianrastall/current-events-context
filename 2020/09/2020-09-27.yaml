Date: '2020-09-27'
Source_URI: Portal:Current events/2020 September 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mexican drug war
  - A mass shooting in Jaral del Progreso, Guanajuato, leaves at least 11 people dead
    and one injured. (Reuters)
  - Nagorno-Karabakh conflict
  - 2020 Nagorno-Karabakh conflict
  - The Armenian and Azerbaijani armed forces clash along the border of the unrecognized
    Republic of Artsakh, formerly known as the Nagorno-Karabakh Republic. Several
    cities in Artsakh, including its capital city of Stepanakert, are under attack.
    At least 23 people are killed during the battle, of whom 16 are Nagorno-Karabakh
    servicemen, five Azerbaijani civilians and two Armenian civilians. (BBC News)
  - Armenia and the self-proclaimed Republic of Artsakh declare martial law and a
    full mobilization of its Artsakh Defence Army amid an Azerbaijani invasion. Azerbaijani
    Armed Forces say they have captured six Armenian villages. (The Guardian)
  - In a live televised address to the nation, Armenian Prime Minister Nikol Pashinyan
    declares a general mobilization and orders citizens to "get ready to defend our
    sacred homeland", following the clashes with Azerbaijan in Nagorno-Karabakh. (The
    National)
  - Azerbaijani President Ilham Aliyev declares martial law, and imposes curfews from
    9 p.m. to 6 a.m. in major cities, including the capital Baku, in response to the
    clashes between Azeri and Armenian forces in Nagorno-Karabakh. (Reuters) (ANI)
  - Azerbaijan's Ministry of Defence says advancing Azerbaijani troops have "liberated"
    the strategic Murovdag mountain peak, which was the scene of a previous battle
    in 1993, that ended in Armenian victory. (Trend)
  - Yemeni Civil War
  - The United Nations Special Envoy for Yemen Martin Griffiths announces that the
    Houthis and the Saudi-backed Yemeni government have agreed to a prisoner swap
    of 1,081 detainees. The release will include 400 government prisoners and 681
    Houthi fighters. (Reuters)
  Business and economy:
  - China–United States trade war, Censorship of TikTok
  - The U.S. District Court for the District of Columbia temporarily blocks U.S. President
    Donald Trump's executive order banning TikTok from smartphone app stores hours
    before it was to go into effect, after lawyers representing the app's company
    ByteDance argued its ban would constitute a form of censorship. (NPR)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Australia
  - Victorian premier Daniel Andrews announces a plan to lift a nighttime curfew between
    9:00 p.m. to 5:00 a.m. (AEST) local time in Melbourne and ease many restrictions
    across Victoria, including returning pupils to school and relaxing restrictions
    on outdoor gatherings effective tomorrow. However, the state introduces a fine
    of almost $5,000 for those violating any gathering rules. (The Guardian)
  - COVID-19 pandemic in the Netherlands
  - The number of daily new cases in the Netherlands hits a record 2,995 cases in
    the past 24 hours, according to data from health ministry. (Reuters)
  Law and crime:
  - 2020 Belarusian protests
  - Police carry out mass arrests as thousands of people gather for new protests;
    more than 50 protesters are arrested. (BBC News)
  - 2020 Swiss referendums
  - Swiss voters reject the proposal, from the right-wing Swiss People's Party, to
    end an accord with the European Union that allows free movement of people. (BBC
    News)
  Politics and elections:
  - Tax returns of Donald Trump
  - The New York Times reports that it has obtained more than two decades of tax-return
    data for Donald Trump and his business enterprises, including The Trump Organization.
    The documents show that Trump paid no federal income tax in 11 of the last 15
    years, and paid just $750 in income taxes in 2016, and $750 in 2017. (BBC News)
  Sports:
  - 2020 NBA playoffs
  - The Miami Heat advance to the NBA Finals with a 125–113 victory against the Boston
    Celtics in game 6. (Washington Post)
