Date: '2020-09-12'
Source_URI: Portal:Current events/2020 September 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency
  - 2020 Iraq attacks
  - Two bombs are detonated, killing a civilian, in Mosul. (National Iraqi News Agency)
  - Second Libyan Civil War
  - The United States embassy in Libya reports that the Libyan National Army (LNA),
    commanded by Khalifa Haftar, has committed itself to end months-long blockade
    of oil facilities, saying that "the LNA had conveyed personal commitment from
    General Haftar to allow the full reopening of the energy sector no later than
    September 12". (Reuters)
  Disasters and accidents:
  - A fire kills at least four people and injures another eight in Karachi, Pakistan.
    (Dawn)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in France
  - French health authorities report 10,561 new confirmed cases in the past 24 hours,
    a new daily record for France as the number tops 10,000 for the first time. (France
    24)
  - COVID-19 pandemic in India
  - India's total COVID-19 cases surged to 4,65 million after the country reports
    world's record daily jump of 97,570 new cases and 1,201 deaths in the last 24
    hours. (Hindustan Times)
  International relations:
  - Afghan peace process
  - The first peace talks between the government and the Taliban start in Doha, Qatar.
    The Taliban had confirmed it would attend after the final release of six of their
    prisoners. Abdullah Abdullah, representing the government, says they are seeking
    a "dignified peace" while U.S. Secretary of State Mike Pompeo calls the meeting
    "historic". (BBC News)
  - Aegean dispute, France–Greece relations
  - Greek Prime Minister Kyriakos Mitsotakis announces an arms deal with France for
    the purchase of Dassault Rafale fighter aircraft and FREMM multipurpose frigates,
    as well as the recruitment of 15,000 additional troops, amid ongoing tension in
    the eastern Mediterranean. (AFP via The Straits Times)
  Law and crime:
  - 2019–2020 Colombian protests
  - Protests against police brutality in Colombia rage for third day in Bogotá. The
    death toll from the protests rise to 13 people killed. (Al Jazeera)
  - Capital punishment in Iran
  - Iran executes Navid Afkari, a wrestler who was convicted of killing a security
    guard during anti-government protests in 2018. According to media, which quoted
    the judiciary in Fars, the execution was carried out after insistence from the
    victim's family. Activists and Afkari's family claim he made a forced confession
    to the crime. (DW) (CNN)
  Politics and elections:
  - Aftermath of the 2020 Malian coup d'état
  - Weeks after ousting President of Mali Ibrahim Boubacar Keïta, the military announced
    the formation of a transitional government with the goal to enable elections in
    18 months. The move is criticised by civilian protest groups. (DW)
