Date: '2020-09-15'
Source_URI: Portal:Current events/2020 September 15
Intelligence_Payload:
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Mongolia
  - The government announces the re-opening of retail stores, cultural and public
    events, production, and entertainment centers tomorrow, as well as schools, universities,
    and kindergartens on September 21. However, the country's borders will remain
    closed. (News.mn)
  - COVID-19 pandemic in Brazil
  - Brazil reports 1,113 deaths, the country's highest in two weeks, thus bringing
    the death toll to 133,119. (Reuters)
  International relations:
  - Canada–United States relations
  - Canada–United States trade relations, Trump tariffs
  - The United States announces the suspension of the 10 percent tariff imposed on
    Canadian aluminum imports since August with the Office of the U.S. Trade Representative
    citing a "sharp" decline in imports for the decision. (AFP via RFI)
  - European migrant crisis, Germany–Greece relations
  - Germany agrees to take 1,500 migrants from Greece following a devastating fire
    at the Moria Refugee Camp on the island of Lesbos. (Euronews)
  - Turkish Volkan Bozkır becomes the new President of the United Nations General
    Assembly. (UN News)
  Law and crime:
  - Immigration detention in the United States
  - A whistleblower working at an Immigration and Customs Enforcement facility in
    Georgia details a high rate of hysterectomies and other alleged medical neglect
    in a complaint to the Department of Homeland Security. Rep. Bennie Thompson, the
    House Homeland Security Committee chairman, says the allegations of hysterectomies
    being performed on women without consent are "incredibly disturbing". (CNN) (BBC
    News)
  - Poisoning of Alexei Navalny
  - Russian opposition figure Alexei Navalny issues his first public statement since
    his poisoning via Instagram, having been taken off the ventilator the previous
    day. (AFP via RTL Today)
  - Insurgency in Cabo Delgado
  - A woman is killed in Cabo Delgado, Mozambique, by soldiers accusing her of being
    an Islamic State-linked group militant. A soldier beat her with a stick several
    times before the rest of the group was ordered to "kill her on the side of the
    road" and shoot her. The murder is condemned by human rights groups, while authorities
    promise an investigation. (BBC News)
  - Shooting of Breonna Taylor
  - The city of Louisville, Kentucky, settles a wrongful death lawsuit with the family
    of Breonna Taylor, who was killed in a raid on her apartment by police in March.
    Her family will receive $12 million and several police reforms will also be enacted
    in the city as part of the agreement. (CNN)
  - Lebanon Ohio Fifth Third Bank Robbery
  - A bank robbery occurs at a Fifth Third Bank in Warren County, Ohio. (Dayton Daily
    News)
