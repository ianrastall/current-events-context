Date: '2020-09-20'
Source_URI: Portal:Current events/2020 September 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kivu conflict
  - 2020 Democratic Republic of the Congo massacres
  - Allied Democratic Forces militants kill 10 civilians in the town of Mbau, Democratic
    Republic of the Congo. (Anadolu)
  Business and economy:
  - FinCEN Files
  - BuzzFeed News and the International Consortium of Investigative Journalists release
    the FinCEN files, a collection of 2,657 documents relating to the Financial Crimes
    Enforcement Network. (BuzzFeed News) (BBC News)
  Disasters and accidents:
  - Two Norwegian People's Aid employees are killed in an explosion in a residential
    area of Honiara, Solomon Islands, while clearing unexploded ordnance left over
    from the Pacific War of World War II. (BBC News)
  International relations:
  - Honduras–Israel relations, Status of Jerusalem
  - Honduran President Juan Orlando Hernández informs Israeli Prime Minister Benjamin
    Netanyahu over telephone of his plans to move the embassy of Honduras in Israel
    to Jerusalem from Tel Aviv by the end of the year. (Anadolu)
  Law and crime:
  - 2020–2021 United States racial unrest, Shooting of James Scurlock
  - Jacob Gardner, an Omaha, Nebraska bar owner who was charged for fatally shooting
    James Scurlock during a George Floyd protest in the state, dies from suicide.
    (The New York Times)
  - A Canadian woman is arrested for sending ricin poison to U.S. President Donald
    Trump last week. (The New York Times)
  Science and technology:
  - Internet censorship in the United States, China–United States relations
  - A federal judge blocks the Commerce Department from requiring U.S. app stores
    to remove WeChat downloads. (NBC News)
  Sports:
  - 2020 24 Hours of Le Mans
  - Toyota Gazoo Racing wins the 24 Hours of Le Mans for the third straight year.
    (Autoblog)
