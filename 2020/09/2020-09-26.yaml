Date: '2020-09-26'
Source_URI: Portal:Current events/2020 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - History of the Syrian Civil War (2020–present)
  - A car bombing kills at least seven people and injures another ten in Ras al-Ayn,
    al-Hasakah Governorate. (Arab News)
  - Islamic terrorism in Europe, terrorism in France
  - The suspect in the stabbing attack yesterday outside the former headquarters of
    the satirical magazine Charlie Hebdo in Paris is identified as Ali H., an 18-year-old
    Pakistan-born man. He confessed to his actions and said he acted in vengeance
    for the magazine's Muhammad caricature republications earlier this year. (LCI)
    (BBC News)
  - Boko Haram insurgency
  - Eleven people are killed and 13 others injured after Boko Haram militants attack
    a security convoy taking people displaced by an insurgency back to their homes
    in Borno State, Nigeria. (Reuters)
  - Security forces kill at least nine insurgents in Lebanon during operations against
    Islamic State-linked militants that killed four security forces earlier this month
    and three civilians in August. Three security forces are also injured in this
    incident. (Arab News)
  - Militants open fire on an army checkpoint in Araman, Lebanon, killing two members
    of the security forces. A militant is also killed in the attack. It is the third
    of a spate of attacks by Islamic State-linked militants in the country since August.
    (Reuters)
  - Militants kill at least 15 people in Ethiopia's western Benishangul-Gumuz Region.
    (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - COVID-19 pandemic in Scotland
  - Scotland reports 714 new cases, the biggest single-day jump on record since the
    pandemic began. It amounts to 11.5% of newly-tested individuals, the highest proportion
    of positivity rate tests. (STV)
  - COVID-19 pandemic in Northern Ireland
  - Northern Ireland reports 319 new cases in the past 24 hours, setting a new record
    for the second consecutive day. The previous record was reported yesterday with
    273 cases. (The Belfast Telegraph)
  Politics:
  - 2020–2021 United States racial unrest, George Floyd protests in Portland
  - Governor of Oregon Kate Brown declares a weekend state of emergency for Portland,
    saying white supremacist groups are travelling from out of state to attend an
    event the Proud Boys allege to be organized to "end domestic terrorism." Thousands
    of supporters are expected as police prepare for clashes in a city that has become
    the center of sometimes deadly political violence in the run-up to the November
    3 election. (CBC)
