Date: '2020-09-28'
Source_URI: Portal:Current events/2020 September 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro conflict
  - During a shootout with soldiers in Sulu, Philippines, Abu Sayyaf militants kills
    an Indonesian fisherman who was abducted early this year. A militant of the group
    also died in the fight. (The Manila Times)
  - Iraqi insurgency
  - 2020 Iraq attacks
  - A missile hits a house in Baghdad, close to the airport. The attack leaves at
    least five people dead, including three children; two children are injured. (National
    Iraqi News Agency)
  - Nagorno-Karabakh conflict
  - 2020 Nagorno-Karabakh conflict
  - Seventy-one more Artsakh servicemen are killed during the fight, bringing the
    death toll among the fighters to 87. Two more Azerbaijani civilians are also killed.
    A passenger bus in Armenia was hit by an Azerbaijani missile, but no casualties
    are reported. Authorities in Nagorno reports at least 400 Azerbaijani soldiers
    dead, but the country has not confirmed. (BBC News)
  Business and economy:
  - Kioxia, the Japanese computer memory manufacturer spun off from Toshiba, postpones
    its initial public offering on the Tokyo Stock Exchange, citing the volatility
    of the semiconductor industry caused by both the COVID-19 pandemic and the ongoing
    trade war between China and the United States. Its initial public offering, which
    would have launched on October 6, was projected to be Japan's largest for this
    year. (The Japan Times) (NikkeAsia)
  Health and environment:
  - COVID-19 pandemic
  - Covid 19 death toll globally surpasses 1 million
  - COVID-19 pandemic in India
  - India surpasses six million cases of COVID-19, becoming the second country after
    the United States to reach that milestone. Meanwhile, 82.5% or more than five
    million people have recovered. (AP)
  - COVID-19 pandemic in the Netherlands
  - The government introduces new nationwide restrictions aimed at tackling the swift
    spread sweeping across the country, including disallowing fans in professional
    sports matches and ordering bars and restaurants to close at 22:00 (10:00 p.m.)
    CEST for the next three weeks. Prime Minister Mark Rutte also advises people to
    wear face masks when shopping in Amsterdam, Rotterdam, and The Hague, the three
    cities with the highest rates of infections. (CTV News)
  International relations:
  - Foreign relations of the Dominican Republic
  - The Dominican Republic's Foreign Ministry fires 781 people in various embassies.
    (Dominican Today)
  - Papua conflict, Foreign relations of Indonesia, Foreign relations of Vanuatu
  - Indonesia accuses Vanuatu of having an "excessive and unhealthy obsession" about
    West Papua. The remark comes after Vanuatuan Prime Minister Bob Loughman warned
    the international community about "human rights violations and abuses" in the
    region. (RNZ)
  - Belarus–Russia relations, COVID-19 vaccine
  - Russia announces that they have supplied their first batch of their Sputnik V
    vaccine to Belarus for clinical trails. (Reuters)
  Law and crime:
  - 2017–18 Spanish constitutional crisis, Trial of Catalonia independence leaders
  - The Spanish Supreme Court ratifies a year-and-a-half disqualification sentence
    to President of the Government of Catalonia Quim Torra. He must abandon the presidency
    after being accused of disobeying the Central Electoral Bureau. Vice president
    Pere Aragonès will succeed him ad interim effective September 29. (El Mundo) (Reuters)
    (BBC News)
  - Demonstrations take place throughout Catalonia, as well as protests in Barcelona.
    (El Confidencial) (La Vanguardia)
  - Corruption in Pakistan
  - Leader of the Opposition Shehbaz Sharif is arrested amid a corruption scandal.
    (Al Jazeera)
  Politics and elections:
  - Three ministers resign from Bolivia's interim government. One of them, Economic
    Minister Oscar Ortiz, stated his resignation was in protest of President Jeanine
    Áñez's decision to sell shares in the state-run electricity company ELFEC close
    to the upcoming general election. (DW)
  Science and technology:
  - Water on Mars
  - Scientists in a paper published to Nature Astronomy confirm the existence of four
    underground saltwater lakes spread out over near Mars' south pole. Depending on
    their salt content, these lakes could be potential holders of life. (Nature)
  - Discoveries of exoplanets
  - CHEOPS announces the observation of WASP-189b, an ultra-Hot Jupiter exoplanet
    that orbits the star HD 133112 (also known as WASP-189) 322-light years away from
    the Libra constellation.
  Sports:
  - 2020 Stanley Cup playoffs
  - 2020 Stanley Cup Finals
  - The Tampa Bay Lightning win the Stanley Cup for the first time since 2004 following
    their game 6 victory against the Dallas Stars. (USA Today)
  - FIFA gives the president of the Club Olimpia of Paraguay Marco Trovato a lifetime
    ban from all football-related activity, following an investigation into match
    manipulation. He is also fined CHF100,000. Trovato said he would appeal the decision.
    (FIFA) (Reuters)
