Date: '2020-09-22'
Source_URI: Portal:Current events/2020 September 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - September 2020 Afghanistan attacks
  - Insurgents kills at least 14 security forces in Gizab District, Uruzgan Province.
    (TOLOnews)
  Business and economy:
  - Abu Dhabi ends its alcohol licence system, meaning residents will no longer need
    a licence to buy and consume alcohol. Customers must be at least 21 and the purchase
    should be for personal use only, according to the Abu Dhabi Department of Culture
    & Tourism. (The National)
  Disasters and accidents:
  - An arms depot belonging to Hezbollah explodes in Ain Qana, Nabatieh, Lebanon,
    injuring several people. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the Netherlands
  - The Netherlands posts a record weekly number of new confirmed cases. In the week
    ending today, cases hit 13,471, an increase of 60% on the 8,265 cases reported
    the week prior. (Reuters)
  - COVID-19 pandemic in the United States
  - The death toll from COVID-19 in the United States exceeds 200,000. (BBC News)
  International relations:
  - Israel–United Arab Emirates agreement, Bahrain–Israel normalization agreement
  - The Palestinian National Authority resigns the chairmanship of the Council of
    the Arab League in protest of the bloc's failure to condemn Bahrain and the United
    Arab Emirates's normalization of ties with Israel. (DW)
  Law and crime:
  - Religion in Russia
  - Russian special forces, including Federal Security Service agents, arrest cult
    leader Vissarion, who claims to be the reincarnation of Jesus Christ, after storming
    several remote hamlets occupied by his followers in Krasnoyarsk Krai. Russian
    authorities say he will be charged with organizing an "illegal religious organisation",
    as well as subjecting his followers to extortion and emotional abuse. (The Guardian)
  - American journalist and filmmaker Andre Vltchek is found dead inside his car in
    Istanbul, Turkey. Turkish police are treating the death as "suspicious", and have
    launched an investigation. (Daily Sabah)
  Science and technology:
  - Astronomers find glowing auroras around 67P/Churyumov–Gerasimenko. This is the
    first comet discovered to have them. (CBS News)
