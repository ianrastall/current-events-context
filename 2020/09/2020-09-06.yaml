Date: '2020-09-06'
Source_URI: Portal:Current events/2020 September 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - September 2020 Afghanistan attacks
  - Ten Taliban militants are killed during an attack against security forces in Kandahar.
    No casualties in the security forces side are reported. (Tolo News)
  - Insurgency in the Maghreb
  - A policeman is killed and another injured during a ramming-stabbing attack in
    Sousse, Tunisia. The three attackers are later killed in a gunfight with other
    officers. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - Saudi state news agency SPA reports that they downed an explosives-laden drone
    launched against the southern territory by the Houthis. A Houthi military spokesman
    says that they targeted Abha International Airport and other sites which were
    "accurately hit". (Reuters)
  Disasters and accidents:
  - 2020 California wildfires
  - Over 200 people are airlifted to safety after wildfires break out at the Sierra
    National Forest. (The Chicago Tribune)
  - Evacuations are issued in San Diego County, California, after the Valley Fire,
    which was ignited southeast of Alpine, reaches 4,000 acres and consumes 10 structures.
    (East Bay Times)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - India reports 90,632 cases, setting a record for a one-day tally of new cases.
    (Portland Press Herald)
  - COVID-19 pandemic in the United Arab Emirates
  - The United Arab Emirates reports their highest recoveries of COVID-19 cases with
    2,443 cases. (Gulf News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - The government designates 28 mainland and overseas departments as "red zones"
    as the nation's test positivity rate increased to 4.7 per cent. (CNA)
  - COVID-19 pandemic in the Isle of Man
  - The Isle of Man reports a new case after 108 days of no new cases. This comes
    after a resident returning to the island tested positive. (ITV)
  - COVID-19 pandemic in the United Kingdom
  - COVID-19 pandemic in Scotland
  - 208 new cases are confirmed in Scotland in the past 24 hours, the highest level
    since May. (BBC News)
  - The United Kingdom reports 2,988 new confirmed cases in 24 hours, their highest
    since May 23. (Reuters)
  - COVID-19 pandemic in Australia, COVID-19 pandemic lockdowns
  - Victorian premier Daniel Andrews extends stage four restrictions in Melbourne,
    including a nighttime curfew for two weeks until September 28. The curfew, travel
    limits, and some other elements of stage four will then remain in place until
    October 26. (The Guardian)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York
  - The number of hospitalizations in New York drops to 410, their lowest since March
    16. (Times Union)
  International relations:
  - Post-Brexit United Kingdom relations with the European Union
  - Trade negotiation between the UK and the EU
  - British Prime Minister Boris Johnson announces October 15, 2020, as the deadline
    for a post-Brexit trade agreement with the European Union. (CGTN)
  - Aegean dispute, Cyprus dispute
  - The Turkish Armed Forces launches joint military exercises with the Security Forces
    Command of Northern Cyprus amid ongoing territorial disputes in the eastern Mediterranean.
    (CGTN)
  Law and crime:
  - 2020–2021 United States racial unrest, George Floyd protests in Portland, Oregon
  - Hundreds of people protested against police violence and racial injustice in Portland,
    Oregon in demonstrations that have now lasted over 100 days since George Floyd
    was killed. Molotov cocktails were thrown in the street sparking a large fire
    and prompting police to declare a riot. Tear gas was again deployed to clear protesters.
    (CP24)
  - 2019–20 Hong Kong protests
  - 'At least 90 people are arrested in protests against the postponement of the 2020
    Hong Kong legislative election. Among the arrested are vice-convener of the Civil
    Human Rights Front Figo Chan as well as League of Social Democrats (LSD) Leung
    Kwok-hung and Raphael Wong. Three other members of the LSD are fined for breaching
    a social gathering cap: Tsang Kin-shing, Jimmy Sham and Chan Po-ying. (The Standard)
    (Reuters)'
  - One person is killed and seven others injured during a series of stabbings in
    Birmingham, United Kingdom. The attacks are carried out by a single perpetrator,
    who is hunted by police. The motive is currently unknown. (BBC News)
  Politics and elections:
  - 2020 Belarusian protests
  - Over 100,000 people protest in Minsk calling for President Alexander Lukashenko
    to resign. (ABC News)
