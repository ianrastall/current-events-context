Date: '2020-09-25'
Source_URI: Portal:Current events/2020 September 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Paris stabbing attack
  - A knife attack outside the former headquarters of the satirical magazine Charlie
    Hebdo in Paris, France, leaves two people wounded. The building is now used by
    a television production company, and the two wounded victims are workers of the
    company. The suspected perpetrator and six other people are taken into custody.
    The interior minister Gérald Darmanin says that the stabbing is an Islamic extremist
    terror attack. (BBC News)
  - Boko Haram insurgency
  - Fifteen security personnel are killed when Boko Haram ambush a convoy of vehicles
    in which government officials were driven in Borno State, Nigeria. (Xinhua)
  Disasters and accidents:
  - 2020 Chuhuiv An-26 crash
  - A military plane carrying cadets from Kharkiv Air Force University during a training
    flight crashes in Kharkiv Oblast, Ukraine, killing 26 people and wounding another
    person. (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - The Government of Ontario is implementing a number of new province-wide restrictions
    and public health measures aimed at curbing a surge in new cases. Under these
    rules, bars and restaurants, including nightclubs, are ordered to close at 11:00
    p.m. local time and all strip clubs will be closed until further notice. The orders
    take effect at 12:01 a.m. local time tomorrow. (CBC)
  - Prime Minister Justin Trudeau announces that the country has signed a deal with
    AstraZeneca to buy up to 20 million doses of its COVID-19 vaccine. (Business Recorder)
  - The number of cases in Canada exceeds 150,000. (Sify.com)
  - COVID-19 pandemic in the United States
  - The United States surpasses seven million cases of COVID-19. (CNN)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - France surpasses 500,000 cases of COVID-19. (Reuters)
  - COVID-19 pandemic in Portugal
  - Portugal reports 899 new daily cases, bringing the cumulative total to 72,055
    confirmed cases and 1,936 deaths. Ever since the end of national lockdown in May,
    this has been the sixth time that the country has registered some record increases
    in new cases, with all six records occurring during the month of September. (DGS)
  - COVID-19 pandemic in Russia
  - Russia reports 7,212 cases, their highest since June 23. (Deccan Herald)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - The number of new cases in Indonesia surges by 4,823 in the last 24 hours, taking
    the nationwide total to 266,845, a new record for the third consecutive day, while
    at the same time, the number of recovered patients also rises by a record 4,343,
    exceeding 196,000. (detikNews)
  - COVID-19 pandemic in Israel
  - Israel tightens restrictions one week after a second lockdown came into effect.
    Effective this afternoon, all businesses not officially considered essential are
    ordered closed for the next two weeks, with the possibility of being extended,
    and travel is restricted to 1 kilometer from people's homes. Other planned rules
    which would affect protesters and synagogue-goers are not yet approved by parliament.
    (France 24)
  - COVID-19 pandemic in Brazil
  - The number of deaths in Brazil exceeds 140,000. (The Rio Times)
  International relations:
  - North Korea–South Korea relations
  - North Korean leader Kim Jong-un issues an apology to South Korea over the "unfortunate"
    shooting death of a South Korean official in disputed border waters on Tuesday.
    (AP)
  Law and crime:
  - Juneteenth
  - At a campaign rally, United States President Donald Trump is set to make a speech
    in Atlanta, Georgia, advocating to make Juneteenth a federal holiday. (Fox News)
  - Inter-American Convention Against Terrorism
  - The Dominican Republic assumes the presidency of the Inter-American Committee
    Against Terrorism (CICTE). (Dominican Today)
  - 2019–20 Hong Kong protests
  - Police in Hong Kong ban a rally planned by the Civil Human Rights Front (CHRF)
    to protest the arrest of 12 Hong Kong citizens on grounds of COVID-19 prevention
    and "violent acts". The organization said they would appeal the decision. (Hong
    Kong Free Press)
  - Thousands of protesters, predominantly farmers, block roads and railways in India
    to protest legislation that would remove government-guaranteed grain prices which
    are paid to farmers who sell their produce to the government. (Reuters)
  - Turkey orders the arrest of 82 individuals, including members of the Peoples'
    Democratic Party, over the violent protests against the inaction of the Turkish
    Armed Forces in the Siege of Kobanî in 2014. (Reuters)
  Politics and elections:
  - 2020 United States presidential election
  - Google and YouTube announce that after the polls close on November 3 for the Presidential
    election, they will stop allowing political ads even if there is confusion or
    civil unrest while votes are counted. (NBC News)
  - Death and funeral of Ruth Bader Ginsburg
  - Associate Justice Ruth Bader Ginsburg lies in state in the United States Capitol
    Building. She is both the first woman and the first Jewish American to receive
    such an honor. (CNN)
  Sports:
  - 2020 Major League Baseball season
  - The Miami Marlins advance to the playoffs for the first time since 2003 after
    their 4-3 win against the New York Yankees. (CBS Sports) (ESPN)
