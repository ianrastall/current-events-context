Date: '2020-05-28'
Source_URI: Portal:Current events/2020 May 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan, Afghan peace process, May 2020 Afghanistan attacks
  - In the first attack since the end of a truce declared by the Taliban, and despite
    a petition of the government for the Taliban to extend the ceasefire, at least
    14 security forces members are killed in an attack on a checkpoint in Parwan.
    A government spokesperson says the Taliban also suffered casualties. The group
    has not commented on the attack. (Al Jazeera)
  - Rwandan genocide
  - A court in Rwanda sentences former Mayor of Nyakizu Ladislas Ntaganzwa to life
    imprisonment for his role in orchestrating the massacre of hundreds of thousands
    of people in the 1994 genocide. His lawyer is planning to appeal the ruling. (Al
    Jazeera)
  - Somali Civil War
  - Gunmen abduct multiple healthcare workers in Balad, Middle Shabelle, before killing
    seven of them and another civilian. (Reuters)
  - Herder–farmer conflicts in Nigeria
  - Gunmen kill 60 to 74 people in villages in the Nigerian state of Sokoto, where
    similar attacks had occurred on Monday. (BBC News) (SR)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - The death toll from COVID-19 in the United States exceeds 100,000. (CNN)
  International relations:
  - 2020 China–India skirmishes, China–India relations
  - China moves thousands of People's Liberation Army troops to its Himalayan border
    with India, bringing vehicles and heavy machinery to what India says is its territory.
    India sends several battalions of its Army from nearby Leh to the border in response.
    (The Guardian)
  Law and crime:
  - George Floyd protests
  - Killing of George Floyd, George Floyd protests in Minnesota
  - Protests continue for a second day in Minneapolis and other U.S. cities after
    an unarmed man, George Floyd, died while being arrested. Some of them have escalated
    into riots, including looting and arson. (CNN)
  - A Minneapolis Police Department station is abandoned by police after being overran
    by protesters and is then looted and set on fire. An MPD spokesman confirmed the
    Third Precinct building had been evacuated "in the interest of the safety of our
    personnel". (Politico)
  - COVID-19 pandemic in Malawi, COVID-19 pandemic in Zimbabwe
  - A manhunt is launched after hundreds of people, some with COVID-19, escape from
    quarantine centers in Zimbabwe and Malawi, with authorities worried that they
    will spread COVID-19 in countries whose health systems can be rapidly overwhelmed.
    (AP News)
  Sports:
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in Massachusetts
  - The 2020 Boston Marathon is officially canceled due to the COVID-19 pandemic.
    It is the first time in the event's 123-year history that the annual running had
    to be canceled. A modified version of the race, scheduled for September 14, will
    be run virtually, and runners who complete the marathon track in six hours or
    less will be eligible for the 2021 Boston Marathon. (ESPN)
