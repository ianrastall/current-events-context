Date: '2020-05-04'
Source_URI: Portal:Current events/2020 May 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - The Taliban claims responsibility for an attack on Sunday on an Afghan military
    centre in southern Helmand where they say that "dozens were killed or wounded".
    (Reuters)
  - Ituri conflict
  - The armed forces of the Democratic Republic of Congo announce that 12 soldiers
    were killed in an attack by militants in Ituri Province over the weekend. (Anadolu
    Agency)
  - Macuto Bay raid
  - Venezuelan President Nicolás Maduro says "13 terrorists", including two U.S. citizens
    working for Jordan Goudreau's private security company Silvercorp USA, have been
    detained after foiling a plot to assassinate him, accusing them of "playing Rambo".
    State television broadcasts footage of captured mercenaries in Aragua. (Reuters)
  - Opposition leader Juan Guaidó denies any involvement with the Silvercorp USA operation.
    Jordan Goudreau claims his company signed a contract with Guaidó to remove Nicolás
    Maduro from power by force, but says he has only been paid "a tiny share of the
    amount agreed upon." (AP via Toledo Blade)
  Arts and culture:
  - 2020 Pulitzer Prize
  - Reuters wins the 2020 Pulitzer Prize for Breaking News Photography for its coverage
    of the protests in Hong Kong. (Reuters)
  Business and economy:
  - Coronavirus recession, COVID-19 pandemic in the United States
  - The U.S. government announces plans to borrow $3 trillion for the second quarter,
    five times more than the previous record set during the 2008 financial crisis.
    (BBC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Japan
  - Prime Minister Shinzo Abe extends the national state of emergency to May 31. (Reuters)
  - COVID-19 pandemic in New Zealand
  - New Zealand reports no new cases of COVID-19 for the first day in almost two months.
    (The Guardian)
  Law and crime:
  - COVID-19 pandemic in Colorado
  - A Colorado man who organized planned armed protests against the state’s stay-at-home
    orders is arrested after pipe bombs were discovered at his house. (ABC News)
  Politics and elections:
  - UK Trade Minister Conor Burns resigns after a watchdog group recommended suspending
    him from parliament for making "veiled threats" towards a company his father had
    financial disputes with. (BBC News)
  Science and technology:
  - A team of British and Kenyan scientists announce the discovery of Microsporidia
    MB, a parasitic microbe in the Microsporidia fungi group that blocks mosquitos
    from carrying malaria. While acknowledging they need to understand how the microbe
    spreads and how it blocks the disease, the team believes it has potential to be
    used in malaria control. (BBC News) (Nature)
  - A previously undetected Apollo group asteroid 2020 JJ passes 4,350 miles (7,000
    kilometres) away from Earth. It is the closest near-Earth object since 2019 UN13.
    (CNET)
