Date: '2020-05-13'
Source_URI: Portal:Current events/2020 May 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Israeli-Palestinian attacks
  - Israeli troops kill a 15-year-old boy and wound four others at the Al-Fawar refugee
    camp near Hebron, where they are looking for the rock thrower who killed a soldier
    yesterday. (Ynetnews)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York City
  - New York City goes 58 consecutive days without a fatal pedestrian traffic collision,
    the most since tracking began in 1983. (ABC News)
  - COVID-19 pandemic in Maryland
  - Maryland Governor Larry Hogan announces that the stay-at-home order will be lifted
    on May 15, except for Prince George's and Montgomery counties. Groups of over
    ten will remain forbidden. (The Hill)
  - COVID-19 pandemic in Poland
  - Poland extends its ban on foreigners entering the country until June 12 due to
    COVID-19. (Reuters)
  - COVID-19 pandemic in Lesotho
  - Lesotho reports its first case, an asymptomatic person who returned from Saudi
    Arabia. Eighty others test negative. (The Guardian)
  - COVID-19 pandemic in Chile
  - Due to a spike in cases, the government announces a total lockdown in Santiago.
    (The New York Times)
  Politics and elections:
  - 2020 California's 25th congressional district special election
  - Democrat Christy Smith concedes defeat to Republican Mike Garcia in yesterday's
    special election for California's 25th congressional district after vote returns
    showed Garcia in the lead. The results are the first time since 1998 that Republicans
    flipped a Democratic-held House seat in California. (CNN) (The Hill)
  - Tom Thabane steps down as Prime Minister of Lesotho following investigations into
    his third wife's alleged murder of his second wife, Lipolelo Thabane. (Reuters)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - 2020 Australian Football League season
  - Plans to restart the 2020 AFL season on June 11 have been halted after the South
    Australian government announced it would not allow the Adelaide and Port Adelaide
    clubs to be exempt from the 14-day mandatory quarantine. Western Australian-based
    teams Fremantle and West Coast have plans to temporarily relocate to Gold Coast,
    Queensland. (News.com.au)
