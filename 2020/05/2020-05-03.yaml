Date: '2020-05-03'
Source_URI: Portal:Current events/2020 May 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Korean conflict
  - North and South Korean soldiers exchange gunfire across the DMZ at a South Korean
    guard post in Cheorwon, but no injuries are reported. South Korean and U.S. officials
    suspect the initial shots from the north to be accidental. (BBC News) (Reuters)
  - Piracy in the Gulf of Guinea
  - Unidentified forces attack two fishing vessels near the Gabonese capital of Libreville
    and abduct six crewmen (3 Indonesian, 2 Senegalese, and a South Korean). It is
    the second pirate attack reported this year off the coast of Gabon. (The Korea
    Herald)
  - Sinai insurgency
  - Egypt's military says that 15 of its members were killed or wounded in recent
    operations in Sinai and that 126 suspected militants had been killed. (Reuters)
  - Macuto Bay raid, Crisis in Venezuela
  - Former U.S. Green Beret Jordan Goudreau, who took part in the failed 2019 Venezuelan
    uprising attempt to oust Nicolás Maduro, releases a video claiming responsibility
    for an incursion in Venezuela, announcing the start of an effort to capture senior
    Venezuelan officials wanted by the U.S. government, codenamed "Operation Gideon".
    Goudreau claims 60 troops have successfully entered Venezuela by "land and sea"
    and fighting is underway. (The Washington Post)
  - Venezuelan Interior Minister Néstor Reverol says the country's security forces
    have foiled a "marine incursion" by "terrorist mercenaries" from Colombia, killing
    at least eight gunmen and capturing two others. The foreign group reportedly landed
    on a beach in the city of La Guaira on speedboats. (Al Jazeera)
  - State television broadcasts images it says are captured high-calibre weapons,
    Peruvian documents, and uniforms emblazoned with an American flag. (Canberra Times)
  Business and economy:
  - Indonesian e-commerce site Tokopedia launches a security investigation after a
    hacker said they stole the information of 91 million users and plans to release
    it on the dark web. (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Russia
  - Russia reports a record 10,633 new cases of COVID-19 and 58 more deaths from the
    virus in the last 24 hours, bringing the country's total cases to 134,686 and
    1,280 deaths. Moscow's mayor Sergei Sobyanin says the peak has still not been
    reached, warning residents to remain indoors. (BBC News)
