Date: '2020-05-10'
Source_URI: Portal:Current events/2020 May 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - 2019–20 Western Libya offensive
  - The Libyan National Army (LNA), led by Khalifa Haftar, carries out massive artillery
    bombardment of Tripoli, Libya's capital, in a push to capture the city from Turkish-backed
    Government of National Accord (GNA) forces. Turkey says Haftar's forces are now
    "legitimate targets" if attacks on its interests continue. (Reuters)
  - Mali War
  - A roadside bomb strikes a United Nations vehicle in Aguelhok, Kidal, Mali, killing
    three Chadian peacekeepers. (Voice of America)
  Business and economy:
  - Economic impact of the COVID-19 pandemic, Coronavirus recession
  - Colombian airline carrier Avianca files for Chapter 11 bankruptcy protection and
    liquidates its Peruvian subsidiary as a result of the COVID-19 pandemic. (Financial
    Times)
  Disasters and accidents:
  - Iran says an anti-ship missile fired during a training exercise in the Gulf of
    Oman struck its naval support ship Konarak, killing 19 sailors and wounding 15
    others onboard the vessel. (The Guardian)
  International relations:
  - Iran–United States relations
  - Iranian government spokesman Ali Rabiei says that Iran is prepared for a full
    prisoner exchange with the United States but that the American authorities had
    not yet responded. The swap could include Iranian university professor Sirous
    Asgari who is in U.S. custody and Michael R. White, a U.S. Navy veteran in Iranian
    custody. (Al Jazeera)
  Law and crime:
  - An altercation between Indian and Chinese soldiers near the Naku La sector in
    Sikkim, India, leaves eleven soldiers wounded. (BBC News)
