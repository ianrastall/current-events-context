Date: '2020-05-05'
Source_URI: Portal:Current events/2020 May 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Macuto Bay raid, United States–Venezuela relations
  - U.S. President Donald Trump denies any involvement by the U.S. government in Silvercorp
    USA's armed incursion into Venezuela on May 3, which left eight people dead and
    several others captured, including two U.S. citizens. (Reuters)
  - Western Iran clashes (2016–present)
  - Gunmen kill three Islamic Revolutionary Guard Corps (IRGC) members near the Kurdish-majority
    city of Divandarreh, in the Kurdistan Province, while "several counterrevolutionaries"
    are reportedly killed in the fighting, according to Iranian media. (RFERL)
  Disasters and accidents:
  - At least two miners are killed in a mine collapse in Grand Cape Mount County,
    Liberia. The mayor of the county's administrative centre says scores of others
    are unaccounted for and feared dead. (Reuters)
  - A massive fire breaks out at the 48-storey residential skyscraper Abbco Tower
    in Al Nahda, Sharjah, UAE. At least 12 people are injured. (Gulf News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Yemen
  - The Houthis-controlled area of Yemen reports its first case of COVID-19 and first
    death; that of a Somali man who had liver and kidney conditions. The government
    in the south reports nine new infections. (Reuters)
  - COVID-19 pandemic in Brazil
  - Brazil's Ministry of Health reports 6,935 new cases of COVID-19 and 600 more deaths,
    the highest daily death toll in the country to date, bringing the country's death
    toll to 7,921 and 114,715 total cases. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The Department of Health and Social Care reports that the death toll from COVID-19
    in the United Kingdom stands at 29,427, which is now the highest in Europe, after
    surpassing Italy. (BBC News)
  Law and crime:
  - The Philippines' National Telecommunications Commission issues a cease and desist
    order to the broadcasting operations of ABS-CBN, the country's largest media network,
    as Congress fails to renew its franchise granted in 1995. The network signed off
    at 7:52 PM, Philippine Standard Time. The last time the network was shut down
    was upon the declaration of martial law by the Philippine dictator Ferdinand Marcos.
    (Al Jazeera) (ABS-CBN News) (Rappler)
