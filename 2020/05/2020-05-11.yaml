Date: '2020-05-11'
Source_URI: Portal:Current events/2020 May 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - At least 27 Afghan soldiers have been killed during a Taliban attack at a convoy
    in the Alishing District of Laghman Province, Afghanistan. (Tolo News)
  Arts and culture:
  - COVID-19 pandemic in mainland China; Impact of the COVID-19 pandemic on The Walt
    Disney Company
  - Shanghai Disneyland reopens with new social distancing rules. (The Guardian)
  Business and economy:
  - Socio-economic impact of the COVID-19 pandemic, COVID-19 pandemic in California
  - Tesla, Inc. CEO Elon Musk announces he will reopen the Tesla Factory in Fremont,
    California, United States, in defiance of an Alameda County shutdown order. Governor
    Gavin Newsom voiced his support for the reopening of the factory. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in mainland China
  - New coronavirus clusters are reported in Wuhan—where the virus first emerged—and
    the north-eastern province of Jilin, after confirming its first case since April
    3. (BBC News)
  - Wuhan plans to test all 11 million of their residents for the coronavirus. (Washington
    Post)
  - COVID-19 pandemic in the United States
  - The death toll from COVID-19 in the United States exceeds 80,000. (Reuters)
  Law and crime:
  - COVID-19 pandemic in Malaysia
  - Malaysian authorities detains hundreds of foreign workers in a major raid in areas
    around the Kuala Lumpur Wholesale Market. It is the second major raid on the country's
    biggest wholesale wet market by the authorities amid the movement control order.
    (The Straits Times)
  - Vital Kamerhe, chief of staff of the government of the Democratic Republic of
    the Congo, denies all charges of embezzling more than $50 million in public funds.
    Kamerhe, who appeared before a court for two hours wearing prison fatigues and
    a surgical mask, could face up to 20 years in prison if convicted. (Reuters)
  Politics and elections:
  - Aftermath of the Macuto Bay raid, Venezuelan presidential crisis
  - Venezuelan opposition leader Juan Guaidó accepts the resignations of his aides
    JJ Rendón and Sergio Vergara, over their roles in "Operation Gideon". Rendón and
    Vergara admitted signing a contract with Jordan Goudreau's Silvercorp USA in October
    2019 to help remove Nicolás Maduro from office, and install Guaidó as President.
    (Bloomberg)
  - Lesotho's Prime Minister Tom Thabane's coalition government collapses in parliament.
    He is due to resign on May 22 amid accusations that he and his wife are involved
    in his ex-wife's murder. (Reuters)
  Science and technology:
  - The Max Planck Institute for Evolutionary Anthropology publishes the result of
    radiocarbon and DNA analysis from the fossils that has been found in the Bacho
    Kiro Cave, Bulgaria. The result, showing that the fossils belong to Homo sapiens
    instead of Neanderthal, indicates that modern humans may have arrived in Europe
    thousands of years earlier than previously thought. (DW)
  Sports:
  - Impact of the COVID-19 pandemic on sports
  - 2020 Major League Baseball season
  - Major League Baseball team owners approve a proposal by Commissioner Rob Manfred
    to start the season in early July. It still needs to be approved by the Major
    League Baseball Players Association. (ESPN)
