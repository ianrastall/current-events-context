Date: '2020-05-06'
Source_URI: Portal:Current events/2020 May 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in Jammu and Kashmir
  - Indian Army troops kill Riyaz Naikoo, a commander of the Hizbul Mujahideen terrorist
    group, after launching an offensive that resulted in the death of at least three
    other militants in Kashmir's Pulwama district. (Reuters)
  - Macuto Bay raid, United States–Venezuela relations
  - Venezuelan President Nicolás Maduro says that the two captured American mercenaries
    accused of organizing an armed incursion into Venezuela will be tried in the country
    by its civil courts. United States Secretary of State Mike Pompeo says the U.S.
    government will "use every tool that we have available to try to get them back."
    (France24)
  - Iraqi insurgency
  - Three Katyusha rockets, fired from the Bakriya neighborhood, land in the perimeter
    of Baghdad International Airport but cause no damage or casualties. (ABC News)
  Disasters and accidents:
  - At least two people are killed and two others seriously injured after a plane
    carrying vital medical supplies crashes near Esquel Airport in Esquel, Argentina.
    (Mirror)
  Law and crime:
  - Shooting of Ahmaud Arbery
  - A cellphone video of the shooting of an African-American man jogging in Brunswick,
    Georgia, surfaces. The two men who killed him claim that they believed he was
    a burglar and then got into a fight with him when he was fatally shot. The case
    is subsequently taken to a grand jury. (CNN) (CBS News)
  Politics and elections:
  - 2020 Polish presidential election
  - The Polish governing coalition announces the presidential election, scheduled
    for May 10, is postponed due to the COVID-19 pandemic. The new election date will
    be announced later. (AP)
  Science and technology:
  - The European Southern Observatory announces the discovery of Earth's closest-known
    black hole (HR 6819). The invisible object in the QV Telescopii system has a mass
    at least four times that of our Sun, and is roughly 1,000 light years (10 quadrillion
    km) from Earth in the constellation Telescopium. (NPR) (BBC News)
