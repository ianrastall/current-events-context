Date: '2020-05-31'
Source_URI: Portal:Current events/2020 May 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - At least six civilians are killed when a minibus hits a roadside bomb near Mogadishu.
    There has been no claim of responsibility. (Reuters)
  - Second Libyan Civil War
  - At least three civilians are killed and several others are injured in Tripoli
    when a park comes under shelling from suspected Libyan National Army forces loyal
    to Field Marshal Khalifa Haftar. (Reuters)
  - Herder–farmer conflicts in Nigeria
  - Hundreds of men on motorcycles, some armed with assault rifles, kill at least
    18 people, including a local official in Sabon Gari, and steal thousands of livestock
    in Katsina State, Nigeria. (Reuters)
  - A 20-year-old Kurdish man was stabbed multiple times by three men in Ankara, Turkey,
    killing him. The attack, described as a xenophobic murder, was carried out as
    the victim was playing Kurdish music. (Middle East Eye)
  Disasters and accidents:
  - Anglo-Australian mining corporation Rio Tinto admits blowing up the 46,000-year-old
    Juukan Gorge caves in Pilbara, Western Australia, on May 24. The firm issues an
    apology to Aboriginal Australians who are the traditional owners of the site,
    saying "We are sorry for the distress we have caused". (BBC News)
  - A plane crash in Nettuno, Lazio, Italy, kills two Italian competitive swimmers,
    Fabio Lombini and Gioele Rossetti. (Khaleej Times)
  - A plane crash near St. Louis, Missouri kills four people. (WCRZ)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Rwanda
  - Rwanda reports its first death from COVID-19, a 65-year-old who had severe respiratory
    complications and was being treated at a specialised center. (Reuters)
  - The number of worldwide confirmed cases of COVID-19 surpasses six million. The
    United States remains the global epicenter, accounting for approximately 29% of
    all reported and confirmed cases in the world. (CNN)
  International relations:
  - India–Pakistan relations
  - India expels two officials at the Pakistan High Commission in New Delhi, accusing
    them of being involved in espionage activities. Pakistan condemns the expulsion
    and alleges that the two were detained and tortured by Indian authorities. (DW)
  Law and crime:
  - George Floyd protests
  - Shooting of James Scurlock
  - Police investigate the overnight shooting death of a protester, James Scurlock,
    by a bar owner in Omaha, Nebraska. Eyewitness video indicates the shooter was
    attacked by a group of people, one of whom was apparently Scurlock, before the
    fatal shots were fired. (Omaha World-Herald)
  - George Floyd protests in New York City
  - A woman is facing four counts of attempted murder, as well as counts of attempted
    arson, reckless endangerment, criminal possession of a weapon, and assault for
    throwing a Molotov cocktail at an occupied NYPD van during a riot in Brooklyn.
    (Fox News)
  - Rioting and looting continue overnight in cities all over the United States as
    12 states activate the national guard to defuse the situation. (Al-Jazeera) (Voice
    of America)
  - At least 1,383 people have been arrested in 17 cities during the protests since
    Thursday. (Yahoo! News)
  - During protests in Indianapolis, two people are shot dead and two others injured
    after unidentified assailants open fire against protesters. (Fox News)
  - President Donald Trump announces his plans to designate Antifa as a terrorist
    organization after saying they were responsible for the looting and arson occurring
    during the protests. Various government and non-government officials claim that
    designating domestic terrorist groups is prohibited by the First Amendment. (CNN)
  - The media is revealed to have been the target of violence and harassment at least
    50 times on Friday and Saturday. (The Guardian)
  Politics and elections:
  - Presidency of Jair Bolsonaro
  - Anti-fascist protesters gather in the Brazilian cities of São Paulo, Rio de Janeiro
    and Belo Horizonte in response to police brutality and President Bolsonaro's defence
    of unconstitutional measures. A pro-government crowd forms in São Paulo, with
    police reporting neo-Nazi flags hung from a sound truck. (The Republic)
  - 2020 New Caledonian independence referendum
  - In New Caledonia, the largest pro-independence party Caledonian Union agrees to
    postpone the referendum on independence from France due to COVID-19 pandemic concerns.
    Anti-independence parties welcome the decision. (RNZ)
  - 2020 Niuean general election
  - In Niue, Sir Toke Talagi loses his seat at the Common Roll and is now leaving
    his position as Premier of Niue. Former Secretary to Government Richard Hipa,
    a first-time candidate, topped the Common Roll votes with 440 and now looks to
    be a contender for the premiership. (RNZ)
  Science and technology:
  - Crew Dragon Demo-2
  - SpaceX's Crew Dragon spacecraft successfully docks with the International Space
    Station (ISS) with NASA astronauts Bob Behnken and Douglas Hurley joining the
    existing crew aboard the space station. (CNN)
