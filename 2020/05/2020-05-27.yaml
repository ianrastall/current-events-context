Date: '2020-05-27'
Source_URI: Portal:Current events/2020 May 27
Intelligence_Payload:
  Disasters and accidents:
  - A fire at a hospital kills five patients being treated for COVID-19 in Dhaka,
    Bangladesh. No cause for the fire has been determined. (Reuters)
  International relations:
  - Hong Kong–United States relations, 2019–20 Hong Kong protests
  - United States Secretary of State Mike Pompeo tells Congress that Hong Kong is
    "no longer autonomous from China" following Beijing's plans to impose a new security
    law on the territory, and no longer meets its special designation for trade under
    U.S. law that was established in the United States–Hong Kong Policy Act. (BBC
    News)
  Law and crime:
  - George Floyd protests
  - George Floyd protests in Minnesota
  - Rioting and looting take place in Minneapolis, Minnesota, United States, following
    the death of African-American man George Floyd during his arrest by Minneapolis
    Police Department officers. Several buildings are looted and burned down, and
    riot police have been deployed. (Fox News) (NBC News)
  - A 43-year-old protester is shot dead outside a pawnshop. The shooting is carried
    out by the owner of the shop. He is arrested. (Star Tribune)
  - Kyoto Animation arson attack
  - In Kyoto, Japan, Shinji Aoba is arrested. He was moved from the hospital and charged
    for an arson attack at an animation center in July 2019, which killed 36 people.
    Aoba had been unable to be arrested due to the severe injuries he sustained during
    the attack. (Reuters) (BBC News)
  - Terrorism in the United States, crime in Florida
  - The May 24 arrest of a 23-year-old man in Tampa, Florida, is announced by federal
    prosecutors. He had allegedly been planning a mass shooting at Honeymoon Island
    State Park in support of ISIS. (WTSP)
  - Essex lorry deaths
  - Judicial authorities in Belgium and France announce the arrest of 26 suspects,
    followed 16 simultaneous early morning raids on 26 May in Brussels and Paris,
    which targeted the “notably suspected” organization believed to be responsible
    for the tragedy in the U.K. (Daily News)
  - Zambian police arrest three people suspected of murdering three Chinese nationals
    three days prior and burning their bodies. (BBC News)
