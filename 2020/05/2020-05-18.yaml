Date: '2020-05-18'
Source_URI: Portal:Current events/2020 May 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - 2019–20 Western Libya offensive
  - Turkish-backed GNA forces capture the strategic al-Watiya airbase from forces
    loyal to Khalifa Haftar, and seize a Russian Pantsir missile system. (Al Jazeera)
    (Libyan Express)
  - War in Afghanistan; May 2020 Afghanistan attacks
  - A car bombing at an intelligence agency installation in the central province of
    Ghazni kills at least seven people and wounds another 40. The Taliban claims responsibility.
    (Reuters)
  Disasters and accidents:
  - 2020 East Africa floods
  - The United Nations Office for the Coordination of Humanitarian Affairs announces
    that nearly 1 million people are affected and at least 24 people have died in
    the flash floods that hit Beledweyne and Jowhar, Somalia. (CTV)
  - In Sweden, an earthquake with a magnitude of 4.1 strikes near Kiruna. No injuries
    are reported. (The Local)
  Health and environment:
  - COVID-19 pandemic
  - In an unprecedented move, the World Health Organization holds its annual World
    Health Assembly using video conferencing instead of in-person meetings. (NPR)
  Law and crime:
  - COVID-19 pandemic in Uganda
  - Ugandan police arrest Stella Nyanzi, a prominent academic and vocal critic of
    President Yoweri Museveni, for inciting violence as she protested against lockdown
    measures taken by the government to combat the COVID-19 pandemic. (Reuters)
  Politics and elections:
  - 2019–20 Hong Kong protests
  - Fifteen pro-democracy activists are released on a HK$1000 bail. Notable political
    figures, including Benny Tai, University of Hong Kong academic and one of the
    Occupy Central founders; Civil Human Rights Front convener Jimmy Sham; former
    Democratic Party chairwoman Emily Lau; and others, flock to the court to show
    support for the activists. (The Standard Hong Kong)
  - 2019–20 Chilean protests; COVID-19 pandemic in Chile
  - Protests against the government resume in Santiago due to food shortages in the
    poorest neighborhoods of the city created by the lockdown to control the COVID-19
    pandemic. (Reuters)
  - Politics of Monaco
  - The office of Minister of State announces that Serge Telle will leave the Headship
    of the Monegasque government on 31 August. (L'Observateur de Monaco)
