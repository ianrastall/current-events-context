Date: '2020-05-02'
Source_URI: Portal:Current events/2020 May 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Arif Wazir, a prominent PTM leader, dies of injuries from an attack that was carried
    out in a drive-by shooting in Wanna, Pakistan, a day earlier. (Radio Free Europe/Radio
    Liberty)
  - Iraqi insurgency (2017–present)
  - At least 10 members of the Popular Mobilization Forces are killed by ISIL militants
    in attacks in the town of Mekeeshfa and the city of Balad. Iraq and the paramilitary
    forces' official media report that scores of others were wounded. (Al Jazeera)
  - Mali War, Operation Barkhane
  - A French Foreign Legion soldier dies at a military hospital in Paris, after being
    wounded in an IED blast, while conducting an operation against Islamist insurgents
    in Mali. (The Star)
  Disasters and accidents:
  - Six people are killed after a Beechcraft 95-B55 Baron crashes near Teniente Jorge
    Henrich Arauz Airport, Bolivia. (Aviation Safety Network)
  International relations:
  - Foreign relations of Palau
  - President of Palau Thomas Remengesau Jr. condemns the exclusion of Taiwan from
    the World Health Organization, saying that it "endangers, not only Taiwanese people,
    but people everywhere". Palau remains one of Taiwan's few political allies in
    the Pacific. (RNZ)
  - Venezuelan presidential crisis
  - Brazil's Supreme Federal Court issues a 10-day injunction against President Jair
    Bolsonaro's demand that all 30 members of Venezuela's diplomatic team leave the
    country. (Reuters)
  Law and crime:
  - Inmates take seven guards hostage at a prison in Manaus, Brazil, during an attempted
    escape. A raid later frees the guards and ends the prisoners' rebellion. (Global
    News)
  Politics and elections:
  - North Korea's state-run Korean Central News Agency reports that leader Kim Jong-un
    attended the ribbon-cutting ceremony for a fertilizer plant today, in his first
    official appearance since his disappearance from public focus last month. (Reuters)
