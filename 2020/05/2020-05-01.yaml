Date: '2020-05-01'
Source_URI: Portal:Current events/2020 May 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinai insurgency
  - ISIL claims responsibility via its Amaq News Agency for a bombing that killed
    and wounded several Egyptian Army personnel near the city of Bir al-Abd in North
    Sinai Governorate. (Reuters)
  Business and economy:
  - Lebanon's banking association rejects a plan proposed by the government to secure
    emergency funding from the International Monetary Fund, saying they were not consulted
    and the plan will "further destroy confidence" in the country's financial system.
    (Reuters)
  Disasters and accidents:
  - All five crew members declared missing after the crash of a Canadian CH-148 Cyclone
    helicopter two days earlier are now presumed dead. (The Guardian)
  Law and crime:
  - South Hedland stabbing attack
  - A fly-in fly-out worker from Perth attacks seven people in South Hedland, Western
    Australia. None were killed, though five were hospitalised. Police shot the attacker
    dead. (The Guardian)
  - A riot over food shortages at the overcrowded Los Llanos prison in Guanare, Portuguesa,
    Venezuela, leaves at least 46 people dead and dozens more injured, including the
    prison's director, according to the military. (BBC News) (Inquirer)
  Politics and elections:
  - Gun control in Canada
  - Prime Minister Justin Trudeau announces a ban on assault-style weapons, which
    includes buying, selling, transporting, importing or using the designated weapons.
    The legislation is said to be motivated by last month's killing spree in Nova
    Scotia. (Reuters)
