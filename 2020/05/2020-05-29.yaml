Date: '2020-05-29'
Source_URI: Portal:Current events/2020 May 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 15 people are killed in northern Burkina Faso after a convoy transporting
    traders is targeted by an unidentified armed group. Burkina Faso has been fighting
    Islamist terrorists amid a resurgence of attacks in the Sahel. (Reuters)
  International relations:
  - U.S. President Donald Trump says he is terminating the country's relationship
    with the World Health Organization (WHO) over its handling of the COVID-19 pandemic,
    claiming the WHO has become a "puppet of China" and that American funding will
    be redirected to "other global public health needs". (Reuters)
  Law and crime:
  - Killing of George Floyd
  - George Floyd protests
  - George Floyd protests in the United States
  - George Floyd protests in California
  - George Floyd protests in Los Angeles County, California
  - In Los Angeles, more than 500 people are arrested as the city declares the protest
    an "unlawful assembly". (Deadline)
  - George Floyd protests in Georgia
  - George Floyd protests in Atlanta
  - In Atlanta, the CNN Center is vandalized and police vehicles are attacked and
    set on fire as protests spread. Seven people are reportedly arrested. (Newsweek)
  - George Floyd protests in Illinois
  - George Floyd protests in Chicago
  - In Chicago, 108 people are arrested after several police vehicles are vandalized.
    (WGN-TV)
  - George Floyd protests in Minnesota
  - George Floyd protests in Minneapolis–Saint Paul
  - Hundreds of Minnesota National Guard are deployed in Minneapolis to enforce a
    night curfew, after Mayor Jacob Frey declared a state of local emergency amid
    civil unrest, but rioting and arson fires continue. (Star Tribune)
  - George Floyd protests in Michigan
  - In Detroit, police use tear gas to disperse a crowd of protesters and make several
    arrests, including one person who drove their car at a police officer. A man was
    killed during an altercation during the protests. (CNN)
  - George Floyd protests in Texas
  - In Houston, at least 137 people are arrested, eight police officers are hospitalized,
    and 16 police vehicles are vandalized in a riot. (KHOU)
  - Several other protests against police brutality and systemic racism take place
    in large cities across the United States, some of which included arson, vandalism,
    and looting. (CNN)
  - Former Minneapolis Police officer Derek Chauvin, who was recorded on video kneeling
    on George Floyd's neck for several minutes and eventually causing his death, is
    taken into custody by the Minnesota Bureau of Criminal Apprehension and charged
    with third-degree murder and second degree manslaughter. (KSTP) (WCCO)
  - Taiwan decriminalises adultery in what is considered a landmark ruling. Marital
    infidelity was a crime with a maximum sentence of a year in prison. (Reuters)
  - Lesotho's Appeal Court revokes former First Lady Maesiah Thabane's bail. Thabane
    and her husband, former Lesotho Prime Minister Tom Thabane, are accused of ordering
    the murder of his first wife, Lipolelo. Both deny involvement in the crime. (Reuters)
  Politics and elections:
  - LGBT rights in Hong Kong
  - Pro-democracy and LGBT rights activist Jimmy Sham files a petition to the High
    Court to recognize his same-sex marriage, which was registered in New York City
    in 2014. Sham argues that not recognizing same-sex marriages violates the Basic
    Law. (South China Morning Post)
  Science and technology:
  - A SpaceX Starship prototype (SN4) is destroyed in a large explosion during static
    fire testing at the SpaceX South Texas Launch Site. (CNBC)
