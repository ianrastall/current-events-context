Date: '2020-05-26'
Source_URI: Portal:Current events/2020 May 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Afghan peace process
  - The government urges the Taliban to extend the three-day truce due to expire today.
    It also announces the government will release 900 Taliban prisoners today. (Reuters)
  - Second Libyan Civil War, Libya–Russia relations
  - The United States Africa Command accuses Russia of deploying fighter jets to eastern
    Libya to provide air support to Russian mercenaries allied to Field Marshal Khalifa
    Haftar, who is locked in a civil war with the UN-recognized Government of National
    Accord (GNA). (BBC News)
  - 2020 Democratic Republic of the Congo massacres
  - The Allied Democratic Forces kill at least 17 people in a village in Ituri Province,
    Democratic Republic of the Congo, one of three massacres by the ADF this week.
    (Reuters)
  - Boko Haram insurgency
  - ISWAP militants kill two soldiers and wound five others in Soueram, Far North,
    Cameroon. Five militants also die in the attack. (Actu Cameroun)
  Business and economy:
  - Impact of the COVID-19 pandemic on aviation, COVID-19 pandemic in Chile, Coronavirus
    recession
  - LATAM Airlines, the largest air carrier in Latin America, files for Chapter 11
    bankruptcy. (Bloomberg)
  Disasters and accidents:
  - Huge swarms of desert locusts destroy crops in central and western India prompting
    authorities to step up their response to the country's worst plague in nearly
    three decades. (Al Jazeera)
  Law and crime:
  - LGBT rights in Costa Rica
  - Costa Rica becomes the first Central American country to legalize same-sex marriage.
    (Reuters)
  - LGBT rights in Zambia
  - President Edgar Lungu pardons a gay couple jailed for 15 years due to consensual
    homosexual acts amid a mass wave of pardons of nearly 3,000 inmates to celebrate
    Africa Freedom Day. (Reuters)
  Politics and elections:
  - The Social Democratic Liberal Party, the main opposition party in Fiji's parliament,
    is suspended from parliament for 60 days amid a political feud which has caused
    its appointments to be declared null and void. The party's parliament leader,
    Sitiveni Rabuka, said the decision will not be appealed. (RNZ)
