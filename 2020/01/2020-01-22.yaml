Date: '2020-01-22'
Source_URI: Portal:Current events/2020 January 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - Mitiga International Airport, the only functioning airport in Libya's capital
    Tripoli, closes and a flight from Tunisia is diverted after forces loyal to Khalifa
    Haftar fire rockets toward the airport. (Reuters)
  Business and economy:
  - Elliott Management, a prominent hedge fund, has sold all its shares in the Hyundai
    Motor Group of South Korea. It had long quarreled with Hyundai's management, demanding
    more generous dividend pay-outs. Their departure from the shareholder ranks is
    likely welcomed by Hyundai executives. (Reuters)
  Disasters and accidents:
  - Police in the Solomon Islands launch search operations to find nine people from
    a capsized boat near Isabel Province. Five men, two women and two children were
    on board. (RNZ)
  - A small plane crashes shortly after takeoff from Corona Municipal Airport in California,
    killing all four on board. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Mainland China
  - Chinese authorities quarantine the entire city of Wuhan to prevent the further
    spread of the novel coronavirus as the death toll rises to 17. Nobody in the city
    will be able to leave starting from 10 a.m. local time on January 23, and all
    public transport in the city is suspended. (The Guardian)
  International relations:
  - UN special rapporteurs Agnès Callamard and David Kaye demand an investigation
    into claims made by The Guardian yesterday that Saudi Crown Prince Mohammad bin
    Salman ordered the 2018 hacking of Amazon CEO Jeff Bezos's phone. The hack was
    allegedly done months before the assassination of Jamal Khashoggi, who was employed
    at Bezos's newspaper The Washington Post and was a fierce critic of the Saudi
    government. The Saudi Foreign Ministry dismisses the allegations as "absurd".
    (Reuters)
  - Libyan peace process
  - Algeria announces it will host a meeting with foreign ministers from six North
    and sub-Saharan African nations, all of whom share a border with Libya, following
    the Berlin peace summit to help strengthen support for a tentative peace deal
    to end the Second Libyan Civil War. (Al Jazeera)
  Law and crime:
  - List of mass shootings in the United States in 2020
  - Eight people are shot, one fatally, following a dispute outside a McDonald's in
    downtown Seattle, Washington. (The Seattle Times)
  - LGBT rights in South Korea
  - A South Korean transgender soldier says she will sue the armed forces after it
    discharged her. The soldier, Byun Hui-su, says she will take her claim "until
    the end, to the Supreme Court". (Reuters)
  Politics and elections:
  - Impeachment trial of Donald Trump
  - The United States Senate hears opening statements in the impeachment trial of
    Donald Trump. (The Washington Post) (The Washington Post via dpaste) (The Washington
    Post via archive.ph)
  - Paraguayan President Mario Abdo Benítez is confirmed to have dengue fever amid
    a nationwide pandemic. (Reuters)
  - Italian Foreign Minister Luigi Di Maio resigns as leader of the ruling Five Star
    Movement, as polls show the party losing support ahead of a regional election
    in Emilia-Romagna next Sunday. (BBC News)
  - Brexit
  - The European Union Withdrawal Agreement Bill passes the House of Lords and is
    now awaiting royal assent to become law, finalizing the United Kingdom's withdrawal
    from the European Union on 31 January 2020. (BBC News)
  Science and technology:
  - The Seattle metropolitan area becomes the first place in the United States to
    allow vote by smartphone, which they authorized for a board of supervisors election
    in King County, Washington on February 11. (NPR)
  Sports:
  - The NFL's Oakland Raiders officially relocate to Las Vegas, and are now known
    as the Las Vegas Raiders. (Business Insider) (USA Today)
