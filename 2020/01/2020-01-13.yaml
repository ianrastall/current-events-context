Date: '2020-01-13'
Source_URI: Portal:Current events/2020 January 13
Intelligence_Payload:
  Arts and culture:
  - 92nd Academy Awards
  - The nominees for this year’s Academy Awards are announced. Joker receives 11 nominations,
    including for Best Picture and Best Director, the most out of those nominated.
    (The Hollywood Reporter)
  Business and economy:
  - The Competition Commission of India launches an antitrust probe into Flipkart
    and the Indian subsidy of Amazon, alleging that they were promoting certain sellers
    at the expense of smaller merchants. (Reuters)
  - Raphael Bostic, President of the Federal Reserve Bank in Atlanta, says in a speech
    that he, as a member of the Federal Reserve Board is inclined to keep interest
    rates at their present, very low, levels. Any evidence of overborrowing or volatility
    will have to be "systemic" for him to change his mind. (Reuters)
  - China–United States trade war
  - The U.S. Department of the Treasury de-lists China as a currency manipulator.
    (Reuters)
  - Visa Inc. purchases financial technology firm Plaid for US$5.3 billion, after
    it and Mastercard each invested US$250 million into the company last year. (Reuters)
  Disasters and accidents:
  - A sinkhole swallows a bus and several pedestrians on a busy street in Xining,
    China, killing six people and leaving 16 others injured. According to state media,
    the sinkhole stretches nearly 10m (32 feet) in diameter. (BBC News)
  International relations:
  - Libyan peace process
  - Representatives of Libya's Government of National Accord (GNA) and General Khalifa
    Haftar's rival Libyan National Army (LNA) reach a ceasefire agreement after talks
    in Moscow between warring factions in Libya, also attended by Russian and Turkish
    officials. The preliminary agreement was signed by GNA head Fayez al-Sarraj, while
    Haftar plans to sign it the next day. (RT)
  - Saudi Arabia–United States relations, aftermath of the Naval Air Station Pensacola
    shooting
  - The United States expels 21 Royal Saudi Air Force cadets. Amid an investigation
    into the Saudi Arabian military following the attack on Naval Air Station Pensacola
    in Florida, the cadets were found to have jihadist material and child pornography
    on their phones. However, none of the cadets are believed to have assisted the
    gunman in the attack. (BBC News)
  Law and crime:
  - The Lahore High Court, in Punjab, Pakistan, says the death sentence verdict against
    former ruler Pervez Musharraf last month is unconstitutional, casting into doubt
    the legitimacy of the verdict. (Reuters)
  - Murder of Ján Kuciak
  - A suspect accepts guilt for having killed the investigative journalist and his
    fiancée. (CBC News)
  - Crime in China
  - After a standoff, police in Hohhot, Inner Mongolia shoot and kill a hostage taker
    who had taken three hostages with a homemade gun. The case comes less than a year
    after five were killed in a shooting in Inner Mongolia, and the case is under
    investigation. (South China Morning Post)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - New Jersey Senator Cory Booker drops out of the U.S. presidential race. (NBC News)
  Science and technology:
  - Presolar grains
  - Analysis of a meteorite found in Australia in 1969 reveals stardust formed 5 to
    7 billion years ago, older than Earth's 4.6 billion year-old sun, making the meteor
    and its stardust the oldest solid material ever discovered on Earth. (MSN)
  - Naval Air Station Pensacola shooting
  - Apple says it is helping authorities in the Pensacola shooting investigation but
    refuses to unlock their phones. (BuzzFeed News)
  Sports:
  - Houston Astros sign stealing scandal
  - Houston Astros general manager Jeff Luhnow and manager A. J. Hinch are suspended
    by Major League Baseball for the entire 2020 season after the league concludes
    its investigation into the team's illegal use of technology to steal signs during
    the team's championship 2017 season. They are also fired by the organization.
    (ESPN)
  - 2020 College Football Playoff National Championship
  - In American football, LSU defeats Clemson to win the national championship. (NBC
    News)
