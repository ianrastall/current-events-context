Date: '2020-01-11'
Source_URI: Portal:Current events/2020 January 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ukraine International Airlines Flight 752, 2019–20 Iranian protests
  - Iran's Islamic Revolutionary Guard Corps admits it mistakenly shot down the Ukraine
    International Airlines plane as it took off from Tehran, killing all 176 aboard.
    (ABC News)
  - Vigils in Iran that were held for the victims subsequently turn into protests.
    According to Twitter videos, hundreds of protesters in Tehran call for the resignation
    of Supreme Leader Ayatollah Ali Khamenei. (Reuters) (Al Jazeera)
  - The British ambassador to Iran, Robert Macaire, is arrested during anti-government
    protests, after attending a vigil and then, according to BBC, getting his hair
    cut. According to Tasnim News Agency he was arrested "on suspicion of organising,
    provoking and directing radical actions". U.K. Foreign Secretary Dominic Raab
    states the arrest is in "flagrant violation" of international law. More than an
    hour later, Macaire is released from custody. (The Guardian)
  - Libyan peace process
  - German Chancellor Angela Merkel announces she will hold peace talks in Berlin
    to help end the Second Libyan Civil War. Both Russian President Vladimir Putin
    and Government of National Accord leader Fayez al-Sarraj express support for the
    peace initiative. (Reuters)
  - Forces loyal to Khalifa Haftar say they accept a ceasefire starting on 12 January,
    conditional on their rivals' acceptance. (Reuters)
  - Iraqi protests (2019–present)
  - Hundreds walk the street in mourning after popular journalist Ahmad Abdessamad
    and his cameraman were killed by unidentified gunmen the night before. (France
    24)
  - War in Afghanistan
  - Two United States troops are killed and another two troops injured by a roadside
    bomb. The Taliban later claim responsibility. (Reuters) (CBS News)
  - Battle of Chinagodrar
  - The death toll from the attack on Niger's armed forces on Thursday rises to over
    89 Niger soldiers. (The New York Times)
  Disasters and accidents:
  - Winter Storm Isaiah brings widespread heavy snowfall and freezing rain to the
    midwestern and southern United States, killing at least 12 people. (Associated
    Press)
  International relations:
  - North Korea–United States relations
  - After U.S. President Donald Trump sends birthday wishes to North Korean leader
    Kim Jong-un, North Korea state media says that "although Chairman Kim Jong-un
    has good personal feelings about President Trump, they are, in the true sense
    of the word, 'personal'", and that it is not enough to resume denuclearization
    talks. It further stated that the country would not be led on the basis of Kim's
    feelings. (Reuters) (BBC News)
  - United Kingdom–United States relations, Death of Harry Dunn
  - The U.S. State Department rejects an extradition request from the Home Office
    for the unlawful killing of Harry Dunn, describing it as "highly inappropriate"
    and "establish[ing] an extraordinarily troubling precedent". (BBC News)
  - Saudi Arabia–United States relations
  - More than a dozen Saudi military cadets are to be expelled from the United States,
    following a review by the Department of Defense in the aftermath of a shooting
    at Naval Air Station Pensacola last month by a Royal Saudi Air Force member. (CNN)
  Politics and elections:
  - 2020 Taiwanese presidential election, 2020 Taiwanese legislative election
  - Taiwanese voters head to the polls to elect a president and a new session to the
    Legislative Yuan. Incumbent pro-independence President Tsai Ing-wen defeats anti-independence
    challenger Han Kuo-yu in a landslide victory by more than 20%. (South China Morning
    Post)
  - The governing Democratic Progressive Party retains its majority in the Yuan, albeit
    with fewer seats. Most of the seats lost are taken by third parties instead of
    the KMT. (Taiwan News)
  - Oman names Haitham bin Tariq al-Said as its new head of state after the death
    of Sultan Qaboos. (CNN International)
  - Politics of Northern Ireland, Executive of the 6th Northern Ireland Assembly
  - Following a deal brokered by the British and Irish governments, the Northern Ireland
    Executive is restored with Democratic Unionist Party leader Arlene Foster as First
    Minister and Sinn Féin deputy leader Michelle O'Neill as deputy First Minister,
    ending three years of political deadlock. The previous government had collapsed
    in 2017 as the result of a renewable energy scandal involving Foster. (Euronews)
  - Thousands of protestors march in Warsaw against a controversial law proposed by
    the Sejm that would allow the Polish government to discipline judges that question
    their reform policies. Critics say the law would undermine the independence of
    the judiciary, and risks Poland's membership in the European Union. (Reuters)
