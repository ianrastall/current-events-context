Date: '2020-01-02'
Source_URI: Portal:Current events/2020 January 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - The Turkish Grand National Assembly votes 325–184 to send troops to help the internationally-recognized
    Government of National Accord in Libya. (Al Jazeera)
  - American-led intervention in Iraq (2014–2021), Iranian intervention in Iraq (2014–present),
    Aftermath of the Attack on the United States embassy in Baghdad
  - A missile strike hits a convoy near Baghdad International Airport in Iraq, killing
    Iranian Major general Qasem Soleimani and Popular Mobilization Forces leader Abu
    Mahdi al-Muhandis. (TRT World)
  Disasters and accidents:
  - The Swedish Royal Court confirms that Princess Estelle of Sweden, second-in-line
    to the Swedish throne, is injured in a skiing accident in the Alps where the Crown
    Princess Family is on vacation. (Royal Central)
  - 2020 New Taipei helicopter crash
  - A UH-60 Black Hawk helicopter carrying 13 people crashes in New Taipei, Taiwan.
    Eight people are killed, including the Chief of the General Staff Shen Yi-ming,
    the head of the Republic of China Armed Forces. (The Guardian)
  - 2019–20 Australian bushfire season
  - New South Wales Premier Gladys Berejiklian declares a state of emergency for seven
    days starting on January 3. (News)
  - An elderly woman dies of suffocation while leaving a Brisbane, Queensland-originated
    Qantas plane at Canberra Airport. Canberra's air quality had been reported as
    the worst in the world because of heavy smoke from the bushfires in New South
    Wales. (News)
  - A second person is confirmed dead in the East Gippsland region of Victoria as
    thousands of people are evacuated from Mallacoota by sea. State premier Daniel
    Andrews has declared a state of disaster in six government areas. 17 people remain
    missing. (News)
  - A military plane crashes shortly after takeoff from an airport in Sudan's West
    Darfur, killing the 18 people on board. (BBC News)
  International relations:
  - China–United Kingdom relations
  - China temporarily suspends plans to cross-link companies on the London and Shanghai
    Stock Exchange due to increased political tensions between the two nations, particularly
    Britain's stance on the Hong Kong protests. (Reuters)
  Law and crime:
  - Lebanese justice minister says he has received an arrest warrant from Interpol
    against former Chairman of Nissan, Carlos Ghosn, who escaped house arrest in Japan
    and fled to Lebanon days ago. (The Washington Post)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - Former Secretary of Housing and Urban Development Julian Castro drops out of the
    presidential race. (NPR)
  - Italy's ruling Five Star Movement expels Senator Gianluigi Paragone from its ranks
    over disciplinary issues, shrinking the coalition's majority in the Senate to
    five. (Reuters)
