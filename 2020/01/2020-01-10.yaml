Date: '2020-01-10'
Source_URI: Portal:Current events/2020 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ukraine International Airlines Flight 752
  - After Canadian Prime Minister Justin Trudeau suggests the plane was downed by
    an Iranian missile, Iranian authorities reject this theory. Iranian civil aviation
    chief says he is "certain" the plane was not hit by a missile, still asserting
    the cause was "mechanical failure". (BBC News)
  - January 2020 Quetta bombing
  - A bombing claimed by the Islamic State at a mosque in Quetta, Balochistan, Pakistan,
    kills at least 15 people and injures 18 others, three days after a motorcycle
    bombing in the city killed two. (The New York Times)
  International relations:
  - Iraq–United States relations, Iran–Iraq relations
  - Iraqi cleric and Grand Ayatollah Ali al-Sistani condemns both the United States
    and Iran over the escalation of conflict in Iraq, saying it shows blatant disregard
    for Iraqi sovereignty and the suffering of the Iraqi people. (Reuters)
  Law and crime:
  - An 11-year-old student opens fire at his school in Torreón, Coahuila, Mexico,
    killing a teacher and wounding six others before committing suicide. (The Guardian)
  Politics and elections:
  - 2019–20 Australian bushfire season
  - Thousands of people protest in Melbourne, Brisbane and Sydney, calling for the
    resignation or ouster of Prime Minister Scott Morrison, accusing him of negligence
    over the Australian bushfires. (News)
  - 2020 Democratic Party presidential primaries
  - Author and self-help guru Marianne Williamson drops out of the U.S. presidential
    race. (The New York Times)
  - The Tunisian Parliament votes 134 to 72 to reject a cabinet proposed by Prime
    Minister-designate Habib Jemli. President Kais Saied has 10 days to select someone
    else to build a new government. (Reuters)
  - Death of Qaboos bin Said al Said
  - Omani state television announces the death of the Sultan of Oman Qaboos bin Said
    al Said aged 79. At the time of his death he was the longest serving head of state
    in the Middle East and Arab world. (Reuters)
  - The high military council of Sultan of Oman's Armed Forces calls on the Omani
    royal family to convene to name a successor to the late sultan within three days.
    A three-day period of national mourning is declared. (The Guardian)
