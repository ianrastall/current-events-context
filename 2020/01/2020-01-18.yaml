Date: '2020-01-18'
Source_URI: Portal:Current events/2020 January 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Afghan presidential spokesman Sediq Sediqqi says that the government rejects the
    proposed "reduction in violence" by the Taliban as an "ambiguous term with no
    legal or military parameters". On Friday, the Taliban proposed a ten-day truce
    and to hold follow-up discussions with Afghan government officials. (Al Jazeera)
  - Yemen Civil War (2015–present)
  - 2020 Ma'rib attack
  - Eighty military personnel are killed by ballistic missiles and drone strikes in
    an attack reportedly carried out by the Houthis against a military camp in the
    Yemeni city of Ma'rib, according to Saudi state TV. The Houthis have not claimed
    responsibility for the attack. (BBC News)
  - Somali Civil War (2009–present)
  - 2020 Afgooye bombing
  - An al-Shabaab car bombing kills four people and injures at least 20 others near
    Afgooye, Lower Shabelle, Somalia. (Al Arabiya)
  Arts and culture:
  - Megxit
  - Officials within Buckingham Palace announced that effective around Q2 2020, Prince
    Harry and his wife Meghan, Duchess of Sussex will retain, but will no longer publicly
    use, the style His/Her Royal Highness, and will no longer receive public funds
    for royal duties. (BBC News)
  - The couple will also repay £2.4 million of public money spent on renovating Frogmore
    Cottage. (RTÉ News and Current Affairs)
  - The couple will keep their titles as Duke and Duchess of Sussex. While Prince
    Harry will lose all his military appointments, he will remain a prince. (Sky News)
  Disasters and accidents:
  - Winter Storm Jacob
  - A historic blizzard strikes Atlantic Canada, with St. John's in Newfoundland worst
    affected – over of snow fell during the day, breaking the city's all-time daily
    snowfall record. 21,000 homes are without power and one person is missing. (The
    Weather Channel)
  - High winds and heavy snowfall impact the Midwest and mid-Atlantic states of the
    United States, with the heaviest snowfall recorded in Chicago, Cleveland and Detroit.
    (The Weather Channel)
  International relations:
  - Seoul-based NK News reports that North Korean Foreign Minister Ri Yong-ho has
    been replaced. His successor is expected to be publicly announced next Thursday.
    (Reuters)
