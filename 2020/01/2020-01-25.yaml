Date: '2020-01-25'
Source_URI: Portal:Current events/2020 January 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two women, one of them pregnant, are killed and seven others are injured when
    artillery hits a Rohingya village in Rakhine State. The locals blame Myanmar's
    armed forces. The armed forces deny responsibility and blame the Arakan Army,
    and say the artillery hit the village amid ethnic clashes. (Reuters)
  - 2019–2021 Iraqi protests
  - Iraqi security forces raid a protest site in Baghdad and try to remove protesters
    in southern cities, firing tear gas and live bullets, killing four and wounding
    dozens more. The raid comes after Muqtada al-Sadr ordered his followers to withdraw.
    (Reuters)
  Health and environment:
  - COVID-19 pandemic
  - General Secretary of the Communist Party of China Xi Jinping holds a special Party
    Politburo meeting where he says that the country faces a "grave situation" as
    he warns the virus is "accelerating its speed". (People's Daily)
  - The United States orders the evacuation of the Consulate General of the United
    States, Wuhan employees and U.S. citizens in the city. (The New York Times)
  Science and technology:
  - The Boeing 777X completes its first test flight near Seattle, Washington, United
    States, after two delayed attempts. (CNN)
