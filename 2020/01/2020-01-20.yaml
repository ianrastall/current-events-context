Date: '2020-01-20'
Source_URI: Portal:Current events/2020 January 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - A Boko Haram female suicide bomber kills at least nine civilians in Kaiga-Kindjiria,
    western Chad. Two other civilians are injured. (TRT World)
  - Yemen Civil War (2015–present)
  - 2020 Ma'rib attack
  - The death toll from the drone and missile attack on a mosque in a military training
    camp in Ma'rib, Yemen, has risen to 116. (BBC News)
  - 2019–2021 Iraqi protests
  - Four protesters and two police officers are killed during clashes in Baghdad.
    (Reuters)
  - A former special police officer and two militants are killed during a gun battle
    with Indian troops in the region of Jammu and Kashmir. (Reuters)
  Health and environment:
  - Phase-out of plastic bags
  - China's National Development and Reform Commission announces that single-use plastic
    bags will be banned in major cities by the end of the year, and then nationwide
    by 2022. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Mainland China
  - Chinese premier Li Keqiang has urged decisive and effective efforts to prevent
    and control the epidemic. (China Daily)
  - The National Health Commission of China reports a third death from coronavirus,
    the number of infected having increased by 136 during the weekend. The report
    comes as authorities confirmed that the virus spread from Wuhan to major cities,
    including Shenzhen, Beijing, and Hong Kong. (South China Morning Post)
  - COVID-19 pandemic in South Korea
  - A case of Chinese coronavirus is also confirmed in South Korea. (Yonhap News Agency)
  - The fifth-ever case of Brazilian hemorrhagic fever, caused by the Sabiá virus,
    is reported in São Paulo, Brazil. The patient visited at least three hospitals
    in three different cities before the diagnosis was established; contact tracing
    is underway. (Outbreak News Today)
  - Malaysia ships back 3,737 metric tonnes of illegally-imported plastic waste to
    13 countries as Environment Minister Yeo Bee Yin declares that the country "[will]
    not become the garbage dump of the world". (BBC News)
  International relations:
  - International recognition of the Sahrawi Arab Democratic Republic
  - Bolivia withdraws its recognition of the Sahrawi Arab Democratic Republic as an
    independent nation, and cuts ties with the ruling Polisario Front. (The North
    Africa Post)
  Law and crime:
  - Trial of Catalan police leaders
  - The trial against the Mossos d'Esquadra leadership begins in the National Audience
    for the role of the regional police in the 2017 Catalan independence referendum
    and the 2017–18 constitutional crisis. Then-Major of the Mossos Josep Lluís Trapero,
    Pere Soler and Cèsar Puig face 11 years of imprisonment for rebellion, while Teresa
    Laplana is accused of sedition, facing four years of imprisonment. (The New York
    Times) (The Oklahoman)
  - 2020 VCDL Lobby Day
  - Thousands of protesters gather in Richmond to protest tighter gun laws in the
    U.S. state of Virginia. (BBC News)
  - Crime in Florida
  - A man is arrested for a series of 40 rapes in the Miami, Florida, United States
    area in the 1980s. (Miami Herald)
  Politics and elections:
  - The draft law on making amendments to 14 articles of the Constitution of Russia
    was presented by the working group in only five days. The same day Russian President
    Vladimir Putin formally submitted a bill on amendments to the lower house of parliament.
    (Meduza) (Yahoo! News) (TASS)
