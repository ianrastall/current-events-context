Date: '2020-01-19'
Source_URI: Portal:Current events/2020 January 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Philippines military announce that they have launched search and rescue operations
    for five Indonesian fishermen kidnapped by militants belonging to the ISIL-linked
    Abu Sayyaf group in Malaysian waters last week in Sabah. (Reuters)
  Disasters and accidents:
  - Storm Gloria
  - The tenth named storm of the 2019–20 European windstorm season makes landfall
    in northern Spain, killing at least 13 people. Heavy rainfall leads to widespread
    flooding, while high winds and coastal storm surges cause further damage. (BBC
    News)
  - Several people have died from hypothermia after heavy snowfall and high winds
    combined to bring historic blizzards over higher ground of mainland Spain. Local
    meteorologists have described Gloria as the worst storm to impact the region in
    38 years. (BBC News)
  International relations:
  - India–Malaysia relations
  - Indian trade minister Piyush Goyal states when he attends the World Economic Forum
    next week, he will not meet with his Malaysian counterpart Darell Leiking to discuss
    India's tightening of palm oil imports from his country. India tightened imports
    from Malaysia last week in response to Prime Minister Mahathir Mohamad's criticisms
    of the revocation of Jammu and Kashmir's special status and the Citizenship Amendment
    Act. (Reuters)
  Law and crime:
  - Crime in Hawaii
  - A man facing eviction shoots three police officers, killing two, then sets a house
    on fire, which spreads to four nearby houses, in Honolulu, Hawaii, United States.
    He is presumed dead in the fire. (Hawaii News Now)
  - Crime in Kansas City, Missouri
  - Two people (including the perpetrator) were killed and fifteen others were injured
    during a shooting at a nightclub in Kansas City, Missouri. (WDAF-TV)
  Politics and elections:
  - 2020 Comorian legislative election
  - Citizens of Comoros cast their votes in the country's latest legislative election
    which is boycotted by opposition parties. (Al Jazeera)
