Date: '2020-01-09'
Source_URI: Portal:Current events/2020 January 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Chinagodrar
  - Islamist militants kill over 25 Nigerien soldiers in an attack on an army base
    in Tillabéri Region, Niger. 63 militants are also killed in the ensuing shootout.
    (The Punch) (Reuters)
  - Ukraine International Airlines Flight 752
  - U.S., Canadian, British and Iraqi officials say they believe the plane crash near
    Tehran in which 176 were killed yesterday was likely caused accidentally by an
    Iranian anti-aircraft missile, while Iran says it was due to "mechanical failure".
    (Newsweek) (NPR) (Reuters)
  - The New York Times releases a verified video obtained from an Iranian citizen
    showing the plane being struck by what appears to be a surface-to-air missile.
    (The New York Times)
  - In a news conference, Canadian Prime Minister Justin Trudeau says it's "too early
    to draw definitive conclusions" that the downing of the plane was an "act of war".
    Trudeau also condemns Iran's attack on U.S. bases in Iraq. (National Post)
  Disasters and accidents:
  - A bus crashes in Iran's Mazandaran Province, killing at least 20 passengers and
    injuring 24 others. (Al Jazeera)
  Law and crime:
  - Judge Ghassan Ouiedat, a Lebanese prosecutor, imposes a travel ban on former Chairman
    of Nissan Carlos Ghosn after he was summoned over an Interpol warrant issued by
    Japan seeking his arrest on financial misconduct charges. (Reuters)
  - Trial of Catalonia independence leaders
  - The Spanish Supreme Court revokes the immunity of jailed Oriol Junqueras declared
    by the European Court of Justice in a sentence on 19 December. This happens after
    the board of European Parliament recognized the former Vice President of Catalonia
    as a MEP since 3 July and was elected president of the Greens–European Free Alliance
    parliamentary group. (The New York Times)
  Politics and elections:
  - Brexit
  - The United Kingdom House of Commons votes 330–231 to pass the Withdrawal Agreement
    Bill authorizing the country’s departure from the European Union at the end of
    the month. (Associated Press)
