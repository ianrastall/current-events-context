Date: '2020-11-02'
Source_URI: Portal:Current events/2020 November 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Vienna attack
  - Four civilians are killed and 22 others injured after a gunman opens fire in six
    locations in the streets of Vienna, Austria, near the central Schwedenplatz square.
    The Interior Minister described it as a "terror attack". The attacker was shot
    dead, and is identified as an Islamic supporter who tried to join the group in
    Syria. (BBC News)
  - The Austrian Armed Forces are deployed to secure public buildings in Vienna. (The
    Independent)
  - The Czech Police Forces announce that they will carry out random border checks
    with Austria as a preventive measure against terrorism. (Deutsche Welle)
  - 2020 Kabul University attack
  - Three militants open fire at Kabul University's campus, killing 22 people and
    wounding 22 others. The attack began around the time government officials were
    expected to arrive at the campus for the opening of an Iranian book fair. The
    gunmen are killed during a battle with security forces. ISIL claims responsibility
    for the attack. (BBC News)
  - Operation Barkhane; Mali War
  - French military airstrikes kill over 50 al-Qaeda-linked jihadists in Mali. (AFP
    via Yahoo! News)
  Arts and culture:
  - Most-viewed YouTube videos
  - '"Baby Shark Dance", produced by Pinkfong, surpasses "Despacito" as the most-viewed
    video on YouTube. (The Guardian)'
  Disasters and accidents:
  - 2020 Pacific typhoon season
  - Typhoon Goni
  - The death toll in the Philippines from Typhoon Goni, the world's strongest this
    year, rises to 20 people. Electricity, water and phone networks are cut off in
    Catanduanes, while homes are buried under volcanic rocks in Albay; those two are
    the provinces where all the deaths occurred. About one million people have been
    evacuated. (Al Jazeera)
  - 2020 Aegean Sea earthquake
  - Twenty-eight more people are found dead under debris in İzmir after an earthquake
    struck Greece and Turkey three days ago, bringing the death toll to 113. The earthquake
    is currently the deadliest this year. (Al Jazeera)
  - 2020 Atlantic hurricane season
  - Hurricane Eta is expected to rapidly increase within the next 18 hours according
    to the National Hurricane Center (NHC). The storm is moving in the Caribbean Sea
    towards Nicaragua bringing "devastating conditions". A hurricane warning has been
    issued for Nicaragua and Honduras. (CNN)
  - Two houses on Durham Place, Chelsea, London collapse shortly before midnight,
    leading to around 40 people being evacuated. (The Guardian)
  - De Akkers metro station crash
  - A train on the Rotterdam Metro crashed through the buffer stop at De Akkers metro
    station in the city of Spijkenisse in the Netherlands. The lead car of the train
    partially rested on a high whale sculpture erected in front of the station, preventing
    the train from falling to the street below. (ABC News)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - France reports a record 52,518 new infections in the past 24 hours, raising its
    cumulative case total to 1.46 million. (Anadolu Agency)
  - COVID-19 pandemic in Greece, COVID-19 pandemic lockdowns
  - Greece imposes a two-week lockdown on its second largest city of Thessaloniki
    to curb the spread of COVID-19. Flights to and from the city are also suspended
    beginning tomorrow. The lockdown also affects the northern city of Serres. (Medical
    Xpress)
  - COVID-19 pandemic in Italy
  - Prime Minister Giuseppe Conte told Italian lawmakers he will announce new restrictions
    that would vary by region but would include a "late evening" curfew for many regions.
    Therefore, high schools across the country will move to full-time distance learning
    and shopping malls will close on weekends. (The Hill)
  - COVID-19 pandemic in Kosovo
  - The government imposes a curfew from 9 p.m. to 5 a.m. local time for all restaurants
    and cafés. No more than five people are allowed to socialize, and no mass events
    may be held. Concerts, cultural and sporting events may be held if seating is
    limited. In addition, elderly people are allowed out only at certain times, and
    masks are mandatory outdoors. (The National Herald)
  - COVID-19 pandemic in Ukraine
  - Ukraine surpasses 400,000 cases of COVID-19. (112 UA)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Georgia (country)
  - Prime Minister Giorgi Gakharia tests positive for COVID-19. (Agenda.ge)
  - COVID-19 pandemic in Iran
  - Iran reports a record 440 new deaths in the past 24 hours, pushing the nationwide
    death toll to 35,738. (Arab News)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in British Columbia
  - British Columbia's deputy provincial health officer Réka Gustafson and Health
    Minister Adrian Dix announce a record 1,120 new cases over the weekend, which
    includes 352 cases from Friday to Saturday, 389 cases were reported from Saturday
    to Sunday, and 379 cases from Sunday to Monday. (CTV)
  - COVID-19 pandemic in Alberta
  - Rose Addo becomes the first passenger to take part in a new COVID-19 screening
    pilot program which landed at Calgary International Airport. (CBC)
  - The government announces that from November 21, air travellers whose final destination
    is Canada will be required to submit their information through ArriveCAN before
    they board their flight and starting immediately, travellers that enter by land
    or marine modes are strongly encouraged to continue ArriveCAN by downloading the
    mobile app or signing in online to provide the mandatory information before they
    arrive. (Biospace)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Massachusetts
  - Governor Charlie Baker announces new restrictions for the state, including a stay-at-home
    order, curfew for businesses, reduction of indoor gatherings, and a tighter mask
    mandate. The restrictions will take effect on November 6. (WBZ-TV) (The Boston
    Globe)
  - COVID-19 pandemic in Indiana
  - The first round of Indiana National Guard troops are expected to arrive at nursing
    homes in the state. The move was announced by Governor Eric Holcomb during a press
    conference in Indianapolis on October 28. (The Chicago Tribune)
  - COVID-19 pandemic in Panama
  - President Laurentino Cortizo self-isolates after a close coworker tests positive
    for COVID-19. (Reuters)
  - COVID-19 vaccine
  - South African pharmaceutical company Aspen Pharmacare announces that they have
    made a deal with Johnson & Johnson to manufacture their COVID-19 vaccine candidate
    if approved in South Africa and internationally. (The Star Tribune)
  International relations:
  - Russia–United States relations
  - Former National Security Agency contractor Edward Snowden applies for Russian
    citizenship. (CNN)
  Law and crime:
  - 2020 Tanzanian general election
  - Police arrest opposition activists Freeman Mbowe, Godbless Lema, Isaya Mwita Charles
    and Boniface Jacob ahead of planned protests against the election which gave incumbent
    John Magufuli another term. (Al Jazeera)
  - Depp v News Group Newspapers Ltd
  - The High Court of Justice finds in favour of News UK in the libel action that
    Johnny Depp took against them over claims he had beaten his ex-wife Amber Heard.
    (The Guardian)
  - The French government announces that it will ban the Turkish ultranationalist
    group Grey Wolves. Interior Minister Gerald Darmanin describes the group as "particularly
    aggressive" and will be seeking its dissolution. The group has been accused of
    vandalizing Armenian Genocide memorials, including one in Lyon last weekend. (Al
    Jazeera)
  Politics and elections:
  - 2020 Algerian constitutional referendum
  - The proposed amendmends to the Constitution of Algeria are passed with over 66%
    of the votes having been cast in favour. Voting turnout however was at a record
    low of less than 24%. (DW)
  - 2020 Moldovan presidential election
  - Maia Sandu wins the first election round of Moldova's latest presidential election
    by gaining around 36% of the votes. Incumbent president Igor Dodon received over
    32% and will face Sandu in the second round later in November. (DW)
