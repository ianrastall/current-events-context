Date: '2020-11-11'
Source_URI: Portal:Current events/2020 November 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Saudi Arabia
  - A bomb explodes at a Remembrance Day ceremony attended by foreign diplomats in
    Jeddah, Saudi Arabia. Several people are wounded. (BBC News)
  Disasters and accidents:
  - 2020 Atlantic hurricane season
  - Hurricane Eta restrengthens into a category 1 hurricane as it reaches the Gulf
    Coast of Florida. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Texas
  - Texas Governor Greg Abbott announces that the state is expected to deploy resources
    to Lubbock and El Paso to help combat the spread of COVID-19. (KJTV-TV)
  - El Paso County judge Ricardo Samaniego announces that the stay-at-home order will
    be extended to December 1 as cases continue to increase. (El Paso Herald-Post)
  - COVID-19 pandemic in Arkansas
  - Arkansas reports 1,962 new cases, a new single-day record. (KYTV-TV)
  - COVID-19 pandemic in Illinois
  - Illinois reports 12,657 new infections, a new single-day record as the number
    of hospitalized patients reaches an all-time high of 5,042, surpassing the previous
    record set in April. (WBBM-TV)
  - COVID-19 pandemic in New York (state)
  - New York Governor Andrew Cuomo announces a 10:00 p.m. EST curfew for bars, restaurants,
    and gyms in the state from November 13 in order to reduce the spread of COVID-19.
    (Patch.com)
  - COVID-19 pandemic in North Carolina
  - North Carolina reports 3,119 new cases in the last 24 hours, a new single-day
    record, as the positivity rate rises to 7.9%. (WCNC-TV)
  - COVID-19 pandemic in Ohio
  - Ohio Governor Mike DeWine reinstates a statewide mask mandate with penalties for
    businesses. He also says that the state might close restaurants, bars, and fitness
    centers if cases continue to increase. (WDTN) (Cleveland.com)
  - COVID-19 pandemic in Vermont
  - Vermont reports 72 new cases, a new single-day record since the pandemic began.
    (VTDigger)
  - The number of people who hospitalised due to COVID-19 in the United States reaches
    65,368, a new record for second day a row. (Wall Street Journal)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario reports 1,426 new infections, a new single-day record. (CBC)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - Germany reports 261 new fatalities, according to the Robert Koch Institute. This
    is the highest number of deaths in a single day since April, raising the nationwide
    death toll to 11,767. (Anadolu Agency)
  - COVID-19 pandemic in Greece
  - The Greek government announces that it will impose a nationwide overnight curfew
    from 9:00 p.m. to 5:00 a.m. local time, beginning November 13. This comes as the
    National Public Health Organization reports a record 2,752 new cases and 43 deaths
    in the past 24 hours. (The National Herald)
  - COVID-19 pandemic in Italy
  - Italy surpasses one million total COVID-19 cases, becoming the third country in
    the European Union to surpass that milestone. In addition, the country also reports
    623 new deaths, the highest single-day total since April 6. (The Guardian)
  - COVID-19 pandemic in Russia
  - Russia reports 432 new fatalities in the last 24 hours, raising its nationwide
    death toll to 31,593. It is first time that the country has reported more than
    400 deaths and is also a new single-day record for that figure since the pandemic
    began. (The Moscow Times)
  - COVID-19 pandemic in Spain
  - The number of deaths from COVID-19 in Spain surpasses 40,000. (Medical Xpress)
  - COVID-19 pandemic in Turkey
  - Turkey announces a nationwide indoor smoking ban in a bid to halt the rising number
    of COVID-19 cases. (Daily Sabah)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports 50,385 total COVID-19 deaths since the start of the
    pandemic, becoming the first country in Europe to surpass 50,000 deaths. (BBC
    News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Mongolia
  - Mongolia reports the first domestic case of COVID-19 from a truck driver who infected
    his wife and two other relatives after three weeks of quarantine. (France 24)
  - COVID-19 pandemic in Iran
  - Iran reports a record 11,780 new infections and 462 fatalities in the past 24
    hours, raising its nationwide totals since the beginning of the pandemic to 715,068
    cases and 39,664 deaths. (Reuters)
  - COVID-19 pandemic in Pakistan
  - Pakistan reports 1,708 new infections in the last 24 hours, which is the highest
    daily total since August as it considers new measures to combat the rising number
    of cases. (Tribune India)
  - COVID-19 pandemic in the Philippines
  - The Philippines surpasses 400,000 total COVID-19 cases, becoming the second country
    in Southeast Asia after Indonesia to reach that milestone. (Philstar)
  - COVID-19 pandemic in Vanuatu
  - Vanuatu reports its first case of COVID-19 after a citizen who was repatriated
    from the United States tested positive while in quarantine. (ABC Australia)
  International relations:
  - Travel restrictions related to the COVID-19 pandemic; COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong, COVID-19 pandemic in Singapore
  - The Civil Aviation Authority of Singapore (CAAS) announces that a "travel bubble"
    between Singapore and Hong Kong will begin on November 22 with 200 passengers
    per day. Passengers on these flights will not be subjected to a two-week quarantine.
    (CNA)
  - Philippines–United States relations
  - Philippine Foreign Secretary Teodoro Locsin Jr. announces the government's decision
    to suspend the termination of the Visiting Forces Agreement with the United States
    for at least another six months. (Kyodo News)
  Law and crime:
  - 2020 Reading stabbings
  - Kahairi Saadallah pleads guilty to three murders and three attempted murders.
    (The Daily Telegraph)
  Politics and elections:
  - 2020 Belizean general election
  - A general election is held in Belize amidst a prolonged economic crisis. Patrick
    Faber of the ruling United Democratic Party is challenged by Johnny Briceño, the
    candidate of the oppositional People's United Party. Dean Barrow, Prime Minister
    of Belize for the past 12 years, decided to not run again for office. (Al Jazeera)
  - Politics of Bahrain
  - Prince and Prime Minister Khalifa bin Salman Al Khalifa dies at the age of 84
    after holding the office since 1970. He is succeeded by Prince Salman bin Hamad
    Al Khalifa. (Al Jazeera)
  - 2019–20 Hong Kong protests; Legislative Council of Hong Kong
  - Four Hong Kong pro-democracy activists, Alvin Yeung, Dennis Kwok, Kwok Ka-ki and
    Kenneth Leung, are stripped of their seats following a decision by China's National
    People's Congress Standing Committee. 15 pro-democracy legislators announced their
    resignations shortly after the announcement, also declaring "that 'One Country,
    Two Systems' has come to an end". Critics fear this will turn the legislature
    into a rubber stamp for pro-Beijing policies. (CNN) (The Guardian)
  - COVID-19 pandemic in Poland
  - Several officers are injured after far-right protestors clash with police in Warsaw,
    after thousands defied public gathering restrictions to participate in the annual
    Independence Day march. (Al Jazeera)
  - Presidential transition of Joe Biden
  - President-elect Joe Biden announces Ron Klain as his incoming White House Chief
    of Staff. (CNN)
