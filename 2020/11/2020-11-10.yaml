Date: '2020-11-10'
Source_URI: Portal:Current events/2020 November 10
Intelligence_Payload:
  Uncategorized:
  - Aftermath of the Falklands War
  - Land mines in the Falkland Islands
  - The Falkland Islands are declared land mine-free, 38 years after the end of the
    war. (Forces)
  - Tigray military intervention
  - State-affiliated TV reports that Ethiopian Armed Forces have seized Humera Airport
    in the Tigray Region. Hundreds have been killed since the intervention broke out
    last week as the African Union calls for an immediate end to the conflict. Prime
    Minister Abiy Ahmed ordered airstrikes and an offensive after an alleged attack
    on a federal military base by forces of the Tigray People's Liberation Front.
    (Reuters)
  - European Union competition law, criticism of Amazon
  - The European Union files antitrust charges against Amazon, accusing the company
    of abusing its position as the top online retailer in France and Germany by using
    data from sellers to determine what offers to make and what products to launch
    for their own branded goods. The antitrust commission also opens a second investigation
    into similar charges against Amazon. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Illinois
  - Illinois reports 12,623 new confirmed and probable cases in the last 24 hours,
    a new single-day record since the beginning of the pandemic. In addition, the
    number of cumulative cases surpasses 500,000. (Chicago Tribune)
  - COVID-19 pandemic in Michigan
  - Michigan reports 6,473 new cases, a new single-day record. (WDIV-TV)
  - COVID-19 pandemic in Texas
  - Texas reports 10,865 new cases in the last 24 hours, a new single-day record since
    the pandemic began. (KTVT-TV)
  - COVID-19 pandemic in Wisconsin
  - Wisconsin reports 7,073 new cases and 66 deaths in the past 24 hours, new single-day
    records since the pandemic began. In addition, the positivity rate reaches a record
    high of 35.37%. (WBAY-TV)
  - COVID-19 pandemic in Iowa
  - Iowa Governor Kim Reynolds extends the state of emergency and announces new restrictions
    on public gatherings amid a rise of cases in the state. (KWQC-TV)
  - COVID-19 pandemic in Minnesota
  - Minnesota Governor Tim Walz announces new restrictions amid a rise of cases in
    the state. Indoor and outdoor gatherings will have a 10-person limit, bars and
    restaurants will close indoor dining service at 10 p.m. CST, and indoor capacity
    will be reduced to 50% of people. (WCCO-TV) (CBS News)
  - 61,964 hospitalizations are reported in the United States, a new record high surpassing
    the previous record on April 15 and the first time that there are more than 60,000
    Americans hospitalized for COVID-19. (Forbes)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario reports 1,388 new cases of COVID-19 infections in the last 24 hours, a
    new single-day record since the pandemic began. (CFTO-DT)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Bosnia and Herzegovina
  - Bosnia and Herzegovina announces a nighttime curfew between 11:00 p.m. and 6:00
    a.m. local time beginning tomorrow as part of a measure to reduce the spread of
    COVID-19. It also will limit indoor and outdoor gatherings to 30 people. (Anadolu
    Agency)
  - COVID-19 pandemic in Bulgaria
  - Bulgaria reports 107 new fatalities in the last 24 hours, a new single-day record
    and the first time the country has reported more than 100 deaths since the pandemic
    began. (Novinite)
  - COVID-19 pandemic in Denmark
  - Prime Minister Mette Frederiksen halts a plan to kill more than 15 million minks
    in Denmark to contain a coronavirus mutation due to opposition from MPs to pass
    a bill that would authorize the slaughter. (The Washington Post)
  - COVID-19 pandemic in Italy
  - Italy reports 580 new fatalities in the past 24 hours, the highest daily total
    since April 14, as more regions across the country face new restrictions. (ANSA)
  - COVID-19 pandemic in Russia
  - Moscow Mayor Sergei Sobyanin announces that the city will limit operating hours
    at clubs, bars and restaurants for two months between November 13 until January
    15, 2021. Under the new rules, these establishments will not be allowed to serve
    customers from 11:00 p.m. to 6:00 a.m. local time. However, the restrictions do
    not apply to take-away services. (The Moscow Times)
  - COVID-19 pandemic in Spain, COVID-19 vaccine
  - The Health Ministry announces that Spain will receive 20 million vaccine doses
    from Pfizer and BioNTech by early 2021. (Forbes)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports 532 new fatalities in the last 24 hours, the highest
    single-day total since May 12, bringing its death toll to 49,770. Meanwhile, weekly
    deaths surpass 1,000 for the first time since June. (Sky News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Iran
  - Iran imposes new restrictions that order restaurants and non-essential businesses
    in Tehran to close at 6:00 p.m. local time for the next month, in order to curb
    the worsening spread of COVID-19 that threatens to overwhelm hospitals. (Hindustan
    Times)
  - COVID-19 pandemic in Lebanon, COVID-19 pandemic lockdowns
  - Caretaker Prime Minister Hassan Diab announces a two-week full lockdown from November
    14 - 30, after localized lockdown measures fail to stem the surge of COVID-19
    cases. (Daily Star)
  - COVID-19 pandemic in the State of Palestine
  - Palestinian chief negotiator Saeb Erekat dies at the age of 65 due to complications
    from COVID-19. (CNN)
  - 2018 Toronto van attack
  - The defendant in the attack that killed 10 people pleads "not criminally responsible"
    for the incident saying he has a mental illness. Under Canadian law, his lawyers
    will have to prove that he has a mental illness that kept him from understanding
    either what he was doing, or that what he was doing was wrong. (BBC News)
  - 2020 Jordanian general election
  - Citizens of Jordan cast their votes in a general election after the country's
    House of Representatives was dissolved in September. The election takes place
    during a rapid surge of new COVID-19 infections. (Al Jazeera)
