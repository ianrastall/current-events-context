Date: '2020-11-28'
Source_URI: Portal:Current events/2020 November 28
Intelligence_Payload:
  Uncategorized:
  - Tigray conflict
  - Mekelle offensive
  - Federal forces say that they have seized the town of Wukro in Ethiopia's Tigray
    Region as they advance on the region's capital Mekelle. Tigray People's Liberation
    Front (TPLF) leader Debretsion Gebremichael confirms that government forces had
    started an operation to capture Mekelle, saying his forces are "ready to die in
    defence of our right to administer our region". (BBC News)
  - Prime Minister Abiy Ahmed says that the Ethiopian military is in "full control"
    of Mekelle after entering the regional capital with limited resistance and are
    now searching for Tigrayan officials. Chief of General Staff Birhanu Jula Gelalcha
    says government forces have now "completely controlled Mekelle", and that 7,000
    Northern Command members being held hostage by the TPLF have been freed. (Al Jazeera)
  - The U.S. Embassy in Asmara reports several explosions in the Eritrean capital.
    The TPLF has previously fired rockets at the capital during the conflict. (AP)
  - Assassination of Iranian nuclear scientists
  - Assassination of Mohsen Fakhrizadeh
  - Iranian president Hassan Rouhani vows to "respond" to Israel, whom the regime
    has accused of orchestrating the killing, "at the proper time." (CNBC)
  - The supercarrier USS Nimitz is deployed to the Persian Gulf from its station in
    Bahrain. The U.S. Navy maintains that the ship's deployment was not related to
    "any specific threat." (Reuters)
  - Boko Haram insurgency
  - Koshebe massacre
  - Boko Haram jihadists attack a farm in Jere, Borno State, Nigeria, killing at least
    43 people. The massacre reportedly occurred during the morning, when most workers
    were harvesting rice. (Reuters)
  - College of Cardinals
  - Wilton Daniel Gregory, Archbishop of Washington, becomes the first African American
    to earn the rank of cardinal. (The Washington Post)
  - A major search and rescue operation is underway following a collapse at a gold
    mine in Bindura, Zimbabwe. Around 30 miners remain unaccounted for since the collapse,
    while six men have emerged alive from the mine. (The Guardian)
  - The city of Nuoro, on the island of Sardinia, Italy, is affected by flooding and
    subsequent mudflows caused by heavy rains, killing at least three people. (BBC
    News)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Oregon
  - Oregon reports a new single-day record of 1,669 cases, bringing the total number
    of cases to 72,506. (The Oregonian)
  - COVID-19 pandemic in Michigan
  - Michigan surpasses 9,000 confirmed deaths from COVID-19. (MLive.com)
  - COVID-19 pandemic in Colorado
  - Governor Jared Polis and his husband Marlon Reis test positive for COVID-19 and
    enter quarantine at their home. (KUSA-TV)
  - COVID-19 pandemic in Ohio
  - Ohio surpasses 400,000 cases of COVID-19. (WCMH-TV)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Quebec
  - Quebec reports a new single-day record of 1,480 cases, bringing the total number
    of confirmed cases in the province to 139,643. The province also surpasses 7,000
    total deaths from COVID-19. (CFCF-DT)
  - COVID-19 pandemic in Alberta
  - Alberta reports 1,731 cases, a new single-day record. (Edmonton Journal)
  - The number of cases in Canada exceeds 360,000. (Global News)
  - COVID-19 pandemic in Mexico
  - Mexico reports 12,081 new cases in the past 24 hours, a new single-day record
    since the pandemic began. (The Yucatan Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - Hairdressers and other non-essential shops in France reopen for the first time
    since October after the country eases its second nationwide lockdown. (The Guardian)
  - COVID-19 pandemic in Greece
  - Greece reports a record 121 new deaths in the past 24 hours, bringing the nationwide
    death toll to 2,223. (Ekathimerini)
  - COVID-19 pandemic in Hungary
  - Hungary surpasses 200,000 total cases of COVID-19. In addition, a record of 152
    new deaths in the last 24 hours is also reported. (Hungary Today)
  - COVID-19 pandemic in Turkey
  - Turkey reports a record 182 new deaths in the past 24 hours, bringing the nationwide
    death toll to 13,373. The country also reports 30,103 new cases, including asymptomatic
    cases, a new record since the pandemic after asymptomatic cases are included.
    (Swiss Info)
  - COVID-19 pandemic in Ukraine
  - Ukraine surpasses 700,000 total cases of COVID-19 after a record 16,294 new cases
    are reported in the past 24 hours. (Kyiv Post)
  - COVID-19 pandemic in Belarus
  - Belarus reports 1,691 cases in the past 24 hours, a new single-day record, bringing
    the total number of cases to 133,324. (Xinhua News Agency)
  - COVID-19 pandemic in the United Kingdom
  - Prime Minister Boris Johnson announces that Nadhim Zahawi will be appointed as
    the country's vaccine rollout minister. (BBC News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan
  - Japan reports 2,684 new cases in the past 24 hours, a new single-day record since
    the beginning of the outbreak. (Nippon.com)
  - COVID-19 pandemic in Myanmar
  - Myanmar extends their restrictions for another 15 days until December 15, according
    to an announcement made by de facto leader Aung San Suu Kyi due to an increase
    in COVID-19 cases in the country. The current restrictions are due to end on November
    30. (Bloomberg)
  - COVID-19 vaccine
  - The first batch of one million doses of Sinopharm's vaccine arrives in Casablanca,
    Morocco. Morocco has ordered an initial 10 million doses. (North Africa Post)
  - The first doses of Pfizer's potential vaccine are flown to the United States from
    Belgium. (The Hill)
  - Avian influenza
  - 2020 H5N8 outbreak
  - South Korea's Agriculture Ministry reports the first case of highly pathogenic
    H5N8 avian influenza among domestic poultry at a duck farm in the city of Jeongeup,
    North Jeolla Province. (The Korea Times)
  - Egypt–South Sudan relations
  - Abdel Fattah el-Sisi visits South Sudan, making him the first President of Egypt
    to do so. (San Francisco Chronicle)
  - European migrant crisis, France–United Kingdom relations
  - UK Home Secretary Priti Patel and French Minister of the Interior Gérald Darmanin
    announce an agreement to curb illegal migrant crossings in the English Channel.
    As part of the measures, costing the UK an additional 31.4 million euro, French
    border patrol officers will double their patrols on French beaches beginning next
    week, while enhancing surveillance, including increasing the use of drones to
    detect migrant boats. (BBC News) (La Voix du Nord)
  - Montenegro–Serbia relations
  - Montenegro and Serbia expel their respective ambassadors following controversial
    comments by Serbian ambassador Vladimir Bozovic, who described the Kingdom of
    Montenegro's decision to merge with the Kingdom of Yugoslavia in 1918 as a "liberation".
    He was accused of "interfering in Montenegro's internal affairs" and was given
    72 hours to leave the country by the Montenegrin government. (BBC News)
  - 2020 Indian farmers' protest
  - Thousands of farmers protest in New Delhi against legislation they say will devastate
    crop prices. (AP)
  - COVID-19 pandemic
  - Impact of the COVID-19 pandemic on politics
  - Protests against Benjamin Netanyahu
  - Protesters gather at the Beit Aghion residence in Jerusalem to call for the resignation
    of Israeli Prime Minister Benjamin Netanyahu for his handling of the COVID-19
    pandemic in the country and also while he is on trial for corruption. (Toronto
    Star)
  - Aftermath of 2020 Malaysian political crisis
  - Prime Minister Muhyiddin Yassin says that he would call for a general election
    once the COVID-19 pandemic is over due to a "difficult and challenging situation"
    faced by his Perikatan Nasional government which has a slim majority in Parliament.
    (The Straits Times)
  - 2020 NCAA Division I FBS football season, Female American football players
  - Sarah Fuller of Vanderbilt becomes the first female athlete to play in a Power
    Five college football game. (BBC News)
