Date: '2020-11-03'
Source_URI: Portal:Current events/2020 November 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2020 Vienna attack, Islamic terrorism in Europe
  - Through its Amaq News Agency, the Islamic State of Iraq and the Levant claims
    responsibility for last night's deadly mass shooting in Vienna, Austria. (Reuters)
  Business and economy:
  - Economic impact of the COVID-19 pandemic; COVID-19 pandemic in Australia
  - Economy of Australia
  - The Reserve Bank of Australia slashes its official cash rate to a historic low
    0.1%, in an attempt to boost spending in the economy and address the high rate
    of unemployment caused by the COVID-19 pandemic. It is also expected that the
    cash rate will not go up for at least another three years. (The Guardian)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Hungary
  - Hungary reports 3,989 new infections and 89 deaths in the past 24 hours, its single-day
    record on both cases and deaths since the pandemic began, bringing the nationwide
    totals to 86,769 cases and 1,973 deaths respectively. (Hungary Today)
  - Prime Minister Viktor Orbán declares a state of emergency (known as a "special
    legal order") for the second time beginning at midnight due to a resurgence of
    COVID-19 in the country and would ask lawmakers to extend it for another 90 days.
    He also orders bars and entertainment venues to close and imposes a nighttime
    curfew between midnight and 5:00 a.m. local time. (Budapest Business Journal)
  - COVID-19 pandemic in France
  - France reports 854 new fatalities in the past 24 hours, which is the highest number
    since April 15, with more than half coming from nursing homes. (Al-Arabiya English)
  - COVID-19 pandemic in Italy
  - Italy reports 353 new fatalities in the past 24 hours, the highest number of fatalities
    since May. (ANSA)
  - COVID-19 pandemic in the Netherlands
  - Prime Minister Mark Rutte announces additional restrictions, closing theatres,
    cinemas, museums and zoos for two weeks beginning at 10:00 p.m. local time tomorrow.
    He also advises people to stay at home and only go outside if necessary. In addition,
    the maximum amount of people who can meet outside is reduced from four to two.
    (Dutch News)
  - COVID-19 pandemic in Poland
  - Poland surpasses 400,000 cases of COVID-19. (The Jerusalem Post)
  - COVID-19 pandemic in Romania
  - Romania records 7,733 new cases, as well as 120 deaths. It is the highest jump
    in the number of cases and the deadliest day since the start of the pandemic in
    the country. (Romanian Journal)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bahrain; COVID-19 vaccine
  - Bahrain grants emergency use approval for a vaccine candidate produced in a partnership
    between Sinopharm and Abu Dhabi-based artificial intelligence and cloud computing
    company Group 42 on frontline workers. (Reuters)
  - COVID-19 pandemic in Georgia
  - Georgia imposes additional restrictions which require people to wear masks outdoors
    as well as indoors, all restaurants and cafés must close at 10:00 p.m. local time,
    and remote learning at schools and universities in 10 large cities, including
    Tbilisi, will continue until November 25. (Georgia Today)
  - COVID-19 pandemic in Iran
  - Iran reports 8,932 new cases, its single-day record, pushing the case total to
    637,712. (Arab News)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record 12 new fatalities in the last 24 hours, bringing the
    nationwide death toll from the virus to 263. (New Straits Times)
  - COVID-19 pandemic in Nepal
  - Nepal surpasses 1,000 COVID-19 deaths. (The Kathmandu Post)
  - COVID-19 pandemic in United Arab Emirates
  - Prime Minister and ruler of Dubai, Sheikh Mohammed bin Rashid Al Maktoum received
    the COVID-19 vaccine developed by Sinopharm. Front-line healthcare workers in
    the UAE are also getting the shot as part of emergency use authorization. (Al
    Jazeera)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Maine
  - Maine reports 127 new infections on Election Day, its single day record since
    the pandemic began. (The Press Herald)
  - COVID-19 pandemic in Minnesota
  - Minnesota reports 3,483 new infections, its single day record since the pandemic
    began. (Duluth News Tribune)
  - COVID-19 pandemic in Pennsylvania
  - Pennsylvania reports 2,875 new infections, its single day record since the pandemic
    began. (The Philadelphia Inquirer)
  - COVID-19 pandemic in Wisconsin
  - Wisconsin reports more than 5,700 new infections, its single day record since
    the pandemic began. (Milwaukee Journal Sentinel)
  - COVID-19 pandemic in Algeria
  - President Abdelmadjid Tebboune tests positive for COVID-19 but his condition is
    gradually improved as he receives treatment in a German hospital, according to
    a statement from the presidency. (Bloomberg)
  International relations:
  - Australia–China relations
  - China is threatening to impose bans on up to $6 billion of key Australian exports
    such as wine, copper, barley, coal, sugar, timber and lobster beginning Friday,
    straining trade relations between the two countries. (Australian Financial Review)
  - The United States, Japan, India and Australia begin the Malabar naval exercise,
    in what is seen as a push to counter China's military and economic power in the
    region. Meanwhile, China has accused the United States of having a "cold war mentality"
    and "ideological prejudice". (Reuters)
  Law and crime:
  - Thailand bans pornography website Pornhub and 190 other websites depicting pornographic
    material and gambling, which are illegal under Thai law. (CNN)
  Politics and elections:
  - 2020 United States elections
  - 2020 United States presidential election, 2020 United States election protests
  - Americans head to the polls to vote for their President and Vice President. Around
    100 million Americans have already voted early or by mail due in part to the COVID-19
    pandemic. (The New York Times)
  - Demonstrators and supporters of both President Donald Trump and former Vice President
    Joe Biden gather at Black Lives Matter Plaza in Washington, D.C. A fight breaks
    out which results in one arrest. (NBC)
  - Voters in Arizona, New Jersey, Montana and South Dakota approve legislation legalizing
    recreational cannabis, while voters in Mississippi approve the medical use of
    cannabis. Oregon becomes the first U.S. state to decriminalize the possession
    of small amounts of hard drugs such as cocaine, heroin and methamphetamine. (USA
    Today)
  - The legalization of sports betting is approved by voters in Louisiana, Maryland
    and South Dakota. (ESPN)
  - 2020 Puerto Rican status referendum
  - Voters in Puerto Rico vote on whether they wish to be a state or not. If voters
    decide on statehood, the territory could work to join the union and fully become
    incorporated into the United States. (Business Insider)
  - Impact of the COVID-19 pandemic on politics; COVID-19 pandemic in Denmark
  - The Folketing (Danish Parliament) suspends voting and other meetings after several
    lawmakers tested positive for COVID-19 and six ministers had self-isolated while
    awaiting test results. (Swiss Info)
  - 2020 Palauan general election; 2020 Palauan presidential election
  - Palauans elect their new President. Outgoing president Tommy Remengesau Jr., who
    completed his term limit, will be succeeded either by his brother-in-law Surangel
    Whipps Jr. or current Vice-President of Palau Raynold Oilouch. Aside of the president,
    the electorate also votes for the members of the country's National Congress.
    (RNZ) (Foreign Brief)
  - 2020 Ivorian presidential election
  - Incumbent president of the Ivory Coast Alassane Ouattara is declared the victor
    of the latest presidential election which has been boycotted by the political
    opposition as a third term for Ouattara was deemed unconstitutional. The election
    was overshadowed by deadly clashes with at least 30 casualties. (DW)
