Date: '2020-11-16'
Source_URI: Portal:Current events/2020 November 16
Intelligence_Payload:
  Business and economy:
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in South Korea, Impact of the COVID-19 pandemic on aviation
  - Korean Air announces that it will acquire Asiana Airlines for 1.8 trillion KRW
    (US$1.6 billion) to help the South Korean airline industry continue to grow amid
    uncertainties during the COVID-19 pandemic. (The Korea Herald)
  Disasters and accidents:
  - 2020 Atlantic hurricane season
  - Hurricane Iota strengthens into a category 5 hurricane as it approaches Nicaragua.
    (The Washington Post)
  - List of explosions
  - An LP gas truck explodes on Federal Highway 15D in Nayarit, Mexico, killing at
    least 14 people. Most of the victims died inside their vehicles. (The Independent)
    (El Universal)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Pennsylvania
  - COVID-19 pandemic in Philadelphia
  - Philadelphia bans nearly all indoor gatherings, both public and private, between
    November 20 and January 1 as part of new restrictions in the wake of a spike in
    COVID-19 cases. In addition, high schools will be reverted to remote learning,
    restaurants will only be allowed to have takeaway or delivery, and businesses
    like movie theaters, arcades, and bowling alleys are ordered closed again. (NPR)
  - COVID-19 pandemic in California
  - Governor Gavin Newsom announces that he has pulled an "emergency brake", which
    means that starting the following day, California will implement more closures
    and stricter restrictions, which will cover 41 counties containing 94% of the
    state's population. (The Guardian)
  - COVID-19 pandemic in Michigan
  - Michigan surpasses 8,000 confirmed deaths from COVID-19. (MLive.com)
  - COVID-19 pandemic in New Mexico
  - New Mexico begins its two-week lockdown announced by Governor Michelle Lujan Grisham
    on November 13 in an attempt to curb COVID-19 infections. Under the latest public
    health order, people are being asked to stay at home, and only essential businesses
    will remain open. (KOB-TV)
  - COVID-19 pandemic in Texas
  - Texas surpasses 20,000 total confirmed deaths from COVID-19 and becomes the state
    with the second-highest number of reported deaths in the United States, behind
    only New York. (ABC News)
  - COVID-19 pandemic in Washington, D.C.
  - U.S. Representatives Cheri Bustos of Illinois and Tim Walberg of Michigan announce
    they have tested positive for COVID-19. Additionally, Representative Mark Pocan
    of Wisconsin said publicly he was isolating after a possible exposure to the virus.
    (CNN)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Alberta
  - Alberta reports a record 91 new fatalities in the last 24 hours. (Airdrie Today)
  - COVID-19 pandemic in Nunavut
  - Chief Medical Officer Dr. Michael Patterson announces that Nunavut will close
    all non-essential services, businesses and organizations, as well as schools and
    daycare centres for two weeks beginning November 18, due to a spike in COVID-19
    cases in the territory. (CBC)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Russia
  - Russia reports a record 22,778 new cases in the past 24 hours, bringing the total
    number of cases to 1.95 million. (Anadolu Agency)
  - Buryatia becomes the first Russian republic to return to a lockdown, as it closes
    restaurants, shopping malls, and other places of public gathering for two weeks.
    (The Moscow Times)
  - COVID-19 pandemic in France
  - The number of hospitalized patients in France reaches an all-time high of 33,497.
    (Le Figaro)
  - COVID-19 pandemic in Portugal
  - Portugal reports a record 91 new fatalities, bringing the nationwide death toll
    to 3,472. (Portugal Resident)
  - COVID-19 pandemic in Sweden
  - Prime Minister Stefan Löfven announces a ban on public gatherings of more than
    eight people beginning November 24, as part of measures aimed to curb the spread
    of COVID-19 in Sweden. (RTE)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Iran
  - Iran reports a record 13,053 new cases and 486 new fatalities in the last 24 hours,
    bringing the total number of cases in the worst-hit country in the Middle East
    to 775,121 and the nationwide death toll to 41,979. (Al Arabiya)
  - COVID-19 pandemic in Pakistan
  - Prime Minister Imran Khan announces a temporary ban on political rallies and gatherings
    of more than 300 people in an attempt to reduce the spread of COVID-19 in Pakistan.
    (Deccan Herald)
  - COVID-19 pandemic in Australia
  - The Northern Territory, Queensland, and Tasmania announce that their borders with
    South Australia are indefinitely closed, as the state's second wave reaches 17
    cases. (News.com.au)
  - COVID-19 vaccine
  - Moderna's preliminary results show their vaccine candidate is 94.5% effective
    at preventing COVID-19 infections. The results also suggest that in cases of COVID-19
    infection after vaccination, the vaccine appeared to prevent severe illness. (The
    New York Times)
  International relations:
  - Russia–Sudan relations
  - Russian President Vladimir Putin approves the construction of a new Russian Navy
    facility in Sudan. The naval base will be built near Port Sudan on the Red Sea
    coast, and will hold up to 300 military and civilian personnel. (Reuters)
  Law and crime:
  - Capital punishment in Iraq
  - Iraq hangs 21 convicted terrorists and murderers at the Nasiriyah Central Prison
    in Nasiriyah, Dhi Qar Governorate. The interior ministry did not provide details
    of the crimes of those executed but stated they were all convicted under a 2005
    counter-terrorism law. (DW)
  Politics and elections:
  - 2020 United States presidential election
  - Plaintiffs aligned with President Donald Trump's re-election campaign and the
    GOP announces that they will drop lawsuits in Pennsylvania, Wisconsin, Michigan,
    and Georgia challenging ballots and attempting to block the states from certifying
    their election results. (Forbes) (CNBC)
  - 2020 Belarusian protests
  - Retirees protest in Minsk, marking the 100th straight day protests broke in Belarus
    since President Alexander Lukashenko won his 6th term in a widely rejected election.
    (AP)
