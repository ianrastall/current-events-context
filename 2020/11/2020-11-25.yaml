Date: '2020-11-25'
Source_URI: Portal:Current events/2020 November 25
Intelligence_Payload:
  Uncategorized:
  - Second Libyan Civil War, Libyan peace process
  - The United States Department of the Treasury announces unilateral sanctions on
    the Libyan National Army-linked al-Kaniyat militia and its leader, Mohamed al-Kani,
    after Russia blocks the United Nations Security Council from blacklisting the
    group for alleged human rights abuses committed in the city of Tarhuna during
    the 14-month military offensive led by Field Marshal Khalifa Haftar. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Texas
  - Texas reports 14,648 new cases in the last 24 hours, a new single-day record since
    the beginning of the pandemic. (KTVT)
  - COVID-19 pandemic in Wyoming
  - Wyoming Governor Mark Gordon tests positive for COVID-19 and will quarantine for
    two weeks. (Casper Star-Tribune)
  - COVID-19 pandemic in Michigan
  - Michigan announces citations and suspensions on liquor licenses for violating
    the state's public health order, which was issued on November 15 to control the
    spread of COVID-19. (WLNS-TV)
  - COVID-19 pandemic in Oregon
  - Oregon Governor Kate Brown announces that the state will relax restrictions on
    outdoor dining. However, she also said that several restrictions will remain in
    place until a vaccine is available. (AP)
  - Officials from the Trump administration announces that they have held their first
    Operation Warp Speed briefing with President-elect Joe Biden. (Politico)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario reports 35 new deaths in the past 24 hours, a new single-day record for
    the second wave of the pandemic and bringing the province's death toll to 3,554.
    (CP24)
  - COVID-19 pandemic in Saskatchewan
  - Saskatchewan Premier Scott Moe announces that the province will restrict capacities
    of large stores and other public places to reduce the spread of COVID-19. Limits
    on private gatherings such as weddings and funerals, will also be introduced.
    (CBC)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Foreign Minister AK Abdul Momen and Foreign Secretary Masud Bin Momen test positive
    for COVID-19 and will cancel their trip to Niamey, Niger to attend the 47th OIC
    meeting of Foreign Ministers. (Dhaka Tribune)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record 5,534 new cases in the past 24 hours, bringing the
    nationwide number of confirmed cases since the beginning of the pandemic to 511,836.
    (Tirto.id)
  - COVID-19 pandemic in Iran
  - The number of daily confirmed cases in Iran rises by a record 13,843 cases over
    the past 24 hours, bringing the nationwide total of confirmed cases to 894,385.
    (Al-Arabiya)
  - COVID-19 pandemic in Japan
  - Tokyo Governor Yuriko Koike announces that establishments that serve alcohol and
    karaoke parlors in the capital will be asked to close at 10:00 p.m. local time
    between November 28 and December 17 as part of measures to reduce the spread of
    COVID-19. The Tokyo Metropolitan Government will provide ¥400,000 in financial
    compensation to each business that complies with the voluntary request. (The Japan
    Times)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a single-day record of 2,348 recoveries, bringing the total number
    of recovered patients to 46,501. (The Edge Markets MY)
  - COVID-19 pandemic in Pakistan
  - Pakistan reports 3,009 new cases in the past 24 hours, the highest single-day
    total since July and bringing the total number of confirmed cases to 382,892.
    (The Nation)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Croatia
  - Croatia reports a new single-day record of 3,603 cases, bringing the nationwide
    total of confirmed cases to 111,617. (The Dubrovnik Times)
  - COVID-19 pandemic in Germany
  - Germany reports a record 410 new deaths in the past 24 hours, according to the
    Robert Koch Institute, bringing the nationwide death toll to 14,771. (Taggeschau)
  - Chancellor Angela Merkel announces that the partial lockdown will not be lifted
    until December 20 at the earliest, and may be extended until the beginning of
    January unless there is an unexpected drop in infections. Additional measures
    will also be introduced, including requiring masks in schools and limiting private
    gatherings to five people from two households beginning December 1. (DW)
  - COVID-19 pandemic in Poland
  - Poland reports a record 674 new deaths in the past 24 hours, bringing the nationwide
    death toll to 14,988. (Poland In)
  - COVID-19 pandemic in Russia
  - Russia reports a record 507 new deaths in the past 24 hours, bringing the nationwide
    death toll to 37,358. (The Moscow Times)
  - COVID-19 pandemic in Turkey
  - Turkey reports 28,351 new cases, including 6,814 symptomatic cases. The country
    now has 467,730 symptomatic cases. Health Minister Fahrettin Koca states that
    for the first time since July, the number of asymptomatic cases will be reported.
    Turkey also reports a record 168 new deaths, bringing the nationwide death toll
    to 12,840. (Reuters)
  - COVID-19 pandemic in Uganda
  - Uganda reports a record 484 new cases in the past 24 hours, bringing the nationwide
    total cases to 18,890. (NNN)
  - COVID-19 vaccine
  - Turkey purchases 50 million doses of CoronaVac to be delivered in December, January,
    and February, said Health Minister Fahrettin Koca. (Reuters)
  - The number of worldwide confirmed cases surpasses 60 million. (RNZ)
  - Avian influenza
  - Poland's local veterinary authorities states that they will cull 930,000 hens
    in a farm in western Poland due to an H5N8 bird flu outbreak in the village of
    Wroniawy which was discovered yesterday. (NDTV)
  - Japan detects a new case of what is believed to be a highly pathogenic strain
    of avian influenza at a poultry farm in Fukuoka Prefecture. This is the first
    confirmed case outside of Kagawa Prefecture. As a result, the prefectural government
    will cull 93,500 chickens at a farm in Munakata to prevent the spread of the infection.
    (The Straits Times)
  - Impact of the COVID-19 pandemic on religion, COVID-19 pandemic in New York (state)
  - The United States Supreme Court temporarily blocks restrictions imposed by Governor
    Andrew Cuomo on religious sites, with Amy Coney Barrett being the deciding vote.
    (Newsweek)
  - List of people granted executive clemency by Donald Trump
  - President Donald Trump announces via Twitter a pardon of former National Security
    Advisor Michael Flynn. (AP)
  - Corruption in Indonesia
  - Indonesian anti-corruption agency arrests Minister of Maritime Affairs and Fisheries
    Edhy Prabowo in lobster seed export case. (The Jakarta Post)
  - Politics of Lithuania
  - Ingrida Šimonytė takes office as the new Prime Minister of Lithuania, becoming
    the second woman to do so. She also appoints the first gender-balanced cabinet
    in the country's history. (LRT in English)
  - Belarus at the Olympics
  - The International Olympic Committee announces that they will seek formal punishments
    for Olympic officials in Belarus for reports of reprisals against athletes during
    protests against President Alexander Lukashenko. (AP)
  - 2020 Japan Series
  - The Fukuoka SoftBank Hawks sweep the Yomiuri Giants to win the Japan Series. (AP)
