Date: '2020-11-07'
Source_URI: Portal:Current events/2020 November 7
Intelligence_Payload:
  Disasters and accidents:
  - 2020 Atlantic hurricane season
  - Former Hurricane Eta, now a tropical depression, moves toward Cuba after regaining
    strength. The government of the Bahamas issues a tropical storm watch while a
    state of emergency is declared in Miami-Dade County, Florida, as the state also
    prepares for the impact of the storm. The storm left at least 100 people dead
    in Central America. (CNN)
  Health and environment:
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Illinois
  - Illinois reports 12,348 new confirmed cases of COVID-19 in the past 24 hours,
    a new single-day record since the pandemic began. This brings the cumulative cases
    total to 477,978. (WBBM-TV)
  - COVID-19 pandemic in Missouri
  - Missouri reports 4,559 new confirmed cases in the past 24 hours, a new single-day
    record since the pandemic began. This is because the state "de-duplicates" individuals
    who have already received a test prior to the 7-day period. (KOMU-TV)
  - COVID-19 pandemic in Michigan
  - Michigan records 6,225 new cases, a new single-day record. (MLive.com)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Alberta
  - Alberta reports 919 new cases of COVID-19 in the past 24 hours, a new single-day
    record since the pandemic began. (CBC)
  - COVID-19 pandemic in Ontario
  - Ontario reports 1,132 new cases of COVID-19 in the past 24 hours, bringing the
    total number of cases in the province to 82,825. It is the largest single-day
    increase in cases since the pandemic began. (Global News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austria reports a record 8,421 new infections in the past 24 hours, raising its
    nationwide case total to 147,220. (Kronen Zeitung)
  - COVID-19 pandemic in Bosnia and Herzegovina
  - Prime Minister Zoran Tegeltija tests positive for COVID-19. (Reuters)
  - COVID-19 pandemic in France
  - France reports a new record of 86,852 new confirmed cases in the last 24 hours
    while the total COVID-19 deaths surpasses 40,000 as Prime Minister Jean Castex
    warns that the second wave has "brutally" and "violently" arrived in the country.
    (Sky News)
  - COVID-19 pandemic in Germany
  - The number of daily confirmed cases in Germany hits a new record of 23,399 over
    the last 24 hours, according to data released by the Robert Koch Institute, bringing
    the nationwide total to 642,488. It is the third consecutive day that the country
    reported a record number of daily cases. (The Brussels Times)
  - COVID-19 pandemic in Italy
  - Italy reports a new record of 39,811 new confirmed cases in the last 24 hours,
    bringing the nationwide total to 902,490 cases. Lombardy remained the hardest
    hit region, reporting 11,489 new cases. (Corriere della Sera)
  - COVID-19 pandemic in Hungary
  - Hungary reports a record 107 new fatalities in a single day, bringing the nationwide
    death toll to 2,357 while the country also surpasses 100,000 confirmed cases of
    COVID-19 after a record 5,318 cases were reported. (Hungary Today)
  - COVID-19 pandemic in Poland
  - Poland surpasses 500,000 cases of COVID-19 after a record 27,875 new cases are
    reported in the past 24 hours. (Sanok Naszemiasto)
  - COVID-19 pandemic in Ukraine
  - Ukraine reports a new record of 10,746 new confirmed cases in the last 24 hours,
    bringing the nationwide total to 450,934 cases. (112 International)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Georgia
  - Georgia announces a curfew in Tbilisi, Kutaisi, Batumi, Rustavi, Zugdidi, Gori
    and Poti between 10:00 p.m. and 5:00 a.m. local time beginning November 9, amid
    a surge in COVID-19 cases. (Agenda.ge)
  - COVID-19 pandemic in Iran
  - Iran reports a single-day record of 9,450 new cases in the last 24 hours, prompting
    President Hassan Rouhani to announce new restrictions that all non-essential businesses
    must close at 6:00 p.m. local time for a month starting November 10. (France 24)
  - COVID-19 pandemic in Pakistan
  - Pakistan reports 1,502 new cases in the last 24 hours, the highest single-day
    total since July 30, pushing the cumulative infections total to 341,753 cases.
    (Anadolu Agency)
  - COVID-19 pandemic in Morocco
  - The number of daily confirmed cases in Morocco surges by a record 5,836 cases,
    bringing the nationwide total to 252,185. (Morocco World News)
  Law and crime:
  - 2020 Ivorian presidential election
  - Police arrest opposition leader and former prime minister Pascal Affi N'Guessan
    for creating a parallel government after the victory of incumbent Alassane Ouattara
    in the election. Prosecutors are seeking terrorism charges against more than a
    dozen opposition leaders who boycotted the election and created a transitional
    council. (Reuters)
  - Human rights in the United Arab Emirates
  - The United Arab Emirates overhauls its legal system to loosen restrictions on
    alcohol consumption, permit cohabitation, and criminalize honor killings, among
    other changes. (AP)
  Politics and elections:
  - 2020 Egyptian parliamentary election
  - After a first round in October, voters in Egypt head once again to the polls to
    elect their members of parliament. (Al Jazeera)
  - 2020 United States presidential election
  - All major U.S. networks project that Joe Biden has been elected President of the
    United States after winning Pennsylvania. Kamala Harris will become the first
    female Vice President of the United States. This marks the first time since 1992
    that an incumbent president's challenger has won the election over the incumbent
    president, when Bill Clinton defeated George H. W. Bush. (CNN) (Business Insider)
  - President Donald Trump is refusing to concede to Biden and has vowed to challenge
    the results in court, alleging widespread electoral fraud. (The New York Times)
  - Fijian Prime Minister Frank Bainimarama is the first leader to congratulate Democratic
    presidential nominee Joe Biden, despite no official result being announced at
    the time. (RNZ) (The Guardian)
