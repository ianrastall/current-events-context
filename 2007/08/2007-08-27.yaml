Date: '2007-08-27'
Source_URI: Portal:Current events/2007 August 27
Intelligence_Payload:
  Uncategorized:
  - Taliban rebels release 5 more South Koreans they are keeping hostage since July.
  - Michael Vick, former National Football League star, arrived in US Federal Circuit
    Court in Richmond, Virginia and pleads guilty to federal dogfighting charges and
    then issues a public apology at the Omni Richmond Hotel. Sentencing by U.S. District
    Judge Henry E. Hudson will be in December 2007. (Reuters) USA Today transcript
    of apology Newsday.com LA times
  - Ishaq Khan Khakwani resigns as Pakistan minister of state for Information Technology
    over General Pervez Musharraf campaigning for re-election as the President of
    Pakistan while still an army officer. (The Hindu)
  - In a Der Spiegel report, Chinese hackers are accused of breaking into the computer
    systems of the German Chancellor's office and three other government ministries.
    (Times Online). Chinese Premier Wen Jiabao expresses "grave concern" at the allegations.
    (Forbes).
  - The Montreal Metro Green Line and most of Downtown that were closed off on Friday
    reopens. Emergency reparation are made on a nearby building whose concrete side
    panels were in danger of falling off. The Bay considers suing the city, alleging
    that construction work is the source of the cracks. (CBC) (Radio-Canada)
  - U.S. Senator Larry Craig (R-Idaho) is revealed to have pleaded guilty on August
    8 to a charge of disorderly conduct at the Minneapolis-St. Paul International
    Airport. (McClatchy Post Bulletin)
  - Pakistan and Bangladesh reject charges by India that terror outfits operating
    in their countries were behind the Hyderabad bomb blasts which killed 42 and injured
    over 60.
  - Indonesia's karate team boycotts an Asian championship in Malaysia to protest
    at the beating of one of its official referees by the local police. (AFP via Yahoo!
    News)
  - United States Attorney General Alberto Gonzales announces his resignation. (NYT)
  - Ten people are arrested in Russia over the murder of investigative journalist
    Anna Politkovskaya. (BBC)
  - Southeast Asian nations will seek $2 billion to build a rail link from Kunming
    in China to Singapore. (Reuters)
  - Continuation of an equine influenza outbreak in Australia could threaten security
    at next week's APEC meeting (AP via IHT)
  - A fire breaks out at the Jebel Ali port in the United Arab Emirates, triggering
    explosions at a chemical storage depot. (Reuters)
  - The Vatican establishes a low cost charter flight service to Catholic shrines
    in France, Poland, Spain and the Middle East for pilgrims. (BBC)
  - A report from the National People's Congress environment and resources protection
    committee finds that high levels of pollution in the Huai River and its tributaries
    poses a "threat to the water safety of one sixth of the country's 1.3 billion
    population". (Reuters via ABC News Australia)
  - Former Deputy Prime Minister of the United Kingdom John Prescott announces he
    will retire as a Member of Parliament at the next election. (BBC)
  - The Flight Data Recorder is retrieved from the wreckage of Adam Air Flight 574.
    (Wikinews)
  - Bluegrass Army Depot Sarin(GB) leak in Lexington, Kentucky. Officials reported
    the Sarin levels 85 times above the safe limit. The first leak was detected at
    3:49PM.
