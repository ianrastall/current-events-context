Date: '2007-08-28'
Source_URI: Portal:Current events/2007 August 28
Intelligence_Payload:
  Uncategorized:
  - A total lunar eclipse takes place in the early morning hours across most of North
    America and the eastern Pacific Ocean region. (Canwest via Ottawa Citizen)
  - The Supreme Court of Chile confirms a life sentence for Hugo Salas Wenzel, a Chilean
    general under former dictator Augusto Pinochet, for his role in the murder of
    12 opponents of the regime. (BBC)
  - The Sudanese Government and the United Nations launch a flood appeal to help victims
    of recent flooding which has killed 89 people and destroyed 73,000 homes. (BBC)
  - 'South Korean hostage crisis: Officials in South Korea''s Blue House claim that
    the Taliban has agreed to release 19 South Korean hostages. (Reuters)'
  - 'Battle of Karbala (2007): At least 52 people have been killed in fighting in
    Karbala, as thousands of Shia pilgrims gathered in the city for an annual festival.
    (Reuters)'
  - Scientists in Colombia discover new poisonous frog, dubbed the 'golden frog of
    Supatá,' in a remote mountainous region. (Fox News)
  - A United States federal judge orders the extradition of former Panamanian President
    Manuel Noriega to France, where he has already been convicted in absentia on money-laundering
    charges. (CNN)
  - Abdullah Gül of the Justice and Development Party is elected President of Turkey.
    (BBC)
  - The Cockpit voice recorder is retrieved from the wreckage of Adam Air Flight 574,
    24 hours after the recovery of the Flight data recorder. (ABC News Australia)
  - The Ontario Court of Appeal acquits Steven Truscott of the 1959 murder of Lynne
    Harper, declaring the original trial that had sentenced the then-14-year-old to
    hang was a miscarriage of justice. The case has been a cause célèbre for almost
    fifty years. (CBC)
