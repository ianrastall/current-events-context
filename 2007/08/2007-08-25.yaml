Date: '2007-08-25'
Source_URI: Portal:Current events/2007 August 25
Intelligence_Payload:
  Uncategorized:
  - A lawyer for missing coal miners in the Crandall Canyon mine in Utah says that
    a sixth probe has not found enough space for the men to survive. (AP via AZ Central)
  - Ongoing flooding in the midwestern United States affects six states and claim
    at least 26 lives (MSNBC)
  - Twin blasts panic people in Hyderabad, India. A gas cylinder explosion at a food
    mart kills 27, injures 50. Another blast at a park kills at least 14.
  - '2007 Greek fires: More than 53 people, including children, die during the Peloponnese
    forest fires in Greece and many are missing in burnt villages. Huge fires also
    occur in the Imitos mountain area, Filothei, Athens and also in the Styra, Euboea
    and Keratea regions. The Greek government declares a national emergency and seeks
    assistance from the European Union. (BBC) (Times of India) (BBC)'
  - The 11th IAAF World Championships in Athletics get underway in Osaka, Japan. (BBC)
  - On the 132-year anniversary of the first crossing, Bulgarian swimmer Petar Stoychev
    becomes the fastest person ever to swim across the English Channel. (Timed Finals)
  - Voters in Nauru go to the polls for the Nauruan parliamentary election, 2007.
    (ABC News Australia)
  - Horse racing meetings throughout Australia are cancelled due to an outbreak of
    equine influenza in Centennial Park stables next to Sydney's Randwick Racecourse.
    Peter McGauran, the Federal Minister for Agriculture, issues a 72-hour ban on
    horse movement throughout Australia. (ABC News Australia) (ABC News)
