Date: '2007-08-02'
Source_URI: Portal:Current events/2007 August 2
Intelligence_Payload:
  Uncategorized:
  - The first-ever United Nations plenary session on climate change is extended into
    a third day due to the large number of 'worried nations' wanting to describe their
    climate-related problems. (Fox News)
  - Mary Peters, the United States Secretary of Transportation, orders an immediate
    inspection of all truss bridges in the United States following the collapse of
    the I-35W Mississippi River bridge in Minneapolis. (CNN)
  - Kafeel Ahmed, who was one of the instigators of the 2007 Glasgow International
    Airport attack, dies in the Glasgow Royal Infirmary of the injuries he sustained
    in the attack. (AP via the Melbourne Age)
  - United States Marine Sergeant Lawrence Hutchins III is convicted of murder and
    related offences in relation to the killing of an Iraqi man. (CNN)
  - A Cabinet Minister and four junior ministers belonging to the Ceylon Workers Congress
    leave the Government of President of Sri Lanka Mahinda Rajapaksa due to "political
    differences". (The Hindu)
  - The United States Court of Appeals for the Fifth Circuit rules that three insurers
    are not responsible for flood damage in New Orleans resulting from Hurricane Katrina.
    (Reuters)
  - 100 people are killed in the Democratic Republic of the Congo when a train derails.
    Government officials attribute the accident to faulty brakes. (CBC)
  - Two aides of al Qaeda and Taliban are arrested at different places in Pakistan.
  - '2007 Russian North Pole expedition: Two Russian bathyscaphes, MIR submersibles
    have reached the seabed below the North Pole, at a depth of 4.2 km, for the first
    time ever. (BBC)'
  - An offshore earthquake occurs in the Pacific Ocean off the shore of Vanuatu measuring
    7.2 on the Richter scale but no tsunami is triggered. (TV3 New Zealand)
  - South Korea suspends beef imports from the United States following the discovery
    of banned parts in a recent shipment. (AP via Forbes)
  - Journalists in the Indian state of Manipur refuse to put out newspapers as a protest
    against threats from rebel groups. (BBC)
  - An earthquake measuring 6.7 on the Richter Scale hits the southern part of Sakhalin
    off the coast of Russia causing a death. It also triggered a small tsunami that
    struck the coast of Hokkaidō in Japan. (Russian News and Information Agency)
  - The Dandy comic relaunched as Dandy Xtreme.
