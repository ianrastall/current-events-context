Date: '2007-08-07'
Source_URI: Portal:Current events/2007 August 7
Intelligence_Payload:
  Uncategorized:
  - Six new species of animal are discovered in a forest west of Lake Tanganyika in
    the Democratic Republic of the Congo including a horseshoe bat, a rodent, two
    shrews and two species of insects. (China Daily)
  - Two men are arrested in Paris for stealing Pablo Picasso paintings from the apartment
    of his granddaughter. (AFP via ABC News Australia)
  - Argentina signs an "energy security treaty" with Venezuela in Buenos Aires. (BBC)
  - Barry Bonds of the San Francisco Giants hits his 756th career home run, passing
    Hank Aaron as the all-time leader in Major League Baseball. Bonds hits the shot
    against Washington Nationals pitcher Mike Bacsik in the fifth inning of their
    game at AT&T Park in San Francisco, California. (MLB.com), (BBC)
  - Seismic activity frustrates rescue efforts for six coal miners trapped underground
    near Huntington, Utah. (AP via Houston Chronicle)
  - Two buses crash on the Panamerican Highway in southern Peru resulting in 17 casualties
    and 37 injuries. (AFP via Times of India)
  - Astronomers of the Trans-Atlantic Exoplanet Survey announce the discovery of TrES-4,
    the largest known planet in the universe, circling the star GSC 02620-00648 in
    the Hercules Constellation. (AP via IHT) (BBC)
  - The Taliban attacks Firebase Anaconda in Uruzgan province but is repulsed by a
    joint force of Afghan fighters and United States Army forces with 20 militants
    killed. (AP via CNN)
  - Jordan opens its government schools to Iraqi refugees. (BBC)
  - Israel evicts Jewish settlers from Hebron. A dozen religious members of the Israeli
    Army refuse to participate and are sentenced for up to a month in a military jail.
    (AFP via ABC News Australia)
  - Juan Carlos Ramirez-Abadia, Colombian cocaine trafficker boss of the Norte del
    Valle Cartel is apprehended in Brazil and faces extradition to the United States.
    The US Government had offered a reward of US$5 million dollars. (Reuters)
  - Malaysia bans hiring of foreign security guards following rape and murder of a
    student by a Pakistani security guard recently.
  - 'Georgian-Russian relations: Two Russian aircraft allegedly violate Georgia''s
    airspace with one firing an air-to-surface guided rocket onto Georgian territory.
    The rocket did not explode and the Russian government denies the incident took
    place. (civil.ge) (Reuters via CNN)'
  - Tests confirm a second outbreak of foot and mouth disease in Surrey, England.
    Inspectors think that there is a "strong probability" that the disease came from
    a research site at Pirbright shared by Merial, a vaccine company and the Institute
    for Animal Health. (The Telegraph) (BBC)
  - The United Kingdom asks United States Secretary of State Condoleezza Rice to release
    five residents of the UK from the Guantanamo Bay detention camp. (AP via FOX)
  - Youths in East Timor attack Australian Army forces and United Nations personnel
    following the announcement that Xanana Gusmão would be the next Prime Minister.
    (News Limited)
  - Fortune magazine lists Mexican businessman Carlos Slim as the richest man in the
    world ahead of Microsoft founder Bill Gates. (BBC)
  - The Pakistan Army launches a strike on a militant base in the Degan area near
    Miranshah in North Waziristan. (BBC)
  - A storm kills at least 17 people in Vietnam with another 12 missing. (AP via Washington
    Post)
  - Bangladesh security officials arrest 24 suspected militants at Zia International
    Airport en route to Kabul, Afghanistan. (Times of India)
  - Chinese police arrest six protesters calling for a free Tibet by unfurling banners
    on the Great Wall of China. (AP via the Guardian)
  - Paul Calvert announces his resignation as President of the Australian Senate and
    as a Senator for Tasmania effective from next week. (AAP via Melbourne Herald
    Sun)
  - An earthquake of 6.4 preliminary magnitude occurs off the coast of Okinawa in
    Japan. (Reuters)
  - Satsuki Eda of the Democratic Party of Japan is chosen as the President of the
    House of Councillors making him the first member of an Opposition party to hold
    the position. (BBC)
