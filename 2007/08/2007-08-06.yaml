Date: '2007-08-06'
Source_URI: Portal:Current events/2007 August 6
Intelligence_Payload:
  Uncategorized:
  - Turkish President Ahmet Necdet Sezer gave a mandate to Turkish Prime Minister
    Recep Tayyip Erdoğan to form his second cabinet following a landslide victory
    for the Justice and Development Party (AKP) in the general elections. (Turkish
    Daily News)
  - Mexico and Brazil sign an agreement on developing technology for oil and natural
    gas exploration and exploitation involving co-operation between Pemex and Petrobras.
    (AP via IHT)
  - The Lebanese government claim that the police have killed Abu Hureira, the second
    in command of Fatah al-Islam. (AP via Forbes)
  - Trinidad Chief Magistrate Sherman McNicolls orders the extradition of three men
    to the United States to face charges of involvement in a terrorist attack on John
    F. Kennedy Airport. (New York Times)
  - United States District Court judge Ronald Whyte strikes down a California law
    aiming to prohibit minors from buying or renting violent video games on First
    Amendment grounds. (IGN)
  - An Arizona judge rules that a United States Border Patrol agent Nicholas Corbett
    must stand trial for murder for shooting dead a Mexican immigrant. (Reuters)
  - The United States Food and Drug Administration approves Pfizer's AIDS drug Selzentry.
    (Reuters via National Post)
  - 50 feared dead when a boat carrying 130 passengers overturned in the midstream
    of River Ganges in Bihar, India.
  - Five members of the Iraqiya coalition led by former Prime Minister of Iraq Ayad
    Allawi suspend their participation in the current Cabinet led by Nouri al-Maliki.
    (New York Times), (BBC)
  - NASA reports that three galaxies the size of the Milky Way are colliding with
    another galaxy three times the size of the Milky Way in galaxy cluster CL0958+4702.
    The eventual galaxy could be up to ten times the size of the Milky Way. (BBC)
  - A second case of foot and mouth disease is reported in Surrey, England, resulting
    in the culling of more cattle. (AFP via ABC News Australia)
  - Six miners are trapped in a coal mine 15 miles west of Huntington, Utah. A 3.9
    to 4.5 (USGS) magnitude earthquake was reported in the area around the time of
    the cave-in. (Reuters)
  - Former Bangladesh Prime Minister Sheikh Hasina files petitions challenging government
    move to try her in connection with an extortion case.
  - North Korea and South Korea exchange gun fire over the border, the first such
    incident in a year. (CNN)
  - José Ramos-Horta, the President of East Timor, selects Xanana Gusmão as the Prime
    Minister of East Timor. (BBC)
  - A truck bomb in Tal Afar in northern Iraq kills at least 25 people and destroys
    10 homes. (Reuters)
  - Sir Michael Somare's National Alliance Party forms a coalition with six partners
    which will be the next government of Papua New Guinea. (Radio New Zealand)
  - Flooding in Lagos, Nigeria, leads to thousands of people being forced from their
    homes and six people going missing. (Reuters via Press TV)
  - International Atomic Energy Agency inspectors examine the Kashiwazaki-Kariwa Nuclear
    Power Plant in Japan. (AFP via ABC News Australia)
  - Japan marks the 62nd anniversary of the atomic bombing of Hiroshima. (Reuters
    via Washington Post)
  - A state of emergency is declared in the Croatian city of Dubrovnik due to a forest
    fire. (BBC)
  - The Prime Minister of Israel Ehud Olmert and the President of the Palestinian
    Authority Mahmoud Abbas meet to discuss the establishment of a Palestinian state.
    (Reuters)
