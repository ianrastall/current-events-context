Date: '2007-08-11'
Source_URI: Portal:Current events/2007 August 11
Intelligence_Payload:
  Uncategorized:
  - A roadside bomb claims the life of the Governor of Ad-Diwaniyah province in Iraq
    Khalil Jalil Hamza and the provincial police chief Major-General Khalid Hassan.
    (San-Jose Mercury News)
  - An explosion in Pasuruan in the East Java province of Indonesia causes three deaths
    and another three injuries. (AFP viaNews Limited)
  - Three by-elections for the Canadian House of Commons will be held for the ridings
    of Roberval—Lac-Saint-Jean, Saint-Hyacinthe—Bagot and Outremont on September 17.
    (Globe and Mail)
  - The President of Venezuela Hugo Chavez proposes building a gas pipeline between
    Venezuela and the Caribbean supplying states such as Cuba. (Bloomberg)
  - The President of Russia Vladimir Putin states that a new radar station in the
    village of Lekhtusi near St Petersburg is the first step in a large-scale air
    defense program. (Reuters)
  - New York City is put on high alert after an al Qaeda bomb threat surfaces on Internet.
  - Thai insurgents attack several positions held by Thai security forces at Yala
    Province. (Xinhua via People's Daily)
  - The President of the United States George W. Bush hosts the President of France
    Nicolas Sarkozy at a casual lunch at the Bush family home in Maine. (Reuters)
  - United States presidential candidate Mitt Romney wins the Republican Party's Ames
    Straw Poll in Ames, Iowa. (The Washington Post)
  - Voters in Sierra Leone go to the polls for the first time since the end of the
    country's civil war in 2002. (Voice of America)
  War in Afghanistan:
  - The Taliban attacks Firebase Anaconda in Uruzgan province for the third time in
    a week suffering casualties. The Taliban also launches unsuccessful attacks in
    Helmand and Kandahar provinces. (CNN)
  - The Taliban claims to have released two South Korean hostages but local and national
    officials cannot confirm the claims. (Reuters)
