Date: '2007-08-26'
Source_URI: Portal:Current events/2007 August 26
Intelligence_Payload:
  Uncategorized:
  - Gunmen raid a farm in Putumayo Department in Colombia killing 9 people with authorities
    blaming FARC. (Associated Press in International Herald Tribune)
  - '2007 Midwest flooding: Tornadoes hit parts of central and southeast Ohio as hundreds
    of thousands of people in the Midwest are without power. (AP via Fox News)'
  - A series of explosions in Mogadishu, Somalia kills three people. (AFP via ABC
    News Australia)
  - The Islamist militant group Fatah al-Islam seeks to extract its wounded from the
    Nahr al-Bared Palestinian refugee camp. (Reuters Alertnet)
  - An Antonov plane carrying tin ore crashes in Kongolo, Tanganyika District of the
    Democratic Republic of the Congo. (Wikinews)
  - Five Iraqi Shia, Sunni and Kurdish political parties sign a deal forming a new
    "Moderates Front" supporting Prime Minister Nouri al-Maliki (BBC)
  - The equine influenza outbreak spreads in Australia threatening the Spring Carnival
    including the Melbourne Cup. (Reuters via the Washington Post)
  - Bird flu breaks out at a German farm. (Washington Post)
  - Ludwig Scotty's government wins a landslide victory in the Nauruan parliamentary
    election, 2007 with René Harris as the only member of the Opposition to win a
    seat. (ABC News Australia)
  - 25 August 2007 Hyderabad bombings
  - Seven more unexploded bombs are found in Hyderabad, Andhra Pradesh, India a day
    after the bombings. (Reuters via News Limited)
  - The Chief Minister of Andhra Pradesh Y. S. Rajasekhara Reddy blames Pakistani
    and Bangladeshi terrorists for the bombings. (Bloomberg)
  2007 Greek fires:
  - European Union countries send firefighters and equipment to help fight hundreds
    of fires.(BBC and AFP via ABC News Australia)
  - The fires threaten Olympia, the site of the Ancient Olympic Games. (Financial
    Times via MSNBC)
  - Greek authorities arrest and charge two people in connection with the fires. (CNN)
  - The Greek Government offers a reward of €1,000,000 to help catch arsonists. (BBC)
