Date: '2007-08-10'
Source_URI: Portal:Current events/2007 August 10
Intelligence_Payload:
  Uncategorized:
  - Novell wins the rights to the copyrights for Unix from the SCO Group in SCO v.
    Novell decided in the United States District Court in Utah. (Computer World)
  - A storm system comprising at least three tornadoes sweeps across northern Ohio,
    killing a woman in Marion, Ohio and leaving thousands without power. (AP via the
    Cincinnati Post)
  - Francisco Chaviano, a prominent opponent of Fidel Castro's regime in Cuba, is
    released from prison after 13 years (of a 15 year sentence) for allegedly revealing
    state secrets. (AP via the Washington Post)
  - The New York Police Department increases security in Manhattan and in bridges
    and tunnels as a result of an "unverified radiological threat". (Reuters via MSNBC)
  - The Bush administration announces tougher penalties for companies that hire illegal
    immigrants. (BBC)
  - Colombian general Hernando Perez Molina is relieved of his command of the Third
    Division based in western Colombia. Several officers in his command are accused
    of collaborating with the Norte del Valle cocaine cartel. (AP via International
    Herald Tribune)
  - Three construction workers are killed installing equipment at a coal mine in southwestern
    Indiana. (CNN)
  - The Prime Minister of Canada Stephen Harper announces the construction of two
    Arctic bases including an army training base and a deep water port in response
    to recent Russian claims to the area. (BBC via the ABC)
  - Nurses in Fiji end industrial action after 18 days. (Radio Fiji)
  - 'STS-118: NASA discovers a gouge in the belly of the Space Shuttle Endeavour after
    it docks with the International Space Station. (AP via Forbes)'
  - The Congolese Labour Party of the President of the Republic of the Congo Denis
    Sassou-Nguesso and affiliated groups win 90 per cent of the seats in parliamentary
    elections. (Reuters)
  - Another body is found in the Mississippi River as a result of the I-35W Mississippi
    River bridge collapse in Minneapolis, Minnesota. (New York Times)
  - United States share markets finish slightly lower as a $38 billion injection from
    the Federal Reserve helps to stabilise the situation. (CNN Money)
  - The United Nations Security Council approves an enhanced role for the United Nations
    Assistance Mission in Iraq. (Maxims News)
  - Hamid Ansari becomes 13th Vice-President of India.
  - Thabo Mbeki, the President of South Africa, sacks Nozizwe Madlala-Routledge as
    the Deputy Health Minister for attending an AIDS conference in Spain without authorisation
    and criticising hospital conditions. (BBC)
  - The President of Venezuela Hugo Chávez meets with the President of Bolivia Evo
    Morales and the President of Argentina Néstor Kirchner in Tarija, Bolivia. (BBC)
  - A bus carrying Serbian tourists to the Croatian Adriatic coast crashes resulting
    in two deaths and 40 injuries. (Reuters Alertnet)
  - A gun battle in the Old City in Jerusalem results in the death of a gunman and
    injures at least ten other people. (Reuters)
  - Asian stock markets fall sharply following trends in Europe and North America.
    The Bank of Japan and Reserve Bank of Australia try to inject liquidity to restore
    confidence to the market, shaken by the subprime mortgage crisis. (AFP via the
    Sydney Morning Herald)
  - A drill reaches a pocket where six miners have been trapped for four days in the
    Crandall Canyon mine near Huntington, Utah. (AP via the Guardian)
  - The Queensland Legislative Assembly passes legislation reducing the number of
    councils from 156 to 72. (ABC News Australia)
  - The Ugandan government announces plans to pay the "chronically poor" earning less
    than a dollar a day a poverty allowance of $10 a month. (AP via the Guardian)
  - Floods in Vietnam kill 43 people. (BBC)
  - East Timor faces a humanitarian crisis as hundreds of houses are burnt down near
    Viqueque and affected villagers flee to the mountains. (ABC News)
  - Envoys from the United States, European Union and Russia visit Serbia and Kosovo
    seeking a solution to the Kosovo issue. (BBC)
  - Britain's Chief Veterinary Officer Debby Reynolds raises concern about another
    possible outbreak of foot-and-mouth disease in England. (Reuters)
