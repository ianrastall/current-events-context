Date: '2007-08-12'
Source_URI: Portal:Current events/2007 August 12
Intelligence_Payload:
  Uncategorized:
  - Bulk-carrier M/V New Flame collides with an oil tanker and runs aground near the
    southernmost tip of Gibraltar. (International Herald Tribune)
  - African Union nations pledge up to 12,000 troops for the joint United Nations-African
    Union mission to Darfur. (Reuters via CNN)
  - A clash between Taliban militants and Afghan security forces in Kandahar province
    results in nine militants dead with five police dying in a bomb. (AP via the International
    Herald Tribune)
  - Peru issues a map of outlining its claim to maritime territory also claimed by
    Chile. (Xinhua)
  - Heavy rains in Mauritania cause at least two deaths from mudslides and causes
    thousands of people to become homeless. (Voice of America)
  - A gunman kills two people and wounds two others before killing himself on a Dallas,
    Texas freeway. (AP via CNN)
  - Former Governor of Wisconsin Tommy Thompson withdraws as a candidate for the Republican
    nomination in the 2008 United States presidential election following his low level
    of support in the Ames Straw Poll. (Wis Politics)
  - Guatemalan authorities find 46 children believed to have been taken from the parents
    for illegal adoption overseas in Antigua Guatemala. (BBC)
  - A gunman kills three people and injures as many as ten others in a church in Neosho,
    Missouri. (CNN)
  - Tiger Woods wins the 2007 PGA Championship played at the Southern Hills Country
    Club in Tulsa, Oklahoma. (AFP via ABC News Australia)
  - South Africa refuses to set up a refugee camp for the influx of people fleeing
    Zimbabwe. (AFP via News Limited)
  - People claiming to be from Turkey attack the United Nations website forcing some
    sections to be taken offline. (BBC)
  - Nouri al-Maliki, the Prime Minister of Iraq, calls for emergency talks with Iraq's
    political leaders to try to save his national unity government. (AFP via ABC News
    Australia)
  - Mahmoud Ahmadinejad, the President of Iran, replaces his Oil Minister Kazem Vaziri
    Hamaneh with Gholam-Hossein Nozari, head of the National Iranian Oil Company acting
    as his deputy. (Reuters)
  - Italian police uncover a secret plan to smuggle Russian weapons into Iraq. (AP
    via Forbes)
  - Five hundred people are evacuated from the slopes of Mount Karangetang, an active
    volcano that is spewing ash and lava, on the island of Siau in Indonesia. (AFP
    via ABC News Australia)
  - Denmark sends a scientific team to the Arctic to try to establish that the Lomonosov
    Ridge is an extension of Greenland so it can claim sovereignty over oil reserves.
    (AP via New Hope Courier)
  - A Jakarta conference of Islamists sponsored by the Hizb ut-Tahrir discusses plans
    to reestablish a caliphate. (ABC News Australia)
  - Fossilised remains of an ancient cypress forest estimated at 8 million years old
    are discovered in an open cast coal mine in Bükkábrány, Hungary. (BBC)
  - Gloria Arroyo, the President of the Philippines, sends the chief of the army Romeo
    Tolentino to Zamboanga in the southern Philippines to direct operations against
    militants. (BBC)
