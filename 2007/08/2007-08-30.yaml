Date: '2007-08-30'
Source_URI: Portal:Current events/2007 August 30
Intelligence_Payload:
  Uncategorized:
  - Militants fire rockets on a United States military aircraft containing three US
    Senators (Richard Shelby, Mel Martinez and James Inhofe) as well as Rep. Bud Cramer
    as it leaves Baghdad for Amman in Jordan. (CNN)
  - At least 10 Malians are killed and several others injured after their vehicle
    hits a land mine. (Voice of America)
  - '2007 South Korean hostage crisis in Afghanistan: The Taliban releases the remaining
    South Korean hostages. (ABC News Australia)'
  - Nawaz Sharif, former Prime Minister of Pakistan, states that he will return to
    Pakistan from exile after winning a case in the Supreme Court of Pakistan. (chosun)
  - An Iowa district court rules that same-sex couples can marry based on the Iowa
    constitution guarantee of equal protection. (CNN)
  - United States health officials issue a consumer alert for people to check their
    freezers for contaminated meat. (Reuters via CNN)
  - Darfur rebels accuse the Sudanese Government of bombing South Darfur. (Reuters
    via ABC News Online)
  - Two trains collide in Nova Oguacu, a suburb of Rio de Janeiro, killing at least
    eight and injuring 40. (Bloomberg)
  - The Torre Mayor in Mexico City is evacuated after a car containing explosives
    is found in its carpark. Part of the building, Latin America's tallest, had also
    been evacuated the day before after police received an anonymous bomb threat.
    (Bloomberg)
  - 'Waziristan War: Scores of Pakistani soldiers have gone missing near the Afghanistan
    border, amid claims from pro-Taleban militants that they have kidnapped the troops.
    (BBC)'
  - The United Nations Headquarters building in New York City is evacuated after vials
    containing the chemical agent phosgene are discovered. (CNN)
  - The Al-Aqsa Martyrs Brigades of Fatah claims its militants have fired a missile
    into southern Israeli city of Sderot in response to Israeli raids on the Gaza
    Strip. Israeli sources said the rocket landed on a building and caused damages
    and panic. (Xinhuanet)
  - Scores of Italians are arrested in a crackdown on the 'ndrangheta organised crime
    clans active in Calabria. (AP via CNN)
  - Cao Gangchuan, the Defense Minister of People's Republic of China and Masahiko
    Komura, Defense Minister of Japan. meet and agree to strengthen exchanges. (Xinhua)
  - The Chinese Finance Minister, Jin Renqing, resigns due to "personal reasons".
    (BBC)
  - A report into the Virginia Tech massacre criticises staff for not acting quickly
    enough after Seung-Hui Cho's first killings. (BBC) (Report)
  - The Anglican Church of Kenya consecrates two bishops from the Episcopal Church
    in the United States of America after they left the Episcopal Church due to concerns
    that the Church was consecrating gay bishops. (BBC)
  - More than 450 people have been arrested after protests in which police used tear
    gas and water cannons in Chile's capital, Santiago. (BBC)
  - Helping Angels was founded by Poesy Liang.
