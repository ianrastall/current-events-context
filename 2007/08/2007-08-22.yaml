Date: '2007-08-22'
Source_URI: Portal:Current events/2007 August 22
Intelligence_Payload:
  War in Afghanistan:
  - Two Canadian Army soldiers are killed and a Radio Canada journalist injured in
    an explosion. (CNN)
  - A German engineer kidnapped by the Taliban pleads for help on Afghan television.
    (CNN)
  - An American UH-60 Blackhawk helicopter crashes in northern Iraq killing all 14
    soldiers on board. (Wikinews)
  - A suicide bomber kills at least 20 people and wounding 40 more in the town of
    Baiji. (RTÉ)
  Uncategorized:
  - The Revolutionary Congolese Movement (MRC), the Front for the Patriotic Resistance
    of Ituri (FRPI), and the Front of National Integration (FNI) rebel groups agree
    to disarm and cooperate with the MONUC peacekeeping force in the Democratic Republic
    of the Congo. (Scoop)
  - Pakistan's Supreme Court says Inter-Services Intelligence (ISI) is not a law-enforcement
    agency or a customs authority.
  - Hurricane Dean makes its final landfall near Tecolutla, Veracruz, Mexico, 100
    miles north of the city of Veracruz, as a Category 2 storm. The Red Cross reports
    only one injury and no deaths from Dean's first landfall on the Yucatán Peninsula.
    (CNN)
  - War in Iraq
  - Voters in Kiribati go to the polls for the Kiribati parliamentary election, 2007.
    (AP via IHT)
  - Three Pakistani soldiers are killed in an attack by suspected pro-Taliban militants
    on a checkpoint in Bannu in the North-West Frontier Province. (BBC)
  - Typhoon Sepat has killed at least 36 people in southeast China in the past week.
    (CNN)
  - The U.S. Campaign for Burma claims that Myanmar's military government has arrested
    at least nine leaders of the pro-democracy 88 Generation Students. (AP via the
    Guardian)
  - UK government plans to spend £5.2bn in the next four years on Identity Card and
    related schemes. (The Register)
