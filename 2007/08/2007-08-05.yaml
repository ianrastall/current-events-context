Date: '2007-08-05'
Source_URI: Portal:Current events/2007 August 5
Intelligence_Payload:
  Uncategorized:
  - Authorities in Mozambique seize thousands of boxes of counterfeit toothpaste which
    they fear may contain the dangerous chemical diethylene glycol. (AP via Forbes)
  - Police fire shots to disperse an angry crowd in Port Moresby, Papua New Guinea
    with unconfirmed reports of a man dying. (AP via Sydney Morning Herald)
  - Twenty-six people including 14 convicted prisoners escape from the Campsfield
    House detention centre in Oxfordshire, England. (Telegraph)
  - Holocaust survivors protest outside the Prime Minister of Israel Ehud Olmert's
    office over the level of support from Israel. (BBC)
  - Republican Party candidates in the 2008 United States presidential election hold
    a debate. (AFP via News Limited) (ABC News)
  - Mexican golfer Lorena Ochoa wins the Women's British Open title, her first major.
    (The New York Times)
  - The President of the United States George W. Bush meets with the President of
    Afghanistan Hamid Karzai at Camp David to discuss the security of Afghanistan.
    (Voice of America)
  - Lebanon holds two by-elections to replace two members of the Parliament of Lebanon,
    Pierre Amine Gemayel and Walid Eido, killed in violent incidents claimed to be
    murder. Camille Khoury and Mohamad Amin Itani are declared as the winners of the
    elections although rival candidate Amin Gemayel has lodged a complaint about Khoury's
    victory. (BBC) (AFP via ABC News Australia)
  - The death toll from the 2007 South Asian floods nears 1,100 in India while 120
    people have died in Bangladesh and 84 in Nepal. Health officials have raised concerns
    about epidemics. (AFP via ABC News Australia) (Reuters via ABC News Australia)
  - Bodies of two students of IIM Indore, Madhya Pradesh, India, are recovered after
    being swept away in flash floods.
  - Mortar bombs strike a petrol station in eastern Baghdad killing at least nine
    people and injuring 11. (Reuters via ABC News Australia)
  - Thirty-four rail workers building a tunnel in Hubei province China are trapped
    200 metres underground following a landslide. (AFP via News Limited)
