Date: '2007-03-25'
Source_URI: Portal:Current events/2007 March 25
Intelligence_Payload:
  Business and economy:
  - Bangkok's former Don Muang International Airport reopens for domestic flights
    to relieve strain on Suvarnabhumi Airport, which is undergoing repairs. (People's
    Daily)
  Disasters and accidents:
  - Vanuatu is struck by an earthquake of 7.2 magnitude southeast of its capital Port
    Vila. (News Limited)
  - A tsunami occurs on the northern coast of Japan after an earthquake with a magnitude
    of 6.9 in the Sea of Japan. NHK reports that 1 person has died and 40 have been
    injured. (AP via FOX) (AFP via News Limited)
  - Ten people are killed after a fire in a nightclub in Moscow, Russia, caused by
    a 'fire show'. (CBC)
  Health:
  - The Armenian Prime Minister Andranik Margaryan dies of a heart attack. (BBC)
  International relations:
  - John Holmes, United Nations Emergency Relief Coordinator, warns that the situation
    in Darfur could collapse if aid workers are prevented from doing their work. (Reuters
    via CNN)
  - Iran announces that it is partially suspending cooperation with the United Nations
    International Atomic Energy Agency and will no longer advise it of new steps taken
    in its nuclear program. (AP via Houston Chronicle)
  - UK says requests for access to 15 Royal Navy personnel held by Iran have been
    denied. (BBC)
  Law and crime:
  - Up to 10,000 people protest in Minsk against President of Belarus Alexander Lukashenko.
    (Washington Post)
  Sport:
  - Donald Tsang wins a second term as the Chief Executive of Hong Kong in the city's
    first contested race. (BBC)
