Date: '2007-03-12'
Source_URI: Portal:Current events/2007 March 12
Intelligence_Payload:
  Uncategorized:
  - While identifying as a Unitarian, Representative Pete Stark (D-CA) becomes the
    first member of the United States Congress to openly acknowledge that he does
    not hold a "god-belief". (Press Release) (AP via Guardian.co.uk)
  - The BBC's correspondent in the Gaza Strip, Alan Johnston, who is the only Gaza-based
    foreign reporter from a major media organisation, is kidnapped. All the main Palestinian
    militant groups have called for his release. (BBC)
  - The High Court of Zimbabwe rules that detained opposition leader Morgan Tsvangirai
    of the Movement for Democratic Change must either be brought into court on Tuesday
    or released. (BBC)
  - Nigel Griffiths resigns as the Deputy Leader of the British House of Commons over
    the proposed expansion of the Trident missile system. (The Scotsman), (BBC)
  - Lieutenant General Kevin Kiley resigns as the Surgeon General of the United States
    Army over the Walter Reed Medical Center scandal. (CNN) (BBC)
  - Asanbekov Sarybayev, the Deputy Culture Minister of the Government of Kyrgyzstan,
    resigns and joins the United Front For A Worthy Future For Kyrgyzstan opposition
    coalition. The United Front says it will hold protests in Bishkek in April against
    the Constitution and in favor of early presidential elections. (RFE/RL)
  - United Nations investigators criticise Sudan for gross human rights violations
    in Darfur, including murder, mass rape and kidnapping. (BBC)
  - The blueprint for the Chinese space program, including the first Chinese-built
    astronomy satellite, a joint unmanned mission to Mars with Russia, and other extensive
    international cooperation, is released. (PTI via the Hindu),(Xinhua)
  - Lawyers in Pakistan boycott courts in protest at President Pervez Musharraf's
    suspension of the country's Chief Justice Iftikhar Muhammad Chaudhry for alleged
    "misuse of authority". More than 20 lawyers were injured in clashes with police
    during demonstrations in Lahore. (BBC)
  - '2007 National People''s Congress: After announcements in February that China''s
    trade surplus is near a record high, in an open press conference, People''s Bank
    of China Governor Zhou Xiaochuan and Minister of Commerce Bo Xilai were both vocal
    in their criticism towards the United States in a proposed 27.5% tariff, with
    Bo calling it "destructive to bilateral trade". (The New York Times) (BBC)'
