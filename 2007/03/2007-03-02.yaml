Date: '2007-03-02'
Source_URI: Portal:Current events/2007 March 2
Intelligence_Payload:
  Uncategorized:
  - Protestors set cars and barricades on fire in Copenhagen over evictions. (Fox
    News)
  - Italian leader Romano Prodi is reinstated as prime minister after winning his
    second and final confidence vote in the Parliament, ending a political crisis
    that began last week when Prodi resigned after losing a foreign policy vote. (CNN)
  - Cuban foreign minister Felipe Pérez Roque claims leader Fidel Castro is recovering
    from his illness and could come back to lead Cuba again. (CNN)
  - The Bush administration selects a design from the Lawrence Livermore National
    Laboratory for a new generation of nuclear warheads that could replace the Trident
    missile on submarines by 2012. (AP via Seattle Post-Intelligencer)
  - Prices at the New York Stock Exchange and Toronto Stock Exchange continue to drop
    after a massive sell-off earlier in the week. (CBC)
  - The Parliament of Chechnya appoints Ramzan Kadyrov as the President of Chechnya
    after his nomination by the President of Russia Vladimir Putin. (BBC)
  - The United States Secretary of the Army Francis J. Harvey resigns over poor conditions
    at the Walter Reed Army Medical Center. President Bush later orders a full review
    of health care available to returning soldiers. (New York Times)
  - A bus carrying the baseball team of Bluffton University plunges off an overpass
    onto Interstate 75 near Atlanta, Georgia, killing six people, including four students.
    (CNN)
  - Puerto Rico institutes a smoking ban in all public places. Smoking will only be
    allowed in homes, places dedicated to tobacco sales, and open and ventilated places.
    (El Nuevo Día)
  - A bomb explodes near a car carrying a judge of the Pakistani anti-terrorist court,
    Mian Bashir Bhatti, wounding him and killing at least three others. (AP via IHT)
  - Indonesia declares the deaths of the Balibo Five to be a closed case despite a
    New South Wales coronial inquest into their deaths in Balibo, East Timor, in 1975.
    (News Limited)
  - The Communist Party of China expels nine senior officials and business leaders
    over a Shanghai corruption scandal related to misuse of Government pension funds.
    The nine people will also face criminal charges. (BBC)
  - The Attorney General for England and Wales, Lord Goldsmith, obtains an injunction
    from the High Court preventing the BBC from broadcasting an item about investigations
    into an alleged cash for honours political scandal. (BBC)
