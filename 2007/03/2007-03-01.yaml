Date: '2007-03-01'
Source_URI: Portal:Current events/2007 March 1
Intelligence_Payload:
  Uncategorized:
  - Switzerland accidentally invades Liechtenstein after 171 infantrymen get lost
    and cross the Liechtenstein border. (Fox News) (BBC)
  - A human case of bird flu is confirmed in China. (USA Today)
  - Pakistani authorities capture Mullah Obaidullah Akhund, a former Defense Minister
    of Afghanistan under the Taliban. (Voice of America)
  - India requests the extradition of Italian businessman Ottavio Quattrocchi from
    Argentina in relation to the Bofors scandal. (NDTV)
  - Ten French tourists are kidnapped in northern Ethiopia. (AP via CNN)
  - The Spanish government moves hungerstriking ETA prisoner Iñaki de Juana Chaos
    from a cell in Madrid to one in the Basque Country. (AP via the Houston Chronicle)
  - A boat carrying Haitian migrants catches fire off the coast of the Dominican Republic
    resulting in the death of at least eight people and 44 people missing. (AP via
    Fox News)
  - Dozens of people are arrested in Copenhagen as the police evict squatters from
    The Youth House in the centre of the city. (AP via IHT)
  - The government of Turkey orders an investigation into claims that the Kurdish
    separatist leader Abdullah Öcalan was poisoned. (BBC)
  - A tornado strikes southern Missouri killing a seven-year-old girl. Tornadoes in
    Alabama kill at least ten people including eight students at Enterprise High School.
    In Georgia, at least nine people die in storms. It is part of a larger tornado
    outbreak. (The Birmingham News) (AP via Houston Chronicle) (KDKA CBS)
  - Senegalese election officials confirm that Abdoulaye Wade has been re-elected
    as the President of Senegal. (Voice of America)
  - The United States formally charges David Hicks with aiding the Taliban. He will
    be the first person tried under the new law for military commissions. (AP via
    CNN)
  - Eight people die in a landmine explosion in Chhattisgarh, India. (BBC)
  - A New South Wales coroner issues a warrant for the arrest of Indonesian politician
    Yunus Yosfiah for failure to appear to give evidence in the coronial inquest into
    the death of the Balibo Five in Balibo, East Timor, in 1975. (News Limited)
  - The fourth International Polar Year, a $1.5 billion research program to study
    both the North Pole and South Pole is launched in Paris, France. (BBC)
  - Greek archaeologists announce that a 2,200-year-old statue of the goddess Hera
    has been found during excavations in the ruins of ancient Dion, a city under Mount
    Olympus. (AP)
