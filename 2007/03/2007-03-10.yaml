Date: '2007-03-10'
Source_URI: Portal:Current events/2007 March 10
Intelligence_Payload:
  Uncategorized:
  - Five people drown in heavy flooding around the town of Labasa on the island of
    Vanua Levu in Fiji. (ABC News Australia)
  - Twenty people die and 9 are missing after a flood in a coal mine in Fushun, a
    city in the province of Shenyang in China. (AP via Forbes)
  - President George W. Bush approves 8,200 more United States troops for Iraq and
    Afghanistan. (Washington Post)
  - Thousands of supporters of legislation giving equal rights on issues to heterosexual
    and gay couples in Italy attend a rally in Rome. (AP via the Houston Chronicle)
  - 'Sri Lankan Civil War: More than 30,000 Sri Lankans flee intensifying fighting
    between the Government and the Tamil Tigers in the east of Sri Lanka. (ABC Australia)'
  - Tens of thousands of people in Madrid protest the release of jailed Basque separatist
    José Ignacio de Juana Chaos. (BBC)
  - The launch of the European Space Agency's latest Ariane 5 mission from French
    Guiana, carrying a platform for the Skynet 5 military satellite system for use
    by the UK Ministry of Defence, is postponed due to a minor technical failure (BBC)
  - Zambia starts a program of mass demolition of illegal housing starting in the
    capital Lusaka. The demolitions are to end corruption in the distribution of land
    plots highlighted by the recent sacking of Lands Minister Gladys Nyirongo. (Reuters
    via IOL South Africa)
  - Yearlong talks on the future of Kosovo end in stalemate between the Serbian Government
    and the ethnic Albanian leaders of the province. (CNN)
  Iraq War:
  - A major international conference starts in Baghdad to look at ways to stabilise
    Iraq featuring representatives from Iran, Syria and the United States. (BBC)
  - A number of bombs detonate at the above event, but there are no casualties. (SkyNews)
