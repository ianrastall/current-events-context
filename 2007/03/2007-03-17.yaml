Date: '2007-03-17'
Source_URI: Portal:Current events/2007 March 17
Intelligence_Payload:
  Uncategorized:
  - Thousands of activists march to The Pentagon in Washington D.C. to mark the fourth
    anniversary of the start of the Iraq War. (New York Times)
  - '2007 Zimbabwean political crisis: Three activists in the Zimbabwe opposition
    are arrested as they attempt to leave the country for South Africa including Arthur
    Mutambara, leader of a faction in the Movement for Democratic Change. Two of the
    activists were seeking medical treatment after having been arrested a week ago.
    (AP via Washington Post)'
  - In major upsets, Bangladesh beats India by 5 wickets in a 2007 Cricket World Cup
    tie-up, (BBC Sports) (The Age) (Reuters) while Ireland knock Pakistan out of the
    competition with a 3 wicket win - Ireland's first ever victory in the Cricket
    World Cup. (Reuters)
  - The Prime Minister of Australia John Howard makes a commitment to keep Australian
    troops in Iraq until Iraq is able to control its own security. (BBC)
  - The Palestinian Legislative Council endorses a unity cabinet containing members
    of Fatah and Hamas. (Reuters via News Limited)
  - President Pervez Musharraf of Pakistan apologises for a police raid on Geo TV's
    offices in Islamabad the day before, with 14 police officers suspended for their
    alleged part in the incident. (IBN)
  - At least seven people die in a TU-134 plane crash in Samara in Russia. (BBC)
  - A heavy metal band tours India for the first time. Iron Maiden, at Palace Grounds,
    Bangalore.
