Date: '2007-03-22'
Source_URI: Portal:Current events/2007 March 22
Intelligence_Payload:
  Uncategorized:
  - An arms depot explodes in Maputo, Mozambique, killing at least 93 people and injuring
    hundreds more. CNN (AP via CNN)
  - French space agency CNES releases its UFO files to the public via its website.
    (Washington Post)
  - Jamaican Police announce that Bob Woolmer, the coach of the Pakistan national
    cricket team, was murdered on Sunday, and proceed to question all members of the
    team. (This is London), (IOL (S. Africa))
  - NBC, News Limited, AOL, MSN and Yahoo! join forces to develop an ad-supported
    online video network to compete with YouTube. (Business Week)
  - '2007 Zimbabwean political crisis: The Roman Catholic Archbishop of Bulawayo Pius
    Ncube calls for mass protests to force President Robert Mugabe from power. (BBC)'
  - Fighting erupts in Kinshasa, Democratic Republic of Congo, between Government
    troops and the personal militia of Jean-Pierre Bemba, defeated presidential candidate
    in 2006 and recently elected Senator. The Spanish embassy is caught in the crossfire,
    leading to its evacuation under United Nations guard. (Reuters via CNN)
  - Bemba seeks refuge with the South African embassy. (BBC)
  - The European Union agrees to open the trans-Atlantic air market to greater competition.
    (New York Times)
  - A senior U.S. District Judge, Lowell Reed Jr., strikes down the Child Online Protection
    Act, which made it an offence for commercial website operators to allow minors
    to access "harmful" material. (The Times)
  - Police arrest three men in England in relation to the 7 July 2005 London bombings.
    (Bloomberg)
  - United Nations Secretary-General Ban Ki-moon is left shocked, but uninjured at
    a press conference with Iraqi Prime Minister Nouri Maliki in Baghdad as a nearby
    bomb explodes. (BBC)
  - Former U.S. Ambassador to the United Nations John R. Bolton claims the United
    States deliberately resisted calls for an immediate ceasefire during the 2006
    Israel-Lebanon conflict. (BBC)
  - Amnesty International calls on governments not to co-operate with U.S. military
    in trials of detainees at Guantánamo Bay. (BBC)
  - The ventromedial prefrontal cortex is identified as the part of the human brain
    that combines logic and emotion in order to make moral decisions. (The Times)
  Insurgency in Somalia:
  - Clashes flare up in Mogadishu between the interim government forces and local
    militiamen. (Shabelle.net)
  - Heavy fighting between interim government forces from Puntland and local militia
    erupts in Adado, 500 km north of Mogadishu. (Shabelle.net)
