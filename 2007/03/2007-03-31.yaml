Date: '2007-03-31'
Source_URI: Portal:Current events/2007 March 31
Intelligence_Payload:
  Uncategorized:
  - First day of the Church of Jesus Christ of Latter-day Saints (LDS) 177th Annual
    General Conference
  - 'Insurgency in Somalia: Violence continues in Mogadishu for a third day, in what
    the Red Cross calls "the worst fighting in more than 15 years." (al Jazeera)'
  - Telecom New Zealand shuts down its 025 D-AMPS cellular network. (NZ Herald)
  - '2007 Chinese Sandstorms: After severe sandstorms caused communication and transportation
    problems in Hohhot and other regions of Inner Mongolia, the first severe sandstorm
    of the year hits Beijing and the surrounding regions of Liaoning, Xinjiang and
    Tianjin. (CCTV) (SINA)'
  - The St. Louis Cardinals and Cleveland Indians play in Major League Baseball's
    inaugural "Civil Rights Game" at AutoZone Park in Memphis, Tennessee, instituted
    to honor the history of civil rights in the United States. (MLB)
  Iranian seizure of British Navy personnel:
  - The United States rules out exchanging five Iranian officials seized in Irbil,
    Iraq, in January 2007 for the 15 Royal Navy sailors seized by Iran. (BBC)
  - Iran's ambassador to Russia tells Russian TV channel Vesti-24, "It is possible
    that the British soldiers will go on trial for taking this illegal action." (BBC)
