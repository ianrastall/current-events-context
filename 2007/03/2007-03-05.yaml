Date: '2007-03-05'
Source_URI: Portal:Current events/2007 March 5
Intelligence_Payload:
  Uncategorized:
  - The United States and North Korea commence talks in New York City to establish
    diplomatic relations following the abandonment of the North Korean nuclear weapons
    program. (AP via CNN)
  - Ramush Haradinaj, the former Prime Minister of Kosovo, goes on trial at the International
    Criminal Tribunal for the Former Yugoslavia at The Hague for war crimes allegedly
    committed while he was a regional leader of the Kosovo Liberation Army. (The Independent)
  - Ungdomshuset in Copenhagen, Denmark, is demolished to prevent it from being re-occupied.
    (AP via CNN)
  - The government of Vanuatu declares a state of emergency in Port Vila following
    ethnic clashes. (AP via Washington Post) (Radio New Zealand)
  - The 2007 National People's Congress opens at the Great Hall of the People in Beijing,
    China. In his report to the nation, Premier Wen Jiabao focuses on environmental
    concerns, narrowing the wealth gap, controlling housing prices, and "resolute
    opposition" to Taiwan independence. (BBC) (Reuters) (CNN) (China Daily)
  Iraq War:
  - A car bomb in Baghdad kills at least 26 people. (CNN)
  - Two car bombs kill at least 9 United States Army soldiers north of Baghdad. (AP
    via IHT) (BBC)
