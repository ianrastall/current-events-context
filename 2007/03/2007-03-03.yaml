Date: '2007-03-03'
Source_URI: Portal:Current events/2007 March 3
Intelligence_Payload:
  Uncategorized:
  - The eviction of Ungdomshuset by Danish police results in more rioting in Nørrebro,
    Copenhagen, leading to about 100 arrests during a second night of protests. (BBC)
  - United States President Bush declares Coffee County, Alabama, hit by a tornado
    last Thursday, to be a federal disaster area. (CTV Canada)
  - A total lunar eclipse is visible from the Midwestern United States to Southeast
    Asia from 22:44 to 23:58 GMT. (BBC)
  - The Cherokee Nation has voted to exclude the descendants of freed slaves from
    Cherokee citizenship, reversing a decision of the Cherokee Nation Supreme Court.
    (BBC)
