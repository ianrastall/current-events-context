Date: '2007-03-06'
Source_URI: Portal:Current events/2007 March 6
Intelligence_Payload:
  Uncategorized:
  - 'Iraq War: Two suicide bombers in a crowd of Muslim pilgrims in Al Hillah kill
    at least 115 people and wound 150. (BBC)'
  - Foreign Minister of People's Republic of China Li Zhaoxing criticises President
    of the Republic of China Chen Shui-bian for making calls for Taiwan independence.
    (The Times)
  - 'United States v. Libby: Former Bush administration aide Lewis Libby is found
    guilty of perjury and obstruction of justice. (CNN)'
  - The United States Congress opens hearings into the dismissal of eight U.S. Attorneys,
    probing whether the Bush Administration had political motives for ousting the
    federal prosecutors. (AP via The Guardian)
  - Heavy security operations begin in Bogotá, Colombia, for the visit of U.S. President
    Bush on March 11. Security forces expect protests on Wednesday. (El Tiempo)
  - Japanese news agency Kyodo News reports that Empress Michiko is suffering from
    internal bleeding. (BBC)
  - Two earthquakes measuring 6.4 and 6.3 on the Moment magnitude scale hit Sumatra
    in Indonesia, with the epicenter near Lake Singkarak. At least 82 fatalities are
    currently reported. The earthquakes were felt as far as in Malaysia and Singapore.
    (The Age) (USGS on the 6.4 quake) (USGS on the 6.3 quake)
  - India and Pakistan hold a meeting in Islamabad to discuss joint actions against
    terrorism with discussion focussing on the Samjhauta Express bombings. (BBC)
  - Celebrations in Ghana mark the fiftieth anniversary of its independence. (BBC)
  - 'War in Afghanistan (2001–present): NATO-led forces launch Operation Achilles
    against the Taliban in Helmand province. (AP via IHT)'
