Date: '2007-03-14'
Source_URI: Portal:Current events/2007 March 14
Intelligence_Payload:
  Uncategorized:
  - Four people die in a shootout in Greenwich Village in New York City. (AP via CNN)
  - Twelve people die in Nandigram near Kolkata in India, as police shoot at farmers
    protesting the establishment of a special economic zone. (BBC)
  - Nancy Worley, former Secretary of State of the U.S. state of Alabama, is indicted
    for violations related to solicitation of campaign contributions from Secretary
    of State employees.(Associated Press)
  - Khalid Sheikh Mohammed, long suspected as the mastermind of the September 11,
    2001 attacks, confesses to that and a string of others in a closed military hearing
    held at Guantánamo Bay, Cuba. (AP via CBS Atlanta)
  - Dutch police seal off the streets of Ondiep in Utrecht on the second day of rioting.
    (DutchNews) (Canada Free Press)
  - The United States military states in a report that some aspects of the situation
    in Iraq could be described as a "civil war". (AP via Houston Chronicle)
  - The United Kingdom Government wins the support of the House of Commons to update
    the Trident nuclear missile system. There was a significant revolt within the
    Labour Party, with two PPSs, Stephen Pound and Chris Ruane, resigning. (UK Telegraph)
  - NASA announces that the Cassini spacecraft has captured images of several sea-sized
    bodies of liquid, likely hydrocarbons, on Titan, the largest moon of Saturn. (AP
    via Seattle Post-Intelligencer)
  - Police in India arrest two people in relation to the Samjhauta Express bombing.
    (BBC)
  - Eight people in southern Thailand are shot dead after their vehicle is bombed
    by suspected Islamic insurgents. Law enforcement warns of more violence by separatists,
    citing the anniversary of the founding of the Barisan Revolusi Nasional. (AP via
    CNN)
  - An explosion at a gun shop in Kabul kills at least six people. (AFP via Melbourne
    Herald-Sun)
  - Tonga is considering options for the redevelopment of its capital city, Nukualofa,
    after 2006 riots destroyed the CBD. (Radio NZ)
  - The U.S. state of Colorado adopts "Rocky Mountain High", written by John Denver,
    as its second official state song. (Denver Post)
  - The trial against former media baron Conrad Black begins in Chicago. He is accused
    of defrauding Hollinger's shareholders of millions of dollars. (CBC News)
  - The WWF declares a new species, the Bornean clouded leopard. (WWF)
