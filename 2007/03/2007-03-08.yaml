Date: '2007-03-08'
Source_URI: Portal:Current events/2007 March 8
Intelligence_Payload:
  Uncategorized:
  - Georgia increases the size of its contingent in the multinational force in Iraq
    from 850 to 2000. (Fox News)
  - '2006-07 Southern Hemisphere tropical cyclone season: Tropical Cyclone George
    crosses the coast of northwest Western Australia near Port Hedland, resulting
    in at least three deaths and serious property damage in the area. (AAP via News
    Limited),(NineMSN),(BBC)'
  - Democratic members of the U.S. House of Representatives propose legislation that
    would withdraw all U.S. combat troops from Iraq by August 2008 or sooner if certain
    requirements are not met. (CNN) (BBC)
  - '2007 National People''s Congress: The People''s Republic of China launches a
    property law designed to better protect individual property rights. (BBC)'
  - 'Sri Lankan Civil War: Thousands of civilians flee their homes in Sri Lanka because
    of fighting between government troops and the Tamil Tigers. (BBC)'
  - 'War in Somalia: African Union peacekeepers are ambushed by insurgents in Mogadishu
    for a second successive day. (BBC)'
  - U.S. President George W. Bush departs on a tour of Latin America that will take
    him to Brazil, Uruguay, Colombia, Guatemala and Mexico. Upon arrival in São Paulo
    he is greeted with protest demonstrations. (AP via CNN) (BBC)
  - Greek Cypriots dismantle the portion of the separation fence between the Republic
    of Cyprus and the Turkish Republic of Northern Cyprus in Nicosia. (BBC)
