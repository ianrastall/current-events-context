Date: '2007-03-13'
Source_URI: Portal:Current events/2007 March 13
Intelligence_Payload:
  Uncategorized:
  - Demonstrators in Mexico City clash with police as U.S. President George W. Bush
    meets with Mexican President Felipe Calderón in Mérida, Yucatán. (AP via Jerusalem
    Post)
  - Relatives of the 17 victims of the USS Cole bombing take Sudan to court in a civil
    suit claiming that the terrorist attack could not have happened without Sudan's
    help. (AP via Houston Chronicle)
  - Twenty Ecuadoran lawmakers clash with police after trying to regain their seats
    in Congress. The legislators were part of a group of 57 dismissed by President
    Rafael Correa for trying to block a referendum. (BBC)
  - Morgan Tsvangirai, the leader of the Movement for Democratic Change in Zimbabwe,
    appears in court limping and with a head wound after having been arrested on Sunday.
    Tsvangarai is later taken from court to a hospital under police guard. (New York
    Times)
  - Spanish police arrest Brian David Anderson, a Canadian citizen, in Madrid, on
    behalf of the U.S. government, for allegedly engaging in fraud and funding a terrorist
    camp in Afghanistan. (The Columbus Dispatch)
  - Alexander Veshnyakov, the head of Russia's Central Election Commission, is removed
    after criticising changes to electoral laws favouring United Russia associated
    with Vladimir Putin. (BBC)
  - Alberto Gonzales, the Attorney General of the United States, acknowledges that
    mistakes were made in the handling of the firing of eight federal prosecutors.
    His top aide Kyle Sampson resigns for not advising other senior officials of the
    Department of Justice about discussions with former White House counsel Harriet
    Miers regarding the possible firings. (AP via the Advocate)
  - At least 50 people die due to heavy snow in Kashmir and thunderstorms in the rest
    of northern India. (AFP via News Limited)
  - Five British Embassy workers kidnapped in Ethiopia twelve days ago have been set
    free in neighbouring Eritrea. (The Times)
  - The first match of the 2007 Cricket World Cup, between West Indies and Pakistan,
    takes place at Sabina Park in Jamaica. The West Indies win by 54 runs.(BBC)
  - A draft Climate Change Bill is published in the United Kingdom, outlining a framework
    for achieving a mandatory 60% cut in carbon emissions by 2050. (BBC)
  - Japan and Australia sign a security pact, the first defence treaty for Japan with
    a nation other than the United States since the end of World War II. (BBC)
  - The Mauritanian government announces that Sidi Ould Cheikh Abdallahi and Ahmed
    Ould Daddah have won the most votes in the first round of the 2007 presidential
    election, and their runoff election will be held on March 25. (Reuters)(Xinhua
    via People's Daily) (BBC)
