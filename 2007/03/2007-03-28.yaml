Date: '2007-03-28'
Source_URI: Portal:Current events/2007 March 28
Intelligence_Payload:
  Uncategorized:
  - As many as 60 people die off the coast of Guinea as a pirogue or open fishing
    boat carrying 120 people capsizes. (Reuters via CNN)
  - The Czech government announced that it will open negotiations with the US Government
    over participation in the missile defense shield. (Washington Post)
  - Ecuadorean judge Juan Ramirez reinstates 57 members of the National Congress of
    Ecuador only to be dismissed by the electoral tribunal that dismissed the members
    of Congress. (BBC)
  - A collapsed tunnel during construction of a Beijing Subway line results in six
    trapped. (ABC)
  - Former Major League Baseball pitcher Ugueth Urbina is sentenced to 14 years in
    prison after being convicted of attempted murder in Venezuela. (ESPN)
  - The President of Guinea Lansana Conté names a new government led by the Prime
    Minister of Guinea Lansana Kouyaté. (BBC)
  - Arab and Middle East leaders meet in Riyadh, Saudi Arabia to discuss reviving
    the Middle East peace process. (Los Angeles Times)
  - A Sydney Ferries jetcat collides with a private charter vessel beneath the Sydney
    Harbour Bridge in the waters of Port Jackson, Sydney, Australia, killing three
    people with another person missing. (Sydney Daily Telegraph via Courier Mail)
  - The UK Ministry of Defence has published exact co-ordinates of the location of
    the Royal Navy personnel when they were seized by Iran. According to this data
    the soldiers were 1.7 nautical miles within Iraqi waters at the time of their
    capture. (The Times)
  - Gangs of youths riot in Paris with the violence centred on the Gare du Nord, one
    of the main railway stations. (ITV)
  - The World Food Programme warns that millions face starvation in North Korea as
    it is facing a food gap equivalent to 20 per cent of its requirement. (Reuters
    via Washington Post)
  - Pakistani militants attack security bases in the town of Tank in the North-West
    Frontier Province of Pakistan resulting in two deaths. (Reuters Alertnet)
  - Armed gunmen take 32 children and two teachers hostage in the centre of Manila,
    the capital of the Philippines. The gunmen later surrendered and released the
    hostages. (BBC) (AFP via Sydney Morning Herald)
  Iraq War:
  - '2007 chlorine bombings in Iraq: The U.S. military reports that insurgents with
    two chlorine truck bombs have attacked a local government building in Fallujah.
    (Reuters)'
  - '2007 Tal Afar bombings: Gunmen kill dozens of people in Tal Afar a day after
    approximately 50 people die in suicide bombings. (BBC)'
  Zimbabwean political crisis:
  - The Movement for Democratic Change says its leader, Morgan Tsvangirai, has been
    arrested by police. He was later released but other activists remained in police
    custody. (BBC) (Zim Daily)
  - The Southern African Development Community holds an emergency summit in Dar-es-Salaam
    to discuss the crisis. (Voice of America)
