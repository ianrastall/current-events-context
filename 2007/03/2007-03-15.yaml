Date: '2007-03-15'
Source_URI: Portal:Current events/2007 March 15
Intelligence_Payload:
  Uncategorized:
  - Hungarian police use water cannon and tear gas to disperse a crowd of anti-government
    protestors in Budapest. (AP via CNN)(BBC)
  - Four United States soldiers die in Baghdad in a car bomb attack, while 12 Iraqis
    die in Baghdad and Iskandariya in the south of Iraq. (BBC)
  - Willie Brigitte is sentenced to nine years' jail in France for planning terrorist
    attacks in Australia. (ABC News Australia)
  - Researchers discover that the polar ice cap at Planum Australe, the south pole
    of Mars, is thick enough to cover the planet with water if melted. (National Geographic)
  - The Governor of California Arnold Schwarzenegger signs a bill to move the California
    primary from June to February 5. (AP via CBS News)
  - Russia, Greece and Bulgaria sign a deal to build a pipeline to transport Russian
    oil to the Greek port of Alexandroupolis. (AP via Houston Chronicle)
  - The five permanent members of the United Nations Security Council and Germany
    agree on a proposal for sanctions against Iran for its nuclear programs to be
    discussed by the Security Council. (Reuters via CNN)
  - The BBC issues a plea for information on the whereabouts of its Gaza correspondent,
    Alan Johnston, who has been missing for three days and is believed by Palestinian
    security officials to have been kidnapped. (BBC)
  - The Movement for the Emancipation of the Niger Delta frees two Italian oilworkers
    that it took captive last year in Nigeria. (Reuters via CNN)
  - Naxalite rebels attack a police outpost in the Bijapur district of Chhattisgarh,
    India, killing at least 49 officers and looting their weapons. (Times of India)
    (AP via Canada.com)
  - France's SNCF inaugurates the LGV Est route between Paris and Strasbourg. (BBC)
