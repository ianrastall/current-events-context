Date: '2007-03-04'
Source_URI: Portal:Current events/2007 March 4
Intelligence_Payload:
  Estonian parliamentary election, 2007:
  - Andrus Ansip's Reform Party wins 27% of the vote raising its mandate in the Riigikogu
    to 31 seats from 19.
  - Approximately 30,000 voters take advantage of electronic voting, becoming the
    first nationwide election where part of the votecasting was allowed via the Internet.
    (BBC)
  Uncategorized:
  - 'Abkhazian parliamentary election, 2007: Separatists in the breakaway Georgian
    republic of Abkhazia hold elections. The Government of Georgia claims that the
    elections are not legitimate. (UPI)'
  - Sunil Kumar Mahato, an Indian member of parliament from the Jharkhand Mukti Morcha,
    is killed by suspected Maoist rebels while watching football in Jharkhand. (The
    Hindu)
  - China raises its defense budget by 17.8 percent, while cutting the budget deficit
    to 1.1 percent of GDP. (People's Daily) (Reuters)
  - A memorial service is held at St Mary's Church in Dover, United Kingdom, to mark
    the 20th anniversary of the Zeebrugge ferry disaster. (BBC)
  - Australian troops enter the town of Same in East Timor where fugitive East Timorese
    army officer Alfredo Reinado was located with orders to arrest Reinado from the
    President of East Timor Xanana Gusmão. Reinado evades capture but five of his
    men are killed in the Battle of Same. (ABC News Australia) (AAP and AFP via Sydney
    Morning Herald)
  War in Afghanistan (2001–present):
  - U.S. troops open fire after a suicide bomb attack on a convoy and kill 8 or more
    civilians on the main road linking Jalalabad with the Pakistan border. Local people
    protest at the soldiers' actions. (BBC)
  - 'Taliban insurgency: Two British soldiers serving with the NATO International
    Security Assistance Force are killed in Helmand province during clashes with Taliban
    forces. (BBC)'
