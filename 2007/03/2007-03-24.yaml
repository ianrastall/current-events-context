Date: '2007-03-24'
Source_URI: Portal:Current events/2007 March 24
Intelligence_Payload:
  Uncategorized:
  - At least 150 people die in Kinshasa, Democratic Republic of Congo in fighting
    between the military and forces loyal to Senator Jean-Pierre Bemba. (BBC)
  - The United Kingdom announces the withdrawal of all British Armed Forces serving
    as part of the European Union Force in Bosnia and Herzegovina. (BBC)
  - 'Iraq War: At least 47 people die in insurgent strikes including 20 as a result
    of a suicide truck bomb in a Baghdad police station. (AP via The Guardian)'
  - The United Nations Security Council unanimously adopts Resolution 1747, imposing
    additional economic sanctions on the Islamic Republic of Iran for its ongoing
    nuclear programme. (Washington Post)
  - Xi Jinping is appointed the new CPC Shanghai Committee Secretary, thus becoming
    the number one figure in Shanghai, replacing acting party chief Han Zheng. He
    leaves his post as Party chief in Zhejiang. (Xinhua) (New York Times)
  - Elections in the Australian state of New South Wales sees the Australian Labor
    Party led by Morris Iemma retain government despite a small swing against it.
    (ABC News Australia)
