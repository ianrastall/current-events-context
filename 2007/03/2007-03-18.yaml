Date: '2007-03-18'
Source_URI: Portal:Current events/2007 March 18
Intelligence_Payload:
  Uncategorized:
  - A gas explosion in a coal mine in Shanxi province in northern China traps 21 miners.
    (Radio Australia)
  - Cesare Battisti, convicted in absentia of two murders in Italy in the 1970s and
    who later became a crime writer in France, is arrested in Brazil. (Fox News)
  - 'Iraq War: Explosions in Baghdad kill eleven people. (CNN)'
  - Two cargo ships collide in the East China Sea. 23 crew members are missing. (AP
    via CNN)
  - Bob Woolmer, the Pakistan cricket coach, dies in a Kingston, Jamaica hospital
    following his team's shock loss to Ireland and consequent early elimination from
    the 2007 Cricket World Cup. (BBC)
  - 'Finnish parliamentary election: Voters go to the polls, with the centre-left
    governing coalition between the Centre Party and the Social Democratic Party continuing
    for another term under the leadership of Matti Vanhanen. The National Coalition
    Party had a strong result finishing with one seat less than the Centre Party.
    (BBC), (Daily Telegraph Australia)'
  - More than 200,000 Sydneysiders walk across the Sydney Harbour Bridge to mark the
    75th anniversary of the icon's opening. The bridge had been closed to vehicular
    traffic for one day to mark the occasion. (BBC)
