Date: '2007-03-16'
Source_URI: Portal:Current events/2007 March 16
Intelligence_Payload:
  Uncategorized:
  - Two Iraqi police officers are killed and hundreds wounded or sickened as three
    suicide attacks using chlorine gas occur in Anbar province. (New York Times)
  - The Inter-American Development Bank forgives US$4.4 billion in debt owed by Bolivia,
    Honduras, Nicaragua, Haiti and Guyana, five of the poorest countries in the Americas.
    (AP via San Diego Union Tribune)
  - Herschelle Gibbs of South Africa becomes the first cricketer to hit six sixes
    in one over in a One Day International at the 2007 Cricket World Cup. (BBC)
  - Three officers of the New York Police Department are indicted on charges related
    to the death of a black man, Sean Bell, on his wedding day. (AP via IHT)
  - British coroner Andrew Walker finds that the death of soldier Matty Hull in the
    190th Fighter Squadron, Blues and Royals "friendly fire" incident was "unlawful
    and criminal". (AP via CNN) (BBC) The U.S. Department of State rejects this ruling.
    (BBC)
  - Airbus workers in Germany, France and Spain hold protest meetings and strikes
    in response to plans to cut 10,000 jobs and close six plants. (AP via ABC News
    America)
  - Livedoor founder Takafumi Horie is sentenced to two and a half years for his role
    in securities fraud at the company. (BBC)
  - Santo Santoro, the federal Minister for Ageing in Australia, resigns after revealing
    that he owned shares in at least 50 companies not disclosed on the Senate register
    of interests. (ABC News Australia)
  - The Property Law of the People's Republic of China is adopted at the 2007 National
    People's Congress. (BBC)
  - Foreign ministers of Pacific Islands Forum countries meet in Vanuatu and call
    on Fiji to hold elections within two years. (ABC) (Radio New Zealand)
