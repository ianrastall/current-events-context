Date: '2007-03-30'
Source_URI: Portal:Current events/2007 March 30
Intelligence_Payload:
  Uncategorized:
  - India's legendary leg spinner Anil Kumble retires from One Day International cricket.
    (IHT) (Indiatimes) (Eurosport)
  - 'Insurgency in Somalia: An Ethiopian helicopter is downed in Mogadishu as Ethiopian
    and Somali government troops battle insurgents. (BBC)'
  - Sudanese authorities arrest a man who hijacked a Sudan Airways plane flying from
    Libya to Sudan. (Boston Globe)
  - Bangladesh hangs six people convicted of killing two judges during a wave of terrorist
    attacks including the founder of the Jamaat-ul-Mujahideen Bangladesh, Shaykh Abdur
    Rahman, and his deputy Siddiqul Islam. The convicted men stated they had sought
    to kill the judges because the judiciary was run by secular rather than Sharia
    law. (BBC)
  - The United States Food and Drug Administration identifies the chemical melamine
    in tainted wheat-gluten shipped from China and used by Menu Foods and an unnamed
    second company to manufacture pet food. (CNN)
  - 'Back to the Future: The Ride closes at Universal Studios Florida. (Orlando Sentinel)'
  Iranian seizure of British Navy personnel:
  - A Royal Navy sailor identified as Nathan Thomas Summers appeared on Iranian TV,
    admitting to and apologizing for entering Iranian territory and his government's
    wartime actions in general. Tony Blair dismisses the statement as forced. (BBC)
  - Iran releases a second letter written by the only female captured sailor, Faye
    Turney, who also again apologises. There are numerous grammatical mistakes, suggesting
    it has been translated into English for Turney to copy. (BBC) (Full letter - BBC)
  - Foreign ministers from the European Union have released a statement offering 'unconditional
    support' for Britain, urging the 'immediate and unconditional release' of the
    sailors, adding that the EU reserved the right to take 'appropriate measures'
    if Iran did not comply - although the exact measures were not mentioned. (BBC)
