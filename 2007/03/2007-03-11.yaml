Date: '2007-03-11'
Source_URI: Portal:Current events/2007 March 11
Intelligence_Payload:
  Uncategorized:
  - Leading opponents of Zimbabwe's President Robert Mugabe, including Morgan Tsvangirai,
    leader of the Movement for Democratic Change, and four other members of parliament
    and party activists, are arrested for defying a ban on protest rallies in Harare.
    Riot police shoot one activist dead. (AFP via News Limited) (BBC)
  - The President of France Jacques Chirac announces that he will not be seeking a
    third term. (ABC News Australia) (BBC)
  - Voters in Russia go to the polls in elections in 14 regions including Saint Petersburg.
    The elections have been widely criticised by the Opposition. (AP via IHT)
  - The Ariane 5 rocket carrying the new generation Skynet 5 military satellite system
    is launched successfully from Kourou in French Guiana at 22:03 GMT. (BBC)
  - Mauritanian voters go to the polls to elect a new President to replace Colonel
    Ely Ould Mohamed Vall who took power in a coup d'état two years ago. It is likely
    that a runoff election will be held as there is no clear frontrunner. (BBC)
  - The ninth Cricket World Cup opens in Trelawny Stadium, Montego Bay, Jamaica. The
    2007 championship will feature cricket matches staged in various locations across
    the Caribbean. (BBC)
