Date: '2007-03-27'
Source_URI: Portal:Current events/2007 March 27
Intelligence_Payload:
  Uncategorized:
  - More than ninety people are burnt to death after a fire following a petrol spill
    in Kaduna State, Nigeria. (All Africa)
  - The village of Um el-Nasser in the Gaza Strip is flooded with sewage after the
    wall of a sewage pond gives way resulting in at least four deaths. (Washington
    Post)
  - Heavy flooding after several days of heavy rain in Hispaniola have resulted in
    11 people dying and thousands of people being evacuated in Haiti and the Dominican
    Republic. (BBC)
  - A 12-km stretch of the Rhine near Cologne, Germany is closed to shipping following
    the loss of 31 containers from a container ship with 200 ships backed up. (Washington
    Post)
  - United States district court judge Thomas Hogan dismisses a case of alleged torture
    against former United States Secretary of Defense Donald Rumsfeld brought by nine
    former prisoners in Iraq and Afghanistan. (USA Today)
  - Taiwan unveils an upgraded version of their Ching-kuo fighter aircraft called
    the Hsung Ying made by the Aerospace Industrial Development Corporation. (AFP
    via News Limited)
  - The Prime Minister of Israel Ehud Olmert and the President of the Palestinian
    National Authority Mahmoud Abbas agree to limited biweekly peace talks. (New York
    Times)
  - The Blair Government introduces legislation into the Parliament of the United
    Kingdom to facilitate a power-sharing agreement in Northern Ireland between Ian
    Paisley's Democratic Unionist Party and Sinn Féin. (BBC)
  Iraq War:
  - Suicide car bombings kill at least 55 people and injure 120 in Tal Afar. (ABC
    News Australia)
  - The United States Senate votes 50-48 to set a deadline for withdrawal from the
    war in Iraq as part of a measure providing continuing funding. (CBC)(AFP via New
    Straits Times)
