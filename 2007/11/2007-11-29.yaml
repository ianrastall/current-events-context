Date: '2007-11-29'
Source_URI: Portal:Current events/2007 November 29
Intelligence_Payload:
  Uncategorized:
  - The Supreme Court of Mexico rules 6–4 that Governor of Puebla Mario Marín has
    no case to answer in the inter-state abduction, jailing, and harassment of journalist
    Lydia Cacho. (NY Times)
  - A 7.4 Mw earthquake rocks the Windward Islands in the Caribbean near the island
    of Martinique. (USGS) (AP via Yahoo! News)
  - Gillian Gibbons is found guilty of inciting religious hatred and sentenced to
    15 days in prison and deportation from Sudan, after she let pupils name a teddy
    bear "Muhammad". (AP via Yahoo! News)
  - Al Jazeera television releases an audio tape featuring a message believed to have
    been recorded by al Qaeda leader Osama bin Laden. (ITN)
  - Ukrainian political parties backed by Yulia Tymoshenko and Viktor Yushenko put
    together a parliamentary majority coalition in Parliament. (Interfax)
  - The Savyolovsky Court in Moscow finds the Russian businessman in exile Boris Berezovsky
    guilty of embezzling nearly 215 million rubles from Aeroflot. (Interfax)
  2007 Pakistani state of emergency:
  - Pervez Musharraf is sworn in as the President of Pakistan for a second term, this
    time as a civilian. (ABC News Australia)
  - President George W. Bush welcomes Pakistan President Pervez Musharraf, urges him
    to lift emergency rule.
  - Musharraf announces the 2007 Pakistani state of emergency will be lifted on 2007-12-16.
    (BBC)
  - Restrictions on Pakistani TV channels are challenged in the Supreme Court of Pakistan.
  Manila Peninsula Rebellion:
  - The Armed Forces of the Philippines storm the The Peninsula Manila where the Magdalo
    Soldiers are holed up. (Bloomberg)
  - Detained Philippine Senator Antonio Trillanes IV walks out of his trial and goes
    to The Peninsula Manila calling for President Gloria Macapagal-Arroyo to step
    down. (Inquirer.net)
