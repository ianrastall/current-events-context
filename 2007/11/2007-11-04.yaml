Date: '2007-11-04'
Source_URI: Portal:Current events/2007 November 4
Intelligence_Payload:
  Uncategorized:
  - At least six people are killed as a Learjet 35 crashes into a residential district
    in São Paulo, Brazil. (Reuters via News Limited)
  - The Wall Street Journal reports that Charles Prince has resigned as the head of
    Citigroup to be replaced by former United States Secretary of the Treasury Robert
    Rubin. (BBC)
  - Guatemalan general elections are held to elect a new president. (BBC)
  - Antonio Cromartie of the San Diego Chargers breaks the record for the longest
    play in NFL history with a 109 yard missed field goal return.
  - Rookie running back Adrian Peterson of the Minnesota Vikings sets the NFL single
    game rushing record with 296 yards in a 35-17 victory over the San Diego Chargers.
  2007 Pakistani state of emergency:
  - Former cricketer and chairman of Pakistan Tehreek-e-Insaf, Imran Khan escapes
    from house arrest.
  - Lawyers prepare for a countrywide strike tomorrow.
