Date: '2007-11-09'
Source_URI: Portal:Current events/2007 November 9
Intelligence_Payload:
  Uncategorized:
  - Student protests against the 2007 Venezuelan constitutional referendum continue.
    Five people are wounded in Mérida in a clash between rival student groups. (NYT)
  - China suspends the export of toys covered in a toxic chemical 1,4-Butanediol that
    have been recalled in both the United States and China. (AP via IHT)
  - The Governor of California Arnold Schwarzenegger declares a state of emergency
    to clean up an oil spill in San Francisco Bay caused by a container ship hitting
    the San Francisco Bay Bridge on Wednesday. (BBC)
  - At least 40 people die in Mogadishu in heavy fighting between Ethiopian forces
    and Somalian Islamist insurgents. (Reuters via News Limited)
  - Ugandan Lord's Resistance Army chief Joseph Kony tells peace negotiator Norbert
    Mao that Vincent Otti, his former deputy, is not dead as rumored, but is under
    house arrest for espionage. (BBC)
  - 'Iraqi insurgency: The United States Army releases five Iranian suspects who had
    been arrested in Iraq. (BBC)'
  - '2007 North Sea flood: The Environment Agency of England and Wales issues eight
    severe flood warnings for eastern England with residents ordered to evacuate from
    7,500 homes in Great Yarmouth. (CNN)'
  - Protests break out in Srinagar, Jammu and Kashmir, India, over the caricatures
    of Grand Ayatollah Ali Khamenei in a local newspaper. (Kashmir Observer)
  2007 Pakistani state of emergency:
  - Benazir Bhutto is placed under house arrest hours before a proposed mass rally
    against the 2007 Pakistani state of emergency. Over 5000 supporters of Pakistan
    People's Party have been arrested to avert rally. (AFP via Channel News Asia)
    (BBC)
  - Benazir Bhutto is released from house arrest bringing to an end a day long stand-off
    between the former prime minister and security forces. (CNN)
