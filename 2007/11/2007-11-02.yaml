Date: '2007-11-02'
Source_URI: Portal:Current events/2007 November 2
Intelligence_Payload:
  Uncategorized:
  - The United Nations will send home 108 of the 950 Sri Lankan peacekeepers in Haiti,
    accusing them of sexual abuse, including with underage girls. (BBC)
  - '2007 Georgian demonstrations: Tens of thousands of Georgians protest outside
    parliament in Tbilisi, urging President Mikhail Saakashvili to step down. (BBC)'
  - S. P. Thamilselvan, the political chief of the Sri Lankan rebel group Tamil Tigers,
    is killed in an attack by the Sri Lanka Air Force near Kilinochchi. (Bloomberg)
  - Stocks across Asia drop sharply after a rough Thursday in Europe and the United
    States, with the Hang Seng Index in Hong Kong losing over 1,000 points, or 3.25%,
    the biggest loss of any Asian market. London's FTSE 100 Index loses ground for
    a second day after the news in Asia. (The Times)
  - ICANN celebrates Vint Cerf years, names Peter Dengate Thrush chairman, forms working
    group on internationalized domain names. (NZ Herald) (AP) (CBC.ca)
