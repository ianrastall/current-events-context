Date: '2007-11-17'
Source_URI: Portal:Current events/2007 November 17
Intelligence_Payload:
  Uncategorized:
  - 'War in Afghanistan: Two NATO Canadian soldiers and an interpreter are killed
    by a roadside bomb in Panjawi, Kandahar province. Three more soldiers are wounded.
    (BBC)'
  - '2007 Burmese anti-government protests: The State Peace and Development Council
    admits 15 people have died during the protests, while United Nations envoy Paulo
    Sergio Pinheiro meets with ministers and political prisoners, including Win Tin.
    (BBC)'
  - Unicef announces Mai-Mai forces have released 232 children they had abducted in
    North Kivu, Democratic Republic of the Congo. (BBC)
  - 'Cyclone Sidr: The death toll from the cyclone rises to 2,000 after it hits central
    and southern Bangladesh. (BBC)'
  - Algeria's People's National Army kills Abdelhamid Sadaoui, the alleged treasurer
    of al-Qaeda in North Africa, in Tizi Ouzou, Kabylie, Algeria. (BBC)
  - Kosovan voters go to the polls for a parliamentary election, with Hashim Thaci
    expected to win. (BBC)
  - '2007 Antofagasta earthquake: Chile is hit by a magnitude 6.0 aftershock 41 miles
    northwest of Antofagasta. (Reuters)'
  - Russian prosecutors confirm the detention of Deputy Finance Minister Sergei Storchak
    and two businessmen on suspicion of "attempting large-scale embezzlement from
    the Russian state budget through fraud". (Interfax)
  2007 Pakistani state of emergency:
  - Former Prime Minister of Pakistan Benazir Bhutto returns to Karachi after release
    from house arrest in Lahore.
  - TV networks Geo TV and ARY Digital are shut down by the Pakistan government. (All
    Things Pakistan)
  - United States Deputy Secretary of State John Negroponte meets President Pervez
    Musharraf and vice army chief Ashfaq Parvez Kayani. He calls for an end to the
    state of emergency, but Musharraf defends it. (BBC) (BBC)
