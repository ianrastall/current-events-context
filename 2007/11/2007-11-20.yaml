Date: '2007-11-20'
Source_URI: Portal:Current events/2007 November 20
Intelligence_Payload:
  2007 Pakistani state of emergency:
  - Thousands of people escape Pakistan's Swat district, where the Pakistan Army is
    fighting with pro-Taliban militants. (BBC)
  - More than 100 journalists are arrested for protesting against the state of emergency
    and media restrictions. (BBC)
  - The Government of Pakistan releases 3,400 people who were jailed during the state
    of emergency. (BBC)
  - Pakistan Chief Election Commissioner Justice (retired) Qazi Mohammad Farooq announces
    the next general elections will be held on January 8, 2008.
  November 2007 strikes in France:
  - French President Nicolas Sarkozy vows to continue his economic reforms. (BBC)
  - Students and civil servants join transport workers in the strike. (BBC)
  Israeli-Palestinian conflict:
  - The Prime Minister of Israel Ehud Olmert and the President of the Palestinian
    Authority Mahmoud Abbas are formally invited to the 2007 Mideast peace conference.
    (BBC)
  - Israeli Prime Minister Ehud Olmert holds talks with Egyptian President Hosni Mubarak
    in Sharm el-Sheikh. (BBC)
  Uncategorized:
  - The Cambodia Tribunal holds its first public hearing, evaluating a bail request
    by Khang Khek Ieu. (BBC)
  - The Organization for Security and Co-operation in Europe reverses its decision
    not to monitor the 2007 Russian legislative election. (BBC)
  - Manfo Kwaku Asiedu is sentenced to 33 years in jail for his role in the 21 July
    2005 London bombings. (BBC)
  - Warren Jeffs, the leader of the Fundamentalist Church of Jesus Christ of Latter
    Day Saints, is sentenced to five years to life in jail for complicity in rape.
    (BBC)
  - Jordanian voters go to the polls in the 2007 parliamentary election. (BBC)
  - Association of Southeast Asian Nations members sign their first charter at the
    13th ASEAN Summit in Singapore. (BBC)
  - Bangladesh calls for more international aid for the survivors of cyclone Sidr.
    (BBC)
  - The death toll from the 2007 Zasyadko mine disaster rises to at least 90. (BBC)
  - Manouchehr Mottaki, the Iranian Minister of Foreign Affairs, announces Iran has
    agreed to a new round of talks about Iraq with the United States. (BBC)
  - The United Nations reduces its estimate of how many people are infected with HIV
    in 2007 from nearly 40 million to 33 million. (BBC)
  - The UK's HM Revenue and Customs admits that it has lost two computer discs which
    contained data, including bank details and National Insurance numbers, about every
    family with a child under 16 in the country. (BBC)
