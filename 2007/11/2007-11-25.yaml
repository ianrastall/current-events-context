Date: '2007-11-25'
Source_URI: Portal:Current events/2007 November 25
Intelligence_Payload:
  Uncategorized:
  - At least eight football fans die when part of the Fonte Nova stadium in Salvador
    de Bahia, Brazil, collapses. (BBC)
  - Riots break out in the Villiers-le-Bel and Arnouville suburbs of Paris, France,
    after a car accident between a police car and a motorbike kills two teenagers.
    (BBC)
  - Syria accepts a United States invitation to participate in the 2007 Mideast peace
    conference. (BBC)
  - Croatia's opposition Social Democrats take a narrow lead on in a close national
    election, according to exit polls, after a campaign fought over corruption, the
    economy and future European Union membership. (Reuters)
  - A wildfire in Malibu, California, destroys 51 structures, including 49 homes.
    The fire has also burned 4,720 acres (1,910 hectares) and caused the evacuation
    of 10,000 people. It is currently 40% contained, being fueled by Santa Ana winds
    that gusted up to 60 mph (96 km/h) on November 24. (Reuters)
  - The bodies of five Singaporeans are found after their dragon boat capsized two
    days ago at the end of a 1,500-metre Cambodia-ASEAN Traditional Boat Race event
    during the Bon Om Thook races on the Tonlé Sap in Phnom Penh. 17 other members
    of the team survived. (CNA)
  - President of Georgia Mikheil Saakashvili resigns his position to re-run for the
    early presidential election scheduled in January 2008. (Civil Georgia)
  - Police fire tear gas and chemical-laced water cannon to disperse a rally of approximately
    30,000 people organized by HINDRAF in Kuala Lumpur. (Al-Jazeera) (Malaysiakini)
  Russia protests of 2007:
  - Russia prepares for new protests after Garry Kasparov's arrest. (France24 News)
  - Garry Kasparov is jailed for 5 days after a protest rally in Moscow and opposition
    leaders are detained. (Webindia123) (RIA Novosti)
  2007 Pacific typhoon season:
  - Three typhoons are forecast to batter the Philippines in the following days. (ABS-CBN
    News)
  - PAGASA announces another weather disturbance to enter the Philippine Area of Responsibility
    in the next few days and names it "Nonoy" locally, but stresses that "Nonoy" is
    not expected to make landfall, but may affect the eastern part of the country.
    (ABS-CBN News)
  - Seven people die in floods in two provinces of the Philippines. (ABC News Australia)
  2007 Pakistani state of emergency:
  - Former Pakistan Prime Minister Nawaz Sharif arrives at Lahore Airport with his
    family members.
  - At least 1800 supporters of PML-N are detained in Punjab ahead of Nawaz Sharif's
    return from exile.
