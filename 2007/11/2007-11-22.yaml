Date: '2007-11-22'
Source_URI: Portal:Current events/2007 November 22
Intelligence_Payload:
  Uncategorized:
  - Jordanian King Abdullah appoints technocrat Nader al-Dahabi as the new Prime Minister.
    (BBC)
  - Bangladeshi feminist writer Taslima Nasreen leaves Kolkata after riots against
    her in which at least 43 people were hurt. (BBC)
  - Argentinian defense minister Nilda Garré sacks the head of military intelligence,
    Brigadier General Osvaldo Montero, for plotting to replace her. (BBC)
  - Sri Lanka bans the Tamils Rehabilitation Organisation charity, saying it "is funding
    the Liberation Tigers of Tamil Eelam". (BBC)
  - A bomb attack on a bus kills five people and hurts 12 in the Russian republic
    of North Ossetia-Alania. (BBC)
  - England football coach Steve McClaren and his deputy Terry Venables are sacked
    after England lost 3-2 to Croatia at Wembley Stadium. (BBC)
  - Danish Prime Minister Anders Fogh Rasmussen says that Denmark will hold a new
    referendum on relinquishing its opt-outs, including an exemption from the European
    common currency, the euro, during the next four years. (AP via Google News)
  - 2007 Pakistani state of emergency
  - Pakistan is suspended from the Commonwealth of Nations again for its imposition
    of the state of emergency. (BBC)
  - A contempt petition against Pervez Musharraf is filed in the Supreme Court of
    Pakistan.
  - The Supreme Court of Pakistan dismisses the last remaining petition to challenge
    the dereliction of President Pervez Musharraf. (BBC)
  - The head of IAEA, Mohamed ElBaradei, says the agency cannot be sure "about the
    absence of undeclared nuclear material and activities" in Iran. (BBC)
  - A report by the EMCDDA says the number of cocaine users in the European Union
    has increased by one million in one year. (BBC)
  - Two Iraqi soldiers and eight members of the Hawr Rajab Awakening Council are killed
    by al-Qaeda militants in Hawr Rajab. (BBC)
  - Aid agencies say they have reached all areas of Bangladesh struck by cyclone Sidr,
    but more aid is needed for the survivors. (BBC)
  - Farid Babayev, a Russian politician with the Yabloko party, is shot and seriously
    wounded in Makhachkala, Dagestan. (BBC)
  - Nur Hassan Hussein, head of the Somali Red Crescent and former policeman, is named
    the new Prime Minister of Somalia. (BBC)
  - Despite talks between the transport workers, the management and the government,
    the November 2007 strikes in France continue for a ninth day. (BBC)
  - Tens of thousands of Venezuelan students march in Caracas in two different rallies,
    one to oppose Hugo Chávez and the other one to support him. (BBC)
  2008 United States presidential election:
  - New Hampshire sets January 8, 2008 as the date for the presidential primary, maintaining
    the tradition of being the first state to vote. (BBC)
  - Hundreds of thousands of immigrants may not be able to vote because of delays
    at the Citizenship and Immigration Services agency. (BBC)
