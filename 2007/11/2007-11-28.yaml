Date: '2007-11-28'
Source_URI: Portal:Current events/2007 November 28
Intelligence_Payload:
  Uncategorized:
  - An explosion and fire southeast of Clearbrook, Minnesota, kills two workers and
    forced the closure of a pipeline that carries nearly a fifth of U.S. crude oil
    imports from Canada. (MarketWatch)
  - Striking Broadway stagehands and producers reach a deal. (WABC)
  - Arlington High School (LaGrange, New York) announces that a Columbine-style attack
    on the school was thwarted by New York State Police, who arrest three students.
    (Poughkeepsie Journal)
  - Google announces plans to invest tens of millions of dollars on renewable energy
    research, including solar thermal power, wind power and geothermal power. (InfoWorld)
  - Ford Motor Company settles class action lawsuits in California, Connecticut, Illinois
    and Texas over 1991-2001 models of the Ford Explorer. (AP via Google News)
  - The United States Secretary of State Condoleezza Rice announces that retired United
    States Marine Corps General James L. Jones will be a special envoy for Middle
    East security. (Reuters)
  - Harry Redknapp, the manager of Portsmouth F.C., is one of five men arrested as
    part of an ongoing investigation of alleged corruption in British football. (The
    Times)
  - A suicide bomber blows herself up outside Sri Lankan Minister's office, killing
    one and injuring two.
  - The Chinese Type 051B destroyer Shenzhen visits Tokyo in the first visit of a
    Chinese warship to Japan since World War II. (AP via Google News)
  - Authorities in Sudan charge a British school teacher at Unity High School in Khartoum
    with the crime of insulting Islam for letting students name a teddy bear Muhammad.
    (AP via Yahoo! News)
  2007 Pakistani state of emergency:
  - The President of Pakistan Pervez Musharraf stands down as the head of the Pakistan
    Army. (Fox News)
  - General Ashfaq Parvez Kayani succeeds Musharraf as the 14th Chief of Army Staff
    of the Pakistan Army.
