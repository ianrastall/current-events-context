Date: '2007-11-01'
Source_URI: Portal:Current events/2007 November 1
Intelligence_Payload:
  Uncategorized:
  - The Swedish Mint () in Eskilstuna, Sweden, loses the competition to produce Swedish
    national coins to Rahapaja Oy of Finland, ending a more than 1000-year-long tradition
    of minting Swedish coins in Sweden. (Dagens Nyheter)
  - Automaker Chrysler announces plans for cutting an additional 12,000 jobs worldwide
    as part of a major restructuring plan. (AP via CNN)
  - The Dow Jones Industrial Average plunges over 360 points, or 2.6%, in its worst
    daily loss since February 27. Similar percentage losses occurred in Europe earlier
    in the day. (AP via Yahoo! Finance)
  - '2007 Atlantic hurricane season: Tropical Storm Noel strengthens into a Category
    1 hurricane and heads towards Bermuda having killed at least 108 people so far.
    (Reuters)'
  - Benazir Bhutto leaves Karachi for United Arab Emirates amidst speculations that
    President Pervez Musharraf might impose martial law in Pakistan. (Dailyindia.com/ANI)
  - '2007 Tabasco flood: Massive flooding hits the Mexican state of Tabasco, with
    Governor Andrés Granier estimating that 80% of its 25,000 km² surface area is
    underwater. (BBC) (El Universal)'
  - The London Metropolitan Police is found guilty of violations of Health and Safety
    law over the shooting of Jean Charles de Menezes on the London Underground in
    July 2005, and is fined £175,000 and ordered to pay £385,000 in legal costs. (Sky
    News) (BBC)
  - Flash floods in central Vietnam kill at least 13 people and injure 31 with 14,000
    homes submerged in Quảng Trị, Quảng Bình and Quảng Nam provinces. (Reuters)
  - A suicide bomber attacks a bus carrying Pakistan Air Force personnel in Punjab
    resulting in at least five deaths and 40 people being injured. (AP via NYT)
