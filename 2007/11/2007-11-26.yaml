Date: '2007-11-26'
Source_URI: Portal:Current events/2007 November 26
Intelligence_Payload:
  Uncategorized:
  - At least 60 miners are trapped underground following an explosion in a gold mine
    in Ponce Enriquez in southern Ecuador. (AP via CTV)
  - The Romanian nationalist Greater Romania Party is voted out of the European Parliament
    in the European Parliament election, 2007. (BBC)
  - 'Chadian Civil War (2005–2010): Chad''s army claims to have killed hundreds of
    rebel fighters in heavy fighting near Sudan''s Darfur region. (Reuters)'
  - 35 militants are killed in a ground offensive against pro-Taliban militants by
    the Pakistan Army.
  - The Federation Council of Russia sets March 2, 2008 as the date of the Russian
    presidential election, 2008. (BBC)
  - At least three people die and 45 are injured in Indonesia following earthquakes
    off the coast of Sumatra and Sumbawa. (VOA)
  - Former Prime Minister of Pakistan Nawaz Sharif announces he will file nomination
    papers in the Pakistani general election, 2008. However, he will not serve as
    Prime Minister under the current President of Pakistan Pervez Musharraf. (BBC)
    (Canadian Press via Google News)
  - At least three people die in clashes over a new draft constitution in Sucre, Bolivia.
    (BBC)
  - The People's Republic of China signs a deal to buy 160 Airbus aircraft in a deal
    worth $US17 billion during a visit by the President of France Nicolas Sarkozy.
    (AFX via Forbes)
  - Newsweek Magazine will come out with a new edition, about the top ranked schools
    in the United States. (US News and World Report)
