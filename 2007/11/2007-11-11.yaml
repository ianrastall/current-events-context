Date: '2007-11-11'
Source_URI: Portal:Current events/2007 November 11
Intelligence_Payload:
  Uncategorized:
  - Prince William, an officer in the Blues and Royals, laid a wreath for the first
    time by the Cenotaph as his grandmother The Queen and his father The Prince of
    Wales, looked on. (AP)
  - A majority of French citizens would support a union with the French-speaking Belgian
    region of Wallonia if Belgium were to cease to exist, according to a survey. (Journal
    du Dimanche)
  - A similar survey held in the Netherlands shows that 45% of the Dutch would support
    a union with Flanders, whereas 49% would oppose such a union. (Trouw)
  - Danilo Türk wins the 2007 Slovenian presidential elections with a large margin.
    (Reuters via Yahoo! News)
  - Former Khmer Rouge Foreign Minister, Ieng Sary and his wife, Ieng Thirith are
    arrested in Phnom Penh to face charges before that country's U.N. genocide tribunal.
    (AP via FOX News)
  - The Ulster Defence Association announces that its Ulster Freedom Fighters' units
    are to stand down from midnight. (RTÉ)
  - Gabriele Sandri, a 26-year-old supporter of the sports club S.S. Lazio is killed
    by police in a service station near Arezzo, Italy. Football fans later clash with
    police in most Italian stadiums. (BBC)
  - Transport for London takes over the North London Line and the other suburban rail
    lines hitherto operated by Silverlink to form the London Overground. While remaining
    part of the National Rail network, the contracting authority for the franchise
    is Transport for London, rather than central Government.
