Date: '2007-11-13'
Source_URI: Portal:Current events/2007 November 13
Intelligence_Payload:
  Uncategorized:
  - The fossil of a new prehistoric great ape species, named Nakalipithecus nakayamai,
    is discovered in Kenya. (BBC)
  - Turkish helicopters bomb several Kurdistan Workers Party positions in northern
    Iraq. (BBC)
  - 21 Cameroonian soldiers are killed by unknown attackers in the Bakassi peninsula.
    (BBC)
  - Russian President Vladimir Putin said that an overwhelming victory for United
    Russia in the legislative elections would give him the "moral right" to maintain
    a strong influence in the country. (The Moscow Times)
  - In France, rail workers and Paris Métro personnel go on strike in the first wave
    of public-sector strikes. (Reuters)
  - An explosion hits the south wing of the House of Representatives of the Philippines
    in Quezon City, killing three people, including Congressman Wahab Akbar, and wounding
    10. (BBC)
  - Clean-up operations continue in the Strait of Kerch after the oil spill disaster.
    Ten ships have sunk, 2,000 tons of fuel oil and 6,000 tons of sulphur have been
    spilled, three sailors have died and about 20 are missing. (BBC)
  - Hamas security forces arrest 400 Fatah supporters after a rally to commemorate
    Yasser Arafat's death ended in gunfire. (BBC)
  - The President of Israel, Shimon Peres, meets the President of Turkey, Abdullah
    Gül, in Ankara, and he will also address the Grand National Assembly of Turkey.
    (BBC)
  - Danish voters go to the polls for an early parliamentary election called by Prime
    Minister Anders Fogh Rasmussen. (BBC)
  - '2007 Pakistani state of emergency: Backed by hundreds of police officers, the
    Pakistani government again placed former Prime Minister Benazir Bhutto under house
    arrest to prevent a protest against President Pervez Musharraf. (NYT) (BBC)'
