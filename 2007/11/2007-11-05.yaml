Date: '2007-11-05'
Source_URI: Portal:Current events/2007 November 5
Intelligence_Payload:
  Uncategorized:
  - The Hang Seng Index in Hong Kong drops over 1,500 points, or 5%, three days after
    a previous sizable decline. The Hang Seng registers its largest daily loss since
    September 2001. (Bloomberg)
  - Italian police arrest Sicilian mafia boss Salvatore Lo Piccolo, his son Sandro
    and two other mafiosi in Carini, Palermo. (BBC)
  - A fire at a retirement home in a village near Tula, Russia, kills at least 23
    people. (BBC)
  - The Writers Guild of America asks 12,000 of its members to join a Hollywood screenwriters
    strike over a dispute over residuals. (BBC)
  - Álvaro Colom is elected President of Guatemala in the 2007 general election. (Reuters)
  - Google and the Open Handset Alliance announce the Android operating system, a
    joint effort in handheld computing. (Ars Technica) (CNN)
  - The number of people in southern Mexico displaced by the 2007 Tabasco flood nears
    a million (VOA), with 300,000 more still trapped in their homes, waiting to be
    rescued. (BBC)
  - Kimi Raikkonen wins the Formula One World Championship.
  2007 Pakistani state of emergency:
  - The Netherlands suspends aid to Pakistan following the imposition of emergency
    rule.
  - Several demonstrating lawyers protesting outside the Sindh High Court are arrested.
  - President of the United States George W. Bush calls on the President of Pakistan
    Pervez Musharraf to end the state of emergency and restore civilian rule. (BBC)
