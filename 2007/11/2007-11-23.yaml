Date: '2007-11-23'
Source_URI: Portal:Current events/2007 November 23
Intelligence_Payload:
  Uncategorized:
  - Polish parliament speaker Bronisław Komorowski said that Poland's new government
    is set to be the first to ratify the EU's Reform Treaty. (EUobserver)
  - The term of Lebanese President Émile Lahoud ends with no successor and a political
    dispute over who is in power. (BBC)
  - A court in Copenhagen, Denmark, convicts three men for plotting terrorist attacks
    using triacetone triperoxide. (BBC)
  - An Israeli psychiatrist and reserve officer is charged with giving classified
    information to Iran, Russia and Hamas. (BBC)
  - The Senate of Nigeria declares the handover of the Bakassi peninsula to Cameroon
    was "illegal". (BBC)
  - A bomb explosion kills at least 13 people and hurts 50 in the Ghazil pet market
    of Baghdad, Iraq. (BBC)
  - The European Centre for Disease Prevention and Control finds that the rate of
    new cases of AIDS in Europe has doubled since 1999. (BBC)
  - Louise Christian, the lawyer for Alexander Litvinenko's wife, reveals that the
    polonium-210 that killed him probably came from a Russian nuclear plant. (BBC)
  - Many employees of Paris Métro cross picket lines and return to work, defying the
    ongoing public-sector strikes. Transit officials report near-normal operation.
    (BBC)
  - Typhoon Mitag remains stationary but threatens the Bicol Region, east of the Philippines,
    and is expected to make landfall in Virac, Catanduanes tomorrow. (GMANews.TV)
  - The icebreaker/cruise ship sinks in the Southern Ocean after striking an iceberg.
    Everyone aboard is rescued.
  2007 Pakistani state of emergency:
  - The Supreme Court of Pakistan orders the Election Commission to declare Pervez
    Musharraf the winner in the 2007 Pakistani presidential election. (BBC)
  - The Foreign Minister of Pakistan, Inam-ul-Haq, says the country's suspension from
    the Commonwealth of Nations is "unjustified". (BBC)
