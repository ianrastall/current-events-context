Date: '2007-11-21'
Source_URI: Portal:Current events/2007 November 21
Intelligence_Payload:
  2007 Pakistani state of emergency:
  - Opposition politician and Pakistan Tehreek-e-Insaf leader Imran Khan is released
    from prison in Punjab. (BBC)
  - Chief Justice Iftikhar Muhammad Chaudhry tries to leave his house in Islamabad
    but is blocked by security forces. (BBC)
  - Major General Waheed Arshad announces the Pakistan Army has killed 40 pro-Taliban
    militants in the Shangla District in the last two days. (BBC)
  - Pakistani security forces kill senior Balochistan Liberation Army leader Balach
    Marri. (BBC)
  November 2007 strikes in France:
  - Transport unions start talks with management and the government over pension reforms
    in the eighth consecutive day of strike. (BBC)
  - Public railway company SNCF says its TGV train network has been disrupted by a
    "concerted campaign of sabotage". (BBC)
  - President Nicolas Sarkozy asks the police to make sure those who sabotaged the
    TGV network are "punished with the most extreme severity". (BBC)
  Uncategorized:
  - United States Secretary of State Condoleezza Rice says the White House wants to
    broker a permanent deal between Israel and the Palestinian Authority before President
    George W. Bush leaves office. (BBC)
  - Portuguese Minister of Foreign Affairs Luís Amado says Zimbabwean President Robert
    Mugabe is not welcome at the December European Union-African Union summit in Lisbon.
    United Kingdom Prime Minister Gordon Brown says he will not attend if Mugabe is
    present. (BBC)
  - England fail to qualify for Euro 2008 after 3-2 loss to Croatia. (CNN)
  - Former White House Press Secretary Scott McClellan claims that United States President
    George W. Bush was involved in the Plame affair. (BBC)
  - Former President of France Jacques Chirac is probed by a judge for alleged embezzlement
    of public funds when he was Mayor of Paris. (BBC)
  - Researchers in Kyoto, San Francisco, and Wisconsin publish evidence of turning
    human skin cells into stem cells by the retroviral insertion of genes. (NYT)
  - The death toll from flooding caused by cyclone Guba in the Oro Province of Papua
    New Guinea rises to 150. (BBC)
  - The Islamic Action Front loses most of its seats in the 2007 Jordanian parliamentary
    election. (BBC)
  - The Bangladesh Army says it has reached almost all areas affected by cyclone Sidr.
    (BBC)
  - The Nigerian Army is deployed in Kano State after six people died in clashes during
    local elections. (BBC)
  - After a standoff lasting two hours, one of the German Spezialeinsatzkommando hostage
    rescue units successfully resolves a situation with a man held at knife-point
    outside a cafe at Berlin's Hauptbahnhof main train station. No one was hurt or
    injured.
  - The United Nations General Assembly approves Resolution 62/9, stating that the
    "emergency phase" in Chernobyl is over, and the "recovery phase" should start.
    (BBC)
  - About 1,000 people a day are returning to Iraq from Syria and Jordan. (BBC)
  - A South African Police Oryx helicopter crashes near Wepener, killing 14 officers.
    (BBC)
  - The Indian Army is deployed in Kolkata after a riot against Bangladeshi feminist
    writer Taslima Nasreen erupts into violence. (BBC)
