Date: '2007-11-06'
Source_URI: Portal:Current events/2007 November 6
Intelligence_Payload:
  Uncategorized:
  - Queen Elizabeth II formally opens High Speed 1 and London's St Pancras station,
    the new home for Eurostar trains linking London with Paris and Brussels as of
    November 14, replacing the Eurostar terminus at Waterloo station. (BBC)
  - At least 35 people are killed and dozens more wounded in a suicide bombing in
    northern Afghanistan, officials say. (BBC)
  - '2007 Belgian government formation: Belgium sets a new national record for the
    longest period without a new government – 149 days have passed since the general
    election – as parties are still trying to bridge their opposing views on state
    reforms. (Daily Telegraph)'
  - '2007 Pakistani state of emergency: Over 100 anti-emergency activists are arrested
    as part of a crackdown process in Pakistan.'
  - King Abdullah of Saudi Arabia visits the Vatican in what is the first audience
    by the head of the Roman Catholic Church with a Saudi monarch. (BBC)
  - Scores of students are injured and arrested ahead of protests in Venezuela. The
    demonstrations, scheduled for Wednesday, are to demand a delay to a referendum
    aimed at expanding the powers of Hugo Chávez. (ABC News Australia)
  - Efficient wins the 2007 Melbourne Cup. (ABC News Australia)
  - The incumbent People's National Movement party retains power in the Trinidad and
    Tobago elections. (BBC)
  - John "Jordan" Lewis is arrested by the Miami-Dade Police Department for the killing
    of Police Officer Charles Cassidy at a Dunkin' Donuts shop in the East Oak Lane
    section of Philadelphia on October 31, 2007.
