Date: '2007-11-19'
Source_URI: Portal:Current events/2007 November 19
Intelligence_Payload:
  2007 Burmese anti-government protests:
  - Philippine President Gloria Arroyo says her country will not ratify the new Association
    of Southeast Asian Nations Charter unless the State Peace and Development Council
    frees opposition leader Aung San Suu Kyi. (BBC)
  - The European Union imposes tougher sanctions on Burma, including an embargo on
    gemstones, metal and timber, and a tighter visa ban against members of the State
    Peace and Development Council. (BBC)
  2007 Pakistani state of emergency:
  - Pakistani Attorney General Malik Qayyum announces the Supreme Court of Pakistan
    has dismissed five of the six petitions against President Pervez Musharraf's re-election.
    (BBC)
  - At least 80 people die and 100 are wounded in sectarian violence in Kurram Agency.
    (BBC)
  - Pakistani President Pervez Musharraf rejects United States Deputy Secretary of
    State John Negroponte's demand to lift the state of emergency.
  Uncategorized:
  - '2007 Zasyadko mine disaster: Rescuers continue the search for 20 trapped miners,
    but a union official says there is "no chance" for them. (BBC)'
  - 'November 2007 strikes in France: The transport workers'' strike enters its sixth
    day, but unions have agreed to restart negotiations with SNCF on November 22.
    (BBC)'
  - Khieu Samphan, the former Khmer Rouge head of state, is charged with war crimes
    and crimes against humanity by a Cambodian tribunal. (BBC)
  - A suicide bomber kills seven people in the Nimruz Province of Afghanistan, including
    the son of governor Ghulam Dastageer. (BBC)
  - Israel releases 450 Palestinian prisoners ahead of the 2007 Mideast peace conference
    with the Palestinian Authority. (BBC)
  - About 70 people die and 50 are missing after a flooding caused by cyclone Guba
    in the Oro Province of Papua New Guinea. (BBC)
  - Six people are killed in clashes between government supporters and opposition
    party members during local elections in the Nigerian state of Kano. (BBC)
  - The new government of Karnataka, India, led by Bharatiya Janata Party member B.
    S. Yeddyurappa, falls after just one week when Janata Dal withdraws support. (BBC)
  - Amazon.com began selling the Kindle, a wireless electronic reading device that
    played a key role in popularizing e-books. https://www.britannica.com/on-this-day/November-19
