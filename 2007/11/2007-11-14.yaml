Date: '2007-11-14'
Source_URI: Portal:Current events/2007 November 14
Intelligence_Payload:
  Strikes in France:
  - French transport and energy workers' strike against President Nicolas Sarkozy's
    pension reform broadens, disrupting especially rail services. (BBC)
  - President Nicolas Sarkozy calls for negotiations and a speedy end to the strikes,
    but the unions refuse. (BBC)
  Uncategorized:
  - 'The 2007 National Book Awards go to Denis Johnson (Tree of Smoke), fiction, Tim
    Weiner (Legacy of Ashes: The History of the CIA), non-fiction, Sherman Alexie
    (The Absolutely True Diary of a Part-Time Indian), young people''s literature,
    and Robert Hass (Time and Materials), poetry. (Reuters)'
  - German train drivers start a 62-hour train strike against Deutsche Bahn, asking
    for a 31% pay increase. (BBC)
  - The European Parliament far right bloc, Identity, Tradition, Sovereignty, collapses
    after five Romanian MEPs resign following Alessandra Mussolini's claim that Romanians
    are "habitual law-breakers". (BBC)
  - A 7.7-magnitude earthquake hits northern Chile, near the town of Calama. Two deaths
    and over a hundred injuries are reported. (BBC)
  - President of Ghana John Kufuor is involved in a car accident in Accra, but is
    not hurt. (BBC)
  - Hossein Mousavian, a former Iranian nuclear negotiator, is charged with espionage
    by Iran's intelligence ministry. He allegedly gave classified information to the
    British embassy. (BBC)
  - 'Iraqi insurgency: A roadside bomb kills two civilians near Baghdad''s Green Zone.
    (BBC)'
  - Danish prime minister Anders Fogh Rasmussen's liberal-conservative government
    has secured a third term in office following early parliamentary elections to
    the Folketing. (The Times)
  - High Speed 1 (formerly known as the Channel Tunnel Rail Link) opens for commercial
    use in Britain, linking London St. Pancras, which also opened for commercial use,
    to the Channel Tunnel. (BBC)
  2007 Pakistani state of emergency:
  - Pakistani opposition leader Imran Khan is arrested at the University of the Punjab
    in Lahore. (BBC)
  - Pakistani forces kill at least 16 Taliban militants in heavy fighting in the Swat
    valley. (BBC)
