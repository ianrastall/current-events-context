Date: '2007-11-07'
Source_URI: Portal:Current events/2007 November 7
Intelligence_Payload:
  Uncategorized:
  - About 80,000 students march in Caracas, Venezuela, to protest against a constitutional
    referendum that would give more power to President Hugo Chávez. Nine students
    are injured by riot controllers at the Central University of Venezuela. (NYT)
  - In Belgium, government formation discussions have gone on for a record 150 days
    as Flemish and Walloon politicians clash over Brussels-Halle-Vilvoorde. (Economist)
  - Astronomers in the United States have found a fifth planet in orbit around the
    star 55 Cancri 41 light years from Earth. (BBC)
  - Space Shuttle Discovery lands at the Kennedy Space Center, ending STS-120, a 15-day
    mission to the International Space Station. (Spaceflightnow.com)
  - A fire in Gwalior, India, ruins over 400 small stores. Losses are estimated at
    10 million rupees (USD 250,000).
  - Taliban militants capture the Pakistani town of Madyan in Waziristan's Swat region
    and hoist their flags over buildings.
  - Four Albanian militants are killed in a Macedonian police operation. (Wikinews)
  - At least eight people are killed and several injured in a school shooting in Tuusula
    (Tusby), north of Helsinki, Finland. (BBC)
  - The U.S. dollar stumbles to new lows after Cheng Siwei, vice chairman of the Standing
    Committee of the National People's Congress, calls for China to shift more of
    its $1.43 trillion of currency reserves into "stronger currencies", such as the
    euro. (MarketWatch)
  - Brad Wall is elected as Premier of Saskatchewan as his Saskatchewan Party defeats
    the Saskatchewan New Democratic Party by a 37-21 margin in the 26th Saskatchewan
    general election. (CBC)
  2007 Georgian demonstrations:
  - Georgian riot police use tear gas, water and sonic cannons to break up thousands
    of anti-government protesters calling for the resignation of President Mikhail
    Saakashvili in Tbilisi. (RussiaToday) (Wired) (Aljazeera)
  - The President announces a 15-day nationwide state of emergency. (AP via CNN)
