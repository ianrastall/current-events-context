Date: '2007-11-27'
Source_URI: Portal:Current events/2007 November 27
Intelligence_Payload:
  Uncategorized:
  - The Annapolis Conference, a peace conference trying to end the Arab-Israeli conflict,
    is held in Annapolis, Maryland, in the United States. (NYT)
  - Texas oilman Oscar Wyatt Jr. is sentenced to a year and one day in jail for breaching
    the rules of the United Nations oil-for-food program. (San Jose Mercury News)
  - Russian Federation Council Speaker Sergei Mironov said that the fact that the
    election day has been set for March 2 allows president Vladimir Putin, who is
    required to leave office when his second term ends in May 2008, the option of
    resigning early and then running again. (The Moscow Times)
  - Zimbabwe's economic crisis
  - Zimbabwe's Central Statistical Office has not issued estimated inflation figures
    because no products are being sold. Inflation is independently estimated at around
    15,000% to 20,000%. (DPA via Earth Times)
  - Zambian Airways ends direct flights to Harare, Zimbabwe. British Airways ended
    flights last month and Ethiopian Airlines will end flights to Zimbabwe in December,
    leaving only three foreign airlines with planes flying to Zimbabwe in 2008. (allAfrica)
  - Nearly 80 French police officers have been injured during a second night of riots
    by youths in the suburbs of Paris, the police say. (BBC)
  - The mascots for the 2010 Winter Olympics and the 2010 Winter Paralympics are introduced.
    This is the first time that both Olympic and Paralympic mascots are unveiled at
    the same time. (CBC)
