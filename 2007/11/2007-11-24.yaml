Date: '2007-11-24'
Source_URI: Portal:Current events/2007 November 24
Intelligence_Payload:
  Uncategorized:
  - United States and Iraqi forces arrest at least 20 suspected militants in Kirkuk,
    Iraq. (BBC)
  - An explosion at a petrol station kills four people and hurts at least 30 in Shanghai,
    China. (BBC)
  - '2007 UK child benefit data scandal: HM Revenue and Customs confirms that a further
    six data discs have gone missing in transit between its offices in Preston and
    London. (BBC)'
  - Polish Prime Minister Donald Tusk declares that Poland should concentrate on getting
    its economy ready for euro-zone entry as quickly as possible rather than setting
    a concrete target date to adopt the euro. (WSJ via Onet.pl)
  - 12 people are killed when a students' union rally turns violent in Guwahati, India.
  - Wildfires in Malibu, California, cause 100 homes in 3 separate communities to
    be evacuated. of state park land burned south of Malibu Lake. (AFP via Google
    News)
  - Typhoon Mitag remains static over the Philippine Sea but changes course, and is
    expected to make landfall in Aurora-Isabela provinces of the Philippines on Monday
    due to the very slow and unusual movement. (BBC) (GMANews.tv)
  - Russian opposition leader Garry Kasparov is arrested during a The Other Russia
    rally in Moscow. (BBC)
  - Pope Benedict XVI creates 23 new cardinals in a ceremony in St. Peter's Basilica
    in the Vatican City. (BBC)
  - At least six people, most of them children, are killed by a suicide bomber in
    Paghman, Afghanistan. (BBC)
  Australian federal election, 2007:
  - The national election in Australia results in a change of government, with the
    Australian Labor Party securing an electoral swing of more than 5%. Kevin Rudd
    will take office as 26th Prime Minister of Australia and the outgoing Prime Minister
    John Howard is also likely to lose his seat in parliament. (The Australian)
  - John Howard calls the leader of the Australian Labor Party, Kevin Rudd, on the
    phone and concedes defeat.
  2007 Pakistani state of emergency:
  - Former Prime Minister Shaukat Aziz refuses to contest in forthcoming elections
    and denied rumors that he is leaving the country.
  - Two suicide car bombings kill at least 30 people and injure many more in Rawalpindi.
    (BBC)
