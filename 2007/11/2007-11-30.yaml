Date: '2007-11-30'
Source_URI: Portal:Current events/2007 November 30
Intelligence_Payload:
  Uncategorized:
  - Colombian authorities release seized videos of 16 hostages being held by the FARC
    rebel group; these include former senator and presidential candidate Íngrid Betancourt,
    last heard from in 2002, and three U.S. defence contractors abducted in 2003.
    (Independent)
  - The Miami-Dade Police Department arrests four people in relation to the killing
    of Washington Redskins player Sean Taylor. (AP via ABC News)
  - A man takes hostages at U.S. Senator Hillary Clinton's campaign office in Rochester,
    New Hampshire. He has a package strapped to his chest. The siege ends at 6pm with
    his arrest. (Boston Channel) (WMUR-TV) (NYT)
  - 'Amtrak Pere Marquette train #371 en route from Grand Rapids, Michigan, to Chicago,
    Illinois, collides with a parked freight train on the south side of Chicago, seriously
    or critically injuring five Amtrak employees and slightly injuring 100 to 150
    of the 187 passengers on board. (Fox News) (AP via the Daily Herald)'
  - Protesters in Sudan demand execution of Gillian Gibbons for insulting the prophet
    Muhammad after she let students name a teddy bear after him. (BBC)
  - The wreckage of Atlasjet Flight 4203 carrying 56 passengers and crew is found
    in central Turkey with no survivors. (BBC) (Reuters via the Melbourne Age)
  - Wang Qishan resigns as the Mayor of Beijing, being succeeded by acting Mayor Guo
    Jinlong, who left his post in Anhui. (Xinhua)
  - DNA tests confirm that "Baby Grace", the deceased two-year-old found floating
    on Galveston Bay in Texas, is indeed Riley Ann Sawyers. Earlier in the week, her
    mother and stepfather confessed to beating the child to death. (Houston Chronicle)
