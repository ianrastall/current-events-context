Date: '2007-11-10'
Source_URI: Portal:Current events/2007 November 10
Intelligence_Payload:
  Uncategorized:
  - Iranian police arrest about 180 Sufi Muslims who attacked a Shia mosque in Borujerd
    after a cleric said their religion was "illegitimate". (BBC)
  - Peruvian archaeologist Walter Alva uncovers a 4,000-year-old temple in the Ventarron
    site in the Lambayeque Region of Peru. (Reuters)
  - Six American forces serving under NATO's International Security Assistance Force
    are killed in an insurgent ambush while patrolling in eastern Afghanistan. (CNN)
  - '2007 Bersih Rally: Malaysia sees its largest political protest in 10 years. (CNN)'
  - 'Battle of Mogadishu (November 2007): More than 70 people die and over 200 are
    wounded in battles in Somalia''s capital, Mogadishu. (BBC)'
  - '2007 North Sea flood: The German ports of Hamburg and Bremerhaven suffer in the
    floods. (Euronews)'
  - Stagehands belonging to the International Alliance of Theatrical Stage Employees
    go on strike, shutting down most Broadway plays and musicals. (AP via Fox News)
  - Workers at La Scala opera house in Milan go on strike in a dispute over pay and
    contracts. (BBC)
  - Pekka Koskela skates the 1000 metres in a new world record time of 1:07.00. (Helsingin
    Sanomat)
  2007 Pakistani state of emergency:
  - Malik Mohammad Qayyum, the Attorney General of Pakistan predicts that the 2007
    Pakistani state of emergency could be lifted within a month. (BBC)
  - Benazir Bhutto is to lead a long march against the emergency on 13 November.
