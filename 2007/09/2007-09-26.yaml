Date: '2007-09-26'
Source_URI: Portal:Current events/2007 September 26
Intelligence_Payload:
  Uncategorized:
  - More than half a million Chinese-manufactured toys are recalled in the United
    States due to excess levels of lead paint including 269,000 of RC2 Corp's "Thomas
    & Friends" toy trains. (Reuters)
  - The bishops of the United States Episcopal Church agree to "exercise restraint"
    by not consecrating more gay bishops or authorizing rites for the blessing of
    same-sex unions in order to prevent a schism in the Anglican Church worldwide.
    (Christian Science Monitor)
  - United States District Court judge Ann Aiken rules that two sections of the Patriot
    Act are unconstitutional because they allow search warrants to be issued without
    a showing of probable cause. (AP via CNN)
  - The House of Assembly of Zimbabwe passes legislation transferring control of all
    foreign-owned businesses to Zimbabweans. (ABC News Australia)
  - A lack of chlorine for water sanitation in Iraq has led to an outbreak of cholera
    which has now reached Baghdad. (BBC)
  - Superior Courts of California judge Larry Fidler declares the trial of record
    producer Phil Spector as a mistrial due to the inability of the jury to reach
    a verdict. (CNN)
  - The United States Secretary of Defense Robert Gates asks for $190 billion to cover
    the cost of the Iraq War and war in Afghanistan during 2008. (AP via Topix)
  - A photo possibly showing missing Madeleine McCann in Morocco is being examined
    by British experts. (Sky News)
  - The new Prime Minister of Japan Yasuo Fukuda is sworn into office with his Cabinet.
    (AFP)
  - The United Auto Workers announces a tentative agreement with General Motors ending
    a two-day strike. (AP via Fox News)
  - The Cần Thơ Bridge, a bridge over the Bassac River in Cần Thơ, Vietnam, collapses
    during construction, leading to the death of at least 60 workers with about 100
    more missing. (BBC) (Fox News) (Reuters via ABC News Australia)
  - The India national cricket team starts a victory parade in Mumbai after winning
    the inaugural 2007 ICC World Twenty20. (BBC)
  2007 Burmese anti-government protests:
  - Up to five Buddhist monks are killed (Sky News)
  - Burmese police baton-charge a crowd of 700 anti-junta protestors including Buddhist
    monks and students. (AFP and ABC News Australia)
  - Win Nang, a pro-democracy activist, is arrested. (AFP via News Limited)
