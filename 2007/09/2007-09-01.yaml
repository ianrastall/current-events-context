Date: '2007-09-01'
Source_URI: Portal:Current events/2007 September 1
Intelligence_Payload:
  Uncategorized:
  - Dave Zabriskie, an American professional cyclist, defended his National Time Trial
    Championship by winning by 2 seconds in Greenville, SC.
  - The Church of Uganda, the Anglican province of Uganda, appoints a bishop in the
    United States, John Guernsey, deepening a split with the Episcopal Church over
    the ordination of gay priests and bishops. (BBC)
  - 'World Championships in Athletics: American athlete Tyson Gay wins his third medal
    of the championship as part of the 100 metres relay team after earlier winning
    gold medals in the 100 metres and 200 metres. (Reuters)'
  - The Sri Lankan Army captures territory near Mannar from the Liberation Tigers
    of Tamil Eelam (LTTE) after a week of heavy fighting. (AFP via Lanka Business
    Online)
  - Protesters in Southeast Aceh try to stop the swearing in of the regent and deputy
    regent with riot police using tear gas and water cannon to disperse the crowd
    resulting in 26 people being injured. (Reuters Alertnet)
  - 'In a stunning college football upset, Appalachian State defeated #5-ranked Michigan
    at Michigan Stadium by a score of 34-32. This is the first time a team from the
    second-tier NCAA Division I FCS has defeated an AP-ranked Division I FBS opponent.
    Armanti Edwards was the quarterback for the underdog Mountaineers. (Ann Arbor
    News)'
  - Eleven World Wrestling Entertainment performers are suspended for suspected illegal
    steroid abuse.(Newsday)
  - Thousands of former military officers protest in Yemen with Yemeni riot police
    firing bullets and tear gas to disperse them. (AP via CNN)
  - The United Nations launches a food assistance program to assist Iraqi refugees
    in Syria. (AP via International Herald Tribune)
  - Two small planes collide during an air show in Radom, Poland resulting in the
    deaths of both pilots (Marek Dubkiewicz and Sebastian Chrząszcz). (AP via Sydney
    Morning Herald)
  - The National Assembly of Panama selects Pedro Miguel González Pinzón as its President
    despite the fact that he is wanted in the United States for an alleged murder
    of a United States Army sergeant and the attempted murder of another. González
    has been cleared by a Panamanian court of these charges. (AP via the Guardian)
  - Iraq is to free up to 6,000 Sunni insurgents in an attempt at reconciliation by
    the Government. (The Telegraph)
  - French and Spanish police foil an ETA car bomb plot and arrest the man who is
    alleged to be the organisations top bombmaker and his accomplices. (Reuters via
    ABC News Australia)
  - Iran's supreme leader Ayatollah Ali Khamenei appoints Mohammed Ali Jafari to replace
    General Yahya Rahim Safavi as the leader of the Revolutionary Guard. (The Canadian
    Press via Google News)
  - Former Prime Minister of Pakistan Benazir Bhutto promises to return to Pakistan
    very soon. (Daily Telegraph)
  - Idaho Republican Senator Larry Craig resigns from the United States Senate effective
    30 September following a guilty plea to a disorderly conduct charge following
    his arrest in a restroom at the Minneapolis-St. Paul International Airport. (Wikinews)
  - '2007 Ogaden conflict: International aid agency Médecins Sans Frontières has accused
    Ethiopia of denying it access to the country''s eastern Ogaden region.(BBC News)'
  - The Second Tuareg Rebellion spreads rapidly as a Malian army colonel has deserted
    to join a Tuareg rebellion in the northern desert, taking with him nearly 60 fighters.
    (Reuters)
  - New gambling legislation comes into effect in the United Kingdom, relaxing advertising
    restrictions and extending opening hours. (The Telegraph)
  - A bomb in the Indian state of Assam kills one person and injures 12, with police
    suspecting the United Liberation Front of Asom. (AP via IHT)
  - Two people go missing and six people are injured following a boat accident at
    the mouth of the Brisbane River in Australia. (ABC News Australia)
  - Kurds in northern Iraq flee from Iranian shelling aimed at Party for a Free Life
    in Kurdistan (PEJAK) positions. (AP via Google)
  - Japan's Agriculture, Forestry and Fisheries Minister Takehiko Endo refuses to
    resign over allegations that a group that he chaired received state subsidies
    illegally. (AFP via Google News)
  - Envoys from the United States and North Korea meet in Geneva to discuss normalising
    relations. (BBC)
  - A concrete and steel fence is built in Sydney to protect leaders attending the
    Asia-Pacific Economic Cooperation meeting next week. (BBC)
  - There has been a spike in dengue fever cases in 2007 in Malaysia with seventy-five
    people dying in the first eight months. (Times of India)
  - '2007 Greek forest fires: The Prime Minister of Greece Costas Karamanlis says
    that the fires are now under control after killing 64 people and causing £800
    million worth of damage. (Press Association via Google News)'
  - New laws come into effect giving the People's Republic of China more control over
    the selection of the Dalai Lama. (BBC)
  - Finland ceased all of its analog television transmissions in the terrestrial network
    as part of the digital switchover. (Wikinews)
  Hurricanes and tropical storms:
  - '2007 Atlantic hurricane season: Tropical Storm Felix forms over the Windward
    Islands of the Caribbean and becomes Hurricane Felix. Aruba, Bonaire and Curaçao
    have storm warnings in place and Jamaica has a tropical storm watch. (AP via Houston
    Chronicle), (Reuters)'
  - '2007 Pacific hurricane season: Tropical Storm Henriette is expected to become
    a hurricane on Sunday, with heavy rain falling on Acapulco. Six people have died
    as a result of the storm and associated landslides. (AP via Houston Chronicle),
    (AP via the Jerusalem Post)'
