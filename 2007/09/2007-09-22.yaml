Date: '2007-09-22'
Source_URI: Portal:Current events/2007 September 22
Intelligence_Payload:
  Uncategorized:
  - Turkish Foreign Minister Ali Babacan condemns US support of the PKK terrorist
    group, which is behind attacks on Turkish forces.(PressTV) (TurkishWeekly)
  - 35 leaders of Pakistan's All Parties Democratic Movement (APDM) arrested on charges
    of disrupting public order to prevent agitation against Pervez Musharraf in Islamabad,
    Pakistan
  - Several hundred Buddhist monks marched through Burma's second largest city Mandalay
    as activists urged people to join the protests against the ruling military junta.
    (AP via The Washington Post)
  - Former Peruvian President Alberto Fujimori arrives in Lima a day after Chile's
    Supreme Court ruled his extradition back to his home country due to charges of
    human rights abuses and corruption. (BBC)
