Date: '2007-09-24'
Source_URI: Portal:Current events/2007 September 24
Intelligence_Payload:
  Uncategorized:
  - The India national cricket team wins the 2007 ICC World Twenty20 beating arch
    rival Pakistan by 5 runs. (Rediff.com)
  - Menachem Mazuz, the Attorney General of Israel, orders a criminal investigation
    into the purchase of a house by the Prime Minister of Israel Ehud Olmert. (Reuters)
  - The President of Iran Mahmoud Ahmadinejad speaks at Columbia University stating
    that Americans should look into "who was truly involved" in the September 11,
    2001 attacks, defending his right to denial of the Holocaust, and denying the
    existence of gay Iranians. (CNN)
  - The Secretary-General of the United Nations Ban Ki-moon called for a new commitment
    by world leaders on climate change at a special United Nations session to discuss
    climate change. (Bloomberg)
  - Members of the United Automobile Workers Union walk off their jobs at General
    Motors plants across the United States as union and company officials fail to
    reach agreement on a new contract. (NYT)
  - President Luiz Inácio Lula da Silva says that he will defend Brazil's record on
    global climate change when he addresses the United Nations General Assembly this
    week. (Reuters)
  - Brazil's stock market rises to a record 58,393.75 points and the country's currency,
    the real, gains 0.11 percent to 1.867 per U.S. dollar. (Reuters)
  - Former Pakistan Prime Minister, Benazir Bhutto, arrives in Washington beginning
    her last visit to United States before ending her self-exile.
  - Several tornadoes affect parts of Great Britain, causing severe damage. (Sky News)
  - Eyewitnesses say the number of people demonstrating in Rangoon was as high as
    100,000 as the biggest Burmese anti-government protest in twenty years continues.
    (BBC)
