Date: '2007-09-11'
Source_URI: Portal:Current events/2007 September 11
Intelligence_Payload:
  Uncategorized:
  - Bruce Golding is sworn in as Prime Minister of Jamaica following the victory of
    his Jamaica Labour Party in the parliamentary elections. (Jamaica Gleaner News)
  - Chinese and US safety officials sign an agreement banning the export of toys with
    lead paint to the United States. (Canadian Press via Google)
  - Burger King announces that it would limit advertising to children younger than
    12 to foods that meet strict nutritional guidelines. (Reuters)
  - 'Disappearance of Madeleine McCann: Portuguese police refer the case to the public
    prosecutor. (News Limited)'
  - Doctors say injured National Football League player Kevin Everett has moved his
    arms and legs and, contrary to earlier predictions, is likely to recover his ability
    to walk. (AP via WHAM-TV)
  - Ethiopia celebrates the start of a new millennium under a modified Julian calendar.
    (AFP via ABC News Australia)
  - The World Health Organisation confirms that the Ebola virus has resurfaced in
    the Democratic Republic of Congo. (NYT)
  - Belgian police arrest two leaders of the Vlaams Belang party, Frank Vanhecke and
    Filip Dewinter, as well as dozens of party supporters during a banned march in
    Brussels against the "Islamisation of Europe". (BBC)
  - Russia claims to have tested the world's most powerful vacuum bomb, nicknamed
    Father of All Bombs after the MOAB, with yield equivalent to a small nuclear weapon.
    (ABC News Australia) Bomb's military name, place and time of the test are not
    revealed. Lenta.ru (in Russian)
  - Lawyers for former Prime Minister of Pakistan Nawaz Sharif file a petition in
    the Supreme Court of Pakistan against his deportation to Saudi Arabia. (AP via
    Fox News)
  - Roman Catholic archbishop and critic of Robert Mugabe Pius Ncube resigns as a
    result of a sex scandal set up by Zimbabwe's intelligence agency. (Times Online)
  - Suicide bomber kills 18 in Dera Ismail Khan of Pakistan.
  - Sri Lanka's military claims a major victory against Tamil Tiger rebels, saying
    it has sunk three vessels carrying war equipment. (Reuters)
  - Turkish police foil a bomb attack in Ankara. (Reuters)
  - OPEC meets to discuss proposals for a minor increase in oil output proposed by
    Saudi Arabia and other Gulf states. The meeting decided to increase output by
    500,000 barrels a day.(Reuters), (CNN)
  - Police in the Philippines arrest seven militants suspected of plotting to bomb
    tourist and shopping locations in the southern Philippines. (AP via IHT)
  - The European Union decides the United Kingdom can continue to use imperial measurements
    for the foreseeable future. (BBC)
  - At least 66 Israeli troops are wounded when a Qassam rocket from Gaza Strip hits
    an Israeli Defence Forces training base in Southern Israel. (BBC) (Haaretz)
  - The Prime Minister of Canada Stephen Harper rules out sending further troops to
    Afghanistan. (ABC News Australia)
  - September 11, 2001 attacks commemoration
  - The United States commemorates the sixth anniversary of the attacks with ceremonies
    in New York City, Washington, DC and Shanksville, PA. (The Telegraph)
  - Osama bin Laden releases a video for the anniversary. (Reuters)
