Intelligence_Payload:
  Uncategorized:
  - The United Automobile Workers sets a deadline of 11am Monday for General Motors
    to avoid a strike. (New York Times)
  - '2007 Atlantic hurricane season: Subtropical Depression 11 is upgraded to Subtropical
