Date: '2007-09-10'
Source_URI: Portal:Current events/2007 September 10
Intelligence_Payload:
  Uncategorized:
  - The Supreme Court of Indonesia orders TIME magazine to pay US$106 million in damages
    to former President of Indonesia Suharto. The magazine had reported in 1999 that
    the former President and his family had accumulated $73 billion dollars fraudulently
    during his time in office. The case had previously been rejected by two lower
    courts. (BBC)
  - The Ejército Popular Revolucionario plants a series of bombs that tear apart six
    Pemex natural gas pipelines in the Mexican states of Veracruz and Tlaxcala. (Canadian
    Press) (El Universal)
  - Former Republic of the Congo rebel leader Pastor Ntumi returns to Brazzaville
    to take up a post as a junior minister. (BBC)
  - Peter Beattie resigns as the Premier of Queensland effective from Thursday with
    Anna Bligh tipped to replace him. (ABC News Australia)
  - 'Iraq War: General David Petraeus gives evidence to the United States Congress
    about the effectiveness of the Iraq War troop surge of 2007. General Petraeus
    warned against a rapid pullback of troops. (NYT) (NYT)'
  - Diego León Montoya Sánchez, leader of the Norte del Valle cartel and one of the
    FBI Ten Most Wanted Fugitives, is captured by Colombian authorities. (CNN)
  - Local elections are held throughout Norway for municipality and county councils.
  Nawaz Sharif returns to Pakistan:
  - CNN reports that former Prime Minister of Pakistan Nawaz Sharif has arrived in
    Pakistan after seven years in exile. (Bloomberg)
  - Commandos enter the aircraft and surround Sharif who refuses to surrender his
    passport. (CNN)
  - The standoff ends with Sharif leaving the plane after a two hour standoff and
    him being taken into custody. (AFP/Reuters via ABC News Australia) (BBC)
  - Sharif is put on a special plane and deported to Jeddah. He is brought back to
    the airport via helicopter, while heading towards the Mianwali Jail in Punjab
    province.(Channel 4 News)
