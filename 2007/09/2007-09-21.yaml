Date: '2007-09-21'
Source_URI: Portal:Current events/2007 September 21
Intelligence_Payload:
  Uncategorized:
  - The Nelson Mandela Foundation is assuring the public that the former South African
    president is still alive, after comments by U.S. President George Bush that "...Mandela
    is dead." (The Independent)
  - Two students are shot at Delaware State University. (NYT)
  - NASA releases new plans for moon base in 2020. (NYT)
  - Buddhist monks stage a brief demonstration in Myanmar making it the fourth successive
    day of protests. (CNN)
  - Angolan police arrest Jomo Gbomo, the head of the Movement for the Emancipation
    of the Niger Delta, a rebel organization in Nigeria. (The Times)
  - At least 27 people have died in the Karachi area of Pakistan after drinking poisonous
    alcohol. (AP via Fox News)
  - The Dutch Cabinet meets to decide whether to hold a referendum on the European
    Union's Reform Treaty. (BBC)
  - Chilean Supreme Court approves extradition of Peruvian ex-president Alberto Fujimori
    on numerous charges, including the massacres of Barrios Altos and La Cantuta.
    (BBC)
  - Mattel admits that most of the toys recalled in recent safety scares had "design
    flaws" and that Chinese manufacturers were not to blame. (BBC)
  War in Afghanistan:
  - NATO's alliance forces say that its warplanes killed an unspecified number of
    civilians during a battle with Taliban forces. (AFP via ABC News Australia)
  - A suicide bomber attacks a convoy of soldiers killing a French soldier and several
    Afghans. (BBC)
