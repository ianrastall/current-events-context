Date: '2007-09-18'
Source_URI: Portal:Current events/2007 September 18
Intelligence_Payload:
  Uncategorized:
  - A supposed meteorite impact in Peru leads to hundreds of nearby villagers falling
    ill from still unknown causes. (Reuters)
  - 'Nuclear program of Iran: The United States is drafting a United Nations Security
    Council resolution calling for sanctions against Iran prior to discussions amongst
    the five permanent members. (AFP)'
  - The United States Federal Reserve cuts a key short-term interest rate by a half-percentage
    point, resulting in a stock market rally. (CNN Money)
  - Bangladeshi cartoonist Arifur Rahman is detained on suspicion of disrespecting
    Muhammad. The Interim Government confiscates copies of the Prothom Alo newspaper
    issue in which Muhammad is caricatured.
  - China confirms a bird flu outbreak in Guangzhou.
  - More than 1,000 Buddhist monks march peacefully in Myanmar as part of a wave of
    anti-government protests. The marches are dispersed using teargas. (CNN), (Xinhua)
  - The Bank of England injects £4.4 billion of liquidity into the U.K. Financial
    System as a response to the Subprime Mortgage Financial Crisis, after £2 billion
    of deposits are removed from the Northern Rock bank in the three days after it
    applied for emergency funding from the Bank. (BBC)
  - Russia claims to have killed top Dagestani militant Rappani Khalilov along with
    another militant in a day-long battle. (AP via IHT)
  - North Korea denies allegations that it is helping Syria to develop a nuclear weapons
    facility. (BBC)
  - Australia, the second largest wheat exporter in the world, cuts its forecast production
    by 30 per cent due to an ongoing drought. (BBC)
  - '2007 Pacific typhoon season: Hundreds of thousands of people are evacuated from
    Shanghai, China as Typhoon Wipha approaches. (Reuters, AFP via News Limited)'
  - The son of Philippine House Speaker Jose de Venecia Jr., Jose "Joey" de Venecia
    III, disclosed in a Senate inquiry that First Gentleman Mike Arroyo is the "mystery
    man" behind the controversial $ 329-million broadband contract with ZTE Corp.
    in China. (Inquirer)
  - O. J. Simpson is charged with several felonies in Las Vegas, Nevada. (Reuters)
  - In Japan, the event "Nice Boat" occurred on all Japanese TV's replacing the final
    episode of the anime, "School Days".
