Date: '2007-09-06'
Source_URI: Portal:Current events/2007 September 6
Intelligence_Payload:
  Uncategorized:
  - Wikipedia's English site is again blocked in the People's Republic of China, possibly
    due to upcoming Communist Party Congress. (PC World)
  - 'Iraq War: Four US Marines are killed in Anbar and three US Army soldiers are
    killed in Nineveh province. (Reuters)'
  - United States District Court judge Victor Marrero strikes down a key part of the
    Patriot Act authorising national security letters. (AP via the Guardian)
  - Syria accuses Israel of invading its airspace on Wednesday and dropping ammunition.
    The operation, known as Operation Orchard, is later speculated to be a raid on
    a nuclear site being run in collaboration with North Korean technicians, or a
    raid on a Hizbollah convoy, a missile facility or a terrorist camp. (The Independent)
    (Guardian)
  - Democratic Party fundraiser Norman Hsu is arrested in Grand Junction, Colorado
    and charged with unlawful flight to avoid prosecution. (NBC11 San Francisco)
  - 'Hurricane Felix: The death toll from Hurricane Felix in Honduras and Nicaragua
    rises to at least 98, with a high casualty level amongst Miskito Indians who failed
    to evacuate. Thousands of houses have also been destroyed. (CNN) (Sky News)'
  - An Islamist website claims it will soon carry a new video of al Qaeda leader Osama
    bin Laden to mark the sixth anniversary of the September 11, 2001 attacks on U.S.
    cities. (Reuters)
  - 12 people, including 11 New Jersey public officials, are arrested by the FBI on
    corruption charges. Among those arrested are Mayor Samuel Rivera of Passaic and
    Mayor Mims Hackett of Orange. (CNN)
  - A 6.5 magnitude earthquake hits off shore of Taiwan near the capital city Taipei.
    (Reuters) (USGS)
  - Paras, Crown Prince of Nepal, undergoes angioplasty operation after a heart attack.
  - British RAF Tornados intercept eight Russian Tupolev Tu-95 bombers as they approach
    UK airspace. (Sky News)
  - Italian tenor Luciano Pavarotti dies at 71, after suffering from pancreatic cancer
    for more than one year. (BBC)
  - A study published by United States and Czech researchers claims that there is
    a 90% chance that the object that caused the Chicxulub crater in Mexico's Yucatán
    Peninsula and probably led to the extinction of the dinosaurs came from the Baptistina
    family of asteroids. (Melbourne Age)
  - APEC
  - The President of the People's Republic of China Hu Jintao and Prime Minister of
    Australia John Howard agree to six deals including an agreement whereby the PRC
    will purchase A$35 billion worth of liquefied natural gas from Woodside Petroleum.
    (ABC News Australia)
  - China and Australia agree to hold yearly security meetings. (BBC)
  - Eleven members of the cast and crew of the ABC's The Chaser's War on Everything
    are arrested and charged with breaching security regulations including Chas Licciardello
    who was dressed as Osama bin Laden. (Sydney Morning Herald)
  - The President of the United States George W. Bush meets with the President of
    the People's Republic of China Hu Jintao with Bush accepting an invitation to
    attend the 2008 Summer Olympics in Beijing. (AP via IHT)
  - Fiji reintroduces martial law. (NZ Herald)
  - Madeleine L'Engle, author of the well-revered book A Wrinkle in Time, dies in
    Connecticut at age 88.
