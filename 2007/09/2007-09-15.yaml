Date: '2007-09-15'
Source_URI: Portal:Current events/2007 September 15
Intelligence_Payload:
  Uncategorized:
  - '2007 California wildfires: Wildfires force the evacuation of thousands of residents
    of San Bernardino and San Diego Counties in the U.S. state of California. (AP
    via Fox News)'
  - The Washington Post reports that the NATO-led Coalition Force in Afghanistan intercepted
    a shipment of Iranian arms intended for the Taliban. (UPI)
  - A bus crash in the western Mexican state of Nayarit kills at least 18 and injures
    13. Many of the passengers were from a flight from Phoenix, Arizona, United States,
    to Guadalajara, Jalisco, that was forced to divert to Puerto Vallarta. (Canadian
    Press)
  - Over 190 anti-Iraq War protesters are arrested outside the United States Capitol.
    (AP)
  - A helicopter registered in the name of former World Rally Championship champion
    Colin McRae crashes killing four people near McRae's home in Scotland. (AFP via
    News Limited)
  - The new cruise ferry Color Magic was christened in Kiel.The ship is the largest
    cruise ferry in the world.She was christened by the German actress Veronica Ferres.
  - Sierra Leone's ruling People's Party seeks an injunction against the National
    Electoral Commission publishing further results of the 2007 general election with
    results published so far showing Opposition candidate for president Ernest Bai
    Koroma in the lead. [(BBC)
  - '2007 Atlantic hurricane season: Tropical Storm Ingrid weakens to a tropical depression.
    (CNN)'
  - At least 10 people are killed and 15 wounded in a suicide bombing outside a Baghdad
    bakery as residents prepared to break their Ramadan fast. (AFP via ABC News Australia)
  - Floods in Ghana displace 260,000 people with similar problems in Mali and neighbouring
    countries in West Africa. (SAPA-DPA via Independent Online South Africa)
  - The Australian Labor Party holds the seats of Williamstown and Albert Park in
    the Victorian Legislative Assembly as two by-elections are held. (ABC News Australia)
  - Melting sea ice in the Arctic Ocean opens up the Northwest Passage between Europe,
    Asia and North America. (Reuters via News Limited)
  - Negotiations between General Motors and the United Automobile Workers continue
    in Detroit, Michigan past the deadline with a strike to start if negotiations
    fail. (NYT)
  - 'September 2007 Sumatra earthquakes: The death toll rises to 21 with 88 people
    injured. (Reuters)'
  - Nineteen people are killed in Sri Lanka as a result of a roadside bomb and fighting
    between the Sri Lankan Army and the Tamil Tigers. (AP via IHT)
  - Zhao Yan, a Chinese journalist working for the New York Times, is released from
    jail in China after serving a three year sentence for "leaking state secrets".
    (BBC)
  - A meteorite falls near the village of Carancas in Peru.
