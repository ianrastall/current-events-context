Date: '2007-09-29'
Source_URI: Portal:Current events/2007 September 29
Intelligence_Payload:
  Uncategorized:
  - A bomb explodes in Malé, the capital of the Maldives, injuring 12 tourists. (BBC
    News)
  - President of Pakistan Muslim League (N) says former Pakistan President Nawaz Sharif
    will make a comeback to Pakistan after Ramadan.
  - Iran declares the US Army and CIA, "terrorist organisations", countering claims
    by America about their own armed forces. (BreakingNews.ie)
  - Robert Levy, mayor of the U.S. city of Atlantic City, New Jersey, disappears on
    after being found to have embellished his Vietnam War record. (Reuters)
  - The Geelong Football Club wins the 2007 AFL Grand Final at the Melbourne Cricket
    Ground in Melbourne, Australia by a record 119 points, the first win for the club
    since 1963. (BigFooty (part of The Age))
  2007 Burmese anti-government protests:
  - Shortly after his scheduled arrival at Yangon, it was reported that Ibrahim Gambari,
    the UN Secretary-General's special adviser on Burma, had arrived in Naypyidaw
    to talk with the junta leaders. (Mizzina News)
  - There are reports that Htoo trading company, owned by junta loyalist business
    tycoon Tay Za, has shut-down its operations after giving two months salaries to
    its staff. (Mizzima News)
