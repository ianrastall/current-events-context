Date: '2007-09-13'
Source_URI: Portal:Current events/2007 September 13
Intelligence_Payload:
  Uncategorized:
  - Miami police shot dead in an exchange of fire a man suspected of the murder of
    one police officer and the shooting of another three officers hours earlier. (CNN)
  - Google sponsors a US$30 million spaceflight contest to land a robotic lander on
    the moon and beam back a gigabyte of images and videos to earth. (AP via Topix)
  - '2007 Atlantic hurricane season: Tropical Storm Ingrid forms in the Atlantic Ocean
    800 miles from the outer Caribbean islands. (Bradenton Herald)'
  - Ethiopia will deploy 5,000 troops as part of a joint United Nations - African
    Union mission in the Darfur region of Sudan. (Sudan Tribune)
  - After deliberating for 22 years, the United Nations General Assembly adopts the
    non-binding Declaration on the Rights of Indigenous Peoples; 143 countries vote
    in favour, while 11 abstain and Australia, Canada, New Zealand and the United
    States vote against. (BBC)
  - At least fifteen Pakistani Army soldiers die in a bombing at their mess at the
    Tarbela Ghazi base north of Islamabad. (CNN)
  - Pakistan Cabinet unanimously decides to re-elect President Pervez Musharraf in
    uniform from the present assemblies.
  - '2007 Formula One Season: The Fédération Internationale de l''Automobile (FIA)
    fines the McLaren Formula One team $US100 million and removes all its points in
    the Constructors'' Championship. (AFP via News Limited)'
  - Alexis Debat, a consultant for ABC News and writer at The National Interest, alleged
    expert on terrorism, is forced to resign after Rue 89 revealed that he made two
    bogus interviews, one with Barack Obama and another with Alan Greenspan. (Washington
    Post) (Rue 89) (Rue 89)
  - Rita Verdonk, a controversial and popular Dutch politician, is expelled from the
    VVD. (Expatica Netherlands)
  - Shinzo Abe is hospitalised the day after his resignation. (Al Jazeera)
  - September 2007 Sumatra earthquakes
  Iraq War:
  - A key US ally, Sheikh Sittar, is killed by a bomb. (BBC)
  - U.S. President George W. Bush orders gradual troop reductions in Iraq but stands
    firm against dramatic troop reductions. (Reuters via News Limited)
  2007 Atlantic hurricane season:
  - Hurricane Humberto makes landfall on the southeast Texas coast near the Louisiana
    border. (AFP)
  - The Governor of Louisiana Kathleen Blanco declares a state of emergency. (BBC)
  - At least one person is killed in Texas before Humberto weakens into a tropical
    storm. (CBS via Topix)
  - A second major earthquake off the coast of Sumatra prompts tsunami warnings for
    Sri Lanka, India, Indonesia, Christmas Island and the Cocos Islands. (ABC News
    Australia) (Reuters)
  - Rescue teams head for the Sumatra coast to look for survivors. (Reuters)
  - An earthquake of 6.2 magnitude hits the northern tip of Sulawesi some 2,700 kilometres
    east of Sumatra. (AFP via ABC News Australia)
