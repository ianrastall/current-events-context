Date: '2007-09-30'
Source_URI: Portal:Current events/2007 September 30
Intelligence_Payload:
  Uncategorized:
  - General Sonthi Boonyaratglin, who helped depose Prime Minister Thaksin Shinawatra
    in the 2006 Thai coup d'état, resigned as head of the Council for National Security.
    (BBC)
  - Former World Chess Champion Garry Kasparov is selected Presidential Candidate
    for Other Russia in the 2008 presidentials. (AP)
  - The Topps Meat Company recalls of frozen beef patties because of potential contamination
    with E. coli. Twenty-five cases of illness due to E. coli have been reported in
    the Northeastern United States. (NYT)
  - Indian player Viswanathan Anand wins the World Chess Championship 2007 at Mexico
    City to become the new world champion. (NYT)
  - Lewis Hamilton wins the 2007 Japanese Grand Prix to take a 12 point lead in the
    2007 Formula One season World Championship with 2 races remaining. (BBC)
  - With the help of the New York Mets completing one of the most improbable collapses
    in baseball history, leading the National League East division by 7 games with
    17 games to play at one point, the Philadelphia Phillies defeat the Washington
    Nationals to win the 2007 National League East title. (Yahoo! Sports)
  - 'U.S. college football: The new AP Poll results are released, with nine of the
    ten ranked teams that lost this past weekend either dropping further down the
    list or out of the poll completely. LSU rose to #1 for the first time since 1959,
    Kentucky and Boston College rise into the Top Ten for the first time since 1977
    and 1992, respectively, and South Florida ascends into the Top Ten for the first
    time ever. (AP via Yahoo! Sports)'
  - A dormant volcano erupts on Jabal al-Tair, a Yemeni island in the Red Sea. (BBC)
  Ukrainian parliamentary election, 2007:
  - Ukrainians went to the polls for the third time in three years to vote in parliamentary
    election. (AFP)
  - 'According to data of National Exit Poll: Party of Regions 35.2%; Yulia Tymoshenko
    Bloc 31.5%; Our Ukraine–People''s Self-Defense Bloc 13.4%; Communist Party of
    Ukraine 5.1%; Lytvyn''s People''s Bloc 3.7%; Socialist Party of Ukraine 2.5%.
    (ForUm)'
  2007 Burmese anti-government protests:
  - A central member of the military junta in Myanmar is reportedly interested in
    seeking political asylum in Norway. The colonel is said to have defected recently,
    and he is now hiding in the jungle among the Karen people. (The Norway Post)
  - John R. Bolton, the former United States Ambassador to the United Nations, says
    the government of China is the key to political change in Myanmar, not United
    Nations envoy Ibrahim Gambari who has met the military junta. (Forbes)
