Date: '2007-09-27'
Source_URI: Portal:Current events/2007 September 27
Intelligence_Payload:
  Uncategorized:
  - The Corruption Perceptions Index, a survey by Transparency International, is conducted
    into the most and least corrupt countries in the world, ranking 180 countries.
    (Wikinews) (Globe and Mail)
  - Israeli forces pull back from the Northern Gaza Strip after a two day raid that
    was prompted by the firing of Qassam rockets and mortar shells into Israel. The
    raid left 11 Palestinians, including civilians and members of Hamas and the Army
    of Islam, dead and 20 wounded. (NYT)
  - The spacecraft Dawn is launched by NASA on a mission to explore mainbelt asteroids
    Vesta and Ceres. (Spaceflightnow.com)
  - South Africa's National Prosecuting Authority issues an arrest warrant for Interpol
    chief Jackie Selebi. (BBC)
  - '2007 Atlantic hurricane season: Lorenzo strengthens into a hurricane and makes
    landfall on Mexico''s Gulf coast. (AP via Google News)'
  - The Third Circuit Court of Appeal in the U.S. state of Louisiana rules that Mychal
    Bell should not have been tried as an adult in the Jena Six case, and he is released
    on a $45,000 bail bond. (Reuters)
  - Donor countries promise $9.7 billion to The Global Fund to Fight AIDS, Tuberculosis
    and Malaria. (Reuters)
  - Four employees of the International Red Cross, including two foreigners, are abducted
    in Afghanistan's Wardak province. (BBC)
  - President of Pakistan Pervez Musharraf files nomination for the upcoming Pakistan
    Presidential Election to be held on October 6, 2007 election without his army
    rank. (Reuters)
  - A new round of talks aimed at ending North Korea's nuclear program starts in Beijing.
    (BBC)
  2007 Burmese anti-government protests:
  - According to sources close to the military, Senior General Than Shwe is now directly
    commanding soldiers after several commanders refused to use force to crack down
    on protesters. (Mizzima News)
  - There are unconfirmed reports that Than Shwe's family is fleeing to a foreign
    country. A chartered Air Bagan flight carrying eight special passengers landed
    in Vientiane, Laos, at 6pm (local time). (Mizzima News)
  - China, one of Myanmar's few allies, calls for restraint for the first time. (Reuters)
  - Nine people are killed and 11 injured when junta security forces open fire on
    an anti-government demonstration in Yangon. Among the dead is a Japanese journalist.
    (Reuters) (Times of India) (CNN)
  - Burmese security forces raid several Buddhist monasteries arresting hundreds of
    the Buddhist monks who have led the protests. (BBC) (AP and Reuters via Sydney
    Morning Herald)
