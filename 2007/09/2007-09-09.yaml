Date: '2007-09-09'
Source_URI: Portal:Current events/2007 September 9
Intelligence_Payload:
  Uncategorized:
  - The Lancet publishes a placebo controlled double blind study linking food additives
    to hyperactivity. (Science Daily)
  - Kevin Everett of the National Football League's Buffalo Bills suffers a life-threatening
    spinal cord injury in a game against the Denver Broncos. The surgeon who operated
    on him says Monday Everett is unlikely to walk again, assuming he survives. ((CBS
    News))
  - A lorry carrying dynamite crashes and explodes near Sacramento in the Mexican
    state of Coahuila; scores of people are injured and 37 are killed, including three
    local reporters covering the story. (BBC)
  - South African police arrest Helen Zille, the leader of the Democratic Party and
    Mayor of Cape Town, while she was taking part in an anti-drug protest at the Cape
    Flats slum area. (Mail & Guardian)
  - An earthquake of 6.8 magnitude hits near the north coast of Colombia. (Reuters
    Alertnet)
  - Israeli police arrest eight men originally from the former Soviet Union accused
    of forming a neo-Nazi cell. (Scotsman)
  - '2007 U.S. Open: Roger Federer of Switzerland defeats Novak Djokovic in the final
    of the men''s singles in straight sets 7-6 (7-4), 7-6 (7-2), 6-4. (Bloomberg)'
  - Five thousand Algerians protest in Algiers after two recent suicide bomb attacks.
    (Reuters)
  - Voters in Guatemala go to the polls in the Guatemalan general election, 2007.
    (AFP)
  - Jamaican Asafa Powell set a new men's world 100 meters record of 9.74 seconds
    at the IAAF Grand Prix at Rieti, Italy. (CNN)
  - At least 15 dead and many injured when a flyover under construction at Panjagutta
    junction, Hyderabad, Andhra Pradesh, India collapsed. Wikinews
  - The President of Afghanistan Hamid Karzai is forced to cut short a speech in Kabul
    after gunfire is heard outside. (Reuters)
  - A landslide in West Bengal, India kills seven people; over 500 houses buried or
    damaged.
  - Pakistan
  - Pakistan's airports are placed on the highest alert due to concerns over an imminent
    terrorist threat. (BBC)
  - Former Prime Minister of Pakistan Nawaz Sharif boards a Pakistan International
    Airlines flight from London to Islamabad with his return likely to provoke a confrontation
    with the President of Pakistan Pervez Musharraf. (ABC News Australia)
  - Sharif's Pakistan Muslim League (N) claims that 2,000 of its members have been
    arrested prior to his return. (BBC)
  - Tropical Storm Gabrielle makes landfall near the Cape Lookout National Seashore
    in North Carolina, United States, and hooks over Cape Hatteras before returning
    to the Atlantic as a tropical depression, bringing much-needed rain to coastal
    North Carolina as well as some beach erosion. (CNN)
  APEC Australia 2007:
  - The APEC summit draws to a close with most leaders preparing to leave and the
    President of the United States George W. Bush having left. (ABC News Australia)
  - The Prime Minister of Australia John Howard meets with the Prime Minister of Japan
    Shinzo Abe to discuss security and climate change. (Times of India)
