Date: '2007-09-17'
Source_URI: Portal:Current events/2007 September 17
Intelligence_Payload:
  Uncategorized:
  - Andrew Meyer, a 21-year-old fourth-year undergraduate, is apprehended by five
    police officers and tasered while allegedly having interrupted a speech by U.S.
    Senator John Kerry.(The Miami Herald)
  - Bernard Kouchner, the French Foreign Minister, warns of the possibility of war
    over Iran's nuclear program. (BBC)
  - Iraq and the United States have pledged a "fair and transparent" investigation
    into a gunfight involving private security firm Blackwater Security that left
    eight people dead in Baghdad. (BBC)
  - Ernest Bai Koroma is sworn in as the President of Sierra Leone after winning a
    run-off election held 10 days ago. (ABC News Australia)
  - Hillary Clinton, a candidate for the Democratic Party's nomination in the 2008
    United States presidential election, announces a proposal for a universal healthcare
    plan. (Reuters)
  - President George W. Bush nominates Michael Mukasey to replace Alberto Gonzales
    as the next Attorney-General of the United States. (Reuters via ABC News Australia)
  - Microsoft loses its appeal against a European Union antitrust ruling forcing it
    to pay a 497 million euro fine. (Bloomberg)
  - The Supreme Court of Pakistan hears petitions as to whether Pervez Musharraf should
    remain as head of the Pakistani Army while serving as the President of Pakistan.
    (BBC)
  - '2007 Pacific typhoon season: The death toll from Typhoon Nari in South Korea
    rises to nine. (AFP)'
  - A new species of bat, the Mindoro Stripe-Faced Fruit bat, is discovered on Mindoro
    Island in the Philippines. (AFP)
  - Greek conservative Prime Minister Costas Karamanlis early Monday declared victory
    in Sunday's general elections after early results gave his ruling New Democracy
    party a lead of over four percent over the opposition Pasok socialists. (AFP)
  - Incumbent parties lose two of three by-elections in Canadian federal parliamentary
    ridings in Quebec. Thomas Mulcair takes the Liberal stronghold of Outremont, bringing
    the New Democratic Party its second-ever victory in Quebec. Conservative Denis
    Lebel takes the Bloc-held riding of Roberval—Lac-Saint-Jean, while Ève-Mary Thaï
    Thi Lac holds Saint-Hyacinthe—Bagot for the Bloc Québécois. (CBC)
  Flight OG 269 crash:
  - Fifty-five foreigners are among the 88 people who died in the crash of Flight
    OG 269 in Phuket. (ABC News Australia and AFP)
  - The flight data recorder and cockpit voice recorder are found for the flight while
    an official from One-Two-Go Airlines thinks that wind shear may have been responsible.
    (AP via Topix)
