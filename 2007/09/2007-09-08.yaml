Date: '2007-09-08'
Source_URI: Portal:Current events/2007 September 8
Intelligence_Payload:
  Uncategorized:
  - Ang Lee's spy thriller Lust, Caution wins the Golden Lion at the Venice Film Festival.
    (Reuters)
  - The Red Cross recovers the bodies of 11 Colombian legislators who were shot while
    being held hostage by the Revolutionary Armed Forces of Colombia (FARC). (AP via
    Google)
  - Former President of Argentina Carlos Menem is charged with involvement in the
    illegal sale of weapons to Ecuador and Croatia. (BBC News via ABC News Australia)
  - Justine Henin of Belgium wins the U.S. Open women's tennis singles championship
    defeating Svetlana Kuznetsova of Russia 6-1 6-3 in the final. (Associated Press
    via Google)
  - Morocco's conservative Istiqlal Party, a member of the kingdom's ruling coalition,
    wins most seats in parliamentary elections, according to provisional results released
    by the government (Reuters)
  - At least 18 people are injured in a car bomb blast in Peshawar, Pakistan.
  - At least 85 Hindu pilgrims have died after a lorry accident in India. (Wikinews)
    (BBC)
  - Subtropical Storm Gabrielle is upgraded to a tropical storm as it approaches the
    eastern United States coastline. (NOAA)
  - APEC
  Islamic insurgency in Algeria (2002-present):
  - At least 16 people are killed and 30 injured in a car bomb attack on an Algerian
    naval barracks in the town of Dellys, 100km (62km) east of Algiers. (AFP via Google)
  - Al Qaeda's North African wing al-Qaeda Organization in the Islamic Maghreb claims
    responsibility for the bombing and a bombing in Batna less than 48 hours earlier.
    (Reuters)
  Democratic Republic of the Congo:
  - The President of Uganda Yoweri Museveni and the President of the Democratic Republic
    of the Congo Joseph Kabila meet in Tanzania to discuss the future of oil-rich
    Lake Albert. (BBC)
  - General Laurent Nkunda, the leader of a rebel movement, claims that Government
    troops have broken a ceasefire in the east of the country. (BBC via ABC News Australia)
  - Leaders at the Asia-Pacific Economic Cooperation meeting in Sydney considers an
    aspirational climate change target of a 25% reduction in greenhouse gas emissions
    by 2030. (Bloomberg)
  - Thousands of people march through central Sydney with the New South Wales Police
    Force making five arrests with two police officers injured. (ABC News Australia)
