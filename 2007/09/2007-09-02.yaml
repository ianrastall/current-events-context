Date: '2007-09-02'
Source_URI: Portal:Current events/2007 September 2
Intelligence_Payload:
  Uncategorized:
  - The spokeswoman of the Chinese Foreign Ministry announces that China will report
    military expenditures to the United Nations Register of Conventional Arms. (Xinhua)
  - The United States men's national basketball team defeats Argentina 118-81 to win
    the 2007 FIBA Americas Championship, with both teams qualifying for the 2008 Summer
    Olympics. (Bloomberg)
  - Israeli police recommend that former Finance Minister Avraham Hirchson be indicted
    for allegedly stealing millions from a trade union he led in 2003. (Associated
    Press via Google)
  - '2007 Pacific hurricane season: Baja California is placed on a Hurricane Watch
    as Tropical Storm Henriette is expected to strengthen to hurricane strength. (AP
    via Fox News)'
  - Ten Colombian soldiers are killed and five are missing during a shootout with
    FARC guerillas in the mountainous border areas between Quindío and Tolima departments.
    (AFP via Times of India)
  - At least two people are killed and a dozen injured in three simultaneous explosions
    in Kathmandu in Nepal. (CNN)
  - The military-backed interim government of Bangladesh files corruption charges
    against former Prime Minister of Bangladesh Khaleda Zia and her younger son. (Associated
    Press via International Herald Tribune)
  - Sudan postpones a census that is a crucial for the success of two national elections.
    (BBC)
  - 'War in Afghanistan: Scores of Taliban are killed in heavy fighting in the Kandahar
    and Arghandab regions of Afghanistan. (AFP via ABC News Australia)'
  - Egyptian police find 2.75 tonnes of explosives in the el-Gefgafa area of Sinai,
    believed to be en route to the Gaza Strip. (Reuters via ABC News Australia)
  - The Ogaden National Liberation Front declares a unilateral ceasefire so that a
    United Nations team can investigate claims of human rights abuses by the Ethiopian
    government. (AP via IHT)
  - 'Iraq War: The United Kingdom withdraws troops from its base at Basra Palace as
    part of an eventual handover of Basra Province to the Iraqi government. (Reuters)'
  - 'Nuclear program of Iran: The President of Iran Mahmoud Ahmadinejad claims that
    Iran now has 3,000 centrifuges. The International Atomic Energy Agency estimates
    the number at 2,000. (AP via NYT)'
  - Christopher R. Hill, the United States negotiator in talks with North Korea, states
    that they have agreed to declare and disable all of its nuclear facilities by
    the end of the year. (BBC)
  - Peerzada Muhammad Sayeed, the Education Minister of Jammu and Kashmir survives
    an assassination attempt by Islamist militants near Patan. (AFP via News Limited)
  - Hurricane Felix
  - Hurricane Felix becomes a Category 2 hurricane early today as Aruba, Bonaire and
    Curaçao have a hurricane watch in place. (AP via ABC News America)
  - It later strengthens to Category 4 with predictions that it will hit Central America
    or the Yucatán Peninsula of Mexico. (Reuters Alertnet) (Matket Watch)
  - Tropical storm warnings are put in place for Jamaica and the Grand Cayman Islands.
    (Market Watch)
  - The Prime Minister of Australia John Howard announces that Justice Ian Callinan
    will conduct an inquiry into the 2007 Australian equine influenza outbreak. (ABC
    News Australia)
  - Twelve Greenpeace activists are arrested in protests at Newcastle, New South Wales,
    on the eve of the APEC meeting in Sydney. (Reuters via TV New Zealand)
  - Riot police clash with protesters commemorating the Ungdomshuset in the Nørrebro
    district of Copenhagen with 26 people injured. (AP via Google)
  - An earthquake with a magnitude of 6.9 strikes in the Pacific Ocean south of Lata,
    Santa Cruz Islands, in the Solomon Islands, with a tsunami warning being issued.
    (Bloomberg) (CNN)
  - '2007 South Korean hostage crisis in Afghanistan: The 19 freed hostages return
    to South Korea. (Reuters)'
  2007 Lebanon conflict:
  - Fatah al-Islam fighters attempt an escape from the Nahr al-Bared refugee camp
    north of Tripoli, Lebanon, with at least 41 people being killed in fighting and
    many being injured and captured by the Lebanese army. (AFP via Google) (Reuters)
    (CNN)
  - The Prime Minister of Lebanon Fouad Siniora announces that the Government has
    captured the camp. (CNN)
  - The leader of Fatah al-Islam is believed to be among the casualties with the Lebanese
    government conducting DNA tests to confirm his identity. (Reuters via ABC News
    Australia)
