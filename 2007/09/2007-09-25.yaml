Date: '2007-09-25'
Source_URI: Portal:Current events/2007 September 25
Intelligence_Payload:
  Uncategorized:
  - The United Nations Security Council approves the United Nations Mission in the
    Central African Republic and Chad. (ReliefWeb)
  - Mount Ruapehu erupts in New Zealand leading to the evacuation of fifty people.
    (News Limited)
  - Sotheby's announces that it will auction an early version of the Magna Carta.
    (CNN)
  - The Parliament of Lebanon adjourns a session to elect a new President of Lebanon
    until 23 October 2007. (BBC)
  - The highly anticipated Halo 3 was released for the Xbox 360.
  - Hundreds of soldiers and riot police enter Yangon in an attempt to end the demonstrations
    (AFP) (Reuters)
  - Myanmar's junta places dusk-till-dawn curfews on the country's two largest cities,
    Yangon and Mandalay. (AFP)
  - The House of Representatives of Japan elects Yasuo Fukuda as the new Prime Minister
    of Japan. (CNN)
  - The Supreme Court of Indonesia rejects the final appeals of Imam Samudra and Mukhlas,
    two men sentenced to death for their roles in the 2002 Bali bombings. (BBC)
  - 73,000 United Auto Workers union workers go on strike against General Motors,
    the first general strike against the company in 37 years. Talks between the parties
    continued. (CNN)
  - Warren Jeffs, leader of the Fundamentalist Church of Jesus Christ of Latter Day
    Saints, is found guilty of two counts of rape in the U.S. state of Utah. (Fox)
  - In his speech to the United Nations General Assembly, Iranian President Mahmoud
    Ahmadinejad reiterates his assertion that his county's nuclear program has been
    "peaceful and transparent" and criticizes the "illegal" UN sanctions imposed by
    "arrogant" members of the Security Council. (BBC) (CNN)
  2007 Burmese anti-government protests:
  - Approximately 20,000 people led by 2000 Buddhist monks begin another protest in
    Yangon despite threats by the Burmese junta. (AAP via News Limited)
