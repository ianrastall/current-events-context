Date: '2007-09-28'
Source_URI: Portal:Current events/2007 September 28
Intelligence_Payload:
  Uncategorized:
  - Supporters of the opposition gather in Georgia's capital, Tbilisi, to protest
    against the government in the largest such rally in the country since 2003. (BBC)
  - Lehendakari Juan José Ibarretxe announces a referendum on the future of the Basque
    Country for 25 October 2008. (Digital Journal)
  - Richard Garriott, famed game designer and son of former NASA Skylab astronaut
    Owen Garriott, will become the sixth space tourist, visiting the International
    Space Station in 2008. (Space Adventures)
  2007 Burmese anti-government protests:
  - There are reports that Burmese troops from middle Myanmar have started to march
    towards Yangon. The reported troops are from the Central Command based in Taungoo
    and the South East Command. (Mizzima News)
  - South African Nobel Peace Prize laureate Desmond Tutu urges China to intervene
    in the ongoing protests in Myanmar, or he would "join a campaign to boycott the
    Beijing Olympics" next year. (Dagens Nyheter)
  - Public Burmese Internet access is cut, silencing what had become an international
    source of information and images about the events. (CNN) (Fox News)
