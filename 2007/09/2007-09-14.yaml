Date: '2007-09-14'
Source_URI: Portal:Current events/2007 September 14
Intelligence_Payload:
  Uncategorized:
  - Finland scrambles a jet fighter to intercept a Russian aircraft. (Wikinews)
  - Chrysler recalls 300,000 sport utility vehicles to investigate braking problems
    while Honda recalls 180,000 Honda Civics from the 2006–07 season due to problems
    with a wheel-bearing seal. (AP via Topix)
  - There is a run on the Northern Rock bank in the United Kingdom following revelations
    that it sought a rescue injection of funds from the Bank of England. (The Times)
  - A new case of foot-and-mouth disease is confirmed at a farm in Egham, Surrey,
    England. (AFP via ABC News Australia)
  - An official for the United Nations Office for the Coordination of Humanitarian
    Affairs warns that a million people in Africa require assistance after floods
    have killed more than 200 people in recent weeks. (AFP)
  - The Pakistan People's Party unanimously decides that Benazir Bhutto will return
    to Pakistan on October 18, 2007.
  - Pope Benedict XVI's motu proprio Summorum Pontificum takes effect; the traditional
    Latin Mass is thus officially restored in the Roman Catholic Church. (AFP) (Arkansas
    Catholic) (Catholic World News)
  - The Russian State Duma confirms Viktor Zubkov as new Prime Minister of Russia.
    (Interfax)
  - Oscar Temaru is elected as the President of French Polynesia by the Parliament
    for the third time in three years. (AP via IHT)
  - September 2007 Sumatra earthquakes
  - The Japan Aerospace Exploration Agency successfully launches SELENE, the largest
    lunar mission since the Apollo program, on a mission to explore the moon. (BBC)
  - Michael Sulick is named the new Director of the United States' National Clandestine
    Service.
  Iraq War:
  - U.S. General Peter Pace, outgoing chair of the Joint Chiefs of Staff, acknowledges
    that mistakes were made during the war. (CNN)
  - Sunni Arab Iraqis and United States forces vow to keep fighting Al-Qaeda in Anbar
    Province following the assassination of Sheikh Sittar. (Reuters)
  - At least 13 people are confirmed dead and hundreds of homes damaged as a result
    of the earthquakes. (AFP via ABC News Australia)
  - Another earthquake of 6.9 magnitude occurs off the coast of Sumatra. (BBC)
