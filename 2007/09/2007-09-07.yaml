Date: '2007-09-07'
Source_URI: Portal:Current events/2007 September 7
Intelligence_Payload:
  Uncategorized:
  - '2007 Lebanon conflict: The Lebanese Army declares victory after ending a three-month
    conflict with Fatah al-Islam militants in Nahr el-Bared.(Jane''s News)'
  - Subtropical Storm Gabrielle forms southeast of the Carolina coast in the Atlantic
    Ocean. (NOAA)
  - Two owners of a New Orleans nursing home are found not guilty of negligent homicide
    concerning the death of 35 residents after Hurricane Katrina. (NYT)
  - Six detained Professors of the Rajshahi University are suspended for their involvement
    in last month protests for restoring democracy in Bangladesh.
  - At least 80 people have died and scores injured as a truck and trailers carrying
    pilgrims plunges into a gorge near the village of Desuri Ki Naal in Rajasthan,
    India. (Al-Jazeera)
  - The pilot of a civilian World War II stunt plane dies while practicing at Naval
    Air Station Oceana in Virginia Beach, Virginia. (AP via CNN)
  - Robert Mugabe, the President of Zimbabwe, accused Levy Mwanawasa, the President
    of Zambia and Chairman of the Southern African Development Community, of selling
    out his country to the Western world and plotting with foreign intelligence agencies
    during an SADC conference in August. President Mwanawasa later apologized to Mugabe,
    saying Mugabe had misunderstood an earlier comment. (AllAfrica)
  - United States District Court judge Royce Lamberth orders Iran to pay $2.6 billion
    to victims and families in the 1983 Hezbollah bombing of a United States Marine
    Corps barracks in Lebanon that claimed 241 American lives. (CNN)
  - The Roman Catholic Diocese of San Diego agrees to pay $198.1 million to settle
    144 claims of sexual abuse by clergy. (AP via IHT)
  - 'Hurricane Felix (2007): The death toll from Hurricane Felix rises to at least
    130 in Nicaragua and Honduras. (Reuters via ABC News Australia)'
  - The Polish Sejm votes to dissolve itself, causing early parliamentary elections
    in October 2007. (BBC)
  - Global Stock Markets fall sharply amid recession fears after the release of a
    report that shows a surprise decline of the US workforce in August, for the first
    time in four years. (BBC)
  - The Indonesian Supreme Court rejects an appeal by Bali bomber Amrozi bin Nurhasyim.
    (News Limited)
  - United States District Court judge William Hoeveler refuses to block the extradition
    of former Panamanian leader Manuel Noriega to France to face charges. (Reuters)
  - 'Disappearance of Madeleine McCann: Portuguese police believe that Kate McCann
    and Gerry McCann may be involved in their daughters possible death with both parents
    being named as suspects. (BBC) (The Telegraph)'
  - The United States is investigating a video which it has obtained, to see if the
    claims that the man on it is Osama bin Laden are genuine. If they are found to
    be, it will have been the first time he has been seen since October 2004. (BBC)
  - The BBC reports that investigations into a recent outbreak of foot and mouth disease
    has identified five breaches of biosecurity at the Pirbright site of the Institute
    for Animal Health. (BBC)
  - Voters in Morocco go to the polls for the Moroccan parliamentary election, 2007.
    (BBC)
  - '2007 Pacific typhoon season: Typhoon Fitow passes over Tokyo with one casualty
    occurring in Nagano Prefecture last night. (Bloomberg)'
  - Stephenson King becomes the Prime Minister of Saint Lucia after John Compton dies.
  APEC:
  - The President of Russia Vladimir Putin signs a uranium deal with the Prime Minister
    of Australia John Howard before meeting with the President of the United States
    George W. Bush. (Reuters)
  - President Bush offers North Korea the prospect of a peace treaty if it gives up
    its nuclear weapons program in talks with the President of South Korea Roh Moo-hyun.
    (Sydney Morning Herald)
  - Christopher R. Hill, United States Assistant Secretary of State says that North
    Korea has invited experts from the US, China and Russia to inspect nuclear sites
    to be disabled. (Bloomberg)
