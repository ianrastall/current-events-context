Date: '2007-09-20'
Source_URI: Portal:Current events/2007 September 20
Intelligence_Payload:
  Uncategorized:
  - A police officer in Warren, Ohio, is caught on camera using a taser on a woman
    while she was handcuffed. (ABC7 Chicago)
  - The Election Commission of Pakistan sets October 6, 2007 as the date for the Presidential
    Election.
  - American cyclist Floyd Landis is officially stripped of his win in the 2006 Tour
    de France and banned from competition for two years after an arbitration panel
    finds him guilty of doping during the 2006 Tour. He has 30 days to appeal to the
    Court of Arbitration for Sport. (AP via ESPN.com)
  - Osama bin Laden calls on the people of Pakistan to rise up in a "holy war" and
    overthrow President Pervez Musharraf. (BBC)
  - Tens of thousands of people, including Howard University students and NAACP members,
    arrive in the U.S. city of Jena, Louisiana, to protest in support of six black
    teenagers involved in a schoolyard brawl. (Washington Post)
  - CNN reports that Iran has released Iranian-American social scientist Kian Tajbakhsh.
    (CNN)
  - Al Qaeda's Deputy Leader Ayman al-Zawahri claims that the United States is being
    defeated in Iraq, Afghanistan, Somalia and North Africa. (AP via Topix)
  - 'Qian Xun Xue case: Questions are asked in the New Zealand parliament as to why
    Nai Yin Xue was able to leave the country with his daughter despite a court order.
    (News Limited)'
  - A total of 24 people are arrested after a riot in Aurukun, Queensland, Australia.
    (News Limited)
  - A fire breaks out at the Kashiwazaki-Kariwa Nuclear Power Plant in Niigata, Japan,
    which has been closed since a fire in July. (BBC)
  - The Canadian dollar briefly reaches parity with the American dollar for the first
    time since 1976. (CBC)
  Iran:
  - The New York Police Department denies a request by the President of Iran Mahmoud
    Ahmadinejad to visit Ground Zero of the September 11, 2001 attacks in New York
    City. (Jerusalem Post)
  - The President of France Nicolas Sarkozy states that he will seek tougher United
    Nations sanctions against Iran for the nuclear program of Iran. (CNN)
