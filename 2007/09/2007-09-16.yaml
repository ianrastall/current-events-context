Date: '2007-09-16'
Source_URI: Portal:Current events/2007 September 16
Intelligence_Payload:
  Uncategorized:
  - The Sopranos wins the Primetime Emmy Award for Outstanding Drama Series in the
    Primetime Emmy Awards. (Sydney Morning Herald)
  - O.J. Simpson is charged with six felonies in relation to an alleged armed robbery
    of sports memorabilia from a Las Vegas hotel room. (New York Times)
  - A third case of foot and mouth disease is identified but not confirmed by United
    Kingdom government vets on a farm near Chertsey, Surrey. (Times Online)
  - An Iraqi police colonel is gunned down in Afak, the third government official
    killed in that Iraqi town. (CNN)
  - Michael B. Mukasey, a retired federal judge from New York, will be nominated to
    replace Alberto Gonzales as United States Attorney General and President Bush
    will announce his selection on Monday. (AP via Yahoo! News)
  - Andrei Lugovoy, the former KGB agent accused by British authorities of murdering
    Alexander Litvinenko with a radioactive isotope in London last November, says
    he will run for parliament on the party list of the Liberal Democratic Party of
    Russia. (The Washington Post)
  - Flight OG 269 crashes while trying to land in heavy rain at Phuket International
    Airport in Thailand with reports of 88 deaths and at least 20 people seriously
    injured. (AP via IHT)
  - Colin McRae and his son are confirmed dead in the helicopter crash in Scotland.
    (Sunday Times)
  - The Election Commission of Pakistan amends Presidential Election Rules 1988 ahead
    of the elections so that Article 63 of the Constitution no longer applies to the
    President.
  - The Iraqi parliamentary bloc controlled by militia leader Moqtada al-Sadr announces
    that it will abandon the party led by Prime Minister Nouri al-Maliki. (LA Times)
  - Chinese authorities recall tainted leukemia drugs blamed for leg pains and other
    problems. (FOX)
  - Greek voters go to the polls for the Greek legislative election, 2007. The ruling
    New Democracy Party wins the election, with 98% of the votes counted, gaining
    41.9% of the vote and 152 seats over 38.1% and 102 seats for the socialist PASOK
    party. The Communist Party wins 8.1% and 22 seats, over 5% and 14 seats for Radical
    Left Coalition and 3.7% and 10 seats for Popular Orthodox Rally (LAOS), a Far-Right
    party. (ERT) (AFP)
