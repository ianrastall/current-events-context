Date: '2007-01-09'
Source_URI: Portal:Current events/2007 January 9
Intelligence_Payload:
  Uncategorized:
  - YouTube is unblocked in Brazil as a São Paulo state court revises its ruling for
    Daniela Cicarelli video clips. (Reuters)
  - Mohammad Tavakoli, an Iranian legislator, announces the arrest of an alleged spy
    and suspected member of the Mujahedin-e Khalq. Tavakoli said the man leaked information
    about Iran's nuclear program. (RFE/RL)
  - Kazakh President Nursultan Nazarbayev nominates Deputy Prime Minister Karim Masimov
    for Prime Minister. The Parliament will convene on 10 January to vote on the nomination.
    (UPI)
  - The ÖVP, the future minority partner in the grand coalition government that will
    be sworn in in Austria on 2007-01-11, announces its future ministers. (IHT)
  - Hindu holy men in India threaten to boycott the Ganges River Festival because
    of pollution. (AP via ABC News)
  - 'CIA kidnap case: Hearings begin in Italy on whether to charge 25 CIA agents with
    kidnapping for the "extraordinary rendition" of Osama Nasr in 2003. The named
    agents have left the country. (Al Jazeera) (BBC News)'
  - Apple Inc. CEO Steve Jobs unveils the iPhone and changes the company name to Apple
    Inc. at the annual Macworld Expo in San Francisco. (Bloomberg) (CNN) (Wired News)
    (InfoWorld)
  North Korea and weapons of mass destruction:
  - A top U.S. general says that he believes North Korea may conduct another nuclear
    test in the future. (AP via ABC News)
  - Japanese Prime Minister Shinzo Abe calls for closer international co-operation
    against a nuclear North Korea. (BBC News)
  The European Parliament undergoes mid-term changes in advance of its first 2007 session:
  - Far right parliamentarians increase their influence within the European Parliament
    by founding a new transnational caucus. (EUObserver)
  - Alsatian farmer Joseph Daul, an MEP from France's UMP party, is elected chairman
    of the largest caucus in the European Parliament, EPP–ED. He succeeds Hans-Gert
    Pöttering, widely anticipated to be elected President of the European Parliament
    next week. (EUX.TV)
