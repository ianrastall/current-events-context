Date: '2007-01-19'
Source_URI: Portal:Current events/2007 January 19
Intelligence_Payload:
  Uncategorized:
  - The Storm Worm Trojan horse infects thousands of computers (mostly private) in
    Europe and the United States. (BBC News)
  - The Government of Kyrgyzstan arrests the leader of the Hizb ut-Tahrir branch in
    Kyrgyzstan. HuT is a designated terrorist organization and is considered to have
    ties to Al Qaeda, though it maintains it is a political party. (Interfax-Religion)
  - 'War in Somalia: Somalia''s presidential palace is hit by two mortar shells. It''s
    unknown if Somali President Abdullahi Yusuf was inside during the attack. (CNN)'
  - 'Cash for Peerages: A close aide to UK Prime Minister Tony Blair is arrested in
    a corruption probe. (BBC News)'
  - Hrant Dink, an Armenian-Turkish writer, is shot dead in Istanbul. Dink was convicted
    in 2005 of 'insulting Turkishness' in an article on Armenia–Turkey relations.
    (BBC)
  - Hurricane force winds claim at least 40 lives in Western Europe including 10 lives
    in Britain and 11 in Germany, and other victims in The Netherlands (6), Poland
    (6), Czech Republic (3) and France (3). (BBC) (CBS News) (CNN)
  - Robert Gates, the United States Secretary of Defense, visits Basra, Iraq to consult
    with US and allied commanders. (News Limited)
  - Twelve of the thirteen suspects in Norway's NOKAS robbery case from 2004, are
    found guilty and given sentences from 4 - 19 years in prison. (Aftenposten)
  - The furore over the treatment towards contestant Shilpa Shetty in Celebrity Big
    Brother 2007, by contestants including Jade Goody, has resulted in Jade being
    evicted by popular vote from the show, due to heightened concerns over safety,
    after the issue reached a lowpoint in UK-Indian relations. (BBC News)
