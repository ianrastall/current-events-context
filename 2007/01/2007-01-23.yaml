Date: '2007-01-23'
Source_URI: Portal:Current events/2007 January 23
Intelligence_Payload:
  Uncategorized:
  - A rare eel-like creature identified as frilled shark is discovered in Japan by
    fishermen. (Weird News) (CNN)
  - The United Nations Mission in Nepal is established through United Nations Security
    Council Resolution 1740 to monitor disarmament of the Communist Party of Nepal
    (Maoist) and preparations for the Nepalese Constituent Assembly election, 2007.
    (Nepal Monitor)
  - Volodymyr Yelchenko, Ukraine's ambassador to Austria, is fired after he makes
    an unauthorized offer of a visa to Ukraine for exiled Turkmen opposition leader
    Hudaýberdi Ozarow. Ozarow and opposition leader Nurmuhammet Hanamow allegedly
    visited Kiev last week and met with Ukrainian Transportation Minister Mykola Rudkovskiy,
    but this has been denied by several officials. (RFE/RL)
  - Israel's Ministry of Justice says it plans to charge Israeli President Moshe Katsav
    with rape and abuse of power. (BBC) (Reuters)
  - '2007 Guinean uprising: A heavy security presence is reported in the capital,
    Conakry, and other towns following Monday''s clashes in which more than 30 people
    were killed. (BBC)'
  - Qiu Xiaohua, former head of China's National Bureau of Statistics, is expelled
    from the Communist Party of China for corruption charges. (Xinhua)
  - 'One and Unified Revolt: Hezbollah-led protesters spark clashes with government
    loyalists in Lebanon, resulting in 3 deaths and 133 wounded. Opposition forces
    later call off the general strike they had held. (BBC) (Reuters) (CNN) (BBC)'
  - The Prime Minister of Australia, John Howard, reshuffles his Ministry with Joe
    Hockey and Malcolm Turnbull promoted to Cabinet and Amanda Vanstone losing her
    position. (ABC News Australia)
  - Trade union leaders in Guinea are released and meet with President Lansana Conté
    as the general strike escalates. (BBC)
  - 'War in Somalia: Ethiopia begins withdrawing troops from Mogadishu. (BBC)'
  - President of the United States George W. Bush delivers the 2007 State of the Union
    Address, in which he remains steadfast to his Iraq policies, but also reaches
    out to political opponents by proposing environmental and social reforms. (CNN)
    (BBC)
