Date: '2007-01-25'
Source_URI: Portal:Current events/2007 January 25
Intelligence_Payload:
  Uncategorized:
  - A curfew is imposed in Beirut after deadly clashes erupted between pro-government
    supporters and Hezbollah-led factions. (CNN)
  - 276 passengers and 28 crew onboard the Cunard Line's RMS Queen Elizabeth 2 are
    sickened by the norovirus during its 2007 circumnavigation of the world. (CNN)
    (The Times)
  - Oleg Khinsagov is sentenced to 8.5 years imprisonment for smuggling highly enriched
    uranium from Russia to Georgia. (The New York Times) (Reuters)
  - Thirty-three people are killed when a bus plunges down a ravine near Huautla de
    Jiménez in the north of the Mexican state of Oaxaca. (The Australian) (El Universal)
  - An earthquake measuring 6.2 Mw strikes Taiwan's east coast. There is no report
    of damage or injuries. (San Diego Union-Tribune)
