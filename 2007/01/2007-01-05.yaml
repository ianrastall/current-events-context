Date: '2007-01-05'
Source_URI: Portal:Current events/2007 January 5
Intelligence_Payload:
  Uncategorized:
  - A bus bomb near the Sri Lankan town of Nittambuwa kills 5 and injures at least
    30. The Sri Lankan government declares the Tamil Tigers responsible, but the rebel
    group denies involvement. (BBC News) (UPI)
  - In the Canadian city of Vancouver, the roof of the world's largest air supported
    domed stadium, BC Place Stadium, is intentionally deflated due to a tear in a
    fabric panel. (Vancouver Sun)
  - 'Alexander Litvinenko poisoning: Traces of polonium-210 have been found in a second
    restaurant in London. The Health Protection Agency had been monitoring the establishment
    in connection with the Alexander Litvinenko assassination. (BBC News)'
  - Team Canada wins its third straight gold medal at the IIHF world junior ice hockey
    championship with a 4-2 win over Russia on Friday in Leksand, Sweden. (CBC News)
  - A second victim of the National Express Coach crash, a male, is still not identified.
    Authorities have appealed to the public in the hopes of identifying the victim.
    (BBC News)
  - Four are injured in a coach crash in the French Alps. (BBC)
  - Hitachi breaks the 1 terabyte barrier in hard disk drive capacity. (PC World),
    (Bloomberg)
  - Josefa Iloilo appoints Commodore Frank Bainimarama, the leader of the December
    2006 coup d'état, as Prime Minister of Fiji. (BBC)
  - United States President George W. Bush will nominate Zalmay Khalilzad, the U.S.
    ambassador to Iraq, to replace Alejandro Daniel Wolff as the U.S. ambassador to
    the United Nations. If Khalilzad is confirmed by the Senate, he will be the first
    Muslim to serve in the position, and he will continue to be the highest serving
    Muslim American official in the U.S. government. (USA Today)
  - Australia beats England by ten wickets in the final Ashes cricket test match.
    The 5-0 series whitewash is only the second in history, the previous being in
    the 1920-1921 series. It is the final test match for Australian team members Shane
    Warne, Glenn McGrath and Justin Langer. (The Australian)
  - Leading U.S. Democrats oppose Bush's plan of deploying more troops to Iraq, calling
    it "a strategy that you have already tried and that has already failed." (CNN)
    (Reuters)
