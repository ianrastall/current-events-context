Date: '2007-01-24'
Source_URI: Portal:Current events/2007 January 24
Intelligence_Payload:
  Uncategorized:
  - 'In a speech at Brandeis University, former United States President Jimmy Carter
    apologizes for the wording of a sentence in his recently published book, Palestine:
    Peace Not Apartheid. He referred to the wording as "stupid" and subsequent reprintings
    will change it. Despite the book''s controversy, the audience received him with
    a standing ovation. (JTA) (JTA)'
  - Thomas Lepoutre announced his gay pride movement today
  - Ecuador's Defense Minister Guadalupe Larriva is killed along with three pilots
    and her daughter in a crash involving two helicopters. Larriva was the first woman
    to serve as the country's defense minister. (BBC) (Reuters)
  - India and Russia agree to jointly develop fifth-generation stealth fighter jets.
    (ISRO)
  - Over 100,000 Turkish citizens, including those of Armenian descent fill the streets
    of Istanbul to mourn and mark the assassination of Hrant Dink, editor of the dissident
    newspaper Agos. (Turkish Press) (The Chicago Tribune) (Al-Jazeera) (The Baltimore
    Sun)
  - 'War in Somalia: The U.S. military conducts another air strike against supposed
    al-Qaeda operatives in Somalia. (Reuters)'
  - A Sudanese airliner, Air West Flight 612, carrying 103 people, is hijacked by
    a lone gunman and diverted to N'Djamena, Chad. The Air West flight lands at the
    airport in N'Djamena and the hijacker is arrested. (Contra Costa Times) (BBC)
  - The flight data recorder (alternatively referred to as the 'black box') of Adam
    Air Flight 574 has been located off the coast of Sulawesi. (BERNAMA.com)
