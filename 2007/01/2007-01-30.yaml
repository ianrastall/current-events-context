Date: '2007-01-30'
Source_URI: Portal:Current events/2007 January 30
Intelligence_Payload:
  Uncategorized:
  - John Perlman, the South African radio broadcaster and whistleblower, resigns after
    exposing political censorship at the South African Broadcasting Corporation. (iAfrica.com)
  - Windows Vista, the latest version of the Microsoft Windows operating system is
    released worldwide to consumers. Several security flaws are detected within the
    first few hours of its release. (PC World Australia)
  - About 2,000 Greek schoolchildren form a human chain around the Acropolis of Athens
    to demand that the UK return the Elgin Marbles. (BBC)
