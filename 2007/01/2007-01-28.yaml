Date: '2007-01-28'
Source_URI: Portal:Current events/2007 January 28
Intelligence_Payload:
  Uncategorized:
  - State-owned Egyptian newspaper Al Ahram publishes an article stating that the
    Government of Iran ordered the assassination of Ihab al-Sherif, Egypt's ambassador
    to Iraq, in July 2005 in an effort to limit Egypt's influence in the region. (The
    New York Times)
  - 'Battle of Najaf (2007): U.S. and Iraqi troops kill about 250 militants in fighting
    around Najaf, Iraq. (BBC)'
  - 'Shia insurgency in Yemen: Six soldiers have been killed and 20 injured in attacks
    by Shia militants in the north of Yemen, officials say. (BBC)'
  - YouTube's founder says people who upload their own videos to the site will get
    a share of the ad revenue. (BBC)
  - Roger Federer defeats Fernando Gonzalez 7-6 6-4 6-4 at the Australian Open, claiming
    his 10th Grand Slam victory. (The Age) (Reuters)
  - Celebrity Big Brother 2007 concluded on this day after all the racist bullying
    allegations resulting in Shilpa Shetty winning the show
  - The Undertaker wins the Royal Rumble match earning a title shot at WrestleMania
    23
