Date: '2007-01-20'
Source_URI: Portal:Current events/2007 January 20
Intelligence_Payload:
  Uncategorized:
  - 'U.S. election 2008: Senator Hillary Clinton (D-NY) officially announces her presidential
    bid with an exploratory committee. (BBC) (Clinton Website) (CNN) (Reuters)'
  - A man named Ogün Samast is arrested in Samsun by Turkish authorities for killing
    Armenian-Turkish writer Hrant Dink. (BBC)
  - 'War in Somalia: Somali gunmen attacks government and Ethiopian troops in a crowded
    market, killing 4 people. (Reuters)'
  - 'Iraq War: The U.S. military says one of its helicopters has crashed north-east
    of Baghdad, killing all 13 passengers. (BBC) (CNN)'
  - A planned meeting between Palestinian Authority President Mahmoud Abbas and Hamas
    leader Khaled Meshaal is postponed. (BBC) (Reuters)
  - Venezuelan President Hugo Chávez says Fidel Castro is 'battling for his life.'
    (BBC)
  - A three-man team, using only skis and kites, completes a 1,093 mile trek to reach
    the Southern Pole of Inaccessibility for the first time since 1958 and for the
    first time ever without mechanical assistance. (BBC)
  - The World Social Forum opens in Nairobi, Kenya. (BBC)
