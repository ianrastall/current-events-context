Date: '2007-01-11'
Source_URI: Portal:Current events/2007 January 11
Intelligence_Payload:
  Uncategorized:
  - '2007 Chinese anti-satellite missile test: The Second Artillery Battalion of the
    People''s Liberation Army of China tests a missile destroying one of its own satellites
    535 miles above Earth. New York Times'
  - Liberal MP Jean Lapierre resigns from the Canadian House of Commons. Justin Trudeau
    is likely to be the Liberals' candidate in the next election in the Outremont
    riding. (London Free Press)
  - '2006–2007 Bangladeshi political crisis: Bangladesh President Iajuddin Ahmed steps
    down as interim leader just hours after declaring a state of emergency and a curfew
    in the country. (BBC)'
  - Austria's new government is sworn in under Chancellor Alfred Gusenbauer (SPÖ)
    and Vice-Chancellor Wilhelm Molterer (ÖVP). (The International Herald Tribune)
  - 'Kazakhstan political shakeup of 2007: Foreign Minister Kassym-Jomart Tokayev
    is appointed Chairman of the Senate of Kazakhstan. If aging President Nursultan
    Nazarbayev dies, according to the Constitution, Tokayev would become President.
    Some analysts say this is a sign that Tokayev, and not one of Nazarbayev''s politically
    active daughters, is his desired successor. (News.com.au)'
  - 'War in Somalia: A top U.S. official says that he believes the airstrike in Somalia
    on the previous day failed to kill the al-Qaeda suspects they targeted. (BBC)'
  - In the ongoing Operation Mountain Fury, NATO forces kill as many as 150 Taliban
    militants in Afghanistan's Paktika province. (BBC)
  - The U.S. Defense Department reports that United States Department of Defense contractors,
    while traveling through Canada, have had Canadian coins with radio transmitters
    inside planted on them by unknown people. The transmitters could be used to track
    the locations of the contractors. (The Associated Press)
  - Pieces of wreckage and a body are recovered from the missing Adam Air flight 574.
    (The Daily Telegraph)
  - January 2007 North American Ice Storm hits parts of North America including United
    States and Canada, causing 74 deaths across 12 U.S. states and three Canadian
    provinces, and caused hundreds of thousands of residents across the U.S and Canada
    to lose electric power.
