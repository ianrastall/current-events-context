Date: '2007-01-16'
Source_URI: Portal:Current events/2007 January 16
Intelligence_Payload:
  Uncategorized:
  - Kyrgyz President Kurmanbek Bakiyev nominates Felix Kulov for Prime Minister. If
    Kulov is confirmed by the Supreme Council, this will be the third time Bakiyev
    has appointed Kulov Prime Minister. (RadioFreeEurope/RadioLiberty)
  - Thailand summons the Singaporean ambassador to Bangkok to protest about a visit
    made by former Prime Minister of Thailand Thaksin Shinawatra, deposed in the 2006
    Thai coup d'état, to Singapore. Thaksin was able to meet the Singaporean Deputy
    Prime Minister, S Jayakumar, but Singapore played down the meeting as "purely
    social and private". (BBC)
  - The world's first genetically modified chickens have been bred by scientists in
    Edinburgh. The birds supposedly lay eggs that can help fight cancer. (The Times)
  - Two bombs at Mustansiriya University in Baghdad kill at least 70 people and wound
    170 more. (CNN)
  2004-2006 Waziristan conflict:
  - Pakistani cobra helicopter gunships destroy three suspected terrorist compounds
    in South Waziristan reportedly killing 8 people and wounding 10. (CBS News)
