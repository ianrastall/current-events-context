Date: '2007-01-03'
Source_URI: Portal:Current events/2007 January 3
Intelligence_Payload:
  Uncategorized:
  - 'Palestinian factional violence: Clashes between Hamas, Fatah result in abductions
    from both sides. Four Fatah loyalists and a female bystander are killed in gunbattles.
    (Ynetnews)'
  - A prison guard is arrested in Baghdad under suspicion of secretly filming the
    execution of Saddam Hussein using a mobile phone and publishing the video on the
    Internet. (The Times)
  - The North Korean Korean Central News Agency reports that Foreign Minister Paek
    Nam-sun has died, without describing the cause of death. (BBC)
  - Fourteen-year-old Michael Perham becomes the youngest person to ever sail single-handedly
    across the Atlantic Ocean, when he completes a six-week voyage from Gibraltar
    by docking in Antigua. (The Times)
  - Former United States President Gerald Ford is buried in his hometown of Grand
    Rapids, Michigan. (BBC)
  - A National Express coach overturns, killing two people, near Heathrow Airport,
    London on a slip road from the M4 to the M25 motorways. The driver is arrested
    on suspicion of causing death by dangerous driving. (BBC)
  - Celebrity Big Brother 2007 (UK) launches, sparking the Celebrity Big Brother racism
    controversy.
