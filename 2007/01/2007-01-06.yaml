Date: '2007-01-06'
Source_URI: Portal:Current events/2007 January 6
Intelligence_Payload:
  Uncategorized:
  - An overnight storm knocked out power to thousands in the Vancouver and Victoria
    area. The storm also uprooted trees in Stanley Park, and filled BC Place with
    water after the roof tore open a day earlier. (MSN News) (CTV.ca)
  - The Sunday Times (UK) reports that Israel has drawn up plans to possibly destroy
    Iran's uranium enrichment facilities with tactical nuclear weapons in the event
    that U.S. intervention does not occur, and non-nuclear strikes are ruled out.
    Iran has responded saying that "anyone who attacks will regret their actions very
    quickly." Israel denies such plans were made.(Times)(The Jerusalem Post)(Haaretz)
  - A second bus bomb in Sri Lanka, this time near the tourist resort of Hikkaduwa
    has killed at least 15 and injured dozens more. The Sri Lankan government declared
    the Tamil Tigers responsible, but the rebel group is denying involvement. (BBC
    News) (Reuters) (The Asian Tribune)
  - At least 40 people have died in a bus crash in Comilla, Bangladesh. (BBC News)
    (The Telegraph)
  - Nine bound and gagged bodies are found in grave in Uruapan, Michoacan state, Mexico.
    Drug gangs are suspected. (BBC News)
  - The British Army raises its maximum recruitment age from 26 years to 33, but denies
    that this is a reaction to a failure to recruit sufficient young people. The normal
    term of engagement remains 22 years, meaning that some soldiers could still be
    serving to age 55. (BBC News)
  - Jeff Bezos, Amazon.com founder and billionaire has joined the "budget space race"
    with a test burn of the Blue Origin passenger rocket, the New Shepard. (The Guardian)
  - The eastern United States enjoyed record high temperatures, including 72 degrees
    Fahrenheit (22 Celsius) in New York City. (Bloomberg)
