Date: '2007-01-13'
Source_URI: Portal:Current events/2007 January 13
Intelligence_Payload:
  Uncategorized:
  - 'War in Somalia: Martial law is declared in Somalia. (BBC)'
  - The energy dispute between Russia and Belarus is resolved after about 10 hours
    of negotiations between Russian Prime Minister Mikhail Fradkov and his Belarusian
    counterpart, Sergey Sidorsky. (BBC)
  - A major earthquake measuring approximately 8.2 magnitude occurs in the north-western
    Pacific Ocean at 04:23:20 UTC. A tsunami is detected and a warning is issued for
    Russia, Japan, Marcus Island, Wake Island, Midway Island, Northern Mariana Islands,
    Guam, Marshall Islands, Taiwan, Yap, Pohnpei, and Chuuk. (US Geological Survey)
    (Pacific Tsunami Warning Center) (Japan Meteorological Agency)
  - 10 former members of the Nazi SS are sentenced in absentia to life imprisonment
    for their role in the Marzabotto massacre, the worst massacre in Italy during
    World War II. (BBC)
  - 20 people are killed in severe storms in Sangihe, Indonesia. (The Jakarta Post)
