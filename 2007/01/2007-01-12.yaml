Date: '2007-01-12'
Source_URI: Portal:Current events/2007 January 12
Intelligence_Payload:
  Uncategorized:
  - China and Russia veto a United States drafted United Nations Security Council
    Resolution that would have urged the government of Myanmar to stop human rights
    abuses and the repression of political opposition. (Reuters AlertNet) (LA Times)
  - Terri Irwin, widow of naturalist and TV personality Steve Irwin, reports that
    all footage of his death from a stingray piercing his heart has been destroyed,
    and the events surrounding his death will not be shown in his final documentary,
    Ocean's Deadliest. (Access Hollywood)
  - The Chinese Foreign Ministry warns it has intelligence indicating East Turkestan
    Islamic Movement terrorists will launch an attack against China from Kyrgyzstan.
    Security personnel along the border between the two countries is increased. (RFE/RL)
  - United States armed forces raid the office of the Iranian Consulate General in
    Arbil, a city in Iraqi Kurdistan. (The New York Times)
  - Underground tunnel of the future Pinheiros Subway Station, in São Paulo collapses,
    opening a huge crater and making a large number of vehicles falling into.
  - Fakhruddin Ahmed becomes the new Chief Advisor in Bangladesh amid the current
    political crisis. (USA Today)
  - Terrorists fire an anti-tank missile at the Embassy of the United States in Athens.
    No one is injured or killed. (BBC) (CNN)
  - Somali government and Ethiopian forces capture the town of Ras Kamboni, and pursue
    fleeing Islamist forces. (AP)
  - An Argentinian judge issues an arrest warrant for former president Isabel Martínez
    de Perón, implicated in the disappearance of a human-rights activist in 1976.
    Perón has been living in Spain since 1981. (BBC)
  - Casino Royale and The Queen lead this year's BAFTA film award nominations. (BBC)
  - Raleb Majadele is appointed minister of science and technology, becoming the first
    Israeli Arab Muslim to serve as a cabinet minister in the government of Israel.
    (BBC)
