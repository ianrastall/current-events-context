Date: '2007-01-07'
Source_URI: Portal:Current events/2007 January 7
Intelligence_Payload:
  Uncategorized:
  - Newly appointed Archbishop Stanisław Wojciech Wielgus, of Warsaw resigns after
    Friday's allegations that he collaborated with the Polish communist government's
    secret police. He was due to be officially appointed by Pope Benedict XVI at 10:00
    GMT, and announced his decision only one hour before. (Reuters) (BBC News)
  - At least 17 prisoners are killed in riots in a maximum security jail in Santa
    Ana, El Salvador, after convicted members of the Mara 18 gang fight with a security
    guard, leading to trouble throughout the jail. (BBC News)
  - The executions of two senior accomplices of former leader Saddam Hussein are expected
    to be carried out within this week according to Iraqi officials. (BBC)
  - '2006–2007 Bangladeshi political crisis: A nationwide blockade led by the Awami
    League to force electoral reform before the 2007 parliamentary election continues
    for a third day, bringing capital Dhaka to a standstill, with schools shut and
    vehicles absent from the streets. (BBC)'
  War in Somalia:
  - Somali gunmen open fire at Ethiopian troops stationed in Somalia's capital Mogadishu
    resulting in at least one death. (Reuters) (AP via ABC News)
  - Fighting breaks out between Somali protesters and Ethiopian troops in the town
    of Beledweyne after an official is arrested for refusing to hand over a member
    of the ousted Islamic Courts Union. Three people are reportedly injured. (BBC)
