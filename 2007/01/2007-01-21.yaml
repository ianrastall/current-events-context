Date: '2007-01-21'
Source_URI: Portal:Current events/2007 January 21
Intelligence_Payload:
  Uncategorized:
  - 'War in Somalia: Sharif Ahmed, a leader of the defeated Islamic Court Union, surrendered
    himself to Kenyan police. (Reuters)'
  - Sudanese rebels claim that a government aircraft has bombed areas in Darfur over
    the weekend in contravention of the ceasefire. (BBC)
  - 'U.S. election 2008: Bill Richardson, currently the Democratic Governor of New
    Mexico, announces his candidacy for United States president. (New York Times)'
  - The WWF warns that some species of tuna including bluefin tuna are at risk of
    commercial extinction due to illegal fishing. (Reuters)
  - Dozens of containers, some containing toxic chemicals, are washed ashore at Devon,
    England after MSC Napoli ran aground on the coast last Thursday during Kyrill.
    (ABC News Australia)
  - Palestinian Authority President Mahmoud Abbas and Hamas leader Khaled Mashal meet
    together in Syria to try to end violence between the two factions. However, differences
    remain and talks will resume possibly next week. (BBC) (AP via ABC News)
  - Angela Merkel, the Chancellor of Germany, holds talks with Vladimir Putin, the
    President of Russia over energy security issues. (BBC)
  - A 7.3 Mw earthquake occurs off of Indonesia, centered in the Molucca Sea. Buildings
    shake in northeastern Indonesia, panicking residents, but there are no reports
    of casualties. (USGS) (Reuters) (BBC)
  - Muqtada al-Sadr's bloc lifts its boycott of the Iraqi political process and rejoins
    the government. (AP via Daily Comet)
  - Ogün Samast, who was arrested for murdering Hrant Dink, admits that he has killed
    Dink. (BBC) (CNN)
  - Voters in Serbia participate in the first general election since it became an
    independent state in 2006. (BBC)
  - Japanese tokusatsu television series Kamen Rider Kabuto ends.
