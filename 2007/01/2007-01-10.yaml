Date: '2007-01-10'
Source_URI: Portal:Current events/2007 January 10
Intelligence_Payload:
  Uncategorized:
  - U.S. President George W. Bush announces, in a televised address, his strategy
    change in response to Iraq Study Group criticisms. This will involve a surge of
    21,500 more troops to fight in the War in Iraq. (CNN)
  - The Tajik Parliament approves a Memorandum of Understanding between Tajikistan
    and Iran agreeing to begin a nuclear program with assistance from the Iranian
    government in building a power plant. Tajikistan is the second nation in Central
    Asia to pursue a nuclear program, the other being Kazakhstan. (IRNA)
  - 'Kazakhstan political shakeup of 2007: Karim Masimov is confirmed by the Parliament
    of Kazakhstan as Prime Minister. Massimov appoints his former superior and political
    rival Daniyal Akhmetov to Defense Minister and Economy Minister Aslan Musin to
    Deputy Prime Minister. (IHT)'
  - Sudan adopts a new currency; the Sudanese pound replaces the Sudanese dinar. The
    change is part of reconciliation measures after the end of the Second Sudanese
    Civil War. (E Canada Now)
  - Mirsad Bektašević, a 19-year-old Swedish citizen of Bosnian descent, is convicted
    of terrorism-related charges by a court in Sarajevo and sentenced to 15 years'
    imprisonment. (Reuters) (The Local)
  - 'War in Somalia: Somali official says that a senior al-Qaeda suspect responsible
    for bombing U.S. embassies in East Africa eight years ago is possibly killed in
    a U.S. airstrike in the Battle of Ras Kamboni. (AP via ABC News) (CNN) (CBS)'
  - Two Squirrel helicopters collide at RAF Ternhill in Shropshire, UK, killing one
    and injuring two others. (BBC News)
  - Iranian news agency reports a UFO has crashed in the Kerman province. (Fars News
    Agency)
  - India launches four satellites at a time with their PSLV-C7 rocket, including
    the SRE-1 test article, which will return to Earth in a test for a future Indian
    manned spaceflight program. (Reuters)
  - The European Commission announces proposals for the EU to cut carbon dioxide emissions
    by 20% by 2020 and 60% by 2050 in order to mitigate global warming. (BBC News)
  - Following the 2006 general election, Daniel Ortega becomes the new President of
    Nicaragua, replacing Enrique Bolaños. (CBS)
  - The Social Democratic Party of Austria, the future majority partner in the grand
    coalition government that will be sworn in in Austria on January 11, 2007, announces
    its future ministers. (Gulf Times)
  - Start of the 12th ASEAN Summit and 2nd East Asia Summit in Metro Cebu, Philippines.
    Meetings involve heads of the 10 member states and 6 dialogue partners with major
    discussions on relevance, diplomacy, security, economy and free trade and other
    important global issues. (Philippine Daily Inquirer)
  - A general strike starts in Guinea, with trade unions calling for pay rises, the
    return to jail of Mamadou Sylla and the resignation of President Lansana Conté.
    (BBC)
