Intelligence_Payload:
  Uncategorized:
  - The Red Crystal is recognized as an official symbol of the International Red Cross
    and Red Crescent Movement. (BBC)
  - The Union for a Popular Movement nominates Nicolas Sarkozy as its candidate to
    become the next President of France in the 2007 French presidential election.
    (The International Herald Tribune)
  - Palestinian President Mahmoud Abbas tells United States Secretary of State Condoleezza
    Rice that he opposes the establishment of a provisional Palestinian state with
    temporary borders. (CNN)
  - 'War in Somalia: An African Union delegation is in Somalia''s capital Mogadishu
    to discuss the deployment of international peacekeeping troops. (AP via ABC News)
    (BBC)'
