Date: '2007-05-18'
Source_URI: Portal:Current events/2007 May 18
Intelligence_Payload:
  Uncategorized:
  - A bomb in a market place in Juliaca in southern Peru kills 6 people and injures
    about 50. (BBC)
  - 'Black Swan Project: Deep sea explorers retrieve 17 tons of colonial era silver
    and gold coins with an estimated value of US$500 million. (CNN)'
  - Two ABC News employees are killed by unknown assailants in Baghdad. (Reuters via
    the Australian)
  - 9 people are killed in a bomb blast at the Mecca Masjid mosque in the Indian city
    of Hyderabad, Andhra Pradesh.
  - The Parliament of Kazakhstan votes to allow the President of Kazakhstan Nursultan
    Nazarbayev to stand for an unlimited number of terms. (BBC)
  - A home-made bomb explodes in a bus terminal in Cotabato in the southern Philippines,
    killing 3 people and injuring 15. (AFP via ABC News Australia)
  - Rioting breaks out in Guangxi province, China, in protest at the government imposing
    fines for breaches of its strict one-child policy. (BBC)
