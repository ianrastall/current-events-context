Date: '2007-05-20'
Source_URI: Portal:Current events/2007 May 20
Intelligence_Payload:
  Uncategorized:
  - Alltel, a mobile phone provider in the United States, is acquired by TPG Capital,
    L.P. and Goldman Sachs leveraged-buyout unit. (Bloomberg)
  - A suicide bomber kills at least 10 people and injures 32 people in Gardez, the
    capital of Afghanistan's Paktia Province. (New York Times)
  - '2007 Israel-Gaza conflict: An IAF plane fires a missile at house of Hamas lawmaker
    Khalil al-Haya, killing eight people and wounding many others; Al-Haya was not
    at his house at the time of the strike. (Ynet) (Reuters)'
  - 'The main landing gear of an Air Canada Jazz plane flight # AC8911 collapsed while
    on a runway at Toronto Pearson International Airport in Canada with 37 passengers
    and 3 crew members who were not injured. (CTV Toronto)'
  - Bulgaria elects Members of the European Parliament for the first time, the three
    top parties each possibly receiving five deputies. The narrow winner of the elections
    is the opposition Citizens for European Development of Bulgaria.(Reuters)
  - Tens of thousands of Venezuelans march in protest in support of Radio Caracas
    Televisión and in opposition to President Hugo Chávez, who has vowed not to renew
    its licence. (AP via Guardian)
  - Thousands gather in Samsun, Turkey to protest against the government. (CNN)
  - 'Battle of Nahr al-Bared: Fighting breaks out between Fatah al-Islam militants
    and Lebanese soldiers at the Nahr al-Bared refugee camp in Tripoli, Lebanon. (BBC)'
  - David Hicks returns from Guantánamo Bay to his home state of South Australia.
    He will serve the remaining seven months of his sentence for providing material
    support for terrorism at Yatala Labour Prison. (Sydney Morning Herald)
  - Romário scores his 1000th goal for Vasco da Gama by penalty kick against Sport
    Recife. He is only the second player in the history of professional soccer to
    achieve this, the first being Pelé in 1969. (Uol)
