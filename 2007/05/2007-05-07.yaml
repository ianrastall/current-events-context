Date: '2007-05-07'
Source_URI: Portal:Current events/2007 May 7
Intelligence_Payload:
  Uncategorized:
  - Discovery is announced of the Kerguelen Plateau, an Antarctic sunken large island
    formerly joined to India, from the icebreaker Polarstern at its homeport of Bremerhaven,
    Germany, after a 19-month research voyage to Antarctica. (Times of India)
  - NASA announces that the Chandra X-ray Observatory and ground-based telescopes
    have discovered a massive supernova designated SN 2006gy, the largest ever recorded,
    and possibly a new type that has been predicted but never observed. (BBC) (Space.com)
  - Prime Minister Ehud Olmert of Israel survives three motions of no confidence in
    Knesset, in the latest backlash over his handling of the 2006 Lebanon war. (BBC)
  - A senior officer of the Los Angeles Police Department is demoted and 61 other
    officers reassigned after an inquiry into the handling of a May Day protest. (BBC)
  - At least 21 people die in a bus crash in northwest Pakistan. (AP via Seattle Post-Intelligencer)
  - More than 18,000 Mexicans pose naked for U.S. photographer Spencer Tunick at the
    Zócalo Plaza in Mexico City. (AP via CNN)
  Kenya Airways Flight 507:
  - Search officials confirm that there were no survivors. (AP via CNN)
  - The flight data recorder is retrieved from a mangrove swamp where the plane crashed.
    (BBC)
