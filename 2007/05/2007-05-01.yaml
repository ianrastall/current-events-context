Date: '2007-05-01'
Source_URI: Portal:Current events/2007 May 1
Intelligence_Payload:
  Uncategorized:
  - The United States Court of Appeals for the District of Columbia Circuit rules
    that U.S. Representative Jim McDermott must pay damages for leaking a copy of
    a tape of an illegally intercepted telephone call. (New York Times)
  - Rupert Murdoch, the CEO of News Corporation, announces a $5 billion offer to take
    over Dow Jones, the publisher of the Wall Street Journal. (International Herald
    Tribune)
  - 'Turkish presidential election, 2007: The Constitutional Court of Turkey annuls
    last Friday''s presidential vote in the Grand National Assembly after a challenge
    by opposition parties. (BBC)'
  - At least three people die after an explosion in an apartment building in Palencia,
    Spain. (AFP via ABC News Australia)
  - Police arrest 30 alleged animal rights extremists in raids in the United Kingdom,
    Belgium and the Netherlands. (BBC)
  - Deutsche Börse AG, operator of the Frankfurt Stock Exchange, agrees to buy International
    Securities Exchange the second biggest United States options market for $2.8 billion
    creating the largest transatlantic derivatives market. (Bloomberg via the Boston
    Globe)
  - Nigerian opposition and civil society groups join trade unions in May Day rallies
    against the recent presidential election which saw Umaru Yar'Adua elected as the
    President of Nigeria. (BBC)
  - Eitan Cabel, a member of the Israeli Cabinet resigns in protest of Prime Minister
    Ehud Olmert's handling of the 2006 Lebanon War. (FOX)
  - Two men are charged in Melbourne, Victoria with being members of the Tamil Tigers
    and providing funding to the organisation. (Sydney Morning Herald)
  - Thousands of Macau residents demonstrate against the government's labour policy
    and corruption on May Day, resulting in a clash with police. One bystander was
    injured. (AP via International Herald Tribute) (BBC)
  - Digg users participate in the "Digg Revolt" of posting the pirated HD-DVD/AACS
    hex code, considered by sources to be a pivotal moment in internet free-speech.
  Iraq War:
  - On the fourth anniversary of his "Mission Accomplished" speech, President George
    W. Bush, citing the provisions setting a deadline for the withdrawal of U.S. troops,
    vetoes an Iraq War funding measure that also improves resting, training and equipping
    standards for combat troops before their deployment, and sets binding benchmarks
    for the Iraqi government. (CNN) (AP via Denver Post)
  - Brigadier-General Abdul Kareem Khalaf of the Iraqi Interior Ministry claims that
    Abu Ayyub al-Masri, the leader of Al Qaeda in Iraq, has been killed in a battle
    between insurgents. The claim is later denied by insurgents. (Reuters via News
    Limited) (BBC)
