Date: '2007-05-08'
Source_URI: Portal:Current events/2007 May 8
Intelligence_Payload:
  Uncategorized:
  - U.S. police arrest six Islamic men from the Republic of Macedonia and the Middle
    East based on a tip from a Mount Laurel, NJ resident who discovered their plot
    to attack Fort Dix, New Jersey, and "kill as many soldiers as possible." (New
    York Times) (BBC) (AP via Trentonian.com)
  - Former U.S. President Bill Clinton announces a deal with drug companies to lower
    the price of anti-AIDS drugs in Third World countries. (AP via Fox News)
  - André Boisclair resigns as the leader of Canada's Parti Québécois. (International
    Herald Tribune)
  - The Treasurer of Australia Peter Costello delivers his twelfth budget with significant
    tax cuts and increases in government spending on education and health. (Sydney
    Morning Herald)
  - The Movement for the Emancipation of the Niger Delta blows up three oil pipelines
    in the Niger delta in the south of Nigeria. (Reuters Alertnet)
  - Home rule returns to Northern Ireland. DUP leader Ian Paisley and Sinn Féin's
    Martin McGuinness take office as First Minister and Deputy First Minister, respectively.
    (BBC)
  - The U.S. Department of Defense announces plans to deploy 35,000 troops in Iraq
    starting from August 2007. (Washington Post)
  - Tomislav Nikolić, the temporary leader of the Serbian Radical Party, is elected
    as the Speaker of the National Assembly of Serbia. (AP via CTV) (BBC)
  - Former Prime Minister of Australia Gough Whitlam gives evidence to the coronial
    inquest into the death of the Balibo Five in Balibo, East Timor in October 1975.
    (Sydney Morning Herald with AAP)
  - Scotland's John Higgins beats England's Mark Selby in the World Snooker Championship
    2007 final by 18-13 frames. (BBC Sport)
  - Hebrew University archaeologist Ehud Netzer claims to have discovered the tomb
    of Herod the Great in Herodium. (CNN)
  Iraq War:
  - A suicide bomber kills at least 10 people and injures many more in an attack on
    the Shi'ite city of Kufa in Iraq. (BBC) (Reuters)
