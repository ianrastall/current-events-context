Date: '2007-05-02'
Source_URI: Portal:Current events/2007 May 2
Intelligence_Payload:
  Uncategorized:
  - Gunmen in Afghanistan kill Abdul Sabur Farid, a member of the House of Elders
    and former Prime Minister. (BBC)
  - Voters in The Bahamas go to the polls in elections for the House of Assembly (AP
    via CNN), ousting the governing Progressive Liberal Party in favour of the opposition
    Free National Movement. (BBC)
  - Antonio Villaraigosa, the Mayor of Los Angeles, California, orders an inquiry
    into a clash that occurred at a May Day Rally between the Los Angeles Police Department
    and pro-immigration demonstrators. (Reuters via CNN)
  - The International Criminal Court issues arrest warrants for Sudanese humanitarian
    affairs minister Ahmed Haroun and Janjaweed leader Ali Kushayb on charges of war
    crimes committed during the Darfur conflict. (BBC)
  - 'Iraq War: U.S. President George W. Bush meets with Democratic Party officials
    in Congress to try find ways to fund the Iraq War. (BBC)'
  - 'French presidential election, 2007: Candidates Nicolas Sarkozy and Ségolène Royal
    participate in a televised debate. (CNN) (BBC) (Reuters via CNN)'
  - All six members of the Bali Nine on death row have the appeal against their sentence
    heard in Bali and Jakarta. (ABC News Australia)
  - Avigdor Yitzhaki, the chairman and co-founder of Ehud Olmert's Kadima party, calls
    on Olmert to resign as the Prime Minister of Israel over his handling of the 2006
    Lebanon War. Foreign Minister Tzipi Livni later joined calls for Olmert's resignation.
    (BBC) (AustBC)
  - Four people are killed in a helicopter crash in Cambridgeshire, United Kingdom.
    (Sky News)
  - A train carrying solid-fuel booster segments for the Space Shuttle programme is
    involved in a bridge collapse in Alabama, injuring six people, two seriously.
    (Spaceflight Now)
