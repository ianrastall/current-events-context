Date: '2007-05-12'
Source_URI: Portal:Current events/2007 May 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Guinean soldiers riot in the capital Conakry after the President of Guinea Lansana
    Conté fails to attend a meeting to discuss grievances over their pay and conditions.
    (BBC)
  - A bomb placed on a bicycle was detonated in a bazaar in İzmir, Turkey wounding
    fifteen people just a day before the scheduled "republic protest" in the city.
    One of the wounded was in a critical condition and later died in the hospital
    while most of the others were lightly wounded and were released from the hospital
    the same day. (Hürriyet)
  - At least 33 people are killed and 120 are injured in violent protests organized
    by the political organization Muttahida Qaumi Movement (led by exiled Altaf Hussain)
    in the Pakistani city of Karachi. (BBC) (CNN)
  Arts and culture:
  - The final of the 2007 Eurovision Song Contest takes place in Helsinki, Finland.
    Serbia wins with its debut entry Molitva. (BBC)
  Politics and elections:
  - Su Tseng-Chang resigns as the Premier of the Republic of China (Taiwan) following
    a loss in a primary election to be the Democratic Progressive Party candidate
    in the 2008 Taiwanese presidential election. (Bloomberg) (BBC)
  - Voters in Armenia go to the polls to elect a new National Assembly of Armenia.
    (BBC)
