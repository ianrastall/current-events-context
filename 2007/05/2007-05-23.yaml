Date: '2007-05-23'
Source_URI: Portal:Current events/2007 May 23
Intelligence_Payload:
  Uncategorized:
  - AC Milan defeats Liverpool F.C. 2-1 in the UEFA Champions League final. (Bloomberg)
  - One of three captured US soldiers in Iraq is found dead, during an extensive manhunt
    which occupied nearly 3% of US troops. (BBC)
  - Venezuela's Supreme Court rules that Radio Caracas Televisión must close on Monday,
    May 28, after the station's appeal against a decision by the Venezuelan Government
    failed. (CNN)
  - Lebanon's Defence Minister Elias Murr issues an ultimatum to Fatah al-Islam militants
    in the Nahr el-Bared refugee camp in Tripoli, Lebanon. (AP via CNN)
  - At least 27 people die as a wall collapses in a bar in Tirupur in the South Indian
    state of Tamil Nadu. (BBC)
  - '2007 Israel-Gaza conflict: Militants in the Gaza Strip fire eight rockets at
    the southern Israeli cities of Sderot and Kibbutz Nir Am. The IAF makes an air
    strike on the Gaza Strip, in which they destroy two buildings. (Ynet) (Reuters)'
  - The British Government announce a carbon emissions trading scheme, the Carbon
    Reduction Commitment, that will apply to hotel chains, supermarkets, banks, and
    other large organisations. (DEFRA)
  - A Serbian court finds 12 men, including Milorad Ulemek, guilty of the 2003 assassination
    of Prime Minister Zoran Đinđić. (BBC) (Sky) (Reuters AlertNet) (Radio Televizija
    Vojvodine)
  - A Thai gunman opens fire with an AK-47 in a market in Pathum Thani Province, north
    of Bangkok, killing a villager, a security guard and a police officer and critically
    injuring another six before he was shot dead by the police. (AFP via Channelnewsasia.com)
  - Gwen Stefani performs in front of a record-breaking crowd at the Tweeter Center
    in Mansfield, MA.
