Date: '2007-05-13'
Source_URI: Portal:Current events/2007 May 13
Intelligence_Payload:
  Uncategorized:
  - Team Canada wins the 2007 IIHF World Hockey Championship after a 4-2 win over
    Finland in the gold medal game in Moscow, Russia. (Toronto Star)
  - Two cargo ships collide in heavy fog near Dalian, China. 16 sailors are missing.
    (AP via Washington Post) (Xinhua)
  - At least one million people gather in İzmir, Turkey for the fifth mass rally to
    demand their country remain a secular state, stepping up pressure on the Islamist-rooted
    Justice and Development Party (AKP) government before July elections. (Swissinfo)
  - NATO confirms that Mullah Dadullah, the foremost military leader of the Taliban,
    has been killed in battle. (AP via IHT)
  - President of Iran Mahmoud Ahmadinejad visits the United Arab Emirates for the
    first official visit since 1979. (BBC)
  - Prime Minister of Australia John Howard writes to Cricket Australia telling it
    to call off a tour of Zimbabwe due to concern over human rights abuses in that
    country. (ABC News Australia)
  Iraq War:
  - At least 40 people die in a truck bomb attack on the offices of the Kurdistan
    Democratic Party of Iraq in Makhmur. (BBC)
  - Iranian Foreign Ministry spokesman Mohammad Ali Hosseini confirms his country
    will hold talks with the United States regarding the security situation in Iraq.
    (Reuters)
