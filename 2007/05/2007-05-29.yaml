Date: '2007-05-29'
Source_URI: Portal:Current events/2007 May 29
Intelligence_Payload:
  Uncategorized:
  - US President George W. Bush nominates former deputy secretary of state Robert
    Zoellick as President of the World Bank. (BBC)
  - U.S. Supreme Court Justice Ruth Bader Ginsburg takes the rare step of reading
    aloud her dissent in Ledbetter v. Goodyear. (Washington Post)
  - Heavy fighting resumes between the Lebanese army and al Qaeda linked militants
    at the Nahr el-Bared refugee camp. (AP via CNN)
  - United States health officials quarantine a man who may have exposed passengers
    on two transatlantic flights to extensively drug resistant tuberculosis. (BBC)
  - Russia successfully tests its new RS-24 ICBM, purportedly designed to defeat present
    and future anti-missile systems. (RIA Novosti) (Interfax-AVN) (The Guardian)
  - Bashar al-Assad is re-elected as President of Syria in an election in which he
    was the only candidate. (BBC)
  - Zheng Xiaoyu, former head of the China's State Food and Drug Administration, is
    sentenced to death for taking bribes to approve untested medicines as Chinese
    authorities introduce a recall system for unsafe food products. (AP via Houston
    Chronicle) (BBC)
  - Ehud Barak, former Prime Minister of Israel, wins the first round of the Israeli
    Labor Party leadership election and faces a runoff against former secret service
    chief Ami Ayalon. (Reuters Alertnet)
  - Adam Air announces a deal which will ensure the recovery of the black boxes from
    Adam Air Flight 574. (Aero-News)
  - Umaru Yar'Adua assumes office as the President of Nigeria. (AP via International
    Herald Tribune)
  Iraqi insurgency:
  - At least 22 people die in a car bombing in central Baghdad. (CNN)
  - Five British nationals are kidnapped from a Finance Ministry building in central
    Baghdad. (BBC) (Reuters)
