Date: '2007-05-19'
Source_URI: Portal:Current events/2007 May 19
Intelligence_Payload:
  Uncategorized:
  - Three people are killed and two wounded in a sniper attack in Moscow, Idaho, United
    States. (BBC)
  - Chelsea F.C. wins the FA Cup Final 2007, defeating Manchester United 1–0 through
    a goal by Didier Drogba in extra time. It was the first final played at a rebuilt
    Wembley Stadium. (BBC) (CNN)
  - The Bulls become the first South African team to the win the Super 14 rugby union
    championship, defeating the Sharks by one point in the final. (Reuters via stuff.co.nz)
  - Former Samoan head of state Malietoa Tanumafili II is buried in Apia. (AP via
    International Herald Tribune)
  - Three German soldiers are killed with four civilians in a suicide bombing in Kunduz
    in northern Afghanistan. (Reuters via Malaysian Star)
  - Romanian voters go to the polls to vote on the impeachment of the President of
    Romania, Traian Băsescu. (BBC)
  - Colombian President Álvaro Uribe has ordered the national army to rescue several
    hostages from FARC rebels, including Íngrid Betancourt, a former senator and presidential
    candidate. (Brunei Times)
  - Curlin wins the Preakness Stakes, extending the Triple Crown drought to 29 years.
    (MSNBC)
  - Starcraft II is announced by Blizzard Entertainment, probably one of the largest
    announcements to come from them in years. (IGN)
