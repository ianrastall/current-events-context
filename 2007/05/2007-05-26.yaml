Date: '2007-05-26'
Source_URI: Portal:Current events/2007 May 26
Intelligence_Payload:
  Uncategorized:
  - A thousand Czech protesters gather in Wenceslas Square in the centre of Prague
    to protest against Czech participation in the United States missile defence system.
    (Xinhua)
  - Iran claims to have uncovered an espionage network run by the United States and
    its allies. (BBC), (CNN)
  - Fianna Fáil performs strongly in the Irish general election, putting it in a strong
    position to retain government. (RTÉ) (AP via the Philadelphia Daily News)
  - Germany celebrates the 175th anniversary of the Hambacher Fest. (SWR)
  - Several thousand Ukrainian Interior Ministry troops head for Kiev in defiance
    of orders to support President Viktor Yushchenko. (BBC)
  - At least 21 people die in western China in landslides caused by heavy rain. (BBC)
  2007 Israel-Gaza conflict:
  - Hamas militants are considering lighter ceasefire terms offered by Fatah, specifically
    Palestinian President Mahmoud Abbas. They are giving Israel until May 27 to respond
    to this agreement, that would only end Israeli operations in the Gaza Strip. Hamas
    has said, however, that they are not completely committed to their offer.
  - Israeli attack helicopters launch missile strikes on a various facilities, including
    a security facility near Palestinian Prime Minister Haniyeh's home. At least three
    people are injured by the air strikes. (Reuters)
  - Israel seizes Palestinian Cabinet Minister of State Wasfi Kabha in a raid conducted
    by the IDF in his village near Jenin. (Reuters via ABC News Online)
  - The IAF bombs Hamas Executive Force housing in Gaza City. At least five Executive
    Force members are killed and 30 other people are wounded. (Reuters)
