Date: '2007-05-27'
Source_URI: Portal:Current events/2007 May 27
Intelligence_Payload:
  Uncategorized:
  - 'Gay rights in Russia: Russian gay rights leaders and foreign dignitaries are
    beaten and arrested in Moscow. Moscow mayor Yuri Luzhkov had denied permission
    for a gay pride parade.(The Guardian)'
  - Nepalese police clash with Bhutanese asylum seekers at a United Nations resulting
    in one 16-year-old boy being killed and a dozen people being injured. (Reuters
    Alertnet)
  - 'Auto racing: Scotland''s Dario Franchitti wins the rain-shortened 91st Indianapolis
    500'
  - 'Iraq War: United States forces rescue 42 Iraqis from an al-Qaeda hideout northeast
    of Baghdad with some captives showing signs of torture. (AP via Nine MSN)'
  - China claims all gold and silver medals in the Table Tennis World Championships
    in Zagreb, Croatia. (Xinhua)
  - President Viktor Yushchenko and Prime Minister Viktor Yanukovych of Ukraine agree
    to a compromise, with early parliamentary elections to be held on September 30.
    (AFP via The Australian)
  - Spanish voters go to the polls in local and regional elections. (BBC)
  - Venezuelan TV station Radio Caracas Television is shut down by the Hugo Chávez
    administration. (BBC)
  - Romanian film 4 Months, 3 Weeks and 2 Days by Cristian Mungiu gets the Palme d'Or
    at the 2007 Cannes Film Festival. (Forbes)
  - Japanese band Zard vocalist Izumi Sakai dies of cerebral contusion in Keio University
    hospital, Shinjuku, Tokyo. (Breitbart)
  2007 Israel-Gaza conflict:
  - Two Qassam rockets land in Israel with at least two casualties in Sderot.
  - The IAF strikes two Hamas posts in the Gaza Strip, with no casualties reported.
    (Reuters) (Ynet)
