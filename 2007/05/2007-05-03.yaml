Date: '2007-05-03'
Source_URI: Portal:Current events/2007 May 3
Intelligence_Payload:
  Uncategorized:
  - Tens of thousands of Israeli protesters at Rabin Square in Tel Aviv call for Prime
    Minister Ehud Olmert and his government to resign over their mishandling of the
    2006 Lebanon war. (BBC)
  - Queen Elizabeth II of the United Kingdom begins a tour of Virginia with a speech
    to the General Assembly of Virginia in Richmond in honour of the 400th anniversary
    of the first permanent English settlement in Jamestown, Virginia. She also meets
    with victims of the Virginia Tech Massacre before departing for Colonial Williamsburg.
    Radio New Zealand(ABC News Australia) London Free Press
  - '2008 United States presidential election: Republican presidential candidates
    debate at the Ronald Reagan Presidential Library in Simi Valley, California. (MSNBC)'
  - The United Kingdom's Ministry of Defence announces plans to release their UFO
    files to the public, seven weeks after France's space agency CNES opened its UFO
    files to the public. (The Register)
  - The Ulster Volunteer Force, a loyalist paramilitary group in Northern Ireland,
    renounces the use of force. (Sky News) (RTÉ)
  - Polling stations open for the Scottish Parliament and National Assembly for Wales
    general elections, and for local council elections in Scotland and parts of England.
    (BBC)
  - Madeleine McCann disappears from her hotel room in Praia da Luz, Portugal.
