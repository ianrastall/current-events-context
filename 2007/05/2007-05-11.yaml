Date: '2007-05-11'
Source_URI: Portal:Current events/2007 May 11
Intelligence_Payload:
  Uncategorized:
  - Samoa's Head of State Malietoa Tanumafili II dies at the age of 94. (AP via IHT)
  - The United States and European Union nations circulate a United Nations resolution
    on independence for Kosovo with international supervision. (CNN)
  - Pope Benedict XVI canonizes Brazil's first native-born saint, Frei Galvão, an
    18th century Franciscan monk. (CNN)
  - Officials begin to evacuate Santa Catalina Island, California, as wildfires on
    the island south of Los Angeles burn out of control. (CNN)
  - The Singapore Grand Prix has been confirmed for the Formula One 2008 season, with
    a planned 4.8km (3.0 miles) long street circuit around the downtown area. It is
    planned to be the event's first night race when safety and logistical concerns
    are addressed. (CNA)
  - Two Serbian reformist parties; the Democratic Party and the Democratic Party of
    Serbia, agree to form a coalition government. (BBC)
  - Tony Blair formally endorses Gordon Brown as his successor, the next Prime Minister
    of the United Kingdom. (AP via Fox News)
  - 'East Timorese presidential election, 2007: it is announced that Prime Minister
    José Ramos-Horta won the election against Francisco Guterres of Fretilin by 69%
    to 31%. (Xinhua)'
  - At least 20 people die in a bus crash near Patna, the capital of Bihar state in
    India. (Fox News).
