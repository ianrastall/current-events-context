Date: '2007-05-17'
Source_URI: Portal:Current events/2007 May 17
Intelligence_Payload:
  Uncategorized:
  - Jaak Aaviksoo, the Estonian Defence Minister, states that the Russian Government
    may be behind recent hacking on Estonian government and commercial web sites following
    the moving of the Bronze Soldier. (Sydney Morning Herald)
  - Paul Wolfowitz announces his resignation effective June 30 as president of the
    World Bank Group after protracted discussions over alleged ethics violations.
    (MSNBC)
  - United States Senate Democratic Party officials seek a vote of no confidence on
    Attorney-General Alberto Gonzales. (CBS)
  - Gordon Brown is confirmed as the next leader of the British Labour Party, taking
    effect on 24 June. Brown will succeed Tony Blair as Prime Minister of the United
    Kingdom when he kisses the hand of Queen Elizabeth II on 27 June. (BBC)
  - '2007 Israel-Gaza conflict: An Israeli aircraft bombs a building of the Hamas-run
    Executive Force in Gaza, killing at least one person and injuring about 45 others.
    (BBC)'
  - Trains travel between North Korea and South Korea for the first time since the
    Korean War. (ITV)
  - Voters in Algeria go to the polls to elect a new People's National Assembly with
    tight security arrangements after recent bomb attacks. (BBC)
  - French President Sarkozy appoints François Fillon as his Prime Minister. (Élysée
    Palace)
  - The Canadian Radio-television and Telecommunications Commission announces that
    all over-the-air TV broadcasts must be digital by August 31, 2011. (The Globe
    and Mail)
  - Hong Kong media regulator receives more than a thousand complaints about the bible
    being too sexual, in what seems to be a response to a recent ruling condemning
    a sex survey in a student newspaper. (Daily Mail)
