Date: '2007-05-25'
Source_URI: Portal:Current events/2007 May 25
Intelligence_Payload:
  Uncategorized:
  - It is announced that the Paul VI Audience Hall in the Vatican is to be fitted
    with over 1,000 photovoltaic panels to supply all its annual electricity requirements.
    (Catholic News Service)
  - A United States Department of Defense report warns of the growing power of the
    Chinese military. (CNN)
  - The widow of Anthony Ashley-Cooper, 10th Earl of Shaftesbury, and her brother,
    are found guilty of the murder of her husband. (BBC)
  - Six foreign oil workers (two British, three American and one South African) have
    been kidnapped in Nigeria. (Sky News)
  - Japanese sources tell the Kyodo news agency that North Korea has test-fired several
    missiles towards the Sea of Japan. (BBC)
  - Ukraine's political crisis worsens after the President of Ukraine Viktor Yushchenko
    fires the prosecutor general Svyatoslav Piskun. Piskun has defied the order and
    his supporters have occupied government buildings. (BBC)
  - NASDAQ agrees to buy OMX AB which runs several stock exchanges in Scandinavia
    and the Baltic states for 25.1 billion Swedish kronor (USD$3.7 billion). (Bloomberg)
  - Exit polls indicate that Taoiseach Bertie Ahern's Fianna Fáil leads in the Irish
    General Election. (RTÉ) (BBC)
  - 2007 Israel-Gaza conflict
  - The IAF carried out an air strike near the residence of Palestinian Prime Minister
    Ismail Haniyeh. The IDF said that the air strike was not targeting the Prime Minister,
    and was on a structure used by Hamas, located in the Shati refugee camp. Local
    residents said that an IAF missile hit a vehicle patrolling Haniyeh's home in
    Gaza, and that the attack wounded one person. (Reuters)
  - The Ostankino Tower has once again caught fire. The BBC reports that the fire
    is believed to be not as serious as that in 2000 and was isolated to a platform
    on the outside of the tower. The fire was successfully extinguished, with no casualties.
    (BBC)
