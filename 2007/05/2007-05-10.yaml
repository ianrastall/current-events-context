Date: '2007-05-10'
Source_URI: Portal:Current events/2007 May 10
Intelligence_Payload:
  Uncategorized:
  - The United States House of Representatives passes a $96 billion war spending measure
    which sets benchmarks for achievements in the Iraq War in return for funding.
    (CNN)
  - Pope Benedict XVI urges tens of thousands of young Brazilian Catholics packing
    the Pacaembu stadium in São Paulo to resist the temptations of wealth, power and
    other "snares of evil," and tells them to promote life from "its beginning to
    natural end." (CNN)
  - Military officers from North Korea and South Korea agree on the first cross-border
    rail link over their heavily fortified border since the Korean War. (BBC)
  - President Bashar al-Assad states that Syria will not cooperate with a United Nations
    tribunal to try suspects in the suspected assassination of former Prime Minister
    of Lebanon Rafiq al-Hariri. (The Guardian)
  - The Grand National Assembly of Turkey votes overwhelmingly in favour of a proposal
    for the direct election of the President of Turkey. (AP via CNN)
  - Syrian dissident Kamal Labwani is jailed for 12 years for allegedly undermining
    national security by visiting the United States. (BBC)
  - The Prime Minister of the United Kingdom Tony Blair announces he will step down
    on June 27, once the Labour Party has elected a successor. (BBC)
