Date: '2007-05-06'
Source_URI: Portal:Current events/2007 May 6
Intelligence_Payload:
  Uncategorized:
  - Palestinian extremists bomb a United Nations-run Gaza elementary school in the
    continuing Palestinian factional violence, killing at least one and wounding at
    least seven. (FOX)
  - HaMoked Center for the Defense of the Individual and B'Tselem, Israeli human rights
    organizations, accuse the Israeli Defense Ministry of abusing Palestinian detainees
    in 73 cases. The Justice Ministry said the report was "fraught with mistakes,
    groundless claims and inaccuracies." (BBC)
  - Foreign Minister Abdullah Gül withdraws his candidacy from the 2007 Turkish presidential
    election after failing to win the support of secular lawmakers. (New York Times)
  - A car bomb kills at least 20 people and injures 80 more in the Baiyaa neighbourhood
    of Baghdad. (AP via CNN)
  - Tens of thousands of Pakistanis greet suspended Chief Justice Iftikhar Chaudhry
    in Lahore. (Reuters via CNN)
  - More than 125,000 people are homeless and 16 killed following recent floods in
    Sri Lanka. (AFP via ABC Online)
  - Eight Afghan police are killed in Farah Province in a clash with the Taliban in
    which at least 17 insurgents are killed or injured. (Reuters Alertnet)
  - Voters in France go to the polls for the second round of the French presidential
    election with socialist Ségolène Royal and conservative Nicolas Sarkozy as the
    two contenders. Exit polls indicate that Nicolas Sarkozy has won the runoff poll
    in the election with 53% of the vote, beating Ségolène Royal who has 47% of the
    vote. She later concedes defeat. (BBC) (BBC)
  - A former World No. 1 ranked tennis player from Belgium, Kim Clijsters, announces
    her retirement effective immediately. (BBC)
