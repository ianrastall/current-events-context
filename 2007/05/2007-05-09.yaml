Date: '2007-05-09'
Source_URI: Portal:Current events/2007 May 9
Intelligence_Payload:
  Uncategorized:
  - The Times and Phoenix TV reports that Huang Ju, Executive Vice Premier of the
    People's Republic of China and a member of the Standing Committee of the Communist
    Party of China, has died in Beijing. However, the State Council of the People's
    Republic of China denies these reports.(Stratfor) (IOL)
  - At least nine Colombian policeman are killed and six others injured from a bomb
    planted by the Revolutionary Armed Forces of Colombia in Santander Department.
    (BBC)
  - The Shanghai Composite Index of the Shanghai Stock Exchange reaches a record high
    4,000 points. (New York Times)
  - Mohammad Baqer Qalibaf is re-elected as the Mayor of Tehran, Iran. (BBC)
  - Pope Benedict XVI arrives in Brazil on his first visit to Latin America to reaffirm
    Catholicism in the region. (Reuters via ABC News Australia)
  - The first named storm of the 2007 Atlantic hurricane season, Subtropical Storm
    Andrea, forms off the southeastern United States. (CNN)
  - Four people in the United Kingdom are arrested in connection with the 7 July 2005
    London bombings. (BBC)
  - People in East Timor finish voting in the second round of the country's first
    presidential election since it gained independence from Indonesia in 2002. (BBC)
  - The United Kingdom Home Office is restructured with a new Ministry of Justice
    being formed to handle prisons, probation and the sentencing of offenders. (UK
    Home Office) (BBC)
  - An international genetic research program identifies a group of genes which may
    cause bipolar disorder. (Daily Telegraph)
  Iraq War:
  - Dick Cheney, the Vice President of the United States, travels to Baghdad to encourage
    reconciliation amongst factions. (AP via Houston Chronicle)
  - At least 12 people die as a truck bomb explodes in Arbil, the capital of the Kurdistan
    Regional Government in Iraq. (Reuters via Sydney Morning Herald)
