Date: '2007-05-05'
Source_URI: Portal:Current events/2007 May 5
Intelligence_Payload:
  Uncategorized:
  - Footage showing seventeen-year-old Kurdish girl Du’a Khalil Aswad being stoned
    to death for having a relationship with a Sunni boy is posted on YouTube. (FOX)
  - More than 20 countries including the People's Republic of China, the United States,
    France, Japan, Chile and South Korea agree to work together to end bottom sea
    trawling. (BBC via ABC News Australia)
  - Kenya Airways states that it has lost contact with Kenya Airways Flight 507, a
    Boeing 737-800 with 115 passengers and crew aboard flying between Douala, Cameroon
    and Nairobi. Kenyan state radio later claims that it crashed in southern Cameroon
    near the town of Niete. (BBC) (AP via USA Today)
  - Five people are killed in attacks by Islamic rebels in the south of Thailand.
    (AFP via ABC News Australia)
  - A third mass rally in support of secularism in Turkey is held in Çanakkale, protesting
    against the Justice and Development Party (AKP) regarding the presidential election.
    (Hürriyet) (Turkish Press)
  - Lightning is determined to be the cause of "the Bugaboo fire" in the Okefenokee
    National Wildlife Refuge in Georgia which eventually spread to Florida charring
    hundreds of thousands of acres. (Orlando Sentinel)
  - Street Sense wins the 133rd Kentucky Derby. (MSNBC)
  - Floyd Mayweather Jr. defeats Oscar De La Hoya in the highest grossing boxing match
    in history. (ESPN)
