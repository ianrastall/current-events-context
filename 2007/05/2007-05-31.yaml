Date: '2007-05-31'
Source_URI: Portal:Current events/2007 May 31
Intelligence_Payload:
  Uncategorized:
  - The National Assembly of Niger passes a motion of no-confidence in the Government
    of Prime Minister of Niger Hama Amadou. (BBC)
  - Japan fails to win in its bid to lift a commercial moratorium on whaling at the
    International Whaling Commission. (News Limited)
  - 'South Thailand insurgency: At least 10 soldiers have been killed in a bomb attack
    by suspected militants in southern Thailand, officials say. (BBC)'
  - Alleged Internet spammer Robert Soloway is arrested after being indicted on charges
    of identity theft, money laundering, and mail, wire, and e-mail fraud. (BBC) (Times
    of India)
  - Qatar Airways orders 80 Airbus A350 planes. (icLiverpool)
  - The Parliament of Latvia selects Valdis Zatlers as the new President of Latvia.
    (Reuters via CNN)
  - A suicide bomber explodes in a police recruitment centre in Falluja, Iraq killing
    at least 20 people. (BBC)
  - Nepal's ruling coalition government announces that elections to a special assembly
    to write a new constitution will be held in November. (BBC)
  - Approximately 100 pro-Taliban insurgents attack the home of a government official
    in northwest Pakistan, killing 13 people. (AP via Houston Chronicle)
  - The Malaysian Federal Court rejects the appeal of Christian convert Lina Joy to
    have the word "Islam" removed from her identity card. (Bernama)
  - In an unannounced vote, the Philadelphia City Council voted to evict the Cradle
    of Liberty Council Boy Scouts from the building they have occupied since 1928.
    (Philadelphia Inquirer)
