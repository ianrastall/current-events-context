Date: '2007-05-30'
Source_URI: Portal:Current events/2007 May 30
Intelligence_Payload:
  Uncategorized:
  - A CH-47 Chinook helicopter on a NATO mission in Helmand Province, southern Afghanistan,
    is shot down killing all seven service personnel (5 American, 1 Canadian and 1
    British) aboard. Taliban fighters claim responsibility for the attack. (CNN) (BBC)
  - The United Nations Security Council establishes an international tribunal to try
    suspects in the killings of Lebanese political figures including the former Prime
    Minister Rafik Hariri. (The Washington Times)
  - Thailand's Constitutional Court clears the Democrat Party of electoral fraud,
    but finds former Prime Minister Thaksin Shinawatra's Thai Rak Thai party guilty
    of bribery and rules it must be disbanded. (BBC) (Reuters)
  - The army is deployed in the Indian state of Rajasthan after 14 people are killed
    in violent clashes over the government's affirmative action plans. (BBC)
