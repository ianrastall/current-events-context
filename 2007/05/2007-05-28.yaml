Date: '2007-05-28'
Source_URI: Portal:Current events/2007 May 28
Intelligence_Payload:
  Uncategorized:
  - Al-Azhar University suspends the lecturer who issued the Breastfeeding fatwa.
    (BBC)
  - The Foreign Office of the British Government submits a formal request to the Russian
    Government for the extradition of ex-KGB agent Andrei Lugovoi to face charges
    over the murder of his former colleague Alexander Litvinenko in London. (BBC)
  - Aid workers claim that at least 17 people have been killed and others abducted
    by Hutu rebels in the Democratic Republic of the Congo. (BBC)
  - 'Iraqi insurgency: At least 19 people die after a car bomb detonates in Baghdad.
    (BBC)'
  - Officials from Iran and the United States hold their first talks since 1980 with
    the topic being the future of Iraq. (ITV)
  - 'Canada: Voters in Prince Edward Island go to the polls for provincial elections.
    (CTV)'
  Japan:
  - Minister of Agriculture Toshikatsu Matsuoka commits suicide, apparently over a
    financial scandal. (AP via CNN) (BBC)
  - Dance instructor Riyo Mori becomes Miss Universe 2007 in Mexico City, the second
    Japanese to do so after Akiko Kojima. (Forbes)
  Venezuela:
  - Government-owned TV Station TVes begins broadcasting in place of Radio Caracas
    Television. (Bloomberg)
  - Thousands protest in Caracas in the hours following the closure of Radio Caracas
    Television. Four people are injured, including one police officer. Police and
    the National Guard use tear gas and rubber bullets to disperse the crowd. (The
    Guardian)
