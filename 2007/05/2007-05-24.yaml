Date: '2007-05-24'
Source_URI: Portal:Current events/2007 May 24
Intelligence_Payload:
  Uncategorized:
  - The United States House of Representatives approves a $US100 billion bill to fund
    the US war effort in Iraq and Afghanistan without a timetable for the withdrawal
    of troops from Iraq. (Reuters via ABC News Australia)
  - 38 Siberian miners are killed and 7 injured by a methane explosion in the Yubileinaya
    coal mine in the Kemerovo Oblast in Russia. (Xinhua)
  - Voting is underway in the Republic of Ireland for a general election after a closely
    fought campaign. (RTÉ) (BBC)
  2007 Israel-Gaza conflict:
  - Israeli soldiers arrest 33 Hamas figures in Nablus, West Bank, including one cabinet
    member, Palestinian Education Minister Naser al-Shaer. (AFP via ABC Australia)
  - Palestinians fire eight Qassam rockets from the Gaza Strip towards the western
    Negev. (Reuters)
  - The IAF makes two air strikes in the Gaza Strip, destroying housing used by the
    Hamas Executive Force and another post in Deir al-Balah. (Ynet)
