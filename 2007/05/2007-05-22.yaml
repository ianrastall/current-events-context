Date: '2007-05-22'
Source_URI: Portal:Current events/2007 May 22
Intelligence_Payload:
  Uncategorized:
  - Premier Gary Doer of the Canadian province of Manitoba secures a third straight
    NDP majority government in the general election. (CTV)
  - Silas Rondeau, the Energy Minister of Brazil, resigns over allegations of corruption
    in a public works project. (BBC)
  - '2007 Israel-Gaza conflict: A total of seven rockets were fired from the Gaza
    Strip and landed in western Negev. Another rocket landed in Sderot and killed
    an Israeli woman. In response, the IAF also fired missiles in an air strike at
    a munitions base, and secondary explosions were reported after the strike. The
    air strike wounded seven people in the attack on Jabaliya, Gaza City, according
    to local residents and hospital officials.(Reuters) (Ynet)'
  - Rowan Williams, Archbishop of Canterbury and spiritual head of the Anglican community,
    declines to invite gay Bishop of New Hampshire Gene Robinson and unrecognized
    conservative Bishop Martyn Minns of the Convocation of Anglicans in North America
    to the 2008 Lambeth Conference. (Reuters)
  - Skybus Airlines, a new U.S.-based ultra-low-cost carrier airline, launches inaugural
    flights to and from Columbus, Ohio, with $10 tickets enabled by on-plane advertising
    and charging people for baggage, pillows, boarding priority, and refreshments.
    (bizjournal via MSN Money) (AP via Signonsandiego.com)
  - A suicide attack occurs at a shopping centre in the Ulus district of Ankara, the
    capital of Turkey. Authorities say there were six fatalities, and 79 injuries.
    (Reuters) (Hürriyet)
  - The U.S. National Oceanic and Atmospheric Administration issues its forecast for
    an above-normal 2007 Atlantic hurricane season with 13 to 17 named storms, 7 to
    10 hurricanes and 3 to 5 major hurricanes. (NOAA)
  - The UK Crown Prosecution Service announces that Andrei Lugovoi, an ex-KGB agent,
    will be charged in connection with the poisoning of Alexander Litvinenko, also
    a former KGB agent. (Press Association via the Guardian)
  - 'Iraq War: A car bomb kills 25 people and injures at least 60 in a commercial
    area in southwestern Baghdad. (Reuters Alertnet)'
