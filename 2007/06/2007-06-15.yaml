Date: '2007-06-15'
Source_URI: Portal:Current events/2007 June 15
Intelligence_Payload:
  Uncategorized:
  - Thousands of Chinese policemen rescue 450 slave workers while arresting 120 suspects.
    (VOA)
  - Mike Nifong, facing disbarment for his actions in the 2006 Duke University lacrosse
    case, agrees to resign his position as district attorney for Durham County in
    the U.S. state of North Carolina. (AP via ESPN.com)
  - Switzerland opens the world's longest rail tunnel on land, the 34-kilometre Lötschberg
    tunnel under the Alps. (BBC)
  - In the UK, seven members of Dhiren Barot's al Qaeda cell are sentenced to a total
    of 136 years in prison. (Sky)
  - Indonesia claims that it has captured Jemaah Islamiyah leader Zarkarsih. (Reuters
    via MSNBC)
  - A roadside bomb kills at least seven soldiers in Yala Province, Thailand. (BBC)
  - United States Secretary of Defense Robert Gates meets with Iraqi Prime Minister
    Nuri Kamal Al-Maliki and U.S. military leaders in Iraq to discuss the effectiveness
    of the current military campaign. (Reuters)
  - Two oil and transport unions begin a strike in Nigeria over an increase in fuel
    duty and a doubling of sales tax. (BBC)
  - Oasis LRT station opened along the East Loop of the Punggol LRT line.
  - Bob Barker's final episode of The Price Is Right aired.
