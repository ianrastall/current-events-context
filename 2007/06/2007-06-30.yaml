Date: '2007-06-30'
Source_URI: Portal:Current events/2007 June 30
Intelligence_Payload:
  Glasgow International Airport attack:
  - A car on fire crashes into the main terminal building of Glasgow Airport. Two
    people are arrested at the scene by police after being subdued by John smeaton
    (born 1976), with one man reportedly on fire as he is being arrested.
  - The airport closes, with all plane flights cancelled and the airport evacuated.
  - COBRA conducts an emergency meeting, and Prime Minister Gordon Brown makes a statement
    afterward in which he thanks emergency services after today's attack and the London
    car bombs plot yesterday.
  - Home Secretary Jacqui Smith announces that the UK terror threat level is elevated
    from "severe" to "critical"—the highest possible, meaning "further attacks are
    imminent"—and everyone should be on "high alert." (BBC)
  - Police treat the incident as a terrorist attack, linked to yesterday's London
    car bombs plot. (BBC)
  - Police arrest two men in Cheshire in connection with the bombings. (Reuters via
    Canada.com)
  Uncategorized:
  - Archbishop Pius Ncube, head of the Catholic church in Zimbabwe, calls on the British
    government to invade Zimbabwe and overthrow President Robert Mugabe. (Times Online)
  - United States troops kill 26 militants in an attack on Sadr City in Baghdad. (ITV)
  - Voters in Papua New Guinea go to the polls to elect a new Parliament of Papua
    New Guinea. (Radio Australia)
  - East Timorese voters go to the polls to elect a new Parliament of East Timor.
    (CNN)
  - Hong Kong celebrates the tenth anniversary of the handover from the United Kingdom
    to the People's Republic of China. (BBC)
