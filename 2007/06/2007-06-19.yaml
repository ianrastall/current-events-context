Date: '2007-06-19'
Source_URI: Portal:Current events/2007 June 19
Intelligence_Payload:
  Uncategorized:
  - A preliminary study by the Netherlands Environmental Assessment Agency indicates
    that China's greenhouse gas emissions have overtaken those of the United States
    for the first time, exceeding those of any other country. (NEAA)
  - French prosecutors launch an investigation into alleged embezzlement by two African
    leaders, Omar Bongo Ondimba of Gabon and Denis Sassou Nguesso of the Republic
    of the Congo. (BBC)
  - Michael Bloomberg, mayor of New York City, leaves the Republican Party and registers
    as an independent. (New York Times)
  - North Korea is reported to have test-fired a short-range missile towards the Sea
    of Japan. (BBC)
  - Two armed robbers are holding several people hostage in a Crédit Lyonnais bank
    in Paris. (Sky)
  - Cadbury Schweppes announces plans to axe around 7,800 jobs from its workforce,
    closing as many as ten manufacturing sites worldwide. (The Times)
  - An early fossil proving that the giant panda was once a pygmy is found. (The Times)
  - Fiji's interim government agrees in principle to elections in 2009, following
    a Pacific Islands Forum assessment, and calls for assistance from the European
    Union and Pacific nations like Australia for funding. (Bloomberg)
  - A candidate in the forthcoming Papua New Guinea election is charged with attempted
    murder of Deputy Prime Minister Don Polye. (ABC News Australia)
  - After Senegal's parliamentary elections, Macky Sall resigns as Prime Minister
    and President Abdoulaye Wade appoints former Deputy Minister for the Budget Cheikh
    Hadjibou Soumaré in his stead.
  Iraq War:
  - The United States military launches Operation Arrowhead Ripper near Baqubah, Diyala
    province, with approximately 10,000 troops involved. (Reuters)
  - The Al-Khilani Mosque is bombed, killing 78. (BBC)
