Date: '2007-06-26'
Source_URI: Portal:Current events/2007 June 26
Intelligence_Payload:
  Uncategorized:
  - Bolivia reclaims two oil refineries from Brazilian state-owned energy company
    Petrobras. (BBC)
  - The militant group Army of Islam, holding BBC Middle East correspondent Alan Johnston
    captive, renews its threat to kill him. (CNN)
  - The Central Intelligence Agency releases the "family jewels," secret documents
    detailing illegal activities—including a plot to hire members of the Mafia to
    assassinate Fidel Castro—and domestic spying. (Reuters)
  - On the eve of Gordon Brown's assuming office as Prime Minister of the United Kingdom,
    Conservative Member of Parliament Quentin Davies defects to the Labour Party.
    (Financial Times)
  - An International Atomic Energy Agency team heads to North Korea to see if Pyongyang's
    nuclear reactor has been shut down. (Reuters)
  - Tony Blair and Arnold Schwarzenegger hold talks at 10 Downing Street on Blair's
    last day as Prime Minister; the environment and climate change are the primary
    issue. (Guardian UK) (Guardian UK)
  - In the United Kingdom, hundreds of people are evacuated from villages in South
    Yorkshire, and a section of the M1 motorway is closed amid fears of an imminent
    collapse of the dam at the Ulley reservoir following heavy rainfall and widespread
    flooding across the UK. (BBC)
