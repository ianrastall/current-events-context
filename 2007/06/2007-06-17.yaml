Date: '2007-06-17'
Source_URI: Portal:Current events/2007 June 17
Intelligence_Payload:
  Uncategorized:
  - Air strikes in Afghanistan on a suspected Al Qaeda headquarters kill several militants
    as well as civilians, including children. (Reuters)(BBC)
  - Ángel Cabrera wins the 2007 U.S. Open Golf Championship at Oakmont Country Club
    in Oakmont, Pennsylvania. (NZPA)
  - Linate Airport in Milan, Italy is closed for three hours at dawn to allow wildlife
    experts to trap 80 hares that have bred in recent months and are confusing ground
    radar. (BBC)
  - Audi wins their seventh 24 Hours of Le Mans in eight years, including their second
    straight win with a diesel R10 prototype. (SpeedTV) (BBC)
  - A Canadian pilot and five British passengers die in a plane crash in Malawi. (Channel
    4 UK)
  - Mahmoud Abbas, president of the Palestinian National Authority, outlaws armed
    factions of Hamas. (CTV)
  - At least 35 people die in Kabul, Afghanistan as the result of a bombing of a police
    bus. (Newswire) (Reuters via ABC News Australia)
  - French voters go to the polls to elect a new French National Assembly. The centre-right
    Union for a Popular Movement (UPM) wins a comfortable majority; however, the left
    did make some gains, with senior minister Alain Juppe losing his seat in Bordeaux.
    (BBC) (Canada East) (Reuters via CNN)
