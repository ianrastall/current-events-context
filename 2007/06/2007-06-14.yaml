Date: '2007-06-14'
Source_URI: Portal:Current events/2007 June 14
Intelligence_Payload:
  Uncategorized:
  - A U.S. federal jury convicts former Klansman James Ford Seale of kidnapping and
    conspiracy in connection with the 1964 deaths of two African-American teenagers
    in Mississippi. (AP via USA Today)
  - Golf's U.S. Open begins at Oakmont Country Club in Oakmont, Pennsylvania. (ESPN)
  - Music producer and alleged con artist Lou Pearlman is arrested in Nusa Dua, Bali,
    Indonesia and deported to the United States territory of Guam. He is accused of
    defrauding over 1,800 individual investors out of a total of $317-million. He
    will eventually be returned to Florida to face criminal charges and a growing
    list of civil litigation. (Orlando Sentinel)
  - Bertie Ahern of Fianna Fáil is elected as Ireland's Taoiseach for a record third
    term upon the opening of the 30th Dáil; the Taoiseach then announces his new cabinet
    with ministries. (RTÉ)
  - Entertainer Michael Barrymore is arrested in the UK along with two others over
    the murder of Stuart Lubbock, who was found dead in Barrymore's swimming pool
    in 2001. (Sky)
  - Lebanon prepares to bury anti-Syrian parliamentarian Walid Eido and nine others
    killed in yesterday's bombing, with a national day of mourning declared. (CNN)
  - 'Iraq War: Three Sunni mosques near Baghdad are burned in apparent retaliation
    for the latest Al-Askari Mosque bombing. (Reuters via ABC News Australia)'
  - The Indian Airlines strike continues for a second day, causing continuing disruption
    to Indian aviation. (BBC)
  - New Zealand condemns the expulsion of its High Commissioner to Fiji, Mike Green,
    by Frank Bainimarama's military government, which gave no reason for the expulsion.
    (BBC)
  - Cuba introduces a United Nations resolution on Puerto Rico calling on the United
    States to expedite Puerto Rico's self-determination process; the text also requests
    the General Assembly to consider the question and urges cleanup of Vieques island
    and release of Puerto Rican political prisoners. (UN)
  - The San Antonio Spurs defeat the Cleveland Cavaliers in Game 4 of the 2007 NBA
    Finals to win the 2007 National Basketball Association Championship. (SI)
  - Sidney Crosby of the Pittsburgh Penguins wins the Hart Memorial Trophy as the
    National Hockey League's most valuable player during the 2006–07 season in the
    annual NHL awards. (TSN)
  Fatah–Hamas conflict:
  - Hamas claims full control of Palestinian Authority security agencies on the Gaza
    Strip. (CNN)
  - Mahmoud Abbas, President of the Palestinian National Authority, dissolves the
    Unity Cabinet and declares a state of emergency. (AFP/Reuters via ABC News Australia)
  - Hamas tightens its control of the Gaza Strip as violence continues. (Reuters)
    (AP)
