Date: '2007-06-07'
Source_URI: Portal:Current events/2007 June 7
Intelligence_Payload:
  Uncategorized:
  - 'Sri Lankan Civil War: Police in Sri Lanka force hundreds of the minority Sri
    Lankan Tamils community out of Colombo for what they say are security reasons.
    (BBC)'
  - Italian police arrest a group of people for allegedly providing material support
    for an al Qaeda-linked organisation, Salafist Group for Call and Combat. (AP via
    CNN)
  - At least 12 citizens of Oman are killed by Cyclone Gonu. (Reuters via Australia)
  - Hamas militants kill a Fatah member, and five other Palestinians are injured in
    a renewal of fighting between the two groups. (AFP via CBS News)
  - The Reserve Bank of New Zealand raises interest rates in New Zealand to 8%, the
    highest level of any industrialised nation. (BBC)
  - American scientists identify a new strain of potentially lethal bacteria called
    Bartonella rochalimae. (AFP via Yahoo! News)
  - Cloture votes fail in the United States Senate on the Comprehensive Immigration
    Reform Act of 2007, potentially killing the bill. (Atlanta Journal-Constitution)
  33rd G8 summit:
  - President of the United States George W. Bush and President of Russia Vladimir
    Putin meet to discuss missile defense. (AP via the Guardian) Putin, in a minor
    reversal of recent rhetoric regarding Bush's European missile shield plans, suggests
    placing a radar installation in Azerbaijan. (The Guardian)
  - G8 leaders reach agreement on a deal to reduce greenhouse gas emissions by 2050.
    (Press Association via the Guardian)
  - Four supposed agent provocateurs who had encouraged peaceful protesters to throw
    stones are unmasked. A police spokesperson points to a possible involvement of
    Intelligence agencies. (Indymedia) (Spiegel)
