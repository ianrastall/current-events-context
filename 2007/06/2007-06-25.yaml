Date: '2007-06-25'
Source_URI: Portal:Current events/2007 June 25
Intelligence_Payload:
  Uncategorized:
  - Three people die in Yorkshire and the Humber as heavy rains and flooding continue
    in England and Wales. (The Telegraph)
  - Conoco Phillips and ExxonMobil reject a deal with PDVSA, the nationalised oil
    company of Venezuela, over the future participation in development of reserves
    in the Orinoco Belt. (BBC)
  - Middle East leaders President of Egypt Hosni Mubarak, President of the Palestinian
    Authority Mahmoud Abbas, Prime Minister of Israel Ehud Olmert, and King Abdullah
    II of Jordan meet to support Abbas' leadership of the Palestinian Authority. Olmert
    announces that he will release 250 Palestinian political prisoners as a gesture
    of goodwill. (BBC)
  - Iran invites the International Atomic Energy Agency to Tehran to discuss its nuclear
    program. (AP via Houston Chronicle)
  - The United States Supreme Court issues three 5–4 split-decision rulings limiting
    student freedom of expression (AP via IHT), barring ordinary taxpayers from challenging
    governmental funding of faith-based initiatives (AP via Guardian Unlimited), and
    allowing "issue ads" to air on television close to election dates. (AP via Guardian
    Unlimited)
  - PMTair Flight U4 241 crashes in Cambodia with 22 on board; there are no survivors.
    (WikiNews)
  - WWE Superstar Chris Benoit, his wife Nancy, and son Daniel were found dead in
    their suburban Atlanta home. We would later find out that Chris would kill Nancy
    and Daniel and then himself.
