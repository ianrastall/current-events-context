Date: '2007-06-08'
Source_URI: Portal:Current events/2007 June 8
Intelligence_Payload:
  Uncategorized:
  - The Council of Europe publishes a report claiming to prove that member states
    Romania and Poland conspired with the American CIA to kidnap and torture suspected
    terrorists. (BBC) (CoE Report)
  - Chinese police rescue 31 workers kept as slaves at a brickworks in Linfen, in
    Shanxi province, run by the son of a local official of the Communist Party of
    China. (Reuters via News Limited)
  - At least 14 people are killed in two bomb explosions in Qurna near Basra in Iraq.
    (BBC)
  - New South Wales in Australia is battered with severe storms, killing at least
    nine people and causing major flooding in Newcastle, the Hunter region, and the
    Central Coast. The coal freighter Pasha Bulker is forced to run aground on Nobby's
    Beach, a major Newcastle beach. (ABC News Australia) (ABC News Australia) (ABC
    News Australia)
  - The Space Shuttle STS-117, flown by Atlantis, is launched with a crew of seven
    on an assembly mission to the International Space Station on mission STS-117.
    (BBC)
