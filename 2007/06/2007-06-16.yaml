Date: '2007-06-16'
Source_URI: Portal:Current events/2007 June 16
Intelligence_Payload:
  Uncategorized:
  - Tupua Tamasese Tupuola Tufuga Efi is chosen as the O le Ao o le Malo of Samoa
    by the Fono. (AAP via News Limited)
  - Mike Nifong is disbarred in the U.S. state of North Carolina for his role in the
    prosecution of the 2006 Duke University lacrosse case. (AP via WRAL)
  - Police in Zimbabwe confiscate opposition leader Arthur Mutambara's passport as
    he tries to leave for South Africa and the United Kingdom. (VOA)
  - The Chinese Ministry of Labour and Social Security undertakes an investigation
    into claims that up to 1,000 minors worked as slave labour in central China. (Reuters
    via ABC News Australia)
  - 'Iraq War: U.S. soldiers find the Common Access Card ID cards of two captured
    U.S. soldiers; Iraqi insurgents had previously released a video containing images
    of the IDs. (CNN)'
