Date: '2007-06-27'
Source_URI: Portal:Current events/2007 June 27
Intelligence_Payload:
  Uncategorized:
  - At least 18 people die in fights between police and gangsters in a Rio de Janeiro
    favela. (BBC)
  - Protesters take to the streets in Iran as the government introduces petrol rationing
    and raises prices. (CNN)
  - Dr. Ashraf Marwan, who had been accused of being a senior Mossad agent operating
    in Egypt prior to the Yom Kippur War, is found dead below the balcony of his home
    in London; Scotland Yard investigates the "unexplained" death. (Haaretz),(Guardian)
  - At least ten people drown and thousands move to higher ground as a cyclone hits
    Balochistan, Pakistan. (CNN)
  - The wreckage of PMTair Flight U4 241 is discovered in Kampot Province, Cambodia;
    all 22 people on board are killed in the crash. (BBC)
  - The Government of Kyrgyzstan abolishes capital punishment. (Nasdaq)
  - Jamaican-born Floridian Barrington Irving becomes the youngest person—and the
    first black person—to fly solo around the world. (Miami Herald)
  Prime Minister Gordon Brown, United Kingdom:
  - Longstanding tradition is abandoned in the House of Commons as every serving Member
    of Parliament, and others, clap and give a standing ovation to Tony Blair after
    he finishes his last Prime Minister's Questions.
  - Queen Elizabeth II accepts the resignation of Tony Blair as Prime Minister.
  - Gordon Brown, MP for Kirkcaldy and Cowdenbeath and former Chancellor of the Exchequer,
    accepts Queen Elizabeth II's invitation to form a new government, becoming the
    new Prime Minister of the United Kingdom.
  - Tony Blair takes the Chiltern Hundreds to stand down as MP for Sedgefield and
    accepts a role as the main Middle East envoy for the Quartet on the Middle East.
    His appointment is announced at the United Nations headquarters. Zalmay Khalilzad,
    United States Ambassador to the United Nations, welcomes the appointment of Blair
    as envoy.
  - Journalists learn that Patricia Hewitt and Margaret Beckett will not be reappointed
    Health Secretary and Foreign Secretary, respectively, when Brown assembles his
    government.
  - Brown begins contact by telephone with U.S. President George W. Bush, French President
    Nicolas Sarkozy, Chancellor of Germany Angela Merkel, Prime Minister of Italy
    Romano Prodi, and Irish Taoiseach Bertie Ahern, discussing working closely together.
    (All of the above, BBC News) (10 Downing Street)
