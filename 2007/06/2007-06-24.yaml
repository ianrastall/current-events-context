Date: '2007-06-24'
Source_URI: Portal:Current events/2007 June 24
Intelligence_Payload:
  Uncategorized:
  - Mauricio Macri, a member of the National Congress of Argentina and president of
    Boca Juniors, is elected as the Chief of Government of Buenos Aires. (Reuters
    via CNN)
  - Ali Hassan al-Majid, better known as "Chemical Ali," is sentenced to death for
    his role in killing 180,000 Kurds under Saddam Hussein. (BBC via ABC News Australia)
  - A roadside bomb hits a United Nations Interim Force in Lebanon patrol, killing
    six Spanish-speaking peacekeepers (three of whom were Colombian) and injuring
    two others. (BBC)
  - More than 200 people die in accidents related to storms in Karachi, Pakistan.
    (ITV)
  Government of the United Kingdom:
  - Gordon Brown becomes the Leader of the Labour Party, replacing Prime Minister
    Tony Blair. Brown will replace Blair on 27 June. (BBC)
  - Harriet Harman becomes Deputy Leader of the Labour Party, replacing Deputy Prime
    Minister John Prescott. She is not expected to follow Prescott as Deputy Prime
    Minister, and won the Labour deputy leadership election with 50.43%, narrowly
    beating Alan Johnson. (BBC)
