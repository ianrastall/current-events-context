Date: '2007-06-10'
Source_URI: Portal:Current events/2007 June 10
Intelligence_Payload:
  Uncategorized:
  - The Palestinian Journalist Syndicate criticizes Islamic Jihad militants for using
    a vehicle marked with a "TV" sign to approach Gaza's frontier border with Israel
    in an attempt to kidnap an Israel Defense Forces soldier from a position across
    the border. (Haaretz)
  - On the Sunday talk show Meet the Press, former U.S. Secretary of State Colin Powell
    calls for the immediate closure of the Guantanamo Bay detention camp. (NBC News)
  - France holds a parliamentary election; early projections indicate that President
    Nicolas Sarkozy's center-right UMP party will secure a comfortable victory. (BBC)
  - Belgium holds a general election. Liberal Prime Minister Guy Verhofstadt is expected
    to lose power to the Christian Democrats of Yves Leterme. (Reuters)
  - Five people are killed in a ferry fire in the Philippines. (AP)
  - President of Afghanistan Hamid Karzai escapes an apparent assassination attempt.
