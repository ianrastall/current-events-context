Date: '2007-06-06'
Source_URI: Portal:Current events/2007 June 6
Intelligence_Payload:
  Uncategorized:
  - Tens of thousands of people are evacuated from Oman as Cyclone Gonu arrives. (CNN)
  - The Anaheim Ducks defeat the Ottawa Senators to win the Stanley Cup in five games.
    (AP via Charlotte Observer)
  - HIV drug Viracept is recalled in the UK after it is discovered that it has been
    contaminated with a substance that could cause cancer. (Sky)
  - Armed forces from Turkey are reported to have crossed the border into Iraq, chasing
    Kurdish guerrillas a couple of miles in Iraqi territory. Other reports contradict
    this. (CNN)
  - Five people are acquitted of the 1982 murder of "God's Banker," Italian financier
    Roberto Calvi. (Sky)
  - During a weekly audience with Pope Benedict XVI, a man leaps over metal barriers,
    attempting to jump into the popemobile. He was promptly wrestled to the ground
    (without the Pope's even noticing) and was then taken into the custody of Vatican
    police. (BBC News)
  - Leaders of the G8 assemble in Rostock, Germany for the 33rd annual G8 summit to
    discuss primarily issues of climate change and international aid, but also U.S.-Russia
    tensions over an antimissile system in Europe. (Reuters via CNN)
  - Dozens of people are trapped in a collapsed hall in Leshan in the southwestern
    province of Sichuan in China. (BBC)
