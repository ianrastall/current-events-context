Date: '2007-06-02'
Source_URI: Portal:Current events/2007 June 2
Intelligence_Payload:
  Uncategorized:
  - The U.S. Navy dock landing ship USS Carter Hill confronts pirates off the coast
    of Somalia after they had hijacked a Danish merchant vessel, the MV Danica White.
    (AP via USA Today)
  - Israeli troops kill a Palestinian shopkeeper and seriously injure another in the
    West Bank town of Nablus. (BBC)
  - Three suspects are arrested in relation to a terrorism plot involving John F.
    Kennedy International Airport in New York City, with a fourth suspect being sought.
    (CNN)
  - Scotland Yard detectives who went to Jamaica to probe Bob Woolmer's death come
    to the verdict of the murder investigation, saying that Bob Woolmer died of heart
    failure and was not murdered. (FOX) (BBC)
  - Thousands of protesters and antiglobalisation demonstrators gather in Rostock,
    Germany to protest the 33rd G8 summit to be held in Heiligendamm later in the
    week. (Chicago Tribune)
  - Sporadic violence breaks out, with police attacked by rocks and bottles and some
    cars burned; some 100 police officers are injured. (Sky News)
  - The President of Algeria Abdelaziz Bouteflika accepts the resignation of his Cabinet
    after recent elections. The Prime Minister of Algeria Abdelaziz Belkhadem is expected
    to retain his position when a new Cabinet is chosen. (BBC)
  - The United States Federal Bureau of Investigation names Alexis Flores as the 487th
    person placed on the FBI Ten Most Wanted Fugitives list. He is wanted for the
    kidnapping, rape and murder of a five-year-old girl in Philadelphia, Pennsylvania.
    (UPI)
