Date: '2007-06-04'
Source_URI: Portal:Current events/2007 June 4
Intelligence_Payload:
  Uncategorized:
  - The United Nations Environment Programme estimates that 40% of the world population
    will be affected by the loss of glaciers and snow on the mountains of Asia due
    to global warming. (UNEP)
  - A massive mudflow destroys Eurasia's unique Geyser Valley. (The Independent)
  - The United States government arrests ten people, including former Laotian Army
    general Vang Pao, on charges of organizing a plot to overthrow the Laotian government.
    (CNN)
  - The government of Nigeria sues pharmaceutical company Pfizer for $6.95-billion
    in damages. (Reuters)
  - The Palestinian government agrees on the terms of a cease-fire proposal for Israel.
  - Fresh clashes break out between protesters and police in Rostock, Germany prior
    to the 33rd G8 summit. (AFP via News Limited)
  - Cyclone Gonu forces the Government of Oman to evacuate 7,000 people from Masirah
    Island, off the east coast of Oman. (AP via Seattle Post-Intelligencer)
  - A military judge dismisses terrorism-related charges against a Canadian Guantanamo
    Bay detainee charged with killing a United States Army soldier in Afghanistan.
    (CNN)
  - Russian President Vladimir Putin announces that Russia may consider targeting
    new sites across Europe with nuclear weapons if part of the United States' nuclear
    capability is introduced into Europe. (Kremlin.ru) The United States and NATO
    condemn Putin's stance. (CNN) (Reuters)
  - China publishes its first National Action Plan on Climate Change, expected to
    cut national carbon emissions by up to 1.5 million metric tons annually by 2010.
    (Xinhua)
  - The war crimes trial of former President of Liberia Charles G. Taylor at the UN-backed
    Special Court for Sierra Leone begins at The Hague. (The Southern African)
  - The London Organising Committee for the Olympic Games unveils the official logo
    for the 2012 Summer Olympics and 2012 Paralympics, to be held in London, England.
    (BBC)
  Sri Lankan Civil War:
  - Two Red Cross aid workers are found dead after being detained for questioning
    by unknown men claiming to be police. (BBC)
  - There is heavy fighting in the north of Sri Lanka, with both the Army and the
    Tamil Tigers claiming that they have inflicted heavy casualties on their opponents.
    (BBC)
