Date: '2007-06-09'
Source_URI: Portal:Current events/2007 June 9
Intelligence_Payload:
  Uncategorized:
  - The Central Intelligence Organization arrests almost 400 soldiers in Harare, Zimbabwe
    for allegedly plotting to overthrow President Robert Mugabe. Air Vice Marshal
    Elson Moyo, Major General Engelbert Rugeje, and Colonel Ben Ncube are allegedly
    the ringleaders. (ZWNews)
  - Russia warns the United States to halt its missile defense system in central Europe
    in order to continue further talks. (BBC)
  - U.S. President George W. Bush calls for a UN-backed action over Kosovo's independence
    despite Russian and Serbian opposition. (BBC)
  - Racehorse Rags to Riches becomes the first filly to win the Belmont Stakes in
    102 years by defeating Preakness winner Curlin. (AP via The Citizen)
