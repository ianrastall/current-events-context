Date: '2007-06-21'
Source_URI: Portal:Current events/2007 June 21
Intelligence_Payload:
  Uncategorized:
  - Lebanon declares victory over Fatah al-Islam, an Al Qaeda-linked group, after
    a month-long battle at a Palestinian refugee camp. (Reuters via Daily Times)
  - Inflation in Zimbabwe reaches 9,000%, the highest in the world. (CNN)
  - NASA postpones the landing of Atlantis at Kennedy Space Center due to inclement
    weather, prolonging STS-117 for another day. NASA states that it can extend the
    mission until June 24 if necessary. (CNN)
  - A polar blast moving north over the South Island of New Zealand causes major disruptions
    and claims at least one life. (One)
  - The United Nations-backed Special Court for Sierra Leone finds three leaders of
    the Armed Forces Revolutionary Council—Alex Tamba Brima, Brima Bazzy Kamara, and
    Santigie Borbor Kanu—guilty of war crimes. (AP via CNN)
  - The President of Egypt, Hosni Mubarak, invites the leaders of the Palestinian
    Authority, Israel, and Jordan to a summit on Sunday to discuss the Palestinian
    crisis. (FOX)
  - The Kuwaiti government condemns the besieging of its embassy in Iran and the beating
    of a diplomat, regarding it as an "attack on Kuwait." The Iranian Foreign Ministry
    says it regrets that the incident occurred. (Gulf News)
  - Deposed Prime Minister of Thailand Thaksin Shinawatra is ordered to return to
    Thailand to face charges in an asset-concealment case. (UPI)
  - Japan changes the name of Iwo Jima to its original name, Iwo To, to reflect the
    wishes of its original inhabitants. (BBC)
