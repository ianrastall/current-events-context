Date: '2007-06-12'
Source_URI: Portal:Current events/2007 June 12
Intelligence_Payload:
  Uncategorized:
  - Nigerian author Chinua Achebe wins the Man Booker International Prize in honour
    of his career. (BBC)
  - Ehud Barak, former Prime Minister of Israel, declares victory in a vote for the
    leadership of the Israeli Labor Party, with 51.5% of the vote compared to 47.5%
    for former security chief Ami Ayalon. (AFP via ABC News Australia)
  - The PKK declares that it will stop attacks on Turkey but will defend itself if
    attacked. (AP via the Kansas City Star)
  - Jamaican police declare that former Pakistani cricket team coach Bob Woolmer died
    of natural causes, ending a murder investigation. (Radio Jamaica)
  - Severe rain causes flash flooding throughout Ireland, where places have been flooded
    after just 30 minutes of rain, particularly in Ulster. This brings to an end a
    period of very warm temperatures of up to 29 °C (84 °F) on the island. The town
    of Omagh and parts of Belfast are worst hit. (RTÉ) (Irish Independent) (UTV) (BBC)
  - Mudslides and floods kill nearly 130 in Bangladesh. Rescuers find 20 more bodies
    buried under mud in Chittagong, bringing the total number of flood-related deaths
    to nearly 130. (Reuters)
  - Milan Martić is found guilty of murder and persecution committed while he was
    leader of the Krajina Serb republic between 1991 and 1995. (BBC)
  - Afghan officials claim that seven members of the Afghan police were killed by
    Coalition air forces in a friendly fire incident. (Reuters)
  - 'Palestinian factional violence: Hamas officials report that a rocket-propelled
    grenade has been fired at the house of Prime Minister Ismail Haniyeh, causing
    damage but no injuries. (AP via Forbes)'
  - Structural failure is suspected after the top two floors of a five-storey building
    collapse in central London's Dean Farrar Street. (BBC)
