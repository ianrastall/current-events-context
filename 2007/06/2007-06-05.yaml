Date: '2007-06-05'
Source_URI: Portal:Current events/2007 June 5
Intelligence_Payload:
  Uncategorized:
  - The British Antarctic Survey announces that the flow rate of 300 previously unmeasured
    glaciers increased by 12% between 1993 and 2003, adding to concerns over glacier
    retreat and the rise in sea levels caused by global warming. (British Antarctic
    Survey)
  - A Guyanese suspect who allegedly planned an attack on New York City's JFK Airport
    surrenders in Port of Spain, Trinidad and Tobago. (Sky)
  - 'United States v. Libby: I. Lewis "Scooter" Libby, Jr., former chief of staff
    to Vice President Dick Cheney, is sentenced to 30 months in prison after being
    convicted of perjury and obstruction of justice in the CIA leak grand jury investigation.
    (CNN)'
  - U.S. President George W. Bush begins his tour of Europe in Prague before the G8
    summit in Germany. During his visit, he intends to address the deployment of interceptor
    rockets, the establishment of radar bases in Poland and the Czech Republic, and
    the related tension that has arisen between the United States and Russia. (BBC)
  - Spanish Basque separatist group ETA announces it will end its 15-month cease-fire
    tonight at midnight (CEST). (RTÉ)
  - Thailand's interim government removes a ban on political party activities. (BBC)
  - Eleven people are killed and around 30 injured in a train crash 10 kilometres
    north of Kerang, Victoria, Australia. (BBC) (RTÉ)
