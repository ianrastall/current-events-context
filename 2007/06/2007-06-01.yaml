Date: '2007-06-01'
Source_URI: Portal:Current events/2007 June 1
Intelligence_Payload:
  Uncategorized:
  - In the Amazon Rainforest, a new tribe of indigenous people is discovered. The
    tribe is called "Metyktire" and is a subgroup of the Kayapo tribe. (The Star)
  - The U.S. Food and Drug Administration warns consumers to discard all toothpaste
    made in China after discovering diethylene glycol, a poison related to a chemical
    used in antifreeze, in some samples. (New York Times)
  - The Ukrainian parliament votes to approve a package of legislation clearing the
    way for a parliamentary election on September 30. (BBC)
  - Militants launch two attacks on the Indian Army in Indian-administered Kashmir,
    resulting in two soldiers killed and 19 injured. (CNN)
  - Dr. Jack Kevorkian is released from prison after serving 8 years for assisting
    terminally ill patients with suicide. (Washington Post)
  - The Palestinian Army of Islam militant group posts a video of the BBC's kidnapped
    Middle East correspondent, Alan Johnston, on a website. (ITV)
  - '2007 North Lebanon conflict: Fighting resumes at the Nahr el-Bared camp between
    the Lebanese Army and Fatah al-Islam. (AP via Houston Chronicle)'
  - Thousands of South African public sector workers go on strike for a 12% pay raise
    for the second Friday in a row. (BBC)
  - Fiji lifts the state of emergency that was imposed during the 2006 Fijian coup
    d'état. (The Australian)
  - A United States Navy destroyer, the USS Chafee, fires on suspected terrorists
    staying in Puntland, in northern Somalia. The three suspects are accused in taking
    part in the 1998 bombings of the United States embassies in Kenya and Tanzania.
    (MSNBC)
