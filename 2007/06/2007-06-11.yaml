Date: '2007-06-11'
Source_URI: Portal:Current events/2007 June 11
Intelligence_Payload:
  Uncategorized:
  - A three-judge panel of the United States Court of Appeals for the Fourth Circuit
    in Richmond, Virginia rules that the United States government cannot indefinitely
    detain U.S. residents as "enemy combatants." (AP via CNN)
  - At least 78 die in monsoons in Bangladesh. (AP via CNN)
  - Two-thirds of the Iraqi Council of Representatives removes Speaker of the Council
    of Representatives Mahmoud al-Mashhadani due to repeated acts of violence to other
    members by him or his staff. (New York Times)
  - Flooding in the southern Chinese provinces of Guangdong, Guangxi, Guizhou, Hunan,
    Fujian, and Jiangxi damage agricultural land and crops, kill 66 people, and force
    600,000 people from their homes. (BBC)
  - Majeedah Bolkiah—daughter of Hassanal Bolkiah, Sultan of Brunei—marries Khairul
    Khalil, an official in the office of the Prime Minister in a lavish Islamic wedding
    ceremony. (AP via Yahoo! News)
  - Newcastle, New South Wales remains on alert for rising floodwaters from the Hunter
    River as people evacuated from Maitland, New South Wales return to their home.
    (AAP via the West Australian)
