Date: '2007-06-29'
Source_URI: Portal:Current events/2007 June 29
Intelligence_Payload:
  Uncategorized:
  - The EPR nuclear power plant, under construction in Finland and 18 months behind
    schedule, is reported as having a number of safety-related design and manufacturing
    "deficiencies." (New Scientist)
  - Spanish scientists find fossil evidence of humans living in Europe over a million
    years ago in Burgos, Spain. (Xinhua via the Hindu)
  - Rebels unsuccessfully try to assassinate Guillaume Soro, Prime Minister of Ivory
    Coast, but kill three others in a rocket attack. (Bloomberg)
  - British police defuse a bomb in Central London; a second bomb is found hours later.
    (CNN) (The Globe and Mail)
  - At least 13 people die in clashes between militants and Indian security forces
    in Jammu and Kashmir. (BBC)
  - The European Union revises its list of designated terrorist organizations, removing
    Anti-Imperialist Territorial Units, Unit for Revolutionary Proletarian Initiative,
    and Units for Proletarian Initiative while adding Revolutionary Struggle. (Payvand)
  - After 16 years of existence, the (U.S.) National Football League announces that
    it will shut down its European operation known as NFL Europa, with immediate effect.
    (NFL.com)
  - Apple Inc. releases the iPhone to great fanfare.
  - The Free Software Foundation releases version 3 of the GNU General Public License
