Date: '2007-06-22'
Source_URI: Portal:Current events/2007 June 22
Intelligence_Payload:
  Uncategorized:
  - Inflation in Zimbabwe rises to 11,000%; U.S. ambassador Christopher Dell predicts
    it will reach 1.5 million percent by December. (BBC News)
  - '2007 Israel-Gaza conflict: IDF soldiers near Hebron shoot an unarmed Palestinian,
    who later died. The IDF states that the man was trying to run through the gate;
    the soldiers yelled for him to halt, which he did not; they then shot the man.
    (Ynetnews)'
  - Director Michael Hayden of the United States Central Intelligence Agency announces
    plans to declassify documents detailing illegal activities performed by the agency
    between 1950 and 1980, including assassination plots, domestic spying and wiretapping,
    kidnapping, and human experiments. (BBC)
  - Space Shuttle Atlantis lands safely at Edwards Air Force Base in California after
    inclement weather had prevented its programmed landing at the Kennedy Space Center
    in Florida, ending STS-117. (ABC News Australia)
  - An F5 tornado, the strongest recorded in Canada, hits the small community of Elie,
    Manitoba.
