Date: '2007-02-15'
Source_URI: Portal:Current events/2007 February 15
Intelligence_Payload:
  Uncategorized:
  - Democratic Party officials in the U.S. Congress have warned President Bush that
    he does not have the authority to go to war with Iran. (BBC)
  - Abu Ayyub al-Masri, the leader of al-Qaeda in Iraq, has been wounded in fighting
    in Baghdad according to Arab TV stations. (BBC)
  - Six Colombian legislators are arrested due to alleged links to paramilitary groups
    including Senator Álvaro Araújo, the brother of Foreign Minister María Consuelo
    Araújo. (BBC)
  - Former U. S. Vice President Al Gore announces plans for Live Earth concerts across
    seven continents in July 2007 to raise awareness of global warming. (Washington
    Post)
  - The Secretary-General of the United Nations Ban Ki-moon ;clams that the Sudanese
    government had broken a promise to allow a human rights mission into Darfur. (Reuters
    Alertnet)
  - An Air Mauritania plane with 79 people on board is hijacked, and lands safely.
    (BBC)
  - The Iranian government says members of Jundallah were responsible for yesterday's
    attack in Zahedan, Iran. An Iranian lawmaker accuses the Pakistani government
    of harboring Jundallah militants. (Gulf Times)
  - The Hamas-led Palestinian government has resigned to make way for a new administration.
    The Palestinian Prime Minister Ismail Haniyeh remains as caretaker Prime Minister
    and will select a new cabinet. (Reuters/AFP via ABC Online Australia)
  - South Korea agrees to resume high level talks with North Korea following the deal
    over North Korea's nuclear program. (AFP via ABC Online)
  - The United States will build a military communications facility near Geraldton,
    Western Australia. (AP via IHT)
  - The Foreign Minister of China, Li Zhaoxing, is visiting Japan hoping to improve
    bilateral relations between the nations. The Chinese Prime Minister Wen Jiabao
    will visit Japan in April. (BBC)
  - Chris Ellison, the Australian Minister for Justice, warns anti-whaling protesters
    and the Japanese whaling fleet that they could face questioning over recent clashes
    in the Southern Ocean. Meanwhile, the crew were evacuated from the largest ship
    in the Japanese Antarctic fleet, the Nisshin Maru, following a fire. (ABC News
    Australia Online)
  - The trial of 29 suspects in relation to the 2004 Madrid train bombings begins
    in Madrid, Spain. (BBC)
  - The European Union plans to set up a single hotline for parents to report missing
    children. (BBC)
