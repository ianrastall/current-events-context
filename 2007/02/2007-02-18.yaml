Date: '2007-02-18'
Source_URI: Portal:Current events/2007 February 18
Intelligence_Payload:
  Uncategorized:
  - Shane Gibson, the Minister for Immigration for the Bahamas, resigns over rumours
    of a relationship with Anna Nicole Smith after he had fast tracked her application
    for permanent residency. (AP via AccessHollywood)
  - Bangladeshi Nobel Peace Prize winner Muhammad Yunus announces the name of the
    party he wants to found; it is to be called Citizens' Power. (Daily Times)
  - Israeli Police Commissioner Moshe Karadi resigns after a Government commission
    finds that he ignored links between senior officers and underworld figures and
    failed to ensure a proper investigation of a 1999 killing of an alleged crime
    boss. (AP via Boston Globe)
  - '2007 South Thailand bombings: 28 bombs explode in southern Thailand, killing
    three and injuring 50. Militants burn two public schools and shoot three people
    during the South Thailand insurgency. (New York Times)'
  - 'Islamist insurgency in Somalia: A car bomb explodes in Mogadishu killing at least
    four people. It is the first ever car bomb in the capital. (Somalinet)'
  - The U.S. and Israel will not work with a new Palestinian unity government unless
    it recognises Israel, Prime Minister Ehud Olmert has said. (BBC)
  - Police in Pakistan detain 36 people, mainly Afghan refugees, over a suicide bombing
    inside a Quetta courtroom that killed a judge and 15 other people. (CNN)
  Iraq War:
  - '18 February 2007 Baghdad bombings: At least 56 people are killed and more than
    120 injured in two car bombs in a Shia district of Baghdad, police sources have
    said. (BBC)'
  - U.S. marine Robert Pennington is sentenced to eight years in military prison for
    his role in the killing of an Iraqi civilian. (BBC)
  War in Afghanistan (2001–2021):
  - Eight U.S. troops are killed and 14 wounded in a helicopter crash in south-eastern
    Afghanistan, the U.S.-led coalition has said. (BBC)
