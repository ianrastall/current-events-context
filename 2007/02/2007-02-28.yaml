Date: '2007-02-28'
Source_URI: Portal:Current events/2007 February 28
Intelligence_Payload:
  Uncategorized:
  - The President of Bolivia Evo Morales declares the Bolivian floods as a national
    disaster with 35 deaths and 72,000 people becoming homeless. (CNN)
  - Marthinus van Schalkwyk, the South African Minister for the Environment, releases
    a plan to control the elephant population which contains culling as a last resort.
    (New York Times)
  - 'United States Presidential Election, 2008: Senator John McCain (R- AZ) announces
    his candidacy for president on the Late Show with David Letterman. (FOX)'
  - Romano Prodi, the Prime Minister of Italy, survives a no-confidence motion in
    the Senate. (CNN)
  - Airbus announces plans to cut 10,000 jobs across Europe in the next four years.
    (AFP and ABC News Australia)
  - The European Union announces plans to make significant cuts to the European Union
    Force in Bosnia-Herzegovina. (BBC)
  - Strong wind blows a passenger train off the tracks near Turpan, Xinjiang, China,
    killing four and injuring 30 more. (China Daily)
  - Authorities monitor a volcano on the island of Stromboli off the north coast of
    Sicily as lava pours down its slope for a second successive day. (AP via Washington
    Post)
  - 'Cuba-United States relations: Carlos and Elsa Alvarez are sentenced to five and
    three year prison terms respectively after being convicted of spying for the Cuban
    government. (BBC)'
  - Two paintings by Pablo Picasso, Maya with Doll and Jacqueline, have been stolen
    from the painter's granddaughter's apartment in Paris, France. (The Times)
  - 'Iraq War: A car bomb kills at least 10 people in Baghdad. (AP via Washington
    Post)'
  - Japan abandons its whaling hunt in the Southern Ocean for this year due to the
    damage caused to the Nisshin Maru. (ABC)
  - The Sri Lanka Navy kills at least fifteen members of the Tamil Tigers as they
    try to infiltrate the port of Trincomalee. (AP via the Hindu)
  - Finance Minister of Thailand Pridiyathorn Devakula resigns over differences of
    opinion with the Prime Minister of Thailand Surayud Chulanont. (BBC)
