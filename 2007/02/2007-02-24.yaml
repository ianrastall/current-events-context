Date: '2007-02-24'
Source_URI: Portal:Current events/2007 February 24
Intelligence_Payload:
  Uncategorized:
  - The Virginia General Assembly votes unanimously in favor of a motion expressing
    "profound regret" for Virginia's role in promoting slavery, which is the first
    apology for slavery passed by a U.S. state legislature. (AP via Boston Globe)
  - Thousands of people in Madrid, Spain, protest a decision by the Supreme Court
    to reduce the sentence served by Basque separatist Iñaki de Juana Chaos, who has
    been on a hunger strike for 110 days. (BBC)
  - 'Iraq War: At least 39 people are killed and 61 injured as a car bomb explodes
    at a mosque in Habbaniya. (CNN)'
  - The official inquiry into the Grayrigg rail crash starts with early investigations
    focusing on a set of points. (BBC)
  - Vice President of the United States Dick Cheney warns Iran that "all options are
    on the table" if it continues to defy the international community about its nuclear
    program. (AP via Jerusalem Post)
  - Mario Chanes de Armas, one of the leaders in the Cuban revolution dies, 80 years
    old. After breaking with Castros authoritarian leadership, he was imprisoned for
    30 years, longer than any other political prisoner anywhere. (New York Times)
