Date: '2007-02-16'
Source_URI: Portal:Current events/2007 February 16
Intelligence_Payload:
  Uncategorized:
  - The G8 countries, plus Brazil, China, India, Mexico and South Africa, approve
    the 'Washington Declaration,' proposing a global Carbon emissions trading system
    to replace the Kyoto Protocol by 2009. (BBC)
  - Palestinians clash with Israeli police in East Jerusalem over archaeological excavations
    near the al-Aqsa mosque. (Reuters via ABC Australia Online)
  - Jundallah militants set off a second bomb in Zahedan, Iran. Firefights with Iranian
    police ensue. Casualties are unknown. (CBS News)
  - A Turkish court sentences seven convicted Al Qaeda associates to life imprisonment
    for their involvement in the 2003 Istanbul bombings. (AFP via ABC Australia Online)
  - Abdul Tawala Ibn Ali Alishtari is charged in New York, New York with financing
    terrorism and material support of terrorism for allegedly passing on money for
    a training camp in Afghanistan. (AP via IHT)
  - General Motors is rumored to be in talks to buy DaimlerChrysler AG's struggling
    Chrysler Group in its entirety. (CNN)
  - The United States House of Representatives passes House Concurrent Resolution
    63; a non-binding resolution criticising U.S. President George W. Bush's Surge
    Plan in Iraq. (BBC) (Clerk.House.gov)
  - An Italian judge has ordered 26 U.S. citizens, most of them CIA agents, to stand
    trial over the kidnapping of an Egyptian cleric in Milan in 2003. (BBC)
  - Abu Ayyub al-Masri, the current leader of al-Qaeda in Iraq, has been wounded in
    fighting in Baghdad according to Arab TV stations; however, the U.S. government
    denied the report.(BBC)
  - The President of Afghanistan Hamid Karzai meets with the Prime Minister of Italy
    Romano Prodi to discuss Italian contributions to the fight against the Taliban
    and drug traffickers in Afghanistan. (BBC)
  - Singer Britney Spears controversially shaves her head.
