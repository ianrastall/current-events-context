Date: '2007-02-23'
Source_URI: Portal:Current events/2007 February 23
Intelligence_Payload:
  Uncategorized:
  - The Federal Communication Commission of the United States removes the CW requirement
    for Amateur radio licensing . (ARRL)
  - Five people are killed and more than 40 people injured in fighting between two
    families associated with Hamas and Fatah respectively in Khan Younis on the Gaza
    Strip. (New York Times)
  - The United States and South Korea reach agreement to return control over South
    Korea's military to South Korea by 2012. (BBC)
  - Prime Minister of Papua New Guinea Michael Somare disbands an inquiry into the
    extradition of Julian Moti to the Solomon Islands to avoid extradition to Australia.
    (ABC News Australia)
  - At a summit in Oslo, Norway, forty-six nations agree to work towards a treaty
    banning the use of cluster bombs. (AP via Forbes)
  - 'Grayrigg derailment: A Virgin Pendolino train derails in Cumbria, United Kingdom,
    killing one person and injuring dozens more. (BBC)'
  - A fire in a nursing home in Alsunga, Latvia, kills at least 26 people. (BBC)
  - Pakistan successfully tests a new version of its Shaheen-II missile]] capable
    of carrying nuclear warheads. (AP via CNN)
  - The Sri Lanka Navy sinks two Tamil Tiger boats off the northwest coast killing
    nine rebels. (BBC)
  Iraq War:
  - Democratic Party members of the United States Senate are planning a challenge
    to the authority given to President Bush in 2002. (BBC)
  - Ammar al-Hakim, son of Abdul Aziz al-Hakim, leader of the Supreme Council for
    the Islamic Revolution in Iraq is detained by the U.S. military as he returns
    from Iran and is released with an apology 12 hours later. (AP via Houston Chronicle)
  Australia:
  - New South Wales, Queensland and South Australia as well as the Australian Capital
    Territory have agreed to hand over control of the Murray–Darling basin to the
    federal government. Negotiations continue with Victoria. (Bloomberg)
  - Vice President of the United States Dick Cheney expresses concern about China's
    military buildup in a speech to the Australian–American Leadership Dialogue in
    Sydney. (CNN)
