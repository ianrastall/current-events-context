Date: '2007-02-22'
Source_URI: Portal:Current events/2007 February 22
Intelligence_Payload:
  Iraq War:
  - The U.S. military reports that a helicopter was shot down north of Baghdad. (BBC)
  - '2007 chlorine bombings in Iraq: U.S. military officials say they are concerned
    about recent attacks by insurgents involving poisonous chlorine gas. (BBC)'
  - Prince Harry will serve a tour of duty in Iraq as part of the Blues and Royals
    regiment of the British Army. (New York Times)
  - United States Army Sergeant Paul Cortez is sentenced to 100 years in prison with
    the possibility of parole after ten years for his role in the gang rape and murder
    of a 14-year-old Iraqi girl and the murder of her family. (AP via USA Today)
  Uncategorized:
  - Leaders of Italy's centre-left coalition have agreed to support Romano Prodi and
    a 12-point program meaning that he can resume serving as Prime Minister of Italy.
    (Reuters via Swissinfo)
  - Abdel Kareem Soliman is convicted of insulting Islam and Egyptian President Hosni
    Mubarak on his weblog and is sentenced to four years in prison. (BBC)
  - Four men are arrested in Guatemala for the killing of three Central American Parliament
    members from El Salvador and their driver. (AP via CNN)
  - Japan records a trade surplus of ¥4.4 billion in January due to lower oil prices
    and strong exports. (Reuters via CNN)
  - Vice-President of the United States Dick Cheney arrives in Australia to discuss
    issues including Iraq, Afghanistan and the detention of David Hicks with the Australian
    government. Upon arrival he is greeted by violent demonstrations. (Sydney Morning
    Herald)
  - Seven people are detained in India in relation to the 2007 Samjhauta Express bombings.
    (NDTV)
  - A fire breaks out on an Indonesian ferry, the Levina 1, carrying 350 passengers
    shortly after it leaves Jakarta. (BBC)
  - Cyclone Favio hits central Mozambique. (BBC)
