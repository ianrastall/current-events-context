Date: '2007-02-25'
Source_URI: Portal:Current events/2007 February 25
Intelligence_Payload:
  Uncategorized:
  - 'Iran''s nuclear program: Ministers from Egypt, Indonesia, Jordan, Malaysia, Saudi
    Arabia, Turkey and Pakistan, as well as Turkey''s Ekmeleddin İhsanoğlu, the secretary
    general of the Organisation of the Islamic Conference, a 57-member bloc of Islamic
    states, held a meeting Islamabad, Pakistan to discuss resolution of the Palestinian
    problem and the stand-off over Iran''s nuclear program. (Reuters India) (Tehran
    Times)'
  - '79th Academy Awards: The Departed wins four Academy Awards including Best Picture
    and Best Director for Martin Scorsese. Helen Mirren wins the Academy Award for
    Best Actress for her role as Elizabeth II of the United Kingdom in The Queen.
    Forest Whitaker won the Academy Award for Best Actor for playing Idi Amin in The
    Last King of Scotland. Alan Arkin won the Academy Award for Best Supporting Actor
    for his role in Little Miss Sunshine with Jennifer Hudson winning the Academy
    Award for Best Supporting Actress for her role in Dreamgirls. (Sydney Morning
    Herald)'
  - Pirates hijack the as it departed Somalia after delivering United Nations food
    aid. (FOX)
  - Israeli forces carry out a raid across parts of the West Bank town of Nablus.
    (BBC)
  - Prime Minister of East Timor José Ramos-Horta announces he is running for president.
    (Reuters via ABC News Australia)
  - Iran successfully launches its first suborbital sounding rocket. (Gulf News) (AFP)
  - 'Voters in Senegal go to the polls to elect their next president, with incumbent
    Abdoulaye Wade facing a range of challengers including two former Prime Ministers:
    Moustapha Niasse and Idrissa Seck. (BBC)'
  - The , which caught fire on the 22nd, sinks, killing at least one more person.
    (WHDH-TV)
  Iraq:
  - President Jalal Talabani has been flown to Jordan for medical treatment after
    falling ill. (BBC)
  - A suicide bomber kills at least 40 people at a campus of Mustansiriya University
    in Baghdad. (New York Times)
