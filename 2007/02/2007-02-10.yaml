Date: '2007-02-10'
Source_URI: Portal:Current events/2007 February 10
Intelligence_Payload:
  Uncategorized:
  - 'Iraq War: General David Petraeus takes command of the United States forces in
    Iraq. (BBC)'
  - Russian President Vladimir Putin criticizes the United States for its "almost
    uncontained" use of force around the world during his speech at the 43rd annual
    Munich Conference on Security Policy. (BBC) (Transcript of Putin's speech in English,
    10 February.)
  - 'War in Somalia: Somali Prime Minister Ali Mohammed Ghedi modifies the roster
    of the Transitional Federal Government by removing army chief-of-staff Ismail
    Qasim Naji and assigning him as ambassador to Oman, while also appointing new
    ambassadors to Kenya, Djibouti, and Yemen. Meanwhile, the Somali People''s Resistance
    Movement emerges as an insurgency movement out of the underground members of the
    Islamic Courts Union. (Shabelle)'
  - '2008 United States presidential election: Senator Barack Obama (D-IL) officially
    announces his candidacy for president during a speech at the Old State Capitol
    in Springfield, Illinois. (CNN)'
