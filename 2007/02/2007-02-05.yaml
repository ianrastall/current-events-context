Date: '2007-02-05'
Source_URI: Portal:Current events/2007 February 5
Intelligence_Payload:
  Uncategorized:
  - 'U.S. Presidential Election, 2008: Former New York City mayor Rudy Giuliani (R)
    officially files for candidacy for President of the United States of America.
    (FOX)'
  - Space Shuttle astronaut Lisa Nowak is arrested in Florida for attempted kidnapping.
    (CNN)
  - Boris Berezovsky tells the BBC that Alexander Litvinenko, on his deathbed, said
    that Andrey Lugovoy was responsible for his poisoning. (BBC)
  - U.S. President George W. Bush has submitted a US$2.9 trillion budget to Congress
    including almost $700 billion in new military spending. (BBC)
  - Syrian President Bashar al-Assad has said his country can play a major role in
    international efforts to end the Civil war in Iraq. (BBC)
  - French police arrest 13 Kurdish Turks for allegedly funding PKK terrorist operations.
    (Bloomberg)
  - Iranian President Mahmoud Ahmadinejad will present a herbal treatment for AIDS
    that the Iranian government says is effective in helping patients to cure their
    symptoms. (Fox)
  - A coalition of charity, faith groups and unions have warned Tony Blair that any
    military action against Iran would have "unthinkable" consequences. (BBC)
  - Former Malaysian premier Mahathir Mohamad hosts a conference calling for George
    W. Bush and Tony Blair to be tried by an unofficial tribunal for war crimes in
    Iraq. (Reuters)
