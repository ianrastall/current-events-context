Date: '2007-02-03'
Source_URI: Portal:Current events/2007 February 3
Intelligence_Payload:
  Uncategorized:
  - Hassan Nasrallah, head of Hezbollah, openly states for the first time that the
    governments of Iran and Syria are supporting Hezbollah financially, with weapons,
    and with training, and "everybody knows it." (The Jerusalem Post)
  - 'Iraq War: at least 135 people are killed and 226 injured in a truck bombing in
    Baghdad (BBC); five people are killed and 40 injured in car bombs in Kirkuk. (BBC)'
  - An outbreak of the deadly strain of avian flu, H5N1, is confirmed at a Bernard
    Matthews turkey farm in Holton, Suffolk in the United Kingdom. (BBC)
  - A State of Emergency is declared in Bolivia after 'El Niño'-like flooding. (NDTV)
  - 'Catania football violence: After calls from Italian Prime Minister Romano Prodi
    to cancel all matches, Italian Football Federation commissioner Luca Pancalli
    indefinitely suspends all football matches in Italy while an investigation into
    riots on February 2, during which a 38-year-old police officer was killed and
    71 people were injured, begins. (The Guardian) (Wikinews)'
  - British Prime Minister Tony Blair urges Labour Party to 'weather the storm' during
    current political crisis for the party, and that 'policies will win the next election'.
    (BBC)
  - The Spring Festival travel season in China begins, in which 156 million passengers
    will travel by train, and 2 billion bus trips are expected. (Xinhua) (People's
    Daily)
  - Russia investigates smelly orange snow, oily to touch, which has fallen across
    an area of 1500 square kilometres in the Omsk region of the country. (BBC)
  - 'American football: Michael Irvin, Thurman Thomas, Gene Hickerson, Bruce Matthews,
    Charlie Sanders and Roger Wehrli are selected for induction into the Pro Football
    Hall of Fame. (ESPN)'
