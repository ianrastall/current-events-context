Date: '2007-02-21'
Source_URI: Portal:Current events/2007 February 21
Intelligence_Payload:
  Uncategorized:
  - Police in Zimbabwe ban rallies in parts of Harare that are seen as strongholds
    of the opposition party Movement for Democratic Change. (Washington Post)
  - Romano Prodi tenders his resignation as Prime Minister of Italy, after a defeat
    by two votes in the Senate. (Ansa Notizie) (BBC)
  - Premier of Quebec, Canada, Jean Charest, calls a general election for March 26.
    (Canadian Press via Canoe)
  - Iran ignores a United Nations Security Council deadline for it to suspend its
    nuclear program. (ABC Australia)
  - At least five people die as an apartment building collapses in Istanbul, Turkey.
    (AP via CNN)
  - Juniata College defeats Susquehanna University in men's basketball to win first
    playoff game in the history of the program which is over 100 years old
  Iraq War:
  - British Prime Minister Tony Blair announces that 1,500 British troops will leave
    Iraq within weeks with another 1,500 by the end of the year. (AFP via ABC News
    Australia)
  - Denmark will withdraw its 460 troops from Iraq by August. (BBC)
  - A suicide car bomb strikes a police checkpoint near a market in Najaf. (AP via
    Columbian)
