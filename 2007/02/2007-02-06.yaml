Date: '2007-02-06'
Source_URI: Portal:Current events/2007 February 6
Intelligence_Payload:
  Uncategorized:
  - At least three domain name system root nameservers are under denial-of-service
    attack. (The Register). See DNS Backbone DDoS Attacks
  - Representatives of the Lord's Resistance Army say they will continue fighting
    with the Government of Uganda if negotiations are not moved to another location
    outside of southern Sudan. (Al Jazeera)
  - A Human Rights Watch report concludes that European Union sanctions on the Government
    of Uzbekistan, which came in response to the "Andijan massacre" in May 2005, have
    failed due to a lack of commitment in enforcing them. (EurasiaNet)
  - United States President George W. Bush approves a Pentagon plan for establishing
    a new command center in Africa. (BBC)
  - An international passenger train crashes into a freight train in Komárom, Hungary,
    causing the engineer's death. Two of the 25 passengers also suffered injury. (HírTV)
  - UK Prime Minister Tony Blair says people are "increasingly alarmed" by Iran's
    nuclear program but military action was not being planned against it. (BBC)
  - The Iranian Government confirms that an Iranian envoy in Baghdad has been kidnapped
    by men wearing Iraqi army uniforms, and says it holds the United States responsible
    for his life. The U.S. denies any involvement of U.S. and Iraqi troops. (BBC)
  - UK newspaper The Sun has obtained a video tape of a U.S. pilot shooting a UK convoy
    in a friendly fire incident during the Iraq War, killing one British soldier and
    injuring four. The pilot, and others, are said to have made a series of crucial
    mistakes. (The Sun)
  - Three people in the United Kingdom have been jailed after plotting over internet
    chatrooms to abduct and rape two teenage girls. (The Times)
