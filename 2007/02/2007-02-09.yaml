Intelligence_Payload:
  Uncategorized:
  - 'Iraq War: A report by the U.S. Defense Department''s inspector general has found
    the The Pentagon "purposely manipulated" pre-war intelligence. Senator Carl Levin,
    D-MI, as chair of the Senate Armed Services Committee has called the report "very
    damning" and said of its results, "highly disturbing". (Baltimore Sun)'
  Cross-Strait relations:
  - The government of the Republic of China, more commonly known as Taiwan, has announced
    the name change of a number of state-owned enterprises, including Chunghwa Telecom,
    Chunghwa Post, China Shipbuilding Corporation and Chinese Petroleum Corporation
    to use the name Taiwan in their titles. (The China Post) (Taipei Times)
  - The U.S. State Department has stated the U.S. does not support this action. (China
    Daily) (Radio Taiwan) (U.S. State Department)
  - ROC President Chen Shui-bian says this does not violate his "four noes" pledge.
    (Radio Taiwan)
