Date: '2007-02-04'
Source_URI: Portal:Current events/2007 February 4
Intelligence_Payload:
  Uncategorized:
  - 'Palestinian factional violence: Fatah and Hamas take some of their gunmen off
    the streets of the West Bank and free some hostages under a new declared ceasefire.
    (BBC)'
  - At least 20 people are killed and 340,000 are made homeless by floods in the Indonesian
    capital, Jakarta. (BBC) (AP via ABC News)
  - 'Global spread of bird flu: UK authorities incinerate more than 50,000 turkeys
    as they are working to contain the bird flu. (BBC)'
  - Three former high-ranking American military officers have warned against any military
    attack on Iran. (BBC)
  - Chinese President Hu Jintao continues his eight-nation tour in Africa as he arrives
    in Lusaka and hold talks with Zambian President Levy Mwanawasa. President Hu launched
    a copper mining partnership with Zambia and promised more in aid. (AP via ABC
    News) (BBC)
  - The U.S. military admits publicly for the first time that four U.S. helicopters
    were downed by ground fire in Iraq. (BBC)
  - Greece's conservative government wins a vote of confidence, ending a three-day
    debate that started with the opposition Socialist Party calling for early elections
    (AP)
  - A boat sailing from Tiko in Cameroon to Oron in Nigeria capsizes, leaving up to
    85 people dead. (BBC News)
  - Germany beat Poland 29:24 in the final of the 2007 World Men's Handball Championship,
    becoming the new world champion in team handball. Office website
  - 'American football: The AFC champion Indianapolis Colts defeat the NFC champion
    Chicago Bears 29-17 in Super Bowl XLI, claiming their first Super Bowl victory
    since winning Super Bowl V in 1971. (CBS Sport) (BBC Sport)'
