Date: '2007-02-02'
Source_URI: Portal:Current events/2007 February 2
Intelligence_Payload:
  Uncategorized:
  - One 38-year-old policeman is killed in the Catania football clashes in Italy.
    71 people are taken to the hospital.
  - Ali Hassan Al Majeed, commonly known as Chemical Ali, admits he ordered Iraqi
    troops to engage in genocide against the Kurds of Iraqi Kurdistan. He says the
    "emptying" of villages was justified because the Kurds assisted Iran forces in
    the Iran-Iraq war. (Gulf News)
  - 'Palestinian factional violence: Hamas and its rival Fatah renew their truce when
    violence broke off again after the initial ceasefire. (BBC) (CNN) (Reuters)'
  - Chinese President Hu Jintao signs a series of economic deals with Sudan, which
    China has protected from UN sanctions. (BBC)
  - 'War in Somalia: Eight people are killed in a mortar attack in Somalia''s capital
    Mogadishu. (BBC)'
  - Martti Ahtisaari unveils a United Nations plan for the final status of Kosovo.
    Serbian leaders denounced the proposal. (CNN) (Reuters)
  - The Intergovernmental Panel on Climate Change publishes its fourth assessment
    report, concluding that global climate change is "very likely" to have a predominantly
    human cause. (BBC)
  - Storms hit Florida during the early morning hours, forecasters suspect tornadoes
    as the cause. At least 20 fatalities are reported from the storm. (CNN) (The Sun-Sentinel)
  - Tongan MP Clive Williams is arrested and charged with sedition arising from the
    2006 Tonga riots. Williams had earlier claimed that Tongan soldiers had beaten
    hundreds of people following the riots. (Radio NZ)
