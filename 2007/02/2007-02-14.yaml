Date: '2007-02-14'
Source_URI: Portal:Current events/2007 February 14
Intelligence_Payload:
  Uncategorized:
  - The United States redeploys the 173rd Airborne Brigade to Afghanistan to prepare
    for an anticipated spring offensive by the Taliban. (CNN)
  - Bombay Stock Exchange sells 5 percent stake to Germany's Deutsche Börse. (International
    Herald Tribune) (Reuters) (Forbes)
  - The Parliament of Serbia rejects a United Nations plan for the independence of
    Kosovo. (BBC)
  - 'United States Senate election, 2008: Author and comedian Al Franken announces
    his candidacy for Senator of Minnesota. (CNN)'
  - Vodafone's Chief Executive, Arun Sarin, says the company will spend US$2 billion
    to enhance its investments in India. (Forbes) (BusinessWeek)
  - 'Mid-February winter storm: A major weather system reaches the Northeastern United
    States and eastern Canada and hammers the region with snow and ice. The same system
    is responsible for severe weather in the Midwest and a tornado in New Orleans,
    Louisiana. (AP via CBS News)'
  - The European Parliament has approved a report on secret CIA flights which condemns
    member states that allowed the operations. (BBC)
  - Tens of thousands rally in Beirut, Lebanon to mark the second anniversary of the
    killing of former Prime Minister Rafik Hariri. (BBC )
  - Leaders of the Anglican Church meet in Tanzania with a possibility of a schism
    over the issue of homosexual clergy. (BBC)
  - Gurbanguly Berdimuhamedow is sworn in as President of Turkmenistan. (AP via Houston
    Chronicle)
  - The foreign ministers of China, India and Russia meet in New Delhi, India to discuss
    greater cooperation between the three Asian countries on issues including terrorism,
    drug trafficking and Afghanistan. (BBC) (Forbes)
  - A bus belonging to Iran's Islamic Revolutionary Guards Corps has been hit by a
    car bomb in Zahedan killing 18 people. (Reuters via ABC Australia)
  - The World Food Program predicts that 285,000 people in Mozambique will require
    food aid after severe flooding. (BBC)
  - Georgina Beyer, the world's first transgendered member of parliament, resigns
    from the Parliament of New Zealand. (NZ Herald)
  Iraq War:
  - 'Operation Imposing Law: U.S. military spokesman Maj. Gen. William Caldwell announces
    that Muqtada Al Sadr fled Iraq several weeks ago and is in Iran. (Washington Post)
    (Alertnet)'
  - White House Press Secretary Tony Snow confirmed that the White House believes
    Iran is equipping Shia insurgents in Iraq. (BBC)
  - 'Iraq War troop surge of 2007: The U.S. House of Representatives debates the proposed
    non-binding resolution to oppose President Bush''s surge plan. (BBC)'
  - The U.S. military confirms that a United States Marine Corps CH-46 Sea Knight
    helicopter that crashed on 7 February 2007 was shot down by insurgents. (AP via
    International Herald Tribune)
  - French counterterrorism police arrest 11 people who were allegedly part of a network
    to recruit Islamic radicals to work with Al-Qaeda in Iraq. (Fox)
