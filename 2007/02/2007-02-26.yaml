Date: '2007-02-26'
Source_URI: Portal:Current events/2007 February 26
Intelligence_Payload:
  Uncategorized:
  - Delwa Kassiré Koumakoye becomes the new Prime Minister of Chad, replacing interim
    PM Adoum Younousmi who stood in for Pascal Yoadimnadji since Yoadimnadji's death
    on 23 February 2007 in Paris. (IHT)
  - 'Guinean general strike, 2007: President of Guinea Lansana Conté appoints Lansana
    Kouyaté as the new Prime Minister of Guinea after reaching an agreement with the
    trade union movement and the Opposition. (BBC)'
  - 'Talpiot Tomb: Film director James Cameron claims to have found ossuaries that
    once contained the remains of Jesus of Nazareth, his disciple Mary Magdalene,
    and their son, named Judah. (CNN)'
  - 'Insurgency in Saudi Arabia: At least three French citizens have been shot dead
    in an attack near the historical site of Madain Saleh. (Al Jazeera)'
  - The International Court of Justice finds Serbia guilty of failing to prevent genocide
    in the Srebrenica massacre, but clears it of direct responsibility and complicity
    in a case brought forth by Bosnia and Herzegovina. (The Guardian)
  - The Daily Telegraph reports that Israel is negotiating with the United States
    for an air corridor over Iraq to carry out an air strike on Iranian nuclear facilities.
    Israeli Deputy Defense Minister Efraim Sneh calls the information "baseless."
    (The Daily Telegraph) (Persian Journal) (United Press International) (Chicago
    Tribune) (The Guardian)
  - The preliminary inquiry by the Rail Accident Investigation Branch into the Grayrigg
    rail crash finds that a key part of the set of points was missing. (The Daily
    Telegraph)
  - Scientists find over 20 new species of animals as the Larsen Ice Shelf breaks
    in the Antarctic. (The Times)
  - Four Guatemalan police officers jailed for the 19 February slaying of three Salvadoran
    deputies to the Central American Parliament are shot dead inside a maximum security
    prison; a riot ensues. (BBC)
  - Vice President of the United States Dick Cheney makes surprise visits to Pakistan
    and Afghanistan to encourage President of Pakistan Pervez Musharraf and President
    of Afghanistan Hamid Karzai to increase border security between the two countries
    and to take further action against the Taliban and al-Qaeda. (Bloomberg)
  - United Kingdom Secretary of State for Defence Des Browne announces the deployment
    of an additional 1,400 troops to Afghanistan. (BBC)
  Iraq:
  - The Iraqi Government has come to an agreement to divide oil revenue and encourage
    foreign investment in the country. (CNN)
  - A bomb inside the Iraqi Ministry of Public Works kills at least five people. It
    also injures Vice President Adil Abdul-Mahdi and the Minister for Public Works
    Reyad Ghareeb in a possible assassination attempt. (New York Times)
