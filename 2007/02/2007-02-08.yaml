Date: '2007-02-08'
Source_URI: Portal:Current events/2007 February 8
Intelligence_Payload:
  Uncategorized:
  - British police arrest Abu Izzadeen, the spokesman for al Ghurabaa, an organization
    the British government has designated as terrorist, on charges of inciting terrorism.
    (USA Today)
  - Seven alleged members of the Islamic Movement of Uzbekistan, an organization affiliated
    with Al-Qaeda, are on trial in Tajikistan. (RFE/RL)
  - Media celebrity Anna Nicole Smith dies at the age of 39 at Hard Rock Hotel and
    Casino.
