Date: '2007-07-17'
Source_URI: Portal:Current events/2007 July 17
Intelligence_Payload:
  Uncategorized:
  - The board of Dow Jones & Company agrees to accept an offer of $5 billion from
    Rupert Murdoch's News Limited. (Fox News)
  - The World Bank releases its Worldwide Governance Indicators, providing information
    on corruption, rule of law, and other indicators of stability on countries around
    the world. (WGI page)
  - TAM Linhas Aéreas Flight 3054 carrying 186 people crashes in Congonhas International
    Airport, São Paulo, Brazil. The death toll is estimated to be at least 200 people.
    (Reuters) (MSNBC) (CNN) (BBC) (Fox News) (Globo News Online) (AFP via ABC News
    Australia)
  - The High Judicial Council of Libya commutes the death sentences against six foreign
    medical workers to life imprisonment. (Reuters via CNN)
  - A train carrying yellow phosphorus derails in western Ukraine, sending a toxic
    cloud over several villages. At least twenty people are hospitalized and hundreds
    are forced to evacuate. (AP via MSNBC)
  - The Sudanese government says that a recent attempted coup d'état did not have
    the support of the United States government, contrary to previous accusations
    from Nafi Ali Nafi, Sudanese President Omar al-Bashir's assistant. The government
    has arrested 14 members of the Umma Reform and Renewal Party for plotting the
    coup. (VOA News)
  - Five people are killed in a twin bomb blasts in Islamabad near the venue of a
    rally and meeting to be addressed by Pakistan Chief Justice Iftikhar Muhammad
    Chaudhry.
  - 39 people are arrested, detained and kept at an undisclosed location in Pakistan
    due to an alleged connection with a recent attack on a plane carrying Pervez Musharraf.
  - All three men charged with supporting Tamil Tigers have been granted bail in Melbourne.
    (ABC News Australia)
  - Delegates arrive in Beijing for the resumption of six party talks on Wednesday
    involving North Korea, South Korea, China, Russia, Japan and the United States
    to discuss the second phase of a deal on North Korean nuclear disarmament. (BBC)
  - '2007 Chūetsu offshore earthquake: The Government of Japan orders The Tokyo Electric
    Power Company to keep its Kashiwazaki-Kariwa Nuclear Power Plant closed pending
    safety checks after the earthquake caused a leak. (Bloomberg)'
