Date: '2007-07-05'
Source_URI: Portal:Current events/2007 July 5
Intelligence_Payload:
  Uncategorized:
  - Scientists announce the discovery of a new species of cephalopod, dubbed 'octosquid',
    found off the coast of Hawaii. (Star Bulletin)
  - A gunman opens fire at the New York-New York Hotel & Casino in Las Vegas, Nevada,
    wounding three before being captured. (Los Angeles Times)
  - The Nigerian kidnappers of three-year-old British toddler Margaret Hill threaten
    to kill her, unless her father, Port Harcourt bar owner Mike Hill, takes her place.
    (Middle East Times)
  - A 6.1 magnitude earthquake hits the southern state of Chiapas in Mexico. (Reuters)
  - Bahrain will no longer participate in the Arab League boycott of Israel. (GulfNews)
  - A Belgian court sentences former Rwandan army major Bernard Ntuyahaga to twenty
    years in jail for the murder of 10 Belgian Army peacekeepers and an undetermined
    number of civilians in the Rwandan genocide. (Reuters via CNN)
  - The Zimbabwe Congress of Trade Unions votes to strike for higher wages as inflation
    in Zimbabwe rises above 10,000%. (allAfrica)
  - Nine people are killed at Culiacán International Airport in the Mexican state
    of Sinaloa as a cargo aircraft fails to take off and careens across a roadway,
    hitting several vehicles and business premises. (BBC News)
  - An armed man holds several people hostage at a bank in the Montreal suburb of
    Longueuil. The situation is resolved without injury. (CTV)
  - Two die and seven are seriously injured when a small plane crashes after missing
    the runway at Aerfort na Minna, in County Galway, Ireland. (RTÉ)
  - 12 boats capsize during a junior regatta in Dún Laoghaire, Ireland, on the Irish
    Sea, with 120 children swept out to sea. All have been rescued, according to the
    Irish Coast Guard, although 15 have been brought to hospital. (RTÉ)
  - Eleven people are injured when a staircase collapses at the Natural History Museum
    in Dublin. (RTÉ)
  - Russia has officially declined a request by the UK to extradite Andrei Lugovoi
    for the murder of Alexander Litvinenko. Russia's constitution bars extradition
    of its citizens. (The Guardian)
  - A study at the University of Jordan concluded that the country's economic problems
    are not a result of the 750,000 Iraqi refugees who have sought sanctuary there.
    Iraqi refugees now comprise over 10% of the Jordanian population. (Press TV)
  - On the 25th anniversary of their captivity, the Iranian government announces that
    Iranian diplomats Seyyed Mohsen Mousavi, Ahmad Motevasselian, Kazem Akhavan and
    Taghi Rastegar Moghaddam are still alive and being held in Israeli jails. The
    men were captured in 1982 in Lebanon. (PressTV)
  - Eleven people are injured after a London Underground train derails, leaving hundreds
    of passengers trapped in an east London tunnel. (The Telegraph) (thelondonpaper)
  - Armed residents of the Indian state of Nagaland burn down villages in the neighbouring
    state of Assam. (BBC)
  - Pakistani forces demolish the front walls of the Lal Masjid mosque in Islamabad.
    (CNN)
  - Twenty-five people died and 33 are injured in an explosion in a karaoke bar in
    Tianshifu in northeast China. (AFP via ABC News Australia)
