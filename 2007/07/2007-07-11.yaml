Date: '2007-07-11'
Source_URI: Portal:Current events/2007 July 11
Intelligence_Payload:
  Uncategorized:
  - The Organisation for the Prohibition of Chemical Weapons confirmed the destruction
    of the entire chemical weapons stockpile in Albania.(AP)
  - South Dakota executes Elijah Page for murder, the first execution in the state
    in 60 years.(Reuters)
  - The British Museum states that the Nebo-Sarsekim Tablet, a clay tablet dating
    from 695 BC, contains a cuneiform inscription confirming the existence of a figure
    mentioned in the Old Testament. (The Australian)
  - The Pakistan Army claims that Operation Silence at the Lal Masjid is in its final
    stages and that 95% of the complex is under its control. It has found the bodies
    of 73 militants. (CNN)
  - Four people who carried out failed suicide bombings in London are jailed for life,
    with no chance of release for at least 40 years. In passing the sentence, the
    judge ruled that the plot was "part of an al-Qaida inspired and controlled sequence
    of attacks", although the British government has always claimed the attacks were
    "home grown", and not connected to al-Qaida. (Guardian) (Guardian)
  - Indonesia evacuates thousands of people living near Mount Gamkonora as it appears
    likely to explode. (Reuters via ABC News Australia)
  - 14 Philippines Marines are killed by insurgents in fighting. (BBC)
  - The Supreme Court of Libya upholds the death penalty for the six Bulgarian medics
    and one Palestinian doctor accused of infecting children with HIV. (AP)
  - The People's Republic of China bans diethylene glycol as an ingredient in toothpaste.
    (Reuters)
  - A Chilean court rejects the extradition of former Peruvian President Alberto Fujimori.
    (BBC)
