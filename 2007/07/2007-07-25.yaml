Date: '2007-07-25'
Source_URI: Portal:Current events/2007 July 25
Intelligence_Payload:
  Uncategorized:
  - The New England Journal of Medicine reports about Oscar, a hospice cat with the
    ability to predict which patients will die hours before their death. (New England
    Journal of Medicine) (CNN)
  - Nurses in Fiji go on strike over a 5 per cent pay cut imposed on them by the interim
    government of Frank Bainimarama with teachers and other government workers to
    join them next week. (ABC)
  - A United States federal court judge orders Sudan to pay $8 million in compensation
    to the victims of the bombing of the USS Cole. (CNN)
  - 2007 Tour de France
  - Italian rider Christian Moreni fails a doping test and is led away for questioning
    by French police (Fox News)
  - Race leader Michael Rasmussen is withdrawn from the race and fired by his team
    for providing incorrect information about his whereabouts before the start of
    the Tour, deepening the drug controversies surrounding the 2007 edition. (New
    York Times)
  - The President of Brazil Luiz Inácio Lula da Silva removes Defense Minister Waldir
    Pires, who is responsible for civil aviation, from his Cabinet and replaces him
    with former Justice Minister Nelson Jobim after two major crashes in ten months.
    (New York Times)
  - The United States House Committee on the Judiciary votes 22-17 to approve a report
    citing former White House counsel Harriet Miers and current Chief of Staff for
    President George W. Bush Joshua Bolten for failing to comply with subpoenas regarding
    the dismissal of U.S. attorneys controversy. (CNN)
  - A car bomb in the Mansour district of Baghdad kills at least 30 Iraqis celebrating
    their team's victory in an Asian Cup match against South Korea. Another suicide
    attack in East Baghdad kills another 20. (BBC) (Reuters)
  - 8 of the 23 South Koreans held hostage by the Taliban in Afghanistan are released,
    while one of the hostages is executed. The Taliban gives further warning that
    the remaining hostages will be killed. (CNN)
  - The first delegation from the Arab League comprising the foreign ministers of
    Egypt and Jordan visits Israel to talk about the Arab Peace Initiative. (BBC)
  - Iraq's largest Sunni Arab bloc, The Iraqi Accordance Front, suspends its membership
    in Prime Minister Nouri al-Maliki's coalition government. (Fox News)
  - Pratibha Patil is sworn-in as the first woman President of India. (The Times of
    India)
  - A Russian subcontractor advises that Iran's first nuclear power reactor will be
    ready in August 2008. (Reuters)
  - The Australian Commonwealth Director of Public Prosecutions reviews the case against
    Mohamed Haneef accused of giving material support to terrorism following concerns
    being raised about the strength of the case. (Sydney Morning Herald)
  - More houses are evacuated in Oxford as the River Thames breaks its banks. (Reuters
    via News Limited)
  - North and South Korea conduct high-level talks to resolve a border dispute. (BBC)
  - The President of France Nicolas Sarkozy travels to Libya following the release
    of the medical workers sentenced to death in the HIV trial in Libya. (Reuters
    via CNN)
  - Controversial American academic Ward Churchill is dismissed by the Board of Regents
    of the University of Colorado after accusations of academic misconduct. (Guardian)
    (IHT)
