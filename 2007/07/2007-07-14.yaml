Date: '2007-07-14'
Source_URI: Portal:Current events/2007 July 14
Intelligence_Payload:
  Uncategorized:
  - Turkish Foreign Minister Abdullah Gül asked the US for an explanation of alleged
    delivery of weapons to the PKK terrorist group. Gül said that ties with Turkey-US
    would collapse if arms to PKK claims confirmed. (Jerusalem Post) (Today Zeman)
    (PressTV)
  - 'Waziristan conflict (July 2007-present): At least 24 Pakistani soldiers are killed
    by a suicide attack by militants on a convoy in Waziristan near the Afghanistan
    border. (AP via Edmonton Sun)'
  - Ten Sri Lankan soldiers die in fighting the Tamil Tigers in the Vavuniya district
    of northern Sri Lanka. (AP via Washington Post)
  - The Roman Catholic Archdiocese of Los Angeles settles sexual abuse claims against
    its clergy at a cost of $ 600 million. (Fox News)
  - Iranian state radio reports that a South Korean flagged ship has sunk in the Sea
    of Oman off the coast of Iran with 13 crew members missing. (Reuters via ABC News
    Australia)
  - The President of Russia Vladimir Putin signs a decree suspending Russia's participation
    in the Conventional Forces in Europe (CFE) pact. (Reuters)
  - A shipment of fuel oil arrives in North Korea as part of an agreement to end its
    nuclear program. International Atomic Energy Agency inspectors are monitoring
    the shutdown of the Yongbyon reactor. North Korea later advises that it has shut
    the reactor down. (BBC via ABC News Australia) (AP via Jerusalem Post)
  - The Australian Federal Police charge Dr. Mohamed Haneef with "providing support
    to a terrorist organization" in relation to the 2007 Glasgow International Airport
    attack and the 2007 London car bombs. (BBC)
  - The Royal Malaysian Police obtain a remand order to hold Nathaniel Tan for four
    days in connection to an investigation of a violation of section 8 of the Official
    Secrets Act, which pertains to "wrongful communication" of an official secret.
    (The Star, Malaysia)
