Date: '2007-07-29'
Source_URI: Portal:Current events/2007 July 29
Intelligence_Payload:
  Uncategorized:
  - The Prime Minister of Israel Ehud Olmert announces that United States military
    and defense aid to Israel will total $30 billion over the next ten years. (Irish
    Examiner)
  - Six people die in a bus crash while travelling to the Barbados Crop Over Festival.
    (CNN)
  - A study published in the Philosophical Transactions of the Royal Society of London
    claims that the number of North Atlantic tropical cyclones in the season has more
    than doubled in the past hundred years. (CNN)
  - Moitree Express begins on trail journey between Dhaka and Kolkata paving way for
    possible reopening of train route connectivity between Bangla Desh and India
  - Prime Minister of the United Kingdom Gordon Brown arrives in the United States
    for his first official meeting with President George W. Bush. (ABC News Australia)
    (AP via ABC News)
  - Approximately 5,000 Brazilians demonstrate in São Paulo over the recent crash
    of TAM Linhas Aéreas Flight 3054. (BBC)
  - Alberto Contador of Spain wins the 2007 Tour de France with Cadel Evans of Australia
    finishing second and Levi Leipheimer of the United States finishing third. (DPA
    via Bangkok Post)
  - Iraq beats Saudi Arabia to win the Asian Cup, creating a rare moment of recent
    national unity. (Reuters) (The New York Times)
  - Farooq Ahmad Sheikh, a commander of the militant group Hizbul Mujahideen is shot
    dead by police in India when a grenade he threw did not explode.
  - Association of South East Asian Nations foreign ministers adopt a plan to strengthen
    the South East Asian Nuclear Weapons Free Zone. (Reuters)
  - A human rights group claims that four Roman Catholic priests are in detention
    in China. (Westfall Weekly News)
  - Seven crew members die in the crash of an An-12 cargo plane at Moscow's Domodedovo
    airport. (Reuters via ABC News Australia)
  - Japanese voters go to the polls for elections for half of the House of Councillors.
    The ruling coalition of the Liberal Democratic Party and New Komeito Party lost
    seats with the opposition Democratic Party of Japan becoming the largest party
    in the chamber. (Reuters) (Reuters via CNN)
