Date: '2007-07-27'
Source_URI: Portal:Current events/2007 July 27
Intelligence_Payload:
  Uncategorized:
  - Balochistan Government spokesman and media consultant to Chief Minister Jam Muhammad
    Yousaf, Abdur Raziq Bugti is shot dead by unknown armed men.
  - 'War in Afghanistan: Three soldiers in the NATO-led International Security Assistance
    Force are killed. (Xinhua)'
  - The top United Nations official in Haiti raises concerns about a sharp increase
    in lynchings and other forms of mob violence. (AP via IHT)
  - The United States and India confirm a deal on nuclear co-operation. (BBC)
  - Clinical trials for MVA85A, a new vaccine against tuberculosis, are started in
    South Africa. (BBC)
  - Abel Mutsakani, editor of the ZimOnline, is shot and seriously wounded in Johannesburg,
    South Africa in what may have been an assassination attempt. (AllAfrica)
  - A study published in The Lancet correlates cannabis use to psychosis. (BBC)
  - An independent review set up by NASA finds out that astronauts were allowed to
    fly despite being drunk in at least two occasions. (BBC)
  - The United States Congress passes a bill containing measures recommended by the
    9/11 Commission. (BBC)
  - The United Nations Educational, Scientific and Cultural Organisation dispatches
    a team to investigate the shooting of four mountain gorillas in the Virunga National
    Park in the Democratic Republic of the Congo. (CNN)
  - Yakub Memon, one of the masterminds behind the 1993 Bombay bombings, is sentenced
    to death in India. (BBC)
  - The European Commission accuses Intel Corporation of anti-competitive practices
    against Advanced Micro Devices. (BBC)
  - A Serbian gunman kills at least nine people in the village of Jabukovac in eastern
    Serbia. (AP via Forbes)
  - The Israeli Defense Force suspends a company for shooting an unarmed man in West
    Bank city of Hebron. (ABC)
  - Two news helicopters belonging to KTVK Channel 3 & KNXV Channel 15-ABC collide
    while covering a car chase in Phoenix, Arizona, leaving all four dead (KTVK Pilot
    Scott Bowerbank, Photographer Jim Cox, KNXV Pilot Craig Smith & Photographer Rick
    Krolax (KPHO Phoenix) (KVOA Tucson) (BBC)
  - Former French Prime Minister Dominique de Villepin is charged with "complicity
    in slanderous denunciations" and "complicity in using forgeries" for allegedly
    trying to discredit current President Nicolas Sarkozy. (NDTV)
  - Jailed policeman Eugene de Kock claims in an interview from prison that former
    South African President Frederik Willem de Klerk had hands "soaked in blood" and
    had ordered political killings and other crimes during the anti-apartheid conflict.
    (BBC)
  - A general strike goes into its third day in Swaziland; strikers demand democratic
    elections and an end to absolute monarchy. (M&C)
  - Mohammad Ashfaq, a government appointed imam, is chased out of the Red Mosque
    in Pakistan by 200 students. A suicide bomb near the mosque kills at least 13
    and injures another 50. (ABC News Australia) (Reuters via Canada.com)
  - The death toll from floods and landslides on the Sulawesi island of Indonesia
    rises to 107. (AFP via ABC)
  - The President of Indonesia Susilo Bambang Yudhoyono meets with the Prime Minister
    of Australia John Howard to discuss security issues and the possibility of a bilateral
    free trade agreement. (AFP via ABC News Australia)
  - The Commonwealth Director of Public Prosecutions drops the charge of supporting
    a terrorist organization against Mohamed Haneef. (News Limited) Australian Federal
    Police admits all their main evidence against Haneef was wrong.
  - Five thousand Zimbabweans have been arrested in the last month for violating price
    controls. (AP via CNN)
  - New Zealand Environment Minister David Benson-Pope resigns from the Cabinet. (Bloomberg)
  - Steve Bracks resigns as the Premier of Victoria. John Thwaites, the Deputy Premier,
    announces his resignation later in the day. (Sydney Morning Herald) (Sydney Morning
    Herald)
  - Swedish King Carl XVI Gustaf, by long tradition an honorary member of the AIK
    soccer club, concedes that he is a supporter of the rivaling club Djurgården.
    (TT via Dagens Nyheter)
  - Barry Bonds hits career home run number 754. (New York Times)
  - Milt Stegall breaks the all time CFL touchdown record, with his 139th touchdown.
  - Jihad Shaar is beaten to death by Israel Defense Force soldiers.(Haaretz)
  - The Simpsons Movie arrives in cinemas worldwide.(The Simpsons Movie)
