Date: '2007-07-15'
Source_URI: Portal:Current events/2007 July 15
Intelligence_Payload:
  Uncategorized:
  - Sudan and a breakaway faction of the Justice and Equality Movement of Darfur sign
    a peace treaty. (Sudan Tribune)
  - Two doctors arrested at the Royal Alexandra Hospital, Paisley, Scotland in connection
    with 2007 Glasgow International Airport attack were released without any charges.
  - A law legalising abortion in the first ten weeks of pregnancy comes into effect
    in Portugal. (Reuters via News Limited)
  - A Somali peace conference in Mogadishu gets off to a bad start as it is disrupted
    by mortar shells. (AFP via ABC)
  - Shimon Peres is sworn in as the President of Israel. (Reuters via News Limited)
  - Two scientists Gert van der Heijden and Eugene Starostin claim that they have
    solved a 75-year-old problem related to developable surfaces and the Möbius strip.
    (Nature)
  - Australia extradites Antun Gudelj to Croatia for the 1991 murder of Josip Reihl-Kir,
    the police chief of Osijek and two associates - this event fueled tensions during
    the Croatian War of Independence. (AFP via ABC News Australia)
  - Brazil defeats Argentina 3-0 in the 2007 Copa América final. (Brisbane Times)
  Waziristan conflict (July 2007-present):
  - Pro-Taliban militants in Pakistan's North Waziristan region say they have ended
    their truce with the government. (BBC)
  - Two suicide bombings in northwestern Pakistan kill at least 31 people. (CNN)
