Date: '2007-07-03'
Source_URI: Portal:Current events/2007 July 3
Intelligence_Payload:
  Uncategorized:
  - United States counterterrorism experts say some of the men arrested in connection
    to terror plots in the United Kingdom had links to al-Qaeda in Iraq. (CNN)
  - The British government will designate and ban Tehreek-e-Nafaz-e-Shariat-e-Mohammadi
    and Jamaat-ul-Mujahideen Bangladesh as terrorist organizations. (Nasdaq)
  - Former President of Liberia Charles Taylor makes a surprise appearance at his
    trial for military atrocities in The Hague. (Associated Press, via the Washington
    Post)
  - Former Prime Minister Benazir Bhutto says she will return to Pakistan and is considering
    contesting the next presidential election. (IHT)
  - 'Lal Masjid clashes: At least seven people have been killed in clashes between
    security forces and militant students at a mosque in the Pakistani capital Islamabad.
    (BBC)'
  - Ghana redenominates Ghanaian cedi. The new currency starts exchanging at GH¢ 0.92
    to the US dollar, the highest valued African currency. (Ghanaweb.com) (MyJoyOnline)
  - Japan's Minister for Defense Fumio Kyuma resigns over comments he made about the
    atomic bombings of Hiroshima and Nagasaki on the weekend. (BBC)
  - Alinghi beats Emirates Team New Zealand in the final race of the 2007 America's
    Cup, winning the regatta 5-2. (NZ Herald)
