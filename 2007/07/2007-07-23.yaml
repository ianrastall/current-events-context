Date: '2007-07-23'
Source_URI: Portal:Current events/2007 July 23
Intelligence_Payload:
  Uncategorized:
  - The British MP George Galloway is thrown out of the House of Commons chamber and
    then suspended for 18 days after an inquiry into his Mariam Appeal campaign. (The
    Independent)
  - The United States arrests Zhenli Ye Gon, a Mexican citizen accused of making large
    amounts of crystal meth in a laboratory. (Reuters)
  - A wave of car bombings kills at least 17 people in Baghdad. (Reuters)
  - Democratic Party candidates in the 2008 United States presidential election participate
    in the YouTube debate in Charleston, South Carolina. (CNN)
  - 'War in Afghanistan: Approximately 60 Taliban and six North Atlantic Treaty Organization
    (NATO) troops die in two days of heavy fighting. (AFP via ABC News Australia)'
  - Former King of Afghanistan Mohammed Zahir Shah dies after prolonged illness.
  - 'Summer 2007 United Kingdom floods: Up to a million Britons could be affected
    by floods with both the River Severn and River Thames threatening to break their
    banks. Up to 350,000 people in Gloucestershire could be without running water
    for two weeks with some people unable to move back to their homes for a year.
    (UK Telegraph)'
  - Japan allows International Atomic Energy Agency inspectors to visit the Kashiwazaki-Kariwa
    Nuclear Power Plant shut down after the recent 2007 Chūetsu offshore earthquake.
    (AFP via News Limited)
  - Flash floods and landslides in central Indonesia kill at least 30 people. (News
    Limited)
  - 'The 2007 Taliban-seized South Korean hostage crisis: The Taliban sets a new deadline
    for the South Korean captives. (BBC)'
  - Storms continue in China with floods and landslides with 150 deaths occurring
    last week in the country due to storms. (Reuters)
  - Comedian Drew Carey will replace Bob Barker as host of The Price Is Right. (AP
    via MSNBC.com)
