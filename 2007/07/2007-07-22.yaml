Date: '2007-07-22'
Source_URI: Portal:Current events/2007 July 22
Intelligence_Payload:
  Uncategorized:
  - Voters in Cameroon go to the polls for parliamentary elections. Opposition leaders
    denounce the election as fraudulent. (BBC)
  - Gordon Brown, the Prime Minister of the United Kingdom, holds an Emergency Cabinet
    meeting to discuss floods with the British Army called in to help in the worst
    affected areas of England and Wales. (ABC News Australia)
  - Khurshid Kasuri, the Foreign Minister of Pakistan warns the United States that
    it would be completely counterproductive" to launch a strike against Al Qaeda
    and Taliban positions in the tribal areas of Pakistan. (CNN)
  - Several thousand protesters opposed to Thailand's military government clash with
    Thai police in Bangkok. (BBC)
  - Irish golfer Pádraig Harrington wins the British Open defeating Sergio García
    in a playoff. (Bloomberg)
  - A bus crash in the French Alps kills 27 Polish pilgrims. (Gazeta)
  - 'Waziristan War: Security forces in Pakistan have killed six fighters in clashes
    in North Waziristan, according to the military. (Aljazeera)'
  - The Burj Dubai becomes the world's tallest building overtaking Taipei 101 in Taipei.
    (NDTV)
  - More than 100 people die in floods and landslides in China. (Reuters via ABC News
    Australia)
  - Turkish voters go to the polls for general elections. The ruling AKP led by the
    Prime Minister of Turkey Tayyip Erdogan wins a resounding victory. (BBC), (Reuters)
  - '2007 FIFA U-20 World Cup Final: Argentina defeated the Czech Republic 2-1 to
    win its sixth World Cup title. (TSN)'
