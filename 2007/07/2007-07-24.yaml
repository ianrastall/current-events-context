Date: '2007-07-24'
Source_URI: Portal:Current events/2007 July 24
Intelligence_Payload:
  Uncategorized:
  - Five mountain climbers freeze to death in the Italian Alps. (Reuters via News
    Limited)
  - People are evacuated from houses in Oxford due to the 2007 United Kingdom floods
    as the 350,000 people in Gloucestershire without running water are supplied with
    bottled water. (BBC)
  - Tony Blair meets with Israeli and Palestinian leaders on his first trip to the
    region as a peace envoy. (Reuters)
  - Republic of Macedonia, Albania and Serbian autonomous province of Kosovo are experiencing
    blackouts as a result of the 2007 European heatwave that spreads over the Balkans.
    It also causes bushfires everywhere in the region between Croatia, Hungary, Serbia
    and Greece. (MIA-Macedonian Informative Agency) (International Herald Tribune)
    (BBC News)
  - Team Astana retires from the 2007 Tour de France following Kazakh rider Alexander
    Vinokourov testing positive for a banned blood transfusion. (ICWales)
  - New Haven, Connecticut becomes the first United States city to give identification
    cards to undocumented immigrants. (BBC)
  - Pakistani militants fire rockets at the town of Bannu resulting in at least seven
    deaths and 30 injuries. (Reuters via Canada) In another attack in the North Waziristan
    region, about 35 militants attacked on security forces killing 4 and injuring
    6.
  - Vladimir Putin, the President of Russia, accuses the United Kingdom of "colonial
    thinking" for wishing to extradite Andrei Lugovoi to face trial for the alleged
    murder of Alexander Litvinenko. (The Telegraph)
  - Marie-Noëlle Thémereau resigns as the President of New Caledonia. (ABC News Australia)
  - A boiler explosion in a towel factory in North Karachi kills 8 and injures 28.
  - A suicide car bomber kills at least 22 people in the Iraqi town of Hilla. (BBC)
  - One of Hungary's top health official says almost 500 people in the country have
    died in the past week as a result of a heat wave. (BBC)
  - Dozens of people are missing in Sulawesi, Indonesia as a result of recent floods
    and landslides. (BBC)
  - The 5 Bulgarian nurses and the Palestinian assistant, imprisoned in Libya for
    8 years and that had been sentenced to death, in several trials based on allegations
    of having inoculated AIDS to children, are leaving Libya and returning back to
    Sofia with Mrs Cécilia Sarkozy who negotiated their liberation. (Reuters Alertnet)
