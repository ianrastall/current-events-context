Date: '2007-07-01'
Source_URI: Portal:Current events/2007 July 1
Intelligence_Payload:
  Uncategorized:
  - Police conduct a controlled explosion of a suspicious car in a carpark of the
    Royal Alexandra Hospital in Paisley, where two suspects in the 2007 Glasgow International
    Airport attack are being held. (CNN)
  - Authorities evacuate part of Heathrow Airport while they investigate a suspect
    package. (Reuters)
  - An evacuation is made of the American Airlines terminal of JFK airport because
    of a suspicious package. The package was found at 10:20 AM local time, and bomb
    squad was sent to the scene. The package turned out to be carrying cologne, so
    the terminal was cleared and operations returned to normal within an hour. (Newsday)
    (San Jose Mercury News) (Wikinews)
  - Avraham Hirschson resigns as the Finance Minister of Israel as an investigation
    into alleged fraud and embezzlement continues. (JTA)
  - The Australian government upgrades its travel alert for the United Kingdom following
    the 2007 Glasgow International Airport attack and the 2007 London car bombs discovery.
    (Reuters)
  - A helicopter crash in the Raveau forest near the town La Charité-sur-Loire in
    central France kills three people involved in the French Grand Prix and injures
    two. (AFP via ABC News Australia)
  - The African Union meets in Accra, Ghana, for a summit with attention focussed
    on a proposal by Muammar al-Gaddafi of Libya for a pan-African government. (BBC)
  - Chinese archaeologists have found a hidden underground chamber within the tomb
    of Qin Shi Huang. (BBC)
  - The Concert for Diana occurs at the new Wembley Stadium on what would have been
    Princess Diana's 46th birthday. (BBC)
  - Canada celebrates its 140th anniversary. Canada Day marks the creation of the
    Dominion of Canada through the British North America Act on July 1, 1867. (CBC)
  - Alison Brimelow becomes President of the European Patent Office. (The Lawyer)
