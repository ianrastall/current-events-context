Date: '2007-07-20'
Source_URI: Portal:Current events/2007 July 20
Intelligence_Payload:
  Uncategorized:
  - The President of Brazil Luiz Inácio Lula da Silva orders an inquiry into the crash
    of TAM Linhas Aéreas Flight 3054. (CNN)
  - The UK Crown Prosecution Service ends its inquiry into the "Cash for honours"
    claims with a finding that the evidence is not sufficient to warrant charges being
    laid. (Washington Post)
  - China shuts down a chemical plant associated with deaths in Panama from tainted
    medicine and two petfood plants associated with the deaths of pets in the United
    States. (AP via CNN)
  - Hundreds of thousands of Bolivians protest proposals to shift the capital from
    La Paz to Sucre. (AP via International Herald Tribune)
  - United States District Judge James Jones levies a fine of $634.5 million on Purdue
    Pharma and three executives for misleading the public about OxyContin. (AP via
    International Herald Tribune)
  - The Government of Ethiopia pardons and frees opposition leaders who had been sentenced
    to life imprisonment for their roles in riots following 2005 elections. Prime
    Minister Meles Zenawi denies that the release was forced by the United States.
    (BBC)
  - The Supreme Court of Pakistan unanimously reinstates Iftikhar Chaudhry as Chief
    Justice.
  - Taliban insurgents stop a bus in Afghanistan and kidnap some of the passengers
    including South Koreans. (Reuters)
  - Israel has begun releasing 250 Palestinian prisoners associated with Fatah. (BBC)
  - '2007 FIFA U-20 World Cup: After the Argentina vs Chile semi-final game ended,
    a scuffle between Toronto Police officers and members of the Chilean team led
    to the arrest of 21 players. (TSN)'
  - Shoaib Mansoor's Khuda Ke Liye is released all over Pakistan by Geo Films and
    is considered to be the revival of cinema in Pakistan.
  - Tewkesbury was flooded
