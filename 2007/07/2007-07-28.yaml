Date: '2007-07-28'
Source_URI: Portal:Current events/2007 July 28
Intelligence_Payload:
  Uncategorized:
  - Pakistan raises concerns about a draft bill adopted by the United States Congress
    that ties United States foreign aid to progress in the fight against Al Qaeda
    and the Taliban. (The Hindu)
  - Colombia's intelligence chief Andrés Peñate claims FARC rebels accidentally killed
    11 politicians it was holding, after running into another rebel unit. (BBC)
  - The President of the United States George W. Bush urges Congress to pass legislation
    to expand potential surveillance targets. (Bloomberg)
  - The death toll from the Summer 2007 United Kingdom floods rises to nine as police
    find a body near Tewkesbury in Gloucestershire. (Reuters via ABC News Australia)
  - 'War in Afghanistan: A British soldier is killed by a rocket attack in the Helmand
    Province. (BBC)'
  - The Lal Masjid in Islamabad is closed indefinitely following a suicide bombing
    with Pakistani authorities warning of more bomb attacks to come. (Reuters via
    CNN)
  - Dr Mohamed Haneef, the Indian doctor freed in Australia of supporting terrorism,
    indicates that he would like to return to India as soon as possible. He later
    received clearance from the Australian Government to leave tonight. (Reuters)
    (ABC News Australia)
  - Bernard Kouchner, the French Foreign Minister, arrives in Lebanon to reduce tensions
    between the Prime Minister of Lebanon Fouad Siniora and the pro-Syrian opposition.
    (BBC)
  - Rwanda abolishes capital punishment. (Calcutta News)
