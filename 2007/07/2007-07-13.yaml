Date: '2007-07-13'
Source_URI: Portal:Current events/2007 July 13
Intelligence_Payload:
  Uncategorized:
  - The Fifteenth Pan American Games begin in Rio de Janeiro, Brazil. (Official Website)
  - Conrad Black is found guilty on three charges of fraud and one charge of obstruction
    of justice in Chicago. (BBC)
  - The world's third largest optical telescope, the 10.4m Gran Telescopio Canarias
    on the island of La Palma, starts its commissioning observations. (The Guardian)
    (BBC)
  - Indonesia and the Philippines agree to expand intelligence sharing with hopes
    that it will help track down two suspects in the 2002 Bali bombings. (Reuters
    via ABC News Australia)
  - Iran and the International Atomic Energy Agency reach agreement on resolving the
    disputes over the Iranian nuclear program. (Reuters)
  - North Korea's military seeks talks with the United States to discuss "peace and
    security on the Korean peninsula." (BBC)
  Typhoon Man-yi:
  - The death toll in the sinking of the MV Blue Water Princess of the coast of Luzon
    in the Philippines rises to 15. (Fox News)
  - Okinawa, Japan suffers blackouts and flights are cancelled to and from the island
    as the typhoon passes through the island prefecture. (Reuters via News Limited)
