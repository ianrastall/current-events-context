Date: '2007-07-07'
Source_URI: Portal:Current events/2007 July 7
Intelligence_Payload:
  Uncategorized:
  - Pope Benedict XVI removes restrictions on celebrating the old Latin Mass, reviving
    an ancient Roman Rite Mass liturgy that was essentially abolished after the Second
    Vatican Council. (Washington Post via AP)
  - The New Seven Wonders of the World are announced. These are The Great Wall of
    China, Petra in Jordan, the Christ the Redeemer statue in Brazil, Machu Picchu
    in Peru, Mexico's Chichen Itza Mayan site, the Colosseum in Rome and the Taj Mahal
    in India. (Reuters via ABC News Australia)
  - A bus crash in Java kills at least 14 people. 48 people were injured, many seriously.
    (AP via the Guardian)
  - '2007 Amirli bombing: At least 105 people are killed when a suicide truck bomber
    attacks a market in Amirli in northern Iraq with a majority Shiite Turkmen population.
    (Reuters via ABC News Australia)'
  - The Government of Afghanistan states that it will investigate claims that United
    States and NATO air strikes caused heavy civilian casualties in Farah Province
    and Kunar Province. (Reuters)
  - Live Earth gets underway with concerts in Australia, the United States, Germany,
    South Africa, the United Kingdom, Brazil, Japan and China. (Sydney Morning Herald)
  - King Gyanendra of Nepal celebrates his 60th birthday amid protests by students
    and youth wings of eight ruling parties.
