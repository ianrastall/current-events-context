Date: '2007-07-16'
Source_URI: Portal:Current events/2007 July 16
Intelligence_Payload:
  Uncategorized:
  - Felisa Miceli, the Argentine Economy Minister, resigns over approximately $60,000
    found in a bag in her office. (Reuters via the Scotsman)
  - The President of the United States George W. Bush and the President of Poland
    Lech Kaczyński agree to proceed with building a missile defense system in Europe
    despite Russian concerns. (Reuters)
  - The President of the United States announces a Middle East peace conference in
    the fall involving Israel, Palestinians and neighboring countries. (NYT)
  - Britain expels four Russian diplomats and suspends visa negotiations over Russia's
    failure to extradite Andrei Lugovoy in connection with the murder of Alexander
    Litvinenko. (Reuters via News Limited)
  - At least 86 people are killed and 136 injured in a car bomb and truck bomb attacks
    in Kirkuk, Iraq. (Radio Australia)
  - China punishes 95 officials for allowing workers and children to labour in slave-like
    conditions in brick kilns. (Reuters)
  - Israel agrees to remove 178 Palestinian militants from its watch list after they
    sign a pledge renouncing attacks against it. (CNN)
  - International Atomic Energy Agency inspectors confirm the closure of the Yongbyon
    reactor in North Korea. (BBC)
  - ATN Bangla television reports that Bangladeshi police have arrested former Prime
    Minister of Bangladesh Sheikh Hasina on charges of extorting money from a businessman.
    (AP via IHT)
  - Dr Mohamed Haneef is granted bail by a Queensland magistrate on charges of supporting
    a terrorist organisation in relation to the 2007 Glasgow International Airport
    attack and the 2007 London car bombs. The Australian government later revokes
    his visa. (The Courier-Mail) (Sydney Morning Herald)
  - A 6.8 magnitude earthquake hits Japan with a tsunami warning being issued in Niigata
    Prefecture, Honshū. At least eight people have been killed and over 700 injured.
    There was a fire in the Kashiwazaki-Kariwa Nuclear Power Plant as well as a small
    leak but not sufficient to damage the environment. (BBC) (CNN) (AFP via Reuters)
    (Kyodo News), (AFP via ABC News Australia)
