Date: '2007-07-09'
Source_URI: Portal:Current events/2007 July 9
Intelligence_Payload:
  Uncategorized:
  - A Piper Cherokee fixed-wing single engine airplane crashes during thunderstorms
    in Tyringham, Massachusetts, killing the two people on the plane. (The Berkshire
    Eagle)
  - Andrzej Lepper is sacked as the Deputy Prime Minister of Poland over allegations
    of corruption involving his Samoobrona party with the prospect of an early election.
    (Interfax Central Europe)
  - United States Senator David Vitter of Louisiana apologises after his name is found
    on a list associated with an escort agency operated by the so-called D.C. Madam.
    (AP via the Guardian)
  - 'Lal Masjid siege: An attempt to negotiate a peaceful end to the seven-day standoff
    at Islamabad''s Red Mosque ends without any progress. (Al jazeera)'
  - Four men are found guilty of conspiracy to murder over the failed terror attacks
    on the London Underground on July 21, 2005. (Sky)
  - The Election Commission of India issues notification for the election of the next
    Vice President of India. The election is scheduled to be held on August 10, 2007.
  - On the country's Independence Day, snow falls in Buenos Aires, Argentina, for
    the first time in 89 years and the second time in recorded history. Two people
    die of exposure in Argentina while one person dies in Chile. (BBC)
  - The Arab League agrees to send a delegation to Israel for the first time. (AP
    via CNN)
  - The Governor of Pennsylvania Ed Rendell orders a partial shutdown of state government
    functions following the failure of state legislators to agree on a budget. (AP
    via the Daily Review)
