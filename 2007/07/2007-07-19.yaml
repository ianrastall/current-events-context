Date: '2007-07-19'
Source_URI: Portal:Current events/2007 July 19
Intelligence_Payload:
  Uncategorized:
  - The National Resistance Movement, the governing party of Uganda, announces plans
    to introduce compulsory national service. (The Kampala Monitor)
  - 'TAM Linhas Aéreas Flight 3054: TAM Linhas Aéreas claims that there was a braking
    problem in the aircraft. (AFP via ABC News Australia)'
  - Two United States Army soldiers are charged with murder of an Iraqi and their
    battalion commander is relieved of duty due to the incident. (The Los Angeles
    Times)
  - In the United Kingdom, the Labour Party wins a by-election in the seat of Sedgefield
    formerly held by Tony Blair as well as the constituency of Ealing Southall. (The
    Independent) (Reuters via News Limited)
  - The Dow Jones Industrial Average closes above 14,000 points for the first time
    in history, partly as a result of a good earnings report from IBM. (AFP via ABC
    News Australia)
  - The largest Viking treasure discovery in the United Kingdom since the nineteenth
    century made near Harrogate in northern England is announced. (Reuters via Melbourne
    Herald Sun)
  - Suspected Somali insurgents target a peace meeting with mortar fire but accidentally
    kill six children. (Reuters via Canada.com)
  - A U.S. federal judge dismisses a case brought by Valerie Plame against members
    of the Bush Administration in connection with the Plame affair. (CNN)
  - Death toll in the Mumbai building collapse rises to 26 as rescue operations continues.
  - Russia expels four British diplomats in the ongoing row over the extradition of
    Andrei Lugovoi for the suspected murder of Russian spy Alexander Litvinenko. (Sky)
  - A report commissioned by the Solomon Islands Government is critical of the handling
    of last year's Honiara riots by the Regional Assistance Mission to the Solomon
    Islands (RAMSI). (AAP via News Limited)
  - Iraq's main Sunni Arab political block, the Iraqi Accord Front, agrees to end
    its boycott of the Iraqi Council of Representatives. (Reuters)
  - Heritage Oil and Gas finds a petroleum deposit in Uganda. HOG estimates the deposit
    contains several billions of barrels of oil, the largest find in Africa in over
    a decade. (AllAfrica)
  - Japanese media reports claim that the Kashiwazaki-Kariwa Nuclear Power Plant will
    remain closed for at least a year following the 2007 Chūetsu offshore earthquake.
    (BBC)
  - Three bombs in Pakistan kill at least 52 people with at least 160 people killed
    in bomb attacks since the storming of the Lal Masjid mosque. (Reuters)
  - Castleberry's Food Company of Augusta, Georgia issues a recall on hot dog chili
    sauce and other products, due to contamination of Clostridium botulinum. 8 people
    contracted Botulism poisoning from Castleberry's products. This prompts the first
    botulism recall of canned foods in the United States in over 30 years. (CDC)
