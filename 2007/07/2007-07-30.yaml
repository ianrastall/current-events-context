Date: '2007-07-30'
Source_URI: Portal:Current events/2007 July 30
Intelligence_Payload:
  Uncategorized:
  - A new species of scallop as well as a new species of octopus are discovered off
    the coast of Nova Scotia.
  - Juan Manuel Santos, the Defense Minister of Colombia, claims that the military
    has been infiltrated by FARC and drug gangs. (Reuters via Canada.com)
  - Agents from the Federal Bureau of Investigation and Internal Revenue Service search
    the house of Senator Ted Stevens in Girdwood, Alaska. (AP via ABC News America)
  - The United States Secretary of State Condoleezza Rice and the United States Secretary
    of Defense Robert Gates travel to the Middle East to offer increased aid to allies
    of the United States and to seek advice on Iraq. (Reuters)
  - Bedouin clash with Egyptian riot police near the Gaza Strip. (Reuters via ABC
    News Australia)
  - The Palestinian President Mahmoud Abbas travels to Moscow seeking Russian support.
    (Itar-Tass)
  - International Atomic Energy Agency inspectors visit the Arak heavy-water reactor
    site in Iran. (Reuters)
  - The Chief Justice of the United States John Roberts is hospitalized after suffering
    a seizure at his summer home in Maine. (The Washington Post)
  - The President of the United States George W. Bush and the Prime Minister of the
    United Kingdom Gordon Brown pledge to continue close relations in their first
    meeting. (The New York Times)
  - Islamic militants occupy a shrine in a tribal area of Pakistan and name it after
    the Lal Masjid in Islamabad recently stormed by the Pakistan army. (BBC)
  - A 15th village in the Czech Republic rejects by referendum the US plan to place
    anti-ballistic missiles at a nearby military base. The vote was 97% against the
    plan, however, the vote is non-binding on the national government. (Ceske Noviny)
    (Monsters and Critics)
  - An Afghan governor asks the Taliban to extend Monday's deadline for the lives
    of 22 South Koreans, after militants warned the Afghan government to release 23
    of its captured fighters or else hostages will die. The Taliban later executes
    a hostage. (AP via The China Post) (BBC)
  - Papua New Guinea's Electoral Commission extends the counting period for the recent
    election due to polling and counting delays in some seats. (ABC News Australia)
  - Deaths in China from floods, lightning and landslides during the summer approach
    700. (Reuters)
  - Victoria's Labor caucus elects John Brumby as Premier and Rob Hulls as his deputy.
    (ABC News Australia)
  - Sixty-nine miners are trapped in a flooded coal mine in Henan province in central
    China. (Reuters via CNN)
  - The President of the Ivory Coast Laurent Gbagbo visits the former rebel held north
    for the first time since 2002 where stockpiled weapons will be burnt as a symbol
    of reconciliation after the end of an uprising. (BBC)
