Date: '2007-07-04'
Source_URI: Portal:Current events/2007 July 4
Intelligence_Payload:
  Uncategorized:
  - Twelve defendants involved in the Chinese slave scandal are charged for illegal
    detention and murder. (Xinhua)
  - Ayman al-Zawahri, the second in charge of Al Qaeda, issues a video calling for
    further jihad and calling for the overthrow of "corrupt" Governments in the Middle
    East. (Reuters)
  - A landslide buries a bus carrying at least 40 people in mountains near Tehuacán
    in the Mexican state of Puebla. (New York Times)
  - Investigators find a suicide note from the two men accused of involvement in the
    2007 Glasgow International Airport attack. (CNN)
  - Fretilin wins more votes than any other party in the East Timorese election with
    29 per cent of the vote but has to form a coalition with other parties to form
    a government. (AP via the Washington Post)
  - A power blackout hits eastern Georgia, leaving 2.5m people without electricity
    and briefly stranding a thousand on the Tbilisi Metro. (BBC)
  - The terror threat level in the United Kingdom is reduced from critical to severe.
    (The Guardian)
  - The 9th summit of the Assembly of the African Union, which lasted for 3 days,
    ends in Accra, Ghana. (BBC) (Ghana Home Page)
  - Over 700 students surrender at a mosque in Islamabad after being surrounded by
    Pakistani security forces. (BBC)
  - Japan's first female Minister of Defense, Yuriko Koike, is sworn in a day after
    the resignation of her predecessor, Fumio Kyuma. (Marketwatch)
  - The International Olympic Committee elects Sochi as the host city for the 2014
    Winter Olympics during its session in Guatemala City. (IOC)
  - A tornado kills 14 people and injures at least 146 near Tianchang, Anhui Province,
    in eastern China. (Reuters)
  - Syrian Foreign Minister Walid Muallem says the government is open to peace negotiations
    with Israel without preconditions. (The Peninsula)
  - BBC reporter Alan Johnston, held captive in Gaza for nearly four months, is released.
    (Reuters) (BBC)
  - 'War in Afghanistan: Six Canadian soldiers were killed by a roadside bomb in the
    Panjwaii district. (CTV)'
