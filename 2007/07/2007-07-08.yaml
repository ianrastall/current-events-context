Date: '2007-07-08'
Source_URI: Portal:Current events/2007 July 8
Intelligence_Payload:
  Uncategorized:
  - Nigerian gunmen release British toddler Margaret Hill kidnapped in the south of
    Nigeria on Thursday. (CNN)
  - The Boeing Company unveils its newest airplane, the Boeing 787 "Dreamliner" at
    its facility in Everett, Washington, USA. The 787 is an alternative to Airbus's
    A350. (MSNBC) (BBC)
  - Valdis Zatlers is sworn in as the third President of Latvia. (AP via IHT)
  - Polling in the Papua New Guinea election is extended due to weather and transport
    problems. (ABC News Australia)
  - A fierce battle breaks out between the Sri Lankan navy and the Tamil Tigers off
    the eastern coast of Trincomalee province. (AP via CNN)
  - The Australian Department of Foreign Affairs and Trade warns of an imminent terrorist
    threat in Indonesia. (AAP via News Limited)
  - Roger Federer defeats Rafael Nadal 7–6, 4–6, 7–6, 2–6, 6–2 to claim his fifth
    consecutive Wimbledon title, equaling an Open Era record set by Björn Borg in
    1980. Borg was in attendance to present the Wimbledon trophy to Federer. (BBC)
  - Portia Simpson-Miller, prime minister of Jamaica, announces that the Jamaican
    general election, 2007 will be held on August 27th, 2007 at a rally for People's
    National Party in Kingston, Jamaica. (Toronto Star)
