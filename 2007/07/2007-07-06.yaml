Date: '2007-07-06'
Source_URI: Portal:Current events/2007 July 6
Intelligence_Payload:
  Uncategorized:
  - The 6th United States Circuit Court of Appeals in Ohio rejects a lawsuit against
    George W. Bush's domestic wiretapping program, saying that the plaintiffs did
    not have the right to sue. (CNET News)
  - Newly declassified French government documents show that as President François
    Mitterrand knowingly supported the Rwandan Genocide because he believed it would
    limit "Anglo-Saxon influence." (The Independent)
  - Iraqi doctor Bilal Abdullah is charged for his alleged involvement in the 2007
    Glasgow International Airport attack. (BBC)
  - Australian authorities increase security as the interrogation of Dr. Mohamed Haneef
    over his possible involvement in the 2007 Glasgow International Airport attack
    and the 2007 London car bombs incidents continues. The Australian Federal Police
    conducts raids on two hospitals in Perth, Western Australia. (Reuters) (AP via
    the Houston Chronicle)
  - The No.1 Intermediate Court in Beijing sentences former State Food and Drug Administration
    chief Cao Wenzhuang to death with a two-year reprieve on charges of corruption.
    (NYT)
  - An investigation concludes that an explosion in Tianshifu, China that killed 25
    was caused by improperly stored explosives. (Wikinews)
