Date: '2007-07-26'
Source_URI: Portal:Current events/2007 July 26
Intelligence_Payload:
  Uncategorized:
  - The United States Senate passes a package of measures recommended by the 9/11
    Commission. (Fox News)
  - The United States Food and Drug Administration suspends a gene therapy study and
    reviews 28 others after the death of a patient. (AP via CNN)
  - Three people are killed and three injured in an explosion at the Mojave Airport
    in California. (Reuters)
  - The Dow Jones Industrial Average falls more than 300 points due to concerns about
    weaknesses in the United States housing market and weak profit results. (Reuters
    via CNN)
  - NASA confirms that it discovered the apparent sabotage of a non-critical component
    of the International Space Station due to be carried up by the Space Shuttle Endeavour
    on August 7. (CNN)
  - A car bomb in Baghdad kills at least 25 Iraqis and injures at least 50 more. (ABC
    News Australia)
  - Mohammad Dahlan resigns as National Security Adviser to the President of the Palestinian
    Authority Mahmoud Abbas due to his role in the recent defeat of Fatah in the Gaza
    Strip. (New York Times)
  - United States District Court judge Nancy Gertner orders the United States Government
    to pay $101.5 million in compensation to four men for wrongful convictions when
    the Federal Bureau of Investigation withheld exculpatory evidence. (AP via Fox
    News)
  - Israeli troops and airstrike kill four militants in an incursion into the Gaza
    Strip including three members of Islamic Jihad and one Hamas member. (BBC)
  - Former Bangladesh Telecommunication Minister Aminul Huq is sentenced to 31 years
    in jail for his role in aiding Jamaat-ul-Mujahideen Bangladesh with terrorist
    bomb attacks in the country.
  - An explosion at an ordnance depot in Aleppo, Syria kills at least 15 people and
    injures 50 others. (AP via Jerusalem Post)
  - Effects of the 2007 European heat wave worsen with new forest fires being reported.
    (BBC)
  - A magnitude 7 earthquake in the Maluku Sea off the coast of Indonesia triggers
    a tsunami warning for North Maluku in Indonesia which is later cancelled. (AP
    via the Houston Chronicle) (BBC)
  - 'War in Afghanistan: United States-led troops kill more than 50 insurgents in
    the Helmand province of Afghanistan. (Reuters)'
  - 'Summer 2007 United Kingdom floods: Flood water levels in the River Thames is
    expected to rise further as England expects more heavy rain. Two people die in
    Tewkesbury, Gloucestershire trying to pump water out of a club. (BBC) (Daily Telegraph)'
  - North Korea walks out of talks with South Korea over the failure to resolve a
    sea border. (AP via Fox News)
