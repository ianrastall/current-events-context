Date: '2007-07-02'
Source_URI: Portal:Current events/2007 July 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eight people die in a car bomb explosion at a tourist site in Yemen. (Sky)
  Arts and culture:
  - The Carlyle Group offers somewhere between £4 billion and £5 billion for the purchase
    of heavily-indebted Virgin Media. (WSJ)
  - Corporal Bill Henry "Willie" Apiata of the Special Air Service of New Zealand
    is awarded the Victoria Cross for bravery under fire in Afghanistan in 2004. (ABC
    News Australia)
  Business and economy:
  - Wesfarmers buys Coles Group for $A22 billion in Australia's biggest corporate
    deal. (Sydney Morning Herald)
  International relations:
  - U.S. President George W. Bush holds talks with the President of Russia Vladimir
    Putin in Kennebunkport, Maine discussing missile defense and Iran. (AP via NYT)
  - The United States accuses Iran of using Hezbollah to train Shia militants in Iraq.
    The Iranian Defence Minister had earlier called the US the "biggest sponsor of
    terrorism" in the world. (BBC) (Press TV)
  Law and crime:
  - Garda Síochána find over 1.5 tonnes of cocaine worth over €105 million off the
    coast of West Cork after a small ship sinks - the largest cocaine seizure in the
    history of Ireland. The naval diving squad are continuing the search, as experts
    believe more of the drug is still in the sea. (RTÉ)
  - Brahim Déby, heir apparent to President Idriss Déby of Chad, is murdered in Paris,
    France. (IHT)
  - U.S. President George W. Bush commutes Scooter Libby's prison sentence with a
    Grant of Executive Clemency for his role in the Plame Affair. (Reuters) (Whitehouse.gov)
  - Lieutenant-Colonel Thomas K. Mooney, the military attaché at the United States
    Embassy is found dead in western Cyprus. (AP via IHT)
  - British detectives continue the hunt for suspects in the 2007 Glasgow International
    Airport attack and the 2007 London car bombs plot. Two doctors are among the seven
    people currently in custody in the UK in connection with the attacks with another
    person held in Brisbane, Queensland. (BBC) (BBC) (BBC) (The Melbourne Age)
  - The trial over the murder of Turkish-Armenian journalist Hrant Dink opens in Istanbul,
    Turkey. (BBC)
