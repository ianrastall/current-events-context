Date: '2007-10-02'
Source_URI: Portal:Current events/2007 October 2
Intelligence_Payload:
  Uncategorized:
  - 2007 Summer Special Olympics opens in Shanghai, China. (Wall Street Journal)
  - Citigroup buys out minority shareholders of Japanese brokerage Nikko Cordial for
    $4.6 billion. (Reuters via CNBC)
  - Five workers are trapped underground in an Xcel Energy hydroelectric plant near
    Georgetown, Colorado, United States due to a chemical fire. They are later found
    dead. (Reuters) (Fox News)
  - At least 27 people are killed when a bus catches fire in Chongqing, southwest
    China. (News Limited)
  - Israel confirms it conducted an airstrike on Syria on September 6. (Ynet)
  - 'Iraq War: The Prime Minister of the United Kingdom Gordon Brown makes his first
    visit to Iraq, where he announces the withdrawal of 1,000 troops. (BBC) (AP via
    Topix)'
  - 'War in Afghanistan: A suicide bomber blows himself up near a bus carrying policemen
    killing at least 11 in Kabul. (BBC)'
  - The President of South Korea Roh Moo-hyun walks across the Korean Demilitarized
    Zone in travelling to Pyongyang for talks with North Korean leader Kim Jong Il.
    (BBC) (CNN)
  - Manhattan Community Board 5 voted to add the Hotel Pennsylvania to the list of
    NYC Historic buildings. (CB5)
  Pakistan:
  - The Pakistani cabinet announces plans to drop all corruption charges against former
    Prime Minister Benazir Bhutto.
  - The President of Pakistan Pervez Musharraf appoints General Ashfaq Kiyani to succeed
    him as the head of the Pakistan Army after Saturday's election. (Washington Post)
  2007 Burmese anti-government protests:
  - United Nations special envoy Ibrahim Gambari meets with Burmese General Than Shwe
    to tell him to stop the killing of dissidents. (The Guardian)
  - Gambari later meets with democracy leader Aung San Suu Kyi with growing fear about
    the wellbeing of approximately 1000 dissidents held in a warehouse in the Government
    Technical Institute in Rangoon. (AFP, Reuters via The Melbourne Age)
