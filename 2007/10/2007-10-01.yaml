Date: '2007-10-01'
Source_URI: Portal:Current events/2007 October 1
Intelligence_Payload:
  Uncategorized:
  - Pope Benedict XVI replaced Archbishop Piero Marini, the longtime director of office
    of papal liturgies, with Father Guido Marini of the Genoa archdiocese. (Novus
    Motus Liturgicus)
  - President of Russia Vladimir Putin announces he will run on centrist list in the
    parliamentary elections in December and that he does not exclude the option of
    becoming Prime Minister of Russia after the election.
  - 'Ukrainian parliamentary election, 2007: With 70 percent counted, Yulia Tymoshenko''s
    bloc and Viktor Yushchenko''s Our Ukraine party had 48 percent of the vote. Prime
    Minister Viktor Yanukovych''s party and his Communist and Socialist allies had
    36.8 percent. (Bloomberg)'
  - At least 15 people are killed and 19 others injured in a suspected suicide bomb
    blast in Bannu in Pakistan's North-West Frontier Province. (BBC)
  - The Colorado Rockies beat the San Diego Padres in an extra-innings tiebreaker
    game to clinch a wild card berth to the playoffs
