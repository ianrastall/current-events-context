Date: '2007-10-09'
Source_URI: Portal:Current events/2007 October 9
Intelligence_Payload:
  Uncategorized:
  - The British Government drops plans to ban the mixing of sperm and eggs from different
    species. (The Guardian)
  - Christian von Wernich, a Roman Catholic priest and former police chaplain is sentenced
    to a life sentence for his role in torture, kidnapping and murder during Argentina's
    dirty war. (Reuters via News Limited)
  - The United States Supreme Court dismisses the case of the German citizen Khalid
    El-Masri who accuses the CIA of abducting him to a secret prison in Afghanistan
    where he claims he was tortured. The US government had argued that a public trial
    would reveal state secrets. (Deutsche Welle)(LA Times)
  - Japan extends sanctions against North Korea, citing a lack of progress in a dispute
    about the abduction of Japanese nationals. (BBC)
  - The President of France Nicolas Sarkozy travels to Moscow to meet with the President
    of Russia Vladimir Putin to discuss a broad range of policies including Kosovo,
    Chechnya, and Iran. (AFP via Google)
  - Albert Fert and Peter Grünberg are announced as winners of the 2007 Nobel Prize
    in Physics for the discovery of giant magnetoresistance. (Nobelprize.org) (USA
    Today)
  - The general election in the Canadian province of Newfoundland and Labrador gives
    the Conservative government of Premier Danny Williams an enlarged majority at
    the expense of the Liberals. (CBC)
  - The Dow Jones Industrial Average reaches its highest point in history, closing
    at a record high of 14,164.53.
  Pakistan - Battle of Mir Ali:
  - 20 people are injured in Peshawar, Pakistan, when a bomb rips through a music
    shop.
  - At least sixty people are killed as Pakistani aircraft bomb a bazaar in Epi village
    in North Waziristan. (CNN)
  Iraq War:
  - Employees of Australian-owned security firm Unity Resources Group open fire on
    a car in Baghdad killing two Iraqi women.(CNN)
  - Twin blasts in the town of Baiji kill at least eight people and injures dozens
    more. (BBC)
