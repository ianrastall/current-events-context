Date: '2007-10-12'
Source_URI: Portal:Current events/2007 October 12
Intelligence_Payload:
  Uncategorized:
  - The Prime Minister of Canada Stephen Harper appoints a five-member advisory committee
    on Afghanistan to be chaired by John Manley of the opposition Liberal Party of
    Canada. (ABC News Australia)
  - The President of Russia Vladimir Putin threatens to renounce the Cold War-era
    INF Treaty while calling on the United States to abandon a proposed European missile
    shield in talks with the United States Secretary of State Condoleezza Rice and
    Secretary of Defence Robert Gates. (AFP)
  - Former U.S. Vice President Al Gore and the UN Intergovernmental Panel on Climate
    Change (IPCC) share the 2007 Nobel Peace Prize. (Washington Post)
  - Indonesia and Australia commemorate the fifth anniversary of the 2002 Bali bombings.
    (ABC News Australia) (BBC)
  - Three people are dead at the Newhall Pass interchange on Interstate 5 just north
    of Los Angeles, California after thirty-one vehicles collide in a highway tunnel,
    closing the freeway entirely. (CNN)
