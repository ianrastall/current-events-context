Date: '2007-10-16'
Source_URI: Portal:Current events/2007 October 16
Intelligence_Payload:
  Uncategorized:
  - Irish writer Anne Enright wins the 2007 Man Booker Prize for her novel The Gathering.
    (BBC News)
  - Libya, Vietnam, Burkina Faso, Croatia and Costa Rica are elected to the United
    Nations Security Council as non-permanent members. (BBC News)
  - The Prime Minister of India Manmohan Singh advises the President of the United
    States George W. Bush that India is unlikely to sign a pact with the United States
    on civil nuclear cooperation. (The Sydney Morning Herald)
  - Macedonian singer Tose Proeski passes away in Croatia. (CBC)
