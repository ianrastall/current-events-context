Date: '2007-10-29'
Source_URI: Portal:Current events/2007 October 29
Intelligence_Payload:
  Uncategorized:
  - The strain of HIV most common in the United States, Europe, Japan, Australia and
    much of South America is traced back to Haiti in 1969. (BBC)
  - The USS Arleigh Burke enters Somali waters in pursuit of a Japanese ship carrying
    benzene that was hijacked by pirates. (CNN)
  - 'Argentine general election, 2007: Cristina Fernández de Kirchner is elected President
    of Argentina. (Argentina results) (CNN)'
  - King Abdullah of Saudi Arabia claims the Government of the United Kingdom failed
    to act on intelligence given to it by the Government of Saudi Arabia which could
    have prevented the 7 July 2005 London bombings. (Guardian Unlimited)
  - The Prime Minister of Israel Ehud Olmert announces that he has been diagnosed
    with early-stage prostate cancer. (NYT)
  - Salim Aliyow Ibrow becomes Prime Minister of Somalia in the Transitional Federal
    Government as the embattled Ali Mohamed Ghedi resigns. (BBC)
  - The UK embassy in Baku, Azerbaijan, is closed as a precaution after a terrorist
    attack in the city is prevented. The US embassy also closes its doors after the
    Azerbaijan Government reports of the thwarting of a "large-scale, horrifying terror
    attack." (Sky) (AP)
  - An earthquake with magnitude of five on Richter scale shakes central Nepal.
  - All banks and post offices in Borlänge, Sweden, are kept closed by the local police
    due to an "elevated risk level of bank robbery". (TT via Dagens Nyheter)
  - Kasereka Kabamba, a Mai Mai militia leader in the Democratic Republic of the Congo,
    surrenders to Nord-Kivu Army Chief Vainqueur Mayala. Kabamba maintains his forces
    fought against rebels loyal to Laurent Kabila, in the service of the government.
    (BBC)
  - One of two men alleged to be involved in a gay-sex-and-drugs blackmail plot against
    a minor member of the British Royal Family will appear in court this week. (Times
    Online)
  People's Republic of China:
  - The Central Committee of the Communist Party of China announces that new Politburo
    Standing Committee member Li Keqiang has left his post as party secretary of Liaoning
    and is succeeded by Liaoning Governor Zhang Wenyue. (Xinhua)
  - The Chinese government announces that it has arrested 774 people as part of a
    crackdown on the production of tainted drugs, food and agricultural products.
    (NYT)
