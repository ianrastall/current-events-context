Date: '2007-10-10'
Source_URI: Portal:Current events/2007 October 10
Intelligence_Payload:
  Uncategorized:
  - Polish police evict about 65 rebellious ex-nuns who had illegally occupied a convent
    in Kazimierz Dolny, Poland, for more than two years in defiance of a Vatican order.
    (AP)
  - The general election in the Canadian province of Ontario gives the Liberal government
    of Premier Dalton McGuinty an enlarged majority. (Bloomberg)
  - Tibetan exiles storm the embassy of the People's Republic of China in New Delhi
    to protest the lack of religious freedom in China. (AP via CNN)
  - Taliban frees one German and four Afghan hostages kidnapped in mid-July.
  - The United States Centers for Disease Control and Prevention warns consumers not
    to eat Banquet pot pies or other pot pies made by ConAgra with a printed code
    ending in C9 due to possible links with a salmonella outbreak. (AP via WJBF)
  - Mahmoud Abbas, the President of the Palestinian Authority, spells out his conditions
    for a peace deal with Israel prior to a conference in Annapolis, Maryland, next
    month. (The Guardian)
  - The United Automobile Workers reaches a tentative agreement with Chrysler shortly
    after workers commence strike action. (Fox News)
  - The first Malaysian astronaut, Sheikh Muszaphar Shukor, and the first female space
    station commander, Peggy Whitson, are launched towards the International Space
    Station on board Soyuz TMA-11. (Spaceflightnow)
  - German scientist Gerhard Ertl is announced as the winner of the 2007 Nobel Prize
    in Chemistry for his work on chemical processes on solid surfaces. (BBC)
  - The International Monetary Fund warns of a slowdown of the global economy in 2008
    as a result of financial turmoil on global markets. (BBC)
  - An earthquake measuring 4.8 on the Richter scale is recorded just south of Katanning,
    Western Australia, and felt as far away as Perth, Western Australia. (ABC)
  - A 14-year-old high school student goes on a shooting rampage in Cleveland, Ohio,
    wounding two teachers and two students before his death. (CNN)
