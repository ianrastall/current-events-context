Date: '2007-10-04'
Source_URI: Portal:Current events/2007 October 4
Intelligence_Payload:
  Uncategorized:
  - United States Republican Party Senator Pete Domenici of New Mexico announces that
    he will retire at the end of his current term due to a degenerative brain disease.
    (AP via Google News)
  - The Prime Minister of Canada Stephen Harper chooses Mark Carney to succeed David
    Dodge as governor of the Bank of Canada. (Bloomberg)
  - The recording industry wins a key victory with a court in the U.S. state of Minnesota
    finding that a woman was liable for damages of $220,000 for sharing copyrighted
    music online through Kazaa. (USA Today)
  - Family members of deceased de facto president of Chile Augusto Pinochet are arrested
    in Santiago on charges of embezzlement. (BBC)
  - Republican Party Senator Larry Craig from Idaho vows to serve out his term in
    the United States Senate despite losing a court bid to rescind a guilty plea for
    an indecent act in a Minneapolis Airport men's room. (AP via the Guardian)
  - India asks neighboring Myanmar to free Aung San Suu Kyi. (Times of India)
  - Bangladesh Supreme Court denies bail to former Prime Minister Khaleda Zia in a
    corruption and extortion case against her.
  - An Africa One Antonov An-26 cargo plane crashes into a residential area in Kinshasa,
    DR Congo. (Sky News)
  - North Korea and South Korea agree to seek talks with the People's Republic of
    China and the United States to reach a permanent peace agreement to formally end
    the Korean War. (Reuters)
  - Malcolm Turnbull, the Australian Federal Environment Minister, approves the Gunns
    Tamar Valley Pulp Mill but with an extensive list of conditions. (News Limited)
  - A rescue operation begins for 3,200 gold miners trapped in Elandsrand, South Africa.
    All of the miners are eventually rescued leading to wild celebrations. (AFP via
    News Limited) (SABC News) (Reuters via ABC News Australia)
  - A court case to challenge the overthrow of Laisenia Qarase's government of Fiji
    opens in Suva. (Radio New Zealand)
  - Russia celebrates the fiftieth anniversary of the launch of Sputnik 1, which marked
    the start of the Space Race. (BBC)
