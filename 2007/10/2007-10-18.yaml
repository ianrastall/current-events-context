Date: '2007-10-18'
Source_URI: Portal:Current events/2007 October 18
Intelligence_Payload:
  Uncategorized:
  - Oil prices reach $90 a barrel for the first time due to the low dollar and ongoing
    tension between Turkey and Iraq. (BBC)
  - The BBC announces 1,800 job cuts as part of restructuring to fill a £2 billion
    (US$4 bn) shortfall caused by lower than expected funding by the British government.
    (AFP via Google)
  - At least four people are killed in three days of tribal warfare near the Grasberg
    mine in the Papua province of Indonesia. (BBC)
  - French commuters face chaos after a public transport strike over proposed changes
    to pensions of transit workers continue. (Reuters)
  - Cécilia and Nicolas Sarkozy file for divorce. (CNN)
  Return of Benazir Bhutto:
  - Former Prime Minister of Pakistan Benazir Bhutto returns to Pakistan after eight
    years of self-exile, with a crowd of a million expected in Karachi to welcome
    her back. (CNN)
  - '2007 Karachi bombings: At least 138 people are killed and 600 injured as two
    bombs explode near a truck carrying Benazir Bhutto. (CNN)'
