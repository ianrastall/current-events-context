Date: '2007-10-19'
Source_URI: Portal:Current events/2007 October 19
Intelligence_Payload:
  Uncategorized:
  - EU leaders agree in Lisbon that the transcription "eвро" (evro) will be used in
    Bulgarian translations of the euro in official EU documents. (EuObserver)
  - The Dow Jones Industrial Average drops 369.1 points, or 2.7%, on the 20th anniversary
    of Black Monday. (CNN Money)
  - James D. Watson, who shared the 1962 Nobel Prize for deciphering the double-helix
    of DNA, apologizes for reported comments suggesting that black people, overall,
    are not as intelligent as whites. (NYT)
  - Six people die as a result of storms in the midwestern United States and Washington
    state. (AP via Google)
  - Two US Marines including a battalion commander will face a court martial in connection
    with the killing of 24 civilians in Haditha in 2005. (BBC)
  - Tens of thousands of people are evacuated from villages near Mount Kelud on Java
    as the volcano threatens to erupt. (AP via IHT)
  - Four United States Air Force officers are relieved of command following an investigation
    of an incident where live nuclear warheads were carried on a B-52 bomber from
    Minot Air Force Base in North Dakota to Barksdale Air Force Base in Louisiana.
    (CNN)
  - Sam Brownback, Senator for Kansas, pulls out of the 2008 United States presidential
    election due to a lack of support and funds. (AP via Fox News)
  - British Prime Minister Gordon Brown says that his predecessor Tony Blair would
    be a "great candidate" to become the first President of the European Council after
    EU leaders agree on a new Reform Treaty for the union. (AP via PR Inside)
  - '2007 Karachi bombings: The death toll from the bombings rises to 136 with 387
    people wounded. (CNN)'
  - An explosion kills up to eight civilians Glorietta Mall in Makati City, PhilippinesJee
    Ann De Gracia was one of the 11th victim of Bombing. (AFP via Inquirer)
  - A ship sinks off the coast of Sulawesi in Indonesia resulting in at least 31 deaths
    and 35 people missing. (Reuters via ABC News Australia)
  - Thailand arrests suspected Canadian child molester Christopher Paul Neil after
    an international man hunt. (Reuters) (CNN)
  - Leaders of the European Union reach agreement on the Lisbon Treaty following last-minute
    concessions to Poland, Italy and Bulgaria. (EuObserver) (ABC News Australia)
