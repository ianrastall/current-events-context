Date: '2007-10-25'
Source_URI: Portal:Current events/2007 October 25
Intelligence_Payload:
  Uncategorized:
  - Supporters of a U.S. congressional resolution condemning the Armenian genocide
    drop calls for a vote. (CNN)
  - The death toll from the California wildfires of October 2007 rises to 12 as four
    bodies are discovered near the Mexican border. (Reuters via ABC News Australia)
  - Ehud Barak, the Defense Minister of Israel, approves a plan to cut off supplies
    of electricity to the Gaza Strip which has been recently declared as "hostile
    territory". (CNN)
  - 30 killed in a powerful explosion near the police lines in Mingora in Swat, Pakistan.
  - The United States imposes economic sanctions against the Iranian Revolutionary
    Guard for its support of terrorism. (Sky News)
  - Yang Jiechi, the foreign minister of China, meets with Pranab Mukherjee, the Foreign
    Minister of India, to discuss India's aspirations to become a Permanent Member
    of the United Nations Security Council. (AP via IHT)
  - The Airbus A380 takes off on its inaugural passenger flight from Singapore to
    Sydney. (CNA) (Sydney Morning Herald)
  - A 7.1 magnitude earthquake occurs off the coast of Sumatra in Indonesia approximately
    135 kilometres south-west of Bengkulu. (Reuters via ABC News Australia)
  - The Tokelauan self-determination referendum fails by 16 votes. (New Zealand Herald)
  - EasyJet announce their intentions to purchase British Airways franchise GB Airways
    for £103.5 million
