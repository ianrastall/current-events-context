Date: '2007-10-05'
Source_URI: Portal:Current events/2007 October 5
Intelligence_Payload:
  Uncategorized:
  - Two bomb blasts in Kidapawan City, on Mindanao in the Philippines, the explosion
    killed a child and injured 36 people. (Radio Australia)
  - Topps Meat Company announces that it is going out of business as a result of recalling
    21.7 million pounds of beef in the United States linked to 30 cases of E. coli-related
    illness. (Reuters)
  - Canada stops the sale of Novartis anti-inflammatory drug Prexige and cancels its
    authorisation due to the risk of liver-related effects such as hepatitis. (Reuters
    via Wall Street Journal)
  - 'Iraq War: United States forces kill at least 25 members of a Shiite militia in
    a firefight. (AP via Topix)'
  - Marion Jones admits using banned substances during her athletic career and risks
    being stripped of her five Olympic medals. (AFP via ABC News Online)
  - Saudi Arabia announces that it will overhaul its judicial system including the
    creation of a supreme court, an appeals court and new general courts to replace
    the Supreme Judicial Council. (BBC)
  - Elections for a Nepalese Constituent Assembly are delayed as the Seven Party Alliance
    of ruling parties and the former Communist Party of Nepal (Maoist) rebels fail
    to break a deadlock over the republic issue and the voting system to be used.
    (BBC)
  - SELENE, Japan's lunar probe, successfully achieves an orbit around the moon. (AP
    via NYT)
  2007 Burmese anti-government protests:
  - Burmese security forces claim that they are looking for four of the monks that
    led the protests. (AP via CNN)
  - United Nations envoy Ibrahim Gambari briefs the Security Council on the situation
    in an open session. (CNN)
