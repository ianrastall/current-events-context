Date: '2007-10-07'
Source_URI: Portal:Current events/2007 October 7
Intelligence_Payload:
  Uncategorized:
  - 'War in Afghanistan: Sixteen militants fighting under wanted Uzbek warlord Tahir
    Yuldash are killed in eastern Afghanistan. (AP via Google)'
  - The United Auto Workers sets a Wednesday deadline to reach a new four-year contract
    with Chrysler. (NYT)
  - A sheriff's deputy shoots dead six young people in Crandon, Wisconsin, United
    States. It was initially believed that he was killed by a police sniper after
    a manhunt, but is now believed to have committed suicide by multiple gunshots.
    (Reuters)
  - Costa Ricans approve CAFTA in a referendum with 52% of the votes. (AP via Google
    News)
  - Pro-Taliban militants capture 28 Pakistan soldiers in the North Waziristan tribal
    region.
  - A Syrian military plane crashes near Damascus, killing all three on board. (AP
    via Google News)
  - Record-setting temperatures cause the 2007 Chicago Marathon to shut down after
    only three and a half hours and after the race has a men's open division photo
    finish, a death, and sprint finishes in the women's open and men's wheelchair
    divisions. (Chicago Tribune)
  - Vandals punch a 10-cm (4") tear in the Claude Monet painting Le Pont d'Argenteuil
    at the Orsay Museum during Paris's annual Nuit Blanche all-night cultural festival.
    (AP via Yahoo! News
  - Randy Orton is awarded the vacant WWE Championship which he loses in 10 minutes
    to Triple H, who defeats Umaga in the second title defense of the night, but loses
    in the 3rd to Randy Orton in a Last Man Standing match.
  - 'U.S. college football: On the heels of last week''s historic AP Poll shakeup,
    another one of comparable size occurs, in which four Top Ten teams and eleven
    ranked teams overall move down the list or off the poll entirely. LSU receives
    first place from all 65 sports critics, the first time that has occurred for any
    team since December 2006. #2 California earns its highest rank since 1951, #4
    Boston College earns its highest showing since 1984, and #5 South Florida continues
    its ascent after first moving into the AP Poll three weeks ago. (AP via Yahoo!
    Sports)'
  2007 Pacific typhoon season:
  - Typhoon Krosa moves towards China's southern Zhejiang and northern Fujian provinces.
    (AP via CNN)
  - The death toll from Severe Tropical Storm Lekima (Hanna) rises to 55. (AP via
    CNN)
