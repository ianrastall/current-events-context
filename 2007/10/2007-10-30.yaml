Date: '2007-10-30'
Source_URI: Portal:Current events/2007 October 30
Intelligence_Payload:
  Uncategorized:
  - An International Space Station solar wing relocated by the crew of STS-120 is
    torn during deployment. (spaceflightnow.com)
  - A moderate earthquake of 5.6 magnitude strikes 9 miles northeast of San Jose,
    California. (Reuters)
  - Tropical Storm Noel weakens after causing between 11 and 25 deaths in the Dominican
    Republic. (CNN)
  - Patricia Etteh resigns as speaker of Nigeria's House of Representatives amid accusations
    of corruption. (BBC)
  - The United States Supreme Court halts an execution in Mississippi pending its
    decision as to whether lethal injections are a form of cruel and unusual punishment.
    (AP via Google News)
  - The President of the United States George W. Bush nominates James Peake as the
    next United States Secretary of Veterans Affairs. (LA Times)
  - The United States Congress votes to extend a ban on Internet taxes for another
    seven years. (Technewsworld)
  - Six people are killed and 11 injured in a suicide bomb attack near Pakistan Army
    headquarters in Rawalpindi.
  - US light crude oil hits an all-time high of $US 93.53 (Xinhua)
  - The New Zealand Cabinet is reshuffled, with three new ministers appointed, and
    two leaving Cabinet. (New Zealand Herald)
