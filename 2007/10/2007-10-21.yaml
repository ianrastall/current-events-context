Date: '2007-10-21'
Source_URI: Portal:Current events/2007 October 21
Intelligence_Payload:
  Uncategorized:
  - Tokelauan ex-pats in Samoa go to the polls for the Tokelauan self-determination
    referendum. (Radio New Zealand)
  - Turkish people vote in favor of a constitutional referendum on electoral reform
    with a 69% majority. (AP via IHT)
  - Voters go to the polls in Slovenia to elect a new President, with Lojze Peterle
    winning most votes but not a majority. A runoff between him and Danilo Türk will
    be held on November 11. (The New York Times)
  - Marco Fu wins the 2007 Royal London Watches Grand Prix snooker tournament, defeating
    Ronnie O'Sullivan 9 frames to 6. (BBC)
  - Kyrgyz people go to the polls to vote on a constitutional referendum called by
    President Kurmanbek Bakiyev. (Reuters)
  - 'Speaking at the Washington Institute for Near East Policy, United States Vice
    President Dick Cheney states: "The United States joins other nations in sending
    a clear message - we will not allow Iran to have a nuclear weapon." (BBC)'
  - A fire in an illegal shoe factory kills at least 34 people in Putian in Fujian
    province, China. (BBC)
  - The Boston Red Sox defeat the Cleveland Indians 11-2 winning the 2007 American
    League Championship Series and going on to meet the Colorado Rockies, the 2007
    National League champions, in the 2007 World Series. (AP via Fox News)
  - The world's biggest banks endorse a rescue plan, also supported by the United
    States Treasury, to restore the world's financial system. (BBC)
  - Polish Prime Minister Jarosław Kaczyński is conceding defeat as exit polls give
    Donald Tusk's Civic Platform a large lead over his ruling nationalists in the
    parliamentary elections. (VOA) (BBC)
  - Kimi Räikkönen wins the 2007 Formula One World Drivers Championship. (BBC)
  - Kurdistan Workers' Party militants kill at least 12 Turkish soldiers and wounded
    11 others on Sunday in a cross-border attack in mountains near the Iraqi border,
    security sources said. (Reuters)
  - Soyuz TMA-10 lands safely outside Arkalyk, short of the planned landing site in
    Kazakhstan, due to a computer glitch. (ABC News)
  - '2007 Ogaden conflict: A rebel group in eastern Ethiopia, the Ogaden National
    Liberation Front, says it has carried out an attack on government troops, killing
    140 troops. (BBC)'
  - Swiss voters go to the polls for the 2007 Swiss federal election, with the right-wing
    Swiss People's Party set to win. (BBC)
  - Three of the People's Republic of China's top politicians, namely, Vice-President
    Zeng Qinghong, anti-corruption chief Wu Guanzheng, and Luo Gan, are dropped from
    the Communist Party of China's Central Committee. Also retiring are Vice-Premier
    Wu Yi, Vice-Premier Zeng Peiyan, and Defence Minister Cao Gangchuan. Hu's Scientific
    Development Concept is enshrined in the Party Constitution. (BBC)
  2007 California wildfires:
  - At least nine wildfires burn out of control in Southern California leading to
    the death of a San Diego man. (Reuters)
  - Fire engulf parts of Malibu, California leading to the evacuation of homes including
    those of James Cameron and Olivia Newton-John. (News Limited)
  - The Governor of California Arnold Schwarzenegger declares a state of emergency
    in seven counties including Los Angeles, Orange County, Riverside, San Bernardino,
    San Diego, Santa Barbara and Ventura County. (News Limited)
