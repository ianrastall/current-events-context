Date: '2007-10-14'
Source_URI: Portal:Current events/2007 October 14
Intelligence_Payload:
  Uncategorized:
  - A bomb explodes in a movie theatre in Ludhiana in India's Punjab state killing
    at least six people and wounding at least 30 others. (AP via CNN)
  - Three million Italians go to the polls to elect the leader of the new Democratic
    Party. The current Mayor of Rome, Walter Veltroni, wins with about 75% of the
    votes. (AFP via Google News)
  - 'The Attorney-General of Israel launches a third criminal inquiry into the behaviour
    of the Prime Minister of Israel Ehud Olmert before he was Prime Minister: the
    latest inquiry is into granting political favours as Trade Minister. (BBC)'
  - Burma restores some Internet access but continues to deny access to foreign news
    services such as the BBC and CNN, blogs and dissident sites. (AP via Google News)
  - The Interfax news agency reports that Russian security forces have received a
    warning of plans to assassinate the President of Russia Vladimir Putin in Iran.(Reuters)
  - At least eight people including six tourists die when trapped by a flood in the
    Nam Talu cave in Khao Sok national park in southern Thailand. (Reuters)
  - Voters in Togo go to the poll for the Togolese parliamentary election, 2007. (BBC)
  - The Prime Minister of Australia John Howard asks the Governor-General of Australia
    Michael Jeffery to dissolve the Parliament of Australia and call an election on
    24 November. (ABC News Australia) (ABC News Australia)
  - After 25 centuries, the marbles of the Acropolis of Athens are cautiously moved
    to the New Acropolis Museum. (BBC)
