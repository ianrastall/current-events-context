Date: '2007-10-27'
Source_URI: Portal:Current events/2007 October 27
Intelligence_Payload:
  War in Afghanistan:
  - United States led coalition forces kill 80 Taliban fighters outside Musa Qala
    in Helmand province. (AP via Fox News)
  - A suicide bomber explodes a bomb outside a United States base in eastern Afghanistan
    killing four Afghan soldiers and a civilian. (AP via CNN)
  Uncategorized:
  - Curlin wins the Breeders' Cup Classic at the Monmouth Park racecourse. In the
    same race, European star George Washington is euthanized after breaking down in
    the stretch. (Reuters)
  - At least 30 people are killed and 100 injured in flooding in the Democratic Republic
    of the Congo. (BBC)
  - Yu Zhengsheng leaves his post as CPC party chief of Hubei to replace newly promoted
    Politburo Standing Committee member Xi Jinping as Shanghai party chief. (Xinhua)
  California wildfires:
  - Some fires are reported in the Mexican state of Baja California, south of the
    U.S. border, but these are generally brought fairly swiftly under control. (CalFires.com)
  - The Governor of California Arnold Schwarzenegger vows to personally "hunt down"
    those responsible for starting the fires. (CNN)
