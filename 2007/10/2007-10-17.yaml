Date: '2007-10-17'
Source_URI: Portal:Current events/2007 October 17
Intelligence_Payload:
  Uncategorized:
  - French public transport workers hold a 24-hour strike protesting at changes to
    pensions. (BBC via ABC News Australia)
  - John Fahey, former Premier of New South Wales, is appointed as the President of
    the World Anti-Doping Agency. (Herald Sun)
  - The Dalai Lama is awarded the Congressional Gold Medal by the United States Congress;
    the decision is defended by George W. Bush.
  - Burmese activist and Nobel laureate Aung San Suu Kyi is granted honorary citizenship
    by Canada. (Globe and Mail)
  - '2007 Turkish offensive on Iraqi territories against Kurdish rebels: The Turkish
    Grand National Assembly approves a government request for their troops to cross
    the Iraqi border to attack Kurdish rebels. (Sky News)'
  - The President of Sudan Omar Hassan al-Bashir approves a Cabinet reshuffle meeting
    one of the demands of the Sudan People's Liberation Movement (SPLM) who had earlier
    withdrawn participation in the government. (Reuters)
  - Trading on the Bombay Stock Exchange's BSE Sensex is briefly suspended after a
    9% decline in the market. (BBC)
  - Floyd Roland becomes the new Premier of the Northwest Territories, Canada. (Globe
    and Mail)
  - Pope Benedict XVI announces he will create twenty-three new members of the College
    of Cardinals in the consistory of November 24. (ZENIT)
