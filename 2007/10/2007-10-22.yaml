Date: '2007-10-22'
Source_URI: Portal:Current events/2007 October 22
Intelligence_Payload:
  Uncategorized:
  - France and Morocco agree to a deal to build a high-speed rail link between Tangier
    and Marrakesh. (BBC)
  - The Kurdistan Workers' Party declares a unilateral ceasefire following an attack
    on Turkish forces. (CNN)
  - The President of the United States George W. Bush asks the United States Congress
    for $189.3 billion to fund the wars in Iraq and Afghanistan. (Reuters via ABC)
  - Al-Jazeera broadcasts an audiotape purporting to be from Osama bin Laden calling
    on Al-Qaeda in Iraq and other Sunni militants to unite forces. (CNN)
  - An investigation concludes pilot error caused the crash of Garuda Indonesia Flight
    200 on March 7, killing 21 people. (See report)
  - Joaquim Chissano wins the inaugural Prize for Achievement in African Leadership
    for "his role in leading Mozambique from conflict to peace and democracy." (AP
    via CNN) (BBC)
  - Georgia and Slovakia offer to send troops to support the Australian/Dutch taskforce
    in the south of the Afghanistan as the Dutch government is under pressure to reduce
    troops. (The Age)
  - The Pakistan People's Party (PPP) demands general elections in Pakistan in two
    months time.
  - Voters in Fakaofo go to the polls for the Tokelauan self-determination referendum.
    (AFP via Herald Sun)
  - The United States dollar reaches a new record low against the euro, which is traded
    at $1.4348. (BBC)
  - The 2007 Kyrgyzstani constitutional referendum is approved by about 75% of voters.
    President of Kyrgyzstan Kurmanbek Bakiyev dissolves the parliament and announces
    a snap legislative election will take place in December 2007, which he will contest
    with his newly founded party Ak Zhol. (BBC)
  - At least 25 killed when Tamil Tiger fighters attack a Sri Lankan air force base
    in the Anuradhapura district with heavy fighting reported. (Reuters via News Limited)
  - Four new members join the Politburo Standing Committee of the Communist Party
    of China, China's de facto top power organ. They are Xi Jinping, Li Keqiang, He
    Guoqiang and Zhou Yongkang. President Hu Jintao and Premier Wen Jiabao retain
    their seats. (BBC)
  California wildfires of October 2007:
  - At least a dozen wildfires burning throughout Southern California force the evacuations
    of more than 250,000 residents. (LA Times)
  - The Governor of California Arnold Schwarzenegger orders the deployment of 1500
    California National Guard members to help fight the fires. (Agence France Press
    via News Limited)
  - More than 600 homes are destroyed in the fires. (AFP, AP via Sydney Morning Herald)
