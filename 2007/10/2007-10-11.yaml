Date: '2007-10-11'
Source_URI: Portal:Current events/2007 October 11
Intelligence_Payload:
  Uncategorized:
  - The Prime Minister of Australia John Howard proposes a constitutional referendum
    recognising indigenous Australians in the Australian constitution, if he is reelected.
    (BBC)
  - Mychal Bell of the Jena 6 is ordered to spend 18 months in a juvenile facility
    for violating probation for previous convictions. (CNN)
  - An AMC Airlines MD-83 makes an emergency belly landing at the Atatürk International
    Airport, overshooting the runway. There is one injury, and the plane is badly
    damaged. (Reuters)
  - A group of 138 prominent Muslim clerics and scholars send an open letter to Pope
    Benedict XVI and other Christian leaders, calling for greater understanding between
    the two faiths. (BBC)
  - Turkey recalls its ambassador to the United States due to anger over an upcoming
    House of Representatives vote on recognizing the Armenian Genocide. (CNN)
  - The British writer Doris Lessing wins the 2007 Nobel Prize in Literature. (The
    Nobel Foundation)
