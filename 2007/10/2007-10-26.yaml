Date: '2007-10-26'
Source_URI: Portal:Current events/2007 October 26
Intelligence_Payload:
  Uncategorized:
  - An explosion shakes the Mexican consulate in New York City. The explosion was
    caused by two thrown hand grenades aided by additional explosive material. 7 injuries
    were reported, with several windows blown out and debris entering the building.
    (WCBS)
  - UN Security Council urges Nepal to set early date for Constituent Assembly election.
  - Former President of the Philippines Joseph Estrada is freed after receiving a
    pardon from the current President Gloria Arroyo. (BBC)
  - Leaders of the European Union and Russia meet for their annual summit in Lisbon.
    (BBC)
  - The southern segment of the Kallang-Paya Lebar Expressway in Singapore, set to
    be the longest subterranean road tunnel in Southeast Asia when fully complete,
    opens to traffic. (CNA)
  - Apple Inc. launches the sixth major release of their Mac OS X operating system,
    entitled Mac OS X 10.5 Leopard. (BBC)
