Date: '2007-10-28'
Source_URI: Portal:Current events/2007 October 28
Intelligence_Payload:
  Uncategorized:
  - The Roman Catholic Church beatifies 498 people who were executed during the Spanish
    Civil War. The decision sparks controversy because most of them were supporters
    of dictator Francisco Franco. (BBC)
  - The Prime Minister of Israel Ehud Olmert apologizes to the Prime Minister of Turkey
    Recep Tayyip Erdoğan for possibly violating Turkish airspace. (VOA)
  - Numerous locations and machines in North America are affected by newly instituted
    rules governing daylight saving time. (thenewspaper.com) (seattlepi.com) (tcpalm.com)
  - Apparel manufacturer Gap Inc. convenes all of its Indian suppliers to "forcefully
    reiterate" its prohibition on child labor after The Observer found children young
    as 10 making clothing for it in a New Delhi sweatshop. (AP via CNN)
  - Israel reduces the flow of oil to the Hamas-controlled Gaza Strip. (CNN)
  - Scandinavian Airlines decides to immediately and permanently discontinue services
    based on the use of its 24 Dash 8 Q400 after a series of crash landings. (New
    York Times)
  - '2007 Atlantic hurricane season: Tropical Depression Sixteen forms 195 miles (310
    kilometers) south-southeast of Port au Prince, Haiti. A tropical storm warning
    is issued for the southwestern peninsula of Haiti, and a tropical storm watch
    is issued for the southeastern coast of Cuba. (NHC)'
  - Voters in Argentina go to the polls for the 2007 general election. Exit polls
    show First Lady Cristina Fernández de Kirchner with a clear lead over Elisa Carrió.
    (BBC)
  - The Boston Red Sox baseball team sweep the Colorado Rockies to win the 2007 World
    Series. (Providence Journal)
