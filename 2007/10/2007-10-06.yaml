Date: '2007-10-06'
Source_URI: Portal:Current events/2007 October 6
Intelligence_Payload:
  Uncategorized:
  - A collision between a train and a bus kills at least 28 people and injures over
    70 in Cuba's eastern Granma province. (CNN via AP)
  - The Prime Minister of the United Kingdom Gordon Brown rules out calling an early
    election. (AP via CNN)
  - Danish police arrest more than 400 people in protests in Copenhagen over the closure
    of the Ungdomshuset youth centre earlier in the year. (BBC)
  - 'War in Afghanistan: A suicide bomb attack on a United States convoy in Kabul
    kills a U.S. soldier and five civilians. (Reuters) (BBC)'
  - Pervez Musharraf wins the Pakistani Presidential Election in unofficial results.
    The announcement of the official result will be withheld until a Supreme Court
    verdict is made on the legality of his candidacy. (BBC)
  - Adventurer Jason Lewis of Expedition 360 completes the first human-powered circumnavigation
    of the globe. (BBC)
  - Quentin L. Cook is called as an apostle of The Church of Jesus Christ of Latter-day
    Saints in the 177th Semi-Annual General Conference. (Deseret News)
  - Christopher John Worden, a Royal Canadian Mounted Police constable from Hay River,
    Northwest Territories, is shot and killed by an unknown assailant. (CBC News)(CTV
    News)
  2007 Pacific typhoon season:
  - Typhoon Krosa hits Taiwan, killing at least four people and injuring 40 more.
    (BBC) (Bangkok Post)
  - Typhoon Krosa later heads for the People's Republic of China, where 730,000 people
    are evacuated from Zhejiang and Fujian provinces. (VOA)
