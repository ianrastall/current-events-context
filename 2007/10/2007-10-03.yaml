Date: '2007-10-03'
Source_URI: Portal:Current events/2007 October 3
Intelligence_Payload:
  Uncategorized:
  - More than 3,000 gold miners are trapped underground in the Elandskraal mine at
    Elandsrand, northwest of Johannesburg, South Africa, owned by Harmony Gold Mining.
    (BBC)
  - The United States and Russia sign a pact to use Russian technology on NASA missions
    to hunt for water on the moon and Mars. (Reuters)
  - United States President George W. Bush vetoes an expansion of the State Children's
    Health Insurance Program. (AP via Google News)
  - Edward Pietrzyk, the Polish ambassador to Iraq, is hurt and his bodyguard is killed
    by a bomb attack in Baghdad. (Bloomberg)
  - Former Pakistani Prime Minister Benazir Bhutto says that the corruption charges
    against her have not been dropped, and that Minister Shaikh Rasheed Ahmad's announcement
    is part of a disinformation campaign. (CNN) (NYT)
  - Lal Masjid mosque opens to the public three months after being seized by the Pakistani
    army.
  - '2007 Pacific typhoon season: Vietnam evacuates 400,000 people from the provinces
    of Nghệ An and Hà Tĩnh ahead of Severe Tropical Storm Lekima (Hanna). Two people
    die and hundreds of houses collapse when the storm strikes.(AP), (AP via CNN)'
  2007 Burmese anti-government protests:
  - The State Peace and Development Council releases 80 Buddhist monks and 149 Buddhist
    nuns. (Reuters via News Limited)
  - United Nations envoy Ibrahim Gambari leaves the country, while arrests and intimidation
    of demonstrators continue. (NYT) (Guardian) (BBC)
  North Korea:
  - The President of South Korea Roh Moo-hyun and the leader of North Korea Kim Jong-il
    commence talks in Pyongyang. (Reuters)
  - Kim Jong-il proposes to extend the talks by one day, but Roh Moo-hyun declines.
    (CNN)
  - At the six-party talks in Beijing, North Korea agrees to fully shut down its nuclear
    program by the end of the year. (NYT)
