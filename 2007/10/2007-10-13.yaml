Date: '2007-10-13'
Source_URI: Portal:Current events/2007 October 13
Intelligence_Payload:
  Uncategorized:
  - At least nine people die and 8 people go missing as a result of torrential rain
    in and around Tunis, the capital of Tunisia. (AFP)
  - At least 20 people die following a landslide at an open pit gold mine near Suarez
    in Colombia's Tolima department. (Reuters)
  - At least 11 people are dead and 23 more injured after a natural gas explosion
    in an apartment building in Dnipropetrovsk in eastern Ukraine. (AFP via ABC News
    Australia)
  - Four people are killed and over 50 injured when rear carriages of Probhati Express
    derails near Dhaka, Bangladesh.
  - Tens of thousands of people participate in a pro-government rally in Rangoon as
    Ibrahim Gambari, the United Nations envoy, returns to Southeast Asia. (AFP via
    ABC)
  - Flooding after several days of torrential rain kills at least 23 people in Haiti
    with the town of Cabaret being worst affected. (BBC)
