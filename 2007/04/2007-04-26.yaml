Date: '2007-04-26'
Source_URI: Portal:Current events/2007 April 26
Intelligence_Payload:
  Uncategorized:
  - A man is killed and about 40 people are hurt during a night of unrest in Tallinn,
    Estonia. Demonstrators protesting against the removal of the Bronze Soldier statue
    clash with the police. Russia's authorities threaten to break off diplomatic relations
    with their Baltic neighbour. (BBC)
  - At least 22 people, mostly insurgents, die and dozens more are wounded in several
    hours of heavy clashes which rage in the Somali capital Mogadishu. (Somalinet)
  - U.S. Congressman Dennis Kucinich (D-Ohio) submits Resolution HRES 333, calling
    for the impeachment of Vice President Dick Cheney. (Asia Times) (AP via CBS News)
  - A nationwide mid-morning power outage hits Colombia; government sources discount
    guerrilla activity and blame a technical fault. (BBC)
  - North Korea and Myanmar restore diplomatic relations after a break of more than
    20 years. (BBC)
  - 'Syrian parliamentary election, 2007: Syria''s ruling coalition, the Baath Party-led
    National Progressive Front, wins the vast majority of seats in the People''s Council,
    with the opposition boycotting the process claiming it as a farce. (AP via Houston
    Chronicle)'
  - The Senate of the United States approves a funding measure for the Iraq War calling
    for the staged withdrawal of forces. U.S. President George W. Bush responded by
    stating that his reaction to the bill will be to veto it. (Bloomberg)
  - '2008 United States presidential election: All eight official Democratic candidates
    debate in the first 2008 presidential debate, hosted by South Carolina State University
    and the South Carolina Democratic Party. (AP via CBS) (US News) (Huffington Post)'
  - A former commander of a United States military detention center in Iraq is detained
    and under investigation for "aiding the enemy". (Reuters Alertnet)
  - The Sultan of Terengganu, Sultan Mizan Zainal Abidin, is formally installed as
    the 13th Yang di-Pertuan Agong of Malaysia. (The Star), (BBC)
  - A multi-story apartment building collapses in Istanbul during an emergency evacuation,
    with several people trapped or killed. (AHN)
  - New Hampshire became "...the first state to embrace same-sex unions without a
    court order or the threat of one."
