Date: '2007-04-30'
Source_URI: Portal:Current events/2007 April 30
Intelligence_Payload:
  Uncategorized:
  - The European Union and the United States inks a new Open Skies Agreement which
    will take effect on 30 March 2008 and replace the restrictive Bermuda II agreement.
    (BBC)
  - The United States Supreme Court decides the case of Scott v. Harris, holding that
    a "police officer's attempt to terminate a dangerous high-speed car chase that
    threatens the lives of innocent bystanders does not violate the Fourth Amendment,
    even when it places the fleeing motorist at risk of serious injury or death."
    (CNN)
  - President of Venezuela Hugo Chávez announces that Venezuela will withdraw from
    the International Monetary Fund and the World Bank. (New Zealand Herald) (Forbes)
  - Morocco and the Polisario Front agree to United Nations sponsored talks about
    the future of Western Sahara. (BBC)
  - General Sir Richard Dannatt, the head of the British Army, confirms that Prince
    Harry will deploy with the Blues and Royals regiment on a six-month tour of duty
    in Iraq. (AFP via ABC News Australia)
  - The Governor of Virginia Timothy Kaine tightens gun laws after the Virginia Tech
    massacre. (Radio New Zealand)
  - Israeli PM Ehud Olmert is criticised by the Winograd Commission for taking Israel
    to war in Lebanon last year "hastily". (BBC)
  - An indoor smoking ban comes into effect in Northern Ireland, three years after
    the Republic of Ireland. (RTÉ)
  - A meeting of the Intergovernmental Panel on Climate Change starts in Bangkok to
    discuss approaches to climate change. (BBC)
  - The US-led Coalition claims to have killed scores of Taliban forces in Afghanistan.
    (Reuters Alertnet)
  - Five men arrested in 2004 as part of Operation Crevice are convicted at the Old
    Bailey of a plot to explode fertiliser bombs in the UK. (BBC) (Guardian) (CNN)
    (SMH)
