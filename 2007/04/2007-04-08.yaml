Date: '2007-04-08'
Source_URI: Portal:Current events/2007 April 8
Intelligence_Payload:
  Uncategorized:
  - Zimbabwe's Roman Catholic bishops call on the President of Zimbabwe Robert Mugabe
    to stand down or face "open revolt" in a message posted on church bulletin boards
    across the country. (AP via CNN)
  - Suspected Islamist militants open fire on a military patrol in northwestern Algeria
    leaving nine soldiers and six attackers dead. (AP via the Houston Chronicle)
  - Pope Benedict laments the violence in Darfur, the Democratic Republic of Congo,
    Zimbabwe, Somalia, Afghanistan, and the Middle East, stating, "nothing positive
    is happening in Iraq" in his Easter homily. (CNN)
  - Voters go to the polls in Japan for local elections including 13 gubernatorial
    elections and 4 mayoral races with the most closely watched race being for the
    Governor of Tokyo. (BBC)
  - Zach Johnson wins golf's 2007 Masters Tournament with a score of 289 (1 over par).
    (ESPN)
  War in Afghanistan:
  - Seven NATO soldiers die as a result of car bombings in southern Afghanistan as
    it conducts an offensive against the Taliban. (AP via Forbes)
  - The Taliban claims it has killed an Afghan reporter abducted with Daniele Mastrogiacomo
    because the government of Afghanistan refused to meet ransom demands. (BBC)
