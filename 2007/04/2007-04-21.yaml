Date: '2007-04-21'
Source_URI: Portal:Current events/2007 April 21
Intelligence_Payload:
  Uncategorized:
  - At least 10 people are missing in Chile following a 6.2 magnitude earthquake.
    (Reuters via News Limited)
  - Soyuz TMA-9, with space tourist Charles Simonyi and two crew from Expedition 14
    to the International Space Station on board, safely return to Earth. (BBC) (Xinhua)
  - An aircraft of the United States Navy's Blue Angels precision flight team crashes
    during an air show in Beaufort, South Carolina, killing the pilot and injuring
    eight people on the ground. (MSNBC) (CNN)
  - Mohammed al-Attar is sentenced to 15 years in an Egyptian prison after being convicted
    of being a Mossad agent. (BBC)
  - An appeals court decides that the two candidates in the runoff election to decide
    the next President of East Timor will be current Prime Minister of East Timor
    José Ramos-Horta and Francisco Guterres of Fretilin. Two of the unsuccessful candidates
    have announced that they will support Dr Ramos-Horta. (AFP via ABC News Australia)
  - The United States and Australia issue travel advisories warning their citizens
    not to go to the Philippines due to a potentially imminent terrorist threat. (BBC)
  - Protests against the Bakiyev administration in Kyrgyzstan become violent as protesters
    fight with government security forces. (RFE/RL)
  - Nigerian militants attack government buildings in the oil region hours before
    voters go to the polls in the general election. (Reuters via ABC News Australia)
  - A U.N. investigation finds that Romanian police officers killed two Kosovars as
    they demonstrated against the Ahtisaari Plan in Pristina, capital of Kosovo, in
    February 2007. The Romanian force has since left Kosovo. (RFE/RL)
