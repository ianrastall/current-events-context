Date: '2007-04-24'
Source_URI: Portal:Current events/2007 April 24
Intelligence_Payload:
  Uncategorized:
  - Kevin Tillman, brother of former American football player Pat Tillman, who was
    killed by friendly fire in Afghanistan, accuses the U.S. military of manipulating
    his death during testimony to the U.S. Congress. (BBC)
  - At least ten people are killed and 120 injured as a severe storm hits the twin
    towns of Eagle Pass, Texas, and Piedras Negras, Coahuila, on the U.S.-Mexico border.
    (CNN) (BBC)
  - Jadarite, a mineral of the same composition as Superman's Kryptonite, has been
    found in a Serbian mine. (BBC)
  - The United States Department of Veterans Affairs allows the Wiccan pentagram to
    be used on the tombstones of deceased soldiers. (New York Times)
  - 'Abortion in Mexico: Mexico City''s Legislative Assembly votes to legalise abortion
    on demand during the first trimester of pregnancy. (BBC)'
  - Thousands of people gather in Moscow, Russia to mourn former President Boris Yeltsin.
    (BBC)
  - Prisoners riot at the New Castle Correctional Facility in Indiana, United States.
    (CNN)
  - Ethiopian rebels from the Ogaden National Liberation Front raid a Chinese-run
    oil field in near the country's border with Somalia, killing 74. (BBC) (Houston
    Chronicle)
  - The Tamil Tigers launch an air attack on the Sri Lankan military's main base in
    Jaffna. (BBC)
  - British anti-terrorism police arrest five people in London and one in Luton for
    alleged breaches of the Terrorism Act. (CNN)
  - Foreign Minister of Turkey Abdullah Gül is nominated as the AK Party candidate
    for President of Turkey. (BBC)
  - Toyota overtakes General Motors in global vehicle sales from January to March
    as a result of increased demand for fuel-efficient cars. (Bloomberg)
  - The military arm of Hamas fires rockets and mortars into Israel from Gaza. (New
    York Times)
