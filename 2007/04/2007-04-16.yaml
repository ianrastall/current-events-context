Date: '2007-04-16'
Source_URI: Portal:Current events/2007 April 16
Intelligence_Payload:
  Uncategorized:
  - Winners of the 2007 Pulitzer Prize are announced. Author Ray Bradbury and jazz
    saxophonist John Coltrane receive special citations. (CBC)
  - Ekmeleddin İhsanoğlu, the Secretary-General of the Organisation of the Islamic
    Conference, calls for an end of fighting between the Philippines government and
    the Moro National Liberation Front, which has killed at least 12 people over the
    past few days. (AP via IHT)
  - At least 33 coal miners are trapped in a mine in Baofeng county, Henan province,
    China. (BBC)
  - Sudan agrees to allow 3,000 United Nations troops in Darfur to support a 7,000
    strong African Union force. (BBC)
  - A series of shootings at the Virginia Polytechnic Institute and State University
    (commonly referred to as Virginia Tech) campus in Blacksburg, Virginia, United
    States, leaves at least 33 people (including the gunman) dead and 29 others wounded,
    making it the country's deadliest school shooting incident ever. (CBS) (CNN) (BBC)
    (Reuters)
  - The offices of the Prosperous Armenia political party in Yerevan are bombed. No
    one is killed and no one has claimed responsibility. (RFE/RL)
  - The United States, Japan and India carry out a joint naval exercise in the Pacific
    Ocean in an attempt to increase strategic cooperation. (AHN) (Hindu)
  - Kalyk Imankulov, the former Chairman of the Kyrgyz National Security Service,
    joins the United Front For A Worthy Future For Kyrgyzstan political alliance.
    The alliance is staging its sixth day of protests as it calls for the resignation
    of President Kurmanbek Bakiyev. (Interfax) (EurasiaNet)
  - Former Macedonian Interior Minister Ljube Boskovski and his ex-bodyguard Johan
    Tarculovski face trials for war crimes at the International Criminal Tribunal
    for the Former Yugoslavia at The Hague. (BBC)
  - 'Wal-Mart retakes the #1 position on the 2007 Fortune 500 list with US$351.1 billion
    in revenue for F/Y 2006, beating previous #1 ExxonMobil by $3.9 billion. (Fortune
    Magazine)'
  - At least 11 people die in southern India as a passenger train runs into a minibus
    carrying local officials near the village of Thirumatpur in Tamil Nadu. (AP via
    Houston Chronicle)
  - At least ten Afghan police die in a suicide bombing in Kunduz in northeastern
    Afghanistan. (BBC)
