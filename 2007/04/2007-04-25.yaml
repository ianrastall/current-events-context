Date: '2007-04-25'
Source_URI: Portal:Current events/2007 April 25
Intelligence_Payload:
  Uncategorized:
  - Ukrainian President Viktor Yushchenko signs a decree delaying the 2007 parliamentary
    election from May 27 to June 24. (BBC)
  - The United States House of Representatives passes legislation that would order
    United States forces to start withdrawing from Iraq by October 1. (AP via CNN)
  - Boris Yeltsin, the first President of Russia, is buried at Novodevichy Cemetery
    following a funeral service in central Moscow. (CNN)
  - Former Polish government minister Barbara Blida commits suicide during a police
    searching of her house (AP)
  - U.S. Deputy Assistant Secretary of State for European and Eurasian Affairs David
    Kramer, speaking on behalf of the U.S. government, offers to normalize relations
    with Belarus if it releases imprisoned politicians. (RFE/RL)
  - The French centrist and pro-European Union leader of the Union for French Democracy
    François Bayrou announces the foundation of the Democratic Party in the run-up
    to the 2007 legislative election after his strong showing in the presidential
    election. (BBC)
  - China detains four United States citizens who were protesting for Tibetan independence
    and against the Beijing Olympics at the Mount Everest base camp. (Reuters via
    News Limited)
  - Japanese police raid the offices of a pro-North Korean group in relation to the
    alleged kidnapping of two children in the 1970s. (BBC)
  - Buddhist monks protest in the streets of Bangkok, demanding that Buddhism be made
    the official religion of Thailand under a new constitution. (ABC News Australia)
  - Astronomers announce the discovery of the Earth-like exoplanet Gliese 581 c, which
    may support liquid water and is potentially habitable. (BBC)
  - An Argentine federal court overturns the pardons issued to General Jorge Videla
    and former Admiral Emilio Massera following convictions received for their activities
    during the "Dirty War" of the 1970s. The repeal of the pardons is largely symbolic,
    since the two are already under house arrest and serving lengthy sentences for
    other crimes. (Retuers via Yahoo! News)
