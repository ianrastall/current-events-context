Date: '2007-04-29'
Source_URI: Portal:Current events/2007 April 29
Intelligence_Payload:
  Uncategorized:
  - At least three people including the gunman die in a shooting at the Ward Parkway
    shopping center in Kansas City, Missouri . (AP via Wichita Eagle) (BBC).
  - Worldwide protests occur on the fourth anniversary of the Darfur conflict in Sudan.
    (BBC via ABC News Australia)
  - The People's Bank of China increases its deposit reserve ratio to prevent possible
    overheating of the economy. (Xinhua)
  - More than a million secularist Turks march in Istanbul to protest against the
    candidacy of Islamist Abdullah Gül in the 2007 presidential election. (BBC) (Reuters)
  - Iran's national security adviser Ali Larijani visits Iraq for talks. (BBC)
  - The Tamil Tigers launch an air attack on the Sri Lanka's two oil facilities near
    the capital Colombo. (Reuters)
  - 'Legally Blonde: The Musical opens at the Palace Theatre in New York City, New
    York.'
