Date: '2007-04-02'
Source_URI: Portal:Current events/2007 April 2
Intelligence_Payload:
  Uncategorized:
  - President of Ukraine Viktor Yushchenko dissolves the parliament during a nationally
    televised speech, calling for parliamentary elections on 27 May 2007. (All Headline
    News)
  - India's Foreign Secretary, Shivshankar Menon, says that Iran is likely to get
    an observer status in the South Asian Association for Regional Cooperation. (IHT)
    (Times of India)
  - An earthquake and the resultant tsunami strike the Solomon Islands, killing at
    least 15 people. (BBC)
  - The University of Florida Gators defeat the Ohio State Buckeyes 84-75 in the 2007
    NCAA Men's Division I Basketball Tournament championship game, becoming the first
    school in Division I history to win both the men's college basketball and college
    football titles in the same academic year. (ESPN)
  - The United States and South Korea reach an agreement on bilateral free trade,
    concluding ten months of negotiations. (CNN),(USTR), (USINFO)
  - The United States Supreme Court rules that the Environmental Protection Agency
    has the authority to regulate the emission of greenhouse gases and must do so
    unless it can provide some scientific reason proving otherwise. (New York Times)
  - The ruling Cambodian People's Party declares a landslide victory in communal elections,
    saying it had won majorities in 1,592 of 1,621 local commune councils. (AFP)
  - Singapore Foreign Minister George Yeo meets his Myanmar counterpart, Nyan Win,
    in Yangon, where the ministers are discussing bilateral cooperation and cultural
    exchanges. (CNA)
  - Panthongtae and Pinthongta Shinawatra, the son and daughter of deposed prime minister
    of Thailand Thaksin Shinawatra are ordered to pay 10 billion baht in back taxes
    owed in connection with the sale of Shin Corporation stock to Temasek Holdings.
    (Nation)
  - Microsoft co-founder Bill Gates is in Vietnam, touring medical clinics as he looks
    to support the development of vaccines for children through the Bill and Melinda
    Gates Foundation. (AP)
