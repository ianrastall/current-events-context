Date: '2007-04-19'
Source_URI: Portal:Current events/2007 April 19
Intelligence_Payload:
  Virginia Tech shooting:
  - Tim Kaine, the Governor of Virginia announces an inquiry into the massacre. (BBC)
  - University officials confirm that the students killed during the massacre will
    all be posthumously awarded their degrees during commencement ceremonies. (Charleston
    Daily Mail)
  Uncategorized:
  - The Norwegian prime minister announces that the government has agreed to unilaterally
    cut Norway's carbon emissions by 30% by 2020, and proposes carbon neutrallity
    for 2050. (Norwegian Government)
  - Joseph Nacchio, the former Chief Executive Officer of Qwest Communications, is
    found guilty of insider trading for stock sales worth tens of millions of dollars
    made in 2001. (CNN Money)
  - The United States holds talks with NATO and Russian officials over plans to deploy
    a missile defence system in Europe. (BBC)
  - The Prime Minister of Australia John Howard states that the Murray–Darling basin
    faces an "unprecedentedly dangerous" water shortage and that irrigation for farmers
    will be cut off unless there is significant rain in the next 6–8 weeks. (ABC News
    Australia)
  - An Amnesty International report claims that the attacks on Afghan civilians by
    the Taliban are widespread and systematic. (BBC)
  - Super Junior and two of the group's managers are victims of a car accident. Four
    of the group's members were injured.
