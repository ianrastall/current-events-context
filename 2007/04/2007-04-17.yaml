Date: '2007-04-17'
Source_URI: Portal:Current events/2007 April 17
Intelligence_Payload:
  Uncategorized:
  - Somalia's Transitional Federal Parliament suspends a former Speaker Sharif Hassan
    Sheik Aden and 29 other Members of Parliament for failing to attend sessions in
    recent months. (AP via Washington Post)
  - Nineteen people die in Rio de Janeiro in gun battles between police and drug gangs.
    (BBC)
  - Iccho Ito, the mayor of Nagasaki, Japan, is shot at least twice outside his re-election
    campaign headquarters. The assassin, Tetsuya Shiroo, is alleged to be a senior
    member of a local gang affiliated to the Yamaguchi-gumi crime syndicate. (Reuters)
    (AP via IHT)
  - The Olympic Council of Asia chooses Incheon, South Korea over New Delhi, India,
    to host the 2014 Asian Games. (BBC)
  - Four Nepalese United Nations workers and their driver are killed in a roadside
    bombing in Kandahar, Afghanistan. (BBC)
  - Kevin Rudd, the leader of the Australian Labor Party, announces changes to the
    party's industrial relations policy, including the right to a secret ballot before
    strike action. (AAP via Melbourne Age)
  Virginia Tech massacre:
  - Seung-hui Cho is identified as the spree shooter in the attacks. (NPR)
  - U.S. President Bush joins thousands of mourners at a memorial service for the
    victims. (AFP via ABC News Australia)
