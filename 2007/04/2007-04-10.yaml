Date: '2007-04-10'
Source_URI: Portal:Current events/2007 April 10
Intelligence_Payload:
  Uncategorized:
  - A Somali committee estimates the death toll of recent fighting between Ethiopian
    and Somali Government forces and insurgents in Mogadishu at more than 1,000. (Reuters
    Alertnet)
  - The United States authorises $59 million worth of aid for the Palestinian Authority.
    (CNN)
  - Sudan claims that an attack from Chad on its territory led to the loss of 17 Sudanese
    soldiers. Chad denies the allegations but claims that it repulsed an attack from
    Sudan. (Reuters Alertnet)
  - 'Iraq War: United States military begins construction of a wall around the Sunni
    district of Baghdad (Guardian)'
  - 'Iraq War: United States and Iraqi forces backed by attack helicopters fight gunmen
    in Baghdad in the heaviest fighting since the launch of a security crackdown in
    February 2007. (Reuters via ABC News Australia)'
  - Seven French doctors will face charges related to the deaths of 110 patients who
    developed Creutzfeldt-Jakob disease after taking growth hormones in the 1980s.
    (AFP via News Limited)
  - India's largest private airline, Jet Airways, has restarted talks to purchase
    Air Sahara. (Forbes)
  - Serbia's war crimes court has jailed four Serb paramilitaries who were filmed
    as they shot dead six captured young Bosnian Muslims.(BBC)
  - Ethiopia acknowledges that it has detained 41 suspected international terrorists
    from 17 countries and claims that foreign investigators were given permission
    to interrogate them. (AP via International Herald Tribune)
  - Two suspected militants die in a security operation in Casablanca, Morocco. (BBC)
  - At least 17 people die in Sri Lanka as a bus collides with a truck 80 km south
    of Colombo. (BBC)
  - The government of Japan extends economic sanctions against the North Korean government
    by an additional six months, citing a lack of progress in resolving kidnapping
    cases of Japanese citizens. (Bloomberg)
  - Australian Prime Minister John Howard announces that 300 soldiers from the Australian
    Special Air Service Regiment will be sent to Orūzgān Province, Afghanistan to
    combat the Taliban. (ABC News Australia)
  - Johnny Cash's Nashville Home destroyed by a fire. (SFGate.com)
