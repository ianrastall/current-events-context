Date: '2007-04-07'
Source_URI: Portal:Current events/2007 April 7
Intelligence_Payload:
  Uncategorized:
  - Turkish soldiers are killed in a clash with Kurdistan Workers' Party forces in
    Şırnak province. (Voice of America)
  - A recently released Iranian diplomat claims that he was tortured by the CIA while
    in captivity in Iraq. (The Observer)
  - Cambridge University defeats Oxford University by one and a half lengths in the
    153rd University Boat Race.(BBC)
  - Thousands of people protest in Los Angeles, California calling for citizenship
    rights for undocumented immigrants to the United States. (BBC)
  - The World Wide Fund for Nature expresses concern over the potential destruction
    of coral reefs after the 2007 Solomon Islands earthquake, which caused the island
    of Ranongga in the New Georgia Islands group to rise three meters (10 ft.), extending
    its entire shoreline by 70 meters on average. (AFP via Yahoo!)
  - The captain of the Greek cruise ship M/S Sea Diamond is charged in Greece with
    criminal negligence in connection with its sinking. If the two missing passengers
    are found dead, he may face more serious charges. (CNN)
  - Hungarian American software developer Charles Simonyi launches on board Soyuz
    TMA-10 towards the International Space Station, becoming the fifth space tourist.
    (CNN)
  - A jeep carrying a gelatin-based explosive for a highway construction project explodes
    in the Indian village of Chendur in Tamil Nadu killing at least 16 people. (AP
    via Houston Chronicle)
  - Israeli helicopters fire at least two missiles into the northern Gaza Strip. The
    missile killed a Palestinian militant "while mounting an operation near the border"
    in a statement released by Islamic Jihad. (BBC)
