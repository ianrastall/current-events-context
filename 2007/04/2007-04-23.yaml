Date: '2007-04-23'
Source_URI: Portal:Current events/2007 April 23
Intelligence_Payload:
  Uncategorized:
  - Former Russian President Boris Yeltsin dies at the age of 76. (BBC) (CNN)
  - Three of the six members of the Bali Nine – Tan Duc Thanh Nguyen, Si Yi Chen and
    Matthew Norman – who were sentenced to death have launched a judicial review appeal
    with Denpasar's District Court. (ABC News Australia)
  - Barclays plc agrees to buy ABN Amro in a €67 billion deal. (Bloomberg)
  - Umaru Yar'Adua is declared the winner of Nigeria's presidential election that
    EU observers said "cannot be considered to have been credible." (Washington Post)
    , (BBC)
  - NASA releases the first 3D images of the Sun acquired by the STEREO spacecraft.
    (PhysOrg)
  - The United States' 391st National Park Unit, Sand Creek Massacre National Historic
    Site, is formally established. (NPS)
  - VA allows Wiccan symbols on headstones. (CNN), (Fox)
  Iraq Insurgency:
  - Prime Minister Nouri Maliki calls for construction to be halted on the three-mile
    wall being built by the United States military around the predominantly Sunni
    district of Adhamiyah, Baghdad. Thousands of Iraqis also protest the wall. (Guardian)
    (BBC) (CNN)
  - Nine U.S. soldiers are killed by a suicide car bomb near a United States Army
    patrol base in Diyala. (CNN), (BBC)
