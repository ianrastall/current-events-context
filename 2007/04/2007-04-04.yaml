Date: '2007-04-04'
Source_URI: Portal:Current events/2007 April 4
Intelligence_Payload:
  Uncategorized:
  - Israeli Prime Minister Ehud Olmert denies the peace message given by Speaker of
    the United States House of Representatives Nancy Pelosi to Syrian President Bashar
    Assad; and further stated her trip was a mistake. (Jerusalem Post)
  - A "breakthrough" technique for converting donated blood from other blood types
    to Type O for blood transfusion is announced. (Washington Times) (Brisbane Times)
  - President of Iran Mahmoud Ahmadinejad announces that the 15 British soldiers held
    captive in Iran are to be freed as a "gift" to Britain. (Sky)
  - Four hostages held in the Niger Delta region of Nigeria are freed. (BBC)
  - Former rebel leader Guillaume Soro takes office as Prime Minister of Côte d'Ivoire.
    (BBC)
