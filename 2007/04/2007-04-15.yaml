Date: '2007-04-15'
Source_URI: Portal:Current events/2007 April 15
Intelligence_Payload:
  Uncategorized:
  - India's Essar Group buys Canadian steelmaker Algoma for US$ 1.63 billion. (Forbes)
    (Washington Post)
  - A nor'easter in the northeastern United States causes flooding and disrupts travel
    in the region. One person is killed in a tornado in North Carolina and two people
    die in weather-related car accidents in New York and Connecticut. (New York Times)
    (AP via ABC News)
  - Anti-Putin protesters in St. Petersburg, a part of the Dissenters March coalition,
    are beaten by Russian police. (Reuters) (National Post)
  - Documents revealed under Freedom of Information legislation reveals that NASA
    paid $26.6 million to families of the astronauts aboard the Space Shuttle Columbia
    when it disintegrated during re-entry in 2003. (AP via Seattle Post-Intelligencer)
    (Orlando Sentinel)
  - Iran announces plans for two more nuclear reactors. (AP via CNN)
  - Voters in Ecuador go to the polls to vote on a referendum on convening an assembly
    to draw up a new constitution. Preliminary results indicate a 78% "yes" vote.
    (BBC)
  Iraq War:
  - Shiite cleric Moqtada al-Sadr announces plans that his political movement intends
    to quit the Iraqi government in an attempt to press its demand for a timetable
    for U.S. withdrawal. (Reuters)
  - Two United Kingdom military helicopters collide near the town of Taji near Baghdad
    killing two soldiers. (AP via CNN)
