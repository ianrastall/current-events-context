Date: '2007-04-09'
Source_URI: Portal:Current events/2007 April 9
Intelligence_Payload:
  Uncategorized:
  - The Governor of New York Eliot Spitzer signs legislation changing the date of
    the New York primary election to February 5, 2008. (AP via Herald News Daily)
  - Thirteen detainees at Guantanamo Bay are conducting a hunger strike to protest
    against harsher conditions in a new prison unit and are being force fed. (AP via
    CNN)
  - The United Kingdom Ministry of Defence bans any more of the 15 Royal Navy sailors
    and Royal Marines held captive by Iran from selling their stories to the media
    reversing a previous decision following widespread criticism. (Reuters via ABC
    News Australia)
  - Tim Montgomery, a former 100-metre world record holder, pleads guilty to charges
    of bank fraud and money laundering. (BBC)
  - President Mahmoud Ahmadinejad of Iran announces that his country can now produce
    nuclear fuel on an industrial scale. (BBC), (CNN)
  - Ministers from natural gas exporting countries such as Russia, Kazakhstan and
    Iran meet in Doha, Qatar, prompting speculation that they might be looking at
    transforming the Gas Exporting Countries Forum into a cartel similar to OPEC.
    (BBC)
  - 'Iraq War: Shia cleric Moqtada al-Sadr calls for an anti-American protest on the
    fourth anniversary of the overthrow of Saddam Hussein. Hundreds of thousands of
    Shias gather in Najaf for a demonstration calling for U.S.-led troops to leave
    Iraq. (Reuters via Gulf Times), (BBC)'
  - East Timorese voters go to the polls to elect a new President of East Timor to
    replace Xanana Gusmão.(New York Times)
  - Tens of thousands of demonstrators in Buenos Aires and other cities in Argentina
    protest against the death of Carlos Fuentealba, a school teacher having been severely
    injured by a tear gas canister fired by police during a protest the previous week
    over pay and working conditions. (BBC)
