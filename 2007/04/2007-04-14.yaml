Date: '2007-04-14'
Source_URI: Portal:Current events/2007 April 14
Intelligence_Payload:
  Uncategorized:
  - A speeding bus crashes into a tractor-trailer near Ciudad Juárez, Mexico, killing
    at least 23 people. (AP via the Guardian)
  - Flash flooding kills at least 35 people in the Trang Province of Thailand. (AFP
    via Sunday Herald Sun)
  - A suicide bomber kills 8 people in the Khost Province of Afghanistan. (AP via
    CNN)
  - A bus carrying primary school students crashes with a truck on the Aksaray-Konya
    highway in central Turkey, resulting in the death of 32 people. (Reuters via News
    Limited)
  - Garry Kasparov, Russian chess champion and opposition activist, is arrested with
    over 100 others while attempting to hold a protest march in Moscow. (RFE/RL)
  - At least 300,000 secularist Turks march in Ankara to warn the Islamist Prime Minister
    of Turkey Recep Tayyip Erdoğan and his party against seeking the presidency. (AP
    via CNN)
  - 'Iraqi insurgency: A car bomb explodes in a bus station in the city of Karbala,
    killing or injuring at least 56 people and injuring at least 70. At least 10 people
    die after a suicide bomber explodes a bomb at the Jadiriyah bridge in Baghdad.
    (AP via ABC News) (AP via CBS News) (AFP via News Limited)'
  - Bill Richardson, a U.S. special envoy, predicts that North Korea will not meet
    a deadline of today set by the Six-Party Talks to shut down its nuclear reactor
    but will meet their obligations a few days after. (AFP via ABC News Australia)
  - 'Nigerian general election: Nigerian voters go to the polls for state governor
    and legislative elections. Security is tight in the northern city of Kano following
    the murder of militant Islamic cleric Ustaz Ja''afar Adam. (BBC)'
