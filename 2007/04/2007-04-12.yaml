Date: '2007-04-12'
Source_URI: Portal:Current events/2007 April 12
Intelligence_Payload:
  Uncategorized:
  - India's DRDO successfully tests its nuclear-capable Agni-III, a surface-to-surface
    ballistic missile with a range of more than 3000 km. (Reuters) (BBC) (NDTV)
  - Italian riot police clash with hundreds of Chinese merchants in Milan after scuffles
    break out over traffic problems in Chinatown. (Reuters via the Melbourne Age)
  - Governor of New Jersey Jon Corzine suffers numerous serious injuries resulting
    from a hit and run car accident on the Garden State Parkway in Galloway Township.
    (WPVI-ABC) (Reuters)
  - 'Cuba-United States relations: Accused terrorist Luis Posada Carriles is released
    from jail and handed over to U.S. immigration officials. (AP via International
    Herald Tribune)'
  - The Bush administration admits that it may be missing e-mails related to the dismissal
    of eight United States Attorneys as the Senate Judiciary Committee authorises
    chairman Patrick Leahy to subpoena documents related to the issue. (International
    Herald Tribune)
  - Paul Wolfowitz, the President of the World Bank, apologizes for his role in a
    pay scandal involving his girlfriend. (AFP via ABC News Australia)
  - U.S. talk radio personality Don Imus is fired by CBS Radio after making racially
    offensive comments about the Rutgers University women's basketball team. His simulcasted
    television show "Imus in the Morning" on MSNBC is also cancelled. (MSNBC)
  - Al Qaida claims responsibility for the bombings in Algiers, Algeria. (Channel
    4)
  - Several candidates in the first round of the East Timor presidential elections,
    including the Prime Minister José Ramos-Horta, have called for a recount amid
    allegations of voting irregularities. (BBC)
  - North Korean leader Kim Jong-il dismisses Prime Minister Pak Pong-ju and appoints
    Kim Yong-il in his place. (News Limited) (KCNA)
  - Premier of the People's Republic of China Wen Jiabao urges Japan to admit to their
    actions in World War II during a landmark address to the Diet of Japan. (BBC)
  - The Kremlin vetoes an investigation into the death of Yuri Gagarin on the 46th
    anniversary of the first orbit of Earth. (MOSNEWS) (Belfast Telegraph)
  - The anchor handling tug supply vessel Bourbon Dolphin capsizes in the North Sea.
    Three people are dead and four are missing. (BBC) (VG) (Aftenposten)
  Iraqi insurgency:
  - An explosion in the cafeteria of the National Assembly of Iraq kills eight people,
    including MP Mohammed Awad, and wounds many others. (BBC) (News Limited)
  - A truck bomb explodes on the al-Sarafiya Bridge in Baghdad, killing at least 10
    people and putting cars into the Tigris River. (FOX) (BBC)
