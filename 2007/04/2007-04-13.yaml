Date: '2007-04-13'
Source_URI: Portal:Current events/2007 April 13
Intelligence_Payload:
  Uncategorized:
  - The genome sequence of the Rhesus Macaque monkey is published in the scientific
    journal Science. (Science) (Baylor College of Medicine)
  - The Singapore Police Coast Guard suffers its first fatality in decades when two
    police officers and an illegal migrant are killed after their Interceptor Craft
    collides with a speedboat ferrying six illegal immigrants during a high-speed
    pursuit. (CNA) (SPF)
  - The United States Senate holds hearings on the 2007 pet food recalls. (Chicago
    Tribune)
  - A NASA Review Board finds that the Mars Global Surveyor stopped working in November
    2006 due to computer programming errors. (New York Times)
  - Google reaches a deal with DoubleClick to buy the company for US$3.1 billion.
    (New York Times)
  - The Al Qaeda-linked Islamic State of Iraq claims responsibility for yesterday's
    bombing of the National Assembly of Iraq. (AFP/Reuters via ABC News Australia)
  - A police report shows that New Jersey Governor Jon Corzine was not wearing a seatbelt
    during the hit and run car accident that injured him the day before. (WPVI)
  - Ja'afar Adam, a prominent Islamic cleric, is shot dead inside a mosque in Kano,
    Nigeria. (BBC)
  - Thousands of people protest in Islamabad in support of the suspended Chief Justice
    of Pakistan Iftikhar Muhammad Chaudhry. (CNN)
  - The Prime Minister of Fiji Frank Bainimarama sends in troops to close down the
    headquarters of Fiji's Great Council of Chiefs. (ABC News Australia)
  - A 6.3 magnitude earthquake hits Mexico just north of Acapulco, knocking out power
    to parts of Mexico City. (El Universal) (AP via MSNBC)
  - The Australian Government announces plans to outlaw material such as films and
    books that advocate terrorism. (BBC)
