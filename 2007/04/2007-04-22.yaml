Date: '2007-04-22'
Source_URI: Portal:Current events/2007 April 22
Intelligence_Payload:
  Uncategorized:
  - Turkey Christians tortured and murdered and Turkey's government, led by Prime
    Minister Recep Tayyip Erdogan, a former Islamist, has expresses concern over the
    spread of Christian activity in Turkey, VOA reported .
  - Israeli troops have shot dead three Palestinians in raids in the West Bank, the
    army and local residents say.(BBC)
  - According to exit polls, Nicolas Sarkozy and Ségolène Royal will meet in the second
    round of the French presidential election on May 6. François Bayrou and Jean-Marie
    Le Pen are believed to have received the third and fourth most votes respectively.
    (BBC)
  - 'War in Iraq: Gunmen kill 21 members of northern Iraq''s Yezidi community after
    dragging them from a bus. (CNN)'
  - Avraham Hirschson, the Finance Minister of Israel, stands down for three months
    while the Israeli police investigate a claim that he failed to report an embezzlement
    case when he was working for a trade union. (AP via IHT)
  - South Korea agrees to resume food aid to North Korea, sending 400,000 tons of
    food north. (BBC)
  - In Zimbabwe investigating officer Wellington Ngena accuses the Government of South
    Africa's Scorpions intelligence department of training members of the Movement
    for Democratic Change in combat to overthrow the Government of Zimbabwe. (allAfrica)
  War in Somalia (2006–2009):
  - More than 60 people are killed in the fourth day of heavy fighting between Ethiopian
    troops and Islamist militia in Mogadishu. (BBC)
  - Eritrea pulls out of the east African Inter-Governmental Authority on Development
    after a disagreement with Ethiopia over Somalia. (Aljazeera)
