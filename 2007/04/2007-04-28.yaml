Date: '2007-04-28'
Source_URI: Portal:Current events/2007 April 28
Intelligence_Payload:
  Uncategorized:
  - Australia wins its third consecutive Cricket World Cup with a victory over Sri
    Lanka in the 2007 ICC Cricket World Cup finals in Barbados. (ABC) (BBC)
  - 'Human rights in Tajikistan: Two police officers in Dushanbe, Tajikistan are found
    guilty of beating and torturing a 16-year-old boy while in police custody. They
    are sentenced to two years in prison. (RFE/RL)'
  - A bombing occurs at a mosque in Karbala, Iraq, killing 55. (BBC)
  - A suicide bombing in Pakistan kills at least 22 and injures Interior Minister
    Aftab Ahmad Khan Sherpao. (BBC) (CNN)
  - Turkey's army warns against questioning the country's secular system after a disputed
    first-round presidential vote in parliament. (BBC)
  - An earthquake of magnitude 4.3 on the Richter scale strikes Kent, England. (BBC)
  - President of Ireland Mary McAleese dissolves the 29th Dáil and calls for a general
    election on 24 May 2007. (Irish Examiner) (BBC)
  - 80,000 people gather throughout the United States joining 'Displace Me' to raise
    awareness of displaced refugees in Northern Uganda. (KOMO4)
