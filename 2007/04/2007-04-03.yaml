Date: '2007-04-03'
Source_URI: Portal:Current events/2007 April 3
Intelligence_Payload:
  Uncategorized:
  - United States Speaker of the House of Representatives Nancy Pelosi travels to
    Syria for talks with President Bashar al-Assad as she continues a visit to the
    Middle East disregarding the objections of the Bush administration. (BBC)
  - The 14th annual summit of the South Asian Association for Regional Cooperation
    (SAARC) begins in New Delhi, India, and Afghanistan becomes its 8th member. (IHT)
    (VOA) (Hindu)
  - Colorado State University experts forecast a very active 2007 Atlantic hurricane
    season with 17 named storms, 9 hurricanes and 5 intense hurricanes. (CSU)
  - The V150, a modified TGV train, breaks the land speed record for railed vehicles
    on the new Paris-Strasbourg LGV Est line with 574.8 km/h (357.2 mph). (Reuters)
  - Diego Gasques wins the 7th edition of Big Brother Brasil. (Globo.com)
  - Hong Kong's richest woman, Nina Wang dies from an unspecified illness. According
    to Forbes magazine, Wang was Asia's 35th richest person with a fortune of $4.2
    billion. (BBC)
