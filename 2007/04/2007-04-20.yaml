Date: '2007-04-20'
Source_URI: Portal:Current events/2007 April 20
Intelligence_Payload:
  Uncategorized:
  - 1976 Nobel Peace Prize Laureate Mairead Corrigan is injured during a peaceful
    protest against the construction of the Israeli West Bank barrier. (Indymedia)
  - President of Cuba Fidel Castro meets briefly with Wu Guanzheng, a member of the
    Politburo of the Chinese Communist Party in his first official duties since transferring
    power in July 2006. (AP via Houston Chronicle)
  - The G4 group of nations, which includes Brazil, India, Germany and Japan, says
    that it would revive efforts for United Nations Security Council reform. (NDTV)
    (People's Daily)
  - India and the People's Republic of China resume talks to resolve border disputes.
    (NDTV) (Australian)
  - The United States asks India to stop military cooperation with Iran. (VOA)
  - The U.S. state of Virginia observes a day of mourning for the victims in the Virginia
    Tech massacre. (BBC)
  - 'Battle of Mogadishu (March–April 2007): Shelling and gunfire continues in Mogadishu
    after 21 died in fighting and a suicide attack at an Ethiopian base the previous
    day. (Aljazeera)'
  - Scientists prove that eating less salt reduces the chances of stroke or heart
    attack in the first long-term study on salt's effect on health. (The Times)
  - A series of earthquakes, the strongest being 6.1 magnitude, strikes the Okinawa
    island chain of Japan. A tsunami warning is issued but later cancelled. (AFX via
    Forbes) (Bloomberg)
  - 'The 2007 pet food recalls: A new study of pigs at a hog farm in California points
    to the possibility that melamine has entered the human food supply. (Pittsburgh
    Tribune-Review)'
  - 'Johnson Space Center Shooting: A NASA spokesperson says that one of the buildings
    at the Johnson Space Center in Houston, Texas has been evacuated after an employee
    opens fire. The gunman killed a male hostage as well as himself. (CNN) (BBC) (AFP
    via ABC News Australia)'
