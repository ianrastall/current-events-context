Date: '2007-04-05'
Source_URI: Portal:Current events/2007 April 5
Intelligence_Payload:
  Uncategorized:
  - Three men are charged with involvement in the 7 July 2005 London bombings. (BBC)
  - Former rebel leader Ramzan Kadyrov takes office as President of Chechnya. (BBC)
  - The Greek cruise ship M/S Sea Diamond, with 1,153 passengers and 390 crew, runs
    aground off Santorini and sinks on the following day. No serious injuries are
    reported, but Frenchman Jean-Christophe Allain, 45, and his daughter Maud, 16,
    are reportedly missing. (Reuters) (BBC)
