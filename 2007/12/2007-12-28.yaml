Date: '2007-12-28'
Source_URI: Portal:Current events/2007 December 28
Intelligence_Payload:
  Uncategorized:
  - 2007 Zoé's Ark controversy - Six French aid workers, sentenced to eight years
    at hard labor by a Chadian court for allegedly attempting to rescue over 100 Chadian
    children, are flown to France, where they will appear before a French court which
    will decide how they will serve their sentences. (Reuters)
  - 'War in Somalia: Ethiopian troops have withdrawn from a key town in central Somalia.
    Islamist insurgents say they now control Guriel. (BBC News)'
  - NASA astronomers refine the trajectory of new asteroid 2007 WD5, giving it a 1-in-25
    (4%) chance of striking Mars on January 30, 2008. The object, estimated to be
    50 meters wide, could impact Mars with the force of about three megatons of TNT.
    The potential strike area is close to the location of the Opportunity rover. (NASA)
