Date: '2007-12-04'
Source_URI: Portal:Current events/2007 December 4
Intelligence_Payload:
  Uncategorized:
  - The two Romanian parties supporting President Traian Băsescu, the Democratic Party
    and the Liberal Democratic Party, announce that they will merge to form the Democratic
    Liberal Party in January 2008. (Earth Times)
  - The United States Senate approves a free trade agreement with Peru by a vote of
    77 to 18, clearing the way for its implementation. (Reuters)
  - Dr. David Southall, a prominent British paediatric scientist, is barred from practice
    after a General Medical Council panel finds that he abused his position to make
    unsubstantiated accusations in court, and kept illegal records. (BBC News)
  - Turkish President Abdullah Gül signs a nuclear energy bill, allowing bids to be
    made for Turkey's first nuclear reactor. (Today's Zaman)
