Date: '2007-12-11'
Source_URI: Portal:Current events/2007 December 11
Intelligence_Payload:
  Uncategorized:
  - Canadian serial killer Robert Pickton is sentenced to life in prison with a minimum
    of 25 years before a chance for parole. (CTV)
  - A series of ice storms across the central United States kills at least 24 and
    leaves nearly 1 million homes and businesses without electricity. (AP via CNN)
  - The former President of Peru, Alberto Fujimori, is sentenced to six years in prison
    for ordering a warrantless search while in office. (AFP via Google News)
  - The United States Federal Reserve cuts federal funds rates and discount rates
    by a quarter of a percentage point to 4.25% and 4.75% respectively, signaling
    its concerns about the impact of the subprime mortgage financial crisis on the
    United States economy. (The New York Times)
  - Al-Qaeda Organization in the Islamic Maghreb claims responsibility for two simultaneous
    bombings in Algiers, Algeria, causing at least 62 deaths and more injuries. (CNN)
