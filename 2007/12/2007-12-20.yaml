Date: '2007-12-20'
Source_URI: Portal:Current events/2007 December 20
Intelligence_Payload:
  Uncategorized:
  - There are violent incidents in New Orleans, Louisiana as the City Council approves
    the demolition of 4,500 public housing units. (AP via Google News)
  - '2008 United States presidential election: Tom Tancredo withdraws as a candidate
    for the Republican nomination and endorses Mitt Romney. (AP via The Guardian)'
  - The US$8 billion buyout of the Tribune Company is completed by Sam Zell. (AP via
    Google News)
  - At 81 years, 7 months, and 29 days, Queen Elizabeth II becomes the longest-lived
    British monarch, surpassing the record of Queen Victoria. (BBC News)
  - A magnitude 6.8 earthquake strikes 50 km (31 miles) southeast of Gisborne, New
    Zealand at 20:55 local time. (Stuff News)
  - Sean Hoey is found not guilty of all 56 charges against him relating to the 1998
    Omagh bombing. (RTÉ)
