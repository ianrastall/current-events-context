Date: '2007-12-21'
Source_URI: Portal:Current events/2007 December 21
Intelligence_Payload:
  Uncategorized:
  - At least 50 people are killed by an explosion at a mosque in northern Pakistan.
    (CNN)
  - Belgian authorities arrest 14 people the government calls Islamic extremists,
    who they say were plotting to free an al-Qaeda member from prison. (The New York
    Times)
  - The Schengen Agreement is expanded to include the seaports and land borders of
    the Czech Republic, Estonia, Hungary, Latvia, Lithuania, Malta, Poland, Slovakia,
    and Slovenia. (BBC News)
