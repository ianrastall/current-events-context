Date: '2007-12-08'
Source_URI: Portal:Current events/2007 December 8
Intelligence_Payload:
  Uncategorized:
  - The United States Department of Justice and the Central Intelligence Agency (CIA)
    launch a joint inquiry into the destruction of two CIA tapes of the interrogation
    of two suspected al-Qaeda terrorists. (AP via the Houston Chronicle)
  - A second human case of H5N1 bird flu is confirmed in eastern China. (People's
    Daily)
  - Gunmen attack a party office of former Prime Minister Benazir Bhutto in Karachi,
    Pakistan, killing three supporters. (AP via Google News)
  - The Junior Eurovision Song Contest 2007 was held in Rotterdam, The Netherlands.
