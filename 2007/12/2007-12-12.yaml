Date: '2007-12-12'
Source_URI: Portal:Current events/2007 December 12
Intelligence_Payload:
  Uncategorized:
  - United States President George W. Bush vetos an expansion of the federally funded,
    State Children's Health Insurance Program for the second time. (CNN)
  - The International Olympic Committee strips sprinter Marion Jones of five medals
    from the 2000 Summer Olympics after she admits to having taken banned substances.
    (Reuters)
  - Merck & Co. recalls a million doses of a childhood vaccines after tests show a
    sterilization problem at a Pennsylvania factory. (AP via Google News)
  - The Lebanese armed forces' chief of operations, General François al-Hajj, is killed
    in a bomb attack in Beirut. (BBC News)
  - Russia orders the British Council to suspend the majority of its Russian operations
    by January 2008. (BBC News)
  - Christoph Blocher, the leading figure of the right-wing People's Party, is voted
    out of office in the elections to the Swiss Federal Council. (Swissinfo.org)
