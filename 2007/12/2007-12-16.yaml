Date: '2007-12-16'
Source_URI: Portal:Current events/2007 December 16
Intelligence_Payload:
  Uncategorized:
  - A.C. Milan wins the 2007 FIFA Club World Cup after defeating Boca Juniors 4-2
    in the final. (BBC News)
  - Philippine Marine Corps troops kill Mobin Abdurajak, a leader of the Abu Sayyaf
    Group, in a shootout after finding him on the southern island of Tawi-Tawi. (BBC
    News)
  - Congressman Ron Paul raises a record 6 million dollars for his presidential campaign
    in a single day "Money Bomb" internet fundraiser to commemorate the anniversary
    of the Boston Tea Party. This event is widely credited as being the first modern
    day Tea Party, thus creating the Tea Party movement.(Politico)
