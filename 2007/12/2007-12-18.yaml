Date: '2007-12-18'
Source_URI: Portal:Current events/2007 December 18
Intelligence_Payload:
  Uncategorized:
  - Jacob Zuma is elected president of South Africa's ANC party. (Sky News)
  - An earthquake of 7.2 magnitude hits the Aleutian Islands 125 miles west of Adak,
    Alaska. (AP via The Houston Chronicle)
  - United States District Judge Henry Kennedy orders a hearing on whether the Bush
    administration violated a court order by destroying CIA interrogation videos of
    two Al-Qaeda suspects. (AP via MSNBC)
  - The Orange Revolution advocate Yulia Tymoshenko wins parliament's backing to return
    as prime minister of Ukraine. (Reuters)
