Date: '2007-12-27'
Source_URI: Portal:Current events/2007 December 27
Intelligence_Payload:
  Uncategorized:
  - A suicide gunman shoots former Prime Minister of Pakistan Benazir Bhutto, killing
    her, and then blows himself up killing at least 22 others at an election rally
    in Rawalpindi, Pakistan. (BBC News) (AP via Yahoo! News)
  - 'Iraq War: U.S. troops kill 11 members of a Mahdi Army splinter group. The military
    also announces that it has detained two more suspects in the capture of three
    U.S. soldiers earlier this year. (AP via Yahoo! News)'
  - 'Kenyan presidential election, 2007: Election officials have started counting
    the votes in what is seen as the closest election in Kenyan history. (BBC News)'
