Date: '2007-12-03'
Source_URI: Portal:Current events/2007 December 3
Intelligence_Payload:
  Uncategorized:
  - The United States National Intelligence Estimate of November 2007 reports with
    "high confidence" that Iran stopped its nuclear weapons program in the fall of
    2003 and has probably not restarted it since. (BBC News)
  - The Election Commission of Pakistan rejects former Prime Minister Nawaz Sharif's
    nomination papers for the upcoming parliamentary election. (Daily Times)
  - The Sudanese President Omar al-Bashir pardons a teacher at Unity High School for
    her alleged insult in the naming of her class's teddy bear "Muhammad". (CNN)
  - Muttiah Muralitharan of Sri Lanka breaks Shane Warne's record to become test cricket's
    leading wicket-taker. (BBC News)
  - Kevin Rudd is sworn in as the 26th Prime Minister of Australia by Governor-General
    Maj. Gen. Michael Jeffery. (News24)
  - Australia ratifies the Kyoto Protocol agreement, which former Prime Minister John
    Howard declined to sign due to claims that it would harm Australia's economy.
    (BBC News)
