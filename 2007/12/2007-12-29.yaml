Date: '2007-12-29'
Source_URI: Portal:Current events/2007 December 29
Intelligence_Payload:
  Uncategorized:
  - Phil O'Donnell, a player for Scottish football team Motherwell F.C., collapses
    on the pitch whilst being substituted and later dies. (BBC News)
  - The United Kingdom government announces its New Year's Honours List. People being
    honoured include broadcaster Michael Parkinson, singer Kylie Minogue, chief executive
    of Marks & Spencer Stuart Rose, embryologist Ian Wilmut and actor Sir Ian McKellen.
    (BBC News)
  - Australian David Hicks is released from Yatala Labour Prison, South Australia,
    after his jail sentence for providing material support for terrorism ends, following
    his earlier detainment at Guantanamo Bay. (ABC News Australia)
  - 'Kenyan presidential election, 2007: Vote counting is delayed for a day with the
    opposition, led by Raila Odinga, holding a 40,000 vote lead with 90% of votes
    counted. Violence and looting ensue, especially in the capital Nairobi, with "several"
    fatalities amidst claims of election fraud from both camps. (BBC News)'
  - The New England Patriots are the first team in the NFL to ever finish the regular
    season with a record of 16-0, the first perfect regular season in the league since
    the 1972 Miami Dolphins. (ESPN)
  - Tom Brady sets the NFL record for Most Touchdown Passes in a season with 50.
  - Randy Moss sets the NFL record for the Most Touchdown Receptions in a season with
    23.
