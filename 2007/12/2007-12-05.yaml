Date: '2007-12-05'
Source_URI: Portal:Current events/2007 December 5
Intelligence_Payload:
  Uncategorized:
  - Swedish National Television reveals systematic food safety irregularities at ICA,
    the leading grocery store chain in Sweden. (Sveriges Television)
  - Two British citizens are arrested in Lithuania after trying to ship 14 kg (31
    pounds) of khat out of Vilnius. (The Baltic Times)
  - Latvian Prime Minister Aigars Kalvītis resigns. (The Baltic Times)
  - Car bombs in Baghdad and three northern Iraqi cities kill at least 22 people and
    injure more than 60 others. (The New York Times)
  - A man opens fire at a mall in Omaha, Nebraska, in the United States, killing eight
    before committing suicide. (Reuters)
  - A suicide bomber rams a car into a minibus containing Afghan soldiers on a highway
    south of Kabul. Thirteen, including six Afghan soldiers, are killed in the incident.
    (AP via Google News)
