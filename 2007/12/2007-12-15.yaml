Date: '2007-12-15'
Source_URI: Portal:Current events/2007 December 15
Intelligence_Payload:
  Uncategorized:
  - Sikhanyiso Ndlovu, the Information Minister of Zimbabwe, calls Chancellor Angela
    Merkel of Germany a "Nazi". Ndlovu responded to the German government's criticism
    of rising human rights abuses in Zimbabwe by telling Merkel to "shut up". (allAfrica.com)
  - Pitcher Andy Pettitte of the New York Yankees admits to using human growth hormone
    to recover from an elbow injury two days after the release of the Mitchell Report.
    (AP via The New York Times)
  - Rashid Rauf, a suspect in a plot to blow up trans-Atlantic airliners, escapes
    from police custody in Pakistan. (AP via Google News)
  - The President of Pakistan Pervez Musharraf lifts the state of emergency that he
    declared on November 3, 2007. (BBC News)
  - The 2007 United Nations Climate Change Conference concludes with an agreement
    for a two-year process to develop a new treaty on climate change. (The New York
    Times)
