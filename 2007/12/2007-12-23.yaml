Date: '2007-12-23'
Source_URI: Portal:Current events/2007 December 23
Intelligence_Payload:
  Uncategorized:
  - Thailand's People Power Party, led by Samak Sundaravej, wins the 2007 general
    elections. (BBC News)
  - Saudi police arrest 28 men for allegedly planning terrorist attacks against holy
    sites in Mecca and Medina. (AP via CNN)
  - India's Bharatiya Janata Party win elections in the state of Gujarat. (BBC News)
  - The Nepalese legislature agrees to abolish the country's 240-year-old monarchy.
    (BBC News)
