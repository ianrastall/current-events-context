Date: '2007-12-10'
Source_URI: Portal:Current events/2007 December 10
Intelligence_Payload:
  Uncategorized:
  - Subtropical Storm Olga forms north of Puerto Rico, ten days after the official
    end of the 2007 Atlantic hurricane season. The National Hurricane Center forecasts
    landfall in the Dominican Republic within 24 hours, and Tropical Storm Warnings
    and Watches have been posted for the northern shore of the nation. (The Guardian)
  - The United States Supreme Court decides that federal district judges have broad
    discretion to impose what they think are reasonable sentences, even if federal
    guidelines call for different sentences. The case that they ruled on involved
    crack cocaine. (The New York Times)
  - Former Atlanta Falcons quarterback Michael Vick receives a 23-month jail sentence
    for his involvement in a dogfighting ring. (Canadian Press via TSN)
  - Former media tycoon Conrad Black receives a 78-month jail sentence in the United
    States for mail fraud and obstruction of justice. (CNN)
  - Russian President Vladimir Putin announces at a party meeting that he will support
    Dmitry Medvedev as his successor in the March 2008 presidential election. (The
    Sydney Morning Herald)
