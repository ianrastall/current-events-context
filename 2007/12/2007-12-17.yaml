Date: '2007-12-17'
Source_URI: Portal:Current events/2007 December 17
Intelligence_Payload:
  Uncategorized:
  - The leaders of Brazil, Bolivia, and Chile agree to build a highway by 2009 that
    will link the Atlantic (in Santos, Brazil) and the Pacific (in Iquique, Chile)
    coasts of South America. (BBC News)
  - Zarkasih, the leader of the Islamic militant organisation Jemaah Islamiyah, goes
    on trial in Indonesia on terrorism charges. (Sky News)
  - President of Russia Vladimir Putin agrees to become Prime Minister after his term
    as president ends. (CNN)
  - Russia delivers its first shipment of nuclear fuel to the Bushehr nuclear reactor
    in Iran. (BBC News)
  - The Bolivian departments of Beni, Pando, Santa Cruz, and Tarija declare autonomy
    from Evo Morales' central government. (CNN)
  - King Abdullah of Saudi Arabia pardons a rape victim who had been sentenced to
    six months in prison and 200 lashes. (AP via The Guardian)
  - Microsoft announces that Internet Explorer version 8 passes tests for standards
    compliance (IEBlog)
