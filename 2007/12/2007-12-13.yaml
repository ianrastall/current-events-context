Date: '2007-12-13'
Source_URI: Portal:Current events/2007 December 13
Intelligence_Payload:
  Uncategorized:
  - An archaeological expedition from Indiana University finds the remains of William
    Kidd's ship, the Quedagh Merchant, believed to have sunk in 1699, near Catalina
    Island, Dominican Republic. (Indianapolis Star)
  - The United States Senate passes an energy bill which would increase automobile
    fuel economy standards for the first time in three decades. (CBS News)
  - Former United States Senator George Mitchell releases a report detailing the use
    of banned substances by current and former Major League Baseball players. (MLB)
    (ESPN) (BBC)
  - A United States Marine Corps reservist is found guilty of killing an Iraqi soldier
    while they stood guard together in Fallujah. (AP via Google News)
  - European Union leaders sign the Reform Treaty in Lisbon, Portugal. (BBC News)
  - 'Kivu conflict: Rebels in the Democratic Republic of the Congo loyal to General
    Laurent Nkunda call for peace talks with the government to resolve the crisis.
    (BBC News)'
  - A bomb explodes on the Rajdhani Express in Assam, India near Chungajan killing
    five passengers. (AP via Google News)
  - ZANU–PF, the ruling party in Zimbabwe, endorses incumbent Robert Mugabe for the
    2008 presidential election set for March. (Nasdaq)
  - Lucy Kibaki, the wife of Kenyan President Mwai Kibaki, slaps a government official
    during independence day celebrations after he accidentally referred to her as
    "Mama Lucy Wambui," widely rumored to be the President's mistress. (Guardian)
