Date: '2007-12-02'
Source_URI: Portal:Current events/2007 December 2
Intelligence_Payload:
  Uncategorized:
  - Venezuelan President Hugo Chávez's constitutional amendments are rejected by a
    margin of 51% to 49% in a popular vote. He concedes the vote. (AP via Yahoo! News)
  - Russian President Vladimir Putin's United Russia party wins 62.8% of the votes
    in Russia's parliamentary elections. (Reuters)
  - Sébastien Loeb wins the World Rally Championship for the fourth time in a row,
    a feat only so far accomplished by Tommi Mäkinen. (Reuters)
  - Brazil starts free-to-air digital television transmissions in São Paulo, but broadcasting
    companies must transmit signals in both analogue and digital formats until June
    2016. (Folha de S. Paulo)
  - Four people are killed at the Zasyadko coal mine in eastern Ukraine where 101
    people were killed twelve days earlier in the country's worst mining accident.
    (BBC)
