Date: '2007-12-01'
Source_URI: Portal:Current events/2007 December 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraq War
  - Al-Qaeda in Iraq militants attack the Shiite village of Dwelah in Diyala, killing
    at least 13 people. (AP via IHT)
  - Turkey claims that it has attacked PKK positions in Iraq, inflicting significant
    losses. (Time)
  Law and crime:
  - British Home Secretary Jacqui Smith issues a terrorism warning ahead of Christmas.
  Politics and elections:
  - Pakistani general election, 2008
  - Former Pakistani Prime Minister Benazir Bhutto begins her election campaign for
    the Pakistani general election, 2008.
  - In another regional leadership reshuffle following the 17th Party Congress in
    the People's Republic of China, Minister of Commerce Bo Xilai is appointed the
    CPC Chongqing Committee Secretary, replacing Wang Yang, who is now Party Secretary
    in Guangdong. Zhang Dejiang resigns from his posts in Guangdong. (Xinhua)
  - 2007 Belgian government formation
  - Formateur Yves Leterme resigns. (Bloomberg)
  Sport:
  - The United States wins its first Davis Cup since 1995 taking an unbeatable 3-0
    lead over Russia in the final in Portland, Oregon. (AP via CBS Sports)
