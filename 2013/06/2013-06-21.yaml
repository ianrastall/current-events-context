Date: '2013-06-21'
Source_URI: Portal:Current events/2013 June 21
Intelligence_Payload:
  Armed conflict and attacks:
  - A suicide bomber kills 15 and injures 20 in a Shi'ite mosque in the northwestern
    Pakistani city of Peshawar. (Bangkok Post)
  - A Jewish Israeli man is shot dead near Jerusalem's Western Wall after a guard
    mistakes him for a Palestinian militant after hearing him shout "Allahu Akbar".
    (BBC)
  - A gunman opens fire at a law firm and a Walmart in Greenville, North Carolina,
    U.S., injuring four people. The gunman is later shot by the police and brought
    into custody after being wounded. (USA Today) (CBS News)
  Business and economy:
  - The People's Bank of China intervenes to alleviate a cash crunch as it continues
    to act to reduce over-leveraging in the People's Republic of China. (Financial
    Times)
  Disasters and accidents:
  - A three-story building collapses in the Indian town of Mumbra in Maharashtra state,
    with at least two deaths and many people reported trapped. (IBN Live), (Hindustan
    Times)
  - '2013 North India floods: Nearly 14,000 people are believed to be missing in Uttarakhand
    state, with another 60,000 stranded and 150 killed. (NDTV)'
  - 75,000 people are evacuated from their homes during flooding in Calgary, Alberta,
    Canada. (CNN)
  2013 Riga Castle fire:
  - Latvian authorities say the overnight fire has extensively damaged Riga Castle,
    the medieval fortress that houses the Baltic nation's National History Museum,
    and presidential residence. (EuroNews)
  - Latvian President Andris Bērziņš describes the fire as a "national disaster" during
    a morning visit to inspect the damage. (Russia Today)
  Health:
  - Taiwan reports the first human case of the H6N1 virus. (Focus Taiwan)
  Law and crime:
  - Edward Snowden is charged by the United States with espionage. (The Washington
    Post)
  Movies:
  - The Movie Premiere of Monsters University
  - From the Faculty That Brought You Toy Story 3, WALL-E, Finding Nemo and Up
  - 'Prequel: Monsters, Inc. (2001)'
