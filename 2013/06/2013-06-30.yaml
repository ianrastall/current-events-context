Date: '2013-06-30'
Source_URI: Portal:Current events/2013 June 30
Intelligence_Payload:
  Armed conflict and attacks:
  - 175 prisoners in the southern Nigeria town of Akure are freed by armed gunmen
    who also kill two civilians during the raid. (Reuters)
  War in North-West Pakistan:
  - A bomb attack on a security convoy in northwest Pakistan kills at least 11 people
    while injuring 19. (AP via Fox News)
  Disasters and accidents:
  - At least 30 are killed when a fuel truck explodes on a busy highway outside the
    Ugandan capital of Kampala. (Reuters)
  US heatwave:
  - A heatwave hits the southwestern United States with a death recorded in the state
    of Nevada and record or near-record days. (AP via Fox News)
  - 19 firefighters die controlling a wildfire in Yarnell, Arizona. (Associated Press
    via ABC) (KSAZ)
  Politics and elections:
  - Former President of the Philippines Joseph Estrada is sworn-in as the newly elected
    Mayor of Manila, the nation's capital. (Rappler)
  - Hassan Rouhani, President-elect of Iran, criticizes the Islamic Republic of Iran
    Broadcasting (IRIB) over its news censorship of the Syrian civil war and the 2009–10
    election protests. He also says Iran needs a cautious approach in its foreign
    policy. (Al Jazeera)
  - The President of the European Parliament demands an explanation from the U.S.
    for allegations of spying, while new sources hint that the NSA could gather information
    from several European countries and had placed microphones in the Embassy of Italy
    to the U.S.. Many European leaders declare themselves greatly disappointed and
    the issue may bring serious political and economical consequences. (The Guardian)
  - Egyptians flood the streets in mass protests on the anniversary of the inauguration
    of President Mohamed Morsi demanding his resignation. (Reuters)
  - 90,000 people attended the 'Concert per la llibertat' (Concert for freedom) for
    the independence of Catalonia, organized by Òmnium Cultural and the Assemblea
    Nacional Catalana in Camp Nou in Barcelona, Catalonia. (Vilaweb)
  Sport:
  - In football, Brazil defeats Spain 3-0 in the 2013 FIFA Confederations Cup. (BBC
    Sport)
  - In ice hockey, Nathan MacKinnon, a Canadian centre with the Halifax Mooseheads
    of the Quebec Major Junior Hockey League, is chosen by the Colorado Avalanche
    as the first pick in the 2013 NHL Entry Draft. (AP via ESPN)
  In golf:
  - Korean Inbee Park wins the U.S. Women's Open, becoming only the fourth woman to
    win three major championships in a season. (AP via ESPN)
  - American Kenny Perry wins the Champions Tour's Constellation Energy Senior Players
    Championship for his first senior major win. (AP via ESPN)
