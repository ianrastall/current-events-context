Date: '2013-06-01'
Source_URI: Portal:Current events/2013 June 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two drone strikes kill at least seven suspected al-Qaeda militants in the Abyan
    Governorate of Yemen. (Reuters)
  - Iraqi insurgency (post-U.S. withdrawal)
  - Authorities in Iraq say they have uncovered an Al-Qaeda plot to use chemical weapons,
    as well as to smuggle them to Europe and North America. (BBC), (Sky new)
  - UN death-toll figures show more than 1000 people died from violent attacks in
    Iraq during the month of May, making it the country's deadliest month since 2008.
    (VOA)
  - Inmates kill two prison guards in a failed Nigerien jailbreak. (New York Times)
  Arts and culture:
  - Matt Smith announces he will leave Doctor Who at the end of 2013. (Los Angeles
    Times)
  - The bollywood movie Yeh Jawaani Hai Deewani grosses Rs 19.45 crores on opening
    day in India, the highest figure obtained in 2013 thus far. (NDTV)
  Disasters and accidents:
  - The death toll from the tornados that hit Oklahoma City on May 31 rises to nine.
    (News Limited)
  - Three people are killed in apartment building explosion in Manila, Philippines.
    (Sydney Morning Herald via AFP)
  - An Ontario, Canada air ambulance crashes killing its two pilots and two paramedics.
    (BBC)
  International relations:
  - The United States calls on China to provide a full account of the 1989 Tiananmen
    Square protests.(BBC)
  Law and crime:
  - Michael Adebolajo is formally charged with the murder of British Army soldier
    Lee Rigby in the 2013 Woolwich attack. (Sky News)
  - A country-wide smoking ban in most public spaces goes into effect in Russia. (Reuters)
  - Turtle conservationist Jairo Mora Sandoval is murdered by poachers on a Costa
    Rican beach. (Tico Times)
  Sports:
  - In horse racing, Ruler of the World wins the Epsom Derby, becoming the first Chester
    Vase winner since Shergar in 1981 to win the Derby. (BBC)
  - In association football, FC Bayern Munich defeats VfB Stuttgart 3–2 in the final
    of the DFB-Pokal, becoming the first German team to win a continental treble (having
    already won the Bundesliga and the UEFA Champions League). (BBC)
  - In basketball, NBA star Grant Hill announces his retirement. (USA Today)
  - Swim Australia president Barclay Nettlefold is suspended amidst allegations of
    inappropriate behaviour towards a female co-worker. (Sky News)
