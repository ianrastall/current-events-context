Date: '2013-06-29'
Source_URI: Portal:Current events/2013 June 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Eight Royal Thai Army soldiers are killed during an ambush in Krong Pinang District
    in Yala Province located in Southern Thailand. (BBC)
  - One policeman is killed and 14 are wounded in a clash with the North Caucasian
    rebels in Chechnya, Russia. (Reuters)
  Syrian civil war:
  - Three German Gruenhelme e.V. aid workers have been missing since May 19 in the
    town of Harem in northern Syria and are believed to have been kidnapped. (AP)
  - Syrian government troops launch a major offensive on rebel-held areas in the city
    of Homs, following the regime’s success in seizing the city of Qusayr with Hezbollah
    backing.(The Jerusalem Post)
  Business and economy:
  - The Australian Dollar falls to its lowest level against the US Dollar since 2010.
    (Sydney Morning Herald)
  Disasters and accidents:
  - Four men including the pilot die in a helicopter crash in southern Switzerland.
    (AP via News24)
  - '2013 North India floods: An Uttarakhand lawmaker claims the actual death toll
    from the floods is 10,000, ten times the official estimate. (Hindustan Times)'
  - Extreme heat in Las Vegas, Nevada, US, leads to dozens of hospitalizations. (LA
    Times)
  International relations:
  - Vice President of the United States Joe Biden asks Ecuador to reject an asylum
    request by Edward Snowden. (The Independent)
  Politics and elections:
  - Large crowds gather in Cairo, Egypt to protest against the presidency of Mohammed
    Morsi (BBC)
  - Riot police clash with protesters in Soweto, South Africa, shortly before a visit
    by United States President Barack Obama. (Reuters)
  - Former South African president F. W. de Klerk cuts short his European trip because
    of former president Nelson Mandela's ill-health. (SAPA via News24)
  - Dozens of people are arrested at a gay pride parade in the Russian city of St.
    Petersburg. (AP via St Louis Today)
  - '2013 protests in Brazil: Brazilian president, Dilma Rousseff, experiences a sharp
    drop in popularity. Only 30 percent of people asked by the Datafolha''s opinion
    poll considered Rousseff''s administration "great" or "good". (Reuters)'
  Sport:
  - In cycling, the 100th running of the Tour de France gets underway in Corsica.
    (The Australian)
