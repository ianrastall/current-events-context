Date: '2013-06-22'
Source_URI: Portal:Current events/2013 June 22
Intelligence_Payload:
  2013 protests in Turkey:
  - Police use water cannon, tear gas and rubber bullets on thousands of civilians
    gathered in Istanbul's Taksim Square for a memorial to the 4 protestors killed
    in previous days. (The Guardian)
  Syrian Civil War:
  - The Friends of Syria Group agrees to give urgent assistance to the rebels. (Reuters)
  Arts and culture:
  - Mount Fuji is named a World Heritage Site by UNESCO. (The Japan Times)
  Business and economics:
  - 100,000 workers and unemployed march against record unemployment in Rome, the
    first major demonstration since Enrico Letta's government took power earlier this
    year. (Al Jazeera)
  Disasters and accidents:
  - 100,000 residents are displaced on the third day of flooding in Alberta. (CBC)
  - The worst flooding in 20 years affects the Canterbury Region of New Zealand, with
    the towns of Leeston and Lyttelton amongst the worst affected. (3 News)
  - Two die in a plane crash in Dayton, Ohio. (whiotv.com)
  Politics and elections:
  - A petition about pardoning former U.S. National Security Agency contractor Edward
    Snowden reaches 100,000 signatures. (The Daily Dot)
  - U.S. president Barack Obama is accused of anti-Catholicism at home and in Northern
    Ireland for his remarks on Protestant and Catholic segregation of schools while
    visiting for the G8 summit earlier this week. (Irish Central)
  Science and technology:
  - '2013 Korean crisis: Anonymous claims that it managed to steal military documents
    from North Korea. The documents are due to be released on 25 June, the anniversary
    of the start of the Korean War. (The Diplomat)'
  Sport:
  - In car racing, Tom Kristensen, Allan McNish, and Loïc Duval in an Audi win the
    2013 24 Hours of Le Mans, while Danish driver Allan Simonsen dies from injuries
    suffered when his car leaves the track at high speed and crashes. (The Guardian)
    (Speed Channel)
