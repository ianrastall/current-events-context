Date: '2013-06-10'
Source_URI: Portal:Current events/2013 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Bombs explode across Iraq, killing at least 70 people and wounding many more,
    following a month of attacks bloodier than any the country has experienced since
    June 2008. (BBC) (Al Jazeera)
  - The Venezuelan government arrests nine Colombian right-wing paramilitaries over
    a plot to assassinate President Nicolás Maduro. (BBC)
  Syrian civil war:
  - A fierce battle has gone on over the last 24 hours as rebels launch another attack
    against the Menagh Air Base, the last remaining Syrian government controlled airbase
    in Aleppo. (Al Jazeera)
  War in Afghanistan (2001–2021):
  - Seven heavily armed Taliban militants launch a coordinated attack near the main
    international airport of the Afghan capital, Kabul, and seize a five-story building
    under construction nearby. Afghan security forces retake the building, killing
    all seven militants and sustaining no military or civilian casualties. (BBC)
  Disasters and accidents:
  - A residential block collapses during heavy monsoon rains in Mumbai. (Al Jazeera)
  2013 European floods:
  - The swollen Elbe River breaches its banks forcing German authorities to evacuate
    10 villages. So far, 21 people have died across Central Europe. (CBC)
  - Floodwaters subside in Budapest after the Danube reaches record levels. (Al Jazeera)
  U.S. government surveillance programs (including PRISM):
  - William Hague answers parliamentary questions on Britain's role in the U.S. surveillance
    scandal, though MPs and activists express dissatisfaction with his answers on
    whether Britain is similarly spying on its own citizens. (The Independent) (The
    Guardian) (Press TV) (Al Jazeera)
  Politics and elections:
  - Gholam-Ali Haddad-Adel, former Speaker of the Iranian parliament, withdraws his
    candidacy from the June 14 presidential election. (CNN) (Haaretz)
