Date: '2013-06-03'
Source_URI: Portal:Current events/2013 June 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - An unmarked mass grave containing around 200 bodies is found in the Israeli town
    of Jaffa. (Al Jazeera)
  2013 protests in Turkey:
  - Riot police fire tear gas at people in Istanbul and Ankara amid calls for the
    downfall of the current Turkish government. (Al Jazeera) (RT) (RFERL)
  - The Turkish Doctors' Union (TTB) says one person has been killed in Taksim Gezi
    Park. (Xinhua)
  - Turkey's public sector unions start a two-day strike in support of the anti-government
    demonstrations. (BBC)
  Bahraini uprising (2011–present):
  - Three people who previously demonstrated against the regime are jailed for 5,
    10 and 15 years respectively. (RT) (Gulf News)
  War in Afghanistan (2001–2021):
  - A suicide bombing in eastern Afghanistan kills at least 20 people, including 10
    children. (India Express)
  Arts and culture:
  - Bollywood actress Jiah Khan dies of an apparent suicide at age 25. (India Today)
  Business and economics:
  - The Obama administration expands its sanctions against Iran, targeting its auto
    industry and, for the first time, its currency the Iranian rial. (Xinhua) (Al
    Jazeera)
  - The International Air Transport Association agrees to a plan aimed at curbing
    emissions by 2020. (The Guardian)
  - Telecommunications company Vodafone is fined Rs. 1,263 crores for under reporting
    its income from 2007-11. (Hindustan Times)
  Disasters and accidents:
  - At least 119 people are killed in a fire at a poultry farm in Jilin Province in
    northeastern China. (Al Jazeera) (AP via Silicon Valley Mercury), (Xinhua)
  - A Cebu Pacific flight carrying 165 passengers inbound from Manila, overshoots
    the runway during heavy rain in Davao City, Philippines. There are no fatalities,
    however the plane is heavily damaged. (ABS-CBN News)
  2013 European floods:
  - Flooding across Europe kills seven people and leaves others unaccounted for. (The
    Guardian) (Al Jazeera)
  - The Czech Republic experiences its worst flooding of the decade with huge volumes
    of water surging towards Prague. (BBC)
  International relations:
  - Former U.S. president Bill Clinton is paid $500,000 to give a speech in honour
    of Israeli president Shimon Peres. (Press TV) (Xinhua) (Khaleej Times)
  - Ali Asghar Soltanieh, Iran's Ambassador to the International Atomic Energy Agency
    (IAEA), says the agency's latest report verifies that Iran is having "technical
    and scientific success in its peaceful nuclear activities" and that this is "an
    important message to the whole world". (Press TV)
  - Park Geun-Hye, the President of South Korea, warns North Korea that it will be
    held responsible for the fate of nine young asylum seekers repatriated from Laos.
    (AFP via France 24)
  - Speaking during the ongoing Fifth Tokyo International Conference on African Development
    (TICAD V) in Yokohama, Zambian President Michael Sata says developed nations have
    used Africa as a "guinea pig" for the past 50 years, taking its raw materials
    while pretending to help it. (Xinhua)
  - Over 65 countries sign the Arms Trade Treaty. (USA Today)
  Law and crime:
  - The trial of United States Army private Bradley Manning for leaking classified
    material to WikiLeaks begins in Fort Meade, Maryland. (AP via ABC News) (Channel
    4 News)
  - Political activist Ahmed Douma is given a six-month suspended jail sentence for
    insulting the President of Egypt. (BBC)
  - Police find the bodies of three activists who were supporting local farmers in
    the Mexican state of Guerrero. Five others remain missing. (BBC)
  - Deciding Maryland v. King, the United States Supreme Court rules that police have
    the right to collect DNA samples from criminal suspects without their consent.
    (Chicago Tribune)
  Politics and elections:
  - An estimated 10,000 Ethiopians participate in anti-government protests. (Reuters)
  - More than 3 million people take part in "the world's largest gay pride parade"
    in Sao Paulo, Brazil. (The Telegraph)
  - The International Criminal Court delays the trial of Kenyan Deputy President William
    Ruto for "crimes against humanity" until September. (BBC)
  - Uttar Pradesh Chief Minister Akhilesh Yadav gives away 8,000 laptops to local
    students. (Times of India)
  - Democrat United States Senator Frank Lautenberg of New Jersey dies at age 89 from
    pneumonia. Republican governor Chris Christie is tasked with choosing a replacement
    Senator. (Washington Post)
  Science and technology:
  - Software engineer Atul Chitnis, known as India's "open source guru", dies at age
    50. (Firstpost)
  - A set of three unusually well preserved triceratops specimens is unearthed in
    the U.S. state of Wyoming. (CNN)
  Sports:
  - In basketball, NBA star Jason Kidd retires after 19 seasons. (Reuters)
  - In rugby league, the New Zealand Warriors are fined AU$15,000 for Russell Packer
    urinating on the field before a game. (The Australian)
