Date: '2013-06-17'
Source_URI: Portal:Current events/2013 June 17
Intelligence_Payload:
  International relations:
  - The 39th G8 summit gets underway in Northern Ireland with the Syrian civil war
    high on the agenda. (BBC)
  - Turkey, South Africa and Russia react angrily to the British government and demand
    an explanation for the revelations that their politicians and senior officials
    were spied on and bugged during the 2009 G20 summit in London (The Guardian)
  - Talks between the foreign ministers of Britain and Ecuador end with no breakthrough
    over WikiLeaks founder Julian Assange, who remains in the country's London embassy.
    (Reuters via News24)
  Law and crime:
  - The U.S. Supreme Court strikes down a law of the state of Arizona requiring that
    voters in federal elections show proof of citizenship, upholding the National
    Voter Registration Act of 1993. (Reuters)(PBS)
  - A court in the Netherlands finds a 50-year-old man and six teenagers guilty of
    kicking a volunteer linesman to death in Almere in December 2012. (BBC)
  - Former BBC broadcaster Stuart Hall is sentenced to 15 months in jail for sexually
    abusing girls. (BBC) (The Guardian)
  - Michael Applebaum, mayor of Montreal, Quebec is arrested on charges of fraud and
    abuse of public office. (AP)
  Politics and elections:
  - The Prime Minister of the Czech Republic, Petr Nečas, submits his resignation
    following a corruption scandal. (The New York Times)
  - Brazilians go to the streets in São Paulo, Rio de Janeiro and other cities to
    claim against the rise of the public transport fee, being part of the 2013 protests
    in Brazil.(News Day), (BBC)
  - Confidence in President Barack Obama drops below 50%, its lowest level in 19 months
    as Americans worry over broad government surveillance and other controversies.
    (AFP via News24)
  Sports:
  - Mark Neeld is sacked as the coach of the Melbourne Football Club in the Australian
    Football League (AFL) following one-and-a-half seasons of poor results. (The Age)
