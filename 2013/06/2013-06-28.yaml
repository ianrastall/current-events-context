Date: '2013-06-28'
Source_URI: Portal:Current events/2013 June 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - One trainee member of the Philippine National Police is killed and six injured
    in an ambush in Mountain Province. (ABS-CBN News)
  - One person is killed and four injured in an attack on a provincial party office
    in the Egyptian city of Zagazig. (Reuters)
  - Thirty-three are killed in an attack in Nigeria's Plateau State. (Xinhua)
  - Two people are killed and seven injured in a bomb attack in Songkhla, Thailand.
    (The Nation)
  - Three people are killed and seven injured in an attack in Karachi, Pakistan (Gulf
    News)
  - Fifteen people are killed in attacks targeting Iraqi police and anti-Al-Qaeda
    militiamen. (The Daily Star)
  Arts and culture:
  - Former President of Venezuela Hugo Chávez wins the Simón Bolívar National Award
    for Journalism posthumously. (Mail & Guardian Online)
  Business and economics:
  - Gold falls below $1200 per ounce for the first time since 2010. (BBC)
  - The USDA approves a plant to slaughter horses for meat in New Mexico. (Reuters)
  - News Corp. completes a planned split into two companies, creating 21st Century
    Fox. (LA Times)
  Law and crime:
  - A senior Vatican bank cleric, Monsignor Nunzio Scarano, and two others are arrested
    on suspicion of smuggling €20 million into Italy from Switzerland. (BBC)
  - French businessman Bernard Tapie is placed under investigation for improperly
    using political influence to benefit his businesses. (Xinhua)
  - A man is arrested in England on charges related to an attack on the John Constable
    painting The Hay Wain. (AP via Silicon Valley Mercury News)
  - Gay marriage in the state of California is legalized after the stay held on the
    unconstitutional California Proposition 8 is lifted. Two women who successfully
    challenged Proposition 8 in the Supreme Court of the United States are married
    in San Francisco. (NBC News)
  Sport:
  - Former captain of the Pakistan cricket team Salman Butt admits to fixing matches
    in 2010. (The News International)
