Date: '2013-06-27'
Source_URI: Portal:Current events/2013 June 27
Intelligence_Payload:
  Business and economy:
  - European leaders agree to back a deal on the European Union's long-term budget
    after a deal is done on a rebate for the United Kingdom. (Reuters)
  International relations:
  - The President of South Korea Park Geun-hye arrives in the People's Republic of
    China for four days of talks with the President of China Xi Jinping in an effort
    to reduce tensions on the Korean Peninsula. (AP)
  Law and crime:
  - A US federal grand jury issues a thirty count indictment against Dzhokhar Tsarnaev
    for his alleged role in the Boston Marathon bombings. (New York Times)
  Politics and elections:
  - Tsakhiagiin Elbegdorj is reelected as President of Mongolia. (Associated Press
    via The Globe and Mail)
  - Kevin Rudd is sworn in as the new Prime Minister of Australia with Anthony Albanese
    as the Deputy Prime Minister. (ABC News Australia)
  Science:
  - NASA launches the Interface Region Imaging Spectrograph, a space probe to observe
    the Sun, from the US state of California. (IRIS Mission Updates)
  Sports:
  - In basketball, the 2013 NBA Draft gets underway in Brooklyn, New York with the
    Cleveland Cavaliers selecting Canadian player Anthony Bennett as the first pick
    of the draft. (Bloomberg)
