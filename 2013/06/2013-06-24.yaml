Date: '2013-06-24'
Source_URI: Portal:Current events/2013 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli Air Force planes attack the Gaza Strip after two rockets were fired into
    southern Israel on Sunday night. (BBC) (The Times of Israel)
  Syrian civil war spillover in Lebanon:
  - Clashes between the Lebanese Army and supporters of the Salafist cleric Ahmed
    Al-Assir continue for a second day around the Ain el-Hilweh camp near Sidon. The
    government reports at least 15 soldiers killed and 38 others injured in the violence,
    as it promises crackdown on ethnic strife across the country. (Al Jazeera)
  2013 North India floods:
  - North India braces for more rain in what is believed to be the worst monsoon season
    in 50 years. (BBC)
  Law and crime:
  - The U.S. Supreme Court decides Fisher v. University of Texas, tightening constitutional
    scrutiny of the consideration of race in the college admissions process. (Opinion)
  - Former Italian Prime Minister Silvio Berlusconi is found guilty of abusing his
    power and having sex with an underage prostitute, and is sentenced to seven years
    in prison. (CNN)
  - According to reports in Catalonia, Argentine football star Lionel Messi has paid
    €10 million in Spanish back taxes for 2010 and 2011, and is looking to settle
    a claimed tax liability of €4.1 million for the 2007–2009 period that is the subject
    of a current investigation. (ESPN)
  Sports:
  - The Chicago Blackhawks defeat the Boston Bruins in six games to win the 2013 Stanley
    Cup Finals. (NHL), (CBC)
