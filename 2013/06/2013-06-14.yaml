Date: '2013-06-14'
Source_URI: Portal:Current events/2013 June 14
Intelligence_Payload:
  Syrian civil war:
  - The United States offers unspecified military equipment to the rebels after determining
    that the Syrian regime used chemical weapons against the opposition. (Al Jazeera)
  Disasters and accidents:
  - A search and rescue operation gets underway after a Roll-on/roll-off ferry carrying
    about 60 people capsizes off the island of Burias in the Philippines Masbate province.
    So far 34 people have been rescued and at least one death confirmed. (ABC Online),
    (BBC)
  - A crowded outdoor deck behind a popular Miami-area sports bar collapses during
    the NBA Finals, sending dozens of people into the shallow waters of Biscayne Bay
    (AP via News24) (Miami Herald)
  - Near Colorado Springs, destructive wildfires claim hundreds of homes and at least
    2 lives. (LA Times)
  - A day after an ethylene- and propylene- manufacturing chemical plant explosion
    in Geismar, Ascension Parish, Louisiana that killed two and injured 75, another
    chemical plant explosion occurs in the same Louisiana Parish (County), in Donaldsonville,
    Louisiana. One person is killed, three are critically injured, and 2 others suffer
    more minor injuries. (NBC) (CNN)
  Law and crime:
  - Former fugitive Malcolm Naden is given a life sentence and some for two murders
    in the Australian state of New South Wales. (Sydney Morning Herald)
  - Won Sei-hoon, former head of South Korea's National Intelligence Service is indicted
    on charges of interfering in last year's presidential election. (AP)
  - Four people are shot, leaving three critically injured, when Earnest Moore, 39,
    a convicted murderer, who was described as the boyfriend of one of the victims,
    walked up to their SUV and opened fire in Nashville, Tennessee. (NBC)
  - U.S. Army Judge Colonel Tara Osborn rules that the Fort Hood Massacre gunman Nidal
    Hasan cannot claim as a part of his defense that he was defending the Taliban.
    (NBC)
  - Six months after the crime which killed 20 children and six adult staff, the Newtown,
    Connecticut Sandy Hook massacre's victims' families gathered in remembrance of
    the tragedy. (NBC)
  - Charla Nash, 59, of Stamford, Connecticut, is told she cannot sue the state and
    its Dept. of Energy for $150 million, after being blinded for life and receiving
    a full face transplant after receiving a brutal mauling by Travis, an escaped
    chimpanzee. (NBC)
  Iranian general election:
  - Voters in Iran go to the polls for a presidential and local elections. (AP via
    Fox News LA)
  - Moderate Hassan Rouhani was elected as the president with conservative Mohammad
    Bagher Ghalibaf behind him in second place. (Press TV) (Reuters via Thomson Reuters
    Foundation) (BBC)
  Science and technology:
  - The Airbus A350 XWB makes its maiden flight from Toulouse-Blagnac Airport. (BBC)
    (CNN)
