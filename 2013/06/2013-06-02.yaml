Date: '2013-06-02'
Source_URI: Portal:Current events/2013 June 2
Intelligence_Payload:
  Syrian Civil War:
  - A car bomb explodes near a police station in the Damascus suburb of Jobar, killing
    at least eight members of the security forces and injuring civilians. (CNN)
  War in Afghanistan (2001–2021):
  - Taliban insurgents attack two checkpoints in the Kamdesh District in eastern Afghanistan
    killing four Afghan police officers (ABC)
  Arts and culture:
  - Mandawuy Yunupingu, frontman of the Aboriginal band Yothu Yindi dies at 56. (The
    Guardian)
  Disasters and accidents:
  - A 6.2-magnitude earthquake strikes central Taiwan, killing at least one person.
    (CNN)
  - It is announced that three professional storm chasers who were members of TWISTEX
    were among those killed by tornadoes in Oklahoma, US, on May 31. (Washington Post)
  - Wildfires in Southern California, USA, lead to hundreds of evacuations. (USA Today)
  2013 European floods:
  - Austria, Germany, Switzerland and the Czech Republic are hit by floods after days
    of heavy rain. (AP via ABC News)
  - The Prime Minister of the Czech Republic, Petr Necas, declares a state of emergency
    after two people die and the swollen Vltava River threatens the centre of the
    capital Prague. (Reuters)
  Politics:
  - Two British Labour Party peers are suspended by their party after allegations
    they offered to undertake Parliamentary work in exchange for payment. A third
    peer, from the Ulster Unionist Party resigns the whip following the allegations.
    (BBC)
  - The Supreme Constitutional Court of Egypt rules that the country's Islamist dominated
    Parliament and Constituent Assembly of Egypt were illegally elected. (AP via Fox
    News)
  Science and technology:
  - New research finds that graphene is the strongest material in the world, even
    when patched together. (Science Recorder)
  Sport:
  - N. Srinivasan steps aside as the President of the Board of Control for Cricket
    in India in the wake of the 2013 Indian Premier League spot-fixing case to allow
    an investigation. (AFP via Sydney Morning Herald)
  - In a friendly soccer match in Washington, D.C. organized to celebrate the centennial
    of the United States Soccer Federation, the USA defeats Germany 4–3. (AP via ESPN)
