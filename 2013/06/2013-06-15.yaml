Date: '2013-06-15'
Source_URI: Portal:Current events/2013 June 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb explodes on a bus in the Pakistani city of Quetta, killing at least 11
    people and wounding 22 others. (BBC)
  - A mortar attack on an Iranian dissident camp in Iraq kills 2 people and wounds
    27 others (Reuters), (Daily Star)
  - A bombing at a tea shop kills seven people, including soldiers, in the Somali
    town of Wanlaweyn. (Reuters)
  2011–present Libyan factional fighting:
  - Clashes between Libyan army forces and armed protesters in the city of Benghazi
    kill at least six soldiers. (BBC) (Reuters)
  Disasters and accidents:
  - More than ten thousand families are evacuated in the Filipino province of Cotabato
    due to heavy rain. (ABS-CBN News)
  - A Gulfstream IV aircraft carrying former President George W. Bush from Philadelphia
    International Airport to Dallas Love Field is diverted safely to Louisville International
    Airport when the pilot smells smoke; Bush arrived safely in Dallas early Sunday.
    (CNN)
  - The City of Piedras Negras, Mexico was devastated by the June 14-15, 2013 flood
    affecting an estimated 40,000-50,000 residents, approximately 30-35% of its city
    residents, with more than 62 residential subdivisions (Colonias) flooded. (Eagle
    Pass Business Journal)
  International relations:
  - Egyptian President Mohamed Morsi cuts diplomatic ties with Syria and orders the
    Egyptian embassy in Damascus to close. (Sky News)
  - The National Defense Commission, North Korea's top government body, proposes high-level
    nuclear and security talks with the United States, days after a planned meeting
    with South Korea failed. (NBC)
  Law and crime:
  - Britain's Royal Air Force (RAF) escorts an Egyptair Boeing 777 bound for New York
    to Glasgow Prestwick Airport in Scotland following an onboard incident. (AFP via
    News24)
  - A man goes on a shooting spree in Omaha, Nebraska, U.S., killing two people and
    wounding two others, before being fatally shot by police. (CNN)
