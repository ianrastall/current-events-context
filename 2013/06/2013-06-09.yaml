Date: '2013-06-09'
Source_URI: Portal:Current events/2013 June 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Lebanese man protesting against Hezbollah's role in the Syrian civil war is
    shot dead outside the Iranian embassy in Beirut. (BBC)
  War in North-West Pakistan:
  - Thirty-five militants and one soldier are killed in fighting in the Khyber Agency
    tribal region of northwest Pakistan in an operation. (The Times of India)
  Nigerian Sharia conflict:
  - Suspected Islamist insurgents kill 13 people in Maiduguri, Nigeria after hiding
    their weapons in a coffin. (ABS-CBN News)
  Arts and culture:
  - The Tony Awards, honoring excellence in Broadway theatre, are held in New York
    City. Kinky Boots takes home the most awards, with six, including Best Musical.
    (Los Angeles Times)
  - Scottish author Iain Banks dies of cancer at age 59. (Reuters)
  Disasters and accidents:
  - A fire destroys 150 stores in Lagos, Nigeria. (The Punch)
  Health and environment:
  - An outbreak of Hepatitis A linked to a fruit juice product made by Townsend Farms
    sickens 79 people in the United States. (RTT News)
  Law and crime:
  - 300 Muslims are arrested in Moscow, Russia while they pray at a mosque in an apparent
    crackdown on radical Islam. (Fox News)
  U.S. government surveillance programs (including PRISM):
  - A former CIA employee named Edward Snowden comes forward as the source of recent
    NSA leaks in the United States. Fearful of prosecution for his actions, he defects
    to Hong Kong. (Washington Post)
  Politics and elections:
  - '2013 protests in Turkey: Turkish prime minister Recep Tayyip Erdoğan called protestors
    "a handful of looters". (Fox News)'
  Sports:
  - In tennis, Rafael Nadal wins a record-extending eighth French Open title by defeating
    fellow Spaniard David Ferrer. The event is marred by two protesters, one of whom
    ignites a flare on court, evoking memories of the 1993 Monica Seles stabbing in
    Germany. (Reuters via News24)
  In professional golf:
  - Inbee Park wins the 2013 LPGA Championship, defeating Catriona Matthew on the
    third hole of a sudden-death playoff. The Korean wins her second major championship
    of the season and third of her career, and also collects her fourth tournament
    win this season. (AP via ESPN)
  - South African David Frost wins the 2013 Regions Tradition, holding off Fred Couples
    for a one-shot win and his first major championship on the Champions Tour. (AP
    via ESPN)
