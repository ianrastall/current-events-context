Date: '2013-06-23'
Source_URI: Portal:Current events/2013 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen storm a hotel in Northern Pakistan, killing nine tourists and a Pakistani
    tour guide. (BBC)
  - 16 people are killed and more than 20 others wounded in tribal violence in Kenya.
    (Muscatine Journal)
  - Al-Qaeda-linked gunmen kidnap two sisters working on a film in the Philippines
    (Sky News)
  Syrian civil war spillover in Lebanon:
  - Six Lebanese Army soldiers are killed and several others injured in clashes at
    a checkpoint on the outskirts of Sidon. (Al Jazeera)
  2013 protests in Brazil:
  - Police again fire tear gas at demonstrators participating in nationwide protests
    across Brazil. (The Guardian)
  Arts and culture:
  - Several places in North Korea are named as World Heritage Sites by UNESCO. (ABC)
  Disasters and accidents:
  - At least 18 Romanians were killed and 32 were injured after a bus crash, in Montenegro.
    (Huffington Post)
  2013 North India floods:
  - The death toll from the disaster soars to more than 6,500, as units of the Indian
    Army struggle to reach thousands of people stranded in country's northwest. (Al
    Jazeera)
  International relations:
  - After a failed U.S. extradition request Hong Kong says does not fully comply with
    the law, U.S. whistleblower Edward Snowden leaves Hong Kong for Moscow. (Al Jazeera)
    (The Guardian)
  Politics and elections:
  - Voters in Albania go to the polls for a parliamentary election. Activist Gjon
    Pjeter Gjoni is shot dead and three other people are wounded in a shoot out near
    a polling station in the town of Laç. (Al Jazeera) (BBC), (AFP via Yahoo New Zealand)
  - Mahmoud Abbas, the President of the Palestinian National Authority, accepts the
    resignation of Prime Minister Rami Hamdallah who had offered his resignation on
    Thursday. (Reuters)
  - Nelson Mandela, former President of South Africa, is in a critical condition after
    his lung infection takes a turn for the worse. (ABC News)
  Sport:
  - In cricket, India narrowly defeats England by 5 runs to win the 2013 ICC Champions
    Trophy at Edgbaston Cricket Ground in the English city of Birmingham. (AFP via
    Yahoo! Sports Australia)
  - American daredevil Nik Wallenda becomes the first person to complete a high wire
    walk across a Little Colorado River Gorge near the Grand Canyon. (Canadian Press
    via CBC)
