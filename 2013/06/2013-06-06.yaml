Date: '2013-06-06'
Source_URI: Portal:Current events/2013 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen ambush a bus in Al Anbar Governorate, Iraq, killing 10 border police and
    5 civilians. (Reuters)
  - Two Tunisian soldiers are killed and two wounded by a roadside bomb while hunting
    Al-Qaeda militants in a mountainous region near the Algerian border. (ABC), (BBC)
  - It is reported that an increasing number of hunger-striking Guantánamo inmates
    are being force fed by military medical teams since Barack Obama's recent speech
    promised again to close the prison camp. (The Guardian) (Press TV) (The Washington
    Post)
  - 'War in Afghanistan (2001–2021): Seven Georgian servicemen are killed and nine
    wounded in an insurgent attack with a truck bomb on the ISAF base in Shir Ghazay,
    Afghanistan. (Civil Georgia)'
  Arts and culture:
  - Kevin Barry wins one of the world's richest literary awards, the International
    IMPAC Dublin Literary Award. (BBC)
  Health:
  - Prince Philip, Duke of Edinburgh is admitted to a London hospital for an exploratory
    operation after experiencing abdominal pains. (BBC)
  International relations:
  - Delegates, among them billionaire businessmen, royalty and elected politicians,
    arrive in England for the 61st summit of the annual Bilderberg Group at The Grove,
    Watford. (The Irish Times) (The Guardian) (RT)
  - North Korea restores the Red Cross link with South Korea used for government-to-government
    communications. (Al Jazeera)
  Law and crime:
  - The Guardian obtains a copy of a court order signed on April 25 by Judge Roger
    Vinson of the secret Foreign Intelligence Surveillance Court (FISC). The order
    permits the FBI, and thereby the Obama administration, to indiscriminately collect
    phone records of millions of Verizon Communications customers on an "ongoing,
    daily basis", with all domestic and international calls affected. The permit is
    similar to one issued to the Bush administration. The Guardian's report does not
    state from whom they obtained the document. (The Guardian)
  - The Obama administration defends its secret surveillance policies. (Al Jazeera)
  - 12 Russian citizens appear in a Moscow court charged with offences at a 2012 anti-Vladimir
    Putin rally; critics claim it is reminiscent of the Soviet-era show trials. (BBC)
  - French Left wing activist Clement Meric dies after being attacked on Wednesday
    in Paris shopping district by a group of far-right skinheads. (News Limited)
  PRISM (U.S. government surveillance program):
  - The Guardian obtains a copy of a document from April that reveals that the NSA
    is mining data using PRISM, spying on the e-mails and web activities of American
    citizens through direct access to Google, Apple, Microsoft, Facebook, YouTube,
    Skype, Yahoo, Paltalk and AOL. The Guardian's report does not state from whom
    they obtained the document. (USA Today) (PC World) (The Guardian)
  Politics and election:
  - New Jersey Governor Chris Christie appoints Jeffrey Chiesa (R-NJ) as a U.S. Senator
    following the death of Frank Lautenberg. He will serve until a special election
    is held later this year. (NBC News)
  - The President of Brazil, Dilma Rousseff, approves a bill to modernize the infrastructure
    of all national ports in her country. She vetoes 13 contradictory sections. (GloboNews)
