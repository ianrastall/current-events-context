Date: '2013-06-16'
Source_URI: Portal:Current events/2013 June 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - A series of car bombings by insurgents across central and southern Iraq kill at
    least twenty people. (BBC)
  - The Quaid-e-Azam Residency, a heritage site in Ziarat, Pakistan, is badly damaged
    in an attack by Assailants, killing a police officer.(CNN)
  - Gunmen kill two polio vaccinators in northwest Pakistan. (The Guardian)
  - Four men, including a police officer, are stabbed at a mosque in Birmingham, England.
    (AFP via News24)
  - Colombian police rescue two kidnapped Spanish tourists. (AFP via Google)
  Arts and culture:
  - Man of Steel sets an all-time June record by grossing an estimated US$113 million
    in its opening weekend in the United States and Canada. (Reuters)
  - Kim Kardashian gives birth to a daughter. (USA Today)
  Business and economics:
  - Weyerhaeuser agrees to buy Longview Timber for US$2.65 billion. (Seattle Times)
  Disasters and accidents:
  - A 5.8-magnitude earthquake in southwestern Mexico causes power outages in Mexico
    City. (CNN) (Reuters)
  - Heavy rains in Uttarakhand, India result in wide-spread flooding, landslides,
    and at least 3 deaths. (Indian Express)
  International relations:
  - Egypt cuts diplomatic ties with Syria. (Bloomberg)
  Law and crime:
  - The Australian Competition and Consumer Commission says Australians lost over
    AU$93 million to online scams in 2012. (Herald Sun)
  - Three policemen are arrested on charges of arms smuggling in Hamirpur, India.
    (Indian Express)
  - Google announces a new system aimed at removing child pornography from the internet.
    (CNET)
  Politics and elections:
  - Robert Mugabe, president of Zimbabwe, agrees to delay elections amidst pressure
    from regional leaders. (Financial Times)
  - U.S. President Barack Obama chooses a Washington, D.C. lawyer, Clifford Sloan,
    with experience in all three branches of government to be the U.S. State Department's
    Special Envoy for closing the military-run prison at the Guantanamo Bay Naval
    Base. (NBC)
  - Kuwait's Constitutional Court dissolves the nation's parliament and orders new
    elections. (BBC News)
  - The prime minister of the Czech Republic, Petr Nečas, announces his resignation.
    (Yahoo News)
  Religion:
  - Pope Francis blesses thousands of Harley Davidson motorcycle enthusiasts on the
    company's 110th anniversary. (The Australian)
  Sport:
  - In golf, Justin Rose of England wins the 2013 U.S. Open. (ABC Online)
  - In motorsport, Greg Biffle wins the Quicken Loans 400 earning Ford its 1000th
    NASCAR victory. (AP via ESPN)
  - In tennis, Roger Federer wins the Gerry Weber Open for his 77th career victory
    and first in 10 months. (CNN International)
