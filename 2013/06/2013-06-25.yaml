Date: '2013-06-25'
Source_URI: Portal:Current events/2013 June 25
Intelligence_Payload:
  War in Afghanistan:
  - Taliban forces attack near the Presidential Palace in Kabul. (BBC)
  Arts and culture:
  - The Under the Dome TV series premieres to 13.5 million viewers in the United States,
    the largest summertime premiere for a drama since 2007. (Newsday) (Entertainment
    Weekly)
  Business and economics:
  - Gun manufacturer Smith & Wesson reports record sales for its fourth quarter and
    for the full fiscal year. (NBC News)
  - Men's Wearhouse fires its founder and longtime spokesperson George Zimmer. (Newsday)
  Disasters and accidents:
  - '2013 North India floods: A rescue helicopter crashes in Uttarakhand; 19 people
    are feared dead. (FirstPost)'
  - A gold mine collapses in the Central African Republic killing at least 37 people.
    (Reuters)
  International relations:
  - South Korea issues a cyber alert after a hacking attack on a number of Government
    websites including the presidential Blue House site. (AFP via Fox News)
  Law and crime:
  - Italian police search more than thirty Italian football clubs including SS Lazio
    and Juventus FC searching for evidence of criminal conspiracy, international tax
    evasion, money laundering and invoice falsification. (Reuters)
  - Russian president Vladimir Putin confirms that Edward Snowden is currently in
    a Moscow airport's international area; Russia rejects United States extradition
    demands. (Fox News)
  - Nine are killed in gun battles between paramilitary forces and drug gangs in Rio
    de Janeiro favelas. (BBC)
  - French anti-terror police arrest six people in Paris who were said to have been
    planning a terrorist attack on well known figures. (France 24)
  - Four executions take place in Nigeria, the first since 2006. (BBC)
  Politics and elections:
  - Democrat Ed Markey defeats Republican Gabriel E. Gomez in a Massachusetts special
    election to elect a senator to finish John Kerry's term. Kerry resigned in February
    to become Secretary of State.(New York Times)
  - The Emir of Qatar Sheikh Hamad bin Khalifa Al Thani abdicates in favour of his
    son Sheikh Tamim bin Hamad Al Thani. (France24) (Reuters)
  - The Prime Minister of Greece, Antonis Samaras, reshuffles his cabinet giving more
    positions to his Panhellenic Socialist Movement coalition partner, appointing
    its leader Evangelos Venizelos as Deputy Prime Minister and Foreign Minister.
    (The Guardian)
  - FICCI calls on the government of India to legalize sports betting. (Times of India)
  - The United States Supreme Court strikes down a portion of the Voting Rights Act
    of 1965. (Washington Post)
  Science and technology:
  - China's Shenzhou 10 spacecraft returns to Earth after its crew complete a 15-day
    mission. (CBS News)
  Sport:
  - In college baseball, the UCLA Bruins win the 2013 College World Series for the
    first time. (USA Today)
