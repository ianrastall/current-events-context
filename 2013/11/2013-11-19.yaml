Date: '2013-11-19'
Source_URI: Portal:Current events/2013 November 19
Intelligence_Payload:
  Syrian civil war spillover in Lebanon, Iranian embassy bombings:
  - Two suicide bombers target the Iranian embassy in the Lebanese capital Beirut
    killing at least 23 people. (Reuters via ABC News Australia)
  - An Al-Qaeda-linked group known as the Abdullah Azzam Brigades claims responsibility
    for the attacks. (Daily News Egypt) (France 24)
  Somali Civil War (2009–present):
  - An African Union base in Beledweyne, Somalia, is stormed by armed attackers, resulting
    in the deaths of 19 people. (BBC)
  Syrian Civil War, Battle of Qalamoun:
  - The Syrian Army captures the town of Qara. (AP via The Hindu)
  Arts and culture:
  - The United States commemorates the 150th anniversary of the Gettysburg Address.
    (Sydney Morning Herald)
  Business and economy:
  - Bombardier Aerospace, a Canadian manufacturer, signs a letter of intent to sell
    Iraq's national carrier five CSeries jets with options for 11 more. (Reuters)
  Disasters and accidents:
  - An under-construction shopping mall collapses in the South African town of Tongaat,
    KwaZulu-Natal, with 50 people trapped and at least one person dead. (AFP via the
    Melbourne Age)
  Typhoon Haiyan:
  - The World Bank offers a US$500 million loan to the Philippines. (NBC News)
  Cyclone Cleopatra:
  - At least 18 people are dead after Cyclone Cleopatra hits the Italian island of
    Sardinia, causing heavy floods. (BBC)
  - The Prime Minister of Italy, Enrico Letta, declares a state of emergency. (ABC
    Australia/Reuters)
  Fort Lauderdale Air Ambulance crash:
  - An Air Evac International Learjet 35 crashes shortly after take-off from Fort
    Lauderdale–Hollywood International Airport, on its way to Cozumel, Mexico, after
    calling mayday and during an attempt to return to the airport, possibly due to
    engine failure, leaving 2 persons dead and two missing as a result. (CNN)
  Law and crime:
  - Virginia State Senator Creigh Deeds was stabbed multiple times at his home by
    his son Austin "Gus" Deeds. His son, Gus was found dead from a self-inflicted
    gunshot wound in the home. (ABC News)
  - U.S. Representative Trey Radel is arrested and charged with cocaine possession.
    (CBS News)
  - George Zimmerman is accused of felony aggravated assault and other charges for
    interactions with his current girlfriend. (BBC)
  - In the largest-ever settlement with the U.S. government, banking giant JPMorgan
    Chase agrees to pay US$13 billion and admits to making serious misrepresentations
    over mortgage-backed securities. (FOX Business)
  Politics and elections:
  - Voters in Nepal start voting to elect a Constituent Assembly to draw up a new
    Constitution. (Reuters)
  - The Venezuelan National Assembly votes to hand President Nicolás Maduro decree
    powers over the economy with the opposition concerned about a potential crackdown
    on political opponents. (Reuters)
