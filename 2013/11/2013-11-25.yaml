Date: '2013-11-25'
Source_URI: Portal:Current events/2013 November 25
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - Two bombs exploded outside a cafe in Baghdad in the district of Sadriya, home
    to mainly Shiite Muslims, killing at least 17 and wounding 37. (Reuters)
  Post-civil war violence in Libya:
  - Nine people are killed in clashes between the Libyan Army and militias in the
    city of Benghazi. (Reuters)
  Arts and culture:
  - 'The Hunger Games: Catching Fire becomes the biggest North American November film
    release, grossing $161 million in the U.S. and Canada over its first weekend.
    (CBS News).'
  Disasters and accidents:
  - A cargo train laden with corn derails in São José do Rio Preto in southeastern
    Brazil, smashing into houses and killing at least eight and injuring another six.
    (AP via News24)
  International relations:
  - Chinese Premier Li Keqiang, arrives in Bucharest, Romania, to attend the China-Central
    and Eastern Europe (CEE) leaders’ meeting as a guest of Romanian Prime Minister
    Victor Ponta. (tvz.tv)
  Law and crime:
  - Ohio Attorney General Mike DeWine announces that four Steubenville, Ohio, City
    Schools employees, including Superintendent Michael McVey, have been indicted
    on felony and/or misdemeanor charges (obstruction, making false statements, etc.)
    relating to the 2012 Steubenville rape case. (CNN)
  - A Parsons, Kansas manhunt begins in the U.S. for David Cornell Bennett, Jr. who
    is alleged to have stalked and killed a mother and her three young children. (FOX
    News) (FOX News)
  Sandy Hook Elementary School shooting:
  - The official intermediate report on the shooting is released online, totaling
    48 pages, and detailing no clear motive for the shooting. It states that perpetrator
    Adam Lanza had had an obsession with shootings like Columbine, had a strained
    and non-communicative relationship with his murdered mother Nancy, and had planned
    the shooting and the details in advance. It does say he had mental health issues,
    but does not indicate they were causative factors. (CNN) (News 12 Connecticut)
