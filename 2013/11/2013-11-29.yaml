Date: '2013-11-29'
Source_URI: Portal:Current events/2013 November 29
Intelligence_Payload:
  Defence:
  - Chief of Army Staff (Pakistan)
  - General Raheel Sharif took over the command of army chief of Pakistan Army.(New
    Army Chief - Dawn News)
  Iraqi insurgency (post-U.S. withdrawal):
  - A wave of violence in Iraq kills 52 people, most of whom were kidnapped and then
    shot dead. (Dawn)
  Syrian civil war:
  - Four people are killed in a mortar attack on the Umayyad Mosque in Damascus. (Al
    Jazeera)
  Senkaku Islands dispute:
  - China deploys fighter jets to the Chinese Air Defense Identification Zone, as
    tensions escalate further over the disputed islands in the East China Sea. (Bloomberg)
  Arts and culture:
  - Three previously unpublished short stories by J. D. Salinger are leaked online
    against the late author's wishes. (BBC)
  - Spanish channel Canal Nou cease broadcasting when the police pull the plug at
    12:19 AM GMT, ending its 23 years of broadcasting.
  Business and economy:
  - Joe Hockey, the Treasurer of Australia, rejects a proposed A$3.4 billion takeover
    bid by American company Archer Daniels Midland for agribusiness GrainCorp. (ABC)
  Disasters and accidents:
  - LAM Mozambique Airlines Flight 470 carrying 27 passengers and six crew members
    disappears in Namibia. (BBC)
  - An unknown number are dead as a result of a police helicopter that crashed into
    a crowded pub on the north bank of the River Clyde in Glasgow, Scotland. (BBC)
    (AFP via NineMSN)
  2013 Thai protests:
  - Several opposition parties including the Civil Movement for Democracy hold a protest
    march on the headquarters of Thailand's ruling Puea Thai party in Bangkok. (Reuters)
    (IBN Live)
  - A thousand protesters enter the headquarters of the Royal Thai Army. (RTE)
  2013 Ukraine pro-European Union protests:
  - With their demands not being met, protests are scheduled to continue until at
    least Sunday 1 December 2013. (Seven News)
  Science and technology:
  - At least part of Comet C/2012 S1 (also known as Comet Ison) emerged from behind
    the Sun's corona. (CNN)
