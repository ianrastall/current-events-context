Date: '2013-11-07'
Source_URI: Portal:Current events/2013 November 7
Intelligence_Payload:
  War in North-West Pakistan:
  - The Pakistani Taliban names Maulana Fazlullah as its new leader six days after
    Hakimullah Mehsud was killed in a drone attack in North Waziristan. (BBC)
  M23 rebellion:
  - M23 rebel chief Sultani Makenga, along with hundreds of rebels, surrenders to
    authorities in Mgahinga Gorilla National Park, Uganda. (BBC)
  Syrian civil war:
  - Turkey seizes a truck loaded with 1,200 rocket warheads and other weapons near
    the border with Syria and detain nine people. (Reuters)
  Law and crime:
  - A person of interest is arrested in connection with a shooting in Detroit, Michigan,
    USA, on November 6 that left 3 people dead and 6 others wounded. (AP via FOX News)
  Politics and elections:
  - Voters in the Falkland Islands go to the polls in their general election to elect
    members of the Legislative Assembly. (The Telegraph)
