Date: '2013-11-18'
Source_URI: Portal:Current events/2013 November 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - A gunman attacks the offices of the newspaper Libération and the bank Société
    Générale in Paris, three days after attacking the offices of the news channel
    BFM TV. (BBC)
  Disasters and accidents:
  - At least twenty people are dead after an Egyptian train collides with a minibus
    and other vehicles south of Cairo. (BBC)
  - Mounts Merapi and Sinabung erupt in Indonesia forcing residents of Central Java
    and North Sumatra to flee. (Fox News)
  Typhoon Haiyan:
  - Philippine President Benigno Aquino III encamps in Tacloban to oversee the rescue
    and relief operations after receiving criticism for his disorganized response
    early into the tragedy. (USA Today)
  International relations:
  - Destruction of Syria's chemical weapons
  - Belgium ruled itself out as a candidate to host the destruction of Syria's chemical
    weapons stockpile and said it would prefer the arsenal to be eradicated close
    to Syria itself. (AP)
  - Indonesia recalls its ambassador to Australia and will "review" Australian diplomatic
    positions in Jakarta following revelations that Australia had tapped the phone
    of the President Susilo Bambang Yudhoyono and his wife. (Sydney Morning Herald)
  Science and technology:
  - NASA successfully launches its MAVEN space probe on a mission to study Mars' atmosphere.
    (The Verge)
