Date: '2013-11-06'
Source_URI: Portal:Current events/2013 November 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Several small bombs explode outside a provincial office of the Chinese Communist
    Party in the northern city of Taiyuan, killing at least one person and wounding
    eight others. (BBC) (Reuters)
  Syrian civil war:
  - A bomb explodes in the center of the capital, Damascus, killing at least 8 people
    and injuring more than 50 others. (BBC)
  - A suicide bomber kills 8 people and injures 41 others in an attack against an
    intelligence building in the southern city of As-Suwayda. Among those killed is
    a Syrian Air Force major. (Reuters)
  M23 rebellion:
  - The M23 rebel movement is defeated by Congolese troops, bringing an end to the
    armed conflict. (Al Jazeera)
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide bomber detonates a bomb in an oil tanker truck, killing 15 people in
    Baghdad, Iraq. (AFP via Ahram Online)
  Law and crime:
  - A Mexican federal court overturns a state court ruling that allowed the drug lord
    Rafael Caro Quintero to be released from prison earlier this year. This court
    response follows a decision by the U.S. Department of State to place a $5 million
    bounty against him. (Fox News)
  - Saudi police crackdowns on foreigners working illegally in the kingdom widen with
    more than 16,000 arrests. (ABC News)
  - A shooting at a barbershop in Detroit, Michigan, U.S. kills 2 people and injures
    7 others. (CNN)
  - Pakistan's ex-president Pervez Musharraf is released on bail. (Xinhua)
  Politics and elections:
  - Voters in Tajikistan go to the polls for a presidential election. (BBC)
  Music:
  - Lady Gaga's 3rd studio album 'Artpop' is released.
