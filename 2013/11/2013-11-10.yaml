Date: '2013-11-10'
Source_URI: Portal:Current events/2013 November 10
Intelligence_Payload:
  Typhoon Haiyan:
  - 'Philippines: A Philippines police official estimates that 10,000 people have
    died in the central province of Leyte. (Weatherzone Australia)'
  - 'Vietnam: 600,000 civilians have been evacuated. (Bangkok Post)'
  Law and crime:
  - Greek Coast Guard intercepts a Sierra Leone-flagged cargo ship, Nour M, with around
    20,000 Kalashnikov assault rifles on board. The ship's Turkish captain and seven
    crew members were arrested. (RT) (The Sydney Morning Herald)
  Sports:
  - Egyptian football club Al Ahly SC wins the CAF Champions League with a record
    of eight titles after a 2-0 win secured a 3-1 aggregate victory over South Africa's
    Orlando Pirates in the final. (CAF) (Goal.com)
  - In motor sports, Marc Márquez of Spain becomes the youngest motorcyclist to win
    the 2013 MotoGP World Championship at the age of 20. (AFP via The Australia)
