Date: '2013-11-08'
Source_URI: Portal:Current events/2013 November 8
Intelligence_Payload:
  Somali Civil War (2009–present):
  - At least 11 people are killed in the Somalian capital Mogadishu after a bomb explodes
    in a carpark. (AFP via Yahoo News Australia)
  Arts and culture:
  - UNESCO suspends the voting rights of the United States and Israel after both countries
    refused to pay their dues as a protest to the membership of the State of Palestine.
    (BBC)
  Disasters and accidents:
  - Typhoon Haiyan, one of the strongest tropical cyclones in recorded history to
    make landfall, hits the Visayas in the Philippines, with at least three people
    dead. (BBC News) (AFP via Google) (Zee News)
  - A 90-car Alabama and Gulf Coast Railway train carrying crude oil derails and explodes
    in western Alabama. (Reuters)
  Law and crime:
  - A man is arrested for alleged involvement in the Wednesday bombing of the Chinese
    Communist Party in the city of Taiyuan in northern China. (The Telegraph)
  - Reports indicate that Palestinian leader Yasser Arafat had high levels of polonium
    in his body when he died. (BBC)
  - Thieves steal six antiques worth billions of VND ($94 thousand) displayed at Hòa
    Khiêm Palace in Tomb of King Tự Ðức in Huế, Vietnam. (Tuoitrenews)
  Sports:
  - Sheffield City Council announces plans to start the demolition of the Don Valley
    athletics stadium located in the city of Sheffield, England, on 21 November 2013.
    (BBC News)
