Date: '2013-11-04'
Source_URI: Portal:Current events/2013 November 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - A truck carrying four people hits a land mine on a road leading to Menaka in Mali,
    killing all of the occupants. (AP via Miami Herald)
  Syria civil war:
  - Colonel Abdul Jabbar Akaidi, top rebel leader and chief recipient of U.S. aid,
    quits his position blaming recent losses on rebel infighting. (Washington Post)
  Arts and culture:
  - German magazine Focus reports the 2012 discovery of Nazi plundered art worth €1
    billion in Munich, including lost works by Picasso and Matisse. (Deutsche Welle)
  Law and crime:
  - A man fatally stabs three people on a bus en route between Årdal and Tyin in Norway.
    (NBC News)
  - The company Johnson & Johnson agrees to pay $2.2 billion in regards to a U.S.
    probe of the drug risperdal. (Reuters)
  - A gunman opens fire inside the Westfield Garden State Plaza in Paramus, New Jersey,
    shooting out security cameras. Hours later, the gunman commits suicide near the
    mall. (CNN)
  - In Florida, United States, Eric Rivera Jr. is convicted of second-degree murder
    in the 2007 killing of NFL Washington Redskins player Sean Taylor during a burglary.
    (Fox News)
  Politics and elections:
  - Egyptian deposed president Mohamed Morsi's trial regarding charges of violence
    is postponed to 8 January 2014. (AllAfrica)
  Science:
  - Lockheed Martin's Skunk Works undertakes to build a successor to the SR-71 Blackbird
    capable of mach 6 speed flight by 2030. (Fox News)
