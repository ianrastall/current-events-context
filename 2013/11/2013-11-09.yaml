Date: '2013-11-09'
Source_URI: Portal:Current events/2013 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A gunman kills eight people in a bar in the Colombian city of Cali. (Reuters)
  Islamist insurgency in Nigeria:
  - Five members of the Nigerian Islamist group Boko Haram and two Nigerian Army soldiers
    are killed in fighting in the city of Kano. (Reuters)
  Arts and culture:
  - Venezuelan television presenter María Gabriela Isler is crowned Miss Universe
    2013 in Moscow, Russia. (AFP via Yahoo News)
  Typhoon Haiyan:
  - 'Philippines: The Red Cross says that 10,000 people are confirmed dead. It reported
    that at least 1,000 had been killed in Tacloban and 200 in Samar province. (RT)
    (The Guardian)'
  - 'Vietnam: The government mobilizes over 453,000 soldiers and militia members,
    and thousands of means of transport to cope with Typhoon Haiyan that is forecast
    to hit central region early Sunday. Roughly 20,000 people are evacuated from Da
    Nang. (The New York Times) (Tuoi Tre News)'
  International relations:
  - British foreign secretary William Hague urged negotiatiors to "seize the moment"
    on talks about Iran's nuclear program. (BBC)
  Law and crime:
  - Authorities in Bangladesh arrest five leaders of the Opposition Bangladesh Nationalist
    Party the day before the start of a nationwide strike. (AP)
  Politics and elections:
  - Voters in the Maldives go to the polls for the second round of a presidential
    election. (BBC)
  Science:
  - The United States Navy christened the USS Gerald R. Ford - the $15.5 billion aircraft
    carrier is the most technologically advanced ship ever built. (FOX News)
  Sports:
  - Guangzhou Evergrande win the AFC Champions League for the first time in their
    history, defeating FC Seoul in the final. (AFC) (Goal.com)
