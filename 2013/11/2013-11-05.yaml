Date: '2013-11-05'
Source_URI: Portal:Current events/2013 November 5
Intelligence_Payload:
  Post-civil war violence in Libya:
  - Rival militias battle each other in firefights on the streets of Tripoli. No deaths
    are reported despite the use of rocket-propelled grenades and anti-aircraft artillery
    by the combatants. (Reuters)
  Arts and culture:
  - Chicago chef Charlie Trotter, who operated his namesake restaurant in Chicago
    (from 1987 until its closure in 2012), is found dead by his son at his Lincoln
    Park home. (Chicago Tribune)
  Disasters and accidents:
  - A 4-story building under construction collapses in Lagos, Nigeria, killing 4 people.
    (AP via Miami Herald)
  Law and crime:
  - Sports journalist Alberto Angulo Gerardo is killed in the Mexican state of Sinaloa.
    His death add ups to the death toll of more than 100 media workers killed in Mexico
    since the year 2000. (GlobalPost)
  - Thousands of protesters fill the streets of Bangkok, Thailand, after lawmakers
    pass a draft bill for political amnesty which could allow self-exiled Prime Minister
    Thaksin Shinawatra to re-enter the country. (Reuters via Voice of America)
  - American rapper DMX is arrested in South Carolina for driving with a suspended
    licence, and without a vehicle tag or insurance. (Reuters)
  - SAC Capital Advisors pleads guilty to insider trading and wire fraud and agrees
    to pay $1.8 billion in penalties to the United States. (Bloomberg)
  - 152 people are sentenced to death in Bangladesh in connection to the 2009 Bangladesh
    Rifles revolt. (Reuters)
  Politics and elections:
  - Voters in the US states of New Jersey and Virginia go to the polls in their gubernatorial
    elections, while voters in cities across the country also vote to choose their
    next mayor. (CBS News) (Daily Mail) (CBS News) (Reuters) (CBS News)
  - Chris Christie is re-elected Governor of New Jersey.
  - Terry McAuliffe is narrowly elected Governor of Virginia.
  - Bill de Blasio is elected Mayor of New York City.
  - Toronto Mayor Rob Ford admits that a year-old video does indeed show him smoking
    crack cocaine, a charge he had previously denied. Ford refused to resign from
    office and vowed to pursue re-election efforts. (CBC)
  Science:
  - The ISRO of India launches a PSLV-XL rocket carrying the Mars Orbiter Mission
    probe, which will eventually be sent to Mars. (The Times of India)
  - The discovery of the Hercules–Corona Borealis Great Wall, the largest known structure
    in the universe, is announced.
  Sports:
  - In the NFL, Houston Texans head coach Gary Kubiak is released from a Houston hospital
    two days after suffering a transient ischemic attack during the Texans' loss to
    the Indianapolis Colts. He will not immediately resume coaching duties, but is
    expected to fully recover. (ESPN)
