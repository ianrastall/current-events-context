Date: '2013-11-27'
Source_URI: Portal:Current events/2013 November 27
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - 33 people are killed in bombings and shootings across Iraq. (BBC)
  Business and economy:
  - Dubai wins the right to host Expo 2020 (Khaleej Times)
  - Greece is the first developed market to be demoted into an emerging market by
    the MSCI Emerging Markets Index. (The Wall Street Journal)
  - In China, some second-tier cities such as Wuhan and Shenyang begin to enhance
    local housing price controlling policy, following all first-tier cities' controlling
    policy enhancement in the country. (ifeng.com)
  - U.S. Bankruptcy Court Judge Sean Lane, who is overseeing the case of the bankruptcy
    reorganization of American Airlines, gives his required approval to the American
    Airlines–US Airways merger, dismissing the objection of a passenger's group, clearing
    the way for it to go forward in December 2013 unless there is an appeal. (CNN
    Money)
  - The price of one Bitcoin breaks above $1,000 for the first time, and marks a rise
    of over 7,600 percent so far this year. (CNBC)
  Disasters and accidents:
  - A winter weather storm in the United States kills 11 people and causes major travel
    delays. (The Los Angeles Times)
  - Two people die after a crane collapses in the Arena Corinthians in the Brazilian
    city São Paulo which is due to host the opening ceremony of the 2014 World Cup.
    Parts of the grandstands also collapse. (BBC)
  Law and crime:
  - Three girls (two of whom eventually fled to a neighbor's house to escape their
    knife-wielding stepfather and notified police) held captive for several months
    or more in extremely dirty conditions (possibly up to two years), subjected to
    long barrages of loud music or static, fed only once a day and having gone up
    to four months without a bath, are rescued in Tucson, Arizona. (CNN)
  Politics and elections:
  - The Prime Minister of Latvia Valdis Dombrovskis resigns due to the Riga supermarket
    roof collapse. (ABC News)
  - The Italian Senate votes to expel ex-Prime Minister Silvio Berlusconi from parliament
    over his conviction for tax fraud. (CBC News) (CNN)
  - A Pakistani Tehreek-e-Insaf (PTI) party official, Shireen Mazari, in connection
    with a police murder investigation into unnamed persons after a recent drone strike
    that killed five, reportedly outs the names of two CIA officials, Director John
    Brennan and the Pakistan Station Chief (U.S. and CIA officials have not yet given
    official confirmation). (CNN)
  2013 Tunisian protests:
  - Tens of thousands of Tunisians demonstrate over the economic crisis in three cities
    calling for greater investment in their impoverished regions. Clashes broke out
    in the town of Siliana between the police and protesters following general strikes.
    (ABC News) (Ahram Online)
  - Protesters torch the ruling Islamist party's office in Gafsa. (The Daily Star)
    (The Voice Of Russia)
  2013 Thai protests:
  - As anti-government protests in Thailand continue to spread beyond the capital
    Bangkok, the parliament discusses a no-confidence motion against the Prime Minister
    Yingluck Shinawatra. (AFP via Times of India)
  Science and Technology:
  - Japan's self-driving Nissan Leaf car finishes the very first public road test
    on a highway in Japan. (Engadget)
