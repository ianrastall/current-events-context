Date: '2013-11-20'
Source_URI: Portal:Current events/2013 November 20
Intelligence_Payload:
  War in North-West Pakistan:
  - A Taliban suicide bomber kills two Pakistan Army soldiers in the North Waziristan
    tribal district. (The Express Tribune)
  Sinai insurgency:
  - At least 11 Egyptian Army soldiers are reported killed and 37 are injured following
    a suicide bomb attack in the city of al-Arish. (BBC) (ITV)
  Typhoon Haiyan:
  - China sends a 'peace ark' loaded with aid to the Philippines after it was criticized
    for not giving enough. (BBC) (Voice of America)
  Law and crime:
  - U.S. Representative Trey Radel (R–FL) pleads guilty on all charges of cocaine
    possession following his arrest yesterday and faces 1 year supervised probation.
    (The Washington Post)
  Politics and elections:
  - The Supreme Court of the Philippines abolishes the Priority Development Assistance
    Fund, otherwise known as the 'pork barrel', prompting Philippine President Benigno
    Aquino III to fly back to Manila. (Bloomberg)
  Religion:
  - The General Synod of the Church of England votes in favour of legislation to allow
    the ordination of women bishops by 2014. (BBC)
  Sport:
  - In baseball, the Canberra Cavalry from the Australian Baseball League wins the
    2013 Asia Series defeating the Uni-President 7-Eleven Lions of Taiwan 14-4 in
    the final. (Sydney Morning Herald)
