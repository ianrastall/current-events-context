Date: '2013-11-28'
Source_URI: Portal:Current events/2013 November 28
Intelligence_Payload:
  Syrian civil war:
  - Syrian Army forces capture Deir Atiyah while rebels capture Otayba. (AFP) (Daily
    Star) (ABC)
  - Three million people are now refugees from the conflict, as estimated by the United
    Nations. (SBS)
  - One Syrian is killed and nine others injured in mortar shelling of the Russian
    embassy in Damascus. (Reuters)
  - The US offers to destroy Syria chemical weapons at sea using the US Navy auxiliary
    vessel . (BBC) (One News)
  Post-civil war violence in Libya:
  - Four Libyan soldiers are killed in clashes between the army and Islamist militias
    in the eastern city of Benghazi. (Reuters)
  Arts and culture:
  - Italian sisters Francesca and Elisabetta Grillo accuse celebrity chef Nigella
    Lawson and businessman Charles Saatchi of treating them as "worse than Filipino
    slaves". (Sydney Morning Herald) (BBC)
  - In the United States the holidays of Thanksgiving and the first day of Hanukkah
    occur on the same day. The event, dubbed Thanksgivukkah, last happened in 1888,
    and will not occur again for another 70,000+ years. (TIME) (BBC)
  Disasters and accidents:
  - Ten people are killed in a blast at a weapons depot in southern Libya. (BBC)
  2013 Pacific typhoon season:
  - The death toll in the Philippines from Typhoon Haiyan reaches 5,560. (ABS-CBN)
  2013 Borazjan earthquake:
  - A 5.6 earthquake in Iran kills seven people and injures 30. (Reuters) (Sky News)
  Law and crime:
  - Vietnam passes a new Constitution that reaffirms the dominant position of the
    Communist Party. (AP)
  - Former United States Marine Itzcoatl Ocampo commits suicide by eating Ajax while
    awaiting trial for six murders from 2011 and 2012. (FOX News)
  2013 Thai protests:
  - The Prime Minister of Thailand Yingluck Shinawatra survives a no-confidence vote
    in the Parliament amidst street protests. (BBC)
  Science and Technology:
  - China's first lunar vehicle is named 'YuTu' (Chinese:"玉兔", a pet rabbit of Moon
    goddess in Chinese myth see Jade rabbit) and is planned to launch from Xichang
    Satellite Launch Center before December 10, 2013. (NetEase)
