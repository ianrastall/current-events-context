Date: '2013-11-11'
Source_URI: Portal:Current events/2013 November 11
Intelligence_Payload:
  Business and economy:
  - A general strike in Nepal against next week's election shuts down schools, markets
    and industries. (AP via New Zealand Herald)
  Disasters and accidents:
  - An international aid effort is underway to help the Philippines cope with the
    aftermath of Typhoon Haiyan. (ABC News Online)
  - At least four people are killed and eight injured as a seven story building catches
    fire in Vikhroli, a suburb of the Indian city of Mumbai. (Zee News)
  - At least 100 people are killed in a tropical cyclone in Somalia's semi-autonomous
    Puntland region. (Reuters)
  Law and crime:
  - Three members of the Iranian rock band The Yellow Dogs are shot and killed in
    Brooklyn, New York by a member of a different band. The shooter then commits suicide.
    (CNN)
  Religion:
  - Cardinal Domenico Bartolucci, the longtime director of the Sistine Chapel Choir,
    from 1956 to 1997, dies at the age of 96. At the time of his death he was the
    2nd-oldest living member of the College of Cardinals. (Catholic World News)
