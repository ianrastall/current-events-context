Date: '2013-11-24'
Source_URI: Portal:Current events/2013 November 24
Intelligence_Payload:
  War in North-West Pakistan:
  - Three people are killed in explosions in northwest Pakistan. (PTI via Business
    Standard)
  Syrian civil war:
  - More than 160 people have been killed in fighting between the Syrian Army and
    opposition forces in the suburbs of Damascus. (AP via USA Today)
  Ban of Islam in Angola:
  - Angola becomes the first modern country to outlaw Islam, along with other religions
    unapproved by the Ministry of Justice and Human Rights. Mosques are being destroyed.
    (International Business Times)
  Disasters and accidents:
  - Over 12,000 people are evacuated in Indonesia's North Sumatra province after Mount
    Sinabung erupts. (Sky News)
  Nuclear program of Iran:
  - Iran signs an interim agreement with the P5+1 countries limiting its nuclear program
    in exchange for reduced sanctions. (CNN) (BBC) (AFP via Ahram)
  Honduran general election, 2013:
  - Voters in Honduras go to the polls to select a new President, Congress, local
    government officials and representatives in the Central American Parliament. (Bloomberg)
  Malian parliamentary election, 2013:
  - Votes in Mali go to the polls for the first round of parliamentary elections with
    reports of low voter turnout and abuses. (Reuters)
  Euromaidan:
  - More than 100,000 people protest in Kiev, Ukraine, against the decision of Viktor
    Yanukovych's government to suspend preparations for signing of the association
    agreement with the European Union under pressure from Russia. (BBC)
  Religion:
  - Pope Francis venerates the purported remains of his first ever predecessor, as
    the Vatican gives a public display for what some claim are Saint Peter's remains.
    (Guardian)
  Sports:
  - In Canadian football, the Saskatchewan Roughriders defeat the Hamilton Tiger-Cats
    45–23 to win the 101st Grey Cup. Kory Sheets is named the most valuable player,
    while Chris Getzlaf is named most valuable Canadian. (CBC)
