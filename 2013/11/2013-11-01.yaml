Date: '2013-11-01'
Source_URI: Portal:Current events/2013 November 1
Intelligence_Payload:
  Syrian civil war:
  - Israeli aircraft carry out a strike near the Syrian coastal city of Latakia targeting
    Russian-made S-125 air defense missiles allegedly intended for use by the Lebanese
    militant group Hezbollah. (BBC)
  War in North-West Pakistan:
  - A U.S. drone strike kills Hakimullah Mehsud, the leader of the Pakistani Taliban
    (whom the United States had a reward for $5 million) and five others. (BBC) (Reuters)
  2013 Tiananmen Square attack:
  - China's top security official blames the East Turkestan Islamic Movement for a
    suicide attack that killed five people at the Tiananmen Gate in Beijing on Monday.
    (AP)
  Business and economy:
  - Fannie Mae files a lawsuit for $800 million against nine different banks, including
    Citigroup and Bank of America, for manipulating the Libor benchmark interest rate.
    (Bloomberg via SFGate)
  Disasters and accidents:
  - Flash floods and heavy rains sweep across central Texas, United States, killing
    2 people. (AP via Fox News)
  Law and crime:
  - '2013 Los Angeles International Airport shooting: A gunman opens fire at Los Angeles
    International Airport, killing a US Transportation Security Administration employee,
    and wounding several other people. It prompts a terminal evacuation. (NBC Los
    Angeles) (Fox News)'
  - Two people, members of the far-right Greek political party Golden Dawn, are killed
    in a drive-by shooting, outside the offices of Golden Dawn in Neo Iraklio, Athens.
    (Reuters) (Kathimerini)
  Science and technology:
  - Scientists discover three new species of marsupial Antechinus in Queensland, Australia.
    (News.com.Au)
  - A person claiming to be a member of Anonymous takes down the website for Singaporean
    newspaper The Straits Times. (BBC)
  - The smartphone wars are re-ignited, as Rockstar Consortium, a company owned by
    companies including Apple and Microsoft, starts wide-ranging legal action against
    Google, Samsung, and other makers of Android phones. (Reuters) (Ars Technica)
