Date: '2013-11-23'
Source_URI: Portal:Current events/2013 November 23
Intelligence_Payload:
  Syrian civil war:
  - Syrian government air strikes around the northern Syrian city of Aleppo kill 40
    people. (Reuters)
  Senkaku Islands dispute:
  - China delimits an "air-defence identification zone" over an area of the East China
    Sea, covering Diaoyu/Senkaku Islands, also claimed by Japan. (BBC News)
  Iraqi insurgency (post-U.S. withdrawal):
  - A car bomb and a suicide bomber kills nine people and wounds 54. (Reuters)
  Islamist insurgency in Nigeria:
  - Gunmen kill 12 people in a raid on a Northeastern Nigerian village. (Reuters)
  Arts and Culture:
  - '"The Day of the Doctor" premieres in 94 countries simultaneously to celebrate
    the 50th anniversary of British science-fiction show Doctor Who. (BBC News)'
  - 1D day premieres live all over the world for over seven hours to celebrate the
    release of One Direction's new album, Midnight Memories.
  Typhoon Haiyan:
  - The Armed Forces of the United States scales back its operations. (Reuters)
  International relations:
  - P5+1 foreign ministers meet in Geneva for talks on Iran's nuclear program. (RIA
    Novosti)
  - Egypt expels the Turkish ambassador, citing "interference". (AP via Chron)
  Sport:
  - In boxing, Filipino Manny Pacquiao defeats American Brandon Rios to win the World
    Boxing Organization International Welterweight title. (Sports Illustrated via
    CNN)
