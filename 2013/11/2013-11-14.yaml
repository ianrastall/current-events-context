Date: '2013-11-14'
Source_URI: Portal:Current events/2013 November 14
Intelligence_Payload:
  Attacks and conflicts:
  - A French priest is kidnapped in Cameroon near the border with Nigeria. (BBC)
  Iraqi insurgency (post-U.S. withdrawal):
  - 39 people are killed in Iraq in attacks against Shiites Muslims. (Daily Star)
  Typhoon Haiyan:
  - Philippine President Benigno Aquino III is criticized by survivors, aid agencies,
    and international and local media for his inadequate response to the tragedy.
    (BBC)
  International relations:
  - Russian ministers led by Foreign Affairs Minister Sergey Lavrov including Defense
    Minister Sergey Shoygu arrive in Cairo and meet with their Egyptian counterparts
    including the head of Egypt's military General Abdel Fattah el-Sisi in talks over
    a new era of enhanced military co-operation. (BBC) (Reuters)
  - Protests are held in Albania against the proposal to bring Syria's chemical weapons
    stockpile to be destroyed in the country. (TIME) (The Washington Post) (Reuters)
  Law and crime:
  - Canadian police reveal that 348 people have been arrested internationally and
    386 children rescued as a result of a three-year child pornography investigation
    called "Project Spade". (RT) (BBC)
  Politics and elections:
  - Following the heightened scrutiny from the April 2012 controversy, two U.S. Secret
    Service agents are relieved of duty from Barack Obama's security detail after
    charges of sexual harassment towards a female subordinate. (TIME)
  Sport:
  - In cricket, Indian player Sachin Tendulkar, the leading run scorer of all time,
    starts his 200th and final test match in Mumbai. (Sydney Morning Herald)
