Date: '2013-11-22'
Source_URI: Portal:Current events/2013 November 22
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - 23 people are killed in bombing and shootings in Iraq. (Reuters)
  Arts and culture:
  - The United States commemorates the 50th anniversary of the day when John F. Kennedy
    was assassinated in Dallas, Texas. (ABC Online)
  Disasters:
  - At least 35 people are killed in an explosion after a leaking oil pipeline caught
    fire in the city of Qingdao, China. (BBC)
  - At least two people are dead from windstorms in Northern California, U.S. (San
    Francisco Chronicle)
  2013 Riga Maxima superstore collapse:
  - The death toll rises to at least 48, with others feared trapped and rescue efforts
    continuing. (BBC) (NBC News)
  Typhoon Haiyan:
  - The death toll in the Philippines tops 5000. (BBC)
  2013 North Indian Ocean cyclone season:
  - Cyclone Helen hits India's Andhra Pradesh state killing at least six people and
    knocking out power to thousands of villages. (AP via Miami Herald)
  2013 global surveillance disclosures:
  - The United States has snooped on the Netherlands since 1946, according to files
    published in NRC Handelsblad. (HLN) (NOS) (ANP via Volkskrant)
  Law and crime:
  - Crystal Mangum, the accuser in the 2006 Duke lacrosse rape hoax, is convicted
    of second-degree murder by a North Carolina jury in the 2011 stabbing death of
    her boyfriend, and is sentenced to serve between 14 and 18 years in prison. (AP
    via Fox News)
  World Chess Championship 2013:
  - Magnus Carlsen of Norway defeats defending champion Viswanathan Anand of India
    6½–3½ in a series played in Chennai. (Reuters via SBS)
