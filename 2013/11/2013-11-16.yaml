Date: '2013-11-16'
Source_URI: Portal:Current events/2013 November 16
Intelligence_Payload:
  Syrian civil war:
  - The Organisation for the Prohibition of Chemical Weapons agrees to a Syria arsenal
    destruction plan. (The Australian)
  Post-civil war violence in Libya:
  - Second day of fighting in Tripoli as death toll from violence at anti-militia
    protest topped 40. (Al Jazeera)
  Islamist protests in Egypt (July 2013–present):
  - Lawyers in the UK accuse Egypt's military of committing crimes against humanity
    after July's ouster of President Mohamed Morsi. (Al Jazeera)
  War in Afghanistan (2001–2021):
  - Suicide car bombing in Kabul kills six people and injures twenty. (Al Jazeera)
  Iraqi insurgency (post-U.S. withdrawal):
  - A series of attacks in Baghdad and north Iraq kills four policemen and wounds
    dozens. (Daily Star)
  Typhoon Haiyan:
  - David Cameron commits an additional £30 million to the victims. (BBC)
  Law and crime:
  - A San Diego, California family of four, who disappeared in 2010, is found buried
    in the desert; local authorities are now treating the case as multiple homicides.
    (CBS News)
  International relations:
  - The Brazilian Federal Police officially asks the Interpol to search and arrest
    in Italy the former Banco do Brasil marketing director chief, the italian Henrique
    Pizzolato, who has allegedly fled following a Supreme Federal Court order to arrest
    him for bribery, amongst others involved. (BBC) (GloboNews)
  - Aircraft carrier INS Vikramaditya is commissioned into the Indian Navy at the
    Russian shipbuilding complex of Sevmash in Severodvinsk, ending a five-year delay
    to the $2.33 billion project. Russian deputy Prime Minister Dmitry Rogozin and
    Indian Defense Minister AK Antony attend the handing over ceremony. (Times of
    India) (RT) (Reuters)
  Politics and elections:
  - Voters in the Maldives go to the polls for a presidential election with Abdulla
    Yameen winning the election with 51.3% of the vote. (ABC News Australia)
  Sports:
  - Sachin Tendulkar retires from all forms of cricket following his final Test at
    Mumbai's Wankhede Stadium, scoring 74 runs in his career's last innings. (ESPN
    Cricinfo)
