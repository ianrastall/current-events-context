Date: '2013-11-02'
Source_URI: Portal:Current events/2013 November 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two French journalists working for RFI are kidnapped and killed in the town of
    Kidal in northern Mali. (BBC)
  Disasters and accidents:
  - Two planes carrying skydivers collide in mid-air in northern Wisconsin with no
    deaths or serious injuries reported. (National Post)
  Law and crime:
  - Paul Anthony Ciancia is charged with murder of a federal officer and commission
    of violence in an international airport in relation to the 2013 Los Angeles International
    Airport shooting. (CNN)
  Politics and elections:
  - Georgian Prime Minister Bidzina Ivanishvili, due to leave office this month, names
    Interior Minister Irakli Garibashvili as his successor. (Reuters)
  2013 Tunisian protests:
  - Tunisian government and opposition leaders are deadlocked during talks over the
    determination of a new PM tasked with steering the country out of a months-long
    political crisis. (Gulf News)
