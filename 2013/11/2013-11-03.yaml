Date: '2013-11-03'
Source_URI: Portal:Current events/2013 November 3
Intelligence_Payload:
  Disasters and accidents:
  - An overcrowded ferry with 200 passengers on board sinks off Pattaya, Thailand,
    killing at least six people. (BBC)
  - A small turboprop plane carrying 18 people crashes while trying to land in bad,
    rainy weather in the Andes Mountains of northern Bolivia, killing 8, and injuring
    10, including the pilot and co-pilot, on a trip from Trinidad, Bolivia to Riberalta,
    Bolivia, in El Beni Department near Brazil. (NBC)
  Islamist protests in Egypt (July 2013–present):
  - Ousted Egyptian president Mohamed Morsi's trial starts in Cairo's police academy.
    He faces charges of inciting violence and murder in connection with clashes at
    the presidential palace in Cairo in December 2012. (Reuters) (RTE)
  Religion:
  - The Apostolic Vicariate of Brunei is one of the youngest and smallest Catholic
    ecclesiastical jurisdictions in southeast Asia. About 10 percent of the population
    is atheist, 13 percent Buddhist, and a small number have indigenous beliefs. Christians,
    half of whom are Catholic, constitute 10 percent of Brunei's population. (Catholic
    News Agency)
  Science:
  - A solar eclipse sweeps across Africa, Europe and the Eastern United States. (CTV)
  Sports:
  - The NFL Houston Texans head coach Gary Kubiak collapses on the field at halftime
    of the Texans vs. Colts game Sunday night. (ESPN)
