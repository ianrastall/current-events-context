Date: '2013-11-21'
Source_URI: Portal:Current events/2013 November 21
Intelligence_Payload:
  Drone attacks in Pakistan:
  - Pakistani officials claim that an American drone strike on an Islamic seminary
    has killed six people, including two Afghan Taliban leaders and a leader of the
    Haqqani network. (AP)
  Iraqi insurgency (post-U.S. withdrawal):
  - A truck bomb detonates in a vegetable market in northeastern Iraq, killing at
    least 31 people. (AP via ABC)
  2013 Riga Maxima superstore collapse:
  - 54 people are killed, many injured as a Maxima superstore collapses in the Latvian
    capital Riga. (AFP via ABC Online)
  2013 global surveillance disclosures:
  - Indonesian protesters gather outside the Australian embassy in Jakarta and protesters
    burn Australian flags to protest alleged bugging of President Susilo Bambang Yudhoyono's
    phone. (AAP via Weekly Times)
  Law and crime:
  - A Honduran Vice-minister of Defense states that the Sinaloa Cartel boss Joaquín
    "El Chapo" Guzmán, Mexico's most-wanted drug lord, may be hiding in Honduras.
    (InSight Crime)
  - Metropolitan Police arrested two suspects after three women are rescued from a
    residential address in Lambeth, South London, after thirty years of captivity.
    (BBC)
  - The parole board in the U.S. state of Alabama grants posthumous pardons to three
    members of the Scottsboro boys falsely accused of raping a white teenager. (Wall
    Street Journal)
  Science:
  - The Japanese Coast Guard claims that a volcanic eruption has created a new islet
    in the Bonin Islands south of Japan. (AP)
  Sports:
  - Sheffield City Council begins the demolition of the Don Valley Stadium athletics
    stadium in Sheffield, England. (BBC)
