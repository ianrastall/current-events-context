Date: '2013-11-30'
Source_URI: Portal:Current events/2013 November 30
Intelligence_Payload:
  Syrian civil war spillover in Lebanon:
  - Six people are killed in Lebanon's northern city of Tripoli on Saturday in exchanges
    of fire between neighborhoods which support rival sides in Syria's civil war.
    (Reuters)
  Arts and culture:
  - American actor Paul Walker (The Fast and the Furious franchise) is one of two
    killed in a car accident after attending a charity event in Santa Clarita, California.
    (CNN) (ABC News Australia)
  - The Philippines commemorates the 150th birth anniversary of national hero and
    revolutionary leader Andrés Bonifacio. (Manila Standard Today) (ABS-CBN News)
  - Gaia Cauchi of Malta, wins the Junior Eurovision Song Contest 2013 in Kiev, Ukraine,
    with her song "The Start." (Junior Eurovision TV)
  Disasters and accidents:
  - The wreckage of LAM Mozambique Airlines Flight 470 that went missing Friday is
    found in Namibia in the Bwabwata National Park with all 33 people on board having
    died. (Reuters)
  2013 Glasgow helicopter crash:
  - Eight people are confirmed dead following Friday's crash, with a further 14 seriously
    injured. (Sky News)
  - Scottish First Minister Alex Salmond describes the incident as "a black day for
    Glasgow and for Scotland". (Sky News) (Channel 4 News)
  Typhoon Haiyan:
  - American pop band One Republic donates $1 million to aid the victims. (Daily Express)
  2013 Rugby League World Cup:
  - Australia wins the final played at Old Trafford, defeating New Zealand 34-2. (Sydney
    Morning Herald)
