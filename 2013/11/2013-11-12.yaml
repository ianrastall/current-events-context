Date: '2013-11-12'
Source_URI: Portal:Current events/2013 November 12
Intelligence_Payload:
  Armed conflict and attacks:
  - Two people are killed and five others injured when a bomb explodes in Bedfordview,
    South Africa, near the Eastgate shopping mall. (SAPA via News24)
  Arts and culture:
  - British composer John Tavener dies at age 69. (BBC)
  Business and economy:
  - U.S. stock exchanges jointly announce a plan to improve the technical functioning
    of their markets, in the face of recent high-profile glitches such as the trading
    halt in Nasdaq in August. (Reuters)
  Disasters and accidents:
  - The Philippines faces a health crisis in the aftermath of Typhoon Haiyan with
    the official death toll at 1,774 and expected to rise quickly. (CNN)
  Laws and crime:
  - Hawaii becomes the 15th state in the United States to legalize same-sex marriage.
    (Washington Post)
  - A U.S. District Court judge, Victor Marrero, denies a motion by former New Jersey
    Governor Jon Corzine, the former CEO of MF Global, to dismiss investor litigation
    intended to hold him accountable for MF Global's blow-up in October 2011. (Reuters)
  Politics and elections:
  - The Senate of Thailand rejects an asylum bill that could have seen the return
    of former Prime Minister Thaksin Shinawatra. (BBC)
