Date: '2013-11-26'
Source_URI: Portal:Current events/2013 November 26
Intelligence_Payload:
  Central African Republic conflict (2012–13):
  - France announces that it plans to intervene in the conflict in the Central African
    Republic. (Bloomberg)
  Arts and culture:
  - An archaeological site is discovered in Nepal dating to 550 BC which is claimed
    to be a Buddhist shrine. If true, the birthday of the Buddha would be pushed back.
    However, not all experts agree on the significance of the site. (National Geographic)
  Typhoon Haiyan:
  - 39 musicians, including The Beatles, U2, Madonna, Lady Gaga, Beyoncé, Katy Perry,
    Lorde, One Direction, and Justin Bieber, release a charity album to help the victims.
    (USA Today) (BBC)
  2012 Benghazi attack:
  - CBS suspends Lara Logan and her producer after she admitted that portions of her
    60 Minutes report on the death of U.S. Ambassador J. Christopher Stevens were
    false. (BBC)
  Business and economy:
  - The U.K. Chancellor of the Exchequer asks the Bank of England whether it needs
    more power. The central bank's Financial Policy Committee will study the question.
    (BBC)
  - Ford recalls 140,000 Escape model cars from the United States and an additional
    21,000 from other nations after 13 engine fires were reported. (The New York Times)
  Disasters and accidents:
  - At least 30 Haitian migrants die when a boat capsizes off the Bahamas. (The New
    York Times)
  International relations:
  - Britain makes a protest to the Spanish authorities over the opening of a diplomatic
    bag at the border with Gibraltar on Friday 22 November 2013. (BBC)
  Islam in Angola:
  - Angola denies it has banned Islam. (The Express Tribune)
  Law and crime:
  - Chinese police detain nine people for alleged negligence in relation to the November
    22 Sinopec oil pipeline explosions in the eastern port city of Qingdao which killed
    at least 55 people. (Reuters)
  - P.C. Keith Wallis is charged as part of the investigation into the Plebgate incident
    at Downing Street. (BBC)
  - Lostprophets frontman Ian Watkins pleads guilty at Cardiff Crown Court to a range
    of child sex offences including the attempted rape of a baby. (Wales Online)
  - The U.S. Supreme Court agrees to hear certain major religious freedom cases that
    will decide whether a company that is for-profit (including family-run ones)-
    and other entities who are not themselves churches- can refuse to provide contraceptive
    coverage that would otherwise be required under the Patient Protection and Affordable
    Care Act; lower courts are split. (NBC)
  2013 Thai protests:
  - Protestors demand the resignation of Prime Minister Yingluck Shinawatra who they
    believe is the puppet of her deposed brother Thaksin. (BBC News)
  Scottish independence referendum:
  - A White Paper is released regarding the effects of Scotland's secession. (The
    Telegraph)
  Sports:
  - In Canada, the National Hockey League (NHL) and Rogers Communications announce
    a 12-year, $5.2 billion deal that grants national television rights of the NHL
    to the Rogers-owned Sportsnet. The agreement includes a provision that allows
    CBC to continue airing Hockey Night in Canada on Saturday nights; however, Rogers
    will have creative and financial control of the program. TSN, which has held some
    national broadcast rights to the NHL since 2002, is shut out of the deal.
