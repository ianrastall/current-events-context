Date: '2013-04-20'
Source_URI: Portal:Current events/2013 April 20
Intelligence_Payload:
  War in North-West Pakistan:
  - A female suicide bomber kills four and injures four outside a hospital in Khaar,
    Federally Administered Tribal Areas, Pakistan. (PTI via The Hindu)
  Disasters and accidents:
  - '2013 Lushan earthquake: An earthquake of 7.0 magnitude strikes Lushan County,
    Sichuan province, China, with the latest estimate showing 193 people dead, 24
    missing and 11,826 injured. (China Daily) (Reuters) (RT)'
  - Five snowboarders are killed in a backcountry avalanche on Loveland Pass in the
    U.S. state of Colorado in the deadliest US avalanche since 1962. (AP via ABC News)
  - In southern California, United States, 200 residents are evacuated due to a brush
    fire. (AP via San Jose Mercury News)
  - Five people are killed and 17 are injured in Vail, Arizona, United States, when
    a car accident occurs during a U.S. Border Patrol pursuit. (Los Angeles Times)
  International relations:
  - Japan is permitted to join the Trans Pacific Partnership trade talks by the 11
    other nations participating. (The New Zealand Herald)
  2013 Korean crisis:
  - North Korea rules out denuclearization but says it is open to negotiating an arms
    reduction. (The Hindu)
  Law and crime:
  - 3 Doors Down bass player Todd Harrell is charged in Nashville, Tennessee, United
    States, with vehicular homicide by intoxication after being involved in a car
    crash which killed another driver. (Reuters)
  - Former LulzSec hacker Cody Andrew Kretsinger is sentenced to a year in jail for
    a 2011 cyber-attack on Sony Pictures Entertainment. (Los Angeles Times)
  Politics and elections:
  - Giorgio Napolitano is re-elected President of Italy with 738 votes in the sixth
    ballot amid widespread protests by MPs eager to elect Stefano Rodotà. (BBC)
  - The Saudi Arabian monarch appoints Fahd bin Abdullah as the nation's new deputy
    defense minister. (AP via ABC News)
  Science and technology:
  - 'Antares A-ONE: Bad weather delays the first launch of the Antares rocket. (The
    Washington Post)'
  - A study finds that men who wear kilts and no underwear have higher sperm counts
    than men who sport underwear. (Science Recorder)
  Sport:
  - In snooker, the 2013 World Snooker Championship begins in Sheffield, England.
    Defending champion Ronnie O'Sullivan takes part after one-year break. (BBC)
  - In Formula One, Germany's Nico Rosberg wins qualifying for the 2013 Bahrain Grand
    Prix, the fourth stage of the 2013 Formula One season. (BBC)
  - In sledge hockey, Canada wins the 2013 IPC Ice Sledge Hockey World Championships
    defeating the United States 1–0 in the final. (CP via CBC News)
  - In ice hockey, Kazakhstan and Italy win the 2013 IIHF World Championship Division
    I and will be promoted to the 2014 IIHF World Championship. (IIHF)
  - 'UFC on Fox: Henderson vs. Melendez: Benson Henderson narrowly defeats Gilbert
    Melendez to retain his lightweight UFC title. (ESPN)'
  - Michigan wins the men's NCAA gymnastics title, Florida takes the women's title.
    (AP via ESPN) (Los Angeles Times)
