Date: '2013-04-29'
Source_URI: Portal:Current events/2013 April 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2012 Northern Mali conflict
  War in North-West Pakistan:
  - A suicide bomber kills at least four people in an attack on a police station in
    Peshawar, Pakistan. (AP via Fox News)
  Syrian Civil War:
  - Syrian state TV reports that the Prime Minister Wael Nader Al-Halqi escaped an
    assassination attempt in the western Damascus suburb of Mazzeh when a bomb explodes
    near his convoy. (AP via CTV News)
  - A sixth French soldier is killed in Mali when his vehicle struck a roadside bomb,
    seriously injuring two more. (BBC news)
  2012–13 Iraqi protests:
  - The government of Iraq shuts down 10 television stations including Al Jazeera,
    accusing them of encouraging the sectarian violence by Sunni muslims in the country.
    (Los Angeles Times)
  2013 ricin attacks:
  - It is revealed that Everett Dutschke was, earlier this month, charged with two
    child molestations involving three girls younger than 16. (Fox News)
  Boston Marathon bombings:
  - Prosecutors discuss a plea deal (avoidance of the death penalty in exchange for
    a likely sentence of life in prison without parole) for the surviving Boston bomber,
    Dzhokhar Tsarnaev. Police have taken DNA from Tamerlan Tsarnaev's wife and are
    exploring the brothers' connection to two deceased Russian extremists. (NBC)
  Business and economy:
  - The U.S. Supreme Court declines to hear a petition (Eaton Corp v. Z F Meritor)
    from Eaton Corp., letting stand a U.S. 3rd Circuit Court ruling on an antitrust
    issue that may limit the use of loyalty discounts in the form of rebates as a
    way of locking in customers. (Reuters)
  Disasters:
  - A powerful explosion occurs in an office building in Prague, Czech Republic, believed
    to have been caused by natural gas, injures 35 people. Both the nearby Faculty
    of Arts and Sciences building of Charles University and the National Theater also
    sustain damage. (NBC News)(AP via Vancouver Sun)
  - A Boeing 747 crashes near an American military base in Bagram, Afghanistan, killing
    all seven American crew members onboard. (AP via Belfast Telegraph UK)
  NBA news:
  - Veteran center Jason Collins becomes the first active player in one of the United
    States' Big Four sports leagues to announce he is gay. (Sports Illustrated) (The
    New York Times)
  - A league committee unanimously recommends that NBA owners reject the bid of a
    Seattle-based group led by Chris Hansen and Steve Ballmer to purchase the Sacramento
    Kings and move the team to Seattle. (ESPN)
