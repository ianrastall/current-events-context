Date: '2013-04-19'
Source_URI: Portal:Current events/2013 April 19
Intelligence_Payload:
  Boston Marathon bombings:
  - The Boston Police Department chases two carjacking suspects in the MIT shooting
    death of a campus policeman to the nearby suburb of Watertown where, after a gunfight
    that included explosives, an MBTA officer is injured, one suspect is dead, and
    the other flees but is later captured. (Boston Herald)
  - The suspects are brothers. The at-large suspect is identified as a Kyrgyzstan-born
    Cambridge resident, 19-year-old Dzhokhar Tsarnaev. The deceased brother is identified
    as 26-year-old Tamerlan Tsarnaev. A number of YouTube videos, posted by the suspects,
    surface that seek Muslim takeover of Chechnya. (AP via WTSP) (Fox News)
  - Boston and its suburbs are on lockdown as a result of the manhunt. People were
    not allowed to go out until the lockdown was lifted, and businesses were also
    closed. (Boston Herald) (NBC News)
  - Shortly after officials announce that they have lost track of the suspect and
    lifted the lockdown, a tip leads police to the back yard of a home in the Boston
    suburb of Watertown, Massachusetts, where the second suspect is captured after
    an exchange of gunfire and a brief standoff. (The Guardian)
  - Dzhokhar Tsarnaev is captured and taken in serious condition to Beth Israel Deaconess
    Medical Center. U.S. President Barack Obama gives a news conference, where he
    praises the collaboration between government law enforcement agencies. With the
    suspect's capture and presumed interrogation (if he survives), the lockdown and
    emergency state will likely be lifted. (CNN)
  Business and economy:
  - The FAA has approved a fix of the lithium-ion battery in Boeing's 787s, clearing
    the way for its resumption of service. (Bloomberg)
  International relations:
  - Serbia and its former province of Kosovo reach an accord aimed at normalizing
    relations between the Balkan neighbours, potentially setting Belgrade on the path
    to membership of the European Union. (Reuters)
  Law and crime:
  - Former Pakistani President Pervez Musharraf is arrested at his home on charges
    relating to unlawful detention of judges in 2007. He was present at the court
    when the arrest warrant was issued on Thursday, but had left before the warrant
    was served. (BBC)
  - A court in India sentences Mirza Himayat Baig to death for plotting the 2010 Pune
    bombing of a bakery which killed 17 people in Pune. (BBC)
  Politics and elections:
  - Nicolás Maduro is sworn in as the President of Venezuela despite a review of the
    results of the Venezuelan presidential election. (AP via Houston Chronicle)
  - In Italy, after failing to elect the President of Italy on the fourth ballot,
    Democratic leader Pier Luigi Bersani is to step down, pointing out traitors in
    his own party. (BBC)
  Sport:
  - Russia's Aliya Mustafina and David Belyavskiy win all-around titles at the 2013
    European Artistic Gymnastics Championships in Moscow, Russia. (R-Sport)
