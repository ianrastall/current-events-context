Date: '2013-04-21'
Source_URI: Portal:Current events/2013 April 21
Intelligence_Payload:
  Syrian civil war:
  - Locals and activists in Damascus report that the Syrian Army killed over 500 people
    in the suburb of Jdeit al-Fadel. (CNN)
  Nigerian Sharia conflict:
  - In Nigeria, a clash between the military and Islamic extremists leaves at least
    185 people dead. (AP via USA Today)
  Somali Civil War (2009–present):
  - A Somali journalist is shot and killed in an attack by unknown gunmen. (The New
    York Times)
  Arts and culture:
  - American actress Reese Witherspoon is arrested in Atlanta, Georgia, on charges
    of disorderly conduct. (Entertainment Weekly)
  - Australian rock singer Chrissy Amphlett (Divinyls – "I Touch Myself"), dies at
    the age of 53 from breast cancer and multiple sclerosis. (The Telegraph)
  Disasters and accidents:
  - A mining accident in China's Jilin Province kills at least 18 people and injures
    12 others. (Business Standard)
  - River flooding continues in six states in the midwestern United States with several
    towns north of St. Louis, Missouri, expecting the Mississippi River to reach a
    crest. (AP via The Washington Post)
  2013 Korean crisis:
  - North Korea reportedly moves two more missile launchers to its east coast in anticipation
    of an expected missile launch. (AFP via The Melbourne Age)
  Law and crime:
  - Twenty-three Brazilian police officers are sentenced to 156 years in jail each
    for their involvement in the 1992 Carandiru prison massacre. (BBC)
  - Five people are killed in a shooting incident at an apartment complex in Federal
    Way, Washington, south of Seattle, United States. (CNN)
  Politics and elections:
  - Egypt's Justice Minister Ahmed Mekki resigns in protest of perceived attacks on
    judiciary by the nation's leadership. (BBC)
  - Online auctioneer eBay asks its customers to fight against a proposed U.S. online
    sales tax. (The Street)
  - Horacio Cartes, of the Colorado Party, is elected President of Paraguay with 45.91%
    percent of the vote. (BBC)
  Science and technology:
  - American astronauts Curtis Brown, Eileen Collins, and Bonnie Dunbar are inducted
    into the Astronaut Hall of Fame. (Sacramento Bee)
  - 'Antares A-ONE: The Antares rocket makes its maiden flight, successfully carrying
    a mockup Cygnus spacecraft into orbit. (BBC)'
  - A study concludes that stress leads to faster growth in squirrels. (HNGN)
  Sport:
  - In Formula One, Sebastian Vettel wins the 2013 Bahrain Grand Prix ahead of Kimi
    Räikkönen and Romain Grosjean. (BBC) (The Guardian)
  - In road bicycle racing, Daniel Martin wins 2013 Liège–Bastogne–Liège ahead of
    Joaquim Rodríguez and Alejandro Valverde. (BBC) (Cycling News)
  - In football, Central Coast Mariners defeat Western Sydney Wanderers 2–0 to win
    the 2013 A-League Grand Final and are crowned the 2012–13 A-League champions.
    (A-League)
  - In tennis, Novak Djokovic defeats Rafael Nadal to win the singles at the 2013
    Monte-Carlo Rolex Masters. (CNN)
  - In athletics, Tsegaye Kebede wins the 2013 London Marathon men's race; Priscah
    Jeptoo wins the women's race. (BBC) (Al Jazeera)
  - In volleyball, Russia wins the 2013 Boys' Youth European Volleyball Championship
    defeating Poland 3–1 in the final in Laktaši, Bosnia and Herzegovina. (CEV)
