Date: '2013-04-26'
Source_URI: Portal:Current events/2013 April 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Six police officers are poisoned and fatally shot in Kunduz Province, Afghanistan
    while another one is missing. (Los Angeles Times)
  Business and Economy:
  - The central bank of Mexico announces that it is holding its benchmark interest
    rate at 4%, where it has been since a half-point cut announced in March, despite
    recent reports of inflating consumer prices. (Reuters)
  - Governor of the Bank of England Mervyn King announces that Winston Churchill will
    be featured on the 5 pound bank note which he says will likely begin circulation
    in 2016. (AP via ABC)
  Disasters:
  - A fire in a psychiatric hospital in the Russian town of Ramensky in Dmitrovsky
    District near Moscow kills 38 people. (AP via USA Today) (BBC)
  - At least 30 people die in southern Afghanistan after a bus crashes into the wreckage
    of a truck attacked by Taliban insurgents. (The News Pakistan)
  2013 Savar building collapse:
  - The death toll in Bangladesh rises to 401. (AP via Miami Herald)
  International relations:
  - South Korea announces that it will withdraw its remaining workers from North Korea's
    Kaesong Industrial Region to protect their safety after the North Korean government
    rejects talks. (Deutsche Welle)
  - The White House reports that the United States may have to use military action
    against Syria. (FOX News)
  Law and crime:
  - Boston Marathon bombings suspect Dzhokhar Tsarnaev is transferred from Beth Israel
    Deaconess Medical Center to the federal prison facility in Fort Devens in the
    U.S. state of Massachusetts. (Reuters)
  - Eleven members of a Birmingham, United Kingdom, terror cell are jailed for planning
    an attack to rival the 7 July and 9/11 atrocities. (BBC)
  - Russian police and security agents detain 140 people at a mosque in Moscow on
    suspicion of involvement with Islamic extremism. (ABC News)
  Arts and culture:
  - American country music singer George Jones dies at the age of 81. (The New York
    Times)
  Politics and elections:
  - Mining billionaire Clive Palmer announces that he is reviving the United Australia
    Party and standing candidates at the 2013 Australian election. (ABC News Australia)
