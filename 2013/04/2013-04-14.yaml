Date: '2013-04-14'
Source_URI: Portal:Current events/2013 April 14
Intelligence_Payload:
  Somali Civil War (2009–present):
  - At least 20 people are killed in a series of bombings and gun attacks in Mogadishu,
    Somalia. (BBC) (Los Angeles Times) (AP via Fox News)
  War in North-West Pakistan:
  - A drone attack conducted by the United States kills at least five people in Datta
    Khel, North Waziristan, Pakistan. (NBC News) (AP via CBS News) (CNN)
  Disasters and accidents:
  - At least 33 people die when a bus tumbles into a river near Trujillo, Peru. (CNN)
    (Al Jazeera) (The Nation)
  - Five people are killed, including the driver, and five are injured when a tourist
    bus carrying Russian and Ukrainian teenagers plummets off a bridge and rolls down
    an embankment near Ranst outside of Antwerp, Belgium. (The Telegraph) (Reuters)
    (Euronews)
  - At least 11 people are killed and 50 people are injured after a fire destroys
    a hotel in Xiangyang, Hubei, China. (AP via The Times of India) (Al Jazeera)
  2013 Korean crisis:
  - North Korea rebuffs an offer of dialogue by South Korea. (AFP via Channel NewsAsia)
    (Sahara Samay)
  - Professor Craig Calhoun, Director of the London School of Economics, calls on
    the BBC to pull a scheduled edition of its Panorama documentary strand, North
    Korea Undercover in which three journalists travelled undercover to the country
    with a group of students. Calhoun argues that the group was placed at risk by
    the BBC's actions. (The Guardian)
  Politics and elections:
  - Voters in Venezuela go to the polls for a snap presidential election, which was
    called after the death of President Hugo Chávez on March 5. (BBC)
  - In Croatia, people go to the polls to elect the first ever European MPs of the
    country, anticipating the formal entry of Croatia in the European Union, in July.
    (BBC)
  - Justin Trudeau, son of former Canadian Prime Minister Pierre Trudeau, is chosen
    as the new leader of the Liberal Party of Canada. (CBC News)
  Sport:
  - Manchester City will meet Wigan Athletic in the 2012–13 FA Cup Final after winning
    the semi-final against Chelsea 2–1 at Wembley Stadium. (BBC)
  - In the 2012–13 Serie A, Milan and Napoli play out an entertaining 1–1 draw at
    San Siro in a battle for an automatic Champions League spot. (Goal.com)
  - In the 2013 Formula One season, Fernando Alonso of Scuderia Ferrari wins the 2013
    Chinese Grand Prix ahead of Kimi Räikkönen and Lewis Hamilton. (BBC)
  - France's Sébastien Ogier at the wheel of his Volkswagen Polo R WRC wins the 2013
    Rally de Portugal, the fourth stage of the 2013 WRC season. (WRC) (Autosport)
  - In road bicycle racing, Czech racer Roman Kreuziger wins 2013 Amstel Gold Race,
    the 11th race of the 2013 UCI World Tour. (Cycling News)
  - In weightlifting, Russia wins the medal table of the 2013 European Weightlifting
    Championships that ended in Tirana, Albania. (EWF)
  - In golf, Adam Scott becomes the first Australian to win the Masters Tournament
    by defeating Ángel Cabrera in a sudden-death final. (AP via The Atlanta Journal-Constitution)
  - In figure skating, the United States win the 2013 ISU World Team Trophy in Figure
    Skating in Tokyo ahead of Canada and Japan. (AP via TSN)
