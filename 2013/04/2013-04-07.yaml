Date: '2013-04-07'
Source_URI: Portal:Current events/2013 April 7
Intelligence_Payload:
  Syrian civil war:
  - An air strike on Aleppo by the Syrian Air Force kills 15 people, including nine
    children. (Euronews) (Al Arabiya)
  - Syrian Armed Forces fire OTR-21 Tochka missiles at Baraza region of Damascus.
    (Al Arabiya)
  War in Afghanistan (2001–2021):
  - An airstrike conducted by NATO kills at least 12 people in the Afghan province
    of Kunar. (BBC)
  Conflict in the Niger Delta:
  - 12 Nigerian policemen are missing and presumed dead after their boat was ambushed
    by militants in the Niger Delta region. (BBC)
  International relations:
  - Hundreds of delegates meet in Doha, Qatar, to raise funds to rebuild the Sudanese
    region of Darfur, that has been racked by conflict. (Al Jazeera)
  - United States Secretary of State John Kerry arrives in Turkey, where he is to
    have talks addressing relations with Israel and the conflict in Syria. (BBC)
  2013 Korean crisis:
  - The United States decides to delay a long-planned intercontinental ballistic missile
    test scheduled for next week at the Vandenberg Air Force Base in California, following
    tensions with North Korea. (CNN) (Al Jazeera)
  Territorial disputes in the South China Sea:
  - China says it will open disputed Paracel Islands in the South China Sea to tourism
    before the May Day holiday, a move to which Vietnam is strongly opposed, as the
    United States expresses concern. (AFP via Channel NewsAsia) (Wired UK)
  - Taiwan plans to expand a pier on one of the disputed Spratly Islands, parts of
    which are also claimed by Vietnam, Brunei, China, Malaysia and the Philippines,
    as the other claimants strengthen military deployment in the South China Sea.
    (AFP via Channel News Asia)
  Law and crime:
  - Egyptian Christians and Muslims clash after a funeral for a Christian who was
    killed in earlier clashes. (The Daily Star)
  - Eric Ding Si Yang, a Singaporean businessman, is charged with corruption for offering
    free sex to three Lebanese football referees to induce them to fix a match in
    the AFC Cup. (AFP via Channel NewsAsia)
  - Rehtaeh Parsons, a 17-year-old Canadian gang-rape victim from Halifax, Nova Scotia,
    is taken off of life support and dies three days after a suicide attempt. Parson's
    claimed to have been raped when she was 15, she had been bullied ever since the
    alleged incident; officials with the Royal Canadian Mounted Police and the justice
    system are deciding whether to file charges. (CNN)
  Politics and elections:
  - Voters in Montenegro go to the polls for a presidential election with both candidates
    declaring themselves winner. (Al Jazeera) (Xinhua)
  Sport:
  - In road bicycle racing, Fabian Cancellara wins 2013 Paris–Roubaix ahead of Sep
    Vanmarcke and Niki Terpstra. (VeloNews) (VeloNation)
  - In motorcycle racing, Spain's Jorge Lorenzo wins 2013 Qatar Grand Prix, the first
    stage of the 2013 MotoGP season. (AP via ESPN) (CNN)
  - In curling, Sweden wins the 2013 World Men's Curling Championship defeating Canada
    8–6 in the final. (CBS) (Curling.ca)
  - In tennis, Canada, Serbia, Argentina and Czech Republic reach 2013 Davis Cup semifinals.
    (AFP via NDTV) (Tennis Connected)
  In college basketball:
  - The University of Louisville and University of Connecticut advance to the championship
    game of the 2013 NCAA Women's Division I Basketball Tournament. (AP via ESPN)
    (ESPN)
  - Drury University defeats Metropolitan State University of Denver 73–72 to win
    the 2013 NCAA Men's Division II Basketball Championship. (AP via ESPN)
  - Amherst College defeats the University of Mary Hardin–Baylor 87–80 to win the
    2013 NCAA Men's Division III Basketball Championship. (CBS) (The Atlanta Journal-Constitution)
