Date: '2013-04-24'
Source_URI: Portal:Current events/2013 April 24
Intelligence_Payload:
  Disasters:
  - A 5.7 magnitude earthquake strikes 25 kilometers from Jalalabad, Afghanistan,
    leaving 33 people dead and another 115 injured. Heavy damage of buildings are
    reported across Nangarhar Province. (Voice of America)
  2013 Savar building collapse:
  - An eight-story commercial building collapses in Savar Upazila near the Bangladeshi
    capital Dhaka, resulting in at least 256 people dead, one thousand injured and
    scores more trapped. (AP via ABC News), (Reuters via Sydney Morning Herald), (Daily
    Mail)
  Syrian Civil War:
  - The 11th-century minaret of the Umayyad Great Mosque at the World Heritage Site
    of Aleppo is destroyed. Both warring parties blame each other. (BBC), (AP via
    The Guardian)
  Law and crime:
  - A shooting occurs in Manchester, Illinois, United States, leaving 5 dead and another
    injured. The suspect is then killed in a gunfight with police. (Fox News)
  - The U.S. government wins an early round in its litigation against The Bank of
    New York Mellon over the latter's allegedly fraudulent practices in the trading
    of currencies. (Reuters)
  Boston Marathon bombings:
  - The FBI and the CIA admit that Russian intelligence had warned the U.S. intelligence
    agencies several times regarding the extremist connections of Tamerlan Tsarnaev
    prior to the Boston marathon bombings. (GLOBO News)
  Politics and elections:
  - Malaysian police claim that there have been hundreds of cases of election-related
    violence since campaigning for the Malaysian general election went underway last
    weekend. (My Sinchew)
  - Italian President Giorgio Napolitano gives vice-secretary of the Democratic Party
    Enrico Letta the mandate to form a new government. (The Guardian), (France 24)
  Sport:
  - Liverpool striker Luis Suárez is banned for 10 games by the FA for biting Chelsea's
    Branislav Ivanović. (BBC Sport)
  - Borussia Dortmund striker Robert Lewandowski scores 4 goals against Real Madrid
    in the first leg of the UEFA Champions League semi-final ending 4-1 to Borussia
    Dortmund (UEFA)
