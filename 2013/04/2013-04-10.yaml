Date: '2013-04-10'
Source_URI: Portal:Current events/2013 April 10
Intelligence_Payload:
  Business and economy:
  - Worldwide sales of personal computers fall 14% during the first quarter of 2013,
    the largest drop on record since tracking began in 1994. (eWeek) (The New York
    Times)
  - Costa Cruises is fined US$1.3 million in lieu of criminal charges relating to
    the Costa Concordia cruise ship disaster last year. (Los Angeles Times)
  International relations:
  - An Arabian camel gifted to President of France François Hollande for liberating
    Mali is killed and stewed by a family in Timbuktu, in whose care Hollande had
    left it. (The Telegraph)
  - The United States, Canada, and Jordan boycott a meeting of the UN General Assembly
    organized by a former Serbian foreign minister, Vuk Jeremić. (AP via Huffington
    Post)
  2013 Korean crisis:
  - North Korea shuts down tourism from China as nuclear tensions mount, but business
    travel is allowed to continue. (AFP via Brisbane Times)
  - South Korea and the United States raise their military watch alert to "vital threat"
    (level 2) ahead of an expected North Korean missile launch. (AFP via Channel News
    Asia)
  - South Korea announces that North Korea was behind the wave of cyber attacks against
    several companies last month. (Yonhap)
  Senkaku Islands dispute:
  - Japan and Taiwan sign an agreement over fishing rights around the Senkaku Islands.
    China voices "extreme concerns" over the deal. (BBC) (NHK World)
  Law and crime:
  - Liu Zhijun, the leader of the construction of the Chinese bullet train system
    and Minister of Railways, is arrested on corruption charges for allegedly taking
    bribes and abusing his power as Minister of Railways. (BBC) (Los Angeles Times)
    (Bloomberg Businessweek)
  - A man who took four firefighters hostage in Suwanee, Georgia, United States, is
    killed in a gun battle with police. (NBC News)
  - In Pakistan, a gunman kills one police officer and injures another who were guarding
    health workers fighting polio. (The New York Times)
  - The Chamber of Deputies (Congress) of Uruguay votes to legalize same-sex marriage.
    (BBC)
  Politics and elections:
  - A May 5 date is set for the 2013 Malaysian general election. (AAP via The Australian)
  - The Parliament of the United Kingdom gather for a special session to debate the
    legacy of former Prime Minister Margaret Thatcher. (AFP via Channel NewsAsia)
  - Sally Jewell is confirmed as the new United States Secretary of the Interior.
    (AP via The New York Times)
  Science and technology:
  - Robert G. Edwards, Nobel Prize in Physiology or Medicine winner for in vitro fertilisation,
    dies at the age of 87. (Reuters)
  Sport:
  - Spain's Barcelona and Germany's Bayern Munich reach 2012–13 UEFA Champions League
    semi-finals defeating Paris Saint-Germain and Juventus respectively. (UEFA)
  - In tennis, the draw for the 2013 Davis Cup World Group Play-offs is held. Great
    Britain will face Croatia away after a heroic victory over Russia. (The Guardian)
