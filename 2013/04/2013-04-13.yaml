Date: '2013-04-13'
Source_URI: Portal:Current events/2013 April 13
Intelligence_Payload:
  War in North-West Pakistan:
  - A bomb explodes on a bus in the Pakistani city of Peshawar, killing at least eight
    people. (BBC) (AP via USA Today)
  Syrian civil war:
  - Twenty civilians are killed in Saraqib, Idlib, after a government warplane bombs
    the city. (AP via CBC News)
  - The Times reports that evidence smuggled out of Syria indicates the use of chemical
    weapons in the ongoing conflict. (Euronews) (The Times of Israel) (Haaretz)
  Disasters and accidents:
  - An earthquake estimated at a magnitude of 6.0 hits Kobe, Japan, injuring at least
    22 people. (AP via The Hindu) (CBC News)
  - Lion Air Flight 904 lands short of the runway at Ngurah Rai International Airport
    near Denpasar, Indonesia. All 108 people survived with minor injuries. (The Daily
    Telegraph) (Xinhua)
  - The main airport in Tegucigalpa, Honduras, is shutdown due to smoke from a forest
    fire. (AP via Google News)
  Health and environment:
  - A seven-year-old girl is confirmed as the first person in Beijing, China, to catch
    the Influenza A virus subtype H7N9 bird flu. (AFP via The Times of India) (AP
    via The Vancouver Sun)
  International relations:
  - The Iranian Army announces the successful completion of three rocket tests. (The
    Jerusalem Post)
  - China and the United States agree to collaborate on resolving cybersecurity issues
    between the two countries. (AFP via Google News)
  - Russia bans 18 American diplomats from entering the country, in retaliation for
    similar restrictions placed on 18 Russian officials by the Magnitsky Act. (The
    News International)
  2013 Korean crisis:
  - South Korean police stop a planned launch of anti-North Korean leaflets across
    the border, as the government of South Korea seeks to open dialogue with the North
    and defuse soaring tensions in the Korean Peninsula. (AFP via Channel NewsAsia)
  - The United States and People's Republic of China agree to work towards ridding
    the Korean Peninsula of nuclear weapons. (AP via The Globe and Mail)
  - The Philippines offers the use of its military bases to the United States. (AFP
    via The Express Tribune)
  Law and crime:
  - Former Egyptian President Hosni Mubarak's retrial on charges of corruption and
    conspiracy to kill protesters during the 2011 Egyptian revolution is transferred
    to another court. (The Guardian) (Al Jazeera)
  - A man suspected of a shooting at the New River Community College in Christiansburg,
    Virginia, United States, is charged with multiple counts of malicious wounding
    and use of a firearm during the commission of a felony, and held without bail.
    (CNN) (AP via Yahoo! News)
  Politics and elections:
  - In Ireland, thousands of people attend an anti-austerity rally at Dublin Castle,
    where EU finance ministers are meeting. Opposition TDs Richard Boyd Barrett, Joan
    Collins and Joe Higgins address the demonstration. (The Irish Times)
  - In Chile, 100,000 students take to the streets to demand educational reforms.
    (BBC)
  - Salam Fayyad resigns as Prime Minister of the Palestinian National Authority following
    an ongoing dispute with the President Mahmoud Abbas. (BBC)
  - The National Transitional Council of the Central African Republic elects Michel
    Djotodia as the President confirming a position he has held since a coup last
    month. (Press TV)
  Religion:
  - Pope Francis appoints a panel of nine high-ranking prelates from around the world
    to advise him of the running of the Catholic Church and advise him on the reform
    of the Vatican bureaucracy. (AP via USA Today)
  Sport:
  - In golf, Tiger Woods receives a two-stroke penalty for a bad drop at the 2013
    Masters Tournament in Augusta, Georgia, United States. (AP via The Calgary Herald)
  - In basketball, Kobe Bryant's 2012–13 NBA season ends with an Achilles tendon tear.
    (The New York Times)
  - Russian basketball club PBC Lokomotiv Kuban wins 2012–13 Eurocup Basketball defeating
    Spain's Bilbao Basket 75–64 in the final in Charleroi, Belgium. (Eurocup)
