Date: '2013-04-22'
Source_URI: Portal:Current events/2013 April 22
Intelligence_Payload:
  2013 Belgorod shooting:
  - A man goes on a shooting rampage outside a firearm shop in Belgorod, Russia, killing
    six. (BBC)
  2013 Via Rail Canada terrorism plot:
  - The Royal Canadian Mounted Police arrest and charge two men with plotting to disrupt
    a Toronto area train service in a plot claimed to be backed by al-Qaeda elements.
    (Reuters)
  War in Afghanistan (2001–2021):
  - 11 people are kidnapped in Afghanistan after the helicopter they were in was forced
    to land. The Taliban takes responsibility for the abductions. (Los Angeles Times)
  Nigerian Sharia conflict:
  - The Nigerian Red Cross claims that 185 people have been killed in Borno State
    in the north of country over the past few days as a result of fighting between
    militants and government state forces. The local military claim the numbers are
    inflated. (Voice of America)
  Arts and culture:
  - Comedy Central decides to not renew Futurama, meaning that the show may end on
    September 4, 2013. (Inside TV)
  Business and economy:
  - News Corporation agrees to pay $139 million to American shareholders due to the
    phone hacking scandal. (The New York Times)
  International relations:
  - The European Union lifts an oil trade embargo it imposed on Syria during the early
    stages of the civil war to help the finances of the opposition. (AP via Fox News)
  - The European Union lifts all sanctions and trade embargoes on Myanmar excluding
    arms trade and other trade of equipment that could be used for internal repression,
    citing the improvement of political freedoms. (AP via Fox News)
  Law and crime:
  - Clothing retailer Ralph Lauren agrees to pay $1.6 million for claims of bribery
    to public officials in Argentina from 2005 to 2009. (Bloomberg)
  - In Germany, a Hamburg court fines Google €145,000 for violating privacy laws with
    its Street View service. (RT)
  - UK police announce that they are calling off the search for missing girl April
    Jones. (Sky News)
  - The U.S. International Trade Commission sides with Apple against a claim by Google
    that Apple's popular iPhones violate a Google patent. (Reuters)
  Sport:
  - In tennis, Russia and Italy advance to the final of the 2013 Fed Cup World Group
    defeating Slovakia and Czech Republic respectively. (Fed Cup)
  2012–13 Premier League:
  - Manchester United secure the 2012–13 Premier League title thanks to a Robin van
    Persie hat trick against Aston Villa at Old Trafford, which moves them 16 points
    clear of rivals and reigning champions Manchester City who have only a maximum
    of 15 points left to play for. This is Sir Alex Ferguson's 13th title of his 27-year
    tenure as United's manager. (Goal.com)
  - Liverpool fines star striker Luis Suárez after he bit into the arm of Chelsea
    defender Branislav Ivanović during Sunday's live televised 2–2 draw at Anfield.
    (The Guardian)
  - Downing Street takes the unusual step of responding to a bizarre incident during
    a football game, calling on The Football Association to make an example of Luis
    Suárez. (The Guardian)
