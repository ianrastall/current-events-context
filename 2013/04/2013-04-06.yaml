Date: '2013-04-06'
Source_URI: Portal:Current events/2013 April 6
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - At least 22 people are killed and more than 60 others injured when a suicide bomber
    blows himself up in a busy election campaign tent in the Iraqi city of Baquba.
    (Reuters)
  Nigerian Sharia conflict:
  - 11 people are killed in a gun and machete attack in a village of Midlu in Northern
    Nigeria. (ABC News)
  War in Afghanistan (2001–2021):
  - A bombing in Qalat, capital of the southern Zabul Province, kills three U.S. soldiers
    and two U.S. civilians, along with an Afghan doctor. An American civilian dies
    in another attack in the east of the country. (BBC) (Al Jazeera)
  Northern Mali conflict:
  - Tuareg separatists in Northern Mali mark the one year anniversary since the founding
    of the unilaterally declared Azawad. (AP via The Washington Post)
  - One soldier is killed when the National Guard attacked a camp occupied by police
    who supported the 2012 Malian coup d'état that ousted the Malian president. (AP
    via Fox News)
  Disasters and accidents:
  - Tokyo Electric Power Company says that it is moving tons of highly radioactive
    water from a temporary storage tank to another after detecting signs of leakage
    at the Fukushima Daiichi Nuclear Power Plant in Futaba District of Fukushima Prefecture,
    Japan. (AP via USA Today)
  - '2013 Thane building collapse: Rescuers in India end the search for survivors
    of a building collapse which killed 74 people in the city of Thane on April 4.
    (BBC)'
  Health and environment:
  - '2013 meat adulteration scandal: The Swedish furniture giant Ikea withdraws moose
    meat lasagne, sold in its worldwide stores. Unlabelled pork is found after increased
    scrutiny from the scandal. (BBC)'
  Law and crime:
  - Five people are killed in clashes between Muslims and Christians on the outskirts
    of Cairo, Egypt. (AP via Fox News)
  - A 24-year-old British tourist is found dead in a houseboat in Jammu and Kashmir,
    India. (CNN)
  Politics and elections:
  - Former South African president Nelson Mandela is discharged after spending nine
    days in hospital. (SAPA via News24)
  - In Bangladesh, thousands of protesters call for blasphemy laws that would include
    death penalty for bloggers who insult Islam, the majority religion of the country.
    (Al Jazeera)
  - In Lebanon, President Michel Suleiman asks Tammam Salam, a legislator and a former
    minister of culture, to head a new cabinet after a vast majority of the members
    of Parliament chose him for the job. (The New York Times)
  Religion:
  - Pope Francis appoints Spain's José Rodríguez Carballo, O.F.M., as Secretary to
    the Congregation for Institutes of Consecrated Life and Societies of Apostolic
    Life, which oversees all Catholic religious orders, his first nomination to the
    Vatican bureaucracy. (AFP via Channel NewsAsia)
  Sport:
  - In the 2012–13 Fußball-Bundesliga, Bayern Munich wins their 23rd Bundesliga title
    with a record six games to spare. (UEFA) (Goal.com) (BBC)
  - In road bicycle racing, Colombia's Nairo Quintana wins the 2013 Tour of the Basque
    Country. (Cycling News)
  - In horse racing, Auroras Encore springs a 66/1 surprise to win the 2013 Grand
    National by nine lengths at Aintree Racecourse in Liverpool, United Kingdom. (BBC)
  - In college basketball, the University of Louisville and University of Michigan
    advance to the championship game of the 2013 NCAA Men's Division I Basketball
    Tournament. (ESPN) (AP via ESPN)
  - In synchronized skating, Team Unique of Finland wins the 2013 World Championships,
    with NEXXICE of Canada placing second and Haydenettes of the United States third.
    (U.S. Figure Skating)
