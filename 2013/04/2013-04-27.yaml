Date: '2013-04-27'
Source_URI: Portal:Current events/2013 April 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb explodes outside a police station in the eastern Libyan city of Benghazi
    causing extensive damage to the building but no injuries. (Reuters)
  - The death toll of the recent spate of anti-government violence in Iraq surpasses
    190 as protests against the leadership of Nouri al-Maliki continue. (al Jazeera)
  Syrian Civil War:
  - The Free Syrian Army accuses the government of Iraq of conducting an airstrike
    against its forces in Deir ez-Zor, a town in eastern Syria. (The New York Times)
  Al-Qaeda insurgency in Yemen:
  - Five Yemeni soldiers and two Al-Qaeda militants are killed in fighting in the
    central town of Rada. A senior intelligence officer is also gunned down by a drive-by
    shooting in the south. (Fox News) (ABC News)
  War in Afghanistan (2001–2021):
  - The Taliban announces the start of their spring offensive, signaling plans to
    step up attacks as the weather warms across Afghanistan, making both travel and
    fighting easier. (AP via News24)
  - A plane crashes in Southern Afghanistan killing four military personnel. (BBC)
  War in North-West Pakistan:
  - A bomb attack by the Tehrik-i-Taliban Pakistan on an Awami National Party office
    in Karachi kills at least ten people and injures 25. (International Business Times)
  2013 ricin attacks:
  - After release of a previous suspect without charge, an adversary of his, Everett
    Dutschke of Mississippi, has been arrested for mailing letters containing ricin
    to the President of the United States, a senator, and a federal judge. (BBC)
  International relations:
  - North Korea announces that it will place American Pae Jun-Ho on trial for unspecified
    "crimes aimed to topple the Democratic People's Republic of Korea". (al Jazeera)
  Law and crime:
  - United States Supreme Court Justice Stephen G. Breyer is taken to hospital by
    ambulance after he breaks his shoulder in a fall from his bicycle. (The Washington
    Post)
  Politics and elections:
  - Voters in Iceland go to the polls for a parliamentary election with a centre-right
    coalition expected to regain office. (BBC)
  - A deal on the formation of a new government has been reached in Italy, two months
    after the 2013 Italian parliamentary election was held. (BBC)
