Date: '2013-04-28'
Source_URI: Portal:Current events/2013 April 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Men in technicals, pickup trucks with anti-aircraft guns, block off and surround
    the Libyan foreign ministry in the capital Tripoli demanding a ban on Gaddafi-era
    officials working in the government (BBC) (Al Jazeera)
  Syrian civil war:
  - Syrian rebels capture three military airbases in the north. (The Washington Post)
  War in North-West Pakistan:
  - At least eight people are dead and dozens injured as a result of Tehrik-i-Taliban
    Pakistan attacks on election candidates in Kohat and Peshawar. (The New York Times)
  Disasters:
  - At least three people die and fourteen are injured when an apartment building
    in the French city of Reims collapses after a suspected gas explosion, leaving
    people trapped under debris. (AFP via News24)
  - Four people are killed when a small bridge collapses near Thailand's ancient capital
    of Ayutthaya. (ABC News)
  Law and crime:
  - A man stabs and wounds four people at a church in Albuquerque, New Mexico, United
    States. (CNN)
  - In Italy, a man shoots and wounds two policemen outside Palazzo Chigi, during
    the swearing ceremony of the new Prime Minister Enrico Letta. (BBC)
  - In Valley Springs, California (a rural town of about 2,500 people) authorities
    are searching for an intruder who fatally stabbed an 8-year-old girl, Leila Fowler,
    at her home. After her 12-year-old brother discovered him, the intruder fled.
    (NBC News)
