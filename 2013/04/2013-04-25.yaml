Date: '2013-04-25'
Source_URI: Portal:Current events/2013 April 25
Intelligence_Payload:
  Armed conflict and attacks:
  - The Israeli Air Force shoots down a Hezbollah drone from Lebanon off the coast
    of Haifa. (Jerusalem Post)
  - A gunman kills three people with a Kalashnikov rifle in a shooting attack in Istres,
    France. (The Local)
  Boston Marathon bombings:
  - Michael Bloomberg, the Mayor of New York City, claims that the US Federal Bureau
    of Investigation briefed him that suspect Dzhokhar Tsarnaev said that the bombers
    intended to attack New York City next. (CBC)
  Business and economy:
  - French unemployment reaches a record level of 3.22 million. (Reuters)
  International relations:
  - The United Kingdom reopens its embassy in Somalia 22 years after it closed as
    a result of the chaos after the fall of Mohamed Siad Barre's government and subsequent
    Somali Civil War. (Voice of America)
  Northern Mali conflict (2012–present):
  - The United Nations Security Council votes to send a peacekeeping force to Mali
    to replace French and African forces battling Islamist guerrillas. (AAP via News
    Limited)
  Syrian Civil War:
  - The United States Secretary of Defence Chuck Hagel claims that US intelligence
    has concluded "with some degree of varying confidence" that the Government of
    Syria has used sarin gas during the past two years in the civil war. The Israeli
    and British governments made similar statements. (CBS News)
  Law and crime:
  - Mexican photojournalist Daniel Alejandro Martínez Bazaldúa is found dead in Saltillo,
    Coahuila, an area where Los Zetas drug cartel operates. With his death, Mexico
    consolidates itself as one of the most dangerous countries for journalists, where
    more than 80 have been killed since 2000. (The Huffington Post)
  - After being missing for over a week, the body of Sunil Tripathi is found in the
    Providence River. (Boston)
  Politics and elections:
  - The George W. Bush Presidential Center in Dallas, Texas, is dedicated in the presence
    of President of the United States Barack Obama, former president George W. Bush
    and all living former presidents. The complex will be opened to the public on
    May 1. (CBS News)
  Sport:
  - In American football, the 2013 NFL Draft begins with Kansas City Chiefs selecting
    Eric Fisher in New York City's Radio City Music Hall. (The Guardian)
  - In horse racing, the British Horseracing Authority bans Godolphin Racing trainer
    Mahmood Al Zarooni for eight years after 11 racehorses in his care test positive
    for anabolic steroids. (AP via Washington Post)
