Date: '2013-09-06'
Source_URI: Portal:Current events/2013 September 6
Intelligence_Payload:
  Syrian civil war:
  - UN chief Ban Ki-moon says military action against Syria could worsen sectarian
    violence in the country. (Al Jazeera)
  - Russia sends four more warships to Syria, one with alleged "special cargo," (The
    Washington Post) (Ynetnews)
  Nigerian Sharia conflict:
  - Suspected Islamist militants armed with guns and machetes kill at least 20 people
    in villages in northeast Nigeria. (Reuters)
  Environment:
  - The elusive Australian Central Rock Rat, not seen since 1960, is rediscovered
    in Central Australia. (9 News National)
  Health:
  - South Korea bans all fishery imports from eight Japanese prefectures, amid concern
    over leaks of radioactive water from the crippled Fukushima nuclear plant. (BBC)
  Law and crime:
  - Zimbabwean police arrest six men accused of killing 41 elephants with cyanide
    in the Hwange National Park. (ABC News)
  - Aaron Hernandez was arraigned and pled not guilty to first-degree murder. He was
    held without bail, but reserved the right to request bail later.
  Politics:
  - Egypt's army-backed authorities decide to annul the Muslim Brotherhood's non-governmental
    organization status. (Reuters)
