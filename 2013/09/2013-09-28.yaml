Date: '2013-09-28'
Source_URI: Portal:Current events/2013 September 28
Intelligence_Payload:
  Sudanese protests (2011–present):
  - Sudanese security forces fire live ammunition on a march that followed the funeral
    of a demonstrator killed the day before. (The Washington Post)
  Islamist insurgency in Nigeria:
  - Gunmen from the Islamist group Boko Haram kill 27 villagers in two attacks in
    Nigeria's restive northeast. (Reuters)
  Syrian civil war:
  - Syrian rebels claim taking control of a military post on the edge of the city
    of Deraa on Syria's southern border with Jordan after four days of heavy fighting
    with the Syrian Armed Forces. (Reuters)
  Arts and culture:
  - Megan Young from the Philippines is crowned Miss World 2013 at Bali Nusa Dua International
    Convention Center, South Kuta, Bali, Indonesia. (BBC)
  Disasters and accidents:
  - A 6.8-magnitude earthquake strikes the Pakistani province of Balochistan, four
    days after a 7.7-magnitude earthquake killed at least 515 people in the same region.
    (AP via Fox News)
  Law and crime:
  - Nikolaos Michaloliakos, the leader of the Greek far-right party Golden Dawn, is
    arrested on charges of forming a criminal organization. (BBC)
  - 'U.S. Navy Vice Admiral Tim Giardina is suspended from his duties as #2 of the
    U.S. Strategic Command due to an investigation into gambling-related issues. (NBC)'
  Politics and elections:
  - Voters in Guinea go to the polls for a legislative election. (BBC)
  - All the ministers from Silvio Berlusconi's People of Freedom party resign from
    the Government of Italy. (Reuters)
  Sports:
  - In Australian rules football, Hawthorn defeats Fremantle 77-62 to win the 2013
    premiership. (AFP via Yahoo! NZ)
  - In Hurling, Clare beat Cork by a score of 5-16 to 3-16, to win the 2013 All-Ireland
    Hurling Final. (RTE Sport)
