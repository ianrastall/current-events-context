Date: '2013-09-07'
Source_URI: Portal:Current events/2013 September 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - A car bomb and suicide bomber kills 15 at a restaurant in Mogadishu, Somalia.
    Al-Shabaab claims responsibility. (Reuters)
  Syrian civil war:
  - Heavy government shelling of rebel positions near the Syrian capital kills 14
    rebels and two civilians in the south of Damascus. (USA Today)
  Sinai insurgency:
  - The Egyptian army launches a major operation against Islamist militants in North
    Sinai killing at least 30 people. (Reuters) (BBC)
  Arts and culture:
  - Sacro GRA, directed by Gianfranco Rosi, wins the Golden Lion at the 70th Venice
    International Film Festival. (France 24)
  Law and crime:
  - A man is arrested on suspicion of burglary, trespass and criminal damage after
    scaling a fence to get into Buckingham Palace. (BBC)
  Politics and elections:
  - Former SNP politician Bill Walker resigns as a Member of the Scottish Parliament
    following conviction for a series of domestic abuse offences. (BBC)
  - Voters in the Maldives go to the polls for a Presidential election with no candidate
    achieving an outright majority with a runoff election to be held on September
    28. (BBC)
  Australian federal election, 2013:
  - Voters in Australia go to the polls for a federal election with the Liberal-National
    Coalition Opposition led by Opposition Leader Tony Abbott winning government.
    (Sydney Morning Herald)
  - Conceding defeat, outgoing Prime Minister Kevin Rudd says he will not seek re-election
    as Labor Party leader. (BBC)
  Sport:
  - During the 125th IOC Session, the IOC announces the winning bid for the 2020 Summer
    Olympics to be held in Tokyo, Japan. (National Post)
