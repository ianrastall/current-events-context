Date: '2013-09-20'
Source_URI: Portal:Current events/2013 September 20
Intelligence_Payload:
  Al-Qaeda insurgency in Yemen:
  - Separate attacks on army bases in Shabwa Governorate kill at least 38 soldiers
    and 8 militants. (CBS News)
  Syrian civil war:
  - Iranian President Hassan Rouhani says Iran is "ready to facilitate talks between
    the Syrian government and opposition". (The Guardian)
  Business and economy:
  - The video game Grand Theft Auto V becomes the fastest single entertainment product
    to reach sales of US$1 billion. (Reuters)
  - The US Obama administration and the EPA propose that new coal plants be at least
    about 40% cleaner than current coal plants. (The Guardian)
  Disasters and accidents:
  - The Philippines evacuates coastal villages, suspends ferry services and calls
    in fishing boats as category 5 Typhoon Usagi approaches. (Reuters)
  International relations:
  - Iranian President Hassan Rouhani calls for "constructive dialogue" and an end
    to "unhealthy rivalries". (CNN)
  - The Greenpeace ship Arctic Sunrise, which was protesting against Gazprom drilling
    in the Arctic area 60km north of the Russian coast, is boarded by the Russian
    military. The activists claim that oil exploitation would risk three nature reserves
    protected by Russian law. (The Guardian)
  Sport:
  - In baseball, Alex Rodriguez of the New York Yankees sets a new record in Major
    League Baseball for grand slam home runs with 24. (Major League Baseball)
