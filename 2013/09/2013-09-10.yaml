Date: '2013-09-10'
Source_URI: Portal:Current events/2013 September 10
Intelligence_Payload:
  Syrian civil war:
  - Human Rights Watch issues a report concluding that Syrian government forces were
    most likely to be responsible for chemical weapons attacks on two suburbs in Damascus
    on August 21. (Human Rights Watch)
  - France announces that it will propose a United Nations Security Council resolution
    proposing that Syria hand over its chemical weapons to international control.
    (France 24)
  - Barack Obama, the President of the United States, gives a televised address to
    the nation, saying that he has asked the United States Congress to postpone a
    vote on the use of force while he pursues a diplomatic solution. (AFP via the
    Australian)
  Iraqi insurgency (post-U.S. withdrawal):
  - Bomb attacks targeting both Shi'ite Muslims and Sunnis kill at least 16 people
    in Iraq. (Reuters)
  2013 protests in Turkey:
  - Clashes erupt across the country after the funeral of a 22-year-old student activist
    and security forces respond by teargas and water cannons. (Russia Today)
  Arts and culture:
  - Miley Cyrus breaks the record for the greatest number of views in 24 hours with
    her latest video Wrecking Ball. The video, uploaded on Monday, has 19.3 million
    views after a single day, and many people complain about this video. This has
    been her second record, and the third Vevo record video to become a frequent target
    for negative comments, the others being Stupid Hoe by Nicki Minaj and We Can't
    Stop by Miley Cyrus, the latter record set earlier this year.(E online)
  Business and economy:
  - Alcoa, Hewlett-Packard, and Bank of America will be dropped from the Dow Jones
    Industrial Average from next week to be replaced by Visa Inc., Nike, Inc and Goldman
    Sachs. (Wall Street Journal)
  Disasters and accidents:
  - Three people die after a helicopter working with the Canadian Coast Guard research
    ship CCGS Amundsen crashes in the Arctic Ocean. (CTV News)
  Law and crime:
  - All four defendants in the 2012 Delhi gang rape case are found guilty of rape
    and murder. (AFP via The News)
  - The legislature of the US state of California passes a bill banning new sales
    of semi-automatic rifles with removable magazines. (Reuters)
  - John G. Roberts, Jr., Chief Justice of the United States, appoints Judge William
    Curtis Bryson as presiding judge of the United States Foreign Intelligence Surveillance
    Court of Review. (Secrecy News)
  Politics:
  - Ali Shamkhani is appointed as Secretary of Supreme National Security Council of
    Iran by President Hassan Rouhani. Rouhani also appoints Masoumeh Ebtekar as Vice
    President of Iran (Farsnews)
  - Nigel Evans resigns as Deputy Speaker of the British House of Commons after being
    charged with eight sexual offences. (BBC)
  Science and technology:
  - Apple unveils the iPhone 5c and 5s (CNN)
  Sports:
  - Thomas Bach of Germany is elected President of the International Olympic Committee.
    (AFP via Sydney Morning Herald)
