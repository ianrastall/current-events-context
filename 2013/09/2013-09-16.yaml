Date: '2013-09-16'
Source_URI: Portal:Current events/2013 September 16
Intelligence_Payload:
  Armed conflict and attack:
  - 'Battle of Zamboanga City: The Armed Forces of the Philippines launch a helicopter
    strike against Moro National Liberation Front rebels holed up in parts of the
    city of Zamboanga. (AFP)'
  Syrian civil war:
  - The United Nations confirms the use of sarin gas in the Ghouta Attacks. (The Guardian)
  Disasters and accidents:
  - Hurricane Ingrid is due to make landfall in Mexico as the remnants of Tropical
    Storm Manuel causes heavy rain on the Pacific coast. So far, 21 people have died
    as a result of the two storms including 14 people in Guerrero state. (AP via ABC
    News America)
  - Typhoon Man-yi hits central Japan with concerns raised about a possible impact
    on the stricken Fukushima Daiichi Nuclear Power Plant. (The Australian)
  - Rain continues in the American state of Colorado as more than 1,200 people remain
    unaccounted for in the current floods. (Los Angeles Times)
  - The Singaporean container ship Sima Sapphire collides and sinks a Vietnamese fishing
    vessel about 50 nautical miles to the south of Vũng Tàu, leaving one dead. The
    Maritime Executive
  International relations:
  - The United States and Russia agree to a deal to eradicate chemical weapons in
    Syria. (AFP/Reuters via ABC News Australia)
  Law and crime:
  - A gunman opens fire at Washington, D.C.'s Naval Yard killing 12; the gunman also
    dies.(NBC) (The Washington Post) (CNN)
  - Cardinal Donald Wuerl joins "people of all faiths across our community in praying
    for the people killed and wounded in the attack at the Navy Yard in Washington,
    D.C." A shooting at the Navy Yard in southeast Washington left 13 dead and about
    a dozen more injured. (Catholic News Agency)
  - Cadbury Adams Canada Inc., Hershey Canada Inc., Nestlé Canada Inc. and Mars Canada
    Inc., as well as distributor ITWAL Limited agree to pay more than CAD$23 million
    to settle a class-action lawsuit alleging price-fixing and price maintenance in
    the Canadian market.(CTV News)
  Politics and elections:
  - Voters in Rwanda go to the polls for a parliamentary election with the Rwandan
    Patriotic Front of President Paul Kagame achieving a landslide victory. (AFP via
    Google News), (NineMSN)
  Science and technology:
  - Bombardier's CS100 successfully completes its first test flight out of Montréal-Mirabel
    International Airport. (CBC)
  Sport:
  - In association football, the coach and eight players with Southern Stars FC are
    arrested in relation to matchfixing in Australia's Victorian Premier League. (The
    Australian)
  Health and medicine:
  - Naegleria fowleri is found in tap water near New Orleans, marking the first time
    the pathogenic amoeba has been detected in U.S. public water supply. (NBC)
