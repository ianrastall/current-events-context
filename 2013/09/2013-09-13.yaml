Date: '2013-09-13'
Source_URI: Portal:Current events/2013 September 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Taliban insurgents attack the United States consulate in Herat, Afghanistan, with
    two members of the Afghan National Police reported as killed and about 20 civilians
    injured. (BBC)
  - Al-Qaeda's leader Ayman al-Zawahiri calls for attacks inside United States to
    "bleed America economically". (Reuters)
  - A bomb in a Baghdad Sunni mosque kills at least 30 people. (AP via NZ Stuff)
  Disasters and accidents:
  - Dozens of people are feared dead after a fire at a psychiatric hospital in Russia's
    Novgorod Oblast. (RT)
  - Nine people are confirmed dead following massive floods in the past 24 hours in
    Galați County, Romania. (journalgazette)
  - At least four people are dead, 80 unaccounted for and thousands have been evacuated
    following heavy floods in Boulder County in the US state of Colorado. (Fox News),
    (9 News)
  - A World War II shell explodes in the Finnish town of Kemi in Lapland, killing
    one person and causing the evacuation of hundreds of residents. (Reuters via Yahoo
    News UK)
  Law and crime:
  - Four people are found dead in a car in Crossville, Tennessee, U.S. A man is arrested
    in connection with the deaths. (AP via San Francisco Chronicle)
  - An Indian court sentences four men to death for the 2012 Delhi gang rape case.
    (CNN)
  Politics and elections:
  - Bill Shorten and Anthony Albanese will contest a month-long ballot process to
    determine who will be the Leader of the Australian Labor Party and Leader of the
    Opposition. (Canberra Times)
  - Narendra Modi is named as the Bharatiya Janata Party leader in next year's Indian
    general election. (BBC)
