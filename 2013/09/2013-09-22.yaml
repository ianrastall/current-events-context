Date: '2013-09-22'
Source_URI: Portal:Current events/2013 September 22
Intelligence_Payload:
  Armed conflict and attacks:
  - Two suicide bombers attack a church in the Pakistani city of Peshawar, killing
    at least 78 people. (BBC)
  Westgate centre shooting:
  - The death toll from the Westgate centre shooting in Nairobi, Kenya, reaches 59
    with 175 injured. (BBC)
  - Kenyan troops launch an assault on cornered Somali militants holding hostages
    inside the shopping mall to end the deadly siege. (AFP via News24)
  Arts and culture:
  - The 65th Primetime Emmy Awards are held in the US city of Los Angeles, California,
    with Breaking Bad winning the Primetime Emmy Award for Outstanding Drama Series
    and Modern Family winning the Primetime Emmy Award for Outstanding Comedy Series.
    (CBS)
  Disasters and impacts:
  - Hong Kong braces for the impact of Typhoon Usagi after two people are killed in
    the Philippines. (AP)
  Law and crime:
  - A Chinese court finds former senior politician Bo Xilai guilty of bribery, embezzlement
    and abuse of power and sentences him to life imprisonment. (BBC)
  Politics and elections:
  - Voters in Germany go to the polls for a federal election, with Chancellor Angela
    Merkel's Christian Democratic Union achieving its highest vote since 1990. (AP
    via USA Today), (AFP via The Australian)
  Sport:
  - In Gaelic football, Dublin win the Championship Final - their second in three
    years - by a single point (2-12 - 1-14), condemning opponents Mayo to yet another
    final defeat, their seventh since their last victory in 1951. (The Times) (BBC)
