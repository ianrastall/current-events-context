Date: '2013-09-23'
Source_URI: Portal:Current events/2013 September 23
Intelligence_Payload:
  Westgate shopping mall shooting:
  - Explosions and gunfire are reported from the Westgate shopping mall in Nairobi
    where Al-Shabaab gunmen are still holed up. (BBC)
  - The Kenyan Interior Minister says that three gunmen were killed and that his troops
    are in control of all five floors of the building. (Euronews)
  Syrian civil war:
  - President Bashar al-Assad said he will allow international experts to access chemical
    weapons sites. (CBS News)
  Disasters and accidents:
  - At least 25 people are dead in Hong Kong and southern China after Typhoon Usagi
    passes through with the storm having killed eight people in the Philippines. (NBC
    News), (AP)
  Law and crime:
  - In his first public statement since his resignation, former Pope Benedict XVI
    denies that he covered up child sexual abuse cases involving priests during his
    tenure. (Reuters)
  Politics and elections:
  - An Egyptian court bans all Muslim Brotherhood activities nationwide and its assets
    will be confiscated according to the court ruling. (Reuters)
  Sports:
  - Australian footballer Gary Ablett Jr. wins his second Brownlow Medal in the Australian
    Football League 5 days before the Grand Final between Hawthorn and Fremantle on
    Saturday, 28th September.
