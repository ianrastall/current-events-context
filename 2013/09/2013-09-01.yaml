Date: '2013-09-01'
Source_URI: Portal:Current events/2013 September 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Armed militants stage an unsuccessful attack on a container ship passing through
    the Suez Canal in an attempt to disrupt the flow of ships through the waterway.
    (Al Jazeera)
  Syrian civil war:
  - The Arab League discusses the ongoing crisis in Syria at a closed-door meeting
    in Cairo. (Al Jazeera)
  - Secretary of State John Kerry asserts the United States now has evidence of sarin
    gas use in Syria from hair and blood samples. (AP via News24)
  War in North-West Pakistan:
  - A roadside bomb targeting a passing Pakistani army convoy kills nine soldiers
    in North Waziristan near Pakistan's border with Afghanistan. (ABC) (Reuters)
  Disasters and accidents:
  - A 5.9-magnitude earthquake kills at least four people in southwestern China. (CNN)
  Law and crime:
  - The controversial spiritual guru Asaram Bapu is arrested on a rape charge filed
    by a teenage girl in northwest India. (AP via News24)
  Politics and elections:
  - Former President of South Africa Nelson Mandela is discharged from hospital in
    the capital Pretoria. (BBC)
