Date: '2013-09-15'
Source_URI: Portal:Current events/2013 September 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saboteurs blow up an export oil pipeline in Yemen. (Voice of Russia)
  Iraqi insurgency (post-U.S. withdrawal):
  - Bombings in Baghdad and Shia provinces kill at least 21 people. (Reuters) (Al
    Jazeera)
  Disasters and accidents:
  - At least 27 miners die in an Afghanistan coal mine collapse. (Reuters) (Al Jazeera)
  - Japan switches off its last working nuclear reactor for a scheduled inspection
    with no restart in sight. (Al Jazeera)
  - Six people die in a stampede in a bar following a police raid in the Colombian
    capital Bogota. (AP)
  - Nearly 6,000 people flee after Mount Sinabung explodes in Indonesia's North Sumatra
    province. (AP via ABC News)
  Politics:
  - Edi Rama is elected by Parliament as Prime Minister of Albania. (Reuters)
  - Voters in Bavaria go to the polls for a state election. (Reuters) (Al Jazeera)
  - New Zealand Labour Party MP David Cunliffe is elected leader of the party with
    51.5% of the total vote. (New Zealand Herald)
  Sports:
  - In Nippon Professional Baseball, Tokyo Yakult Swallows outfielder Wladimir Balentien
    hits his 56th home run of the season to break the single-season record formerly
    held by Sadaharu Oh, Tuffy Rhodes and Alex Cabrera. (AP via ESPN)
