Date: '2013-09-26'
Source_URI: Portal:Current events/2013 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorists attack a police station in India's Jammu and Kashmir state, killing
    six people, before attacking an Army camp. (Reuters)
  - Interpol issues a red notice arrest warrant for Briton Samantha Lewthwaite at
    Kenya's request. (BBC) (Irish Times)
  - Al-Shabaab militants attack two Kenyan towns near the Somali border. (USA Today)
  Business and economy:
  - Authorities in the U.S. arrest Paul Konigsberg, an accountant, charging him with
    complicity in the Ponzi scheme of former New York financier Bernard Madoff, a
    scheme that unraveled in 2008. (Reuters)
  International relations:
  - The United States and Russia agree on a draft United Nations Security Council
    resolution aiming to rid Syria of its chemical weapons. (Reuters via Yahoo! News)
  Law and crime:
  - South Korean prosecutors charge Unified Progressive Party MP Lee Seok-ki with
    plotting an armed revolt in support of North Korea. (AFP via Channel News Asia)
  - The UN-backed Special Court for Sierra Leone in The Hague rejects an appeal against
    a conviction of former President of Liberia Charles Taylor on war crime charges.
    (BBC)
