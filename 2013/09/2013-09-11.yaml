Date: '2013-09-11'
Source_URI: Portal:Current events/2013 September 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Protestors and police clash in Chile due to the 40th anniversary of the 1973 Chilean
    coup d'état. (BBC)
  - Over 10,000 people have been displaced and ten thousand arrested as a result of
    an ongoing dispute in India's Muzaffarnagar district. (Times of India)
  Syrian civil war:
  - The UN accuses both the Syrian government and, to a lesser extent, the rebels
    of war crimes. Out of 9 massacres they investigated, 8 were attributed to the
    Syrian Army. The remaining massacre was attributed to insurgents. (The New York
    Times)
  - Russia gives the alleged proof of chemical weapons use by militants in Syria to
    United Nations Security Council. (Russia Beyond the Headlines) (Interfax)
  - Fighters from an Al Qaeda-linked rebel group kill 12 members of the minority Alawite
    sect in central Syria after seizing their village, opposition activists say. (Reuters)
  - UN investigators in Syria say Syrian army forces continue to bomb hospitals and
    massacre civilians. (NBC News)
  - France drafts a resolution forcing the Syrian government to hand over its stockpiles
    of chemical weapons in 15 days (The Independent)
  Sinai insurgency:
  - Two suicide bombers ram a car with explosives. Egyptian military says one hit
    the local branch of military intelligence, while the other struck an army checkpoint
    in Rafah killing nine soldiers and wounding 17 others. (Houston Chronicle)
  Post-civil war violence in Libya:
  - On the first anniversary of the 2012 Benghazi attack, a powerful car bomb explodes
    near the Libyan Foreign Ministry building in the city. (The Independent) (Sky
    News)
  Law & crime:
  - Sweden marks the tenth anniversary of the assassination of Foreign Minister Anna
    Lindh. (The Local)
  - At least one person is killed and several Jamaica Constabulary Force officers
    injured following a melee at the police lockup in the town of Mandeville. (AP
    via ABC News)
  Politics:
  - Hundreds of thousands of Catalans link up in a human chain for the independence
    of Catalonia. (The Washington Post)
  Sports:
  - Baruto Kaito, the first Estonian sumo wrestler to win the makuuchi (top division)
    championship in history, surprisingly announces his retirement. (Eesti Rahvusringhääling)
