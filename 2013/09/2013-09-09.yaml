Date: '2013-09-09'
Source_URI: Portal:Current events/2013 September 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - A senior Russian diplomat is gunned down in Sukhumi, the capital of Georgia's
    breakaway region of Abkhazia. (RFE/RL)
  - A man calls the police that he has an AK-47 in both Santa Fe Middle School in
    Monrovia, California and the "Citrus Medical Center" in West Covina, California.
    (KTLA5)
  Aftermath of the Central African Republic conflict (2012–13):
  - At least 60 people are killed in Central African Republic during clashes between
    pro-Séléka rebels and forces loyal to ousted President François Bozizé. (BBC)
  Nigerian Sharia conflict:
  - Fighting between Boko Haram and government-backed vigilantes in Borno State leaves
    18 dead. (Reuters)
  Islamic insurgency in the Philippines:
  - Followers of Muslim separatist leader Nur Misuari launch an attack on the southern
    Philippines port of Zamboanga City, forcing the closure of businesses and schools.
    (AP via Fox News)
  Political violence in Egypt, 2013:
  - Mahmoud Badr, the founder of the Tamarod grassroots movement that helped spark
    the July 2013 Egyptian protests, reportedly survives an assassination attempt.
    (Al-Arabiya)
  Arts and culture:
  - The Van Gogh Museum in Amsterdam identifies a new Vincent Van Gogh painting, Sunset
    at Montmajour. (AP)
  - Israel's Hebrew University of Jerusalem announces the discovery of a 1,400-year-old
    golden treasure trove at the foot of the Temple Mount. (Haaretz)
  Disasters and accidents:
  - At least 44 people are dead and 45 injured after a bus crashes into a ravine in
    northern Guatemala. (AP via ABC News America)
  - Two buses collide and catch fire in Iran, killing at least 44 people. (Global
    Post)
  Politics:
  - The centre-right parties win a majority in the Norwegian parliamentary elections,
    with the Conservative Party's Erna Solberg defeating incumbent Jens Stoltenberg
    (Labour) for the position of Prime Minister. (BBC) (AAP via SBS)
  Sports:
  - In tennis, Rafael Nadal wins the Men's Singles at the 2013 US Open defeating Novak
    Djokovic 6-2, 3-6, 6-4, 6-1. (The New York Times)
  - In hurling, the Gaelic Athletic Association announces that the replay of the 2013
    All-Ireland Senior Hurling Championship Final between Clare and Cork will take
    place on 28 September. (RTÉ)
