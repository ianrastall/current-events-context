Date: '2013-09-08'
Source_URI: Portal:Current events/2013 September 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - A group of men in a car opens fire in a town on the outskirts of Guatemala City,
    Guatemala, with 11 killed and 18 others injured. (AP via San Francisco Chronicle)
  Syrian civil war:
  - The Islamist al-Nusra Front captures the historic Christian town of Ma'loula from
    the Syrian Army; Russia calls for protection of the town. (CNN) (Interfax)
  War in Afghanistan (2001–2021):
  - The Taliban kills four Afghan National Army troops in an attack on an intelligence
    office near Kabul. (AP via Fox News)
  Disasters:
  - Eleven people were killed after a collision between a minibus and a train near
    Iași, Romania. (Xinhua)
  - Six people were killed and nine injured after a collision between car and minibus
    in Jakarta, Indonesia. (The Jakarta Globe)
  Politics and elections:
  - Mohammad Bagher Ghalibaf is reelected for a third term as Mayor of Tehran. (Tabnak)
  - The President of Pakistan, Asif Ali Zardari has a farewell ceremony after the
    completion of his five year term. He will be replaced by Mamnoon Hussain. (AP)
  Russian elections:
  - Results indicate that Sergei Sobyanin will be elected as Mayor of Moscow with
    over 50 per cent of the vote. (Reuters) (BBC)
  - Voters in Russia go to the polls for regional and local government elections.
    (RIA Novosti)
  Sport:
  - In hurling, Clare (0-25) and Cork (3-16) draw in the Championship Final, marking
    the second straight time that the Final has been drawn. (RTÉ)
  - The International Olympic Committee votes to reinstate wrestling as an Olympic
    sport at the 2020 Summer Olympics in Tokyo. (ESPN)
  - In Formula One, Sebastian Vettel wins the 2013 Italian Grand Prix for Red Bull
    Racing.
  - American tennis player Serena Williams wins her fifth Women's Singles at the US
    Open over Victoria Azarenka. (ESPN)
