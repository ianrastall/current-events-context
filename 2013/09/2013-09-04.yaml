Date: '2013-09-04'
Source_URI: Portal:Current events/2013 September 4
Intelligence_Payload:
  Syrian civil war:
  - Reuters reports that the former defense minister of Syria, Ali Habib Mahmud, has
    defected to Turkey. (Reuters)
  - The Russian government releases a report that claims to show a makeshift weapon
    used in a chemical attack near the Syrian city of Aleppo in March was similar
    to ones made by rebels. (Reuters)
  - The US Senate Foreign Relations Committee approves a resolution authorizing a
    limited US military intervention in Syria, setting the stage for a debate in the
    full Senate next week on the use of military force. (Reuters)
  Law and crime:
  - Police arrest a student for allegedly stabbing another student to death and injuring
    three more at Spring High School in Spring, Texas, U.S. (CNN)
  Sport:
  - The EuroBasket 2013 tournament starts in Slovenia. (NBC Sports)
  - Al-Shorta SC win the 2012–13 Iraqi Premier League by defeating Al-Talaba SC 3-0
    on the last day of the season. (The AFC)
