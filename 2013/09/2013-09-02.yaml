Date: '2013-09-02'
Source_URI: Portal:Current events/2013 September 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mexican Drug War
  - Mexican forces arrest Alberto Carrillo Fuentes, the alleged leader of the Juárez
    Cartel. (The Telegraph)
  Arts and culture:
  - The new eastern span of the San Francisco–Oakland Bay Bridge opens to the public
    after a decade-long project to replace the old span which was damaged during the
    1989 Loma Prieta earthquake. (KTVU)
  Business and economy:
  - Verizon Communications agrees to acquire Vodafone's stake in Verizon Wireless
    for $130 billion, the third largest M&A deal ever. (Reuters)
  Sports:
  - Diana Nyad successfully completes a swim from Cuba to Florida, the first person
    to do so without a shark cage. (BBC)
  Law and crime:
  - The Hemisphere Project, through which AT&T gives data about telephone calls to
    the DEA and other law enforcement agencies, is made public. (New York Times)
