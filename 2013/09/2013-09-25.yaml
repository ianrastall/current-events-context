Date: '2013-09-25'
Source_URI: Portal:Current events/2013 September 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - A three-day national mourning period begins in Kenya for the victims of a four-day
    siege that began on September 21 when heavily armed Al-Shabaab militants stormed
    the Westgate shopping mall in the capital, Nairobi, killing 61 civilians and 6
    soldiers. (BBC)
  - A shooting at a workplace in East Garden City, New York, kills one person and
    wounds another. (CNN)
  Disasters and accidents:
  - The death toll from a 7.7-magnitude earthquake that struck Balochistan, Pakistan,
    on September 24 rises to at least 328. (BBC)
  Sports:
  - In sailing, Oracle Team USA wins the America's Cup by defeating Team New Zealand
    9-8 after a remarkable comeback. (AAP via The Australian)
