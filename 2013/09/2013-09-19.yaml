Date: '2013-09-19'
Source_URI: Portal:Current events/2013 September 19
Intelligence_Payload:
  Political violence in Egypt, 2013:
  - Egyptian security forces clash with militants in the town of Kerdasah on the outskirts
    of Cairo with one member of the security forces dead. (BBC)
  Syrian civil war:
  - Jihadis belonging to the al-Qaida offshoot known as the ISIL overrun the town
    of Azaz, after driving out the Free Syrian Army. (The Washington Post)
  International relations:
  - Japan reports that two Chinese ships have entered territorial waters off the coast
    of the disputed Senkaku Islands. (AFP via Google News)
  Gaming:
  - Major MMO Toontown Online Closes
  Law and crime:
  - Singapore police arrest 14 people in Singapore in relation to alleged match fixing
    in football matches, including alleged financier and organiser Dan Tan Seet Eng.
    (The Age)
  - Thirteen people, including a three-year-old, are shot and wounded in the Back
    of the Yards neighborhood of the American city of Chicago, Illinois. (Chicago
    Tribune) (Yahoo News) (The New York Times)
  - Imperial Petroleum is indicted in the largest instance of tax and securities fraud
    in Indiana state history. (Inside Indiana Business)
  - A Texas state appelate court overturns the November 2010 money laundering conviction
    of former United States House Majority Leader Tom DeLay. (FOXNews)
  - JPMorgan Chase is fined $920 million for illegal practices (misleading investors
    and government regulators) related to trading losses in 2012. (FOXBusiness)
