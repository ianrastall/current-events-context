Date: '2013-09-03'
Source_URI: Portal:Current events/2013 September 3
Intelligence_Payload:
  Syrian civil war:
  - France claims to possess documentation of the use of chemical weapons in the Syrian
    civil war. (Huffington Post)
  - Anticipating a retaliatory strike from Syria, Israel carries out a joint missile
    test with the United States in the Mediterranean. (BBC) (Sky News)
  - U.S. government officials say that they are willing to rewrite a proposed resolution
    to clarify that any operation would be limited in scope and duration and would
    not include the use of ground troops. (Washington Post)
  - A former US army chief claims that Barack Obama is eyeing intervention in Syria
    that would go beyond a mere deterrent against chemical weapons to damage the military
    capacity of the Assad regime. (The Telegraph)
  - UN Secretary General Ban Ki-moon questions the legality of US plans to strike
    Syria without UN backing, saying that the use of force is only legal when it is
    in self-defence or with Security Council authorization. (Reuters)
  Sinai insurgency:
  - An Egyptian army helicopter kills 15 militants in the Sinai Peninsula. (Reuters)
  Business and economy:
  - Microsoft purchases Nokia's mobile device division for $7.2 billion. (MarketWatchPulse)
  Law and crime:
  - Ariel Castro, the Cleveland, Ohio kidnapper, hangs himself in his prison cell.
    (CNN)
