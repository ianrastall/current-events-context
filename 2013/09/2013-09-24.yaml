Date: '2013-09-24'
Source_URI: Portal:Current events/2013 September 24
Intelligence_Payload:
  Business and economy:
  - Hundreds of garment factories in Bangladesh shut down due to strikes by workers
    seeking higher pay. (Bloomberg)
  Disasters and accidents:
  - A magnitude 7.7 earthquake strikes Balochistan in western Pakistan with at least
    40 people dead. (USGS) (Wall Street Journal)
  - Twenty-one provinces in Thailand are hit by flooding, affecting over 600,000 people.
    (Bangkok Post)
  Politics and elections:
  - The Parliament of Cambodia votes for Hun Sen to continue as Prime Minister despite
    an opposition boycott. (AP via ABC News America)
  - The General debate of the 68th UN General Assembly opens. (United Nations)
  Sport:
  - In road cycling, Ellen van Dijk won the women's time trial at the 2013 UCI Road
    World Championships. (Mail & Guardian)
