Date: '2013-09-12'
Source_URI: Portal:Current events/2013 September 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - American born Islamist militant Abu Mansoor Al-Amriki is shot dead in a dawn raid
    in a shootout with his former al-Shabaab colleagues in southern Somalia. (ABC
    News Australia)
  Islamic insurgency in the Philippines:
  - The Moro National Liberation Front attacks the Philippines town of Lamitan with
    five people missing and two injured. (AP)
  Arts and culture:
  - Prince William, Duke of Cambridge, leaves the Royal Air Force to devote his energies
    to Royal and community work. (The Australian)
  Business and economy:
  - The People's Republic of China sets goals for use of coal as part of a comprehensive
    plan for reducing air pollution. (Reuters via Thomson-Reuters Trust)
  Disasters and accidents:
  - A massive fire burns parts of the boardwalk in Seaside Park, New Jersey. Numerous
    decades-old buildings are destroyed. (USA Today)(ABC News}
  International relations:
  - Syria applies to join the Chemical Weapons Convention which outlaws the production
    and use of such weapons. (BBC)
  Religion:
  - The governing body of the Church in Wales votes to allow the ordination of women
    bishops. (BBC)
  Science and technology:
  - NASA announces the Voyager 1 space probe has left the Solar System becoming the
    first man-made object to reach interstellar space. (BBC)
  - The announcement, while confirmed by external research, is still met in some quarters
    by skepticism. NBC News
