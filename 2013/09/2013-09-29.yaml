Date: '2013-09-29'
Source_URI: Portal:Current events/2013 September 29
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - Gunmen from the Nigerian Islamist group Boko Haram kill 42 people, mostly students,
    in an attack on a college in the town of Gujba, Yobe State. (The Telegraph)
  Mexican Drug War:
  - Shootings erupt over the weekend in three Mexican cities (Cuernavaca, Fresnillo,
    Monterrey) where drug gangs are fighting turf battles, killing at least nine people
    and wounding six more. (ABC News)
  Syrian civil war:
  - Activists fighting Syrian government forces say that at least 16 people, most
    of them students, were killed in an air strike from Syrian government warplanes
    that hit a secondary school in the rebel-held Syrian city of Raqqa. (Reuters)
  Arts and culture:
  - Award-winning American television series Breaking Bad airs its final episode on
    AMC, concluding the series after five seasons and 62 episodes. (Associated Press
    via NPR)
  Disasters and accidents:
  - The death toll from a building that collapsed in Mumbai, India, on September 27
    rises to 60 as the rescue operation is called off. (BBC)
  - Heavy rains in Rajkot, Gujarat, India, lead to damage valued at over 100 million
    rupees. (Times of India)
  Politics and elections:
  - Voters in Austria go to the polls for a legislative election. (BBC)
