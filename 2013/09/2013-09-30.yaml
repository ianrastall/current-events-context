Date: '2013-09-30'
Source_URI: Portal:Current events/2013 September 30
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - Fourteen car bombs targeting Shi'ite neighborhoods in Baghdad leave 54 people
    dead. (Reuters)
  Business and economy:
  - Pharmaceutical giant GlaxoSmithKline agrees to sell its thrombosis drug brands
    to Aspen Pharmacare. (Reuters)
  Disasters and accidents:
  - Tropical Storm Wutip lashes central Vietnam, uprooting trees, cutting power lines
    and damaging more than 1,000 houses. (The Weather Channel)
  - Thirteen refugees drown off the Italian coast swimming to shore from their leaky
    vessel. (U.N. High Commission for Refugees)
