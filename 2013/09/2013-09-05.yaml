Date: '2013-09-05'
Source_URI: Portal:Current events/2013 September 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Bengali writer and Social Worker Sushmita Banerjee, whose book about her escape
    from Taliban-ruled Afghanistan was made into the Bollywood movie Escape from Taliban,
    is shot by suspected Taliban militants. (BBC)
  Syrian civil war:
  - According to Turkey, almost all G20 summit leaders support operations against
    Syria. (Reuters)
  - Russian opposition to military intervention in Syria gains increasing international
    support. (The Daily Telegraph)
  Political violence in Egypt (July 2013–present):
  - Egyptian interior minister Mohamed Ibrahim Moustafa survives an assassination
    attempt as his convoy traveled through the Nasr City district in Cairo. (The Guardian)
    (Wall Street Journal)
  Arts and culture:
  - Cardinal Timothy Dolan of New York says Islamic leaders should be challenged to
    speak out in condemnation of terrorists, Dolan hopes that Pope Francis will challenge
    Islamic leaders to “speak up in an effective way,” condemning violence. (Catholic
    World News)
  Business and economy:
  - 'Smartphone wars: Microsoft wins a much-watched lawsuit, with a federal judge
    finding that Motorola had breached agreements about the licensing of its patents.
    (BBC)'
  Disasters and accidents:
  - Sixty-eight people are injured as more than 130 vehicles are involved in a series
    of crashes in thick fog on the Sheppey Crossing, a major road bridge in the United
    Kingdom. (BBC)
  - A hunter is blamed for starting the Rim Fire near Yosemite National Park. (BBC)
  Deaths:
  - Rochus Misch, the last witness to Adolf Hitler’s suicide in the Führerbunker dies
    at the age of 96. (Washington Post)
  Politics and elections:
  - The new Iranian Foreign Minister Mohammad Javad Zarif says Iran doesn't deny the
    Holocaust. "The man who was perceived to be denying it is now gone. Happy New
    Year," he adds. (Time)
  US Open in tennis:
  - In the men's singles quarterfinals, defending champion Andy Murray is beaten in
    straight sets by Stanislas Wawrinka 6–4, 6–3, 6–2. (AP via ESPN)
  - In the men's doubles semifinals, Leander Paes and Radek Štěpánek defeat Bob and
    Mike Bryan 3–6, 6–3, 6–4, denying the American twins a chance at a calendar-year
    Grand Slam. (AP via ESPN)
