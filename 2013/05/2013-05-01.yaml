Date: '2013-05-01'
Source_URI: Portal:Current events/2013 May 1
Intelligence_Payload:
  South Thailand insurgency:
  - Insurgents kill six people, including a two-year-old boy, in a deadly shooting
    in Pattani, Thailand. (ABC News)
  Boston Marathon bombing:
  - Boston Police state that three more individuals are implicated and arrested. (CNN)
  - A report states that Dzhokhar has told detectives he was motivated by wanting
    to defend Islam because of the wars in Afghanistan and Iraq. (NBC)
  Insurgency in the North Caucasus:
  - A bomb detonates in a busy shopping center in Makhachkala, Dagestan, Russia, killing
    3 and injuring 2 others. (Ria Novosti)
  Iraqi insurgency (post-U.S. withdrawal):
  - Multiple bomb attacks across Iraq kill at least 15 people. (The Daily Star)
  Business and economy:
  - T-Mobile US debuts on the New York Stock Exchange with the ticker symbol TMUS.
    (Reuters)
  Disasters and accidents:
  - Flash floods leave 16 people dead and 3 others missing in Saudi Arabia, with authorities
    urging citizens to avoid low-lying wadis. At least two others were killed in neighboring
    Oman in some of the heaviest rainfall in more than 25 years. (Al Arabiya)
  - Heavy rain and a whirlwind sweeps over eights districts and towns in Lào Cai Province,
    northern Vietnam, destroying 52 houses and 2 schools, ripping roofs off of 1600
    houses, and damaging crops of local people. (Talkvietnam)
  International relations:
  - The UN Human Rights Office says that the force-feeding of hunger-strikers at the
    U.S. Guantánamo Bay Prison is a violation of international law. (AFP via France24)
  - Several British Overseas Territories, including Bermuda and the Cayman Islands,
    sign agreements to share tax information with UK and other EU members. (BBC)
  Law and crime:
  - A May Day protest in Seattle, United States, escalates into violence, causing
    injuries to eight police officers and damage to storefront property. (Seattle
    Pi) (CNN)
  - British Coronation Street star William Roache, the world's longest-serving soap
    actor, is arrested and charged with two counts of raping a 15-year-old girl in
    1967. (TVNZ),(The Guardian)
  - Seven Venezuelan legislators are injured as a fight breaks out between the Socialist
    Party and the opposition over the outcome of the last month's presidential election.
    (The Daily Beast)
  Science and technology:
  - In San Jose, California, IBM researchers release A Boy and His Atom, the smallest
    movie ever made, which was created by manipulating individual carbon monoxide
    molecules with a scanning tunneling microscope. (BBC)
  - An international group of researchers announce in Nature the creation of a digital
    camera that can mimic the compound eyes of insects. (CNN)
  - The Wyoming, United States discovery of a tiny prehistoric bird, Eocypselus rowei,
    may help explain the origins of hummingbirds. (Science World Report)
