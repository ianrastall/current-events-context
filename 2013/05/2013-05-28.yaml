Date: '2013-05-28'
Source_URI: Portal:Current events/2013 May 28
Intelligence_Payload:
  Syrian civil war:
  - United States Senator John McCain travels to Syria to meet with rebel fighters
    and discuss with them America's possible involvement in the nation's civil war.(Reuters)
  - Le Monde reports continued use of chemical weapons by the Assad regime in Syria.
    (Le Monde)
  - Russia evacuates 130 people as the situation in Syria continues to worsen. (IANS
    via OneIndia)
  War in North-West Pakistan:
  - Gunmen kill one anti-polio worker and wound three others (CTV News)
  Arts and culture:
  - Sweden's largest music festival, the Peace & Love in Borlänge, files for bankruptcy.
    (Göteborgs-Posten)
  Business and economy:
  - The U.S. Attorney's office in Los Angeles, California announces that Scott London,
    former senior partner with KPMG, has agreed to plead guilty on charges involving
    insider trading. (Reuters)
  Disasters:
  - A boat carrying 100 passengers capsizes in the Rajang River in Malaysia's Sarawak
    state with over 20 passengers missing. (AFP via NDTV), (BNO via Wire Update)
  Health:
  - France reports its first death from the Middle East respiratory syndrome coronavirus
    as Saudi Arabia advises of five new cases. (Reuters)
  International relations:
  - Australia's ABC News claims that the People's Republic of China hacked plans for
    the headquarters of the country's spy agency ASIO. (ABC News Australia)
  Law and crime:
  - The United States launches a prosecution against Liberty Reserve, based in Costa
    Rica, for money laundering worth $6 billion. (Sydney Morning Herald)
