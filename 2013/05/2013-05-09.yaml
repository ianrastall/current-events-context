Date: '2013-05-09'
Source_URI: Portal:Current events/2013 May 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Indonesian police shoot dead seven terror suspects in raids on the island of Java
    including some allegedly planning to bomb the Sri Lankan embassy. (AFP via The
    News International)
  - Suspected Sudanese ivory poachers shoot dead an unknown number of elephants at
    the Dzanga-Ndoki National Park world heritage site in the Central African Republic,
    close to the border with Cameroon and the Republic of the Congo. (BBC)
  War in North-West Pakistan:
  - Ali Haider Gillani, the son of former Pakistani Prime Minister Yousaf Raza Gillani,
    is abducted by unidentified gunmen at an election rally in the city of Multan
    two days before the May 11 general election. (BBC)
  Disasters and accidents:
  - A fuel train derails in Russia's Rostov Oblast causing a massive fire with one
    person missing, 27 injured and 3,000 evacuated. (RT)
  2013 Savar building collapse:
  - The death toll rises to 1,006 - Bangladesh's worst industrial accident and the
    deadliest structural collapse in modern human history. (Channel News Asia)
  International relations:
  - Pakistani militant Sanaullah Haq dies after being assaulted in an Indian jail
    as a revenge attack following the death of Sarabjit Singh in Pakistan last week.
    (Reuters)
  Law and crime:
  - It is revealed today that in February hackers stole $45 million from worldwide
    bank ATM's with large numbers of criminals using fradulent debt cards. (AP via
    FOX News)(The New York Times)
  Politics and elections:
  - The Australian government announces that it will hold a referendum on recognition
    of local government in the constitution simultaneously with the federal election
    on September 14. (The Australian)
  Sport:
  - Current Everton manager David Moyes is confirmed as Alex Ferguson's successor
    at Manchester United. (BBC)
  - In sailing training for the America's Cup, British, two-time Olympic medallist
    Andrew Simpson dies in San Francisco Bay as part of the Swedish team, Artemis
    Racing. (San Francisco Chronicle)
