Date: '2013-05-20'
Source_URI: Portal:Current events/2013 May 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - North Korea launches short-ranged projectiles off its coast for the third day
    in a row. (The New York Times)
  Iraqi insurgency (post-U.S. withdrawal):
  - A wave of violence continues, with attacks across the country killing 133 and
    leaving 283 others injured. Almost 400 people have been killed in the last six
    days alone, as tribal leaders warn of impending civil war. (BBC) (Antiwar.com
    via AP)
  Insurgency in the North Caucasus:
  - Twin car bombs explode in Makhachkala, capital of the Russian republic of Dagestan,
    killing 4 and injuring almost 50 others. Hours later authorities announced they
    have foiled a terror attack in Moscow.(Reuters)
  Disasters and accidents:
  - A massive mile wide tornado strikes south of the US city of Oklahoma City, causing
    widespread damage and causing the National Weather Service to issue a rare tornado
    emergency. 24 people are killed. (MSN) (NPR)(NBC News), (ABC News)
  - A 6.5 magnitude earthquake strikes off the coast of Chile. (Christian Science
    Monitor)
  - A morning peak Tranz Metro commuter train derails near central Wellington, New
    Zealand, after part of the undercarriage comes loose and punctures the carriage
    floor, injuring four people and delaying tens of thousands of commuters as services
    are cancelled. (Fairfax NZ)
  - A hot air balloon crashes in Cappadocia, Turkey, killing 2 tourists and injuring
    another 20. (BBC)
  - The BBC documentary series Panorama airs unseen footage from the 1989 Hillsborough
    disaster that casts doubt on medical evidence given at the inquest. (BBC)
  Health and environment:
  - North Korea confirms a bird flu outbreak that has forced authorities to kill over
    160,000 ducks in Pyongyang. (Yonhap News Agency)
  International relations:
  - The President of Myanmar Thein Sein visits the White House as part of his visit
    to the United States, the first by a Burmese head of state in 47 years. (Reuters)
  Law and crime:
  - Guatemala's Constitutional Court overturns a genocide conviction against former
    dictator Efraín Ríos Montt due to a dispute over jurisdiction. (The Guardian)
  - Immigrant youths riot in Stockholm suburb Husby, burning more than 100 vehicles.
    (Washington Post)
  Religion:
  - The Church of Scotland's General Assembly votes to allow openly gay men and women
    to become ministers. (BBC)
  Sport:
  - Paralympian Oscar Pistorius' agent confirms that he will not take part in any
    sports this year as he awaits his trial for murder. (BBC Sports), (Sky News)
