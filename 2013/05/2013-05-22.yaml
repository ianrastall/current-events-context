Date: '2013-05-22'
Source_URI: Portal:Current events/2013 May 22
Intelligence_Payload:
  Armed conflict and attacks:
  - Eric Holder, the Attorney-General of the United States, confirms that four US
    citizens have been killed in drone aircraft attacks since 2011 including radical
    cleric Anwar al-Awlaki killed in 2011. (CBS News)
  Disasters and accidents:
  - One fourth-grade child is fatally injured, one is missing, and two others (from
    a St. Louis Park, Minnesota elementary school) were rescued by firefighters, after
    a gravel slide at St. Paul, Minnesota's Lilydale Regional Park, near the Mississippi
    River. The rescue effort was suspended for the night, after conditions got worse.
    (NBC)
  International relations:
  - Prime Minister elect of Iceland, Sigmundur Davíð Gunnlaugsson, declares that a
    January decision to freeze European Union membership talks will be extended indefinitely.
    (Bloomberg)
  - North Korean leader Kim Jong-un dispatches a special envoy to the People's Republic
    of China amid signs of strained relations. (New York Times)
  Law and crime:
  - Documents are secured as Dutch authorities execute a tax raid on Spyker Cars'
    headquarters on behalf of the Swedish tax authorities. (Dagens industri)
  - Australian politician Craig Thomson is charged with an additional 19 charges including
    15 of fraud and 4 of theft. (ABC News)
  - In Orlando, Florida, Ibragim Todashev, a suspect under FBI questioning with ties
    to the April 2013 Boston Marathon bombings suspects, after initially being cooperative,
    goes on to attack an agent (in the course of the questioning) and is shot dead
    as a result. (NBC)
  - In London, a uniformed soldier is murdered in the street. Two men carrying knives
    and a meat cleaver are subsequently shot and apprehended by police. The UK government
    is treating it as a terrorist incident. (Metro) (BBC)
  - A decorated combat veteran of the Iraq War and United States Military Academy
    (West Point) U.S. Army staff member, Sgt. 1st Class Michael McClendon, is relieved
    of his duties for allegedly planting cameras to spy on female cadets. (NBC)
  Sport:
  - Former professional Major League Baseball slugger Jose Canseco, 48, a former Oakland
    Athletics Rookie of the Year (who also played for six other teams, from 1985 to
    2001, and admitted to steroid use) is accused of sexual assault in Las Vegas,
    Nevada. He has not yet been formally charged, and claimed on social media that
    the woman's accusations were false. (FOX Sports)
