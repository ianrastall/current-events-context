Date: '2013-05-13'
Source_URI: Portal:Current events/2013 May 13
Intelligence_Payload:
  Aftermath of the Libyan civil war:
  - A car bomb explodes near a hospital in the Libyan city of Benghazi, killing at
    least nine people. (BBC)
  War in Afghanistan (2001–2021):
  - Three Georgian soldiers are killed and several wounded in a large-scale insurgent
    attack on an ISAF base in the Helmand Province. (Civil Georgia)
  Arts and culture:
  - A 2,300-year-old Mayan pyramid at Nohmul in Belize is destroyed by a construction
    company seeking road fill gravel. (Fox News)
  - Veteran U.S. broadcaster Barbara Walters announces her 2014 retirement. (ABC News
    America)
  Business and economy:
  - Kevyn Orr, a state-appointed emergency manager of the finances of the city of
    Detroit, Michigan, issues a report describing the city as "clearly insolvent on
    a cash flow basis." (BBC)
  Disasters and accidents:
  - A military aircraft crashes in residential area in Yemen's capital of Sana'a.
    (Xinhua)
  - The search of the wreckage of the 2013 Savar building collapse in Bangladesh ends
    with 1,127 people found dead. (CTV News)
  International relations:
  - Myanmar state television announces that President Thein Sein will make the first
    official visit to the United States, the first by a leader of that country in
    nearly fifty years. (ABC News)
  Law and crime:
  - Attorney General Eric Holder, acting for the Obama Administration, testifies before
    the House Judiciary Committee that he was not party to the U.S. Justice Department's
    secret seizure of telephone records of the news agency the Associated Press. The
    Justice Department seized two months' worth of telephone records from AP offices
    and reporters. (Fox News),(CBS News)(AP)
  - In Mexico City, Mexico, two men are arrested in connection with the May 9 murder
    of 28-year-old American Malcolm Shabazz, the grandson and first male descendant
    of Malcolm X. (NPR)
  - Iranian man Azim Aghajani is convicted in Nigeria of attempting to smuggle weapons
    to The Gambia. He is sentenced to five years imprisonment. (BBC)
  - Kermit Gosnell, a U.S. abortion physician, is found guilty in Pennsylvania of
    three counts of murder of newborn infants, one count of involuntary manslaughter,
    and various other charges. (The Washington Post)(BBC)
  - The U.S. Department of Treasury may probe why Bloomberg News reporters were monitoring
    how investment bank employees searched their site for financial information, including
    U.S. Chairman of the Federal Reserve Ben Bernanke and Treasury Secretary Timothy
    Geithner. (The New York Times),(BBC)
  Politics and elections:
  - The Senate in the U.S. state of Minnesota passes a bill legalizing same-sex marriage.
    Governor Mark Dayton says he intends to sign it into law. (ABC News)
  - Voters in the Philippines go to the polls for House of Representatives and Senate
    elections with police on heightened security. (ABS CBN)
  - Siddaramaiah of the Indian National Congress party is sworn in as the 22nd Chief
    Minister of the southern Indian state of Karnataka. (Zee News)
  - In Canada's Newfoundland and Labrador Province, Liberal Party's Yvonne Jones won
    a by-election to the province's Labrador electoral riding, formerly held by Conservative
    Party's Peter Penashue. The by-election was widely viewed as a crucial test for
    new Liberal Party leader Justin Trudeau. (CBC News)(CTV News)
  Sport:
  - In association football, Premier League and FA Cup runners-up Manchester City
    sack manager Roberto Mancini. (BBC)
