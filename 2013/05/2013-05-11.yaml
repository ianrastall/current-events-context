Date: '2013-05-11'
Source_URI: Portal:Current events/2013 May 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Ghanaian national goes on a spree attack with a pickaxe in Milan, Italy killing
    a passerby and wounding four others in an apparently random attack. (AP via News24)
  War in North-West Pakistan:
  - A bomb explodes near the Awami National Party offices in Karachi killing 11 people.
    (News Limited)
  Syrian civil war:
  - 43 killed and over 100 injured in two car bombings in Reyhanlı, Turkey, near the
    Syrian border. (Russia Today)
  Business and economy:
  - Britain's Chancellor of the Exchequer, George Osborne, says that the finance ministers
    and central bankers of the G7 have agreed there must be co-ordinated action against
    tax evaders. (BBC)
  Disasters:
  - A strong 6.2 magnitude earthquake occurs in southern Iran with reports of injuries
    and property damage. (AFP via AsiaOne)
  - A landslide in the city of Aizawl in India's Mizoram state kills at least eight
    people with 25 injured and 11 missing. (Indian Express)
  Law and crime:
  - A manhunt is issued for a suspect in the shooting deaths of his wife and two children
    in Shasta County, California, United States. (AP via FOX News)
  - A retrial of former President of Egypt Hosni Mubarak begins in Cairo for his alleged
    complicity in the deaths of protesters in the 2011 Egyptian revolution. (Al Jazeera)
  Politics and elections:
  - Canadian Senator and former Conservative Party campaign director Doug Finley dies
    of cancer. (CTV)
  Pakistan elections:
  - Voters in Pakistan go to the polls for a general election with the Tehrik-e-Taliban
    Pakistan threatening to carry out attacks. There was a record turnout despite
    24 people being killed. (News Limited)
  - Nawaz Sharif of the Pakistan Muslim League-N declares victory, despite not having
    gained a majority in the parliament. (ABC News Australia)
  Sport:
  - In NASCAR, American Matt Kenseth wins the 2013 Bojangles' Southern 500 at the
    Darlington Raceway. (USA Today)
  Association football:
  - In England, Wigan Athletic, playing in their first FA Cup Final, defeat Manchester
    City with a last minute goal by Ben Watson at Wembley Stadium. (The Guardian)
  - In Germany, Bayern Munich sets a number of Bundesliga records including most points,
    most away goals and best start as they are presented with the 2012–13 Fußball-Bundesliga
    trophy. (Reuters)
  - In Spain, FC Barcelona wins its fourth La Liga title in five years. (BBC Sport)
