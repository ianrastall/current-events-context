Date: '2013-05-10'
Source_URI: Portal:Current events/2013 May 10
Intelligence_Payload:
  Armed conflict and attacks:
  - Bombs explode outside two police stations in Libya's eastern city of Benghazi.
    (Reuters)
  - Albert del Rosario, the Philippines Secretary of Foreign Affairs, wants to withdraw
    Filipino peacekeepers from the Golan Heights subsequent to Syrian rebels kidnapping
    four troops. (Straits Times)
  Boston Marathon bombings:
  - Suspect Tamerlan Tsarnaev is buried in the al-Barzakh Cemetery in Doswell, Virginia,
    United States. (Reuters via News24)
  - Evidence mounts that the brothers may be involved in an unsolved triple murder
    in Waltham, Massachusetts, United States from September 11, 2011 - one of the
    victims, Brendan Mess, was once a roommate of Tamerlan. (ABC News)
  2013 Savar building collapse:
  - The death toll reaches 1,042 with many people still missing. (BD Today)
  - A survivor, Reshma Begum, is found alive 17 days after the collapse. (AP via Miami
    Herald)
  International relations:
  - Taiwan demands an apology from the Philippines related to an incident where a
    Taiwanese fisherman died after a Philippine Coast Guard intercepted his fishing
    vessel in the disputed waters of the Bashi Channel. (BBC)
  Law and crime:
  - After yesterday's attack, preserve park authorities discover that twenty-six elephants,
    including four calves, were killed by poachers in the Dzanga-Ndoki National Park
    in the Central African Republic. (The Guardian)
  - A paramedic in West, Texas, United States is arrested for possession of an explosive
    device, but authorities do not elaborate as to whether there is a connection to
    the deadly explosion last month at the town's fertilizer plant. (Reuters via News24)
  - A Guatemala court finds former military leader Efraín Ríos Montt guilty of genocide
    and crimes against humanity and sentences him to 80 years in prison. (BBC)
  Science and technology:
  - ISS crew members prepare for a contingency spacewalk to stop an anticipated ammonia
    coolant leak. (NASA) (nasaspaceflight.com) (nasaspaceflight.com)
