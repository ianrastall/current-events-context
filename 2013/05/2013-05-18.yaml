Date: '2013-05-18'
Source_URI: Portal:Current events/2013 May 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Zahra Shahid Hussain, a senior vice-president of Imran Khan's Pakistan Tehreek-e-Insaf
    Party is shot dead by a gunman outside her home in Karachi. (BBC)
  Iraqi insurgency (post-U.S. withdrawal):
  - Gunmen break into the home of an anti-terrorism police officer in the Baghdad
    suburbs, killing him and his family. (Voice of America)
  Arts and culture:
  - Emmelie de Forest of Denmark wins the 2013 Eurovision Song Contest with the song
    "Only Teardrops". (Reuters via Chicago Tribune) (BBC)
  - A winner is found for a record $590 million Powerball jackpot with the winning
    ticket sold at an agent in Zephyrhills, Florida. (NBC News)
  Business and economy:
  - One hundred thousand people march in Rome, the capital of Italy, to protest the
    austerity measures of the new government, demanding a new policy focus on the
    creation of jobs. (BBC)
  Disasters and accidents:
  - US Airways Express Flight 4560, with 34 people aboard is forced to make a belly
    landing at Newark International Airport after experiencing landing gear trouble.
    No injuries are reported (AP via News24) (CNN)
  - A Boeing 737 carrying more than 130 people catches fire while landing in Moscow.
    No injuries are reported. (AP via News24)
  - A car drives into a crowd at a parade in Damascus, Virginia, injuring at least
    50 people. (CNN)
  2013 Korean crisis:
  - North Korea launches three short-range missiles off its east coast and into the
    Sea of Japan - two in the morning and one in the afternoon. (NBC)
  Sport:
  - In rugby union, RC Toulonnais beats ASM Clermont Auvergne 16-15 in an all-French
    2013 Heineken Cup Final at Aviva Stadium in Dublin. (BBC)
  - In horse racing, American horse Oxbow wins the 2013 Preakness Stakes held at Pimlico
    Race Course. (News Limited)
  2012-13 Football League Two:
  - Bradford City A.F.C win the Football League Two Play-off final 3-0 against Northampton
    Town to win promotion to the 2013-14 Football League One. (The Telegraph)
