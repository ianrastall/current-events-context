Date: '2013-05-26'
Source_URI: Portal:Current events/2013 May 26
Intelligence_Payload:
  Armed conflict and attacks:
  - Two rockets strike the Lebanese capital of Beirut in the predominantly Shiite
    southern suburbs, which also serves as the stronghold of Hezbollah. (AP via Sydney
    Morning Herald)
  Somali Civil War (2009–present):
  - Six people are killed in an attack by Somali militants in police posts over the
    Kenyan border. (BBC)
  Arts and culture:
  - The French film Blue Is the Warmest Colour wins the Palme d'Or at the 2013 Cannes
    Film Festival. (BBC)
  - Fast & Furious 6 opens at the top of the movie sales charts in 59 countries, including
    the United States and Canada where it grossed an estimated $122 million. (New
    York Times)
  Business and economy:
  - The Governor of the Bank of Japan says that although interest-rate increases will
    cause some stress to Japanese financial institutions, they have "sufficient resilience
    against such shocks." (Reuters)
  - Electric car company Better Place announces it will file for bankruptcy. (Reuters)
  Disasters and accidents:
  - At least one person is killed, and ten people are injured after a party bus collides
    with a passenger car near Burlingame, California, United States. (San Jose Mercury
    News)
  Health and environment:
  - Whiteface Mountain in the U.S. state of New York experiences three feet (91 cm)
    of snow. (ABC News)
  Law and crime:
  - A 17-year-old American boy, Grant Acord, is arrested and charged with attempted
    aggravated murder for planning to blow up his school, West Albany High School,
    in Albany, Oregon. Six explosives were found in his bedroom. (AP via News24) (CNN)
  - British counter-terrorism officers arrest another man in connection with the 2013
    Woolwich attack. (SAPA via News24)
  Politics and elections:
  - An estimated 150,000 people rally against gay marriage in Paris, France, with
    100 people arrested. (BBC), (Sky News)
  Sport:
  - In Twenty20 cricket, the Mumbai Indians defeat Chennai Super Kings in the final
    to win a maiden Indian Premier League title. (The Indian Express)
  - In road cycling, Vincenzo Nibali of Italy wins the Giro d'Italia. (BBC)
  - In Gaelic football, Donegal open the defence of their All-Ireland title with a
    victory over Tyrone in the Ulster Senior Football Championship. (The Score) (The
    Irish Times)
  - In tennis, Venus Williams loses in the first round of the French Open for the
    first time since 2001. (Los Angeles Times)
  - In ice hockey, the Halifax Mooseheads defeat the Portland Winterhawks to win the
    2013 Memorial Cup
  - In professional golf
  In motorsport:
  - In Formula One, German Nico Rosberg wins the Monaco Grand Prix. (BBC)
  - In IndyCar, Tony Kanaan of Brazil wins the Indianapolis 500. (The New York Times)
  - In NASCAR, Kevin Harvick wins the Coca-Cola 600. During the race, a cable used
    to support a Fox skycam falls on the track, causing minor injuries to 10 spectators
    and minor damage to several cars in the event. (ESPN)
  - Boo Weekley wins the Crowne Plaza Invitational. (ESPN)
  - Matteo Manassero becomes the youngest player to win the BMW PGA Championship.
    (USA Today)
