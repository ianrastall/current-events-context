Date: '2013-05-24'
Source_URI: Portal:Current events/2013 May 24
Intelligence_Payload:
  Afghanistan War:
  - Afghan security forces battle Taliban insurgents in central Kabul. An Afghan policeman,
    a Nepalese soldier, and numerous insurgents are killed. (BBC)
  War in North-West Pakistan:
  - A suicide bombing in the Pakistani city of Peshawar kills at least three people
    and leaves several injured. (Dawn)
  Al-Qaeda insurgency in Yemen:
  - Attackers blow up Yemen's main oil pipeline, halting the flow of crude oil. (The
    Star)
  Disasters and accidents:
  - A collision between a hotel shuttle bus and a tractor-trailer occurs near the
    Atlanta airport, injuring eighteen people. (AP via News24)
  - An 8.3 magnitude earthquake in East Russia leads to widespread evacuations, but
    no casualties. (New York Times)
  - Five mountain climbers are missing and feared dead on Kanchenjunga. (AP via USA
    Today)
  Health and environment:
  - A study of more than 10,000 people finds a correlation between cesarean section
    birth and childhood obesity. (Reuters)
  - Main Street Family Pharmacy of Newbern, Tennessee, US voluntarily recalls a steroid
    injection (preservative-free methylprednisolone acetate), used for arthritis and
    allergy relief in at least 11 states. No serious infections are reported. (CNN)
  Law and crime:
  - As part of "a policy of reducing the impact of rough sleepers on the community"
    London's Metropolitan police seize belongings including sleeping bags from homeless
    people. (The Guardian)
  - Malaysian police arrest four people for sedition including opposition politician
    Chua Tian Chang, the Vice-President of Parti Keadilan Rakyat. (Radio Australia)
  - The 2013 Stockholm riots enter their fifth night. (UPI)
  - A necklace worth €1.9 million is stolen during the Cannes film festival. (BBC)
  - Police arrest two men on suspicion of endangering an aircraft, after British fighter
    jets escort a Pakistan International Airlines passenger plane to London Stansted
    Airport. (Reuters via News24)
  Politics and elections:
  - Rafael Correa is sworn in as President of Ecuador for an unprecedented third term.
    (BBC)
  - President of Uganda Yoweri Museveni removes Aronda Nyakairima as head of the military
    and names him as Minister of the Interior. (Reuters)
  Sport:
  - In association football, Gibraltar is accepted as a full UEFA member at the organization's
    XXVIII congress. (Panorama)
  - In cycling, 2007 Giro d'Italia winner Danilo Di Luca of Italy tests positive for
    Erythropoietin (EPO). (Cycling Weekly)
