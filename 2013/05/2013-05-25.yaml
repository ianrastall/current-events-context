Date: '2013-05-25'
Source_URI: Portal:Current events/2013 May 25
Intelligence_Payload:
  Armed conflict and attacks:
  - Al-Qaeda in the Maghreb commander Mokhtar Belmokhtar claims responsibility for
    two suicide bombing attacks that killed 30 people in Niger on May 23. (New York
    Times)
  - A bomb explodes near a bus north of Baghdad, Iraq, killing six Iranians, one Iraqi,
    and wounding fourteen people. (ABC)
  - Suspected Maoist rebels kill at least 27 people in an attack on a convoy of Indian
    National Congress politicians in Chhattisgarh, India. (NDTV) The Times of India
  Insurgency in the North Caucasus:
  - A female suicide bomber injures at least 11 police officers and civilians, including
    two children, in Makhachkala in the southern Russian republic of Dagestan. (AP
    via News24)
  Syrian civil war:
  - Dozens of people are killed in Al-Qusayr, Homs, Syria, as the Syrian Army and
    Hezbollah bombard the rebel-held town with heavy artillery. (CNN)
  Business and economies:
  - Thousands of people across 36 countries rally in protest of genetically modified
    seed producer Monsanto. (The Guardian) (USA Today)
  Disasters and accidents:
  - A gas cylinder explodes on a school bus in the Pakistani city of Gujrat, killing
    at least 17 children. (BBC)
  - 48 people are rescued from a boat which was taking on water after it collided
    with a rock off the coast of Pembrokeshire, Wales. (BBC)
  - Two people are killed when the US city of San Antonio, Texas, experiences heavy
    flooding. (Chicago Times)
  - Two freight trains collide in southeast Missouri, United States, causing a highway
    overpass to collapse. (CNN)
  International relations:
  - The African Union celebrates its 50th anniversary. (News 24)
  Law and crime:
  - British counter-terrorism police arrest a man who was a childhood friend of the
    terrorist Michael Adebolajo after he gives an interview to the BBC in which he
    claims that the MI5 had contacted him in the past. (CNN)
  - A French anti-terror soldier is stabbed in the neck in a suspected copycat of
    the 2013 Woolwich attack. (Sky News), (Daily Mail)
  - A Spring Ford High School (Royersford, PA) senior, Julianne Siller, 17, is allegedly
    stabbed to death by her boyfriend, 16-year-old Tristan Stahley after a fight during
    a breakup. (NBC)
  Politics and elections:
  - Fifty people are arrested ahead of a major rally against France's new law allowing
    same-sex marriage. (AFP via Google)
  - Russia arrests 30 gay-rights supporters in Moscow after they attempt to hold a
    rally in spite of a law forbidding gay-rights demonstrations. (Voice of America)
  Religion:
  - Thousands of people attend the beatification of Pino Puglisi, a Roman Catholic
    priest murdered by the Sicilian Mafia for speaking out against crime. (BBC), (Herald
    Sun)
  Science and technology:
  - An Apple I computer sells for US$671,000 at auction. (PC Magazine)
  Sport:
  - In football, Bayern Munich defeats Borussia Dortmund 2-1 in the 2012-13 UEFA Champions
    League Final. (The Guardian)
  - Japanese climber Yuichiro Miura becomes the oldest person ever the summit Mount
    Everest at the age of 80. (Philippine Star)
