Date: '2013-05-29'
Source_URI: Portal:Current events/2013 May 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgents storm a Red Cross guest house in Jalalabad, Afghanistan. (AP via The
    Miami Herald)
  War in North-West Pakistan:
  - 'Drone attacks in Pakistan: Pakistani intelligence officials claim that a US drone
    attack has killed 5 alleged foreign militants, including Tehrik-i-Taliban Pakistan
    commander Wali-ur-Rehman, in the North Waziristan town of Miran Shah. (New York
    Times)'
  Arts and culture:
  - The veteran Italian actress Franca Rame, also known as the wife and muse of Dario
    Fo and mother of Jacopo Fo, dies in Milan at the age of 83. Dario Fo dedicated
    his 1997 Nobel Prize in Literature to her. (The Guardian) (Reuters)
  - Italians campaign to save Trieste's historic Caffè San Marco, frequented by figures
    such as James Joyce, Italo Svevo and Umberto Saba. (The Guardian)
  Business and economics:
  - Chinese meat processing company Shuanghui buys the world's largest meat processing
    company Smithfield Foods for $4.72 billion. (AP via USA Today)
  - Funeral service and cemetery company Service Corporation International purchases
    another funeral service company Stewart Enterprises for $1.4 billion. (Bloomberg)
  Disasters and accidents:
  - At least 13 people are dead and at least 20 injured following a collision between
    a bus and a tanker near the Indian town of Dahanu in Maharashtra state. (IBN)
  Law and crime:
  - French police arrest a man, said to be a radical Islamist, for allegedly stabbing
    Cédric Cordier, a soldier in the La Défense business district near Paris. (The
    Times)
  - Former Bosnian official Jadranko Prlić is sentenced to 25 years in prison by the
    International Criminal Tribunal for the former Yugoslavia for war crimes during
    the Yugoslav Wars. (The Australian)
  - Buddhist mobs burn down Muslim homes and shops in Lashio, Myanmar leaving 1 dead
    and 4 others injured. (Reuters)
  - The New York Police Department (NYPD) states that preliminary tests indicate ricin
    was present in letters that were sent to the office of New York City Mayor and
    media mogul Michael Bloomberg, and to the office of the Director of Mayors Against
    Illegal Guns. (CNN)
  - Michael Adebowale is charged with the murder of British Army soldier Lee Rigby
    in the 2013 Woolwich attack. (CBS News)
  Politics and elections:
  - U.S. Representative Michele Bachmann of Minnesota, a prominent figure in the Tea
    Party movement, abruptly announces that she will not seek reelection to a fifth
    term in November 2014. (MarketWatch)
  Science and technology:
  - Aurornis xui is described as the most basal species of Avialae, potentially unseating
    Archaeopteryx as the oldest known bird. (BBC)
  Sports:
  - 'The International Olympic Committee releases its shortlist of sports to be included
    in the 2020 Summer Olympics: wrestling, squash, and a joint baseball-softball
    bid. A final decision will be made on September 7. (ESPN)'
  - England and Ireland meet at Wembley Stadium for the first time since England fans
    rioted and attacked their Irish counterparts in Dublin in 1995. The match passes
    off peacefully with a 1-1 draw. (RTÉ) (BBC)
  - In a friendly soccer match in Cleveland, Belgium defeats the United States by
    a score of 4 to 2. (Sports Illustrated)
