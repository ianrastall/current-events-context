Date: '2013-05-05'
Source_URI: Portal:Current events/2013 May 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Three people are dead and over 200 are injured when Hefajat-e-Islam and Jamaat-e-Islami
    clash with police in Dhaka, Bangladesh. (The Hindu)
  - One person is dead and another 57 are injured after a bomb detonates inside a
    Roman Catholic church in Arusha, Tanzania. (Reuters)
  Syrian civil war:
  - Israeli aircraft hit at least six targets near Damascus, targeting Iranian-made
    Fateh-110 missile shipments en route to Hezbollah. (BBC) (The Times of Israel)
  - Syria's foreign ministry accuses Israel of helping and working with the Syrian
    rebels to coordinate airstrikes (Xinhua) (ABC) (The New York Times)
  Communist insurgency in the Philippines:
  - New People's Army attack a mining site at Sipalay, Negros Occidental and burn
    equipment. A firefight ensues leaving five soldiers dead and two wounded. (Philippine
    Star)
  Somali Civil War (2009–present):
  - Eight people are dead after a suicide bomber rams an explosive-laden car into
    a convoy carrying Qatari officials through the center of Somalia's capital Mogadishu.
    Al-Shabaab claims responsibility for the attack. (Voice of America)
  Nigerian Sharia conflict:
  - 10 people are killed in an attack on a church and a local market in Njilan, Adamawa
    State, Nigeria. (AP via The Montana Standard)
  Disasters:
  - A limousine catches fire on the San Mateo Bridge in Hayward, California, United
    States killing five women and injuring four trapped inside. (Boston.com)
  - A military aircraft crashes during an air show killing the pilot and injuring
    another 19 on the ground in Madrid, Spain. (Kuwaiti News Agency)
  2013 Savar building collapse:
  - The death toll in Bangladesh rises to 622. (Washington Post)
  Law and crime:
  - Six people are wounded during a drive-by shooting outside a McDonald's restaurant
    in East Palo Alto, California, United States. (Huffington Post) (San Francisco
    Chronicle)
  Politics and elections:
  - Malaysia's ruling coalition Barisan Nasional retains a majority of parliamentary
    seats in the general election. (FT)
  - Helmin Wiels, leader of the largest political party in Curaçao, is assassinated.
    (BBC)
  Science and Technology:
  - A test of an M51 missile by the French military ends in failure when it self-destructs
    in midair. (RFI)
  - The world's first gun produced by Defense Distributed using a 3-D printer is fired
    successfully in Austin, Texas, United States. Security officials worry that such
    plastic weapons could evade detection at airport screenings. (BBC),(WGBH)
