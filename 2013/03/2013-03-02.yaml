Date: '2013-03-02'
Source_URI: Portal:Current events/2013 March 2
Intelligence_Payload:
  2013 Bangladesh protests:
  - The death toll in Bangladesh rises to at least 50 as protests continue following
    the sentencing of Delwar Hossain Sayeedi. (Xinhua)
  Northern Mali conflict:
  - Chadian soldiers kill Mokhtar Belmokhtar, an al-Qaeda commander in Africa responsible
    for a mass hostage-taking at an Algerian gas plant. (Reuters) (BBC)
  South Thailand insurgency:
  - Suspected insurgents detonate a motorcycle bomb in Southern Thailand killing 2
    Thai Military rangers and wounding 11 people. (Reuters)
  Disasters and accidents:
  - A massive car crash on I-65 in Kentucky, United States, leaves 6 people from Wisconsin
    dead and 2 injured. (WMTV) (Milwaukee Journal Sentinel)
  Health and environment:
  - A study concludes that continuous standing and walking reduces the risk of type
    II diabetes better than either sitting/lying or exercise. (Medical News Today)
  Law and crime:
  - A judge declines to throw out the case against actress Lindsay Lohan in which
    she is accused of lying to a California police officer after a car accident in
    2012. (Star Pulse)
  Science and technology:
  - Image taken by the Cassini spacecraft from Saturn orbit shows Venus shining like
    a bright beacon through Saturn’s rings. (ESA) (NASA)
  - Hackers hack the popular note-taking application Evernote. The website says that
    the hackers gained access to user passwords, e-mails, and usernames. (ZD Net)
    (PC Magazine)
  Sport:
  - 'El Clásico: Real Madrid defeat rivals FC Barcelona 2–1 in the 2012–13 La Liga
    match. Sergio Ramos scores winning goal. (ESPN)'
  - The 1,000 mile 2013 Iditarod Trail Sled Dog Race begins in Anchorage, Alaska,
    United States. The winner of the race will get a new truck and $50,400. (AP via
    Seattle PI) (NPR)
