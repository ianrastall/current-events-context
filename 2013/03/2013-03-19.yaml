Date: '2013-03-19'
Source_URI: Portal:Current events/2013 March 19
Intelligence_Payload:
  19 March 2013 Iraq attacks:
  - A series of bombings and shootings kills at least 98 people and injures 240 others
    across Iraq. (BBC) (Reuters) (CNN)
  Kurdish–Turkish conflict:
  - Two people are injured in explosions at Turkey's justice ministry and the headquarters
    of the governing AK Party in Ankara. (BBC)
  Business and economy:
  - '2012–2013 Cypriot financial crisis: Cypriot lawmakers overwhelmingly reject the
    EC–ECB–IMF troika plan to tax all bank deposits. (BBC) (RTÉ News)'
  Disasters and accidents:
  - A bus crash in the Indian state of Maharashtra kills at least 37 people and injures
    14 others. (AAP via Herald Sun)
  - At least 16 people are dead after landslides in a mountainous area north of the
    Brazilian city of Rio de Janeiro. (BBC)
  Law and crime:
  - Saudi Arabia police arrest one Iranian, one Lebanese and 16 Saudis on charges
    of spying. (BBC)
  - An American man is sentenced to between five and ten years in prison for the murder
    of Irish tourist Nicola Furlong in Japan. (The Irish Times) (Irish Independent)
  - A suspect, Qari Abdul Saeed, is arrested in Pakistan for the 2002 beheading of
    The Wall Street Journal reporter Daniel Pearl. (CNN) (NBC News)
  - In the U.S. state of Ohio, Thomas Lane receives three life sentences for the child
    murders at Chardon High School that he committed in February 2012 as a 17-year-old.
    (AP)
  - The United States Supreme Court holds in a 6–3 decision that the first-sale doctrine
    applies to the domestic sale of foreign copies of copyrighted work lawfully made
    abroad. (IP-Watch)
  - Benjamin Pierce Bishop, a civil defense contractor who works in intelligence,
    was charged with giving U.S. national security secrets his Chinese girlfriend.
    (AP via New York Post)
  Politics and elections:
  - In Ukraine, a fight breaks out during a session of the Verkhovna Rada over the
    use of the Russian language in politics. (Sky News) (Kyiv Post) (MSN)
  Religion:
  - Hundreds of thousands of people attend the papal inauguration ceremony for Pope
    Francis in Rome's Saint Peter's Square. (BBC) (AFP via Straits Times)
  Science and technology:
  - NASA's Mars rover Curiosity extends evidence of water-bearing minerals when studying
    the rock Tintina. (BBC) (NASA) (JPL)
  - The United States Air Force successfully launches an Atlas V 401 rocket carrying
    a missile defense satellite SBIRS-GEO 2. (Space.com)
  - NASA publishes LRO images of the two craters on the Moon, where twin GRAIL probes
    ended their gravity-mapping mission in December 2012. (NASA) (Space.com) (BBC)
  Sport:
  - English striker Michael Owen, who plays for Stoke City, announces his retirement
    from football at the end of the 2012–13 Premier League season. (BBC) (The Guardian)
  - Former Danish road bicycle racer Rolf Sørensen admits in a press release that
    he utilised EPO and cortisone during his professional career. (Cycling News)
  - In baseball, the Dominican Republic wins the 2013 World Baseball Classic defeating
    Puerto Rico 3–0 in the final. (MLB) (The Guardian) (ESPN)
  - In wrestling, the 2013 European Wrestling Championships begins today in Tbilisi,
    Georgia. (CELA) (Xinhua)
