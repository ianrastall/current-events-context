Date: '2013-03-03'
Source_URI: Portal:Current events/2013 March 3
Intelligence_Payload:
  2013 Lahad Datu standoff:
  - Fighting erupts in Sabah, Malaysia, leaving seven dead, including five policemen.
    Four people are taken hostage. In response, the Malaysian Military doubles their
    troop presence in the area. (BBC) (Reuters) (The New York Times)
  2013 Bangladesh protests:
  - At least 16 people die in clashes in Bangladesh as a strike organized by Jamaat-e-Islami
    begins. (BBC) (Reuters)
  March 2013 Karachi bombing:
  - A bomb blast in Karachi, Pakistan, kills at least 45 people in a predominately
    Shia Muslim area. (BBC) (Reuters)
  Arts and culture:
  - Queen Elizabeth II is admitted to hospital for observation after experiencing
    symptoms of gastroenteritis. Buckingham Palace has described it as a "precaution".
    (BBC)
  Health and environment:
  - Following treatment, a 2-year-old Mississippi girl born with the HIV/AIDS virus
    is pronounced to be HIV negative. (CBS) (The Guardian) (BBC) (CNN)
  - Thailand promises to put an end to legal ivory trade within the country. (BBC)
  Law and crime:
  - Scottish Cardinal Keith O'Brien, who resigned last week due to allegations of
    sexual impropriety, admitted his past sexual misconduct and apologized for it.
    (USA Today)
  - While on the way to the hospital due to complications in a pregnancy, a young
    Ultra-Orthodox Hasidic Jewish couple from a Brooklyn enclave are killed in a hit-and-run;
    the baby was delivered prematurely by C-section but died the next day of its injuries.
    The car owner was arrested soon after; the driver was arrested days later after
    a search. (CNN)
  Politics and elections:
  - 'Swiss referendum, 2013: Voters in Switzerland pass measures limiting CEO pay
    and outlawing golden parachutes. (The Guardian)'
  Science and technology:
  - 'SpaceX CRS-2: The cargo ship SpaceX Dragon docks at the International Space Station
    after a brief delay. (CNet)'
  - NASA's Curiosity rover is switched to a redundant onboard computer in response
    to an undefined memory issue on the active computer. (NASA)
  Sport:
  - Norway's Marit Bjørgen wins five medals in 2013 FIS Nordic World Ski Championships
    that ends today in Val di Fiemme, Italy. (CBC) (Eurosport)
  - Norwegian biathlete Tora Berger secures the women's overall title in the 2012–13
    Biathlon World Cup with five individual races still remaining. (IBU)
  - Lauren Silberman becomes the first woman to try out for the National Football
    League, but her attempt to make a team ends after two kicks with an injury. (USA
    Today)
  - Russia, Great Britain and France become the top-3 countries in the medal table
    of the 2013 European Athletics Indoor Championships in Gothenburg, Sweden. (EA)
  - Mexico scores twice in extra time and defeats the United States 3–1 to win the
    2013 CONCACAF U-20 Championship. (US Soccer Players)
