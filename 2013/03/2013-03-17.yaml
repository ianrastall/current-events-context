Date: '2013-03-17'
Source_URI: Portal:Current events/2013 March 17
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - A car bombing near a bus station in Garmat Ali near the Iraqi city of Basra kills
    at least 10 people. (BBC)
  Arts and culture:
  - Japanese architect Toyo Ito wins the 2013 Pritzker Architecture Prize. (AP via
    Google News) (The Guardian)
  Business and economy:
  - Following a train derailment, Amtrak temporarily suspends service along the busy
    New York-to-Boston route. (AP via Google News)
  Law and crime:
  - An Albanian hitman serving time in Greece takes six people hostage in an apparent
    escape attempt. (BBC)
  - Five people are wounded during a shooting at a nightclub in Belle Glade, Florida,
    United States. (WPBF) (Sun-Sentinel)
  - Prominent French lawyer Olivier Metzner is found dead of an apparent suicide.
    (Bloomberg)
  - Two members of the Steubenville High School football team have been found guilty
    of raping a sixteen-year-old girl in the U.S. town of Steubenville, Ohio. (Sky
    News Australia)
  Religion:
  - Thousands of people gather in Rome's Saint Peter's Square to hear Pope Francis
    deliver his first Angelus prayer and blessing. (BBC)
  Science and technology:
  - New data suggests that the Mariana Trench, the deepest part of the World Ocean,
    is home to a large amount of bacterial life forms. (LiveScience)
  Sport:
  - In Formula One, Kimi Räikkönen wins 2013 Australian Grand Prix, the first stage
    of the 2013 season, ahead of Fernando Alonso and Sebastian Vettel. (BBC) (Reuters)
  - In tennis, Rafael Nadal wins men's singles and Maria Sharapova wins women's singles
    at the 2013 BNP Paribas Open in Indian Wells, California, United States. (BBC)
    (NDTV)
  - Greek football player Giorgos Katidis is banned from his national team for life
    after giving a Nazi style salute while celebrating a goal in the 2012–13 Superleague
    Greece match. (Daily Mail)
  - In men's field hockey, Australia defeats Malaysia 3–2 in the final of the 2013
    Sultan Azlan Shah Cup. (NDTV)
  - In basketball, the field for the 2013 NCAA Men's Division I Basketball Tournament
    is announced. (CNN)
  - In volleyball, Russia's Lokomotiv Novosibirsk defeats Italy's Bre Banca Lannutti
    Cuneo 3–2 in the thriller final to win the 2012–13 CEV Champions League. (CEV)
  - In snooker, Ding Junhui defeats Neil Robertson 4–3 to win the Grand Final of the
    Players Tour Championship 2012/2013. (BBC) (Eurosport)
  - In road bicycle racing, Gerald Ciolek of Germany wins 2013 Milan – San Remo single-day
    cycling race, the fourth stage of the 2013 UCI World Tour season. (BBC)
  - In Alpine skiing, Austrian Marcel Hirscher and Slovenian Tina Maze win the overall
    men's and women's 2013 Alpine Skiing World Cup titles, respectively. (AP via Yahoo!
    News)
  - In biathlon, last stage of the 2012–13 Biathlon World Cup ends in Khanty-Mansiysk,
    Russia. Martin Fourcade wins men's overall title and Tora Berger wins the women's
    overall title. (CBC) (AP via Yahoo! Sports)
