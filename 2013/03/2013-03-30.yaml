Date: '2013-03-30'
Source_URI: Portal:Current events/2013 March 30
Intelligence_Payload:
  Arts and culture:
  - Musical innovator and fourteen-time Grammy Award winning producer Phil Ramone
    dies at the age of 79. (The Washington Post)
  Business and economy:
  - A judge dismisses the majority of the lawsuit charges against a group of American
    banks related to the Libor scandal. (AP via USA Today)
  International relations:
  - '2013 Korean crisis: North Korea declares it is in a state of war with South Korea,
    and will conduct any further dealings under "wartime regulations". Russia urges
    calm on both sides. North Korea threatens to shut down the industrial plant in
    Kaesong, on the border with South Korea. (Reuters) (RT) (CBS News)'
  Politics and elections:
  - President of Italy Giorgio Napolitano forms two groups of people, both politicians
    and entrepreneurs, who will propose ideas to solve the Italian economic and political
    crisis. The government led by Mario Monti will be in charge until a new government
    can be formed. (BBC)
  - The Supreme Court of Kenya unanimously confirms that Uhuru Kenyatta is the rightful
    winner of the recent disputed presidential election. (Los Angeles Times)
  Law and crime:
  - Nuon Chea, the most senior surviving Khmer Rouge leader, is declared fit for trial
    by a United Nations-backed court in Cambodia. (CNN)
  - The Eiffel Tower is evacuated for a time after an anonymous caller made a bomb
    threat. No explosives were found, police are still searching for the caller. (Fox
    News)
  - Three people are shot (one critically) at three stores at the Edgewood Towne Center
    shopping plaza near Pittsburgh, Pennsylvania, United States. The victims were
    taken to UPMC Presbyterian Hospital while police searched the area. (NBC News)
  Science and technology:
  - Famous panda Mei Xiang is artificially inseminated in the U.S. National Zoo after
    natural breeding failed to occur. (Reuters)
  - Scientists announce that a green meteorite Northwest Africa 7325, found in Morocco
    in 2012, may have originated on Mercury, which, if proven, would be the first
    known meteorite from that planet. (Space.com)
  Sport:
  - New Zealand cricketer Jesse Ryder, who was assaulted outside a bar, is now out
    of the induced coma and off the ventilator, but has no recollection of the attack.
    (AFP via Dawn.com)
  - The UCLA Bruins men's basketball team hires Steve Alford as its new head coach.
    (Los Angeles Times)
  - Long time University of Alabama athletics director Mal Moore dies at age 73. (USA
    Today)
  - The University of Michigan wins the 2013 NCAA Men's Swimming and Diving Championships.
    (AP via Detroit Free Press)
