Date: '2013-03-15'
Source_URI: Portal:Current events/2013 March 15
Intelligence_Payload:
  Arts and culture:
  - American rapper Lil Wayne has a seizure in Los Angeles, United States. (CNN)
  Disasters and accidents:
  - At least 24 people die when a double decker bus veers off the Hex River Pass near
    De Doorns, Cape Town, South Africa. (SAPA via News24) (The Times South Africa)
  - Three people die after a twin-engine plane crashes into a parking lot in Fort
    Lauderdale, Florida, United States. (CNN)
  - At least 16 people are killed in a fireworks accident in Jesus Tepactepec, Tlaxcala,
    Mexico. (CNN) (BBC)
  Law and crime:
  - A 19-year-old man is arrested in connection with a drive-by shooting in Washington,
    D.C., United States, on March 11, that injured 13 people. (AP via Fox News)
  Politics and elections:
  - The Italian Parliament meets in Rome with the composition of the government still
    unclear three weeks after an inconclusive general election. (Reuters)
  - David Cameron and Nick Clegg, the leaders of the two parties which make up the
    UK coalition government, publish separate plans for press regulation in England
    and Wales. (BBC)
  - Independent MP Eric Joyce is banned from buying alcohol in the UK's Houses of
    Parliament after he was arrested on Thursday following a drunken brawl at a bar
    in the complex. (BBC)
  - The Prime Minister of Israel Benjamin Netanyahu forms a coalition between his
    Likud party and the Centrist Yesh Atid, rightist Jewish Home and leftist Hatnuah
    parties. (The Telegraph)
  - North Korea launches short-range missiles into the Sea of Japan. (NK News) (AP
    via Japan Times)
  Religion:
  - The Vatican denies claims that Pope Francis failed to speak out against human
    rights abuses during military dictatorship in Argentina. (BBC)
  Science and technology:
  - Scientists working on the Lazarus Project announce that they have successfully
    rejuvenated cells of Rheobatrachus silus, a species of frog extinct since 1983.
    (Science 2.0)
  Sport:
  - The draw for the quarterfinals of the 2012–13 UEFA Champions League and 2012–13
    UEFA Europa League is held in Nyon, Switzerland. (UEFA) (Goal.com)
  - Mehdi Mahdavikia, the former Hamburger SV and Iran midfielder, announces his retirement
    from football at the end of the current season. (Hamburger Abendblatt)
  - In figure skating, Patrick Chan of Canada wins his third world title at the 2013
    World Figure Skating Championships in London, Ontario, Canada. (USA Today) (AP
    via ESPN)
