Date: '2013-03-14'
Source_URI: Portal:Current events/2013 March 14
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - A string of coordinated car bombs and suicide bombers strike central Baghdad,
    followed by a militant attack on the Justice Ministry building. At least 25 people
    are killed, including 7 police officers and 3 militants, along with 50 wounded.
    (CNN) (Reuters)
  Mexican Drug War:
  - Gunmen storm a bar in Cancún, Mexico, and kill 7 people, also 4 others were wounded
    in the attack. The authorities allege that the victims were part of a taxi union.
    (AP via The Washington Post)
  Law and crime:
  - Former Khmer Rouge senior official and Foreign Minister of Kampuchea Ieng Sary
    dies during a genocide trial in Phnom Penh, Cambodia. (AP)
  - At least two people are killed and five others are injured when a man, believed
    to be a Chinese worker, goes on a stabbing rampage at a fish processing firm in
    Etajima, Japan. (SAPA via News24)
  Politics and elections:
  - The National People's Congress names CPC General Secretary Xi Jinping as the new
    President of the People's Republic of China, Politburo member Li Yuanchao as the
    new Vice President, Li Keqiang as the new Premier, and Politburo standing member
    Zhang Dejiang as the Chairman of the NPC Standing Committee. (AFP via SBS News)
    (AP) (The New York Times)
  - The Constitutional Court of Armenia upholds the reelection of President Serzh
    Sargsyan in the recent presidential election. (Reuters)
  - Nepalese Chief Justice Khil Raj Regmi takes oath of office as new Prime Minister
    of the country, heading an interim government with the task of conducting elections.
    (AAP via The Australian)
  - British Prime Minister David Cameron says talks between himself and the leaders
    of the UK's other main political parties on the recommendations of the Leveson
    report have broken down. Cameron says he will publish a Royal Charter on press
    regulations on Monday. (BBC)
  - British Labour Party peer Lord Ahmed is suspended from the party after claiming
    a conspiracy by Jewish-owned media organisations was responsible for his imprisonment
    for dangerous driving. (BBC)
  Science and technology:
  - Scientists at the Large Hadron Collider express confidence that a particle discovered
    in July 2012 is a Higgs boson after measuring its spin and parity. (BBC) (CERN)
  Sport:
  - The second legs of the 2012–13 UEFA Europa League round of 16 are held across
    Europe. Emmanuel Adebayor's extra-time goal earns Tottenham Hotspur a place in
    the quarter-finals after their loss 1–4 to Inter Milan. (BBC) (UEFA)
  - The National Hockey League officially announces it will realign into a four-division
    structure and a modified division-based playoff system starting next season after
    the league's board of governors approves. The league's players association had
    previously given their approval as well. (ESPN)
