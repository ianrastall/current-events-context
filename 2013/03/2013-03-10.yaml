Date: '2013-03-10'
Source_URI: Portal:Current events/2013 March 10
Intelligence_Payload:
  War in Afghanistan:
  - President of Afghanistan Hamid Karzai alleges that the U.S. armed forces are collaborating
    in some way with the Afghan Taliban in an effort to ensure that some troops remain
    after the scheduled 2014 pullout. (AP via MSN News)
  2013 in Pakistan:
  - Hundreds of Christian protestors clash with police across Pakistan after the burning
    of Christian houses in Lahore. (AP via Houston Chronicle)
  Nigerian Sharia conflict:
  - Nigerian militants belonging to Ansar al-Muslimeen claim responsibility to kidnapping
    and killing Italian, Greek, and British construction workers in Northern Nigeria.
    (CNN)
  Arts and culture:
  - American fantasy adventure film Oz the Great and Powerful brings in an estimated
    $80.3 million in the United States during its opening weekend. (E!)
  - At the 2013 Crufts dog show, Soletrader Peek A Boo, a Petit Basset Griffon Vendéen,
    wins Best in Show. (BBC) (The Times)
  Disasters and accidents:
  - Six teenagers are killed and two other people are injured in a car accident near
    Warren, Ohio, United States. It is the deadliest accident in Trumbull County history
    and the deadliest in Ohio in three years. (CNN)
  - Five teenagers are killed after a Chevrolet SUV and a gas tanker collide at the
    intersection of two county roads in Dumas, Texas, United States. (CNN)
  Law and crime:
  - The head of Sierra Leone's Anti-corruption Commission says that 29 government
    health officials will appear in court on corruption charges for having allegedly
    defrauded the Bill & Melinda Gates Foundation's vaccine programme. (SAPA via News24)
  - The Mexican Navy frees 104 Central American kidnapped migrants from a house in
    Nuevo Laredo, Tamaulipas. (AP via USA Today)
  Politics and elections:
  - The Burmese National League for Democracy reelects Aung San Suu Kyi as its leader.
    (CNN)
  - Residents of the Falkland Islands begin voting in a two day sovereignty referendum
    on whether the islands should remain a British overseas territory. (BBC)
  - Former President of South Africa Nelson Mandela is released from the hospital
    after "successful" medical tests. (AP via Miami Herald)
  Sport:
  - Titleholders Chelsea comes from two goals down to draw 2–2 with Manchester United
    and earns a replay of their 2012–13 FA Cup quarter-final. (BBC) (ESPN)
  - France's Sébastien Ogier at the wheel of his Volkswagen Polo R WRC wins 2013 Rally
    México, the third stage of the 2013 WRC season. (WRC) (Autosport)
