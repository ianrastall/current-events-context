Date: '2013-03-29'
Source_URI: Portal:Current events/2013 March 29
Intelligence_Payload:
  Terrorism in Pakistan:
  - A blast near the United States Consulate in Peshawar, Pakistan, kills 10 people
    and wounds at least 31 others. (CNN)
  Iraqi insurgency (post-U.S. withdrawal):
  - Coordinated car bombings against five Shiite mosques in Baghdad and Kirkuk kill
    23 worshipers. (AP via ABC News)
  Arts and culture:
  - The electronic music band Kraftwerk is not allowed to perform at a music festival
    in China due to unspecified "political reasons". (The Guardian)
  - After 25 years on the air, the American TV show America's Most Wanted is cancelled.
    (CBS News)
  Business and economy:
  - '2012–2013 Cypriot financial crisis: President of Cyprus Nicos Anastasiades says
    the island has no intention of abandoning the euro, despite the tough conditions
    imposed by its 10 billion euro bailout deal with the European Union and International
    Monetary Fund. (BBC)'
  Disasters and accidents:
  - 'Dar es Salaam building collapse: At least 36 are killed and around 25 more are
    trapped when a 16-floor building collapses in the commercial capital Dar es Salaam,
    Tanzania. (BBC) (CNN) (AllAfrica.com)'
  - '2013 Gyama Mine landslide: A large landslide buries 83 gold miners in China''s
    Tibetan Autonomous Region near Lhasa. (The Washington Post)'
  - More than 220 people are rescued from two ice floes that broke off of Latvia and
    were blown into the Gulf of Riga. (CNN)
  - A United States Navy SEAL is killed in a training accident. (USA Today)
  Health and environment:
  - A study published in The Journal of Pediatrics confirms that there is no scientific
    evidence of a link between vaccines and autism. (CBS News)
  International relations:
  - Iran, North Korea and Syria block adoption of a United Nations treaty that would
    regulate the international arms trade, a proposal which required agreement by
    all 193 UN member states. (Al Jazeera)
  - North Korean leader Kim Jong-Un orders preparations for strategic rocket strikes
    on the US mainland at an overnight meeting with top army commanders, in response
    to the use of nuclear-capable B-2 Stealth Bombers in joint US-South Korea military
    drills. China appeals for calm on all sides. (The Telegraph)
  Law and crime:
  - A Pakistani lawyer throws a shoe at the former President Pervez Musharraf at the
    Sindh High Court, as Musharraf successfully extends his bail on charges of conspiracy
    to murder and sacking judges. (Al Jazeera)
  - Several people are injured in Sri Lanka's largest city Colombo when Buddhist monks
    lead hundreds of people to attack a Muslim owned clothing warehouse. (BBC)
  - A Bosnian court sentences Veselin Vlahović to 45 years in jail for murders, tortures,
    rapes and lootings during the Bosnian War. (AP via ABC News)
  Politics and elections:
  - Former Premier of Alberta Ralph Klein dies in Calgary, Alberta, Canada, at the
    age of 70. (CTV News)
  Religion:
  - Christians across the globe celebrate Good Friday. (AP via Toledo Blade)
  Science and technology:
  - 'Soyuz TMA-08M: A Soyuz spacecraft docks with the International Space Station
    after being in orbit for less than six hours, setting a record, in a test conducted
    to reduce the time crew members have to spend in the ferry craft. (CBS News)'
  - Scientists from New Jersey Institute of Technology’s Swarm Lab announce that they
    have created robotic ants that behave very similarly to real ants. (National Geographic)
  Sport:
  - American professional wrestler Reid Flair dies at age 25 from unknown causes.
    (Los Angeles Times)
  - In horse racing, Kentucky Derby winner Animal Kingdom wins the 2013 Dubai World
    Cup. (BBC)
