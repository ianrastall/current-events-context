Date: '2013-03-01'
Source_URI: Portal:Current events/2013 March 1
Intelligence_Payload:
  2013 Bangladesh protests:
  - The death toll in Bangladesh rises to 44 as protests continue following the sentencing
    of Delwar Hossain Sayeedi. (The New York Times)
  2013 Lahad Datu standoff:
  - At least 14 people die in Malaysia's Sabah province when rebels open fire on government
    security forces. (BBC)
  Northern Mali conflict:
  - One of Islamist organization al-Qaeda's most feared commanders in Africa, Abdelhamid
    Abou Zeid, is killed by Chadian forces in Northern Mali. (Voice of America) (Reuters)
    (BBC)
  Business and economy:
  - China's Purchasing Managers Index declines to 50.1 indicating a possible slowdown
    in the Chinese economy. (The Australian)
  Health and environment:
  - A study concludes that clogged arteries around the heart are a risk factor for
    brain injury from stroke. (US News & World Reports)
  - An environmental study finds that 100 million sharks are killed by fishermen each
    year. (National Geographic)
  Law and crime:
  - 'Death of Mido Macia: Eight South African policemen are arrested on suspicion
    of murder after dragging a Mozambican man behind their police van earlier in the
    week. (BBC) (Reuters)'
  - Myanmar drug lord and convicted murderer Naw Kham is executed by lethal injection
    in Kunming, Yunnan Province, China. (Xinhua)
  - Google wins a copyright case in the German Bundestag over whether they can put
    news stories on their website without having to pay. (Bloomberg) (PC Magazine)
  Politics and elections:
  - '2013 Sequestration: A budget sequestration comes into effect today in the United
    States Government. (The Guardian) (Bloomberg)'
  - British Prime Minister David Cameron says he will "win people back" after his
    party, the Conservatives came third in the Eastleigh by-election behind the Liberal
    Democrats and UK Independence Party. (BBC)
  Science and technology:
  - 'SpaceX CRS-2: The SpaceX Falcon 9 supply rocket launches from Cape Canaveral
    SLC-40 as scheduled, but encounters problems once in orbit. (Los Angeles Times)'
  - Boston Dynamics upgrades the prototype United States Army robot BigDog with an
    arm strong enough to hurl cinderblocks. (PC Magazine) (NBC)
  Sport:
  - Juventus stays six points clear at the top of the 2012–13 Serie A after earning
    a 1–1 draw at second-place Napoli. (CNN) (Goal.com)
  - In golf, Northern Irish player Rory McIlroy abruptly quits 2013 The Honda Classic
    mid-round. (Fox Sports)
