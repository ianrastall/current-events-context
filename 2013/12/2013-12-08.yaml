Date: '2013-12-08'
Source_URI: Portal:Current events/2013 December 8
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - At least 30 people are killed as a result of car bombings in Iraq. (Reuters via
    IOL)
  International relations:
  - South Korea announces that it will expand its air defense zone in response to
    a recent move by the People's Republic of China. (Fox News)
  Law and crime:
  - Riots break out in Singapore after a fatal accident in Little India. This is the
    second riot in post-independence Singapore, and the first in over forty years.
    (BBC) (Channel NewsAsia)
  2013 elections in India:
  - The Indian National Congress lose the Delhi and Rajasthan assembly elections and
    the Bharatiya Janata Party retain the Madhya Pradesh and Chhattisgarh legislative
    assemblies, while gaining a majority in the Rajasthan assembly. (Yahoo! News)
  2013 Thai protests:
  - The Thailand Opposition vows to resign en masse after weeks of protest. (BBC)
  Euromaidan:
  - During the third Sunday of mass protests, hundreds of thousands of Ukrainians
    in Kiev seek the resignation of the government for refusing a deal on closer ties
    with the European Union. BBC News
  - Anti-government protesters topple the last surviving statue of Communist leader
    Vladimir Lenin in central Kiev. (CNN)
