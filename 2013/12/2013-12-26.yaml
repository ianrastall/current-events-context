Date: '2013-12-26'
Source_URI: Portal:Current events/2013 December 26
Intelligence_Payload:
  Central African Republic conflict under the Djotodia administration:
  - Six peacekeepers from Chad are killed in clashes in the Central African Republic.
    (BBC)
  Syrian Civil War:
  - Syrian government forces and rebel fighters in a besieged Damascus suburb agree
    to a 48-hour truce that could result in food being allowed in for residents threatened
    with starvation. (Reuters)
  Israeli–Palestinian conflict:
  - The Israeli Air Force launches airstrikes on targets in the Gaza Strip after Palestinians
    fire a rocket from Gaza at the Eshkol region in southern Israel. (The Times of
    Israel)
  Business and economy:
  - Shipping companies United Parcel Service and FedEx apologize for late Christmas
    package deliveries in the United States, citing high volumes of packages. (CNN)
  - The Reserve Bank of India warns users of risks involved in virtual currencies
    such as Bitcoin and Dogecoin. (T.I.P. News)
  Disasters and accidents:
  - Thousands of customers are still without power across Michigan, Vermont, Maine,
    and Southern Ontario after a winter storm earlier this week. (CNN)
  International relations:
  - Japanese Prime Minister Shinzo Abe visits the Yasukuni Shrine. The location is
    controversial because it enshrines many war criminals from World War II. The visit
    provokes condemnation from China and South Korea and criticism from the United
    States. (The New York Times)
