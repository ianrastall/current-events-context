Date: '2013-12-15'
Source_URI: Portal:Current events/2013 December 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sixteen people die in a clash near the city of Kashgar in China's restive Xinjiang
    province. (BBC)
  War in Afghanistan (2001–2021):
  - The last Australian combat troops leave Afghanistan. (BBC)
  Arts and culture:
  - British and American actress Joan Fontaine, best known for her two roles under
    Alfred Hitchcock (Rebecca, Suspicion), and the sister of Olivia de Havilland,
    dies at the age of 96. (Hollywood Reporter)
  Law and crime:
  - A carjacking resulted in the death of a Hoboken lawyer who was murdered in front
    of his wife while returning to his vehicle after shopping. (NBC New York)
  Politics and elections:
  - Voters in Chile go to the polls for the second round of a presidential election
    with former President Michelle Bachelet elected again. (BBC), (Sky News Australia)
  Death and state funeral of Nelson Mandela:
  - The body of Nelson Mandela is buried after a state funeral is held in his ancestral
    home of Qunu. (BBC)
  Euromaidan:
  - U.S. Senator John McCain joins protesters in Kiev and accuses Moscow of intervening
    in the internal politics of the country. (CNN)
  Sports:
  - 'The WWE Champion Randy Orton defeat World Heavyweight Champion John Cena to become
    the WWE World Heavyweight Champion, thus unifying both titles at TLC: Tables,
    Ladders & Chairs (2013)'
