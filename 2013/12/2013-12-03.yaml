Date: '2013-12-03'
Source_URI: Portal:Current events/2013 December 3
Intelligence_Payload:
  Law and crime:
  - Russian ballet dancer Pavel Dmitrichenko is convicted of organizing an acid attack
    on Sergei Filin, artistic director of the Bolshoi Theatre. (BBC)
  - An inquiry into the 1989 Jonesborough ambush finds that members of the Garda Síochána
    colluded with the IRA in the shooting of two RUC officers as they crossed the
    Irish border. (BBC)
  - A leaked French report on the cause of Yasser Arafat's death says he died of an
    infection. A Swiss inquiry had said polonium poisoning was most likely. (AFP)
    (BBC) (LA Times)
  Politics and elections:
  - Romanian President Traian Băsescu sparks a new crisis by refusing to sign the
    country's IMF accord and threatens Prime Minister Victor Ponta's government with
    rejecting the national budget, blocking important indexations of salaries and
    pensions for the following year, over an ongoing political feud between the two
    leaders. (Bloomberg)
  - Reports from South Korea claim that prominent North Korean powerbroker Jang Sung-taek
    has been sacked as the Vice-chairman of the National Defence Commission. (BBC)
  2013 Thai protests:
  - Thai police say that they will not resist protesters seizing the Bangkok police
    headquarters. (Reuters Trust)
  2013 Ukraine pro-European Union protests:
  - The Government of Prime Minister of Ukraine Mykola Azarov easily survives a no-confidence
    motion amid continuing protest against the decision of Azarov and President Yanukovych
    to back away from stronger ties with the European Union. However, the Government
    is in danger of not surviving a similar motion tomorrow. (Euronews)
  Science and technology:
  - An extremely well-preserved baby Chasmosaurus dinosaur fossil has been unearthed
    in Alberta, Canada. (Postmedia News via Canada.com)
  Health and medicine:
  - Researchers at Albert Einstein College of Medicine at Yeshiva University in New
    York City have found that a modified version of the leukemia treatment radioimmunotherapy
    can kill latent HIV cells, possibly providing a cure for one of the world's deadliest
    diseases. (NBC)
