Date: '2013-12-28'
Source_URI: Portal:Current events/2013 December 28
Intelligence_Payload:
  Conflicts and attacks:
  - Islamist protests in Egypt (July 2013–present)
  - Supporters of the Islamist Muslim Brotherhood clash with police at Al-Azhar University
    in Cairo, Egypt. One person is killed and two campus buildings are set on fire.
    (BBC)
  - 2013 Thai political crisis
  Syrian Civil War:
  - A Syrian army airstrike in a market in the northern city of Aleppo kills 25 people.
    (Reuters), (CNN)
  - Unidentified gunmen open fire on peaceful protesters in Thailand, leaving one
    dead and three wounded. (CNN)
  Disasters and accidents:
  - An express train catches fire in India, leaving at least 23 dead. The train was
    traveling from Bangalore to Nanded in the western state of Maharashtra. (AP via
    FOX News)
  - A 5.8-magnitude earthquake strikes in the Mediterranean Sea, 50 miles (80 kilometers)
    south southwest of Avsallar, Turkey. (USGS) (CNN)
  - The Chinese icebreaker Xuě Lóng, or "Snow Dragon", was only six nautical miles
    away from the Russian-flagged vessel Akademik Shokalskiy when it too became obstructed
    by heavy ice in Antarctica. (CNN)
  Science and Technology:
  - Russia's Soyuz-2-1v rocket makes its maiden flight. (RIA Novosti) (Reuters)
  - Four new species of sea creatures discovered at a cold seep on the seabed near
    Rockall (BBC) (Courier)
  In mixed martial arts:
  - Chris Weidman defeats Anderson Silva via technical knockout to retain the UFC
    Middleweight Championship. (GMA News)
  - Ronda Rousey defeats Miesha Tate by submission to win the UFC Women's Bantamweight
    Championship. (USA Today)
