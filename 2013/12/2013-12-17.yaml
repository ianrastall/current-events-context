Date: '2013-12-17'
Source_URI: Portal:Current events/2013 December 17
Intelligence_Payload:
  Arts and culture:
  - Cat Stevens, Hall & Oates, Kiss, Linda Ronstadt, and Nirvana are to be inducted
    into the Rock and Roll Hall of Fame. (Variety)
  - Bea Rose Santiago of the Philippines is crowned Miss International 2013. (International
    Business Times)
  - Jamaican reggae singer Tessanne Chin wins Season 5 of the American singing competition
    The Voice. (Los Angeles Times)
  Business and economy:
  - Target refuses to sell the album Beyoncé after it was flash released by the artist.
    (USA Today)
  - Several prominent Turkish businessmen and the sons of three cabinet ministers
    are arrested as part of an investigation into alleged bribery and corruption.
    (BBC) (Reuters)
  - American businessman Jacob Ostreicher escapes Bolivia two years after being imprisoned
    without charge. (BBC)
  Disasters and accidents:
  - Six American troops die after their helicopter crashes in Afghanistan. (Fox News)
  Law and crime:
  - Two British women, called the Peru Two, are sentenced to six and a half years
    imprisonment in Lima, Peru, for drug smuggling.(Sky News)
  - A gunman is dead after shooting and killing one person and wounding two others
    at the Renown Regional Medical Center in Reno, Nevada, United States. (Washington
    Post)
  - British singer Harry Styles, with the boy band One Direction, wins a limited ban
    on stalking in a London court case against paparazzi regarding the privacy rights
    of celebrities. (The Guardian)
  International relations:
  - India orders diplomatic repercussions against the United States over the arrest
    and alleged maltreatment of the consul Devyani Khobragade in New York City. (BBC)
  - Edward Snowden offers Brazil information over the NSA spying of its citizens.
    (ABC News)
  - A report by the American nonprofit investigative news organization The Center
    for Public Integrity details that the U. S. Federal Election Commission was hacked
    by China during the October 2013 federal government shutdown. (CNN)
  - U.S. Secretary of State John Kerry intends to give the Philippines $40 million
    in order to boost its maritime security regarding territorial disputes with China.
    (The New York Times)
  Euromaidan:
  - President of Ukraine Viktor Yanukovych meets Russian President Vladimir Putin
    in Moscow amid mass protests against the relationship between the two. (Bloomberg)
  - Russia agrees to reduce prices on gas exports to Ukraine and purchase 11 billion
    Euros worth of Ukrainian government bonds. (Reuters)
  Politics and elections:
  - Angela Merkel is elected for a third term as Chancellor of Germany. (CNN)
  - Japan intends to increase spending for the Japan Self-Defense Forces and transform
    it into a modern military. (BBC)
  Science and technology:
  - Snow falls in Sa Pa, Vietnam. (The Straits Times)
  The Ashes:
  - Australia wins the third test at the WACA, taking an unbeatable 3-0 lead over
    England in the 2013–14 Ashes series played in Australia. (BBC)
