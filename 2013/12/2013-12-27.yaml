Date: '2013-12-27'
Source_URI: Portal:Current events/2013 December 27
Intelligence_Payload:
  Syrian Civil War spillover in Lebanon:
  - A car bomb explodes in the Central District of Beirut, Lebanon, killing eight
    people, including the former ambassador to the U.S. Mohamad Chatah, and wounding
    71 others. (CNN)
  Somali Civil War (2009–present):
  - Five soldiers and a military officer are killed in an explosion in the Somali
    capital Mogadishu. (BBC)
  War in Afghanistan (2001–2021):
  - A suicide bomber attacks a foreign military convoy on the eastern outskirts of
    the Afghan capital, Kabul, killing at least three foreign soldiers, police and
    the NATO-led International Security Assistance Force. (Reuters)
  Islamist protests in Egypt (July 2013–present):
  - Three people are killed in clashes between police and Muslim Brotherhood supporters
    across Egypt. (BBC)
  Disasters and accidents:
  - At least 29 people died and four others were seriously injured when a bus went
    off the Huay Tong Bridge in Phetchabun Province, Thailand. (CNN)
  International relations:
  - Okinawa prefecture's Gov. Hirokazu Nakaima has approved a measure to allow for
    the relocation of a controversial U.S. military base on Okinawa, breaking 17 years
    of stagnation on the base's transfer plan. (CNN)
  Law and crime:
  - Authorities are investigating a reported heart attack of Joaquín "El Chapo" Guzmán,
    Mexico's and the world's most-wanted man, suffered in November. (San Diego Red)
  - U.S. District Judge William Pauley rules that the country's National Security
    Agency (NSA) acted lawfully, within the limits of the U.S. Constitution, when,
    after the September 11, 2001 attacks, it began an en masse bulk collection of
    metadata from American telephone records. The opinion, which throws out an ACLU
    lawsuit for now, is in contrast to Judge Richard Leon's earlier ruling in another
    district. (NBC) (CNN)
  - The Connecticut State Police releases the full report of the Sandy Hook Elementary
    School shooting. (CNN)
