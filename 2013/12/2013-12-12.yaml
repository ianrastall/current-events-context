Date: '2013-12-12'
Source_URI: Portal:Current events/2013 December 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - An air strike intended to target an al Qaeda convoy in Al-Bayda province in central
    Yemen mistakenly attacks a wedding procession, killing 15 civilians. (Reuters)
  Extrajudicial killings and forced disappearances in the Philippines:
  - Human Rights Watch and the Committee to Protect Journalists criticize the administration
    of Philippine President Benigno Aquino III for his failure to protect journalists
    after the deaths of at least 12 in 2013. (Time) (CPJ)
  Arts and culture:
  - The nominees for the 71st Golden Globe Awards are announced. (NPR)
  - Paul Walker's private funeral is to be held on the weekend. (People)
  Business and economy:
  - Four former Icelandic bank bosses are jailed over concealing illegal activities
    within the bank Kaupthing. (BBC)
  - Mexico's Congress passes a bill that will allow foreign investment in its state-run
    oil company, Pemex. The measure still requires the approval of a majority of the
    country's federal entities.
  Disasters and accidents:
  - An ammonia cooling pump on the International Space Station malfunctions, requiring
    suspension of some non-critical systems. (CNN)
  International relations:
  - The United States announces that it will enforce sanctions on more than two dozen
    companies who assisted Iran with its nuclear program. (AP via ABC News America)
  Law and crime:
  - Jang Sung-thaek, the uncle of North Korean leader Kim Jong-un, is executed. (Reuters)
  - Australia's High Court rules same-sex marriages held in the country are invalid.
    (Businessweek)
  - The United Nations says that the legalization of marijuana in Uruguay is a violation
    of international law. (The Huffington Post)
  - Bangladesh hangs Abdul Kader Mullah, a leader of the Bangladesh Jamaat-e-Islami,
    for committing atrocities in the Bangladesh Liberation War in 1971. (BBC)
  - The United States Federal Motor Carrier Safety Administration, the federal bus
    safety regulator, shuts down 52 busline companies in a major nationwide crackdown
    on unsafe outfits. (Associated Press via Daily Finance)
  Politics and elections:
  - Tassaduq Hussain Jillani takes the oath as the new chief justice of Pakistan.
    (The Express Tribune)
  - Republican Speaker John Boehner forcibly responds to attacks by previously-supportive
    conservative groups, due to their opposition to a bipartisan budget. (Los Angeles
    Times)
  Euromaidan:
  - Sanctions are being considered by the United States against Ukraine after the
    recent violent dispersal of protests. (BBC)
  Death and state funeral of Nelson Mandela:
  - The body of Nelson Mandela is lain-in-state in the federal government district
    of Pretoria. (The Washington Post)
  2013 Thai political crisis:
  - Former Prime Minister Abhisit Vejjajiva is charged with murder for his role in
    the 2010 Thai political protests. (BBC)
  Catalan self-determination referendum:
  - The government of Spain announces that it will block the holding of a referendum
    in Catalonia. (BBC)
