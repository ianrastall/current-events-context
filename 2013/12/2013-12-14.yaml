Date: '2013-12-14'
Source_URI: Portal:Current events/2013 December 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - A car bombing in the Malian town of Kidal kills two United Nations peacekeepers.
    (BBC)
  - Philippine President Benigno Aquino III downplays the significance of the recent
    surge of violence against journalists in the country after three deaths. (Inquirer)
  - A grenade is thrown onto a bus in Nairobi, Kenya, killing at least four people
    and injuring 15 others. (BBC)
  Arts and culture:
  - British actor Peter O'Toole, best known for his role in Lawrence of Arabia, dies
    at the age of 81 after a long illness. (AP via Yahoo! News)
  Politics and elections:
  - Death and state funeral of Nelson Mandela
  - The remains of Nelson Mandela are flown to the province of Eastern Cape, a day
    before his state funeral is held in Qunu. (BBC)
  - A mass protest is held in Bogotá, Colombia, in protest against the unseating of
    Mayor Gustavo Petro. (BBC News)
  - The Social Democratic Party of Germany agrees to join a coalition government led
    by Chancellor Angela Merkel. (France 24)
  2013 Tunisian protests:
  - Tunisian politicians select Mehdi Jomaa as the acting Prime Minister of Tunisia
    until new elections are called. (BBC)
  Chang'e 3:
  - China's mission carrying Yutu, China's first lunar rover, lands on the Moon. It
    is the first "soft" landing on the Moon since 1976 and the third ever robotic
    rover. (Reuters)
  American football:
  - Jameis Winston, quarterback for the Florida State Seminoles, wins the 79th Heisman
    Trophy for the most outstanding player in college football. (USA Today)
