Date: '2013-12-01'
Source_URI: Portal:Current events/2013 December 1
Intelligence_Payload:
  Armed conflict and attacks:
  - 2013 Thai protests
  - Anti-government protests cause the Prime Minister of Thailand Yingluck Shinawatra
    to flee to a secret location as a pro-Thai government protester is killed. (The
    Guardian)
  - Euromaidan
  - Syrian civil war
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide bombing at a funeral kills at least 17 people in Baqubah, Iraq. (Al
    Jazeera)
  - 100,000 people continue their protest against president Yanukovych's decision
    to back away from stronger ties with the European Union. (Ria Novosti) (Deutsche
    Welle)
  - Casualties are reported after clashes between protesters and police in Kiev. (BBC)
  - Protesters storm the Kiev City Council buildings. (BBC)
  - Syrian Air Force helicopters bombard the northern rebel-held town of Al-Bab for
    a second day, killing 20 people. (Reuters)
  Disasters and accidents:
  - At least four people are killed following a Metro-North Railroad train derailment
    near Spuyten Duyvil, The Bronx, New York City. (CNN)
  Croatian constitutional referendum, 2013:
  - Voters in Croatia go to the polls for a referendum on a proposal to outlaw same-sex
    marriage with 65 per cent voting yes. (Sky News)
  Science and technology:
  - Comet ISON breaks up into a cloud of debris after skimming the Sun. (NBC)
  - China launches the Chang'e 3 lunar probe incorporating a robotic lander and Jade
    Rabbit rover. (Reuters via India Today)
  Sport:
  - Assem Allam, the Egyptian-born businessman and owner of Premier League club Hull
    City, tells the club's fans, whom he refers to as "hooligans", that they can "die
    as soon as they want" following protests against his plans to rename the club
    Hull Tigers. (ITV News) (Daily Mail)
