Date: '2013-12-22'
Source_URI: Portal:Current events/2013 December 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - An alert passenger averts a mass casualty bus bombing
  - A bomb explodes on a bus in Bat Yam, Israel, but an alert passenger averts a mass
    casualty incident after noticing the device and the bus driver orders the vehicle
    evacuated. (The Times of Israel)
  Syrian Civil War:
  - Syrian government warplanes drop barrel bombs on the city of Aleppo killing 63
    people, including civilians. (World Bulletin)
  Post-civil war violence in Libya:
  - 13 people are killed and 10 injured in a suicide car bomb attack at a military
    checkpoint near the eastern Libyan city of Benghazi. (Financial Times) (Los Angeles
    Times)
  Business and economy:
  - Blackmarket sales begin of credit and debit card data which was compromised due
    to a Target Corporation data breach. (Fox News)
  Disasters and accidents:
  - At least ten people are injured but no deaths after a cargo train crashed into
    the Nairobi slum of Kibera. (BBC) (Standard Media)(Zegabi)
  Euromaidan:
  - Ukraine's opposition vows to continue the pro-EU protests over the holiday period,
    despite an economic deal signed with Russia a few days ago. (BBC)
