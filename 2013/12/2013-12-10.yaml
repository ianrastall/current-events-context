Date: '2013-12-10'
Source_URI: Portal:Current events/2013 December 10
Intelligence_Payload:
  Central African Republic conflict under the Djotodia administration:
  - Two French soldiers die in overnight fighting in the capital Bangui. (BBC)
  Maguindanao massacre:
  - The Supreme Court of the Philippines issues guidelines in order to hasten a resolution
    for the trial. (Channel News Asia)
  Death and state funeral of Nelson Mandela:
  - The life of Nelson Mandela is celebrated in a memorial service in Johannesburg.
    (BBC)
  - Barack Obama and Raul Castro exchange handshakes despite a United States embargo
    against Cuba. (ABC News)
  - Dilma Rousseff and Barack Obama greet each other in spite of revelations of spying
    on the Brazilian leader in the Global surveillance disclosures. (ABC News)
  Business and economy:
  - Mary Barra of General Motors becomes the first female CEO of an automotive company.
    (Businessweek)
  International relations:
  - The United States National Security Agency played World of Warcraft, Second Life,
    and games on the Xbox 360 to spy on gamers. (CNN)
  Al-Qaeda insurgency in Yemen:
  - The Philippines bans its workers from Yemen after the deaths of seven Filipinos
    there. (Huffington Post)
  Law and crime:
  - Jean-Claude Mas, the founder of Poly Implant Prothèse is sentenced in a French
    court to four years in prison for fraud for selling faulty breast implants. (France
    24)
  - Looters in Argentina kill at least five people as mobs take advantage of strikes
    by police demanding pay raises. (USA Today)
  Politics and elections:
  - Uruguay becomes the first country to legalize the growth, sale, and use of marijuana.
    (Reuters)
  2013 Thai political crisis:
  - In Thailand, there are thousands of protesters in Bangkok. The opposition Democrat
    Party resigns en masse. (BBC)
