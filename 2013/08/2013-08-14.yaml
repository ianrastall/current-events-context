Date: '2013-08-14'
Source_URI: Portal:Current events/2013 August 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Bahrain police fire tear gas to disperse protesters in response by activist for
    pro-democracy demonstrations. (Reuters), (Ahram)
  - Rockets are fired from Gaza at civilians in the Sha’ar HaNegev regional council,
    in response an Israeli Air Force airstrike targeted concealed rocket launchers
    in the Northern Gaza Strip.(The Australian)(The Times of Israel) (International
    Business Times)
  Aftermath of the 2013 Egyptian coup d'état:
  - Hundreds are reported dead - including 43 police - across Egypt as security forces
    disperse two pro-Morsi sit-ins; one at Rabaa Square and one at al-Nahda Square.
    (Al Jazeera) The civilian death toll according to Human Rights Watch was a minimum
    of 817. (The Guardian)
  - Egypt declares a one month state of emergency. (BBC)
  - Egyptian Vice President Mohamed ElBaradei resigns to protest the killing of protesters
    by security forces. (Associated Press)
  Nigerian Sharia conflict:
  - Two Boko Haram commanders Mohammad Bama and Abubakar Zakariya Yau are killed by
    the Nigerian army in a gun battle in the north-east Adamawa State. (Sky News)
  Iraqi insurgency (post-U.S. withdrawal):
  - Two roadside bombs explode in the Iraqi city of Baqubah killing 14 and wounding
    26 people. (Reuters)
  Business and economy:
  - The Eurozone moves out of 18 months of recession because of Germany and France.
    There was a growth rate of 0.3% in the June quarter. (BBC) (The Guardian)
  - American networking equipment Cisco Systems announces plans to cut 4000 jobs.
    (Reuters) (Fox News)
  Disasters and accidents:
  - The Indian submarine INS Sindhurakshak (S63) sinks in Mumbai following a pair
    of onboard explosions killing 18 Indian Navy sailors. (Washington Post)
  - A UPS cargo plane crashes at Birmingham–Shuttlesworth International Airport in
    Alabama, killing both the pilot and co-pilot. (Alabama 13) (Reuters)
  International relations:
  - '2013 Korean crisis: North and South Korea agree to reopen the jointly-operated
    Kaesong Industrial Region. (Reuters)'
  Law and crime:
  - San Francisco police seize $1.5 million in ecstasy in one of the largest busts
    in department history.(San Jose Mercury News)
  Health:
  - A group of researchers led by a team at the University of Milan unveils a device
    which uses a magnetic pulse to stimulate the brain and measure the resulting electrical
    waves in order to more accurately assess the remaining level of brain function
    and consciousness in brain-damaged individuals. (NBC) (Bloomberg)
  Science and technology:
  - Nova Delphinus 2013, now visible to the naked eye in dark sky conditions, is reported
    in the constellation Delphinus by amateur astronomer Koichi Itagaki. (Sky and
    Telescope)
