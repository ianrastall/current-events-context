Date: '2013-08-10'
Source_URI: Portal:Current events/2013 August 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen kidnap four Thai tourists traveling in Nigeria's Rivers State. (Reuters)
  - A bomb kills four people and wounds 16 in a park south of Baghdad, Iraq. (ABC
    News)
  - An American drone strike kills two suspected Al Qaeda in the Arabian Peninsula
    militants in southern Yemen. (BBC News)
  - Saudi authorities arrest two men suspected of planning suicide attacks. (CNN)
  Disasters and accidents:
  - The volcano Paluweh erupts on Palu'e island in Indonesia killing at least six
    people. (BBC News), (AP)
  - A bus accident in Al Hoceima, Morocco, kills at least 16 Royal Guardsmen. (BBC
    News)
  - Floods and mudslides in Manitou Springs, Colorado, United States leave at least
    three people missing and one dead. (CNN)
  Law and crime:
  - A total of 56 police officers are injured in Belfast, Northern Ireland after a
    night of Ulster loyalism rioting. (BBC News)
  - James Lee DiMaggio, a suspect in the Boulevard, California murders of Christina
    and Ethan Anderson, and the abduction of Hannah Anderson, is shot to death by
    an FBI agent in Ada County, Idaho. Hannah Anderson was unharmed. (CNN)
  Sports:
  - The 2013 World Championships in Athletics start in Moscow's Luzhniki Stadium.
