Date: '2013-08-04'
Source_URI: Portal:Current events/2013 August 4
Intelligence_Payload:
  Armed conflict and attacks:
  - Worldwide embassy closings
  - The United States closes 22 embassies in the Middle East and North Africa due
    to intelligence of an Al-Qaeda attack. (CNN)
  - Canada closes its embassy in Bangladesh amid terror threats. (Toronto Sun)
  - Britain, France and Germany close their embassy in Yemen amid terror threats.
    (BBC)
  - Tunisia kills one suspected terrorist and captures another six in an early morning
    raid in Tunis' neighbourhood. (AP via Philly)
  Arts and culture:
  - Scottish actor Peter Capaldi is announced to portray the twelfth incarnation of
    the Doctor on the long-running British science fiction show Doctor Who. (The Guardian)
  Politics and elections:
  - Hassan Rouhani is officially inaugurated as President of Iran in the House of
    the Parliament and announces the members of his cabinet to the parliament. (Aljazeera)
    (Dailystar) (Reuters)
  - Voters in Australia will go to the polls on September 7 for a federal election.
    (The Age)
