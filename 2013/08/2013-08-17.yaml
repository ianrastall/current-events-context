Date: '2013-08-17'
Source_URI: Portal:Current events/2013 August 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  Mexican Drug War:
  - Gulf Cartel leader Mario Ramírez Treviño is arrested in the state of Tamaulipas.
    (Reuters)
  Political violence in Egypt:
  - Egyptian security forces clear a Cairo mosque after a long stand-off with the
    Muslim Brotherhood. (Reuters), (BBC)
  - Egyptian Prime Minister Hazem Al Beblawi proposes the legal dissolution of the
    Muslim Brotherhood. (Reuters)
  Syrian civil war:
  - Syrian rebels attack a militia checkpoint in Homs, killing 5 from the NDF militia
    but 6 civilians nearby as well. (Reuters)
  - A Syrian government warplane attack in Aleppo leaves at least 15 civilians dead.
    (New York Times)
  Nigerian Sharia conflict:
  - Clashes between Nigerian soldiers and Boko Haram Islamists kill 18 people in northeast
    Nigeria. (Reuters)
  - 10 people are killed in a camp by insurgents in western Afghanistan. (BBC)
  Business and economy:
  - The Indian rupee hits new record low against the US dollar. The rupee fell to
    62.85 rupees against the dollar. (Reuters)
  Disasters and accidents:
  - Residents evacuated from Greenhorn Gulch area in Idaho from the Beaver Creek fire.
    (CNN)
  - 31 people dead and at least 170 are missing as a ferry sinks after colliding with
    a cargo ship in Philippines.(BBC)
  - A wildfire erupts near Yosemite National Park, growing to 25 square miles (~65
    square kilometers) overnight.(KTVU)
  Law and crime:
  - While they are not yet ready to say they are reopening the case after the 2008
    inquiry jury's final verdict and report (faulty driving and unlawful killing),
    the Metropolitan Police Authority Specialist Crime and Operations Command in London
    is investigating the credibility and accuracy of supposedly new information from
    an unspecified source regarding the August 1997 Death of Diana, Princess of Wales.
    (NBC)
