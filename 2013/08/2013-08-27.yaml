Date: '2013-08-27'
Source_URI: Portal:Current events/2013 August 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - The Russian foreign ministry warned that an attack on the Syrian government could
    be "catastrophic" and told Western countries to show "prudence" over the crisis
    happening there. (France 24)
  - Syrian Foreign Minister Walid Muallem said he rejects "utterly and completely"
    that Syrian government forces used chemical weapons, while the U.S. and its allies
    prepare their forces for an alleged imminent attack, which is said to be "well
    defined in time and space", limited to targeting command and control, airfields
    and artillery. (BBC) (NBC)
  - French President François Hollande says France is "ready to punish" those responsible
    for the chemical attacks. (Fox News)
  - The Syrian government is believed to be behind the recent Tripoli bombings in
    Lebanon after a suspect confesses to Lebanese police. (Daily Star)
  - British Prime Minister David Cameron recalls the UK Parliament from its summer
    recess to discuss the UK's response to the chemical weapons attack. (BBC)
  - Russia has begun to evacuate its citizens from Syria. (Telegraph)
  Disasters and accidents:
  - The Rim Fire near Yosemite National Park has now grown to about 281 square miles.
    (Southern California Public Radio)
  Law and crime:
  - The riots between two religious communities started at Muzaffarnagar, Uttar Pradesh,
    India.Biharprabha
