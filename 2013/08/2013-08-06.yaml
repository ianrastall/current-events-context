Date: '2013-08-06'
Source_URI: Portal:Current events/2013 August 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2013 India–Pakistan border incidents: Five Indian Army soldiers are killed in
    an attack near the Pakistan border in the state of Jammu and Kashmir. (Reuters)'
  - Danish police evacuate part of central Copenhagen after a parked car is found
    with wires attached to it. (Reuters Trust)
  - Ten people are killed in a clash between rival drug cartels in Honduras. (BBC)
  - Yemeni tribesman shoot down an army military helicopter killing eight soldiers.
    (The Times of India)
  - Four suspected Al-Qaeda militants are killed in a drone strike. (Reuters)
  - Tunisian police shoot dead an Islamist Militant on the outskirt of the capital
    Tunis in a raid. (Reuters) (Daily Telegraph)
  2013 embassy closures:
  - The United States Department of State evacuates staff from the United States Embassy
    in Yemen due to an al-Qaida threat. (AP via NPR)
  Syrian civil war:
  - Syrian rebels capture Menagh Military Airbase in Aleppo near the Turkish border.
    (BBC), (CNN)
  - A car bomb kills 18 people and wounds 55 in a suburb in Damascus. (USA Today)
  - A chemical attack on Adra and Houma in the Damascus Suburbs is reported. (Israel
    National News)
  Iraqi insurgency (post-U.S. withdrawal):
  - 25 people are killed and 60 are wounded by car bombs near markets in Baghdad in
    Iraq. (Reuters)
  Disaster and accidents:
  - A gas explosion in an apartment block kills five people and injures a dozen in
    the Argentine city of Rosario. (USA Today)
  - A hot Air Balloon carrying an American family crashes killing one person and injures
    four in the Swiss town of Montbovon. (Huffington Post)
  Law and crime:
  - The trial of Major Nidal Malik Hasan, a former United States Army Medical Corps
    officer and the Gunman during the Fort Hood shooting, begins. (Washington Post)
  - The first execution by lethal injection is officially implemented in Viet Nam
    when 27-year-old Nguyễn Anh Tuấn is executed in Hanoi. (Vietnamnet)
  Politics and elections:
  - Tunisia's constituent assembly is suspended until the Islamist-led Government
    and secular opposition begin talks to resolve a Political crisis. (BBC)
  - Saudi king Abdullah appoints Prince Sultan bin Salman Al Saud as deputy Defense
    Minister. (Jerusalem Post)
