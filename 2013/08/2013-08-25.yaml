Date: '2013-08-25'
Source_URI: Portal:Current events/2013 August 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb explodes in a bus carrying Yemeni Air Force personnel to a base near the
    capital Sana'a, killing at least one officer and injuring others. (Reuters)
  Syrian civil war:
  - The Syrian government allows UN inspectors to visit the site of suspect chemical
    weapons attack outside the outskirt of Damascus. (BBC)
  Iraqi insurgency (post-U.S. withdrawal):
  - A wave of bomb attacks kill 41 people in Iraq. (BBC)
  Disasters and accidents:
  - The U.S. Federal Aviation Administration (FAA) begins an investigation into a
    6:30 AM EST crash of a small plane that caught fire in Taunton, Massachusetts,
    that is believed to have killed two people. (NBC)
  - Four people die and 35 are injured when the notorious tren de la muerte train
    derails in Huimanguillo, Tabasco, Mexico. (Russia Today) (El Universal)
  - The Rim Fire near Yosemite National Park is now estimated to have grown to the
    size of Chicago. (CBS News)
