Date: '2013-08-02'
Source_URI: Portal:Current events/2013 August 2
Intelligence_Payload:
  Syrian Civil War:
  - An ammunition depot explodes in Homs, Syria, killing at least 40 people and critically
    injuring many more. (Sentinel Source)
  Disasters and accidents:
  - The United States Food and Drug Administration names Taylor Farms as the source
    of cyclospora parasite tainted salads that sickened 223 diners in the US states
    of Nebraska and Iowa. (NBC News)
  International relations:
  - The United States Department of State announces a worldwide travel alert for U.S.
    citizens and some embassies throughout Southwest Asia and North Africa will be
    closed following an al-Qaeda threat. (CNN) (AP via Washington Post)
  - The UK Foreign Office has warned its embassy staff in Southwest Asia to be vigilant
    as Eid al-Fitr approaches. British embassies remained open. (WSJ)
  - In his Ramadan message to Muslims, Pope Francis calls for mutual respect. The
    message is timed for the Muslim feast of Eid al-Fitr, Since 1967, the Vatican
    has issued an annual greeting to the world’s Muslims on that date. (CNN)
  Politics and elections:
  - The Zimbabwe Electoral Commission says that Robert Mugabe's ZANU-PF party has
    won 142 seats of 210 seats in the general election. (BBC)
  - Samantha Power is sworn in as the new United States Ambassador to the United Nations
    by Vice President Joe Biden. (Wall Street Journal)
  - There will be a run-off election on August 11 in the Malian presidential election
    between Ibrahim Boubacar Keita and Soumaïla Cissé as no candidate could achieve
    a majority in the election held earlier this week. (Reuters)
  Science and technology:
  - A new primate, the Lavasoa dwarf lemur, is discovered in Madagascar. (Sci-News.com)
