Date: '2013-08-05'
Source_URI: Portal:Current events/2013 August 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb rigged to a vehicle kills eight people in Cotabato, Philippines. (ABC News
    via AP)
  War in Afghanistan (2001–2021):
  - A bomb explodes at a market in the Afghan city of Kandahar, killing at least four
    people. (BBC)
  Nigerian Sharia conflict:
  - 35 people - mostly Boko Haram militants - are killed in separate attacks on security
    forces in Borno State. (Reuters)
  Disasters and accidents:
  - US military helicopter crashed at a US Marine Camp Hansen in Japan's southernmost
    prefecture of Okinawa, killing 4 people and injuring 3 others. (NHK World)
  - More than 160 people are killed in flash floods across Afghanistan and Pakistan.
    (The Independent)
  - 55 people are hospitalized following a truck fire 3.5km into the Gudvanga Tunnel
    in Norway. (AP via News24)
  Law and crime:
  - Two people are killed and five are wounded in a shooting outside a taco restaurant
    in Salinas, California, U.S. It is believed to be gang-related. (San Francisco
    Chronicle)
  - Three people are killed and five are wounded in a shooting at a town hall meeting
    in Ross Township, Pennsylvania, U.S. (CNN)
  Media:
  - Amazon CEO Jeff Bezos purchases The Washington Post for $250 million.
  Politics and elections:
  - Opposition leader Enele Sopoaga is sworn in as Prime Minister of Tuvalu by Governor-General
    Iakoba Italeli after winning a secret ballot held in parliament. (Islands Business)
  Science:
  - The world's first bovine stem cells lab-grown burger is cooked and eaten at a
    news conference in London. (BBC)
  Sports:
  - In Major League Baseball, Alex Rodriguez of the New York Yankees is banned for
    211 games for his role in the Biogenesis baseball scandal with 12 other players
    given bans of 50 games. (Reuters via the Sydney Morning Herald)
