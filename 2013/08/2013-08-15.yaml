Date: '2013-08-15'
Source_URI: Portal:Current events/2013 August 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 20 people are killed and 200 injured in an explosion in southern Beirut
    near a complex used by Lebanon's militant group Hezbollah in Lebanon. A previously
    unknown Syrian Sunni group claims responsibility in an online video. (Al Jazeera)
  Aftermath of 2013 Egyptian coup d'état:
  - The death toll from the previous day's clashes climbs to 638. (Washington Post)
  - A government building is stormed and set on fire by the Muslim Brotherhood in
    Cairo. (Sky News) (The Independent)
  - President Barack Obama cancels joint military exercises between the United States
    and Egypt. (New York Times)
  International relations:
  - Hundreds of Palestinians are stranded by Egypt's "indefinite" closure of Rafah
    border crossing with Gaza Strip. (Huffington Post)(Times of Israel)
  - King Carl XVI Gustaf of Sweden and his wife, Queen Silvia of Sweden, are criticised
    after they received and wore, on their trip to Härnösand, Palestinian keffiyehs
    with a message in Arabic language purportedly meaning "Our Aqsa and not their
    temple". (Dagens industri via TT)
  Law and crime:
  - Aleksandar Cvetković is extradited to Bosnia-Herzegovina for trial regarding the
    1995 Srebrenica massacre. (Jerusalem Post)
  Politics and election:
  - The Parliament of Iran confirms Hassan Rouhani's cabinet. However, three designated
    ministers did not receive a vote of confidence, including Mohammad-Ali Najafi
    who was the Minister of Education-nominate. (Yahoo! News) (Reuters)
  - The Brazilian Chamber of Deputies passes a controversial bill regulating the allocation
    of royalties derived from that country´s oil exploration, when 75% of the money
    will only go to education and the other 25% only for health. (R7) (BBC)
  Sports:
  - Darren Young comes out as the first Openly gay wrestler in WWE. (WWE)
