Date: '2013-08-24'
Source_URI: Portal:Current events/2013 August 24
Intelligence_Payload:
  Syrian civil war:
  - Médecins Sans Frontières report treating 3,600 cases of "neurotoxic symptoms",
    with 355 fatalities. (BBC)
  Arts and culture:
  - The United States commemorates the fiftieth anniversary of Martin Luther King
    Jr.'s "I Have a Dream" speech. (CNN)
  - The United States Postal Service introduces a commemorative stamp for the event.
    (USPS)
  Disasters and accidents:
  - 4 people are confirmed killed in Friday's Super Puma L2 crash near Sumburgh Airport
    in the Shetland Islands. Operation of the helicopter model is globally suspended.
    (BBC)
  - 150 cases of food poisoning are confirmed to be cronuts contaminated with S. aureus
    at the CNE in Toronto, Ontario. (CBC)
  - '2013 Sudan floods: The WHO reports that floods in Sudan have affected 320,000
    people and killed almost 50 people. (al Jazeera)'
  - The Rim Fire near Yosemite National Park is reported as having grown to nearly
    200 square miles (~520 square kilometers). (Los Angeles Times)
  Law and crime:
  - 30 people are killed in gang battle in Palmasola prison in Santa Cruz, Bolivia
    from flame throwers used. (AP via News24)
  - A shooting spree in Gainesville, Florida kills 3 people, including the gunman,
    and injures 2 others. (CBS Sports)
  Sports:
  - The African Diaspora Maritime Corp. withdraws from the America's Cup amid controversy
    over being denied an opportunity to be the American defender in the competition
    based on ethnicity. (San Francisco Appeal)
