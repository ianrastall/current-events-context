Date: '2013-08-11'
Source_URI: Portal:Current events/2013 August 11
Intelligence_Payload:
  Armed conflict and attacks:
  - Suspected Al-Qaeda militants kill five Yemeni soldiers in an attack on a gas terminal
    in Southern Yemen. (BBC)
  - Syrian civil war
  War in Afghanistan (2001–2021):
  - Three U.S. soldiers are killed in an attack in Afghanistan's eastern Paktia province.
    (Al Jazeera)
  - Syrian officers reports that Syrian Army kills senior Saudi Arabian al-Qaeda commander
    Abu Malik al-Shahri, who is known as 'Bin Laden of Syria', in outskirt of Latakia.
    (PressTV)
  Disasters and accidents:
  - Flash floods in Afgahanistan's Kabul province kill 22 people. (BBC)
  - A coach crash in southern France kills two tourists and injures 30. (Euro News)
  Politics and elections:
  - Voters in Mali go to the polls for the second round of a presidential election.
    (BBC)
  - Australian Prime Minister Kevin Rudd and Leader of the Opposition Tony Abbott
    participate in the first of three televised leaders debates ahead of September's
    federal election. (BBC)
  - Argentina held the first round of legislative elections to renew half the Chamber
    of Deputies and one third of the Senate. The final round will be held October
    27. (Buenos Aires Herald) (Wall Street Journal)
  Sport:
  - American golfer Jason Dufner wins the 2013 PGA Championship played at the Oak
    Hill Country Club in Pittsford, New York. (The Australian)
  - Iran wins the 2013 FIBA Asia Championship over Philippines, 85-71. (Yahoo! Sports)
