Date: '2013-08-13'
Source_URI: Portal:Current events/2013 August 13
Intelligence_Payload:
  Arts and culture:
  - Footage of the isolated and previously unseen Kawahiva tribe is recorded for the
    first time in the Amazon rainforest, in Brazil. (GloboNews)
  - Frank DeAngelis, the longtime Columbine High School principal who led the school
    through the April 1999 Columbine High School massacre announces he will retire
    at the end of the 2013-14 school year. (MSN)
  Attacks and conflicts:
  - 'Sinai insurgency: Israel intercepts and destroys a Grad rocket fired by Mujahideen
    Shura Council al-Qaeda members from Egyptian territory at the Red Sea town of
    Eilat. (Daily Telegraph)'
  Law and crime:
  - American politician and former House Representative Jesse Jackson Jr. is sentenced
    to 30 months in prison for spending $750,000 in campaign funds on personal items,
    and will serve his sentence first before his wife, former Chicago alderman Sandi
    Jackson, who was given a one year term for tax fraud. (NBC)
  Business and finance:
  - The United States Department of Justice and six states file an antitrust lawsuit
    to block the proposed merger of American Airlines and US Airways. (CNN)
  International relations:
  - Israeli–Palestinian peace talks start amid controversy over Israeli settlement
    expansion and the release of 26 Palestinians convicted of murdering Israelis.
    (Reuters)
