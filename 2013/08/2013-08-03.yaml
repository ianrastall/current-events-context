Date: '2013-08-03'
Source_URI: Portal:Current events/2013 August 3
Intelligence_Payload:
  War in Afghanistan (2001–2021):
  - Nine children die in a suicide bombing near the Indian consulate in the Afghan
    city of Jalalabad. (CNN)
  Iraqi insurgency (post-U.S. withdrawal):
  - At least eight people have been killed in violence across Iraq. (AFP via Al-Aribya)
  Syrian civil war:
  - Syrian rebels capture an ammunition depot with anti-tank missiles and rockets
    north of Damascus. (Reuters)
  Disasters and accidents:
  - A man crashes his car into a crowd of pedestrians in Venice Beach, California,
    U.S., injuring eleven people and killing one. The driver fled the scene and was
    being sought by authorities, but later turned himself in. (CNN) (CBS Los Angeles)
  Law and crime:
  - 16-year-old Hannah Anderson was abducted after cheerleading practice from Sweetwater
    High School in National City, California. The suspect was later identified by
    authorities as 40-year-old James Lee DiMaggio, owner of a home in Boulevard, California.
    The bodies of her mother Christina and brother Ethan Anderson and the family's
    dog, Cali, were found in DiMaggio's burned home. DiMaggio was later killed by
    FBI agents during a shootout at the Frank Church River of No Return Wilderness
    in Idaho, where he had been camping with Hannah Anderson. (Los Angeles Times)
  Politics and elections:
  - Hassan Rouhani receives his presidential precept and enters to the Sa'dabad Palace
    to begin his work as President of Iran. (BBC) (theGuardian) (CNN)
  Zimbabwean general election, 2013:
  - Robert Mugabe is declared the run-away winner of Zimbabwe's controversial presidential
    election by a 61% majority, extending his 33-year rule. (AFP via News24)
  - Opposition candidate Morgan Tsvangirai promises legal challenges to the results
    and the refusal of the MDC-T party to cooperate with Mugabe's Zanu-PF. (The Independent)
  - A commissioner of the Zimbabwe Electoral Commission resigns, citing the conduct
    of the election process. (AllAfrica)
  Sport:
  - In rugby union, the Chiefs win the 2013 Super Rugby Final, defeating the Brumbies
    27-22 at Waikato Stadium in Hamilton, New Zealand. (Bleacher Report) (Sky News
    Australia)
