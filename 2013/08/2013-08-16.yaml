Date: '2013-08-16'
Source_URI: Portal:Current events/2013 August 16
Intelligence_Payload:
  Aftermath of 2013 Egyptian coup d'état:
  - Security in Cairo is tightened amid Friday prayers and protest marches called
    by the Muslim Brotherhood nationwide. (AlJazeera)
  - Ammar Badei, son of Mohammed Badie, the Muslim Brotherhood's leader, is killed
    in the clashes in Cairo.(NBC News) (Egypt Independent)
  Arts and culture:
  - Yemen changes its weekend from Thursday and Friday to Friday and Saturday. (Yemen
    Post)
  Business and economy:
  - The Indian rupee hits new record low against the US dollar. The rupee fell to
    62.03 rupees against the dollar. (BBC)
  Disasters and accidents:
  - A magnitude 6.5 earthquake strikes near Seddon, New Zealand, causing moderate
    damage in the wider Marlborough region and national capital Wellington. (Fairfax
    NZ)
  - The ferry collides with a cargo ship and sinks at Cebu, Philippines, with 200
    missing and least 26 dead. (World Maritime News) (BBC)
  International relations:
  - The Ministry of External Relations of Brazil rejects John Kerry´s official statement
    concerning that the electronic surveillance by the National Security Agency was
    part of a strategy to “combat terrorism”. (The Hindu)
  Politics and election:
  - Ali Akbar Salehi, former Iranian foreign minister, is appointed as head of Atomic
    Energy Organization of Iran. (IRNA)
  Technology and science:
  - The infamous Area 51 is officially acknowledged by the United States. (CNN)
  Law and crime:
  - Australian native and East Central University (Oklahoma) Tigers senior baseball
    player Christopher Lane, 22, is shot and killed in Ada, Oklahoma, while jogging
    during a visit to his girlfriend. Two teenagers, James Francis Edwards, Jr., 15,
    and Chancey Allen Luna, 16, were then arrested and charged with first-degree murder
    with no bail; Michael Dewayne Jones, 17, was charged with being an accessory to
    murder after the fact. They stated they did it purely out of boredom. (NBC)
