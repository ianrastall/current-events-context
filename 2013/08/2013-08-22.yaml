Date: '2013-08-22'
Source_URI: Portal:Current events/2013 August 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Five civilians are wounded by mortar fire in the Congo city of Goma. (ABC News)
  War in North-West Pakistan:
  - 5 Taliban militants are killed in bomb attack in South Waziristan. (The News Pakistan)
  Iraqi insurgency (post-U.S. withdrawal):
  - Fourteen people are killed by a suicide bomber in a military headquarters in Western
    Iraq. (Reuters)
  Business and economy:
  - The American electronic stock exchange NASDAQ shuts down for 3 hours due to a
    computer problem. (FOXBusiness)
  Disasters and accidents:
  - Severe tropical storm Trami arrives in southern China after killing seventeen
    people in the Philippines. (AP via Charlotte Observer)
  - At least 50 are injured in bus crash in Monterey Park, California. (NBC)
  - The Rim Fire, in Yosemite National Park forces evacuations. (NBC)
  Law and crime:
  - The UK government's independent reviewer of terrorism laws is to probe the arrest
    of David Miranda. (BBC)
  Politics and elections:
  - Tunisian Islamists agree in principle with a transition plan to hold new elections.
    (Reuters)
  - Former Egyptian President Hosni Mobarak is released from Tora prison and transferred
    to a military hospital. (Los Angeles Times)
  Sports:
  - Russian adventurer and priest Fyodor Konyukhov announces plans to cross the Pacific
    Ocean in a rowing boat from Valparaíso, Chile to Australia’s eastern coast. (Voice
    of Russia)
  - Former New England Patriots tight end Aaron Hernandez is indicted for the murder
    of 27-year-old Odin Lloyd. (ESPN)
