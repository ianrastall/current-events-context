Date: '2013-08-07'
Source_URI: Portal:Current events/2013 August 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Six suspect Al-Qaeda militants are killed in a drone strike in Southern Yemen.
    (Reuters)
  - Yemen authorities foil an Al-Qaeda plot to blow up the oil pipelines and seize
    some of the country's main ports. (BBC) (Radio Free Europe Radio Liberty)
  - Four Israeli soldiers are wounded by a landmine near the Lebanese border. (Al
    Jazeera) (Xinhua) (The Times of Israel)
  - One person is killed and 62 are injured in clashes between supporters and opponents
    of ousted President Mohamed Morsi (Xinhua)
  - A bombing in a market in Karachi, Pakistan, kills eleven people, mostly teenagers.
    (Reuters)
  Syrian civil war:
  - The Syrian Army launches a large missile on the southern Damascus neighborhood
    of Yarmouk, largely inhabited by Palestinian refugees. (Now Lebanon)
  Business and economy:
  - President Barack Obama affirms that the US will attend the upcoming G-20 meeting,
    despite differences with the Russian government and the cancellation of bilateral
    talks between Obama and President Putin. (BBC)
  - Bank of England governor Mark Carney says the Bank will not consider raising United
    Kingdom interest rates until the unemployment rate has fallen to 7% or below.
    (BBC)
  Disasters and accidents:
  - A large fire breaks out at Jomo Kenyatta International Airport in the Kenyan capital
    Nairobi. (BBC)
  International relations:
  - North Korea and South Korea agree to resume talks on reopening the Kaesong industrial
    zone. (BBC) (Sky News)
  Politics:
  - The Prime Minister of the Czech Republic Jiří Rusnok announces his resignation
    after his caretaker government loses a vote of confidence. (China Daily)
  - Portugal's treasury secretary Joaquim Pais Jorge resigns after media reports and
    opposition politicians questioned his previous role at Citigroup. (Reuters)
