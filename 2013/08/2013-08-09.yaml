Date: '2013-08-09'
Source_URI: Portal:Current events/2013 August 9
Intelligence_Payload:
  Armed conflict and attacks:
  - An American drone strike kills five suspected Al Qaeda terrorists in eastern Yemen.
    (Reuters)
  - The United States withdraws diplomats from its consulate in the Pakistani city
    of Lahore due to terrorist threats. (CNN)
  - Gunmen open fire at a Sunni mosque in the city of Quetta killing at least eight
    people and injuring 24. (Al Jazeera)
  - Two Turkish Airlines pilots are abducted by a previously unknown Shiite militia,
    Zuwwar al-Imam Rida, in Beirut, Lebanon. (BBC News)
  - An Israeli drone strike coordinated with the Egyptian Army kills five suspected
    Al Qaeda militants in the Sinai Peninsula. (AP via ABC News)
  - Clashes erupted between two communities after Eid prayers, in the Kishtwar district
    of Jammu and Kashmir, India, leaving two dead and several other injured. (The
    Hindu)
  Disasters and accidents:
  - Taiwan's Control Yuan investigatory agency reports that the Taiwan Power Company's
    Jinshan Nuclear Power Plant has been leaking radioactive water for three years.
    (Reuters)
  - Three people are missing after a Rockwell Turbo Commander turboprop plane crashes
    into two homes in East Haven, Connecticut, United States. (NBC News)
  - An Ethiopian Air Force cargo plane carrying ammunition for international forces
    fighting Islamist militants in Somalia crashes and catches fire on landing at
    the Aden Adde International Airport in Mogadishu, killing four of the six crewmembers.
    (BBC News), (Xinhua)
  Law and crime:
  - Mexican drug lord Rafael Caro Quintero, who was convicted for the 1985 murder
    of U.S. Drug Enforcement Administration Enrique Camarena, is ordered released
    from prison. (The Guardian)
  - Liu Tienan, the deputy head of China's National Development and Reform Commission,
    is expelled from the Communist Party for corruption. (BBC)
  - A 31-year-old Florida man kills his wife and posts a picture of her corpse with
    a confession onto Facebook. The picture is removed and the man is arrested. (CNN)
  Politics and elections:
  - President Boni Yayi of Benin dismisses his entire Cabinet. (Reuters)
  - Zimbabwe's Movement for Democratic Change files papers with the Constitutional
    Court in Harare arguing that the recent elections be annulled because of widespread
    allegations of illegalities and intimidation of voters by Robert Mugabe's ZANU–PF
    party. (Reuters via News24)
  Sports:
  - At the FIBA Asia Championship, the Chinese Taipei men's national basketball team
    knocks defending champion China out of the tournament during a quarterfinal match.
    (Yahoo! Sports)
