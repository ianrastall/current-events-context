Date: '2013-01-08'
Source_URI: Portal:Current events/2013 January 8
Intelligence_Payload:
  War in North-West Pakistan:
  - Four are killed and a further four are wounded in a U.S. drone strike in North
    Waziristan, Pakistan. (AFP)
  Belfast City Hall flag protests:
  - In a fifth night of protests in Belfast, protestors throw rocks, "missiles", and
    petrol bombs at police, with law enforcement responding with water cannons and
    plastic bullets. (BBC)
  Northern Mali conflict (2012–present):
  - The Malian army used artillery on Islamist rebels in Gnimignama in the first skirmish
    between the two belligerents since April 2012, when Islamist and Tuareg rebels
    first assumed control of the region. (BBC)
  Kashmir conflict:
  - India claims two of its soldiers have been killed during a gunfight with Pakistani
    forces in the Indian-controlled portion of Kashmir. This report comes two days
    after Pakistan made a similar claim of the death of one of its troops due to an
    Indian cross-border operation in the disputed region. (Reuters)
  M23 rebellion:
  - In the Democratic Republic of the Congo, the March 23 Movement announce a unilateral
    ceasefire ahead of peace talks with the government. (BBC)
  Business and economy:
  - AIG, the insurance giant that has recently paid the U.S. treasury back funds it
    received on "too big to fail" grounds in 2008, says that it may join a lawsuit
    against the U.S. for the supposedly harsh nature of the bailout terms. (Reuters)
  Disasters and accidents:
  - More than 130 wildfires are burning on the east coast of Australia with thousands
    of people forced to leave their homes. (The Telegraph)
  Law and crime:
  - A new inquest begins into the death of British singer Amy Winehouse after it was
    discovered that the original coroner was not qualified to conduct the inquiry.
    A second inquiry into Winehouse's death concludes that the singer died of alcohol
    poisoning. (AFP via France 24) (CNN)
  - An Illinois man is killed by cyanide poisoning after winning the lottery. (CNN)
  Politics and elections:
  - The Venezuelan government announces that Hugo Chávez is in stable condition, and
    is still receiving medical treatment for a respiratory infection. (Huffington
    Post)
  - Roberto Maroni announces that an electoral pact signed between his Lega Nord party
    and Silvio Berlusconi's People of Freedom party explicitly rules out Berlusconi
    assuming the Prime Minister of Italy position again. (BBC)
  - Bob Brown, former leader of the Australian Greens, becomes the President of the
    Sea Shepherd Conservation Society leading the campaign against Japanese whaling
    in the Southern Ocean. (ABC News Australia)
  Science and technology:
  - The United States records its hottest year on record in 2012. (Associated Press)
  Sport:
  - In NBA, the Milwaukee Bucks and Scott Skiles mutually agree to part ways after
    starting the 2012–13 NBA season with a 16–16 record. The team promotes assistant
    Jim Boylan as interim head coach. (NBA) (ESPN)
