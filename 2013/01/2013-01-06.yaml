Date: '2013-01-06'
Source_URI: Portal:Current events/2013 January 6
Intelligence_Payload:
  Syrian civil war:
  - The President of Syria Bashar al-Assad delivers a rare television appearance addressing
    the Syrian crisis and denounces the Syrian rebels as "enemies of God and puppets
    of the West". It is his first television appearance since June 2012. (BBC)
  Kashmir conflict:
  - A cross-border raid conducted by Indian troops in the disputed Kashmir region
    results in the death of one Pakistani soldier and another critically wounded,
    according to Pakistani reports. (AP via The Washington Post)
  War in North-West Pakistan:
  - A drone attack conducted by the United States kills at least ten people (suspected
    militants) in South Waziristan, Pakistan. (BBC)
  Kachin conflict:
  - Kachin rebels claim the government has fired shells at the rebel de facto headquarters
    of Laiza. (Washington Post)
  War in Afghanistan (2001–2021):
  - Suicide bombers kill four in an attack in Spin Boldak, Afghanistan. (BBC)
  2012–2013 Central African Republic rebellion:
  - South Africa announces it will send 400 more soldiers to the Central African Republic
    in an effort to assist the current regime, which faces a potential attack by the
    Seleka rebel coalition on the capital. (BBC)
  Politics and elections:
  - Mahmoud Abbas, the President of the Palestinian National Authority, orders that
    the words "State of Palestine" be used on official documents. (BBC)
  - In the Netherlands, Gerard Helders who served as Minister of Colonial Affairs
    from the 1957 until 1959, the oldest known former politician in the world dies
    at the age of 107. (NOS)
  Science and technology:
  - At Apple, applications developers say they gave Apple plenty of warning about
    issues with its iOS maps issues. (CNET)
  Sport:
  - In ice hockey, the National Hockey League and the National Hockey League Players'
    Association reach an agreement that ends the 2012–13 NHL lockout and averts the
    cancellation of the 2012–13 NHL season. (Think Progress)
