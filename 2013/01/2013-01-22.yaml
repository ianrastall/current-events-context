Date: '2013-01-22'
Source_URI: Portal:Current events/2013 January 22
Intelligence_Payload:
  Syrian civil war:
  - The government of Jordan says that more than 12,000 Syrians have fled to Jordan
    in the past six days. (AFP via IOL)
  - The Russian government organizes an evacuation for some of its citizens by transporting
    them to Lebanon and then flying them to Russia. (AP via Google News)
  Iraqi insurgency:
  - Car bombings in Baghdad kill at least 17 people and injure dozens of others. (BBC)
    (Reuters)
  Colombian conflict:
  - In Colombia, FARC rebels dynamite two southern oil pipelines and planted a bomb
    on the top coal exporter's northern railway after the end of a rebel ceasefire.
    (Reuters)
  Arts and culture:
  - The James Bond film Skyfall opens in China with censored scenes, prompting criticism
    from fans. (Bangkok Post)
  International relations:
  - The United Nations Security Council passes Resolution 2087, condemning North Korea's
    December 2012 rocket launch and expanding economic sanctions against the country.
    (BBC) (Reuters)
  - The government of the Philippines announces that it will file a complaint against
    China before the International Tribunal for the Law of the Sea seeking arbitration
    for the territorial disputes in the South China Sea. (BBC)
  Law and crime:
  - Irish politicians respond to High Court Judge Paul Carney's order that a man who
    plead guilty in court to repeatedly raping his daughter as a child be granted
    bail and provisional released. Taoiseach Enda Kenny comments on a nation "filled
    with revulsion" at the outcome of the case, while opposition politician Gerry
    Adams refers to abuse his father inflicted on others. (BBC) (Irish Independent)
  - A Canadian man shoots dead two people in a court in Cebu, Philippines, and seriously
    injures another. (BBC) (CNN) (Philippine Star)
  - A British woman, Lindsay Sandiford is sentenced to death by a court in Indonesia
    following a conviction for drug trafficking. (BBC) (CNN) (Sky News)
  - At least three people are injured after a gunman opens fire at the campus of Lone
    Star College–North Harris in Houston, Texas. (CNN)
  Politics and elections:
  - The Elections for the 19th Knesset are held in Israel. The incumbent Prime Minister
    Benjamin Netanyahu's electoral alliance, Likud Yisrael Beiteinu, wins a plurality
    with 31 seats. (BBC) (Reuters)
  - The government of Eritrea says the capital Asmara is "calm" a day after dissident
    soldiers seized the information ministry and state media. (Al Jazeera) (BBC) (Reuters)
  Science and technology:
  - An ancient human fossil in China is found to be closely related to both Asian
    and Native American peoples. (BBC)
  Sport:
  - In association football, Dutch midfielder Wesley Sneijder completes his move from
    Inter Milan to Galatasaray. (ESPN) (Fox Sports)
  - Shakhtar Donetsk wins 2013 Super Cup of Champions defeating Zenit St. Petersburg
    in Abu Dhabi, UAE. (FC Shakhtar) (FC Zenit)
