Date: '2013-01-30'
Source_URI: Portal:Current events/2013 January 30
Intelligence_Payload:
  Northern Mali conflict (2012–present):
  - French forces enter the city of Kidal in northern Mali after seizing its airport
    overnight. (BBC) (Reuters) (France 24)
  Syrian civil war:
  - Israeli forces attack an arms convoy on the Lebanon–Syria border overnight destined
    from Syria to Hezbollah. (Reuters)
  - Syrian sources claim that the true objective of the raid was a weapon research
    center northwest of Damascus and that two people were killed in the action. (BBC)
  2012–2013 Egyptian protests:
  - Two people are killed in clashes between protesters and police on the edge of
    Cairo's Tahrir Square. (BBC)
  Business and economy:
  - Canadian wireless device manufacturer Research In Motion officially unveils BlackBerry
    10, the newest version of the operating system for its BlackBerry devices, and
    announces the first two phones that will run on the new platform. The company
    also announces it will begin doing business as BlackBerry effective immediately.
    (Fox News)
  Disasters and accidents:
  - 'Tornado outbreak of January 29–30, 2013: Severe thunderstorms and tornadoes affect
    the Midwestern and southern United States with damage reported in several states,
    from Missouri to Georgia, and at least two people killed. (Reuters) (CNN) (USA
    Today)'
  Law and crime:
  - Three people are dead, including the shooter, one person is wounded after a shooting
    at an office building in Phoenix, Arizona, United States. (Fox News) (MyFox Phoenix)
  - A gunman kills a school bus driver and holds a 6-year-old boy hostage in an underground
    bunker in Midland City, Alabama, United States. (CNN) (CBS) (USA Today)
  - A Dutch court rules that Royal Dutch Shell can be held partially responsible for
    pollution in the Niger Delta in southern Nigeria. (Reuters) (BBC)
  - Tony McCluskie is sentenced to life imprisonment for the murder of his sister
    EastEnders-actress Gemma McCluskie in the UK. (Sky News)
  Politics and elections:
  - The Prime Minister of Australia Julia Gillard announces that the next federal
    election will be held on September 14. (BBC) (Reuters) (ABC News Australia)
  - The Scottish Government agrees to change the wording of the question on the forthcoming
    Scottish independence referendum after concerns were expressed that it could lead
    people to vote yes. (BBC)
  Science and technology:
  - South Korea launches its first civilian rocket called Naro-1 carrying a scientific
    satellite STSAT-2C amidst tension with North Korea. (Reuters) (BBC) (CNN)
  Sport:
  - 'El Clásico: Real Madrid and Barcelona play a 1–1 draw in the first leg of their
    2012–13 Copa del Rey semifinal at Santiago Bernabeu Stadium. Lionel Messi''s streak
    of scoring in 16 straight matches ends. (ESPN) (BBC) (AP via Yahoo!)'
  - Former Executive Director of the NHLPA Paul Kelly reveals that the NHL wants to
    expand the league to 32 teams in the next 2–3 years, most likely to Quebec City
    and Toronto. (CBC)
  - Spanish football club Granada fires Juan Antonio Anquela and replaces him with
    Lucas Alcaraz after a poor run in the 2012–13 La Liga. (ESPN) (UEFA) (FIFA)
