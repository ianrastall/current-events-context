Date: '2013-01-23'
Source_URI: Portal:Current events/2013 January 23
Intelligence_Payload:
  Iraqi insurgency:
  - A suicide bombing at a mosque in the Iraqi town of Tuz Khormato kills at least
    23 people. (BBC)
  Nigerian Sharia conflict:
  - Gunmen from the Islamist extremist group Boko Haram open fire at a market in Damboa,
    Nigeria, killing 18 people. (AFP via Google News) (Reuters) (BBC)
  - Five people are hacked to death in Maiduguri, Nigeria, by members of the Islamist
    sect Boko Haram. (Reuters) (AFP via Google News) (AP via Yahoo! News)
  Business and economy:
  - The 2013 World Economic Forum begins in Davos, Switzerland. (USA Today) (WEF)
  - Three of the largest managers of U.S.-based money market funds announce a change
    of policy toward greater transparency – they will give daily rather than monthly
    data on fund assets. (Reuters)
  Disasters and accidents:
  - The offensive smell - caused by mercaptans - from a leak at a chemical plant in
    northern France is reported in Bedfordshire and Hertfordshire, United Kingdom.
    (BBC)
  - Singer Alex Sparrow is seriously injured and in intensive care in Los Angeles,
    United States, after a high speed car crash. (All Voices)
  - Rescuers from New Zealand and McMurdo Station looking for three Canadians aboard
    an airplane presumed to have gone down in Antarctica were grappling with bad weather
    conditions. (Canadian Press) (Radio Australia)
  Law and crime:
  - A court in Thailand sentences a magazine editor to ten years' imprisonment for
    publishing articles that were deemed to have insulted the monarchy. (BBC)
  Politics and elections:
  - In a speech in London, British Prime Minister David Cameron outlines his intention
    to renegotiate the terms of the UK's membership of the European Union then offer
    a referendum on United Kingdom withdrawal from the European Union if a new deal
    is agreed. (BBC) (AP) (The Guardian)
  - The United States Armed Forces overturns its ban on women serving in combat, reversing
    a 1994 rule, and potentially clearing the way for women to serve in front-line
    units and elite commando forces. (BBC) (USA Today)
  - A parliamentary election is held in Jordan with boycotting by the opposition,
    which alleges fraud. (BBC) (Reuters)
  Sport:
  - Bradford City are scheduled to play Swansea City in the 2012–13 Football League
    Cup Final after their respective defeats of Aston Villa and Chelsea in the semifinals.
    (BBC Sport) (ESPN)
  - European champions Chelsea are defeated by Swansea City after a 0–0 draw in the
    second semifinal match; the game is marred by an incident involving Chelsea midfielder
    Eden Hazard, who is sent off after violently kicking a ball boy in the midriff
    during the game. (The Guardian) (BBC Sport) (Sky News)
  - Ferencvárosi TC, football club from Hungary, wins 2013 Football Impact Cup in
    Marbella, Spain. (Fradi.hu) (Sport.ro)
