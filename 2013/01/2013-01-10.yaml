Date: '2013-01-10'
Source_URI: Portal:Current events/2013 January 10
Intelligence_Payload:
  January 2013 Pakistan bombings:
  - Twin bombings at a billiard hall in the southwestern Pakistani city of Quetta
    kill at least 81 people and wound up to 120 others, hours after a bombing at a
    market area killed 11 people in the same city. (BBC) (CBC News) (The Guardian)
  Northern Mali conflict (2012–present):
  - Islamists capture the town of Konna, previously held by the Malian army. (Reuters)
  Disasters and accidents:
  - '2013 Neuhausen am Rheinfall train collision: Two trains collide and derail in
    Neuhausen am Rheinfall, Switzerland, injuring 17 people. (Blick.ch)'
  Law and crime:
  - Police in France discover the bodies of Sakine Cansız, one of the co-founders
    of the Kurdistan Workers' Party, and two other Kurdish activists who were all
    shot dead in a Kurdish information center in the capital, Paris. (BBC) (Channel4)
  - April Casburn, a senior detective with the Metropolitan Police is found guilty
    of trying to sell information on the investigation into phone hacking to the News
    of the World, the newspaper at the centre of the scandal. (BBC)
  - A gunman opened fire inside a classroom of Taft Union High School in Taft, California.
    A 16-year-old student was critically wounded, and another student was shot at
    but was not injured. The gunman surrendered after the classroom's teacher ordered
    him to drop his weapon. The teacher also suffered minor injuries after being struck
    by a shotgun pellet. A 16-year-old student, the suspected gunman, was arrested.
    (CNN)
  Politics and elections:
  - U.S. President Barack Obama nominates White House Chief of Staff Jack Lew to be
    the next Secretary of the Treasury. (ABC News)
  Science and technology:
  - Near-Earth asteroid 99942 Apophis passes close to the Earth with observations
    by European astronomers estimating that it is larger than previously thought.
    (CBS News)
  Sport:
  - Researchers confirm that deceased NFL linebacker Junior Seau's suicide was brought
    on by chronic traumatic encephalopathy. (ESPN)
