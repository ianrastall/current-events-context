Date: '2013-01-16'
Source_URI: Portal:Current events/2013 January 16
Intelligence_Payload:
  Syrian civil war:
  - Three car bombs explode near military checkpoints and government buildings in
    Idlib Governorate, Syria, leaving 24 people dead. Two other bombs were defused
    by government forces. (Reuters)
  In Aménas hostage crisis:
  - Suspected Islamic militants take over a BP facility in In Aménas, Algeria, killing
    at least 2 workers and taking up to 40 others hostage, including 13 Norwegians,
    a number of Americans, as well as nationals from Ireland, Japan, France and the
    United Kingdom. A previously unknown group allied to al-Qaeda's regional branch
    says the attack is in revenge for Algeria's support of the French operation against
    Islamic rebels in Mali. (Fox News) (BBC) (Reuters)
  Northern Mali conflict (2012–present):
  - 'Battle of Diabaly: French troops are reported to be fighting rebels in the Malian
    town of Diabaly alongside Malian troops. (BBC)'
  War in Afghanistan (2001–2021):
  - The Afghan National Directorate of Security headquarters in Kabul are attacked
    by a team of suicide bombers, leaving a security guard dead and 17 others injured.
    (BBC)
  Business and economy:
  - Boeing 787 aircraft are grounded worldwide over concerns about the safety of their
    lithium-ion batteries. (BBC) (Reuters) (Time) (NBC) (The New York Times)
  - Canadian Cirque du Soleil cuts 400 jobs as strong loonie and surging costs bite.
    (Financial Post) (The Globe and Mail) (The Guardian)
  Disasters and accidents:
  - '2013 Vauxhall helicopter crash: A helicopter crashes into a crane atop a building
    in central London, killing two people and injuring 13 others. (BBC) (Sky News)'
  - An apartment block collapses in the Egyptian city of Alexandria, killing at least
    25 people. (The Daily Star) (RIA Novosti)
  Law and crime:
  - Russian mafia boss Aslan Usoyan is killed in Moscow. (RIA Novosti) (The Washington
    Post)
  - Carlos Castillo Medrano, the mayor of Jutiapa, Guatemala, is shot and killed by
    unidentified assailants. (BBC)
  Politics and elections:
  - US Interior Secretary Ken Salazar announces that he is to leave the office in
    March. (CNN)
  Sport:
  - Bayern Munich confirms Pep Guardiola will become the club's new manager in the
    summer 2013. (ESPN) (BBC) (AP via USA Today)
  - Saudi Arabia sacks Frank Rijkaard as coach of the national football team after
    18 months in charge due to bad results in the 2013 Gulf Cup of Nations. (ESPN)
    (Goal.com) (Saudi Gazette)
  - In basketball, Miami Heat forward LeBron James becomes the youngest player in
    NBA history to score 20,000 career points. (USA Today)
