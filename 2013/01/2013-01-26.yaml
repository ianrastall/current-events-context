Date: '2013-01-26'
Source_URI: Portal:Current events/2013 January 26
Intelligence_Payload:
  War in North-West Pakistan:
  - At least 24 militants are killed in clashes between the Tehrik-e-Taliban and Ansar
    ul-Islam in Pakistan near the border with Afghanistan. (AP via News Limited)
  2012–2013 Egyptian protests:
  - The Egyptian Army is dispatched to the town of Suez following the death of at
    least nine people in clashes between anti-government protesters and supporters
    of President Mohamed Morsi. (CNN) (Reuters) (Jerusalem Post)
  - At least 30 people die in violence that erupted in Port Said, Egypt, following
    the death sentences of 21 people for their roles in the Port Said Stadium disaster.
    (BBC) (Reuters) (Jerusalem Post)
  Northern Mali conflict (2012–present):
  - French-led troops in Mali take control of Gao International Airport in the northern
    town and Islamist stronghold of Gao. (BBC) (Reuters)
  War in Afghanistan (2001–2021):
  - A suicide bombing at a market in the Afghan city of Kunduz kills at least ten
    people and wounds up to twenty others. (BBC)
  Disasters and accidents:
  - 20 musicians from the band, Kombo Kolombia, who play Colombian vallenato music,
    are missing after playing a gig in Hidalgo, Mexico. (BBC)
  Cyclone Oswald:
  - Residents in the Australian town of Gladstone are being evacuated due to flooding
    of the Boyne River caused by heavy rains from Tropical Cyclone Oswald. (AAP via
    NZ Yahoo!)
  - Up to 1600 homes in the Moreton Bay region near the state capital Brisbane are
    also threatened with flooding. (Courier Mail)
  Law and crime:
  - An Egyptian court gives death sentences to 21 people convicted of involvement
    in a mass attack by fans of the Al-Masry Club against fans of the Al-Mahly Sports
    Club at Port Said Stadium on February 1, 2012. (BBC) (Reuters)
  - Hacktivist group Anonymous claims credit for the hacking of the website of the
    United States Sentencing Commission in response to the suicide of Aaron Swartz.
    (Chicago Tribune)
  Politics and elections:
  - Miloš Zeman wins Czech presidential election and becomes the next President of
    the Czech Republic running ahead of Karel Schwarzenberg. (BBC) (Reuters)
  - Lee Li Lian of the Workers' Party wins Punggol East by-election in Singapore and
    becomes the next MP for Punggol East. This was the second Singaporean by-election
    after less than a year. (The Straits Times)
  - Kathleen Wynne is elected as the leader of the ruling Ontario Liberal Party and
    will become the first female Premier of the Canadian province of Ontario and the
    first openly gay premier in Canadian history. (Bloomberg)
  Sport:
  - In tennis, Victoria Azarenka wins the women's singles at the 2013 Australian Open
    after her three-set victory over Li Na in the final. (BBC) (ESPN)
  2012–13 FA Cup fourth round:
  - For the first time in 24 years, a non-league team knocks a top flight team out
    of the FA Cup. Conference outfit Luton Town eliminate Premier League Norwich City
    with 1–0 victory at Carrow Road. (BBC) (The Guardian)
  - Lower league outfit Milton Keynes Dons eliminate Premier League Queens Park Rangers
    (unbeaten in 2013) at Loftus Road, QPR conceding before the fifth minute and finding
    themselves 0–4 down before the hour with a 2–4 final score. (BBC) (The Guardian)
  - Theo Walcott fires in a late winner for Arsenal against Brighton; the match finishes
    3–2. (BBC)
  - Middlesbrough survive a late scare to progress at the expense of Aldershot Town;
    the match finishes 2–1, with all three goals occurring in the final ten minutes
    of the match. (BBC)
