Date: '2013-01-24'
Source_URI: Portal:Current events/2013 January 24
Intelligence_Payload:
  Insurgency in the North Caucasus:
  - Russian police announces that 13 rebels, including Khuseyn Gakayev and his brother,
    are killed in fighting in the Vedeno District, Chechnya. (Reuters)
  Senkaku Islands dispute:
  - A Japan Coast Guard ship engages a Taiwanese ship carrying activists bound for
    the Senkaku Islands. (CNN) (China Daily) (The Asahi Shimbun)
  Northern Mali conflict:
  - The Malian army says it is investigating allegations that soldiers have carried
    out summary executions in the Islamist-controlled north of Mali. (BBC)
  Libyan factional fighting:
  - The Foreign and Commonwealth Office urges British nationals to leave the Libyan
    city of Benghazi immediately due to a "specific and imminent" threat to Westerners.
    (BBC) (Sky News)
  Business and economy:
  - The government of Ukraine signs a major $10 billion shale gas deal with Royal
    Dutch Shell to reduce its dependency on Russian gas imports. (BBC)
  Disasters and accidents:
  - Seventeen people are killed and 34 others are injured in a bus crash near the
    town of Taperas, Bolivia, along a newly built highway to Brazil. (AP via Washington
    Post) (EFE via La Prensa)
  Law and crime:
  - David Headley is sentenced to 35 years in prison for his role in the 2008 Mumbai
    attacks. (BBC) (AP via ABC News) (NDTV) (Chicago Tribune)
  Politics and elections:
  - North Korea authorities announce a new nuclear weapon and long range missile test,
    threatening their publicly manifested arch-enemy, the United States, as their
    primary target. (BBC) (The New York Times) (AP via CBS News)
  - Prime Minister of Poland Donald Tusk is hospitalized with an acute infection of
    the respiratory tract. (AP via Washington Post)
  Science and technology:
  - Scientists from the European Bioinformatics Institute in Hinxton, England, successfully
    use DNA as a means of data storage. (Nature) (The Wall Street Journal)
  Sport:
  - French football is reported to be stunned at yesterday evening's red card for
    Chelsea midfielder Eden Hazard, who violently kicked a ball boy in the midriff
    during the 2012–13 Football League Cup game in Wales. The Belgian midfielder,
    who previously played in Ligue 1, was thought to have had an exemplary disciplinary
    record before the assault. (The Guardian)
  - 'El Clásico: Barcelona are to play Real Madrid in the 2012–13 Copa del Rey semifinal
    after the Catalan club defeated Málaga CF 4–2. (CNN) (ESPN)'
  - In tennis, Li Na will face Victoria Azarenka in the women's final at the 2013
    Australian Open after her straight-set victory over Maria Sharapova in the semifinal.
    (BBC) (ESPN)
  - NBA team New Orleans Hornets announce it will change its name to the Pelicans
    after the current season, the new team logo is officially released. (USA Today)
    (ESPN) (Bleacher Report)
