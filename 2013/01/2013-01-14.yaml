Date: '2013-01-14'
Source_URI: Portal:Current events/2013 January 14
Intelligence_Payload:
  Syrian civil war:
  - Government forces conduct air raids against rebels south of Damascus, as well
    as in Aleppo, with local observers reporting dozens of deaths, including children.
    (Al Jazeera)
  - At least 57 countries submit a petition to the UN Security Council, calling on
    it to refer the conflict to the International Criminal Court for a pending war
    crimes investigation. (Al Jazeera)
  Northern Mali conflict (2012–present):
  - Islamists rebels capture the Malian town of Diabaly after fierce fighting with
    government troops, as French airplanes strike targets in Gao. (Reuters)
  Kachin conflict:
  - Myanmar government forces shell the rebel stronghold of Laiza for the first time
    since the resumption of hostilities in 2011, killing 3 civilians and injuring
    6 others. (Al Jazeera)
  2011–present Libyan factional fighting:
  - A police officer is wounded after a grenade attack in Benghazi, as Italy announces
    the temporary withdrawal of the country's consulate in the city after an unsuccessful
    attack against the consul two days earlier. (Reuters)
  Business and economy:
  - British music retailer HMV goes into administration after 90 years of trading,
    becoming the UK's latest large employer to experience financial hardship. (BBC)
    (The Guardian)
  Politics and elections:
  - Former U.S. President George H. W. Bush is released from The Methodist Hospital
    in Houston, Texas, after more than seven weeks of treatment for bronchitis. (Reuters)
  Sport:
  - Spanish football club Sevilla fires coach Míchel due to a poor run in the 2012–13
    La Liga season and replaces him with Unai Emery. (Goal.com)
  - In tennis, 2013 Australian Open begins today in Melbourne Park in Melbourne, Australia.
    (AFP via The Express Tribune) (AP via USA Today)
