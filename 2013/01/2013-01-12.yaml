Date: '2013-01-12'
Source_URI: Portal:Current events/2013 January 12
Intelligence_Payload:
  Northern Mali conflict (2012–present):
  - A French pilot is killed in a helicopter raid in northern Mali, according to French
    Minister of Defence Jean-Yves Le Drian. (CNN)
  Somali Civil War (2009–present):
  - One French soldier and 17 militants are killed in a failed attempt to free a French
    hostage in Bulo Marer, Somalia. (France 24)
  Belfast City Hall flag protests:
  - Violent protests occur in Northern Ireland over flying the Union Jack at Belfast
    City Hall, twenty-nine police officers are injured. (BBC)
  Arts and culture:
  - The funeral of Ian McKeever, who was killed by a lightning strike on Mount Kilimanjaro,
    occurs in County Wicklow, Ireland. (RTÉ News)
  Disasters and accidents:
  - The death toll in landslides in the province of Yunnan, China rises to 46, according
    to state media. (BBC)
  Politics and elections:
  - Voters in Czech Republic go to the polls for a presidential election. Two candidates,
    Miloš Zeman and Karel Schwarzenberg, will face in second round on 25–26 January.
    (BBC)
  - Thousands of people gather in Kuala Lumpur, Malaysia, for the People's Uprising
    Rally, a protest over many government policies and decisions. (New Straits Times)
  Science and technology:
  - Beijing's air pollution reaches levels judged as hazardous to human health. (BBC)
  Sport:
  - In ice hockey, the National Hockey League Players' Association overwhelmingly
    votes to ratify a new collective bargaining agreement reached with the league.
    NHL training camps are scheduled to open on January 13, with a shortened 48-game
    regular season to begin on January 19. (ESPN)
