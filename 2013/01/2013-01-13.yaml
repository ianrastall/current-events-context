Date: '2013-01-13'
Source_URI: Portal:Current events/2013 January 13
Intelligence_Payload:
  Kachin conflict:
  - President of Burma Thein Sein defends the army’s response to the ethnic Kachin
    rebellion, despite a recent escalation of violence that has further dimmed peace
    prospects. (The News International)
  Arts and culture:
  - Time Warner Inc. film Argo wins awards for best drama and best director at the
    70th Golden Globe Awards. (Fox News) (BBC) (Bloomberg)
  Business and economy:
  - Neelie Kroes, the European Commissioner for Digital Agenda, said in an interview
    with the Financial Times of London that the European Union is planning regulatory
    moves later in the year that will facilitate consolidation of the telecommunications
    market across national borders. (Financial Times)
  Politics and elections:
  - Sri Lankan Chief Justice Shirani Bandaranayake is removed from office by President
    Mahinda Rajapaksa after being impeached. (BBC)
  Science and technology:
  - NASA announces new data effectively rules out a 2036 Earth impact for the near-Earth
    asteroid 99942 Apophis. (NASA)
  Sport:
  - In ice hockey, Ukrainian club HC Donbass wins the 2012–13 IIHF Continental Cup
    in Donetsk, Ukraine. (IIHF)
  - 2013 Kontinental Hockey League All-Star Game is held at the Traktor Sport Palace
    in Chelyabinsk, Russia. (KHL All-Star)
  - In tennis, David Ferrer wins the 2013 Heineken Open for the third straight year
    and fourth time overall, beating Philipp Kohlschreiber in the final with a 7–6,
    6–1 score in Auckland, New Zealand, as part of the 2013 ATP World Tour. (AP) (ESPN)
