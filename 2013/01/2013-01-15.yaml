Date: '2013-01-15'
Source_URI: Portal:Current events/2013 January 15
Intelligence_Payload:
  Syrian civil war:
  - 'Aleppo University bombings: 83 people are killed and more than 150 injured in
    a rocket barrage aimed at Aleppo University, as government forces and rebels continue
    fighting in the suburbs of Damascus. Both sides accused each other of launching
    the missiles. (Times of India) (Reuters) (Antiwar.com)'
  Northern Mali conflict (2012–present):
  - African troops are to be deployed in Mali to fight alongside French and Malian
    soldiers within a week. (Al Jazeera)
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide bomber kills a Sunni MP and six others in Fallujah, two days after Finance
    Minister Rafi al-Issawi survived an assassination attempt in the same city. The
    parliamentarian, Ifan Saadoun al-Issawi, was an important member of the Sahwa
    committee in Fallujah and part of the opposition to Prime Minister Nouri al-Maliki.
    (AP) (Al Jazeera)
  Kashmir conflict:
  - Pakistan claims another of its soldiers is killed from gunfire by Indian troops
    near the Line of Control. This is the fifth such fatality reported in the past
    two weeks from either of the neighboring countries who each claim the disputed
    territory. (Reuters)
  Disasters and accidents:
  - 'Badrashin railway accident: A train carrying Egyptian Army recruits derails near
    Giza, Greater Cairo, killing 19 and injuring 120 others. (Reuters) (Al Jazeera)
    (AP via ABC News)'
  - '2013 Saltsjöbanan train crash: A Saltsjöbanan commuter train crashes into a residential
    building in the upscale Stockholm suburb of Saltsjöbaden seriously injuring one
    person. (BBC) (Dagens Nyheter) (The Local)'
  Health and environment:
  - '2013 horse meat contamination in burgers scandal: The Republic of Ireland''s
    Food Safety Authority says that horse DNA has been found in some beefburgers on
    sale in UK and Irish supermarkets. (BBC) (The Guardian)'
  Law and crime:
  - Egyptian human rights lawyer Ahmed al-Gizawi is sentenced to five years imprisonment
    and 300 lashes in Saudi Arabia. (BBC)
  - Two people are shot dead and another person was wounded at Hazard Community and
    Technical College in Hazard, Kentucky, United States. (Lexington Herald-Leader)
  - Pakistani Supreme Court ordered the arrest of Prime Minister of Pakistan Raja
    Pervez Ashraf in relation to a bribery case within 24 hours. (AP via ABC News)
    (The Washington Post) (The New York Times)
  Science and technology:
  - Russia launches three Kosmos series military-purpose satellites using Rokot launch
    vehicle. (RIA Novosti)
  Sport:
  - Paul McGinley is chosen to lead Europe in their defence of the 2014 Ryder Cup
    at Gleneagles in Perthshire, Scotland. (RTÉ Sport)
  - The Associated Press reports that the U.S. cyclist Lance Armstrong has admitted
    to doping in his career during his interview with Oprah Winfrey, yet to be aired.
    (The Washington Post)
