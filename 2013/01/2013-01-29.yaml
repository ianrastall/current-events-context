Date: '2013-01-29'
Source_URI: Portal:Current events/2013 January 29
Intelligence_Payload:
  Somali Civil War (2009–present):
  - A suicide attack against the Somali government offices kills at least two people
    and injures dozens in Mogadishu. (BBC) (Reuters)
  Northern Mali conflict (2012–present):
  - The UK announces it will deploy 330 military personnel to Mali and other West
    African countries in support of French forces operating in the area. (BBC)
  - French troops take Timbuktu while Tuareg forces of MNLA claim they control the
    city of Kidal in the north of Mali. (CNN) (France 24)
  Syrian civil war:
  - At least 65 corpses are discovered in the Queiq River near Aleppo. All of them
    appear to have been executed with gunshots. (BBC)
  Business and economy:
  - Vittorio Grilli, Italy's Economy Minister, contends before a committee of parliament
    that the central bank's handling of the supervision of Monte dei Paschi has been
    "attentive and appropriate". (Reuters)
  Disasters and accidents:
  - A Bombardier CRJ200 airliner operated by SCAT Air crashes near the Kazakh city
    of Almaty, killing all 15 passengers and 5 crew people on board. (Reuters) (BBC)
  Law and crime:
  - A Ukrainian court sentences a former police chief Olexiy Pukach to life imprisonment
    for murdering journalist Georgiy Gongadze in 2000. (BBC) (Reuters) (AFP via Yahoo!)
  Politics and elections:
  - The United States Senate confirms John Kerry to become United States Secretary
    of State by a vote of 94–3. Kerry succeeds outgoing Secretary Hillary Clinton
    on February 1. (Washington Post)
  - UK government plans to redraw constituency boundaries before the next general
    election are defeated in the House of Commons by 334 to 292. (BBC)
  Science and technology:
  - Google expands its Google Maps map data coverage of North Korea for what has been
    blank on most of that country satellite images on its search engine. (BBC)
  Sport:
  - The 15-page article published by French football magazine France Football and
    titled The Qatargate reveals evidence pointing towards Qatar buying the right
    to host the 2022 FIFA World Cup. (RT) (AFP via Google) (Football.co.uk)
  - A.C. Milan says it has reached an agreement with Manchester City F.C. to sign
    Italian striker Mario Balotelli. (ESPN) (Goal.com) (The Guardian)
  - The Miami New Times reports that Biogenesis, a Miami anti-aging clinic that closed
    in December 2012, sold a wide array of performance-enhancing drugs to several
    prominent Major League Baseball players, among them Alex Rodriguez, Melky Cabrera,
    Nelson Cruz, and Gio Gonzalez. (Miami New Times) (ESPN)
  - According to a report in Sports Illustrated, Baltimore Ravens linebacker Ray Lewis
    used the supplement deer-antler spray (containing a dilute solution of IGF-1 which
    has been banned by the NFL) to aid his recovery from a torn triceps. Lewis has
    denied using the substance. The report also alleges that members of the Alabama
    Crimson Tide used the substance before the 2012 BCS National Championship Game
    against the LSU Tigers. (Sports Illustrated)
