Date: '2013-01-05'
Source_URI: Portal:Current events/2013 January 5
Intelligence_Payload:
  Disasters and accidents:
  - '2013 Tasmanian bushfires: Thousands of people are stranded by four major fires
    burning out of control in the Australian state of Tasmania. (AAP via TV New Zealand)'
  Law and crime:
  - The male friend of the Delhi gang-rape victim – the only witness in the case –
    on Friday spoke for the first time in front of the nation and exclusively told
    Zee News that his friend was "positive" and wanted to live even after the horrific
    incident that took place on the night of December 16. (Zee News)
  - An armed standoff between a gunman and police leaves three hostages and the perpetrator
    dead in an Aurora, Colorado home. (CNN) (BBC) (Fox News)
  Sport:
  - In tennis, Fernando Verdasco and Anabel Medina Garrigues from Spain win the 2013
    Hopman Cup beating Serbia team in the final. (Hopman Cup)
  - In ice hockey, USA team wins the 2013 IIHF World U20 Championship after a 3–1
    win over Sweden in the final in Ufa, Russia. (World Junior 2013)
