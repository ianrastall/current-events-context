Date: '2013-01-27'
Source_URI: Portal:Current events/2013 January 27
Intelligence_Payload:
  War in Afghanistan (2001–2021):
  - At least twenty members of the Afghan National Police have been killed in bomb
    attacks over the past day with eight police officers killed in the latest attack
    in Kandahar. (Reuters)
  Syrian civil war:
  - Reports claim that elite Syrian military forces shell the town of Darayya just
    southwest of Damascus. (AAP via The Australian)
  Northern Mali conflict (2012–present):
  - French forces prepare an attack on Timbuktu to defeat Islamists, as more African
    troops are sent into Mali. (BBC)
  2012–2013 Egyptian protests:
  - Seven more people are killed and 630 injured during the funerals for 33 people
    killed the day before in Port Said. (Ahram Online) (BBC) (Al Jazeera)
  - In a televised statement, President of Egypt Mohamed Morsi declares a 30-day state
    of emergency and a curfew from 9:00 pm to 6:00 am in the cities of Port Said,
    Suez and Ismaïlia. (Al Jazeera)
  Disasters and accidents:
  - 'Kiss nightclub fire: A fire at a nightclub in the southern Brazilian city of
    Santa Maria kills at least 235 people and injures at least 169 people. (BBC) (Reuters)
    (CNN) (AP)'
  - At least seven workers die in the factory fire in the capital of Bangladesh, Dhaka.
    (The Wall Street Journal)
  - A landslide in the Indonesian island of Sumatra kills at least 4 people with 18
    missing. (AFP via Malaysia Star)
  - Heavy rain caused by former Tropical Cyclone Oswald continues to cause significant
    flooding in the Australian state of Queensland with the capital Brisbane amongst
    those affected. (ABC News Australia)
  - A bus crashes and falls into a ravine near the eastern Portuguese town of Sertã,
    killing 11 people and injuring 32. (BBC) (Reuters) (UPI)
  - A retaining wall of a soccer field collapses during a match in the Ugur Sports
    Facility in Şırnak Province, Turkey, killing 7 people and injuring 3 others. (UPI)
    (Sanliurfa) (World Bulletin)
  Politics and elections:
  - Tens of thousands of people rally in Paris in support of the legalisation of gay
    marriage and adoption in France. (AP via Washington Post)
  - Voters in Bulgaria go to the polls to vote on a referendum on building a new nuclear
    power plant at Belene. (BBC)
  Science and technology:
  - Using H-IIA rocket, Japan launches two spy satellites to collect sharp imagery
    for the government's defence and intelligence agency. (Space.com) (China Daily)
  Sport:
  - In tennis, Novak Djokovic wins the men's singles at the 2013 Australian Open after
    his four-set victory over Andy Murray in the final. The Serbian player becomes
    the first male player in the Open Era to win three consecutive Australian Open
    singles titles. (BBC) (Reuters)
  - In chess, Magnus Carlsen, the world number one from Norway, wins the 2013 Tata
    Steel Chess Tournament ahead of Levon Aronian and Viswanathan Anand. (Tata Steel
    Chess) (ChessNews) (ChessBase)
  - In team handball, Spain wins 2013 World Men's Handball Championship defeating
    Denmark with a 35–19 score in the final. (IHF)
  - In boxing, 17-year-old Indonesian boxer Tubagus Sakti dies of a brain haemorrhage
    after losing a fight to Ical Tobida in Jakarta. (Boxing Scene) (Delfi Sport) (Bangkok
    Post)
  - In auto racing, Charlie Kimball, Juan Pablo Montoya, Scott Pruett and Memo Rojas
    from Chip Ganassi Racing team win 2013 24 Hours of Daytona. (Autosport) (Motorsport)
  2012–13 FA Cup fourth round:
  - European champions Chelsea twice come from behind to secure a replay against third-tier
    club Brentford in the first meeting between the teams since 1950. (BBC) (The Guardian)
  - Third-tier club Oldham Athletic eliminate Liverpool. (BBC) (The Guardian)
  - Second-tier club Leeds United eliminate Premier League club Tottenham Hotspur.
    (BBC) (The Guardian)
  - The draw for the fifth round pairs Oldham Athletic with Everton and Leeds United
    with Manchester City, while non-league club Luton Town are paired with Millwall
    and Milton Keynes Dons are paired with Barnsley. (Mirror)
