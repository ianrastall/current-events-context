Date: '2013-07-15'
Source_URI: Portal:Current events/2013 July 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mexican Drug War
  - The Mexican Army captures Miguel Treviño Morales, the supreme leader of Los Zetas
    drug cartel. (CBS News)
  - Militants open fire on a bus carrying workers from a cement factory in Arish,
    Northern Sinai, Egypt, killing three and injuring 17. The gunfire is believed
    to have been intended for a police vehicle.(AFP via NDTV)
  - The M23 rebel movement and the Congolese Army are engaged in heavy fighting in
    the environs of Goma. (BBC)
  - A car bomb strikes Deir Atiyah, north of Damascus, killing 13. (BBC)
  Arts and culture:
  - International linguists announce the discovery of a new language in Australia
    called Light Warlpiri. (news.com.au)
  Business and finance:
  - Asiana Airlines says they will sue Oakland, California television station KTVU
    for defamation after the station reported the wrong names of the pilots of Asiana
    Airlines Flight 214. (CNN)
  - Loblaw Companies Limited, one of Canada's largest supermarket chain owners, agrees
    to purchase Canada's largest pharmacy retailer Shoppers Drug Mart for almost $12.4
    Billion dollars. (Reuters)
  Disasters and accidents:
  - Two British soldiers die during a training exercise as they take part in a gruelling
    selection process for the elite SAS unit on the hottest day of the year. (AFP
    via News24)
  International relations:
  - Thein Sein, the President of Burma (Myanmar) visits the United Kingdom. (The Telegraph
    via the Brisbane Times)
  Law and crime:
  - Indonesian police report that at least 18 people were killed and 47 injured following
    a riot at a boxing match. (Associated Press via Inquirer) (AFP via Yahoo News
    South Africa)
  - A war crimes tribunal finds Bangladeshi ex-politician Ghulam Azam, former leader
    of the Bangladesh Jamaat-e-Islami, guilty of war crimes during the Bangladesh
    Liberation War in 1971. (BBC)
  - The House of Lords, the upper house of the United Kingdom, approves the Marriage
    (Same Sex Couples) Bill, meaning it will become law, enabling gay marriage in
    England and Wales to take place from 2014. (BBC)
  Sports:
  - Oakland Athletics outfielder Yoenis Céspedes defeats Bryce Harper of the Washington
    Nationals to win the 2013 Major League Baseball Home Run Derby. (ESPN)
