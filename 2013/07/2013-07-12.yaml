Date: '2013-07-12'
Source_URI: Portal:Current events/2013 July 12
Intelligence_Payload:
  Armed conflict and attacks:
  - The Moro National Liberation Front kidnaps eight civilians in the Philippines
    Basilan province later releasing four of them. (Inquirer)
  Somali Civil War (2009–present):
  - A car bomb explodes near an African Union convoy killing three soldiers. (Capital
    FM Kenya)
  Business and economics:
  - Swedish high-quality crystal glassware producer Orrefors closes down. (Svenska
    Dagbladet)
  - The Dow Jones Industrial Average and S&P 500 close at record highs, with the NASDAQ
    hitting its highest level in ten years. (CNN)
  Disasters and accidents:
  - The toll of dead and missing people from the 2013 Southwest China floods rises
    above 40 with Sichuan province worst affected. (Reuters)
  - 9 people are feared dead and 88 are rescued by Australian authorities after a
    boat carrying asylum seekers capsizes north of Christmas Island. (The Australian)
  - A commuter train derails in the Paris suburb of Brétigny-sur-Orge with at least
    eight people dead. (France24) (ITV)
  - A third person, a critically injured unidentified girl, dies at San Francisco
    General Hospital of injuries she sustained as a result of the Saturday, July 6,
    2013 crash-landing of Asiana Airlines Flight 214, a Boeing 777 (180 were injured,
    16 remain hospitalized, including two critical adults; autopsy results will take
    about 3 weeks). (NBC)
  - An empty Ethiopian Airlines Boeing 787 Dreamliner catches fire eight hours after
    landing at London Heathrow Airport, closing runways for an hour. Another Boeing
    787 Dreamliner (Thomson Airways-owned) was forced to return to Britain's Manchester
    Airport after an unspecified mechanical problem. (MSN)
  International relations:
  - The US calls on the Egyptian Army to free deposed president Mohamed Morsi. (BBC)
  - Malala Yousafzai of Pakistan visits the UN headquarters in New York City to celebrate
    her 16th birthday with the UN address. (AP via Yahoo! News)
  Law and crime:
  - Authorities in Indonesia search for 70 prison inmates who escaped from the Tanjung
    Gusta prison in North Sumatra province after a prison riot last night. Twelve
    of the escapees were convicted of terrorism related offences. (AAP via SBS)
  - In Ireland, the Dáil votes to approve the controversial Protection of Life During
    Pregnancy Bill 2013 (RTÉ)
  - Two people are killed and one person is wounded during a shooting in the South
    of Market neighborhood of San Francisco, California, United States. A suspect
    is in custody. (San Francisco Chronicle)
  - Romanian Transport minister Relu Fenechiu is sentenced to 5 years imprisonment
    for complicity in abuse of power but the decision is not final. (Realitatea TV)
  Politics and elections:
  - Supporters and opponents of deposed President of Egypt Mohamed Morsi hold rallies
    on the first Friday of Ramadan. (Sky News)
  - U.S. Homeland Security Secretary Janet Napolitano announces her resignation to
    become the President of the University of California. (Los Angeles Times)
