Date: '2013-07-01'
Source_URI: Portal:Current events/2013 July 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 47 people are killed and more than 90 wounded in two separate bomb blasts
    in Pakistan, one in a Shiite suburb of Quetta and the other in an attack on a
    paramilitary convoy in the northwest of the country; a Sunni extremist group reportedly
    claims responsibility. (CNN)
  - Two suspected militants and a policeman are shot dead during a gun battle in Tral,
    Jammu and Kashmir. (BBC)
  2012–2013 Egyptian protests:
  - Demonstrations across Egypt gather about 15 million people nationwide calling
    for the resignation of Egyptian President Mohammed Morsi. (The Atlantic)
  - At least 16 people, including an American, have been killed, and 800 injured,
    in the anti-government demonstrations that began last week. (The Jerusalem Post)
    (CNN)
  - Egyptian army officials issue a 48-hour ultimatum to the Muslim Brotherhood-linked
    government of President Mohamed Morsi to respond to the concerns of millions of
    protesters who have taken to the streets calling for Morsi’s resignation, or it
    will “step in to restore order”. (BBC) (The New York Times) (CNN)
  Arts and culture:
  - The United States commemorates the 150th anniversary of the Battle of Gettysburg,
    a decisive battle in the American Civil War. (Washington Post)
  International relations:
  - Croatia becomes the 28th member of the European Union. (ABC News)
  - Former United States spy agency contractor Edward Snowden applies for political
    asylum in Russia. (Reuters)
  Politics and elections:
  - Former Chilean president Michelle Bachelet gets a landslide victory, becoming
    the presidential candidate of the Nueva Mayoría centre-left coalition for the
    next November elections. Pablo Longueira, former Minister of Economy, wins the
    centre-right primary. (The New York Times)
  - Vítor Gaspar, Minister of Finance of Portugal, resigns due to lack of support
    and willingness to strengthen austerity measures, prompting a political crisis.
    The Minister is replaced by Treasury Secretary Maria Luís Albuquerque. (Globe
    and Mail)
