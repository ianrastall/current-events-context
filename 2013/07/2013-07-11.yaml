Date: '2013-07-11'
Source_URI: Portal:Current events/2013 July 11
Intelligence_Payload:
  Armed conflict and attacks:
  - Bomb and gun attacks across Iraq kill more than 30 people including members of
    the Iraqi security forces. (BBC)
  Disasters and accidents:
  - '2013 Assam floods: Floods in Indian state of Assam force nearly 250,000 people
    to leave their homes. (BBC)'
  - The death toll from the Lac-Mégantic train disaster is presumed at 50. (Los Angeles
    Times)
  - Heavy rain in southwest China causes floods and landslides with at least 9 people
    dead and 62 missing. (AFP via Channel News Asia)
  - Taiwan evacuates 2,000 tourists as it prepares for Typhoon Soulik expected later
    this week. (AFP via France 24)
  - Eight people are injured (three seriously) in Lower Manhattan as a result of an
    explosion and partial collapse, of as-yet unknown cause, in a five-storey building,
    in Chinatown, Manhattan, New York City, on Pike Street, near Henry Street. (NBC)
  International relations:
  - An Iranian exile group claims that it has evidence of secret nuclear facilities
    located in tunnels beneath a mountain near the town of Damavand. (AFP via France
    24)
  - Six women climb western Europe's tallest skyscraper, The Shard, towering over
    Shell's headquarters in London, to protest against Arctic drilling. (BBC)
  Law and crime:
  - A district court in Moscow convicts the late investment fund auditor Sergei Magnitsky
    of tax evasion in Russia's first posthumous trial. (Russia Today)
  - An Indian juvenile court is due to deliver its verdict on a seventeen-year-old
    boy accused of participating in the gang rape and murder of a 23-year-old woman
    in the New Delhi suburb of Munirka. (BBC)
  - Three suspected robbers are killed in a shoot-out in Davao City, Philippines,
    and one suspected robber is returned to Manila to be imprisoned. (ABS-CBN News
    Online)
  - The lower house of the Irish parliament passes the Protection of Life During Pregnancy
    Bill, legalising abortion when the woman's life is at risk. (RTE)
  Politics and elections:
  - The Prime Minister of Luxembourg Jean-Claude Juncker resigns over a scandal in
    the Service de Renseignement de l'État (State Intelligence Service), leading to
    an election being called. (BBC)
  - The Mali government returns to the northern city of Kidal. (ABC), (Washington
    Post)
