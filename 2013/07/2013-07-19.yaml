Date: '2013-07-19'
Source_URI: Portal:Current events/2013 July 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Colombian FARC offer to release Kevin Scott Sutay, an American soldier captured
    last month. (AFP via France 24)
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide bombing inside a Sunni mosque in the eastern Iraqi province of Diyala
    kills at least twenty people. (BBC)
  International relations:
  - The Prime Minister of Australia, Kevin Rudd, announces a plan to settle asylum
    seekers who come by boat in Papua New Guinea. (The Australian)
  Law and justice:
  - Pope Francis names a new Pontifical Commission to investigate current accounting
    practices among all Vatican offices and bodies and to help devise new strategies
    for greater fiscal responsibility and fiscal transparency. (Catholic News Service)
  - A Russian court releases Kremlin critic Alexei Navalny a day after being sentenced
    for alleged embezzlement. (AP via The Hindu)
  Politics and elections:
  - Cambodian opposition leader Sam Rainsy returns home to contest the general election
    after receiving a royal pardon for a conviction in 2009. (AP via Calgary Herald)
  - The Muslim Brotherhood calls for millions of supporters to hold rallies across
    Egypt two weeks after Mohamed Morsi was deposed as president. (NBC News)
