Date: '2013-07-17'
Source_URI: Portal:Current events/2013 July 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Al-Qaeda in the Arabian Peninsula confirms that its former deputy Said Ali al-Shihri
    was killed in a US drone strike. (ABC Online)
  - Protests break out in Egypt when envoys from the European Union visit the country,
    protesting for Morsi to be brought back to power. (Al Jazeera)
  - A bomb detonates inside a teahouse in Mosul, Iraq killing at least 10 people.
    (Reuters)
  Syrian civil war:
  - 1 man and a 15-year-old boy are killed near the Turkish border town of Ceylanpınar
    after clashes erupted between Al-Nausra and female Kurds of the YPG. (Hurriyet
    Daily News), (Daily star News)
  - 7 people are killed by a car bomb close to Damascus. (Sky News)
  Disasters and accidents:
  - At least 58 people are dead and 175 missing in floods in China's Sichuan province.
    (xinhuanet)
  - A heat wave settles over the United States with at least one death reported. (AP
    via Newser)
  Law and crime:
  - A Bangladesh war crimes tribunal sentences Ali Ahsan Mohammad Mojaheed, Secretary
    General of the Bangladesh Jamaat-e-Islami political party, to death for atrocities
    committed during the Bangladesh Liberation War. (Reuters)
  - German authorities indict Formula One boss Bernie Ecclestone for alleged bribery.
    (Guardian)
  - Same-sex marriage becomes legal in England and Wales after the Marriage (Same
    Sex Couples) Bill receives Royal Assent. (BBC)
  - In a new law the United Arab Emirates is offering citizens a gram of gold for
    every kilogram of weight they lose in an attempt to curb the rising obesity rate
    in the nation. (NPR)
  - Asiana Airlines redacts their lawsuit of San Francisco news station KTVU over
    displaying racist names. (NPR)
  Movies:
  - The Movie Premiere of Turbo
  - From the People Who Brought You Madagascar, Kung Fu Panda, The Croods, How to
    Train Your Dragon and Shrek
  Politics and government:
  - Rivers State governor Rotimi Amaechi and his convoy are pelted with stones, coming
    days after he was suspended from People's Democratic Party, allegedly for lodging
    his opposition against Goodluck Jonathan. (BBC)
  - Senior Syrian government official Mohammed Darrar Jamo is shot dead in Sarafand,
    Lebanon. (BBC)
  - Thousands of protesters gather outside the Hellenic Parliament in opposition of
    a new bill that would cut thousands of public sector jobs. (Reuters)
  - Chilean politician Pablo Longueira withdraws his candidacy for the presidential
    election, less than a month after winning the primaries of the right-wing coalition.
    (Reuters)
  Science:
  - Researchers from different medical centers at major cities in the United Kingdom,
    led by Cancer Research UK's London Research Institute and University College London,
    are embarking on a massive long-term effort to study lung cancer's resistance
    to treatment by mapping involved genes using patient profiles. (BBC)
