Date: '2013-07-03'
Source_URI: Portal:Current events/2013 July 3
Intelligence_Payload:
  2013 Egyptian coup d'etat:
  - Egypt's military deposes President Mohamed Morsi, and installs Adly Mansour, the
    head of the Supreme Constitutional Court, as the country's new interim leader.
    (CNN)
  - The Egyptian military takes control of state TV studios and places a travel ban
    on Egyptian president Mohamed Morsi and other Muslim Brotherhood leaders as a
    military coup d'etat unfolds, following a week of anti-government unrest. (The
    Independent)
  - President Morsi is reportedly placed under house arrest as troops deploy across
    Cairo and armored vehicles and soldiers mass at Cairo University and other key
    sites. (The Times of Israel)
  U.S. drone attacks on Pakistan:
  - The death toll from a United States drone strike on a militants camp in the North
    Waziristan area of Pakistan rises to 16. (AP via Huffington Post)
  - Pakistan condemns the latest deadly U.S. drone strike to violate its "sovereignty
    and territorial integrity". (Al Jazeera)
  Arts and culture:
  - A 4,000-year-old pyramid at El Paraíso in Peru is destroyed by property developers.
    (BBC News)
  Disasters and accidents:
  - The death toll from a 6.2 magnitude earthquake in Indonesia's Aceh Province rises
    to 42, with more than 400 injured and thousands of buildings damaged. (AFP via
    Fox News)
  Diversion of Bolivian president Evo Morales' flight:
  - The presidential jet of Bolivia is denied access to European airspace and forced
    to land in Vienna amid concerns that Edward Snowden is on board. (BBC)
  - Bolivia files a complaint at the United Nations over what is called the "kidnapping"
    of its president. (The Guardian)
  - Morales's fellow South American leaders condemn what they consider to be an act
    of aggression by the U.S. and its allies. Protests take place at the French Embassy
    in Bolivia. (Al Jazeera)
  Law and crime:
  - Ecuador announces the discovery of a bugging device used to listen in on its embassy
    in the United Kingdom. Ecuador's foreign minister Ricardo Patiño declares it as
    "another instance of a loss of ethics at the international level in relations
    between governments". (The Guardian) (Al Jazeera)
  Films:
  - The film premiere of Despicable Me 2, which is the sequel to Despicable Me (2010).
  Politics and elections:
  - King Albert II of Belgium announces his abdication (effective July 21) for health
    reasons in favour of his son Prince Philippe, Duke of Brabant. (Nieuwsblad) (DeRedactie.be)
