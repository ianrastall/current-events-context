Date: '2013-07-08'
Source_URI: Portal:Current events/2013 July 8
Intelligence_Payload:
  Aftermath of the 2013 Egyptian coup d'état:
  - At least 42 people have been killed and hundreds injured after the Army raids
    a sit-in by supporters of former President Mohamed Morsi in the Nasr City district
    of Cairo. (BBC)
  Disasters and accidents:
  - At least twelve people are killed and a dozen injured when a dilapidated hotel
    collapses in the Indian city of Hyderabad. (The Hindu)
  - After six days with temperatures over 40°C (104°F), Portugal officially has a
    heat wave. Temperatures have reached as high as 45°C in some places in Alentejo
    and Ribatejo.
  - In the Greater Toronto Area, Canada, 126 mm of rain falls causing major flooding
    bursting most rivers and creeks. It is the single highest rain total in a day
    since Hurricane Hazel. (CBC News)
  International relations:
  - 2013 mass surveillance scandal
  - Bolivia summons the ambassadors of France, Spain and Portugal to explain why their
    countries blocked President Evo Morales' official jet en route to land on the
    Eurozone last week, amid orders to be searched if Edward Snowden was on board.
    (BBC)
  - Brazil calls on the United States, asking to explain why US intelligence agencies
    have been monitoring millions of emails and phone calls of Brazilian citizens
    in their country. (The Guardian)
  - The US Department of State confirms dialogue with Brazil on the alleged intelligence
    activity. (Merco Press)
  Law and crime:
  - Former Chinese Railways Minister Liu Zhijun is given a suspended death sentence
    for corruption. (BBC)
  - A French court clears oil company Total S.A., its chief executive and over a dozen
    defendants of corruption charges related to the United Nations oil-for-food programme
    in Iraq. (BBC)
  Politics and elections:
  - The Syrian Ba'ath Party announces a shakeup of leadership positions with Vice
    President Farouk al-Sharaa losing his position. (AFP via Fox News)
  - The Syrian opposition figure Ghassan Hitto task with forming an interim government
    to administer rebel-held areas has resigned, citing an inability to do so during
    a meeting in Istanbul. (BBC) (Ya Libnan)
  - Governor of Texas Rick Perry, the longest serving governor in his home state,
    announces he will not seek a fourth term. (BBC)
  Science and technology:
  - NASA Curiosity Mars rover begins its mission to its destination and drives to
    Mount Sharp. (BBC)
  Religion:
  - Pope Francis visits the tiny Italian island of Lampedusa, holds a mass to pay
    tribute to the many immigrants who have drowned trying to reach Europe and condemns
    the "global indifference" to their plight. (BBC), (The Guardian)
