Date: '2013-07-23'
Source_URI: Portal:Current events/2013 July 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Nine people are killed in Cairo, Egypt, as fighting between supporters and opponents
    of former President Mohamed Morsi continues. (BBC)
  - A bomb kills eight people in Afghanistan's Wardak Province, including three United
    States Army soldiers, four Afghan National Army soldiers and an Afghan interpreter.
    (New York Times)
  Arts and culture:
  - Tens of thousands of Roman Catholics greet Pope Francis in Rio de Janeiro, Brazil,
    during his first foreign trip as pontiff. (BBC)
  Disasters and accidents:
  - A collision between a tour bus and a truck kills at least 19 and injures 22 in
    Saraburi, Thailand. (Bangkok Post) (BBC)
  - The Cyclospora parasite sickens more than 250 people in the Midwestern United
    States as the result of contamination of fresh produce shipped across state lines.
    The CDC report that eight people have been hospitalized with cyclosporiasis. (NBC)
  - Japan begins a renewed effort to halt the leak of radioactive material from the
    tsunami-damaged Fukushima Daiichi nuclear power plant. (BBC)
  - Hercules 264, a Gulf of Mexico natural gas drilling rig, partially collapses off
    the coast of Louisiana after catching fire. (NBC) (Wall Street Journal)
  Law and crime:
  - Burma frees dozens of political prisoners as part of the country's ongoing effort
    at political reform. (Deutsche Welle)
  - Eighteen Britons are arrested on the Greek island of Crete, following the murder
    of a male tourist and a violent confrontation between tourists and local police.
    (BBC)
  - China announces a five-year ban on the construction of new government buildings,
    as part of a major effort to curtail state corruption and overspending. (The Guardian)
  - The Simon Wiesenthal Center begins a public campaign in Germany to bring to justice
    the last surviving Nazi war criminals from the Second World War. (BBC)
  - A New York nuclear power plant supervisor is charged with falsifying test results
    involving emergency generators to prevent the plant from being shut down. (NBC)
  Politics and elections:
  - Protesters besiege the Parliament of Bulgaria in Sofia amid major anti-government
    rallies. (Chicago Tribune)
  - The President of South Sudan, Salva Kiir Mayardit, sacks his entire government,
    including the Vice President, Riek Machar. (Voice of America)
