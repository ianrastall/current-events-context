Date: '2013-07-26'
Source_URI: Portal:Current events/2013 July 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 57 people are killed in a marketplace bombing in Parachinar, Pakistan.
    (BBC)
  Aftermath of the 2013 Egyptian coup d'état:
  - Mass rival demonstrations are held across Egypt three weeks after Mohamed Morsi
    was deposed as president in a military coup d'état. At least eight people die
    and hundreds are injured in violence during the rallies. (Reuters) (BBC) (Times
    of Israel) (Al-Jazeera)
  Business and economy:
  - A general strike is called in Tunisia following the assassination of opposition
    leader Mohamed Brahmi on July 25. (AP via Fox News)
  Disasters and accidents:
  - Landslides caused by heavy rain kill at least nine people and trap eight others
    south of Dingxi, China. (AP via Fox News)
  - A state of emergency is declared in Ireland as torrential rain floods a hospital
    in the north-west of the country and shuts roads and other transport links in
    the east. (RTÉ)
  - Qatar Airways grounds one of its Boeing 787 Dreamliners following a "minor" technical
    issue, as pressure mounts on Boeing over possible new electrical problems with
    the newly released jet. (Reuters)
  - Large storm causing 97 mph winds and heavy rain hit Albuquerque NM. This storm
    cut power to large portions of the city and causes heavy flooding for the area
  Law and crime:
  - Police in Spain formally detain the driver of a high-speed train that derailed
    and crashed in Santiago de Compostela, killing 78, on July 24. The driver is accused
    of manslaughter and reckless driving. (BBC) (The Guardian)
  - Ariel Castro, a 53-year-old man charged with the kidnappings of three women from
    Cleveland, Ohio, between 2002 and 2004, is sentenced to life imprisonment without
    the possibility of parole after accepting a plea deal with prosecutors. (BBC)
  - Swiss bank UBS AG pays $885m in a settlement with American regulators over allegations
    that the bank misrepresented mortgage-backed bonds during the pre-2007 housing
    bubble, paving the way for billions more to be paid by other banks. (Reuters)
  - A gunman kills six people in Hialeah, Florida, and gets fatally shot by police.
    (Los Angeles Times)
  Sports:
  - Large-scale athletic events are held in London on the anniversary of the 2012
    Summer Olympics. (Daily Telegraph)
