Date: '2013-07-06'
Source_URI: Portal:Current events/2013 July 6
Intelligence_Payload:
  Arts and Culture:
  - English rock band, Muse held a concert in Rome, which is called "Live at Rome
    Olympic Stadium". The concert become the first ever live concert recorded in 4K
    resolution.
  Nigerian Sharia conflict:
  - Islamic extremists kill 42 people, mainly students, in an attack on the Government
    Secondary School boarding school in the Nigerian town of Mamudo in Yobe state.
    (AP)
  War in North-West Pakistan:
  - A bomb in a market street kills 4 people and wounds 47 others in eastern Pakistan.
    (ABC)
  Disasters and accidents:
  - At least fourteen people are killed as Pakistan Railways Karakoram Express runs
    over a rickshaw near the city of Sheikhupura. (The News Pakistan)
  - A runaway train carrying crude oil derails and explodes in the town of Lac-Mégantic,
    Québec, Canada. Early reports say that <!--
  - A Boeing 777 flown by Asiana Airlines crash-lands at San Francisco International
    Airport with 3 dead and 181 injured. (CNN) (KTVU) (BBC News)
  Politics and elections:
  - Mali lifts a state of emergency ahead of a presidential election. (Reuters)
  - Mohamed ElBaradei is named as the Prime Minister of Egypt. (AAP via News Limited)
  Portuguese political crisis, 2013:
  - Paulo Portas becomes Deputy Prime Minister, the first since 1985. Prime Minister
    Passos Coelho will make additional reshuffles to his cabinet.
  Sport:
  - In rugby union, the British and Irish Lions rout Australia 41–16 in Sydney to
    win their three-Test series 2–1. It is the Lions' first series win since 1997,
    when they defeated South Africa. (BBC Sport)
  At the 2013 Wimbledon Championships in tennis:
  - Marion Bartoli of France defeats Sabine Lisicki of Germany 6–1, 6–4 in the Ladies'
    Singles final, claiming her first Grand Slam singles title. (AP via ESPN)
  - Bob and Mike Bryan of the USA defeat Ivan Dodig of Croatia and Marcelo Melo of
    Brazil 3–6, 6–3, 6–4, 6–4 in the Gentlemen's Doubles final, becoming the first
    men's doubles team in the Open era to hold all four Grand Slam titles at the same
    time. (BBC Sport)
