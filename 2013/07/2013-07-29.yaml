Date: '2013-07-29'
Source_URI: Portal:Current events/2013 July 29
Intelligence_Payload:
  Iraqi insurgency (2011–13):
  - A wave of twelve car bombs targeting Shiite communities in Iraq kills at least
    44 people. (Reuters)
  War in North-West Pakistan:
  - The Pakistani Taliban attacks a prison in the Pakistani city of Dera Ismail Khan
    with more than 300 prisoners freed. (Times of India)
  Disasters and accidents:
  - '2013 Pacific hurricane season: Tropical Storm Flossie is predicted to make a
    rare landfall in the US island state of Hawaii with warnings of heavy rain with
    the potential for flooding and landslides. (AP)'
  - A building explosion and collapse in Philadelphia causes injuries to at least
    eight people. (CNN) (MyFoxPhilly)
  - Two passenger trains collide in the Swiss municipality of Granges-près-Marnand
    near Lausanne resulting in dozens of injuries including four serious injuries.
    (RT)
  - Seven people have been injured following a series of explosions at a propane plant
    in the US town of Tavares in central Florida. (Fox News), (BBC), (AP via Vancouver
    Post)
  - Five people died and a woman was injured in a helicopter crash, in Romania (Puterea.ro)
  International relations:
  - The New Zealand Ministry of Defence announces that it will investigate claims
    that it collected telephone metadata on Jon Stephenson, a freelance journalist
    for The McClatchy Company in Afghanistan. (AP via MyFox Phoenix)
  Law and crime:
  - €103 million worth of diamonds and other jewels are stolen from the Carlton Intercontinental
    Hotel in Cannes, in one of Europe's biggest jewelry heists in recent years. (AP
    via News24)
  - FBI announces the arrests of 150 suspects, during a three-day sweep that took
    place in 76 cities across the United States, on charges of child sex-trafficking.
    (Reuters)
  Sports:
  - In association football, former Birmingham City and Club América striker Christian
    Benítez dies of cardiac arrest complications in a hospital in Qatar. Having won
    the championship in Mexico, Benítez signed with El Jaish SC. (Excélsior)
