Date: '2013-07-10'
Source_URI: Portal:Current events/2013 July 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian civil war
  - Syrians in Aleppo stage a protest against a rebel siege of government-held areas
    in the city. (BBC)
  Arts and culture:
  - American country music star Randy Travis suffers a stroke while being hospitalized
    for congestive heart failure. (MSN)
  Business and economy:
  - A U.S. district court rules that Apple Inc. has conspired to fix the prices of
    eBooks. The ruling could expose Apple to significant damages. (Reuters)
  Disasters and accidents:
  - A rain-triggered landslide in southern China's Sichuan Province buries between
    30-40 people. (Xinhua)
  - The death toll from the Lac-Mégantic derailment in the Canadian province of Quebec
    rises to 20, with 30 people missing presumed dead. (AP via CBS News)
  Law and crime:
  - Boston Marathon bombing
  - Suspect Dzhokhar Tsarnaev makes his first appearance in a U.S. court since his
    arrest on April 19. (AP via Montreal Gazette)
  - Tsarnaev pleads not guilty to 30 counts including using a weapon of mass destruction
    in his first court appearance. (The Verge), (BBC)
  - Egyptian prosecutors seek the arrest of Mohammed Badie, the leader of the Muslim
    Brotherhood, for allegedly instigating the 2013 Republican Guard headquarters
    clashes. (BBC)
  Politics:
  - President of Mongolia Tsakhiagiin Elbegdorj is sworn into office for his second
    term as President of Mongolia in front of Genghis Khan's monument, the Parliament
    and public on main Sükhbaatar Square in Ulaanbaatar. This is the first time Mongolian
    President took oath in front of public in the country's history. (Montsame News
    Agency)
  - Prominent Russian opposition figure Alexei Navalny registers himself to stand
    in September's vote for Moscow mayor. (BBC)
  - 'The President of Portugal Cavaco Silva calls for a national salvation understanding
    between the three main parties: the Socialists, and the governing coalition PSD
    and CDS-PP. In a statement after the President''s communication to the country,
    the Socialists said they will not support such Government and called for early
    elections. (Reuters)'
  Sports:
  - In cricket, the 2013 Ashes series between England and Australia begins at Trent
    Bridge in the English county of Nottinghamshire. (Daily Mail)
  - Host Sweden are held by Denmark in a 1-1 draw with two second half penalties saved
    in Euro 2013 group stage opener. (BBC Sports)
  Science:
  - With still two years until its closest approach, NASA's New Horizons team releases
    the spacecraft's first high resolution view of the Pluto/Charon dwarf planet system.
    (JHUAPL)
