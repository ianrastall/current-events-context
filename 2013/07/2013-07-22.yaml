Date: '2013-07-22'
Source_URI: Portal:Current events/2013 July 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Six people – including army officers and policemen – are killed and another eleven
    wounded in a series of militant attacks in Egypt's Sinai Peninsula. (Reuters)
  - At least 37 people are killed in Iraq amid a two-day spate of suicide bombings
    and armed prison escapes. (AP via Fox News)
  Arts and culture:
  - Catherine, Duchess of Cambridge, gives birth to a healthy boy, George Alexander
    Louis. The child, formally known as His Royal Highness Prince George of Cambridge,
    is third in line to the British throne. (BBC) (The Guardian) (New Zealand Stuff)
    (CNN)
  Disasters and accidents:
  - Two earthquakes strike Gansu province, China, killing at least 89 people and injuring
    over 500. (CNN) (Reuters) (NBC News) (BBC)
  - A Southwest Airlines Boeing 737-700 crash-lands at New York's LaGuardia Airport,
    injuring ten passengers. (Sky News) (BBC)
  International relations:
  - Pope Francis begins a week-long official visit to Brazil, his first foreign trip
    since assuming the pontificate. (BBC)
  - The United Nations High Commissioner for Refugees states that there are approximately
    625,000 refugees from the Syrian civil war living in Lebanon. (IANS via Vancouver
    Post)
  - The European Union announces the addition of the military wing of Hezbollah to
    its official list of terrorist organizations. (CNN)
  - The presidents of Colombia and Venezuela meet to resolve a high-level diplomatic
    dispute. (Reuters)
  Law and crime:
  - British pharmaceutical company GlaxoSmithKline admits that some of its senior
    executives in China appear to have broken the law as part of a bribery scandal.
    (Reuters)
  - British Prime Minister David Cameron announces plans for every household in the
    UK to automatically have pornography blocked by their internet service provider,
    unless they choose otherwise. (BBC)
  - At least five people are killed and seven injured after criminals open fire on
    community safety volunteers in the western Mexican state of Michoacán. (AP via
    Silicon Valley Mercury)
  - A 76-year-old man is sentenced to life in prison without parole for the 2012 murder
    of a 13-year-old boy in Milwaukee, Wisconsin. (AP) (Huffington Post)
  Science:
  - The United Kingdom experiences its hottest day since July 2006, with a temperature
    of 33.5C (92.3F) recorded at Heathrow and Northolt in London. (BBC)
  - American scientists report that dolphins have unique names for one another, which
    they respond to just as humans do. (National Geographic)
  Sports:
  - Ryan Braun of the Milwaukee Brewers is suspended without pay for the rest of the
    season for violating Major League Baseball's drug policies. (USA Today)
