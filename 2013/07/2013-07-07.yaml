Date: '2013-07-07'
Source_URI: Portal:Current events/2013 July 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - A serial blast injures 5 people near Mahabodhi Temple at Bodh Gaya, in the Indian
    state of Bihar. (TOI)
  Disasters and accidents,:
  - A De Havilland Otter air taxi crashes near the Soldotna Airport in Soldotna, Alaska,
    killing all ten on board. (Associated Press via ABC News) (Peninsula Clarion)
  Law and crime:
  - Abu Qatada, a Palestinian Muslim cleric allegedly affiliated with al-Qaeda, is
    deported from the United Kingdom to Jordan to face charges of terrorism. (BBC)
  - Police in Sweden fatally shoot a knife-wielding man after he allegedly stabbed
    three people, an elderly woman fatally. (AP via News 24)
  Politics and elections:
  - Opponents of deposed Egyptian president Mohamed Morsi call for demonstrations
    to be held today in the aftermath of the 2013 Egyptian coup d'état (AAP via Herald
    Sun)
  Sport:
  - Andy Murray of the United Kingdom wins the Men's Singles at Wimbledon, defeating
    Novak Djokovic of Serbia in straight sets. Murray becomes the first British man
    to win Wimbledon since Fred Perry in 1936. (News Limited)
