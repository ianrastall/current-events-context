Date: '2013-07-30'
Source_URI: Portal:Current events/2013 July 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - 134 people are reported to have been killed in a new wave of violence between
    two rival tribes in Sudan's Darfur region. (Voice of America)
  Nigerian Sharia conflict:
  - 28 people are killed in a series of explosions targeting bars in the northern
    Nigerian city of Kano. (BBC)
  Syrian civil war:
  - 17 people are killed and 26 wounded in a mortar attack in the government-held
    district of Homs and the town of Dablan (ABC) (The Times of Israel)
  - A car bomb kills Syrian Kurdish politician Isa Huso outside his home near the
    Syrian-Turkish border. (Reiters)
  Arts and culture:
  - Vietnam’s Minister of Justice, Hà Hùng Cường, becomes the second government minister
    after the Health Minister to back plans to legalize same-sex marriage in Vietnam
    when he submits a draft of an amended Law on Marriage and Family to the government.
    (Gaystarnews)
  Business and economy:
  - Fiat wins at least a partial victory in Delaware Chancery Court, but the judge
    declines its invitation to order a United Autoworkers affiliated trust to sell
    its Chrysler shares to the Italian company. (Reuters)
  Disasters and accidents:
  - At least nine children are killed and another 20 injured after their school bus
    collides with a truck in the Indian city of Hanumangarh in Rajasthan state. (AP
    via ABC News America)
  - A mass funeral is held near the southern Italian town of Pozzuoli for the 38 victims
    of Sunday's bus crash. (BBC News) (CNN)
  - Eight people are injured in a gas explosion in the US state of Florida. (BBC)
  - The driver of a train that derailed in Spain last week, killing 79 people, is
    reported to have been on the phone with railway staff when the train crashed,
    possibly distracting him shortly before the crash, experts say. (CNN)
  - Honduras declares a state of emergency after an outbreak of dengue fever kills
    16 people and sickens 12,000. (AP via CTV News)
  International relations:
  - US Secretary of State John Kerry announces that Israeli and Palestinian officials
    have agreed to resume negotiations for a peace agreement. (The Jerusalem Post)
    (CNN) (The Telegraph)
  - EU Foreign Affairs head Catherine Ashton meets with deposed Egyptian President
    Mohamed Morsi at an undisclosed location and confirms he is in good health, while
    Morsi's Muslim Brotherhood supporters call for continued demonstrations against
    the new regime. (The Times of Israel) (The Telegraph) (UPI)
  Law and crime:
  - In United States v. Bradley Manning, Bradley Manning is acquitted of aiding the
    enemy by giving classified United States Army information to WikiLeaks. Manning
    is found guilty of five espionage charges and five theft charges. (CNN)(The Guardian)
  - JPMorgan Chase settles with the US Federal Energy Regulatory Commission for $410M
    due to alleged manipulation of energy markets in California and the Midwest. (Bloomberg)
  - The United States Department of the Treasury issues sanctions to three Mexican
    nationals linked to the Sinaloa Cartel for laundering money for the drug lords
    Ismael Zambada García and Joaquín Guzmán Loera. The Kingpin Act sanctions prohibit
    Americans to do any kind of business with them. (The Wall Street Journal)
  - Raif Badawi, the editor of a website that discussed the role of religion in Saudi
    Arabia, is sentenced to seven years in prison and 600 lashes for founding an Internet
    forum that "violates Islamic values and propagates liberal thought." (Reuters
    via New York Daily News)
  Politics and elections:
  - Mamnoon Hussain is elected as the 12th President of Pakistan. (Geo)
