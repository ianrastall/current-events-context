Date: '2013-07-05'
Source_URI: Portal:Current events/2013 July 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - An airstrike on anti-ship missiles in Latakia, Syria is carried out.(The Guardian)
  2013 Egyptian coup d'état:
  - Islamist gunmen stage multiple attacks on security forces in the Sinai Peninsula
    with one soldier and five policemen reported dead. (Reuters)
  - The death toll from clashes between supporters and opponents of former President
    Mohammed Morsi rises to 52 with another 2,500 people injured, after over 30 people
    are reported dead after clashes. The Egyptian Army clashes with protesters supporting
    Morsi. (Egypt Independent)
  - The African Union has announced that it has suspended Egypt's membership. (CNN)
  Syrian civil war:
  - The Syrian opposition calls for immediate humanitarian aid to Homs after the Syrian
    army and Hezbollah step up their siege of the city with increased artillery shelling
    and incendiary bombs. (USA Today)
  Iraqi insurgency (post-U.S. withdrawal):
  - 15 people die in a suicide bomb attack targeting a Shia mosque in the Iraqi capital
    of Baghdad. (BBC)
  Arts and culture:
  - the Vatican declares Pope John Paul II and Pope John XXIII canonized as saints.
    (The Telegraph)
  Business and economy:
  - Samsung Electronics announces its second quarter results, missing its forecasts
    and disappointing investors. (Reuters)
  - The European Central Bank and the European Commission release a joint report on
    the banking system in Spain, indicating that system is solvent and will not require
    "further program disbursements." (Reuters)
  Disasters and accidents:
  - 39 people are injured due to malfunctioning fireworks at a 4th of July event in
    Simi Valley, California. (AP via SFGate) (FOX News)
  - In three states—Wisconsin, Minnesota (where an elderly person's death was reported),
    and Illinois—in the United States, Whole Foods Market Inc. is recalling three
    types of the Crave Brothers (based in Waterloo, Wisconsin) Les Freres cheese,
    sold in 30 states and in Washington, D.C., due to concerns that it may be contaminated
    with Listeria monocytogenes, which causes listeriosis, dangerous especially to
    the immunocompromised and pregnant women. (NBC)
  International relations:
  - The People's Republic of China and Russia begin joint naval exercises in the Sea
    of Japan. (BBC)
  - NSA spying scandal
  - Bolivian president Evo Morales calls the Eurozone for a violation of international
    law and threatens to close down the U.S. embassy in Bolivia after the episode
    of having his official airplane being refused to land en route to Vienna, amid
    suspicions of having former NSA employee Edward Snowden on board. Ambassadors
    of France, Italy, Spain and Portugal are summoned to give full explanations.(The
    Guardian)
  - Venezuela and Nicaragua offer Snowden asylum. (AP via USA today)
  Law and crime:
  - A New Zealand court orders Pike River Coal to pay $3 million in compensation for
    the 29 victims of the Pike River Mine disaster. (ABC News Australian)
  Politics and elections:
  - Portuguese political crisis, 2013
  - Minister of Foreign Affairs Paulo Portas reportedly gives an ultimatum to the
    Prime Minister asking to exonerate the Minister of Finance Maria Luís Albuquerque
    in order to keep the first in the Government, as the President Cavaco Silva has
    demanded.
  - The Portuguese Parliament votes down a motion to apologize to the Government of
    Bolivia for not allowing the plane carrying President Evo Morales to land and
    fly over Portuguese national airspace.
  - Zimbabwe's top court rules that the general election should be held on July 31
    despite an appeal by President Robert Mugabe and his main rival Prime Minister
    Morgan Tsvangirai. (AFP via Sydney Morning Herald)
