Date: '2013-07-27'
Source_URI: Portal:Current events/2013 July 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least six people are killed and 37 injured in a bomb blast in Cagayan De Oro
    City, Philippines. (ABS-CBN News Online)
  Aftermath of the 2013 Egyptian coup d'état:
  - Over 100 people are killed and around 1,500 injured in a violent crackdown against
    protesters in the Egyptian capital of Cairo. (BBC) (The Guardian)
  Disasters and accidents:
  - Three people are killed and several more are injured, some critically, after a
    bus overturns outside Indianapolis, Indiana. (NBC)
  Law and crime:
  - More than 1,000 inmates escape from prison in Benghazi, Libya. (AFP via Raw Story)
  Politics and elections:
  - Voters in Kuwait go to the polls for a general election, with Shiite candidates
    losing half their parliamentary seats. (Al-Arabiya) (AFP via The Telegraph)
  Sports:
  - In horse racing, the German horse Novellist wins the King George VI and Queen
    Elizabeth Stakes. (BBC)
