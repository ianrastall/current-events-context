Date: '2013-07-16'
Source_URI: Portal:Current events/2013 July 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Pro-government militiamen kill six mediators in the Syrian province of Homs. (BBC)
  Business and economy:
  - Unions in Greece call a general strike over new austerity measures. (France 24)
  - McDonald's announces that it will open its first outlet in Vietnam early next
    year, which will be in Ho Chi Minh City, and will be operated by Henry Nguyen,
    a Vietnamese businessman and the son-in-law of Vietnam's Prime Minister Nguyễn
    Tấn Dũng. (Marketwatch)
  Arts and culture:
  - The British Columbia coroner's office reports that actor Cory Monteith died of
    an overdose of heroin and alcohol. (MSN)
  Disasters and accidents:
  - As many as 27 children die and 25 others are hospitalised after eating lunch served
    at their school in eastern India. (AFP via News24) (Times of India) Initial indications
    are that a jar previously used to hold an insecticide was reused for cooking oil
    and was thus thereby contaminated by organophosphorus. (CNN)
  International relations:
  - Panamanian authorities seize North Korean bulk carrier Chong Chon Gang after a
    missile is found on board. The captain of the ship, which was en route from Cuba,
    attempted to commit suicide. (BBC News) (USA Today)
  - South Korea blames North Korea for cyberattacks on government websites last month.
    (Wall Street Journal)
  Law and crime:
  - Clashes continue between Egyptian police and supporters of deposed President Mohamed
    Morsi in central Cairo with 22 people injured. (Reuters)
  - Norwegian black metal musician, Kristian "Varg" Vikernes, and his wife are arrested
    in France on suspicion of alleged plans for a terrorist act after buying 4 rifles
    at the same time. (BBC)
  Science:
  - Italian astronaut Luca Parmitano almost drowns while undertaking a spacewalk on
    the International Space Station. (ABC News America)
  Sport:
  - In baseball, the American League defeats the National League 3–0 in the 2013 Major
    League Baseball All-Star Game played at Citi Field in New York City. New York
    Yankees closer Mariano Rivera, in his final MLB season, is named MVP. (Detroit
    Free Press)
