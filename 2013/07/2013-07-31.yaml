Date: '2013-07-31'
Source_URI: Portal:Current events/2013 July 31
Intelligence_Payload:
  Disasters and accidents:
  - At least ten people die as a result of a heatwave in the Shanghai which has recorded
    its highest temperatures on record, surpassing . (AFP via France 24)
  - Forty people are missing and presumed drowned after a bus plunges into a canal
    near Sirhind-Fategarh, Punjab, India. (The Hindu Times)
  - At least seven people have been killed and another 40 hospitalised from drinking
    illegal alcohol in the Cuban capital Havana. (BBC)
  Law and crime:
  - The Independent Commission Against Corruption in the Australian state of New South
    Wales finds that former Ministers Ian Macdonald and Eddie Obeid acted corruptly
    and recommends that charges be laid. (The Australian)
  Politics and elections:
  - India's ruling coalition endorses the creation of a new state of Telangana to
    be carved out of Andhra Pradesh in southern India. (AP via WMDT)
  - Voters in Zimbabwe go to the polls for a general election. (Sun Daily)
  - Salem Labyedh resigns as Tunisia's Education Minister following last week's assassination
    of Mohamed Brahmi. (BBC)
