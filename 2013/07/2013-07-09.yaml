Date: '2013-07-09'
Source_URI: Portal:Current events/2013 July 9
Intelligence_Payload:
  Syrian civil war:
  - Ban Ki-moon, the Secretary-General of the United Nations, calls for a ceasefire
    during Ramadan. (Al Jazeera)
  - A car bomb targeting the office of the Shia militant group Hezbollah located in
    the Lebanese capital Beirut injures 53 people. (BBC) (The Independent) (The Guardian)
  War in Afghanistan (2001–2021):
  - An Afghan soldier kills a Slovak soldier and wounds six others. (BBC)
  - Seventeen people are killed by a roadside bomb in western Afghanistan. (BBC)
  Business and economy:
  - Greece secures an additional 6.2 billion euros from the European Commission, the
    European Central Bank and the International Monetary Fund despite warnings that
    the Greek government is moving too slow to reform the government. (BBC)
  Law and crime:
  - Francesco Schettino, former captain of the Costa Concordia cruise ship, goes on
    trial in Italy for manslaughter and abandoning ship during the disaster on 13
    January 2012. (AP via the Houston Chronicle)
  Politics and elections:
  - British Labour Party leader Ed Miliband says he will end the automatic affiliation
    fee paid to the Party by three million union members after the Unite union was
    accused of secretly signing up its members in order to get its favoured candidate
    elected in the Falkirk constituency. (BBC)
  - Egypt's military-backed interim government selects economist Hazem Al Beblawi
    as the interim Prime Minister. (New York Times)
