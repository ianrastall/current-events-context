Date: '2013-07-28'
Source_URI: Portal:Current events/2013 July 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (post-U.S. withdrawal)
  - A suicide bombing in the Iraqi town of Tuz Khormato kills at least eight policemen.
    (BBC)
  Arts and culture:
  - Pope Francis presides at the closing Mass of World Youth Day 2013 at Rio de Janeiro's
    Copacabana Beach for a crowd estimated at 3-million. (Los Angeles Times)
  Disasters and accidents:
  - A bus returning 48 pilgrims from a weekend visit to the shrine of Saint Padre
    Pio of Pietrelcina, in San Giovanni Rotondo, goes off a bridge east of Naples,
    in Avellino Province, killing 39 people (including some children), and injuring
    at least 9 others. (English News CN)
  International relations:
  - In a first, India has offered a $100-million credit line to Vietnam to purchase
    military equipment. It will be used for purchasing four patrol boats. (The Hindu)
  Law and crime:
  - Francisco José Garzón Amo, the driver of the train involved in the Santiago de
    Compostela derailment, is charged with 79 counts of manslaughter in a Spanish
    court. (USA Today)
  Politics and elections:
  - Voters in Cambodia go to the polls for a general election with the governing Cambodian
    People's Party led by Prime Minister Hun Sen claiming victory amidst opposition
    claims of widespread irregularities. (BBC) (News Limited)
  - Voters in Mali go to the polls for a presidential election. (BBC)
  - The Togolese electoral commission releases official results for the recent parliamentary
    election with President Faure Gnassingbe's Union for the Republic party winning
    62 of 91 seats with the Opposition threatening to challenge the results. (AP via
    Houston Chronicle)
  Sports:
  - In soccer news, the United States defeats Panama by a score of 1-0 to win the
    2013 CONCACAF Gold Cup. (CONCACAF)
