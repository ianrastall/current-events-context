Date: '2013-07-13'
Source_URI: Portal:Current events/2013 July 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - The African Union – United Nations Hybrid Operation in Darfur confirms that seven
    peacekeepers were killed and 17 injured in a patrol while returning to their base
    in Manawashi near Nyala, the capital of Sudan's South Darfur state. (France 24)
  Arts and culture:
  - Canadian actor Cory Monteith, of the TV series Glee, is found dead in his Vancouver
    hotel room. (Canada.com)
  Disasters and accidents:
  - At least ten people are killed in Brazil's Minas Gerais state after a bus accident.
    (AP via New Straits Times)
  - Eighteen people are killed and at least 40 injured after a gravel truck smashes
    into a bus near Podolsk, Russia. (Rappler)
  Law and crime:
  - George Zimmerman is found not guilty in the shooting of Trayvon Martin. (Yahoo!
    News) (AP via CBC) (USA Today)
  Politics and elections:
  - The Bhutanese People's Democratic Party led by Tshering Tobgay wins 32 out of
    47 seats in the National Assembly election. (Yahoo! News)
