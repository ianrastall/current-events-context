Date: '2013-10-22'
Source_URI: Portal:Current events/2013 October 22
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - Nigerian troops kill 37 Boko Haram Islamist militants in air and ground strikes
    in their bases in the northeast. (Reuters)
  Iraqi insurgency (post-U.S. withdrawal):
  - Militants kill 22 security forces in police and military checkpoints in Anbar
    Province. (Reuters)
  Business and economy:
  - Apple announces the introduction of iPad Air and the availability of the newest
    version of OS X, Mavericks. (CNN)
  Law and crime:
  - Australian Capital Territory becomes the first Australian territory to legalize
    same-sex marriage while the Government of Australia launches a legal challenge
    in the High Court. (News.com.au)
  Politics and elections:
  - The Maldives sets a new date for a presidential election to be held on November
    9. (AP via The Hindu)
