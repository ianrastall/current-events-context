Date: '2013-10-05'
Source_URI: Portal:Current events/2013 October 5
Intelligence_Payload:
  Post-civil war clashes in Libya:
  - Gunmen attack a military checkpoint near Bani Walid leaving 15 soldiers dead.
    (BBC)
  Arts and culture:
  - Prince Harry arrives in Sydney, Australia, to celebrate 100 years of the Royal
    Australian Navy. (ABC News)
  Politics and elections:
  - The United States Department of Defense calls back 350,000 of its furloughed civilian
    workers. (Washington Post)
  - In two referendums, voters in the Republic of Ireland reject government proposals
    to abolish Seanad Éireann, the upper house of the country's parliament, but support
    plans to create a Court of Appeal. (BBC)
  Sports:
  - In IndyCar Racing, Scott Dixon wins Race 1 in the Grand Prix of Houston at Reliant
    Park. (IndyCar)
  - Wladimir Klitschko Won the WBA (regular) World Heavyweight Championship
