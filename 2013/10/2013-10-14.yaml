Date: '2013-10-14'
Source_URI: Portal:Current events/2013 October 14
Intelligence_Payload:
  Armed conflict and attacks:
  - Ethiopian officials report that a plot by a group of Somali nationals to attack
    Sunday's 2014 FIFA World Cup qualification match in Addis Ababa failed when their
    explosives detonated inside their home, killing two of the would-be suicide bombers.
    (Reuters UK)
  Business and Economy:
  - 'The Nobel Memorial Prize in Economic Sciences goes to three Americans, in connection
    with their work in asset prices: Eugene Fama, Lars Peter Hansen, and Robert Shiller.
    (Royal Swedish Academy of Sciences)'
  Disasters and accidents:
  - The death toll from Cyclone Phailin rises to at least 18 in India as it dissipates.
    (AFP via Sydney Morning Herald)
  - A judicial inquiry is ordered into a stampede during Navrati festivities near
    a temple in India's Madhya Pradesh state that resulted in 109 deaths and 120 people
    being injured. (NDTV)
  Law and crime:
  - A man is arrested after attempting to enter Buckingham Palace, London, while in
    possession of a knife. (Huffington Post)
  - A dry ice bomb explodes in an employee restroom at Los Angeles International Airport.
    Nobody was injured, and no arrests were made. Terminal 2 was briefly shut down
    and evacuated. It was the second incident of its kind to have occurred at the
    airport in two days. (CNN)
  - The pastor of a Catholic parish in Northboro, Massachusetts, is removed after
    the Worcester diocese discovered more than $200,000 missing from parish accounts.
    (Catholic World News)
