Date: '2013-10-07'
Source_URI: Portal:Current events/2013 October 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamist protests in Egypt (July 2013–present)
  - Six Egyptian soldiers are killed in an ambush west of Ismaïlia, close to the Suez
    Canal. In the South Sinai, a suicide bomber kills 3 and injures 55 others after
    an attack against security buildings in the provincial capital El-Tor. (Reuters)
    (Al Jazeera)
  Disasters and accidents:
  - Typhoon Fitow makes landfall in the Chinese province of Fujian, bringing heavy
    rain and killing at least two people. (BBC)
  Politics and elections:
  - Mulatu Teshome succeeds Girma Wolde-Giorgis as President of Ethiopia. (ERTA)
  Science:
  - American scientists James Rothman and Randy Schekman and German scientist Thomas
    C. Südhof win the 2013 Nobel Prize in Physiology or Medicine for their work on
    transport systems in cells. (Al Jazeera)
