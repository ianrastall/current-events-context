Date: '2013-10-17'
Source_URI: Portal:Current events/2013 October 17
Intelligence_Payload:
  Armed conflict and attacks:
  - Naxalite–Maoist insurgency
  - A Naxalite landmine kills three police officers in the Gadchiroli district of
    India's Maharashtra state. (Zee News)
  - Iraqi insurgency (post-U.S. withdrawal)
  - Attacks on Shia Muslims killed at least 59 people across Iraq, including a suicide
    truck bomb targeting at least 15 members of the country's Shabak people. (Reuters)
  - Islamist gunmen kill two Tunisian policemen in clashes in the northeastern city
    Goubella. (Reuters)
  - Suspected Renamo rebels kill 7 Mozambican soldiers in an ambush near Gorongosa.
    (Reuters)
  Arts and culture:
  - Swedish archaeologists in Old Uppsala unearth a great number of mysterious posts
    in perfect alignment for more than a kilometre in what is suggested to be a display
    of power of a fifth century Swedish chieftain. (Dagens Nyheter)
  Business and economy:
  - President of the United States Barack Obama signs a bipartisan deal approved by
    Congress to end the Government shutdown and the debt ceiling crisis. (The Hill)
  Disasters:
  - The death toll in the Philippines from the 2013 Bohol earthquake rises to 156
    with 374 people injured. (Wall Street Journal)
  - In Australia, at least seven emergency warnings have been issued for bushfires
    in New South Wales resulting in one death at Lake Munmorah, significant property
    damage and closure of airports and highways. (The Guardian) (The Guardian)
  - At least 18 people are dead and 45 people are missing in Japan after Typhoon Wipha
    hit yesterday. (Zee News)
  Politics and elections:
  - Chad, Chile, Lithuania, Nigeria and Saudi Arabia are elected to the United Nations
    Security Council for a two-year term, starting on January 1, 2014. (Reuters)
