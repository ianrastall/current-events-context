Date: '2013-10-31'
Source_URI: Portal:Current events/2013 October 31
Intelligence_Payload:
  Israeli–Palestinian conflict:
  - After having rocks hurled at them, Israeli troops respond and shoot dead a Palestinian
    man in the West Bank. (Reuters)
  - An IED injures 5 IDF soldiers, causing clashes that leave 2 Hamas militiamen dead
    and 2 wounded. (The Times of Israel)
  Business and economy:
  - The United States FAA relents and permits limited use of electronic gadgets on
    planes. (FOX News)
  Disasters and accidents:
  - A report by the New Zealand Transport Accident Investigation Commission into the
    2012 Carterton hot air balloon crash that killed 11 people recommends the introduction
    of random drug testing for transport operators following a finding that the pilot
    had smoked marijuana before getting on board. (AP)
  International relations:
  - The Organisation for the Prohibition of Chemical Weapons declares that Syria has
    destroyed 21 of 23 known chemical weapons facilities, and now must destroy the
    chemical weapons themselves. (Reuters)
  Science:
  - After a two-year research project conducted by scientists at the National Chemistry
    Institute of the Vietnam Academy of Science and Technology, Vietnam becomes the
    world's tenth country to successfully apply nanotechnology to produce nano curcumin,
    a substance that can help treat cancer. (People's Daily)
