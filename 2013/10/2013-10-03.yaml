Date: '2013-10-03'
Source_URI: Portal:Current events/2013 October 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Tehrik-i-Taliban Pakistan attacks a compound belonging to former Tehrik-i-Taliban
    Pakistan commander Nabi Hanfi leaving 15 dead near the border of North Waziristan.
    (Sky News)
  Islamist insurgency in Nigeria:
  - Air Force fighter jets bomb camps belonging to suspected Islamist militants in
    northeast Nigeria in response to a massacre of students at an agricultural college.
    (Reuters)
  Business and economy:
  - The antitrust chief of the European Union, Joaquin Almunia, discusses coming charges
    against Gazprom, the Russian natural gas monopolist. (Reuters)
  - Twitter Inc. publicly files IPO related disclosure documents. (Reuters)
  International relations:
  - The Gambia is to withdraw from the Commonwealth, 48 years after joining the 54-member
    grouping, which includes the United Kingdom and most of its former colonies. (Daily
    Telegraph)
  - Russia evacuates Libya of all Russian diplomats and their families one day after
    an attack on their embassy left one dead. (AP via ABC)
  Disasters and accidents:
  - 2013 Mediterranean Sea migrant shipwreck. A fire engulfs a boat carrying African
    migrants off the coast of Lampedusa, Italy, killing at least 114 people, 200 remain
    missing. (The New York Times) (AP)
  - A passenger plane carrying 27 people crashes at the Murtala Muhammed International
    Airport in Lagos, Nigeria, with 13 deaths reported. (BBC)
  Law and crime:
  - Indian politician Lalu Prasad Yadav is sentenced to 5 years imprisonment for illegally
    taking money out of the Chaibasa treasury. (New York Daily News)
  - A woman is fatally shot by police after striking a barrier at a White House security
    checkpoint followed by a car chase. (BBC) (The Washington Post)
  - Adobe reveals that 2.9 million customers' data was stolen in a security breach
    which included credit card information. (BBC)
