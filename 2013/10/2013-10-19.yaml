Date: '2013-10-19'
Source_URI: Portal:Current events/2013 October 19
Intelligence_Payload:
  Armed conflict and attacks:
  - Tunisian security forces have killed 10 people (claimed by authorities to be Islamist
    militants) near the border with Algeria in a three-day operation against gunmen
    who attacked police patrols in the remote northern region. (Reuters)
  Syrian Civil War:
  - A suicide bomber kills 16 Syrian Army soldiers at a checkpoint near Damascus.
    (Wall Street Journal)
  Somali Civil War (2009–present):
  - 16 people are killed and 30 wounded by a suicide bomber in an attack in a crowded
    restaurant in the central Somali town of Beledweyne. (Reuters)
  Disasters and accidents:
  - At least 79 people have been injured, some seriously, in a train crash at the
    Once railway station in Buenos Aires. (Time)
  - At least 11 people have been killed after a small plane carrying skydivers crashes
    near Namur, Belgium. (The Telegraph)
  Law and crime:
  - Reuters reports that the United States Department of Justice and JPMorgan Chase
    have reached a tentative $13 billion settlement on the issue of selling bad mortgage
    loans to investors, the practice that contributed to Subprime mortgage crisis.
    (Reuters)
