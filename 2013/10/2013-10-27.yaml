Date: '2013-10-27'
Source_URI: Portal:Current events/2013 October 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - 8 bomb blasts rock the city of Patna in the Indian state of Bihar killing 5 and
    injuring over 70 people.(Firstpost)
  - Iraqi insurgency (post-U.S. withdrawal)
  - A series of car bombings around the Iraqi capital, Baghdad, kills at least 38
    people. (BBC)
  War in Afghanistan (2001–2021):
  - A roadside bomb in eastern Afghanistan kills 18 people. (Reuters)
  Arts and culture:
  - Lou Reed, lead singer of the band The Velvet Underground, dies at the age of 71.
  Disasters and accidents:
  - The United Kingdom braces itself for the St Jude storm, the worst since 1987,
    which is due to make landfall tonight. (BBC)
  Law and crime:
  - A 37-year-old woman and four children are stabbed to death in Brooklyn, New York
    City, New York. A man is arrested in connection with the murders. (CNN)
  Politics and elections:
  - Voters in Georgia go to the polls for a presidential election with Giorgi Margvelashvili
    winning a landslide victory. (BBC), (AFP via NineMSN)
  - Voters in Argentina go to the polls for mid-term elections, where races for one
    third of the Senate and half the Chamber of Deputies will be decided. The governing
    Front for Victory maintained an absloute majority in both chambers (adding one
    Senator and five Deputies); but the new Renewal Front won by 12% in the largest
    district, the Province of Buenos Aires. (New York Times)
