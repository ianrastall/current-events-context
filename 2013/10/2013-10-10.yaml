Date: '2013-10-10'
Source_URI: Portal:Current events/2013 October 10
Intelligence_Payload:
  Post-civil war violence in Libya:
  - The Prime Minister of Libya Ali Zeidan is kidnapped from a hotel in Tripoli but
    later released. (The Telegraph) (AFP via France 24)
  Arts and culture:
  - The Canadian writer Alice Munro is awarded the 2013 Nobel Prize in Literature.
    (CNN)
  - Official alternative names are announced for the North Island and South Island
    of New Zealand with Te Ika-a-Maui and Te Waipounamu as the respective Maori language
    names. (TV New Zealand)
  - The BBC announce the discovery of nine missing episodes of Doctor Who starring
    Patrick Troughton, located in Nigeria, including the remainder of the partially-missing
    serial The Enemy of the World and 4 of the 5 missing episodes of The Web of Fear.
    (BBC)
  Business and economy:
  - French air traffic controllers begin strike action with the south of France expected
    to be worst affected. (ITV)
  - The Delaware Supreme Court, setting aside a lower court's order, clears the way
    for a transaction in which Activision Blizzard can buy back its equity from Vivendi.
    (Reuters)
  Law and crime:
  - Former Mayor of Detroit Kwame Kilpatrick is sentenced to 28 years in prison for
    racketeering, conspiracy, fraud, and tax crimes. (MSN)
  - The Justice Ministry of Iraq announces it has executed 42 terrorism convicts in
    two days amidst condemnation from human rights groups. (Al Jazeera)
  Politics and elections:
  - The Cabinet of Malawi is dissolved by President Joyce Banda amidst a graft scandal.
    (Reuters)
  Science:
  - Scott Carpenter, Mercury 7 astronaut and second American to orbit the earth, dies
    at 88 following complications from a stroke.(Fox News)
