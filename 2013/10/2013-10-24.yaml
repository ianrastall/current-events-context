Date: '2013-10-24'
Source_URI: Portal:Current events/2013 October 24
Intelligence_Payload:
  Arts and culture:
  - Nyanasamvara Suvaddhana, the 19th Supreme Patriarch of Buddhism in Thailand, dies
    at the age of 100. (ABC News via Associated Press)
  Business and economy:
  - Twitter sets a modest-seeming goal of US$1.6 billion for its forthcoming initial
    public offering. (Reuters)
  Disasters and accidents:
  - China's Ministry of the Environment and Water Resources will send inspection teams
    to Chinese regional cities to inspect air quality following the 2013 Harbin smog
    incident. (Reuters Trust)
  - An NSW Rural Fire Service pilot dies when his plane crashes while fighting fires
    near the town of Ulladulla, New South Wales, Australia. (Courier Mail)
  Health:
  - The World Health Organization reports that a polio outbreak has begun in the war-torn
    city of Deir Ezzor, Syria. (Reuters)
  International relations:
  - Germany summons the United States Ambassador over claims that the US monitored
    Chancellor of Germany Angela Merkel's mobile phone. (BBC)
  Law and crime:
  - Portuguese Police reopen the investigation into the disappearance of Madeleine
    McCann. (BBC)
  Sport:
  - France's top football clubs announce plans for a strike in Ligue 1 and Ligue 2
    at the end of November in protest at the President François Hollande's 75% supertax
    proposal. (AFP via Yahoo! Singapore)
  - '2013 World Series: The St. Louis Cardinals defeat the Boston Red Sox 4-2 to tie
    the World Series at 1-1. (ESPN)'
