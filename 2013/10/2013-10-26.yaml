Intelligence_Payload:
  Armed conflict and attacks:
  - Iran hangs 16 rebels in retaliation for 14 border guards being killed in clashes
    on its border with Pakistan. (BBC)
  - Spooksville on Hub Network
  War in Afghanistan (2001–2021):
  - A gunfight between Afghan and foreign soldiers on the outskirts of the capital
    Kabul, kills at least one Afghan serviceman and injures a number of other soldiers.
    (Reuters)
  Law and crime:
  - Michael Guzzo shoots and kills four people and two dogs in their house, and then
    commits suicide in Phoenix, Arizona, U.S. (AP via Huffington Post)
  Politics and elections:
  - Results of the Czech legislative election are very fragmented, the big winner
    being the new centrist liberal ANO 2011 which gains 47 out of 200 seats. (BBC)
  Sports:
  - 2013 World Series, Game 3 ends on a controversial obstruction call, giving the
    Cardinals a 2-1 series lead over the Red Sox. (NY Times)
