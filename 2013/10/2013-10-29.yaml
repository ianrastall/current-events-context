Date: '2013-10-29'
Source_URI: Portal:Current events/2013 October 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2013 Tiananmen Square incident: Police in China name two suspects from Xinjiang
    linked to an apparent suicide attack car crash outside the Forbidden City on Tiananmen
    Square in the capital Beijing. (BBC)'
  - Four French hostages held in Niger by an Al-Qaeda offshoot since 2010 are released.
    (France 24)
  Syrian civil war:
  - Syrian civilians leave the besieged Damascus suburb of Moadamiya. (BBC)
  Business and economy:
  - The Nasdaq Composite and NASDAQ-100 stock indices froze for an hour before resuming
    at around 1 PM EST. (CNBC)
  - Turkey opens a sea tunnel connecting Europe and Asia across the Bosphorus Strait
    in Istanbul. (Al Jazeera)
  Disasters and accidents:
  - The United Nations confirms an outbreak of polio in Syria. (CBC)
  - At least three people are dead after a dust storm causes an accident on Interstate
    10 near Picacho Peak, Arizona, United States. (ABC)
  St Jude storm:
  - At least 13 people are confirmed dead after the storm hits northern Europe. (ABC
    News Australia)
  Law and crime:
  - Three judges in Egypt chairing the trial of the leaders Muslim Brotherhood step
    down, citing reasons of conscience. (Al Jazeera)
  - Two Kenyan soldiers are jailed for looting during the attack on the Westgate shopping
    centre attack in September. (BBC)
  - The leader of the Boeremag and 23 others are sentenced to 35 years in jail in
    South Africa for conspiring to kill former president Nelson Mandela. (News24)
  - A man shoots and kills five people and then commits suicide at a house in Greenwood
    County, South Carolina, U.S. (CNN)
  Politics and elections:
  - Marilyn Tavenner, the Administrator of Centers for Medicare and Medicaid Services,
    becomes the first Obama administration official to apologise for the troubled
    roll out of the healthcare.gov website as part of the Affordable Care Act or "Obamacare"
    system. (CNN)
