Date: '2013-10-13'
Source_URI: Portal:Current events/2013 October 13
Intelligence_Payload:
  Syrian civil war:
  - Gunmen kidnap seven workers from the International Committee of the Red Cross
    from northern Syria. (Fox News)
  - Opposition activists say Syrian army tanks killed 11 civilians including 3 children
    in a crossfire incident during the battle for the city center of Daraa. (Haaretz)
  Arts and culture:
  - The Statue of Liberty reopens for the first time after being closed October 1
    due to the 2013 United States federal government shutdown. (Reuters)
  Disasters and accidents:
  - Indian authorities commence rescue efforts in the aftermath of Cyclone Phailin,
    with initial reports of at least 20 casualties and widespread damage along the
    landfall area. (First Post)
  - A stampede breaks out on a bridge near the Ratangarh Mata Temple in Datia district,
    Madhya Pradesh, India during the Hindu festival Navratri, killing 115 people and
    injuring more than 110. (BBC)
  Law and crime:
  - Five people are injured during a shooting at a Hmong New Year's celebration in
    Tulsa, Oklahoma, U.S. Two men, 19 and 21 years old, are arrested. (CNN)
  - Over 380 people are detained after an anti-migrant Russian nationalist riot in
    southern Moscow. (Russia News)
  Politics and elections:
  - Bill Shorten is elected as the head of the federal Australian Labor Party, defeating
    Anthony Albanese in a leadership ballot. (Yahoo! News)
  - Vietnamese independence hero General Võ Nguyên Giáp is buried after an elaborate
    two-day state funeral. (BBC)
  Sports:
  - In Bathurst, New South Wales, Mark "Frosty" Winterbottom, driving for Ford, wins
    his maiden Bathurst 1000 V8 Supercars race. (V8supercars)
  - Novak Djokovic wins the Shanghai Masters Tennis Competition for the second straight
    year. (The Telegraph)
  - Frederik Van Lierde wins the 2013 edition of the Ironman Triathlon. (NY Times)
