Date: '2013-10-02'
Source_URI: Portal:Current events/2013 October 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Russian embassy in Libya's capital Tripoli came under fire after an attempted
    attack by gunmen who tried to force their way into the compound. One of the attackers
    was killed and four others were injured according to Libyan authorities. (Reuters)
  Iraqi insurgency (post-U.S. withdrawal):
  - Gunmen shoot down a military helicopter in northern Iraq killing all four crew
    members. (Reuters)
  Arts and culture:
  - American author Tom Clancy, best known for his military thriller novels, dies
    at the age of 66. (The New York Times)
  Disasters and accidents:
  - An accident involving a church bus, a tractor-trailer, and an SUV on I-40 in Jefferson
    County, Tennessee, leaves eight dead and 14 injured. (NBC)
  Law and crime:
  - Law enforcement in the U.S. shuts down "Silk Road," an internet marketplace for
    various illegal activities including the illicit drug trade, and arrests its alleged
    principal, Ross Ulbricht. (Reuters)
  - The jury in the Michael Jackson Estate vs. AEG Live court case finds AEG Live
    not guilty of negligence in hiring musician Michael Jackson's physician Conrad
    Murray. Murray was found guilty of involuntary manslaughter in 2011. (Billboard)
