Date: '2013-10-28'
Source_URI: Portal:Current events/2013 October 28
Intelligence_Payload:
  Armed conflict and attacks:
  - Two Thai police die while trying to defuse a bomb in Narathiwat province. (Bangkok
    Post)
  - An Indian Army soldier is reported killed and another injured along the Line of
    Control on the border with Pakistan in Kashmir. (Hindustan Times)
  Islamist protests in Egypt (July 2013–present):
  - Three Egyptian policemen are killed by masked men in an attack at a checkpoint
    in the Nile Delta city of Mansoura. (Reuters)
  Syrian civil war:
  - The Syrian army retakes the ancient Christian town of Sadad. (Press TV) (The Huffington
    Post)
  Syrian civil war spillover in Lebanon:
  - Two people are killed in the northern city of Tripoli in fighting between supporters
    and opponents of the Syrian government and the Lebanese army. (Reuters)
  Israeli–Palestinian conflict:
  - Two rockets fired from the Gaza strip at a southern Israeli coastal city are shot
    down. (Reuters) (The Guardian)
  Somali Civil War (2009–present):
  - A suspected U.S. drone strike kills at least two Islamist Al-Shabaab insurgents
    and commander driving in a car south of the Somali capital Mogadishu. (Reuters)
    (BBC)
  War in Afghanistan (2001–present):
  - Australia declares its war in Afghanistan over while the Prime Minister, Tony
    Abbott, visits Afghanistan. (Herald Sun)
  Business and economy:
  - Copper fabricator Southwire Co. drops its lawsuit against two giant Wall Street
    firms over a possible copper exchange-traded fund, as market and regulatory conditions
    make such an ETF seem decreasingly likely. (Reuters)
  Disasters and accidents:
  - Five people are killed after a car crashes into barriers just outside the Forbidden
    City in Tiananmen Square, Beijing, China. (Al Jazeera) (BBC)
  St Jude storm:
  - The storm hits England and Wales, causing at least one death with flights and
    train services cancelled. (BBC) (AP via CBS News)
  Law and crime:
  - Three Chinese anti-graft activists go on trial in Xinyu in west-central Jiangxi
    province. (Reuters)
  - Dr Conrad Murray is released from prison in the American city of Los Angeles for
    involuntary manslaughter in the death of Michael Jackson. (ABC News)
  Politics and elections:
  - Voters in the Canadian territory of Nunavut go to the polls to select members
    to the territory's Legislative Assembly.
  2013 Tunisian protests:
  - Government and opposition leaders launch talks discussing a new premier. (The
    Daily Star)
  - Ennahda party leader Rashid al-Ghannushi announces in a televised interview that
    the party may be willing to give up the government but not power. (Al Arabiya)
  Science:
  - Three new species of animals are discovered (a leaf-tailed gecko, a golden-coloured
    skink, and a boulder-dwelling frog) in the Cape York Peninsula of the Australian
    state of Queensland. (news.com.au)
