Date: '2013-10-04'
Source_URI: Portal:Current events/2013 October 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - US forces initiate two major raids against terror in Africa. (FOX News)
  Islamist protests in Egypt (July 2013–present):
  - Four people are killed after supporters of ousted President Mohammed Morsi clashed
    with opponents and security forces. (Reuters), (BBC)
  Health:
  - A man sets himself on fire at the National Mall in Washington, D.C. Though he
    was breathing, conscious, and talking when airlifted, he died later that night
    at MedStar Washington Hospital Center due to the extensive severe gas burns to
    his face and arms. A motive was unclear. (Huffington Post) (AP via San Francisco
    Chronicle) (Washington Post)
  Politics and elections:
  - The Cabinet of India's approval of the bifurcation of the state of Andhra Pradesh
    causes protests and strikes in the Seemandhra region as a part of the ongoing
    Samaikyandhra Movement (Times of India)
  - Voters in the Republic of Ireland take part in a referendum to decide whether
    the Seanad Éireann (Irish Senate) – the upper house of their parliament – should
    be abolished, and reforms made to the Court of Appeal. (BBC)
