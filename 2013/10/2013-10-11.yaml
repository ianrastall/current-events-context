Date: '2013-10-11'
Source_URI: Portal:Current events/2013 October 11
Intelligence_Payload:
  Armed conflict and attacks:
  - An Israeli man is killed and his wife injured after an attack by Palestinian militants
    inside their house on the West Bank. (Reuters)
  Syrian civil war:
  - The Islamic State of Iraq and the Levant is accused by Human Rights Watch of killing
    at least 190 villagers in pro-government areas and kidnapping hundreds more. (Washington
    Post)
  Disasters and accidents:
  - A fire in a hospital in Japan's Fukuoka prefecture kills ten people. (BBC)
  - 'Cyclone Phailin: India''s Odisha and Andhra Pradesh prepare for storm. (BBC)'
  - A migrant boat sinks in the Channel of Sicily with at least 27 people dead but
    over 200 rescued. (ANSA) (AP via Houston Chronicle)
  International relations:
  - The Organisation for the Prohibition of Chemical Weapons wins the Nobel Peace
    Prize. (BBC) (Reuters via ABC News Australia)
  Law and crime:
  - The Constitutional Council of France upholds a ban on fracking. (AP via ABC News
    America)
  - Myunghee Bae arrives in North Korea to visit her American son Kenneth Bae, who
    is serving 15 years of hard labor. (CNN)
  - The UK government publishes a draft royal charter aimed at underpinning self-regulation
    of the British press following an agreement on the issue by the country's three
    main political parties. However, the proposals are greeted with concerns about
    press freedom by the industry. (BBC)
