Date: '2013-10-16'
Source_URI: Portal:Current events/2013 October 16
Intelligence_Payload:
  Syrian civil war:
  - At least 21 civilians are killed when their minibus hits a land mine in southern
    Syrian town of Nawa, with opposition activists blaming the Syrian army. (Reuters),
    (BBC)
  United States debt-ceiling crisis of 2013:
  - The United States Senate reaches a bipartisan deal to avoid default and end the
    16-day US government shutdown. The House passes the legislation by 285–144. The
    bill now goes to the president, who is expected to sign it. (AFP via Sydney Morning
    Herald), (CNBC)
  Disasters and accidents:
  - Lao Airlines Flight 301 crashes in the Mekong River near Pakse International Airport,
    killing 44 passengers and 5 crew members. (BBC)
  - Typhoon Wipha hits Japan resulting in at least 14 deaths. (The Australian)
  - A Panamanian registered ship sinks off the coast of South Korea, killing 9 sailors
    and leaving 2 others missing. Coast Guard officials rescue another 8 crew members.
    (Yonhap)
  Politics and elections:
  - Solberg's Cabinet is appointed as the 61st cabinet of Norway by the King following
    the parliamentary election on 9 September. (BBC)
  Law and crime:
  - Malala Yousafzai will be awarded with Honorary Canadian citizenship. (CBC)
  - A terminal at Miami International Airport was briefly evacuated after a bomb-sniffing
    dog discovers "a possible explosive device". (Miami Herald)
  Science:
  - Divers in Russia recover a 570kg (1,255lb) portion of the Chelyabinsk meteor that
    landed on February 15, 2013. It is one of the largest meteorite fragments found
    to date. (BBC)
