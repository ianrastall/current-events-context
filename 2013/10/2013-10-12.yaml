Date: '2013-10-12'
Source_URI: Portal:Current events/2013 October 12
Intelligence_Payload:
  Disasters and accidents:
  - Cyclone Phailin is expected to make landfall on the east coast of India today.
    (AFP via Australia Network)
  - Typhoon Nari hits the Philippines killing at least five people and leaving two
    million without power. (AFP via ABC News)
  - At least 50 people are dead after a truck veers off a cliff in La Convención Province
    in Peru. (Reuters via ABC Australia)
  - A series of explosions at a fireworks factory in northern Vietnam has killed at
    least 15 people and left many others injured.(BBC)
  - A building collapses in Colombia, killing one person; ten people are still missing.
    (CNN)
  Sports:
  - In boxing, Timothy Bradley defeats Juan Manuel Márquez to win the World Boxing
    Organization Welterweight Title. (Los Angeles Times)
