Date: '2013-10-25'
Source_URI: Portal:Current events/2013 October 25
Intelligence_Payload:
  Islamist insurgency in Nigeria:
  - Military officials report that 74 members of Boko Haram have been killed in a
    combined ground and aerial assault on militant camps in northeastern Borno State.
    (Reuters)
  Disasters and accidents:
  - Japan's emergency agencies declare a tsunami warning after an earthquake of magnitude
    7.3 strikes off the east coast. (AP via News24)
  International relations:
  - In a joint statement, leaders of the European Union say that recent claims about
    the United States spying on European leaders, such as Germany's Angela Merkel
    and citizens, "could prejudice co-operation in intelligence gathering". (BBC)
  - Pope Francis meets with Teodoro Obiang Nguema Mbasogo, President of Equatorial
    Guinea. During the African leader’s visit, he and Archbishop Dominique Mamberti,
    the Secretary for Relations with States, signed a new diplomatic accord. (Catholic
    World News)
  Science:
  - The complete nuclear genome of a Siberian boy who died 24,000 years ago suggests
    that about a third of the ancestry of today's Native Americans can be traced to
    Western Eurasia, with only two-thirds coming from Eastern Asia. (Science Magazine/AAAS)
