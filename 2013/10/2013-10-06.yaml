Date: '2013-10-06'
Source_URI: Portal:Current events/2013 October 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suspected militant attack leaves one Israeli child wounded in a West Bank Israeli
    Settlement. (The New York Times)
  - Human rights group Free Tibet and Radio Free Asia report that People's Liberation
    Army troops shot into a crowd in Biru County in the Tibet Autonomous Region injuring
    60 people. (BBC)
  Islamist protests in Egypt (July 2013–present):
  - At least 53 people are killed during clashes between supporters and opponents
    of former president Mohamed Morsi on the 40th anniversary of Egypt's crossing
    of the Suez Canal in 1973. (Reuters) (Euronews)
  Iraqi insurgency (post-U.S. withdrawal):
  - Two car bombs detonate in a village near Tal Afar, Iraq killing and wounding dozens
    of people. (Xinhua)
  Disasters and accidents:
  - The final death toll 2013 Mediterranean Sea migrant shipwreck could rise to between
    325 and 363 individuals. (WDRB)
  Law and crime:
  - One man is killed and 12 others are injured during a shooting at a motorcycle
    clubhouse in Fresno, California, U.S. (AP via San Francisco Chronicle)
  Sports:
  - In horseracing, filly Treve keeps her undefeated record, winning the 2013 Prix
    de l'Arc de Triomphe (BBC).
