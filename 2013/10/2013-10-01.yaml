Date: '2013-10-01'
Source_URI: Portal:Current events/2013 October 1
Intelligence_Payload:
  Syrian civil war:
  - A team from the Organisation for the Prohibition of Chemical Weapons enters Syria
    to begin work on dismantling the Assad regime's stockpile of chemical weapons.
    (BBC)
  International relations:
  - The Vatican summons all papal envoys in the nations of the Middle East to a special
    meeting in Rome this week, to discuss the crisis facing the Church in that region.
    (Catholic World News), (Reuters)
  - The government of Venezuela expels three United States diplomats after accusing
    them of "economic sabotage". (BBC)
  United States federal government shutdown of 2013:
  - U.S. President Barack Obama, the White House Office of Management and Budget,
    issues a partial shutdown of government agencies after the House and Senate fail
    to come to an agreement on a spending bill to keep government operations running.
    (NBC News)
  Business and Video games:
  - Grand Theft Auto Online was released as an update to Grand Theft Auto V.
  - NBA 2K14 was released for Xbox One, Microsoft Windows, PlayStation 4, Xbox 360
    and PlayStation 3.
  Law and crime:
  - A Buddhist mob torches more than 70 Muslim homes and stabs a 94-year-old woman
    to death in Rakhine State, Myanmar. (AP via The Times of India)
  - Bangladeshi politician Salahuddin Quader Chowdhury is sentenced to death for war
    crimes including murder, torture, and genocide for his atrocities in the Bangladesh
    Liberation War. (BBC)
