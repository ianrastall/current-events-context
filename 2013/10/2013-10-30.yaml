Date: '2013-10-30'
Source_URI: Portal:Current events/2013 October 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - There are at least three dead and seven injured when a bomb explodes near the
    official residence of the Chief Minister of India's Manipur state Okram Ibobi
    Singh in the city of Imphal. (IBN) (NDTV)
  - A suicide bomber blows himself up in the Tunisian tourist resort of Sousse and
    police foil another attempted attack in Habib Bourguiba's tomb in Monastir. No
    casualties are reported. (Reuters)
  Iraqi insurgency (post-U.S. withdrawal):
  - Twenty people are killed in bombings in Iraq. (BBC)
  Disasters and accidents:
  - Forty-four people die after a bus fuel tank catches fire in the Indian city of
    Mahbubnagar near Hyderabad. (NDTV)
  International relations:
  - Israel releases 26 Palestinians convicted of homicide as part of a limited amnesty
    process. (Reuters)
  - Mongolian president Tsakhiagiin Elbegdorj visits North Korea and becomes the first
    head of state to meet with Kim Jong-un since Kim's taking office as Supreme Leader.
    (The Diplomat)
  2013 Tiananmen Square attack:
  - Chinese police arrest five suspects in connection to the Tiananmen square suicide
    attack. (The Guardian) (Daily Telegraph)
  Media:
  - The Privy Council of the United Kingdom grants a Royal Charter on regulating the
    British press after the newspaper industry loses a last-minute legal bid to seek
    an injunction against the plans. (BBC)
  Science and technology:
  - Dell Technologies officially goes private. (Forbes)
  Sports:
  - In baseball, the Boston Red Sox win the 2013 World Series defeating the St. Louis
    Cardinals in game 6 with a score of 6-1. This is the first series to be won in
    Boston by the Red Sox since 1918. (ABC News) (USA Today)
