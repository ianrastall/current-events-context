Date: '2013-02-03'
Source_URI: Portal:Current events/2013 February 3
Intelligence_Payload:
  Iraqi insurgency (post-U.S. withdrawal):
  - At least 33 people are killed in Kirkuk, Iraq, when a suicide bomber detonates
    a truck packed with explosives outside a police headquarters and gunmen disguised
    as officers tried to storm the compound. (Reuters) (BBC) (ITV) (Sky News)
  Disasters and accidents:
  - Paraguayan politician and presidential candidate Lino Oviedo is killed in a helicopter
    crash near Puerto Antequera in the Chaco region. (AP via The Washington Post)
    (The Voice of Russia) (Al Jazeera)
  - A twin-engine Beechcraft BE-58 plane crashes into the sea near Cumaná, Venezuela,
    leaving one person dead and five survivors who are rescued. (The Hindu) (AP via
    Edmonton Journal)
  - A charter bus carrying high school students from Philadelphia crashes when it
    attempted to pass under a low bridge in Boston, United States, injuring 34 people.
    (Reuters) (Sky News) (CBS News)
  - Special services are held in Brazil in memory of the 237 people killed in last
    week's Kiss nightclub fire in Santa Maria. (BBC)
  International relations:
  - Iran indicates the possibility it will attend talks on its nuclear program in
    Kazakhstan if it believes intentions behind them are "authentic". (Al Jazeera)
  - In response to Israeli air strikes on Syria, Prime Minister of Turkey Recep Tayyip
    Erdoğan says Israel's government is waging "state terrorism". (Al Jazeera)
  Sport:
  - In mixed martial arts, the UFC Feather Champion José Aldo retains his belt by
    defeating Frankie Edgar via unanimous decision during UFC 156. (USA Today)
  - In rugby union, Italy win their first match in the 2013 Six Nations Championship
    against tournament favourites France by a score of 23–18. (BBC) (RTÉ) (Al Jazeera)
  - In bandy, Russia defeates Sweden in the final with a 4–3 score to win the 2013
    Bandy World Championship. (World Bandy) (RT) (The Local)
  - In snooker, Ali Carter wins his third ranking title by defeating Marco Fu 9–6
    in the final of the 2013 German Masters. (BBC) (Sky Sports) (Daily Mail)
  - In Gaelic football, losing All-Ireland finalists Mayo defeat Kerry and hold them
    scoreless in the second half of their opening 2013 National Football League game.
    (The Irish Times)
  - In cricket, England captain Charlotte Edwards becomes the highest run-scorer in
    women's one-day internationals in England's World Cup victory over India at Brabourne
    Stadium in Mumbai. (BBC)
  - In American football, the Baltimore Ravens defeat the San Francisco 49ers in Super
    Bowl XLVII 34–31 after a delay in the game's second half caused by a power outage.
    (BBC) (The Washington Post) (Mercury News)
  In association football:
  - Nigeria defeat favourites Ivory Coast and Burkina Faso defeat Togo after extra-time
    to progress to the semi-finals of the Africa Cup of Nations. (Al Jazeera) (BBC)
    (Al Jazeera)
  - Colombia wins the 2013 South American Youth Championship defeating Paraguay with
    a 2–1 score. Also Uruguay and Chile seal berths to the 2013 FIFA U-20 World Cup.
    (FIFA) (CONMEBOL)
  - Italian striker Mario Balotelli scores twice in the 2–1 win over Udinese on his
    A.C. Milan debut in the 2012–13 Serie A. (ESPN) (BBC) (Reuters)
  - Sergio Agüero rescues a point for the reigning Premier League champions Manchester
    City, while Gareth Bale scores the winner for Tottenham Hotspur after West Brom's
    Goran Popov is sent off for spitting at Kyle Walker. (Al Jazeera) (The Australian)
  - Lionel Messi extends his record streak by scoring in his 12th consecutive 2012–13
    La Liga game to give leader Barcelona a 1–1 draw against Valencia. (ESPN) (CNN)
    (The Guardian)
