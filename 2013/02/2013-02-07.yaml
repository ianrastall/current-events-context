Date: '2013-02-07'
Source_URI: Portal:Current events/2013 February 7
Intelligence_Payload:
  Arts and culture:
  - Eugène Delacroix's famous painting Liberty Leading the People is vandalized while
    on display at the new Louvre-Lens museum in France. (Le Nouvel Observateur) (France
    3) (The Independent)
  Business and economy:
  - Irish lawmakers vote 113 to 36 to liquidate the Irish Bank Resolution Corporation
    (IBRC), with Joe Higgins of the opposition Socialist Party describing the rapid
    developments as "chaotic". (AFP via France 24)
  - Sweden suspends a wolf hunting intended as a cull for the population, after an
    appeal by the conservationist party. (BBC)
  Disasters and accidents:
  - '2013 Solomon Islands earthquake: The death toll from a magnitude 8.0 earthquake
    and subsequent tsunami in the Solomon Islands rises to nine, while government
    officials express fear regarding remote areas where emergency personnel are arriving.
    (Stuff.co.nz) (ABC News Australia)'
  - 'Chibombo bus crash: At least 53 people are killed in a crash involving a bus
    and truck in Zambia. (BBC) (Irish Independent).'
  Health and environment:
  - Frozen food manufacturer Findus withdraws its beef lasagne ready meals after tests
    showed the product contained horse meat. (The Guardian)
  International relations:
  - Japan scrambles its fighter aircraft to intercept two Russian SU-27 fighter aircraft,
    claiming that they have violated its airspace off Rishiri Island. Russia denies
    its aircraft entered Japanese airspace. (CNN) (BBC)
  - A diplomatic dispute between Romania and Hungary erupts as a Hungarian government
    official and the ambassador in Bucharest make commentaries that trigger large
    criticism from the Romanian side. (Nine O'clock)
  - The Supreme Leader of Iran Ali Khamenei accuses the United States of "holding
    a gun" to Tehran's head to pressure it to hold direct talks and states that it's
    very unlikely that these talks may take place. (CNN)
  - South Korean soldiers on the world's most heavily armed border now have orders
    to shoot back immediately if they come under attack. (Reuters)
  Law and crime:
  - '2013 Southern California shootings: Christopher Dorner, an ex-police officer,
    is named a suspect wanted in connection with shootings that occurred throughout
    Southern California in the past week. In those shootings, three people died, including
    a police officer and an assistant women''s basketball coach at California State
    University, Fullerton, and several others were wounded. (Los Angeles Times) (CNN)'
  Politics and elections:
  - A major crisis deepens in Tunisia after the murder of Chokri Belaid. The leading
    party Ennahda states that it will not accept a new government, even if suggested
    by its leading member, Prime Minister Hamadi Jebali. In today's clashes at least
    one person died. (BBC)
  - UK Secretary of State for Education Michael Gove confirms that plans to replace
    the General Certificate of Secondary Education with a new English Baccalaureate
    qualification have been abandoned. (BBC)
  - Canadian Senator Patrick Brazeau is arrested over an incident relating to domestic
    violence. The ruling Conservative Party of Canada in response removes him from
    caucus. (CBC)
  Science and technology:
  - Azerbaijan's first satellite Azerspace-1 is launched aboard an Ariane 5 launch
    rocket in French Guiana. (RFERL) (Trend.az)
  Sport:
  - An investigation by the Australian Crime Commission finds that there is widespread
    use of illegal drugs in Australian professional sport. (ABC News Australia)
  - The Deutscher Fußball-Bund establishes a working group intended to help football
    clubs deal with the potential outing of a professional player. (The Journal.ie)
