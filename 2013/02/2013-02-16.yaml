Date: '2013-02-16'
Source_URI: Portal:Current events/2013 February 16
Intelligence_Payload:
  February 2013 Quetta bombing:
  - At least 84 people are killed and more than 190 injured after a bomb explodes
    at a market in Hazara Town on the outskirts of Quetta, in Pakistan. Most of the
    victims are members of the predominantly Twelver Shia Hazara minority that was
    targeted by Lashkar-e-Jhangvi only a month earlier. The organization later claims
    responsibility for the blasts. (Al Jazeera) (RT) (Dawn.com) (Ary News)
  Iraqi insurgency (post-U.S. withdrawal):
  - A suicide bombing kills General Ali Aouni, the head of the Iraqi intelligence
    academy, and three of his bodyguards in Tal Afar. (BBC)
  Arts and culture:
  - 2013 Romanian drama film Child's Pose wins the Golden Bear at the 63rd Berlin
    International Film Festival in Berlin, Germany. (BBC) (Reuters) (Los Angeles Times)
  Business and economy:
  - A G20 finance ministers meeting occurs in Moscow, Russia, with the focus on so-called
    currency wars. (The Independent)
  Disasters and accidents:
  - A magnitude 6.2 earthquake occurs near the southern Philippine island of Mindanao.
    (CNN)
  - Two firefighters are killed and two others are injured extinguishing an inferno
    at a Knights of Columbus fraternal lodge in Bryan, Texas, United States. (Los
    Angeles Times) (AP via USA Today) (FOX News)
  International relations:
  - Malaysia detains Australian Senator Nick Xenophon who was visiting as part of
    a delegation to discuss forthcoming elections and seeks to deport him for taking
    part in a protest in Kuala Lumpur last year. (BBC)
  Politics and elections:
  - During presidential election Anthony Carmona is elected to be the next President
    of Trinidad and Tobago from 18 March 2013. (Trinidad Express)
  Sport:
  - Lionel Messi extends his record streak by scoring in his 14th consecutive 2012–13
    La Liga game to give leader Barcelona a 2–1 win against Granada. The Argentine
    forward completes his 300th goal during 365th appearance for Catalan club. (Goal.com)
    (Reuters via Yahoo!)
