Date: '2013-02-02'
Source_URI: Portal:Current events/2013 February 2
Intelligence_Payload:
  War in North-West Pakistan:
  - Militants attack a Pakistani Army base in the Lakki Marwat District in Pakistan
    killing at least 23 and injuring at least 8. (BBC) (CNN) (Los Angeles Times)
  2013 United States embassy bombing in Ankara:
  - The Turkish radical leftist group Revolutionary People's Liberation Party–Front
    claims responsibility for the bombing in Ankara. (Reuters) (CNN) (NBC News)
  2012–2013 Egyptian protests:
  - The protesters clashes with police outside the presidential palace in Cairo, Egypt,
    after a week of violence in which more than 60 people were killed. (Reuters) (BBC)
    (CBC News)
  Senkaku Islands dispute:
  - Prime Minister of Japan Shinzō Abe vows to defend the Senkaku Islands "at all
    costs" in a speech aimed at the Japan Self-Defense Forces. (Japan Today) (AP via
    Fox News)
  Disasters and accidents:
  - A bus catches fire after falling into a ravine in Gansu province, China, killing
    18 people and injuring 34 others. (Xinhua) (China Daily) (Global Times)
  - Five road accidents in two days claims the lives of at least 58 people in China
    before Chinese New Year. (IANS via Yahoo!) (AP via Montreal Gazette)
  - An ATR-72 aircraft belonging to Carpatair veers off a runway at Rome's Leonardo
    da Vinci–Fiumicino Airport, injuring at least 6 people. (AP via Montreal Gazette)
  Law and crime:
  - Former United States Navy SEAL Chris Kyle and another man are killed at a shooting
    range near Glen Rose, Somervell County, Texas. (The New York Times)
  Science and technology:
  - Iran unveils a new Qaher-313 combat jet which is said can evade radar detection.
    (Fox News)
  Sport:
  - In Gaelic football, the 2013 National Football League gets underway, with wins
    for Kildare, Dublin, Tyrone and Laois on the opening night of action. (RTÉ) (The
    Score) (BBC)
  - In rugby union, titleholders Wales are defeated by Ireland on their own ground
    as the 2013 Six Nations Championship gets underway in Cardiff. (BBC)
  - In tennis, the Czech Republic's Tomáš Berdych and Lukáš Rosol defeat Switzerland's
    Stanislas Wawrinka and Marco Chiudinelli in the longest match in Davis Cup history,
    with a time of 7 hours and 2 minutes. (Reuters) (AFP via France24)
  2013 Africa Cup of Nations:
  - Ghana eliminates Cape Verde to reach the semi-finals of the 2013 Africa Cup of
    Nations. (BBC)
  - Mali eliminates hosts South Africa on penalties to reach the semi-finals. (BBC)
  In other association football news:
  - Ukrainian club Shakhtar Donetsk wins the 2013 Copa del Sol by defeating Poland's
    Widzew Łódź in the final. (Shakhtar) (Copa del Sol)
  - Italian club A.S. Roma fires coach Zdeněk Zeman after a poor run in Serie A. (ESPN)
    (AP via Fox Sports)
  - European champions Chelsea loses again in the Premier League, this time to Newcastle
    in stoppage time. (BBC)
  - In La Liga, Cristiano Ronaldo sensationally scores in his own net as Real Madrid
    slumps to a shock 0–1 defeat away to Granada. (ESPN) (FIFA)
