Date: '2013-02-01'
Source_URI: Portal:Current events/2013 February 1
Intelligence_Payload:
  2013 United States embassy bombing in Ankara:
  - A suicide bombing outside the U.S. embassy in the Turkish capital, Ankara, kills
    at least two people. (BBC) (CNN) (Reuters)
  Nigerian Sharia conflict:
  - The Nigerian army bomb a suspected terrorist camp used by Boko Haram killing 18
    members and capturing large amounts ammunition, guns and weapons. (BBC) (Premium
    Times)
  War in North-West Pakistan:
  - A suicide bomber in a market kills at least 21 people and wounds more than 30
    in Hangu, Pakistan. (BBC) (Reuters) (The New York Times)
  Arts and culture:
  - Pat Kenny, most recently presenter of The Frontline, makes his return as host
    of The Late Late Show after the death this week of regular host Ryan Tubridy's
    father. (Irish Independent) (The Irish Times)
  Business and economy:
  - Barclays plc chief executive Antony Jenkins says he will waive his bonus for 2012.
    (BBC)
  - The Dow Jones Industrial Average closes above 14,000 points for the first time
    since 2007 as investors welcomed strong economic data from the United States.
    (CNN)
  Disasters and accidents:
  - At least 26 people are killed on the G30 Expressway in Henan province, China,
    after a truck carrying fireworks explodes on an elevated highway, with an section
    of road being destroyed and part of it collapsing. (BBC) (CNN) (The New York Times)
    (The Guardian)
  - Three construction workers are killed and eight are injured after a wall collapses
    on a construction site in Zhoukou, Henan, China. (Xinhua)
  Law and crime:
  - Metropolitan Police detective April Casburn, who tried to sell information to
    the News of the World, regarding the investigation into phone hacking scandal,
    is jailed for 15 months. (BBC)
  Politics and elections:
  - Hillary Clinton steps down as United States Secretary of State; she is succeeded
    by Senator John Kerry. (BBC) (Reuters)
  - Ed Koch, the former Mayor of New York City, dies at the age of 88 of congestive
    heart failure in a hospital. (The Washington Post)
  - Chris Evans, the leader of Australian Labor Party in the Senate, announces his
    resignation from the Ministry of Education. (The Age)
  - Muqrin bin Abdulaziz Al Saud, the former head of Saudi Arabia's Intelligence Directorate,
    is appointed second deputy Prime Minister, making him second in line to the Saudi
    throne. (Reuters)
  - Steven Chu steps down as United States Secretary of Energy. (AP via The Washington
    Post) (Los Angeles Times) (USA Today)
  Science and technology:
  - A Ukrainian–Russian carrier rocket Zenit-3SL carrying a telecommunications satellite
    Intelsat 27 fails 40 seconds after the lift-off and plunges into the Pacific Ocean
    shortly during Sea Launch. (BBC) (Space.com) (RIA Novosti)
  Sport:
  - Premier League clubs spent about £120 million in the January transfer window which
    expired last night, double last year's figures. (BBC) (ITV)
  - In tennis, 2013 Davis Cup begins today with eight matches in the World Group.
    (Tennis.com)
  - Hurling star Lar Corbett denies media reports claiming he has won a €10.6 million
    lottery jackpot. (The Irish Times) (Independent) (RTÉ)
