Date: '2013-02-10'
Source_URI: Portal:Current events/2013 February 10
Intelligence_Payload:
  Northern Mali conflict (2012–present):
  - Firefights between Islamists and the Malian Army break out in Gao, Mali. (BBC)
    (AFP via Google) (Voice of America)
  South Thailand insurgency:
  - A roadside bombing in Thailand's southern Yala Province kills 5 soldiers and injures
    three others. (Straits Times)
  Nigerian Sharia conflict:
  - Suspected Boko Haram militants kill three doctors in the northeastern Nigerian
    region of Yobe. Their nationality is disputed, with reports suggesting they are
    South Korean, North Korean or Chinese. (BBC) (Al Jazeera)
  War in Afghanistan (2001–2021):
  - American general Joseph F. Dunford, Jr. takes over command of NATO forces in Afghanistan,
    replacing John R. Allen. (AFP via ABC News) (The Guardian) (USA Today)
  Arts and culture:
  - Tens of millions of Hindus bathe in the Ganges River in the Indian city of Allahabad
    during the Maha Kumbh Mela festival. (AFP via ABC News)
  - A large parade in London celebrates the Chinese New Year. (BBC)
  - The 66th British Academy Film Awards are held in London with Argo winning best
    film, Ben Affleck winning best director and Daniel Day-Lewis and Emmanuelle Riva
    winning best actor and actress. (The Guardian) (Sky News Australia)
  - The 2013 Grammy Awards are held in the American city of Los Angeles. (Sydney Morning
    Herald) (Today)
  - Fun win the Grammy Award for Song of the Year for We Are Young. (Sydney Morning
    Herald)
  - Gotye featuring Kimbra win the Grammy Award for Record of the Year for "Somebody
    That I Used To Know". (ABC News Australia)
  - Mumford & Sons win the Grammy Award for Album of the Year for Babel. (Sydney Morning
    Herald)
  Disasters and accidents:
  - '2013 Kumbh Mela stampede: A stampede of people at the Allahabad railway station,
    India, coming back from bathing in the Ganges River during the Kumbh Mela festival,
    kills 36 and injures 39 many others. (Reuters) (BBC) (CNN) (The Hindu) (Hindustan
    Times)'
  - '2013 Hattiesburg, Mississippi tornado: A tornado causes significant damage to
    the American town of Hattiesburg, Mississippi. (AP via Fox News)'
  - A lifeboat falls off of a cruise ship MS Thomson Majesty while it was docked in
    the port of Santa Cruz de La Palma in the Canary Islands, killing 5 people. (AP
    via CBS) (BBC) (The Guardian)
  - Three crew members are killed when a Bell 206 helicopter crashes at the Polsa
    Rosa Movie Ranch in Acton, California, United States, while filming a documentary.
    (The New York Times) (CNN)
  - Cruise ship Carnival Triumph suffers a fire in the aft engine room. The fire is
    automatically extinguished, but it results in a loss of power and propulsion.
    There are no casualties or injuries to passengers or crew. (ABC News) (USA Today)
  Law and crime:
  - Authorities say that there will be a reward for providing information that will
    lead to the capture of Christopher Dorner, the suspect in the 2013 Southern California
    shootings. (Los Angeles Times) (The Sun)
  Politics and elections:
  - Prime Minister of Tunisia Hamadi Jebali says he will resign if a new "technocratic"
    government cannot be formed in a few days. Amid protests one policeman dies and
    tens of protesters are injured. (BBC) (Tunisia Live)
  Science and technology:
  - Boeing conducts the first test flight of the Dreamliner since it was taken out
    of service for battery problems. (USA Today) (Slash Gear) (UPI)
  Sport:
  - In association football, Nigeria defeats Burkina Faso by a score of 1–0 in the
    final to win the 2013 Africa Cup of Nations. (ESPN)
  - In ice hockey, Austria, Latvia and Slovenia secure qualification for the men's
    tournament at the 2014 Winter Olympics. (Reuters) (Eurohockey) (Yahoo! Sports)
