Date: '2006-02-15'
Source_URI: Portal:Current events/2006 February 15
Intelligence_Payload:
  Uncategorized:
  - 'Abu Ghraib torture and prisoner abuse: Australian television network SBS airs
    video and photographs of what it says are previously unpublished images of the
    abuse of Iraqis in US military custody at Abu Ghraib prison in 2003. (Metronews)'
  - Italian ambassador Francesco Trupiano apologizes to Libya on behalf of Italian
    minister of Constitutional Reform Roberto Calderoli, who suggested Italy use "force
    against Muslims." (Angola Press)
  - The final three defendants in the Bali Nine hearings in Indonesia, Australians,
    Matthew Norman, 19, Tan Duc Thanh Nguyen, 23, and Si Yi Chen, 20, are sentenced
    to life imprisonment. (NineMSN)
  - The United States and Israel deny a "destabilisation plan" of Hamas, winner of
    the January 2006 legislative elections, which was revealed on February 14 by the
    New York Times. However, they do acknowledge that they would cut off funds and
    transfers of tax-receipts to the Palestinian Authority. The aim of the "destabilisation
    plan" was to push the PA to organize new elections (NYT).
  - 'Haitian elections, 2006: In a case of apparent electoral fraud, hundreds of ballot
    boxes are discovered in a garbage dump in Haiti, throwing the results of the elections
    there in doubt. CBC'
