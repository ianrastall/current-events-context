Date: '2006-02-08'
Source_URI: Portal:Current events/2006 February 8
Intelligence_Payload:
  Uncategorized:
  - Chad and Sudan sign the Tripoli Agreement, ending the Chadian–Sudanese conflict.
    (AlertNet)
  - Heather Wilson, a New Mexico Congresswoman with NSA oversight authority, became
    the first Republican on an intelligence committee to call for a congressional
    investigation into Bush's warrantless wiretap program. (NY Times)
  - An explosion at Russian military base at Kurchaloi in Chechnya kills at least
    12 soldiers. The cause is unknown; however, a separatist attack has been officially
    ruled out. (Al Jazeera)(Mail and Guardian)
  - Japanese Princess Kiko is pregnant with her third child. (ABC)
  - Thousands of native South Americans march south of Rio de Janeiro to the spot
    where Sepé Tiaraju was killed in 1756, demanding that land in Brazil be given
    for a new "Guaraní nation."
  - 'Jyllands-Posten Muhammad cartoons controversy: in Afghanistan, four people are
    killed and eleven others are wounded by police firing on hundreds of protesters
    attempting to storm US military base. (AP)'
