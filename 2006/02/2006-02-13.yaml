Date: '2006-02-13'
Source_URI: Portal:Current events/2006 February 13
Intelligence_Payload:
  Uncategorized:
  - In a televised address to the nation, Kenyan President Mwai Kibaki announces the
    resignations of two government ministers in connection with two separate corruption
    scandals, the "Goldenberg" and "Anglo Leasing" affairs. Energy minister Kiraitu
    Murungi and education minister George Saitoti both deny any wrongdoing. (BBC)
  - In Baghdad, a suicide bomber detonates an explosive belt in a line of people waiting
    to receive government payments, killing at least eight other people and wounding
    about 30, including children and police. (CTV)
  - Saddam Hussein is forced to attend the latest session of his trial, wearing a
    traditional Islamic robe rather than his usual crisp suit, as he shouted "Down
    with Bush." (CTV)
  - Tongan Prime Minister Prince Lavaka Ata 'Ulukalala resigns suddenly on 11 February
    2006, and also gives up his other cabinet portfolios. He was replaced in the interim
    by the elected Minister of Labour, Dr. Feleti Sevele. (Pacific Magazine)
  - Australian Renae Lawrence, 28, the only female member of the Bali Nine group arrested
    in 2005, and fellow accused Scott Rush, 19, are convicted in Indonesia of attempting
    to import heroin to Australia and sentenced to life imprisonment. (Sydney Morning
    Herald)
