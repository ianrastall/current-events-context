Date: '2006-02-10'
Source_URI: Portal:Current events/2006 February 10
Intelligence_Payload:
  Uncategorized:
  - National Hockey League great Wayne Gretzky has denied placing any bets with an
    illegal sport gambling operation. (Reuters)
  - Finance chiefs of the G8 countries meet this weekend in Moscow with energy security
    at the top of their agenda. (BBC)
  - Israel has criticised Russia's decision to invite Hamas leaders to Moscow for
    talks, following the militant group's victory in Palestinian elections. (BBC)
  - KV63, tomb from the Eighteenth Dynasty of Egypt, dating back more than 3,300 years,
    has been uncovered in the famed Valley of the Kings, an ancient desert burial
    ground near the southern city of Luxor. (CTV)
  - United Nations Secretary General Kofi Annan wishes editors to stop reprinting
    the controversial Muhammad cartoons. (CBC)
  - A medium-sized earthquake, registering 4.9, shook central Chile, rattling buildings,
    but there were no immediate reports of injuries or damages. (ABC)
  - At least eight people are killed and 22 wounded by a car bomb in the southern
    Doura district of the Iraqi capital, Baghdad. (BBC)
  - An atheist who sued a small-town priest for saying that Jesus Christ existed has
    had his case thrown out of court by a judge in Italy. (BBC)
  - The 2006 Winter Olympics open in Turin, Italy, with the opening ceremony at the
    Stadio Olimpico. It is the 20th winter games and the second hosted by an Italian
    city. (CBC)
  H5N1 bird flu virus:
  - The deadly strain of H5N1 avian flu has been found in wild birds in Azerbaijan's
    Caspian Sea coast. (CBC)
  - Two Indonesian women from an area just east of the capital are in hospital after
    local tests showed they had the H5N1 bird flu virus. (ABC)
