Date: '2006-02-03'
Source_URI: Portal:Current events/2006 February 3
Intelligence_Payload:
  Uncategorized:
  - Jamal al-Bedawi, who masterminded the USS Cole bombing, and Fawaz al-Rabeiee,
    who planned the 2002 attack on the French tanker Limburg, escape from a prison
    in Yemen along with 22 other prisoners, 12 of whom were convicted members of Al-Qaida.
    (BBC)
  - The United States expels Venezuelan diplomat Jeny Figueredo Frias in retaliation
    for yesterday's expulsion of suspected US spy John Correa from Venezuela. A State
    Department spokesman described the move as part of "tit-for-tat diplomatic games".
    (VOA)
  - The International Atomic Energy Agency has deferred until Saturday a vote on whether
    to report Iran to the UN Security Council over concerns its nuclear programs may
    produce weapons. (CBC)
  - A plot to assassinate President Mikhail Saakashvili of Georgia by shooting down
    his helicopter has been foiled. (Yahoo)
  - 'Queues build up at vendors as the EuroMillions lottery offers a jackpot of €180
    million after 11 successive rollovers (statistically expected once in 25 years).
    Some British vendors report a 1200% increase in sales. EuroMillions tickets are
    sold in Austria, Belgium. France, Ireland, Luxembourg, Portugal, Spain, Switzerland
    and the United Kingdom. An Irish woman won €115,436,126 last July. (BBC), (Guardian).
    UPDATE: The winning numbers were 9 21 30 39 50 with Lucky Star numbers 01 and
    03; the jackpot was shared between three winning tickets, two in France and one
    in Portugal. (UK National Lottery)'
  - Two car bombs explode minutes apart in southern Baghdad, killing at least 16 people
    and wounding more than 90 others. (CNN)
  - A strong earthquake registering magnitude 5.9 shakes northeastern Japan, but there
    is no danger of a tsunami. (CNN)
  - The United States Secretary of Defense Donald Rumsfeld likens Venezuela's President
    Hugo Chávez to Adolf Hitler. In retaliation, Venezuelan Vice President José Vicente
    Rangel refers to the US as the Third Reich. (AP), (AP)
  - The M/V al-Salam Boccaccio 98, a ferry carrying 1272 passengers and 105 crew,
    sinks in poor weather in the Red Sea while travelling between Saudi Arabia and
    Egypt. 314 people have been rescued so far. (BBC) (Wikinews)
  - Dutch D66 party chairman Boris Dittrich resigns because the Dutch Government voted
    'Yes' to Dutch participation in a NATO-led ISAF operation in Afghanistan. (Expatica)
  Israeli-Palestinian Conflict:
  - Hezbollah fires some 30 mortar shells at IDF outposts along the northern Israeli
    border, lightly wounding an Israeli soldier. In response, Israeli Air Force strikes
    Hezbollah targets in southern Lebanon. (Reuters) (YNET)
  - At least three Qassam rockets are fired from Gaza by Palestinian militants at
    Israeli civilian targets. One rocket strikes a home in Kibbutz Karmia, injuring
    four people, including a one-year-old infant. The home belongs to a family recently
    evicted during Israel's 2005 unilateral disengagement from the Gaza Strip. (YNET)
