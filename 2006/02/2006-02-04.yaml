Date: '2006-02-04'
Source_URI: Portal:Current events/2006 February 4
Intelligence_Payload:
  Uncategorized:
  - Saddam Hussein aims to sue Tony Blair and George W. Bush for crimes against Iraq.
    (Scotsman)
  - Georgia, US. 17 human rights activists sentenced to prison including one 81-year-old
    retired World War II Veteran for trespassing at Fort Benning military camp. (Scoop,
    New Zealand)
  - Twenty-seven out of 35 countries on the IAEA's Board of Governors vote to refer
    the nuclear program of Iran to the United Nations Security Council out of concern
    over Iran's plans to enrich nuclear materials and to refuse IAEA inspection of
    the process. (BBC)
  - A stampede at a sports stadium in Pasig City, Metro Manila, Philippines, kills
    73 and injures more than 320, mostly women. Tens of thousands of people had gathered
    to watch the anniversary presentation of the popular ABS-CBN early afternoon TV
    gameshow, Wowowee. (BBC) (CNN)
  - The Danish, and as a consequence of sharing the same building, the Chilean and
    Swedish embassies in Damascus, are firebombed by protestors denouncing the publication
    of what they consider sacrilegious cartoons depicting the Prophet Muhammad. The
    Norwegian embassy is also burned. (BBC)
