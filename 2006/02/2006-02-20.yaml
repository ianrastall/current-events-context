Date: '2006-02-20'
Source_URI: Portal:Current events/2006 February 20
Intelligence_Payload:
  Uncategorized:
  - Retired scientist Don Kennedy suggests the entire population of Tuvalu should
    move to the Fijian island of Kioa, to preserve Tuvaluan culture as their homeland
    becomes uninhabitable due to rising sea levels. (Pacific Magazine)
  - Iranian Foreign Minister Manouchehr Mottaki denies that Iranian President Mahmoud
    Ahmadinejad said that he wanted Israel to be "wiped off the map", saying Ahmadinejad
    was misunderstood. (Reuters)
  - Attacks by the Movement for the Emancipation of the Niger Delta destroy an oil
    pipeline and a military houseboat in southern Nigeria, cutting crude production
    by about twenty percent. The recent violence has caused a rise in international
    oil prices due to supply concerns. (ABC)
  - British Holocaust denier David Irving is jailed for three years by an Austrian
    court after pleading guilty to denying the existence of the Holocaust during a
    visit to Austria in 1989. Arrested last November, a suspended sentence had been
    expected and Irving is expected to appeal the sentence. (BBC) (The Independent)
  - Russian and Iranian negotiators begin talks today on a plan that may have the
    former enrich uranium for the latter, as part of the international community's
    efforts to dissuade Iran from doing its own enrichment. (AP)
  - Western romance Brokeback Mountain wins awards for best film and best director
    for Ang Lee at the BAFTA awards. (BBC)
  - Osama bin Laden vows never to be captured alive, according to an audiotape that
    was posted Monday on a militant Web site. (Associated Press)
