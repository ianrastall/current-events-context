Date: '2006-02-05'
Source_URI: Portal:Current events/2006 February 5
Intelligence_Payload:
  Uncategorized:
  - 'American football: The Pittsburgh Steelers defeat the Seattle Seahawks by a score
    of 21–10 in Super Bowl XL. (Sports Illustrated)'
  - Iran resumes most of its nuclear program after it was voted to be referred to
    the United Nations Security Council. However it says that it is still open for
    renegotiation. (BBC)
  - The Danish embassy in Beirut, Lebanon, is set on fire by protesters because of
    the continued controversy over the cartoons depicting the Muhammad, and rumors
    of Qur'an burnings in Denmark. (BBC)
  - Israel bombs a sport club in Gaza. When people came to help the wounded they fired
    another missile. When they manage to get a badly injured into a car a third missile
    is fired at the car killing three persons. (SFT)
