Date: '2006-02-25'
Source_URI: Portal:Current events/2006 February 25
Intelligence_Payload:
  Uncategorized:
  - Chad President Idriss Déby announces that the 2006 Chad presidential election
    will take place on May 3. Several opposition leaders have already stated plans
    to boycott the election, and Mohammed Nour continues to threaten further violence
    if a national forum is not held soon. (Reuters AlertNet)
  - A New Jersey company is accused of harvesting body parts from New York funeral
    homes for transplants. An estimated 12,000 people received the body parts. (Washington
    Post)
  - 'Ugandan general election, 2006: Yoweri Museveni, President of Uganda since 1986,
    is re-elected. (BBC)'
  - Paintings by Picasso, Dalí, Matisse and Monet are stolen from a museum in Rio
    de Janeiro, Brazil. (BBC)
  - Riots occur in Dublin in the lead up to the Love Ulster parade. Six officers,
    seven protesters and a journalist are hospitalized, mostly with head wounds. (IOL)
    (RTE) (Daily Ireland)
  - Al-Qaeda admits responsibility for a failed bomb attempt at Abqaiq plants, the
    world's largest oil processing facilities. (National Nine News)
  - The search for coal miners trapped in the Pasta de Conchos mine disaster in Mexico
    is suspended due to toxic levels of natural gas. The 65 trapped miners are presumed
    dead. (LA Times)
  - It is revealed that MSN Messenger silently removes messages containing links to
    freeware and open source software.(BBB)
  - Gary Kelly makes his 500th appearance for Leeds United football Club, in a 2–1
    win against Luton Town F.C.
