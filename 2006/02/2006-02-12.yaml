Date: '2006-02-12'
Source_URI: Portal:Current events/2006 February 12
Intelligence_Payload:
  Uncategorized:
  - Italian prime minister Silvio Berlusconi causes a political storm by comparing
    himself to Jesus Christ. (BBC)
  - A royal tomb from the 2nd or 3rd century BC is found in Pella, Greece. It is the
    largest Greek tomb found to date. This announcement comes a few days after the
    Egyptian tomb in the Valley of the Kings was found. (Reuters)
  - British tabloid The News of the World releases a video shot in 2004 by a British
    soldier showing the repeated kicking and beating of four Iraqi teenagers with
    batons by other British soldiers. The video contains a commentary by the cameraman
    urging the soldiers on. The Ministry of Defence began an investigation. One man
    was arrested on 13 February and two more on 14 February. (News of the World) (BBC)(Video)
  - United States military strategists reportedly are developing plans for a possible
    major military bombing campaign against Iranian nuclear sites as a "last resort"
    in the event that diplomatic efforts fail to convince Iran to voluntarily end
    what Western governments consider to be efforts at acquiring a nuclear weapon.
    (The Telegraph)
  - The North American blizzard of 2006 dumps 27 inches of snow on New York City,
    closes many major airports, and leaves 200,000 without power in Washington, D.C.
    and Baltimore, Maryland. (CNN)
