Date: '2006-02-26'
Source_URI: Portal:Current events/2006 February 26
Intelligence_Payload:
  Uncategorized:
  - 'Olivier Awards: Liam Mower, James Lomas and George Maguire win an award for Best
    Actor in a musical for their role in Billy Elliot the Musical. They are the first
    to do so in a shared capacity. At 13, this makes Mower the youngest actor to ever
    receive this award. (BBC)'
  - '2006 Winter Olympics: The Olympic flag is passed to the mayor of Vancouver, home
    of the 2010 Winter Olympics, during the Closing Ceremony of the 2006 Winter Olympics.
    (CBC)'
  - 'Al Askari Mosque bombing: The International Crisis Group releases a report cautioning
    the international community to plan for the contingency of a civil war in Iraq.
    At least 250 people have died in violence resulting from the Al Askari Mosque
    bombing. (CSMonitor)'
  - Jamaica will have its first female Prime Minister, as Portia Simpson-Miller is
    elected president of the People's National Party. She will automatically replace
    P. J. Patterson in a few weeks. (BBC)
  - The world's population hits at 0016 UTC, according to the U.S. Census Bureau's
    World Population Clock. (Toronto Star) (US Census)
  - The Cunard liner, Queen Mary 2 meets its namesake predecessor, Queen Mary for
    the first time in Long Beach, California, Queen Mary's permanent base.
