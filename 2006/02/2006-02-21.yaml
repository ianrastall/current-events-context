Date: '2006-02-21'
Source_URI: Portal:Current events/2006 February 21
Intelligence_Payload:
  Uncategorized:
  - 33 people are killed and dozens are wounded amidst fighting between the Alliance
    for the Restoration of Peace and Counter-Terrorism and Islamic Court in Daynille,
    Mogadishu, Somalia. (AFP)
  - 'Enron: The High Court in London rules that three bankers may be extradited to
    the United States to face trial on Enron-related charges. The three, David Bermingham,
    Gary Mulgrew and Giles Darby, former executives at Royal Bank of Scotland Group
    PLC unit Greenwich NatWest, had argued unsuccessfully that since the majority
    of the alleged offenses took place in Britain, any trial should be held in that
    country. (Houston Chronicle)'
  - Former Bosnian Serb Army General Ratko Mladić, wanted by the International Criminal
    Tribunal for the Former Yugoslavia in The Hague in connection with the massacre
    of 8,000 men and boys on July 11, 1995, in Srebrenica, has been reported by Belgrade's
    Studio B TV to have been arrested. The Serbian government has denied the capture,
    decrying the report as "manipulation which damages the government". (BBC)
  - Eight men are acquitted of the 1999 murder which has many hundreds of witnesses
    of model Jessica Lal in India. The acquittal causes outrage among the Indian community
    with petitions to President Abdul Kalam for a review of the case (Hindustan Times)
    .
