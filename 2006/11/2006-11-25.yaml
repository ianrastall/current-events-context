Date: '2006-11-25'
Source_URI: Portal:Current events/2006 November 25
Intelligence_Payload:
  Uncategorized:
  - General Augusto Pinochet issues a statement accepting "political" responsibility
    for everything that happened in Chile during his rule. (BBC)
  - Belarusian President Alexander Lukashenko calls for a "union" of foreign and energy
    policies between Belarus and Ukraine. At the same time, he says his government
    falsified the results of the last presidential election by reducing the size of
    his own majority. (RadioFreeEurope/RadioLiberty)
  - Polling has been reportedly brisk in today's Bahraini parliamentary elections.
    The first results are expected later today. (CNN)
  - 'Chadian Civil War (2005–2010): Rebel fighters are reported to have entered the
    key eastern Chadian city of Abéché, following clashes with government troops.
    (BBC)'
  - Police in New York kill an unarmed man, Sean Bell, on his wedding day. They fired
    more than 50 times. (BBC News)
  - 'Holy War: BYU''s football program beat Utah 33-31 on a game-winning touchdown
    catch by wide receiver Johnny Harline. (Deseret News)'
