Date: '2006-11-06'
Source_URI: Portal:Current events/2006 November 6
Intelligence_Payload:
  Uncategorized:
  - 'Somalian War: Heavy fighting has been reported between forces of Union of Islamic
    Courts and Puntland, the semi-autonomous region of Somalia. (Al Jazeera)'
  - Felipe Pérez Roque, the Foreign Minister of Cuba, backs away from earlier predictions
    that Fidel Castro would return as the President of Cuba by December raising concerns
    about the progress of Castro's recovery from intestinal surgery. (USA Today)
  - The Iraqi government prepares a law that may see former Baath Party supporters
    restored to their former jobs. (ABC News)
  - Tony Blair opposes the death penalty for Saddam Hussein but says the trial had
    reminded the world of Hussein's brutality. (CNN)
  - Bombs explode at Mexico's Federal Electoral Tribunal, an opposition party's headquarters
    and a bank in the capital. (RTÉ News)
  - 'Operation Autumn Clouds: A female Palestinian suicide bomber has blown herself
    up in a Gaza Strip town, killing herself and injuring an Israeli soldier, the
    Israeli army says. (BBC)'
  - The Polish President, Lech Kaczyński, proposes that there be a 100,000 man-strong
    EU Army designed to work with NATO. (RTÉ News)
  - Ariel Sharon is moved out of the intensive care unit at the Sheba Medical Center.
    (AP via Malaysia Star)
  - Daniel Ortega has an early lead over Eduardo Montealegre, according to partial
    results from the general elections in Nicaragua. (CNN)
  - The United Nations Climate Change Conference (COP-12) opens in Nairobi, Kenya.
    (UNFCCC)
  - The legal challenge to President George W. Bush's ratification of the Deficit
    Reduction Act of 2005 (Conyers v. Bush) led by United States Congressman and member
    of the House Judiciary Committee John Conyers (together with ten other representatives
    of the House of Representatives) is dismissed due to lack of standing (ABC)
