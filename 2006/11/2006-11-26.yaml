Date: '2006-11-26'
Source_URI: Portal:Current events/2006 November 26
Intelligence_Payload:
  Uncategorized:
  - 'Somali Civil War: The Islamic Courts Union that controls much of southern Somalia
    has dispatched thousands of troops to within 15km of the border with Ethiopia.
    (Al-Jazeera)'
  - Peter Hain, the Secretary of State for Northern Ireland criticizes "murky murders"
    associated with Vladimir Putin's regime in Russia following the poisoning of Alexander
    Litvinenko. (Reuters via ABC News Australia)
  - Sunni and Shia Islamists score big victories in Bahrain's parliamentary elections
    as results are announced from yesterday's poll (Gulf News). Liberals and the left
    win no seats in the first round. (Reuters via CNN)
  - One NATO soldier and 57 insurgents are killed in fighting in southern Afghanistan.
    (The Boston Globe)
  - 'Fiji crisis of 2005-2006: The Fijian military calls up 1,000 as military commander
    Commodore Frank Bainimarama states "my intention of removing this government is
    clear". (AFP via ABC News Australia)'
  - 'Ecuadorian election: People in Ecuador go to the polls to choose a new president
    between Rafael Correa and Álvaro Noboa. Exit polls and unofficial polls indicate
    a victory for Correa. (BBC News), (Reuters)'
  - Former Italian Prime Minister Silvio Berlusconi collapses while giving a speech
    in Tuscany and has to be carried from the podium by his aides. Doctors treating
    him afterwards blamed a sudden drop in blood pressure. (BBC News)
  Chadian Civil War (2005–2010):
  - Chad's armed forces have retaken Abéché with no major fighting being reported.
    (Aljazeera)
  - Chadian forces have also claimed to have retaken Biltine, but rebel forces deny
    these claims. (BBC)
  - After earlier reports from The French embassy in Chad saying a large column of
    rebel vehicles had been spotted heading towards the capital N'Djamena, the embassy
    now says the progression has stopped. (BBC)
  Israeli-Palestinian conflict:
  - A ceasefire commences between Israeli and Palestinian fighters in the Gaza Strip.
    It followed negotiations between the Palestinian President Mahmoud Abbas and Israeli
    Prime Minister Ehud Olmert. (MSNBC)
  - Palestinian attacks on Israel continue, despite a ceasefire and subsequent Israeli
    pullout from Gaza, with militants firing a barrage of Qassam rockets on southern
    Israeli towns. (AP via Yahoo! News)
