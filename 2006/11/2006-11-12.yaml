Date: '2006-11-12'
Source_URI: Portal:Current events/2006 November 12
Intelligence_Payload:
  Uncategorized:
  - 'Central African Republic Civil War: Rebels claim to have captured a second town
    in the Central African Republic during a two-week-long offensive. (BBC News)'
  - 'Iranian nuclear program: Israel threatens to launch air strikes on Iran''s nuclear
    facilities "as a last resort", and the Iranian foreign ministry responds that
    it would "retaliate with a crushing blow" should Israel act. (BBC News)'
  - 'Somali Civil War (2006): Heavy fighting broke out in central Somalia, officials
    said, a day after the transitional government rejected a peace initiative with
    the country''s Islamic movement. (The Jerusalem Post)'
  - An international treaty, the 2003 Protocol on Explosive Remnants of War, comes
    into force aiming to limit the impact of cluster bombs and other unexploded devices
    on civilian populations after a conflict ends. (BBC via ABC News Australia)
  - A suicide bomber kills at least 35 people and injures about 50 more at a police
    recruiting center in Baghdad. (AP via ABC News)
  - The former Soviet autonomous oblast of South Ossetia holds a referendum on independence
    from Georgia, heightening tension in the Caucasus. (BBC News)
  - The first round of the 2006 local elections for local mayors and local city councils
    takes place in Poland.
