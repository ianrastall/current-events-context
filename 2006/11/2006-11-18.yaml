Date: '2006-11-18'
Source_URI: Portal:Current events/2006 November 18
Intelligence_Payload:
  Uncategorized:
  - President of Turkmenistan "Turkmenbashi" Saparmurat Niyazov schedules a second
    eye operation in Germany in January amid rumors that his health is poor. President
    Niyazov cannot be operated on in Turkmenistan because earlier this year he signed
    a decree that closed all hospitals outside of Ashgabat and replaced most healthcare
    staff with soldiers. (RFE/RL) (World Medical Association)
  - The annual Leonid meteor shower could produce a strong outburst this weekend for
    residents of New York and New England in the United States, the Maritimes in Canada
    and in Western Europe. (Space.com)
  Chadian Civil War (2005–2010) and Central African Republic Bush War:
  - Chad has offered to send troops to the Central African Republic to help fight
    rebels it claims are backed by Sudan. (BBC)
  - Chad has imposed a 12-day curfew in its capital to counter growing tension between
    Arab tribes and local inhabitants. (Aljazeera)
  2006 Tonga riots:
  - About 150 soldiers and police officers from Australia and New Zealand have arrived
    in Tonga following an appeal for help to restore order after riots. (BBC)
