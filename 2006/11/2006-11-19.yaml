Date: '2006-11-19'
Source_URI: Portal:Current events/2006 November 19
Intelligence_Payload:
  Uncategorized:
  - Muslim women in New York City want to start a Koran council to interpret strict
    sharia law. (Reuters)
  - The British Columbia Lions win the 94th Grey Cup, the championship game of the
    Canadian Football League, game 25-14 over the Montreal Alouettes in Winnipeg,
    Manitoba. (CFL)
  - Gunmen abduct Iraq's Deputy Health Minister Ammar al-Saffar. (CNN)
  - 'Somali Civil War: UN Secretary-General Kofi Annan warns Somalia''s neighbours
    to stay out, as UN experts paint an alarming picture of foreign and extremist
    intervention in a nation on the brink of all-out war that could engulf the Horn
    of Africa. (allAfrica)'
  - 'Suspected assassination plot: Alexander Litvinenko, a former Russian spy who
    defected to Britain six years ago, is fighting for his life in a London hospital
    after being poisoned with polonium-210 in a sushi bar. (The Sunday Times)'
  - India test fires a Prithvi missile, a surface-to-surface missile, capable of carrying
    a nuclear weapon. (NDTV)
  - Russia and the United States sign a key trade agreement paving the way for Russian
    membership of the World Trade Organization. (AP via ABC News)
  - A suicide bomb explodes in Hillah, Iraq, killing 17 and wounding 49. (ABC News)
  - '2006 Tonga riots: A leader of the Tongan pro-democracy movement, MP Akilisi Pohiva,
    criticises the intervention of Australian and New Zealand peacekeepers following
    riots. (ABC News Australia)'
  - An attempted military coup d'état in Madagascar announced by Général Andrianafidisoa
    appears to have failed. (BBC) (NY Times) (ABC News)
  - The 2006 meeting of the G20 industrial nations in Melbourne ends, with discussions
    centering on the global economy and climate change. Protesters clash with police
    during the event. (The Age - discussions) (The Age - protests)
  - The annual APEC meeting in Hanoi concludes with a call for the resumption of World
    Trade Organization talks, but references to climate change were removed from the
    final statement. (International Herald-Tribune)
  - Sri Lankan Army troopers opened fire on a group of minority Sri Lankan Tamil and
    Muslim students at an Agricultural College at Thandikulam close to Vavuniya in
    Sri Lanka. Five students were killed along with 10 injured. (Reuters)
  - Nintendo releases its 7th generation video game console in North America with
    21 launch titles, the Wii.
