Date: '2006-11-14'
Source_URI: Portal:Current events/2006 November 14
Intelligence_Payload:
  Uncategorized:
  - The President of Iran Mahmoud Ahmadinejad says he expects its nuclear enrichment
    program to be ready by February 2007. (CNN)
  - The first babies to have been screened for faulty genes by Preimplantation Genetic
    Haplotyping (PGH) have been born in London's Guy's Hospital. (The Times)
  - Gunmen wearing Iraqi police uniforms kidnap up to 100 people from a Higher Education
    Ministry building in Baghdad. (BBC News)
  - In Kenya, flash flooding in the Mombasa region claims at least 21 lives. The Kenyan
    Red Cross claims 60,000 people have been made homeless. (BBC News)
  - The European Union has renewed diplomatic sanctions for Uzbekistan. The sanctions,
    which have been violated repeatedly by the governments of Britain and Germany,
    prohibit the sale of weapons to the Uzbek government and visits from EU officials
    to Uzbekistan or vice versa. The sanctions were originally implemented after the
    Uzbek government would not allow an international investigation into the uprising
    in Andijan. (BBC News)
  - Australia and Indonesia sign a security treaty on Lombok strengthening cooperation
    against terrorism, enhancing joint naval border patrols and formalising military
    exchanges. It also supports Indonesia's sovereignty over its provinces notably
    Western New Guinea. (ABC News)
  - The Parliament of South Africa passes a law to legalize same-sex marriage. It
    must now be signed by President Thabo Mbeki to become law. The change was required
    by a constitutional court, which ruled last year that the current marriage law
    unconstitutionally discriminated on the basis of sexual orientation. (CBC)
  - The UCLA Taser incident occurs when student Mostafa Tabatabainejad is stunned
    with a Taser multiple times, prompting public outcry.
