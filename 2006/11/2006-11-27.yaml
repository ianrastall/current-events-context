Date: '2006-11-27'
Source_URI: Portal:Current events/2006 November 27
Intelligence_Payload:
  Uncategorized:
  - Michael Grade, the Chairman of the BBC, is hired as the new boss of its biggest
    rival ITV. (BBC)
  - The Supreme Court of the Democratic Republic of the Congo confirms that Joseph
    Kabila had won the 2006 presidential election. (Independent Online)
  - 'Somali Civil War: The Islamic Courts Union that controls much of southern Somalia
    has revealed they would attack Ethiopian forces in Galkayo in Mudug province,
    central Somalia. (AllAfrica)'
  - The British government rejects proposals to increase the length of sound recording's
    copyright protection from 50 years to 95 years. This means that Sir Cliff Richard's
    earliest songs will come out of copyright in 2008, and the earliest songs recorded
    by the Beatles in 2013. Songs composed and/or written will still have copyright
    for 70 years after the author's death. (BBC)
  - An airplane crashes in Tehran killing 28 members of the Islamic Revolutionary
    Guards Corps including high-ranking officers. (AP via International Herald Tribune)
  - Australian Attorney-General Philip Ruddock tables the multi-volume Cole Inquiry
    report. It finds that the Prime Minister of Australia John Howard, his ministers
    or Australian government departments were not aware of AWB Limited paying kickbacks
    to the regime of Saddam Hussein to buy Australian wheat under the Oil for Food
    program. (AAP via News Limited)
  - John Key is elected leader of the opposition New Zealand National Party, with
    Bill English as his deputy. Both were unopposed. (NZ Herald)
  - Canadian Prime Minister Stephen Harper and the Canadian House of Commons endorse
    a motion to declare that the Québécois form a nation within a unified Canada.
  Iraq War:
  - A U.S. F-16 fighter aircraft has gone down near the city of Fallujah in western
    Iraq. The United States Air Force said the plane's pilot was missing and an investigation
    into the cause of the incident has been launched. (Aljazeera)
  - Kofi Annan, the Secretary-General of the United Nations warns that Iraq is close
    to civil war unless "something is done drastically and urgently to arrest the
    deteriorating situation". (CNN)
