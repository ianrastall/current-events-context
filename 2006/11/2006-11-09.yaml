Date: '2006-11-09'
Source_URI: Portal:Current events/2006 November 9
Intelligence_Payload:
  Uncategorized:
  - Ken Mehlman is to step down as chairman of the National Committee of the United
    States Republican Party. (CNN)
  - Eight synchronized bombs hit car showrooms in Southern Thailand, nine injured.
    (Reuters)
  - Kyrgyz President Kurmanbek Bakiyev formally signs the new Constitution of Kyrgyzstan.
    The Constitution drastically weakens the power of the executive branch in favor
    of the legislative. Bakiyev and Prime Minister Felix Kulov are expected to maintain
    their positions until 2010. (EurasiaNet)
  - BP settles the last remaining lawsuit from the 2005 explosion at its Texas oil
    refinery that cost 15 lives. (Reuters via Interactive Investor)
  - The Bank of England raises interest rates in the United Kingdom to five percent.
    (Daily Telegraph)
  - Israel braces itself for revenge attacks after yesterday's dawn barrage in the
    Gaza Strip leaves a family of 18 dead. The general in charge of Israel's Southern
    Command, Youav Galant, blames problems with the targeting device for the artillery
    strike. (The Times)
  - Iowa Governor Tom Vilsack announces he will be running in the 2008 U.S. presidential
    election. (CNN)
  - Dr Mahathir Mohamad, the former Prime Minister of Malaysia, is hospitalized following
    a heart attack. (CNN)
  - France successfully performs the first flight test of its new nuclear missile,
    the M51. (AP via CBS)
  - Hundreds of young British Muslims are being radicalised, groomed and set on a
    path to mass murder, according to the head of MI5 (Security Service), Dame Eliza
    Manningham-Buller. (The Times)
  2006 United States elections:
  - Montana Senator Conrad Burns concedes his U.S. Senate race to Jon Tester. (AP
    via Yahoo! News)
  - Montana Senator George Allen to concede his U.S. Senate race to James Webb. This
    gives control of the U.S. Senate to the Democrats. (AP via Yahoo! News)
  - A recount is reported to be underway in Florida's 13th congressional district,
    after Christine Jennings, who lost her bid for Katherine Harris's former House
    seat by 373 votes, alleges that touch-screen voter machine malfunctions failed
    to record 18,000 votes in Sarasota County, Florida, a Jennings stronghold. (AP
    via Yahoo! News)
