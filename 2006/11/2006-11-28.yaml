Date: '2006-11-28'
Source_URI: Portal:Current events/2006 November 28
Intelligence_Payload:
  Uncategorized:
  - U.S. District Judge for the District of Columbia James Robertson orders the U.S.
    Treasury Department to make paper currency more recognizable to blind people in
    American Council for the Blind v. Secretary of the Treasury. (FOXNews.com)
  - Speaker-designate of the United States House of Representatives Nancy Pelosi announces
    that controversial Democratic Rep. Alcee Hastings will not be the chairman of
    the House Permanent Select Committee on Intelligence in the 110th Congress. (Reuters
    via Washington Post)
  - Rafael Correa will be the next President of Ecuador after winning the election
    with 57 per cent of the vote (94% counted). He will not be officially confirmed
    until all the votes are counted. (Reuters)
  - The Canadian House of Commons supports a motion recognising the people of Quebec
    as a separate nation within a united Canada. (BBC)
  - Ben Bernanke, the Chairman of the United States Federal Reserve predicts that
    the US economy should undertake a moderate expansion but inflation risks are "primarily
    to the upside." (Reuters via USA Today)
  - Pope Benedict XVI arrives in Turkey at the start of a four day tour that has sparked
    protests. (The Guardian)
  - The Thai Government lifts martial law in 41 of the country's 76 provinces as recommended
    by coup leader Sonthi Boonyaratglin. (BBC)
  - Nuclear envoys from North Korea, China and the United States meet to discuss North
    Korea's nuclear program. (Voice of America)
  - The Prime Minister of Fiji Laisenia Qarase flies to New Zealand to hold talks
    with Commodore Frank Bainimarama tomorrow as part of efforts sponsored by the
    New Zealand Government to avert a coup d'état. (AFP, AAP via News Limited)
  Chadian Civil War (2005–2010):
  - Chadian rebels said they shot down a government military plane with a captured
    ground-to-air missile in fighting near the eastern town of Abeche, which they
    briefly seized at the weekend. (Reuters)
  - A Chadian government spokesman said his nation was in "a state of war" with Sudan
    after a Chadian rebel group said it shot down a government plane. (CNN)
  Central African Republic Bush War:
  - Government troops in the Central African Republic, backed by French forces, have
    launched an offensive to retake the northeast town of Birao from rebels, and have
    recaptured its airport, a French military spokesman said. (Reuters)
  - French forces have clashed with rebels in the Central African Republic during
    a government offensive to regain control of the northern town of Birao. (BBC)
