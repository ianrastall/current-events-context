Date: '2006-11-03'
Source_URI: Portal:Current events/2006 November 3
Intelligence_Payload:
  Uncategorized:
  - U.S. evangelical minister Ted Haggard is accused of methamphetamine use and engaging
    in homosexual sex acts. (AP via ABC News)
  - U.S. Rep. Bob Ney of Ohio resigns from Congress after having pleaded guilty to
    charges relating to Jack Abramoff. (AP via Pioneer Press)
  - The U.S. National Transportation Safety Board states that a stiff wind blew the
    plane carrying New York Yankees pitcher Cory Lidle off-course and into an apartment
    building in New York City. (Canadian Press)
  - The World Meteorological Organisation reports that greenhouse gases in the atmosphere
    reached a record high in 2005 and are still increasing. (Washington Post)
  - A draft European Commission report raises new doubts about Turkey's bid to join
    the European Union. (BBC)
  - Trevor Berbick's nephew Harold Berbick is charged with his uncle's murder along
    with another man in Jamaica. (BBC)
  - Jackson Pollock’s No. 5, 1948 becomes the world's most expensive work of art,
    after entertainment mogul David Geffen sells the work for US$140 million. (The
    Times)
  - Wu Shu-chen, the wife of the President of the Republic of China, is indicted on
    corruption charges by Taiwan prosecutors. President Chen Shui-bian is not indicted
    due to presidential immunity, but prosecutors say he will be charged once he is
    no longer president. (BBC)
  - The New York Times reports that a website created at the request of United States
    Representative Peter Hoekstra and Senator Pat Roberts was found to contain detailed
    information which could help nuclear-capable states produce nuclear weapons. The
    website was shut down on November 2 following questioning by The New York Times
    and protests by International Atomic Energy Agency officials. (The New York Times)
  - Australia dispatches two warships, HMAS Kanimbla and HMAS Newcastle, to Fiji to
    evacuate Australian citizens in the event of a coup. (Melbourne Age)
  - The Conference of Rulers elects Sultan Mizan Zainal Abidin of Terengganu to be
    the future King of Malaysia from 13 December 2006 onwards. (JapanToday), (TimesOnline)
