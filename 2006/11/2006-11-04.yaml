Date: '2006-11-04'
Source_URI: Portal:Current events/2006 November 4
Intelligence_Payload:
  Uncategorized:
  - The death toll in a fire at the historic Mizpah Hotel in Reno, Nevada rises to
    nine with not all of the ruins having been searched yet. (Las Vegas Sun)
  - Ted Haggard resigns after the New Life Church's investigative board finds him
    guilty of "sexually immoral conduct". (AP via WCBS)
  - Tomihiro Taniguchi, Deputy Director-General of the International Atomic Energy
    Agency, announces that Algeria, Egypt, Morocco and Saudi Arabia, and possibly
    Tunisia and the United Arab Emirates, will launch nuclear programs for desalination.
    A proliferation expert asserts the real reason behind the programs is for a "security
    hedge." (The Times)
  - The North Korean Foreign Ministry releases a statement calling for Japan to leave
    the six-party talks regarding DPRK's nuclear program because the Japanese officials
    involved in the talks are "imbeciles" and Japan is a state of the U.S. The Foreign
    Ministry accuses the United States of "warmongering." (ABC News)
  - 'Operation Autumn Clouds: Israeli forces have mounted a series of air strikes
    as part of an ongoing Gaza offensive, killing at least eight.(BBC NEWS), (Al Jazeera)'
  - Two women have been killed as Israeli troops opened fire on a crowd of women gathered
    to help besieged gunmen flee a mosque in Beit Hanoun in northern Gaza. (BBC NEWS),
    (Al Jazeera)
  - Former Prime Minister of Israel Ariel Sharon is admitted to the intensive care
    unit of the Sheba Medical Center near Tel Aviv with a chest infection. (BBC)
  - Hu Jintao, the President of the People's Republic of China, promises to double
    foreign aid to Africa at a conference attended by many of the top African leaders.
    (CNN)
  - The United Nations High Commissioner for Refugees says that the humanitarian crisis
    in Iraq is greater than at the beginning of the war on Iraq with 1.6 million Iraqis
    displaced internally and 1.8 million in overseas countries. (ABC News Australia)
  - Fijian Prime Minister Laisenia Qarase drops amnesty provisions for the leaders
    of the 2000 coup after threats from the military to remove him from office. (NZ
    Herald)
