Date: '2006-11-10'
Source_URI: Portal:Current events/2006 November 10
Intelligence_Payload:
  Uncategorized:
  - The Los Angeles Police Department holds an investigation after a video showing
    police officers beating a man is posted on YouTube. (BBC News)
  - NASA's Cassini spacecraft records a hurricane-like storm on the south pole of
    Saturn which is the first time such an event has been observed on another planet.
    (ABC News Australia)
  - Nick Griffin, the leader of the British National Party, and activist Mark Collett
    are cleared of inciting racial hatred after a retrial at Leeds Crown Court. (BBC
    News)
  - Russia announces that it has reached an agreement with the United States over
    the terms of Russian entry to the World Trade Organization with a formal deal
    to be signed next week. (AP via International Herald Tribune)
  - Scientists at Rice University discover that using nanotechnology tiny particles
    of iron oxide, when placed under a strong magnet, bind with arsenic, a potentially
    important benefit for countries plagued with arsenic contamination of groundwater.
    (BBC News)
