Date: '2006-11-11'
Source_URI: Portal:Current events/2006 November 11
Intelligence_Payload:
  Uncategorized:
  - Radio Free Europe/Radio Liberty reports that the Government of Turkmenistan has
    discovered a "super giant" field of 7 trillion cubic meters of natural-gas. President
    Saparmurat Niyazov wants companies from Germany and Russia to build a pipeline
    to carry the gas. (Radio Free Europe/Radio Liberty)
  - The United States vetoes a United Nations Security Council resolution condemning
    the Beit Hanoun November 2006 incident and urging for a quick withdrawal of Israel
    from the Gaza Strip. (BBC News) (Reuters)
  - Aung San Suu Kyi meets with a United Nations official Ibrahim Gambari in Myanmar.
    It is the first time she has left her house since having been placed under house
    arrest in May. (AP via NASDAQ)
  - 'Iraq insurgency: At least eight people are killed and thirty injured in two simultaneous
    explosions in Baghdad, Iraq. (BBC News)'
  - A 5.9 earthquake occurs near Papua New Guinea. No damage is reported. (The Star
    Online)
  - Five Shiite ministers resign from the cabinet of Lebanon, complicating the situation
    for Prime Minister Fouad Siniora. (CNN)
  - Sony releases its new console in Japan with 14 launch titles, the PlayStation
    3.
  Somali Civil War (2006):
  - Somalia's Islamist leaders say they have agreed a deal to avoid hostilities with
    the transitional government. (BBC)
  - Somalia's transitional government has dismissed as irrelevant an agreement struck
    between a group of Somali MPs and the Union of Islamic Courts. (BBC)
