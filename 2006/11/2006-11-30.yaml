Date: '2006-11-30'
Source_URI: Portal:Current events/2006 November 30
Intelligence_Payload:
  Uncategorized:
  - Super Typhoon Durian (Reming), the strongest Typhoon to hit Philippines, impacts
    the Bicol region. In Virac Catanduanes wind was recorded, while in Legaspi, Albay
    of rain is recorded and a total of 740 people are killed.
  - Windows Vista goes on sale for bulk license holders with home users being able
    to buy it on January 30, 2007. (CNN)
  - The 2006 Atlantic hurricane season officially ends with a total of nine storms
    having formed. (CBS News)
  - 'Central African Republic Bush War: French fighter planes have fired at rebels
    in northern Central African Republic (CAR) where thousands have fled fighting
    in recent weeks. (BBC)'
  - The science journal Nature publishes a new reconstruction of the Antikythera mechanism
    based on high resolution X-ray tomography. The Antikythera mechanism is an ancient
    Greek mechanical analog computer designed to calculate astronomical positions.
    (Sydney Morning Herald)
  - The U.S. Institute of Peace announces that the Iraq Study Group report will be
    released to the public December 6, 2006. The group, charged with conducting a
    forward-looking assessment of the situation in Iraq, is expected to present their
    findings to President George W. Bush on that day. The report will be available
    for download on USIP's web site. (Reuters)
  - At least 300 people were killed in clashes between Sudan's army and former rebels
    in the south earlier this week, aid workers say. (BBC)
  - Nicolas Sarkozy, the French Interior Minister, announces plans to run as a candidate
    for the French Presidency in elections in April 2007. (BBC)
  - Hezbollah-led Lebanon opposition groups call for protests on Friday in an effort
    to bring down the Government, (LA Times)
  - A meeting between the President of the United States George W. Bush and the Prime
    Minister of Iraq Nouri al-Maliki in Jordan is cancelled. A classified Bush administration
    memo critical of the ability of al-Maliki to bring sectarian conflict under control
    had previously been published in The New York Times. In a later meeting, they
    decided that Iraq should not be divided into semi-autonomous zones. (News Limited
    and AFP) (AP via Boston Globe)
  - The Prime Minister of Fiji Laisenia Qarase partially agrees to demands by the
    head of the Fijian military Commodore Frank Bainimarama in order to avert a coup.
    Bainimarama rejects the compromise and issues a deadline of noon on Friday. (News
    Limited) (ABC News Australia and AFP)
