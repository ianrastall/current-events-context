Date: '2006-11-24'
Source_URI: Portal:Current events/2006 November 24
Intelligence_Payload:
  Uncategorized:
  - Convicted killer and loyalist Michael Stone is seized by security guards and police
    at Northern Ireland's parliament building, Stormont, while carrying a gun, knife
    and several possibly "viable" explosive devices. (BBC)
  - Rwanda breaks off diplomatic relations with France after a French judge, Jean-Louis
    Bruguière, issues warrants for the arrest of President of Rwanda Paul Kagame and
    nine associates for their alleged involvement in the shooting down of a plane
    carrying former President Juvenal Habyarimana. The incident sparked the Rwandan
    Genocide in 1994. (Reuters)
  - 'Israeli-Palestinian conflict: Israel and Palestinians have agreed to a ceasefire.(BBC)'
  - Campaigning has ended in Bahrain's parliamentary elections before tomorrow's vote.
    The International Herald Tribune says voter turnout is expected to be 'huge' after
    a divisive election campaign. (IHT)
  - In the last statement before his death, poisoned former Russian spy Alexander
    Litvinenko accuses Russian president Vladimir Putin of his murder. (The Times)
  - 'Iraqi insurgency: Suicide bombers kill 22 people and wound 26 in the city of
    Tal Afar in northern Iraq. (Reuters)'
  - The European Union (EU) hosts the President of Russia Vladimir Putin in a summit.
    Poland has vetoed the launch of EU-Russia partnership talks. (Reuters via Melbourne
    Age)
  - The Cole Inquiry delivers its report to the Australian Government to be tabled
    in the Parliament of Australia on Monday. It was inquiring whether Australian
    companies notably AWB Limited paid bribes to the Government of Saddam Hussein
    in order to sell wheat to Iraq. (The Australian)
  - In a poll conducted by the U.S. Agency for Development, following President Kurmanbek
    Bakiyev's signing of the controversial, new Constitution of Kyrgyzstan, 62% of
    Kyrgyz citizens believe the country is moving in the right direction. (Angus Reid)
  - Maximo V. Soliven, O.B. Montessori Center chairman and veteran publisher and writer
    of the Philippine Star, dies of cardiac and respiratory arrest in Japan. (Max
    Soliven Passes)
