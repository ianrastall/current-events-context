Date: '2006-11-07'
Source_URI: Portal:Current events/2006 November 7
Intelligence_Payload:
  Uncategorized:
  - The World Trade Organization invites Vietnam to become the WTO's 150th member.
    (BBC News)
  - Daniel Ortega is elected President of Nicaragua in the 2006 general election,
    after rival candidate Eduardo Montealegre concedes defeat. (BBC News) (CNN) (Reuters)
  - After 48 rounds of voting, Panama is elected to a non-permanent seat on the United
    Nations Security Council. (DPA)
  - José Montilla becomes the new President of the Generalitat of Catalonia, renewing
    the left-of-centre tripartite pact between his PSC, the pro-independence ERC and
    the leftist ICV-EUiA alliance after the election held on 2006-11-01. (Monsters
    and Critics)
  - John R. Bolton, the United States Ambassador to the United Nations, claims that
    United States diplomat Josette Shiner has been selected to head the United Nations
    World Food Programme. (ABC News)
  - Dhiren Barot of London is convicted of conspiracy to murder for developing al-Qaeda
    plots to kill thousands of people in the United Kingdom and United States in the
    2004 Financial buildings plot. (BBC News)
  - 'United States general elections, 2006: Voters go to the polls today in the United
    States. (Scotsman)'
  - The Democrats regain control of the United States House of Representatives. Tony
    Snow, the White House Press Secretary, concedes that "Democrats will have control
    of the House". (ABC News Australia)
  - While Democrats have gained at least 5 seats in the Senate, the majority is still
    unclear. In order to take control, Democrats would need to take the seat in Virginia;
    they are leading in that state. (CNN)
  - Marie Steichen wins the election as county commissioner in Jerauld County, South
    Dakota, beating a Republican rival by 100 votes to 64, two months after she has
    died of cancer. (AFP via Yahoo), (MSNBC)
  - 'Operation Autumn Clouds: The Israeli Defense Forces began to pull its troops
    out of the northern Gaza Strip town of Beit Hanun, Palestinian officials said.
    Fifty-three Palestinians, including 16 civilians, and an IDF soldier have been
    killed since the operation began on October 31. (Haaretz)'
  - A deadly tornado kills nine and injures twelve in Saroma, Hokkaido, Japan. (Sky
    News)
  Trial of Saddam Hussein:
  - The trial of Saddam Hussein for alleged genocide of Kurds during the Anfal campaign
    resumes today. (ABC News Australia)
  - Prime Minister Nuri al-Maliki states that he expects Hussein to be executed by
    the end of the year following conviction in his first trial, which Hussein is
    appealing. BBC
