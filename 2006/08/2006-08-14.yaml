Date: '2006-08-14'
Source_URI: Portal:Current events/2006 August 14
Intelligence_Payload:
  Uncategorized:
  - An Israeli air strike hits a house in a refugee camp in the Gaza Strip. Israel
    claims that it is a command centre for the Palestinian Islamic Jihad. (Associated
    Press)
  - Fox News journalists Steve Centanni and Olaf Wiig are kidnapped in Gaza.(Reuters)
  2006 Israel-Lebanon conflict:
  - Israel will pursue Hezbollah leaders in Lebanon despite the ceasefire ending the
    month-long conflict, Prime Minister Ehud Olmert has told parliament.(BBC NEWS)
  - Thousands of displaced Lebanese and Israelis have begun returning home hours after
    a UN ceasefire to end fighting between Israel and Hezbollah came into force.(BBC
    NEWS)
  - The ceasefire takes effect at 8am Lebanese time. (CNN)
