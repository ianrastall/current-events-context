Date: '2006-08-27'
Source_URI: Portal:Current events/2006 August 27
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - Israel denies that a German-mediated prisoner exchange with Hezbollah is to take
    place within two or three weeks, as reported earlier in Egyptian state-run daily
    Al-Ahram. (Haaretz), (AFP via Al Nahar)
  - Four children have been hurt after playing with an unexploded Israeli cluster
    bomb in southern Lebanon. (Al Jazeera)
  - Reports surface that UNIFIL troops in Lebanon continuously broadcast online sensitive
    information such as the strength and precise movements of the Israeli army.(Weekly
    Standard)
  Uncategorized:
  - The Games Convention, the largest video game expo on both sides of the Atlantic
    closes with a record attendance of 183,000 visitors in 4 days of exhibiting. The
    projected attendance was set at 150,000. There are expansion plans of the expo
    for 2007 and beyond. MDR (German)
  - Comair Flight 5191 crashes in Lexington, Kentucky. Only one person, out of three
    crew and 47 passengers, survived. (CNN.com)
  - Iran test-fires a Sagheb missile during exercises in the Persian Gulf. (TVNZ)
  - Hurricane Ernesto becomes the first hurricane of the 2006 Atlantic hurricane season.
    Jeb Bush later declares a state of emergency due to its possible impact on Florida
    later in the week. (ABC News), (Associated Press)
  - At least seven people die in blasts in the Iraqi capital Baghdad, as a security
    clampdown continues.(BBC NEWS)
  - Pakistan increases security in Balochistan as rioting follows the killing of rebel
    leader Nawab Akbar Bugti.(BBC NEWS)
  - Two Fox News Channel journalists are released after being held hostage for two
    weeks in the Gaza Strip. Steve Centanni and Olaf Wiig were earlier claimed to
    have been forced by their captors to convert to Islam. (CBS News), (Al Jazeera)
