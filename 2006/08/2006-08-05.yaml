Date: '2006-08-05'
Source_URI: Portal:Current events/2006 August 5
Intelligence_Payload:
  Uncategorized:
  - The Republic of China (Taiwan) severs diplomatic relations with Chad reducing
    the number of countries maintaining official relations with it to 24. The ROC
    foreign ministry cited Chad's intention to establish relations with the People's
    Republic of China as the reason. (AP)
  - Iran bans Nobel Peace Prize laureate Shirin Ebadi's Defenders of Human Rights
    Center on the grounds that the human rights organization did not have a permit
    from the Interior Ministry. According to Iranian law, to form a nongovernmental
    organization, one does not need a permit. (AFP)
  - Iranian Foreign Ministry spokesman Hamid Reza Asefi calls for the "formation of
    an international investigation committee to probe the ongoing atrocities of the
    Zionist regime in Lebanon, and to prosecute and punish the ones responsible for
    these catastrophes." (AFP)
  - Tropical Depression Chris starts to dissipate near Cuba. (National Hurricane Center)
  - Cyclist Floyd Landis, winner of the 2006 Tour de France, returns a positive B
    sample for excess testosterone. (BBC)
  - 'Southeastern Anatolia Project: Construction of the Ilısu Dam, which upon completion
    would cause the flooding of the ancient city of Hasankeyf in Turkey, starts. (BBC)'
  2006 Israel-Lebanon conflict:
  - The US and France have agreed on the wording of a UN resolution to end the fighting
    between Israel and Hezbollah.(BBC NEWS)
  - Israeli commandos stage a nighttime raid on Tyre.(BBC NEWS)
