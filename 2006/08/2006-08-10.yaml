Date: '2006-08-10'
Source_URI: Portal:Current events/2006 August 10
Intelligence_Payload:
  2006 transatlantic aircraft plot:
  - A terrorist plot to blow up planes in mid-flight from the UK to the US has been
    disrupted, Scotland Yard has said. (BBC) (CNN) (News.com.au)
  - Pakistan's intelligence service claims that its cooperation with British intelligence
    helped to uncover the plot. CNN reports that sources have informed it that it
    was recent arrests in Pakistan that convinced Britain to act quickly. (Reuters)
    (CNN)
  - Massachusetts Governor Mitt Romney has activated the National Guard to help with
    security at Logan International Airport. (Associated Press via the Boston Globe)
  - Heathrow Airport closed to most European flights as a result on bans on flights
    of three hours or less. Congestion builds due to ban most types of hand luggage.
    (New York Times)
  - Intelligence officials claim that the suspects were intending to hold a dry run
    within the next 2 days with the actual attack to be held within 10 days. (KSLA
    News)
  - United States President George W. Bush said the plot was "a stark reminder that
    this nation is at war with Islamic fascists who will use any means to destroy
    those of us who love freedom, to hurt our nation" drawing condemnation from the
    Council on American-Islamic Relations and the Muslim Public Affairs Council who
    discourage the use of term 'Islamo-fascism.' (Red Orbit)
  Uncategorized:
  - Hugo Chávez states that Fidel Castro is in a "great battle for life" but expresses
    optimism about his recovery. (USA Today)
  - In Marietta, Ohio, United States two men were arrested on money laundering in
    support of terrorism. They were found with lists of travelers on airplanes and
    information on airport security checkpoints. (Associated Press)
  - More than 1.5 million Chinese evacuate while Super Typhoon Saomai, the strongest
    to land in China in 50 years, makes landfall in Wenzhou, Zhejiang. (Reuters),
    (BBC), (Forbes) (Houston Chronicle)
