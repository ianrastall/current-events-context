Date: '2006-08-25'
Source_URI: Portal:Current events/2006 August 25
Intelligence_Payload:
  Uncategorized:
  - The United Nations Security Council approves a new peacekeeping mission in East
    Timor, United Nations Integrated Mission in Timor-Leste (UNMIT), which will have
    1,608 police and up to 35 military liaison officers. (Xinhua News Agency)
  - An Aer Lingus flight from New York is evacuated at Shannon Airport following information
    about explosives on board the flight. (RTÉ)
  - Zhao Yan, a Chinese researcher for the New York Times, is sentenced to three years
    for fraud in Beijing. However, he is found not guilty of leaking state secrets.
    (Channel News Asia)
  - The Trinity Cathedral of St. Petersburg catches fire. The main dome collapses.
    (BBC)
  - Danny Ferrer, owner of BuysUSA.com, is convicted of conspiracy and copyright infringement,
    sentenced to 6 years in prison, and ordered to pay more than US$4.1 million in
    damages to companies such as Adobe Systems, Autodesk, and Macromedia. (FOX News)
  2006 Israel-Lebanon conflict:
  - French President Jacques Chirac says sending 15,000 peacekeeping troops to southern
    Lebanon is "excessive". (BBC)
