Date: '2006-08-13'
Source_URI: Portal:Current events/2006 August 13
Intelligence_Payload:
  Iraq sectarian violence:
  - Three successive explosions in south Baghdad kill at least 62 people and injure
    more than 140. (Associated Press), (CBS News)
  2006 Israel-Lebanon conflict:
  - Israeli government endorses the UN Security Council resolution calling for an
    end to fighting in southern Lebanon. (BBC)
  - A Lebanese government meeting on the disarming of Hezbollah south of the Litani
    River is cancelled following an announcement by the Shi'ite organization that
    it was not willing to discuss the subject. (Haaretz)
  - Kofi Annan announces that a ceasefire will commence on August 14 at 8 a.m. Israeli-Lebanese
    time (0500 UTC). (Boston Globe)
  - Iran says disarming Lebanese Hezbollah would be "illogical". (Reuters)
  Yasukuni Shrine controversy:
  - Jiji Press reports that Japan Ground Self-Defense Force uniform officers examined
    enshrining troops in Yasukuni Shrine in the event of their death during their
    non-combat mission in Iraq. Critics accuse the examination of being against Japanese
    constitutional separation of state and religion. (Mainichi Daily News)
  - Japanese foreign minister Taro Aso suggests the Diet pass a law making the Yasukuni
    Shrine secular. (Asahi Shimbun)
  Uncategorized:
  - XVI International AIDS Conference, 2006 is convened in Toronto, Canada. (CBC),
    (BBC), (Wikinews)
