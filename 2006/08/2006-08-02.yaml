Intelligence_Payload:
  Uncategorized:
  - Mel Gibson is charged with misdemeanor drunken driving and related offences. (CNN)
  - North Country Colorectal in Port Jefferson, New York opens its doors to business.
  2006 Israel-Lebanon conflict:
  - Israeli Prime Minister Ehud Olmert has said that there will be no ceasefire in
    Lebanon until an international force is deployed in the south of the country.(BBC
    NEWS)
  - The supreme leader of Iran, Ayatollah Ali Khamenei, has urged the Muslim world
    to stand up to Israel and the US, criticising them for their role in the conflict
    in Lebanon.(BBC NEWS)
  - An Israeli civilian is killed and 16 wounded as more than 210 rockets are fired
    at northern Israel, the biggest daily number since the beginning of the conflict
    on 12 July. (Ynet), (Haaretz), (BBC NEWS)
  - A Syrian-made missile fired from Lebanon lands near the West Bank city of Jenin,
    causing minor damage. (Haaretz), (Ynet), (AHN)
  - A massive Israeli operation is completed near Baalbek. (Haaretz)
  - Israel plans to resume air strikes after a 48-hour partial suspension. (ABC News
    Australia)
