Date: '2006-08-04'
Source_URI: Portal:Current events/2006 August 4
Intelligence_Payload:
  Uncategorized:
  - The Domesday Book, the 920-year-old census record of England under William the
    Conqueror, goes online. Domesday Book, (Reuters)
  - Viktor Yanukovych became Prime minister of Ukraine.
  - Lord's Resistance Army second-in-command Vincent Otti declares an immediate, unilateral
    ceasefire in the rebel group's 20-year insurgency against the government of Uganda.(BBC)
  - Somalia's transitional government is on the verge of collapse after 38 ministers
    and assistant ministers quit in the past nine days in protest against the governments
    failure to make a deal with the Supreme Islamic Courts Council. (csmonitor)
  - Arizona police in the United States announce the arrests of two men who are accused
    of 35 attacks and murders. (azfamily)
  2006 Israel-Lebanon conflict:
  - Three Hezbollah rockets hit near the Israeli town of Hadera, south of the Lebanese
    border and the deepest penetration within Israel to date. (AP via CNews)
  - A senior Iranian official admits for the first time that Tehran did indeed supply
    long-range Zelzal-2 missiles to Hezbollah, capable of carrying a 600-kg warhead
    an estimated 210 km. (Haaretz)
  - 3 Israeli civilians are killed and at least 50 wounded as some 140 rockets hit
    Israeli towns, raising to 10 the number of Israeli Arab citizens killed in the
    ongoing conflict. (Ynet), (Haaretz),(MFA)
  - '2006 Qaa airstrike: An Israeli air strike near Lebanon''s north-eastern border
    with Syria has killed at least 23 people and injured 30, Lebanese officials have
    said.(BBC NEWS)'
  - Ayatollah Ahmad Jannati, who heads the Iranian Council of Guardians, said, "[S]upport
    for Hizbollah [is] a duty". (IRNA)
