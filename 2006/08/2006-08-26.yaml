Date: '2006-08-26'
Source_URI: Portal:Current events/2006 August 26
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - EU officials caution that the peacekeeping force in Lebanon will not disarm Hezbollah.
    Disarming Hezbollah is the responsibility of the Lebanese government and army.
    (NY Times)
  Uncategorized:
  - The Andover Inn Hotel in Liverpool was hit by a mystery fire in the early hours
    which led to 100 guests being evacuated. (Sunday Mirror)
  - Chad orders United States' ChevronTexaco and Malaysia's Petronas out of the country
    for failing to meet tax obligations. Chadian president, Idriss Déby, stated that
    Chad, whose new national oil company was to partner with an Exxon Mobil-ChevronTexaco-Petronas
    consortium, will continue to work with US' Exxon Mobil while attempting to "find
    a solution with the two other partners." (BBC)
  - Eyewitnesses claim that Israel bombed a Reuters armored car in Gaza City. Hospital
    staff say that two cameramen and three bystanders were injured. (Associated Press)
  - Pakistani security forces kill rebel chieftain Nawab Akbar Bugti in heavy fighting
    near the town of Dera Bugti in Baluchistan province. At least 25 commandos and
    30 insurgents were killed in the fighting. (News Limited)
  - NASA delays the launch of the Space Shuttle Atlantis (STS-115) for 24 hours. Lightning
    struck the space shuttle launch pad on Friday but no damage was caused. (Reuters)
  - Ugandan government and rebel group Lord's Resistance Army sign a truce, in efforts
    to end the 20-year conflict. (BBC News)
