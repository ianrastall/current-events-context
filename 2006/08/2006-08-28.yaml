Date: '2006-08-28'
Source_URI: Portal:Current events/2006 August 28
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - United Nations Secretary-General Kofi Annan tells the Lebanese government that
    he wants the two Israeli soldiers captured by Hezbollah to be handed to the Red
    Cross. (Haaretz)
  Uncategorized:
  - A DNA test of John Mark Karr does not match the DNA found on the body of JonBenét
    Ramsey, and prosecutors in the U.S. state of Colorado say they will not charge
    Karr with murder. (CNN)
  - Mexico's Federal Electoral Tribunal rules unanimously that results in contested
    polling stations only marginally affected the lead of Felipe Calderón of the ruling
    National Action Party over Andrés Manuel López Obrador in July's disputed presidential
    election. (The Australian)
  - The State Comptroller of Israel Micha Lindenstrauss releases a report stating
    that Ehud Olmert made political appointments of Likud Party members while serving
    as Industry & Trade Minister. (Israel National News)
  - Three bombs explode in the Turkish coastal town of Marmaris following an explosion
    in Istanbul shortly after midnight local time (2100 UTC Sunday). At least 22 people
    have been injured in the explosions. A further explosion occurred hours later
    in nearby Antalya, killing at least three people. (News Limited) (BBC)
  - Dozens are killed in an explosion at a disused pipeline near Diwaniya, Iraq, apparently
    while scavenging for petrol.(Reuters)
