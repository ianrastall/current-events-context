Date: '2006-08-19'
Source_URI: Portal:Current events/2006 August 19
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - Lebanese PM Fouad Siniora has accused Israel of a "naked violation" of the five-day-old
    ceasefire, after a raid by Israeli commandos deep inside Lebanon. (BBC) (CTV)
    (Reuters) (Aljazeera)
  - Reuters reports that Israeli aircraft have fired at targets in Eastern Lebanon
    reported to be a Hezbollah stronghold. An Israeli army spokesman said the army
    was checking the report. (Reuters)
  - Israel confirms that a commando unit was operating in Lebanon early this morning.
    One soldier is reported killed and two wounded, one of them seriously. (ABC America)
  Uncategorized:
  - Israeli forces detain Palestinian Deputy Prime Minister Nasser al-Shaer in a raid
    on his home in the West Bank town of Ramallah. (BBC)
  - A Turkish-Iranian natural gas pipeline explodes in Turkey's northeastern Ağrı
    Province. Turkish authorities suspect separatist Kurds were behind the incident.
    (Internet Archive) (AP Story, no longer on original CNN site)
  - The Chinese death toll from Typhoon Saomai rises to 436 with 100 new deaths reported
    in the east of the country. (ABC America)
