Date: '2006-08-23'
Source_URI: Portal:Current events/2006 August 23
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - Amnesty International accuses Israel of war crimes, saying it broke international
    law by deliberately destroying Lebanon's civilian infrastructure during its recent
    war with Hezbollah guerrillas. (Guardian),(BBC NEWS), (Al Jazeera)
  Uncategorized:
  - The United States says that Iran's proposal to the United Nations about its nuclear
    program "falls short of the conditions set by the Security Council." (CNN)
  - Northwest Airlines Flight 42 from Amsterdam to Mumbai (Bombay) was escorted by
    two Dutch Air Force F-16s back to Amsterdam after a request from the pilot. Twelve
    people have been detained. (CNN)
  - An ancient Persian water pipe system is discovered in Ramat Rachel, Israel. (Reuters)
  - The Holy Jihad Brigades releases a video showing kidnapped journalists Steve Centanni
    and Olaf Wiig in good health. No armed men were present. The HJB demands that
    the United States release "Muslim prisoners" within 72 hours. (AP) (AP) (BBC)
  - Austrian kidnap victim Natascha Kampusch, 18, is found alive and well after being
    held captive for eight years in the garage of a house near Vienna. (BBC)
  - The bodies of three men are recovered from the English Channel days after their
    yacht Ouzo disappears. Police and officers from the Marine Accident Investigation
    Branch investigate the possibility the Ouzo was sunk by a near-miss with a P&O
    ferry, the Pride of Bilbao. (BBC)
