Date: '2006-08-06'
Source_URI: Portal:Current events/2006 August 6
Intelligence_Payload:
  Uncategorized:
  - The Dechatu River in Ethiopia floods, killing over 200 people.(BBC) (Reuters)
  - Fifteen local employees of the French charity organisation Action Against Hunger
    are found dead in a town in northeastern Sri Lanka at the center of heavy fighting
    between Tamil rebels and government forces. Both sides have denied involvement
    in the killings. (BBC)
  - The Déby administration of Chad establishes official relations with the People's
    Republic of China. Chad had recognized the Republic of China (Taiwan) from 1997-2006.
    Chadian diplomats cited the prospects of greater financial investments and the
    PRC status in the United Nations Security Council as the principal factors motivating
    the diplomatic shift. (Bloomberg)
  - Tomo Križnar, the Slovenian diplomatic envoy and human-rights activist to Sudan,
    is formally charged with espionage and illegally entering Darfur. Križnar, who
    admits entering Darfur without the required visa, was arrested in July. (BBC)
  - Tajikistan President Emomali Rahmonov began a state visit to India. (IRNA)
  - About 800 South Korean Christians left Afghanistan after their planned "peace
    festival" was called off due to concerns that their presence could spark violence.
    (Yahoo News)
  2006 Israel-Lebanon conflict:
  - Lebanon rejects a draft U.N. resolution calling for an end to the conflict between
    Israel and Hizbollah, insisting it must include an explicit demand for a full
    Israeli pullout from south Lebanon.(The Hindu)
  - 'In an interview with the German magazine Welt am Sonntag, Israeli Prime Minister
    Ehud Olmert asks European nations, "Where do they get the right to preach to Israel?
    European countries attacked Kosovo and killed ten thousand civilians. Ten thousand!
    And none of these countries had to suffer before that from a single rocket. I''m
    not saying it was wrong to intervene in Kosovo. But please: Don''t preach to us
    about the treatment of civilians." (al Jazeera)'
  - Israeli troops attack the Lebanese town of Qana claiming to destroy the launchers
    that launched the missiles at Haifa. (USA Today)
  - At least six rockets hit Haifa, Israel; one more rocket hits right outside of
    Haifa, and others hit the Ma'alot, Carmiel area, and Kiryat Shmona. The death
    toll is at least three in Haifa and 12 for Northern Israel as a whole. (Ynet News),
    (AP)
  - Reuters has pulled a photograph of Beirut, Lebanon, admitting that it was altered
    by the photographer, Adnan Hajj, saying "photo editing software was improperly
    used on this image. A corrected version will immediately follow this advisory.
    We are sorry for any inconvenience." (Ynet News)(Reuters)
  - Hezbollah rockets kill at least ten people in Israel. (Associated Press)
  - Israel arrests the Speaker of the Palestinian Parliament, Abdel Aziz Duwaik. Duwaik
    is a member of Hamas. (ABC News)
