Date: '2006-08-15'
Source_URI: Portal:Current events/2006 August 15
Intelligence_Payload:
  Uncategorized:
  - Japanese Prime Minister Junichiro Koizumi visits the Yasukuni Shrine, drawing
    many protests from around the region. (San Francisco Chronicle).
  - Former U.S. President Gerald Ford is admitted to the Mayo Clinic in Minnesota.
    (Reuters)
  - The United Kingdom government is to seek Parliamentary approval to grant posthumous
    pardons for over 300 soldiers executed for cowardice during the First World War.
    The soldiers' families have long claimed that they were suffering from shell shock
    (posttraumatic stress disorder). (BBC)
  - NJ Transit says that service has been suspended between New York's Penn Station
    and Secaucus due to a suspicious item found on the tracks east of the Secaucus
    junction. (WABC New York)
  - The New Zealand Maori Queen, Te Arikinui Dame Te Atairangikaahu dies aged 75 at
    her official residence of Turangawaewae Marae Ngaruawahia, ending her 40 year
    reign, the longest of any Maori monarch within the Kingitanga movement and causing
    hundreds of thousands to flock to the Central North Island to attend her funeral.(NZ
    Herald)
  2006 Israel–Lebanon conflict:
  - Israel claims that Hezbollah fired 10 Katyusha rockets into Southern Lebanon with
    none reaching Israel. (Associated Press)
