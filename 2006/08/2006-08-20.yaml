Date: '2006-08-20'
Source_URI: Portal:Current events/2006 August 20
Intelligence_Payload:
  Uncategorized:
  - With nearly all votes counted, the presidential election in the Democratic Republic
    of Congo heads toward a run-off election after neither candidate wins a fifty
    percent majority. Full provisional results show Joseph Kabila with 44.81 percent
    of the vote, to Jean-Pierre Bemba's 20.03 percent. There have been reports of
    automatic gunfire, and MLC representatives accused Kabila's Republican Guard of
    killing one of its men and injuring three policemen. (Reuters) (SBS)
  - 'Taliban insurgency: More than 90 die in heavy fighting this weekend in Afghanistan.
    (AFP)'
  - The first named storm to form in the Central North Pacific basin since the 2002
    Pacific hurricane season, Tropical Storm Ioke, forms and threatens Johnston Island
    and the Johnston Atoll National Wildlife Refuge. (United States Central Pacific
    Hurricane Center)
  - Iran test fires the Saegheh missile, a short-range surface-to-surface missile
    with a range of between 80 and 250 kilometres in the desert near Kashan. It comes
    a day after the army commenced exercises. (AP via MSNBC) (AP via Yahoo! News)
  - Controversy arises at cricket's Fourth test between Pakistan and England at The
    Oval, London when umpires rule that ball-tampering has occurred and award the
    game to England. (BBC)
  2006 Israel-Lebanon conflict:
  - UN Secretary General Kofi Annan has expressed deep concern over Saturday's Israeli
    commando raid deep inside Lebanon, calling it a truce violation. (BBC) (Al Jazeera)
  - The Lebanese government vowed on Sunday to crush any attempt on the Lebanese side
    to breach the ceasefire.(Reuters)
