Date: '2006-08-07'
Source_URI: Portal:Current events/2006 August 7
Intelligence_Payload:
  Uncategorized:
  - Israeli-Palestinian conflict
  - Israeli troops have detained another Hamas member of Palestinian Parliament during
    an overnight raid in the West Bank. (BBC NEWS)
  - Oil price futures hit a record high for one blend of crude oil (Brent crude) after
    BP found corrosion damage to the Alaskan pipeline and cut production in Prudhoe
    Bay 50%. (Associated Press)(BBC)
  - Tens of thousands are evacuated from around the Mayon Volcano in the Bicol Region
    of the Philippines as local volcanologists anticipate an imminent eruption. (FoxNews.com)
  - AOL publicly releases 20 million unfiltered search keywords for 500,000 users,
    containing personally identifiable information about users' search habits. (TechCrunch)
  Iraq War:
  - A US military hearing has examined the testimony by one of the accused in an incident
    where an Iraqi girl and her three family members were allegedly killed by four
    U.S. soldiers. (BBC)
  2006 Israel-Lebanon conflict:
  - Reuters has withdrawn 920 photographs by a Lebanese photographer after a review
    of his work showed that he had changed two images from the 2006 Israel-Lebanon
    conflict. (Reuters), (YNet)
  - Lebanon's government meets today, to decide to send the Lebanese army to the southern
    end of the country, according to political sources. It decides unanimously to
    send 15,000 troops to the south of the country as Israeli troops pull out. (Reuters)
  - IDF planes have shot down a UAV suspected to be Hezbollah controlled as it flew
    over Israeli territory. (Reuters)
  - An Israeli air strike has killed 1 person in the southern Lebanese border village
    of Houla. Lebanon's prime minister has retracted his earlier statement that more
    than 40 were killed. (BBC)
