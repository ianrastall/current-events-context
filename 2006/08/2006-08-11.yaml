Date: '2006-08-11'
Source_URI: Portal:Current events/2006 August 11
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - The UN Security Council adopts a resolution, 15-0, calling for a ceasefire in
    the 2006 Israel-Lebanon conflict. (Reuters)
  - Ehud Olmert accepts the emerging Middle East peace deal after earlier threatening
    an expansion of the ground war in Lebanon. The agreement calls for the deployment
    of 30,000 Lebanese and U.N. troops along the Israel-Lebanon border. (Boston Herald)
  2006 transatlantic aircraft plot:
  - 40 people have been arrested throughout Italy, in Muslim communities "as part
    of an extraordinary operation that followed the British anti-terrorist operation."
    (Fox News)
  - The date the plot was to be carried out has been revealed to be August 16. (Daily
    Mail)
  Uncategorized:
  - Typhoon Saomai kills 111 people and leaves 4 missing in eastern China, according
    to the Chinese government. (BBC)
