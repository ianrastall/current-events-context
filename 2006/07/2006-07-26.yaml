Date: '2006-07-26'
Source_URI: Portal:Current events/2006 July 26
Intelligence_Payload:
  Israeli-Palestinian conflict (Operation Summer Rains):
  - At least nine people are killed in Israeli air raids in the east of Gaza City,
    including a three-year-old girl, according to medical sources. (BBC NEWS)
  Uncategorized:
  - Andrea Yates, a U.S. woman who killed her five children in 2001, is found not
    guilty of murder by reason of insanity. (CBS News)
  - The governments of Chad and Sudan sign an accord officially ending the Chadian-Sudanese
    conflict. The deal has many provisions similar to that of the Tripoli Accord,
    which Sudan has violated four times by aiding Janjaweed, UFDC, and anti-Bozizé
    rebels and genocidaires. (Syracuse.com)
  - Germany and 11 other nations, including Israel, sign a protocol to open the International
    Tracing Service in Bad Arolsen in the state of Hesse up to international researchers.
    It contains up to 50 million documents relating to 17.5 million individuals. (Bloomberg)
  - Fragments of a Psalter, a prayer book, are found in a bog in Ireland, where it
    has been for an estimated 1200 years. (Sydney Morning Herald)
  - United States National Park Service director Fran P. Mainella announces her resignation.
    (NPS.gov)
  - '2006 Kodori Gorge clashes: Georgian forces attack surrounded rebels after an
    ultimatum expires. (civil.ge)'
  2006 Israel-Lebanon conflict:
  - Four United Nations observers are killed in an Israeli air strike on an observation
    post in south Lebanon. An initial UN report says they contacted the Israeli troops
    10 times before an incoming bomb killed four of them. (BBC NEWS), (BBC NEWS)
  - UN Secretary-General Kofi Annan calls for an "immediate cessation of hostilities"
    in the Middle East. (Sky), (BBC NEWS)
  - The Battle of Bint Jbail intensifies. (Ynetnews)
  - Nine Israeli soldiers are killed as IDF forces attempt to gain control of a key
    hilltop in southern Lebanon. (AP), (BBC NEWS)
