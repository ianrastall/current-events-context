Date: '2006-07-01'
Source_URI: Portal:Current events/2006 July 1
Intelligence_Payload:
  Uncategorized:
  - Early elections in November are announced in the Netherlands. (Reuters)
  - Discovery Mission STS-121's launch has been delayed today due to thunderstorms.
    The next launch attempt is scheduled for 3:26 PM EDT tomorrow, although more bad
    weather is forecast.(NASA)(Associated Press)
  - Osama Bin Laden warns the US and other nations not to become involved in Somalia
    and says that Al Qaeda reserves the right to "punish" the U.S. on its own soil.
    (Reuters)
  - The United Nations Security Council votes unanimously to withdraw the 3,500 peacekeeping
    troops who are currently in Burundi on December 31, despite the continuing activities
    of the National Liberation Force rebel group. (Reuters)
  - At least 60 people die from a car bomb in a market in Sadr City, a Shiite district
    of Baghdad. (Turkish Press)
  - The Qingzang railway is formally opened in the by Chinese President Hu Jintao.
    (BBC)
  - A ceremony is held at Thiepval, Picardy, in France, to commemorate the 90th anniversary
    of the Battle of the Somme. (BBC)
  Operation Summer Rains:
  - An Israeli helicopter gunship attacks the office of Prime Minister of Palestine
    Ismail Haniyeh. Observers report that the building had been set on fire but was
    unoccupied. (Melbourne Age)
  - Israel rejects demand to free 1,000 prisoners, delivered earlier by the abductors
    of Cpl. Gilad Shalit. A Palestenian deputy minister says Shalit is in stable condition,
    but no sign of life is yet given. (Haaretz)
  - The Australian reports Israel threatens to assassinate Palestinian Prime Minister
    Ismail Haniyeh unless Israel's kidnapped soldier, Gilad Shalit, is released unharmed.
    No other news source confirms this report. (The Australian)
