Date: '2006-07-21'
Source_URI: Portal:Current events/2006 July 21
Intelligence_Payload:
  Uncategorized:
  - The Supreme Court of Japan rules that foreign governments are no longer immune
    from lawsuits filed in Japan. (Asahi Shimbun)
  - Khmer Rouge leader Ta Mok dies in a military hospital while waiting for his trial
    for crimes against humanity committed in Democratic Kampuchea. (BBC)
  - The Cassini spacecraft takes pictures of Saturn's moon Titan that appear to show
    the presence of hydrocarbon lakes. (NASA)
  - Charles Taylor, the former President of Liberia, appears in court in The Hague
    to face 11 charges of war crimes and crimes against humanity. (CNN)
  2006 Israel-Lebanon conflict:
  - Israel moves thousands of troops to the Lebanese border including reserves to
    deal with fierce fighting. (UPI)
  - Israel is continuing its Lebanon military offensive, with war planes bombing more
    than 40 targets, mainly in southern parts of Beirut, on Friday. (BBC NEWS)
  - United States Secretary of State Condoleezza Rice will outline a plan for a diplomatic
    solution to the crisis and will tour the area next week. (Boston Globe)
  - The UN-led call for a ceasefire is blocked by the US, UK and Israel. (The Star),
    (News24), (Reuters), (ABCnews), (The Independent).
  Iraq War:
  - Four U.S. soldiers accused of murdering suspected insurgents say that officers
    commanded them to "kill all military age males".(MSNBC)
