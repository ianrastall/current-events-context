Date: '2006-07-29'
Source_URI: Portal:Current events/2006 July 29
Intelligence_Payload:
  2006 Israel-Lebanon Conflict:
  - Israel rejects a UN call for a truce. (BBC)
  - The IDF leaves the Lebanese town of Bint Jbeil, thus ending the Battle of Bint
    Jbeil. 8 Israeli soldiers and 50-70 Hezbollah militants were killed in Bint Jbeil.
    (Haaretz),(Ynet)
  - Hezbollah head Hassan Nasrallah vows rocket strikes on towns in central Israel,
    calling it a "temporary country" and asking "When in any Arab-Israeli conflict
    were two million Israelis forced to flee or enter bomb shelters?" (Haaretz), (Ynet)
  - Hezbollah fired a rocket on Friday, which they claim to be a new long-range missile
    named "Khaibar 1". The rocket matched the furthest distance that Hezbollah rockets
    had landed inside Israel since the conflict began on July 12. (Reuters)
  Uncategorized:
  - An oil well explosion at the Pertamina-PetroChina oil refinery complex at Bojonegoro
    in East Java province of Indonesia leads to 150 people being treated at hospital
    and 6,000 people fleeing nearby villages. At this stage, there is no news of casualties.
    (Hindustan Times)
  - Somali Premier Ali Mohammed Ghedi alleges that Libya, Egypt, and Iran are supplying
    the Islamic Courts Union with weaponry. (AP v. Yahoo)
