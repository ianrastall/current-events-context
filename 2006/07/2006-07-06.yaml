Date: '2006-07-06'
Source_URI: Portal:Current events/2006 July 6
Intelligence_Payload:
  Uncategorized:
  - Addressing the death of Kenneth Lay, U.S. President George W. Bush states that
    he hopes Lay, one of the men convicted in the collapse of Enron, "was right with
    the Lord". (FoxNews.com)
  - The long-range missile launched during North Korea's Missile Test was aimed at
    a point in the ocean close to the U.S. state of Hawaii. (Reuters)
  - The Space Shuttle Discovery successfully docks with the International Space Station
    as part of the STS-121 mission. Checks of the orbiter have revealed no damage
    from foam falling off the external fuel tank during launch. (Spaceflight Now/CBS)
  - Great Britain's young people are for the first time spending more time looking
    at Internet sites than watching TV, a new survey has revealed. (Daily Mail)
  - In Mexico's presidential election, PRD candidate Andrés Manuel López Obrador says
    he will file a legal challenge against the results of the ongoing official vote
    count that have him loscing to the PAN's Felipe Calderón by 0.57 percentage points.
    (BBC News)
  - A United States Military AH-64 Apache helicopter made an emergency landing in
    South Korea. There was no injury or damage to the helicopter. (Associated Press)
  - The New York Court of Appeals rules in a 4-2 decision that gay marriage is not
    allowed under state law. (Newsday)
  - Taiwan plans to test a missile capable of hitting mainland China. This has alarmed
    the island's main ally, the United States. (Reuters)(Agence France-Presse)
  - South Korean media states that there are three or four short to medium range missiles
    on the launch pad in North Korea, ready for launch. North Korea has now threatened
    to do so.(Associated Press)(Associated Press)
  - The Nathula Pass between India and China, sealed during the Sino-Indian War in
    1962, reopens after 44 years. (Zee News), (BBC)
  - 'Sectarian violence in Iraq: A car bomb explodes outside a Shi''ite Muslim shrine
    near the holy city of Najaf in Iraq, killing at least seven people. (Reuters)'
  - An explosion, believed to be caused by a bomb, killed at least eight people in
    a minibus in the city of Tiraspol, in Transnistria, a breakaway region of Moldova.
    (BBC)
  Israeli-Palestinian conflict (Operation Summer Rains):
  - IDF raid three demolished Israeli settlements and one Palestinian neighbourhood
    in the northern Gaza Strip, to halt the daily firing of Qassam rockets at Israeli
    towns. One Israeli soldier, more than 20 Palestenian militants and one civilian
    are killed. (Haaretz),(Ynet)
  - 10 Qassam rockets are launched at Israeli towns from the northern Gaza Strip,
    inflicting damage but no casualties. (Ynet)
  - Palestinian abductors relax their demands for release of the kidnapped Israeli
    soldier Cpl. Gilad Shalit. (Jerusalem Post)
