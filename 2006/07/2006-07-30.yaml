Date: '2006-07-30'
Source_URI: Portal:Current events/2006 July 30
Intelligence_Payload:
  2006 Israel-Lebanon crisis:
  - Israel "halts" air strikes for forty-eight hours, after an airstrike killed sixty
    civilians in Qana, Lebanon. (CTV NEWS)
  - The UN Security Council is to hold an emergency meeting on the Middle East crisis
    after the deaths of more than 54 Lebanese civilians in an Israeli raid. (BBC)
  - More than 54 civilians, at least 37 of them children, are killed in the Lebanese
    town of Qana. (CNN), (BBC)
  - Ehud Olmert states that "Israel is not in a hurry to have a cease-fire" before
    it achieves its goals. (The Independent)
  - 146 Rockets hit Israel, at least three in Haifa, wounding six people. (Reuters)
  Uncategorized:
  - The United Nations compound in Gaza City is stormed and ransacked by Palestinians
    protesting the 2006 Israel-Lebanon crisis. Members of the Islamic Jihad militant
    group threw stones and fired assault rifles. Eight vehicles were damaged and five
    people were wounded. (Washington Post)
