Date: '2006-07-28'
Source_URI: Portal:Current events/2006 July 28
Intelligence_Payload:
  Uncategorized:
  - Six people are shot, one fatally, at the Jewish Federation of Greater Seattle
    in the U.S. state of Washington in a religiously-motivated killing spree. The
    killer identified himself as a Muslim American who was angry over the 2006 Israel-Lebanon
    conflict. (Associated Press)
  - A U.S. jury convicts four members of the Aryan Brotherhood on charges of murder,
    racketeering and conspiracy in a federal case aiming to dismantle the white-supremacist
    group. (Minneapolis Star Tribune)
  - A U.S. federal appeals court upholds the conviction and 25 year sentence of former
    WorldCom CEO Bernard Ebbers for fraud. (USA Today)
  - Coroners in the U.S. state of California estimate the death toll from the current
    heat wave at at least 123.
  - An explosion at a fluorine plant in China's Jiangsu Province kills 12 people and
    leads to the evacuation of 7,000 people. (Deutsche Presse-Agentur)
  - '2006 Kodori crisis: both Georgia and Abkhazia threaten war over the dispute.
    (civil.ge)'
  - The United States should immediately close all secret detention facilities used
    in its campaign against terror groups, the UN Human Rights Committee has said.
    (BBC NEWS)
  - The first World Outgames are held in Montreal, Canada. Outgames co-president and
    Canadian Olympian, Mark Tewksbury, states that the event will "bridge the gap
    between the gay sport movement and the traditional sport movement."(CTV NEWS)
  Iran's nuclear program:
  - The UN Security Council approves a resolution to give Iran until the end of August
    to suspend uranium enrichment or face the threat of sanctions. (Reuters)
  2006 Israel-Lebanon Conflict:
  - The EU President and US State Department react to Israeli Justice Minister Haim
    Ramon's claim that the deadlocked Rome conference was a sign that the world supported
    Israeli attacks in Lebanon. The EU described the claim as "totally wrong" and
    the US declared the statement "outrageous". (BBC News) (EUobserver).
  - Hezbollah leader Hassan Nasrallah is reported to have taken refuge in the Iranian
    Embassy in Beirut. (Washington-Times)
  - The White House has dismissed UK concerns about the use of Prestwick Airport,
    in Scotland, by US planes carrying bombs to Israel.(BBC NEWS)
  - Tony Blair arrived in Washington, D.C. for talks with President George W. Bush
    on the crisis in the Middle East. Both leaders agree that a multinational force
    must be sent to Lebanon soon, and that a UN Security Council resolution must be
    introduced next week.(CTV NEWS)
  - The UN removes its unarmed observers from posts along the Israeli-Lebanese border
    three days after four of them were killed by an Israeli bomb.(CTV NEWS)
  - 15 Hezbollah militants are killed while fighting in Bint Jbeil.(YNET NEWS)
  Israeli-Palestinian conflict (Operation Summer Rains):
  - The mutilated body of Dr. Danny Yaakovi, an Israeli physician, is found in the
    West Bank.(YNET NEWS)
