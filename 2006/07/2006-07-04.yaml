Date: '2006-07-04'
Source_URI: Portal:Current events/2006 July 4
Intelligence_Payload:
  Uncategorized:
  - UFDC rebels attack the Chadian city of Ade and battle the Military of Chad. Both
    the UFDC and the Déby administration claim to have control over the city, stating
    that opposing forces have fled. (CNN) United Nations Secretary General Kofi Annan
    issues a report warning that ongoing fighting in Chad, Sudan, the Central African
    Republic, and Cameroon are increasingly destabilized and that borders are loosely
    enforced. (allAfrica.com)
  - North Korea test-launches at least six missiles which landed in the Sea of Japan.
    An official from the United States Department of State claims that one of the
    missiles was a long-range Taepodong 2 missile which failed 35 seconds after takeoff.(CNN),
    (Mainichi Shimbun)
  - A Qassam rocket hits a High school at Ashkelon, an Israeli city with a population
    exceeding 117,000. The rocket was launched by Hamas militants from the town of
    Beit Hanun in the northern Gaza strip. (Haaretz)
  - The Space Shuttle Discovery takes off from Cape Canaveral for the International
    Space Station at 2:38pm EDT (1838 UTC) after its liftoff had been postponed twice.
    (CNN)
  - A bomb scare in the arrivals area of Dublin Airport results in a complete closure
    of the main building. The man who is responsible for the scare has been arrested;
    he claims to be a member of al-Qaeda. Approximately 9,000 passengers and 50 flights
    were affected during the two-hour disruption. (Wikinews)
  - The International Federation of Phonogram and Videogram Producers sues Yahoo!
    China for providing links to pirated music tracks. (BBC)
  - A streaker interrupts a Wimbledon quarter-final match between Maria Sharapova
    and Elena Dementieva by running onto centre court during the second set. (Mail
    Online)
