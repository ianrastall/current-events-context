Date: '2006-07-20'
Source_URI: Portal:Current events/2006 July 20
Intelligence_Payload:
  2006 Israel-Lebanon conflict:
  - Hostilities between Israel and Hezbollah militants in Lebanon must stop immediately,
    UN Secretary General Kofi Annan has said.(BBC NEWS)
  - Two Israeli Apache helicopters collide, leaving five injured. A pilot has reportedly
    died. (National Nine News)
  Uncategorized:
  - Iran states that it is determined to produce nuclear fuel on its territory. It
    will respond officially to a Western incentive package on August 22, 2006. (Reuters)
  - 'Internet censorship: In India, public outcry at the recent blocking of some blogs
    results in a statement by that country''s government that the occurrence was a
    "technological error," and that immediate steps will be taken to resolve the issue.
    (IHT)'
  - A column of Ethiopian Army vehicles invades Somalia, reaching the town of Baidoa.
    They have stated that they are willing to defend Somalia's Transitional Federal
    Parliament from the Islamic Courts Union. (BBC)
  - The U.S. grand jury investigating baseball player Barry Bonds for possible perjury
    and tax evasion charges is set to expire today. It was extended and Bonds was
    not indicted. Greg Anderson, Bonds' trainer, was released from a federal prison
    in Dublin, California, after having been jailed for refusing to give evidence.
    (ESPN.com), (Forbes) (NBC)
  - The opposition Cook Islands Party wins a byelection in Matavera, leaving the Government
    without a majority. Prime Minister Jim Marurai is not conceding defeat. (Radio
    NZ)
