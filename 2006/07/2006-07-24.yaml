Date: '2006-07-24'
Source_URI: Portal:Current events/2006 July 24
Intelligence_Payload:
  Uncategorized:
  - The United States Coast Guard and Alaska Air National Guard rescue twenty-three
    crew members from a capsized cargo ship south of the Aleutian Islands, on its
    way from Japan to Vancouver. (CBC)
  - Talks among key World Trade Organization (WTO) member countries to liberalise
    global trade (known as the Doha round) collapse after nearly five years of negotiations.
    (The Herald)
  - Chadian President Idriss Déby fires Livestock Minister Mahamat Allamine Bourma
    Treye and Decentralization Minister Mahamat Abdoulaye, who served as the Livestock
    Minister in Déby's second term, accusing them of embezzling 277 million CFA Francs.
    (Yahoo!)
  2006 Israel-Lebanon conflict:
  - Hezbollah leader Hassan Nasrallah announces in an interview with Al-Jazeera that
    he discussed the abduction of the two Israeli soldiers with Lebanese political
    leaders before the attack occurred. (Memri)
  - Iran's President, Mahmoud Ahmadinejad, warns Israel over its actions in Lebanon.
    (BBC)
  - Human Rights Watch say that Israel have used artillery-fired cluster munitions
    against populated areas of Lebanon.(HRW)
  - A Lebanese family ordered to flee by Israel was targeted by Israeli fire because
    they were driving minivan, killing three and injuring 16. (The Guardian), (LA
    Times)
  Iraq War:
  - Saddam Hussein, 69, the deposed former Iraqi President, has been force-fed in
    a Baghdad hospital through a tube after 16 days of hunger strike. (Reuters), (BBC)
  - Two powerful bombs in Baghdad's Sadr City neighborhood kill at least 66. (Washington
    Post)
