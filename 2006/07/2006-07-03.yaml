Date: '2006-07-03'
Source_URI: Portal:Current events/2006 July 3
Intelligence_Payload:
  Uncategorized:
  - The Space Shuttle Discovery's launch on STS-121 is thrown in doubt when a 3 inch
    crack is found in the foam insulation of its external tank. Despite the crack,
    NASA decides to proceed with the launch, scheduled for 2:38 PM ET Tuesday, which
    would be the first manned launch on the United States Independence Day. (Spaceflight
    Now/CBS News) (MSNBC) (Reuters)
  - North Korean leaders say that they will respond to any pre-emptive attack from
    the US with an "annihilating strike and a nuclear war." (Associated Press)
  - Greece is suspended from international football competition by FIFA due to Greek
    government interference in the sport. (FIFA.com) (BBC)
  - At least 41 people die during a lunchtime subway accident in Valencia, Spain when
    two cars of a train derail and overturn. Early reports indicate the train was
    travelling too fast. (CNN), (BBC)
  - The government of Tajikistan renamed the second and the fourth highest peaks of
    the Pamir Mountains into the Independence Peak and Avicenna Peak, respectively.
    (Interfax)
  Israeli-Palestinian conflict (Operation Summer Rains):
  - Israel rejects ultimatum to release all Palestinian female prisoners, prisoners
    under 18, and an additional 1,000 prisoners by 6 A.M. Tuesday, in exchange for
    information on its kidnapped soldier Gilad Shalit. Defense Minister of Israel
    Amir Peretz calls Syrian President Bashar Assad to "open his eyes, because he
    is responsible". (Haaretz)
  - Israel Defense Forces troops kill two Palestinian militants in the northern Gaza
    Strip, on their way to attack Israeli armoured vehicles. (Haaretz)
  - Russian foreign minister Sergey Lavrov calls for the immediate unconditional release
    of kidnapped soldier Gilad Shalit. (Ynet)
