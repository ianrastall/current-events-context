Date: '2006-07-09'
Source_URI: Portal:Current events/2006 July 9
Intelligence_Payload:
  Uncategorized:
  - 25 people are injured on the Son of Beast wooden roller coaster near Cincinnati,
    Ohio, United States, as it came to a rapid stop. Several rescue units were sent
    to the scene. (WCPO-TV), (Associated Press)
  - '2006 FIFA World Cup: Italy defeats France in the final game of the FIFA World
    Cup. The score remained 1-1 after both regulation time and extra time; however,
    Italy won 5-3 in penalty kicks. The match is marred by the dismissal of Zinedine
    Zidane in the second period of Extra Time. (ABC News Australia)'
  - 'Sectarian violence in Iraq: 40 Sunni civilians are massacred by Shia militiamen
    in Baghdad. (BBC)'
  - Hindu nationalists riot in and around the Indian city of Mumbai (Bombay), attacking
    a police station, burning buses, forcing businesses shut and halting public transport.
    (News.com.au)
  - The Indian government bans export of pulses due to domestic shortages. This has
    led to price hikes for pulses in Bangladesh and other countries. (New Kerala)
  - A S7 Airlines Airbus A310 crashes on landing in Irkutsk, Siberia, with 125 of
    its 203 occupants killed. (ABC News America), (CNN), (BBC)
  - Nestlé is added to the Arab League list of companies to be boycotted "because
    it maintains a branch in Israel". An anonymous source says most League members
    are likely to ignore the decision. (Ynet)
  Israeli-Palestinian conflict (Operation Summer Rains):
  - 'Israeli prime minister Ehud Olmert says Operation Summer Rains will only end
    once abducted soldier Gilad Shalit is released: "There is no intention to reoccupy
    Gaza in order to stay there, but if certain operations are needed they will be
    carried out". (Reuters) , (BBC)'
  - 300 members of the British activist group 'Jews for Justice for Palestinians'
    sign a petition condemning Israeli military actions in the Gaza Strip. (BBC)
  - An Israeli civilian is moderately wounded as a Qassam rocket strikes his private
    car in Sderot. Another rocket directly hits a house in Sderot, causing severe
    damage but no casualties. More than twenty rockets were launched against Israeli
    towns over the weekend by Palestenian militants, wounding several civilians. (Haaretz),
    (Getty)
  - UN Secretary-General Kofi Annan demands that Israel take urgent action to prevent
    a humanitarian disaster in the Gaza Strip. (BBC)
