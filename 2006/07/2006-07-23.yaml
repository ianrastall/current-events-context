Date: '2006-07-23'
Source_URI: Portal:Current events/2006 July 23
Intelligence_Payload:
  Uncategorized:
  - Human Rights Watch releases a report stating that torture of Iraqi detainees was
    authorized by the US government; soldiers' complaints were ignored. (Human Rights
    Watch)
  - Miss Puerto Rico, Zuleyka Rivera Mendoza, is crowned Miss Universe 2006 in Los
    Angeles, California. Forty minutes after her crowning, she collapses during a
    post-pageant news conference. (ABC News, CNN)
  - Tiger Woods wins the The Open Championship commonly known as the British Open,
    finishing two shots ahead of Chris DiMarco. (ABC News America)
  - Ariel Sharon's condition worsens. (BBC)
  - American Floyd Landis wins the 2006 Tour de France. (Bloomberg)
  - An earthquake of 6.1 magnitude off the coast of Gorontalo province on the Indonesian
    island of Sulawesi prompts warnings of a possible tsunami. (Jakarta Post)
  - A suicide bomb explosion kills at least 26 people in a busy market in Sadr City,
    a predominantly Shi'a district of Baghdad. (AFP)
  2006 Israel-Lebanon conflict:
  - The UN's Jan Egeland has condemned the devastation caused by Israeli air strikes
    in Beirut, saying it is a violation of humanitarian law.(BBC NEWS)
  - Two Israeli civilians are killed by Hezbollah rocket attacks on Haifa. More than
    2200 rockets have been fired at Israeli cities since the beginning of the conflict,
    killing 17 Israelis, all of them civilians. 20 Israeli soldiers were killed in
    other incidents. About 300 Lebanese, most of them civilians, have been killed
    by Israeli forces. (Ynet), (Haaretz), (People's Daily Online)
  - Israel and the United States governments say they would accept NATO forces deployed
    along the Lebanese/Israeli border.(Gulfnews), (Reuters)
  - There is a PR battle raging about the publication of a series of photos showing
    Israeli children writing messages on shells meant for targets in Lebanon.(The
    Jerusalem Post)
