Date: '2006-07-22'
Source_URI: Portal:Current events/2006 July 22
Intelligence_Payload:
  Uncategorized:
  - A group of Colombian farmers has won a multimillion pound settlement from BP after
    the British oil and gas company was accused of benefiting from a regime of terror
    carried out by Colombian government paramilitaries to protect a 450-mile pipeline.(Independent)
  - An earthquake measuring 5.1-5.2 in magnitude hits a mountainous region of Yunnan
    Province in south China killing at least 18-19 people and injuring at least 60
    more. (CBS)
  2006 Israel-Lebanon conflict:
  - The European Union sends experts to Cyprus to help coordinate provision of emergency
    humanitarian aid to Lebanon. (Reuters)
  - Israel has carried out air strikes and small-scale incursions into Lebanon, as
    troops and tanks gather on the border.(BBC NEWS)
  - Thousands of people across the UK demonstrate against Israeli attacks on Lebanon.
    (BBC News)
  - Israel has massed soldiers and tanks on the border with Lebanon and called up
    thousands of reserve troops, in a possible prelude to a ground offensive. (BBC
    News)
  - The New York Times reports that the United States is speeding up a delivery of
    precision-guided bombs to Israel. Israel apparently requested the weapons to use
    against targets in Lebanon. (New York Times)(BBC NEWS)
