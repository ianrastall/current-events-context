Date: '2006-07-16'
Source_URI: Portal:Current events/2006 July 16
Intelligence_Payload:
  Uncategorized:
  - It is reported that Tropical Storm Bilis killed at least 115 people when it hit
    southeastern China on Friday. (CNN)
  - An Iraqi general claims that a suicide bombing in a Shiite cafe in northern Iraq
    has killed 25 people. (Newsday)
  2006 Israel-Lebanon crisis:
  - 25 Lebanese are killed in Israeli Air Force strikes in southern Lebanon. (BBC),
    (Ynet), Al-Jazeera, (Haaretz)
  - Hezbollah rockets hit the major Israeli city of Haifa, killing 8 civilians and
    wounding 17. More than a hundred rockets were fired against numerous urban areas
    in the north of Israel, as far south as Afula, killing 8 civilians and wounding
    53. Local train lines and universities closed down. (Haaretz), (BBC), (Al-Jazeera),
    (CBS), (Jerusalem post)
  - Israel increases the alert level in Tel Aviv in preparation to further attacks.
    (Haaretz), (Reuters)
  - Lebanon security officials claim that an Israeli air strike on Tyre kills at least
    16 people and wounds 42. (AP), (BBC)
  - Since Wednesday morning, Hezbollah militants fired more than 1400 rockets and
    mortar shells against Israeli towns, killing 12 civilians and wounding more than
    500. More than 130 Lebanese have been killed and hundreds were injured, including
    many civilians and an undisclosed number of Hezbollah militants. (Ynet), (Al-Jazeera)
  Israeli-Palestinian conflict (Operation Summer Rains):
  - Hamas militants launch ten Qassam rockets against Sderot and Ashkelon, causing
    damage in residential areas but no casualties. Israel Air Force strikes kill five
    militants and one civilian in the Gaza Strip. (Ynet),(Haaretz)
