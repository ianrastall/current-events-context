Date: '2006-07-08'
Source_URI: Portal:Current events/2006 July 8
Intelligence_Payload:
  Uncategorized:
  - USS Mustin, which has surface-to-air and Tomahawk cruise missiles is deployed
    to a Japanese port. This is regularly scheduled and not in response to North Korea's
    missile test. (Associated Press)
  - The first confirrmed flight of a manned ornithopter operating under its own power
    is made in Toronto, Canada by aerospace scientists. (Toronto Star)
  - US diplomat Christopher R. Hill indicates US support for the informal resumption
    of six party talks aimed at resolving the North Korean nuclear crisis. (Sydney
    Morning Herald)
  - Shoichi Nakagawa, Japanese agriculture minister, announces Japan will no longer
    provide food aid to North Korea, and that Japan is considering restricting agricultural
    trade between the two countries. Earlier Japan banned a North Korean ferry from
    entering Japanese ports. (Mainichi Daily News)
  - Seven terror suspects escape from a Saudi Arabian prison. (BBC)
  Israeli-Palestinian conflict (Operation Summer Rains):
  - Israel rejects Hamas terms for a ceasefire - Palestinian PM Ismail Haniya calls
    for a ceasefire to end several days of fierce fighting in the Gaza Strip. Israel
    reiterates its demand to release the abducted soldier Gilad Shalit, and end Qassam
    rocket attacks on Israeli towns, for an immediate cease fire to take place. (BBC),
    (Haaretz)
  - Israeli forces withdraw from the northern Gaza Strip after an intensive two-day
    operation aimed at creating a buffer zone to stop Hamas militants from firing
    rockets at Israel. Israeli armoured company enters the Gaza Strip via Karni crossing,
    advancing to within 500 meters of Gaza City, reportedly in search for tunnels
    used by Palestinian militants. Israeli Air Force carries out numerous strikes
    against militants in the Gaza Strip. (BBC), (Haaretz), (Reuters)
  - EU warns Israel of using "disproportionate" force during its operations in the
    Gaza Strip. Meanwhile, a Palestinian minister in the Hamas-led government urges
    all armed forces to fight Israeli troops. (BBC), (Ynet)
  - Three Palestinian family members (mother and two children) are killed in a blast
    in Gaza City. Palestinian sources claim an Israeli tank shell caused the blast,
    but the Israel Defense Forces states it carried out no tank or artillery fire
    at the area. Israeli Air Force investigation concludes its air strikes were not
    to blame for the blast. Numerous improvised explosive devices were planted in
    Gaza in the past week, in preparation for an Israeli incursion. (Ynet)
