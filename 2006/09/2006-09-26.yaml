Date: '2006-09-26'
Source_URI: Portal:Current events/2006 September 26
Intelligence_Payload:
  Uncategorized:
  - Riots break in Dhaka, Bangladesh, due to frequent power outages. Hundreds are
    injured in confrontations with riot police .(AP)
  - UK Prime Minister Tony Blair makes his final speech at a Labour Party Conference.
    (Sydney Morning Herald)
  - In the United States, a jury rules in favor of the pharmaceutical corporation
    Merck & Co. Inc. in a court case related to the painkiller Vioxx. The jury rejects
    claims that Vioxx caused the plaintiff's heart attack. (AP via Sharewatch)
  - The Bush administration releases excerpts of a report stating that the Iraq War
    has bred deep resentment in the Islamic world and provided Islamist militants
    with a "cause célèbre" that allowed the global movement to cultivate supporters.
    (Reuters Alertnet)
  - Zambian archbishop Emmanuel Milingo is excommunicated from the Roman Catholic
    Church by Pope Benedict XVI. (BBC)
  - Former WorldCom chief Bernard Ebbers reports to a federal prison in the U.S. state
    of Louisiana to begin a 25-year prison term. (AP via Kiplinger Forecasts)
  - At least 18 people are killed in an explosion outside a government office in Lashkar
    Gah in southern Afghanistan. (BBC)
  - The Diet of Japan confirms Shinzo Abe as the Prime Minister of Japan. At 52, he
    is the youngest Prime Minister since World War II. (Reuters via Tiscali)
  - The European Commission confirms that Bulgaria and Romania are set to join the
    European Union on 1 January 2007, in what may be the last EU expansion before
    a European constitution is established. (BBC)
  - '"Weird Al" Yankovic releases Straight Outta Lynwood in the USA.'
