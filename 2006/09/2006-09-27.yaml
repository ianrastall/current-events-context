Date: '2006-09-27'
Source_URI: Portal:Current events/2006 September 27
Intelligence_Payload:
  Uncategorized:
  - A hostage situation at Platte Canyon High School near Bailey, Colorado, United
    States ends with the death of the gunman. A wounded female student later died.(CNN)
    (KCNC/AP)
  - The U.S. Republican Party selects Minneapolis–St. Paul as the venue for its 2008
    convention. (Los Angeles Times)
  - Legislation passes in the U.S. House and Senate giving President Bush authority
    to detain, interrogate and try terrorism detainees before military commissions.
    (San Francisco Examiner)
  - A funeral service for Empress Maria Fyodorovna of Russia is held at the Gothic
    Chapel at Peterhof. (Interfax)
  - U.S. Democrats urge the Bush administration to release in full a report linking
    the Iraq conflict and global terrorism. (BBC)
  Israeli–Palestinian conflict:
  - An Israeli court sentences Asher Weisgan to four consecutive life sentences plus
    an additional 12 years in prison for murdering four Palestinian workmen and wounding
    a fifth in August 2005. Weisgan must also pay more than 1,000,000 shekels ($US
    235,000) in compensation to the victims' families. (Haaretz)
  - Israel Defense Forces raid several Palestinian towns, arresting eight people in
    Jenin, seven people in Hebron, three people in Nablus, and twenty people in Khan
    Yunis. (IMEMC), , , .
  - An Israeli military court has ordered the release of the Palestinian Deputy Prime
    Minister, Nasser Ed-Deen Al Sha'er, who had been captured by the Israel Defense
    Forces on 19 August, as there was not "enough evidence". Al Sha’er will not be
    allowed to enter Ramallah, where the Palestinian Government offices are located,
    and will not be allowed to leave the Palestinian territories until October 15.
    Another 23 Palestinian legislators had their remand extended. (BBC) (IMEMC)
