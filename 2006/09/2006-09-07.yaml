Date: '2006-09-07'
Source_URI: Portal:Current events/2006 September 7
Intelligence_Payload:
  Uncategorized:
  - The National Liberation Forces (FNL) signs a ceasefire with Burundi, the last
    rebel group to enter the peace process to end the Burundi Civil War.(BBC)
  - Ralph "Bucky" Phillips is the most recent addition to the FBI Ten Most Wanted
    Fugitives list following his jail break and suspected shooting of New York State
    troopers. (FBI)
  - Ukrainian archaeologists claim they have found underground pyramids near Luhansk
    that predate the pyramids at Giza. BBC news's Helen Fawkes calls the complex the
    "Ukrainian Stonehenge." (BBC)
  - 'Belgian False Flag Terror arrests: Police in Belgium make arrests at army barracks
    and soldiers'' homes as part of an investigation into suspected far-right terrorists
    (Bloed-Bodem-Eer en Trouw) operating inside the military. The soldiers were reportedly
    planning attacks aimed at destabilizing the country. (BBC)'
  - The U.S. military prohibits cruel, inhumane or degrading treatment for "unlawful
    combatants" in a sweeping revision of DoD Directive 2310. (Wash. Post) (Wash.
    Times)
  - 2006 Israel-Lebanon conflict
  - Israel says it will lift its air and sea blockade of Lebanon. (BBC)
  - Tony Blair announces that he will step down as Prime Minister of the United Kingdom
    within 12 months but declines to give an exact date for his departure. (BBC)
