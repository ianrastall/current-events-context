Date: '2006-09-24'
Source_URI: Portal:Current events/2006 September 24
Intelligence_Payload:
  Uncategorized:
  - Venezuela's Foreign Minister Nicolás Maduro is detained in John F. Kennedy International
    Airport for secondary screening. (BBC)
  - At least 47 people, including a number of children, are killed in a bus crash
    near Quito, capital of Ecuador. (CNN)
  - The New York Times leaks a conclusion from a U.S. National Intelligence Estimate
    that the Iraq War has made the overall terrorism problem worse. (The New York
    Times) (BBC)
  - Members of Basque separatist movement ETA vow not to surrender their weapons while
    still seeking independence from Spain, despite the organisation having called
    a ceasefire six months ago. (BBC) (Reuters)
  - Europe retains golf's Ryder Cup to score a third consecutive win, beating the
    United States by a score of 18.5 to 9.5. (Washington Post)
