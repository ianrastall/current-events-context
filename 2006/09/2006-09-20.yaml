Date: '2006-09-20'
Source_URI: Portal:Current events/2006 September 20
Intelligence_Payload:
  Singapore 2006:
  - The 61st International Monetary Fund-World Bank annual meeting ends with an agreement
    on the need to revive stalled global trade talks, and to curb risks to global
    economic growth. (BusinessWeek)
  - The Singapore 2006 organizing committee thanks Singaporeans and corporations for
    helping to make what delegates called the "best and most memorable IMF/World Bank
    meeting they've had" a success. Mrs. Lim Hwee Hua, Minister in Charge of Singapore
    2006, also clarified some pointers over the about-turn in the handling of 27 Civil
    Society Organisation representatives whom the Singaporean authorities originally
    objected to being allowed entry into the country. (CNA)
  Uncategorized:
  - In Kazakhstan, 41 miners die in the nation's worst mining accident after a methane
    explosion in a coal mine. (Reuters)
  - Former South African Deputy President Jacob Zuma's corruption trial is thrown
    out by the judge at Pietermaritzburg High Court, who rules that the State's case
    goes "from one disaster to another" and failed to follow proper procedure. This
    is thought likely to improve Zuma's chances of succeeding President Thabo Mbeki,
    but prosecutors have said that they will refile charges later. (Mail & Guardian
    Online)
  - Dozens are killed and hundreds missing in India and Bangladesh after heavy rainstorms
    in the Bay of Bengal. (BBC)
  - The United States Federal Reserve decides to leave its benchmark interest rate
    unchanged at 5.25% for a second successive month. Chairman Ben Bernanke and his
    colleagues believe a slowing economy and falling energy prices are starting to
    relieve inflation pressures. (USA Today)
  - Shinzo Abe is elected as party leader of the Liberal Democratic Party in Japan,
    replacing the current Prime Minister Junichiro Koizumi. He will likely be elected
    as the new prime minister on 30 September 2006. (Bloomberg)
  - A public memorial service is held at Australia Zoo in Beerwah, Queensland, Australia,
    for "The Crocodile Hunter" Steve Irwin. (ABC Australia)
  - The Football Association is to investigate allegations of corruption and the taking
    of illegal payments (known colloquially as 'bungs') within the sport. (Sky Sports)
  - After a Globe and Mail article from journalist Jan Wong created controversy and
    accusations of racism against Quebec, the Canadian House of Commons unanimously
    passes a motion requesting an apology from The Globe and Mail. (CBC)
  - Venezuelan President Hugo Chávez, addressing the United Nations 61st General Assembly,
    said 'Yesterday the devil was here, and today it still smells of sulfur at this
    podium,' in reference to US President George W. Bush.
  Thailand coup d'état:
  - The leader of the military coup in Thailand, General Sonthi Boonyaratglin, declares
    that a new civilian prime minister will be appointed in two weeks to replace the
    deposed Thaksin Shinawatra. (BBC)
  2006 protests in Hungary:
  - A second night of violence in the capital Budapest leaves nearly 60 people injured
    and leads to 100 arrests as police clash with demonstrators seeking the resignation
    of Prime Minister Ferenc Gyurcsány. (Reuters)
