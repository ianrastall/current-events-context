Date: '2006-09-22'
Source_URI: Portal:Current events/2006 September 22
Intelligence_Payload:
  Uncategorized:
  - The U.S. military officially retires the F-14 Tomcat, famous from the movie Top
    Gun. (AP)
  - Patricia Dunn announces her resignation as Hewlett-Packard's chairman and board
    member, following a pretexting scandal. Mark Hurd has replaced Dunn as chairman
    of the company, effective immediately. (WSJ)
  - Israeli Prime Minister Ehud Olmert ranks fifth (7% support) in an Israeli poll
    of potential prime ministers. (JTA)
  - Thousands riot in Central Sulawesi, Indonesia, following the execution of three
    Christian militants found guilty of taking part in an attack on a Muslim boarding
    school. (Reuters)
  - Richard Hammond is released from intensive care and is walking and talking after
    a car crash whilst filming for the BBC show, Top Gear. (News Limited/Reuters)
  - A prototype Transrapid Maglev train crashes into a maintenance vehicle on elevated
    track in Emsland, Germany, killing 23 people and severely injuring 10. (Washington
    Post/Reuters) (BBC) (Deutsche Welle)
  - The reported number of people fallen ill after eating tainted spinach reaches
    166 in 25 U.S. states. (CDC)
  - Murder of Cassie Jo Stoddart by classmates Brian Draper and Torey Adamcik in Pocatello,
    Idaho.
