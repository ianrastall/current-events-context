Date: '2006-09-13'
Source_URI: Portal:Current events/2006 September 13
Intelligence_Payload:
  Uncategorized:
  - The Solar System's largest dwarf planet, designated until now as , is officially
    named "Eris"; its satellite is now known as "Dysnomia".(SpaceRef)
  - Andrei Kozlov, deputy chairman of Russia's Central Bank, dies hours after being
    shot. (International Herald Tribune)
  - Dawson College in Montreal is the scene of a shooting, with preliminary reports
    indicating at least two killed (one being the gunman) and 20 injured. (CBC)
  - Imam Zulqarnain Sakandar Madni, the spiritual leader of Norwegian Muslims, accuses
    the United States Government of masterminding the September 11 attacks and expresses
    doubt that Osama bin Laden exists, citing the online documentary Loose Change.
    The U.S. embassy in Oslo issues a statement condemning Madni for "spreading false
    stories to protect terrorists." Mohammad Hamdan, leader of the Islamic Council
    in Norway, says Madni's views must be put into context and that it is not important
    "who is behind it, but how we can fight terrorism and live together in peace."
    (Aftenposten)
  - 'Belgian False Flag Terror arrests: Belgian justice denies Flemish TV vtm’s claims
    that the neo-Nazi group Bloed, Bodem, Eer en Trouw (BBET), close to the Flemish
    branch of Blood & Honour, was projecting false flag terrorist operations (although
    it does accuse the group, which included soldiers, of preparing bombings to "destabilize"
    the country, and prolonged detention of the suspects on September 12). VTM Flemish
    TV declared that BBET was preparing itself to kill Filip Dewinter, one of the
    leaders of the far right Flemish party Vlaams Belang, and to charge the Islamist
    movement for the assassination. In the ensuing confusion, they would have then
    assassinated Dyab Abou Jahjah, leader of the European Arab League Le Soir, (French)Knack,
    (Dutch).'
  - The main events leading up to the 61st Annual Meetings of the International Monetary
    Fund and the World Bank Group as part of Singapore 2006 commence in Singapore.
    (CNA)
  - NATO members fail to respond to a call from military commanders for reinforcements
    to try to quell the Taliban insurgency in southern Afghanistan, an alliance spokesman
    said. (CNN)
  - 'Sectarian violence in Iraq: The bodies of 65 tortured and executed Iraqi men
    have been found all over the city of Baghdad. (ABC)'
  - A Japanese economist and ex-professor at the graduate school of Waseda University
    Kazuhide Uekusa is arrested for molesting a high school girl on a train in Tokyo.(Japundit)
