Date: '2006-09-25'
Source_URI: Portal:Current events/2006 September 25
Intelligence_Payload:
  Uncategorized:
  - Up to a million cluster bomblets discharged by Israel in its conflict with Hezbollah
    remain unexploded in southern Lebanon, the UN has said. (BBC)
  - Iranian President Mahmoud Ahmadinejad says that rabbis are more critical of Zionism
    and the "Zionist regime" than he has been. He expresses hope that "God willing,
    with the force of God behind it, we shall soon experience a world without the
    United States and Zionism." (Al Jazeera.com)
  - Condoleezza Rice, the United States Secretary of State, and Barry Lowenkron, the
    assistant secretary of state for human rights, meet with Kasymzhomart Tokayev,
    the foreign minister of Kazakhstan. They discussed the War in Afghanistan and
    Iraq and the Nazarbayev administration's desire to head the Organization for Security
    and Cooperation in Europe in 2009, which the United States Government opposes.
    (AP) (Eurasia Net)
  - The family of the lone survivor in the crash of Comair Flight 5191 says doctors
    have amputated co-pilot James Polehinke's left leg, and he has no memory of the
    crash. (NBC Lexington)
  - Remains of Dagmar of Denmark, the mother of the last Tsar of Russia, are transported
    from the Roskilde Cathedral to Saint Petersburg in order to be reburied in the
    Peter and Paul Cathedral on 28 September. (BBC)
  - After taking over Kismayo, Somali Islamist militants open fire on anti-sharia
    protesters. Three deaths are being reported. (BBC)
  - Two gunmen kill Safia Ahmed-jan, the provincial director of Afghanistan's Ministry
    of Women's Affairs outside her home in Kandahar. (AP via Yahoo! News) (BBC)
  - Chen Liangyu, the Shanghai Communist Party of China General Secretary and a senior
    member of the Shanghai clique, is dismissed for corruption. (ABC)
  - The New Orleans Saints return to the Superdome for the first time since Hurricane
    Katrina. (The New York Times)
  2003 invasion of Iraq and its aftermath:
  - 'Iraq insurgency: British forces are reported to have killed senior Al-Qaeda operative
    Omar al-Faruq during a gunfight in Basra, Iraq. (BBC)'
  - The United States Marine Corps says three troops from Camp Pendleton will face
    courts-martial on murder charges in the death of an Iraqi man. (AP via KESQ)
  - Saddam Hussein is back in court in Baghdad to face charges of genocide against
    the Kurds in the late 1980s. His legal team boycotts proceedings over claims of
    interference by the Iraqi government, and he is subsequently ejected for protesting.
    (Reuters)
