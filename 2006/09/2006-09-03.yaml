Date: '2006-09-03'
Source_URI: Portal:Current events/2006 September 3
Intelligence_Payload:
  Uncategorized:
  - Israeli-Palestinian conflict
  - Egyptian daily Al Akhbar reports that three Palestinian terrorists are planning
    to carry out attacks on Israelis on holiday on Egypt's Sinai Peninsula. (Haaretz)
  - Europe's first lunar probe, SMART-1, successfully crash-lands onto the Moon, ending
    its 16-month mission. (BBC)
  - Iraqi insurgency
  - Mouwaffak al-Rubaie, Iraq's National Security Advisor, announces the capture of
    Hamed Jumaa Farid al-Saeedi, the second most senior figure in al-Qaeda in Iraq.
    (CNN)
  - Taliban insurgency in Afghanistan
  - More than 200 Taliban rebel and four Canadian troops die in a major offensive
    in Kandahar. (CTV)
  - Kayaking world record
  - The Swedish adventurer Lasse Schmidt finishes the first solo crossing of the Baltic
    Sea in a kayak. The crossing between Sweden and Estonia took three days to complete
    without sleep.(Documentation and media)
