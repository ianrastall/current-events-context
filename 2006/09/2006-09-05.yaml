Date: '2006-09-05'
Source_URI: Portal:Current events/2006 September 5
Intelligence_Payload:
  Uncategorized:
  - Taliban insurgency in Afghanistan
  - More than 50 Taliban insurgents are killed in the ongoing Operation Medusa. (CNN)
  - Felipe Calderón of the PAN is declared the winner of Mexico's 2 July presidential
    election. (BBC)
  - Bill Ford steps down from his position as CEO of Ford Motor Company. He is replaced
    by Alan Mulally, the former executive vice president and CEO of Boeing Commercial
    Airlines. Bill Ford will remain chairman. (USA Today)
  - 2006 Israel-Lebanon conflict
  - The Turkish Parliament votes to authorize the Turkish government to send troops
    to the United Nations peacekeeping force in Lebanon. Deputy speaker Nevzat Pakdil
    said 340 of the 533 lawmakers present in the 550-seat house voted for the deployment;
    192 voted against and one abstained. (Turkish Press)
  - Lebanese troops move into the southern town of Bint Jbeil. (MSNBC)
  - In Lebanon, a roadside bomb seriously wounds Lt. Col. Samir Shehade, a Lebanese
    police officer and kills four of his aides. Shehade was involved in the August
    2005 arrest of four pro-Syrian Lebanese generals, on suspicion of involvement
    in the February 2005 assassination of former Lebanese PM Rafik Hariri. (Al Jazeera),
    (AP)
  - Fidel Castro claims that he is recovering well despite losing 18 kg (41 lb) as
    a result of intestinal surgery. (MSNBC), (Al Jazeera)
  - 'President Mahmoud Ahmadinejad of Iran calls for a purge of liberal and secular
    professors from the nation''s universities. He said: "Today, students should shout
    at the president and ask why liberal and secular university lecturers are present
    in the universities." (MSNBC)'
  - President George W. Bush has nominated Mary Peters as United States Secretary
    of Transportation. (CNN)
  - One of four existing Aerocar I's (flying cars) is up for sale for US$3.5 million.
    (Seattle Times)
  Waziristan War:
  - Pakistan has signed a truce with pro-Taliban militants on the Afghanistan border
    agreeing to withdraw most Pakistani troops in exchange for the militants' promise
    not to support cross-border violence. (BBC)
