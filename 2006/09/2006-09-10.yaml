Date: '2006-09-10'
Source_URI: Portal:Current events/2006 September 10
Intelligence_Payload:
  Uncategorized:
  - A lengthy statement from al-Qaeda's second in command, Ayman al-Zawahiri, on the
    eve of the fifth anniversary of the September 11, 2001 attacks calls on Muslims
    to step up their resistance against the United States. (CNN)
  - Taufa'ahau Tupou IV, the King of Tonga, dies at the age of 88 in an Auckland,
    New Zealand hospital after battling illness. (BBC)
  - Roger Federer wins the U.S. Open defeating Andy Roddick 6-2, 4-6, 7-5, 6-1. (Fox
    Sports)
  - Hurricane Florence forces hurricane warnings for Bermuda as it threatens the island
    with rain of 13 to 20 cm (5 to 8 inches). Florence is also expected to become
    a Category 2 hurricane prior to affecting the island. (CNN), (National Hurricane
    Center)
  - The most successful driver in Formula One history, German Michael Schumacher,
    announces his retirement from the sport at the end of the 2006 season. (BBC)
  - Daniel Wayne Smith, (son of Anna Nicole Smith), dies from a drug overdose just
    three days after his half-sister is born.
  Taliban insurgency (Operation Medusa):
  - NATO and Afghan forces killed 94 Taliban fighters in intense overnight clashes
    in southern Afghanistan, the military alliance says. (BBC)
