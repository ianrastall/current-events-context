Date: '2006-09-30'
Source_URI: Portal:Current events/2006 September 30
Intelligence_Payload:
  Uncategorized:
  - The Los Angeles Times has reported that Jason Grimsley, a former pitcher for several
    Major League Baseball teams who has been accused of supplying performance-enhancing
    drugs to several players, allegedly named stars Roger Clemens, Andy Pettitte,
    and Miguel Tejada in a sworn statement as users of performance-enhancers. (LA
    Times)
  - In Nigeria, the collapse of a dam wall kills forty people in Gusau, Zamfara state.
    (ABC Australia)
  - Eighteen-year-old Taťána Kuchařová from the Czech Republic was crowned Miss World
    2006 at the conclusion of a ceremony held at Sala Kongresowa in Warsaw, Poland.
    1st Runner-Up was Ioana Boitor from Romania and 2nd Runner-Up was Sabrina Housammi
    from Australia. 104 nations competed for the title. (Reuters)
  - In Ireland the controversy continues over payments by businessmen friends to Taoiseach
    (Prime Minister) Bertie Ahern in 1993 when he was Minister for Finance; it has
    come to light that the largest of the payments was drawn on a company cheque.
    (Irish Times) (RTÉ)
  - Talks between the European Union and the United States Department of Homeland
    Security on the transfer of airline passenger data break down. The US demands
    over 30 items of data on each passenger, an earlier agreement which had been deemed
    to break European privacy laws. Midnight tonight was the deadline for reaching
    a new agreement. Airlines face losing landing rights in the US if they do not
    provide the information, and heavy fines in the EU if they do. (BBC)
  - Three lanes of the overpass on Boulevard de la Concorde and a pedestrian sidewalk
    collapsed onto Autoroute 19 in the Montreal area, Quebec. Two cars were trapped
    under, 5 were killed and at least 6 are injured, 2 critically. (Reuters) (CTV
    NEWS)
  - A Brazilian Air Force search and rescue team locates the wreckage of Gol Transportes
    Aéreos Flight 1907 near the town of Peixoto de Azevedo, in northern Mato Grosso
    state. The Boeing 737-800 disappeared from radar after allegedly colliding in
    mid-air with an Embraer Legacy 600 executive jet. There are no reports on survivors.
    (Reuters) (Globo, Portuguese) (AP)
  - Indian police accuse Pakistan's security and intelligence service, the ISI, of
    masterminding the Mumbai train bombings in July, carried out by militant group
    Lashkar-e-Taiba, which killed nearly 200 people. (Hindustan Times) (Reuters)
  - West Coast Eagles beat Sydney Swans by 1 point to win 2006 AFL Grand Final.
