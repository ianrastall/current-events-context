Date: '2006-09-06'
Source_URI: Portal:Current events/2006 September 6
Intelligence_Payload:
  Uncategorized:
  - The security officers of Georgia arrest nearly 30 members of the opposition political
    party "Samartlianoba" (Justice) and its satellite organizations on suspicion of
    plotting a coup against the government. The party, which advocates closer political
    ties with the Russian Federation, is led by the nation's fugitive security chief
    Igor Giorgadze who is wanted by Interpol for his alleged involvement in the 1995
    attempt on former Georgian President Shevardnadze's life. (BBC)
  - The United States government announces that fourteen suspected terrorists are
    to be transferred to the Guantanamo Bay detainment camp and admits that these
    suspects have been held in CIA black sites. These people include Khalid Sheik
    Mohammed, believed to be the No. 3 al-Qaida leader before he was captured in Pakistan
    in 2003; Ramzi Binalshibh, an alleged would-be 9/11 hijacker; and Abu Zubaydah,
    who was believed to be a link between Osama bin Laden and many al-Qaida cells
    before he was also captured in Pakistan in March 2002. (BBC)
  - The Singaporean economy tops a list of 175 economies as the most business-friendly
    economy in the world in a survey conducted by the World Bank's International Finance
    Corporation. (CNA) (IFC).
  - In the United Kingdom junior defense minister Tom Watson and six Parliamentary
    Private Secretaries (Khalid Mahmood, Wayne David, Ian Lucas, Mark Tami, Chris
    Mole and David Wright) resign over Tony Blair's continuing refusal to declare
    when he will step down as Prime Minister. (BBC) (Guardian) (This is London)
  - Japan's Princess Kiko gives birth to a son by caesarean section. The as-yet unnamed
    boy is the first male heir born to the Japanese Imperial Family in more than 40
    years, and will ultimately become Emperor if the current succession laws are unchanged.
    The child's father, Prince Akishino is the second son of Emperor Akihito. (Japan
    Times), (Forbes)
  - Côte d'Ivoire Prime Minister Charles Konan Banny dissolves his Cabinet after toxic
    waste was dumped in the city of Abidjan, making over 1,500 people ill and killing
    three. (BBC)
