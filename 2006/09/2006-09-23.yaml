Date: '2006-09-23'
Source_URI: Portal:Current events/2006 September 23
Intelligence_Payload:
  Uncategorized:
  - Ali Abdullah Saleh, in office since 1978, is re-elected as President of Yemen
    with 77.2% of the votes, prompting allegations of electoral fraud from the Yemeni
    opposition coalition. (BBC)
  - In an interview with Fox News Sunday, to be aired on September 24, Former U.S.
    President Bill Clinton says, "At least I tried. That's the difference in me and
    some, including all of the right-wingers who are attacking me now," responding
    to those who criticize him for the September 11th terrorist attacks, "They had
    eight months to try, they did not try. I tried. So I tried and failed." (Reuters)
  - Toomas Hendrik Ilves is elected the new President of Estonia, defeating incumbent
    Arnold Rüütel. (BBC)
  - French authorities are investigating reports that Osama bin Laden has died of
    typhoid after a leaked French secret service report. Time magazine also cites
    an unknown Saudi Arabian source that Bin Laden had a waterborne disease and may
    be dead. However, French and U.S. authorities are unable to confirm these reports.
    (CTV NEWS) (BBC News) (Reuters)
  - Kids' WB Premieres of Krypto the Superdog, Monster Allergy, Tom and Jerry Tales,
    Shaggy & Scooby-Doo Get a Clue! and Legion of Super Heroes
  - New Episodes and Season Premieres of Johnny Test, The Batman, Xiaolin Showdown
    and Loonatics Unleashed
  - Japan's Solar-B mission is launched from the Uchinoura Space Center. With its
    successful launch, it is rechristened "Hinode". (BBC)
  Iraq insurgency:
  - A car bomb attack on a fuel station in the Sadr City district of Baghdad, Iraq,
    kills at least 26 people. Many others are injured. (Reuters) (BBC)
  - Iraq's Interior Ministry announces they have arrested one of the leaders of Islamist
    militant group Ansar al-Sunna. (CNN)
