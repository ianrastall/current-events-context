Date: '2006-09-16'
Source_URI: Portal:Current events/2006 September 16
Intelligence_Payload:
  Uncategorized:
  - Winners of the 2006 Lasker Awards for medical research are announced. (Reuters),
    (laskerfoundation.org)
  - Hurricane Lane strengthens to a Category 3 hurricane with nearly 125 mph winds
    as it approaches Mexico's Pacific coast. (CNN)
  - 'Darfur conflict: On the eve of the International Day for Darfur, British Prime
    Minister Tony Blair insists the government of Sudan must start to "live up to
    its obligations" towards the war-torn region. (BBC)'
  - 'Iraq insurgency: Baghdad police find 47 corpses across the city, most bound and
    shot, thought to be more victims of the ongoing sectarian killing that has been
    taking place in the region and appears aimed at provoking civil war. (Reuters)'
  - '2006 United States E. coli outbreak: Bagged spinach recalled in United States
    after products linked to at least 94 cases of E. coli in 19 states. (CNN)'
  - A Delta Air Lines flight makes an emergency landing at Shannon Airport in Ireland.
    The flight was en route to New York from Shannon itself, and had 276 passengers
    on board. It was reported that there was smoke in the cabin. (RTÉ)
  Pope Benedict XVI Islam controversy:
  - Pope Benedict XVI's security has increased due to the controversy. (Ynet News)
  - Pope Benedict XVI is quoted as saying that he is "very upset" and "sorry" that
    his comments regarding Islam on Tuesday offended Muslims. (CNN), (BBC)
  - Violence erupts when Palestinian militants bombed and engaged in shootings against
    five churches in the West Bank. (AP via Yahoo! News)
  - Hurricane Lane has weakened to a Category 1 hurricane after striking the Pacific
    coast of Mexico. (AP via Yahoo! News)
