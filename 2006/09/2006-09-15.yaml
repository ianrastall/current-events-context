Date: '2006-09-15'
Source_URI: Portal:Current events/2006 September 15
Intelligence_Payload:
  Uncategorized:
  - The U.S. State Department's annual report on religious freedom criticizes the
    governments of Uzbekistan, Iran and China for increasing repression while noting
    improvement in the practices of the governments of Saudi Arabia, Sudan and Vietnam.
    (Voice of America)
  - 'Pope Benedict XVI Islam controversy: Pope Benedict XVI is criticized throughout
    the Islamic world for comments he made on September 12, quoting the Byzantine
    emperor Manuel II Palaiologos (1391-1425) regarding Muhammad and Islam. Street
    protests take place in parts of South Asia. (CNN)'
  - 'Taliban insurgency: The Afghan security forces have retaken a district headquarters
    in the western Farah province after a short Taliban occupation. (BBC)'
  - Yemen foils two attempts by four suicide bombers to attack two oil refineries,
    Al Jazeera reports. (Al Jazeera),(Reuters)
  - Tarcisio Bertone becomes new Cardinal Secretary of State of the Holy See, and
    Archbishop Dominique Mamberti is named new Secretary for Relations with States
    (foreign minister). At the same time, Angelo Sodano retires after sixteen years
    as Cardinal Secretary of State.
  - Close to half a million people stage a march in Taipei to demand the resignation
    of President Chen Shui-Bian. (BBC), (CNN)
  - UPN network shuts down, marking the first time in 50 years a United States broadcast
    television network ceased broadcasting.
