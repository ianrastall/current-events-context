Date: '2006-09-08'
Source_URI: Portal:Current events/2006 September 8
Intelligence_Payload:
  Uncategorized:
  - Australian motor racing legend Peter Brock has been killed in a crash while taking
    part in the Targa West rally in Western Australia. (News.com.au)
  - Ralph "Bucky" Phillips, the most recent addition to the FBI Ten Most Wanted Fugitives
    list, surrenders to Pennsylvania State Police. He is wanted for shooting three
    New York State troopers, one of whom died, after he escaped from jail. (The Buffalo
    News)
  - Chilean Supreme Court lifts Augusto Pinochet's immunity concerning the Villa Grimaldi
    case. (BBC).
  - The non-governmental organization Freedom House ranks Burma, Cuba, Libya, North
    Korea, Sudan, Syria, Turkmenistan, and Uzbekistan as the worst violators of human
    rights. FH also cited Tibet and Chechnya as areas of intense repression. (Payvand)
  - The United States Senate states there is no evidence of formal links between Iraqi
    ex-leader Saddam Hussein and al-Qaeda leaders in Iraq prior to the 2003 Iraq War.
    (BBC)
  - Missing United States Air Force officer Major Jill Metzger who disappeared in
    Bishkek, Kyrgyzstan earlier this week is found in good health. Metzger says she
    was kidnapped by three men and a woman. (CBS)
  - Shuji Nakamura is awarded the 2nd Millennium Technology Prize for his work on
    blue and white LEDs. The first recipient of the award was Tim Berners-Lee, developer
    of the World Wide Web. (BBC)
  - A series of bomb blasts rock Malegaon town in Nashik district of the Indian state
    of Maharashtra, killing 37 and injuring around 100. (Bloomberg)
  - Zimbabwe has failed to keep its promise to build new homes for the thousands whose
    houses were demolished last year during Operation Murambatsvina. (BBC)
  - 'Taliban insurgency: A suicide car bomb explodes near the United States embassy
    in Kabul, killing at least ten people. (Boston Herald) (CNN)'
