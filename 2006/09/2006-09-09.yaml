Date: '2006-09-09'
Source_URI: Portal:Current events/2006 September 9
Intelligence_Payload:
  Uncategorized:
  - BBC's The Proms 'Last Night at the Proms' took place at Royal Albert Hall in London.
    The proms were simulcasted to cities across the United Kingdom like Glasgow, Swansea,
    Belfast, Manchester and London Hyde Park. More than 100,000 people attended the
    festival in London and elsewhere. The proms are currently in their 112th season.
    (BBC News)
  - Tens of thousands of protesters begin their anticorruption protests, "Million
    Voices Against Corruption, President Chen Must Go", against President Chen Shui-bian
    in Taipei, Taiwan. (Associated Press via Washington Post), (BBC)
  - Space Shuttle Atlantis lifts off from John F. Kennedy Space Center in Florida
    to begin STS-115. (CNN.com)
  - A 4.4 magnitude earthquake affects Israel and the West Bank. No injuries are reported.
    (Reuters)
  - The Sri Lankan Army says that 28 soldiers were killed and 119 were wounded while
    battling the Tamil Tiger rebels in Jaffna. The deaths of nearly 150 Tamil Tigers
    were also reported. (CNN)
  - 19-year-old Maria Sharapova wins her second Grand Slam, upsetting Justin Henin-Hardenne
    6–4, 6–4 in the final of the 2006 U.S. Open. (Australian Broadcasting Corporation)
  Taliban insurgency (Operation Medusa):
  - NATO-led forces in Afghanistan say they have killed 40 more Taliban rebels in
    the ongoing offensive in the south. (BBC)
