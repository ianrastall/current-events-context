Date: '2006-09-14'
Source_URI: Portal:Current events/2006 September 14
Intelligence_Payload:
  Uncategorized:
  - U.S. Senate committee approves a bill to give more rights to "terrorism" detainees.
    The White House and the Central Intelligence Agency (CIA) agree that signing the
    bill into law would end a classified CIA interrogation program, which a recent
    Supreme Court ruling leaves on tenuous ground. (Chicago Sun-Times) (Wash. Times)
  - U.S. Representative Bob Ney (R-Ohio) has agreed to plead guilty to federal criminal
    charges related to his dealings with the lobbyist Jack Abramoff according to lawyers
    and others with knowledge of the investigation. (New York Times News Service)
  - The International Atomic Energy Agency call a United States House of Representatives
    committee report on Iran's nuclear capabilities "outrageous and dishonest." (Washington
    Post)
  - The United States Department of the Interior’s Inspector General accuses the top
    officials at the agency of tolerating widespread ethical failures, from cronyism
    to cover-ups of incompetence. (New York Times)
  - The Ford Motor Company and the United Automobile Workers union agree on a program
    that will offer buyouts and other incentives to more than 75,000 Ford workers
    in the United States to persuade them to leave their jobs. (New York Times)
  - Amnesty International accuses Hezbollah of war crimes, in its deliberate targeting
    of civilians in Israel during the recent Israel-Lebanon conflict. (Amnesty)
  - A partial roof collapse occurred in part of the Mahon Airport terminal building
    in Menorca, Spain while undergoing renovations/construction work. The collapse
    may have been caused by a build-up of heavy rain water. The debris temporarily
    trapped 20 and injured three workers (BBC)
  - The African Union has endorsed an IGAD peacekeeping operation in Somalia, to be
    known as IGASOM. (Shabelle.net)
