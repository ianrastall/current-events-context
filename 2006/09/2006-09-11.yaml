Date: '2006-09-11'
Source_URI: Portal:Current events/2006 September 11
Intelligence_Payload:
  Uncategorized:
  - The 14th Summit of the Non-Aligned Movement begins in Havana, Cuba. (Official
    Site)
  - 'India celebrates a day of peace: the 100th anniversary of the birth of Mahatma
    Gandhi''s philosophy of peaceful resistance - satyagraha. On September 11, 1906,
    Gandhi called on his compatriots to use non-violent means to disobey the law,
    and thousands of Indians were jailed, including Gandhi, for refusing to cooperate
    and burning their identity booklets. (CTV.ca)'
  - American President George W. Bush states that the war against terrorism is "the
    calling of our generation" and urged Americans to put aside differences and fight
    to victory. (San Francisco Chronicle), (White House - full text)
  - Tropical Storm Gordon forms in the open Atlantic Ocean with 45 mph winds and is
    expected to head towards Bermuda. (Associated Press)
  - U.S. & New York leaders, along with families and friends of those who died in
    the September 11, 2001 attacks, remember the 5th anniversary of the attacks with
    speeches and moments of silence. (Forbes/AP)
  - A new video broadcast shows Al-Qaeda deputy leader, Ayman al-Zawahiri, issuing
    a warning about possible future attacks in Israel and the Persian Gulf. (BBC)
