Date: '2006-09-28'
Source_URI: Portal:Current events/2006 September 28
Intelligence_Payload:
  Uncategorized:
  - The Platte Canyon High School killer is identified as Duane Morrison, who has
    no known connections with Bailey, Colorado. (CBS News)
  - Abu Hamza al-Muhajir, the new leader of al-Qaida in Iraq, urges Muslims to make
    the month of Ramadan a "month of holy war" in an audiotape posted on an Islamic
    web site. (Associated Press)
  - Empress Maria Fyodorovna of Russia is interred in the Peter and Paul Cathedral
    of Saint Petersburg, next to her husband, Alexander III of Russia. (BBC)
  - Israeli radio reports that Prime Minister of Israel Ehud Olmert said he plans
    to meet Palestinian President Mahmoud Abbas in coming days. (Sydney Morning Herald)
  - Top Gear presenter Richard Hammond leaves Leeds General Infirmary for an undisclosed
    hospital near his home to recuperate after major car crash whilst filming the
    week before. (AFP via News Limited)
  Georgia-Russia spying row:
  - Russia recalls its ambassador from Georgia over the detention there of several
    Russian army officers on spying charges and ordered a partial evacuation of Russian
    diplomatic staff from that country. (Reuters)
