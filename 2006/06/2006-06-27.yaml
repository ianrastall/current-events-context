Date: '2006-06-27'
Source_URI: Portal:Current events/2006 June 27
Intelligence_Payload:
  Uncategorized:
  - Chadian rebels attack the neighboring Central African Republic. They have reportedly
    formed an alliance with CAR rebels. Large areas of both countries have descended
    into violence. (BBC)
  - Armenian President Robert Kocharyan and Azerbaijani President Ilham Aliyev agree
    to allow the residents of Nagorno-Karabakh to decide the region's future status
    through a popular vote. (Radio Free Europe-Armenian Liberty)
  - The most recent attempt in the United States to adopt a flag desecration amendment
    fails in the Senate by one vote. (CNN)
  - Popular musician Axl Rose from the band Guns N' Roses is arrested in Stockholm,
    Sweden, for alleged violent conduct including biting a security guard on the leg.
    (BBC)
  - Iranian Supreme Leader Ayatollah Ali Khamenei says Iran does "not need" to talk
    with the United States over its nuclear program. (CBS News)
  - The Hamas-led Palestinian government has reportedly agreed to implicitly recognise
    Israel, paving the way to reopening peace talks with it. Other Hamas officials
    later deny these reports. (BBC).
  - A Palestinian militant group kidnaps and an hour later kills a 19-year-old Israeli
    tertiary student, Eliyahu Asheri. The same group later threatens it will kill
    the student if the Israeli offensive continues. (Haaretz)
  - The Iraqi Special Tribunal announces that Saddam Hussein and six co-defendants
    will face trial on August 21 in relation to the 1980s Anfal campaign in which
    100,000 Kurds are estimated to have died. (China Post)
  - A vote in the Legislative Yuan to recall Taiwanese President Chen Shui-bian, who
    is implicated in numerous corruption scandals, fails to gain the necessary two-thirds
    majority. (Bloomberg) (AP)
  - Nguyen Minh Triet becomes President of Vietnam with Nguyễn Tấn Dũng expected to
    become the new Prime Minister of Vietnam. (CNN), (BBC)
  - Ronaldo broke the all-time FIFA World Cup finals goal-scoring record of 14 goals
    set by Gerd Müller of Germany, scoring his 15th World Cup goal, and Brazil's first
    goal of the match (Round of 16), against Ghana in his 18th World Cup match.
