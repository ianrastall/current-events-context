Date: '2006-06-21'
Source_URI: Portal:Current events/2006 June 21
Intelligence_Payload:
  Uncategorized:
  - 'War in Afghanistan: Six Canadian soldiers are wounded following two separate
    attacks in the southern provinces of Afghanistan. The six casualties are the first
    coalition casualties since Operation Mountain Thrust began on June 12, 2006. (CBC)'
  - The Government of Chad demands that the Security Council act to stop Janjaweed
    and UFDC incursions into Chad. (Reuters)
  - In a press conference in South Africa, Sudanese President Omar al-Bashir says
    that United Nations peacekeeping forces shall never enter Sudan because they are
    controlled by an international Jewish conspiracy involving "heavy propaganda and
    media campaigns." (SudanTribune)
  - The United States Marine Corps announces that it will be charging seven Marines
    and one sailor with charges including murder in relation to the death of civilian
    Hashim Ibrahim Awad in Al Hamdaniya, Iraq, on April 26. A fourth soldier from
    the 101st Airborne Division was charged in connection with the shooting deaths
    of three detainees during an operation in Salahuddin province in May. (NBC) (CNN)
  - Xanana Gusmão, President of East Timor, asks Prime Minister Marí Alkatiri to resign.
    (CNN)
  - Saddam Hussein's principal defense lawyer, Khamis al-Obeidi, is assassinated in
    Baghdad. (BBC)
  - United States celebrates national Go Skateboarding Day.
  - Ukraine's formerly estranged Orange Revolution allies reach an agreement to restore
    Yulia Tymoshenko as Prime Minister of Ukraine after three months of uncertainty.
    (Kyiv Post)
  - Katharine Jefferts Schori, the Episcopal bishop of Nevada, and the new leader
    of the Episcopal Church in the United States of America has said that homosexuality
    is not a sin. (Melbourne Herald Sun)
  - Superman Returns is released in theaters.
