Date: '2006-06-24'
Source_URI: Portal:Current events/2006 June 24
Intelligence_Payload:
  Uncategorized:
  - In Germany, 378 people (including 122 England fans) are arrested after a violent
    confrontation between England supporters and Germany supporters in Stuttgart.
    Approximately 60,000 England supporters are present in Stuttgart for Sunday's
    World Cup second round game with Ecuador. (BBC)
  - Current Bolivian Minister of Hydrocarbons Andrés Soliz Rada asks Bolivia’s chief
    prosecutor to issue charges against former heads of Enron, its subsidiary Prisma
    Energy International, former President of Bolivia Gonzalo Sánchez de Lozada, former
    Vice President Víctor Hugo Cárdenas, former Enron director for Bolivia Peter E.
    Weidler, several ministers during Sánchez's 1993-1997 presidency, and former executives
    of Bolivia's state oil company for “contracts damaging to the state, contravening
    the constitution and falsification of contracts.” Lozada is charged with genocide
    for his role in the Bolivian Gas War. (Reuters)
  - President Gloria Macapagal-Arroyo of Philippines signs a law that repeals the
    death penalty. (Sun Star)
  - In Vietnam, President Trần Đức Lương, Prime Minister Phan Văn Khải and the Chairman
    of the Assembly Nguyen Van An resign, citing old age. (BBC)
  - In Gaza, Israel captures two civilian Palestinian brothers in an overnight raid,
    in the Muamar family detention incident.(BBC)
