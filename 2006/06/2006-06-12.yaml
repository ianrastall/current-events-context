Date: '2006-06-12'
Source_URI: Portal:Current events/2006 June 12
Intelligence_Payload:
  Uncategorized:
  - Fatah activists reportedly attack the Palestinian parliament building, setting
    fire to the fourth floor and riddling the building with gunfire. (AP), (VoA)
  - Tropical Storm Alberto threatens to hit the Northwest coast of Florida, United
    States. Hurricane warnings are issued and Gov. Jeb Bush declares a state of emergency.
    Mandatory evacuations are ordered for low-lying areas. (AP via NBC Weather Plus)
  - Albania signs a Stabilisation and Association Agreement, a first step toward joining
    the European Union. (VOA)
  - U.S. officials say that North Korea is planning to test the Taepodong-2 intercontinental
    ballistic missile that may be able to reach the United States. (Reuters)
  - Five people are killed, and about 80 injured, when an Israeli train travelling
    between Tel Aviv and Haifa collides with a truck on a level crossing near Netanya.
    The first anniversary of a similar accident on Israel Railways near Revadim on
    the Beersheba line is in nine days' time. (Reuters), (CNN), (Ynetnews), (Wikinews)
  - A Palestinian sniper opens fire on highway 443 near Jerusalem, killing one person
    and wounding four. All victims are Palestinians living in Jerusalem. (Haaretz)
  - A blackout hits Auckland, New Zealand, lasting for several hours after a severe
    storm lashed the country. Many media outlets compared it to the 1998 Auckland
    power crisis. (New Zealand Herald)
