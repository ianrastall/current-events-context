Intelligence_Payload:
  Uncategorized:
  - The Washington Post reveals that the current United States administration turned
    down an Iranian attempt to settle disagreements about recognizing the right of
    existence of Israel and alleged Iranian support of terrorism in 2003. (Washington
    Post)
  - According to an investigative report by Ron Suskind, Al-Qaeda was 45 days from
    launching a gas attack on the New York City Subway when it was called off by Osama
    bin Laden's second-in-command, Ayman al-Zawahri, in 2003. (Globe and Mail), (MSNBC)
  - The people of Catalonia accept the proposed changes to the Statute of Autonomy
    of Catalonia, notably a change that would define Catalonia as a nation. (CBC)
  - The Israeli town of Sderot shuts down for 24 hours in protest of continuing Qassam
    rocket attacks. More than six hundred Qassam rockets were launched against Israeli
    towns since Israel's disengagement from the Gaza Strip, a hundred of which in
    the past week. One rocket left parts of Sderot without electricity for several
    hours this morning.(Haaretz), (IHT).
