Date: '2006-06-22'
Source_URI: Portal:Current events/2006 June 22
Intelligence_Payload:
  Uncategorized:
  - The International Astronomical Union officially names Pluto's recently discovered
    moons, S/2005 P 2 and S/2005 P 1, Nix (after Nyx, the Greek Goddess of Darkness)
    and Hydra (multi-headed monster from Greek myth) respectively. (SMH), (National
    Geographic)
  - East Timor President Xanana Gusmão threatens to resign over the social unrest
    in his country. (BBC)
  - The U.S. Federal Bureau of Investigation raids terror suspects in Miami, Florida,
    with seven arrests made. The detainees are charged with terrorism conspiracy,
    in connection of being in the early stages of planning attacks against Chicago's
    Sears Tower and possibly FBI and government buildings in the Miami area. (Associated
    Press) (FOX News) (CNN)
  - The International Committee of the Red Cross admits the Israeli Magen David Adom
    and the Palestine Red Crescent Society. The resolution, ending 58 years of struggle,
    was passed by a 237-54 vote, over Muslim objections. (CNN) (BBC)
  - Japan dispatches ships and planes to monitor developments in North Korea as that
    country prepares to test a long range missile. (Associated Press)
  - United States and coalition forces have found 500 pre-1991 chemical weapons since
    the 2003 invasion of Iraq. A Pentagon official has stated that the weapons were
    degraded beyond the point of use, but the report states they remain a danger and
    are still potentially lethal. (AFP) (FOX News)
  - After 16 years in office, Angelo Sodano retires as Cardinal Secretary of State.
    He will be succeeded by Tarcisio Bertone, until now Archbishop of Genoa. (Holy
    See Bollettino)
