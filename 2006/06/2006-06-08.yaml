Date: '2006-06-08'
Source_URI: Portal:Current events/2006 June 8
Intelligence_Payload:
  Uncategorized:
  - Scientists in Greece announce to have revealed previously hidden ancient Greek
    letters on the Antikythera mechanism, thought to be one of the world's first known
    analog computers. (The Register)
  - A delegation from the rebel Lord's Resistance Army arrives in Juba, Sudan for
    peace talks with the Ugandan government to be mediated by Riek Machar, Vice President
    of Southern Sudan.(BBC)
  - Conflict in Iraq
  - According to an aide to Iraq's prime minister Nuri al-Maliki, the leader of Al-Qaeda
    in Iraq and one of the world's most wanted men, Abu Musab al-Zarqawi, was killed
    by a U.S. air raid. Al-Zarqawi's body was retrieved and visually identified by
    known scars, tattoos and fingerprints. (CNN)(BBC)
  - First Lieutenant Ehren Watada, 28, publicly refuses to go to Iraq, saying it would
    make him party to war crimes. (Reuters) (Aljazeera) (ABC) (FOX)
  - Iraqi Prime Minister Nouri al-Maliki fills the last open posts of his Council
    of Ministers, appointing Qadir Obeidi as defense minister and Jawad Bulani as
    interior minister.(BBC)
  - Haya Rashed Al-Khalifa, a former ambassador to France and one of the first women
    in Bahrain to practice law, is elected President of the Sixty-first United Nations
    General Assembly. (Hindustan Times) , (UN.org)
  - The Broadmead area of Bristol, United Kingdom is temporarily closed following
    the discovery of a suspected unexploded German bomb from World War II (BBC).
  - Microsoft makes Windows Vista beta 2 available for general download. PC World
  - Former Malaysian Prime Minister Mahathir bin Mohamad declares his successor, Abdullah
    Ahmad Badawi, betrayed his trust — Mahathir's strongest criticism of Abdullah's
    administration yet. (Malaysia Today)
  - The U.S. House of Representatives definitively rejects the concept of Net neutrality
    (ZDNet)
  - In Game 1 of the NBA Finals (Dallas Mavericks vs. Miami Heat) the Mavs beat Miami
    90-80.
