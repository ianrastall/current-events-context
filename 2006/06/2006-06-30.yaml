Date: '2006-06-30'
Source_URI: Portal:Current events/2006 June 30
Intelligence_Payload:
  Uncategorized:
  - A judge orders the arrest of former Mexican President Luis Echeverría on charges
    relating to the 1968 Tlatelolco Massacre. (Reuters)
  - The United States military orders an investigation into claims that five US soldiers
    raped an Iraqi woman and then murdered her and three members of her family (see
    Mahmudiyah rape and killings). (Houston Chronicle)
  - With the election of Trish Law in a by-election, the National Assembly for Wales
    becomes the first legislature in the world to have a majority of female members.
    (BBC)
  Operation Summer Rains:
  - On the sixth day to the abduction of Cpl. Gilad Shalit, his father calls the abductors
    to provide him with a sign of life from Gilad, as a humane requisite. He also
    personally thanks Egyptian President Hosni Mubarak for his personal involvement
    in resolving the crisis. (Ynet)
  - Israeli air strike kills one Islamic Jihad militant in the Gaza Strip, the first
    Palestinian fatality in the IDF incursion. A child is lightly wounded in another
    air strike in the Gaza Strip. (Haaretz)
  - An upgraded Qassam rocket lands in the cemetery of Ashkelon, an Israeli city with
    a population exceeding 117,000. This is the furthest range Qassam rockets have
    reached to date. (Ynet)
