Date: '2006-06-25'
Source_URI: Portal:Current events/2006 June 25
Intelligence_Payload:
  Uncategorized:
  - The Sudanese government announces the lifting of a partial ban on United Nations
    operations in the conflict-hit Darfur region. The ban was made after the government
    accused the UN of transporting a rebel leader who opposes a recent peace deal.
    (BBC)
  - Arcelor declares its merger with Mittal Steel. The new company will be called
    Arcelor-Mittal. (CNN-IBN) (BBC)
  - Eight Palestinian militants, including Hamas militants, infiltrate into an army
    post in Israel using a tunnel. Two Israeli soldiers are killed, one kidnapped
    and three wounded in the attack, in which at least two Palestinian militants die.
    Israeli PM vows a fierce military response to the attack once the soldier, Gilad
    Shalit, is returned. Two infantry brigades and supporting armoured regiments are
    deployed along the Gaza Strip border, in preparation for a major offensive.(Haaretz),(Reuters
    UK),(BBC)
  - José Ramos-Horta resigns as both Foreign and Interim Defence Minister of East
    Timor amidst ongoing political turmoil. (SMH)
  - Italians vote in a referendum on whether to approve the modification of 53 articles
    in the constitution. Approval would give more power to the prime minister and
    to the regions, making Italy a federal state. (Scotsman)
  - The world's third richest man, Warren Buffett, pledges to donate approximately
    $37 billion USD in shares to the Bill & Melinda Gates Foundation, effectively
    making it the largest charitable organization in history. (Fortune)(NYT)(BBC)
