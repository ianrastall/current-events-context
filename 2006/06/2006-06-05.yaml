Date: '2006-06-05'
Source_URI: Portal:Current events/2006 June 5
Intelligence_Payload:
  Uncategorized:
  - Javier Solana, foreign policy chief of the European Union, arrives in Tehran to
    talk with the Iranian Government about its plans to develop uranium enrichment
    facilities. (CNN)
  - The Islamic Court Union announces that it has seized Mogadishu, the capital of
    Somalia, after battles with the Alliance for the Restoration of Peace and Counterterrorism,
    a group of secular US-backed warlords. (AP)
  - Alan García of the APRA is re-elected President of Peru after winning a runoff
    with the Union for Peru's Ollanta Humala on Sunday. (FoxNews.com)
  - Serbia confirms the dissolution of the State Union of Serbia and Montenegro and
    declares independence. (BBC)
  - Australia calls for more South East Asian troops and police to help quell civil
    unrest in East Timor. (Reuters)
