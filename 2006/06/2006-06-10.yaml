Date: '2006-06-10'
Source_URI: Portal:Current events/2006 June 10
Intelligence_Payload:
  Uncategorized:
  - Three prisoners commit suicide at Guantanamo Bay detainment camp in protest against
    the internationally criticized conditions at the camp. Human rights organizations
    express concern.(Houston Chronicle), (New Zealand Herald), (CNN), (Reuters)
  - The first tropical depression of the 2006 Atlantic hurricane season forms in the
    northwestern Caribbean Sea. (CNN)
  - The militant Hamas group calls off its truce with Israel after seven civilians
    are killed in the Gaza Strip. More than seventy Qassam rockets were launched at
    Israeli towns by Hamas militants since Friday morning, wounding Palestenian and
    Israeli civilians alike. (Globe and Mail), (Haaretz)
  - A Yemeni man, linked to the September 11, 2001 attacks in the United States, has
    been deported from New Zealand. It is only the second time that section 72 of
    the Immigration Act, which deals with threats to national security, has been used
    to deport someone. Its use requires the consent of the Governor-General, and there
    is no right of appeal. (newswire)
