Date: '2006-06-02'
Source_URI: Portal:Current events/2006 June 2
Intelligence_Payload:
  Uncategorized:
  - The UK Independent newspaper reports that a great-grandson of Apache leader Geronimo
    has appealed to U.S. President Bush to help recover the remains of his famous
    relative. The remains were purportedly stolen over 90 years ago by a group of
    students including the President's grandfather, and employed in ceremonies by
    Skull and Bones, a secret society at Yale University. (Independent) (Yale Alumni
    Magazine) (Newwest.net)
  - British police shoot a suspect in an anti-terrorism raid, although his injuries
    are non-life threatening. The 23-year-old was shot in front of his family as 250
    police raided his home in Forest Gate, London. (BBC) (ABC)
  - The BBC shows a video about a new alleged massacre by U.S. troops in Ishaqi, Iraq,
    on March 15, 2006. (BBC)
  - Robert F. Kennedy Jr., writing in Rolling Stone magazine, accuses George W. Bush
    and his Republican Party of widespread voting fraud during the 2004 Presidential
    Election. (Rolling Stone) (Editor and Publisher)
  - China, France, Germany, Russia, the United Kingdom and the United States propose
    a set of incentives and possible sanctions in an effort to encourage Iran to suspend
    or abandon its plans of nuclear development. (Washington Post)
  - Female genital cutting is found to increase infant mortality and childbirth complications.
    (BBC) (WHO)
  - 'Expedition 13/Soyuz TMA-8: Pavel Vinogradov and Jeffrey Williams spend more than
    six hours outside the International Space Station, conducting an extended maintenance
    spacewalk. (VOA), (CNN)'
