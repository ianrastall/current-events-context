Date: '2006-06-19'
Source_URI: Portal:Current events/2006 June 19
Intelligence_Payload:
  Uncategorized:
  - The Carolina Hurricanes win ice hockey's Stanley Cup in game seven of a best of
    seven series for the first time defeating the Edmonton Oilers 3-1. (USA Today),
    (CBC)
  - Kathleen Blanco, the Governor of the U.S. state of Louisiana, calls in the Louisiana
    National Guard to patrol the streets of New Orleans following six deaths on the
    preceding weekend. (Chicago Tribune)
  - The United States Army charges three soldiers of the 101st Airborne Division 3rd
    Brigade Combat Team with murder in relation to the deaths of three men in custody
    in Iraq. (USA Today)
  - The Mujahedeen Shura Council in Iraq claims that they have captured two United
    States soldiers. (CBC)
  - Iraqi prosecutors in the Trials of Saddam Hussein call for Saddam Hussein to be
    sentenced to death, together with his half brother Barzan al-Tikriti and former
    vice-president Taha Yassin Ramadan. (Daily Mail)
  - North Korea is said to be readying for long-range missile test of Taepadong-2
    missile thought to have a range which includes the western USA coastline. (CNN)
