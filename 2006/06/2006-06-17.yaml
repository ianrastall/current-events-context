Date: '2006-06-17'
Source_URI: Portal:Current events/2006 June 17
Intelligence_Payload:
  Uncategorized:
  - Violence intensifies in Sri Lanka as government troops allegedly attack Tamils
    in a church in response to an attack on the navy by the Tamil Tigers. (BBC)
  - 'Avian influenza: The EU Community Reference Laboratory for Avian Influenza in
    Weybridge, UK, confirms that birds sent from Hungary after investigations began
    on June 9 in Kiskunmajsa, a region where a significant amount of poultry is farmed,
    tested positive for the H5N1 strain of the virus. This is the first time that
    the virus has been found in Hungary.'
