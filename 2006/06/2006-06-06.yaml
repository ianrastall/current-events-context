Date: '2006-06-06'
Source_URI: Portal:Current events/2006 June 6
Intelligence_Payload:
  Uncategorized:
  - '2006 Toronto terrorism case: Toronto police uncover an alleged subplot where
    Steven Vikash Chand, alias Abdul Shakur, intended to lead an invasion of the Parliament
    of Canada building and assassinate Prime Minister Stephen Harper. (CBC)'
  - Iraqi insurgency
  - Iraqi Health Ministry figures show 6,025 civilian bodies were delivered to Baghdad's
    central mortuary in the first five months of this year. (BBC)
  - The Iraqi administration has asked the United Nations to join the investigations
    into alleged massacres by American soldiers. (zaman)
  - Chad-Sudan conflict
  - The Sudanese Janjaweed steal 350 head of cattle from Goz Beida, Chad. (Voice of
    America)
  - Rebel leader Timane Erdimi's UFDC-SCUD forces kill 32 people and wound 50 others
    in attacks from Sudan into the Chadian city of Tine. Rebels briefly took control
    of the city before the Military of Chad chased them back over the border. (Mail
    and Guardian)
  - Australia's Howard government commissions Ziggy Switkowski to lead a commission
    on the introduction of nuclear energy in Australia. (Bloomberg)
  - The opening date of the Doomsday-related film, The Omen, done so to collaborate
    to the date's religious significance (June 6th, 2006 -- 06/06/06, or 666 which
    is known as the number of the beast in Christianity). It is a remake of another
    film by the same name from 1976.
  - BAA plc, the owners of London's Heathrow, Gatwick and Stansted Airports, accept
    a £10 billion takeover bid from a consortium led by Spain's' Grupo Ferrovial and
    including the Quebec public employees' pension fund. (BBC)
  - The trial of Tim Selwyn for sedition begins in Auckland, New Zealand. Selwyn is
    the first New Zealander in over 80 years to be charged with sedition. (Newswire)
  - Iceland's Prime Minister Halldór Ásgrímsson resigns after poor showings in local
    elections. Foreign Minister Geir Haarde takes over. (BBC)
  - The house of Jason Grimsley, was searched as part of the ongoing BALCO steroids
    probe. Grimsley, a relief pitcher for the Arizona Diamondbacks, asked for and
    received an unconditional release from the team the next day. (USA Today)
  - The 40th Anniversary High Mass of the Church of Satan occurred in Los Angeles,
    where Satanists gathered from nine different countries to celebrate the day. (LA
    CityBeat)
  - The Falador Massacre was an infamous glitch on Jagex's Massively Multiplayer Online
    Role-Playing Game (MMORPG) RuneScape, the largest MMORPG by player base, allowing
    bug abusing players to slaughter other defenseless players. Known by many as one
    of the most egregious bugs in MMORPG history, sparking a documentary and multiple
    news articles. (RuneScape Wiki)
