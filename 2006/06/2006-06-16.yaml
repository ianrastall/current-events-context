Date: '2006-06-16'
Source_URI: Portal:Current events/2006 June 16
Intelligence_Payload:
  Uncategorized:
  - The United States House of Representatives passes a resolution supporting President
    Bush's policy on Iraq 256-153. (L.A. Times)
  - Surveillance and intelligence reports have confirmed that North Korea is preparing
    to test its Taepodong-2 missiles on Sunday. (Toronto Star) (BBC)
  - The Italian pretender, Vittorio Emanuele, Prince of Naples, is arrested as part
    of an investigation into corruption and prostitution. (BBC)
  - An H5 strain of avian influenza has been detected in the Canadian province of
    Prince Edward Island. The bird flu currently has a "low risk" to humans.(Globe
    and Mail)
  - Chinese journalist Yang Xiaoqing, a reporter for the state-run China Industrial
    Economy News, is sentenced to one year in prison at the Longhui No. 1 People's
    Court in Hunan province for extortion. Xiaoqing wrote an article exposing local
    Communist Party official Yang Jianxin's embezzlement of state assets. Jianxin
    has been reassigned to an advisory post in Shaoyang city. Hundreds of protesters
    block police cars to prevent them from taking Xiaoqing to jail. (CPJ)
  - The Winnipeg police have made numerous arrests in the relation to the Shedden
    massacre, including five members from the Bandidos motorcycle club. (CBC)
  - Prachanda, reclusive leader of the Communist Party of Nepal (Maoist), meets with
    Prime Minister Girija Prasad Koirala, in what is thought to be his first visit
    to the capital Kathmandu in decades. (BBC)
  - After ten hours of talks, they agree to form a new Government with representatives
    of the Maoists included and a new election to be held in 2007. The rebels agree
    to suspend their people's government.
  - Israeli air strike near Gaza kills one Islamic Jihad militant and wounds two others,
    reportedly on their way to launch Qassam rockets. No civilians were hurt in the
    strike. More than a hundred Qassam rockets were launched against Israeli towns
    in the past week, six of them on Friday. (CNN),(Israeli MFA)
  - Evangelist Gilbert Deya is arrested by police at Edinburgh Sheriff Court in relation
    to allegations by Kenyan police of involvement in child trafficking. (BBC)
