Date: '2006-06-14'
Source_URI: Portal:Current events/2006 June 14
Intelligence_Payload:
  Uncategorized:
  - Violent riots in Conakry, Guinea continue. (CNN)
  - Ronnie Wood of The Rolling Stones admitted to a rehabilitation clinic to undergo
    treatment for alcohol abuse, (Sydney Morning Herald)
  - Two specimens of Mesozygiella dunlopi, dating to the Early Cretaceous and the
    oldest known orb-weaver spiders, are discovered in amber. (BBC)
  - The Islamic Courts Union captures the Somali town Jowhar from the secular warlords
    of the Alliance for the Restoration of Peace and Counter-Terrorism, one week after
    taking over Mogadishu. (BBC)
  - Abu Bakar Bashir is released from prison after serving a 26 month sentence for
    his role in the 2002 Bali bombing. (CNN)
  - State of Origin II at Suncorp Stadium, Brisbane, Australia is won by Queensland
    over New South Wales 30-6. This brings the 2006 State of Origin series to 1 all
    even after New South Wales won the first game on 24 May 2006
