Date: '2006-06-07'
Source_URI: Portal:Current events/2006 June 7
Intelligence_Payload:
  Uncategorized:
  - A meteorite impact event occurs in northern Troms County, Norway. Locals compare
    the resultant explosion to the nuclear explosion at Hiroshima. The impact location
    was apparently desolate, and no structural damage or casualties are reported.
    (Aftenposten) (PhysOrg)
  - A constitutional amendment to ban same-sex marriage is killed when it fails to
    gain the three-fifths majority required for cloture in the United States Senate.
    49 Senators voted for the motion, and 48 voted against. This also fell far short
    of the two-thirds majority that would have been required for passage. (ABC News)
  - A Syrian military court issues an arrest warrant for former Vice President of
    Syria Abdul Halim Khaddam on charges of inciting a foreign country to invade,
    and having contacts in Israel. Another military court sentences prominent pro-Democracy
    and pro-Kurd Syrian blogger Mohammad Ghanem to 6 months in prison after he is
    convicted of insulting the president, discrediting the Syrian government and fomenting
    sectarian unrest. (Al Jazeera)
  - Swiss investigator Dick Marty concludes that there are "serious indications" that
    the CIA operated secret prisons for suspected al-Qaeda leaders in Poland and Romania,
    adding that "authorities in several European countries actively participated with
    the CIA in these unlawful activities. Other countries ignored them knowingly,
    or did not want to know." (Washington Post)
