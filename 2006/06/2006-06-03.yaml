Date: '2006-06-03'
Source_URI: Portal:Current events/2006 June 3
Intelligence_Payload:
  Uncategorized:
  - Pakistan bans The Da Vinci Code film because it is said to contain blasphemous
    material about Jesus. (AP)
  - A strong quake measuring 5.2 on the Richter scale hits Southern Iran killing a
    young girl in the village of Ramkan. (Pakistan Daily Times)
  - The United States military finds its soldiers not guilty of any wrongdoing in
    the Ishaqi incident involving the deaths of 11 Iraqi civilians. (The Age)
  - Iranian President Mahmoud Ahmadinejad, while continuing to maintain that his country
    has the right to continue development on their nuclear technology, says that he
    "will not pass judgment on the proposals hastily," referring to the incentives
    package being offered by the US, Russia, United Kingdom, Germany, France and China
    in order to dissuade Iran from further nuclear development. (Reuters)
  - Human Rights Watch releases a video showing South Sudanese Vice President Dr.
    Riek Machar Teny Dhurgon bribing cult and rebel leader Joseph Kony and his second-in-command
    Vincent Otti of the Lord's Resistance Army to not attack southern Sudanese citizens.
    (Scoop)
  - A Russian diplomat is killed and four kidnapped in an attack near the Russian
    embassy in Baghdad, according to Russian and Iraqi officials. (BBC)
  - In a special session of parliament, Montenegro declares its independence from
    the State Union of Serbia and Montenegro. (AP)
  - '2006 Toronto terrorism arrests: The Royal Canadian Mounted Police announce the
    arrest of 17 suspected Islamic terrorists in connection with a planned terrorist
    attack around Toronto. The RCMP say that three tons of ammonium nitrate was seized.
    In comparison, the 1995 Oklahoma City bombing used one ton. (CBC), (CNN), (BBC),
    (Reuters), (VOA)'
  - Czech parliament election leaves the Czech Republic with an even split between
    party blocs.
  - In response to his million dollar bill gospel tracts being seized from The Great
    News Network by the United States Secret Service, Ray Comfort, founder of Living
    Waters Publications, states that he will refuse to turn over his supply of tracts
    without a warrant. (WorldNetDaily)
