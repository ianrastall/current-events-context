Date: '2006-01-06'
Source_URI: Portal:Current events/2006 January 6
Intelligence_Payload:
  Uncategorized:
  - Janjaweed militants cross the Sudanese border into Chad and attack the villages
    of Boroto, Ade, and Moudaina, killing nine and seriously wounding three others.
    Chad once again warns Sudan that it will retaliate for attacks by Janjaweed and
    UFDC rebel attacks. (Reuters)
  - '2005 Kashmir earthquake: SOS Children report gastroenteritis, pneumonia and bronchitis
    rife in emergency camps as landslides block route to Muzaffarabad. The organization
    now has a total of 106 children with missing parents in its care. SOS'
  - The People's Republic of China announces that the last surviving member of the
    Gang of Four, Yao Wenyuan, died on December 23, 2005. (BBC)
  - Zapatistas, led by Subcomandante Marcos, begin a six-month nationwide tour of
    Mexico to unite social movements for positive change. The tour coincides with
    presidential election campaigns. Marcos claims that the all the party candidates
    are liars and criminals who do not care about the Mexican people. (Scotsman)
  - 'Global spread of H5N1 in 2006: A third child from the same family in eastern
    Turkey dies of H5N1 avian influenza. Hülya Koçyiğit, 11, was the sister of Mehmet
    Ali, 14, who died last weekend, and of Fatma, 15, who died on Thursday. She was
    the third human fatality outside China and South-East Asia. A six-year-old brother
    is also being treated for the same disease. (Reuters) (Times)'
  - Israeli Prime Minister Ariel Sharon successfully undergoes a third round of surgery
    to correct a rise in cranial pressure. (AP)
  - The Supreme Court of India denies access to the Alang port to the French warship
    Clemenceau since it contains tonnes of asbestos. (BBC)
