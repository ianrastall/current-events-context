Date: '2006-01-21'
Source_URI: Portal:Current events/2006 January 21
Intelligence_Payload:
  Uncategorized:
  - Kosovo President Ibrahim Rugova dies at 61, after a lung cancer. He was the first
    President of Kosovo, and the leader of the Democratic League of Kosovo (LDK).
  - The Russian choreographer Igor Moiseyev, who founded the genre of balletic folk
    dance back in the 1930s, celebrates his centenary with a flamboyant show in the
    Moscow Kremlin Palace of Congresses. (New York Times)
  - Two miners, trapped after a coal mine fire on Thursday in Melville, West Virginia,
    are found dead. (CNN)
  - The "River Thames whale" dies during a rescue attempt. (BBC)
  - The British government confirms and defends the practice of holding DNA samples
    of minors on the UK National DNA Database. (BBC)
