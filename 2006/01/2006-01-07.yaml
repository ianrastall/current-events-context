Date: '2006-01-07'
Source_URI: Portal:Current events/2006 January 7
Intelligence_Payload:
  Uncategorized:
  - Four suspected militants fatally shoot two border-policemen in the back at a crowded
    weekend market in Yala province, Thailand, where the South Thailand insurgency
    continues since an increase in violence in January 2001. (The Nation)
  - The head of the UN peacekeeping force in Haiti, General Urano Teixeira da Matta
    Bacellar, is found dead. UN officials believe his death to be suicide. (BBC News)
  - Charles Kennedy, Leader of the Liberal Democrats, the third-largest political
    party in the United Kingdom, announces his resignation with immediate effect after
    unprecedented criticism from his party's MPs. This comes despite previous vows
    to stand in the leadership election he declared two days earlier. (BBC News)
  - Thirteen Sri Lankan soldiers are killed when a boat manned by Tamil Tiger rebels
    and filled with explosives rammed into a naval ship in the port city of Trincomalee.
    (CNN)
  - The prime minister of Israel Ariel Sharon has been transferred to a radiography
    theater to undergo a CT scan to determine the level of pressure on his brain.
    (Ynetnews)
  - A US military helicopter UH-60 Blackhawk has crashed in northern Iraq near Talafar.
    All 12 persons on board have been killed. (BBC)
  - The president of Poland Lech Kaczyński performed a motion tabled by the prime
    minister Kazimierz Marcinkiewicz and dismissed the minister of finance Teresa
    Lubińska, nominating on her place Zyta Gilowska and giving her a position of deputy
    premier.
