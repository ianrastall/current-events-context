Date: '2006-01-22'
Source_URI: Portal:Current events/2006 January 22
Intelligence_Payload:
  Uncategorized:
  - British diplomats are accused of spying on Russia using a fake rock. (BBC)
  - Evo Morales is inaugurated as President of Bolivia, becoming the country's first
    indigenous American president. (ABC News)
  - Fears of sabotage ensue after explosions of two gas pipelines in Russia's North
    Ossetian Republic suspend gas supply to Georgia and Armenia. (BBC)
  - Kobe Bryant scores 81 points against the Toronto Raptors, the third highest in
    NBA history, next to Wilt Chamberlain's 100 and Bam Adebayo's 83.
