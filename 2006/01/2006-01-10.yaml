Date: '2006-01-10'
Source_URI: Portal:Current events/2006 January 10
Intelligence_Payload:
  Uncategorized:
  - The defence lawyer in the O'Connor - Keogh official secrets trial is shown the
    secret Al Jazeera bombing memo and declares that it posed no threat to national
    security. He vows to have it made public by the court. The case will return to
    court on January 24. (The Guardian) (San Francisco Chronicle)
  - Amnesty International claims torture and ill-treatment of terrorist suspects on
    the fourth anniversary of detainees being held without charge at Camp Delta in
    Guantanamo Bay, Cuba. (Forbes)
  - Japanese whalers and anti-whaling environmental groups continue to clash in Antarctic
    waters near Australia, as calls for the Australian Government to intervene intensify.
    (ABC)
  - Ukraine's parliament dismisses the Cabinet over its gas deal with Russia. (Yahoo!)
  - Iran's standoff from the UN and the west deepens as the UN seals on the Natanz
    nuclear processing plant are broken. (BBC)
  - British Prime Minister Tony Blair sets out his Respect agenda. (BBC)
  - A fifteenth case of H5N1 is reported in Turkey. However, the Turkish government
    declares that the virus is "under control". (BBC)
  - The Pakistani army announces that seven soldiers and fourteen suspected militants
    have been killed in fighting in the Waziristan area. (BBC)
