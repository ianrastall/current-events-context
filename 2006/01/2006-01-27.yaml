Date: '2006-01-27'
Source_URI: Portal:Current events/2006 January 27
Intelligence_Payload:
  Uncategorized:
  - French President Jacques Chirac is successfully hoaxed by a Canadian DJ pretending
    to be Stephen Harper. (CNN)
  - European leaders remember the Holocaust, with the 61st anniversary of the liberation
    of the Auschwitz death camp. (Yahoo!)
  - A 7.7 magnitude earthquake strikes the Banda Sea of eastern Indonesia. (USGS)
  - The world honours Mozart on his 250th birthday anniversary. (CTV)
  - President Mikhail Saakashvili of Georgia pledges to end his country's energy crisis
    by importing Iranian natural gas. Starting Monday, Georgia will import m3 of gas
    a day at $120/m3, $10 more than for Russian gas. Georgia's supply of Russian gas
    has been interrupted since Sunday due to pipeline explosions. Saakashvili has
    accused Moscow of sabotage for political gain. (RIA Novosti)
