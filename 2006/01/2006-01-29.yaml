Date: '2006-01-29'
Source_URI: Portal:Current events/2006 January 29
Intelligence_Payload:
  Uncategorized:
  - Libya closes its embassy in Denmark over the Muhammad Drawings controversy. (BBC)
  - Al-Jazeera releases two separate videos, one of Ayman al-Zawahiri condemning the
    bombing of Damadola and the other of Jill Carroll again pleading for the release
    of female prisoners so her life will be spared. (Yahoo!), (Reuters)
  - ABC World News Tonight co-anchor Bob Woodruff and cameraman Doug Vogt are seriously
    injured by an improvised explosive device near Taji, Iraq. (ABC News)
  - Tarja Halonen is re-elected in the second round of the Finnish presidential election
    with 51.8% of the votes, defeating the other candidate Sauli Niinistö. (Helsingin
    Sanomat)
  - An explosion in a firecracker warehouse kills 16 people in Henan on Chinese New
    Year. (Reuters)
  - Sabah Al-Ahmad Al-Jaber Al-Sabah is confirmed as the new emir of Kuwait, ending
    a two-week leadership crisis. (BBC)
