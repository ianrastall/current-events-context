Date: '2006-01-25'
Source_URI: Portal:Current events/2006 January 25
Intelligence_Payload:
  Uncategorized:
  - Lucia Pinochet, daughter of former Chilean dictator Augusto Pinochet, asks for
    political asylum in the United States following her arrest at Washington Dulles
    International Airport on a Chilean arrest warrant for tax evasion. (Tampa Bay
    Times)
  - A study in the New England Journal of Medicine reveals that Trasylol, a drug marketed
    by Bayer, designed to prevent excessive blood loss during heart surgery, doubles
    the risk of kidney failure and stroke. (Reuters)
  - An international team of astronomers discovers the most earth-like exoplanet found
    thus far. The planet, OGLE-2005-BLG-390Lb, is about 25,000 light years away, close
    to the centre of the Milky Way. (Nature).
  - Microsoft, in an effort to resolve a controversy with the antitrust authorities
    of the European Community, announced that it will license some of its source code
    to rivals. (CNET)
  - Google's launch of a new, self-censored search engine in China is a "black day"
    for freedom of expression, says leading international media watchdog Reporters
    without Borders. (BBC)
  - Ryanair, Europe's largest low-cost carrier, and the world's most profitable airline,
    announces that it intends to charge up to €7 per bag checked in by customers.
    In return, the airline fares will drop by 9%. (RTÉ.ie)
  - Uzbekistan joins the Eurasian Economic Community. (Interfax)
  - Deus caritas est (), the first encyclical of Pope Benedict XVI, is published.
    (BBC)
  - '2006 Palestinian elections: Palestinians prepare for the first elections to the
    PLC in ten years. (BBC)'
