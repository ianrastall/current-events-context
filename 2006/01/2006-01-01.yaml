Date: '2006-01-01'
Source_URI: Portal:Current events/2006 January 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least three Qassam rockets landed in the western Negev, despite Israel Defense
    Forces' Operation Blue Skies. At least one Qassam rocket landed in Sderot, in
    which the Red Dawn alert system was activated around 15:30. Two Qassam rockets
    landed in an open area near Israeli communities in the western Negev. In all the
    cases there were no injuries. (Ynetnews)
  Disasters and accidents:
  - Sydney, Australia swelters through its second hottest day in its history and its
    hottest new years day on record. The mercury was pushed up to 44.2°C (111.56°F)
    on Observatory Hill, Sydney and 45.2°C (113.36°F) on Sydney Airport. This heatwave
    caused 40 bushfires to emerge in Australia's east coast along with power blackouts.
  - Tropical Storm Zeta continues activity in the Atlantic Ocean, becoming only the
    second North Atlantic tropical cyclone to exist across two calendar years and
    extending the already historic 2005 Atlantic hurricane season even further. (CNN)
  - Residents brace as a second winter storm hits the region, a day after the first
    caused floods and mudslides across northern California. (LA Times) (AP via Yahoo!)
  International relations:
  - Iranian President Mahmoud Ahmadinejad accuses European nations of trying to complete
    the Holocaust by creating a "Jewish camp" Israel in the Middle East. "Don't you
    think that continuation of genocide by expelling Jews from Europe was one of their
    aims in creating a regime of occupiers of Al-Quds (Jerusalem) Isn't that an important
    question?" He went on to say that Europe should cede some of their territory for
    a Jewish state, and that anti-Semitism has a long history in Europe, while Jews
    have lived peacefully among Muslims for centuries. (Reuters)
  - Russia-Ukraine gas dispute
  - Russian natural gas supplier Gazprom cuts gas supplies to Ukraine, following Ukraine's
    rejection of a 460% price increase. President Vladimir Putin had offered a three-month
    price freeze if Ukraine would agree to pay the higher price thereafter, but this
    was rejected. Ukraine pays US$50 per 1000 cubic metres, Russia claims the market
    rate is $230. (BBC)
