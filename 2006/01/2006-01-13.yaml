Date: '2006-01-13'
Source_URI: Portal:Current events/2006 January 13
Intelligence_Payload:
  Uncategorized:
  - 'The U.S. CIA attempts to kill Ayman al-Zawahiri by bombing Damadola, Pakistan,
    a village near the Afghanistan border. The attack kills at least 18 people: eight
    men, five women and five children. Anonymous U.S. government sources claim he
    was invited to a feast in the village, but did not attend. (CNN)'
  - Augustine Volcano in Alaska has erupted five times in the past three days, the
    first eruptions in nearly two decades. The island is uninhabited. (National Geographic)
  - Tyco International announces that it will split itself into three companies, spinning
    off Tyco Healthcare and Tyco Electronics. (Tyco)
