Date: '2006-01-12'
Source_URI: Portal:Current events/2006 January 12
Intelligence_Payload:
  Uncategorized:
  - The foreign ministers of Britain, France, and Germany declare that negotiations
    with Iran over its nuclear program have reached a "dead end." They recommend that
    Iran be referred to the United Nations Security Council, where the nation may
    face sanctions. (ABC)
  - A stampede during the Stoning the Devil ritual on the last day at the Hajj in
    Mina, Saudi Arabia, kills at least 362 Muslim pilgrims. A similar crush claimed
    244 pilgrims' lives at the same spot in 2004. (BBC)
  - Mehmet Ali Ağca, who tried to assassinate Pope John Paul II in 1981, is released
    from jail. (BBC)
  - The French warship Clemenceau reaches Egypt and is barred access to the Suez Canal.
    Two Greenpeace activists board the ship. (BBC)
