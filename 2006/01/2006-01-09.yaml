Date: '2006-01-09'
Source_URI: Portal:Current events/2006 January 9
Intelligence_Payload:
  Uncategorized:
  - General Sir Michael Rose, former United Nations commander in Bosnia, has told
    the BBC that British Prime Minister Tony Blair should be "impeached" over the
    Iraq War. (BBC)
  - Ahmad Kazemi, the top commander of Iran's Revolutionary Guards ground forces,
    and ten others have been reportedly killed when their plane crashed in northwestern
    Iran. (IRNA) (BBC)
  - The Prime Minister of Israel Ariel Sharon has started breathing independently
    after doctors reduced the inflow of anaesthetic drugs in an attempt to waken the
    prime minister from deep sedation. (Ynetnews)
  - U.S. Vice President Dick Cheney was hospitalized when he complained of breathing
    trouble. He was later released from the hospital. (AP via Yahoo!)
  - Howard Stern debuted on Sirius Satellite Radio, ending a nearly 30-year run on
    terrestrial radio.
  - The Phantom of the Opera surpassed Cats as the longest running Broadway musical
    with its 7,486th performance.
  - A bus catches fire in downtown Rio Grande, Brazil. All passengers were rescued
    by bystanders and 27 people were injured.
