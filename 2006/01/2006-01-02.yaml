Date: '2006-01-02'
Source_URI: Portal:Current events/2006 January 2
Intelligence_Payload:
  Arts and culture:
  - Several exploits of a severe Windows security vulnerability are spreading over
    the Internet, permitting compromise of any Windows computer merely by viewing
    a maliciously crafted image on a website or in e-mail or instant messaging. No
    patch from Microsoft is available, however an unofficial patch exists Hexblog.com.
    The vulnerability affects every version of Windows, potentially affecting more
    computers than any prior computer security vulnerability in history. (Microsoft)
    (CERT) (Slashdot) (Sans) (F-Secure)
  Russia–Ukraine gas dispute:
  - Countries across Europe report reductions in gas supplies after Russia disconnected
    supplies to Ukraine yesterday. Russia accuses Ukraine of stealing cubic metres
    of gas yesterday from pipelines transiting the country; Ukraine denies this but
    has previously claimed the right to 15% of the gas as a transit toll. Hungary
    reports supplies are down by 40%, France and Italy by 30%, and Poland by 14%.
    Germany, Russia's principal customer, also reports reductions. Russian supplier
    Gazprom says that it will increase supplies and return them to normal by Tuesday
    night. (Sky News)
  Disasters and accidents:
  - Thirteen U.S. coal miners are trapped after an underground explosion in Upshur
    County, West Virginia. (ABC)
  - Eleven people are killed when the roof of an ice rink collapse in Bad Reichenhall,
    southern Germany, under the weight of recent snowfall, trapping some 50 skaters
    underneath. (CNN)
  - Severe storms affected East Java, Indonesia, leading to flooding and landslides.
    At least 57 people are believed to have been killed in the flooding and up to
    a further 200 people were assumed to be buried alive in the town of Cijeruk 350
    kilometers east of Jakarta. (BBC)
  Law and crime:
  - Ugandan presidential candidate Kizza Besigye is released from prison. Besigye
    was arrested on November 14 on treason and rape charges. (News24)
  - Police are investigating the New Year's Day murder of Bryan Harvey, who with his
    wife and two young daughters were found dead with their throats slashed in the
    basement of their South Side Richmond, Virginia, home, which was then set afire.
    Harvey was former singer and guitarist of 1980s band House of Freaks and his wife
    was the half-sister of Steven Culp, who played Rex Van De Kamp on Desperate Housewives.
    The fire was discovered by Johnny Hott, HOF bandmate and drummer for the band
    Cracker (ABC) wikinews (New York Daily News) (Billboard)
  Politics and elections:
  - The leader of the Maoist guerrillas in Nepal issued a statement that his group,
    the People's Liberation Army, will resume its war with the monarchy after a four-month
    truce. (New Kerala)
