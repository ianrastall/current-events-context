Date: '2006-01-05'
Source_URI: Portal:Current events/2006 January 5
Intelligence_Payload:
  Uncategorized:
  - Peru recalls Carlos Urrutia, its ambassador to Venezuela, after Venezuelan President
    Hugo Chávez praises Peruvian presidential hopeful Ollanta Humala for his left-leaning
    policies. A spokeswoman for the Peruvian Foreign Ministry stated, "There are concerns
    of political meddling in Peru's electoral affairs and comments by President Chávez
    were out of place." (Yahoo! News)
  - The leader of Britain's Liberal Democrat Party, Charles Kennedy, admits being
    treated for alcohol-related problems for the last 18 months but has not drunk
    for the last two months. The revelation comes following mounting criticism of
    his leadership from party MPs. He calls a party leadership election, in which
    he will stand. (BBC)
  - At least 130 people have died following insurgent attacks on the Iraqi cities
    of Kerbala and Ramadi. (BBC)
  - At least 76 people have died following the collapse of a five-story hotel in Mecca.
    The death toll is expected to rise. Most of the dead are foreign Muslim pilgrims
    who had made their way there for the Hajj. (Forbes)
  - Hewlett-Packard, a computer manufacturing giant, and a private equity firm, the
    Blackstone Group, may bid for Computer Sciences Corporation, according to anonymous
    sources cited by The Wall Street Journal. (thestreet.com)
