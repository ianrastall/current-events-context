Date: '2006-01-03'
Source_URI: Portal:Current events/2006 January 3
Intelligence_Payload:
  Uncategorized:
  - U.S. pilots targeting a house outside of Baghdad where they believed insurgents
    had taken shelter killed a family of 12. (Washington Post)
  - Israeli television claims that Police in Tel Aviv found evidence that proves Prime
    Minister of Israel Ariel Sharon's family took bribes while Sharon was running
    for the leadership of the Likud Party. An aide dismissed the allegations. (BBC)
  - 'Sago Mine disaster: In West Virginia, US, family members now say only one trapped
    miner has been brought out alive from the collapsed coal mine. All 12 others are
    dead. Earlier news reports, at approximately EST, indicated that 12 miners were
    found alive. Rescue crews found one body late Tuesday after 13 miners were trapped
    following an explosion on Monday. (Yahoo!) (ABC)'
  - 'Russia-Ukraine gas dispute: The Russian and Ukrainian natural gas companies agree
    to end their dispute and resume gas supply to Ukraine under a complex price scheme
    in which OAO Gazprom will sell gas to the Rosukrenergo trading company (owned
    by Gazprom Bank and Raiffeisen Bank) for US$230 (E195) per 1,000 cubic meters
    as of Jan. 1, and Ukraine will buy gas from the company for US$95 (E80). (IHT)'
  - Chinese journalist and whistleblower Jiang Weiping, who was jailed in 2000 for
    violating the State Secrets Law on charges of "subversion," is released after
    the one year left on his prison sentence is commuted. In 1999 Jiang wrote two
    articles for a Hong Kong magazine accusing Bo Xilai, who at the time was governor
    of Liaoning province, but is now China's economic minister, of covering up corruption.
    (Reuters)
  - 'Conflict in Iraq: Six members of the same family of 14 have been confirmed killed
    following a U.S. airstrike in Northern Iraq. (BBC)'
  - 'Israeli-Palestinian Conflict: Israel Police prevents Palestinians in East Jerusalem
    from campaigning in the upcoming Elections in the Palestinian National Authority.
    (BBC)'
  - Rescue workers are still battling to find survivors after the roof of an ice rink
    collapsed in Bad Reichenhall, southern Germany, leaving at least 10 people dead,
    some of them children. It is thought many are still trapped under the rubble.
    (BBC)
  - Bidding continues in an international auction for Canadian steel company Dofasco
    Inc., Hamilton, Ont. – the latest bid, , came Tuesday from German steelmaker ThyssenKrupp
    AG. (CBC Business News)
  - Four years after defaulting on its external debt, Argentina pays its USD debt
    with the International Monetary Fund. (Reuters)
  - Jack Abramoff of the Jack Abramoff lobbying and corruption scandal pleads guilty
    to federal conspiracy, fraud and tax evasion charges. According to NPR, this puts
    Abramoff on the prosecutor's side and he is expected to cooperate in the continuing
    investigation that could involve "up to 20 members of Congress" (NPR). The court
    filing is available as a PDF on NPR.org
  - Mirant Corp., Atlanta, Georgia, a power generation company that filed for bankruptcy
    court protection in July 2003, emerges from Chapter 11 status after converting
    more than of debt and liabilities into equity. (company website)
