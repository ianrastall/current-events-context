Date: '2006-01-08'
Source_URI: Portal:Current events/2006 January 8
Intelligence_Payload:
  Uncategorized:
  - An estimated two million Muslims officially begin the annual pilgrimage, or hajj,
    in Mecca, Saudi Arabia (CNN).
  - Singapore holds its largest civil counter-terrorism exercise, codenamed Exercise
    Northstar V, simulating bombing and chemical attacks at four Mass Rapid Transit
    stations and a bus interchange. Thirteen MRT stations and part of Toa Payoh Bus
    Interchange are closed for three hours, causing travel disruptions for over 15,000
    commuters and triggering a response from some 2,000 personnel from 22 governmental
    organizations. (CNA)
  - A strong earthquake measuring 6.7 on the moment magnitude scale hits Greece at
    13:34. The earthquake's epicentre was in the sea region 25 km east of the island
    of Kythira, about 200 km south of Athens. Although it was felt as far as Sicily,
    south Italy, Egypt, and Amman in Jordan, it was not disastrous due to its deep
    hypocentre and the sea-bed epicentre. Little damage (mainly in Kythira) and few
    light injuries are reported. (CNN.com) (USGS)
