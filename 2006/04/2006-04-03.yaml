Date: '2006-04-03'
Source_URI: Portal:Current events/2006 April 3
Intelligence_Payload:
  Uncategorized:
  - The jury in the first phase of the trial of Zacarias Moussaoui has decided that
    he is eligible for the death penalty. (CNN)
  - A large air force C-5 Galaxy military cargo jet crashed when landing at Dover
    Air Force Base in the U.S. state of Delaware. (CNN)
  - Judge Anand Satyanand has been appointed to succeed Dame Silvia Cartwright as
    Governor-General of New Zealand. He will take up office on August 4, 2006. (Beehive)
  - The University of Florida Gators beat the UCLA Bruins, 73-57, to win the 2006
    NCAA Division I Men's Basketball Tournament. (ESPN)
