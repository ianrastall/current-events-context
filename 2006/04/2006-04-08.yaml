Date: '2006-04-08'
Source_URI: Portal:Current events/2006 April 8
Intelligence_Payload:
  Uncategorized:
  - 'Shedden massacre: The bodies of eight members of the infamous Bandidos biker
    group are found by a resident in a cornfield in southwest Ontario, Canada. The
    incident is considered a cleansing of the gang''s inner circle. The Ontario Provincial
    Police launch a full-scale murder investigation. (CBC) (London Free Press (Ontario))
    (National Nine News)'
  - The United Front for Democratic Change has attacked and gained control of the
    cities of Haraze Mangueigne, Am Timan, and Abou-Deia, in Chad. Their initial attack
    came from northern Central African Republic with the help of the Military of Sudan.
    This is the largest and most successful attack since the start of the Chadian-Sudanese
    conflict despite taking only an hour, with only four men injured and none killed
    because the Chadian military has either fled or refused to fight the rebels. (AlertNet)
  - The death toll in the Djibouti ferry disaster reaches 109. (Reuters)
  - The Aligarh Riots between Hindus and Muslims enter its fourth day. At least five
    people have been killed in the rioting in the North Indian town of Aligarh so
    far. (Reuters)
  - Three protesters are wounded and six buildings are burned down in the fourth day
    of the pro-Democracy general strike in Nepal against King Gyanendra. (AFP)
  - The World Health Organization announces that the average life expectancy of Zimbabweans
    has declined to 37 years for men and 34 years for women. (BBC)
  - Newcastle Falcons sevens team win the annual Melrose Sevens rugby tournament in
    Scotland. They beat Edinburgh team Heriots in the final.
