Date: '2006-04-12'
Source_URI: Portal:Current events/2006 April 12
Intelligence_Payload:
  Uncategorized:
  - United Front for Democratic Change rebels approach N'Djamena, the capital of Chad.
    (BBC)
  - Coronary specialist Sir Magdi Yacoub operates on Welsh schoolgirl cardiomyopathy
    patient Hannah Clark, whose original heart is reconnected, after a donor heart
    was rejected by her body. This is a UK-first organ-replacement reversal. (BBC)
  - The UK's Terrorism Act 2006 comes into force, making illegal the act of glorifying
    terrorism. (BBC)
  - 'Sri Lankan Civil War: coordinated bombings and rioting in the north-eastern part
    of the country leaves 16 dead. A claymore anti-personnel mine explodes in Trincomalee,
    killing two policemen in their vehicle. Another blast set off in a crowded vegetable
    market kills one soldier and civilians. Ensuing rioting leaves more than a dozen
    dead. Authorities have blamed LTTE rebels for the recent attacks since Monday.
    (BBC) (Reuters)'
  - Fossils of Australopithecus anamensis help bridge a long gap during a crucial
    phase of human evolution. (BBC)
