Date: '2006-04-06'
Source_URI: Portal:Current events/2006 April 6
Intelligence_Payload:
  Uncategorized:
  - An earthquake of 5.5 magnitude is reported in Western Gujarat in India. (ASC-India.org)
  - The World Meteorological Organization has announced the retirement of a record
    five storm names from the 2005 Atlantic hurricane season. Retired names include
    Dennis, Katrina, Rita, Stan and Wilma. (CNN)
  - The National Geographic Society unveils the restored Gospel of Judas in Washington,
    D.C. Written in Coptic, the document is thought to have come from the 2nd century.
    It had been deteriorating rapidly when found. (NPR)
  - A 1,500-year-old pyramid called the Hill of the Star has been found in Mexico
    City. (The Guardian) (BBC)
  - Orthodox Jews in Boro Park in New York City continue to protest after a 75-year-old
    Hasidic man was beaten and arrested by police for talking on a cell phone while
    driving. NYPD Chief Joseph Esposito allegedly cursed out the protestors in anti-Semitic
    terms, resulting in condemnations and calls for him to step down. (New York Sun)
  - Palaeontologists announce the discovery of the Tiktaalik genus, an important fossil
    link between fish and land animals. (BBC)(The Guardian)(The New York Times)
  - Israeli police arrest and release Khaled Abu Arafa, minister of Jerusalem affairs
    in the new Hamas-led government of the Palestinian Authority. (Associated Press)
  - The Parliament of New Zealand passes a bill that on receiving Royal Assent will
    make New Zealand Sign Language the third official language of New Zealand, alongside
    English and Māori. (TVNZ)
  - Health experts announce that a dead swan found in Scotland has tested positive
    for bird flu. It has been further confirmed that the bird had the deadly H5N1
    strain of the virus (Bloomberg). Scotland and the UK confirm H5N1 virus, but say
    a GB-wide poultry housing requirement would be "disproportionate." (Farmers Weekly)
    (BBC)
