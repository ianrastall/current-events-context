Date: '2006-04-17'
Source_URI: Portal:Current events/2006 April 17
Intelligence_Payload:
  Uncategorized:
  - A general strike in Nepal called by political parties opposed to King Gyanendra
    enters its 12th day, with food shortages and price rises triggering panic buying
    in some areas. (BBC) Security forces fatally shot a protester and wounded five
    in Nijgadh, 75 miles south of Katmandu. (CNN)
  - 21-year-old Palestinian Sami Hammad, a suicide bomber, blew himself up at the
    old central bus station in southern Tel Aviv, in the Neveh Sha'anan neighborhood.
    Eleven people were killed and 70 more were wounded in the blast. The Palestinian
    Islamic Jihad has taken responsibility for the bombing. A Hamas spokesman calls
    the attack an "act of self-defense." (Haaretz) (Ynetnews) (CNN) (BBC)
