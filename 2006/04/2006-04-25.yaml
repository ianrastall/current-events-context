Date: '2006-04-25'
Source_URI: Portal:Current events/2006 April 25
Intelligence_Payload:
  Uncategorized:
  - 'Sri Lankan Civil War: A suspected Tamil Tiger suicide bomber attacks the Sri
    Lankan Army headquarters in the capital, Colombo, killing 8. Twenty-seven have
    been injured, including the army commander Lieutenant General Sarath Fonseka,
    as the female suicide bomber, pretending to be pregnant to conceal explosives,
    detonates her bomb near the military''s hospital. The Sri Lankan military has
    begun aerial assaults on rebel positions in the north-eastern part of the island
    nation. (BBC), (MumbaiMirror), (Reuters)'
  - Abu Musab al-Zarqawi appears unmasked in a newly released video taunting the "crusade"
    by the American-led coalition and Iraqi authorities. At one point, he addresses
    U.S. President George W. Bush. (BBC), (CNN)
  - 'The UN Security Council votes to impose sanctions on four Sudanese citizens involved
    in the Darfur conflict: Maj.-Gen. Gaffar Mohamed Elhassan of the Sudanese Air
    Force; Sheikh Musa Hilal, paramount chief of the Jalul Janjaweed tribe in North
    Darfur; Commander Adam Yacub Shant of the Sudanese Liberation Army; and Commander
    Gabril Abdul Kareem Badri of the National Movement for Reform and Development.
    The vote marks the first time UN sanctions have been adopted against individuals
    involved in this conflict. (CBC), (BBC)'
  - In the Philippines, 49 people are charged with rebellion over an alleged plot
    to overthrow President Gloria Macapagal-Arroyo in February 2006. (CBC), (BBC)
  - The Communist Party of Vietnam announces at the closing of the Tenth National
    Congress that Nông Đức Mạnh will be re-appointed as its general secretary for
    another five-year term. Other key positions, such as those of prime minister and
    president, are yet to be appointed. New faces are expected. (BBC)
  - Darwin, Australia, is spared a projected direct hit by Cyclone Monica. (BBC)
