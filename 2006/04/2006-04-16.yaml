Date: '2006-04-16'
Source_URI: Portal:Current events/2006 April 16
Intelligence_Payload:
  Uncategorized:
  - In Dublin, Irish military forces parade for the first time since 1970 in commemoration
    of the 1916 Easter Rising. Taoiseach Bertie Ahern lays a wreath at Kilmainham
    Jail, where most of the rebel leaders were subsequently shot, in memory of the
    civilian and military dead of both sides. (BBC)
  - Hu Jintao, General Secretary of the Communist Party of China, holds an official
    meeting and banquet with the Honorary Chairman of the Nationalist Party of China
    (Kuomintang), Lien Chan. The two reached on the new "15 Favourable Policies" on
    relations between the Chinese mainland and Taiwan. (People's Daily)
