Date: '2006-04-02'
Source_URI: Portal:Current events/2006 April 2
Intelligence_Payload:
  Uncategorized:
  - In Thailand, the 2006 legislative election is held. All three major opposition
    parties have announced they are boycotting the election. (Indep. UK)
  - An outbreak of tornadoes, the April 2, 2006 Tornado Outbreak, hits northeastern
    Arkansas, the Missouri Bootheel, and West Tennessee killing 27.
  - Lucent Technologies announced its merger agreement with Alcatel. (BBC)
  - The Human Rights Protection Party wins Samoa's general election. The HRPP was
    already the ruling party, and its leader Tuila'epa Sailele Malielegaoi the Prime
    Minister, but the party did better in the election than polls had indicated. (Radio
    NZ)
  - After about three months captivity as a hostage in Iraq, American journalist Jill
    Carroll returns to American soil in Boston, Massachusetts. (CNN)
