Date: '2006-04-04'
Source_URI: Portal:Current events/2006 April 4
Intelligence_Payload:
  Uncategorized:
  - '2006 labor protests in France: Three million people march against the First Employment
    Contract (CPE) law, 700 000 in Paris. Student organizations call for a general
    strike. (Washington Post)'
  - In the Republic of Ireland, Denis Donaldson a former senior Sinn Féin member,
    is found shot dead near the village of Glenties, County Donegal, close to where
    it is believed he had been living since he admitted, in December 2005, to being
    a paid British agent for over twenty years. (BBC)
  - 'Thailand legislative election, April 2006: Thaksin Shinawatra resigns as Prime
    Minister of Thailand despite his ruling Thai Rak Thai party winning an overwhelming
    majority in the House of Representatives. (BBC)'
  - A security expert testifies to an inquest that film director James Miller was
    shot intentionally by an Israeli soldier while making a film in a Palestinian
    refugee camp in the Gaza Strip. (The Independent) (BBC)
  - Former Majority Leader Tom DeLay announces his resignation from the United States
    House of Representatives. (TIME)
  - The 39th Canadian Parliament opens in Ottawa, with the Speech from the Throne
    delivered by the Governor General on behalf of the newly elected government of
    Stephen Harper. (Toronto Star)
