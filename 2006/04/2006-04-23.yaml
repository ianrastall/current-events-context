Date: '2006-04-23'
Source_URI: Portal:Current events/2006 April 23
Intelligence_Payload:
  Uncategorized:
  - Osama Bin Laden calls for Jihad against "Crusaders" in Darfur in audiotape released
    to Al Jazeera. (Reuters)
  - 'Parliamentary elections in Hungary: The Hungarian Socialist Party wins with a
    plurality of the votes and will therefore continue to govern in coalition with
    the Alliance of Free Democrats; it also becomes the first re-elected government
    of Hungary since the end of the Cold War. (BBC) (Washington Post) (Washington
    Post/Reuters)'
  - 'Elections in the Solomon Islands: Beijing begins to evacuate ethnic Chinese from
    Solomon Islands following Anti-Chinese riots during the election protests that
    destroyed the Chinatown. (Xinhua) (Washington Post)'
  - Cyclone Monica, a Category 5 cyclone on the Australian and Saffir-Simpson scales,
    threatens Australia's northern coast including the city of Darwin. The Australian
    Bureau of Meteorology has warned of "dangerously high tides" that may cause "extensive
    flooding" along part of the coast and ordered the sounding of emergency sirens
    in the Gove Peninsula. Alcan, the world's second-biggest aluminium producer, has
    warned customers of potential interruptions to supplies on contracts from its
    Gove refinery. (Bloomberg)
  - A silent march through Brussels, Belgium, takes place with 80,000 participants,
    following the murder on April 12 of a teenager, stabbed at rush hour in Brussels
    Central Railway station when he refused to hand over his MP3 player. (VRT) (Le
    Soir)
  - 'Sri Lankan Civil War: six Sinhalese rice farmers are executed in their paddy
    fields by suspected Tamil Tigers terrorists in the northeastern Trincomalee district.
    (AlertNet)'
  - Peru declares a state of emergency in towns near the volcano Ubinas. (Reuters)
