Date: '2006-04-10'
Source_URI: Portal:Current events/2006 April 10
Intelligence_Payload:
  Uncategorized:
  - Preliminary results from the general election in Peru shows Ollanta Humala leading,
    but certain to face a runoff election in late May or early June. Alan García is
    narrowly leading Lourdes Flores for second place and a spot in the runoff. (Bloomberg)
    (BBC)
  - Non-violent demonstrations for immigrant rights are held in dozens of U.S. cities
    today in opposition to H.R. 4437, which would classify illegal aliens as felons.
    (Reuters) (New York Times) (AP via Wired)
  - 'Shedden massacre: Ontario Provincial Police announce that five people have been
    arrested and charged with first-degree murder in connection with the slaying of
    eight people found dead in southwestern Ontario, Canada. The OPP also confirms
    that the deaths were connected to an "internal cleansing" of the Bandidos biker
    gang. (CBC)'
  - Matthias Platzeck resigns from the Chair of Germany's Social Democratic Party
    (SPD) after suffering a major hearing loss in March 2006 because of occupational
    stress. The next SPD chairman will be Kurt Beck (Minister President of Rhineland-Palatinate).
    (BBC)
  - 'Italian general election, 2006: Romano Prodi declares victory in a tight election
    as preliminary results show L''Unione (The Union) ahead of Silvio Berlusconi''s
    House of Freedoms by 0.1 percent in the Chamber of Deputies, but Berlusconi refuses
    to concede. (BBC) (La Stampa)'
  - The government of France announces the withdrawal of its youth employment law.
    The proposed law had catalyzed more than a month of sometimes-violent protests
    on the streets of Paris and other cities. (Washington Post)
  - 'Sri Lankan Civil War: a claymore mine explodes in northern Jaffna, killing five
    soldiers on patrol and two civilians working for the Caritas Internationalis aid
    agency. (BBC)'
  - Pakistan's foreign office declares that the United States did not keep it fully
    informed about the Indo-US nuclear deal as the information shared initially with
    it did not match the final agreement. (Pakistan Link) (The Dawn, Pakistan)
  - '2006 Kenya plane crash: A Kenyan military plane crashed killing a number of politicians.
    (Al Jazeera)'
