Date: '2006-04-07'
Source_URI: Portal:Current events/2006 April 7
Intelligence_Payload:
  Uncategorized:
  - For the second time in less than a week, a number of tornados strike the U.S.
    states of Tennessee, Kentucky, and Indiana. (FOX News)
  - The Da Vinci Code author Dan Brown and his publisher, Random House, win the lawsuit
    that claimed that Brown committed copyright infringement by using ideas similar
    to those in The Holy Blood and the Holy Grail. (CNN)
  - At 10 o'clock UTC NASA's Pluto probe New Horizons crossed the orbit of Mars, after
    78 days journey. This is a new Earth-to-Mars-distance flight record.
