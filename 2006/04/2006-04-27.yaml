Date: '2006-04-27'
Source_URI: Portal:Current events/2006 April 27
Intelligence_Payload:
  Uncategorized:
  - The Scottish National Party wins the Moray by-election, 2006 for the Moray constituency
    to the Scottish Parliament. (BBC)
  - The Government of Chad and the World Bank end a four-month-long dispute over allocation
    of Chadian petroleum funds. The World Bank will allow Chad to spend more of its
    oil revenue on its military in exchange for a resumption of oil output through
    the Chad-Cameroon pipeline. (New York Times)
  - Construction begins on the Freedom Tower in New York City breaking a deadlock
    between the Port Authority of New York and New Jersey, which owns the site, and
    private developer Larry Silverstein. The 1,776-foot tower is the centerpiece of
    the rebuilding effort for the World Trade Center, which was destroyed in the September
    11, 2001, attacks. (BBC)
  - 'Nepal Civil War: Maoist insurgents in Nepal, responding to a demand by the newly
    appointed prime minister Girija Prasad Koirala, announce a unilateral three-month
    truce. Kathmandu gradually resumes normality after weeks of pro-democracy protests.
    (BBC), (VoA)'
  - The head of the London Stock Exchange publicly warned the president of Russia,
    Vladimir Putin, that his recent decision to bar the head of a large equity fund
    from that country could send "a very negative signal" to the world's equity markets.
    (Guardian)
  - In Israel, the centrist Kadima party forms a coalition government with the left-leaning
    Labor party. (CBC), (Reuters)
  - The Metro Rail project for Bangalore City (India) has been cleared and work on
    the project will begin soon. The implementation of this project aims at decongesting
    the traffic and streamlining the public transport system in the city. Bangalore,
    also known as the Silicon Valley of India, is one of the most congested cities
    in India.
