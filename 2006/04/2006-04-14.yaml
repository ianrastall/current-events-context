Date: '2006-04-14'
Source_URI: Portal:Current events/2006 April 14
Intelligence_Payload:
  Uncategorized:
  - Iranian president Mahmoud Ahmadinejad criticizes Israel in a three-day conference
    attended by Palestinian Hamas officials. He calls the Israeli regime "a rotten,
    dried tree that will be eliminated by one storm." (Washington Post)
  - Chad severs diplomatic ties with Sudan following an attempted coup by Chadian
    rebels in which around 350 died. Chad accuses Sudan of sponsoring the rebels.
    (AP)
  - Burundi lifts a midnight-to-dawn curfew that has been in place for 34 years. (BBC)
  - '2006 European floods: The Danube, swollen by heavy rain and melting snow, rises
    to record levels, and floods hundreds of homes in Serbia, Bulgaria and Romania.
    (BBC)'
  - In Delhi, India, two explosions inside the 16th century mosque Jama Masjid injure
    at least nine people. (BBC) (VOA)
  - An editorial in The Lancet, an influential medical journal, says that researchers
    should study the effects of drugs by using them themselves, and thereby weakening
    the force of the social demonization of such substances. (Guardian)
  - An accident occurs on the Yurikamome rail line in Tokyo, Japan, when a damaged
    axle causes a rubber traction tire on a train to fall off, forcing the cancellation
    of all weekend train services. (Kyodo News)
  - Suspected militants kill at least four civilians in a series of grenade attacks
    in Indian-administered Kashmir. A fifth civilian dies after police opens fire
    on the suspected militants. At least 17 others are injured. (BBC)
  - A man disfigured in a bear attack becomes the first in China to have a face transplant.
    (BBC)
