Date: '2006-04-11'
Source_URI: Portal:Current events/2006 April 11
Intelligence_Payload:
  Uncategorized:
  - The city of Essen, Germany, is selected to be the European Capital of Culture
    of 2010 by the EU jury. (Deutsche Welle)
  - A suspected suicide bomber detonates a bomb at a religious gathering in Karachi,
    Pakistan, killing at least 47 and injuring more than 80 celebrating Mawlid al-Nabi.
    (BBC)
  - Bernardo Provenzano, boss of the Sicilian Mafia (capo di tutti i capi), is caught
    near the town of Corleone. (BBC)
  - The Venus Express spacecraft of the European Space Agency approaches Venus approximately
    five months after it was launched and starts its main engine burn to slow itself
    down and allow the capture into orbit around Venus. (BBC) (ESA)
  - 'Sri Lankan Civil War: a bus carrying soldiers from Trincomalee hits a claymore
    mine, killing 10 navy sailors, their driver and leaving another eight wounded.
    A pair of British tourists are also injured in the blast. (BBC)'
  - Iranian President Mahmoud Ahmadinejad announces that Iran has successfully enriched
    uranium. In a televised address from the northeastern city of Mashhad, Ahmadinejad
    said "I am officially announcing that Iran has joined the group of those countries
    which have nuclear technology". (Bloomberg)
  - Musician Proof of Eminem's hip hop group D12 is shot to death in a Detroit night
    club.
