Date: '2006-04-30'
Source_URI: Portal:Current events/2006 April 30
Intelligence_Payload:
  Darfur conflict:
  - The Sudanese government accepts a peace plan brokered by mediators of the African
    Union. (Reuters), (CNN)
  - Various rebel Janjaweed militias, required to be disarmed according to the deal,
    struggle to extract last-minute concessions and have yet to give a clear signal
    on whether they would sign. (Reuters)
  Uncategorized:
  - The rebel group the Justice and Equality Movement refuses to sign on to the proposed
    peace agreement in its current form. (Reuters)
  - The Government of the Central African Republic joins the United States Government
    and the Government of Chad in formally accusing the Government of Sudan of supporting
    the United Front for Democratic Change rebels and further alleges that UFDC rebels
    are entering southern Chad through the CAR-Chad-Sudan border area. (AFP via Yahoo!)
  - The Parliament of Nepal, reinstated last week after a 4-year hiatus, unanimously
    approves a proposal by new prime minister Girija Prasad Koirala to hold elections
    for a special assembly to draw up a new constitution. (Reuters), (CBC)
  - 24 miners have been killed in a mine explosion in the Chinese province of Shaanxi.
    (BBC)
