Date: '2006-04-29'
Source_URI: Portal:Current events/2006 April 29
Intelligence_Payload:
  Uncategorized:
  - In Italy, after three weeks of wrangling over a narrow election defeat, Prime
    Minister Silvio Berlusconi finally says he will resign within a week, clearing
    the way for Romano Prodi and his L'Unione coalition to form a new government.
    (CNN), (CBC)
  - Protesters demonstrate against the Iraq war and possible military actions against
    Iran in New York City. (Washington Post) (The Hindu) (Al Jazeera)
  - United States-Iran relations continue to deteriorate after US officials called
    Iran one of the world's most active sponsors of terrorism, as IAEA reveals that
    Tehran has successfully enriched uranium and is racing ahead with its nuclear
    programme. Iran says it does not "give a damn" about the verdict from the IAEA
    director Mohamed ElBaradei and what it might lead to. (The Guardian) (AP/ABC News)
  - U.S. employers, workers, and police brace for a day-long boycott and strike to
    demonstrate the economic impact of illegal immigrants on the U.S. economy.(Los
    Angeles Times) (CNN)
