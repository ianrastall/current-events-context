Date: '2006-04-22'
Source_URI: Portal:Current events/2006 April 22
Intelligence_Payload:
  Uncategorized:
  - 'Colombian Armed Conflict: Seventeen Colombian soldiers and a secret policeman
    were killed by rebels in an ambush in the mountains near the Venezuelan border.
    (BBC)'
  - 'Conflict in Afghanistan: Four Canadian soldiers were killed 75 kilometers north
    of Kandahar by a roadside bomb planted by Taliban militants. (Canada.com)'
  - 'April 2006 Nepalese general strike: Opposition leaders in Nepal reject King Gyanendra''s
    proposals for restoring democracy. Thousands of protesters approaching the Narayanhity
    Royal Palace in Kathmandu are fired upon by security forces with tear gas. (VOA),
    (Reuters), (CBC)'
  - The first city-wide election in New Orleans after Hurricane Katrina takes place.
    (Reuters)
  - The Iraqi Parliament meet to vote on choosing a Prime Minister, only the second
    time since the December elections. The nominee Jawad al-Maliki has been put forward
    by the dominant Shia block. (BBC) (CNN International)
  - 'Kharkiv supermarket bombings: Two homemade bombs exploded at supermarkets in
    the Ukrainian city of Kharkiv, injuring 14. (Seattle Post Intelligencer) (Interfax
    Russia) (ABC)'
  - In India, BJP leader Pramod Mahajan is shot at his home, and reported to be in
    critical condition. (Hindustan Times) (BBC)
