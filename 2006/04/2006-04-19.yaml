Date: '2006-04-19'
Source_URI: Portal:Current events/2006 April 19
Intelligence_Payload:
  Uncategorized:
  - The Italian Supreme Court has confirmed the victory of centre-left opposition
    candidate Romano Prodi in last week's contested Italian general election, 2006,
    dismissing complaints by Prime Minister Silvio Berlusconi that the vote was marred
    by irregularities. (BBC) (Reuters)
  - White House Press Secretary Scott McClellan announces his resignation. Karl Rove
    is expected to lose his position as Deputy Chief of Staff for political development.
    President George W. Bush tries to shake up his cabinet because of the mid-term
    elections in November. (BBC)
  - The Bolivian army frees three ministers taken hostage by local village people
    in El Mutún, the world's largest iron ore deposit (Le Monde).
  - 'Elections in the Solomon Islands: The announcement of the new Prime Minister
    of the Solomon Islands, Snyder Rini, causes riots in Honiara. Australia and New
    Zealand promise to send more troops to keep order. (Radio NZ) (VOA)'
