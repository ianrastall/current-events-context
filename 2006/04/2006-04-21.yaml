Date: '2006-04-21'
Source_URI: Portal:Current events/2006 April 21
Intelligence_Payload:
  Uncategorized:
  - 'April 2006 Nepalese general strike: King Gyanendra of Nepal asks for Prime Minister
    nominations to be made to assist in ending unrest in the country. (BBC)'
  - Queen Elizabeth II of the United Kingdom and the other Commonwealth realms celebrates
    her 80th birthday. On the same day, the BBC marks eighty years since the granting
    of its first Royal Charter. (BBC)
  - The California court of appeal heard oral arguments over bloggers' challenges
    to an effort by Apple Computer to force the ISP of an Apple news site to hand
    over the email records of bloggers it claims revealed trade secrets. (ITWire)
  - 'Haitian elections, 2006: Voter turnout in the second round of the legislative
    elections is deemed low. (Reuters)'
  - The 2005–2006 National Hockey League playoffs started.
