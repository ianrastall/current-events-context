Date: '2006-04-26'
Source_URI: Portal:Current events/2006 April 26
Intelligence_Payload:
  Uncategorized:
  - The Governor of Puerto Rico, Aníbal Acevedo Vilá, signs an executive order in
    which the government's budget will be exclusively used for health and security
    services. 43 agencies of the government will be shut down, while 15 will provide
    services partially. Another 60 will continue operating normally. The order is
    a result of the budget running dry before the end of the fiscal year. (AP via
    ABC News)
  - University of California at San Diego psychology researcher Tim Gentner reportedly
    discovers that songbirds are capable of learning simple grammar, which may disprove
    Noam Chomsky's long believed hypothesis that humans are the only organism able
    to comprehend recursive grammar. (AP)
  - Tony Snow is named White House Press Secretary.(AP via Guardian), (BBC), (VoA)
  - Ukraine marks the 20th anniversary of the Chernobyl nuclear power station explosion.
    (BBC), (VoA)
  - Snyder Rini resigns as Prime Minister of the Solomon Islands immediately before
    facing a motion of no confidence in Parliament, prompting celebrations in the
    streets of Honiara. (NZ Herald) (BBC), (VoA)
  - Egyptian police arrest 10 people in relation to the 2006 Dahab bombings, which
    has killed 24 people and injured more than 80 on 24 April. (Independent)
  - Peacekeeping Forces in Egypt were attacked outside the Nile Delta by two suicide
    bombers. No casualties. (Fox News)
  - Top Gear presenters Jeremy Clarkson, Richard Hammond and James May host a two
    and a half hour evening show on Southern Counties Radio.
