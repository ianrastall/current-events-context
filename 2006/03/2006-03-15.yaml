Date: '2006-03-15'
Source_URI: Portal:Current events/2006 March 15
Intelligence_Payload:
  Uncategorized:
  - Two gunmen attacked the UN Refugee Agency (UNHCR) compound in Yei, Sudan, killing
    a local guard and leaving two others in critical condition. (Angola Press)
  - The U.S. online magazine salon.com publishes the most extensive documentation
    of the Abu Ghraib prisoner abuse. (salon.com)
  - 'United Kingdom: The House of Commons votes to approve an education reform bill.
    The Prime minister, Tony Blair''s authority is called into question for his relying
    on the opposition Conservative party to secure the vote, due to revolt within
    his own Labour Party. (Bloomberg)'
  - 'Iraq War: A raid by the United States military kills eleven Iraqis, mostly civilians.
    (Channel 4 News)'
  - The United Nations General Assembly votes to establish the United Nations Human
    Rights Council, a new human rights organization to replace the United Nations
    Commission on Human Rights, with only the United States, Israel, the Marshall
    Islands and Palau opposing. (United Press International) (Reuters.uk)
  - Queen Elizabeth II, Head of the Commonwealth opens the 2006 Commonwealth Games
    in Melbourne, Australia. (BBC)
  - Five arrests are made over the UK Islamist demonstration outside the Danish Embassy
    in London against the cartoons depicting the prophet Muhammad. (Guardian)
