Date: '2006-03-02'
Source_URI: Portal:Current events/2006 March 2
Intelligence_Payload:
  Uncategorized:
  - The United States Senate voted 89–10 to renew the USA PATRIOT Act after two extensions.
    In its vote next week, the United States House of Representatives will likely
    also vote to renew the Act, analysts say. (MSNBC)
  - President George W. Bush, on his first visit to India, issues a joint statement
    with Indian Prime Minister on their growing strategic partnership, emphasising
    their agreement on civil nuclear cooperation. An estimated crowd of 100,000 people
    protest against Bush in Delhi. (Times of India) (Khaleej Times) (Forbes) (Times
    of India) (CNN)
  - A shipwreck from the 14th century was found buried in Riddarfjärden Bay in Stockholm,
    Sweden. If the ship is well preserved, there are plans to remove it from the waters.
    (ABC)
  - Alaksandar Kazulin, the Social Democratic Party candidate for the office of President
    of Belarus, was detained by Minsk police after he was rejected entrance to a congress
    hosted by current leader Alexander Lukashenko. Kazulin also suffered injuries
    during the course of his detention, which is still being enforced, though the
    elections will commence in 17 days. (BBC)
  - Traces of a prehistoric, 8,000-year-old civilization are found in Shahrud, Iran.
    The discoveries included ovens, craft workshops, and other evidence of settlements.
    (Payvand)
  - Televangelist Pat Robertson loses his bid for re-election to the board of directors
    of the National Religious Broadcasters. (Associated Press)
  - 'Dubai Ports World controversy: The United States urges the United Arab Emirates
    to end its boycott of Israel: "The Bush administration said yesterday it is pressing
    the United Arab Emirates to drop its economic boycott of Israel – a major sticking
    point in the proposed takeover of key U.S. ports by a UAE-owned firm." (The Washington
    Times)'
  - Sir Menzies Campbell has been elected the new leader of the Liberal Democrats.
    (BBC)
  - The European Central Bank raises Euro base interest rates by 0.25% to 2.5%. The
    move affects the 12 members of the Eurozone. (FT)
  - 'Kenya: Masked gunmen, since revealed to be Kenyan police, attack the offices
    of leading newspaper The Standard and its television station KTN, following their
    report that President Mwai Kibaki held secret meetings with key opposition figure
    Kalonzo Musyoka. (BBC) (Reuters)'
  - 'CIA flights: French newspaper Le Figaro reveals that the attorney general of
    Bobigny has opened up an investigation concerning the landing of a CIA flight
    in Le Bourget Airport following a complaint deposed at the end of December 2005
    by NGOs International Federation of Human Rights Leagues and the French Ligue
    des droits de l''homme. (Le Figaro)'
  - Just two days before U.S. President George W. Bush is scheduled to visit Pakistan,
    a car bomb exploded in the Marriott Hotel Karachi parking lot adjacent to a United
    States consulate in Karachi, killing at least four people including a US diplomat
    and his driver and injuring at least fifty others. (CNN)
  - A prison riot involving close to 1,300 prisoners at Afghanistan's Pul-e-Charkhi
    prison ended after four days. (BBC)
  - Italian judges in Milan to charge Prime Minister Silvio Berlusconi and David Mills
    (husband of Tessa Jowell, a British Minister) in connection with a bribery scandal.
    (Independent)
  - Former Iranian President Mohammad Khatami, member of the moderate wing of the
    regime, describes the Holocaust as a "historical reality," contradicting the current
    leader Mahmoud Ahmadinejad, an extremist who has described it as a "myth" the
    previous year. (BBC)
