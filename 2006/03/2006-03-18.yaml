Date: '2006-03-18'
Source_URI: Portal:Current events/2006 March 18
Intelligence_Payload:
  Uncategorized:
  - Hamas announces the formation of its new cabinet to govern the territory under
    the control of the Palestinian Authority. Hamas, however, in a last-ditch effort
    to include the Popular Front for the Liberation of Palestine in the government,
    postponed by one day the submission of the new cabinet to the approval of PNA
    President Mahmoud Abbas. (IOL) (Al-Jazeera)
  - '2006 labor protests in France: In Paris, and other major French cities, hundreds
    of thousands of people march in protest of the Contrat de première embauche (First
    Employment Contract), a labor law set to take effect in April that gives employers
    the right to fire workers under the age of 26 in the first two years of their
    employment without justification.(BBC)'
  - US Navy warships engage pirates off the coast of Somalia, killing one, capturing
    12, after the U.N. Security Council on March 15, encouraged any naval forces near
    Somalia to take action against suspected piracy. This occurred after an attack
    on a UN World Food Program-chartered ship bringing drought-relief food supplies
    on March 13. (AP)(UPI)
  - The Labor government of South Australia, led by Mike Rann, has been returned with
    a ten percent swing. (Australian Broadcasting Corporation)
