Date: '2006-03-28'
Source_URI: Portal:Current events/2006 March 28
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian conflict: for the first time, a Katyusha rocket is fired
    from the Gaza Strip. The IDF says the attack is a "clear escalation". (JPost)(BBC)(MSNBC)'
  - One Canadian soldier has been killed and three others injured during a firefight
    with Taliban insurgents in a remote area outside of Kandahar. (CBC)
  - Kadima leader Ehud Olmert declares victory in the 17th Israeli legislative election,
    ahead of main opponents Labor and Likud. (BBC)
  - Kingdom Hearts II is released in North America
  - Over a million protesters join large protests in France amid strikes against the
    new contrat première embauche, which protesters say will harm job stability for
    workers under the age of 26. Violent clashes with the police in Paris are reported.
    (Reuters)
  - More than one million local government workers in the UK strike over cuts to pension
    schemes, in an action co-ordinated by eight trade unions. (BBC)
  - White House Chief of Staff Andy Card announces he will resign from his job on
    April 14, 2006. Card is one of a few people who has been on duty in the Bush Administration
    since day 1. He will be replaced by Joshua Bolten, Director of Office of Management
    and Budget. (MSNBC)
  - Former Liberian President Charles Taylor disappears after Nigeria agrees to extradite
    him to face war crime charges in Sierra Leone. (BBC)
  - Abdul Rahman is deemed mentally unfit to stand trial, and released. He is seeking
    asylum in a Western country. His whereabouts are unknown. (CNN) (BBC)
  - Get Rich or Die Tryin' was released on DVD.
