Date: '2006-03-25'
Source_URI: Portal:Current events/2006 March 25
Intelligence_Payload:
  Uncategorized:
  - A revolutionary scramjet jet engine designed to fly at seven times sonic speed
    is successfully tested in Australia. (BBC)
  - Canada's annual seal hunt has begun, amid international appeals for an end to
    the controversial cull of up to 325,000 young harp seal pups. The Canadian government
    says the cull, which reportedly earns C$16.5 million (£) in meat and pelt sales,
    is also necessary to control seal numbers. (BBC)
  - An explosion at a French university chemical research facility kills one professor.
    The cause is unknown. (National Nine News)
  - Protests against the US immigration reform bill H.R. 4437 are held in several
    US cities. 500,000 people march in Los Angeles, 50,000 in Denver, and 20,000 in
    Phoenix, Arizona, protesting proposed legislation that includes construction of
    a security wall along the United States-Mexico border. (CNN) (BBC) (CBS4Denver)
    (East Valley Tribune)
  - A gunman killed six people at a party and then himself in the Capitol Hill massacre
    in Seattle. (Seattle Post-Intelligencer)
  - Reading Football Club are promoted to the Premier League for the first time in
    their 135-year history. They are also the first post-war football club to be promoted
    to the Premier League in March.
