Date: '2006-03-19'
Source_URI: Portal:Current events/2006 March 19
Intelligence_Payload:
  Uncategorized:
  - Three of the six men left seriously ill during a drugs trial (of a monoclonal
    antibody TGN 1412) in London have been taken off organ support. (BBC)
  - The Liberal Party of Canada announces it has scheduled the vote for a new leader
    for December 3. (CBC)
  - Part of a tunnel in the Moscow Metro collapses on a train setting the train on
    fire. Russian emergency services were dispatched to the scene, passengers were
    evacuated, and no one was hurt. (BBC)
  - Former Prime Minister of Iraq Iyad Allawi says that he believes that Iraq is engaged
    in a civil war, although the country has not passed "the point of no return."
    British and American officials dispute calling the conflict a civil war. (BBC)
  - Polling stations open for the Belarusian presidential election, 2006. (VOA) The
    main opposition candidate Alaksandar Milinkievič calls for a re-run of the presidential
    election within hours of polls closing. (BBC)
  - With the exception of Uganda and South Africa, sub-Saharan Africa is failing to
    meet United Nations standards for accessibility to clean water or sanitation.
    (Reuters)
