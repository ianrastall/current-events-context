Date: '2006-03-17'
Source_URI: Portal:Current events/2006 March 17
Intelligence_Payload:
  Uncategorized:
  - Beijing's wealthiest millionaire, Yuan Baojing, and two alleged accomplices are
    sentenced to death and executed by lethal injection for murder by a Liaoyang court,
    making Yuan the wealthiest person to be executed in PRC history. (Xinhuanet) (Washington
    Post)
  - The European Parliament demands that Senegal turn over Hissène Habré to Belgium
    to be tried for his actions while he was President of Chad. Senegal is not expected
    to comply, as it already refused extradition demands from the African Union. The
    ATDPH has expressed its approval of the decision. (AllAfrica)
  - Six people have been charged in connection with Kenya's biggest fraud, which cost
    the government about . (BBC)
  - Following an outbreak of bird flu in Israel, Europe bans imports of Israeli chicken;
    Ministry of Agriculture halts exports of unprocessed birds; Kibbutzim in the south,
    heart of Israel put under closure; four people hospitalized in the south are found
    not to be infected with the disease. (Ynetnews)
  - Thomas Lubanga, former leader of the Union of Congolese Patriots militia in the
    Democratic Republic of the Congo, becomes the first person arrested on behalf
    of, and then referred to the International Criminal Court for war crimes. (ICC)
  - The fourth global World Water Forum meets in Mexico City to address problems of
    water shortages and conflicts. Protesters claim the forum is a platform for further
    privatization of water supplies. (AP via Forbes)
  - The International Crisis Group warns that continued neglect of the Darfur conflict
    may lead to thousands more deaths and spill over into neighboring countries, further
    destabilizing the region. (Reuters)
