Date: '2006-03-12'
Source_URI: Portal:Current events/2006 March 12
Intelligence_Payload:
  Uncategorized:
  - Abeer Qassim Hamza al-Janabi, a fourteen-year-old Iraqi girl, is raped and murdered
    together with her family in the Mahmudiyah killings.
  - Algerian "national reconciliation". Abdelhak Layada, one of the founder of the
    Armed Islamic Group (GIA), is released from prison due to the February 28, 2006,
    national reconciliation charter decree of application RFI.
  - Venezuela introduces its new national flag with eight, instead of seven, stars
    and a slightly altered coat of arms. (The Washington Post)
  - Reports claim that a post-mortem examination has found that former Yugoslav President
    Slobodan Milošević died from heart failure. (Channel 4 News)
  - Six car bombs explode in Sadr City, a neighborhood in Baghdad, killing at least
    forty-six people. (CNN)
  - In Malta, the Malta Labour Party makes a big victory in the Local Council Elections
    (Times of Malta)
  - Queen Elizabeth II and Prince Philip, Duke of Edinburgh began their Visit to Australia
    which she will open the Commonwealth Games in Melbourne.
  - U.S. Senator Russ Feingold announces that he will introduce a motion of censure
    against President George W. Bush. (RawStory)
  - Schering, a Berlin, Germany, based pharmaceutical firm, announces that it has
    received a hostile merger bid from Frankfurt-based rival Merck. (MSNBC) (Reuters)
