Date: '2006-03-23'
Source_URI: Portal:Current events/2006 March 23
Intelligence_Payload:
  Uncategorized:
  - Xbox 360 was released in Australia and New Zealand.
  - French youths set fire to cars and loot shops in Paris during protests against
    the contrat première embauche law that Prime Minister Dominique de Villepin had
    agreed to discuss with unions. (Reuters)
  - Adwaitya, a tortoise that once belonged to British colonial Lord Clive in the
    18th Century has died at the age of 250 in a zoo in Calcutta. (BBC)
  - More than 100 people die after their boat capsizes in Cameroon. (BBC)
  - The British Embassy in Baghdad confirms the rescue of three Christian Peacemaker
    hostages held in Iraq for nearly four months; Briton Norman Kember and Canadians
    Harmeet Singh Sooden and James Loney. They were freed during a British led multinational
    military operation involving American, British, Canadian and Iraqi forces. (Channel
    4 News), (BBC), (CTV)
