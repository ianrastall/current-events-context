Date: '2006-03-29'
Source_URI: Portal:Current events/2006 March 29
Intelligence_Payload:
  Uncategorized:
  - Canada has officially cut all ties with the members of the Hamas cabinet and is
    suspending assistance to the Palestinian Authority. (CBC)
  - The Beatles' record label Apple Corps accuse Apple Computer in court of breaching
    a trademark agreement by operating their iTunes Music Store. (BBC News)
  - Afghan Christian convert Abdul Rahman takes political asylum in Italy. Many Islamic
    clerics and members of Afghanistan's parliament protest his release. (MSNBC),
    (BBC)
  - A total solar eclipse may be observed from 08:36 GMT (09:36 BST) to 11:48 GMT
    (12:48 BST) in Eastern Brazil, West and North Africa, Turkey, Central Asia and
    Mongolia. (BBC)
  - Former Liberian President Charles Taylor is captured after disappearing in Nigeria
    and is extradited to Sierra Leone. (BBC)
  - The chief prosecutor in Austria seeks an arrest warrant for former Refco chairman
    Phillip Bennett and former Refco client Wolfgang Floettl on suspicion they helped
    defraud Austria's BAWAG Bank. (NY Post)
