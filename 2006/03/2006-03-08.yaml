Date: '2006-03-08'
Source_URI: Portal:Current events/2006 March 8
Intelligence_Payload:
  Uncategorized:
  - The world's biggest Expo on information technology, CeBIT, opens in Hanover, Germany.
    (news.com)
  - Slovenia asks to join the Euro monetary union. (Business week)
  - The United States House Appropriations Committee votes to block the Bush administration's
    plan for Dubai Ports World to take over operations at six major U.S. ports. (Houston
    Chronicle)
  - The Government of Chad renews accusations of Sudanese support for attacks by the
    UFDC into eastern Chad, despite the recent signing of the Tripoli Accord and the
    successful formation of the ministerial committee. Sudan has accused Chad of supporting
    ARFWS rebels in the past, and Chad is believed to have stepped up support in light
    of recent attacks. (AlertNet)
  - The Channel Island of Sark votes to maintain its feudal system of governance (BBC)
  - Iran threatens 'harm and pain' against the United States for its role in putting
    Iran before the United Nations Security Council. (Channel 4 News)
  - The European Union announces that it has lifted a worldwide ban on the export
    of British beef introduced in 1996 to prevent the spread of BSE (Mad Cow Disease).
    (BBC)
  - An Argentine military aircraft crashes after take off from El Alto International
    Airport in La Paz, Bolivia, killing all six people on board. The aircraft was
    a Learjet 35A. (planecrashinfo.com)
