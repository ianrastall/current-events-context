Date: '2006-03-14'
Source_URI: Portal:Current events/2006 March 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - An attempted coup d'état against Chadian President Idriss Déby is foiled. (AP
    via The Guardian)
  - Jordan is to indict Abu Musab al-Zarqawi for bombings that killed over 60 people.
    (ABC)
  - Iraq War
  - At least 80 people die in Iraq following an attack on a Shiite holy site. (LA
    Times)
  - Israeli-Palestinian conflict
  - Israeli troops shell and demolish a Palestinian prison in Jericho, seizing Ahmad
    Sa'adat, imprisoned for allegedly assassinating Israeli tourism minister Rehavam
    Ze'evi. (BBC)
  - In retaliation for the Israeli attack in Jericho, Palestinian gunmen kidnap and
    then release American professor Douglas Johnson. (Forbes)
  Business and economy:
  - Euronext, a derivatives exchange based in Amsterdam and Paris, announces that
    it might join the ongoing auction for the London Stock Exchange—which would put
    it in competition with bidders Nasdaq and Deutsche Börse. (Forbes)
  Disasters and accidents:
  - At least seven people have died in wildfires in the U.S. state of Texas which
    have burned 1,000 mi2 (2500 km2), forcing 1,900 people to evacuate. (AP)
  Health:
  - In London, six men taking part in a clinical trial for a new monoclonal antibody
    anti-inflammatory drug, TGN1412, are placed in intensive care, some in a life-threatening
    condition, after suffering adverse side-effects. (BBC)
  International relations:
  - The 2006 National People's Congress concludes in Beijing, China. Premier Wen Jiabao
    holds annual press conference from Chinese and foreign reporters. Wen reiterates
    Taiwan issue in serious tone. (People's Daily)
