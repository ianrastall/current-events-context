Date: '2006-03-13'
Source_URI: Portal:Current events/2006 March 13
Intelligence_Payload:
  Uncategorized:
  - A cash-for-honours scandal has erupted around UK Prime Minister Tony Blair. A
    millionaire donor has revealed that Labour fundraisers had arranged secret loans
    from businessmen who were then nominated for peerages. (Daily Mail)
  - A major tornado outbreak finally ends in the central United States. In all, more
    than 100 tornadoes were reported and 11 people were killed. Two tornadoes hit
    Springfield, Illinois, late on the 12th, causing major damage to the city.
  - U.S. climate scientists working for the National Oceanic and Atmospheric Administration
    have recorded a significant rise in the concentration of carbon dioxide in the
    atmosphere, pushing it to a new record level. (BBC)
  - A major oil slick, which could contain some 40 tonnes of fuel, has been detected
    off the coast of Estonia, one week after the Runner-4 cargo vessel sank in the
    Baltic Sea. Heavy sea ice prevents an accurate estimate of the content of the
    oil slick that may have killed 35,000 sea birds. (Yahoo News)
  - The judge in the trial of Zacarias Moussaoui is considering throwing out the death
    penalty as an option after lawyers from the Federal Aviation Administration coached
    four government witnesses. (CNN)
  - German drug and chemical manufacturer Merck KGaA announces plans to buy Schering
    in a merger of . Merck and Schering would become Germany's largest pharmaceutical
    company. – (Telegraph)
  - London Metropolitan Police chief Sir Ian Blair admits secretly recording conversations
    with the Attorney General Lord Goldsmith, an act that could lead to a civil legal
    proceedings if the other party has not granted permission for conversations to
    be taped. (BBC)
