Date: '2006-03-26'
Source_URI: Portal:Current events/2006 March 26
Intelligence_Payload:
  Uncategorized:
  - The CBS television program 60 Minutes airs a story on a lawsuit against the hedge
    fund SAC, alleging that it orchestrated a fall in the stock price of Canadian
    drug company Biovail.
  - Officials in Afghanistan say that Abdul Rahman may be released soon, although
    the case may have only been temporarily dropped to gather more evidence. (CNN)
    (BBC)
  - The 2006 Commonwealth Games in Melbourne, Australia, draw to a close with the
    Closing ceremony. Australia finishes with a record 84 gold medals, making this
    their best Games ever. Samaresh Jung is adjudged the Best Athlete of the 18th
    Commonwealth Games. The 2010 games will be hosted by New Delhi, India. (M2006)
    (Rediff)
  - Voters in Ukraine go to the polls to elect a new Verkhovna Rada (parliament).
    (RIA Novosti) (BBC)
  - Scotland becomes the first part of the United Kingdom to introduce a full smoking
    ban in enclosed public places and workplaces. (BBC)
