Date: '2006-03-04'
Source_URI: Portal:Current events/2006 March 4
Intelligence_Payload:
  Uncategorized:
  - The central Papeete power station is damaged by a fire, resulting in limited power
    for some areas of Tahiti for a couple of weeks.(Pacific Magazine)
  - Anti-war campaigners criticised British Prime Minister Tony Blair after he suggested
    his decision to go to war in Iraq would ultimately be judged by God. (BBC)
  - British Culture Secretary Tessa Jowell splits from her husband, David Mills' following
    allegations of an alleged acceptance of money from Silvio Berlusconi. (BBC)
  - A new species of shark, Mustelus hacat, is discovered in Mexico's Sea of Cortez,
    bringing the number of Mustelus species found in the eastern North Pacific to
    five.
  - The Deep Space Network tries one final contact attempt to Pioneer 10. (Planetary
    Society)
