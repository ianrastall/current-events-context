Date: '2006-03-07'
Source_URI: Portal:Current events/2006 March 7
Intelligence_Payload:
  Uncategorized:
  - The Dutch Labour party gains more than five hundred seats in the country's municipal
    election. (Financial Times)
  - Fifteen people die and many others are injured in three blasts throughout Varanasi,
    India. (CNN)
  - Kizza Besigye, formerly opposition presidential candidate in the recent Ugandan
    elections, is cleared of rape charges.(BBC)
  - Israel's defense minister Shaul Mofaz says that the Hamas PNA prime minister-designate,
    Ismail Haniyeh, may be subject to an Israeli targeted killing if Hamas resumes
    attacks against Israel. (AP)
  - British Lieutenant General Nick Houghton announces that the UK's 8,000 soldiers
    in Iraq could begin leaving the country within weeks. Most would be home by 2008,
    he says. (Guardian Unlimited)
  - Anibal Ibarra, former mayor of Buenos Aires is removed from office over allegations
    of poor government safety regulation in last year's club fire. (The Mercury News)
