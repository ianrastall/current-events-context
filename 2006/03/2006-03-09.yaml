Date: '2006-03-09'
Source_URI: Portal:Current events/2006 March 9
Intelligence_Payload:
  Uncategorized:
  - Astronomers announce that the Cassini–Huygens probe has detected possible geysers
    of water on Saturn's moon Enceladus, perhaps the first example of naturally occurring
    liquid water beyond Earth. (AP) (JPL)
  - United Nations Secretary-General Kofi Annan launches the Central Emergency Response
    Fund to provide aid to regions of Africa currently facing starvation. (BBC)
  - The Sablé-sur-Sarthe hostage crisis in France ends peacefully with no casualties.
    The gunman had suffered from depression. (ABC)
  - The notorious Abu Ghraib prison in Iraq is to close and its prisoners to be housed
    elsewhere, the U.S. military has said. (Channel 4 News)
