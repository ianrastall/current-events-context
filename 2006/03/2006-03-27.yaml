Date: '2006-03-27'
Source_URI: Portal:Current events/2006 March 27
Intelligence_Payload:
  Uncategorized:
  - Iraqi security minister Abd al Karim al Enzi accuses American soldiers accompanied
    by Iraqi troops to have raided the Mustafa Shiite mosque in eastern Baghdad and
    executed 37 unarmed people who had been tied up. (Palestine Chronicle) (Times)
  - The mayor of London, Ken Livingstone, refers to the United States Ambassador to
    the United Kingdom, Robert Tuttle, as a 'chiseling little crook' because the United
    States embassy continues to refuse to pay the London congestion charge. (Guardian
    Unlimited)
  - The New York Times reports that it has seen a memo that shows George W. Bush was
    determined to go to war at least two months before the 2003 invasion of Iraq.
    (BBC) (NYT)
  - In Germany, a rare tornado kills two and leaves more than 300,000 people without
    electricity. (NDR Television Germany)
  - Preliminary results of the 2006 Ukrainian parliamentary election give former Prime
    Minister Viktor Yanukovych and his pro-Russian Party of Regions a narrow lead
    over the Yulia Tymoshenko Electoral Bloc, with President Viktor Yushchenko's Our
    Ukraine Bloc trailing in third place. (BBC)
  - Zacarias Moussaoui testifies in an American court that he and Richard Reid planned
    to fly a passenger jet into the White House as part of the September 11, 2001
    attacks, contradicting his previous testimony. (Channel 4 News) (CNN) (BBC)
  - The European Union agrees to introduce a standardized European driving licence.
    (BBC)
