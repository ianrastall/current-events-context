Date: '2006-03-24'
Source_URI: Portal:Current events/2006 March 24
Intelligence_Payload:
  Uncategorized:
  - Clerics in Kabul call for Abdul Rahman to be put to death. He is accused of committing
    apostasy for converting from Islam to Christianity. (AP)
  - President Roh Moo-hyun nominates Han Myung-Sook to become the South Korea's first
    woman prime minister. (Reuters)
  - Lin Liang Ren, 29, is convicted on 21 counts of manslaughter arising from the
    February 2004 Morecambe Bay cockling disaster. (BBC)
  - 'EU summit in Brussels: the EU leaders back plans to develop a common energy policy,
    but the specifics remain vague and difficult (Independent)'
  - 'Pentagon: It is alleged by a report that Russia gave intelligence information
    to Saddam Hussein''s Iraq regarding American troop movements during the early
    stages of the Iraq War. (Reuters)'
  - Hannah Montana starts with its first episode.
