Date: '2006-03-01'
Source_URI: Portal:Current events/2006 March 1
Intelligence_Payload:
  Arts and culture:
  - In the fictional CW network drama One Tree Hill, this date marks a school shooting
    which took the lives of two people and drastically changed the dynamic of the
    show. It has been called one of the most essential and touching episodes in high
    school drama history.
  Business and economy:
  - A member of the board of directors of major German steel manufacturing company
    ThyssenKrupp AG says the company is "examining all its options," and may not complete
    its proposed acquisition of Canadian steel company Dofasco. (MSN Money)
  Disasters and accidents:
  - A video obtained by the Associated Press shows U.S. President George W. Bush being
    warned that the levees in New Orleans could break one day before Hurricane Katrina
    hit. (MSNBC.com)
  Politics and elections:
  - Fijian Prime Minister Laisenia Qarase announces that the 2006 general elections
    will be held in the second week of May, from May 6 to May 13. (Radio New Zealand)
