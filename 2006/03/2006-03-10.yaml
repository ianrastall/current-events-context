Date: '2006-03-10'
Source_URI: Portal:Current events/2006 March 10
Intelligence_Payload:
  Uncategorized:
  - Further evidence accrues to show that the polar ice caps are shrinking. (BBC)
  - The Mars Reconnaissance Orbiter enters orbit around Mars. (BBC)
  - More than 250 medical experts sign a letter in The Lancet urging the United States
    to stop force-feeding of Guantanamo Bay detainees and close down the prison. (BBC)
  - The World Health Organization announces that the number of people killed by measles
    declined by 48% between 1999 and 2004, from 871,000 to 454,000. The greatest decline,
    60%, was in sub-Saharan Africa. The improvement is attributed to increased vaccination.
    (BBC)
  - John Profumo, the man at the centre of Britain's most famous political scandal
    of the 20th century, has died at the age of 91. (Channel four News)
  - Italian prosecutors ask for Prime Minister Silvio Berlusconi and British lawyer
    David Mills to be indicted in the on-going alleged bribery case. (BBC)
  - Twenty-six people are killed in Dera Bugti, southwest Pakistan, when their vehicle
    hits a landmine. The victims were primarily women and children. Both tribal rebels
    and security forces planted landmines in the area. (BBC)
  - Terminal D at LaGuardia Airport in New York City was closed due to a security
    breach. (CNN)
  - Gale Norton has announced her resignation as United States Secretary of the Interior,
    effective March 31, 2006. (CNN)
