Date: '2006-10-27'
Source_URI: Portal:Current events/2006 October 27
Intelligence_Payload:
  Uncategorized:
  - Australia's senior Muslim cleric Sheikh Taj El-Din Hilaly is barred from preaching
    for three months after his controversial speech comparing women who did not wear
    the hijab to "uncovered meat". (BBC)
  - 'Baseball: The St. Louis Cardinals win the 2006 World Series, beating the Detroit
    Tigers 4 games to 1. This is the Cardinals'' first title since 1982. David Eckstein
    is named the World Series MVP, winning his second ring. (ESPN)'
  - A judge orders the arrest of former President of Chile Augusto Pinochet for torture,
    murder and kidnapping (Villa Grimaldi case) in the early years of his regime,
    from 1973 to 1990. (ABC News Australia)
  - Thousands of young Muslim men demonstrate in the Somali capital of Mogadishu in
    support of a call for a holy war against Ethiopia. (BBC)
  - Washington D.C.-area sniper Lee Boyd Malvo admitted that he and partner John Allen
    Muhammad were responsible for the 2002 murder of a 60-year-old man on a Tucson
    golf course, police claim. (AP via KPHO)
  - The Iranian Students' News Agency reports that Iran has injected gas into a second
    network of centrifuges and has obtained the output, a possible step in developing
    nuclear materials. (CNN)
  - Arnold Schwarzenegger, Governor of the U.S. state of California, declares a state
    of emergency, and a reward of USD $500,000 is offered for the capture of the arsonist
    responsible for the wildfires started in the Twin Pines area of the state.(CNN)
  - Shares in the Industrial and Commercial Bank of China go on sale at the Shanghai
    Stock Exchange and the Hong Kong Stock Exchange in the world's biggest Initial
    Public Offering (IPO). (CNN)
  - Johannesburg International Airport is renamed to OR Tambo International Airport.
    (News24)
  - A controlled explosion is carried out by an Army Bomb Disposal squad on Dublin's
    O'Connell Street after a security alert on an Aircoach bus, although no explosive
    material was found. Traffic in the city has been severely affected. (RTÉ)
  - The Ford Taurus rolls off the assembly line for the last time. The Ford plant
    in Atlanta, USA, closes and 2,000 employees are all laid off. MSNBC
