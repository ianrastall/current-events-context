Date: '2006-10-29'
Source_URI: Portal:Current events/2006 October 29
Intelligence_Payload:
  Uncategorized:
  - Mexican federal police seize the center of Oaxaca, which had served as the headquarters
    for the five-month protest occupation of the city. (International Herald Tribune)
  - President of Brazil Luiz Inácio Lula da Silva wins a second term in a landslide
    victory with 61 per cent of voters supporting him. (AP via Phillyburbs)
  - 'Serbian constitutional referendum, 2006: Serbian voters approve the new constitution.
    (BBC)'
  - 'Iraqi insurgency: 17 police officers, 15 of them police trainers, are abducted
    and murdered in Basra. (BBC)'
  - 'War in Afghanistan: One NATO soldier and about 70 Taliban insurgents were killed
    in southern Afghanistan when fighting broke out between insurgents and Afghan
    troops and NATO''s International Security Assistance Force (ISAF), officials said.
    (CNN)'
  - The Attorney-General of Israel delivers a brief to the Supreme Court of Israel
    arguing that the President of Israel Moshe Katsav should stand aside pending a
    possible indictment for rape. (AFP via New Sunday Times)
  - ADC Flight 53, a Nigerian Boeing 737 airliner carrying more than 100 passengers,
    crashes near Nnamdi Azikiwe International Airport, Abuja. The Sultan of Sokoto
    Mohammadu Maccido, the sultan's son, Muhammed Maccido, a senator, and Abdulrahman
    Shehu Shagari, son of former Nigerian President Shehu Shagari, are on the list
    of passengers on board. (CBS), (Reuters), (Xinhua) There are six confirmed survivors.
    (SABC), (CNN)
  - Fierce political rioting in Bangladesh kills at least 10 people and wounds about
    500 as the main political parties fail to agree on a successor after the expiry
    of Prime Minister Begum Khaleda Zia's five-year term. President Iajuddin Ahmed
    becomes interim PM. Opposition Awami League accuses Iajuddin of violating the
    Constitution of Bangladesh by appointing himself as head of the interim government.
    (Reuters), (CNN), (Telegraph)
