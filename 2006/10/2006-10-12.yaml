Date: '2006-10-12'
Source_URI: Portal:Current events/2006 October 12
Intelligence_Payload:
  Uncategorized:
  - The Federal Reserve finds that economic growth in the United States is "moderate
    or mixed" with "widespread cooling" in the housing market. (Fox News)
  - Members of the Janjaweed militia attack Sudanese refugees from the Darfur region
    in eastern Chad. (BBC).
  - Nine Palestinians have been killed during an Israeli raid in the Gaza Strip, reports
    say. (BBC)
  - The French parliament adopts a bill criminalizing Armenian genocide denial, despite
    significant lobbying efforts by the Government of Turkey. (BBC)
  - The New Zealand Auditor-General's report into 2005 election funding is released.
    NZ$1.17 million dollars was unlawfully spent during the election by seven parties,
    more than half of it by Labour. Labour immediately promises to repay the money.
    (NZ Herald)
  - Workers begin demolishing the one-room Amish schoolhouse in Nickel Mines, Pennsylvania
    where five girls were shot to death and five others were injured. (Forbes)
  - Turkish writer Orhan Pamuk, whose novels discover "new symbols for the clash and
    interlacing of cultures", wins the 2006 Nobel Prize in Literature. (The Washington
    Post)
  Iraq insurgency:
  - A gun attack on the office of a satellite TV station in Baghdad kills 11 people.
    (BBC)
  - Sir Richard Dannatt, Chief of the General Staff and head of the British Army,
    gives an interview stating that British forces should "get out some time soon"
    from Iraq as their presence "exacerbates the security problems". (BBC)
