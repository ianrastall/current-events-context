Date: '2006-10-03'
Source_URI: Portal:Current events/2006 October 3
Intelligence_Payload:
  Uncategorized:
  - Viktor Khristenko, the Russian Industry and Energy Minister, and Baktykozha Izmukhambetov,
    the Kazakh Energy and Mineral Resources' Minister, sign an intergovernmental agreement
    creating a joint venture to process gas from the Karachaganak field in West Kazakhstan.
    Russian President Vladimir Putin said the agreement was the solution to "the energy
    problems of key partners, including those in Western Europe." (Interfax)
  - The United States National Labor Relations Board determines that workers normally
    assigned as shift supervisors should not be covered by a federal law ensuring
    a right to union membership. (AP via Houston Chronicle)
  - EADS delays delivery of the Airbus A380 jet for the third time in 16 months, due
    to wiring problems, with the first plane now expected in late 2007. (Bloomberg)
  - North Korea announces plans to conduct a nuclear test. (BBC)
  - United States scientists John C. Mather and George Smoot win the Nobel Prize in
    Physics for research into cosmic microwave background radiation that helps explain
    the origins of galaxies and stars. (Bloomberg)
  - Deposed Prime Minister of Thailand Thaksin Shinawatra has resigned as head of
    his Thai Rak Thai party due to "changing circumstances". (Reuters)
  - Turkish Airlines Flight 1476, a Turkish Airlines plane carrying 113 people from
    Tirana, Albania to Istanbul, Turkey, was hijacked, but lands at Italy's Brindisi
    Airport. The hijackers surrendered and were arrested by Italian police. (Fox News)
