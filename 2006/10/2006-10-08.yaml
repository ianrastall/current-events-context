Date: '2006-10-08'
Source_URI: Portal:Current events/2006 October 8
Intelligence_Payload:
  Uncategorized:
  - The results of the Belgian municipal elections show losses for the liberals and
    progress for the conservatives and nationalists. (CNN)
  - Iraq's Environmental Secretary claims that 11 police officers have died of food
    poisoning in the Wasit province of that country. The governor of the Wasit province
    claims that no officers have died, but that several are in critical condition.
    It is unclear whether or not the poisonings were intentional. (Associated Press)
