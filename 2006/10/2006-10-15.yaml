Date: '2006-10-15'
Source_URI: Portal:Current events/2006 October 15
Intelligence_Payload:
  Uncategorized:
  - Ecuador's presidential election goes to a second-round run-off between Rafael
    Correa and Álvaro Noboa, to be held on 26 November. (BBC News)
  - 'Hawaii earthquake: A 6.7-magnitude earthquake and a series of aftershocks hit
    the U.S. state of Hawaii at 7:07am local time, with an epicentre 9 miles (14 km)
    NNW of Kalaoa. 95% of power was lost throughout the state. Widespread structural
    damage on the Big Island is being reported, but no major injuries and no fatalities
    as of yet. Airports are only accepting incoming flights. (CNN) (USGS)'
  - Israeli police recommend charging President Moshe Katsav with rape, sexual assault
    and fraud. The final decision on bringing charges is up to Attorney General Meni
    Mazuz. (The Washington Post)
