Date: '2006-10-17'
Source_URI: Portal:Current events/2006 October 17
Intelligence_Payload:
  Uncategorized:
  - 'Iraq War: The United States military in Iraq says a marine and nine soldiers
    have been killed in Iraq, including four in a roadside bombing near Baghdad. (BBC
    NEWS)'
  - 'UN Security Council election: The contest between Guatemala and Venezuela for
    a seat on the United Nations Security Council remains stalemated after a second
    day of voting. (BBC)'
  - The population of the United States reaches 300 million people. (CNN)
  - 'Married couples are now in the minority of the nation. (NPR: Talk of the Nation)'
  - North Korea says the United Nations effectively declared war on the country when
    it imposed sanctions through United Nations Security Council Resolution 1718 in
    response to North Korea's nuclear test. (AP via CBS)
  - The military of Fiji issues an ultimatum to the government to drop legislation
    which would give an amnesty to the leaders of the 2000 coup, or resign. (SMH)
  - Whaling in Iceland is to resume, in contravention of a 20-year moratorium passed
    by the International Whaling Commission. (BBC)
  - Rapper Fabolous is shot at a Manhattan parking garage, spurring a sequence of
    events that left him both hospitalized in stable condition and under arrest.
  - Two metro trains collide in Rome, killing at least two people and injuring about
    120 others. (BBC)
  - It is reported that former British Home Secretary David Blunkett ordered prison
    staff to machine gun prisoners during a 2002 riot regardless of loss of life.
    (BBC)
