Date: '2006-10-10'
Source_URI: Portal:Current events/2006 October 10
Intelligence_Payload:
  Uncategorized:
  - A passenger bus plunges into a ravine near the city of Chiantla in northwestern
    Guatemala, killing 42 people. (BBC)
  - BP shuts down the Prudhoe Bay oil fields due to losing power as a result of high
    winds. (AP via ABC News)
  - 'Iran''s Supreme Leader Ayatollah Ali Khamenei states that the country would pursue
    its right to develop nuclear technology and will not suspend uranium enrichment
    as the West demands, declaring: "Our policy is clear, progress with clear logic
    and insisting on the nation''s right without any retreat." (Reuters)'
  - A chartered Atlantic Airways Flight 670 skids off the runway at Stord Airport
    in Norway, killing four people. (BBC)
  - Iraq insurgency
  - Iraqi police announce they have found a total of 110 corpses at locations across
    Baghdad in the previous 48 hours, thought to be more victims of insurgent death
    squads. In addition, a bomb planted under a car explodes in the city's southern
    district of Doura, killing 10 people. (CNN) (Reuters)
  - United States military sources state that a total of 30 militants and 4 US soldiers
    have been killed since the weekend. (BBC) (Reuters)
  - A mortar fired by insurgents landed on an ammunition dump at Camp Falcon U.S.
    military base on the outskirts of Baghdad, causing a huge fire. At least 30 explosions
    were reported. There were no reported casualties. (Reuters)
  - Six people die in a bomb attack on a festival in the town of Makilala in the Philippines.
    Two others are killed and four injured in a blast at a market in Tacurong, Sultan
    Kudarat. Officials blame Muslim extremist groups. (AFP) (Sun Star) (BBC) (CNN)
  - A naval base and oil facility in Bayelsa State, Nigeria, are captured by armed
    attackers who are now thought to be holding 60 people hostage. (CNN)
  - Hundreds of thousands of people made a protest against President Chen Shui-bian
    in Taipei, Taiwan, surrounding Office of the President, where Chen took part in
    ceremony marking Double Tenth Day. (BBC)
