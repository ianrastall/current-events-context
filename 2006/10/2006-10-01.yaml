Date: '2006-10-01'
Source_URI: Portal:Current events/2006 October 1
Intelligence_Payload:
  Uncategorized:
  - General elections are held in Bosnia and Herzegovina (BBC)
  - A BBC investigation finds that, before he became Pope, Cardinal Joseph Ratzinger
    enforced the Catholic Church's secret policy on Crimen sollicitationis to cover
    up child sex abuse cases involving the clergy. (BBC) (BBC)
  - The Social Democratic Party of Austria has won today's election in Austria. (International
    Herald Tribune)
  - General Elections 2006 in Brazil are taking place.
  - Incumbent President of Zambia Levy Mwanawasa is in the lead in early results in
    the Presidential election, according to the Electoral Commission of Zambia.
  - General Surayud Chulanont is appointed interim prime minister of Thailand by the
    ruling military regime, following the recent coup. (Channel News Asia)
  - A superbug, Clostridium difficile, is said to have killed at least 49 people at
    hospitals in Leicester, England, according to a National Health Service investigation.
    Another 29 similar cases are being investigated by coroners. (BBC)
  - The last Israeli troops leave Lebanon in accordance with UN Resolution 1701, two
    months after occupying the territory. UNIFIL officials, however, claim that they
    still occupy the border village of Ghajar. (Reuters)
  - New laws against age discrimination in the workplace - officially titled the Employment
    Equality (Age) Regulations 2006 - come into force in the United Kingdom. (BBC)
  - In the Australian National Rugby League's premiership-deciding game for season
    2006, the Brisbane Broncos defeat the Melbourne Storm by 15–8 to win its sixth
    premiership title. (BBC)
  Georgia-Russia spying dispute:
  - Russian President Vladimir Putin has said Georgia's arrest of four Russian army
    officers for spying was "an act of state terrorism with hostage-taking". (BBC)
