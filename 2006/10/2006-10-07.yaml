Date: '2006-10-07'
Source_URI: Portal:Current events/2006 October 7
Intelligence_Payload:
  Uncategorized:
  - New Guinea volcano Rabaul caldera erupts. Two hundred people are evacuated but
    favourable winds help protect nearby towns from the impact. (ABC News Australia)
  - Russian journalist Anna Politkovskaya, famous for her criticism of President Vladimir
    Putin and his government's actions in Chechnya, is found murdered in Moscow. (Interfax),
    (BBC)
  - Sixty warning shots are fired by South Korean soldiers at the Korean Demilitarized
    Zone after they observe five North Korean soldiers crossing part of the boundary.
    (AP via CNN)
  - 'Latvian parliamentary election: The governing coalition led by Prime Minister
    Aigars Kalvītis wins re-election, the first Latvian administration to be re-elected
    since independence from the Soviet Union in 1991. (BBC)'
