Date: '2006-10-02'
Source_URI: Portal:Current events/2006 October 2
Intelligence_Payload:
  Uncategorized:
  - South Korea's Foreign Minister, Ban Ki-moon, wins a crucial informal poll for
    the next United Nations Secretary-General with no opposition from any of the five
    veto-bearing Security Council members. (Reuters)
  - Zambia's President, Levy Mwanawasa, is re-elected, according to the Zambian Electoral
    Commission. (BBC)
  - At least five pupils, a teacher's aide, and a gunman are dead after an Amish school
    shooting in Nickel Mines, Pennsylvania, United States. Some reports have the number
    of dead at six. (The Guardian) (ABC) (CNN) (BBC)
  - Željko Komšić, Nebojša Radmanović and Haris Silajdžić are elected new members
    of the Presidency of Bosnia and Herzegovina, the country's collective head of
    state. (ABC)
  - Two schools in the Las Vegas Valley, Nevada, United States, are locked down, after
    a former student reportedly brought an AK-47 or other automatic weapons to school.
    (Wikinews) (KVBC)
  - Casino company Harrah's Entertainment receives an $81-per-share cash offer from
    private-equity firms Apollo Management and Texas Pacific Group.
  - Former U.S. Rep. Mark Foley, under FBI investigation for e-mail exchanges with
    teenage congressional pages, has checked himself into rehabilitation facility
    for alcoholism treatment.
  - Andrew Fire and Craig Mello win the Nobel Prize in Physiology or Medicine for
    their work in controlling the activity of genes. (ABC)
  - Canada's Meteorological Service issues a tropical storm warning for the Avalon
    Peninsula in southeastern Newfoundland, including the cities of Cape Race and
    St John's, due to Hurricane Isaac. (CNN)
  Georgia-Russia spying dispute:
  - Four Russian officers arrested as spies in Georgia leave for Moscow after being
    released. (BBC)
  - Russia suspends all transport and postal links with Georgia. (The New York Times)
