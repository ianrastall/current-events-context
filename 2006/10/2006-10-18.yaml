Date: '2006-10-18'
Source_URI: Portal:Current events/2006 October 18
Intelligence_Payload:
  Uncategorized:
  - United States Secretary of State Condoleezza Rice arrives in Tokyo for talks with
    Japanese officials amid fears North Korea could be readying for a second nuclear
    test. (USA Today)
  - Tamil Tiger rebels are suspected to be responsible for attacks on a Sri Lankan
    navy base and an adjoining port in the southern city of Galle, police and military
    officers claim. (CNN)
  - Chilean police detain 366 high school student protestors in Santiago, and use
    tear gas and water cannons to disperse their one day strike which called on the
    government to reform the education law, originally enacted under Augusto Pinochet.
    (Deutsche Presse-Agentur)
  - Microsoft Corporation released version 7 of its Internet Explorer internet browser
    software.
