Date: '2006-10-23'
Source_URI: Portal:Current events/2006 October 23
Intelligence_Payload:
  Uncategorized:
  - The Romanian Army officially ends the use of conscription. (RadioFreeEurope/RadioLiberty)
  - The Initiative Group of Independent Rights Defenders in Uzbekistan demands the
    Karimov administration release political opposition leader Sanjar Umarov, calling
    the case against him "entirely fabricated." Uzbek authorities arrested Umarov
    in 2005. (RadioFreeEurope/RadioLiberty)
  - Police in Hungary fire tear gas on crowds of about 1,000 demonstrators during
    the 50th anniversary of the country's revolt against Soviet rule. (BBC)
  - Sir Michael Somare, Prime Minister of Papua New Guinea, and Ham Lini, Prime Minister
    of Vanuatu, condemn the police raid on the office of Solomon Islands Prime Minister
    Manasseh Sogavare. (ABC News Australia)
  - Hurricane Paul becomes a Category 2 hurricane off Mexico's Pacific coast as it
    heads for Baja California. (CBS News)
  - Two of the three people accused of plotting to steal trade secrets from Coca-Cola
    have each pleaded guilty to one count of conspiracy. (AP via Sharewatch)
  - Authorities say an explosion at a coal mine in eastern Pennsylvania has killed
    one person. (AP via Fox North Carolina)
  - Avigdor Liberman signs a coalitionary agreement with Israeli Prime Minister Ehud
    Olmert to join the cabinet as Minister for Strategic Affairs, a new position.
    (Ynetnews)
  - Jeffrey Skilling is sentenced to 24 years, 4 months in prison for his role in
    the collapse of Enron, concluding the Trial of Kenneth Lay and Jeffrey Skilling.
    (AP via CBS News)
  - Though given three days to leave Sudan for blogging on recent government defeats
    in the Darfur conflict, UN envoy Jan Pronk left the next day when UN Secretary
    General Kofi Annan recalled him to New York for consultations. (BBC)
  - The airing of excerpts from a controversial DVD in Australia leads to a police
    investigation and public condemnation.(The Age)
