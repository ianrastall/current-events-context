Date: '2006-10-09'
Source_URI: Portal:Current events/2006 October 9
Intelligence_Payload:
  Uncategorized:
  - The Supreme Islamic Courts Council of Somalia declare 'jihad' against Ethiopia
    following the Ethiopian military incursions into Bur Haqaba close to the shared
    border. (Reuters) (BBC)
  - French lawmakers introduce a bill to criminalize Armenian Genocide denial. The
    legislation would imprison offenders for one year and fine them up to €45,000.
    Turkey calls upon French legislators to vote against the bill. The Turkish Parliament
    is considering a bill that would criminalize denial of French human rights violations
    in Algeria. (TurkishPress)
  - Google officially announces that they will buy video sharing website YouTube for
    US$1.65 billion. (BBC)
  - South Korean Ban Ki-moon is nominated to succeed Kofi Annan as the United Nations
    Secretary-General in an affirmation vote by the Security Council. A confirmation
    vote by the General Assembly is expected within the next fortnight. (Reuters via
    CNN)
  - 2006 North Korean nuclear testing
  - The Korean Central News Agency of North Korea reports that the nation has tested
    its first nuclear weapon in an underground facility at Gilju in North Hamgyong
    province. This report was at least somewhat confirmed by a seismic event that
    was measured around the world. (AP) (Adelaide Now)
  - The United States Geological Survey says it detected an earthquake of 4.2 in North
    Korea suspected to be caused by the effects of the underground blast. (AFP via
    ABS_CBN)
  - China expresses its "resolute opposition" to what it described as North Korea's
    "brazen" nuclear test. (The Australian)
  - United States President George W. Bush, UK Prime Minister Tony Blair, and South
    Korean President Roh Moo-Hyun, are among world leaders to condemn North Korea's
    nuclear testing, calling it "provocative", "irresponsible" and "a serious threat
    to peace", respectively. (BBC)
  - American Edmund S. Phelps wins the 2006 Nobel Memorial Prize in Economic Sciences
    for work on the trade-offs between inflation and unemployment. (ABC News)
