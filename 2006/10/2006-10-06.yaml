Date: '2006-10-06'
Source_URI: Portal:Current events/2006 October 6
Intelligence_Payload:
  Uncategorized:
  - President Bush has declared space to be essential to US defence in a new National
    Space Policy document. Not only has the United States declared that it has rights
    in space, but, if necessary, it will deny its adversaries access to space if those
    adversaries seek to impede those rights. The new policy was agreed upon in August
    but the document was not released until 6 October. See Wikinewsn:US declares vital
    interest in space
  - A truce is called in Bolivia after a dynamite battle between rival groups of tin
    miners kills 16 people in the department of Oruro, with another 60 people injured.
    President Evo Morales sacks his mining minister for not anticipating the violence.
    (ABC News Australia)
  - Some 18,000 people are evacuated from the Apex area of the U.S. state of North
    Carolina and 13 are reported injured after a blast and fire at an Environmental
    Quality Industrial Services chemical plant. (CNN)
  - Negotiators from the European Union and the United States reach a deal on sharing
    trans-Atlantic passenger data used in anti-terrorism investigations. (The Independent)
  - The Roman Catholic Church's Theological Commission are reviewing the teaching
    of limbus infantium (limbo for infants who died before being baptised) and may
    recommend to Pope Benedict XVI that it be amended. (BBC)
  - The new Swedish Prime Minister, Fredrik Reinfeldt, presents his new cabinet. (BBC)
  - '2006 Southeast Asian haze: Smoke from fires in western Indonesia causes air quality
    and visibility to plummet to unhealthy levels in neighboring Malaysia. (AP via
    CNN)'
  - NASA releases close-up photos taken by the Mars Reconnaissance Orbiter of the
    planet Mars revealing its hidden, oceanic past. (The Times (UK))
