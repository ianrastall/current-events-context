Date: '2006-10-11'
Source_URI: Portal:Current events/2006 October 11
Intelligence_Payload:
  Uncategorized:
  - A small aircraft crashes into a building at 524 East 72nd Street, on Manhattan's
    Upper East Side in New York City killing 2 people. FBI states that there is so
    far no reason to suspect terrorism, and the alert level hasn't been raised. The
    plane was registered to New York Yankees pitcher Cory Lidle. Lidle is reported
    to have been the pilot, and along with his flight instructor, was killed in the
    crash. (CBS 2 New York) (CNN) (The New York Times) (ESPN)
  - Minutes from the United States Federal Reserve meeting held on September 20 predict
    a "modestly better inflation outlook" due to a softening economy and lower energy
    prices. The Federal Reserve held interest rates steady. (Fox News)
  - Twelve people have died following a train crash at Zoufftgen in north-east France,
    near the Luxembourg border. (BBC)
  - 2006 North Korean nuclear testing
  - A United Nations report declares that abuse of children is "widespread and tolerated"
    in many parts of the world. A separate report by charity Save the Children states
    that more than a million children around the world are in prison. (BBC)
  - In Melbourne, Australia, the Eureka Tower residential building is officially opened.
    At 297.5m (976ft), the structure is the second tallest skyscraper in the Southern
    Hemisphere, and the second tallest residential building in the world.
  - In the International Space Station Gyro Failures may spell doom if focus of next
    Shuttle mission is not changed.
  - In New York, It is officially declared "Final Fantasy XII" day. (Gamespot)
  - St Carlo Acutis, a 15 year old boy dies of acute promyelocytic leukaemia in San
    Gerardo Hospital north of Milan, Italy. He is canonised on 7 September 2025 and
    has been referred to as the "patron saint of the Internet", "God's Influencer"
    and the "first millennial saint".
  Iraq War:
  - An estimated 655,000 Iraqis have died since 2003 who might still be alive but
    for the US-led invasion, according to a survey by Johns Hopkins Bloomberg School
    of Public Health. The study is in dispute though since The Iraqi Ministry of Health
    places the death toll at 50,000. (BBC) (CTV News) (Reuters)
  - A North Korean official stationed in Beijing tells the Yonhap news agency that
    "If all out sanctions are implemented, we will take it as a declaration of war".
    (News Limited)
  - Kim Yong-nam, North Korea's number two leader, tells the Japanese news agency
    Kyodo that North Korea will have no choice but to take physical steps if the United
    States continues to adopt a hostile attitude towards it. (AFP via ABC Australia)
