Date: '2006-10-14'
Source_URI: Portal:Current events/2006 October 14
Intelligence_Payload:
  Uncategorized:
  - Six Palestinians from the armed wing of the militant group Hamas have been killed
    in an Israeli incursion into the Gaza Strip, Palestinian officials say. (BBC)
  - Thousands of people have been attending mass ceremonies in India at which hundreds
    of low-caste Hindus (Dalits) converted to Buddhism and Christianity. (BBC)
  - 2006 North Korean nuclear testing
  - The United Nations Security Council adopts Resolution 1718, imposing sanctions
    on North Korea in response to its recent nuclear test. (BBC)
  - North Korea's ambassador to the United Nations, Pak Kil-yon, says Pyongyang "totally
    rejects" United Nations Security Council Resolution 1718 sanctioning his country,
    calling the measure "gangster-like". (AP via KCBI)
  - President of the United States George W. Bush says the UN Security Council has
    taken "swift and tough" action and sent a clear message to North Korea about its
    nuclear weapons program.
  - UN Secretary-General Designate Ban Ki-moon says the vote represents a "strong
    and clear message" and promises, if necessary, to visit North Korea to discuss
    the situation. (BBC)
  - A re-enactment of the Battle of Hastings takes place in Sussex, UK to mark the
    940th anniversary of the event which saw William of Normandy's forces defeat the
    Saxon army of King Harold II, and began the Norman Conquest of England. (BBC)
  - Maria Borelius, Minister for Foreign Trade in the Cabinet of Fredrik Reinfeldt
    in Sweden, resigns after one week in office following allegations of tax evasion.
    (BBC) (CNN)
  - Chelsea FC goalkeepers Petr Čech and Carlo Cudicini both suffered serious injuries
    in a game against Reading FC. Cech suffered a depressed fracture of the skull
    after colliding with Reading midfielder Stephen Hunt. The injury kept him out
    of action until January 20, 2007. Cudicini suffered concussion after colliding
    with Reading defender Ibrahima Sonko as the ball curled in from a corner. John
    Terry took the position as goalkeeper for the remainder of the game.
