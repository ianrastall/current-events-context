Date: '2006-10-22'
Source_URI: Portal:Current events/2006 October 22
Intelligence_Payload:
  Uncategorized:
  - Tropical Storm Paul is upgraded to a Category 1 hurricane and is threatening Baja
    California. (Reuters Alertnet)
  - Mohammed Shahadeh, leader of the al-Aqsa Martyrs Brigades terrorist organization
    in the Gaza Strip Bureij refugee camp, is shot to death outside his home. Fatah
    officials accuse members of Hamas of being behind the assassination. (BBC News)
  - Alberto Fernandez, Director of Office of Press and Public Diplomacy in the Bureau
    of Near Eastern Affairs at the United States Department of State, apologises for
    saying the United States Government has shown "arrogance and stupidity" in Iraq.
    (New York Times)
  - Based on extraofficial partial results, Panama has approved in a referendum a
    $5.25 billion USD plan to expand the Panama Canal by 79% (40% of votes counted).
    Real-Time counting of votes (BBC News) (CNN)
  - Icelandic fisherman kill a Fin Whale, breaking the International Whaling Commission's
    ban on commercial whaling. (BBC News)
  - The government of Sudan gives United Nations envoy Jan Pronk three days notice
    to leave the country over comments on the military situation in Darfur made on
    his weblog. (BBC News)
  - Israeli defense minister Amir Peretz says flights over Lebanon will continue until
    UN Security Council Resolution 1701 is fully implemented. (Ynet News)
  - Michael Schumacher, seven times Formula One World Champion, retires from the sport.
    (BBC News) (Canada.com)
  Iraqi insurgency:
  - Gunmen kill 15 police recruits and wound 25 south of the city of Baqouba in Iraq.
    (AP via ABC News America)
