Date: '2006-10-20'
Source_URI: Portal:Current events/2006 October 20
Intelligence_Payload:
  Uncategorized:
  - OPEC agrees to reduce its output by , its first cut for more than two years, to
    halt falling oil prices. (USA Today)
  - The Indian conglomerate Tata Group agrees to buy Anglo-Dutch steel firm Corus
    in the largest ever Indian takeover of a foreign company. (NDTV)
  - Ethiopia expels two European Union diplomats for allegedly trying to smuggle two
    fugitives into Kenya. The European Union criticises the expulsions as "totally
    unacceptable." (BBC)
  - United States authorities charge a Wisconsin man with making a hoax threat against
    seven American football stadiums that said they would be targeted by terrorists
    with radiological dirty bombs on the weekend. (AP via WCBS)
  - The Government of Kazakhstan is building a security fence on its border with Uzbekistan
    to prevent terrorist attacks in the country. (The New York Times)
  - Clare Short, the former British cabinet minister, has left the Labour Party to
    sit as an Independent Labour MP. (BBC)
  - Solomon Islands police and members of the Regional Assistance Mission to the Solomon
    Islands (RAMSI) raid the office of Prime Minister Manasseh Sogavare in Honiara.
    (ABC News Australia)
  - European Union leaders gather in Lahti, Finland, for a summit with Russian President
    Vladimir Putin. (BBC) (CNN)
  - Newly convicted prisoners in the United Kingdom are to be held in police cells
    rather than prisons, as the nation's prison service faces chronic overcrowding
    in its jails. (BBC)
