Date: '2006-10-04'
Source_URI: Portal:Current events/2006 October 4
Intelligence_Payload:
  Uncategorized:
  - The Dow Jones Industrial Average reaches another record high close, rising above
    11,850 for the first time. (CBS News)
  - A United States Appeals Court in Cincinnati, Ohio rules that the U.S. government
    can continue to use its warrantless domestic wiretap program pending the Justice
    Department's appeal of a federal judge's ruling outlawing the program. (Reuters)
  - The Federal Bureau of Investigation and the Food and Drug Administration searches
    two spinach packaging companies in the Salinas Valley in California for evidence
    related to a recent outbreak of E. coli in the United States and Canada that made
    200 people sick. (San Francisco Chronicle)
  - The European Union imposes an anti-dumping tariff on leather shoe imports from
    the Far East - 16.5% on imports from China and 10% on imports from Vietnam. China
    supplies about 1.25 billion pairs of shoes to the EU each year. (EUobserver.com)
  - American Roger Kornberg wins the 2006 Nobel Prize in Chemistry for describing
    the essential process of gene copying in cells, research that can give insight
    into illnesses such as cancer and heart disease. (Boston Globe)
  Mark Foley scandal:
  - The Drudge Report alleges that one teen with whom Mark Foley engaged in cybersex
    during a House vote was 18 years old at the time of the communications. (Drudge
    Report)
  - A former page states that he was warned of Representative Foley's advances by
    a departing page in 1995. Among his claims are that Foley made him uncomfortable
    and offered to buy him ice cream on several occasions. (Chicago Tribune)
  - House Speaker J. Dennis Hastert states that he will not resign from his position
    in the wake of the scandal. (Chicago Sun-Times)
