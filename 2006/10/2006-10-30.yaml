Date: '2006-10-30'
Source_URI: Portal:Current events/2006 October 30
Intelligence_Payload:
  Uncategorized:
  - President of Bulgaria Georgi Parvanov is reelected after a run-off election with
    Volen Siderov in the presidential elections. (EITB)
  - 'Chenagai airstrike: Pakistani helicopter gunships fired missiles and destroyed
    an al-Qaeda-linked training facility and killed 80 suspected terrorists in a northwestern
    tribal area near the Afghan border, in a madrassa near the town of Khar. (Reuters
    AlertNet)'
  - The Israeli cabinet has approved the addition of the Yisrael Beitenu party into
    the governing coalition. (BBC News)
  - Sir Nicholas Stern, the former chief economist of the World Bank, submits a report
    to the British Government warning of the economic costs and damage to the world
    that could result from global warming. (The Times)
  - Saddam Hussein's chief lawyer, Khalil al-Duleimi, walks out of court after 12
    of his requests were rejected, but the chief judge immediately appoints other
    attorneys to defend the deposed President of Iraq. (USA Today)
  - Specialist Ahmed Qusai al-Taayie, an Iraqi American United States Army soldier
    currently listed as missing in action in Iraq, is reported to have married an
    Iraqi citizen, against U.S. military regulations. (MSNBC)
  - A bomb at a Baghdad market kills 31 people and wounds more than 50 others. (AP
    via ABC News America)
  - Super Typhoon Cimaron, the strongest storm to hit the Philippines in eight years,
    kills at least three people as it makes landfall in Luzon. (Reuters), (Reuters)
