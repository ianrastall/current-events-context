Date: '2006-10-24'
Source_URI: Portal:Current events/2006 October 24
Intelligence_Payload:
  Uncategorized:
  - Ethiopian Prime Minister Meles Zenawi accuses the Government of Eritrea of jeopardizing
    regional stability by engaging in a proxy war through its assistance to the Islamic
    Courts Union in Somalia. Zenawi warns the Ethiopian Parliament that "Jihadists
    are amassing their forces near our borders."(allAfrica)
  - The Dow Jones Industrial Average closes at another record high. (News Limited)
  - Solomon Islands Prime Minister Manasseh Sogavare formally proposes reducing the
    role of Australia in the Regional Assistance Mission to the Solomon Islands (RAMSI)
    in his country at a Pacific leaders forum in Fiji. (ABC News Australia)
  - The European Union announces it plans to assist Kazakhstan in developing nuclear
    power for "peaceful purposes." (NASDAQ)
  - Iranian President Mahmoud Ahmadinejad opposes a bill in Iranian parliament that
    would require the fingerprinting of any citizens of the United States that are
    visiting Iran, stating, "We do not have a problem with American people. We oppose
    only the U.S. government." (AP via ABC)
  - An Associated Press photographer is released after a day in the hands of Palestinian
    gunmen. (AP via WCBS)
  - Speaker of the United States House of Representatives Dennis Hastert sits down
    with ethics investigators trying to determine when he and his staff learned about
    ex-Rep. Mark Foley's come-ons to former male pages and what they did to stop it.
    (AP via San Francisco Chronicle)
  - Firefox 2.0 is released. (CNET)
