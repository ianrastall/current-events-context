Date: '2006-12-29'
Source_URI: Portal:Current events/2006 December 29
Intelligence_Payload:
  Uncategorized:
  - Police discover skulls, bodies of 15 missing children in Noida, India.
  - AT&T, Inc. acquires BellSouth Corporation to create one of the largest telecommunications
    companies in the world.
  - The United Kingdom pays off the last of its debts from World War II by paying
    the last $100 million to the United States and Canada. The country still has debts
    outstanding from the Napoleonic Wars, which are cheaper to pay interest on than
    to redeem. (International Herald Tribune) (BBC)
  - Kazakh Foreign Minister Kassym-Jomart Tokayev says that in the event of a war
    in Turkmenistan over succession to Turkmenbashi Saparmurat Niyazov, "Kazakhstan
    is not going to get involved." (Interfax)
  - Kyrgyz President Kurmanbek Bakiyev will address the Supreme Council on 30 December
    2006 in an effort to compromise on proposed amendments to the constitution. Several
    Parliamentarians warn that Kyrgyzstan is on the verge of civil war. (RadioFreeEurope/RadioLiberty)
  - A 25 square mile (66 km²) chunk of the Ayles Ice Shelf was discovered to have
    broken off of Ellesmere Island, Nunavat, Canada. (NatlGeog), (BBC), (Scotsman),
    (Reuters), (CBC)
