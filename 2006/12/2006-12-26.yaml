Date: '2006-12-26'
Source_URI: Portal:Current events/2006 December 26
Intelligence_Payload:
  Uncategorized:
  - Gerald Ford, former President of the United States, dies at 93. (MSNBC) (BBC News)
  - Almaz Atambayev, Chairman of the Social Democratic Party of Kyrgyzstan, warns
    that if Prime Minister Felix Kulov's proposed amendments to the constitution are
    passed, giving greater power to the executive branch, Kyrgyzstan will descend
    into civil war. (RadioFreeEurope/RadioLiberty)
  - 'Trial of Saddam Hussein: An appeal court in Baghdad has rejected former Iraqi
    leader Saddam Hussein''s appeal against the death sentence handed down on November
    5 for the 1982 killings of Shias in Dujail. By Iraqi law, the execution by hanging
    has to be carried out within 30 days after the announcement of the rejection.
    (BBC News)'
  - Between 200 and 500 people have been killed in an oil pipeline explosion in Nigeria's
    commercial capital, Lagos, according to the Red Cross. The blast is believed to
    have been caused by thieves puncturing the pipeline in an attempt to siphon off
    fuel into a tanker. (BBC)
  - 'War in Somalia: Somalia''s Islamist militia are reported to have withdrawn from
    frontlines after a sustained assault by government forces backed by Ethiopian
    troops. (BBC)'
  - Southwestern Taiwan is shaken by a 7.2 earthquake at 20:28 (GMT+8). A second aftershock,
    estimated at 7.1 and centered in Pingtung County, is felt 5 minutes later. According
    to the Pacific Tsunami Warning Centre, no Pacific-wide tsunami is expected. (TVBS)
    (CNN)
