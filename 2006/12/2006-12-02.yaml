Date: '2006-12-02'
Source_URI: Portal:Current events/2006 December 2
Intelligence_Payload:
  Uncategorized:
  - Protestors begin their second day of demonstrations in their bid to convince the
    current Lebanese administration to step down. (BBC)
  - Leaked Pentagon memo by United States Secretary of Defense Donald Rumsfeld says
    US policy in Iraq is "not working well enough or fast enough." (The New York Times)
  - 'Iraqi insurgency: At least 50 people are killed by three car bombs exploding
    in Baghdad. (BBC)'
  - Bahrainis go to the polls today in the second round of voting in the Kingdom's
    parliamentary elections. (BBC)
  - Rescuers in the Philippines continue to look for survivors of Typhoon Durian.
    (ABC News Australia)
  - London police are examining whether the killers of Alexander Litvinenko also tried
    to poison Mario Scaramella, an Italian security expert who met the Russian exile
    on the day that he fell ill. (The Times)
  - 'Chadian Civil War (2005–2010)/Darfur conflict: Chadian rebels have attacked the
    eastern town of Guéréda, neighbouring Sudan''s war-torn Darfur region. (BBC)'
  - Police and aid workers recover more than 100 bodies from Malakal in south Sudan
    resulting from fighting between former rebels and Government forces. (AP via CBS
    News)
  - As Kazakhstan begins its nuclear program the Japanese Government sends a delegation
    to make sure nuclear materials are not susceptible to theft by Kazakh terrorists.
    (Japan Today)
  - Fijian military commander Frank Bainimarama announces that he has taken control
    of Fiji. (NZ Herald)
  - Stéphane Dion is elected leader of the Liberal Party of Canada, defeating Michael
    Ignatieff. (CBC)
  - Ed Stelmach is elected leader of the Progressive Conservative Association of Alberta
    and will become the next premier of Alberta, replacing outgoing leader Ralph Klein
    and defeating competitors Jim Dinning and Ted Morton. (CBC)
