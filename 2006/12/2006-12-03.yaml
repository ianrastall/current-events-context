Date: '2006-12-03'
Source_URI: Portal:Current events/2006 December 3
Intelligence_Payload:
  Uncategorized:
  - The protests in Lebanon led by Hezbollah last for a third day. (Reuters via CNN)
  - Venezuela holds elections, with incumbent president Hugo Chávez facing a challenge
    from Manuel Rosales, Governor of the western state of Zulia. With 78% of votes
    counted by the National Electoral Council, Chávez wins with 61% over 38% for Rosales.
    (Reuters)
  - At least 804 people are dead or missing in the Philippines as a result of Typhoon
    Durian with the death toll expected to rise further. (Bloomberg)
  - Former President of Chile Augusto Pinochet is in a military hospital after having
    had a heart attack. Doctors decide to perform coronary artery bypass surgery.
    (BBC), (Ireland Online)
  - Madagascar holds an election with incumbent Marc Ravalomanana expected to be elected
    as the President of Madagascar. (Reuters via the Scotsman)
  - The Junior Eurovision Song Contest 2006 was won by The Tolmachevy Twins from Russia
    with the song "Vesenniy Dzhaz". (ESC Today)
  - Russia wins the 2006 Davis Cup after a 3-2 victory over Argentina (BBC Sport)
