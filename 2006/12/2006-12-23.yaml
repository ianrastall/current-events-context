Source_URI: Portal:Current events/2006 December 23
Intelligence_Payload:
  Uncategorized:
  - The UN Security Council unanimously adopts Resolution 1737, sanctioning Iran for
    its nuclear program. (Bloomberg)
  - The U.S. military reports that top Taliban military commander Mullah Akhtar Mohammad
    Osmani was killed on Tuesday by a U.S. airstrike while traveling by vehicle in
    a deserted area in the southern Afghanistan province of Helmand. Taliban spokesmen
    deny he is dead. (CNN)
