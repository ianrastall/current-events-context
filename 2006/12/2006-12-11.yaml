Date: '2006-12-11'
Source_URI: Portal:Current events/2006 December 11
Intelligence_Payload:
  Uncategorized:
  - In Nagorno-Karabakh 98.6 percent of voters vote in favor of a constitution favoring
    independence from Azerbaijan. (RadioFreeEurope/RadioLibery)
  - Former GAM rebel leader Irwandi Yusuf is elected governor of the Indonesian province
    of Aceh in elections that are part of a peace deal ending the civil war. (Bernama)
  - Former Prime Minister of Fiji Sitiveni Rabuka is cleared of two charges of mutiny
    in relation to the mutinies of the 2000 Fijian coup d'état. (ABC News Australia)
  - Archaeologists working for the Vatican have found the tomb of Paul of Tarsus.
    (USA Today)
  - United Nations Secretary-General Kofi Annan strongly criticizes the United States,
    in particular the Bush administration, claiming it has strayed from multilateralism
    and human rights, in his final speech. (BBC)
  - The International Conference to Review the Global Vision of the Holocaust gets
    underway in Iran to examine whether the Holocaust took place or not. (BBC)
  - Traces of polonium-210 are found in a flat in Hamburg, Germany, on objects touched
    by former Russian spy Dmitri Kovtun a day before he met poisoned ex-spy Alexander
    Litvinenko in London. (The Times)
  - Unidentified gunmen try to assassinate Baha Balousheh, a security chief associated
    with Fatah, but instead shoot and kill his three children in the Gaza Strip. The
    assassination attempt may have been a revenge attack for the attempted assassination
    of Interior Minister Sayid Seyam of Hamas. (BBC) (JTA)
  - The Space Shuttle Discovery successfully docks with the International Space Station
    with the crew to spend a week rewiring the space station. (CNN)
  - In an interview with Jeff Stein, a national security editor for Congressional
    Quarterly, Silvestre Reyes, the incoming Chairman of the U.S. House Intelligence
    Committee incorrectly claims that Al Qaeda is a "predominantly Shiite" organization.
    When asked if Hezbollah is a Sunni or a Shiite organization, Reyes said "It's
    hard to keep things in perspective and in the categories." (Fox News)
  - A devastating bushfire rips through the town of Scamander, Tasmania in Australia,
    destroying 23 homes. (News.com.au)
  - American supercentenarian and oldest living person Elizabeth Bolden dies and leaves
    Emiliano Mercado del Toro as the titleholder.
