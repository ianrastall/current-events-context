Date: '2006-12-01'
Source_URI: Portal:Current events/2006 December 1
Intelligence_Payload:
  Uncategorized:
  - The 2006 Asian Games are officially opened by Qatari emir Sheikh Hamad bin Khalifa
    Al Thani at the 50,000 seater Khalifa Sports Stadium in Doha, Qatar. (AFP via
    Yahoo! News)
  - The Roman Catholic Archdiocese of Los Angeles settles 45 lawsuits alleging sexual
    abuse by priests for $60 million. (AP via Minneapolis-St Paul Star Tribune)
  - Hezbollah members demonstrate their opposition to the Siniora administration in
    Beirut, Lebanon. (The Guardian) (BBC)
  - As Bahrain prepares for tomorrow's second round of its parliamentary elections,
    a Member of Parliament from the Kingdom's largest party calls for legislation
    to restrict women's employment. (Gulf Daily News)
  - Felipe Calderón becomes the President of Mexico. (Reuters)
  - Typhoon Durian has killed at least 388 people in Albay province on the island
    of Luzon in the Philippines with the death toll expected to climb as rescuers
    get to affected villages. (Bloomberg) (CNN)
  - Kim Beazley calls a vote for the leadership of the Federal Australian Labor Party
    for Monday. He will face a challenge from Kevin Rudd, the Opposition spokesman
    on foreign affairs. Jenny Macklin faces a challenge from Julia Gillard for the
    Deputy Leadership. (Melbourne Herald Sun) (AAP via News Limited)
  - Fijian military commander Frank Bainimarama says he intends to begin a "clean
    up" campaign of Government now that his deadline has passed. Laisenia Qarase,
    the Prime Minister of Fiji, has advised that he has been given a new deadline
    of noon on Monday. (NZ Herald) (ABC News Australia)
  - The United States warns of a possible al-Qaeda attack to disrupt the stock market
    and other financial institutions with a cyber attack. (BBC)
  - Billionaire Kirk Kerkorian sold off the last of his shares in General Motors,
    the Wall Street Journal reported. It was clear that Kerkorian had sold 14 million
    shares for $28.75 per share, or about $400 million, slicing his stake to 4.95%.
    (MSN Money)
