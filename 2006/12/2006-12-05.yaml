Date: '2006-12-05'
Source_URI: Portal:Current events/2006 December 5
Intelligence_Payload:
  Uncategorized:
  - Yury Chaika, the Prosecutor General of Russia, has stated that Russia will not
    extradite any suspects in the radioactive poisoning death of Alexander Litvinenko.
    (CNN)
  - The United States Senate Committee on Armed Services unanimously approves the
    nomination of Robert Gates to be the next United States Secretary of Defense.
    (Reuters)
  - A majority of a 15-judge panel in the United States Court of Appeals for the Ninth
    Circuit rules that Kamehameha Schools can favour Native Hawaiians in admissions.
    (San Francisco Chronicle)
  - An outbreak of E. coli bacteria has sickened more than a dozen people on Long
    Island, including several who ate at Taco Bell. Officials have asked eight Taco
    Bell restaurants be closed. (CBS)
  - The Prime Minister of Fiji Laisenia Qarase warns that Fiji faces the imminent
    threat of a coup as troops reportedly surround his complex. Later, Fiji's military
    commander Frank Bainimarama confirmed that the military was in control of the
    country while the Foreign Minister of Australia Alexander Downer warned that Fiji
    would face international sanctions. (BBC) (ABC)
  - Early election results indicate that Marc Ravalomanana will be re-elected in a
    landslide as the President of Madagascar. (IOL)
  - The French Government launches state-owned and controlled France 24, a 24-hour
    television news show. (NPR)
  - U.N. Secretary-General Kofi Annan appoints former Mozambican President Joaquim
    Chissano as the new United Nations-envoy to negotiations between the Government
    of Uganda and the Lord's Resistance Army, a rebel paramilitary group. (BBC News)
  - The World Chess Champion Vladimir Kramnik loses a final game and a match with
    a computer program, Fritz-10. The final score is 2-4. (Seattle Post)
  - German painter Tomma Abts wins the 2006 Turner Prize. (BBC)
