Intelligence_Payload:
  Uncategorized:
  - Time names "You" – contributors of user-generated content to websites such as
    YouTube and Wikipedia – as its Person of the Year. (Time) , (MSNBC).
  - Christopher R. Hill, US Chief negotiator in the six-party talks concerning North
    Korea's nuclear program, announces plans to meet with North Korea prior to the
    resumption of the talks on Monday. (AFP via New Straits Times)
  - Palestinian National Authority President Mahmoud Abbas calls for early legislative
    elections to end the stalemate in creating a national unity government with the
    Hamas party. (CNN)
  - Egyptian High Court rules that the members of the Baháʼí Faith in Egypt should
    not receive government Identification cards, thus removing their rights to health
    care, education, work and other basic rights. (IHT)
