Date: '2006-12-06'
Source_URI: Portal:Current events/2006 December 6
Intelligence_Payload:
  Uncategorized:
  - Joseph Kabila, the first freely elected leader of the Democratic Republic of the
    Congo in 40 years, is inaugurated as President. (BBC)
  - The Iraq Study Group Report calls the situation in Iraq "grave and deteriorating"
    and calls for a change in strategy including the removal of most United States
    troops by early 2008. (CNN)
  - The Australian House of Representatives passes private members legislation allowing
    therapeutic cloning after a conscience vote. The Australian Senate had already
    approved the bill prepared by Senator Kay Patterson meaning that it will become
    law. (News Limited)
  - The United States Senate confirms Robert Gates as the next United States Secretary
    of Defense by 95–2. Gates will be sworn in on December 18. (CNN)
  - Philippe Douste-Blazy, the Foreign Minister of France, says that the United Nations
    Security Council will impose sanctions on Iran for its nuclear program. However,
    the five permanent members of the Security Council as well as Germany have failed
    to agree on what the sanctions should be. (AFP via Khaleej Times)
  - NASA presents "compelling" evidence that liquid water flowed recently on the surface
    of Mars. (NASA), (BBC)
  - A large explosion occurs near downtown Milwaukee, killing 3, injuring 37 others
    and leveling a factory compound.(AP)
  - Officials of the Islamic Courts Union in power in Buloburde, Somalia, declare
    that, under their interpretation of Sharia, all people in the city must pray five
    times a day, or they will be beheaded on sight. (Fox News)
  - Hundreds of thousands of Dalits stage a mass rally in Mumbai to mark the 50th
    anniversary of the death of their leader, B. R. Ambedkar. (BBC)
  - James Kim is found dead in Oregon after spending 11 days in the wilderness. (CNN)
    (CNET)
  2006 Fijian coup d'état:
  - Fijian military Commodore Frank Bainimarama, the leader of the coup, usurps Ratu
    Josefa Iloilo as President of Fiji. He promises to ask the Great Council of Chiefs
    to reappoint Iloilo to the office in one week's time. (The NZ Herald)
  - Bainimarama appoints Jona Senilagakali as interim Prime Minister of Fiji. (Fiji
    Times)
  - The Fijian military deports deposed Prime Minister of Fiji Laisenia Qarase to
    his home island in the remote Lau Group. The military has also arrested senior
    Government officials. (Sydney Morning Herald)
  - The Fiji Times resumes publication after the military promises to refrain from
    further attempts at press censorship. (Fiji Times) Editors immediately blast the
    coup as illegal. (Fiji Times)
  - The United Kingdom joins the United States, Australia and New Zealand in halting
    defence foreign aid. (Fiji Times)
  - Bainimarama fires Fiji police commissioner Moses Driver, who had declared that
    the Fiji Police will stand up to the Fiji Military. Bainimarama warned against
    a popular uprising against the coup. (CNN)
