Date: '2006-12-17'
Source_URI: Portal:Current events/2006 December 17
Intelligence_Payload:
  Uncategorized:
  - Armed militia in Peru ambush and kill seven people involved in a crackdown on
    the illegal growing of coca. (BBC)
  - Iranian President Mahmoud Ahmadinejad offers to share Iran's nuclear technology
    with neighboring countries. (Concorde Monitor)
  - A roadside bomb kills three United States Army soldiers and wounds another north
    of Baghdad. (USA Today)
  - Masked gunmen kidnap 30 workers from the Red Crescent in Iraq with six low-level
    employees of the organisation later being released. (CNN)
  - A climber who had been lost on Oregon's Mount Hood is found dead in a snow cave
    minutes after rescuers were exploring a nearby cave with various related equipment
    inside. (Fox News)
  Hamas-Fatah conflict:
  - Masked gunmen kill an officer of an elite force loyal to the President of PNA
    Mahmoud Abbas in a dawn raid on a Gaza training camp as tensions worsen between
    Hamas and Fatah. (Reuters)
  - The two sides now say that they have agreed to a ceasefire. (Haaretz)(BBC)
