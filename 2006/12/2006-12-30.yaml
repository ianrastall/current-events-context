Date: '2006-12-30'
Source_URI: Portal:Current events/2006 December 30
Intelligence_Payload:
  Uncategorized:
  - Saddam Hussein is executed, by hanging, at approximately 06:00 local time (03:00
    UTC). (BBC News)
  - A bomb exploding in the parking lot of Terminal 4 of Barajas Airport, Madrid,
    Spain, kills two people, damages cars and buildings. (CNN)
  - The Supreme Council of Kyrgyzstan votes 50 to 1 in favor of amendments to the
    Constitution giving greater power to the executive branch after President Kurmanbek
    Bakiyev accuses Parliamentarians of "sabotaging" the political process. The President
    will now have the power to appoint and dismiss the Prime Minister and his cabinet
    and regional governors. The SNB, the domestic intelligence organization, will
    report to the President, not the legislature. (Al Jazeera)
  - At least 500 people are feared to have drowned after the ferry Senopati Nusantara
    travelling between the port of Kumai on the Indonesian island of Borneo to Semarang
    on Java sank during a storm. (BBC)
  - Former U.S. President Gerald Ford's funeral is held at the United States Capitol.
    (CBS)
  - The coat of arms of Nepal is changed as a gesture of reconciliation after the
    Nepalese Civil War. (People's Daily)
  - A 67-year-old Spanish woman, whose name has not been revealed, is reported to
    have given birth to twins in Barcelona, becoming the oldest birth mother. (BBC)
  - Tiki Barber rushes for 234 yards in his final game in the NFL. This is a record
    for the most rushing yards in a running backs last game, and a New York Giants
    team record for the most rushing yards in a game.
