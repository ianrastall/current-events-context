Date: '2006-12-25'
Source_URI: Portal:Current events/2006 December 25
Intelligence_Payload:
  Uncategorized:
  - 'Iraqi insurgency: Soldiers from the British Army storm a police headquarters
    in Basra, Iraq, arresting allegedly corrupt officers, transferring prisoners thought
    to have been subject to torture, and demolishing the building.'
  - James Brown, the "Godfather of Soul," dies of heart failure at the age of 73.
    (AP via Yahoo)
  - Flooding in Indonesia's Aceh and North Sumatra provinces has killed up to 80 people.
    More than 100,000 people have been forced out of their homes. (BBC)
  - The Supreme Council of Kyrgyzstan does not pass amendments proposed by acting
    Prime Minister Felix Kulov to the Constitution, some of which would alter the
    make up of the Council by expanding the number of Parliamentarians and electing
    members by party-line-voting. The Supreme Council may vote again on the amendments
    over the next week. (EurasiaNet)
  War in Somalia:
  - Ethiopian jets have bombed two airports in Somalia in a widening operation against
    the Islamic Courts Union. (BBC)
  - The Ethiopians captured the town of Baladweyne. (Aljazeera)
