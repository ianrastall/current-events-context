Date: '2006-12-10'
Source_URI: Portal:Current events/2006 December 10
Intelligence_Payload:
  Uncategorized:
  - Incumbent Igor Smirnov wins the presidential elections in the self-declared state
    of Transnistria. (DPA)
  - Ex Chilean president Augusto Pinochet dies. (The New York Times) (CNN)
  - A video has emerged showing the current president of Croatia Stjepan Mesić praising
    the German puppet-state Independent State of Croatia during a speech in the early
    1990s. (index.hr)
  - According to results released by the Interior Ministry of Madagascar, a total
    of 61.45% of the country's registered 7.3 million voters went to the polling stations
    on December 3 and re-elected Marc Ravalomanana as President with 54.8% of the
    votes, Jean Lahiniriko and Roland Ratsiraka received 11.68% and 10.1%, respectively.
    (BBC), (AP)
  - 'Nobel Prizes: Bangladeshi economist Muhammad Yunus accepts the Peace Prize, urging
    world leaders to end terrorism by fighting poverty. (AP via The Guardian)'
