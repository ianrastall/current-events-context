Date: '2006-05-25'
Source_URI: Portal:Current events/2006 May 25
Intelligence_Payload:
  Uncategorized:
  - Scientists confirm the theory that HIV originated among wild chimpanzees in Cameroon.
    (AP) (BBC)
  - Human Rights Watch discovers that on April 12 and April 13, 2006, Sudanese soldiers
    and Chadian rebels massacred 118 civilians in the city of Djawara with machetes
    and then buried them in mass graves. If the allegations are true, then the Sudanese
    government has sponsored genocide in Chad, and it has violated the Tripoli Accord.
    (VOA News)
  - Palestinian President Mahmoud Abbas issues an ultimatum to Hamas, giving them
    ten days to recognise Israel or have the question put to the people in the form
    of a plebiscite.(CNN)
  - Former Enron executives Kenneth Lay and Jeffrey Skilling are found criminally
    guilty for their role in the demise of the now-defunct energy-trading firm. (The
    New York Times)
  - The US House of Representatives approves H.R.5429, the American-Made Energy and
    Good Jobs Act, which targets the Arctic National Wildlife Refuge ("ANWR"). H.R.5429
    allows oil and gas exploration and development on 2,000 acres (8 km²) of the Arctic
    Coastal Plain (the key Wildlife Reserve in Alaska). (SITNEWS).
