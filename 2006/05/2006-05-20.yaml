Date: '2006-05-20'
Source_URI: Portal:Current events/2006 May 20
Intelligence_Payload:
  Uncategorized:
  - Ray Nagin is re-elected Mayor of New Orleans, USA.(BBC)
  - The construction of the Three Gorges Dam wall, the largest dam in the world, is
    completed in the People's Republic of China. (Reuters)
  - Campaigning in Montenegro's referendum on independence ends at midnight local
    time, with voting scheduled to begin the following morning. (B92) A final poll
    shows the independence forces with 56% support, slightly above the internationally
    imposed threshold of 55%. (EUObserver)
  - 5,000 medical students, doctors, and lawyers rally in New Delhi, India against
    the boosting of quotas for lower-caste students in medical, engineering and other
    colleges from 22.5% to 49.5%. (ChannelnewsAsia.com) (Wikinews)
  - The Iraqi National Assembly votes in a new government, leaving the ministries
    of Defense, National Security and Interior in temporary hands. (BBC)
  - United States Congressman Duncan Hunter (R-CA) claims U.S. Marines in Haditha,
    Iraq, killed 24 civilians in an incident in 2005. Earlier Rep. John Murtha (D-PA)
    had said even innocent women and children were killed in cold blood. (Washington
    Post) (Times of India)
  - Finnish rock band Lordi wins the Eurovision Song Contest 2006 with the song "Hard
    Rock Hallelujah". (BBC), (Reuters), (CNN)
  - Booth Middle School of Georgia and Troy High School of California win the 22nd
    annual U.S. Science Olympiad for their respective divisions, held at Indiana University
    Bloomington.
  - In the Crosstown Classic, a brawl breaks out between the Chicago White Sox and
    Chicago Cubs when Cubs catcher Michael Barrett punches White Sox catcher A. J.
    Pierzynski. Barrett drew a 10 game suspension.
  - Munster win their first Heineken European Cup, defeating Biarritz Olympique in
    the final by 23 points to 19. Team captain Anthony Foley lifts the cup for the
    first time for the Irish province.
  - Kentucky Derby winner, Barbaro breaks down during the Preakness Stakes. Eight
    months later he is euthanized.
