Date: '2006-05-30'
Source_URI: Portal:Current events/2006 May 30
Intelligence_Payload:
  Uncategorized:
  - A motion to vote on a bill opening the Three Links between mainland China and
    Taiwan is defeated for the third time in the Legislative Yuan of the Republic
    of China when a Democratic Progressive Party lawmaker tries to eat the written
    cloture motion. The opposition Pan-Blue Coalition controls the legislature and
    would have likely passed the bill. (Reuters) (ChinaPost)
  - British mobile phone operator Vodafone posts the largest annual loss in British
    corporate history – £21.8 billion – as it writes down the value of company purchases
    made mainly in Germany in the years up to 2000. (Guardian)
  - The board of the Engelhard Corporation agreed to a takeover by BASF. BASF will
    become the world's largest manufacturer of catalytic converters. BASF will pay
    USD 5.0 billion for Engelhard, which translates to $39 per share. (BBC)
  - Seven United Nations peacekeepers are taken hostage by the Nationalist and Integrationist
    Front militia of Ituri Province, Democratic Republic of the Congo. (BBC)
  - The European Court of Justice rules illegal an EU-US agreement to pass airline
    passenger data to the US authorities, as it does not ensure privacy protection
    for European passengers. (BBC), (Guardian)
  - The Constitutional Council of Chad, the highest court in Chad, confirms Idriss
    Déby's victory in the presidential elections which took place on May 3, 2006.
    However, the court only gives him 64.67% of the vote, instead of his administration's
    claim of 77.4%. Turnout was also reduced to 53.08% instead of the previous 60%.
    (allAfrica.com)(BBC)
  - 'May 2006 Java earthquake: The death toll in last Saturday''s earthquake in Indonesia
    is officially raised to 5,427. (Reuters)'
  - Former Daewoo boss Kim Woo-jung is sentenced to 10 years in prison for fraud.
    (BBC)
  - John W. Snow has resigned as United States Secretary of the Treasury. President
    George W. Bush has nominated Goldman Sachs CEO Henry Paulson to succeed him. (Washington
    Post)
