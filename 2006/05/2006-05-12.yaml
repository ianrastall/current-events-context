Date: '2006-05-12'
Source_URI: Portal:Current events/2006 May 12
Intelligence_Payload:
  Uncategorized:
  - Eight bombs explode in a coordinated strike in the Ethiopian capital of Addis
    Ababa. Three people are killed and 48 are wounded. No group has yet claimed responsibility.
    (AP)
  - 200 people are killed in an oil blast in Ilado, Nigeria. (AB via AmBC News), (BBC)
  - Cloning scientist Hwang Woo-Suk is indicted for fraud, embezzlement and violation
    of bioethics law in a scandal in South Korea over his faked stem cell research.
    (BBC) (Reuters) (CNN)
  - Yoweri Museveni takes his oath of office for a third consecutive term as President
    of Uganda.
  - 21 people are killed in an Egyptian bus crash. (BBC)
  - The U.S. FBI raids the home of Kyle "Dusty" Foggo, outgoing number three man at
    the CIA, in an investigation into political corruption, including the use of prostitutes
    and bribery in connection with lobbyist Brent Wilkes, revealed to be the "no.
    1 unindicted co-conspirator" in the Randy "Duke" Cunningham scandal. (Bloomberg.com)
  - Justin Gatlin breaks the world record in the 100 meter dash with a time of 9.76
    seconds. (ABC). The time is later corrected to 9.77, equalizing the existing record
    by Asafa Powell and in 2007 the result is rescinded because Gatlin failed a doping
    test.
  - Time Warner takes full control of Court TV Networks from Liberty Media.
  - First reported instances of the Year 2038 problem strike.
