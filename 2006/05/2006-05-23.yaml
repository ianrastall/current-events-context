Date: '2006-05-23'
Source_URI: Portal:Current events/2006 May 23
Intelligence_Payload:
  Uncategorized:
  - A voice purporting to be that of Al-Qaeda leader Osama bin Laden says on an audiotape
    that Zacarias Moussaoui had no link to the September 11, 2001 attacks. (BBC) (FOX)
    (Reuters)(Washington Post)
  - Mobs of angry garment workers set fire to seven fabric factories in Bangladesh
    in response to the announced death of Rana, a workers' rights leader. 100 people
    were injured amidst clashes between police and firefighters and protesters. Workers
    are forced to work overtime and seven days a week.(San Diego)
  - Greek and Turkish military F-16 jets collide above Karpathos whilst intercepting
    each other in the disputed airspace above the southern Aegean Sea. (BBC), (CNN),
    (Reuters)
  - Israel captures Hamas leader Ibrahim Hamed in a Ramallah raid. (BBC)
  - President of Mexico Vicente Fox begins a tour of the United States in Salt Lake
    City.
