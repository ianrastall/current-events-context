Date: '2006-05-28'
Source_URI: Portal:Current events/2006 May 28
Intelligence_Payload:
  Uncategorized:
  - The body of Canadian diplomat Lewis Brooke Miskell is found in Naples, Italy,
    three months after his disappearance. (Globe and Mail)
  - The Wind That Shakes the Barley, a film by British director Ken Loach, is awarded
    the Palme d'Or at the 2006 Cannes Film Festival.
  - Comoros volcano Mount Karthala erupts. (Washington Post)
  - Barry Bonds hits his 715th home run against the Colorado Rockies, passing Babe
    Ruth to move into second place on the list of all-time home run hitters. (ABC
    News)
  - Sam Hornish, Jr. wins the 90th Indianapolis 500 in the second-closest finish in
    race history.
  - President Alvaro Uribe gets reelected in a landslide in the Colombian presidential
    election, 2006, winning 62.2% of the votes in a landslide. This is the first time
    a Colombian President gets reelected in more than a century. He will serve another
    4-year term.
