Date: '2006-05-03'
Source_URI: Portal:Current events/2006 May 3
Intelligence_Payload:
  Uncategorized:
  - Villagers from the People's Front in Defense of Land in San Salvador Atenco, Mexico,
    blockade the highway to Texcoco, in support of local flower vendors. Massive violence
    from State Polices ensues. (The Narco News Bulletin)
  - German hostages René Bräunlich and Thomas Nitzschke returned home to Germany.
    They landed safe on a governmental aircraft at 2:24 pm at Berlin Tegel Airport.
    (BBC)
  - 'Nepal Civil War: The Nepalese cabinet declares a cease-fire with Maoist rebels
    and announces that they will no longer consider them a terrorist group. The government
    urges the rebels to open peace talks. (BBC) (Reuters)'
  - Armavia Flight 967, an Airbus A320 airliner of Armenian airline Armavia, carrying
    over 110 people, crashes into the Black Sea while approaching Adler-Sochi International
    Airport. Rescue workers had found baggage, pieces of the shattered plane and oil
    floating at the site of the crash. (BBC)
  - The Iranian author Ramin Jahanbegloo is arrested in Tehran. (BBC)
  - In Chad, opposition parties boycott the 2006 presidential election and voter turnout
    is "extremely low". Results are not due for another 10 days, but President Idriss
    Deby is expected to win. (BBC)
