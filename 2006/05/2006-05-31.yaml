Date: '2006-05-31'
Source_URI: Portal:Current events/2006 May 31
Intelligence_Payload:
  Uncategorized:
  - Ohio Republican Thomas Noe pleads guilty to illegally directing $50,000 into the
    2004 re-election campaign of President George W. Bush.(AP)
  - The United States is expected to change its policies regarding Iran and its nuclear
    program. Condoleezza Rice, Secretary of State of the USA said that the USA may
    join Iran nuclear talks. (MSNBC) (CNN)
  - The Pirate Bay is closed when servers located in Stockholm, Sweden, are confiscated
    in a police raid initiated by the Swedish anti-piracy bureau. Massive media-discussion
    and criticism against the bureau's methods and the acts of the Swedish police
    follows, since at least 20 non-piracy sites are taken down at the same time -
    including the website of Piratpartiet, a Swedish political party aimed to run
    in the 2006 elections. (ABC)
