Date: '2006-05-17'
Source_URI: Portal:Current events/2006 May 17
Intelligence_Payload:
  Uncategorized:
  - Captain Nichola Goddard, 26, of 1st RCHA is killed while engaged in combat against
    Taliban forces near Kandahar, Afghanistan. Captain Goddard is Canada's first female
    casualty since World War 2, and Canada's first female combat arms casualty. (BBC)
  - A total of 155 people are killed in a recent wave of violence in São Paulo, Brazil.
    (CNN)
  - Incumbent Prime Minister Laisenia Qarase of Fiji claims victory in the 2006 general
    election. (BBC)
  - A gunman opens fire at the Turkish Council of State, the top court in Ankara,
    while the court is in session, injuring four judges, and killing one - Mustafa
    Yücel Özbilgin. The shooting represents a rise in tensions between the secular
    apparatus of state and supporters of Islamic fundamentalism. (BBC)
  - Barcelona win the UEFA Champions League, defeating Arsenal 2-1 in the final. Arsenal
    goalkeeper Jens Lehmann became the first player ever sent off in a Champions League
    final. Barcelona's goals were scored by Belletti and Samuel Eto'o; Arsenal's goal
    was scored by Sol Campbell. (BBC) (SkySports)
