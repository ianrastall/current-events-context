Date: '2006-05-08'
Source_URI: Portal:Current events/2006 May 8
Intelligence_Payload:
  Uncategorized:
  - Former South African deputy president Jacob Zuma is acquitted of a rape charge;
    the judge rules that a sexual encounter with a 31-year-old HIV-positive woman
    was consensual. (Guardian)
  - Iranian President Mahmoud Ahmadinejad writes to United States President George
    W. Bush. This marks the first time in 27 years that an Iranian President has written
    to a U.S. President. (CBC)
  - The Italian parliament starts to vote in order to elect the successor of Carlo
    Azeglio Ciampi as President of the Italian Republic. Gianni Letta leads after
    the first round of balloting.(BBC)
  - Judgement is given in London for Apple Computer in a high-profile trademark suit
    brought by The Beatles' company, Apple Corps. (Reuters)
  - A Historic Election is about to take place in the state of Tamil Nadu, India.
    Where two major parties AIADMK and DMK are contesting to capture the power.
  - Sony unveils its PlayStation 3 game console, and makes an embarrassing impression
    in its E3 presentation.
