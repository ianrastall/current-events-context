Date: '2006-05-02'
Source_URI: Portal:Current events/2006 May 2
Intelligence_Payload:
  Uncategorized:
  - Nepal's new cabinet is unveiled. (New York Times)
  - German hostages René Bräunlich and Thomas Nitzschke are freed. Both were taken
    hostage in Iraq on January 24, 2006. (BBC)
  - Italian Prime Minister Silvio Berlusconi officially hands in his resignation to
    President Carlo Azeglio Ciampi. Berlusconi was defeated by Romano Prodi in the
    April 9-10 elections, but Ciampi has asked him to remain in office, "for the handling
    of current affairs". (BBC) (Corriere)
  - Newly elected President Evo Morales orders the nationalization of Bolivia's gas
    industry. This process is a result of his plan to nationalize major industries,
    he said in his election campaign. Further nationalizations are planned in forestry
    and mining. (BBC)
  - The thieves of the famous Edvard Munch paintings The Scream and Madonna are sentenced
    to four and eight years in prison. (BBC)
  - The ECHL team, the Alaska Aces defeat the Las Vegas Wranglers in triple overtime
    to win the series 4-2.
