Date: '2006-05-22'
Source_URI: Portal:Current events/2006 May 22
Intelligence_Payload:
  Uncategorized:
  - For the first time in 175 years a brown bear touched German soil by entering Bavarian
    territory. The brown bear killed several sheep and caused minor property damage.
    Even Germany's WWF branch agrees that the bear should be captured or killed because
    it presents a threat to people. The animal, called Bear JJ1 or "Bruno", is shot
    dead on June 26. (BBC),1, (BBC),2
  - Prime Minister Tony Blair declares that British troops should be out of Iraq within
    four years. (Globe and Mail)
  - U.S. congressman William J. Jefferson (D-La) refuses to resign, as he denies allegations
    of bribery after an FBI weekend raid of his office. (New York Times)
