Date: '2006-05-29'
Source_URI: Portal:Current events/2006 May 29
Intelligence_Payload:
  Uncategorized:
  - A labor dispute causes Toronto Transit Commission to shut down the city's public
    transit system unexpectedly, leaving commuters stranded. (CBC)
  - In the Italian municipal elections, centre-left incumbent mayors Walter Veltroni,
    Sergio Chiamparino and Rosa Russo Iervolino lead in Rome, Turin and Naples, respectively.
    In the regional election of Sicily, incumbent president Salvatore Cuffaro of the
    House of Freedoms leads over Rita Borsellino. (BBC)
  - In Kabul, Afghanistan, thousands demonstrate against the United States after several
    civilians were killed in a car accident in which 3 US humvees collided with a
    traffic jam. (Washington Post) (Al Jazeera)
  - The Times reports on investigations into an incident in al-Haditha, Iraq, where
    US Marines are accused of having covered up the murder of 24 civilians after a
    soldier had been killed in an attack. (The Times)
  - The Lebanese-based Hezbollah group threatens Israel with Iranian-made rockets.
    (Haaretz)
