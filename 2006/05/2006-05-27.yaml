Date: '2006-05-27'
Source_URI: Portal:Current events/2006 May 27
Intelligence_Payload:
  Uncategorized:
  - Tropical Storm Aletta forms south-southwest of the Mexican port of Acapulco, marking
    the first storm of the 2006 Pacific hurricane season. (NHC)
  - Myanmar extends the house arrest detention of opposition leader Aung San Suu Kyi
    for another year, amid continued pressure from the U.N. for her release. (Bangkok
    Post) (BBC)
  - Over 70 participants in a banned gay pride parade are detained in Moscow. Amongst
    them are organizers and members of European Parliament. German parliamentary member
    Volker Beck is punched in the face and arrested by police. Moscow's mayor, Yuriy
    Luzhkov banned the march, saying "homosexuality is unnatural." (RIA Novosti) (Interfax)
    (BBC) (CNN)
  - 'May 2006 Java earthquake: A tectonic earthquake centred 25 kilometres (16 miles)
    south of Yogyakarta on the island of Java, Indonesia kills more than 4300 people
    and injures more than 3400. The 6.2 magnitude quake strikes at 5:54 a.m. (22:54
    UTC, 26 May). The epicenter is southwest of the city and near the erupting Mount
    Merapi. (BBC) (CNN) (AP)'
