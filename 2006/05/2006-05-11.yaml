Date: '2006-05-11'
Source_URI: Portal:Current events/2006 May 11
Intelligence_Payload:
  Uncategorized:
  - Residents flee Mogadishu as warlords and Islamist militias battle for control
    of the Somali capital. The death toll in five days of fighting reaches 120. (VoA),
    (BBC)
  - A grizzly-polar bear hybrid is found on Banks Island in Canada's Northwest Territories.
    (MSNBC)
  - Baidu Baike, a collaborative online encyclopedia, is launched in People's Republic
    of China by Baidu.com, modelled on Wikipedia but heavily self censored. Wikipedia
    is largely inaccessible without a proxy in China. (BBC)
  - The United States National Security Agency is reported to operate "the largest
    database ever assembled in the world", containing a record of all calls (domestic
    and international) placed through AT&T, Verizon and BellSouth. Qwest Communications
    refused to provide customer records, citing the need for a warrant. (USA Today)
  - Ernie Fletcher, Republican governor of the U.S. state of Kentucky, is indicted
    on three misdemeanor counts of conspiracy, official misconduct and political discrimination
    for hiring, promoting, demoting and firing state employees based on political
    loyalties.(Lexington Herald-Leader)
  - Results for the state election held in Tamil Nadu, India, on May 8 were announced
    and the DMK and its allies have captured the power.And the AIADMK becoming a stronger
    opposition in the history of Tamil Nadu.
  - The State of West Bengal also made a History. "The Communist Party of India (Marxist)
    emerged victorius for another 5 years, making its stand of almost 35 years at
    a stretch"
