Date: '2006-05-09'
Source_URI: Portal:Current events/2006 May 9
Intelligence_Payload:
  Uncategorized:
  - The United Kingdom's new Minister for Local Government, Ruth Kelly, who is a Roman
    Catholic and a member of Opus Dei, refuses to state whether or not she believes
    that homosexuality is a sin. (BBC)
  - The Mogadishu Islamic Courts and the Alliance for the Restoration of Peace and
    Counter-Terrorism declare a cease-fire after 57 people are killed, and 103 are
    wounded, mostly civilians, in the Somalian capital of Mogadishu. (CNN)
  - The world's largest annual trade show for the computer and video games industry,
    the Electronic Entertainment Expo (E³), is held in Los Angeles. (Wired News)
  - Two Australian miners are rescued after 14 days trapped in the Beaconsfield mine
    collapse. (Reuters)
  - The Estonian parliament ratifies the European constitution, making Estonia the
    fifteenth EU country to do so. (EU Observer)
  - Lifetime Senator Giorgio Napolitano is elected as the new President of the Italian
    Republic after four ballots. (BBC)
