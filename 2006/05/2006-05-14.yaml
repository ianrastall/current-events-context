Date: '2006-05-14'
Source_URI: Portal:Current events/2006 May 14
Intelligence_Payload:
  Israeli-Palestinian conflict:
  - The IDF killed Elias al-Ashkar, the senior Islamic Jihad commander in the Jenin
    area who was accused of planning several suicide attacks that killed nearly 30
    people, including US high-school student Daniel Wultz. Six other Palestinians
    were also killed. (Haaretz), (Miami Herald)
  - The Israeli Navy intercepted a Palestinian boat carrying a large amount of explosives
    near the Gaza Strip in an attempted smuggling operation. The boat contained about
    450 kg of TNT and parts of mines. (The Statesman), (Israel MFA)
  Uncategorized:
  - Ahmat Mahamat Bachir, the president of the Chadian Independent National Election
    Commission, announces that incumbent President of Chad Idriss Déby won the 2006
    Chadian presidential election held on May 3 with 77.5% of the vote. The official
    turnout was 61%, though international observers estimated turnout at 4–10%. (Al
    Jazeera)
  - Organized crime led by the group Primeiro Comando da Capital causes rioting in
    Brazil and claims over 50 lives. (BBC)
  - Mount Merapi in Central Java, Indonesia, which has been rumbling for about a month,
    is shooting out black smoke, volcanic ash and lava, and a volcanic eruption appears
    to be imminent. Mandatory evacuations are under way. (BBC) (CNN) (Reuters)
  - Prime Minister of the United Kingdom, Tony Blair, signs a petition in support
    of animal testing and condemns the acts of animal-rights extremists. (BBC)
  - Seven people are wounded as two bombs explode in the Iranian city of Kermanshah.
    A local branch of the Kurdistan Workers Party (PKK) claimed responsibility. (Reuters)
  - Alligators kill three women in one week in separate incidents across the U.S.
    state of Florida.
