Date: '2006-05-07'
Source_URI: Portal:Current events/2006 May 7
Intelligence_Payload:
  Uncategorized:
  - A disgruntled bus driver goes on a rampage in Dublin, Ireland, smashing through
    stopped and on-coming vehicles as he drives through streets, across tram lines
    and up the wrong side of a dual-carriageway. One woman is killed and 13 people
    more injured, including five Gardaí (Irish Police). Armed Gardaí open fire on
    three occasions to try to stop the bus. (RTÉ News)
  - United States President George W. Bush announces his support for closing Guantanamo
    Bay detention center. (Reuters)
  - Iranian President Mahmoud Ahmadinejad threatens to pull Iran out of the Nuclear
    Nonproliferation Treaty if the United States and the EU 3 do not accept Iran's
    nuclear program. (CNN)
  - Arsenal F.C. play their last game at Highbury, or Arsenal Stadium. They have played
    there for 93 years (BBC).
