Date: '2006-05-05'
Source_URI: Portal:Current events/2006 May 5
Intelligence_Payload:
  Uncategorized:
  - The government of China has made artificial rainfall to wash a layer of sand and
    dust off Beijing. (Xinhua News)
  - The Agriculture Ministry of China confirmed another outbreak of bird flu in Qinghai
    Province, killing more than 120 birds. (reuters)
  - The government of Sudan signs an accord with the main Darfur rebel group, the
    Alliance of Revolutionary Forces of West Sudan, reached through mediation in Abuja,
    Nigeria. (BBC)
  - Porter Goss resigns as director of the U.S. Central Intelligence Agency (CIA).
    (NY Times) (Washington Post)
  - Following significant Labour Party losses in the English local elections, British
    Prime Minister Tony Blair announces the largest Cabinet reshuffle of his tenure.
    The changes include sacking embattled Home Secretary Charles Clarke, the demotion
    of long-serving Foreign Secretary Jack Straw, and the stripping from Deputy Prime
    Minister John Prescott of his departmental portfolio. (BBC)(BBC)
