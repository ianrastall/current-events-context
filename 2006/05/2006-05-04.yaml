Date: '2006-05-04'
Source_URI: Portal:Current events/2006 May 4
Intelligence_Payload:
  Uncategorized:
  - Violence continues during the police raids of San Salvador Atenco, Mexico.
  - Manasseh Sogavare is elected Prime Minister of the Solomon Islands, following
    Snyder Rini's brief period in office. Sogavare was previously prime minister from
    2000 to 2001. (ABC)
  - In Israel, a new Cabinet under Prime Minister Ehud Olmert is sworn in. (BBC)
  - A tsunami warning was issued for Fiji and New Zealand following a magnitude 7.9
    earthquake in Tonga which occurred at 15:26 UTC (04:26 May 4, local time). The
    warning was canceled when it was found that the earthquake did not produce a tsunami.
    (USGS) (Pacific Tsunami Warning Center)
  - Picasso's Dora Maar With Cat is sold in an auction for US$95,216,000, becoming
    one of the most expensive paintings in the world. (BBC)
  - Shahrir Abdul Samad resigns as chairman of the Barisan Nasional Backbenchers Club
    in the Parliament of Malaysia, after a motion to refer a Member of Parliament
    implicated in a corruption scandal to the Dewan Rakyat House Rights and Privileges
    Committee failed. (The Sun)
  - British Prime Minister Tony Blair's Labour Party suffers one of its worst electoral
    defeats, losing more than 200 council seats in the 2006 UK local elections, and
    coming third in total votes, behind the Conservatives and Liberal Democrats. (Reuters),
    (BBC)
  - The latest update is the 2006 Red List. It evaluates 40,168 species as a whole,
    plus an additional 2,160 subspecies, varieties, aquatic stocks, and subpopulations.
