Date: '2006-05-15'
Source_URI: Portal:Current events/2006 May 15
Intelligence_Payload:
  Uncategorized:
  - United States President George W. Bush gives a speech proposing major immigration
    reform in the United States. (Washington Post)
  - Mount Merapi erupts, according to the national Indonesian news agency. (CNA)
  - The United States State Department announces it will re-establish diplomatic ties
    with Libya and remove it from its list of states that sponsor terrorism. (CNN)
  - Giorgio Napolitano is sworn in as President of the Italian Republic, following
    his election held on May 10. (BBC)
  - Makoto Koga, a political faction leader within the Liberal Democratic Party of
    Japan and former secretary general, proposes that Yasukuni Shrine set up a separate
    shrine for the 14 Class-A war criminals enshrined there. (Asahi Shimbun) Junichiro
    Koizumi is poised to become the first Prime Minister of Japan to make a speech
    before a joint session of the U.S. Congress in June. (Asahi Shimbun)
  - New Super Mario Bros. was released in North America, being one of the top 25 best-selling
    video games of all time.(List of best-selling video games)
