Date: '2006-05-13'
Source_URI: Portal:Current events/2006 May 13
Intelligence_Payload:
  Uncategorized:
  - CIA officials try to get the case of Khalid El-Masri, who says he was abducted
    and tortured, dismissed as it "could undermine U.S. relations with foreign countries".
    (Washington Post) (New York Times)
  - The International Committee of the Red Cross criticizes the United States for
    denying access to detainees in violation of the Geneva Convention. The US admits
    holding detainees secretly but claims they do not fall under that convention.
    (ABC Australia) (Xinhua)
  - Typhoon Chanchu makes landfall twice in the Philippines. 23 people are killed
    and five remain missing after a boat capsizes in the stormy seas off Masbate island.
    (CNEWS), (CNN), (Reuters), (SwissInfo)
  - George Seitz, a Labor Party Member of the state Legislative Assembly in Victoria,
    Australia, is accused of running an elaborate branch stacking operation to manipulate
    results in state and federal elections and pre-selections. (The Age)
  - Authorities in Indonesia issue a red alert for active volcano Mount Merapi, evacuating
    17,000 people in expectation of an eruption. (BBC) (MSNBC)
  - Liverpool F.C. win the FA Cup against West Ham United F.C. on penalties after
    a last minute 40-yard Steven Gerrard equalizer. (BBC)
  Chad:
  - FUC spokesman Albissaty Saleh Allazam announces that none of the eight organizational
    members that make up the Chadian rebel alliance will end attacks on the Déby administration
    despite the recent peace deal between ARFWS and the Government of Sudan. (CNN)
  - The UNHCR has opened a new refugee camp within Chad just outside of the city of
    Habila to accommodate the 7,000 Fur refugees who fled Janjaweed attacks in western
    Sudan. (IRIN)
