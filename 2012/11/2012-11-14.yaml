Date: '2012-11-14'
Source_URI: Portal:Current events/2012 November 14
Intelligence_Payload:
  Operation Pillar of Defense:
  - Hamas military chief Ahmed Jabari is killed in a targeted air strike carried out
    by the Israel Defense Forces and the Shin Bet.(YNetnews)
  Law and crime:
  - The death of a pregnant woman from septicaemia in an Irish hospital prompts international
    outrage, protests and condemnation. University College Hospital Galway refused
    numerous requests from Savita Halappanavar and her family for an abortion on the
    grounds that "this is a Catholic country." (The Independent) (Irish Independent)
    (NDTV)
  - A 23-year-old man who accused the award-winning Sesame Street puppeteer Kevin
    Clash of abusing him while under-age admits he lied. (BBC)
  - John Logue, President of the Union of Students in Ireland, is arrested and taken
    from Dáil Éireann in handcuffs after turning his back on legislators while peacefully
    protesting against budget cuts. (Donegal Daily) (University Times)
  - Backed by the Russian domestic security service, Federal Security Service, Russian
    president Vladimir Putin signs a new treason law, which opponents expect him to
    use to silence critics and almost anyone who associates with foreigners. (Reuters)
    (Daily Times)
  Politics and elections:
  - Protests against unemployment and austerity measures take place across several
    European countries. The largest protests reportedly take place in Spain and Portugal,
    with smaller protests in Greece, Italy, and Belgium. (BBC) (Al Jazeera) (The Guardian)
  - Japanese Prime Minister Yoshihiko Noda announces he will dissolve the House of
    Representatives of the Diet on Friday after the ruling DPJ government and opposition
    LDP come to an agreement regarding a reduction of seats in the House. A general
    election is scheduled for December 16. (NHK) (Bloomberg)
  Science and technology:
  - Astronomers announce the discovery of CFBDSIR 2149−0403, the closest known rogue
    planet to Earth at approximately 100 light-years away. (BBC)
  Sport:
  - Swedish striker Zlatan Ibrahimović scores four goals in a friendly match against
    England, with his last coming from a 30-metre bicycle kick. (The Irish Times)
    (The Guardian) (JOE) (New York Daily News)
