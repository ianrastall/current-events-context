Date: '2012-11-28'
Source_URI: Portal:Current events/2012 November 28
Intelligence_Payload:
  Armed attacks and conflicts:
  - More than 200 people are wounded in a second day of clashes between Tunisian security
    forces and thousands of protesters in Siliana, Tunisia. (BBC) (Al Arabiya)
  Syrian civil war:
  - At least 54 people are killed and more than 120 injured by two car bomb explosions
    in a south-eastern district of Damascus, Syria's capital. (BBC) (AFP via MSN News)
  2012 East D.R. Congo conflict:
  - M23 rebels announce their withdrawal from territory captured from government troops
    after a pullout deal was reached in Uganda. (Al Jazeera)
  Business and economy:
  - The UK's Home Office launches a ten week consultation on whether to introduce
    a minimum price for the sale of alcohol of 45p a unit. The plans are aimed at
    tackling binge drinking and other alcohol related problems. (BBC)
  - The United States Environmental Protection Agency announces that BP has been suspended
    from bidding on future US government contracts as a result of the 2010 Deepwater
    Horizon oil spill. (Bloomberg)
  - The European Commission approves a Spanish government plan to shrink and restructure
    three major Spanish banks (Bankia, NCG Banco and Catalunya Banc) and sell a fourth
    (Banco de Valencia). (BBC)
  Disasters and accidents:
  - Seven students and a teacher are injured as the result of a small explosion in
    an eighth-grade science classroom in Wilson Middle School in Carlisle, Pennsylvania,
    United States. Two of the students were flown by helicopter to Johns Hopkins Hospital
    in Baltimore. One was released that evening, the other is in fair condition. (AP
    via MSN)
  Law and crime:
  - British student Richard O'Dwyer reaches an agreement with authorities in the United
    States to avoid being extradited from the United Kingdom to stand trial over infringement
    of U.S. copyright laws over his TVShack website which hosted links to pirated
    films and television shows. (BBC)
  - Zachary Holly, 28, of Bentonville, Arkansas, is charged with the rape and capital
    murder of his nextdoor neighbor, 6-year-old Jersey Bridgeman, whom he was babysitting.
    (NBC News)
  - No violent crime is reported in New York City for an entire day, 26 November,
    the first time in recent memory. (BBC) (Reuters)
  Media:
  - CNN publish a list of the top 10 CNN Heroes of 2012. Pushpa Basnet, a social worker
    from Nepal, is listed among others. (CNN)
  Politics and elections:
  - President of Egypt Mohamed Morsi will address the nation about a decree greatly
    increasing his powers. (CBS News)
  Sport:
  - The draw for the 2013 UEFA European Under-21 Championship is made in Tel Aviv.
    Hosts Israel will face England, Norway and Italy in group A while title holders
    Spain will play the Netherlands, Russia and Germany in group B. (UEFA)
  - River Plate president Daniel Passarella fires a coach Matías Almeyda on disappointing
    performance by the team in the Torneo Inicial. (Buenos Aires Herald)
