Date: '2012-11-04'
Source_URI: Portal:Current events/2012 November 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - A car bomb detonates in Şemdinli, Turkey, killing 1 and injuring 12. The attack
    is blamed on Kurdish rebels. (Reuters)
  - A policeman is killed and 11 others are injured in a grenade attack on a church
    in the Kenyan town of Garissa near the border with Somalia. (BBC)
  - Iran's Revolutionary Guard Corps establish and inaugurate a new naval base on
    the Strait of Hormuz, near Bandar Lengeh. (RIA Novosti)
  Syrian civil war:
  - Syrian opposition groups hold a meeting in Doha, Qatar, to discuss reforming the
    structure of the group, a few days after a War Crime investigation commenced at
    the UN. (BBC)
  - Rebels capture a strategic oilfield in eastern Deir ez-Zor Governorate. (BBC)
  Arts and culture:
  - Danny Boyle and Nicholas Serota write a letter criticising the decision by a Tower
    Hamlets London Borough Council to sell the Henry Moore sculpture Draped Seated
    Woman. Moore sold the sculpture at a fraction of its market value in the 1960s
    on the understanding that it would be displayed in a public space in a socially
    deprived area. (BBC)
  Politics:
  - Somalia's Prime Minister Abdi Farah Shirdon, who lives in Kenya, appoints a new
    10-member cabinet, including Somalia's first female Foreign Minister, Fowsiyo
    Yussuf Haji Aadan. (BBC)
  Religion:
  - Bishop Tawadros is selected as the new 118th pope of the Coptic Orthodox Church.
    (BBC)
  Sport:
  - Finnish racing driver Kimi Räikkönen wins Formula One's 2012 Abu Dhabi Grand Prix
    ahead of Fernando Alonso and Sebastian Vettel. (BBC)
  - In women's tennis, the Czech Republic defeats Serbia 3–1 to win the 2012 Fed Cup.
    (BBC)
