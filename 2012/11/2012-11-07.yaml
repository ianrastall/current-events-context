Date: '2012-11-07'
Source_URI: Portal:Current events/2012 November 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Syrian civil war: A car bomb in Damascus kills a judge. (New York Times)'
  - A gunman opens fire in northeast Moscow, killing five and injuring two. (Xinhua)
    (RIA NOVOSTI)
  Disasters and accidents:
  - An earthquake measuring 7.3 on the Richter scale kills 48 people in northern Guatemala.
    (El País)
  Politics and elections:
  - United States elections, 2012
  - Voters in the states of Maine, Maryland, and Washington approve measures that
    would allow same-sex marriage, while Minnesota votes down an amendment that would
    define marriage as between one man and one woman. (Los Angeles Times)
  - Voters in the states of Colorado and Washington approve the legalization of recreational
    use of marijuana in voter ballot initiatives, while the state of Massachusetts
    approves a referendum legalizing the use of medical marijuana. (CNN)
  - Voters in the state of California approve a tax increase to fund public schools,
    community colleges and state universities. (The New York Times)
  - The results from the state of Florida and its 29 electoral votes remain too close
    to call in projecting a winner in the presidential election, despite the fact
    President Barack Obama is still the projected winner nationwide. (Orlando Sentinel)
  Sport:
  - Celtic shock Barcelona in the 2012–13 UEFA Champions League group stage. (The
    Guardian) (CBC News) (Irish Independent) (Bangkok Post)
  - British cyclist Bradley Wiggins is hospitalized following a collision with a vehicle.
    (BBC Sport)
