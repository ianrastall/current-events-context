Date: '2012-11-26'
Source_URI: Portal:Current events/2012 November 26
Intelligence_Payload:
  Syrian civil war:
  - A Syrian government jet aircraft drops a cluster bomb on a playground in the village
    of Deir al-Asafir, leaving 10 children dead and 15 people wounded, activists say.
    (BBC)
  Business and economy:
  - Mark Carney, current Governor of the Bank of Canada, is named as the next Governor
    of the Bank of England. He will take up the position when current Governor Mervyn
    King steps down in June 2013. (BBC)
  - Governor of New York Andrew Cuomo announces that Hurricane Sandy ran up a bill
    of $32 billion in New York. (AP)
  - President of Paraguay Federico Franco announces that his country will become an
    oil producing nation, after a recent discovery in the Chaco region, close to the
    border with Argentina. (Buenos Aires Herald)
  Disasters and accidents:
  - A fire at a Caritas International workshop for the disabled in Titisee-Neustadt,
    Baden-Württemberg, Germany, kills at least 14 and injures several others. (CNN)
  - A scorpion stings a passenger on a flight from Costa Rica to Spain, which forced
    the sealing of the Iberia airlines Airbus A340 at Madrid's Barajas International
    Airport. (FoxNews)
  Law and crime:
  - Norway's public broadcaster NRK publishes for the first time video footage of
    Anders Behring Breivik parking his van bomb that killed eight people in Oslo on
    22 July 2011. (AFP via Google) (NRK)
  - Ontario Superior Court of Justice rules that Toronto mayor Rob Ford breached Ontario’s
    conflict of interest law and orders him to remove from office. (Toronto Star)
  Politics and elections:
  - President of Egypt Mohamed Morsi meets judges to try to defuse a crisis over a
    decree that extends his powers, as a day of opposition protests looms. (BBC)
  Science and technology:
  - NASA and Roscosmos announce that veteran spaceflyers Scott Kelly and Mikhail Korniyenko
    will carry out the first year-long mission to the International Space Station
    in 2015. (NASA)
  - Scientists have found life in an Antarctic Lake Vida that was sealed off from
    the outside world by a thick sheet of ice several thousands of years ago. (The
    Guardian)
  - American plastic surgeon and Nobel Prize winner Joseph Murray, who performed the
    first kidney transplantation, dies at 93. (The New York Times)
  Sport:
  - The Spanish club Espanyol fires coach Mauricio Pochettino due to real trouble
    of facing relegation from La Liga. Mexican manager Javier Aguirre is named as
    new Espanyol head coach. (FIFA) (Goal.com)
