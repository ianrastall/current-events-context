Date: '2012-11-12'
Source_URI: Portal:Current events/2012 November 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 38 police officers are killed in northern Kenya amid clashes with cattle
    rustlers. (CNN)
  Syrian civil war:
  - A second mortar shell from Syria has been fired at an Israeli military outpost
    in the Golan Heights, after a similar incident the day before. The Israel Defence
    Forces have responded with tank fire at the source of the bombardment, scoring
    several direct hits on artillery units belonging to the Syrian Army. (NY Times)
  Arts and culture:
  - Into the Silence by Wade Davis, a biography of George Mallory wins the 2012 Samuel
    Johnson Prize for Non Fiction. (BBC)
  Law and crime:
  - Muslim cleric Abu Qatada will be released on bail after winning an appeal against
    deportation from the United Kingdom to Jordan. The UK government says it will
    appeal against the ruling. (BBC)
  Newsnight controversy:
  - Helen Boaden, the BBC's Director of News, and her deputy Steve Mitchell relinquish
    their roles in the wake of the Newsnight scandal. (RTÉ News)
  - Fran Unsworth, head of newsgathering, and Ceri Thomas, the editor of Radio 4's
    Today are named Acting Director and Deputy Director of News respectively. (The
    Scotsman)
  - British Prime Minister David Cameron questions the BBC's decision to give former
    Director-General George Entwistle a year's pay by way of severance after he resigned
    on Saturday. (The Guardian)
  Politics:
  - Sir Rex Hunt, who was Governor of the Falkland Islands at the time of the 1982
    invasion dies aged 86. (BBC)
  Physics:
  - 2012 EPS Edison Volta Prize was awarded to Rolf-Dieter Heuer, CERN Director General,
    and two his colleagues.(EPS)
  Sport:
  - Serbian Novak Djokovic beats Swiss Roger Federer 7-6 (8-6), 7-5 in final to win
    2012 ATP World Tour Finals in singles. (BBC) (The Guardian) (The Telegraph)
