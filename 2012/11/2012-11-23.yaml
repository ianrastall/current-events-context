Date: '2012-11-23'
Source_URI: Portal:Current events/2012 November 23
Intelligence_Payload:
  Arts and culture:
  - American actor Larry Hagman, best known for starring roles in Dallas, I Dream
    of Jeannie, and the 2012 revival of Dallas, dies from complications of throat
    cancer in Dallas. (The Wrap)
  Disasters and accidents:
  - Two military OV-10 Bronco aircraft collide in the air during a demonstration flight
    near military El Libertador Air Base in the state of Aragua, Venezuela. One of
    the pilots, guiding his aircraft away from a populated area, is killed. Three
    soldiers are also injured in the crash. (Pravda) (Bernama)
  - The pilot of a Czech subsonic one-seat military aircraft Aero L-159 Alca that
    crashed in central Bohemia has been found dead in its wreckage. (Prague Daily
    Monitor)
  Law and crime:
  - The Mexican federal police arrested Joe Saenz, one of the FBI Ten Most Wanted
    Fugitives, in the western city of Guadalajara. (BBC)
  - After a 2012–13 UEFA Europa League football match between Lazio and Tottenham
    Hotspur in Rome, Lazio and A.S. Roma fans wearing masks and armed with knives
    surround a pub while chanting "Jews, Jews". They then attacked the Jewish contingent
    of Tottenham fans in the pub and injured 10, with one individual severely wounded.
    (The Jerusalem Post)
  Politics and elections:
  - Opposition leaders in Egypt call for large protests after President of Egypt Mohamed
    Morsi passed a decree giving himself sweeping new powers. Protests for and against
    his decision are taking place in Cairo, and violence has occurred throughout Egypt.
    (BBC) (RT)
  Science and technology:
  - Britain's top GCHQ code-breakers say they are stumped by a secret code found on
    the leg of a dead pigeon that was found in a chimney in Surrey, England, with
    a message from World War II attached. (BBC)
  - A rail operator JR Tokai unveil a prototype of high-speed maglev L0 train, which
    it plans to operate on a route Tokyo–Nagoya from 2027. (The Japan Times) (The
    Asahi Shimbun)
  Sport:
  - Harry Redknapp is appointed as the manager of Queens Park Rangers, taking over
    from Mark Hughes whose contract was terminated after fail to win any of their
    12 Premier League games this season. (The Independent) (The Guardian)
  - Mano Menezes has left his post as Brazil national football team coach two days
    after winning the 2012 Superclásico de las Américas against Argentina on penalties,
    and just 19 months before the 2014 FIFA World Cup in Brazil. (Goal.com)
  - A bronze statue of Sir Alex Ferguson, a most successful manager in Manchester
    United’s history, was unveiled outside Old Trafford. (The Guardian)
