Date: '2012-11-27'
Source_URI: Portal:Current events/2012 November 27
Intelligence_Payload:
  Armed attacks and conflicts:
  - At least 29 people are killed and 126 wounded in eight car bombings across Iraq.
    (CNN)
  - Gunmen attack a pub in central Nigeria's Plateau State and open fire on customers,
    killing 10 people. (BBC)
  Business and economy:
  - The eurozone will pay out of 43.7 billion euros in loans to Greece from December
    13 for reducing Greece's debt. (Reuters)
  Disasters and accidents:
  - A Chinese-made training airplane K-8 crashes during an air force flying exhibition
    in Venezuela, the two pilots ejected successfully. The French-made military helicopter
    Cougar sent to rescue the pilots also crashes, no one is injured. (The Montreal
    Gazette)
  Education:
  - The UK government is to create a new wave of universities both in the private
    and public sector, the first new universities in the country for two decades.
    (BBC)
  International relations:
  - French Foreign Minister Laurent Fabius announces that France intends to vote in
    favor of upgrading Palestine's status at the United Nations from permanent observer
    as the Palestinian Liberation Organization to a non-member observer state. The
    vote is scheduled to be held later this week. (BBC)
  Media:
  - Aung San Suu Kyi and Thein Sein are ranked first on Foreign Policy’s 2012 Top
    100 Global Thinkers list ahead of Moncef Marzouki, Bill Clinton and Hillary Clinton.
    Also, Malala Yousafzai is ranked sixth behind Bill Gates and Melinda Gates, but
    ahead of Barack Obama. (The International News) (Foreign Policy)
  Law and crime:
  - The remains of Yasser Arafat are exhumed as part of an investigation into how
    the Palestinian leader died in November 2004. (BBC)
  - Mexican beauty queen María Susana Flores Gámez, crowned as 2012 Woman of Sinaloa,
    is killed during a weekend shootout in Sinaloa, Mexico. (CNN)
  Politics and elections:
  - Tens of thousands of protestors demonstrate in Tahrir Square in Cairo against
    Egyptian President Mohamed Morsi for last week's decree granting himself sweeping
    powers. (BBC)
  - A Hungarian MP from the far right Jobbik party calls for a list of Jewish politicians
    and government employees who are a "threat to national security". The Hungarian
    Government later released a statement condemning the comments. (BBC)
  Sport:
  - UEFA President Michel Platini announces that the administrative body is considering
    scrapping the Europa League in favour of an extended Champions League. A proposal
    may involve extending the final phase of the Champions League from 32 to 64 teams
    from 2015, with the final decision to be made in 2014. (Bangkok Post)
