Date: '2012-11-09'
Source_URI: Portal:Current events/2012 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Syrian civil war: The United Nations says 4 million people could require humanitarian
    aid by 2013. (Al Jazeera)'
  - A security guard is found shot dead at the Sager House, the official residence
    of the Swedish prime minister, in the capital Stockholm. (BBC)
  - Two Iranian Revolutionary Guard fighter jets fire on an unmanned American General
    Atomics MQ-1 Predator drone in international airspace near Kuwait. (CNN)
  - Clashes break out at a jail in Colombo, Sri Lanka, killing at least 13 inmates
    and injuring 32 others. At least nine police officers, a prison guard and a bystander
    were also injured during the disturbances. (Al Jazeera) (AP)
  - 'Bahraini uprising: A teenager is killed during a crackdown on protesters near
    the capital Manama. (AFP via Google News)'
  Disasters and accidents:
  - A train carrying liquid fuel crashes and bursts into flames in northern Burma,
    killing at least 25 people and injuring up to 62 others. (BBC)
  - An Algerian C-295 military transport plane with six people on board crashes near
    Avignon in southern France. Rescuers locate the remains of four of the passengers,
    while two others remain missing. (Reuters) (Trust.org)
  North Wales child abuse scandal and fallout of the Jimmy Savile sexual abuse scandal:
  - The UK broadcaster ITV faces an investigation by the media regulator Ofcom after
    television presenter Phillip Schofield handed Prime Minister David Cameron an
    internet-generated list of potential suspects in a child abuse case involving
    a care home during a live interview on Thursday, and asked him to comment. (The
    Independent) (BBC)
  - An individual included on the list issues a lengthy statement denying all involvement
    in the abuse case, dating from the 1980s. (The Daily Telegraph) (Statement)
  - The BBC issues an apology after a key witness in a Newsnight report aired on 2
    November wrongly identified a senior politician as a pedophile. (The Daily Telegraph)
  Politics and elections:
  - CIA Director David Petraeus submits his resignation to President Barack Obama,
    citing an extramarital affair he had. (NBC News) (NBC News via USA Today)
  - Russian president Vladimir Putin sacks the chief of the armed forces Nikolai Makarov,
    three days after sacking the defence minister amid a corruption scandal. (RIA
    Novosti)
  - Hundreds of Tibetan students and monks protest against education policies in China's
    western Qinghai Province, shortly after a series of self-immolations by Tibetan
    monks. (VOA)
  - The UK's Secretary of State for International Development Justine Greening confirms
    Britain will cease giving financial aid to India by 2015. (BBC)
  Religion:
  - The current Bishop of Durham Justin Welby is officially named as the next Archbishop
    of Canterbury, the leader of the Anglican Church. He will succeed the present
    incumbent, Rowan Williams, who is set to retire in December. (BBC)
