Date: '2012-11-16'
Source_URI: Portal:Current events/2012 November 16
Intelligence_Payload:
  Business and economy:
  - Hostess Brands announces it will file for bankruptcy and liquidate its assets,
    stating that a bakery union's worker strike stemming from contract disputes "crippled"
    its operations. 18,500 workers are expected to be laid off. (Bloomberg)
  - The furniture retailer IKEA says it "deeply regrets" the use of political prisoners
    in the former German Democratic Republic as forced labour by some of its suppliers.
    (BBC)
  - 'Call of Duty: Black Ops II, published by Activision, grossed $500 million within
    24 hours, becoming the biggest entertainment launch of all time. (The Telegraph)'
  Disasters and accidents:
  - Two people are missing and at least 4 are injured after an oil rig exploded in
    the Gulf of Mexico, near Louisiana. (Fox News)
  International relations:
  - Egyptian Prime Minister Hesham Qandil makes a visit to Gaza City in hopes of lulling
    the ongoing conflict between Israel and Hamas. (Los Angeles Times)
  Law and crime:
  - The war crime convictions of Ante Gotovina and Mladen Markač are overturned by
    a war crimes tribunal in The Hague. The Croatian generals had been convicted and
    sentenced last year for atrocities against Serbs during the 1990's Yugoslav Wars.
    (BBC)
  - A photo of New York City Counterterrorism Officer Lawrence DePrimo, 25, taken
    today by an Arizona woman and posted on the New York City Police Department's
    Facebook page, which shows him buying a (normally $100) pair of waterproof winter
    boots from Skechers for a homeless Times Square man on 42nd Street without any
    shoes, goes viral, with 1.6 million views and 275,000 likes. (MSNBC)
  Politics and elections:
  - Elections to choose Police and Crime Commissioners in England and Wales are marked
    by voter apathy with a turnout of just 14.9%. The Electoral Commission says it
    will investigate the low turnout. (BBC)
  - Labour wins all three by-elections contested in the UK on Thursday, including
    gaining Corby from the Conservatives. Andy Sawford is elected MP for Corby, Lucy
    Powell for Manchester Central and Stephen Doughty for Cardiff South and Penarth.
    (BBC)
  - The U.S. House of Representatives voted overwhelmingly to end a Jackson–Vanik
    amendment, long-standing trade restriction with Russia. Also Magnitsky Law was
    adopted instead, it requires the United States to place financial and visa restrictions
    on a list of officials associated with the torture and death, three years ago,
    of Sergei Magnitsky. (Washington Post)
  Sport:
  - Saint Louis University announces that Saint Louis Billikens men's basketball head
    coach Rick Majerus will permanently retire due to health issues. (St. Louis Post-Dispatch)
