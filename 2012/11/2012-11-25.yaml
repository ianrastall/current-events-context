Date: '2012-11-25'
Source_URI: Portal:Current events/2012 November 25
Intelligence_Payload:
  Armed attacks and conflicts:
  - At least 11 people are killed and about 30 wounded in twin car bombs that hits
    a Protestant church in a major military establishment in Jaji, Kaduna State, north
    central Nigeria. (Reuters)
  - A teenager is killed and 40 wounded while storming the Muslim Brotherhood headquarters
    in Damanhur, Egypt, during the third day of protests as a result from the power
    grab by Mohamed Morsi. (National Post) (CBC)
  Arts and culture:
  - The city of Cluj-Napoca, Romania, is chosen as 2015 European Youth Capital. (Hotnews)
    (Mediafax)
  - Veteran British film actress Dinah Sheridan dies aged 92. (BBC)
  Disasters and accidents:
  - The death toll from a fire in a garment factory in the Bangladeshi capital Dhaka
    rises to 112 as the search for victims continues. (AP via WVEC)
  - A train hits a van at a level crossing near Rossano, Province of Cosenza, Calabria
    region, Italy, killing at least six workers from Romania and Bulgaria. (CNN) (Reuters)
  - In a collision between a bus and a truck at kilometer 90 of the highway Anaco-Cantaura,
    state of Anzoátegui, Venezuela, 8 killed and at least 25 injured. (El Nacional)
  - 16 people are killed and 44 others injured on the spot when a bus carrying a wedding
    party skids off the road and plunges into a 300-feet deep gorge in Udhampur district,
    Jammu and Kashmir, India. (India TV)
  - Two people are killed and more than 800 homes flooded following heavy rain and
    high winds across England and Wales. (BBC)
  Law and crime:
  - A man in Lithonia, Georgia, USA, dies after Walmart employees tackle him to the
    ground for suspected shoplifting of two DVDs on Black Friday. (Good Morning America)
  Politics and elections:
  - Catalonia holds a snap election following a demonstration for independence with
    the governing Convergence and Union party led by Artur Mas returning with a reduced
    number of seats. (CNN) (The Telegraph)
  - President Mohamed Ould Abdel Aziz returns to Mauritania after being in France
    for five weeks recovering after being shot by a soldier on 13 October. (Al Jazeera)
  - Basque separatist group ETA has reportedly indicated a readiness to disband, give
    up its weapons and enter talks with the governments of France and Spain. (BBC)
  Sport:
  - In Formula One, Sebastian Vettel wins the 2012 Championship for the third consecutive
    year with sixth place in the Brazilian GP, which was won by Jenson Button. (BBC)
  - English professional boxer Ricky Hatton loses to Ukrainian Vyacheslav Senchenko
    in his comeback fight at the Manchester Arena. Ricky announces his retirement
    at the press conference after the fight. (BBC)
  - Spanish manager Unai Emery is fired as coach of FC Spartak Moscow after a loss
    1-5 to FC Dynamo Moscow in a 2012–13 Russian Premier League local derby and elimination
    from 2012–13 UEFA Champions League. (Goal.com)
  - In Canadian football, the Toronto Argonauts win the 100th Grey Cup defeating the
    Calgary Stampeders 35-22. (National Post)
