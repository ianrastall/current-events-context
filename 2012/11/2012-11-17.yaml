Date: '2012-11-17'
Source_URI: Portal:Current events/2012 November 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Suspected insurgents detonate a motorcycle bomb in Mueang Yala District, southern
    Thailand, killing one person and wounding 20, one day ahead of the United States
    President Barack Obama’s visit to the country. (Washington Post) (Bangkok Post)
  Operation Pillar of Defense:
  - Two unguided rockets from Gaza land outside Jerusalem and two more land outside
    Tel-Aviv. Out of the 350 rockets fired since the start of Operation Pillar of
    Defense, the Iron Dome missile system has shot down over 200 rockets. (The Jerusalem
    Post)
  Disasters and accidents:
  - A school bus carrying about 60 schoolchildren is hit by a train near Manfalut,
    350 km (230 miles) south of Egyptian capital Cairo. At least 50 children and the
    driver are killed in the crash. The Egyptian minister of transport, Mohamed Rashad
    Al Matini, resigns. (BBC) (Xinhuanet)
  Politics:
  - Bal Thackeray, the founder and chief of shivsena died on 17 November as a consequence
    of a cardiac arrest.
  Law and crime:
  - 'Authorities in Bolivar, Missouri, arrest Blaec Lammers, 20, after he is accused
    of stockpiling weapons in an attempt to commit a copycat crime mirroring the 2012
    Aurora, Colorado shooting, this time targeting the premiere of The Twilight Saga:
    Breaking Dawn – Part 2. (FoxNews.com)'
