Date: '2012-11-11'
Source_URI: Portal:Current events/2012 November 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2012 Northern Mali conflict: West African nations agree to send a 3,300-strong
    force to northern Mali to regain area controlled by Islamist insurgent groups.
    (Daily Nation Kenya)'
  - Bangladesh detains five Rohingya Muslims who fled fighting between Buddhists and
    Muslims in Burma. (Bangkok Post)
  Syrian civil war:
  - Syrian opposition groups sign a deal in Qatar to form a coalition against president
    Bashar al-Assad. (Reuters)
  - Clashes take place between Syrian troops and rebels near the borders of Iraq and
    Turkey. (Khaleej Times)
  - The Israel Defense Forces has fired an anti-tank missile in the direction of a
    mortar position in Syria after a 120mm mortar shell exploded near an Israeli post
    in the Golan Heights. Although the missile was reportedly intended as a "warning
    shot" and directed to miss the mortar position on purpose, the IDF's response
    marks the first time since the 1973 Yom Kippur War that Israel has fired at Syrian
    territory. (Ynetnews) (Arutz Sheva)
  Disasters and accidents:
  - A strong earthquake with the magnitude 6.8 hits northern Burma, killing at least
    12 people. (The Guardian)
  Law and crime:
  - Mohammad al-Dahabi, the former spy chief of Jordan, is sentenced to 13 years imprisonment
    after being convicted of corruption. (Al Jazeera)
  - Authorities in Paraguay arrest a Bolivian drug lord and seize nearly 1700kg of
    cocaine near the border with Brazil. (AP via Google News)
  Politics and elections:
  - A Tibetan teenager dies after self-immolating in Gansu, China, in the seventh
    such incident this week and 70th since 2009. (Hindustan Times)
  - The Iranian parliament is to investigate the death of prominent blogger Sattar
    Beheshti in police custody. (Gulf News)
