Date: '2012-11-10'
Source_URI: Portal:Current events/2012 November 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 27 people are killed and dozens are wounded in conflicts between inmates
    and guards at Welikada prison in Colombo, the capital city of Sri Lanka. (BBC)
  - Palestinian militants fire a barrage of rockets from Gaza into southern Israel,
    in a cross-border escalation following an earlier attack in which four Israeli
    soldiers are injured, two seriously, when an anti-tank missile fired from the
    Gaza Strip hits an Israeli army jeep patrolling some 200 meters inside the Israeli
    border with Gaza; Israel carries out counter-strikes, killing five Palestinians
    and wounding 30. (The Times of Israel)
  Syrian civil war:
  - Two suicide bombings in Daraa killed at least 20 Syrian troops. (Fox News)
  Disasters and accidents:
  - Seventeen Turkish soldiers are killed in a helicopter crash on Herekol mountain
    in the Pervari area of Siirt province. The crash occurred due to bad weather conditions.
    (Reuters)
  - A married couple is presumed dead, seven are hospitalized, and five houses are
    completely destroyed (at least 27 were damaged and up to 81 were affected) in
    a massive explosion in the Richmond Hill neighborhood of the far southside of
    Indianapolis. A faulty furnace or gas leak is suspected. The blast, with an affected
    area of several blocks, was so large it registered on IUPUI earthquake detectors
    and was felt for several miles. (Indianapolis Star)
  Law and crime:
  - Two members of the Kuwaiti royal family are released after being held for tweeting
    messages supporting the opposition. (Al Jazeera)
  - The president of the Central African Republic François Bozizé orders the detention
    of his son after he refuses to pay a hotel bill. (AFP via Google News)
  Media:
  - George Entwistle steps down as Director-General of the BBC following the Newsnight
    child abuse broadcast row. (The Telegraph) (BBC)
  - Tim Davie, the BBC's head of audio and music will succeed Entwistle as Acting
    Director General from Sunday. (Sky News)
  United States elections, 2012:
  - President of the United States Barack Obama officially wins the state of Florida
    and its 29 electoral votes in the presidential election, putting the final count
    to 332 electoral votes for Obama—more than the 270 needed to ensure election—to
    Mitt Romney's 206 electoral votes. (Reuters)
  - Democrat Jay Inslee is elected Governor of Washington against Republican candidate
    Rob McKenna. (The Seattle Times)
  Sports:
  - Ulsan Hyundai defeat Al-Ahli 3-0 in the final match of the AFC Champions League,
    winning the trophy for the first time. (Goal.com)
