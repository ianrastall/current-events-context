Date: '2012-03-10'
Source_URI: Portal:Current events/2012 March 10
Intelligence_Payload:
  Armed conflicts:
  - 'March 2012 Gaza-Israel clashes: At least 130 rockets are fired into Israel from
    Gaza, and 12 Palestinians militants are killed as part of the latest escalation
    in violence in the region. (Ynetnews) (AP)'
  - Clashes take place in Somalia, where Al-Shabaab ambush Ethiopian troops. (BBC)
  - Air raids in Bayda kill 10 Al-Qaeda militants. (BBC)
  - Four people are killed and dozens injured in a grenade attack in Nairobi, Kenya
    (BBC)
  Arab Spring:
  - 'Syrian uprising: At least 45 women and children are killed and burned in Homs
    after the United Nations visited Syrian President Bashar al-Assad to discuss the
    uprising. (CNN)'
  Arts and culture:
  - French comics artist Jean Giraud, also known as Mœbius, the creator of Blueberry
    and a range of influential science-fiction comics, dies at age 73. (Europe1)
  Disasters:
  - A fire in Peru destroys half a million textbooks and other education materials.
    (BBC)
  Politics:
  - The leftist opposition party Smer-Social Democracy wins a clear majority in the
    Slovakian parliamentary election. (AP)
  - New protests erupt in Russia, after last week's election of Vladimir Putin as
    President for a third term. (BBC)
  - Hundreds of nude cyclists take to the street in Lima, Peru to protest unsafe road
    conditions. (BBC)
  U.S. Republican presidential caucuses:
  - Mitt Romney wins the caucuses in Guam, the Northern Mariana Islands, the Virgin
    Islands and Wyoming. (Washington Post) (National Journal) (USA Today)
  - Rick Santorum wins the caucus in Kansas. (Wall Street Journal)
  Science:
  - Frank Sherwood Rowland, the winner of the 1995 Nobel Prize in Chemistry for warning
    about the depletion of the ozone layer, dies in the US state of California. (AP
    via Yahoo News)
  Sports:
  - Canadian cross skier Nick Zoricic dies, at the age of 29, after a crash during
    a race in Grindelwald, Switzerland. (BBC)
  - The Egyptian Football Association agrees to cancel the 2011-12 Egyptian Premier
    League season following the Port Said Stadium disaster. (BBC)
