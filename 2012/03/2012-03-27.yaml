Date: '2012-03-27'
Source_URI: Portal:Current events/2012 March 27
Intelligence_Payload:
  Armed conflict and attacks:
  - A landmine explosion in Maharashtra, India, allegedly by Maoist insurgents, kills
    15 policemen and injures 13 others. (Toronto Star)
  - Two smugglers, allegedly including an Israeli-Arab, are killed in an exchange
    of fire with Israel Defense Forces troops and Egyptian Border Guards. (Ynetnews)
    (Haaretz)
  - Several people are arrested in Kabul, the capital of Afghanistan, as alleged suicide
    bombings are foiled. (BBC)
  2011–2012 Libyan factional fighting:
  - At least 50 people are killed in two days of tribal clashes in southern Libya.
    (AP)
  - The National Transitional Council admits that it faces a national crisis amid
    an escalation of violence and militia rule. (The Scotsman)
  Business and economy:
  - Apple Inc Chief Executive Tim Cook arrives in China for talks with government
    officials to clear up problems in the firm's biggest growth market, including
    the contested iPad trademark and treatment of local labor. (Reuters)
  - The United States Department of Justice says that it will not invoke antitrust
    laws to stop the merger of Humana with Arcadian Management Services, two important
    health insurance companies. (Reuters)
  International relations:
  - The President of Sudan Omar Hassan al-Bashir cancels planned meetings with the
    government of South Sudan following border clashes yesterday. (Reuters)
  - World leaders meet at a summit in Seoul, South Korea, to discuss nuclear security.
    (Reuters)
  - During a personal meeting, Pope Benedict XVI asks Cuban President Raúl Castro
    to recognize Good Friday as a holiday in the country over its importance for the
    Catholic calendar. (Catholic News Agency)
  Law and crime:
  - Al Jazeera announces that it has decided not to broadcast video footage of the
    2012 Midi-Pyrénées shootings that had been filmed by the gunman with a camera
    strapped to his body. (The Irish Times)
  Politics and elections:
  - The funeral of former King of Tonga George Tupou V is held in Nukuʻalofa with
    thousands of mourners lining the street. (BBC)
  - Allegations surface over Bo Xilai's extrajudicial measures used to extract confessions
    during the Chongqing gang trials. (The New York Times)
  Sport:
  - In baseball, a consortium led by American basketball star Magic Johnson wins an
    auction process for ownership of the Los Angeles Dodgers. (Wall Street Journal)
  - In rugby league, three-time World Club Champions Bradford Bulls announce that
    they needed to raise £1 million to stay in business. (BBC News)
