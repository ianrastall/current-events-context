Date: '2012-03-28'
Source_URI: Portal:Current events/2012 March 28
Intelligence_Payload:
  Armed conflict and attacks:
  - '2012 South Sudan–Sudan border conflict: South Sudan''s troops pull out of Sudan''s
    oil-producing Heglig area, easing tensions after two days of clashes between the
    neighbours threatened to escalate a simmering conflict. (Reuters)'
  - '2011–2012 Syrian uprising: Syrian forces attack the central town of Qalaat al-Madiq
    as Arab League ministers meet in Baghdad. (SAPA via IOL) (BBC)'
  2012 Sabha conflict:
  - Renewed clashes in Sabha, Libya, raise the death toll to 50. (Reuters)
  - Issa Abdel Majid Mansur, the head of the Tubu tribe in Libya, announces the possibility
    of separatist activities. (Al Arabiya)
  Arts and culture:
  - Pope Benedict XVI calls for greater openness in Cuba during a speech in Revolution
    Square, Havana. (Los Angeles Times)
  Business and economy:
  - The Government of Fiji seizes a controlling interest in subsidiary Air Pacific
    from the Australian airline Qantas. Qantas remains in control of its equity in
    the airline. (Channel News Asia)
  - The Mega Millions jackpot in the United States hits a record $500 million dollars,
    a world record in lottery history. (CNN)
  International relations:
  - The United States suspends planned food aid to North Korea, after the latter plans
    to launch a rocket next month. (Times of India)
  Politics and elections:
  - '2012 Malian coup d''état: Coup leaders in Mali unveil a new constitution. (Al
    Jazeera)'
  - Annastacia Palaszczuk becomes the Opposition Leader of the Queensland Australian
    Labor Party, following the party's landslide defeat in last Saturday's election.
    (Brisbane Times)
  - Detained Chinese rights lawyer Gao Zhisheng is allowed a visit from family, for
    the first time in two years. (Reuters)
