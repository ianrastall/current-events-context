Date: '2012-03-25'
Source_URI: Portal:Current events/2012 March 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2012 insurgency in northern Mali: Tuareg insurgents close in on multiple northern
    towns where they say they will apply Islamic sharia law. (News 24)'
  - A roadside bomb in southern Kandahar Province, Afghanistan, detonates on a joint
    Afghan-NATO convoy killing six Afghan police, one U.S. soldier, and one translator.
    (CNN)
  Syrian uprising:
  - At least 48 people are reported killed across Syria as US President Barack Obama
    and Turkish Prime Minister Erdoğan hold talks about a process for transitioning
    to a "legitimate government". (CNN)
  - Syrian armed forces continue to bombard the city of Homs, and rebels attack a
    military base near the capital Damascus. (The Bangkok Post) (News24)
  International relations:
  - 'Kandahar massacre: The United States pays the Afghanistan government $50,000
    for every person murdered during the Kandahar massacre. (Wall Street Journal)'
  - Kofi Annan and a special UN peace envoy meet with President of Russia Dmitry Medvedev
    to discuss adopting a harder stance on Syria and Bashar al-Assad. (BBC)
  - Barack Obama, the President of the United States, begins a three day visit to
    South Korea amidst rising tension in North Asia about proposed missile tests by
    North Korea. (BBC)
  Law and crime:
  - French prosecutors charge the brother of the gunman Mohammed Merah with complicity
    in the murders and conspiracy to commit acts of terrorism with regards to the
    killings of three French paratroopers, a rabbi and three children in Toulouse.
    (CNN)
  - A student is shot dead on the Mississippi State University campus in the United
    States, prompting school-wide alerts. Three suspects escape in a blue Ford Crown
    Victoria. (Jackson Clarion Ledger)
  Politics and elections:
  - Peter Cruddas resigns as treasurer of Britain's Conservative Party after he was
    filmed selling access to Prime Minister David Cameron for £250,000. (BBC) (The
    Guardian)
  - New Zealand changes two road rules regarding priority at intersections, including
    reversing the drive-on-the-left nation's unique rule that gave right-turning traffic
    priority over left-turning traffic. (TV New Zealand)
  - Leung Chun-ying is projected as the winner of the election to be Chief Executive
    of Hong Kong. (Bloomberg)
  - Voters in Senegal go to the polls for a runoff in the presidential election with
    reports indicating that challenger Macky Sall has defeated incumbent Abdoulaye
    Wade. (CNN) (Voice of America)
  Sport:
  - In golf, Tiger Woods wins the Arnold Palmer Invitational tournament in Orlando,
    his first US PGA Tour victory since 2009. (AP via Silicon Vally Mercury)
