Date: '2012-03-23'
Source_URI: Portal:Current events/2012 March 23
Intelligence_Payload:
  Business and economy:
  - The Financial Services Committee of the United States House of Representatives
    receives a memo quoting Edith O'Brien, the treasurer of defunct broker MF Global,
    to the effect that Jon S. Corzine was personally ordering the transfer of customers'
    money to a brokerage account with JP Morgan Chase last October. (Bloomberg)
  International relations:
  - Pope Benedict XVI arrives in Mexico and is greeted by thousands in Guanajuato,
    Guanajuato, and is also greeted by President Felipe Calderón. (BBC)
  - During his pastoral visit in Mexico the Pope Benedict XVI is expected to address
    the problem of drug trafficking and the associated violence. (Catholic World News),
    (National Catholic Reporter), (Time)
  - The African Union suspends Mali's membership following a coup earlier in the week.
    (The Guardian via the Irish Times)
  Politics and elections:
  - In a statement by Pope Benedict XVI he says that Communism does not work for Cuba
    and that he is ready to help the island find new ways to move forward in a peaceful
    manner. (Reuters)
  - U.S. President Barack Obama nominates current President of Dartmouth College Jim
    Yong Kim to be head of the World Bank.(Los Angeles Times)
