Date: '2012-01-14'
Source_URI: Portal:Current events/2012 January 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomber kills at least 53 people and injures more than 130 in the Iraqi
    city of Basra. (CNN)
  - Violent protests occur in Bucharest, Romania, as two-day-old demonstrations continue
    against President Traian Băsescu's economic austerity measures. Clashes are reported
    in numerous Romanian cities between protesters and law enforcement officers. (Antena
    3) (Washington Post)
  Disasters:
  - A power transformer malfunction in Bursa, Turkey, leaves millions without electricity,
    including the metropolis of Istanbul. (Washington Post)
  - Rescue teams find two survivors trapped inside the capsized cruise ship Costa
    Concordia, which ran aground off the coast of Tuscany on January 13, killing at
    least three people. The ship's captain is detained by police for questioning.
    (New Zealand Herald)
  International relations:
  - The Emir of Qatar, Sheikh Hamad bin Khalifa al-Thani, proposes that Arab League
    troops be sent to Syria to end ongoing violence in the country. (VoA)
  Politics and elections:
  - Voters in the Republic of China go to the polls for the 2012 presidential election.
    Incumbent President Ma Ying-jeou ultimately wins re-election with 51% of the vote,
    defeating Democratic Progressive Party chairwoman Tsai Ing-wen. (MSNBC) (China
    Post)
  Transportation:
  - The Circle MRT line extension began operations, connecting Promenade and Marina
    Bay via Bayfront. It is operated by SMRT Trains Ltd.
