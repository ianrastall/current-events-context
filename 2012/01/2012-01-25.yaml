Date: '2012-01-25'
Source_URI: Portal:Current events/2012 January 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011–2012 Syrian uprising: 18 protesters are shot dead by Syrian security forces.
    (Naharnet)'
  - A Tibetan monk is shot dead in Sichuan, China, in the second violent clash this
    week as unrest spreads. (Times of Oman) (BBC)
  - Protesters in Egypt commemorate the first anniversary of the revolution. (Al Jazeera)
  - Riots break out in a prison in central Colombo, Sri Lanka, injuring 31 inmates
    and guards. (UPI)
  - 10 people are injured in a grenade attack in southern Rwanda. (Reuters)
  - A United States rescue operation in Somalia frees two foreign hostages and kills
    nine pirates. (Times of India)
  - A truck bomb detonates at an Ethiopian military base in Somalia. (IOL)
  Disasters and accidents:
  - A landslide in central Papua New Guinea leaves four people dead and 60 missing.
    (AP)
  International relations:
  - Iranian President Mahmoud Ahmadinejad says that Iran is willing to talk about
    Iran's nuclear program with other leaders. (Al Jazeera)
  Law and crime:
  - The United Nations says a new foreign judge at the Khmer Rouge trial can continue
    cases without the support of Cambodia. (AFP)
  - Israeli police capture Aziz Dweik, Speaker of the Hamas-dominated Palestinian
    Parliament, and place him under detention for 6 months. (The Guardian)(Jerusalem
    Post)
