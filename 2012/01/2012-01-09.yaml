Date: '2012-01-09'
Source_URI: Portal:Current events/2012 January 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Insurgency in the North Caucasus: Clashes occur between the Russian forces and
    Islamist militants in the Vedensky District, Chechnya, with reportedly 8 killed
    and 16 wounded. (RIA)'
  International relations:
  - Iranian President Mahmoud Ahmadinejad meets with Venezuelan President Hugo Chávez
    on the first stop of Ahmadinejad's Latin American tour. (CNN)
  Politics:
  - President Malam Bacai Sanhá of Guinea-Bissau dies at the age of 64 while undergoing
    treatment for an unknown ailment in Paris. (BBC)
  - In the United Kingdom a disagreement emerges between the Westminster and Scottish
    governments over a referendum on Scottish independence, after Prime Minister David
    Cameron tells a Sky News interview that a quick decision is needed on the matter
    for the sake of the economy. (Sky News) (BBC)
  Sport:
  - Alabama defeats LSU 21-0 to win the 2012 BCS National Championship, their second
    championship in three years, in the first shutout in BCS bowl history. (ESPN)
  Television:
  - The Early Show is Changing to CBS This Morning
