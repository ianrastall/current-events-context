Date: '2012-01-30'
Source_URI: Portal:Current events/2012 January 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Police shoot and kill two people in Podor during protests over a decision by the
    Constitutional Council that President of Senegal Abdoulaye Wade can run for re-election.
    (BBC)
  - Local coordination committees in Syria call for a day of remembrance for lives
    lost in the ongoing uprising. (CNN)
  - Tibetan advocacy groups claim that as many as seven ethnic Tibetans have been
    killed and 60 wounded in the past week in protests in China's Sichuan province
    bordering Tibet. (Reuters)
  - Soldiers who attempted a mutiny last week in Papua New Guinea hand their weapons
    over to the Deputy Prime Minister Belden Namah in return for a general amnesty.
    (AAP via SBS)
  - Sudanese officials claim that the army has freed 14 of 29 Chinese workers held
    by rebels in the South Kordofan region since last Saturday. (BBC)
  - A US drone airstrike kills 15 members of al Qaida in the Arabian Peninsula in
    the Yemeni town of Lawdar in the Abyan Governorate. (Xinhua)
  Disasters:
  - The death toll from a fake medicine crisis at a cardiology hospital in Lahore,
    Pakistan, reaches 112. (Express Tribune)
  Law and crime:
  - An Indonesian court in Jayapura indicts five Papuan activists for declaring independence
    in October. (AFP via The West Australian)
  Science and technology:
  - U.S. President Barack Obama answers questions about the State of the Union posed
    by citizens in the first-ever completely virtual interview from the White House
    but fails to answer the most popular questions which were related to the controversial
    topic of marijuana legalization. (Reuters)(Computerworld) (Mashable) (The White
    House)
  Politics and elections:
  - Occupy DC activists are banned from camping in McPherson Square and Freedom Plaza
    in the US capital Washington DC. (CNN)
