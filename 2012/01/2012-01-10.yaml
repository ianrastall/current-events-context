Date: '2012-01-10'
Source_URI: Portal:Current events/2012 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bombing in Khyber Agency, Pakistan, kills at least 29 people and leaves over
    50 others injured. (Vancouver Sun)
  Law and crime:
  - Amir Mirza Hekmati is sentenced to death by Iran's Islamic Revolutionary Court.
    (Wall Street Journal)
  Politics:
  - The Scottish Government announces that it plans to hold the referendum on Scottish
    independence in the autumn of 2014, but Secretary of State for Scotland Michael
    Moore tells the House of Commons that the power to hold a referendum is "reserved"
    to Westminster. (BBC)
  - Secretary of State for Transport Justine Greening gives the go-ahead for HS2,
    a £33bn high-speed rail line that will eventually link several major cities in
    the United Kingdom to London and enabling quicker journey times. (BBC)
  - Early reports show that Mitt Romney wins the New Hampshire Republican primary
    with Ron Paul in second and Jon Huntsman in third. (CNN)
