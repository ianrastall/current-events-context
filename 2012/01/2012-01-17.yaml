Date: '2012-01-17'
Source_URI: Portal:Current events/2012 January 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2012 Afar region tourist attack
  - Unknown assailants kill 2 Hungarians, 2 Germans and an Austrian in northeastern
    Ethiopia. (Al Jazeera)
  - Officials in Burma order the military to stop offensives in ethnic minority areas.
    (Bangkok Post)
  - '2011–2012 Yemeni uprising: Vice President Abdurabu Hadi says that presidential
    and parliamentary elections planned for next month will go ahead. (CNN)'
  2011–2012 Syrian uprising:
  - Syria rejects calls for Arab troops to intervene in the country's conflict. (News24)
  - 25 people are killed by Syrian security forces in the latest violence. (Voice
    of America)
  Business and economy:
  - Yahoo! co-founder Jerry Yang resigns as chief executive officer. (San Jose Mercury
    News)
  Disasters and accidents:
  - At least 26 people are killed after a truck's brakes fail along a busy street
    in Port-au-Prince, Haiti. (BBC)
  International relations:
  - India and China agree to establish a working mechanism to deal with border issues.
    (The Hindu)
  Politics:
  - 'Crackdown on dissidents in the People''s Republic of China: Authorities in China
    charge dissident Zhu Yufu for "subverting state power". (The New York Times)'
  - Kim Jong-nam, half-brother of new North Korean leader Kim Jong-un, predicts the
    regime will fall if reforms are not made soon. (UPI)
  - Vietnam's Prime Minister Nguyễn Tấn Dũng orders an investigation into a guerrilla-style
    standoff with farmers who laid land mines and firing improvised shotguns amid
    a land eviction. (Straits Times)
  Science:
  - Abdollah Jassbi resigns as President of Islamic Azad University after near thirty
    years in position. (Tabnak)
