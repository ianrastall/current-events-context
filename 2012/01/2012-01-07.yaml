Date: '2012-01-07'
Source_URI: Portal:Current events/2012 January 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 37 people are killed in two days of attacks in northeastern Nigeria,
    after radical Islamic group Boko Haram issues an ultimatum for all Christians
    to leave the north. (Reuters)
  - Iran praises the United States Navy after American sailors rescued Iranian fishermen
    from armed pirates in the Arabian Sea. (CNN)
  Arts and culture:
  - Several of Bosnia's leading cultural institutions are due to close following funding
    disputes. The affected institutions include the National Library, the National
    Museum, the Historical Museum and the National Gallery. (NPR)
  Disasters:
  - A hot air balloon crashes near Carterton, New Zealand, killing all eleven onboard.
    The accident was reportedly caused by a collision with a power line. (BBC) (Fox
    News)
