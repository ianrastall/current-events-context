Date: '2012-01-21'
Source_URI: Portal:Current events/2012 January 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - The death toll of a series of co-ordinated bombing attacks in Kano, Nigeria, rises
    to more than 140. The attacks, which targeted police stations across the city,
    are attributed to Islamist group Boko Haram. (The Guardian)
  Disasters:
  - 'Costa Concordia disaster: The body of a woman is discovered by search teams aboard
    the stricken cruise ship Costa Concordia, bringing the confirmed death toll of
    the ship''s capsizing to 12. Rescue efforts continue apace, as it is feared the
    ship may soon slip into deeper waters off the Italian coast. (MSNBC)'
  Law and crime:
  - Under new guidelines to come into force from April 30, clinics which charge for
    pregnancy services, including abortions, will be able to advertise on radio and
    television in the United Kingdom, after the Broadcast Committee of Advertising
    Practice ruled there was no justification for barring such clinics from advertising
    their services. (BBC)
  Politics and elections:
  - A Republican Party primary election takes place in the U.S. state of South Carolina,
    with Newt Gingrich being declared the winner and Mitt Romney coming second. (BBC)
  - Håkan Juholt resigns as the head of the Swedish Social Democratic Party, after
    less than a year in the post. (Aftonbladet)
  Science:
  - Leading international virologists agree to temporarily halt work on a more virulent
    strain of the H5N1 influenza virus, due to fears that an airborne strain of the
    lethal virus could be used by bioterrorists. (New Scientist)
  Sports:
  - The Africa Cup of Nations, Africa's primary international football competition,
    begins in Equatorial Guinea, with Gabon co-hosting. (BBC)
  - Former Pennsylvania State University football coach Joe Paterno, who is suffering
    from lung cancer, is reported to be in grave condition. (CBS News)
