Date: '2012-01-26'
Source_URI: Portal:Current events/2012 January 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Tuareg Rebellion (2011–present): Tuareg rebels capture the fourth Malian town
    in a week. (Al Jazeera)'
  - 'Papua New Guinea constitutional crisis: Soldiers supporting former Papua New
    Guinea Prime Minister Michael Somare stage a mutiny in Port Moresby. PNG Brigadier
    General Francis Agwi is said to be under house arrest. (ABC News)'
  - The United Nations says detainees from Libya's civil war are being tortured. (Al
    Jazeera)
  - '2011–2012 Syrian uprising: The Arab League calls on the United Nations Security
    Council to back its plan to end the violence in Syria. (BBC)'
  Business and economy:
  - Illumina a U.S. based gene sequencing company, adopts a poison pill strategy to
    defend its independence against a hostile bid by Roche Holding. (Reuters)
  Disasters and accidents:
  - Three people are killed and 16 missing after three office buildings collapse in
    Cinelândia square in Rio de Janeiro, Brazil. (IOL)(Washington Post)(USA Today)(BBC)(Wall
    Street Journal)
  Politics and elections:
  - Security escort Australian Prime Minister Julia Gillard and Opposition Leader
    Tony Abbott from a restaurant in Canberra after indigenous protesters surrounded
    the building on Australia Day in response to comments made by Abbott. (CNN) (Sydney
    Morning Herald)
