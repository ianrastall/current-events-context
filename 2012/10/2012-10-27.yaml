Date: '2012-10-27'
Source_URI: Portal:Current events/2012 October 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Iraqi insurgency: A series of attacks across Iraq kill 46 and injured 123 others.
    (BBC)'
  - Several injuries occur as police use rubber-coated steel bullets and tear gas
    to disperse people at the Olympia Stadium in Rustenburg, South Africa. (Al Jazeera)
  Business and economics:
  - Thousands of people join protests against budget cuts in Madrid and ask that the
    government quit. Riot police greet the demonstrators. (BBC) (Al Jazeera)
  Disasters:
  - A 7.7 magnitude earthquake strikes off the coast of British Columbia near Haida
    Gwaii, triggering a tsunami warning in the North Pacific. (CBC)
  International relations:
  - The fifth Tibetan in a week sets himself on fire and dies in Tibet in a protest
    against Chinese rule. (The Himalayan Times)
  Jimmy Savile sexual abuse scandal:
  - The family of disgraced disc jockey and television presenter Jimmy Savile makes
    its first public statement since his reputation was destroyed by a sexual abuse
    scandal. (CNN) (BBC)
  - A statement from the Vatican claims it is not possible to strip Savile of his
    papal knighthood over his involvement in the sexual abuse scandal because the
    honour ceased to exist upon his death. Vatican spokesman Federico Lombardi makes
    it known that the Vatican is "deeply saddened that a person who has been stained
    by such acts could in his lifetime have been proposed for an honour by the Holy
    See." (The Irish Times)
  Sport:
  - In composite rules shinty–hurling, Ireland defeat Scotland to claim the International
    Series. (BBC Sport) (Irish Examiner)
  - Karl Lacey of Donegal is named the GAA All Stars Footballer of the Year, alongside
    which he picks up his fourth All Star. (BBC Sport)
