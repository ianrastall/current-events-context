Date: '2012-10-02'
Source_URI: Portal:Current events/2012 October 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen kill at least twenty students at a hostel away from the Federal Polytechnic
    campus in the northeastern Nigerian town of Mubi. (BBC)
  - A member of the People’s Majlis, the parliament of the Maldives, is found stabbed
    to death near his home. (BBC)
  - A bomb blast in southern Afghanistan kills a United States Army service member.
    (Los Angeles Times)
  Disasters and accidents:
  - A minibus collides with a truck in the northern Philippine province of Ilocos
    Norte, killing at least 10 people. (AP via ABC News)
  - The number of confirmed deaths in the ferry collision in Hong Kong rises to 38.
    (BBC)
  Health and environment:
  - A European Commission report draft estimates the investment needed for increasing
    the safety of Europe's 134 power station nuclear reactors at 10 to 25 billion
    euro. The full report on the stress tests is to be debated by EU ministers later
    this month. (Reuters) (PDF)
  Law and crime:
  - A U.S. Border Patrol agent is shot dead near the U.S.-Mexico border in the state
    of Arizona. A second agent was shot and is being treated for non-life threatening
    injuries. (BBC)
  - Several sources claim that a French spy killed Muammar Gaddafi in 2011; the motive
    to try to conceal Ghadaffi's financial support of Nicolas Sarkozy's 2007 presidential
    election campaign. A French source dismisses the story as "nonsense". (Hindustan
    Times) (France 24)
  Politics and elections:
  - The OSCE titles the parliamentary election in Georgia as "fair and free". Partial
    results show a majority of votes for Georgian Dream. President Saakashvili concedes
    that his party, United National Movement, will move to opposition. Bidzina Ivanishvili
    is expected to become prime minister, and after legislative changes next year,
    also head of state. (Bloomberg via Business Week) (San Francisco Chronicle)
