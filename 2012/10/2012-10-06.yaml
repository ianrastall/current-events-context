Date: '2012-10-06'
Source_URI: Portal:Current events/2012 October 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - The South Korean Ministry of National Defense states that a North Korean soldier
    has defected to South Korea after killing two of his superiors. (AP via The Union
    Democrat)
  Law and crime:
  - A court in the Vatican finds Pope Benedict XVI's former butler Paolo Gabriele
    guilty of theft for stealing and leaking confidential documents and sentences
    Gabriele to 18 months' imprisonment. (BBC)
  - A 46-year-old man is charged with the murder of April Jones, who disappeared near
    her home in Machynlleth, Wales, on October 1. (BBC)
  Politics and elections:
  - Iran says Israel should join the Treaty on the Non-Proliferation of Nuclear Weapons.
    (RIA Novosti)
  - Former Social Democratic and Labour Party leader John Hume receives the papal
    knighthood at a special Mass in Derry's St Eugene's Cathedral. (BBC)
  Sport:
  - The 2012 rugby league Super League was won by Leeds Rhinos who defeated Warrington
    Wolves 26-18 in the Old Trafford Grand Final. (BBC)
