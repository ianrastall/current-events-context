Date: '2012-10-28'
Source_URI: Portal:Current events/2012 October 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Iraqi insurgency: Car bombings in and around Baghdad kill 15 and injure 33 others.
    (Al Jazeera)'
  - Ten people are killed and over 100 injured after a suicide bombing and reprisal
    attacks close to a Catholic church in Kaduna, Northern Nigeria. (BBC)
  - The United Nations calls for action to end renewed hostilities between ethnic
    Buddhists and Muslim Rohingya in Myanmar's western Rakhine State that have killed
    dozens and displaced more than 22,500. (Al Jazeera)
  Syrian civil war:
  - Opposition activists report at least 128 deaths around the country, as the UN-brokered
    ceasefire appears to collapse. The Syrian Army bombards three Damascus districts
    and the city of Bara near Idlib, killing at least 22 people. (CNN) (Reuters)
  - Al Qaeda's leader Ayman al-Zawahiri pledges support for the rebels in a new video
    uploaded to a jihadist website. (CNN)
  Disasters:
  - The East Coast of the United States prepares for Hurricane Sandy, which has killed
    at least 67 people and caused widespread damage in the Caribbean. (CNN)
  Exploration:
  - The SpaceX Dragon capsule on a re-supply mission to the International Space Station
    returns to Earth. (BBC)
  Law and crime:
  - Greek journalist Kostas Vaxevanis is arrested over the publication of a list of
    Greeks with Swiss bank accounts. (BBC)
  - Former pop star Gary Glitter is arrested on suspicion of sex offences by police
    investigating the Jimmy Savile sexual abuse scandal. (BBC)
  - The Euromillions lottery website is hacked; its homepage is replaced by a Quran
    passage which condemns gambling. (BBC)
  Sport:
  - Chelsea lose their unbeaten league record against Manchester United as Manchester
    United wins 3-2 at Stamford Bridge. Referee Mark Clattenburg sends off Branislav
    Ivanović and Fernando Torres. In addition, Javier Hernández is pelted with objects
    after scoring the winning goal, a steward is injured and hospitalized, and Chelsea
    issue a formal complaint to the Premier League over the referee's alleged racial
    abuse of several players, including Mikel John Obi. (BBC) (GOAL) (Daily Mail)
    (The Guardian) (The Independent) (The Daily Telegraph)
  - In Formula One racing, Sebastian Vettel wins the 2012 Indian Grand Prix, with
    Fernando Alonso and Mark Webber in second and third place. (BBC)
  - In Major League Baseball, the San Francisco Giants defeat the Detroit Tigers in
    game four of the 2012 World Series, sweeping the Tigers and winning their second
    World Series in three years. Pablo Sandoval is named World Series MVP. (ESPN)
    (ESPN)
