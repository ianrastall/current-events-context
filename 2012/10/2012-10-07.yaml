Date: '2012-10-07'
Source_URI: Portal:Current events/2012 October 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - A Mark Rothko Seagram mural on display at the Tate Modern is attacked at about
    15:25 BST. (BBC) (The Guardian) (Yellowism)
  - On the 11th anniversary of the U.S.-led invasion of Afghanistan, two activists
    are detained at Ireland's Shannon Airport during a protest against U.S. drone
    strikes in Pakistan. (The Irish Times) (RTÉ)
  Disasters and accidents:
  - An Antonov An-12 aircraft belonging to the Sudanese military crashes southwest
    of the capital Khartoum, killing at least 13 of the 22 people on board. (CNN)
    (Reuters)
  Life and death:
  - Antisa Khvichava, a woman regarded as the oldest person of all time, dies. (Radio
    Free Europe)
  Politics and elections:
  - Voters in Venezuela go to the polls for a presidential election, with Hugo Chávez
    of the United Socialist Party of Venezuela and Henrique Capriles Radonski of the
    opposing Justice First party both competing for the presidency. (BBC)
  Religion and spirituality:
  - Pope Benedict XVI names John of Avila and Hildegard of Bingen the 34th and 35th
    doctors of the Catholic church. (Washington Post)
  Sports:
  - In ladies' Gaelic football, the Rebelettes crush Kerry by a scoreline of 0-16
    to 0-7 at Croke Park to win the All-Ireland Senior Ladies' Football Championship.
    (RTÉ Sport) (Examiner Sport)
  - In horseracing, Solemia defeats Japanese Triple Crown winner Orfevre in Prix de
    l'Arc de Triomphe. (BBC)
  - Sébastien Loeb wins the World Rally Championship drivers' title for a record ninth
    consecutive year. (Chicago Tribune)
  - Jamie Whincup and Paul Dumbrell win the 2012 Supercheap Auto Bathurst 1000. (Autosport)
