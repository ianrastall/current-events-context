Date: '2012-10-13'
Source_URI: Portal:Current events/2012 October 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - President of Mauritania Mohamed Ould Abdel Aziz is shot. (BBC) (Al Jazeera) (Deutsche
    Welle)
  - In response to multiple rockets being fired across the border, Israel launched
    four air strikes. Two militants from a Salafist jihadist group are killed and
    another wounded in the northern Gaza Strip. (BBC)
  - A suicide bombing at a market in the Pakistani town of Darra Adam Khel kills at
    least 15 people. (BBC)
  - 'Mexican Drug War: The Mexican Army kills Manuel Torres Félix, one of the leaders
    of the Sinaloa Cartel. (Fox News)'
  - 'Insurgency in the North Caucasus: A Russian army soldier and three Islamic militants
    die in a skirmish in the North Caucasus republic of Dagestan. (RIA)'
  Arts and culture:
  - Gerhard Richter's Abstraktes Bild, painted in 1994 and formerly owned by rock
    star Eric Clapton, sells for $34 million - an auction record for a work by a living
    artist. (BBC)
  Business and economy:
  - Reuters reports on the basis of "people familiar with the matter" that the U.S.
    Federal Trade Commission is close to bringing an antitrust lawsuit against Google
    over its dominance of the search engine market. (Reuters)
  History:
  - Residents of Los Angeles watch in awe as U.S. Space Shuttle Endeavour inches through
    the city on a giant trolley, bound for a museum. Hundreds of trees in its path
    are chopped down. (BBC)
  International relations:
  - Syria announces Turkish civilian flights over Syrian territory are banned, days
    after Turkey intercepted a Syrian flight that was suspected to be carrying illegal
    cargo. (BBC)
  Law and crime:
  - The UK's Department of Health is to investigate the decision to appoint the broadcaster
    Sir James Savile as head of a taskforce overseeing the high security Broadmoor
    Hospital, a facility for the criminally insane, following recent allegations of
    sexual abuse. He was appointed to the position in the late 1980s. (BBC)
  Sport:
  - An Africa Cup of Nations qualification match between Senegal and Ivory Coast is
    abandoned due to rioting at the Stade Leopold Senghor in Dakar. (BBC)
  - Despite universal condemnation from the print media, television analysts and fans,
    Ireland soccer manager Giovanni Trapattoni refuses to resign following last night's
    humiliation at the hands of Germany in 2014 FIFA World Cup qualification – UEFA
    Group C. (The Daily Telegraph) (BBC)
  - Sligo Rovers claim their first league title in nearly forty years with an historic
    3-2 win over St Patrick's Athletic at the Showgrounds. (The Irish Times)
