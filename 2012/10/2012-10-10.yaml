Date: '2012-10-10'
Source_URI: Portal:Current events/2012 October 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Syrian civil war: Rebels claim control of the strategic town of Maarrat al-Nu''man
    on the main road linking Damascus to Aleppo. (Al Jazeera)'
  - A Syrian passenger plane is forced by Turkish fighter jets to land in Ankara due
    to the allegations of carrying weapons. (BBC)
  Business and economy:
  - BAE and EADS announce their merger talks are cancelled over political disagreements.
    (New York Times)
  Law and crime:
  - A court in Moscow, Russia, frees one of the three Pussy Riot members at an appeal
    hearing. (RIA Novosti)
  Politics and elections:
  - U.S. President Obama nominates general John R. Allen for the SACEUR function.
    General Joseph Dunford would succeed Allen as ISAF commander in Afghanistan. (CNN)
  Science:
  - Two American scientists, Robert Lefkowitz and Brian Kobilka, win the 2012 Nobel
    Prize in Chemistry for their work on discovering the inner workings of G protein-coupled
    receptors. (Reuters)
  - ESO astronomers discover an unexpected spiral structure around carbon star R Sculptoris.
    (Red Orbit)
  Religion and spirituality:
  - Pope Benedict XVI adds Arabic to weekly Vatican address in front of pilgrims.
    (BBC)
  Sports:
  - The USADA details witness-based doping claims against Lance Armstrong in its long-due
    report to the UCI. George Hincapie admits doping use over part of his career.
    (Los Angeles Times)
