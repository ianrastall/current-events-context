Date: '2012-10-17'
Source_URI: Portal:Current events/2012 October 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - One UNAMID peacekeeper is killed and three are wounded during an ambush in Hashaba,
    Sudan. (Reuters)
  - '2012 Syrian–Turkish border clashes: Turkish artillery retaliates after a Syrian
    bomb landed on Turkish territory in Hatay Province. (The Daily Star)'
  Law and crime:
  - Two U.S. sailors are arrested over an alleged rape of a Japanese woman on Okinawa.
    (BBC)
  - The UK's Lancashire Police apologises after an officer used a Taser on a blind
    man whose white cane was mistaken for a samurai sword. The matter is also referred
    to the Independent Police Complaints Commission. (BBC)
  - The FBI arrests Mohammed Nafis for plotting to detonate a 1,000 lb (454 kg) car
    bomb in front of the Federal Reserve Bank of New York. (BBC) (CNN)
  - The UK's Department of Health appoints former barrister Kate Lampard to head an
    NHS inquiry into alleged activities by the broadcaster Jimmy Savile at various
    hospitals at which he was involved. (BBC)
  Politics and Elections:
  - The body of former King Norodom Sihanouk is returned to Cambodia. (BBC)
  - A resolution of impeachment against Northern Mariana Islands Governor Benigno
    Fitial is defeated in the Northern Mariana Islands House of Representatives with
    9 votes in favor of impeachment, 10 against; 14 were required. (Saipan Tribune)
    (Saipan Tribune)
  Science and Technology:
  - Alpha Centauri Bb, an exoplanet, is discovered orbiting around Alpha Centauri,
    the nearest star system to our Solar System. (BBC)
  Sport:
  - The FA files a complaint with UEFA over allegations that midfielder Danny Rose
    was subjected to racial abuse during a U-21 Euro 2013 play-off qualifying match
    between Serbia and England. Rose was issued a red card for kicking the ball into
    the stands at the end of the match, setting off a brawl involving players and
    staff of both teams. The Serbian Football Association denies the allegations.
    (CNN) (BBC)
  Lance Armstrong-USADA doping scandal:
  - Lance Armstrong resigns as chairman of his anti-cancer charity, LIVESTRONG.
  - Athletic apparel conglomerate Nike and cycling equipment manufacturer Trek revoke
    their endorsement contracts with U.S. cyclist Lance Armstrong in the wake of growing
    allegations of doping. Both will continue to support LIVESTRONG. (Daily Mail)
  - Armstrong is also dropped by FRS Healthy Energy, 24 Hour Fitness, Giro and Radio
    Shack. (Daily Mail)
  - Anheuser-Busch states it will allow Armstrong's contract with them to expire at
    the end of the year. It will also continue to support LIVESTRONG. (BBC) (CNN)
