Date: '2012-10-16'
Source_URI: Portal:Current events/2012 October 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Senkaku Islands dispute: Seven People''s Liberation Army Navy warships are spotted
    by Japanese helicopters outside Japanese territorial waters near Yonaguni. (Japan
    Daily Press)'
  - Saudi Arabia’s official news agency reports that a hand grenade explosion at the
    King Abdulaziz military academy in Riyadh kills one cadet and injures nine. (AP
    via Boston Globe)
  - Several structures were set ablaze and as many as 24 militants were killed after
    suspected bombing Boko Haram attacks rocked the Nigerian city of Maiduguri. (BBC)
  - Two suspected al-Qaeda members and two government-aligned tribesmen are killed
    during an attack on a border checkpoint in Abyan, Yemen. (Reuters)
  - A United Nations expert panel reports that although the two governments deny it,
    Rwanda and Uganda continue to support the March 23 Movement. (Reuters)
  Arts and culture:
  - Hilary Mantel wins the 2012 Man Booker Prize for her novel Bring Up the Bodies,
    becoming the first British author to win the award twice, and the first female
    to do so. (BBC)
  Business and economy:
  - Foxconn, Apple's main supplier in China, admits it employs interns as young as
    14 years old. (BBC)
  - The CEO of Citigroup, Vikram Pandit, announces his resignation from that post,
    and is immediately succeeded by Michael Corbat. (Reuters)
  - Ford recalls 154,000 Fiestas due to an issue with airbag deployment. (AutoWeek)
  Human rights:
  - A report on St. Patrick's Institution in Dublin finds a culture of human rights
    abuse. (RTÉ)
  - The BBC appoints the heads of two separate inquiries into the sexual abuse scandal
    that has engulfed Jimmy Savile. Former High Court judge Dame Janet Smith will
    review the culture and practices of the BBC during the time Savile worked there,
    while Nick Pollard, a former Sky News executive will look at why a Newsnight investigation
    into Savile's activities was dropped shortly before transmission. (The Daily Telegraph)
  International relations:
  - The United Kingdom announces its intention to close its consulate in Basra, Iraq.
    (BBC)
  Law and crime:
  - The British computer hacker Gary McKinnon wins his ten-year legal battle to avoid
    extradition to the United States after Home Secretary Theresa May tells the House
    of Commons she has blocked the order. (BBC) (Sky News)
  - The captain of the Prestige oil tanker goes on trial in Spain. (BBC)
  - The Brazilian jurisprudence system upholds the convictions of two United States
    pilots for their roles in the 2006 Gol Transportes Aéreos Flight 1907 disaster.
    (Reuters)
  Disasters and accidents:
  - A 4.0-magnitude (originally, 4.6) earthquake strikes Hollis Center, Maine, roughly
    20 miles west of Portland, Maine, the state's largest city. At 3.1 miles deep,
    it is a shallow earthquake, felt in Maine, southwestern Connecticut, and eastern
    New York state. There were reports of very minor damage and cellular phone outages,
    but no serious property damage, injuries, or deaths. (NBC)
  Politics and elections:
  - The European Commissioner for Health and Consumer Policy, John Dalli of Malta,
    resigns amid corruption charges that he denies. (Times of Malta) (BBC)
  - In anticipation of upcoming elections, the Israeli Knesset has been unanimously
    dissolved. (Jerusalem Post)
  Religion and diplomacy:
  - The Vatican announces Pope Benedict XVI will send a delegation to Damascus to
    "express his brotherly solidarity with the entire population". (Al Jazeera)
  Sport:
  - In 2014 FIFA World Cup qualification – UEFA Group C, Germany, second in the FIFA
    World Rankings, take a 4-0 first half lead then concede four second half goals
    to gift Sweden a 4–4 draw in Berlin. (BBC) (GOAL)
  - In 2014 FIFA World Cup qualification – UEFA Group F, Northern Ireland secure a
    famous 1-1 draw against Portugal, third in the FIFA World Rankings, in Porto.
    (Herald) (Mail)
  - Senegal are disqualified from the 2013 Africa Cup of Nations after last Saturday's
    stadium riot in the game with Ivory Coast. (BBC)
