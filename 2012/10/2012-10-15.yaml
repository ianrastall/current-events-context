Date: '2012-10-15'
Source_URI: Portal:Current events/2012 October 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Syrian civil war: An Armenian plane destined for the Syrian city of Aleppo is
    searched by Turkish authorities after being grounded in the east of the country.
    (National Turk)'
  - Internationally celebrated teenage activist Malala Yousafzai is sent to the UK
    for further treatment after being shot in the head by a Taliban gunman. (Reuters)
  - Gunmen kidnap five aid workers and their driver in southeastern Niger. (AP via
    Google News)
  - The Philippine government and the largest rebel group, the Moro Islamic Liberation
    Front, sign a peace pact. (Al Jazeera)
  Arts and culture:
  - Lieutenant General Sir John Kiszely resigns as president of the Royal British
    Legion following claims of his involvement with defense contract lobbying. (BBC)
  Business and economics:
  - The Portuguese government announces details of its draft budget for 2013, as protests
    continue against austerity. (BBC)
  Disasters and accidents:
  - Seven people are treated in hospital for injuries after a bus carrying 56 college
    students crashes and overturns near the English coastal town of Poole. (BBC)
  International relations:
  - Burma says it will not allow the Organisation of Islamic Cooperation to set up
    a liaison office in the country, following protests against the plan. (Al Jazeera)
  - No winner is announced for the Mo Ibrahim Prize for Achievement in African Leadership.
    (Global Post)
  Politics and elections:
  - Former King of Cambodia Norodom Sihanouk dies in Beijing at the age of 89. (BBC)
    (AFP via Channel News Asia)
  - British Prime Minister David Cameron and Scottish First Minister Alex Salmond
    agree a deal setting out the terms of a referendum on Scottish independence at
    a meeting in Edinburgh. (BBC)
  - Ontario premier Dalton McGuinty announces his resignation. (Toronto Star)
  Transport:
  - Virgin Trains is asked to continue running the rail franchise for UK's West Coast
    Main Line following the cancellation of a deal to award the contract to another
    company when errors were made in the way in which the process was conducted. (BBC)
