Date: '2012-10-05'
Source_URI: Portal:Current events/2012 October 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Syrian city of Homs is subjected to a sustained bombing campaign, the worst
    it has seen in five months. (BBC)
  - Workers say a miner is killed by a police rubber bullet near Rustenburg. A National
    Union of Mineworkers branch leader of Lonmin is killed at his house in Marikana,
    South Africa. (Euronews) (Reuters)
  Business and economics:
  - Anglo Platinum Limited—the world's biggest platinum producer—fires 12,000 people
    in South Africa after a strike over working conditions. The corporation has stated
    that the strikes have cost it 39,000 ounces in output - equivalent to 700 million
    rand ($82.3 million; £51 million) in revenue. (BBC)
  Health and environment:
  - At least 47 people throughout the United States are infected with fungal meningitis
    from contaminated medicine, with five people dying. (CNN)
  Law and crime:
  - The British High Court rules that Islamist cleric Abu Hamza al-Masri and four
    other suspected terrorists can be immediately extradited to the United States
    to face trial on charges of terrorism. (BBC) (CNN)
  - A torture case related to the 1950s Mau Mau uprising is allowed to proceed in
    a British court. (BBC)
  - Los Angeles Police Department fails to obtain a search warrant when a federal
    judge in Texas blocks their attempt to obtain 1970's tapes of conversations between
    a Manson family member and his attorney. LA Police believe this evidence could
    help solve more than a dozen murders.(FoxNews)
