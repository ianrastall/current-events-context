Date: '2012-10-18'
Source_URI: Portal:Current events/2012 October 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Syrian civil war: Syrian military airstrikes kill at least 40 people, including
    civilians, in the rebel-held town of Maaret al-Numan in Idlib governorate. (The
    New York Times)'
  Arts and culture:
  - A fictional feature film, called South of Sanity, is shot in Antarctica for the
    first time. (BBC)
  - Dutch actress Sylvia Kristel—the first star of adult cinema—dies. (BBC)
  - Veteran Irish writer Gene Kerrigan wins the Golden Dagger. (The Guardian)
  Business and economy:
  - American weekly news magazine Newsweek announces it will cease print publication
    on December 31 and will move to an online-only format. (CNN)
  - Trading of Google stock on NASDAQ is temporarily suspended after it drops 9% following
    an inadvertent early release of its quarterly report showing a 20% decline in
    profits. (BBC) (Bloomberg)
  Politics and elections:
  - Tens of thousands of workers participate in anti-austerity protests in Greece.
    (Voice of America)
  - Argentina, Australia, Luxembourg, Rwanda, and South Korea are elected to the United
    Nations Security Council for two-year terms starting in 2013.
  Law and Crime:
  - The Boy Scouts of America release documents containing over 15,000 pages relating
    to allegations of sexual abuse by over 1200 scout leaders between 1965-1985.(New
    York Times)
