Date: '2012-10-14'
Source_URI: Portal:Current events/2012 October 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen open fire at a mosque in the village of Dogo Dawa in the Nigerian state
    of Kaduna, killing at least 20 people. (BBC)
  - Occupy activists chain themselves to the pulpit of St Paul's Cathedral in an action
    of solidarity with Pussy Riot, and read a declaration calling on cathedral authorities
    to stop neglecting their Christian duty - "In the fight for economic justice,
    Jesus threw the money changers out of the temple, but you invited them in and
    instead evicted us." (Sky News)
  - President of Mauritania Mohamed Ould Abdel Aziz, shot by troops yesterday, is
    flown to France. (BBC)
  Arts and culture:
  - A collection of manuscripts by Franz Kafka and Max Brod must be handed over to
    the National Library of Israel, says the judge in Tel Aviv, sanctioning the heirs
    of Esther Hoffe, Brod's secretary. (Times of Israel)
  Law and crime:
  - The UK's Ministry of Defence says that five Royal Marines have been charged with
    murder over an incident involving the death of an insurgent in Afghanistan in
    2011. (BBC)
  - The search for a missing 19-year-old from the University of New Hampshire (Durham,
    New Hampshire) is suspended after a ground and water search on and around Peirce
    Island off Portsmouth, New Hampshire had been going on. (NBCNews)
  Politics:
  - The UK's Ministry of Defence will hold an investigation after journalists from
    The Sunday Times posed as lobbyists for a defence manufacturer and approached
    several senior retired officers to ask if they would help them secure contracts.
    (BBC)
  - Former United States Senator Arlen Specter, who was vital in several United States
    Supreme Court nominations, dies at the age of 82, due to complications of non-Hodgkin's
    lymphoma. (AP via Yahoo! News)
  Science and technology:
  - Felix Baumgartner breaks the world human ascent by balloon record before space
    diving out of the Red Bull Stratos helium-filled balloon over Roswell, New Mexico.
    (CNN)
