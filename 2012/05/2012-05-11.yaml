Date: '2012-05-11'
Source_URI: Portal:Current events/2012 May 11
Intelligence_Payload:
  Armed conflict and attacks:
  - 'Syrian uprising: the death toll of the May 10 Damascus double bombing reaches
    55, with as many as 370 reportedly injured. Syrian authorities claim that over
    of explosives were used in the attacks. (Daily Mail)'
  - 'Mexican Drug War: Gunmen open fire on an El Mañana newspaper office in the border
    city of Nuevo Laredo, shortly after drug-related massacres in the city. (Washington
    Post)'
  - The United States Armed Forces are embroiled in controversy over a defunct officer
    training course called Perspectives on Islam and Islamic Radicalism, which taught
    that Islam is America's irreconcilable enemy. (AP via The Guardian) (BBC) (Wired)
    (San Francisco Gate) (Democracy Now)
  International relations:
  - An American study reveals that North Koreans have an increasing level of informal
    access to foreign media, despite the intense censorship efforts of the North Korean
    government. (BBC)
  - Security is tightened in Manila, the capital of the Philippines, ahead of anti-China
    protests amid an ongoing Sino-Philippine territorial dispute in the South China
    Sea. (Reuters)
  Law and crime:
  - A woman is arrested on suspicion of murder after five children die in a suspected
    arson fire in the English city of Derby. (BBC)
  - William Balfour is found guilty of murdering the mother, brother and nephew of
    American entertainer Jennifer Hudson. (ABC News America)
  - At the Leveson Inquiry into British media practices, former News International
    chief executive Rebekah Brooks discloses an email that appears to show that Britain's
    Culture Secretary, Jeremy Hunt, sought advice from News International over how
    Downing Street should respond to the News of the World phone hacking scandal.
    (The Guardian)
  Science:
  - Chinese scientists use quantum teleportation to transmit photons over a distance
    of – a world record for quantum teleportation. (PopSci)
  - A panel of American health experts recommends formal approval of the Truvada anti-HIV
    drug for prescription to non-infected men who have sex with multiple male partners,
    a decision opposed by some health workers and groups active among those with HIV.
    (BBC)
  - American researchers report that preventable infections are the leading cause
    of child mortality worldwide. Of the 7.6 million children who died before their
    fifth birthday in 2010, over 60% died of infections such as pneumonia. (BBC)
  Sport:
  - 'Thousands of fans attend a memorial service for the late San Diego Chargers linebacker
    Junior Seau at Qualcomm Stadium. Team president Dean Spanos announces that Seau''s
    #55 will be retired by the team. (ESPN)'
