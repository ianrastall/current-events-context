Date: '2012-05-14'
Source_URI: Portal:Current events/2012 May 14
Intelligence_Payload:
  Armed conflict and attacks:
  - 'Syrian uprising: At least 30 people die in a battle between Syrian government
    forces and rebel fighters in the town of Rastan. Reportedly, 23 of the dead are
    government soldiers. (Daily Telegraph)'
  Business and economy:
  - An Air India pilots' strike enters its seventh day, with the airline cancelling
    13 international flights. (NDTV) (BBC)
  Disasters:
  - An Agni Air flight carrying 21 people crashes while trying to land at Jomsom Airport
    in mountainous northern Nepal. 15 people are reported dead. ("The News") (Indian
    Express) (AP via Huffington Post)
  - A 6.2-magnitude earthquake strikes the Peruvian–Chilean border, causing power
    cuts but no serious immediate damage. No casualties have been reported. (AFP via
    Google)
  International relations:
  - The President of South Korea, Lee Myung-bak, commences the first official visit
    by a South Korean leader to Myanmar since 1983, when North Korean commandos attempted
    to assassinate the then-President, Chun Doo-hwan, in a bomb attack. (AP via Washington
    Post)
  - Over 1,500 Palestinian prisoners in Israeli prisons end their mass hunger strike
    after reaching an agreement with Israeli authorities in an Egyptian-mediated deal.
    (BBC)(The Jerusalem Post)
  News Corporation scandal:
  - Tony Blair's former Director of Communications, Alastair Campbell, tells the Leveson
    Inquiry that there was no "express deal" between Blair and News Corporation CEO
    Rupert Murdoch in the run-up to the 1997 UK general election. (BBC)
  - 'Entertainment manager Louis Walsh seeks access to documents which allegedly show
    that Murdoch''s tabloid The Sun paid €700 to a man who made, in a high profile
    case, what turned out to be a false sexual assault accusation against Walsh. The
    senior counsel for Walsh tells Ireland''s High Court: "The Sun directed the operation
    to take out Louis Walsh as a public person." (Irish Independent)'
  Politics and elections:
  - A fourth successive attempt by major Greek political parties to form a coalition
    government ends in failure. Another attempt is scheduled for May 15; if a coalition
    cannot be agreed, emergency elections must be held in June. (BBC)
  - American Republican politician Ron Paul states he will be ending his active presidential
    campaign bid. However, he will still try to secure delegates before the Republican
    National Convention in August. (CNN)
  Science:
  - Scientists at California's Stanford University invent a working bionic eye powered
    only by focused light. Though currently a prototype, the device could eventually
    restore the sight of millions of people suffering from eye diseases such as macular
    degeneration and retinal pigmentosa. (BBC)
  Sport:
  - Tens of thousands of people line the streets of Manchester in celebration of Manchester
    City's victory in the Premier League season finale – the team's first Premier
    League win since 1968. (BBC)
  - Queens Park Rangers player Joey Barton is charged by the Football Association
    in relation to his behaviour during yesterday's game at Manchester City, in which
    he assaulted several opposing players. (BBC)
  - Málaga CF player Ruud van Nistelrooy announces his retirement from professional
    football. (BBC)
