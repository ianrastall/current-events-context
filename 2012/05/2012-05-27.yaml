Date: '2012-05-27'
Source_URI: Portal:Current events/2012 May 27
Intelligence_Payload:
  Armed conflict and attacks:
  - 'War in Afghanistan: A NATO air strike kills a family of eight, including six
    children. (BBC) (Al Jazeera) (The News)'
  Arab Spring:
  - Six people are given up to 15 years in prison as the Bahraini regime continues
    its clampdown on protesters. (Al Jazeera)
  - 'Syrian uprising: The death toll from the Houla massacre is updated to 116. (Rueters)'
  - 'Syrian uprising: Opposition activists accuse the Syrian army of firing artillery
    into a neighborhood in Hama, killing at least 30. (Reuters)'
  - 'Syrian uprising: The United Nations Security Council unanimously condemns the
    Houla massacre. (The Guardian)'
  Arts and culture:
  - Michael Haneke scoops the Palme d'Or for Love at the 2012 Cannes Film Festival.
    (BBC)
  Disasters:
  - Tropical Storm Beryl makes landfall near the US city of Jacksonville with northern
    Florida and southern Georgia. (New York Times) (Florida Times Union)
  International relations:
  - IMF head Christine Lagarde is accused of "insulting the Greek people" following
    her latest controversial comments about the country. (BBC)
  Law and crime:
  - French police arrest the military leader of the Basque separatist group ETA Oroitz
    Gurruchaga Gogorza and his deputy Xabier Aramburu in the village of Cauna. (AFP
    via Google News)
  Politics and elections:
  - Taoiseach Enda Kenny makes a televised address on the European Fiscal Compact
    ahead of Thursday's referendum. (The Irish Times)
  - Thousands of people rally in Tbilisi calling for the ousting of President Mikheil
    Saakashvili's regime. (Al Jazeera)
  - The new season of the Parliament of Iran is opened. (Press TV)
  Sports:
  - Kolkata Knight Riders win the 2012 Indian Premier League Championship, defeating
    defending two-time champions Chennai Super Kings 192/5 to 190/3.
  - Mark Webber wins the 2012 Monaco Grand Prix, his second victory there in Formula
    1 racing. (BBC Sport)
  - Ryder Hesjedal wins the 2012 Giro d'Italia, becoming the first Canadian to win
    a Grand Tour in cycling. (CBC Sports)
  - Scottish driver Dario Franchitti wins the 2012 Indianapolis 500, making it his
    third victory in the event. (AP via Yahoo! Sports)
