Date: '2012-05-22'
Source_URI: Portal:Current events/2012 May 22
Intelligence_Payload:
  Business and economy:
  - Yahoo! sells its Alibaba Group stake for US$7.1 billion. (Reuters)
  - The Securities Division of the government of Massachusetts subpoenas financial
    services firm Morgan Stanley (MS), in connection with an MS analyst's talks with
    institutional investors prior to the Facebook initial public offering. (Reuters)
  Disasters:
  - At least 14 people die and 30 are injured after the Hampi Express collides with
    a goods train in the Indian state of Andhra Pradesh. (IBN Live) (AAP via News
    Limited)
  Law and crime:
  - A military court in Lebanon releases anti-Syrian government activist Shadi al-Moulawi
    after his arrest sparked violent clashes that killed eight people. (Al Jazeera)
  - The trial begins in Mauritius of two hotel workers accused of murdering Irish
    woman Michaela McAreavey while she honeymooned on the island in 2011. (RTÉ)
  Politics and elections:
  - The Burmese government appeals for "understanding" after rare protests in Mandalay
    and Yangon over power shortages. (BBC) (VOA)
  - Voters in the US states of Arkansas and Kentucky go to the polls, with Mitt Romney
    winning the Republican primaries, and President Barack Obama winning but performing
    relatively poorly against token opposition in the Democratic primaries. (ABC News)
  - British naval officer Commander Sarah West is appointed commander of the Royal
    Navy frigate , becoming the first female officer to take command of a major British
    warship. (The Scotsman)
  Science:
  - After months of delays, American company SpaceX successfully launches its unmanned
    Dragon spacecraft aboard a Falcon 9 rocket, beginning a test mission to the International
    Space Station (ISS). (BBC)
