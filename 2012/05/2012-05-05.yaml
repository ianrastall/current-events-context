Date: '2012-05-05'
Source_URI: Portal:Current events/2012 May 5
Intelligence_Payload:
  Armed conflict and attacks:
  - A U.S. drone attack kills at least nine insurgents in Pakistan's North Waziristan.
    (AP via The Guardian) (NineMSN)
  - Five prisoners of the United States at Guantanamo Bay, including Khalid Sheikh
    Mohammed (a reported subject of torture by U.S. authorities), appear before a
    military judge. (Al Jazeera)
  Arab Spring:
  - Bahrain Centre for Human Rights's president Nabeel Rajab is arrested by representatives
    of Bahrain's Interior Ministry on arrival at Manama airport from Lebanon ahead
    of his scheduled court appearance. (Al Jazeera)
  - Several people are killed or injured in a blast in Syria's second city of Aleppo.
    (BBC)
  - 300 people are arrested in Egypt following yesterday's violent clashes outside
    the Defense Ministry in Cairo. (Wall Street Journal)
  Business and economy:
  - Japan shuts down its last nuclear reactor, leaving the country without nuclear
    power for the first time since 1970. (Reuters)
  Disasters:
  - At least 14 people are killed at a fire at a drug rehabilitation centre in Lima.
    (BBC) (Al Jazeera)
  - At least 13 people are killed and dozens of others are declared missing as a result
    of a Nepal flash flood after a mountain river burst its banks. (BBC)
  - At least nine people are killed in a fire at a karaoke venue in Busan, South Korea.
    (Yonhap News)
  Law and crime:
  - The Cambodian government closes an investigation into the shooting of anti-logging
    activist Chhut Vuthy and a military policeman after the arrest of a security guard.
    (Straits Times)
  Science:
  - A supermoon is formed as the moon gets closest to the earth for the year. (Herald
    Sun)
  Sport:
  - In US horse racing, I'll Have Another wins the 2012 Kentucky Derby. (NBC Sports)
  - In English soccer, Chelsea defeat Liverpool in the 2012 FA Cup Final. (BBC)
  - In Spanish soccer, Lionel Messi scores all the goals, including a Spanish league-record
    50th goal, to take his season tally to an unprecedented 72 in the 4-0 defeat of
    rivals Espanyol. (AP via The Guardian)
