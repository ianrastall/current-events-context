Date: '2012-05-03'
Source_URI: Portal:Current events/2012 May 3
Intelligence_Payload:
  Armed conflict and attacks:
  - Thirty-four people are killed in raids by gunmen opposed to the burning of a colleague
    at a cattle market in northern Nigeria. (AP via Google News)
  - Seven people are killed and 30 injured in explosions near a police post in Makhachkala,
    Dagestan, southern Russia. (euronews)
  - Activists say four students are killed in an attack on anti-government demonstrations
    at Aleppo University, Syria. (Al Jazeera)
  - Farhan Jeemis Abdulle, a Somali journalist and well-known local reporter for Radio
    Daljir is shot and killed by an unidentified gunman in Galkayo while walking to
    his home district of Garsor. Puntland authorities arrived on scene to investigate
    the killing but no arrests have been made. Abdulle is the fifth journalist to
    be murdered in Somalia this year, and the second in Galkayo. (Shabelle Media Network)
  Arts and culture:
  - The 59th National Film Awards is held in New Delhi with Deool and Byari winning
    the Award for Best Feature Film. (CNN-IBN), (Deccan Herald)
  - A 70-year-old widow, who is a mother of three and grandmother of five, makes her
    solemn vows as a Poor Clare contemplative nun in the town of Canals in Spain.
    (Catholic News Agency)
  Disasters:
  - At least 15 are killed and 21 are injured when a bus plunges into a ravine in
    a mountainous region of northern Pakistan. (AFP via The Telegraph)
  Law and crime:
  - Four dismembered bodies, including two of journalists, are found in the Mexican
    state of Veracruz. (CNN)
  - The Argentine Chamber of Deputies approves the bill submitted by President Cristina
    Fernández de Kirchner to nationalize 51% of YPF by a 207-32 vote. (Reuters)
  International relations:
  - Chinese dissident Chen Guangcheng telephones the U.S. Congress for help in his
    attempts to leave China with his family. (BBC)
  - '2012 Malian coup d''état: The Economic Community of West African States pledges
    to send troops to Mali if the country agrees. (AFP via Google News)'
  - China, France, Russia, the United Kingdom and United States urge Iran to co-operate
    with the International Atomic Energy Agency. (AFP via Google News)
  Politics:
  - Bahrain's King Hamad bin Isa Al Khalifa grants new powers to parliament. (Al Jazeera)
  - Voters in the United Kingdom go to the polls for local elections with the opposition
    Labour Party expected to do well. (BBC)
  - Haiti's Chamber of Deputies appoints Laurent Lamothe as the new Prime Minister
    ending a two month standoff with President Michel Martelly. (AP via ABC News)
