Date: '2012-05-24'
Source_URI: Portal:Current events/2012 May 24
Intelligence_Payload:
  Armed conflict and attacks:
  - A United States drone attack kills ten people in the North Waziristan region of
    Pakistan. (Reuters)
  Arts and culture:
  - Elton John checks into Cedars-Sinai Medical Center in Los Angeles, California,
    due to a respiratory infection, according to the singer's publicist. (CNN)
  Business and economy:
  - Revised figures indicate the UK economy shrank by 0.3% in the first three months
    of 2012, more than initially thought. (BBC)
  Disasters:
  - The United States National Hurricane Center advises that Hurricane Bud has formed
    off the Pacific Ocean coast of Mexico and has reached category two strength. (AP
    via Washington Post) (AFP via Google News)
  Law and crime:
  - London's Metropolitan Police is to send a team of detectives to Libya to continue
    the investigation into the 1984 murder of PC Yvonne Fletcher. (BBC)
  - News Corporation lobbyist Fred Michel tells the Leveson Inquiry there was nothing
    inappropriate in his relationship with Adam Smith, a special adviser to UK Secretary
    of State for Culture, Media and Sport Jeremy Hunt. Smith later tells the hearing
    Hunt sent a memorandum to Prime Minister David Cameron in which he said he was
    in favour of News Corp's bid to take control of BSkyB before he was given a key
    role in the process. (BBC)
  - Four Russian citizens are arrested and accused of espionage in Diyala, Iraq. They
    are allegedly beaten while in Iraqi custody. (AFP)
  Politics and elections:
  - Voters in Egypt go to the polls for a second day to vote in a presidential election.
    (BBC)
  Sport:
  - Football goal-line technology will be tested at Wembley Stadium when England play
    Belgium in a friendly on 2 June. (BBC Sport)
