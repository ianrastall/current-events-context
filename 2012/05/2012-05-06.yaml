Date: '2012-05-06'
Source_URI: Portal:Current events/2012 May 6
Intelligence_Payload:
  Disasters:
  - Off the coast in the north of Peru hundreds of dolphins and more than 1,000 birds,
    mostly pelicans, die under unexplained circumstances. (BBC)(New York Times)
  Law and crime:
  - The Government of Egypt extends a curfew around its Defence Ministry in Cairo
    to deter attacks for a third night. (Egyptian Independent)
  Politics and elections:
  - Voters in France go to the polls for the second round of the French presidential
    election, with François Hollande elected President. (ABC News Australia) (BBC)
  - Voters in Greece go to the polls for a parliamentary election with parties opposed
    to austerity measures winning 60 per cent of the vote and the two main parties
    in favour of austerity suffering withering defeats. (Al Jazeera) (Bloomberg) (AFP
    via Sydney Morning Herald)
  - Voters in Armenia go to the polls for a parliamentary election with exit polls
    showing the ruling Republican Party doing well. (Reuters) (BBC)
  - Voters in Serbia go to the polls for a presidential and parliamentary election.
    (AP via ABC News America)
  - Voters in Schleswig-Holstein go to the polls for a state election with the governing
    coalition of CDU and FDP losing their majority, paving the way for a coalition
    between SPD, The Greens and the Danish minority's SSW. (BBC)
  Sport:
  - In Italian football, Juventus wins the Serie A title for the 28th time. (AFP via
    Google)
