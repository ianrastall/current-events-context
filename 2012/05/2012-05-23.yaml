Date: '2012-05-23'
Source_URI: Portal:Current events/2012 May 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - A drone attack conducted by the United States kills five people in a tribal area
    of North Waziristan, Pakistan. (Xinhua)
  - The Iranian navy assists an American cargo ship that was attacked by pirates off
    the United Arab Emirates. (San Francisco Chronicle)
  Arts and culture:
  - Georgia-native Phillip Phillips is crowned the eleventh American Idol. Runner-up
    Jessica Sanchez is the first contestant of Asian ancestry to advance in the finals.
    (TopNews)
  - 'Adam Lambert became the first openly gay artist to debuted at #1 on the Billboard
    200 Album Charts, with his album Trespassing. (Starpulse)'
  Business and economy:
  - The price of crude oil falls to a seven-month low due to high supply and constructive
    talks regarding Iran's nuclear program. (CNN)
  - Hewlett-Packard plans to cut 27,000 jobs or 8% of their workforce. (CNN)
  Law and crime:
  - Shakil Afridi, a Pakistani physician who helped the CIA to track down Osama bin
    Laden by collecting DNA samples from residents of bin Laden's compound, is sentenced
    to 33 years' imprisonment for treason. (CNN)
  Politics and elections:
  - Voters in Egypt go to the polls for a presidential election, 15 months after former
    president Hosni Mubarak was ousted in a revolution. (BBC)
