Date: '2012-05-25'
Source_URI: Portal:Current events/2012 May 25
Intelligence_Payload:
  Armed conflict and attacks:
  - A car bomb exploded in the Mexican border city of Nuevo Laredo, injuring 10 police
    officers during the Mexican Drug War. The attack was believed to have been carried
    out by Los Zetas, one of Mexico's most powerful drug trafficking organizations.
    (CNN)
  - Dozens of women and children are killed in a massacre by the Syrian army in the
    town of Houla, Homs province, Syria during the ongoing Syrian uprising. (AFP)
  International relations:
  - The President of France, François Hollande, makes a surprise visit to Afghanistan
    to visit French troops. (AFP via France 24)
  Law and crime:
  - As the Leveson Inquiry releases emails exchanged between UK Secretary of State
    for Culture, Media and Sport Jeremy Hunt and News Corporation lobbyist Fred Michel,
    Prime Minister David Cameron says he does not regret his decision to let Hunt
    rule on News Corp's bid for BSkyB. (BBC)
  Politics and elections:
  - Police blockade the Parliament of Papua New Guinea in Port Moresby the day after
    the government led by Prime Minister of Papua New Guinea Peter O'Neill lays sedition
    charges against the Chief Justice of the Supreme Court of Papua New Guinea, Sir
    Salamo Injia. (AP via The Washington Post)
  - First Minister of Scotland Alex Salmond launches the "Yes" campaign for Scottish
    independence at Cineworld in Edinburgh. (BBC)
  Science:
  - A SpaceX Dragon becomes the first commercial spacecraft ever to dock with the
    International Space Station, completing docking at 12:02 pm EDT (16:02 UTC). (CNN)
