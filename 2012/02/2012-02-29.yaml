Date: '2012-02-29'
Source_URI: Portal:Current events/2012 February 29
Intelligence_Payload:
  Armed conflict and attacks:
  - Violence in the Xinjiang region of China leaves 20 people dead. (The Hindu)
  Syria:
  - A United Nations official claims that Syrian government activities have caused
    "well over 7,500 deaths" in the Syrian uprising. (CNN)
  - The Syrian Army launches a ground offensive in Homs, as water and food supplies
    run out for local residents. (Reuters) (USA Today)
  Arts and culture:
  - Davy Jones of The Monkees dies in Florida of a heart attack. (Entertainment Weekly)
  Business and economy:
  - James Murdoch resigns from News International to focus on running News Limited's
    television business with the News International phone hacking scandal as a factor
    in the decision. (The Telegraph) (Sydney Morning Herald)
  Disasters:
  - Tornadoes hit the midwestern United States with twelve people killed, six in Harrisburg,
    Illinois. (AP via Google News) (BBC)
  International relations:
  - North Korea agrees to suspend uranium enrichment and nuclear and long-range missile
    tests in return for food aid. (BBC) (Al Jazeera)
  - Egypt lifts a travel ban on seven Americans employed by pro-democracy U.S. groups,
    including the son of U.S. Transportation secretary Ray LaHood, who is among 16
    Americans on trial in Egypt for trying to foment unrest and incite protests against
    the nation's military rulers. (USA Today)
  - In the British parliament Baroness Jenny Tonge resigns the Liberal Democrat party
    whip after accusations of making offensive remarks about Israel. (The Guardian)
  Politics:
  - The President of Venezuela Hugo Chávez is recovering from the removal of a tumour
    from his pelvis in a Cuban hospital. (The Guardian)
  - Egypt announces that a presidential election will held on May 23-24. (AP via Business
    Day)
  - Mitt Romney wins the Republican caucuses held in the US state of Wyoming. (CNN)
  Sport:
  - In soccer, Gold Coast United is axed from the Australian A-league following a
    dispute between owner Clive Palmer and the Football Federation Australia. (The
    Australian)
