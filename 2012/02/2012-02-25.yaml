Date: '2012-02-25'
Source_URI: Portal:Current events/2012 February 25
Intelligence_Payload:
  Armed conflict and attacks:
  - Bahrain's Opposition Al-Wefaq group claims that a woman has died from tear gas
    inhalation. (AFP via Google News)
  2012 Afghanistan Quran burning protests:
  - Two U.S. officers are killed inside the Ministry of Interior in the Afghan capital
    Kabul. (BBC)
  - Four people are killed in protests in Kunduz. (CNN)
  Syria:
  - Over 100 civilians are killed by the Syrian army, primarily in the artillery shelling
    of the cities of Homs and Hama. (Al Arabiya)
  Yemen:
  - An Al Qaeda suicide bombing claims at least 26 people in the city of Mukalla.
    (Reuters)
  - Abd-Rabbu Mansour Hadi is sworn in as the new President of Yemen. (Reuters)
  Arts and culture:
  - Treasure from the Spanish Navy frigate Nuestra Señora de las Mercedes returns
    to Spain after being recovered by Odyssey Marine Exploration in 2007. (Reuters)
  - The Artist wins four awards including best film at the Independent Spirit Awards
    2011 held in Santa Monica. (Associated Press)
  Business and economy:
  - A G-20 finance ministers meeting is held in Mexico City to discuss progress in
    the Eurozone bailout. (Reuters)
  Disasters:
  - The Australian town of Gympie, Queensland is threatened by the flooded Mary River
    following heavy rain overnight of up to 300 mm. (News Limited)
  - A fire forces the evacuation of the Comandante Ferraz Brazilian Antarctic Base
    with two people dying. (AFP via Google) (BBC)
  Law and crime:
  - A bribery case against former Prime Minister of Italy Silvio Berlusconi is dismissed
    due to the statute of limitations having expired. (The Telegraph)
  Politics:
  - Pakistani authorities start demolition of Osama bin Laden's former compound in
    Abbottabad. (AP via Google)
  - A thousand people hold a protest in Tel Aviv over Israel's proposed plan to deport
    hundreds of migrant workers. (Jerusalem Post)
  - Liberal Party of Canada leader Bob Rae states that recent evidence of voter suppressing
    "robo-calls" played a factor in his party's defeat in the 2011 Canadian federal
    election. (The Gazette)
  Science:
  - The World Health Organisation removes India from the list of polio endemic countries
    with only Pakistan, Afghanistan and Nigeria remaining. (AFP via Google News)
