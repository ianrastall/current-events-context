Date: '2012-02-20'
Source_URI: Portal:Current events/2012 February 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - South Korea proceeds with live-fire drills near the disputed Korean sea border
    despite threats from North Korea of "merciless" strikes in retaliation. (AP via
    News Limited)
  - At least 30 people are dead in the Nigerian city of Maiduguri following an attack
    on the markets by suspected Islamist militants. (AFP via Yahoo News)
  - Justice and Equality Movement rebels in Darfur release 49 UNAMID peacekeepers
    but retain three other people they accuse of being Sudanese security agents. (BBC)
  Business and economy:
  - Samsung Electronics announces plans to spin off its LCD business. (Reuters)
  - The Thai economy shrinks by 7 percent (%) during the last quarter as a result
    of the floods.
  - Japan's balance of trade deficit reaches a record high due to the strong value
    of the Japanese yen and higher fuel costs following the Fukushima Daiichi nuclear
    disaster. (BBC)
  - The price of oil reaches an eight month high following Iran banning sales to Britain
    and France on Sunday. (BBC)
  Disasters:
  - Narendra Modi, the Chief Minister of the Indian state of Gujarat, orders an inquiry
    into the death of six people at a stampede at the Bhavnath Hindu temple in the
    Junagadh district over the weekend. (NDTV)
  International relations:
  - International Atomic Energy Agency nuclear inspectors arrive in Tehran to hold
    discussions about Iran's nuclear program. (Deutsche Welle)
  Politics and elections:
  - The ruling Workers Party in North Korea calls a conference in mid-April to consolidate
    the transfer of leadership to Kim Jong-un from his father Kim Jong-Il. (Reuters
    via Malaysia Star)
  - In the Netherlands, Job Cohen, the leader of the Labour Party, resigns his position
    after increasing criticism of his performance. (NOS)
  - In the United Kingdom, Home Secretary Theresa May announces plans to split the
    UK Border Agency into two separate organisations after revelations that hundreds
    of thousands of people were let into the country without appropriate checks. (BBC)
  Science:
  - Scientists report regenerating specimens of Silene stenophylla from a 31,800 year
    old piece of fruit, greatly surpassing the previous record for oldest plant successfully
    regenerated. (NY Times)
  Sport:
  - In football, the start of the Peruvian Primera División is disrupted due to a
    players strike due to outstanding payments. (Reuters via Eurosport)
