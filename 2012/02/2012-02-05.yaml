Date: '2012-02-05'
Source_URI: Portal:Current events/2012 February 5
Intelligence_Payload:
  Armed conflict and attacks:
  - An explosion hits the gas pipeline between Egypt, Israel and Jordan in the North
    Sinai Governorate west of Arish. (AP via MSNBC)
  - At least three people die and nine are injured by an explosion in the Afghan city
    of Kandahar. (BBC)
  - The Movement for the Emancipation of the Niger Delta claims responsibility for
    attacking an Eni SpA pipeline carrying oil to the Nigerian city of Brass. (Bloomberg)
  Disasters:
  - Due to flooding, residents are asked to evacuate the Australian town of St George,
    Queensland, and the body is found of a woman missing in Roma. (ABC News Australia)
  Early 2012 European cold wave:
  - Heavy snow falls across much of the United Kingdom, leading to the cancellation
    of hundreds of flights at Heathrow Airport and the closure of the runway at Luton
    Airport. (BBC)
  - More than 250 people have died of the cold weather in Europe, with Russia forced
    to reduce supplies of natural gas. (Al-Jazeera)
  - Bosnia declares a state of emergency as a result of the cold snap. (Al-Jazeera)
  Law and crime:
  - A Libyan starts court proceedings against 41 people accused of helping Muammar
    Gaddafi to attempt to suppress the opposition in the Libyan Civil War. (Reuters)
  Politics and elections:
  - Bahraini opposition parties launch a week-long sit in for political reform. (Reuters)
  - Voters in Finland go to the polls for the second round of the Finnish Presidential
    election with conservative candidate Sauli Niinisto winning in a landslide. (AP
    via Google News)
  - Sheikh Jaber Al-Mubarak Al-Hamad Al-Sabah resigns as the Prime Minister of Kuwait
    following a strong performance by the Opposition in a recent parliamentary election.
    (AP via the Washington Examiner)
  - The Nigerian People's Democratic Party wins the governorship in Adamawa State.
    (Reuters)
  - The ruling Mexican National Action Party (PAN) endorses Josefina Vázquez Mota
    as its candidate for the Presidential election, the first time that a major Mexican
    party has endorsed a woman to run for President of Mexico. (AP via Star Tribune)
  Sport:
  - In darts, England win the 2012 PDC World Cup of Darts defeating Australia 4-3
    in the final. (Fox Sports)
  Super Bowl XLVI:
  - In American football, Super Bowl XLVI is played in Indianapolis with the New York
    Giants defeating the New England Patriots 21-17. (SA Sunday Mail) (NBC Sports)
  - Quarterback Eli Manning of the Giants wins his second Super Bowl Most Valuable
    Player Award. (AP via Wall Street Journal)
