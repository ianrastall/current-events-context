Date: '2012-06-04'
Source_URI: Portal:Current events/2012 June 4
Intelligence_Payload:
  Armed conflict and attacks:
  - 'Mexican Drug War: gunmen kill 11 people at a rehabilitation clinic in the city
    of Torreón, Coahuila. (Reuters)'
  - A US drone attack kills at least 15 suspected militants in Pakistan's North Waziristan
    region. High ranked al-Qaeda official Abu Yahya al-Libi is killed in the attack.
    (AFP via NineMSN) (The Guardian)
  - A car bomb explodes near Iraqi government offices in central Baghdad, killing
    at least 26 and injuring 190. Eight others are killed in additional attacks across
    the country. (AP via The Brisbane Times) (Antiwar)
  - Buddhist vigilantes attack a bus in western Myanmar, killing nine Muslim passengers.
    (Reuters)
  Aftermath of the Libyan civil war:
  - A heavily armed militia takes over a runway at the Tripoli International Airport,
    demanding the release of their leader who went missing. (BBC)
  - A Libyan military court sentences a group of Russian, Belarussian and Ukrainian
    men to long prison terms, having found them guilty of serving as mercenaries for
    Muammar Gaddafi in the Libyan Civil War. A Russian who was deemed the group's
    leader was sentenced to life imprisonment, and the rest were sentenced to 10 years
    in prison with hard labor. (Reuters)
  Arts and culture:
  - Russian baritone singer Eduard Khil, made famous overseas by the "Trololo" internet
    meme, dies from complications of a stroke in St. Petersburg. (Los Angeles Times)
  Diamond Jubilee of Elizabeth II:
  - Prince Philip, Duke of Edinburgh, is taken to hospital with a bladder infection.
    (BBC)
  - The Queen's Diamond Jubilee Concert, a pop concert featuring artists such as Robbie
    Williams, Stevie Wonder and Sir Paul McCartney, takes place at Buckingham Palace.
    (BBC)
  Business and economy:
  - Japan's S&P/TOPIX 150 reaches its lowest level since 1983 as global stock markets
    continue to fall. (Wall Street Journal)
  Disasters:
  - At least 23 people are killed and 60 injured after a bus carrying a wedding party
    crashes near the Pakistani capital Islamabad. (AFP via Perth Now)
  Law and crime:
  - Luka Magnotta, a suspect in a murder case in Canada, is arrested in an Internet
    cafe in Berlin. (Daily Mail) (BBC)
  Politics:
  - The Parliament of Albania fails without a vote in the second round to elect the
    President of the Republic of Albania. (Ansa)
  - The Prime Minister of Japan Yoshihiko Noda announces a Cabinet reshuffle following
    a split in the ruling Democratic Party of Japan. (Bloomberg) (Washington Post)
  - Indian cricketer Sachin Tendulkar is sworn in as a member of Parliament's upper
    house the Rajya Sabha. (AFP via The Australian)
  - China blocks Internet access to terms related to the Tiananmen Square protests
    of 1989 on the 23rd anniversary of the protests. (Reuters)
