Date: '2012-06-10'
Source_URI: Portal:Current events/2012 June 10
Intelligence_Payload:
  Armed conflict and attacks:
  - Syrian activists claim that at least 35 people have died in a Syrian Army offensive
    in Homs over the past day. (Reuters)
  - A state of emergency is declared in western Burma after clashes between Buddhists
    and Muslims. (BBC)
  Arts and culture:
  - The 66th Tony Awards for American theatre are held at the Beacon Theatre in New
    York City with Clybourne Park winning the Tony Award for Best Play and Once winning
    the Tony Award for Best Musical. (New York Times)
  Business and economy:
  - Data released on the website of the General Administration of Customs in the People's
    Republic of China indicates that China is significantly increasing its importation
    of crude oil to a record high, and some refineries have increased their processing
    rate. (Business Week)
  Disasters:
  - Kenyan Cabinet Minister George Saitoti and five other people are killed in a helicopter
    crash in the Ngong Hills near Nairobi. (Capital FM Kenya)
  - A 6.0 magnitude earthquake strikes near the Aegean Sea resort of Ölüdeniz in southern
    Turkey, resulting in dozens of injuries especially in the city of Fethiye. (AFP
    via News Limited)
  - Flash floods in West Yorkshire, England, close the M1 motorway. (BBC)
  - Heavy rainfall damages roadways and bridges the Southeastern United States, with
    20 inches falling in Escambia County, Florida. (CNN)
  International relations:
  - Over documents delivered to Saif al-Islam, detained son of slain leader Muammar
    Gaddafi, Libya arrests an Australian lawyer from the International Criminal Court
    (ICC) for trying "to deliver documents to the accused, documents that have nothing
    to do with his case and that represent a danger to the security of Libya". (Al
    Jazeera)
  Law and crime:
  - Three people are shot to death and three are wounded during a party held at an
    apartment complex near the campus of Auburn University in Auburn, Alabama, U.S.
    (CNN)
  Politics:
  - Venezuelan president Hugo Chávez claims his latest tests since his cancer treatment
    claim to deliver "absolutely fine" results. (Al Jazeera)
  - Local elections take place in Romania. The ruling Social Liberal Union wins by
    a landslide. (Reuters)
  - Voters in France go to the polls for the first round of parliamentary elections
    with the Socialist Party doing well. (AP via Google News), (Reuters)
  Sport:
  - Usain Bolt is unhurt following a car accident in Jamaica. (BBC)
  - In golf, Shanshan Feng becomes the first Chinese player to win a major after winning
    the 2012 LPGA Championship. (BBC)
  UEFA Euro 2012:
  - Nikica Jelavić's controversial offside goal helps Croatia to a victory over the
    Irish at the Stadion Miejski in Poznań. (GOAL) (The Guardian) (RTÉ)
  - Spain and Italy draw in the early game at the Stadion Miejski in Wrocław. (Al
    Jazeera) (BBC)
  - Germany hit by a UEFA disciplinary after firing missiles onto the pitch in their
    game yesterday. (BBC)
