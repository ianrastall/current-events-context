Date: '2012-06-19'
Source_URI: Portal:Current events/2012 June 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Palestinian militants fire a barrage of rockets into southern Israel following
    an Israel Air Force strike that killed two Islamic Jihad gunmen; IAF strikes at
    militant targets in Gaza have killed six Palestinians since yesterday. (Al Jazeera)
    (The Jerusalem Post) (Ynet News)
  - Striking miners and riot police clash in northern Spain as Mariano Rajoy's austerity
    drive causes escalating violence. (BBC)
  - Palestinian footballer Mahmoud Sarsak, on hunger strike over his detention without
    charge for three years in an Israeli jail, agrees to resume eating if released
    from captivity. (BBC)
  - At least seven people and 15 members of the Turkish Army are killed in a Kurdistan
    Workers' Party ambush in the Yüksekova district near the border with Iraq and
    Iran. (BBC)
  Arab Spring:
  - 'post-Mubarak Egypt: Tens of thousands of people converge on Cairo''s Tahrir Square
    to demonstrate against Egypt''s military rulers, who have seized power following
    the ousting from power of Hosni Mubarak in last year''s revolution. (Al Jazeera)
    (BBC)'
  - 'post-Mubarak Egypt: Hosni Mubarak suffers a stroke in prison and is reportedly
    "clinically dead", though several Egyptian officials refute the announcement made
    by the state agency. (The Daily Telegraph) (CNN) (Al Jazeera) (BBC)'
  - 'Syrian uprising: A ship carrying military helicopters and missiles from Russia
    to Syria is halted and turned back off the coast of Scotland after its insurance
    coverage is cancelled. (MSNBC) (The Daily Telegraph)'
  Business and economics:
  - Ryanair tries to buy Aer Lingus. (BBC)
  International relations:
  - A United Nations investigator calls on the United States to justify its increasing
    use of drones against al-Qaeda and Taliban targets. (Reuters)
  - Wikileaks editor-in-chief Julian Assange takes refuge in Ecuador's embassy in
    London to avoid extradition to Sweden on charges of sexual misconduct. (Al Jazeera)
    (USA Today)
  - '2012 G-20 Mexico summit: UK prime minister David Cameron confronts Argentine
    president Cristina Fernández de Kirchner over a letter she sent to him regarding
    the Falkland Islands. (BBC)'
  Law and crime:
  - The Supreme Court of Pakistan disqualifies prime minister Yousaf Raza Gillani
    from holding office after Gillani was found guilty in a contempt-of-court case
    on April 26. (BBC) (Al Jazeera)
  - A Saudi man is beheaded on charges of sorcery and witchcraft in Najran Province
    of Saudi Arabia. (BBC)
  Politics and elections:
  - Antonis Samaras, leader of the New Democracy party in Greece, continues to negotiate
    with political rivals to form a coalition government, as Greece struggles to overcome
    its economic crisis. (The New York Times)
  UEFA Euro 2012:
  - The debate surrounding goal-line technology resurfaces as co-hosts Ukraine are
    denied an apparent goal in controversial circumstances against England, with John
    Terry hooking the ball from behind the goal line after a shot by Marko Dević under
    the eyes of the fifth official beside the goal. Wayne Rooney's header in the second
    half carries England through at the Donbass Arena in Donetsk. (The Daily Telegraph)
    (Bleacher Report) (Reuters via Yahoo!) (The Washington Post) (Daily Mail)
  - Andriy Shevchenko announces his intention to retire from the national side after
    that defeat. (Yahoo!)
  - Sweden sweep aside France with ease at the Olympic Stadium in Kiev, with goals
    from Zlatan Ibrahimović and Sebastian Larsson subjecting the French to their first
    defeat in 24 games. (Sky Sports)
