Date: '2012-06-17'
Source_URI: Portal:Current events/2012 June 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - Multiple bombings kill at least 12 people in the northern Nigerian state of Kaduna.
    (BBC) (Al Jazeera)
  - Google reveals it has removed so-called 'terrorism videos' from the web at the
    request of governments, as well as blocking more than 100 YouTube videos which
    allegedly insult the Thai monarchy. (BBC)
  Disasters:
  - A fire breaks out in a prison in the southeast Turkish province of Şanlıurfa,
    killing 13 prisoners. (BBC)
  Law and crime:
  - Rodney King, whose videotaped beating by Los Angeles police officers in March
    1991 later led to riots in April 1992, is found dead at the bottom of a swimming
    pool in Rialto, California. (BBC) (CNN) (Al Jazeera)
  - Two Palestinians who attempt to rob an Israeli truck driver are shot dead in self
    defense near Hebron in the West Bank. (BBC) (Ynet)
  Politics and elections:
  - Voters in Greece go to the polls for a second legislative election after the first
    election on May 6 failed to form a coalition government. (Al Jazeera) (BBC) (CNN)
  - Voters in Egypt go to the polls for a second day to vote in the second round of
    a presidential election, with former prime minister Ahmed Shafik and Mohamed Morsi
    of the Muslim Brotherhood's Freedom and Justice Party both competing for the presidency.
    (BBC)
  - Voters in France go to the polls for legislative election with the Socialist Party
    winning a majority. (AP via Idaho Press-Tribune)
  Sport:
  - UEFA opens disciplinary proceedings against The Football Association after England
    fans attempted to invade the pitch during their game with Sweden in Kiev. (BBC)
    (UEFA)
  - In tennis, David Nalbandian is disqualified from the final of the 2012 AEGON Championships
    after kicking an advertising board into the left shin of a line judge, seriously
    injuring him; his opponent, Marin Čilić, who was trailing Nalbandian at the time,
    is awarded the title and Nalbandian stands to lose the prize money he would have
    received for finishing as runner-up. (BBC) (Sky Sports)
  - In golf, American Webb Simpson wins the U.S. Open. (NBC Sports)
