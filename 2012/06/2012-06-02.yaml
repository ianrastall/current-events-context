Date: '2012-06-02'
Source_URI: Portal:Current events/2012 June 2
Intelligence_Payload:
  Syrian uprising (2011–present):
  - Clashes between supporters and opponents of Syrian president Bashar al-Assad kill
    at least 12 and injure more than 40 people in the Lebanese port city of Tripoli.
    (Reuters)
  War in North-West Pakistan:
  - A drone attack conducted by the United States kills two suspected militants outside
    their hideout in South Waziristan in northwestern Pakistan. (AP via Google News)
  War in Afghanistan (2001–2021):
  - Four aid workers kidnapped by Taliban insurgents in the northern Afghan province
    of Badakhshan on May 22 are rescued by ISAF forces. (CNN) (ISAF)
  Disasters:
  - An Allied Air cargo plane crashes into a minibus after overshooting the runway
    at Accra's Kotoka International Airport in Ghana killing at least twelve people.
    (The Daily Telegraph)
  Law and crime:
  - A court in Cairo, Egypt, finds former president Hosni Mubarak and former interior
    minister Habib al-Adly guilty for complicity in the killings of demonstrators
    in the 2011 revolution that ousted Mubarak and both are sentenced to life in prison.
    Mubarak and his two sons, Gamal and Alaa, are all acquitted on separate corruption
    charges. (BBC)
  - A shooting in the food court of the Eaton Centre mall in Toronto, Canada kills
    at least one man and injures seven other people. (BBC) (The Canadian Press via
    Canada.com)
  Sports:
  - In horseracing, Camelot trained by Aidan O'Brien, wins the Epsom Derby with 2,000
    Guineas Stakes classes double. Also, with his son Joseph, become the first father
    son to win The Derby. (BBC)
