Date: '2012-06-09'
Source_URI: Portal:Current events/2012 June 9
Intelligence_Payload:
  Armed conflict and attacks:
  - Four members of the NATO-led International Security Assistance Force are killed
    in Afghanistan's Kapisa province. (Reuters via Jerusalem Post)
  - At least 20 people are killed and over three hundred houses are burned down during
    riots in western Burma. (The Nation)
  Arab Spring:
  - 'Syrian uprising: The Syrian Observatory for Human Rights claims that shelling
    in the town of Deraa has claimed the lives of 17 people overnight. (Reuters Alertnet)'
  - 'Syrian uprising: It is reported that heavy bombing on Homs has been taking place
    since this morning. Young activists of the Sham News Network also report violent
    clashes in various neighbourhoods of Damascus between loyal forces and rebels
    of the Free Syrian Army (AGI)'
  - 'Syrian uprising: Syrian blogger Razan Ghazzawi is awarded the Front Line human
    rights prize. (The Irish Times)'
  - Yemeni army reports that seventeen militants and at least two government soldiers
    have died in clashes in south Yemen.(BBC Middle East)
  Business and economy:
  - Spain's economy and finance minister Luis de Guindos confirms the receipt of up
    to 100 billion euros ($125 billion) in loans to help shore up its struggling banks,
    with the exact amount to be determined by the end of the month. (BBC) (Al Jazeera)
  Disasters:
  - Search crews locate the wreckage of a missing Sikorsky H-34 helicopter near Mt.
    Mamarosa in southern Peru, with all 14 on board confirmed dead. (BBC) (Aviation
    Safety) (Al Jazeera)
  - 400 people are trapped by landslides in the Indian state of Jammu and Kashmir.
    (IBN live)
  - Over 12 inches of rain fail on Pensacola, Florida and adjacent areas, leading
    to widespread flooding. (Weather Channel)
  - More than 150 people are helped to safety by emergency services after heavy overnight
    rain caused flooding in Wales. (BBC)
  Politics and elections:
  - Protesters and riot police clash for the third night in a row in Montreal near
    the Grand Prix events on the corner of Sainte-Catherine and Crescent. (CBC) (Radio-Canada)
  Sport:
  - Maria Sharapova defeats Sara Errani in the 2012 French Open Women's Singles final,
    returning to the World No. 1 ranking, ending a four-year major title drought and
    completing a career Grand Slam. Sharapova had been as low as World No. 126 during
    the drought, having suffered a serious shoulder injury in 2008. (ESPN)
  - In NBA basketball, Miami Heat defeat the Boston Celtics to win their 3rd Eastern
    Conference title and proceed to the 2012 NBA Finals, where they will face Oklahoma
    City Thunder. (New York Daily News)
  - The Norfolk Admirals defeat the Toronto Marlies in a sweep to clinch their first
    ever AHL championship. (NBC Sports)
  UEFA Euro 2012:
  - Michael Krohn-Dehli's first-half strike earns the Danes a shock win against the
    Dutch at the Metalist Stadium in Kharkiv. (BBC)
  - Moments before he was due to be substituted, Mario Gómez's second-half header
    earns Germany a winning start against Portugal at the Arena Lviv in Lviv. (BBC)
    (Al Jazeera)
  - UEFA begins disciplinary proceedings against the Football Union of Russia for
    "improper conduct of supporters" during Friday's game against the Czech Republic
    at the Stadion Miejski in Wrocław. (BBC)
