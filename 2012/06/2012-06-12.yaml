Date: '2012-06-12'
Source_URI: Portal:Current events/2012 June 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Russian and Polish football fans clash in Warsaw ahead of their UEFA Euro 2012
    match. (BBC) (Al Jazeera)
  - 'Mexican Drug War: 14 corpses are found in an abandoned truck in the Mexican state
    of Veracruz. (Washington Post)'
  - Unrest continues in Burma as more buildings are burned. (BBC)
  Arab Spring:
  - 'Bahraini uprising: The 11-year-old child imprisoned by the regime speaks of being
    chased down while playing in the street. (Al Jazeera)'
  - In the wake of serious rioting, Tunisia declares an overnight curfew for eight
    regions, including the capital Tunis. (BBC)
  Business and economics:
  - The first female Nobel Prize laureate in Economics, Elinor Ostrom, dies at the
    age of 78. (Wall Street Journal)
  - Tokyo passes Luanda as the world's most expensive city to live in, according to
    new research. (BBC)
  Disasters:
  - Heavy rain causes flash floods in Taiwan and the death of four people in landslides
    leading to the evacuation of 3,000 people. (AP via ABC News America)
  - Six flood warnings and 42 flood alerts remain in place in London and South East
    England. (ITV)
  International relations:
  - Israeli lawmakers dedicate a session of parliament to possible commemorations
    of the Armenian genocide, now that relations with Turkey have deteriorated since
    Israel killed nine Turks in international waters of the Mediterranean Sea in 2010.
    (Los Angeles Times)
  Law and crime:
  - The NME issues a public apology to English singer and lyricist Steven Patrick
    Morrissey over an article it published in 2007, which falsely suggested he was
    racist and led to a libel case. (BBC)
  - John Major, who was British Prime Minister between 1990 and 1997, tells the Leveson
    Inquiry that Rupert Murdoch warned him before the 1997 general election to switch
    policy on Europe or his newspapers would not support him. The Conservative Party
    subsequently lost power to Labour, with Murdoch's The Sun tabloid daily supporting
    Major's rival Tony Blair. (BBC) (The Guardian)
  - A coroner in Australia's Northern Territory rules that a dingo was responsible
    for the death of baby Azaria Chamberlain at Uluru in August 1980. (AAP via SBS)
    (Al Jazeera) (BBC)
  Politics and elections:
  - A day after the arrest of opposition politicians, a mass anti-Putin protest takes
    place in central Moscow. (Al Jazeera) (BBC) (The New York Times) (AP via Time)
  - The Falkland Islands government announces that it will hold a referendum on the
    islands' sovereignty next year. (BBC)
  - Turkey announces plans to introduce elective Kurdish language course in schools,
    a step aimed at easing tension that Kurdish minority activists argue does not
    go far enough. (AP via Fox News) (Al Jazeera)
  - Voters in the 8th congressional district in the US state of Arizona go to the
    polls for a special election caused by the resignation of Gabby Giffords due to
    health reasons with Democrat Ron Barber duly elected. (The Hill)
  Science and health:
  - An extensive study concludes that several factors aligned to cause the extinction
    of wooly mammoths. (Live Science)
  - The World Health Organization (WHO) concludes that diesel exhaust causes cancer.
    (BBC)
  - Scientists announce creation of a new chemical compound, NOTT-202, capable of
    selectively absorbing carbon dioxide. (BBC)
  Sport:
  - FIFA president Sepp Blatter writes to the Israel Football Association amid reports
    that several players from the Palestine national football team have been illegally
    detained in Israel. (Al Arabiya) (Reuters)
  - Rangers Football Club will face liquidation after main creditor HM Revenue and
    Customs rejects a Company Voluntary Arrangement to bring the club out of administration.
    (Press release)
  UEFA Euro 2012:
  - Jakub Błaszczykowski scores the equaliser as Poland hold Russia to a draw at the
    National Stadium in Warsaw. (BBC) (Al Jazeera)
  - Polish and Russian fans clash in Warsaw with at least ten people injured and 56
    fans detained. (AP via New Zealand Herald)
  - Czech Republic goalkeeper Petr Čech drops a clanger in his country's game against
    2004 champions Greece in a match that had the fewest shots in the European Championship
    since 1980. (BBC) (Al Jazeera)
  - Anti-gay comments by Italy striker Antonio Cassano cause controversy. (BBC) (The
    Guardian) (news.com.au) (Reuters)
