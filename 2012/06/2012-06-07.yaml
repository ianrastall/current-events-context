Date: '2012-06-07'
Source_URI: Portal:Current events/2012 June 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - U.S. military drone attacks carried out by the CIA on Pakistan raise serious legal
    questions, announces United Nations human rights chief Navi Pillay at the end
    of a fact-finding visit to Pakistan. (BBC)
  Arts and culture:
  - Philip Roth wins the Prince of Asturias Award for Literature and pays tribute
    to his "dear friend" Carlos Fuentes who died last month. (The Guardian)
  - Archaeologists announce the discovery of the remains of the 16th-century Curtain
    Theatre, where some of William Shakespeare's plays were first performed. (BBC)
  - Former Fleetwood Mac member Bob Welch is found dead from a gunshot wound. (Associated
    Press) (MSNBC)
  - Clarence House confirms that Prince William has qualified as an RAF search and
    rescue captain, and will now command search and rescue operations in Sea King
    helicopters. (BBC)
  Business and economy:
  - Credit agency Fitch slashes Spain's rating to BBB. (Al Jazeera) (The Guardian)
  - Argentine president Cristina Fernández de Kirchner announces she is switching
    her personal savings from the U.S. dollar to the Argentine peso. (BBC)
  - LinkedIn says that some of its members' passwords have been "compromised" following
    reports that more than six million passwords were leaked on the Internet. (BBC)
  - Last.fm also reports that some of its passwords have been leaked and urges users
    of its website to change them immediately. (BBC)
  Disasters:
  - A helicopter with foreign nationals on board goes missing in an Amazon region
    of southern Peru. (BBC) (AFP via France24) (Al Jazeera)
  - Two apartment buildings collapse following a gas leak in the Italian town of Conversano,
    resulting in four people being missing. (Reuters)
  - At least 16 people die and 32 are injured after a bus falls into a ravine north
    of the Bolivian capital La Paz. (AP via Google News)
  - A small Pilatus PC-12/47 aircraft crashes in a remote rural area of Florida in
    the Tiger Creek Swamp area near Lake Wales, Florida, southeast of Lakeland, Florida
    in the central portion of the state. The airplane began to break up at around
    26,000 feet in southeastern Polk County, Florida. (MSNBC)
  International relations:
  - CIA director David Petraeus makes an unofficial visit to Bulgaria, meeting the
    president and prime minister. (New Europe)
  - U.S. Secretary of Defense Leon Panetta makes an unannounced trip to Kabul and
    warns that his country is "reaching the limits of our patience here" with regard
    to Pakistan. (BBC) (AFP via the Daily Nation) (Al Jazeera) (The Guardian)
  - An additional 550 settler homes are announced by Israeli construction minister
    Ariel Attias in addition to the 300 new settler homes ordered yesterday by the
    land's prime minister Benjamin Netanyahu at the Jewish settlement of Beit El in
    the West Bank. (Al Jazeera)
  - UK government ministers announce their intention to boycott group games involving
    the England national football team at UEFA Euro 2012 in Ukraine. (BBC) (The Guardian)
  Law and crime:
  - An Israeli court paves the way for the deportation of hundreds of illegal South
    Sudanese migrants, despite opposition to the move from human rights groups. (Deutsche
    Welle) (Al Arabiya) (The Times of Israel)
  Politics and elections:
  - A Golden Dawn politician assaults two other politicians on a live television talk
    show and flees the scene ; at least one copycat incident is reported to have taken
    place with two MPs being assaulted by the neo-Nazi party's supporters. (The Guardian)
  - UK Labour leader Ed Miliband claims that so-called "Englishness" is being overlooked
    in the debate about Scottish independence, though he rejects calls for an English
    Parliament. (BBC) (The Guardian)
  Sport:
  - Football coach Manuel Preciado Rebolledo, due to be unveiled as the new Villarreal
    manager on Friday, is found dead from a heart attack at the age of 54. (Daily
    Mail)
  - Usain Bolt triumphs in the 100m in Oslo in a time of 9.79 seconds. (BBC)
