Date: '2012-06-05'
Source_URI: Portal:Current events/2012 June 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Mexican Drug War: The dismembered remains of 7 bodies are found in the Mexican
    state of Sinaloa. The bodies are discovered along with a written message accusing
    the authorities of cooperating with the Sinaloa Cartel, suggesting that the message
    may have been written by Los Zetas. (Washington Post)'
  - Azerbaijan accuses Armenia of shooting dead five of its soldiers on the border
    of those two countries, a day after three Armenians were killed. (BBC)
  Diamond Jubilee of Elizabeth II:
  - Elizabeth II attends a lunch at Westminster Hall following the Jubilee thanksgiving
    service at St Paul's Cathedral. Celebrations ends with a flypast by the Red Arrows.
    (BBC)
  - In a special message to the United Kingdom and the Commonwealth, the Queen says
    she has been "touched deeply" by seeing so many people celebrating her Diamond
    Jubilee together. (BBC)
  - Ministers are urged to investigate reports that unemployed people hired as unpaid
    stewards for the Thames Diamond Jubilee Pageant had to spend the night sleeping
    rough under London Bridge. (BBC)
  Business and economy:
  - Starbucks Corporation is embroiled in controversy after asking its Irish customers
    if they are "proud to be British." (The Guardian)
  International relations:
  - Amidst growing diplomatic tensions between Romania and Hungary, ignoring an official
    request not to, the Speaker of the Hungarian Parliament undergoes a visit in Transylvania
    triggering protests from Romanian state dignitaries. (Politics.hu)
  - The President of Russia, Vladimir Putin, begins a three-day visit to China. (Al
    Jazeera)
  - Der Spiegel reports that Israel is arming submarines supplied by Germany with
    nuclear-tipped cruise missiles, provoking debate within Germany and internationally.
    (Der Spiegel) (PRESS TV)
  Politics:
  - Voters in the U.S. state of Wisconsin go to the polls for the gubernatorial and
    Wisconsin Senate recall election with incumbent governor Scott Walker retaining
    his office, and the Democrats control of the state Senate. (Journal Times)(AP
    via Google News) (CBS News)(Madison.com)
  Science:
  - The last transit of Venus of the 21st century begins at 22:09 UTC on June 5, and
    ends at 04:49 UTC on June 6. (BBC)
