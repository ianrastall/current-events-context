Date: '2012-06-03'
Source_URI: Portal:Current events/2012 June 3
Intelligence_Payload:
  Armed conflict and attacks:
  - A U.S. drone attack in Pakistan's South Waziristan tribal region kills at least
    10 suspected militants. (AP via Boston Herald)
  - A suicide car bombing outside a church in the Nigerian city of Bauchi kills 15
    people and injures 42 others. (AFP via Google News) (The Nation)
  Syrian uprising (2011–present):
  - Sporadic fighting continues in Tripoli, Lebanon, between supporters and opponents
    of Syrian president Bashar al-Assad. (The Daily Star)
  Arts and culture:
  - The Diamond Jubilee of Elizabeth II of the United Kingdom reaches its peak with
    a pageant on the River Thames. (BBC)
  Disasters:
  - A plane carrying 153 people on board crashes in a residential neighborhood in
    Lagos, Nigeria, killing everyone on board and 10 people on the ground. (CNN)
  International relations:
  - United States Secretary of Defense Leon Panetta visits a former U.S. base in Cam
    Ranh Bay, the first visit by an American official of cabinet rank to Vietnam since
    the Vietnam War. (AFP via Yahoo News)
  Law and crime:
  - Police in China crack down on political activists marking the 23rd anniversary
    of the 1989 Tiananmen Square protests. (The Daily Times)
  - Police in Japan arrest Naoko Kikuchi, a member of the Aum Shinrikyo cult and one
    of the two fugitives still at large wanted over the deadly sarin gas attacks on
    the Tokyo subway in March 1995. (BBC)
  Politics:
  - Demonstrations take place in Turkey against a proposed plan to limit the time
    for abortions. (Al Jazeera)
  - Speaking on the BBC's The Andrew Marr Show, British Prime Minister David Cameron
    says that Culture Secretary Jeremy Hunt "acted wisely" in his handling of the
    BSkyB takeover bid. (BBC)
  Sports:
  - In golf, Tiger Woods wins the Memorial Tournament played at the Muirfield Village
    Golf Club in Dublin, Ohio, tying with Jack Nicklaus for PGA Tour victories. (AP
    via Google News)
  - Alexander Serebryakov wins cycling's Philadelphia International Championship.
    (VeloNation)
