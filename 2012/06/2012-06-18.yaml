Date: '2012-06-18'
Source_URI: Portal:Current events/2012 June 18
Intelligence_Payload:
  Armed conflict and attacks:
  - At least two people are killed in an attack on the border between Israel and Egypt.
    (Reuters via MSNBC) (Al Jazeera) (BBC)
  - A suicide attack kills at least fifteen people and wounds forty people at a Shia
    funeral in Baquba, north of Baghdad.(BBC)
  - A bomb explodes near a university bus in the Pakistani city of Quetta killing
    at least two students and injuring more than 35 others. (AFP via Herald-Sun)
  - Three men in Afghan police uniform kill a NATO soldier in eastern Afghanistan.(BBC)
  Arab Spring:
  - '2011–2012 Yemeni revolution: Yemeni Army commander General Salem Ali Qatan is
    killed in a suicide attack in the port city of Aden by a man wearing an explosives
    belt. (BBC) (Al Jazeera)'
  - Political uncertainty continues in Egypt. (BBC) (Al Jazeera)
  Arts and culture:
  - It is disclosed that Jack Osbourne has the incurable neurological condition multiple
    sclerosis (MS). (BBC)
  - The music world expresses shock at the news of Scott Johnson's death ahead of
    a Radiohead concert in Canada. (BBC)
  Business and economy:
  - Australian newspaper publisher Fairfax Media announces restructuring plans which
    will lead to a cut of 1900 jobs. (The Australian)
  - The largest stockholder of the London-based telecommunications firm Vodafone,
    institutional investor Orbis, ends its opposition to a planned acquisition by
    Vodafone of Cable & Wireless Worldwide; the deal now seems certain to go through.
    (Reuters)
  International relations:
  - A new round of talks on nuclear power between Iran and six world powers opens
    in Moscow. (BBC)
  - Aung San Suu Kyi is due in Ireland. (RTE)
  - United States President Barack Obama and Russian President Vladimir Putin discuss
    the uprising in Syria, Iran, and trade at the summit. (CNN)
  2012 G-20 Mexico summit:
  - The 2012 G-20 summit opens in Los Cabos, Baja California Sur, with the Eurozone
    crisis high on the agenda. (BBC)
  Law and crime:
  - Rwanda's "gacaca courts", set up to try those responsible for playing a role in
    the 1994 Rwandan Genocide, finish their work. (UPI)
  - Former American Major League Baseball player Roger Clemens is acquitted on all
    charges in a perjury trial. (CBS News)
  Politics and elections:
  - Prince Salman bin Abdulaziz is nominated as heir apparent of Saudi Arabia. (BBC)
  Science:
  - Blue Gene/Q becomes the world's fastest supercomputer. (TOP500)
  Sport:
  - British police investigate tennis player David Nalbandian after yesterday's disqualification
    from the final of the 2012 AEGON Championships over kicking an advertising board
    into the left shin of a line judge, seriously injuring him; his opponent, Marin
    Čilić, who was trailing Nalbandian at the time, was awarded the title and Nalbandian
    lost the prize money he would have received for finishing as runner-up. (BBC)
  UEFA Euro 2012:
  - Italy trash ten-man Ireland to go through to the quarter-finals, with Ireland
    on their worst run for more than 40 years. (BBC) (RTE)
  - 'UEFA fines and bans Nicklas Bendtner of Denmark for one game after showing boxer
    shorts with a brand name on it against Portugal. Bendtner says: "I didn''t know
    I was breaking any rules". (Al Jazeera) (BBC)'
  Next season's soccer fixtures:
  - Premier League fixtures are announced, with champions Manchester City kicking
    off at home against newly promoted Southampton. (BBC)
  - Rangers, set to be liquidated, do not appear on the Scottish Premier League fixture
    list and are instead replaced by a mysterious entity known as "Club 12". (BBC)
