Date: '2012-08-21'
Source_URI: Portal:Current events/2012 August 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Ireland''s Army Bomb Disposal Team receives four calls in the capital Dublin:
    among them is a false alarm, dealt with at the Israeli embassy in Ballsbridge.
    (RTÉ News) (Reuters)'
  Syrian civil war:
  - Russia sends a warning in reaction to what it perceives as threats by the United
    States, made yesterday. Russia still proposes to help negotiate a deadline to
    stop violence. (Reuters) (RIA Novosti)
  - The Armenian Secret Army for the Liberation of Armenia (ASALA) threatens to attack
    Turkey if Turkey continues its policy regarding Syria. (Hürriyet Daily News)
  - The Japanese Ministry of Foreign Affairs confirms the death of journalist Mika
    Yamamoto, who was shot and killed while reporting on fighting in the northwestern
    city of Aleppo. (AP via The Washington Post)
  Arts and culture:
  - Archbishop Charles J. Chaput of Philadelphia unveiles a new school system to be
    run by an independent Catholic foundation. The Faith in the Future Foundation
    will serve the archdiocese's high schools and special education programs. (Catholic
    News Agency)
  Business and economy:
  - Oil imports to China from Iran fall 28 percent in July and 30 percent in 2012.
    (Reuters)
  2012 Philippine Piper Seneca crash:
  - A search and rescue team recovers the body of former Philippines Interior and
    Local Government Secretary Jesse Robredo after a crash that claimed his life and
    two others on Saturday off Masbate. (Reuters) (Philippine Daily Inquirer)
  - Philippine President Benigno Aquino III declares national days of mourning with
    flags flying at half-mast with a state funeral to be held within several days.
    (Rappler)
  - Executive Secretary Paquito Ochoa, Jr. is named acting Secretary of Interior and
    Local Government. (GMA News)
  Health and environment:
  - At least 20 people in the Democratic Republic of the Congo die from the Ebola
    virus disease. (CNN)
  - Tropical Storm Isaac forms in the Atlantic Ocean with tropical storm warnings
    in place for Puerto Rico, the US and British Virgin Islands, Martinique, Dominica,
    Guadeloupe, St Martin, St Kitts, Nevis, Antigua, Barbuda, Montserrat, Anguilla,
    Saba, St Eustatius, St Maarten, Culebra and Vieques. (AAP via News Limited)
  Politics and elections:
  - United States Congressman Todd Akin, who is also a candidate for the United States
    Senate, vows to continue as the US-wide fall-out over his rape, pregnancy and
    anti-abortion comments rages on. (RTÉ News)
  - The Constitutional Court of Romania invalidates the presidential impeachment referendum
    held on July 29. (Antena 3)
  - Iran unveils a newer version of a short range surface-to-surface ballistic missile,
    named the Fateh-110 or Conqueror, and five pieces of military hardware. (BBC)
    (Mehrnews)
