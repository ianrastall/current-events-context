Date: '2012-08-15'
Source_URI: Portal:Current events/2012 August 15
Intelligence_Payload:
  Mexican Drug War:
  - Mexican authorities confirm that the Jalisco New Generation Cartel is responsible
    for murdering five journalists in the state of Veracruz. This information was
    confirmed after the arrest of some of the members in the criminal organization.
    (Milenio via Google)
  - The Mexican criminal group known as Los Zetas is discovered to contraband cigarettes
    in Panama. (Milenio via Google)
  Syrian civil war:
  - In Damascus, an explosion at a military compound near a hotel where UN observers
    are staying is claimed by a Free Syrian Army brigade. (Al-Jazeera)
  - In response to the Syrian civil war, the Fourth Extraordinary Session of the Islamic
    Summit organized by the Organisation of Islamic Cooperation begins in Makkah Al
    Mukarramah, Saudi Arabia, for two days. (CNN)
  - According to a UN investigation report by Commissioners Pinheiro and Abuzayd,
    both Syrian government troops and, to a lesser extent, anti-government groups
    are responsible for war crimes. Government forces and shabbiha fighters are responsible
    for the Houla massacre. (UNHCR)
  - Activists say at least 30 people are killed in the town of Azaz, Aleppo province,
    after the Syrian government launches airstrikes on homes in the area. (Reuters)
  - Saudi Arabia, Qatar and the United Arab Emirates urge their citizens to leave
    Lebanon over a series of recent kidnappings involving nationals from Syria, Turkey
    and Saudi Arabia. (Daily Star Lebanon)
  Arts and culture:
  - Prince Philip, Duke of Edinburgh is taken to hospital as a "precautionary measure"
    after a recurrence of a bladder infection that affected him earlier in the year.
    (BBC)
  - Unification Church founder Sun Myung Moon is taken to hospital in grave condition
    due to complications of pneumonia and respiratory problems. (Korea Times)
  Disasters:
  - The tour bus of American heavy metal band Baroness falls off a 30-foot viaduct
    in Monkton Combe, near Bath. All nine passengers on board are injured, two seriously.
    (BBC)
  International relations:
  - Two Japanese cabinet ministers, Jin Matsubara and Yuichiro Hata, visit the controversial
    Yasukuni Shrine amid territorial disputes with both the People's Republic of China
    and South Korea. (AFP via Yahoo! News)
  Law and crime:
  - The High Court of Australia upholds legislation providing for plain packaging
    of cigarettes. (ITV News)
  - Four suspects are arrested in Germany for their alleged involvement in illegally
    providing Iran with necessary technical parts to build a nuclear reactor. (BBC)
  Sports:
  - Rafael Nadal is not to take part in the US Open due to knee injury. (The New York
    Times)
  - Bolton midfielder Fabrice Muamba announces his retirement from football following
    medical advice he was given by doctors after suffering a cardiac arrest during
    a match earlier in the year. (BBC Sport)
  - Félix Hernández pitches the 23rd perfect game in Major League Baseball history
    for the Seattle Mariners at Safeco Field. (Seattle Times)
