Date: '2012-08-22'
Source_URI: Portal:Current events/2012 August 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 48 people are killed during clashes, over grazing rights for cattle,
    between the Pokomo and Orma tribes in Kenya. (Deutsche Welle)
  Syrian civil war:
  - A Chinese state news commentary on recent U.S. "red line" remarks states that,
    once again, Western powers are digging deep for excuses to intervene militarily
    in another conflict-torn Middle East country. It sharply denounces the U.S.' "calculus".
    (Xinhua)
  - Syrian forces shell two separate districts in the capital Damascus; rebels say
    at least 47 people are killed. Frequent fighting is reported in Aleppo and other
    parts of the country. The United Nations estimate that 18,000 people have been
    killed in the conflict. (Reuters)
  Arts and culture:
  - Nina Bawden, the writer of seminal work Carrie's War and shortlisted for the Booker
    Prize in 1987 and the Lost Man Booker Prize in 2010, dies at her London home.
    (BBC) (The Guardian) (The Daily Telegraph)
  - The BBC turns down "flat" a proposal for a statue to George Orwell who resigned
    from the organisation "because for some time past I have been conscious that I
    was wasting my time and the public money on doing work that produces no results."
    (The Guardian) (BBC)
  Disasters:
  - A plane carrying 11 tourists crashes in the Maasai Mara game reserve in southwestern
    Kenya, killing at least four people and injuring up to three others. (BBC)
  - A state of emergency is declared in California over wildfires threatening hundreds
    of buildings (Reuters)
  - Hurricane Isaac causes so much disruption that hearings at Guantánamo Bay are
    cancelled again. (Huffington Post)
  Health:
  - Tony Nicklinson, a 58-year-old British man with locked-in syndrome who lost his
    fight for doctors to legally end his life, dies after refusing food at his home
    in Melksham, Wiltshire. (BBC)
  - Research finds that elderly men pass on more genetic mutations to their children
    if they become fathers. (Los Angeles Times)
  - Penn State's ex-president Graham Spanier rejects the report by former FBI head
    Louis Freeh accusing the university of a cover-up, saying he never heard even
    a hint of child sex abuse by Jerry Sandusky, despite indications of "horseplay",
    having never met a higher level of awareness. (Reuters)
  International relations:
  - Russia becomes the 156th member of the World Trade Organization. Vanuatu becomes
    the 157th member. (Bloomberg)
  Sport:
  - Former Irish footballer Kevin Sheedy is diagnosed with bowel cancer at the age
    of 52. (Irish Independent) (RTE)
  Technology:
  - It becomes known that a freight train derailment, yesterday near Baltimore, caused
    military fiber optic cables to be cut so much that communications were quite seriously
    disrupted. This in turn caused to justify further delaying the start of the big-gun
    suspects' trial at Guantánamo Bay by two more days, to within "likely more than
    a year". (Huffington Post)
