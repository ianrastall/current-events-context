Date: '2012-08-10'
Source_URI: Portal:Current events/2012 August 10
Intelligence_Payload:
  Armed conflict and attacks:
  - A Libyan army general Mohammed Hadia al Feitouri is shot dead in Benghazi. (BBC)
  Mexican Drug War:
  - Four suspected drug traffickers of the Sinaloa Cartel, including the cousin of
    Joaquín "El Chapo" Guzmán, Mexico's most-wanted drug lord, are captured in Spain.
    (BBC News)
  Disasters:
  - The death toll from recent floods in the Philippines capital Manila and surrounding
    regions rises to 60. (AAP via SBS)
  - The United States says they are planning to help clean up herbicide Agent Orange
    from areas of Vietnam, the first time since the Vietnam War ended in 1975. (CNN)
  International relations:
  - The South Korean Yonhap news agency reports that the President of South Korea
    Lee Myung-bak is considering visiting the disputed Liancourt Rocks, which are
    also claimed by Japan. (Yonhap)
  Politics and elections:
  - Tens of thousands of people attend the state funeral for President John Atta Mills
    in Accra, Ghana. (BBC)
  Law and crime:
  - 'Disappearance of Tia Sharp: A body is discovered in Tia Sharp''s grandmother''s
    house, and police announce that they are looking for the girl''s step-grandfather.
    (Sky News)'
  Sports:
  - Juventus coach Antonio Conte is banned for 10 months due to his alleged role in
    match-fixing. (BBC)
  2012 Summer Olympics:
  - Colombia's Mariana Pajón wins gold at the Women's BMX final, making it the second
    gold medal in the history of the South American country. (El Tiempo)
