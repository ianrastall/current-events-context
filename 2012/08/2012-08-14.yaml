Date: '2012-08-14'
Source_URI: Portal:Current events/2012 August 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - A series of suicide bombings across Afghanistan kill at least 46 people and injure
    up to 80 others. (BBC) (CBS)
  - Turkish lawmaker Hüseyin Aygün, who was kidnapped by Kurdish rebels on 12 August
    2012, is released. (AP via The Washington Post)
  Syrian civil war:
  - One journalist, three lieutenant colonels and one auditor defect to and participate
    in the Free Syrian Army (FSA). (Anadolu Agency via The Journal of Turkish Weekly)
  Mexican Drug War:
  - Alleged members of the Gulf Cartel storm a bar in Monterrey and kill 10 people.
    (Fox News)
  Law and crime:
  - Kariem McFarlin, 35, of Alameda, California, is arrested and charged with residential
    burglary and selling stolen property from the Northern California home of the
    late Steve Jobs. (MSN)
  - Eleven bodies of individuals stabbed to death are found in the mountainous Ile
    Alatau national park, near Kazakh capital Almaty. (BBC)
  Politics and elections:
  - Mohamed Salem, an Egyptian lawyer, files a lawsuit over President Morsi's removal
    of Hussein Tantawi and Sami Anan. (Reuters)
