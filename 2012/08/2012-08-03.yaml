Date: '2012-08-03'
Source_URI: Portal:Current events/2012 August 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Mexican Drug War: The Mexican Army arrests another member of Los Zetas drug cartel
    responsible for decapitating 49 bodies and dumping them on a roadside in May 2012;
    the suspect is one of the 37 fugitives of the Apodaca prison riot earlier this
    year. (Fox News)'
  - An explosion in the Kenyan capital of Nairobi kills at least one person. (BBC)
  Syrian civil war:
  - The Syrian Army increases artillery shelling of Aleppo as the Free Syrian Army
    tries to consolidate its control of the city's eastern districts. (Al Jazeera)
  - The opposition claims that over 60 people were allegedly massacred by the Syrian
    Army in the Arbaeen neighborhood of the city of Hama. (CNN)
  - The United Nations General Assembly adopts a non-binding resolution condemning
    the Syrian government for its use of force against civilians, noting "human rights
    abuses" by opposition forces, and reproaching the United Nations Security Council
    for its "failure" to counter the crisis. (CNN)
  Disasters:
  - North Korea asks for food aid from the United Nations after last month's floods.
    (BBC)
  - A large wildfire impacts Creek County, Oklahoma, particularly in the city of Mannford,
    burning over 58,000 acres and over 100 homeless. https://tulsaworld.com/news/archives/12-years-ago-creek-county-wildfires-leave-residents-homeless/collection_9f94c291-5141-56bd-9527-243542fdd210.html
