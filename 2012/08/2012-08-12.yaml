Date: '2012-08-12'
Source_URI: Portal:Current events/2012 August 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Egyptian forces kill six suspected militants in a village near the city of el-Arīsh
    in northern Sinai. (BBC)
  Syrian civil war:
  - The meeting of the Arab Foreign ministers in Jeddah to tackle Syria conflict is
    postponed. (BBC)
  - Syrian opposition reports that ten men are killed by pro-regime forces in Homs.
    (CNN)
  - Renewed violence is reported in the Syrian cities of Aleppo, Damascus, Homs and
    Idlib, as Syrian state television reports the death of one of its reporters. (Al
    Jazeera)
  Mexican Drug War:
  - Edgar Morales Pérez, the mayor-elect of Matehuala, San Luis Potosí, is shot to
    death by gunmen while riding his vehicle. (The Huffington Post)
  - The state police commander of the Mexican state of Chihuahua is gunned down and
    killed in Ciudad Juárez. (KTSM Channel 9)
  Arts and culture:
  - Billy Graham, who had recently suffered from pneumonia in November 2011, is hospitalized
    again, likely for several days, at Mission Hospital in Asheville, North Carolina,
    due to bronchitis, and is being treated with antibiotics. (NBC News)
  Business and economy:
  - Qatar is to deposit US$2bn at the Egyptian Central Bank in an effort to help support
    an economy battered by a year and a half of political turmoil, an Egyptian presidency
    statement reports. (Al Jazeera)
  Politics and elections:
  - Egyptian President Mohamed Morsi fires Mohamad Hussein Tantawi, head of the country's
    armed forces. (Al Jazeera)
  Sports:
  - Golfer Rory McIlroy wins the 2012 US PGA Championship at Kiawah Island. (BBC)
  2012 Summer Olympics:
  - The 2012 Summer Olympics closing ceremony is held, featuring a celebration of
    British pop music and the handover of the Olympic Flag to the Mayor of Rio de
    Janeiro in preparation for the 2016 Games. (BBC)
  - Stephen Kiprotich of Uganda wins the Olympic men's marathon in London, beating
    the Kenyan pairing of Abel Kirui and Wilson Kipsang. (BBC Sport)
