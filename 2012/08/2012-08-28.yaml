Date: '2012-08-28'
Source_URI: Portal:Current events/2012 August 28
Intelligence_Payload:
  Armed conflict and attacks:
  - At least one person is killed and another four injured in renewed fighting in
    the Indian city of Kokrajhar in the state of Assam. (BBC)
  - Clashes continue in Mombasa, protesting the killing of radical Muslim Kenyan cleric
    Aboud Rogo. The government of Kenya orders a swift investigation. (Reuters) (coastweek.com)
  - Colombian president Juan Manuel Santos announces the start of preliminary peace
    talks with the FARC-EP guerrilla group. (Washington Post)
  - A Muslim Sufi leader, Safi Afandi, is killed in a suicide bomb attack in the Russian
    republic of Dagestan. (Al Jazeera)
  Syrian civil war:
  - Twelve people are killed in a twin-blast bomb attack by unknown people at the
    entrance of a Druze cemetery in the Jaramana district of southeast Damascus. (Reuters)
    (RIA Novosti)
  Arts and culture:
  - Wong Kar-wai is to be jury president of the 2013 Berlinale film festival. (Xinhua)
  Disasters:
  - At least four Chinese fishermen die and another twelve are missing in the Korea
    Strait as Typhoon Bolaven hits South Korea. The Chinese meteo service issues a
    blue alert. (BBC) (Xinhua)
  - Tropical Storm Isaac is upgraded to a category 1 hurricane as the storm makes
    landfall along the Gulf Coast in Louisiana. (CNN)
  Law and crime:
  - An Israeli court rules that Israel is not responsible for the death of American
    activist Rachel Corrie at the hands of an Israeli Army bulldozer in the Gaza Strip
    in 2003. (BBC) (The Times of Israel)
  - French officials open up a murder case in the death of Palestinian leader Yasser
    Arafat following a "complaint against X" by his widow. (CNN) (Le Monde)
  Politics:
  - The United States Republican Party officially nominates Mitt Romney as its candidate
    in the 2012 presidential election at the National Convention in Tampa, Florida.
    (Boston Globe)
  Science and technology:
  - IBM sells a "most powerful and advanced" server. (Wall Street Journal)
  Sports:
  - A teen-aged boy proposes Novak Djokovic for marriage at a US Open training and
    gets some playtime in return. (Huffington Post)
