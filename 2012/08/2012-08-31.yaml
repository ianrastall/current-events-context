Date: '2012-08-31'
Source_URI: Portal:Current events/2012 August 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - A shooting at a Pathmark grocery store in Old Bridge, New Jersey, kills at least
    three people. (BBC)
  Arts and culture:
  - British entertainer Max Bygraves, who had been suffering from Alzheimer's disease,
    dies in Hope Island, Queensland, Australia, at the age of 89. (BBC)
  - The Los Angeles County Coroner's Office reports that Sage Stallone died of natural
    causes. (BBC)
  Disasters:
  - A 7.6-magnitude earthquake in the Philippine province of Eastern Samar kills at
    least one person. (CNN)
  International relations:
  - Armenia suspends diplomatic relations with Hungary after Ramil Safarov's extradition
    to Azerbaijan. (BBC)
  Law and crime:
  - Wang Xiaoning, a Chinese dissident who was detained in 2002 with information provided
    by Yahoo!, is released. (BBC)
  - Apple loses a patent dispute against Samsung Electronics smartphones and tablets
    in Tokyo, Japan. (Bloomberg)
  - Roman Abramovich, the owner of Chelsea FC, wins his legal action against fellow
    Russian oligarch Boris Berezovsky. (The Guardian)
  - Harvard University investigates a widespread cheating allegation on a take-home
    test in one of its undergraduate classes last spring. (AP via Yahoo! News)
  Politics and elections:
  - Parliamentary elections take place in Angola. (Al Jazeera)
  - Enrique Peña Nieto of the Institutional Revolutionary Party (PRI) is declared
    the winner of the Mexican presidential elections. (Fox News)
