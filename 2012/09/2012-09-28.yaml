Date: '2012-09-28'
Source_URI: Portal:Current events/2012 September 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali and African Union forces launch a coordinated assault on the Somali port
    city of Kismayo to take back the city from al-Shabaab militants. (BBC)
  - Twelve people die and dozens of inmates escape in a prison break in Tikrit, Iraq.
    (CBS)
  - The spokesperson for the United States Director of National Intelligence claims
    there was a pre-organised plot in the attack on the U.S. Consulate in Benghazi,
    Libya, on September 11. (The Wall Street Journal)
  Disasters:
  - A Dornier Do 228 light aircraft operated by Sita Air crashes on the outskirts
    of the Nepalese capital of Kathmandu, killing all 16 passengers and three crew
    on board. (BBC) (AFP via Google News)
  Health:
  - The World Health Organization says the novel coronavirus that originated from
    Saudi Arabia is not highly contagious. (Reuters)
  International relations:
  - Nigeria suspends flights to Saudi Arabia after hundreds of Nigerian women attending
    the Hajj pilgrimage in Mecca were deported for not traveling with a male escort.
    (Al Jazeera) (BBC)
  Politics and elections:
  - Social Democratic Party of Germany president Sigmar Gabriel proposes Peer Steinbrück
    as the party's Chancellor candidate for the next German federal election to be
    held in 2013. (The Wall Street Journal)
  China:
  - The Politburo of the Communist Party of China sets November 8 as the date for
    its 18th National Congress. (Reuters)
  - Former Chinese Politburo member Bo Xilai is expelled from the Communist Party
    of China. (BBC) (Xinhua)
