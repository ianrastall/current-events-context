Date: '2012-09-23'
Source_URI: Portal:Current events/2012 September 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bombing at a church in the northeastern Nigerian city of Bauchi kills
    at least two people and wounds up to 48 others. (BBC)
  - More than 200 Islamist insurgents surrender to African Union troops in Jowhar,
    Somalia. Al-Shabaab kills a member of the Somali Parliament and threatens to kill
    more. (Pana via Afrique en Ligne) (Reuters)
  Deaths:
  - Edwin P. Wilson, a former Central Intelligence Agency operative and arms trafficker,
    has died on September 10th. (AP via Yahoo News)
  - Former WBO heavyweight world champion Corrie Sanders, 46, dies after an armed
    robbery in South Africa. He upset Wladimir Klitschko with a second-round KO in
    2003. (Eurosport)
  Disasters and accidents:
  - Nine alpinists die and six are missing on the slopes of Mount Manaslu, Mansiri
    Himal Himalayas. (BBC)
  Law and crime:
  - Iran plans to block use of the Google search engine, as it prepares to switch
    its citizens to a domestic internet network. (Reuters)
  - Citing nuclear sanctions, the United States of America deny visas to 20 out of
    160 Iranian officials, of which two are ministers, impeaching diplomats' attendance
    at next week's United Nations General Assembly meeting in New York. (RIA Novosti)
  - Libya dissolves all armed groups and militia not under the authority of the state.
    (Al Jazeera)
  - Police in Italy arrest a man at Turin Caselle Airport on charges of impersonating
    a pilot. (Al Jazeera)
  Politics and elections:
  - Parliamentary elections are held in Belarus. The opposition sees the vote as undemocratic
    and boycotts it. (UKPA via Google News)
  - A conference to "rescue Syria" is held in Damascus by the National Coordination
    Body and around 20 other parties. Twenty eight parties, which are also opposed
    to the militarization of the conflict, have not participated. The conference calls
    for a ceasefire and a peaceful political transition to succeed the Assad regime.
    The armed opposition considers the position as "too lenient on the dictator".
    (Xinhua) (AP via Washington Post)
  Science:
  - Researchers find that there are four genetically distinct types of breast cancer.
    (The New York Times)
  Sports:
  - In Gaelic football, Donegal defeat Mayo in the 2012 All-Ireland Senior Football
    Championship Final at Croke Park. (RTÉ Sport) (The Irish Times)
  - John Higgins wins the Shanghai Masters snooker tournament, beating Judd Trump
    by a close 10-9 score. (Eurosport via Yahoo! Sport)
  - Philippe Gilbert wins the UCI Road World Championships race in Valkenburg, Netherlands,
    with a decisive jump on the Cauberg. (Eurosport)
  - In sumo, Harumafuji Kōhei wins his second consecutive top division championship
    with a perfect 15–0 record to assure his promotion to 70th yokozuna. (Kyodo News)
