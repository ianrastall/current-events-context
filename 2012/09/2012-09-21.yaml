Date: '2012-09-21'
Source_URI: Portal:Current events/2012 September 21
Intelligence_Payload:
  International relations:
  - Australia temporarily closes its High Commission in the Pakistani capital Islamabad.
    It says it fears violent protests aimed at Western countries as a result of recent
    controversies. (AAP via The Australian)
  Politics and elections:
  - Authorities in South Africa issue a warrant for the arrest of Julius Malema on
    charges of corruption. (BBC)
  - The Prime Minister of Japan, Yoshihiko Noda, wins a leadership ballot held by
    the Democratic Party of Japan. (BBC)
  - Witnesses see Ansar al-Sharia Islamists in Benghazi evacuate their headquarters
    after demonstrations by thousands of Libyan people. (Jerusalem Post)
  - Pastafarian "Elder Pastitsios" arrested for blasphemy in Greece.
  Arts and culture:
  - During a Green Day performance at Las Vegas' IHeartRadio music festival, Billie
    Joe Armstrong became agitated onstage and stopped the band's set midway through
    their performance. In an expletive-filled rant, Armstrong criticized the event's
    promoters for allegedly cutting short the band's performance before smashing his
    guitar and storming off stage.
  Science:
  - Harvard Theological Review does not yet publish a study that claims a papyrus
    bears testimony that Jesus of Nazareth used the word(s) "my wife". (AP via Google
    News)
  - A researcher at the University of Cambridge predicts that in about four years,
    the Arctic polar ice cap will melt completely during the summer months. (Planetsave)
