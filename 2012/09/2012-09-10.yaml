Date: '2012-09-10'
Source_URI: Portal:Current events/2012 September 10
Intelligence_Payload:
  Armed attacks and conflicts:
  - Yemeni officials report that Said al Shihri, the second-in-command of Al Qaeda
    in the Arabian Peninsula (AQAP), is killed in southern Yemen. (BBC)
  - A suicide bombing in Kunduz, Afghanistan, kills at least 16 people; a local doctor
    says "21 or more". (AFP via The Financial Express) (BBC)
  Mexican Drug War:
  - Mexican police officers discover 16 corpses with signs of torture inside a vehicle
    in the southern state of Guerrero. (Reuters)
  Arts and culture:
  - An agreement is reached allowing the completion of the US National September 11
    Memorial & Museum on the World Trade Center site in New York City. (Seattle PI)
  Business and economy:
  - Teachers in Chicago go on strike. Around 350,000 students are affected. (CBS News)
    (Reuters) (Chicago Tribune)
  - Around 10,000 South African miners demonstrate at the Lonmin mines in Marikana
    (Rooikoppies), Rustenburg, Bojanala Platinum district, North West province. Fifteen
    thousand miners strike at the Gold Fields KDC West Driefontein mine. (Reuters
    via Yahoo! News)
  Disasters:
  - Floods and landslides caused by heavy rain kill at least 29 people in northern
    and central Vietnam. (AP via Seattle PI)
  - Hurricane and tropical storm warnings are issued for parts of the Canadian province
    Newfoundland and Labrador as Tropical Storm Leslie approaches. (National Hurricane
    Centre)
  - Three people are killed and several others seriously injured after a coach taking
    people home from the Isle of Wight-based music festival, Bestival 2012 crashes
    in Surrey, England. (BBC)
  Health and environment:
  - A new United States national strategy to prevent suicides is to be released by
    the Surgeon General, the Secretary of Health and Human Services and the Army Secretary.
    It will include, among others, the use of social medium Facebook as a tactic.
    (Chicago Tribune)
  International relations:
  - Yukiya Amano, the head of the International Atomic Energy Agency (IAEA), urges
    Iran to grant IAEA inspectors immediate access to its contentious suspected nuclear
    facility in Parchin. (RIA Novosti)
  - The Japanese government announces it will soon buy the disputed Senkaku Islands
    claimed by China (as Diaoyu Islands) and Taiwan (as Tiaoyutai Islands). Chinese
    leaders respond angrily. (Wall Street Journals) (Reuters)
  - The International Steering Group for Kosovo formally ends its supervision of the
    partially recognised Republic of Kosovo. (RIA Novosti)
  Law and crime:
  - Three boys aged eight and nine are killed when a bazooka grenade, left over from
    a war in Cambodia, explodes. (AP via ABC News) (Jane's)
  - Tariq al-Hashimi rejects the charges leading to his death sentence in Baghdad
    on Sunday. He, being a Sunni, claims to be a "target" of Shiite prime minister
    Nouri al-Maliki. He refuses to return to Iraq for an appeal as long as, according
    to him, the judicial system is "corrupt". He claims to put the verdict "on his
    chest as a medal". Al-Qaeda says "black days" are ahead. The reaction of Iraqi
    people on the street generally welcomes a fair rule of law but is wary of political
    influencing and sectarianism. (ABC News) (Euronews)
  - According to a parliamentary answer by the ministry of health, the value of a
    life lost during a clinical trial is 2.2 lakh rupees ($ 4,000) in India in 2011.
    This number is the average compensation paid for deaths during clinical trials.
    No rules governing compensations for clinical trial-related injury or death have
    been approved by the Parliament of India yet. (IRNA)
  Politics and elections:
  - Members of the new Somali Parliament elect Hassan Sheikh Mohamoud President. (BBC)
  - 'Chairman Justice Markandey Katju of the Press Council of India, defends Aseem
    Trivedi: "he did nothing illegal". Since September 9th, the Indian cartoonist
    Aseem Trivedi is detained in Mumbai on charges of sedition related to the content
    of his work. (Christian Science Monitor) (First Post) (Indian Express)'
  Hong Kong legislative election, 2012:
  - Voice of America says official results for the 35 "geographical" seats in Hong
    Kong's legislative elections show 18 seats for the "pan-democracy" camp, 16 seats
    for the "pro-Beijing" camp and one seat for an independent candidate. The "super"
    seats show a 3 to 2 win for the pan-democrats. Voter turnout was 53 %, up from
    45 % at the previous election in 2008. Reuters says support is "steady" for pro-Beijing
    chief executive Leung Chun-ying. The New York Times says that, despite winning
    more votes, the pro-democracy camp has fewer seats than expected. (Voice of America)
    (South China Morning Post) (Reuters via Chicago Tribune) (Reuters via Stuff.co)
    (New York Times) (results)
  - The chairman of the Democratic Party in Hong Kong, Albert Ho, apologises and says
    he will resign due to the election result. (The Standard)'
  Sport:
  - In lawn tennis, Andy Murray of the United Kingdom wins the Men's Singles of the
    2012 US Open defeating Novak Djokovic of Serbia to become the first British player
    to win a Grand Slam singles title since Virginia Wade, and the first British man
    to do so since Fred Perry. (The Roar) (The Independent)
