Date: '2012-09-30'
Source_URI: Portal:Current events/2012 September 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least four Buddhist temples and fifteen homes are burnt by hundreds of Muslims
    in Bangladesh, angry about a picture allegedly posted on Facebook by a Buddhist
    man that had allegedly insulted Islam. (Times of India) (BBC)
  - Two opposition politicians and a supporter are shot dead at an opposition rally
    in Barinas state, Venezuela, a week before the country's presidential election.
    (Al Jazeera)
  - 'Syrian Civil War: An Islamist group fighting Syrian government troops says it
    has captured five soldiers from Yemen, whom it alleges were sent to quell the
    uprising. (Straits Times)'
  - Car bomb blasts kill at least 32 people across Iraq. (Reuters) (BBC)
  - American and Afghan officials announce five people died on Saturday in a clash
    involving American and Afghan army troops at a checkpoint in Maidan Wardak Province,
    Afghanistan. The circumstances are unclear. (New York Times)
  - In Kenya, a nine-year-old boy is killed and other children are wounded in a grenade
    attack on a church in Nairobi. Hours later, two policeman are shot dead in Garissa.
    Police suspect al Shabaab sympathizers for the attacks. (Reuters)
  Arts and culture:
  - Singer George Michael cancels the Australian leg of his tour due to "major anxiety",
    resulting from his recovery from life-threatening pneumonia last November. (BBC)
  Business and economy:
  - Spain's government says it expects debt levels to increase next year. (BBC)
  - Nippon Steel & Sumitomo Metal Corporation's stock debuts on the Tokyo Stock Exchange.
    The formal merger of Nippon Steel and Sumitomo Metal Industries creates the world's
    second-largest steelmaker. (Reuters)
  Politics and elections:
  - Bo Guagua, the son of disgraced Chinese politician Bo Xilai, defends his father
    in his first comments on the political scandal. (Radio Television Hong Kong)
  Sport:
  - In rugby league, the Melbourne Storm defeats the Canterbury Bulldogs in the 2012
    NRL Grand Final (NRL) (Daily Telegraph) (Sydney Morning Herald)
  - In hurling, Kilkenny defeats Galway in the 2012 All-Ireland Senior Hurling Championship
    Final replay at Croke Park. Hurling legend Henry Shefflin breaks another record,
    becoming the first Gaelic athlete to win nine All-Ireland Senior Championship
    medals on the field of play. (Sports News) (Irish Examiner) (RTÉ Sport)
  - Ma Long wins the Table Tennis World Cup in Liverpool. Timo Boll gets silver and
    Vladimir Samsonov, bronze. (ITTF)
  - In the final day of the 39th Ryder Cup golf competition in Illinois, Europe comes
    back from 10-6 down to 14.5-13.5 and retains the title against the United States.
    (CNN)
  Television:
  - CBS Season Premiere of 60 Minutes and The Amazing Race
