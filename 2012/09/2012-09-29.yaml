Date: '2012-09-29'
Source_URI: Portal:Current events/2012 September 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Somali Civil War: Al-Shabaab militants withdraw from the Somali port city of
    Kismayo after Somali and African Union forces launched a coordinated assault on
    Kismayo on Friday. (BBC)'
  - 'Syrian Civil War: Fire rages through the Souq of the Ancient City of Aleppo,
    a World Heritage Site. (Al Jazeera) (New York Times)'
  Disasters and accidents:
  - Three people drown in unseasonal flooding in Morocco. (IOL)
  - At least ten people die after heavy rains trigger flash floods in Malaga, Almeria
    and Murcia, southern Spain. (BBC)
  Law and crime:
  - One of the Guantanamo detainees, Omar Khadr, is transferred to Canada to serve
    the remainder of his sentence. (CNN)
  - Iran accuses the United States of "double standards" over the U.S.' delisting
    of the Mujahideen-e Khalq as a terrorist entity. (ABC News)
  Sport:
  - In Australian rules football, the Sydney Swans win the 2012 Australian Football
    League premiership by defeating Hawthorn by 10 points in the Grand Final. (Australian
    Broadcasting Corporation)
