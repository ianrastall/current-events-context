Date: '2012-12-29'
Source_URI: Portal:Current events/2012 December 29
Intelligence_Payload:
  Syrian civil war:
  - The LCC report that up to 400 people have been killed across Syria on Saturday,
    including about 200 reported executed by the Syrian Army in the Deir Ballba neighborhood
    of Homs. (CNN)
  2012 Central African Republic rebellion:
  - Rebels in the Central African Republic have made fresh gains and are now in control
    of a key central city. (BBC)
  War in North-West Pakistan:
  - Fighters of the Pakistani Taliban kill 21 kidnapped security personnel near Peshawar.
    (BBC) (Xinhua)
  Disasters and accidents:
  - A Tupolev Tu-204 airliner with eight people on board crashes in a ditch between
    the airport fence and the M3 highway after overshooting a runway at Vnukovo International
    Airport in Moscow, Russia, killing five people and leaving three others critically
    injured. (BBC) (RIA Novosti) (Xinhua) (RT)
  Law and crime:
  - A 23-year-old Indian woman who was gang-raped on a bus in Delhi on December 16
    dies of her injuries at a hospital in Singapore. (BBC)
  Politics and elections:
  - Former Prime Minister of the United Kingdom Margaret Thatcher leaves hospital
    after undergoing surgery to remove a tumour. (BBC)
  - US Senate passes H.R. 5949, FISA Amendments Act Reauthorization Act, which extends
    the Foreign Intelligence Surveillance Act of 1978 Amendments Act of 2008 five
    more years until December 31, 2017. The US House of Representatives also voted
    for the extension earlier this month. (Govtrack)
  - France’s Constitutional Council strikes down the government’s plan to impose a
    75 percent marginal income tax rate on the wealthy. (The New York Times) (The
    Guardian) (BBC)
  Sport:
  - Bradley Wiggins and Dave Brailsford are awarded knighthoods in the 2013 New Year
    Honours list, while Sarah Storey becomes a Dame, the female equivalent of a knight.
    (The Guardian) (The Daily Telegraph) (Road.cc)
  - In Premier League's Boxing Day, Theo Walcott hits a hat-trick as Arsenal beat
    Newcastle United 7–3 while Manchester City cling on for a thrilling 4–3 victory
    over Norwich City at Carrow Road. (ESPN) (BBC) (Eurosport)
  - In the Russian Premier League, former Volga Nizhny Novgorod manager Gadzhi Gadzhiyev
    is named as new coach of Krylia Sovetov Samara. (RIA Novosti)
