Date: '2012-12-09'
Source_URI: Portal:Current events/2012 December 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Violent clashes occur in Bangladesh as protesters stage a nationwide blockade
    of roads to press for an independent body to oversee the next general election.
    At least two people were killed and about 100 injured after police fire rubber
    bullets and tear gas. (Reuters) (BBC)
  Disasters and accidents:
  - Former Typhoon Bopha is again forecast to make landfall in the Philippines this
    time on the northern island of Luzon as a tropical storm bringing the possibility
    of more floods and landslides. (Bangkok Post) (ABC/AFP)
  - The wreckage of a plane carrying Mexican-American singer Jenni Rivera with two
    pilots and four other passengers is found in northern Mexico with no apparent
    survivors. (CNN) (AP via WVEC) (NY Daily News)
  - Thirteen people are killed and 10 are injured in Hsinchu County, Taiwan, when
    a bus with 23 people on board rolled off a cliff and tumbled over 100 meters.
    (Bangkok Post) (Focus Taiwan)
  - Six people are killed and 41 others injured on the spot when a bus skids off the
    road and plunges into a 30-meter deep gorge in Chimaltenango, Guatemala. (PrensaLibre)
    (EFE via El Tiempo)
  International relations:
  - Police in Vietnam break up anti-China protests over gas and oil claims in the
    South China Sea. (Al Jazeera)
  Law and crime:
  - A Tibetan monk is arrested by Chinese authorities, accused of inciting self-immolation
    protests against Chinese rule. (Hong Kong Standard)
  - Detectives from Scotland Yard contact police in Australia over the apparent suicide
    of Jacintha Saldanha. (BBC)
  - Hector Celaya, the suspect in the mass shooting at the Tule River Indian Reservation
    that resulted in four deaths and two people being wounded, dies. (Reuters) (Fox
    News)
  Politics and elections:
  - Ghana's main opposition party alleges fraud in the recent general election as
    incumbent President John Mahama is declared the winner. (Al Jazeera) (BBC)
  - Voters in Romania go to the polls for parliamentary elections with the governing
    Social Liberal Union led by Prime Minister Victor Ponta winning by a landslide
    majority in both the Chamber of Deputies and the Senate. (BBC) (Reuters)
  Science and technology:
  - British astronomer and broadcaster Sir Patrick Moore, presenter of The Sky at
    Night for over 55 years, dies aged 89. (BBC)
  - Khrunichev Center and International Launch Services report an anomaly during the
    launch of the Yamal-402 satellite on 8 December. Briz-M stage failure 4 minutes
    before scheduled shut down on its fourth burn. (ILS) (NASA Spaceflight)
  Sport:
  - Juan Manuel Márquez knocks out Manny Pacquiao in round six for the WBO Champion
    of the Decade belt and wins the fourth fight of their epic boxing rivalry. (ESPN)
    (BBC) (AFP via Google)
  - Manchester United win the Manchester derby, defeating reigning league champions
    Manchester City by a score of 3–2 in the 2012–13 Premier League. Robin van Persie
    scores a last-minute goal and Rio Ferdinand is injured after being hit by a coin.
    (ESPN) (Premier League) (BBC)
  - Brazil women's national futsal team wins its third consecutive world title after
    defeating the Portugal team in the final of the 2012 Women's Futsal World Tournament
    by a 3–0 score. (LPF) (FutsalPlanet) (FutsalGlobal)
  - Barcelona's star Lionel Messi scores twice against Real Betis, his 85th and 86th
    goals in a calendar year, breaking the record created by German legend Gerd Müller
    (85 goals) in 1972. (ESPN) (Goal.com) (BBC) (Reuters)
  - Slovenia national football team manager Slaviša Stojanovič is sacked after a poor
    start to the 2014 World Cup qualifying campaign. (FIFA)
