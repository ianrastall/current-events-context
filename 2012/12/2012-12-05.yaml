Date: '2012-12-05'
Source_URI: Portal:Current events/2012 December 5
Intelligence_Payload:
  Syrian civil war:
  - Hungary closes its embassy in Damascus and pulls out all personnel. (Reuters)
  2011–2012 conflict in Lebanon:
  - The death toll from two days of clashes in the city of Tripoli reaches six, with
    dozens reported injured. (Al Jazeera)
  2012 terrorist attacks in Kenya:
  - A remote-controlled bomb explodes in a predominantly Somali neighborhood in the
    Kenyan capital Nairobi, injuring nine people. (Reuters)
  2012 Egyptian protests:
  - Violent clashes occur in Cairo between supporters and opponents of the President
    of Egypt Mohamed Morsi. (ABC News)
  Arts and culture:
  - American jazz composer and pianist Dave Brubeck dies in Connecticut at the age
    of 91. (BBC)
  - Brazilian architect Oscar Niemeyer, best known for designing the main buildings
    of the capital Brasília, dies at the age of 104 in a Rio de Janeiro hospital.
    (ABC News)
  Business and economy:
  - American bank Citigroup announces plans to cut 11,000 jobs worldwide. (AP)
  - The European Commission fines Philips, LG Electronics, Samsung SDI, Panasonic,
    Toshiba and Technicolor a total of €1.47 bn for fixing prices of TV cathode-ray
    tubes. (The Economic Times)
  Disasters and accidents:
  - Rescue crews head to areas of the Philippines severely affected by Typhoon Bopha.
    At least 283 are now believed to have died as a result of the storm, with 339
    injured, hundreds more missing and over 87,000 evacuated. (BBC) (Al Jazeera) (The
    Weather Channel) (New York Times)
  - At least 8 people are killed and 12 others injured after a 5.6 earthquake strikes
    Iran's South Khorasan Province. (BBC) (Reuters)
  - Vehicle carrier Baltic Ace sinks in the North Sea after collision with a container
    ship with at least four people dead and seven missing. (Reuters) (AP via The Australian)
  Law and crime:
  - American businessman John McAfee is arrested in Guatemala following an alleged
    illegal entry after leaving Belize where he is wanted for questioning over the
    death of fellow American Gregory Faull. (Reuters)
  - Mexico's Supreme Court of Justice of the Nation rules that a ban on same-sex marriage
    in Oaxaca state is illegal. (The Washington Post)
  Media:
  - London's King Edward VII's Hospital says it is reviewing telephone protocol after
    two disc jockeys from a Sydney-based radio station, 2Day FM made a prank call
    to the hospital in which they posed as Queen Elizabeth and Prince Charles, and
    spoke with a member of nursing staff about the health of the Duchess of Cambridge.
    (BBC)
  Politics and elections:
  - The peace talks between the Colombian government and the Revolutionary Armed Forces
    of Colombia (FARC) resume in Havana, Cuba. (Chicago Tribune)
  Sport:
  - The New Orleans Hornets plan to change their nickname to the Pelicans (after the
    state bird of Louisiana) for the 2013–14 NBA season. (ESPN)
  - The draw for the elite qualification round of the 2013 UEFA European Under-19
    Football Championship is held by UEFA. Title holders Spain face Croatia, Poland
    and last season's runners-up Greece. (UEFA)
  - Lionel Messi is carried off on a stretcher with an apparent knee injury as FC
    Barcelona are held to 0–0 by Benfica at Camp Nou in the 2012–13 UEFA Champions
    League. (Fox Sports)
