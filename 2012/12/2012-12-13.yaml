Date: '2012-12-13'
Source_URI: Portal:Current events/2012 December 13
Intelligence_Payload:
  Syrian civil war:
  - Russia's Deputy Foreign Minister Mikhail Bogdanov confirms his country is working
    on mobilization plans to evacuate its citizens from Syria. In the statement, the
    Foreign Ministry acknowledges for the first time that the rebels might win as
    the Syrian government is losing control of more and more territory. (Reuters)
  - At least 16 people are killed and 25 others injured after a car bomb strikes the
    city of Qatana, 25 km southwest of the capital Damascus. The attack follows a
    similar blast in front of the Interior Ministry building a day earlier that killed
    at least five. (Reuters)
  Israeli–Palestinian conflict:
  - Five people are injured in the West Bank ahead of the funeral of a deaf teenager
    shot dead by Israeli forces. (Al Jazeera) (The Times of Israel)
  - Thousands of Palestinians demonstrate in the West Bank city of Nablus. (BBC)
  Senkaku Islands dispute:
  - Japan scrambles fighter jets in response to a Chinese plane seen near the disputed
    Senkaku Islands, marking the first time aircraft are involved in the dispute.
    (CNN) (Al Jazeera)
  Arts and culture:
  - The Tallow Candle, an early work by Hans Christian Andersen, is found at the bottom
    of a box in Denmark. (BBC)
  - Włodzimierz Umaniec, who daubed a Mark Rothko painting with black paint in the
    name of yellowism, is jailed for two years in the UK. (The Guardian)
  Business and economy:
  - Finance Ministers from the European Union agree to giving the European Central
    Bank new powers to supervise euro zone banks. (Reuters)
  - Ireland's Labour Party chairman Colm Keaveney votes against the Social Welfare
    Bill, part of Ireland's latest austerity budget. As a result he is expelled from
    the parliamentary party, which is part of the governing coalition. (RTÉ) (Irish
    Independent)
  - Prosecutors ask a judge of the Manhattan federal district court to sentence Peter
    Madoff, brother and co-conspirator of infamous scammer Bernard Madoff, to a sentence
    of ten years. (Reuters)
  Disasters and accidents:
  - Tropical Cyclone Evan makes landfall near the Samoan capital Apia causing at least
    two deaths and the declaration of a state of disaster. (ABC Australia via Yahoo!)
    (AFP via SBS)
  - The death toll in the Philippines from Typhoon Bopha rises over 900 with hundreds
    still unaccounted for. (AAP via News Limited)
  Law and crime:
  - The European Court of Human Rights rules that Khalid El-Masri, a German citizen,
    was an innocent victim of extraordinary rendition by the Central Intelligence
    Agency and orders Macedonia to pay him €60,000 after it arrested him and sent
    him to the CIA. CIA agents then transferred him to a detention facility in Afghanistan.
    (Al Jazeera) (The Guardian) (ECHR)
  - Millions of assets belonging to the former Egyptian dictator Hosni Mubarak are
    located, including Marbella beach properties and luxury cars. (Al Jazeera)
  - A worker at the chief clerk's office (making reference to a will) at the Hugo
    Black U.S. Federal Courthouse in Birmingham, Alabama shoots himself in the head.
    (CNN)
  - Israel's Justice Ministry announces that Foreign Minister Avigdor Lieberman, while
    he will not face more serious money laundering and witness tampering corruption
    charges, will be charged with breach of trust and fraud in connection with illegally
    obtaining funds from shell companies which occurred prior to his Ministry service.
    (Al Jazeera)
  - Former Bosnian intelligence chief Zdravko Tolimir, believed to be a top aide to
    Ratko Mladić, is sentenced to life imprisonment by ICTY for his role in the Srebrenica
    massacre. (CNN)
  2012 royal hoax call incident:
  - An inquest into the death of nurse Jacintha Saldanha hears that she died as a
    result of self-inflicted hanging. (The Independent)
  - The media regulatory body Australian Communications and Media Authority launches
    an investigation into the prank call made by 2Day FM. (The Australian)
  Politics and elections:
  - U.S. Ambassador to the United Nations Susan Rice withdraws her name from consideration
    to be nominated U.S. Secretary of State, following increasing opposition to her
    nomination by Republican members of the Senate. (MSNBC) (Al Jazeera)
  - The Bangladeshi Opposition calls a general strike over restoration of a caretaker
    administration with reports of explosions and clashes between police and protesters
    in the capital Dhaka. (AP via Washington Post)
  - Britain's Parliamentary Commissioner for Standards launches an investigation into
    expenses claimed by British Culture Secretary Maria Miller. (BBC) (The Guardian)
  - The British government pays £2.23 million to the family of Sami al-Saadi, who
    with his wife and young children, was abducted with the help of MI-6, forced onto
    a plane and secretly flown to Tripoli, where he was tortured for years by the
    security police of the former dictator Muammar Gaddafi. (The Guardian) (Al Jazeera)
  Science and technology:
  - North Korea's first satellite successfully put into orbit, Kwangmyŏngsŏng-3 Unit
    2, appears to be spinning out of control, according to U.S. officials. South Korean
    sources later deny the report, saying the satellite appears to be orbiting Earth
    normally. (NBC News)
  - U.S. space agency NASA admits it posted online a photograph taken from the International
    Space Station of an Indian mountain Saser Muztagh, claiming it as Mount Everest.
    With Nepalese netizens left puzzled by this, it took a Nepalese expert to point
    out the agency's inaccuracy. (BBC)
  Sport:
  - English football club Chelsea to face Brazil's Corinthians in the 2012 FIFA Club
    World Cup final on 16 December, after 3–1 win over Mexican club Monterrey in the
    semifinal. (FIFA) (ESPN) (The Guardian)
  - São Paulo FC are crowned champions of the 2012 Copa Sudamericana after Argentine
    club Tigre refused to take to the field for the second half of the second leg
    in Brazil, claiming they were threatened at gunpoint by security officials at
    the Estádio do Morumbi, which was overlooked as a host stadium for the 2014 FIFA
    World Cup. (ESPN) (BBC) (CONMEBOL)
  - Maurice Herzog, the French mountaineer, who was the first person to climb a mountain
    above 8000 metres when he climbed Annapurna with Louis Lachenal in 1950, dies
    at the age of 93. (CNN)
