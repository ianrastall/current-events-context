Date: '2012-07-06'
Source_URI: Portal:Current events/2012 July 6
Intelligence_Payload:
  Armed conflict and attacks:
  - 'Syrian uprising (2011-present): French Foreign Minister Laurent Fabius states
    that a Syrian commander in the National Guard, Manaf Tlass who fled to Turkey
    some days ago, is on his way to Paris. (BBC)'
  - A United Nations peacekeeper from India is killed in the eastern Congo. (AP via
    San Jose Mercury News)
  - A US drone missile strike kills four suspected militants near Miran Shah, Pakistan.
    (AP)
  - About 10 aid workers, some working for the United Nations, are arrested by authorities
    in western Myanmar where sectarian clashes killed dozens of people last month.
    (CNN)
  - Gunmen fire at a helicopter carrying voting material for tomorrow's election,
    killing one person in Libya. (BBC)
  Business and economy:
  - Associated Press reports that Yahoo! and Facebook have resolved a patent dispute.
    (AP via The Digital Times)
  - The United States Department of Labor monthly jobs report shows that the US economy
    added 80,000 jobs in June. (MSNBC)
  Disasters:
  - More than 80 flood alerts are issued in the United Kingdom as the north of England
    and East Anglia prepares for torrential rain. (Sky News)
  Law and crime:
  - Former de facto President of Argentina Jorge Videla and General Reynaldo Bignone
    are found guilty of overseeing the systematic theft of at least 400 babies from
    political prisoners during military rule's Dirty War. (BBC)
  - British police arrest six men from the West Midlands and one from South Yorkshire
    on suspicion of terrorist offences. (AP via Google)
  - Gunmen kill 18 people and injure another two in an attack on a roadside restaurant
    in the Pakistani town of Turbat in Balochistan province. (AP via Washington Post)
  - Britain's Serious Fraud Office launches a criminal investigation into the Libor
    scandal. (BBC)
  Politics and elections:
  - For the second time in history and with the same person, the Parliament of Romania
    votes to suspend President Traian Băsescu from office. On 29 July 2012 he will
    face a national referendum for his dismissal. (BBC)
  - After a partial vote recount, Enrique Peña Nieto is confirmed as the winner of
    the 2012 Mexican presidential election (BBC)
  - Rep. Thaddeus McCotter, R-Mich., announces his resignation from the United States
    House of Representatives. (Washington Post)
  - The California State Senate votes to approve funding for a bullet train between
    Los Angeles and San Francisco. (BBC)
  Sport:
  - Major League Soccer star David Beckham, the former English soccer team captain,
    is banned for one match after committing an act of violence on the pitch. (BBC)
  - Andy Murray makes it to the final of the 2012 Wimbledon Championships – Men's
    Singles, becoming the first Briton to do so in 74 years. (BBC)
  - Jonny Marray makes it to final of the men's doubles at Wimbledon, becoming the
    first Briton to do so in 52 years. (BBC)
  - Louis van Gaal is selected as the new manager of the Netherlands football team,
    replacing Bert van Marwijk who resigned after increasing criticism of his team's
    performances during the UEFA Euro 2012. (FIFA)
