Date: '2012-07-17'
Source_URI: Portal:Current events/2012 July 17
Intelligence_Payload:
  Business and economy:
  - Marissa Mayer, who was a top executive at Google for the past 13 years, is appointed
    Yahoo! Inc.'s CEO. (AP)
  Law and crime:
  - The Syrian consulate in Almaty, Kazakhstan, is seriously damaged by a fire which
    its staff blame on an arson attack. (AFP via Radio Free Europe)
  - An Afghan soldier, Abdul Saboor, who killed five French soldiers in a remote part
    of Kapisa province in January 2012, is sentenced to death by an Afghan military
    court. (BBC)
  - Several 1-inch needles are found in sandwiches on multiple Delta Air Lines flights
    from Amsterdam Airport Schiphol to the United States. The FBI and Dutch authorities
    launch a criminal investigation. (CNN)
  - A pilot for SkyWest Airlines on administrative leave attempts to steal a Bombardier
    CRJ200 at St. George Municipal Airport in the U.S. state of Utah, killing himself
    after. (CNN)
  - Seventeen people are wounded after being shot in a bar in Alabama, United States.
    (SMH)
  Disasters:
  - A train derails south of Egypt's capital Cairo, injuring at least 15 people. (BBC)
  Politics and elections:
  - The National Forces Alliance, led by interim Prime Minister Mahmoud Jibril, wins
    39 out of 80 seats reserved for political parties in the Libya's first elections.
    (BBC)
  - North Korea announces the appointment of Hyon Yong-chol as the new head of the
    Korean People's Army, replacing Ri Yong-ho. (BBC)
  - Kadima party leaves Netanyahu's government due to a dispute concerning military
    conscription for ultra-Orthodox Jews in Israel. (BBC)
  Science:
  - Three astronauts, Sunita Williams of the United States, Yuri Malenchenko of Russia
    and Aki Hoshide of Japan, arrive at the International Space Station for a three
    month visit. (Space.com)
  Sport:
  - The International Cycling Union (UCI) announces that Fränk Schleck failed a drugs
    test at the Tour de France; he withdraws from the event. (BBC)
