Date: '2012-07-11'
Source_URI: Portal:Current events/2012 July 11
Intelligence_Payload:
  Armed conflict and attacks:
  - 'Mexican Drug War: The Mexican newspaper El Mañana from the northern city of Nuevo
    Laredo will stop reporting on Mexico''s drug-related violence after a second grenade
    attack at its installations. (Huffington Post)'
  - United Nations peacekeepers are redeployed to the Congolese city of Goma to protect
    it from March 23 Movement rebels. (UPI)
  - A suicide bombing at a police academy in the Yemeni capital of Sana'a kills at
    least 20 people. (BBC)
  - An ambush by suspected Abu Sayyaf rebels kills 6 rubber plantation workers and
    injures a further 22 in the southern Philippines. (AP via Washington Post)
  - 520 men and boys killed in the Srebrenica massacre in 1995 are buried in Potočari,
    Bosnia and Herzegovina. (IOL)
  Syrian uprising (2011–present):
  - 56 people are reportedly killed by the Syrian army, including a Red Crescent worker.
    (Naharnet)
  - Syria's ambassador to Iraq, Nawaf al Fares, defects. (CNN) (Reuters)
  - Syrian opposition figures arrive in Russia for talks with the Russian government.
    (Ghana Broadcasting Corporation)
  Arts and culture:
  - Artists sign a letter accusing the European Commission of "breaking promises"
    on the matter of missing royalties. (BBC)
  - A rare giant panda born naturally in captivity at a Tokyo zoo dies after only
    six days, prompting widespread mourning in Japan. (National Post)
  Business and economy:
  - Bolivia revokes a mining concession to Canada's South American Silver Corporation
    after violent protests by Quechua people. (Al Jazeera)
  International relations:
  - Japan lodges a formal protest with China after the presence of the latter's patrol
    boats near the disputed Senkaku Islands. (BBC)
  - ASEAN nations and China fail to agree on a code of conduct designed to ease tensions
    over territorial disputes in the South China Sea. (Al Jazeera)
  - The Canadian government warns Iran not to use its embassy in Ottawa to recruit
    expatriates in Canada to serve the Islamic Republic’s interests. (National Post)
  Law and crime:
  - Court documents reveal former FIFA president João Havelange had accepted bribes
    upwards of 1.5m Swiss francs. (BBC)
  - Lee Sang-deuk, the elder brother of South Korean president Lee Myung-bak, is arrested
    in Seoul on bribery charges. (AP via The Washington Post)
  - British police widen their phone-hacking inquiry with new arrests of journalists
    from newspapers not owned by News Corporation, which previously has been the focus
    of the investigation. (Los Angeles Times)
  Politics and elections:
  - Russia's lower parliament approves a bill creating a list of blacklisted websites,
    amid fears of censorship. (AFP via Google News) (Russia Today)
  - Chinese authorities order internet video providers to prescreen all videos before
    making them available. (Times of India)
  - The Republican-controlled United States House of Representatives votes for the
    thirty-third time to repeal the Patient Protection and Affordable Care Act, commonly
    known as Obamacare; the measure is not likely to pass the Democratic-controlled
    United States Senate. (USA Today) (CBS News)
  - Police clash with demonstrators in Madrid as Prime Minister Mariano Rajoy introduces
    new widescale cuts. (BBC) (Reuters)
  - Police clash with Chilean fishermen opposed to a new law said to favour larger
    companies; Chilean police use tear gas and water cannon to break up demonstrations
    in Valparaíso. (BBC)
  Science:
  - Astronomers announce the discovery of S/2012 P 1, the fifth moon of Pluto. (Fox
    News)
  Sport:
  - British Armed Forces are on standby to provide an extra 3,500 troops to help with
    security at the 2012 Olympics. (BBC)
