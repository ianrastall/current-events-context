Date: '2012-07-28'
Source_URI: Portal:Current events/2012 July 28
Intelligence_Payload:
  Armed conflict and attacks:
  - Tanks of the Syrian Army commence attacks against the rebel-held city of Aleppo.
    (BBC)
  - Two NATO service members are killed in an attack in eastern Afghanistan. (USA
    Today)
  - Ethnic clashes in southern Ethiopia lead to the killing of at least 18 people
    and wounding of 12 others. (BBC)
  Arts and culture:
  - The sunken German U-Boat U-550 is discovered off the coast of Massachusetts, United
    States. (Der Spiegel)
  Politics and elections:
  - Andriy Shevchenko announces his retirement from football in order to go into politics.
    (BBC)
  2012 Summer Olympics:
  - In archery, Im Dong-Hyun of South Korea sets a new world record at Lord's Cricket
    Ground. (AP via New Zealand Herald)
  - In swimming, Ye Shiwen of China sets a new world record in the women's 400 individual
    medley. (AP via ABC News)
  - In swimming, Cameron van der Burgh of South Africa sets a new Olympic Record at
    the men's 100m breaststroke. (Chicago Tribune)
  - In swimming, Australia sets a new Olympic Record in the women's 4× 100m freestyle
    relay. (Sport Live)
