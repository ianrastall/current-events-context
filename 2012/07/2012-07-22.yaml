Date: '2012-07-22'
Source_URI: Portal:Current events/2012 July 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Madagascan Army clashes with mutinous soldiers near the airport in the capital
    Antananarivo. (Al Jazeera)
  - Car bombs kill 20 people and wound 80 in Mahmudiye, Madaen and Najaf in Iraq.
    (Reuters)
  Syrian uprising (2011–present):
  - Turkey dispatches reinforcements at its border with Syria as another border crossing
    is captured by rebels. (Kuwait News Agency)
  - Clashes take place between Syrian troops and armed Kurdish fighters in Qamishli.
    (Rudaw)
  - Fighting continues in Damascus and Aleppo. (The Guardian)
  - After a four day siege by the opposition forces, the 4th Armoured Division, commanded
    by Maher Assad sweeps through three rebel-held districts of Damascus. (The Daily
    Telegraph via The Vancouver Sun)
  - Four Turkish security forces and four refugees are injured in a riot at a Syrian
    refugee camp in southern Turkey. (Reuters)
  - The Arab League calls on President of Syria Bashar al-Assad to resign quickly
    to end the bloodshed. (Al-Jazeera)
  Disasters and accidents:
  - At least 37 people are killed in torrential rains in the Chinese capital Beijing.
    (Xinhua)
  - A moderately strong earthquake with a magnitude of 5.0 hits Kahramanmaraş, Turkey.
    (The Republic)
  - A military helicopter crashes in Hakkari province, Turkey, killing three soldiers
    and injuring four others. (AP via The Republic)
  - Thirteen are killed and another 10 are injured when a pickup truck crashes in
    Texas. (CNN)
  Law and crime:
  - The Libyan Olympic committee chief kidnapped a week ago, Ahmad Nabil al-Alam,
    is released unharmed. (BBC)
  Politics and elections:
  - Pranab Mukherjee is elected as the new President of India. (Hindustan Times)
  - U.S. President Barack Obama visits the town of Aurora, Colorado, to console the
    families of victims of the recent shooting that left 12 dead and dozens injured.
    (AP via Fox News)
  Sports:
  - Pennsylvania State University says that the on-campus statue of former Nittany
    Lions football coach Joe Paterno will be taken down as a result of the Penn State
    child sex abuse scandal. (CNN)
  - Bradley Wiggins becomes the first British cyclist to win the Tour de France after
    coming first in this year's race. (BBC)
  - In golf, Ernie Els wins the 2012 Open Championship. (ESPN)
