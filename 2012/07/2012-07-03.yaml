Date: '2012-07-03'
Source_URI: Portal:Current events/2012 July 3
Intelligence_Payload:
  Armed conflict and attacks:
  - At least 25 people are killed and 40 wounded in a truck bombing in the market
    place of the Iraqi city of Diwaniyah. (AP via Google News)
  Syrian uprising (2011-present):
  - A Human Rights Watch report claims that Syrian intelligence agencies are running
    27 torture centers across Syria. (Reuters via Yahoo! News) (CNN)
  Business and economy:
  - Bob Diamond resigns as the Chief Executive of British bank Barclays following
    a scandal in which the bank tried to manipulate the Libor and Euribor interest
    rates systems. (BBC)
  Disasters:
  - A major earthquake strikes New Zealand with minor damage reported. (The New Zealand
    Herald) (ABC News)
  International relations:
  - Pakistan decides to reopen key NATO supply routes into Afghanistan after U.S.
    Secretary of State Hillary Clinton apologized for a NATO airstrike that killed
    26 Pakistani soldiers and officials in November 2011. (BBC)
  Politics and elections:
  - Police search the home and offices of former French president Nicolas Sarkozy
    as part of a judicial investigation into financial relations between his political
    camp and L'Oréal heiress Liliane Bettencourt. (Reuters)
  - The current governing coalition in Romania, the Social Liberal Union, starts a
    fast-paced parliamentary offensive against President Traian Basescu by dismissing
    the leaders of both chambers of Parliament. (Reuters)
  - Hundreds of activists demonstrate in Ramallah to protest against the violent dispersal
    of two similar rallies at the weekend in a rare expression of public discontent
    with the ruling party of the Palestinian Authority headed by Mahmud Abbas. (AFP)
  Sport:
  - American gambler Antonio Esfandiari wins the 2012 World Series of Poker $1,000,000
    Buy-In "The Big One for One Drop" with the highest prize money in poker of $18.3
    million. (AP via NBC Sports)
