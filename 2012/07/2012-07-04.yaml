Date: '2012-07-04'
Source_URI: Portal:Current events/2012 July 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - A gunman, who was facing eviction from his apartment, is believed to have seized
    and killed four hostages in the German city of Karlsruhe before turning the gun
    on himself. (BBC)
  - Eleven people are killed in further unrest in Iraq, including eight people in
    a bombing of a Baghdad marketplace. (The Times of India)
  Syrian uprising (2011–present):
  - Syrian President Bashar al Assad accuses neighboring Turkey of supporting "terrorists"
    and contributing to the bloodshed in Syria. (Voice of America)
  Arts and culture:
  - China accuses the Vatican of obstructing the development of Catholicism after
    the latter threatens to excommunicate new bishops ordained without papal approval.
    (Washington Post)
  - British broadcaster George Entwistle is named as the next Director-General of
    the BBC, beginning in autumn 2012. (BBC)
  - Archaeologists in Israel discover a mosaic floor depicting the biblical figure
    of Samson and a Hebrew inscription in an ancient synagogue in the Galilee region.
    (CNN)
  Business and economy:
  - Standard & Poor's raises the credit rating of the Philippines to BB+. (Reuters)
  Libor inter-bank interest rate:
  - Bob Diamond, former CEO of Barclays, gives evidence to the Parliament of the United
    Kingdom's Treasury Select Committee on the bank's manipulation of Libor and Euribor
    interest rates. (RTÉ) (BBC)
  - Chancellor George Osborne accuses ministers in Gordon Brown's government of attempting
    to manipulate interest rates during the recession. (The Guardian)
  International relations:
  - Egyptian officials deny that newly elected Egyptian President Mohammed Morsi will
    visit Iran to attend a conference. (The Times of Israel)
  Law and crime:
  - Two Iranian suspects held by Kenyan police reportedly confess that they planned
    to detonate a series of 30 bombs simultaneously across Kenya. (Kenya Standard
    Media)
  - The Qatari-owned satellite channel, Al Jazeera, reports that traces of radioactive
    polonium-210 have been found in some personal effects of former PLO Chairman Yasser
    Arafat, who died in 2004; the PLO and Arafat’s widow agree to his exhumation to
    investigate if he had been poisoned. (Huffington Post) (CNN) (YNet News)
  - Spain's national court opens a criminal investigation into last year's listing
    of Bankia SA on the stock market, with former chairman Rodrigo Rato and 32 others
    listed as suspects. (Wall Street Journal)
  Politics and elections:
  - Hundreds of protesters clash with police in the Ukrainian capital Kiev and the
    parliament speaker offers to resign over moves to boost the status of the Russian
    language in the country. (Al Jazeera)
  - The Chinese city of Shifang cancels the planned development of a copper plant
    after thousands of people demonstrated. (CBC)
  - The European Parliament rejects the Anti-Counterfeiting Trade Agreement in a session
    with more than 470 votes against the treaty. (CNet)
  - 'Mexican general election, 2012: Over half of the ballot boxes in the Presidential
    election will have to be recounted following the discovery of voting irregularities.
    (AP via Fox News)'
  - Palestinians in Ramallah protest outside the offices of Palestinian Authority
    President Mahmoud Abbas against the 1993 Oslo Peace Accords between Israel and
    the PLO. (The Media Line)
  Science and technology:
  - CERN scientists present recent results from CMS and ATLAS experiments consistent
    with the existence of a Higgs boson particle. (BBC) (CERN press release)
  Sport:
  - The Scottish Premier League refuses to admit Newco Rangers, the team that emerged
    from the ashes of Rangers F.C. following its disintegration. (BBC)
