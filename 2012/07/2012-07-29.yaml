Date: '2012-07-29'
Source_URI: Portal:Current events/2012 July 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - A security agent serving for the Italian embassy in Sana'a is kidnapped by gunmen
    in Yemen. (BBC)
  Syrian civil war:
  - Fierce fighting continues in Syria's second city of Aleppo. (Al Jazeera)
  - Jordan opens its first camp for refugees fleeing Syria. (Petra News Agency)
  Disasters and accidents:
  - Tropical Storm Khanun kills 88 people and leaves 60,000 homeless in North Korea,
    according to state media. (Business Week)
  International relations:
  - The Democratic Republic of the Congo accuses Rwanda of backing rebels hostile
    to the Congolese government. (Reuters)
  Law and crime:
  - Ten more Islamists are arrested in the United Arab Emirates as part of a crackdown
    on dissidents, according to activists. (Times of India)
  Politics and elections:
  - Thousands of anti-nuclear protesters form a human chain around the Japanese parliament
    in Tokyo. (Radio Television Hong Kong)
  - Thousands of people protest against plans to introduce national patriotism lessons
    in Hong Kong schools, calling it Chinese propaganda. (Bangkok Post)
  - Voters in Romania go to the polls for an impeachment referendum against the President
    of Romania Traian Băsescu. (BBC)
  Science:
  - New research published in this week's Nature Geoscience details a mechanism by
    which carbon is drawn down from the surface of the Southern Ocean to deeper water
    below. (France 24) (Phys.org)
