Date: '2012-07-24'
Source_URI: Portal:Current events/2012 July 24
Intelligence_Payload:
  Disasters:
  - Hong Kong and China's Guangdong Province is hit by Category 4 Typhoon Vicente,
    resulting in scores of people injured, cancellation of flights and closure of
    businesses. (Reuters) (AAP via Herald Sun)
  Law and crime:
  - Four barrels containing 248 human fetuses are found in a forest in Russia's Sverdlovsk
    region. (USA Today)
  - A man with a gun crawls beneath a dock and enters the grounds of the University
    of Connecticut's Avery Point campus. The man later commits suicide. (MSNBC)
  - Britain's Crown Prosecution Service confirms that eight people, including Andy
    Coulson and Rebekah Brooks, will face charges relating to the News International
    phone hacking scandal. (BBC)
  Politics and elections:
  - The President of Ghana, John Atta Mills, dies and is replaced by Vice-President
    John Dramani Mahama. (Euronews), (Reuters)
  - Egyptian President Mohamed Morsi appoints the Minister of Water Resources and
    Irrigation, Hisham Qandil, to the position of Prime Minister and asks him to form
    the new government. (BBC)
