Date: '2012-07-26'
Source_URI: Portal:Current events/2012 July 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb explosion in a crowded market in northwestern Pakistan close to the Afghan
    border kills at least seven people. (USA Today)
  - Insurgents attack an Iraqi Army checkpoint north of Baqubah, downing a helicopter
    and sparking an intense firefight. At least 19 people are reported killed, including
    11 policemen and a soldier. (San Francisco Chronicle)
  Syrian civil war:
  - The Syrian Army is reportedly preparing for a large-scale offensive in Aleppo,
    with the US State Department citing credible reports of tank columns moving into
    the city, backed by special forces, helicopter gunships and fixed-wing aircraft.
    (Al-Jazeera)
  - The pro-government newspaper Al-Watan calls the incoming operation 'the mother
    of all battles'. (Al-Jazeera)
  - At least 200 people are killed in violence throughout the country according to
    the Local Coordination Committees of Syria. The toll is highest in Aleppo and
    the capital Damascus, where a total of 94 are killed. Dozens of casualties are
    reported from Idlib, Daraa and Homs as well. (CNN)
  - Ikhlas al Badawi, Aleppo MP, a Baathists and an Assad loyalist, defects to Turkey
    with her six children. (Albawaba) (Reuters)
  Business and economy:
  - Japanese businessman Kenichi Watanabe resigns as the CEO of financial company
    Nomura Holdings following a series of insider trading scandals. (Reuters)
  - President of Ivory Coast Alassane Ouattara meets with his French counterpart François
    Hollande in Paris to finalize a deal that will forgive a debt of nearly 4.7 billion
    dollars owed to the former colonial power.(Al Jazeera)
  Disasters:
  - Sixteen thousand people become homeless in North Korea after Tropical Storm Khanun
    hit last week. (BNO News)
  - Officials in Beijing raise the death toll from weekend flooding to 77 after rescuers
    located additional bodies. This follows criticism, including from the Chinese
    state media, of the city's handling of the storm.(Wall Street Journal)
  Law and crime:
  - Former Chinese political leader Bo Xilai's wife, Gu Kailai, and their employee
    Zhang Xiaojun are charged with murder of British businessman Neil Heywood. (BBC)(Reuters)
  - Four men are arrested for the murder of Saudi Arabian diplomat, Khalaf Ali, in
    Dhaka, Bangladesh, on 6 March 2012. (Chicago Tribune)
