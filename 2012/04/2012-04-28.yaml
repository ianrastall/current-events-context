Date: '2012-04-28'
Source_URI: Portal:Current events/2012 April 28
Intelligence_Payload:
  Armed conflict and attacks:
  - '2012 Dnipropetrovsk explosions: Ukrainian president Viktor Yanukovich promises
    an investigation into the incident that injured 30 people. (Reuters)'
  2011 Syrian uprising:
  - Syrian activists claim that the Syrian Armed Forces killed ten people in the village
    of Bakha north of Damascus. (Reuters)
  - The Lebanese Navy boards a ship from Libya allegedly carrying weapons bound for
    the opposition in Syria. (Al Jazeera)
  - Gunmen in inflatable dinghies attack a military unit on the Syrian coast – the
    first seaborne assault since the start of the uprising. (euronews)
  - Syria accuses the United Nations Secretary-General Ban Ki-moon of "encouraging"
    attacks on the government. (AP via Google)
  War in Afghanistan:
  - Two bodyguards and two insurgents are killed in an attack on the Governor of Afghanistan's
    Kandahar Province. (AFP via Yahoo News Australia)
  Disasters:
  - One person dies and more than 110 are injured when a tent collapses at a restaurant
    near Busch Stadium in St. Louis, Missouri. (CNN)
  International relations:
  - 'Egypt–Saudi Arabia relations: Saudi Arabia shuts its embassy and consulates in
    Egypt following protests over an Egyptian human rights lawyer Ahmed al-Gizawi
    being detained in Saudi Arabia. (BBC)'
  - The European Union opens an office in Burma in recognition of recent democratic
    reforms. (The Hindu)
  - Mali's ruling junta rejects a West African regional plan to extend the life of
    an interim civilian government. (Reuters)
  Politics and elections:
  - Blind Chinese human rights activist Chen Guangcheng – who fled from house arrest
    – reportedly takes refuge in the U.S. embassy in Beijing. (Al Jazeera)
  - Malaysian police use tear gas and water cannon to disperse thousands of protesters
    gathered in Kuala Lumpur calling for free and fair elections. (The New York Times)
    (AFP via Google News)
