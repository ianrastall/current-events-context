Date: '2012-04-02'
Source_URI: Portal:Current events/2012 April 2
Intelligence_Payload:
  Armed conflict and attacks:
  - The Colombian leftist group FARC releases its last remaining police and military
    captives. (BBC)
  Business and economy:
  - The U.S. Federal Trade Commission allows the proposed merger of two large firms
    within the market for pharmacy benefit management, Express Scripts and Medco Health
    Solutions, despite the arguments of many that the degree of concentration that
    will create in the PBM market will prove unhealthy. (FTC)
  Disasters:
  - A twin engine UTair Aviation ATR-72 crashes in western Siberia near the city of
    Tyumen with at least 31 people dead of the 43 on board. (AFP via Nine-MSN) (BBC)
    (Reuters)
  International Relations:
  - On the 30th anniversary of the Falklands War between the United Kingdom and Argentina,
    Argentina threatens action against United States and United Kingdom banks, while
    UK Prime Minister David Cameron calls Argentina's 1982 invasion "a profound wrong".
    (Al Jazeera)
  Law and crime:
  - The three widows and two daughters of Osama bin Laden are convicted of illegally
    living in Pakistan and sentenced to 45 days in jail and fined $114 each. (BBC)
  - A mass shooting at Oikos University at Oakland, California leaves seven people
    dead and three injured, according to a police spokesperson. (CNN) (BBC) (KTVU)
  Politics and elections:
  - Burma's National League for Democracy claims to have won 43 of 45 seats contested
    yesterday in by-elections. (CNN)
  - Pál Schmitt resigns as President of Hungary after his doctorate is revoked in
    a plagiarism scandal. (AP via Washington Post)
  Science:
  - The data from the 1940 United States Census are released including information
    on 132 million people. (Washington Post) (Daily Mail)
  Sports:
  - In basketball, the Kentucky Wildcats win the 2012 NCAA Men's Division I Basketball
    Tournament, defeating the Kansas Jayhawks 67-59. (Washington Post)
