Date: '2012-04-29'
Source_URI: Portal:Current events/2012 April 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Revolutionary Armed Forces of Colombia kill four members of Colombian Army on
    a mission to destroy cocaine laboratories in Caquetá Department with another four
    soldiers, a police officer and a French journalist missing. (BBC)
  - Four officials are killed in rebel attacks in northern Burma. (The Australian)
  - Seven people are killed in a three-way shootout between rival drug cartels and
    the authorities in the Mexican state of Sinaloa, the home-state of Joaquín Guzmán
    Loera, the country's most-wanted drug lord. (Fox News)
  - Lebanon confiscates a shipment of arms and ammunition meant for Syrian rebels
    and arrests 11 crewmembers. (BBC)
  African church attacks:
  - Several explosions are reported near a Christian service at Bayero University
    Kano in the northern Nigerian city of Kano, with at least 16 people killed. (AP
    via Google News) (AP)
  - At least five people are killed in an attack on a Church of Christ in the Nigerian
    city of Maiduguri, the spiritual home of the Boko Haram radical Islamist sect.
    (AP)
  - One person is killed and 10 injured in a grenade attack at a church in Nairobi,
    Kenya. (AFP via Google News)
  Disasters:
  - At least seven people die following a bus crash in Japan's Gunma Prefecture north
    of Tokyo. (NHK World)
  - Seven people are killed, including three children, when a vehicle they were in
    flipped over on the Bronx River Parkway in The Bronx, New York City. (CNN)
  International relations:
  - The final deadline (no more extensions) for the total destruction of chemical
    weapons stockpiles under the international Chemical Weapons Convention is reached.
    (RIA Novosti)
  - The United Nations Secretary-General Ban Ki-moon visits Burma. (CNN)
  - '2012 Malian coup d''état: Mali coup leader Amadou Haya Sanogo rejects a decision
    by the Economic Community of West African States to deploy troops to the country.
    (France 24)'
  - Ana Maria Gomes, a Member of the European Parliament, is denied access to Bahrain.
    (Reuters)
  Law and crime:
  - Sudan arrests four foreigners in the disputed border region with South Sudan on
    accusations of spying. (Arab News)
  - Chinese authorities begin to round-up associates of human rights activist Chen
    Guangcheng in light of his escape from house arrest. (BBC) (Hindustan Times)
