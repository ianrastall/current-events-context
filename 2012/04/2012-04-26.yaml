Date: '2012-04-26'
Source_URI: Portal:Current events/2012 April 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Syrian uprising (2011–present): Nearly 70 people are killed in rocket attacks
    by the Syrian army on the city of Hama, including many children. (Al Jazeera)'
  - '2011–2012 Bahraini uprising: Mourners and police clash at the funeral of a protester
    who was killed last week. (IOL)'
  - Seven people are killed in Nigeria after a suicide bomber detonates a bomb in
    his car. The attacks took place in Abuja, at the This Day newspaper offices. (CBS)
  - Three members of the United States Armed Forces are killed in a bombing in eastern
    Afghanistan. (AP via Google News)
  Business and economy:
  - Indonesia suspends imports of beef from the United States after a dairy cow with
    mad cow disease is discovered in California. (Reuters via Yahoo News)
  - The Argentine Senate passes with an overwhelming majority a bill submitted by
    president Cristina Fernández de Kirchner to nationalise 51% of YPF. (Reuters)
  Disasters:
  - A Kamov Ka-26 helicopter crashes in Tulcea County, Romania, killing all five Ukrainians
    on board. (ABC News)
  International relations:
  - Missiles displayed at a recent North Korean parade are reportedly fakes, according
    to analysts. (The Telegraph)
  Law and crime:
  - In the midst of the ongoing trial against Anders Behring Breivik for his actions
    on July 22, 2011, more than 40,000 people gather on Youngstorget in Oslo to show
    support for all those affected. (TV2).
  - Japanese powerbroker Ichirō Ozawa of the ruling Democratic Party is cleared of
    charges of breaking fundraising laws. (Reuters)
  - The Supreme Court of Pakistan finds Prime Minister Syed Yousaf Raza Gillani guilty
    of contempt of court but he is given only a token sentence of imprisonment lasting
    less than a minute. (NDTV) (BBC)
  - The Special Court for Sierra Leone at The Hague delivers its verdict in the trial
    of former President of Liberia Charles Taylor on charges of arming Sierra Leone's
    rebels in return for "blood diamonds" in the 1990s. He is convicted on charges
    related to aiding and abetting war crimes but acquitted of charges of ordering
    them. (AFP via France 24) (BBC)
  - Revelations surface that ousted Chinese official Bo Xilai spied on Chinese President
    and Communist Party leader Hu Jintao. (The New York Times)
  - In a second day of evidence, Rupert Murdoch tells the Leveson Inquiry there was
    a "cover-up" at the News of the World, but that it was kept hidden from him. (BBC)
  Sport:
  - In American football, the National Football League draft commences in New York
    City's Radio City Music Hall, with quarterbacks Andrew Luck and Robert Griffin
    III the first two players chosen. (Wall Street Journal)
