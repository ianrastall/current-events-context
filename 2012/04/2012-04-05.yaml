Date: '2012-04-05'
Source_URI: Portal:Current events/2012 April 5
Intelligence_Payload:
  Armed conflict and attacks:
  - A rocket fired from Egypt's Sinai desert hits the Israeli city of Eilat but causes
    no injuries or property damage. (Reuters)
  - Mali's Azawad National Liberation Movement declares an end to military activities,
    claiming that they have captured enough territory to form their own state. (BBC)
  - Syrian Army troops launch a fierce attack on the Damascus suburb of Douma. (AP
    via WVEC)
  - Rival militias cease fighting in the town of Zuwara in western Libya after the
    National Transitional Council claims a ceasefire. (Reuters Alertnet)
  Business and economy:
  - A Chinese company that insures ships announces it will stop indemnifying tankers
    carrying Iranian oil. This represents a continued tightening of world sanctions
    on Iran. (Reuters)
  Disasters:
  - At least 14 people die as a result of severe storms in Argentina, with Buenos
    Aires Province being the hardest hit. (BBC)
  Law and crime:
  - Sky News admits illegally hacking emails belonging to members of the public on
    two separate occasions. (BBC)
  - '2010–2012 Greek protests: Riot police and protesters clash in Athens, hours after
    a 77-year-old pensioner''s suicide outside parliament. (BBC)'
  - International internet group Anonymous protests censorship by targeting Chinese
    websites, including government bureaus in several Chinese cities. (Al Jazeera)
    (AP via The Irish Times)
  - Russian businessman Victor Bout is sentenced to 25 years in prison for smuggling
    weapons to the Colombian FARC guerilla movement. (RT)
  Politics and elections:
  - Malawi's President Bingu wa Mutharika is taken to Lilongwe's intensive care unit
    after cardiac arrest and is reported to have died. (BBC) (Reuters)
  - Umberto Bossi resigns as the head of the Italian Northern League following a corruption
    scandal. (BBC)
