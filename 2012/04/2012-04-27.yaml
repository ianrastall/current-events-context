Date: '2012-04-27'
Source_URI: Portal:Current events/2012 April 27
Intelligence_Payload:
  Armed conflict and attacks:
  - At least four explosions hit the Ukrainian city of Dnipropetrovsk with at least
    27 people injured. (BBC)
  - A suicide bomber kills at least five people in the Syrian capital Damascus. (AP
    via Atlanta Journal Constitution)
  - The Revolutionary Armed Forces of Colombia (FARC) kills eight people in two separate
    attacks. (BBC)
  International relations:
  - Former Al-Qaeda chief Osama bin Laden's wives and children are deported from Pakistan
    to Saudi Arabia. (Al-Jazeera)
  Politics and elections:
  - For the second time in post-revolutionary history the government of Romania falls
    in a no-confidence motion after just over two months following its appointment
    by the Parliament, while the Czech Republic government survived its confidence
    by just 12 votes. (AP via Washington Post)(New York Times)
  - Blind dissident Chen Guangcheng escapes house arrest in China. (Wall Street Journal)
  - British Secretary of State for Culture, Media and Sport Jeremy Hunt agrees to
    hand over private emails to the Leveson Inquiry relating to the BSkyB takeover
    as pressure mounts for a separate inquiry into his conduct. (BBC)
  Sport:
  - In association football, Barcelona manager Josep Guardiola announces that he will
    resign at the end of the season. His assistant, Tito Vilanova, is appointed as
    his successor. (ESPN)
