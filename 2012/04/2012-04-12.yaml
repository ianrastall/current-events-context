Date: '2012-04-12'
Source_URI: Portal:Current events/2012 April 12
Intelligence_Payload:
  Armed conflict and attacks:
  - A ceasefire to military operations in the 2011–2012 Syrian uprising comes into
    effect. (AFP via Melbourne Herald-Sun)
  - Agence France-Presse reports that the military of Guinea-Bissau have staged a
    coup against the civilian government. (AFP via Yahoo! News)
  Arts and culture:
  - The Bodleian Libraries of the University of Oxford and the Vatican Library announce
    they will make 1.5 million pages of ancient texts available on the Internet. (Vatican
    Radio)
  - Transport chiefs in London ban a bus advert which suggested gay people could be
    cured. (Evening Standard)
  Business and economy:
  - Sony Corp announces plans to cut 10,000 jobs around the world to reduce costs
    and return the company to profitability. (Reuters)
  - Google says that first quarter earnings rose over 24%, with net profit increasing
    to $8.14 billion. (Business Insider) (Google)
  International relations:
  - Japan and the Philippines are on alert for the North Korean rocket launch over
    the next few days. (AFP via Google News)
  - The Philippines sends another ship to join the current ship it has involved in
    a confrontation with two Chinese surveillance ships on the South China Sea, although
    both sides claim to be committed to a peaceful solution. (BBC) (Wall Street Journal)
  - Indian Maoists release Italian hostage Paolo Bosusco after holding him for nearly
    a month. (NDTV)
  Law and crime:
  - Eighteen people are sentenced to life imprisonment in India for burning people
    alive as part of the 2002 Gujarat violence. (IBN Live)
  - Protesters clash with riot police in the city of Chongqing in southwestern China
    during a protest over economic grievances from the redistricting of Wansheng District.
    (AP via Yahoo!)
  Politics and elections:
  - North Korean leader Kim Jong-un is given two posts in the Workers' Party of Korea
    previously held by his father Kim Jong-Il, including chairman of the party's Central
    Military Commission and a standing member of the Politburo. (BBC)
  - Dioncounda Traore is sworn in as the interim President of Mali, marking a transition
    back to civilian rule following last month's coup. (BBC)
