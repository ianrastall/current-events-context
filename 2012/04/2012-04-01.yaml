Date: '2012-04-01'
Source_URI: Portal:Current events/2012 April 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2011-2012 Syrian uprising: Dozens are killed as the Syrian army bombards the
    city of Homs with artillery fire. (ABC News)'
  Mali:
  - Tuareg rebels seize the town of Gao and the largest military base in Mali amid
    the ongoing Tuareg Rebellion (BBC) (AFP via Google News)
  - Rebels claim to have surrounded Timbuktu. (BBC)
  Arts and Culture:
  - The 2012 Academy of Country Music Awards are held in the US city of Las Vegas,
    Nevada, with the Eli Young Band winning song of the year for "Crazy Girl" and
    Taylor Swift winning Entertainer of the Year. (AP via Access Atlanta) (AP viaHouston
    Chronicle)
  - Feist wins Artist of the Year at the Canadian Juno Awards. (AP via Newsday)
  Disasters:
  - A state of emergency is declared in Fiji as nearly 7000 people are displaced and
    two people have been killed during floods with conditions set to worsen with heavy
    storms expected following Tropical Depression 17F.(AAP via Herald Sun) (AFP via
    Perth Now)
  Politics and elections:
  - Voters in Burma go to the polls for by-elections for 45 seats, with Aung San Suu
    Kyi claiming victory in one election. (BBC) (The Telegraph)
  - The Muslim Brotherhood in Egypt nominates chairman Khairat El-Shater as a candidate
    for the presidential elections in May 2012. (BBC)
  - Former President of Mexico Miguel de la Madrid dies of complications of lung disease
    in Mexico City at the age of 77. (Los Angeles Times)
