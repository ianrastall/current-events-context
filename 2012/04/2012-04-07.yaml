Date: '2012-04-07'
Source_URI: Portal:Current events/2012 April 7
Intelligence_Payload:
  Armed conflict and attacks:
  - The airport at the Yemeni capital Sana'a is closed after forces loyal to General
    Mohammed Saleh al-Ahmar, the former Chief of the Air Force and half-brother of
    former President Ali Abdullah Saleh, threaten to attack aircraft. (Al Jazeera)
  - Burmese President Thein Sein meets representative from the Karen National Union,
    in an attempt to end one of the world's longest running civil conflicts. (BBC)
  Disasters:
  - An avalanche buries about 130 Pakistani Army soldiers near the Siachen Glacier
    in the Himalayas near the border with India. (MSNBC)
  Law and crime:
  - Hamas executes three men (of whom one was convicted of collaborating with Israel)
    in the Gaza Strip. (AFP via Al-Arabiya)
  Politics:
  - Joyce Banda becomes the President of Malawi following the death of Bingu wa Mutharika.
    (Reuters via Yahoo)
  - The United Kingdom Home Office is subjected to an attack believed to be from the
    Anonymous computer hacking group. (BBC)
  Sport:
  - The 158th Boat Race between Oxford and Cambridge is stopped mid-race due to a
    swimmer in the water. After a clash of oars at the restart, Cambridge won easily.
    (BBC) (Yahoo)
