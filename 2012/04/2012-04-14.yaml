Intelligence_Payload:
  Armed conflicts and attacks:
  - Anti-austerity demonstrators take place at the ruling Labour Party's centenary
    conference with protesters using a coffin draped in the Irish tricolour. (The
    Belfast Telegraph) (The Irish Times) (Irish Examiner)
  - '2011–2012 Bahraini uprising: A 15-year-old is shot through the chest by police
    in Bahrain. (Al Jazeera)'
  - Sudanese forces advance on the town of Heglig that is occupied by South Sudanese
    forces during days of cross-border clashes. (Al Jazeera)
  Disasters:
  - Tornadoes touch down in the southern central Great Plains of the United States,
    with hail falling in Oklahoma. (CNN)
  International relations:
  - South Korean warships search the Yellow Sea for rocket debris from the failed
    North Korean Kwangmyŏngsŏng-3 launch yesterday. (Jakarta Post)
  - Iran and world powers, including the United States, Russia, and China, begin talks
    about Iran's nuclear program. (New York Times)
  Sport:
  - Former Italy under-21 footballer Piermario Morosini dies after collapsing face
    down with a suspected heart attack on the pitch. (BBC)
  - Neptune Collonges ridden by Daryl Jacob wins the 2012 Grand National, but the
    race is tinged with sadness following the deaths of this year's Cheltenham Gold
