Date: '2012-04-18'
Source_URI: Portal:Current events/2012 April 18
Intelligence_Payload:
  2011–2012 Bahraini uprising:
  - Thousands of pro-democracy demonstrators march through Tubli calling for the downfall
    of the regime and chanting against the Formula 1 Grand Prix, due to be held in
    Bahrain on Sunday. (Al Jazeera)
  - Police fire stun grenades at protesters in a separate rally outside a cultural
    exhibition in Manama amid calls for the release of imprisoned Abdulhadi al-Khawaja,
    being kept alive by intravenous drip. (BBC)
  Arts and culture:
  - The Casoria Contemporary Art Museum in Naples begins burning its artworks due
    to government budget cuts affecting cultural institutions. (BBC)
  - American television personality and producer Dick Clark dies of a heart attack
    at the age of 82. (ABC)
  Business and economy:
  - In the U.S., the Commodity Futures Trading Commission and the Securities and Exchange
    Commission finalize joint rules that will limit which firms must register with
    either or both of those agencies as "swap dealers." (Reuters)
  International relations:
  - Cuba claims U.S. President Barack Obama was forced to use his "imperial veto"
    to stop the summit calling for an end to the U.S. embargo against it. (BBC)
  - North Korea rejects criticism from countries on the United Nations Security Council
    regarding its failed rocket launch, and breaks off an agreement that would see
    it halt testing of nuclear weapons in exchange for food aid. (AFP via Google)
  - Israeli army officer Shalom Eisner, who struck a Danish activist in the face with
    the butt of his gun, is dismissed from his post but not from the Israeli Defense
    Forces. (BBC) (Xinhua) (The Globe and Mail)
  - Senior U.S. officials condemn graphic photos depicting their troops posing with
    the mangled corpses of suspected Afghan suicide bombers on at least two separate
    occasions months apart. The Los Angeles Times defends its publication of the photos
    after being warned against the move by the U.S. military. (Al Jazeera)
  Law and crime:
  - China pledges an investigation into the death of British businessman Neil Haywood,
    and the alleged role of former politician Bo Xilai and his wife. (BBC)
  - In a rare move for courts in the United Kingdom, television cameras are allowed
    into the High Court in Edinburgh to film the sentencing of David Gilroy for the
    murder of Suzanne Pilley. (BBC)
  Sport:
  - Pat Summitt resigns as head coach of the Tennessee Lady Volunteers basketball
    team. (New York Times)
  - Chelsea stun title holders Barcelona with a 1-0 win UEFA Champions League semi-final
    first-leg match in London, Ivorian footballer Didier Drogba scoring the only goal
    of the game. (Al Jazeera)
