Date: '2012-04-25'
Source_URI: Portal:Current events/2012 April 25
Intelligence_Payload:
  Armed conflict and attacks:
  - Pakistan successfully tests the Shaheen-1A nuclear-capable ballistic missile,
    which is able to reach targets in India. (Reuters)
  - 'Syrian uprising: United Nations envoy Kofi Annan describes the situation in Syria
    as bleak, raising concerns about reports indicating that Syrian Army forces are
    conducting operations against opponents. (Sky News)'
  - South Sudan releases Sudanese prisoners of war as border clashes between the two
    states seem to abate. (Reuters)
  Business and economy:
  - South Korean retailers cease selling beef from the United States after a case
    of mad cow disease is reported. (Reuters)
  - Figures from the Office for National Statistics indicate the UK economy has returned
    to recession after shrinking by 0.2% in the first three months of 2012, bringing
    about a much-feared double-dip recession. (BBC)
  Law and crime:
  - A judge on the Cook County Circuit Court rules that the Amazon tax levied on Internet
    businesses by the US state of Illinois is unconstitutional. (Chicago Tribune)
  News International phone hacking scandal:
  - Adam Smith, a special adviser to Jeremy Hunt, the United Kingdom Secretary of
    State for Culture, Olympics, Media and Sport, resigns over his role in Rupert
    Murdoch's News Corporation's attempt to take over satellite broadcaster BSkyB.
    (AP via Seattle Times)
  - Rupert Murdoch gives evidence to the Leveson inquiry, claiming former British
    Labour Prime Minister Gordon Brown "declared war" on his organisation after The
    Sun newspaper came out in support of the Conservatives in 2009, an allegation
    denied by Brown. (BBC)
