Date: '2012-04-06'
Source_URI: Portal:Current events/2012 April 6
Intelligence_Payload:
  Arts and culture:
  - Bosnia and Herzegovina marks the 20th anniversary of the start of the Bosnian
    War in April 1992. (Irish Times)
  - Thomas Kinkade, one of the most popular painters in the United States, dies in
    Los Gatos, California. (San Jose Mercury)
  Business and economy:
  - A ban on the display of tobacco products by retailers comes into force in England.
    Lawmakers hope it will lead to a reduction in the number of young people taking
    up smoking. (BBC)
  Disasters:
  - Seven civilians die in Afghanistan's Panjwai district after a fuel tanker overturns.
    (AFP via Washington Post)
  - A United States Navy FA-18 Hornet crashes into an apartment complex in the US
    city of Virginia Beach, Virginia with minimal injuries and no fatalities. (WAVY-TV)
    (Fox News) (Reuters)
  International relations:
  - Japan renews a territorial claim over Liancourt Rocks (Takeshima/Dokdo), which
    South Korea also claims to be part of its territory. (Yonhap)
  Politics:
  - Capt Amadou Sanogo, the leader of the Mali coup, states that power will be transferred
    to the President of the National Assembly after separatist Tuaregs declare independence.
    (AP via Google News)
  - The new President of Yemen Abed Rabbo Mansour Hadi fires four governors and over
    a dozen military commanders including the half brother of former President Ali
    Abdullah Saleh who was head of the Yemeni Air Force. (AP via Google News)
