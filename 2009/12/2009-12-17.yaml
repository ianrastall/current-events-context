Date: '2009-12-17'
Source_URI: Portal:Current events/2009 December 17
Intelligence_Payload:
  Uncategorized:
  - Europe is hit by heavy snowfall leading to disruptions in France, Germany, Poland
    and Spain. (BBC)
  - The Panamanian livestock transporter MV Danny F II sinks off the coast of Lebanon
    while travelling from Uruguay to Syria with 83 people on board. (France 24) (The
    Times)
  - Ireland exits "one of Europe's worst recessions". (BBC) (The Irish Times) (France
    24)
  - Bishop of Limerick Donal Murray resigns following allegations contained within
    the Murphy Report. The Vatican accepts his resignation. (Limerick Leader) (RTÉ)
    (Miami Herald) (BBC) (Channel News Asia)
  - A Nigerian court throws out corruption charges against the former governor of
    the country's Delta State, James Ibori, saying there was no clear evidence. (NEXT)
    (AFP) (BBC)
  - Egyptian archaeologists recover from the Mediterranean Sea an ancient temple pylon
    belonging to the palace complex of Cleopatra. (AP)
  - It is revealed that Iraqi militants intercepted live video feeds from U.S. MQ-1
    Predator drones, potentially acquiring information they need to evade or monitor
    U.S. military operations. (Wall Street Journal)
  - The Pakistani opposition calls on President Asif Ali Zardari to resign after the
    Supreme Court declared void an amnesty protecting him and other senior officials
    from corruption charges. (Dawn) (Al Jazeera) (Hindustan Times)
  - Yemen authorities say 34 suspected Al-Qaeda militants have been killed and 17
    captured in raids at hideouts and training camps in the west of the country. (Yemen
    News Agency) (AP) (Dawn)
  - Two of Colombia's main rebel groups, the Revolutionary Armed Forces of Colombia
    (FARC) and the National Liberation Army (ELN), announce they are to unite. (Latin
    American Herald Tribune) (BBC)
  - The collapse of UK airline Flyglobespan leaves thousands of travellers stranded.
    (BBC)
  - Sahwari activist Aminatou Haidar is hospitalized in Tenerife, Spain, after 32 days
    of hunger strike protesting against her expulsion by the Moroccan authorities.
    (BBC) (CNN) (France24) (The Age)
  - The Catholic Church condemns as "inappropriate" and "disrespectful" a New Zealand
    billboard involving nudity and the birth of Jesus Christ. (BBC) (The Guardian)
    (Japan Today)
  - The English High Court grants British Airways an injunction against a proposed
    twelve day strike by cabin crew represented by trade union Unite scheduled to
    occur over Christmas. (BBC)
