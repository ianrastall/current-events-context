Date: '2009-12-06'
Source_URI: Portal:Current events/2009 December 6
Intelligence_Payload:
  Uncategorized:
  - Flamengo wins its sixth Brazilian national football title, following a 2-1 win
    over Grêmio in the last round of 2009 Campeonato Brasileiro Série A. (Globo)
  - Restrictions on internet access and foreign media are put in place ahead of the
    Student's Day in Iran, as former President Akbar Hashemi Rafsanjani urges "freedom"
    in the country. (Al Jazeera) (CNN) (AP)
  - There are violent riots and protests in Athens between police and protesters as
    the city commemorates the first anniversary of the fatal shooting of 15-year-old
    Alexandros Grigoropoulos by a police officer. (BBC) (Sky News) (The Guardian)
  - The opposition Democratic Progressive Party in Taiwan makes large gains in local
    elections against the Kuomintang. (Taiwan News) (Al Jazeera) (Daily Telegraph)
  - Queen Elizabeth II of the United Kingdom firmly warns newspaper editors in a letter
    to cease publication of personal pictures of the British Royal Family after years
    of being "hounded" by paparazzi. (BBC) (ABC News)
  - An HIV-positive man is accused of attempting to intentionally infect his wife
    with the virus, the first case of its kind in New Zealand. (Sunday Star Times)
    (BBC) (IOL) (The Sydney Morning Herald)
  - Voters in Bolivia go to the polls for a general election with exit polls indicating
    that the President of Bolivia Evo Morales has won. (BBC), (AP via Google), (AFP)
  - Romanians take part in the 2nd round of a presidential election. (HotNews.ro)
    (AP)
  - Legislative elections take place in Comoros. (Reuters) (AFP)
  - Archaeologists discover evidence of mass cannibalism in Europe during the Neolithic
    period at a 7,000-year-old burial site in Germany. (BBC)
