Date: '2009-12-26'
Source_URI: Portal:Current events/2009 December 26
Intelligence_Payload:
  Uncategorized:
  - A bomb squad in Reykjavík, Iceland, searches a diverted Lufthansa flight from
    Frankfurt, Germany, to Detroit, Michigan, United States, that carries a bag whose
    owner did not make it onto the plane. (Reuters)
  - A bomb explodes under the car of a suspected Hamas member in southern Beirut,
    Lebanon, killing at least one person and injuring two others. (Lebanese National
    News Agency) (Al Jazeera)
  - Countries around the Indian Ocean hold commemorations on the fifth anniversary
    of the earthquake and tsunami that killed around 250,000 people. (BBC) (euronews)
  - A bridge over the Chambal River in Kota, India, collapses with 45 people thought
    to have been killed. (CNN)
  - It is confirmed that all nine missing crew members — six Filipinos and three Greeks
    — from yesterday's ship fire disaster off the coast of Venezuela are dead. (BBC)
  - Ten people die and two more receive injuries after being pierced by a metal guard
    rail during a bus crash on a major highway in Ipoh, Malaysia. (Malaysian Star)
  - Five Chinese are sentenced to execution by firing squad before a court in Vietnam
    for their roles in one of the largest drug seizures in the country's history.
    (Press Association)
