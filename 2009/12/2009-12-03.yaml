Date: '2009-12-03'
Source_URI: Portal:Current events/2009 December 3
Intelligence_Payload:
  Uncategorized:
  - The Federal Deposit Insurance Corporation, which insures deposits in United States
    commercial banks, is running a deficit of $US8.2 billion. (New York Times)
  - The Royal Netherlands Navy seizes 13 Somali pirates and frees two Tanzanians from
    a vessel that attacked a German ship off the southern cost of Oman. (Reuters South
    Africa) (AP) (IOL)
  - Nigerian farmers sue Shell at a court in The Hague over claims that the oil firm
    polluted their land in the Niger Delta region. (NEXT) (Forbes) (The Independent)
  - A further five people are sentenced to death over their involvement in the July
    riots in Ürümqi, Xinjiang, in northwestern China. (Global Times) (Al Jazeera)
    (BBC)
  - Indian activists mark the 25th anniversary of the industrial disaster that took
    place in Bhopal which led to 3,787 deaths. (IBN Live) (Times of India) (The Times)
  - Three Somali cabinet ministers are amongst dozens killed in a bomb blast at a
    university graduation ceremony at a hotel in Mogadishu. (Al Jazeera) (CCTV) (AFP)
  - Three Iranian pilgrims are killed after their bus exploded at a petrol station
    in the Syrian capital Damascus. (The Guardian) (BBC) (Alalam News Network)
  - Nathan Rees is replaced as leader of the New South Wales Australian Labor Party
    and Premier of New South Wales by Kristina Keneally. (Sydney Morning Herald)
