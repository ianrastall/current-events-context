Date: '2009-12-02'
Source_URI: Portal:Current events/2009 December 2
Intelligence_Payload:
  Uncategorized:
  - FIFA, the world governing body for association football, announce after an emergency
    session of their Executive Committee, that following the controversy over the
    Thierry Henry handball incident, it will set up an inquiry into the use of extra
    officials or technology, but any changes will not be implemented for the 2010
    FIFA World Cup in South Africa. Wikinews
  - Indonesia bans the Australian film Balibo, which follows the story of the Balibo
    Five, a group of journalists killed during the 1975 Indonesian invasion of East
    Timor. (Jakarta Post) (AFP) (BBC) (Reuters)
  - The body of German-Austrian billionaire Friedrich Karl Flick, stolen from the
    grave in 2008 and held for ransom, is returned to his family. (AP) (BBC)
  - More than 50 prominent Nigerian public figures call for President Umaru Yar'Adua
    to resign, saying his health is impairing his judgment. (NEXT) (BBC) (Xinhua)
  - An Islamist group in the North Caucasus claims the bomb attack on a Nevsky Express
    train in Russia was conducted on orders of "Emir of the Caucasus Emirate" Dokka
    Umarov. (Al Jazeera) (RIA Novosti) (Xinhua)
  - The trial of suspected Nazi death camp guard John Demjanjuk is postponed after
    he is taken ill. (Deutsche Welle) (AFP)
  - Wikipedia is ordered by a senior British judge to breach its confidentiality after
    a woman pleaded for help in identifying an alleged blackmailer. (Daily Telegraph)
  - Five British yachtsmen held by Iranian Revolutionary Guards are released. (BBC)
    (Press TV)
  - Cocktail waitress Jaimee Grubbs provides evidence to reporters that she had an
    affair with golf legend Tiger Woods. (The Sun) (Radaronline) (Huffington Post)
