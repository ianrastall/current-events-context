Date: '2009-12-01'
Source_URI: Portal:Current events/2009 December 1
Intelligence_Payload:
  Uncategorized:
  - Porfirio Lobo Sosa is elected President of Honduras. Turnout increases dramatically
    despite ousted former President Manuel Zelaya's plea for a boycott. (Huffington
    Post)
  - In a major policy speech, South African President Jacob Zuma announces the country
    will treat all HIV positive babies and expand testing. (IOL) (AP) (Al Jazeera)
  - U.S. President Barack Obama announces that he will send 30,000 extra American
    troops to Afghanistan within the next six months and start withdrawal in 19 months.
    (The New York Times)
  - U.S. golfer Tiger Woods announces that he will not be attending his own charity
    golf tournament, the Chevron World Challenge, or any other tournaments in 2009.
    (AP via Google News)
  - Maurice Clemmons, suspect in the 2009 shooting of Lakewood, Washington, police
    officers, is shot dead by police in Seattle. (BBC)
  - The UK Foreign and Commonwealth Office says efforts are continuing to secure the
    release of sailors captured by the Iranian Navy on November 25, while Iran warns
    it will deal with them seriously if it exposes "malicious intent". (BBC) (Press
    TV) (Al Jazeera)
  - The International Court of Justice begins hearings into the legality of the Kosovan
    declaration of independence from Serbia. (AFP) (BBC)
  - North Korea raises the value of its currency for the first time in 17 years. (Chosun
    Ilbo) (Yonhap) (Financial Times)
  - Tony Abbott becomes the leader of the Federal Liberal Party of Australia and Leader
    of the Opposition defeating Malcolm Turnbull by 42 votes to 41 following a party
    revolt over its position on the Rudd government's Carbon Pollution Reduction Scheme.
    (ABC News Australia) (BBC)
  The Treaty of Lisbon enters into force:
  - The European Union now has legal personality and has acquired the competences
    previously conferred on the European Community. Community law therefore becomes
    European Union law. (ECJ)
  - The Charter of Fundamental Rights of the European Union enters into force. (AFP
    via Google News)
  - The European Court of Justice acquires general jurisdiction to give preliminary
    rulings in the area of freedom, security and justice. (ECJ)
  - The first permanent President of the European Council, Herman Van Rompuy, officially
    takes office. (AFP via Google News)
  - The first EU High Representative for Common Foreign and Security Policy, Catherine
    Ashton, officially takes office. (AFP via Google News)
