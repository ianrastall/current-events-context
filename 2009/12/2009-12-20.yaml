Date: '2009-12-20'
Source_URI: Portal:Current events/2009 December 20
Intelligence_Payload:
  Uncategorized:
  - Tanzania is hit by an earthquake measuring 6.2 magnitude. (Xinhua) (Press TV)
  - A crisis state of emergency is declared when at least three people are killed,
    hundreds are wounded and buildings collapse when an earthquake strikes Malawi.
    (The Sydney Morning Herald) (The Washington Post) (The New York Times)
  - Shi'ites say Saudi air attacks on northern Yemen have led to the deaths of 54
    people, including women and children. (Reuters)
  - Madagascar President Andry Rajoelina appoints Colonel Vital Albert Camille as
    the new Prime Minister, days after sacking former Prime Minister Eugene Mangalaza,
    who had been appointed as part of a power sharing agreement. (BBC)
  - United States Army Major General Anthony Cucolo makes pregnancy a court-martial
    offense for both female and male troops under his command in northern Iraq. (BBC)
    (The Sydney Morning Herald)
  - Gerry Adams, in an interview with RTÉ, speaks for the first time about the abuse
    his father inflicted on his family. (BBC) (RTÉ) (The Observer)
  - A runaway truck kills up to 100 people at a market in Kogi State, Nigeria. (Vanguard)
    (BBC) (Xinhua)
  - Snowfall disrupts transport services and kills at least 18 people across Europe.
    (Deutsche Welle) (BBC) (Straits Times) (Ireland Online)
  - Mourners pay their respects to drug baron Marcos Arturo Beltrán-Leyva days after
    he is shot dead by authorities. (Reuters)
  - Hundreds of riot police and Maoist protesters clash in the Nepalese capital Kathmandu
    on the first day of a three-day general strike. (Kantipur) (AFP)
  - Colombia and Venezuela move closer to war. (Reuters)
  - Philippine officials warn an eruption at the Mayon Volcano could happen within
    the next few days. (Manilla Bulletin) (AP)
  - Two people are killed and four people are wounded by flying concrete during a
    huge demolition of a Soviet war memorial in Georgia. (BBC) (The Washington Post)
  - American band Rage Against the Machine top the UK Christmas Singles Chart with
    1992 song "Killing in the Name". Its popularity arose from an internet campaign
    to prevent X Factor winner Joe McElderry from topping the charts. (CNN)
  - Actress Brittany Murphy dies at age 32 of Pneumonia and iron deficiency
