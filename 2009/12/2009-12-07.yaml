Date: '2009-12-07'
Source_URI: Portal:Current events/2009 December 7
Intelligence_Payload:
  Uncategorized:
  - Pakistan’s Raffatullah Momand and Aamer Sajjad set a new world record for a second
    wicket partnership scoring 580 runs in a first-class Quaid-i-Azam Trophy match,
    breaking the previous record of 576 held by Sri Lanka's Sanath Jayasuriya and
    Roshan Mahanama.(Dawn)(Cricinfo)
  - Incumbent President of Romania Traian Băsescu is declared the winner of Sunday's
    presidential election run-off, with the opposition demanding that the Constitutional
    Court annul the vote due to electoral fraud. (Associated Press) (realitatea -
    official final results) (Bloomberg)
  - Incumbent Northern Mariana Islands Governor Benigno Fitial of the Covenant Party
    is declared the winner of the 2009 gubernatorial election and runoff over Republican
    Rep. Heinz Hofschneider. (Saipan Tribune)
  - President of Guinea Moussa Dadis Camara is reportedly unable to communicate following
    surgery due to an assassination attempt. (France 24)
  - At least seven soldiers are shot to death and at least three others are wounded
    in an ambush at Reşadiye, Tokat Turkey, in the region's deadliest attack this
    decade. (The New York Times) (Radio Netherlands) (Al Jazeera) (Reuters South Africa)
    (RIA Novosti) (Xinhua)
  - Bishop Dermot O'Mahony resigns as patron of The Irish Pilgrimage Trust after his
    response to child sexual abuse was described as "worse than that of any other
    living auxiliary bishop of Dublin". (RTÉ) (Press Association)
  - The United Nations Climate Change Conference opens in Copenhagen. (CNN) (Indian
    Express) (Bernama) (Times LIVE)
  - Iranian police clash with thousands of opposition supporters at the annual Student's
    Day in Tehran, with reports of gunfire being heard. (Al Jazeera) (BBC) (Times
    of India) (Press TV)
  - At least five people are killed in a blast outside a court complex in Peshawar,
    Pakistan. (Hindustan Times) (Financial Times)
  - Sudanese police detain three senior figures from the Sudan People's Liberation
    Movement, the ruling party in South Sudan, at a demonstration calling for electoral
    reform in Khartoum. (Sudan Tribune) (AFP) (BBC)
  - The Supreme Court of Pakistan begins hearing a case against the National Reconciliation
    Ordinance which protected President Asif Ali Zardari and other key political figures
    against graft charges. (AP) (Dawn) (Xinhua)
  - U.S. Defense Secretary Robert Gates admits that the United States has had no information
    on the whereabouts of Osama bin Laden for many years. (Dawn) (The Independent)
  - The English town of Swindon becomes the first ever Twin Town of Walt Disney World
    in the U.S. state of Florida. (BBC) (The Independent)
  - At least eight people are killed, mainly children, and at least 41 others are
    wounded due to a school bombing in Baghdad. (Al Jazeera)
