Date: '2009-12-04'
Source_URI: Portal:Current events/2009 December 4
Intelligence_Payload:
  Uncategorized:
  - US Marines and Afghan troops launch Operation Cobra's Anger in northern Helmand
    province. (Bloomberg)
  - The U.S. Office of Thrift Supervision closes down the Cleveland based AmTrust
    Bank. (Dow Jones via NASDAQ
  - An explosion at a nightclub in Perm, Russia, kills at least one hundred and injures
    around a hundred people. (RIA Novosti) (BBC) (MSNBC)
  - A fire at a nightclub in the North Sumatra capital of Medan, Indonesia, kills
    at least 20 people. (AFP) (Jakarta Post) (BBC)
  - Namibian incumbent President Hifikepunye Pohamba is reelected along with the ruling
    SWAPO party after elections last week. (Al Jazeera) (AFP)
  - At least 50 people are missing after two ferries collide on the River Nile near
    Rashid (Rosetta) in Egypt. (BBC) (AFP) (Ynetnews)
  - Two Rwandan soldiers are killed while on a peacekeeping mission in Darfur. (Reuters)
    (BBC)
  - Security forces in the Philippines raid the compounds of clans suspected of being
    involved in the Maguindanao massacre. (AP) (Philippine Inquirer)
  - An Italian jury finds Amanda Knox and Raffaele Sollecito guilty in the case of
    the 2007 murder of Meredith Kercher in Perugia. Knox is sentenced to 26 years
    in prison, Sollecito to 25. (CNN)
  - The North Atlantic Treaty Organisation announces that 25 member countries will
    contribute a further 7,000 troops to the International Security Assistance Force
    in Afghanistan in addition to 30,000 additional American and 500 British troops
    previously announced. (BBC)
  - Nepal's cabinet meets on Mount Everest to highlight the impact of climate change
    in the Himalayas. (CNN) (Hindustan Times)
  - Guinea's military leader Captain Moussa Dadis Camara is flown to Morocco for medical
    treatment after being shot by an aide in an assassination attempt. (BBC) (AP)
    (Xinhua)
  - At least 47 people drown after a ferry capsizes in Kishoreganj District, Bangladesh.
    (The Daily Star) (AFP) (BBC)
  - At least 30 people are killed in an attack at a mosque in Rawalpindi, Pakistan.
    (Dawn) (Al Jazeera) (Press Trust of India)
  - A further three people are sentenced to death for their involvement in the July
    riots in Ürümqi, Xinjiang, in northwestern China. (New York Times) (Xinhua)
  - Militants in southern Thailand kill a Muslim family of three while a bomb attack
    injures two in Pattani Province. (AFP) (Bernama) (RTÉ)
  2010 FIFA World Cup draw:
  - The final draw for the 2010 FIFA World Cup takes place in Cape Town, South Africa.
    (AP via Yahoo sports) (The Korea Times)
  - The venue, Cape Town International Convention Centre, is sealed off after two
    bomb scares. (The Times) (The Guardian)
