Date: '2009-12-05'
Source_URI: Portal:Current events/2009 December 5
Intelligence_Payload:
  Uncategorized:
  - CNN issues an apology to The Irish Times after accusing the newspaper of publishing
    fake nude photographs of the world's number one golfer Tiger Woods. CNN also alleged
    The Irish Times had paid damages as a result. (The Irish Times)
  - Irish Independent Member of Parliament Noel Grealish withdraws his support for
    the country's government over the issue of pay cuts in the public sector. The
    move reduces the administration of Taoiseach Brian Cowen to a minority government.
    (Irish Independent)
  - More than one million tickets for the 2010 FIFA World Cup in South Africa go on
    sale globally. (BBC)
  - Thousands of people attend the funeral of Chilean singer and national icon Víctor
    Jara in Santiago, reburied 36 years after his death via torture in the 1973 military
    coup carried out by Augusto Pinochet. (BBC)
  - Bhumibol Adulyadej, King of Thailand, returns to his hospital bed in Bangkok after
    making a brief public appearance to mark his 82nd birthday. (RTÉ) (The Jakarta
    Post) (BERNAMA) (Sky News)
  - Tens of thousands of people demonstrate in London and other European capitals
    ahead of a United Nations climate change summit in Copenhagen. (AFP) (BBC) (The
    Times)
  - Tens of thousands of people take to the streets of Rome in a national "No B Day"
    demonstration demanding the resignation of Prime Minister Silvio Berlusconi. (France
    24)
  - Russian President Dmitry Medvedev declares a national day of mourning on December
    7 following a nightclub fire which resulted in 109 deaths yesterday. (ITAR-TASS)
    (Xinhua)
  - Guinea's vice-president and defence minister Sekouba Konaté of the ruling National
    Council for Democracy and Development takes charge of the country after leader
    Moussa Dadis Camara was shot in an assassination attempt. (BBC)
  - The President of the Philippines Gloria Macapagal-Arroyo declares martial law
    in Maguindanao following the Maguindanao massacre. (Al Jazeera) (Philippine Inquirer)
  - Six doctors in the United Kingdom are taking legal action to demand a formal inquest
    into the death of government scientist David Christopher Kelly. (BBC)
