Date: '2009-12-15'
Source_URI: Portal:Current events/2009 December 15
Intelligence_Payload:
  Uncategorized:
  - U.N. Secretary-General Ban Ki-moon and Danish hosts urge countries on to compromise
    to salvage agreement on a new U.N. pact aimed at averting dangerous climate change
    and global warming. P:GW (Reuters)
  - Nauru recognizes the independence of Abkhazia and establishes formal diplomatic
    relations in exchange for aid from Russia. (New York Times)
  - Two protesters are killed and several injured at a demonstration in opposition
    to the banning of the pro-Kurdish Democratic Society Party in Turkey. (CNN) (Xinhua)
    (Today's Zaman)
  - The Boeing 787 'Dreamliner' widebody passenger airliner takes its maiden flight,
    travelling from Paine Field to Boeing Field, in Washington State, U.S.A. (BBC)
    (Reuters) (USA Today)
  - Chile receives an official invitation to become a member of the Organisation for
    Economic Co-operation and Development. (Wall Street Journal)
  - Evacuations begin in the Albay province of the Philippines as the Mayon Volcano
    oozes lava, with an eruption possible. (Philippine Inquirer) (AP via Fox News)
  - Canadian sports medicine specialist Anthony Galea, who helped Tiger Woods recover
    from knee surgery, is accused of providing top athletes with performance-enhancing
    drugs. (New York Times)
  - Israel condemns the issuing of a war crimes arrest warrant in the United Kingdom
    for former Foreign Minister Tzipi Livni. (Jerusalem Post) (BBC) (Al Jazeera)
