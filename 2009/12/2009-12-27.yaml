Date: '2009-12-27'
Source_URI: Portal:Current events/2009 December 27
Intelligence_Payload:
  Uncategorized:
  - A consortium led by Korea Electric Power gets a US$20.4-billion contract to build
    nuclear power plants in the United Arab Emirates, the largest-ever energy deal
    in the Middle East. (The Wall Street Journal) (Korea Times)
  - Officials in Yemen say top Houthi leader Abdul-Malik al-Houthi has been killed
    during an offensive in the north of the country. (Yemen News Agency) (Reuters)
  - At least six people are dead and many missing after a ferry sinks off Verde Island
    near Batangas, Philippines, the second such disaster in as many days. (GMA News.tv)
    (China Daily)
  - Uzbekistan holds a parliamentary election to elect members of the Supreme Assembly.
    (Al Jazeera) (Uzbekistan National News Agency) (Reuters)
  - Croatia holds a presidential election. (BBC News) (AFP)
  - A tomb, believed to be that of Cao Cao, one of the Chinese leaders during the
    Three Kingdoms period, is discovered in Henan Province. (Xinhua) (ABC)
  Iran anti-government protest:
  - The nephew of opposition leader Mir-Hossein Mousavi is killed by security forces
    in clashes with protestors. (Reuters)
  - Iranian police clash with opposition protesters in central Tehran and other cities,
    with reports of some deaths. (Al Jazeera) (BBC)
