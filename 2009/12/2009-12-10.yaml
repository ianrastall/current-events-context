Date: '2009-12-10'
Source_URI: Portal:Current events/2009 December 10
Intelligence_Payload:
  Uncategorized:
  - The credit rating of Greece is downgraded, leading to increased pessimism regarding
    the Greek economy. (BBC)
  - Pakistani officials arrest five US citizens wanted by the FBI on suspicion of
    terrorism. (BBC)
  - Thousands of "red shirt" anti-government protesters demonstrate in Bangkok, Thailand,
    calling for new elections. (Thai News Agency) (AFP) (Xinhua)
  - In what has been described as a landmark case, the Supreme Court of Ireland rules
    that a gay man, identified as "A", who donated his sperm to a lesbian couple shall
    have access to the resulting boy child, overturning the original High Court decision.
    GLEN expresses concern at the Supreme Court's rejection of the lesbian couple
    as a "de facto family". (RTÉ) (Irish Examiner) (The Irish Times) (BBC)
  - It is revealed that Egypt is building an iron wall up to 100 feet deep along its
    border with Gaza. (The National) (Xinhua) (The Daily Telegraph)
  - New 4,000-page Spanish grammar guidelines, produced by the Spanish Royal Academy
    and 21 organizations in Spanish-speaking countries, are unveiled. (AP)
  - India announces it is to create a new state, Telangana, out of Andhra Pradesh,
    with some officials resigning in protest. (Indian Express) (BBC) (Reuters)
  - 18 hostages are released after at least 65 people are kidnapped by gunmen in Agusan
    del Sur, Mindanao, the Philippines. (Philippine Inquirer) (CNN)
  - A failed launch of an intercontinental missile RSM-56 Bulava by Russia is reported
    to be the cause of the mysterious spiral light seen over Northern Norway yesterday.
    (BBC) (South Africa Mercury) (ITAR-TASS)
  - U.S. President Barack Obama accepts the 2009 Nobel Peace Prize in Oslo, Norway.
    (CNN) (New York Times) (BBC)
