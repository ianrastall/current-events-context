Date: '2009-12-08'
Source_URI: Portal:Current events/2009 December 8
Intelligence_Payload:
  Uncategorized:
  - Japan unveils a new ¥7.2 trillion (US$80.6 billion) stimulus package to strengthen
    the country's economy amid signs it is weakening. (BBC) (Japan Times) (Press TV)
  - Anti-government protests in Iran continue at universities for a second day, with
    over 200 arrests. (Press TV) (UPI) (Lebanon Daily Star)
  - Gunmen in Honduras shoot dead the head of the country's anti-drug trafficking
    unit, Julian Aristides Gonzalez. (Latin American Herald Tribune) (Radio Netherlands
    Worldwide)
  - For the second time in as many years, CBS cancels a United States-produced soap
    opera, this time As the World Turns after 54 years, in effect putting Procter
    & Gamble, the creators of said genre, out of that business. (Bloomberg News)
  - President of Serbia Boris Tadić, his sports minister and ФСС/FSS chief Tomislav
    Karadzic are punished for breaking FIFA's strict no-alcohol policy at the Stadion
    Crvena Zvezda on 10 October. (RTÉ) (The Belfast Telegraph)
  - The ruling junta in Guinea announces it has arrested 60 people so far for attempting
    to kill leader Captain Moussa Dadis Camara. (BBC) (African Press Agency)
  - Eight children are killed and a further 26 injured in a stampede at a school in
    Xiangtan, Hunan, in central China. (China Daily) (The Times) (Indian Express)
  - A series of earthquakes and aftershocks kill a 1 year old child and injure several
    other people in northern Malawi. (Reuters) (BBC)
  - A Cambodian court sentences a Thai man on charges of spying for Thailand to 7
    years imprisonment. (Thai News Agency) (Financial Times)
  - Scaled Composites SpaceShipTwo, the world's first commercial spacecraft, is officially
    unveiled in the Mojave Desert, California. (The Daily Telegraph)
  - Bombings in Iraq kill over 100 people. (Wall Street Journal) (Al Jazeera)
  - Burmese authorities burn US$93 million worth of seized narcotic drugs at a ceremony
    in eastern Shan State. (Xinhua) (Times of India)
