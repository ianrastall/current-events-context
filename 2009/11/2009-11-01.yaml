Date: '2009-11-01'
Source_URI: Portal:Current events/2009 November 1
Intelligence_Payload:
  Uncategorized:
  - At least two women are killed and six people trapped after a landslide in Los
    Gigantes, Tenerife. (The Daily Telegraph) (RTÉ) (Reuters) (BBC)
  - South Sudan's leader, Salva Kiir, announces he will back the independence of the
    semi-autonomous region in a 2011 referendum. (BBC) (Al Jazeera)
  - A ship carrying 100 tons of hydrochloric acid sinks in a section of the Yangtze
    River in China's central Hubei province after colliding with another vessel. (AFP)
    (Xinhua)
  - Nigeria's main rebel group, the Movement for the Emancipation of the Niger Delta,
    threatens to call off its ceasefire with the government if foreign oil companies
    do not leave their land. (Al Jazeera)
  - At least 14 people are dead after Typhoon Mirinae hits the Philippines. (CNN)
    (Philippine Inquirier)
  - China's legislature sacks the country's education minister, Zhou Ji, amid a corruption
    scandal, replacing him with his deputy Yuan Guiren. (Times of India) (Associated
    Press) (Xinhua)
  - Six Uyghurs detained at Guantanamo Bay detention camp are released by the United
    States and resettled in Palau. (Associated Press) (Press TV)
  - 11 people are killed after a Russian military cargo plane belonging to the Interior
    Ministry crashes in Yakutia. (RIA Novosti) (Press Trust of India)
  - The West Atlas oil rig that has leaked oil and gas for 10 weeks into the Timor
    Sea catches fire after an attempt to plug the leak. (BBC) (The Australian)
  - Several events are held to celebrate the 125th anniversary of the Gaelic Athletic
    Association. (RTÉ)
  - Afghan Presidential candidate Abdullah Abdullah pulls out of the run-off election
    versus Hamid Karzai due to concerns over the independence of Azizullah Lodin,
    the head of the Independent Election Commission. (The Guardian)
  - Police in Italy detain two more suspected mafia bosses, one day after the seizure
    of their brother in a raid near Naples. (BBC) (France 24)
  - The singer-songwriter Elton John postpones three more concerts on The Red Piano
    Tour, this time in the United States, due to illness. (BBC)
  - U.S. Republican Party candidate Dede Scozzafava, who withdrew her bid for New
    York's 23rd Congressional District in the House of Representatives Friday, endorses
    the Democratic challenger. (The New York Times)
