Date: '2009-11-24'
Source_URI: Portal:Current events/2009 November 24
Intelligence_Payload:
  Uncategorized:
  - An appeal court in Casablanca, Morocco, upholds a three year jail term against
    a human rights activist, Chahib Khayari, for "offending the authorities" after
    accusing top officials of being involved in drug networks. (Reuters) (IOL)
  - Two French charity workers are kidnapped in the Central African Republic, in the
    latest in a series of kidnappings. (IOL) (Afrik.com)
  - Four people are killed in a helicopter crash off the coast of Netanya in northern
    Israel. (Jerusalem Post) (RTT News) (Trend News Agency)
  - A nationwide public service strike involving medical staff, teachers and civil
    servants takes place in areas of Ireland not badly affected by recent ongoing
    flooding. (The Irish Times) (BBC) (Irish Independent)
  - The Government of Ireland announces a €10 million humanitarian fund for the worst
    affected by ongoing floods in the country. (RTÉ)
  - Over 1,500 complaints are received from American viewers after a gay kiss involving
    Adam Lambert is televised during an awards ceremony. (BBC)
  - Iran lifts a ban on one of its best-selling newspapers, Hamshahri, a day after
    it was banned from publication after publishing a picture of a temple from the
    banned Baháʼí faith. (Press TV) (Reuters)
  - The trial of two Congolese militia leaders, Germain Katanga and Mathieu Ngudjolo
    Chui, begins at the International Criminal Court in The Hague. (BBC) (Al Jazeera)
    (AP)
  - Russian President Dmitry Medvedev orders an investigation into the death of an
    anti-corruption lawyer Sergei Magnitsky who died in prison while awaiting trial
    on charges of tax evasion. (RIA Novosti) (The Daily Telegraph)
  - The European Parliament approves a major overhaul of telecommunications systems
    in the European Union aimed at boosting the rights of mobile and internet users.
    (AFP) (euronews)
  - An inquiry opens in the United Kingdom over the country's involvement in the Iraq
    War. (BBC) (CNN) (Angola Press)
  - Pirates kill a Ukrainian sailor after an oil tanker is attacked off the coast
    of Benin. (BBC) (Press TV)
  - China executes two people for their role in the tainted milk poisoning scandal.
    (Xinhua) (The Guardian) (Al Jazeera)
  - In a tribute to Hindu goddess Gadhimai, approximately 20,000 buffalo and 300,000
    birds, sheep and goats are ritually slaughtered in a festival in Bariyapur, Nepal.
    (BBC) (Times of India) (CNN)
  - Philippine President Gloria Macapagal Arroyo declares a state of emergency in
    the entire Maguindanao province in southern Philippines following the bloodiest
    election-related massacre in Philippine history which left at least 40 people
    dead, including a local politician and about a dozen journalists. (ABS-CBN News)
  - Northern Mariana Islands gubernatorial election, 2009
  - In the Northern Mariana Islands' first ever runoff, incumbent Governor Benigno
    Fitial of the Covenant Party leads Republican Party Rep. Heinz Hofschneider by
    501 votes. (Saipan Tribune)
  - An estimated 1,200 absentee ballots still need to be counted before a winner is
    declared on December 7, 2009. (Saipan Tribune)
  - Web browser Opera closes a loophole which allowed Chinese users to access websites
    banned by the government. (BBC)
  - Chilean writer and historian, José Arraño Acevedo dies at the age of 88.
