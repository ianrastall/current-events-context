Date: '2009-11-04'
Source_URI: Portal:Current events/2009 November 4
Intelligence_Payload:
  Uncategorized:
  - The New York Yankees defeat the Philadelphia Phillies 7-3 in Game 6 to win the
    2009 World Series. (Associated Press) (The New York Times)
  - Rebel Houthis in Yemen cross the border into Saudi Arabia, killing a Saudi security
    officer and injuring 11 others. (Angola Press) (The Times)
  - The Israeli navy intercepts the , a ship alleging to have Iranian weapons bound
    for Hezbollah in Lebanon. (BBC) (New Zealand Herald)
  - The Cambodian government announces that ousted Prime Minister of Thailand Thaksin
    Shinawatra has been appointed as a government adviser. (Taiwan News) (AFP)
  - Iranian protesters mark the 30th anniversary of the takeover of the U.S. embassy
    in Tehran. There are also clashes between security forces and anti-government
    demonstrators. (Press TV) (Al Jazeera) (BBC)
  - The United Nations General Assembly debates on whether to endorse the Goldstone
    report on the Gaza War. (New York Times)
  - The death toll from Typhoon Mirinae in Vietnam rises to at least 90. (AFP) (VietnamNet)
  - An Italian court convicts 22 CIA agents and 2 Italian agents over the kidnap of
    Muslim cleric Hassan Mustafa Osama Nasr in Milan in 2003, in the first court case
    challenging the CIA's "extraordinary rendition" programme. (BBC) (Al Jazeera)
    (CNN)
  - United States officials meet Aung San Suu Kyi and the Burmese Prime Minister Thein
    Sein in rare talks. (BBC) (TIME) (Bangkok Post)
  - The President of Sierra Leone Ernest Bai Koroma sacks two senior ministers on
    charges of corruption. (BBC) (Standard Times) (Reuters Africa)
  - Italian politicians and the Vatican condemn a ruling by the European Court of
    Human Rights that says having a crucifix in a classroom is a breach of human rights.
    (RTÉ) (Jewish Telegraphic Agency)
  - Around 700 people are injured in two earthquakes in southern Iran. (CNN) (Fars
    News Agency) (Times of India)
  - China approves a Disney theme park in Shanghai after a decade of negotiations.
    (The Times) (China Daily)
  - Australia and New Zealand expel Fiji's top diplomats in response to the decision
    of the Government of Prime Minister Frank Bainimarama to expel senior Australian
    and New Zealand diplomats from Fiji. (AFP via Google News)
  - A fire at a warehouse in Huwei Yunlin County, Taiwan, destroys between 400 and
    500 historic puppets. (BBC) (Reuters India)
  - Eight children drown after a boat carrying 35 pupils capsizes in Kerala, southern
    India. (IOL) (Press Trust of India) (Xinhua)
  - United States elections, 2009
  - Michael Bloomberg wins a third term as Mayor of New York City. (Politico)
  - Chris Christie wins the position of Governor of New Jersey, defeating incumbent
    Jon Corzine. (CNN)
  - Bob McDonnell wins the position of Governor of Virginia. (CNN)
  - Bill Owens wins the New York 23rd congressional district special election. (CQ
    Politics)
  - Voters in the U.S. state of Maine reject a law allowing same-sex marriage to occur
    in their state. (New York Times)
