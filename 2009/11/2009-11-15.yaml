Date: '2009-11-15'
Source_URI: Portal:Current events/2009 November 15
Intelligence_Payload:
  Uncategorized:
  - The Metro Gold Line extension opens in East Los Angeles and Boyle Heights after
    decades of planning. (Los Angeles Times)
  - Domenico Raccuglia, considered one of Italy's 30 most dangerous fugitives, is
    arrested after 15 years on the run. (BBC) (AFP)
  - Belle de Jour, the best-selling author of The Intimate Adventures of a London
    Call Girl, identifies herself as Dr. Brooke Magnanti, a specialist in cancer epidemiology
    at the Bristol Initiative for Research of Child Health. (BBC) (Times Online) (AP)
  - Four people are hospitalised and at least 60 others are injured at Millennium
    Point in Birmingham during a performance by JLS. The rest of the event is cancelled.
    (BBC)
  - Prime Minister Gordon Brown apologises for the role of the United Kingdom in sending
    thousands of children to former colonies in the 20th century. (RTÉ)
  - Kosovars go to the polls for the first local elections since declaring independence
    from Serbia. (Deutsche Welle) (Xinhua)
  - U.S. President Barack Obama becomes the first U.S. President to meet with Burma's
    military government, calling for the release of Aung San Suu Kyi and other political
    prisoners. (Reuters) (BBC) (Bangkok Post)
  - APEC leaders say a deal on global warming will not be possible before next month's
    United Nations summit in Denmark. (CNN) (The Times)
  - Colombia announces it will release four detained members of the Venezuelan National
    Guard who were arrested on Colombian territory. (BBC) (Press TV)
  - A group of Cuban dissidents holed up in a house in Havana begin a liquid-only
    fast. (CNN)
  - The Nigerian rebel group Movement for the Emancipation of the Niger Delta announces
    it has begun peace talks with the government. (Afrique en ligne) (NEXT) (Reuters)
  - Iran's Parliament approves President Mahmoud Ahmadinejad's final three ministerial
    choices. (Press TV) (Taiwan News) (Xinhua)
  - Chechen security forces kill up to 20 anti-government fighters southwest of the
    capital Grozny. (Al Jazeera)
