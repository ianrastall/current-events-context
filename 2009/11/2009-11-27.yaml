Date: '2009-11-27'
Source_URI: Portal:Current events/2009 November 27
Intelligence_Payload:
  Uncategorized:
  - A Russian high-speed passenger train traveling on the Moscow – Saint Petersburg
    Railway derails near Uglovka in a suspected terrorist attack, killing 26 people
    and injuring more than 100. (RIA Novosti) (BBC)
  - Tiger Woods, the world's number one golfer, is hospitalised after sustaining injuries
    in a car crash in Orlando, Florida, USA. (The Daily Telegraph) (BBC) (The Irish
    Times)
  - The World Health Organization reports a one-week global increase of more than
    1,000 deaths (85% increase in Europe) from the pandemic H1N1/09 virus. (BBC) (World
    Health Organization)
  - A ferry carrying over 1000 people partially sinks in the Tetulia river in southern
    Bangladesh, trapping an unknown number of people. (BBC) (IOL) (The Daily Star)
  - The International Atomic Energy Agency passes a resolution 25-3 condemning Iran
    for developing a secret uranium enrichment site. (BBC) (Xinhua) (Press TV) (RIA
    Novosti)
  - Vanuatu's Prime Minister Edward Natapei loses his parliamentary seat after he
    missed three consecutive sittings without submitting an explanation. (AFP) (BBC)
    (Xinhua)
  - Voters in Namibia vote in a general election. (The Namibian) (Al Jazeera) (AFP)
  - At the Khmer Rouge war crimes trial, Kaing Guek Eav, known as Duch, pleads to
    be released. (Phnom Penh Post) (AP)
  - Multibillion-dollar debt problems of Emirati investment company Dubai World, including
    the possibility of default, upset markets worldwide. (MarketWatch)
  - The China National Space Administration sets a launch date of October 2010 for
    Chang'e 2, its second lunar orbiter. (AP)
  - 'The Commonwealth Heads of Government Meeting 2009 opens with the following issues
    on its agenda: discussion of climate change ahead of the December United Nations
    Climate Change Conference; Rwanda''s admission into the Commonwealth of Nations;
    and Sri Lanka''s bid to host the 2011 meeting. (BBC)'
  - South Korea's Truth and Reconciliation Commission acknowledges the government's
    execution of 5,000 civilians accused of sympathizing with North Korea during the
    early months of the Korean War. (Los Angeles Times)
  - The Ugandan parliament passes a controversial land bill, criticised by the Buganda
    kingdom. (Daily Monitor) (BBC) (New Vision)
  - Franz Josef Jung resigns as Germany's Minister of Labour and Social Affairs following
    allegations of covering up the Kunduz airstrike, during which he served as Minister
    of Defence. (Deutsche Welle) (BBC)
  - President of the European Commission José Manuel Barroso nominates a new team
    of commissioners for his second five-year term. (BBC) (The New York Times)
  - Space Shuttle Atlantis returns to Earth following the completion of its STS-129
    mission. (Reuters)
  - A mass shooting at a Thanksgiving party in Jupiter, Florida, United States kills
    four people and critically wounds a fifth. (CNN)
  Great Britain and Ireland floods:
  - Prince Charles visits areas of Cumbria hit by the recent floods. (The Guardian)
  - Hundreds of people attend the funeral held for a police officer who died when
    a bridge collapsed in Workington, Cumbria. (BBC)
  - Royal Engineers from the British Army begin construction of a temporary footbridge
    over the River Derwent. (BBC)
  - The Irish Farmers' Association begins an operation to distribute emergency supplies
    of donated fodder to Ireland's flood-hit regions as the River Shannon rises further,
    threatening Limerick City. (The Irish Times) (RTÉ)
