Date: '2009-11-03'
Source_URI: Portal:Current events/2009 November 3
Intelligence_Payload:
  Uncategorized:
  - After 29 years of decriminalized prostitution in the U.S. state of Rhode Island,
    Governor Donald Carcieri signs a bill into law outlawing prostitution. (Providence
    Journal)
  - Voters go to the polls in elections in the United States for Governors of Virginia
    and New Jersey, special elections for two Congressional districts, and several
    municipal elections. (CNN)
  - Czech President Václav Klaus signs the Lisbon Treaty after it was upheld by the
    Constitutional Court, thus fulfilling the final step in its ratification. (euronews)(BBC)
  - North Korea says it has completed reprocessing 8,000 spent nuclear fuel rods as
    part of its nuclear program. (CNN) (Yonhap) (Al Jazeera)
  - African countries boycott the United Nations climate talks in Barcelona, Spain,
    after saying goals set by industrialised countries are too low. (Associated Press)
    (Bloomberg)
  - Former Bosnian Serb leader Radovan Karadžić attends his war crimes trial for the
    first time after boycotting previous sittings. (BBC) (Al Jazeera) (Reuters)
  - India's Supreme Court judges disclose their assets online. (Indian Express) (BBC)
    (AFP)
  - China accuses the Dalai Lama of damaging Sino-Indian relations ahead of his visit
    to the disputed border region of Arunachal Pradesh. (Times of India) (China Daily)
  - Dubai announces it is to appoint female muftis for the first time in 2010. (The
    National) (Philippine Inquirer)
  - Two senior United States officials arrive in Burma for talks with the military
    junta and National League for Democracy leader Aung San Suu Kyi. (CNN) (Xinhua)
  - Fiji expels envoys from Australia and New Zealand over alleged interference in
    the country's judiciary. (Fiji Times) (AFP)
  - An oil leak on the West Atlas oil rig in the Timor Sea is plugged. (The Australian)
    (BBC)
  - A former KGB agent, Russian-Israeli businessman Shabtai von Kalmanovic, is shot
    dead in Moscow, Russia. (The Guardian) (RIA Novosti)
