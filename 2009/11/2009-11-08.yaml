Date: '2009-11-08'
Source_URI: Portal:Current events/2009 November 8
Intelligence_Payload:
  Uncategorized:
  - Venezuelan President Hugo Chavez tells the country's army and civilians to "prepare
    for war" with Colombia. (AP) (Xinhua)
  - Sudan's President Omar Hassan al-Bashir, indicted by the International Criminal
    Court, cancels his trip to Turkey. (Hurriyet) (Sudan News Agency) (IOL) (BBC)
  - El Salvador declares a state of emergency as 91 people drown from the effects
    of a coastal low. (BBC) (CNN)(CBC)
  - The 21st summit of APEC begins in Singapore. (Channel News Asia) (Straits Times)
  - At least 13 people are killed and at least 35 are injured in a suicide attack
    in Adezai, Pakistan. (Al Jazeera) (Hindustan Times) (BBC) (Reuters India) (RTÉ)
  - Speaking at Sharm el-Sheikh's Forum on China-Africa Cooperation, China's Premier
    Wen Jiabao, pledges $10 billion (£6 billion) loans to Africa over a three-year
    period, in order to increase Sino-african cooperation. (BBC) (France 24) (RTÉ)
    (Bangkok Post) (The Age)
  - North Korean leader Kim Jong-il sacks a top TV official after state television
    begins broadcasting advertisements, out of concern that they were "increasing
    the influence of capitalism". (RTHK) (Joongang Daily) (The Independent)
  - Sharon Commins and her Ugandan colleague Hilda Kawuki are awarded the Hugh O'Flaherty
    Humanitarian Award. (RTÉ)
  - Thousands of people in Okinawa, Japan protest, demanding the removal of a U.S.
    military base. (BBC) (Reuters)
  - Police in the Democratic Republic of the Congo arrest 100 people accused of killing
    dozens and displacing thousands in a conflict over fishing rights. (IOL)
  - The United States House of Representatives votes 220-215 to pass the highly debated
    health care reform act. (New York Times)
  - The Dalai Lama begins a visit to Tawang, in the disputed territory of Arunachal
    Pradesh in northeastern India, amid objections from China. (Indian Express) (Hindustan
    Times) (BBC)
  - Northern Mariana Islands general election, 2009 results are released
  - Republican Party candidate Heinz Hofschneider and incumbent Governor Benigno Fitial
    virtually tie in the closest gubernatorial election in history. A runoff election
    will be held in the next 14 days to determine the winner. (Marianas Variety)
