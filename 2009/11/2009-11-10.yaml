Date: '2009-11-10'
Source_URI: Portal:Current events/2009 November 10
Intelligence_Payload:
  Uncategorized:
  - A power failure at Itaipu causes a massive blackout, affecting 15 states of Brazil
    and, briefly, the entire country of Paraguay; chaos is reported in major cities
    such as São Paulo. (BBC)
  - South and North Korean naval ships fire on one another after a North Korean ship
    crossed the disputed Northern Limit Line in the Yellow Sea. The vessel later returned
    "wrapped in flames" after the incident. (Yonhap) (BBC) (China Daily)
  - Prosecutors begin cross examining former Liberian President Charles Taylor at
    his war crimes trial. (Reuters) (BBC) (AllAfrica.com)
  - Thailand's ousted Prime Minister Thaksin Shinawatra arrives in Cambodia to take
    up his new appointment as economic adviser to the Cambodian government. (Al Jazeera)
    (ABC News)
  - A conservation group warns that the koala could be extinct within 30 years. (The
    Age) (3 News NZ) (The Daily Telegraph)
  - Former President of French Polynesia Gaston Flosse is arrested as part of a corruption
    investigation. (Radio New Zealand International)
  - John Allen Muhammad, mastermind of the 2002 Beltway sniper attacks, is executed
    in Virginia. (AP via Fox News (US))
