Date: '2009-11-07'
Source_URI: Portal:Current events/2009 November 7
Intelligence_Payload:
  Uncategorized:
  - A British tourist is shot dead by a masked gunman in the U.S. state of Texas.
    (The Guardian) (BBC) (The Times)
  - Saudi forces bomb a Houthi rebel stronghold in northern Yemen for a third day.
    (AP) (Press TV)
  - Thousands of people in Bermeo, Spain, demonstrate for the release of 36 Spanish
    fishermen being held by Somali pirates. (AFP)
  - At least two workers are killed after a bridge under construction collapses in
    Andorra. (euronews) (IOL)
  - A NATO airstrike kills 7 members of the Afghan security force in the western province
    of Badghis. (CNN) (Bangkok Post)
  - Rival factions in Madagascar agree to form a unity government to end the political
    crisis in the country. (Xinhua) (BBC)
  - Scientists in the South Island, New Zealand, discover the first dinosaur footprints
    in the country, thought to be 70 million years old. (AFP) (New Zealand Herald)
  - 11 people are confirmed dead after the crashing of a Russian military plane into
    the sea in the Tatar Strait, in the far east of Russia, yesterday. (AFP) (RIA
    Novosti)
  - Voters in the Northern Mariana Islands go to the polls to elect the governor,
    legislature and local municipal offices. (Marianas Variety)
  - Venezuela deploys 15,000 soldiers to its border with Colombia. (The Sydney Morning
    Herald) (The Scotsman)
  - Two Australian researchers compile new details on the dead from a World War I
    battlefield in Fromelles. (The Sydney Morning Herald)
  - Lebanon's political opposition agrees to join a unity government under Prime Minister
    designate Saad Hariri. (BBC)
  - Luigi Esposito, one of Italy's 30 most wanted men, is detained at a villa in Naples.
    (BBC) (ABC News)
  - Ecuador rations its electricity, leading to some blackouts in areas, including
    the capital Quito. (BBC)
  - Cuba removes peas and potatoes from its list of rationed foods but increases their
    prices. (The Daily Telegraph)
  - Caracas is put under widespread water rationing for the first time in several
    years. (The Washington Post)
  - Ashmolean Museum in Oxfordshire, the UK's oldest museum, reopens after renovations.
    (BBC) (Heart Radio Oxfordshire) (Kings Lynn News)
