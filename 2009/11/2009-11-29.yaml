Date: '2009-11-29'
Source_URI: Portal:Current events/2009 November 29
Intelligence_Payload:
  Uncategorized:
  - Nepal announces it will hold a cabinet meeting on Mount Everest to highlight the
    effect of global warming on glaciers. (BBC) (Xinhua) (The Himalayan Times)
  - Somali pirates capture the Greek owned oil tanker Maran Centaurus 1,300 kilometres
    off the coast of Somalia. (BBC)
  - Uruguayan voters elect Broad Front candidate José Mujica as their new president.
    (Reuters)
  - The Commonwealth of Nations urges the Fijian government to restore democracy in
    the country. (BBC)
  - Israel announces it is likely to release 980 Palestinian prisoners in exchange
    for captured soldier Gilad Shalit. (Ha'aretz) (AFP)
  - Four police officers are shot and killed while in a coffee shop in Parkland, Washington,
    United States. (MSNBC) (BBC)
  - 'Irish floods: At least 13 ambulances from the Order of Malta Ambulance Corps
    in Dublin travel to Athlone and Ballinasloe to deliver relief to flood victims
    there. Dublin''s River Liffey bursts its banks and floods several areas. (RTÉ)
    (The Sunday Business Post)'
  - Voters in Switzerland approve a referendum to ban the construction of new minarets
    in the country. (Swissinfo) (BBC) (Al Jazeera)
  - Russian police issue an appeal for witnesses following the Nevsky Express bombing.
    (BBC) (IOL)
  - The central bank of the United Arab Emirates announces it will provide extra liquidity
    to Dubai banks. (Gulf News) (BBC)
  - Saudi Arabia says its forces have seized control of a key mountain area amid the
    country's ongoing fight with Houthi rebels in Yemen. (Al Jazeera)
  - Statements from bishops relating to the Murphy Report into sexual abuse scandal
    in Dublin archdiocese are read at Masses across Ireland. (RTÉ)
  - A witness in the case of the murder of nun Dorothy Stang shot dead in the Amazon
    Rainforest in 2005 is critically wounded after being shot. (BBC) (Canadian Press)
  - Officials investigate a radiation leak at the Kaiga nuclear plant in southern
    India which left 55 employees requiring medical treatment. (Indian Express) (Reuters)
    (BBC)
  - The Peruvian government apologizes to citizens of African origin for centuries
    of abuse. (BBC) (Latin American Herald Tribune)
  - Honduras holds its first general election five months after a coup d'état ousted
    Manuel Zelaya as President. (BBC) (The New York Times) (The Washington Post)
  - Voters in Equatorial Guinea take part in a presidential election. (Xinhua) (Al
    Jazeera)
  - A United States Senate report states that Osama bin Laden was "within grasp" of
    the United States Army in Tora Bora in December 2001. (BBC)
  - British scientists at the University of East Anglia, who are criticised, say they
    will publish their figures in full. (The Daily Telegraph) (Associated Press)
  - Rwanda is admitted under the Edinburgh criteria as the second member of the Commonwealth
    of Nations without any historical ties to the United Kingdom. (The New York Times)
    (Bernama)
  Nuclear program of Iran:
  - The Iranian parliament urges the government to reduce ties with the International
    Atomic Energy Agency. (Fars News Agency) (BBC) (Xinhua)
  - The Iranian government approves plans to build 10 new uranium enrichment plants.
    (Press TV) (Sky News)
