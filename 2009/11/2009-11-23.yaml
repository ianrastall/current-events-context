Date: '2009-11-23'
Source_URI: Portal:Current events/2009 November 23
Intelligence_Payload:
  Uncategorized:
  - Forty three people, including a local politician and about a dozen journalists,
    are killed in a massacre in Maguindanao, Philippines.(The Philippine Star)
  - The first atom collisions have taken place in the Large Hadron Collider at CERN,
    near Geneva, Switzerland. (The Times) (BBC News)
  - A second fire at an arms depot plant in Ulyanovsk, Russia, kills at least eight
    people, 10 days after a previous explosion at the same site. (RIA Novosti) (Al
    Jazeera)
  - The family of Jean Charles de Menezes, who was mistakenly shot dead by the Metropolitan
    Police in London in 2005, reach a compensation deal with police, resolving "all
    litigation" between them. (BBC)
  - India's main opposition BJP party condemns a leaked Liberhan Commission report
    that implicated opposition figures in the destruction of the Babri Mosque in 1992
    by Hindu nationalists. (IBN) (Times LIVE) (BBC)
  - Voters in the Northern Mariana Islands participate in the Commonwealth's first
    ever gubernatorial runoff election between Governor Benigno Fitial and challenger
    Heinz Hofschneider. Hofschneider had bested Fitial in the first round by just
    8 votes on November 7, the closest gubernatorial election in history. (Saipan
    Tribune)
  - The war crimes trial of the Khmer Rouge in Cambodia hears its final arguments.
    (Phnom Penh Post) (CNN) (Al Jazeera)
  - The world's largest mass immunisation against yellow fever begins in West Africa,
    targeting 12 million people. (BBC)
  - 21 bodies are discovered so far after a convoy of around 50 people including politicians,
    journalists and supporters is hijacked by dozens of armed gunmen in Maguindanao,
    southern Philippines. (AP) (Philippine Inquirer) (GMA News)
  - Clashes break out between refugees from Sri Lanka and Afghanistan at an Australian
    immigration centre on Christmas Island. (BBC) (Xinhua) (ABC News)
  - Flooding in Great Britain and Ireland
  - Residents in Cockermouth, Cumbria, begin returning to their homes; meanwhile,
    the search resumes for a missing woman swept away near Brecon, Powys. (BBC) (BBC)
  - Taoiseach Brian Cowen visits Ireland's worst hit areas in the recent flooding.
    (RTÉ)
  - Relatives protest about the recent mine disaster in China. (Daily Mail) (RTÉ)
    (Reuters)
  - Chinese human rights activist Huang Qi, who campaigned for the parents of the
    children killed in schools in the 2008 Sichuan earthquake, is sentenced to three
    years in prison for "illegally holding state secrets". (BBC) (AFP)
