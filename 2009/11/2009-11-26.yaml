Date: '2009-11-26'
Source_URI: Portal:Current events/2009 November 26
Intelligence_Payload:
  Uncategorized:
  - Ireland's Taoiseach Brian Cowen is confronted by displeased residents in Athlone
    during his half-day tour of flood-hit areas in Galway, Offaly, Roscommon and Westmeath.
    (The Irish Times) (RTÉ)
  - The Murphy Report, commissioned by the Irish government, finds that the Roman
    Catholic Archdiocese of Dublin covered up widespread sexual abuse of children
    by priests until the mid 1990s. (Irish Times) (Reuters) (BBC)
  - All pleas to halt British hacker Gary McKinnon being extradited to the United
    States to face trial for breaking into NASA and military computers looking for
    UFO evidence fail as UK Home Secretary orders his extradition. (The Daily Telegraph)
  - The Namibian National Society for Human Rights announces it will approach the
    High Court after the electoral commission withdraws its observer status for the
    general election on Friday. (The Namibian) (BBC)
  - The Committee to Protect Journalists (CPJ) labels the Maguindanao massacre in
    the Philippines the "single deadliest event for the press" ever documented. (Philippine
    Daily Inquirer)
  - The Supreme Court in Bogotá convicts and sentences former general Jaime Uscátegui
    to 40 years in prison for his role in the Mapiripán Massacre in 1997 by far right
    militias. (The Guardian) (Colombia Reports)
  - Floods in Saudi Arabia kill around 77 people in Jeddah, Rabigh and Mecca, and
    a further 351 are missing in the heaviest rainfall in years. (AFP) (Saudi Gazette)
  - Germany's army chief Wolfgang Schneiderhan resigns over allegations of a cover
    up related to a September NATO airstrike in northern Afghanistan. (Deutsche Welle)
    (Xinhua)
  - South Korea's Constitutional Court strikes down a decades old law that punished
    men for making false promises of marriage to engage in sexual relations with women.
    (Yonhap) (Korea Herald) (Times of India)
  - A gunman attacks the University of Pécs in southern Hungary, killing one and injuring
    at least three people. (BBC) (Caboodle.hu)
  - Ceremonies are held in India to mark the first anniversary of a series of attacks
    in Mumbai by Pakistani militants which killed 166 people. (Hindustan Times) (BBC)
    (The Guardian)
  - China unveils its first firm target to cut greenhouse gas emissions, ahead of
    a United Nations summit in Copenhagen next month. (Xinhua) (The Times) (Reuters)
  - Police in Hong Kong attempt to find the founder of a Facebook group whose members
    claim to have planned to commit a mass suicide on December 21. (IOL) (China Daily)
    (Radio Television Hong Kong)
  - Citizens of St Vincent and the Grenadines reject a new constitution which would
    have replaced Queen Elizabeth II with a president as Head of State. (Antillean)
    (Caribbean News Agency)
