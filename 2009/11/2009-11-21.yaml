Date: '2009-11-21'
Source_URI: Portal:Current events/2009 November 21
Intelligence_Payload:
  Uncategorized:
  - Protestors gather at the French Embassy in Dublin in a continuation of the dispute
    with FIFA over the controversial handball incident in the 2010 FIFA World Cup
    qualifying match between France and Republic of Ireland. (RTÉ) (The Irish Times)
    (BBC)
  - President of Egypt Hosni Mubarak says on national television he will not tolerate
    the "humiliation" of Egyptian nationals abroad following the riots between Algeria
    and Egypt over a qualifying match for the 2010 World Cup. (BBC)
  - Italian police arrest two Pakistani nationals suspected of providing logistical
    support to the group responsible for the attacks in Mumbai in 2008. (The Hindu)
    (Reuters) (BBC News)
  - Archbishop of Canterbury Rowan Williams and Pope Benedict XVI agree to "seek closer
    relations" in a meeting in Rome. (BBC News) (The Daily Telegraph) (Associated
    Press)
  - U.S. President Barack Obama's job approval rating slips below 50 percent in a
    daily tracking survey by Gallup poll. (Reuters)
  - New research concludes that Homo floresiensis, discovered in 2003, is a distinct
    species and not a previously known species with dwarfism or microcephaly. (The
    Daily Telegraph) (U.S. News)
  - Sri Lanka's government announces that Tamil refugees held in camps since the end
    of the conflict with the Tamil Tigers will be free to leave the camps next month.
    (Al Jazeera) (BBC) (The Island)
  - A gas blast at a coal mine in Heilongjiang province, northeastern China, kills
    42 people and traps 66. (BBC) (Xinhua)(AP)
  - The Netherlands win the Junior Eurovision Song Contest 2009 with the song "Click
    Clack" by Ralf Mackenbach. (NOS)
  Floods in Great Britain and Ireland:
  - British Prime Minister Gordon Brown travels to Cumbria to meet victims of the
    floods that have affected the area. (BBC News)
  - Ireland's Emergency Co-Ordination Committee meets to discuss the flooding. Green
    Party leader and Minister for the Environment, Heritage and Local Government John
    Gormley visits the scene of the worst damage in Cork and describes it as "a once
    in 800 years event". (RTÉ) (The Irish Times) (Sky News) (The Straits Times)
