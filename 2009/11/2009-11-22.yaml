Date: '2009-11-22'
Source_URI: Portal:Current events/2009 November 22
Intelligence_Payload:
  Uncategorized:
  - An Algerian court acquits Abdulli Feghoul, who had been detained at Guantanamo
    Bay detention camp without trial for almost seven years. (AP) (BBC)
  - Efren Peñaflorida, who started a "pushcart classroom" in the Philippines to provide
    education to poor children, is named the 2009 CNN Hero of the Year. (The Philippine
    Star) (UPI) (CNN)
  - Three Royal National Lifeboat Institution crew members are located "in good condition"
    after their boat capsizes off County Wexford in Ireland. (RTÉ)
  - At least seven people are killed and more than 55 injured in a bombing in Assam,
    northeastern India. (Times of India) (Al Jazeera) (UPI)
  - A 400lb bomb partially explodes outside the headquarters of the Policing Board
    in Belfast, Northern Ireland. In another incident, three men are arrested after
    a shooting incident involving PSNI officers in the border village of Garrison,
    County Fermanagh. (The Daily Telegraph) (CNN) (RTÉ)
  - Romanians go to the polls for the first round of the presidential election and
    to vote on proposed parliamentary reform. (Agerpres) (BBC)
  - Jeong Nam-gyu, one of South Korea's most prolific serial killers, commits suicide
    in his cell on death row. (Joongang Daily) (BBC) (New York Times)
  - Former Iranian Vice President Mohammad-Ali Abtahi who was sentenced to six years
    imprisonment in connection with the June election protests is released on bail.
    (Xinhua) (AFP)
  - '2009 Azerbaijan-Armenia negotiations in Munich: Azerbaijan and Armenia hold talks
    on the Nagorno-Karabakh conflict. Azerbaijan has warned that the meeting of presidents
    in Munich will be "decisive" and that its troops are ready to take the territory
    by force unless there is a breakthrough in negotiations. (Reuters)'
  - Debate is stoked over whether scientists have overstated the case for man-made
    climate change after computer hackers break into a server at University of East
    Anglia, the well-respected climate change research center. (Wall Street Journal)
    (Washington Post)
  - An Indonesian ferry carrying over 200 passengers sinks off the cost of Sumatra.
    (Jakarta Post) (AFP via News Limited) (China Daily)
  - The United States Senate votes to allow a debate on the healthcare reform bill.
    The debate is to begin on November 30, 2009. (The Guardian) (BBC News) (Voice
    of America) (MSNBC)
  - The number killed in an explosion in Heilongjiang province, China rises to 92.
    (BBC News) (Reuters) (Associated Press) (New York Times)
