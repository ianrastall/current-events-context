Date: '2009-11-18'
Source_URI: Portal:Current events/2009 November 18
Intelligence_Payload:
  Uncategorized:
  - The France national football team beat the Republic of Ireland at the Stade de
    France to qualify for the 2010 FIFA World Cup finals in South Africa, with Thierry
    Henry admitting after the game that he committed handball in the move leading
    to the decisive goal. (The Daily Telegraph)
  - The population of Africa reaches one billion. (BBC)
  - The Government of Hong Kong unveils a new democratic political reform plan, which
    includes the expansion of the Legislative Council. (Radio Television Hong Kong)
    (Channel News Asia) (Straits Times)
  - Iraqi Vice President Tariq al-Hashimi vetos part of the country's new election
    law, putting the scheduled January 2010 elections in doubt. (Al Jazeera) (AP)
    (BBC)
  - Prime Minister of Australia Kevin Rudd announces that he will consider a probe
    of the Church of Scientology in Australia after an attack on the organization
    by independent parliamentarian Nick Xenophon. (BBC)
  - According to the 2009 Corruption Perceptions Index, Somalia is the most corrupt
    of 180 countries surveyed, and New Zealand is the least corrupt. (Reuters)
  - Four people are killed after a bomb left over from the Vietnam War explodes as
    they try to remove explosive material in southern Tây Ninh Province. (AFP)
  - Taiwanese universities announce they will admit mainland Chinese students for
    the first time next year. (Taiwan Today) (China Daily) (AFP)
  - Senator and President pro tempore of the United States Senate Robert C. Byrd of
    West Virginia becomes the longest serving member in the history of the United
    States Congress. (Associated Press)
  - Queen Elizabeth II officially opens the Parliament of the United Kingdom and delivers
    Her Majesty's Most Gracious Address. (Daily Telegraph) (BBC)
