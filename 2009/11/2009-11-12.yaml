Date: '2009-11-12'
Source_URI: Portal:Current events/2009 November 12
Intelligence_Payload:
  Uncategorized:
  - The discovery of two sunken World War II Japanese submarines off Oahu, Hawaii,
    is announced. (NY Times) (The Christian Science Monitor)
  - United States Army Major Nidal Malik Hasan will face 13 charges of murder for
    the Fort Hood shooting. (AP via New York Times)
  - United States federal prosecutors begin legal action to seize properties owned
    by the Alavi Foundation on the grounds that it has ties with Iran. (New York Times)
  - In the Glasgow North East by-election, voters pick Labour candidate Willie Bain
    as the replacement for former Speaker of the House of Commons Michael Martin.
    (BBC News)
  - Russian President Dmitry Medvedev calls for an overhaul of the Russian economy
    and democratic modernisation in an annual state of nation address. (BBC) (Reuters
    South Africa) (ITAR-TASS)
  - The head of the Sri Lanka Armed Forces, Sarath Fonseka, resigns over reports he
    is suspected to contest the next presidential election. (AP)
  - U.S.-based rights group Human Rights Watch accuses Chinese authorities of running
    illegal "black jails" where Chinese citizens are detained for bringing up local
    complaints. (Al Jazeera) (Ghana Broadcasting Corporation) (The Independent)
  - Sheikh Mohamed Abdi Aware, a Somali judge known for issuing tough sentences to
    pirates and Islamists, is shot dead in Somalia's Puntland region. (IOL) (BBC)
    (Press TV)
  - At least 18 people are killed in the collapse of an illegal mine in western Ghana,
    Ghana's most devastating mining tragedy. (Times of India) (BBC) (RTÉ)
  - Thousands of Maoist supporters demonstrate in an anti-government protest in Nepal
    over the President's decision to overrule attempts to sack the head of the army.
    (Hindustan Times) (AFP) (Xinhua) (The Himalayan Times)
  - Former President of Palau Thomas Remengesau Jr. is convicted of 12 ethics code
    violations. (RNZI)
  - The government of Venezuela nationalizes the Fama de America and Cafea coffee
    producers. (Businessweek)
