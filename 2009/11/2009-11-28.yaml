Date: '2009-11-28'
Source_URI: Portal:Current events/2009 November 28
Intelligence_Payload:
  Uncategorized:
  - The death toll in a ferry accident in southern Bangladesh rises to 33. (Sify)
    (Press TV) (Bangkok Post)
  - Sri Lanka's former army chief Sarath Fonseka announces he will run for President
    in the presidential election next year. (Daily News & Analysis) (AFP)
  - A Chinese court hears the first civil lawsuit by a parent whose child fell ill
    during last year's tainted milk scandal. (AP) (China Daily) (BBC)
  - The Government of Ireland promises more money to the flood relief fund as ongoing
    flooding worsens in some counties, including Clare, Galway and Offaly. (RTÉ)
  - Protesters and police clash at a demonstration protesting a meeting of the World
    Trade Organization in Geneva, Switzerland. (Swissinfo) (Wall Street Journal)
  - At least 73 people die as a ferry sinks in Lake Mai-Ndombe in the Democratic Republic
    of the Congo. (BBC) (Al Jazeera)
  - Pakistan's National Reconciliation Ordinance, issued by former President Pervez
    Musharraf in October 2007 to provide several thousand politicians (including current
    President Asif Ali Zardari) amnesty from charges of political corruption, expires.
    (AFP) (CNN) (Daily Times Pakistan)
  - Russia's prosecutor general opens a criminal case into the 2009 Nevsky Express
    bombing which killed at least 26 people yesterday. (Deutsche Welle) (Russia Today)
    (BBC)
  - Three people are killed and four injured after a Zimbabwean cargo plane catches
    fire at Shanghai Pudong International Airport. (Xinhua) (AP) (Bernama)
  - Japan launches its fifth spy satellite on the H-IIA rocket from the Tanegashima
    Space Center. (Kyodo) (Mainichi Shimbun) (Times of India)
  - A second day of voting in national and presidential elections in Namibia takes
    place. (AFP)
