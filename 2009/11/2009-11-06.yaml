Date: '2009-11-06'
Source_URI: Portal:Current events/2009 November 6
Intelligence_Payload:
  Uncategorized:
  - Tens of thousands of people protest against government cutbacks in eight Irish
    cities and ten locations across Northern Ireland. (The Irish Times) (RTÉ)
  - Germany's Defence Minister Karl-Theodor zu Guttenberg admits mistakes were made
    in a September 4 Afghan air raid which resulted in 142 deaths. (The Sydney Morning
    Herald)
  - At least 34 people are killed and 29 are injured when a bus falls into a gorge
    in Himachal Pradesh. (The Times of India) (RIA Novosti) (BBC) (Reuters) (CNN)
  - At least nine people are missing following the crash of a Russian military plane
    in the Pacific Ocean. (RIA Novosti) (BBC)
  - Three people are hurt and a gunman takes his own life in a rare shooting incident
    in Yokohama, Japan. (BBC) (Daily Yomiuri)
  - One person is killed and five are injured during a shooting in an office building
    in Orlando, Florida, USA. (CNN), (Reuters)
  - Saudi forces continue more raids against rebel Houthi fighters in northern Yemen,
    after rebel fighters killed a Saudi security official. (Al Jazeera) (UPI)
  - The Russian human rights group Memorial says security forces from Chechnya have
    kidnapped the head of another rights group in Moscow and flown him to Grozny.
    (Al Jazeera) (AP)
  - Ousted Honduran President Manuel Zelaya says a deal to resolve the political crisis
    in the country is "dead", after interim leader Roberto Micheletti announced a
    unity government without him. (BBC) (New York Times)
  - 19 people are killed after a truck runs into a crowd in Luanxian, Hebei, China.
    (Xinhua) (Press Trust of India) (RIA Novosti)
  - Indian and Burmese armed forces target a Nagaland separatist rebel base in the
    northeast of Burma. (BBC)
  - A court in Côte d'Ivoire orders that compensation due to thousands of people affected
    by the dumped waste of Trafigura should not be distributed to one man. (BBC)
  - Niger's foreign affairs ministry confirms customs officials in Nigeria are blocking
    Niger from goods importation. (BBC) (Reuters)
  - Singer-songwriter Elton John is released from his hospital bed in London after
    a period of illness which saw him cancel several concerts on The Red Piano Tour.
    (BBC) (CBC) (Reuters India)
