Date: '2009-11-14'
Source_URI: Portal:Current events/2009 November 14
Intelligence_Payload:
  Uncategorized:
  - New Zealand qualify for the 2010 FIFA World Cup for the first time since 1982,
    by defeating Bahrain in a playoff billed as "the biggest sporting event ever staged
    in New Zealand" and the country's most attended football match ever. (BBC) (Arabnews)
  - U.S. evangelist Tony Alamo is sentenced to 175 years in prison for taking underage
    girls across several states for sexual intercourse. (CNN) (Telegraph.co.uk)
  - The Ogaden National Liberation Front, a separatist Somali rebel group in the southeast
    of Ethiopia, says it has begun a new offensive. (BBC) (Ethiopian Review)
  - A Peruvian court orders the arrest of two Chilean military officers on charges
    of spying, causing a diplomatic row between the two countries. (AFP) (BBC)
  - Two Saudi soldiers are killed and five wounded killed in fighting with Houthi
    rebels in northern Yemen. (Press TV) (Al-Sharq al-Awsat) (AFP)
  - More than 1,000 ultra-Orthodox Jews demonstrate outside the offices of U.S. firm
    Intel in Israel in protest at work taking place at the site on the Jewish Sabbath.
    (Jerusalem Post) (Reuters) (BBC)
  - A fire at a shooting range in Busan, South Korea, kills 10 people, including two
    Japanese tourists, and injures six others. (Korea Times) (Japan Today) (UPI)
  - Slovenia signs an agreement with Russia to allow the South Stream gas pipeline
    to Europe pass through the country. (ITAR-TASS) (Bloomberg)
  - Thousands of protesters demonstrate in Taipei, Taiwan, against imports of certain
    U.S. beef products. (Radio Taiwan International) (AFP) (Taiwan News)
  - Several people are killed and dozens injured after an express train crashes near
    Jaipur, India. (NDTV) (BBC) (Indian Express)
  - The United Nations chief of the Food and Agriculture Organization completes a
    24 hour hunger strike in Rome, Italy, ahead of a UN summit next week. (AP)
  - At least 11 people are killed and 24 injured after a bomb explodes in Peshawar,
    Pakistan. (Al Jazeera) (Geo TV) (Brisbane Times)
  - The Papal ban on discussion of the ordination of women priests is challenged by
    Willie Walsh, Bishop of Killaloe, during his address to the Association of European
    Journalists in Dublin. (RTÉ) (BBC) (The Irish Times)
  - The body of veteran Slovenian mountaineer Tomaž Humar is located in the Himalayas
    days after going missing whilst climbing Langtang Lirung. (The Irish Times) (BBC)
  - Sweden returns 22 skulls taken by Swedish scientists from indigenous cemeteries
    in Hawaii during the 19th century. (BBC)
  - Russian authorities in Perm detain three homeless males on charges of murder,
    cannibalism and the unlawful selling of body parts to a kebab shop. (BBC) (The
    Irish Times) (The Times of India) (ABC Online)
