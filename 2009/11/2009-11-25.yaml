Date: '2009-11-25'
Source_URI: Portal:Current events/2009 November 25
Intelligence_Payload:
  Uncategorized:
  - 'Irish floods: Water levels rise between Gort and Kinvara, the main Galway-Limerick
    road is partially impassable, water levels in Athlone reach 50cm over the highest
    level on record, Waterways Ireland describes water levels on the River Shannon
    as "unmanageable" and says one third of Ireland''s annual rain has so far fallen
    during November alone. (RTÉ)'
  - '2009 South Yemen insurgency: Five Yemenis die when security forces clash with
    southern separatists. (Reuters)'
  - President of French Polynesia Oscar Temaru is ousted in a motion of no confidence
    by the Assembly of French Polynesia. The Assembly elects Gaston Tong Sang as president.
    Gaston returns to power just nine months after leaving office. This is the eleventh
    new government in five years. (Radio Australia)
  - Dubai World, the state-owned real-estate and ports giant, asks for a moratorium
    on its 59 billion US dollars' in debt until at least May 30, 2010. (Bloomberg)
  - Two journalists kidnapped more than a year ago in Somalia, an Australian and a
    Canadian, are released. (AP) (ABC News)
  - Five people are killed at a rally demanding secession in Shabwa, southern Yemen.
    (Reuters) (BBC) (Xinhua)
  - A court in Pakistan charges seven suspects in connection with the 2008 terrorist
    attacks in Mumbai. (Al Jazeera) (Hindustan Times) (AFP)
  - Prosecutors in the trial of a former Khmer Rouge prison chief Kaing Guek Eav request
    a 40 year prison sentence. (Phnom Penh Post) (AP) (Press TV)
  - Maguindanao massacre
  - Philippine police name a political ally of President Gloria Macapagal Arroyo as
    prime suspect in the Maguindanao massacre. (ABS-CBN News)
  - The Philippine National Police take full control of the province of Maguindanao
    to prevent an escalation of violence. (Philippine Daily Inquirer)
