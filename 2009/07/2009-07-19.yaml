Date: '2009-07-19'
Source_URI: Portal:Current events/2009 July 19
Intelligence_Payload:
  Uncategorized:
  - Ten policemen are arrested in Michoacán, Mexico, in connection with the murder
    of 12 federal police whose bodies were found piled next to a road. (France 24)
  - 26 people are killed through electrocution, drowning and collapsing roofs in Karachi,
    Pakistan. (RTÉ) (Reuters) (The Times of India)
  - A preserved barracks in the Netherlands that was used by Nazi Germany to process
    Jews and others on their way to concentration camps, known to have been occupied
    at one point by Anne Frank, is destroyed by fire. (France 24)
  - The last British Embassy worker being held in Iran after the disputed re-election
    of president Mahmoud Ahmadinejad and the ensuing street protests is released.
    (Sky News)
  - Giant jellyfish wreak havoc around the Sea of Japan. (CNN)
  - Henry Surtees, son of former Formula One world champion John Surtees, is killed
    by a flying wheel from a crash at the Brands Hatch round of the FIA Formula Two
    Championship supporting the WTCC.
