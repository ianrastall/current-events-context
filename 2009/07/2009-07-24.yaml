Date: '2009-07-24'
Source_URI: Portal:Current events/2009 July 24
Intelligence_Payload:
  Uncategorized:
  - China produces a giant panda using frozen sperm. (BBC) (The Irish Times) (The
    Washington Post) (Xinhua)
  - At least six people die as a Croatian high-speed train travelling from Zagreb
    to Split derails 30km from its destination. (AP via Google News)
  - Chloe Smith wins the Norwich North by-election, the first British constituency
    by-election since the United Kingdom Parliamentary expenses scandal, and gains
    the Conservative Party a seat held by Labour for the past 12 years. (The Guardian)
  - 20 people are killed in a bus crash near Rostov-on-Don, Russia. (BBC)
  - The President of Indonesia, Susilo Bambang Yudhoyono, is declared as the winner
    of the Indonesian presidential election. (AP via Google News)
  - Wildfires in the north east of Spain claim the lives of six firefighters in that
    region. (Sky News)
  - The trial of Burmese National League for Democracy General Secretary Aung San
    Suu Kyi nears its end. (Jakarta Globe) (The Times) (Al Jazeera)
  - Iranian President Mahmoud Ahmadinejad is urged to dismiss his choice of Vice President,
    Esfandiar Rahim Mashaei. (Associated Press) (Press TV)
  - Aria Air Flight 1525 crashes in Mashhad, Iran, killing at least 17 people and
    injuring 19 of the 153 people on board. (BBC)
  - The Gran Telescopio Canarias, the world's largest reflecting telescope, is inaugurated
    by King Juan Carlos I of Spain. (The New York Times)
  - Afghan President Hamid Karzai, setting out his election manifesto, vows to make
    foreign troops sign a framework governing how they operate in a bid to limit civilians
    casualties. (Reuters)
  - Canada's national rail service, Via Rail, cancels train service due to a strike
    by its engineer workers. (CTV)
  - FBI and IRS agents arrests 44 people, including five rabbis, two New Jersey state
    legislators, and three mayors in Operation Bid Rig. (The New York Times)
  - A group of 8 people were trapped for 8 hours in an Otis elevator in Toronto. A
    repair man who tried to fix the elevator fell 10 floors to his death. (CityNews)
