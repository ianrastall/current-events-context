Date: '2009-07-14'
Source_URI: Portal:Current events/2009 July 14
Intelligence_Payload:
  Uncategorized:
  - Malaysian opposition party PAS wins the Manek Urai by-election against government-led
    Barisan Nasional. (The Straits Times)
  - Jerzy Buzek, former Prime Minister of Poland, is elected the 28th President of
    the European Parliament, succeeding Hans-Gert Pöttering. (BBC) (AHN) (AFP)
  - The World Health Organization reports that yields for an H1N1 virus vaccine are
    lower than expected. (CTV)
  - July 2009 Ürümqi riots
  - China urges Turkish Prime Minister Tayyip Erdoğan to retract his comments of "genocide"
    in Xinjiang. (Today's Zaman) (Xinhua)
  - The Al-Qaeda Organization in the Islamic Maghreb vows to avenge deaths of Uyghurs
    in the Xinjiang region. (The Times) (Bloomberg) (The Times of India)
  - Two foreign nationals, believed to be French, are kidnapped by gunmen after a
    hotel is stormed in Mogadishu, Somalia. (Al Jazeera) (CNN)
  - 323 people – 289 Saudis and 41 foreigners – are sentenced at a court in Saudi
    Arabia for links to anti-government groups. (Al Jazeera)
  - Japanese Prime Minister Taro Aso survives a vote of no-confidence. (Mainichi Daily
    News) (Associated Press)
  - Former Liberian President Charles Taylor takes the stand in his own defence at
    his trial. (Liberian Inquirer) (IOL)
  - 240 people are arrested in a series of riots in France on the eve of the Bastille
    Day celebrations. (BBC) (France 24)
  - Talks on immigration between the United States and Cuba, suspended since 2003,
    will resume. (BBC) (Xinhua)
  - The Lithuanian parliament overcomes the President's veto and passes a law which
    forbids propaganda of homosexual, bisexual and polygamous relations, in order
    to protect minors from detriment to their development. At the same time the law
    forbids any mocking and defiance on the basis of sexual orientation. (Delfi) (Washington
    Post)
  - Canada imposes visa requirements to come into effect on July 14 on travellers
    from Mexico and the Czech Republic after a big jump in refugee claims from these
    two countries. (BBC)
  - An Egyptian civil servant is jailed for three years for insulting President Hosni
    Mubarak in a poem. (BBC)
  - The 11th Micronesian Chief Executives’ Summit (MCES) of Micronesian leaders opens
    in Majuro, Marshall Islands. (Pacific News Center)
  - Judy Chu wins the 32nd congressional district special election, becoming the first
    Chinese American woman elected to the U.S. House of Representatives. (Los Angeles
    Times)
