Date: '2009-07-09'
Source_URI: Portal:Current events/2009 July 9
Intelligence_Payload:
  Uncategorized:
  - A magnitude 5.7 earthquake strikes Yunnan province of China, killing one person
    and destroying over 10,000 homes. (BBC)
  - July 2009 Ürümqi riots
  - Chinese President Hu Jintao returns to Beijing and chairs Politburo Meeting, vowing
    "severe punishment" on culprits as the social order in Ürümqi is being restored.
    (Xinhua)
  - China opposes Turkey's attempt to place the riots on the agenda of the United
    Nations Security Council, saying it is a "domestic affair", as Turkish Trade and
    Industry Minister Nihat Ergun and some Turkish companies call for a boycott of
    Chinese goods. (Xinhua)
  - 2009 Iranian election protests
  - Tehran Governor Morteza Tamaddon vows to "smash" any new protests. (Al Bawaba)
  - Iranian police fire tear gas at protesters near Tehran University as new protests
    continue. (BBC) (The Globe and Mail) (CNN)
  - Sudan confirms negotiations are underway to free the kidnapped Irish and Ugandan
    aid workers Sharon Commins and Hilda Kawuki. (RTÉ)
  - New cyber attacks strike South Korean websites, after several successive days
    of attacks. (Yonhap) (Associated Press) (The Korea Times)
  - The death toll from a mass poisoning involving home-brewed alcohol in Gujarat,
    India rises to 71. (RTÉ)
  - United Nations Secretary General Ban Ki-moon says G8 action on climate change
    is "not good enough". (BBC)
  - Kul Bahadur Khadka, the Nepalese general appointed acting army chief by former
    Maoist Prime Minister Prachanda denies allegations of plans to stage a coup d'état.
    (BBC)
  - British phone tapping controversy
  - David Cameron is asked to dismiss one of his most trusted advisers over allegations
    of illegal phone hacking by the Rupert Murdoch-owned News of the World tabloid.
    (The Times)
  - British police are to investigate phone hacking claims by a newspaper. (BBC) (Bloomberg)
    (The New York Times)
  - A drone strike by the United States kills 50 Taliban militants in South Waziristan,
    Pakistan. (BBC)
  - 25 people, including 21 civilians and 4 police, die and four are injured when
    an overturned truck carrying explosives blows up on a road south of Kabul, Afghanistan.
    (RTÉ)
  - Bombs in Baghdad and northern Iraq kill at least 41 people and wounded more than
    80, police say. (Sky News)
  - The United States claims to have released five Iranian diplomats held in Iraq
    since 2007, but in fact delivers them into Iraqi custody. (Al Jazeera) (CNN)
