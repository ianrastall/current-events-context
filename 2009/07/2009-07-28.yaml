Date: '2009-07-28'
Source_URI: Portal:Current events/2009 July 28
Intelligence_Payload:
  Uncategorized:
  - At least fifteen people die and at least 65 more disappear after a boat carrying
    200 Haitian migrants sinks near the Turks and Caicos Islands. (BBC) (Daily Express)
    (Houston Chronicle) (Reuters) (Toronto Star)
  - Violence in Nigeria continues as troops shell the home of Ustaz Mohammed Yusuf
    in Maiduguri, Borno State. (BBC) (The Miami Herald)
  - England and Japan will stage the Rugby World Cup in 2015 and 2019 respectively.
    (BBC) (The Guardian) (RTÉ) (Taiwan News) (The Times)
  - The United States and China continue the first U.S.-China Strategic and Economic
    Dialogue. (The Washington Post)
  - South African police clash with about 200 protesters at an informal settlement
    outside Johannesburg. (BBC)
  - Kashmiri minister Omar Abdullah resigns over claims he was involved in a sex trafficking
    and underage prostitution racket. (The Times)
  - The Garda Síochána and Metropolitan Police Service in London arrest and charge
    three men in connection with Ireland's largest cocaine seizure in West Cork in
    July 2007. (RTÉ)
  - Abdelkader Belliraj, accused of leading an Islamist militant group and committing
    six murders in Belgium, is sentenced to life imprisonment in Morocco. (BBC)
  - Efforts to free two aid workers from Ireland and Uganda who were kidnapped in
    Darfur on 3 July are said to be "ongoing". (RTÉ)
  - Iran releases 140 people detained in its post-election unrest as the supreme leader
    orders a prison where jailed protesters were killed be closed. (The Daily Telegraph)
    (Press TV)
  - Uyghur activist Rebiya Kadeer lands in Tokyo despite anger from China. (BBC) (China
    Daily) (The Japan Times)
  - Protests outside Croke Park threaten to disrupt U2's 360° Tour Gothenburg dates
    and several football matches. (Bloomberg) (CBC) (The Guardian) (NME) (RTÉ) (Taiwan
    News)
  - AIDS campaigners and human rights groups accuse the Cambodian government of herding
    HIV-affected families into an "Aids colony" outside Phnom Penh. (The Guardian)
  - Licia Nunez, a model and soap opera actress, admits meeting Silvio Berlusconi
    at a health spa in 2008 but denies she is a prostitute. (The Times)
  - A national memorial is to be erected and a national day of remembrance is considered
    in Ireland for victims of child abuse. (Irish Examiner)
  - The longlist for the 2009 Man Booker Prize is announced. (The Guardian)
  - Chinese scientists announce the discovery of "vampire gene", Tryp-SPc. (AsiaNews)
  - Italian officials evacuate a newly built hospital in Agrigento in western Sicily
    after tests show it risked collapse in an earthquake. (BBC)
  - 22 people are killed, 41 are injured and seven are missing after heavy rain and
    floods in Sichuan. (China Daily)
