Date: '2009-07-21'
Source_URI: Portal:Current events/2009 July 21
Intelligence_Payload:
  Uncategorized:
  - Japanese Prime Minister Taro Aso dissolves the House of Representatives, setting
    the stage for a general election on August 30. (Xinhua)
  - NASA scientists confirm an impact event on Jupiter, the first observed since the
    impact of Shoemaker-Levy 9 on July 16–22, 1994. (New Scientist)
  - Foreign Minister Miguel Ángel Moratinos becomes the first Spanish government official
    to visit Gibraltar in 300 years. (The New York Times)
