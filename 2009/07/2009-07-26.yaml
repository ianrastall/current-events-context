Date: '2009-07-26'
Source_URI: Portal:Current events/2009 July 26
Intelligence_Payload:
  Uncategorized:
  - Seven people are killed in hurricane-force winds reaching 130 km/h in Poland and
    two more are killed by wind in the Czech Republic. Hail falls on 60,000 hectares
    of crops in Austria, causing damage of at least €20 million. (Sydney Morning Herald)
    (BBC)
  - Dozens are killed in clashes between radical Islamists and security forces in
    Bauchi, Nigeria, following a police station attack by an armed gang in retaliation
    for the arrests of their leaders. (The Irish Times) (Reuters)
  - Chinese hackers target the website of Australia's biggest film festival in Melbourne
    over a documentary about Uyghur leader Rebiya Kadeer. (BBC) (France 24) (The Guardian)
  - Fernando Chui Sai On is elected the third Chief Executive of Macau. (BBC)
  - Six people are killed in an apartment building fire in Rinkeby, Stockholm. (RTÉ)
    (Stockholm News)
  - India launches its first nuclear submarine, the INS Arihant. (The Times of India)
    (Associated Press) (Xinhua) (RIA Novosti)
  - Voters in Guinea-Bissau take part in a runoff presidential election between Kumba
    Ialá and Malam Bacai Sanhá. (CNN) (IOL)
  - French President Nicolas Sarkozy takes ill whilst exercising. (RTÉ)
  - At least five people are killed and more are wounded by a suicide attack at a
    concert hall in the Chechen capital Grozny. (BBC)
