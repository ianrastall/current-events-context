Date: '2009-07-20'
Source_URI: Portal:Current events/2009 July 20
Intelligence_Payload:
  Uncategorized:
  - Ajmal Kasab, the only surviving gunman in the 2008 Mumbai attacks, pleads guilty
    in an Indian court, ending months of denials. (Associated Press) (The Times of
    India)
  - Iranian reformists call for a referendum to resolve the political crisis in the
    country. (Al Jazeera) (The Malaysia Star) (Reuters)
  - Wildfires force thousands of residents to flee in the Okanagan, western Canada.
    (AFP) (Toronto Star)
  - India and the United States sign a defence pact. (BBC)
  - 260 cars pile up in Germany. (News 24)
  - Tuvalu announces its plan to become the world's first carbon neutral country by
    2020. (Telegraph)
