Date: '2009-07-18'
Source_URI: Portal:Current events/2009 July 18
Intelligence_Payload:
  Uncategorized:
  - Last surviving Battle of Jutland veteran and last surviving founder member of
    the Royal Air Force Henry Allingham dies at the age of 113. At the time of his
    death he was the oldest living man in the world. (BBC) (AFP) (RTÉ)
  - Ireland's Green Party, part of the ruling coalition, votes by a two to one majority
    to campaign for the Treaty of Lisbon prior to the 2 October referendum. (France
    24)
  - Three people are missing in Nachterstedt, Germany, after their home collapses
    into a lake. (Deutsche Welle)
  - Voters in Mauritania go to the polls for a presidential election, its first election
    since the coup d'état last year. (Al Jazeera) (BBC) (Xinhua)
  - Palestinian Prime Minister Salam Fayyad receives a slice as Nablus bakers attempt
    to set a record for the world's biggest kunafa. (BBC)
  - A woman is killed and two people are seriously injured in an accident involving
    a motorcycle on the Tour de France in France, the race's first fatal accident
    since 2002. (BBC) (RTÉ)
  - The Justice and Equality Movement releases sixty prisoners in Kutum, Darfur. (BBC)
  - Brazil demands the return of over 1,400 tonnes of hazardous British waste. (BBC)
    (The Independent) (The Times)
  - Over 100 UK and US schoolchildren and teachers are quarantined in Beijing due
    to swine flu. (BBC)
  - China admits it shot dead 12 rioters in one riot incident in Ürümqi. (BBC)
  - Forty-seven people are injured in a collision between two Muni Metro light rail
    cars at the West Portal Station in San Francisco, United States. (San Francisco
    Chronicle) (KGO-TV)
  - Paul Biyoghé Mba is appointed Prime Minister of Gabon after Jean Eyeghe Ndong
    launches his presidential campaign. (France 24) (Reuters)
