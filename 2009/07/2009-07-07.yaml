Date: '2009-07-07'
Source_URI: Portal:Current events/2009 July 7
Intelligence_Payload:
  Uncategorized:
  - July 2009 Ürümqi riots
  - Chinese police arrest 1,434 people over rioting in Xinjiang province. (Xinhua)
    (BBC) (South African Star)
  - Han Chinese take to the streets of Ürümqi following an earlier protest by Uighur
    women, amid rising ethnic tensions. (BBC) (The Times) (Xinhua) (Al Jazeera)
  - Uighur rights activists criticise Muslim-majority countries for not speaking out
    against Chinese repression of Muslim Uighurs. (Al-Jazeera)
  - A public memorial for Michael Jackson takes place at the Staples Center in Los
    Angeles, California, with over 17,000 viewing in Los Angeles, and millions more
    viewing around the world. (AP via Google News)
  - UN Secretary-General Ban Ki-moon begins his two-day visit to Ireland.(RTÉ)
  - Police shoot dead the Cherokee County serial killer, identified as Patrick Tracy
    Burris, after he fired several times at the police. (BBC)
  - Tunisian police charge nine men—including two air force officers—with plotting
    several deaths during joint military exercises with the US. (Jerusalem Post) (BBC)
  - A £1m permanent memorial to the victims of the July 7, 2005 London bombings is
    unveiled in the city's Hyde Park. (BBC) (RTÉ)
  - An institutional child abuse museum is suggested in Ireland by the Labour Party's
    Ruairi Quinn, with Education Minister Batt O'Keeffe criticising the Opposition
    on the issue. (RTÉ)
  - The United Nations Security Council condemns the recent missile launches by North
    Korea. (Xinhua)
  - The United Nations says around 204,000 people have fled violence in Mogadishu,
    Somalia as a result of a militant offensive against government forces. (CNN)
  - Two bombs explode in the southern Philippines, killing two and injuring 53. (Philippine
    Daily Inquirer) (Bloomberg)
  - Pope Benedict XVI calls for a new financial world order guided by ethics, dignity
    and the search for a common good. (The Times of India) (Associated Press)
  - 12 people die in a U.S. missile strike on a training camp run by Baitullah Mehsud
    in South Waziristan, Pakistan. (Al Jazeera) (Reuters)
  - Ousted Honduran President Manuel Zelaya is to meet with United States Secretary
    of State Hillary Clinton. (Reuters)
  - Iraq bans planned group visits to Saddam Hussein's grave. (BBC)
  - United States President Barack Obama addresses graduates in Moscow, Russia. (BBC)
    (The New York Times) (RIA Novosti)
  - A Mikoyan MiG-29 of the Serbian military crashes at Batajnica Air Base near Belgrad,
    killing the pilot and one soldier on the ground. (Sky News)
  - Iranian opposition leaders call for the release of people who demonstrated in
    the aftermath of the disputed presidential election. (New Straits Times)
  - Prosecutors at the International Criminal Court challenge a tribunal's decision
    not to indict Sudanese President Omar al-Bashir on charges of genocide in Darfur.
    (Associated Press)
  - Al Franken is sworn in as a U.S. Senator, the 60th caucusing with the Democratic
    Party which is a filibuster-proof majority. (The New York Times)
