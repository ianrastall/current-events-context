Date: '2009-07-25'
Source_URI: Portal:Current events/2009 July 25
Intelligence_Payload:
  Uncategorized:
  - Harry Patch, the last surviving World War I veteran to have fought in the trenches,
    dies aged 111. (BBC) (CNN)
  - Worldwide protests in 80 cities take place in support of Iranian protesters following
    the disputed presidential election. (The Times) (CNN) (Al Jazeera)
  - Voters go to the polls in Iraqi Kurdistan for legislative and presidential elections.
    (The New York Times) (The Hindu) (Xinhua)
  - Wildfires in France, Greece, Sardinia and Spain kill and injure dozens. (RTÉ)
  - Felipe Massa is critically injured in a 160mph crash during qualifying for the
    2009 Hungarian Grand Prix, when a suspension component from Rubens Barrichello's
    car hits him on his helmet. (TSN)
