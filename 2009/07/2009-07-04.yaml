Date: '2009-07-04'
Source_URI: Portal:Current events/2009 July 4
Intelligence_Payload:
  Uncategorized:
  - The Cherokee County killer claims his fifth victim in South Carolina, United States.(CNN)
  - Ireland's Minister for Foreign Affairs, Micheál Martin, calls for the immediate
    release of two aid workers who were kidnapped in Sudan's Darfur region. (RTÉ)
  - Bishop of Rochester Michael Nazir-Ali calls on homosexuals to "repent and be changed"
    and says the Church of England will not be "rolled over by culture". (The Daily
    Telegraph)
  - North Korea test fires seven more missiles into the Sea of Japan. (The Daily Telegraph)
    (The Korea Times) (Xinhua)
  - Torrential rain forces over 150,000 people from their homes, topples hundreds
    of houses and punches a hole in the spillway of a dam in southern China. (IOL)
  - The United Nations Secretary General Ban Ki-moon is denied access to meet detained
    National League for Democracy leader Aung San Suu Kyi while on a visit to Burma.
    (BBC) (Al Jazeera) (Bangkok Post)
  - 12 militants are killed in an air raid in northwestern Pakistan. (Xinhua)
  - Nine Chechen policeman are killed after their vehicle is attacked in neighbouring
    Ingushetia, southern Russia. (BBC) (The Hindu)
  - The Iranian state-owned newspaper Kayhan calls for Mir-Hossein Mousavi to stand
    trial. (The Los Angeles Times)
  - 35 people are arrested in Mazandran, northern Iran, during post-election protests.
    (Press TV)
  - Serena Williams wins the women's singles at the 2009 Wimbledon Championships after
    defeating her sister, Venus Williams. (The Daily Telegraph)
  - Three people die as a result of contracting swine flu in New Zealand, the country's
    first flu deaths. (IOL) (The Irish Times)
