Date: '2009-07-22'
Source_URI: Portal:Current events/2009 July 22
Intelligence_Payload:
  Uncategorized:
  - Chinese and Russian troops begin a five-day joint military drill, aimed at boosting
    their ability to fight terrorism. (Xinhua)
  - The Permanent Court of Arbitration in The Hague issues a decision on the borders
    of Abyei, a region subject to violent contention in Sudan. (BBC)
  - The longest total solar eclipse of the 21st century takes place over parts of
    Asia and the Pacific Ocean. (ABC News Australia)
  - The first Tamiflu-resistant H1N1 case is found in Canada, bringing the world total
    of such cases to five. (Sympatico MSN News Canada)
  - Ireland's Council of State meets to consider two pieces of controversial legislation
    at Áras an Uachtaráin in Dublin. (RTÉ)
  - U.S. Secretary of State Hillary Clinton warns that it could arm its allies in
    the Gulf and extend a "defense umbrella" over the region, if Iran goes nuclear.
    (Sky News)
  - Ukrainian former Interior Ministry official Oleksiy Pukach confesses to murdering
    journalist Georgiy R. Gongadze and implicates other high-ranking officials.(AFP)
