Date: '2009-07-05'
Source_URI: Portal:Current events/2009 July 5
Intelligence_Payload:
  Uncategorized:
  - Three people are killed and twenty injured following clashes in Ürümqi, capital
    of Xinjiang, western China. (BBC) (Xinhua)
  - At least eight people die in blasts at two explosives factories in Madhya Pradesh,
    India. (BBC)
  - One person dies after a monorail collision at Walt Disney World Resort in Orlando,
    Florida. (CNN)
  - The Fellowship of Confessing Anglicans claims the debate over homosexuality may
    split the Church of England the way it has split the Episcopal Church in the United
    States. (BBC)
  - An Irish government delegation arrives in Cairo to be briefed on the Sudan kidnappings.
    (RTÉ)
  - Roger Federer defeats Andy Roddick to win the men's singles of the 2009 Wimbledon
    Championships. (BBC) (Washington Post)
  - An Iranian political analyst employed by the British embassy in Tehran faces a
    lengthy prison sentence after being charged with "acting against national security".
    (The Times)
  - Two British service personnel participating in Operation Panther's Claw are killed
    in separate attacks in southern Afghanistan. (BBC)
  - Five people die in an explosion outside a Catholic cathedral in Cotabato, Mindanao,
    Philippines. (BBC) (Boston Globe) (GMA News) (The Irish Times) (Reuters) (RTÉ)
  - Mexico holds its legislative election. (El Universal)
  - A security operation is conducted to protect the personal details of British diplomat
    John Sawers. (BBC)
  - Italian Prime Minister Silvio Berlusconi is embarrassed by a lesbian kiss at his
    Sardinian estate. (The Times)
  - First Minister of Northern Ireland Peter Robinson holds separate talks with both
    sides in the dispute over the Drumcree conflict. (RTÉ)
  - Voters in Bulgaria go to the polls for a parliamentary election. (Sofia News Agency)
    (BBC)
  - At least 23 Somalis are killed and over 50 are wounded in Mogadishu as government
    soldiers retaliate to mortars fired at the presidential palace by insurgents.
    (Al Jazeera) (BBC) (France 24) (Reuters)
  - US Vice President Joe Biden says in an ABC interview that Washington will not
    interfere in an Israeli attack on Iran. (Al Jazeera) (The New York Times)
