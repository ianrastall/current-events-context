Date: '2009-07-02'
Source_URI: Portal:Current events/2009 July 2
Intelligence_Payload:
  Uncategorized:
  - Heavy thunderstorms in Dublin lead to widespread flooding and the closure of some
    of the city's major roads and rail lines, as well as some evacuations. (RTÉ) (The
    Irish Times)
  - A report by Amnesty International states that Israeli military activities and
    Palestinian militant rocket attacks during the Gaza War were war crimes. (BBC)
  - The United States armed forces launch Operation Strike of the Sword against the
    Taliban in Helmand, Afghanistan. (BBC)
  - The Honduran interim government defies international pressure to reverse the recent
    coup, saying there is no chance at all of ousted President Manuel Zelaya returning
    to office. (Reuters)
  - A 148-year-old colonial law banning homosexual intercourse in India is overturned
    by the High Court in New Delhi. (BBC) (The Times)
  - The South Korean Defence Ministry says North Korea has fired four missiles off
    its east coast. (Sky News)
  - Japanese diplomat Yukiya Amano is elected Director General of the International
    Atomic Energy Agency. (AP via The Washington Post)
  - The first vaccine for H1N1 swine flu virus strain has been made by Novartis in
    Marburg, Germany. (BBC)
  - A Royal Air Force plane crashes in a rural area of Argyll, United Kingdom. (The
    Guardian)
