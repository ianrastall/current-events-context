Date: '2009-07-23'
Source_URI: Portal:Current events/2009 July 23
Intelligence_Payload:
  Uncategorized:
  - The Dow Jones Industrial Average closes above 9000 for the first time since January.
    (The New York Times)
  - The United States signs the Treaty of Amity and Cooperation in Southeast Asia.
    (BBC)
  - Two Swedish passenger ferries sailing between the mainland and Gotland collide
    in fog just off the port of Nynäshamn south of Stockholm, injuring at least 15
    people. (Reuters)
  - The Bank of Canada declares the recession has ended in Canada predicting the economy
    will grow by 1.3 per cent over the summer months. (CTV)
  - Voters in Kyrgyzstan go to the polls for a presidential election, as the main
    opposition candidate Almazbek Atambayev pulls out. (AFP via Google News) (BBC)
  - The SEACOM high speed internet link to East Africa goes live. (AFP) (BBC) (All
    Africa.com)
  - Ireland's Dublin Area Rapid Transit (DART) celebrates its twenty-fifth anniversary.
    (Irish Independent) (The Irish Times)
  - The FBI arrests 30 officials and rabbis in the U.S. state of New Jersey as part
    of a public corruption and international money laundering probe called Operation
    Bid Rig. Authorities also search a synagogue and remove several boxes. (Newark
    Star-Ledger)
  - Peter Harry Carstensen, premier of the state of Schleswig-Holstein, intentionally
    loses a vote of confidence, clearing the way for early elections simultaneously
    with the German federal election, 2009. (Deutsche Welle)
  - Chicago White Sox pitcher Mark Buehrle completes a perfect game against the Tampa
    Bay Rays. (ESPN.com)
