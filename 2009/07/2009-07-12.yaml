Date: '2009-07-12'
Source_URI: Portal:Current events/2009 July 12
Intelligence_Payload:
  Uncategorized:
  - Chinese Foreign Minister Jiechi Yang says tranquility can be restored in Xinjiang
    Uighur Autonomous Region and the perpetrators will be brought into court without
    any ethnical discrimination, in a 1 hour 15 minute phone conversation regarding
    the recent incidents with his Turkish counterpart Ahmet Davutoğlu. (Anadolu Agency)
  - Countries in the Middle East take precautionary measures to control the spread
    of H1N1 during and after the Hajj, where several million Muslims from all over
    the world will arrive in Mecca for the annual pilgrimage in late November. (IRIN)
  - Five people are killed and several injured in India after a bridge being constructed
    for the Delhi Metro collapses. (Indian Express) (Associated Press) (BBC)
  - A 6.1 magnitude earthquake hits Puno Region in southern Peru with epicenter near
    Juliaca. (CBS)
  - The opposition Democratic Party of Japan wins the most seats in the Tokyo prefectural
    election. (Kyodo) (The Daily Telegraph)
  - Kidnapped Italian Red Cross volunteer Eugenio Vagni is freed by Abu Sayyaf. (The
    Philippine Star) (AFP)
  - Head of the CIA Leon Panetta accuses former United States Vice President Dick
    Cheney of hiding an intelligence program from Congress. (CNN) (BBC)
