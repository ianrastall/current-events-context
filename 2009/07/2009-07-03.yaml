Date: '2009-07-03'
Source_URI: Portal:Current events/2009 July 3
Intelligence_Payload:
  Uncategorized:
  - The African Union stops cooperation with the International Criminal Court because
    it charged Sudanese President Omar al-Bashir with war crimes. (BBC)
  - Three people die and over a dozen are injured in riots after a dead pig is thrown
    into an under-construction mosque in Mysore, India. (CNN)
  - John Demjanjuk is declared fit to stand trial for assisting in the deaths of 29,000
    Jews in Treblinka extermination camp. (RTÉ)
  - Disney XD is in Latin America and Brazil
  - Energy ministers of Algeria, Niger and Nigeria sign the intergovernmental agreement
    on the Trans-Saharan gas pipeline. (Reuters) (Bloomberg) (BBC)
  - Flooding affects parts of County Mayo and County Galway in Ireland. (RTÉ) (The
    Irish Times)
  - United Nations Secretary-General Ban Ki-moon arrives in Burma, meeting junta leader
    Senior General Than Shwe and calling for the release of political prisoners. (BBC)
    (Bangkok Post)
  - Two Iranian staff working for the British embassy in Tehran will face trial over
    allegedly inciting protests. (BBC)
  - Three dinosaur species—Australovenator wintonensis, Wintonotitan wattsi and Diamantinasaurus
    matildae—are discovered in Australia. (BBC) (Sydney Morning Herald)
  - Syria invites United States President Barack Obama to the Damascus summit. (Sky
    News)
  - Algerian raï music star Cheb Mami is jailed for five years in France for trying
    to force his former partner to have an abortion. (BBC) (IOL) (Reuters)
  - Manuel Pinho, Portugal's Economy Minister, resigns after performing a cuckold
    gesture at an opposition MP. (BBC)
  - North Korea broadcasts its first ever beer commercial, for Taedonggang beer. (BBC)
    (The Los Angeles Times)
  - Two more people die in Viareggio, Italy, following the train explosion, bringing
    the death toll to 21. (RTÉ)
  - Six people, including three children, are killed after a fire in a high rise residential
    tower block in Camberwell, south London, England. (BBC)
  - Russia opens a route for the United States to fly arms to Afghanistan. (The New
    York Times)
  - American politician Sarah Palin, current Governor of Alaska and 2008 Vice Presidential
    candidate, announces her resignation as Governor, effective July 26. (Fox News)
    (CNN)
  - Two aid workers, including one Irish woman, with the charity GOAL are kidnapped
    by an armed gang in Sudan's Darfur region. (RTÉ)
  - Thirteen people are injured after the Paris to Cahors train derails near Limoges,
    France. (RTÉ)
  - A 6.0 magnitude earthquake centred in the Sea of Cortez shakes western Mexico.
    (IOL)
