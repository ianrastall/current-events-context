Date: '2009-07-06'
Source_URI: Portal:Current events/2009 July 6
Intelligence_Payload:
  Uncategorized:
  - 2009 Honduran coup d'état
  - Honduran President Manuel Zelaya diverts his jet to Nicaragua after being barred
    from landing in Tegucigalpa as ground troops kill two in a battle against supporters
    with the country in turmoil. (BBC) (The Guardian)
  - United Nations Secretary General Ban Ki-moon urges the Organization of American
    States to restore constitutional order in Honduras following the coup. (AFP)
  - Riots in China's Xinjiang region leave 156 dead and more than 800 injured. (Xinhua)
    (BBC) (Times of India) (Al Jazeera)
  - South Africa's new "Hawks" serious crime squad begins work six months after its
    "Scorpions" predecessor was disbanded amid claims of political bias. (BBC)
  - Egyptians mourn the death of Marwa El-Sherbini, called the "hijab martyr" after
    she was killed in a German courtroom by a man convicted of insulting her religion.
    (BBC)
  - Burundi and Rwanda join the East African Community Customs Union. (BBC)
  - Iran frees another British embassy worker, leaving one local worker in jail. (CNN)
    (Reuters)
  - About 800 pages of the earliest surviving Christian Bible are displayed on the
    internet. (BBC)
  - The Movement for the Emancipation of the Niger Delta says it has seized a chemical
    tanker with six crew and attacked a second oil facility. (Associated Press) (This
    Day)
  - Liberian President Ellen Johnson-Sirleaf's spokesman calls "surprising" a call
    by the country's truth commission that she be barred from office. (BBC)
  - Nigerian militants hold six crew members of an oil tanker, including its Russian
    captain. (BBC)
  - United States President Barack Obama and Russian President Dmitry Medvedev agree
    on cutting their nuclear warheads and cooperate on military action in Afghanistan.
    (The Guardian) (Bloomberg) (Reuters)
  - A Government delegation including hostage negotiators, led by Ireland's Ambassador
    to Egypt Gerard Corr continue efforts in Khartoum to locate two Irish and Ugandan
    aid workers who were kidnapped in Sudan. (RTÉ)
  - Bolivian drug enforcement officials raid what they call the biggest cocaine laboratory
    ever found in their country. (BBC)
  - European Union foreign policy chief Javier Solana says he will not seek another
    term in office. (BBC)
  - The center-right Citizens for European Development of Bulgaria party wins big
    in the Bulgarian parliamentary elections (BBC)
  - Three gunmen open fire at a house in Miami, Florida, United States, killing one
    person and wounding eleven others. (San Francisco Chronicle)
  - Iran says it will hold the US responsible for any Israeli attack against their
    country, in response to US Vice President Joe Biden's claim that the US will not
    interfere in an Israeli attack on Iranian nuclear facilities. (Al Jazeera)
