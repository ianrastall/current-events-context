Date: '2009-07-10'
Source_URI: Portal:Current events/2009 July 10
Intelligence_Payload:
  Uncategorized:
  - July 2009 Ürümqi riots
  - 'Turkey''s Prime Minister Erdogan strengthens his rhetoric: "These incidents in
    China are as if they are genocide. We ask the Chinese government not to remain
    a spectator to these incidents." (Associated Press) (BBC) (Reuters)'
  - A curfew is reimposed in Ürümqi, days after it was lifted. (BBC)
  - The families of "innocent victims" killed are to receive 200,000 yuan ($29,282)
    in compensation. (The Straits Times) (Xinhua)
  - The trial of National League for Democracy General Secretary Aung San Suu Kyi
    resumes after a six week break. (BBC) (The Times of India) (The Guardian)
  - More than 400,000 people are evacuated following an earthquake in Yunnan, China.
    (Bangkok Post) (Xinhua)
  - One person is killed by a bull, (the third fatality since 1980), during the Running
    of the Bulls in Pamplona, Spain. (The Times) (CNN) (EITB)
  - A senior Iranian cleric calls for changes to the election laws in the country
    to prevent further post-election unrest in the future. (Press TV) (The Los Angeles
    Times)
  - Detained Nigerian leader for the Movement for the Emancipation of the Niger Delta
    Henry Okah accepts an amnesty by government. (BBC) (Vanguard)
  - A Paris court convicts four men and a girl in the kidnapping, torture and murder
    of Ilan Halimi, sentencing the ringleader to life in prison. (AP via Yahoo)
  - Automaker General Motors emerges from bankruptcy protection after 40 days under
    court supervision. (AP via Yahoo)
