Date: '2009-07-11'
Source_URI: Portal:Current events/2009 July 11
Intelligence_Payload:
  Uncategorized:
  - The President of Peru Alan García names Javier Velásquez as the Prime Minister
    of Peru. (AFP via Google News)
  - The death toll from the recent riots in Ürümqi rises to 184. (NDTV) (CNN) (China
    Daily)
  - A mass funeral takes place in Srebrenica, Bosnia, to commemorate the 14th anniversary
    of the massacre that took place in the town. (Al Jazeera) (The Hindu) (Reuters)
  - United States President Barack Obama addresses the Ghanaian parliament. (Al Jazeera)
    (BBC) (Joy FM)
  - The UK announces that 8 British soldiers are killed in Afghanistan, the country's
    worst death toll in a 24-hour period. (Al Jazeera)
