Date: '2009-05-12'
Source_URI: Portal:Current events/2009 May 12
Intelligence_Payload:
  Uncategorized:
  - The Liberal Party wins a majority of seats in British Columbia's general election.
    (Bloomberg)
  - The Army raids a Taliban military base in Swat, Pakistan. (BBC)
  - Suspected Nazi death-camp officer John Demjanjuk arrives in Munich, Germany, to
    begin his trial. (New York Times)
  - Combat between the government and the Islamic Courts Union kills at least 123
    people in Mogadishu, Somalia. (BBC)
  - The United States obtains its first seat on the United Nations Human Rights Council.
    (BBC)
  - The Space Shuttle Atlantis begins the final servicing mission to the Hubble Space
    Telescope.
