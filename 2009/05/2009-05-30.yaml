Date: '2009-05-30'
Source_URI: Portal:Current events/2009 May 30
Intelligence_Payload:
  Uncategorized:
  - The South Africa Bulls defeat the New Zealand Chiefs to win rugby union's 2009
    Super 14. (BBC)
  - A bomb is discovered and defused aboard a Kish Air flight between Ahvaz and Tehran,
    Iran. (CNN)
  - Three Jundallah members who bombed a mosque in Zahedan, Iran, on May 28 are hanged.
    (Reuters)
  - Chelsea F.C. defeat Everton F.C. to win the 2009 FA Cup Final. (BBC)
  - Former Iraqi Trade Minister Abdel Falah al-Sudani is arrested at Baghdad International
    Airport for corruption. (BBC)
  - Pakistan's military captures Mingora, Swat, from the Taliban. (AP via Google News)
  - Germany allows Canadian company Magna International to take over automaker Opel.
    (BBC)
  - North Korea launches its sixth ballistic missile despite the United Nations Security
    Council's possible international sanctions. (AFP via News Limited)
  - Sale, Victoria, Australia hosts triple J's One Night Stand
