Date: '2009-05-09'
Source_URI: Portal:Current events/2009 May 9
Intelligence_Payload:
  Uncategorized:
  - Nine chemical substances are added to the Stockholm Convention on Persistent Organic
    Pollutants' banned list. (Reuters)
  - The Democratic Party wins a plurality of seats in Indonesia's People's Consultative
    Assembly. (BBC)
  - Jacob Zuma is inaugurated as President of South Africa. (BBC) (Reuters)
  - The United Nations Security Council condemns the Union of Forces for Democracy
    and Development's ongoing incursions from Sudan into Chad. (France24) (UN News)
  - The Pakistani Army kills 55 Taliban militants in Swat, Pakistan. (Reuters)
