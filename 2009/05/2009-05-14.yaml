Date: '2009-05-14'
Source_URI: Portal:Current events/2009 May 14
Intelligence_Payload:
  Uncategorized:
  - Chrysler terminates 789 dealerships throughout the United States. (Detroit Free
    Press)
  - Burma charges National League for Democracy General Secretary Aung San Suu Kyi
    for violating her house arrest. (Sky News)
  - North Korea announces that arrested American journalists Euna Lee and Laura Ling
    will be tried on June 4. (Reuters)
  - The Democratic Forces for the Liberation of Rwanda kill at least 90 people in
    South Kivu, Democratic Republic of the Congo. (BBC)
  - Chinese Communist Party General Secretary Zhao Ziyang's secret memoirs about the
    1989 protests in Tiananmen Square are published. (BBC)
  - The South Korean Navy destroyer Mummu the Great and the U.S. Navy cruiser Gettysburg
    capture 17 suspected Somali pirates in the Gulf of Aden. (CNN)
