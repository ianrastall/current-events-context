Date: '2009-05-07'
Source_URI: Portal:Current events/2009 May 7
Intelligence_Payload:
  Uncategorized:
  - The private military company Xe (formerly Blackwater Worldwide) ends its operations
    in Baghdad, Iraq. (AP via Google News)
  - The Eastern Partnership conducts its inaugural meeting in Prague, Czech Republic.
  - General Motors reports a US$6 billion loss for the first fiscal quarter of 2009.
    (AP via the Wall Street Journal)
  - One police officer is killed and two more are injured in Napier, New Zealand.
    (TVNZ.co.nz)
  - Canada experiences its first swine influenza-related death. (CP24 via Canadian
    Press)
  - Wildfires near Santa Barbara, California, United States, burn of land and force
    15,000 people to evacuate. (BBC)
  - The Armed Forces and the Union of Forces for Democracy and Development battle
    near Goz Beïda, Ouaddaï Region, Chad. (BBC)
  - China announces that 5,335 schoolchildren died during an earthquake in Sichuan
    on May 12, 2008. (The Guardian)
  - An American man is arrested in Burma for trespassing on National League for Democracy
    General Secretary Aung San Suu Kyi's property. (BBC)
  - The Central Bank reduces the Eurozone's interest rate to 1% and implements €60
    billion of quantitative easing. (BBC)
  - A fire at a casino kills ten people and injures ten others in Dnipropetrovsk,
    Ukraine. (BBC)
  - The fourth phase of India's general election concludes. (Hindustan Times)
  - The Bank of England freezes interest rates at 0.5% and will implement £50 billion
    of quantitative easing. (BBC)
  - Ten Army soldiers are killed and 22 others injured during combat with the Taliban
    in Swat, Pakistan. (BBC)
  - Somali pirates hijack the Netherlands' MV Marathon and attack the U.S. Navy cargo
    ship Lewis and Clark. (Reuters)
