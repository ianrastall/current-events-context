Date: '2009-05-06'
Source_URI: Portal:Current events/2009 May 6
Intelligence_Payload:
  Uncategorized:
  - The European Parliament delays its planned reform of the European Union's telecommunications
    policy. (Wall Street Journal)
  - The United States Supervisory Capital Assessment Program finds that financial
    services companies JPMorgan Chase, and American Express do not need more capital
    from the Troubled Asset Relief Program. (MarketWatch) (WSJ) (MarketWatch)
  - A car bomb kills at least ten people and injures 30 others in Dora, Baghdad, Iraq.
    (Sky News)
  - The Taliban captures Mingora, Swat, Pakistan. (The Times)
  - Czech President Václav Klaus postpones his signing of the Senate-approved Treaty
    of Lisbon. (Aktuálně.cz) (RTÉ)
  - Guinea withdraws ambassadors from 30 countries worldwide. (Seattle Times)
  - Somali pirates hijack Germany's MV Victoria and release the United Arab Emirates'
    MV Al Meezan. (Bloomberg) (Reuters via Washington Post)
  - The U.S. state of Maine legalizes same-sex marriage. (AP)
