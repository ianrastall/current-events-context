Date: '2009-05-16'
Source_URI: Portal:Current events/2009 May 16
Intelligence_Payload:
  Uncategorized:
  - Alexander Rybak of Norway wins the 2009 Eurovision Song Contest. (Reuters)
  - Ruth Padel becomes the University of Oxford's first female Professor of Poetry.
    (The Irish Times)
  - Manchester United Football Club win the 2008-09 season of the Premier League.
    (AFP via The Australian)
  - The Gulf drug cartel liberates 59 inmates from a prison in Zacatecas, Mexico.
    (Reuters via Yahoo! Xtra)
  - Representative Yukio Hatoyama becomes the President of Japan's Democratic Party.
    (BBC)
  - The People's Party concedes to the United Progressive Alliance in India's general
    election. (AFP/BBC via ABC Australia)
  - The Niger Delta Emancipation Movement claims that Nigeria's military killed one
    of its hostages during an operation. (BBC)
  - A car bomb kills at least 11 people and injures 25 others in Peshawar, Pakistan.
    (BBC)
  - President Mahinda Rajapaksa says that Sri Lanka has "militarily defeated the Tamil
    Tigers". (MSNBC)
  - The United Kingdom's Royal Air Force ends its involvement in Iraq. (BBC)
  - An acid attack injures 30 people in Hong Kong, People's Republic of China. (BBC)
  - Thousands of demonstrators protest unemployment in Berlin, Germany. (The Irish
    Times)
  - India and Turkey confirm their first cases of (A)H1N1 influenza. (BBC)
