Date: '2009-05-21'
Source_URI: Portal:Current events/2009 May 21
Intelligence_Payload:
  Uncategorized:
  - Four men are arrested for planning to bomb two synagogues and destroy military
    aircraft in New York, United States. (Sky News)
  - Egyptian businessman Hisham Talaat Moustafa is convicted of murdering Lebanese
    pop singer Suzanne Tamim. (CNN)
  - A man who entered the President's official residence in Belgrade, Serbia, with
    at least one hand grenade surrenders. (CNN)
  - Her Majesty's Government will allow retired Gurkhas who served in the Armed Forces
    to settle in the United Kingdom. (CNN)
  - Apa Sherpa summits Mount Everest for the 19th time. (Salt Lake Tribune)
  - Israel evicts Jewish settlers from a hilltop in the West Bank. (Reuters)
  - The U.S. develops a framework to provide the United Arab Emirates with nuclear
    energy. (White House)
  - The Communist Party kills 16 police officers near Nagpur, Maharashtra, India.
    (BBC)
