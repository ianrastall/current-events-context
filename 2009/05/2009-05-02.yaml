Date: '2009-05-02'
Source_URI: Portal:Current events/2009 May 2
Intelligence_Payload:
  Uncategorized:
  - The racehorse Mine That Bird wins the 135th Kentucky Derby. (New York Times)
  - The Sri Lankan Army kills 91 people and injures 87 others at a hospital inside
    a civilian safe zone. (BBC)
  - The United Nations orders Israel to stop evicting Palestinians from East Jerusalem.
    (Al Jazeera)
  - Israel aids the Palestinian National Authority, Egypt, and Jordan in combatting
    swine influenza. (Jerusalem Post)
  - Australia will spend US$70 billion through 2029 to improve its Defence Force.
    (AFP via Sydney Morning Herald)
  - The Pacific Islands Forum indefinitely suspends Fiji's membership. (Xinhua)
  - The Indonesian Pilots Federation threatens to strike unless Marwoto Komar's conviction
    is overturned. (Bali News)
  - Two Army soldiers and 13 Taliban militants are killed during a raid in Mohmand
    Agency, Pakistan. (BBC)
  - The Republic of China allows financial investment from mainland China for the
    first time since 1949. (The Times)
  - The bulk carrier MV Ariana is hijacked by Somali pirates in the Indian Ocean.
    (Bloomberg) (BBC)
