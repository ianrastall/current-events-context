Date: '2009-05-25'
Source_URI: Portal:Current events/2009 May 25
Intelligence_Payload:
  Uncategorized:
  - Nine United Kingdom Cabinet ministers have been implicated in Parliament's expenses
    scandal. (RTÉ)
  - Tsakhiagiin Elbegdorj of the Democratic Party is elected as President of Mongolia.
    (BBC)
  - North Korea conducts its second nuclear test. (ABC News Australia)
  - Singapore's consumer price index decreased by 1.5% in April, its largest recorded
    decline. (Reuters)
  - Somali President Sharif Ahmed requests international aid in combating Islamic
    militants. (CNN)
  - The Space Shuttle Atlantis completes the final servicing mission to the Hubble
    Space Telescope.
