Date: '2009-05-19'
Source_URI: Portal:Current events/2009 May 19
Intelligence_Payload:
  Uncategorized:
  - The United States Government Accountability Office warns that the Global Positioning
    System could fail by 2010. (Guardian)
  - President Mahmoud Abbas inaugurates the Palestinian National Authority's new government.
    (BBC)
  - United Kingdom House of Commons Speaker Michael Martin announces that he will
    resign on June 21. (BBC)
  - President Mahinda Rajapaksa declares Sri Lanka "liberated" from the Liberation
    Tigers of Tamil Eelam. (BBC) (Reuters)
  - Uzbekistan's government leases Navoiy Airport to the North Atlantic Treaty Organization.
    (IWPR)
  - Pro-Tamil Tigers protesters and the Metropolitan Police Service battle, injuring
    16 people, in London, England. (Sky News)
  - The U.S. and Russia begin negotiations to replace the expiring Strategic Arms
    Reduction Treaty. (BBC)
  - The Association of Southeast Asian Nations expresses "grave concern" about National
    League for Democracy General Secretary Aung San Suu Kyi's trial. (Reuters)
  - Ethiopia's National Defense Force reenters Somalia. (BBC)
  - Former Canadian Prime Minister Brian Mulroney testifies about his relationship
    with arms dealer Karlheinz Schreiber. (CBC)
  - Manmohan Singh of the National Congress is reelected as Prime Minister of India.
    (AFP)
  - Brazilian oil company Petrobras and the People's Republic of China finalize a
    US$10-billion agreement. (WSJ)
  - The European Parliament requests that Spain reform its planning laws. (BBC)
  - A 47-million-year-old skeleton of a lemur species is discovered in Germany. (Sky
    News)
  - Somali pirates release the German cargo ship MV Patriot. (AP)
  - Bahrain recognizes Kosovo. (BNA)
  - Boston Latin School and two other local schools in Massachusetts are closed for
    at least seven days due to the swine flu. (Boston)
