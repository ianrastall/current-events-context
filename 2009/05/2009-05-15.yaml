Date: '2009-05-15'
Source_URI: Portal:Current events/2009 May 15
Intelligence_Payload:
  Uncategorized:
  - General Motors will terminate 1,100 dealerships in the United States by October
    2010. (CBS)
  - The United States releases Lakhdar Boumediene from Guantánamo Bay Naval Base's
    detention center. (BBC)
  - Sixty-five indigenous peoples declare an insurgency against Peru's government.
    (AFP via Google News)
  - Shahid Malik resigns as the United Kingdom's Parliamentary Under-Secretary of
    State for Justice. (BBC)
  - The Eurozone's 16 national economies contract by 2.5% throughout the first fiscal
    quarter of 2009. (BBC)
  - U.S. President Barack Obama will resume military tribunals for detainees at Guantánamo
    Bay. (BBC)
  - A suicide attack kills three people in Grozny, Chechnya, Russia. (BBC)
  - Demonstrators demand the resignation of Guatemalan President Álvaro Colom. (Sky
    News)
  - Sudan accuses Chad of launching two air raids on its territory. (Reuters)
  - The Central Bank of Nicaragua introduces new 10 and 20 Córdoba banknotes. (TIME)
