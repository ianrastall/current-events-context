Date: '2009-05-23'
Source_URI: Portal:Current events/2009 May 23
Intelligence_Payload:
  Uncategorized:
  - Madhav Kumar Nepal of the Communist Party (Unified Marxist-Leninist) is elected
    as Prime Minister of Nepal. (CNN)
  - Fourteen people are killed as a King Air 350 crashes near philippines, Bahia,
    Brazil. (AFP via ABC News)
  - United Nations Secretary-General Ban Ki-moon demands better humanitarian aid for
    250,000 war refugees in Sri Lanka. (CNN)
  - The Army and the Taliban battle in Mingora, Swat, Pakistan. (Al Jazeera)
  - Former South Korean President Roh Moo-hyun commits suicide. (AP via USA Today)
  - Floods force the evacuations of Kempsey and Grafton, New South Wales, Australia.
    (ABC News)
  - Madagascar's political parties agree to establish a provisional government and
    a truth/reconciliation commission. (BBC)
  - A car bomb kills at least six people and injures 70 others in Peshawar, Pakistan.
    (BBC)
  - Germany's Federal Assembly re-elects Horst Köhler as President. (Deutsche Welle)
  - United States President Barack Obama nominates former astronaut Charles F. Bolden,
    Jr. as Administrator of the National Aeronautics and Space Administration. (Los
    Angeles Times)
  - A bomb kills two people and injures 12 others in Kathmandu, Nepal. (CNN)
