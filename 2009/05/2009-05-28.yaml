Date: '2009-05-28'
Source_URI: Portal:Current events/2009 May 28
Intelligence_Payload:
  Uncategorized:
  - General Motors asks Germany to indebt its subsidiary automakers Opel and Vauxhall
    Motors. (Times Online)
  - Sixteen people are killed and more than 20 injured when a bus crashes near Yambol,
    Bulgaria. (BBC)
  - Raymond Hewlett, a person of interest in Madeleine McCann's disappearance, gives
    the West Yorkshire Police a DNA sample for testing. (Sky News)
  - Former Chilean Army conscript José Adolfo Paredes Márquez is charged with murdering
    activist/singer Víctor Jara during General Augusto Pinochet's coup d'état in 1973.
    (Guardian)
  - United States Secretary of State Hillary Clinton reaffirms President Barack Obama's
    demand that Israel halt settlement in the West Bank. (BBC)
  - A 7.1-magnitude earthquake occurs in the Gulf of Honduras. (BBC)
  - Two bombs kill eight people and injure 74 others in Peshawar, Pakistan. (CNN)
  - The United States and South Korea increase their alert states after North Korea
    renounces the armistice that halted the Korean War in 1953. (BBC)
  - Scientists claim the long-tailed dinosaur had the capacity to hold its cranium
    at a height in a giraffe-like manner. (New Zealand Harold)
  - The Circle MRT line began operations, with all 5 stations along the Stage 3 of
    the MRT line from Bartley to Marymount being opened at the same time operated
    by SMRT Trains Ltd using Alstom Metropolis C830s.
