Date: '2009-05-26'
Source_URI: Portal:Current events/2009 May 26
Intelligence_Payload:
  Uncategorized:
  - General Secretary Hu Jintao of the Communist Party in the People's Republic of
    China and Nationalist Party Chairman Wu Poh-hsiung in Taiwan meet in Beijing to
    discuss cross-Strait relations. (Xinhua)
  - The Supreme Court of California upholds Proposition 8, the state's ban on same-sex
    marriage. (AP via Yahoo)
  - President Barack Obama nominates Federal Judge Sonia Sotomayor for the United
    States Supreme Court. (AP via Yahoo)
  - President Isaias Afewerki says Eritrea will not release imprisoned journalist
    Dawit Isaak. (DPA via EarthTimes)
  - Pakistan's Supreme Court will allow former Prime Minister Nawaz Sharif to stand
    for election. (BBC)
  - North Korea tests two more missiles. (BBC)
  - South Africa's economy contracted by 6.4% during the first fiscal quarter of 2009
    and thus enters recession. (BBC)
  - An air raid on a people-smuggling convoy in Sudan in January killed 119 people.
    (BBC)
  - French President Nicolas Sarkozy will open a military base in Abu Dhabi, United
    Arab Emirates. (Press Trust of India)
  - A suicide attack kills six people in Kapisa Province, Afghanistan. (BBC)
  - The Swedish Navy arrests seven Somali pirates during the attempted hijacking of
    a Greek ship. (Radio Netherlands)
  - Nigerien President Tandja Mamadou dissolves the National Assembly. (Reuters)
  Trial of Aung San Suu Kyi:
  - The National League for Democracy's General Secretary testifies in Burma. (Reuters)
  - U.S. President Obama calls for her immediate and unconditional release from incarceration.
    (BBC) (RTÉ)
