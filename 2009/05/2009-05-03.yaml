Date: '2009-05-03'
Source_URI: Portal:Current events/2009 May 3
Intelligence_Payload:
  Uncategorized:
  - Nepalese Prime Minister Prachanda resigns. (BBC)
  - Ricardo Martinelli of Democratic Change is elected as President of Panama. (Reuters
    via The New York Times)
  - An avalanche kills at least six people in the Central Eastern Alps in Austria.
    (Sky News)
  - The French Navy frigate Nivôse captures 11 Somali pirates. (CNN)
  - An Army helicopter crashes in Táchira, Venezuela, killing at least 18 people.
    (BBC)
  - Iraq will not extend the deadline for the United States Armed Forces to withdraw
    from the Iraq War. (Reuters)
