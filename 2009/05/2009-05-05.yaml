Date: '2009-05-05'
Source_URI: Portal:Current events/2009 May 5
Intelligence_Payload:
  Uncategorized:
  - The confirmed worldwide number of cases of swine influenza reaches 1,490. (CNN)
  - Her Majesty's Government reveals the names of 16 of the 22 people banned from
    entering the United Kingdom. (The Times)
  - At least 500 soldiers mutiny after Georgia's government discovers a plot to assassinate
    President Mikheil Saakashvili. (BBC)
  - Floods and mudslides in Brazil kill 19 people and render 186,000 others homeless.
    (MSNBC)
  - The Braidwood Inquiry begins to investigate the safety of Tasers and the death
    of Robert Dziekański. (CBC)
  - The National Hockey League's Phoenix Coyotes announces that they have filed for
    Chapter 11 bankruptcy. (Business Wire)
