Date: '2009-05-22'
Source_URI: Portal:Current events/2009 May 22
Intelligence_Payload:
  Uncategorized:
  - Manmohan Singh is inaugurated for his second term as Prime Minister of India.
    (Reuters)
  - Floods kill at least 11 people in Haiti. (Press Association via Google News)
  - Former Special Air Service officer John Wick is revealed as the whistleblower
    behind the United Kingdom Parliament's expenses controversy. (BBC) (Telegraph)
  - A 5.7-magnitude earthquake strikes Chiautla de Tapia, Puebla, Mexico. (USGS)
  - At least 36 people are killed as the Transitional Federal Government and Islamist
    militants battle in Mogadishu, Somalia. (BBC)
  - Bingu wa Mutharika is reelected as President of Malawi. (AP via Google News)
  - The Space Shuttle Atlantis prepares to land at the Kennedy Space Center in Florida,
    United States. (NASA)
  - The United Nations requests aid for 1,500,000 people who have been displaced by
    war in northwest Pakistan. (Sky News)
  - Spain's National Police Corps arrests 23 people for trafficking Nigerian prostitutes
    through voodoo. (BBC)
  - Northern Ireland's first sextuplets are born in Belfast. (BBC) (RTÉ)
  - The Credit CARD Act of 2009 was signed into U.S. law by the President, Barack
    Obama. (NBC)
