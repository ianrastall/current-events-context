Intelligence_Payload:
  Uncategorized:
  - United States President Barack Obama proclaims May 2009 as Jewish American Heritage
    Month. (White House)
  - Pope Benedict XVI advocates the creation of a Palestinian state. (BBC)
  - The European Commission fines Intel Corporation €1.06 billion for anti-competitive
    practices. (BBC)
  - The United Nations reports that Somalia is experiencing its worst drought since
    the 1990s. (BBC)
  - Artillery shelling kills 50 people and injures 40 more at a hospital in Sri Lanka's
    war zone. (Sky News)
