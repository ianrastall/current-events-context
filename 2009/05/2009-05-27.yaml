Date: '2009-05-27'
Source_URI: Portal:Current events/2009 May 27
Intelligence_Payload:
  Uncategorized:
  - United States President Barack Obama nominates Hispanic Roman Catholic theologian
    Miguel H. Díaz as Ambassador to the Holy See. (AP via Google News)
  - FC Barcelona defeats Manchester United F.C. to win the 2008-09 UEFA Champions
    League Final. (CNN)
  - North Korea launches its fifth missile since testing a nuclear weapon on May 25.
    (Sky News)
  - Russian investment firm Digital Sky Technologies purchases 1.96% of the social
    network service Facebook. (New York Times)
  - A suicide attack kills at least 35 people and injures 250 more in Lahore, Pakistan.
    (CNN) (BBC)
  - Soyuz TMA-15 launches from the Baikonur Cosmodrome in Kazakhstan. (Reuters)
  - A rare white tiger is euthanized after killing a zookeeper at the Zion Wildlife
    Gardens in Whangarei, New Zealand. (BBC) (RTÉ)
  - Russia will supply US$1 billion of uranium to civilian nuclear reactors in the
    United States. (CNN)
  - An anti-piracy warship destroys a Yemeni fishing vessel in the Red Sea, killing
    at least two people.
  - The planets Jupiter and Neptune experience a triple conjunction as seen from Earth.(BBC)
