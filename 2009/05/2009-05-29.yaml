Date: '2009-05-29'
Source_URI: Portal:Current events/2009 May 29
Intelligence_Payload:
  Uncategorized:
  - Member of Parliament for Scunthorpe Elliot Morley will resign at the United Kingdom's
    2010 General Election. (BBC)
  - American record producer Phil Spector is jailed for 19 years for murdering actress
    Lana Clarkson in 2003. (BBC)
  - American media companies Time Warner and AOL terminate their merger. (Washington
    Times)
  - Irish brewery Beamish and Crawford closes after 217 years in business. (Irish
    Examiner) (Belfast Telegraph)
  - Irish broadcaster Pat Kenny hosts his final episode of The Late Late Show. (BBC)
    (RTÉ)
  - Kavya Shivashankar of Kansas wins the Scripps National Spelling Bee in Washington,
    D.C. (ABC)
  - Former President Roh Moo-hyun's state funeral is held in Seoul, South Korea. (Korean
    Daily News)
  - The United States Department of Defense will create a computer-security military
    command. (New York Times)
  - Four people are killed when a dam bursts in Piauí, Brazil. (BBC)
  - The lethal Lujo virus is identified in Africa. (AP)
  - North Korea launches a short-range ballistic missile. (RTÉ)
  - Soyuz TMA-15 docks with the International Space Station. (BBC)
  - Ireland's government intends to further recapitalize Anglo Irish Bank by €4 billion.
    (Irish Times) (RTÉ)
  - At least 20,000 civilians were reportedly killed during the final five months
    of Sri Lanka's civil war. (The Times)
