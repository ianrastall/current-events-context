Date: '2009-05-24'
Source_URI: Portal:Current events/2009 May 24
Intelligence_Payload:
  Uncategorized:
  - Brazilian driver Hélio Castroneves wins automobile racing's 93rd Indianapolis
    500. (ESPN)
  - The Deccan Chargers defeat the Royal Challengers Bangalore to win the Indian Premier
    League. (The Hindu)
  - The Austrian film The White Ribbon wins the Golden Palm at the 2009 Cannes Film
    Festival. (The Guardian)
  - The Space Shuttle Atlantis lands at Edwards Air Force Base in California, United
    States, after completing the final servicing mission to the Hubble Space Telescope.
    (NASA)
  - Eleven people are killed during a stampede at the Mawazine world music festival
    in Rabat, Morocco. (BBC) (France 24)
  - One person is killed and 15 others are injured during a clash in a Sikh temple
    in Vienna, Austria. (BBC)
  - British driver Jenson Button wins the 2009 Monaco Grand Prix. (Telegraph)
