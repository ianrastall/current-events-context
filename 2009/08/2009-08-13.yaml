Date: '2009-08-13'
Source_URI: Portal:Current events/2009 August 13
Intelligence_Payload:
  Uncategorized:
  - On an official visit to Colombia, Mexican President Felipe Calderón offers his
    country’s mediation in the conflict between that country, Ecuador and Venezuela.
    (MercoPress)
  - Ousted Honduran President Manuel Zelaya praises Chile for its “great image” as
    he meets its President Michelle Bachelet in Santiago and says he expects the United
    States to take "more drastic actions" against the de facto government of Roberto
    Micheletti. (MercoPress)
  - Eleven people, including four policemen, are killed in several separate insurgent
    attacks in Russia's Republic of Dagestan. (AFP)
  - At least 23 government soldiers and more than 20 Muslim extremists are killed
    in a day-long clash in the southern Philippines. (France 24)
  - Former Afghan President Burhanuddin Rabbani survives an ambush by the Taliban
    in the Ali Abad District of Kunduz province, Afghanistan. (Voice of America)
  - Supporters of Guinea's self-declared President, Captain Moussa Dadis Camara, form
    a movement, Dadis Must Stay, to call for him to be allowed to continue in office.
    (BBC)
  - The French and German economies rebound, helping push the Eurozone to the brink
    of economic recovery in the second quarter, delivering a further signal that the
    worst of the global crisis may be coming to an end in Europe. (FT)
  - The European Union will extend its sanctions on Burma to cover members of the
    judiciary responsible for the verdict in the trial of opposition leader Aung San
    Suu Kyi. (Reuters)
  - A rare signed copy of Adolf Hitler’s Mein Kampf sells at the Mullock’s auction
    at Ludlow Racecourse, Shropshire, for £21,000 (€24,400). (The Irish Times) (BBC)
    (Evening Herald) (The Guardian) (The New York Times) (Toronto Star)
