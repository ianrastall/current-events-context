Date: '2009-08-16'
Source_URI: Portal:Current events/2009 August 16
Intelligence_Payload:
  Uncategorized:
  - A 6.9 magnitude earthquake occurs near Siberut Island, Sumatra, Indonesia, at
    14:38 local time, injuring at least seven people. (France24.com)
  - Police clash with hundreds of protesters in Peru demonstrating over the failure
    of President Alan García's government to rebuild the city of Pisco two years since
    it was devastated by a powerful earthquake. (The Irish Times)
  - Two Russian Sukhoi Su-27 fighter jets collide during a training flight southeast
    of Moscow, killing the commander of the Russian Knights demonstration team. (RIA
    Novosti) (Xinhua) (BBC)
  - Tropical Storm Claudette becomes the first tropical cyclone to affect the U.S.
    mainland in 2009. (Weather.com)
