Date: '2009-08-24'
Source_URI: Portal:Current events/2009 August 24
Intelligence_Payload:
  Uncategorized:
  - According to court documents, the Los Angeles County coroner's preliminary assessment
    is that Michael Jackson's death was caused by an overdose of the anesthetic propofol.(Reuters)
  - The district court in Stockholm orders BitTorrent tracker The Pirate Bay's largest
    ISP, Black Internet, to stop serving the website's traffic.(CNET News)
  - Sweden's TeliaSonera AB announces cash offers worth around $687.7 million in total
    for shares it doesn't already own in Baltic operators Teo LT and Eesti Telekom.
    (The Wall Street Journal)
  - Former Cuban leader Fidel Castro appears on television for the first time in more
    than a year. (BBC) (Al Jazeera)
  - Thieves kill an endangered Sumatran Tiger in an Indonesian zoo and steal its body,
    leaving its intestines behind. (BBC) (Jakarta Globe)
  - Ireland's Green Party and gay rights organisations defend plans to introduce civil
    partnerships for same-sex couples following criticism of the move by Cardinal
    Seán Brady, Archbishop of Armagh and Primate of All Ireland. (The Irish Times)
  - China is to try 200 people suspected of their involvement in the Ürümqi riots
    last month. (GBC) (Associated Press) (Press TV)
  - Two mass graves containing the remains of communist soldiers dating from the Vietnam
    War are discovered in central Vietnam. (The Straits Times) (China Daily)
  - A Malaysian Muslim woman, Kartika Sari Dewi Shukarno, who was convicted of drinking
    alcohol, is granted a reprieve until after Ramadan. (Al Jazeera) (Bernama) (Xinhua)
    (IOL)
  - Scottish Justice Secretary Kenny MacAskill defends his decision to release the
    man convicted of the Lockerbie bombing, Abdelbaset al-Megrahi. (BBC) (The Guardian)
    (Al Jazeera) (Xinhua)
  - Kenya's fifth national census takes place. (KBC) (BBC) (The Nation) (Associated
    Press)
  - Captain Moussa Dadis Camara who seized power in a military coup in Guinea, refuses
    to rule out standing for President, after previously promising not to. (BBC) (AFP)
    (IOL)
  - At least 200 children are killed and around 900 hospitalised by Japanese encephalitis
    in Uttar Pradesh, India. (BBC)
  - Baitullah Mehsud is confirmed dead by leaders of Pakistan's Taliban. (Associated
    Press)
