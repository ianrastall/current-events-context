Date: '2009-08-29'
Source_URI: Portal:Current events/2009 August 29
Intelligence_Payload:
  Uncategorized:
  - Chandrayaan-1 loses contact with ground control. (Indian Express)
  - Noel Gallagher leaves the British rock band Oasis. (The Times) (Channel News Asia)
    (Reuters India) (The New York Times)
  - Several people are reported killed after fresh clashes erupt in the Kokang region
    of Shan State, northeastern Burma, near the border with China. A bomb is also
    thrown across the border. (Global Times) (Al Jazeera) (Times of India) (AFP)
  - North Korea frees four South Korean fishermen seized last month when the boat
    strayed across the Northern Limit Line sea boundary. (BBC) (JoongAng Daily)
  - Two civilian members of the UNAMID peacekeeping force are kidnapped by armed men
    in Darfur, Sudan. (BBC)
  - Seven people are found dead in the US state of Georgia and two are seriously wounded
    in one of the worst slayings in the state in 25 years.CBS News
