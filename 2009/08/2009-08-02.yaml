Date: '2009-08-02'
Source_URI: Portal:Current events/2009 August 2
Intelligence_Payload:
  Uncategorized:
  - One person is killed and 75 injured after an outdoor stage collapses at the Big
    Valley Jamboree country music festival in Alberta, Canada. (CBC) (CNN)
  - One person dies of pneumonic plague and eleven of his relatives are quarantined
    in Hainan Tibetan Autonomous Prefecture. (People's Daily Online)
  - Three workers from the Russian Emergency Ministry are killed in Ingushetia. (Kyiv
    Post) (RIA Novosti)
  - Nine families who have been living in East Jerusalem since 1956 are evicted by
    force. (Previous reports of 'two families' are wrong.) (Al Jazeera) (AFP) (BBC)
  - Merpati Nusantara Airlines Flight 9760, a Twin Otter plane with 16 on board, disappears
    over Papua, Indonesia. (Japan Today) (Bernama) (AFP)
  - Two newly discovered works by Mozart—a prelude and concerto movement—are performed
    in Salzburg, Austria. (BBC) (Associated Press) (Reuters)
  - A new strain of the virus that causes AIDS is discovered in a woman from Cameroon.
    (MSNBC)
  - Chinese police detain a further 319 people over unrest in the Xinjiang region
    last month. (Xinhua) (Press TV) (Reuters India)
  - Hundreds of firefighters on the Spanish island of La Palma in the Canary Islands
    are continuing to battle wildfires. (The Times) (The Telegraph)
  - At least 33 people die and several are injured as a bus flips over thrice in Zimbabwe.
    (BBC)
  - Around 2700 people are evacuated as 530 forest fires burn in British Columbia,
    Canada. (The Age) (AFP)
  - A large oil spill occurs in Langesund, Norway, after a Chinese ship, the Full
    City, drifted aground. (Stockholm News) (The Local)
  - Former Iranian President Mohammad Khatami criticizes the "show trial" of election
    protestors currently underway in the country. (Press TV) (The Independent)
  - The death toll from sectarian clashes in northern Nigeria rises to 700. (This
    Day) (CNN)
  - The BBC obtains a photograph showing Yusuf Mohamed, leader of the Boko Haram sect,
    was alive when captured by the Nigerian army. (BBC)
  - The remains of Michael Scott Speicher, the first United States Gulf War casualty,
    are located in the Al Anbar Governorate desert. (The Irish Times)
