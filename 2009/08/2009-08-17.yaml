Date: '2009-08-17'
Source_URI: Portal:Current events/2009 August 17
Intelligence_Payload:
  Uncategorized:
  - Japan officially exits the recession. (BBC) (RTÉ)
  - A bomb explodes on a truck at a fuel station in Charsadda, North-West Frontier
    Province, Pakistan (20 km from Peshawar), killing seven people. (BBC News)
  - A suicide bomber explodes a truck at a police station in Nazran in Russia's North
    Caucasus, killing at least 20 people and wounding about 60 others. (Yahoo! News)
    (NY Times)
  - An accident at the Sayano–Shushenskaya hydroelectric power station in Russia kills
    seven and causes power shortages in Siberia. (Reuters) (RTÉ)
  - The Canadian Forces begin exercises to protect Canada's sovereignty in the far
    north. (CTV)
  - The MV Arctic Sea, a cargo ship missing after an apparent hijacking in July off
    the Swedish coast, is discovered by the Russian Navy off Cape Verde. (CNN)
