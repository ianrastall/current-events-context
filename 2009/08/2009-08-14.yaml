Date: '2009-08-14'
Source_URI: Portal:Current events/2009 August 14
Intelligence_Payload:
  Uncategorized:
  - Pakistan begins its first international freight train service from Islamabad to
    Istanbul. (BBC)
  - Hundreds of people protest in Caracas, Venezuela, after journalists protesting
    a new education law were beaten the previous day. (El Universal) (Associated Press)
  - Malagasy peace talks break down when the armed forces reject one clause in the
    peace deal. (IOL)
  - The MV Arctic Sea, missing since late July, is reportedly found off the Cape Verde
    islands. (BBC) (The Times)
  - A Canadian court orders the government to repatriate Omar Khadr, the sole remaining
    Western citizen held in Guantanamo Bay detention camp. (The Star) (Canadian Press)
  - At least 13 people have died after a bus-train collision in Iaşi County, Romania.
    (Euronews) (Le Figaro) (Mediafax)
  - Paraguay’s government withdraws a bill approving Venezuela's incorporation to
    Mercosur, fearing a defeat in Congress could hurt relations between the two countries.
    (MercoPress)
  - In an unexpected move, Sudanese President Omar al-Bashir replaces Salah Gosh,
    his country's chief of security and intelligence since the mid-1990s, with General
    Mohamed Atta al-Mawla. (BBC)
  - The remains of over 2,000 people discovered in Poland's largest mass grave from
    World War II are reburied in a military cemetery. (ABC News) (BBC) (Boston Globe)
  - In Montevideo, President of Mexico Felipe Calderón and President of Uruguay Tabaré
    Vázquez sign a Strategic Association accord to strengthen political dialogue and
    bilateral trade relations. (MercoPress)
  - After launching a major offensive attack on a suspected ASG training camp, the
    day-long clash in the Southern Philippines resulted in 23 government casualties
    and 31 casualties from the Abu Sayyaf Group. (Philippines Government Portal)
  - Iranian reformists call for a probe of the Supreme Leader Ali Khamenei and his
    ability to rule. (Associated Press) (BBC)
  - An archaeological excavation uncovers the foundations of the 17th-century Smock
    Alley Theatre and several artefacts from theatrical performances in Dublin. (RTÉ)
  - Lynette Fromme, a former member of the Manson family, is released after serving
    34 years in prison. (ABC News)
  - Lawyers for the Lockerbie bomber, Abdelbaset al-Megrahi, say he is abandoning
    his second appeal against his conviction for the December 1988 attack as Scottish
    officials consider his request to be sent home to Libya. (MSNBC)
  - The United Kingdom imposes direct rule on the Turks and Caicos Islands after an
    inquiry found evidence of government corruption. (BBC) (Turks and Caicos Sun)
  - At least 13 people are killed and at least 85 are injured in a fierce gun battle
    in Gaza. (BBC)
  - United States senator Jim Webb arrives in Burma for talks with General Than Shwe.
    (Associated Press) (Bangkok Post)
  - A University of Glasgow study suggests Asians may view faces differently from
    others. (BBC)
