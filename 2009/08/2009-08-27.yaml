Date: '2009-08-27'
Source_URI: Portal:Current events/2009 August 27
Intelligence_Payload:
  Uncategorized:
  - English youth Michael Perham, aged 17 years, 5 months, becomes the youngest person
    to complete a solo circumnavigation of the world by sailboat, breaking the previous
    record by two months. (Reuters)
  - South African President Jacob Zuma is to visit Zimbabwe for talks on the power-sharing
    government. (The Herald) (IOL) (AFP)
  - Taiwan approves a visit by the Dalai Lama to comfort the victims of Typhoon Morakot.
    (Taiwan News) (Times South Africa) (Al Jazeera) (Xinhua)
  - Mali's parliament is to review a law giving women greater rights after thousands
    of Muslims protested the proposed law. (BBC) (AFP)
  - The United Nations Special Rapporteur on indigenous rights, James Anaya, says
    the Australian government intervention in Aboriginal areas is "discriminatory".
    (The Australian) (Xinhua) (BBC)
  - Colombia files a complaint about Venezuela with the Organization of American States,
    saying the country has been interfering in its domestic affairs. (MercoPress)
    (BBC)
  - Thousands of people flee fighting between government troops and ethnic rebels
    in northeastern Burma. (Bangkok Post) (AFP) (Australia Network News)
  - The head of the joint United Nations–African Union force in Darfur, Martin Agwai,
    says the war in the region is over and is now only suffering low-level disputes.
    (BBC) (Reuters)
  - Sri Lanka dismisses a video purporting to show violence by its Armed Forces against
    Tamils. (The Guardian) (CNN) (SLBC)
  - South Korea proposes regular reunions of families separated by the Korean War
    to North Korea. (Yonhap) (Times of India) (Associated Press)
  - Judges at the Supreme Court of India agree to make their financial assets public.
    (BBC) (Press Trust of India)
  - The Standing Committee of the National People's Congress passes its first law
    on the People's Armed Police, giving it statutory authority to respond to riots,
    terrorist attacks or other emergencies. (China Daily) (IOL) (The New York Times)
  - Russia deploys an S-400 anti-missile defence system close to its border with North
    Korea. (The Guardian) (Tehran Times)
  - A suicide bomber hits a Pakistani security checkpoint at the main border crossing
    for convoys ferrying NATO supplies into Afghanistan, killing at least 18 border
    guards. (MSNBC)
