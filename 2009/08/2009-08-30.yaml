Date: '2009-08-30'
Source_URI: Portal:Current events/2009 August 30
Intelligence_Payload:
  Japanese general election, 2009:
  - Japanese voters go to the polls. (Reuters) (Xinhua) (Kyodo)
  - The Democratic Party of Japan win 308 seats in the 480-seat House of Representatives,
    ending nearly 50 years of control by the Liberal Democratic Party. Opposition
    leader Yukio Hatoyama is expected to be confirmed as the next Prime Minister.
    (Kyodo) (New York Times)
  Uncategorized:
  - A presidential election takes place in Gabon. (BBC) (Al Jazeera)
  - Brazil's former Environment minister Marina Silva joins the Green Party which
    wants to field her as a black female candidate for the 2010 Brazilian presidential
    race when President Lula's two terms comes to an end. (MercoPress)
  - Israeli jets bomb a building in the Gaza Strip which the military says hides a
    tunnel that Palestinian militants could use to infiltrate Israel. (BBC) (Ynet
    News)
  - A suspected suicide bomber kills 14 police cadets in an attack on a training centre
    in Mingora, Pakistan. (BBC)
  - At least five people are killed and 275 injured in a train crash near Yaoundé,
    Cameroon. (BBC) (Press TV)
  - The remains of 92 victims of a military massacre in Putis, Peru, are laid to rest
    25 years later.(Associated Press) (BBC)
  - Ehud Olmert is indicted on three counts of corruption, becoming the first ex-Prime
    Minister of Israel to face criminal charges. (BBC)
  - Al-Qaeda claims responsibility for the attempted assassination on Saudi Prince
    Muhammad bin Nayef. (Al Jazeera) (BBC)
  - The Iranian Parliament begins debating President Mahmoud Ahmadinejads choice of
    Cabinet. (Associated Press) (Fars News Agency) (Press TV)
  - Burma says 26 government troops and 8 rebels were killed during violence in the
    Kokang region of Shan State. (Associated Press)
  - The Dalai Lama begins a visit to Taiwan, amid criticism from China. (Al Jazeera)
    (Hindustan Times) (Straits Times)
