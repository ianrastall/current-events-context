Date: '2009-08-26'
Source_URI: Portal:Current events/2009 August 26
Intelligence_Payload:
  Uncategorized:
  - U.S. Senator Ted Kennedy of Massachusetts, the last surviving Kennedy brother,
    dies at age 77, after battling brain cancer. (New York Times)
  - Lithuania launches an inquiry into allegations that it hosted a secret CIA prison
    for al-Qaeda suspects. (BBC).
  - The government of Moldova announces that it will stand down before the opening
    of parliament on 28 August. (BBC)
  - French police uncover a large cache of weapons and explosives belonging to terrorist
    group ETA. (BBC)
  - The Iranian Supreme Leader Ali Khamenei says he has no evidence that opposition
    protests were backed by foreign countries. (AFP) (Press TV) (BBC)
  - Japan's exports fall by 36.5% as demand falls. (Bloomberg) (Reuters)
  - North and South Korea resume talks on allowing families divided since the Korean
    War to begin meeting again, for the first time in two years. (Xinhua) (Yonhap)
  - Zimbabwe denies reports that President Robert Mugabe suffered a health scare.
    (The Guardian) (Zim Online) (Daily Nation)
  - Kidnapping of Jaycee Dugard
  - Jaycee Dugard, who disappeared in 1991, is found alive after 18 years and is reunited
    with her family. (Record Net)
