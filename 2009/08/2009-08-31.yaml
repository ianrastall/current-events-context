Date: '2009-08-31'
Source_URI: Portal:Current events/2009 August 31
Intelligence_Payload:
  Uncategorized:
  - Figures from 2008 reveal Ireland has experienced its highest number of births
    since 1896. (RTÉ) (Irish Independent) (The Irish Times)
  - Lesbians are granted equal birth rights in England and Wales. (BBC) (The Daily
    Telegraph) (The Guardian)
  - Britain will face widespread power cuts and rationing of energy in 2019 for the
    first time since the 1970s, according to Her Majesty's Government. (The Daily
    Telegraph)
  - Disney reaches a deal to acquire Marvel Entertainment for US$4 billion, with Marvel
    shareholders being issued $30 and about 0.745 Disney shares for each share of
    Marvel they own. (Marketwatch)
  - Nigeria charges several banking executives with financial crimes discovered following
    the $2.6 billion bail-out of five banks. (BBC)
  - American Airlines retires all of its Airbus A300 aircraft after flying for American
    Airlines for the past 21 years.
  - Russian forces state that they have killed an Algerian Al Qaeda operative and
    another militant during a raid on a house in Khasavyurt, Dagestan. (BBC)
  - Iraqi officials begin negotiations with Serbia over the return of 19 MiG-21 and
    MiG-23 fighter jets sent to Yugoslavia in the 1980's for repairs. (BBC)
  - Jason Mraz's I'm Yours becomes the longest running single in the Billboard Hot
    100's history at 71 weeks on the chart. (Associated Press)
  - Armenia and Turkey agree to establish diplomatic relations. (New York Times)
