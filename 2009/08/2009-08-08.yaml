Date: '2009-08-08'
Source_URI: Portal:Current events/2009 August 8
Intelligence_Payload:
  Uncategorized:
  - One of Southeast Asia's most wanted terror suspects, Noordin Mohammed Top, is
    allegedly killed after a 16 hour siege at a house in Java, Indonesia. (Jakarta
    Post) (BBC) (Al Jazeera)
  - The second hearing in the trial of Iranian election protesters resumes. (Al Jazeera)
    (Xinhua) (Press TV)
  - Local government elections take place in northern Sri Lanka, the first elections
    since the end of the civil war. (Daily News) (Reuters) (Press TV)
  - A small plane and a tour helicopter collide over the Hudson River in the United
    States. (CNN)
  - A suicide bomber detonates a bomb outside the French embassy in Nouakchott, Mauritania,
    wounding two. The attack is the first suicide bombing in Mauritania's history.(France
    24)(RFI)
