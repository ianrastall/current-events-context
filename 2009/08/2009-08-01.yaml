Date: '2009-08-01'
Source_URI: Portal:Current events/2009 August 1
Intelligence_Payload:
  Uncategorized:
  - At least two people are killed and at least fifteen are wounded in a shooting
    attack at a building frequented by gay youths in Tel-Aviv, Israel. (Haaretz)
  - 4,000 people are evacuated from the Canary Islands due to severe forest fires.
    (RTÉ)
  - Former President of the Philippines Corazon Aquino dies at the age of 76 of cardiopulmonary
    arrest after complications of colon cancer. A memorial service and funeral is
    scheduled for August 5. (Philippine Daily Inquirer)
  - Russia signs a deal to open a second military base in Kyrgyzstan at a Collective
    Security Treaty Organisation summit. (AP)
  - The trial of 30 protesters in Iran who demonstrated in protests after the disputed
    presidential election begins. (Press TV) (BBC) (Al Jazeera)
  - Thousands demonstrate in Kuala Lumpur, Malaysia, against a current security law
    that allows for detention without trial. (Bernama) (Al Jazeera) (The Times of
    India)
  - Police fire tear gas and arrest over 400 people at street protests over laws that
    can see people detained indefinitely without trial by the authorities in Kuala
    Lumpur, Malaysia. (RTÉ)(Malaysian Insider)
  - Venezuela orders 34 private radio stations to be closed. (CNN) (Al Jazeera)
  - Chinese hackers target the website of the Melbourne International Film Festival
    for a second time as Uyghur leader Rebiya Kadeer is to visit the country. (AFP)
    (The Australian) (Bloomberg)
  - North Korea says a South Korean fishing boat it seized "illegally" entered its
    waters. (Yonhap) (BBC)
  - Six Christians are killed in religious unrest in Punjab, Pakistan, after days
    of tension following an alleged desecration of a Qur’an. (BBC)
  - Rare Buddhist treasures, buried in the 1930s during Mongolia's Communist purge,
    are unearthed in the Gobi Desert. (BBC)
