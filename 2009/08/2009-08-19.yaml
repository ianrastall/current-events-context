Date: '2009-08-19'
Source_URI: Portal:Current events/2009 August 19
Intelligence_Payload:
  Uncategorized:
  - Seven car bombs are detonated in Baghdad, killing at least 95, and wounding nearly
    600. (The Times)
  - Sierra Leone's annual rains kill 15 people and displace hundreds of others. (IOL)
  - The United States and Switzerland sign an agreement designed to end a tax evasion
    dispute surrounding UBS U.S. customers. (BBC)
  - Spanish police capture two suspected members, Aitzol Etxaburu and Andoni Sarasola,
    of the Basque-region separatist group ETA. (CNN)
  - John Marek becomes the 68th death row inmate in the state of Florida, United States
    to be executed by lethal injection since the death sentence was re-instated in
    1979.(Miami Herald)
