Date: '2009-08-15'
Source_URI: Portal:Current events/2009 August 15
Intelligence_Payload:
  Uncategorized:
  - Hamas police claim to have killed Abdel-Latif Moussa, head of the Islamic group
    Jund Ansar Allah in a shootout. (The New York Times) (Petra)
  - Hong Kong posts 3.3% growth over its previous quarter, far exceeding predictions,
    signaling an end to its recession. (The Straits Times)
  - Colombia claims to have completed talks with the United States to allow US troops
    to use seven of Colombia's military bases. (BBC)
  - Japan expresses remorse for its actions in World War II on the anniversary of
    its 1945 defeat, but former Prime Ministers Junichiro Koizumi and Shinzo Abe visit
    the Yasukuni Shrine, a controversial war shrine seen as a symbol of its past militarism.
    (The Straits Times) (Mainichi Daily News)
  - Former President of Zambia, Frederick Chiluba, awaits the verdict in his trial
    into his criminal case for being accused of plundering the national economy during
    his decade-long rule. (The Sydney Morning Herald)
  - MV Arctic Sea
  - A ransom demand is made for the missing ship. (Al Jazeera) (Bangkok Post) (The
    Times)
  - The tracking device onboard the Arctic Sea was briefly reactivated according to
    Russian media, showing the vessel to be off the coast of France. (RIA Novosti)
    (Associated Press)
  - A suicide bomb attack occurs outside the NATO headquarters in Kabul, Afghanistan,
    killing at least seven and injuring 100. (The Times) (Xinhua) (RTHK)
  - A prison riot in the Mexican state of Durango leaves at least 19 people dead and
    20 injured. (BBC) (Reuters) (Press TV)
  - Italian Prime Minister Silvio Berlusconi speaks at a news conference to say his
    country will crack down on organised crime over the next four years. (The Straits
    Times)
  - Burma is to free detained American John Yettaw, who appeared uninvited at Aung
    San Suu Kyi's home, after a meeting with US Senator Jim Webb. (BBC) (The Straits
    Times) (The Telegraph)
  - A blaze in a tent in Kuwait, where a wedding party is held, kills 43 women and
    children. The ex-wife of the groom confesses to starting the fire. (Al Jazeera)
