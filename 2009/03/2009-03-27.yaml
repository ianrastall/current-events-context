Date: '2009-03-27'
Source_URI: Portal:Current events/2009 March 27
Intelligence_Payload:
  Uncategorized:
  - Serial Shooter Dale Hausner receives six death sentences for six murders committed
    between 2005 and 2006. (AP via KSWO)
  - All six people in a recent helicopter accident are discovered dead in Turkey.
    (AP via Fox News)
  - A flash flood and the Situ Gintung dam's failure kill at least 58 people in Tangerang,
    Banten, Indonesia. (BBC)
  - A suicide attack kills at least 50 people and injures 100 others in Jamrud, Pakistan.
    (Al Jazeera)
  - A radioactive lead ball containing caesium-137 is missing from a deconstructed
    factory in Tongchaun, Shaanxi, China. (RTÉ)
  - Russia will establish a military force to protect its territorial claims in the
    Arctic. (BBC)
  - The Lancet accuses Pope Benedict XVI of "distorting...science" in his argument
    against the use of condoms. (BBC)
  - The United Kingdom's economy contracted by 1.6% in the fourth quarter of 2008.
    (Sky News)
  - Corsican nationalist Yvan Colonna is imprisoned for life for murdering Corse-du-Sud
    Prefect Claude Érignac in 1998. (France 24)
