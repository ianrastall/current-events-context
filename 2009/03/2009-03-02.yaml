Date: '2009-03-02'
Source_URI: Portal:Current events/2009 March 2
Intelligence_Payload:
  Uncategorized:
  - United States President Barack Obama nominates Kansas Governor Kathleen Sebelius
    as Secretary of Health and Human Services. (AP via MSNBC)
  - A winter storm in the eastern United States cancels 1,000 flights and cuts hundreds
    of thousands of people's electricity. (Reuters via News Daily)
  - President João Bernardo Vieira of Guinea-Bissau is assassinated in Bissau. (BBC)
  - Palestinians accuse Israel of planning ethnic cleansing in Bustan, East Jerusalem.
    (Sky News)
  - North Korea's and the United Nations' military commands meet in South Korea for
    the first time since 2002. (Reuters)
  - Two thousand Tamil people have been killed and 5,000 injured in Vanni District
    during Sri Lanka's civil war. (AP) (BBC)
  Late 2000s recession:
  - Consumer spending in the U.S. rose in January after six successive monthly declines.
    (AP via MSNBC)
  - American International Group announces a loss of US$61.7 billion for the fourth
    fiscal quarter of 2008. (Dow Jones via CNNMoney)
  - The Dow Jones Industrial Average falls below 7,000 for the first time since 1997.
    (MarketWatch)
  - Sweden's IF Metall trade union agrees to reductions in wages and working time
    by maximums of 20 percent. (IHT)
