Date: '2009-03-06'
Source_URI: Portal:Current events/2009 March 6
Intelligence_Payload:
  Uncategorized:
  - The European Union will transfer to Kenya suspected Somali pirates captured during
    Operation Atalanta. (AFP via Google News)
  - Zimbabwean Prime Minister Morgan Tsvangirai is injured and his wife, Susan, killed
    in a car accident south of Harare. (BBC)
  - A protestor from Plane Stupid throws custard at United Kingdom Secretary of State
    for Business, Enterprise and Regulatory Reform Peter Mandelson during a low-carbon
    summit in London. (BBC)
  - Swedish writer Lotta Lotass succeeds the late Sten Rudholm at Seat 1 of the Swedish
    Academy. (Swedish Academy)
  - A Swedish pediatrician at Karolinska University Hospital is remanded on suspicion
    of manslaughter for injecting a lethal overdose of morphine and sodium thiopental
    into an infant. (TT via The Local)
  - North Korea threatens the safety of South Korean civilian aircraft flying near
    its territory, on the eve of annual military exercises involving the United States
    and the South. (Sky News)
  - Australia's Transport Safety Bureau finds that the autopilot of Qantas Flight
    72, which made an emergency landing at Learmonth Airport in October 2008, received
    inaccurate information, causing a rapid change in altitude. (WA Today)
