Date: '2009-03-17'
Source_URI: Portal:Current events/2009 March 17
Intelligence_Payload:
  Uncategorized:
  - The New Jersey Devils' Martin Brodeur passes Patrick Roy to becomes the National
    Hockey League's winningest goaltender. (ESPN)
  - Luxembourg becomes the European Union's third country to legalize euthanasia.
    (AFP via Google News)
  - Madagascar's military installs former Antananarivo Mayor Andry Rajoelina as the
    country's new President, replacing Marc Ravalomanana. (BBC)
  - Nokia will cut 1,700 jobs. (Forbes)
  - The Seattle Post-Intelligencer publishes its final print edition and becomes an
    online newspaper. (Seattle PI)
  - North Korean Premier Kim Yong-il begins a five-day goodwill tour of China in Jinan,
    Shandong. (Reuters)
  - The European Space Agency's Gravity Field and Steady-State Ocean Circulation Explorer
    launches from the Plesetsk Cosmodrome in Arkhangelsk Oblast, Russia. (AP)
  - At least 11 people are killed and four injured in a bus accident outside Saltillo,
    Coahuila, Mexico. (CTV)
  Saint Patrick's Day:
  - United States President Barack Obama meets Irish Taoiseach Brian Cowen and Northern
    Irish First Minister Peter Robinson and Deputy First Minister Martin McGuinness
    at the White House. (BBC)
  - Twelve people are arrested during a disturbance in Belfast, Northern Ireland.
    (BBC)
