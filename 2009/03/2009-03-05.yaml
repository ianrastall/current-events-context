Date: '2009-03-05'
Source_URI: Portal:Current events/2009 March 5
Intelligence_Payload:
  Uncategorized:
  - Michael Jackson announces This Is It shows in London
  - General Motors acknowledges in its annual report that its survival is in "substantial
    doubt". (New York Times)
  - Philippine President Gloria Macapagal-Arroyo pardons the 10 remaining convicted
    murderers involved in the assassination of politician Benigno Aquino Jr. (Inquirer)
  - Chinese Premier Wen Jiabao delivers the annual government work report as the 11th
    National People's Congress's second session begins. (Xinhua News)
  - China emphasizes domestic demand and targets 8% economic growth in 2009. (Xinhua
    News)
  - The Israel Police kill a Palestinian militant after he rammed a bulldozer into
    a squad car and a bus in a suspected terror attack in Jerusalem. (Sky News)
  - The Bank of England plans to create £75 billion for the United Kingdom's economy
    through quantitative easing. (BBC)
  - Somali pirates release Egypt's MV Blue Star. (IHT)
