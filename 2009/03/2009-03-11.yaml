Date: '2009-03-11'
Source_URI: Portal:Current events/2009 March 11
Intelligence_Payload:
  Uncategorized:
  - The United Nations Children's Fund claims that a meningitis epidemic in Nigeria,
    Niger, Burkina Faso, and Mali has killed 931 people since January 2009. (AFP via
    Google News)
  - The United States National Aeronautics and Space Administration delays the Space
    Shuttle Discovery's mission to the International Space Station due to a hydrogen
    gas leak. (AP via Google News)
  - China's exports contract 25.7%, the worst decline since 1993. (Xinhua) (China
    Daily)
  - The Liberal Democrats claim that more than 1,000 police officers in the United
    Kingdom have criminal records. (BBC)
  - At least 15 people are killed in a school shooting in Winnenden, Germany. (DW)
  - Former Iraqi Intelligence Service Director Ali Hassan al-Majid and former Deputy
    Prime Minister Tariq Aziz are sentenced to 15 years in jail for crimes against
    humanity. (Sky News)
  - President Nicolas Sarkozy announces that France will rejoin NATO's military command.
    (Reuters)
