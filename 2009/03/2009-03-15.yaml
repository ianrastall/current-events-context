Date: '2009-03-15'
Source_URI: Portal:Current events/2009 March 15
Intelligence_Payload:
  Uncategorized:
  - Space Shuttle Discovery successfully launches from the Kennedy Space Center in
    Florida. (CNN)
  - More than 500 Zenit St. Petersburg fans are arrested in Moscow after a riot during
    a Russian Premier League match with Spartak Moscow. (AFP via ABC News Australia)
  - Bombs kill 12 people in Nangarhar Province, Kabul, and Kandahar, Afghanistan.
    (Voice of America)
  - A bomb kills four people and injures three others in Shibam, Yemen. (CNN)
  - Mauricio Funes of the Farabundo Martí National Liberation Front wins El Salvador's
    presidential election. (VoA) (AP via Google News) (Xinhua)
  - Former Pakistani Prime Minister Nawaz Sharif is placed under house arrest to prevent
    the Pakistani Muslim League's proposed demonstration in Islamabad on March 16.
    (BBC)
  - An Iraqi footballer is shot and killed during a game in Al Hillah. (BBC)
  - Two hundred protestors are arrested after a riot against police brutality in Montreal,
    Canada. (CTV)
