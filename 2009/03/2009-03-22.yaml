Intelligence_Payload:
  Uncategorized:
  - Alaska's Mount Redoubt volcano erupts. (CNN)
  - A Pilatus PC-12 crashes near Butte, Montana, killing at least 17 people. (CNN)
  - Four police officers are killed in Oakland, California, United States. (CNN) (CNN)
  - India's Board of Control for Cricket will relocate the 2009 Premier League outside
    the country. (Hindustan Times)
  - India and Pakistan exchange gunfire at the Line of Control. (IHT)
  - England defeats New Zealand to win the Women's Cricket World Cup. (BBC)
  - An Australian motorcycle gang assaults and kills a man at Sydney Airport. (BBC)
  - Ninety-three Tibetan monks are arrested after attacking a police station in Qinghai,
    China. (AP)
  - Thousands of people assemble for Pope Benedict XVI's Catholic Mass in Luanda,
    Angola. (BBC) (AP)
  - Somali pirates release the Indian cargo ship Al Rafiquei one day after hijacking
    it. (Times of India)
