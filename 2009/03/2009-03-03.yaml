Date: '2009-03-03'
Source_URI: Portal:Current events/2009 March 3
Intelligence_Payload:
  Uncategorized:
  - National People's Assembly Speaker Raimundo Pereira becomes Guinea-Bissau's interim
    President following the assassination of João Bernardo Vieira. (Reuters)
  - The European Court of Human Rights rules that Turkey's government violated the
    property rights of a Greek Orthodox foundation by seizing its land and fines it
    €105,000. (Reuters)
  - The 11th Chinese People's Political Consultative Conference's National Committee
    begins its annual session with a focus on the global financial crisis. (Xinhua
    News)
  - Former Yukos businessman Mikhail Khodorkovsky again stands trial for alleged financial
    crimes. (Moscow Times)
  - Seven Sri Lankan cricket players are wounded and six policemen killed in shootings
    near Gaddafi Stadium in Lahore, Pakistan. (Sky News) (BBC)
  - United States President Barack Obama and United Kingdom Prime Minister Gordon
    Brown meet at the White House. (BBC)
  - Three people are believed trapped after Cologne's municipal archives building
    collapses. (Spiegel)
  - German frigate Rheinland-Pfalz foils a Somali pirate attack on a German container
    ship in the Gulf of Aden. (Deutsche Welle)
