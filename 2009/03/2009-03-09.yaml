Date: '2009-03-09'
Source_URI: Portal:Current events/2009 March 9
Intelligence_Payload:
  Uncategorized:
  - A government in the United Kingdom is criticised by churches, politicians and
    Rowan Atkinson for its proposal to outlaw homophobic hatred. (The Daily Telegraph)
  - Palau officially recognizes Kosovo. (New Kosova Report)
  - A Police Service officer is killed in Craigavon, County Armagh, Northern Ireland.
    (CNN)
  - The United States government claims five Chinese ships "harass[ed]" the USNS Impeccable
    in the South China Sea. (BBC)
  - U.S. President Barack Obama lifts George W. Bush's restrictions on embryonic stem
    cell research. (Reuters)
  - Argentina and Chile reject the United Kingdom's claims on Antarctic territory.
    (Sky News)
  - North Korea says an interception of its upcoming "satellite" launch would "mean
    a war." (CNN)
  - National Islamic Front founder Hassan al-Turabi is released after seven weeks
    of incarceration for suggesting that Sudanese President Omar al-Bashir should
    surrender to the International Criminal Court. (AP)
  - Sri Lanka's Armed Forces claim to have killed 180 counterattacking Tamil Tigers.
    (Reuters)
  - Japan's economy posts a record deficit of 172.8 billion yen. (Press Association)
  - China deploys the People's Armed Police to Tibet to quell possible protests related
    to Tibetan Uprising Day. (Bloomberg) (Xinhua)
  - Zimbabwean Prime Minister Morgan Tsvangirai rules out foul play in a car accident
    in Harare that killed his wife. (Guardian)
  - Madagascar's government announces it will employ "military measures" against Army
    soldiers mutinying near Antananarivo. (Reuters)
  - An Ilyushin Il-76 crashes into Lake Victoria after taking off from Entebbe International
    Airport in Uganda, likely killing all eleven passengers. (UGpulse)
  - At least 13 people are missing or dead after the cargo ship MV Ibn al-Battuta
    sinks near Port Safaga, Egypt. (AFP) (CNN) (Xinhua)
  - Standing Committee Chairman Wu Bangguo tells the National People's Congress that
    China will not adopt Western democracy. (New York Times)
