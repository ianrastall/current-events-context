Date: '2009-03-10'
Source_URI: Portal:Current events/2009 March 10
Intelligence_Payload:
  Uncategorized:
  - The United States Senate passes a US$410-billion omnibus spending bill. (CNN)
  - At least ten people are killed during a shooting spree in Geneva County, Alabama,
    United States. (CNN)
  - The Eurovision Song Contest disallows Georgian pop group Stephane & 3G's "We Don't
    Wanna Put In." (BBC)
  - A suicide attack kills 33 people in Baghdad, Iraq. (AFP via News Limited)
  - Northern Ireland's Police Service arrests two men in Craigavon for murdering an
    officer. (AFP via ABC News Australia)
  - Tibet's Central Administration claims that China's accusations of the Dalai Lama's
    "genocide" are "fabricated." (Xinhua)
  - China disputes that its ships illegally harassed USNS Impeccable in the South
    China Sea. (Xinhua)
  - North Korea readmits South Koreans into the Kaesong Industrial Region. (Reuters)
  - At least ten people are killed and 25 injured during a suicide attack in Matara,
    Sri Lanka. (Sky News) (ABC News Australia)
  - The Employee Free Choice Act is introduced into the U.S. Congress. (New York Times)
