Intelligence_Payload:
  Uncategorized:
  - Former Antananarivo Mayor Andry Rajoelina demands that Madagascar's military arrest
    President Marc Ravalomanana, as Army soldiers seize a presidential palace in the
    capital. (AP via Google News)
