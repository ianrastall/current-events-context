Date: '2009-03-26'
Source_URI: Portal:Current events/2009 March 26
Intelligence_Payload:
  Uncategorized:
  - United States President Barack Obama announces a new military strategy for the
    War in North-West Pakistan and the War in Afghanistan. (CNN)
  - Franco-Russian mathematician Mikhail Gromov receives the 2009 Abel Prize. (MAA)
  - French President Nicolas Sarkozy will renounce his title of Co-Prince of Andorra
    if the country does not change its banking laws. (Reuters via IHT)
  - Germany admits that the unidentified Phantom of Heilbronn serial killer never
    existed. (BBC)
  - Sudan alleges that an aircraft attacked an arms trafficking convoy near Port Sudan
    in January 2009. (YNET)
  - Forty-seven fragments of the meteoroid 2008 TC3 are discovered in Sudan's Nubian
    Desert. (New Scientist)
  - A car bomb kills at least 16 people and injures 35 others in Baghdad, Iraq. (AFP)
  - International Space Station Expedition 19 launches aboard the Soyuz TMA-14 from
    Kazakhstan's Baikonur Cosmodrome. (NASA)
  - A Taliban suicide attack kills at least 11 people and injures 20 others in Jandola,
    Pakistan. (VOA)
  - Two tornadoes injure 24 people and damage 108 homes in Mississippi, United States.
    (CNN)
  - Somali pirates hijack ships from the Isle of Man, Greece, and the Seychelles,
    while three other ships escape. (Marine Log)
  - A bus–truck collision kills 14 people and injures four others in Petushki, Russia.
    (RTÉ)
  - Debris from an Arrow Air McDonnell Douglas DC-10 airplane strikes Manaus, Brazil.
    (BBC)
