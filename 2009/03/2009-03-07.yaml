Date: '2009-03-07'
Source_URI: Portal:Current events/2009 March 7
Intelligence_Payload:
  Uncategorized:
  - Morocco terminates diplomatic relations with Iran. (AP via Google News)
  - The United Kingdom's government increases its ownership stake in Lloyds Banking
    Group from 43% to at least 60%. (BBC)
  - NASA launches its Kepler spacecraft from Cape Canaveral Air Force Station in Florida.
    (CNN)
  - Power Rangers RPM on ABC Kids
  - A car bomb in Peshawar, Pakistan, kills at least eight people. (BBC)
  - Malaysia's Royal Police quell demonstrations in Kuala Lumpur against the use of
    the English language in schools. (BBC)
  - More than 1,000 people participate in a pro-Tibet protest in London. (AFP)
  - Anti-Israel protestors and Sweden's Police Service clash in Malmö, where the two
    countries were playing a Davis Cup tennis match. (AP)
  - Palestinian National Authority Prime Minister Salam Fayyad resigns. (Telegraph)
  - Zimbabwean Prime Minister Morgan Tsvangirai flies to Botswana for medical treatment
    following a car accident in Harare in which his wife was killed. (BBC)
  - Afghan President Hamid Karzai accepts the Electoral Commission's decision to hold
    a presidential election on August 20. (Al Jazeera)
  - Amsterdam's Schiphol Airport holds a memorial ceremony for the nine victims of
    Turkish Airlines Flight 1951. (Radio Netherlands)
