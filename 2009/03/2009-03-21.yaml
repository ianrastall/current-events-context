Date: '2009-03-21'
Source_URI: Portal:Current events/2009 March 21
Intelligence_Payload:
  Uncategorized:
  - At least 21 people are killed during combat in Russia's Dagestan Republic. (Reuters
    India)
  - Five thousand people are temporarily evacuated from Wind Gap, Pennsylvania, after
    a tank truck carrying hydrofluoric acid overturns. (AP via ABC News)
  - Ireland defeats Wales in rugby union's Six Nations Championship. (BBC)
  - Anna Bligh of the Labor Party is reelected Premier of Queensland, Australia. (Sydney
    Morning Herald)
  - Two people are killed and eight injured during a stampede to see Pope Benedict
    XVI in Luanda, Angola. (RTÉ)
  - Venezuela's military seizes key airports and sea ports throughout the country.
    (BBC)
  - Emirates Airline Flight EK407 makes an emergency landing in Australia after enduring
    a tailstrike during takeoff from Melbourne Airport. (BBC)
  - Andry Rajoelina is inaugurated as President of Madagascar. (BBC)
  - One hundred thousand people protest against the Sicilian Mafia and Camorra in
    Naples, Italy. (BBC)
  - Somali pirates hijack the Indian cargo ship Al Rafiquei. (Reuters)
