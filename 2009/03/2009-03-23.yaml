Date: '2009-03-23'
Source_URI: Portal:Current events/2009 March 23
Intelligence_Payload:
  Uncategorized:
  - A car bomb is located and defused near a shopping mall in Haifa, Israel. (BBC)
  - Two suicide attacks in Iraq kill at least 22 people and injure more than 50 others.
    (Bloomberg)
  - Alaska's Mount Redoubt volcano erupts four more times. (Physorg)
  - The United States Treasury Department announces that it will purchase high-yield
    debts from banks. (Reuters)
  - Gjorge Ivanov of the VMRO–DPMNE leads the first round of Macedonia's presidential
    election. (Reuters via The Boston Globe)
  - FedEx Express Flight 80 crashes at Narita International Airport in Tokyo, Japan,
    killing both pilots. (CNN) (MSNBC)
  - A suicide attack kills one person and injures three others in Islamabad, Pakistan.
    (Sky News)
  - A Japanese cargo ship escapes Somali pirates in the Gulf of Aden. (Reuters)
