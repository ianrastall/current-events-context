Date: '2009-03-24'
Source_URI: Portal:Current events/2009 March 24
Intelligence_Payload:
  Uncategorized:
  - The Lady Mary, a fishing vessel, sinks off the coast of Cape May
  - Czech Prime Minister Mirek Topolánek resigns after losing a confidence motion
    in the Chamber of Deputies. (IHT)
  - France will compensate victims of nuclear testing in Algeria and French Polynesia.
    (Reuters)
  - Japan defeats South Korea to win the World Baseball Classic. (ESPN)
  - Michael Misick resigns as Premier of the Turks and Caicos Islands, due to alleged
    corruption. (BBC)
  - South Africa denies Dalai Lama Tenzin Gyatso a visa to attend a peace conference
    in Johannesburg. (BBC)
  - The United Kingdom's Retail Prices Index reaches zero percent for the first time
    since 1960. (BBC)
  - Sixteen militants and eight Indian Army soldiers are killed in Jammu and Kashmir's
    Kupwara District. (BBC)
  - Italy jails Tuninter Flight 1153's two pilots for ten years for praying before
    ditching into the Mediterranean Sea. (Telegraph)
  - China's government blocks access to the YouTube video-sharing website. (New York
    Times)
  - The United States' federal government announces a plan to increase security along
    its border with Mexico. (Reuters)
  - Immaculata University discovers the mass grave of 57 Irish immigrants in East
    Whiteland Township, Pennsylvania, United States. (Delaware County Daily Times)
