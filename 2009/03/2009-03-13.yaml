Date: '2009-03-13'
Source_URI: Portal:Current events/2009 March 13
Intelligence_Payload:
  Uncategorized:
  - The United States abandons the term "enemy combatant" for detainees at Guantánamo
    Bay Naval Base's detention camp. (New York Times)
  - Italy's Ministry of Foreign Affairs reports that three Doctors Without Borders
    volunteers kidnapped in Darfur, Sudan, have been freed. (AP via Google News)
  - United Nations High Commissioner for Human Rights Navanethem Pillay accuses Sri
    Lanka's Armed Forces and the Tamil Tigers of possible war crimes. (Voice of America)
  - Police are mobilized in Pakistan as thousands of protestors march toward Islamabad.
    (ABC News Australia)
  - An American demonstrator from the International Solidarity Movement is critically
    wounded by Israel's Defense Forces at the West Bank barrier. (Jerusalem Post)
  - Japan announces it will intercept North Korea's upcoming satellite launch if the
    boosters threaten its territory. (The Guardian)
  - Premier Wen Jiabao says China may introduce a new stimulus package if the current
    financial crisis intensifies and expresses concern for U.S. Treasury Department
    securities. (Xinhua)(New York Times)
  - Seven people arrested for threatening to destroy several buildings in Amsterdam
    are released. (Sky News)
  - A gas explosion in Dublin, Ireland, injures five people. (RTÉ)
  - A fire at Bashundhara City in Dhaka, Bangladesh, kills seven people and injures
    at least 30 others. (Reuters)
