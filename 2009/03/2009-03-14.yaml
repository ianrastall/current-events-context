Date: '2009-03-14'
Source_URI: Portal:Current events/2009 March 14
Intelligence_Payload:
  Uncategorized:
  - The G20 meets in Horsham, West Sussex, England, to discuss the global financial
    crisis. (BBC)
  - Former Antananarivo Mayor Andry Rajoelina demands that Malagasy President Marc
    Ravalomanana resign. (France 24)
  - The 17th annual Pasifika Festival opens in Auckland City, New Zealand. (TVNZ)
  - A Vietnamese cargo ship sinks in the South China Sea, killing three people. (Reuters)
  - Maritime Self-Defense Force destroyers Sazanami and Samidare depart Japan to combat
    piracy in Somalia. (AP)
  - Russia's Air Force says the country may base strategic bombers in Cuba or on a
    Venezuelan island. (MSNBC)
