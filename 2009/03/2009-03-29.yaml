Date: '2009-03-29'
Source_URI: Portal:Current events/2009 March 29
Intelligence_Payload:
  Uncategorized:
  - General Motors Chairman/CEO Rick Wagoner resigns. (CNN)
  - PSA Peugeot Citroën's Board of Directors dismisses CEO Christian Streiff. (New
    York Times)
  - The Coalition for a European Montenegro wins 48 of 81 seats in Montenegro's Parliament.
    (Earth Times)
  - Mayotte's referendum on becoming an overseas department of France is approved.
    (AP)
  - Jenson Button of Brawn GP wins Formula One's 2009 Australian Grand Prix. (The
    Times)
  - A gunman kills at least eight people and injures three others at a nursing home
    in Carthage, North Carolina, United States. (CNN)
  - Oxford Boat Club defeats Cambridge Boat Club to win the 155th University Boat
    Race in London, England. (BBC)
  - Home Secretary Jacqui Smith will recompense the United Kingdom's government for
    her husband's purchase of pornographic films through her expense account. (BBC)
  - A stampede kills 22 people and injures at least 130 during a 2010 FIFA World Cup
    qualifying match in Abidjan, Ivory Coast. (BBC)
