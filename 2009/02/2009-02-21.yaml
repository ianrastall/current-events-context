Date: '2009-02-21'
Source_URI: Portal:Current events/2009 February 21
Intelligence_Payload:
  Uncategorized:
  - The Taliban and Pakistan agree to a permanent ceasefire in the war in North-West
    Frontier Province. (CNN)
  - The International Security Assistance Force kills 13 people in Guzara, Herat,
    Afghanistan. (CNN)
  - Italy's Democratic Party elects Deputy Secretary Dario Franceschini as its new
    Secretary. (France 24)
  - Approximately 120,000 people march in Dublin, Ireland, to protest the government's
    handling of the country's economic and banking crises. (Irish Times)
  - At least 10 people are killed and 20 injured in a collision between a train and
    a coach in Slovakia. (RTÉ)
