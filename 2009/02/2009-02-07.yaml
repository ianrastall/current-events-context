    (ABC News Australia)
  - The towns of Marysville, Kinglake, Strathewen and others are almost completely
    destroyed by bushfires.(ABC News Australia)
  - Melbourne CBDs temperature peaks at 46.4°C (115.5°F) and Melbourne Airport’s temperature
    peaks at 46.8°C (116.2°F) marking the hottest day for Victoria's capital and hottest
    city on earth that day.https://amp.smh.com.au/national/city-swelters-records-tumble-in-heat-20090207-80ai.html
