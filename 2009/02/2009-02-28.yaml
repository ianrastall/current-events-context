Date: '2009-02-28'
Source_URI: Portal:Current events/2009 February 28
Intelligence_Payload:
  Uncategorized:
  - Carpatair Flight 128 – a Saab 2000 bound for Timişoara, Romania, from Chişinău,
    Moldova, and carrying 51 people – makes an emergency landing at Traian Vuia International
    Airport without its forward landing gear. (Phillyburbs)
  - Burma's government announces it will allow Rohingyas who have fled to neighboring
    countries to return only if they identify themselves as Bengalis. (BBC)
  - Chinese Premier Wen Jiabao holds the first online discussion with Internet users
    before the National People's Congress's annual plenary session. (People's Daily)
  - The Standing Committee of China's NPC approves the Food Safety Law, which will
    enhance supervision and strengthen quality standards. (Xinhua)
  - California Governor Arnold Schwarzenegger declares a state of emergency, due to
    severe drought. (BBC)
  - Zimbabwean President Robert Mugabe vows to continue his policy of distributing
    land from white to black farmers. (BBC)
  - Colombia's military kills ten and captures eight Revolutionary Armed Forces members
    in Cundinamarca. (BBC)
  - A gene linked to a genetic motor neurone disease is discovered. (BBC)
  - Bangladesh's Army finds more mass graves where Bangladesh Rifles mutinied in Dhaka.
    (BBC)
  - The Holy See claims that the Roman Catholic Church's number of priests is slowly
    rising. (BBC)
