Date: '2009-02-26'
Source_URI: Portal:Current events/2009 February 26
Intelligence_Payload:
  Uncategorized:
  - United States President Barack Obama will withdraw most soldiers from the Iraq
    War by August 2010. (CNN)
  - The Bangladesh Rifles surrender after the government promises amnesty. (BBC)
  - Palestinian groups Hamas and Fatah begin peace deliberations in Cairo, Egypt.
    (New York Times)
  - The International Criminal Tribunal for the former Yugoslavia acquits former Serbian
    President Milan Milutinović of committing war crimes. (New York Times)
  - General Motors reports a US$9.6 billion loss, due to the current automotive industry
    crisis. (New York Times)
  - Switzerland's UBS AG appoints former Credit Suisse CEO Oswald Grübel as its new
    Group CEO. (BBC)
  - China's Navy and Denmark's Navy rescue Italian and Chinese merchant vessels from
    Somali pirates in the Gulf of Aden. (BBC)
  - The Marriott Hotel in Islamabad, Pakistan, catches fire, five months after it
    was bombed. (BBC)
  - Latvian President Valdis Zatlers names former Finance Minister Valdis Dombrovskis
    as the new Prime Minister. (BBC)
  - Ajmal Kasab, the 2008 Mumbai attacks' lone surviving gunman, is charged with waging
    war against India. (Sky News)
  - The Royal Bank of Scotland Group reports a 2008 loss of £24.1 billion. (BBC)
  - Thirteen thousand civil servants stage a one-day strike action in Ireland. (RTÉ)
  - Former Guinean President Lansana Conté's eldest son confesses to drug trafficking.
    (BBC)
  - An outbreak of dengue fever in Bolivia has killed 18 people and infected 31,000.
    (BBC)
  - The University of Reading identifies the oldest words in the English language.
    (BBC)
  - A study by the scientific journal Nature shows that HIV is evolving to resist
    the human immune system. (BBC)
  - The earliest footprints evidencing modern human foot anatomy and gait are discovered
    in Koobi Fora, Kenya. (BBC)
  - The Svalbard Global Seed Vault receives 90,000 food crop seed samples. (BBC)
  - The United States Defense Department allows news agencies to publicize photographs
    of the coffins of soldiers killed in Iraq and Afghanistan. (BBC)
  - The Rocky Mountain News, one of Colorado's largest newspapers, publishes its last
    issue. This issue hits the streets the following morning.[www.9news.com]
