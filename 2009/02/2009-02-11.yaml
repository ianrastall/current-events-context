Date: '2009-02-11'
Source_URI: Portal:Current events/2009 February 11
Intelligence_Payload:
  Economy of the United States:
  - The budget deficit reached US$84 billion in January 2009, due to the financial
    crisis. (Market Watch)
  - The Senate and House of Representatives reach a compromise on the American Recovery
    and Reinvestment Act. (Reuters)
  Uncategorized:
  - The number of worldwide connections to cellular networks reaches four billion.
    (Reuters)
  - Azerbaijan Air Force Lieutenant General Rail Rzayev is killed in Baku. (BBC)
  - Palestinian militants launch four mortar shells and one Qassam rocket from the
    Gaza Strip into Israel. (Haaretz)
  - Movement for Democratic Change President Morgan Tsvangirai becomes Zimbabwe's
    new Prime Minister. (BBC)
  - A mysterious deposit of cosmic dust is discovered inside the Red Rectangle Nebula.
    (MSNBC)
  - Mexico's National Institute of Anthropology and History announces the discovery
    of a 16th-century mass grave at the Tlatelolco archaeological site in Mexico City.
    (Reuters)
  - Twenty-seven people die during a suicide attack in Kabul, Afghanistan. (Sky News)
  - Chinese fishing vessels desert the Northern Limit Line, signaling a possible North
    Korean missile test. (Reuters)
  - An oil tanker and a container ship collide off the coast of Dubai, United Arab
    Emirates. (AP via Google News)
  - The Philippines' Bureau of Fisheries and Aquatic Resources rescues more than 200
    dolphins after a mass beaching in Bataan. (Philippine Daily Inquirer)
  - U.S. Democrat John Dingell of Michigan becomes the House of Representatives' longest-serving
    member. (NPR)
  - Oscar Temaru is elected President of French Polynesia for the fourth time in five
    years. (RNZI)
  - The United Kingdom's Conservative Party admits to altering the Italian painter
    Titian's Wikipedia entry following a confrontation with Prime Minister Gordon
    Brown. (BBC)
  - Renowned Molecular Biologist Dr Abdul Majid Cheema escaped death when unknown
    armed men opened fire on his vehicle on Quetta,Pakistan.
