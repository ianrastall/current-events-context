Date: '2009-02-01'
Source_URI: Portal:Current events/2009 February 1
Intelligence_Payload:
  Uncategorized:
  - The Pittsburgh Steelers defeat the Arizona Cardinals 27-23 to win Super Bowl XLIII.
    (ESPN.com)
  - The wreck of the British warship HMS Victory is discovered in the English Channel.
    (The Melbourne Age)
  - Four people are killed in a café shooting in Russia's Dagestan Republic. (Reuters
    via IHT)
  - Rafael Nadal of Spain defeats Roger Federer of Switzerland to win the 2009 Australian
    Open men's singles. (AP via Google News)
  - Japan Airlines conducts the first successful test flight of a Boeing 747-300 partly
    powered by biofuel. (Sky News Australia)
  - Palestinian militants in the Gaza Strip fire four rockets and sixteen mortar shells
    into Israel's Negev region. (Haaretz)
  - The Japan Meteorological Agency warns that Honshū Island's Mount Asama could erupt
    within the next two days. (Reuters)
  - Kirill I is officially enthroned as Patriarch of the Russian Orthodox Church.
    (BBC)
  - The Sri Lankan Army bombs a hospital in Puthukkudiyiruppu twice, killing at least
    six Tamil civilians and wounding countless more patients. (AP)
  - France defeats Croatia to win the Men's World Handball Championship. (Croatia
    2009)
  - The International Cospas-Sarsat Satellite System ceases monitoring for 121.5 MHz
    and 243 MHz (Class B) signals from ELTs, EPIRBs, and PLBs. (Cospas-Sarsat.org)
