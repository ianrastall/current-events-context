Date: '2009-02-13'
Source_URI: Portal:Current events/2009 February 13
Intelligence_Payload:
  Uncategorized:
  - The United States Congress approves the American Recovery and Reinvestment Act
    of 2009. (BBC)
  - Zimbabwe's Republic Police charge Roy Bennett of the Movement for Democratic Change
    with treason. (BBC)
  - The Peanut Corporation of America files for Chapter 7 bankruptcy and liquidation.
    (Reuters via Forbes)
  - Germany's economy shrank by 2.1 percent in the fourth fiscal quarter of 2008.
    (AFP via ABC News Australia)
  - A suicide bomber kills 40 people and injures 60 others in Karbala, Iraq. (AP via
    Fox News)
  - China's government urges Yves Saint Laurent's estate to return two Qing Dynasty
    sculptures scheduled for auction in Paris. (Bloomberg)
  - Australia's Senate approves a $42-billion economic stimulus package. (BBC)
  - Israeli Defense Forces in the Gaza Strip discover grenades made by Hamas from
    humanitarian supplies. (Jerusalem Post)
  - Germany's Max Planck Institute for Evolutionary Anthropology and the United States'
    454 Life Sciences map the Neanderthal genome. (AP via Google News)
  - Lloyds Banking Group warns that HBOS will register a loss of £8.5 billion for
    2008. (Sky News)
  - Unix time equalled "1234567890" at 23:31:30 UTC. (The Times)
  - British Airways CityFlyer Flight 8456 crash-lands at London's City Airport. (RTÉ)
  - A passenger train derails in Bhubaneswar, Orissa, India, killing at least 15 people
    and injuring 150 others. (Thaindian News)
  - The Air Accident Investigation Unit finds that Virgin Atlantic Airways' Airbus
    A340s contain faulty electrical wiring. (AAIU)
  - Six crew members are missing after China's MV Changhai 178 capsizes in the South
    China Sea. (Xinhua)
  - At least 40 FDLR members are killed in airstrikes in the Democratic Republic of
    the Congo. (BBC)
