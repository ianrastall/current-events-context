Date: '2009-02-20'
Source_URI: Portal:Current events/2009 February 20
Intelligence_Payload:
  Uncategorized:
  - The Tamil Tigers aerially attack Colombo, Sri Lanka, killing two people and injuring
    at least 40 others. (Reuters)
  - The United States will return Benyam Mohammed to the United Kingdom after four
    years of imprisonment at Guantanamo Bay Naval Base's detention camp. (BBC)
  - Israel seizes 425 acres of Palestinian Authority state land in the West Bank for
    a Jewish settlement. (AP via Google News)
  - Latvian Prime Minister Ivars Godmanis and his government resign. (Bloomberg)
  - Gold futures reclaim the US$1,000-an-ounce mark. (MarketWatch)
  - New York State Attorney General Andrew Cuomo subpoenas Bank of America Chairman
    and CEO Kenneth Lewis for misleading investors during the purchase of Merrill
    Lynch. (Wall Street Journal)
  - Saab Automobile files for bankruptcy protection. (MarketWatch)
  - Israeli President Shimon Peres selects Likud Chairman Benjamin Netanyahu to form
    the country's next government. (Ynetnews)
  - A suicide attack kills 25 people in Dera Ismail Khan, Pakistan. (BBC)
  - Forty-seven people are injured when a Northwest Airlines flight from the Philippines
    to Japan experiences severe turbulence. (BBC)
  - India investigates several deaths caused by the hepatitis B virus in the western
    state of Gujarat. (BBC)
