Date: '2009-02-05'
Source_URI: Portal:Current events/2009 February 5
Intelligence_Payload:
  Uncategorized:
  - USA Swimming suspends Michael Phelps from competition for three months following
    the publication of a photograph of him inhaling from a marijuana pipe. (AP via
    Sports Illustrated)
  - Muttiah Muralitharan of Sri Lanka's national cricket team becomes the highest
    wicket-taker in One Day Internationals with 503. (Sports 24)
  - Russia, Belarus, Armenia, Kazakhstan, Kyrgyzstan, Tajikistan, and Uzbekistan agree
    to form a rapid reaction force based in the Federation. (AFP via The Australian)
  - China declares a national emergency due to severe droughts throughout the country.
    (BBC)
  - Somali pirates release Ukraine's MV Faina following a US$3.2-million ransom payment.
    (BBC)
  - At least 10 people are killed in a Brazilian Federal Police raid in Rio de Janeiro.
    (BBC)
  - Heavy snowfall closes Ireland's Dublin Airport and disrupts flights for several
    hours. (RTÉ)
  - Businessman Kazutsugi Nami is arrested by Japanese police over a US$1.4-billion
    investment scam. (BBC)
  - Three members of the State Legislative Assembly in Perak state, Malaysia from
    the People's Alliance declare themselves independent and pledge support for the
    National Front, sparking a constitutional crisis. (New Straits Times)
  - Zimbabwe's House of Assembly allows power-sharing between the African National
    Union – Patriotic Front and the Movement for Democratic Change. (Reuters)
  - A suicide bomber kills 24 people and injures at least 40 in Dera Ghazi Khan, Pakistan.
    (MSNBC)
  - Undefeated Welsh boxer Joe Calzaghe announces his retirement. (BBC)
  Late 2000s recession:
  - The Bank of England reduces the base rate of interest to a new historic low of
    1%. (Sky News)
  - The number of Americans applying for first-time unemployment benefits reaches
    its highest level since October 1982. (CNN Money)
