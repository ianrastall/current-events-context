Date: '2009-02-10'
Source_URI: Portal:Current events/2009 February 10
Intelligence_Payload:
  Uncategorized:
  - Collision of Iridium Satellite LLC's Iridium 33 and Russia's Kosmos-2251 in low-Earth
    orbit. (Reuters) (New York Times)
  - South Africa announces that a general election will be held on April 22, 2009.
    (CNN)
  - Karl-Theodor zu Guttenberg is named Germany's Federal Minister of Economics and
    Technology. (IHT)
  - Swiss financial services company UBS AG lost 19.7 billion francs for fiscal year
    2008 and will cut 15,000 jobs throughout 2009. (The Street)
  - Israel's legislative election takes place. (Reuters)
  - Zimbabwe's dollar depreciates and its cholera epidemic has killed more than 3,000
    people. (Sky News)
  - The United States Senate approves the American Recovery and Reinvestment Act of
    2009. (CNN) (New York Times)
  - The United Kingdom imposes new visa requirements on nationals from Bolivia, Lesotho,
    South Africa, Swaziland, and Venezuela. (BBC)
  - Mexico will nationally register all its mobile phone users and catalog their fingerprints.
    (Reuters)
  - An EF4 tornado kills at least eight people and injures 50 in Lone Grove, Oklahoma,
    United States. (The Oklahoman)
  - Fifty thousand people protest living costs in Guadeloupe and Martinique. (MSNBC)
  Automotive industry crisis of 2008-2009:
  - United States automaker General Motors announces it will cut 10,000 jobs in its
    salaried workforce and the pay of remaining employees. (AP via Google News)
  - English automaker Bentley cuts 220 jobs and all salaries by 10 percent. (Press
    Association via Google News)
  Russian financial crisis of 2008–2009:
  - Russia will request postponement of repayment of US$400 billion in private-sector
    debt to foreign banks. (Reuters)
  - The Russia Tower will be reduced in size, due to funding issues and the construction
    of the Moscow International Business Centre. (Moscow Times)
