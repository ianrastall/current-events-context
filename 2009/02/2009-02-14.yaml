Date: '2009-02-14'
Source_URI: Portal:Current events/2009 February 14
Intelligence_Payload:
  Uncategorized:
  - An oil spill occurs in the Celtic Sea near County Cork, Ireland. (Department of
    Transport)
  - Peruvian director Claudia Llosa's The Milk of Sorrow wins the Golden Bear at the
    59th Berlin International Film Festival. (ABC/Reuters)
  - Two missiles fired from American drone aircraft kill at least 25 people in South
    Waziristan, Pakistan. (New York Times)
  - Prime Minister Ehud Olmert says Israel will not negotiate any long-term ceasefire
    in its conflict with Hamas unless prisoner-of-war Gilad Shalit is released. (Al
    Jazeera)
  - Japan's National Astronomical Observatory completes the first topographic map
    of the Moon. (Daily Yomiuri)
  - Somali pirates release the Japanese oil tanker Chemstar Venus and its 23 crew
    members. (Reuters)
