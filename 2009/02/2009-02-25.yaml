Date: '2009-02-25'
Source_URI: Portal:Current events/2009 February 25
Intelligence_Payload:
  Uncategorized:
  - The United Nations' Office for the Coordination of Humanitarian Affairs estimates
    that 15,000 refugees have fled from southern Darfur to the Zam Zam refugee camp
    in the north. (CNN)
  - U.S. President Barack Obama nominates former Washington Governor Gary Locke to
    serve as the next Secretary of Commerce. (Baltimore Sun)
  - An improvised explosive device kills three British Army soldiers in the Gerishk
    District of Afghanistan's Helmand Province. (CNN)
  - Three people set themselves on fire near Tiananmen Square in Beijing, China. (BBC)
  - Iran tests its first nuclear power plant at Bushehr. (Guardian)
  - Turkish Airlines Flight 1951 crashes at Amsterdam's Schiphol Airport, killing
    nine people and injuring 84. (BBC)
  - The Bangladesh Rifles mutiny in Dhaka, killing one person and injuring eight.
    (AFP via Google News)
  - Antarctica's subglacial Gamburtsev Mountain Range is mapped. (BBC)
  - Two thousand Gardaí protest against Ireland's government at Dublin's Leinster
    House. (RTÉ)
  - A bus crashes in Indian-administered Kashmir, killing 35 people and injuring 15.
    (BBC)
  - The Special Court for Sierra Leone convicts three Revolutionary United Front commanders
    of war crimes and crimes against humanity during an 11-year civil war. (BBC)
  - Former Estonian Police Chief Herman Simm is jailed for 12.5 years for selling
    classified information on NATO to Russia. (BBC)
  - Serbia suspends 11 Belgrade corrections officers for aiding the escape of assassin
    Milorad Ulemek. (BBC)
  - Japan's exports plunged 45.7% in January 2009. (BBC)
  - The U.S. State Department criticizes China's human rights record. (BBC)
  - Islamist terrorist group Al-Shabaab seizes Hudur, Somalia. (BBC)
  - The U.S. arrests 750 people in a national crackdown on Mexican drug cartels. (BBC)
  - A Syrian arms dealer is jailed for 30 years for conspiring to sell weapons to
    Colombia's Revolutionary Armed Forces. (BBC)
  - Former Indian Communications Minister Sukhram is jailed for three years for corruption.
    (BBC)
  - An Australian study classifies a fossilized fish as one of the earliest known
    vertebrates to use internal fertilization. (BBC)
  - Iraq's Council of Representatives lifts the immunity of Mohammed al-Dayni, an
    MP accused of organizing the 2007 bombing of Parliament. (Al-Jazeera)
