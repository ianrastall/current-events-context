Date: '2009-02-02'
Source_URI: Portal:Current events/2009 February 2
Intelligence_Payload:
  Uncategorized:
  - The United States Senate confirms Eric Holder as Attorney General. (AP via Google
    News)
  - U.S. department store Macy's announces it will cut 7,000 jobs. (CNNMoney)
  - Muammar al-Gaddafi is elected Chairman of the African Union. (Reuters)
  - A human rights protester throws a shoe at Chinese Premier Wen Jiabao during a
    speech at Cambridge University. (CNN)
  - Nine people are killed when a hospital is shelled in Puthukkudiyiruppu, Sri Lanka.
    (BBC)
  - Japan's Mount Asama erupts. (Reuters)
  - Heavy snow across England closes London City Airport and one runway of Heathrow
    Airport and shuts down all public transport in London. (BBC)
  - The International Criminal Court announces it will investigate Israeli war crimes
    possibly committed during Operation Cast Lead. (Jerusalem Post)
  - Chairman Mahmoud Abbas says he will not deliberate with any group that does not
    recognize the Palestine Liberation Organization. (Al Jazeera)
  - The Israel Defense Forces bomb the Gaza Strip in response to Palestinian rocket
    and mortar fire. (Al Jazeera)
  - Wildcat strikes spread across the United Kingdom. (Sky News)
