Date: '2009-02-08'
Source_URI: Portal:Current events/2009 February 8
Intelligence_Payload:
  Uncategorized:
  - '51st Grammy Awards: Robert Plant and Alison Krauss win Record of the Year for
    "Please Read the Letter" and Coldplay wins Song of the Year for "Viva la Vida."
    (Billboard)'
  - Venezuela arrests 11 people over an attack last week on a Caracas synagogue. (Haaretz)
  - A roadside bomb kills at least two people and injures 11 near Karbala, Iraq. (CNN)
  - Palestinian militants fire two rockets from the Gaza Strip into Israel. (Haaretz)
  - Switzerland votes on a referendum to make permanent freedom of movement for workers
    from the European Union. (BBC)
  - Bushfires in Victoria, Australia, have killed at least 108 people and destroyed
    at least 750 homes. (The Times)
  - Twenty-four people are confirmed dead in the crash of an Embraer 110P1 air taxi
    in Amazonas, Brazil. (Bangkok Post)
  - Romanian handball player Marian Cozma is killed and two others are injured after
    a knife attack in Veszprém, Hungary. (EHF)
  - United States Treasury Secretary Timothy F. Geithner delays announcing a bailout
    of the banking industry until Tuesday. (MSNBC)
