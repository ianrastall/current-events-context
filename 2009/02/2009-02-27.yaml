Date: '2009-02-27'
Source_URI: Portal:Current events/2009 February 27
Intelligence_Payload:
  Uncategorized:
  - China's Navy and Denmark's Navy thwart Somali pirate attacks on Italian and Chinese
    merchant vessels in the Gulf of Aden. (China Daily) (Canadian Press)
  - A nationwide "Chicago Tea Party" occurred across the United States, where protesters
    say government spending is out of control. (Fox Chicago News)
  - China's Armed Police shoot a Tibetan monk as he immolates himself in Sichuan.
    (BBC)
  - Bangladesh's military arrests 300 Rifles for mutiny and discovers a mass grave
    containing 58 officers killed during the revolt. (Sky News) (BBC)
  - United States President Barack Obama announces he will withdraw most soldiers
    from the Iraq War by August 2010. (BBC)
  - Seven million euros are stolen from the Bank of Ireland in Dublin. (Irish Times)
  - At least 50 people are killed in combat between Southern Sudan and militias in
    Malakal. (BBC)
  - The animated sitcom The Simpsons becomes the longest-running U.S. primetime television
    series after Fox Broadcasting confirms two more seasons. (BBC)
  - Venezuelan President Hugo Chávez claims that former Cuban President Fidel Castro
    recently appeared publicly in Havana for the first time since 2006. (Irish Times)
  - A report by China's State Council criticizes the United States' human rights record.
    (People's Daily)`
  Global financial crisis of 2008–2009:
  - ASEAN, Australia, and New Zealand sign a free trade agreement to increase commerce.
    (Bloomberg)
  - The U.S. gross domestic product fell 6.2% in the final fiscal quarter of 2008.
    (MarketWatch)
  - Lloyds Banking Group reports that HBOS lost £10.8 billion during 2008. (BBC)
  - The U.S. federal government will increase its equity stake in Citigroup to 36%.
    (MarketWatch)
  - Japan's industrial production fell by 10% in January 2009. (MarketWatch)
  - Hungarian Prime Minister Ferenc Gyurcsány requests that the European Union aid
    Eastern Europe with US$230 billion. (Bloomberg)
