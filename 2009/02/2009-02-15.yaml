Date: '2009-02-15'
Source_URI: Portal:Current events/2009 February 15
Intelligence_Payload:
  Uncategorized:
  - The United Kingdom confirms the first case of a person contracting Creutzfeldt-Jakob
    disease after receiving contaminated blood plasma. (Telegraph)
  - At least 15 people are killed and seven injured in a hostel fire in Molodyozhny,
    Astrakhan, Russia. (Reuters via ABC News Australia)
  - Israel will pay US$50,000 to the family of a Palestinian man who was killed by
    the country's Defense Forces in December 2003. (PCHR) (Ma'an)
  - Zimbabwe replaces a treason charge against Deputy Agriculture Minister-designate
    Roy Bennett with "conspiring to acquire arms with a view to disrupting essential
    services." (BBC)
  - The Karen National Union attacks Myawaddy, Burma. (AFP via Google News)
  - Colombia's Galeras volcano erupts. (CNN)
  - Fifty-four percent of participating Venezuelan voters approve a constitutional
    referendum to remove term limits for elected offices, including the Presidency.
    (BBC)
  - Prime Minister Ehud Olmert denies reports that Israel is negotiating with Hamas.
    (CNN)
  - General strikes over high living costs continue in Guadeloupe and Martinique.
    (Chicago Tribune)
  - Cancer Research UK's London Institute discovers a "danger receptor" that may initiate
    an immune reaction to cancer. (BBC)
  - The Taliban announces a ten-day ceasefire in its war in northwest Pakistan's Swat
    Valley. (BBC)
  - NASCAR driver Matt Kenseth wins the rain-shortened 2009 Daytona 500 at Daytona
    International Speedway after 152 of 200 laps. (NASCAR.com)
