Date: '2009-06-22'
Source_URI: Portal:Current events/2009 June 22
Intelligence_Payload:
  Uncategorized:
  - A subway train derailment and collision on the Red Line of the Washington Metro
    kills at least nine and injures at least 70. (NBC Washington) (WTOP)
  - A major international conference in Sydney looks at how to expand Internet domain
    names. (ABC)
  - A plan to create a modern Silk Route of roads and railways linking East Asia with
    Europe makes its first substantial progress. (BBC)
  - Brazilian officials identify the first 11 of 50 bodies recovered from Air France
    Flight 447. (AFP via Google)
  - Officials gather in Madeira to strike a deal on whaling, with Japan and Iceland
    likely to insist on their right to hunt. (Al Jazeera)
  - For the first time in 136 years, the Congress of France convenes in the Palace
    of Versailles to listen to an address by the President of France, Nicolas Sarkozy.
    (Associated Press)
  - Zimbabwe's Prime Minister Morgan Tsvangirai insists the coalition government is
    tackling the country's dire humanitarian and economic crisis at a talk at Southwark
    Cathedral in London. (Sky News)
  - Conservative MP John Bercow is elected the new Speaker of the British House of
    Commons. (BBC)
  - French President Nicolas Sarkozy calls for the burqa to be banned in France. (BBC)
    (The Times of India)
  - The email at the heart of the Utegate scandal in Australia is declared a forgery
    by Federal Police. (News Limited)
  2009 Iranian election protests:
  - The Iranian Revolutionary Guard warns that it will 'crush' any further protests.
    (Al Jazeera)
  - Iranian riot police in large numbers clash with about 3,000 protesters in Tehran.
    (Guardian)
