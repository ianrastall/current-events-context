Date: '2009-06-05'
Source_URI: Portal:Current events/2009 June 5
Intelligence_Payload:
  Uncategorized:
  - Two thousand new private color photographs of Adolf Hitler are published. (Telegraph)
    (Daily News)
  - The European Union's parliamentary election continues in the Czech Republic and
    Ireland. (Europarl)
  - Ireland conducts local elections and two by-elections in Dublin Central and Dublin
    South. (RTÉ) (The Irish Times)
  - American economist Paul Krugman says that the Irish economy may not recover from
    the 2008–09 financial crisis until 2014. (RTÉ)
  - The Prime Minister of Italy Silvio Berlusconi threatens to sue the Spanish newspaper
    El País for publishing indecent photographs of people at his villa in Sardinia.
    (BBC)
  - Ireland's rate of unemployment reaches 11.8%. (RTÉ)
  - Pope Benedict XVI is briefed on Ireland's Commission to Inquire into Child Abuse's
    public report. (RTÉ) (The Irish Times)
  - A bus fire kills at least 24 people in Chengdu, Sichuan, China. (Reuters via News
    Limited)
  - Brazil's Air Force confirms that no debris has been recovered from Air France
    Flight 447. (Sky News)
  - Presidential-election candidate Baciro Dabó and former Defense Minister Helder
    Proenca are accused of plotting a coup d'état and killed by Guinea-Bissau's government.
    (BBC) (AFP)
  - A bomb kills nine people in a café in Baghdad, Iraq. (BBC)
  - Philippe Gomès is elected President of New Caledonia. (RNZI)
  - A landslide buries approximately 59 people and kills at least two others in Chongqing,
    China. (BBC)
  - A suicide attack kills at least 38 people at a mosque in Upper Dir District, Pakistan.
    (BBC)
  - Former United States State Department employee Kendall Myers and his wife, Gwendolyn,
    are arrested and charged with spying for Cuba's government. (CNN)
  - David Bain, after an extensive three-month retrial, is found not guilty of murdering
    five family members in Dunedin, New Zealand on 20 June 1994. (TVNZ)
  - 'United Kingdom Prime Minister Gordon Brown shuffles the Cabinet: (RTÉ)'
  - Secretary of State for Transport Geoff Hoon announces his resignation. (Daily
    Telegraph)
  - Minister of State for Europe Caroline Flint announces her resignation. (BBC)
  - Minister of State for Housing and Planning Margaret Beckett announces her resignation.
    (ABC)
  - Minister of State for Employment and Welfare Reform Tony McNulty announces his
    resignation. (Sky News)
  - Bob Ainsworth replaces John Hutton as Secretary of State for Defence. (Times)
  - Chief Secretary to the Treasury Yvette Cooper replaces James Purnell as Secretary
    of State for Work and Pensions. (Guardian)
  - Alan Sugar becomes "Enterprise Tsar" and receives a position in the House of Lords.
    (Daily Telegraph)
  - John Denham replaces Hazel Blears as Secretary of State for Communities and Local
    Government. (PA via Google News)
  - Secretary of State for Health Alan Johnson replaces Jacqui Smith as Home Secretary.
    (BBC) av
