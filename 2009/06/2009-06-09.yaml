Date: '2009-06-09'
Source_URI: Portal:Current events/2009 June 9
Intelligence_Payload:
  Uncategorized:
  - Romania's newly elected right-wing Greater Romania Party MEP George "Gigi" Becali
    is ordered by court not to leave the country. (BBC)
  - Three workers are missing after an explosion at a ConAgra Foods plant in Garner,
    North Carolina, United States. (CNN)
  - '2009 swine flu outbreak: World Health Organisation Director-General Margaret
    Chan believes "on the surface of it" that a pandemic has been reached. She also
    said that "once I get indisputable evidence, I will make the announcement," and
    will meet with governments on Wednesday regarding reports about the outbreak.
    (Associated Press via Breitbart.com)'
  - Indians in Australia allege more attacks against them in Sydney. (BBC)
  - Dáil Éireann debates a motion of no confidence against the Government of Ireland
    as George Lee and Maureen O'Sullivan make their debuts in the 30th Dáil. (RTÉ)
  - Two Democrats cross party lines and join Republicans to swing control of the Senate
    of the U.S. state of New York to the Republican Party. (WCBS New York)
  - Royal Dutch Shell is to pay out $15.5m (£9.7m) in a legal settlement over its
    alleged complicity in the 1995 execution of several Nigerian environmental activists,
    including author Ken Saro-Wiwa, in Nigeria in 1995. (RTÉ) (Sky News)
  - Nick Griffin, the leader of the British National Party, is pelted with eggs by
    protestors and forced to abandon a press conference. (BBC)
  - Lloyds Banking Group announce the closure of all Cheltenham & Gloucester branches
    in the UK and the loss of about 1,660 jobs. (BBC)
  - The trial of William Jefferson, a former member of the U.S. House of Representatives,
    on charges of bribery and racketeering gets underway. (Washington Post)
  - The chairman of Anglo Irish Bank discloses to the Oireachtas Committee on Finance
    and Public Service that some senior staff at the bank have impaired loans to the
    bank. (RTÉ)
  - A study suggests that the HIV prevalence rate in South Africa has leveled off
    at 10.9% and it could be falling in the under-19 age group. (BBC)
  - An explosion kills 11 people and injures at least 46 at a hotel in Peshawar, Pakistan.
    (BBC) (RTÉ)
  - A notebook of Pablo Picasso sketches worth several million euro is discovered
    stolen from the Musée Picasso in Paris. (The Irish Times)
