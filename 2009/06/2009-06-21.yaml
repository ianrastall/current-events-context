Date: '2009-06-21'
Source_URI: Portal:Current events/2009 June 21
Intelligence_Payload:
  Uncategorized:
  - Archaeologists find evidence showing that the manioc plant was a staple food of
    the Maya. (The Los Angeles Times)
  - The Pakistan Cricket Team wins the 2009 ICC World Twenty20 world cup after a hard
    match against Sri Lanka at Lord's Cricket Ground in London, England. (Cricinfo)
  - England defeats New Zealand in the 2009 ICC Women's World Twenty20. (Times of
    India)
  - A new pro-Treaty of Lisbon group led by Pat Cox is launched in Ireland. (RTÉ)
  - The Somali government declares a state of emergency. (Reuters)
  - Self-rule is introduced in Greenland following a 2008 referendum. (BBC)
  - Seven people, including six amusement park employees, are killed in a French rural
    helicopter crash. (RTÉ)
  - The death toll from the Taza bombing rises to 73. (RTÉ)
  - At least sixteen people are killed in a factory blast in Fengyang county, Anhui,
    China. (Times of India) (AP)
  - An open top sightseeing bus with 40 tourists on board is stoned in Belfast. (RTÉ)
  - Salvatore Miceli, an Italian Mafia fugitive on the run since 2001 and listed as
    one of the country's 30 most dangerous men, is arrested in Venezuela. (BBC) (IOL)
    (Reuters)
  - United States President Barack Obama tells a television news crew his country
    is "fully prepared" for a possible missile test by North Korea over the Pacific
    Ocean. (BBC)
  2009 Iranian election protests:
  - Iranian state television claims at least ten people are dead following protests
    over the recent election. (BBC) (RTÉ)
  - Iranian officials ask the BBC's chief Iran correspondent to immediately leave
    the country after accusing the BBC of meddling in internal affairs. (BBC)
  - The Guardian Council admits more than 100% of eligible voters cast their ballots
    in 50 cities in the presidential election. (Press TV)
  - Akbar Hashemi Rafsanjani's daughter is arrested. (Irish Independent)
  - Accusations of interference in Iran leveled against the United Kingdom and United
    States are rejected by British Foreign Secretary David Miliband. (Irish Independent)
