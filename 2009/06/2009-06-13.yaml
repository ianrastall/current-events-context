Date: '2009-06-13'
Source_URI: Portal:Current events/2009 June 13
Intelligence_Payload:
  Uncategorized:
  - Mahmoud Ahmadinejad is reelected as the President of Iran, although opposition
    leader Mir-Hossein Mousavi demands a recount. (BBC News)
  - California Governor Arnold Schwarzenegger delivers a speech regarding the state's
    financial crisis, favoring state spending cuts rather than the issuing of bonds.
    (Los Angeles Times)
  - China begins the third large-scale excavation of the Mausoleum of the First Qin
    Emperor in 24 years. (Xinhua)
  - The planned launch of Space Shuttle Endeavour is scrubbed because of a gaseous
    hydrogen leak. (NASA)
  - Pakistani warplanes strike a stronghold of Taliban leader Baitullah Mehsud in
    South Waziristan. (Reuters)
  - Queen Elizabeth II of the United Kingdom celebrates her 83rd birthday at Trooping
    the Colour. (Fox News)
  North Korea:
  - North Korea announces it will "weaponise all plutonium" and begin uranium enrichment
    following United Nations Security Council Resolution 1874 against the country.
    (Al Jazeera) (BBC News)
  - South Korea sends troops to the North Korean border as tensions escalate. (Telstra
    Bigpond News)
