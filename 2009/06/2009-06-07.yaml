Date: '2009-06-07'
Source_URI: Portal:Current events/2009 June 7
Intelligence_Payload:
  Uncategorized:
  - The European Union's parliamentary election concludes in Austria, Belgium, Bulgaria,
    Denmark, Estonia, Finland, France, Germany, Greece, Hungary, Italy, Lithuania,
    Luxembourg, Poland, Portugal, Romania, Slovenia, Spain, and Sweden. (BBC) (RTÉ)
  - Bolivia's government seeks two Irish passport-holders who are allegedly connected
    to the attempted assassination of President Evo Morales in April. (Times)
  - A seven-day gay pride festival is held for the first time in Shanghai, China.
    (BBC)
  - The United States Supreme Court is requested to block Italian automaker Fiat's
    purchase of Chrysler. (BBC)
  - Former Cuban President Fidel Castro dismisses allegations that ex-U.S. State Department
    employee Kendall Myers spied for his country. (ABC) (BBC) (Times of India)
  - Former United Kingdom Cabinet Ministers Hazel Blears, James Purnell, John Hutton,
    and Caroline Flint coordinated their resignations to compel Prime Minister Gordon
    Brown to also resign. (Independent)
  - Dalai Lama Tenzin Gyatso is granted honorary citizenship in Paris, France. (AFP)
  - Radio Shabelle director Moqtar Mohamed Hirabe is killed in Mogadishu, Somalia.
    (BBC)
  - Billy Elliot the Musical wins Best Musical and God of Carnage wins Best Play at
    the 63rd Tony Awards. (AP via Google News)
  Air France Flight 447:
  - Air France replaces airspeed sensors on its Airbus aircraft. (BBC)
  - Four additional bodies are discovered in the Atlantic Ocean. (BBC) (RTÉ) (Reuters)
