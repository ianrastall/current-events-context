Date: '2009-06-10'
Source_URI: Portal:Current events/2009 June 10
Intelligence_Payload:
  Uncategorized:
  - The leadership of the 30th Dáil Éireann in Ireland, representing Fianna Fáil and
    the Irish Green Party, win a motion of confidence. (RTÉ)
  - The European Transport Safety Council criticises Ireland's lack of speed cameras.
    (RTÉ)
  - At least two people are shot at the United States Holocaust Memorial Museum in
    Washington D.C., with an elderly white supremacist as the main suspect. (CNN)
  - Thousands of people demonstrate in solidarity with victims of child abuse in Dublin
    as hundreds of victims are invited to meet Irish President Mary McAleese. (RTÉ)
    (Irish Independent)
  - Setanta Sports announce it has stopped taking on new subscriptions in order to
    "secure the future of the business". (BBC) (RTÉ)
  - Air France Flight 447
  - French authorities say two passengers on board Air France Flight 447 were linked
    to Islamic terrorism. (Sky News) The Ministry of the Interior later stated that
    these two passengers turned out to be of no concern. (Reuters through Yahoo news)
  - 41 bodies have thus far been recovered. (RTÉ)
  - A car bomb exploded in a crowded market in the town of Bathaa in the southern
    Iraqi province of Dhiqar, killing up to 35 persons and injuring dozens of others.
    (Huffington Post)
  - Massive demonstrations are held in various places in the Philippines against the
    passage of the Constituent Assembly to amend the Constitution. (Philippine Daily
    Inquirer)
  - A two-day strike by the United Kingdom National Union of Rail, Maritime and Transport
    Workers disrupts train services in London. (the Times)
  - Russia begins destroying 6,000 tons of nerve gas in Shchuchye, Kurgan Oblast.
    (Sky News)
  - The United Nations Security Council, along with Japan and South Korea, agrees
    a draft resolution following North Korea's recent nuclear and missile tests. (BBC)
  - Palau agrees to accept up to 17 Chinese Uighurs from Guantanamo Bay detention
    camp. (Bloomberg)
  - The Thai army is sent to reinforce positions along Thailand's border with Burma
    after an influx of Karen refugees following a Burmese army offensive in Karen
    state. (BBC)
  - Rose Francine Rogombé is sworn in as acting head of state in Gabon, following
    the death of Omar Bongo Ondimba. (AFP)
  - Nine miners die and four are still missing after an accident at a coal mine in
    Donetsk, Ukraine. (BBC)
  - Libyan leader Muammar Gaddafi arrives in Rome on his first visit to Italy, Libya's
    former colonial ruler and now its biggest trading partner, wearing a photograph
    of Omar Mukhtar. (BBC)
  - Google Inc. announced that it has received notice from the United States Department
    of Justice that antitrust investigators are studying its settlement with publishers
    designed to put millions of books online consistent with the property rights of
    authors. (Reuters)
