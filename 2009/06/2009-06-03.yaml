Date: '2009-06-03'
Source_URI: Portal:Current events/2009 June 3
Intelligence_Payload:
  Uncategorized:
  - The Organization of American States revokes its 47-year suspension of Cuba. (Reuters)
  - Ireland's State Examinations Commission postpones a Leaving Certificate Exam because
    of an accidental content leak. (RTÉ) (The Irish Times)
  - Labour Party Members of the United Kingdom's Parliament circulate an e-mail that
    requests Prime Minister Gordon Brown's resignation. (Sky News)
  - The remotely operated vehicle Nereus reaches the Challenger Deep in the Pacific
    Ocean's Mariana Trench. (BBC)
  - Indian Member of Parliament Meira Kumar becomes the first female Speaker of the
    House of the People. (Al Jazeera)
  - Al-Qaeda founder Osama bin Laden criticizes United States President Barack Obama
    on an audio cassette. (BBC) (The Times)
  - President Jacob Zuma vows to create 500,000 jobs through 2009 in South Africa's
    State of the Nation Address. (BBC) (Forbes)
  - The Nigerian government recaptures 130 of 150 inmates who escaped from a prison
    in Enugu. (BBC)
  - Former Malagasy President Marc Ravalomanana is sentenced in absentia to incarceration
    until 2013 for misconduct. (BBC)
  - American author Marilynne Robinson wins the Orange Prize for Fiction for her novel
    Home. (BBC)
  - The U.S. state of New Hampshire legalizes same-sex marriage. (Boston Globe)
  - The al-Qaeda Organization in the Islamic Maghreb executes British hostage Edwin
    Dwyer in the Sahara. (Sky News)
