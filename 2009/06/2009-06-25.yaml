Date: '2009-06-25'
Source_URI: Portal:Current events/2009 June 25
Intelligence_Payload:
  Uncategorized:
  - Death of Michael Jackson
  - Michael Jackson dies from cardiac arrest at the age of 50 after arrival at the
    UCLA Medical Center in Los Angeles, California. (The Los Angeles Times) (EOnline)
  - Michael Jackson's death has severe consequences on multiple major websites, such
    as Google, who saw unprecedented traffic and, mistaking the traffic for a DDOS
    attack, temporarily shut down. (CNET)
  - Farrah Fawcett dies at approximately 9:28 a.m. in the intensive care unit of Saint
    John's Health Center in Santa Monica, California, with Ryan O'Neal and Alana Stewart
    by her side. (The Los Angeles Times)
  - Iran
  - A mourning ceremony for protesters who died in the post-election protests is cancelled.
    (RTÉ)
  - Over 180 MPs refuse an invitation to attend a celebration of Mahmoud Ahmadinejad's
    election win. (BBC) (Zee News)
  - Campaigning begins for a legislative election in Iraqi Kurdistan. (BBC)
  - Venezuela and the United States say they will restore their ambassadors. (The
    Irish Times)
  - A roadside bomb kills five Iraqi policemen in the western city of Fallujah. (The
    Irish Times)
  - The last leg of the 2008–09 Volvo Ocean Race gets underway in Stockholm. (Irish
    Independent)
  - The Russian Supreme Court orders a retrial for three men on charges related to
    the murder of journalist Anna Politkovskaya. (CNN) (RIA Novosti)
  - Burma denies any link to the North Korean ship Kang Nam 1 being tracked by the
    United States on suspicion of carrying weapons in violation of a United Nations
    embargo. (BBC) (Bangkok Post)
  - Honduran President Manuel Zelaya fires his armed forces chief after he refuses
    to give logistical support for a referendum on constitutional change. The Supreme
    Court then orders that he be returned to his job immediately. (CNN) (BBC)
  - Qantas Airways cancelled half of a 30-plan order for 787 Dreamliners from Boeing
    Co., a cancellation that may amount to a $3.1 billion hit for Boeing. (Bloomberg)
  - Cristiano Ronaldo completes a world record transfer fee of 80 million pounds which
    sends him to Real Madrid from Manchester United. (BBC)
  - 2009 NBA Draft took place.
