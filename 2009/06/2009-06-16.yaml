Date: '2009-06-16'
Source_URI: Portal:Current events/2009 June 16
Intelligence_Payload:
  Uncategorized:
  - Iran
  - The Guardian Council is to hold a recount of disputed votes from the country's
    presidential election. (BBC)
  - At least seven people have been killed near a rally in Tehran. (Reuters) (Xinhua)
  - Foreign media are banned from covering the protests following the deaths of seven
    people. (RTÉ)
  - Two Reformist politicians are arrested. (Press TV)
  - Large demonstrations in support of Mahmoud Ahmadinejad and Mir-Hossein Mousavi
    take place in the capital. (Press TV) (BBC)
  - The state funeral in Libreville of former President of Gabon Omar Bongo is attended
    by dignitaries from 40 nations. (Reuters)
  - Russia vetoes a plan to extend the United Nations Observer Mission in Georgia.
    (The Guardian) (UN)
  - Playwright Brian Friel is honoured with the Ulysses Medal on Bloomsday at University
    College Dublin. (The Irish Times)
  - A coal mine collapses in Indonesia, killing at least six people. (Xinhua)
  - Documents released to the American Civil Liberties Union state Khalid Sheik Mohammed
    testified that he made up information after allegedly tortured by the CIA. (UPI)
  - China announces plan to provide a US$ 10 billion credit loan to member states
    of the Shanghai Cooperation Organisation. (Xinhua)
  - Official campaigning for the 2009 presidential election in Afghanistan begins.
    (Reuters)
  - General Motors agrees Saab sale to Koenigsegg (BBC)
  - A Sri Lankan government investigation into human rights abuses during its offensive
    with Tamil Tiger rebels disbands. (AP)
  - 15 laptops containing confidential information owned by Ireland's Health Service
    Executive are stolen in Roscommon. (RTÉ)(The Irish Times)
  - German economic confidence reaches its highest level for over three years. (RTÉ)
  - Sir John Sawers is named head of MI6. (BBC)
  - Sammy Sosa, one of six Major League Baseball players to have hit 600 home runs
    in his career, is reported to have tested positive for performance-enhancing drugs
    during the 2003 season. (The New York Times)
  - The U.S. Food & Drug Administration advised people not to use Zicam intranasal
    products that contain zinc, due to the risk of anosmia. (US FDA website)
  - Jonas Brothers' album Lines, Vines and Trying Times is released
