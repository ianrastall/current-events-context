Date: '2009-06-17'
Source_URI: Portal:Current events/2009 June 17
Intelligence_Payload:
  Uncategorized:
  - Pope Benedict XVI warns traditionalist Catholic organisation Society of St. Pius
    X (SSPX) not to go ahead with plans to ordain more than 30 priests on June 19
    and 27, saying the move could incur disciplinary action. (BBC)
  - Kitty Ussher resigns as Exchequer Secretary to the Treasury and announces that
    she will stand down as Member of Parliament for Burnley at the next general election
    following involvement in the United Kingdom Parliamentary expenses scandal. (BBC)
  - United States President Barack Obama extends some benefits to the same-sex partners
    of federal government workers. (BBC)
  - Over 100 Romanians flee their homes in Belfast after being attacked. (BBC) (RTÉ)
  - Burma's Supreme Court accepts an appeal by lawyers for National League for Democracy
    General Secretary Aung San Suu Kyi on whether to allow more defense witnesses
    to testify at her trial. (Bangkok Post)
  - Seventeen people, including the head of Mogadishu's police force, are killed in
    fighting between the Transitional Federal Government and al-Shabaab. (Xinhua)
    (AP)
  - Maoist fighters kill 3 members of the ruling Communist Party in West Bengal. (Reuters)
    (The Times of India)
  - Indian Prime Minister Manmohan Singh meets with Pakistani President Asif Ali Zardari.
    (The Times) (Xinhua)
  - The Peruvian government is to revoke land laws that resulted in deadly clashes
    with indigenous protesters in the Amazon. (BBC)
  - NASA defers the launch of Space Shuttle Endeavour for a second time until July.
    (AFP)
  - A laptop containing unencrypted bank account details of 75,000 Bord Gáis customers
    is stolen in Dublin. (RTÉ) (BBC)
  - Eddie Bauer, the well-known retailer of outdoor apparel, filed for bankruptcy
    in a U.S. Bankruptcy Court in Delaware. (Reuters)
  2009 Iranian election protests:
  - Mir-Hossein Mousavi calls for a day of mourning and rallies after several people
    die in protests following the presidential election. (Reuters) (The Times) (BBC)
  - Fans and members of the Iranian national football team protest during a World
    Cup qualifier against South Korea. (CBC) (Al Bawaba)
