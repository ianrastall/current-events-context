Date: '2009-06-30'
Source_URI: Portal:Current events/2009 June 30
Intelligence_Payload:
  Uncategorized:
  - The Gas Exporting Countries Forum elects Abdullah Bin Hamad Al-Attiyah, oil and
    energy minister of Qatar, as the president of the organization. (Bloomberg)
  - The President of Cameroon Paul Biya sacks Prime Minister Ephraim Inoni and appoints
    Philemon Yang to the role. (AP via Google News)
  - Dresden loses its status as a UNESCO World Heritage Site. (Bloomberg)
  - Germany's Constitutional Court approves the Treaty of Lisbon, but suspends ratification
    of it. (The Wall Street Journal)
  - Official figures from the Central Statistics Office show a dramatic contraction
    in the Irish economy in the first three months of 2009. (RTÉ)
  - At least 15 people are killed and 40 are injured by the derailment of an Italian
    freight train and subsequent explosion of two wagons carrying liquified petroleum
    gas in Viareggio. (BBC)
  - Yemenia Flight 626, an Airbus A310, crashes en route to Moroni, Comoros, from
    Sana'a, Yemen. (CNN)
  - U.S. forces pull out of Baghdad and leave major cities across Iraq. (The New York
    Times)
  - The Pirate Bay, one of the world's largest BitTorrent trackers, confirms today
    that it would be acquired by Global Gaming Factory X (GGF) for 7.8 million USD.
    (The Pirate Bay blog)
  - The Taliban scraps the truce offered in February by the Pakistani government,
    killing approximately 30 Pakistani soldiers shortly after making the announcement.
    (The New York Times)
  - The Israeli navy intercepts a boat carrying humanitarian supplies headed for Gaza,
    which remains under a blockade. (The Jerusalem Post) (Al Jazeera)
  - United States Senate election in Minnesota, 2008
  - The Minnesota Supreme Court orders that Al Franken be certified winner of the
    state's Senate election. (Reuters)
  - Norm Coleman concedes the election saying "further litigation would damage the
    state's unity." (Bloomberg)
