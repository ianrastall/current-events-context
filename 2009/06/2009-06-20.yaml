Date: '2009-06-20'
Source_URI: Portal:Current events/2009 June 20
Intelligence_Payload:
  Uncategorized:
  - Iran
  - Riot police clash with protesters in Tehran. (The Times) (Al Jazeera) (BBC)
  - A suicide bomb reportedly explodes at the shrine of former Grand Ayatollah Ruhollah
    Khomeini. (CTV) (Reuters) (Press TV)
  - Mir-Hossein Mousavi renews calls for the election results to be annulled. (Xinhua)
  - The Guardian Council announces it will randomly recount 10% of ballot boxes. (China
    Daily) (Sify)
  - A sunken ship believed to carry over US$15 million in gold is located in the Magellan
    Straits off the coast of Argentina. (BBC)
  - The United States admits its forces failed to follow their own rules in an Afghan
    airstrike that may have led up to 140 civilian deaths. (BBC) (RTÉ)
  - A New Zealand jury convicts Nai Yin Xue, who sparked an international hunt in
    2007, of murdering his wife. (New Zealand Herald) (Melbourne Herald Sun)
  - Greece's Acropolis Museum in Athens is unveiled. (BBC)
  - The bodies of two British hostages in Iraq are discovered. (The Telegraph)
  - Attacks on Romanians in Belfast
  - An anti-racism rally is held in Belfast following the removal of 100 Romanian
    people from their homes. (BBC)
  - Two teenagers are charged in connection with the attacks. (BBC) (RTÉ)
  - New York Times reporter David S. Rohde, kidnapped by the Taliban seven months
    ago, escapes. (The New York Times)
  - Indian troops enter Lalgarh, a Maoist stronghold in West Bengal, claiming a partial
    victory. (Press Trust of India) (Al Jazeera)
  - At least 67 people are killed and over 200 are injured in a suicide attack near
    Kirkuk in Iraq. (RTÉ) (BBC)
