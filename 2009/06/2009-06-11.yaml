Date: '2009-06-11'
Source_URI: Portal:Current events/2009 June 11
Intelligence_Payload:
  Uncategorized:
  - Some 2,000 wild Canadian geese are to be killed around New York's main airports
    to reduce the numbers of the birds that brought down US Airways Flight 1549 in
    January. (The New York Times)
  - 10,000 Gabonese watch the body of President Omar Bongo arrive back home from Spain.
    (BBC) (The Sydney Morning Herald)
  - A Bosnian television station shows what it says is recent video footage of genocide
    suspect and Bosnian war commander General Ratko Mladić in Serbia. (The Guardian)
  - Swedish sports car maker Koenigsegg is to buy Saab Automobile from General Motors
    with support from Norwegian investors.(Forbes)
  - Dáil Éireann debates the findings of the Commission to Inquire into Child Abuse,
    delayed by the motion of no confidence in the Irish Government opened by Fine
    Gael. (RTÉ)
  - Ireland's Garda Commissioner sends two Garda forensic specialists to Brazil to
    assist in the identification of bodies from Air France Flight 447. (RTÉ)
  - The World Health Organization declares the current outbreak of H1N1 to be a “pandemic”,
    the first since the 1968 Hong Kong flu. (BBC) (RTÉ)
  - Italian students protest Libyan leader Muammar al-Gaddafi's visit to the country.
    (BBC)
  - RTÉ, Ireland's public service broadcaster, denies it is facing bankruptcy. (RTÉ)
  - Four Chinese Uighurs from the Guantanamo Bay detention camp are resettled in Bermuda.
    (The Times)
  - Campaigning in Iran's presidential election ends after three weeks of mass rallies
    and political rhetoric. (BBC)
  - The President of France, Nicolas Sarkozy, says he will travel to Ireland to assist
    the passing of the forthcoming Treaty of Lisbon referendum at a joint news conference
    with the Chancellor of Germany, Angela Merkel, in Paris. (RTÉ)
  - Kumari Selja, India's tourism minister, calls off a visit to Australia following
    attacks on Indian students in the country. (BBC)
  - The U.S. Supreme Court denies a bail request by Conrad Black, a member of the
    British House of Lords who remains in a federal prison in Florida.
  - Egyptian Culture Minister Farouk Hosni announces that the ministry will publish
    Arabic translations of novels by Israeli writers Amos Oz and David Grossman. (BBC)
  - Xu Zongheng, the mayor of Shenzhen, southern China, is dismissed for "disciplinary
    offences" after being questioned on corruption allegations. (BBC)
  - For the first time ever, Brazil offers US$10 billion in financing to the International
    Monetary Fund to help improve the availability of credit in developing countries.
    (BBC)
  - Ferrero SpA is cleared of allegations of fraud relating to the supply of hazelnuts.
    (BBC) (The Times)
