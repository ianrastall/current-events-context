Date: '2009-06-12'
Source_URI: Portal:Current events/2009 June 12
Intelligence_Payload:
  Uncategorized:
  - Iran goes to the polls for its presidential election. (AFP via Yahoo) (BBC)
  - The Pittsburgh Penguins defeat the Detroit Red Wings in game seven to win the
    2009 Stanley Cup Finals. (AP via WSLS)
  - The head of the fourth largest coalition in the Iraqi parliament, Harith al-Obeidi,
    is assassinated in west Baghdad. (BBC)
  - U.S. full power television stations complete their switch from analog to digital
    television. (The Washington Times)
  - The United Nations Security Council unanimously votes to impose further sanctions
    on North Korea, following recent nuclear and missile tests. (UN) (BBC)
  - Prominent Pakistani anti-Taliban cleric Sarfraz Naeemi is killed in a suspected
    suicide bomb attack at his Islamic religious school in Lahore. (Al Jazeera)
  - The United Kingdom Foreign Secretary, David Miliband, is asked to explain how
    four Chinese detainees from Guantánamo Bay were released to Bermuda without the
    knowledge of Whitehall. (BBC) (The Guardian)
  - The world's first City of Film is announced by UNESCO, with Bradford beating competition
    from Los Angeles, Cannes and Venice. (The Guardian)
  - Mombasa's courts are overwhelmed with Somali pirate trials; some cases could be
    transferred to Nairobi. (The Times)
  - The trial of National League for Democracy General Secretary Aung San Suu Kyi
    is adjourned until June 26. (AP) (BBC)
  - India is to withdraw troops from Kashmir's towns and cities for the first time
    in 20 years. (The Times) (UPI)
  - Two Japanese citizens are detained in Italy after allegedly attempting to take
    $134 billion worth of U.S. bonds over the border into Switzerland starting the
    Chiasso financial smuggling case. (Bloomberg)
