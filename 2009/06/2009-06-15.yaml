Date: '2009-06-15'
Source_URI: Portal:Current events/2009 June 15
Intelligence_Payload:
  Uncategorized:
  - Iran
  - Presidential candidate Mir Hossein Mousavi calls for the presidential election
    results to be annulled. (BBC)
  - Supreme Leader Ayatollah Ali Khamenei orders an inquiry into claims of electoral
    fraud. (AFP via News Limited)
  - Thousands of protestors gather in Tehran in support of Mir Hossein Mousavi, defying
    a government ban on protests. (Al Jazeera) (Xinhua)
  - At least one person is killed and many wounded during clashes between police and
    protesters in Tehran. (Sky News)
  - Lee Myung-bak, South Korea's president, meets U.S. President Barack Obama in Washington
    to talk about North Korea. (The Washington Times)
  - Pierre Ngaiohni is elected Vice President of New Caledonia. (RNZI)
  - British Prime Minister Gordon Brown announces that an independent inquiry into
    the country's role in the Iraq War will be held in private. (BBC) (Al Jazeera)
  - Leaders gather in Yekaterinburg, Russia, ahead of a Shanghai Cooperation Organisation
    and the first ever BRIC summit. (AFP) (Xinhua)
  - India, the defending champions and favorites at the 2009 ICC World Twenty20, are
    defeated by England. (BBC)
  - The European Union announces it will help resettle detainees released from the
    Guantanamo Bay detention camp. (Reuters)
  - Five Cubans convicted of spying for Cuba are denied an appeal for a new trial
    by the United States Supreme Court. (CNN)
  - Notorious Melbourne Gangland figure Desmond "Tuppence" Moran is shot dead outside
    Deli Cafe in Ascot Vale, Victoria, Australia.
