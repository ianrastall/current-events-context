Date: '2009-06-04'
Source_URI: Portal:Current events/2009 June 4
Intelligence_Payload:
  Uncategorized:
  - United Kingdom Secretary of State for Work and Pensions James Purnell announces
    his resignation and requests that Prime Minister Gordon Brown also resign. (Guardian)
  - Two laptop computers that contain personal information on Northern Ireland's 30,000
    civil servants are stolen from the Department of Finance and Personnel in Belfast.
    (RTÉ)
  - England conducts local elections in 27 county councils and five unitary authorities.
    (Telegraph)
  - The President of the United States, Barack Obama, addresses the Muslim world in
    Cairo, Egypt. (BBC) (Washington Post)
  - The European Union's parliamentary election commences in the Netherlands and United
    Kingdom. (Europarl) (RTÉ)
  - Irish Minister for Education and Science Batt O'Keeffe apologises for the postponement
    of a Leaving Certificate Examination. (RTÉ) (Irish Independent)
  - Australian Minister for Defense Joel Fitzgibbon resigns. (BBC)
  - Linguistic analysis confirms that American astronaut Neil Armstrong did not say
    the article "a" in the phrase "one small step for a man" when he walked on the
    Moon on July 20, 1969. (BBC)
  - 150,000 people assemble in Hong Kong, China, to commemorate the 20th anniversary
    of the massacre in Tiananmen Square on June 4, 1989. (BBC)
  - Two hundred thousand people attend the funeral of Dera Sach Khand leader Sant
    Ramanand Dass in Jalandhar, Punjab, India. (BBC) (Times of India)
