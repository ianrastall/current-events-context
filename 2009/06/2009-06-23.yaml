Date: '2009-06-23'
Source_URI: Portal:Current events/2009 June 23
Intelligence_Payload:
  Uncategorized:
  - United Kingdom Commons speaker John Bercow breaks with tradition by abandoning
    the traditional court dress worn by his predecessor Michael Martin. (The Times)
  - Boeing delays the first test flight of its lightweight jet, the 787, because of
    stress found where the wings attach to the sides of the plane. (The New York Times)
  - The French National Assembly announces the beginning of an inquiry into whether
    women in France should be allowed to wear the burqa. (CNN)
  - Ukraine sets 17 January 2010 as the date for the next presidential election said
    to be crucial for its future direction. (RTÉ) (The Moscow Times)
  - Attacks on Romanians in Northern Ireland
  - In the New York State Senate legislative deadlock, Senate Democrats lock themselves
    into the Senate chamber due to a refusal to accept Pedro Espada as Senate President.
    (The New York Times)
  - Russian President Dmitry Medvedev meets Egyptian President Hosni Mubarak in Cairo
    at the start of a four-day trip to Africa. (BBC)
  - The government of Antigua and Barbuda dismisses its chief financial regulator,
    Leroy King, following claims of a collaboration with Allen Stanford. (RTÉ) (The
    New York Times)
  2009 Iranian election protests:
  - The Guardian Council rules out a re-run of the presidential election saying that
    there was no sign of serious electoral fraud in the June 12 vote. (Al Jazeera)
  - Iran accuses U.N. Secretary-General Ban Ki-moon of meddling in its affairs after
    he urged the Islamic state to stop its crackdown on opposition protesters. (Reuters)
  - Four international footballers – Ali Karimi, Mehdi Mahdavikia, Hosein Ka'abi and
    Vahid Hashemian – are "retired" from the sport after their gesture in a football
    match against South Korea in Seoul. (The Guardian)
  - The United Kingdom orders the expulsion of two Iranian diplomats after Tehran
    orders two UK diplomats to leave Iran. (BBC)
  - One hundred Romanians flee Northern Ireland and return to Romania. (BBC)
  - President of Ireland Mary McAleese tells Strasbourg that the racist attacks in
    Belfast are "distressing and sickening". (RTÉ)
