Date: '2009-06-27'
Source_URI: Portal:Current events/2009 June 27
Intelligence_Payload:
  Uncategorized:
  - Two loyalist paramilitary groups in Northern Ireland begin decommissioning their
    weapons. (The Telegraph)
  - Brazil announces it has ended the search for bodies from Air France Flight 447.
    (Associated Press) (The Times of India)
  - Thousands of protestors from the National United Front of Democracy Against Dictatorship
    call on the government to resign in Bangkok, Thailand. (BBC)
  - Saad al-Hariri is appointed the new Prime Minister of Lebanon. (Reuters)
  - The Taliban claim responsibility for a suicide attack in Pakistan-administered
    Kashmir which killed two soldiers. (AFP)
  - NATO and Russia agree to restore military ties after a 10 month period following
    the 2008 war in Georgia. (Al Jazeera) (Reuters)
  - Afghan President Hamid Karzai calls on the Taliban to take part and vote in the
    August presidential election. (Xinhua) (New York Times)
  - The United States National Transportation Safety Board identifies two incidents
    similar to the circumstances thought to have occurred on Air France Flight 447.
    (The Christian Science Monitor)
