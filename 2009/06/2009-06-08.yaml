Date: '2009-06-08'
Source_URI: Portal:Current events/2009 June 8
Intelligence_Payload:
  Uncategorized:
  - At least 18 factory workers are killed when their bus collides with a truck in
    the Nile Delta, Egypt. (Irish Examiner)
  - Lloyds Banking Group repay £2.56 billion to Her Majesty's Government to compensate
    for partial nationalisation on 19 January 2009. (Times)
  - The Supreme Court of the United States stays the sale of Chrysler to Fiat in Indiana
    State Police Pension Trust v. Chrysler. (Bloomberg)
  - Four men, including Real Irish Republican Army members Michael McKevitt and Colm
    Murphy, are declared responsible for the bombing of Omagh, County Tyrone, Northern
    Ireland, in 1998. (Reuters) (RTÉ)
  - The Minister of State for Farming and the Environment, Jane Kennedy, announces
    her resignation from the Government of the United Kingdom. (BBC)
  - Pope Benedict XVI is reportedly "visibly upset" after hearing the findings of
    Ireland's Commission to Inquire into Child Abuse. (RTÉ)
  - Gabonese President Omar Bongo dies of a heart attack at age 73. (BBC)
  - Two American journalists are found guilty of illegally entering North Korea and
    sentenced to 12 years of penal labour. (Sky News)
  - North Korea restricts access to the Sea of Japan, near Wonsan, from June 10–30,
    possibly indicating future missile testing. (AFP via News Limited)
  - Mayor Ray Nagin of New Orleans, Louisiana, is quarantined in Shanghai, China,
    after a passenger on his flight from the United States was diagnosed with A(H1N1)
    influenza. (BBC)
  - In a referendum held alongside European Parliament elections, voters in Denmark
    agreed to change their Acts of Succession to eliminate male preference in their
    line of succession. (AAP via TV New Zealand)
  - In a legislative election held alongside European Parliament elections, the Christian
    Social People's Party increase their plurality in Luxembourg's Chamber of Deputies.
    (AFP via NASDAQ)
  - The third acid attack since December 2008 occurs in Mong Kok, Hong Kong. (The
    Standard)
  - Apple Inc. debuts the third generation of its iPhone line, iPhone 3GS at Worldwide
    Developers Conference 2009. (Apple website)
  European Union's parliamentary elections:
  - The centre-right European People's Party increases its plurality. (BBC)
  - Libertas Institute leader Declan Ganley announces his intention to retire from
    politics. (RTÉ)
