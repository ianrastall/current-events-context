Date: '2009-06-24'
Source_URI: Portal:Current events/2009 June 24
Intelligence_Payload:
  Uncategorized:
  - Togo abolishes the death penalty. (BBC)
  - China blocks Google services. (The Guardian)
  - A flute carved over 35,000 years ago, and thought to be the oldest musical instrument
    in the world, is unearthed in Germany. (BBC) (National Geographic) (The New York
    Times)
  - Mark Sanford, Governor of the U.S. state of South Carolina, admits to adultery
    with an Argentine woman and resigns as Chairman of the Republican Governors Association.
    (Politico)
  - Iran
  - Supreme Leader Ayatollah Ali Khamenei declares the recent election result will
    stand. (BBC) (RTÉ)
  - Further violent clashes break out in Tehran. (CNN) (The New York Times)
  - A number of Britons are arrested in Tehran following clashes between protesters
    and police, Iran state television reports. (Sky News)
  - At least 43 people are killed by United States aircraft in South Waziristan, Pakistan.
    (BBC) (France 24) (RTÉ)
  - The Chinese government formally arrests dissident Liu Xiaobo on charges of state
    subversion. (Wall Street Journal) (Al Jazeera) (Press TV)
  - The United States is to send an ambassador to Syria after an absence of four years.
    (Al-Arabiya)
  - A bomb kills two people and injures six others in Chechnya, Russia. (Xinhua) (RIA
    Novosti)
  - Former detainees allege abuses at Bagram Air Base in Afghanistan. (BBC) (AFP)
  - More than 60 are killed and 150 are injured after a bombing in Baghdad. (BBC)
  - Seven members of Bolivia's Mennonite Christian community are detained over the
    alleged rape of 60 women or girls from their own community. (BBC) (Reuters)
