Date: '2009-06-29'
Source_URI: Portal:Current events/2009 June 29
Intelligence_Payload:
  Uncategorized:
  - The Preparatory Commission for the International Renewable Energy Agency designates
    the headquarters of the organization to Masdar City, Abu Dhabi. (Deutsche Welle)
  - Scientific tests show bones housed in the Basilica of Saint Paul Outside the Walls
    in Rome are those of the apostle Saint Paul himself, according to Pope Benedict
    XVI. (CNN)
  - Bernard Madoff is sentenced to 150 years in prison for investment fraud. (The
    New York Times)
  - The United States Air Force test fires an unarmed Minuteman III intercontinental
    ballistic missile from the coast of California to a point in the Pacific Ocean
    about 4,200 miles (6,750 km) away. (AP via KFMB)
  - Two passenger trains collide in Chenzhou, Hunan in central China, leaving at least
    three people dead and 60 injured. (Xinhua)
  - Five out of nine local staff from the British embassy in Tehran, Iran, who were
    recently arrested, are released. (BBC)
  - The Iranian Guardian Council certifies the controversial presidential election.
    (The New York Times)
  - The United Nations Secretary-General Ban Ki-moon will travel to Burma on Friday
    to press the country on democratic reform. (BBC)
  - The opposition gained a large victory in Argentine legislative elections, leading
    party leader Néstor Kirchner to step down. (BBC)
  - The U.S. resumes secret surveillance flights to aid Pakistani commanders. (The
    New York Times)
