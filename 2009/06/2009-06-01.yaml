Date: '2009-06-01'
Source_URI: Portal:Current events/2009 June 1
Intelligence_Payload:
  Uncategorized:
  - Mauricio Funes is inaugurated as President of El Salvador. (Al Jazeera)
  - The Central Bank of Nicaragua introduces new 100 and 200 Córdoba banknotes. (TIME)
  - Dow Jones & Company will replace Citigroup and General Motors with Travelers Companies
    and Cisco Systems on its Industrial Average on June 8. (CNNMoney.com)
  - Air France Flight 447 disappears over the Atlantic Ocean, near Brazil. (AFP via
    News Limited) (BigPond News)
  - The United States Congressional Research Service reports that China is aiding
    the development of Pakistan's program of nuclear weaponry. (The Times of India)
  - General Motors files for bankruptcy under Chapter 11 of the U.S. Bankruptcy Code.
    (Detroit Free Press)
  - The Taliban kidnaps approximately 400 people in North-West Frontier Province,
    Pakistan. (Reuters) (RTÉ)
  - More than 40,000 females compete in the Women's Mini Marathon in Dublin, Ireland.
    (Evening Herald) (The Irish Times)
  - The Movement for the Emancipation of the Niger Delta refuses to release British
    hostage Matthew Maguire. (BBC)
  - A man kills one soldier and injures another at a military recruitment center in
    Little Rock, Arkansas. (MSNBC)(AP)
