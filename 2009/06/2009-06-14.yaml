Date: '2009-06-14'
Source_URI: Portal:Current events/2009 June 14
Intelligence_Payload:
  Uncategorized:
  - The Los Angeles Lakers defeat the Orlando Magic four games to one to win the 2009
    NBA Finals. Lakers coach Phil Jackson wins his tenth NBA Championship, becoming
    the all-time leader. (The New York Times)
  - Europe's first death from H1N1 is reported in Paisley, Scotland. (Reuters) (RTÉ)
    (The Irish Times)
  - Around 170 people are arrested in Iran in connection with the post-election protests
    and street riots in Tehran. (RTÉ)
  - At least seven people are killed and 50 injured by a bomb blast in Dera Ismail
    Khan, Pakistan. (BBC)
  - Jodhaa Akbar wins the prize for best film at the Tenth International Indian Film
    Academy Awards held in Macau, China. (BBC)
  - Seven Germans, one Briton and a South Korean are captured by Shia rebels in Sa'dah,
    Yemen. (BBC) (RTÉ)
  - President of Belarus Alexander Lukashenko refuses to attend the Collective Security
    Treaty Organisation summit in Moscow after Russia's ban of Belarusian milk and
    dairy imports. (Reuters)
  - United Nations barges carrying aid and their Sudanese People's Liberation Army
    escort are attacked by tribesmen on the Sobat River, Sudan. (BBC)
  - Prime Minister of Israel Binyamin Netanyahu states he can visualise a Palestinian
    state, under certain conditions. (Full Transcript, Jerusalem Post)
