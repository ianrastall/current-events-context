Date: '2009-06-02'
Source_URI: Portal:Current events/2009 June 2
Intelligence_Payload:
  Uncategorized:
  - Brazilian Defense Minister Nelson Jobim confirms that debris discovered in the
    Atlantic Ocean, near Fernando de Noronha, is the wreckage of Air France Flight
    447. (CNN)
  - General Motors sells its Hummer brand to the Sichuan Tengzhong Heavy Industrial
    Machinery Company. (New York Times)
  - United Kingdom Home Secretary Jacqui Smith announces her resignation. (BBC)
  - The Community of the People wins Greenland's parliamentary election. (BBC)
  - Dutch research verifies space headache as a real medical condition. (BBC)
  - Oxfam International describes the humanitarian crisis in Somalia as "very dire".
    (BBC) (France 24)
  - China blocks access to such websites as Twitter, Flickr, and Hotmail, ahead of
    the anniversary of the massacre in Tiananmen Square on June 4, 1989. (CBC) (BBC)
  - The defense in Burmese National League for Democracy General Secretary Aung San
    Suu Kyi's trial alleges that intruder John William Yettaw "acted alone". (Bangkok
    Post)
  - The United Kingdom experiences its first critical case of A(H1N1) influenza. (BBC)
  - Pakistan's military rescues 80 people whom the Taliban kidnapped on June 1. (Reuters)
  - At least 61 people are discovered dead in a Harmony Gold mine in Free State, South
    Africa. (BBC)
