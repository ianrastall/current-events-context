Date: '2009-06-19'
Source_URI: Portal:Current events/2009 June 19
Intelligence_Payload:
  Uncategorized:
  - Iran
  - The Iranian Supreme Leader Grand Ayatollah Ali Khamenei warns against further
    election protests. (CNN)
  - Ali Khamenei announces Mahmoud Ahmadinejad won the Iranian presidential election
    by 24 million votes. (The New York Times)
  - As part of an ongoing row between FOTA and the FIA, eight teams declare that they
    will leave Formula One and set up a new championship for the 2010 season. (BBC)
  - Attacks on Romanians in Belfast
  - Two teenagers are arrested by police in connection with racist attacks on Romanians
    in south Belfast. (BBC)
  - Esther Rantzen defends Northern Ireland hatred addiction remarks. (BBC)
  - Swine flu is confirmed in Ethiopia and Slovenia. (The Irish Times)
  - Scotland Yard investigates the expenses of five Labour MPs in Britain. (Irish
    Independent)
  - Gambian opposition leader and journalist for the Foroyaa newspaper, Halifa Sallah,
    is arrested.(IOL)
  - The U.S. begins deploying missile interceptors and radar to defend Hawaii from
    a North Korean long-range rocket. (The New York Times) (AFP)
  - Ireland's Taoiseach Brian Cowen secures binding concessions in EU talks on the
    Lisbon Treaty. (BBC)
  - Allen Stanford, the chairman of Stanford Financial Group, is arrested after allegations
    of fraud. (BBC)
  - Protests take place at Burma's embassies worldwide on occasion of Aung San Suu
    Kyi's 64th birthday. (Al Jazeera) (BBC)
  - Air France is to offer compensation to the families of victims of the Flight 447
    disaster. (Reuters) (Sky News)
  - A bomb explodes near Bilbao in the Basque region of Spain, killing one policeman.
    (AP) (RTÉ)
  - Pakistan Defence Minister Ahmad Mukhtar says the military offensive in the Swat
    valley is nearing its end. (Sindh Today)
  - The Movement for the Emancipation of the Niger Delta claims to have blown up another
    oil pipeline in the Niger Delta region of southern Nigeria. (Xinhua)
  - Henry Allingham, 113, one of the UK's last two World War I veterans, becomes the
    world's oldest man following the death of Tomoji Tanabe. (BBC)
  - The head of the U.S. Securities and Exchange Commission, Mary Schapiro, said in
    an interview that it should not be necessary for the SEC and the Commodity Futures
    Trading Commission to align all their rules and regulation, although she does
    expect some harmonization. (Reuters)
  - U.S. District Court Judge Samuel B. Kent is impeached by the U.S. House of Representatives
    on charges of obstruction of justice. (CNN)
  - The U.S. Treasury Department confirmed that 10 big banks have met the necessary
    requirements to repay funds that they have received—a total of $58 billion—in
    the Troubled Asset Relief Program of October 2008. (WSJ)
