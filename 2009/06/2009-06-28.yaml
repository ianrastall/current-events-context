Date: '2009-06-28'
Source_URI: Portal:Current events/2009 June 28
Intelligence_Payload:
  Uncategorized:
  - The United Kingdom reports its second death from swine flu. (Reuters)
  - A presidential election takes place in Guinea-Bissau following the death of former
    President João Bernardo Vieira. (BBC)
  - Voters in Albania go to the polls in a parliamentary election. (The Age) (BBC)
  - Iranian authorities arrest eight employees at the British embassy in Tehran. (Al
    Jazeera) (Financial Times)
  - Voters in Argentina go to the polls for the legislative elections. (France 24)
  - Russia announces that they will shut down every legal casino in the state by Wednesday,
    July 1. (The New York Times)
  - An internet child pornography ring, involving at least 2,000 IP addresses in 78
    countries, is uncovered in Switzerland. (BBC)
  - Stephen Hawking holds a party for future time travelers at the University of Cambridge.
    (Huffington Post UK)
  2009 Honduran political crisis:
  - President Manuel Zelaya is removed from office by the army ahead of a disputed
    constitutional referendum and sent to Costa Rica. (BBC)
  - Congress appoints Roberto Micheletti as interim president. (Dow Jones via NASDAQ)
  - The Supreme Court of Justice claims that it ordered Zelaya's removal from office
    for repeatedly defying its rulings. (AP via Yahoo! News)
