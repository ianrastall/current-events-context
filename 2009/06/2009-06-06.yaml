Date: '2009-06-06'
Source_URI: Portal:Current events/2009 June 6
Intelligence_Payload:
  Uncategorized:
  - The European Union's parliamentary election continues in Cyprus, Italy, Latvia,
    Malta, Slovakia, the Czech Republic, and France's overseas departments and territories.
    (Europarl)
  - The ruling party Fianna Fáil endures significant losses in Ireland's local elections
    and parliamentary by-elections in Dublin Central and Dublin South. (AFP) (BBC)
    (The Times)
  - The Conservative Party gains seven county councils, the Liberal Democrats lose
    one, and the Labour Party loses four during the United Kingdom's local elections.
    (BBC)
  - Twenty-six people are killed during and 100 others remain missing after a landslide
    near Chongqing, China. (BBC)
  - Seventy-six people die at Harmony Gold's mine in Free State, South Africa. (BBC)
  - A fire at a day-care center kills at least 40 people in Hermosillo, Mexico. (BBC)
    (Fox) (RTÉ)
  - Fifty-two people die during combat between Peru's Army and indigenous peoples
    in the Amazon Rainforest. (Reuters)
  - At least 36 people die during combat between the Transitional Federal Government
    and Islamist militants in Webho, Somalia. (BBC)
  - Two male bodies and several luggage items are recovered from Air France Flight
    447 in the Atlantic Ocean. (BBC)
  - The Philippines' Army kill 30 Moro Islamic Liberation Front members and capture
    a "bomb factory" on Mindanao. (BBC)
  - Former West Berlin police officer Karl-Heinz Kurras is revealed to have spied
    for East Germany's Stasi. (BBC)
  - Harvard University discovers a molecular mechanism that regulates coagulation.
    (BBC)
  - The American Cemetery and Memorial honors World War II veterans who landed at
    Normandy, France, in 1944. (CNN)
  - The International Labour Organization requests that Burma's government amend a
    clause in its Constitution that may justify forced labor. (AFP)
  - Palm, Inc. launches its new Palm Pre smartphone. (Reuters)
