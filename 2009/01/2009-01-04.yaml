Date: '2009-01-04'
Source_URI: Portal:Current events/2009 January 4
Intelligence_Payload:
  Uncategorized:
  - A suicide bombing kills six people and injures 20 in Dera Ismail Khan, North-West
    Frontier Province, Pakistan. (CNN)
  - A suicide bombing outside a Shia shrine in northern Baghdad, Iraq, kills at least
    40 people and wounds at least 72. (The New York Times)
  - A series of earthquakes up to 7.6 in magnitude strike the Indonesian province
    of West Papua, killing at least four people and wounding at least 37. (BBC News)
  - New Mexico Governor Bill Richardson withdraws his nomination to be the next United
    States Secretary of Commerce because of an ongoing federal investigation into
    possible pay-to-play politics. (Reuters)
  - United States President-elect Barack Obama nominates Virginia Governor Tim Kaine
    to be the Democratic National Committee's next chairperson. (CNN)
