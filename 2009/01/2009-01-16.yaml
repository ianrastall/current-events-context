Date: '2009-01-16'
Source_URI: Portal:Current events/2009 January 16
Intelligence_Payload:
  Uncategorized:
  - Panama officially recognizes Kosovo. (Balkan Insight) (Panama Ministry For Foreign
    Affairs)
  - Computer worm Conficker infects more than eight million Microsoft Windows-based
    personal computers. (CNN)
  - Lithuanian police disperse angry protesters mobbing Parliament as an anti-government
    demonstration turns violent. (International Herald Tribune)
  - Trooper Mark Donaldson of the Australian Special Air Service Regiment is awarded
    the Victoria Cross for gallantry during the War in Afghanistan. (The Australian)
  - Palestinian medical sources report 1,010 people have died and 4,700 have been
    wounded during the conflict with Israel. (CNN)
  - The trial of two accused murderers of Meredith Kercher begins in Perugia, Italy.
    (Sky News)
  - Somali pirates release the Danish cargo ship CEC Future after receiving a ransom
    payment. (AP via Google News)
