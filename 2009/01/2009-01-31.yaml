Date: '2009-01-31'
Source_URI: Portal:Current events/2009 January 31
Intelligence_Payload:
  Uncategorized:
  - Former Cuban President Fidel Castro criticizes United States President Barack
    Obama for supporting "Israeli genocide" against the Palestinian people. (Al Jazeera)
  - An armed mob desecrates a Sephardic synagogue in Caracas, Venezuela. (BBC)
  - Seven people are killed and 18 are missing after a nursing home burns in Russia's
    Komi Republic. (CNN)
  - At least 111 people are killed and 200 injured in Molo, Kenya, after an oil spill
    ignites. (The Irish Times)
  - Thousands of Russians protest in response to the government's handling of the
    current economic crisis. (BBC)
  - Serena Williams of the United States defeats Dinara Safina of Russia to win the
    2009 Australian Open women's singles. (BBC)
  - More than 5,000 Royal Police are deployed to Bangkok, Thailand, as supporters
    of deposed Prime Minister Thaksin Shinawatra protest. (AFP via Google News)
  - A heat wave affects southeastern Australia, killing 20 people as temperatures
    reach above in Adelaide and Melbourne. (Bloomberg) (BBC)
  - Movement for Democratic Change President Morgan Tsvangirai agrees to become Zimbabwe's
    Prime Minister on February 11 in a deal with President Robert Mugabe. (The Guardian)
  - Sharif Ahmed is elected President of Somalia. (AFP via Google News)
  - Iraq's provincial elections begin. (Sky News Australia)
  - Antananarivo Mayor Andry Rajoelina declares himself "in charge" of Madagascar.
    (BBC)
