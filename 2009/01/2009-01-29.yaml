Date: '2009-01-29'
Source_URI: Portal:Current events/2009 January 29
Intelligence_Payload:
  Uncategorized:
  - The Illinois Senate votes unanimously to remove Governor Rod Blagojevich from
    office and bar him from future state employment. Lieutenant Governor Pat Quinn
    is sworn in to finish Blagojevich's term. (Chicago Tribune)
  - Afghanistan's presidential election is delayed due to the country's security situation.
    (Times Online)
  - Zimbabwe allows the use of foreign currencies alongside its dollar. (BBC)
  - Spanish Judge Fernando Andreu investigates a possible Israeli crime against humanity
    during the 2002 assassination of Salah Shehade. (Jerusalem Post)
  - An Israeli Defense Forces air raid injures nine people in the Gaza Strip in response
    to continued militant rocket fire. (Al Jazeera)
  - German unemployment rises to 3.27 million (7.8 percent) as the global financial
    crisis worsens. (Bloomberg)
  - French workers strike to force a better response from President Nicolas Sarkozy
    to the global financial crisis. (Reuters)
  - Somali pirates hijack the German oil tanker MV Longchamp in the Gulf of Aden.
    (Sky News)
  - Violent anti-government protests in Antananarivo, Madagascar, are temporarily
    halted. (France 24)
