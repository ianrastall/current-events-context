Date: '2009-01-09'
Source_URI: Portal:Current events/2009 January 9
Intelligence_Payload:
  Uncategorized:
  - Rob Gauntlett, the youngest Briton to have climbed Mount Everest died whilst climbing
    in the French Alps
  - Israel and Hamas ignore the United Nations Security Council's call for a ceasefire
    in the conflict in the Gaza Strip. (UNNewsCentre)
  - Microsoft Corporation releases the beta version of its Windows 7 operating system.
    (BusinessWeek)
