Date: '2009-01-19'
Source_URI: Portal:Current events/2009 January 19
Intelligence_Payload:
  Uncategorized:
  - The Palestinian National Authority's Central Bureau of Statistics reports that
    1,300 Palestinians were killed; 5,400 were injured; and US$1.9 billion in damage
    was caused during the 22-day conflict with Israel in the Gaza Strip. (CNN)
  - Australian author Harry Nicolaides is jailed for three years in Thailand for insulting
    the ruling Chakri Dynasty. (BBC)
  - Palestinians unearth 23 bodies from the rubble in Zeitoun after the declaration
    of a ceasefire in their conflict with Israel. (CNN)
  - The 2009 Australian Open tennis competition begins in Melbourne. (ABC)
  - Barbados issues its first offshore hydrocarbon-exploration licenses to BHP Billiton.
    (Caribbean News Net)
  Russian financial crisis of 2008–2009:
  - Russia devalues the ruble for the sixth time in 2009 and will overhaul the state
    budget to reflect the sharp decrease in the price of petroleum, its key export.
    (Reuters)
  Global financial crisis of 2008–2009:
  - European Central Bank President Jean-Claude Trichet says that global economic
    growth in 2009 will be "substantially below" December 2008 forecasts. (Bloomberg)
  - Her Majesty's Government confirms a £300-billion bailout package for the United
    Kingdom's banking industry. (Sky News)
  - Banking shares in the United Kingdom plummet as the Royal Bank of Scotland posts
    the biggest loss in British history. (Telegraph)
