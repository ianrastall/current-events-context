Date: '2009-01-05'
Source_URI: Portal:Current events/2009 January 5
Intelligence_Payload:
  Uncategorized:
  - United States President-elect Barack Obama nominates Leon Panetta to be the Central
    Intelligence Agency's next Director. (CNN)
  - A fourth bomb targeting EnCana Corporation gas pipelines is detonated outside
    Tomslake, British Columbia, Canada, making it the first bombing since the three
    original blasts in October 2008. (CBC)
  - Minnesota's State Canvassing Board certifies Democratic candidate Al Franken as
    the winner of the senatorial election recount. Republican Senator Norm Coleman,
    whose term officially expired January 3, intends to file a lawsuit challenging
    the decision. (Bloomberg)
