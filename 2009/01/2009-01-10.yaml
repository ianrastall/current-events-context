Date: '2009-01-10'
Source_URI: Portal:Current events/2009 January 10
Intelligence_Payload:
  Uncategorized:
  - A boat carrying eight Somali pirates from the freed supertanker MV Sirius Star
    capsizes in the Gulf of Aden, causing the deaths of five and the loss of their
    portion of US$3 million in ransom. (Telegraph)
  - Thirty-three people die and seventeen are injured when their coach plunges into
    a canyon in Cajamarca, Peru. (Radio Netherlands)
  - Iraq's Interior Ministry arrests Ayesh Ali Hussein al-Harbi for his alleged role
    in the 2000 hijacking of a Saudi Arabian Airlines Boeing 777 and serial killings
    in the country. (AFP)
