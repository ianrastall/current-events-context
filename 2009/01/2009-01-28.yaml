Date: '2009-01-28'
Source_URI: Portal:Current events/2009 January 28
Intelligence_Payload:
  Uncategorized:
  - The United States House of Representatives passes the American Recovery and Reinvestment
    Act of 2009. (The New York Times)
  - Winter storms across the Midwestern United States have killed 19 people and cut
    electricity to 600,000 homes and businesses from Oklahoma to West Virginia. (Reuters
    via News Daily)(ABC News)
  - A former New South Wales Police Force superintendent claims there was an attempted
    assassination of Queen Elizabeth II at Bowenfels railway station during a 1970
    Royal Tour of Australia. (AFP via Google News)
  - Israel bombards smuggling tunnels along the Gaza Strip-Egypt border in response
    to continued militant rocket fire. (Sky News)
  - The U.S. National Transportation Safety Board prepares its final report on the
    2007 collision between two news helicopters in Phoenix, Arizona. (AZCentral.com)(AP
    via Google News)
  - Boeing announces it will cut 10,000 jobs. (BBC)
  - Lithuanian flag carrier FlyLAL declares bankruptcy. (Baltic Times)
  Sri Lankan Civil War:
  - The Army kills at least 300 and wounds at least 300 Tamil people in Mullaitivu
    District. (AOL)
  - At least 250,000 civilians are trapped in the crossfire between the Armed Forces
    and the Tamil Tigers. (CNN)
