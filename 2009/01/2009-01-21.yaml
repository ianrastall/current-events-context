Date: '2009-01-21'
Source_URI: Portal:Current events/2009 January 21
Intelligence_Payload:
  Uncategorized:
  - The United States Senate confirms Hillary Clinton as Secretary of State. (New
    York Times)
  - Toyota surpasses General Motors to become the world's largest automaker. (Reuters)
  - BHP Billiton announces it will cut 6,000 jobs worldwide, including 3,300 in Australia.
    (ABC News Australia)
  - United States President Barack Obama halts the trials of detainees at Guantánamo
    Bay Naval Base's detention camp. (Reuters)
  - Despite a ceasefire in its conflict with Israel, Hamas fires eight mortar shells
    into the country. (Haaretz)
  - The United Kingdom reports that 1.92 million Britons were unemployed in December
    2008. (Sky News)
  - China Central Television omits sensitive portions of U.S. President Obama's inaugural
    address. (MSNBC)
  - President of Ireland Mary McAleese signs a bill confirming the nationalisation
    of Anglo Irish Bank. (RTÉ)
  - The missing engine from US Airways Flight 1549 is found at the bottom of the Hudson
    River. (CNN)
