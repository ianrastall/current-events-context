Date: '2009-01-06'
Source_URI: Portal:Current events/2009 January 6
Intelligence_Payload:
  Uncategorized:
  - United States President-elect Barack Obama offers CNN medical correspondent and
    neurosurgeon Sanjay Gupta the position of Surgeon General. (Washington Post)
  - Russia's Gazprom alleges that Ukraine has blocked three key gas pipelines to Europe,
    making natural gas delivery there impossible. (Reuters)
  - Israeli artillery strikes near a United Nations school in Gaza City, killing at
    least 40 people. (CNN)
  - Kathmandu University students protest against the Nepali government's decision
    to replace Indian head priests at Pashupatinath Temple with Nepalis. (CNN-IBN)
  - The Indian Army continues to battle Lashkar-e-Taiba and Jaish-e-Mohammed militants
    in Jammu and Kashmir's Poonch District. (CNN-IBN)
