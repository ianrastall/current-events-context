Date: '2009-01-30'
Source_URI: Portal:Current events/2009 January 30
Intelligence_Payload:
  Uncategorized:
  - The regional Court in Kurgan Oblast, Russia convicts the three prisoners, all
    born in 1990, of aggravated murder for strangling their cellmate, who had asked
    them to end his life in this fashion.(Interfax)
  - Six people are killed when a Piper PA-34 Seneca crashes near Huntington, West
    Virginia, United States. (AP via Fox News)
  - The U.S. State Department will not renew security contractor Blackwater Worldwide's
    license when it expires in May 2009. (CNN)
  - Michael S. Steele becomes the U.S. Republican National Committee's first African-American
    chairman. (CNN)
  - Somalia's Transitional Federal Government collapses after Al-Shabaab captures
    Baidoa. (NPR)
  - United Nations Secretary-General Ban Ki-moon announces an investigation into Israel's
    attack on the U.N.'s Gaza Strip headquarters. (Al Jazeera)
  - A heat wave affects southeastern Australia, with both Adelaide and Melbourne experiencing
    temperatures above . (Australian BOM)
  - More than one thousand workers strike at four different United Kingdom oil refineries.
    (Sky News)
  - Thirteen people are killed and 47 people are missing after a Nakumatt supermarket
    burns in Nairobi, Kenya. (CNN)
  - Norway announces it will raise the German submarine U-864 from the North Sea.
    (Norway Post)
