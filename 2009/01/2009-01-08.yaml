Date: '2009-01-08'
Source_URI: Portal:Current events/2009 January 8
Intelligence_Payload:
  Uncategorized:
  - The United States Congress certifies the results of the 2008 presidential election,
    confirming Barack Obama as President-elect. (Fox News)
  - Pakistan confirms that Ajmal Amir, the last surviving participant in the 2008
    terrorist attacks on Mumbai, India, is a Pakistani citizen, but dismisses National
    Security Advisor Mahmud Ali Durrani for making the admission. (CNN-IBN)
  - The Bank of England cuts interest rates to 1.5 percent, its lowest level in its
    315-year history. (BBC)
  - Russia and Ukraine agree to resend natural gas through pipelines to Europe. (AP)
  - Lasantha Wickrematunge is assassinated in Sri Lanka (Guardian)
  - The Sri Lankan Army recaptures the village of Pallai from the Tamil Tigers in
    an effort to reach the Jaffna Peninsula. (CNN)
  - North Korea announces it will hold its delayed parliamentary election on March
    8. (CNN)
  2008–2009 Israel–Gaza conflict:
  - Several rockets fired from Lebanon strike the Israeli city of Nahariya. Hezbollah
    denies responsibility for the attack. (Sky News)
  - The United Nations suspends humanitarian aid operations in Gaza after receiving
    fire from the Israel Defense Forces. (BBC)
  - The UN Security Council votes, with the United States abstaining, to adopt Resolution
    1860, which calls for a ceasefire in the conflict. However, Israel and Hamas continue
    their actions. (UNNewsCentre) (Sky News)
