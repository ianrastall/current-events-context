Date: '2009-01-13'
Source_URI: Portal:Current events/2009 January 13
Intelligence_Payload:
  Uncategorized:
  - Despite an agreement to resume delivery of natural gas from Russia to Europe,
    the European Union says that "very limited" amounts were transmitted. (BBC News)
  - Israeli Defense Forces advance on Gaza City and engage in urban warfare with Hamas
    militants. (BBC News)
  - The United States Senate Foreign Relations Committee begins confirmation hearings
    for Hillary Clinton's nomination as Secretary of State. (CNN)
  - Yahoo! names Autodesk chairwoman Carol Bartz as its CEO. (BBC News)
  - Citigroup announces a merger deal with Morgan Stanley. (Reuters)
  Late 2000s recession:
  - German Chancellor Angela Merkel announces a €50-billion economic stimulus package.
    (BBC News)
  - The United States' trade deficit shrank by 28.7 percent in November 2008 to its
    lowest level in five years. (BBC News)
  - Anti-government protesters clash with Latvian riot police in Riga. (BBC)
