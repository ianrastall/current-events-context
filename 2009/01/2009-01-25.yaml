Date: '2009-01-25'
Source_URI: Portal:Current events/2009 January 25
Intelligence_Payload:
  Uncategorized:
  - Sudan bombs the town of Muhajeria, Darfur, killing a child. (MSNBC)
  - Björgvin G. Sigurðsson, Iceland's Minister of Business Affairs, resigns as a result
    of the country's financial crisis. (CNN)
  - The Sri Lankan Army captures Mullaitivu, the Tamil Tigers' final stronghold in
    the ongoing Civil War. (BBC News)
  - Mamadou Dia, the first Prime Minister of Senegal, dies at age 98. (AFP)
  - A road accident kills 15 members of the Nigerian Football Federation's FC Jimeta.
    (BBC News)
  - An avalanche kills 11 people on Mount Zigana, Gümüşhane Province in north-eastern
    Turkey. (CNN)
