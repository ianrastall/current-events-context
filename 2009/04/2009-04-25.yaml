Date: '2009-04-25'
Source_URI: Portal:Current events/2009 April 25
Intelligence_Payload:
  Uncategorized:
  - Mexico's government declares a state of emergency to combat the outbreak of swine
    influenza. (Reuters)
  - Ethiopia arrests 35 people in connection with Berhanu Nega's plan to overthrow
    the government. (BBC via ABC News Australia)
  - The African National Congress loses its supermajority in South Africa's National
    Assembly. (BBC)
  - North Korea begins to reprocess fuel rods at its Yongbyon Nuclear Scientific Research
    Center. (BBC)
  - Iceland's legislative election occurs. (The Guardian) (The New York Times)
  - Somali pirates hijack Germany's MV Patriot and release a Greek ship. (Reuters)
    (AP)
  - University of Georgia Professor George Zinkhan allegedly kills three people in
    Athens, Georgia, United States. (AJC) (The Times)
