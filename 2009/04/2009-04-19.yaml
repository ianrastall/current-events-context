Date: '2009-04-19'
Source_URI: Portal:Current events/2009 April 19
Intelligence_Payload:
  Uncategorized:
  - Eight corrections officers are killed in an ambush during a prisoner transfer
    in Nayarit, Mexico. (AP via Google)
  - United States President Barack Obama announces that Central Intelligence Agency
    personnel who employed enhanced interrogation techniques on terrorism suspects
    will not be prosecuted. (BBC)
  - The Fifth Summit of the Americas ends in Port-of-Spain, Trinidad and Tobago. (Canadian
    Press)
  - The Movement for the Emancipation of the Niger Delta releases British hostage
    Robin Barry Hughes. (CNN)
