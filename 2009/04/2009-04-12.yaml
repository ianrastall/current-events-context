Date: '2009-04-12'
Source_URI: Portal:Current events/2009 April 12
Intelligence_Payload:
  Thai political crisis:
  - Prime Minister Abhisit Vejjajiva declares a state of emergency in Bangkok and
    its surrounding areas. (RadioFree Europe)
  - Former Prime Minister Thaksin Shinawatra urges the National United Front of Democracy
    Against Dictatorship to revolt. (CNN)
  Uncategorized:
  - Sri Lanka's Armed Forces temporarily suspend their offensive against the Tamil
    Tigers to allow civilians to find refuge. (Al Jazeera)
  - Pope Benedict XVI says that only reconciliation can resolve the conflict between
    Israel and the Palestinian people. (MSNBC)
  - Ángel Cabrera wins the PGA Tour's 2009 Masters Tournament in Augusta, Georgia,
    United States. (Yahoo)
  - Captain Richard Phillips of the MV Maersk Alabama, who was abducted by Somali
    pirates, is rescued. (CNN)
