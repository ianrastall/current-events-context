Date: '2009-04-07'
Source_URI: Portal:Current events/2009 April 7
Intelligence_Payload:
  Uncategorized:
  - Irish Finance Minister Brian Lenihan announces an emergency budget. (RTÉ) (Irish
    Times)
  - The Israel Police kill a Palestinian terrorist in East Jerusalem as he rams them
    with his tractor. (Al Jazeera)
  - United States District Judge Emmet G. Sullivan overturns the conviction of former
    Alaska Senator Ted Stevens. (CNN)
  - Former Peruvian President Alberto Fujimori is convicted of violating human rights
    and imprisoned until 2034. (Washington Post)
  - Malaysia holds by-elections in Bukit Selambau, Bukit Gantang, and Batang Ai. (BBC)
  - Demonstrators in Chişinău protest the Communist Party's absolute majority in Moldova's
    parliamentary election. (BBC)
  - Two people are killed and two injured during a shooting in Landshut, Bavaria,
    Germany. (BBC)
  - Twenty-four people are killed as a Fokker F27 airliner crashes in Bandung, West
    Java, Indonesia. (Sky News)
  - French police raid the Basque Homeland and Freedom's "bomb factory" in Grenoble,
    Isère. (BBC)
  - Australia's government announces a A$43-billion investment for the National Broadband
    Network. (BBC)
  - The General Assembly legalizes same-sex marriage in Vermont, United States. (Burlington
    Free Press)
