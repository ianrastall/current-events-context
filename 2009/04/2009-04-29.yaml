Date: '2009-04-29'
Source_URI: Portal:Current events/2009 April 29
Intelligence_Payload:
  Uncategorized:
  - The United States economy contracts by 6.1% in the first fiscal quarter of 2009.
    (AP via New York Times)
  - India's government locks down Srinagar, Kashmir, to prevent anti-election protests.
    (AFP via Google News)
  - Australia announces the deployment of 450 additional soldiers to the Afghanistan
    War. (AAP via News Limited)
  - The Truth and Reconciliation Commission of the Solomon Islands is officially opened.
    (BBC)
  - President of the United States Barack Obama delivers his 3rd primetime news conference
    on his 100th day in office
  - A Chennai Suburban train was hijacked by an unidentified man, killing 4 people
    near Vyasarpadi Jeeva Railway Station
  Swine influenza outbreak:
  - The United States suffers its first death. (USA Today)
  - Mexico reports 159 deaths and 2,500 suspected cases. (Sky News)
  - The World Health Organization raises its Pandemic Alert Level to five. (BBC)
  Pakistan:
  - The Armed Forces kill more than 50 Taliban militants while capturing Daggar, Buner
    Valley. (Reuters)
  - At least 23 people are killed as riots erupt in North Karachi. (Daily Times)
