Date: '2009-04-15'
Source_URI: Portal:Current events/2009 April 15
Intelligence_Payload:
  Uncategorized:
  - China launches a second satellite as part of its Compass global navigation system.
    (Xinhua)
  - Swiss investment bank UBS AG will cut 8,700 jobs. (Sky News)
  - The Pitcairn Islands abolish alcohol prohibition. (RNZI)
