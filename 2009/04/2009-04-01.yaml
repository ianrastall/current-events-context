Date: '2009-04-01'
Source_URI: Portal:Current events/2009 April 1
Intelligence_Payload:
  Uncategorized:
  - The 72-year-old American soap opera Guiding Light will broadcast its final episode
    on September 18. (Reuters)
  - The United States and Russia begin Strategic Arms Limitation Talks. (The Australian)
  - Local government in England undergoes structural changes. (BBC)
  - A Computer virus called Conficker was spread through millions of computers, getting
    onto their computers and destroying files, and sharing information. This was supposed
    to be an April Fools' Day Joke.
  - Ukraine will hold a presidential election on October 25. (AFP via Google News)
  - At least eight people are killed when a Eurocopter AS332 ditches into the North
    Sea. (AFP via Google News)
  - Five thousand people protest in London as the G-20 begins its summit. (BBC)
  - Israeli Foreign Affairs Minister Avigdor Lieberman says that the Annapolis Conference
    "has no validity." (BBC)
  - New South Wales, Australia, declares its flooded Mid North Coast a disaster area.
    (ABC News Australia)
  - Albania and Croatia join the North Atlantic Treaty Organization. (AFP via Google
    News)
  - The United States' World War II motor ship is located near Australia. (The Age)
  - Sweden's Parliament legalizes same-sex marriage. (AFP via Google News)
  - A bomb damages a statue of Vladimir Lenin near Finlyandsky Rail Terminal in Saint
    Petersburg, Russia. (Moscow Times)
