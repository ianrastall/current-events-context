Date: '2009-04-09'
Source_URI: Portal:Current events/2009 April 9
Intelligence_Payload:
  Uncategorized:
  - Shia Islamists under cleric Muqtada al-Sadr protest in Baghdad, Iraq, on the anniversary
    of its capture by the United States Armed Forces in 2003. (Reuters via ABC News
    Australia)
  - Algeria's presidential election takes place. (VoA) (BBC)
  - Indonesia's legislative election takes place. (New York Times)
  - Riots occur after Baloch National Movement President Ghulam Mohammed Baloch is
    discovered dead near Turbat, Pakistan. (BBC)
  - Kim Jong-il appears publicly for the first time since August 2008 for reelection
    as North Korea's Great Leader. (Irish Times) (BBC)
  - Harry Potter author J. K. Rowling resigns as patron of Scotland's Multiple Sclerosis
    Society. (BBC)
  - Forty-six foreign nationals depart Belfast, Northern Ireland, after riots during
    2010 FIFA World Cup qualifying matches. (BBC)
  - Demonstrators assemble in Tbilisi, Georgia, to demand the resignation of President
    Mikheil Saakashvili. (Sky News)
  - The U.S. Central Intelligence Agency allegedly decommissions its black sites worldwide.
    (BBC)
  - Bishop Harold Miller of the Church of Ireland advises a boycott of television
    on Good Friday. (BBC)
