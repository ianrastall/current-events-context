Date: '2009-04-23'
Source_URI: Portal:Current events/2009 April 23
Intelligence_Payload:
  Uncategorized:
  - General Motors will temporarily close 13 factories in the United States and Mexico.
    (AP via Miami Herald)
  - The Taliban's Students' Movement captures Buner District in Pakistan. (WSJ)
  - Judge Tomas Norström of The Pirate Bay's trial is revealed to be a member of the
    same copyright protection organizations as several entertainment industry representatives.
    (TT via The Local)
  - India's general election begins its second of five phases. (BBC)
  - The International Monetary Fund forecasts that the world economy will not recover
    until 2010. (CNN)
  - Prime Minister of Lesotho Pakalitha Mosisili survives an apparent assassination
    attempt. (BBC)
  - Two suicide attacks near Baqubah and in Baghdad, Iraq, kill at least 87 people.
    (CNN)
  - Iraq's government calculates that more than 110,000 Iraqis have died since the
    Iraq War began in 2003. (AP)
