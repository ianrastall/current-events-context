Date: '2009-04-18'
Source_URI: Portal:Current events/2009 April 18
Intelligence_Payload:
  Uncategorized:
  - France's National Police arrest ETA military leader Jurdan Martitegi in Montauriol.
    (Reuters via ABC News Australia)
  - Canada's HMCS Winnipeg and the United States' USS Halyburton thwart Somali pirates'
    attack on a Norwegian oil tanker. (MSN)
  - Iranian-American journalist Roxana Saberi is charged with espionage and imprisoned
    in Iran until 2017. (BBC)
  - An explosion at a warehouse kills at least 18 people in Hunan Province, China.
    (BBC)
  - The Abu Sayyaf Group releases Swiss Red Cross worker Andreas Notter from captivity
    in the Philippines. (Reuters)
  - The Netherlands' Korps Commandotroepen rescue 20 Yemeni hostages from Somali pirates
    in the Gulf of Aden. (BBC)
