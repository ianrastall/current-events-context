Date: '2009-04-02'
Source_URI: Portal:Current events/2009 April 2
Intelligence_Payload:
  Uncategorized:
  - Canadian aircraft manufacturer Bombardier Aerospace will cut 3,000 jobs. (AP via
    Washington Post)
  - United States Federal Judge John D. Bates rules that enemy combatants incarcerated
    at the U.S. Air Base in Bagram, Afghanistan, have rights to legal trials. (BBC)
  - The Group of 20 announces a US$1-trillion agreement to combat the current financial
    crisis. (BBC)
  - Reinsurer Swiss Re will cut 1,000 jobs. (Sky News)
  - Lewis Hamilton of Vodafone McLaren Mercedes is disqualified from the 2009 Australian
    Grand Prix for 'deliberately misleading' the International Automobile Federation.
    (BBC) (Bloomberg)
  - 'The U.S. Federal Bureau of Investigation is probing an Internet leak of the upcoming
    film X-Men Origins: Wolverine. (BBC)'
  - Mexico's Federal Investigations Agency arrests alleged drug trafficker Vicente
    Carrillo Leyva in Mexico City. (BBC)
  - The South African National Congress condemns the Most Reverend Desmond Tutu's
    criticism of the party. (BBC)
  - Bangladesh's government outlaws begging in order to eliminate it by 2014. (BBC)
