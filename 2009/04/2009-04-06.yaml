Date: '2009-04-06'
Source_URI: Portal:Current events/2009 April 6
Intelligence_Payload:
  Uncategorized:
  - Convicted murderer Annika Östberg is transferred to Sweden from California's Institution
    for Women. (The Local)
  - Six car bombs kill at least 34 people and injure 139 others in Baghdad, Iraq.
    (AFP via News Limited)
  - A "significant explosive event" occurs at the Mount Redoubt volcano in Alaska.
    (KTUU)
  - At least 207 people are killed and 1,500 injured during a 6.3-magnitude earthquake
    near L'Aquila, Italy. (CNN)
  - Afghanistan's government will review a recently approved version of sharia law
    that legalizes spousal rape. (CNN)
  - Gjorge Ivanov of VMRO–DPMNE wins Macedonia's presidential election. (BBC)
  - Somali pirates hijack five ships from the United Kingdom, Taiwan, Germany, France,
    and Yemen. (CNN) (BBC)
  - Indonesia's National Police shoot nine demonstrators at a pre-election protest
    in Nabire, West Papua. (ABC)
