Date: '2009-04-30'
Source_URI: Portal:Current events/2009 April 30
Intelligence_Payload:
  Swine influenza outbreak:
  - President Felipe Calderón partially closes Mexico's economy for five days. (The
    Irish Times)
  - The World Health Organization changes the strain's name to influenza A (H1N1).
    (The Irish Times)
  Uncategorized:
  - Chrysler declares bankruptcy under Chapter 11 of the United States Code. (CNN-IBN)
  - Seven people are killed and 17 injured at a Queen's Day parade in Apeldoorn, Netherlands.
    (BBC)
  - The third round of India's general election takes place. (Reuters via Telegraph)
  - The United Kingdom ends combat operations in the Iraq War. (BBC)
  - Eight National Army soldiers are killed during combat with the Revolutionary Armed
    Forces in Colombia. (BBC)
  - Twelve people are killed at the State Oil Academy in Baku, Azerbaijan. (BBC)
  - Helios Airways and four executives are charged with 119 counts of manslaughter
    over the crash of Flight 522 in 2005. (AP)
  - The Italian cargo ship Jolley Smeraldo evades an attempted hijacking by Somali
    pirates. (UPI)
  - The Los Angeles Police Department identifies the suspected serial killer John
    Floyd Thomas, Jr. (LA Times)
  - Souleymane Ndéné Ndiaye replaces Cheikh Hadjibou Soumaré as Prime Minister of
    Senegal. (Radio Netherlands)
