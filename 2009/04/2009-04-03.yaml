Date: '2009-04-03'
Source_URI: Portal:Current events/2009 April 3
Intelligence_Payload:
  Uncategorized:
  - The United States economy lost 663,000 jobs in March, raising the unemployment
    rate to 8.5%. (New York Times)
  - Former Malaysian Deputy Prime Minister Najib Tun Razak is inaugurated as Prime
    Minister. (CNN)
  - French police arrest 300 protesters as a NATO summit begins in Strasbourg. (Sky
    News)
  - Four soldiers die as Thailand's Army and Cambodia's Army exchange gunfire near
    the Preah Vihear Temple. (CNN)
  - The U.S. state of Iowa's Supreme Court legalizes same-sex marriage. (KCCI)
  - Approximately 40 people riot in Clondalkin, near West Dublin, Ireland. (Evening
    Herald)
  - Fourteen people die and 26 are injured during a shooting at the American Civic
    Association in Binghamton, New York. (CNN)
  - Scottish footballers Barry Ferguson and Allan McGregor receive lifetime bans from
    the Scottish Football Association and are transfer-listed by Rangers Football
    Club. (BBC) (The Guardian)
