Date: '2009-04-04'
Source_URI: Portal:Current events/2009 April 4
Intelligence_Payload:
  Uncategorized:
  - The Llaima volcano in Chile begins emitting lava and ash, prompting evacuations
    and landslide warnings. (Sky News Australia)
  - Three police officers are killed in Pittsburgh, Pennsylvania, United States. (CNN)
  - The Organisation for Economic Co-operation and Development blacklists Costa Rica,
    Malaysia and the Philippines as non-cooperative tax havens. (BBC)
  - A U.S. drone aircraft's missile kills 13 people in North Waziristan, Pakistan.
    (ABC News Australia)
  - Danish Prime Minister Anders Fogh Rasmussen will become NATO's Secretary General
    on August 1. (Reuters)
  - Six Frontier Corpsmen are killed during a suicide attack in Islamabad, Pakistan.
    (GEO TV)
  - Mon Mome wins the 2009 Grand National in Aintree, England. (BBC)
  - The Balochistan Liberation United Front releases United Nations official John
    Solecki from captivity in Quetta, Pakistan. (BBC)
