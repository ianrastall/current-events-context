Date: '2009-04-21'
Source_URI: Portal:Current events/2009 April 21
Intelligence_Payload:
  Uncategorized:
  - Yahoo! will cut between 600 and 700 jobs. (AP via Forbes)
  - Twelve navies from the Americas begin annual UNITAS Gold exercises near Florida,
    United States. (Miami Herald)
  - The World Digital Library launches at UNESCO's headquarters in Paris, France.
    (AFP via Google News)
  - The Wall Street Journal reports that cyber-spies have hacked the U.S. Joint Strike
    Fighter Program. (Reuters)
  - The United Kingdom's Retail Prices Index records negative inflation for the first
    time since 1960. (BBC)
  - Twenty-four people are killed during combat between the Mungiki criminal organization
    and citizens of Karatina in Kenya. (BBC)
  - The smallest confirmed extrasolar planet, Gliese 581 e, is discovered. (MSNBC)
