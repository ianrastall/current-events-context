Date: '2009-10-19'
Source_URI: Portal:Current events/2009 October 19
Intelligence_Payload:
  Uncategorized:
  - Charles Wesley Mumbere is crowned king of the Bakonjo people in the Rwenzururu
    district of Uganda. (NPR) (AP via Google)
  - United Nations–backed electoral fraud investigators throw out a third of President
    Hamid Karzai's votes leading to a runoff in the presidential election. (AP via
    Google)
  - Slovak Prime Minister Robert Fico says that he will also demand an opt-out in
    the Treaty of Lisbon if the Czech Republic is granted one. (Der Spiegel)
  - Abraham Lauhenaspessy ("Captain Bram"), a suspected kingpin people smuggler, is
    detained in Indonesia. (The Sydney Morning Herald) (The Australian)
  - The Opposition in the Australian Parliament demands details on the salary of high-profile
    Kerry O'Brien, presenter of The 7.30 Report for the Australian Broadcasting Corporation.
    (The Sydney Morning Herald)
  - 32 Extra Solar planets are discovered and announced, this making the record of
    most exoplanets discovered in one day and in one month. (CNN)
