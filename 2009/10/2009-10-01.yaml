Date: '2009-10-01'
Source_URI: Portal:Current events/2009 October 1
Intelligence_Payload:
  Uncategorized:
  - Around 150 Venezuelan students end a weeklong hunger strike protesting against
    alleged human rights abuses in Venezuela, after Organization of American States
    officials agree to meet the students and one of their leaders is released. (El
    Universal) (Reuters)
  - Ateke Tom, militant leader of the Niger Delta Vigilante in the Niger Delta region,
    accepts an amnesty by the Nigerian government. (Vanguard) (BBC) (AFP)
  - The International Monetary Fund says the global economy is "recovering faster
    than expected", raising its forecast for global growth to 3.1% for 2010, up from
    2.5%. (IMF Survey online)
  - A second earthquake measuring 6.8 on the Richter scale occurs near Sumatra, Indonesia,
    following a 7.6 magnitude earthquake the previous day. (Reuters) (The Australian)
  - The Justices of the Supreme Court of the United Kingdom are sworn into office,
    replacing the Law Lords as the final court of appeal in the country. (BBC) (The
    Times)
  - Mass celebrations take place in Beijing to commemorate the 60th anniversary of
    the founding of the People's Republic of China. (Xinhua) (BBC)
  - Iran agrees to allow inspections of a recently revealed nuclear facility near
    the city of Qom. (The New York Times)
  - The Romanian coalition government collapses with the withdrawal of the Social
    Democratic Party, in protest at the sacking of one of its members. (Adevarul)
    (AFP) (Al Jazeera)
  - The opposition in Guinea reject a call by the ruling junta to create a unity government.
    (Reuters) (Al Jazeera)
  - 12 people are killed in fighting between rival Islamist groups for control of
    the port city of Kismayo in southern Somalia. (Associated Press) (The Nation)
  - Paleontologists announced the discovery of an Ardipithecus ramidus fossil skeleton,
    deeming it the oldest fossil skeleton of a human ancestor. (New York Times)
  - The Dow Jones loses over 200 points by the closing bell. (CNN)
  - Pakistan is to launch a greater campaign in South Waziristan against the Taliban.
    (New York Times)
  - The Netherlands Antilles agrees to disband on October 10, 2010. Bonaire, St. Eustatius
    and Saba will become Dutch municipalities within the Netherlands, whereas Curaçao
    and Sint Maarten will become self-governing countries within the Kingdom of the
    Netherlands. (NRC Handelsblad)
  Treaty of Lisbon:
  - Ahead of the second Irish referendum on the Treaty of Lisbon, the Vatican issues
    a warning to Irish voters that the European Union threatens Ireland's "identity,
    traditions and history". (The Daily Telegraph)
  - Ireland's Taoiseach Brian Cowen rules out a third referendum on the Treaty of
    Lisbon if the second referendum due on 2 October is again rejected by the Irish
    people. (Irish Independent)
  - The death toll from the previous earthquake rises to at least 1100. (BBC) (Bloomberg)
