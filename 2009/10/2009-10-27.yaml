Date: '2009-10-27'
Source_URI: Portal:Current events/2009 October 27
Intelligence_Payload:
  Uncategorized:
  - A report by the Australian government warns that global warming climate change
    threatens the coastal lifestyle of the country, with a prospect of a ban on coastal
    homes. (The Guardian) (The Daily Telegraph)
  - Grassroots occupations of Austrian universities spread to several more in Vienna,
    Graz and Linz, demanding free education for everyone. (Boston Herald) (CNN iReport)
    (Austrian Times)
  - Qatar inaugurates one of the world's largest LNG trains, operated by RasGas. (Al
    Bawaba) (The Peninsula) (Gulf Times)
  - Pope Benedict XVI appoints Cardinal Peter Turkson of Cape Coast, Ghana, to serve
    as the new head of the Pontifical Council for Justice and Peace. (Pakistan Christian
    TV)
  - NASA announces a delay in the launch of the Ares I-X test rocket, developed to
    replace the Space Shuttle, due to poor weather conditions. (New Scientist) (BBC)
  - The Church of Scientology in France is convicted of organised fraud. (France 24)
    (The Times) (Al Jazeera)
  - China confirms it has executed 2 Tibetans over unrest last year. (Angola Press)
    (The Guardian) (The Hindu)
  - The son of ex-French President François Mitterrand, Jean-Christophe Mitterrand
    and an ex-government minister, Charles Pasqua, are convicted for their roles in
    illegal arms sales to Angola. (Associated Press) (Reuters)
  - A nephew of Honduran interim leader Robert Micheletti and a high ranking army
    officer are found murdered. (Times of India) (BBC) (Press TV)
  - A British couple are missing after their yacht is hijacked by Somali pirates off
    the Seychelles. (Bloomberg) (AFP) (Xinhua)
  - North Korea says a South Korean man has defected to the North across the Korean
    Demilitarized Zone. (Yonhap) (Associated Press) (Xinhua)
  - Burundi and Uganda tighten security after threats by the militant Somali Al-Shabaab,
    a group with links to Al-Qaeda, to attack their capitals. (Reuters India) (VOA)
  - The autonomous Aceh province in Indonesia is to ban women from wearing tight trousers
    under a new law, while a law authorising the stoning to death of adulterers and
    the whipping of homosexuals will be reviewed. (Jakarta Globe) (Straits Times)
    (Reuters South Africa)
  - Authorities in Venezuela arrest a number of people accused of being secret service
    agents from neighbouring Colombia, on charges of espionage. (El Universal) (Colombia
    Reports) (BBC)
  - Prime Minister of Thailand Abhisit Vejjajiva backs autonomy for the restive southern
    provinces to bring an end to violence in the region. (The Nation) (Straits Times)
