Date: '2009-10-11'
Source_URI: Portal:Current events/2009 October 11
Intelligence_Payload:
  Uncategorized:
  - Luis Armando Pena Soltren, a suspect wanted for the 1968 hijacking of Pan Am Flight
    281, is captured after more than 40 years. (The Associated Press) (CNN)
  - Thousands of people attend the state funeral of Arturo "Zambo" Cavero in Lima,
    Peru. President Alan García posthumously awards him the Order of the Sun. (BBC)
  - Mayoral, regional and district council elections take place in Moscow and 75 other
    regions across Russia. (RIA Novosti) (The Guardian) (BBC)
  - Thousands of people march in protest for gay rights in Washington, D.C.. (BBC)
  - An Irish priest, Michael Sinnot, is seized from a convent and taken away in a
    motorboat by gunmen in Pagadian City, Mindanao in the southern Philippines. (BBC)
    (RTÉ) (Miami Herald)
  - At least 10 people die and seven are declared missing in a river ferry sinking
    on the Mekong in Kratié Province, Cambodia. (The News International) (Al Jazeera)
  - 'Pope Benedict XVI canonizes five new saints: Father Damien, Rafael Arnáiz Barón,
    Zygmunt Szczęsny Feliński, Francisco Coll Guitart, and Jeanne Jugan. (Reuters)
    (Times of India)'
  - A spate of car bombings kills 19 people and wounds dozens in the western Iraqi
    city of Ramadi, in Anbar province. (MSNBC)
  - Pakistani commandos storm an office building and rescue 39 people taken hostage
    by suspected Taliban militants after an attack on the army's headquarters in the
    city of Rawalpindi. (Reuters)
  - The Irish National Liberation Army (INLA) announces an end to violence in Northern
    Ireland. (Xinhua) (The Guardian) (ABC News)
