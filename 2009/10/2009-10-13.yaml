Date: '2009-10-13'
Source_URI: Portal:Current events/2009 October 13
Intelligence_Payload:
  Uncategorized:
  - The planned 200 million US$ rebuilding and expansion of Stockholm's central library,
    built by architect Gunnar Asplund, is cancelled. (SR)
  - Members of the Norwegian Nobel Peace Prize jury speak out in defense of selecting
    U.S. President Barack Obama for the award. (AP via Google News)
  - Czech President Václav Klaus tells his supporters he will never sign the Treaty
    of Lisbon. (The Times)
  - Séamus Kirk is elected the 16th Ceann Comhairle of Ireland following the resignation
    of John O'Donoghue. (RTÉ)
  - An autopsy on the body of Boyzone singer Stephen Gately finds he died of natural
    causes. (The Irish Times) (CNN) (CBC) (The Times of India) (Sofia Echo)
  - New Zealand police say an autopsy on two-year-old Aisling Symes reveals she drowned.
    She had initially been thought abducted but lay in a drain for one week as police
    searched. (news.com.au) (RTÉ) (The Daily Telegraph)
  - A previously unrecognized painting, La Bella Principessa, is attributed to Leonardo
    da Vinci on fingerprint evidence. (BBC)
  - The Philippines deploys soldiers and gunboats to surround the strongholds of suspected
    militants and pressure them to release an abducted Irish priest. (CBC)
  - The Romanian government loses a motion of no confidence, the first government
    to fall in 20 years since the fall of communism in the country. (HotNews) (AFP)
  - A Russian court rejects a libel suit by Yevgeny Dzhugashvili, the grandson of
    Joseph Stalin, who claimed the Novaya Gazeta newspaper lied about Stalin personally
    signing death warrants. (RIA Novosti) (The Daily Telegraph)
  - Spanish authorities arrest five members of the banned Basque political group Batasuna.
    (BBC) (Press TV)
  - North and South Korea agree to hold talks on flood control and family reunions,
    after North Korea fired several short range missiles earlier this week. (Joongang
    Daily) (Yonhap) (BBC)
  - Angola and the Democratic Republic of the Congo agree to stop deporting each other's
    citizens in a dispute between the two countries. (The New York Times) (BBC)
  - More than 260 Sri Lankan asylum seekers threaten to blow up their boat if Indonesian
    authorities force them to disembark. (The Australian)
  - South African police use tear gas to disperse protesters demonstrating against
    poor living conditions in several towns. (Al Jazeera) (Associated Press)
  - The United States Senate Finance Committee approves a bill for major healthcare
    reform. (BBC News)
  - An investigation begins into the deaths of two Irish Army Air Corps pilots in
    a plane crash in County Galway on Monday. (BBC) (RTÉ) (RIA Novosti) (Sky News)
