Date: '2009-10-25'
Source_URI: Portal:Current events/2009 October 25
Intelligence_Payload:
  Uncategorized:
  - The New York Yankees beat the Los Angeles Angels 5-2 in Game 6 of the 2009 American
    League Championship Series to advance to the World Series. (New York Times)
  - Israeli police and Palestinians clash at Temple Mount, Jerusalem's holiest site,
    resulting in 12 arrests. (BBC) (Straits Times) (Associated Press)
  - Bomb blasts kill 155 people and injure at least 500 in central Baghdad, the country's
    deadliest attack for two years. (BBC) (Reuters India) (The Sydney Morning Herald)
  - India tells China that the Dalai Lama is an "honoured guest" and will not be barred
    from visiting Arunachal Pradesh despite protests from China. (Associated Press)
    (Times of India) (Straits Times)
  - Nigeria's main militant group, the Movement for the Emancipation of the Niger
    Delta, declares an indefinite ceasefire. (NEXT) (African Press Agency) (Xinhua)
  - Maksharip Aushev, human rights activist and opposition leader of Ingushetia, is
    shot dead while driving his car near Nartan in Kabardino-Balkaria. A female passenger
    is also attacked. (Xinhua) (Radio Netherlands Worldwide) (RIA Novosti)
  - Tunisians vote in a general election. (Al Jazeera)
  - Uruguayans vote in a general election. (Press TV) (Associated Press)
  - Easter Islanders vote to restrict the number of immigrants in a referendum. (Radio
    Netherlands Worldwide) (BBC)
  - The oil refinery fire continues to burn out of control in Cataño, Puerto Rico,
    two days after the initial explosion. (Washington Post)
  - Buildings across the Netherlands—St. Martin's Cathedral, Utrecht, Rotterdam's
    Euromast and Groningen's Martinitoren—dim their lights as clocks go back in Europe.
    (Radio Netherlands Worldwide)
  - Inspectors from the United Nations' nuclear watchdog, the International Atomic
    Energy Agency (IAEA), arrive in Iran to inspect a newly disclosed nuclear facility
    near the city of Qom. (CNN)
  - It is revealed that composer Andrew Lloyd Webber has been diagnosed with prostate
    cancer. (The Guardian)
