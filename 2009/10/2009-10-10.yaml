Date: '2009-10-10'
Source_URI: Portal:Current events/2009 October 10
Intelligence_Payload:
  Uncategorized:
  - Ten to fifteen security personnel are taken hostage by militants after an attack
    on Pakistan's military headquarters in Islamabad. (BBC) (The Daily Telegraph)
    (Xinhua)
  - Armenia and Turkey normalise their relationship when their foreign ministers sign
    an accord in Zurich, Switzerland. (BBC) (The Sofia Echo) (Al Jazeera)
  - President of Poland Lech Kaczyński signs the Treaty of Lisbon, leaving the Czech
    Republic as the last national opponent. (BBC News) (RTÉ) (Deusche Welle)
  - At least 70 people are killed after a fuel tanker explodes in Nigeria. (AFP) (Xinhua)
  - 186 people are killed by landslides in the Philippines. (CNN)
  - Ireland's Green Party votes by 84% to endorse a new Programme for Government with
    government partners Fianna Fáil.(Reuters) (RTÉ) (The Irish Times)
  - Over 300 British MPs will be asked to repay or explain expenses after controversy
    earlier this year. (The Daily Telegraph)
  - Three people are sentenced to death for being involved in forbidden groups after
    being arrested during protests against Iran's disputed presidential election earlier
    this year. (Al Jazeera)
  - Unions in Guinea call for a two day strike in protest at the deaths of opposition
    supporters at a rally last month. (Bloomberg) (BBC)
  - United States President Barack Obama announces he will end the "Don't ask, don't
    tell" policy against homosexuals serving in the U.S. military. (Associated Press)
    (BBC)
  - More than 40 people are arrested after clashes between anti-Islamic and anti-racist
    demonstrations in Manchester, England. (The Times) (BBC) (Times of India)
  - The Argentine Senate passes a controversial media bill regarding the ownership
    of media outlets in the country. (Buenos Aires Herald) (AFP) (CNN)
  - Thousands of protesters gather in St Petersburg, Russia, against a plan to build
    a 77 storey building for Gazprom. (The Guardian) (AFP)
