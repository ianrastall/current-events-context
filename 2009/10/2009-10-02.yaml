Date: '2009-10-02'
Source_URI: Portal:Current events/2009 October 2
Intelligence_Payload:
  Uncategorized:
  - Voters in Ireland go to the polls for a second referendum on the Treaty of Lisbon.
    (The Irish Times) (BBC) (The Guardian) (The Times) (The Vancouver Sun)
  - Croatia resumes membership talks with the European Union after Slovenia lifts
    its 10-month embargo. (BBC)
  - Rainstorms in Messina and other parts of Sicily sweep at least 18 people away
    to their deaths, wounding 40, causing 20 to disappear and surrounding the city
    with mud and rainwater. A state of emergency is declared by the Italian government.
    (ANSA) (RTÉ) (Al Jazeera) (Xinhua)
  - Israel agrees with Hamas to swap twenty female Palestinian prisoners for a videotape
    proving Israeli soldier Gilad Shalit is still alive. (Haaretz) (The New York Times)
  - The International Olympic Committee awards the 2016 Summer Olympics and the 2016
    Summer Paralympics to Rio de Janeiro (Brazil). The other bidding cities were Chicago
    (United States), Tokyo (Japan) and Madrid (Spain). (Reuters)
  - A Burmese court rejects Aung San Suu Kyi's appeal against her extended detention.
    (Bangkok Post) (Xinhua)
  - Kenya says it will cooperate with the International Criminal Court over post-election
    unrest in 2007. (AFP) (Capital FM)
  - Protesters storm and ransack the office of the Sri Lankan High Commission in New
    Delhi, India, in protest at the alleged firing on Indian fisherman by the Sri
    Lanka Navy. (Times of India) (The Hindu)
  - Pakistan's army probes a video posted on social networking website Facebook that
    appears to show soldiers abusing Taliban. (BBC) (The Hindu) (The Washington Post)
  - Mexican authorities claim to have made their largest-ever seizure of chemicals
    used in the manufacture of the synthetic drug methamphetamine. (BBC)
  - Typhoon Parma
  - Thousands of people are evacuated as Typhoon Parma approaches the Philippines.
    (CNN) (Associated Press)
  - President Gloria Macapagal-Arroyo declares the entire country in a "state of calamity".
    (Philippine Inquirer) (The Chosun Ilbo)
  - Thousands of people gather at a mosque in Guinea's capital, Conakry, to identify
    those killed in Monday's opposition rally against military rule. (BBC)
  - A bid to force publication of an internal BBC review of its Middle East coverage,
    EastEnders and Top Gear is rejected in the British High Court of Justice. (The
    Times) (BBC)
