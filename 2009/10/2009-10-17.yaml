Date: '2009-10-17'
Source_URI: Portal:Current events/2009 October 17
Intelligence_Payload:
  Uncategorized:
  - Czech President Václav Klaus compares the Treaty of Lisbon to "an unstoppable
    speeding train" that he is being forced to sign. (BBC)
  - A report into dumping of toxic waste by Trafigura in Côte d'Ivoire is published.
    (BBC)
  - Two police officers are killed after their police helicopter is shot down by drug
    gangs in Rio de Janeiro, Brazil. Ten drug traffickers were also killed in the
    violence. (Associated Press) (Brazzil Mag) (Al Jazeera)
  - The sheriff in Fort Collins, Colorado advises that criminal charges will be laid
    over the balloon boy hoax. (AP via Minneapolis Star-Tribune) (Sky News)
  - The Economic Community of West African States (ECOWAS) imposes an arms embargo
    on Guinea after the deaths of opposition supporters at a rally last month. (African
    Press Agency) (Reuters)
  - A South Korean legislator claims North Korea is holding 154,000 of its citizens
    in gulags. (Yonhap) (AFP) (BBC)
  - A Colombian military official claims that eight FARC guerrillas and five Colombian
    army soldiers have been killed in heavy fighting in Cauca Department. (AFP via
    Google News)
  - Iran frees Newsweek reporter Maziar Bahari on bail after four months in detention
    following the disputed presidential election. (Press TV) (IOL) (Associated Press)
  - More than one million anti-abortion protesters march through Madrid in one of
    the largest demonstrations since 2003 and 2004 anti-war protests. (The Australian)
    (Reuters India)
  - Thousands of fans, celebrities and politicians attend the funeral of Boyzone singer
    Stephen Gately in Dublin. (RTÉ) (The Guardian) (The Times) (ABC News)
  - 30,000 troops from the Pakistan Army begin an offensive operation against the
    Taliban and their allies in South Waziristan. (BBC)
  - The government of the Maldives, including President Mohamed Nasheed, holds the
    world's first underwater Cabinet meeting, to highlight the threat of global warming.
    (Miadhu News) (BBC)
  - 32 people are killed in a fire at a fireworks warehouse in southern India, during
    the Diwali celebrations. (Hindustan Times) (CNN)
