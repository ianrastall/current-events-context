Date: '2009-10-23'
Source_URI: Portal:Current events/2009 October 23
Intelligence_Payload:
  Uncategorized:
  - At the end of their three-week synod in the Vatican, more than 200 African Roman
    Catholic bishops issue a 12-page document urging what they call corrupt political
    leaders on the continent to repent their sins or resign and criticising multinational
    companies who exploit and destroy the earth. (BBC) (Reuters) (CBC)
  - Bernard Fellay, Superior General of the Society of St. Pius X, says that the Vatican
    is considering the possibility of converting the Lefebvrist group into a personal
    prelature. (Pakistan Christian TV)
  - A universal mobile phone charger that works with any handset is approved by the
    International Telecommunication Union. (BBC)
  - Jean Todt defeats Ari Vatanen in an election to become the new head of the Fédération
    Internationale de l'Automobile, replacing former head Max Mosley, who held the
    position for 16 years. (BBC)
  - The UK GDP contracts by 0.4% between July and September, meaning that the United
    Kingdom has been contracting for 6 successive quarters for the first time since
    records were kept in 1955. (BBC) (RTÉ)
  - The Swiss Government says that the United States has formally requested the extradition
    of film director Roman Polanski for having unlawful sex with an underage girl
    in 1977. (AP via Washington Post)(Yahoo)
  - A huge explosion rips through an upmarket area of Peshawar in Pakistan. (AFP via
    Google News) (Yahoo News)
  - A huge explosion occurs at an oil refinery in Cataño, Puerto Rico. (Reuters)
  - Vitit Muntarbhorn, United Nations Special Rapporteur for North Korea, says the
    country should improve its "abysmal" rights record, adding it should provide food
    to over 8 million citizens. (Al Jazeera) (Taiwan News) (BBC)
  - The Association of Southeast Asian Nations (ASEAN) launches its first human rights
    body, the ASEAN Intergovernmental Commission on Human Rights (AICHR). (Thai News
    Agency) (Associated Press)
  - A white Kenyan, Thomas Cholmondeley, is released after five months of an eight
    month prison sentence for manslaughter. (Daily Nation) (BBC)
