Date: '2009-10-14'
Source_URI: Portal:Current events/2009 October 14
Intelligence_Payload:
  Uncategorized:
  - Negotiators in Honduras reach a deal to restore President Manuel Zelaya to office
    to end the political crisis in the country. (CBC) (AFP) (Xinhua)
  - Opposition politicians walk out of the Russian lower house of parliament, the
    State Duma, alleging vote rigging at the weekend's elections which saw the United
    Russia party winning nearly every poll. (BBC) (The Malaysia Star) (RIA Novosti)
  - The United Nations warns that malnutrition is getting worse. (BBC)
  - Armenian President Serzh Sargsyan visits Turkey to attend a qualifying match between
    the nations for the FIFA World Cup. Turkish fans boo the Armenian anthem. (BBC)
  - The Dow Jones closes above 10,000 points for the first time in more than a year.
    (The New York Times)
  - Korean founder and leader of the worldwide Unification Church, Sun Myung Moon,
    holds a mass wedding ceremony for some 1,000 couples near Seoul. (Reuters)
  - Tim Berners-Lee issues an apology for the unnecessary "//" in URLs he designed
    for the World Wide Web. (BBC) (The Daily Telegraph)
  - A Zimbabwean court orders a senior MDC official, Roy Bennett, back to jail on
    terrorism charges. (Al Jazeera) (South Africa Times)
  - Iraq's Human Rights Ministry announces at least 85,000 Iraqis have been killed
    by bombs, murders and fighting between 2004 and 2008. (Associated Press) (Al Jazeera)
  Philippines:
  - Irish bishops and politicians request the release of 79-year-old Michael Sinnott,
    saying he needs urgent medical attention. (ABS-CBN)
  - The kidnappers are identified as notorious pirates, not the Moro Islamic Liberation
    Front as had been initially thought. (BBC) (Xinhua)
  - The Philippines asks the country's largest Muslim separatist group to help find
    and free the kidnapped Irish priest. (Reuters) (BBC) (The Belfast Telegraph)
