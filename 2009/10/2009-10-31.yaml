Date: '2009-10-31'
Source_URI: Portal:Current events/2009 October 31
Intelligence_Payload:
  Uncategorized:
  - Niger's opposition leader Mahamadou Issoufou returns to the country to face charges
    of money laundering. (IOL) (AFP)
  - More than 50 people are arrested in the Russian capital Moscow after holding an
    "unsanctioned" human rights rally. (RIA Novosti) (Reuters) (Press TV)
  - A video of the kidnapped Irish priest Father Michael Sinnott is released by his
    captors in the Philippines. The kidnappers want a $2 million (€1.36 million) ransom.
    It is the first evidence that Sinnott is still alive since his abduction on 11
    October. (RTÉ)
