Date: '2009-10-29'
Source_URI: Portal:Current events/2009 October 29
Intelligence_Payload:
  Uncategorized:
  - The Haitian Senate votes to remove Prime Minister Michèle Pierre-Louis. (AP via
    Google News)
  - The de facto regime in Honduras files suit with the International Court of Justice
    over Brazil's continued harbouring of exiled president Manuel Zelaya in its Tegucigalpa
    embassy. (Guardian)
  - English Premier League footballer Marlon King is convicted of sexual assault,
    imprisoned and sacked by his club Wigan Athletic F.C. (BBC) (The Times)
  - India's Prime Minister Manmohan Singh announces a "new chapter" in the Jammu and
    Kashmir peace process, and withdraws some troops from the region. (AFP) (New York
    Times)
  - The United States unofficially exits recession in the third quarter, growing at
    3.5%. (Associated Press) (The Guardian) (Al Jazeera)
  - Kenya is to carry out its first census on its gay population to combat HIV/AIDS,
    even though homosexuality is banned in the country. (BBC)
  - Danish Prime Minister Lars Loekke Rasmussen says a deal at a UN climate change
    summit in December is unlikely. (Haveeru) (BBC) (RTT News)
  - 12 are killed by an IOC depot fire in Jaipur, Army is called. (The Times Of India)
  - A Thai cargo ship is hijacked in the Gulf of Aden off the coast of Somalia. (Xinhua)
    (IOL) (RIA Novosti)
  - South Korea arrests a college lecturer accused of spying for North Korea, saying
    he was recruited by North Korean agents in India. (Bangkok Post) (The Canadian
    Press)
  - Iranian President Mahmoud Ahmadinejad says the government is ready for a deal
    on its nuclear program. (Press TV) (Times of India) (Jewish Telegraphic Agency)
  - The African Union imposes a travel ban on the leader of Guinea's military junta,
    Moussa Dadis Camara, and 41 of his colleagues and freezes their bank accounts.
    (BBC) (Reuters)
  - Rwandan man Désiré Munyaneza is given a life sentence in Canada for his role in
    the Rwandan genocide under the Crimes Against Humanity and War Crimes Act. (BBC)
    (CTV)
  - A gunman opens fire at the Adat Yeshurun Valley Sephardic synagogue in North Hollywood,
    Los Angeles, United States, and wounds two people. (San Francisco Chronicle)
  - Singer-Songwriter Elton John cancels his 30 October final date of The Red Piano
    Tour scheduled for The O2, Dublin, due to declining health. (Irish Independent)
    (Evening Herald) (BBC)
  - 'Rockstar''s Grand Theft Auto IV: The Ballad of Gay Tony was released.'
