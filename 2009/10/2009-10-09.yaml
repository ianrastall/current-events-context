Date: '2009-10-09'
Source_URI: Portal:Current events/2009 October 9
Intelligence_Payload:
  Uncategorized:
  - A United Nations plane from Uruguay attached to MINUSTAH monitoring the Haiti–Dominican
    Republic border crashes near Fonds-Verrettes, killing at least 11 people from
    Jordan and Uruguay. (BBC) (Xinhua) (Associated Press)
  - General Motors finalizes a deal to sell Hummer to China's Sichuan Tengzhong Heavy
    Industrial Machinery Company. (The Wall Street Journal)
  - In an attempt to determine the extent of lunar ice, NASA crashes two unmanned
    spacecraft into the Moon's south pole. (Toronto Star)
  - Aung San Suu Kyi is permitted to meet international diplomats to discuss international
    sanctions against Burma. (The Times) (Bangkok Post) (Irish Examiner) (CNN)
  - U.S. president Barack Obama wins the Nobel Peace Prize “for his extraordinary
    efforts to strengthen international diplomacy and cooperation between peoples.”
    (The New York Times) (Nobel Foundation)
  - More than 181 people are killed in floods in the Philippines. (IOL) (Times of
    India)
  - Six Vietnamese pro-democracy activists are sentenced to up to six years in prison
    for "spreading propaganda" against the government. (BBC) (UPI) (Reuters India)
  - French police arrest a researcher at the European Organization for Nuclear Research
    (CERN) for suspected links to Al-Qaeda. (BBC) (Taiwan News)
  - Wallace Souza, the former Brazilian state legislator and host of Canal Livre who
    faces accusations of drug trafficking and murder, surrenders to police after being
    a fugitive for four days. (CNN)
  - India plans a new offensive against Maoist Naxalite rebels active in parts of
    the country. (AFP) (Outlook India)
  - A suspected suicide car-bomber kills 49 people in the Pakistani city of Peshawar
    in an attack that the government said underscored the need for an all-out offensive
    against the Pakistani Taliban. (Reuters)
  - Two people die after being overcome by sweat and about 19 others are hospitalised
    at a spiritual retreat in Arizona, USA. (BBC)
  - Public amputations on three men accused of robbery occur in Somalia. (TVNZ)
  Treaty of Lisbon:
  - A statement on Polish President Lech Kaczyński's website says a signing ceremony
    of the treaty will take place on Saturday at 1000 GMT. (EuActive)
  - Czech President Václav Klaus, the last remaining leader against the Lisbon Treaty,
    says the country must negotiate an opt-out from parts of the Charter of Fundamental
    Rights of the European Union before it proceeds with the ratification process.
    (Bloomberg) (RTÉ)
  - Only the Czech government could make such a request, but Czech Prime minister
    Jan Fischer says that President Klaus had not given the cabinet any information
    about his latest demands.(BBC News)
