Date: '2009-10-28'
Source_URI: Portal:Current events/2009 October 28
Intelligence_Payload:
  Uncategorized:
  - Canadian folk singer Taylor Mitchell is mauled to death by coyotes at the age
    of 19. (CBC) (The Star)
  - Voters in Mozambique go to the polls for the general election. (AFP via Google
    News) (IOL)
  - A blast in Meena Bazar, Peshawar, Pakistan, kills at least 95 people while 110
    are injured. (Geo TV) (The Times)
  - 12 people – including six United Nations staff – are killed after Taliban militants
    assault an international guesthouse in the Afghan capital Kabul. (Associated Press)
    (New York Times)
  - One of Germany's last Nazi war crimes trials begins, with Heinrich Boere charged
    with the killings of three civilians in the Netherlands. (The Local) (BBC) (Deutsche
    Welle)
  - Ares I-X, the first test article for NASA's Ares I rocket, launches successfully
    from Launch Complex 39B at Kennedy Space Center in Florida on a sub-orbital test
    flight. (CNN)
  - The Lebanese army says it has found and deactivated four 107-mm rockets in the
    garden of a partly built house a day after a rocket fired from Houla hit the northern
    Israeli border town of Kiryat Shmona. This is the fifth time rocket attacks have
    been used to try to break the cease-fire. (Reuters)
  - Chinese police rescue over 2,000 children in a six month campaign against human
    trafficking. (BBC) (The Daily Telegraph)
  - Ireland and the United Kingdom agree to ensure drivers disqualified from driving
    are disqualified in all their countries. (RTÉ)
  - The United Nations Torture Investigator, Manfred Nowak, is prevented last minute
    from entering Zimbabwe. (Al Jazeera) (Associated Press) (The Herald)
  - Hamas orders Palestinians in the Gaza Strip not to vote in a January election
    called by West Bank leader Mahmoud Abbas. (BBC) (Al Jazeera) (Press TV)
  - Mongolia's parliament approves the resignation of Prime Minister Sanjaagiin Bayar,
    who stepped down due to ill health. He was replaced by the Foreign Minister Sükhbaataryn
    Batbold. (AFP) (Xinhua)
  - The main opposition Democratic Party wins three out of five seats in by-elections
    in South Korea. (The Seoul Times) (Bangkok Post)
  - The Matthew Shepard Act, providing legal protection against hate crimes to lesbian,
    gay, bisexual, and transgendered people, is signed into law in the United States
    by President Barack Obama. (Associated Press)
  - Federal agents attached to the FBI fatally shoot the leader of a Sunni Muslim
    group wanted on firearm charges in Detroit, USA. (New York Times) (Al Jazeera)
  - In an appearance before the House of Lords Communications Select Committee, BBC
    Director-General Mark Thompson denies that the appearance of British National
    Party leader Nick Griffin on Question Time was a bid for ratings. (The Daily Telegraph)
