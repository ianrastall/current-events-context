Date: '2009-10-30'
Source_URI: Portal:Current events/2009 October 30
Intelligence_Payload:
  Uncategorized:
  - European Union leaders agree a climate aid deal to help developing countries adapt
    to global warming. (CNN) (Xinhua)
  - Typhoon Mirinae makes landfall in the Philippines. (Al Jazeera) (Philippine Inquirier)
  - Internet Corporation for Assigned Names and Numbers (ICANN) approves plans to
    allow non-Latin web addresses for the first time. (BBC) (CNET News)
  - NASA reveals that a partial parachute failure resulted in damage to the Ares I-X
    test booster upon splashdown in the Atlantic Ocean following its test flight on
    Wednesday. (Spaceflight Now)
  - A U.S. judge orders a trial for two doctors and a lawyer accused of providing
    American sex symbol Anna Nicole Smith with drugs. (AP via Minneapolis Star-Tribune)
  - African Union leaders agree to establish a hybrid court to end the Darfur conflict
    in western Sudan. (BBC) (Le Mali en ligne) (Sudan Tribune)
  - Native tribesmen in the Amazon Rainforest discover a downed Brazilian military
    transport plane, finding nine survivors. (news.com.au) (Taiwan News)
  - Former French President Jacques Chirac is ordered to stand trial on corruption
    charges. (France 24) (Deutsche Welle)
  - Honduras' de facto leader Roberto Micheletti and ousted President Manuel Zelaya
    agree a deal to end the political crisis, reinstating Zelaya as President. (Times
    of India) (The Guardian) (Honduras This Week)
  - South Korea's spy agency, the National Intelligence Service, names North Korea's
    telecommunications ministry as responsible for a wave of cyber attacks in July.
    (Yonhap) (Mainichi Shimbun)
  - A large fire at an oil depot on the outskirts of Jaipur, Rajasthan, India, leaves
    six people dead and around 135 injured. (Press Trust of India) (Associated Press)
  - Taiwan's President Ma Ying-jeou calls on China to remove missiles targeting the
    island. (Radio Taiwan International) (Straits Times)
  - Burmese authorities arrest 50 people – including journalists, students and political
    activists, in a security crackdown, according to a Thailand based human rights
    group. (Reuters)
