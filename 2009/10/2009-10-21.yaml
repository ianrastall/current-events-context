Date: '2009-10-21'
Source_URI: Portal:Current events/2009 October 21
Intelligence_Payload:
  Uncategorized:
  - The Philadelphia Phillies win the 2009 National League Championship Series 4 games
    to 1 after defeating the Los Angeles Dodgers 10–4. (New York Times)
  - A report on the discovery of a new species of dinosaur, Fruitadens haagarorum,
    measuring around 70cm long, is published in the Proceedings of the Royal Society.
    (RSPB), (BBC) (The Daily Telegraph)
  - After 10 hours, a man armed with a rifle and wearing military camouflage holding
    8 people hostage in downtown Edmonton, Canada during the 2009 Workers Compensation
    Board of Alberta Hostage crisis surrenders peacefully to the Edmonton Police Service
    (Global Edmonton) (CTV Edmonton)
  - Kyrgyz President Kurmanbek Bakiyev appoints former mayor of Bishkek, Daniar Usenov,
    as the new Prime Minister following the resignation of his predecessor, Igor Chudinov.
    (BBC) (Reuters)
  - President of the Marshall Islands Litokwa Tomeing is ousted in the country's first
    successful vote of no confidence. Ruben Zackhras is appointed acting president
    until a new election on October 23, 2009. (AFP) (Yokwe)
  - Hundreds of protestors gather in Lima, Peru, as a bill proposing the legalisation
    of some form of abortion is approved. (BBC)
  - The United States is to send a rare mission to Burma for talks with the military
    government. (AFP) (Reuters)
  - Several people are arrested over a bomb attack in southeastern Iran that killed
    42 people, including members of the Revolutionary Guards. (Associated Press)
  - Azza Transport Flight 2241 crashes on take-off from Sharjah International Airport,
    in the United Arab Emirates, killing all six crew. (Gulfnews) (Arabian Business)
    (Aviation Safety Network)
  - Armed men take six people captive at a Lidl supermarket in Sevran, France. (BBC)
    (Euronews) (Ghana Broadcasting Corporation) (Channel News Asia) (Jakarta Globe)
  - At least thirteen people die in India's Rajasthan state after the Goa Express
    crashes into the stationary Mewar Express. (CNN)
  - A goods train derails east of Poti, Georgia, in an incident described as "sabotage".
    (BBC) (The Times of India) (Khaleej Times) (RIA Novosti)
  - The International Atomic Energy Agency propose draft agreement for Iran and three
    world powers to agree, aimed at reducing international concerns over Tehran's
    nuclear programme. (BBC)
  - Poland's Prime Minister Donald Tusk agrees to station SM-3 missile interceptors
    from United States President Barack Obama's reformulated missile defense system
    on the territory of this NATO ally. (The New York Times)
  - The crypt of Daniel O'Connell at Glasnevin Cemetery in Dublin is refurbished and
    opened to tourists . (RTÉ)
  - A Japanese convict who served seventeen years in prison for the murder of a four-year-old
    girl pleads not guilty during a retrial. (BBC)
  - Russian President Dmitry Medvedev announces plans to curb the number of state
    companies by privatising some. (RIA Novosti) (Financial Times)
  - Former President of South Africa Nelson Mandela denies writing a foreword praising
    Republic of the Congo President Denis Sassou Nguesso's biography, Straight Speaking
    for Africa. (IOL) (The Guardian)
