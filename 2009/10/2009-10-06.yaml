Date: '2009-10-06'
Source_URI: Portal:Current events/2009 October 6
Intelligence_Payload:
  Uncategorized:
  - An "industry-wide phishing scheme" targets sites such as Google, Hotmail, Yahoo!
    and AOL, with passwords posted online and more than a quarter of a million accounts
    at risk. (BBC) (The Wall Street Journal) (The Guardian)
  - Madagascar's political rivals agree on cabinet posts in a unity government; the
    President is Andry Rajoelina, the Vice-President is Emmanuel Rakotovahiny, and
    the Prime Minister is Eugene Mangalaza. (BBC) (Reuters)
  - Ireland's Ceann Comhairle John O'Donoghue announces his resignation following
    a scandal over his expenses claims. (RTÉ) (The Irish Times)
  - One of the most wanted suspects involved in the 1994 Rwandan Genocide, Idelphonse
    Nizeyimana, is arrested in the Ugandan capital Kampala. (BBC) (Press TV)
  - Charles K. Kao, Willard S. Boyle and George E. Smith win the 2009 Nobel Prize
    in Physics for the achievements concerning the transmission of light in fibers
    for optical communication and for the invention of an imaging semiconductor circuit
    – the CCD sensor. (The Guardian)
  - Typhoon Parma makes landfall at Luzon, the Philippines. (ABS-CBN)
  - The death toll from floods in the southern Indian states of Andhra Pradesh and
    Karnataka rises to 269, with a further 1.5 million people homeless. (Press Trust
    of India) (Outlook India) (AFP)
  - Zimbabwean President Robert Mugabe calls for improved relations with "hostile"
    countries at the opening of Parliament. (Xinhua) (Associated Press) (ZimOnline)
  - Hilary Mantel's Wolf Hall wins the 2009 Man Booker Prize. (BBC) (The Guardian)
  - Somalia's State Minister for Defence Sheikh Yusuf Mohammad Siad is detained by
    security forces in Uganda. Siad's detention was originally reported as a kidnapping.
    (France 24)
