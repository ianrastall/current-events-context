Date: '2009-09-22'
Source_URI: Portal:Current events/2009 September 22
Intelligence_Payload:
  Uncategorized:
  - American Mesac Damas is extradited from Haiti to stand trial for the murders of
    his six family members in Florida, United States.NBC-2
  - A mid-air collision destroys Iran's only AWACS equipped aircraft, an Ilyushin
    Il-76MD. (Debka), (Defensenews)
  - A gang of racist youths are sent to jail for a string of attacks on foreigners
    in Moscow, Russia, in 2008. (BBC)
  - U.S. President Barack Obama calls for the resumption of the Middle East peace
    process in meetings with the Prime Minister of Israel Benjamin Netanyahu and the
    President of the Palestinian Authority Mahmoud Abbas. (Voice of America)
  - Honduran soldiers break up protests outside the Brazilian embassy in Tegucigalpa
    in support of deposed President Manuel Zelaya, who is staying inside. (BBC) (MercoPress)
  - Several people are killed after a bus comes off a road and slides down an embankment
    into a river east of Düsseldorf, Germany. (BBC) (Taiwan News) (RIA Novosti)
  - Casualties and 25 deaths are feared in a gun battle between Maoist rebels and
    supporters of the ruling Communist Party in the Indian state of West Bengal. (BBC)
    (Press Trust of India)
  - New figures reveal that for the first time since 1995 more people emigrated from
    Ireland than immigrated there, with a growth of more than 40% from January–April
    2009. Most of the emigrants are Eastern European or Irish nationals. (RTÉ)
  - French riot police detain 278 migrants in Calais in an operation to dismantle
    the "jungle" camp. (France 24) (BBC) (Straits Times)
  - China bans foreigners from entering Tibet, ahead of the 60th anniversary celebrations
    of the People's Republic. (Straits Times) (Australia Network News)
  - Taiwan shows a documentary on Uyghur leader Rebiya Kadeer, as the website of the
    Kaoshiung Film Festival is hacked. (Central News Agency) (China Daily) (The Guardian)
  - Iranian President Mahmoud Ahmadinejad heads for New York to attend the United
    Nations General Assembly. (Xinhua)
  - An Iranian military airplane crashes during a military parade in Tehran. (AP via
    Houston Chronicle) (ABC)
  - A Spanish doctor, identified as AM, is sentenced to a year in prison for his role
    in the death of the former First Lady of Nigeria, Stella Obasanjo. (BBC)
  - Ireland's National Ploughing Championships, the largest ploughing championship
    in the world and the largest outdoor agricultural event in Europe, begins in Athy,
    County Kildare. (RTÉ) (Irish Independent) (The Irish Times)
  - Attorney General for England and Wales Patricia Scotland, Baroness Scotland of
    Asthal, is fined £5,000 after being found to have employed a housekeeper who was
    not legally allowed to work in the UK. (BBC)
  - For the first time in at least ten years, all United States embassies and consulates
    in South Africa are closed following an unspecified "security threat". (BBC) (Bernama)
    (Associated Press)
  - The New Zealand dollar soars to a 13-month high against both the U.S. dollar and
    euro. (The New Zealand Herald)
  - Bayo Ohu, the assistant news editor of the Nigerian daily The Guardian, is shot
    dead at his home in Lagos. (The Guardian)
  - Official government figures indicate the murder rate in South Africa has fallen,
    though robberies and sexual offences are on the increase. (AFP) (IOL)
  - Chinese President Hu Jintao tells a U.N. summit on climate change that China will
    reduce greenhouse gas emissions and increase reliance on clean energy sources
    in coming years. (CNN)
  - The 2009 Pacific Mini Games opens in Rarotonga, Cook Islands. (RNZI) (Scoop.co.nz)
  - Former world number 1 tennis player Justine Henin announces that she is ending
    her year-long retirement from the sport. (AP via ESPN)
  - The U.S. Food and Drug Administration bans the sale of flavored cigarettes, except
    for menthol cigarettes. (The New York Times)
  - Sixteen people go on trial in Vietnam accused of committing fraud over the foreign
    adoption of more than 250 babies. (BBC) (The Daily Telegraph) (Miami Herald)
  - Rescue teams scour eastern Bhutan after at least 11 people are killed by an earthquake
    which struck the region. (BBC)
  - Security is tightened across Germany after the emergence of al-Qaeda videos threatening
    attacks if troops are not withdrawn from Afghanistan. (BBC)
  - Cities around the world celebrate World Car Free Day. (The Washington Post)
