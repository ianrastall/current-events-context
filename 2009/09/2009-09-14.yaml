Date: '2009-09-14'
Source_URI: Portal:Current events/2009 September 14
Intelligence_Payload:
  Uncategorized:
  - Norwegians go to the polls for the Norwegian parliamentary election. (AFP via
    Google News) (Norway Post)
  - France's political "trial of the century" into the Clearstream affair—former Prime
    Minister Dominique de Villepin versus President Nicolas Sarkozy—opens at the Palais
    de Justice. (The Sydney Morning Herald)
  - U.S. special forces launch an attack on Islamist militants from Al-Shabab in Somalia.
    (BBC) (Mareeg) (The New York Times)
  - At least 18 women and children are killed in a stampede for free flour handed
    out by charity workers in Karachi, Pakistan. (Al Jazeera) (The Nation) (Xinhua)
  - Legislators in Aceh province in Indonesia pass a new law on stoning to death and
    other severe sentences for adultery, homosexuality and premarital sex. (Jakarta
    Post) (Al Jazeera) (The Guardian)
  - Dozens of people in Uganda are charged over riots in the capital Kampala over
    the visit of the King of Buganda, Ronald Muwenda Mutebi II. (BBC)
  - China lodges a complaint with the World Trade Organization over the United States'
    decision to impose import duties on Chinese-made tires. (China Daily) (Financial
    Times)
  - A large area of Toronto, Canada, is evacuated after a Pipe bomb was found in a
    truck, but the bomb is neutralized by the Toronto bomb squad. (CP24)
  - In tennis, Juan Martín del Potro defeats Roger Federer at the U.S. Open. (The
    New York Times)
  - American actor Patrick Swayze dies at age 57, after suffering from pancreatic
    cancer for more than 1 year. (BBC)
