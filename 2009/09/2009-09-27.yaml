Date: '2009-09-27'
Source_URI: Portal:Current events/2009 September 27
Intelligence_Payload:
  Uncategorized:
  - Turkey announces it is to establish formal diplomatic relations with Armenia on
    October 10. (The Hurriyet) (BBC)
  - Prime Minister of the United Kingdom Gordon Brown denies rumours concerning his
    health as the British Labour Party gathers for its conference in Brighton, expressing
    his amazement with Andrew Marr of the BBC for questioning him live on television.
    (The Times) (The Daily Telegraph)
  - In Germany the Christian Democrats and the Liberals win the federal election and
    announce their intention to form a new government with Angela Merkel as Chancellor.
    The Social Democrats concede defeat. (Der Spiegel) (The Daily Telegraph) (Al Jazeera)
  - The Socialist Party win the Portuguese legislative election to elect members of
    the Assembly of the Republic, with 36.6% of the vote. (euronews) (The Independent)
    (Trend News Agency)
  - Film director Roman Polanski is arrested in Zurich on a 31-year-old US arrest
    warrant. (BBC) (Angola Press)
  - Afghan Energy Minister Ismail Khan survives a roadside blast which kills four
    people and wounds seventeen outside a school in Herat. (BBC) (Times of India)
  - The death toll from Tropical Storm Ketsana rises to 73, with more than 300,000
    people displaced. (Philippine Inquirer) (BBC) (China Daily)
  - The Swiss multinational Nestlé is buying milk from a farm seized from its white
    owners and now owned by the wife of Zimbabwe's President Robert Mugabe, according
    to England's The Sunday Telegraph. (BBC)
  - American General Stanley McChrystal, Commander of the International Security Assistance
    Force, formally requests more troops for the War in Afghanistan. (BBC)
  - The American television series Family Guy is outlawed by authorities in Venezuela
    due to an episode promoting the legalization and use of marijuana. (BBC)
  - Iran's Revolutionary Guards test fire several short-range missiles – the Fateh-110
    and Tondar-69. (Press TV) (Chosun Ilbo) (The Independent) (Xinhua)
  - 'Italian Premier Silvio Berlusconi tells a rally in Milan about his encounters
    with President of the United States Barack Obama, saying: "What''s his name? Some
    tanned guy... Ah, Barack Obama!", also commenting on his wife Michelle: "You won''t
    believe it, but two of them went to the beach because the wife is also tanned".
    (IOL) (The Daily Telegraph)'
  - Honduras issues a 10-day deadline to Brazil asking it to decide the status of
    deposed President Manuel Zelaya, who is residing in its embassy in the capital
    Tegucigalpa. (CNN) (Reuters)
  - Discworld author Terry Pratchett, who has Alzheimer's disease, criticises new
    guidelines on assisted suicide. (BBC)
  - An award-winning essay written by Paul McCartney as a 10-year-old for the coronation
    of Elizabeth II of the United Kingdom is found after lying undiscovered in Liverpool's
    Central Library for more than 50 years. (BBC) (The Guardian) (CBC) (NME) (The
    Sunday Times)
  - Four people injured in a South African plane crash in Durban on Thursday are still
    recovering in hospital. (IOL)
  Second South America-Africa Summit (ASA) on Isla Margarita:
  - The leaders of Libya and Venezuela, Muammar al-Gaddafi and Hugo Chávez, call on
    the continents of Africa and South America to unite to secure prosperity for future
    generations. (Al Jazeera) (Reuters) (BBC)
  - Brazilian President Luiz Inácio Lula da Silva says that ASA member countries have
    achieved concrete results since the 1st ASA Summit in Abuja in 2006. (Xinhua)
