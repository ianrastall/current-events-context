Date: '2009-09-05'
Source_URI: Portal:Current events/2009 September 5
Intelligence_Payload:
  Uncategorized:
  - The G-20 finance ministers outline plans for banking reform, including tougher
    regulation of financial institutions. (MarketWatch) (Reuters)
  - At least 15 people, mostly Bulgarians, drown in Lake Ohrid, Republic of Macedonia,
    as a tourist boat sinks. (MIA) (BBC) (Makfax)
  - The Communist Party Chief in Ürümqi, China, is removed from his post following
    recent protests over a series of stabbings with hypodermic needles. (Al Jazeera)
    (BBC) (Xinhua)
  - Ireland's Minister for Foreign Affairs Micheál Martin travels to Khartoum for
    meetings with the Sudanese government over the kidnapping of aid workers Sharon
    Commins and Hilda Kawuki nine weeks prior. (RTÉ)
  - An oil deal and trade concerns with Libya were at one point considered as factors
    in the Lockerbie bomber's release, British Justice Secretary Jack Straw says in
    an interview. (CNN)
  - Thousands of people attend rival demonstrations for or against the policies of
    Venezuelan President Hugo Chávez in Venezuela, Spain, Honduras and in other Latin
    American capitals. (BBC) (BBC video) (Associated Press) (El Universal)
  - Around 90 people are arrested in clashes between right wing anti-Islamic groups
    and anti-Fascist protesters in Birmingham, England. (BBC) (Associated Press) (The
    Independent)
  - Grenada releases the last seven prisoners convicted in the murder of Grenadian
    Prime Minister Maurice Bishop during the 1983 coup, including former deputy prime
    minister Bernard Coard. (France 24)
