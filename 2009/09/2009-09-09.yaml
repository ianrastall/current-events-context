Date: '2009-09-09'
Source_URI: Portal:Current events/2009 September 9
Intelligence_Payload:
  Uncategorized:
  - US Representative Joe Wilson (R-SC) interrupts President Barack Obama's health
    care speech to the Congress with an audible shout of "You lie!" (New York Times)
  - Aeroméxico Flight 576, a Boeing 737 carrying 104 people, is hijacked shortly after
    take-off from Cancún, and forced to land at Mexico City International Airport.
    (BBC News)
  - Floods in Istanbul, the worst in 80 years, kill around 20 people and injure a
    further 20. (Today's Zaman) (Reuters)
  - The Democratic Party of Japan agrees to form a coalition with two other parties,
    the Social Democratic Party and People's New Party. (Mainichi Shimbun) (BBC) (Xinhua)
  - South Korea accuses North Korea of deliberately releasing water from a dam across
    the Korean Demilitarized Zone, in which six people died. (Xinhua) (Yonhap) (Associated
    Press)
  - Iranian authorities close the offices of opposition leader Mehdi Karroubi, confiscating
    material. (Al Jazeera) (Press TV)
  - A new series of hypodermic needle stabbings occur in Ürümqi, northwestern China.
    (China Daily) (Press Trust of India) (Press TV) (The Straits Times)
  - The son of former Filipino President Corazon Aquino, Benigno Aquino III, announces
    his intention to run for the presidency. (The Philippine Inquirier) (CNN) (The
    Australian)
  - North Korea holds celebrations to mark the 61st anniversary of its founding. (CBC)
    (The Straits Times)
  - Stephen Farrell, a journalist with The New York Times, is rescued in northern
    Afghanistan after four days as a captive of the Taliban, but his Afghan colleague
    Mohammad Sultan Munadi is shot dead during the raid. (The Irish Times)
  - '"Beatles Day" is celebrated worldwide as remastered versions of The Beatles''
    albums are released, as well as The Beatles: Rock Band. (Newsday)'
