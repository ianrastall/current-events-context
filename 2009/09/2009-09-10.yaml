Date: '2009-09-10'
Source_URI: Portal:Current events/2009 September 10
Intelligence_Payload:
  Uncategorized:
  - British Prime Minister Gordon Brown apologises for the post-war treatment of celebrated
    WWII code-breaker Alan Turing, who was chemically castrated for having homosexual
    relations. (Downing St) (CBC) (Reuters India) (The New York Times) (The Daily
    Telegraph)
  - Libyan leader Muammar al-Gaddafi says he will demand a permanent place in the
    United Nations Security Council for Africa and compensation worth 777 trillion
    dollars for years of colonialism in New York later this month. (IOL)
  - A Hong Kong court convicts Du Jun, a former senior banker at Morgan Stanley, in
    the country's largest insider trading case. (BBC)
  - Gabon bars opposition leaders from leaving the country following recent riots
    over claims of fraud in the 2009 presidential election. (BBC)
  - Dubai's Metro System, the first mass transit system of the Arabian Peninsula,
    officially opens to the public as its first metro line is partially operational.
    (Al Bawaba)
  - Prime Minister-designate Saad Hariri steps aside in Lebanon. (BBC) (Xinhua)
  - At least five girls are killed and 30 other students injured in a stampede at
    a state-run school in the Indian capital, New Delhi. (ABC) (RTÉ)
  - Venezuelan President Hugo Chávez recognizes Abkhazia and South Ossetia during
    a visit to Russia. (El Universal) (Reuters)
  - Afghan journalists express anger over the killing of local reporter Sultan Munadi
    during a rescue operation that saved his colleague Stephen Farrell. (RTÉ)
  - British consul John Terry is murdered in Jamaica. (Jamaica Gleaner) (Times Online)
  - Greek militant group Revolutionary Struggle threatens to attack the "golden boys"
    it blames for the economic crisis as it claims responsibility for the Athens stock
    market bombing. (RTÉ)
  - In football, Germany beat England 6–2 in the UEFA Women's Euro 2009 final, claiming
    their seventh European title. (BBC)
  - A boat with over 250 people on board capsizes in a storm off the coast of Sierra
    Leone, killing at least 8. (New York Times) (Awareness Times) (Al Jazeera)
  - Supporters of the traditional Kabaka of Buganda, Muwenda Mutebi II, riot in the
    Ugandan capital Kampala after a move by the government to prevent him from visiting
    a local area, resulting in several deaths. (BBC) (IOL) (Press TV)
