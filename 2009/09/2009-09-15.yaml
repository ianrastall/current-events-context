Date: '2009-09-15'
Source_URI: Portal:Current events/2009 September 15
Intelligence_Payload:
  Uncategorized:
  - The Red-Green Coalition of Prime Minister Jens Stoltenberg is elected for another
    term in the Norwegian parliamentary election. (Norway Post) (Financial Times)
  - At least 38 people are killed in flash floods in North Sumatra, Indonesia. (RTÉ)
  - Federal Reserve Chairman Ben S. Bernanke says the worst U.S. recession since the
    1930s has likely ended, while warning that growth may not be strong enough to
    quickly reduce the unemployment rate. (Bloomberg)
  - Russian President Dmitry Medvedev accuses the United States of "blocking" Russia's
    accession to the World Trade Organization. (CNN)
  - A United Nations report into the Gaza War alleges both Israeli and Palestinian
    forces committed war crimes. (BBC) (Al Jazeera)
  - EirGrid, Ireland's national electricity grid operator, receives permission from
    An Bord Pleanála to build a new electricity interconnector between Ireland and
    Wales. (RTÉ)
  - Gabonese firefighters battle a blaze at the heart of Libreville as fire consumes
    the nation's largest market. (IOL)
  - Republic of the Congo's re-elected President Denis Sassou Nguesso names his new
    government, abolishing the controversial post of Prime Minister and replacing
    the nation's oil minister. (IOL)
  - In a televised debate, Madagascar's Prime Minister Monja Roindefo accuses the
    international community of betraying President Andry Rajoelina and warns the island
    risks being "torn into fiefdoms ruled by warlords". (IOL)
