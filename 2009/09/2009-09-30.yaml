Date: '2009-09-30'
Source_URI: Portal:Current events/2009 September 30
Intelligence_Payload:
  Uncategorized:
  - The death toll from an earthquake and tsunami in the Samoan Islands region in
    the South Pacific rises to at least 123. (The Age) (AFP)
  - A 7.6 magnitude earthquake strikes western Indonesia, killing at least 75 and
    trapping thousands of people under rubble. (Reuters) (The Guardian) (Jakarta Globe)
  - Guinea's military leader Captain Moussa Dadis Camara bans all "subversive" gatherings
    and demonstrations in the aftermath of opposition protests. (BBC) (Associated
    Press)
  - Diplomatic officials from the United States and Burma hold their first high level
    meetings in New York City. (Press Trust of India) (BBC)
  - 24 people are killed and 62 injured after a church collapses in Nepal. (Times
    of India) (Associated Press) (Himalayan Times)
  - The death toll from Typhoon Ketsana across Southeast Asia rises to 300. (Associated
    Press) (CNN)
  - The United States is to withdraw 4,000 troops from Iraq by the end of October.
    (Al Jazeera) (The Washington Post)
  - Several Sudanese political parties boycott a conference on the future of South
    Sudan. (Al Jazeera)
  - The final report of an international fact-finding mission concludes that Georgia
    started the 2008 South Ossetia war. (New York Times)
  - Former President of Peru Alberto Fujimori is sentenced to six years in jail for
    corruption by a court in Lima. (BBC)
