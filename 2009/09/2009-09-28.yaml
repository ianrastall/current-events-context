Date: '2009-09-28'
Source_URI: Portal:Current events/2009 September 28
Intelligence_Payload:
  Uncategorized:
  - Iranian students at the University of Tehran demonstrate against the government
    on the first day of the new academic year. (BBC) (New York Times) (Reuters India)
  - Opponents of the Treaty of Lisbon question the European Commission on deliberate
    interference in the Irish referendum campaign in order to secure its desired "Yes"
    vote, suggesting that the Commission has broken the law. (EU Observer) (The Irish
    Times)
  - Libyan leader Muammar al-Gaddafi and Venezuelan President Hugo Chávez sign eight
    accords in Caracas following the weekend's second ASA summit. (Latin American
    Herald Tribune) (Xinhua)
  - The death toll in the worst flooding in the Philippines for forty years reaches
    140 as the capital Manila is "overwhelmed". (The Guardian) (The Times) (The Daily
    Telegraph)
  - Roman Polanski officially challenges his proposed extradition from Switzerland
    to the United States to face child sexual abuse charges stemming from a 1977 incident.
    (AP via Yahoo! News)
  - Japan's Liberal Democratic Party elects Sadakazu Tanigaki to replace Taro Aso.
    (BBC) (Taiwan News) (Xinhua)
  - Those in power in Honduras empower police to quash "unauthorised" gatherings as
    President Manuel Zelaya calls on his supporters to march on the three-month anniversary
    of his fall, saying it will be "the final offensive". (The Guardian)
  - An Eldoret operation commences to close down Kenya's largest camp for people forced
    to flee their homes during the 2007–2008 Kenyan crisis ethnic violence. (BBC)
  - President of the autonomous Government of Southern Sudan Salva Kiir says Sudan
    is at a "historic crossroads" which will lead to a split from the north. (BBC)
    (Voice of America)
  - Australia's 12 Apostles natural landmarks continue to crumble. (The Times)
  - Little Cumbrae, Scotland is converted into an ashram. (BBC)
  - Charges of plotting to topple Robert Mugabe against Jestina Mukoko, a prominent
    Zimbabwean rights activist, are thrown out after the Supreme Court rules she had
    been tortured while in custody. (BBC) (The New York Times)
  - Grégoire Ndahimana, a former mayor accused of taking part in the 1994 Rwandan
    genocide, pleads not guilty at a United Nations tribunal. (The Guardian) (BBC)
    (The Age)
  - Chinese Civilisation Revisited by Xiao Jiansheng, a book about Chinese history
    which is outlawed in China, goes on sale in Hong Kong. (BBC) (AsiaOne)
  - A police officer who served at the G20 demonstrations in London in April 2009
    is to face a charge of assaulting a woman with a baton after becoming involved
    in a confrontation at a vigil for Ian Tomlinson. (The Times) (The Daily Telegraph)
  - Spain's Pablo Pineda wins the best actor award at the San Sebastián International
    Film Festival, the first actor with Down's syndrome to win an international film
    award. (BBC) (Think Spain) (Latin American Herald Tribune)
  - Art historian Henry Adams claims abstract impressionist Jackson Pollock camouflaged
    his signature as a "hidden message" inside his famous 1943 Mural. (The Daily Telegraph)
  - North Korea revises its constitution, removing all references to communism, while
    mentioning human rights for the first time, as well as stating Kim Jong-il as
    its "Supreme Leader". (RTHK) (Associated Press) (Korea Times) (Reuters)
  - At least 58 people are killed at a large opposition rally in Guinea against Moussa
    Dadis Camara who seized power in a coup last year. (BBC) (Xinhua) (Al Jazeera)
  - The interim government in Honduras raids two media outlets critical of the government,
    and suspends other civil liberties for 45 days. (BBC) (Associated Press) (Al Jazeera)
  - Oxfam launches an emergency appeal for £9.5 million for Ethiopia and other East
    African countries to fight the worst drought in a decade. (BBC)
  - Former Peruvian President Alberto Fujimori pleads guilty to bribery and illegal
    phone-tapping of journalists, businessmen and opposition politicians. (BBC)
