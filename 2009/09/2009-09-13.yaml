Date: '2009-09-13'
Source_URI: Portal:Current events/2009 September 13
Intelligence_Payload:
  Uncategorized:
  - Russia announces that it will assist Venezuela in the building of a nuclear energy
    program.
  - At least 19 people die and 80 are missing after a ferry sinks in the Congo River
    in the Democratic Republic of Congo. (AFP via Google News)
  - Kim Clijsters of Belgium defeats Caroline Wozniacki of Denmark to win the 2009
    US Open Women's Singles. (New York Times)
  - Cork beat Kilkenny in the final of the All-Ireland Senior Camogie Championship
    2009. (RTÉ)
  - Police arrest more than 550 people in connection with two days of riots in Uganda's
    capital Kampala, as the death toll rises to 14. (IOL)
  - Brazilian President Luiz Inácio Lula da Silva heavily criticises the "rich countries",
    the G8 and other international bodies over the global economic crisis. (BBC)
  - German Chancellor Angela Merkel appears with her main rival, Frank-Walter Steinmeier,
    in a TV debate, two weeks ahead of an election. (BBC) (Deutsche Welle) (The Guardian)
    (Bangkok Post) (Miami Herald)
  - Saudi Arabia's veteran foreign minister Prince Saud al-Faisal undergoes successful
    spine surgery in the United States. (Reuters)
  - 38 people are killed in a fire at a drug abuse clinic in Taldykorgan, Kazakhstan.
    (Kazakhstan News) (AFP) (RIA Novosti) (IOL)
  - Hundreds of people protest in Hong Kong over alleged beatings of its journalists
    in mainland China covering unrest in Xinjiang. (RTHK) (BBC) (Straits Times)
  - At least 6 people die in a fall down an elevator shaft of a skyscraper under construction
    in Hong Kong. (BBC) (IOL) (The New Zealand Herald)
  - 4 people die and 3 are injured when a mud house collapses in floods at Lazaret,
    a poor district of the Nigerien capital Niamey. (IOL)
  - Two of the so-called Bermuda Triangle's most mysterious disappearances in the
    late 1940s may have been solved. (BBC)
  - Teeth and bones from a range of animals, including hyenas, deer and rhinos, are
    discovered by archaeologists inside a cave in Devon, England. (BBC)
