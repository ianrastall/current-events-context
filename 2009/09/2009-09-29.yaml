Date: '2009-09-29'
Source_URI: Portal:Current events/2009 September 29
Intelligence_Payload:
  Uncategorized:
  - At least 40 people are killed as Typhoon Ketsana makes landfall on Vietnam. (Press
    Trust of India) (Xinhua)
  - A court in Malaysia upholds a whipping punishment for Kartika Sari Dewi Shukarno
    who was convicted of drinking beer. (Malaysia Star) (Al Jazeera)
  - Former President of Peru Alberto Fujimori pleads guilty to charges of bribery
    and spying on his old rivals during his presidency. (Philippine Daily Inquirer)
  - The European Commission denies accusations that it broke Ireland's laws against
    using taxpayers' money on referendum spending after an EU office in Dublin paid
    €150,000 to insert a guide to the Treaty of Lisbon into all Sunday newspapers
    as the country's second referendum approaches. (The Irish Times)
  - Former MEP Patricia McKenna promises legal action against any newspapers found
    carrying the Commission's guide, with legal advisers to Europe's Council of Ministers
    expressing "some concern" about its content. (The Irish Times)
  - At least 87 people die in a crackdown by the Military of Guinea on an opposition
    rally against the country's leader Moussa Dadis Camara. (BBC) (Al Jazeera)
  - Gabon's constitutional court recounts votes from last month's disputed presidential
    election won by the son of longtime leader Omar Bongo. (IOL)
  - A 14-year-old schoolgirl in Coventry, England, who died after being given a cervical
    cancer vaccine as part of that country's national immunisation programme is found
    to have suffered from a tumor in her heart and lungs. (The Times) (BBC)(MSNBC)
  - An 8.3 magnitude earthquake strikes the Samoa Islands, triggering a tsunami that
    kills at least 20 in the nation of Samoa and another 14 in American Samoa. (Reuters)
    (BBC)
  - Britney Spears released her song 3 (Britney Spears song) on this day.
