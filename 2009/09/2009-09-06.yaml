Date: '2009-09-06'
Source_URI: Portal:Current events/2009 September 6
Intelligence_Payload:
  Uncategorized:
  - Kilkenny beat Tipperary in the 2009 All-Ireland Senior Hurling Championship Final
    to achieve a record-equalling fourth consecutive victory. (RTÉ) (Irish Independent)
  - Hundreds of people are rescued and a further 88 are missing after a ferry sank
    off the coast of the southern Philippines. (Philippine Inquirer) (Reuters) (Xinhua)
    (BBC)
  - A third day of clashes take place in Gabon's second largest city, Port-Gentil,
    over the disputed presidential election. (Reuters) (AFP)
  - Ten people are injured in an acid attack in Hong Kong. (RTHK) (AFP)
  - Sri Lanka orders a United Nations official from UNICEF to leave after he made
    "adverse remarks" to the foreign media regarding the LTTE. (The Times) (Times
    of India) (The Island)
