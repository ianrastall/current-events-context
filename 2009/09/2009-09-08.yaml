Date: '2009-09-08'
Source_URI: Portal:Current events/2009 September 8
Intelligence_Payload:
  Uncategorized:
  - A shipwreck in Sierra Leone leaves "scores" dead. (The New York Times) (BBC) (The
    Daily Telegraph) (The Sydney Morning Herald)
  - Police in Milwaukee, United States, arrest a man in suspicion of being the notorious
    North Side Strangler, believed to have killed at least seven women between 1986
    and 2007. (MSNBC)
  - A colossal statue of Apollo is discovered at a UNESCO World Heritage Site at Hierapolis,
    Turkey. (Discovery Channel)
  - Two Norwegians, Joshua French and Tjostolv Moland, on trial for alleged murder
    and espionage, are found guilty on both counts and sentenced to death by a Congolese
    military tribunal. (Norway Post)
  - Mobile network operators T-Mobile and Orange agree to merge their British businesses.
    (BBC)
  - A magnitude 6.2 earthquake strikes northern Georgia. (BBC) (USGS) (The Georgian
    Times)
  - 35 people are killed and 44 remain missing after an explosion in a coal mine in
    Pingdingshan, China. (BBC) (China Daily) (Al Jazeera)
  - Kenya replaces almost all of its senior police officers after they were blamed
    for deaths during post-election violence in 2007 and 2008. (Daily Nation) (BBC)
  - Sudanese journalist Lubna al-Hussein is freed from one day in jail after being
    prosecuted for wearing trousers – the fine was paid by the Journalist Union. (Associated
    Press) (Al Jazeera)
  - A storm, with rain, hail and winds of over 60 mph kills at least 14 people in
    northern Argentina and southern Brazil. (BBC)
