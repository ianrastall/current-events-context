Date: '2009-09-25'
Source_URI: Portal:Current events/2009 September 25
Intelligence_Payload:
  Uncategorized:
  - Photographs of Spanish Prime Minister José Luis Rodríguez Zapatero and his family
    are published in the United States and subsequently published on the front pages
    of newspapers in his home country. A controversy occurs as many Spaniards have
    never before seen the children of the intensely private Prime Minister. (The Guardian)
  - Poland approves a law making chemical castration mandatory for paedophiles. (Reuters)
  - Four people are charged in Greece over recent bombing attacks, in the first arrests
    brought against suspected terrorists in several years. (IOL) (Canadian Press)
  - Nigerian MPs ask the government to investigate the status of Chinese citizens
    living in the country, after allegations that Nigerians in China have been mistreated.
    (BBC)
  - The trial of former Israeli Prime Minister Ehud Olmert on corruption charges begins
    in Jerusalem. He is the first ever Israeli Prime Minister to be brought to trial.
    (BBC) (RTÉ)
  - Iran reveals to the United Nations nuclear watchdog the existence of a second
    uranium enrichment plant, facing accusations of secret building projects from
    Gordon Brown, Barack Obama and Nicolas Sarkozy. (BBC) (Haaretz) (RTÉ)
  - Lawyers for the former Prime Minister of France, Dominique de Villepin, say they
    will sue President Nicolas Sarkozy for having called him "guilty" of the "Clearstream"
    affair and violating the principle of presumption of innocence. (BBC)
  - At least two people are killed and fifteen injured in a blast at a fireworks shop
    in Santo André, Greater São Paulo, Brazil. (BBC) (Xinhua) (Ria Novosti)
  - Hundreds of people queue in Birmingham, United Kingdom, to see part of the Staffordshire
    hoard. (BBC)
  - Palau is to create the world's first "shark sanctuary", banning all commercial
    shark fishing in its waters. (BBC) (The Times) (UPI)
  - Paul G. Kirk, Jr. is sworn in as the interim U.S. Senator from Massachusetts,
    succeeding the late Ted Kennedy. (Roll Call)
