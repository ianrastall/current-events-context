Date: '2009-09-12'
Source_URI: Portal:Current events/2009 September 12
Intelligence_Payload:
  Uncategorized:
  - Police in the Madagascar capital Antananarivo disperse small groups of opposition
    supporters opposed to the administration of Andry Rajoelina. (IOL)
  - A 6.4 magnitude earthquake occurs in Venezuela, injuring many people. (Daily Press)
  - Lebanon wins the Golden Lion at the Venice Film Festival. (Reuters) (RTÉ)
  - Israeli President and Nobel Laureate Shimon Peres is hospitalised after a collapse
    in Tel Aviv. (RTÉ) (Al Jazeera) (Haaretz) (Reuters) (The Washington Post)
  - Ireland's Taoiseach Brian Cowen denies Libertas founder Declan Ganley's claim
    that the second Irish referendum on the Treaty of Lisbon is "profoundly undemocratic".
    (RTÉ)
  - Eight people are swept away by flash floods and a ninth is killed by lightning
    as more thunderstorms lash southwestern Algeria. Five people are killed in storms
    in Morocco. (IOL)
  - At least 11 people die following two days of riots in Kampala, Uganda. (IOL)
  - At least 7 die in several separate attacks and suicide bombings in Russia's North
    Caucasus. (AP)
  - At least three people die and several others are injured in Somaliland when angry
    demonstrators clash with riot police. (IOL)
  - 10 Warhol paintings dating from the late 1970s are stolen from the private collection
    of Richard Weisman in Los Angeles, USA. (BBC) (RTÉ)
  - United Nations official Peter Mackay is revealed to have been expelled from Sri
    Lanka for challenging government assertions at the end of the civil war. (The
    Guardian)
  - In rugby union, South Africa defeat New Zealand 32-29 to win the 2009 Tri Nations
    Series. (Sport24) (IOL)
  - The Guatemalan Army is accused of abducting over 300 children during the 1960–1996
    Civil War and selling them for adoption. (CNN) (Reuters)
  - Venezuelan President Hugo Chávez says a consignment of Russian-made missiles with
    a 300km range are due to arrive in his country. (MercoPress) (RTÉ)
  - President Robert Mugabe says Zimbabwe's first high-level talks with top EU officials
    in seven years went well. (BBC)
  - The Tea Party movement holds a march in Washington across the Freedom Plaza and
    United States Capitol to protest U.S. President Barack Obama's policies on healthcare
    reform, taxation, and federal spending. Other Tea Party protests are also held
    across the United States. (ABC News) (Politico)
  2009 Sierra Leone shipwreck:
  - 120 of the dead are buried. (IOL)
  - 30 more bodies are found. (Taiwan News)
