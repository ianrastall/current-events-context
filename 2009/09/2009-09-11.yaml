Date: '2009-09-11'
Source_URI: Portal:Current events/2009 September 11
Intelligence_Payload:
  Uncategorized:
  - The search and rescue effort following the 2009 Sierra Leone shipwreck comes to
    end, with 90 confirmed dead and at least 100 others declared missing. (Reuters)
  - In an interview with The Wall Street Journal, Libertas founder Declan Ganley says
    the second Irish referendum on the Treaty of Lisbon is "profoundly undemocratic".
    (RTÉ)
  - Former Taiwanese President Chen Shui-bian and his wife, Wu Shu-chen, are both
    sentenced to life in prison after being found guilty of corruption. (Taiwan News)
    (France 24)
  - Zimbabwe's President Robert Mugabe condemns "bloody whites" for meddling in his
    country's affairs, specifically perceived British and American interference. (IOL)
  - President Vladimir Voronin of Moldova resigns. (Xinhua)
  - Prime minister Jadranka Kosor of Croatia and PM Borut Pahor of Slovenia agree
    on an immediate end to Slovenia's blockade of Croatia's EU accession and further
    negotiation of the Gulf of Piran border dispute between two countries. (Delo)
    (Deutsche Welle) (Malaysia Star)
  - A Kenyan magistrate sentences Jon Cardon Wagner, an American who founded the popular
    chain of coffee shops, Nairobi Java House, to 15 years of imprisonment for the
    statutory rape of three teenage Kenyan girls. (IOL)
  - Sharon Commins, an aid worker kidnapped with a Ugandan colleague in Sudan, makes
    contact with her family in Ireland for the first time in several weeks. (RTÉ)
  - NASA's Space Shuttle Discovery lands at the Edwards Air Force Base in California,
    USA. (BBC)
  - Venezuelan President Hugo Chávez announces the discovery of a vast gas field off
    the coast of his country, one of the world's largest finds. (BBC) (MercoPress)
