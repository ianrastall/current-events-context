Date: '2009-09-04'
Source_URI: Portal:Current events/2009 September 4
Intelligence_Payload:
  Uncategorized:
  - The death toll in the 2009 Java earthquake rises to 63. (CBC) (Xinhua)
  - Ryan Tubridy takes over as host of The Late Late Show, the world's longest running
    chat show. (Irish Examiner) (The Irish Times)
  - Xinjiang
  - Another day of protests by Han Chinese occur over a series of hypodermic needle
    stabbings in Ürümqi, northwestern China. (BBC) (Bangkok Post) (CNN) (RTHK) (Al
    Jazeera)
  - Chinese officials say five people have been killed and 14 injured in the unrest.
    (Xinhua) (BBC) (RTÉ)
  - Thousands of mourners from across southern India pay their respects to the dead
    chief minister of Andhra Pradesh, Y. S. Rajasekhara Reddy. (BBC)
  - Six Gambian journalists jailed for criticising President Yahya Jammeh are freed.
    (Gambia News) (UPI) (BBC)
  - Looting occurs in Port Gentil, Gabon, after riots broke out over a disputed presidential
    election. (AFP) (BBC) (Al Jazeera)
  - A court in Burma agrees to hear an appeal by detained National League for Democracy
    leader Aung San Suu Kyi. (The Guardian) (Times of India) (Jakarta Post)
  - North Korea announces it is in the final stage of uranium enrichment, as Russia,
    South Korea, Japan and the United States express concern. (RIA Novosti) (Reuters)
    (Wall Street Journal) (Yonhap)
  - More than 90 people, among them at least 40 civilians, are killed when an American
    jetfighter called in by German troops attacks two fuel tankers hijacked by Taliban-insurgents
    in Kunduz, northern Afghanistan. (The Daily Telegraph) (BBC)
  - The armed forces in Madagascar reject calls by opposition groups to take over
    the country's institutions for an interim period. (IOL) (Xinhua) (AFP)
  - The International Monetary Fund grants Zimbabwe a US$ 500 million loan, its first
    to the country in 10 years. (The Herald) (Business Day)
  - Temperatures in the Arctic are at their highest for 2000 years, according to a
    new study. (The Daily Telegraph)
  - The United States eases more restrictions on Cuba, allowing unlimited family visits
    and telephone exchanges. (MercoPress) (CNN) (Washington Post)
  - The Brazilian Senate condemns Venezuelan President Hugo Chávez for his restrictions
    on the press, further delaying its Mercosur bid. (MercoPress)
  - Israeli Prime Minister Benjamin Netanyahu is to approve new settlements in the
    West Bank before a building freeze. (New York Times) (Ha'aretz) (Associated Press)
  - Air India Flight 829 suffers an engine fire during pushback at Chhatrapati Shivaji
    International Airport, Mumbai. All 228 people on board successfully evacuate via
    emergency slides. (NDTV)
  - Two Bangladeshi newspapers, the Daily Manab Zamin and the New Nation, apologise
    after publishing an article taken from satirical US website The Onion, which claimed
    the Moon landings were faked. (BBC)
  - Former US soldier Steven D. Green is sentenced to life in prison with no possibility
    of release for the murder of an Iraqi girl and her family.(Al Jazeera)
