Date: '2009-09-07'
Source_URI: Portal:Current events/2009 September 7
Intelligence_Payload:
  Uncategorized:
  - South Korea asks North Korea to explain a sudden discharge of dam water which
    left six people dead or missing across the border. (Xinhua) (Yonhap) (RIA Novosti)
  - Japan's Prime Minister-elect Yukio Hatoyama proposes a 25% cut in greenhouse gas
    emissions by 2020, up from 8% by the outgoing administration. (Japan Today) (Al
    Jazeera) (BBC)
  - Drivers in Samoa prepare to switch from driving on the right hand side of the
    road to the left as a new law comes into effect, the first nation to change sides
    in 40 years. (BBC) (Reuters) (Associated Press)
  - Israel formally approves the construction of new settlements in the West Bank.
    (CNN) (Jerusalem Post)
  - The Indian Central Bureau of Investigation is to investigate the helicopter crash
    which killed the Chief Minister of Andhra Pradesh Y. S. Rajasekhara Reddy and
    four others. (Times of India)
  - Scientists working in Papua New Guinea announce the discovery of over forty new
    species, including a giant rat weighing approximately 1.5kg. (BBC)
  - Kraft Foods Inc. says it will pursue a takeover of Cadbury after the British maker
    of Trident gum and Dairy Milk rejected a $16.7 billion bid. (Bloomberg)
  - The premier of the Republic of China (Taiwan), Liu Chao-shiuan, and his cabinet
    resign due to criticism and public anger over the slow handling of the disaster
    during Typhoon Morakot. (Reuters)
  - Sudanese activist Lubna al-Hussein is found guilty of breaching Sudanese criminal
    law by wearing trousers, but is fined instead of being sentenced to flogging due
    to international concern over the trial. She has stated she will not pay and instead
    face a month in jail. (BBC News) (AP)
