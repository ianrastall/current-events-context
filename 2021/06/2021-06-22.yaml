Date: '2021-06-22'
Source_URI: Portal:Current events/2021 June 22
Intelligence_Payload:
  Uncategorized:
  - Internal conflict in Myanmar
  - 2021 Myanmar protests
  - Tatmadaw forces backed by armoured vehicles and artillery enter the country's
    second-largest city Mandalay and clash with the newly formed People's Defence
    Force rebel group which seized parts of the city. Clashes are ongoing. (MSN)
  - War in Afghanistan
  - Taliban insurgency
  - The Taliban seizes control of Shir Khan Bandar, a town that contains Afghanistan's
    main border crossing into Tajikistan. (Al Jazeera)
  - South Sudan officially resumes the production of crude oil after a 7-year hiatus.
    The country's Minister of Petroleum says that production has begun at the Block
    5A oil field and that the country is seeking a production of 8,000 barrels per
    day. (The Nation)
  - Argentine Economy Minister Martín Guzmán announces that the country will make
    a voluntary payment to the Paris Club to avoid default. Argentina is also currently
    negotiating with the International Monetary Fund. (Buenos Aires Times)
  - The Japanese government, in its annual economic policy guidelines, recommends
    that companies employ a four-day workweek, saying it will improve work-life balance,
    encourage skill development, and will cause workers to spend more to boost the
    economy. (DW)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany, COVID-19 vaccination in Germany
  - Chancellor Angela Merkel receives her second dose of the COVID-19 vaccine. However,
    Merkel received the Moderna vaccine for her second dose rather than the AstraZeneca
    vaccine. (Euronews)
  - COVID-19 pandemic in Italy, COVID-19 vaccination in Italy
  - Prime Minister Mario Draghi receives his second dose of the COVID-19 vaccine.
    However, Draghi received the Pfizer–BioNTech vaccine for his second dose instead
    of the AstraZeneca vaccine. (Barron's)
  - COVID-19 pandemic in Russia
  - Russia reports 546 deaths from COVID-19 in the past 24 hours, which is the highest
    single-day total of deaths since February 11, thereby bringing the nationwide
    death toll to 130,347. (Al Jazeera)
  - COVID-19 pandemic in Turkey, COVID-19 vaccine
  - Turkey lowers its vaccination eligibility age to 25 as curfews are expected to
    end this week. (Anadolu Agency)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Michigan
  - Michigan lifts face mask requirements and capacity restrictions on indoor events.
    However, masks are still required for nursing homes, prisons, hospitals, schools,
    funeral directors, and agricultural workers but usage at businesses is optional.
    (MLive.com)
  - COVID-19 pandemic in Argentina
  - Argentina reports a record 792 deaths from COVID-19 in the past 24 hours, and
    surpasses 90,000 deaths from COVID-19. (Perfil)
  - COVID-19 pandemic in Fiji
  - Fiji reports a record 180 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 2,270. The Ministry of Health
    also reports two deaths as the disease rapidly spreads across the country. (RNZ)
    (TVNZ)
  - COVID-19 pandemic in India
  - The Ministry of Health and Family Welfare declares the "Delta Plus" variant of
    COVID-19 a Variant of Concern after 22 cases of the variant were reported in India.
    (Hindustan Times)
  - Climate change in Australia
  - UNESCO recommends changing the World Heritage status of the Great Barrier Reef
    to "in danger" and urges "accelerated action" from Australia. Australian Environment
    Minister Sussan Ley says that she "strongly opposes" the recommendation, arguing
    that it was politically motivated and not following normal process. (The Guardian)
  - Foreign relations of Hungary, LGBT rights in Hungary
  - A number of European countries, including Germany, the Netherlands, Sweden, France
    and Ireland, condemn the recently passed anti-LGBTQ+ bill in Hungary which bans
    the "display and promotion of homosexuality" among under-18s as "grotesque". Luxembourg
    says that the bill violates human rights and along with Belgium says that the
    bill is a "flagrant form of discrimination". (Reuters)
  - Iran–United States relations, United States–Yemen relations
  - The Federal Bureau of Investigation and Bureau of Industry and Security seize
    control of several Iranian websites, including those of Press TV and Al-Alam News
    Network, as well as the Houthi-controlled Al Masirah TV. (Voice of America)
  - COVID-19 pandemic in the Philippines
  - President Rodrigo Duterte threatens to arrest those who refuse to be vaccinated
    against COVID-19 and tells them to leave the country if they will not cooperate
    with efforts to end a public health emergency. (AP)
  - Trial of Catalonia independence leaders
  - The Spanish government pardons the nine jailed Catalan separatists convicted for
    their roles in the failed 2017 declaration of independence. (Euronews)
  - The United Kingdom begins testing its new emergency alert system with some mobile
    phone users receiving a siren-like sound informing them of the alert test. When
    the alert service goes live, it will issue warnings to the public about terrorist
    incidents, flooding and public health emergencies. (Wales Online)
