Date: '2021-06-13'
Source_URI: Portal:Current events/2021 June 13
Intelligence_Payload:
  Uncategorized:
  - 2021 Shiyan pipeline explosion
  - Eleven people are killed and 37 others are seriously injured in a gas explosion
    in the Zhangwan District of Shiyan, Hubei, China. (CNN International)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany, COVID-19 vaccination in Germany
  - Germany's Federal Health Ministry demands that Johnson & Johnson deliver 6.5 million
    doses of its vaccine by July in order to offset a vaccine shortfall. A spokesman
    for the ministry says that the situation is regretful and that only 1.15 million
    doses of the vaccine had been administered as of last Friday. (Deutsche Welle)
  - COVID-19 pandemic in Russia
  - Russia reports 14,723 new cases of COVID-19 in the past 24 hours, which is the
    highest single-day total on daily cases since February 13. (Asian News International)
  - COVID-19 pandemic in Colombia
  - President Iván Duque Márquez receives his first dose of the Pfizer–BioNTech COVID-19
    vaccine. (Reuters)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 2,188 new cases of COVID-19 in the past 24 hours, which
    is the first time the number of daily cases reaches 2,000. It thereby brings the
    nationwide total of confirmed cases to 76,084. (Xinhua News Agency)
  - Trump administration data seizure
  - It is revealed that, in 2018, the Justice Department, through a subpoena, requested
    from Apple the data of then-White House Counsel Don McGahn. Apple says that it
    complied and turned over the information to the government, and notified McGahn
    and his wife last month. (The Hill)
  - Ardea shooting
  - Three people are killed when a gunman opens fire on bystanders at a park in Ardea,
    Rome, Italy. The attacker, identified as a man with mental problems, then commits
    suicide after barricading himself at his home. (Reuters)
  - Trial of Catalonia independence leaders
  - Thousands of Spaniards protest in Madrid the possible pardons to Catalonian independence
    advocates. Deputy Spanish Prime Minister Carmen Calvo had said that the move was
    "close" and had asked the People's Party "not to confront Catalonia". Polls show
    that 63% of Spanish citizens oppose the pardons as a threat to national unity
    and 25% support the pardons. (Reuters)
  - 2020–2021 Minneapolis–Saint Paul racial unrest, 2021 Uptown Minneapolis unrest,
    Killing of Deona Knajdek
  - One woman is killed and three are injured after a driver drove his car into a
    group of people in Minneapolis's Uptown district protesting the killing of Winston
    Boogie Smith, a 33-year-old black man. Police say the suspect is in custody. (NPR)
  - Police in Nicaragua arrest opposition activist Suyen Barahona, who is a strong
    critic of President Daniel Ortega, under the charge of "inciting foreign interference
    in internal affairs, requesting military interventions and organizing with foreign
    financing". The arrest is condemned by the opposition. (Reuters)
  - 2019–2021 Israeli political crisis
  - Israel's parliament votes in favour of a new coalition government, ending Benjamin
    Netanyahu's 12-year tenure as Prime Minister. He has now been replaced by Naftali
    Bennett. (Reuters)
  - Anti-Netanyahu protesters gather at the Rabin Square in Tel Aviv to celebrate
    his replacement. (The Jerusalem Post)
  - 2021 Chilean regional elections
  - Opposition candidates win in 13 of 14 regions holding the second round of the
    regional elections. Chile Vamos, the governing right-wing alliance, wins only
    in the Araucanía Region. (The Saxon)
  - Christian Democrat Claudio Orrego is elected as the first governor of the Santiago
    Metropolitan Region, after narrowly defeating Broad Front candidate Karina Oliva.
    (The Rio Times)
  - 2021 Swiss referendums
  - Swiss citizens head to the polls to decide on two popular initiatives and three
    facultative referendums regarding a response to the COVID-19 pandemic, police
    measures to combat terrorism, the existing carbon tax policy, and a potential
    nationwide ban on the use of synthetic pesticides. (The Australian)
