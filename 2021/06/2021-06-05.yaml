Date: '2021-06-05'
Source_URI: Portal:Current events/2021 June 5
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Solhan and Tadaryat massacres
  - At least 160 people are killed by Islamic extremists in Solhan, Yagha, northeastern
    Burkina Faso. It is the deadliest terrorist attack in the country's history. Hours
    before the massacre, 13 civilians and a soldier were killed in an attack in Tadaryat.
    (BBC News)
  - Yemeni Civil War
  - Seventeen people are killed and five more injured during a rocket attack near
    a petrol station in the city of Marib, Yemen. The incident is blamed on the Houthis,
    who however did not claim responsibility. (Al Jazeera English)
  - 2021 Myanmar protests
  - Clashes erupt in Ayeyarwady and Kyonpyaw, near Yangon, where the military shot
    and killed 20 protesters, thereby bringing the nationwide death toll since the
    February 1 coup to more than 845. Meanwhile, military junta leader Min Aung Hlaing
    meets with ASEAN leaders to discuss paths to peace in the country. (Reuters)
  - Kurdish–Turkish conflict
  - A Turkish airstrike at the Makhmour Refugee Camp in northern Iraq kills three
    people and injures many others. (Reuters)
  - The Group of Seven finance ministers agree on a deal to commit towards a minimum
    global corporate tax rate of at least 15 percent, which will be aimed at preventing
    tax havens that cater to large multinational corporations, during a meeting in
    London. (Philippine Daily Inquirer)
  - Salvadoran President Nayib Bukele announces at a Bitcoin conference in Florida
    that his country will adopt the cryptocurrency as legal tender alongside the U.S.
    dollar, making El Salvador the first country to do so. He plans to introduce the
    relevant legislation to the Legislative Assembly next week. (BBC News)
  - A coal mine collapse and subsequent flood leaves seven miners trapped in Múzquiz,
    Coahuila, Mexico. Rescue operations are currently underway. (Sky News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - China becomes the first major country to authorize the emergency use of the Sinovac
    CoronaVac vaccine for children as young as three years old. (Bloomberg News)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka surpasses 200,000 cases of COVID-19. (Ada Derana)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record 38 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 225. (South China Morning Post)
  - COVID-19 pandemic in Belgium
  - Belgian federal and regional health ministers agree to open vaccination for teenagers
    aged 16 to 17 years old using Pfizer–BioNTech COVID-19 vaccine. The programme
    will begin once the vaccination of adults has been completed. (The Guardian)
  - COVID-19 pandemic in Venezuela
  - Venezuela reaches an agreement to buy doses of the Russian EpiVacCorona vaccine,
    as well as manufacture the vaccine locally. (Reuters)
  - 2021 Anqing stabbing attack
  - A man stabs random pedestrians on a street in Anqing, China, killing 6 people
    and wounding 14 others. The attacker is arrested and acted due to 'family problems'.
    (Reuters)
  - Aftermath of the 2021 United States Capitol attack
  - The U.S. Department of Justice says that over 465 people have been arrested since
    the attack on the United States Capitol. The Department of Justice is also seeking
    information on 250 other suspects. (ABC News)
  - Impact of the COVID-19 pandemic on sports
  - 2020–21 PGA Tour
  - After completion of the third round of the Memorial Tournament, Jon Rahm is notified
    that he had tested positive for COVID-19. Rahm was leading the tournament by 6
    strokes before having to withdraw due to Tour protocols. (CBC News)
