Date: '2021-06-06'
Source_URI: Portal:Current events/2021 June 6
Intelligence_Payload:
  Uncategorized:
  - London, Ontario truck attack
  - Four people are killed and another is injured after a man drives his truck into
    a Pakistani Muslim family in London, Ontario, Canada. The suspect is identified
    by police as Nathaniel Veltman, a local 20-year-old motivated by Islamophobia.
    He has been arrested and facing four charges of first-degree murder and one charge
    of attempted murder. (Al Jazeera English) (CBC News)
  - War in Afghanistan
  - 2021 Afghanistan attacks
  - A truck carrying explosives is detonated at the police headquarters in Balkh,
    killing 16 people and injuring 117 others. In addition to the district building
    that was completely destroyed and the police headquarters that was nearly demolished,
    10 houses and 80 shops were also damaged in the attack. The Taliban claimed responsibility
    for the attack. (TOLO)
  - The British Normandy Memorial in Normandy, France, is officially unveiled on the
    77th anniversary of the Normandy landings. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - COVID-19 vaccination in Bangladesh
  - Bangladesh approves the emergency use of the Sinovac CoronaVac vaccine, becoming
    the second Chinese-made vaccine to be approved in the country. (Dhaka Tribune)
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Haryana
  - Dera Sacha Sauda chief Gurmeet Ram Rahim Singh, who is currently serving prison
    time in Rohtak, tests positive for COVID-19. (India TV)
  - COVID-19 pandemic in Israel
  - COVID-19 vaccination in Israel
  - Israel begins a vaccination campaign for 600,000 children between the ages of
    12 and 16, with the first priority being children who are at greater risk of experiencing
    severe symptoms from COVID-19 and children from families who are expected to travel
    abroad. (The Times of Israel)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - The United States surpasses 300 million doses of COVID-19 vaccines being administered.
    (ABC News)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Yukon
  - An outbreak is declared at a gold mine in Yukon after three people tested positive
    for COVID-19. (CBC News)
  - COVID-19 pandemic in Fiji
  - Fiji reports a record 83 new cases of COVID-19 in the past 24 hours, thereby bringing
    the national total of confirmed cases to 604. The Ministry of Health seals off
    the Colonial War Memorial Hospital in Suva for COVID-19 patients only as 11 of
    the cases are of unconfirmed origin. (RNZ International)
  - 2021 Israel–Palestine crisis
  - Israeli police arrest Sheikh Jarrah activists Muna and Mohammed El-Kurd, the former
    for allegedly participating in riots, and the latter after he turned himself in
    following a police summons. Both of them were released separately. (BBC News)
  - Aftermath of the 2021 United States Capitol attack
  - U.S. Rep. Eric Swalwell (D-CA) announces he has served Mo Brooks (R-AL) with a
    lawsuit that accuses him of being responsible for inciting the January 6 riot
    at the United States Capitol. (Axios)
  - 2021 Saxony-Anhalt state election
  - Voters in the German State of Saxony-Anhalt head to the polls to elect a new Landtag.
    They are the last German elections before the 2021 German federal election. (SaltWire
    Network)
  - In a surprise victory, Chancellor Angela Merkel's party Christian Democratic Union
    (CDU) is projected to be the clear winner, taking in 37% of the vote. The far-right
    Alternative for Germany, which was polling neck-and-neck with the CDU for most
    of the campaign, came in second with 20.8%, down three percentage points from
    last state election. (Deutsche Welle) (Reuters)
  - 2021 Peruvian general election
  - Peruvians head to the polls to elect their President. Left-wing candidate Pedro
    Castillo faces right-wing candidate Keiko Fujimori, who is the daughter of the
    authoritarian former President Alberto Fujimori. Polls show Fujimori slightly
    ahead in the polls as Castillo warns of fraud. (Reuters)
  - 2021 Somaliland parliamentary election
  - The National Electoral Council reports that in Somaliland's first parliamentary
    election since 2005, oppositional parties Waddani and Justice and Welfare Party
    won 31 and 21 seats respectively, while the ruling Kulmiye Peace, Unity, and Development
    Party won 30 seats. The victorious oppositional parties subsequently announce
    that they will form a government together. (Al Jazeera English)
  - 2021 Mexican legislative election
  - Mexican voters head to the polls to elect a new session to the Chamber of Deputies.
    Analysts predict that while President Andrés Manuel López Obrador's party National
    Regeneration Movement will lose seats, his coalition will retain an overall majority.
    The lead-up to the election saw considerable violence, with at least 89 politicians,
    including 35 candidates, killed in the past 200 days. (Al Jazeera English)
  - 2021 U.S. Women's Open
  - In golf, 19-year-old Yuka Saso of the Philippines wins this year's championship
    at the Olympic Club in San Francisco, California, after coming back from two double-bogeys
    to beat Japan's Nasa Hataoka in the third hole of a sudden death playoff. Saso
    is the first Filipino player to win a major golf championship and equals South
    Korea's Inbee Park as the youngest champion of the U.S. Women's Open. (CNN International)
  - 2019–20 CONCACAF Nations League
  - The United States wins the inaugural edition of the CONCACAF Nations League, defeating
    Mexico in the final by a scoreline of 3–2 after extra time. (ESPN)
