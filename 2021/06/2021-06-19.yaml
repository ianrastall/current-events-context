Date: '2021-06-19'
Source_URI: Portal:Current events/2021 June 19
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - President Ashraf Ghani names Bismillah Khan Mohammadi as his new defense minister
    and Abdul Sattar Mirzakwal as the new interior minister, replacing their respective
    predecessors amid a deteriorating security situation, with foreign forces withdrawing
    from the country and the Taliban gaining territory, capturing six more districts.
    (DW)
  - Saudi Arabian-led intervention in Yemen
  - Saudi air defenses destroy six armed drones late in the evening, bringing the
    total of armed drones destroyed during the day to 17. A Houthi spokesman says
    that one drone was launched at Khamis Mushait while the Saudi air defenses say
    that two other drones toward Khamis Mushait were intercepted and that eight other
    drones were also launched toward the south of the kingdom. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Cambodia
  - Cambodia reports a record 20 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 414. (Bangkok Post)
  - COVID-19 pandemic in Laos
  - Laos extends its lockdown measures for another 15 days until July 4 as the number
    of community transmission cases of COVID-19 continue to increase. (The Laotian
    Times)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 14 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 439. (Xinhuanet)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Indiana
  - Indiana reports its first case of the Delta variant of COVID-19. (WTHR-TV)
  - COVID-19 pandemic in Brazil
  - Brazil surpasses 500,000 deaths from COVID-19, becoming the second country to
    do so after the United States. (DW)
  - COVID-19 pandemic in Fiji
  - Fiji reports a record 150 new cases of COVID-19 in the past 24 hours, thereby
    bringing the national toll to 1,798. The Ministry of Health reports that most
    cases are from known clusters while others are under investigation. Also, Australia
    and New Zealand announce that they will deploy doctors to Fiji to help deal with
    the increase in the number of COVID-19 cases. (RNZ) (FBC News)
  - Australia–China relations
  - Australia begins lodging a formal complaint against China with the World Trade
    Organization over anti-dumping duties on imported Australian wine. (The Guardian)
  - Six people are critically wounded as a man intentionally drove his pickup truck
    into a group of cyclists taking part in a charity bike ride in Show Low, Arizona.
    The driver is shot and arrested. The motive behind the attack is unknown so far.
    (BBC News)
  - 2021 Brazilian protests
  - As Brazil reaches 500,000 deaths due to COVID-19, demonstrations are held in hundreds
    of Brazilian cities and by Brazilians abroad. Protestors are critical of President
    Jair Bolsonaro's handling of the pandemic and demand his impeachment. (The Guardian)
  - 2021 Iranian presidential election
  - Rival candidates concede victory to hardline Chief Justice Ebrahim Raisi, who
    was widely predicted to be the next president. An official from the Interior Ministry
    claims that Raisi won 17.8 million votes out of the 28 million votes cast. (Reuters)
  - 2021 Myanmar protests
  - Protesters against the military junta carry out a national day of "flower protest"
    to celebrate the 76th birthday of deposed leader Aung San Suu Kyi and condemn
    her arrest. The flower symbol was allegedly chosen because Suu Kyi is often seen
    with a flower on her head. Protests supporting the military junta led by Min Aung
    Hlaing also occur across the country. (DW)
  - 2021 Peruvian general election
  - Supporters of Pedro Castillo and Keiko Fujimori gather following the election.
    Castillo supporters call for his win to be upheld, while Fujimori supporters call
    for the results to be overturned. (Al Jazeera)
