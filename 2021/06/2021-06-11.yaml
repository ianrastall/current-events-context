Date: '2021-06-11'
Source_URI: Portal:Current events/2021 June 11
Intelligence_Payload:
  Uncategorized:
  - 2020–22 North American drought
  - Lake Mead drops to its lowest water level ever recorded. (MSN)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Pennsylvania
  - COVID-19 pandemic in Philadelphia
  - Philadelphia lifts its mask mandate and COVID-19 restrictions. However, people
    who are not fully vaccinated are encouraged to wear masks. (WHTM-TV)
  - COVID-19 pandemic in New Jersey
  - New Jersey reports 400 hospitalizations due to COVID-19, the lowest number in
    eight months. (NJ)
  - The death toll from COVID-19 surpasses 600,000. The United States accounts for
    16% of COVID-related deaths worldwide. (The Washington Post)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Manitoba
  - Manitoba surpasses one million doses of the COVID-19 vaccine administered. (CTV
    News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in the Philippines
  - Fully vaccinated senior citizens will be permitted to go out in areas placed under
    the General Community Quarantine and Modified General Community Quarantine. (Rappler)
  - The Inter-Agency Task Force for the Management of Emerging Infectious Diseases
    announces that gyms, museums, and other establishments in the Greater Manila Area
    will be allowed to reopen. (ABS-CBN News and Current Affairs)
  - COVID-19 pandemic in Malaysia, Malaysian movement control order
  - The government announces the extension of its nationwide total lockdown for another
    two weeks from June 15 to June 28 as the number of COVID-19 cases in the country
    continues to remain high. (CNA)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka surpasses 2,000 deaths from COVID-19 after a record 101 deaths are reported
    in the past 24 hours. (The Times of India)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - Travel restrictions related to the COVID-19 pandemic
  - The Robert Koch Institute removes dozens of countries, including the United States,
    Canada, Austria, and Lebanon, from its travel risk list due to low COVID-19 infection
    rates. Foreign Minister Heiko Maas later announces that most of the countries
    still on the list will be removed on July 1. (Deutsche Welle)
  - COVID-19 pandemic in Italy
  - COVID-19 vaccination in Italy
  - Italy suspends the use of the Oxford-AstraZeneca vaccine in people under the age
    of 60 nationwide following the death of an 18-year-old girl yesterday and reports
    of other young people who have been hospitalized in critical condition after receiving
    their first dose of the vaccine. The Moderna and Pfizer vaccines will be used
    for the vaccination of people under the age of 60, including for people who already
    received a first dose of the AstraZeneca vaccine. (Euronews)
  - COVID-19 pandemic in Greece
  - Greece reports its first case of the Lineage P.1 Gamma variant that originated
    in Brazil. (Greek Reporter)
  - COVID-19 pandemic in Russia
  - Russia reports 12,505 new cases of COVID-19 in the past 24 hours, which is the
    highest daily total since February, thereby bringing the nationwide total of confirmed
    cases to 5.18 million. (Reuters)
  - COVID-19 pandemic in Australia
  - Lockdown restrictions are eased in Melbourne after a decrease in COVID-19 cases.
    Schools and businesses reopen in a limited capacity. People are allowed to travel
    up to from their homes and hold public gatherings of up to 10 people. However,
    most home visits remain banned and masks are still mandatory in indoor settings.
    Restrictions are eased further in regional Victoria, where gyms are reopened and
    private gatherings of up to two people and public gatherings of up to 20 people
    are allowed. (The Guardian)
  - 2019–2021 polio outbreak in the Philippines
  - The World Health Organization and UNICEF declare the end of the polio epidemic
    in the Philippines. (Xinhua News Agency)
  - 2021 United Nations Security Council election
  - Gabon, the United Arab Emirates, Brazil, Ghana and Albania are elected non-permanent
    members of the United Nations Security Council for the 2022–2023 term. (Reuters)
  - Malawi–South Africa relations
  - The South Africa Department of International Relations orders several Malawian
    diplomats and their families to leave within 72 hours after police found they
    were illegally selling duty-free alcohol. (Al Jazeera English)
  - The 47th G7 summit begins in Cornwall, England. It will run until June 13. (CNBC)
  - Former Costa Rican Vice President Rebeca Grynspan is named the new Secretary-General
    of the United Nations Conference on Trade and Development. (United Nations Conference
    on Trade and Development)
  - Aftermath of the 2021 United States Capitol attack
  - Chicago Police officer Karol Chwiesiuk is arrested for allegedly breaking into
    U.S. Senator Jeff Merkley (D-OR)'s office during the attack on the United States
    Capitol. (Chicago Tribune)
  - Amnesty International reports that Algerian authorities arrested two journalists
    and a prominent activist days before the legislation election, as part of a wider
    crackdown on Hirak supporters. (Al Jazeera English)
  - Security research firm NordLocker publishes a report on an anonymous trojan virus
    program that has stolen 1.2 terabytes of login credential information and personally
    identifiable information from 26 million users between 2018 and 2020. The login
    credentials were stored in a cloud database and ranged across a large selection
    of website types from almost a million websites including Amazon, eBay, Facebook,
    Twitter, Walmart, Apple, Paypal, Gmail, Netflix, and Steam. The malware also targeted
    stored files in desktops and Downloads folders. Over 6 million files were stolen,
    with 50% being text files, 1 million images, and 650,000 Word or PDF files. The
    malware also took screenshots and images of users with their own webcams. (MSN)
    (Fox Business)
  - 2021 Peruvian general election
  - Vladimir Cerrón, leader of the socialist Free Peru party, claims victory for leftist
    candidate Pedro Castillo as vote counting approaches an end with more than 99.5%
    of votes counted and with Castillo more than 60,000 votes ahead of right-wing
    candidate Keiko Fujimori. Some countries in the region have already congratulated
    Castillo on his apparent presidential election win. (Reuters)
  - The Organization of American States says that they have found no evidence of voting
    irregularities in the election. However, they also called for candidates not to
    be proclaim themselves as winners until all challenges have been resolved. (BBC
    News)
  - Viktor Sheiman, who served as head of the Presidential Administration of Belarus,
    resigns. Belarusian President Alexander Lukashenko accepts his resignation. (Belarusian
    Telegraph Agency)
  - Discoveries of exoplanets
  - A group of scientists from NASA's Jet Propulsion Laboratory and the University
    of New Mexico announces that water clouds are discovered on TOI-1231 b, a Neptune-like
    exoplanet that is located 90 light-years away from Earth. (CBS News)
  - COVID-19 misinformation
  - YouTube announces that it has temporarily suspended U.S. Senator Ron Johnson (R-WI)
    for violating its policies about promoting unproven alternative therapies to treat
    COVID-19. (NBC News)
  - The investigation into Gansu ultramarathon disaster in China, which resulted in
    21 died of hypothermia in May 2021, is released. Investigators say the incident
    was caused by extreme weather and unprofessional organization. (Al Jazeera English)
  - The UEFA Euro 2020 tournament begins with the opening match between Italy and
    Turkey in Rome, ending in a 3–0 victory for Italy. (BBC Sport)
