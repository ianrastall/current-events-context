Date: '2021-02-25'
Source_URI: Portal:Current events/2021 February 25
Intelligence_Payload:
  Uncategorized:
  - Yemeni Civil War
  - Ma'rib Campaign
  - Houthi forces attack Ma'rib, with ballistic missiles amidst an ongoing offensive
    to capture the city. (Al Arabiya English)
  - 2021 Kaduna and Katsina attacks
  - Gunmen kill 36 people, wound several others, and burn down houses when they attack
    two villages in Kaduna and Katsina States, Nigeria. Several attackers are also
    killed during an air operation by security forces. (Al Jazeera)
  - 2021 Armenian coup d'état attempt, 2020−2021 Armenian protests
  - Prime Minister Nikol Pashinyan warns of an attempted military coup against him
    after the army demands that he and his government resign. In response, Pashinyan
    dismisses the head of the general staff of the armed forces and calls on his supporters
    to rally in his support. (Reuters)
  - Central African Republic Civil War
  - At least 14 people are killed at a religious site in Bambari, Central African
    Republic, amid clashes between armed groups and security forces. (Al Jazeera)
  - Mali War
  - Nine soldiers are killed and nine others are wounded during a long exchange of
    fire with armed groups in Bandiagara, Mali. (Al Jazeera)
  - 2021 Myanmar protests
  - Pro-military counter-protesters attack anti-coup protesters during a rally against
    the military junta in Yangon. Some counter-protesters were armed with knives and
    clubs, while others used slingshots and threw stones to attack their opponents.
    (Voice of America)
  - At U.S. President Joe Biden's direction, the U.S. military launches airstrikes
    against Iranian-backed militia group Kata'ib Hezbollah's structures in Abu Kamal,
    Syria, killing 17 Popular Mobilization Forces militants. The airstrikes are described
    as retaliation for a recent rocket strike in Erbil, Iraq, which left two people
    dead and 13 others wounded, including American military personnel. (Al Jazeera)
  - Ituri conflict
  - Seven civilians are killed by CODECO militiamen in Banyari Kilo sector, Djugu
    Territory, Democratic Republic of the Congo. (Radio Okapi)
  - 2021 Fukushima earthquake
  - A man in his 50s is confirmed to be the first fatality of the February 13 earthquake
    that struck near Fukushima, Japan, after his body is found buried in his destroyed
    home. (Kyodo News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Croatia
  - The government confirms that bars, cafés, and restaurants can reopen their outdoor
    terraces on March 1. (The Dubrovnik Times)
  - COVID-19 pandemic in Cyprus
  - Cyprus announces that it will allow high schools, gyms, and indoor sports facilities
    such as swimming pools to reopen on March 1 as the number of COVID-19 cases continue
    to decrease. (France 24)
  - COVID-19 pandemic in the Czech Republic, 501.V2 variant
  - The Czech Republic reports their first cases of the 501.V2 variant first detected
    in South Africa in a group of people who travelled to Zanzibar. (Radio Prague
    International)
  - COVID-19 pandemic in Finland
  - Prime Minister Sanna Marin announces "tier-two" lockdown restrictions for the
    next three weeks, which includes the closure of bars and restaurants, expanded
    remote learning, and a ban on gatherings of more than six people beginning March
    8 due to the spread of the Lineage B.1.1.7 variant. (Yle)
  - COVID-19 pandemic in Hungary
  - Hungary extends their nationwide lockdown restrictions until March 15 due to an
    increase in the number of COVID-19 cases and the spread of variants of SARS-CoV-2.
    (Hungary Today)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland reports its first case of the B.1.525 variant first detected in Nigeria.
    (Independent.ie)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bahrain
  - Bahrain becomes the first country to approve the single-dose Johnson & Johnson
    vaccine for emergency use. It is also the fifth vaccine to be approved in the
    country. (Arab News)
  - COVID-19 pandemic in mainland China
  - The National Medical Products Administration grants conditional approval for a
    single-dose vaccine made by CanSino Biologics and a vaccine made by Sinopharm.
    (ABC News)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka receives 500,000 doses of the Oxford–AstraZeneca vaccine from India.
    (The Hindu)
  - COVID-19 pandemic in Syria
  - Syria's health ministry confirms that the government has received COVID-19 vaccines
    from an unnamed "friendly country", adding that healthcare workers will be the
    first to be vaccinated beginning next week. (AP)
  - COVID-19 pandemic in Algeria, Lineage B.1.1.7
  - Algeria reports their first two cases of the Lineage B.1.1.7 variant in a healthcare
    worker from Algiers and a person who traveled to France. (Reuters)
  - COVID-19 pandemic in Argentina
  - Argentina receives the first shipment of 904,000 doses of Sinopharm's BBIBP-CorV
    vaccine. (Buenos Aires Times)
  - COVID-19 pandemic in Belize, Lineage B.1.1.7
  - Belize reports their first case of the Lineage B.1.1.7 variant in a member of
    the British Army Training Support Unit Belize who has been infected with this
    variant. (Breaking Belize News)
  - 2020–21 H5N8 outbreak
  - Afghanistan reports an outbreak of highly pathogenic H5N8 bird flu on a poultry
    farm in Herat Province. (Hindustan Times)
  - Western Cape reports their first case of African Swine Fever at two small farms
    in Mfuleni, Eerste River in Cape Town, South Africa. (News24)
  - India–Pakistan relations
  - India and Pakistan issue a joint statement indicating that both sides agree to
    stop firing at each other at the disputed Line of Control border in Kashmir. (DW)
  - Uyghur genocide, China–Netherlands relations
  - The Dutch House of Representatives votes to recognize the Chinese government's
    treatment of its Uyghur Muslim minority as genocide, becoming the first European
    Union country to do so. (Reuters)
  - The governing body of the International Civil Aviation Organization appoints Juan
    Carlos Salazar of Colombia as the new Secretary-General of the Organization succeeding
    Fang Liu of China. (ICAO)
  - LGBTQ rights in Malaysia, judiciary of Malaysia
  - The Federal Court, in a landmark decision, unanimously declares that Selangor's
    sharia law provision on "unnatural sex" is invalid and unconstitutional, as such
    offences fall under the jurisdiction of federal law. (Malay Mail) (CNA)
  - Tax returns of Donald Trump
  - Former U.S. President Donald Trump's tax returns are given to New York County
    District Attorney Cyrus Vance Jr. (ABC News)
  - USA Gymnastics sex abuse scandal
  - Former USA Gymnastics coach John Geddert dies from suicide by a self-inflicted
    gunshot wound off Interstate 96 in Michigan, shortly after being charged with
    human trafficking and sexual assault of a minor. (BBC News)
  - 2021 Croix-des-Bouquets jailbreak
  - Notable gang leader Arnel Joseph and other detainees escape from prison in Croix-des-Bouquets,
    Haiti, during a riot that also resulted in the death of eight people inside the
    jail, including the prison's director. Casualties are also reported in the city's
    streets. (Al Jazeera)
  - LGBTQ rights in the United States
  - The United States House of Representatives votes to pass the Equality Act. The
    bill will now head to the Senate for a vote. (NBC News)
  - Facebook bans all accounts related to Myanmar's military, the Tatmadaw, as well
    as ads from military-controlled companies following the military coup against
    Aung San Suu Kyi and the military seizure of power on February 1. (CBS News)
  - 2020 Campeonato Brasileiro Série A
  - Despite losing the last match 2–1 to São Paulo, Flamengo wins their seventh Brasileirão
    and eighth national championship overall. (UOL)
