Date: '2021-02-06'
Source_URI: Portal:Current events/2021 February 6
Intelligence_Payload:
  Uncategorized:
  - Internal conflict in Myanmar
  - An ambush on a convoy by suspected MNDAA insurgents in Shan State, Myanmar, kills
    nine civilians and three policemen, and injures 13 others. (ANI News)
  - Tigray War
  - The United Nations says that the Ethiopian government is blocking aid from going
    to 2.3 million people in non-government-controlled rural areas in Tigray who are
    in dire need of assistance. (VOA)
  - War in Afghanistan
  - A bombing targeting a Hindu shop in Kabul, Afghanistan, kills three people. Attacks
    against Hindu and Sikh minorities increased in the country in the last years,
    mainly by Islamic State militants. (Gandhara)
  - Economy of Cuba
  - The Cuban Council of Ministers approves a measure authorizing private activity
    in most sectors. (AFP via CTV News)
  - Eleven people are dead and three others have been rescued after their wooden boat
    overturns in a lake in Susong County, in east China's Anhui province. (Sina)
  - Four skiers are killed and four others are injured in an avalanche in Millcreek
    Canyon, Utah, United States. (KSTU-TV)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Missouri
  - Missouri reports its first case of B.1.1.7 variant of SARS-CoV-2 in an adult from
    Marion County. (KMOV-TV)
  - COVID-19 pandemic in Canada
  - Canada surpasses 800,000 cases of COVID-19. (CP24)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in mainland China
  - China's National Medical Products Administration gives a conditional approval
    to Sinovac's Coronavac vaccine for general use. (France 24)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 61 new cases in the past 24 hours, bringing the nationwide
    total of confirmed cases to 1,989. (Xinhua)
  - COVID-19 pandemic in Myanmar
  - Myanmar approves the use of the Sputnik V vaccine developed by Russia. (Sputnik
    V)
  - COVID-19 pandemic in South Korea
  - The government eases the restrictions on business operating hours outside of the
    Seoul Capital Area, allowing those businesses to operate until 10 p.m. local time
    amid a backlash over prolonged restrictions. (The Korea Herald)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - Italy signs a decree authorizing the emergency use of monoclonal antibodies to
    treat COVID-19 patients. (Reuters)
  - COVID-19 pandemic in the Netherlands
  - The Netherlands surpasses one million cases of COVID-19. (NL Times)
  - Immigration policy of the Joe Biden administration
  - U.S. President Joe Biden suspends and initiates the process to terminate the Trump-era
    "Asylum Cooperative" agreements with El Salvador, Guatemala and Honduras. (Reuters)
  - The leaders of Palau, the Federated States of Micronesia, Nauru, Kiribati, and
    the Marshall Islands will meet on Monday to discuss leaving the Pacific Islands
    Forum after Marshallese candidate Gerald Zackios was not chosen as Secretary-General.
    Palau had earlier announced that it was leaving the forum. (RNZ)
  - Moussa Faki is re-elected as Chairperson of the African Union Commission. (AFP
    via Al-Ahram)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - Governor Gavin Newsom issues revised COVID-19 mitigation guidelines for churches
    after the U.S. Supreme Court lifts the state's ban on indoor worship in areas
    hardest hit by the pandemic. The new guidelines limit indoor services to 25 percent
    of the church's capacity in hard-hit areas and restricts indoor singing and chanting.
    (ABC News)
  - 2021 Myanmar coup d'état
  - An Australian economic advisor to Aung San Suu Kyi reveals that he has been detained
    by the Tatmadaw. He is the first foreign national confirmed to be in the custody
    of Myanmar's military. (AFP via The Star)
  - After a juggler is shot dead by a Carabinero, several protests are held in Panguipulli,
    southern Chile. The protests escalate into riots and several buildings, including
    the city hall, are burned. (The New York Times)
  - Egypt frees Al Jazeera journalist Mahmoud Hussein after four years in detention.
    He had been held on charges of spreading false news, joining a banned group and
    receiving foreign funds. (VOA)
  - French religious sister Nathalie Becquart is named by Pope Francis one of the
    Undersecretaries of the Synod of Bishops, becoming the first woman to reach that
    office and having a right to vote in the Synod. (CNN)
  - Censorship in Myanmar, aftermath of the 2021 Myanmar coup d'état
  - The military junta shuts down the country's internet with a near-total blackout
    in effect amid growing protests against the coup. (BBC News)
  - 10th Annual NFL Honors
  - In American football, Green Bay Packers quarterback Aaron Rodgers wins his third
    MVP award, making him the sixth player to do so after Jim Brown, Brett Favre,
    Johnny Unitas, Peyton Manning, and Tom Brady. (National Post) (Bleacher Report)
