Date: '2021-11-07'
Source_URI: Portal:Current events/2021 November 7
Intelligence_Payload:
  Uncategorized:
  - Attempted assassination of Mustafa Al-Kadhimi
  - A drone is launched against the Baghdad home of Iraqi prime minister Mustafa al-Kadhimi,
    injuring six members of his security personnel. Al-Kadhimi survives the assassination
    attempt. (Reuters)
  - Aftermath of the October 2021 Sudanese coup d'état
  - Protests continue nationwide and an intensive civil disobedience movement begins
    in cities across the country, as pressure mounts on the military to transfer power
    back to civilian leaders. Police use tear gas to disperse the crowds. (Deutsche
    Welle)
  - Niger gold mine collapse
  - At least 18 people are killed during the collapse of an artisanal gold mine in
    Dan Issa, Maradi Region. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Serbia
  - President Aleksandar Vucic receives a booster dose of the COVID-19 vaccine at
    the Belgrade Fair. (N1)
  - COVID-19 pandemic in Ukraine, COVID-19 vaccination in Ukraine
  - Ukraine receives 2,930,300 doses of the Moderna COVID-19 vaccine distributed through
    the COVAX initiative. (UNICEF)
  - COVID-19 pandemic in the United Kingdom
  - Health secretary Sajid Javid urges citizens to get a booster dose and continue
    to follow COVID-19 restrictions over Christmas, amid an increase in the number
    of cases in the country. (Politico)
  - COVID-19 pandemic in Japan
  - Japan reports no deaths from COVID-19 in the past 24 hours for the first time
    since August 2020. (Asian News International)
  - 2021 Nicaraguan general election
  - Nicaraguans head to the polls to elect their president. Incumbent Daniel Ortega
    seeks his fourth term despite condemnation of the election by the international
    community due to many opposition candidates being arrested and imprisoned. (CNN)
  - 2021 NASCAR Cup Series
  - Kyle Larson wins the 2021 NASCAR Cup Series championship. It is Larson's first
    career championship in NASCAR Cup competition. (NBC Sports)
