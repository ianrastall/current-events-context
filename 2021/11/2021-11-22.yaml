Date: '2021-11-22'
Source_URI: Portal:Current events/2021 November 22
Intelligence_Payload:
  Uncategorized:
  - Tigray War; Oromo conflict
  - TDF–OLA joint offensive
  - Ethiopian Prime Minister Abiy Ahmed, a former soldier, announces that he will
    lead his country's army from the battlefront beginning tomorrow. (The Washington
    Post)
  - Insurgency in the Maghreb
  - Gunmen open fire at a security post in Sanmatenga, Burkina Faso, killing ten civilians
    and nine gendarmes. Another person is injured and a healthcare center is burned.
    (The Washington Post)
  - 2021 United Kingdom natural gas supplier crisis
  - Bulb Energy, which supplies 1.7 million customers in the United Kingdom, collapses
    into administration, becoming the largest energy supplier to have ever collapsed.
    The company will also be the first energy supplier to be placed under "special
    administration", which means that the company will be run by the government regulator
    Ofgem. (The Guardian)
  - Nine people die in a fire at a nursing home in the village of Royak, Dalgopol
    Municipality, Bulgaria. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austria enters its fourth full nationwide lockdown that prohibits people from
    leaving their home except for specific reasons, while allowing schools to remain
    open, in order to reduce the number of new COVID-19 cases. (AP)
  - COVID-19 pandemic in France
  - Prime Minister Jean Castex tests positive for COVID-19. (Reuters)
  - COVID-19 pandemic in Greece
  - Greece begins to implement measures that ban people who are unvaccinated or who
    have not recovered from COVID-19 from entering indoor public places and also mandates
    the wearing of masks in all workplaces in order to reduce the spread of COVID-19.
    (Ekathimerini)
  - COVID-19 pandemic in Slovakia
  - Slovakia imposes a lockdown for those who are unvaccinated against COVID-19, which
    prevents them from entering non-essential shops. Slovakia is currently experiencing
    one of the world's highest infection rates. (Medical Xpress)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Israel, COVID-19 vaccination in Israel
  - Israel begins administering the Pfizer–BioNTech COVID-19 vaccine for children
    between the ages of 5 and 11 years. (The Times of Israel)
  - COVID-19 pandemic in Singapore
  - Singapore partially eases its social gathering restrictions and will allow up
    to five vaccinated people to dine in at food and drink establishments, hawker
    centres, and coffee shops as the country moves to the endemic phase due to a decrease
    in the number of new COVID-19 cases. (Singapore Business Report)
  - COVID-19 pandemic in Kenya
  - The Kenyan government approves a measure requiring people to present proof of
    vaccination in order to enter businesses, restaurants and government offices.
    This is also to encourage vaccination in a country where only 5% of the population
    is vaccinated. (The New York Times)
  - Bulgaria–United States relations, Bulgaria–Russia relations
  - The United States expresses a "deep concern" over Bulgarian President Rumen Radev's
    remarks, where he referred to Crimea as "Russian". Radev has expressed his views
    of maintaining "pragmatic ties" with Russia. The statement by the United States
    comes after Ukraine summoned the Bulgarian ambassador to Kyiv three days ago.
    (RFE/RL)
  - Aftermath of the 2021 Venezuelan regional elections
  - Opposition leader Juan Guaidó calls for unity and to rebuild the opposition's
    fragmented strategy, after suffering a heavy loss at the regional elections and
    losing 20 gubernatorial races to the ruling United Socialist Party of Venezuela.
    (Reuters)
