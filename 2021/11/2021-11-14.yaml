Date: '2021-11-14'
Source_URI: Portal:Current events/2021 November 14
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Gunmen open fire at a military post near a gold mine in Inata, Soum Province,
    Burkina Faso, killing 19 gendarmes and a civilian. (Al Jazeera)
  - Liverpool Women's Hospital bombing
  - A passenger is killed and his driver injured when a taxi explodes in front of
    the Liverpool Women's Hospital in Liverpool, England. Three men are subsequently
    arrested under the Terrorism Act. (BBC News)
  - Syrian civil war
  - A bomb explodes near a vehicle carrying troops in Deir ez-Zor, Syria, killing
    four soldiers and a general. (The New Arab)
  - Somali Civil War; Capital punishment in Somalia
  - Two Ugandan soldiers are sentenced to death and three more receive 39-year prison
    sentences in Somalia for killing seven civilians during a gun battle in Golweyn,
    Lower Shabelle, three months ago. (BBC News)
  - Astroworld Festival crowd crush
  - A 9-year-old boy, injured during a crowd crush at the Astroworld Music Festival,
    who had been in a medically-induced coma, dies, bringing the death toll to 10.
    (CNN)
  - European migrant crisis
  - Eight sub-Saharan African migrants are found dead on a boat adrift off the southern
    coast of the Canary Islands, with 54 other men being rescued from the boat. (El
    País)
  - A fire at a COVID-19 ward in Sliven, Bulgaria, kills three patients. (ABC News)
  - A magnitude 6.5 earthquake strikes Hormozgan Province, Iran, at a depth of and
    is felt in many southern Iranian cities. A man killed by a falling pole is the
    sole death reported. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Austria
  - Chancellor Alexander Schallenberg announces a nationwide lockdown for those over
    the age of 12 years who are unvaccinated against COVID-19, which prohibits them
    from leaving their homes except for essential reasons beginning at midnight, amid
    a record increase in new COVID-19 cases. (AP)
  - COVID-19 pandemic in Egypt, COVID-19 vaccination in Egypt
  - The Egyptian government announces the start of clinical trials for COVI-VAX, which
    is the country’s first domestically-made COVID-19 vaccine. (Ahram Online)
  - COVID-19 pandemic in Israel, COVID-19 vaccination in Israel
  - The Israeli Health ministry approves the usage of the Pfizer–BioNTech COVID-19
    vaccine for children aged 5 to 11, two weeks after the U.S. FDA grants its own
    approval, with vaccination expected to begin next week. (Haaretz)
  - COVID-19 pandemic in Peru
  - Peru announces that people over the age of 18 years who want to enter indoor spaces
    must show a proof of full vaccination against COVID-19 beginning in December,
    either physical or virtual vaccination cards. (AFP via Barron's)
  - 2021 Bulgarian general election
  - Bulgarians go to the polls to elect the President and the National Assembly. (MSN)
  - 2021 Argentine legislative election
  - Argentines go to the polls to elect members of the Chamber of Deputies and the
    Senate. (24/7 News Agency)
