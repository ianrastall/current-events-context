Date: '2021-11-25'
Source_URI: Portal:Current events/2021 November 25
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - November 2021 Mogadishu bombing
  - A car bombing targeting a UN convoy explodes outside a school in Mogadishu, killing
    eight people and injuring 17 others. Jihadist group al-Shabaab claims responsibility
    for the attack. (Al Jazeera)
  - Piracy in the Gulf of Guinea
  - Royal Danish Navy frigate HDMS Esbern Snare opens fire and kills four pirates
    in the Gulf of Guinea after being fired upon. Four other pirates are detained
    and taken aboard by Frogman Corps. The incident took place 25 to 30 nautical miles
    south of the territorial boundary of Nigeria. (Reuters)
  - At least 35 people are killed during an eight-day fight over a dispute about camel
    looting between herders in Jebel Moon, Darfur, Sudan. Sixteen villages and thousands
    of homes are also set on fire. (Al Jazeera)
  - Listvyazhnaya mine disaster
  - A fire inside a coal mine in Kemerovo Oblast, Russia, traps 285 miners underground.
    Forty-six miners are killed and 49 others are being treated for smoke inhalation
    in hospital. Five rescuers later die while searching for trapped miners, bringing
    the total death toll to 51. (DW) (CBC)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Spain
  - The High Court of Justice of Catalonia approves the use of the COVID-19 immunity
    passport for restaurants, bars and fitness centers in the region. (El País)
  - Establishments in Aragon, such as restaurants and nightclubs, begin requiring
    certificates of immunity for entry. (Expansión)
  - COVID-19 pandemic in the Czech Republic
  - The government declares a 30-day state of emergency and imposes new measures that
    will require bars and restaurants to close at 10 p.m., bans alcohol consumption
    at bars and restaurants, restricts the number of people at gatherings and events
    and bans Christmas markets. These measures will take effect tomorrow. (Radio Prague
    International)
  - COVID-19 pandemic in France
  - The French Minister of Social Affairs and Health announces a nationalized plan
    to provide a third booster dose of the COVID-19 vaccines to all adults beginning
    on 27 November, instead of enacting another nationwide state of lockdown in order
    to reduce the currently record-breaking spread of COVID-19. (Associated Press)
  - COVID-19 pandemic in Germany
  - Germany surpasses 100,000 deaths from COVID-19 and also reports a record 75,961
    new cases of COVID-19 in the past 24 hours. (ABC News)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom surpasses 10 million cases of COVID-19. (ITV News)
  - European Union response to the COVID-19 pandemic
  - Travel during the COVID-19 pandemic
  - The European Commission issues recommendations that the issuance of the EU Digital
    COVID Certificate be shortened to nine months with a requirement to receive a
    booster dose. Furthermore, the commission recommends the acceptance of all COVID-19
    vaccines listed under the Emergency Use Listing by the World Health Organization,
    including Chinese and Indian-produced vaccines. (Reuters)
  - COVID-19 vaccine
  - The European Medicines Agency officially approves the use of the Pfizer–BioNTech
    COVID-19 vaccine for children between the ages of 5 and 11 years, becoming the
    first vaccine to be approved for these age groups in Europe. (Associated Press)
  - COVID-19 pandemic in Australia, COVID-19 vaccination in Australia
  - COVID-19 pandemic in Victoria
  - The number of people who have received a second dose of the COVID-19 vaccine in
    Victoria surpasses 90%. (7 News)
  - COVID-19 pandemic in Argentina, COVID-19 vaccination in Argentina
  - Argentina receives 2.5 million doses of the COVID-19 vaccine, which includes 1.1
    million doses of the Pfizer–BioNTech COVID-19 vaccine and 1.3 million doses of
    the Oxford–AstraZeneca COVID-19 vaccine. (ANDigital)
  - COVID-19 pandemic in Laos
  - Laos reports a record 1,504 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 67,322. (The Laotian Times)
  - COVID-19 pandemic in South Africa, SARS-CoV-2 Omicron variant
  - South African scientists detect a new COVID-19 variant named Lineage B.1.1.529
    that poses a "major threat" to efforts to reduce the spread of the virus, and
    blames the variant for the exponential rise of new cases in the country. (Deutsche
    Welle)
  - The latest quinquennial National Family Health Survey in India finds that the
    population's total fertility rate has dropped to a point below the key replacement
    rate for the first time in the nation's history. (The Washington Post)
  - COVID-19 pandemic in Israel, COVID-19 pandemic in Africa, Travel restrictions
    related to the COVID-19 pandemic
  - Israel bans entry of travellers from South Africa, Lesotho, Botswana, Zimbabwe,
    Mozambique, Namibia and Eswatini and discourages its citizens from travelling
    to those countries due to the emergence of the Lineage B.1.1.529 variant. (Reuters)
  - Turkey–United Arab Emirates relations
  - Turkey and the United Arab Emirates sign several investment accords during a high-level
    visit to Ankara by Abu Dhabi Crown Prince Mohammed bin Zayed Al Nahyan, including
    a $10 billion investment fund to support the Turkish health and energy sectors.
    The Turkish and Emirati central banks also sign a cooperation agreement. (Reuters)
  - 2021 Solomon Islands unrest
  - Rioters demanding the resignation of Solomon Islands Prime Minister Manasseh Sogavare
    set fire to buildings in Honiara's Chinatown neighborhood. Protesters have been
    defying a 36-hour lockdown imposed following unrest yesterday. (The Guardian)
  - Australia announces that it will deploy federal police and Australian Defence
    Force personnel to Honiara to aid with riot control and to secure infrastructure
    sites following a formal request for help from Prime Minister Sogavare. (SBS News)
    (Solomon Times)
  - Opposition leader Matthew Wale calls on the prime minister and his government
    to resign. (Solomon Times)
  - Blasphemy in Pakistan
  - Four Muslim men are charged with blasphemy, after arguing with an Imam who refused
    to make a funeral announcement for a Christian man in the village of Khodi Khushal
    Singh, Punjab, Pakistan. (Al Jazeera)
  - 2021 Romanian political crisis
  - The Parliament of Romania votes the investiture of Prime Minister Nicolae Ciucă's
    grand coalition cabinet, thereby ending nearly the political crisis. (Politico)
