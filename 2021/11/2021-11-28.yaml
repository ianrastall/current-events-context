Date: '2021-11-28'
Source_URI: Portal:Current events/2021 November 28
Intelligence_Payload:
  Uncategorized:
  - Islamic State insurgency in Iraq
  - Five Peshmerga fighters are killed and four more are wounded during a shooting
    and bombing attack by the Islamic State in Diyala. (Al Jazeera)
  - 2020–2021 Ethiopian–Sudanese clashes
  - Six Sudanese soldiers are killed during a confrontation with Ethiopian troops
    in a disputed border region. (Al Jazeera)
  - Operation Barkhane
  - A convoy carrying French troops in Niger opens fire against locals in Téra, Tillabéri
    Region, who were protesting against the French presence in the country, killing
    two people and wounding 18 others. (The Guardian)
  - 2021 Northern Peru earthquake
  - A 7.5 magnitude earthquake strikes northern Peru at of depth, killing one person
    and injuring 12 others. 75 homes are destroyed and around 220 damaged. The earthquake
    is felt as far south as Lima. President Pedro Castillo orders the deployment of
    relief and also viewed the area in a military aircraft. (Infobae)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia bans foreigners who have travelled to South Africa, Botswana, Namibia,
    Zimbabwe, Lesotho, Mozambique, Eswatini and Nigeria in the past 14 days amid the
    emergence of the Omicron variant. (BBC News)
  - COVID-19 pandemic in Israel
  - Israel closes its borders to all foreigners and requires citizens who have travelled
    outside the country to quarantine for three days for fully vaccinated people and
    seven days for unvaccinated people as part of an effort to reduce the spread of
    the Omicron variant. (France 24)
  - COVID-19 pandemic in Maldives
  - Maldives bans entry to flights from South Africa, Botswana, Zimbabwe, Mozambique,
    Namibia, Lesotho, Malawi and Eswatini. (CNA)
  - COVID-19 pandemic in the Philippines
  - The Philippines bans entry to flights from Austria, Belgium, the Czech Republic,
    Hungary, Italy, the Netherlands and Switzerland. Additionally, the entry of fully
    vaccinated foreign nationals from green-list countries that was expected to begin
    on December 1 is temporarily suspended. (Rappler)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Morocco
  - The Moroccan government announces that it will suspend all incoming passenger
    flights for the next two weeks. (Al Jazeera)
  - COVID-19 pandemic in Rwanda
  - Rwanda temporarily suspends all commercial flights to Southern Africa due to the
    emergence of the Omicron variant. (The New Times)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Canada reports its first cases of the Omicron variant in two people in Ontario
    who recently traveled to Nigeria. (Reuters)
  - COVID-19 pandemic in the Netherlands
  - The Netherlands reports its first cases of the Omicron variant in 13 people who
    traveled from South Africa on November 26. (ABC News)
  - The Netherlands tightens its partial lockdown restrictions that require non-essential
    shops, sports facilities, and hospitality and cultural venues to close at 5 p.m.,
    and chemists, supermarkets, and wholesalers to close at 8 p.m., amid a record
    number of new COVID-19 cases as well as concerns about the Omicron variant. (BBC
    News)
  - COVID-19 pandemic in Australia
  - Australia reports its first cases of the Omicron variant in two people who travelled
    from Southern Africa and are currently in quarantine in a hotel in New South Wales.
    (ABC News Australia)
  - 2021 Iranian protests
  - Sixty-seven protesters are arrested in Isfahan during a protest against water
    shortages. (Deutsche Welle)
  - 2021 Czech legislative election
  - Petr Fiala is designated as Prime Minister of the Czech Republic to form a majority
    government following the October election. (Deutsche Welle)
  - 2021 Honduran general election
  - Hondurans go to the polls to elect their next President. (NPR)
  - 2021 Kyrgyz parliamentary election
  - Kyrgyzstan holds parliamentary elections after the annulment of the results of
    the October 2020 elections due to protests. (Al Jazeera)
  - Aftermath of the 2021 Icelandic parliamentary election
  - Prime Minister Katrín Jakobsdóttir's second cabinet takes office after reaching
    an agreement with the Left-Green Movement, the Independence Party and the Progressive
    Party. (Reuters)
