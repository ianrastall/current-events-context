Date: '2021-11-29'
Source_URI: Portal:Current events/2021 November 29
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian War
  - Turkey offers to mediate between Ukraine and Russia over the conflict between
    the two nations. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Portugal
  - Portugal reports its first cases of the SARS-CoV-2 Omicron variant in 13 people
    associated with Belenenses SAD football club. (AP)
  - COVID-19 pandemic in Spain
  - Spain reports its first case of the SARS-CoV-2 Omicron variant in a person who
    travelled from South Africa. (El Pais)
  - COVID-19 pandemic in Sweden
  - Sweden reports its first case of the SARS-CoV-2 Omicron variant in a person who
    travelled from South Africa. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Israel
  - Miss Universe France 2021, Clémence Botino, a contestant at the Miss Universe
    contest in Eilat, Israel, tests positive for COVID-19. (L'Independant)
  - COVID-19 pandemic in the Philippines, COVID-19 vaccination in the Philippines
  - The Philippines launches a campaign to vaccinate 9 million people in three days
    in order to achieve 70% vaccination target and to prevent the spread of the Omicron
    variant. (The Straits Times)
  - International aid related to the COVID-19 pandemic
  - COVID-19 pandemic in Angola, COVID-19 pandemic in Kenya, COVID-19 pandemic in
    Barbados
  - Argentina donates 780,000 doses of the Oxford–AstraZeneca COVID-19 vaccine to
    Angola, Kenya and Barbados, which have all detected cases of the Omicron variant.
    (LMDiario)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Michigan
  - Michigan reports 4,181 hospitalizations from COVID-19, a new single-day record.
    (The Detroit News)
  - History of COVID-19 vaccine development
  - BioNTech says that it is developing a vaccine to combat the Omicron variant. (Reuters)
  - Foreign relations of Turkey
  - Turkish President Recep Tayyip Erdoğan reveals his intentions to rebuild his country's
    ties with Egypt and Israel. (TRT World)
  - Holy See–Russia relations
  - Cardinal Miguel Ángel Ayuso Guixot, the president of the Pontifical Council for
    Interreligious Dialogue began a six-day journey to Russia on November 23. Guixot
    met with Orthodox, Muslim, civil leaders. The parties discussed religious liberty
    and other human rights of minorities. (Catholic World News)
  - 2021 Honduran general election
  - While votes are still being counted, both Xiomara Castro and Nasry Asfura declare
    that their respective tickets have won the presidential election. (Al Jazeera)
  - Magdalena Andersson is re-elected as Prime Minister of Sweden by the Riksdag after
    she resigned last week. (Euronews)
  - Jack Dorsey resigns as the CEO of Twitter and is succeeded by Chief technology
    officer Parag Agrawal. (CNBC)
  - Researchers from the National Autonomous University of Mexico discover two new
    antibiotic molecules inside the venom of a scorpion from the Diplocentrus genus,
    which may hold the properties to stop several different kinds of harmful bacteria
    and tumour cells. (The Yucatan Times)
