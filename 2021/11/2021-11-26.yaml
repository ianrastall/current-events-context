Date: '2021-11-26'
Source_URI: Portal:Current events/2021 November 26
Intelligence_Payload:
  Uncategorized:
  - 2021 Solomon Islands unrest
  - Australian Federal Police take control of the Solomon Islands capital of Honiara
    following three days of civil unrest. A nighttime curfew begins at 7:00 p.m. local
    time while rioting and looting continues in the Chinatown suburb of the city.
    (Reuters)
  - Three people are found dead at a burnt-out store in the Chinatown suburb in Honiara.
    (Al Jazeera)
  - Economic impact of the COVID-19 pandemic
  - Stocks and oil prices decline sharply amid growing concerns over the SARS-CoV-2
    Omicron variant. (FT) (CNBC)
  - 2021 Mexico bus crash
  - A passenger bus crashes on a highway in San José del Rincón, Mexico, killing 19
    people and injuring 32 others. (ABC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Belgium
  - Belgium reports its first case of the Omicron variant in an unvaccinated person
    who travelled abroad. (Reuters)
  - COVID-19 pandemic in the Czech Republic
  - The Czech Republic reports a record 27,717 new cases of COVID-19 in the past 24
    hours. (The Washington Post)
  - COVID-19 pandemic in France
  - France imposes mandatory mask wearing in all indoor venues and outdoor Christmas
    markets, even when a Health Pass is required for an event, due to an increase
    in COVID-19 cases, hospitalizations, and deaths. (Euronews)
  - COVID-19 pandemic in Germany
  - Germany reports a record for the third consecutive day of 76,414 new cases of
    COVID-19. (Anadolu Agency)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reports its first two cases of the Omicron variant in a man who had
    travelled from South Africa this month, and later in another man staying across
    the hall in the same quarantine hotel. (The New York Times)
  - COVID-19 pandemic in Israel
  - Israel reports its first case of the Omicron variant in a person who travelled
    from Malawi. (The Times of Israel)
  - COVID-19 pandemic in the Philippines, Travel during the COVID-19 pandemic
  - The Inter-Agency Task Force for the Management of Emerging Infectious Diseases
    approves the entry of fully-vaccinated foreign nationals from green-list countries
    beginning on December 1. (Philippine Daily Inquirer)
  - SARS-CoV-2 Omicron variant
  - The World Health Organization names the Lineage B.1.1.529 variant as "Omicron"
    and designates it as a "variant of concern" due to the variant's large number
    of mutations and an increased risk of reinfection. (The Hill)
  - Canada, the EU, Israel, Japan, Morocco, the Philippines, Singapore, Turkey, the
    UAE, the UK, and the U.S. ban flights from South Africa, Namibia, Zimbabwe, Botswana,
    Lesotho, Mozambique, Malawi, and Eswatini due to the Omicron variant. (CNN)
  - Russia–Ukraine relations
  - Ukrainian President Volodymyr Zelensky accuses Russia of plotting a coup against
    him and says that Ukrainian tycoon Rinat Akhmetov was being enlisted to help plan
    the coup. Zelensky says that his country "is prepared for any scenario" as tensions
    rise. (The Washington Post)
  - 2021 Belarus–European Union border crisis
  - Belarusian President Alexander Lukashenko makes a public appearance at the Belarus–Poland
    border for the first time since the migrant crisis began. Lukashenko gives a speech
    to migrants, telling them that they are free to either return home or head west,
    saying, "If you want to go westwards, we won't detain you, choke you, beat you.
    It's up to you. Go through. Go." (Reuters)
  - France–Italy relations
  - Italian Prime Minister Mario Draghi and French President Emmanuel Macron sign
    a treaty that strengthens the ties between the two countries "in areas including
    defence, migration, the economy, culture and trade". (Euractiv) (ANSA)
  - Mass shootings in the United States
  - Three people are killed and four others injured during a mass shooting in Nashville,
    Tennessee, United States. (NBC News)
