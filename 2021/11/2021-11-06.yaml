Date: '2021-11-06'
Source_URI: Portal:Current events/2021 November 6
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - Four women, including an activist, are killed by gunmen in the city of Mazar-i-Sharif,
    Balkh Province. Two suspects are arrested. (France 24)
  - Tigray War
  - A day after urging its citizens to leave Ethiopia, the U.S. government orders
    its embassy in Addis Ababa to evacuate non-emergency personnel due to armed conflict,
    civil unrest and potential supply shortages. (The Jerusalem Post)
  - Eleven people are killed and six others are injured in a fire at the intensive
    care unit of a hospital in Ahmednagar, India. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Greece
  - Greece imposes new restrictions that require unvaccinated people to show a negative
    rapid or PCR test in order to enter retail stores, banks, public offices, mixed
    entertainment venues and hairdressers and also require unvaccinated children to
    show a negative self-test in order to enter any establishments that cater to a
    mixed clientele. (Ekathimerini)
  - COVID-19 pandemic in Russia
  - Russia reports a record 41,335 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 8,755,930. (Newsweek)
  - COVID-19 pandemic in Ukraine
  - Ukraine reports a record 793 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 71,635. (AP)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia, COVID-19 vaccination in Australia
  - The number of people over the age of 16 years old who have been vaccinated against
    COVID-19 in Australia surpasses 80%, which is the major milestone set by the federal
    government for its vaccination program. (ABC News Australia)
  - COVID-19 pandemic in New Zealand
  - New Zealand reports a record for the second consecutive day of 206 new cases of
    COVID-19, which is the first time that the country has reported more than 200
    cases since the beginning of the pandemic. (New Zealand Herald)
  - COVID-19 pandemic in Costa Rica, COVID-19 vaccination in Costa Rica
  - Costa Rica issues a new mandate that would require children over the age of five
    years old to be vaccinated against COVID-19, making it one of the first countries
    to introduce such a mandate as part of its basic vaccination campaign. (Reuters)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports its first two cases of the Delta subvariant AY.4.2 from two Malaysian
    students who returned from the United Kingdom on October 2 and tested positive
    on October 7. (New Straits Times)
  - A man stabs passengers on an express train between the cities of Regensburg and
    Nuremberg in Bavaria, Germany, injuring three people. (Reuters)
