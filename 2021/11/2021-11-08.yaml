Date: '2021-11-08'
Source_URI: Portal:Current events/2021 November 8
Intelligence_Payload:
  Uncategorized:
  - Islamic terrorism in Europe
  - A knifeman attacks a policeman in Cannes, France, shouting that it was "in the
    name of the Prophet". The officer is not seriously wounded; the perpetrator is
    shot by other officers and is in critical condition. (Reuters via Arab News)
  - 2021 Democratic Republic of the Congo attacks
  - Gunmen in the Democratic Republic of the Congo seize the villages of Tshanzu and
    Runyoni in North Kivu, near the borders with Uganda and Rwanda. (Reuters)
  - Ukraine's oldest English language newspaper the Kyiv Post suspends publication
    after 26 years in print following a dispute between its owner and journalists.
    All of the newspaper's journalists have been fired with immediate effect. (The
    Guardian)
  - Maradi school fire
  - Twenty-six children are killed and 13 others injured by a fire at a school in
    Maradi, Niger. (Al Jazeera)
  - Three French climbers who went missing two weeks ago after attempting to reach
    Mingbo Eiger, near Mount Everest, are found dead by Nepali police. (NDTV)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austria restricts access to restaurants, bars, hotels and social and cultural
    events to only those who have been vaccinated or who have recovered from COVID-19
    due to an increase in the number of new cases and hospitalizations. (EURACTIV)
  - COVID-19 pandemic in Belgium, Impact of the COVID-19 pandemic on education
  - Belgium reinstates mandatory face mask policy for secondary schoolchildren and
    their teachers in Wallonia. (Le Vif)
  - COVID-19 pandemic in France, Impact of the COVID-19 pandemic on education
  - France reinstates a mandatory face mask policy for primary schoolchildren in many
    departments and administrative areas across the country as authorities try to
    reduce the number of COVID-19 cases. (Times of Malta)
  - COVID-19 pandemic in Greece
  - Greece reports a record 7,335 new cases of COVID-19 in the past 24 hours, bringing
    the nationwide total of confirmed cases to 792,239. (Anadolu Agency)
  - COVID-19 pandemic in Russia
  - Russia lifts its nationwide week-long paid holiday in most regions, which aimed
    to reduce the spread of COVID-19, despite still reporting high numbers of new
    cases and deaths. (The Times of India)
  - COVID-19 pandemic in Slovakia
  - Slovakia closes hotels, bars, fitness centers, and restaurants, as well as limiting
    gatherings to 100 fully vaccinated people in 36 counties amid a record increase
    in the number of COVID-19 cases. (AP)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia, COVID-19 vaccination in Australia
  - Australia begins administering booster doses of the COVID-19 vaccine for people
    over the age of 18 years old who received their second dose at least six months
    ago. (ABC News Australia)
  - COVID-19 pandemic in Vanuatu
  - Vanuatuan prime minister Bob Loughman confirms that two Vanuatuan citizens who
    were repatriated from New Caledonia have the Delta variant and urges residents
    to get vaccinated. (RNZ)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Singapore, COVID-19 pandemic in Malaysia, Travel restrictions
    related to the COVID-19 pandemic
  - Singapore and Malaysia announce that they will establish a Vaccinated Travel Lane
    beginning on November 29 between Singapore's Changi Airport and the Kuala Lumpur
    International Airport in Malaysia for fully vaccinated international travellers.
    (CNA)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - Los Angeles begins to implement the U.S. strictest vaccine mandate that required
    people to show their proof of full vaccination or negative COVID-19 test results
    in the previous 72 hours in order to enter most indoor venues and large outdoor
    events of more than 5,000 attendes. (NPR)
  - Travel restrictions related to the COVID-19 pandemic
  - The United States reopens its land and air borders for fully vaccinated international
    travelers for non-essential purposes after a 20-month closure for 33 countries
    due to the pandemic. Vaccinated international travelers are required to present
    negative COVID-19 test results before they travel, and airlines are required to
    use a contact tracing system. (AFP via France 24)
  - 2020–2021 H5N8 outbreak
  - Poland reports outbreaks of the H5N8 bird flu at one chicken and five turkey farms,
    with four of the outbreaks occurring in the eastern part of the country. (Reuters)
  - An outbreak of the H5 bird flu is reported at a small poultry unit near Alcester,
    Warwickshire, England. The infected birds will be culled. (BBC News)
  - The WHO and UNICEF launch a four-day polio vaccination campaign in Afghanistan
    backed by the Taliban, which aims to address the 3.3 million children who have
    not been vaccinated against polio since 2018. (Al Jazeera)
  - European migrant crisis
  - 2021 Belarus–European Union border crisis
  - A large crowd of migrants escorted by the Belarusian military attempts to break
    through the Belarus–Poland border near Bruzgi, Grodno Region. Several migrants
    are reported dead, with seven being found dead on the Polish side of the border,
    and a few more deaths are reported in Belarus. (The Guardian) (ITV)
  - Police in Star Dojran, North Macedonia discover 42 migrants hiding in a truck.
    Authorities say that most of the migrants were of Syrian descent and were likely
    travelling through Greece. (Ekathimerini)
  - Foreign relations of Colombia
  - During a high-level state visit to Israel, Colombian Defense Minister Diego Molano
    declares Iran to be an enemy of Colombia despite both nations continuing to maintain
    diplomatic relations. (Infobae)
  - Holy See–Switzerland relations
  - Swiss Foreign Minister Ignazio Cassis meets with the State Secretary of the Vatican,
    Cardinal Pietro Parolin, to mark 100 years of the restoration of diplomatic relations
    between Switzerland and the Holy See. The joint declaration, according to the
    Swiss Broadcasting Corporation, called for the promotion of “peace and human rights,
    the worldwide abolition of the death penalty, the protection of minorities, and
    interreligious dialogue.” (Swissinfo) (Catholic World News)
  - Former President of Georgia Mikheil Saakashvili, who has been on a hunger strike
    for 39 days, is moved to a prison hospital as his condition continues to deteriorate.
    (France 24)
