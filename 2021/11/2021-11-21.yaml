Date: '2021-11-21'
Source_URI: Portal:Current events/2021 November 21
Intelligence_Payload:
  Uncategorized:
  - 2021 Jerusalem shooting
  - A Hamas gunman opens fire in the alleyways of Jerusalem's Old City, killing an
    Israeli man and wounding three others, before being shot and killed by Israeli
    forces. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Russia, COVID-19 vaccination in Russia
  - President Vladimir Putin receives his booster dose of the Sputnik Light COVID-19
    vaccine. (The Hill)
  - COVID-19 pandemic in Slovenia
  - Slovenia surpasses 400,000 cases of COVID-19. (UrduPoint)
  - COVID-19 pandemic in Guadeloupe, Social impact of the COVID-19 pandemic
  - It is announced that France will deploy dozens of gendarmerie to Guadeloupe following
    occurrences of rioting and looting in the archipelago over COVID-19 measures.
    At least 31 people were arrested overnight. Interior Minister Gérald Darmanin
    says that "the first message is that the state will stand firm". (Al Jazeera)
  - COVID-19 pandemic in Malaysia
  - Malaysia surpasses 30,000 deaths from COVID-19. (Malay Mail)
  - Waukesha Christmas parade attack
  - Five people are killed and over 40 injured by a hit and run driver who drove through
    an early Christmas parade in Waukesha, Wisconsin, United States. A person of interest
    is in custody. (ABC News)
  - Protests over responses to the COVID-19 pandemic, COVID-19 pandemic in Belgium
  - Belgian police fire tear gas and water cannons after violence broke out at the
    end of a mass demonstration in Brussels that involved 35,000 people against tougher
    COVID-19-related measures. (The Independent)
  - The Taliban issues new guidelines for television broadcasts, mandating that female
    presenters and journalists wear Islamic coverings, banning entertainment considered
    blasphemous or insulting to Afghans, and prohibiting films that promote foreign
    cultural values, among others. (BBC News)
  - 2021 Chilean general election
  - Chileans go to the polls to elect their new president, who will succeed outgoing
    president Sebastián Piñera. (Reuters)
  - Far-right populist José Antonio Kast of the Republican Party and former student
    protest leader Gabriel Boric of the left-wing coalition Apruebo Dignidad qualify
    for the second round, after winning 27.94% and 25.75% of the vote respectively.
    The second round will take place on December 19. (Reuters)
  - Aftermath of the October 2021 Sudanese coup d'état
  - Abdalla Hamdok is reinstated as Prime Minister of Sudan following a political
    agreement with coup leader Abdel Fattah al-Burhan. (BBC News)
  - 2021 World Rally Championship
  - Sébastien Ogier and Julien Ingrassia win the 2021 Championship, while Toyota secures
    the manufacturers' title.
