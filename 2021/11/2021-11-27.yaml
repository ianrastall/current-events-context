Date: '2021-11-27'
Source_URI: Portal:Current events/2021 November 27
Intelligence_Payload:
  Uncategorized:
  - 2021 social unrest in the French West Indies
  - France says that it is willing to discuss greater autonomy for Guadeloupe if "it
    is in the interests of the people who live there". The Caribbean archipelago has
    experienced violent demonstrations in recent days, and Guadeloupean officials
    have raised the issue of autonomy with France. (Reuters)
  - The World Trade Organization postpones its four-day Ministerial Conference, which
    was scheduled to be held on November 29 in Geneva, Switzerland, amid the emergence
    of the new Omicron variant that was declared a "variant of concern" by the WHO.
    (France 24)
  - 2021–22 European windstorm season
  - Three people are killed in the United Kingdom as Storm Arwen hits the British
    Isles. Widespread damage and travel disruptions are reported in Scotland and North
    East England, with 100,000 people losing power. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Belgium
  - Belgium imposes new anti-COVID-19 measures that close nightclubs, discos and dance
    halls, require businesses in the hospitality sector to close at 11 p.m., ban organised
    private parties, and limit the number of people at tables at bars and restaurants
    to six people unless they are from the same household, amid a fourth wave of the
    pandemic. (The Brussels Times)
  - COVID-19 pandemic in Czech Republic
  - The Czech Republic reports its first case of the SARS-CoV-2 Omicron variant in
    a woman in Liberec who had been in Namibia. She had passed through South Africa
    and Dubai on her flight to the Czech Republic. (Deutsche Welle)
  - COVID-19 pandemic in Germany
  - Germany reports its first cases of the SARS-CoV-2 Omicron variant in two people
    in Bavaria who entered the country at Munich Airport on November 24. (Deutsche
    Welle)
  - COVID-19 pandemic in Italy
  - Italy reports its first case of the SARS-CoV-2 Omicron variant in a person who
    travelled from Mozambique. (Times of Malta)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports its first cases of the SARS-CoV-2 Omicron variant in
    two people who travelled from southern Africa to Chelmsford and Nottingham. (BBC
    News)
  - COVID-19 pandemic in Bangladesh, Travel during the COVID-19 pandemic
  - Bangladesh suspends the entry of travellers from South Africa amid fears of the
    spread of the SARS-CoV-2 Omicron variant first detected in Botswana. (Business
    Standard)
  - European Migrant Crisis
  - Greece builds two new ''Closed Controlled Access Centers" for migrants. (ANSAmed)
