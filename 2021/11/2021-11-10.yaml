Date: '2021-11-10'
Source_URI: Portal:Current events/2021 November 10
Intelligence_Payload:
  Uncategorized:
  - At the COP26 Conference, twenty-four nations and a number of leading car manufacturers,
    including Ford, Mercedes-Benz and Volvo, agree to phase out new petrol and diesel
    cars by 2030, and end sale of fossil fuel vehicles by 2040. (The Guardian)
  - YouTube dislike hiding
  - YouTube removes the public "dislike" count from all YouTube videos, in an attempt
    to protect content creators from coordinated "dislike attacks". The change was
    met with near universal opposition. (Tech Crunch) (Make Use Of)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - COVID-19 vaccination in Germany
  - The Standing Committee on Vaccination recommends that people under the age of
    30 should only receive the Pfizer-BioNTech COVID-19 vaccine due to a higher risk
    of heart inflammation with the Moderna vaccine among younger people. (DW)
  - Germany reports a record 39,676 new cases of COVID-19 in the past 24 hours. (AP)
  - COVID-19 pandemic in Croatia
  - Croatia reports a record 7,315 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 514,850. (Hindustan Times)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the second consecutive day of 1,239 deaths from COVID-19,
    thereby bringing the national death toll to 250,454. (SwissInfo)
  - COVID-19 pandemic in Argentina, COVID-19 vaccination in Argentina
  - Argentina receives a shipment of 896,200 doses of the Pfizer COVID-19 vaccine.
    (Infobae)
  - COVID-19 pandemic in Israel, COVID-19 vaccination in Israel
  - Israel's pandemic advisory board approves the usage of the Pfizer-BioNTech COVID-19
    vaccine for children between the ages of 5 and 11 years old. (The Times of Israel)
  - COVID-19 pandemic in Morocco
  - Morocco lifts its nationwide nightly curfew from 11 p.m. to 5 a.m., which was
    implemented in order to reduce the spread of COVID-19, due to an improved epidemiological
    situation in the country. (Morocco World News)
  - 2020–2021 H5N8 outbreak
  - Japan announces that it will cull 143,000 chickens after reporting an outbreak
    of the "highly pathogenic avian influenza" at a poultry farm in Yokote, Akita
    Prefecture. (The Himalayan Times)
  - Nicaragua–United States relations
  - U.S. President Joe Biden signs a bill into law, targeting sanctions "on the government
    of Nicaraguan President Daniel Ortega, to restrict multilateral bank lending,
    and to target regime corruption". (Al Jazeera)
  - China–United States relations
  - During the COP26 conference, U.S. Special Presidential Envoy for Climate John
    Kerry and Chinese climate envoy Xie Zhenhua announce that the United States and
    China have reached an agreement on combating climate change. (CNN)
  - The lawyer for American journalist Danny Fenster says that Myanmar's authorities
    have charged him with terrorism and sedition, in addition to three charges that
    he had already been facing. Fenster's lawyer says that, under counterterrorism
    law, Fenster could face life imprisonment. (Al Jazeera)
  - The European Commission rejects an appeal from Alphabet Inc., parent company of
    Google, regarding a €2.4 billion ($2.8 billion) fine charged against the corporation
    in 2017 for unfairly directing users to its own shopping services. (ABC News)
  - Politics of Sweden
  - Swedish Prime Minister Stefan Löfven resigns after seven years in office, although
    he will continue to remain in office ad interim until a new government is formed.
    Minister for Finance Magdalena Andersson, who succeeded Löfven as leader of the
    Social Democratic Party on November 4, is expected to become the first female
    prime minister in the country's history. (ABC News)
