Date: '2021-11-13'
Source_URI: Portal:Current events/2021 November 13
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - A magnetic bomb attached to a minivan explodes in Dasht-e-Barachi, a predominantly
    Hazara district of Kabul, killing six people and injuring seven others. (Reuters)
  - Syrian civil war
  - Islamic State gunmen ambush a group of soldiers in Masrib, Deir ez-Zor, Syria,
    killing 13 of them and wounding others. (The New Arab)
  - Tigray War
  - The Ethiopian Human Rights Commission publishes a report accusing the Tigray People's
    Liberation Front of killing more than 150 civilians in the Amhara Region between
    July and August. The report states that they were killed for either supporting
    the federal government or sheltering soldiers. (Al Jazeera)
  - Insurgency in Manipur
  - Gunmen ambush a convoy of paramilitary soldiers in Churachandpur, Manipur, India,
    killing five soldiers and two civilians. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austria reports a record 13,152 new COVID-19 cases in the past 24 hours, bringing
    the nationwide total of confirmed cases to 948,100. (Kurier)
  - COVID-19 pandemic in Germany
  - Germany reintroduces free COVID-19 testing for all adults amid a record number
    of new cases. (The New York Times)
  - COVID-19 pandemic in Greece
  - Greece tightens its guidelines by requiring that no more than one person per nine
    square meters of floor space be allowed to enter into supermarkets. This new policy
    was implemented after a proposed policy that would require unvaccinated people
    to provide a mandatory rapid COVID-19 test in order to enter supermarkets was
    deemed too difficult to implement. (Ekathimerini)
  - COVID-19 pandemic in Russia
  - Russia reports a record 1,241 deaths from COVID-19 in the past 24 hours, bringing
    the nationwide death toll to 254,167. The country also surpasses nine million
    cases of COVID-19. (Azeri Press Agency)
  - COVID-19 pandemic in Papua New Guinea
  - New Zealand sends doctors to Papua New Guinea, after Papua New Guinea formally
    requested international help to combat the worsening COVID-19 situation in the
    country. (RNZ)
  - COVID-19 pandemic in the United States
  - The U.S. surpasses 47 million cases of COVID-19. (WFTV)
  - 2021 United Nations Climate Change Conference
  - At COP26, diplomats from countries around the world reach a major agreement aimed
    at intensifying global efforts to fight climate change by calling on governments
    to return next year with stronger plans to curb planet-warming emissions and urging
    wealthy nations to "at least double" their funding in order to protect poorer
    nations from the hazards of a warming planet. Some activists are critical of the
    agreement, as it leaves unresolved the question of how much and how quickly each
    nation should cut its carbon dioxide and other greenhouse gas emissions over the
    next decade, and it still leaves many developing countries short of the funds
    that they would need in order to cope with increasing weather disasters. However,
    the agreement makes reference to fossil fuels and their role in the climate crisis
    for the first time in the conference's history. (CNN) (The New York Times)
  - 2021 Belarus–European Union border crisis
  - Russian President Vladimir Putin says that the threat made by Belarus to cut their
    gas supply to Europe would be a breach of the contract with Russia and that such
    a threat may have been made in a fit of temper by Belarus's president Alexander
    Lukashenko. (BBC News)
  - November 2021 Guayaquil prison riot
  - Sixty-eight inmates are killed and 25 others injured in a prison riot in Guayaquil,
    Ecuador. (BBC News)
  - Protests over responses to the COVID-19 pandemic
  - COVID-19 protests in Australia
  - Thousands of protesters associated with the right-wing United Australia Party
    march in Melbourne in opposition to vaccine mandates and newly introduced laws
    in the Victoria State Government which would transfer many pandemic-specific powers
    from the Chief Health Officer to the Premier and Health Minister. (The Guardian)
