Date: '2021-09-11'
Source_URI: Portal:Current events/2021 September 11
Intelligence_Payload:
  Uncategorized:
  - Internal Conflict in Myanmar
  - 2021 Myanmar protests
  - A gunfight between militias and Myanmar's security forces result in the death
    of 20 people. The fight erupted after the militias called for an armed resistance
    against the military regime. (Al Jazeera)
  - LGBTQ bishops
  - The Sierra Pacific Synod of the Evangelical Lutheran Church in America (ELCA)
    installs the Rev. Dr. Megan Rohrer as Bishop. They are the first openly transgender
    and non-binary Bishop in any major Christian denomination. (The Advocate) (NPR)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia, COVID-19 vaccination in Indonesia
  - Indonesia receives the first batch consisting of 500,000 doses of the Janssen
    COVID-19 vaccine donated by the Netherlands. (Jakarta Globe)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record 592 deaths from COVID-19 in the past 24 hours, including
    492 backlogged deaths, bringing the nationwide death toll to 20,419. (The Star)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record 26,303 new cases of COVID-19 in the past 24 hours,
    bringing the nationwide total of confirmed cases to 2.206 million. (ABS-CBN News)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in South Africa, COVID-19 vaccination in South Africa
  - The South African Health Products Regulatory Authority approves the usage of the
    Pfizer–BioNTech COVID-19 vaccine for children over the age of 12. (Sowetan Live)
  - The number of confirmed COVID-19 cases in Africa surpasses eight million. (Anadolu
    Agency)
  - COVID-19 pandemic in Argentina, COVID-19 vaccination in Argentina
  - Argentina surpasses 60 million doses of the COVID-19 vaccine administered, with
    28.6 million Argentines having received one dose and 17.7 million being fully
    vaccinated. (Télam)
  - COVID-19 pandemic in Australia
  - Australia reports a record 2,070 new cases of COVID-19 in the past 24 hours, including
    1,599 new cases in New South Wales. It is the first time that the country has
    reported more than 2,000 cases since the beginning of the pandemic. (The West
    Australian)
  - COVID-19 pandemic in Moldova
  - Moldova restricts the entry of restaurants, bars, and cultural events to people
    who have been vaccinated against COVID-19 until October 31 due to a sharp rise
    in COVID-19 cases. (Reuters)
  - Saudi Arabia–United States relations, Alleged Saudi role in the September 11 attacks
  - The Federal Bureau of Investigation releases its first document of the September
    11 attacks and allegations of Saudi Arabia support for the hijackers following
    an executive order signed by President Joe Biden. (Reuters)
  - China–Vietnam relations
  - Chinese Foreign Minister Wang Yi tells Vietnamese Deputy Prime Minister Phạm Bình
    Minh that both countries should refrain from unilateral actions regarding the
    South China Sea disputes that could complicate the situation and magnify the dispute.
    (Al Jazeera)
  - A knifeman stabs and wounds two bus controllers in Rimini, Italy. After exiting
    the bus, he stabbed and wounded three passersby, including a 6-year-old child
    who is in a critical condition, before being arrested. Authorities ruled out terrorism
    as a possible motive behind the attack. (Reuters)
  - 2021 All-Ireland Senior Football Championship
  - In Gaelic football, Tyrone defeats Mayo in the 2021 All-Ireland Senior Football
    Championship Final at Croke Park in Dublin. In doing so, Tyrone wins a fourth
    title and denies Mayo their first title since 1951. (RTE)
  - Conor McKenna, who set up one of Tyrone's goals, becomes the fourth former AFL
    player with an All-Ireland medal. (Extra.ie)
  - 2021 US Open
  - In tennis, Emma Raducanu of Great Britain defeats Leylah Fernandez of Canada,
    6–4, 6–3, in the final of the women's singles to become the first qualifier to
    win a Grand Slam title. (CNA)
  - 2021 Dismantling Global Hindutva Conference
  - The 2021 Dismantling Global Hindutva conference, or the DGH, held between 10-12
    September, apparently started out as a small group of academics planning a modest
    gathering to explore the dangers of Hindutva ideology.
