Date: '2021-09-14'
Source_URI: Portal:Current events/2021 September 14
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - An al-Shabaab suicide bomber blows himself up at a tea shop near a military base
    in Mogadishu, killing six soldiers and three civilians and injuring 11 others.
    (Al Jazeera)
  - Aftermath of the assassination of Jovenel Moïse
  - Prosecutor Bed-Ford Claude asks a judge to forbid prime minister Ariel Henry from
    leaving Haiti "by air, sea or road" due to "serious presumption relative to the
    assassination of the former president". (Reuters)
  - Seven people are killed when a King Air 360 crashed shortly after takeoff in Piracicaba,
    Brazil. Among the victims is the Brazilian energy company Cosan shareholder Celso
    Silveira Mello Filho and his family. (Nasdaq)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - Italy surpasses 130,000 COVID-19-related deaths. (Il Messaggero)
  - COVID-19 pandemic in the Netherlands
  - Caretaker Prime Minister Mark Rutte announces that the social distancing requirement
    will be lifted on September 25 and instead, a "Corona pass" will be required in
    order to enter bars, restaurants, and large-scale events and festivals as the
    number of COVID-19 cases declines. (MedicalXpress)
  - COVID-19 pandemic in Russia
  - President Vladimir Putin enters self-isolation after several members of his inner
    circle tested positive for COVID-19. (AP)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia
  - Malaysia surpasses two million cases of COVID-19. (The Straits Times)
  - COVID-19 pandemic in Singapore
  - COVID-19 vaccination in Singapore
  - Singapore begins a nationwide campaign to administer booster doses of the COVID-19
    vaccine for people over the age of 60 and people with a compromised immune system
    who received their second dose at least six months ago amid an increase in the
    number of COVID-19 cases. (Nikkei Asia)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in South Sudan
  - South Sudan receives its first shipment of 152,950 doses of the single-dose Janssen
    COVID-19 vaccine. (APO Group via The Guardian Nigeria)
  - COVID-19 pandemic in Zimbabwe
  - The Parliament of Zimbabwe bans anyone who is unvaccinated against COVID-19 from
    attending church service in order to increase the vaccination rate. (AFP via Barron's)
  - Dolphin drive hunting
  - More than 1,400 atlantic white-sided dolphins are killed during hunting in the
    Faroe Islands, the biggest ever slaughter in the history of the annual hunt known
    as the Grindadráp. (The Guardian)
  - LGBT rights in Hungary, LGBT rights in Poland
  - At the end of a European Union summit, representatives threaten to fine Poland
    on a daily basis and withhold part of the EU's budget from Hungary over their
    laws against the gay and LGBT communities. (Bloomberg)
  - China–United Kingdom relations
  - Chinese ambassador Zheng Zeguang is banned from entering the Parliament of the
    United Kingdom while sanctions remain in place on a number of British MPs and
    officials. Zheng was due to attend a Commons reception on Wednesday. China says
    that this was a "despicable and cowardly" decision. (BBC News)
  - France–Mali relations, Mali–Russia relations
  - France says that a planned deal between Mali's military junta led by Assimi Goïta
    and the Wagner Group to bring Russian private military contractors into Mali was
    "incompatible" with the current French military presence. (Reuters)
  - North Korea demonstrates two short-range ballistic missiles that land just outside
    Japan's territorial waters and then only hours later South Korea demonstrates
    a submarine-launched ballistic missile. Comments made during the South Korean
    launch immediately draw condemning remarks from North Korea's Kim Yo-jong. (AP)
  - Continuing his apostolic journey, Pope Francis arrives in Slovakia, meeting with
    President Zuzana Čaputová who were joined by civil leaders, members of the diplomatic
    corps and religious leaders. After a meeting with the Jewish community, the Pope
    went to the apostolic nunciature, where he met with the Speaker of the National
    Council (parliament), Boris Kollár, and with Prime Minister Eduard Heger. (Catholic
    World News)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Arizona
  - Arizona Attorney General Mark Brnovich files a lawsuit against President Joe Biden
    and his administration over the vaccine mandate. (KTAR)
  - Mexican drug war
  - A Mexican court sentences Vicente Carrillo Fuentes, a former leader of the Juárez
    drug cartel, to 28 years in prison on the charges of organized crime and drug
    trafficking. (AFP via RFI)
  - 2021 United States gubernatorial elections
  - 2021 California gubernatorial recall election
  - California voters head to the polls to determine whether to remove or keep incumbent
    Governor Gavin Newsom. This will be the first gubernatorial recall election in
    California since 2003. (AP)
  - Governor Gavin Newsom survives the recall election, making him the second governor
    to survive a recall after former Wisconsin Governor Scott Walker in 2012. (Business
    Insider)
