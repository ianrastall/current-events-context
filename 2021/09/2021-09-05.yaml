Date: '2021-09-05'
Source_URI: Portal:Current events/2021 September 5
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - 2021 evacuation from Afghanistan
  - Operation Allies Refuge
  - White House Chief of Staff Ron Klain says that around 100 Americans remain in
    Afghanistan following the August 31 withdrawal deadline. He also says that the
    Biden administration will still try to rescue them. (Politico)
  - Panjshir conflict
  - Taliban spokesperson Bilal Karimi says that Taliban forces have entered Bazarak,
    the capital of Panjshir Province, after gaining more territory in the surrounding
    areas. (Reuters)
  - Mohammad Fahim Dashty, a chief and spokesperson of the National Resistance Front
    of Afghanistan, is killed by the Taliban during a fight. (The Week)
  - 2021 Guinean coup d'état
  - Heavy gunfire is heard in Conakry, Guinea, as soldiers seal off and block the
    main bridge connecting to the Kaloum neighborhood, which houses the Presidential
    Palace. President Alpha Condé is arrested and taken away by special forces soldiers
    but appears to be unharmed. Three soldiers are reportedly killed. (BBC News) (Reuters)
    (Europa Press)(The Economist)
  - The military seizes state television and announces on air that the government
    has been dissolved and that all land borders are closed. (ABC News)
  - Insurgency in Balochistan
  - Three soldiers are killed and 15 more are injured as a suicide bomber blows himself
    up at a checkpoint in Quetta, Balochistan, Pakistan. The Tehrik-i-Taliban Pakistan
    claims responsibility for the attack. (Al Jazeera)
  - ISIL insurgency in Iraq
  - Twelve police officers are killed and three others are wounded as ISIL militants
    open fire and bomb a security checkpoint in Kirkuk. (Al Jazeera)
  - Mapuche conflict
  - Violence intensifies during a four-day clash in the Mapuche Araucanía Region in
    Chile, between Chilean forces and the Mapuche people. A presidential delegate
    has called on the Congress to speed the arrest and prosecution of what he called
    "terrorists". (MercoPress)
  - A knifeman stabs and seriously wounds two women in Berlin, Germany. Authorities
    are investigating if the attacker was motivated by Islamic extremism. He targeted
    the first victim claiming that "he didn't like that a woman was working". (ABC
    News)
  - 2021 Atlantic hurricane season
  - The death toll from Hurricane Ida in the Northeastern United States increases
    to 50. (CNBC)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Cambodia
  - The number of population who have received their first dose of the COVID-19 vaccine
    in Cambodia surpasses 70%. (The Star)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka surpasses 10,000 deaths from COVID-19. (Adaderana)
  - COVID-19 pandemic in Vietnam, COVID-19 vaccination in Vietnam
  - The Vietnamese health ministry announces that Hanoi, Ho Chi Minh City, Bình Dương,
    Dong Nai and Long An provinces must vaccinate all of their adult residents with
    at least one dose of the COVID-19 vaccine by September 15. (CNA)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - Germany surpasses four million cases of COVID-19. (Daily Sabah)
  - COVID-19 pandemic in Russia
  - Russia surpasses seven million cases of COVID-19, becoming the fourth country
    to do so after the United States, India, and Brazil. (Kyiv Post)
  - COVID-19 pandemic in Peru, COVID-19 vaccination in Peru
  - Peru begins vaccinations for people aged 30 in Lima, Callao, and the Ica Region.
    (Andina)
  - 2021 Montenegrin episcopal ordination protests
  - Police fire tear gas and remove barricades in Cetinje, Montenegro, as anti-Serb
    Montenegrin nationalist protesters attempted to impede the enthronement of Joanikije
    II to the Metropolitanate of Montenegro and the Littoral of the Serbian Orthodox
    Church. (Deutsche Welle)
  - 2021 São Toméan presidential election
  - Carlos Vila Nova, from the Independent Democratic Action, wins the second round
    of the presidential election. (Reuters)
  - 2020 Summer Paralympics
  - Afghanistan at the 2020 Summer Paralympics
  - Afghanistan athletes Zakia Khudadadi and Hossain Rasouli carry the Afghan flag
    during the closing ceremony of the 2020 Summer Paralympics after being unable
    to attend the opening ceremony due to the withdrawal of American troops from the
    country. (The Washington Post)
  - The closing ceremony for the Summer Paralympics is held. China leads the Olympic
    medal count with 207 medals, including 96 gold medals. (CNN)
  - 2022 FIFA World Cup qualification, Impact of the COVID-19 pandemic on association
    football, COVID-19 pandemic in Brazil
  - The qualification match between Brazil and Argentina at the Arena Corinthians
    in São Paulo is suspended after officials from the Brazilian Health Regulatory
    Agency entered the pitch and attempted to deport four Argentine players whom they
    allege to have violated pandemic-related self-isolation guidelines. (The New York
    Times)
