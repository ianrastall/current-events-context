Date: '2021-09-02'
Source_URI: Portal:Current events/2021 September 2
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - 2021 evacuation from Afghanistan
  - Operation Pitting
  - Former Royal Military Police soldier Ben Slater is briefly arrested for questioning
    by the Taliban while trying to evacuate 400 Afghans and 50 staff members. (The
    Independent)
  - Aftermath of the Fall of Kabul, Capital punishment in Afghanistan, LGBT rights
    in Afghanistan
  - Afghan LGBT rights activist Nemat Sadat and an unnamed gay man in Kabul both report
    that the Taliban beheaded the man's boyfriend on the same day that they entered
    the city. Sadat said that while women are only executed if they commit adultery,
    homosexuals face an "automatic death sentence based on their mere existence".
    (ABC News Australia)
  - Panjshir conflict
  - The Taliban enters the Panjshir Valley and clashes with National Resistance Front
    of Afghanistan forces led by Ahmad Massoud. The Taliban reports gaining some territory
    as both sides also claim heavy casualties. (Reuters)
  - Israeli–Palestinian conflict
  - Israeli soldiers open fire on Palestinians protesting against Israel's 14-year
    blockade of the Gaza Strip, killing one person and injuring 15 others. (Al Jazeera)
  - Kashmir conflict
  - Indian authorities deploy security forces in the Kashmir Valley in order to restrict
    public movement and impose a near-total internet blackout following the death
    of senior separatist leader Syed Ali Shah Geelani. (France 24)
  - Hurricane Ida
  - At least 41 people are killed by flash flooding and tornados in New York, Pennsylvania,
    Maryland, Virginia, and New Jersey as the remnants of Ida pass over the Northeastern
    United States. (BBC News)
  - Twelve people are dead and 4,500 are sick in the Democratic Republic of the Congo
    following a toxic leak from a massive diamond mine in Angola. (BBC News)
  - A plane crashes into a building killing all 4 onboard and injured two on the ground
    in Farmington, United States. (CT)
  - A minibus overturned and plunged off a road into a valley in Kurdish province,
    Iran killing 16 and injuring 12.(THE TIMES OF INDIA)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 3,805 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 221,351. (AKI Press)
  - COVID-19 pandemic in Singapore
  - Singapore reports 191 new cases of COVID-19 in the past 24 hours, including 187
    locally transmitted cases. It is the highest number of locally-transmitted cases
    since August 7, 2020. (CNA)
  - COVID-19 pandemic in Taiwan, COVID-19 vaccination in Taiwan
  - Taiwan receives its first shipment of 932,000 doses of the Pfizer–BioNTech COVID-19
    vaccine. (The Asahi Shimbun)
  - COVID-19 pandemic in the United Arab Emirates, Travel restrictions related to
    the COVID-19 pandemic
  - Abu Dhabi will lift its quarantine requirements for all vaccinated foreign travellers
    on September 5 as long as they show a negative PCR test result as the UAE reported
    no COVID-19 deaths in the past 24 hours for the first time since November 14,
    2020. (Barron's)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Belgium
  - King Philippe and Queen Mathilde cancel or reschedule their attendance at all
    public events and engagements, in addition to placing all members of the Royal
    Family into quarantine, after a Royal Family member tested positive for COVID-19.
    (The Globe and Mail)
  - COVID-19 pandemic in Bulgaria
  - The Bulgarian government announces nationwide restrictions that would require
    restaurants, bars, and casinos to close at 10 p.m., restrict the capacity of gyms,
    theatres, and cinemas to between 30% to 50%, and ban all mass gatherings from
    September 7 until October 30 amid the spread of COVID-19 and the low percentage
    of vaccinated people. (See News)
  - COVID-19 pandemic in Norway, COVID-19 vaccination in Norway
  - Prime Minister Erna Solberg announces that children aged 12 to 15 years old in
    Norway will be offered the single-dose of the COVID-19 vaccine. However, only
    the Pfizer–BioNTech COVID-19 vaccine that is currently recommended for this age
    group. (Norwegian Institute of Public Health)
  - COVID-19 pandemic in Kenya
  - Kenya receives a shipment of 358,200 doses of the Oxford–AstraZeneca COVID-19
    vaccine donated by Canada as part of the COVAX initiative. (Anadolu Agency)
  - 2021 Belarus–European Union border crisis
  - Poland declares a state of emergency on its border with Belarus amid an increase
    in illegal migration. The Polish Border Guard says that there were around 3,500
    attempts to illegally cross the border in August, 2,500 of which were not successful.
    (Reuters)
  - Afghanistan–United Kingdom relations
  - British Foreign Secretary Dominic Raab announces that there is no "foreseeable
    recognition" of the Taliban government in Afghanistan although he asserts that
    the United Kingdom will nevertheless directly engage the group in necessary talks.
    (Al Jazeera)
  - Aftermath of the Dar es Salaam shooting
  - Authorities in Tanzania have confirmed that the gunman who killed three policemen
    and a security guard in Dar es Salaam on August 25, was motivated by Islamic extremism.
    (Reuters)
  - COVID-19 pandemic in Brazil
  - President Jair Bolsonaro signs a law allowing vaccine and medication patents to
    be broken in situations of public health emergency in Brazil, such as the COVID-19
    pandemic. (Reuters)
