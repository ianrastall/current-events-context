Date: '2021-09-30'
Source_URI: Portal:Current events/2021 September 30
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Three Palestinians are killed, two are injured and two more are arrested by Israeli
    soldiers during armed confrontations in the West Bank. (Al Jazeera)
  - 2021 Afghanistan protests, Treatment of women by the Taliban
  - Taliban forces use gunfire to disperse a group of six women who protested in front
    of their high school in Kabul against the Taliban regime forbidding them to return
    to study. Security forces also pushed the women and threatened arrests. A guard
    said that they dispersed the protest because the six women "did not coordinate
    with security forces regarding their protest". (NDTV)
  - Afghanistan conflict
  - The Taliban orders all members belonging to the group's defense, interior and
    intelligence agencies who are living in private homes to "report back to military
    bases" across the country and stop occupying private homes they had taken over.
    (Military.com)
  - Expo 2020
  - Dubai holds an opening ceremony to kick off the Expo 2020 event after it was postponed
    due to the COVID-19 pandemic. Around 192 countries will be participating in the
    event. This will be the first world's fair to be held in the Middle East. (Al
    Arabiya)
  - Economic impact of the COVID-19 pandemic in the United Kingdom
  - The government's furlough scheme ends in the United Kingdom after 18 months. Almost
    a million people are reported to still be on furlough from their employer. (BBC
    News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Egypt
  - Egypt receives their first shipment of 1.6 million doses of the Pfizer–BioNTech
    COVID-19 vaccine donated by the United States. (Al-Arabiya English)
  - COVID-19 pandemic in Somalia
  - Somalia opens its first public oxygen plant in Mogadishu to treat patients infected
    with COVID-19. The new plant was purchased from Turkey by a local foundation for
    $240,700. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia, COVID-19 vaccination in Malaysia
  - The Malaysian Public Service Department mandates that all federal government employees
    will need to be vaccinated against COVID-19, with exceptions only to be allowed
    on health grounds, in order to increase the country's vaccination rate. (The Jakarta
    Post)
  - COVID-19 pandemic in Singapore
  - Singapore reports a record for the third consecutive day of 2,428 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 96,521.
    (CNA)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - France begins to implement a mandatory health pass for children aged 12 to 17
    to enter most activities in their daily lives. (Radio France Internationale
  - COVID-19 pandemic in Romania
  - Romania reports a record 12,032 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 1,233,668. (Romania Insider)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the third consecutive day of 867 deaths from COVID-19,
    thereby bringing the nationwide death toll to 207,255. (The Moscow Times)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in Queensland
  - Restrictions are increased in Queensland after an increase in locally-acquired
    COVID-19 cases, resulting in 25% of ticket-holders for the NRL Grand Final in
    Brisbane receiving cancellations. (The Guardian)
  - COVID-19 pandemic in Victoria
  - Victoria reports a record 1,438 new COVID-19 infections in the past 24 hours,
    surpassing New South Wales as the epicentre of the pandemic in Australia. Victorian
    Premier Daniel Andrews blames the increase on illegal parties held to celebrate
    the AFL Grand Final and also announces that the time between doses of the Pfizer–BioNTech
    vaccine will be reduced to three weeks. (The Age)
  - Nuclear program of Iran
  - European Union diplomat Josep Borrell says that nuclear talks will resume "soon"
    at an acceptable time period. (Reuters)
  - U.S. Secretary of State Antony Blinken warns that Iran is running out of time
    to return to the Joint Comprehensive Plan of Action signed in 2015. (Bloomberg.com)
  - Abraham Accords
  - Israeli Foreign Minister Yair Lapid travels to Bahrain for the first official
    visit by an Israeli cabinet member to the Gulf kingdom since the countries established
    diplomatic ties last year. (BBC News)
  - 2021 North Kosovo protests
  - Serbia and Kosovo agree to defuse their previously high tensions. Kosovo will
    withdraw its police units from protest sites on the Serbian border and the two
    countries will also end their bans on the other country's license plates. (Reuters)
  - Tigray War
  - The Ethiopian foreign ministry announces that it will expel seven senior United
    Nations humanitarian officials working in Ethiopia and declare them as persona
    non grata for "meddling" in the country's internal affairs. (AFP via Barron's)
  - A 96-year-old German woman accused of collaborating with the SS in the deaths
    of thousands of people at the Stutthof concentration camp, where she was employed
    as a typist, is arrested by German police shortly after a court ordered her arrest
    for evading the beginning of her trial. The court now orders the woman to be examined
    to determine whether she is fit to be jailed or to attend the court proceedings
    in person. (Al Jazeera)
  - 2021 Ethiopian general election
  - Voters in Ethiopia's Somali Region go to the polls as part of the larger general
    election originally scheduled to be held on June 21. Three opposition parties
    withdrew from the election, leaving President Abiy Ahmed's Prosperity Party as
    the sole party to participate. (Addis Standard)
  - 2021 South West Region referendum
  - Voters in the Southern Nations, Nationalities, and Peoples' Region zones of Keffa,
    Sheka, Bench Sheko, Dawro, West Omo, and Konta vote 98.07% in favor of separating
    from the Southern Nations, Nationalities, and Peoples' Region becoming the South
    West Ethiopia Peoples' Region. (Addis Standard)
  - 2021 in sumo
  - Hakuhō, the 69th yokozuna and widely considered to be one of the greatest professional
    sumo wrestlers of all time, officially retires from competition after a 20-year
    career, 14 of them at the sport's highest rank. (The Mainichi)
