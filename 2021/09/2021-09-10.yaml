Date: '2021-09-10'
Source_URI: Portal:Current events/2021 September 10
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - War in Afghanistan
  - 2021 evacuation from Afghanistan
  - Operation Allies Refuge
  - American flights carrying evacuees from Afghanistan are temporarily suspended
    following four cases of measles in Afghan refugees arriving in the United States.
    (U.S. News & World Report)
  - U.S. Secretary of State Antony Blinken announces that 21 Americans have been evacuated
    from Afghanistan. (CBS News)
  - List of drone strikes in Afghanistan
  - Footage released by The New York Times shows that a U.S. drone strike conducted
    on August 29 targeted an aid worker named Zemari Ahmadi instead of ISIS-K militants.
    The report also confirms that 10 Afghans were killed in the drone strike, including
    seven children. (Business Insider)
  - 2021 Afghan protests
  - The Office of the United Nations High Commissioner for Human Rights says that
    the Taliban response to the peaceful marches has been increasingly violent, with
    authorities using live ammunition, batons and whips, which has resulted in the
    deaths of four civilians. A spokesperson for the rights office says that the response
    from the Taliban has been "unfortunately severe". (Reuters)
  - 2021 Guinean coup d'état
  - The African Union suspends Guinea in response to last week's military coup. (Africanews)
  - Iran–PJAK conflict
  - Iranian IRGC Ground Forces strike "terrorist positions" in northern Iraq with
    suicide and combat drones as well as precision-guided artillery. (Tehran Times)
    (Iran International)
  - LGBT rights in Africa
  - A forum for the promotion of LGBT rights is hosted in Kigali, Rwanda, in order
    to address minority rights. At the forum, a Rwandan man describes being assaulted
    by family members when he came out as gay. The forum also documented and urged
    the governments of Tanzania, Uganda, Burundi and Kenya to decriminalize homosexuality
    and protect the minority. (The EastAfrican)
  - 2021 Guinean coup d'état
  - In response to Guinea's expulsion from the Economic Community of West African
    States, the military junta freezes all government assets in the Central Bank of
    the Republic of Guinea in order to "preserve the country's interest". (The Washington
    Post)
  - Epic Games v. Apple
  - United States District Judge Yvonne Gonzalez Rogers rules that Apple Inc. cannot
    stop mobile app developers from directing users to third-party payment options,
    issuing a permanent injunction against the company. (BBC News)
  - Russia's Gazprom says that it has completed the construction of the Nord Stream
    2 natural gas pipeline to Germany. Gazprom says that gas flows to Europe through
    the pipeline cannot begin until they have received approval from German regulators.
    (Reuters)
  - 2021 Guerrero earthquake
  - A landslide occurs at Tlalnepantla, State of Mexico, on the hill known as Cerro
    del Chiquihuite, killing one person and leaving three more missing. It is said
    that the landslide was triggered by the earthquake in Guerrero three days earlier,
    which weakened soil conditions on the hill. (U.S. News & World Report) (ABC News)
  - Two people are killed and nine others are injured after a powerful whirlwind hits
    Pantelleria, Sicily, Italy. (BBC News)
  - A 44-year-old firefighter dies during efforts to contain a wildfire in Málaga,
    Spain, which has triggered the evacuation of 939 people from Estepona and Benahavis.
    Residents of Jubrique and Genalguacil are ordered to stay indoors and close their
    windows due to the risk posed by an overhead fire cloud that could rain down hot
    matter in the area. (ITV News) (El País)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Mongolia
  - Mongolia surpasses 1,000 deaths from COVID-19. (AKIpress News Agency)
  - COVID-19 pandemic in Singapore
  - Singapore reports 568 new locally transmitted cases of COVID-19 in the past 24
    hours, which is the highest single-day total of new cases since August 2020. (Today)
  - COVID-19 pandemic in the United Arab Emirates
  - Visitors to the upcoming Expo 2020 event in Dubai will not be required to show
    proof of vaccination or be tested for COVID-19. (Al Jazeera English)
  - COVID-19 pandemic in Vietnam, COVID-19 vaccination in Vietnam
  - The Vietnamese Ministry of Health issues a conditional approval of the Hayat-Vax
    COVID-19 vaccine for emergency use in the country. (VietnamPlus)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Denmark
  - Denmark becomes the first country in the European Union to lift all of its COVID-19-related
    restrictions, with the lifting of the requirement to show a digital pass in order
    to enter nightclubs, as the country no longer considers COVID-19 to be a "socially
    critical" disease and the vaccination rate has surpassed 80%. (The Guardian) (Associated
    Press)
  - COVID-19 pandemic in Germany, COVID-19 vaccination in Germany
  - The Standing Committee on Vaccination recommends that pregnant or breastfeeding
    women in Germany should be vaccinated two doses against COVID-19 using mRNA-based
    vaccines from the second trimester of pregnancy. (U.S. News & World Report)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record 1,542 new cases of COVID-19 in the past 24 hours.
    (Seven News)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Mauritius
  - Former Prime Minister Navin Ramgoolam is airlifted to India for treatment of COVID-19.
    (Etemaad)
  - COVID-19 pandemic in Togo
  - Togo closes all places of worship and bans all cultural, sporting and political
    events, including weddings and funerals, following an increase in the number of
    new COVID-19 cases in recent weeks. (Barron's)
  - France raises its bird flu alert level to "moderate" after a severe strain of
    the virus was reported this week at a private household in the Ardennes department,
    near the border with Belgium. (Euronews)
  - Brexit and the Irish border
  - The European Union rejects a request from the United Kingdom to renegotiate the
    deal governing the trading position of Northern Ireland. The EU adds that renegotiating
    the deal, which agreed to leave some EU rules in place in Northern Ireland and
    to accept checks on goods arriving from elsewhere in the UK following Brexit,
    would result in "instability, uncertainty and unpredictability in Northern Ireland".
    (Yahoo! News)
  - 2019 Trump–Ukraine scandal
  - Former Rudy Giuliani associate Igor Fruman pleads guilty to one count of soliciting
    a contribution by a foreign national. (USA Today)
  - COVID-19 pandemic in France
  - Former French health minister Agnès Buzyn is charged by the Cour de Justice de
    la République with "endangering the lives of others" over her handling of the
    pandemic. (The Straits Times)
  - A new government is formed in Lebanon, with Najib Mikati becoming Prime Minister
    of Lebanon for the third time. (CNN)
  - Venko Filipče, the health minister of North Macedonia, resigns, claiming moral
    responsibility for the fire that occurred at a field hospital in Tetovo. (Anadolu
    Agency)
  - 2021 Dismantling Global Hindutva Conference
  - The 2021 Dismantling Global Hindutva conference, or the DGH, held between 10-12
    September, apparently started out as a small group of academics planning a modest
    gathering to explore the dangers of Hindutva ideology.
