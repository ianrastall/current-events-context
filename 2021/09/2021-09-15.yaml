Date: '2021-09-15'
Source_URI: Portal:Current events/2021 September 15
Intelligence_Payload:
  Uncategorized:
  - A gunfight during a security operation in North Waziristan District, Pakistan,
    results in the death of seven security forces and five terrorists. (Dawn)
  - Property giant China Evergrande Group admitted it is under "tremendous pressure"
    and may not be able to meet its crippling debt obligations. Angry protesters have
    been gathering outside the real estate firm's headquarters, demanding to know
    about its future. Evergrande is holding $305 billion in liabilities on $147 billion
    in assets reported in 2020. (DW)
  - Three people are killed and at least 60 more injured during a 6.0 earthquake in
    Yongchuan, Sichuan, China. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - The percentage of people who have received their first dose of the COVID-19 vaccine
    in New South Wales surpasses 80%. (7 News)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Alberta
  - Alberta premier Jason Kenney declares a public health emergency and introduces
    vaccine passport system that will give businesses the choice between tough restrictions
    or demanding customers show proof of vaccination or a negative test due to the
    rising number of COVID-19 cases. (The Globe and Mail)
  - COVID-19 pandemic in the United States
  - One in every 500 Americans have died from COVID-19 since the start of the pandemic
    in the U.S. (CNN)
  - COVID-19 pandemic in Chile, Travel restrictions related to the COVID-19 pandemic
  - The Chilean health ministry announces that beginning from October 1, Chileans,
    resident and non-resident foreigners will be able to leave and enter the country.
    (Aviacionline)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports its first animal death from COVID-19 in two beavers from the
    Beaver Breeding Center at the Environmental Department of the capital Ulaanbaatar
    last month. (Xinhuanet)
  - COVID-19 pandemic in Slovenia
  - Slovenia begins to implement a mandatory COVID pass for people aged over 12 years
    old, containing proof of vaccination, a negative test, or have recovered from
    COVID-19 in the previous six months in order to enter all service establishments
    and workplaces with the exception of emergency medical service, grocery stores,
    and chemists. (Euractiv)
  - U.S. president Joe Biden, U.K. prime minister Boris Johnson, and Australian prime
    minister Scott Morrison announce the formation of a new security alliance, named
    AUKUS, aimed at countering China's growing influence in the Indo-Pacific region.
    They also announce, as part of the alliance's first initiative, the Royal Australian
    Navy will be acquiring nuclear-powered submarines. (BBC News)
  - Philippine drug war
  - The Pre-Trial Chamber of the International Criminal Court authorizes the Prosecutor
    to launch an investigation into the Philippine government under President Rodrigo
    Duterte for possible crimes against humanity committed during the drug war. (The
    Washington Post)
  - 2021 Russian legislative election
  - Allies of Russian opposition activist Alexei Navalny, especially Leonid Volkov,
    call to vote for the Communist Party of the Russian Federation in the upcoming
    parliamentary election in order to hurt the ruling United Russia party. Navalny
    and his allies' party was barred from the election after being branded as "extremist"
    last June. (Reuters)
  - Aftermath of the 2021 Argentine legislative election
  - Interior minister and vice president Cristina Fernández de Kirchner's ally Eduardo
    de Pedro offers his resignation following the defeat of the ruling center-left
    government in last Sunday's midterm primaries. Culture minister Tristán Bauer,
    environment minister Juan Cabandié and science and technology minister Roberto
    Salvarezza, all close to Kirchner, also resign. (Reuters)
  - USA Gymnastics sex abuse scandal
  - Simone Biles and three other U.S. gymnasts testify before Congress about the long-term
    sexual abuse of women in USA Gymnastics by team doctor Larry Nassar and the lack
    of investigation by the FBI after the abuse was initially reported in 2015. (AP
    News)
  - Russia demonstrates the use of unmanned ground vehicles in combat formations during
    the weeklong Zapad joint military exercises with Belarus. The two vehicles demonstrated
    were the Uran-9, a tracked vehicle equipped with a 30 mm autocannon, machine gun,
    anti-tank missiles and a flamethrower; and the Nerekhta, equipped with a mounted
    machine gun and a grenade launcher as well as cargo capacity. (Military.com)
  - TikTok announces that they have banned the devious lick challenge, which saw videos
    of students stealing items from schools, such as soap dispensers. (Business Insider)
