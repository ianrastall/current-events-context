Date: '2021-09-23'
Source_URI: Portal:Current events/2021 September 23
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - Islamic State–Taliban conflict
  - Taliban spokesperson Zabihullah Mujahid downplays the presence of ISIL in Afghanistan,
    as analysts say that ISIL is using the same urban warfare tactics previously used
    by the Taliban to fight the Western-backed Afghan government's forces. After the
    attack against Kabul airport last month, the Taliban has vowed to capture the
    leader of ISIL in Afghanistan. (Reuters)
  - Evergrande Default Crisis
  - China's largest property developer Evergrande misses the payment deadline of 83.5
    million USD in offshore bonds, increasing its chances of a bankruptcy. (Financial
    Times)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Laos
  - Laos surpasses 20,000 cases of COVID-19 after reporting a record 694 new cases
    in the past 24 hours. (The Laotian Times)
  - COVID-19 pandemic in Nepal, Travel restrictions related to the COVID-19 pandemic
  - Nepal removes its quarantine requirement and resumes issuing visas on arrival
    for foreign travellers that have been fully vaccinated against COVID-19. (La Prensa
    Latina)
  - COVID-19 pandemic in Singapore
  - Singapore reports a record 1,504 new cases of COVID-19 in the past 24 hours, bringing
    the nationwide total of confirmed cases to 82,856. (CNA)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in Victoria
  - Victoria reports a record 766 new cases and four deaths from COVID-19 in the past
    24 hours. (ABC News Australia)
  - COVID-19 pandemic in Papua New Guinea
  - Papua New Guinea announces a four-week lockdown in parts of the country including
    Eastern Highlands as the number of COVID-19 cases continue to increase, primarily
    due to the Delta variant. Prime Minister James Marape had anticipated the move
    before leaving the country to attend the United Nations General Assembly this
    week in New York City. The country also struggles with its vaccination campaign,
    as only 2% of the population has been vaccinated. (RNZ)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Portugal
  - Prime Minister António Costa announces that all remaining COVID-19-related restrictions
    will be lifted on October 1, allowing nightclubs to reopen and restaurants to
    operate without capacity limits as more than 80% of people have been fully vaccinated.
    (Bloomberg)
  - COVID-19 pandemic in Russia
  - Russia reports 820 deaths in the past 24 hours, matching a single-day record set
    in late August, bringing the nationwide death toll to 201,445. (The Times of Israel)
  - COVID-19 pandemic in Panama
  - In a speech at the United Nations General Assembly, President Laurentino Cortizo
    says that Panama is expected to reach herd immunity in the coming weeks after
    vaccinating 4.2 million people. (Reuters)
  - Foot-and-mouth disease
  - Namibia reports the new strain of foot-and-mouth disease (FMD) in the country
    that has infected thousands of cattle. (Reuters)
  - Haiti–United States relations, Haitian deportation in the United States
  - United States Special Envoy for Haiti Daniel Lewis Foote resigns, citing his dissatisfaction
    with the Biden administration's policy of deporting illegal Haitian immigrants.
    (AFP via France 24)
  - Foreign relations of the Philippines, Foreign relations of Palau
  - Philippine foreign affairs secretary Teodoro Locsin Jr. meets with Palauan president
    Surangel Whipps Jr., with Locsin reiterating that the Philippines has a commitment
    to resolve a maritime dispute with Palau regarding a 200 nautical mile exclusive
    economic zone which both countries currently claim. (Phil Star)
  - France–United States relations
  - French foreign minister Jean-Yves Le Drian tells U.S. Secretary of State Antony
    Blinken that it will take "time and actions" in order to restore confidence and
    good relations between France and the United States after France condemned the
    security pact between the United States, the United Kingdom and Australia announced
    last week. (Reuters)
  - 2017–2018 Spanish constitutional crisis
  - Fugitive former Catalan president Carles Puigdemont is arrested at an airport
    in Alghero, Sardinia, by the Italian police in compliance with a search and arrest
    warrant issued by the Supreme Court of Spain. He is accused of sedition for his
    role in the 2017 Catalan independence referendum and the subsequent failed declaration
    of independence. (Cadena SER)
  - Collierville Kroger shooting
  - A gunman opens fire at a Kroger supermarket in Collierville, Tennessee, United
    States, killing one person and injuring 12 others before killing himself. (CNN)
  - LGBT rights in Mexico
  - Same-sex marriage is legalized in the state of Sonora, Mexico. (Reuters)
  - Ukraine passes a law ordering oligarchs to stay out of politics, a day after the
    failed assassination attempt to kill an aide of President Volodymyr Zelenskyi,
    which officials said could have been a response to the reform. (Reuters)
  - The European Commission announces plans to require the USB-C connection to become
    the standard port for wired charging of all smartphones, tablets, cameras, headphones,
    portable speakers and handheld video game consoles. (The Hill)
