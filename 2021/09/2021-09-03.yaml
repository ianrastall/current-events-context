Date: '2021-09-03'
Source_URI: Portal:Current events/2021 September 3
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - Panjshir conflict
  - The Taliban says that it now controls the Panjshir Valley, and thus all of Afghanistan.
    Resistance leader Amrullah Saleh denies leaving the country and says that the
    resistance, also led by Ahmad Massoud, continues. (Reuters)
  - 2021 Auckland Countdown stabbing
  - Six people are injured, three critically, in a mass stabbing at a supermarket
    in LynnMall, Auckland, New Zealand. The attacker, a man who had been under surveillance
    since 2016 for following ISIL online, is shot dead by police. (BBC News) (RNZ)
  - Aftermath of the Second Libyan Civil War
  - Rival armed groups clash in Tripoli, in what is described as the worst confrontation
    since the ceasefire reached in 2020 between the Government of National Accord
    and the Libyan National Army forces. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in the Philippines, COVID-19 vaccination in the Philippines
  - The Philippine Food and Drug Administration approves the emergency use of the
    Moderna COVID-19 vaccine for children between the ages of 12 and 17 years old.
    (Rappler)
  - COVID-19 pandemic in Singapore, COVID-19 vaccination in Singapore
  - The Singaporean health ministry will administer booster doses of the COVID-19
    vaccine for people over the age of 60, people who are immunocompromised and residents
    of nursing home facilities beginning later this month. (CNBC)
  - COVID-19 pandemic in North Korea
  - North Korean leader Kim Jong-un demands that officials wage a tougher epidemic
    prevention campaign in “our style” after he rejects a donation of three million
    doses of the COVID-19 vaccine from the U.N. COVAX initiative. (NBC News)
  - COVID-19 pandemic in Vietnam
  - Vietnam surpasses 500,000 cases of COVID-19 after reporting a record 14,922 new
    cases in the past 24 hours. (The Star)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record 1,431 new cases and 12 deaths from COVID-19 in
    the past 24 hours. (The Sydney Morning Herald)
  - COVID-19 pandemic in French Polynesia
  - French Polynesia extends their COVID-19 lockdown to September 20 following the
    deaths of more than 200 people over the past two weeks. The lockdown extension
    will apply to the Society Islands and the Tuamotus archipelago as the number of
    cases increase in those regions. (RNZ)
  - COVID-19 pandemic in Cuba
  - Cuba begins a nationwide COVID-19 vaccination campaign for children aged two to
    18 years old as a condition to reopen schools for in-person learning using Abdala
    and Soberana vaccines. (France 24)
  - COVID-19 pandemic in the United Kingdom, COVID-19 vaccination in the United Kingdom
  - The Joint Committee on Vaccination and Immunisation recommends that healthy children
    between the ages of 12 and 15 should not be given a COVID-19 vaccine due to children
    being at low risk for COVID-19 and the vaccine only offering a marginal benefit.
    (BBC News)
  - Bangladesh has reported a total of 10,981 dengue fever cases and 48 related deaths
    since the beginning of the year. (Al Jazeera)
  - Foreign relations of the European Union
  - The European Union says that it will not currently recognize a Taliban government
    in Afghanistan and that the government will be "subjected to conditions". However,
    the EU also states that it will still engage the group in diplomatic talks. (Reuters)
  - Foreign relations of Chile
  - China and Chile jointly announce the opening of a Sinovac COVID-19 vaccine production
    plant in the Santiago Metropolitan Area. Health minister Enrique Paris says that
    "it is a happy day for Chile and Latin American countries" because Chile would
    now be able to export vaccines. (Al Jazeera)
  - Aftermath of the January 6 United States Capitol attack
  - Criminal proceedings in the January 6 United States Capitol attack
  - Jake Angeli, also known as Jacob Chansley and "the QAnon shaman", pleads guilty
    to obstruction of the electoral college vote count during the January 6 riot at
    the United States Capitol. His sentencing is scheduled for November 17. (CBS News)
  - Catholic Church sexual abuse cases
  - Defrocked Catholic Cardinal Theodore McCarrick pleads not guilty to three counts
    of indecent assault and battery on a 16-year-old boy at a wedding reception in
    Massachusetts in 1974. The statute of limitations paused when he left the state
    shortly after the alleged incident. McCarrick is the first American cardinal to
    be charged with a sex crime. (DW)
  - COVID-19 pandemic in New Caledonia
  - The Congress of New Caledonia votes to make vaccination against COVID-19 mandatory
    for all adults, including anyone visiting New Caledonia, and set December 31 as
    a deadline to vaccinate them. (Radio France Internationale)
  - European Commission–AstraZeneca COVID-19 vaccine dispute
  - The European Union and AstraZeneca reach a settlement to end a legal battle over
    slow delivery of the Oxford–AstraZeneca COVID-19 vaccine, with an agreement that
    requires AstraZeneca to deliver the remaining 200 million doses of its vaccine
    to the EU countries at the end of March 2022. (Euronews)
  - The president of Vanuatu, Obed Moses Tallis, pardons former prime ministers Charlot
    Salwai, Joe Natuman and Serge Vohor, all of whom were convicted of political and
    financial crimes, including bribery and corruption. (RNZ)
  - 2021 Liberal Democratic Party leadership election
  - Yoshihide Suga, the Prime Minister of Japan, announces that he will not seek re-election
    after one year in office. Suga had replaced former Prime Minister Shinzo Abe who
    resigned for health reasons in September 2020. (CNN)
