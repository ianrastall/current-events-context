Date: '2021-09-27'
Source_URI: Portal:Current events/2021 September 27
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - Islamic State–Taliban conflict
  - ISIL–K leader Mawlawi Ziya ul-Haq is killed and more than 80 fighters are arrested
    during Taliban raids in the eastern Nangarhar Province. The raids are carried
    out as ISIL-K has killed several people during attacks in Jalalabad in recent
    days. (Al Jazeera)
  - Insurgency in Cabo Delgado
  - A Tanzanian soldier is killed while two more Tanzanian and a Lesotho soldiers
    are wounded after storming an ISIL-linked groups hideout in Cabo Delgado, Mozambique.
    (Mmegi)
  - Colombian conflict
  - Ten FARC dissidents are killed during a military bombing in Morichal Nuevo, Guainía
    Department. (Reuters)
  - 2021 United Kingdom fuel panic buying
  - The government places the army on standby to help deliver fuel to petrol stations
    if it becomes necessary after panic buying has depleted their stocks. The increased
    demand arose after press reports that the ongoing delivery driver shortage could
    reduce the availability of fuel. (BBC News)
  - 2021 Cumbre Vieja volcanic eruption
  - The Cumbre Vieja volcano becomes highly active again after two periods during
    the day with no emission of ash and lava. (El País)
  - 2021 Crete earthquake
  - A 5.8 magnitude earthquake strikes the Greek island of Crete, killing one person
    and injuring 35 others. (Reuters)
  - Power outages are reported in the Northeast China provinces of Liaoning, Jilin,
    and Heilongjiang. Local media said that the cause of the outages was an increase
    in coal prices. The State Grid Corporation of China said that it would take comprehensive
    measures to ensure an adequate power supply for people's basic needs and try its
    best to avoid power cuts. (BBC News) (Xinhuanet)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan, COVID-19 drug development
  - The Health Ministry panel committee approve the usage of the single-dose monoclonal
    antibody-based treatment sotrovimab developed by GlaxoSmithKline and Vir Biotechnology
    to treat mild and moderately-ill COVID-19 patients. (The Japan Times)
  - COVID-19 pandemic in Jordan
  - Hussein, Crown Prince of Jordan tests positive for COVID-19. (Arab News)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 19 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 1,152. (Xinhuanet)
  - COVID-19 pandemic in Singapore
  - Singapore limits the maximum group sizes for social gatherings and dine-ins at
    restaurants and bars to two people as well as defaulting to work from home in
    order to reduce the spread of COVID-19. These restrictions will remain in effect
    until October 24. (Singapore Business Review)
  - COVID-19 pandemic in the United States
  - The U.S. surpasses 43 million cases of COVID-19. (KOKI-TV)
  - COVID-19 vaccination in the United States
  - COVID-19 pandemic in Vermont
  - People over the age of 75 in Vermont can now register to receive a booster shot
    of the Pfizer–BioNTech COVID-19 vaccine. (AP)
  - COVID-19 pandemic in Washington, D.C.
  - President Joe Biden receives his third dose of the COVID-19 vaccine. (CNBC)
  - COVID-19 pandemic in Chile
  - The government announces that the state of catastrophe and the night curfew in
    the country will end on October 1. (Cooperativa.cl)
  - Hungary–Russia relations, Hungary–Ukraine relations
  - Hungary and Russia sign a natural gas supply deal which will see Gazprom supply
    Hungary with 4.5 billion cubic metres of gas annually via Serbia and Austria for
    the next 15 years. Ukraine criticizes the gas pact, saying that it is a "purely
    political, economically unreasonable decision". In response, Hungarian Foreign
    Minister Péter Szijjártó accuses Ukraine of "meddling" in its internal affairs.
    (Reuters)
  - 2021 Taliban offensive, Foreign relations of Afghanistan
  - Afghanistan's permanent representative to the United Nations Ghulam Isaczai withdraws
    from the list of speakers at the United Nations General Assembly. The move comes
    after the Taliban nominated a delegation to represent Afghanistan at the United
    Nations, although the UN continues to recognize the Ashraf Ghani-led government
    as the country's permanent mission. (AFP via Dawn)
  - South Sudan–Sudan relations
  - Sudan resumes its importation of oil from neighboring South Sudan, which was temporarily
    halted due to Darfur War-related protests blocking access to Port Sudan. (AFP
    via Radio France Internationale)
  - LGBT rights in Poland
  - Three regions in Poland repeal their status as an "LGBT-free zone" after pressure
    from the European Commission and activists. The declaration of "free of LGBT ideology"
    had been imposed in 2019 under heavy pressure from Catholic conservatives in the
    regions. (Reuters)
  - American singer R. Kelly is found guilty of racketeering and sex trafficking over
    a two-decade period. (BBC News)
  - 2021 Swiss same-sex marriage referendum, LGBT rights in Switzerland
  - Official results show that the "yes" campaign won and that same-sex marriage will
    be legalized in Switzerland. Results show 64.1% voting yes with 35.9% voting no.
    (Deutsche Welle)
  - 2019 Bougainvillean independence referendum
  - Bougainvilleans are consulted by president Ishmael Toroama as to where the capital
    of Bougainville should be located once the region achieves full independence from
    Papua New Guinea. Currently, the capital is Buka but this was always considered
    temporary due to the civil war. The strongest push is for Arawa to be designated
    as the capital. (RNZ)
  - 2021 Haitian general election, 2021 Haitian constitutional referendum, 2018–2021
    Haitian protests
  - The Provisional Electoral Council postpones indefinitely the election and constitutional
    referendum for a third time, targeting 7 November 2021, after Prime Minister Ariel
    Henry dismissed several members of the council. (AFP via Philippine Daily Inquirer)
  - 2021 Sammarinese abortion referendum, Abortion in San Marino
  - After a final tally of votes from yesterday's referendum establishes a majority
    of 77%, abortion at up to 12 weeks of pregnancy is legalized in San Marino. (Associated
    Press)
  - UEFA announces that it has abandoned and nullified its disciplinary cases against
    football clubs Barcelona, Juventus, and Real Madrid over their commitment to the
    controversial European Super League, following a Madrid court ruling. UEFA also
    says that it will not request payment of the sums offered by the nine other founding
    clubs. (AFP via New Straits Times)
