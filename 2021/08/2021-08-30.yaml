Date: '2021-08-30'
Source_URI: Portal:Current events/2021 August 30
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - 2021 evacuation from Afghanistan
  - Withdrawal of United States troops from Afghanistan, Operation Allies Refuge
  - Marine Corps General Kenneth F. McKenzie Jr. announces that the final American
    troops have left Afghanistan, concluding U.S. involvement in the Afghanistan war.
    U.S. President Joe Biden also confirms the end of the war in a statement. (The
    New York Times) (KXTV-TV)
  - Army General Christopher T. Donahue becomes the last American servicemember to
    leave Afghanistan. (The Guardian)
  - Taliban spokesman Zabiullah Mujahid says that yesterday's airstrike by the United
    States killed civilians and that if "there was any potential threat in Afghanistan,
    it should have been reported to us, not an arbitrary attack that has resulted
    in civilian casualties". (The Washington Post) (Reuters)
  - Video games in China, Video game addiction in China
  - China's General Administration of Press and Publication announces new regulations
    prohibiting youth under the age of 18 years old from playing online video games
    for more than three hours per week, citing physical and mental health concerns.
    Playing of online video games will only be allowed between 8:00 pm and 9:00 pm
    on weekends and holidays. (CNBC)
  - 2021 Atlantic hurricane season
  - Hurricane Ida is downgraded to a tropical storm after battering the U.S. state
    of Louisiana. Governor John Bel Edwards urges citizens "to remain where you are"
    as the storm left heavy damage in the state. Heavy rains and winds are also expected
    in the Tennessee and Ohio valleys as the storm moves further north. (The Washington
    Post) (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia, Impact of the COVID-19 pandemic on education
  - Jakarta reopens schools for some students for the first time after 18 months of
    remote learning with enhanced safety and health measures as the community activities
    restrictions are eased in some regions of the country. (The Guardian)
  - COVID-19 pandemic in Malaysia
  - Prime Minister Ismail Sabri Yaakob enters quarantine following a close contact
    with a COVID-19 patient. (Al Jazeera English)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record 22,366 new cases of COVID-19 in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 1,976,202. (Rappler)
  - COVID-19 pandemic in Vietnam
  - Vietnam reports a record 14,224 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 449,489. (Viet Nam News)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record 1,290 new cases of COVID-19 in the past 24 hours.
    (9 News)
  - Australia surpasses 1,000 deaths from COVID-19. (News.com.au)
  - COVID-19 pandemic in New Zealand, COVID-19 vaccination in New Zealand
  - New Zealand reports its first death related to the Pfizer–BioNTech COVID-19 vaccine
    in a woman who died after suffering myocarditis, a rare side-effect of the vaccine.
    (TVNZ)
  - COVID-19 pandemic in the Czech Republic
  - The Czech government announces that the country will begin offering a booster
    dose of the COVID-19 vaccine from September 20 to all people who previously have
    been vaccinated at least eight months ago using either Pfizer or Moderna vaccines.
    (Reuters)
  - COVID-19 pandemic in South Africa, Variants of SARS-CoV-2
  - Scientists in South Africa detect a new variant of SARS-CoV-2 called C.1.2 which
    is associated with increased transmissibility and the ability to evade antibodies.
    The variant was first identified in Gauteng and Mpumalanga provinces and has spread
    to seven countries as of August 13. (Bloomberg)
  - Nuclear power in North Korea
  - The International Atomic Energy Agency says that North Korea appears to have restarted
    its Nyongbyon nuclear reactor in a breach of the September 2018 inter-Korean summit
    declaration and United Nations Security Council resolutions. (BBC News)
  - Armed gang members take hostages during their getaway following three bank robberies
    in Araçatuba, São Paulo, Brazil. Three people are killed during the incident,
    including two civilians and one of the robbers. Four other people are wounded,
    including one during an explosion. Three suspects have been arrested. (BBC News)
  - Kira Yarmysh, the official spokeswoman for incarcerated Russian activist Alexei
    Navalny, leaves Russia, reportedly travelling to Helsinki, Finland, after a court
    sentenced her to a restriction of movements for 18 months due to alleged breaches
    of COVID-19 restrictions. (Reuters)
  - 2020 Summer Paralympics
  - India at the 2020 Summer Paralympics, Shooting at the 2020 Summer Paralympics
  - Paralympian and rifle shooter Avani Lekhara becomes the first Indian woman to
    win a gold medal in the Summer Paralympics. (ESPN)
  - Impact of the COVID-19 pandemic on sports
  - Chiba Prefecture halts a program that allow children to watch the Tokyo Summer
    Paralympics in person after two school teachers tested positive for COVID-19.
    (NHK World-Japan)
