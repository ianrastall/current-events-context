Date: '2021-08-12'
Source_URI: Portal:Current events/2021 August 12
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - Taliban insurgency
  - 2021 Taliban offensive, Battle of Kandahar (2021)
  - The Taliban captures the provincial capitals of Ghazni, Qala e Naw, Kandahar and
    Herat, bringing the number of provincial capitals taken in the past seven days
    to thirteen. (Reuters) (Al Jazeera) (Associated Press) (The New York Times)
  - Withdrawal of United States troops from Afghanistan
  - The Pentagon announces it will send U.S. troops to Kabul's Hamid Karzai International
    Airport to help evacuate staff from the U.S. Embassy while U.S. Department of
    State spokesperson Ned Price states that the embassy will remain open. (The Wall
    Street Journal)
  - The British government announces that 600 troops will be deployed to Afghanistan
    on a short-term basis in order to help evacuate British citizens and protect Afghan
    staff and interpreters. Around 4,000 UK nationals are currently in the country.
    (BBC News)
  - Afghan authorities arrest Dawood Laghmani, the governor of Ghazni province, for
    abandoning the city of Ghazni when the Taliban captured it. The Interior Ministry
    also reports the arrest of many of Laghmani's colleagues. (Asian News International)
  - Tigray War
  - The Tigray Defense Forces seize the city of Weldiya in the Amhara Region as they
    continue to advance south. (Foreign Policy)
  - Plymouth shooting
  - Six people, including the gunman, are killed and two more are wounded in a mass
    shooting in Plymouth, Devon, England. Eyewitnesses say that the shooting began
    at a house before the shooter "randomly started shooting" on the street. (BBC
    News)
  - A helicopter carrying 13 tourists and three crew members crashes into Kurile Lake
    in Kamchatka Krai, Russia. Eight of the people on board survived, while the fate
    of the others remain unknown. (BBC News)
  - Flash flooding in Turkey's northern Kastamonu Province kills nine people, while
    flooding in the Sinop Province leaves one person missing. Four bridges have collapsed
    and 170 villages are without power while over 900 people have been evacuated,
    according to a statement from the Disaster and Emergency Management Presidency.
    (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada, COVID-19 vaccination in Canada
  - COVID-19 pandemic in British Columbia
  - British Columbia announces that everyone working in long-term care and seniors’
    assisted living facilities will be required to be vaccinated against COVID-19
    by mid-October, becoming the first province in Canada to impose such a mandate.
    (The Globe and Mail)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - COVID-19 pandemic in the San Francisco Bay Area
  - San Francisco mayor London Breed issues a mandate requiring proof of full vaccination
    in indoor public spaces, making San Francisco the first major U.S. city to do
    so. (KTVU)
  - COVID-19 pandemic in Missouri
  - Missouri surpasses 10,000 deaths from COVID-19. (KTVI)
  - COVID-19 vaccination in the United States
  - U.S. Health Secretary Xavier Becerra announces that the U.S. Department of Health
    and Human Services will require healthcare workers to receive a COVID-19 vaccine.
    (Politico)
  - The U.S. Food and Drug Administration authorizes a booster dose of the Pfizer–BioNTech
    and Moderna COVID-19 vaccines for immunocompromised people. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Cambodia
  - Cambodia begins to administer the Oxford–AstraZeneca COVID-19 vaccine as a third
    "booster" dose to people who have received the inactivated virus vaccines developed
    by Sinopharm (BBIBP-CorV) and Sinovac (CoronaVac) in order to strengthen immunity
    against the SARS-CoV-2 Delta variant. (The Jakarta Post)
  - COVID-19 pandemic in Japan
  - Japan reports a record for the second consecutive day of 18,822 new cases of COVID-19.
    (The Japan Times)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record 21,688 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 1,342,215. (Free Malaysia
    Today)
  - COVID-19 pandemic in Thailand
  - Thailand reports a record 22,782 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 839,771. (Philippine Daily
    Inquirer)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the Republic of Ireland, COVID-19 vaccination in the Republic
    of Ireland
  - Ireland opens registration for children between the ages of 12 and 15 to receive
    a COVID-19 vaccine. Around 280,000 children will be eligible for vaccination with
    the Pfizer–BioNTech or Moderna vaccines, with more than 50,000 already registered.
    (BBC News)
  - COVID-19 pandemic in Russia
  - Russia reports a record 808 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 168,049. (The Moscow Times)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in the Australian Capital Territory
  - The Australian Capital Territory enters a lockdown after the first locally acquired
    case of COVID-19 in over a year was reported. Every state and territory on the
    east coast of Australia, where the majority of the national population lives,
    is now under a lockdown. The last time this occurred was at the beginning of the
    pandemic in 2020. (The Australian)
  - COVID-19 pandemic in Lesotho
  - Lesotho prime minister Moeketsi Majoro self-isolates after testing positive for
    COVID-19. (The Guardian)
  - The Moderna COVID-19 vaccine is found to be effective against the Lineage B.1.617
    Delta variant for six months. (CNN)
  - The population of white Americans declines for the first time, and population
    growth is at its lowest since the Great Depression, per the results of the 2020
    census. (Reuters)
  - Foreign relations of Vanuatu
  - Vanuatu stops the sale of its citizenship and revokes the citizenship it gave
    last April to a Syrian national for US$130,000. (RNZ International)
  - Foreign relations of Argentina, AMIA bombing, Iran and state-sponsored terrorism
  - Argentina condemns the designation of Ahmad Vahidi to a ministerial rank in the
    new government of President Ebrahim Raisi in Iran. Argentina issued a red notice
    through INTERPOL against Vahidi for his alleged connection with the 1994 AMIA
    bombing. The Foreign Ministry expressed its condemnation of the designation as
    "an affront to the Argentine justice and the victims of the brutal terrorist attack".
    (Buenos Aires Times)
  - Turkey's migrant crisis
  - Armed locals in Ankara, Turkey, attack shops, houses and cars owned by Syrians.
    The assaults occurred after a Turkish teenager was killed yesterday during a fight
    between Syrians and locals, and the wounding of Turkish men who were stabbed by
    a Syrian man in another incident. (BBC News)
  - 2021 Algeria wildfires
  - President Abdelmadjid Tebboune, in a televised address, announces that 22 people
    have been arrested for causing the wildfires which have left 65 people dead so
    far. (Reuters)
  - Political impact of the COVID-19 pandemic, 2021 Madagascar food crisis
  - President Andry Rajoelina dismisses his entire cabinet citing "failures in government"
    as the country struggles with severe food shortages, an increasing number of COVID-19
    infections and a political crisis over a recently uncovered plot to assassinate
    the president. (France 24)
