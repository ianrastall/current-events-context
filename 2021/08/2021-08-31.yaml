Date: '2021-08-31'
Source_URI: Portal:Current events/2021 August 31
Intelligence_Payload:
  Uncategorized:
  - Afghanistan conflict
  - Panjshir conflict
  - The National Resistance Front of Afghanistan says that their fighters have killed
    eight Taliban members in clashes in the Panjshir Valley, the final stronghold
    outside of Taliban control. A large number of Taliban forces have been deployed
    near the valley, while negotiations take place in order to resolve the conflict.
    (Reuters)
  - Aftermath of the withdrawal of United States troops from Afghanistan
  - Celebratory gunfire occurs in Kabul by Taliban fighters following the departure
    of the last aircraft carrying U.S. troops. Taliban spokesperson Zabihullah Mujahid
    says during a news conference that "it is a historical day and a historical moment"
    and that "the Taliban are proud of these moments, that we liberated our country
    from a great power." (Reuters)
  - Houthi–Saudi Arabian conflict
  - A drone attack against the Abha International Airport in Abha, Saudi Arabia, injures
    eight people. (Al Jazeera)
  - Insurgency in Balochistan, International military intervention against ISIL
  - Eleven Islamic State militants are killed in a raid by Pakistani counter-terrorism
    units in Mastung, Balochistan Province, where ISIL militants had recently killed
    two police officers. Suicide belts, hand grenades and assault rifles are seized
    during the raid. (AP via ABC News)
  - 2021 California wildfires
  - California fire officials issue an evacuation order for the Lake Tahoe Basin as
    the Caldor Fire continues to spread. The fire has burned 177,000 acres and destroyed
    over 470 structures so far. (CBS News)
  - The United States Forest Service orders all national forests in California to
    be closed until mid-September in order to help combat the state's wildfires. (CBS
    News)
  - 2021 Atlantic hurricane season
  - Two people are killed and 10 more are injured after a 50 foot section of Mississippi
    Highway 26 collapses west of Lucedale, Mississippi due to Hurricane Ida. (CBS
    News)
  - At least 32 people are killed and more than 20 others are wounded as a bus plummets
    from a cliff in Lima, Peru. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh, COVID-19 vaccination in Bangladesh
  - The Bangladesh Armed Forces receives a consignment of COVID-19 vaccines from China's
    People's Liberation Army for the first time as part of foreign military assistance.
    (United News of Bangladesh)
  - COVID-19 pandemic in Israel
  - Israel reports a record 10,947 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 1,066,352. (Israel Hayom)
  - COVID-19 pandemic in Fiji
  - The top medical adviser to the government says that the vaccination of children
    between the ages of 12 and 17 years old is "crucial" in order to prevent more
    fatalities among children as Fiji has reported ten children dying from COVID-19,
    most recently a six-month-old boy who was infected with the Delta variant. (RNZ)
  - COVID-19 pandemic in the Republic of Ireland
  - The Irish Cabinet approves a plan that would lift all COVID-19-related restrictions
    in Ireland on October 22 subject to 90% of adults being vaccinated and the number
    of COVID-19 cases remaining manageable. (BBC News)
  - COVID-19 pandemic in Morocco, COVID-19 vaccination in Morocco
  - Morocco begins a COVID-19 vaccination program for children aged 12 to 17 years
    old in an effort to ensure their return to schools. (Africanews)
  - COVID-19 pandemic in the United States
  - The U.S. surpasses 39 million cases of COVID-19. (KIRO-TV)
  - COVID-19 pandemic in Georgia
  - Georgia reports a record 9,641 new cases of COVID-19 in the past 24 hours. (AP)
  - COVID-19 pandemic in Idaho
  - Idaho governor Brad Little activates and deploys the Idaho National Guard to hospitals
    to stop the spread of COVID-19 cases in the state. (Idaho Statesman)
  - COVID-19 pandemic in Pennsylvania
  - Pennsylvania governor Tom Wolf announces a mask mandate for Pennsylvania schools
    and daycares. The mandate will take effect on September 7. (CBS News)
  - Variants of SARS-CoV-2
  - The World Health Organization designates scientifically-named B.1.621 variant,
    known as "Mu" and first detected in Colombia, as variant of interest, amid concerns
    that it has mutations which suggest it is more resistant to vaccines. (The Daily
    Telegraph)
  - Australia–Singapore relations, COVID-19 vaccine, International aid related to
    the COVID-19 pandemic
  - Australia signs a vaccine swap agreement with Singapore that will allow it to
    receive 500,000 doses of the Pfizer–BioNTech COVID-19 vaccine from Singapore later
    this week. (Forbes)
  - Afghanistan–India relations
  - The Indian ambassador to Qatar Dr. Deepak Mittal meets with Taliban representative
    Sher Mohammad Abbas Stanikzai in Doha to discuss the repatriation of Indian citizens
    who are currently in Afghanistan. (Times of India)
  - Capital punishment in Bangladesh, LGBT rights in Bangladesh
  - A court in Bangladesh sentences six men affiliated with Ansar al-Islam, an organization
    linked to al-Qaeda, to death, for the 2016 murders of two gay rights campaigners,
    including Xulhaz Mannan. Local gay and LGBT organizations welcome the verdict.
    (Reuters)
  - Transgender rights in the United States
  - Twenty U.S. states, led by Tennessee Attorney General Herbert Slatery, file a
    lawsuit against the Biden administration in an attempt to halt new regulations
    put forth by the Equal Employment Opportunity Commission and the United States
    Department of Education promoting transgender rights in schools, alleging federal
    overreach. (Fox News)
  - Corruption in Peru
  - The Peruvian judiciary kicks off a preliminary court hearing against Popular Force
    leader Keiko Fujimori to decide whether to prosecute her for money laundering
    and her involvement in the Odebrecht scandal. (RPP)
  - 2021 Estonian presidential election
  - Alar Karis is elected President of Estonia by the Riigikogu. (ERR)
  - A SpaceX Dragon 2 from the re-supply mission SpaceX CRS-23 successfully docks
    with the Harmony module of the International Space Station, carrying 4,800 lbs.
    of supplies. (SciTechDaily)
