Date: '2021-10-01'
Source_URI: Portal:Current events/2021 October 1
Intelligence_Payload:
  Uncategorized:
  - Allied Democratic Forces insurgency
  - Thirteen Allied Democratic Forces terrorists are arrested in Rwanda after planning
    multiple bombing attacks in Kigali. The planned attacks came as Rwanda is helping
    Mozambique fighting ISIL-linked groups in the Insurgency in Cabo Delgado. (Africa
    News)
  - Islamic State–Taliban conflict
  - A bomb targets a Taliban security forces vehicle, injuring five people. Soldiers
    raided an ISIL-K hideout after the attack, killing several terrorists and arresting
    a few more. (TOLO News)
  - Aftermath of the Fall of Kabul
  - It is announced that the Afghanistan pavilion at Expo 2020 in Dubai will remain
    closed to visitors due to the Taliban takeover of the country. (Reuters)
  - Economy of Venezuela
  - Venezuela launches its second monetary overhaul in the past three years by cutting
    six zeros from its currency in order to simplify accounting. This move was in
    response to hyperinflation, which reached an annual record of 1,743%, amid a serious
    ongoing economic crisis. (MercoPress)
  - Russian gas supplies via the Yamal–Europe pipeline fall almost 77% in a single
    day, raising European gas prices to an all-time high. European Parliament lawmakers
    request investigations of market manipulation, although Gazprom's exports outside
    the former Soviet Union rose 15.3% year on year in the first nine months of 2021
    and German utility Uniper confirms that Russia was fulfilling its contractual
    obligations. (Reuters) (RFE/RL)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia, COVID-19 vaccination in Malaysia
  - Malaysia grants the conditional approval of the Sinovac Coronavac vaccine for
    children aged above 12. (The Star)
  - COVID-19 pandemic in the Philippines, COVID-19 pandemic in Bermuda, Travel restrictions
    related to the COVID-19 pandemic
  - The Philippines adds the British territory of Bermuda to its red list due to COVID-19.
    Bermuda became the first British territory to be added to the Asian country's
    red list. (PLS)
  - COVID-19 pandemic in Singapore
  - Singapore reports a record for the fourth consecutive day of 2,909 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 99,430.
    (The Straits Times)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka lifts a nearly six-week lockdown to contain the spread of COVID-19 but
    continues to maintain a night curfew and a ban on public gatherings and parties
    as the number of cases declines. (The Hindu)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Greece
  - Greece imposes a curfew and bans music at bars, cafés and restaurants in Thessaloniki,
    Larissa, Chalkidiki and Kilkis due to an increase in the number of COVID-19 cases
    in the region. (Ekathimerini)
  - COVID-19 pandemic in Russia
  - Russia reports a record for the fourth consecutive day of 887 deaths from COVID-19,
    thereby bringing the nationwide death toll to 208,142. (The Moscow Times)
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - COVID-19 pandemic in New York (state)
  - COVID-19 pandemic in New York City
  - Associate Justice Sonia Sotomayor rejects an order to block the vaccine mandate
    for New York City schoolteachers and employees. (CBS News)
  - COVID-19 pandemic in California
  - California Governor Gavin Newsom announces that California will become the first
    U.S. state to mandate COVID-19 vaccines for all students in schools. (CBS News)
  - The United States surpasses 700,000 deaths from COVID-19. (Reuters)
  - COVID-19 pandemic in Argentina, COVID-19 vaccination in Argentina
  - Argentina authorizes the approval of the Sinopharm COVID-19 vaccine for children
    between the ages of 3 and 11 years. Health minister Carla Vizzotti announces that
    Argentina will end the year with all of its population over the age of 3 years
    vaccinated against COVID-19. (El Universo)
  - COVID-19 pandemic in Australia
  - Australia expands eligibility for the Pfizer–BioNTech and Moderna COVID-19 vaccines
    to include seniors over the age of 60 who had previously only been eligible for
    the Oxford–AstraZeneca vaccine. (The Guardian)
  - Deployment of COVID-19 vaccines
  - It is announced that more than 50 countries have missed the World Health Organization's
    (WHO) target for 10% of their populations to be fully vaccinated against COVID-19
    by the end of September. Most of these countries are in Africa, where the WHO's
    overall figure for fully vaccinated populations is currently 4.4%. (BBC News)
  - Post-Brexit United Kingdom relations with the European Union
  - British Prime Minister Boris Johnson says that the contentious arrangements regarding
    the Northern Irish Protocol could work in principle if they were "fixed" but warns
    the European Union that they could be "ditched" if they do not work. Johnson adds
    that this is a problem that "the United Kingdom did not want". (Reuters)
  - Murder of Cécile Bloch
  - The suicide note left by François Vérove, a 59-year-old French former military
    police officer who committed suicide two days ago in Le Grau-du-Roi, Occitanie,
    reveals that he murdered four people, including 11-year-old Cécile Bloch. The
    serial killer, nicknamed Le Grêlé, was also involved in a series of rapes. (Al
    Jazeera)
  - September 2021 Guayaquil prison riot
  - Ecuador says it will pardon more than 2,000 inmates after 118 inmates were killed
    during a riot at a prison in Guayaquil on 28 September. A government official
    said that some prisoners will be prioritized and that the main goal is to address
    prison overcrowding. (Reuters)
  - Second Berejiklian ministry
  - New South Wales Premier Gladys Berejiklian announces her resignation after the
    Independent Commission Against Corruption revealed that they are investigating
    her over a series of suspicious historical community grants. (ABC News Australia)
  - 2021 Georgian local elections
  - Exiled Georgian politician Mikheil Saakashvili announces that he is back in Georgia
    despite threats by prime minister Irakli Garibashvili, who said that Saakashvili
    would be "immediately arrested and brought to prison" if he returned. Saakashvili,
    in his support for the United National Movement, concluded by saying that "I risked
    my life and freedom to be back". Saakashvili is arrested later in the day. (Deutsche
    Welle) (Reuters)
