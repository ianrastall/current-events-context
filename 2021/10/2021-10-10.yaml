Date: '2021-10-10'
Source_URI: Portal:Current events/2021 October 10
Intelligence_Payload:
  Uncategorized:
  - Yemeni Civil War
  - Six people are killed and seven others are injured by a car bomb targeting the
    governor of Aden. Both the governor and a minister survive and are moved to a
    secure location. (Reuters)
  - Southwest Airlines cancels more than 1,000 flights and delays hundreds more over
    the Columbus Day weekend. The airline cites problems resulting from both air traffic
    control and the weather. (KGO-TV)
  - 2021 Menzelinsk parachute Let L-410UVP-E crash
  - A Let L-410 aircraft carrying a group of parachute jumpers, with 22 people on
    board, crashes after take-off from Menzelinsk Airport, Tatarstan, Russia. Sixteen
    people are killed and six others are injured. (Al Jazeera English)
  - COVID-19 pandemic
  - COVID-19 pandemic in Brunei
  - Brunei reports a record 381 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 8,980. (The Star)
  - COVID-19 pandemic in Italy, COVID-19 vaccination in Italy
  - Italy surpasses its target to fully vaccinate 80% of its adult population. (RTÉ
    News and Current Affairs)
  - COVID-19 pandemic in Venezuela
  - Venezuela receives a shipment of 2.5 million doses of COVID-19 vaccines via the
    COVAX initiative. (Reuters)
  - Cross-Strait relations
  - In a National Day speech, President Tsai Ing-wen states that Taiwan will not bow
    to pressure from China, vowing to uphold the island's sovereignty and democratic
    norms. (The Guardian)
  - China denounces Tsai Ing-wen's speech, saying that it incited confrontation and
    distorted facts. China also says that seeking Taiwanese independence closes the
    door to dialogue. (The Jerusalem Post)
  - Thirty people storm a hospital in Rome, Italy, trying to free an injured man under
    arrest due to his involvement in violent acts yesterday during an anti-Green Pass
    protest. Four people are injured during the incident. (The State)
  - The personal doctor of Georgian politician Mikheil Saakashvili says that he needs
    hospital treatment as he continues his hunger strike after returning from exile
    and being arrested on October 1. Saakashvili's condition has been described as
    "worsening". (Reuters)
  - 2021 Iraqi parliamentary election
  - Iraqis head to the polls to elect the members of the Council of Representatives.
    (AFP via UrduPoint)
  - 2020–21 UEFA Nations League
  - In association football, France defeat Spain, 2–1, in the final held at the San
    Siro in Milan, Italy, to win their first UEFA Nations League title in only the
    second edition of the tournament. (AFP via ABS-CBN News)
