Date: '2021-10-24'
Source_URI: Portal:Current events/2021 October 24
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - Clashes between the Somali National Army and Sufi paramilitary group Ahlu Sunna
    Waljama'a in Galmudug kill at least 30 people and injure more than 100 others.
    (Reuters)
  - 2021 Uganda bombings
  - IS claims responsibility for yesterday's bombing at a bar in Kampala, which killed
    one person and injured three others. (Reuters)
  - The Canadian Coast Guard and local firefighters combat a fire on board the MV
    Zim Kingston, off Victoria, British Columbia. The fire, which started yesterday,
    is focused on ten containers as authorities say that the ship itself is not on
    fire. (The Washington Post)
  - Four mountain climbers are killed by an avalanche on the Chimborazo volcano in
    the Andes in Ecuador. (AFP via RFI)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - Eastern Europe surpasses 20 million cases of COVID-19, with Russia, Ukraine and
    Romania reporting the most deaths. (Al Jazeera)
  - 2021 Uzbek presidential election
  - Uzbeks head to the polls to elect their president. Analysts say that incumbent
    Shavkat Mirziyoyev has his victory for a second term secured as the country struggles
    with its tourism industry and security issues on the Afghanistan–Uzbekistan border
    since the Taliban takeover of Afghanistan. (Deutsche Welle)
  - Guatemala imposes a month-long dawn to dusk curfew on the eastern Izabal Department
    following two days of protests over a new mining project in the region. (The Washington
    Post)
