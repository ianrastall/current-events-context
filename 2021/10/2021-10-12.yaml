Date: '2021-10-12'
Source_URI: Portal:Current events/2021 October 12
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Jammu and Kashmir
  - Indian Armed Forces kill three suspected terrorists during a gunfight in Shopian.
    Another security operation is carried out several hours later at an apple orchard,
    resulting in the deaths of two more terrorists. The raids came a day after five
    Indian soldiers were killed by suspected terrorists. (Al Jazeera)
  - Korean wave
  - American streaming service Netflix, the world's largest entertainment company
    by market capitalization, confirms that the South Korean television series Squid
    Game is its most-watched program worldwide, having been viewed by more than 111
    million accounts since its release in September. (AFP via ABS-CBN News)
  - Economy of France
  - President Emmanuel Macron announces a €30 billion plan to re-industrialize France,
    in order to address what he called "a kind of growth deficit" and make France
    reclaim its title as a "global leader in innovation and research". (CNA)
  - Economy of Ukraine
  - The European Union vows to help Ukraine with its gas supplies as Ukrainian President
    Volodymyr Zelensky underlines his concerns of potential Russian political leverage
    in the region in the aftermath of the agreement with Germany regarding the Nord
    Stream pipeline. (Deutsche Welle)
  - The European Commission raises a climate bond worth (US$13.9 billion) as part
    of its European Green Deal, the largest climate bond issued in the global capital
    market. (AFP via Times of Malta)
  - 2021 Pacific typhoon season
  - At least nine people are killed in the Philippines during floods and landslides
    caused by Tropical Storm Kompasu. (Reuters)
  - At least 25 people are killed and several others are injured in a bus crash in
    Mugu District, Nepal. (BBC News)
  - A train kills three people and injures a fourth, all of whom were lying on the
    tracks in Saint-Jean-de-Luz, Nouvelle-Aquitaine, France. (Deutsche Welle)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Romania
  - Romania reports a record 16,443 new cases and 442 deaths from COVID-19 in the
    past 24 hours, thereby bringing the nationwide total of confirmed cases to 1,382,531
    and the nationwide death toll to 40,071. (Romania Insider)
  - COVID-19 pandemic in Russia
  - Russia reports a record 973 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 218,345. (ABC News)
  - COVID-19 pandemic in San Marino
  - The need to show an immunity passport for access to indoor premises where it is
    not possible to guarantee an interpersonal space, as well as for access to events,
    including sporting events, shows, entertainment events, parties and events where
    dancing takes place and for practicing contact sports, comes into force. (San
    Marino RTV)
  - COVID-19 pandemic in India, COVID-19 vaccination in India
  - Indian drug regulator approves the emergency use of the Bharat Biotech Covaxin
    vaccine for children aged between 2 to 18. (Hindustan Times)
  - COVID-19 pandemic in Panama, COVID-19 vaccination in Panama
  - Panama approves the usage of the Pfizer-BioNTech COVID-19 vaccine as booster for
    high-risk people, including healthcare workers, bedridden residents, nursing home
    residents, and people aged over 55. (Reuters)
  - Iqaluit, capital city of Canada's Nunavut territory, is placed under a Do Not
    Drink Water advisory until further notice due to the possibility of contamination
    by petroleum hydrocarbons. Both boiled and filtered water are not safe for consumption
    at this time. (CTV News)
  - Foreign relations of Afghanistan
  - German Chancellor Angela Merkel says that Germany "is not yet prepared to recognize
    the Taliban government" since they have not met demands of inclusiveness. However,
    Merkel reassures the promise of Germany's 600 million euro aid to the country.
    (Reuters)
  - The International Court of Justice rules in favor of Somalia in its dispute with
    Kenya over a maritime border rich in gas and oil. Kenya labels the case as "biased"
    and says that it does not recognize the ruling. (BBC News)
  - LGBT rights in Botswana
  - A panel of judges in Botswana postpone a ruling on a case brought by the government
    to overturn the 2019 decriminalization of homosexuality in the country. Prior
    to being decriminalized, gay sex was punishable by up to seven years' imprisonment.
    (Reuters)
  - 2021 Cuban protests
  - The Cuban government rejects a request from the opposition to hold a protest in
    Havana on November 15, claiming involvement of the United States government. (AFP
    via France 24)
  - Discoveries of exoplanets
  - NASA astronomers announce the discovery of TIC 257060897b, a Hot Jupiter exoplanet
    that is 50% larger and 30% less massive than Jupiter. The discovery was made using
    the Transiting Exoplanet Survey Satellite. (Science Times)
