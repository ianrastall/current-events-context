Date: '2021-10-30'
Source_URI: Portal:Current events/2021 October 30
Intelligence_Payload:
  Uncategorized:
  - Yemeni Civil War
  - 2021 Aden bombings
  - A car bomb kills 9 people and injures 12 others near Aden International Airport.
    The attack coincided with the arrival of Aden's former governor at the airport,
    who is unhurt. (BBC News)
  - Aftermath of the October 2021 Sudanese coup d'état
  - Three people are killed as the military opens fire at an anti-coup protest in
    Omdurman, bringing the total number of protesters killed since the coup to 14.
    (Al Jazeera)
  - Mali War
  - Seven soldiers are killed in two separate attacks on patrols in Mourdiah. (Reuters)
  - Tigray War
  - The Tigray Defense Forces say that they have captured the strategic city of Dessie
    and are advancing toward neighboring Kombolcha in Amhara. The government denies
    these claims, but residents confirm that the Ethiopian National Defense Force
    have completely withdrawn from Dessie. (Al Jazeera)
  - Internal conflict in Myanmar
  - Over 160 buildings, including two churches, in the town of Thantlang, Chin State,
    have been destroyed by fires resulting from Tatmadaw shelling that occurred the
    previous day. (AP via Global News)
  - Economy of Argentina
  - In his speech at the G20 summit in Rome, president Alberto Fernández says that
    huge debts "condemn generations" and that the "current system prioritizes speculation
    over the development of the peoples", while also condemning the previous administration
    of Mauricio Macri for accepting a $46 billion loan from the International Monetary
    Fund. (Hola News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Russia
  - Russia reports a record 40,351 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 8.47 million. (CTV News)
  - COVID-19 pandemic in Turkey
  - Turkey surpasses eight million cases of COVID-19. (ANI News)
  - COVID-19 pandemic in the United States, COVID-19 vaccination in the United States
  - COVID-19 pandemic in Washington, D.C.
  - Vice President Kamala Harris receives a booster dose of the Moderna COVID-19 vaccine.
    (Axios)
  - COVID-19 pandemic in New Zealand
  - New Zealand reports a record 160 new community cases of COVID-19 in the past 24
    hours. (1 News)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record 423 deaths from COVID-19 in the past 24 hours
    due to reclassification of 373 cases previously listed as recoveries, thereby
    bringing the nationwide death toll to 43,044. (CNA)
  - 2021 Jersey dispute, France–United Kingdom relations
  - Last-ditch talks are held between British and French authorities as local authorities
    in the ports of Calais and Boulogne warn of a "disaster" if the French government
    goes ahead with its plan to "clog up" the English Channel and disrupt the trade
    and sailing of British vessels in French ports. British Prime Minister Boris Johnson
    said that the UK could consider "formal action" under trade agreements. (The Guardian)
  - 2021 G20 Rome summit
  - The 16th G20 summit begins for the first time in person after the beginning of
    the pandemic with Russian President Vladimir Putin and Chinese President Xi Jinping
    appearing via video link. (BBC News)
  - United States–European Union relations
  - United States Commerce Secretary Gina Raimondo announces the removal of tariffs
    on steel and aluminum imports from the European Union that were imposed during
    the presidency of Donald Trump. European Trade Commissioner Valdis Dombrovskis
    announces that the bloc will reciprocate the action on U.S. imports, ending a
    trade war. (Reuters)
  - Lebanon–United Arab Emirates relations
  - The Emirati foreign ministry announces that it will recall its diplomats in Lebanon
    and ban Emirati citizens from traveling to the country "in solidarity with" Saudi
    Arabia, which recalled its ambassador to Lebanon over "insulting" remarks about
    the war in Yemen made by Lebanese information minister George Kurdahi. (AFP via
    Al-Ahram)
