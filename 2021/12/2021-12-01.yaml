Date: '2021-12-01'
Source_URI: Portal:Current events/2021 December 1
Intelligence_Payload:
  Uncategorized:
  - 2021 Afghanistan–Iran clashes
  - Clashes occur between the Taliban and Iran on the Afghanistan–Iran border after
    Iranian farmers crossed the border. (Bloomberg)
  - Mexican drug war
  - 2021 Tula prison break
  - Armed cartel members break into a prison in Tula, Hidalgo using vehicles, detonating
    several car bombs. Nine inmates are freed, including a local drug lord. Two law
    enforcement officers are injured. (The Guardian)
  - Porga attack
  - Two soldiers are killed and others are wounded during an attack at a security
    post by Islamic extremists in Porga, Benin. It is the second confirmed Islamic
    extremist attack in the country's history. (Yahoo! News)
  - Bagwai boat disaster
  - At least 29 people, mostly schoolchildren, drown after an overloaded boat capsizes
    in Bagwai, Kano State, Nigeria. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan, COVID-19 vaccination in Japan
  - Japan begins administering booster doses of the COVID-19 vaccine to healthcare
    workers amid growing concerns over the Omicron variant that has already been detected
    in the country. (The Independent)
  - COVID-19 pandemic in Saudi Arabia
  - Saudi Arabia reports its first case of the SARS-CoV-2 Omicron variant in a citizen
    who travelled from North Africa. (Al Arabiya)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 5,123 new cases of COVID-19 in the past 24 hours,
    bringing the nationwide total of confirmed cases to 452,530. (CNBC)
  - South Korea reports its first five cases of the SARS-CoV-2 Omicron variant in
    a fully vaccinated couple who travelled from Nigeria and later tested positive,
    along with two of their family members and a friend. (The Straits Times)
  - COVID-19 pandemic in the United Arab Emirates
  - The United Arab Emirates reports its first case of the SARS-CoV-2 Omicron variant
    in a citizen who travelled from Africa. (Gulf News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Andorra
  - The Andorran government announces a ten-day quarantine for all travelers coming
    from southern Africa countries. (Diari d'Andorra)
  - COVID-19 pandemic in Denmark
  - Denmark reports a record 5,120 new cases of COVID-19 in the past 24 hours. (Yahoo!
    News)
  - COVID-19 pandemic in Iceland
  - Iceland reports its first case of the Omicron variant. (Morgunblaðið)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland reports its first case of the Omicron variant in a person who recently
    travelled from southern Africa. (The Irish Times)
  - COVID-19 pandemic in Italy
  - Italy reports 103 deaths of COVID-19 in the past 24 hours, making it the deadliest
    toll since June 8. (Il Sole 24ore)
  - COVID-19 pandemic in Poland, COVID-19 vaccination in Poland
  - Polish prime minister Mateusz Morawiecki receives a booster dose of the COVID-19
    vaccine. (The New Indian Express)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - The United States reports its first case of the Omicron variant in a person who
    travelled from South Africa to California. (CNN)
  - COVID-19 pandemic in Mexico, COVID-19 drug development
  - Mexican health regulator COFEPRIS approves the emergency use of Eli Lilly and
    Company's injectable combination of bamlanivimab and etesevimab to treat mild
    to moderate COVID-19 cases in people over the age of 12 years who weigh at least
    . (Reuters)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Ghana
  - Ghana reports its first case of the SARS-CoV-2 Omicron variant in a traveller
    who arrived at Kotoka International Airport in Accra. (The EastAfrican)
  - COVID-19 pandemic in Zimbabwe
  - Zimbabwe announces a nine-hour curfew and compulsory 14-day quarantine for anyone
    arriving in the country, to prevent the spread of the Omicron variant, becoming
    the first country in southern Africa to enact such restrictions. (VOA)
  - Aftermath of COP26
  - Micronesian president David W. Panuelo condemns the outcome of the climate summit,
    stating that industrialized nations must increase their commitments in order to
    help countries switch from fossil fuels to renewable energy. (Reuters)
  - 2021 Australian Parliament House sexual misconduct allegations
  - Former Attorney-General of Australia Christian Porter announces he will retire
    from politics following sexual assault allegations published earlier in the year,
    and controversy surrounding his reliance on a blind trust in a legal battle against
    the Australian Broadcasting Corporation over their reporting of the allegations.
    (The Guardian)
