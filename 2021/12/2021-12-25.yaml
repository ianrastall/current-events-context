Date: '2021-12-25'
Source_URI: Portal:Current events/2021 December 25
Intelligence_Payload:
  Uncategorized:
  - Allied Democratic Forces insurgency; 2021 Democratic Republic of the Congo attacks
  - A suicide bomber blows himself up at a restaurant during Christmas celebrations
    in Beni, Democratic Republic of the Congo, killing five people and injuring 13
    others. (BBC News)
  - Internal conflict in Myanmar
  - Human rights groups and media outlets uncover a massacre of 30 civilians in Hpruso,
    Kayah State, that occurred the day before. Two Save the Children staff are also
    reported missing. (CNN)
  - Internet censorship in China
  - The global version of video game digital distribution service Steam is reportedly
    blocked in China. The China-only version of the service, launched in February
    of this year, remains accessible. (The Verge)
  - 2021 Cumbre Vieja eruption
  - The scientific committee (Pevolca) of the Canary Islands government declares that
    the Cumbre Vieja volcano's eruptions on La Palma island stopped after 10 days
    of inactivity. However, the authorities do not consider the emergency situation
    to be over. (RTVE)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia
  - COVID-19 pandemic in Sarawak
  - Malaysia reports its first locally transmitted case of the SARS-CoV-2 Omicron
    variant in a fully vaccinated 38-year-old Chinese woman from Sarawak with no international
    travel history. (The Star)
  - COVID-19 pandemic in India, COVID-19 vaccination in India
  - The Drug Controller General of India approves the emergency use of the Covaxin
    vaccine manufactured by Bharat Biotech for children between the ages of 12 and
    18 years. (Hindustan Times)
  - COVID-19 pandemic in Israel, COVID-19 drug development
  - The Israeli government finalizes an agreement with Pfizer to purchase 100,000
    courses of the anti-viral drug Paxlovid for high-risk patients over the age of
    12 years, with delivery expected to begin in one week. (The Times of Israel)
  - COVID-19 pandemic in Turkmenistan
  - Turkmenistan becomes one of the first countries to approve the usage of the single-dose
    Sputnik Light COVID-19 vaccine. The health ministry also purchases 600,000 doses
    of the two-dose Sputnik V COVID-19 vaccine. (Anadolu Agency)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - France reports a record for the third consecutive day of 104,611 new cases of
    COVID-19, which is also the first time that the country has reported more than
    100,000 new cases since the beginning of the pandemic. (Al Arabiya)
  - COVID-19 pandemic in Italy
  - Italy reports a record for the third consecutive day of 54,762 new cases of COVID-19,
    thereby bringing the nationwide total of confirmed cases to 5.62 million. (Il
    Sole 24 Ore)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland reports a record for the second consecutive day of 13,765 new cases of
    COVID-19. (Irish Examiner)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record 6,288 new cases of COVID-19 in the past 24 hours.
    (ABC News Australia)
  - COVID-19 pandemic in the Dominican Republic
  - The Dominican Republic reports its first case of the SARS-CoV-2 Omicron variant.
    (Reuters)
  - James Webb Space Telescope, Ariane flight VA256
  - The James Webb Space Telescope is successfully launched using the Ariane 5 rocket
    from the Guiana Space Centre in Kourou, French Guiana. (CNN)
  - Rail transport in Japan
  - Asa Coast Railway announces a dual-mode vehicle that can operate on roads and
    railways. (Dawn Magazine)
