Date: '2021-12-10'
Source_URI: Portal:Current events/2021 December 10
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - A man is killed and others are wounded as Israeli soldiers open fire on a group
    of Palestinian people protesting against Israeli settlements in the occupied West
    Bank. (Al Jazeera)
  - Tornado outbreak of December 10–11, 2021
  - A tornado outbreak hits Arkansas, Missouri, Tennessee and Kentucky, United States.
    Around 50 people are feared dead. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Laos
  - Laos reports a record 1,645 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 86,148. (The Laotian Times)
  - COVID-19 pandemic in Singapore, COVID-19 vaccination in Singapore
  - The Health Sciences Authority approves the usage of the Pfizer–BioNTech COVID-19
    vaccine for children between the ages of 5 and 11 years, with vaccine rollout
    for this age group to begin before the end of the year. (CNA)
  - COVID-19 pandemic in South Korea
  - South Korea surpasses 500,000 cases of COVID-19. (Yonhap News Agency)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Cyprus
  - Cyprus reports its first case of the SARS-CoV-2 Omicron variant in three Greek
    Cypriots who travelled from South Africa in Limassol. (Cyprus Mail)
  - COVID-19 pandemic in Germany, COVID-19 vaccination in Germany
  - The Bundestag and Bundesrat approve a revised Infectious Disease Protection Act
    that would require healthcare workers and other health professionals to be vaccinated
    or to have recovered from COVID-19. The new legislation also requires the closure
    of bars, restaurants and theatres in high-risk areas, as well as the suspension
    of cultural and sporting events in those areas. (Deutsche Welle)
  - COVID-19 pandemic in the Czech Republic
  - The Czech government announces the compulsory COVID-19 vaccination for people
    aged above 60 years, as well as healthcare workers, police officers, firefighters
    and the military, beginning from March 1, as the country experiences the world's
    highest infection rate. (The Times of India)
  - Foreign relations of Nicaragua, Foreign relations of Taiwan, Foreign relations
    of China
  - Nicaragua severs diplomatic relations with Taiwan and establishes diplomatic relations
    with the People's Republic of China. (The Hill)
  - The London High Court accepts an appeal from the U.S. government to extradite
    WikiLeaks founder Julian Assange to the United States. The judge cited that certain
    conditions have been met for his decision. However, the extradition will not take
    place immediately as Assange has a right to appeal the decision. Assange's fiancée
    says that they will appeal the decision "at the earliest possible moment". (CNBC)
