Date: '2021-12-11'
Source_URI: Portal:Current events/2021 December 11
Intelligence_Payload:
  Uncategorized:
  - Israeli Defense Minister Benny Gantz says he has instructed the Israel Defense
    Forces to prepare military options for potential use against Iran, that the Joint
    Comprehensive Plan of Action yielded "no progress", and that world powers "understand
    that the Iranians are playing games". (Haaretz)
  - The Gulf Cooperation Council calls for Iran to take action to salvage the nuclear
    deal and proposes to take part in the talks as a regional power. (Reuters)
  - Tornado outbreak of December 10–11, 2021
  - The death toll from the tornado outbreak in Kentucky, United States, increases
    to 70 and will likely continue to increase as more bodies are counted, according
    to a statement from Governor Andy Beshear. (AP)
  - 2021 Ravanusa explosion
  - Seven people are dead and two more missing after a residential building explodes
    and collapses due to a gas leak in Ravanusa, Agrigento, Sicily, Italy. (BBC News)
  - Storm Barra
  - Two deaths are reported in Navarre due to flooding in northern Spain. (ABC.es)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports its first cases of the SARS-CoV-2 Omicron variant in two female
    cricketers of the Bangladesh Cricket Team who travelled from Zimbabwe. (Asian
    News International)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 80 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 4,210. (The Korea Herald)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports its first cases of the SARS-CoV-2 Omicron variant in three people
    who travelled from the United Kingdom, Eswatini, and the United States. (Reuters)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Malta
  - Malta reimposes one of the EU's strictest mask mandates that requires people to
    wear masks outdoors, with fines of €50 to €100 for failure to comply. (Times of
    Malta)
  - COVID-19 pandemic in Turkey
  - Turkey reports its first six cases of the SARS-CoV-2 Omicron variant in five people
    from the province of Izmir and one person from Istanbul. (TRT World)
  - COVID-19 pandemic in Argentina, COVID-19 pandemic in Uruguay
  - At midnight, terrestrial transport between Argentina and Uruguay reopens as buses
    resume service to border crossings between the two countries. Both countries require
    a proof of vaccination or a negative COVID-19 test in order to board the buses
    and enter both countries. (Misiones Cuatro)
  - COVID-19 pandemic in Mauritius
  - Mauritius reports its first cases of the SARS-CoV-2 Omicron variant in two people
    who travelled from South Africa. (Daily Times)
  - A court in Benin sentences opposition leader Reckya Madougou to 20 years in prison
    after finding her guilty of "financing terrorism". The case has been highly controversial,
    with a judge in the case fleeing to France and denouncing the case as "entirely
    politically motivated". (The Washington Post)
  - MLS Cup 2021
  - New York City FC defeats the Portland Timbers 4–2 in a penalty shoot-out, winning
    their first title. (ESPN)
