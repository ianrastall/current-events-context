Date: '2021-12-03'
Source_URI: Portal:Current events/2021 December 3
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Mali War
  - Mopti bus massacre
  - Militants attack a bus carrying civilians in Mopti Region, killing the driver,
    before setting it on fire and killing 31 passengers. The majority of the victims
    are women who were on their way to work at the local market. (BBC News)
  - Islamic State insurgency in Iraq
  - Seven Peshmerga fighters and three civilians are killed by Islamic State gunmen
    in a village in Makhmour, Erbil Governorate, Kurdistan Region, Iraq. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Belgium
  - Two hippos at Antwerp Zoo test positive for COVID-19 in Antwerp, Belgium. (Deutsche
    Welle)
  - COVID-19 pandemic in Germany
  - Germany surpasses six million cases of COVID-19. (Urdu Point)
  - COVID-19 pandemic in the Republic of Ireland
  - Taoiseach Micheál Martin announces that due to fears of the Omicron variant, from
    December 7 until January 9, nightclubs will be closed and restaurants and bars
    will only be allowed to offer table service for groups of no more than six people.
    Additionally, indoor services can only operate at 50% capacity and families can
    only have visitors from three other households. (Sky News)
  - COVID-19 pandemic in Slovakia
  - Slovakia reports a record 15,278 new cases of COVID-19 in the past 24 hours, bringing
    the nationwide total of confirmed cases to 712,749. (AP)
  - Europe surpasses 75 million cases of COVID-19. (Reuters)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia
  - Malaysia reports its first case of the SARS-CoV-2 Omicron variant in a 19-year-old
    student who travelled from South Africa on November 19 and is in quarantine. (CNA)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka reports its first case of the SARS-CoV-2 Omicron variant in an unvaccinated
    woman who travelled from Nigeria. (Ada Derana)
  - COVID-19 pandemic in Mexico
  - Mexico reports its first case of the SARS-CoV-2 Omicron variant in a 51-year-old
    man who travelled from South Africa. (Anadolu Agency)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in South Africa
  - South Africa surpasses three million cases of COVID-19. (CNN)
  - COVID-19 pandemic in Tunisia
  - Tunisia reports its first case of the SARS-CoV-2 Omicron variant in a Congolese
    man who travelled from Istanbul. (Arab News)
  - France–United Arab Emirates relations
  - French president Emmanuel Macron meets UAE crown prince Mohammed bin Zayed at
    Expo 2020 in Dubai. The two men sign a major arms deal between the two nations.
    (The National News)
  - 2021 Oxford High School shooting
  - The parents of Ethan Crumbley, James and Jennifer Crumbley, accused of terrorism
    and murder in the shooting deaths and injuries at Ethan's school, are charged
    with manslaughter for their role in the incident. They are caught after fleeing
    the police. (CNN)
  - Islam in Kosovo
  - A Kosovar man is arrested for terrorism due to his ties to the Islamist al-Nusra
    Front in Syria. (The Public's Radio)
  - Police in Bosnia and Herzegovina arrest seven suspected war criminals in Bijeljina
    and Sokolac due to their reported massacre of 22 civilians during the Bosnian
    Genocide. (CTV News)
  - Portuguese Minister of Internal Administration Eduardo Cabrita resigns after a
    series of scandals, including an incident where his official car was involved
    in a car accident that killed a highway worker. (AP)
  - Magnus Carlsen defeats challenger Ian Nepomniachtchi in Game 6 of the 2021 World
    Chess Championship in a marathon 136 move game. It is the first decisive result
    in a regulation World Chess Championship game in more than 5 years and is also
    the longest game in World Chess Championship history. (The Guardian)
