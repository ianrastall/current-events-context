Date: '2021-12-23'
Source_URI: Portal:Current events/2021 December 23
Intelligence_Payload:
  Uncategorized:
  - Insurgency in the Maghreb
  - Gunmen ambush a column of a civilian militia in Loroum, Burkina Faso, killing
    41 people. It is one of the deadliest single-day attack against the militia. (Reuters)
  - 2021 Madagascar shipwreck
  - Twenty-four more people are found dead after the boat accident off the coast of
    Analanjirofo, Madagascar, three days ago, bringing the total death toll to 85.
    (France 24)
  - European migrant crisis
  - Eleven people are dead as a boat carrying migrants sinks in the Aegean Sea. Around
    90 other people are rescued. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Brunei
  - Brunei reports its first case of the SARS-CoV-2 Omicron variant in a person who
    travelled from the United Kingdom. (The Scoop)
  - COVID-19 pandemic in Kuwait
  - The Kuwaiti Directorate General of Civil Aviation announces that all citizens
    who wish to travel, but who were fully vaccinated more than nine months ago, must
    receive a booster dose of the COVID-19 vaccine beginning on January 2. (Times
    of Oman)
  - COVID-19 pandemic in the Philippines, COVID-19 drug development, COVID-19 vaccination
    in the Philippines
  - The Philippine Food and Drug Administration approves the emergency use of the
    Molnupiravir drug made by Merck & Co. for high-risk adult patients and also approves
    the use of the Pfizer-BioNTech COVID-19 vaccine for children between the ages
    of 5 and 11 years. (The Straits Times)
  - COVID-19 pandemic in Singapore, Travel during the COVID-19 pandemic
  - Singapore suspends new ticket sales for the quarantine-free Vaccinated Travel
    Lane until January 20 in an attempt to reduce the number of imported cases of
    the Omicron variant. (CNBC)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record 109 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 5,015. (ABC News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Andorra
  - Prime Minister Xavier Espot tests positive for COVID-19 with mild symptoms. (Diari
    d’Andorra)
  - COVID-19 pandemic in France
  - France reports a record 91,608 new cases of COVID-19 in the past 24 hours, surpassing
    the previous record set in November 2020. (Bloomberg)
  - COVID-19 pandemic in Germany
  - Germany reports its first confirmed death related to the SARS-CoV-2 Omicron variant.
    (Deutsche Welle)
  - COVID-19 pandemic in Italy
  - The Italian government announces a ban of New Year's Eve celebrations as well
    as all mass gatherings and closes nightclubs and bars until the end of January.
    The government also agree to reintroduce mandatory mask wearing outdoors and will
    reduce the validity of vaccine certificate to six months beginning from February
    1. (MedicalXpress)
  - COVID-19 pandemic in Malta
  - Malta reports its first two cases of the SARS-CoV-2 Omicron variant, prompting
    the health ministry to ban all standing events except for weddings and funerals
    beginning on December 17 and restrict entry to the hospitality sector and sporting
    events to only those with a valid vaccine certificate. A 1 a.m. curfew will also
    be imposed for all businesses beginning on January 17. (Times of Malta)
  - COVID-19 pandemic in Russia
  - Russia surpasses 600,000 deaths from COVID-19. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports a record for the second consecutive day of 119,789
    new cases of COVID-19. (Sky News)
  - Preliminary data from the United Kingdom suggests the hospitalization rate of
    the COVID-19 Omicron variant is between 50% to 70% lower than the Delta variant.
    (Deutsche Welle)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Honduras
  - Honduras begins administering a booster dose of the COVID-19 vaccine for all adults
    aged above 18 years using the Pfizer–BioNTech COVID-19 vaccine. (Reuters)
  - COVID-19 pandemic in the United States, COVID-19 drug development
  - The Food and Drug Administration grants emergency use authorization for Merck
    & Co.'s antiviral COVID-19 oral pill named Molnupiravir for at-risk individuuals.
    (Global News)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Argentina, COVID-19 vaccination in Argentina
  - Argentina receives more than 2.6 million doses of the Moderna COVID-19 vaccine
    for use as booster doses. (La Vos)
  - COVID-19 pandemic in Ecuador, COVID-19 vaccination in Ecuador
  - Ecuador's Minister of Public Health announces that the COVID-19 vaccination will
    be mandatory for all citizens over the age of 5 years unless they have a medical
    exemption due to the spread of SARS-CoV-2 variants and an increase in the number
    of new cases. (BBC News)
  - COVID-19 pandemic in Australia
  - COVID-19 pandemic in New South Wales
  - New South Wales reports a record 5,715 cases of COVID-19 in the past 24 hours,
    with the SARS-CoV-2 Omicron variant becoming the dominant strain in the state.
    The NSW Government reintroduces mask-wearing in indoor settings, despite the state
    having a 93.5% vaccination rate. (ABC News Australia)
  - Australia reports a record 8,697 new cases of COVID-19 in the past 24 hours, surpassing
    the previous record set on December 22. (ABC News Australia)
  - China–United States relations
  - Uyghur genocide
  - President Joe Biden signs the Uyghur Forced Labor Prevention Act into law banning
    imports from China's Xinjiang region citing concerns about the use of forced labour.
    China denies human rights abuses in Xinjiang. (Al Jazeera)
  - Japan–United States relations, Taiwan–United States relations
  - The United States and Japan approve a plan for a joint military operation in response
    to a possible "Taiwan emergency". The operation would consist of deploying U.S.
    Marines on the Ryukyu Islands near Taiwan, while the Japan Self-Defense Forces
    would provide logistical support such as ammunition and fuel supplies. (Reuters)
  - 14-Year-Old Valentina Orellana-Peralta killed in LAPD response
  - While responding to multiple reports of a violent assault suspect at a Los Angeles
    clothing store, LAPD officers fired upon one male subject. Valentina Orellana-Peralta
    was sheltering with her mother and other patrons and was killed by an errant shot.
    Valentina and the suspect both succumbed to their injuries in the store. Several
    patrons were injured by the suspect prior to officers' arrival.
  - Killing of Daunte Wright
  - Former Minneapolis police officer Kim Potter is found guilty on both counts in
    the killing of Daunte Wright. She is scheduled to be sentenced on February 18,
    2022. (AP)
  - Political impact of the COVID-19 pandemic
  - COVID-19 pandemic in Lithuania
  - The Seimas votes 89–17 with 19 abstentions to approve a law that would require
    MPs to have a health pass, which shows proof of vaccination, a negative test result
    from the previous 72 hours, or that a person has recovered from COVID-19, in order
    to attend hearings beginning in January. (Barron's)
  - Workfare
  - The Australian Government pays a A$2,000,000 settlement to the Shire of Ngaanyatjarraku
    to end a class action lawsuit in the Federal Court over the controversial Community
    Development Program, which saw unemployed Ngaanyatjarra and other Indigenous Australian
    people in remote communities working up to 25 hours a week otherwise unpaid in
    order to receive the JobSeeker payment, which is generally considered to be less
    than the cost of living and which is provided to other Australians in exchange
    for completing a fortnightly quota of job applications. The Ngaanyatjarra accused
    the program of being racist and a form of modern slavery. (The Guardian)
