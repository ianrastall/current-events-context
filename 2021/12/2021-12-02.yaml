Date: '2021-12-02'
Source_URI: Portal:Current events/2021 December 2
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Ten oil workers are killed and another is injured during an ISIL attack on a bus
    in Deir ez-Zor, Syria. (Reuters)
  - 2021 Solomon Islands unrest
  - The New Zealand Defence Force and Police travel to Honiara, Solomon Islands, in
    order to help stabilize the country and maintain peace after days of rioting,
    looting and unrest that killed three people. (RNZ)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Karnataka
  - India reports its first case of the SARS-CoV-2 Omicron variant in two foreigners
    who travelled to Karnataka. (NDTV)
  - COVID-19 pandemic in the Philippines, COVID-19 vaccination in the Philippines
  - The Philippine Department of Health announces that all adults over the age of
    18 years can receive a booster dose at least six months after receiving their
    second dose or a least three months after receiving their single dose. (Rappler)
  - COVID-19 pandemic in Singapore
  - Singapore reports its first cases of the SARS-CoV-2 Omicron variant in two fully
    vaccinated people, age 44 and 41, who returned from Johannesburg. (The Straits
    Times)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record for the second consecutive day of 5,266 new cases
    of COVID-19, thereby bringing the nationwide total of confirmed cases to 457,612.
    (Anadolu Agency)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Finland
  - Finland reports its first case of the SARS-CoV-2 Omicron variant in a person who
    travelled from Sweden. (Reuters)
  - COVID-19 pandemic in Greece
  - Greece reports its first case of the SARS-CoV-2 Omicron variant in a man who travelled
    from South Africa to Crete. (Ekathimerini)
  - COVID-19 pandemic in the United Kingdom, COVID-19 drug development
  - The Medicines and Healthcare products Regulatory Agency approves GSK and Vir Biotechnology's
    sotrovimab antibody treatment, after a clinical trial found that the treatment
    reduced the risk of hospital admission and death by 79% in vulnerable adults if
    administered within five days of symptoms developing. (The Guardian)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Minnesota
  - Minnesota reports its first case of the Omicron variant in a person who traveled
    from New York City. (KSTP-TV)
  - Algeria–Morocco relations, Morocco–Turkey relations
  - Morocco buys six Bayraktar TB2 drones from Baykar amid rising tensions between
    Morocco and Algeria. (Morocco World News)
  - A group of four former Serbian state security officers, including Radomir Marković,
    are found guilty of the murder of Slavko Ćuruvija. Two have been sentenced to
    20 years in prison, while Marković and the remaining officer will serve a 30-year
    sentence. (Balkan Insight)
  - 2021 Australian Parliament House sexual misconduct allegations
  - Alan Tudge stands down as Minister for Education and Youth after Prime Minister
    Scott Morrison announced an investigation into domestic abuse allegations against
    Tudge from a former staffer who claimed that the two were involved in an extramarital
    affair. (The Guardian)
  - 2021 Major League Baseball lockout
  - Major League Baseball implements a lockout after the collective bargaining agreement
    they had with the Major League Baseball Players Association expired yesterday.
    This is the league's first labor stoppage since the players' strike of 1994 and
    1995. (ESPN)
  - 2021–22 NBA season
  - In basketball, the Memphis Grizzlies defeat the Oklahoma City Thunder 152–79,
    making it the largest blowout in the history of the National Basketball Association.
    (ESPN)
