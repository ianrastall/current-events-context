Date: '2021-12-12'
Source_URI: Portal:Current events/2021 December 12
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - Four Burundian soldiers are killed as their vehicle hit a roadside bomb in Burane,
    Somalia. Al-Shabaab has claimed responsibility for the attack. (All Africa)
  - Three Hamas members are killed and six more injured during a dispute with Fatah
    gunmen in Tyre, Lebanon, at the funeral of a Hamas member killed two days ago
    during an accidental explosion at the Burj el-Shemali camp. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Austria
  - Austria ends its nationwide lockdown for people who are vaccinated or who have
    recovered from COVID-19 as the number of new cases decreases. There will now be
    an 11 p.m. curfew for restaurants and people must use an FFP2 mask on public transport
    and in indoor spaces. (Euronews)
  - COVID-19 pandemic in Russia
  - Russia surpasses 10 million cases of COVID-19. (CNA)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom raises its COVID-19 Alert level to Level 3 due to the rapid
    spread of the SARS-CoV-2 Omicron variant, which has resulted in 3,137 cases. (France
    24)
  - COVID-19 pandemic in South Africa
  - President Cyril Ramaphosa tests positive for COVID-19 with mild symptoms. (CNN)
  - 2021 Banco de Oro hack
  - The Bangko Sentral ng Pilipinas, the Philippines' central bank, issues a statement
    that it is currently monitoring an increase in complaints on social media regarding
    Banco de Oro clients losing money and having their accounts hacked. (Reuters)
  - 2021 New Caledonian independence referendum
  - Citizens in New Caledonia vote against independence and choose to remain part
    of France. Pro-independence parties boycotted the referendum in order to protest
    the alleged lack of time to campaign. (RNZ)
  - 2021 Formula One World Championship
  - 2021 Abu Dhabi Grand Prix
  - At the 2021 Abu Dhabi Grand Prix, Max Verstappen wins the Driver's Championship,
    while Mercedes wins the Constructors' Championship. (The Guardian)
