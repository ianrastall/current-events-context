Date: '2021-12-16'
Source_URI: Portal:Current events/2021 December 16
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Iran–Israel conflict during the Syrian civil war, Israel's role in the Syrian
    civil war
  - Israeli warplanes launch overnight airstrikes in southern Syria, with missiles
    originating from the Golan Heights, killing a soldier and causing some material
    damage, according to a Syrian military official. Syrian air defences engaged the
    Israeli missiles, with most missiles reportedly intercepted. (The Times of Israel)
  - Operation Shader
  - The United Kingdom's Ministry of Defence says a Royal Air Force Typhoon has shot
    down a "small hostile drone" over Syria. It is the first enemy aircraft shot down
    by an RAF pilot since the Falklands War. (BBC News)
  - Israeli–Palestinian conflict
  - Gunmen open fire on a car carrying settlers near the outpost of Homesh, in the
    occupied West Bank, killing one person and wounding two more. (CNN)
  - Typhoon Rai
  - Thousands of people are evacuated from their homes in central and southern Philippines
    as Typhoon Rai, described as one of the strongest storms of the year, begins to
    make landfall in mid-eastern parts of the country, with warnings of very destructive
    typhoon-force winds. (Al Jazeera)
  - Five children are killed and four others are injured after falling from an inflatable
    castle that was blown into the air in Devonport, Tasmania, Australia. (ABC News
    Australia)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Indonesia reports its first case of the SARS-CoV-2 Omicron variant in an hospital
    cleaning employee at the Kemayoran Athletes Village in Jakarta with no overseas
    travel history. (The Independent)
  - COVID-19 pandemic in Japan, COVID-19 vaccination in Japan
  - Japan officially approves the usage of the Moderna COVID-19 vaccine as a booster
    dose for people over the age of 18 years. This comes after health ministry experts
    recommended the vaccine yesterday. (CNA)
  - COVID-19 pandemic in Malaysia
  - The Malaysian government announces that due to the threat of the Omicron variant,
    there will be a ban on all large-scale Christmas and New Year's Eve celebrations.
    The government will also require people over the age of 60 as well as adults who
    received the Sinovac Coronavac vaccine to receive a booster dose before February
    in order to maintain their full vaccination status. (Malay Mail)
  - COVID-19 pandemic in the State of Palestine
  - The Palestinian Authority reports its first cases of the Omicron variant in three
    people from different cities in the West Bank who travelled abroad. (AP)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Denmark
  - COVID-19 drug development
  - The Danish Health Authority approves the usage of the Molnupiravir antiviral pill
    developed by Merck & Co. for at-risk patients with symptoms, becoming the first
    EU country to authorize the usage of this drug. (NDTV)
  - Denmark reports a record 9,999 new cases of COVID-19 in the past 24 hours. (CPH
    Post)
  - COVID-19 pandemic in Germany, COVID-19 vaccination in Germany
  - Germany administers a record 1.5 million doses of the COVID-19 vaccine in the
    past 24 hours. (The Guardian)
  - COVID-19 pandemic in Italy, Travel during the COVID-19 pandemic
  - Italy imposes mandatory COVID-19 testing for all travellers from European Union
    countries and mandates a five-day quarantine on arrival for those who are unvaccinated
    due to an increase in the number of COVID-19 cases and the spread of the Omicron
    variant in Europe. (Bloomberg)
  - COVID-19 pandemic in Poland
  - Poland reports its first case of the Omicron variant in a 30-year-old Mosotho
    woman who is currently in isolation in a hospital in the city of Katowice. (The
    First News)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports a record for the second consecutive day of 88,376 new
    cases of COVID-19. (BBC News)
  - COVID-19 pandemic in Malawi
  - Malawi announces that public service workers, healthcare workers and journalists
    will be required to be vaccinated against COVID-19 beginning on December 20 amid
    an increase in the number of COVID-19 infections. (Reuters)
  - COVID-19 pandemic in New Zealand
  - New Zealand reports its first case of the Omicron variant in a fully vaccinated
    person who travelled from Germany and is currently isolated at a managed isolation
    quarantine facility in Christchurch. (New Zealand Herald)
  - History of COVID-19 vaccine development
  - The WHO issues interim recommendations for mixing and matching COVID-19 vaccine
    for second and booster shot, where mRNA-based vaccines can be used as subsequent
    doses after initial doses of the Oxford-AstraZeneca COVID-19 vaccine and vice
    versa, while these vaccines can be used after initial doses of Sinopharm's inactived
    vaccine. (Reuters)
  - Caretaker Prime Minister of the Netherlands Mark Rutte is appointed as formateur
    and tasked with forming a new coalition government following the conclusion of
    the 2021 cabinet formation. (Politico)
