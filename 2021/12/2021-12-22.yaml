Date: '2021-12-22'
Source_URI: Portal:Current events/2021 December 22
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - Rojava conflict
  - Two soldiers and four civilians are killed in clashes between the Kurdish SDF
    and the Turkish-backed SNA in Tell Tamer. (The New Arab)
  - Hong Kong national security law
  - The University of Hong Kong removes the Pillar of Shame overnight, a monument
    dedicated to the victims of the 1989 Tiananmen Square protests and massacre in
    China. (Hong Kong Free Press)
  - Jade trade in Myanmar
  - 2021 Hpakant jade mine disaster
  - Dozens of people are missing following a landslide at a jade mine in Hpakant,
    Kachin State. (Reuters)
  - 2021 Madagascar shipwreck
  - At least 64 people are confirmed dead following a boat accident off the coast
    of Antseraka, Analanjirofo, Madagascar, on Monday, with 24 others still missing.
    (France 24)
  - Madagascar's police minister Serge Gellé is rescued after swimming for 12 hours
    to shore after his helicopter crashed off the country's northern coast during
    the boat accident rescue operation. President Andry Rajoelina hails Gellé's survival.
    (Deutsche Welle)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - COVID-19 pandemic in Northern Ireland
  - Northern Ireland reports a record 3,231 new cases of COVID-19 in the past 24 hours.
    (The Irish News)
  - COVID-19 pandemic in Wales
  - First minister Mark Drakeford announces new restrictions, including limiting the
    number of people in events to 50 people outdoors and 30 people indoors, no more
    than six people in a group at bars, restaurants, and cinemas, and imposing a face
    mask mandate due to the spread of the SARS-CoV-2 Omicron variant. These measures
    will be in effect beginning on December 26. (BBC News)
  - The United Kingdom reports a record 106,122 new cases of COVID-19 in the past
    24 hours, the first time that the country has reported more than 100,000 new cases
    in a single day. (The Independent)
  - COVID-19 pandemic in Austria
  - The government announces a series of new restrictions, including closing restaurants
    at 10 p.m. beginning on December 27, discourage large-scale New Year's Eve celebrations,
    capacity restrictions of indoor and outdoor events, and imposing strict entry
    requirements for travellers from the UK, Denmark, Norway, and the Netherlands
    where the Omicron variant is already dominant in an effort to prevent the spread
    of COVID-19 and its variant. (AP)
  - COVID-19 pandemic in Belgium
  - Prime Minister Alexander De Croo announces that, due to the spread of the Omicron
    variant, water parks, cinemas, theatres and concert halls will be closed, and
    all indoor events and outdoor events using a tent will be banned. Additionally,
    shopping will only be allowed in pairs and professional and amateur sport events
    will be held without spectators. These measures will begin on December 26. (The
    Brussels Times)
  - COVID-19 pandemic in Turkey, COVID-19 vaccination in Turkey
  - The Health ministry approves the emergency use of the country's first homegrown
    COVID-19 vaccine named Turkovac. (Anadolu Agency)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in British Columbia
  - British Columbia closes all bars, nightclubs, gyms, fitness centres, and dance
    studios, and bans all indoor gatherings due to the spread of the Omicron variant.
    (CBC)
  - COVID-19 pandemic in Jamaica
  - Jamaica reports its first case of the Omicron variant in a person who travelled
    from the United Kingdom. (Nation News)
  - COVID-19 pandemic in the United States, COVID-19 drug development
  - The Food and Drug Administration grants emergency use authorization for Pfizer's
    antiviral COVID-19 oral pill named Paxlovid for at-risk people over the age of
    12 years, becoming the first at-home oral treatment to be approved by the FDA.
    (NBC News)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Nigeria
  - Nigeria destroys 1,066,214 doses of the Oxford–AstraZeneca COVID-19 vaccine with
    short shelf lives that expired in November. (Punch)
  - COVID-19 pandemic in Tunisia
  - Tunisia begins to implement the usage of a mandatory COVID-19 vaccination pass
    in order to enter cafés, state institutions, banks, and shopping centres despite
    popular opposition and criticism from Amnesty International. (Barron's)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Israel
  - The Soroka Medical Center in Beersheba clarifies that the man thought to be Israel's
    first Omicron death had actually had the SARS-CoV-2 Delta variant, following the
    final laboratory results regarding his condition. (The Times of Israel)
  - COVID-19 pandemic in Japan
  - Japan reports its first locally transmitted cases of the Omicron variant in three
    people from Osaka Prefecture with no international travel history. (The Japan
    Times)
  - COVID-19 pandemic in Australia, COVID-19 vaccination in Australia
  - COVID-19 pandemic in Western Australia
  - Western Australia will become the first state and territory to mandate a booster
    dose of the COVID-19 vaccine for essential, mining, and healthcare workers, due
    to the spread of the Omicron variant. (News.com.au)
  - COVID-19 pandemic in Venezuela
  - Venezuela reports its first seven cases of the Omicron variant in a group of people
    who had travelled from another country, such as Spain, Dominican Republic, Panama,
    and Turkey. (Reuters)
  - Animal welfare and rights in Australia
  - A landowner and an earthmoving business each face 126 charges for the deaths of
    70 koalas last year at a partially cleared tree plantation in Cape Bridgewater,
    Victoria, Australia. (BBC News)
  - Animal welfare and rights in Italy
  - Italy bans fur farming and orders all remaining mink farms to shut down by June
    2022, while a ban on breeding animals for their fur becomes effective immediately.
    (Greek Reporter)
