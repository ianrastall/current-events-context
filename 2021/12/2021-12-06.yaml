Date: '2021-12-06'
Source_URI: Portal:Current events/2021 December 6
Intelligence_Payload:
  Uncategorized:
  - Tigray War
  - The Ethiopian military says that they have recaptured the strategic Amharan towns
    of Dessie and Kombolcha from rebel forces. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Croatia
  - Croatia reports its first cases of the SARS-CoV-2 Omicron variant in two people
    who had not travelled abroad. (N1)
  - COVID-19 pandemic in Italy
  - Italy begins to implement the Super Green Pass, which allows a person to enter
    theatres, cinemas, music venues, sports events, restaurants and bars if they are
    vaccinated or have recovered from COVID-19 within the past six months. (BBC News)
  - COVID-19 pandemic in Russia
  - Russia reports its first 10 cases of the SARS-CoV-2 Omicron variant in a group
    of citizens who travelled from southern Africa. (RFE/RL)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India, COVID-19 vaccination in India
  - It is announced that over 50% of India's eligible adult population is now fully
    vaccinated. India is targeting 100% COVID-19 adult vaccination by December 31.
    (Khaleej Times)
  - COVID-19 pandemic in Nepal
  - Nepal reports its first two cases of the SARS-CoV-2 Omicron variant in a 71-year-old
    Nepali national and a 66-year-old foreigner. (The Himalayan Times)
  - COVID-19 pandemic in Thailand
  - Thailand reports its first case of the SARS-CoV-2 Omicron variant in a 38-year-old
    U.S. citizen who had travelled from Spain nearly a week ago. (The New York Times)
  - COVID-19 pandemic in the United States, COVID-19 vaccination in the United States
  - COVID-19 pandemic in New York
  - COVID-19 pandemic in New York City
  - Outgoing New York City Mayor Bill de Blasio announces a COVID-19 vaccine mandate
    for all private-sector employees, which will take effect on December 27. (The
    New York Times)
  - COVID-19 pandemic in Connecticut
  - Connecticut reports its first case of the SARS-COV-2 Omicron variant. (WTIC-TV)
  - COVID-19 pandemic in Argentina
  - COVID-19 vaccination in Argentina
  - Argentina approves the usage of the single-dose Sputnik Light COVID-19 vaccine
    as a standalone vaccine and as a booster dose. (Reuters)
  - Argentina reports its first case of the SARS-CoV-2 Omicron variant in a 38-year-old
    fully vaccinated person who traveled from South Africa on November 30. (Anadolu
    Agency)
  - 2021 Belarus–European Union border crisis, Foreign relations of Belarus
  - Belarus bans airlines and imports of certain goods from the European Union and
    United Kingdom in retaliation for sanctions imposed on the country by Western
    nations. (ABC News)
  - In Madagascar, twenty people, including two French nationals, are charged with
    crimes including criminal conspiracy, criminal association, rebellion against
    the president and possession of illegal weapons, for allegedly plotting to kill
    president Andry Rajoelina. (Reuters)
  - 2021 Solomon Islands unrest
  - Prime Minister Manasseh Sogavare survives a no-confidence vote in the National
    Parliament after his management of the riots. (Reuters)
  - Karl Nehammer is sworn in as the new Chancellor of Austria after the resignation
    of Alexander Schallenberg on December 2. (ABC News)
  - 2022 Winter Olympics
  - The United States announces a formal diplomatic boycott of the upcoming Winter
    Olympic Games in Beijing, China. The White House says that no official delegation
    will be sent to the Games due to concerns regarding China's human rights record.
    (BBC Sport)
