Date: '2021-12-05'
Source_URI: Portal:Current events/2021 December 5
Intelligence_Payload:
  Uncategorized:
  - 2021 Apure clashes
  - Venezuelan intelligence officials announce the death of Hernán Darío Hernández,
    the leader of a FARC dissident group, after an ambush carried out by a commando
    of the Venezuelan Armed Forces. Hernández was responsible for the 2003 El Nogal
    Club bombing that killed 36 people and injured over 200 others. (El Tiempo)
  - Mali War
  - Militants bomb two UN camps in Gao, with no fatalities. (Voice of America)
  - 2021 Niger attacks
  - Hundreds of insurgents on motorcycles attack an international military base in
    Tillabéri. Seventy-nine of the rebels and 29 soldiers are killed during the battle.
    (Deutsche Welle)
  - 2021 Nagaland killings
  - Indian soldiers of the Assam Rifles mistakenly open fire on a group of miners
    returning home from work in Nagaland, believing them to be militants. Thirteen
    miners and a soldier are killed, with the soldier and seven miners being killed
    in a subsequent confrontation with angry locals. (BBC News)
  - 2021 Semeru eruption
  - The death toll from yesterday's eruption of the Semeru volcano in East Java, Indonesia,
    increases to 14, with 56 others injured. (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Australia, COVID-19 vaccination in Australia
  - The Therapeutic Goods Administration provisionally approves the usage of the Pfizer–BioNTech
    COVID-19 vaccine for children between the ages of 5 and 11 years. Vaccination
    rollout for this age group will begin on January 10, once ATAGI gives its recommendation.
    (The Guardian)
  - COVID-19 pandemic in Maldives
  - Maldives reports its first case of the SARS-CoV-2 Omicron variant in a tourist
    that arrived in the country. (Raajje)
  - COVID-19 pandemic in Saudi Arabia, COVID-19 vaccination in Saudi Arabia
  - Saudi Arabia grants the approval for people vaccinated with Russia's Sputnik V
    COVID-19 vaccine to enter the country beginning from January 1, 2022 in a move
    that will enable Muslims to take part in religious pilgrimage. (CNA)
  - COVID-19 pandemic in Senegal
  - Senegal reports its first case of the SARS-CoV-2 Omicron variant in a 58-year-old
    man who attended an international meeting in Dakar with 300 people from different
    countries on November 24 and 25. (Khaleej Times)
  - 2021 Bathurst 1000
  - Chaz Mostert and Lee Holdsworth win the 2021 Bathurst 1000 in Bathurst, New South
    Wales, Australia. (ABC News Australia)
