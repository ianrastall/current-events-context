Date: '2021-12-30'
Source_URI: Portal:Current events/2021 December 30
Intelligence_Payload:
  Uncategorized:
  - Mali War
  - Jihadists ambush an army patrol near the town of Nara in Koulikoro Region, Mali,
    killing four soldiers and injuring more than a dozen others. (Voice of America)
  - Tesla orders a recall of over 475,000 Model 3 and Model S cars due to safety defects
    found in their backup cameras and hoods, respectively. (NPR)
  - 2021–2022 Boulder County fires
  - Grass fires in Colorado, United States, prompt the evacuation of the town of Superior
    and the cities of Louisville and Broomfield. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Greece
  - Greece bans music at New Year's Eve celebrations and orders all entertainment
    venues to close at midnight due to an increase in the number of COVID-19 cases
    caused by the Omicron variant. (The Hill)
  - Greece reports a record for the fourth consecutive day of 35,580 new cases of
    COVID-19, bringing the nationwide total of confirmed cases to 1,170,293. (Ekathimerini)
  - COVID-19 pandemic in Italy
  - Italy reports a record for the third consecutive day of 126,888 new cases of COVID-19,
    bringing the nationwide total of confirmed cases to 5.98 million. (ANSA)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland reduces the mandatory quarantine for those who received the booster dose
    or completed their primary vaccination course and had COVID-19 within the previous
    three months, to seven days despite a record 20,554 new cases being reported.
    (The Irish Times)
  - COVID-19 pandemic in Portugal
  - Portugal reports a record for the third consecutive day of 28,659 new cases of
    COVID-19. The country also reduces the mandatory quarantine for asymptomatic people
    who test positive from COVID-19 and high-risk contacts to seven days due to concerns
    about the spread of the Omicron variant. (Reuters)
  - COVID-19 pandemic in Russia
  - Russia surpasses Brazil for the second highest Covid death toll in the world,
    with 658,634 deaths. (Reuters)
  - COVID-19 pandemic in Turkey, COVID-19 vaccination in Turkey
  - Turkey begins to roll-out its domestically-developed Turkovac inactive vaccine
    as part of its COVID-19 vaccination program. This comes after the health ministry
    issued an emergency use authorization for the vaccine. (Daily Sabah)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports a record for the third consecutive day of 189,213 new
    cases of COVID-19. (The Guardian)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Quebec
  - Premier of Quebec François Legault announces a curfew between 10 p.m. to 5 a.m.
    on New Year's Eve, bans private gatherings involving more than one household bubble,
    and closing dine-in restaurants amid the spread of COVID-19 cases caused by the
    Omicron variant. (Global News)
  - COVID-19 pandemic in Israel, COVID-19 vaccination in Israel
  - The Israeli Health ministry approves fourth doses of the COVID-19 vaccine for
    immunocompromised people, becoming the first country to do so. (AP)
  - COVID-19 pandemic in South Africa
  - South Africa lifts its midnight curfew, allowing alcohol sales to return to normal
    hours in certain premises, and also allowing gatherings of up to 1,000 people
    indoors and 2,000 people outdoors, due to a decrease in the number of new COVID-19
    cases. (Business Insider South Africa)
  - Crime in London
  - A 16-year-old boy is stabbed to death in Hillingdon, west London, making him the
    30th teenage homicide in the British capital in 2021. It is now the deadliest
    year on record for killings of teenagers, surpassing a previous peak of 29 homicides
    in 2008. (BBC News)
