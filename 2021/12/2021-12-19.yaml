Date: '2021-12-19'
Source_URI: Portal:Current events/2021 December 19
Intelligence_Payload:
  Uncategorized:
  - Typhoon Rai
  - The death toll in the Philippines from Typhoon Rai increases to 375. At least
    500 more people are injured. (BBC News)
  - 2021 Semeru eruption
  - The Semeru volcano in Java, Indonesia, erupts for the second time this month,
    spewing a two-kilometre-high ash column. The first eruption killed at least 46
    people on December 4. (Reuters)
  - A light plane crashes off Australia's east coast of Queensland, killing all four
    people on board, including two children. (The Guardian)
  - A "tornado-like" severe weather event impacts Sydney's Northern Beaches on Australia's
    east coast, downing trees and cutting power to thousands of residents. One woman
    is killed and two women are in a critical condition in Sydney's Royal North Shore
    Hospital after a "large" pine tree fell in Narrabeen. (ABC News)
  - A child dies in hospital three days after an inflatable castle was lifted into
    the air in Devonport, Tasmania, Australia, bringing the death toll from the accident
    to six. (News.com.au)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Iran
  - Iran reports its first case of the SARS-CoV-2 Omicron variant in a person who
    travelled from the United Arab Emirates. (The Jerusalem Post)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka announces that it will require a proof of COVID-19 vaccination certificate
    for entry into public places beginning on January 1 in an attempt to reduce the
    number of COVID-19 cases. (Associated Press)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the Netherlands
  - The Netherlands imposes strict lockdown measures that restrict visitors to two
    people, closes all non-essential shops, bars, and restaurants until January 14,
    and closes schools until January 9, due to an increase in COVID-19 cases caused
    by the SARS-CoV-2 Omicron variant. (The Hill)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland introduces an 8:00 p.m. closure time for bars and restaurants, restricts
    the capacity of most indoor and outdoor events to 50%, and allows a maximum of
    100 guests for weddings in order to reduce the spread of the Omicron variant.
    (Medical Xpress)
  - COVID-19 pandemic in Peru
  - Peru reports its first four cases of the Omicron variant in one person who travelled
    from South Africa and another three who had no travel history. (Reuters)
  - 2021 Chilean general election
  - Chileans go to the polls to elect their president in a run-off between leftist
    Gabriel Boric and right-wing candidate José Antonio Kast. (Euronews)
  - With over 50% of votes counted, Boric is declared the winner as Kast publishes
    a tweet conceding defeat. (CNN)
  - 2019–2021 Sudanese protests
  - Tens of thousands of protesters demonstrate against the October 2021 Sudanese
    coup d'état, leading to government forces spraying protesters with tear gas in
    an attempt to halt the demonstrations, one of the largest in Sudan's history.
    (CBC News)
  - A man in India is beaten to death by guards at the Golden Temple, the holiest
    place in the world according to the Sikh religion. Authorities allege he may have
    tried to harm the Guru Granth Sahib. (BBC News)
