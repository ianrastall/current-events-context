Date: '2021-07-11'
Source_URI: Portal:Current events/2021 July 11
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - Australian Minister for Defence Peter Dutton says that the country has ended its
    military involvement in Afghanistan. (VOA)
  - Assassination of Jovenel Moïse
  - Suspects in the assassination of Haitian President Jovenel Moïse say that their
    intent was to arrest, not kill, Moïse. The two Haitian-American suspects say that
    they were working as translators for the Colombian suspects and that they had
    an arrest warrant against Moïse, but found him dead when they arrived. (Reuters)
  - Twelve people are killed and 26 others injured when a minibus carrying illegal
    immigrants from Afghanistan, Pakistan and Bangladesh crashes and catches fire
    in Muradiye, Van Province, Turkey. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 11,874 new cases and 230 deaths from COVID-19 in the
    past 24 hours, bringing the nationwide total of confirmed cases to 1.02 million
    and the nationwide death toll to 16,419. (Bdnews24.com)
  - COVID-19 pandemic in Cambodia
  - Cambodia surpasses 60,000 cases of COVID-19. (Khmer Times)
  - COVID-19 pandemic in Indonesia
  - COVID-19 vaccination in Indonesia
  - Indonesia receives three million doses of the Moderna COVID-19 vaccine from the
    United States, facilitated through the COVAX initiative. (detikNews)
  - COVID-19 pandemic in Israel
  - COVID-19 vaccination in Israel
  - The Ministry of Health announces that Israel will resume administering first doses
    of the Pfizer COVID-19 vaccine. (Times of Israel)
  - Israeli Prime Minister Naftali Bennett announces that a deal has been reached
    with Pfizer CEO Albert Bourla, which would see a new shipment of vaccines delivered
    on August 1. (Jerusalem Post)
  - COVID-19 pandemic in Vietnam
  - Vietnam reports a record 1,953 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 29,816. (The Straits Times)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Libya
  - Libya reports a record 2,854 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 204,090. (Al-Wasat)
  - COVID-19 pandemic in South Africa
  - President Cyril Ramaphosa extends South Africa's level four restrictions for 14
    days until July 25 amid a third wave of COVID-19 caused by the Delta variant.
    (Business Tech)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia
  - New South Wales reports Australia's first death from COVID-19 in 10 months after
    a woman in her 90s died in Sydney after contracting the virus in a family setting.
    (BBC News)
  - COVID-19 pandemic in Fiji
  - Fiji surpasses 10,000 cases of COVID-19 after reporting 485 new cases and three
    deaths from COVID-19 in the past 24 hours. The country has seen a significant
    increase in the number of infections since an outbreak in April. (RNZ)
  - COVID-19 pandemic in Peru
  - Interim President Francisco Sagasti extends the COVID-19 state of emergency in
    Peru until the end of August. (Al Jazeera)
  - Authorities in Spain issue a heat wave warning for Madrid and the southern city
    of Seville for the second consecutive day as temperatures reach . (France 24)
  - Oman–Saudi Arabia relations
  - In his first official overseas trip since assuming power last year, Omani Sultan
    Haitham bin Tariq meets with King Salman of Saudi Arabia in Neom for two days
    to discuss a peace initiative in Yemen, and strengthen economic and investment
    agreements between Saudi Arabia and Oman. Saudi media reports it is also Salman's
    first face-to-face meeting with a world leader since the COVID-19 pandemic began.
    (Al Jazeera)
  - LGBT rights in Georgia (country), 2021 attack on Tbilisi Pride
  - Police in Georgia open a criminal investigation into the death of a journalist
    who was assaulted during attacks targeting LGBT+ activists planning the Tbilisi
    pride march. Organizers eventually called off the march when more homophobic attacks
    took place. (Reuters)
  - July 2021 Bulgarian parliamentary election
  - Bulgaria holds another election after the three largest parties failed to form
    a coalition government following the election in April. (Euronews)
  - Exit polls do not show a clear winner, with newly-formed populist party There
    Is Such a People narrowly beating out GERB, the party of previous Prime Minister
    Boyko Borisov, by 0.2 percentage points. (Reuters)
  - 2021 Moldovan parliamentary election
  - Moldovan voters head to the polls in a snap election to elect new members of the
    Parliament. (Al Jazeera)
  - Results show the pro-EU Party of Action and Solidarity, which President Maia Sandu
    has close ties to, as the winner with 52% of the vote. (DW)
  - 2021 Cuban protests
  - Thousands of Cubans, most of them young, attend a rare anti-government protest
    in San Antonio de los Baños to protest the increased food and medicine shortages
    brought on by the COVID-19 pandemic. Hundreds of Cubans in Miami, Florida, United
    States, hold solidarity protests as Mayor Francis Suarez calls for an international
    intervention against the Cuban government in a press conference. (France 24) (NBC
    Miami)
  - Virgin Galactic Unity 22
  - British billionaire Richard Branson travels into space aboard the VSS Unity, a
    spaceplane owned and operated by the space flight company Virgin Galactic. At
    the age of 70, he is the second oldest person to travel to outer space. (BBC News)
  - UEFA Euro 2020
  - UEFA Euro 2020 Final
  - Italy beats England 3–2 on penalties in the UEFA Euro 2020 Final after a 1–1 draw
    following extra time. (BBC Sport)
  - England fans storm London's Wembley Stadium ahead of the team's matchup against
    Italy, with many of the intruders not removed from the stadium until halfway through
    the match. (The Times)
