Date: '2021-07-29'
Source_URI: Portal:Current events/2021 July 29
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - 2021 Daraa clashes
  - Eight Syrian soldiers, seven rebel fighters and eight civilians are killed in
    clashes in Daraa Governorate. (SOHR)
  - War in Afghanistan
  - Taliban insurgency
  - 2021 Taliban offensive
  - A U.S. government watchdog charged with monitoring events on the ground says that
    the Afghan government will be "fighting for its life" and could fall under the
    control of the Taliban once the withdrawal of foreign troops is completed. The
    report states that Afghan "unprepared forces" are facing an "existential crisis"
    in response to the increasing Taliban attacks. (Voice of America)
  - Tigray War
  - Fighting escalates in Ethiopia's Amhara Region as Tigray Defense Forces (TDF)
    continue their offensive. Federal forces as well as Amharan militiamen are fighting
    the TDF on three fronts. Clashes are also reported in the Afar Region, to the
    east, with Ethiopian officials accusing Tigrayan forces of attempting to seize
    the N'Djamena–Djibouti Highway. (BBC News)
  - Central African Republic Civil War
  - The United Nations Security Council extends an arms embargo and targeted sanctions
    on the Central African Republic for another year. China was the only UNSC member
    to abstain from the vote. (U.S. News and World Report)
  - The Royal Spanish Academy confirms that Alfonso de Palencia's dictionary dates
    from 1492, so it predates Antonio de Nebrija's "Latin-Spanish Dictionary" and
    becomes the earliest known Spanish vocabulary. (El País)
  - 2021 wildfire season
  - 2021 California wildfires
  - The Dixie Fire grows to 221,504 acres, making it the 13th largest wildfire in
    California. (San Francisco Chronicle)
  - 2021 Turkish wildfires
  - Three people are killed and 58 more injured during multiple simultaneous wildfires
    in Manavgat, Antalya. The fires cause mass evacuations in several provinces. (AP)
  - Flash flooding kills at least 60 people and leaves several others missing in Kamdesh,
    Afghanistan, amid torrential rains. (BBC News)
  - A huge fire destroys part of the Cinemateca Brasileira, in São Paulo, that have
    the largest collection of "moving image" in Latin America. (EFE)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Kerala
  - Kerala announces a total weekend lockdown on July 31 and August 1 due to an increase
    in the number of COVID-19 cases. (Hindustan Times)
  - COVID-19 pandemic in Israel
  - COVID-19 vaccination in Israel
  - Israeli Prime Minister Naftali Bennett announces that a booster shot will be offered
    for people aged 60, making Israel the first country to do so. (AP)
  - COVID-19 pandemic in Japan
  - Tokyo reports a record for the third consecutive day of 3,865 new cases of COVID-19,
    while the number of new cases across Japan surpasses 10,000 for the first time.
    (The Asahi Shimbun)
  - COVID-19 pandemic in Pakistan
  - Pakistan announces that they will ban air travel for unvaccinated people, as well
    as entry to schools for both staff and students over the age of 18 beginning on
    August 1 and will also require public sector workers, public transport workers
    and retail staff to get vaccinated beginning on August 31 or risk a ban on entry
    to shopping malls, restaurants, and government offices. (U.S. News and World Report)
  - COVID-19 pandemic in Thailand
  - Thailand reports a record for the second consecutive day of 17,669 new cases,
    thereby bringing the nationwide total of confirmed cases to 561,030. The country
    also reports a record 165 deaths from COVID-19 in the past 24 hours, bringing
    the nationwide death toll to 4,562. (The Straits Times)
  - COVID-19 pandemic in Uzbekistan
  - Uzbekistan reports a record 879 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 127,506. (AKIPress)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the United Kingdom
  - COVID-19 pandemic in Northern Ireland, Travel restrictions related to the COVID-19
    pandemic
  - Northern Ireland announces that it will allow fully-vaccinated travellers from
    amber list European Union countries as well as the United States to enter without
    needing to quarantine beginning on August 1. (The Guardian)
  - COVID-19 pandemic in Portugal
  - Portugal announces three phases for lifting its COVID-19-related restrictions,
    including ending localized curfews and operating hours restrictions for restaurants,
    stores and cultural venues on August 1 as the number of cases continues to decline.
    However, bars and discos will only be allowed to reopen in October. (ABC News)
  - COVID-19 pandemic in Russia
  - Russia reports a record 799 deaths from COVID-19 in the past 24 hours for the
    third time in a month, bringing the nationwide death toll to 156,277. (The Moscow
    Times)
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - U.S. President Joe Biden announces that federal employees will be required to
    receive a COVID-19 vaccine or undergo a COVID-19 test. He also urges The Pentagon
    to approve a COVID-19 vaccine mandate for the United States military. (Business
    Insider)
  - COVID-19 pandemic in Arkansas
  - Arkansas Governor Asa Hutchinson declares a public health emergency in Arkansas
    amid an increase in the number of COVID-19 cases. He also announces a special
    legislative session to change the law that prevents public schools from issuing
    mask mandates. (KATV-TV)
  - COVID-19 pandemic in Vermont
  - Vermont becomes the first U.S. state to vaccinate 70% of people aged 12 to 17.
    (NECN)
  - COVID-19 pandemic in Washington, D.C.
  - Washington D.C. Mayor Muriel Bowser issues a mask mandate for indoor public spaces
    as part of an effort to reduce the spread of COVID-19. The mandate will be in
    effect on July 31. (The Hill)
  - Over 4 billion doses of the COVID-19 vaccine has been administered worldwide.
    (Medical Xpress)
  - LGBT rights in Uganda
  - Local human rights activists in Uganda petition President Yoweri Museveni not
    to sign a controversial bill against gay sex into law as it could increase discrimination
    and hate crimes and incite violence against gay men. The bill further criminalizes
    homosexuality by punishing "penetration of another person’s anus" with up to 10
    years' imprisonment. Richard Lusimbo, a 34-year-old activist, says that even people
    suspected of being gay will be attacked if the bill comes into effect. (PML Daily)
  - Peru's President Pedro Castillo names Guido Bellido of the party Free Peru as
    his prime minister. (Reuters)
  - 2020 Summer Olympics
  - Impact of the COVID-19 pandemic on sports, United States at the 2020 Summer Olympics,
    Athletics at the 2020 Summer Olympics
  - American pole vaulter Sam Kendricks withdraws from the Olympics after testing
    positive for COVID-19. (The Washington Post)
  - San Marino at the 2020 Summer Olympics, Shooting at the 2020 Summer Olympics
  - Sammarinese shooter Alessandra Perilli takes third place in the Women's trap event,
    winning San Marino its first Olympic medal and making it the least populous nation
    to have won a medal. (CNN)
  - 2021 NBA draft
  - The Detroit Pistons select former Oklahoma State point guard Cade Cunningham with
    the first overall pick. (CBS Sports)
