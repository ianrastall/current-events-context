Date: '2021-07-06'
Source_URI: Portal:Current events/2021 July 6
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - Spillover of the War in Afghanistan, Afghanistan–Tajikistan relations
  - Tajikistan President Emomali Rahmon orders the mobilization of 20,000 military
    reservists to secure the border with Afghanistan in response to recent Taliban
    advances. (Reuters)
  - Withdrawal of United States troops from Afghanistan (2021)
  - The Pentagon says that 90% of American troops have withdrawn from the country.
    (CNBC)
  - Tigray War
  - Rebels of the Tigray Defense Forces mobilize to retake western Tigray from Amharan
    militias. (The Guardian)
  - Petropavlovsk-Kamchatsky Air Flight 251
  - Kamchatka Aviation Enterprise Flight 251 crashes near the sea in Kamchatka Peninsula,
    Russia, killing all 28 people on board. (Al Jazeera)
  - A government warehouse near Karaj, Iran, catches fire after an explosion, where
    an attack recently occurred targeting a nuclear facility allegedly used to produce
    uranium enrichment centrifuges. (Israel Hayom)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 11,525 new cases of COVID-19 in the past 24 hours,
    thereby bringing the national total of confirmed cases to 966,406. (Bdnews24.com)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record for the second consecutive day of 31,189 new cases
    and a record for the third consecutive day of 728 deaths from COVID-19 in the
    past 24 hours, thereby bringing the nationwide total of confirmed cases to 2.34
    million and the nationwide death toll to 61,868. (detikNews)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Russia
  - Russia reports a record 737 deaths from COVID-19 in the past 24 hours, thereby
    bringing the national death toll to 139,316. (The Moscow Times)
  - COVID-19 pandemic in Spain
  - The Catalonian regional government announces that indoor nightlife venues will
    be closed beginning on July 9 for at least 15 days, and that anyone who wants
    to attend events for more than 500 people must have proof of a negative test result
    or a full vaccination certificate due to an increase in the number of COVID-19
    cases in young people. (El País)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports 28,773 new cases of COVID-19 in the past 24 hours,
    which is the highest single-day total of new cases since January 29. (Sky News)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Australia
  - Australia reports its first case of the highly contagious Lambda variant in an
    overseas traveller who had been in a New South Wales quarantine hotel in April.
    (News.com.au)
  - COVID-19 pandemic in Fiji
  - Fiji reports a record 636 new cases and six deaths from COVID-19 in the past 24
    hours, thereby bringing the national total of cases to 7,149 and the national
    death toll to 39. (RNZ)
  - COVID-19 pandemic in Tunisia
  - Tunisia reports a record 7,930 new cases and 119 deaths from COVID-19 in the past
    24 hours, thereby bringing the nationwide total of confirmed cases to 455,091
    and the nationwide death toll to 15,601. (Tunisie Numérique)
  - Belarus–Israel relations
  - Israel's Ministry of Foreign Affairs condemns comments made by Belarusian President
    Alexander Lukashenko after he said that the "whole world bows" to the Jews, "due
    to the Holocaust", during a speech given on Independence Day. Israel's government
    says that Lukashenko's comments were "unacceptable" and has summoned the interim
    supervisor at the Belarusian embassy. (The Jerusalem Post)
  - Nuclear program of Iran
  - The foreign ministers of the United Kingdom, France and Germany condemn Iran for
    planning to enrich uranium to 20 percent, which goes against the 2015 nuclear
    deal that the United States withdrew from in 2018, following the release of the
    information in a statement by the International Atomic Energy Agency. (The Algemeiner)
  - Murders of Bibaa Henry and Nicole Smallman
  - Danyal Hussein is convicted at London's Old Bailey of the murders of Bibaa Henry
    and Nicole Smallman. (BBC News)
  - Nine people between the ages of 15 and 39 are arrested in Hong Kong during a police
    operation, and are accused of building bombs and planning attacks on the city's
    courts, transport networks and streets. Police said that they seized the explosives
    and stated that a hotel room was used as a laboratory for the construction of
    bombs. The motive behind the planned attacks is unknown. (BBC News)
  - A court in Minsk, Belarus, sentences former presidential candidate and opposition
    politician Viktar Babaryka to 14 years' imprisonment on charges of bribery and
    tax evasion, which he denies. (DW)
  - Dutch investigative journalist Peter R. de Vries is seriously wounded in a targeted
    shooting in Amsterdam, which would result in his death nine days later. (BBC News)
  - Prime Minister Justin Trudeau announces that Inuk leader Mary Simon has been appointed
    to be the 30th Governor General of Canada, the first Indigenous person to assume
    this role. Simon will succeed Chief Justice Richard Wagner, who has been acting
    as Administrator since the resignation of former Governor General Julie Payette
    in January. (CBC)
  - UEFA Euro 2020
  - Italy defeats Spain 4–2 on penalties after the match finished 1–1 in extra time
    in order to reach the UEFA Euro 2020 Final. (BBC Sport)
