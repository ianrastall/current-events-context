Date: '2021-07-15'
Source_URI: Portal:Current events/2021 July 15
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - Taliban insurgency
  - 2021 Taliban offensive
  - The Taliban proposes a three month ceasefire to the Afghan government in exchange
    for the release of 7,000 captured fighters. Nader Nadery, an Afghan government
    negotiator, says that it is a "big demand" and that it will be evaluated. This
    move comes after major territorial gains by the insurgent group. The Taliban also
    demands that they be removed from a United Nations blacklist. (BBC News)
  - 2021 European floods
  - Severe floods occur in western Germany, killing 59 people. Eleven more people
    are also killed in floods in Belgium. (BBC News)
  - At least six people are killed during heavy rains in Rize, Turkey. (The Washington
    Post)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - COVID-19 vaccination in Indonesia
  - The Food and Drug Authority grants an emergency use authorization for the Pfizer–BioNTech
    COVID-19 vaccine. (CNN Indonesia)
  - Indonesia reports a record for the fourth consecutive day of 56,757 new cases
    of COVID-19, thereby bringing the nationwide total of confirmed cases to 2.72
    million. (detikNews)
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record for the third consecutive day of 13,215 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 880,782.
    (CNA)
  - COVID-19 pandemic in Sri Lanka
  - COVID-19 vaccination in Sri Lanka
  - Sri Lanka reports a new single-day record of 384,763 vaccine doses administered.
    (Adaderana)
  - COVID-19 pandemic in Thailand
  - Thailand reports a record 98 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 3,032. (Bangkok Post)
  - COVID-19 pandemic in Vietnam
  - COVID-19 vaccination in Vietnam
  - The Ministry of Health issues an emergency use authorization for the Janssen COVID-19
    vaccine, becoming the sixth vaccine to be approved in Vietnam. (The Times of India)
  - Vietnam surpasses 40,000 cases of COVID-19 after a record 3,416 cases are reported
    in the past 24 hours. (Viet Nam News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Russia
  - Russia reports a record for the third consecutive day of 791 deaths from COVID-19,
    thereby bringing the nationwide death toll to 146,069. (Armenpress)
  - COVID-19 pandemic in the United Kingdom
  - The United Kingdom reports 48,553 new cases of COVID-19 in the past 24 hours,
    which is the highest single-day total of new cases since January 15. (ITV)
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - A Food and Drug Administration official says that a vaccine for children under
    the age of 12 years is expected to be approved by midwinter. (NBC)
  - COVID-19 pandemic in California
  - Los Angeles County will restore their indoor mask mandate amid the spread of the
    Lineage B.1.617 Delta variant. (MarketWatch)
  - COVID-19 pandemic in Louisiana
  - Amidst a rise of cases in Louisiana, Governor John Bel Edwards reports that 50%
    of adults in the state have received a dose of the vaccine. (KATC)
  - COVID-19 pandemic in Maryland
  - Maryland Governor Larry Hogan announces that the state has administered seven
    million doses of the COVID-19 vaccine. (WBOC-TV)
  - COVID-19 pandemic in Missouri
  - The Missouri Department of Health and Senior Services issues a hotspot advisory
    in several counties in southwest Missouri amid an increase in the number of COVID-19
    cases in the state. (WDAF-TV)
  - COVID-19 pandemic in Mauritius, Travel restrictions related to the COVID-19 pandemic
  - Mauritius reopens its borders to vaccinated tourists after being closed for 16
    months as part of a two-phase strategy to attract tourists in order to revive
    the economy from the impact of the pandemic. (Bloomberg)
  - COVID-19 pandemic in Papua New Guinea
  - Papua New Guinea reports its first case of the SARS-CoV-2 Delta variant in a 65-year-old
    Filipino who is the captain of a cargo ship which departed from Indonesia on June
    26 and arrived in the country almost two weeks later. (SBS)
  - COVID-19 pandemic in Rwanda
  - The Rwandan government announces a lockdown in its capital Kigali and eight other
    districts from July 17 in an attempt to curb the increase in cases. (Anadolou
    Agency)
  - Cuba–United States relations
  - United States involvement in regime change in Latin America
  - Florida Governor Ron DeSantis urges the Cuban military to stage a coup in Cuba.
    He also urges the Biden administration to "restore internet access to Cuba". (Tampa
    Bay Times)
  - U.S. President Joe Biden calls Cuba a "failed state" and denounces communism as
    a "failed system". He also said the United States is looking into ways to "restoring
    internet access in Cuba". (CNN)
  - LGBT rights in Hungary, LGBT rights in Poland
  - The European Commission launches legal challenges against Hungary and parts of
    Poland due to their anti-LGBT+ laws. The Commission adds that "Europe will never
    allow parts of our society to be stigmatized". (DW)
  - Killing of Peter R. de Vries
  - Dutch crime reporter Peter R. de Vries dies in an Amsterdam hospital from complications
    of gunshot wounds. De Vries had been shot five times outside of an Amsterdam TV
    studio nine days earlier. Two of the suspects in the shooting are in custody.
    (Al Jazeera)
  - 2021 Cuban protests
  - Cuban Americans gather at the Florida State Capitol in solidarity with protesters
    in Cuba. (WCTV)
  - Interim Prime Minister of Lebanon Saad Hariri resigns after both failing to form
    a new government in the past eight months and reaching an impasse with President
    Michel Aoun on adopting some constitutional amendments. Supporters of Hariri and
    his party Future Movement subsequently protest in Beirut, where they clashed with
    riot police, and blocked roads in Tripoli and Tyre. (Al Jazeera)
  - Israeli football club Beitar Jerusalem F.C. cancels a planned match with FC Barcelona
    after the latter refused to hold the match in Jerusalem, following a complaint
    sent by the Palestinian Football Association earlier this month. The planned location
    of the match would have been in Malha, which was a Palestinian Arab village prior
    to the establishment of Israel. (Al Jazeera)
