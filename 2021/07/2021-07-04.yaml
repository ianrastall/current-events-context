Date: '2021-07-04'
Source_URI: Portal:Current events/2021 July 4
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - Taliban insurgency
  - The Taliban takes control of several further districts overnight as Afghan troops
    abandon their posts and flee into neighboring Tajikistan via Badakhshan Province.
    The State Committee for National Security of Tajikistan reports that more than
    300 Afghan troops crossed the Tajik border as Taliban spokesperson Zabiullah Mujahid
    confirms that most of the territory was gained without a fight. (AP)
  - Withdrawal of United States troops from Afghanistan
  - Taliban spokesperson Suhail Shaheen warns that all foreign troops must leave Afghanistan
    before a NATO deadline on September 11 amid reports that the U.S. military plans
    to keep 1,000 troops in Kabul in order to protect both its embassy and the Hamid
    Karzai International Airport. (BBC News)
  - Mali War
  - Four Malian soldiers are killed in an ambush on their patrol. No group claims
    responsibility for the attack, which comes as France resumes joint military exercises
    with members of the Malian Armed Forces, which had been suspended following the
    coup d'état this year led by Colonel Assimi Goïta. (Reuters)
  - 2021 Philippine Air Force C-130 crash
  - Fifty people are killed and 49 others are injured when a C-130 transport plane
    of the Philippine Air Force carrying 92 passengers and attempting to land at an
    airport in Jolo, Sulu, crashes in the nearby town of Patikul. Among the dead there
    are three civilians on the ground; four more are among the injured. (BBC News)
  - 2021 Atlantic hurricane season
  - Tropical Storm Elsa passes through the Caribbean, downing trees and blowing off
    roofs, killing two people in the Dominican Republic and one in Saint Lucia. (Al
    Jazeera)
  - 2021 Atami landslide
  - Twenty-three people are rescued from their ruined homes after a landslide struck
    Atami, Japan. Two more people are found dead, bringing the death toll to 4. (Al
    Jazeera)
  - Surfside condominium building collapse
  - The remainder of the Surfside condominium is demolished. (ABC News)
  - A huge wildfire spreads through Limassol, Cyprus, killing four people and forcing
    the evacuation of several villages. It is described as the worst wildfire in the
    country's history. (BBC News)
  - A mud volcano eruption in the Caspian Sea, near an oil platform off the coast
    of Azerbaijan, causes a massive explosion and fireball, which is seen across the
    region. There are no reports of injuries or damage to any oil platforms. (BNO
    News)
  - Matīss Kivlenieks' death
  - At Novi, Michigan on the backyard of Elvis Merzļikins' mansion, Matīss Kivlenieks
    sacrifices after trying to save Elvis Merzļikins and his pregnant wife when a
    firework explodes to Matīss' chest. The burial date was on the 21st of July at
    the same year. (ESPN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 153 deaths from COVID-19 in the past 24 hours, thereby
    bringing the national death toll to 15,065. (Dhaka Tribune)
  - COVID-19 pandemic in India, COVID-19 vaccination in India
  - Police arrested 14 people for administering fake vaccine shots of salt water instead
    of the Oxford-AstraZeneca vaccine at nearly a dozen private vaccination sites
    in Mumbai. The organizers, including medical professionals, charged between $10
    and $17 per dose. More than 2,600 people paid to receive the vaccine. (The New
    York Times)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record 555 deaths from COVID-19 in the past 24 hours, 137
    of them from Central Java, thereby bringing the national death toll to 60,582.
    (Merdeka.com)
  - COVID-19 pandemic in Iran
  - Iran orders the closure of non-essential businesses such as public parks, restaurants,
    dessert shops, beauty salons, Shopping malls and bookstores in 275 "red" and "orange"
    zone cities, including the capital Tehran, due to the spread of the highly contagious
    Delta variant. (Egypt Independent)
  - COVID-19 pandemic in Israel
  - COVID-19 vaccination in Israel
  - Prime Minister Naftali Bennett says that around 100,000 teenagers have received
    a dose of the COVID-19 vaccine. (Lokmat)
  - Bennett also announces that he has spoken with Pfizer CEO Albert Bourla about
    swapping doses of the Pfizer COVID-19 vaccine to other countries. (The Times of
    Israel)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Luxembourg
  - Prime Minister Xavier Bettel is admitted to a hospital as a precautionary measure,
    one week after he tested positive for COVID-19. (The Guardian)
  - COVID-19 pandemic in Russia
  - Russia reports 25,142 new cases of COVID-19 in the past 24 hours, which is the
    highest single-day total of new cases since January 2, thereby bringing the national
    total of confirmed cases to 5.6 million. (The Moscow Times)
  - COVID-19 pandemic in Fiji
  - Fiji reports a record 522 cases of COVID-19 in the past 24 hours, thereby bringing
    the national total to 6,161 cases. Fiji has seen a substantial increase in the
    number of cases since an outbreak occurred in April. The Ministry of Health and
    Medical Services also reports three deaths in the past 24 hours, thereby bringing
    the nationwide death toll to 30. (RNZ)
  - Politics of France
  - The National Rally party re-elects Marine Le Pen without opposition in a bid to
    strengthen her candidacy for the 2022 French presidential election after the party
    performed poorly in regional elections. The party also hosts a rally in Paris.
    (DW)
  - Presidency of Jair Bolsonaro, 2021 Brazilian protests
  - The Social Democratic Party's founder Gilberto Kassab says that there is proof
    "each day to impeach President Jair Bolsonaro" after massive protests and Bolsonaro
    also announcing his candidacy for next year's presidential election. (Notícias
    UOL)
  - The Chilean Constitutional Convention is inaugurated in Santiago with Mapuche
    representative Elisa Loncón elected as President of the Convention. (Bloomberg)
  - Human rights in the State of Palestine
  - Hundreds of people gather in Ramallah to demonstrate against Palestinian Authority
    President Mahmoud Abbas, as part of a protest movement sparked by the death of
    political activist Nizar Banat. (Israel Hayom)
