Date: '2021-07-22'
Source_URI: Portal:Current events/2021 July 22
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - 2021 Afghanistan attacks
  - 2021 Spin Boldak shooting
  - Gunmen shoot and kill at least 100 people in Spin Boldak District, Kandahar Province.
    (TOLOnews)
  - Withdrawal of United States troops from Afghanistan
  - The United States House of Representatives votes 407–16 to pass the Allies Act,
    a bill that would improve and provide visas for Afghan interpreters who worked
    for American personnel during the war. (AP)
  - 2021 Taliban offensive
  - Tajikistan holds its largest military exercise, mobilizing 130,000 servicemen
    in addition to 100,000 active servicemen and parades more than 1,000 military
    vehicles and many more warfare equipment and military helicopters. President Emomali
    Rakhmon urged Tajik people to protect the "peace and stability achieved at a high
    price" amid a Taliban offensive in neighboring Afghanistan. (Reuters)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - Investigations into the origin of COVID-19, COVID-19 pandemic in mainland China
  - China rejects the next stage of a World Health Organization (WHO) investigation
    into COVID-19. Chinese Deputy Minister of Health Zeng Yixin rebuffed the proposal
    to investigate the origins in Wuhan as "disrespect for common sense and arrogance
    towards Science". WHO experts said it was very unlikely that the virus escaped
    from a Chinese lab, but the theory has endured. (BBC News)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record 36,370 recoveries and 1,449 deaths from COVID-19 in
    the past 24 hours, thereby bringing the nationwide total of recoveries to 2.39
    million and the nationwide death toll to 79,302. The country also surpasses three
    million cases of the virus. (detikNews)
  - COVID-19 pandemic in Singapore, 2020–21 Singapore circuit breaker measures
  - Singapore reverts to "Phase 2 Heightened Alert" which bans dine-in service in
    all food and beverage establishments and closes all personalised care services
    that would require patrons to remove their masks. These restrictions will remain
    in effect until August 18. (The Straits Times)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record for the second consecutive day of 1,842 new cases
    of COVID-19, thereby bringing the nationwide total of confirmed cases to 184,103.
    (Yonhap News Agency)
  - COVID-19 pandemic in Thailand
  - Thailand reports a record for the second consecutive day of 13,655 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 453,132.
    (CNA)
  - COVID-19 pandemic in Vietnam
  - Vietnam reports a record 6,194 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 74,371. (Viet Nam News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - COVID-19 vaccination in Italy
  - The Government of Italy announces that it will require people in the country to
    show a proof of vaccination of at least one dose, a negative COVID-19 test, or
    that they have recovered from COVID-19 in order to participate in social activities
    such as indoor dining, visiting museums, and attending shows beginning on August
    6. (The New York Times)
  - COVID-19 pandemic in Greece
  - Greece expands its mandatory regular COVID-19 testing to unvaccinated tourism
    and restaurant workers nationwide as the number of COVID-19 cases continues to
    increase. (Reuters)
  - COVID-19 pandemic in Russia
  - Russia reports its first case of the Lineage P.1 Gamma variant, which was originally
    detected in Brazil. (Euronews)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York (state)
  - COVID-19 pandemic in New York City
  - New York City Mayor Bill de Blasio announces that 70% of adults in the city have
    received a dose of the COVID-19 vaccine. (Patch.com)
  - COVID-19 pandemic in Illinois
  - Chicago Public Schools announces that face masks will be required in all of their
    public schools this fall, regardless of the vaccination status in the city. (Chicago
    Sun-Times)
  - COVID-19 pandemic in Missouri
  - Missouri officials announce that ambulances and medical staff will be sent to
    Springfield and Greene County amid an increase in the number of COVID-19 cases.
    (The Kansas City Star)
  - COVID-19 vaccination in the United States
  - Sanford Health announces that all employees will be required to receive a dose
    of the COVID-19 vaccine by November 1. (The Bismark Tribune)
  - COVID-19 pandemic in Cuba
  - Cuba reports a record 7,745 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 308,599. (Xinhuanet)
  - COVID-19 pandemic in Mexico
  - Mexico reports 16,244 new cases of COVID-19 in the past 24 hours, the highest
    daily total in the country since January. (Reuters)
  - COVID-19 pandemic in Australia
  - COVID-19 vaccination in Australia
  - Australian Prime Minister Scott Morrison apologises during a press conference
    for the slow rollout of the vaccination program and appeals for changes to the
    restrictions on the Oxford–AstraZeneca vaccine. (ABC Australia)
  - COVID-19 pandemic in Chile, Travel restrictions related to the COVID-19 pandemic
  - The Chilean government announces that beginning on July 26, fully vaccinated residents
    will be able to travel internationally by airplane without special permission
    as the number of COVID-19 cases continues to decrease and the number of people
    who have received a vaccine continues to increase. (Bloomberg)
  - North Korea and weapons of mass destruction
  - North Korea–United States relations, North Korea–South Korea relations
  - U.S. Deputy Secretary of State Wendy Sherman and South Korea Foreign Minister
    Chung Eui-yong announces that both countries have reached an agreement to convince
    North Korea to return to nuclear talks. (The Washington Post)
  - Haiti–United States relations
  - The Biden administration announces that Daniel Lewis Foote will serve as the U.S.
    special envoy to Haiti amid political turmoil in the country since the assassination
    of President Jovenel Moïse. (CNBC)
  - Foreign relations of Equatorial Guinea
  - The United Kingdom imposes sanctions on Teodoro Nguema Obiang Mangue, the son
    of the president of Equatorial Guinea, over his "lavish lifestyle" spending, which
    includes mansions and private jets. Mangue is also the incumbent vice president.
    (Euronews)
  - Asylum in Australia
  - An Afghan Tajik asylum seeker who has been held in immigration detention by Australia
    for eight years sues the Australian Government in the Federal Court. A former
    employee of the Islamic Republican government, the man fled an assassination attempt
    by the Taliban and argues that his family is still being targeted in Afghanistan
    and that his indefinite detention prevents him from organising their escape from
    the violence. The Government has requested the case be dismissed and denied they
    had any legal obligations towards Afghan citizens. (The Guardian)
  - Police in Madagascar arrest six individuals, including a foreign national, after
    months of investigation into a plot to kill President Andry Rajoelina. The Attorney
    General accuses those arrested of having "a plan for the elimination of the head
    of state". (Reuters) (Al Jazeera)
  - Tanzanian opposition leader Freeman Mbowe and 15 members of his Chadema party,
    who were arrested yesterday, are charged with terrorism, according to a statement
    from the party. Amnesty International condemns the charges and the United States
    said yesterday that Mbowe's arrest was "very concerning". (Al Jazeera)
  - 2021 Brazilian military crisis, 2022 Brazilian general election
  - It is revealed that Brazilian Minister of Defence Braga Netto communicated to
    President of the Chamber of Deputies Arthur Lira that the 2022 elections would
    not be held if a controversial bill that bans electronic voting and reinstates
    the use of paper ballots does not pass through Congress. This report follows similar
    threats made by President Jair Bolsonaro, whose approval ratings and chances of
    re-election are continuing to decrease. (O Estado de S. Paulo)
  - Both Netto and Lira deny that such a threat happened, with the former declaring
    that the Estadão reported an "invention" and Superior Electoral Court President
    Luís Roberto Barroso commenting that "the [democratic] institutions are working".
    Estadãos editor, João Caminoto, reaffirms the veracity of the report in a social
    media post. (G1)
