Date: '2021-07-05'
Source_URI: Portal:Current events/2021 July 5
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan
  - Afghan presidential advisor Hamdullah Mohib says that there will be a counter-offensive
    against the Taliban in the north after the group captured six districts in Badakhshan
    Province. On Sunday, at least 1,037 Afghan troops abandoned their positions and
    fled into Tajikistan. (Al Jazeera)
  - Chikun kidnapping
  - Bandits abduct around 150 students, a parent and the administrator of a boarding
    school in Chikun, Kaduna State, Nigeria. The army has rescued at least 26 people.
    (Reuters)
  - An explosion and fire at a factory in Bangkok, Thailand, kills at least one person
    and injures 29 others. Thousands of residents are evacuated. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record of 9,964 new cases and 164 deaths from COVID-19 in
    the past 24 hours, thereby bringing the nationwide total of confirmed cases to
    954,881 and the nationwide death toll to 15,229. (Bdnews24.com)
  - COVID-19 pandemic in Indonesia
  - Indonesia reports a record of 29,745 new cases and 558 deaths from COVID-19 in
    the past 24 hours, thereby bringing the nationwide total of confirmed cases to
    2.31 million and the nationwide death toll to 61,140. Active cases also surpassed
    300,000 for the first time. (detikHealth)
  - COVID-19 pandemic in Vietnam
  - Vietnam surpasses 20,000 cases of COVID-19 after a record 1,102 new cases are
    reported in the past 24 hours. (The Star)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Norway
  - The Norwegian government delays a final phase of reopening the economy until the
    end of July at the earliest because of concerns about the SARS-CoV-2 Delta variant.
    (Reuters)
  - COVID-19 pandemic in Ukraine
  - Ukraine authorizes the usage of the Johnson & Johnson COVID-19 vaccine. (Kyiv
    Post)
  - LGBT rights in Georgia (country)
  - Anti-LGBT right-wing groups storm and ransack the offices of an LGBT+ organization
    in Tbilisi, Georgia, ahead of the city's pride march. Activists say that equipment
    was lost during the attack. (Reuters)
  - The pride march is later cancelled amid more homophobic attacks against LGBT people.
    Police have promised to investigate the attacks. (DW) (The Guardian)
  - Violence against LGBT people, LGBT rights in Spain
  - Protests across Spain occur in the aftermath of the murder of a 24-year-old man
    who, according to his friends, was killed because he was gay. The murder sparked
    widespread condemnation from LGBT organizations and politicians. (CTV News)
  - Indonesian police say that loss due to the burning that occurred in Elelim, the
    capital of Yalimo Regency, Papua, on 29 June was estimated at Rp 324 billion ($22.5
    million). There were 34 offices, 126 shops, 115 motorbikes and 4 cars that were
    burned and 1,137 people have been displaced. The burning was carried out shortly
    after the Court's decision to order a re-voting without the participation of one
    of the regent candidates. (VOI)
  - Peruvian prosecutor José Domingo Pérez opens an investigation into Keiko Fujimori
    and the Popular Force party for allegedly engaging in money laundering during
    the 2021 Peruvian general election following audio recordings of former Alberto
    Fujimori advisor Vladimiro Montesinos bribing election judges. (The Rio Times)
