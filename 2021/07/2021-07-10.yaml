Date: '2021-07-10'
Source_URI: Portal:Current events/2021 July 10
Intelligence_Payload:
  Uncategorized:
  - Assassination of Jovenel Moïse
  - Former Haitian First Lady Martine Moïse, who was seriously injured during the
    assassination of her husband, Jovenel Moïse, releases her first public audio statement
    since the attack. (BBC News)
  - Joseph Lambert, the President of the Senate, is nominated as provisional President
    of Haiti by a group of senators, potentially succeeding Jovenel Moïse. (DW)
  - Somali Civil War
  - A suicide car bombing in Mogadishu kills five people and injures nine others.
    The attack targeted Mogadishu’s police chief, who survived. Al-Shabaab claims
    responsibility for the attack. (Al Jazeera)
  - Removal of Confederate monuments and memorials
  - Two monuments of Confederate generals Robert E. Lee and Stonewall Jackson are
    removed from downtown Charlottesville, Virginia, four years after the riot that
    occurred in the city. (NBC)
  - Following a short council meeting and vote, the Meriwether Lewis and William Clark
    sculpture and the George Rogers Clark sculpture are also removed from downtown
    Charlottesville. (The New York Post)
  - An earthquake with a magnitude of 5.9 ML strikes east of Rasht, Tajikistan, killing
    at least five people and destroying at least 20 houses. (Al Jazeera)
  - The Miami-Dade County Courthouse closes due to safety concerns following the collapse
    that occurred at the condominium in Surfside, Florida. (AP)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record for the second consecutive day of 9,353 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 827,191.
    (The Star)
  - COVID-19 pandemic in South Korea
  - South Korea reports a record for the third consecutive day of 1,378 new cases
    of COVID-19, thereby bringing the nationwide total of confirmed cases to 166,722.
    (Yonhap News Agency)
  - COVID-19 pandemic in Thailand
  - Thailand reports a record 91 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 2,625. (Bangkok Post)
  - COVID-19 pandemic in Vietnam
  - Vietnam receives two million doses of the Moderna COVID-19 vaccine from the United
    States, facilitated through the COVAX initiative amid an increase in the number
    of cases of COVID-19 in the country. (Reuters)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Georgia
  - Georgia receives 43,200 doses of the COVID-19 vaccine developed by AstraZeneca
    and the University of Oxford. (Georgian Journal)
  - COVID-19 pandemic in Moldova
  - Moldova–United States relations, COVID-19 vaccination in Moldova
  - White House Press Secretary Jen Psaki announces that the United States has donated
    500,000 doses of the Johnson & Johnson COVID-19 vaccine to Moldova. Moldovan President
    Maia Sandu praises the United States for the vaccine deployment to the country.
    (Axios)
  - COVID-19 pandemic in the Netherlands
  - The Netherlands imposes restrictions that require nightclubs and discos to close,
    prohibits live entertainment in bars and restaurants and requires them to close
    at midnight, as well as suspending the entry pass program, amid an increase in
    the number of COVID-19 cases primarily due to the Delta variant. These restrictions
    will remain in effect until August 13. (Axios)
  - COVID-19 pandemic in Russia
  - Russia reports a record 752 deaths from COVID-19 in the past 24 hours, bringing
    the nationwide death toll to 142,253. (The Moscow Times)
  - European Union response to the COVID-19 pandemic
  - The European Union says that it has secured enough doses to vaccinate 70% of adults.
    (France 24)
  - COVID-19 pandemic in Fiji
  - COVID-19 vaccination in Fiji
  - The Fijian government announces that it will soon begin administering the Moderna
    COVID-19 vaccine, facilitated through UNICEF and the World Health Organization.
    (FBC)
  - COVID-19 pandemic in Algeria
  - Newly-appointed Prime Minister Aymen Benabderrahmane tests positive for COVID-19
    and will quarantine for seven days. (Euronews)
  - Rupganj factory fire
  - Police in Bangladesh arrest eight people, including the factory's company owner
    in connection with the fire that killed at least 52 people. Police say that emergency
    exits were locked in the building. (DW)
  - A four-day gun battle between security forces and armed gangs in the streets of
    Caracas, Venezuela, results in the deaths of more than 26 people and the wounding
    of 40 others. Authorities says that the fighting is now under control, but that
    there may still be a number of snipers in the streets. The killed people are identified
    as 22 gang members and four police officers, but a number of civilians also died
    in the clashes. (BBC News)
  - Police arrest five people in Santa Ana de Yusguare, Honduras, after they were
    identified as part of the mob of over 600 people who lynched and killed an Italian
    man accused of murdering a homeless elderly man. (Reuters)
  - Politics of Brazil, 2021 Brazilian protests
  - For the first time, a poll shows that a majority of Brazilians (54%) support moves
    to open an impeachment process against President Jair Bolsonaro, with 42% opposing,
    amid graft accusations and a vaccine procurement scandal. (Reuters)
  - Protests occur in Berlin and other cities, organized by exiled activist of the
    People's Mujahedin of Iran, Maryam Rajavi, to protest the recent election of Ebrahim
    Raisi as President of Iran. Former U.S. Secretary of State Mike Pompeo and Slovenian
    Prime Minister Janez Janša join the protests. (Reuters)
  - 2021 Copa América
  - 2021 Copa América Final
  - The 47th edition of the South American international men's football competition
    concludes in the Maracanã Stadium with Argentina beating hosts Brazil 1–0 in the
    final. (StadiumAstro)
