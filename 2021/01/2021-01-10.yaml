Date: '2021-01-10'
Source_URI: Portal:Current events/2021 January 10
Intelligence_Payload:
  Uncategorized:
  - Kivu conflict
  - At least six park rangers in the Virunga National Park in Rutshuru, North Kivu,
    Democratic Republic of the Congo, are killed in an ambush. A Mai-Mai militia is
    suspected to have committed the attack. (AFP via Barron's)
  - Tigray War
  - The Ethiopian National Defense Force says that it has killed 15 members of the
    Tigray People's Liberation Front, including the region's former deputy police
    commissioner, and captured eight others, including the region's former president
    Abay Weldu. (Reuters)
  - Aftermath of the 2021 storming of the United States Capitol
  - PGA of America announces it will terminate an agreement to play the 2022 PGA Championship
    at Trump National Golf Club in Bedminster because conducting the golf tournament
    there would have been "detrimental" to the PGA brand. (ESPN)
  - Payment processor Stripe will no longer process payments for the campaign website
    of President Donald Trump because of the company's policies against encouraging
    violence. (Wall Street Journal)
  - Sriwijaya Air Flight 182
  - Indonesian authorities locate the black boxes of the Sriwijaya Air Boeing 737-500
    PK-CLC that crashed into the sea soon after taking-off from Jakarta, as human
    body parts and debris from the plane are found. Loss of everyone onboard is considered
    almost certain. (France 24) (The Jakarta Post)
  - Gold mine explosion in Shandong, China.
  - Twenty-two workers are trapped in a gold mine in Qixia, east China's Shandong
    province after an explosion tore through the mine at 2:00 p.m. (Xinhua News) (South
    China Morning Post)
  - Power is restored in Pakistan following a nationwide blackout. (The Financial
    Times)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario reports a record 3,945 new confirmed cases in the past 24 hours. (CBC)
  - COVID-19 pandemic in Mexico
  - Spokesperson for President Andrés Manuel López Obrador, Jesús Ramírez Cuevas,
    tests positive for COVID-19. (The Independent)
  - Mexico reports their first case of a new variant of SARS-CoV-2 from the United
    Kingdom. (Business Standard)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Japan
  - Japan's Health Ministry detects a new variant of SARS-CoV-2 partially similar
    to those from South Africa and the United Kingdom in four people that travelled
    from Amazonas in Brazil. (The Straits Times)
  - COVID-19 pandemic in the Philippines
  - The Philippines signs an agreement with the Serum Institute of India to receive
    30 million doses of Novavax's vaccine. (Inquirer.com)
  - COVID-19 pandemic in Vietnam
  - Vietnam limits inbound flights until the Lunar New Year holiday due to the spread
    of new variants of SARS-Cov-2 in many countries. (VnExpress International)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Belgium
  - Belgium surpasses 20,000 deaths from COVID-19. (The Brussels Times)
  - COVID-19 pandemic in Germany
  - Germany surpasses 40,000 deaths from COVID-19. (The Local Germany)
  - COVID-19 pandemic in Russia, Variant of Concern 202012/01
  - Russia reports their first case of a new variant of SARS-CoV-2 from the United
    Kingdom. (Reuters)
  - COVID-19 pandemic in the United Kingdom
  - President of Armenia Armen Sarksyan is admitted to a hospital in London in a serious
    condition due to the worsening of his COVID-19 diagnosis. (CNN)
  - COVID-19 pandemic in Africa
  - Africa surpasses 3 million cases of COVID-19. (ABC News)
  - COVID-19 pandemic in New Zealand, 501.V2 variant
  - New Zealand reports their first case of a new variant of SARS-CoV-2 from South
    Africa. (Newshub)
  - COVID-19 pandemic in Uruguay
  - Uruguay reports a record 1,215 new cases in the past 24 hours, bringing the nationwide
    total of confirmed cases to 26,186. (gob.uy)
  - The number of confirmed COVID-19 cases worldwide surpasses 90 million. (TVNZ)
  - Crime in Australia
  - A mother and her three daughters are found dead in a house fire in Glen Waverley,
    Victoria. Police are investigating it as a possible mass murder. (News.com.au)
  - Aftermath of the 2021 storming of the United States Capitol
  - Two men who were photographed carrying plastic hand restraints in the Senate chamber
    during the storming of the United States Capitol are arrested in Tennessee and
    Texas. (The Washington Post)
  - The Reserve Bank of New Zealand reveals that one of its file hosting services
    storing "sensitive information" was "maliciously" breached. The bank says the
    breach was contained and that they are investigating the "nature and extent" of
    "potentially accessed" information. (Radio New Zealand) (AFP via ABS-CBN News)
  - Six inmates escape from a jail in California. Their whereabouts are unknown and
    being sought by California police. The six men are considered to be armed and
    dangerous. (WGNTV)
  - 2021 Kazakh legislative election
  - Legislative elections are held in Kazakhstan. The election is criticized for a
    lack of opposition to the leading party Nur Otan and is therefore expected to
    be considered neither free nor fair by international observers. (Radio Free Europe)
  - 2021 Kyrgyz presidential election, 2021 Kyrgyz referendum
  - Presidential elections are held in Kyrgyzstan following last year's political
    unrest and the resignation of President Sooronbay Jeenbekov. Interim Prime Minister
    Sadyr Japarov is widely expected to win the election. The question of keeping
    the current parliamentary system or reintroducing a presidential system is also
    presented to the electorate in the form of a referendum. (Reuters) (Radio Free
    Europe)
  - 8th Congress of the Workers' Party of Korea
  - North Korean state media says that Kim Jong-un has been formally elected as the
    General Secretary of the ruling Workers' Party of Korea, inheriting the title
    from his late father Kim Jong-il, who died in 2011. (Reuters)
  - 2020-21 Belarusian protests
  - Belarusian President Alexander Lukashenko says that the country will draft a new
    constitution by the end of the year. It remains unclear whether the new constitution
    will result in Lukashenko leaving office. (The Straits Times)
