Date: '2021-01-05'
Source_URI: Portal:Current events/2021 January 5
Intelligence_Payload:
  Uncategorized:
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Denmark
  - Prime Minister Mette Frederiksen announces the increase of the COVID-19 risk level
    from level 4 to 5, indicating "widespread infection in society", as well as "a
    risk that treatment capacity at hospitals will be exceeded". In addition, public
    and private gatherings will be limited to five people. The rules will be in effect
    until January 17. (The Local Denmark)
  - COVID-19 pandemic in Germany
  - Chancellor Angela Merkel and leaders of 16 states agree to extend the country's
    lockdown until January 31. (Euronews)
  - COVID-19 pandemic in Italy
  - Italy's Council of Ministers approves a decree that prohibits travel between the
    country's regions except for health or work reasons, with people in "red zone"
    areas only allowed to move once per day. They also extend most lockdown restrictions
    until January 15. The country will be in a "yellow zone" on January 7 and 8, with
    eased restrictions and allowing restaurants, bars, shops and malls to open, while
    on January 9 and 10 the country will be in an "orange zone", with malls closed
    and restaurants and bars open for takeaway and delivery only. (ANSA)
  - COVID-19 pandemic in Malta
  - Maltese president George Vella receives his first dose of the COVID-19 vaccine.
    (Times of Malta)
  - COVID-19 pandemic in the United Kingdom
  - COVID-19 pandemic in Northern Ireland
  - The Northern Ireland Executive issues a stay-at-home order in Northern Ireland,
    which is currently in the second week of a six-week lockdown, legally enforceable
    from January 8, in order to reduce the spread of COVID-19. (BBC News)
  - The United Kingdom reports a record 60,916 new confirmed cases in the past 24
    hours, bringing the nationwide total of confirmed cases to 2,774,479. (The Independent)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia
  - Health Minister Budi Gunadi Sadikin announces that a nationwide mass vaccination
    program against COVID-19 will begin on January 13. President Joko Widodo will
    become the first person in the country to receive a vaccine. (Kontan)
  - COVID-19 pandemic in Iran, Variant of Concern 202012/01
  - Iran reports its first case of a new variant of SARS-CoV-2 in an Iranian who travelled
    from the United Kingdom and later tested positive for COVID-19. (The Jerusalem
    Post)
  - COVID-19 pandemic in Israel
  - The Israeli Cabinet agrees to tighten the nationwide lockdown by closing schools
    and non-essential shops for 14 days. The measures will come into force at midnight
    between Thursday and Friday. (The Times of Israel)
  - COVID-19 pandemic in Japan
  - Japan reports a record 4,915 new cases in the past 24 hours. In addition, a record
    76 deaths are also reported in the past 24 hours. (The Japan Times)
  - COVID-19 pandemic in Oman, Variant of Concern 202012/01
  - Oman reports their first case of a new variant of SARS-CoV-2 in a resident who
    travelled from the United Kingdom and tested positive while in quarantine. (Khaleej
    Times)
  - COVID-19 pandemic in South Korea
  - South Korea surpasses 1,000 deaths from COVID-19. (The Korea Herald)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Rwanda
  - Rwanda bans public and private transport in and out of Kigali and between districts
    and extends a curfew from 8:00 p.m. to 4:00 a.m. local time for another 15 days
    amid a deadly second wave of COVID-19. (Daily Monitor)
  - COVID-19 pandemic in Zimbabwe
  - Zimbabwe reports 1,365 new confirmed cases and 34 deaths in the past 24 hours,
    its largest daily increase for both cases and deaths since the pandemic began
    as the country begins a month-long lockdown to reduce the spread of COVID-19.
    (Reuters)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Georgia, Variant of Concern 202012/01
  - Georgia reports their first case of a new variant of SARS-CoV-2 in an 18-year-old
    male with no travel history, and who is currently in isolation at home. (WXIA-TV)
  - The U.S. surpasses 21 million cases of COVID-19, just four days after surpassing
    20 million cases. (CNN)
  - Qatar diplomatic crisis
  - Saudi Arabia reopens its border with Qatar, ending the three-year diplomatic crisis.
    The resolution was brokered by Kuwait and the United States. (NBC News)
  - Kosovo–United States relations
  - Kosovo's parliament unanimously approves deploying the Kosovo Security Force on
    international peacekeeping missions, following a formal request by the United
    States Central Command. (Times Union)
  - 2020–2021 United States racial unrest
  - Shooting of Jacob Blake, Kenosha unrest
  - Kenosha unrest shooting
  - Kyle Rittenhouse, the 17-year-old boy accused of shooting three people (including
    two killed) during a protest in Kenosha, Wisconsin, will plead not guilty. (Newsweek)
  - Kenosha County District Attorney Michael Graveley announces that no charges will
    be made against Rusten Sheskey, the Kenosha police officer accused of shooting
    Jacob Blake. (USA Today)
  - 2020 United States election protests
  - Washington, D.C. mayor Muriel Bowser activates the District of Columbia National
    Guard due to an organized protest of pro-Trump supporters. (AP)
  - A federal judge bans Proud Boys chairman Enrique Tarrio from entering Washington,
    D.C. (Forbes)
  - Iran–United States relations
  - Iran requests that Interpol issue a red notice for the arrest of U.S. President
    Donald Trump and 47 other U.S. officials for their role in the assassination of
    Qasem Soleimani in January 2020. A similar request was previously rejected by
    Interpol. (Al Jazeera)
  - Censorship in Vietnam
  - A court in Vietnam sentences three freelance journalists to between 11 and 15
    years in prison for anti-state propaganda, criticising the government and "infringing
    the interests of the Communist Party", among other convictions. (Reuters)
  - Trump–Raffensperger phone call
  - Cleta Mitchell resigns from her law firm after participating in President Trump's
    phone call with Georgia Secretary of State Brad Raffensperger. (The Hill)
  - 2020 United States Senate elections
  - 2020–21 United States Senate election in Georgia, 2020–21 United States Senate
    special election in Georgia
  - Voters in Georgia head to the polls to cast their votes to determine who will
    control the United States Senate. Republican Senator David Perdue will face Democrat
    Jon Ossoff, and incumbent Republican Kelly Loeffler will face Democrat Raphael
    Warnock. (BBC News)
  - Alabama wide receiver DeVonta Smith wins the Heisman Trophy, making him the first
    receiver to do so since Desmond Howard in 1991. (CBS News)
  - Team USA defeats Team Canada 2–0 in the gold medal game to win the 2021 World
    Junior Ice Hockey Championships, while Team Finland defeats Team Russia 4–1 in
    the bronze medal game. Team USA's Trevor Zegras is named MVP of the tournament.
    (CBC News)
