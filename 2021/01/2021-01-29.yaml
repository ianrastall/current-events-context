Date: '2021-01-29'
Source_URI: Portal:Current events/2021 January 29
Intelligence_Payload:
  Uncategorized:
  - Economic impact of the COVID-19 pandemic
  - COVID-19 pandemic in France, COVID-19 recession
  - France's GDP contracts 8.3% in 2020, the country's worst economic performance
    since World War II. (France 24)
  - COVID-19 pandemic in Spain, COVID-19 recession
  - Spain's GDP contracts 11% in 2020, the country's worst economic performance since
    the Spanish Civil War. (Marketwatch)
  - February 2021 nor'easter
  - A winter storm causes mudslides in southern California, resulting in over 50 car
    accidents. (KABC-TV)
  - The National Weather Service issued a Winter Storm Warning for all areas above
    6,500 feet (1,981 meters) in Nevada. (National Weather Service)
  - COVID-19 pandemic in Romania
  - Fifteen people are killed in a COVID-19 facility due to a fire at the Matei Balș
    Hospital in Bucharest, Romania. (Digi 24)
  - A helicopter crashes against a hill in eastern Cuba, killing all five people onboard.
    (AFP via Jamaica Observer)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Arizona, Variant of Concern 202012/01
  - Arizona reports the first three cases of the UK variant of SARS-CoV-2. (The Arizona
    Republic)
  - COVID-19 pandemic in Delaware, Variant of Concern 202012/01
  - Delaware reports the first case of the B.1.1.7 variant of SARS-CoV-2 in three
    people from New Castle County. (Delaware Government)
  - The CDC issues a rule requiring all travelers using public transportation to wear
    a mask while boarding, during the trip, and while disembarking. The rule also
    states face shields, bandanas, and scarves are not permissible forms of face covering.
    (Politico)
  - COVID-19 pandemic in Canada
  - Prime Minister Justin Trudeau and major Canadian airlines agree to suspend all
    flights to "sun destinations" such as the Caribbean and Mexico until April 30.
    (BBC News)
  - Trudeau announces new measures to take effect "in the coming weeks" that will
    require incoming travelers to undergo mandatory PCR testing upon arrival and quarantine
    in a hotel for a maximum of three days at their own expense. (AP)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - Prime Minister Jean Castex announces the closure of borders to all travelers outside
    the European Union beginning January 31 in order to reduce the spread of SARS-CoV-2
    variants and avoid a third lockdown. In addition, travel between the overseas
    territories will be limited and all large shopping centres will be closed. (ABC
    News)
  - COVID-19 pandemic in Germany, travel restrictions related to the COVID-19 pandemic
  - The German Ministry of Interior bans entry to all travellers from the United Kingdom,
    Ireland, Brazil, Portugal, and South Africa from tomorrow until February 17 in
    order to reduce the spread of SARS-CoV-2 variants. In addition, travellers from
    Lesotho and Eswatini will also be banned beginning January 31. (Dpa International)
  - COVID-19 pandemic in Greece
  - Greece delays the reopening of high schools, which was scheduled to begin on February
    1, due to an increase in the number of COVID-19 cases, particularly in red zone
    areas. (Ekathimerini)
  - COVID-19 pandemic in Hungary
  - Hungary approves the Chinese-made Sinopharm vaccine for use in the country, becoming
    the first EU member state to do so. (DW)
  - COVID-19 pandemic in Ukraine
  - The Verkhovna Rada passes a law banning registration of the Sputnik V vaccine
    developed by Russia. (Reuters)
  - The European Medicines Agency approves the Oxford-AstraZeneca Vaccine for use
    within the EU and recommends that the European Commission grant it 'limited marketing
    authorization' within the union. (CNBC)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record 5,725 new confirmed cases in the past 24 hours, bringing
    the nationwide total of confirmed cases to 203,933. (The Star)
  - COVID-19 pandemic in the Philippines, Variant of Concern 202012/01
  - Presidential Spokesperson Harry Roque announces that the General Community Quarantine
    (GCQ) in Metro Manila will be extended until February 28 and also places the Cordillera
    Administrative Region under GCQ status because most of the cases of the B.1.1.7
    variant have been reported in the region. (CNN Philippines)
  - COVID-19 pandemic in Thailand
  - The government announces that COVID-19 restrictions will be eased in most areas
    of the country beginning February 1, allowing some businesses to reopen and restaurants
    to extend their operating hours. (Bangkok Post)
  - COVID-19 pandemic in Turkmenistan
  - Turkmenistan approves the EpiVacCorona vaccine, becoming the first country outside
    of Russia to do so. (Business TM)
  - COVID-19 vaccine
  - Pharmaceutical company Johnson & Johnson announces their single-dose COVID-19
    vaccine is 66% effective in preventing moderate disease and 85% in preventing
    severe disease during a global trial. (Politico)
  - Novartis signs an agreement with Pfizer and BioNTech to help produce their vaccine.
    (MedicalXpress)
  - Russia–United States relations
  - Russian President Vladimir Putin signs a bill extending the New START nuclear
    arms reduction treaty with the United States until 2026, ahead of its expiration
    date next week, following talks with U.S. President Joe Biden. (The Guardian)
  - China–Vanuatu relations
  - A Vanuatu patrol boat detains two Chinese fishing vessels near the Torres Islands
    in the Coral Sea for suspected illegal fishing. (The Guardian)
  - Aftermath of the 2021 storming of the United States Capitol
  - Criminal charges brought in the 2021 storming of the United States Capitol
  - Two members of the Proud Boys are charged with conspiracy to breach the United
    States Capitol, including one of the members seen smashing a window with a police
    shield. (New York Times)
  - The FBI announces that two women are arrested in Pennsylvania for their roles
    in the January 6 riot. One of the women, Dawn Bancroft, made threats to shoot
    House Speaker Nancy Pelosi. (The Independent)
  - Social impact of the COVID-19 pandemic in the United Kingdom, crime in the United
    Kingdom
  - Migrants set fire to the Napier Barracks at Shorncliffe Army Camp in Kent after
    "reports of a disturbance". The Home Office says people "set about destroying
    the barracks", after being told that they were being moved due to a COVID-19 outbreak
    at the camp. Kent Police say that the fire caused "a significant amount of damage"
    and is investigating it as a suspected arson attack. (BBC News)
  - Legality of euthanasia
  - The parliament of Portugal passes legislation to legalize euthanasia. (AFP via
    RTE)
  - Crime in France
  - A man is arrested after being linked to the murders of three women and the wounding
    of a man in the past three days in and around Valence, France. The victims, who
    were shot in four separate locations, were HR managers; the attacker's motives
    are suspected to be linked to his earlier employment. (BBC News)
  - Death of Brian Sicknick, aftermath of the 2021 storming of the United States Capitol
  - House Speaker Nancy Pelosi and Senate Majority Leader Chuck Schumer announce that
    Brian Sicknick, the United States Capitol Police officer who died from injuries
    sustained during the storming of the United States Capitol, will lie in honor
    at the Rotunda. (BBC News)
