Date: '2021-03-22'
Source_URI: Portal:Current events/2021 March 22
Intelligence_Payload:
  Uncategorized:
  - Yemeni Civil War
  - Houthi–Saudi Arabian conflict, Saudi Arabian-led intervention in Yemen
  - Saudi Arabia proposes a ceasefire in Yemen to end the conflict against the Houthi
    movement. (Al Jazeera)
  - Insurgency in the Maghreb
  - 2021 Niger attacks
  - The death toll from yesterday's raids in Tahoua, Niger, rises to at least 137.
    A security official blames ISIL for the attacks in a volatile region, which has
    seen an increase in these types of attacks in the past few months. (Reuters) (Al
    Jazeera)
  - 2021 Guangzhou bombing
  - A man detonates a bomb in a government building in Guangzhou, China, killing four
    people and himself, along with injuring five others. (Reuters)
  - Balukhali fire
  - A massive fire at the Balukhali refugee camp in Cox's Bazar, Chittagong, Bangladesh,
    leaves at least 15 people dead, 550 injured, 400 missing, and 45,000 homeless.
    (Reuters)
  - Forty-five people are killed during a stampede at a stadium in Dar es Salaam,
    Tanzania, where hundreds of people were paying their last respects to President
    John Magufuli, who died on 17 March. (Al Jazeera)
  - Two Taiwanese F-5E fighter jets collide with each other during a training exercise,
    with one pilot being declared dead and another missing. (UPI)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - India reports 46,951 new cases and 212 deaths in the past 24 hours, the highest
    daily case total since November and also the highest daily death total since January.
    (The Times of India)
  - COVID-19 pandemic in Jordan
  - Jordan reports a record 109 deaths in the past 24 hours, thereby bringing the
    nationwide death toll to 5,985. (Roya News)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record 8,019 new confirmed cases in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 671,792. (ABS-CBN
    News)
  - COVID-19 pandemic in Taiwan
  - Premier Su Tseng-chang receives a dose of the Oxford-AstraZeneca vaccine as the
    country begins its vaccination campaign. (The Straits Times)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Greece
  - The Ministry of Health orders private sector doctors to assist public hospitals
    as the public health system becomes overwhelmed by an increase in COVID-19 hospitalizations.
    (AP)
  - COVID-19 pandemic in Hungary
  - Hungary grants emergency use approval for the CanSino Biologics Convidecia and
    Indian Covishield COVID-19 vaccines. (Daily News Hungary)
  - COVID-19 pandemic in Switzerland
  - Swissmedic approves the use of the single-dose Johnson & Johnson vaccine. (Swiss
    Info)
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - Clinical trials for the vaccine produced by Oxford and AstraZeneca show that it
    is 79% effective against COVID-19. (The New York Times)
  - China–European Union relations
  - The European Union imposes sanctions against several officials in China for human
    rights abuses in Xinjiang. These sanctions are Europe's first since the 1989 Tiananmen
    Square protests. (Reuters)
  - Myanmar–United States relations
  - The United States imposes sanctions against several military officials in Myanmar
    for its suppression of the protests in response to the coup. (CNN)
  - 2021 Boulder shooting
  - Nine civilians and a police officer are killed during a mass shooting at a King
    Soopers supermarket in Boulder, Colorado, United States. A suspect has been arrested.
    (BBC News)
  - People protest in Bristol, United Kingdom, against the proposed Police, Crime,
    Sentencing and Courts Bill, which would give the police more power to deal with
    protests. (BBC News)
  - 2021 Republic of the Congo presidential election, COVID-19 pandemic in the Republic
    of the Congo
  - Guy Brice Parfait Kolélas, the opposition presidential candidate, dies from COVID-19
    on a plane en route to France for treatment, a day after the election. (Al Jazeera)
