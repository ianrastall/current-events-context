Date: '2021-03-10'
Source_URI: Portal:Current events/2021 March 10
Intelligence_Payload:
  Uncategorized:
  - Australian frontier wars
  - The Victoria State Government announces the establishment of a truth commission
    into genocidal violence against the state's Indigenous population from the late
    18th century to the early 20th century, as part of a process towards developing
    a treaty. (The Guardian)
  - Colombian conflict
  - The armed forces kill twelve people in an operation in the Guaviare Department
    against a group run by a former FARC leader. Defense Minister Diego Molano Aponte
    says that there were child soldiers present at the camp but declines to say if
    they were killed or state their ages. (The New York Times)
  - Economic impact of the COVID-19 pandemic in the United States
  - The United States House of Representatives votes 220–211 to pass the $1.9 trillion
    American Rescue Plan Act of 2021, which extends weekly jobless benefit payments
    of $300 until September, sends $1,400 checks to individuals, and funds other coronavirus
    relief programs for states and businesses. The stimulus bill will be sent to President
    Joe Biden for his signature. (The Wall Street Journal) (BBC News)
  - An overnight fire at an OVHcloud server farm in Strasbourg destroys a data center
    and damages another, taking millions of .fr websites offline in France, including
    government websites, banks, online shops, and news websites. (Reuters)
  - A bus carrying dozens of pilgrims plunges into a ravine in Indonesia's Java island,
    killing at least 27 people. (Arab News)
  - COVID-19 pandemic
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Michigan
  - Michigan surpasses 600,000 confirmed cases of COVID-19. (MLive)
  - COVID-19 pandemic in New Jersey, 501.V2 variant
  - New Jersey reports its first case of the 501.V2 variant first detected in South
    Africa. (NJ)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Saskatchewan
  - Saskatchewan surpasses 30,000 cases of COVID-19, and 400 related deaths. (Global
    News)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Karnataka, 501.V2 variant
  - Karnataka reports its first case of the 501.V2 variant first detected in South
    Africa. (Mint)
  - COVID-19 pandemic in Jordan
  - Jordan approves the emergency use of the Russian Sputnik V vaccine. (Gulf News)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 109 new confirmed cases in the past 24 hours, bringing
    the nationwide total of confirmed cases to 3,481. (Big News Network)
  - COVID-19 pandemic in Pakistan
  - Pakistan begins COVID-19 vaccination rollout for those aged 60 years or older
    as part of the second phase of their vaccination programme. (Al Jazeera)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Kenya
  - Kenya approves the emergency use of the Russian Sputnik V vaccine. (Bloomberg
    News)
  - COVID-19 pandemic in Mauritius
  - Mauritius imposes a two-week nationwide lockdown for the second time since the
    pandemic began, with only essential services able to continue to operate, after
    the discovery of 14 local COVID-19 cases. (Barron's)
  - COVID-19 pandemic in Tanzania
  - The President of Tanzania John Magufuli has not been seen in public since February
    27. Opposition leaders call for the release of information as rumors grow that
    he is on a ventilator at a hospital in Nairobi, Kenya. (Yahoo! News) (Thomson
    Reuters Foundation)
  - COVID-19 pandemic in Togo
  - Togo begins a vaccination campaign against COVID-19 using Oxford–AstraZeneca vaccine.
    Prime Minister Victoire Tomegah Dogbé is the first person to receive the vaccine.
    (Togo First)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Bulgaria
  - Bulgaria reports 3,502 new cases in the past 24 hours, which is the highest single-day
    total since December 11, and brings the nationwide total of confirmed cases to
    266,805. (Novinite)
  - COVID-19 pandemic in Malta
  - The Government of Malta announces that, due to record numbers of new cases, all
    theatres, museums, and gyms will be closed, all organised sports and religious
    activities will be banned, and gatherings will be limited to four people. The
    government also announces that all educational institutions will be closed as
    of March 15 and travel to Gozo will be restricted to residents and essential activities.
    (The Malta Independent)
  - COVID-19 pandemic in Poland
  - Poland reports 17,260 new cases in the past 24 hours, which is the highest single-day
    total since November, and it subsequently brings the nationwide total of confirmed
    cases to 1,828,313. (Anadolu Agency)
  - COVID-19 pandemic in Oceania
  - COVID-19 pandemic in Fiji
  - Fiji begins a vaccination campaign against COVID-19 using the Oxford–AstraZeneca
    vaccine donated by the COVAX initiative. Ten frontline workers are the first to
    receive doses of the vaccine. (Fiji Sun)
  - COVID-19 pandemic in Papua New Guinea
  - The government of Papua New Guinea approves the use of the Oxford–AstraZeneca
    vaccine. Prime Minister James Marape says that vaccination will not be compulsory
    and will initially be directed at health workers, people over 50 years of age
    and people with underlying health conditions. (RNZ)
  - COVID-19 pandemic in Brazil
  - Brazil reports a record 2,286 new deaths from COVID-19 in the past 24 hours as
    intensive care units in 25 of 27 regional capitals reach near-full capacity, thereby
    bringing the nationwide death toll to 270,656. (National Post) (BBC News)
  - Libyan Crisis
  - Libyan peace process
  - At an extraordinary session in Sirte, the Libyan parliament votes 121 to 11 to
    approve a new Government of National Unity led by Prime Minister Abdul Hamid Dbeibeh.
    The new interim unity government will govern Libya until a general election is
    held in December. (Al Jazeera)
  - 2021 Armenian coup d'état attempt
  - The government says a decree by Prime Minister Nikol Pashinyan dismissing the
    Chief of the General Staff Onik Gasparyan is now legally effective despite President
    Armen Sarksyan refusing to sign the decree into force. (Reuters)
  - Ivorian Prime Minister Hamed Bakayoko dies of cancer at a private hospital in
    Freiburg im Breisgau, Germany. (France 24)
