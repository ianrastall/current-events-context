Date: '2021-03-11'
Source_URI: Portal:Current events/2021 March 11
Intelligence_Payload:
  Uncategorized:
  - Israel–Iran proxy conflict
  - U.S. and Arab officials disclose a clandestine Israeli naval operation against
    vessels in the Persian Gulf, Mediterranean Sea and Red Sea carrying Iranian oil
    and weaponry to Syria since 2019. At least twelve Iranian vessels have been bombed
    with limpet mines, according to U.S. officials. (The Wall Street Journal)
  - 2021 Myanmar protests
  - Twelve protesters are killed as security forces open fire on anti-coup protests.
    (CBC News)
  - Militants raid a school in Zamfara, killing a student during an attempted mass
    kidnapping. As the kidnap fails, the attackers fled and started shooting in the
    streets, killing twelve more people. It is the second school attack in Zamfara
    in two weeks. (AllAfrica)
  - Economic impact of the COVID-19 pandemic
  - Economic impact of the COVID-19 pandemic in the United States, American Rescue
    Plan Act of 2021
  - U.S. President Joe Biden signs the $1.9 trillion relief package into law. (CNBC)
  - Economy of Brazil, COVID-19 pandemic in Brazil
  - The National Congress of Brazil approves an $8 billion spending package to help
    deal with the second wave of the pandemic in the country. (Financial Times)
  - 2021 Cairo clothing factory fire
  - At least 20 people are killed and 24 others injured in a fire at a clothing factory
    in Cairo, Egypt. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Italy
  - COVID-19 vaccination in Italy
  - The Italian Medicines Agency bans a batch of Oxford-AstraZeneca vaccines as a
    precautionary measure following the death of three military officers in Sicily
    who had been vaccinated. (Ansamed)
  - COVID-19 pandemic in Belarus, Lineage B.1.1.7
  - Belarus reports its first case of the Lineage B.1.1.7 variant of SARS-CoV-2, which
    originated in the United Kingdom. (Reuters)
  - COVID-19 pandemic in Denmark, COVID-19 pandemic in Norway, COVID-19 pandemic in
    Iceland
  - The Danish Health Authority temporarily suspends the use of the Oxford-AstraZeneca
    vaccine for two weeks as a "precaution" following reports that some vaccinated
    people had experienced blood clots, causing one person to die after receiving
    the vaccine. It has not been determined whether there is a link between the vaccine
    and the clots. Norway and Iceland have also suspended their use of the vaccine.
    (CNBC)
  - COVID-19 pandemic in Hungary
  - Hungary reports a record 8,312 new confirmed cases in the past 24 hours, bringing
    the nationwide total of confirmed cases to 489,172. (Hungary Today)
  - COVID-19 pandemic in Portugal
  - Portuguese Prime Minister Antonio Costa announces that kindergartens, hair salons,
    bookshops, libraries, pre-schools and primary schools will be allowed to reopen
    March 15, as a part of the country's gradual easing of its two-month lockdown.
    (U.S. News & World Report)
  - COVID-19 pandemic in Sweden
  - Victoria, Crown Princess of Sweden and Prince Daniel, Duke of Västergötland, test
    positive for COVID-19. (The Local Sweden)
  - The European Commission grants the approval of single-dose Johnson & Johnson vaccine
    for general use. It comes after the European Medicines Agency recommends the conditional
    marketing authorisation for the vaccine. (The Brussels Times)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Cambodia
  - Cambodia reports its first death from COVID-19. The patient is a 50-year-old man
    from Phnom Penh. (Khmer Times)
  - COVID-19 pandemic in Iran
  - Iran receives a shipment of 150,000 doses of the Indian Covaxin vaccine. (The
    Times of India)
  - COVID-19 pandemic in the State of Palestine
  - The Gaza Strip receives 40,000 doses of the Sputnik V vaccine from the United
    Arab Emirates. (Ynet)
  - COVID-19 pandemic in the Philippines
  - The Metropolitan Manila Development Authority announces a uniform curfew in Metro
    Manila for two weeks beginning on March 15 in order to reduce the spread of COVID-19.
    (Rappler)
  - COVID-19 pandemic in South Korea
  - The Korea Disease Control and Prevention Agency extends the use of the Oxford-AstraZeneca
    vaccine to people aged 65 and older as overseas trials show its effectiveness.
    (The Korea Herald)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Benin
  - Benin receives a shipment of 144,000 doses of the Oxford-AstraZeneca vaccine from
    India through the COVAX vaccine-sharing initiative. (Ecofin Agency)
  - COVID-19 pandemic in Eswatini
  - Eswatini receives a shipment of 20,000 doses of the Oxford-AstraZeneca vaccine
    through the COVAX vaccine-sharing initiative. (Anadolu Agency)
  - COVID-19 pandemic in Rwanda
  - Rwandan President Paul Kagame becomes the first head of state in East Africa to
    receive a dose of the COVID-19 vaccine. (Africanews)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Minnesota, 501.V2 variant
  - Minnesota reports its first case of the 501.V2 variant of SARS-CoV-2, which originated
    in South Africa. The patient is a person from the Twin Cities area who became
    ill on January 24 and tested positive on January 29. (KSTP-TV)
  - COVID-19 pandemic in Washington (state), Lineage P.1
  - Washington (state) reports its first case of the Lineage P.1 variant of SARS-CoV-2,
    which originated in Brazil. The patient is a person from the King County. (AP)
  - COVID-19 pandemic in South Dakota, Lineage B.1.1.7
  - South Dakota reports its first case of the Lineage B.1.1.7 variant of SARS-CoV-2,
    which originated in the United Kingdom. (Rapid City Journal)
  - 2017–18 Spanish constitutional crisis
  - Catalan politician Meritxell Serret surrenders to the Supreme Court after three
    years in self-imposed exile in Belgium following the declaration of independence
    in 2017 and her imputation of a crime of disobedience. (The Washington Post)
  - Andrew Cuomo sexual harassment allegations, New York COVID-19 nursing home scandal
  - The New York State Assembly's judiciary committee is authorized to initiate an
    impeachment investigation into sexual misconduct allegations against Governor
    Andrew Cuomo. Earlier that day, more than 50 state lawmakers had called for Cuomo's
    resignation in the wake of the allegations and his handling of deaths at nursing
    homes due to COVID-19. (CNN)
  - Constitution of Kyrgyzstan
  - The Kyrgyzstan Parliament approves a new referendum on a draft constitution that
    would expand the powers of President Sadyr Japarov and allow him to run for office
    again after his term ends. The referendum will be held on April 11. (Business
    Recorder)
  - China's National People's Congress passes the "decision on improving the electoral
    system of Hong Kong", which will rewrite the election rules in Hong Kong to ensure
    a system of "patriots governing Hong Kong". This is seen by many Western countries
    as further eroding the freedoms of the Hong Kong people. (NPR)
  - Pope Francis appoints Archbishop Leo Boccardi, until now apostolic nuncio in Iran,
    as apostolic nuncio in Japan. (Holy See Press Office)
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in Brazil
  - COVID-19 pandemic in São Paulo (state)
  - Governor of São Paulo João Doria announces the suspension of all professional
    sports from March 15 until March 30 amid a rise of the number of COVID-19 cases.
    (AP)
