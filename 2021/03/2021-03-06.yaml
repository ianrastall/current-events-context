Date: '2021-03-06'
Source_URI: Portal:Current events/2021 March 6
Intelligence_Payload:
  Uncategorized:
  - Yemeni Civil War
  - Ma'rib Campaign
  - Fighting between Houthi forces and pro-government troops in Maʼrib Governorate,
    Yemen, kills 58 and 32, respectively, in the past 24 hours, according to unnamed
    military sources. (The Hindu)
  - Economic impact of the COVID-19 pandemic
  - Economic impact of the COVID-19 pandemic in the United States, American Rescue
    Plan Act of 2021
  - The United States Senate votes 50–49 to pass President Joe Biden's $1.9 trillion
    relief package after 24 hours of debate and vote-a-rama sessions on the bill.
    The amended legislation will head back to the United States House of Representatives
    for a final vote. (CBS News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 vaccination in India
  - Tenzin Gyatso, the 14th Dalai Lama, receives a dose of the COVID-19 vaccine in
    Dharamshala, Himachal Pradesh. (Hindustan Times)
  - COVID-19 pandemic in the Philippines
  - COVID-19 vaccination in the Philippines
  - Moderna signs a supply deal with the government to supply 13 million doses of
    its COVID-19 vaccine from mid-2021. (CNA)
  - COVID-19 pandemic in Brunei
  - The government announces that it will ease their social distancing measures when
    Brunei enters a "New Normal" phase on March 8 as the country has reported no community
    cases in the last 300 days. (The Scoop)
  - COVID-19 pandemic in Saudi Arabia
  - Saudi Arabia confirms that it will ease COVID-19-related restrictions in entertainment
    and events and will reopen cinemas, gyms, and sport centres beginning on March
    7. (Gulf News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in the Republic of Ireland
  - COVID-19 vaccination in the Republic of Ireland
  - Ireland reaches a milestone of 500,000 doses of the COVID-19 vaccine administered.
    (The Irish Post)
  - COVID-19 pandemic in France
  - French authorities extend their weekend lockdown to the northern region of Pas-de-Calais,
    prompting hundreds of thousands of people to stay at home on Saturdays and Sundays
    due to the spread of COVID-19. (RFI)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Malawi
  - Malawi receives its first shipment of 360,000 doses of the Oxford–AstraZeneca
    vaccine through the COVAX vaccine-sharing initiative. (VOA)
  - COVID-19 pandemic in Nigeria
  - President Muhammadu Buhari and Vice President Yemi Osinbajo receive their first
    doses of the COVID-19 vaccine. (BBC News)
  - COVID-19 pandemic in Fiji
  - Fiji receives its first shipment of 12,000 doses of the Oxford–AstraZeneca vaccine
    through the COVAX vaccine-sharing initiative. (FBC News)
  - COVID-19 pandemic in Venezuela
  - President Nicolás Maduro and his wife Cilia Flores receive their first doses of
    the Russian Sputnik V vaccine. (France 24)
  - China confirms an outbreak of the African swine fever in the key pork-producing
    provinces of Hubei and Sichuan. (The Straits Times)
  - Prime Minister Imran Khan wins a vote of confidence in the National Assembly of
    Pakistan amid boycotts from the opposition Pakistan Democratic Movement. (The
    Hindu)
