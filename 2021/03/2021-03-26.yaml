Date: '2021-03-26'
Source_URI: Portal:Current events/2021 March 26
Intelligence_Payload:
  Uncategorized:
  - Tigray War
  - Ethiopian Prime Minister Abiy Ahmed announces that Eritrean troops will withdraw
    from the Tigray Region after pressure mounted on them on accusations of human
    rights violations. The announcement came after a meeting with Eritrean President
    Isaias Afwerki. (DW)
  - War in Donbass
  - Four Ukrainian troops are killed and two others are wounded in a separatist rocket
    attack on a military position in the Donetsk Oblast. It is the worst loss of life
    in a single attack for Ukrainian forces since 2019. (Euronews)
  - Colombian conflict
  - A car bombing in front of the City Hall of the municipality of Corinto, Cauca,
    Colombia, wounds 16 people and is attributed to drug trafficking terrorism. (El
    Periódico)
  - At least four people are killed in Chittagong, Bangladesh, when police open fire
    at protesters during a demonstration against a visit by Indian Prime Minister
    Narendra Modi. (Al Jazeera)
  - Belarus in the Eurovision Song Contest 2021, 2020–2021 Belarusian protests
  - Belarus is disqualified from the Eurovision Song Contest after their entry Galasy
    ZMesta's song "Ya nauchu tebya (I'll Teach You)" was deemed inappropriate by the
    European Broadcasting Union due to its "political subtext". Galasy ZMesta has
    been known for mocking the protests against President Alexander Lukashenko. (BBC
    News)
  - Transport in Romania
  - The Bucharest Metro stops operating as a result of a strike by the trade union
    of the metro. The government and Metrorex condemn the strike as illegal. (Digi
    24)
  - Sohag train collision
  - At least 19 people are killed and 185 others are injured after two trains collide
    in Sohag, Egypt. Passengers triggered the emergency brakes on the first train;
    a second train following on the same track was not stopped. (Al Jazeera)
  - 2021 Suez Canal obstruction
  - The Suez Canal Authority accepts an offer from the United States Navy to deploy
    an assessment team of dredging experts to assist in efforts to remove the stranded
    Ultra Large Container Vessel Ever Given. The Suez Canal has now been blocked for
    four consecutive days. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Maharashtra
  - The Maharashtra state government imposes a night curfew beginning on March 28,
    due to an increase in the number of COVID-19 cases. (India Today)
  - COVID-19 pandemic in Mongolia
  - Mongolia reports a record 437 new confirmed cases of COVID-19 in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 6,332. (AKIPress)
  - COVID-19 pandemic in the Philippines
  - The Philippines reports a record 9,838 new confirmed cases of COVID-19 in the
    past 24 hours, with the country surpassing 100,000 total active cases. This also
    brings the nationwide total of confirmed cases to 702,856. (Rappler)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Cyprus
  - The government's spokesman Kyriacos Koushos tests positive for COVID-19. (Cyprus-Mail)
  - COVID-19 pandemic in Hungary
  - Hungary reports a record 11,265 new confirmed cases of COVID-19 in the past 24
    hours, thereby bringing the nationwide total of confirmed cases to 614,612. (Budapest
    Business Journal)
  - COVID-19 pandemic in the Republic of Ireland
  - Ireland introduces a mandatory hotel quarantine for travellers from 33 high-risk
    countries, mostly in South America and Africa. Travellers from these countries
    will be required to quarantine for 14 days at a government-designated facility.
    (The Irish Times)
  - COVID-19 pandemic in Poland
  - Poland reports a record for the third consecutive day of 35,143 new confirmed
    cases of COVID-19, thereby bringing the nationwide total of confirmed cases to
    2,189,966. (Polskie Radio)
  - COVID-19 pandemic in Ukraine
  - Ukraine reports a record 18,132 new confirmed cases of COVID-19 in the past 24
    hours, thereby bringing the nationwide total of confirmed cases to 1,614,707.
    (Kyiv Post)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Kenya
  - President Uhuru Kenyatta announces a lockdown and curfew from 8:00 p.m. to 4:00
    a.m. local time in Nairobi, Kiambu, Machakos, Kajiado and Nakuru counties beginning
    tomorrow due to an increase in the number of COVID-19 cases. (RFI)
  - COVID-19 pandemic in Mauritania
  - Mauritania begins a vaccination campaign against COVID-19 after receiving 500,000
    doses of the Sinovac CoronaVac vaccine from China. (Anadolu Agency)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Brazil
  - Brazil reports a record 3,650 deaths from COVID-19 in the past 24 hours. (The
    Rio Times)
  - COVID-19 pandemic in Colombia
  - The Colombian National Institute for Drug and Food Surveillance grants emergency
    use authorization for the single-dose Johnson & Johnson vaccine. (El Periódico)
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - COVID-19 pandemic in New Mexico
  - New Mexico Governor Michelle Lujan Grisham receives her first dose of the Pfizer-BioNTech
    vaccine. (San Francisco Chronicle)
  - The Biden administration announces that the United States is expected to receive
    11 million doses of the vaccine produced by Johnson & Johnson. (Reuters)
  - COVID-19 pandemic in Wisconsin
  - Wisconsin confirms their first cases of the Lineage P.1 and 501.V2 variant of
    SARS-CoV-2. (WBAY-TV) (Madison.com)
  - COVID-19 pandemic in Arizona, 501.V2 variant
  - Arizona reports its first case of the 501.V2 variant, which was originally detected
    in South Africa. (The Arizona Republic)
  - COVID-19 pandemic in Maine, Lineage P.1
  - Maine reports its first case of the Lineage P.1 variant, which was originally
    detected in Brazil. (Central Maine)
  - Cross-Strait relations
  - Taiwan reports the largest ever incursion into its air defence identification
    zone by People's Liberation Army Air Force warplanes. The fleet of Chinese aircraft,
    including Xian H-6 strategic bombers and Shenyang J-16 fighter jets, flew south
    of the island over the Bashi Channel, according to a statement from Taiwan's Defence
    Ministry. (Reuters)
  - Ivorian President Alassane Ouattara names Patrick Achi as Prime Minister following
    the death of Hamed Bakayoko. (Al Jazeera)
