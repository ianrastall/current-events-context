Date: '2021-03-14'
Source_URI: Portal:Current events/2021 March 14
Intelligence_Payload:
  Uncategorized:
  - 2021 Myanmar protests
  - Security forces kill at least 54 anti-coup protesters in several cities, thirty-seven
    of whom were in Yangon. A policeman is also killed. It is the protests' deadliest
    day. The civilian Vice President, Mahn Win Khaing Than, says that they will pass
    legislation to "give people the right to defend themselves against the military"
    and calls for a "revolution" to overthrow the junta. Meanwhile, a junta spokesman
    labels the protesters as "criminals" but refuses to elaborate. (BBC News)
  - People armed with axes and crowbars attack and set ablaze ten Chinese factories
    and a hotel in Yangon, resulting in injuries to several Chinese nationals. Some
    protesters have accused the Chinese government of supporting the Burmese military.
    (BBC News)
  - 63rd Annual Grammy Awards
  - The 63rd Grammy Awards is held in Los Angeles. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France
  - Labour minister Élisabeth Borne tests positive for COVID-19. (Le Point)
  - COVID-19 pandemic in the Republic of Ireland
  - The Government of Ireland temporarily suspends the use of the Oxford–AstraZeneca
    vaccine following reports from the Norwegian Medicines Agency regarding serious
    blood clots developing in four people who received the vaccine, one of whom later
    died. (Irish Examiner)
  - COVID-19 pandemic in Italy
  - COVID-19 vaccination in Italy
  - Piedmont temporarily suspends the use of the Oxford–AstraZeneca vaccine after
    a teacher in the town of Biella reportedly died after receiving the vaccine. (Euro
    Weekly News)
  - COVID-19 pandemic in the Netherlands
  - The Netherlands suspends the use of the Oxford–AstraZeneca vaccine until March
    29 following reports of Denmark and Norway regarding possible serious side effects.
    (RTÉ)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Alberta, Lineage P.1
  - Alberta reports its first case of the Lineage P.1 variant, which was originally
    detected in Brazil. (Edmonton Journal)
  - COVID-19 pandemic in Bahrain
  - Bahrain eases some of its COVID-19-related restrictions, allowing restaurants,
    cafés, swimming pools, and sport facilities to reopen, but restricts gatherings
    to no more than 30 people. (Gulf Today)
  - COVID-19 vaccine
  - AstraZeneca provides an update that from more than 17 million people given a vaccination
    dose in the UK and EU, there is no evidence of an increased risk of pulmonary
    embolism, deep vein thrombosis, or thrombocytopenia, in any defined age group,
    gender, batch, or in any particular country. (The Guardian)
