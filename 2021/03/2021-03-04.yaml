Date: '2021-03-04'
Source_URI: Portal:Current events/2021 March 4
Intelligence_Payload:
  Uncategorized:
  - Tigray War
  - The United Nations calls on Ethiopia to grant them access to the Tigray region
    to investigate reports of mass murders and sexual violence that may amount to
    war crimes. (Al Jazeera)
  - Archbishop Cesare Nosiglia of Turin, Italy announces that for the second time,
    the Shroud of Turin will be exposed for veneration on social media and websites
    on Holy Saturday, April 3. (Catholic News Agency)
  - 2021 TAF AS532 crash
  - An army helicopter crashes in Bitlis, Turkey, killing 11 military personnel and
    injuring two others. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - The Robert Koch Institute's Standing Committee on Vaccination officially approves
    the use of the Oxford–AstraZeneca vaccine for people aged over 65. (BBC News)
  - COVID-19 pandemic in Hungary
  - The government orders all schools and non-essential shops in Hungary to close
    from March 8 until March 22 (for non-essential shops) and April 7 (for schools)
    due to a third wave of COVID-19 infections. (Swiss Info)
  - COVID-19 pandemic in Malta
  - Prime Minister Robert Abela announces that the government will limit indoor gatherings
    to four households and will ban mass gatherings other than weddings and religious
    activities beginning tomorrow due to a record increase in the number of COVID-19
    cases. The government will also restrict the operation of restaurants and snack
    bars to only offer takeaway services. (Times of Malta)
  - COVID-19 pandemic in Ukraine, Lineage B.1.1.7
  - Ukraine reports its first cases of the Lineage B.1.1.7 variant first detected
    in the United Kingdom in two people from Ivano-Frankivsk. (UNIAN)
  - European Commission–AstraZeneca COVID-19 vaccine dispute, COVID-19 pandemic in
    Italy
  - Italy invokes the European Union powers to block shipment of 250,700 doses of
    the Oxford–AstraZeneca vaccine to Australia amid escalations between the bloc
    and AstraZeneca. The European Commission endorses the move. (CNN)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Cambodia
  - Prime Minister Hun Sen receives a dose of the Oxford–AstraZeneca vaccine supplied
    by the COVAX initiative. (The Washington Post)
  - COVID-19 pandemic in Kuwait
  - Kuwait's Cabinet decides to impose a curfew from 5:00 p.m. to 5:00 a.m. local
    time for the next month but will allow salons, gyms, and other commercial activities
    to reopen on March 7 subject to operating restrictions. (Gulf News)
  - COVID-19 pandemic in the Philippines, COVID-19 vaccination in the Philippines
  - The Philippines receives its first shipment of 487,200 doses of the Oxford–AstraZeneca
    vaccine supplied by the COVAX initiative. (Reuters)
  - COVID-19 pandemic in Sri Lanka
  - Sri Lanka's National Medicines Regulatory Authority approves the use of Russia's
    Sputnik V vaccine, becoming the second vaccine to be made available for the general
    public. (The Hindu)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Lesotho
  - Lesotho receives its first shipment of 36,000 doses of the Oxford-AstraZeneca
    vaccine manufactured by the Serum Institute of India through the COVAX vaccine-sharing
    initiative. (SowetanLIVE)
  - COVID-19 pandemic in Zimbabwe
  - Zimbabwe becomes the first country in Africa to approve India's Covaxin vaccine
    manufactured by Bharat Biotech. (Hindustan Times)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - Nine great apes in San Diego Zoo becomes the first non-human primates to receive
    an experimental COVID-19 vaccine. (The Los Angeles Times)
  - COVID-19 pandemic in Maine, 501.V2 variant
  - Maine reports its first case of the 501.V2 variant that originated in South Africa.
    (WCSH-TV)
  - COVID-19 pandemic in Brazil
  - Brazil reports a record 1,910 deaths from COVID-19 in the last 24 hours, bringing
    the national death toll to 259,271. (Business Standard)
  - Aftermath of the 2021 storming of the United States Capitol
  - The United States Capitol Police requests that the National Guard remain at the
    Capitol for 60 days in response to a possible second attack on the building. (ABC
    News)
  - Police in Bignona, Senegal, open fire against a group of people demonstrating
    against the arrest of opposition leader Ousmane Sonko, killing a protester. (Al
    Jazeera)
  - Twenty people are killed and others are feared dead after smugglers intentionally
    throw 80 migrants overboard during a voyage from Djibouti to Yemen. (Al Jazeera)
  - The Troubles, Brexit and the Irish border
  - The Loyalist Communities Council and other loyalist groups in Northern Ireland
    inform Prime Minister Boris Johnson that they are withdrawing support for the
    Good Friday Agreement in opposition to the Northern Ireland Protocol. (DW)
  - The Indian government's Income Tax Department raids the residences of the founders
    of Phantom Films due to allegations of tax evasion. Those being interrogated include
    Anurag Kashyap, Taapsee Pannu, Vikas Bahl, Vikramaditya Motwane, and Madhu Mantena.
    The incident prompts the Maha Vikas Aghadi alliance and Rahul Gandhi to support
    the film stars who are being interrogated, saying the Bharatiya Janata Party is
    using all the arms of the government to stifle the voices of those who support
    the Indian farmers' protest. (NDTV) (NDTV2)
  - Italian Democratic Party secretary Nicola Zingaretti resigns, citing infighting
    over government posts. (Reuters)
  - The North Dakota House of Representatives votes to expel State Representative
    Luke Simons (R) following allegations that he threatened and sexually harassed
    women going back to 2017, when he first took office. This is the first time that
    either chamber of the North Dakota Legislative Assembly has passed such a vote.
    (AP)
  - Impact of the COVID-19 pandemic on sports, COVID-19 pandemic in Pakistan, 2021
    Pakistan Super League
  - Pakistan suspends its Twenty20 cricket competition in the Pakistan Super League
    after seven players tested positive for COVID-19. (RFI)
