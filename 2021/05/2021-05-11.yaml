Date: '2021-05-11'
Source_URI: Portal:Current events/2021 May 11
Intelligence_Payload:
  Uncategorized:
  - 2021 Israel–Palestine crisis
  - Israel launches another series of strikes in the Gaza Strip, killing eight people
    and wounding several others, thereby bringing the total death toll from the strikes
    to 32. The Hanadi Tower is also destroyed during the incident. Hamas responds
    to the attacks by launching rockets towards Israel, including several towards
    Tel Aviv, killing three people. (Reuters)
  - An Israeli-Arab man is killed and two more are wounded after a Jewish gunman opens
    fire against a group of protestors in Lod. (The Jerusalem Post)
  - Palestinian actress Maisa Abd Elhadi is injured after being shot by Israel Police
    in Haifa. (The Independent)
  - Protests break out in London, New York City, and other cities across the world
    expressing solidarity with Palestine. In Manhattan, pro-Palestinian protesters
    gather at the Israeli consulate on East 42nd Street. Additionally, U.S. Reps Rashida
    Tlaib and André Carson participate in a protest at the State Department in Washington,
    D.C. (Arab News) (Gothamist) (Newsweek)
  - Four Christian farmers are killed by East Indonesia Mujahideen militants during
    an attack at a coffee plantation in Central Sulawesi, Indonesia. (UCA News)
  - Armed miners on seven boats attack the indigenous Yanomami community in the Brazilian
    Amazon rainforest, opening fire against them and wounding one person. The Yanomami
    respond to the fire, killing three miners and wounding four others. (BBC News)
  - Pope Francis formally institutes the office of catechist as a ministry within
    the Church. With an apostolic letter entitled Antiquum Ministerium, released on
    May 11, the Pope establishes the lay ministry, and announces that the Vatican
    would soon publish a ritual for the commissioning of catechists. (Catholic World
    News) (Holy See Press Office)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Nepal
  - Nepal reports a record 9,317 new cases and 225 deaths from COVID-19 in the past
    24 hours, thereby bringing the total of confirmed cases to 413,111 and the nationwide
    death toll to 4,084. (Kathmandu Post)
  - COVID-19 pandemic in the Philippines, Lineage B.1.617
  - The Philippines reports its first cases of the Lineage B.1.617 variant first detected
    in India in two Filipino seafarers who travelled to Oman and the United Arab Emirates.
    (CNA)
  - COVID-19 pandemic in Taiwan
  - The Taiwanese government prohibits outdoor gatherings of more than 500 people
    and indoor gatherings of more than 100 people, as well as banning all food and
    drink in trains until June 8, after reporting six new domestic COVID-19 cases
    with no clear source of infection. (Reuters)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Slovakia
  - Slovakia suspends the use of the Oxford–AstraZeneca vaccine for people that received
    the first dose after the State Institute for Drug Control ruled that the death
    of a 47-year-old woman was likely connected to the jab. (Euronews)
  - COVID-19 pandemic in Spain
  - Spain approves the use of the Johnson & Johnson vaccine for people under the age
    of 60 years. (El Pais)
  - COVID-19 pandemic in Brazil
  - The Brazilian federal government suspends the nationwide vaccination of pregnant
    women using Oxford-AstraZeneca vaccine after the death of an expectant mother
    in Rio de Janeiro from a stroke possibly related to the vaccination. (SABC News)
  - Philippine President Rodrigo Duterte signs Presidential Proclamation No. 1143,
    declaring a state of calamity for one year due to the African swine fever, two
    years after the disease was reported in the country. (Rappler)
  - Kenya–Somalia relations
  - The Kenya Civil Aviation Authority suspends all commercial flights to Somalia
    for three months, days after both countries announced the restoration of diplomatic
    relations. No reason is given for the suspension. (Al Jazeera)
  - Kazan school shooting
  - Seven students and two teachers are killed and 21 others are wounded in a mass
    shooting at a school in Kazan, Tatarstan, Russia. The attacker has been arrested.
    (Al Jazeera)
  - Colonial Pipeline cyberattack
  - Some gas stations in the U.S. states of Alabama, Florida, and North Carolina begin
    to run out of fuel as the Colonial Pipeline shutdown enters its fourth day after
    a cyberattack on May 7. (Bloomberg)
  - 1Malaysia Development Berhad scandal
  - Malaysian state fund 1Malaysia Development Berhad sues units of Deutsche Bank,
    JPMorgan Chase, and Coutts for a combined amount of US$2.9 billion on the basis
    of negligence and conspiracy to defraud. The lawsuit is a bid to recover lost
    assets of more than $23 billion. (RFI)
  - The Troubles
  - According to a coroner's inquest report, ten people shot dead in the 1971 Ballymurphy
    massacre in Belfast were innocent civilians and their killings were unjustified.
    Nine of the people had been shot by the British Armed Forces. (The Guardian)
  - 2020–21 Premier League
  - Manchester City win the Premier League for the fifth time after rivals Manchester
    United were defeated 2–1 by Leicester City. (The Guardian)
  - 2020–21 Primeira Liga
  - Sporting CP win the Primeira Liga, the top tier of the Portuguese football league
    system, for the first time since the 2001–02 season. They become the first team
    other than Porto or Benfica to win the title in 19 years. (The Washington Post)
