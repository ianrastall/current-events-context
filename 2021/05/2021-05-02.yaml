Date: '2021-05-02'
Source_URI: Portal:Current events/2021 May 2
Intelligence_Payload:
  Uncategorized:
  - 2021 Kyrgyzstan–Tajikistan conflict
  - The death toll from the conflict increases to 46, with hundreds of people injured
    and more than 100 buildings destroyed. (BBC News)
  - Over 30,000 Kyrgyz civilians are evacuated from the Batken Region near the border
    with Tajikistan. (Trend News Agency)
  - The Kyrgyzstan Interior Ministry and Tajikistan both report that the situation
    at the border is stable and calm. Both countries also agree to withdraw troops
    from the border. However, an unexploded air missile is discovered at a house in
    Batken, Kyrgyzstan, near the border. (Rferl.org) (Prensa Latina) (Kabar)
  - A 40-foot (12 m) trawler smuggling migrants capsized in San Diego Bay, Mexico,
    washed ashore and broke up on rocks. Three people are found to have died, and
    one person later died in the hospital. Around 25 people are rescued and hospitalized,
    including 1 in critical condition. The captain was detained. (CNN)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Afghanistan
  - Afghanistan reports 166 cases of COVID-19 in the past 24 hours, thereby bringing
    the total number of cases to 60,288. (TOLOnews)
  - COVID-19 pandemic in Cambodia
  - Cambodia reports a record 730 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 14,520. (Euronews)
  - COVID-19 pandemic in India
  - India reports a record 3,689 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 215,542. (The Times of India)
  - COVID-19 pandemic in Malaysia, Lineage B.1.617
  - Malaysia reports its first case of the Lineage B.1.617 variant when the authorities
    screen an Indian national at Kuala Lumpur International Airport. (Malay Mail)
  - COVID-19 pandemic in the United Arab Emirates
  - Abu Dhabi updates its travel procedures for residents and visitors who are fully
    vaccinated. (Gulf Today)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Mexico, Lineage B.1.617
  - Mexico reports its first case of the Lineage B.1.617 variant first discovered
    in India in the state of San Luis Potosí. (The Yucatan Times)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Argentina
  - Argentina surpasses three million cases of COVID-19. (Clarín)
  - Iran–United States relations, Iran–United Kingdom relations
  - Iranian state media report a deal to release $7 billion of frozen Iranian funds
    has been reached between Iran, the United States, and the United Kingdom for the
    release of prisoners with Western-links, including Nazanin Zaghari-Ratcliffe,
    in which the British government has agreed to pay a £400 million debt for her
    release. (Sky News)
  - The United States denies the claim that it had agreed to exchange either prisoners
    or money with Iran. The United Kingdom likewise denies that any definitive decision
    has been made in the case of Zaghari-Ratcliffe's repatriation. (AP)
  - 2021 Kyrgyzstan–Tajikistan conflict
  - The Kyrgyzstan Interior Ministry launches 11 criminal probe investigations into
    the events on the border with Tajikistan. (AKIpress)
  - Israeli–Palestinian conflict
  - The Jerusalem District Court orders at least six families residing in the Sheikh
    Jarrah neighborhood in East Jerusalem to vacate their homes, following decades
    of litigation by Jewish settler organizations claiming they are the rightful owners
    of the property. Hamas condemns this ruling as "dangerous, racist behavior", threatening
    retaliation. (Al Jazeera) (Jerusalem Post)
  - Terrorism in Canada
  - The Proud Boys announces that they have dissolved in Canada after being labeled
    as a terrorist organization by the country earlier this year. (CTV News)
  - Syrian President Bashar al-Assad signs a decree that grants amnesty and reduces
    sentences for prisoners ahead of an election on May 26. (Middle East Eye)
  - Istanbul police announce that, on Wednesday, they arrested an Afghan man who served
    as a close aide to former ISIL leader Abu Bakr al-Baghdadi and who had helped
    him hide in Syria's Idlib Governorate after the group lost its territory in 2019.
    The man lived in the Ataşehir district on the Asian side of the city. (Al Jazeera)
  - 2020–21 Serie A
  - Inter Milan wins Serie A, the highest tier in the Italian football league system,
    for the first time since the 2009–10 season, ending Juventus's run of nine consecutive
    titles. (CNN)
  - 2020–21 Premier League
  - A protest of over 200 fans causes the postponement of the Manchester United F.C.
    v. Liverpool F.C. Premier League football game. (The Guardian)
