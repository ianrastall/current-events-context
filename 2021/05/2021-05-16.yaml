Date: '2021-05-16'
Source_URI: Portal:Current events/2021 May 16
Intelligence_Payload:
  Uncategorized:
  - 2021 Israel–Palestine crisis
  - Israel continues airstrikes in the Gaza Strip, killing several more people, including
    42 in Gaza City, which is the deadliest single attack in the past week. The total
    death toll there rises to 192 people, including 58 children and 34 women. (Al
    Jazeera)
  - Hamas fires over 190 rockets at towns and cities in southern Israel, damaging
    numerous buildings, including a synagogue. Approximately 3,000 rockets have been
    fired in the past week. (Times of Israel)
  - The Israeli Air Force destroys the office and home of Yahya Sinwar, the most senior
    Hamas official in Gaza. (Al Jazeera)
  - Afghan peace process
  - After discussions in Qatar and Pakistan, Taliban representatives have reportedly
    agreed to substantive talks with the Afghan Republic team in Doha, and to attend
    a summit in Istanbul that they initially refused to attend. (TOLO News)
  - Miss Universe 2020
  - In Hollywood, Florida, United States, Andrea Meza of Mexico is crowned Miss Universe.
    (GMA News Online)
  - Two people are killed and at least 100 others are injured when a tiered seating
    structure collapses at a partly-built synagogue in Giv'at Ze'ev, in the West Bank.
    (BBC News)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Indonesia, COVID-19 vaccination in Indonesia
  - The Ministry of Health suspends the distribution of around 450,000 doses of the
    Oxford–AstraZeneca vaccine from batch CTMAV547 for toxicity and sterility tests
    following the death of a 22-year-old man who received the vaccine 11 days ago.
    (Jakarta Globe)
  - COVID-19 pandemic in Singapore, Impact of the COVID-19 pandemic on education
  - The Singaporean Ministry of Education announces that they will close all schools
    and shift all primary, secondary, and junior college students to full home-based
    learning beginning May 19 due to an increase in the number of COVID-19 cases in
    the community. (The Straits Times)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record 207 new cases of COVID-19 in the past 24 hours, 206 of
    which are locally transmitted cases. This subsequently brings the nationwide total
    of confirmed cases to 1,682. (The Guardian)
  - COVID-19 pandemic in Thailand
  - Thailand surpasses 100,000 cases of COVID-19. (Thai PBS World)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in Maine, Lineage B.1.617
  - Maine reports its first case of the Lineage B.1.617 variant that originated in
    India. (Bangor Daily News)
  - COVID-19 pandemic in Algeria, Travel restrictions related to the COVID-19 pandemic
  - Algeria announces that it will reopen air and land borders on June 1, but only
    five flights a day from and to Algerian airports will be allowed as precautions
    to prevent the spread of COVID-19. (Reuters)
  - COVID-19 pandemic in the United Kingdom, COVID-19 vaccination in the United Kingdom
  - The number of people who have been fully vaccinated against COVID-19 in the United
    Kingdom surpasses 20 million. (Sky News)
  - Holy See–Myanmar relations
  - Pope Francis condemns the violence and repression in Myanmar and again condemns
    the coup that ousted Aung San Suu Kyi on February 1. He tells protesters to not
    despair "in the face of evil or allow themselves to be divided". (Reuters)
  - International protests over the 2021 Israel–Palestine crisis
  - A convoy covered with Palestinian flags drives through North London shouting antisemitic
    language. Four people are arrested on suspicion of racially aggravated public
    order offenses. (The Jewish Chronicle) (Times of Israel)
  - In Berlin, violent confrontations break out during a protest against Israeli airstrikes
    in the Gaza Strip, with an Israeli TV reporter being attacked. (Euronews)
  - Montreal Police deploy tear gas to disperse a protest in downtown Montreal, which
    saw pro-Israeli protesters clash with pro-Palestinian protesters. (CBC)
  - 2021 Chilean Constitutional Convention election
  - Chileans are summoned to a second consecutive day of voting to elect the 155 members
    of the Constitutional Convention to change its Pinochet-era constitution. The
    results show a majority victory for the center-left, with a very important role
    for independent candidates. (El País)
  - 2020–21 UEFA Women's Champions League
  - Barcelona wins the team's first Champions League after beating Chelsea in the
    final match at Gamla Ullevi in Gothenburg, Sweden. (BBC Sport)
