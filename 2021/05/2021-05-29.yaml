Date: '2021-05-29'
Source_URI: Portal:Current events/2021 May 29
Intelligence_Payload:
  Uncategorized:
  - UK Prime Minister Boris Johnson marries political activist Carrie Symonds in a
    private ceremony at Westminster Cathedral. Approximately 30 people were in attendance.
    (BBC News)
  - The number of people found dead following a boat accident in Kebbi State, Nigeria,
    three days ago, increases to 76. Many more people are still missing. (The Premium
    Times)
  - Seven people, including actor Joe Lara and his wife Gwen Shamblin Lara, are killed
    in a plane crash in Smyrna, Tennessee. (Chicago Tribune)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Malaysia
  - Malaysia reports a record for the fifth consecutive day of 9,020 new cases of
    COVID-19, thereby bringing the nationwide total of confirmed cases to 558,534.
    The country also reports a record 98 deaths in the past 24 hours, thereby bringing
    the nationwide death toll to 2,650. (The Vibes) (The Straits Times)
  - COVID-19 pandemic in Taiwan
  - Taiwan reports a record 21 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 99. (Taiwan News)
  - COVID-19 pandemic in Vietnam
  - Vietnam discovers a new variant of SARS-CoV-2 that combines the mutations from
    Lineage B.1.617 and Lineage B.1.1.7. (The Independent)
  - COVID-19 pandemic in the United Kingdom, COVID-19 vaccination in the United Kingdom
  - Catherine, Duchess of Cambridge receives her first dose of the COVID-19 vaccine.
    (Sky News)
  - COVID-19 pandemic in the United States
  - The United States reports nearly 11,976 new cases of COVID-19, the lowest in the
    country since March 23, 2020. (CNBC)
  - China–Philippines relations, Spratly Islands dispute
  - The Philippine Department of Foreign Affairs files a diplomatic complaint against
    China for the continued presence of Chinese maritime and fishing vessels near
    Thitu Island, making this the 84th diplomatic complaint the Philippines has filed
    against China since the start of Philippine President Rodrigo Duterte's administration
    in 2016. (Al Jazeera)
  - A car explodes outside an apartment block in Arad, Romania. The driver, Ioan Crișan,
    a well-known fish farmer and businessman, was killed, and several windows were
    shattered. The authorities suspect foul play. (G4 Media)
  - A major Austrian Muslim organization files a lawsuit against the government for
    publishing a map on Thursday listing the location of the country's mosques and
    Islamic associations, saying it "represents an unprecedented crossing of boundaries".
    The Islamic Religious Community in Austria, the Turkish Foreign Ministry, and
    members of the ruling Green Party have also criticized the map's publication.
    (DW)
  - International protests over the 2021 Israel–Palestine crisis
  - In the United Kingdom, protesters gather in Birmingham and Manchester to show
    solidarity with Palestine. In Manchester, protesters gather at the BBC building
    in MediaCityUK, while protesters burn Israeli flags in Birmingham. (Manchester
    Evening News) (Birmingham Mail)
  - In Washington, D.C. protesters gather at the Lincoln Memorial to call for an end
    to aid from the United States to Israel. (Times of Israel)
  - 2021 Brazilian protests
  - Brazilian social movements organize demonstrations in Brazil's major cities against
    the government of President Jair Bolsonaro. Protestors demand Bolsonaro's impeachment
    over the perceived mishandling of the COVID-19 pandemic by the government, with
    calls for faster and wider vaccination campaigns. (The Guardian)
  - A team at Cardiff University has created the first 3D replica of a spin-ice material
    that allows for the generation of magnetic monopoles-like quasi-particles. Magnetic
    force microscopy was then used to visualize the magnetic charges present on the
    device, allowing the team to track the movement of the single-pole magnets across
    the 3D structure. (Phys.org)
  - 2021 English Football League play-offs
  - Brentford F.C. defeat Swansea City A.F.C. 2–0 in the 2021 EFL Championship play-off
    Final at Wembley Stadium, securing promotion to the 2021–22 Premier League after
    a 74-year absence from the top flight of English football. (BBC Sport)
  - 2020–21 UEFA Champions League
  - In association football, Chelsea defeat Manchester City 1–0 in the final at the
    Estádio do Dragão in Porto, Portugal, to win their second Champions League title.
    (CBS Sports)
