Date: '2021-05-30'
Source_URI: Portal:Current events/2021 May 30
Intelligence_Payload:
  Uncategorized:
  - Boko Haram insurgency
  - 2021 Niger attacks
  - Boko Haram jihadists raid the town of Diffa, killing four civilians and four soldiers.
    Six attackers are killed by responding security forces. (Reuters)
  - Stresa–Mottarone cable car crash
  - Three people arrested for the cable car crash that killed 14 people in Mottarone,
    Piedmont, Italy, are released by a court order. A technician who worked on the
    Stresa–Alpino–Mottarone Cable Car line which operated the cable car remains under
    house arrest and has been named the party responsible for the accident. (Euronews)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Afghanistan
  - Afghanistan reports a record of 929 new cases of COVID-19 in the past 24 hours,
    thereby bringing the nationwide total of confirmed cases to 71,690. (Big News
    Network)
  - COVID-19 pandemic in Malaysia, Malaysian movement control order
  - The Malaysian government announces that all malls will have to close on total
    lockdown from June 1 to 14, while 17 essential service will be allowed to operate.
    The government also allow companies under 12 manufacturing sector to be continue
    operating with 60% capacity. (CNA)
  - COVID-19 pandemic in Taiwan
  - The government signs a deal with Medigen Vaccine Biologics Corp and United Biomedical
    Inc to provide up to 20 million doses of their COVID-19 vaccines in Taiwan. (Reuters)
  - COVID-19 pandemic in Thailand
  - Thailand surpasses 1,000 deaths from COVID-19. (Bangkok Post)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in Kenya
  - Kenya extends its nightly curfew and ban on political gatherings and processions
    that could turn into superspreader events for 60 days as part of an attempt to
    reduce the spread of COVID-19. (News24)
  - COVID-19 pandemic in South Africa
  - South African President Cyril Ramaphosa announces that the COVID-19 restrictions
    will be strengthened, which will include a nightly curfew from 11:00 p.m. to 4:00
    a.m., a ban on gatherings of more than 100 people indoors and 250 people outdoors,
    and a requirement for all non-essential establishments to close at 10:00 p.m.
    as the country moves to the adjusted level 2 beginning tomorrow amid a third wave
    of COVID-19. (BusinessTech)
  - COVID-19 pandemic in Spain
  - King Felipe VI receives his first dose of the COVID-19 vaccine. (Royal Central)
  - 2021 Malian coup d'état
  - The leaders of the Economic Community of West African States decide to suspend
    Mali's membership in the organization until the end of February 2022 or when the
    country appoints a civilian prime minister. (TRT World)
  - 2021 Hialeah shooting
  - Two people are killed and 20 more are wounded in a mass shooting at a hall near
    Hialeah, Florida, United States. The three perpetrators remain at large. (CNN
    International)
  - Sri Lanka's Marine Environment Protection Authority announces that it will take
    legal action against the owners of the Singaporean container ship X-Press Pearl
    for the marine pollution caused by the ship's fire off the coast of Colombo on
    May 20. The authority reports that plastic granules from spilled cargo had been
    washing up on the Sri Lankan coast since May 27. (Dawn)
  - 2020–2021 United States racial unrest
  - Hundreds of Black gun owners from around the US marched in Tulsa, Oklahoma to
    remember those murdered in the Tulsa race massacre on the eve of its 100th anniversary.
    The Elmer Geronimo Pratt Gun Club of Austin, Texas and New Black Panther Party
    organized the event. Slogans of "Black Power" and "Black Lives Matter" were heard
    during the rally. (KJRH-TV)
  - 2021 Cypriot legislative election
  - Greek Cypriots head to the polls to elect a new session to the House of Representatives.
    Analysts predict a fragmented parliament, as issues of corruption spurred by a
    scandal involving the country's "citizenship through investment" program last
    year, and the lack of progress on the Cyprus dispute, has reduced support for
    the three main parties. (Deutsche Welle)
  - 2019–2021 Israeli political crisis
  - Yamina leader Naftali Bennett announces that he and Yesh Atid leader Yair Lapid
    have formed a coalition government to oust Prime Minister Benjamin Netanyahu.
    In response, Netanyahu accuses Bennett of committing the "fraud of the century".
    (The Times of Israel) (Haaretz)
  - Impact of the COVID-19 pandemic on association football
  - 2021 Copa América, COVID-19 pandemic in Argentina
  - CONMEBOL announces that Argentina will no longer host the Copa América tournament,
    two weeks before its commencement, due to the worsening of the COVID-19 pandemic
    in the country. (The Seattle Times)
  - 2020–21 Liga MX season
  - Cruz Azul defeat Santos Laguna in the final of the Guardianes 2021 championship,
    ending the second-longest championship drought in the top flight of Mexican soccer.
    Cruz Azul's drought lasted for 23 years and 6 months, while the current longest
    drought belonging to Atlas F.C. has been ongoing for 66 years. (Diario AS)
  - 2021 Italian motorcycle Grand Prix
  - Swiss professional motorcycle racer Jason Dupasquier dies following a collision
    with Ayumu Sasaki at a qualifying race for the 2021 Italian motorcycle Grand Prix
    in Scarperia e San Piero, Tuscany, Italy. (Sky News)
  - 2021 Giro d'Italia
  - Colombian cyclist Egan Bernal retains both the General Classification and the
    Young Rider Classification in the 2021 edition of the Giro d'Italia. (BBC Sport)
  - 2021 IndyCar Series, 2021 Indianapolis 500
  - Hélio Castroneves wins the 105th running of the Indianapolis 500. It is Castroneves'
    fourth victory in the race, becoming only the fourth driver to accomplish this
    feat. (CNN)
