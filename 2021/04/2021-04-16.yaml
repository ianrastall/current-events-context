Date: '2021-04-16'
Source_URI: Portal:Current events/2021 April 16
Intelligence_Payload:
  Uncategorized:
  - Impact of the COVID-19 pandemic on the arts and cultural heritage, COVID-19 pandemic
    in India
  - The Archaeological Survey of India closes all monuments, museums, and protected
    sites until May 15 due to an increase in the number of COVID-19 cases. (The Times
    of India)
  - The Turkish Central Bank bans transactions using cryptocurrencies and crypto assets,
    citing possible "irreparable damage" and transaction risks to customers. (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Germany
  - Chancellor Angela Merkel receives her first dose of the Oxford–AstraZeneca vaccine.
    (DW)
  - COVID-19 pandemic in Russia
  - COVID-19 vaccination in Russia
  - The number of Russians vaccinated against COVID-19 surpasses eight million. (Interfax)
  - COVID-19 pandemic in Turkey
  - Turkey reports a record 63,082 new cases of COVID-19 in the past 24 hours, thereby
    bringing the nationwide total of confirmed cases to 4,150,039. (Reuters)
  - COVID-19 pandemic in Ukraine
  - Ukraine receives 117,000 doses of the Oxford–AstraZeneca vaccine through the COVAX
    vaccine-sharing initiative. (UNICEF)
  - COVID-19 pandemic in the United Kingdom
  - COVID-19 pandemic in Scotland
  - Scotland relaxes its COVID-19-related restrictions, allowing non-essential travel
    around the country and some social gatherings. (BBC News)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - Ontario Premier Doug Ford announces a six-week extension of the stay-at-home order
    with new restrictions until May 20, including a ban of outdoor gatherings outside
    the household, as the COVID-19 cases remain high. (CBC)
  - COVID-19 vaccination in Canada
  - Prime Minister Justin Trudeau says Pfizer will double the amounts of vaccine that
    are being shipped to Canada. He also announces that the Canadian Red Cross will
    be deployed to Ontario to help with COVID-19 vaccinations. (AP)
  - COVID-19 pandemic in British Columbia
  - British Columbia Premier John Horgan receives his first dose of the Oxford–AstraZeneca
    vaccine. (Vancouver Sun)
  - COVID-19 pandemic in the United States
  - COVID-19 vaccination in the United States
  - The Centers for Disease Control and Prevention says that 200 million doses of
    the COVID-19 vaccine have been administered. (Bloomberg.com)
  - COVID-19 pandemic in Michigan
  - Michigan extends its restrictions on gatherings and dining to May 24 due to an
    increase in the number of cases. The state also expands its mask mandate to children.
    (Detroit Free Press)
  - COVID-19 pandemic in Virginia, Lineage P.1
  - Virginia reports its first two cases of the Lineage P.1 variant, which was originally
    detected in Brazil. (AP)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 101 deaths from COVID-19 in the past 24 hours, thereby
    bringing the nationwide death toll to 10,181. (The National Herald)
  - COVID-19 pandemic in India
  - India reports a record 217,353 new confirmed cases of COVID-19 in the past 24
    hours, thereby bringing the nationwide total of confirmed cases to 14.29 million.
    The country also reports 1,185 deaths, which is the highest daily total since
    September, thereby bringing the nationwide death toll to 174,308. (Hindustan Times)
  - COVID-19 pandemic in Japan
  - The government designates Aichi, Kanagawa, Chiba, and Saitama prefectures for
    tougher measures that would require restaurants and bars to close at 8:00 p.m.
    between April 20 and May 15. (The Mainichi)
  - COVID-19 pandemic in Thailand
  - Thailand announces the closure of educational institutions, pubs, bars, karaoke
    shops, and massage parlours; a ban on alcohol sales at restaurants; and a ban
    on gatherings of more than 50 people for at least two weeks, beginning April 18,
    due to an increase in the number of COVID-19 cases. (Bangkok Post)
  - COVID-19 pandemic in Argentina
  - Argentina reports a record 29,472 cases in the past 24 hours, thereby bringing
    the nationwide total to 2,658,574 cases. (Clarín)
  - COVID-19 pandemic in Tonga
  - Salote Mafileʻo Pilolevu Tuita, Princess of Tonga, received her first dose of
    the Oxford–AstraZeneca COVID-19 vaccine, thereby becoming the first person to
    be vaccinated against COVID-19 in the disease-free country. (RNZ)
  - Russia–United States relations
  - The Russian Foreign Minister says that Moscow will ask ten U.S. diplomats to leave
    Russia in retaliation to expulsions of Russian diplomats ordered by the United
    States yesterday. (AP)
  - United States involvement in regime change, Cuba–United States relations
  - Declassified documents released by the National Security Archive show that the
    Central Intelligence Agency was involved in a plot to assassinate Raúl Castro
    in 1960. (CNA)
  - Aftermath of the 2021 storming of the United States Capitol
  - Criminal charges brought in the 2021 storming of the United States Capitol
  - American guitarist and Oath Keepers member Jon Schaffer pleads guilty for his
    role in the storming of the United States Capitol, thus making him the first participant
    in the riot to do so. (CNN)
  - In a widely-expected move at the 8th Congress of the Communist Party, Raúl Castro
    officially resigns as First Secretary, the most powerful position in Cuba. Incumbent
    President Miguel Díaz-Canel is expected to succeed him. (NBC News)
  - Artemis program
  - NASA awards SpaceX a contract to build its next-generation Human Landing System
    to return American astronauts to the lunar surface during this decade. (BBC News)
