Date: '2021-04-10'
Source_URI: Portal:Current events/2021 April 10
Intelligence_Payload:
  Uncategorized:
  - 2021 Myanmar protests
  - Ten officers are killed by an alliance of rebel groups during an attack at a police
    station in Naungmon. (Al Jazeera)
  - Myanmar's Ambassador to the United Nations Kyaw Moe Tun calls for the international
    community to enforce a no-fly zone over his country to protect civilians from
    airstrikes, and to establish an arms embargo on the junta, saying, "Your collective,
    strong action is needed immediately." (The Straits Times)
  - 2021 Apure clashes
  - The Venezuelan Armed Forces announce the arrest of an unspecified number of Sinaloa
    Cartel members amidst clashes with FARC dissidents in the state of Apure. (Al
    Jazeera)
  - Somali Civil War
  - A suicide bomber targeting the Somali Bay region's governor kills four people
    and wounds six others outside a bar in Baidoa. The governor escapes unharmed.
    (The Washington Post)
  - Aftermath of the 2021 storming of the United States Capitol
  - A previously undisclosed document provides new details regarding the January 6
    riot at the United States Capitol. The document shows that then-Vice President
    Mike Pence made a call to the acting Defense Secretary urging him to "clear the
    Capitol." Additionally, the document shows that Senate Majority Leader Chuck Schumer
    and House Speaker Nancy Pelosi also made demands for the Army to deploy the National
    Guard. (AP) (The Guardian)
  - Four people are killed and four more are wounded after security forces open fire
    on protesters during election-related violence in West Bengal, India. Another
    person is killed when unknown gunmen fire at voters at a polling booth. (Al Jazeera)
  - Anti Monopoly Law of China
  - China's State Administration for Market Regulation issues a ($2.78 billion) fine
    against technology company Alibaba over anti-competitive practices which forced
    merchants to choose one of two platforms, rather than being able to work with
    both. (CNBC)
  - 2021 East Java earthquake
  - An earthquake kills at least seven people and damages buildings in Java, Indonesia.
    (Al Jazeera)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 vaccination in India
  - India becomes the fastest country in the world to administer 100 million doses
    of the COVID-19 vaccine. (The Hindu)
  - India reports a record 145,384 new confirmed cases of COVID-19 in the past 24
    hours, thereby bringing the nationwide total of confirmed cases to 13.2 million.
    (The Times of India)
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 77 deaths in the past 24 hours, thereby bringing the
    nationwide death toll to 9,661. (Bdnews24.com)
  - COVID-19 pandemic in Iran
  - Iran imposes a 10-day lockdown in 23 of 31 provinces in order to reduce the spread
    of COVID-19 amid a fourth wave of the pandemic. (Arab News)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Andorra
  - Speaker of the General Council Roser Suñé receives the first shot of the AstraZeneca
    vaccine. (Diari d'Andorra)
  - COVID-19 pandemic in Romania
  - Romania surpasses one million cases of COVID-19. (The New York Daily News)
  - COVID-19 pandemic in Canada
  - COVID-19 pandemic in Ontario
  - COVID-19 pandemic in Toronto
  - Toronto Mayor John Tory receives his first dose of the AstraZeneca vaccine. (CTV
    News)
  - COVID-19 pandemic in Ottawa
  - Ottawa reports a record 325 new confirmed cases of COVID-19 in the past 24 hours.
    (CBC)
  - COVID-19 pandemic in Libya
  - Libya begins a vaccination campaign against COVID-19, with Prime Minister Abdul
    Hamid Dbeibeh receiving his first dose of the COVID-19 vaccine. (Al Jazeera)
  - COVID-19 vaccine
  - Chinese Center for Disease Control and Prevention director Gao Fu admits at a
    conference in Chengdu that the vaccines developed by China "don't have very high
    protection rates", and that the government is considering mixing them to provide
    the protection needed. (Al Jazeera)
  - Capital punishment in Saudi Arabia
  - Saudi Arabia executes three soldiers for "high treason" and "cooperating with
    the enemy" in Najran Province. (Reuters)
  - 2021 Northern Ireland riots
  - Police say that overnight clashes resulted in fourteen officers injured in Belfast
    and Coleraine. The violence also saw a burning car used to ram a police vehicle,
    trash bins set on fire, and three 14-year-old children arrested. (BBC News)
  - Terrorism in the United States
  - The FBI charges a 28-year-old man with attempting to blow up an Amazon data center
    as part of a plot to disable the Internet and to specifically impede the activities
    of United States federal bodies. They also claim that he said he was involved
    in the storming of the U.S. Capitol building. (The Independent)
  - 2021 Rock Hill shooting
  - The sole survivor of a mass shooting in Rock Hill, South Carolina, that killed
    five others three days earlier has died from his gunshot wounds, according to
    the local coroner. (AP)
  - 2021 Djiboutian presidential election
  - Incumbent President Ismail Omar Guelleh wins a landslide victory securing over
    97% of the votes cast, in an election boycotted by the opposition. The leader
    of the opposition says that the results are "far from reality". Guelleh will serve
    his fifth consecutive term. (Reuters)
  - Nuclear program of Iran
  - Iranian President Hassan Rouhani inaugurates a series of advanced uranium enrichment
    centrifuges at the Natanz nuclear facility, revealing that Iran had violated in
    kind the Joint Comprehensive Plan of Action which mandates the testing and usage
    of only "first-generation" centrifuges for uranium enrichment, in response to
    Western sanctions violating the deal. The move comes amid indirect discussions
    in Vienna between Iran and the United States to revive the deal. (The Straits
    Times)
  - 2021 Grand National
  - Irish jockey Rachael Blackmore becomes the first female winner of the Grand National.
    Another horse, The Grand Mile, suffers a broken leg and is euthanised. (BBC News)
    (The Manchester Evening News)
