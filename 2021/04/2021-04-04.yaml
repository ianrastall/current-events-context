Date: '2021-04-04'
Source_URI: Portal:Current events/2021 April 4
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan (2001–2021)
  - Taliban insurgency, 2021 Afghanistan attacks
  - Three security personnel are killed in a car bombing near Kabul. The Taliban claims
    responsibility for the attack. (Al Arabiya)
  - Afghan peace process
  - President Ashraf Ghani is expected to offer a three-phase peace roadmap, which
    includes a ceasefire and agreement, during a proposed meeting in Turkey. (Khaama
    Press)
  - Insurgency in Khyber Pakhtunkhwa
  - Militants ambush a convoy carrying counter-terrorism judge Aftab Afridi, killing
    him and three members of his family, in Swabi, KP, Pakistan. (AA)
  - Cyclone Seroja
  - At least 80 people are killed in Flores island, Indonesia, and 21 more in Dili,
    East Timor, by flash floods and landslides. (BBC News)
  - Eleven people are killed and 19 others are injured after a truck and a passenger
    bus collide on the G15 Shenyang–Haikou Expressway in Jiangsu province, China.
    (South China Morning Post) (USA Today)
  - An explosion and fire aboard a boat injures at least eight people, some of them
    critically, on the Hawkesbury River in New South Wales, Australia. (The Sydney
    Morning Herald)
  - Twelve people are killed and four remain missing after a fishing boat sank in
    Zhoushan sea, Zhejiang, China. (Xinhua)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in India
  - COVID-19 pandemic in Maharashtra
  - The Maharashtra state government announces that there will be a nightly curfew
    as well as a weekend lockdown in order to reduce the number of COVID-19 cases.
    These measures will be implemented from tomorrow at 8:00 p.m. until April 30.
    (The Hindu Business Line)
  - India reports 93,249 new cases of COVID-19 in the past 24 hours, which is the
    highest single-day number of daily cases since September 21. This brings the nationwide
    total of confirmed cases to 12.48 million. (Hindustan Times)
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 7,087 new confirmed cases of COVID-19 in the past
    24 hours, thereby bringing the nationwide total of confirmed cases to 637,364.
    (The Financial Express)
  - COVID-19 pandemic in Mongolia
  - Mongolia surpasses 10,000 cases of COVID-19 after a record 620 new cases are reported
    in the past 24 hours. (Montsame)
  - COVID-19 pandemic in Taiwan
  - Taiwan receives its first shipment of 199,200 doses of the Oxford–AstraZeneca
    vaccine distributed through the COVAX initiative. (Focus Taiwan)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - California reports the United States' first case of the "double mutant" variant
    of SARS-CoV-2 first detected in India. The variant has been detected in the San
    Francisco Bay Area. (KNTV-TV)
  - COVID-19 pandemic in Greece
  - Greece reports 78 deaths in the past 24 hours, which is the highest daily total
    this year, thereby bringing the nationwide death toll to 8,380. (Ekathimerini)
  - COVID-19 pandemic in Libya
  - Libya receives its first shipment of more than 100,000 doses of the Russian Sputnik
    V vaccine. (Al Jazeera)
  - 2021 alleged Jordanian coup d'état attempt
  - Former Jordanian Crown Prince Hamzah bin Hussein says that he is under house arrest.
    (BBC News)
  - The United States Armed Forces announces that Camp 7 at the Guantanamo Bay detention
    camp will close. (The Independent)
  - 2021 Bulgarian parliamentary election
  - Bulgarians head to the polls to elect new members of the National Assembly. (Euronews)
  - 2021 Kosovan presidential election
  - The Assembly elects Vjosa Osmani as President. (Reuters)
