Date: '2021-04-01'
Source_URI: Portal:Current events/2021 April 1
Intelligence_Payload:
  Uncategorized:
  - War in Afghanistan (2001–2021)
  - 2021 Afghanistan attacks
  - A female police officer is killed by gunmen in the city of Jalalabad, Nangarhar,
    during an increase of targeted killings of women in the city. (Reuters)
  - Spillover of the Colombian conflict
  - 2021 Apure clashes
  - Two Venezuelan Army troops are killed and nine others are wounded by a land mine,
    near the border with Colombia, during operations against FARC dissidents and other
    "irregular armed groups". (Reuters)
  - Terrorism in Burkina Faso
  - Six auxiliaries of the Burkina Faso Armed Forces are killed in an ambush during
    an operation in Dablo, Sanmatenga. (Barron's)
  - Impact of the COVID-19 pandemic on the music industry, COVID-19 pandemic in the
    Netherlands, Eurovision Song Contest 2021
  - The government announces that it will permit the attendance of around 3,500 fans
    into Rotterdam Ahoy for the Eurovision contest on May 18–22, as part of a trial
    to reopen public venues. (Radio France Internationale)
  - Minimum wage in New Zealand
  - New Zealand raises its minimum wage to $20 per hour, increasing the average income
    of 175,500 citizens by $44 per week, while income tax on those earning over $180,000
    rises to 39 percent. Welfare spending, student allowances, and support for first
    time home buyers are also increased. (The Independent)
  - The S&P 500 closes its trading day at 4,019.87, the first time it ended at above
    4,000. (The Straits Times)
  - COVID-19 pandemic
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Bangladesh
  - Bangladesh reports a record 6,469 new confirmed cases in the past 24 hours, prompting
    the government to impose a series of new measures, including banning all travellers
    from the European Union and 12 other countries for two weeks beginning April 3.
    (Al Jazeera)
  - COVID-19 pandemic in Cambodia
  - Phnom Penh imposes a curfew from 8:00 p.m. to 5:00 p.m. local time that suspends
    all non-essential business activities and gatherings for two weeks in order to
    prevent the spread of COVID-19. (Khmer Times)
  - COVID-19 pandemic in Japan
  - The Japanese government designates Osaka, Hyogo, and Miyagi Prefectures for tougher
    measures against COVID-19 amid a rise in cases. The measures include fines of
    ¥200,000 ($1,808.80) for restaurants and bars that ignore mandates to shorten
    operating hours to 8:00 p.m., and capping attendance of large events to 5,000
    people. These measures will be effective for one month beginning on April 5. (Kyodo
    News)
  - COVID-19 pandemic in Malaysia, 501.V2 variant
  - Malaysia reports nine locally transmitted cases of the 501.V2 variant of SARS-CoV-2,
    which was originally detected in South Africa. (Malaysiakini)
  - COVID-19 pandemic in Vietnam
  - Vietnam receives the first batch consisting 811,000 doses of the Oxford–AstraZeneca
    vaccine distributed through COVAX scheme. (Reuters)
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in Andorra
  - Andorra receives 30.000 doses of Oxford-Astrazenca vaccines from COVAX WHO program.
    (Diari d'Andorra)
  - COVID-19 pandemic in France
  - Prime Minister Jean Castex announces a ban of alcoholic drinks in parks and outdoor
    public spaces in France as part of the limited nationwide lockdown to curb the
    spread of COVID-19. (The Straits Times)
  - COVID-19 pandemic in Germany
  - President Frank-Walter Steinmeier receives his first dose of the Oxford–AstraZeneca
    vaccine. (Barron's)
  - COVID-19 pandemic in Moldova
  - Moldova enters a 60-day state of emergency to reduce the spread of COVID-19. Acting
    Prime Minister Aureliu Ciocoi says that the rate of infection has increased to
    635 per 100,000 people. (Radio Free Europe/Radio Liberty)
  - COVID-19 pandemic in Spain
  - Spain breaks vaccination record with 306,000 doses injected in one day. (El País)
  - COVID-19 pandemic in Turkey
  - Turkey reports a record 40,806 new confirmed cases of COVID-19 in the past 24
    hours, thereby bringing the nationwide total of confirmed cases to 3.3 million.
    (Anadolu Agency)
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in California
  - California Governor Gavin Newsom receives the Johnson & Johnson vaccine. (San
    Francisco Chronicle)
  - COVID-19 pandemic in Michigan, Lineage P.1
  - Michigan reports its first case of the Lineage P.1 variant in a person from Bay
    County. (Detroit News)
  - COVID-19 pandemic in Australia
  - Lockdown restrictions are eased in Queensland, including Brisbane, after a decline
    in the number of COVID-19 cases. (Nine News)
  - COVID-19 pandemic in Chile
  - After surpassing one million cases, the government announces several new restrictions.
    Borders will be closed for 30 days; the curfew will start one hour earlier; work
    permits during quarantine will be given only for essential activities; and sales
    will be permitted only for food, medicine, and hygiene products. (CNA)
  - COVID-19 pandemic in South Africa
  - The South African Health Products Regulatory Authority approves the general use
    of the single-dose Johnson & Johnson vaccine. (Business Tech)
  - COVID-19 vaccine
  - Pfizer–BioNTech COVID-19 vaccine
  - Pfizer announces a revised efficacy rating of 91.3% for its vaccine candidate,
    down from its original rating of 95%, and affirms that protection afforded by
    the vaccine lasts for at least six months. Pfizer also announces that the vaccine
    appeared to provide protection against the 501.V2 variant in 100% of cases during
    its South African trial run. (CNBC)
  - 2021 Myanmar protests, Myanmar–United Kingdom relations
  - The United Kingdom places sanctions on Burmese conglomerate Myanmar Economic Corporation
    for funding the junta and for associating with military officials. British Foreign
    Secretary Dominic Raab also accuses the junta of "sinking to a new low with the
    wanton killing of innocent people, including children". (Reuters)
  - Taiwan–United States relations
  - U.S. ambassador to Palau John Hennessey-Niland becomes the first sitting American
    envoy to visit Taiwan since the U.S. cut formal ties in 1979. The visit coincided
    with the opening of a COVID-19 "travel bubble" between Taiwan and Palau. The highest
    level visit in 42 years prompted anger from China, who warned the U.S. against
    "crossing its red line". (The Diplomat) (The Independent)
  - Russia–United States relations
  - Russian Minister of Foreign Affairs Sergey Lavrov warns of a rising "anti-White"
    racism in the United States, saying that political correctness was being "taken
    to the extreme". Lavrov also accuses the U.S. of attempting to spread a cultural
    revolution around the world. (The Moscow Times)
  - 2019–20 Hong Kong protests
  - A Hong Kong court convicts nine activists of the opposition pro-democracy camp
    for organizing and participating in an "unlawful assembly". Among those convicted
    are politicians Martin Lee, Leung Kwok-hung, and Margaret Ng, and entrepreneur
    Jimmy Lai. (Philippine Daily Inquirer)
  - Social impact of the COVID-19 pandemic
  - Three Belgian police officers are injured and four people are arrested, after
    a crowd of around 2,000 people at the Bois de la Cambre park in Brussels is charged
    for violating social distancing measures by organizing and participating in a
    coronavirus party marketed as an April Fools' Day prank. (The Bangkok Post)
  - Slovak President Zuzana Čaputová appoints Finance Minister Eduard Heger as the
    new Prime Minister, ending a month-long political crisis. (Reuters)
  - Gian Carlo Venturini and Marco Nicolini are sworn in as the new Captains Regent
    of San Marino, succeeding Alessandro Cardelli and Mirko Dolcini. (San Marino RTV)
