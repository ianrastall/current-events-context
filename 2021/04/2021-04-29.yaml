Date: '2021-04-29'
Source_URI: Portal:Current events/2021 April 29
Intelligence_Payload:
  Uncategorized:
  - Colombian conflict, Venezuelan crisis
  - 2021 Apure clashes
  - Eight Venezuelan soldiers are killed in clashes with irregular armed groups operating
    on the Colombian border. The Venezuelan government says that the groups are narcoterrorists
    connected to Colombian president Ivan Duque while Colombian security sources say
    that they are FARC dissidents. (Al Jazeera)
  - 2021 Kyrgyzstan–Tajikistan conflict
  - A clash between Tajikistan and Kyrgyzstan forces on the border between the two
    countries results in four deaths and dozens of injuries. (The Guardian)
  - The foreign ministers of Tajikistan and Kyrgyzstan say they have agreed to a ceasefire
    at the border. (TASS)
  - Cross-Strait relations, Economy of Taiwan
  - The Taiwanese Ministry of Labor bans both domestic and foreign companies from
    advertising jobs located in China, especially ones related to the integrated circuit
    and semiconductor industries. The move comes in light of both increased tensions
    between the two countries, and China aggressively recruiting Taiwanese workers
    to build up its own semiconductor industry. (Nikkei Asia)
  - The price of copper exceeds US$10,000 per tonne for the first time since February
    2011. Analysts cite a strong demand in China and the weakening of the U.S. dollar
    for the increase in price. (Channels TV)
  - COVID-19 pandemic
  - COVID-19 pandemic in Europe
  - COVID-19 pandemic in France, Lineage B.1.617
  - Nouvelle-Aquitaine reports France's first case of the Lineage B.1.617 variant
    in a person who travelled from India. (MedicalXpress)
  - President Emmanuel Macron unveils a gradual easing of lockdown. He said schools
    would reopen on May 3, followed by the reopening of museums, cinemas, shops, and
    cafés on May 19. In the second week of June, cafés and restaurants will be allowed
    to serve inside and the curfew will be scrapped on June 30 after it pushes back
    to 9:00 p.m. (The New York Times)
  - COVID-19 pandemic in Italy
  - Italy surpasses four million cases of COVID-19. (ANSA in English)
  - COVID-19 pandemic in Romania, Lineage B.1.617
  - Romania reports its first case of the Lineage B.1.617 variant first detected in
    India in a person from Brașov County. (Romania Insider)
  - COVID-19 pandemic in Asia
  - COVID-19 pandemic in Hong Kong
  - Hong Kong reopens bars and nightclubs to those who have received at least one
    vaccine dose. These venues will also be allowed to stay open until 2:00 a.m. (Euronews)
  - COVID-19 pandemic in India
  - India reports a new global record of 379,257 new cases of COVID-19 in the past
    24 hours, thereby bringing the total number of confirmed cases to 18.38 million.
    The country also reports a record 3,645 deaths in the past 24 hours, thereby bringing
    the nationwide death toll to 204,832. (CNA)
  - COVID-19 pandemic in Vietnam
  - Vietnam reports its first locally transmitted COVID-19 cases in 35 days, in four
    members of a family from Hà Nam Province and one person from Ho Chi Minh City.
    (The Straits Times)
  - COVID-19 pandemic in South America
  - COVID-19 pandemic in Argentina
  - Argentina reports a record 561 deaths in the past 24 hours, thereby bringing the
    nationwide death toll to 63,508. (Perfil)
  - COVID-19 pandemic in Brazil
  - Brazil surpasses 400,000 COVID-19 deaths, becoming the second country to do so
    after the United States. (Reuters)
  - COVID-19 pandemic in North America
  - COVID-19 pandemic in the United States
  - COVID-19 pandemic in New York City
  - New York City mayor Bill de Blasio announces the city government's intent to lift
    all pandemic-related restrictions and "fully reopen" by July 1. (CBS News)
  - COVID-19 pandemic in Louisiana, Lineage P.1
  - Louisiana reports their first two cases of the Lineage P.1 variant that originated
    in Brazil. (The Times-Picayune)
  - The U.S. Centers for Disease Control and Prevention estimates that roughly 35
    percent of the country's population had been infected with COVID-19 as of March
    2021. This represents about a fourfold increase from the official reported numbers.
    (CNN)
  - COVID-19 pandemic in Costa Rica
  - Costa Rica announces new COVID-19 restrictions on driving and businesses amidst
    a rise of new cases. (The Tico Times)
  - COVID-19 pandemic in Africa
  - COVID-19 pandemic in the Democratic Republic of the Congo
  - The Democratic Republic of the Congo announces that it will redeploy several of
    their AstraZeneca vaccines to other Africa countries. (Reuters)
  - COVID-19 pandemic in Uganda, Lineage B.1.617
  - Uganda reports its first cases of the Lineage B.1.617 variant in people who travelled
    from India to Kampala. (The Independent Uganda)
  - China reports a new outbreak of the African Swine Fever in Inner Mongolia, where
    343 of 432 pigs died on a farm near Baotou. (Reuters)
  - The U.S. Food and Drug Administration announces that it will ban flavored cigars
    and menthol cigarettes within a year, claiming they disproportionately impact
    low-income and minority households. (CNN)
  - Cyprus dispute
  - President of Cyprus Nicos Anastasiades says that the two-state solution proposed
    by Turkish Cypriots will never be accepted and claims that it violates United
    Nations resolutions. Greek Cypriots advocate a federal united country, whereas
    the Turkish side supports a two-state solution. (Reuters)
  - Papua conflict
  - Indonesian authorities formally designate West Papuan separatists as "terrorists",
    after a call on Sunday from President Joko Widodo to crack down on them. The Chief
    Security Minister cites a 2018 counter-terrorism law to back the measure whereas
    a spokesperson for the West Papua National Liberation Army rejects the move. (Reuters)
  - The Mexican Congress passes legislation outlawing revenge porn. It is sent to
    President Andrés Manuel López Obrador for his signature. (Reuters)
  - 2021 NFL season
  - In American football, the National Football League starts its draft for the 2021
    season, with the Jacksonville Jaguars taking quarterback Trevor Lawrence as the
    first pick of the draft. (USA Today) (ESPN)
