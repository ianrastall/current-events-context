Date: '2025-02-14'
Source_URI: Portal:Current events/2025 February 14
Intelligence_Payload:
  Uncategorized:
  - Kivu conflict
  - M23 campaign, Democratic Republic of the Congo–Rwanda conflict
  - 2025 Bukavu offensive
  - M23 rebels and Rwandan troops seize control of Kavumu Airport in South Kivu, Democratic
    Republic of the Congo. (DW)
  - M23 forces and Rwandan troops enter the city of Bukavu, according to local security
    and humanitarian officials. There are no reports of resistance as most Congolese
    troops withdraw. (Digital Journal)
  - Congolese president Félix Tshisekedi cancels his participation in an upcoming
    African Union summit to end the conflict due to the "situation on the ground".
    Tshisekedi accuses Rwanda of invading the country to seize its mineral-rich regions.
    (RFI)
  - Russian invasion of Ukraine
  - Chernobyl Nuclear Power Plant drone strike
  - A drone strikes the New Safe Confinement structure housing the site of the Chernobyl
    disaster. Ukrainian President Volodymyr Zelenskyy states that a Russian combat
    drone caused significant damage to the structure, but did not produce an increase
    in external radiation levels. (CNN)
  - Insurgency in Balochistan
  - Eleven coal miners are killed and five others are wounded when a bomb hits a truck
    in Harnai, Balochistan, Pakistan. (AP)
  - At least six people are killed and seven injured in a fire at a construction site
    in Busan, South Korea. (Al Jazeera)
  - Ten people are killed and 19 others are injured in a collision between a car and
    a bus carrying Hindu pilgrims heading to Kumbh Mela in Prayagraj, Uttar Pradesh,
    India. (DW)
  - A shop explosion and fire in Oudomxay province, Laos, kills four people and injures
    others. (Radio Free Asia)
