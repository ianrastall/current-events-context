  - Democratic Republic of the Congo–Rwanda conflict
  - A crisis summit is held involving the regional blocs SADC and the EAC, along with
    Rwandan President Paul Kagame. The DR Congo is represented by Prime Minister Judith
    Suminwa, while President Félix Tshisekedi attends virtually. The blocs call for
    a ceasefire and negotiations involving the M23 movement, while the Congolese do
    not comment. (BBC News) (CNN)
