  - Three people are killed while cleaning a clogged drain in Kolkata Leather Complex,
    Bantala, India. (The Hindu)
  - Seven people are killed and 15 injured after a bus carrying pilgrims fell into
    a gorge near Saputara, Gujarat, India. (The Times of India) (News18)
  - Panama–United States relations
  - U.S. Secretary of State Marco Rubio travels to Panama in his first foreign trip
    in the position and urges Panamanian President José Raúl Mulino to reduce Chinese
    influence in the Panama Canal. In response, Mulino said that his country won't
    renew its contracts with China's Belt and Road Initiative when they expire. (Latin
    Times)
  - Saudi Arabia–Syria relations
  - Syrian President Ahmed al-Sharaa visits Saudi Arabia for his first trip since
    being named president to meet with Crown Prince Mohammed bin Salman. (Al Jazeera)
  - South Africa–Taiwan relations
  - South Africa orders Taiwan to relocate its liaison office from Pretoria by the
    end of March, citing diplomatic policies favoring China. (Reuters)
