Date: '2025-01-12'
Source_URI: Portal:Current events/2025 January 12
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - An Israeli security delegation arrives in Qatar for talks regarding a ceasefire
    deal and the release of Israeli hostages in Gaza. (Reuters)
  - Israel–United States relations, Calls for a ceasefire during the Gaza war
  - Israeli Prime Minister Benjamin Netanyahu and U.S. President Joe Biden discuss
