Date: '2025-12-29'
Source_URI: Portal:Current events/2025 December 29
Intelligence_Payload:
  Uncategorized:
  - Turkey–Islamic State conflict
  - Three police officers and six Islamic State gunmen are killed in a shootout during
    a raid at a house in Elmalık, Yalova Province, Turkey. Eight other officers and
    a civilian are also wounded. (Al Jazeera)
  - Three people are killed and another is injured when an avalanche hits a ski resort
    on the Pyrenees in Panticosa, Aragon, Spain. (Daily Express)
  - Two people are killed and British boxer Anthony Joshua is injured when a car crashes
    into a stationary truck on the Lagos–Ibadan Expressway in Ogun State, Nigeria.
    (BBC News) (TVC News)
  - Cross-strait relations
  - Justice Mission 2025
  - China conducts the largest live fire exercises to date around Taiwan, designating
    multiple sea and air zones for drills by naval and air units to rehearse a blockade
    and to signal opposition to recent United States arms sales to Taiwan. (Reuters)
  - India–New Zealand relations
  - India and New Zealand reach a free trade agreement where India grants zero-duty
    access for its exports to New Zealand, and New Zealand receives phased concessions
    on most Indian tariff lines, while excluding dairy and selected agricultural products.
    (AP)
  - Corruption in Malaysia
  - The Malaysian Anti-Corruption Commission raids multiple companies and freezes
    six bank accounts while investigating alleged bribery linked to army procurement
    contracts, as army chief Muhammad Hafizuddeain Jantan is placed on leave pending
    the inquiry. (Reuters)
  - War crimes in the Syrian civil war
  - The Syrian transitional government orders the military to secure a mass grave
    at a former military base near Al-Dumayr, Rif Dimashq Governorate, and opens a
    criminal investigation into a covert operation that transferred thousands of bodies
    there from another site during the previous administration. (Reuters)
  - Mexican drug war
  - Three people are killed and four others are injured, including one critically,
    in a livestreamed mass shooting when suspected Jalisco New Generation Cartel gunmen
    open fire on a Lamborghini in Zapopan, Jalisco, Mexico. (BNO News)
  - Russian president Vladimir Putin signs a law allowing the government to disregard
    criminal judgments issued by foreign or international courts that lack a treaty
    basis or a United Nations Security Council mandate. (Reuters)
  - 2025 Iranian protests
  - Protests erupt in Tehran, Iran, for a second day after the Iranian rial drops
    in value and inflation rates increase by 42.2%. The leader of the Central Bank
    of Iran resigns in response. (AP)
  - 2025 Iraqi parliamentary election
  - Haibat al-Halbousi of the Iraqi Progress Party is elected Speaker of the Council
    of Representatives following the recent parliamentary election. (Reuters)
