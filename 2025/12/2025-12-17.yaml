Source_URI: Portal:Current events/2025 December 17
Intelligence_Payload:
  Uncategorized:
  - Terrorism in Australia
  - 2025 Bondi Beach shooting
  - The surviving gunman of the attack on Bondi Beach, Australia, is charged with
    59 offences, including 15 counts of murder and one count of committing a terrorist
    act. (BBC News)
  - War on drugs, Operation Southern Spear
  - 2025 United States military strikes on alleged drug traffickers
  - The United States Southern Command says the U.S. Navy attacked an alleged drug
    smuggling boat in the Eastern Pacific, killing at least four people. (AP)
  - Foreign relations of the United States
  - Travel bans under the Trump administrations
  - United States president Donald Trump expands the country's existing travel ban
    by banning citizens of Burkina Faso, Mali, South Sudan, and Syria, as well as
    those holding passports issued by the Palestinian Authority, from entering the
    country. He also imposes partial restrictions on citizens from 15 other countries.
    (NPR)
  - Egypt–Israel relations
  - Israeli prime minister Benjamin Netanyahu approves a deal to export US$35 billion
    of natural gas from the Leviathan gas field to Egypt over the next 15 years. (AP)
  - Arrest of Jair Bolsonaro
  - The Brazilian Senate approves a bill that reduces penalties for certain crimes,
    including attempted coup, which could significantly shorten former president Jair
    Bolsonaro's 27-year prison sentence. The bill now heads to President Luiz Inácio
    Lula da Silva for signature. (AP)
  - Russo-Ukrainian war
  - Russian president Vladimir Putin signs a law to redistribute ownerless homes on
    occupied territories to those who have lost homes during the conflict. (Euromaidan
    Press)
  - Brazil's Supreme Federal Court rules that Indigenous land rights constitute unamendable
    constitutional guarantees, thereby blocking congressional efforts to restrict
    the recognition of Indigenous territories and reinforcing existing protections
    despite pending legislative opposition. (Reuters)
  - 2025 FIFA Intercontinental Cup
  - In association football, Paris Saint-Germain win their first FIFA Intercontinental
    Cup after defeating Flamengo 2–1 on penalties, following a 1–1 draw after extra
    time, in the final in Al Rayyan, Qatar. (Reuters)
