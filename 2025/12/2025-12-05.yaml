Date: '2025-12-05'
Source_URI: Portal:Current events/2025 December 5
Intelligence_Payload:
  Uncategorized:
  - Afghanistan–Pakistan clashes
  - Afghanistan–Pakistan border skirmishes
  - The Afghan military and Pakistani military exchange fire along their border, with
    Pakistani artillery targeting several Taliban outposts in the Helmand, Kandahar,
    and Zabul provinces. Both sides accuse the other of instigating the clashes. (Reuters)
    (WTOP News)
  - Sudanese civil war
  - War crimes during the Sudanese civil war
  - Fifty people are killed, including 33 children, after the Rapid Support Forces
    strike a kindergarten in South Kordofan, Sudan. (AP)
  - Colombian conflict
  - Colombia and the Clan del Golfo agree in Doha, Qatar, that the group's combatants
    will begin assembling in three designated zones in Chocó and Córdoba starting
    March 1, with arrest and extradition orders suspended during the process. Colombia
    also designates additional municipalities for pilot peace programs as part of
    broader negotiations aimed at reducing violence. (Reuters)
  - Myanmar civil war
  - The Tatmadaw conducts an airstrike on a tea shop in Sagaing, Myanmar, killing
    18 civilians and wounding 20 more. (AP)
  - Proposed acquisition of Warner Bros. by Netflix
  - Netflix, Inc. agrees to buy Warner Bros. Discovery for US$72 billion in one of
    the largest takeovers in entertainment industry history. (BBC News)
  - A car strikes pedestrians during Christmas festivity preparations in Sainte-Anne,
    Guadeloupe, France, injuring 19 people, including seven children. (Le Monde)
  - Canada–Syria relations, Terrorism in Canada
  - Canada removes Syria from its list of state sponsors of terrorism and Hay'at Tahrir
    al-Sham from its list of terrorist entities following a review of the Syrian transitional
    government. (Reuters)
  - Epstein files
  - United States federal judge Rodney Smith orders the release of grand jury records
    from the 2006–2007 investigations into sex offender Jeffrey Epstein and sex trafficker
    Ghislaine Maxwell, ruling that the recently enacted Epstein Files Transparency
    Act supersedes federal grand jury secrecy rules. (The Guardian)
  - Flood control projects scandal in the Philippines
  - Philippine president Bongbong Marcos orders the interior department and the national
    police to pursue contractor Sarah Discaya and others accused of involvement in
    a ghost project in Davao Occidental. (Rappler)
  - The European Union fines social media platform X 120 million (US$140 million)
    for breaching the Digital Services Act. (DW)
  - Conscription in Germany
  - The German Bundestag approves a government plan to expand military recruitment
    through mandatory questionnaires and medical screenings for young men while keeping
    conscription suspended. (Reuters)
  - Pensions in Germany
  - The Bundestag approves a pensions bill that maintains pension levels until 2031
    and introduces higher tax-free earnings for retirees. (Reuters)
