Date: '2025-12-28'
Source_URI: Portal:Current events/2025 December 28
Intelligence_Payload:
  Uncategorized:
  - Syrian conflict
  - Western Syria clashes
  - At least three people are killed and dozens of others are injured after gunfire
    erupts during Alawite-led protests in Latakia, Syria, demanding decentralization
    and for the transitional government to release Assadist detainees. (Reuters)
  - Gaza war
  - Israel introduces new rules for aid groups, forbidding activities or criticism
    that "delegitimizes" Israel, without providing specific definitions. Aid groups
    say that the requirements are political and may hinder criticism of Israel's actions
    in Gaza. (ABC News)
  - Ecuadorian security crisis
  - Six people, including a two-year-old girl, are killed and three others are injured
    in a mass shooting at a beach in Puerto López, Manabí Province, Ecuador. (La Nación
    in Spanish) (TRT World)
  - After months of a high-profile legal dispute, entertainment agency ADOR terminates
    its contract with singer Danielle and expels her from the South Korean girl group
    NewJeans. (The Independent) (Korea JoongAng Daily)
  - 2025 Oaxaca train derailment
  - At least 13 people are killed and 98 others are injured, including five critically,
    when a Tren Interoceánico train carrying 250 people derails in Asunción Ixtaltepec,
    Oaxaca, Mexico. (Reuters) (Infobae in Spanish)
  - Sixteen people are killed and three others sustain burn injuries after a fire
    breaks out at a retirement home in Manado, North Sulawesi, Indonesia. (Reuters)
  - Three people, including a toddler, are killed and three others are injured when
    a building collapses in Soweto, Gauteng, South Africa. (AP)
  - 2025 Richelieu stabbing
  - Nine people are killed, including five children, and three others are injured,
    including the perpetrator and another child, in a mass stabbing spree at multiple
    houses in Richelieu, Commewijne District, Suriname. (AP)
  - Capital punishment in Iraq
  - The Supreme Iraqi Criminal Tribunal sentences a former Ba'athist lieutenant to
    death for the massacre of Barzanis during the Anfal campaign against Kurds. (The
    New Region)
  - 2025–26 Myanmar general election
  - Citizens of Myanmar vote in the first phase to elect the nation's legislature.
    Two further phases of voting are expected in January. (AP)
  - 2025 Central African general election
  - Citizens of the Central African Republic vote to elect a president and 140 members
    of the National Assembly. Incumbent president Faustin-Archange Touadéra seeks
    a third term in office. (Reuters)
  - 2025 Guinean presidential election
  - Guineans vote for a president as incumbent Mamady Doumbouya seeks to be elected
    four years after leading a coup. (Reuters)
  - December 2025 Kosovan parliamentary election
  - Kosovans vote for the second time in a year to elect the members of the Kuvendi.
    (AP via ABC News)
  - Prime Minister Albin Kurti's Vetëvendosje party wins the election with about half
    of the votes and an estimated 56 of the 120 assembly seats but falls short of
    the 61 seats required to govern without support from minority parties. (Al Jazeera)
