Date: '2025-12-06'
Source_URI: Portal:Current events/2025 December 6
Intelligence_Payload:
  Uncategorized:
  - 2025 Afghanistan–Pakistan conflict
  - Five civilians are killed and eight more are injured in a shootout between Pakistani
    soldiers and Afghan soldiers at the border. (AP)
  - Terrorism in Mexico
  - At least five people are killed and 12 others are injured in a suspected car bombing
    terrorist attack when a vehicle explodes outside of a police station in Coahuayana,
    Michoacán, Mexico. (BNO News)
  - Colombian conflict
  - At least thirteen people are injured in a motorcycle bombing at a café near a
    police station in Balboa, Cauca Department, Colombia. (Blu Radio in Spanish) (Infobae
    in Spanish)
  - Israeli–Palestinian conflict
  - Two Palestinians are killed and a soldier is injured when Israel Defense Forces
    soldiers open fire on a car speeding toward troops in Hebron, West Bank. (The
    Times of Israel)
  - 2025 IndiGo disruption
  - The Indian civil aviation ministry caps domestic airfares following widespread
    IndiGo cancellations caused by pilot shortages and operational failures, setting
    a maximum one-way price of ₹7,500 (US$83.38) for routes up to . (Reuters)
  - 2025 Arpora nightclub fire
  - Twenty-five people are killed, including 21 workers and four tourists, and approximately
    50 others are injured in an explosion and fire at a nightclub in Arpora, Goa,
    India. (NDTV) (DW)
  - At least 18 people are killed and two others are critically injured when a dinghy
    carrying migrants sinks off Crete, Greece. (Greek Reporter)
  - International sanctions against Afghanistan
  - Australia imposes economic sanctions and travel bans on four Afghan government
    officials over their involvement in human rights violations, particularly the
    Taliban's treatment of women. (Reuters)
  - 2025 Saulsville shooting
  - Twelve people are killed, including three children, and 13 others are injured
    in a mass shooting at an unlicensed bar in Saulsville, Gauteng, South Africa.
    (AP)
  - Four protesters from Take Back Power are arrested after they threw custard on
    a display case containing the Crown Jewels in the Tower of London in England.
    (DW)
  - MLS Cup 2025
  - In soccer, Inter Miami defeats the Vancouver Whitecaps 3–1 to win its first MLS
    Cup title. (USA Today)
