Date: '2025-12-08'
Source_URI: Portal:Current events/2025 December 8
Intelligence_Payload:
  Uncategorized:
  - Yemeni civil war
  - 2025 Hadhramaut offensive
  - The Southern Transitional Council (STC) captures all eight southern governorates
    of Yemen, opening possibilities for it to claim independence. Saudi Arabia withdraws
    all of its troops from Aden. (The Guardian)
  - Yemen's airspace briefly closes as a result of the STC offensive. (AP)
  - 2025 Cambodia‒Thailand conflict
  - A Thai soldier is killed and eight others are injured after Cambodia shells Ubon
    Ratchathani province, Thailand. (Bangkok Post)
  - Thai F-16 jets carry out airstrikes on Cambodian military targets in Oddar Meanchey
    province and Preah Vihear, killing four Cambodian civilians and wounding ten more.
    (Al Jazeera)
  - Israel–Hezbollah conflict
  - Israel carries out a wave of airstrikes in southern Lebanon, allegedly targeting
    Hezbollah's site. (Al Jazeera)
  - Sudanese civil war
  - The Rapid Support Forces capture Heglig, Sudan's largest oilfield, after the Sudanese
    Armed Forces withdraw from the area. (Al Jazeera)
  - 83rd Golden Globe Awards
  - Nominations for the Golden Globe Awards honoring productions in 2025 are released,
    with One Battle After Another topping the film categories with 9 nominations,
    while The White Lotus tops the television categories with 6 nominations. This
    is also the first year the awards will have a Best Podcast category. (Al Jazeera)
    (AP)
  - Czech Republic–Turkey relations
  - Turkish low-cost airline Pegasus announces an agreement to acquire Czech Airlines
    and its subsidiary Smartwings, the largest Czech airline, for 154 million (US$180
    million). (AP)
  - Economy of China
  - China's trade surplus passes US$1 trillion for the first time despite significant
    pressure from U.S. tariffs. (NPR)
  - 2025 Aomori earthquake
  - A earthquake strikes off the coast of Aomori Prefecture, Japan, causing some public
    services to be suspended. (Mainichi) (CNBC)
  - Four tourists are killed and one other is missing when a wave hits a seawater
    pool in Los Gigantes, Tenerife, Spain. The victims had previously ignored the
    warnings and the closure of the seawater pool. (AP)
  - Hungary–Turkey relations
  - Turkey agrees to guarantee the transit of Russian natural gas to Hungary through
    the TurkStream pipeline. (Reuters)
  - Corruption in Cuba
  - Cuba's Supreme Court sentences former economy minister Alejandro Gil to life imprisonment
    for espionage and multiple economic-related offenses, and in a separate case imposes
    a 20-year term for bribery, influence peddling, and tax evasion. (AFP via CTV
    News)
  - Corruption in Ecuador
  - An Ecuadorian judge orders former president Lenín Moreno to stand trial on bribery
    charges linked to alleged payments made during the construction of the Coca Codo
    Sinclair Dam. (Reuters)
  - Corruption in Mexico
  - In Mexico, former Chihuahua governor César Duarte Jáquez is arrested for allegedly
    laundering more than Mex$96 million (US$5 million) in public funds. (Reuters)
  - The Honduran attorney general issues an international arrest warrant for former
    president Juan Orlando Hernández, whom U.S. president Donald Trump recently pardoned
    after serving part of a 45-year sentence for drug trafficking. (Reuters)
  - A former teacher in Dublin is jailed for ten years for indecent assault of eight
    boys. (Dublin People)
  - 2025 Honduran general election
  - The Honduran electoral council resumes releasing updated presidential election
    results following an extended pause to conduct technical reviews and address inconsistencies
    in tally sheets, with the latest count showing National Party candidate Nasry
    Asfura narrowly ahead. (Reuters)
