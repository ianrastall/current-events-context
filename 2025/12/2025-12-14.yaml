  - 2025 Brown University shooting
  - A person of interest is taken into custody for yesterday's mass shooting that
    killed two people and injured nine others at Brown University in Providence, Rhode
    Island, United States. The person is later released from custody the same day,
    with authorities announcing that they are still searching for a suspect. (CNN)
    (The New York Times)
  - Crime in Guatemala
  - Guatemalan president Bernardo Arévalo declares a state of emergency in two municipalities
