Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza humanitarian crisis
  - Fourteen people are killed, including three children who died of hypothermia,
    amid a severe storm in the Gaza Strip. At least 13 homes previously damaged by
    Israel have also collapsed. (Al Jazeera)
  - At least eight people are killed and multiple others are injured when a tank truck
    crashes and explodes in Tiko, Southwest Region, Cameroon. (Africanews)
  - Four people are killed and eleven others are rescued when an under-construction
    building on top of a Hindu temple collapses in Verulam, KwaZulu-Natal, South Africa.
    (AP) (SABC)
  - Brazil–United States relations
  - The United States Treasury Department lifts sanctions on Brazilian Supreme Court
    Justice Alexandre de Moraes, citing a shift in U.S. foreign policy. (AFP via France
    24)
  - Corruption in Bolivia
  - A Bolivian judge orders former president Luis Arce into five months of pre-trial
    detention in La Paz while authorities investigate alleged embezzlement linked
    to the diversion of public funds for projects in Indigenous communities during
    his tenure as economy minister under Evo Morales. (Reuters)
  - Corruption in the Philippines
  - Civil society groups and church representatives file complaints against Philippine
    vice president Sara Duterte at the Office of the Ombudsman, accusing her of plunder,
    violations of Anti-Graft and Corrupt Practices Act, bribery, and betrayal of public
    trust. (Bloomberg) (Rappler)
  - Police in Mashhad, Iran, arrest Nobel laureate Narges Mohammadi during a ceremony
    honoring deceased lawyer and human rights activist Khosrow Alikordi. (AP)
