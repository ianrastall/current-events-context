Date: '2025-12-11'
Source_URI: Portal:Current events/2025 December 11
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - 2025 Sumy offensive, Russian attacks on civilians in the Russo-Ukrainian war
  - Two people are killed and two others injured by a Russian guided bomb strike on
    a shop in Velyka Pysarivka, Sumy Oblast, Ukraine. (Ukrainska Pravda)
  - 2025 Cambodia‒Thailand conflict
  - The death toll during the clashes between the Thai Army and the Cambodian Army
    at the border increases to eight Thai soldiers, eleven Cambodian civilians and
    four Thai civilians. (Al Jazeera)
  - Nigerian bandit conflict
  - Eleven bandits are killed and several more injured in an ambush by the Nigerian
    Army in Sabon Birni, Sokoto State, Nigeria. The bandits allegedly planned an attack
    on a nearby village. (The Guardian)
  - The Game Awards 2025
  - 'Clair Obscur: Expedition 33 receives thirteen nominations and nine wins, the
    most in the show''s history, including Game of the Year. (NPR)'
  - Greek economic minister Kyriakos Pierrakakis is elected the new president of the
    Eurogroup, succeeding Paschal Donohoe. (Reuters)
  - Two people are killed and two others are trapped when an under-construction library
    collapses in Gwangju, South Korea. (Reuters)
  - One person is killed and several others are injured when a boat carrying migrants
    overturns on the Sava river near Slavonski Brod, Croatia. (AP)
  - Hijab and burqa controversies in Europe
  - Austria passes a law banning hijabs and burqas being worn in schools by girls
    aged under 14. (BBC News)
  - Brazilian police arrest former Peruvian foreign minister Augusto Blacker Miller
    in Rio de Janeiro, where he is located after evading authorities following an
    Albanian court conviction for fraud and an active Interpol notice. (Reuters)
  - A military court in Pakistan sentences former Inter-Services Intelligence director
    general Faiz Hameed to 14 years in prison on charges related to engaging in political
    activities and violations of the Official Secrets Act. (AP)
  - 2025 Bulgarian budget protests
  - The Zhelyazkov Government resigns after weeks of massive protests against economic
    policies and alleged corruption. (The Guardian)
  - 2025 Falkland Islands general election
  - Falklanders vote to elect eight members of the Legislative Assembly. (Falkland
    Islands TV)
  - The General Confederation of the Portuguese Workers and the General Union of Workers,
    which together represent nearly 1 million workers in Portugal, launch a general
    strike across the country to protest against the government's planned changes
    to labour laws. (AP)
  - Match fixing in tennis
  - The International Tennis Integrity Agency fines French player Quentin Folliot
    US$70,000 and suspends him from play for 20 years for alleged match-fixing. He
    is the sixth player to be fined in a wider investigation involving other French
    and Italian players. (AP)
