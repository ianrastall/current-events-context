Date: '2025-12-25'
Source_URI: Portal:Current events/2025 December 25
Intelligence_Payload:
  Uncategorized:
  - War against the Islamic State
  - 2025 United States strikes in Nigeria
  - The United States Armed Forces launch airstrikes on over 70 locations in Sokoto
    State, Nigeria, targeting Islamic State camps on orders of U.S. president Donald
    Trump. An unknown number of casualties are confirmed. (BBC News) (CBS News)
  - Russo-Ukrainian war
  - Violations of non-combatant airspace during the Russo-Ukrainian war
  - The Polish Air Force intercepts and escorts a Russian aerial reconnaissance aircraft
    over international waters in the Baltic Sea away from nearby Polish airspace.
    (DW)
  - Israel–Hezbollah conflict, Iran–Israel relations
  - Three people are killed in two separate Israeli airstrikes targeting vehicles
    in southern Lebanon, including a member of the Iranian Quds Force. (Al Jazeera)
    (Reuters)
  - Turkey–Islamic State conflict
  - Turkish authorities seize weapons and documents and arrest 115 suspects in Istanbul,
    connected with Islamic State-planned attacks on non-Muslims at Christmas and New
    Year's festivals across the country. (BBC News)
  - A bus falls into a ravine in Del Gallego, Camarines Sur, Philippines, killing
    six passengers and injuring more than 20. (GMA News)
  - Niger–United States relations
  - Niger imposes an indefinite ban on issuing visas to and admitting United States
    citizens to reciprocate the ban on Nigeriens from entering the U.S. (APA News)
  - 2024 Venezuelan political crisis
  - Venezuela states that it has released 99 people detained after protests over the
    2024 presidential election. (Reuters)
  - A woman is found dead and two other people are wounded in an attack in Boden,
    Sweden. The perpetrator is shot and killed by police. (Reuters)
  - Elections in Somalia
  - Residents of Mogadishu, Somalia, vote to elect 390 district council members who
    will select the city's mayor, marking Somalia's first direct election since 1969,
    serving as a pilot for planned nationwide polls. (Reuters)
