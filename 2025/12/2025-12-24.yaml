Date: '2025-12-24'
Source_URI: Portal:Current events/2025 December 24
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Israel–Hezbollah conflict
  - An alleged Hezbollah member is killed in an airstrike by the Israel Defense Forces
    on a vehicle near Jannata, Tyre District, South Governorate, Lebanon. (MSN)
  - Syrian conflict
  - Three former officials of the al-Assad regime are killed in clashes with Syrian
    security forces near Jableh, Latakia Governorate. (AFP via Al Arabiya)
  - Religious violence in Nigeria
  - At least six people are killed, including the perpetrator, and 35 others are injured
    in a suicide bombing by a Boko Haram terrorist at a mosque in Maiduguri, Borno
    State, Nigeria. (The Punch) (Reuters)
  - An explosive device kills two police officers and the suspected perpetrator in
    Moscow, Russia, near where Russian lieutenant general Fanil Sarvarov was killed
    in a separate bombing two days prior. (BBC News)
  - Mediterranean Sea migrant smuggling
  - A boat carrying 117 migrants capsizes in the Mediterranean Sea, killing 116 people
    and leaving only one survivor. (Daily Express)
  - Five people are killed when a rescue helicopter crashes on Mount Kilimanjaro in
    Tanzania. (Reuters)
  - Algeria–France relations
  - The Algerian parliament unanimously passes a law classifying France's colonization
    of the country as a crime, criminalizing its glorification, and asserting France's
    legal responsibility to apologize and provide reparations. (AP)
  - The Ghanaian information ministry arrests 48 Nigerians allegedly participating
    in cybercrime operations on the outskirts of Accra. (DW)
  - 2025 Honduran general election
  - The Honduran National Electoral Council declares National Party candidate Nasry
    Asfura winner of the presidential election almost one month after it was held.
    (BBC News)
