Date: '2025-12-02'
Source_URI: Portal:Current events/2025 December 2
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza hostage crisis
  - Hamas returns the remains of an unidentified person, possibly a hostage, to Israeli
    authorities to be examined by forensics experts. (PBS)
  - Insurgency in Khyber Pakhtunkhwa
  - 2025 Bannu ambush
  - A government administrator, two of his guards and a passerby are killed in an
    ambush against a vehicle in Bannu, Khyber Pakhtunkhwa, Pakistan. (AP)
  - The Winter Egg, one of the few Fabergé eggs remaining in private hands, sells
    at Christie's in London, England, United Kingdom, for £22.9 million (US$30.2 million),
    setting a new auction record for a work by the House of Fabergé. (CNN)
  - Indonesia–Netherlands relations
  - Indonesia and the Netherlands agree to repatriate two elderly Dutch nationals
    convicted of drug trafficking, including one on death row, on humanitarian grounds,
    following a request from Dutch king Willem-Alexander. (Reuters)
  - United States–Venezuela relations, Deportation in the second Trump administration
  - Venezuela approves the United States's request to resume deportation flights,
    reversing a brief suspension imposed following U.S. president Donald Trump's declaration
    that Venezuelan airspace was "closed". (AFP via Al Arabiya)
  - 2025 Samaritan's Purse Cessna 208 hijacking
  - A Cessna 208 Caravan operated by Samaritan's Purse to distribute humanitarian
    aid to Maiwut County is hijacked in Juba by a gunman who tried to divert the plane
    to Chad, but is apprehended after landing to refuel in Wau, South Sudan. (AP)
  - Colombian authorities detain 17 children and nine adults belonging to the fundamentalist
    Jewish cult Lev Tahor, citing concerns about the safety of the children in the
    group. Five of the children had American and Guatemalan passports, and all 26
    members were flown to New York to await investigations into their welfare. (AP)
  - Former European Union foreign and security policy chief Federica Mogherini and
    two others are arrested in Belgium amid a fraud investigation. (The Guardian)
  - Tunisian police arrest former human rights minister Ayachi Hammami to enforce
    a five-year prison sentence for a state-security conspiracy conviction issued
    amid recent appellate court rulings that imposed long jail terms on opposition
    figures. (Reuters)
  - 2025 Guinea-Bissau coup d'état, 2025 Guinea-Bissau general election
  - The Bissau-Guinean electoral commission announces that it is unable to release
    election results after armed men destroyed nearly all election tally sheets during
    the coup. (AFP via France 24)
  - 2025 Saint Lucian general election
  - Incumbent Saint Lucian prime minister Philip J. Pierre wins a second term in office
    while his party, the Saint Lucia Labour Party, wins 14 of the 15 seats in Parliament
    against the opposition United Workers Party. (AP)
  - 2026 Haitian general election
  - The Transitional Presidential Council of Haiti announces that presidential and
    legislative elections will be held in August 2026. (AFP via France 24)
  - The Bulgarian parliament withdraws its draft 2026 budget, originally prepared
    for the adoption of the euro, following nationwide protests against proposed tax
    increases. (Reuters)
  - Nigerian president Bola Tinubu appoints retired army general Christopher Gwabin
    Musa as defence minister, following Mohammed Badaru Abubakar's resignation amid
    a nationwide security emergency. (AFP via The Africa Report)
