Date: '2025-12-10'
Source_URI: Portal:Current events/2025 December 10
Intelligence_Payload:
  Uncategorized:
  - 2025 United States naval deployment in the Caribbean, United States–Venezuela
    relations
  - Operation Southern Spear
  - The United States Coast Guard seizes an oil tanker off the coast of Venezuela.
    The ship was flying the Guyanese flag, despite not being registered in that country,
    and was en route to a port in Cuba. (CNBC) (Reuters)
  - Insurgency in Balochistan
  - Sistan and Baluchestan insurgency
  - Three members of the Islamic Revolutionary Guard Corps are killed after an ambush
    by gunmen in Sistan and Baluchestan province, Iran. (AP)
  - M23 campaign, Democratic Republic of the Congo–Rwanda conflict
  - 2025 Uvira offensive
  - M23 takes control of Uvira, South Kivu Province, Democratic Republic of the Congo.
    (AP via ABC News)
  - Myanmar civil war
  - Conflict in Rakhine State
  - At least 34 people are killed and 80 more injured in a Tatmadaw airstrike on a
    hospital in Mrauk U, Rakhine State, Myanmar. (AP via ABC News) (BBC News)
  - Eurovision Song Contest 2026, Boycotts of Israel
  - Iceland announces that it will join Ireland, the Netherlands, Spain, and Slovenia
    in boycotting next year's Eurovision Song Contest in Austria in protest of Israel's
    participation. (Reuters)
  - Tourism in the United States
  - The U.S. Customs and Border Protection files a proposal to request mandatory checks
    on email and social media accounts for all future Visa Waiver Program applicants.
    (Nine News Australia) (BBC)
  - 2025 Fez buildings collapse
  - Twenty-two people are killed and several more injured during the collapse of two
    adjacent buildings in Fez, Morocco. (Reuters)
  - At least one person is killed and two others are injured when a fire engulfs a
    large market in Saint Petersburg, Russia. (NDTV)
  - Bolivia–Israel relations
  - Bolivia and Israel formally restore diplomatic relations, which were severed in
    response to the Gaza war by former Bolivian president Luis Arce in 2023. (AP)
  - 2025 Beninese coup attempt
  - Benin's government reports that Lieutenant Colonel Pascal Tigri, identified as
    the leader of the failed coup attempt, flees to Togo, becoming the subject of
    an extradition request following arrests linked to the plot. (Reuters)
  - 2025 Louvre heist
  - The French cultural ministry reports to the Senate that the Louvre's closed-circuit
    television camera captured the October jewel theft but was unmonitored at the
    time, adding that the lapses form part of a wider inquiry into related procedural
    and equipment failures. (ABC News)
  - Flood control projects scandal in the Philippines
  - Philippine president Bongbong Marcos announces the cancellation of former Ako
    Bicol representative Zaldy Co's passport and directs government agencies to facilitate
    Co's return to the Philippines as investigators examine his alleged involvement
    in a large-scale flood control corruption scheme. (Gulf News)
  - Terrorism in Canada
  - Canada designates 764, Islamic State – Mozambique Province, Terrorgram, and Maniac
    Murder Cult as terrorist entities. (CBC News) (Reuters)
  - Former Bolivian president Luis Arce is arrested as part of an investigation into
    alleged embezzlement during his tenure as economy minister. (Reuters)
  - 2025 Bulgarian budget protests
  - Tens of thousands of people hold nationwide protests in Bulgaria, calling for
    Prime Minister Rosen Zhelyazkov's government to resign over alleged corruption
    and dissatisfaction with proposed fiscal measures. (AP)
  - 2025 Honduran general election
  - Supporters of the ruling Liberty and Refoundation party hold protests across Honduras,
    demanding the results of the presidential election to be annulled after prolonged
    delays in the vote count and allegations of fraud, and calling for a rerun of
    the election. (AAP via The Canberra Times)
  - Arrest of Jair Bolsonaro
  - The Brazilian Chamber of Deputies approves a bill that reduces penalties for certain
    crimes, including attempted coup, which could significantly shorten former president
    Jair Bolsonaro's 27-year prison sentence. (AFP via France 24)
  - Censorship in Vietnam
  - The Vietnamese National Assembly adopts amendments to its press and state secrets
    laws that expand government authority to compel journalists to disclose sources
    and broaden the range of information classified as state secrets. (Reuters)
  - Brazil–China relations
  - Brazil and China begin constructing a joint laboratory for radio astronomic technology
    with the Federal University of Campina Grande and the Federal University of Paraíba
    to support space research as both countries work on the BINGO radio telescope.
    (Reuters)
  - 2025 SEA Games
  - Cambodia withdraws its entire delegation from the SEA Games, citing security concerns
    arising from its escalating border conflict with the host nation Thailand. (AFP
    via France 24)
