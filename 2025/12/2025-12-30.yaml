Date: '2025-12-30'
Source_URI: Portal:Current events/2025 December 30
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli blockade of the Gaza Strip, Gaza Strip famine, Gaza genocide
  - Israel announces the suspension of many international humanitarian organizations,
    including Doctors Without Borders, the International Rescue Committee, and divisions
    of Oxfam and Caritas, from operating in Gaza starting January 1 for allegedly
    failing to pass new rules to vet the organizations and cooperating with Hamas
    and other militant groups. (AP)
  - Yemeni civil war
  - 2025 Southern Yemen offensive, Saudi-led intervention in the Yemeni civil war,
    Saudi Arabia–United Arab Emirates relations
  - The Royal Saudi Air Force strikes the port of Mukalla, Yemen, targeting a ship
    with weapons delivered from the United Arab Emirates (UAE) to the Southern Transitional
    Council. (AP)
  - Yemen ends its defense pact with the UAE, with its leader Rashad al-Alimi ordering
    all Emirati forces to depart within 24 hours. He also declares a 90-day national
    state of emergency and a three-day blockade of the country's southern and eastern
    regions. The UAE later announces that its remaining forces in Yemen will leave
    the country. (Reuters) (Morocco World News)
  - Somali Civil War
  - 2025 Shabelle offensive
  - 29 al-Shabaab militants are killed by the Somali Armed Forces in Jabad Godane,
    Middle Shabelle, Somalia. (Reuters)
  - Economy of Hungary
  - Moody's downgrades the credit rating of the city of Budapest, Hungary, to Ba1
    and places it on review for a further cut, citing weak liquidity, uncertainty
    over state transfers, rising solidarity tax obligations, and the partial suspension
    of European Union funds to Hungary. (Reuters)
  - 2025 Ollantaytambo District train collision
  - Two trains on a rail line between Cusco to Machu Picchu in Urubamba province,
    Peru, collide, killing a train driver and injuring 40 passengers. (Al Jazeera)
    (CBS News)
  - Search for Malaysia Airlines Flight 370
  - The search for the wreckage of Malaysia Airlines Flight 370 resumes in the southern
    Indian Ocean under a contingent fee agreement between the Malaysian government
    and Ocean Infinity, which has deployed autonomous underwater vehicles. (AFP via
    France 24)
  - The South African Police Service confirms at least 41 young men were killed from
    circumcision procedures during traditional initiation activities over the past
    two months in South Africa. (MSN)
  - Burkina Faso–United States relations, Mali–United States relations
  - Burkina Faso and Mali impose reciprocal travel bans on Americans after the United
    States added them to a list of countries subject to a full U.S. entry ban. (Reuters)
  - Deportation in the second Trump administration
  - U.S. federal judge Angel Kelley of Massachusetts blocks the Trump administration's
    plan to end temporary protected status for South Sudanese nationals, issuing an
    administrative stay that prevents the expiration of deportation protections while
    a legal challenge proceeds. (Reuters)
  - Turkey–Islamic State conflict
  - Turkish police detain 357 people nationwide suspected of being Islamic State members
    following clashes between the two sides yesterday. (DW)
  - Western Syria clashes
  - Syrian authorities arrest 21 people in the Latakia Governorate and impose a curfew
    in the provincial capital following sectarian violence linked to unrest after
    a mosque bombing and protests in Alawite-majority areas. (AFP via Al Arabiya)
  - 2025 Guinean presidential election
  - Provisional results show that incumbent leader Mamady Doumbouya is elected president.
    (Reuters)
  - 2026 Republic of the Congo presidential election
  - Congolese president Denis Sassou Nguesso announces his candidacy for re-election
    in the upcoming election. (AFP via France 24)
