Date: '2025-12-13'
Source_URI: Portal:Current events/2025 December 13
Intelligence_Payload:
  Uncategorized:
  - M23 campaign, Democratic Republic of the Congo–Rwanda conflict
  - 2025 Uvira offensive
  - The March 23 Movement states that it has captured several hundred Burundian soldiers
    during its recent offensive in eastern Democratic Republic of the Congo, including
    around Uvira. (Reuters)
  - Middle Eastern crisis
  - Gaza war
  - The Israeli military kills Ra'ad Sa'ad, a senior Hamas military commander, in
    an airstrike against a vehicle in Gaza City, in violation of the ceasefire. Four
    other people were also killed in the attack, and 25 more injured. (The Times of
    Israel) (Al Jazeera)
  - Israel–Hezbollah conflict
  - The Israeli military issues an evacuation order in southern Lebanese villages
    in preparation for planned airstrikes on Hezbollah targets. (The Jerusalem Post)
  - Syrian conflict
  - An attacker identified by the United States Central Command as a member of ISIL
    opens fire on a joint Syrian and American convoy in Palmyra, killing two U.S.
    service members and one American civilian interpreter and injuring three others,
    before being killed by return fire. (SANA via Al Jazeera)
  - Sudanese civil war
  - Kordofan Campaign
  - A Rapid Support Forces (RSF) drone strike kills at least three people in El-Obeid,
    North Kordofan, Sudan. (Al Jazeera)
  - An RSF drone strike on a United Nations base in Kadugli, South Kordofan, Sudan,
    kills six Bangladeshi peacekeepers and injures eight others. (Al Jazeera)
  - 2025 Cambodia–Thailand conflict
  - In response to resumed clashes with Thailand, Cambodia shuts down its border crossings
    with Thailand. (BBC News)
  - United States president Donald Trump says a new ceasefire has been brokered. However,
    hours later, Thai leaders announce an increased commitment to fighting Cambodian
    forces. (France 24)
  - Nine African migrants die due to freezing temperatures near the Algeria–Morocco
    border. (MSN)
  - Eight people are killed and five others are injured after a multicab falls into
    rocky terrain in Ayungon, Negros Oriental, Philippines. (The Philippine Star)
  - Mass shootings in the United States, School violence in the United States
  - 2025 Brown University shooting
  - Two people are killed and nine others are injured in a mass shooting at Brown
    University in Providence, Rhode Island, United States. The suspect fled the scene
    and is not in custody. (NBC News) (BNO News)
  - Human rights in Belarus, Belarus–United States relations
  - Belarus releases 123 political prisoners, including Nobel Peace prize laureate
    Ales Bialiatski and protest leader Maria Kalesnikava, from prisons after the United
    States lifts its sanctions. (BBC)
  - War on drugs
  - Spanish authorities dismantle a drug-trafficking network that uses helicopters
    to transport large quantities of hashish from Morocco into southern Spain, arresting
    six suspects in a joint operation involving several European countries. (AFP via
    Arab News)
  - Islamic terrorism in Europe
  - Munich police arrest five men, including three Moroccans, one Egyptian, and one
    Syrian of allegedly planning to attack a Christmas market in Dingolfing, Bavaria,
    Germany. (DW)
