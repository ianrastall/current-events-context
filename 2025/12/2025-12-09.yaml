Date: '2025-12-09'
Source_URI: Portal:Current events/2025 December 9
Intelligence_Payload:
  Uncategorized:
  - M23 campaign, Democratic Republic of the Congo–Rwanda conflict
  - 2025 Uvira offensive
  - M23 captures Sange, South Kivu, from the Congolese government and Burundian troops.
    (Al Jazeera) (SOS Media Burundi)
  - M23 enter Uvira, with at least 20,000 people fleeing across the Burundi–DRC border
    and reach Bujumbura. (Actualité in French) (TRT World)
  - 2025 Cambodia‒Thailand conflict
  - The Royal Thai Air Force carries out several airstrikes against Cambodia, killing
    nine civilians and wounding 20 more. (Al Jazeera)
  - Three Thai soldiers are killed and 29 more injured during clashes with Cambodian
    soldiers. (Al Jazeera)
  - Sudanese civil war
  - Dozens of people are killed in a drone strike by the Sudanese Armed Forces on
    an oil field in Heglig, West Kordofan, Sudan. (AP)
  - 2025 Turner Prize
  - British autistic artist Nnena Kalu wins the 2025 Turner Prize for her wrapped
    fabric sculptures, becoming the first artist with a learning disability to win
    the award. (AFP via The Sun Malaysia) (The Guardian)
  - 2025 IndiGo disruption
  - The Directorate General of Civil Aviation of India orders IndiGo, the country's
    largest airline, to reduce its flights by 5% following a scheduling crisis last
    week that caused thousands of cancellations. (DW)
  - Pakistani economic crisis
  - The International Monetary Fund (IMF) approves the release of US$1.2 billion to
    Pakistan to assist with recovery from an economic crisis. The country has already
    received $3.3 billion from the IMF since last year. (AP)
  - 2025 Terra Drone Building fire
  - Twenty-two people are killed, while 19 are rescued, in a fire at a seven-story
    building in Jakarta, Indonesia. (AP)
  - Twelve people are killed and four more are injured in a fire at a four-story building
    in Shantou, Guangdong, China. (AFP via Arab News)
  - Seven people are killed when a Russian Air Force Antonov An-22 military transport
    aircraft crashes during a test flight following repairs in Ivanovo Oblast, Russia.
    (Reuters)
  - A Sudanese Air Force Ilyushin Il-76 aircraft crashes while landing at an air base
    in Port Sudan, Red Sea State, Sudan, killing all crew members. (Al Jazeera)
  - 2025 Catalonia swine fever outbreak
  - The Catalan government in Spain announces a state of emergency due to the rapid
    spread of African swine fever virus in wild boars in a region to avoid spreading
    to other regions of Spain. (20minutos in Spanish)
  - Belarus–Lithuania relations, Violations of non-combatant airspace during the Russo-Ukrainian
    war
  - Lithuania declares a state of national emergency over security risks from Belarusian
    weather balloons violating Lithuanian airspace. (AP)
  - War in Darfur
  - International Criminal Court investigation in Darfur
  - The International Criminal Court sentences Janjaweed militia leader Ali Kushayb
    to 20 years in prison for war crimes and crimes against humanity committed during
    the war in Darfur. (Reuters)
  - Catholic Church sexual abuse cases
  - Cardinal Timothy Dolan of the Roman Catholic Archdiocese of New York in the United
    States announces the archdiocese will set up a $300 million fund to compensate
    victims of sexual abuse who have sued the church. (AP)
  - Malaysia Airlines Flight 370
  - A court in Beijing, China, orders Malaysia Airlines (MH) to pay 2.9 million (US$410,000)
    each to families of eight missing passengers of MH370, which disappeared after
    departing from Kuala Lumpur to Beijing in 2014. (AP)
  - Operation Synytsia
  - A court in Villajoyosa, Spain, provisionally closes its investigation into the
    killing of Russian defector Maxim Kuzminov in the town after authorities cannot
    identify any perpetrators. (Reuters)
  - School violence in the United States
  - One person is killed and another is critically injured in a shooting at Kentucky
    State University in Frankfort, Kentucky, United States. A suspect is taken into
    custody. (BNO News)
  - Australia's Online Safety Amendment takes effect, age-restricting social media
    sites such as Facebook, Twitter (X), TikTok, and YouTube, as well as accounts
    on the said sites registered to users under the age of 16. (CNN)
  - The Nepalese Commission for the Investigation of Abuse of Authority charges 55
    people, including former ministers and officials, and a Chinese engineering company
    with fraud related to inflating expenses in the construction of Pokhara International
    Airport. (AP)
  - 2025 Czech parliamentary election
  - Andrej Babiš of the opposition ANO party is appointed as Prime Minister of the
    Czech Republic for his second non-consecutive term. (Reuters)
  - 2025 Guinea-Bissau coup d'état
  - Guinea-Bissau's military junta adopts a one-year transitional charter that suspends
    the constitution, bars the interim leaders from contesting forthcoming elections,
    and assigns the junta authority over political and institutional reforms until
    new elections are held at the end of the transition. (Reuters)
  - 2025 Honduran general election
  - Honduran president Xiomara Castro denounces the manipulation of the election results,
    which are still being counted, and accuses U.S. president Donald Trump of interference.
    (AFP via France 24)
  - The Slovak parliament votes to abolish the country's whistleblower protection
    office and replace it with a new body. (Reuters)
  - Chinese space program
  - Chinese astronauts install debris-shielding on the Tiangong space station following
    damage to the docked Shenzhou 20 reentry capsule from orbital debris, and the
    crew conducts a spacewalk to prepare the compromised spacecraft for an uncrewed
    return. (Reuters)
  - 2025 SEA Games
  - The 2025 SEA Games opens at the Rajamangala Stadium in Bangkok, Thailand, with
    heightened security for Cambodian athletes and staff due to the ongoing Cambodia–Thailand
    conflict. (AFP via France 24)
