Date: '2025-11-13'
Source_URI: Portal:Current events/2025 November 13
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Gaza war hostage crisis
  - Hamas hands over the remains of one more Israeli hostage to the Israeli military.
    (Xinhua)
  - Israeli settler violence, Israeli incursions in the West Bank during the Gaza
    war
  - Israeli settlers set fire to the Hajja Hamida mosque in Deir Istiya in the West
    Bank and deface the mosque's exterior wall in defiance of an Israeli government
    rebuke of settler violence. (DW)
  - Russo-Ukrainian war
  - Attacks in Russia during the Russian invasion of Ukraine
  - Ukrainian FP-5 Flamingo and drones strike Oryol in Oryol Oblast, Russia, damaging
    several cars and apartments, while several drones are shot down by air defense.
    (The Kyiv Independent)
  - The Ukrainian intelligence directorate claims to have derailed a train carrying
    North Korean weapons to Russia on the Trans-Siberian Railway, near Sosnovka in
    Khabarovsk Krai, using explosives. (United24)
  - Haitian conflict
  - Seven gang members are killed during a Haitian police operation in Croix-des-Bouquets,
    Ouest, where officers also destroy a helicopter that made an emergency landing
    to prevent its capture. (AP)
  - Eight people are killed and 15 others are injured after two trucks collide head-on
    in Pune, Maharashtra, India. (NDTV)
  - Four people are killed after two migrant vessels carrying nearly 100 passengers
    capsize off the coast of Al-Khums, Murqub District, Libya. (Reuters)
  - Three people are killed and 20 others are reported missing after landslides hit
    Java, Indonesia. (AP)
  - A truck crashes into pedestrians at an outdoor market in Bucheon, Gyeonggi Province,
    South Korea, killing two people and injuring 18 others. (AP)
  - During a training flight, a Sukhoi Su-30SM crashes in Prionezhsky District, Republic
    of Karelia, Russia. The two crew members are killed. (Aviation Safety Network)
  - The Africa Centres for Disease Control and Prevention reports about 300,000 confirmed
    and suspected cholera cases in the continent, mostly in Angola and Burundi, and
    more than 7,000 deaths in 2025, marking Africa's largest outbreak in 25 years
    and a more than 30% increase from the previous year. (Reuters)
  - 2025 Islamabad suicide bombing, 2025 Afghanistan–Pakistan conflict
  - Pakistani interior minister Mohsin Naqvi says that Afghan nationals carried out
    Tuesday's suicide bombing in Islamabad, which killed 12 people and injured many
    others, adding that the attack was planned and directed from Afghanistan, increasing
    tensions between the countries. (AP)
  - Latin America–United States relations, Tariffs in the second Trump administration
  - The United States announces new trade agreements with Argentina, Ecuador, El Salvador,
    and Guatemala that lower tariffs on selected goods and expand market access for
    U.S. products. (AFP via Buenos Aires Times)
  - Syria–United Kingdom relations
  - Syrian foreign minister reopens the country's embassy in London, United Kingdom,
    after it was closed in 2013 following the start of the Syrian civil war. (AP)
  - Human trafficking in Spain
  - Spanish police dismantle an alleged international network accused of trafficking
    minors from the Canary Islands to France, arresting eleven suspects in operations
    in Lanzarote, Las Palmas, and Madrid. (Reuters)
  - Aftermath of the July Revolution
  - Bangladeshi chief adviser Muhammad Yunus announces a national referendum on the
    July Charter, which recognizes the 2024 uprising that ousted former prime minister
    Sheikh Hasina. (Reuters)
  - The state of Victoria enacts Australia's first treaty with Indigenous peoples,
    establishing a permanent First Peoples' Assembly and a truth-telling commission
    as part of a formal state–Indigenous governance framework. (Reuters)
  - Tanzanian president Samia Suluhu Hassan appoints MP Mwigulu Nchemba as prime minister,
    who is confirmed by parliament. (Reuters)
  - In the United States, Blue Origin launches NASA's ESCAPADE spacecraft mission
    to study Mars' magnetosphere. It is the second launch of Blue Origin's New Glenn
    launch vehicle, and the first successful landing of the vehicle's reusable first
    stage. (The New York Times)
  - The governing board of Major League Soccer (MLS), the top men's association football
    league in Canada and the U.S., votes to change its season from its current calendar-year
    schedule to a summer-to-spring schedule spanning two calendar years, aligning
    MLS with most international leagues. The first season under the new calendar will
    be 2027–28, with an abbreviated transitional season from February to May 2027.
    (ESPN)
