Date: '2025-11-03'
Source_URI: Portal:Current events/2025 November 3
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Gaza war hostage crisis
  - The Israel Defence Forces return the remains of 45 Palestinian prisoners in exchange
    for Hamas returning the remains of three hostages yesterday. (The Washington Times)
  - Israeli settler violence
  - Two Palestinian teenagers are killed in separate attacks by Israeli settlers in
    Hebron and Beit Furik respectively, in the occupied West Bank. (Jordan News)
  - Sudanese civil war, Famine in Sudan
  - The Integrated Food Security Phase Classification review committee reports that
    famine is detected in two Sudanese regions, Darfur and South Kordofan, amid increased
    fighting between the Sudanese Armed Forces and the Rapid Support Forces, which
    blocks humanitarian access. (NPR)
  - At least 40 people are killed and dozens of others are injured in a drone attack
    by the Rapid Support Forces on a funeral in North Kordofan. (AA)
  - 2025 BBC editorial bias allegations
  - The Daily Telegraph publishes an internal memo leaked by Michael Prescott alleging
    media bias in the BBC. (The Daily Telegraph) (The i Paper)
  - The 2025 Miguel de Cervantes Prize is awarded to Mexican writer Gonzalo Celorio.
    (Euronews)
  - 2025 Balkh earthquake
  - A earthquake strikes near Mazar-i-Sharif, Balkh, Afghanistan, killing at least
    20 people, injuring hundreds others, and damaging the historic Blue Mosque. (Reuters)
    (DW)
  - 2025 Pacific typhoon season
  - At least two people are killed and tens of thousands are displaced as Typhoon
    Kalmaegi makes landfall in Central Visayas, Philippines. (AP via ABC News)
  - 2025 Nepal snowstorm disaster
  - Seven people are killed and eight injured when an avalanche strikes a base camp
    on a mountain in Nepal. (The Free Press Journal) (CTV News)
  - 2025 Shap derailment
  - A landslide causes a West Coast Main Line passenger train to derail near Shap,
    Cumbria, United Kingdom, injuring four people. (Sky News) (Avanti West Coast)
  - At least 20 people are killed and several others are injured when a truck collides
    with a bus in Ranga Reddy district, Telangana, India. (India TV)
  - At least 19 people are killed and 40 people are injured when a speeding dump truck
    collides with 17 vehicles in Jaipur, Rajasthan, India. (India Today)
  - At least 15 people, mostly children, are missing and presumed dead after floods
    and landslides strike Highland Papua, Indonesia, following heavy rainfall. (Reuters)
  - A part of the Torre dei Conti tower collapses in Rome, Italy, killing a worker
    and critically injuring another. (Reuters)
  - Demographics of Papua New Guinea
  - The results of the 2024 census in Papua New Guinea show that the country has surpassed
    the line of 10 million inhabitants, significantly below the 2023 UN estimate of
    11.8 million. (RNZ)
  - 10th Summit of the Americas
  - The Dominican Republic postpones the Summit of the Americas until next year, citing
    regional tensions following U.S. military operations near Venezuela and storm
    damage in several participating countries. (AFP via FMT)
  - Mexico–Peru relations
  - Peru announces it has severed diplomatic relations with Mexico, citing Mexico's
    decision to grant asylum to former Peruvian prime minister Betssy Chávez, as well
    as alleged interference in Peru's internal political affairs following President
    Pedro Castillo's 2022 self-coup. (DW)
  - Mexican drug war
  - Mexican security forces kill 13 suspected gunmen and arrest four others in Guasave,
    Sinaloa, during an armed confrontation that also leads to the rescue of nine kidnapped
    individuals. (Reuters) (Infobae)
  - Piracy off the coast of Somalia
  - A commercial tanker is attacked by suspected Somali pirates off the coast of Mogadishu,
    Somalia. (Reuters)
  - 2024 Spanish floods
  - Carlos Mazón resigns as President of the Valencian government following sustained
    criticism of his government's response to the floods in the region last year.
    (The Guardian) (elDiario.es)
  - 2025 Guinean presidential election
  - Incumbent Guinean president Mamady Doumbouya submits his candidacy for the election.
    The election is being held under a new constitution. (BBC News)
  - 2025 Tanzanian general election
  - Incumbent Tanzanian president Samia Suluhu Hassan is sworn in for a second term
    in office after winning a disputed election last Wednesday, which sparked deadly
    protests across the country. (AP)
