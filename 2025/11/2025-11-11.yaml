Date: '2025-11-11'
Source_URI: Portal:Current events/2025 November 11
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Pokrovsk offensive
  - Hundreds of Russian troops enter the city of Pokrovsk in Donetsk Oblast with heavy
    street-to-street fighting underway. (Reuters)
  - 2025 Islamabad suicide bombing
  - Twelve people are killed and 27 injured in a suicide bombing outside a court in
    Islamabad, Pakistan. (Al Jazeera)
  - Israeli settler violence
  - Israeli settlers set fire to dozens of vehicles and other property in Beit Lid
    and Deir Sharaf in the West Bank and attack Israeli soldiers who were dispatched
    to the area, injuring four Palestinians, while four Israelis are arrested. (DW)
  - 2025 Turkish Air Force Lockheed C-130 crash
  - Twenty people are killed when a Turkish Air Force C-130 Hercules cargo plane crashes
    near the Azerbaijan–Georgia border. (Euronews) (AP)
  - Electricity sector in the Dominican Republic
  - The Dominican Republic experiences a rare countrywide blackout, which officials
    blame on a failure in the power transmission grid. (AP)
  - Twenty people are injured when three Sarmiento trains derail in Liniers, Buenos
    Aires, Argentina. (Todos Noticias in Spanish)
  - Colombia–United States relations, 2025 United States military strikes on alleged
    drug traffickers
  - Colombian president Gustavo Petro orders public forces to halt intelligence sharing
    with the United States Intelligence Community until the U.S. ceases its military
    strikes on vessels in the Caribbean Sea. (Reuters)
  - Japan–Russia relations, International sanctions during the Russo-Ukrainian war
  - Russia indefinitely bans 30 Japanese nationals, including a foreign ministry official,
    from entering the country in response to Japan's sanctions on Russian entities
    over the war in Ukraine. (Reuters)
  - 2006 Noida serial murders
  - The Supreme Court of India acquits Surendra Koli of all remaining charges in the
    series of child murders and rapes which occurred between 2005 and 2006 in Noida,
    Uttar Pradesh, and ordering his immediate release. Koli was originally sentenced
    to death and was serving a life sentence for the remaining cases. (The Hindu)
  - 2024 South Korean martial law crisis
  - A high court in Seoul, South Korea, issues an arrest warrant for former National
    Intelligence Service director Cho Tae-yong for allegedly tampering with evidence
    regarding former president Yoon Suk Yeol's declaration of martial law, among other
    charges. (Reuters)
  - 2025 Turkish football betting scandal
  - A court in Istanbul, Turkey, issues arrest warrants for eight suspects involved
    in an investigation into alleged illegal sports betting by Turkish Football Federation
    referees, club presidents, and players. (DW)
  - Anti-war protests in Russia
  - A court in Saint Petersburg, Russia, extends street musician Diana Loginova's
    detention for 13 days for allegedly violating public order during an October performance
    that included anti-war songs, marking her third consecutive sentence since mid-October.
    (AP)
  - Corruption in Ukraine
  - The National Anti-Corruption Bureau of Ukraine starts investigating a large-scale
    corruption scheme in the country’s energy sector, involving the state nuclear
    power operator Energoatom. (EuroNews)
  - A Gabonese court sentences former first lady Sylvia Bongo Ondimba and her son,
    Noureddin Bongo Valentin, to 20 years in prison each for receiving and embezzling
    public funds, among other charges. Both were tried in absentia as they live in
    exile. (AFP via Barron's)
  - The Southwark Crown Court in London, United Kingdom, sentences Chinese fraudster
    Qian Zhimin to 11 years and eight months in prison for running a Ponzi scheme
    that defrauded over 128,000 investors and laundered the proceeds into Bitcoin,
    resulting in the recovery of about ₿61,000 in the country's largest cryptocurrency
    seizure. (AP)
  - 2025 Iraqi parliamentary election
  - Iraqis vote to elect the 329 members of the Council of Representatives, who will
    elect the country's president and approve the president's appointment of a prime
    minister. (AFP via Barron's)
  - 2025 Irish presidential election
  - Catherine Connolly is sworn in as the 10th president of Ireland. (BBC News)
  - Gun law in New Zealand
  - New Zealand announces the transfer of gun licensing responsibilities from the
    police to an independent Firearms Safety Authority reporting directly to the government.
    (AP)
  - Thousands of people protest in Belgrade, Serbia, against the proposed re-development
    of the former Yugoslav People's Army General Staff Building, which was delisted
    as a cultural asset last year. (DW)
  - The Sun emits a X5.1-class solar flare from sunspot AR4274, the most intense since
    October 2024. (Space)
