Date: '2025-11-19'
Source_URI: Portal:Current events/2025 November 19
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - At least 28 Palestinians are killed and 77 more are injured in a series of Israeli
    airstrikes in Gaza City and Khan Yunis in the Gaza Strip after Israel accused
    Hamas of firing at Israeli troops. (Al Jazeera) (Reuters)
  - Israel–Hezbollah conflict
  - One person is killed in an Israeli airstrike attack against a vehicle in Bint
    Jbeil, Lebanon. Several students are also wounded on a bus passing in the area.
    (Al Jazeera)
  - Russo-Ukrainian war
  - Russian attacks on civilians in the Russo-Ukrainian war
  - 2025 Ternopil apartment strike
  - Dozens of people are killed in a series of Russian missile and drone strikes across
    Ukraine, including 31 people killed and more than 100 others injured in a ballistic
    missile strike on a nine-story residential building in Ternopil. Many more remain
    missing with search and rescue operations underway. (Reuters) (Al Jazeera) (The
    Kyiv Independent)
  - Rojava conflict
  - Two Syrian soldiers are killed in a shootout with Syrian Democratic Forces militants
    in Raqqa. (Reuters)
  - Insurgency in Khyber Pakhtunkhwa
  - Twenty-three Pakistani Taliban militants are killed in two army raids in Kurram
    District, Khyber Pakhtunkhwa, Pakistan. (AP)
  - Islamist insurgency in Niger
  - At least 10 Niger Armed Forces soldiers are killed in an attack by Jama'at Nasr
    al-Islam wal-Muslimin in Garbougna, Tillabéri Region, Niger. (MSN)
  - Religious violence in Nigeria
  - Gunmen target a church in Eruku, Kwara state, Nigeria, killing two people and
    kidnapping the pastor and some worshippers. (Reuters)
  - 2025 National Book Awards
  - At the 76th National Book Awards, Rabih Alameddine wins the Fiction prize for
    his novel The True Story of Raja the Gullible (and His Mother), while Omar El
    Akkad wins the Nonfiction prize for his book One Day, Everyone Will Have Always
    Been Against This about the Gaza war. (NPR)
  - 2025 Ōita fire
  - One person is killed and another injured in a large-scale fire in Ōita, Japan.
    At least 170 homes are damaged and another 260 households remain without electricity.
    (NPR)
  - Sixty-four people are missing when a barge capsizes on the Sankuru River in Kasaï
    Province, Democratic Republic of the Congo. (AP)
  - Cambodian conservation groups release two captive-bred greater adjutants into
    the Siem Pang Wildlife Sanctuary for the first time, fitting them with GPS trackers
    as part of efforts to restore the species' wild population. (Reuters)
  - A suspected outbreak of tuberculosis kills ten inmates at a prison in Guayaquil,
    Ecuador. (Reuters)
  - Foreign relations of Iran, Foreign relations of the Marshall Islands
  - Iran releases a Marshall Islands-flagged tanker and its 21 crew after seizing
    it without explanation last Friday in the Strait of Hormuz. (AP)
  - Russia–United Kingdom relations
  - Russian Navy spy ship Yantar uses lasers to disrupt Royal Air Force aircraft monitoring
    the vessel in the North Sea for the first time. The ship was being followed by
    a Royal Navy frigate with Poseidon P-8 planes deployed to track its movements.
    (BBC News)
  - Epstein Files Transparency Act
  - United States president Donald Trump enacts a bill ordering the release of more
    information about Jeffrey Epstein's case, a day after Congress passed the bill.
    (Al Jazeera)
  - Human trafficking in Myanmar, Trafficking of Chinese nationals to scam centers
    abroad
  - The Tatmadaw conducts a raid on the scam center compound in Shwe Kokko, Myawaddy
    District, Myanmar, and detains 346 foreigners and confiscates nearly 10,000 mobile
    devices. (AP)
  - Koldo Case
  - Spain's Supreme Court orders the provisional release of former Socialist Party
    official Santos Cerdán, who is under investigation for alleged involvement in
    a criminal organization, bribery, and influence peddling in public works contracting,
    stating that the risk of evidence tampering has been reduced. The court requires
    him to surrender his passport. (Reuters)
  - Nord Stream pipelines sabotage
  - Italy's Supreme Court of Cassation approves a Ukrainian national's extradition
    to Germany, where he faces charges related to alleged involvement in the Nord
    Stream pipelines explosions in 2022. (Reuters)
  - Operation Midas
  - Ukraine's Verkhovna Rada dismisses energy minister Svitlana Hrynchuk and justice
    minister German Galushchenko after an anti-corruption investigation into alleged
    misconduct at the state nuclear agency implicated them, among other officials.
    (Reuters)
  - Ford Motor Co. issues a recall of over 200,000 Bronco and Bronco Sport vehicles
    due to a possible dashboard failure. (AP)
