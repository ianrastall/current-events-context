Date: '2025-11-25'
Source_URI: Portal:Current events/2025 November 25
Intelligence_Payload:
  Uncategorized:
  - Russo–Ukrainian war
  - Kyiv strikes, Attacks in Russia during the Russian invasion of Ukraine
  - Seven people in Kyiv, Ukraine, and three more in Rostov-on-Don, Russia, are killed
    as both countries launch airstrikes at each other. Several more people are wounded
    in both countries. (Al Jazeera) (The Guardian)
  - Afghanistan–Pakistan clashes
  - Afghanistan says nine children and a woman were killed when a civilian home was
    hit by a Pakistani airstrike in Khost, Afghanistan. (Al Jazeera)
  - War in Darfur
  - Médecins Sans Frontières withdraws its staff from a hospital in central Darfur,
    Sudan, after a stretcher bearer is shot dead and several others are injured, stating
    that it will not resume operations unless the Rapid Support Forces guarantee the
    safety of its personnel and patients. (Reuters)
  - Moro conflict
  - Seven people in a village located in Cotabato, Philippines are fatally shot during
    a firefight between the Moro Islamic Liberation Front and the Moro National Liberation
    Front that left 48 families temporarily displaced. (Inquirer)
  - Polygamy in Christianity
  - Pope Leo XIV approves a decree affirming the Catholic Church's rejection of polygamous
    and polyamorous marriages. (Reuters)
  - Insurance in Australia
  - The Australian Federal Court fines United Super, the Cbus pension fund's trustee,
    A$23.5 million (US$15.2 million) for systemic failures that caused extensive delays
    in processing death and disability insurance claims affecting over 7,000 members.
    (Reuters)
  - A Let L-410UVP operating as Nari Air Flight 114 and chartered by Samaritan's Purse
    crashes in Unity State, South Sudan, killing all three crew members while en route
    from Juba with two tonnes of food aid for flood-displaced communities. (Reuters)
  - The Hayli Gubbi volcano in the Afar Region of Ethiopia erupts, sending ash plumes
    across Oman and Yemen, and prompts flight cancellations in northern India. (DW)
    (AP)
  - Food security in Nigeria, Islamic extremism in Northern Nigeria
  - The World Food Programme reports that escalating instability in northern Nigeria
    is increasing acute food insecurity to record levels, with nearly 35 million people
    projected to face hunger in 2026 as the agency exhausts its funding by December.
    (Reuters)
  - Moldova–Russia relations, Violations of non-combatant airspace during the Russo-Ukrainian
    war
  - Moldova reports that six Russian drones entered its airspace, including one that
    came down on a residential roof near Florești and another that crossed into Moldova
    before continuing toward Romania. (Reuters)
  - Arrest of Jair Bolsonaro
  - Former Brazilian president Jair Bolsonaro starts his 27-year sentence for leading
    a coup plot. (AP)
  - Counter-terrorism in Singapore
  - Singapore orders Meta and TikTok to block local access to the social media accounts
    of an Australian man whose posts advocate replacing Singapore's secular system
    with an Islamic state and seek to cause communal tensions and influence elections.
    (Reuters)
  - Killing of Lisa from Abcoude
  - A court in Amsterdam, Netherlands, begins the trial of an illegal migrant from
    Nigeria who murdered a 17-year-old girl in Duivendrecht. (NOS in Dutch)
  - LGBTQ rights in the European Union, Same-sex union legislation
  - The European Court of Justice rules for all European Union member states to recognize
    same-sex marriage and not discriminate against same-sex couples. The ruling does
    not force individual countries to legalize same-sex marriages. (DW)
  - Two wanted gunmen, identified as "extremist" brothers, are killed and three security
    forces are wounded in a shootout in Ar-Ramtha, Jordan. (Sada News)
  - 2026 Ugandan general election
  - Ugandan opposition party National Unity Platform says security forces have detained
    more than 300 supporters and officials since presidential candidate Bobi Wine
    began campaigning, while police report several arrests linked to clashes at Wine's
    rallies. (Reuters)
  - Chinese space program
  - The Shenzhou 22 spacecraft enters orbit after China conducts its first emergency
    space launch to restore a safe return option for the three astronauts aboard the
    Tiangong space station following damage to the Shenzhou 20 return capsule earlier
    in November. The uncrewed spacecraft, launched on a Long March 2F rocket, carries
    replacement parts and supplies and aims to return the current crew to Earth in
    2026. (Reuters)
