Date: '2025-11-01'
Source_URI: Portal:Current events/2025 November 1
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - The remains of three bodies Hamas gave to Israel overnight are found to have been
    of known hostages, leaving eight bodies of deceased hostages still remaining in
    Gaza. (Reuters)
  - Sexual and gender-based violence against Palestinians during the Gaza war
  - Israel Defense Forces Major General Yifat Tomer-Yerushalmi, who served as Military
    Advocate General, resigns after leaking a surveillance video to the media showing
    the gang rape of a Palestinian prisoner at Sde Teiman detention camp in August
    last year. (BBC)
  - 2025 Afghanistan–Pakistan conflict
  - The Pakistani government partially reopens the Torkham border crossing with Afghanistan
    to allow Afghan refugees to flee home, while all remaining restrictions on cross-border
    movement stay banned, following an agreement to maintain a ceasefire. (AP)
  - 2025 United States military strikes on alleged drug traffickers
  - Three people are killed in an American airstrike on a boat in the Caribbean Sea.
    (Al Jazeera)
  - Boko Haram insurgency
  - The United States threatens to carry out attacks in Nigeria due to continuous
    attacks against Christians by Boko Haram and ISWAP. (Al Jazeera)
  - Israel–Hezbollah conflict
  - Four people are killed and three injured in an Israeli airstrike on a vehicle
    in Kfar Reman, Lebanon. (Al Jazeera)
  - Sudanese civil war
  - At least 12 people are killed and several others are seriously injured in attacks
    by the Rapid Support Forces on two displaced civilian shelters in South Kordofan,
    Sudan. (Azerbaijan)
  - The Grand Egyptian Museum in Giza, Egypt, officially opens to the public following
    long delays. (AP)
  - Pope Leo XIV of the Catholic Church declares Saint John Henry Newman a Doctor
    of the Church, one of 38, and a co-patron of Catholic education. (AP)
  - 2025 Hermosillo convenience store fire
  - At least 23 people are killed and eleven others are injured in a fire and explosion
    at a Waldo's store in Hermosillo, Sonora, Mexico. (CNN)
  - A landslide triggered by heavy rain kills at least 21 people and leaves 30 others
    missing in Rift Valley Province, Kenya. (AP)
  - A crowd crush at a Hindu temple in Srikakulam, Andhra Pradesh, India, kills nine
    people. (Reuters)
  - Five people are killed and two others are injured in an avalanche on the Vertainspitze
    mountain in the Ortler Alps in South Tyrol, Italy. (Euronews)
  - 2025 Cambridgeshire train stabbing
  - Eleven people are injured, including nine in life-threatening conditions, in a
    mass stabbing attack on a London North Eastern Railway passenger train in Huntingdon,
    Cambridgeshire, England. Two suspects are arrested. (Sky News)
  - Mexican drug war
  - Carlos Manzo, mayor of Uruapan, Michoacán, is assassinated during Day of the Dead
    festivities. (The Guardian)
  - Smoking in the Maldives
  - In the Maldives, people born since 2007 are permanently banned from buying or
    using tobacco, making it the first country in the world to impose a lifelong smoking
    ban from a certain age. (NOS)
  - Two people are killed and six others are injured, including two suspects, in a
    shootout in Vorizia, Crete, Greece. Police say that it was caused by a long-standing
    feud between two local families. (AP)
  - 2025 Tanzanian general election
  - Incumbent Tanzanian president Samia Suluhu Hassan of the ruling Chama Cha Mapinduzi
    party is declared the winner of the general election with 97% of the vote, amidst
    protests by the opposition. (Reuters)
  - Alexandru Munteanu is appointed the new Prime Minister of Moldova, succeeding
    Dorin Recean. (Politico)
  - 2025 Major League Baseball season
  - 2025 World Series
  - In baseball, the Los Angeles Dodgers defeat the Toronto Blue Jays 5–4 in Game
    7 to win the World Series. (ESPN)
