Date: '2025-11-04'
Source_URI: Portal:Current events/2025 November 4
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Eastern front of the Russo-Ukrainian war
  - One person is killed and eight others are injured in a Russian strike on Synelnykove,
    Dnipropetrovsk Oblast, Ukraine. (RBC-Ukraine)
  - Gaza war
  - Gaza war hostage crisis
  - Hamas returns the body of Israeli American Itay Chen to Israel, the last hostage
    with U.S. citizenship. (Times of Israel)
  - 2025 United States military strikes on alleged drug traffickers, War on drugs
  - Two people are killed in an American airstrike against a boat in the Pacific Ocean.
    (NBC News)
  - Nigerian bandit conflict
  - Nineteen armed bandits, two soldiers and a vigilante are killed in a shootout
    in Shanono, Kano State, Nigeria. (Reuters)
  - 2025 Atlantic hurricane season
  - The casualty toll from Hurricane Melissa in Haiti increases to 43 deaths, with
    13 others still missing. Nearly 12,000 homes are flooded and at least 200 have
    been destroyed. (AP)
  - 2025 Chhattisgarh train collision
  - At least eight people are killed and about a dozen others are injured when a passenger
    train crashes into a cargo train near Bilaspur, Chhattisgarh, India. (AP)
  - 2025 Pacific typhoon season
  - The death toll from Typhoon Kalmaegi's impact on Visayas and Mindanao, Philippines,
    rises to 66, with search and rescue operations ongoing. (BBC News)
  - Six people are killed when a Philippine Air Force Bell Huey helicopter crashes
    while conducting damage assessment for Typhoon Kalmaegi in Loreto, Agusan del
    Sur, Philippines. (Philippine Daily Inquirer) (Reuters)
  - UPS Airlines Flight 2976
  - 14 people are killed, including the three crew members and 11 on the ground, and
    fifteen others are injured when UPS Airlines McDonnell Douglas MD-11 aircraft
    crashes near Louisville Muhammad Ali International Airport in Kentucky, United
    States shortly after takeoff. (CNN)
  - Tuzla retirement home fire
  - Eleven people are killed and about 30 others are injured in a fire at a retirement
    home in Tuzla, Bosnia and Herzegovina. (Reuters)
  - Gaza war
  - Sexual and gender-based violence against Palestinians during the Gaza war
  - Israeli major general Yifat Tomer-Yerushalmi is arrested and imprisoned a day
    after resigning, after leaking a surveillance video in August 2024 showing the
    gang rape of a Palestinian prisoner in the Sde Teiman detention camp. (Al Jazeera)
    (NPR)
  - Violence against women in Mexico
  - President of Mexico Claudia Sheinbaum is groped in front of the National Palace,
    Mexico City. The man is arrested on the spot. (Informador in Spanish) (Reuters)
  - The Constitutional Court of Bosnia and Herzegovina confirms former Republika Srpska
    president Milorad Dodik's six-year ban from political office, rejecting Dodik's
    appeals and ruling that the ban did not violate the constitution. (Reuters)
  - A Moroccan court sentences a man to five years in prison and fines him US$107,300
    for human trafficking after he recruited jobseekers online who were later transported
    to Myanmar and forced to work in scam centers, marking the country's first conviction
    involving the recruitment of victims for foreign scam compounds. (AP)
  - 2025 United States elections
  - Off-year elections are held in the United States, including one special election
    to a vacancy in the federal House of Representatives, two elections for the governors
    of Virginia and New Jersey, the next mayor of New York City, and various local
    elections. (NPR)
  - Abigail Spanberger is elected as the governor of Virginia to become the state's
    first female governor. (The Guardian)
  - Zohran Mamdani is elected as the 111th mayor of New York City to become the city's
    first Muslim and South Asian American mayor. (Al Jazeera) (France 24)
  - 2025 United States federal government shutdown
  - The U.S. federal government shutdown becomes the longest shutdown in American
    history following a failed 14th vote by the U.S. Senate, surpassing the 2018–2019
    shutdown that occurred during President Donald Trump's first term. (CBS News)
  - Mexican drug war
  - Mexican president Claudia Sheinbaum announces a security plan for the state of
    Michoacán following the assassination of the mayor of Uruapan, Carlos Manzo, who
    was shot and killed on Saturday. The plan includes the dispatch of the National
    Guard, more federal personnel, and the creation of a special unit at the state's
    prosecution office. (AP)
  - Western Sahara conflict
  - Morocco declares October 31, starting next year, to be a national holiday in celebration
    of Friday's UN resolution backing Morocco's plan of autonomy for Western Sahara
    in a 50-year dispute between the country and the Algeria-backed Polisario Front.
    (Reuters)
