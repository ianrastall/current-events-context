Date: '2025-11-15'
Source_URI: Portal:Current events/2025 November 15
Intelligence_Payload:
  Uncategorized:
  - War on drugs, 2025 United States military strikes on alleged drug traffickers
  - Three people are killed in an American airstrike against a boat in the Pacific
    Ocean. (CBS News)
  - Kivu conflict
  - The Democratic Republic of the Congo and the M23 rebels sign a framework agreement
    in Doha, Qatar, for a peace treaty to end the conflict in Kivu. (Reuters)
  - Syrian conflict
  - Four people are killed, including the mayor of Wady Al-Mawla, and another is severely
    injured in a mass shooting by unidentified gunmen at a coffeehouse in Talkalakh,
    Homs Governorate, Syria. (Syrian Observatory for Human Rights) (SANA)
  - Three people are injured, including two critically, in a drive-by shooting by
    unidentified gunmen in Abu Jarin, Aleppo Governorate, Syria. (Syrian Observatory
    for Human Rights)
  - Canada–Holy See relations
  - The Holy See transfers 62 indigenous artifacts to the Canadian Conference of Catholic
    Bishops for repatriation to the communities of origin after their removal for
    a 1925 missionary exhibition in Rome, Italy. (BBC News)
  - 2025–26 European windstorm season
  - Storm Claudia makes landfall in Western Europe, killing at least three people
    and injuring dozens of others in southern Portugal. (Sky News Australia)
  - At least 32 informal miners are killed when a makeshift bridge collapses at a
    flooded cobalt mine in Lualaba Province, Democratic Republic of the Congo. Authorities
    state that unauthorized miners entered the area despite a ban due to landslide
    risks. (AFP via Daily Sabah)
  - A landslide triggered by heavy rain kills at least 11 people and leaves 12 others
    missing in Central Java, Indonesia. (Reuters)
  - Nine people are killed and others are injured in an explosion at a firecracker
    manufacturing unit in Hyderabad, Sindh, Pakistan. (Dawn)
  - 2025 Mexican protests
  - At least 120 people are injured, including 100 police officers, and 20 others
    are arrested in clashes with police during protests across Mexico after the assassination
    of Uruapan mayor Carlos Manzo earlier this month. (Reuters)
  - Modern immigration to the United Kingdom
  - British home secretary Shabana Mahmood announces plans to reduce the length of
    refugee status, extend the required period before applying for long-term residency,
    and end automatic state benefits for asylum seekers as part of a broad reform
    of its asylum system. (AFP via CBS News)
  - Benin's National Assembly, by a 99–19 vote, approves a constitutional amendment
    that extends presidential and parliamentary term limits from five to seven years
    and establishes a new senate, pending review by the Constitutional Court. The
    reform would take effect after the April presidential election. (AP)
