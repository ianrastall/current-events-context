Date: '2025-11-12'
Source_URI: Portal:Current events/2025 November 12
Intelligence_Payload:
  Uncategorized:
  - Cambodia–Thailand relations
  - 2025 Cambodian–Thai border crisis, Cambodian–Thai border dispute
  - Cambodian prime minister Hun Manet accuses Thailand of shooting and killing a
    Cambodian villager near the border, two days after a Thai soldier was injured
    by a land mine in the area, increasing tensions and threatening the ceasefire
    that put an end to the conflict in July. (AP)
  - The United States Mint strikes its last penny for circulation, though it will
    remain legal tender. There are still an estimated 300 billion pennies in circulation
    according to the Treasury Department. (Reuters)
  - Six people are killed in a stampede during a military recruitment event in Accra,
    Ghana. (AP)
  - At least 37 people are killed and 20 others are injured when a bus collides with
    a truck and crashes down a ravine in Arequipa, Peru. (DW) (Al Jazeera)
  - Canada–Russia relations, International sanctions during the Russian invasion of
    Ukraine
  - During a G7 meeting on the Russo-Ukrainian war, Canadian foreign minister Anita
    Anand announces new sanctions targeting Russian entities involved in cyberattacks,
    drone production, energy infrastructure, and the transport of oil via the shadow
    fleet. (AFP via Al Arabiya)
  - Corruption in Ukraine
  - Operation Midas
  - Ukrainian justice minister German Galushchenko and energy minister Svitlana Hrynchuk
    resign following a National Anti-Corruption Bureau investigation into an alleged
    kickback scheme involving Ukraine's nuclear power plant operator Energoatom. The
    alleged head of the corruption group, Tymur Mindych, has fled Ukraine. (The Guardian)
  - Ethiopian Airlines Flight 302
  - A U.S. federal jury orders Boeing to pay $28.45 million in damages to the family
    of Shikha Garg, a victim of the 2019 Ethiopian Airlines 737 MAX crash, marking
    the first civil trial verdict related to the two fatal MAX accidents. (AFP via
    Black Hills Pioneer)
  - Crime in Germany
  - An 18-year-old is sentenced to eight years and nine months in prison for a shooting
    at a bar in Göppingen, Baden-Württemberg, Germany, that killed one person and
    injured two others in 2024. (Deutsche Presse-Agentur)
  - Two police officers are injured and 29 people are arrested when a riot breaks
    out at a immigration detention site in Sintiki, Serres, Greece. (AP)
  - 2025 Iraqi parliamentary election
  - Preliminary results show prime minister Mohammed Shia' al-Sudani's Reconstruction
    and Development Coalition leading the polls. (Reuters)
  - 2025 United States federal government shutdown
  - A bill passes through Congress and is signed by president Donald Trump, ending
    the longest government shutdown in American history at 43 days. (BBC News)
