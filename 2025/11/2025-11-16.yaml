Date: '2025-11-16'
Source_URI: Portal:Current events/2025 November 16
Intelligence_Payload:
  Uncategorized:
  - 2025 Delhi car explosion
  - The National Investigation Agency of India states that the recent car explosion
    in Delhi was a suicide attack and report the arrest of a suspect accused of helping
    acquire and prepare the vehicle used in the blast. (AFP via CNA)
  - At least twelve people are killed and ten others are injured when a bus crashes
    in Tungurahua Province, Ecuador. (Reuters)
  - War on drugs in Ecuador
  - Ecuadorian president Daniel Noboa announces that Spanish police have captured
    Los Lobos leader Wilmer Chavarría, who faked his own death and changed his identity,
    in Málaga, Andalusia. (BBC News)
  - A broken railway line in the area of Życzyn, Garwolin County, in east central
    Poland is under police investigation as a possible act of sabotage. Two Ukrainian
    citizens have been identified as the suspects. (TVP World)(BBC)
  - 2025 Chilean general election
  - 2025 Chilean presidential election
  - Chileans vote to elect their president, who will succeed the term-limited incumbent
    Gabriel Boric. (CNN)
  - Preliminary results indicate a second round between Jeannette Jara and José Antonio
    Kast on 13 December. (El País in Spanish)
  - Also up for election are the whole Chamber of Deputies and half of the Senate.
    (Radio ADN in Spanish)
  - Ecuadorians vote on a constitutional referendum, on foreign military bases, on
    public financing of political parties and the number of assembly members, and
    on a popular consultation about the convocation of an constituent assembly. All
    4 were rejected. (El País in Spanish)
  - Nuclear program of Iran
  - Iranian foreign minister Abbas Araghchi says that Iran is no longer enriching
    uranium due, in part, to the damage at nuclear facilities following the Iran–Israel
    war and the US strikes on nuclear sites in Iran. (AP)
  - 2025 ATP Tour
  - 2025 ATP Finals
  - In tennis, Jannik Sinner defeats his rival Carlos Alcaraz in the final, 7–6(7–4),
    7–5, to successfully defend his singles title at the 2025 ATP Finals. (AFP via
    Cebu Daily News)
  - 2025 CFL season
  - 112th Grey Cup
  - In Canadian football, the Saskatchewan Roughriders defeat the Montreal Alouettes
    25–17 to win their fifth Grey Cup. (TSN)
