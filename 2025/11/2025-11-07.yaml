Date: '2025-11-07'
Source_URI: Portal:Current events/2025 November 7
Intelligence_Payload:
  Uncategorized:
  - Terrorism in Indonesia
  - Jakarta School bombing
  - Ninety-six people are injured, some critically, in a bombing at a mosque inside
    a school in Jakarta, Indonesia. A 17-year-old male is identified as the perpetrator
    and later recovered at a hospital, right-wing terrorism is suspected. (Reuters)
    (BBC News)
  - Serbia's parliament passes a law to expedite construction of Trump Tower Belgrade
    on the former Yugoslav defence ministry site in Savski Venac, Belgrade, despite
    protests from opponents who want the damaged buildings preserved. (Reuters)
  - 2025 Pacific typhoon season
  - The death toll from Typhoon Kalmaegi's impact on the Philippines rises to at least
    188, with at least 135 others missing. (BBC News)
  - Typhoon Kalmaegi makes landfall in central Vietnam, killing at least five people
    in Daklak and Gia Lai and leaving three others missing in Quảng Ngãi. (AP via
    ABC News)
  - 2025 Rio Bonito do Iguaçu tornado
  - A tornado, rated F3 on the Fujita scale, strikes Rio Bonito do Iguaçu, Brazil,
    killing at least six people and injuring 432 others. (O Globo) (Paraná)
  - Five people are killed and two others are injured when a Kamov Ka-226 passenger
    helicopter crashes in Achi-Su, Dagestan, Russia. (ASN)
  - 2020–2025 H5N1 outbreak
  - 2025 Canadian ostrich culling controversy
  - Canada's food inspection agency confirms that a marksman has culled all 300–330
    ostriches at a farm in Edgewood, British Columbia, under a bird flu containment
    order, following a Supreme Court decision allowing the cull to proceed. (BBC News)
  - Democratic Republic of the Congo–Rwanda relations
  - 2025 Democratic Republic of the Congo–Rwanda peace agreement
  - The Democratic Republic of Congo and Rwanda state that they have agreed on a Regional
    Economic Integration Framework in Washington, D.C., United States, to expand economic
    cooperation and subject to conditions including the withdrawal of Rwandan forces
    from eastern Congo and operations against the Democratic Forces for the Liberation
    of Rwanda. (Reuters)
  - Australia–Nauru relations, Nauru Regional Processing Centre
  - Australia begins to deport hundreds of non-citizens to Nauru, as part of a bilateral
    agreement between both countries, in which Australia will pay Nauru A$2.5 billion
    (US$1.6 billion) over 30 years in exchange for Nauru issuing visas to these individuals
    deported from Australia. (RNZ)
  - China–Japan relations, Discharge of radioactive water of the Fukushima Daiichi
    Nuclear Power Plant
  - Japan reports that seafood exports to China have resumed for the first time since
    China imposed a ban in August 2023 over treated wastewater releases from the Fukushima
    Daiichi nuclear plant. However, China maintains restrictions on products from
    Fukushima and surrounding prefectures. (AP)
  - Hungary–United States relations
  - The United States grants Hungary a one-year exemption from sanctions on Russian
    oil and gas, with Hungary agreeing to purchase U.S. liquefied natural gas. (Reuters)
  - Indonesia–United Kingdom relations, Capital punishment in Indonesia
  - Indonesia repatriates British nationals Lindsay Sandiford, sentenced to death
    for smuggling cocaine into Bali in 2013, and Shahab Shahabadi, who was serving
    a life sentence for drug offences, following a bilateral agreement on humanitarian
    grounds. Both are transferred to the United Kingdom to serve the remainder of
    their sentences under UK law. (Reuters)
  - Russia–European Union relations, Government and intergovernmental reactions to
    the Russian invasion of Ukraine
  - The European Union ends the issuance of multiple-entry Schengen visas to Russian
    citizens, citing security concerns linked to the Russo-Ukrainian war, alleged
    sabotage, and visa misuse, while allowing exceptions for dissidents, journalists,
    human rights defenders, and close family members of EU citizens. (AP)
  - 2025 Tanzanian election protests
  - Prosecutors in Tanzania charge 98 people with treason over their alleged participation
    in violent protests against the re-election of President Samia Suluhu Hassan last
    week. (Reuters)
  - Poland's Sejm removes former justice minister Zbigniew Ziobro's immunity, clearing
    the way for prosecutors to charge him with 26 offences, including abuse of power
    and misuse of public funds from the Justice Fund. (Reuters)
  - Police in Spain arrest 13 alleged members of the Venezuelan gang Tren de Aragua
    in a coordinated operation in five cities. (AP)
