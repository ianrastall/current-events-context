Date: '2025-11-28'
Source_URI: Portal:Current events/2025 November 28
Intelligence_Payload:
  Uncategorized:
  - Syrian conflict, Israeli invasion of Syria
  - The Israeli military launches a raid in Beit Jinn, Syria, targeting unknown gunmen
    and carrying out airstrikes, killing 13 Syrians, including two children, and wounding
    25 others. Six Israeli soldiers are also wounded in a shootout with local residents.
    Israel says it was targeting Jaama Islamiya. (Al Jazeera) (BBC News) (The Jerusalem
    Post)
  - 2025 North Indian Ocean cyclone season
  - Cyclone Senyar
  - The toll from the floods in Indonesia increases to 174 people killed and 80 more
    missing, mainly in North Sumatra. (Al Jazeera)
  - The death toll from the floods in Thailand increases to 145 people, mainly in
    Songkhla province. (Al Jazeera)
  - Cyclone Ditwah
  - The toll from the landslides caused by heavy rains in Sri Lanka, mainly between
    Badulla and Nuwara Eliya, increases to 56 people killed and 600 houses damaged.
    (Al Jazeera)
  - Two tankers sanctioned as being a part of the alleged Russian shadow fleet are
    hit by explosions while transiting the Bosporus, with at least one of the vessels
    catching on fire. Turkey says search and rescue operations are underway to evacuate
    the crew members. (Reuters)
  - Honduras–United States relations
  - United States president Donald Trump announces that he will pardon former Honduran
    president Juan Orlando Hernández, who is serving a U.S. prison sentence for drug-trafficking
    offenses. (AFP via France 24)
  - Corruption in Ukraine
  - Operation Midas
  - Head of the Office of the President of Ukraine Andriy Yermak resigns after agents
    from the National Anti-Corruption Bureau and the Specialized Anti-Corruption Prosecutor's
    Office raid his apartment. (BBC News) (The Kyiv Independent)
  - Russia formally outlaws Human Rights Watch as an undesirable organization. (AP)
  - 2025 Airbus A320 software update
  - Airbus launches an emergency software update on A320 aircraft worldwide to prevent
    potential corruption to guidance systems caused by intense solar radiation, affecting
    6,000 planes, causing major travel disruptions worldwide. (BBC News)
  - A team of scientists announces the detection of electric discharges in the atmosphere
    of Mars for the first time by NASA's Perseverance rover, detected near the Jezero
    crater region, as a phenomenon described as "mini lightning", though not confirmed
    to be the same as actual lightning. (BBC News)
