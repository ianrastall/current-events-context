Date: '2025-11-08'
Source_URI: Portal:Current events/2025 November 8
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Khyber Pakhtunkhwa
  - 2025 Afghanistan–Pakistan conflict
  - Afghanistan's Taliban government states that peace talks with Pakistan in Istanbul,
    Turkey, have failed, while the ceasefire holds. (AFP via France 24)
  - Russo-Ukrainian war
  - Russian attacks on civilians in the Russo-Ukrainian war, Russian strikes against
    Ukrainian infrastructure
  - Russia launches over 450 bomber drones and 45 missiles on critical infrastructure
    and residential areas across Ukraine, killing at least seven people and injuring
    12 others in Dnipro and Zaporizhzhia, as well as damaging energy plants in the
    oblasts of Kharkiv, Kyiv, and Poltava. (BBC News) (Reuters)
  - Embargo of Russian oil during the Russo-Ukrainian war
  - Bulgaria's parliament approves legal amendments giving a state-appointed manager
    expanded authority over Lukoil's refinery in Burgas, including operational control
    and the power to sell shares, to prevent a shutdown when U.S. sanctions on the
    refinery's Russian owner take effect. (AP)
  - Six people are killed and four others are injured, including one critically, in
    a fire at a perfume warehouse in Dilovası, Kocaeli Province, Turkey. (BBC News)
  - Three people are killed and 15 others are injured by storm surges amid rough seas
    off the coast of Tenerife, Spain. (AP) (Reuters)
  - 2025 G20 Johannesburg summit, South Africa–United States relations
  - The United States announces that it will send no delegates to the 2025 G20 summit
    in Johannesburg, South Africa, citing accusations of persecution of the Afrikaner
    minority. (AP)
  - Bolivia–United States relations
  - Bolivia and the United States announce that they will restore diplomatic relations
    at the ambassadorial level after 17 years. (AFP via New Straits Times)
  - Police in Tijuana, Baja California, Mexico, arrest a man suspected of participating
    in the 1994 assassination of presidential candidate Luis Donaldo Colosio Murrieta,
    and take him to a maximum security prison in central Mexico. (AP)
  - 2025 Bolivian general election
  - Rodrigo Paz is sworn in as the new president of Bolivia, succeeding Luis Arce.
    (Al Jazeera)
  - 2025 Guinean presidential election
  - Guinea's supreme court publishes a provisional list of nine presidential candidates
    for the upcoming election, including junta leader Mamady Doumbouya, while excluding
    former prime minister Lansana Kouyaté on procedural grounds. (AP)
  - 2025 Tanzanian election protests
  - Tanzanian authorities charge hundreds of people with treason over protests linked
    to the disputed elections, including opposition officials such as Chadema secretary-general
    John Mnyika, while additional arrest warrants are issued for others, including
    Kawe MP Josephat Gwajima. (AP)
  - 2026 Djiboutian presidential election
  - Incumbent Djiboutian president Ismaïl Omar Guelleh accepts his party's nomination
    to seek a sixth term in next year's election after parliament lifted the constitutional
    age limit for presidential candidates. (AFP via Le Monde)
  - Kenya–Uganda relations
  - Ugandan president Yoweri Museveni confirms that two Kenyan activists were detained
    after attending an opposition rally and accuses them of working with rival political
    groups; both men are released to Kenyan authorities following diplomatic discussions.
    (AP)
  - 2025 WTA Tour
  - 2025 WTA Finals
  - In tennis, Elena Rybakina of Kazakhstan becomes the first Asian player to win
    a WTA Finals title after defeating Aryna Sabalenka, 6–3, 7–6(7–0) to win the singles
    title at the 2025 WTA Finals. By winning the title undefeated, Rybakina wins US$5.235
    million in prize money, breaking the previous year's record for the largest prize
    money earned by a female tennis player at a single event. (BBC Sports)
