Date: '2025-11-27'
Source_URI: Portal:Current events/2025 November 27
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Crimea attacks
  - 2022 Crimean Bridge explosion
  - A Russian court sentences eight people to life imprisonment for terrorism after
    a truck bomb attack on the Crimean Bridge in Crimea killed five people in October
    2022. (MSN)
  - Israeli–Palestinian conflict
  - Israeli occupation of the West Bank
  - The Israeli military and police say they are reviewing a raid in Jenin, West Bank,
    in which forces fatally shot two Palestinians who had exited a surrounded building
    after a prolonged surrender procedure. (AFP via Le Monde)
  - Insurgency in Khyber Pakhtunkhwa
  - Three policemen are killed in a shooting attack by unknown militants with assault
    rifles on a roadside checkpoint in Hangu District, Khyber Pakhtunkhwa, Pakistan.
    (AP via ABC News)
  - Three Chinese citizens are killed in a drone–shooting attack at a gold mine in
    Shamsiddin Shohin District, Tajikistan. (Radio Free Europe)
  - Green economy policies in Canada, Anti-environmentalism
  - Canadian prime minister Mark Carney and Alberta premier Danielle Smith sign an
    agreement removing planned federal emissions caps and eases clean-energy rules
    in exchange for strengthened provincial carbon pricing and support for carbon-capture
    projects, while also committing to enable a privately financed oil pipeline to
    British Columbia. (Reuters)
  - 2025 North Indian Ocean cyclone season
  - Cyclone Ditwah
  - More than 40 people are killed, and 21 others are missing after landslides caused
    by heavy rains hit Sri Lanka, mainly between Badulla and Nuwara Eliya. (AP)
  - Cyclone Senyar
  - The death toll from flooding in Songkhla province, Thailand, rises to 104. (Thai
    Post)
  - Flooding on Sumatra, Indonesia, kills 49 people, leaves 67 others missing, and
    submerges over 2,000 buildings, with many of the worst-affected areas still unreachable
    a day after Cyclone Seynar's landfall. (The Independent)
  - Nineteen people are killed after heavy winds cause a riverboat to capsize on Lake
    Mai-Ndombe in the Democratic Republic of the Congo. (Reuters)
  - Eleven people are killed and two more are injured in Kunming, China, when a train
    hits a group of railway maintenance workers. (Al Jazeera)
  - The United Nations Department of Economic and Social Affairs estimates that Jakarta,
    Indonesia, has surpassed Tokyo, Japan, as the largest city in the world. (The
    Guardian)
  - Australia–Iran relations
  - 2024 Iranian operations inside Australia
  - Australia adds Iran's Islamic Revolutionary Guard Corps to its list of terrorist
    organisations as a state sponsor due to its role in orchestrating and executing
    terrorist attacks in Australia last year. (ABC News Australia)
  - Moldova–Russia relations
  - The Moldovan parliament votes to close a Russian cultural center, citing security
    concerns and recent Russian drone incursions. (Reuters)
  - Poland–Russia relations
  - Russia orders Poland to close its consulate in Irkutsk in response to Poland's
    closure of the Russian consulate in Gdańsk following a railway explosion earlier
    this month that Poland attributes to Russian involvement. (Reuters)
  - 2025 deployment of federal forces in the United States
  - 2025 Washington, D.C., National Guard shooting
  - One of two U.S. National Guard troops who were shot in Washington, D.C., a day
    earlier dies. (BBC News)
  - 2022 Peruvian self-coup attempt
  - The Peruvian Supreme Court sentences former president Pedro Castillo to 11 and
    a half years in prison for criminal conspiracy when he tried to dissolve Congress
    and attempted a self-coup in 2022. (AP)
  - Koldo Case
  - The Spanish Supreme Court orders former transport minister and former deputy leader
    of the ruling PSOE José Luis Ábalos and ex-adviser Koldo García into pre-trial
    detention without bail on charges linked to alleged kickbacks in public procurement,
    while also naming former lawmaker Santos Cerdán as a suspect. (AFP via Gulf Times)
  - 2025 Guinea-Bissau coup d'état
  - The Bissau-Guinean military installs General Horta Inta-A Na Man as interim leader
    for one year, while President Umaro Sissoco Embaló is flown to Senegal, with opposition
    candidate Fernando Dias da Costa alleging the coup was orchestrated to block the
    release of the election results he claims to have won. (AFP via Vanguard)
  - 2025 Vincentian general election
  - NDP leader Godwin Friday is projected to become the next prime minister of Saint
    Vincent and the Grenadines, ending 24 years of ULP government under the premiership
    of Ralph Gonsalves. (WIC News)
  - Conscription in France
  - French president Emmanuel Macron announces the revival of voluntary military service
    for 18 and 19-year-olds to begin in 2026. (DW)
  - Human rights in Tunisia
  - Tunisia releases opposition lawyer and journalist Sonia Dahmani after serving
    half of her prison sentence for remarks deemed to be lèse-majesté. (Reuters)
  - Alejandro Gertz Manero resigns as Attorney General of Mexico, citing an invitation
    from President Claudia Sheinbaum to serve as ambassador to an unspecified country.
    His departure comes amid scrutiny over his role in overseeing multiple prominent
    investigations, the most recent being the Miss Universe 2025 controversy involving
    its co-owner, Rubén Rocha, who has been accused of cooperating in drug, fuel,
    and weapons trafficking in Mexico. (Bloomberg) (MVS in Spanish)
