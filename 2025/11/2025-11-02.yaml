Date: '2025-11-02'
Source_URI: Portal:Current events/2025 November 2
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Al Jazeera reports that Hamas has agreed to retreat via Red Cross corridors from
    Gaza areas that are under Israeli control per the peace plan. (Haaretz)
  - The Netherlands agrees to repatriate an Eighteenth Dynasty statue from the reign
    of Pharaoh Thutmose III to Egypt after investigators determine it was illegally
    taken from the country and later found at an art fair. (Reuters)
  - The death toll from flooding in Vietnam increases to 35, with five people still
    missing. (MSN)
  - At least 15 people are killed and two others are injured after a passenger vehicle
    collides head-on with a truck in Jodhpur, India. (Dawn)
  - Four girls drown in an irrigation canal in Srirangapatna taluk, India. (The Hindu)
  - Two people are killed after a light aircraft crashes in Fátima, Tocantins, Brazil.
    (Aviation Safety Network)
  - Canada–Philippines relations
  - Canada and the Philippines sign a visiting forces agreement allowing military
    personnel to train in each other's territories. (Reuters)
  - Nigeria–United States relations, Boko Haram insurgency
  - The Nigerian government says that it welcomes assistance from the United States
    to combat Islamic terrorism, but adds that its sovereignty must be respected,
    in response to U.S. president Donald Trump threatening military action to protect
    Christians from persecution. (Reuters)
  - 2024–present Serbian anti-corruption protests
  - Serbian police arrest 37 protesters near the parliament house in Belgrade after
    clashes between pro-government supporters and protesters demanding justice for
    victims of the Novi Sad railway station canopy collapse. (Reuters)
  - 2025 North Macedonian local elections
  - North Macedonians vote in the second round of the local elections for councillors
    and mayors of 80 municipalities and Skopje, with the ruling conservative party
    VMRO-DPMNE expected to win by a landslide. (AP)
  - 2025 NASCAR Cup Series
  - In stock car racing, Hendrick Motorsports' Kyle Larson wins his second NASCAR
    Cup Series championship on an overtime finish over Joe Gibbs Racing's Denny Hamlin.
    (USA Today)
  - 2025 Women's Cricket World Cup
  - In cricket, the Indian women's team defeats South Africa by 52 runs to win the
    13th edition of the Women's Cricket World Cup. (ESPNcricinfo)
