Date: '2025-11-06'
Source_URI: Portal:Current events/2025 November 6
Intelligence_Payload:
  Uncategorized:
  - Sudanese civil war
  - Darfur campaign
  - The Rapid Support Forces state that they accept a humanitarian ceasefire proposed
    by international mediators after capturing El Fasher in Darfur, while the Sudanese
    army signals plans to continue the conflict. (AFP via Courthouse News Service)
  - 2025 United States military strikes on alleged drug traffickers, War on drugs
  - Three people are killed in a United States airstrike on a boat in the Caribbean
    Sea. (Al Jazeera)
  - 2025 Pacific typhoon season
  - The death toll from Typhoon Kalmaegi's impact on the Philippines rises to at least
    142, with 127 others missing. The storm has left the country's territory and made
    landfall in central Vietnam. (Al Jazeera)
  - Philippine president Bongbong Marcos declares a national state of calamity in
    relation to the devastation caused by Typhoon Kalmaegi and in anticipation of
    the upcoming tropical cyclone Fung-wong. (ABS-CBN News)
  - At least three people are killed, two others are missing and two are presumed
    dead when a large structure being prepared for demolition at a power plant collapses
    in Ulsan, South Korea. (Reuters)
  - 2020–2025 H5N1 outbreak
  - 2025 Canadian ostrich culling controversy
  - Canada's Supreme Court rejects an appeal by Universal Ostrich Farm, allowing the
    Canadian Food Inspection Agency to carry out a full cull of nearly 400 ostriches
    in Edgewood, British Columbia, under bird flu containment rules aligned with WHO
    guidelines. (AA)
  - International sanctions against Syria
  - The United Nations Security Council votes to lift sanctions on Syrian president
    Ahmed al-Sharaa and interior minister Anas Khattab through a United States-drafted
    resolution. (Reuters)
  - Israel–Kazakhstan relations
  - Kazakhstan formally joins the Abraham Accords, with the aim to enhance bilateral
    cooperation with Israel. (AP)
  - Mexico–Peru relations
  - Peru's Congress declares Mexican president Claudia Sheinbaum a persona non grata
    after Peru cut diplomatic ties with Mexico for granting asylum to former prime
    minister Betssy Chávez, who faces conspiracy charges related to former president
    Pedro Castillo's attempt to dissolve Congress. (Reuters)
  - Khaled El-Enany is elected director-general of UNESCO by the General Conference
    held in Samarkand, Uzbekistan, succeeding Audrey Azoulay. (UNESCO)
  - 2019 Bolivian political crisis
  - Former Bolivian president Jeanine Áñez is freed from prison after the Supreme
    Court annulled her sentence the previous day. (AP)
  - Crime in Germany
  - The Hesse State Police announce an investigation in Hanau after swastikas made
    of human blood are found painted on dozens of buildings and cars. (AP via ABC
    News)
  - International Criminal Court investigation in Uganda
  - The International Criminal Court confirms 39 charges of war crimes and crimes
    against humanity against fugitive Lord's Resistance Army leader Joseph Kony in
    absentia, including murder, rape, sexual slavery, forced pregnancy, and the use
    of child soldiers. The court rules that he can stand trial once arrested, upholding
    the 2005 arrest warrant. (Reuters)
  - Murder of Agnes Wanjiru
  - A former British soldier, Robert James Purkiss, is arrested on a Kenyan extradition
    warrant related to Agnes Wanjiru's 2012 murder near a UK military training facility
    in Nanyuki, Laikipia County. (Al Jazeera)
  - War crimes in the Russo-Ukrainian war
  - A court in Russian-occupied Donetsk sentences two Colombians to 13 years in prison
    for fighting with Ukraine's armed forces, after they were detained while traveling
    home through Venezuela and transferred into Russian custody. (AFP via Kyiv Post)
  - A court in Zaporizhzhia, Ukraine, finds a Russian soldier guilty of killing a
    surrendered Ukrainian soldier in January 2024 and sentences him to life imprisonment,
    marking the first conviction of a Russian soldier for killing a captured Ukrainian
    since the war began. (CNN)
