Date: '2025-11-22'
Source_URI: Portal:Current events/2025 November 22
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Twenty-four Palestinians are killed in a series of Israeli airstrikes in the Gaza
    Strip, including five in a vehicle in Gaza City and four children in the Nuseirat
    refugee camp. (Al Jazeera)
  - Israel–Hezbollah conflict
  - A person is killed in an Israeli airstrike on a car in Zawtar al-Sharqiyah, Lebanon,
    while several more attacks are carried out across Kafr Rumman. (Al Jazeera)
  - 2025 European drone sightings
  - The Dutch defence ministry says the military opened fire at drones over Volkel
    Air Base, but that no wreckage was recovered. (AP)
  - Five people are killed and 34 injured after a vehicle carrying passengers from
    Maiduguri through Kano en route to Lagos, Nigeria, collides head-on with a truck
    in Niger State. (Premium Times)
  - Belarus–Ukraine relations, Belarus–United States relations
  - Belarusian president Alexander Lukashenko pardons 31 Ukrainian citizens convicted
    of criminal offences in Belarusian territory in accordance with agreements reached
    between Lukashenko and United States president Donald Trump. (Reuters)
  - 2022–2023 Brazilian coup plot, Arrest of Jair Bolsonaro
  - Days before the start of his 27-year sentence, former Brazilian president Jair
    Bolsonaro is taken into preemptive custody due to a ruling by Supreme Court justice
    Alexandre de Moraes that Bolsonaro violated his house arrest by damaging his ankle
    monitor. (AP)
  - 2025 Kyrgyz parliamentary election
  - Kyrgyz law enforcement conducts arrests, searches, and interrogations of journalists
    and opposition figures, including former first lady Raisa Atambayeva and several
    former legislators allied with former president Almazbek Atambayev, in an investigation
    into alleged calls for mass unrest ahead of the November 30 snap election. (Reuters)
