Date: '2025-11-26'
Source_URI: Portal:Current events/2025 November 26
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Israeli occupation of the West Bank
  - The Israeli military announces the start of a military operation in the northern
    Samaria area in the West Bank. (DW)
  - A drone strike is carried out at the Khor Mor gas field in Sulaymaniyah, Iraq,
    causing major power cuts across the northern Kurdistan Region. (Reuters)
  - Holy See–Lebanon relations, Holy See–Turkey relations
  - Visit by Pope Leo XIV to Turkey and Lebanon
  - Pope Leo XIV begins his first papal trip, first to İznik and Nicaea in Turkey,
    then to Bkerké, the Monastery of Saint Maron, and the Port of Beirut in Lebanon.
    The trip will include an ecumenical commemoration of the 1,700th anniversary of
    the First Council of Nicaea and a mass in honor of the victims of the 2020 Beirut
    explosion. (AP) (Vatican News)
  - Economy of Ukraine, Russo-Ukrainian war
  - Economic impact of the Russo-Ukrainian war
  - The International Monetary Fund announces a staff-level agreement with Ukraine
    on a proposed Extended Fund Facility worth more than US$8 billion, outlining fiscal
    and monetary policies intended to support macroeconomic stability, debt sustainability,
    and external financing amid the ongoing war with Russia. (AFP via CTV News)
  - Wang Fuk Court fire
  - A fire at a housing estate in Tai Po, Hong Kong, leaves at least 94 people dead,
    dozens injured, and 279 more missing. Police arrest three men for suspected manslaughter
    in the fire. (AFP via The Business Times) (Reuters) (AP)
  - Cyclone Senyar, 2025 Thailand–Malaysia floods
  - The death toll from the floods in southern Thailand increases to 33 people. (Reuters)
  - Eleven people are killed when a UV Express van collides with a truck in Camalig,
    Albay, Philippines. (Manila Bulletin)
  - Five people are killed in an explosion at a weapons depot in Idlib Governorate,
    Syria. (AFP via Arab News)
  - A Swiss tourist is killed and another person is critically injured in a bull shark
    attack off the coast of Crowdy Bay National Park, New South Wales, Australia.
    (BBC News)
  - Cyprus–Lebanon relations
  - Cyprus and Lebanon sign a long-delayed maritime boundary agreement. (AP via ABC
    News)
  - Dominican Republic–United States relations, War on drugs, 2025 United States naval
    deployment in the Caribbean
  - The Dominican Republic permits the United States to use the Las Américas International
    Airport in Punta Caucedo, Santo Domingo, and the San Isidro Air Base to support
    Operation Southern Spear targeting alleged drug traffickers linked by the U.S.
    to Venezuelan authorities. (AFP via France 24)
  - Foreign relations of Bosnia and Herzegovina, Foreign relations of Hungary
  - Bosnian defence minister Zukan Helez denies approval for Hungarian foreign minister
    Péter Szijjártó to land his military aircraft in Banja Luka, Republika Srpska,
    citing Hungary's support for former Srpska president Milorad Dodik, whom Helez
    accuses of undermining Bosnia and Herzegovina's sovereignty. (Reuters)
  - South Africa–United States relations, 2026 G20 Doral summit, South African farm
    attacks
  - U.S. president Donald Trump announces that South Africa will not be invited to
    the 2026 G20 summit in Doral, Florida, and that U.S. payments and subsidies to
    the country will cease, citing South Africa's refusal to transfer G20 hosting
    responsibilities to a U.S. embassy representative at the 2025 Johannesburg summit
    and criticizing its treatment of Afrikaners, among other reasons. (AP via Arab
    News)
  - 2025 deployment of federal forces in the United States
  - 2025 Washington, D.C. National Guard shooting
  - Two members of the U.S. National Guard are shot and critically wounded in Washington,
    D.C.. The perpetrator, who is also wounded, is arrested. (AFP via France 24)
  - Women in Italy
  - Women's rights in Italy
  - The Italian parliament approves a bill to punish femicide with life imprisonment.
    (AP)
  - Corruption in Peru
  - A Peruvian court sentences former president Martín Vizcarra to 14 years in prison
    for accepting bribes from construction companies while serving as governor of
    Moquegua between 2011 and 2014. (AFP via TRT Afrika)
  - Murders of Yuna and Minu Jo
  - Justice Geoffrey Venning of New Zealand's High Court sentences 45-year-old mother
    Hakyung Lee to life imprisonment with a minimum non-parole period of 17 years
    after convicting Lee of murdering her two children in 2018. (DW)
  - Myanmar protests
  - The Tatmadaw grants amnesty to over 3,000 political prisoners, drops charges of
    over 5,500 others, and grants conditional release to 724 prisoners ahead of the
    general election in December. (AP)
  - Georgia's Tbilisi Appeal Court sentences opposition leader Nika Melia to an additional
    18 months in prison for contempt of court after he threw water at a judge during
    a hearing, adding to the eight-month term he has been serving since May for refusing
    to appear at a parliamentary inquiry. (Reuters)
  - 2025 Guinea-Bissau coup d'état, 2025 Guinea-Bissau general election
  - Bissau-Guinean president Umaro Sissoco Embaló is detained following a coup d'état
    one day before provisional election results were expected to be released. (BBC
    News) (Jeune Afrique in French)
  - Kidnapping in Nigeria, Religious violence in Nigeria
  - Nigerian president Bola Tinubu declares a nationwide security emergency and orders
    the recruitment of 20,000 additional police officers and the deployment of specialised
    units in response to recent killings and kidnappings. (AFP via TRT World)
  - Chess World Cup 2025
  - Uzbek chess grandmaster Javokhir Sindarov wins the 2025 World Cup in Goa, India,
    at the age of 19, becoming the youngest player to win the event. (FIDE)
