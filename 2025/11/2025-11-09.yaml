Date: '2025-11-09'
Source_URI: Portal:Current events/2025 November 9
Intelligence_Payload:
  Uncategorized:
  - Boko Haram insurgency
  - Battle of Lake Chad
  - Around 200 fighters are killed in clashes between Boko Haram and ISWAP near Lake
    Chad in Nigeria. (AFP via Al-Ahram)
  - Insurgency in Khyber Pakhtunkhwa
  - Twenty Pakistani Taliban insurgents are killed in raids on hideouts in North Waziristan
    District and Darra Adam Khel, Khyber Pakhtunkhwa, Pakistan. (MSN)
  - China–United States relations
  - China–United States trade war
  - China's commerce ministry suspends a ban on the export of gallium, germanium,
    antimony, and other materials used in the semiconductor industry, to the United
    States. (CNBC)
  - 2025 BBC editorial bias allegations
  - Tim Davie, Director-General of the BBC, and Deborah Turness, CEO of BBC News,
    resign over the controversy. (The Guardian)
  - 2025 Pacific typhoon season
  - At least two people are killed as Typhoon Fung-wong makes landfall over Luzon,
    Philippines. Over 900,000 people are evacuated and rescue operations for victims
    of the previous Typhoon Kalmaegi are suspended. (BBC News) (Reuters)
  - At least seven people are killed, thirteen are rescued, and 280 others are reported
    missing when a boat carrying hundreds of Rohingya refugees sinks near Langkawi,
    Malaysia. (Reuters)
  - Belgium–United Kingdom relations
  - The United Kingdom announces it is deploying its military to Belgium to help protect
    its airports amid a series of drone incursions over the country's airspace. (BBC
    News)
  - Ecuadorian security crisis
  - Four inmates are killed and 30 others are injured during a prison riot in Machala,
    El Oro, Ecuador. (AP)
  - Following the riot, 27 inmates at the Machala prison are found dead by asphyxiation,
    with investigations ongoing to determine the circumstances of the deaths. (AFP
    via Al Arabiya)
  - Maldives–Sri Lanka relations
  - Sri Lankan public security minister Ananda Wijepala says that police and navy
    officers have been sent to the Maldives to cooperate with local authorities after
    the Maldivian military seized a Sri Lankan ship with over 300 kilograms of heroin
    on Friday. (Xinhua News) (Hiru News)
  - Israel confirms that it received the remains of soldier Hadar Goldin, who was
    killed in Gaza two hours after the ceasefire that ended the 2014 Gaza War between
    Palestinian militants and Israel. (AP)
  - 2025 League of Legends World Championship
  - In League of Legends esports, T1 of the League of Legends Champions Korea become
    the first team to win three consecutive world titles after defeating fellow South
    Korean representatives KT Rolster, 3–2, in the final in Chengdu, China. T1's Gumayusi
    is named the most valuable player. (AFP via France 24)
