Date: '2025-11-24'
Source_URI: Portal:Current events/2025 November 24
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza peace plan
  - The United States and the Israel-backed Gaza Humanitarian Foundation announce
    it will permanently wind down operations, after closing its distribution sites
    six weeks ago. (AP)
  - Insurgency in Khyber Pakhtunkhwa
  - 2025 Federal Constabulary headquarters attack
  - A Jamaat-ul-Ahrar suicide bomber blows himself up outside the Federal Constabulary
    headquarters in Peshawar, Khyber Pakhtunkhwa, Pakistan, killing three people and
    wounding two others. Two more armed attackers attempt to enter the camp and open
    fire, wounding nine other people, before being killed in a shootout. (Dawn)
  - Israeli–Palestinian conflict
  - Israeli forces kill a Palestinian militant that killed two Kfir Brigade soldiers
    during a vehicle-ramming attack in May 2024 and arrest several others in Nablus,
    West Bank. (The Jerusalem Post)
  - Moro conflict
  - Seven militants, including a field commander of the Moro Islamic Liberation Front
    (MILF), are killed in an encounter in Cotabato, Philippines, involving MILF factions
    caught in a clan feud. (PNA via Manila Bulletin)
  - Western DR Congo clashes
  - At least 14 people are killed in conflict between rival ethnic militias in Kwamouth,
    Mai-Ndombe Province, Democratic Republic of the Congo. (AP)
  - Yemeni civil war
  - At least seven people are killed, including two attackers, and two others are
    injured in a mass shooting when unidentified gunmen opened fire on the governor
    of Taiz's motorcade on a road linking the southwestern city to the rest of Yemen.
    (MSN)
  - Seven people are killed and more than 30 others are injured after two private
    buses collided head-on in Tenkasi district, Tamil Nadu, India. (The Independent)
    (The Hindu)
  - Five people are killed and 13 others are injured after a bus carrying pilgrims
    overturns and plunges into a gorge in Tehri Garhwal, Uttarakhand, India. (The
    Indian Express)
  - Two climbers are killed after falling from a ridge on Aoraki / Mount Cook in New
    Zealand during a guided ascent. (Reuters)
  - Myanmar–United States relations
  - The United States announces the end of temporary protected status for approximately
    4,000 Myanmar nationals in January 2026, with the Department of Homeland Security
    citing changes in Myanmar's political and security climate, particularly the upcoming
    election, for the policy change. (Reuters)
  - United States–Venezuela relations, War on drugs
  - The United States formally declares Cartel of the Suns, an umbrella designation
    for Venezuelan Armed Forces officials allegedly involved in the drug trade, as
    a Foreign Terrorist Organization. (AP via KUOW)
  - Arrest of Jair Bolsonaro
  - A panel of Brazil's Supreme Federal Court upholds an order to keep former president
    Jair Bolsonaro in police custody after he allegedly tampered with his ankle monitor
    while appealing a 27-year prison sentence for plotting a coup. (Reuters)
  - Capital punishment in Sri Lanka
  - A court in Embilipitiya, Sabaragamuwa Province, Sri Lanka, sentences ten people,
    including three women, to death for the murder of a man in October 2011. Sri Lanka
    has an unofficial moratorium in place, with the last execution taking place in
    1976. (OnLanka) (Mirror Sri Lanka)
  - Prosecution of James Comey, Prosecution of Letitia James
  - Judge Cameron McGowan Currie rules that the appointment of Lindsey Halligan as
    U.S. Attorney for the Eastern District of Virginia was illegal, dismissing the
    indictments against James Comey and Letitia James without prejudice. (NBC News)
  - One person is killed and ten others are injured when a man rammed a stolen car
    into pedestrians in Tokyo, Japan. The perpetrator is arrested by police at the
    scene. (The Independent) (AP)
  - 2025 Egyptian parliamentary election
  - Egyptians vote in the second round to elect parliament members after the National
    Elections Authority annulled votes in 19 of the 70 constituencies due to various
    violations. (AP)
  - India–Israel relations
  - The Israeli government approves a plan jointly-coordinated with the Indian government
    to admit 5,800 members of the India-based Bnei Menashe ethnic group to Israel
    under Aliyah laws and will settle them to the Galilee region. (DW)
  - Pauline Hanson's burqa incidents
  - The Australian Senate censures and suspends Queensland senator Pauline Hanson
    for a week after she wore a burqa in the chamber to push for a burqa ban in Australia.
    (AFP via CBS News)
  - Unions in Belgium begin a three-day general strike across the country to protest
    Prime Minister Bart de Wever's government of "social dismantling" through budget
    cuts in their savings program. (DW)
