Date: '2025-11-10'
Source_URI: Portal:Current events/2025 November 10
Intelligence_Payload:
  Uncategorized:
  - 2025 Delhi car explosion
  - Thirteen people are killed and over 20 others are injured in a suspected car bombing
    near the Red Fort in New Delhi, India. (Al Jazeera)
  - Colombian conflict
  - The Colombian military conducts airstrikes in the Amazon region following failed
    peace talks, killing 19 FARC splinter group fighters. (AFP via CTV News)
  - Insurgency in Khyber Pakhtunkhwa
  - Cadet College Wana attack
  - At least three people are killed during an attack by the Pakistani Taliban on
    a cadet college in South Waziristan District, Khyber Pakhtunkhwa, Pakistan. (Reuters)
  - 2025 Booker Prize
  - British–Hungarian writer David Szalay wins the 2025 Booker Prize for his novel
    Flesh. (AFP via Bangkok Post)
  - A court declares Brazilian telecommunications company Oi bankrupt, the largest
    bankruptcy in the country's history. (O Estado de S. Paulo in Brazilian Portuguese)
    (Reuters)
  - 2025 Atlantic hurricane season
  - Two people are killed when a Beechcraft King Air plane carrying Hurricane Melissa
    relief supplies for Jamaica crashes into a pond in Coral Springs, Florida, United
    States. (CNN) (The Palm Beach Post)
  - 2025 Pacific typhoon season
  - The death toll from Typhoon Fung-wong's impact on Luzon, Philippines, rises to
    25, with more than 1.4 million others displaced. (AP)
  - The death toll from a Rohingya boat sinking near Langkawi, Malaysia, rises to
    21 as authorities in Malaysia and Thailand continue their search and rescue operations,
    with 13 survivors having been rescued and detained for immigration investigations.
    (Reuters)
  - Four people are killed, including three officials from the national registry,
    when a passenger Cessna 206 plane crashes in a jungle in Colombia. (Todo Noticias
    in Spanish)
  - 2025 United Nations Climate Change Conference
  - In Belém, Pará, Brazil, the 30th United Nations Climate Change Conference begins.
    (G1) (CNN Brasil)
  - The Pan American Health Organization rescinds Canada's measles elimination status
    after more than a year of continuous transmission and over 5,000 confirmed cases
    across most provinces, declaring that the Americas region as a whole no longer
    meets elimination criteria. (Reuters)
  - Cambodia–Thailand relations
  - 2025 Cambodian–Thai border crisis
  - Thailand suspends the implementation of a peace agreement with Cambodia after
    a land mine explosion injures two Thai soldiers in Sisaket province. (AFP via
    CNA)
  - 2020 United States presidential election
  - Attempts to overturn the 2020 United States presidential election, Trump fake
    electors plot
  - United States president Donald Trump grants pardons to 77 people, including political
    allies who are accused of electoral fraud-related charges from the 2020 presidential
    election, including several who have pled guilty. (NPR)
  - 2024 South Korean martial law crisis
  - Former South Korean president Yoon Suk Yeol, former defense minister Kim Yong-hyun,
    and former Defense Counterintelligence Command leader Yeo In-hyung are indicted
    on additional charges related to Yoon's attempt to invoke martial law last December
    alleging that they ordered surveillance drones to be sent into North Korea to
    stoke tensions and justify their plans. (DW) (The Chosun Ilbo)
  - Corruption in Nigeria
  - Nigeria's anti-graft agency issues an arrest warrant for former petroleum minister
    Timipre Sylva on charges of conspiracy and fraud of US$14.85 million allocated
    by the Nigerian Content Development and Monitoring Board for a refinery project.
    (Reuters)
  - Ecuadorian security crisis
  - Ecuadorian president Daniel Noboa transfers 300 high-risk inmates, including former
    vice president Jorge Glas, to the El Encuentro maximum-security prison in Santa
    Elena as part of a security strategy targeting gang activity inside overcrowded
    prisons. (Reuters)
  - A court of appeals in Paris, France, releases former president Nicolas Sarkozy
    from prison under judicial supervision conditions, less than three weeks after
    he began to serve a five-year sentence for criminal conspiracy over his 2007 election
    campaign funds. (AP)
  - Lebanon grants a US$900,000 bail to Hannibal Gaddafi, the son of former Libyan
    leader Muammar Gaddafi, ending his nearly 10-year detention in a case involving
    the 1978 disappearance of Shia Muslim cleric Musa al-Sadr, for which Gaddafi was
    accused of withholding information but never tried. (AFP via Arab News)
  - A Thai court orders the extradition of convicted kingpin She Zhijiang to China
    to face charges related to operating cybercrime and illegal gambling networks
    across Asia. (AP)
  - 2025 Egyptian parliamentary election
  - Egyptians begin voting to elect 568 of the 596 members of the House of Representatives.
    (Reuters)
  - 2025 United States federal government shutdown
  - The United States Senate votes 60–40 to a bill to end the 41-day government shutdown
    and extend funding for the U.S. government until January 30, 2026, sending the
    bill to the House of Representatives for a vote. (NPR) (Reuters)
  - Indonesian president Prabowo Subianto posthumously grants the title of National
    Hero to former president Suharto, despite criticism by activists and civil society
    due to his New Order military dictatorship. (CNN Indonesia) (Reuters)
  - Pakistan's Senate approves a constitutional amendment that expands Army Chief
    Asim Munir's powers by creating the position of Chief of Defence Forces with command
    over all military branches, while also limiting the Supreme Court's authority.
    (Reuters)
