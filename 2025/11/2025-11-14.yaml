Date: '2025-11-14'
Source_URI: Portal:Current events/2025 November 14
Intelligence_Payload:
  Uncategorized:
  - Allied Democratic Forces insurgency
  - 2025 Democratic Republic of the Congo attacks
  - At least 17 people are killed in an attack on a hospital by the Allied Democratic
    Forces in Lubero, North Kivu, Democratic Republic of the Congo. (AP via CTV News)
  - Russo-Ukrainian War
  - Kyiv strikes, Russian attacks on civilians in the Russo-Ukrainian war
  - Six people are killed and 35 others are injured in a missile and drone attack
    by Russian forces on Kyiv, Ukraine. (AP)
  - Sudanese civil war
  - El Fasher massacre
  - The United Nations Human Rights Council establishes an independent fact-finding
    mission to investigate reported mass killings and other alleged war crimes by
    the Rapid Support Forces and their allied groups in El Fasher, North Darfur, Sudan.
    (Reuters)
  - Colombian conflict
  - Nine guerrilla fighters are killed by a Colombian military airstrike in the Arauca
    Department. (AFP via BSS)
  - Syrian conflict
  - A woman is injured in a rocket attack by unknown assailants on a house in Mezzeh,
    Damascus Governorate, Syria. (Al Jazeera)
  - War on drugs, 2025 United States military strikes on alleged drug traffickers
  - The United States defense department announces Operation Southern Spear to target
    alleged narco-terrorists in Central and South America and the Caribbean under
    the US Southern Command's jurisdiction. (DW) (Axios)
  - Four people are killed in an American airstrike against a boat in the Caribbean
    Sea. The attack is announced today, but was carried out four days ago. (Al Jazeera)
  - Saab AB signs a contract worth 3.1 billion (US$3.62 billion) with the Colombian
    government to provide 17 Gripen fighter jets to the Colombian Aerospace Force
    over the next five years. (Reuters)
  - Tuzla retirement home fire
  - Bosnian authorities report that a short circuit from an overburdened power cable
    in a resident's room caused the deadly fire at a Tuzla retirement home. The investigation
    continues to examine possible negligence. (AP)
  - 2025 Nowgam explosion
  - Nine people are killed and 29 others are injured after seized explosives detonate
    inside of a police station in Srinagar, Jammu and Kashmir, India. (NDTV)
  - At least 101 people are killed and others are presumed trapped in a landslide
    at a gold mine near Kolwezi, Lualaba Province, Democratic Republic of the Congo.
    (blue News)
  - Five Chinese nationals are killed after a minibus loses control and crashes in
    Bali, Indonesia. (The Indian Express)
  - Three people are killed and three others are injured when a bus crashes into a
    bus stop in Östermalm, Stockholm, Sweden. (DW)
  - The World Health Organization deploys a team of technical officers and aid to
    monitor and support an outbreak of viral hemorrhagic fever that has killed six
    people in southern Ethiopia. (CIDRAP)
  - France–Mali relations
  - Mali suspends French television channels TF1 and La Chaîne Info from airing in
    the country, citing unverified claims and falsehoods in a broadcast on the ongoing
    fuel blockades by the Islamist militant group Jama'at Nasr al-Islam wal-Muslimin.
    (AP)
  - Mass shootings in the United States
  - 2025 Saint Helena Island shooting
  - A 27-year-old man is arrested and charged with four counts of murder and possession
    of a weapon during a violent crime for a mass shooting that killed four people
    and injured 15 others at a bar in October in Saint Helena Island, South Carolina,
    United States. (CBS News)
  - 2025 Islamabad suicide bombing
  - Four militants linked to the Pakistani Taliban who allegedly planned the suicide
    bombing in Islamabad three days ago are arrested in Pakistan. (DW)
  - Dresden left-wing extremism trial
  - The United States declares four Antifa groups as Foreign Terrorist Organizations,
    including the Germany-based Antifa Ost, who was involved in the attempted murder
    of three neo-Nazi individuals in Saxony and Thuringia. The U.S. government is
    also pursuing action against three other antifa groups in Italy and Greece, including
    the Informal Anarchist Federation. (DW)
  - Mariana dam disaster
  - British High Court judge Finola O'Farrell rules Australian mining corporation
    BHP liable for the 2015 Samarco dam collapse in Mariana, Minas Gerais, Brazil,
    considered the biggest environmental disaster in the country. (The Guardian) (G1)
  - Former rebel leader Roger Lumbala starts a hunger strike to protest his ongoing
    trial over atrocities committed during the second war in the Democratic Republic
    of the Congo, arguing that the French court which judges him does not have legitimacy
    to try him. (AP)
  - The Borgarting Court of Appeal nullifies the Norwegian government's approval of
    three offshore oil and gas development projects due to insufficient assessment
    of combustion-related climate impacts, but allows production to continue for six
    months as authorities address the deficiencies. (Reuters)
  - 2025 Central African general election
  - The rules that incumbent president Faustin-Archange Touadéra may run for another
    term, after opposition parties submitted that he did not meet the criteria to
    seek another term in office. (AP)
  - 2025 Tanzanian election protests
  - Tanzanian president Samia Suluhu Hassan creates an inquiry commission to investigate
    the killings that occurred during recent election-related protests and orders
    the release of some detained participants, while also announcing plans to begin
    constitutional reform within her administration's first 100 days. (AP)
  - French speed skater Timothy Loubineaud breaks the world record at the ISU World
    Cup by more than a second in the 5000 metres with a time of 6:00.23. (Olympics)
    (NOS)
