Date: '2025-11-21'
Source_URI: Portal:Current events/2025 November 21
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Kupiansk offensive
  - Russian Chief of the General Staff Valery Gerasimov announces that Russian forces
    have captured the city of Kupiansk, the administrative centre of Kupiansk Raion,
    Kharkiv Oblast. The Ukrainian military denies the statement. (Reuters)
  - Peace negotiations in the Russo-Ukrainian war, United States and the Russian invasion
    of Ukraine
  - The United States outlines a new 28-point peace proposal to end the war in Ukraine,
    including a casus foederis guarantee for Ukraine and the cession of Russian-occupied
    territories of Ukraine to Russia. (Axios)
  - U.S. president Donald Trump gives Ukraine a deadline of November 27 to accept
    the peace proposal, or the U.S. will end all weapons shipments and military intelligence
    support. Russian president Vladimir Putin confirms he has formally received the
    proposal from the U.S. (BBC News)
  - Zaporizhzhia strikes
  - Five people are killed and three others are injured in a Russian glide bomb strike
    on a high-rise apartment block in Zaporizhzhia, Ukraine. (Euronews)
  - Gaza war
  - Israeli incursions in the West Bank during the Gaza war
  - Two Palestinian teenagers, aged 16 and 18, are killed by Israeli soldiers during
    a raid in East Jerusalem, in the West Bank. (Al Jazeera)
  - Kidnapping in Nigeria, Religious violence in Nigeria
  - 2025 Niger State school kidnapping
  - One person is shot, and 315 people, including 12 teachers and 303 schoolchildren,
    are abducted in an attack on a Catholic school in Agwara, Niger State, Nigeria.
    (BBC News)
  - Miss Universe 2025
  - Fátima Bosch of Mexico is crowned Miss Universe in Nonthaburi, Thailand, becoming
    the fourth Mexican woman to win the title. (ABS-CBN News)
  - 2025 Bangladesh earthquake
  - A earthquake strikes central Bangladesh, killing ten people and wounding over
    350 more. (AA) (Jamuna Television)
  - 2025 HAL Tejas Dubai Airshow crash
  - An Indian Air Force HAL Tejas crashes at the Dubai Airshow in Dubai, United Arab
    Emirates, killing the pilot. (AP)
  - At least 18 people are killed and 21 others injured in an explosion at a glue
    factory in Faisalabad, Punjab, Pakistan. (AP) (Al Jazeera)
  - Jamaica declares a leptospirosis outbreak after Hurricane Melissa, with health
    minister Christopher Tufton reporting nine confirmed cases, 28 suspected cases,
    and six suspected deaths linked to flood-related exposure to contaminated water.
    (Reuters)
  - Flood control projects scandal in the Philippines
  - The Philippine Sandiganbayan issues arrest warrants for former representative
    Zaldy Co and 17 others, including government engineers and construction executives,
    over alleged irregularities in a flood control project in Oriental Mindoro. (AP)
  - Peruvian political crisis
  - 2022 Peruvian self-coup attempt
  - A Peruvian Supreme Court judge orders the arrest and five-month preventive detention
    of former prime minister Betssy Chávez, who is under asylum at the Mexican embassy
    and is being prosecuted for alleged seditious conspiracy in connection with former
    president Pedro Castillo's attempt to dissolve Congress. (Reuters)
  - High Court judge Bobbie Cheema-Grubb sentences former Welsh MEP Nathan Gill to
    10 and a half years in prison after he pleaded guilty to accepting bribes from
    ex-Ukrainian lawmaker Oleh Voloshyn to promote pro-Russian positions in the European
    Parliament. (AP)
