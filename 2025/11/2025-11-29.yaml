Date: '2025-11-29'
Source_URI: Portal:Current events/2025 November 29
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - Two Palestinian children are killed in an Israeli drone attack as they were gathering
    firewood in the town of Bani Suheila in the Gaza Strip. (Sky News) (Al Jazeera)
  - Afghan conflict
  - Two Chinese citizens are shot and killed in an ambush by unidentified gunmen in
    Badakhshan Province, Afghanistan. (Times of Islamabad)
  - 2025 North Indian Ocean cyclone season
  - Cyclone Ditwah
  - The toll from the landslides caused by heavy rains in Sri Lanka increases to 132
    people killed, 191 missing, 44,000 more displaced, and 15,000 houses destroyed.
    (Hindustan Times) (Al Jazeera)
  - Cyclone Senyar
  - The death toll from the floods in Indonesia increases to 303 people. Two more
    people are confirmed killed in Malaysia. (Al Jazeera)
  - Mass shootings in the United States
  - 2025 Stockton shooting
  - Four people are killed and ten others injured in a mass shooting during a family
    gathering at a banquet hall in Stockton, California, United States. (ABC News)
  - Human rights in Tunisia
  - Tunisian police detain National Salvation Front member Chaima Issa in Tunis to
    enforce a 20-year prison sentence after an appellate court recently issued prison
    terms of up to 45 years against several opposition leaders on charges of plotting
    to overthrow the president. (Reuters)
  - Seven people are killed and five others are injured when armed attackers open
    fire inside a bar in Tula de Allende, Hidalgo, Mexico. (AFP via Times of India)
  - The offices of the Italian newspaper La Stampa in Turin are stormed by pro-Palestinian
    protesters. (RAI)
  - 2025 Guinea-Bissau coup d'état
  - Guinea-Bissau's military junta installs a 28-member provisional government after
    seizing power, while ousted president Umaro Sissoco Embaló travels to Brazzaville,
    Republic of the Congo, where he intends to stay. (AFP via France 24)
  - Human rights in Nicaragua
  - Nicaragua releases about 40 political prisoners, who are transferred to house
    arrest and required to report to authorities. (Reuters)
  - 2025 AFL Women's season
  - 2025 AFL Women's Grand Final
  - In women's Australian rules football, the North Melbourne Tasmanian Kangaroos
    defeats the Brisbane Lions in the grand final by 40 points to win their second
    premiership in a row. North Melbourne's half-back Eilish Sheerin is voted best-on-ground.
    (ABC News Australia)
  - 2025 Copa Libertadores
  - 2025 Copa Libertadores final
  - In association football, Flamengo defeats fellow Brazilians Palmeiras 1–0 to win
    their fourth Copa Libertadores title, becoming the most successful Brazilian club
    in the continental competition. (BBC Sport)
