Date: '2025-11-05'
Source_URI: Portal:Current events/2025 November 5
Intelligence_Payload:
  Uncategorized:
  - The United Methodist Church ratifies a constitutional amendment restructuring
    the denomination, enabling each region of the church worldwide to have equal autonomy.
    Other amendments involve expanding membership allowances to account for gender
    and ability, and condemning white supremacy and colonialism. (UMNews) (The Tennessean)
  - 2025 Pacific typhoon season
  - The death toll from Typhoon Kalmaegi's impact on Visayas and Mindanao, Philippines,
    rises to at least 114, with search and rescue operations ongoing. (AP via CBC
    News) (Reuters)
  - 2025 United States listeriosis outbreak
  - An outbreak of listeriosis linked to recalled pasta products in 18 U.S. states
    kills at least six people and causes 25 hospitalizations. (NPR) (Health)
  - 2019 Bolivian political crisis
  - Bolivia's Supreme Court overturns the 10-year prison sentence of former president
    Jeanine Áñez, ruling that she should have been tried by a special judicial body
    responsible for cases involving officials and ordering her release. (AFP via France
    24)
  - 2025 Island of Oléron car ramming
  - Five people are injured, two critically, in a vehicle-ramming attack on the French
    island of Oléron. The perpetrator attempts to set the car on fire, before being
    arrested by the gendarmerie. (The Guardian)
  - Human rights in Malaysia
  - A Malaysian high court rules that police and the government are responsible for
    the enforced disappearances of activist Amri Che Mat and pastor Raymond Koh in
    2016 and 2017, respectively, ordering investigations to be reopened and awarding
    damages exceeding RM 33 million (US$8 million) to their families. The decision
    marks the first judicial finding of state involvement in enforced disappearances
    in Malaysia. (AP)
  - A court in Aachen, North Rhine-Westphalia, Germany, sentences a 44-year-old palliative
    care nurse to life imprisonment for murdering 10 patients and attempting to murder
    27 others with lethal injections at a hospital in Würselen between December 2023
    and May 2024. (AFP via CBS News)
  - Japanese defense minister Shinjiro Koizumi says that troops were sent to Akita
    Prefecture after a series of more than 50 bear attacks since April, which resulted
    in 12 deaths and over 100 injuries. Governor requested aid, saying that local
    authorities lack manpower to handle the situation. (AP)
  - Japanese-born Tomio Okamura of the Freedom and Direct Democracy party is elected
    president of the Chamber of Deputies of the Czech Republic, marking the first
    major appointment under prime minister-designate Andrej Babiš's new coalition
    government. (Reuters)
  - 2025–26 NHL season
  - In ice hockey, Washington Capitals forward Alexander Ovechkin becomes the first
    player in National Hockey League history to score 900 goals. (NHL.com)
