Date: '2025-11-23'
Source_URI: Portal:Current events/2025 November 23
Intelligence_Payload:
  Uncategorized:
  - Israel–Hezbollah conflict
  - November 2025 Israeli attack in Beirut
  - Israel carries out an airstrike on a building in Beirut, Lebanon, killing five
    Hezbollah militants and injuring 28 others. Hezbollah military chief Haytham Ali
    Tabatabai is confirmed among the fatalities. (Al Jazeera)
  - 2025 massacres of Syrian Alawites
  - Sectarian violence erupts in the Homs area of Syria, targeting the Alawite population.
    (SOHR) (The Independent) (The National)
  - International Paderewski Piano Competition
  - South Korean pianist Roh Hyunjin wins the 13th International Piano Competition
    held at the Pomeranian Philharmonic in Bydgoszcz, Kuyavia–Pomerania, Poland. (Portal
    Kujawski)
  - The death toll from the floods in central Vietnam a week ago increases to 90 people.
    (AP)
  - The long-dormant Hayli Gubbi volcano erupts in the Afar Region of Ethiopia for
    the first time in nearly 12,000 years, sending ash plumes across the Red Sea towards
    Oman and Yemen, and causing flight disruptions across the Arabian Peninsula and
    South Asia. (AP)
  - 2026 United Nations Climate Change Conference, Australia–Turkey relations
  - Australia and Turkey confirm an agreement for Turkey to host the 2026 United Nations
    Climate Change Conference (COP31) in Antalya, with Australia leading the conference's
    negotiation process and the Asia–Pacific Group convening a pre-COP31 meeting focused
    on climate-related vulnerabilities. (Reuters)
  - Slender Man stabbing
  - Police detain stabbing convict Morgan Geyser in Posen, Illinois, United States,
    after he removed his monitoring device and fled a supervised group home in Wisconsin.
    Geyser is returned to Wisconsin custody. (BBC News) (Reuters)
  - 2025 Guinea-Bissau general election
  - Bissau-Guineans vote for a president, with incumbent Umaro Sissoco Embaló seeking
    a second term. (AP)
  - 2025 Republika Srpska presidential election
  - Citizens of Republika Srpska, Bosnia and Herzegovina, vote for a president to
    replace Milorad Dodik, who was removed by the court in June. Preliminary results
    show that Dodik's ally, Siniša Karan of SNSD, will defeat Branko Blanuša of SDS
    with 50.89% of the votes. (Al Jazeera)
  - 2025 Slovenian assisted dying referendum
  - Slovenians reject a referendum on a law that proposed legalising assisted dying
    for some terminally ill adults with 53.44% voting against. (Reuters)
  - 2025 in sumo
  - Ukrainian sekiwake Aonishiki Arata defeats Mongolian yokozuna Hōshōryū Tomokatsu
    in the playoff to become the first Ukrainian wrestler to win the Honbasho. (AFP
    via France 24)
