  - Japan records its highest-ever temperature of in Gunma Prefecture, prompting the
    government to issue heat advisories and measures to protect rice crops amid rising
    cases of heat illness and concerns over agricultural damage. (Reuters)
  - Australia–Japan relations, Australian general purpose frigate program
  - Australian defence minister Richard Marles announces that the country will purchase
    eleven Mogami-class frigates from Mitsubishi Heavy Industries to upgrade its Navy
    as the New FFM. (DW)
  - A court in Chișinău sentences the governor of Moldova's autonomous Gagauzia region,
    Evghenia Guțul, to seven years in prison for violations related to the financing
    of the banned opposition Șor Party. (Reuters) (Caliber)
  - Former finance minister Rimantas Šadžius is appointed acting Prime Minister of
    Lithuania following the collapse of the Paluckas government. (Politico)
