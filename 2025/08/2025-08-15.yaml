Date: '2025-08-15'
Source_URI: Portal:Current events/2025 August 15
Intelligence_Payload:
  Uncategorized:
  - Islamic State insurgency in Puntland
  - Puntland counter-terrorism operations
  - Puntland Defense Forces take full control of the strategic Wangable Well in the
    northern Qandala district, Bari region, Puntland from ISIS, which had served as
    a base for the group’s senior leaders, militants, and their families. (Garowe
    Online) (Hiiraan Online)
  - 2025 Pakistan floods
  - Five people are killed when a Khyber Pakhtunkhwa Government Mil Mi-17 helicopter
    crashes in bad weather while carrying relief goods to rain-affected areas of Bajaur
    District in Khyber Pakhtunkhwa, Pakistan. (The Times of India)
  - At least 189 people are killed, dozens are injured, dozens are reported missing,
    and structures are damaged and destroyed in flooding across Khyber Pakhtunkhwa.
    (Dawn) (Euronews)
  - 2025 Atlantic hurricane season
  - The first hurricane of the 2025 season, Hurricane Erin, forms near the Leeward
    Islands. (CBS News)
  - Eighteen people are killed and nine others are injured when a bus plunges into
    a valley in Algiers, Algeria. (Bahrain News Agency)
  - Eleven people are killed and 130 others are injured in an explosion and fire at
    a gunpowder plant in Shilovsky District, Ryazan Oblast, Russia. (CTV News) (The
    Kyiv Independent)
  - A bus collides with a stationary truck in Bardhaman, West Bengal, India, killing
    ten people and injuring 35 others. (Hindustan Times)
  - One person is killed and 27 others are injured, including two airlifted, when
    a train collides with a slurry tanker on a level crossing and derails between
    Tinglev and Sønderborg in the Region of Southern Denmark. (BBC News)
  - The leaders of Belize, Guatemala, and Mexico announce the establishment of a tri-national
    nature reserve to preserve the Maya Forest. It will be the second-largest nature
    reserve in Latin America behind the Amazon rainforest. (AP)
  - Peace negotiations in the Russian invasion of Ukraine
  - 2025 Russia–United States Summit
  - Russian president Vladimir Putin travels to Alaska to meet with United States
    president Donald Trump to discuss pathways to bring an end to the Russian invasion
    of Ukraine. Ukrainian president Volodymyr Zelenskyy was not invited to the summit.
    (CNN)
  - Guinea-Bissau–Portugal relations
  - Guinea-Bissau expels representatives of Portuguese news agency Lusa and public
    broadcaster RTP from the country. Portugal summons the Guinea-Bissauan ambassador
    over the move. (TRT World)
  - Crime in Sweden
  - One person is killed and another is injured in a shooting outside a mosque in
    Örebro, Närke, Sweden. The suspect fled the scene and is at large. (Euronews)
  - Gwangbokjeol, 2025 South Korean presidential election
  - South Korean president Lee Jae Myung holds a "de facto" inauguration ceremony,
    known as the "People's Mandate Ceremony", coinciding with the 80th anniversary
    of Korea's liberation from Japan at Gwanghwamun Square in Seoul, where he receives
    letters of appointment from 80 selected individuals. Lee took office on June 4
    after winning the 21st presidential election without an official inauguration
    ceremony. (Anadolu Ajansı)
