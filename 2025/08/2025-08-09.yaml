Date: '2025-08-09'
Source_URI: Portal:Current events/2025 August 9
Intelligence_Payload:
  Uncategorized:
  - At least six Lebanese soldiers are killed in an explosion while removing munitions
    from a Hezbollah facility near the Israeli border. (Al Arabiya)
  - A passenger train derails after hitting an excavator in Tabas, Iran injuring 30
    people. (Caspian Post)
  - Atomic bombings of Hiroshima and Nagasaki
  - In commemoration of the 80th anniversary of the atomic bombings of Hiroshima and
    Nagasaki, the twin bells of Urakami Cathedral, that were destroyed, are restored
    in Nagasaki. The anniversary is attended by about 2,600 people, including foreign
    dignitaries and survivors of the bombings. (AP) (CBC) (Sky News)
  - Foreign relations of Singapore
  - Multiple national leaders attend celebrations of the 60th anniversary of Singaporean
    independence, including Bruneian sultan Hassanal Bolkiah and Indonesian president
    Prabowo Subianto. (Al Jazeera) (The Jakarta Post) (The Star)
  - Haitian crisis
  - The Haitian government announces a three-month state of emergency in the central
    and western regions of Haiti aiming to curb hunger and gang violence in the regions.
    (Al Jazeera) (AP)
  - Gaza war protests in the United Kingdom
  - A total of 474 people are arrested in London, England, during a protest in support
    of Palestine Action, which was proscribed as a terrorist group on 5 July. (BBC
    News)
  - Two people are killed and five others are injured in a drive-by mass shooting
    in a busy area in Nassau, The Bahamas. (The Nassau Guardian)
  - Former Chadian prime minister and leader of the Les Transformateurs party Succès
    Masra is sentenced to 20 years in prison and fined F.CFA 1 billion (US$1,775,200)
    after being convicted of disseminating racist and xenophobic messages that incited
    violence, a verdict his legal team plans to appeal. (Reuters)
