Date: '2025-08-29'
Source_URI: Portal:Current events/2025 August 29
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - Israel recovers the bodies of two hostages in Gaza, one of whom is identified
    as Elan Weiss, who was killed in the October 7 attacks. (CNN)
  - A severe weather system in Greater Poland causes heavy rainfall, thunderstorms,
    and strong winds, triggering the evacuation of the Bałtyk office building in Poznań
    due to flooding. A tornado later forms in the vicinity of Gniezno. No injuries
    are reported. (TVP Info)
  - Diplomatic impact of the Gaza war, Israel–Turkey relations
  - Turkey closes its airspace to Israeli government aircraft and maintains a ban
    on trade and maritime traffic with Israel in response to the Gaza war. (AP)
  - Eightieth session of the United Nations General Assembly, Palestine–United States
    relations, Visa policy of the United States
  - United States secretary of state Marco Rubio blocks Palestinian Authority president
    Mahmoud Abbas and 80 other officials from attending the United Nations General
    Assembly in New York City in September by revoking their previously-valid travel
    visas. (Sky News) (PBS)
  - 2024 South Korean martial law crisis
  - South Korean special prosecutors indict former prime minister Han Duck-soo without
    detention on charges of abetting the imposition of martial law on December 3,
    2024, preparation of false public documents and perjury for falsely testifying
    that he had not been aware of the martial law declaration. (Kyodo News)
  - Austria and Russian intelligence
  - Austrian prosecutors indict former intelligence officer Egisto Ott on charges
    of espionage, abuse of office, and providing sensitive information to fugitive
    Wirecard executive Jan Marsalek and Russian intelligence services. (AP)
  - The English Court of Appeal rules that the government may continue housing asylum
    seekers in a hotel in Epping, Essex, overturning a previous order to relocate
    them. (The New York Times)
  - Former South Korean first lady Kim Keon Hee is indicted on bribery and other charges
    related to a wider investigation into her and her husband, former president Yoon
    Suk Yeol. (Reuters)
  - 2025 Indonesian protests
  - August 2025 Indonesian protests
  - At least three people are killed and four others are injured after protesters
    set fire to the Regional House of Representatives building in Makassar, South
    Sulawesi, Indonesia. (AFP via RNZ)
  - 2025 Philippine House of Representatives elections
  - The Philippine Commission on Elections denies the right-wing Duterte Youth's motion
    to reconsider the cancellation of their party-list registration and disqualifies
    them from holding their three seats in the House of Representatives. However,
    Duterte Youth may still appeal to the Supreme Court. (ABS-CBN News)
  - 2025 Samoan general election
  - Samoans are called in a snap election to elect the members of the Legislative
    Assembly. (Reuters)
  - 2025 Thai political crisis
  - The Thai Constitutional Court removes Prime Minister Paetongtarn Shinawatra from
    office for ethical misconduct over leaked phone calls she had with former Cambodian
    prime minister Hun Sen. (Al Jazeera) (BBC News)
