Date: '2025-08-25'
Source_URI: Portal:Current events/2025 August 25
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Killing of journalists in the Gaza war
  - 2025 Nasser Hospital strikes
  - Four Israeli airstrikes against Nasser Hospital in Khan Yunis, Palestine, kill
    22 people, including five journalists working for Reuters and AP, according to
    Palestinian authorities. (ABC News Australia) (NPR) (The Guardian) (BBC News)
  - Hassan Douhan, a journalist for newspaper Al-Hayat Al-Jadida, is fatally shot
    by Israeli forces in the Al-Mawasi area of Khan Yunis, Palestine. (Anadolu Agency)
  - Tariffs in the second Trump administration
  - Multiple postal organizations such as Australia Post and Japan Post announce a
    temporary suspension of shipments to the United States in response to President
    Donald Trump's executive order suspending the de minimis exemption. (Reuters)
    (ABC News Australia)
  - 2025 Pacific typhoon season
  - The Vietnamese government closes all schools and airports in the North Central
    Coast and orders 600,000 people to evacuate as Typhoon Kajiki makes landfall in
    the Hà Tĩnh and Quảng Bình provinces, killing four people and injuring thirteen
    others. (BBC News) (AP in Spanish)
  - 2025 Isle of Wight helicopter crash
  - Three people are killed and another is seriously injured when a Robinson R44 helicopter
    crashes into the ground during a flying lesson near Shanklin on the Isle of Wight,
    England. (BBC News)
  - 2025 Botswana medical crisis
  - Botswana president Duma Boko declares a public health emergency after the national
    medical supply chain collapses, ordering the military to manage emergency distribution
    while the government allocates P250 million (US$18.6 million) in funding to address
    nationwide shortages of medical supplies. (Reuters)
  - Rohingya refugees in Bangladesh
  - Bangladeshi chief adviser Muhammad Yunus declares that the country cannot allocate
    additional domestic resources to support its 1.3 million Rohingya refugees and
    urges the international community to create a sustainable plan for their repatriation
    to Myanmar. (Reuters)
  - List of executive orders in the second Trump presidency
  - U.S. president Donald Trump signs an executive order instructing the Department
    of Justice to federally prosecute flag desecration, contradicting constitutional
    protections by the First Amendment as affirmed with Texas v. Johnson and United
    States v. Eichman, the former the order acknowledges. (MSNBC) (The New York Times)
  - Mexican drug war
  - Former Mexican drug lord and Sinaloa Cartel top leader Ismael "El Mayo" Zambada
    pleads guilty to drug trafficking charges in the United States. (AP)
  - Archaeology of the Americas
  - A new lineage of Pre-Ceramic period humans found in 1992 at the Checua archaeological
    site in Nemocón, Colombia, has their remains fully genome sequenced. (Reuters)
