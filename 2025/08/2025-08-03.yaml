Date: '2025-08-03'
Source_URI: Portal:Current events/2025 August 3
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza Strip aid distribution killings
  - Israeli forces kill at least 33 Palestinians seeking food and six other Palestinians
    die of hunger. (AP) (Reuters)
  - Russian invasion of Ukraine
  - Attacks in Russia during the Russian invasion of Ukraine
  - A massive fire is reported at an oil refinery in Sochi, Russia, following a Ukrainian
    drone attack on the facility. Smoke from the fire prompts Russian authorities
    to close Sochi International Airport. (BBC News)
  - Sixty-eight people are killed, 74 others are reported missing and 12 others are
    injured when a boat carrying 154 Ethiopian migrants capsizes off Abyan Governorate,
    Yemen. (AP)
  - Krasheninnikov, a volcano on Russia's Kamchatka Peninsula, erupts for the first
    time since the 15th century and the first in historical records. The eruption
    takes place four days after a magnitude 8.8 earthquake hit the same region on
    July 30, which may have contributed to the eruption. (CNN)
  - Four workers are killed while inspecting sewage pipes after falling into a manhole
    filled with hydrogen sulfide in Gyōda, Saitama Prefecture, Japan. (DW)
  - Two people are killed and three others are injured in a mass stabbing attack at
    a primary school in Caizichi, Leiyang, Hunan, China. (Sina News)
