Date: '2025-08-04'
Source_URI: Portal:Current events/2025 August 4
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza Strip aid distribution killings, Gaza Strip famine
  - At least 74 Palestinians are killed by Israeli gunfire and airstrikes, including
    ten seeking aid, and another five Palestinians die of starvation. (Reuters) (Channel
    4 News)
  - Israeli invasion of the Gaza Strip
  - Israeli prime minister Benjamin Netanyahu announces that the Israeli government
    has decided to completely militarily occupy the Gaza Strip and fully eliminate
    Hamas, and tells Chief of the General Staff Eyal Zamir to resign. (Euronews)
  - Islamic State insurgency in Puntland
  - Puntland counter-terrorism operations
  - Puntland and U.S. forces conduct a counter-terrorism operation in Sanaag, Puntland,
    detaining three Islamic State militants. (Tracking Terrorism)
  - Over 10,000 hotel owners in Europe, represented by the HOTREC union, file a joint
    lawsuit against Netherlands-based travel agency Booking.com seeking compensation
    for losses from 2004 to 2024, alleging that the booking agency prevented the hotels
    from offering lower prices on their own sites. (DW) (Reuters)
  - Eight people are killed and two others are injured in a vehicle collision on the
    BR-491 highway in Guaxupé, Minas Gerais, Brazil. (G1 Globo)
  - Three people are killed and 18 others are injured in a multiple-vehicle collision
    on the Autostrada A1 in Montevarchi, Province of Arezzo, Italy. (Arezzo Notizie)
  - 2025 Cambodia–Thailand border conflict, Cambodia–Thailand relations
  - Delegates from Cambodia and Thailand meet in Malaysia, the current ASEAN chair
    seat, to negotiate a long-term ceasefire at their border following clashes that
    killed dozens of people and displaced over 270,000 others. (AP)
  - India–Philippines relations, Territorial disputes in the South China Sea
  - The Indian and Philippine navies conduct their first joint exercise in the Philippine-designated
    exclusive economic zone in the South China Sea. The Indian Navy deployed guided
    missile destroyers, tankers, and corvettes, while the Philippines sent two frigates.
    (AP) (Reuters)
  - 2022 Brazilian coup plot
  - Brazilian Supreme Court justice Alexandre de Moraes issues a house arrest order
    for former president Jair Bolsonaro, who is standing trial for allegedly plotting
    a coup, and bans him from receiving visits and using a cell phone either directly
    or through third parties. (Reuters)
  - Lithuanian prime minister Gintautas Paluckas resigns after allegations of misconduct
    relating to business interests. (LRT)
