Date: '2025-08-01'
Source_URI: Portal:Current events/2025 August 1
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - United States and the Russian invasion of Ukraine, Russia–United States relations
  - U.S. president Donald Trump orders the deployment of two United States Navy nuclear
    submarines near Russia for potential military action against Russian forces in
    response to statements made by former Russian president Dmitry Medvedev and current
    deputy chairman of the Security Council of the Russian Federation regarding Trump's
    previously-stated deadline for ending the war in Ukraine. (Reuters) (BBC News)
  - Kivu conflict
  - M23 campaign
  - M23 rebels clash with Wazalendo militia Volunteers for the Defense of the Homeland
    in Bwito Chiefdom, Democratic Republic of the Congo. (Radio Okapi)
  - Gaza war
  - Israeli blockade of the Gaza Strip, Gaza Strip famine
  - Following German defence minister Boris Pistorius's decision on Monday, the Luftwaffe
    begins air dropping humanitarian aid into the Gaza Strip. (German Federal Foreign
    Office)
  - Tariffs in the second Trump administration
  - U.S. tariffs on more than 90 countries enter force following a 90-day pause to
    allow the countries to prepare, including a 35% tariff on some Canadian goods
    and a 50% tariff on Brazilian goods. (BBC News)
  - France–Palestine relations
  - France temporarily suspends its programme for receiving Palestinian refugees fleeing
    the Gaza Strip following the deportation of a Palestinian student accused of making
    antisemitic social media posts. (Le Monde)
  - Mass shootings in the United States
  - At least four people are killed in a mass shooting at a bar in Anaconda, Montana,
    United States. A 45-year-old suspect fled the scene and remains at large. (AP)
    (NBC Montana)
  - One teenager is killed and five other people are wounded, including two seriously,
    in a mass shooting at a nightclub in Mayagüez, Puerto Rico. (ABC News)
  - 2024 South Korean martial law crisis
  - The Seoul Central District Court issues an arrest warrant for former interior
    minister Lee Sang-min on charges of conspiring with former president Yoon Suk
    Yeol in his failed martial law attempt on December 3, 2024, becoming the second
    Yoon cabinet minister to be arrested after Kim Yong-hyun. (Yonhap News Agency)
  - Former Colombian president Álvaro Uribe is sentenced to twelve years of house
    arrest and fined US$840,000 for witness tampering and bribery. (France 24)
  - Indonesian president Prabowo Subianto pardons former trade minister Thomas Lembong
    and Secretary-General of the Indonesian Democratic Party of Struggle Hasto Kristiyanto,
    two prominent opposition figures sentenced under controversial corruption charges.
    (Jakarta Globe)
  - South African police arrest nearly 1,000 undocumented miners at a gold mine in
    Barberton, Mpumalanga. (DW)
