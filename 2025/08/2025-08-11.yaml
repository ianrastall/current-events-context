Date: '2025-08-11'
Source_URI: Portal:Current events/2025 August 11
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Dobropillia offensive
  - Russian forces launch a full-scale ground assault in the direction of Dobropillia,
    Donetsk Oblast, with heavy clashes reported along multiple points on the front
    line. (UNN)
  - Sudanese civil war
  - Darfur campaign
  - At least 40 people are killed and 19 others are injured in attacks by the Rapid
    Support Forces on a famine-stricken displacement camp in Al-Fashir, North Darfur,
    Sudan. (CTV News)
  - Territorial disputes in the South China Sea
  - A China Coast Guard vessel is damaged after colliding with a Chinese Navy ship
    while trying to expel a Philippine Coast Guard vessel from Scarborough Shoal.
    (Philippine News Agency)
  - 2025 Atlantic hurricane season
  - Tropical Storm Erin forms in the Atlantic Ocean, killing seven people and leaving
    others missing in São Vicente, Cape Verde. (The Weather Channel) (CNN) (DTudo1Pouco)
  - 2025 Clairton Coke Works explosion
  - Two people are killed and another ten people are injured in an explosion at the
    Clairton Coke Works U.S. Steel plant in Clairton, Pennsylvania, United States.
    (AP) (WPXI-TV)
  - Seven people are killed in a mudslide in Danyor, Gilgit-Baltistan. (AP News)
  - A botulism outbreak in southern Italy kills three people and hospitalizes at least
    17 others following the consumption of contaminated meat and vegetables in Diamante,
    Calabria, and Cagliari, Sardinia, a week prior. (The Independent) (Berliner Morgenpost)
  - Australia–Palestine relations, International recognition of Palestine
  - Australian prime minister Anthony Albanese announces that Australia will recognise
    Palestine as an independent country in September. (The Guardian)
  - Israel–Norway relations, Disinvestment from Israel
  - The Norwegian Pension Fund divests from 11 Israeli companies and terminates its
    contracts with asset managers in Israel, following reports last week that it invested
    in an Israeli jet engine company that sold parts to the IDF. (Reuters)
  - Assassination of Miguel Uribe Turbay
  - Colombian senator and presidential pre-candidate Miguel Uribe Turbay dies after
    he was shot in June. (Barron's)
  - Three people are killed in a shooting at a Target Corporation building in Austin,
    Texas, United States. (KVUE-TV)
  - U.S. president Donald Trump places the Metropolitan Police Department of the District
    of Columbia under federal government-control and orders 800 National Guard troops
    to enter Washington, D.C., allegedly to fight rising crime rates. (Reuters)
  - The United States Department of State formally designates the Balochistan Liberation
    Army as a Foreign Terrorist Organization (FTO) in response to the killings of
    civilians in Balochistan, Pakistan. (Reuters)
