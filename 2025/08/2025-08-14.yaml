Date: '2025-08-14'
Source_URI: Portal:Current events/2025 August 14
Intelligence_Payload:
  Uncategorized:
  - Myanmar civil war
  - At least 21 people are killed and seven others are injured in a Tatmadaw airstrike
    on Mogok, Mandalay Region, Myanmar, controlled by the Ta'ang National Liberation
    Army, with homes and religious buildings also damaged. (AP)
  - Somali Civil War
  - At least three people are killed amid fierce clashes between security forces and
    local militants in Somalia's capital city Mogadishu due to tensions over residential
    building evictions and demolitions. (Garowe Online)
  - 2025 Kishtwar district flash flood
  - At least 65 people are killed, while more than 167 others are injured, including
    38 critically, and over 220 are reported missing following a massive cloudburst
