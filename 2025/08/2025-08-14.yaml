  - Three people are killed, including a child, and 109 others are injured, including
    three critically, by celebratory gunfire during Independence Day in Pakistan.
    Police arrest 86 suspects for their involvement and seize 68 illegal weapons.
    (The Express Tribune) (Dawn)
  - 2024–2025 Sudanese cholera epidemic
  - According to the Sudanese government, at least 40 people have died of cholera
    in the Darfur region over the last week in the country's worst outbreak in years.
    (MSN)
  - North Korea–South Korea relations
  - Kim Yo Jong, sister of North Korean supreme leader Kim Jong Un, states in a KCNA
    article that the rumour that North Korea had removed the loudspeakers in the Korean
    Demilitarized Zone is false. (Al Jazeera) (The Independent)
  - Mali announces the arrest of two generals, other military officers, civilians,
