Date: '2025-08-22'
Source_URI: Portal:Current events/2025 August 22
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Gaza Strip famine
  - The UN-backed Integrated Food Security Phase Classification officially declares
    a famine in Gaza Governorate in the Gaza Strip, while conditions in the North
    Gaza Governorate are estimated to be as severe or worse. The Office for Human
    Rights states that the famine is the direct result of actions taken by the Israeli
    government, while the Israeli government disputes the report and its methodology.
    (The New York Times) (OHCHR)
  - Red Sea crisis
  - A Houthi ballistic missile breaks up and a Houthi drone is intercepted over southern
    Israel. (The Times of Israel)
  - Sudanese civil war
  - Darfur campaign
  - The Office of the United Nations High Commissioner for Human Rights reports paramilitary
    attacks in Darfur, Sudan, left 89 civilians dead in 10 days. (AP)
  - Russian invasion of Ukraine
  - A naval drone operated by Ukrainian military intelligence explodes in Novorossiysk,
    Krasnodar Krai, Russia after being seized by Russian military divers, killing
    five of them. (MSN)
  - Three militants who were involved in the Bucha massacre in 2022 are killed and
    two others are injured in an explosion at a house in Kalynove, Luhansk Oblast,
    Ukraine. (MSN)
  - Sistan and Baluchestan insurgency
  - Five police officers are killed in a mass shooting by unknown gunmen while patrolling
    on a highway in Sistan and Baluchestan province, Iran. (AP)
  - Syrian civil war
  - Three people are killed, including both attackers, in an Islamic State suicide
    bombing and shooting at a checkpoint in Deir ez-Zor, Syria. (Shafaq News)
  - A part of the under-construction Jianzha Yellow River Bridge collapses into the
    Yellow River on the border of Jainca County, Qinghai, China, killing twelve people
    and leaving four others missing. (CBS News)
  - Five people are killed and 49 others are injured, including several airlifted,
    when a tour bus loses control and overturns on Interstate 90 West in Pembroke,
    New York, United States. (WIVB-TV) (BNO News)
  - At least four people are killed and four others are injured in an explosion at
    a fireworks warehouse in San Miguel Zacaola, Santo Tomás Hueyotlipan, Mexico.
    (Municipios Puebla)
  - Corruption in Sri Lanka
  - Sri Lanka police arrest and detain former president Ranil Wickremesinghe for allegedly
    misusing public funds while in office. (Reuters)
  - Deportation of Kilmar Abrego Garcia
  - Improperly deported Salvadoran national Kilmar Abrego Garcia is released from
    jail in Cookeville, Tennessee, United States, to reunite with family while awaiting
    trial on people smuggling charges. (AP)
  - Killing of Iryna Zarutska
  - Ukrainian refugee Iryna Zarutska is killed in a stabbing incident on the Lynx
    Blue Line in Charlotte, North Carolina. The suspect, identified as 34-year-old
    Decarlos Brown, is arrested. (ABC News) (CNBC)
  - At least five people are killed and 18 others are injured during clashes in Sulaymaniyah,
    Kurdistan Region, Iraq, after the arrest of the nephew of former president Jalal
    Talabani. (AP)
  - Five people are injured, including three in life-threatening condition, in an
    arson attack at an Indian restaurant in Ilford, Greater London, England. No arrests
    have been made. (Sky News)
  - United States district judge Christine Arguello of Colorado sentences former Gambian
    paramilitary member Michael Sang Correa to 67.5 years in prison after a jury found
    him guilty of torture and conspiracy to commit torture related to abuses committed
    in 2006 as part of ex-president Yahya Jammeh's death squad. The case marks the
    first successful U.S. federal conviction for torture under its extraterritorial
    jurisdiction. (TRIAL International)
  - Schoof cabinet
  - Dutch foreign minister Caspar Veldkamp resigns from the current cabinet after
    failing to come to an agreement with coalition partners People's Party for Freedom
    and Democracy and Farmer–Citizen Movement over implementing additional sanctions
    against Israel. (DutchNews.nl)
