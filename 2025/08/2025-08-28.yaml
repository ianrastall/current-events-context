Date: '2025-08-28'
Source_URI: Portal:Current events/2025 August 28
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Red Sea crisis
  - 28 August 2025 Israeli attack on Yemen
  - Israeli airstrikes hit Sanaa, Yemen, reportedly assassinating Houthi prime minister
    Ahmed al-Rahawi and several of his companions hours after the Houthis launched
    a drone towards Israel which was intercepted by the Israeli military. (The Times
    of Israel) (AP)
  - Israel–Hezbollah conflict
  - The Lebanese army reports that two soldiers were killed and two others were injured
    after an Israeli drone crashed and exploded in An-Naqoura, southern Lebanon, while
    they were inspecting it. (Reuters)
  - The United Nations Security Council votes unanimously to withdraw its peacekeeping
    mission in Lebanon on December 31, 2026. (AP)
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine, Kyiv strikes
  - The Russian Armed Forces launch nearly 600 drones and more than 30 ballistic and
    cruise missiles at Kyiv, Ukraine, striking multiple residential areas, killing
    25 people, including four children, and wounding 63 others, including 11 children.
    (BBC News) (MSN)
  - Ukrainian spy ship Simferopol is sunk by a drone strike in the Danube river, killing
    two people and leaving several others missing or injured. (The Kyiv Independent)
  - Colombian conflict
  - August 2025 FARC dissidents clashes
  - Colombia's Ombudsman's Office confirms that 33 soldiers detained for three days
    in a village in Guaviare after clashes with dissident FARC fighters have been
    released following negotiations involving officials and the United Nations. (Al
    Jazeera)
  - A Polish Air Force F-16 training jet crashes during rehearsals for the 2025 Radom
    Air Show in Radom, Poland, killing the pilot. (Reuters) (Echo Dnia)
  - A cholera outbreak in Bukkuyum, Zamfara State, Nigeria, kills at least eight people
    and infects over 200 others across eleven communities. (Reuters)
  - Russian invasion of Ukraine, Russia–United Kingdom relations
  - Kyiv strikes
  - The United Kingdom summons Russia's ambassador to the UK, Andrey Kelin, after
    the British Council's office in Kyiv was heavily damaged and one employee was
    injured in an overnight Russian attack on Kyiv. (BBC News)
  - Philippines–Taiwan relations
  - Taiwanese foreign minister Lin Chia-lung visits the Philippines as part of a business
    mission. The Philippine Department of Foreign Affairs later states that it did
    not recognize any Taiwan official as a member of the business delegation, reiterating
    its adherence to One China. (Philippine Daily Inquirer)
  - 2025 Indonesian protests
  - August 2025 Indonesian protests
  - A Mobile Brigade Corps armored tactical vehicle intentionally runs over and kills
    an online motorcycle taxi driver at an anti-government demonstration in Jakarta,
    Indonesia. The seven occupants of the vehicle have been detained. (BBC News)
  - Brazilian federal police and the taxation authority conduct nationwide raids targeting
    organized crime schemes in the energy sector, investigating money laundering and
    fraud involving more than R$10 billion (US$1.9 billion) in imports, R$52 billion
    (US$9.7 billion) in domestic sales, and R$46 billion (US$8.6 billion) in related
    financial transactions. (Reuters)
  - Croatian police detain a 54-year-old military officer and his Serbian partner
    on suspicion of spying for Serbia, with prosecutors opening an investigation into
    the case. (Reuters)
  - Algerian president Abdelmadjid Tebboune dismisses Prime Minister Nadir Larbaoui
    and appoints industry minister Sifi Ghrieb as acting prime minister. (Reuters)
