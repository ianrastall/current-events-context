Date: '2025-08-08'
Source_URI: Portal:Current events/2025 August 8
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - The Israeli Security Cabinet approves Prime Minister Benjamin Netanyahu's plan
    to capture Gaza City with the stated objective of defeating Hamas, while supposedly
    ensuring the provision of humanitarian aid to civilians outside the areas of combat.
    (Bloomberg)
  - Germany announces it will halt weapon shipments to Israel that could be used in
    Gaza "until further notice" in light of Israel's plan to fully militarily occupy
    Gaza. (AP)
  - The Israel Defense Forces begins massing troops and tanks on the border with Gaza
    ahead of an expected major ground offensive. (The Times of India)
  - Kivu conflict
  - M23 campaign
  - Volker Türk, the UN high commissioner for human rights, reports that M23 rebels
    have killed over 319 civilians in July. M23 president Bertrand Bisimwa said the
    group would investigate the claim. (Al Jazeera) (Reuters)
  - Insurgency in Balochistan
  - At least 33 Pakistani Taliban militants are killed in an overnight operation near
    the Afghanistan border in Zhob, Balochistan, Pakistan. (CTV News)
  - War on drugs
  - U.S. president Donald Trump signs an executive order commanding the U.S. military
    and other sectors of the federal government to take action against Latin American
    drug cartels designated as terrorist organisations, such as Tren de Aragua and
    MS-13. (Al Jazeera) (The New York Times)
  - A bus carrying mourners back home from a funeral in Kisumu, Kenya, overturns and
    plunges into a ditch, killing at least 21 people. (MSN)
  - A bus and a truck collide head-on near Lucas do Rio Verde, Mato Grosso, Brazil,
    killing 11 people and injuring 45 others. (Reuters)
  - At least 15 people are killed and 33 others are missing following a flash flood
    in Yuzhong County, Gansu, China. (China Daily)
  - At least 30 people are injured when a passenger train derails on the Kerman–Zarand
    railway path near Siriz, Kerman province, Iran. (The Express Tribune) (Caliber)
  - A fire breaks out at the Mosque–Cathedral of Córdoba in Andalusia, Spain, due
    to a short circuit. The roof of a chapel collapses, but the fire is extinguished
    with no further damage. (The Guardian) (El País)
  - Armenia–Azerbaijan relations
  - Armenia–Azerbaijan peace agreement
  - The leaders of Armenia and Azerbaijan plan to sign a joint declaration at the
    White House in Washington, D.C., United States, committing to a peace deal facilitated
    by the Trump administration that would end nearly four decades of conflict between
    the two countries. (CNN)
  - Armenia agrees to grant the U.S. exclusive development rights in the Zangezur
    corridor for 99 years. The U.S. would sublease to a consortium to develop rail,
    oil, gas, and fiber optic lines along the 27-mile (43km) corridor. (Politico)
  - 2025 Indian electoral controversy
  - Rahul Gandhi, the Leader of the Opposition in Lok Sabha alleges an electoral fraud(vote
    chori) done by the Election Commission of India in connection with the BJP in
    multiple elections across India.
  - 2025 Anaconda shooting
  - The suspected perpetrator of the bar shooting that killed four people last week
    in Anaconda, Montana, United States, is arrested. (KRTV-TV)
  - 2024 South Korean martial law crisis
  - The Seoul Central District Court rejects a petition brought by former interior
    minister Lee Sang-min regarding the arrest warrant against him over his alleged
    involvement in former president Yoon Suk Yeol's martial law attempt on December
    3, 2024. (The Korea Times)
  - A police officer and the perpetrator are killed, and another officer suffers non-life-threatening
    injuries, in a shooting at the CDC building near Emory University in Atlanta,
    Georgia, United States. (CNN) (WAGA-TV)
  - The Uganda High Court denies bail to opposition figure Kizza Besigye, who faces
    treason charges, ruling that the 180-day period for mandatory release began when
    his case was transferred to a civilian court in February, leaving him 12 days
    short of eligibility. (Reuters)
  - Portugal's Constitutional Court blocks a parliamentary bill that would require
    most legally resident immigrants to wait two years before applying for family
    reunification, ruling that it violates constitutional protections for family unity.
    (Reuters)
  - Brazilian president Luiz Inácio Lula da Silva vetoes 63 provisions of a congressional
    bill revising environmental licensing rules, removing measures that would have
    expanded fast-tracking of projects in sensitive areas such as the Amazon rainforest.
    (AP)
