Date: '2025-08-17'
Source_URI: Portal:Current events/2025 August 17
Intelligence_Payload:
  Uncategorized:
  - Officials announce that the Gathering of Nations event in Albuquerque, New Mexico,
    United States, will host its final pow-wow in 2026. (AP)
  - 2025 Air Canada flight attendants strike
  - Air Canada suspends its plan to resume flights after cabin crew continued a strike
    despite a Canada Industrial Relations Board order and government-imposed arbitration,
    leaving operations halted and affecting more than 700 flights and about 130,000
    daily passengers. (Philippine Daily Inquirer)
  - 2025 Sulawesi earthquake
  - One person is killed and 29 people are injured when a undersea earthquake strikes
    near Poso, Central Sulawesi, Indonesia. (AP) (Jawa Pos)
  - More than 40 people are reported missing and ten others are rescued when a boat
    carrying 50 people to a popular market capsizes on the Sokoto River near Goronyo,
    Sokoto State, Nigeria. (Reuters) (AP)
  - At least seven people are killed and five others are injured when a cloudburst
    causes flash flooding and landslides in Kathua district, Jammu and Kashmir, India.
    (Hindustan Times) (Daily Excelsior)
  - 2025 Crown Heights nightclub shooting
  - Three people are killed and nine others are injured in a mass shooting at a nightclub
    in the Crown Heights neighborhood of New York City, United States. (Minnesota
    Star Tribune)
  - Ecuadorian conflict
  - At least seven people are killed in a mass shooting at a billiard hall in Santo
    Domingo, Ecuador. (France 24)
  - Gaza war
  - Gaza war hostage crisis
  - Israeli hostage deal protests
  - A general strike and mass protests calling for a hostage deal and ceasefire to
    end the Gaza war occur across Israel, involving approximately 2.5 million protesters
    across the country and 300,000 at the protest held in Hostages Square, Tel Aviv.
    At least 32 protesters are arrested. (Haaretz) (CBS News)
  - 2025 Bolivian general election
  - Bolivians vote to elect a president, vice president, 130 members of the Chamber
    of Deputies, and 36 members of the Chamber of Senators. Preliminary results indicate
    a run-off between Senator Rodrigo Paz Pereira and former president Jorge Quiroga,
    ending the Movimiento al Socialismo's 20-year political dominance. (Reuters) (AP)
  - Horse racing in Great Britain
  - The British Horseracing Authority announces a one-day strike on September 10 to
    protest a proposed increase in betting taxes from 15% to 21%. This is the first
    time the sport has ever voluntarily refused to race in modern history. (AP) (BBC
    Sport)
