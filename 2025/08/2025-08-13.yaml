Date: '2025-08-13'
Source_URI: Portal:Current events/2025 August 13
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - Israeli forces launch a massive aerial bombardment on Gaza City, killing 123 people
    across the Gaza Strip, amid reports that the Israeli Army is about to enter the
    city. (BBC News) (RTÉ News)
  - Colombian conflict
  - Three soldiers are killed and four others are injured in a drone attack by FARC
    dissidents on members of the Colombian Navy and Armed Forces who were manning
    a checkpoint on the Naya River in south-west Colombia. (BBC News)
  - Insurgency in Khyber Pakhtunkhwa
  - Two children and a woman are killed by a mortar in Bajaur, Khyber Pakhtunkhwa,
    Pakistan, amidst fighting between the Pakistani military and Tehreek-e-Taliban
    Pakistan fighters. (AP)
  - Fashion retailer Claire's collapses into administration in the United Kingdom
    and Ireland, putting more than 2,150 jobs at risk, amid declining sales and strong
    competition from online shopping services. (BBC News)
  - Canadian clothing company Gildan finalizes the details for its acquisition of
    American company Hanesbrands for US$2.2 billion. (AP)
  - 2025 Pacific typhoon season
  - Typhoon Podul makes landfall in southern Taiwan, killing one person, injuring
    112 people, leaving one missing, causing hundreds of flight cancellations, thousands
    of evacuations, school closures and blackouts. (Al Jazeera) (Focus Taiwan) (United
    Daily News)
  - Twenty-six people are killed and several others are missing after a boat carrying
    migrants capsizes off the coast of Lampedusa, Sicily, Italy. (Ansa) (AP)
  - Thirteen people are killed and 50 others become ill, including 21 cases of blindness
    or impaired vision and some critically, from methanol poisoning in Kuwait. (Reuters)
  - One person is killed and five others are injured when a hot air balloon carrying
    34 people crashes near De Hoeve, Friesland, Netherlands. (NOS)
  - Humanitarian impact of the Sudanese civil war
  - 2024–2025 Sudanese cholera epidemic
  - Sudanese health authorities launch a ten-day cholera vaccination campaign in Khartoum
    targeting over 150,000 people to curb an outbreak that has caused more than 83,000
    cases and 2,100 deaths nationwide since July 2024. (AP)
  - Australia–Vanuatu relations
  - Australia and Vanuatu agree to implement a A$500 million (US$327 million) deal
    over the next decade to provide funding for economic development, security cooperation,
    labour mobility, and climate resilience. (Reuters)
  - Euthanasia in Uruguay
  - The Uruguayan Chamber of Representatives votes 64–35 to decriminalize euthanasia.
    The bill moves to the Senate for approval. (Reuters)
  - Internal conflict in Peru
  - Peruvian president Dina Boluarte signs into law a congressional bill granting
    amnesty to all military, police, and other self-defense personnel accused of human
    rights violations committed between 1980 and 2000. (The Guardian)
  - The Malaysian Federal Court rules that an addendum order allegedly allowing former
    prime minister Najib Razak to serve the remainder of his 1MDB-related prison sentence
    under house arrest exists, but refers the matter to the High Court to determine
    its validity. (Reuters)
