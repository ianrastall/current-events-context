Date: '2025-08-06'
Source_URI: Portal:Current events/2025 August 6
Intelligence_Payload:
  Uncategorized:
  - Sudanese civil war
  - 2025 alleged shootdown of UAE mercenary plane
  - The Sudanese Armed Forces claims that it shot down an Emirati plane carrying mercenaries
    near Nyala, South Darfur, Sudan, allegedly killing at least 40 people. (France
    24)
  - 2025 European and Mediterranean wildfires
  - One person is killed, thirteen people are injured and one person is missing after
    a wildfire breaks out in Aude department, France, also burning at least 16,000
    hectares of land. (BBC News) (DW)
  - Over 1,500 people are evacuated from a resort in Tarifa, Andalusia, Spain, after
    a wildfire breaks out in Campo de Gibraltar. (Le Monde) (Europa Sur)
  - 2025 Ghanaian Air Force Z-9 helicopter crash
  - A Ghana Air Force Z-9 helicopter crashes near Obuasi, Ashanti Region, Ghana, killing
    eight people, including defence minister Edward Omane Boamah, environment and
    science minister Ibrahim Murtala Muhammed, and regional minister Samuel Sarpong.
    (BBC News)
  - Gaza Strip famine
  - A truck carrying humanitarian aid overturns on civilians near the Nuseirat refugee
    camp in the Gaza Strip, killing at least 25 people and injuring dozens of others.
    (Anadolu Agency) (The Guardian)
  - Twelve people are killed and 13 others are injured after a dump truck plunges
    into a ravine in Lebak, Sultan Kudarat, near the provincial boundary with Maguindanao
    del Sur in the Philippines. (ABS-CBN News) (Manila Bulletin)
  - Five people are killed and 24 others are injured when a suspension bridge deck
    tilts at a scenic spot in Zhaosu County, Ili Kazakh Autonomous Prefecture, Xinjiang,
    China. (China Daily)
  - A month-long legionnaires' disease outbreak that started on July 8 in London,
    Ontario, Canada, ends after 70 cases and three deaths. (CFPL-DT)
  - India–United States relations, Tariffs in the second Trump administration
  - U.S. president Donald Trump issues an executive order raising the total tariff
    on Indian imports to the United States to 50%, with an additional 25% that will
    take effect 21 days after August 7 due to its purchases of Russian oil. (BBC News)
  - 2025 Fort Stewart shooting
  - Five people are injured in a mass shooting at the Fort Stewart army post near
    Savannah, Georgia, United States. (AP)
  - Former South Korean first lady Kim Keon Hee appears for questioning by a special
    prosecutor in central Seoul. The investigation concerns allegations of stock manipulation,
    bribery, and interference in People Power Party nominations. (AP)
  - 2025 Polish presidential election
  - Former Institute of National Remembrance chairman Karol Nawrocki is sworn in as
    the new president of Poland, succeeding Andrzej Duda. (CNN)
  - Impeachment of Sara Duterte
  - The Philippine Senate votes 19–4–1 to dismiss the impeachment complaint against
    Vice President Sara Duterte, following a Supreme Court ruling that declared the
    complaint unconstitutional. (Bloomberg)
  - Strait of Messina Bridge
  - The Italian government authorizes a construction project for a bridge over the
    Strait of Messina to connect Sicily with mainland Italy. The project will be the
    longest suspension bridge in the world by the time of its completion in 2032 or
    2033. (AP) (Politico EU)
