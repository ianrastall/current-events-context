Date: '2025-08-23'
Source_URI: Portal:Current events/2025 August 23
Intelligence_Payload:
  Uncategorized:
  - Boko Haram insurgency
  - More than 35 ISWAP fighters are killed in airstrikes by the Nigerian Air Force
    during an attempted ground assault on troops near the Cameroon–Nigeria border
    in Kumshe, Borno State, Nigeria. (France 24) (ABC News)
  - Seven students are killed and 28 others are injured in drownings on a school trip
    to the Abu Talat beach in Ajami, Alexandria, Egypt. (BBC News) (People)
  - Dharmasthala mass burial case
  - Indian police arrest a man who recently alleged that he had been coerced into
    burying hundreds of bodies of women who were raped before being murdered from
    1995 to 2014 at the Dharmasthala Temple in Dharmasthala, Karnataka, India. (BBC
    News)
  - Pork barrel scam
  - The Sandiganbayan appellate court of the Philippines sentences Janet Lim-Napoles
    to 55 years in prison over the diversion of ₱7.55 million (US$133,600) in the
    Priority Development Assistance Fund involving Davao del Sur vice governor Marc
    Douglas Cagas IV. (Philippine Daily Inquirer)
  - 2025 Syrian parliamentary election
  - The Syrian electoral commission announces that the upcoming parliamentary election
    will exclude the Al-Hasakah, Raqqa, and Suwayda governorates due to security concerns,
    with seats for those regions left vacant until conditions allow voting. (Reuters)
  - 2025 Taiwanese referendum
  - Taiwan's referendum on reopening the Maanshan Nuclear Power Plant in Pingtung
    fails to meet the legal threshold for it to be binding, despite a majority voting
    in favor, leaving the facility closed as the government continues its shift toward
    renewable energy and liquefied natural gas. (Reuters)
  - 2025–26 FIS Ski Jumping World Cup
  - The International Ski and Snowboard Federation suspends Norwegian Olympic ski
    jumpers Johann André Forfang and Marius Lindvik for three months and fines them
    CHF 2,000 (US$2,500) each after they admitted to equipment tampering during the
    men's large hill event at the 2025 World Ski Championships in Trondheim, Norway.
    (Reuters)
