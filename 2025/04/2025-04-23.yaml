Date: '2025-04-23'
Source_URI: Portal:Current events/2025 April 23
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine
  - Russian forces launch a drone strike on a bus in Marhanets, Dnipropetrovsk Oblast,
    Ukraine, killing nine people. (The Guardian)
  - 2025 Istanbul earthquake
  - A M 6.2 earthquake with an epicenter in the Sea of Marmara strikes Istanbul, Turkey,
    injuring at least 359 people. (AP)
  - 2023–2025 global coral bleaching event
  - The International Coral Reef Initiative announces that over 84% of the world's
    coral reefs are affected by a coral bleaching event since 2023, considered the
    most intense on record. (AP)
  - Death and funeral of Pope Francis
  - The body of Pope Francis is moved from Domus Sanctae Marthae to St. Peter's Basilica,
    and lies in state for a 3-day public viewing. (CBS News)
  - 2025 India–Pakistan diplomatic crisis, India–Pakistan relations
  - India announces several measures targeting Pakistan including closing the main
    border crossing linking the two countries, suspending the Indus Water Treaty,
    and expelling Pakistani diplomats after the attack on tourists in Indian-administered
    Kashmir yesterday. (BBC News)
  - The Jordanian interior ministry bans all activities of the Sunni Muslim Brotherhood
    organization in the country, seizes the organization's assets, and closes all
    of its offices, including its political wing in the country, the Islamic Action
    Front. The Jordanian government links the group to sabotage plots and accuses
    it of "destabilizing" the country. (DW)
