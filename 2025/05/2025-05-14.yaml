Date: '2025-05-14'
Source_URI: Portal:Current events/2025 May 14
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - Israeli airstrikes kill at least 80 Palestinians across the Gaza Strip. (Reuters)
  - Palestinian political violence
  - Two Israelis, including a pregnant woman and her child, are critically wounded
    in a shooting near Brukhin in the West Bank. (The Jerusalem Post) (YNet)
  - Hezbollah–Israel conflict
  - Israeli invasion of Lebanon
  - The Israel Defense Forces claim that a drone strike in Qaaqaait al-Jisr, Nabatieh
    Governorate, Lebanon, killed a Hezbollah commander. (The Times of Israel)
  - Naxalite–Maoist insurgency
  - Operation Black Forest
  - Indian authorities declare a "major success" in a military operation against Naxal
    insurgents in the border between the states of Chhattisgarh and Telangana, killing
    31 militants, including top leaders of the Maoist group. (The Hindustan Times)
  - Two hikers are found dead and seven others are rescued after they were swept away
    by a river while hiking near Didier Waterfall on the island of Martinique. (AP)
  - Two Japanese Air Force pilots are killed after their Kawasaki T-4 aircraft crashes
    into a reservoir minutes after taking off from Komaki Air Base in Komaki, Aichi
    Prefecture, Japan. (AP) (AP 2)
  - Twenty-one people are killed after a tanker truck collided with two other vehicles
    on Federal Highway 135D near Tehuacán, Puebla, Mexico. (El Universal)
  - China–Colombia relations
  - Colombia joins China's Belt and Road Initiative during the China-CELAC Forum in
    Beijing. (AFP via RFI)
  - Syria–United States relations
  - U.S. president Donald Trump meets with Syrian interim president Ahmed al-Sharaa
    during a trip to Saudi Arabia prior to departing for Qatar, marking the first
    meeting between a U.S. and Syrian president since 2000. (Al Jazeera)
  - Immigration to Argentina
  - Argentine president Javier Milei orders restrictions on immigration to Argentina,
    saying that immigrants are bringing "chaos and abuse" to Argentina. (AP)
  - Tajik president Emomali Rahmon signs a law decriminalizing the "liking" of posts
    on social media publicly calling for terrorism or other serious crimes. (Reuters)
  - Russian election observer is convicted on charges of working with an "undesirable
    organization" and sentenced to five years in prison. (The New York Times)
  - Deportation of undocumented Afghans from Pakistan
  - Pakistani interior minister Mohsin Naqvi says that more than 1 million Afghans
    have been deported back to Afghanistan since November 2023 as Pakistani authorities
    intensify a crackdown on illegal immigration. (AMU TV)
