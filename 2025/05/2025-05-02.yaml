Date: '2025-05-02'
Source_URI: Portal:Current events/2025 May 2
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - At least 43 Palestinians are killed, in the early hours of the morning by Israeli
    airstrikes on Gaza City, Palestine. (Al Jazeera)
  - Humanitarian aid during the Gaza war
  - Gaza Freedom Flotilla incident
  - A Gaza-bound activist humanitarian aid ship, part of the Gaza Freedom Flotilla,
    catches fire and issues an SOS after what its organizers alleged was an Israeli
    drone attack off the coast of Malta in international waters. (CNN)
  - Somali Civil War
  - The Rapid Support Forces capture the city of En Nahud in West Kordofan from the
    SAF, killing 19 and injuring 37. (Al Jazeera)
  - Rust is released theatrically in the United States, three and a half years after
    a fatal on-set shooting accident occurred involving members of the cast and crew,
    including cinematographer Halyna Hutchins, director Joel Souza, and lead actor
    Alec Baldwin. (The New York Times)
  - Tariffs in the second Trump administration
  - China–United States trade war
  - The Trump administration terminates the de minimis tariff exemption for some imports
    shipped directly to consumers. Online shops such as Shein and Temu adjust prices,
    while Temu also announces a shipping pause to the United States. (The New York
    Times) (BBC)
  - Eight people are killed after a car lost control and plunged into a ravine on
    the Karakoram Highway in Kohistan district, Pakistan. (Pakistan Today)
  - Seven people are killed in torrential rain across parts of Northern India. (The
    Hindu)
  - Four people are killed and one critically injured in Dwarka, India, after a house
    collapsed due to heavy rain and thunderstorms. (The Indian Express)
  - Three children, including two siblings, drowned in a pond in Nagarkurnool district,
    India. (The Hindu
  - The Centers for Disease Control and Prevention reports 216 children have died
    this flu season in the United States, making it the deadliest since the 2009 swine
    flu pandemic. (CNN)
  - Immigration policy of the second Donald Trump administration
  - The United States Department of Defense designates a second area on the Mexico–United
    States border, attached to the Fort Bliss Army base in El Paso, Texas, as a military
    zone to enforce immigration laws. (AP News)
  - Gang war in Haiti, Haiti–United States relations
  - The United States Department of State designates the Viv Ansanm coalition and
    the Gran Grif gang as Foreign Terrorist Organizations. (NBC News)
  - 25-year-old Tyrone Thompson is sentenced to 22 years and six months imprisonment
    for murdering 21-year-old Mackenzie Anderson on 25 March 2022 in Newcastle, New
    South Wales, Australia, while he was on parole for a previous DV assault. (ABC
    News)
  - Freedom of the press in the United States
  - US President Donald Trump signs an executive order calling for the Corporation
    for Public Broadcasting to stop directly funding NPR and PBS, and for government
    agencies to stop indirectly funding these public broadcasters. (CNN)
  - The German Constitution protection office designates the Alternative for Germany
    (AfD) party as a right-wing extremist organization. The AfD came second in the
    2025 German federal election after winning 20.8% of the vote for a record 152
    seats in the Bundestag. (BBC News)
