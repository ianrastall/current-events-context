Date: '2025-06-19'
Source_URI: Portal:Current events/2025 June 19
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Twelve-Day War
  - Airstrikes during the Twelve-Day War
  - The death toll from Israel's strikes on Iran rises to more than 240, including
    70 women and children. To date, at least 24 people have been killed by Iranian
    strikes on Israel. (Al Jazeera)
  - Iran strikes four sites in central and southern Israel. The Soroka Medical Center
    in Beersheba, is hit by an Iranian ballistic missile, injuring at least 240 people.
    Iran says it was targeting a military site, striking an Israeli military and intelligence
    centre located near the hospital. (Al Jazeera) (AP)
  - The Israeli Air Force strikes the Arak Nuclear Complex, a heavy-water reactor
    near Arak, Iran. (The Times of Israel)
  - Gaza war
  - Rafah aid distribution killings
  - Israeli gunfire and airstrikes kill at least 92 Palestinians across the Gaza Strip,
    including 16 people waiting for aid assistance near the Netzarim Corridor. (Al
    Jazeera)
  - Democratic Republic of the Congo–Rwanda conflict
  - M23 campaign
  - After three days of dialogue, the Democratic Republic of the Congo and Rwanda
    sign a provisional peace treaty and are set to begin negotiations for a draft
    peace treaty on June 27. (Al Jazeera)
  - A rockslide at Bow Glacier Falls near Banff, Alberta, Canada, kills at least two
    people. Three other hikers sustained injuries. (CFCN-DT)
  - Israel–Norway relations
  - A hand grenade is thrown into the courtyard of the residence of the Norwegian
    ambassador to Israel in Herzliya. (Reuters)
  - The Finnish Parliament votes 155–18 to withdraw from the Ottawa Treaty, which
    bans the use of anti-personnel mines, citing the threat Russia poses to its national
    security. (Reuters) (Helsingin Sanomat)
  - June 2025 Los Angeles protests
  - A federal appeals court rules that President of the United States Donald Trump
    is allowed to keep the National Guard under federal control in California, pending
    further litigation. (BBC News)
  - The Rwandan government arrests opposition figure Victoire Ingabire Umuhoza, founder
    of the United Democratic Forces, for allegedly plotting to incite public unrest.
    (AP) (RFI)
