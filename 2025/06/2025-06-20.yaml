Date: '2025-06-20'
Source_URI: Portal:Current events/2025 June 20
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Twelve-Day War
  - 2025 Iran–European nuclear talks
  - Iranian foreign minister Abbas Araghchi meets with the foreign ministers of the
    United Kingdom, Germany, France and European Union in Geneva for talks about its
    nuclear program. (AP)
  - Hundreds of thousands of people protest against Israel on the streets of Tehran
    after weekly prayers, chanting slogans in support of Iranian leaders. Protests
    also took place in Tabriz in northwestern Iran and Shiraz in the south. (Al Jazeera)
  - Saudi Arabia's Nuclear and Radiological Regulatory Commission says military strikes
    on civilian nuclear facilities violate international law in response to Israeli
    strikes on Iranian nuclear facilities. (Al Jazeera)
  - Gaza war
  - Rafah aid distribution killings
  - Israeli gunfire and airstrikes kill at least 82 Palestinians across the Gaza Strip,
    including 34 people seeking aid assistance. (Al Jazeera)
  - The United Nations relists Israel on its blacklist of countries committing abuses
    against children in armed conflict in its annual Children in Armed Conflict report.
    (Al Jazeera)
  - Russian invasion of Ukraine
  - Odesa strikes
  - Russian forces launch a large-scale drone strike at Odesa, Ukraine, damaging buildings
    and public facilities, with one person killed and another 14 injured. (Ukrainska
    Pravda)
  - Nine people are killed after a head-on collision between a truck and a car in
    West Bengal, India. (NDTV)
  - Four people are missing after a Kawasaki medical helicopter on a rescue operation
    crashes north of Baie-Johan-Beetz near Natashquan on the Côte-Nord in Quebec,
    Canada. The pilot is found and taken to hospital. (CBC)
  - France–Niger relations
  - The Nigerien government announces it will nationalize the controlling share of
    the SOMAIR mining company that previously belonged to French multinational nuclear
    fuel cycle corporation Orano, which is in turn controlled by the French government.
    (DW) (AP)
  - Singapore–Vietnam relations
  - The governments of Singapore and Vietnam sign a memorandum to exchange 300 to
    1,000 skilled workers between the countries annually. (VnExpress)
  - Detention of Mahmoud Khalil
  - Columbia University student activist Mahmoud Khalil is released from prison, after
    being in custody for three months. (NBC News)
  - The United Kingdom parliament votes to approve a bill allowing terminally ill
    adults to voluntarily end their lives, moving towards legalizing assisted suicide
    in England and Wales. (DW) (BBC News)
  - Deportation of the Crimean Tatars
  - The parliament of the Netherlands recognizes the deportation of the Crimean Tatars
    carried out by the Soviet Union in 1944 as genocide. (Kyiv Independent)
