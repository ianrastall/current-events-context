Date: '2025-06-24'
Source_URI: Portal:Current events/2025 June 24
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Twelve-Day War
  - Airstrikes during the Twelve-Day War
  - Israel continues to launch airstrikes on Iran while Iran launches a wave of ballistic
    missiles at Israel despite the United States claiming a ceasefire had been reached
    between the warring sides. (Al Jazeera) (The Guardian)
  - Nine people are killed in an Israeli airstrike on residential units in Gilan,
    Iran. The attack also injured 33 people, including 16 women and children, with
    five requiring hospital treatment. (Al Jazeera)
  - Four people are killed and 22 others are injured in Beersheba, Southern Israel,
    after an Iranian missile strikes an apartment block. (The Times of Israel)
  - U.S. president Donald Trump tells reporters at the White House that Israel and
    Iran "don't know what the fuck they are doing" as both countries continue to launch
    attacks despite U.S. claims of a ceasefire. (BBC News) (The Independent) (The
    Guardian)
  - Gaza war
  - Rafah aid distribution killings
  - At least 44 Palestinians are killed by Israeli forces who open fire towards people
    waiting for aid trucks in Gaza. (AP)
  - Russian invasion of Ukraine
  - Dnipro strikes
  - Russian forces launch an Iskander missile strike on Dnipro, Ukraine, killing at
    least 19 people and injuring 300 others. Another two civilians are killed and
    nine others are injured in Samar, Dnipropetrovsk Oblast as a result of a Russian
    air attack. (Reuters) (The Kyiv Independent) (Ukrainska Pravda)
  - Insurgency in Cabo Delgado
  - Human Rights Watch reports that at least 120 children have been abducted by Islamic
    State-linked Ansar al-Sunna insurgents in Cabo Delgado Province, Mozambique, this
    year. The children are used for labor, conscripted as child soldiers, or forced
    into marriage. (AP)
  - German finance minister Lars Klingbeil announces that the German government will
    raise its defense budget from 2.4% to 3.5% of its GDP by 2029, citing a NATO quota
    for member states to raise defense spending. (AP) (Politico)
  - The death toll from a boat accident from a storm on Lake Tahoe in the Sierra Nevada
    mountains of the United States increases to eight as the final missing person
    is recovered. (NPR)
  - Twenty people are injured, including 12 children, after lightning strikes near
    Lake Murray in the U.S. state of South Carolina. (MSN)
  - 2025 The Hague NATO summit
  - The NATO summit is held in The Hague in the Netherlands. (Espreso TV)
  - 2025 Irapuato shooting
  - At least 11 people are killed, including a teenager, and 20 others are injured
    when gunmen open fire at a party celebrating the Nativity of John the Baptist
    in Irapuato, Guanajuato, Mexico. (Reuters)
  - Three soldiers are killed and eight others are injured when a soldier opens fire
    on his colleagues during an altercation over paychecks in Mungazi, North Kivu,
    Democratic Republic of Congo. (CTV News)
  - French police detain 12 people after over 145 people report being stabbed with
    syringes at Fête de la Musique sites across the country. (DW)
  - 2025 New York City Democratic mayoral primary
  - Zohran Mamdani leads the primary to become the Democratic Party nominee for the
    2025 New York City mayoral election, defeating former governor of New York Andrew
    Cuomo, with Mamdani having received 43.5% of first-choice votes. He is the presumptive
    nominee, however the official winner will be declared after the ranked choice
    tally on July 1. (USA Today)
