Date: '2025-06-29'
Source_URI: Portal:Current events/2025 June 29
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Russian strikes against Ukrainian infrastructure, Kyiv strikes
  - Russian forces launch more than 500 drones and missiles at Ukraine, targeting
    critical infrastructure, and injuring at least 12 people. Ukraine says it is the
    largest Russian air attack on the country since the start of the war. (AP)
  - A Ukrainian Air Force F-16 fighter jet crashes while repelling a Russian airstrike,
    killing the pilot. (Reuters)
  - Gaza war
  - Israeli blockade of the Gaza Strip, Gaza Strip famine
  - UNICEF reports that at least 66 children have died of malnutrition in Gaza throughout
    the war due to the Israeli humanitarian aid blockade. (Al Jazeera)
  - 2025 Vienna Township Cessna 441 crash
  - Six people are killed when a Cessna 441 aircraft crashes into the backyard of
    a house shortly after takeoff from Youngstown–Warren Regional Airport in Howland
    Township, Trumbull County, Ohio, United States. (WFMJ-TV)
  - At least 11 people are killed and seven others are injured after a gold mine collapses
    in Houeid, Sudan. (DW) (Asharq Al-Awsat)
  - Mass shootings in the United States
  - 2025 Coeur d'Alene shooting
  - A mass shooting ambush situation is reported when at least one person opens fire
    on firefighters and law enforcement responding to a wildfire on Canfield Mountain,
    believed to have been set by the perpetrator. Three people are killed, including
    the shooter, and seven others injured in Coeur d'Alene, Idaho, United States.
    The FBI is deployed and the shooter is later found dead. (BNO News) (Coeur d'Alene
    Press) (MSN)
  - Two teenagers are injured, including one critically, in a shooting outside of
    the Stonewall Inn historic gay tavern and monument after the 2025 NYC Pride March
    in New York City, New York, United States. (ABC News)
  - 2024–present Serbian anti-corruption protests
  - Over 140,000 people demonstrate in Belgrade and other major Serbian cities to
    protest against the Serbian government, call for President Aleksandar Vučić to
    be removed from power, and for snap elections for his replacement after dozens
    of students and protestors were arrested by police last night. (DW)
