Date: '2025-06-10'
Source_URI: Portal:Current events/2025 June 10
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza Strip aid distribution incidents
  - Thirty-six Palestinians are killed by Israeli gunfire while trying to obtain aid
    in Gaza. (AP)
  - Russian invasion of Ukraine
  - Kyiv strikes, Odesa strikes
  - Russia launches drone attacks on Kyiv and Odesa, Ukraine. In Odesa, drone attacks
    hit medical facilities and residential buildings, killing two people and injuring
    thirteen others. (BBC News)
  - Colombian conflict
  - Seven people are killed, including two police officers, and 36 others are injured
    in nineteen bombings and shootings by FARC dissidents targeting police posts,
    municipal buildings and civilians in Cali, Valle del Cauca, Colombia. Another
    explosion is also reported in Jamundí. (France 24) (DW)
  - Fossil fuel phase-out
  - The British government announces it will invest 14.2 billion (US$19 billion) to
    construct the new Sizewell C nuclear power station in Suffolk, England, to reduce
    the country's reliance on fossil fuels. (AP) (Reuters)
  - The Walt Disney Company closes a deal to acquire NBCUniversal's stake in the streaming
    service Hulu for $439 million, completing its acquisition of Hulu. (AP) (Variety)
  - 2025 Kenya bus crash
  - Five tourists are killed and 35 others are injured in a bus crash in Gichage,
    Nyandarua County, Kenya. (Gulf News) (Economic Times)
  - War crimes in the Gaza war, Gaza humanitarian crisis
  - The United Kingdom, Canada, Australia, New Zealand, and Norway impose sanctions
    on Israeli far-right ministers Bezalel Smotrich and Itamar Ben-Gvir, including
    asset freezes and travel bans, due to their conduct during the Gaza war. (Reuters)
  - Protests against Donald Trump
  - June 2025 Los Angeles protests
  - Los Angeles mayor Karen Bass imposes a curfew to the Downtown Los Angeles area
    in California, United States, after several days of civil disobedience and public
    demonstrations against Immigrations and Customs Enforcement agents detaining locals.
    (Reuters) (Al Jazeera)
  - 2025 Ballymena riots
  - The second consecutive night of disorder in Ballymena, Northern Ireland, sees
    17 police officers injured and five people arrested as protests spread to Belfast,
    Carrickfergus, and Newtownabbey. (BBC News)
  - Graz school shooting
  - Eleven people are killed, including the perpetrator, and several others are injured,
    in a mass shooting at a secondary school in Graz, Austria. (BBC News)
  - Capital punishment in Iran
  - Iran hangs nine members of the Islamic State for a 2018 attack which killed three
    Islamic Revolutionary Guard Corps personnel. (AP)
  - The Federal Police of Brazil arrest at least eleven people in an operation aiming
    to reduce drug trafficking in favelas in Rio de Janeiro. (AP)
  - The Supreme Court of Argentina ratifies the sentence of former president Cristina
    Fernández de Kirchner to six years in prison and a lifetime disqualification from
    holding public office for the crime of fraudulent administration. (La Nación)
  - Impeachment of Sara Duterte
  - The Senate of the Philippines votes 18–5 to return the articles of impeachment
    of Vice President Sara Duterte to the House of Representatives for further deliberation.
    (Rappler) (Inquirer.net)
  - Over 15,000 people gather in Budapest, Hungary, to protest against Prime Minister
    Viktor Orbán and his government's conduct and alleged corruption relating to the
    ruling Fidesz party. (AP)
  - The Parliament of Greece expels three lawmakers, including far-right politician
    Vasilis Stigkas, leader of the political party Spartans, due to their connection
    with and allegedly serving as proxies for the neo-Nazi criminal organization Golden
    Dawn. (AP)
