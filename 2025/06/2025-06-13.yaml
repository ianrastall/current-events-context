Date: '2025-06-13'
Source_URI: Portal:Current events/2025 June 13
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2024 Iran–Israel conflict
  - Twelve-Day War
  - The Israeli Air Force launches a bombing campaign against Iran targeting nuclear
    facilities with the main goal of the operation being to destroy Iran's nuclear
    program. A special state of emergency is declared in Israel by Defence Minister
    Israel Katz and Israeli airspace is closed to all flights. Iranian state television
    reports that 60 people were killed in the attacks, while Israel claims only three
    people died and dozens got injured. (BBC News)
  - Israel also launches targeted assassination strikes against senior Iranian government
    officials, Iranian military leadership and senior nuclear scientists. (Reuters)
  - The Israeli military confirms it has targeted nuclear facilities in Iran with
    the main goal of the operation being to destroy Iran's nuclear program. Israeli
    prime minister Benjamin Netanyahu confirms Israeli warplanes have targeted Iran's
    main Natanz Nuclear Facility. It is later confirmed that the underground nuclear
    reactor at Natanz has been destroyed by a bunker buster. (The Jerusalem Post)
    (BBC News)
  - Iranian state media reports that all flights to and from Imam Khomeini International
    Airport have been suspended until further notice and that several residential
    buildings in Tehran have collapsed due to missile strikes. (The Times of Israel)
  - Israeli decapitation strikes kill commander-in-chief of the Islamic Revolutionary
    Guard Corps Hossein Salami, senior nuclear scientist and former head of the Atomic
    Energy Organization of Iran Fereydoon Abbasi, and chief of the General Staff of
    the Armed Forces of the Islamic Republic of Iran Mohammad Bagheri and Quds Force
    commander Esmail Qaani. (The Times of Israel) (BBC News)
  - Exiled crown prince Reza Pahlavi, the son of Iran's last Shah, writes in Farsi
    calling for the Iranian military to abandon the Islamic Republic and accuses Supreme
    Leader Ayatollah Ali Khamenei of forcing Iranians into the war. He also refers
    to the war as "Khamenei's war and the Islamic Republic's war". (Jerusalem Post)
  - June 2025 Iranian strikes on Israel
  - Iran launches over 100 Shahed drones and ballistic missiles towards Israel in
    retaliation for the strikes. (The Times of Israel) (Reuters)
  - At least three people are killed and 172 others injured in Israel after Iran's
    retaliatory strikes. (The Jerusalem Post)
  - Air India Flight 171
  - The death toll from the crash of an Air India Boeing 787 Dreamliner shortly after
    takeoff from Ahmedabad Airport in Ahmedabad, Gujarat, India, yesterday rises to
    279 as a police source says 38 ground fatalities are confirmed. (Philippine Daily
    Inquirer)
  - Heavy flooding hits San Antonio, Texas; at least 11 people are killed, and the
    San Antonio River rises from 3 feet to 25 feet in about 2 hours. (CNN)
  - Five people are killed, including two children, and 16 others are injured, including
    two critically, in a traffic collision when an Andhra Pradesh State Road Transport
    Corporation bus loses control and crashes into the back of a truck at Gottipura
    Gate in Hoskote, Karnataka, India. (India Today) (Deshsewak)
  - Four people are killed and 34 others are injured, including 11 seriously, when
    a bus carrying Ukrainians crashes on the A81 autoroute in Sarthe, France. (Midi
    Libre)
  - Protests against Donald Trump
  - June 2025 Los Angeles protests
  - U.S. district judge Charles Breyer issues a temporary restraining order directing
    President Donald Trump to return control of the National Guard to California,
    saying he violated the Tenth Amendment and exceeded his statutory authority. Later,
    the 9th U.S. Circuit Court of Appeals temporarily blocks the order. (AP) (The
    Hill)
  - Kenya Finance Bill protests
  - Kenyan police constable James Mukhwana is arrested over the death of blogger Albert
    Ojwang, which prompted protests and clashes with police this week. (Al Jazeera)
    (BBC News)
  - North Korean destroyer Kang Kon is successfully launched, having partially sunk
    during its first launch attempt two weeks prior. Supreme Leader Kim Jong Un announces
    plans for two more 5,000-tonne destroyers to be built next year. (Al Jazeera)
    (BBC News)
  - In South Korea, five-term National Assembly lawmaker Kim Byung-kee is elected
    as floor leader of the Democratic Party, replacing acting party leader Park Chan-dae.
    (The Korea Herald)
