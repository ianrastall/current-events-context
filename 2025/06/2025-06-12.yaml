Date: '2025-06-12'
Source_URI: Portal:Current events/2025 June 12
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Rafah aid distribution killings
  - At least 103 Palestinians are killed by Israeli fire in the past 24 hours across
    the Gaza Strip, including 21 people this morning near Gaza Humanitarian Foundation
    (GHF) sites, according to the Gaza Health Ministry. (Reuters)
  - Eight Palestinian GHF workers are killed and several others are injured after
    their bus was attacked en route to an aid distribution site in southern Gaza.
    The GHF says that Hamas was responsible. (The New York Times) (Reuters)
  - Israeli invasion of Syria
  - Israeli forces kill one person and detain seven people, all Syrians, whom they
    allege are Hamas members in an early-morning raid on the village of Beit Jinn
    in Rif Dimashq Governorate, Syria. (AP)
  - Dutch-Israeli writer Yael van der Wouden wins the 2025 Women's Prize for Fiction
    for her novel The Safekeep, which was also shortlisted for the 2024 Booker Prize.
    British physician and writer Rachel Clarke wins the sister prize, the Women's
    Prize for Non-Fiction, for her book about palliative care, The Story of a Heart.
    (AP) (The Bookseller)
  - Air India Flight 171
  - An Air India Boeing 787-8 Dreamliner carrying 230 passengers and 12 crew members
    crashes into a residential area shortly after takeoff from Ahmedabad Airport in
    Gujarat, India. Authorities find one survivor from the plane, and 204 bodies have
    been recovered from the crash site so far. (CNA) (Fox News)
  - 2025 South Africa floods
  - The death toll in the flooding caused by heavy rainfall and snowfall from a winter
    storm in Eastern Cape, South Africa, increases to 57, with several others still
    missing. (ABC News)
  - Nuclear program of Iran
  - The International Atomic Energy Agency finds Iran in breach of its obligations
    to limit uranium enrichment and provision of information on its nuclear materials.
    (BBC News) (The Guardian)
  - Disappearance of Annie McCarrick
  - A man in his 60s is arrested on suspicion of the murder of Annie McCarrick, who
    went missing in Dublin, Ireland, in 1993. (RTÉ)
  - The Internal Security Agency of Poland announce the arrest of a teenager in Olsztyn,
    Warmian–Masurian Voivodeship, accused with two other men, arrested in April, of
    planning a far-right terrorist attack. (AP)
  - Constitutional crisis in Somalia
  - Somalia's federal government calls for the dissolution of the C6+ international
    coordination framework, saying it is outdated and misrepresents the country’s
    current political and security progress. (Garowe Online) (ChimpReports) (Hiiraan
    Online)
  - June 2025 Los Angeles protests
  - United States senator Alex Padilla of California is forcibly removed, pushed face-down
    to the ground, and handcuffed after attempting to ask Secretary of Homeland Security
    Kristi Noem a question at a press conference in Los Angeles. (AP)
  - Death of Albert Ojwang
  - Police fire tear gas at demonstrators gathered in Nairobi, Kenya, to protest against
    the police and its chief, Eliud Lagat, after blogger Albert Ojwang is confirmed
    to be killed in custody by the police force, demanding Lagat's resignation. (DW)
