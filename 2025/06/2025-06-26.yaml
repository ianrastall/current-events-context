Date: '2025-06-26'
Source_URI: Portal:Current events/2025 June 26
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Israeli forces kill at least 71 Palestinians in the Gaza Strip. At least 14 of
    those Palestinians are killed in North Gaza. (Al Jazeera)
  - Israeli settler violence
  - Three Palestinians are killed and many others are injured by Israeli settlers
    in the village of Kafr Malik near Ramallah in the West Bank. (BBC News)
  - 2025 South Africa floods
  - The death toll from the flooding caused by a winter storm in the Eastern Cape
    of South Africa two weeks earlier increases to 101, with two children still missing.
    (AP)
  - Nine people are killed and thousands of others are displaced from their homes
    amid torrential rain and flash floods in Rongjiang County, Guizhou, China. (AP)
    (Al Jazeera)
  - Three people are killed and dozens of others are missing in a flash flood caused
    by torrential rain in Kangra, Himachal Pradesh, India. (AP)
  - The bodies of three missing people are recovered after the June 20 crash of an
    Airmedic MBB/Kawasaki BK 117 in a lake shortly after takeoff from Havre Saint-Pierre
    Airport in Quebec, Canada. (CTV News)
  - Two people are killed, including a child, and 17 others are injured, including
    one critically, during torrential storms causing flooding in Paris, France. (CTV
    News)
  - A double-decker bus carrying students from Barton Peveril Sixth Form College plunges
    into a river in Eastleigh, Hampshire, England, injuring all 19 passengers, including
    five who are hospitalized. (AP)
  - A United Nations Office on Drugs and Crime report says the worldwide recreational
    use and production of cocaine hit an all-time high in 2023, saying the current
    surge in cocaine use is primarily due to increased illicit coca bush cultivation
    in Colombia and updated yield data. (RTÉ)
  - Ecuadorian conflict
  - Ecuadorian president Daniel Noboa announces the recapture of José Adolfo Macías
    Villamar, the leader of the Los Choneros cartel and Ecuador's most wanted criminal,
    in Manta, Manabí Province, after he disappeared from a prison last year. (DW)
  - Anti–money laundering § United States, War on drugs § Mexico
  - The Comisión Nacional Bancaria y de Valores temporarily takes over the management
    of CIBanco, Intercam Banco, and Vector Casa de Bolsa following allegations of
    money laundering for drug cartels. (El País)
  - Protests against Faure Gnassingbé
  - Clashes take place between protesters and security forces in the Togolese capital
    Lomé amid calls for Faure Gnassingbé, who has ruled the country since 2005, to
    step down. Opposition groups accuse Gnassingbé of changing the constitution to
    remain in office indefinitely. (AP)
