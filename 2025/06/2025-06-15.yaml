Date: '2025-06-15'
Source_URI: Portal:Current events/2025 June 15
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2024 Iran–Israel conflict
  - Twelve-Day War (list of airstrikes)
  - The Israeli Air Force says it has targeted Mashhad Shahid Hasheminejad International
    Airport in eastern Iran, destroying a refueling plane used by the Islamic Republic
    of Iran Air Force. (BBC News)
  - An Iranian ballistic missile strike on a residential building kills nine people,
    including three children, and injures over 200 others in Bat Yam, Israel. (The
    Times of Israel)
  - According to American officials, U.S. president Donald Trump vetoed a plan by
    Israel to assassinate the supreme leader of Iran, Ayatollah Ali Khamenei. (Reuters)
  - The Syrian Observatory for Human Rights reports that a Syrian civilian woman was
    killed after a drone strikes her home in rural Tartus Governorate, Syria, which
    the group says was likely an Iranian drone. (The Times of Israel)
  - Gaza war
  - Gaza war hostage crisis
  - The Israel Defense Forces confirms that they recovered the body of Israeli hostage
    Aviv Atzili, who was abducted by the Palestinian Islamic Jihad during the October
    7 attacks, in Gaza last Wednesday. (Haaretz)
  - Israeli bombing of the Gaza Strip
  - Israeli gunfire and airstrikes kill at least 41 Palestinians across Gaza. (RTÉ
    News)
  - Rafah aid distribution killings
  - At least eight people are killed and dozens of others are injured in a shooting
    near an aid distribution site near Rafah, Gaza. Witnesses attribute the shooting
    to Israeli forces. (NPR)
  - Russian invasion of Ukraine
  - Russia returns the bodies of 1,200 Ukrainian soldiers who were killed in action
    as part of a prisoner exchange agreement with Ukraine. (Reuters)
  - 2025 Callao earthquake
  - A earthquake hits Lima, Peru, killing one person and injuring at least five others.
    (Agencia EFE)
  - Seven people are killed, including an infant, when a Bell 407 aircraft crashes
    in a forested area in bad weather while en route to the Kedarnath Temple in Kedarnath,
    Uttarakhand, India. (The Free Press Journal)
  - At least six people are killed, 25 are swept away, and 32 others are injured,
    including six critically, when a bridge over a river collapses at a popular tourist
    destination in Kundamala, Pune, Maharashtra, India. (Al Arabiya) (CTV News)
  - Three hikers are killed by a lightning strike on Mittagsspitze mountain in the
    Central Eastern Alps, Austria. (Reuters)
  - Gaza war protests
  - Between 100,000 and 150,000 protesters march in The Hague, Netherlands, demanding
    that the Dutch government pressure Israel to halt its military campaign in the
    Gaza Strip. (AP)
  - The 51st G7 summit begins in Kananaskis, Alberta, Canada. (France24)
  - The MI6 appoints Blaise Metreweli to lead as Chief of the Secret Intelligence
    Service, making her the first woman to lead the agency. (BBC News)
  - 2025 24 Hours of Le Mans
  - In endurance racing, the AF Corse Ferrari team wins the 24 Hours of Le Mans for
    the third consecutive year, with drivers Phil Hanson, Robert Kubica, and Yifei
    Ye. (AP)
  - 2025 Queen's Club Championships
  - In tennis, German player Tatjana Maria defeats American player Amanda Anisimova
    6–3, 6–4, in the Queen's Club Championships women's singles final to become the
    event's first female winner since Russia's Olga Morozova in 1973. At 37 years
    old, Maria also becomes the oldest winner of a WTA 500 event. (NDTV)
  - 2025 U.S. Open
  - In golf, JJ Spaun wins the 2025 U.S. Open with a score of one-under-par to win
    his first major title. (ESPN) (PGA)
