Date: '2025-06-21'
Source_URI: Portal:Current events/2025 June 21
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Rafah aid distribution killings
  - Israeli gunfire and airstrikes kill at least 21 Palestinians across the Gaza Strip,
    including 11 people seeking aid assistance. (Al Jazeera)
  - The European Union European External Action Service finds that Israel may have
    breached its human rights obligations under the terms of the EU-Israel Association
    agreement governing its ties with the EU. (Al Jazeera)
  - Turkish president Recep Tayyip Erdoğan announces the UNRWA will open an office
    in Turkey's capital, Ankara. (Al Jazeera)
  - Twelve-Day War
  - The death toll from Israel's strikes on Iran rises to more than 430, while 3,056
    people have been injured. (Al Jazeera)
  - Iran's health minister Mohammadreza Zafarghandi says Israel has targeted three
    hospitals during the conflict, killing two health workers and a child, and has
    targeted six ambulances. (Al Jazeera)
  - Iran's emergency organization head says Israeli strikes have targeted medical
    and relief facilities, in addition to residential areas across the country. Three
    relief bases and eight ambulances have been seriously damaged or destroyed. (Al
    Jazeera)
  - The Netherlands officially returns 119 sculptures from the Benin Bronzes collection
    that were looted from the Kingdom of Benin in present-day Edo State, Nigeria,
    by British colonial forces. (Al Jazeera) (OkayAfrica)
  - 2025 Santa Catarina hot air balloon crash
  - At least eight people are killed and 13 others are injured in a hot air balloon
    accident in Praia Grande, Santa Catarina, Brazil. (CNN) (DW)
  - Six people are killed and two others are missing after a boat carrying ten people
    capsizes on Lake Tahoe in the Sierra Nevada, United States. (NBC News)
  - Three people are killed and 81 others are injured after a barrier collapsed in
    Stade du 5 Juillet in Algeria, in a match between MC Alger and NC Magra. (BBC
    News)
  - Belarus–United States relations, Human rights in Belarus
  - Belarusian president Alexander Lukashenko pardons several opposition figures,
    including opposition leader Siarhei Tsikhanouski, following a deal brokered by
    U.S. special envoy to Ukraine Keith Kellogg. (Politico)
  - Pakistan–United States relations
  - Pakistan announces that it will formally nominate U.S. president Donald Trump
    for a Nobel Peace Prize, citing his mediation during the 2025 India–Pakistan conflict.
    (BBC News)
  - Panama declares a state of emergency in Bocas del Toro Province and temporarily
    suspends some constitutional rights amid a series of anti-government protests
    opposing a pension law that has left one person dead and injured at least 30 others,
    including several police officers. (Al Jazeera) (EFE) (Reuters)
