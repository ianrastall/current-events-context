Date: '2025-06-04'
Source_URI: Portal:Current events/2025 June 4
Intelligence_Payload:
  Uncategorized:
  - Islamic State insurgency in Puntland
  - Puntland counter-terrorism operations
  - Puntland's elite security forces kills over 35 ISIS militants, including several
    foreign fighters, in a major military operation conducted in the mountainous rural
    areas in the Bari region of Puntland. The troops also destroy weapons caches and
    military equipment used by the group. (Shabelle Media) (AllAfrica)
  - Gaza war
  - United States support for Israel in the Gaza war
  - The United States vetoes a United Nations Security Council resolution calling
    for a ceasefire in the Gaza Strip, with the remaining fourteen other members voting
    in favor. (Reuters)
  - Israeli invasion of Syria
  - Israel launches airstrikes against Syria in retaliation for the alleged firing
    of two projectiles at Israel yesterday. Israeli defense minister Israel Katz says
    that Israel holds Syrian president Ahmed al-Sharaa "directly responsible" for
    the attacks. (Arab News)
  - 2025 Bengaluru stampede
  - Eleven people are killed and 50 others are injured in a stampede at the M. Chinnaswamy
    Stadium in Bengaluru, Karnataka, India. (Anadolu Agency)
  - Immigration policy of the second Donald Trump administration
  - U.S. president Donald Trump signs a proclamation banning entry into the United
    States for nationals of 12 countries deemed "very high-risk" due to terrorist
    activity, hostile governments, and high visa overstay rates, while imposing additional
    restrictions on visitors from several others. Exemptions apply for select categories,
    including athletes and diplomats. Trump cited the recent firebombing attack in
    Boulder, Colorado, as reason for the ban. (CNN) (NPR)
  - 2025 South Korean presidential election
  - Lee Jae-myung is inaugurated as President of South Korea at the National Assembly
    Building in Yeouido, Seoul, one day after winning the presidential election. (Reuters)
  - Vietnamese two-child policy
  - Vietnam formally ends the two-child policy in effect since 2009 amid record-low
    total fertility rates of 1.91 per woman in 2024, causing declining birth rate
    and a shrinking workforce. (NPR) (AFP via VnExpress)
  - U.S. president Donald Trump issues an order banning new visas for foreign nationals
    enrolling at Harvard University in Cambridge, Massachusetts, citing national security
    concerns and alleging the institution's lack of cooperation in disclosing foreign
    student misconduct. The directive also allows for possible visa revocations of
    currently enrolled international students. (ABS-CBN News)
  - Chile signs an agreement with Google to build the first submarine fiber-optic
    cable connecting between South America and Australia. Google invested at least
    $300 million while the Chilean government will invest $25 million. (DW) (AP)
