Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Kyiv strikes
  - An overnight Russian missile and drone attack on Kyiv, Ukraine, kills three people,
    injures 49 others and causes fires across the capital with multiple districts
    targeted. At least 2,000 homes lose power, according to the Kyiv City State Administration.
    At least 407 drones and 45 missiles are launched in total. (Reuters) (AP)
  - Russian strikes against Ukrainian infrastructure
  - Widespread power outages are reported in Ternopil after several cruise missiles
    hit energy infrastructure supplying the city. (Ukrinform)
  - Deportation of Kilmar Abrego Garcia
  - Kilmar Abrego Garcia returns to the United States, two months after being mistakenly
    deported to El Salvador and spending time at the CECOT prison. He now faces criminal
    charges in Tennessee for allegedly transporting undocumented migrants. (ABC News)
  - Radar on the Fleet Flagship of the Royal Australian Navy HMAS Canberra (L02) accidentally
    blocks wireless internet and radio services in New Zealand before the incident
    is resolved. (The Guardian)
