Date: '2025-06-16'
Source_URI: Portal:Current events/2025 June 16
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - 2024 Iran–Israel conflict
  - Twelve-Day War (list of airstrikes)
  - The death toll from Israeli airstrikes on Iran rises to at least 220 people, including
    70 women and children. (Al Jazeera)
  - Israel strikes buildings in Tehran belonging to the Islamic Republic of Iran Broadcasting,
    Iran's state-owned media company, knocking it temporarily off-air for an hour
    before later returning. Three employees are killed and several others are injured.
    (Al Jazeera) (Al-Monitor) (The Wall Street Journal)
  - Iran says Israel struck a hospital in Kermanshah in western Iran. Video footage
    published by local platforms showed bloodstains, indicating casualties from the
    strike. (Al Jazeera)
  - Israeli jets strike 120 surface-to-surface missile systems in central Iran and
    ten command and control centres belonging to the IRGC's Quds Force. (AP)
  - Israeli drones strike two Iranian Air Force F-14 Tomcats stationed at Imam Khomeini
    International Airport. Combat footage released by the IDF confirm both were destroyed.
    (The Times of Israel)
  - An Iranian ballistic missile barrage kills eight people and injures 287 others
    in central Israel. (The Times of Israel) (Reuters)
  - Iran's parliament prepares a bill to exit the international nuclear Non-Proliferation
    Treaty. (Reuters)
  - Israel announces it has taken "full aerial operational control" of the airspace
    over Tehran and western Iran after destroying much of the country's air defence
    network giving the Israeli Air Force near complete air supremacy over Iranian
    forces. (BBC News)
  - Democratic senator Tim Kaine of Virginia introduces legislation to prevent U.S.
    president Donald Trump from using military force against Iran without Congress's
    authorization. (Reuters) (US Congress)
  - Gaza war
  - Rafah aid distribution killings
  - Israel kills at least 50 Palestinians in Gaza, including 23 near an aid distribution
    site run by the Gaza Humanitarian Foundation. (Reuters)
  - Herder–farmer conflicts in Nigeria
  - The death toll from the attack by unknown gunmen in Guma, Benue State, Nigeria,
    on Saturday increases to over 150, including many who were burned to death. (AP)
  - The death toll from severe weather and flash floods in Équateur Province, Democratic
    Republic of the Congo, rises to at least 77 with more than 100 others still reported
    missing. (AP)
  - Nine people are killed in an explosion at a firecracker factory in Linli County,
    Hunan China. (AP News)
  - Foreign relations of Andorra
  - Andorra and the Sovereign Military Order of Malta establish official diplomatic
    relations. (Diari d'Andorra)
  - Kincora Boys' Home scandal
  - Gary Hoy, a survivor of child sexual abuse at Kincora, resolves a legal action
    against the Police Service of Northern Ireland and Home Secretary with an undisclosed
    agreement. The legal action alleged that paedophile housemaster William McGrath
    was allowed to target children to gather information about the far-right paramilitary
    organization Tara. (RTÉ).
  - Thai police raid a house in Samut Prakan province, Thailand, and arrest 13 foreigners,
    mostly Australians and British people, for running a fraudulent electronic trading
    platform that has stolen over AU$1.9 million (US$1.2 million). (AP)
