Date: '2025-06-11'
Source_URI: Portal:Current events/2025 June 11
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Rafah aid distribution killings
  - At least 31 Palestinians are killed by the Israel Defense Forces at an aid distribution
    site in central Gaza. (Al Jazeera)
  - Gaza war hostage crisis
  - Israeli forces in Gaza recover the bodies of two hostages abducted by Palestinian
    militants during the October 7 attacks. (Haaretz) (BBC News)
  - Israeli invasion of the Gaza Strip
  - The Gaza Health Ministry reports that the official death toll of Palestinians
    killed in the war since October 2023 has reached 55,000 people, with over 127,000
    people wounded. (AP)
  - Russian invasion of Ukraine
  - Kharkiv strikes
  - Russia launches drone attacks on Kharkiv, Ukraine, damaging buildings and public
    facilities, killing three people and injuring 60 others. (Ukrainska Pravda)
  - Argentine president Javier Milei is awarded the Genesis Prize during a state visit
    to Israel for his support for Israel, becoming the first non-Jewish person to
    receive such recognition. (Clarín) (Haaretz)
  - Australian flag carrier Qantas announces the closure of its Singapore-based, partly
    owned low-cost airline Jetstar Asia due to rising costs and regional competition.
    (BBC News)
  - Mediterranean Sea migrant smuggling
  - At least eight migrants are found dead and 22 others are missing as the United
    Nations International Organization for Migration and the Djiboutian government
    launch a joint rescue operation after migrants were forced off a boat and forced
    to swim to shore off the coast of Djibouti. (AP)
  - At least 49 people are killed, including four schoolchildren, in flooding caused
    by heavy rainfall and snowfall in a winter storm in the Eastern Cape of South
    Africa. (DW) (BBC News)
  - Gaza war
  - 2025 New York Peace Conference on Gaza
  - The Trump administration calls on countries not to attend a conference for ceasefire
    and peace in Gaza at the United Nations headquarters in New York City, New York,
    United States, and warns of potential diplomatic consequences should any measures
    be taken that are deemed hostile toward Israel. (Reuters)
  - Argentina–Israel relations
  - Argentine president Javier Milei announces that the Argentine embassy in Israel
    will be moved to Jerusalem in 2026. (YNet)
  - North Korea–South Korea relations
  - The military of South Korea shuts down its loudspeakers across the border with
    North Korea and stops its propaganda messages against the government of North
    Korea by order of President Lee Jae-myung to ease tensions between the countries.
    (AP)
  - Opposition to Vladimir Putin in Russia
  - A court in Moscow, Russia, sentences Leonid Volkov, an ally of Alexei Navalny,
    to 18 years in prison in absentia and fines him 2 million rubles (US$25,000) on
    criminal charges including justifying terrorism and organizing and financing an
    extremist group. (AP)
  - The same court places Lev Shlosberg, chair of the opposition social-liberal party
    Yabloko, under house arrest for two months for discrediting the Russian army.
    (Reuters)
