Date: '2025-06-17'
Source_URI: Portal:Current events/2025 June 17
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Rafah aid distribution killings
  - Israel kills at least 59 Palestinians in Gaza after Israeli tanks fired into a
    crowd trying to get humanitarian aid from trucks. At least 14 other people are
    also killed in separate Israeli gunfire and airstrikes elsewhere in the exclave.
    (Reuters)
  - Israeli invasion of the Gaza Strip
  - An Israeli soldier from the Golani Brigade is killed and three others are seriously
    injured in the southern Gaza Strip. (Al Jazeera)
  - Twelve-Day War
  - Airstrikes during the Iran–Israel War
  - Israel says it has killed Major General Ali Shadmani, the most senior military
    commander in Iran who was appointed to his post four days ago. (The New York Times)
  - U.S. president Donald Trump calls for the unconditional surrender of Iran amid
    its war with Israel. Iran rejects the ultimatum. (BBC News) (The Guardian)
  - Russian invasion of Ukraine
  - Kyiv strikes
  - Russian forces launch a total of 440 drones and 32 missiles at Kyiv, Ukraine,
    damaging buildings and public facilities, killing 28 people and wounding dozens
    more. (BBC News)
  - Russia's Ministry of Defence says its air defence units have intercepted and destroyed
    147 Ukrainian drones overnight. (BBC News)
  - Twenty-four people are evacuated after two oil tankers collide near the Strait
    of Hormuz in the Gulf of Oman. (NOS)
  - Puntland–Yemen relations
  - Seven Yemeni fishermen who were detained for nearly two months after entering
    Puntland waters without authorization from Puntland’s Ministry of Fisheries and
    Marine Resources are released. The fishermen were apprehended by the Puntland
    Maritime Police Force after their vessel was intercepted by the coastguard in
    the Ras Aseir region of Puntland. (The Eastleigh Voice) (Hiiraan Online)
  - 2025 Stanley Cup Finals
  - In ice hockey, the Florida Panthers defeat the Edmonton Oilers in six games in
    a rematch of last year's finals, repeating as Stanley Cup champions. (Miami Herald)
