Date: '2025-06-30'
Source_URI: Portal:Current events/2025 June 30
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - 2025 Gaza Strip aid distribution killings
  - Israeli forces kill at least 74 Palestinians across the Gaza Strip, including
    23 who were attempting to get humanitarian aid. (NPR)
  - Al-Baqa Cafe airstrike
  - At least 39 people are killed and dozens of others injured by an airstrike on
    the al-Baqa internet café in Gaza City. Multiple sportspeople and multiple journalists
    were killed, including Ismail Abu Hatab. (NOS)
  - 2025 United States trade war with Canada and Mexico
  - National Economic Council director Kevin Hassett announces that the United States
    will restart trade talks with Canada after they cancel their digital services
    tax on American technology firms. (CBC)
  - Telangana chemical factory explosion
  - Thirty-six people are killed and several others are injured in an chemical factory
    explosion at a pharmaceutical factory in Sangareddy, Telangana, India. (AP)
  - Wildfires break out in Turkey resulting in İzmir Adnan Menderes Airport cancelling
    or diverting all flights. (The Independent)
  - International sanctions against Syria, Syria–United States relations
  - United States president Donald Trump signs an executive order lifting all American
    sanctions on Syria that were imposed during the now-overthrown Assad family's
    regime. (White House)
  - 2022 University of Idaho killings
  - Bryan Kohberger, the suspect in the 2022 killings of four University of Idaho
    students, pleads guilty to all charges, avoiding the death penalty. (ABC News)
  - 2025 Boulder fire attack
  - The death of an 82-year-old woman who was severely injured in the firebombing
    attack earlier this month is announced by leaders of the Boulder Jewish Community
    Center. (AP)
  - 2025 Kenyan protests
  - A civilian vendor shot at close range by police during protests over the death
    of Albert Ojwang in Nairobi, Kenya, succumbs to his injuries in hospital after
    being declared brain-dead, bringing the death toll from nationwide protests in
    Kenya to 20. (CTV News) (DW)
  - Murder of Louisa Dunne
  - Ryland Headley, a 92-year-old man, is convicted for the 1967 murder of Louisa
    Dunne, which is believed to be the UK's longest-running cold case ever to be solved.
    (The Independent)
  - Mexican drug war
  - Twenty bodies, five of them decapitated, are found either hanging from a bridge
    or inside a van abandoned beneath, near Culiacán, Sinaloa, amid clashes between
    factions of the Sinaloa Cartel. (The Guardian)
  - Police in Baku, Azerbaijan, raid the office of the Russian state-owned news agency
    Sputnik, alleging its operations in Azerbaijan are via "illegal financing" after
    its official accreditation was revoked in February. (AP)
