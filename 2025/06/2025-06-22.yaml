Date: '2025-06-22'
Source_URI: Portal:Current events/2025 June 22
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Twelve-Day War
  - Airstrikes during the Twelve-Day War
  - United States strikes on Iranian nuclear sites
  - U.S. president Donald Trump announces that the U.S. Air Force has conducted strikes
    on several nuclear facilities in Iran, including Natanz Nuclear Facility and Fordow
    Uranium Enrichment Plant. (The Times of Israel)
  - The International Atomic Energy Agency says no increase in off-site radiation
    levels was detected at the three targeted nuclear sites. (Al Jazeera)
  - A report by Axios finds that Democrats on the Senate and House Intelligence panels
    were not given advance notice of the attack, while Republicans were given advance
    notice. (Axios)
  - The Parliament of Iran votes for the closure of the Strait of Hormuz in response
    to the U.S. attacks. (The Guardian)
  - Iran launches over 40 ballistic missiles at Israel, injuring at least 23 people
    and destroying apartments and homes. (AP)
  - Gaza war
  - Gaza war hostage crisis
  - Israeli forces in Gaza recover the bodies of three hostages who were abducted
    by Palestinian militants during the October 7 attacks. Fifty hostages remain in
    Gaza, of which 20 are thought to remain alive. (Reuters)
  - The Israel Defense Forces kill at least 51 people and injure 104 others in southern
    Khan Younis, central Gaza, and northern Gaza City. (Al Jazeera)
  - Syrian civil war
  - Mar Elias Church attack
  - At least 23 people are killed, including the perpetrator, and 63 others are injured
    when at least one alleged Islamic State suicide attacker opens fire and detonates
    an explosive device inside the Mar Elias Church in Damascus, Syria. (CTV News)
    (The Washington Post)
  - Three people are killed and more than 70 others are injured after a security barrier
    collapses during celebrations at the Stade du 5 Juillet in Algiers following MC
    Alger’s league title win against NC Magra. (BBC News)
  - 2025 NBA Finals
  - In basketball, the Oklahoma City Thunder win the NBA Finals in 7 games against
    the Indiana Pacers, winning their first championship in franchise history. Shai
    Gilgeous-Alexander is named NBA Finals MVP. (NPR)
