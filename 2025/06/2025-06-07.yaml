Date: '2025-06-07'
Source_URI: Portal:Current events/2025 June 7
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - Israeli forces in Gaza recover the body of Nattapong Pinta, a Thai national abducted
    by the Mujahideen Brigades during the October 7 attacks. (BBC News)
  - Israeli airstrikes kill 55 people in the Gaza Strip. (Reuters)
  - Israel announces that it killed Asaad Abu Sharia, leader of the Mujahideen Brigades
    which was responsible for the abductions of several hostages during the October
    7 attacks, including Shiri Bibas and her two young sons. (The Times of Israel)
  - Russian invasion of Ukraine
  - Kharkiv strikes
  - A Russian air attack on Kharkiv, Ukraine, involving Shahed drones, cruise missiles
    and glide bombs kills four people and wounds at least 60 others, according to
    local officials. (Reuters)
  - Decommunization
  - Kyrgyzstan takes down a 23-meter-tall statue of the Soviet leader Vladimir Lenin,
    thought to be the tallest statue of Lenin in Central Asia. (BBC News)
  - Six people are killed and two seriously injured after a gas cylinder exploded
    in Mardan District, India. (Dawn)
  - Assassination of Miguel Uribe Turbay
  - Colombian senator and pre-candidate in the 2026 presidential election Miguel Uribe
    Turbay is shot during a campaign event in Bogotá, leaving him in serious condition.
    Police arrest a 15-year-old suspect at the scene. He died from his injuries while
    hospitalized two months later on August 11. (Infobae) (NBC News)
  - Afghan prime minister Hasan Akhund announces that no Afghan refugees who left
    the country after the fall of Kabul in 2021 will be prosecuted if they return
    to Afghanistan. (Arab News)
  - Municipal elections are held in Latvia. Preliminary results indicate the far-right
    populist party Latvia First leading with 18.2% of the votes, followed by the centre-left
    Progressives with 16.64% and the conservative National Alliance with 14.13% of
    the votes. (Euractiv)
  - 2025 French Open
  - In tennis, American player Coco Gauff defeats Belarusian player Aryna Sabalenka
    65–77, 6–2, 6–4 in the women's singles final to win her first French Open title.
    (ESPN) (The Guardian)
