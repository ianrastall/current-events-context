Date: '2025-06-05'
Source_URI: Portal:Current events/2025 June 5
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine
  - An overnight Russian Shahed drone strike kills five people, including a child,
    and injures nine others in Pryluky, Chernihiv Oblast, Ukraine. (AP)
  - A Russian drone strike injures nineteen people in Kharkiv, including children
    and a pregnant woman. (AP)
  - Kherson strikes
  - The Kherson Regional State Administration headquarters is destroyed in a Russian
    missile strike. (Ukrinform)
  - Gaza war
  - Gaza war hostage crisis
  - Israeli forces in Gaza recover the bodies of an American-Israeli couple abducted
    by militants during the October 7 attacks. (NBC News)
  - Rafah aid distribution killings
  - A CNN investigation points to the Israel Defense Forces opening fire on crowds
    of Palestinians as they tried to get humanitarian aid in Rafah, Gaza. (CNN)
  - Israel–Hezbollah conflict
  - Israeli Air Force jets launch airstrikes on southern Beirut, Lebanon, targeting
    alleged underground Hezbollah drone manufacturing facilities. (Türkiye Today)
    (Al-Monitor)
  - Mediterranean Sea migrant smuggling, Sudanese refugee crisis
  - The Freedom Flotilla, a flotilla carrying humanitarian aid en route to Gaza with
    Swedish activist Greta Thunberg, Irish actor Liam Cunningham, and French European
    Parliament member Rima Hassan, rescue four Sudanese civil war refugees from a
    dinghy near Libya. (The Times of Israel) (The Print)
  - A fire at a apartment building in Rheims, France, killed four people. (AP News)
  - The government of the Ivory Coast declares an outbreak of cholera after confirming
    seven recent deaths from the disease, and calls on the population to remain vigilant.
    (AP)
  - Chad–United States relations
  - Chad suspends the issuance of visas to U.S. citizens in response to a new travel
    ban announced by U.S. president Donald Trump, that includes Chad among twelve
    countries facing entry restrictions. (BBC News)
  - Mexico–United States relations, Gun law in the United States
  - The U.S. Supreme Court unanimously blocks a 10-billion dollar lawsuit by the Mexican
    government against large American firearms manufacturers alleging their failure
    to prevent firearms sales to drug cartels and other criminal organisations due
    to a lack of evidence that the companies allow such transactions. (Al Jazeera)
    (AP) (Politico)
  - United States and the International Criminal Court
  - The United States imposes sanctions on 4 ICC judges in retaliation over the war
    tribunal's issuance of an arrest warrant for Israeli prime minister Benjamin Netanyahu
    and a past decision to open a case into alleged war crimes by U.S. troops in Afghanistan.
    (Reuters)
  - Two members of the Ta' Maksar gang are convicted as accessories to murder for
    supplying the explosive that killed the Maltese investigative journalist Daphne
    Caruana Galizia in 2017. (Times of Malta)
  - 2025 Burundian parliamentary election
  - Citizens of Burundi vote to elect 100 of the 123 members of the National Assembly.
    (BBC News) (DW)
  - Zia Yusuf announces via X that he is stepping down as the Chairman of Reform UK.
    (BBC News) (The Telegraph)
  - Nintendo's Switch 2 video game console is released in most regions. (BBC News)
    (The Verge)
  - 2026 FIFA World Cup qualification
  - 2026 FIFA World Cup qualification (AFC)
  - In association football, Uzbekistan and Jordan qualify for the FIFA World Cup
    for the first time, with Uzbekistan securing a top-two finish in Group A and Jordan
    advancing from Group B following Iraq's loss to secure their places in the 2026
    tournament. (Reuters)
