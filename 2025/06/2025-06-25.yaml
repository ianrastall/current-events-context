Date: '2025-06-25'
Source_URI: Portal:Current events/2025 June 25
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Twelve-Day War
  - United States strikes on Iranian nuclear sites
  - A preliminary assessment by the U.S. Defense Intelligence Agency finds that Iran's
    nuclear program may have only been set back by a few months after the U.S. airstrikes,
    with the centrifuges required to enrich uranium left largely intact, contradicting
    previous claims made by U.S. president Donald Trump that the facilities were "obliterated".
    (AP)
  - After U.S. president Donald Trump rejects the DIA assessment as "fake news", U.S.
    Central Intelligence Agency director John Ratcliffe says that the CIA assesses
    that several key Iranian nuclear facilities were severely damaged in the airstrikes,
    likely requiring years to rebuild. (BBC News)
  - Gaza war
  - Israeli forces kill at least 78 Palestinians in the Gaza Strip, with at least
    14 who were seeking humanitarian aid. (Al Jazeera)
  - Seven Israeli soldiers are killed in Khan Yunis when an explosive device affixed
    to their armored vehicle detonates. (AP)
  - Nigerian bandit conflict
  - At least 17 soldiers are killed when groups of bandits attack three Army bases
    in Kaduna and Niger States in Nigeria. The Army and Air Force reports they have
    launched counteroffensives against the bandit gangs. (DW)
  - The first train from North Korea arrives at the Yaroslavsky railway station in
    Moscow, Russia, after a five-year pause due to the COVID-19 pandemic. (TASS)
  - Online dating service Bumble announces it will lay off 30% of its global workforce,
    equal to at least 240 jobs. (AP)
  - 2025 Bangui school stampede
  - Twenty-nine people are killed and 280 others are injured after an explosion causes
    a stampede at a high school in Bangui, Central African Republic. President Faustin-Archange
    Touadéra declares three days of national mourning. (BBC News)
  - At least 11 people are killed and 15 others are missing after a landslide in Medellín
    and Bello, Antioquia Department, Colombia. (AP)
  - 2024 Armenian protests
  - Armenian authorities arrest the archbishop Bagrat Galstanyan of the Armenian Apostolic
    Church and accuse him of plotting against the government. (AP)
  - 2025 Kenyan protests
  - At least 16 people are killed and over 400 others are injured, including demonstrators,
    police officers and journalists, when police clash with protestors during nationwide
    anti-government protests across Kenya. (CTV News)
  - Russian invasion of Ukraine
  - Ukrainian president Volodymyr Zelenskyy and the Council of Europe's Human Rights
    Office sign an accord to establish a special tribunal for crimes in Ukraine. (France
    24)
  - Anti–money laundering § United States, War on drugs § Mexico
  - Mexican banks CIBanco, Intercam Banco, and Vector Casa de Bolsa—the latter owned
    by Alfonso Romo, former Chief of Staff to President Andrés Manuel López Obrador—are
    sanctioned by the United States government over alleged money laundering for drug
    cartels. Mexican president Claudia Sheinbaum requests that the U.S. government
    provide evidence. (MSN) (Al Jazeera) (Forbes)
  - 2025 NBA Draft
  - In basketball, the NBA Draft is held at the Barclays Center in New York City,
    U.S., with the Dallas Mavericks selecting Duke player Cooper Flagg as the first
    overall pick. (CNN)
