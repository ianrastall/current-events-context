Source_URI: Portal:Current events/2025 June 9
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza Strip aid distribution incidents
  - According to the Gaza Health Ministry, fourteen Palestinians are killed and 150
    others are injured by Israeli gunfire at an aid distribution site near Rafah,
    Gaza. The total death toll from shootings at aid distribution sites increases
    to 136 with hundreds others wounded. (AP) (Al Jazeera)
  - Israeli blockade of the Gaza Strip
  - A convoy of 300 buses and cars departs from Tunis, Tunisia to Gaza to spotlight
    Israel's blockade on humanitarian aid. The group, organized independently, includes
    7,000 lawyers, medical professionals and activists from North Africa. (Euronews)
    (The Jerusalem Post)
  - 2025 Gerik bus crash
  - Fifteen people are killed and 33 others are injured in a traffic collision when
    a bus carrying students loses control and crashes into the back of a minivan on
    the East–West Highway near Gerik, Perak, Malaysia. (France 24)
  - Five people are killed, including an on duty railway police constable, and seven
    others are injured when passengers get thrown off two overcrowded local trains
    at the Mumbra railway station near Mumbra in Thane, Maharashtra, India. (The Indian
    Express)
  - The Indian Coast Guard rescues 18 crew members from a Singaporean-flagged container
    ship after it catches fire following an explosion off the coast of Kerala, India.
    Search operations are underway for the missing four crew members. (DW)
  - Israeli blockade of the Gaza Strip
  - The Israeli Navy seizes the June 2025 Gaza Freedom Flotilla's flagship vessel,
    the United Kingdom-flagged Madleen, and takes its occupants (including Swedish
    activist Greta Thunberg and MEP Rima Hassan) to Israel. The humanitarian aid the
    ship was carrying en route to Gaza will still be sent into Gaza. (The Times of
    Israel)(CNN) (The Guardian)
  - Protests against Donald Trump
  - June 2025 Los Angeles protests
  - U.S. president Donald Trump orders the deployment of roughly 500 Marines to Los
    Angeles to protect federal buildings amid the ongoing riots in Los Angeles, California.
    (The Wall Street Journal)
  - The U.S. state of California sues the Donald Trump administration for deploying
    the National Guard to Los Angeles. (CBS News)
  - The city of Glendale ends a contract with the U.S. Immigration and Customs Enforcement
    (ICE) to house federal immigration detainees. (The Guardian)
  - 2025 Ballymena riots
  - Two police cars and multiple properties are damaged in Ballymena, Northern Ireland,
    with 15 police officers being injured and one rioter arrested amid riots which
    broke out after two Romanian teenagers were charged for the attempted rape of
    a teenage girl. (BBC News)
  - A court in Prague, Czech Republic, sentences a Colombian national to eight years
    in prison over a 2024 arson attack on public buses and for planning another similar
    attack. Czech prime minister Petr Fiala says the arson attack is part of Russia's
    hybrid war against his country. (AP)
  - The U.S. Treasury Department imposes sanctions on Iván Archivaldo Guzmán Salazar
    and his brother , El Chapo's sons who are believed to be in Mexico and leading
    factions of the Sinaloa Cartel. (AP)
