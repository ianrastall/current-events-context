Date: '2025-10-09'
Source_URI: Portal:Current events/2025 October 9
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of Gaza
  - Four people are killed and 40 others are trapped under rubble in an Israeli attack
    against a building in Sabra, Gaza City, Palestine, as the ceasefire agreement
    proposed by US president Donald Trump awaits approval by the Israeli cabinet.
    (The Times of Israel)
  - Twenty-nine people are killed in Israeli attacks against Gaza. (Wafa)
  - Gaza war peace plan
  - The Israeli cabinet formally approves the ceasefire agreement, with the Israeli
    military given 24 hours to withdraw their troops to the agreed-upon line within
    Gaza. The hostage and prisoner releases are expected to begin in the coming days.
    (AP)
  - US officials announce that 200 troops will be sent to Israel to run a civil-military
    coordination center established by U.S. Central Command to support and monitor
    the ceasefire deal, joined by members of the armed forces of Egypt, Qatar, Turkey,
    and the United Arab Emirates. (AP)
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - The Pakistan Air Force carries out two airstrikes in Kabul, Afghanistan, targeting
    Pakistani Taliban leaders. (Amu.tv)
  - Insurgency in Khyber Pakhtunkhwa
  - Seven Pakistani Taliban members and a major are killed in a raid and ensuing shootout
    in Daraban, Khyber Pakhtunkhwa, Pakistan. The Inter-Services Public Relations
    further reports that the security forces recovered a cache of weapons and ammunition,
    along with stating that the killed terrorists were actively involved in multiple
    attacks. (Daily Pioneer)
  - Three tribal leaders from Khyber Pakhtunkhwa, Pakistan, are abducted and killed
    by Pakistani Taliban militants. (Press Trust of India)
  - 2025 Nobel Prizes
  - Hungarian novelist and screenwriter László Krasznahorkai wins this year's Nobel
    Prize in Literature "for his compelling and visionary oeuvre that, in the midst
    of apocalyptic terror, reaffirms the power of art". (CNN)
  - Argentina–United States relations, Argentine monetary crisis
  - US Secretary of the Treasury Scott Bessent announces that the United States has
    purchased Argentine pesos and has finalized a currency swap framework, adding
    that the US is prepared to provide assistance to Argentina's economy, after ending
    four days of meetings with Argentine economy minister Luis Caputo. (AP)
  - Serbia–United States relations, United States government sanctions, Russia–United
    States relations
  - The United States Treasury Department issues sanctions against Naftna Industrija
    Srbije, the primary petroleum producer and supplier in Serbia, which is majority-owned
    by Russian state company Gazprom. (AP)
  - 2025 Pacific typhoon season
  - One person is killed in Oiso, Kanagawa Prefecture, Japan, and hundreds of people
    are evacuated as Typhoon Halong makes landfall in the Izu Islands. (AP) (Kyodo
    News)
  - 2025 Azerbaijan–Russia diplomatic crisis, Azerbaijan Airlines Flight 8243
  - Russian president Vladimir Putin says that Russian air defense shot down Azerbaijan
    Airlines Flight 8243 in December 2024, in his first admission of responsibility
    for the accident. (CNN)
  - Trinidad and Tobago–Venezuela relations, Trinidad and Tobago–United States relations
  - The attorney general of Trinidad and Tobago says that the United States has granted
    permission yesterday to the country to negotiate a gas deal with Venezuela without
    facing U.S. sanctions related to its relationship with Venezuela. (AP)
  - The United States Department of Justice indicts Attorney General of New York Letitia
    James on a criminal bank fraud charge by in Alexandria, Virginia, United States.
    (CNN) (Reuters)
  - 2025 Ecuador protests, Economy of Ecuador
  - The Ecuadorian Army deploys at least 5,000 personnel to Quito to "prevent vandalism"
    amid ongoing protests against President Daniel Noboa over the rise of price of
    diesel fuel due to end of subsidies. (AP)
  - 2025 ATP Tour
  - In tennis, Monégasque player Valentin Vacherot defeats Holger Rune at the Shanghai
    Masters to become the lowest-ranked player on the ATP rankings to reach a Masters
    1000 semi-final in 26 years, and the first Monégasque in history to do so. (The
    Independent) (ATP)
