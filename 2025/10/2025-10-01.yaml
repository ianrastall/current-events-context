  - Sudanese civil war
  - Siege of El Fasher
  - As El Fasher's humanitarian crisis continues to drastically deteriorate, the Rapid
    Support Forces reportedly makes further gains against besieged garrison units
    mainly composed of former Darfuri rebels and their Sudanese Armed Forces allies.
    (BBC News)
  - Embargo of Russian oil during the Russo-Ukrainian War, Serbia–United States relations
  - The U.S. Department of the Treasury postpones sanctions on Serbian oil company
    Naftna Industrija Srbije, of which Russian state-owned companies Gazprom and Gazprom
    Neft hold a majority of shares, until October 8, 2025. (Reuters)
  - 2025 Cebu earthquake
  - Cebu governor Pam Baricuatro declares a state of calamity and suspends classes
    throughout the province due to the earthquake yesterday. (BBC News)
  - The National Grid Corporation of the Philippines reports that power has been restored
    shortly after midnight in five islands in the central Philippines, including Cebu.
    (AFP via Bangkok Post)
  - Arerti Maryam Church collapse
  - At least 36 people are killed and over 200 others are injured when an under construction
    church collapses in Areti, Amhara Region, Ethiopia. (AP) (TRT World)
  - The death toll from the collapse of a pesantren in Sidoarjo, East Java, Indonesia,
    rises to six as rescue workers continue their search. Dozens of students remain
    missing and approximately 100 others were injured in the collapse. (AP)
  - Two workers are killed, several are injured and others are reported missing when
    the ceiling of an under-renovation serail in Damascus, Syria, collapses. (AP)
  - A flight attendant is injured when two CRJ-900 aircraft, one operated by Delta
    Air Lines and one by Endeavor Air, collide on a runway at LaGuardia Airport in
    New York, United States. (DW) (CNN)
  - 2025 Moroccan Gen Z protests
  - At least three people are killed in Lqliâa, Souss-Massa, Morocco, as security
    forces open fire during nationwide protests over alleged corruption and public
    spending priorities. (Al Jazeera)
  - Islamic terrorism in Europe
  - Three men are arrested in Berlin, Germany, for targeting Jewish institutions and
    preparing a terrorist attack on behalf of Hamas. (Reuters)
  - The annual Oktoberfest is temporarily shut down in Munich, Germany, until 17:30
    local time due to an explosion at a house earlier in the morning which killed
    two people, including the perpetrator. The police ultimately finds no link between
    the Oktoberfest and the explosion, which was related to a domestic dispute. (DW)
    (AP)
  - The Italian Carabinieri Art Squad seizes 21 paintings by Salvador Dalí suspected
    of being forged pieces at an exhibition at the Palazzo Tarasconi in Parma. (AP)
    (The Irish Independent)
  - 2025 Malagasy protests
  - Protests in Madagascar continue and spread across the country, demanding the resignation
    of President Andry Rajoelina. Opposition leader Rivo Rakotovao says that his party
    will not join any new government under Rajoelina, asking him to step down. (Reuters)
  - 2025 United States federal government shutdown
  - A federal government shutdown occurs in the United States after a funding bill
    fails to be passed, the first government shutdown since January 2019. (CTV News)
  - The 2025 Right Livelihood Award is awarded to a student organization in the Pacific
    Islands fighting climate change, activist organization Justice for Myanmar, Taiwanese
    activist Audrey Tang, and the Sudanese Emergency Response Rooms for their work
    in combating injustice in their respective regions. (AP)
  - Thousands of people march in Athens as part of a general strike across Greece
    to protest against proposed changes in labor laws that could change the 8-hour
    work day to 13 hours, or a 48-hour workweek. (AP) (The Guardian)
  - Matteo Rossi and Lorenzo Bugli are sworn in as the new captains regent of San
    Marino, succeeding Denise Bronzetti and Italo Righi. (San Marino RTV)
  - A research team at the Free University of Berlin announce the detection of new
    organic substances within water vapour plumes erupting from the surface of Enceladus
    by Cassinis Cosmic Dust Analyzer, a potential biosignature of extraterrestrial
    life under the Saturnian moon's icy surface. (The Guardian) (Nature Astronomy)
