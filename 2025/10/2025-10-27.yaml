  - LGBTQ rights in the United Kingdom
  - King Charles III dedicates a memorial to LGBTQ members of the Armed Forces at
    the National Memorial Arboretum in Lichfield, Staffordshire, United Kingdom, on
    the 25-year anniversary of the end to the country's ban on gay servicemen. (AP)
  - Taxation in Malta
  - Malta introduces tax cuts exempting parents of two or more children from income
    tax on up to €18,500 (US$21,574) of earnings from 2026, rising to €30,000 ($34,985)
    by 2028, as part of efforts to address its low fertility rate. (Reuters)
  - 2025 Atlantic hurricane season
  - Hurricane Melissa reaches Category 5 intensity on its approach to Jamaica. (NBC)
    (Washington Post) (Fox Weather)
  - Montenegro–Turkey relations
  - Montenegro suspends its visa-free arrangement for Turkish citizens after the stabbing
    of a local man allegedly by Turkish nationals led to unrest in Podgorica. (Reuters)
  - A court in Mali sentences former prime minister Moussa Mara to two years in prison
    on charges of undermining state security and inciting public disorder. Mara will
    serve one year without parole and one year as a suspended sentence. (AP)
  - 2025 Cameroonian presidential election
  - The Supreme Court of Cameroon announces the reelection of incumbent president
    Paul Biya. (AP)
  - 2025 Czech parliamentary election
  - Czech president Petr Pavel asks former prime minister Andrej Babiš to form a new
    government after his party ANO won the most seats in the parliamentary elections
    earlier this month. (AP)
  - Tunisia suspends the Tunisian Forum for Economic and Social Rights from operating
    for a month, citing the need to conduct a financial audit on the organization's
    foreign funds. (Reuters)
