Date: '2025-10-13'
Source_URI: Portal:Current events/2025 October 13
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza peace plan
  - Hamas hands over the 20 remaining living Israeli hostages to the Red Cross, and
    Israel releases over 1,900 Palestinian detainees, including 250 people serving
    life sentences for convictions in attacks on Israelis, as part of the ceasefire
    agreement. (AP)
  - Under the terms of the ceasefire agreement, local authorities shut down aid distribution
    sites run by the Gaza Humanitarian Foundation, which were the locations of shootings
    by the Israeli military that killed over 2,600 people seeking food aid. (AP)
  - Hamas returns the bodies of four of the 28 deceased Israeli hostages, partially
    violating a provision of the ceasefire agreement for all hostages to be returned
    in one day, though the agreement acknowledged the possible inability of Hamas
    to be able to locate all the bodies in the specified timeframe. (BBC) (Haaretz)
  - Hamas publicly executes eight men in Gaza City accused of being criminals and
    Israeli collaborators. (Reuters) (BBC)
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - Nineteen security forces are killed in two Pakistani airstrikes in Spin Boldak
    and Bahramcha, Afghanistan. A local high-ranking commander is among the fatalities.
    (Kabul Now)
  - 2025 Malagasy protests
  - 2025 Malagasy coup d'état
  - Malagasy president Andry Rajoelina flees the country after losing the support
    of the armed forces following weeks of Gen Z-led protests against him. Rajoelina
    says he has not resigned and confirms a coup d'état is underway. (AP) (Global
    Nation)
  - 2025 Nobel Prizes
  - Joel Mokyr is awarded half of this year's Nobel Memorial Prize in Economic Sciences
    for "having identified the prerequisites for sustained growth through technological
    progress", with Philippe Aghion and Peter Howitt sharing the other half for "the
    theory of sustained growth through creative destruction". (CNN) (Nobel Prize)
  - At least 66 people are injured, including around 16 seriously, when two trains
    collide outside Jablonov nad Turňou, Slovakia. (Reuters)
  - Two people are killed and one is injured when a SOCATA TBM-700 aircraft crashes
    in Dartmouth, Massachusetts, United States. (AP News)
  - At least fourteen people are killed when a gold mine collapses in El Callao, Bolívar,
    Venezuela. The military sets up a command post to recover the bodies. (AP) (El
    País in Spanish)
  - Tipping points in the climate system, Environmental issues with coral reefs
  - Scientists at the University of Exeter in England report large-scale die-off of
    coral reefs, the first major tipping point in large changes in the climate system.
    (The Guardian) (Nature)
  - 2025 Gaza peace summit
  - Heads of government of 30 countries and leaders of several major international
    organisations gather in Sharm El Sheikh, Egypt to discuss the next steps in the
    implementation of the Gaza peace plan. It is expected that the focus will be on
    the future governance of the Gaza Strip, security, and humanitarian assistance.
    (Al Jazeera) (The Guardian) (BBC News)
  - China–Netherlands relations
  - The Dutch government invokes the Goods Availability Act to seize control of the
    Chinese-owned semiconductor manufacturer Nexperia, which is headquartered in Nijmegen,
    Gelderland, amid concerns that the company's governance "could pose a risk to
    Dutch and European economic security". (AP) (Financial Times)
  - Pakistan–United States relations
  - Pakistani prime minister Shehbaz Sharif nominates United States president Donald
    Trump for the Nobel Peace Prize for a second time, citing his mediation of the
    Gaza peace plan. Sharif had previously nominated Trump in June for his role in
    mediating a ceasefire to the 2025 India–Pakistan conflict. (The Hill)
  - Three faculty members are wounded in a stabbing attack at a private high school
    for neurodivergent children in Torrance, California, United States. The suspected
    assailant, an ex-student, is arrested, and the two bombs he left nearby are found
    to be inactive. (MSN News) (Los Angeles Times)
  - 2025 Nauruan parliamentary election
  - Results from Saturday's election in Nauru show that incumbent president David
    Adeang has been re-elected to his seat, though the parliament must decide whether
    Adeang will continue to serve as president. (RNZ)
  - 2026 FIFA World Cup
  - 2026 FIFA World Cup qualification (CAF)
  - Cape Verde qualifies for the FIFA World Cup for first time in its history after
    defeating Eswatini 3–0 during CAF World Cup qualifiers. (RFI)
