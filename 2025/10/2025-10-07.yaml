Date: '2025-10-07'
Source_URI: Portal:Current events/2025 October 7
Intelligence_Payload:
  Uncategorized:
  - Syrian civil war
  - SDF–Syrian Transitional Government clashes
  - The Syrian government announces an immediate ceasefire with the Kurdish-led Syrian
    Democratic Forces following clashes last night that killed at least four people
    and injured at least eight others. (AP)
  - US intervention in the Syrian civil war
  - United States Central Command announces that US forces conducted a strike in Syria
    on October 2, killing Muhammad ‘Abd-al-Wahhab al-Ahmad, a senior Jama'at Ansar
    al-Islam attack planner. (The Hill)
  - Red Sea crisis
  - Houthi rebels detain nine United Nations workers in Yemen as part of a long-term
    crackdown on UN presence in the country, bringing the total number of detained
    UN personnel to 53. (AP)
  - The Philippine Department of Migrant Workers confirms the death of a critically
    injured Filipino crew member of MV Minervagracht which was intercepted by the
    Houthis in the Gulf of Aden on September 29. The Netherlands-based operator of
    the vessel has reported that another injured Filipino is still being treated in
    Djibouti. (Philippine Daily Inquirer) (The Times of Israel)
  - The value of gold futures rise above $4,000 per troy ounce for the first time
    in trading history. (AP)
  - Al-Khoziny Islamic Boarding School collapse
  - The death toll from the collapse of a pesantren last week in East Java, Java,
    Indonesia, rises to 67 as search and rescue operations end. (The Guardian)
  - Mediterranean Sea migrant smuggling
  - Four people are killed, including a girl, after a boat carrying migrants sinks
    off the coast of Lesbos, Greece. Police find the 34 survivors at shore. (AP)
  - At least 16 people are killed after a bus is hit by a landslide in Himachal Pradesh,
    India. (Reuters) (NDTV)
  - Four people are killed, three others are injured and others are reported missing
    when a former office block being converted into a hotel partially collapses in
    Madrid, Spain. (BBC News)
  - Over ten people are injured when a ferris wheel collapses at a fair in Santa Cruz
    de la Sierra, Bolivia. (BNO News)
  - Foreign relations of the Holy See
  - Visit by Pope Leo XIV to Turkey and Lebanon
  - The Holy See Press Office announces that Pope Leo XIV will visit İznik, Turkey,
    the location of the ancient city Nicaea, and Lebanon in November and December
    as his first papal visits abroad. (The Catholic Herald) (Anadolu Agency)
  - Crime in Mexico
  - Six civilians are killed and two others are injured in a mass shooting when Mexican
    Army soldiers open fire on a vehicle that tried to ram them on the highway connecting
    Ciudad Mante and Tampico in Tamaulipas, Mexico. Mexican president Claudia Sheinbaum
    vowed an investigation. (MSN)
  - Crime in Germany
  - Iris Stalzer, the mayor-elect of Herdecke, Germany, is left in a critical condition.
    She has told investigators it was her 17-year-old adoptive African daughter who
    stabbed her repeatedly in her home and tortured her for hours. (CNN) (AP) (DW)
  - Crime in Norway
  - A restaurant in Strømmen, Akershus, Norway, receives damage after hand grenades
    were thrown into it. The Norwegian Police suspects gang activity with links to
    the Swedish–Kurdish criminal gang Foxtrot, arresting two teenagers shortly after
    the incident. (VG)
  - Residents of Bonaire, a Dutch special municipality in the Caribbean, file a class
    action lawsuit backed by Greenpeace against the Netherlands accusing them of failure
    to act in protecting the island's residents against climate change, as they are
    legally Dutch citizens. (AP) (Euractiv)
  - The Supreme Court of Argentina approves the extradition of businessman Fred Machado
    to the United States, where he faces federal charges on drug trafficking and money
    laundering. (AP)
  - The Supreme Electoral Court of Costa Rica requests the National Assembly to strip
    President Rodrigo Chaves Robles of immunity so that he can be prosecuted for corruption
    charges. (AP)
  - Five people are arrested after an alleged assassination attempt on Ecuadorian
    president Daniel Noboa. (CNN)
  - 2025 Barbadian presidential election
  - Jeffrey Bostic is elected President of Barbados by the Parliament. He succeeds
    Sandra Mason and becomes the second president after Barbados becoming a republic.
    (Barbados Today)
  - 2025 Nobel Prizes, Nobel Prize in Physics
  - John Clarke, Michel Devoret, and John M. Martinis are jointly awarded this year's
    Nobel Prize in Physics for the discovery of macroscopic quantum mechanical tunnelling
    and energy quantization in an electric circuit. (Euronews)
