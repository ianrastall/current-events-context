Date: '2025-10-31'
Source_URI: Portal:Current events/2025 October 31
Intelligence_Payload:
  Uncategorized:
  - The Civil Aviation Authority of Singapore founds a company, SAFCo, to meet Singapore's
    goal of utilizing sustainable aviation fuel in flights. (CNA)
  - At least 21 people are killed and at least 18 bodies are recovered in landslides
    in Enga Province, Papua New Guinea. (AP)
  - The United Nations Security Council approves a United States-backed resolution
    supporting Morocco's autonomy proposal and claim to the disputed Western Sahara,
    despite opposition from Algeria. (AP)
  - 2025 Kartalkaya hotel fire
  - A court in Turkey sentences the owner of Kartalkaya hotel to life in prison after
    finding him guilty of severe negligence in the fire at his hotel in January, which
    killed 78 people, including 34 children. (AP)
  - 2025 Tanzanian election protests
  - The United Nations says ten deaths have occured due to protests in Tanzania following
    the general election. (AP)
  - Capital punishment in India
  - A court in Andhra Pradesh, India, sentences five people to death for the November
    2015 assassination of the mayor of Chittoor and her husband. (The Times of India)
  - Police in Guyana arrest opposition leader Azruddin Mohamed following an indictment
    by a federal grand jury in Florida, United States, and an extradition request
    by American authorities, who accuse him of several financial crimes. (AP)
  - 2025 Moldovan parliamentary election
  - Moldova's parliament appoints Alexandru Munteanu as prime minister following the
    victory of President Maia Sandu's Party of Action and Solidarity in the September
    election. (Reuters)
  - 2025 Korean Series
  - In baseball, the LG Twins defeat the Hanwha Eagles in five games to win their
    fourth Korean Series title. (Yonhap)
