Date: '2025-10-23'
Source_URI: Portal:Current events/2025 October 23
Intelligence_Payload:
  Uncategorized:
  - Boko Haram insurgency
  - At least 50 insurgents are killed as the Nigerian Army repel drone-backed attacks
    on military positions in Borno and Yobe States. (Reuters)
  - Israel–Hezbollah conflict
  - Four people, including an elderly woman, are killed in a series of Israeli airstrikes
    in eastern and southern Lebanon. (Al Jazeera)
  - Syrian conflict
  - A ceasefire is agreed between the Syrian Armed Forces and Firqat al-Ghuraba, after
    the latter's camp was sieged yesterday in Harem. (France24)
  - Billboard magazine revises the rules for its Hot 100 record chart and implements
    a maximum time spent on the list if a song drops below a certain rank, intended
    to shorten the age to be considered "contemporary". (NPR)
  - 2025 United States trade war with Canada and Mexico, Canada–United States trade
    relations
  - U.S. president Donald Trump announces all trade negotiations with Canada are "terminated"
    following an advertisement featuring former U.S. president Ronald Reagan released
    by the government of Ontario. (CBC)
  - Israel–United States relations, Proposed Israeli annexation of the West Bank,
    International law and the Arab–Israeli conflict
  - The United States rules out Israel's plan to annex the West Bank following a Knesset
    vote, while several other countries also affirm their standings against the plan,
    calling it a violation of international law. (Gulf News)
  - Nearly 700 foreigners have fled Myanmar and crossed into Thailand following the
    Tatmadaw's raid on the KK Park scam center on Monday. Thailand detains 677 people,
    including 618 men and 59 women, after they cross the border into Tak Province,
    Thailand. (Reuters)
  - 2025 National Basketball Association illegal gambling prosecution
  - More than 30 people are arrested by United States law enforcement as part of an
    investigation into illegal gambling linked to the American mafia, including former
    professional basketball player Damon Jones, Miami Heat player Terry Rozier, and
    Portland Trail Blazers head coach Chauncey Billups. (Reuters)
  - Deportation in the second Trump administration
  - A review conducted by National Public Radio reveals that there have been at least
    20 deaths in U.S. Immigration and Customs Enforcement custody this year, making
    it the deadliest year since record-keeping began in 2004. (NPR)
  - English Channel illegal migrant crossings
  - The United Kingdom Foreign Office issues sanctions against gangs from the Balkans
    for facilitating migrant smuggling across the English Channel into the UK. (DW)
  - Killing of Iryna Zarutska
  - A grand jury indicts Decarlos Brown Jr., the perpetrator of the fatal stabbing
    of a Ukrainian refugee on a Charlotte Area Transit System train in Charlotte,
    North Carolina, United States, of first-degree murder and causing death on a public
    transport system, making him eligible for the death penalty. (NBC News) (Newsweek)
  - A court in Belfast, Northern Ireland, finds a British soldier not guilty over
    killings on Bloody Sunday in 1972 in Derry. (Reuters)
  - 2026 Brazilian general election
  - At a meeting with Indonesian counterpart Prabowo Subianto, Brazilian president
    Luiz Inácio Lula da Silva announces his bid for a fourth non-consecutive term
    in next year's election. (AP)
  - 2026 Hungarian parliamentary election
  - Hundreds of thousands of people gather in Budapest, Hungary, in rival rallies
    for incumbent prime minister Viktor Orbán and his main opposition rival Péter
    Magyar. (AP)
