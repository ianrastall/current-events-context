Date: '2025-10-17'
Source_URI: Portal:Current events/2025 October 17
Intelligence_Payload:
  Uncategorized:
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - Pakistan carries out a series of airstrikes in Barmal District and Urgun District,
    Paktia Province, Afghanistan, killing ten people and wounding eight others, ending
    the 48–hour ceasefire which started two days ago. (Kabul Now)
  - The International Federation of Journalists confirm that a media worker was among
    those killed during the Pakistani airstrikes in Kabul, Afghanistan, two days ago.
    Journalist Abdul Ghafoor Abed was also shot dead while covering the shootouts
    at the border. (IFJ)
  - The casualty toll from the Pakistani airstrikes in Spin Boldak, Afghanistan, two
    days ago, increases to 40 people killed and 170 injured. (Tolo News)
  - Gaza war
  - Gaza peace plan
  - Hamas returns one more hostage's body to the Red Cross. (France 24)
  - Israelis fire at a vehicle carrying a displaced family in Gaza City, killing eleven
    Palestinians, including seven children. The IDF claims it crossed the ceasefire
    demarcation line. (EFE) (New York Times) (BBC News)
  - Insurgency in Khyber Pakhtunkhwa
  - At least 14 people are killed, including six attackers, and 13 others are injured
    in a suicide car bomb followed by gunfire at a military compound in Mir Ali, North
    Waziristan District, Khyber Pakhtunkhwa, Pakistan. Harkat-ul-Jihad al-Islami claims
    responsibility for the attack. (Xinhua News Agency)
  - 2025 Rahova gas explosion
  - Three people are killed and 14 others are injured in an explosion caused by a
    suspected gas leak at an apartment building in Bucharest, Romania. (Reuters)
  - Typhoon Halong (2025)
  - Alaska governor Mike Dunleavy requests federal disaster assistance, as flooding
    in remote villages forces over 2,000 to potentially face a prolonged evacuation
    longer than 18 months, caused by the remnants of Halong. (AP)
  - At least 17 people are killed and others are injured when a bus loses control,
    hits rocks and overturns on a highway in Pernambuco, Brazil. (CTV News) (The Times
    of India)
  - Three people are killed and eight others injured during an explosion at an explosives
    plant in Sterlitamak, Bashkortostan, Russia. (Reuters)
  - Anti-corruption campaign under Xi Jinping
  - The Ministry of National Defense of China announces that Vice Chairman of the
    Central Military Commission of China He Weidong, Director of the Political Work
    Department of the Central Military Commission Miao Hua and seven other generals
    were expelled from the party and the military following charges of corruption
    against them. (South China Morning Post)
  - Hijab and burka controversies in Europe
  - The Portuguese parliament approves a ban on face veils for "gender or religious"
    reasons and making it punishable by up to 2,000. The bill, promoted by right-wing
    party Chega, is passed to President Marcelo Rebelo de Sousa for review. (AP)
  - Killing of Salwan Momika
  - A 24-year-old man from Syria, living in Sweden at the time, is identified as the
    main perpetrator who assassinated anti-Islam activist Salwan Momika. (The Jerusalem
    Post)
  - Nord Stream pipelines sabotage
  - The Polish judiciary refuses extradition of a Ukrainian to Germany who is suspected
    of blowing up the Nord Stream pipeline, citing lack of evidence, arguing that
    it happened in international waters, on Russian-owned property, and amidst the
    Russian aggression against his state. (DW)
  - WikiConference North America
  - A man brandishes a firearm and threatens to kill himself on stage at the 2025
    "Wiki World’s Fair" event in New York City. A Wikipedia contributor disarms the
    man, who was later taken into custody. (The New York Times) (Newsweek)
  - Mongolian prime minister Gombojavyn Zandanshatar is ousted by the State Great
    Khural after four months in power. (AP)
