  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - At least 23 Pakistani soldiers and nine Afghan soldiers are killed during the
    ongoing clashes at the border. Pakistan claims that it captured 19 Afghan border
    posts. (Al Jazeera)
  - 2025 Malagasy protests
  - 2025 Malagasy mutiny
  - Malagasy President Andry Rajoelina says that an attempted coup has been initiated
    after a group of the military joined protestors and exchanged gunfire with pro-government
    security forces, demanding Rajoelina to step down. (AP)
  - Gaza war
  - Societal breakdown in the Gaza Strip during the Gaza war
  - At least 19 Doghmush clan members and eight Hamas fighters are killed in a shootout
    in Gaza City. (BBC News)
  - Palestinian journalist Saleh al-Jafarawi is shot and killed by Doghmush clan members
    amid shootouts with Hamas in Gaza City. (TRT World)
  - 2025 Tehreek-e-Labbaik Pakistan protests
  - Three protestors, a bystander and a policeman are killed and dozens are injured
    during clashes in Muridke, Pakistan, as a pro-Palestine march, organized by the
    TLP Party, attempted to reach the American embassy in Islamabad. (Reuters)
  - 2025 Pacific typhoon season
  - More than three people are reported missing and at least 34 others are rescued
    when remnants of Typhoon Halong causes flooding in Kipnuk and Kwigillingok, Alaska,
    United States. (ABC News)
  - Forty-two people are killed and 49 others injured in a bus crash in Louis Trichardt,
    Limpopo, South Africa. (AP)
  - Mass shootings in the United States
  - 2025 Saint Helena Island shooting
  - Four people are killed and at least 20 others are injured, including four critically,
    in a mass shooting at a crowded bar in Saint Helena Island, South Carolina, United
    States. (CNN)
  - 2025 Cameroonian presidential election
  - Cameroonians vote to elect their president, with the incumbent Paul Biya seeking
    his eighth term. (Reuters)
  - 2025 Ecuador protests
  - Police clash with protestors in Quito, Ecuador, amid ongoing demonstrations against
    President Daniel Noboa over an increase in fuel price. Noboa has refused to negotiate
    with the Indigenous federation, which leads part of the protests against his government.
    (AP)
  - 2025 Seychellois general election
  - Patrick Herminie wins the presidential election in Seychelles by obtaining more
    than 52% of the votes, becoming the next President of Seychelles, defeating the
    incumbent Wavel Ramkalawan. (Reuters)
  - 2025 ATP Tour
  - In tennis, Monégasque player Valentin Vacherot, who was ranked 204th on the ATP
    rankings, defeats his cousin Arthur Rinderknech in the Shanghai Masters final
    4–6, 6–3, 6–3, to become the lowest-ranked Masters 1000 winner in ATP history,
    and the first from Monaco. (ESPN) (ATP Tour)
  - Following his win at the Shanghai Masters, Vacherot moves to rank 40 and becomes
    the highest ranked Monégasque player in history, surpassing Jean-René Lisnard
    who ranked 106th in 2006. (Olympics)
  - 2025 Supercars Championship
  - In touring car racing, Grove Racing drivers Matthew Payne and Garth Tander win
    the 68th running of the Supercars Bathurst 1000. (Supercars)
