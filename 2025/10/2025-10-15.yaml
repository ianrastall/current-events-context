Date: '2025-10-15'
Source_URI: Portal:Current events/2025 October 15
Intelligence_Payload:
  Uncategorized:
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - Pakistan claims that it killed at least 15 Taliban members in an airstrike in
    Spin Boldak, Afghanistan. The Taliban claims that twelve civilians are killed
    and over 100 are injured. Both countries also claim that they killed several soldiers
    during a shootout. (BBC News)
  - Pakistan carries out two airstrikes against Kabul, capital of Afghanistan. The
    target and the result are unknown. After the attack, both countries agree to a
    48-hour ceasefire. (BBC News)
  - Gaza war
  - Gaza war hostage crisis
  - Hamas returns two more hostages' bodies to the Red Cross, with 19 still in Gaza
    despite the Gaza peace plan's deadline last Monday. Donald Trump also states Israel
    may resume fighting if he believes Hamas does not uphold their part of the agreement.
    (AP)
  - Russo-Ukrainian war
  - Kupiansk offensive, Humanitarian impacts of the Russo-Ukrainian war
  - Ukrainian authorities order mass evacuations across 40 settlements and towns in
    northeastern Kharkiv Oblast, citing the worsening situation around the city of
    Kupiansk. (Reuters)
  - Papua conflict
  - Fourteen people are killed by Indonesian soldiers during a six-hours battle with
    Free Papua Movement separatists in Intan Jaya Regency, Central Papua. The army
    claims that all of those killed were militants, while the group claims that nine
    civilians and three militants are among the dead. (AP)
  - Ecuadorian conflict
  - Explosive devices detonate on two bridges in Ecuador. No casualties are reported.
    (Reuters)
  - Haitian conflict
  - Doctors Without Borders announce that they are permanently closing their offices
    in Port-au-Prince, Haiti, due to safety concerns. (AP)
  - Insurgency in Khyber Pakhtunkhwa
  - Six Pakistani soldiers and nine Pakistani Taliban gunmen are killed in a shootout
    in Orakzai District, Khyber Pakhtunkhwa, Pakistan. (Reuters)
  - United States–Venezuela relations, 2025 US Caribbean naval deployment, United
    States involvement in regime change in Latin America
  - The United States reportedly greenlights covert operations in Venezuela targeting
    president Nicolás Maduro. (The New York Times)
  - Ten people are killed and 21 others are injured, including four critically, in
    an explosion on a crude palm oil tanker docked at a shipyard on Batam Island,
    Indonesia. (AP) (Marine Insight)
  - Cambodia–South Korea relations, Scam centers in Cambodia
  - South Korea issues a blanket travel ban on its citizens to parts of Cambodia known
    for its scam centers, alleging that over 200,000 foreign nationals are working
    in these centers, including 1,200 South Koreans. (DW) (South China Morning Post)
  - Russo-Ukrainian war, Russia–United Kingdom relations, International sanctions
    during the Russo-Ukrainian war
  - The United Kingdom imposes new sanctions on Russian major energy companies Lukoil
    and Rosneft. (RBC-Ukraine)
  - International Criminal Court investigation in the Philippines
  - Judges at the International Criminal Court dismiss Karim Khan, the chief prosecutor
    in the case against former Philippine president Rodrigo Duterte, due to links
    between Khan and some victims of Duterte's alleged crimes, whom Khan represented
    prior to Duterte's arrest. (AP)
  - Nord Stream pipelines sabotage, Italy–Ukraine relations, Germany–Italy relations
  - Italy's Supreme Court of Cassation blocks the extradition of a Ukrainian national
    suspected of causing explosions which damaged the Nord Stream pipelines in 2022
    to Germany, where he is wanted. (DW)
  - Iraqi politician Safaa Al Mashhadani, a candidate for the upcoming parliamentary
    elections, is assassinated by a bomb attached to his vehicle in Al-Tarmia District.
    The perpetrators are unknown. (Gulf News)
  - Abortion in Costa Rica, Women's rights in Costa Rica
  - President Rodrigo Chaves Robles restricts abortion in Costa Rica only to cases
    where the life of the mother is at risk. (AP)
  - Euthanasia in Uruguay
  - Uruguay becomes the first country in Latin America to decriminalise euthanasia
    via legislation after the law is passed by the Senate. (AP)
  - Guatemalan president Bernardo Arévalo accepts the resignation of three top security
    officials following a jailbreak where 20 members of the Barrio 18 gang escaped
    from prison. (AP)
