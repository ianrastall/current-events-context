Date: '2025-10-16'
Source_URI: Portal:Current events/2025 October 16
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza peace plan
  - At least three Palestinians are killed in Gaza by Israeli troops, bringing the
    total to at least 23 people killed by Israel since the start of the ceasefire.
    (Reuters) (Al Jazeera)
  - Israeli incursions in the West Bank during the Gaza war
  - An 11-year-old boy is fatally shot by Israeli soldiers near Hebron. (The Times
    of Israel) (BBC News)
  - Red Sea crisis
  - Israeli attacks on Yemen
  - Houthi sources confirm the death of general and chief of staff Muhammad Abd al-Karim
    al-Ghamari from an Israeli airstrike in August. (Reuters)
  - Russo-Ukrainian war
  - Dnieper campaign
  - Russian forces say they have crossed the Dnieper river and have entered the city
    of Kherson for the first time since 2022, and captured Karantynnyy Island and
    Maly Vilkhovy Island in the city's southwest. (ISW)
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - The Afghan government reports that a market and a civilian house were hit in yesterday's
    Pakistani airstrikes in Kabul. Hospital sources reports that five people were
    killed and several wounded. (AP)
  - Syrian civil war
  - Four Syrian soldiers are killed and nine others are wounded when a bomb explodes
    on a Ministry of Defence bus in Deir ez-Zor Governorate, Syria. (AP)
  - War on drugs, 2025 US Caribbean naval deployment
  - 2025 United States strikes on Venezuelan boats
  - The United States Navy strikes another alleged drug smuggling boat. Survivors
    have been reported from the attacked boat. (NBC News)
  - Boko Haram insurgency
  - At least eight people are killed in an attack on a security patrol in Zamfara
    State, Nigeria. (ABC News)
  - Libyan crisis
  - Heavy armed clashes break out in Zawiya, Tripolitania, Libya, after the attempted
    assassination of Reserve Force commander Suleiman Al-Fitouri. (Xinhua News Agency)
  - Swiss multinational food and drink corporation Nestlé announces it will cut 16,000
    jobs over the next two years to combat rising commodity costs and business expenses.
    (AP)
  - At least 15 people are killed and eight others are injured when a truck overturns
    in Swat District, Khyber Pakhtunkhwa, Pakistan. (Dawn)
  - 2024 Bangladesh quota reform movement
  - Trial of Sheikh Hasina
  - The prosecution of the International Crimes Tribunal in Bangladesh formally announces
    that it seeks the death penalty against former prime minister Sheikh Hasina and
    former home minister Asaduzzaman Khan over alleged crimes against humanity committed
    during last year's protests. Hasina has been in exile in India since her ousting,
    and Khan is also believed to be in India. (AP)
  - Death and state funeral of Raila Odinga
  - Four people are killed when police open fire to crowd control tens of thousands
    of people mourning opposition leader and former prime minister Raila Odinga, as
    his body arrives at Jomo Kenyatta International Airport in Nairobi, Kenya. (DW)
    (Reuters)
  - 2025 Peruvian protests
  - One person is killed and 100 people are wounded during clashes in Lima, Peru,
    as protestors demands the resignation of President José Jerí. (AP)
  - Former United States National Security Advisor John Bolton is indicted in a federal
    court over mishandling of national security documents. (BBC News)
  - 2025 Malagasy protests, 2025 Malagasy coup d'état
  - After former Malagasy president Andry Rajoelina flees the country after losing
    support of the Armed Forces, CAPSAT commander Michael Randrianirina forms the
    transitional government and is confirmed as the interim president. (DW)
  - The African Union condemns the coup and suspends Madagascar's membership. (Al
    Jazeera)
