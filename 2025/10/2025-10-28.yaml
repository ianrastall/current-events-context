Date: '2025-10-28'
Source_URI: Portal:Current events/2025 October 28
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - Hamas announces that it is postponing the return of the body of a dead hostage,
    citing multiple violations of the ceasefire by Israel. (Reuters)
  - Israeli incursions in the West Bank during the Gaza war
  - Three Al-Qassam Brigades militants are killed by Israeli troops in a shooting–airstrike
    attack in Kfar Qud, near Jenin, in the occupied West Bank. (L'Orient Today) (Reuters)
  - Hamas fires at and launches an anti-tank missile at Israeli troops in Rafah, Gaza,
    killing an Israeli soldier. (The Jerusalem Post) (BBC)
  - At least 104 people are killed, including 46 children, and 50 others are injured
    in multiple Israeli retaliatory airstrikes across Gaza City. (Al Jazeera) (Reuters)
  - Armed conflict for control of the favelas
  - Operation Containment
  - Sixty-four people, including four police officers, are killed in large-scale raids
    on Comando Vermelho spots in Rio de Janeiro, Brazil, making it the deadliest police
    operation in the city's history. At least 81 suspected gang members are arrested
    in the operation. (CNN) (DW)
  - Sudanese civil war
  - Al-Fashir massacre
  - Over 460 people are killed in an attack on a hospital by the Rapid Support Forces
    in Al-Fashir, North Darfur, Sudan. (AP)
  - AI boom, Workplace impact of artificial intelligence
  - Multinational technology and e-commerce company Amazon announces it will lay off
    14,000 corporate positions as it invests more in building AI and cloud computing
    infrastructure. (DW) (CNBC)
  - Economy of the Philippines
  - The Philippine peso falls to a record low of ₱59.2 per U.S. dollar, which the
    country's central bank attributes to currency depreciation influenced by recent
    interest rate cuts and foreign investment outflows. (Bloomberg)
  - 2025 Atlantic hurricane season
  - Hurricane Melissa makes landfall in Westmoreland parish, southwest Jamaica, as
    a Category 5 hurricane with 185 mph sustained winds. (CNN) (NHC)
  - Mombasa Air Safari Flight 203
  - A Mombasa Air Safari-operated Cessna 208 Caravan aircraft carrying foreign tourists
    from Hungary and Germany crashes near Kwale, Kenya, killing all 11 people on board.
    (AP)
  - Eighteen people are killed when a wooden vessel carrying dozens of irregular refugees
    capsizes off the coast of Surman, Libya. (TRT World)
  - 2020–2025 H5N1 outbreak
  - The German government culls 500,000 birds, including chickens, geese, and turkeys,
    as the federal animal health institute reports over 100 outbreaks of H5N1 avian
    influenza, including 30 outbreaks among poultry battery farms across the country.
    (DW)
  - China and the Association of Southeast Asian Nations (ASEAN) sign an upgraded
    free trade agreement, which will broaden collaboration on infrastructure, digital
    and green transition, trade facilitation and people-to-people exchanges between
    the two sides, on the sidelines of the 47th ASEAN summit in Kuala Lumpur, Malaysia.
    (CNA)
  - Assassination of Shinzo Abe
  - The trial of Tetsuya Yamagami, the alleged killer of former Japanese prime minister
    Shinzo Abe, opens in Nara. It is expected to end by mid-December. (AP)
  - Crime in London
  - One person is killed and two others, including a 14-year-old, are injured in a
    mass stabbing in London, England. A 22-year-old Afghan national is arrested. (Sky
    News)
  - Fijian deputy prime minister Biman Prasad says that he intends to resign after
    being charged with corruption. He is the second deputy PM in Sitiveni Rabuka's
    government to be charged since last week. (RNZ)
  - Nigeria's Senate passes the Endangered Species Conservation and Protection Bill,
    introducing fines of up to ₦12 million (US$8,250) and prison sentences of up to
    10 years for wildlife smuggling and strengthening enforcement against illegal
    trade in ivory, pangolin scales, and other endangered species. (Reuters)
  - Conscription in Russia
  - The Russian State Duma approves a bill to change military conscription to a year-round
    process, passing it to the Federation Council for approval. (AP)
  - 2025 Turkish referee betting scandal, Gambling in Turkey
  - The Turkish Football Federation takes disciplinary action against 152 referees
    who were found to have actively placed bets on football matches. At least 371
    of the 571 active referees are found to have a betting account. (ESPN) (NTV in
    Turkish)
