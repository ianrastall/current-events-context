Date: '2025-10-03'
Source_URI: Portal:Current events/2025 October 3
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Donald Trump's September 2025 Gaza Strip proposal
  - Hamas says it has agreed to part of the 20-point plan proposed by U.S. president
    Donald Trump to end the war, including the release of hostages and handing over
    administration of the enclave. (The Hill) (Reuters)
  - United Nations human rights experts warn that multiple portions of the plan contradict
    international law and the ICJ ruling on Israel's occupation of Palestine. (OCHR)
  - Israeli bombing of the Gaza Strip, 2025 Gaza City offensive
  - At least 72 Palestinians are killed from Israeli attacks across the Gaza Strip,
    including 42 killed in Gaza City. (Al Jazeera)
  - Israeli blockade of the Gaza Strip, Gaza genocide, Humanitarian aid during the
    Gaza war
  - The Israeli Navy intercepts and seizes the Polish-flagged Marinette, the last
    vessel of the Global Sumud Flotilla, an international humanitarian flotilla seeking
    to break the Gaza blockade. (Al Jazeera)
  - Somali Civil War
  - 2025 Shabelle offensive
  - With Ugandan support, the Somali National Army and other pro-federal forces reportedly
    recapture two villages from al-Shabaab. Government sources claim that al-Shabaab's
    forces suffered heavy casualties from the fighting. (Somali National News Agency)
  - War on drugs, 2025 US Caribbean naval deployment
  - 2025 United States strikes on Venezuelan boats
  - The United States Navy conducts a strike targeting an alleged drug smuggling boat
    in the Venezuelan coast. According to U.S. defense secretary Pete Hegseth, at
    least four crewmembers were killed in the attack. (Reuters)
  - Boko Haram insurgency
  - More than 5,000 people flee from Borno State, Nigeria, to Cameroon after Boko
    Haram fighters seize the border town of Kirawa and burn multiple buildings. (Reuters)
  - Insurgency in Balochistan
  - Seven terrorists are killed and a huge cache of weapons and ammunition is recovered
    in an operation by security forces in Sherani District, Balochistan, Pakistan.
    (Xinhua News Agency)
  - Russo-Ukrainian war
  - List of journalists killed during the Russo-Ukrainian War
  - French journalist Antoni Lallican is killed and photographer Hryhoriy Ivanchenko
    is injured by a Russian drone strike in Donetsk Oblast, Ukraine. (RFE/RL)
  - Bishop of London Sarah Mullally is announced as the new archbishop of Canterbury,
    becoming the first woman to lead the Church of England and the Anglican Communion.
    (BBC News)
  - Five people are killed after an overcrowded vehicle overturns on NR-165 in Nabari,
    Mie Prefecture, Japan. (Kyodo News)
  - At least three people drown after catastrophic flash floods hit the southern Black
    Sea coast of Bulgaria. (Novinite.com)
  - At least two people are killed and others are injured when an Iranian Red Crescent
    Society rescue helicopter carrying nine people crashes in Lorestan province, Iran.
    (Mehr News Agency)
  - China–India relations, Sino–Indian border dispute
  - Indian airline IndiGo announces it will resume direct flights between Kolkata
    and Guangzhou, China, on October 26, launching the first direct flights between
    the two countries since border skirmishes in 2020. (DW)
  - Capital punishment in Tunisia, Decree Law 54
  - A court in Nabeul, Tunisia, sentences a 56-year-old man to death over online statements
    criticizing President Kais Saied and state security agencies. (Reuters)
  - Trial of Sean Combs
  - A court in Manhattan, New York, United States, sentences musician Sean Combs to
    four years and two months in prison for prostitution-related charges. (BBC News)
  - The Bangkok Criminal Court sentences a Thai man to life in prison for the January
    7 assassination of Cambodian politician Lim Kimya in Bangkok. (AP)
  - A Finnish court dismisses charges against the crew of the Eagle S tanker, ruling
    prosecutors failed to prove intent in the 2024 Estlink 2 incident and that negligence
    must be addressed by the ship's flag state or crew's home countries. (Reuters)
  - A court in Yerevan, Armenia sentences Mikael Ajapahyan, a prominent cleric of
    the Armenian Apostolic Church, to two years in prison for allegedly calling for
    the overthrow of Prime Minister Nikol Pashinyan. (AP)
  - At least two people are killed and five others are injured in a mass shooting
    in Les Moulins near Nice, Alpes-Maritimes, Provence-Alpes-Côte d'Azur, France.
    (Le Figaro) (Times Now)
  - 2025 Czech parliamentary election
  - Czechs vote to elect the members of the Chamber of Deputies. For the first time,
    Czechs living or stationed abroad can vote via mail. (Reuters)
  - 2025 Indonesian protests
  - Indonesia suspends TikTok's registration as an electronic service provider after
    the company fails to submit complete data on its live streaming activity during
    nationwide protests. (Reuters)
  - 2025 Maldivian protests
  - Police violently crack down on and arrest eight people during an overnight protest
    against government corruption in Malé in the Maldives. (AP) (Raajje TV)
  - Abdication of Henri, Grand Duke of Luxembourg
  - Henri, the grand duke of Luxembourg, abdicates and is succeeded by his eldest
    son, Guillaume V. (Financial Times)
  - Lithuanian culture minister Ignotas Adomavičius resigns after one week in office
    amidst protests. (LRT)
