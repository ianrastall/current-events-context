Date: '2025-10-26'
Source_URI: Portal:Current events/2025 October 26
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - 2025 Sumy offensive
  - One person is killed and 13 others are injured, including two seriously, in a
    Russian drone strike on a minibus in Mykolaivka, Sumy Raion, Sumy Oblast, Ukraine.
    (Kyiv Post)
  - Two people are killed, including an elderly woman, and another is injured in a
    Ukrainian drone strike on an apartment building in Russian-controlled Donetsk,
    Donetsk Oblast, Ukraine. (MSN)
  - Sudanese civil war
  - Siege of El Fasher
  - The Rapid Support Forces say that they have captured El Fasher, the last stronghold
    of the Sudanese Armed Forces in North Darfur. (Reuters)
  - Israel–Hezbollah conflict
  - Three people are killed in two Israeli airstrikes in An-Naqoura and Baalbek, Lebanon.
    Separately, an Israeli drone drops a grenade near UNIFIL forces in Kfar Kila,
    without casualties. (Al Jazeera)
  - A man plants an explosive near propane gas cylinders at a gas station in Georgetown,
    Guyana, killing a child and wounding four other people. The attacks is described
    as a terrorist incident, while the perpetrators are unknown. (AP)
  - Patriarch Daniel consecrates the newly-constructed National Cathedral in Bucharest,
    Romania, as the country's largest cathedral with the capacity for 5,000 worshippers
    and the patriarchal seat of the Romanian Orthodox Church. (DW) (Romania Insider)
  - Fourteen people are killed when a fire engulfs dwellings in Bukavu, South Kivu,
    Democratic Republic of the Congo. (Africanews)
  - Thirteen people are killed and five others are injured when a bus crashes in Kano
    State, Nigeria. (The Punch)
  - At least 13 people are killed and 29 others are injured when a bus collides with
    a car and plunges off of a bridge into a stream in Puerto Iguazú, Misiones, Argentina.
    (News.Az) (Xinhua)
  - In separate incidents, an MH-60R Seahawk helicopter and an F/A-18F Super Hornet
    fighter jet of the United States Navy, both operating off of the aircraft carrier,
    crash in the South China Sea. All crew of both craft are rescued. (CNN)
  - Enlargement of ASEAN
  - Accession of Timor-Leste to ASEAN, 2025 ASEAN Summits
  - Timor-Leste becomes the eleventh member state of the Association of Southeast
    Asian Nations. (Antara)
  - Trinidad and Tobago–Venezuela relations, United States–Venezuela relations
  - Venezuelan vice president Delcy Rodríguez issues a statement accusing Trinidad
    and Tobago and the U.S. Central Intelligence Agency of military provocations as
    both countries carry out joint military exercises in the Caribbean Sea. (Reuters)
  - 2025 Cameroonian presidential election
  - Cameroonian opposition presidential candidate Issa Tchiroma says that police have
    detained more than 30 politicians and activists linked to his campaign or who
    endorsed his candidacy against incumbent Paul Biya during last week's election.
    (Reuters)
  - Four protestors are killed and several policemen are injured during clashes in
    Douala, as pro-opposition protestors rejects Biya's re-election. (Al Jazeera)
  - 2025 Louvre robbery
  - Two suspects are arrested in connection to the robbery at the Louvre Museum in
    Paris, France, last week. (Al Jazeera)
  - Kurdistan Workers' Party insurgency
  - 2025 PKK–Turkey peace process
  - The Kurdistan Workers' Party announces that it is withdrawing its fighters from
    Turkey and moving them to Iraq as part of ongoing peace talks with the Turkish
    government. (AP)
  - 2025 Argentine legislative election
  - Argentines vote in the midterms to elect a half of the Chamber of Deputies and
    a third of the Senate. (The New York Times)
  - The ruling La Libertad Avanza party of President Javier Milei wins the election
    with over 40% of the votes. (AP)
  - 2026 Colombian presidential election
  - The Historic Pact party nominates Senator Iván Cepeda as its candidate for president
    in next year's election. (Reuters)
