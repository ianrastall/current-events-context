Date: '2025-10-30'
Source_URI: Portal:Current events/2025 October 30
Intelligence_Payload:
  Uncategorized:
  - Sudanese civil war
  - Siege of El Fasher, War crimes during the Sudanese civil war
  - Al-Fashir massacre
  - Massacres occur in Al-Fashir, North Darfur, Sudan, as Rapid Support Forces overwhelm
    the city and kill civilians for several days, targeting Zaghawa people. (DW)
  - 2025 Afghanistan–Pakistan conflict
  - Following peace talks in Istanbul, Turkey, the governments of Afghanistan and
    Pakistan agree to an extended ceasefire, while Pakistan continues to allege that
    Afghanistan is sheltering militant groups like the Tehreek-e-Taliban. (DW)
  - Israeli–Lebanese conflict
  - Israeli troops enter the southern Lebanese city of Blida and storm the municipal
    hall, killing an employee while sleeping. In response, Lebanese president Joseph
    Aoun orders the military to confront any Israeli incursions. (Reuters)
  - The Sagrada Família church in Barcelona, Spain, becomes the world's tallest church
    at after a part of its central tower was added during construction, surpassing
    the previously-tallest Ulm Minster in Ulm, Baden-Württemberg, Germany. (DW)
  - China–United States relations
  - United States president Donald Trump meets Chinese leader Xi Jinping in Busan,
    South Korea, on the sidelines of the APEC summit in Gyeongju, agreeing to lower
    tariffs on China in return for lower rare earth trade curbs. (CNA)
  - Immigration to the United States
  - The United States government announces it will lower the number of refugees admitted
    to the country from 125,000 to 7,500 starting in 2026, while also prioritizing
    white South Africans. (DW)
  - The Latvian Saeima votes 56–32 to withdraw from the Istanbul Convention treaty,
    which combats violence against women and domestic violence. (Reuters)
  - In the United Kingdom, King Charles III begins the formal process of revoking
    Prince Andrew's royal title due to his dealings with deceased convicted sex offender
    and human trafficker Jeffrey Epstein. (DW) (The New York Times)
  - 2025 Japan Series
  - In baseball, the Fukuoka SoftBank Hawks defeats the Hanshin Tigers in five games
    to win its 12th Japan Series championship. (Mainichi in Japanese)
