Date: '2025-10-22'
Source_URI: Portal:Current events/2025 October 22
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli incursions in the West Bank during the Gaza war
  - According to the Palestinian Prisoner’s Society forty-five people, including former
    prisoners and a child, are arrested during a series of Israeli raids in Nablus,
    Ramallah, Qalqilya and Tulkarem, in the occupied West Bank. They further say that
    homes are vandalized and the arrested are assaulted. (Al Jazeera)
  - Russo-Ukrainian war
  - Kyiv strikes
  - Six people are killed and several others are injured in Russian strikes on power
    plants in Kyiv, Ukraine. (Euronews)
  - Kharkiv strikes
  - One person is killed and six others are injured in Russian drone strikes on a
    kindergarten in Kholodnohirskyi District, Kharkiv, Kharkiv Oblast, Ukraine. (The
    Kyiv Independent)
  - Attacks in Russia during the Russian invasion of Ukraine
  - Three soldiers of the Russian Armed Forces are killed in an operation in Stavropol,
    Stavropol Krai, Russia. (RBC-Ukraine)
  - War on drugs, 2025 United States military strikes against alleged drug traffickers
  - Five people are killed during two separate United States airstrikes against two
    boats in the Pacific Ocean, the first such attacks in the area. The attacks since
    September 2025, previously limited only to the Caribbean Sea, have killed a total
    of 37 people. (Al Jazeera)
  - Terrorism in Serbia
  - A man opens fire outside the Serbian Parliament in Belgrade and sets fire to a
    tent, critically injuring a person, before being arrested. The incident is classified
    as a terrorist attack. (Ansa)
  - 2025 Louvre robbery
  - The Louvre Museum in Paris, France, reopens with increased activity several days
    after jewelry from the Galerie d'Apollon was stolen in a heist. The Galerie d'Apollon,
    however, remains closed. (DW)
  - Imprisoned journalists Andrzej Poczobut of Belarus and Mzia Amaglobeli of Georgia
    are awarded the 2025 Sakharov Prize. (Reuters)
  - 2025 Plastmass Factory explosion
  - At least 12 people are killed, 19 others are injured and 10 are reported missing
    following an explosion at a munitions factory in Kopeysk, Chelyabinsk Oblast,
    Russia. (BBC News)
  - Four people are killed when a Robinson R66 helicopter crashes near Ekalaka, Montana,
    United States. (WIFR-LD) (HuffPost)
  - Forty-six people are killed and others are injured in a collision between two
    buses and other vehicles on the Kampala–Gulu Highway in Uganda. (Al Jazeera)
  - Forty people are killed, including infants, and thirty others are rescued when
    a boat carrying migrants sank off the coast of Mahdia, Mahdia Governorate, Tunisia.
    (Africanews)
  - The Fijian High Court sentences former prime minister Frank Bainimarama to a 12-month
    suspended prison term after being found guilty of making an unwarranted demand
    to a public official under the Crimes Act this month. (RNZ)
  - An opposition politician of the Samagi Jana Balawegaya party is shot and killed
    by an unidentified gunman in Weligama, Sri Lanka, amid an increase of shootings
    in the country, which have left 51 people killed and 56 injured since the beginning
    of the year. (AP)
  - Argentine foreign minister Gerardo Werthein submits his resignation to President
    Javier Milei. (Reuters)
  - Greece's parliament approves a law prohibiting demonstrations around the Tomb
    of the Unknown Soldier in Athens, designating the area for ceremonial use only.
    (Reuters)
  - Thai deputy finance minister Vorapak Tanyawong resigns following his alleged involvement
    in a transnational scam operation. (Reuters)
