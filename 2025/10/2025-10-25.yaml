Date: '2025-10-25'
Source_URI: Portal:Current events/2025 October 25
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war
  - Kyiv strikes, Attacks on civilians in the Russo-Ukrainian war
  - Four people are killed and 20 others are injured in overnight Russian missile
    and drone strikes on residential areas in Kyiv, Ukraine. (Reuters) (AP)
  - Insurgency in Khyber Pakhtunkhwa
  - Five soldiers and 25 gunmen are killed in a shootout between Kurram and North
    Waziristan, in Pakistan, at the border with Afghanistan. (Al Jazeera)
  - Israel–Hezbollah conflict
  - Two people are killed during two Israeli airstrikes against a car and a motorcycle
    in Harouf and Qlayleh, Lebanon, bringing the death toll from the attacks since
    the past 48 hours to nine. (Al Jazeera)
  - 2025 Atlantic hurricane season
  - Hurricane warnings are issued in Jamaica, as forecasts indicate Hurricane Melissa
    will likely reach Category 4 on the Saffir-Simpson scale, while rainfall estimates
    exceed across the country and in Haiti. (CNN)
  - Over 145,000 people are evacuated by Guantánamo Province officials ahead of Hurricane
    Melissa's potential impacts in eastern Cuba. (NBC)
  - Afghanistan–Pakistan relations
  - 2025 Afghanistan–Pakistan conflict
  - Pakistani defence minister Khawaja Asif says that if peace talks with the Taliban
    fail, Pakistan will declare an open war on Afghanistan, as Pakistan accuses the
    Taliban of sheltering Pakistani militants, which Kabul denies. (Reuters)
  - Canada–United States trade relations
  - 2025 United States trade war with Canada and Mexico
  - U.S. president Donald Trump announces that he will raise U.S. tariffs on Canada
    by 10% in retaliation for an anti-tariff advertisement sponsored by the Ontario
    government. (The Guardian)
  - 2025 Irish presidential election
  - Independent candidate Catherine Connolly is declared winner of yesterday's election
    of the President of Ireland, after Fine Gael candidate Heather Humphreys concedes
    the election during the initial tallying of the votes. (Reuters) (The Guardian)
  - 2025 Ivorian presidential election
  - Ivorians vote to elect their president, as incumbent Alassane Ouattara seeks a
    fourth term. (Reuters)
  - Ouattara is re-elected with 89.7% of the vote. (Reuters)
  - The United Nations Convention against Cybercrime, also known as the Hanoi Convention,
    is signed in Hanoi, Vietnam, marking the first time a UN treaty signing ceremony
    took place in Vietnam and the first time a multilateral treaty is named after
    a Vietnamese location. (The Diplomat) (UNODC)
