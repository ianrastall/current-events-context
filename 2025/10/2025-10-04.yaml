Date: '2025-10-04'
Source_URI: Portal:Current events/2025 October 4
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - 2025 Gaza City offensive
  - At least 70 Palestinians are killed in Israeli attacks across the Gaza Strip and
    in Gaza City. (Al Jazeera)
  - Islamic State insurgency in Puntland
  - Puntland counter-terrorism operations
  - Puntland Security Forces kill over ten Islamic State militants and capture another
    in a major operation targeting wells used by ISIS as bases to carry out attacks
    in the Cal Miskaad Mountains in Bari region of Puntland. Three soldiers are killed
    and six others are injured in the operation. (Hiiraan Online)
  - Somali Civil War
  - 2025 Mogadishu prison attack
  - At least seven people are killed and injured and several prisoners escape in an
    attack on a National Intelligence and Security Agency prison by militant group
    Al-Shabaab in Mogadishu, Somalia. The Somali government reports that no civilian
    or security officers were killed, and that all seven attackers were killed. (AP)
    (Hiiraan Online)
  - Russo-Ukrainian war
  - 2025 Sumy offensive
  - One person is killed and at least 30 people are injured in Russian drone strikes
    on two passenger trains at a rail station in Shostka, Sumy Oblast, Ukraine. (The
    Independent)
  - Attacks in Russia during the Russian invasion of Ukraine
  - A Russian Buyan-class corvette is allegedly attacked near Lake Onega, in Karelia,
    Russia. The ship sustains damage to the right side of its power plant compartment.
    (The Kyiv Independent)
  - The Egyptian Ministry of Tourism and Antiquities formally opens the tomb of Amenhotep
    III in the Valley of the Kings to the public after 20 years of renovations following
    its excavation in 1989. (DW) (ANewZ)
  - The Evangelical Lutheran Church in America, the largest Lutheran denomination
    in the United States, installs Reverend Yehiel Curry as its presiding bishop,
    making him the first Black bishop to lead the denomination. Curry succeeds Reverend
    Elizabeth Eaton, the first woman to lead the organization. (AP) (CBS News)
  - Pope Leo XIV attends the oath-taking ceremony for the new batch of Pontifical
    Swiss Guards, becoming the first pope to do so since 1968. (The Catholic Herald)
  - 2025–26 European windstorm season
  - At least two people are killed and another is severely injured in northern France
    as Storm Amy makes landfall. (France 24)
  - A man is killed in Letterkenny, County Donegal, Ireland, and hundreds of thousands
    are without power as Storm Amy brings high winds to the United Kingdom and Ireland.
    (Sky News)
  - 2025 India–Pakistan floods
  - At least ten people are killed and two others are reported missing when heavy
    rainfall triggered multiple landslides in Darjeeling, West Bengal, India. (India
    TV)
  - Islamophobia in the United Kingdom
  - Peacehaven mosque arson
  - A mosque with two people inside is set on fire in a suspected hate crime in Peacehaven,
    East Sussex, England. (CNN)
  - Capital punishment in Iran, Iran–Israel relations
  - Iran executes six prisoners accused and convicted of carrying out attacks inside
    Iran for the Arab Struggle Movement for the Liberation of Ahwaz on behalf of Israel.
    (AP)
  - Lithuania temporarily suspends air traffic at Vilnius Airport after unidentified
    balloons are detected in its airspace. (Reuters)
  - 2024–2025 Georgian protests
  - 2025 Georgian uprising attempt
  - Protestors attempt to storm the Orbeliani Palace and clash with police in Tbilisi,
    Georgia, during the local elections. (Al Jazeera)
  - 2025 Azad Kashmir protests
  - Violent protests that killed at least ten people in Azad Kashmir, Pakistan, end
    as a peace agreement is reached with a civil rights alliance. (MSN)
  - 2025 Czech parliamentary election
  - The second and final day of the election to elect the members of the Czech Chamber
    of Deputies takes place. (TVN24)
  - Former prime minister Andrej Babiš's populist ANO party wins the election with
    about 35% of the vote but falls short of a majority, prompting him to begin coalition
    talks with smaller right-wing parties. (BBC News)
  - 2025 Liberal Democratic Party (Japan) presidential election
  - Sanae Takaichi defeats Shinjiro Koizumi in a runoff election to become the next
    president of the Liberal Democratic Party (LDP) and prime minister-designate.
    She is the first female leader of the LDP and, should she be confirmed by the
    Diet, the first female prime minister of Japan. (Kyodo News)
  - 2025 Malawian general election
  - Peter Mutharika is sworn in for his second non-consecutive term as President of
    Malawi following his victory in last month's national election. (Reuters)
  - 2025 Speedway of Nations
  - In motorcycle speedway, Australia wins the 2025 Speedway of Nations, defeating
    Poland in the grand final at the MotoArena Toruń, BiT City, Kuyavia–Pomerania,
    Poland. (FIM Speedway)
