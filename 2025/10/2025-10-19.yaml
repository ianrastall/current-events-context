Date: '2025-10-19'
Source_URI: Portal:Current events/2025 October 19
Intelligence_Payload:
  Uncategorized:
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - A ceasefire between Afghanistan and Pakistan, mediated by Qatar and Turkey during
    peace talks in Doha, comes in to effect. (Al Jazeera)
  - Gaza war
  - Gaza peace plan
  - Palestinian militants are accused by Israel of attacking Israeli forces at ceasefire
    boundaries, killing two soldiers. (The New York Times) (The Jerusalem Post)
  - At least 44 Palestinians are killed in Israeli airstrikes on the Gaza Strip, with
    severe attacks carried out in Khan Yunis and Rafah. The Israel Defense Forces
    and Hamas accuse each other of breaching the ceasefire. (Al Jazeera) (BBC News)
  - Mahmoud Talal Abdullah, a Palestinian detainee from the refugee camp in Jenin,
    occupied West Bank, dies in Israeli custody at the Shamir Medical Center in Be'er
    Ya'akov. (Wafa) (The New Arab)
  - 2025 Pacific typhoon season
  - Five people are killed and two others are missing as Tropical Storm Fengshen makes
    landfall in the Philippines, causing a landslide in Mindanao and heavy flooding
    in Luzon. (Al Jazeera)
  - Colombia–United States relations
  - U.S. president Donald Trump says that the United States will stop payments and
    subsidies in aid to Colombia, citing "alleged drug trafficking endorsed by its
    government." (AP)
  - 2025 Louvre robbery
  - Thieves steal part of the French Crown Jewels from the Louvre Museum in Paris,
    France, before fleeing on motorbikes. Police have been unable to locate them.
    The stolen Crown of Empress Eugénie is later recovered, although it was damaged.
    (BBC News)
  - Capital punishment in Iran, Iran–Israel relations
  - The Iranian government executes a person convicted of allegedly spying for Israeli
    intelligence agency Mossad in Qom. (AP)
  - 2025 Bolivian general election
  - Centrist candidate Rodrigo Paz Pereira of the Christian Democratic Party defeats
    independent right-wing candidate and former president Jorge Quiroga to win the
    presidential election, ending 20 years of Movimiento al Socialismo rule. (AP)
    (Reuters) (The Guardian)
  - 2025 Kuomintang chairmanship election, Cross-strait relations
  - The Taiwanese opposition party Kuomintang elects Cheng Li-wun as the new party
    chairwoman, who is known for her advocacy of closer ties and peace with China.
    (Al Jazeera)
  - 2025 Northern Cypriot presidential election
  - Citizens of the breakaway territory of Northern Cyprus vote between incumbent
    Ersin Tatar and Tufan Erhürman to serve as President. (Famagusta-Gazette)
  - Erhürman wins the election with 62.76% of the vote, against Tatar, who received
    35.81% of the vote. (AP)
  - 2025 North Macedonian local elections
  - Citizens of North Macedonia vote to elect new mayors and cabinets for the country's
    80 municipalities. (Sloboden Pecat)
  - Thousands of Haredi Jews gather around the Israeli consulate in New York City,
    United States, to protest against the potential conscription of yeshiva students
    to the Israel Defence Forces, which has been exempt since 1977. (AP)
  - 2025 FIFA U-20 World Cup
  - In association football, Morocco wins its first U-20 World Cup after defeating
    Argentina 2–0 in the final. (Reuters)
