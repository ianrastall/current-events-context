Date: '2025-10-10'
Source_URI: Portal:Current events/2025 October 10
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war peace plan
  - A ceasefire between Israel and Hamas comes into effect hours after the approval
    of the ceasefire agreement by the Israeli war cabinet. The Israel Defense Forces
    complete their withdrawal to the agreed-upon lines within Gaza. (AP)
  - Sudanese civil war
  - Siege of El Fasher
  - The United Nations human rights chief says three days of attacks in and near a
    displaced persons camp in Al-Fashir, North Darfur, Sudan, has killed at least
    53 civilians. (The Canadian Press)
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - Two unnamed high-ranking Pakistani Taliban leaders are confirmed killed in yesterday's
    Pakistani airstrikes in Kabul, Afghanistan. (Radio Free Europe)
  - Insurgency in Khyber Pakhtunkhwa
  - All the 30 surviving Pakistani Taliban insurgents involved in the attack in Orakzai
    District, Khyber Pakhtunkhwa, Pakistan, on Tuesday that killed 30 people, including
    eleven security personnel, are killed in a retribution operation. (Dawn)
  - At least eleven Pakistani soldiers are killed in an attack on a military post
    by the Pakistani Taliban in Tirah, Khyber Pakhtunkhwa. (Reuters)
  - At least seven police officers and six militants are killed and 13 others are
    injured in an attack on a police training center in Ratta Kulachi, Dera Ismail
    Khan, Khyber Pakhtunkhwa. (The Independent) (Dawn)
  - Israel–Hezbollah conflict (2023–present)
  - The Lebanese government announces the arrest of a network affiliated to Israel
    which attempted to carry out assassinations and bombing attacks, mainly during
    a commemoration ceremony for the assassinated Hezbollah leader Hassan Nasrallah.
    (Al Jazeera)
  - 2025 Davao Oriental earthquakes
  - A doublet earthquake, consisting of two events measuring and 6.7–6.8, strikes
    Manay, Davao Oriental, Philippines, killing eight people and injuring more than
    400. (Philippine Daily Inquirer)
  - The United States Pacific Tsunami Warning Center raises a tsunami alert for the
    Philippines, Indonesia, and Palau for more than two hours. Local authorities record
    "minor tsunamis" in Talaud Islands, North Sulawesi, Indonesia, and an inch-long
    wave in Tandag, Surigao del Sur, Philippines. (BBC News)
  - 2025 Accurate Energetic Systems explosion
  - At least 16 people are killed and multiple others are injured after an explosion
    at a manufacturing plant in Hickman County, Tennessee, United States. (WKRN-TV)
    (CNN) (WBIR-TV)
  - At least 28 people are killed in floods and landslides in central and southeastern
    Mexico. Roads and homes are destroyed. (AP)
  - Biggest crypto liquidation event in history
  - More than $19 billion of crypto leverage was liquidated in roughly a day. (Coinglass)
  - Senegalese health authorities confirm 17 deaths in a major outbreak of Rift Valley
    fever that began on September 21. (Africanews)
  - Afghanistan–Pakistan relations
  - 2025 Pakistani airstrikes in Afghanistan
  - Afghanistan spokesperson Zabihullah Mujahid says Pakistan launched an airstrike
    in the country's eastern Paktia Province, while the Pakistani government says
    the Pakistani Taliban was allowed to use Afghanistan as a base for attacks against
    Pakistan. (AP)
  - Afghanistan–India relations
  - Indian foreign minister S. Jaishankar announces the country will reopen its embassy
    in Kabul, Afghanistan, after it was shut down four years ago during the fall of
    Kabul. (DW)
  - Qatar–United States relations
  - US secretary of defense Pete Hegseth announces an agreement with Qatar to build
    a new Qatar Emiri Air Force facility at the Mountain Home Air Force Base in Elmore
    County, Idaho, that will host QEAF F-15QA fighter jets and pilots. (TIME) (CBS
    News)
  - International Criminal Court investigation in the Philippines
  - Arrest of Rodrigo Duterte
  - The International Criminal Court rejects a request from former Philippine president
    Rodrigo Duterte to be released from detention, citing flight risk and witness
    tampering concerns. (AP)
  - 2025 Tehreek-e-Labbaik Pakistan protests
  - One person is killed and 22 others are injured during a Tehreek-e-Labbaik Pakistan
    protest in Lahore, Punjab. (Dawn)
  - 2025 Nobel Prizes
  - 2025 Nobel Peace Prize
  - Venezuelan activist María Corina Machado is awarded the Nobel Peace Prize for
    her promotion of democratic rights in Venezuela. (CNN) (Nobel Peace Prize)
  - Impeachment of Dina Boluarte
  - Following a vote of 124–0, the Peruvian Congress removes President Dina Boluarte
    from power after she fails to appear for a required defense in Congress regarding
    her government's inability to lower crime. (AP)
  - Congress president José Jerí is sworn in as the interim president following Boluarte's
    removal from power. (DW)
  - 2024–2025 French political crisis
  - French president Emmanuel Macron re-appoints Sébastien Lecornu as Prime Minister,
    four days after Lecornu resigned. (France 24)
  - Politics of Japan
  - Komeito announces their exit from the Japanese ruling coalition with the Liberal
    Democratic Party. (Reuters)
