    a poor performance during the election. (Politico)
  - 2025 Tanzanian general election
  - Tanzanians vote to elect a president, members of the National Assembly, and ward
    councillors. Incumbent president Samia Suluhu Hassan runs unopposed after the
    High Court barred main opposition leaders from participating in the elections.
    (The Washington Post)
  - 2025 Tanzanian election protests
  - Protests and riots erupts in Dar es Salaam over electoral reforms and demands
    for free political activity, with demonstrators setting fire to vehicles and damaging
    public infrastructure. Tanzanian police use tear gas to break up the protests
    and impose a curfew. Internet connectivity is disrupted shortly after. (AP) (The
    Guardian) (Reuters)
