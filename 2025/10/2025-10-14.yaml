Date: '2025-10-14'
Source_URI: Portal:Current events/2025 October 14
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - Hamas hands the remains of three more dead hostages over to the Red Cross following
    the release of four bodies on Monday. Twenty-one bodies of hostages remain in
    Gaza. A fourth body was found not to be a hostage. (BBC News) (The Times)
  - Israeli forensic teams identify the four dead hostages returned on Monday as three
    Israelis and a Nepalese citizen, all of whom were kidnapped during the October
    7 attacks. (The New York Times) (BBC News)
  - In response to the limited release of bodies on Monday, Israel notifies the United
    Nations it will not open the Rafah crossing and only allow 300 aid trucks to enter
    the Gaza Strip daily, instead of the 600 agreed to in the ceasefire agreement.
    (Reuters) (The Times of Israel)
  - Israeli troops kill nine Palestinians in Gaza, saying those killed violated the
    IDF's withdrawal line as established by the peace agreement. (Al Jazeera) (The
    Times) (Reuters)
  - War on drugs, 2025 US Caribbean naval deployment
  - 2025 United States strikes on Venezuelan boats
  - The United States Navy carries out an airstrike on an alleged drug boat near the
    coast of Venezuela. U.S. president Donald Trump announces that at least six people
    were killed by the attack. (AP)
  - Herder–farmer conflicts in Nigeria
  - At least 13 people are killed and others are injured in attacks by suspected herders
    on two villages in Plateau State, Nigeria. (Xinhua News Agency)
  - Ecuadorian conflict
  - At least one person is killed and several others are injured in a car bomb explosion
    near a shopping mall in Guayaquil, Ecuador. (BNO News)
  - M23 campaign
  - The Congolese government and the Rwanda-backed M23 rebels sign an agreement in
    Doha, Qatar, to formally establish an oversight body to work towards a permanent
    ceasefire, which will include representatives from the two groups and the other
    members of the International Conference on the Great Lakes Region. (Reuters) (AP)
  - China–United States trade war, China–South Korea relations
  - The Chinese commerce ministry issues sanctions on and bans Chinese companies from
    dealing with five subsidiaries of South Korean shipbuilding company Hanwha Ocean,
    which has shipyards and investments in the United States and maintains contracts
    with the U.S. Navy. (AP) (The Wall Street Journal)
  - The European Union fines luxury brands Gucci, Chloé, and Loewe over 157 million
    (US$182.5 million) for violating EU competition laws through price fixing. (DW)
    (The Fashion Law)
  - 2025 Dhaka garment factory fire
  - At least 16 people are killed and several injured in a fire at a garment factory
    in Dhaka, Bangladesh. (Reuters)
  - October 2025 Mexico floods and landslides
  - The death toll from the past week's torrential rain-related flooding across five
    states in eastern Mexico, especially in Hidalgo and Veracruz, increases to 64,
    with 257 others still missing. At least 100,000 homes, 59 medical facilities,
    and 308 schools across the region are damaged by water and oil from the Gulf of
    Mexico. (NPR) (Milenio in Spanish)
  - Twenty people are killed and 16 others are injured when a bus catches fire in
    Rajasthan, India. Prime Minister Narendra Modi announces compensation payments
    of ₹200,000 (US$2,200) to the deceased's families and ₹50,000 ($569) to those
    injured. (AP) (DW) (The Hindu)
  - France–Iran relations
  - The Iranian government detains and imprisons two unnamed French nationals for
    alleged espionage on behalf of French and Israeli intelligence agencies. (DW)
    (TRT World)
  - 2025 Castel d'Azzano explosion
  - Three carabinieri are killed and 25 other people are injured in an intentional
    explosion during the attempted eviction of a farmhouse in Castel d'Azzano, Province
    of Verona, Veneto, Italy. A woman and her two brothers, all in their 60s, are
    arrested. (AP) (Rai News)
  - 2025 Malagasy protests, 2025 Malagasy coup d'état
  - Malagasy president Andry Rajoelina issues a decree dissolving the National Assembly
    one day after fleeing to an unknown location, alleging fear for his life following
    a military coup. (AP)
  - The National Assembly refuses to comply with Rajoelina's decree and votes to impeach
    him, as the military says that they have now seized power. (Reuters)
  - The Malagasy military formally announces it is "taking power" with a military
    council after the ousting of President Rajoelina. (Le Monde)
  - 2025 Nauruan parliamentary election
  - Incumbent Nauruan president David Adeang is unanimously re-elected by the parliament
    following Saturday's election. (RNZ)
  - Federal police fire tear gas and water cannon at over 80,000 demonstrators in
    Brussels, Belgium, protesting against Prime Minister Bart De Wever's proposed
    austerity laws which would cut pensions, unemployment benefits, and healthcare
    systems in an attempt to lower national debt. (AP)
  - President of Peru José Jerí appoints as the new Prime Minister. (Reuters)
  - Microsoft ends support for Windows 10 a decade after its release, despite 41%
    of Windows users still running this version of the operating system. (Microsoft)
    (CNET)
