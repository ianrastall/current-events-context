  Uncategorized:
  - Afghanistan–Pakistan clashes
  - 2025 Afghanistan–Pakistan conflict
  - Following Pakistani airstrikes in Afghanistan in Kabul and Paktika on October
    9th, the Afghan Armed Forces launches attacks on several border posts of Pakistan
    along the Durand Line and seizes several posts. (The Guardian)
  - Pakistan responds with retaliatory strikes, gunfire and ground raids on Afghan
    posts along the border. (The Guardian)
  - Israeli–Lebanese conflict
  - One person is killed, seven others are injured, dozens of bulldozers are destroyed,
    and a key route connecting Beirut to Lebanon's south is severed in Israeli attacks
    in Msayleh, An-Najjariyah, Lebanon. (Al Jazeera) (Naharnetnet)
  - Russo-Ukrainian war
  - At least two people are killed and four others are injured, including one critically,
    in a Russian strike on a church in Kostiantynivka, Donetsk Oblast, Ukraine. (Ukrainska
    Pravda)
  - Two Hamas members are killed by the Doghmush clan in an ambush in Gaza City, Palestine.
    A clan member is killed and 30 arrested in retaliation. (BBC News)
  - Fifteen people are killed after A boat capsized on Lake Volta, Ghana. (TRT Afrika)
  - Mass shootings in the United States
  - 2025 Leland shooting
  - Six people are killed and 14 others are injured after an individual opens fire
    at the Leland High School homecoming gathering on a main street in Leland, Mississippi,
    United States. No suspect has been taken into custody. (The Guardian)
  - British musician Ian Watkins of the band Lostprophets is killed in HM Prison Wakefield
    in West Yorkshire, England, where he was imprisoned for sexual crimes against
    children and animals. Two men are arrested on suspicion of the murder. (BBC News)
  - Helena Moreno is elected Mayor of New Orleans. (CNN)
  - 2025 ATP Tour
  - In tennis, world 206th-ranked Monégasque player Valentin Vacherot defeats Novak
    Djokovic in the Shanghai Masters semi-final, becoming the lowest-ranked finalist
    in Masters 1000 history and the first finalist ranked lower than 200th. He also
    becomes the first Monégasque to defeat a top 10 player and is set to play his
    cousin Arthur Rinderknech in the final. (ATP Tour) (The Guardian)
