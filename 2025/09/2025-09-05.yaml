Date: '2025-09-05'
Source_URI: Portal:Current events/2025 September 5
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Gaza war hostage crisis
  - Hamas releases a video showing a speech by two Israeli hostages in Gaza kidnapped
    during the Nova music festival massacre in 2023. (Reuters) (The Jerusalem Post)
  - Kivu conflict
  - M23 campaign
  - The United Nations Human Rights Office reports that M23 rebels, the Congolese
    armed forces, and other groups in eastern Democratic Republic of the Congo have
    committed serious abuses, including killings, torture, sexual violence, and child
    recruitment, some of which may constitute war crimes and crimes against humanity.
    (Reuters)
  - War on drugs, United States–Venezuela relations
  - The Trump administration deploys ten F-35 fighter jets to Puerto Rico to take
    part in military action against drug cartels in Venezuela and Latin America. (The
    Guardian)
  - Venezuelan Air Force F-16 fighter jets fly over the USS Jason Dunham in international
    waters for a second time in 24 hours as tensions mount between the United States
    and Venezuela. (CBS News)
  - Venezuelan president Nicolás Maduro accuses the U.S. of seeking a regime change
    in Venezuela under the guise of combating cartels. (Reuters)
  - Caribbean Airlines halts all flights between Trinidad and Tobago and Venezuela
    for the entire month of September due to the military situation in the region.
    (Guyana Times)
  - Anglophone Crisis
  - A roadside bomb kills seven Cameroonian soldiers in the Southwest Region. An English-speaking
    separatist group claims responsibility for the bombing. (ABC News)
  - Boko Haram insurgency
  - At least 63 people are killed, including seven soldiers, and others are reported
    missing in attacks by Boko Haram jihadists in Darul Jamal, Borno State, Nigeria.
    (Reuters)
  - Kidnapping in Nigeria
  - Eight security officials are killed, four others are seriously injured, and five
    Chinese workers are kidnapped, with four rescued afterwards, in an attack on a
    Nigeria Security and Civil Defence Corps convoy in Edo State, Nigeria. (Reuters)
  - Terrorism in India
  - Lashkar-e-Jihadi warns police that multiple terrorist attacks involving 34 explosive-laden
    vehicles and 14 terrorists are being planned for the Ganesh Chaturthi finale on
    Saturday in Mumbai, Maharashtra, India, causing security to be tightened. (The
    Times of India)
  - A bus carrying tourists plunges down a hill in Uva Province, Sri Lanka, killing
    at least 15 people and injuring 15 others. (Indian Express)
  - Eleven people are reported missing, including children and an infant, and three
    others are rescued when a hippopotamus capsizes a boat on the Sassandra River
    near Buyo in Ivory Coast. (CBS News)
  - A man is killed in a shark attack off Long Reef beach in New South Wales, Australia.
    The species of shark is currently unknown but it is believed to be a large shark
    due to the injuries recorded. (The Guardian)
  - 2023–2025 mpox epidemic
  - World Health Organization director-general Tedros Adhanom Ghebreyesus declares
    that mpox is no longer a public health emergency of international concern, citing
    a consistent decline in cases in Africa. (Reuters)
  - Portugal records its hottest and driest summer since measurements began in 1931,
    with an average maximum temperature of and only 24% of normal rainfall, conditions
    that contributed to recent wildfires. (AFP via NDTV)
  - China–Pakistan relations, China–Pakistan Economic Corridor
  - During a state visit to Beijing, Pakistani prime minister Shehbaz Sharif announces
    new US$8.5 billion investment agreements with China, including $7 billion in a
    memorandum of understanding and $1.5 billion in joint ventures between the two
    countries. (AP)
  - Finland–Latvia relations, Belarus–European Union border crisis
  - Finland accepts Latvia's request to deploy border guards at the Belarus–Latvia
    border to help manage increased migration from Belarus, with Estonia and Lithuania
    also providing support. (Reuters)
  - Finland–Palestine relations, Diplomatic impact of the Gaza war
  - Finland joins the New York Declaration calling for the end of the Gaza war and
    advancing a two-state solution to the Israeli–Palestinian conflict. (Reuters)
  - The European Commission fines Google 2.95 billion (US$3.47 billion) for allegedly
    abusing its position as the leading search engine to commit anti-trust violations
    in the advertising technology space. (DW)
  - A Swedish district court acquits former national security adviser Henrik Landerholm
    of severe negligence after he left classified documents in an unlocked hotel safe,
    ruling that his actions did not meet the threshold required for conviction. (Reuters)
  - 2025 British cabinet reshuffle
  - Angela Rayner resigns as Deputy Prime Minister of the United Kingdom and leaves
    her other government posts amid a scandal over a tax underpayment on a property
    she owns in Hove, East Sussex. (Sky News)
  - Prime Minister Keir Starmer conducts a cabinet reshuffle and appoints foreign
    secretary David Lammy as the new deputy PM and Secretary of State for Justice
    Shabana Mahmood as the new home secretary. (BBC News)
  - 2025 Georgian local elections
  - Georgian president Mikheil Kavelashvili pardons opposition politicians Mamuka
    Khazaradze and Badri Japaridze, allowing them to run in the upcoming elections
    after serving prison sentences for refusing to testify before parliament. (Reuters)
  - 2025 Samoan general election
  - Official results show that the FAST party led by Laʻauli Leuatea Schmidt wins
    the election by a landslide, securing 30 out of the 50 Legislative Assembly seats.
    (Al Jazeera) (The New Zealand Herald)
  - 2025 Thai political crisis
  - The House of Representatives of Thailand elects Anutin Charnvirakul, leader of
    the conservative opposition Bhumjaithai Party, as the country's prime minister,
    replacing Paetongtarn Shinawatra. (Al Jazeera)
  - Executive orders in the second Trump presidency
  - U.S. president Donald Trump signs an executive order unofficially renaming the
    Department of Defense to the Department of War. (BBC News)
  - AI boom
  - European High-Performance Computing Joint Undertaking
  - The Jupiter supercomputer, capable of at least one quintillion calculations per
    second with 24,000 Nvidia chips, is inaugurated in Jülich, North Rhine-Westphalia,
    Germany, marking Europe's first system considered internationally competitive
    in training artificial intelligence models. On a partial system test, Jupiter
    has achieved a preliminary 793.4 Petaflop/s, placing it 4th in the Top 500 behind
    El Capitan, Frontier, and Aurora at the US Department of Energy. (AFP via France
    24) (Top 500)
