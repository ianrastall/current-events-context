Date: '2025-09-15'
Source_URI: Portal:Current events/2025 September 15
Intelligence_Payload:
  Uncategorized:
  - War on drugs
  - 2025 US Caribbean naval deployment
  - United States president Donald Trump claims that the U.S. military carried out
    a strike on an alleged Venezuelan drug cartel vessel in international waters,
    killing three people, making it the second such strike carried out against a suspected
    drug boat in September. (Reuters)
  - War in the Sahel
  - Boko Haram insurgency
  - Nigerian troops kill at least eleven ISWAP fighters in two operations in the Adamawa
    and Borno states. (Reuters)
  - Haitian conflict
  - Armed gangs attack an armored vehicle in Kenscoff, Haiti, killing the driver and
    injuring two police officers on board. (AP)
  - Mexico–United States relations
  - The U.S. Department of Transportation orders Mexican flag carrier Aeroméxico and
    U.S. major carrier Delta Air Lines to end their joint venture by January 1, 2026,
    citing anti-competitive effects on Mexico–U.S. routes. (Reuters)
  - Australian bank ANZ agrees to pay AU$240 million (US$160 million) in penalties,
    the largest ever imposed by the Securities and Investments Commission, for misconduct
    including irregularities in a government bond deal and failures affecting its
    customers. (Reuters)
  - Sudanese refugee crisis
  - At least 50 people are killed after a boat carrying Sudanese refugees catches
    fire off the coast of Libya, with 24 survivors receiving medical assistance. (Reuters)
  - Four people are killed and nine others injured after a bus collides with a truck
    in Uttar Pradesh, India. (The Times of India)
  - Israel–United Kingdom relations
  - United Kingdom and the Gaza war
  - The British defence ministry bans Israelis from attending the Royal College of
    Defence Studies over Israel's decision to fully invade Gaza City. (Reuters)
  - South Korea–United States relations
  - 2025 Georgia Hyundai plant immigration raid
  - South Korea announces it will launch a formal investigation into human rights
    abuses by U.S. federal personnel during the raid at a Hyundai factory in Georgia
    earlier this month. (DW)
  - Colombia–United States relations, Colombian conflict
  - The United States adds Colombia to its list of countries failing to meet international
    counter-narcotics obligations for the first time since 1997, citing increased
    cocaine production. (AFP via France 24)
  - Flood control projects controversy in the Philippines
  - Philippine president Bongbong Marcos appoints former Supreme Court associate justice
    Andres Reyes Jr. as the chairperson of the newly established Independent Commission
    for Infrastructure to investigate corruption in flood control projects. (Rappler)
  - Violations of non-combatant airspaces during the Russian invasion of Ukraine
  - Poland detains a Belarusian woman and a Ukrainian man after a drone flew over
    the Presidential Palace in Warsaw and was neutralized by the State Protection
    Service. (AP)
  - India's Supreme Court clears the Vantara wildlife rescue centre, run by the Reliance
    Foundation, of allegations of illegal animal acquisition and mistreatment after
    a court-appointed investigation found no such violations. (Reuters)
  - Recorder of London Mark Lucraft sentences English couple Constance Marten and
    Mark Gordon to 14 years in prison each for the manslaughter of their newborn daughter.
    (CBS News)
  - 2025 deployment of federal forces in the United States
  - U.S. president Donald Trump orders the deployment of the Army National Guard to
    Memphis, Tennessee, to "combat crimes". (The Independent)
  - 2025 Tanzanian general election
  - Tanzania's electoral commission disqualifies ACT-Wazalendo candidate Luhaga Mpina
    from the upcoming presidential election for a second time, reversing its earlier
    approval on September 13. (Reuters)
  - Belarusian opposition politician Mikola Statkevich, released last week as part
    of a prisoner deal, is returned to a penal colony in Hlybokaye, Vitebsk region,
    after refusing deportation to Lithuania. (Reuters)
  - Chad's National Assembly approves constitutional amendments extending presidential
    terms from five to seven years and removing term limits, with a final Senate vote
    scheduled for October 13. (Reuters)
  - 2025 World Athletics Championships
  - 2025 World Athletics Championships – Men's pole vault
  - Swedish–American pole vaulter Armand Duplantis breaks his own world record of
    6.29 meters set in 2025 by jumping 6.30 meters, winning him the gold medal at
    the World Athletics Championships. (International Olympic Committee)
  - 2025 Women's Rugby World Cup
  - In rugby union, France's Axelle Berthoumieu receives a 12-match suspension for
    biting Ireland's Aoife Wafer during their Women's Rugby World Cup quarterfinal,
    while teammate Manaé Feleu is banned for three matches for a dangerous tackle.
    (CNN)
