Date: '2025-09-01'
Source_URI: Portal:Current events/2025 September 1
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli blockade of the Gaza Strip, Gaza Strip famine, Gaza genocide
  - The International Association of Genocide Scholars, an international non-partisan
    research organization on genocide and crimes against humanity, declares that Israel
    is committing genocide in Gaza. (IAGS) (BBC News) (Reuters)
  - At least four South Sudanese soldiers and ten militia members are killed in clashes
    near Nasir, Upper Nile, an area where earlier violence led to the detention of
    First Vice President Riek Machar. (Reuters)
  - Economy of New Zealand
  - New Zealand prime minister Christopher Luxon announces that holders of investor
    residence visas may buy or build a single home valued above , following changes
    to the visa rules previously preventing such investments. (Reuters)
  - Economy of South Korea
  - The South Korean trade ministry reports that semiconductor exports reached a record
    ₩21 trillion (US$15 billion) in August, up nearly one-third from last year, contributing
    to total monthly exports of ₩81 trillion ($58.4 billion). (AFP via Barron's)
  - 2025 Afghanistan earthquake
  - The toll from yesterday's earthquake in Jalalabad, Nangarhar province, Afghanistan,
    increases to at least 1,100 people killed and 3,500 others injured. (BNO News)
    (Reuters)
  - An EastIndo passenger MBB/Kawasaki BK 117 helicopter goes missing with eight people
    on board in the Tanah Bumbu Regency, Indonesia. (ASN)
  - Five people are killed when a Gilgit-Baltistan government helicopter crashes in
    Thor Valley, Chilas, Diamer District, Gilgit-Baltistan, Pakistan. (Dawn)
  - Australia–Nauru relations
  - Australian prime minister Anthony Albanese announces that Australia will pay Nauru
    to accept foreign-born criminals who are expelled from Australia following the
    signing of a memorandum by Nauruan president David Adeang. (AP)
  - North Korea–South Korea relations
  - The South Korean defense ministry announces that it has suspended the "Voice of
    Freedom" military radio broadcast to North Korea for the first time in 15 years
    as part of measures to reduce tensions between the two countries. (Reuters)
  - August 2025 Indonesian protests
  - The Commission for Missing Persons and Victims of Violence reports that 20 people
    are missing across Bandung and Depok, West Java, and the Jakarta metropolitan
    area, Indonesia, following the protests. (AFP via France 24)
  - Police storm into the campuses of Universitas Pasundan and Universitas Islam Bandung
    in West Java, firing tear gas at protesters. (IDN Times)
  - Indonesia–Peru relations
  - An Indonesian diplomat attached to the embassy in Lima, Peru, is shot dead by
    an unknown assailant. The Peruvian foreign ministry opens an investigation into
    the shooting as the country sees a rise in extortion and homicide. (AP)
  - LGBTQ rights in Burkina Faso
  - Burkina Faso passes a law criminalizing homosexuality, providing sentences of
    between two and five years in prison as well as fines. (France 24)
  - An Argentine federal judge bars media outlets from publishing audio recordings
    made inside the presidential palace, which reportedly include conversations involving
    President Javier Milei's sister and chief of staff, Karina Milei, amid ongoing
    corruption allegations against the government. (Reuters)
  - A Finnish court sentences Biafran activist Simon Ekpa to six years in prison for
    incitement, tax fraud, and terrorism, among other charges. (AP)
  - 2026 Beninese presidential election
  - Benin's ruling coalition, composed of the Progressive Union Renewal and the Republican
    Bloc, nominates finance minister Romuald Wadagni as their presidential candidate
    in the upcoming election. (Reuters)
  - 2025 Guyanese general election
  - Guyana votes to elect a new National Assembly and president, with polls favouring
    a second term for incumbent Irfaan Ali of the PPP/C. (The Guardian)
  - Flood control projects controversy in the Philippines
  - The Philippine Senate Blue Ribbon Committee orders the arrest of two contractors
    who failed to attend hearings on alleged corruption in flood control projects,
    as part of its probe into incomplete or substandard works awarded under President
    Bongbong Marcos's infrastructure program. (Gulf News)
  - Ghanaian president John Mahama removes Chief Justice Gertrude Torkornoo from office
    following a committee report recommending her dismissal for misconduct, which
    Torkornoo denies. (Reuters)
