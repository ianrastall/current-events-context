Date: '2025-09-25'
Source_URI: Portal:Current events/2025 September 25
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli blockade of the Gaza Strip
  - The Italian and Spanish navies deploy frigates to assist and protect the Global
    Sumud Flotilla on its way to attempt to break the Israeli blockade of the Gaza
    Strip after it was allegedly attacked by Israeli drones off the coast of Greece.
    (AP) (Reuters)
  - Israeli bombing of the Gaza Strip
  - At least 57 Palestinians, including 10 children and three women, are killed by
    Israeli airstrikes across the Gaza Strip. (AP) (Al Jazeera)
  - Israeli incursions in the West Bank during the Gaza war
  - Two Palestinian Islamic Jihad militants are shot and killed by Israeli soldiers
    during the siege of a house in Tammun in the occupied West Bank. (Al Jazeera)
  - Red Sea crisis
  - September 2025 Israeli attacks in Yemen
  - In response to a drone attack the previous day that injured 50 Israeli civilians,
    the Israeli Air Force bombs Houthi targets in the Yemeni capital city of Sanaa.
    (Al Monitor)
  - The Houthis launch a ballistic missile at central Israel, which is intercepted.
    (The Times of Israel) (YNet)
  - Tattooing in South Korea
  - South Korea's National Assembly passes a law legalizing tattoo artistry by licensed
    non-medical professionals for the first time since a 1992 court ruling restricted
    the practice to doctors. (BBC News)
  - China–United States relations, China–United States trade war
  - China lists six American companies on its Unreliable Entities List, including
    several in the underwater drone and satellite sectors. (AP)
  - Ethiopia–Russia relations
  - Ethiopia and Russia sign an agreement on the construction of a nuclear power plant
    for Ethiopian Electric Power by Rosatom. (AA)
  - Six people are killed after a bus collides with a truck head-on in Sundergarh,
    Odisha, India. (The Hans India)
  - Decomposed bodies of five suspected migrants are discovered in the Great Sand
    Sea south of Tobruk, Libya. (AP)
  - Foreign relations of the Netherlands, Foreign relations of Uganda
  - The Netherlands and Uganda sign an agreement to establish a pilot transit hub
    in Uganda for rejected asylum seekers from nearby countries who cannot be directly
    returned from the Netherlands. (Reuters)
  - France–Iran relations
  - France withdraws its case at the International Court of Justice accusing Iran
    of denying consular protection to two French citizens detained at Evin Prison
    in Tehran for more than three years. (Reuters)
  - France–Mali relations, French military withdrawal from West Africa
  - The Malian junta declares an end to joint counterterrorism operations with the
    French military and expels five French embassy workers from the country, declaring
    them personae non gratae. (AP)
  - Israel–Slovenia relations, International Criminal Court arrest warrants for Israeli
    leaders
  - The Slovenian government formally bans Israeli prime minister Benjamin Netanyahu
    from entering the country, linking the ban to the International Criminal Court
    arrest warrant out for Netanyahu. (AP)
  - Moldova–Poland relations
  - Poland bars Moldovan politician Irina Vlah from entering its territory for five
    years for allegedly assisting Russian interference in Moldova's upcoming parliamentary
    election. (Reuters)
  - 2025 Malagasy protests
  - Unrest erupts in Antananarivo, Madagascar, following power and water cuts in the
    capital city. Security forces impose an evening curfew. (AP)
  - Alleged Libyan financing in the 2007 French presidential election
  - Former French president Nicolas Sarkozy is sentenced to 5 years in prison for
    criminal association, becoming the first former French president to be sentenced
    to prison. His former interior ministers Brice Hortefeux and Claude Guéant are
    sentenced to two years and six years of house arrest under electronic tagging
    respectively, due to a French law allowing prison sentences equal or inferior
    to 2 years to be converted in another sentences, and to Guéant's health issues.
    (BBC News) (France 24)
  - Ecuadorian security crisis
  - At least 17 people are killed in a prison riot in Esmeraldas, Ecuador. (Reuters)
  - Flood control projects controversy in the Philippines
  - The Philippine Department of Justice and the National Bureau of Investigation
    file criminal graft and malversation charges against Senator Chiz Escudero, former
    senator Nancy Binay, and former house speaker Martin Romualdez in connection with
    investigations into alleged corruption in flood control projects. (The Philippine
    Star)
  - Two teenagers are killed and three others are injured and hospitalized in a school
    shooting in Sobral, Ceará, Brazil. (AFP via France 24) (AP)
  - Lithuania's parliament votes 80–42 to approve a coalition government led by the
    Social Democratic Party, installing Inga Ruginienė as the new prime minister.
    (AFP via The Straits Times)
  - Brazilian professional skateboarder Sandro Dias breaks the records for the highest
    drop in ever and fastest speed reached (103 km/h) on a standard skateboard after
    skating down the Administrative Center of the Rio Grande do Sul state in Porto
    Alegre, Brazil, at 70 meters-high. (Red Bull) (Transworld Skateboarding) (AFP/CBS
    Newspath via WKRC-TV)
