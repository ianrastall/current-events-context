Date: '2025-09-12'
Source_URI: Portal:Current events/2025 September 12
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Palestinian political violence
  - A Palestinian assailant stabs two Israeli civilians in Tzova, Jerusalem District.
    (The Times of Israel)
  - 2025 Nepalese Gen Z protests
  - Nepali police announce that nine prisoners have been killed and 12,500 others
    are at large after a series of jailbreaks across Nepal amid the ongoing protests.
    (Al Jazeera)
  - Haitian conflict
  - At least 42 people are killed by armed gangs, including the Viv Ansamn, in Port-au-Prince,
    Haiti. (AP)
  - Myanmar civil war
  - At least 18 people, mostly students, are killed in a Tatmadaw airstrike on two
    schools in Kyauktaw Township in Rakhine State, Myanmar, an area controlled by
    the Arakan Army. (AP)
  - Turkey–Islamic State conflict
  - Turkish police arrest 161 people suspected of being members of the Islamic State
    (IS) over the last week and seize unlicensed weapons and IS documents in raids
    in 38 provinces, including Istanbul and Ankara. (AP)
  - Norges Bank removes French mining company Eramet from Norway's sovereign wealth
    fund, citing risks of human rights abuses and environmental damage linked to a
    nickel mining project in Halmahera, Indonesia. (AFP via New Straits Times)
  - At least 23 people are killed while five others are reported missing following
    days of flash floods and landslides in Bali and East Nusa Tenggara, Indonesia.
    (Al Jazeera
  - 2025 Hassan district truck accident
  - At least nine people are killed and 23 others are injured, including several critically
    and the driver, when a truck rams into people celebrating the Ganesh Chaturthi
    Hindu festival in Hassan district, Karnataka, India. (News18) (The Times of India)
  - A ski lift accident on Mount Elbrus in Russia kills two people and injures nine
    others. (AP)
  - Israeli–Palestinian conflict, Eightieth session of the United Nations General
    Assembly
  - In a 142–10 vote with 12 abstentions, the UN General Assembly adopts the New York
    Declaration, calling for a ceasefire in the Gaza war, the release of hostages,
    the disarmament of Hamas, and renewed momentum toward a two-state solution. (The
    Guardian)
  - Kosovo–United States relations, North Kosovo crisis
  - The United States suspends its planned negotiations with Kosovo, citing caretaker
    government actions that it says have increased tensions and instability in the
    region. (Reuters)
  - Killing of Charlie Kirk
  - A 22-year-old is arrested as a suspect in the killing of American political commentator
    Charlie Kirk two days ago. (CNN)
  - Costa Rican police arrest four suspects in the killing of exiled Nicaraguan former
    military officer Roberto Samcam near San José in June. (Reuters)
  - The South African high court reopens an inquest into the 1977 death in police
    custody of anti-apartheid leader Steve Biko to determine possible crimes committed.
    (Reuters)
  - 2025 Indian vice presidential election
  - C. P. Radhakrishnan is sworn in as the 15th vice president of India. (NDTV)
  - 2025 Nepalese Gen Z protests
  - The House of Representatives is dissolved and Sushila Karki is appointed interim
    prime minister of Nepal, making her the first woman to head Nepal's government.
    (AP) (India Today)
  - 2026 Winter Olympics, Bobsleigh at the Winter Olympics, Skeleton at the Winter
    Olympics
  - The International Bobsleigh and Skeleton Federation votes to ban Russian athletes
    from competing, including under neutral status, at next year's Winter Olympic
    Games in Milan and Cortina d'Ampezzo, Italy. (AP)
