Date: '2025-09-23'
Source_URI: Portal:Current events/2025 September 23
Intelligence_Payload:
  Uncategorized:
  - Russo-Ukrainian war (2022–present)
  - War crimes in the Russo-Ukrainian war (2022–present)
  - The United Nations reports that Russian authorities subject civilian detainees
    in occupied Ukrainian territories to widespread torture, including sexual violence,
    while also documenting cases of ill-treatment of detainees held by Ukrainian authorities.
    (AFP via CNA)
  - Mexico–United States relations
  - The United States Federal Bureau of Investigation repatriates a centuries-old
    Spanish colonial map depicting the Camino Real de Tierra Adentro to Mexico's Secretariat
    of Culture after being recovered in Santa Fe, New Mexico. (AP)
  - Economy of New Zealand
  - New Zealand introduces two new residency pathways for skilled workers and tradespeople
    to address labor shortages. (Reuters)
  - Amazon announces that it will close all 19 of its Amazon Fresh stores in the United
    Kingdom after "a thorough evaluation of its business operations". (BBC News)
  - 2025 Pacific typhoon season
  - Typhoon Ragasa
  - At least 14 people are killed and 124 others are missing after a barrier lake
    in Hualien County, Taiwan, bursts during Ragasa, causing widespread flooding.
    (AFP via The Guardian)
  - Hong Kong International Airport suspends all passenger flights for 36 hours as
    Ragasa approaches. (Bloomberg News) (CNA)
  - September 2025 Kolkata cloudburst
  - At least 12 people are killed during flash flooding in Kolkata, West Bengal, India.
    (Reuters)
  - 2025 Aquidauana Cessna 175 crash
  - Four people, including Chinese architect Kongjian Yu, are killed when a Cessna
    175 Skylark aircraft crashes in Aquidauana, Mato Grosso do Sul, Brazil. (Campo
    Grande News) (G1) (Reuters)
  - Deportation in the second Trump administration, Foreign relations of Ghana
  - Eleven West African migrants deported from the United States to Ghana are subsequently
    sent to their home countries despite ongoing legal proceedings and concerns about
    potential persecution. (AP)
  - Indonesia–European Union relations
  - Indonesia and the European Union sign a free trade agreement in Bali after over
    nine years of negotiations that will remove tariffs on bilateral trade while also
    opening investments in other sectors. (DW)
  - Violations of non-combatant airspaces during the Russo-Ukrainian war (2022–present)
  - Lithuania's parliament authorizes its military to shoot down any unauthorized
    drones in its airspace following recent Russian drones entering the country. Previously,
    only drones deemed armed or posing an imminent threat to critical state assets
    could be targeted. (Reuters)
  - China announces it will no longer claim special and differential treatment benefits
    under current and future World Trade Organization agreements. (Reuters)
  - Crime in Norway
  - Grenades are thrown and explode in Bislett in central Oslo, Norway. Three young
    minors are arrested shortly after, the Norwegian Police suspects the attack was
    made on behalf of the Swedish Foxtrot (criminal network). (The Local)
  - 2025 British anti-immigration protests
  - An English magistrates' court sentences an Ethiopian asylum-seeker to 12 months
    in prison for sexually assaulting a woman and a 14-year-old girl, an incident
    that triggered nationwide protests over migration policies and the housing of
    asylum-seekers in hotels. (AP)
  - Flood control projects controversy in the Philippines
  - The Philippine Department of Justice and the National Bureau of Investigation
    file criminal graft and malversation charges against senators Jinggoy Estrada
    and Joel Villanueva, representative Zaldy Co, former representative Mitch Cajayon-Uy,
    and two former public works officials in connection with investigations into alleged
    corruption in flood control projects with the Anti–Money Laundering Council freezing
    their assets. (Gulf News) (Rappler)
  - Jaguar Land Rover cyberattack
  - British multinational car-maker Jaguar Land Rover announces the pause in vehicle
    production due to a cyberattack is to be extended until 1 October. (The Irish
    Times)
  - Italy's Guardia di Finanza arrests five people and seizes €17 million (US$20 million)
    while dismantling a Syrian-led network that laundered drug-trafficking proceeds
    in France and Italy by converting cash into gold, in an investigation coordinated
    with the National Gendarmerie, Eurojust, and Europol. (Reuters)
  - Singapore-based shipping line X-Press Feeders refuses to pay the US$1 billion
    in damages ordered by Sri Lanka's Supreme Court over pollution caused by the 2021
    sinking of the X-Press Pearl, arguing the ruling violates international maritime
    liability conventions. (AFP via France 24)
  - Trinidad and Tobago's high court blocks the extradition of former FIFA vice president
    Jack Warner to the United States, ruling that proceedings were invalid without
    a formal extradition treaty. (AP)
  - Unification Church leader Hak Ja Han is arrested in Seoul, South Korea, as prosecutors
    investigate allegations that the church bribed former first lady Kim Keon Hee
    and lawmaker Kweon Seong-dong, both of whom face separate corruption charges.
    (AP)
  - Gaza war protests
  - September 2025 Italian general strike for Gaza
  - Thousands of people across Italy hold rallies and a general strike to protest
    against the Israeli occupation of the Gaza Strip and recent ground offensive into
    Gaza City. Dock workers at ports in Genoa, Livorno, Trieste, and Venice hold strikes,
    while protesters clash with police in Milan and 20,000 people march in Rome. (DW)
    (Le Monde)
  - 2025 Malawian general election
  - Former Malawian president Peter Mutharika is projected to win the 2025 presidential
    election with more than 56% of the vote, according to unofficial tallies, while
    official results from the electoral commission show him leading incumbent Lazarus
    Chakwera. (Reuters)
  - 2026 Ugandan general election
  - Uganda's Electoral Commission clears President Yoweri Museveni to run for reelection
    in 2026, a move that could extend his rule to nearly 50 years. (Reuters)
  - Scientists in Argentina identify a new megaraptoran species, Joaquinraptor casali,
    from fossils in Patagonia, providing one of the most complete skeletons of its
    group. (AP)
