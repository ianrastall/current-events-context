Date: '2025-09-10'
Source_URI: Portal:Current events/2025 September 10
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - 2025 Gaza City offensive
  - Israeli attacks across the Gaza Strip kill at least 72 Palestinians amidst the
    ongoing offensive to capture Gaza City. (Al Jazeera)
  - Red Sea crisis
  - September 2025 Israeli attacks in Yemen
  - Israel carries out a series of airstrikes against alleged Houthi targets and civilian
    structures in Sanaa and Al Jawf Governorate, Yemen, killing 35 people and wounding
    131 others. (Al Jazeera)
  - Russian invasion of Ukraine
  - Russia-NATO relations, Poland-Russia relations
  - 2025 Russian drone incursion into Poland, Violations of non-combatant airspaces
    during the Russian invasion of Ukraine
  - The Polish Air Force and NATO allies scramble fighter jets in response to 19 Russian
    drones penetrating up to 250 km into Polish airspace during an overnight air attack
    on Ukraine. (BBC News)
  - The Polish Armed Forces confirms it has shot down four Russian drones over the
    country, marking the first time Poland has directly engaged Russian military assets
    since the start of the war. (BBC News)
  - Poland closes multiple airports due to the airspace breach, including Warsaw Modlin
    Airport, Rzeszów–Jasionka Airport, and Lublin Airport. (CNN)
  - Polish prime minister Donald Tusk invokes Article 4 of the North Atlantic Treaty
    following the incursion. (The Guardian)
  - 2025 Nepalese Gen Z protests
  - Nepal deploys its military to enforce an indefinite curfew in Kathmandu following
    anti-corruption protests. (Euronews)
  - Kathmandu's Tribhuvan International Airport reopens nearly a day after the Nepali
    Army occupied it. (BBC News)
  - Belgium–Germany relations, Belgium–Israel relations
  - A music festival in Ghent, Belgium, cancels a performance by the Munich Philharmonic
    orchestra, citing the Israeli conductor Lahav Shani's attitudes towards the Israeli
    government as the reason. (Haaretz)
  - Finance in India
  - India's Securities and Exchange Board announces that rules exempting foreign investors
    who purchase only government bonds from disclosing investor group details will
    take effect on February 8, 2026. (Reuters)
  - 2024–2025 Cuba blackouts
  - Cuba experiences its fifth nationwide power outage in less than a year, affecting
    about 10 million people. (The Guardian)
  - 2025 Iztapalapa tank truck explosion
  - Over 30 people are killed and 90 others are injured after a tank truck carrying
    around 49,500 liters (13,000 gallons) of LP gas explodes at a highway interchange
    in the Iztapalapa borough of Mexico City. The shockwave caused by the explosion
    set another eighteen cars on fire. (CNN) (The New York Times)
  - At least 86 people are killed when a boat capsizes in Basankusu, Équateur Province,
    Democratic Republic of the Congo. (AP)
  - At least 19 people are killed and six others are missing due to widespread flooding
    in Bali and East Nusa Tenggara, Indonesia. (AP) (DW)
  - Four people are killed when a Eurocopter AS350 Écureuil crashes into a mountainside
    in Jila, Mimika Regency, Central Papua, Western New Guinea, Indonesia. (ASN)
  - Australia approves the first vaccine to protect koalas from chlamydia. (Reuters)
  - Territorial disputes in the South China Sea
  - Scarborough Shoal standoff
  - China approves the establishment of a national nature reserve at Scarborough Shoal
    in the South China Sea, a territory also claimed by the Philippines and Taiwan.
    (AP)
  - China–United States relations, Space policy of the United States
  - NASA confirms that Chinese citizens, including those holding a valid U.S. visa,
    are barred from accessing its facilities and systems and working on its programs,
    citing security concerns. (Bloomberg)
  - Deportation in the second Trump administration, Ghana–United States relations
  - Ghanaian president John Mahama announces that Ghana can accept citizens of West
    African nations who have been deported from the United States under a regional
    visa-free travel arrangement. (AFP via France 24)
  - Israel–European Union relations
  - European Commission president Ursula von der Leyen announces intentions to seek
    sanctions against and a partial suspension of trade with Israel, while also immediately
    suspending certain bilateral funds, citing the ongoing Gaza Strip famine as the
    reason. (The Telegraph) (Los Angeles Times)
  - 2024 Solingen stabbings
  - A German state court convicts a Syrian national of murder, attempted murder, and
    Islamic State membership for a 2024 mass stabbing in Solingen, North Rhine-Westphalia,
    sentencing him to life imprisonment without parole eligibility after 15 years.
    (AP via ABC News)
  - 2025 Vancouver car attack
  - A court in British Columbia, Canada, rules that a man accused of killing eleven
    people during a vehicle-ramming attack in April at a Filipino Heritage Month event
    in Vancouver, is mentally fit to stand trial. (AP)
  - Assassination of Charlie Kirk
  - American right-wing political activist Charlie Kirk is shot dead during a debate
    at Utah Valley University in Orem, Utah, United States. (The Guardian)
  - Far-right politics in Germany
  - German public prosecutors charge eight suspected members of a far-right group
    who plan to secede from Saxony to create a Nazi state after the group were discovered
    in 2024 to be conducting paramilitary training and amassing weapons. One of the
    men was a former AfD local politician. (DW)
  - Human trafficking in South Africa
  - The high court in Gauteng, South Africa, sentences seven Chinese nationals to
    20 years in prison each for trafficking 91 Malawian workers and forcing them to
    labor under abusive conditions at a Johannesburg factory. (AP)
  - 2024–2025 French political crisis
  - Lecornu government, Bloquons tout
  - Sébastien Lecornu is sworn in as Prime Minister of France after previous prime
    minister François Bayrou failed a confidence vote on September 8.
  - His appointment coincides with country-wide protests and strikes against austerity
    measures previously announced by Bayrou, with protestors calling to "block everything".
    Eighty thousand police officers and gendarmes are deployed nationwide, with at
    least 200 people arrested as of 10 a.m. local time. (RFI) (NBC News)
  - The Australian government announces plans to bolster its military through a US$1.1
    billion fleet of Ghost Shark underwater drones, with the first batch delivered
    to the Australian Navy in January 2026. (DW)
  - The Sri Lankan parliament votes 151–1 to abolish state-funded benefits, including
    housing, pensions, transport, and office staff, for former presidents and their
    spouses. (AP)
  - Life on Mars
  - An article published in Nature announces that the Perseverance rover discovered
    vivianite, greigite, and various organic compounds in rocks at Cheyava Falls on
    Mars, in what NASA administrator Sean Duffy says may be "the clearest sign of
    life that we've ever found on Mars". (The New York Times)
