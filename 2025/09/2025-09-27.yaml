Date: '2025-09-27'
Source_URI: Portal:Current events/2025 September 27
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza City offensive
  - At least 91 Palestinians are killed in Israeli attacks across the Gaza Strip.
    (Al Jazeera)
  - 2025 Cambodian–Thai border crisis
  - Cambodian and Thai forces reportedly exchange fire across their countries' shared
    border despite a ceasefire agreement in place since August. (Nation Thailand)
  - 2025 deployment of federal forces in the United States
  - U.S. president Donald Trump orders the deployment of troops to Portland, Oregon,
    saying he has directed defense secretary Pete Hegseth to secure the "war-ravaged"
    city. (BBC News)
  - Insurgency in Khyber Pakhtunkhwa
  - The Pakistan Armed Forces kill 17 Taliban militants and recover weapons and ammunition
    in an overnight operation in Lakki Marwat District, Khyber Pakhtunkhwa, Pakistan.
    (The Express Tribune)
  - Economy of Iraq, Economy of Kurdistan Region
  - Iraq resumes oil exports from the Kurdistan Region through Turkey's Ceyhan port,
    ending a suspension imposed in early 2023 due to an International Chamber of Commerce
    arbitration ruling against independent Kurdish exports. (AP)
  - 2025 Karur crowd crush
  - In Karur, Tamil Nadu, India, a crowd crush at actor-politician Vijay-led Tamilaga
    Vettri Kazhagam (TVK) rally kills at least 39 people (including 10 children),
    and injures 83 others. (The Hindu) (Hindustan Times)
  - Eight people are killed after a bus collides head-on with a vehicle carrying oil
    in Panjgur, Balochistan, Pakistan. (The Express Tribune)
  - At least four people are killed when torrential rain causes flash flooding across
    Arizona, United States. (The Times of India)
  - International sanctions against Iran, Nuclear program of Iran
  - The United Nations reimposes economic and military sanctions on Iran after France,
    Germany, and the United Kingdom trigger the snapback mechanism under Security
    Council Resolution 2231 and the Joint Comprehensive Plan of Action, citing Iran's
    nuclear escalation and lack of cooperation with the IAEA. (BBC News) (Reuters)
  - Mass shootings in the United States
  - 2025 Southport shooting
  - At least three people are killed and eight others are injured in a mass shooting
    when a gunman on a boat opens fire at a restaurant at the Southport Yacht Basin
    in Southport, North Carolina, United States. (BNO News)
  - 2025 Gabonese parliamentary election
  - Gabonese citizens vote to elect members of the National Assembly alongside municipal
    elections. A second round will be held on 11 October for constituencies where
    no candidate has a majority. (AP)
  - 2025 Seychellois general election
  - Seychellois vote to elect a president and members of the National Assembly. A
    second round will be held after no presidential candidate received a majority
    of the vote, with United Seychelles candidate Patrick Herminie receiving 48.8%
    of the vote over the incumbent Wavel Ramkalawan's 46.4%. (AP)
  - 2025 AFL Grand Final
  - In Australian rules football, the Brisbane Lions defeat the Geelong Cats to win
    the 2025 Australian Football League by 47 points, winning their second consecutive
    premiership and fifth overall. (The Age) (AFL)
  - 2025 Women's Rugby World Cup
  - England defeats Canada in the final of the 2025 Women's Rugby World Cup. (BBC
    News)
  - In flag football, the Italian men's and British women's national teams win their
    respective IFAF European Flag Football Championship titles in Paris, France. (EuroFlag)
    (IFAF)
