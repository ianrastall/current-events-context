Date: '2025-09-30'
Source_URI: Portal:Current events/2025 September 30
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Israeli bombing of the Gaza Strip, 2025 Gaza Strip aid distribution killings
  - At least 59 Palestinians are killed by Israeli attacks across the Gaza Strip,
    including 20 who were seeking aid. (Al Jazeera)
  - Palestinian political violence
  - A Palestinian man rams into Israeli pedestrians near Al-Khader in the West Bank,
    injuring two children, before being shot. (The Times of Israel) (Haaretz)
  - Pakistan in the war on terror
  - Insurgency in Balochistan
  - September 2025 Quetta bombing
  - Eight civilians and two policemen are killed and over 30 other people are injured
    in a suicide car bombing followed by gunfire outside the Frontier Corps' headquarters
    in Quetta, Balochistan, Pakistan. Four attackers are killed. (Al Jazeera)
  - Russo-Ukrainian war
  - Attacks on civilians in the Russo-Ukrainian war
  - An overnight Russian drone strike kills four people, all members of the same family,
    in Chernechchyna, Okhtyrka Raion, Sumy Oblast, Ukraine. (BBC News)
  - Two-year-old Aryatara Shakya is installed in Kathmandu as Nepal's new Kumari,
    succeeding Trishna Shakya who held the role since 2017. (AP) (Euronews)
  - 2025 Cebu earthquake
  - A earthquake hits the central Philippines with structural damage and power interruptions
    reported, particularly in Cebu where at least 69 people are reported dead. (The
    Guardian) (Reuters via The Straits Times)
  - At least 26 people are killed in a boat accident on the Niger River in Ibaji,
    Kogi State, Nigeria. The cause of the accident is unknown. (AP)
  - Nine people are killed when an under-construction coal preparation plant collapses
    in Chennai, India. (NDTV)
  - 2025 Danish drone incidents, Denmark–Ukraine relations
  - Ukrainian president Volodymyr Zelenskyy deploys a military mission to Denmark
    to share its expertise in countering Russian drones, as European countries plan
    a joint "drone wall" project to strengthen airspace defense. (AP)
  - France–South Africa relations
  - South African ambassador to France and former sport, arts and culture minister
    Nathi Mthethwa is found dead outside his hotel in the 17th arrondissement of Paris.
    The ambassador had previously been reported missing by his wife. (Reuters)
  - Haitian conflict
  - The United Nations Security Council approves a resolution to transform the Multinational
    Security Support Mission (MSS) in Haiti into a larger Gang Suppression Force (GSF)
    of up to 5,500 police and military personnel to combat gang violence. (The Guardian)
    (UN News)
  - 2025 Moroccan Gen Z protests
  - Large-scale youth-led demonstrations in Morocco continue for a third day, despite
    police arrests and tight security. (Reuters)
  - Capital punishment in the Democratic Republic of the Congo
  - A military court in the Democratic Republic of the Congo sentences former president
    Joseph Kabila to death in absentia for treason. (AP)
  - Chinese intelligence activity abroad, China–Germany relations
  - The Higher Regional Court of Dresden convicts a Chinese–German man of espionage
    for China while working for AfD politician Maximilian Krah, giving him a sentence
    of over five years. A co-defendant accused of supplying cargo and passenger information
    from her job at Leipzig Airport is given a suspended sentence of one and a half
    years. (AP)
  - Nord Stream pipelines sabotage
  - Polish authorities arrest a Ukrainian diver in Pruszków, Masovian Voivodeship,
    on a German warrant, suspecting his involvement in the 2022 Nord Stream pipeline
    explosions in the Baltic Sea. (AP)
  - Lèse-majesté in Thailand
  - A Thai appeals court upholds a two-year prison sentence against opposition representative
    Chonthicha Jaengraew for defaming the monarchy in a 2021 speech, while granting
    her bail pending a Supreme Court appeal. (AP)
  - Mexico's National Autonomous University cancels or shifts classes online in over
    half its departments after the killing of a student and threats against female
    professors, prompting authorities to strengthen security and provide support measures.
    (The Independent)
  - 2025 Gabonese parliamentary election
  - Gabon's ruling party, the Democratic Union of Builders of President Brice Oligui
    Nguema, wins 55 of 145 seats in the first round of legislative elections, with
    a second round scheduled for constituencies without a majority winner. (AP)
  - Human rights in Afghanistan
  - Telecommunications are almost entirely down in Afghanistan following a internet
    cut by the Taliban government, with mobile phone services down to 1% of normal
    connectivity levels. (The Guardian)
