Date: '2025-09-04'
Source_URI: Portal:Current events/2025 September 4
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli bombing of the Gaza Strip, 2025 Gaza City offensive
  - At least 75 Palestinians are killed, including 44 who are killed in Gaza City,
    during Israel's military assault. (Al Jazeera)
  - 2025 Afghanistan earthquake
  - Hundreds of deceased people are found under the rubble of collapsed houses after
    the August 31 earthquake in Nangarhar Province, Afghanistan, bringing the death
    toll to 2,205. (AP)
  - Seventeen people are injured and 15 others are hospitalized when a double-decker
    bus crashes near Victoria station in London, England. (AP)
  - Vaccination policy of the United States
  - Make America Healthy Again
  - The U.S. state of Florida announces it will formally eliminate all vaccination
    mandates, including school and childhood mandates for chickenpox, measles, and
    polio. (DW) (AP)
  - The Democratic Republic of the Congo declares a new Ebola outbreak in Kasaï Province
    with 28 suspected cases and 15 deaths, confirmed as the Zaire strain. (Reuters)
  - Algeria–Mali relations
  - The Malian transitional government files a lawsuit against Algeria at the International
    Court of Justice and accuses Algeria of destroying a Malian military drone near
    Tinzaouaten, Kidal region, to allegedly hinder Mali's campaign against armed rebels
    in the Mali War. (AP)
  - Belarus–Poland relations
  - Belarus detains a Polish national and a Belarusian citizen on charges of espionage
    after authorities allege they possessed documents on Zapad 2025. (Reuters)
  - Ecuador–United States relations, War on drugs
  - The United States designates Ecuadorian drug cartels Los Choneros and Los Lobos
    as terrorist organizations. U.S. secretary of state Marco Rubio also says that
    the U.S. will support the Ecuadorian Navy by providing $6 million in drones and
    $13 million for general security in the fight against these gangs. (Reuters)
  - Chromebook procurement scandal
  - Former Indonesian education minister and Gojek co-founder Nadiem Makarim is detained
    after prosecutors name him as a suspect in a corruption case over the alleged
    unauthorized procurement of Chromebook laptops that resulted in state losses estimated
    at Rp 1.98 trillion (US$121.85 million). (Reuters)
  - Robodebt scheme
  - Australia agrees to pay an additional A$475 million (US$309M) in compensation
    to victims of the unlawful "Robodebt" welfare debt recovery scheme, bringing total
    repayments and compensation to A$2.4 billion (US$1.6 bn) in what would be the
    country's largest class action settlement if approved by the courts. (Reuters)
  - 2025 Hollow Water First Nation stabbings
  - Two people are killed, including the suspect, and eight others are injured in
    a stabbing spree in Hollow Water First Nation, Manitoba, Canada. (CBC)
  - A Hong Kong jury convicts three people and acquits five others over 2020 bomb
    plots targeting hospitals and trains during the COVID-19 pandemic, finding them
    guilty of conspiracy to cause explosions but not of terrorism charges under the
    UN anti-terrorism law. (Reuters)
  - Former Thai prime minister Thaksin Shinawatra leaves Thailand after a court ruling
    that placed him at risk for arrest. Police indicate that he was allowed to leave
    the country as there is no active warrant for his arrest. (AP)
  - 2025 Jamaican general election
  - Jamaica's Labour Party wins the general election with 34 seats in the House of
    Representatives against 29 for the People's National Party, securing a third term
    for Prime Minister Andrew Holness amid a voter turnout of 39.5%. (Reuters)
  - Censorship in Nepal
  - Nepal orders its telecommunications authority to block access to unregistered
    social media platforms after companies failed to meet government requirements
    to register locally and designate compliance representatives. (Reuters)
  - Argentina's Congress overturns President Javier Milei's veto of a bill expanding
    spending and protections for people with disabilities, marking the first such
    reversal of his presidency. (Reuters)
