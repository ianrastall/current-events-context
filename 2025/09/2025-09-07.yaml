Date: '2025-09-07'
Source_URI: Portal:Current events/2025 September 7
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - The al-Ruya Tower high-rise apartment building is hit by an Israeli airstrike
    in Gaza City, Palestine. (Al Jazeera)
  - At least 65 people are killed and several others are injured in Israeli airstrikes
    on a school, refugee tents, and houses in Gaza City and the northern Gaza Strip.
    (Al Jazeera)
  - Red Sea crisis
  - Two people are injured, flights are halted and the airspace is closed after multiple
    Houthi-launched drone attacks, including some intercepted and at least one on
    the passenger hall of Ramon Airport near Eilat in Southern District, Israel. (Al
    Jazeera) (AP)
  - Russian invasion of Ukraine
  - Kyiv strikes
  - At least four people are killed, including an infant, and eleven others are injured
    in drone and missile attacks on Pecherskyi, Sviatoshynskyi and Darnytskyi districts
    in Kyiv, Ukraine. Among the buildings hit is the main government building. (BBC
    News) (AP)
  - Colombian conflict
  - Forty-five Colombian soldiers are kidnapped by a mob in Cauca Department, Colombia,
    while conducting anti-drug cartel operations. The military says the soldiers are
    being held hostage by local villagers who are demanding the return of a killed
    insurgent's body which was transferred to a morgue in Popayán in return for their
    release. (AP)
  - Saints canonized by Pope Leo XIV
  - Pope Leo XIV canonizes English-Italian teenager Carlo Acutis in St. Peter's Square,
    Vatican City, making Acutis the first millennial saint. (Reuters)
  - The pope also canonizes Pier Giorgio Frassati, an Italian member of the Lay Dominicans
    and the Society of Saint Vincent de Paul who was known for his dedication to social
    justice. (Vatican News)
  - Five people are killed, one person is seriously injured, and another is reported
    missing when a migrant boat collides with a Turkish Coast Guard vessel off the
    coast of Badavut, Ayvalık, Balıkesir Province, Turkey. (MSN)
  - At least four people are killed and 84 others are injured when a building hosting
    a religious gathering collapses in Bogor Regency, West Java, Java, Indonesia.
    (South China Morning Post)
  - Around 80 people are injured, including up to 20 seriously, in a mass crash at
    the RiderMan bicycle race in Bad Dürrheim, Baden-Württemberg, Germany. (MSN)
  - Leongatha mushroom murders
  - Erin Patterson is sentenced to life in prison plus an extra 25 years without parole
    for 33 years for the 2023 poisoning of four relatives with Beef Wellingtons laced
    with poisonous death cap mushrooms, killing three and injuring the other in Leongatha,
    Victoria, Australia. (BBC News)
  - 2025 Buenos Aires provincial elections
  - The La Libertad Avanza party of President Javier Milei suffers heavy losses in
    local elections in Argentina's most populous province. (DW)
  - Japanese prime minister Shigeru Ishiba announces his intention to resign from
    office after his party lost seats in the House of Councillors election in July.
    (Reuters)
  - Guyanese president Irfaan Ali is sworn in for a second term in office after winning
    last week's election. (AP)
  - Romania's coalition government survives four no-confidence votes, enabling it
    to advance tax increases and spending cuts aimed at reducing the European Union's
    highest budget deficit and securing recovery funds, despite threats of public
    sector strikes. (Reuters)
  - September 2025 lunar eclipse
  - A total lunar eclipse, visible in Europe, Africa, Asia, Australia, and Antarctica,
    occurs. (EclipseWise) (BBC News)
  - Microsoft Azure services are disrupted by cuts to undersea cables in the Red Sea
    while internet access is also disrupted in parts of Asia and the Middle East.
    (BBC News) (ABC News)
  - 2025 US Open
  - In tennis, Carlos Alcaraz defeats defending champion and his rival Jannik Sinner
    in the men's singles final, 6–2, 3–6, 6–1, 6–4, to win his second US Open title
    and sixth major title overall. (BBC Sport)
