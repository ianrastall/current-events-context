Date: '2025-09-28'
Source_URI: Portal:Current events/2025 September 28
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza City offensive
  - At least 41 Palestinians are killed in Israeli attacks across the Gaza Strip.
    (Al Jazeera)
  - Russo-Ukrainian war
  - Russian strikes against Ukrainian infrastructure
  - Russian forces launch more than 600 drones and dozens of cruise missiles at Ukraine,
    killing at least four people and injuring 70 others. (BBC News)
  - Attacks in Russia during the Russian invasion of Ukraine
  - A Ukrainian missile strikes a power station in Belgorod causing a massive power
    outage in the Russian city. (Reuters)
  - Super Bowl halftime shows
  - Puerto Rican artist Bad Bunny is announced as the headliner for Super Bowl LX
    to be held on February 8, 2026, at Levi's Stadium in Santa Clara, California,
    United States. (NPR)
  - 2025 Pacific typhoon season
  - At least thirteen people are killed and dozens others are missing as Typhoon Bualoi
    makes landfall in Nghệ An and Hà Tĩnh provinces, Vietnam. (DW)
  - Twelve people are killed and 42 injured in three separate road accidents in Panjgur,
    Pishin and Lasbela, Pakistan. (Dawn)
  - Four people are killed and another six people affected after a fire in a building
    in Lebanon, Pennsylvania, United States. (MSN)
  - Mass shootings in the United States
  - Grand Blanc Township church attack
  - Four people are killed and eight others are injured in a mass shooting and arson
    attack on a Mormon church in Grand Blanc, Michigan, United States. The perpetrator
    is killed in a shootout with police. (CNN) (BNO News)
  - Two people are killed and five others are injured in a mass shooting at a casino
    on the Kickapoo reservation near Eagle Pass, Texas, United States. The suspect
    initially fled the scene before being taken into custody. (WOAI-TV) (KSAT-TV)
  - 2025 Danish drone incidents
  - The government of Denmark bans all civilian drones after several UAVs were seen
    above military sites last week and caused several airports to temporarily close
    in fear of an attack. (DW)
  - Anti-corruption campaign under Xi Jinping
  - Former Chinese agriculture minister Tang Renjian is sentenced to death with a
    two-year reprieve for accepting bribes worth more than ¥268 million (US$37.6 million)
    between 2007 and 2024. (Reuters)
  - A civilian is killed and twelve soldiers are injured during clashes between security
    forces and Indigenous protesters in Cayambe, Pichincha, Ecuador, over the government’s
    decision to end a diesel fuel subsidy. (AP)
  - 2025 Moldovan parliamentary election
  - Moldovans vote to elect the 101 seats of the parliament. (AP)
  - The pro-EU Party of Action and Solidarity of Moldovan president Maia Sandu wins
    with 50.2% of the vote, while the left-wing pro-Russian Patriotic Electoral Bloc
    wins 24.2% and the Alternative alliance wins 8%. Voter turnout is reportedly over
    52.2%, higher than previous elections. (BBC News)
  - 2025 Swiss referendums
  - Switzerland approves two referendums to decide on electronic identity and property
    tax. (The Guardian)
  - The 625-meter-high Huajiang Canyon Bridge, the world's highest bridge, is opened
    to the public in Guizhou, China. (South China Morning Post) (The Star)
  - 2025 Asia Cup
  - In cricket, India defeat their rival Pakistan by five wickets in the final to
    win their second consecutive Asia Cup title and ninth overall. During the awarding
    ceremony, the Indian team refused to accept their trophy from Asian Cricket Council
    chairperson and Pakistani interior minister Mohsin Naqvi due to the political
    turmoil between both nations. (AP)
  - 2025 FIVB Men's Volleyball World Championship
  - In volleyball, Italy defeat Bulgaria 3–1 to win their second consecutive World
    Championship and fifth overall. (GMA Integrated News) (Rappler)
  - 2025 Polish speedway season
  - In motorcycle speedway, KS Toruń defeats Orlen Oil Motor Lublin in the Ekstraliga
    final, winning their fifth Team Speedway Polish Championship. (Ekstraliga)
  - 2025 Ryder Cup
  - In golf, Team Europe retains the Ryder Cup after scoring 15–13 over the United
    States. (The Independent)
