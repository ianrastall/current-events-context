Date: '2025-09-24'
Source_URI: Portal:Current events/2025 September 24
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis (2023–present)
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - At least 85 Palestinians are killed by Israeli attacks in the Gaza Strip. (Al
    Jazeera)
  - Red Sea crisis
  - Twenty-two Israelis are injured, including two seriously, after a drone launched
    by the Yemen-based Houthis strikes Eilat in southern Israel. (CNN)
  - Insurgency in Khyber Pakhtunkhwa
  - Afghanistan–Pakistan border skirmishes
  - Thirteen Pakistani Taliban fighters are killed after a raid by security forces
    at a hideout in Dera Ismail Khan, Khyber Pakhtunkhwa, Pakistan, near the Durand
    Line. (AP)
  - 2025 Pacific typhoon season
  - Typhoon Ragasa
  - Filipino authorities conclude a search and rescue operation for the 13-man crew
    of fishing boat FB Jobhenz, which capsized in Santa Ana, Cagayan, Philippines,
    on Monday. Six crew members are rescued, with the remaining seven confirmed to
    have died. (Manila Bulletin)
  - The Hong Kong Observatory issues its highest typhoon warning, Signal No. 10, in
    the morning before downgrading it to Signal No. 8 at 4 pm. (Al Jazeera) (Macao
    News)
  - A section of road collapses into an estimated -deep sinkhole in front of Vajira
    Hospital in Bangkok, Thailand, prompting road closures and evacuations of nearby
    buildings. No injuries and deaths are reported. (South China Morning Post) (The
    Straits Times)
  - All 23 miners trapped for two days in a collapsed gold mine shaft in Segovia,
    Antioquia, Colombia, are rescued alive after receiving food, water, and oxygen
    through pipelines during the operation. (AFP via RTHK)
  - Costa Rica closes its airspace for at least five hours after a power outage disables
    radar systems and disrupts hundreds of flights, before reopening after systems
    were restored. (Reuters)
  - 2025 Allenby Bridge shooting, Israel–Jordan relations
  - Israel indefinitely closes the Allenby Bridge between Jordan and the West Bank
    days after reopening it following a shooting that killed two Israeli soldiers.
    (Reuters)
  - Africa–United States relations
  - Lesotho's commerce minister announces the United States's plan to extend the African
    Growth and Opportunity Act by one year following negotiations in Washington, D.C.
    (Reuters)
  - Belarus–Poland relations
  - Poland reopens its border with Belarus after closing them during Russia-led military
    exercises, citing reduced security risks and economic considerations. (Reuters)
  - France–United Kingdom relations, English Channel illegal migrant crossings
  - A family of three becomes the first group sent to the United Kingdom from France
    under the one in, one out policy that returns unauthorized Channel arrivals to
    France in exchange for vetted asylum-seekers. (AP)
  - General debate of the eightieth session of the United Nations General Assembly
  - Syrian president Ahmed al-Sharaa becomes the first Syrian leader to address the
    United Nations General Assembly since Nureddin al-Atassi in 1967. (AP) (BBC News)
  - Syria–Ukraine relations
  - Syria and Ukraine restore diplomatic relations as Presidents Ahmed al-Sharaa and
    Volodymyr Zelenskyy meet on the sidelines of the eightieth session of the United
    Nations General Assembly, following Ukraine's 2022 break in ties with Syria when
    the Assad regime recognized Russian-occupied territories. (Reuters)
  - 2025 Dallas ICE facility shooting
  - A person is killed and two others are injured in a shooting at a United States
    Immigration and Customs Enforcement facility in Dallas, Texas, United States.
    The shooter is found dead on a nearby rooftop. (ABC News Australia) (CNN)
  - Ladakh protests
  - At least four people are killed and more than 60 others are injured as protests
    held by demonstrators demanding statehood and the inclusion of Ladakh under the
    Sixth Schedule to the Constitution of India turn violent in Ladakh, India. The
    local Bharatiya Janata Party office and a vehicle are set on fire in an arson
    attack. (India Today)
  - 2025 Malawian general election
  - Former Malawian president Peter Mutharika is declared the winner of the presidential
    election, winning 57% of votes against the incumbent Lazarus Chakwera, who received
    33%. (BBC News)
