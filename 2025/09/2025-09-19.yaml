Date: '2025-09-19'
Source_URI: Portal:Current events/2025 September 19
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza City offensive
  - At least 43 Palestinians are killed from Israeli attacks across the Gaza Strip,
    including 26 people in Gaza City. (Al Jazeera)
  - Sudanese civil war
  - Siege of El Fasher
  - The Rapid Support Forces attacks a mosque at an internal displacement camp with
    a drone strike near El Fasher, North Darfur, killing 75 people. (DW)
  - Insurgency in Manipur
  - Two Assam Rifles personnel are killed and five Assam Rifles personnel are injured
    in an ambush by People's Liberation Army of Manipur militants in Bishnupur, Manipur.
    (NDTV)
  - Insurgency in Southeastern Nigeria
  - At least 11 police officers are killed in an ambush by armed assailants in Benue
    State, Nigeria. (The Street Journal)
  - Canada bans the Irish band Kneecap from entering the country, citing statements
    and alleged links to designated terrorist groups. (BBC News)
  - Three workers are killed in an explosion at a silo operated by waste management
    company Ecopartenope near Caserta, Italy. (AP)
  - COVID-19 in the United States
  - The United States Centers for Disease Control and Prevention's (CDC's) Advisory
    Committee on Immunization Practices unanimously votes to abandon its recommendation
    for the COVID-19 vaccine and now recommends that Americans get the vaccine based
    on their personal choice. In a separate vote, the committee votes for the CDC
    to communicate clear risks about COVID-19 vaccines. (ABC News)
  - Estonia–Russia relations, Russia–NATO relations, Violations of non-combatant airspaces
    during the Russian invasion of Ukraine
  - Estonia summons Russia's chargé d'affaires after three Russian MiG-31 fighter
    jets enter its airspace near Vaindloo unauthorized, prompting a NATO response
    from Italian Air Force F-35s. (AP)
  - International sanctions against Iran, Snapback mechanism of sanctions against
    Iran
  - The United Nations Security Council (UNSC) convenes to vote on a draft resolution
    concerning the snapback of sanctions on Iran. Nine UNSC countries voted against
    lifting Iran sanctions, four in favor. (AP)
  - France–Mali relations
  - France suspends its joint counterterrorism agreements with the Mali government
    over the arrest of a French citizen. According to Mali officials, the French citizen
    was taken into custody for their alleged involvement in a purported coup plot.
    Also in response to the arrest, two Mali diplomats are expelled from an embassy
    in Paris by French authorities. (Al Jazeera)
  - Ireland–United Kingdom relations
  - Ireland and the United Kingdom agree to replace the Northern Ireland Legacy Act
    with new laws that will establish investigative bodies to address killings during
    The Troubles. (UPI)
  - Morocco becomes the 60th UN member state to ratify the High Seas Treaty, allowing
    it to enter into force in January 2026. (AP)
  - Aftermath of World War II
  - World War II bomb disposal in Europe
  - Around 10,000 people are ordered to evacuate after authorities discover two pieces
    of World War II-era unexploded ordnance in Berlin, Germany, one in the Spree River
    near Mitte and another in Spandau. (DW)
  - Detention of Barbie and Peter Reynolds
  - British couple Peter and Barbie Reynolds are freed in Afghanistan after being
    detained by the Taliban for 8 months. (Reuters)
  - Chinese journalist Zhang Zhan, previously jailed for reporting on the early COVID-19
    outbreak in Wuhan, is sentenced to an additional four years in prison on charges
    of picking quarrels and provoking trouble. (Reuters)
  - Palestinian authorities arrest Hicham Harb, a suspect in the 1982 Chez Jo Goldenberg
    restaurant attack in Paris that killed six people, after France issued an Interpol
    notice. (AFP via France 24)
