Date: '2025-09-13'
Source_URI: Portal:Current events/2025 September 13
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine, Russia–NATO relations, Romania–Russia relations
  - Violations of non-combatant airspaces during the Russian invasion of Ukraine
  - A Russian drone breaches Romanian airspace, prompting NATO forces to scramble
    fighter jets. Lublin Airport in eastern Poland is also closed again for the second
    time this week due to the threat of Russian drones. (Reuters)
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - At least 62 people are killed and dozens of others are injured in Israeli airstrikes
    on the Gaza Strip. (Al Jazeera)
  - Insurgency in Khyber Pakhtunkhwa
  - Afghanistan–Pakistan border skirmishes
  - Nineteen soldiers and 45 Pakistani Taliban militants are killed at two hideouts
    near the Durand Line in Bajaur District and South Waziristan District, Khyber
    Pakhtunkhwa, Pakistan, during clashes in the past two days. (Reuters) (The Canadian
    Press)
  - At least 61 people, mostly Sudanese refugees, are missing after a boat carrying
    74 passengers capsized off Tobruk, Cyrenaica, Libya. (AFP via Barron's)
  - At least 19 people are killed after a bus carrying wedding guests plunged into
    a river in Zamfara State, Nigeria. (MSN)
  - At least 15 people are killed in a multi-vehicle collision along Federal Highway
    180 between Campeche and Mérida in southeast Mexico. (Reuters)
  - Four people are killed and one is injured after a passenger de Havilland Canada
    DHC-2 Beaver crashes near Makepeace Lake in Manitoba, Canada. (CBC)
  - One person is killed and 25 others are injured, including three critically, in
    an explosion due to a gas leak at a bar in Madrid, Spain. (DW)
  - 2025 Nepalese Gen Z protests
  - The government of Nepal lifts the curfew in Bhaktapur, Kathmandu, and Lalitpur,
    imposed on September 9, citing restored calm after Sushila Karki's appointment
    as interim prime minister. (AP)
  - Ecuadorian security crisis
  - Seven people are killed in a shooting by criminal gangs at a pool hall in Santo
    Domingo, Ecuador, less than a month after a similar attack at a different pool
    hall in the city which also killed seven people. (CBS News) (AP)
  - The German customs bureau arrests two men and seizes over of cocaine at the port
    in Hamburg. (DW)
  - 2025 British anti-immigration protests
  - More than 100,000 people protest against illegal immigration in central London,
    England, in a rally led by right-wing activist Tommy Robinson. Thousands of anti-racism
    protesters and left-wing groups also hold counter-protests. (BBC News)
  - 2025 Tanzanian general election
  - Tanzania's electoral commission accepts the nomination of ACT-Wazalendo candidate
    Luhaga Mpina for the upcoming presidential election after the High Court overturned
    Mpina's earlier disqualification. (Reuters)
  - 2025 Speedway Grand Prix
  - In motorcycle speedway, Bartosz Zmarzlik become a record-equalling six-time motorcycle
    Speedway Grand Prix World champion. (FIM Speedway)
  - Canelo Álvarez vs. Terence Crawford
  - In boxing, Terence Crawford defeats Canelo Álvarez by unanimous decision, becoming
    the undisputed super middleweight champion and the second ever three-weight undisputed
    boxing champion. (ESPN)
  - The 2025 World Athletics Championships start in Tokyo, Japan. (ESPN)
