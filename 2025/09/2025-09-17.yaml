Date: '2025-09-17'
Source_URI: Portal:Current events/2025 September 17
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - 2025 Gaza City offensive
  - More than 83 Palestinians are killed in Israeli strikes and attacks across Gaza,
    including at least 61 of them in Gaza City. (Al Jazeera)
  - Israeli troops and tanks advance into the Sheikh Radwan district of Gaza City
    as the ground offensive continues. (BBC News)
  - Somali Civil War
  - American airstrikes in Somalia
  - USAFRICOM claims that the airstrike conducted on September 12 in Badhan in the
    Sanaag region of Puntland, which targeted a traditional elder accused of being
    an Al-Shabaab member, was executed in coordination with the Somali federal government.
    (Hiiraan Online) (AFRICOM)
  - 2025 Cambodian–Thai border crisis
  - At least 28 people are injured as Cambodian protesters clash with Thai security
    forces in a disputed border area between Banteay Meanchey, Cambodia, and Sa Kaeo,
    Thailand, raising tensions despite a ceasefire agreement. (AP)
  - Islamist insurgency in Niger
  - Gunmen on motorbikes kill 22 people in Takoubatt, Tillabéri Region, Niger, most
    of whom were attending a baptism ceremony. (BBC News) (Report)
  - Firings related to comments on the assassination of Charlie Kirk
  - American late-night talk show Jimmy Kimmel Live! is suspended indefinitely by
    its broadcast network ABC, following comments by its host regarding Charlie Kirk's
    killing, which sparked criticism and threats from the Federal Communications Commission.
    (AP)
  - Five UN police officers from the Democratic Republic of the Congo in a MINUSCA
    convoy are killed when their armored personnel carrier crashes and rolls into
    a river while crossing a bridge near Bangui, Central African Republic. (AP)
  - Four soldiers are killed when a Sikorsky UH-60 Black Hawk crashes near Summit
    Lake in Thurston County, Washington, United States. (KIRO-TV)
  - 2025 European heatwaves
  - The Copernicus Climate Change Service reports that at least 53 percent of Europe
    experienced droughts in August, the highest level recorded since records began
    in 2012. (AFP via France 24)
  - Australia–Papua New Guinea relations
  - Australian prime minister Anthony Albanese and Papua New Guinean prime minister
    James Marape sign a communiqué in Port Moresby confirming agreement on a mutual
    defence treaty after earlier plans to sign the treaty failed. (Reuters)
  - Israel–European Union relations
  - The European Union outlines a set of sanctions against Israeli settlers and Israeli
    prime minister Benjamin Netanyahu and far-right national security minister Itamar
    Ben-Gvir and urges the 27 member states to issue these sanctions to freeze European
    assets and ban inter-EU travel. (AP)
  - Pakistan–Saudi Arabia relations
  - Pakistani prime minister Shehbaz Sharif and Saudi crown prince Mohammed bin Salman
    sign a Strategic Mutual Defense Agreement in Riyadh. (Al Jazeera)
  - Mass shootings in the United States
  - 2025 North Codorus Township shooting
  - Three police officers are killed and two are critically injured in a mass shooting
    when a gunman opens fire during a search warrant at a farm in North Codorus Township,
    Pennsylvania, United States. The perpetrator is also killed. (WCAU-TV)
  - 2025 Indonesian protests
  - Indonesia's Constitutional Court rules that parliament followed proper procedure
    in passing amendments to the military law, rejecting a petition that sought to
    annul the amendments. (Reuters)
  - Greece suspends the extradition of Moldovan businessman and politician Vladimir
    Plahotniuc, who is wanted in Moldova over a 2014 bank fraud case. (Reuters)
  - Conflict in the Niger Delta
  - Nigerian president Bola Tinubu lifts the state of emergency in Rivers State and
    reinstates Governor Siminalayi Fubara and state lawmakers after six months of
    federal control imposed during a political crisis and oil pipeline vandalism.
    (AP)
  - Flood control projects controversy in the Philippines
  - Philippine house speaker Martin Romualdez resigns over his alleged involvement
    in the flood control controversy, with former deputy speaker Bojie Dy elected
    as the next speaker of the House of Representatives. (Bloomberg) (DZRH)
