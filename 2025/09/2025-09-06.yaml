Date: '2025-09-06'
Source_URI: Portal:Current events/2025 September 6
Intelligence_Payload:
  Uncategorized:
  - Insurgency in Khyber Pakhtunkhwa
  - At least one person is killed and two others are injured in an improvised explosive
    device bombing during a cricket match in Bajaur District, Khyber Pakhtunkhwa,
    Pakistan. (Dawn)
  - 82nd Venice International Film Festival
  - The 2025 Venice Film Festival closes with Jim Jarmusch's Father Mother Sister
    Brother winning the Golden Lion. (AP)
  - 2025 Pakistan floods
  - Five people are killed when a rescue boat capsizes in the Chenab River while evacuating
    people from flooding in the Jalalpur Pirwala area of Multan District, Punjab,
    Pakistan, with search operations still ongoing. (Dawn)
  - Six people are killed after a cable wire of a ropeway meant for material transport
    at the Kalika Mata Temple snaps, causing the cable car to crash to the ground
    in Pavagadh, India. (The Indian Express)
  - At least three people are killed, nine are injured, including six seriously, and
    others are reported missing when an under-construction bridge collapses in Karbala
    Governorate, Iraq. (Al Arabiya) (Shafaq News)
  - Immigration policy of the second Trump administration
  - Deportation in the second Trump administration
  - South Sudan repatriates a Mexican national who had been deported from the United
    States, after receiving assurances from Mexico that he would not face torture
    or unfair prosecution. (Reuters)
  - Gaza war protests in the United Kingdom
  - Around 890 people are arrested at a demonstration against the ban on the group
    Palestine Action in London, England. (BBC News)
  - A Chilean court releases American pilot influencer Ethan Guo from detention in
    Antarctica after landing a plane without authorization, while ordering him to
    pay US$30,000 in penalties and leave the country under a three-year entry ban.
    (AP)
  - 2025 Formula One World Championship
  - 2025 Italian Grand Prix
  - In auto racing, Red Bull's Max Verstappen secures pole position for the Italian
    Grand Prix at the Monza Circuit with a lap of 1:18.792, setting the fastest Formula
    One lap in history, surpassing Lewis Hamilton's record of 1:18.887 at the same
    circuit in 2020. (The Guardian)
  - 2025 US Open
  - In wheelchair tennis, Tokito Oda defeats Gustavo Fernández in the men's singles
    final to complete the career Golden Slam in the event. (IOC)
  - In tennis, Aryna Sabalenka defeats Amanda Anisimova 6–3, 7–6(7–3) in the women's
    singles final to win her second consecutive US Open title. (USA Today)
  - Marcel Granollers and Horacio Zeballos defeat Neal Skupski and Joe Salisbury 3–6,
    7–6(7–4), 7–5 in the men's doubles final to win the US Open, becoming the first
    pair to win the French Open and the US Open in the same season since 2009. (US
    Open)
  - Erin Routliffe and Gabriela Dabrowski defeat Taylor Townsend and Kateřina Siniaková
    6–4, 6–4 in the women's doubles final to win their second US Open title together.
    (WTA)
