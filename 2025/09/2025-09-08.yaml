Date: '2025-09-08'
Source_URI: Portal:Current events/2025 September 8
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Israeli–Palestinian conflict
  - Gaza war
  - 2025 Gaza City offensive
  - Four Israeli soldiers are killed by Hamas on the outskirts of Gaza City in the
    Gaza Strip. (The Times of Israel)
  - Palestinian political violence
  - 2025 Ramot Junction shooting
  - Six people are killed and seven others are wounded in a mass shooting targeting
    Israelis by Palestinian assailants in Jerusalem. The two perpetrators are killed
    following a shootout with a soldier and a civilian. (BBC News) (CNN)
  - Israel–Hezbollah conflict
  - Five people are killed and five others injured during at least eight Israeli airstrikes
    between Beqaa Valley and Hermel, in Lebanon. (Al Jazeera)
  - War in the Sahel
  - Mali war
  - Jama'at Nasr al-Islam wal Muslimin (JNIM) imposes a nationwide blockade on fuel
    and other goods imported from neighboring countries while besieging Malian government-held
    cities and towns. An unknown number of fuel trucks from Senegal and the Ivory
    Coast violating JNIM's blockade have been attacked and burned by militants. (AP)
  - The Malian army conducts airstrikes in the Kayes Region against JNIM, reporting
    operations in Diema and Nioro du Sahel that included freeing hostages. (Reuters)
  - Kivu conflict
  - Allied Democratic Forces insurgency
  - According to a local leader, 102 people are killed when Allied Democratic Forces
    rebels attack a funeral in Ntoyo, North Kivu, Democratic Republic of the Congo.
    (Anadolu Agency) (Euronews)
  - 2025 Nepalese Gen Z protests
  - Police open fire on protesters demonstrating against a government ban on social
    media in Kathmandu, Nepal, killing at least 19 people and wounding over a hundred
    more. A curfew is declared around all government buildings, including the Rastrapati
    Bhawan and Federal Parliament. (CBC News) (BBC News) (Sky News)
  - Ramesh Lekhak resigns as Minister of Home Affairs in response to the police killings
    of protesters. (Firstpost)
  - Nepal's Ministry of Information and Communications lifts its ban on major social
    media platforms following the protests. (AFP via France 24)
  - Succession of Rupert Murdoch
  - The children of News Corp founder and former chairperson Rupert Murdoch reach
    a settlement over the corporation's control, transferring all shares held by the
    original family trust to a new entity which gives Lachlan sole voting control,
    while Prudence, Elisabeth, and James exit with a reported US$3.3 billion settlement.
    (AFP via France 24)
  - 2025 Atlacomulco bus crash
  - A train collides with a double-decker bus at a level crossing in Atlacomulco,
    Mexico, killing at least ten people and injuring 41 others. (Yahoo! News Canada)
  - Israel–Spain relations
  - Spain announces an indefinite ban on ships transporting fuel and planes carrying
    weaponry to Israel from all of its ports and airspace in response to the Gaza
    genocide. (Politico)
  - Spain recalls its ambassador to Israel after the Israeli government accused Spanish
    prime minister Pedro Sánchez of being "antisemitic" and barred two Spanish officials
    from entering Israel, with Spanish foreign minister José Manuel Albares calling
    it "slanderous accusations" against the country. (Barron's)
  - Belarus–Czech Republic relations
  - The Czech Republic expels a Belarusian diplomat accused of espionage after cooperating
    with Romanian and Hungarian intelligence services to dismantle a Belarusian spy
    network in Europe. (Reuters)
  - 2025 Georgia Hyundai plant immigration raid
  - The South Korean foreign ministry charters a plane to repatriate more than 300
    South Koreans who were detained during an ICE raid at a Hyundai plant in Ellabell,
    Georgia, United States, last Thursday. (NPR)
  - Immigration policy of the second Trump administration
  - Deportation in the second Trump administration
  - The United States Department of Homeland Security launches "Operation Midway Blitz",
    an Immigration and Customs Enforcement crackdown on undocumented immigrants in
    Illinois with serious criminal records, while state officials say they received
    no formal notice of the operation. (Reuters)
  - E. Jean Carroll v. Donald J. Trump, Donald Trump sexual misconduct allegations,
    Personal and business legal affairs of Donald Trump
  - The United States Court of Appeals for the Second Circuit rejects President Donald
    Trump's bid on the grounds of presidential immunity to overturn the civil ruling
    of Carroll I (2019), upholding that Trump must pay $83,300,000 to sexual abuse
    victim E. Jean Carroll for defamation. (The New York Times) (Reuters)
  - The US House Oversight Committee releases a "birthday book" compiled for Jeffrey
    Epstein in 2003, which includes a note allegedly signed by President Donald Trump;
    the White House denies its authenticity. The book is part of a larger set of documents.
    (BBC)
  - Frédéric Péchier case
  - French doctor Frédéric Péchier is tried for allegedly intentionally poisoning
    30 people, including twelve fatally, at two clinics in Besançon, Bourgogne-Franche-Comté,
    France. (BBC News)
  - Phillips family disappearances
  - Tom Phillips, a man who kidnapped his three children during a dispute with their
    mother and brought them to a remote countryside in 2021, is fatally shot by a
    police officer after shooting and critically injuring another officer in the head
    following a robbery at an agricultural supplies store in Waikato, New Zealand.
    All the three children are rescued. (The New Zealand Herald)
  - 2025 Balçova police station shooting
  - Two police officers are killed and three other people are injured in a mass shooting
    at a police station in İzmir, Turkey. The 16-year-old perpetrator is arrested.
    (WTOP)
  - 2025 Ivorian presidential election
  - Ivory Coast's Constitutional Council bars former president Laurent Gbagbo and
    former Credit Suisse CEO Tidjane Thiam from running in the upcoming presidential
    election, while approving five candidacies including President Alassane Ouattara
    and Gbagbo's wife Simone. (Reuters)
  - 2025 Norwegian parliamentary election
  - Norwegians vote to elect all 169 members of the Storting using party-list proportional
    representation in 19 multi-member constituencies. (Reuters)
  - The left-wing red–green coalition, led by the Labour Party, wins a majority with
    87 seats, while the right-wing populist Progress Party becomes the second biggest
    party with 48 seats and the centre-right Conservative Party has its worst performance
    in 20 years, with 24 seats. (The Guardian)
  - 2025 Norwegian Sámi parliamentary election
  - The Norwegian Sámi people vote to elect all 39 members of the Sámi Parliament
    of Norway using party-list proportional representation in seven multi-member constituencies.
    (NRK)
  - 2024–2025 French political crisis
  - The French Bayrou government collapses after losing a vote of confidence in the
    National Assembly by 364 votes to 194. (BBC News)
  - The Philippine Senate elects Tito Sotto as Senate president, replacing Chiz Escudero
    after 15 senators voted for a leadership change that also realigned majority and
    minority blocs. (Bloomberg News) (Philippine Daily Inquirer)
  - Indonesian president Prabowo Subianto reshuffles his cabinet, appointing four
    new ministers and one deputy minister and establishing a new department, the Ministry
    of Hajj and Umrah. The removal of finance minister Sri Mulyani causes a sharp
    drop in the country's main stock market index as well as the rupiah. (Tempo) (Reuters)
  - Ugandan police detain the deputy spokesperson of the opposition party National
    Unity Platform (NUP) outside a court in Kampala where he was attending a bail
    hearing for party members held on charges the NUP describes as politically motivated.
    (Reuters)
