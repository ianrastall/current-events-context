Date: '2025-09-22'
Source_URI: Portal:Current events/2025 September 22
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza City offensive
  - At least 37 Palestinians are killed from Israeli attacks on the Gaza Strip, including
    30 in Gaza City. (Al Jazeera)
  - Gaza war hostage crisis
  - Hamas releases a video giving a sign of life for hostage Alon Ohel, who was kidnapped
    during the October 7 attacks. (The Times of Israel) (YNet)
  - Russian invasion of Ukraine
  - Zaporizhzhia strikes, Attacks on civilians in the Russian invasion of Ukraine
  - Russian forces strike Zaporizhzhia with at least ten glide bombs, killing three
    people and injuring two others. The overnight attack damages at least 15 apartment
    buildings and ten private homes in residential areas of the city. (Reuters)
  - Insurgency in Khyber Pakhtunkhwa
  - A bomb explodes at a Pakistani Taliban compound in the Tirah Valley in Khyber
    Pakhtunkhwa during a raid, killing at least 24 people, including ten civilians
    and fourteen militants. (AP) (DW)
  - Islamist insurgency in Niger
  - An airstrike near a market in Injar, Tillabéri Region, Niger, kills at least 30
    people. (Reuters)
  - Disciplinary actions for commentary on the assassination of Charlie Kirk
  - Suspension of Jimmy Kimmel Live!
  - ABC parent company Disney announces that American late-night talk show Jimmy Kimmel
    Live! will begin airing again on Tuesday after it was "indefinitely suspended"
    last week following pressure from the Trump administration after host Jimmy Kimmel
    commented on slain right-wing political activist Charlie Kirk and his fanbase.
    (NPR)
  - Stocks in Kenvue Inc. fall by 5% after the second Trump administration issues
    statements citing acetaminophen under their brand name Tylenol as a cause of autism.
    (Fortune)
  - 2024 European heatwaves
  - Nature Medicine publishes a report that Europe had over 62,700 heat-related deaths
    in 2024, with women and elderly people representing the largest part of the death
    toll. (MSN)
  - 2025 Pacific typhoon season
  - Typhoon Ragasa makes landfall in Luzon, Philippines, killing at least three people
    and leaving six others missing, and triggering alerts and evacuation orders in
    nearby Hong Kong and southern China. (CNN) (News.az)
  - Twenty-five miners are trapped about underground after a gold mine collapses in
    Segovia, Antioquia, Colombia, with authorities confirming contact, stable health
    conditions, and ongoing rescue operations. (AFP via CTV News)
  - 2020–2025 H5N1 outbreak
  - Poland reports an outbreak of highly pathogenic H5N1 avian influenza on poultry
    farms in Susz, Warmian–Masurian Voivodeship, where around 4,000 birds have died.
    (Reuters)
  - Causes of autism
  - U.S. president Donald Trump and health sectretary Robert F. Kennedy Jr. announce
    the U.S. Food and Drug Administration will advise doctors against recommending
    acetaminophen to pregnant women, alleging a link between the drug and autism.
    (CNN)
  - The U.S. Food and Drug Administration approves leucovorin for the treatment of
    cerebral folate deficiency, citing evidence that it can improve autistic features.
    (Reuters)
  - International recognition of Palestine
  - Andorra, France, Luxembourg, Malta, Monaco, and San Marino formally recognize
    the State of Palestine as a sovereign state with full rights. (Reuters) (CNN)
  - Israel–Singapore relations
  - Singapore announces targeted sanctions on leaders of Israeli settler groups, citing
    concerns over settlement expansion in the occupied Palestinian territories. (Reuters)
  - Burkina Faso, Mali, and Niger (the Alliance of Sahel States) announce their withdrawal
    from the International Criminal Court, citing its ineffectiveness. (AFP via France
    24)
  - Ecuadorian conflict
  - Fourteen people are killed, including a guard, 14 others are injured and inmates
    escape during clashes between rival gangs at a jail in Machala, El Oro Province,
    Ecuador. (BBC News)
  - About 1,000 protestors attack and destroy most of a police station along with
    vehicles and the houses of officers in Otavalo, Imbabura Province, Ecuador. Two
    people are injured. (AP)
  - International Criminal Court investigation in the Philippines
  - The International Criminal Court (ICC) charges former Philippine president Rodrigo
    Duterte with crimes against humanity for his alleged involvement in the killing
    of at least 76 people during his term as president and Davao City mayor. He was
    arrested in March under an ICC arrest warrant and is currently held in a detention
    facility in the Netherlands. (NPR) (BBC News)
  - Executive orders in the second Trump presidency
  - U.S. president Donald Trump signs an executive order formally designating Antifa
    as a terrorist organization. (Reuters)
  - Copenhagen Airport in Denmark and Oslo Airport in Norway are both closed and all
    flights are diverted after multiple "large drones" are sighted near the airports.
    It is unclear where the drones originated from or who is operating them. (BBC
    News) (Times Now)
  - 2025 Guinean constitutional referendum
  - Provisional results show that over 90% of voters in Guinea approve a constitutional
    change that permits members of the ruling junta to seek the presidency and extend
    term limits, amid opposition boycotts and criticism that the process consolidates
    military power. (AP)
  - 2025 Moldovan parliamentary election
  - Moldovan police conduct 250 raids and detain 74 people as part of an investigation
    into an alleged Russia-supported plan to provoke unrest before the parliamentary
    election, with officials stating that suspects received training in Serbia while
    Russia denies involvement. (AP)
  - Human rights in Egypt
  - Egyptian president Abdel Fattah el-Sisi grants a presidential pardon to activist
    Alaa Abd El-Fattah after he was detained in 2015 and re-arrested in 2019 for participating
    in unauthorized protests. Abd el-Fattah was expected to be released in September
    2024 after his 5-year sentence ended but was continuously detained until now.
    (DW) (Reuters)
  - Costa Rican president Rodrigo Chaves Robles survives a congressional vote to lift
    his immunity, falling short of the required majority, after prosecutors accused
    him of abuse of power in a corruption case. (AFP/BSS)
  - 2025 Ballon d'Or
  - In association football, French player Ousmane Dembélé and Spanish player Aitana
    Bonmatí are awarded their first Ballon d'Or and third consecutive Ballon d'Or
    Féminin, respectively. (The Daily Jagran)
  - 2025 CFL season
  - Canadian Football League (CFL) commissioner Stewart Johnston announces significant
    changes to the rules and playing field of the CFL, to take effect in starting
    in the 2026 and 2027 season, respectively. (TSN)
  - In ski mountaineering, Polish climber Andrzej Bargiel becomes the first person
    to complete a continuous ski descent of Mount Everest without supplemental oxygen.
    (CBS News)
