Date: '2025-09-26'
Source_URI: Portal:Current events/2025 September 26
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza City offensive
  - At least 60 Palestinians are killed in Israeli attacks across the Gaza Strip.
    (Al Jazeera)
  - Médecins Sans Frontières suspends its activities in Gaza City citing security
    concerns due to the Israeli offensive. (MSF)
  - Economy of Botswana
  - Botswana president Duma Boko announces the launch of a immigrant investor program
    aimed at raising funds to diversify the economy amid a recession in the global
    diamond market. (Reuters)
  - German economic crisis, Workplace impact of artificial intelligence
  - German automotive supplier Bosch announces it will lay off 5,000 employees by
    2030, including 3,800 in Germany. (DW)
  - 2025 Pacific typhoon season
  - Ten people are confirmed killed as Typhoon Bualoi makes landfall in Visayas and
    southern Luzon in the Philippines since yesterday. (Philippine Daily Inquirer)
    (Reuters)
  - At least 100 people are feared dead following the collapse of a gold mining pit
    in Zamfara State, Nigeria. (Reuters)
  - At least 14 people are killed when a minibus collides with two trucks in the southern
    Peruvian Andes, Peru. (AP)
  - Eleven people are killed and 33 are injured when a building collapses following
    a fire in Nile Delta, Egypt. (AP)
  - At least eleven people are killed and three others are injured after a truck crashes
    in Dera Ismail Khan, Khyber Pakhtunkhwa, Pakistan. (Dawn)
  - Six people are killed and six others are injured when a roof collapses at a steel
    plant in Raipur, Chhattisgarh, India. (NDTV)
  - A fire at a South Korean government data center in Daejeon disrupts more than
    600 e-government systems after an explosion in a lithium-ion battery triggered
    the blaze. (The Independent)
  - Colombia–United States relations
  - The United States revokes Colombian president Gustavo Petro's visa following his
    participation in a pro-Palestinian demonstration in New York and his remarks urging
    U.S. soldiers to disobey President Donald Trump's orders. (Reuters)
  - 1991 Austin yogurt shop murders
  - Deceased serial killer Robert Eugene Brashers is identified as the prime suspect
    in the quadruple homicide at an I Can't Believe It's Yogurt! shop in Austin, Texas,
    United States. (CBS News)
  - 2025 Danish drone incidents
  - Air Base Karup in Central Denmark Region, Denmark, is closed due to a drone sighting
    above the military base. Danish authorities describe the incident as part of an
    ongoing "hybrid attack". (BBC News)
  - 2025 Department of Justice counterinvestigation into Russian interference in the
    2016 election
  - Former United States FBI director James Comey is indicted by a federal grand jury
    on two charges in a prosecution led by Lindsey Halligan, the U.S. attorney for
    the Eastern District of Virginia. (BBC News)
  - Corruption in Lebanon
  - Lebanese authorities release former central bank governor Riad Salameh after he
    posts bail of US$14 million and LL 5 billion ($55,866) while facing ongoing charges
    of alleged financial crimes. (Reuters)
  - Human rights in Vietnam
  - Vietnamese activist Trịnh Bá Phương, already serving a 10-year sentence for anti-state
    propaganda, is sentenced to an additional 11 years after being convicted of writing
    statements against the Communist Party while in prison. (AP)
  - LGBTQ rights in Slovakia
  - Slovakia passes a constitutional amendment stating there are only two genders.
    Only married couples have the right to adopt, which de facto prevents same-sex
    couples from adopting, while also banning surrogacy. (Politico)
  - 2025 Moldovan parliamentary election
  - Moldova's electoral commission removes the Greater Moldova and Heart of Moldova
    parties from the ballot ahead of Sunday's election, citing alleged illegal financing
    and foreign funding. (Reuters)
  - FIFA suspends seven Malaysian national football players for one year and fines
    the Football Association of Malaysia over alleged use of falsified documentation
    in 2027 Asian Cup qualifiers, a decision the association says it will appeal.
    (AFP via NDTV)
  - The members of the International Paralympic Committee vote not to maintain sanctions
    against the Russian and National Paralympic Committees. (IPC)
