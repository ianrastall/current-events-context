Date: '2025-09-18'
Source_URI: Portal:Current events/2025 September 18
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - At least 50 Palestinians are killed in Israeli attacks across the Gaza Strip,
    including 40 killed in Gaza City. (Al Jazeera)
  - A Jordanian truck driver bringing aid to the Gaza Strip kills two Israeli military
    personnel before being fatally shot by security personnel at the Allenby Bridge.
    (Reuters)
  - The United States casts its sixth veto over a draft United Nations Security Council
    resolution calling for a permanent ceasefire in Gaza, the lifting of Israeli restrictions
    on aid, and the release of all hostages. (Reuters)
  - Red Sea crisis
  - A Houthi drone attack damages a hotel in Eilat, Israel. (Jerusalem Post) (Reuters)
  - Insurgency in Balochistan
  - Two security personnel are killed and twenty-three others are injured when a suicide
    car bomb targets a security convoy in Turbat, Balochistan, Pakistan. Meanwhile,
    six people are killed in a separate car bombing in Chaman. (AP)
  - At least ten people are killed and 25 others are injured when a fire breaks out
    in a high-rise office building in Lagos, Nigeria. (BBC News)
  - Three people, including musician Brett James, are killed when James's Cirrus SR22T
    aircraft crashes near Macon County Airport in North Carolina, United States. (ASN)
    (FOX17)
  - A 7.8 magnitude earthquake strikes Kamchatka, Russia, but there were no reports
    of damage. Tsunami warnings are issued for the region. (Reuters) (TVP Info)
  - Poland–Ukraine relations, 2025 Russian drone incursion into Poland
  - Ukraine announces it will train Polish troops and engineers in counter-drone operations
    following recent Russian drone incursions into Polish airspace. (Al Jazeera)
  - Syria–United States relations
  - Syrian foreign minister Asaad al-Shaibani visits Washington, D.C. to attend meetings
    with the World Bank and the International Monetary Fund, and to meet with Israeli
    delegations and U.S. secretary of state Marco Rubio, marking the first time a
    Syrian official has visited the United States in 25 years. (AP)
  - Egypt's interior ministry reports that a 3,000-year-old gold bracelet belonging
    to the pharaoh Amenemope, missing from the Egyptian Museum in Cairo, was stolen,
    melted and sold, with several suspects arrested. (BBC News)
  - Iraq receives 47 French nationals previously detained in northeast Syria on suspicion
    of Islamic State membership for prosecution on terrorism charges. (AP)
  - 2025 Albanian parliamentary election
  - Albanian prime minister Edi Rama begins an unprecedented fourth term following
    the Socialist Party's victory in the last election. (Reuters)
  - Censorship in the Maldives
  - Maldivian president Mohamed Muizzu ratifies the Media and Broadcasting Regulation
    Law, which allows fines, license suspensions, and closures of media outlets found
    in violation of its provisions. (AP)
  - Bulgarian prime minister Rosen Zhelyazkov's government survives their fifth vote
    of no-confidence this year over alleged failures to reform the justice and security
    sectors, with 133 lawmakers opposing and 101 supporting the motion. (Reuters)
  - In the United States, automaker Toyota recalls over 590,000 vehicles due to a
    software failure for its dashboard that hides vehicle speed, braking status, and
    tire pressure warnings. Meanwhile, Hyundai recalls over 568,000 Palisades due
    to seatbelt buckle failures. (AP) (Yahoo! Autos)
