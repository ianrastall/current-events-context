Date: '2025-09-02'
Source_URI: Portal:Current events/2025 September 2
Intelligence_Payload:
  Uncategorized:
  - War on drugs, United States–Venezuela relations
  - 2025 United States war on cartels
  - 2025 United States strike on a Southern Caribbean boat
  - The United States military conducts a precision strike and sinks a Venezuelan
    boat reportedly used by Tren de Aragua for smuggling drugs in the Caribbean Sea,
    killing 11 people. The Trump administration reports it currently has no plans
    of attacking the Venezuelan government. (CBS News) (USA Today)
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - At least 105 Palestinians are killed during Israeli airstrikes and shootings across
    the Gaza Strip. (Al Jazeera)
  - Insurgency in Balochistan
  - At least 14 people are killed and dozens of others are injured, including seven
    critically, in a suicide bombing at a political rally in Quetta, Balochistan,
    Pakistan. (Digital Journal)
  - An attack near the Iran–Pakistan border in Balochistan, Pakistan, kills five people.
    (AFP via France 24)
  - Insurgency in Khyber Pakhtunkhwa
  - Six soldiers and six militants are killed in a suicide attack on a paramilitary
    base in Bannu, Khyber Pakhtunkhwa, Pakistan. (The Hindu)
  - Economy of Brazil
  - Brazil's Federal Senate approves a constitutional amendment that phases in court-ordered
    debt payments to fiscal target calculations beginning in 2027, initially counting
    10% of the total and gradually reaching full inclusion over up to ten years. (Reuters)
  - At least 60 people are killed and dozens rescued after an overloaded boat carrying
    more than 100 passengers strikes a submerged tree stump and capsizes on the Niger
    River near Borgu, Niger State, Nigeria, with search operations continuing for
    missing persons. (Reuters)
  - Belgium–Palestine relations, Belgium–Israel relations, International recognition
    of Palestine
  - Belgian foreign minister Maxime Prévot announces that Belgium will conditionally
    recognize a Palestinian state at the upcoming United Nations General Assembly
    session upon the release of hostages and removal of Hamas, and impose sanctions
    on Israel, including bans on products from Israeli settlements and restrictions
    on certain public contracts. (Reuters)
  - Catholic Church sexual abuse cases
  - A Bolivian court sentences two Spanish Jesuit priests to a year in prison for
    failing to report child sexual abuse by a fellow priest, whose posthumous diary
    revealed he abused at least 85 minors between 1972 and 2000. (Reuters)
  - Prosecution of Syrian civil war criminals
  - French judges issue arrest warrants for seven former senior Ba'athist Syrian officials,
    including former president Bashar al-Assad, on charges of complicity in war crimes
    and crimes against humanity for a 2012 rocket attack on a media center in Homs
    that killed journalists Marie Colvin and Rémi Ochlik and injured others. (Reuters)
  - Five people are injured, including one critically and two seriously, in a mass
    stabbing attack at a hotel and a nearby street in Marseille, France. The perpetrator,
    a 35-year-old Tunisian, is fatally shot by police. (Le Monde)
  - An Argentine court places the daughter of Nazi adviser Friedrich Kadgien and her
    husband under house arrest and accuses them of stealing the painting Portrait
    of a Lady, which had been missing since 1945. (AP)
  - A Turkish court annuls the Istanbul provincial congress of the Republican People's
    Party over alleged procedural violations, dismissing local leaders including the
    Istanbul chair, and appoints an interim committee to oversee the branch. (AP)
    (Reuters)
