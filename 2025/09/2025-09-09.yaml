Date: '2025-09-09'
Source_URI: Portal:Current events/2025 September 9
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - 2025 Gaza City offensive
  - The Israeli Defense Forces issues an evacuation order for the entirety of Gaza
    City amidst its renewed offensive. (CNN)
  - Israeli airstrike on Hamas leadership in Qatar
  - The Israeli Air Force carries out a series of airstrikes against the Hamas leadership's
    office in Doha, Qatar, during a meeting. Six people are killed; however, the entire
    leadership survived according to Palestinian and Hamas sources. A member of the
    Qatari security forces is among the fatalities. (Al Jazeera) (BBC News) (Al Arabiya)
  - Red Sea crisis
  - The Houthis launch a ballistic missile at Israel, which is intercepted. (The Times
    of Israel) (YNet)
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine, Eastern Ukraine campaign
  - A Russian airstrike kills at least 24 people collecting their pensions in Yarova,
    Donetsk Oblast, Ukraine. (Reuters)
  - 2025 Nepalese Gen Z protests
  - Nepalese prime minister K.P. Sharma Oli resigns in response to the protests amid
    a government collapse. (News24) (Reuters)
  - The Federal Parliament building is stormed and set on fire by protesters. (Al
    Jazeera)
  - Foreign minister Arzu Rana Deuba and her husband, former prime minister Sher Bahadur
    Deuba, are assaulted at their residence. (Himalpress)
  - A video shows finance minister Bishnu Prasad Paudel being beaten and dragged through
    the streets of Kathmandu by protesters. His condition is unknown. (NDTV)
  - The private residence of President Ram Chandra Poudel is stormed and vandalized
    by protesters while the headquarters of the Communist Party of Nepal (UML) and
    the Nepali Congress party are both destroyed. (Israel Hayom)
  - Nakhu Jail in Lalitpur District, Bagmati Province, is stormed by protesters and
    all inmates are freed, including prominent opposition figure Rabi Lamichhane.
    The prison is then set ablaze. (Setopati)
  - Kathmandu's Tribhuvan International Airport is closed and occupied by the Nepali
    Army, while several airlines suspend flights to Nepal due to the ongoing civil
    unrest. (Online Khabar) (The Economic Times)
  - Seven members of a single family are killed in the detonation of explosives stockpiled
    inside a house in Bala Buluk District, Farah Province, Afghanistan. (Amu TV)
  - World War II bomb disposal in Europe
  - Police in Bratislava, Slovakia, evacuate several downtown blocks and suspend traffic
    and public transport after the discovery of a 500-pound (225-kilogram) World War
    II unexploded bomb in a construction site. (AP)
  - UNICEF reports that for the first time, obesity has surpassed undernourishment
    as the leading form of global malnutrition among children and adolescents. (AFP
    via France 24)
  - Cambodia–United States relations, Myanmar–United States relations
  - The United States announces more sanctions on cyber scamming rings operating in
    Cambodia and Myanmar. (Reuters)
  - Iraq–Israel relations, Iraq–United States relations
  - Iraqi Shia militia Kata'ib Hezbollah releases Russian–Israeli researcher Elizabeth
    Tsurkov who was abducted in 2023 during a research trip to Iraq following negotiations
    involving Israel and the United States. (CNBC)
  - Nuclear program of Iran
  - Iran and the International Atomic Energy Agency agree to resume nuclear site inspections
    which were suspended after U.S. and Israeli strikes, with Iran warning the deal
    will be void if international sanctions are reimposed. (Reuters)
  - Former German minister of foreign affairs Annalena Baerbock is elected and sworn
    in as the new president of the United Nations General Assembly. (Forbes)
  - Ecuadorian conflict
  - Ecuadorian police seize more than US$313 million in real estate assets from the
    armed group Comandos de la Frontera, which the government links to drug-related
    organized crime. (Reuters)
  - LGBTQ rights in Hong Kong
  - The Hong Kong Court of First Instance rules that a lesbian couple are both legal
    parents of their son born through reciprocal in vitro fertilization, marking a
    landmark case in parental recognition for same-sex couples in Hong Kong. (AP)
  - An arson attack on two power poles in Berlin, Germany, causes a widespread blackout
    affecting the Berlin S-Bahn, emergency services, and more in the southeastern
    part of the city. (Tagesschau) (Reuters)
  - Swedish prime minister Ulf Kristersson announces that the government will lower
    the age of criminal responsibility from 15 in response to rising cases of criminal
    gangs recruiting children to commit serious crimes. (Reuters)
  - The Thai Supreme Court rules that former prime minister Thaksin Shinawatra must
    serve a one-year prison term for corruption, declaring his prior hospital detention
    unlawful. (BBC News)
  - 2025 Indian vice presidential election
  - Elections take place for the next vice president of India following the early
    resignation of Jagdeep Dhankhar. (The Hindu)
  - C.P. Radhakrishnan is elected as the 15th vice president of India. (India Today)
  - 2024–2025 French political crisis
  - French prime minister François Bayrou formally submits his resignation after losing
    a vote of confidence in the National Assembly the day before. President Emmanuel
    Macron appoints Sébastien Lecornu as the new prime minister. (Reuters)
  - 2025 Bougainvillean general election
  - Off-island voting in the Autonomous Region of Bougainville's general election
    concludes, with vote counting expected to begin on Thursday. (Papua New Guinea
    Post-Courier)
  - Ethiopia fully launches the Grand Ethiopian Renaissance Dam, Africa's largest
    hydroelectric dam, sparking concerns about Nile water security from Egypt and
    Sudan. (TRT)
