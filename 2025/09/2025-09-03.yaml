Date: '2025-09-03'
Source_URI: Portal:Current events/2025 September 3
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - More than 70 Palestinians are killed by the Israeli military in the Gaza Strip.
    (Al Jazeera)
  - Red Sea crisis
  - The Houthis launch a ballistic missile at Israel, which is intercepted. (Reuters)
  - War in the Sahel
  - Boko Haram insurgency
  - Nigeria's air force kills more than 15 Islamist fighters in an airstrike on hideouts
    in Borno's Sambisa forest, while troops separately kill 13 Boko Haram militants
    after repelling an ambush on a military convoy along the Gubio–Damasak road. (Reuters)
  - Mali War
  - Jama'at Nasr al-Islam wal Muslimin spokesman Abou Houfeiza al-Bambari announces
    a blockade on all fuel trucks that enter Mali. (TRAC Terrorism)
  - Islamic State insurgency in Puntland
  - Puntland counter-terrorism operations
  - Puntland forces kill at least 15 ISIS fighters and capture key militant positions,
    including Ceelasha Burti-Cise and Af-ka Dharimood in the Baallade Valley, following
    a series of intense military operations in the broader Cal Miskaad Mountains of
    the Bari region, Puntland. (AllAfrica)
  - Russian invasion of Ukraine
  - Russia fires more than 500 drones and two dozen missiles at Ukraine overnight,
    targeting mostly western and central Ukraine and wounding at least five people,
    in response to the attacks, Poland scrambles its fighter jets and places ground-based
    air defenses and radar systems on maximum readiness. (Newsweek) (AP)
  - The Nazi-looted painting Portrait of a Lady by Giuseppe Vittore Ghislandi is handed
    over to the Argentine justice system after being discovered on display in a private
    house in Mar del Plata, Argentina. (NOS)
  - 2025 United States–India diplomatic and trade crisis, Tariffs in the second Trump
    administration
  - India approves cutting taxes on hundreds of consumer goods in response to new
    U.S. tariffs imposed on India last month. The overhaul cuts the consumption tax
    from a four-tier structure to a two-rate structure. (AP)
  - 2025 Punjab, India floods
  - At least 30 people are killed in flash floods caused by cloudbursts, landslides,
    and waterlogging across north India, including in Punjab, Odisha, and Jammu and
    Kashmir. Casualty numbers are expected to increase. (DW) (Reuters)
  - Ascensor da Glória derailment
  - Sixteen people are killed and 22 others are injured when the Ascensor da Glória
    funicular crashes into a building in Lisbon, Portugal. The Portuguese government
    declares a day of mourning for the following day in remembrance of those deceased.
    (Reuters) (BBC News) (NPR)
  - Seven migrants are found dead on beaches after several boats from Algeria sink
    off the coast of Andalusia, Spain, as authorities rescue 26 people from one vessel
    and 38 from another and continue searching for additional victims. (AFP via Dawn)
  - One person is killed, another is injured, and five others are reported missing
    during an accident on a Hanwha Ocean floating production storage and offloading
    ship at a shipyard in South Korea. (Upstream)
  - A rescue team locates the burnt remains of the EastIndo passenger MBB/Kawasaki
    BK 117 helicopter that went missing on Monday in Kalimantan, Indonesia, on the
    island of Borneo and recovers one body. (AP)
  - 2025 China Victory Day Parade
  - China holds a military parade in Beijing to commemorate the 80th anniversary of
    the end of World War II. The event is attended by the leaders of about two dozen
    countries. (AP)
  - Czech Republic–Germany relations
  - Czech defence minister Jana Černochová announces that the Czech government signed
    a deal to pay Kč34 billion (US$1.6 billion) for 44 Leopard 2A8 tanks from Germany
    as part of its efforts to modernize the Armed Forces. (AP)
  - Odebrecht case
  - A Peruvian court sentences former president Alejandro Toledo to 13 years and four
    months in prison for laundering S/18 million (US$5.1 million) in bribes from Brazilian
    construction company Odebrecht through offshore accounts to purchase and refinance
    properties in Lima, with the sentence to run concurrently with his earlier conviction
    for accepting S/124 million ($35 million) in kickbacks. (Reuters)
  - Three people are killed and the perpetrator is injured in a mass stabbing in a
    pizza restaurant in Gwanak District, Seoul, South Korea. (The Japan Times)
  - A Moroccan court sentences human rights activist Ibtissame Lachgar to 30 months
    in prison and a fine of DH50,000 (US$5,510) for blasphemy, with her lawyers stating
    they will appeal. (AFP via France 24)
  - 2025 Jamaican general election
  - Jamaicans vote to elect the 63 members of the Parliament using first-past-the-post
    voting. The two leading parties are the ruling Jamaica Labour Party and the opposition
    People's National Party. (Caribbean Life)
  - 2025 Saint Helena general election
  - Residents of Saint Helena, a British Overseas Territory, vote for the twelve members
    of the Legislative Council using plurality block voting. (MercoPress)
  - 2025 Thai political crisis, 2025 Cambodian–Thai border crisis
  - The ruling Pheu Thai Party of the acting government of Thailand moves to dissolve
    the parliament, setting up for a new election, after Prime Minister Paetongtarn
    Shinawatra was dismissed from office due to her phone call leak with Cambodia.
    (DW)
  - Composition of Mars
  - Scientists report that Mars has a solid inner core of iron and nickel about 613
    kilometers in radius, surrounded by a liquid outer core, based on seismic data
    from NASA's InSight lander. (AP)
