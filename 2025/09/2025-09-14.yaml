Date: '2025-09-14'
Source_URI: Portal:Current events/2025 September 14
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip, 2025 Gaza City offensive
  - At least 53 Palestinians are killed by Israeli attacks, including 35 in Gaza City
    where the Israeli army has been concentrating its assault. (Al Jazeera)
  - Colombian conflict
  - A police officer is killed and four others are injured in an attack on a police
    station in Cauca, Colombia, by FARC dissidents, prompting military deployment
    to restore order. (The Times of India)
  - Islamist insurgency in Niger
  - The Nigerien government reports that at least fourteen soldiers were killed in
    ambushes by unknown militants in the Tillabéri Region last week. (AP)
  - 77th Primetime Emmy Awards
  - At the 2025 Primetime Emmy Awards in the United States, The Studio becomes the
    most-nominated first-year comedy series in the awards' history at 23 nominations,
    tying The Bear's nominations from last year. (Variety)
  - For the first time in the awards' history, every nominee for Outstanding Writing
    for a Comedy Series has at least one woman on the writing team. (Variety)
  - The Studio wins Outstanding Comedy Series and The Pitt wins Outstanding Drama
    Series, while Adolescence wins Outstanding Limited or Anthology Series. (The Hollywood
    Reporter)
  - English actor Owen Cooper wins the Primetime Emmy Award for Outstanding Supporting
    Actor in a Limited or Anthology Series or Movie for his role in Adolescence, becoming
    the youngest male recipient of an Emmy Award. (Daily Tribune)
  - Tramell Tillman becomes the first Black man to win the award for Outstanding Supporting
    Actor in a Drama Series for his work in Severance. (Variety)
  - The Bob Hope Humanitarian Award is awarded to married actors Ted Danson and Mary
    Steenburgen in recognition of "a lifetime of philanthropy", marking the first
    time the award is presented to a couple. (Television Academy)
  - 2025 Kasaï Province Ebola outbreak
  - The World Health Organization begins Ebola vaccinations for exposed individuals
    and health workers in Kasaï Province, Democratic Republic of the Congo. (AP)
  - 2025 Turkish protests
  - Over 50,000 people march in Ankara, Turkey, to protest against and call for President
    Recep Tayyip Erdoğan to resign following the government's judicial coup against
    the country's opposition party, Republican People's Party, and its leader Özgür
    Özel. (DW)
  - Algerian president Abdelmadjid Tebboune appoints Sifi Ghrieb as prime minister
    following Nadir Larbaoui's dismissal in August. (Reuters)
  - 2025 Vuelta a España
  - Danish rider Jonas Vingegaard wins the annual Vuelta a España road cycling race
    in Spain. (Le Monde)
  - The final stage of the race is suspended following pro-Palestinian protests against
    the Israel–Premier Tech team on Paseo del Prado in Madrid. (CNN)
  - EuroBasket 2025
  - In basketball, Germany defeats Turkey 88–83 in the EuroBasket 2025 final, with
    Dennis Schröder selected as the MVP. In the third-place match, Greece beats Finland.
    (FIBA)
