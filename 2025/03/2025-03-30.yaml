Date: '2025-03-30'
Source_URI: Portal:Current events/2025 March 30
Intelligence_Payload:
  Uncategorized:
  - Red Sea crisis
  - Israel intercepts a ballistic missile fired from Yemen in the eighth Houthi attack
    since the Israeli Defense Force resumed the Gaza war. The Houthis claim to have
    launched three attacks with drones, missiles, and naval forces against the aircraft
    carrier in the past 24 hours. (The Times of Israel)
  - 2025 Myanmar earthquake
  - Structures and infrastructure affected by the 2025 Myanmar earthquake
  - The count of the total amount of destroyed ancient pagodas and religious buildings
    in Myanmar rises to 61, including the previously unreported Four-Storied Monastery
    in Inwa, Mandalay Region. (NP)
  - Severe weather and tornadoes break out in the areas between south Indiana and
    north east Texas, United States. (The New York Times)
  - A bus lost control and crashed in Katsina State, Nigeria, killing nine and injuring
    11. (The Guardian)
  - Four people are killed after two cars collide on PJ Patterson Highway, Jamaica.
    (St Vincent Times)
  - Three children are killed and three other people are injured after a tree hits
    their vehicle near Kalamazoo, Michigan. (AP)
  - A 7.0 M earthquake strikes near the island country of Tonga with a 6.1 M aftershock.
    A tsunami warning is issued and later lifted. (AP)
  - Middle Eastern crisis
  - Iranian president Masoud Pezeshkian says that Iran will not have direct negotiations
    with the U.S. on its nuclear program, but is open for indirect talks to rebuild
    trust, after U.S. president Donald Trump threatened "bombing" if Iran does not
    agree to a new nuclear deal. (Al Jazeera) (Reuters)
  - A bus driver shoots and kills two passengers on a Miami-Dade Transit bus in Miami
    Gardens, Florida, United States. (AP)
  - German space programme
  - The uncrewed German-built Spectrum orbital rocket is launched in Andøya, Norway,
    becoming the first orbital rocket to launch from mainland Europe. The rocket stays
    in the air for just over half a minute before striking the ground and exploding.
    (The Guardian) (VG)
