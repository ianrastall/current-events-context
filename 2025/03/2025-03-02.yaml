Date: '2025-03-02'
Source_URI: Portal:Current events/2025 March 2
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza war ceasefire
  - Israel agrees to a United States-led plan to extend the first phase of the ceasefire
    through Ramadan and Passover, during which half of the 59 remaining hostages will
    be released. Hamas rejects the proposal, insisting that the deal proceed with
    phase two, which includes the release of all remaining living hostages, a full
    withdrawal of Israeli troops from Gaza and a permanent end to the war. (The Times
    of Israel)
  - Russian invasion of Ukraine
  - One person was killed in a Russian drone strike in Kherson. Kyiv Independent)
  - Russian forces claimed to have taken the village of Zhuravka after crossing into
    Sumy Oblast. (Institute for the Study of War)
  - Russian forces also claimed to have taken the village of Pryvline, northwest of
    Velyka Novosilka. (Institute for the Study of War)
  - Israeli bombing of the Gaza Strip
  - At least four Palestinians are killed and six wounded in Israeli attacks across
    the Gaza Strip. (Al Jazeera )
  - 2025 Shabelle offensive
  - The Somali National Army completed an operation that killed more than 40 al-Shabaab
    members. (Reuters)
  - Operation Azm-e-Istehkam
  - Thirteen insurgents and four soldiers are killed while 13 soldiers are wounded
    in a coordinated series of attacks in military posts in North Waziristan, Pakistan.
    (South Asia Terrorism Portal)
  - Syrian Civil War
  - The SOHR reported that at least 22 people are killed by gunfire in Syria. (SOHR)
  - 97th Academy Awards
  - The 97th Academy Awards take place at the Dolby Theatre in Los Angeles, United
    States. Anora wins the most awards, taking five, including Best Picture and Best
    Actress for Mikey Madison. Adrien Brody wins Best Actor for The Brutalist. (Reuters)
  - Anora director Sean Baker becomes the first person to win four Academy Awards
    (Best Picture, Best Director, Best Original Screenplay, and Best Film Editing)
    for a single film, also tying Walt Disney's record for most Academy Awards won
    in a single ceremony. (The Independent)
  - I'm Still Here, directed by Walter Salles, becomes the first Brazilian film to
    win at the Academy Awards after being recognized as Best International Feature
    Film. (France 24)
  - 2025 Southeastern United States wildfires
  - Several wildfires erupt across South Carolina and North Carolina, United States,
    resulting in the evacuation of endangered towns, including several in the Myrtle
    Beach area. South Carolina governor Henry McMaster declares a state of emergency
    in response. (The New York Times) (NBC)
  - Five people are killed after a house roof collapses in Tarn Taran District, Punjab,
    India. (The Indian Express)
  - Five people are killed and 25 injured after a bus plunged into a ravine in Shan
    State, Myanmar. (CTN News)
  - Two people are killed and eight injured after a gas explosion in a house in Quetta,
    Pakistan. (Dawn)
  - Peace negotiations in the Russian invasion of Ukraine
  - Coalition of the willing (Russo-Ukrainian War)
  - United Kingdom prime minister Keir Starmer announces after a meeting of European
    Union leaders in London that a "coalition of the willing" is working on a Ukraine
    peace plan that they will present to U.S. president Donald Trump. (Sky News)
  - Following the summit, Volodymyr Zelensky meets King Charles III at Sandringham.
    (BBC News)
  - Russia–United States relations
  - United States Secretary of Defense Pete Hegseth orders a halt to offensive cyber
    operations and information operations against Russia by U.S. Cyber Command. (NBC
    News)
  - 2025 Abkhazian presidential election
  - Acting leader of Abkhazia Badra Gunba is elected President with 55% of the votes.
    Georgia rejects the election, as it claims Abkhazia as part of its territory.
    (Reuters)
  - The Islamic Consultative Assembly removes Abdolnaser Hemmati as economy minister
    after 182 of 273 MPs vote for his impeachment, citing an ongoing economic crisis.
    (Al Jazeera )
  - SNP MSP and deputy presiding officer Annabelle Ewing announces she will not seek
    re-election to Holyrood in 2026. (BBC News)
  - Firefly Aerospace successfully lands the Blue Ghost Mission 1 on the Moon as part
    of NASA's Commercial Lunar Payload Services program, delivering payloads to Mare
    Crisium with instruments to study lunar regoliths and the interactions between
    solar wind and Earth's magnetic field. (Space.com) (NASA)
