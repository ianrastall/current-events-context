Date: '2025-07-27'
Source_URI: Portal:Current events/2025 July 27
Intelligence_Payload:
  Uncategorized:
  - Israeli invasion of the Gaza Strip
  - 2025 Gaza Strip aid distribution killings
  - At least 73 Palestinians are killed while seeking humanitarian aid in the Gaza
    Strip. (Sky News)
  - Gaza Strip famine
  - The Israeli Air Force begins humanitarian aid drops over the Gaza Strip amid growing
    international pressure to allow food into the Palestinian enclave. (BBC News)
  - Somali Civil War
  - 2025 Shabelle offensive
  - Al-Shabaab seizes control of the central Somalia town of Mahaas in the Hiiraan
    region following a ground offensive. The attack began with multiple suicide bombings
    just outside the town, followed by heavy gunfire, prompting the army and local
    Ma'awisley militias to withdraw. (The Somali Digest) (AP)
  - 2025 Cambodia–Thailand border conflict
  - Cambodia and Thailand agree to negotiate a ceasefire following mediation efforts
    by United States Secretary of State Marco Rubio the previous day. However, both
    sides accuse the other of violating the ceasefire. (AP)
  - Allied Democratic Forces insurgency
  - Komanda town massacre
  - Allied Democratic Forces militants attack the city of Komanda, Ituri province,
    Democratic Republic of the Congo, killing 43 people, including 20 during a vigil
    in a Catholic church. (Radio Okapi)
  - New People's Army rebellion
  - Seven New People's Army guerrillas are killed in a military operation in Uson,
    Masbate, Philippines, as Philippine troops pursue remaining insurgents. (AP)
  - Ecuadorian Drug War
  - Seventeen people are killed and 14 others are injured after gunmen open fire on
    a bar in El Empalme, Ecuador. The shooting is believed to be linked to a conflict
    between local drug cartels for control of drug trafficking routes. (BBC News)
  - 2025 Baden-Württemberg train derailment
  - At least three people are killed, including a railway employee and the driver,
    and around 50 others are injured, including 25 seriously, when a Deutsche Bahn
    Regional-Express train carrying 100 people derails in Baden-Württemberg, Germany.
    (ARD)
  - Twenty-five people are killed, 26 others are rescued, and 49 are reported missing
    when a large wooden boat capsizes in Niger State, Nigeria. (CJNI-FM) (Reuters)
  - At least six people are killed and 27 others are injured in a stampede when a
    high-voltage electric wire falls on a path at the Mansa Devi Temple in Haridwar,
    Uttarakhand, India. (AP) (The Independent via Yahoo! News Canada)
  - Tariffs in the second Trump administration
  - United States–European Union relations
  - U.S. president Donald Trump and European Commission president Ursula von der Leyen
    announce a trade deal that would set a reciprocal 15% tariff on all exports and
    promise to boost European Union investment into the U.S. by $600 billion. The
    EU also promises to purchase $750 billion in American energy products over an
    unspecified period of time. (BBC News)
  - North Korea–Russia relations
  - Russian airline Nordwind launches the first commercial flight from Moscow to Pyongyang,
    North Korea. (AP)
  - Capital punishment in Iran
  - Iran executes two members of the exiled terrorist group Mojahedin-e-Khalq on charges
    of carrying out attacks on residential, education, and government buildings. (AP)
  - Three people are killed and ten others are injured in a mass shooting in Turks
    and Caicos, whose authorities are deeming it the first mass shooting in recent
    history, due to an increase in violence spilled over from the gang war in Haiti.
    (AP) (CBS News)
  - UEFA Women's Euro 2025
  - In association football, England defeats Spain 3–1 on penalties in the UEFA Women's
    Euro final to win their second major football championship and successfully defending
    their title. Spain's Aitana Bonmatí is named the tournament's best player. (Reuters)
