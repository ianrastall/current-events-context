Date: '2025-07-23'
Source_URI: Portal:Current events/2025 July 23
Intelligence_Payload:
  Uncategorized:
  - 2025 European and Mediterranean wildfires
  - At least ten firefighters and rescue workers are killed and 14 others are injured
    in a wildfire in Eskişehir Province, Turkey. (CTV News)
  - Two people are killed and hundreds of others are evacuated in a fire in Limassol,
    Cyprus. The fire brigade chief says the fire was arson. (Greek Reporter) (Cyprus
    Mail)
  - 2025 Pacific typhoon season
  - One person is killed by Tropical Storm Wipha in Nghệ An province, Vietnam. (AP)
  - Six Northeastern University students are killed and one teacher is injured after
    the collapse of protective grates over a flotation cell at the Wunugetushan gold
    mine near Manzhouli, Inner Mongolia, China. (Reuters) (South China Morning Post)
  - 2023–2025 mpox epidemic
  - The Gambia reports its first case of mpox and announces an outbreak. (Hurriyet
    Daily News)
  - China–India relations
  - India announces it will resume issuing tourist visas for Chinese citizens, ending
    a five-year suspension imposed following the 2020 border skirmishes between the
    two countries. (The Straits Times)
  - 2022 University of Idaho murders
  - Bryan Kohberger is sentenced to four consecutive life sentences in prison without
    parole after pleading guilty to the murders of four University of Idaho students
    in 2022. (The New York Times)
  - Colombian conflict
  - A specialized court in Antioquia, Colombia, sentences seven former Chiquita executives
    to 135 months in prison and fines them COP$13.876 billion (US$3.4 million) for
    financing the now-defunct AUC paramilitary group. (Infobae)
  - A mass shooting in Maguiresbridge, Northern Ireland, leaves three people dead
    and another seriously injured. (BBC News)
  - Indonesian National Police arrest 44 people suspected of starting forest fires
    across the country, which contribute to the Southeast Asian haze. (AP)
  - Politics of the Northern Mariana Islands
  - Governor Arnold Palacios dies in office in neighboring Guam due to a medical condition.
    (Marianas Variety)
  - Lt. Governor David Apatang succeeds Palacios as Governor of the Northern Mariana
    Islands. Dennis C. Mendiola becomes Lieutenant Governor. (Marianas Variety) (RNZ)
