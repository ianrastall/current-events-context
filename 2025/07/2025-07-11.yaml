Date: '2025-07-11'
Source_URI: Portal:Current events/2025 July 11
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - United States and the Russian invasion of Ukraine
  - United States president Donald Trump confirms plans to sell weapons to NATO allies
    to be provided to Ukraine after the Pentagon previously paused weapon shipments.
    (Axios) (PBS)
  - Israeli settler violence
  - Israeli settlers kill two Palestinians near Ramallah in the West Bank. One of
    the victims, identified as a Palestinian-American, was beaten to death whilst
    the other victim was shot in the chest. (Reuters)
  - Myanmar civil war
  - At least 23 civilians, including four children, are killed and about 30 others
    are injured, with ten critically injured, in an Air Force strike on a Buddhist
    monastery in the District of Sagaing, located in the Sagaing Region of Myanmar.
    (ABC News)
  - Yemeni civil war
  - At least five children are killed after an explosive device detonates in Al-Hashamah,
    Taiz Governorate, Yemen. (Al Jazeera)
  - Ecuadorian security crisis
  - Los Choneros gang leader José Adolfo Macías Villamar agrees to a request of Ecuador's
    National Court for extradition to the United States to face trial for drug trafficking
    and arms smuggling. (CNN) (Reuters)
  - Mexican drug war
  - Ovidio Guzmán López, son of the former drug lord Joaquín "El Chapo" Guzmán, pleads
    guilty to two counts of drug distribution and two counts of participation in a
    continuing criminal enterprise. He is expected to cooperate with the U.S. government
    by providing information on criminal networks. (Reuters) (Chicago Tribune)
