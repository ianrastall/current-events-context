Date: '2025-07-29'
Source_URI: Portal:Current events/2025 July 29
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Attacks on civilians in the Russian invasion of Ukraine
  - Russian forces launch drone strikes and cruise missile strikes across Ukraine,
    killing at least 25 people and injuring dozens of others, including 16 inmates
    killed in an airstrike on a prison in Zaporizhzhia. (BBC News)
  - Kivu conflict
  - M23 campaign
  - Wazalendo militia Human Rights Defense Forces and M23 rebels clash on a hill near
    Kazinga, Masisi Territory, Democratic Republic of the Congo (DRC). (Radio Okapi)
  - Sudanese civil war
  - Famine in Sudan
  - According to the Sudan Doctors Network, 13 children have died from malnutrition
    in a displacement camp in the Darfur region of Sudan. (AP)
  - Ituri conflict
  - Zaïre-FPAC militants attack Sanduku 1, Djugu Territory, DRC, killing two civilians.
    (Radio Okapi)
  - Red Sea crisis
  - The Houthis launch a ballistic missile targeting Ben Gurion International Airport
    in Israel, which was intercepted by Israeli forces. (The Times of Israel)
  - At least 18 people making the Kanwar Yatra pilgrimage are killed in a bus accident
    in Deoghar, Jharkand, India. (DW) (NDTV)
  - The death toll from the flooding in Hebei and Beijing, China, increases to 34,
    with eight others missing. (NPR)
  - Seven people are killed and three others are injured when a Venezuelan Air Force
    Cessna 208 Caravan aircraft carrying members of the Yanomami Indigenous community,
    medical personnel and crew crashes after a suspected technical failure in the
    Amazon Rainforest, Amazonas State, Venezuela. (The Times of India) (ASN)
  - A dust explosion at a wood chip manufacturing plant in Fremont, Nebraska, United
    States, kills three people. (AP)
  - 2025 New York Peace Conference on Gaza
  - International recognition of Palestine
  - Maltese prime minister Robert Abela announces that Malta will recognize the State
    of Palestine at the UN General Assembly session in September, while Sammarinese
    foreign and political affairs secretary Luca Beccari announces that San Marino
    will recognize the State of Palestine by the end of 2025. (TVM) (GiornaleSM)
  - United Kingdom prime minister Keir Starmer declares that the UK will formally
    recognize the State of Palestine should a ceasefire not be achieved by September.
    (The Telegraph)
  - Attendees of the conference issue a declaration committing to 15-month transition
    plan for a demilitarized, fully sovereign Palestinian state governed by the Palestinian
    Authority with the assistance of a United Nations peacekeeping force. The declaration
    additionally calls on Hamas to disarm and give up its rule over Gaza. (AP) (Al
    Arabiya)
  - Israel–Netherlands relations
  - The Netherlands bans far-right Israeli ministers Itamar Ben-Gvir and Bezalel Smotrich
    from the country and calls on the European Union to support a ceasefire in Gaza.
    (AP)
  - Lebanon convicts and sentences six people who are accused of killing a United
    Nations peacekeeper in Beirut in 2023. (AP)
  - The Internal Security Agency of Poland detains 32 people, including a Pole, a
    Colombian, Russians, Ukrainians, and Belarusians, who are suspected of coordinating
    with Russia to engage in sabotage. (AP)
  - Four people are killed and over 500 others are arrested in protests in Luanda,
    Angola, against the government's increase in fuel prices. (DW)
