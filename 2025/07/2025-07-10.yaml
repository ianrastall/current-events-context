Date: '2025-07-10'
Source_URI: Portal:Current events/2025 July 10
Intelligence_Payload:
  Uncategorized:
  - Israeli–Palestinian conflict
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - Israeli airstrikes kill at least 15 Palestinians, including eight children and
    two women, queuing for nutritional supplements near a medical point in Deir al-Balah,
    Gaza. They were among at least 82 killed in strikes in Gaza. The Israel Defense
    Forces said in a statement that it struck a member Hamas's elite Nukhba forces
    who took part in the October 7 attacks. (BBC News) (Al Jazeera)
  - Palestinian political violence
  - Two Palestinians kill a 20-year-old Israeli settler in a combined shooting and
    stabbing attack at the Gush Etzion Mall in the Israeli-occupied West Bank. (YNet)
  - Russian invasion of Ukraine
  - Kyiv strikes
  - An overnight Russian missile and drone attack on Kyiv, Ukraine, kills two people,
    injures 28 others, and causes fires across the capital with multiple districts
    targeted. 397 drones and 18 missiles are launched in total. (BBC News) (The Kyiv
    Independent)
  - Nigerian bandit conflict
  - At least 30 bandits, five security officers and one civilian are killed during
    an insurgent attack on three villages in Faskari, Katsina State, Nigeria. (AP)
    (Reuters)
  - Armenia–Azerbaijan relations, Nagorno-Karabakh conflict
  - Armenian prime minister Nikol Pashinyan and Azerbaijani president Ilham Aliyev
    meet in Abu Dhabi, United Arab Emirates, for peace talks regarding the Nagorno-Karabakh
    conflict. (Reuters)
  - France–United Kingdom relations
  - French president Emmanuel Macron and United Kingdom prime minister Keir Starmer
    announce a joint migration deal for the UK to deport illegal migrants to France
    in exchange for accepting asylum seekers with British family connections. (DW)
  - Irish Amateur Swimming Association abuse scandal
  - Former swimming coach George Gibney agrees to be extradited from the United States
    to Ireland to face trial for indecent assault and rape. (RTÉ)
  - The United Kingdom's National Crime Agency arrests four people for conducting
    cyberattacks as part of an organized crime ring against national retailers Marks
    & Spencer, Harrods, and Co-op Food. (AP)
  - In a case concerning regulations requiring the South African athlete Caster Semenya
    to decrease her natural testosterone levels to be allowed to participate in the
    female category, the European Court of Human Rights finds that Switzerland violated
    her right to a fair hearing, requiring the case to be sent back to Swiss courts.
    (ECHR) (CNN)
  - Labour in India
  - Sporadic clashes occur in East India between trade unionists and left-wing groups
    against police and Trinamool Congress supporters during a current general strike
    opposing the "Special Intensive Revision". (ABP)
  - Von der Leyen Commission II
  - European Commission president Ursula von der Leyen survives a vote of confidence
    at the European Parliament. (CNN)
