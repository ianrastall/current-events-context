  - 2021–2022 Luzon sabungero disappearances
  - Philippine police chief Nicolas Torre announces that 15 police officers have been
    arrested for their alleged involvement in abducting and killing at least 34 cockfighters
    across Luzon, Philippines, from 2021 to 2022. (AP)
  - 2023 Leongatha mushroom murders
  - Erin Patterson is found guilty on all charges regarding deaths from Amanita poisoning
