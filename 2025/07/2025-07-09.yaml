Date: '2025-07-09'
Source_URI: Portal:Current events/2025 July 9
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - 2025 Shabelle offensive
  - 2025 Jaalle Siyaad military academy bombing
  - Several people are killed and injured in a suicide bombing targeting the 14th
    October Brigade of the Somali Armed Forces at a military academy in Mogadishu,
    Somalia. Al-Shabaab claims responsibility for the attack. (Reuters) (Hiiraan Online)
    (Somali Guardian)
  - At least seven Kenyan police officers are injured after an al-Shabaab roadside
    bomb strikes their patrol truck on a highway east of Mandera in Kenya, near the
    border with Somalia. (Hiiraan Online)
  - Red Sea crisis
  - Houthi attacks on commercial vessels
  - Attacks on the Eternity C
  - The Eternity C, a Liberian-flagged ship, sinks in the Red Sea after being attacked
    by the Houthis on Monday. At least four people are killed, seven others are rescued
    and fourteen are reported missing. A rescue operation is underway. (The Guardian)
    (NOS)
  - Russian invasion of Ukraine
  - Russian strikes against Ukrainian infrastructure
  - Russian forces launch 728 Geran-2 drones at Ukraine overnight in the largest single
    drone attack of the war to date. (Newsweek)
  - Colombian conflict
  - A donkey packed with explosives blasts near a military outpost in Las Cruces sector,
    Valdivia, Antioquia Department, killing one soldier and injuring two. Authorities
    blamed the ELN of being behind the attack. (Radio Caracol)
  - Tariffs in the second Trump administration
  - U.S. president Donald Trump announces a 50% tariff on most imports into the United
    States from Brazil starting August 1, in a letter addressed to Brazilian president
    Luiz Inácio Lula da Silva and citing the trial of former Brazilian president Jair
    Bolsonaro. (Reuters)
  - President Trump also announces a new set of tariff rates on imports from Algeria,
    Brunei, Iraq, Libya, Moldova, the Philippines, and Sri Lanka, assigning country-specific
    duties ranging from 20 to 30% following the expiration of a 90-day negotiation
    period. (Al Jazeera)
  - 2025 Guatemala earthquakes
  - At least six people die when a earthquake strikes Guatemala and causes widespread
    damage. (ABC News)
  - At least thirteen people are killed and nine others are injured after a section
    of the Gambhira Bridge in Gujarat, India, partially collapses during morning rush
    hour. (The Times of India) (NDTV)
  - United States and the United Nations
  - The United States issues sanctions against Francesca Albanese, the United Nations
    special rapporteur for human rights in the occupied Palestinian territories. (NPR)
  - The Syrian minister of foreign affairs Asaad al-Shaibani announces the country's
    readmission to the Union for the Mediterranean after 13 years of its suspension.
    (ARK News)
  - 2024 South Korean martial law crisis
  - The Seoul Central District Court issues an arrest warrant for former South Korean
    president Yoon Suk Yeol over five key charges related to his short-lived martial
    law declaration on December 3, 2024, placing him in custody for the first time
    since March due to concerns of evidence tampering. (Yonhap)
  - Censorship in Turkey
  - Turkey partially bans certain contents from X (formerly Twitter)'s AI chatbot
    Grok amid a criminal probe over insults to Turkish president Recep Tayyip Erdoğan
    and the country's founder Mustafa Kemal Atatürk. (Reuters)
