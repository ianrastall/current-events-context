Date: '2025-07-15'
Source_URI: Portal:Current events/2025 July 15
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - At least 99 Palestinians are killed in Israeli airstrikes on Gaza City and the
    Gaza Strip. (Hazzretz)
  - Aftermath of the Syrian civil war
  - Southern Syria clashes, Israeli invasion of Syria
  - Israeli warplanes carry out strikes targeting Syrian government forces as they
    attempt to enter the Druze-majority city of Suwayda in southern Syria. Israeli
    prime minister Benjamin Netanyahu claims he ordered the strikes for the protection
    of the Druze from forces aligned with the Syrian transitional government. (Reuters)
    (The Times)
  - Somali Civil War
  - Constitutional crisis in Somalia
  - The Puntland interior ministry reports at least five militant casualties in Dhahar,
    Haylan region, following a coordinated campaign as Puntland's defence forces repels
    an assault backed by the Somali federal government. (Idil News) (Garowe Online)
  - Israel–Hezbollah conflict
  - At least 12 people are killed in Israeli air strikes in Lebanon's eastern Bekaa
    Valley. The missiles struck a number of military compounds belonging to the armed
    group Hezbollah, including training camps affiliated to its elite Radwan Force.
    These were the deadliest strikes since a ceasefire ended a year of fighting between
    Israel and Hezbollah. (BBC News)
  - A pick-up truck veers off a road in Pithoragarh, India, and plunges into a 300-meter
    gorge, killing eight people and injuring five others. (MSN)
  - A building under demolition collapses in Kurume, killing two workers. (Kyodo News)
  - Indonesia–United States relations
  - U.S. president Donald Trump announces a new trade deal with Indonesia, where Indonesia
    will purchase $15 billion in energy and $4.5 billion in agricultural products,
    along with 50 Boeing jets. Indonesia will also allow importation of U.S. products
    without tariffs, while the U.S. will maintain a 19% tariff on all goods coming
    from Indonesia. (Financial Times)
  - US airstrikes on Yemen
  - The Federal Constitutional Court of Germany dismisses a case brought about by
    Yemeni plaintiffs accusing the German government of failing to prevent deaths
    from US drone strikes on Yemen coordinated from Ramstein Air Base, citing the
    lack of a "sufficient connection" to the German state’s authority and "a serious
    danger of systematic violation" of international law. (AP News)
  - Protests against Donald Trump
  - Protests against the second presidency of Donald Trump, June 2025 Los Angeles
    protests
  - The Trump administration announces that it has ordered 2,000 troops from the National
    Guard to leave Los Angeles after being sent to deal with the protests against
    the ICE raids. (AP)
  - At least 86 guns and 974 rounds of ammunition are recovered in a joint operation
    by security forces in Manipur amid ongoing ethnic violence in the state. (The
    Times Of India)
