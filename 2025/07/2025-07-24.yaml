Date: '2025-07-24'
Source_URI: Portal:Current events/2025 July 24
Intelligence_Payload:
  Uncategorized:
  - 2025 Cambodia–Thailand clashes
  - Cambodian and Thai troops exchange fire near the Prasat Ta Muen Thom site near
    the border. Fourteen people are killed and 46 others are injured in Thailand.
    (BBC News) (Al Jazeera)
  - Angara Airlines Flight 2311
  - An Angara Airlines Antonov An-24 operating as Angara Airlines Flight 2311 en route
    to Tynda crashes into a forested area in Amur Oblast, Russia, killing all 48 occupants,
    including five children. (The Guardian) (Reuters)
  - At least 12 people are killed, several others are missing, and 157 are injured
    in an explosion at an ammunition depot in Maarrat Misrin, Idlib Governorate, Syria.
    (Xinhua News Agency) (AP)
  - International recognition of Palestine
  - French president Emmanuel Macron announces that France will recognize Palestine
    as a state starting September, citing reasons such as an immediate end to the
    war and helping the humanitarian crisis. (France 24) (AP)
  - Norway–Russia relations, Violations of non-combatant airspaces during the Russian
    invasion of Ukraine
  - Norway reports that Russia has violated its airspace over Finnmark for the second
    time this year. (Reuters)
  - Central African Republic Civil War
  - The International Criminal Court convicts Patrice-Edouard Ngaïssona and Alfred
    Yekatom, leaders of the Anti-balaka militia alliance, of multiple counts of war
    crimes and crimes against humanity and sentences them to 12 and 15 years in prison
    respectively for their roles in various massacres against civilians throughout
    the civil war in the Central African Republic. (AP)
  - Hungary–Israel relations, Hungary–United Kingdom relations
  - Hungary bans Irish rap trio Kneecap for three years ahead of a music festival,
    citing a national security threat over their alleged support for Hamas and Hezbollah.
    (The Times of Israel)
