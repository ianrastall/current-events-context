Date: '2025-07-06'
Source_URI: Portal:Current events/2025 July 6
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli bombing of the Gaza Strip
  - Israeli airstrikes kill at least 38 Palestinians in Gaza. (AP)
  - Israeli–Lebanese conflict
  - Israel conducts four drone strikes in Bint Jbeil, Shebaa, and Shaqra, in southern
    Lebanon over the weekend, killing one person and injuring several others. (Al
    Jazeera)
  - Red Sea crisis
  - Liberian-flagged bulk carrier Magic Seas is attacked by the Houthis with small
    arms fire and rocket-propelled grenades in the Red Sea forcing the crew to abandon
    ship, according to the United Kingdom Maritime Trade Operation. (NOS) (ABC News
    Australia)
  - Boko Haram insurgency
  - Boko Haram insurgents kill nine people and injure four others in an attack on
    Mallam Fatori in Borno State, Nigeria. (AP)
  - Gang war in Haiti
  - The historic Hotel Oloffson in Port-au-Prince, Haiti, is destroyed following an
    arson attack by armed gangs. (Le Quotidien 509)
  - 2025 Karachi building collapse
  - The death toll from the collapse of a multistory building on Friday in Karachi,
    Sindh, Pakistan, rises to 27 as rescuers pull 11 more bodies from the rubble as
    the three-day rescue operation ends. 10 others were injured in the collapse, of
    which one died in hospital from their injuries. (CTV News)
  - A truck and a commercial vehicle carrying passengers collide along the Zaria-Kano
    expressway in Kano State, Nigeria, killing 21 and injuring three. (AP)
  - Five Turkish soldiers are killed by methane gas exposure in a cave in northern
    Iraq during an operation to search for a fellow soldier's remains. (AP)
  - Japan–Philippines relations
  - The Yomiuri Shimbun reports that the Japanese Navy will export six used Abukuma-class
    destroyer escorts to the Armed Forces of the Philippines to strengthen the Philippine
    Navy due to territorial disputes in the South China Sea. (Reuters)
  - 2024 South Korean martial law crisis
  - Prosecutors in South Korea request that former president Yoon Suk Yeol be detained
    amid the ongoing investigation against him for insurrection. (Reuters)
  - 2025 CONCACAF Gold Cup
  - In association football, the defending champions Mexico win a record-extending
    10th Gold Cup title after defeating the United States 2–1 in the final at the
    NRG Stadium in Houston, Texas, United States. Edson Álvarez is named the tournament's
    best player. (France 24)
  - The Surinamese parliament elects Jennifer Geerlings-Simons as the country's first
    female president. (CNN) (France 24)
