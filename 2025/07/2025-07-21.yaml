  - El Salvador–Venezuela relations
  - The Venezuelan attorney general's office opens a formal investigation into Salvadoran
    president Nayib Bukele and his government's alleged mistreatment of Venezuelan
    migrants detained in the United States and sent to the CECOT megaprison, built
    to hold alleged gang members. (AP)
  - Christophe Mirmand is sworn in as the new minister of state of Monaco, succeeding
    acting minister of state Isabelle Berro-Amadeï. (L'Observateur de Monaco)
  - Jagdeep Dhankhar resigns as the Vice President of India citing health reasons.
    (NDTV)
