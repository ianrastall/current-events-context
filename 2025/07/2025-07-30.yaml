Date: '2025-07-30'
Source_URI: Portal:Current events/2025 July 30
Intelligence_Payload:
  Uncategorized:
  - Constitutional crisis in Somalia
  - Jubaland crisis
  - Federal troops capture Beled Hawo, Somalia, from forces loyal to Jubaland. (Garowe
    Online)
  - Gaza war
  - 2025 Gaza Strip aid distribution killings
  - At least 71 Palestinians are killed and dozens more are wounded while seeking
    humanitarian aid in Gaza. (Al Jazeera)
  - Kivu conflict
  - M23 campaign
  - M23 rebels expel Wazalendo militia Decisive Movement for the Liberation of Congo
    from Kamakombe, Kabare Territory, Democratic Republic of the Congo. (Radio Okapi)
  - South Sudan–Uganda relations
  - Five South Sudanese soldiers, one Ugandan soldier, and one civilian are killed
    in a shooting at two villages in Yumbe District, Uganda, in a retaliatory strike
    against the South Sudan People's Defence Forces after the killing of a Uganda
    People's Defence Force soldier during border clashes on Monday. Both countries
    have agreed to an immediate ceasefire. (AP) (Daily Monitor)
  - 2025 Kamchatka earthquake
  - A earthquake strikes off the coast of Russia's Kamchatka Peninsula. Tsunami alerts
    have been issued along the Pacific coast of many countries. (The New York Times)
  - At least nine people are killed and two others are critically injured in an explosion
    at a fireworks workshop in Ban Pho Tha Sai, Suphan Buri province, Thailand. (AP)
    (Bangkok Post)
  - Five people, including four Ukrainian nationals, are killed after a truck collides
    with a minivan on the A1 motorway near Slovenske Konjice, Slovenia. (Slovenian
    Press Agency) (Sloboden Pečat)
  - 2025 New York Peace Conference on Gaza, Canada–Palestine relations
  - Canadian prime minister Mark Carney announces that Canada will recognise Palestine
    as an independent country in September, conditional on the Palestinian Authority
    committing to certain reforms. (CBC)
  - Syria–Turkey relations, Qatar–Syria relations
  - Turkey announces it will start supplying natural gas to Syria via the Arab Gas
    Pipeline to help Syria generate new electricity, while Qatar will also help with
    the project's financing. (AP)
  - 2022 Brazilian coup plot
  - The U.S. Treasury Department imposes sanctions under the Magnitsky Act on Brazilian
    Supreme Court justice Alexandre de Moraes over alleged human rights violations
    and suppression of freedom of expression in his oversight of former president
    Jair Bolsonaro. (Reuters)
  - Internet censorship in Australia
  - The government of Australia announces the inclusion of video-sharing site YouTube
    in its social media ban for teenagers starting in December, following a survey
    on harmful content being reported on the site. (BBC News) (Reuters)
  - Internet censorship in Russia
  - Russian federal agency Rospotrebnadzor blocks web service Speedtest after identifying
    alleged threats to the security of the public communications network and a segment
    of the Internet in Russia. (The Moscow Times)
