Date: '2025-07-01'
Source_URI: Portal:Current events/2025 July 1
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Luhansk Oblast campaign
  - Head of the Luhansk People's Republic Leonid Pasechnik says that Russian forces
    have captured the entirety of the Luhansk Oblast in Ukraine. (AP)
  - Attacks in Russia during the Russian invasion of Ukraine
  - A Ukrainian SBU drone attack on a military factory in Izhevsk, Russia, which produced
    Tor surface-to-air missile systems, kills three people and injures 45 others.
    A state of emergency is later declared by Head of the Udmurt Republic Aleksandr
    Brechalov. (BBC News)
  - Mali War
  - Jama'at Nasr al-Islam wal-Muslimin claims responsibility for attacks on several
    Mali Armed Forces positions near Senegal in Mali. The Malian army spokesperson
    said 80 attackers were neutralized while there were no details on casualties among
    soldiers. (CTV News)
  - Insurgency in Balochistan
  - A boy and some insurgents are killed and nine others are injured when dozens of
    militants armed with guns and rockets storm a police station and set fire to two
    banks before fleeing in Mastung District, Balochistan, Pakistan. The Balochistan
    Liberation Army is suspected to be behind the attacks. (CTV News)
  - Eight people are killed and five others are injured, including three critically,
    in an explosion at a fireworks factory in Sivakasi, Tamil Nadu, India. (India
    Today) (Deccan Herald)
  - A sea rig capsizes in the Gulf of Suez off the coast of Jabal al-Zeit, Egypt.
    Of the 30 personnel on board, 23 are rescued, four others are killed, and three
    others are still missing. (MarineTraffic) (Reuters)
  - An Australian east coast low rapidly intensifies as it makes landfall on the east
    coast of Australia, affecting millions of people in Sydney and the Central Coast.
    (The Sydney Morning Herald)
  - The Warsaw Metro's M1 line is damaged in an overnight fire in Warsaw, Poland.
    Mayor Rafał Trzaskowski blames the incident on a power outage. (TVP Info)
  - China–Philippines relations
  - The Chinese government sanctions former Philippine Senate majority leader Francis
    Tolentino, barring him from entering China, citing his conduct on China-related
    issues. (Reuters)
  - 2025 Thai political crisis
  - The Constitutional Court of Thailand suspends Prime Minister Paetongtarn Shinawatra
    from duty pending a case seeking her dismissal. (The Washington Post)
  - Turkey arrests four journalists of the satirical magazine LeMan accused of drawing
    the Islamic prophet Muhammad. (BBC News)
  - One person is killed and two others are injured in a mass stabbing attack when
    a 21-year-old man stabs employees at a company in Mellrichstadt, Bavaria, Germany.
    (Euronews)
