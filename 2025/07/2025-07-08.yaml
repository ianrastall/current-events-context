Date: '2025-07-08'
Source_URI: Portal:Current events/2025 July 8
Intelligence_Payload:
  Uncategorized:
  - Middle Eastern crisis
  - Gaza war
  - Israeli invasion of the Gaza Strip
  - Five Israeli soldiers are killed and two others are seriously injured in an ambush
    in Beit Hanoun, Gaza. (The New York Times) (The Washington Post)
  - Israeli–Lebanese conflict
  - An Israeli airstrike kills at least three people and injures 13 others in an attack
    on Tripoli, Lebanon. (Al Jazeera)
  - German economic crisis
  - German vehicle manufacturer Daimler Truck announces it will cut around 5,000 jobs
    in the country by 2030 in an effort to save 1 billion following a drop in sales.
    (DW)
  - Bulgaria and the euro
  - The European Parliament and the European Council approve Bulgaria's request to
    adopt the euro, which will replace the lev as Bulgaria's official currency on
    1 January 2026. (Euronews) (European Council)
  - July 2025 Southern New Mexico floods
  - At least three people are killed, four people are trapped, including a father
    and his two children, and 85 others are rescued when they are washed away in flash
    floods in Ruidoso, New Mexico, United States. (AP) (LBC)
  - Ten people are killed and some others are injured when a fire and explosion cause
    eight rooms to collapse at a fireworks factory in Virudhunagar, Tamil Nadu, India.
    (The Star)
  - Treatment of women by the Taliban
  - The International Criminal Court issues arrest warrants against Taliban leader
    Hibatullah Akhundzada and Taliban official Abdul Hakim Haqqani over alleged persecution
    of girls, women and the LGBTQ+ community. (AP)
  - Two people are killed, including the perpetrator, and six others are injured,
    including three police officers and three seriously, in a shootout at a house
    in Calldetenes, Catalonia, Spain. (Ara)
  - A 9-year-old is killed and two others are injured in a mass stabbing attack by
    a 16-year-old at a school in Estação, Rio Grande do Sul, Brazil. (CTV News)
