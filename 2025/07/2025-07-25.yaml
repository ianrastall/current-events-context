Date: '2025-07-25'
Source_URI: Portal:Current events/2025 July 25
Intelligence_Payload:
  Uncategorized:
  - Somali Civil War
  - 2025 Shabelle offensive
  - Al-Shabaab targets two military bases operated by AUSSOM and the Somali Armed
    Forces near the Somali capital Mogadishu using a bomb-laden attack. (Garowe Online)
  - Jubaland crisis
  - Following the capture of Beled Hawo by Jubaland forces, Somali federal troops
    are deployed to reinforce federal government presence in Gedo. (Garowe Online)
  - War against the Islamic State
  - Islamic State insurgency in Puntland
  - In a joint military operation, Puntland Counter-Terrorism forces and US SOF capture
    the financial and foreign recruitment chief of ISIS-Somalia, Abdiweli Mohamed
    Aw Yusuf "Abdiweli Walalac," and two others. The operation took place in the Laag
    area of rural Xumbeys in the Bari region of Puntland. (Garowe Online)
  - US intervention in the Syrian civil war
  - U.S. Central Command kills senior Islamic State leader Diaa Zoubaa Musleh Al-Hardani
    along with his two sons in a strike on Al-Bab, Aleppo Governorate, Syria. (Al
    Arabiya)
  - 2025 Cambodia–Thailand border conflict
  - 2025 Cambodia–Thailand clashes
  - The Royal Thai Armed Forces's Border Defense Command declares martial law in eight
    districts of the provinces of Chanthaburi and Trat on their border with Cambodia,
    citing "Cambodia's use of force to enter Thai territory". (NDTV)
  - The Royal Thai Air Force launches airstrikes on targets inside Cambodia, including
    areas near the Preah Vihear Temple and Prasat Ta Muen Thom. (Nation Thailand)
    (The Star)
  - Kivu conflict
  - M23 campaign
  - Wazalendo fighters launch an offensive to take the town of Luke, Masisi Territory,
    Democratic Republic of the Congo, which the March 23 Movement had taken the previous
    day. (Radio Okapi)
  - The Alliance of Patriots for a Free and Sovereign Congo of the Wazalendo resist
    an attack on their positions by the M23 in the area of Showa, Masisi Territory.
    Residents of Luke, Showa, and Bukombo flee to escape the fighting. (Radio Okapi)
  - Russian invasion of Ukraine
  - Pokrovsk offensive, Kupiansk offensive
  - Russian forces enter the city of Pokrovsk for the first time since the invasion
    began, and enter the city of Kupiansk for the first time since 2024. (ISW)
  - Ituri conflict
  - Two Mai-Mai militias continue to fight over the control of agricultural roads
    in Babila-Babombi chiefdom, Mambasa Territory, DRC. Residents of several villages
    flee to escape the fighting. (Radio Okapi)
  - Piplodi school roof collapse
  - A school collapse caused by continuous rainfall in Piplodi, Jhalawar District,
    India, kills at least seven students, seriously injures 28 others, including eight
    critically, and traps over 32 under debris. (The Indian Express)
  - Mediterranean Sea migrant smuggling
  - A boat carrying Egyptian migrants and Sudanese crewmen en route to Europe capsizes
    off the coast of Tobruk, Cyrenaica, Libya, killing at least 15 people, injuring
    10 others and leaving some missing. (AP)
  - A gas explosion at a ten-story apartment building in Saratov, Saratov Oblast,
    Russia kills at least six people, including a child, injures seven others and
    destroys or damages over 30 apartments. (Anadolu Agency) (Novaya Gazeta)
  - India–Maldives relations
  - Indian prime minister Narendra Modi announces India will lend a US$565 million
    credit line to the Maldives, gift their armed forces several heavy fighting vehicles,
    and launch formal talks for a free-trade agreement. (AP)
  - Palau–United States relations
  - The traditional chiefs of Palau and the National Congress reject a proposal by
    the United States to host asylum seekers and strongly advise President Surangel
    Whipps Jr. to also reject it. (Island Times)
  - The trial of former Congolese president and senator for life Joseph Kabila for
    his crimes in connection with the M23 Movement and the Congo River Alliance begins.
    The armed forces auditor general charges Kabila with treason, participation in
    an insurrectional movement, crimes against the peace and security of humanity,
    intentional homicide, rape, torture, deportation, and condoning crimes. (Radio
    Okapi)
  - The government of Hong Kong places a HK$200,000 (US$25,500) bounty on 19 members
    of the overseas pro-democracy organization Hong Kong Parliament. (DW)
  - Impeachment of Sara Duterte
  - The Supreme Court of the Philippines rules that the impeachment complaint against
    Vice President Sara Duterte, filed by the lower house of Congress in February,
    is unconstitutional. (Reuters)
  - Online Safety Act 2023
  - Thousands of websites, such as Facebook and YouTube, begin implementing age verification
    to block "adult content" for British viewers under the age of 18, according to
    Ofcom. (BBC News) (The Guardian)
