  - Terrorism in Egypt
  - Egyptian police kill two suspected militants belonging to the Hasm Movement, an
    affiliate of the outlawed Muslim Brotherhood, during a raid on their hideout in
    Giza. One passerby is also killed. (Al-Ahram)
  - Ecuador extradites José Adolfo Macías Villamar, leader of the Los Choneros cartel,
    to the United States where he faces federal charges related to drug trafficking.
    (AP)
  - 2025 Japanese House of Councillors election
  - Japanese citizens vote for 125 of the 248 members of the House of Councillors,
    the upper house of the National Diet. (NHK)
  - The ruling coalition of the Liberal Democratic Party (LDP) and Komeito lose their
    majority in the House of Councillors, marking the first time in LDP's 70-year
    history that it leads a coalition in the Diet without a majority in either house.
    (NHK)
