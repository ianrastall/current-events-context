Date: '2025-07-03'
Source_URI: Portal:Current events/2025 July 3
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - 2025 Gaza Strip aid distribution killings
  - Israeli airstrikes and shootings kill at least 94 Palestinians in Gaza, including
    45 who were attempting to get humanitarian aid. (AP)
  - Gang war in Haiti
  - According to the United Nations, over 90% of the Haitian capital city Port-au-Prince
    is now under the control of violent gangs. (NPR)
  - South American trade bloc MERCOSUR and European bloc EFTA sign a free trade agreement,
    setting up a free trade zone of nearly 300 million people. (DW) (Buenos Aires
    Herald)
  - Afghanistan–Russia relations, Recognition of the Islamic Emirate of Afghanistan
  - Russia becomes the first country to formally recognize the Taliban government
    in Afghanistan. (Reuters)
  - Four people are injured in a hammer attack by a 20-year-old Syrian national on
    an Intercity Express train while it was between Straubing and Plattling in Bavaria,
    Germany. (Euronews)
  - Four people are injured in a mass stabbing attack by a man near a shopping mall
    in Tampere, Finland. (Reuters)
  - Cabinet of Lee Jae Myung
  - The South Korean National Assembly votes 173–3 with three abstentions to approve
    the nomination of Kim Min-seok as the country's prime minister, despite boycotts
    from the People Power Party over allegations surrounding his wealth and family.
    (Yonhap)
  - Air traffic controllers in France go on strike to protest understaffing, management
    culture, and outdated equipment. Hundreds of flights are delayed or cancelled,
    including at Charles de Gaulle Airport in Paris, which is one of Europe's busiest
    airports. (DW) (Bloomberg News)
  - The One Big Beautiful Bill Act is passed by the United States House of Representatives
    in a 218–214 vote and is signed into law by President Donald Trump the following
    day. (BBC News)
  - The Syrian transitional government unveils the new emblem of Syria, featuring
    a gold-coloured eagle, facing to its right, with three five-pointed stars arranged
    in an arc above its head. (SANA)
  - Christophe Mirmand is appointed the new minister of state of Monaco and will succeed
    acting Isabelle Berro-Amadeï on 21 July. (Le Monde)
  - The 3.500 years old Caral city of Peñico is discovered in Peru. (BBC)
