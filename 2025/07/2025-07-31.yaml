Date: '2025-07-31'
Source_URI: Portal:Current events/2025 July 31
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Kyiv strikes, Attacks on civilians in the Russian invasion of Ukraine
  - Russian forces launch drones and cruise missiles on Kyiv, Ukraine, killing at
    least 31 people and injuring more than 150 others. At least one tower block completely
    collapses. (Reuters) (BBC News) (AP)
  - Kivu conflict
  - M23 campaign
  - M23 rebels clash with various Mai-Mai groups in several villages in the Ufamandu
    group, Masisi Territory, Democratic Republic of the Congo. (Radio Okapi)
  - Myanmar civil war
  - The military junta of Myanmar formally ends the country's four-year-long state
    of emergency and declares a December 2025 election for the country's new head
    of government and legislative members. (AP)
  - New People's Army rebellion
  - Eight alleged members of the New People's Army are killed in clashes with the
    Philippine Army in Las Navas, Northern Samar, Philippines. (Philippine Daily Inquirer)
  - Canonisation of John Henry Newman
  - Pope Leo XIV declares Saint John Henry Newman, a 19th-century Anglican convert
    who became a prominent English Catholic theologian, as a Doctor of the Church.
    (AP) (Vatican News)
  - The death toll from the flooding in Beijing, China, increases to over 70 as the
    government discovers 31 elderly people who were trapped in a nursing home in Miyun
    district. (AP)
  - Six people are killed and nine others are injured after a earthquake causes a
    collapse at the El Teniente copper mine near Machalí, O'Higgins Region, Chile.
    (Tiempo Sur)
  - Heavy rain leads to flash flooding in the Guinean capital Conakry, killing at
    least seven people and leaving several others missing. (RFI)
  - U.S. president Donald Trump signs an executive order restoring the Presidential
    Fitness Test in all public schools nationwide. (AP) (USA Today)
  - Tariffs in the second Trump administration, Liberation Day tariffs
  - South Korea–United States relations
  - South Korea and the United States reach a trade agreement that places a 15% tariff
    on U.S. imports from South Korea. South Korea also promises to invest US$350 billion
    into American biotech, semiconductors, and shipbuilding over an unspecified time.
    (Yonhap) (CBS News)
  - U.S. president Donald Trump announces revised tariff rates set to start on August
    1, including a new 35% tariff on Canada. (Reuters)
  - Israel–Slovenia relations, Arms embargoes on Israel since 2023
  - The Slovenian government announces a complete ban on the import, export, and transit
    of arms and military equipment to and from Israel. (Arab News)
  - Myanmar–United States relations
  - American lobbying firm DCI Group signs a $3 million-per-year agreement with Myanmar's
    Ministry of Information to provide public affairs services aimed at rebuilding
    relations with the United States, according to a Foreign Agents Registration Act
    filing, despite existing U.S. sanctions on Myanmar's military leadership. (Reuters)
  - A court in Faisalabad, Pakistan, sentences opposition leader Omar Ayub and over
    200 supporters of ousted prime minister Imran Khan to over ten years in prison
    each for their participation in the 2023 protests. (AP)
  - Conor McGregor loses his appeal against a civil court in the Republic of Ireland,
    finding that he raped Nikita Hand. (RTÉ)
  - Islamic terrorist Osama Krayem is found guilty at Stockholm District Court, Sweden,
    of involvement in a war crime in which Royal Jordanian Air Force pilot Muath al-Kasasbeh
    was burned alive inside a cage in Raqqa, Syria by the Islamic State on January
    3, 2015. (BBC News)
  - The Legislative Assembly of El Salvador abolishes presidential term limits, increases
    presidential terms from 5 to 6 years, and moves the date of the next presidential
    election from 2029 to 2027. (BBC News)
  - Italy and Vatican City agree to transform a 430-hectare (1,100-acre) field in
    Rome to a solar farm that will power the Vatican, with the goal of turning it
    into the first carbon-neutral state. (AP) (Bluefield Daily Telegraph)
