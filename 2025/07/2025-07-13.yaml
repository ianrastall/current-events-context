Date: '2025-07-13'
Source_URI: Portal:Current events/2025 July 13
Intelligence_Payload:
  Uncategorized:
  - Gaza war
  - Israeli invasion of the Gaza Strip, 2025 Gaza Strip aid distribution killings
  - Israeli strikes kill at least 30 people, including six children, at a water collection
    zone, bringing the official death toll in Gaza to over 58,000. (AP)
  - Somali Civil War
  - 2025 Shabelle offensive
  - Al-Shabaab militants claim the takeover of Tardo Village in the Hiiraan region
    of Somalia's Hirshabelle state, which was previously captured by Ma'awisley fighters
    and the Somali National Army in September 2022. (Garowe Online) (Reuters)
  - Aftermath of the Syrian civil war
  - Southern Syria clashes
  - More than 30 people are killed and 100 others are injured in clashes between pro-government
    forces and Druze fighters in Suwayda, Suwayda Governorate, Syria. (Sky News) (The
    Straits Times)
  - Allied Democratic Forces insurgency
  - Islamic State-affiliated Allied Democratic Forces insurgents kill at least 66
    people in Territory of Irumu, in the Ituri Province of the Democratic Republic
    of the Congo. (AP)
  - Sudanese civil war
  - At least 48 civilians are killed, houses are razed and property is looted in an
    attack when Rapid Support Forces fighters storm the village of Um Garfa in North
    Kordofan, Sudan. (Barron's)
  - 2025 Arizona wildfires
  - The Grand Canyon Lodge in Arizona, United States, is destroyed by the Dragon Bravo
    Fire. (AP)
  - 2025 Fall River assisted-living fire
  - Nine people are killed and more than 30 others are injured, including five firefighters,
    in a fire at an assisted living facility in Fall River, Massachusetts, United
    States. (WPRI-TV)
  - Zeusch Aviation Flight 1
  - A Beechcraft King Air B200 aircraft crashes and catches fire shortly after taking
    off from London Southend Airport in Southend-on-Sea, England, killing all four
    people onboard. (NOS) (The Independent)
  - A bus plunges into a ravine near Chakri, Pakistan, killing six and injuring 38.
    (The Express Tribune)
  - E. Jean Carroll v. Donald J. Trump, Donald Trump sexual misconduct allegations,
    Personal and business legal affairs of Donald Trump
  - The United States Court of Appeals for the Second Circuit rejects Donald Trump's
    second bid to overturn the civil ruling of Carroll II (2022), upholding that Trump
    must pay US$5,000,000 to E. Jean Carroll for sexual abuse. (Reuters)
  - 2025 Lexington shootings
  - At least three people, including the perpetrator, are killed, and three others
    are injured, including a state trooper and one critically, in two spree shootings
    in Lexington, Kentucky, United States. (NBC News) (BNO News)
  - Three people are killed in a raid by the Haitian National Police on drug traffickers,
    seizing 1,045 kilograms of cocaine on a boat near Tortuga, Nord-Ouest, Haiti.
    (Miami Herald)
  - 2025 FIFA Club World Cup
  - In association football, English club Chelsea F.C. win the FIFA Club World Cup
    for the second time, defeating French club Paris Saint-Germain 3–0 in the final.
    Chelsea winger Cole Palmer is awarded the tournament's Golden Ball. (FIFA)
  - 2025 Major League Baseball draft
  - In baseball, the MLB draft is held at the Coca-Cola Roxy in Cumberland, Georgia,
    U.S., with the Washington Nationals selecting Eli Willits as the first overall
    pick. At the age of 17, Willits becomes the 3rd youngest player in MLB draft history
    to be selected first overall. (ESPN)
  - 2025 Wimbledon Championships
  - In tennis, Jannik Sinner defeats his rival and defending champion Carlos Alcaraz
    in the men's singles final 4–6, 6–4, 6–4, 6–4 to win his first Wimbledon title.
    Sinner is the first Italian player to win a singles title at Wimbledon. (ESPN)
