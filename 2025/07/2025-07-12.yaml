Date: '2025-07-12'
Source_URI: Portal:Current events/2025 July 12
Intelligence_Payload:
  Uncategorized:
  - Russian invasion of Ukraine
  - Russian strikes against Ukraine infrastructure
  - Russia launches 597 drones and 26 cruise missiles across Ukraine, killing two
    civilians in Chernivtsi, injuring 20 others, and damaging infrastructure in several
    cities. (ABC News) (Reuters)
  - List of World Heritage Sites
  - UNESCO adds 26 landmarks to the UNESCO World Heritage list. (UNESCO World Heritage
    Convention) (Newsweek)
  - Three people, including a baby, are killed and 20 other people are hospitalized
    in an apartment fire in Ankara, Turkey. (AP)
  - Foreign relations of New Caledonia, Politics of New Caledonia
  - Representatives of New Caledonia sign an accord with the French government to
    become the "State of New Caledonia" within the French Republic, subject to a referendum.
    The new state would immediately gain control of some foreign affairs, and would
    have the option of gaining further powers, subject to further referenda. (Al Jazeera)
    (The New York Times)
  - Tariffs in the second Trump administration
  - United States president Donald Trump announces a 30% tariff increase on imported
    items from Mexico and the European Union to take effect on August 1. (BBC News)
  - Five men are lynched after being accused of robbing damaged homes in the earthquake
    in Santa María de Jesús, Guatemala, earlier this week. (Al Jazeera)
  - 2025 Wimbledon Championships
  - In tennis, Iga Świątek defeats Amanda Anisimova in the women's singles final 6–0,
    6–0 to win her first Wimbledon title, becoming the first Pole to do so. This is
    the third major final to have a double bagel scoreline and the first since 1988.
    (The Independent) (WTA)
