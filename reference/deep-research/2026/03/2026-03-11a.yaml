    importance: 9
    headline: "IEA Announces Record 400-Million-Barrel Strategic Oil Reserve Release"
    summary: >
      In direct response to the massive supply disruptions caused by the military closure of the Strait of Hormuz, the International Energy Agency (IEA) authorized the collective release of 400 million barrels of oil from member countries' strategic reserves. The emergency intervention, categorized by the IEA as a response to the largest supply disruption in the history of the global oil market, is the most substantial coordinated release since the organization's founding. Member countries in the Asia-Oceania region committed to releasing their stocks immediately to counter critical regional shortfalls, while reserves from the Americas and Europe will be deployed beginning in late March. The total commitment comprises roughly 72% crude oil and 28% refined oil products, designed to stabilize Brent crude prices that surged past $100 a barrel due to the geopolitical crisis.
    details:
      what_happened:
        - "The IEA member countries agreed to release a total of 400 million barrels of oil to global markets to mitigate war-induced supply shocks."
        - "The Americas committed 195.8 million barrels (100% crude), Europe committed 107.5 million barrels, and Asia-Oceania committed 108.6 million barrels."
        - "Asian and Oceanian reserves were mandated for immediate market release, while American and European distributions were scheduled for the end of March."
        - "The total global commitment consists of 271.7 million barrels from government stocks and 116.6 million from obligated industry stocks."
        - "The IEA explicitly stated that the release is a temporary buffer, noting that long-term stability requires the resumption of safe transit through the Strait of Hormuz."
      why_it_matters:
        - "This marks only the sixth and largest emergency collective action in the IEA's history, reflecting the unprecedented severity of the Middle Eastern energy blockade."
        - "The intervention is critical for vulnerable economies, particularly in Southeast Asia, which heavily rely on spot-market LNG and Middle Eastern crude imports."
      uncertainty_notes:
