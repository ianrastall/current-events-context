        - "José Antonio Kast took the oath of office and received the presidential sash from Senate President Paulina Núñez at the National Congress in Valparaíso."
        - "Kast appointed a new cabinet, including José Francisco Pérez Mackenna as chancellor and María Trinidad Steinert as minister of security."
        - "In his inaugural address, Kast promised to preserve national independence and confront adversaries who 'sown terror in neighborhoods.'"
        - "The ceremony was attended by conservative heads of state including Argentina's Javier Milei and Ecuador's Daniel Noboa, while leftist leaders like Brazil's Lula da Silva were absent."
        - "The transition concludes Gabriel Boric's term, who left office with the lowest approval ratings of any Chilean president since 1990."
      why_it_matters:
