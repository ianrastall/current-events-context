    headline: "Gunmen Open Fire on United States Consulate in Toronto"
    summary: >
      Canadian authorities are investigating a drive-by shooting targeting the United States Consulate in downtown Toronto, which the Royal Canadian Mounted Police (RCMP) has designated a "national security incident." At approximately 4:30 a.m. on March 10, two unidentified suspects exited a white Honda CR-V on University Avenue and discharged multiple handgun rounds at the front of the highly fortified diplomatic facility. Although personnel were inside the building, the reinforced ballistic glass and walls prevented any injuries. The attack, which occurred concurrently with a bombing attempt at the U.S. embassy in Oslo, Norway, prompted Canadian officials to significantly elevate security postures around American and Israeli installations nationwide as investigators probe potential links to Middle Eastern geopolitical tensions.
    details:
