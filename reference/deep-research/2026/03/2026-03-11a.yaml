        - "Two suspects fired multiple handgun rounds at the U.S. Consulate at 360 University Avenue in Toronto."
        - "The perpetrators arrived and fled the scene in a white Honda CR-V."
        - "Police recovered shell casings and noted physical damage to the exterior glass and doors, though no bullets penetrated the fortified structure."
        - "The RCMP classified the shooting as a national security incident and assumed a joint investigative role with Toronto Police."
        - "Ontario Premier Doug Ford condemned the attack, hinting at potential linkages to international sleeper cells and the ongoing war in Iran."
      why_it_matters:
        - "The incident highlights the acute vulnerability of Western diplomatic outposts and the global spillover of political violence related to the Middle Eastern conflict."
        - "The attack triggered a sudden, massive reallocation of Canadian domestic security resources to protect foreign diplomatic installations."
