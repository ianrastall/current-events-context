      José Antonio Kast was officially sworn in as the President of Chile during a ceremony in the coastal city of Valparaíso, marking the nation's sharpest ideological shift to the right since the end of the Pinochet dictatorship in 1990. The 60-year-old former congressman, who secured a landslide runoff victory against communist candidate Jeannette Jara, succeeds the historically unpopular leftist administration of Gabriel Boric. Kast assumes the presidency for the 2026-2030 term with a mandate to implement an "emergency government" focused on aggressive public security measures, combating organized crime, curbing irregular migration through border militarization, and enacting broad neoliberal economic deregulation. The inauguration was attended by prominent conservative regional leaders, reflecting a coalescing right-wing political bloc across Latin America.
