    headline: "Iranian Forces Attack Commercial Tankers in Iraqi Waters and Strait of Hormuz"
    summary: >
      In a severe escalation of asymmetric maritime warfare, Iranian forces launched projectile and drone attacks against multiple commercial vessels navigating the Persian Gulf and the Strait of Hormuz. In Iraqi waters near the port city of Basra, the U.S.-owned, Marshall Islands-flagged crude oil tanker Safesea Vishnu was struck, resulting in the death of an Indian crew member and the evacuation of 15 others. A second vessel, the Maltese-flagged Zefyros, was attacked while preparing to enter the port of Khor Al-Zoubair, causing fires aboard both ships. Concurrently, the Thai-registered bulk carrier Mayuree Naree was hit by two Iranian projectiles while transiting the Strait of Hormuz, trapping three crew members and sparking an engine room fire. The attacks underscore Iran's strategy to kinetically blockade the crucial waterway, completely paralyzing global commercial energy traffic.
    details:
      what_happened:
        - "The U.S.-owned, Marshall Islands-flagged Safesea Vishnu was attacked near Basra, Iraq, killing one Indian sailor and forcing the evacuation of 15 crew members."
        - "The Maltese-flagged oil tanker Zefyros was struck by an explosive device or drone as it prepared to enter the Iraqi port of Khor Al-Zoubair."
        - "The Thai-registered bulk carrier Mayuree Naree was hit by two Iranian projectiles in the Strait of Hormuz, causing an engine room fire and trapping three crew members."
        - "Iran's Revolutionary Guards claimed responsibility for striking the Thai-registered vessel and a Liberia-flagged vessel, citing ignored warnings."
        - "Iraqi maritime authorities successfully rescued 38 crew members across the incidents in Iraqi waters, though searches continued for missing individuals."
      why_it_matters:
        - "The deliberate targeting of international commercial shipping has brought traffic through the Strait of Hormuz to a standstill, trapping roughly 500 tankers in the Persian Gulf."
        - "The kinetic blockade has forced a profound global macroeconomic shock, driving Brent crude oil prices above $100 per barrel and prompting coordinated emergency interventions."
      uncertainty_notes:
        - "Authorities could not immediately confirm whether the attacks in Iraqi waters were conducted via aerial drones or explosive-laden boats."
