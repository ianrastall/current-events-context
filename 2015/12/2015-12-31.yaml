Date: '2015-12-31'
Source_URI: Portal:Current events/2015 December 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in the European Union
  - Belgian house raids result in the arrest of six people concerning a New Year's
    Eve celebrations' plot in Brussels, the nation's capital. (Reuters)
  - Munich's main train station and the station in the city's western district of
    Pasing, are evacuated during New Year's Eve celebrations, and train service is
    stopped, because of potential ISIS suicide threats. A foreign security service,
    which wasn't identified, passed on information that five to seven suicide attackers
    are involved in the plot. (NBC News) (CNN)
  - Islamic State of Iraq and the Levant
  - Rochester, New York, police arrest 25-year-old Emanuel Lutchman who allegedly
    planned to attack a local bar with knives and machetes and a pressure cooker bomb
    to prove he was worthy of joining the Islamic State group. Rochester cancels New
    Year's Eve fireworks. (AP via WITN) (Waltonian)
  Disasters and accidents:
  - 2015 Missouri flooding
  - Record flooding along the Mississippi River and its tributaries that has closed
    major highways, forced evacuations, and overflowed levees, continues to threaten
    the Midwestern United States where at least 24 have died. The Mississippi is expected
    to crest in the next few days in Thebes, Illinois, at 47.5 feet, breaking the
    1995 record by more than a foot and a half (46 cm). And now periods of below-freezing
    air will cause some flooded areas to turn icy. (Reuters) (AccuWeather) (Chicago
    Tribune)
  - Air Canada Flight 88, a scheduled flight from Shanghai to Toronto, diverts to
    Calgary International Airport after the aircraft, a Boeing 777, encountered violent
    turbulence. Twenty-one passengers, including three children, were taken to hospital.
    (CBC)
  - A fire breaks out at The Address Downtown Dubai hotel. Fourteen people are reported
    as injured, with one indirect casualty. (CNN)
  Law and crime:
  - Russian President Vladimir Putin signs an amendment to Russia's law regarding
    the regulation of the use of weapons, giving the FSB the authority to use lethal
    force on crowds in order to "prevent acts of terrorism, rescue hostages, or repel
    attacks on public buildings." (Radio Free Europe/Radio Liberty)
  - The Indonesian government plans an appeal to a South Sumatra court's rejection
    of a Rp 7.8 trillion (SGD 780 million) lawsuit against a pulp and paper company
    accused of contributing to the recurring Southeast Asian hazes, particularly the
    recent incident of hazes in 2015. (BBC News) (AFP via The Straits Times)
  Politics and elections:
  - The Venezuelan Supreme Court bars four incoming lawmakers (three from the opposition
    and one from the ruling Socialist party) from taking office, putting the opposition's
    two-thirds legislative "supermajority" at risk, won via a landslide victory in
    the December 6 election by just one seat. The court is yet to specify the quorum
    for the new House, which would determine the number of seats needed for a two-thirds
    majority. The new National Assembly convenes Tuesday. (AP via Fox News Latino)
    (Latin American Herald Tribune)
