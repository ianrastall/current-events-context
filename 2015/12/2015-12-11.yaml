Date: '2015-12-11'
Source_URI: Portal:Current events/2015 December 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The Taliban claims responsibility for a car bomb attack near the Spanish embassy
    in Kabul. At least one Spanish security officer is killed. (Reuters)
  - Israeli–Palestinian conflict (2015),
  - Three Palestinians are killed by Israeli forces, two in Hebron, one of whom reportedly
    tried to ram his car into soldiers and the other during a violent demonstration
    in the West Bank city. A third Palestinian died in clashes with Israeli troops
    at the border fence between the Gaza Strip and Israel. (Today) (AP via Stars &
    Stripes)
  - 2015 Burundian unrest
  - Burundi’s army repels attacks on military barracks in the capital, Bujumbura,
    in the worst violence since this spring's unrest that developed after President
    Pierre Nkurunziza decided to seek a third term in office. According to an army
    spokesman, at least 12 gunmen are killed and 20 captured. Reports that at least
    five soldiers have been killed are denied by the army, which says the soldiers
    were wounded. Two southern sites, a police station and an army camp, were also
    attacked, with no report on casualties. Kenya Airways and RwandAir cancels its
    flights to Bujumbura. (Al Jazeera) (Bloomberg)
  - Syrian Civil War, Syrian Kurdish–Islamist conflict (2013–present)
  - A triple truck-bomb attack on the Kurdish YPG militia-controlled town of Tell
    Tamer in Syria's northeast Al-Hasakah Governorate leaves as many as 50 people
    dead and 80 others wounded. The Islamic State of Iraq and the Levant claims responsibility
    for the attacks, saying in an online statement that three of its fighters driving
    three separate vehicles had detonated the suicide bombs targeting "bases" belonging
    to Kurdish fighters. (Reuters via NBC News)
  - Second Libyan Civil War
  - The Islamic State of Iraq and the Levant's branch in Libya (Libya Province) seizes
    control of the western Libyan town of Sabratha, after storming it in retaliation
    after two of their men were arrested in a house nearby; however they then set
    up checkpoints around the town, with little opposition from the local militias
    that were supposed to be in control of the area. There are now fears that the
    militant group could destroy the town's Roman amphitheatre, which is a UNESCO
    World Heritage Site. (The Telegraph)
  - Swiss police in Geneva, following yesterday's CIA tip, arrest two Syrian nationals.
    Apparently, traces of explosives were found in their car. President Simonetta
    Sommaruga says, "There is currently no indication that there was a concrete attack
    planned." (Sky News)
  Business and economy:
  - Chinese tycoon Guo Guangchang, founder and chairman of Fosun, is reported missing
    amid the Chinese anti-corruption campaign. (The Guardian)
  - Two of the U.S.’s oldest and largest companies, DuPont and Dow Chemical Company,
    will merge in an all-stock deal valued at $130 billion. The deal, which includes
    future plans for DowDuPont to split into three independent, public companies,
    is expected to face intense scrutiny from federal antitrust regulators, who will
    examine the impact on prices and the availability of vital seeds and herbicides.(Reuters)
    (The Washington Post)
  - China's Alibaba Group Holding Limited acquires Hong Kong's largest English-language
    newspaper, the South China Morning Post, in a deal reported to be worth about
    $100 million. (UPI)
  Disasters and accidents:
  - 2015 South Indian floods
  - Major UK-based reinsurance broker Aon Benfield estimates India has suffered over
    US$3 billion (over Rs. 200 billion) worth of losses as a result of the flooding,
    and rates them as the costliest floods and the eighth-costliest natural disaster
    of 2015.(Business Standard)
  International relations:
  - 2015 United Nations Climate Change Conference
  - French Foreign Minister Laurent Fabius announces the world climate talks (COP
    21) will be extended to at least Saturday. (AP)
  - Syrian Civil War
  - Syrian President Bashar al-Assad says he will not negotiate with armed groups,
    a day after the Syrian opposition's multi-group, two-day meeting in Riyadh agreed
    on a framework for future negotiations to end the conflict. Assad's statement
    also appears to put a damper on peace talks Russia and the United States are working
    to set up. (Reuters) (Syria Online)
  - War in Donbass
  - The United States and Russia exchanged charges concerning U.N. Assistant Secretary-General
    for Human Rights Ivan Šimonović's presentation at the U.N. Security Council meeting
    on Ukraine. While violence between Ukrainian troops and pro-Russian rebels has
    lessened since September's agreement, Šimonović warned of the massive civilian
    toll if major hostilities re-erupt. OCHA's John Ging said locals face unacceptable
    physical hardships and indignities, and that the suspension of humanitarian programs
    and expulsion of humanitarian workers in non-government controlled areas must
    end. (Reuters) (UN)
  Law and crime:
  - Hannibal Gaddafi, son of Libya's late leader Muammar Gaddafi, who was kidnapped
    by militants, is released in Baalbek, Lebanon. Gaddafi's abductors said they were
    seeking information on the fate of Shiite cleric Imam Moussa al-Sadr, who disappeared
    during a trip to Tripoli in 1978. (AP via ABC News) (Epoch Times) (AP via NBC
    News-update)
  Politics and elections:
  - Libyan Civil War (2014–present)
  - Martin Kobler, United Nations envoy to Libya, announces the country's two rival
    parliaments agreement to set a target date of Dec. 16 to sign a U.N.-sponsored
    agreement on forming a national unity government. (AP via ABC News) (Reuters)
  Science and technology:
  - Washington State University researchers report in the Journal of the American
    Chemical Society that they have invented a new catalyst that promises to enable
    production of bio-based chemicals and plastics. In the future, products could
    be made from bio-based ethanol rather than superheated crude oil. Other uses for
    this new catalyst are being explored. (UPI) (Phys.org)
