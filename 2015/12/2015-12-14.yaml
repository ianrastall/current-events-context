Date: '2015-12-14'
Source_URI: Portal:Current events/2015 December 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present), Saudi Arabian-led intervention in Yemen
  - Two senior army commanders from Saudi Arabia and the United Arab Emirates are
    killed, including the head of the Saudi Special forces in Yemen, Colonel Abdullah
    al-Sahyan, along with dozens of Saudi, Emirati, Sudanese and Yemeni coalition
    troops in an OTR-21 Tochka missile attack by Houthi forces on their base near
    the city of Taiz in southwestern Yemen. (Reuters)
  - Metrojet Flight 9268
  - Egypt's Civil Aviation Ministry reports their investigation of the 31 October
    2015 deadly crash of Russian Metrojet Flight 9268 in the Sinai has not found any
    evidence of terrorism. Prior to this, the working assumption has been that plane
    was brought down by a bomb, and a group affiliated with ISIL said it was responsible.
    (Sky News) (CNN)
  - Israeli-Palestinian conflict (2015)
  - A Palestinian rams his car into a bus stop near the Chords Bridge at the entrance
    to Jerusalem before being shot dead by police; fourteen people, including a toddler,
    are injured in the attack. (Ynet News) (The Times of Israel)
  - Syrian Civil War
  - The Syrian Army backed by Hezbollah fighters retakes a key airbase on the eastern
    outskirts of Damascus. The Marj al-Sultan airbase had been under rebel control
    since November 2012. (BBC)
  - 2015 PKK rebellion
  - At least seven people are killed in clashes between Turkish security forces and
    Kurdish protesters across southeast Turkey, as Turkish authorities declare new
    curfews across the restive region. According to the Human Rights Foundation of
    Turkey, 52 curfews have been imposed since mid-August by Turkish authorities across
    seven Turkish provinces in the region, placing around 1.3 million people under
    curfew. (Reuters)
  Business and economics:
  - Oil price reached its lowest since December 2008. Other indicators in broader
    markets caused investor jitters ahead of the expected interest rate hike by the
    U.S. central bank on Wednesday. (Reuters)
  - The Seattle City Council unanimously votes to give Uber, Lyft, and other contract
    drivers the power to join trade unions. The Washington city becomes the first
    in the United States to do so. Seattle Mayor Ed Murray opposes the bill which
    can still become law without his signature. Court challenges are expected. (The
    Seattle Times) (USA Today) (The Seattle Times - background)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Typhoon Melor (Nona)
  - Thousands of residents are evacuated as Typhoon Melor, also known as Nona in the
    Philippines, slams into tiny Batag Island in the eastern Philippines. The storm,
    headed to Sorsogon province, has intensified into the equivalent of a Category
    4 hurricane. Authorities shut schools and suspended fishing and ferry services
    in the central Philippines. (AP via Columbus Ledger-Enquirer) (Reuters) (AccuWeather)
  - At least 41 people are dead after an Argentine National Gendarmerie bus crashes
    near the city of Salta in north-west Argentina. (BBC), (AP via ABC News America)
  Health and medicine:
  - The U.S. mayor of Flint, Michigan, declares a state of emergency because of lead
    levels in children’s blood caused by problems with the city's water system. (CBS
    News) (The Washington Post)
  Law and crime:
  - Censorship in China
  - Chinese human rights lawyer Pu Zhiqiang goes on trial in Beijing for online social
    commentary critical of the ruling Communist Party. (AP)
  - Chinese police prevent United States senior diplomat Dan Biers from delivering
    a statement outside the trial of Pu Zhiqiang. (Twitter) (CNN)
  - An Australian court orders British consumer goods company Reckitt Benckiser to
    stop selling several versions of the popular painkiller, Nurofen, that were identical
    to its standard ibuprofen pills but nearly twice as expensive. (AP)
  - United States Army sergeant Bowe Bergdahl will face a court martial on charges
    of misbehavior before the enemy and desertion related to his capture by the Taliban-aligned
    Haqqani network in Afghanistan in June 2009. (AP via ABC News America)
  - A Palestinian man from eastern Jerusalem, Muhammad Abu Kaf, is indicted by Israeli
    prosecutors on eight counts of incitement to violence or terror for posting a
    video on Facebook calling on people to stab Jews. (Ynet News)
  Science:
  - The Geminids meteor shower is visible tonight. (Lifehacker)
