Date: '2015-12-27'
Source_URI: Portal:Current events/2015 December 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - Battle of Ramadi
  - The Iraqi Army declares victory over Islamic State militants as their forces retake
    an important government compound in Ramadi. (Reuters) (CNN)
  - Boko Haram insurgency
  - Boko Haram militants attack the northeast Nigerian city of Maiduguri with rocket-propelled
    grenades and multiple suicide bombers. At least 30 people are reportedly killed.
    (AP via The Washington Post)
  - A twin suicide-bomb attack carried out by two female suicide bombers at a market
    in the town of Madagali, Adamawa state, leaves over 25 people dead. (BBC)
  - Syrian Civil War, Military intervention against ISIL
  - Tishrin Dam offensive
  - The Syrian Democratic Forces (SDF) backed by U.S.-led coalition airstrikes, seize
    control of the strategic Tishrin Dam on the Euphrates in eastern Aleppo from Islamic
    State of Iraq and the Levant forces. (Rudaw)
  Disasters and accidents:
  - 2015–16 UK and Ireland windstorm season
  - Storm Eva
  - Thousands of people are evacuated from their homes as flood waters continue to
    rise across large parts of northern England, with York particularly badly affected.
    (BBC)
  - Tornadoes of 2015, 2015–16 North American winter, 2015–2016 El Niño event
  - At least 11 people are killed as tornadoes strike Dallas, Texas, and five people
    die in a flash flood in Illinois. A total of 34 people have died in this week's
    smörgåsbord of storms that started Wednesday. Mark Wiley of the National Weather
    Service says this rare run of December tornado storms in the South and Midwest,
    and spring-like temperatures across much of the North and East, in part to a strong
    El Niño. (USA Today) (AP via The Greeneville Sun)
  - Missouri governor Jay Nixon declares a state of emergency as widespread flash
    flooding continues to impact the midwestern state. (Fox2Now)
  Sports:
  - Olympic champion swimmer Michael Phelps will coach the sport at Arizona State
    University upon his presumed retirement following the 2016 Olympics. (NPR) (The
    Arizona Republic)
