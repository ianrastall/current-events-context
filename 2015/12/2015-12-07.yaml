Date: '2015-12-07'
Source_URI: Portal:Current events/2015 December 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Syria's government says a U.S.-led military coalition airstrike on a Syrian Army
    camp in the eastern Deir ez-Zor Governorate, killed three Syrian soldiers and
    wounded 13 others. A senior U.S. military official denied responsibility for the
    airstrike and said that the U.S. is certain it was a Russian airstrike. (Reuters)
    (AP)
  - The Syrian Observatory for Human Rights says at least 26 civilians have been killed
    in suspected U.S.-led coalition airstrikes near the ISIL-controlled town of Al-Hawl
    in Syria's northeast Al-Hasakah Governorate. A U.S. military spokesman in Iraq
    said the reports would be investigated. (BBC)
  - Iraqi Civil War (2014–2017)
  - Turkey refuses to withdraw its forces from northern Iraq despite being given a
    48 hour ultimatum by Iraq to leave the country. Turkey says the troops are there
    as part of an international mission to train and equip Iraqi forces to fight against
    the Islamic State. The Iraqi government says it never invited such a force, and
    will take its case to the United Nations if they are not pulled out. (Reuters)
  Business and economics:
  - The United States Federal Trade Commission (FTC) files an administrative complaint
    challenging office-supplies giant Staples' proposed $6.3 billion acquisition of
    top rival Office Depot. The FTC said the deal would significantly reduce national
    competition in the market for office supplies sold to large business customers.
    The companies plan to contest the FTC decision. (USA Today) (Bloomberg via Chicago
    Tribune)
  - General Electric announces that it has abandoned its plan to sell its appliances
    business to Sweden's Electrolux. The U.S. Department of Justice had filed an antitrust
    suit in summer 2015 to block the $3.3 billion acquisition. (The Wall Street Journal)
  Disasters and accidents:
  - A powerful, magnitude 7.2 earthquake has shaken Tajikistan. It was felt as far
    away as India, Pakistan, and Afghanistan. No damage or casualties have been reported
    as the epicenter lies within the vast Badakhshan national park. The US Geological
    Survey describes the area as one of the “most seismically hazardous regions on
    Earth” because of tectonic activity along shifting fault lines. (AP) (USGS) (The
    Independent)
  - Pollution in China
  - Beijing's city government issues its first red alert for pollution, ordering schools
    to close, halting outdoor construction, and restricting car use due to hazardous
    air quality. (CNN)
  - 2015–16 UK and Ireland windstorm season
  - Storm Desmond
  - Storm Desmond shatters U.K. rainfall records as an incredible 13.44 inches of
    rain fell in 24 hours at Honister Pass in the Lake District in North West England.
    The 15.94 inches of rain at Thirlmere — also in the Lake District — set a new
    record for the 48-hour period. (The Washington Post)
  - Desmond's fury and flooding has resulted in at least two deaths. Cumbria Police
    say about 5,000 properties were flooded and around 3,000 remain without power.
    (Sky News) (ITV)
  - Flooding that's devastated parts of northwest England, on Sunday temporarily brought
    a 260-foot high waterfall in the Yorkshire Dales National Park back to life for
    the first time in residents' living memory. But by today, it stopped. (Sky News)
  - A blaze, sparked by a quick succession of between 15 and 20 gas cylinder explosions,
    in the Kandivali suburb of Mumbai, India, kills at least two and injures 11 while
    destroying around 1,000 hutment homes. (Sky News) (The Hindu)
  International relations:
  - Russia–Turkey relations
  - Turkey’s Foreign Minister Mevlüt Çavuşoğlu accuses Russia of provoking military
    gestures as a sailor aboard a Russian naval vessel wielded a rocket launcher as
    the ship passed through the Bosphorous Strait in the wake of Russia’s imposing
    sanctions on Turkey for that country’s downing of a Russian aircraft (Reuters)
  - Turkey’s President Recep Tayyip Erdoğan, in a televised speech, states that it
    is possible to find alternatives to Russian energy sources following his return
    from Qatar where he arranged a deal for liquefied natural gas (LNG) and the Turkish
    Prime Minister’s visit to Azerbaijan where energy matters were reportedly discussed.
    Turkish officials have reportedly discussed energy deals with other countries
    as well. (Radio Free Europe)
  - Russia's envoy to the International Atomic Energy Agency says he expects the historic
    nuclear deal between Iran and world powers, the P5+1, to be implemented in January.
    Before the end of the year, Iran will exchange its stockpile of low-enriched uranium
    for Russia's non-enriched forms of uranium, he said. (Reuters)
  Law and crime:
  - Iran's Cyber Police Chief announces the arrest of some 53 people for allegedly
    running websites supportive of the Islamic State militant group. (Reuters)
  - The United States Supreme Court declines (Friedman v. Highland Park) to review
    the ability of cities and states to prohibit semiautomatic, high-capacity assault
    weapons that have been used in some of the nation’s most deadly recent mass shootings.
    The nationwide assault weapons ban law expired in 2004. Since the District of
    Columbia v. Heller decision in 2008 found the Second Amendment provides the right
    for an individual to keep a weapon in the home, the court has avoided all cases
    that might clarify if that right is more expansive. (The Washington Post) (Reuters)
  - The United States Department of Justice will investigate the Chicago, Illinois
    police department. Long concerned with Chicago police department practices, the
    investigation is precipitated by the recent release of a video of the shooting
    death of Laquan McDonald. The Chicago police are set to release another video
    showing the police killing of Ronald Johnson in October of 2014. (New York Times)
    (CNN)
  - United States Homeland Security Secretary Jeh Johnson says the Obama administration
    will announce a new terror alert system "in the coming days," that will better
    inform the public about threats to the United States. This will be the third terror
    alert system put in place since the September 11, 2001, terrorist attacks. (AP
    via MLive.com)
  - Whaling in Japan
  - Australia is threatening to take legal action against Japan over its resumption
    of its controversial whale hunt in the Antarctic Ocean. A whaling fleet set sail
    last week, ignoring international condemnation, and last year's ruling by the
    International Court of Justice (ICJ) prohibiting these hunts. (AP via The Seattle
    Times) (Voice of America)
  Politics and elections:
  - Venezuelan parliamentary election, 2015
  - Venezuela's National Electoral Council announces the opposition Democratic Unity
    Roundtable (MUD) has won at least 99 seats in the 167-member National Assembly
    in Sunday's elections. The previous-ruling United Social Party of Venezuela (PSUV)
    picked up 46. Results for 22 contests remain to be determined. Voter turnout was
    a stunning 74.3 percent. "Within seconds," President Nicolás Maduro recognized
    the opposition's win, saying that despite (his party's) adverse result, Venezuela's
    democracy has triumphed. (AP) (BBC) (BBC)
  - Armenian constitutional referendum, 2015
  - Armenian voters approve, by 63.35 percent to 32.42 percent, proposed amendments
    to the Constitution that change the country's form of government to a parliamentary
    republic. Sunday's election had a 50.51 percent turnout of its registered voters.
    The opposition alleged wide-spread fraud which the Armenian Revolutionary Federation
    said didn't happen. (Asbarez)
  Science and technology:
  - The JAXA probe Akatsuki successfully enters orbit around Venus five years after
    the first attempt. This mission is Japan's first successful mission to another
    planet. The orbital injection was achieved using the probe's attitude control
    thrusters, a feat which has never been done before. (Gizmag) (Spaceflight Now)
