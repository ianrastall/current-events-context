Date: '2015-10-15'
Source_URI: Portal:Current events/2015 October 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - President of the United States Barack Obama announces that he will keep 5,500
    troops in Afghanistan. (RT)
  - Yemeni Civil War (2015–present), Saudi Arabian-led intervention in Yemen
  - European migrant crisis
  - Boko Haram insurgency
  - Israeli-Palestinian conflict
  Internal conflict in Myanmar:
  - The government of Myanmar signs a peace treaty with eight ethnic armed groups,
    although some powerful groups stay away. (AP via Star Tribune)
  - Yemen's Sana'a-controlled forces fire a Scud missile at Saudi Arabia in retaliation
    to Saudi "war crimes". A spokesman for Yemen's military allied with Houthi militants
    said the missile hit a Saudi airbase and caused "widespread destruction". There
    was no immediate comment from the Saudi side. (Reuters)
  - Thousands gather in Aden's Al Ouroudh Square to thank coalition forces and to
    celebrate victory three months after pushing Houthi militants out of southern
    Yemen. (Gulf News)
  - At least one person is reportedly killed after Bulgarian border guards open fire
    on a group of illegal migrants after they attempted to cross the border from Turkey.
    The incident happened near the southeastern town of Sredets. (AFP via Channel
    News Asia) (Yahoo)
  - A twin bombing near a mosque kills at least 26 people in the northeast Nigerian
    city of Maiduguri. (The Washington Post)
  - An Israeli is stabbed by a fellow Israeli Jew, because he is mistaken for an Arab.
    (New York Times) (The Guardian)
  Arts and culture:
  - Lennart Anderson died at age 87 in Brooklyn, New York. Also a teacher at several
    notable institutions such as Pratt Institute, the Art Students League of New York,
    Yale, Princeton, Columbia, and Brooklyn College, Anderson’s influence was felt
    by generations of artists.(New York Times)
  Business and economy:
  - Volkswagen emissions scandal
  - The German automotive watchdog KBA orders Volkswagen to recall 2.4 million cars
    in that country after the emissions scandal becomes public knowledge. (Reuters
    via SBS Australia)
  - Four Papa John's Pizza franchise owners agree to a settlement of about $500,000
    after admitting to paying employees unfair wages, according to Thursday's announcement
    by New York attorney general Eric Schneiderman and the U.S. Labor Department.
    Schneiderman has reached settlements with several other Papa John's franchises,
    including one for over $2 million. Out-of-court settlements have also been reached
    with other fast-food franchises. (UPI) (Reuters)
  International relations:
  - Vietnam says a Chinese vessel rammed into and sank one of its fishing boats near
    disputed islands in the South China Sea. More than 20 Vietnamese fishing boats
    have been attacked by Chinese vessels this year causing tensions between both
    countries. (AP via Yahoo)
  Disasters and accidents:
  - Hurricane Joaquin & SS El Faro
  - The United States National Transportation Safety Board (NSTB) has asked the U.S.
    Navy to resume the search ended by the U.S. Coast Guard for the merchant vessel
    SS El Faro believed lost on October 7 during Hurricane Joaquin. The loss of the
    ship — with its crew of 33 hands — is regarded as “the worst U.S. merchant marine
    disaster of recent memory.” (USNI News)
  Law and crime:
  - 2015 Parramatta shooting
  - Rahan Alou and Talal Alameddine are charged with assisting Farhad Jabar to kill
    New South Wales Police Force accountant Curtis Cheng in Parramatta, Australia
    on 2 October 2015. (The Guardian) (ABC News Australia)
  - A cache of classified intelligence documents published from The Intercept, released
    by an anonymous whistleblower, highlight details surrounding post-September 11
    attacks United States drone strikes in Afghanistan, Somalia, and Yemen, alleging
    that the United States conducts these strikes under extremely unreliable information
    and faulty pretenses. (Al-Jazeera America) (U.S. News) (Vice News)
  - Five individuals – four men and a teenage boy – are arrested in connection with
    the gang-rape of a 16-year-old girl at a Sydney, Australia, house party. (CNN)
  - Scottish and U.S. prosecutors identify two Libyans as suspects in the Lockerbie
    bombing. (CNN) (The Guardian)
  - The Nevada Gaming Control Board rules that daily fantasy sports leagues are a
    form of gambling that requires a license to operate in the state, including being
    offered to state residents. Due to Nevada's status as a major gambling center,
    the decision is seen as potentially influencing other U.S. states' stances on
    the leagues. (CBS News) (ESPN)
  Politics and elections:
  - 2015 United Nations Security Council election
  - Egypt, Senegal, Uruguay, Japan, and Ukraine are elected to two-year, non-permanent
    seats on the United Nations Security Council for 2016-17, replacing Chad, Chile,
    Jordan, Lithuania, and Nigeria. (New York Times)
  Science:
  - Astronomers say they have observed bizarre light patterns using the Kepler Space
    Telescope from a star that appears old, but is shrouded in debris like a much
    younger star, roughly 1,500 light-years away. This has led to speculation that
    these are an "artificial extraterrestrial mega-structure", orbiting the star known
    as KIC 8462852 in the Cygnus constellation. KIC 8462852 lies just above the Milky
    Way between the constellations Cygnus and Lyra. It first attracted the attention
    of astronomers in 2009 when the Kepler Space Telescope identified it as a candidate
    for having orbiting Earth-like planets. (Independent) (Discovery News)
  Sports:
  - 2015 MLB postseason
  - In the U.S., the New York Mets defeat the Los Angeles Dodgers 3–2 in the deciding
    Game 5 of their National League Division Series. The Mets move on to face the
    Chicago Cubs in the best-of-seven 2015 National League Championship Series, which
    opens on October 17 at the Mets' home of Citi Field. (AP via ESPN)
