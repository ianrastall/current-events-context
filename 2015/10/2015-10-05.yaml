Date: '2015-10-05'
Source_URI: Portal:Current events/2015 October 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Russian military intervention in the Syrian Civil War, Spillover of the Syrian
    Civil War
  - Turkey says a Russian warplane violated its airspace near the Syrian border, prompting
    the Turkish Air Force to scramble two F-16 fighter jets to intercept it. The Foreign
    Ministry summoned Russia's ambassador to protest the violation and urged Russia
    to avoid repeating such a violation, or it would be held "responsible for any
    undesired incident that may occur". (Reuters)
  - Iraqi Civil War (2014–2017)
  - Car-bombings across Iraq kill at least 57 people. The attacks include a rare bombing
    in the southern Basra province leaving 10 people dead. The Islamic State of Iraq
    and the Levant is suspected of being behind the attacks. (Reuters)
  - Yemeni Civil War (2015–present)
  - Fighting rages between Houthi militants and Hadi loyalists backed-by Saudi-led
    coalition forces along Yemen's Red Sea coast for control over the strategic Bab-el-Mandeb
    strait. Houthi officials say that their forces have destroyed six opposing tanks
    and killed multiple pro-Hadi fighters. Also, the UAE announces another of its
    soldiers has died during fighting in Ma'rib. (Business Insider)
  Business and economy:
  - Clothing manufacturer and retailer American Apparel files for bankruptcy. The
    company says that its 200+ retail stores will continue to operate without any
    interruptions. (The New York Times), (Forbes)
  - The World Bank estimates that 9.6 percent of the world’s population is living
    in extreme poverty this year, down from 12.8% in 2012. The bank also updated its
    global poverty line from $1.25 per day to $1.90 per day to reflect inflation and
    changes in purchasing power around the world; it was last adjusted in 2008. (Time),
    (The Guardian)
  Disasters and accidents:
  - October 2015 nor'easter
  - Additional search and rescue efforts take place in the American city of Columbia,
    South Carolina. (AccuWeather), (USA Today)
  - In South Carolina, the death toll rises to nine people in weather-related incidents
    with millions remaining homebound. Rain is forecast to continue with parts of
    the state dealing with flooding for some time. (CNN), (AP via ACBS News)
  - Hurricane Joaquin
  - The El Faro, missing since Thursday, is categorized as sunk with 33 people on
    board during Hurricane Joaquin after a debris field is found. (NBC News)
  - 2015 Pacific typhoon season
  - Typhoon Mujigae
  - At least nine people are dead as Typhoon Mujigae hits southern China in the midst
    of the country's weeklong National Day holiday. Mujigae also generates several
    strong tornadoes and leaves dozens of fishermen missing. Nearly 200,000 people
    had been evacuated before the storm made landfall. Neighboring Guangxi Zhuang
    region orders 12,700 fishing boats and 35,400 offshore workers to return to port.
    (AP), (International Business Times)
  - Tropical Storm Kabayan (local name for then-Tropical Storm Mujigae) leaves at
    least two dead in the Philippines with two injured and 63 persons missing. The
    system intensified as it leaves the Philippine Area of Responsibility heading
    toward China. (Manila Sun Star), (Philippine Star)
  International relations:
  - The government of Nauru announces that the Nauru Detention Centre will become
    an "open facility" where people seeking asylum in Australia will be able to move
    freely around the island. (ABC News Australia)
  - North Korea repatriates a South Korean student held in detention since April.
    (Yonhap News)
  Law and crime:
  - The Independent Commission Against Corruption charges former Chief Executive of
    Hong Kong Donald Tsang with corruption. (Hong Kong Free Press)
  - The Trans-Pacific Partnership between the United States and 11 Pacific Rim countries
    is finalized in the American city of Atlanta. According to wikileaks, the main
    point of the deal will be that trans-national corporations will not be subjected
    to the laws of individual countries. Instead, an international system will be
    formed with the right to overrule national laws and legal decisions. (The Australian)
  Politics and elections:
  - Governor Jerry Brown signs legislation which will go into effect in late 2016,
    legalizing euthanasia statewide in California. (CNN)
  Science and technology:
  - William C. Campbell, Satoshi Omura, and Tu Youyou win the 2015 Nobel Prize in
    Medicine for their work on parasitic diseases. (AP), (The Washington Post)
