Date: '2015-10-24'
Source_URI: Portal:Current events/2015 October 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - A series of bomb blasts targeting Shia Muslims in the Bangladeshi capital Dhaka
    kills at least one person and injures dozens more. Claims of responsibility by
    ISIS are discounted by Dhaka police who told AFP, "So far we have not found any
    link to any militant group." (Reuters) (Christian Science Monitor)
  - Sinai insurgency, Egyptian parliamentary election, 2015
  - A first lieutenant and two soldiers have been killed in an explosion which targeted
    a police armored vehicle in the northern Sinai city of Al-Arīsh. (NY Times)
  - Two suspected militants riding a motorcycle shoot and kill Mostafa Abdelrahman,
    the ultraconservative Salafi Al-Nour Party secretary, and parliamentary candidate
    for Al-Arīsh. Arish residents say militants have threatened candidates, accusing
    them of cooperating with the government. Al‑Nour is the only prominent Islamist
    party to emerge unscathed after the military's 2013 crackdown on Islamists. (Reuters)
    (AFP via Bangkok Post)
  - Israeli–Palestinian conflict (2015)
  - Violence continues while talks persist looking for a peaceful resolution. A 16-year
    old Palestinian is shot dead after he tried to stab an Israeli security guard
    at a West Bank border crossing. A 25-year old Palestinian protester died of wounds
    suffered last week when he was shot by Israeli troops during a border clash near
    the Gazan town of Khan Yunis. (Reuters) (AP)
  - Syrian Civil War
  - Al-Nusra Front's (Al-Qaeda's branch in Syria) leader Abu Suleiman al-Masri is
    reportedly killed in the Aleppo province during clashes with the Syrian Army.
    (Independent)
  - Saudi Arabian-led intervention in Yemen
  - At least 40 people, including several fishermen, are reportedly killed following
    Saudi-led coalition airstrikes on two islands off Yemen's Red Sea coast. Local
    fisherman reported coalition aircraft and warships struck the Aqban and Kadman
    islands targeting Houthi forces but also destroyed several boats killing local
    fishermen. (Reuters)
  Arts and culture:
  - Actress Maureen O'Hara dies in her sleep at her Boise, Idaho, home. "She passed
    peacefully surrounded by her loving family as they celebrated her life listening
    to music from her favorite movie, The Quiet Man," said her family's statement.
    (AP) (ABC News)
  - Close to 300 landmarks in 60 countries, from the Pyramids in Egypt, to the Eiffel
    Tower in Paris, and the Empire State Building in New York, were lit up in blue
    — the official color of the United Nations — to commemorate the 70th anniversary
    of the world body. (New York Times) (UN) (Blue photos UN)
  - The three-week synod on the family convened by Pope Francis at the Vatican concludes
    with traditional Catholic orientations toward marriage and the family intact.
    (New York Times)
  Disasters and accidents:
  - A Union Pacific freight train derails in flooded North Texas, near Corsicana,
    where the tracks washed away. The two crewmen on board swam to safety. (CBS News)
    (WFAA blog)
  - 2015 Pacific hurricane season
  - Hurricane Patricia, which hit the Mexican coast as a Category 5 storm, appeared
    to leave remarkably little damage as it moved rapidly inland over mountainous
    western Mexico and is now a tropical depression (35 mph/55 kph). The storm is
    currently centered northeast of Zacatecas, Mexico, moving northeast at 24 mph/39
    kph. While there are no reports of casualties or substantial widespread damage,
    authorities warn deadly floods and mudslides remain possible. (ABC News) (CTV
    News) (NHC)
  - 2015 Oklahoma State University homecoming parade crash
  - A driver, arrested on suspicion of driving under the influence (DUI), plows into
    the Oklahoma State Homecoming parade in Stillwater, Oklahoma, killing four people
    and injuring 34 with eight in critical condition. The homecoming game with Kansas
    was played at 2:30 p.m. CT as scheduled. (USA Today) (KOCO) (AP via WFLX) (Stillwater
    News Press)
  - Costa Rica's restive Turrialba Volcano erupts. (The Tico Times)
  International relations:
  - Israeli–Palestinian conflict (2015)
  - Israel and Jordan agree to take steps to quell violence at the Al-Aqsa Mosque
    in Jerusalem which includes round-the-clock monitoring of new security cameras
    there. Israel reaffirms Jordan's historic role as formal custodian of what is
    known to Jews as the Temple Mount and as Haram al-Sharif to Muslims. Yesterday,
    Israeli authorities lifted restrictions that had banned men aged under 40 from
    praying at al-Aqsa. (Reuters) (BBC) (Washington Post)
  - 2015 anti-government protest in Montenegro
  - Thousands protest and clash with police in Montenegro's capital Podgorica, demanding
    the immediate resignation of Prime Minister Milo Đukanović. Đukanović has rejected
    calls to resign and has accused the opposition of trying to prevent the country's
    NATO membership, saying he is convinced Russia is behind the unrest. (AFP via
    Yahoo)
  Law and crime:
  - Ahmed Adeeb, the Vice President of the Maldives, is arrested on suspicion of links
    to an explosion on the boat of President of the Maldives Abdulla Yameen last month.
    (AP via Washington Post)
  - A cache of over 7,000 stolen firearms is discovered by law enforcement in the
    U.S. state of South Carolina. (Charlotte Observer)
  Politics and elections:
  - Louisiana gubernatorial election, 2015
  - Voters in Louisiana go to the polls to elect its next governor. The winner will
    succeed Bobby Jindal, who is in his second and final term, and is a candidate
    for the Republican nomination in the 2016 presidential election. (Reuters) (Houma
    Courier)
