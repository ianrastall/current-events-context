Date: '2015-10-01'
Source_URI: Portal:Current events/2015 October 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gaza–Israel conflict
  - In retaliation for the rocket fired on the Israeli city of Ashdod, the Israeli
    Air Force carries out airstrikes on suspected Hamas positions in Gaza. No casualties
    are reported. (The News Hub)
  - War in Afghanistan (2001–2021)
  - Battle of Kunduz
  - The government of Afghanistan claims to have recaptured the city of Kunduz. (AFP
    via ABC News Australia)
  - Taliban forces take over the Warduj District of the Badakhshan Province as government
    forces retreat. (WVTM)
  - A C-130J transport aircraft crashes in eastern Afghanistan as it approaches the
    airport in Jalalabad killing at least 11 people on board. A U.S. military spokesman
    says there were no reports of enemy fire at the time. (Al Jazeera), (ABC News),
    (Reuters)
  - Syrian Civil War
  - Russian intervention in the Syrian Civil War
  - Russian air-strikes reportedly kill U.S.-backed Syrian rebels as Russian jets
    bomb rebel positions in rural areas of northern Syria, including the town of Jisr
    al-Shughour, which is currently held by Islamist militant groups including Al-Qaeda's
    branch in Syria, the Al-Nusra Front. (The Telegraph)
  - Hezbollah fighters and newly arrived Iranian troops are reportedly preparing for
    a 'major ground offensive' in northern Syria, backed by Russian air-strikes. (Reuters)
  - Iraq's prime minister Haider al-Abadi endorses Russian air-strikes against ISIS
    forces in Iraq while expressing 'disappointment' with the U.S.-led coalition.
    (Times Live)
  - Turkey–PKK conflict
  - 2015 PKK rebellion
  - Four Turkish soldiers are killed in PKK attacks across southeastern Turkey. Turkish
    authorities impose a curfew in the city of Mardin due to escalating violence.
    (Today's Zaman)
  - Chinese authorities arrest a suspect in yesterday's 17 Liucheng County mail bomb
    explosions that killed at least seven people and wounded more than 50. The suspect
    is identified as 33-year-old quarry-worker, Wei Yinyong, from Dapu township also
    in Guangxi Province. There is another explosion this morning. While it's not clear
    if it is connected, authorities reportedly located 60 packages yesterday which
    were being examined by a bomb squad. (The New York Times), (Asia One), (Voice
    of America), (Al Arabiya)
  - 2015 Umpqua Community College shooting
  - A mass shooting at Umpqua Community College in Roseburg, Oregon kills nine people
    and leaves seven wounded. The shooter commits suicide when confronted by the police.
    The man's motives are unknown. (Reuters), (CNN), (BBC News), (Reuters)
  - The shooter is identified as 26-year-old Chris Harper-Mercer. (CBS News), (Palm
    Beach Post)
  - An Israeli couple are murdered in a shooting attack on their car in the northern
    West Bank; four of the couple's children are in the vehicle at the time but are
    not hit by the gunfire. Hamas praises the "heroic attack" and calls for "more
    high-quality attacks." (The Times of Israel), (Israel National News), (Breaking
    Israel News), (VOA News)
  - Yemeni Civil War
  - Government forces and the Southern Resistance backed by coalition forces wrest
    control of the strategic strait of Bab Al Mandab and a small Mayoun Island in
    the Red Sea from Houthi militants. (AP via Fox News) (Gulf News), (Al Jazeera)
  - Boko Haram insurgency
  - Five girl bombers attack the Nigerian city of Maiduguri with at least 14 people,
    including the girls, killed and 39 injured. (BBC)
  Business and economy:
  - The UAW at Fiat Chrysler Automobiles reject a four-year contract, setting the
    stage for at least localized strikes against the automaker.(Reuters)
  Disasters and accidents:
  - 2015 Atlantic hurricane season
  - Hurricane Joaquin
  - Hurricane Joaquin becomes a Category 4 hurricane with maximum sustained winds
    of 130 mph. Some additional strengthening is possible tomorrow. The storm, moving
    at just 6 mph, is predicted to drop 10 to 15 inches of rain in the central Bahamas
    with up to five inches expected for the rest of the archipelago. (Nassau Tribune),
    (NHC)
  - Joaquin, expected to pick up forward speed when it turns north tomorrow, could
    hit the East Coast this weekend. While forecasts of the storm's trajectory are
    still uncertain, nearly every state from North Carolina to Connecticut is in the
    so-called "cone of uncertainty." North Carolina and New Jersey join Virginia in
    declaring states of emergency. (UPI), (Reuters)
  Health and medicine:
  - The World Health Organization (WHO) recommends everyone diagnosed with HIV immediately
    receive antiretroviral therapy and recommends preventative treatment for all at
    "substantial risk" of infection. Previously, the UN health agency had recommended
    to physicians that the threshold for patient intervention was the presentation
    of symptoms. (The Verge), (Time), (WHO)
  International relations:
  - Bahrain recalls its ambassador to Iran and expels the Iranian acting chargé d'affaires
    who is declared persona non-grata, a day after Bahraini security forces discovered
    a large bomb-making factory in Nuwaidrat and arrested a number of suspects linked
    to Iran's Revolutionary Guards. Bahrain's decision to recall its ambassador comes
    "in light of continued Iranian meddling in the affairs of the kingdom of Bahrain
    in order to create sectarian strife and impose hegemony and control." (The Daily
    Star), (Gulf News)
  Transportation:
  - The Alstom Metropolis C751Cs entered service on the North East MRT line, operated
    by SBS Transit Ltd.
