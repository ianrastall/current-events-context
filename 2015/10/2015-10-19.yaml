Date: '2015-10-19'
Source_URI: Portal:Current events/2015 October 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict (2015)
  - 19-year-old soldier Omri Levy was killed and nearly a dozen injured in a shooting
    and stabbing attack in the central bus station in the southern city of Beersheba
    carried out by an Israeli Bedouin Arab, 21-year old Mohind al-Okbi, who was killed
    after a gun battle. (Washington Post) (NBC News)
  - Israeli hospital officials announce an Eritrean migrant, Haptom Zerhom, mistakenly
    shot by an Israeli security guard and then attacked by bystanders who thought
    he was involved in the Beersheva bus station attack, has died of his wounds. Foreign
    Ministry spokesman Emmanuel Nahsho said this latest incident seemed to capture
    the current climate of ratcheted-up tensions. Police are looking to identify and
    locate members of the crowd who beat and fatally wounded the man; the security
    officer whose shot incapacitated the victim will not be investigated. (AP) (Yediot
    Ahronot – Ynet)
  - 'War in Afghanistan (2001–2021): Kunduz hospital airstrike'
  - Afghanistan’s acting defense minister has stated that the Médecins Sans Frontières
    hospital in Kunduz bombed on 3 October by U.S. forces was being used as a safe
    haven by insurgents. MSF has repeatedly denied the allegation, stating "Every
    staff member in Kunduz working for MSF has repeatedly reported to us that there
    were no armed people in the hospital at the time of the bombing". (AP)
  Business and economics:
  - China’s economy expanded 6.9% in third quarter over last year’s growth, just slightly
    better than forecast. (New York Times)
  - Shareholders from both companies overwhelmingly approve Aetna's acquisition of
    Humana for $37 billion. (Louisville Courier-Journal) (Reuters)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Rising floodwaters are causing problems in the northern Philippines as Typhoon
    Koppu (Lando in the Philippines) is set to linger over the island of Luzon until
    Wednesday. Eleven people have died so far. (BBC) (AP via Fox News)
  - Seven hikers are killed by a forest fire while climbing Indonesia's Mount Lawu.
    (The Telegraph)
  International relations:
  - The United States Navy and the Japanese Maritime Self-Defense Force held a triennial
    fleet review off Tokyo Bay. Prime Minister Shinzo Abe became the first sitting
    Japanese leader to board a U.S. aircraft carrier when he visited the USS Ronald
    Reagan. (USA Today) (Japan Times)
  - 'Pope Francis encourages bishops from around the world to sign an appeal to world
    leaders, meeting in Paris next month, for crucial climate change talks. In a major
    teaching document in June, the encyclical Laudato Si'' (Latin: Praised be), Francis
    denounced what he called the “structurally perverse” fossil fuel-based world economy
    that exploits the poor and destroys the habitability of the Earth for humans.
    (AP via Washington Post)'
  - European migrant crisis
  - Croatia reopens its border with Serbia allowing thousands of refugees to cross.
    (Irish Times)
  - Elements from the maritime forces of India, Japan, and the United States engage
    in joint military exercises in the Bay of Bengal. (Military Times)
  - South Ossetian President Leonid Tibilov announces South Ossetia intends on holding
    a referendum on joining the Russian Federation. Tibilov said reuniting with Russia
    "is a century-long dream of the South Ossetian people". (Radio Free Europe)
  Law and crime:
  - Spencer Stone, primarily responsible for thwarting an August terrorist attack
    on a train en route to Paris from Amsterdam and later stabbed in downtown Sacramento
    has undergone open heart surgery. The wounds from the most recent altercation
    were more serious than previously reported. (Air Force Times)
  - South African athlete Oscar Pistorius is released from prison to serve the rest
    of his sentence for culpable homicide of Reeva Steenkamp under house arrest. (The
    Guardian)
  - Following 21 days of deliberation the deadlocked jury in Manhattan declared a
    mistrial in the case against three former senior attorneys from the “once large
    and prominent law firm” Dewey & LeBoeuf. The three had been charged with “plotting
    to manipulate financial records in an attempt to defraud bank lenders and insurance
    companies during the financial crisis.” (New York Times)
  Politics and elections:
  - Canadian federal election, 2015
  - The Canadian Liberal party led by Justin Trudeau won the federal election with
    184 seats. (CBC)
  - ministerial screening, Amaechi response to the Senate
  - The screening of ministerial nominees resumed on Thursday, with the screening
    of six nominees including former River State Governor, Rotimi Amaechi, PDP senators
    were also silent as senate screens amaechi and six others. (naij.com) (thenationonlineng.ne)
  - The Under Secretary of Veterans Affairs for Benefits, Allison Hickey, at the beleaguered
    United States Department of Veterans Affairs resigned. She held the post since
    June 2011. (Military Times)
  - U.S. Secretary of Transportation Anthony Foxx announced that all unmanned aircraft,
    i.e. drones, will be required to be registered with the government just as manned
    aircraft are. DOT is forming a task force of government leaders and diverse stakeholders
    who will determine the specifics of which drones will be covered and how the registration
    process will work. (Forbes) (Reuters) (NBC News) (DOT)
  - War in Donbass
  - Portraits of former dictator Joseph Stalin go up in the city of Donetsk as the
    Donetsk People's Republic adopts more Soviet era policies. (The Guardian)
  - Eric Chu, KMT party chairman, has replaced Hung Hsiu-chu as Taiwan’s ruling party
    candidate just months ahead of elections. (The Diplomat)
  Science and technology:
  - Apple pulls hundreds of iOS mobile applications from its App Store which, the
    company discovered, includes software that was secretly sending users’ personal
    information to an advertising firm in China. (NBC News) (TechCrunch)
