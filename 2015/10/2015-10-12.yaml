Date: '2015-10-12'
Source_URI: Portal:Current events/2015 October 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 Ankara bombings
  - The Prime Minister of Turkey Ahmet Davutoglu states that Islamic State in Iraq
    and the Levant is the prime suspect in Saturday's bombing. (Reuters via Thomson
    Reuters Foundation)
  - Israeli-Palestinian Conflict, Palestinian political violence
  - Palestinians carried out three stabbing attacks against Israeli citizens and police
    in Jerusalem today with two of the attackers shot dead as the wave of violence
    continues, police said. There have been a series of stabbing attacks in Israel
    and the West Bank in recent days that have wounded several Israelis; nine attackers
    have been shot dead. Also, at least 16 Palestinians have been killed by Israeli
    forces during/after violent demonstrations in the West Bank and Gaza. (AP via
    Houston Chronicle) (Times of Israel) (Israel National News)
  - An Arab attempting to stab pedestrians on a street in Tel Aviv is subdued by bystanders,
    with no injuries reported. (Israel National News)
  - Two Palestinian teenagers stab and critically injure a Jewish teenager and another
    man in East Jerusalem’s Pisgat Ze’ev neighborhood in the third stabbing attack
    in the capital in six hours; one attacker is neutralized by a motorist and the
    second is shot dead by police. (The Jerusalem Post)
  - Islamist militants kill two Tunisian soldiers and injure four others who were
    seeking to free a man kidnapped in a mountainous area near the border with Algeria.
    (Reuters) (Azeri-Press Agency)
  - Syrian Civil War, American-led intervention in Syria
  - U.S. cargo planes airdrop small arms ammunition and other supplies to Syrian rebels,
    including Kurdish groups such as YPG, in northern Syria. (Reuters)
  Business and economics:
  - U.S. computer maker Dell takes over EMC Corporation for $US67 billion. (BBC)
  International relations:
  - Syria Civil War, Foreign involvement
  - European Union foreign ministers, gathered in Luxembourg to discuss the situation
    in Syria, release a statement urging Russia to stop its attacks in Syria and direct
    efforts towards a political solution. (Daily Sabah) (Australian Broadcasting Corporation)
    (European Council)
  - The government of Ukraine bans all Russian airlines from flying into Ukraine from
    October 25 in response to Moscow's decision in September to impose a similar ban
    on Ukrainian airlines. (Radio Free Europe)
  Law and crime:
  - Iranian State television reports that court spokesman Gholam-Hossein Mohseni-Eje'i
    clarified the Iranian-American reporter's verdict -- Washington Post's Jason Rezaian
    was convicted in a closed-door espionage trial that ended two months ago. Details
    remain unknown. Rezaian faced four charges; it's not clear whether he was convicted
    of all charges nor what sentence was imposed. Leila Ahsan, Rezaian’s lawyer, also
    had not received the verdict as of Sunday. Post executive editor Martin Baron
    says they will appeal. (The Washington Post) (Payvand.com)
  - London police end their three-year long, round-the-clock guard outside the Ecuadorian
    Embassy waiting to arrest WikiLeaks founder Julian Assange. Officers have been
    stationed at this embassy since June 2012. Police said the operation cost 11.1
    million pounds (17.6 million dollars) through April 2015. Assange is wanted for
    jumping bail in England and sexual assault allegations in Sweden. Assange denies
    the Swedish charges and suspects the real reason is to bring him to the U.S. (NBC
    News) (AP via Newser) (London Metropolitan Police)
  - Post 2011 Egyptian Revolution trials
  - Cairo's criminal court orders the release of the sons of former Egyptian leader
    Hosni Mubarak, who are waiting for the Court of Appeal's decision in a financial
    corruption case. Each was sentenced to three years. The court ruled Gamal and
    Alaa Mubarak, who were initially detained in April 2011, had already served the
    requisite time in prison for the sentence. (New York Daily News) (Reuters)
  Politics and elections:
  - Jioji Konrote is elected President of Fiji by the country's Parliament. Konrote,
    Fiji's Minister for Employment, Productivity and Industrial Relations, received
    31 votes, defeating Epeli Ganilau, who garnered 14 votes. (Radio New Zealand International)
  - The Vanuatuan Speaker of the Parliament, Marcellino Pipite, serving as acting
    President, pardons himself and 13 other MPs who had been found guilty of bribery
    on 9 October 2015. (ABC News)
  Science:
  - Angus Deaton wins the Nobel Memorial Prize in Economic Sciences for his analysis
    of consumption, poverty, and welfare, helping redefine the way poverty is measured
    around the world, notably in India. (Huffington Post) (Washington Post)
