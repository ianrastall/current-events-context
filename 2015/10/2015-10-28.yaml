Date: '2015-10-28'
Source_URI: Portal:Current events/2015 October 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Taliban insurgents seize the Darqad District in the northeast Takhar Province
    near the border with Tajikistan. At least six Afghan troops are killed in the
    fighting. (Reuters) (AP via The Daily Mail)
  - Michael Fallon, Secretary of State for Defence for the United Kingdom, announces
    that over 400 troops will remain in Afghanistan through 2016. The military personnel
    will train Afghan toops and support NATO operations in Kabul. (Military Times)
  - Boko Haram insurgency
  - Suspected Boko Haram militants kill 14 civilians in the southeast Diffa Region
    of Niger near the Nigerian border. The Nigerien government recently approved a
    law prolonging a 15-day state of emergency for the Diffa region by three months
    in a bid to boost security. (Reuters)
  - 2015 Ankara bombings
  - Ankara's Chief Prosecutor's office says it has "strong evidence" that an Islamic
    State group — based in Gaziantep, near the Syrian border — is behind the bombings
    at this month's Ankara peace rally that killed 102 people, as well as four previous
    attacks in Turkey since May that have mainly targeted supporters of a pro-Kurdish
    party. (AP) (AFP via NDTV)
  Disasters and accidents:
  - 2015 Hindu Kush earthquake
  - Aid workers warn that survivors of the earthquake are at risk of dying of exposure
    as temperatures in Pakistan and Afghanistan fall to near freezing levels. (Time)
  - The death toll from Monday's quake rises to 385. (AP via the Southern Illinoisan)
  - A military JLENS blimp from the United States Army broke loose from its moorings
    at the Aberdeen Proving Ground in Maryland, and drifted over 16,000 ft above Pennsylvania.
    F-16 Fighter jets were scrambled to track the blimp that has since deflated, causing
    widespread power outages from a long cable it dragged along the ground. (NBC)
    (Washington Post)
  - European migrant crisis
  - The Greek coastguard says they rescued 242 migrants whose wooden boat sank north
    of the island of Lesbos, but at least three drowned, including two small boys.
    (Reuters) (AP via CBS News)
  International relations:
  - European migrant crisis
  - Slovenia's prime minister, Miro Cerar says Slovenia is ready to build a fence
    on its border with Croatia if an EU plan to stem the flow of migrants across the
    Balkans fails. (AP via ABC News)
  - Austrian Chancellor Werner Faymann, when discussing management of the flow of
    migrants with the press, talks about "technical security" measures but insists
    there will be "no fence" at the Slovenian border. This, in contrast to Interior
    Minister Johanna Mikl-Leitner who earlier spoke of plans for a "fence" on the
    border to Slovenia. Austria has been one of the more vocal countries criticizing
    Hungary's decision to build a fence along its border with Serbia. (AP) (BBC)
  - The Government of Japan invalidates a decision by Takeshi Onaga, governor of Okinawa,
    to halt the expansion of a U.S. military base on the island. (Bloomberg Business)
  Health and medicine:
  - The World Health Organization reports tuberculosis has surpassed human immunodeficiency
    virus (HIV), as the leading cause of global death, despite the death rate from
    tuberculosis having been cut in half over the last 25 years. Most deaths from
    tuberculosis could be prevented, researchers said, but detection and treatment
    aren't happening fast enough. (UPI)
  - The International Agency for Research on Cancer (IARC), the cancer agency of the
    World Health Organization (WHO), has evaluated the carcinogenicity of the consumption
    of red meat and processed meat. After thoroughly reviewing the accumulated scientific
    literature, a Working Group of 22 experts from 10 countries convened by the IARC
    Monographs Programme classified the consumption of red meat as probably carcinogenic
    to humans (Group 2A), based on limited evidence that the consumption of red meat
    causes cancer in humans and strong mechanistic evidence supporting a carcinogenic
    effect. This association was observed mainly for colorectal cancer, but associations
    were also seen for pancreatic cancer and prostate cancer. Processed meat was classified
    as carcinogenic to humans (Group 1), based on sufficient evidence in humans that
    the consumption of processed meat causes colorectal cancer. (Science Daily)
  Law and crime:
  - Censorship in Turkey
  - Turkish police storm and shut down both Kanaltürk TV and Bugün, TV stations that
    have been critical of the ruling Justice and Development Party (AKP) ahead of
    a general election on November 1. Baris Yarkadas, a lawmaker with the main-opposition
    Republican People's Party (CHP), said “We are witnessing the police entering news
    organizations, delivering declarations and taking over journalists’ seats—just
    like junta periods, this is called a police state”. (The Wall Street Journal)
    (Today's Zaman)
  - In Aberdeen, Scotland, one student has died of injuries, and another has been
    arrested, after a stabbing at Cults Academy (Independent)
  - Dennis Hastert, former United States Speaker of the House of Representatives (1999–2007),
    pleaded guilty to a federal financial crime in a hush money case stemming from
    sexual misconduct allegations. The sentencing hearing is scheduled for February
    29, 2016. The crime carries a sentence of up to five years in prison and $250,000
    fine. Prosecutors recommend zero to six months imprisonment. (Reuters) (AP via
    ABC News)
  Politics and elections:
  - Ivorian presidential election, 2015
  - Official results from the presidential election held on Sunday show that President
    of the Ivory Coast Alassane Ouattara has been reelected. (AFP via Daily Mail)
  - In the Netherlands, the Undersecretary for Infrastructure and Environment Wilma
    Mansveld resigns following the publication of a damning report about the problems
    with the international high-speed rail service Fyra. (DutchNews)
  - Members of the Republican party in the United States House of Representatives
    nominate Paul Ryan of Wisconsin to replace John Boehner of Ohio as Speaker of
    the House. There will be a formal vote Thursday on the House floor. (New York
    Times)
  - Tanzanian general election, 2015
  - Tanzania's opposition Chadema party presidential candidate Edward Lowassa calls
    for a recount of Sunday's election for the presidency before official results
    are announced tomorrow. Meanwhile, the election commission chief of semi-autonomous
    Zanzibar nullifies their results, which opposition presidential candidate Seif
    Sharif Hamad of the Civic United Front announced he won on Monday. The United
    States said it's "gravely alarmed" and called for reversal of the annulment. (AP
    via ABC News) (Reuters) (Mail & Guardian Africa)
  - Myanmar general election, 2015
  - A United Nations rights investigator raises concern whether Myanmar's election,
    scheduled for November 8, 2015, could be considered free and fair because dozens
    of candidates have been disqualified and hundreds of thousands of people denied
    the right to vote. (Reuters) (Council on Foreign Relations)
  - Elections in Nepal
  - The Nepalese Parliament elects the country's first female president, Communist
    Party of Nepal (Unified Marxist–Leninist) vice-chairperson Bidhya Devi Bhandari,
    by a vote of 327 to 214. (The Guardian)
  Science:
  - The Cassini probe makes a close flyby of Saturn's sixth-largest moon, Enceladus,
    coming within approximately of the surface and passing through the icy plume above
    the south pole. The transit of the plume was the deepest to date. Photographs
    and other data from the mission are expected within 48 hours. (BBC Online) (JPL
    Press Release)
  - An article published in Nature reports high levels of molecular oxygen found by
    the Rosetta space probe on comet 67P/Churyumov-Gerasimenko. This discovery could
    have implications for theories of the origin of the solar system. (Radio New Zealand
    Online) (BBC Online) (Nature Press Release) (Nature Article Synopsis)
