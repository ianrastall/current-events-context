Date: '2015-10-13'
Source_URI: Portal:Current events/2015 October 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Russian involvement in the Syrian Civil War
  - Two shells hit the Russian embassy in Syria's capital Damascus, as hundreds of
    pro-government supporters rallied outside in support of Russian airstrikes. Russian
    Foreign Minister Sergey Lavrov described the shelling as "a terrorist act." (BBC)
  - Israeli–Palestinian conflict, Palestinian political violence
  - 'Two stabbing attacks take place in Ra''anana: one outside city hall in which
    one man is injured and the attacker is subdued by civilians; in a second incident,
    the attacker stabs civilians in front of a cafe, injuring one critically and three
    lightly until he is subdued by civilians. (The Jerusalem Post)'
  - In Jerusalem two Palestinian men attempted to stab passengers on a bus before
    being shot; one person was killed and another wounded as a driver rammed into
    a crowd and the attacker reportedly stepped out of the crashed vehicle and attempted
    to stab the wounded before being subdued by police; in a separate incident two
    male passengers were killed and three others suffered gunshot wounds in a combined
    shooting and stabbing attack on a bus in the neighborhood of Armon Hanatziv in
    southern Jerusalem. (The Times of Israel)
  Arts and culture:
  - Jamaican author Marlon James wins the 2015 Man Booker Prize for his novel A Brief
    History of Seven Killings inspired by the attempted assassination of Bob Marley
    in the 1970s. (BBC)
  Disasters and accidents:
  - The Dutch Safety Board releases their final report into the Malaysia Airlines
    Flight 17 (MH17) disaster that concludes that the flight from Amsterdam to Kuala
    Lumpur was shot-down by a Russian-made Buk missile system on 17 July 2014 killing
    298 people. (Sky News) (BBC) (Al Jazeera) (9News)
  - At least 13 people are killed as a rockslide hits shanties in the Gulistan-i-Jauhar
    in the Pakistani city of Karachi. (Dawn)
  Business and economics:
  - Anheuser-Busch InBev agrees to buy its main rival SABMiller for £68 billion ($104
    billion) in the biggest beer deal ever. (CNN)
  International relations:
  - Relocation of Marine Corps Air Station Futenma
  - The Governor of the Japanese prefecture of Okinawa, Takeshi Onaga, revokes permission
    given by a predecessor for landfill work to replace a United States Marine Corps
    base. (Japan Times)
  - Iran's Islamic Consultative Assembly approves the deal on its nuclear program
    agreed with six world powers. (BBC)
  - Territorial disputes in the South China Sea
  - The United States and Australia warn China they remain committed to freedom of
    navigation in the waters of the South China Sea and express strong concerns at
    China’s construction of artificial islands in the disputed waters. (Channel News
    Asia) (The New Daily) (Time)
  Politics and elections:
  - Burkina Faso's presidential and parliamentary elections are deferred to November
    29 due to a recent coup. (Yahoo! News)
  Sports:
  - 2015 MLB postseason
  - In the U.S., the Chicago Cubs defeat the St. Louis Cardinals 6–4 in Game 4 of
    their National League Division Series (NLDS), winning the best-of-five-game series
    3–1. The Cubs, who clinched a postseason series at their home for nearly a century,
    Wrigley Field, for the first time ever, move on to the best-of-seven 2015 National
    League Championship Series. The series opens on October 17 at the home park of
    the winner of the other NLDS between the Los Angeles Dodgers and New York Mets.
    (AP via ESPN)
