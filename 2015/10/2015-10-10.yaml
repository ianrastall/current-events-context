Date: '2015-10-10'
Source_URI: Portal:Current events/2015 October 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Palestinian militants fire 3 rockets into Israel during the night after several
    violent riots throughout Israel and the West Bank. (BBC)
  - Israeli security forces shoot dead two Palestinians aged 12 and 15 in protests
    along Gaza's border fence. (Reuters)
  - The death toll from Friday's violence at the Gaza Strip border is now seven Palestinians.
    Of the 60 wounded, 10 were seriously injured. Massive riots managed to breach
    the border fence and enter Israeli territory and were dispersed by live fire.
    (Ynet News)
  - 2015 Ankara bombings
  - Twin bomb blasts in the Turkish capital Ankara near the main train station leave
    at least 97 people dead and over 400 wounded. The bombing occurred during a peace
    rally protesting the conflict between Turkey and the militant Kurdish PKK. (BBC),
    (CNN), (Sky News Australia)
  - Boko Haram insurgency
  - Five suicide bombers target a village in Chad that is home to thousands of Nigerian
    refugees who have fled Boko Haram, killing at least 36 people. (AP)
  - War in Afghanistan (2001–2021)
  - The U.S. Department of Defense will make payments to families of victims of last
    week's U.S. airstrike that struck a Médecins Sans Frontières (Doctors Without
    Borders) hospital in the Afghan city of Kunduz. At least 22 people were killed
    including 12 staff members and 10 patients, including three children. MSF says
    33 people are still missing and presumed to have died in the fire. (Reuters) (NBC
    News) (AFP via ABC News)
  - Mali conflict
  - Suspected jihadists attack Dioungani, a village in central Mali, killing a local
    official in front of his family. (AP)
  Disasters and accidents:
  - At least eight people have died in a major fire at a halting site for Irish travellers
    in the south of Dublin. (Irish Times)
  - An Indonesian chopper carrying five people lost contact with air traffic control
    during a flight on North Sumatra, Indonesia. (Channel News Asia)
  International relations:
  - Territorial disputes in the South China Sea
  - China completes the construction of two lighthouses on the disputed Spratly Islands
    in the South China Sea according to Chinese state media. The U.S. and the Philippines
    have opposed the construction efforts. (The Guardian)
  - North Korea holds a massive military parade in its capital, Pyongyang, to celebrate
    the 70th anniversary of Workers' Party of Korea rule in the country. Liu Yunshan,
    the highest-ranking Chinese official to visit North Korea in three years, attends
    the parade. (BBC)
  - Egypt–France relations
  - During a state visit to Cairo by French prime minister Manuel Valls, Egypt officially
    signs a deal with France to purchase the two Mistral-class helicopter carriers
    that were originally destined for Russia but France refused to deliver due to
    the Ukrainian crisis. Russia will sell Egypt the helicopters originally intended
    for the ships. (Times of India)
  Politics and elections:
  - Over 150,000 people protest in Berlin against the Transatlantic Trade and Investment
    Partnership accord between the European Union and the United States. (RT), (DW),
    (CNBC), (France24)
  Sport:
  - Mexico defeats the United States 3-2 in the 2015 CONCACAF Cup. (CONCACAF)
