Date: '2015-01-11'
Source_URI: Portal:Current events/2015 January 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Charlie Hebdo shooting
  - Thousands of police and military personnel prepare to secure a Paris unity rally
    with up to a million people expected to attend. (Daily Mail)
  - An arson attack on the German newspaper Hamburger Morgenpost, which published
    cartoons from Charlie Hebdo, causes no injuries but leads to two arrests. (Reuters
    via DNA)
  - Boko Haram
  - More female suicide bombers, this time two, and again each believed to be around
    10 years old, kill themselves and three others at a market in the northeastern
    city of Potiskum, Nigeria. (Reuters via News24)
  Disasters and accidents:
  - Indonesia AirAsia Flight 8501
  - Divers retrieve the flight data recorder from the crashed jet. (AP)
  - The death toll from the Karachi traffic accident rises to 62. (Indian Express)
  Politics and elections:
  - Croatian presidential election, 2014–15
  - Former diplomat and foreign minister Kolinda Grabar-Kitarović from the Croatian
    Democratic Union narrowly defeats incumbent president Ivo Josipović and will become
    the first female president of Croatia on February 18, 2015. (BBC)
  - Sri Lankan presidential election, 2015
  - The new Sri Lankan government announces that it will investigate allegations of
    a coup attempt by Mahinda Rajapaksa, in a bid to retain power after being defeated
    at the polls. (Deutsche Welle)
  Science and technology:
  - Public photographs become available of SpaceX's Falcon 9 rocket after the experimental
    recovery attempt of the first stage fails and crash-lands on a floating platform
    in the SpaceX CRS-5 resupply mission. (Space Flight Now)
