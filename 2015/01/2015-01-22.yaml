Date: '2015-01-22'
Source_URI: Portal:Current events/2015 January 22
Intelligence_Payload:
  War in Donbass:
  - An explosion near a civilian trolleybus in the city of Donetsk kills at least
    thirteen people. Separatists and pro-government forces blame each other for the
    incident. (BBC)
  Shia insurgency in Yemen:
  - Yemeni President Abdu Rabu Mansour Hadi, Prime Minister Khaled Bahah, and the
    Yemeni cabinet resign. (CNN)
  Business and economy:
  - The European Central Bank announces an aggressive money-creation program, printing
    more than one trillion new euros. (Reuters)
  - Pacific Data Images shuts down as part of DreamWorks Animation's restructuring
    plans following the box-office underperformance of 2014's Mr. Peabody & Sherman
    and Penguins of Madagascar, cutting off 500 jobs.(Variety)
  Disasters and accidents:
  - Edgewater Police Chief William Skidmore says that workers doing plumbing work
    accidentally started the January 21 fire in The Avalon at Edgewater apartments
    in Edgewater, New Jersey that caused the destruction of 240 units and displaced
    1,000 residents. (AP)
  Zambian presidential election, 2015:
  - Heavy rains in Zambia cause delays in voting and counting in the presidential
    election with announcements to resume today. (AP via Mediacom)
  Sports:
  - Four-time NASCAR Cup Series champion Jeff Gordon announces that the upcoming 2015
    season will be his last as a full-time driver. (ESPN)
