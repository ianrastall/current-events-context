Date: '2015-01-10'
Source_URI: Portal:Current events/2015 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomb attack on a Shiite mosque in Rawalpindi, Pakistan, kills at least
    seven people. Militants linked to the Taliban and al-Qaeda have previously attacked
    the country's Shiite minority. (AAP via SBS News)
  - Boko Haram
  - A female suicide bomber, believed to be aged around 10 years old, kills herself
    and 19 others, possibly against her will, at a market in the northeastern city
    of Maiduguri, Nigeria. (Wall Street Journal) (BBC)
  - Syrian Civil War spillover in Lebanon
  - A suicide attack by al-Nusra Front (al-Qaeda's official affiliate in Syria) at
    a café in Tripoli, Lebanon, kills at least seven people. (Reuters)
  Disasters and accidents:
  - A traffic accident between an oil tanker truck and passenger coach en route to
    Shikarpur from Karachi on the Pakistan National Highway Link Road near Gulshan-e-Hadeed,
    Karachi, results in at least 57 dead and scores injured. (The News)
  Law and crime:
  - A bomb threat on Tigerair Flight 539 at Melbourne Airport, Victoria, Australia,
    causes disruptions for passengers and airlines throughout the airport. (News.com.au)
  - A shooting spree in Moscow, Idaho, U.S., leaves three dead and one injured. After
    a high-speed chase on Highway 195 ten miles away in the neighboring state of Washington,
    Pullman police arrest the suspect, John Lee. (AP)
  - A mass poisoning at a funeral in Mozambique involves beer that was deliberately
    contaminated with crocodile bile leaving at least 56 dead and 146 hospitalized.
    (FOX8LIVE)
  Science and technology:
  - SpaceX successfully launches a Falcon 9 rocket from Cape Canaveral, Florida, as
    part of boosting its Dragon spacecraft into space for a Monday arrival at the
    ISS in the SpaceX CRS-5 resupply mission. However, an experimental recovery attempt
    of the first stage fails when it crash-lands on a floating platform possibly due
    to insufficient hydraulic fluid, resulting in damage to the platform. The state
    of the destruction of the launch vehicle is publically unknown. (Space.com) (Twitter)
  - The Golden Gate Bridge Highway and Transportation District temporarily closes
    the Golden Gate Bridge until Monday to install a $30 million moveable barrier
    between opposite traffic flows. (SF Gate)
  Sports:
  - In American football, Tom Brady of the New England Patriots breaks the National
    Football League records for career postseason yardage and touchdown passes in
    the AFC Divisional playoff game against the Baltimore Ravens won by the Patriots
    35–31, advancing them to the AFC Championship game. (Sports Illustrated)
