Date: '2015-01-23'
Source_URI: Portal:Current events/2015 January 23
Intelligence_Payload:
  Disasters and accidents:
  - City officials of Glendive, Montana declare that the tap water is safe to consume
    following the January 17 oil spill in the Yellowstone River. (Mohave Daily News)
  International relations:
  - The Doomsday Clock moves two minutes forward, leaving only three minutes from
    midnight due to the threat of global nuclear war and climate change. It is the
    closest it has been to midnight since 1984. (The Guardian) (The Independent) (The
    Washington Post)
  Law and crime:
  - San Mateo County, California prosecuters charge an Oregon inmate, Rodney Halbower
    (who was already serving a 30-year sentence for an attempted murder), with two
    of the murders from the six 1976 Gypsy Hill killings. (CBS News)
  - The U.S. Southern District of Alabama strikes down the state ban on same-sex marriage
    in Alabama, saying it has violated equal protection and due process rights. Alabama
    becomes the thirty-seventh state where such marriage is legalized. (USA Today)
    (The Guardian)
  Politics and elections:
  - Custodian of the Two Holy Mosques King Abdullah of Saudi Arabia dies at the age
    of 90. His half brother Salman of Saudi Arabia succeeds him. His half brother
    Muqrin bin Abdulaziz Al Saud becomes the Crown Prince. (CNN)
  - Thailand's military-appointed legislature votes to impeach former Prime Minister
    Yingluck Shinawatra for her role in overseeing a government rice subsidy program
    that lost billions of dollars. (AP)
  Sports:
  - Sumo wrestler Hakuhō Shō wins a record-breaking 33rd makuuchi championship. (Japan
    Times)
