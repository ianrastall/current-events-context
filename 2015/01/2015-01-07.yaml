Date: '2015-01-07'
Source_URI: Portal:Current events/2015 January 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Charlie Hebdo shooting
  - Gunmen attack the Paris office of the French satirical magazine Charlie Hebdo,
    killing twelve people and injuring ten. Some witnesses report that the gunmen
    identified themselves as belonging to al-Qaeda in Yemen. A 2011 issue had depicted
    a cartoon of the Islamic prophet Muhammed. (BBC)
  - French police identify three suspects in the killings with raids being conducted
    in the city of Reims for the assailants, brothers Said and Cherif Kaouchi, aged
    32 and 34, respectively, and Hamyd Mourad, 18. (Washington Post) (Bloomberg via
    Washington Post)
  - al-Qaeda insurgency in Yemen
  - A car bomb explodes outside a police college in the Yemeni capital Sana'a with
    at least 38 people reported dead and more than 50 wounded. (Reuters) (BBC) (Al
    Jazeera)
  Arts and culture:
  - Archaeologists in China uncover 2,800-year-old tombs (Eastern Zhou dynasty) in
    Hubei province. (Ancient Origins)
  Disasters and accidents:
  - An Andhra Pradesh State Road Transport Corporation bus falls into a ravine near
    the town of Penukonda in the Indian state of Andhra Pradesh killing at least 20
    people. (DNA)
  Health:
  - Nature publishes the findings of Northeastern University scientists that a new
    class of drug can kill antibiotic-resistant bacteria. (Reuters)
  - The California Department of Public Health investigates at least nine measles
    cases linked to Disneyland attendance. (The LA Times)
  International relations:
  - Philippines President Benigno Aquino III demands an investigation after a drone
    purportedly belonging to the United States Navy is found in the Philippine province
    of Quezon, the second found in the country. (Manila Standard Today)
  - The United States denounces a flag-raising ceremony at Taiwan's de facto embassy
    in Washington DC, saying the ceremony violated US-Taiwan ties. (AFP via Yahoo!)
