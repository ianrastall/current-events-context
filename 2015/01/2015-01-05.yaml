Date: '2015-01-05'
Source_URI: Portal:Current events/2015 January 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Libyan Civil War (2014–present)
  - A Libyan warplane bombs a Greek-operated oil tanker anchored offshore the city
    of Derna, killing two sailors, one Greek and one Romanian. The Greek government
    condemned what it called an "unprovoked and cowardly" attack and demanded an investigation
    and punishment for those responsible. (Reuters)
  - Boko Haram
  - News emerges that two days prior hundreds of Boko Haram militants had overrun
    several towns in northeast Nigeria and captured the military base in Baga. (Wall
    Street Journal)
  - Two militants, one wearing a suicide vest, kill two Saudi Arabian border guards
    and a general near the border with Iraq. (Businessweek)
  - Bangladeshi police report that two opposition Bangladesh Nationalist Party activists
    are shot dead in clashes with members of the ruling Awami League in the town of
    Natore on the first anniversary of disputed general election. (BBC)
  - A suicide car bomber hits the headquarters of EUPOL Afghanistan in Kabul, Afghanistan,
    killing one person and injuring five others. The Taliban have claimed responsibility.
    (AP via ABC)
  Arts and culture:
  - A Czech archaeological team discovers the tomb of formerly unknown Ancient Egyptian
    queen Khentakawess III who lived during the Fifth Dynasty. (CNN)
  - The site where Jesus may have been tried, prior to his crucifixion, opens to the
    public for the first time located under an abandoned prison building, called Kishle,
    that is part of the Tower of David Museum ground in the Old City of Jerusalem,
    Israel. (Huffpost)
  Business and economics:
  - China relaxes controls over the export of rare-earth elements after losing a case
    brought by the United States at the World Trade Organization. (AP)
  - Ireland becomes the first European nation to be allowed to export beef to the
    United States since the mad cow disease scare 15 years ago. (AP via Star Tribune)
  Disasters and accidents:
  - For the second day in a row a multi-story residential building in Nairobi, Kenya,
    collapses, this time an 8-story building, killing one person with eight people
    still missing. (AP via ABC)
  - An avalanche near the Rettenbach glacier in the Austrian Alps, kills two prospects
    for the United States ski team, Ronnie Berlack and Bryce Astle. (AP)
  - After being grounded in Abu Dhabi for over 12 hours with all passengers on board,
    Etihad Airways Flight 183 completes its flight to San Francisco International
    Airport. (KRON).
  International relations:
  - South Korea announces that it will repatriate the remains of Chinese People's
    Liberation Army soldiers killed in the Korean War. (Yonhap)
  - Lebanon implements stricter immigration rules on its Syrian border in response
    to the refugee crisis caused by the Syrian Civil War. (Reuters)
  Law and crime:
  - Taiwan's justice ministry releases former President Chen Shui-bian from jail on
    a one-month medical parole. (BBC)
  - The anti-graft body of the Communist Party of China detains Yang Weize, incumbent
    Party Secretary of Nanjing, the provincial capital of Jiangsu province, for investigation.
    (South China Morning Post)
  - The Justice Department charges two American citizens of Gambian descent with violating
    the Neutrality Act by helping to finance and lead the 2014 Gambian coup d'état
    attempt. (New York Times)
  Sport:
  - In ice hockey, the 2015 World Junior Ice Hockey Championships close with Canada
    beating Russia in the gold medal game, while Slovakia captures bronze. (Canadian
    Press via Yahoo! Sports Canada)
