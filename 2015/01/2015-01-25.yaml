Date: '2015-01-25'
Source_URI: Portal:Current events/2015 January 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro insurgency in the Philippines
  - Around 30-50 people die in clashes between the Philippine National Police and
    the Moro Islamic Liberation Front threatening a peace agreement between the Philippines
    government and the rebels. (Reuters)
  Arts and culture:
  - The Miss Universe pageant crowns Miss Colombia Paulina Vega in Miami, Florida.
    (AP)
  Disasters and accidents:
  - A massive blackout strikes Pakistan, leaving as much as 80 percent of the country
    without electricity at its height as officials rush to restore power. (AP)
  International relations:
  - US President Barack Obama meets Indian Prime Minister Narendra Modi for a three-day
    visit in India. (USA Today)
  Politics and elections:
  - The anti-austerity SYRIZA party wins a plurality in the 2015 Greek legislative
    elections. (Reuters)
  Sports:
  - In college basketball, Duke head coach Mike Krzyzewski becomes the first NCAA
    Division I men's coach with 1,000 career wins, following the Blue Devils' 77–68
    win over St. John's at Madison Square Garden in New York City. (ESPN)
