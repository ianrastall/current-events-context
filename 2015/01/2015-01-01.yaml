Date: '2015-01-01'
Source_URI: Portal:Current events/2015 January 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Yemen
  - The death toll of the suicide bombing in Ibb, Yemen, that occurred on December
    31 rises to 49 with the injury count rising to 70. (AFP via Business Standard)
  - A shooting kills one and injures six people in Killarney, Calgary, Canada, with
    police making no arrests. (National Post)
  Business and economy:
  - Lithuania adopts the euro as its official currency, becoming the 19th member of
    the Eurozone. (CNN)
  - U.S. fast-food restaurant chain Chick-fil-A warns that a security breach may have
    leaked credit card details of 9,000 customers in five states. (Daily Mail)
  International relations:
  - The Palestine Authority signs a treaty to join and participate in the International
    Criminal Court. (Wall Street Journal)
  - The Eurasian Economic Union between Russia, Kazakhstan, Belarus, Kyrgyzstan and
    Armenia comes into effect (Novinite)
  Law and crime:
  - Vietnam’s new marriage law goes into effect, abolishing regulations that “prohibit
    marriage between people of the same sex.” (Bloomberg)
  Politics and elections:
  - Mario Cuomo, former governor of the U.S. state of New York, dies at the age of
    82. (Reuters)
