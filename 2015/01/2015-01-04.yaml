Date: '2015-01-04'
Source_URI: Portal:Current events/2015 January 4
Intelligence_Payload:
  War in North-West Pakistan:
  - A U.S. drone strike kills eight Uzbek people claimed to be linked with al-Qaeda
    in Pakistan. (Channel 9 News)
  - The Pakistan Air Force strikes Pakistani Taliban positions in Khyber Agency, Pakistan,
    killing 31 militants. (Channel 9 News)
  - A bomb detonates at a volleyball match in Orakzai Agency, Pakistan, killing four
    people and injuring eight. (AFP via The Daily Star)
  Northern Mali conflict:
  - A vehicle carrying United Nations peacekeepers hits a roadside bomb in northern
    Mali, injuring six soldiers. (Reuters)
  Shia insurgency in Yemen:
  - A bombing at a local Houthi movement headquarters in Dhamar Governorate, Yemen,
    kills five people and wounds 25. (AP via The Daily Star)
  Somali Civil War:
  - A suicide car bomber detonates near a military convoy in Mogadishu, Somalia, killing
    four people. (BBC)
  Disasters and accidents:
  - A six-story building collapse in Nairobi, Kenya, kills one person and leaves several
    others injured. (New Zealand Herald)
  Religion:
  - Pope Francis announces the appointment of 20 new Cardinals, many of them coming
    from outside of Europe. (Reuters)
  Sport:
  - In darts, Gary Anderson of Scotland defeats Phil Taylor of England 7-6 to win
    his first PDC World Darts Championship. (Reuters via ABC News Australia)
