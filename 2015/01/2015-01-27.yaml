Date: '2015-01-27'
Source_URI: Portal:Current events/2015 January 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Libyan Civil War (2014–present)
  - 2015 Corinthia Hotel attack
  - Five gunmen at the Libyan Corinthia Hotel in Tripoli attack with at least ten
    dead. The hotel was previously the location in 2013 where a former prime minister
    was abducted. (AP)
  - Israeli–Lebanese conflict
  - Israeli security forces claim that Hezbollah and forces loyal to the President
    of Syria Bashar al-Assad are responsible for firing rockets from Syrian territory
    onto the Golan Heights into the mount Hermon sky resort. (Xinhua)
  Arts and culture:
  - Pope Francis holds a private meeting with a transsexual man and his fiancée at
    the Vatican. (The Daily Mail)
  Disasters and accidents:
  - The death toll from the January 26 crash of a Hellenic Air Force F-16 fighter
    jet in southern Spain rises to eleven. (AP)
  - January 2015 nor'easter
  - New England sees the worst of the blizzard with Boston, Massachusetts covered
    in two feet of snow. (AP)
  Science and technology:
  - American 1964 Nobel Prize-winning physicist Charles Hard Townes, who helped invent
    the now-ubiquitous laser, dies at the age of 99. (AP)
  Sports:
  - 2015 AFC Asian Cup
  - Australia wins 2–0 against United Arab Emirates to advance to the 2015 AFC Asian
    Cup Final for the second consecutive time. (Daily Mail)
