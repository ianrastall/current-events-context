Date: '2015-01-12'
Source_URI: Portal:Current events/2015 January 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - Apparent ISIL computer hackers attack the feeds for the United States Central
    Command for Twitter and YouTube. (Reuters)
  - Boko Haram
  - Cameroon kills 143 Boko Haram fighters in clashes. (Reuters)
  Disasters and accidents:
  - The eruption of the Hunga Tonga volcano disrupts flights to and from Tonga. (Radio
    New Zealand)
  - A school bus plunges off of a cliff on the Caribbean island of St. Vincent leaving
    at least five people dead and two missing. (AP)
  - An electrical malfunction causes a fire in the Washington, D. C.'s Metro subway
    system near L'Enfant Plaza Station resulting in one death with 84 people taken
    to hospitals, mostly from smoke inhalation. (AP)
  - In Rovinari, Romania, a father and 6 siblings, aged from 6 months to 7 years,
    die after a gas water boiler emits carbon monoxide. (Nation.com)
  Law and crime:
  - Chinese police kill six attacking militants wearing explosive devices in Xinjiang.
    (Reuters) (Naharnet)
  - A serviceman stationed at the Russian 102nd Military Base, Valeri Permyakov, kills
    six members of an Armenian family, including a two-year-old child, and, in addition,
    wounds a six-month-old child, in Gyumri, Armenia, initiating a manhunt by the
    Armenian security services until his capture. (ArmeniaNow) (News.Armenia)
  - District Attorney Kari Brandenburg of New Mexico's Second Judicial Circuit federally
    charges two Albuquerque Police Department officers with murder in the March 16,
    2014 shooting death of James Boyd in Albuquerque, New Mexico, U.S. (CNN)
  - The death toll from poisoned beer in the Mozambique rises to at least 69 with
    169 in hospital. Further, medical experts begin to question if the source of the
    contamination was the deliberate addition of crocodile bile or instead the often
    used foxglove flowers (which contain digitalis) for homebrewing locally-derived
    Pombe beer. (AFP/Reuters via ABC News Australia) (Forbes)
  Science and technology:
  - The SpaceX CRS-5 supply ship arrives at the ISS with groceries and Christmas gifts.
    (AP)
  Sports:
  - In association football, Cristiano Ronaldo of Real Madrid C.F. wins the FIFA Ballon
    d'Or for the best player of the year for his second successive year. (BBC)
  - In American football, the Ohio State Buckeyes defeat the Oregon Ducks to win the
    inaugural College Football Playoff National Championship at AT&T Stadium in Arlington,
    Texas by a score of 42–20. (AP)
