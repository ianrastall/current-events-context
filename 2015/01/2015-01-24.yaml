Date: '2015-01-24'
Source_URI: Portal:Current events/2015 January 24
Intelligence_Payload:
  War in Donbass:
  - A rocket attack on an open-air market in Mariupol, Ukraine, leaves at least 27
    people killed and more than 90 injured. The pro-Russian rebel leader, Alexander
    Zakharchenko, announces an offensive on Mariupol. (AP via ABC News) (Al Jazeera)
    (Reuters)
  Islamic State of Iraq and the Levant:
  - The Islamic State kills eight Lebanese soldiers in the northeastern Lebanese village
    of Ras Baalbek. (AP)
  - Japan states that it is seeking to verify a video that claims the killing of Japanese
    hostage Haruna Yukawa by Islamic State militants. (BBC)
  Business and economy:
  - Subsequent to the January 15 announcement that Target Canada would close all 133
    stores, they announce the layoff of 17,000 employees. (CBC)
  Health:
  - The measles outbreak at Disneyland (Anaheim), which originated on December 28,
    2014 (patient zero being an unvaccinated California woman who apparently transmitted
    the virus through airports and the theme park), but was unreported until January
    7, spreads from California to six other states, including Nebraska, and Mexico.
    It now involves at least eighty-five cases. (AJC) (CBS)
  Politics and elections:
  - Edgar Lungu of the ruling Patriotic Front party wins the Zambian presidential
    election. (ABC News)
  Sports:
  - Golden State Warriors shooting guard Klay Thompson sets a National Basketball
    Association record for most points in a single quarter with 37. He also sets a
    league record for most three-pointers in a quarter, with nine. (Sports Illustrated)
  - Rob Manfred succeeds Bud Selig as Commissioner of Major League Baseball. (MLB.com)
