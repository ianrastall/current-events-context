Date: '2015-01-03'
Source_URI: Portal:Current events/2015 January 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - Fleeing villagers from a remote part of the Borno State report that Boko Haram
    had three days prior kidnapped around 40 boys and young men. (BBC)
  Arts and culture:
  - Turkey permits the building of a Syriac church in Istanbul, the first construction
    of a Christian house of worship allowed since the founding of the modern republic
    in 1923. (Dawn) (BGN News)
  Disasters and accidents:
  - The Singapore-registered cargo ship runs aground on Bramble Bank off the coast
    of the Isle of Wight, in the entrance to Southampton Water. (BBC News)
  - ', a Norwegian-owned cargo ship, sinks off the coast of Vietnam, with eighteen
    dead and one survivor. (KRON)'
  - The Cypriot-registered cargo ship sinks off the northern coast of Scotland leaving
    eight onboard missing. (BBC News)
  Law and crime:
  - A prison in Bruges, Belgium, will euthanise serial rapist and murderer Frank Van
    Den Bleeken on January 11. (International Business Times)
  Politics and elections:
  - Greek parliamentary election, 2015
  - Former Prime Minister George Papandreou announces the formation of a new party,
    Movement of Democratic Socialists, threatening to push the long-dominant PASOK
    under the election threshold. (Al Jazeera) (Reuters)
