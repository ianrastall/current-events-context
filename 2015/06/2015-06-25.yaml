Date: '2015-06-25'
Source_URI: Portal:Current events/2015 June 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Islamic State of Iraq and the Levant forces re-enter the Kurdish town of Kobanî
    after a successful large-scale counterattack against the Kurds. (BBC)
  Business and economy:
  - Kim Jong-un, the leader of North Korea, opens a new terminal at Pyongyang Sunan
    International Airport. (BBC)
  Disasters and accidents:
  - 2015 Pakistani heat wave
  - The death toll from the heat wave passes 1,000 in Sindh province alone. (CNN)
  - The wreckage of a small plane carrying eight passengers on a shore excursion from
    Holland America Line's MS Westerdam cruise ship is discovered near the Alaskan
    town of Ketchikan. All nine people on board including the pilot died. (AP via
    Seattle Times)
  Health:
  - 2015 Middle East respiratory syndrome outbreak in South Korea
  - The number of MERS casualties in South Korea rises to 29 with the number of cases
    rising to 180. (Yonhap)
  International relations:
  - India offers Nepal an additional billion dollars to help it recover from the April
    2015 Nepal earthquake. (Reuters via Daily Mail)
  - South Africa reviews its participation in the International Criminal Court following
    a failed attempt to arrest the President of Sudan, Omar al-Bashir, on South African
    soil. (BBC)
  - The Prime Minister of Haiti Evans Paul accuses the Dominican Republic of causing
    a humanitarian crisis by mass deportation of people mainly from Haiti. (AP via
    Star Tribune)
  Law and crime:
  - The Committee to Protect Journalists claims that the Government of Egypt has incarcerated
    18 journalists, mostly from Al-Jazeera. (AP via The Guardian)
  - More than 400 Albanian police supported by Army helicopters surround the village
    of Lazarat in southern Albania known as the "cannabis Kingdom" where an armed
    criminal gang has entrenched itself. (AFP via ABCNews Australia)
  - A journalist from CNN is shot and killed in the Philippines, the 27th journalist
    murdered during the administration of Benigno Aquino III. (Rappler)
  - King v. Burwell
  - The Supreme Court of the United States upholds key elements of the Patient Protection
    and Affordable Care Act (Obamacare) including subsidies for healthcare policies
    and employer mandates, with a 6-3 vote. (CNBC)
  Politics and elections:
  - The United States House of Representatives votes to grant President Barack Obama
    fast track authority for the Trans-Pacific Partnership. (AP)
  Sports:
  - In basketball, the 2015 NBA draft is held at the Barclays Center in Brooklyn,
    New York, with the Minnesota Timberwolves selecting Karl-Anthony Towns as the
    first pick. (Los Angeles Times)
