Date: '2015-06-20'
Source_URI: Portal:Current events/2015 June 20
Intelligence_Payload:
  Attacks and armed conflicts:
  - Second Libyan Civil War
  - Dozens of ISIL militants are killed following a militia attack on the eastern
    city of Derna. ISIL has had a significant presence in Derna since the end of 2014.
    (Yahoo)
  Law and crime:
  - In Slovakia, thousands of demonstrators rally against European Union plans to
    host asylum-seekers, and dozens are detained after they attacked spectators of
    a cycle race in the capital, Bratislava. (New York Times), (RT)
  - 2015 Graz van attack
  - Three people are killed and dozens more are injured as a man drives his car into
    a crowd in Graz, Austria. (AP via News24)
  Politics:
  - Anti-austerity movement
  - Tens of thousands in London demonstrate anti-austerity protests outside the Parliament.
    (Reuters UK)
  Sport:
  - In association football, the 2015 FIFA U-20 World Cup concludes in Auckland with
    Serbia defeating Brazil, 2–1, in the final. (AP via ESPN)
  - In Major League Baseball, Washington Nationals pitcher Max Scherzer, one strike
    away from a perfect game, loses his bid when he hits the Pittsburgh Pirates' José
    Tábata with a pitch. Scherzer retires the next batter to complete a 6–0 win and
    a no-hitter. (ESPN)
