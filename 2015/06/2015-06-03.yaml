Date: '2015-06-03'
Source_URI: Portal:Current events/2015 June 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - The Saudi Arabia led coalition launches airstrikes on military bases near the
    Yemeni capital Sanaa. (Reuters)
  - The Grozny Chechnya office of the Committee Against Torture NGO is attacked by
    masked men who came out of a crowd of protesters. They broke down the door and
    trashed the office. National Leader Ramzan Kadyrov speculated the attack could
    have been carried out by relatives of Dzhambulat Dadayev upset that the NGO which
    investigates torture did not lead protests of the shooting of Dadayev by law enforcement
    officers from another region. Moscow Times
  - War in Donbass
  - Pro-Russian separatists launch an offensive to take Marinka, Ukraine, 5 kilometers
    from the separatist capital of Donetsk. At least 19 people have died in fighting.
    Ukrainian sources claimed at least 10 tanks took part in the battle. (AFP via
    Yahoo! News), (New York Times)
  Disasters and accidents:
  - Sinking of the Dong Fang Zhi Xing
  - The search continues for survivors of the Dong Fang Zhi Xing which sank on China's
    Yangtze River with 450 passengers on board. So far, 18 people have been confirmed
    dead with 14 people rescued. (CCTV via Twitter)
  - At least 11 people are killed in a fire at a filling station in the Ghanaian capital
    Accra. (Kasapa)
  International relations:
  - South Korea has successfully test fired two ballistic missiles that can hit all
    of North Korea. (AP)
  Law and crime:
  - 2015 FIFA corruption case
  - Interpol issues red notices linked to arrest warrants for two former FIFA officials
    Jack Warner and Nicolas Leoz and four executives. (Interpol via Twitter), (AP),
    (ITV)
  - Former FIFA official Chuck Blazer admits to taking bribes in relation to bids
    for the 2010 and 1998 FIFA World Cups. (CNN)
  Politics and elections:
  - 2016 United States presidential election
  - Former Governor of Rhode Island Lincoln Chafee announces he is seeking the Democratic
    Party nomination. (New York Times)
