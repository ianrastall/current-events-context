Date: '2015-06-14'
Source_URI: Portal:Current events/2015 June 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Fifteen Taliban militants, including the shadow governor for Kunar Province, are
    killed in a NATO airstrike. (IANS via Business Standard)
  - Syrian Civil War
  - Thousands of Syrians flee into Turkey as Kurdish fighters come closer to capturing
    the border town of Tell Abyad from Islamic State in Iraq and the Levant. (AP)
  Disasters and accidents:
  - 2015 Tbilisi flood
  - Flooding in the Georgian capital, Tbilisi, destroys animal enclosures at a zoo
    resulting in the release of potentially dangerous animals and the death of three
    zookeepers and six other people. (AP), (USA Today), (Reuters, DPA via WA Today)
  - 2015 Alaska Sockeye wildfire
  - A wildfire near Willow, Alaska in the Matanuska-Susitna Borough burns over 6,500
    acres, numerous structures and closes the George Parks Highway, severing the road
    link between Anchorage and Fairbanks.(Alaska Dispatch News)
  Health:
  - 2015 Middle East respiratory syndrome outbreak in South Korea
  - A South Korean man is hospitalised in the Slovak capital Bratislava with symptoms
    of MERS as the death toll in South Korea rises to 15. (Sky News Australia), (Al-Jazeera)
  International relations:
  - Save The Children
  - Ministry of Interior, Government of Pakistan has suspended its order against the
    NGO Save the Children for closure of its working and allowed the international
    aid agency to resume its operation in Pakistan. (Express Tribune) (ARY Digital)
  - A South Korean official claims that North Korea is placing land mines in the Korean
    Demilitarized Zone to stop soldiers from defecting. The Korean DMZ already contains
    an estimated 1 million mines. (Yonhap)
  Law and crime:
  - International Criminal Court investigation in Darfur
  - The International Criminal Court asks South Africa to arrest the President of
    Sudan Omar al-Bashir for alleged war crimes when he arrives at the African Union
    summit. (AFP via Straits-Times)
  - The High Court in Pretoria grants an interim order preventing al-Bashir from leaving
    South Africa, and postpones the application for his arrest to the next day to
    allow the government more time to prepare. (News24) (News24)
  Politics and elections:
  - Thousands of people march in Hong Kong to demand the Legislative Council reject
    a China backed proposal for the naming of candidates for Chief Executive be done
    by a nominating committee. (Bloomberg)
  Science:
  - The European Space Agency's Philae spacecraft wakes up after six months in hibernation
    as comet 67P/Churyumov–Gerasimenko gets closer to the sun. (BBC)
  Sport:
  - In motor sport, the Porsche 19 team of Earl Bamber, Nick Tandy and Nico Hulkenberg
    wins the 2015 24 Hours of Le Mans. (Fox Sports)
