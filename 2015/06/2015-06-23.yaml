Date: '2015-06-23'
Source_URI: Portal:Current events/2015 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Military intervention against ISIL
  - The Kurdish People's Protection Units (YPG) capture the military base Brigade
    93 and enter the town of Ayn Issa, the first defense line of ISIL north of its
    de facto capital al-Raqqah.
  - ISIL claims it has started the destruction of the ancient complex of Palmyra.
    (euronews)
  Arts and culture:
  - South Korean author Shin Kyung-sook admits to plagiarising a short story from
    Japanese author Yukio Mishima. (AP)
  - Australian author Sofie Laguna wins the Miles Franklin Award for her novel The
    Eye of the Sheep. (ABC News Australia)
  Business and economy:
  - The deputy speaker of the Greek parliament, Alexis Mitropoulos, warns that the
    body may reject concessions the government had made to the country's creditors.
    (Reuters)
  Disasters and accidents:
  - 2015 Pakistani heat wave
  - The death toll from the 2015 Pakistan heatwave rises to 450. (AFP via Yahoo News)
  Health:
  - South Sudan declares a cholera outbreak after 18 people die and 171 are infected.
    (Al-Jazeera), (REUTERS)
  International relations:
  - Hungary unilaterally suspends European Union asylum seeker rules that require
    it to take back people who first enter Hungary, then travel to other nations.
    (Reuters)
  Law and crime:
  - Charleston church shooting
  - Amazon.com announces that it is removing Confederate Flag merchandise from sale
    following the shootings. (Time)
  Sport:
  - The suspension appeal hearings for Tom Brady's 4-game suspension over Deflategate
    begin today. (New York Times)
