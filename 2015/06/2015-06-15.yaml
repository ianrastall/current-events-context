Date: '2015-06-15'
Source_URI: Portal:Current events/2015 June 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 23 people are killed and more than 100 injured in suicide attacks on
    police headquarters and training centers by suspected Boko Haram members in N'Djamena,
    Chad. (New York Times)
  - Balochistan conflict
  - Over 100 Baloch rebels pledge allegiance to the government after abandoning armed
    struggle. (AFP)
  - Syrian Civil War
  - Kurdish YPG forces and Free Syrian Army rebels seize control of the ISIL stronghold
    of Tell Abyad in northern Al-Raqqah Governorate. (IBT)
  Arts and culture:
  - The 800th anniversary of the sealing of the Magna Carta by King John of England
    is commemorated around the world. (BBC)
  Business and economy:
  - Drugstore operator CVS Health agrees to buy Target Corporation's pharmacy and
    clinic businesses for $1.9 billion. (Reuters via CNBC)
  - Greek government-debt crisis
  - Greece and its creditors harden their stances after the collapse of talks aimed
    at preventing a default. (Reuters)
  - Russian financial crisis (2014–present)
  - The Central Bank of Russia lowers the interest rate to 11.5%. (Reuters)
  - Gap Inc. announces closing 175 stores, including 140 this year, and terminating
    250 jobs at its headquarters. (Reuters)
  - announces its plan to partnership Alibaba Group, China Film Group Corporation,
    and the new firm China TV Theaters Operating Co. Ltd. to expand the video streaming
    service throughout China, which may resemble Netflix and is called Tmall Box Office
    (TBO). (Forbes)(Reuters)
  Disasters and accidents:
  - Nepal announces plans to reopen heritage sites in the Kathmandu Valley two months
    after the April 2015 Nepal earthquake. (BBC)
  - 2015 Pacific hurricane season
  - Hurricane Carlos hits southwestern Mexico with heavy rain ahead of making landfall
    as a tropical storm later in the week. (Reuters via El Econimista)
  - 2015 Alaska Sockeye wildfire
  - The wildfire grows to 8,500 acres. (Alaska Dispatch News)
  Health:
  - 2015 Middle East respiratory syndrome outbreak in South Korea
  - The number of deaths resulting from the MERS outbreak in South Korea rises to
    sixteen with the number of total cases rising to 150. (CNN)
  Law and crime:
  - International Criminal Court investigation in Darfur
  - The High Court in Pretoria rules that the President of Sudan Omar Al-Bashir should
    be arrested in South Africa and detained pending a formal request from the International
    Criminal Court. However, immediately after the ruling, the South African Government
    announces that Al-Bashir has already departed. He is wanted in connection with
    the war in Darfur. (News24)
  - The Vatican to hold first paedophilia trial
  - The Vatican announces that the first hearing in the trial of Józef Wesołowski,
    a former papal ambassador to the Dominican Republic and a Polish former prelate
    of the Roman Catholic Church, is scheduled for July 11. (ABC News), (NPR)
  Politics and elections:
  - 2016 United States presidential election / Bush family
  - Jeb Bush, former Governor of Florida, announces his candidacy for the Republican
    Party nomination. (CNN)
  Sports:
  - 2015 Stanley Cup Finals
  - In ice hockey, the Chicago Blackhawks defeat the Tampa Bay Lightning 2–0 in the
    sixth game of the Stanley Cup Finals and win the series 4 games to 2. It is the
    Blackhawks' third win in six years. (The Guardian)
