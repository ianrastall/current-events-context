Date: '2015-06-06'
Source_URI: Portal:Current events/2015 June 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Saudi Arabia shoots down a Scud missile fired by Houthi rebels in Yemen according
    to Saudi State media. (Reuters)
  - At least four Saudi Arabian Army soldiers and "dozens of" Yemeni Republican Guard
    are killed in fighting near the border, according to Saudi government. (AFP via
    France 24)
  - War in Afghanistan (2001–2021)
  - The Taliban launches a major offensive in the Yamgan District of Badakhshan Province
    with hundreds of militants involved. (AP)
  - War in Donbass
  - The President of Ukraine Petro Poroshenko claims that his forces have repelled
    an attack on the town of Marinka and captured 12 rebels including one Russian.
    (BBC)
  - Palestinian rocket attacks on Israel
  - For the second time this week, a rocket fired from Gaza lands in Israel. There
    were no immediate reports of injuries, or claims of responsibility. (Times of
    Israel)
  Disasters and accidents:
  - Sinking of the Dong Fang Zhi Xing
  - The death toll from the sinking of the Dong Fang Zhi Xing rises to 396 with 46
    unaccounted for. (CCTV via Twitter)
  - Eleven bodies have been recovered from Mount Kinabalu and 8 people remain missing
    following yesterday's Sabah earthquake. (Straits Times)
  - Lightning strikes at the Rock am Ring rock festival held at the Mendig Air Base
    in Germany, injuring 33 people. (AP via News24)
  - Illegal immigration from Africa to Europe
  Health:
  - 2015 Middle East respiratory syndrome coronavirus outbreak in South Korea
  - The number of confirmed MERS cases in South Korea rises by 9 to 50. (AFP via Straits
    Times)
  International relations:
  - Prime Minister of India Narendra Modi travels to Bangladesh for the signing of
    an agreement that dissolves all 162 enclaves in the border region between the
    two nations and allows thousands of people living in the territories to choose
    their nationality. (Al-Jazeera)
  - Reuters reports that an Egyptian court has overturned a ruling that Hamas is a
    terrorist organisation. (Reuters)
  Law and crime:
  - Five police are injured following violent protests at a gay pride march in Kiev.
    (BBC)
  Politics and elections:
  - The President of Sudan Omar al-Bashir swears in a new Cabinet after having been
    sworn in for a five-year term earlier in the week. (al-Arabiya)
  Sports:
  - Association football
  - Italian side Juventus FC and Spanish side FC Barcelona play in the final of the
    2015 UEFA Champions League Final at the Olympiastadion in Berlin with Barcelona
    winning their fifth European championship 3-1. (ESPN), (The Guardian)
  - The 2015 FIFA Women's World Cup gets underway in Canada with the Canadians beating
    China 1-0 in the first match. (BBC)
  - Horse racing
  - The 236th running of the Epsom Derby is held at Epsom Downs Racecourse in England
    with Golden Horn ridden by Frankie Dettori winning and stablemate Jack Hobbs coming
    second. (BBC), (The Telegraph)
  - The 2015 Belmont Stakes is held at Belmont Park with American Pharoah becoming
    the first horse in 37 years to win the Triple Crown. (Bloomberg)
  - 2015 French Open – Women's Singles
  - In tennis, number one seed Serena Williams of the US meets number 13 seed Lucie
    Šafářová of Czech Republic in the women's singles final of the 2015 French Open.
    Williams wins her 20th Grand Slam title winning 6-3, 6-7, 6-2. (The Guardian)
