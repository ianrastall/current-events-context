Date: '2015-06-18'
Source_URI: Portal:Current events/2015 June 18
Intelligence_Payload:
  Attacks and armed conflicts:
  - West African offensive
  - The Chadian Air Force carries out airstrikes against bases of Boko Haram in neighbouring
    Nigeria to avenge twin bombings in Chad's capital N'Djamena three days ago. (Al
    Jazeera)
  - The accidental detonation of an explosive device kills 13 vigilantes and injures
    53 others near the town of Monguno in northeast Nigeria. The vigilantes were assisting
    the military in the fight against Boko Haram. (AP via News24)
  - At least 38 people were killed in a suspected Boko Haram attack on two villages
    in Niger. (BBC)
  Business and economy:
  - Universal Orlando decides to close Wet 'n Wild Orlando at the end of 2016. It
    will be replaced by Volcano Bay, which is expected to open in 2017. (Florida Today.com)
  Law and crime:
  - Charleston church shooting
  - Suspected shooter Dylann Roof is arrested at a traffic stop. Roof is suspected
    of killing nine people including a South Carolinian state senator. He was charged
    with multiple drug possession in April and reportedly (by CNN) legally bought
    the gun at a store after passing a background check despite his criminal record.
    (ABC News) (ITV News)
  - The Roman Catholic Church of the Multiplication of the Loaves and Fish on the
    Sea of Galilee in northern Israel is damaged by a suspected arson attack. (i24),
    (Haaretz), (Times of Israel), (BBC)
  Politics and elections:
  - Hong Kong electoral reform
  - The Legislative Council of Hong Kong rejects a Beijing-backed electoral reform
    which sparked the Occupy Central with Love and Peace movement. (Wall Street Journal)
  Religion:
  - At the Vatican, Pope Francis's officials in the Roman Curia formally release the
    text of his most recent encyclical, Laudato si'. The text, which had been quite
    anticipated by many sides on the climate change debate and been criticized by
    some for his involvement in the politicized and charged issue, had been previously
    leaked. (Reuters), via MSN, (CNN), (Vatican)
  - Muslims begin fasting at the start of the lunar calendar month of Ramadan, 2015.
