Date: '2015-06-26'
Source_URI: Portal:Current events/2015 June 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - Al Shabaab militants attack an African Union base in the Leego district of Somalia
    and kills more than 70 African Union soldiers and seizes control of their military
    base. (Reuters) (VOA News)
  - Saint-Quentin-Fallavier attack
  - A man is decapitated and at least two others are injured during an attack in Saint-Quentin-Fallavier
    as a man carrying an Islamic State in Iraq and the Levant flag attacks a factory
    near the French city of Lyon. (The Local)
  - 2015 Kuwait mosque bombing
  - At least 27 people are killed and 227 injured after a suicide bombing at the Shia
    Imam Sadiq mosque in Kuwait City, Kuwait. ISIL claims responsibility for the attack.
    (Al Jazeera), (Reuters)
  - 2015 Sousse attack
  - Two hotels in Sousse, Tunisia came under attack from an unknown number of gunmen;
    at least 37 people have been killed and 36 injured. (Sky News), (BBC), (USA Today)
  - Syrian civil war
  - June 2015 Kobani massacres
  - Islamic State kills 146 civilians in Kobanî, the second largest massacre since
    the start of conflict when the extremist group executed 700 members of the al-Sheitaat
    tribe in eastern Syria. (IBT), (VOA NEWS)
  - An Islamic State suicide bomber kills at least 20 people in the city of Hasakeh.
    (AFP via Yahoo! News)
  Business and economy:
  - The Prime Minister of Greece Alexis Tsipras says that Greece will hold a referendum
    on a bailout deal with creditors on July 5. (BBC), (Reuters)
  Disasters and accidents:
  - An early monsoon arrives in India resulting in floods in Gujarat state that have
    killed 60 people so far this week. (Hindustan Times)
  International relations:
  - The European Union has reached agreement to share at least 40,000 migrants over
    two years. (Reuters), (BBC)
  - Authorities in Thailand stop the launch of a report by Human Rights Watch on alleged
    persecution of Montagnard Christians in Vietnam. (AP via ABC News America)
  Law and crime:
  - A South Korean court rules that South Korea is not obliged to pay compensation
    to its nationals who were victims of the Atomic bombings of Hiroshima and Nagasaki
    who have not been compensated by Japan. (Yonhap)
  - 2015 Clinton Correctional Facility escape
  Obergefell v. Hodges:
  - In a 5-4 decision, the United States Supreme Court declares state bans on same-sex
    marriage unconstitutional and effectively legalizes it across the United States.
    (CNN)
  - Richard Matt, one of the two escapees, died from gunshot wounds south of the town
    of Malone, New York. (New York Times)
  Politics and elections:
  - Sri Lankan parliamentary election, 2015
  - Sri Lankan President Maithripala Sirisena dissolves the Parliament to pave the
    way for the upcoming parliamentary election. (BBC)
  Sports:
  - 2015 NHL Entry Draft
  - The NHL Draft is held at the BB&T Center with the Edmonton Oilers selecting Connor
    McDavid as their number 1 pick. (Bleacher Report)
  Transportation:
  - The Alstom Metropolis C830Cs entered service on the Circle MRT line, operated
    by SMRT Trains Ltd.
