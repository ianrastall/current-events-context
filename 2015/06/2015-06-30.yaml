Date: '2015-06-30'
Source_URI: Portal:Current events/2015 June 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - al-Qaeda insurgency in Yemen
  - Some 1,200 people escape from a Yemeni prison including al Qaeda members. (AP
    via TVNZ)
  Business and economy:
  - Asian Infrastructure Investment Bank
  - Seven out of 57 countries defer joining the China-dominated bank. While most of
    them cite temporary procedural constraints at home, political reasons are involved
    with the case of the Philippines amid a territorial dispute with China in South
    China Sea. (The Wall Street Journal), (The Philippine Star)
  - Greek government-debt crisis
  - The Greek bailout program by the European Union ends today with Greece failing
    to make a payment to the International Monetary Fund. (AP), (AP) (AFP via The
    Australian)
  - British reinsurance broker the Willis Group announces a merger with American company
    Towers Watson to create an $18 billion company. (FT)
  Disasters and accidents:
  - 2015 Indonesian military plane crash
  - A Hercules C-130 military aircraft with 113 people onboard crashes in a residential
    area in the Indonesian city of Medan, resulting in at least 116 deaths. (AP),
    (BBC) (NBC News)
  - A man self-immolates aboard a Nozomi Shinkansen train running from Tokyo to Osaka;
    the man and another passenger die. Eleven others were reported injured. (NHK World)
  Health:
  - Governor of California Jerry Brown signs a bill into law requiring all children
    to get vaccinations before being allowed to go to school or day care. (SFgate)
  Law and crime:
  - The Supreme Court of the Philippines asks the government to respond to a petition
    seeking to repeal a law banning same-sex marriage in the country. (Rappler)
  2016 United States presidential election:
  - New Jersey governor Chris Christie formally announces his candidacy for the Republican
    nomination for the 2016 presidential election. (CNN)
  Science and technology:
  - A leap second is added to the clock for the first time in 3 years. (BBC)
  Sports:
  - The United States defeats Germany 2-0 in Montreal, Quebec, Canada, to reach the
    Final of the 2015 FIFA Women's World Cup. (CNN)
