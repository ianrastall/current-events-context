Date: '2015-06-13'
Source_URI: Portal:Current events/2015 June 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - The Taliban kill 20 policemen in an attack in Helmand, Afghanistan. (WTVM)
  - Syrian Civil War
  - Some 13,000 refugees have crossed into Turkey as Syrian Kurd People's Protection
    Units encircle the ISIL-held town of Suluk. (AP via Yahoo!)
  - War on Terror
  - An American air strike targeting jihadist Mokhtar Belmokhtar in Libya reportedly
    kills him. (CNN)
  Arts and culture:
  - The trooping the colour ceremony is held in London to celebrate the Queen's Official
    Birthday while singer Van Morrison and American actor Kevin Spacey are given knighthoods
    at the Birthday Honours. (CNN), (BBC)
  - The wedding of Prince Carl Philip, Duke of Värmland, and Sofia Hellqvist takes
    place in Stockholm. (BBC News)
  Disasters and accidents:
  - At least 22 Hindu pilgrims died after a van they are travelling in falls into
    a reservoir in the southern Indian town of Dhavaleswaram in Andhra Pradesh. (AAP
    via News Limited)
  International relations:
  - Immigration to Europe
  - Austria stops processing asylum requests in an effort to pressure other European
    Union member states to do more to help absorb waves of refugees pouring into the
    continent. (Irish Times), (Telegraph)
  - Saudi Arabian-led intervention in Yemen
  - Scheduled talks of 14th June, 2015 between Yemen's Houthi rebels and the exiled
    government which are brokered by the UN have been postponed with a new schedule
    set for Monday 15 June, 2015. (The Daily Star (Lebanon) via Reuters
  - P5+1
  - Iran asks Austria to secure the talks over its nuclear program following reports
    of cybersecurity breaches. (AFP via Daily Star)
  - Egypt opens its border with the Gaza Strip temporarily for the first time in months.
    Egypt blames Hamas for the Sinai insurgency. (AP via Daily Star)
  - Dozens of migrants who were refused entry to France go on hunger strike at the
    border crossing in the Italian town of Ventimiglia. (AFP via Daily Star)
  Law and crime:
  - A man opens fire at policemen outside the police headquarters in the Texan city
    of Dallas, while a bag containing a pipe bomb is also found. He was later shot
    dead by police snipers following a car chase and standoff. (AP), (CNN)
  Politics and elections:
  - Thousands of people protest in Skopje demanding the resignation of the Prime Minister
    of Macedonia Nikola Gruevski. (AFP via Yahoo! News)
