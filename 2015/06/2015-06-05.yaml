Date: '2015-06-05'
Source_URI: Portal:Current events/2015 June 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb explodes in a marketplace in Yola, Nigeria, killing 31 and injuring dozens
    of others. (AP), (CNN)
  - Two people are killed and more than a hundred injured as bombs explode at rallies
    held by the pro-Kurdish Peoples' Democratic Party two days ahead of the general
    election in Diyarbakir. (AP)
  Business and economy:
  - Nestlé temporarily removes its Maggi noodles product from the shelves in India
    following a health scare. (Economic Times)
  Disasters and accidents:
  - Sinking of the Dong Fang Zhi Xing
  - The death toll from the sinking of the ship on the Yangtze River rises to 82 with
    officials giving up hope of finding more survivors. Only 15 out of over 450 people
    on the boat were rescued. (Sky News Australia)
  - Two bodies have been removed from Borneo's Mount Kinabalu following the 6.1 magnitude
    earthquake that hit Malaysia's Sabah province Friday morning. Previously-stranded
    climbers, reported at 137, have descended to the Laban Rata resthouse. (The Star)
    (CNN) (Asia Straits Times) (The Rakyat Post)
  - 2015 Accra explosion
  - The death toll from an explosion at a gasoline station on Wednesday in the Ghanaian
    capital Accra rises to over 200. (Zee News)
  Health:
  - 2015 Middle East respiratory syndrome coronavirus outbreak in South Korea
  - Four people have now died of MERS in South Korea with five new cases reported.
    (AFP via Bangkok Post)
  International relations:
  - Benigno Aquino, the President of the Philippines, says that his government will
    start discussions with Japan about allowing Japan Self-Defense Forces to refuel
    at Filipino bases allowing the extension of operations into the South China Sea.
    (Reuters via Daily Mail)
  Law and crime:
  - Eight out of the ten allegedly involved in shooting Pakistani schoolgirl and Nobel
    Peace Prize winner Malala Yousafzai have been secretly set free. (BBC)
  - Prosecutors in the state of Minnesota file criminal charges against the Roman
    Catholic Archdiocese of St. Paul and Minneapolis for allegedly mishandling sexual
    abuse allegations by a priest. (New York Times)
  Politics and elections:
  - Romania's National Anticorruption Directorate announces that it is investigating
    the Prime Minister Victor Ponta for alleged money laundering, forgery and corruption.
    Ponta denies the allegations and is refusing to stand down. (CNN)
