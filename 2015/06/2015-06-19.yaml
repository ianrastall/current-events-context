Date: '2015-06-19'
Source_URI: Portal:Current events/2015 June 19
Intelligence_Payload:
  Attacks and armed conflicts:
  - A Palestinian cell affiliated with Hamas and named after the perpetrators of the
    2014 kidnapping and murder of Israeli teenagers claims responsibility for an ambush
    style attack in which one Israeli was killed and another seriously injured. (Times
    of Israel)
  Business and economy:
  - The European Central Bank increased the cap on cash available to Greek banks through
    emergency liquidity assistance, as those banks continue to experience steady withdrawals.
    Greek citizens have withdrawn over 3 billion Euros in the last month. (Reuters)
  Politics and elections:
  - The centre-right opposition bloc led by Venstre wins the 2015 Danish general election,
    even though the Social Democrat party remains Denmark's largest. The anti-immigration
    Danish People's Party will be the second-largest in parliament. (BBC) (U.S. News
    & World Report)
  - Hawaii becomes the first U.S. state to raise the smoking age from 18 to 21, effective
    January 1, 2016, and will also outlaw sales, purchases, or uses of electronic
    cigarettes for those under 21. (Reuters)
