Date: '2015-06-09'
Source_URI: Portal:Current events/2015 June 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Naxalite–Maoist insurgency
  - Indian police kill at least 12 Naxalite Maoist rebels in a clash in the state
    of Jharkhand. (AP)
  - Syrian Civil War
  - The Southern Front of the Free Syrian Army claims to have captured a major Syrian
    Army base known as Brigade 52 in Daraa Governorate. (BBC)
  Business and economy:
  - HSBC announces plans to cut 8,000 jobs in the United Kingdom, one-sixth of its
    U.K. workforce, via "natural attrition" as it restructures its banking business.
    A total of 25,000 jobs could be axed globally. (BBC)
  Disasters and accidents:
  - Several firefighters are killed after an explosion at a military oil depot near
    Kiev, Ukraine, with several people missing and hundreds evacuated. (Reuters UK)
    (AFP via Sydney Morning Herald)
  Law and crime:
  - At least four people are killed (including the gunman) and five people injured
    in a shooting incident in China's northern Hebei province. (BBC)
  - The United States Court of Appeals for the Fifth Circuit upholds a Texan law providing
    that abortion clinics meet the same standards as hospital style surgical clinics
    meaning that many abortion clinics must upgrade or close. (New York Times)
  - Swiss police seize computer records from FIFA in an investigation into alleged
    corruption by the world governing body of association football. (BBC)
  Politics and elections:
  - The Turkish cabinet led by current Prime Minister Ahmet Davutoğlu submits its
    resignation, but is asked to stay on until a new government forms after the election.
    (AFP via France 24)
  Sports:
  - 2015 FIFA Women's World Cup
  - Two Brazilians reach historic milestones in the team's 2–0 win over South Korea
    in Montreal. Marta sets a new record with her 15th goal in Women's World Cup play,
    and the 37-year-old Formiga becomes the oldest player to score in a Women's World
    Cup. (ESPN)
  - In Major League Baseball, Chris Heston of the San Francisco Giants becomes the
    first pitcher to throw a no-hitter in the in the Giants' 5–0 win over the New
    York Mets. (ESPN)
