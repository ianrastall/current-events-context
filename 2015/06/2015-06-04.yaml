Date: '2015-06-04'
Source_URI: Portal:Current events/2015 June 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Several rockets were fired from Gaza at Israel and exploded near the cities of
    Ashdod, Netivot and Ashkelon causing no casualties. The IDF retaliated with airstrikes
    against empty Hamas training camps in Gaza. (Al Jazeera)
  - Naxalite Insurgents kill at least 20 Indian Army soldiers and injure 12 in an
    attack on a convoy in the state of Manipur. (BBC)
  Arts and culture:
  - St Benet's Hall at Oxford University decides to admit women, making it the last
    of the University's institutions to do so. (Reuters Trust)
  Business and economy:
  - 'Officials of the ruling Syriza party in Greece say that they cannot accept a
    last-minute deal proposed by the country''s creditors: default deadline looms.
    (AP)'
  Disasters and accidents:
  - Sinking of the Dong Fang Zhi Xing
  - The death toll from the Monday night sinking of the cruise ship in the Yangtze
    River rises to 75 with most of the 450 passengers on board still missing. (The
    Guardian), (NBC News)
  - An explosion at a gasoline station in Accra, Ghana, kills at least 78 people.
    (Al Jazeera)
  Health:
  - Surgeons, led by Dr. Jesse Selber, working with the M.D. Anderson Cancer Center,
    in a 15-hour, 12-doctor operation, perform the world's first partial-skull and
    scalp transplant, at Houston Methodist Hospital, on 55-year-old Jim Boysten, a
    software developer from Austin, Texas suffering from a large head wound from cancer
    treatment; immediately afterward, he was finally able to receive a new kidney
    and pancreas, which replaced the previous transplants that were failing. (MSN)
  - 2015 Middle East respiratory syndrome coronavirus outbreak in South Korea
  - The number of people with Middle Eastern Respiratory Syndrome (MERS) in South
    Korea rises to 35 with over 700 schools suspending classes due to fears of the
    syndrome. (Xinhua)
  - Panel of advisors to the US Food and Drug Administration (FDA) recommends approval
    of flibanserin by 18–6 to improve a woman's libido. (NPR)
  International relations:
  - Associated Press reports that there has been a massive hack from the American
    Office of Personnel Management and US Department of the Interior with the Washington
    Post claiming that Chinese hackers were responsible. The records of at least four
    million US Government workers are believed to have been compromised. (AP), (Washington
    Post), (The Telegraph)
  Politics:
  - 2016 United States presidential election
  - Former Governor of Texas Rick Perry announces that he will be a candidate for
    the Republican Party. (CNN)
  - USA Freedom Act
  - President Barack Obama signs the bill, reinstating expired provisions of the Patriot
    Act while reforming Section 215 of the Act. (NBC)
