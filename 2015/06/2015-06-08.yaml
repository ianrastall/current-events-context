Date: '2015-06-08'
Source_URI: Portal:Current events/2015 June 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - Seven Pakistani army soldiers and 19 Taliban fighters are killed in overnight
    fighting in North Waziristan near the Afghanistan border. (Al-Jazeera)
  Business and economy:
  - Apple Inc. announces a new music streaming service called Apple Music. (Engadget)
  Disasters and accidents:
  - 2015 Sabah earthquake
  - The number of people found dead on Mount Kinabalu rises to 16 with two Singaporean
    climbers still missing. (AP via Yahoo! News)
  - The Singaporean government declares June 8 be a national remembrance day with
    the Singaporean flag being flown at half-mast and a minute of silence being observed
    at the beginning of all 2015 SEA Games venues. This is as a mark of respect for
    the eight people who were killed in the earthquake, which consists of six Primary
    6 students, one teacher and their adventure guide. (Straits Times) (Today)
  - Sinking of Dong Fang Zhi Xing
  - The death toll from last week's sinking on China's Yangtze River rises to 434
    with eight people missing and 14 survivors. (CNN)
  Health:
  - 2015 South Korean MERS outbreak
  - The number of deaths from MERS in South Korea rises to six with 23 new cases reported.
    (AFP via Straits Times)
  Law and crime:
  - Zivotofsky v. Clinton / Zivotofsky v. Kerry
  - The Supreme Court of the United States decides 6–3 to strike down a law passed
    by the United States Congress allowing people born in Jerusalem to list Israel
    as their birthplace in their passports, on the grounds that it is the President's
    prerogative to extend recognition of sovereignty in matters of foreign affairs.(CNN)
    (The Times of Israel)
