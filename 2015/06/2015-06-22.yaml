Date: '2015-06-22'
Source_URI: Portal:Current events/2015 June 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The Afghan National Assembly building is attacked by gunmen after a suicide bombing.
    All 6 of the gunmen are killed, with 18 people injured. (BBC)
  - Four people are killed and thirty injured in grenade attacks in Burundi. (AFP
    via Twitter), (BBC)
  - Syrian Civil War
  - Hundreds of Syrian refugees return from Turkey to the border town of Tell Abyad
    after the Islamic State in Iraq and the Levant are expelled by Kurdish People's
    Protection Units. (Reuters via Daily Star)
  - Boko Haram insurgency
  - At least 20 people are killed after a female suicide bomber attacks a fish market
    in Nigeria's north-eastern city of Maiduguri. The militant Islamist group Boko
    Haram is suspected to be behind the attack. (BBC)
  Disasters and accidents:
  - Over 200 die of heatstroke in Pakistan's Karachi over the weekend in a record
    heatwave. (DAWN), (CNN)
  - A light plane belonging to American composer James Horner crashes in Ventura County,
    California resulting in his death. (KSBY), (Hollywood Reporter)
  Health:
  - 2015 Middle East respiratory syndrome outbreak in South Korea
  - The number of deaths from MERS in South Korea rises to 27 with three new cases
    reported. The government is taking unprecedented precautions in terms of public
    sanitation and quarantine.(Yonhap)
  - Ebola virus epidemic in West Africa
  - Two new cases of ebola virus disease are reported from Sierra Leone’s capital
    city of Freetown about three weeks after the most recent new cases were found.(Time)
  International relations:
  - Japan announces plans to resume whaling in the Antarctic during the Southern Hemisphere
    summer. Commercial whaling has been banned for over 30 years by the International
    Whaling Commission. (AFP via Straits Times)
  - 2014 Israel–Gaza conflict
  - A United Nations report finds evidence that both Hamas and Israel committed war
    crimes during the 2014 conflict. (Haaretz)
  - Office of Personnel Management data breach
  - The CNN reports that the size of the Office of Personnel Management data breach
    could be as large as 18 million past, present and prospective employees of the
    United States Government. (CNN)
  Law and crime:
  - Charleston church shooting
  - The Governor of South Carolina Nikki Haley calls for the Confederate battle flag
    to be removed from the U.S. Civil War memorial on the grounds of the South Carolina
    State House. (Washington Post)
  - Walmart, the largest store in the United States, announces that it will withdraw
    all merchandise featuring the Confederate flag from sale at its stores and online.
    (CNN)
  Politics and elections:
  - Maryland Governor Larry Hogan reveals that he has advanced stage lymphoma. (AP
    via ABC)
