Date: '2015-06-01'
Source_URI: Portal:Current events/2015 June 1
Intelligence_Payload:
  Iraqi Civil War (2014–2017):
  - An Islamic State suicide bombing kills 37 at an Iraqi police base. (Yahoo)
  War in Afghanistan (2001–2021):
  - Nine Afghan employees of a Czech charity People In Need have been killed in an
    attack by unknown gunmen in Zari District in the north of the country. (Al Jazeera),
    (BBC), (Radio Prague)
  Disasters and accidents:
  - A ship carrying 458 people capsizes on Yangtze River in China's Hubei province.
    So far, just seven have been rescued. (Xinhua via Twitter), (News Limited)
  International relations:
  - Illegal immigration from Africa to Europe
  - A European Union mission rescues more than 5,000 migrants over three days. (Deutsche
    Welle)
  Law and crime:
  - Nigeria's anti-graft authority arrests six senior officials from the Central Bank
    of Nigeria and 16 people from commercial banks for fraud. (AFP via Fraud)
  Politics and elections:
  - Parts of the Patriot Act expire at 12:01 a.m. due to Congressional failure to
    reform the USA Freedom Act, temporarily making new surveillance of telephone records
    by the NSA illegal. (New York Times)
  - Senator Lindsey Graham of South Carolina enters the race for the 2016 Republican
    presidential nomination. (New York Times)
  Politics:
  - Former German chancellor, "architect of German reunification" and one of the authors
    of the European single currency Helmut Kohl is reported to be in a "critical condition"
    after surgery at a Heidelberg hospital. (Guardian)
