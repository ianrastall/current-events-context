Date: '2015-06-07'
Source_URI: Portal:Current events/2015 June 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - The Saudi-led coalition launches airstrikes on Houthi gatherings in Taez. (Al-Arabiya)
  Arts and culture:
  - 69th Tony Awards
  - The 2015 Tony Awards, which celebrate the best theatrical performances on Broadway,
    are held at Radio City Music Hall with The Curious Incident of the Dog in the
    Night-Time winning best play and Fun Home winning best musical. (AP), (Variety)
  Disasters and accidents:
  - 2015 Sabah earthquake
  - More bodies are found on Malaysia's highest peak Mount Kinabalu with the total
    death from the earthquake at 13 with most casualties from Malaysia and Singapore.
    (AP via NBC News), (AFP and ABC Australia)
  - Sinking of the Dong Fang Zhi Xing
  - The death toll from the sinking of the Chinese cruise ship is now over 400 as
    the search area for bodies extends 1,000 km down the Yangtze River. (The Guardian)
  - Thirteen people have died in a heatwave in Pakistan. (AAP via News Limited)
  Health:
  - 2015 Middle East respiratory syndrome coronavirus outbreak in South Korea
  - South Korea records its fifth death from MERS with 14 new cases reported. (Yonhap)
  International relations:
  - 41st G7 summit
  - The G7 summit gets underway in Germany with the Greek government-debt crisis and
    Ukrainian crisis dominating the agenda. (Reuters via CNBC)
  - Illegal immigration from Africa to Europe
  Politics and elections:
  - Mexican legislative election, 2015
  - Voters in Mexico go to the polls for a legislative election with reports of violence
    in southern states and widespread voter disillusionment. Exit polls show the ruling
    Institutional Revolutionary Party of President Enrique Peña Nieto in a position
    to retain power. (The Guardian)
  - Turkish general election, June 2015
  - Voters in Turkey go to the polls for a general election with the ruling AKP seeking
    enough votes to enable them to change the constitution. However, early projections
    show that they will lose their majority in the new parliament. (BBC), (New York
    Times)
  Sport:
  - 2015 French Open – Men's Singles
  - In tennis, Stan Wawrinka of Switzerland defeats Novak Djokovic of Serbia 4–6,
    6–4, 6–3, 6–4 in the men's singles final for his first win at Roland Garros and
    his second Grand Slam singles title. Wawrinka's victory also denies Djokovic a
    career Grand Slam. (ATP World Tour), (The Telegraph)
  - 2015 Canadian Grand Prix
  - In motor sport, the Formula One Canadian Grand Prix is held at Circuit Gilles
    Villeneuve in Montreal with Lewis Hamilton of Mercedes-Benz winning the race ahead
    of teammate Nico Rosberg. (PA via The Guardian)
