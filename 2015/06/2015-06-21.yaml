Date: '2015-06-21'
Source_URI: Portal:Current events/2015 June 21
Intelligence_Payload:
  Disasters and accidents:
  - Ninety-four people die, and 45 others are hospitalized, after drinking moonshine
    in Mumbai (Bombay), India. (Reuters via News24)
  Law and crime:
  - Ten people are injured in a shooting at a Philadelphia, Pennsylvania block party.
    (AFP via News24) (NBC Philadelphia)
  - One person dies and nine others are injured in a shooting at a block party on
    a basketball court in Detroit, Michigan. (AP via News24) (ABC News)
  - A Palestinian teenager is in police custody after he stabbed a policeman who was
    administrating Jerusalem's Damascus Gate border in the neck, critically injuring
    the policeman. The policeman then shot and injured the teenager and collapsed.
    (YNet)
  Politics:
  - Prime Minister of Greece Alexis Tsipras makes a new offer for reforms which could
    signal a late deal in the country's debt talks. (ITV News)
  Sport:
  - 2015 U.S. Open (golf)
  - In golf, American Jordan Spieth wins his second major championship of the year
    winning the U.S. Open by a stroke and becomes the first golfer since Gene Sarazen
    to win two majors before the age of 22. (The Guardian)
