Date: '2015-06-02'
Source_URI: Portal:Current events/2015 June 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Armed tribesmen kill 18 Houthi fighters in an ambush in Yemen's Ibb Governorate.
    (Reuters)
  - Communist insurgency in the Philippines
  - Adelberto Silva, the highest ranked leader of the Communist Party of the Philippines
    and New People's Army, has been arrested. (AFP via Yahoo! News)
  - Boko Haram
  - A suicide bombing in the city of Maiduguri in the north of Nigeria kills 20 people.
    (AP)
  Disasters and accidents:
  - Incidents at European amusement parks
  - 'Alton Towers: The Smiler roller coaster crash'
  - This roller coaster breakdown results in 4 people critically injured. Many injured
    in this theme park were stuck in the ride for several hours. (BBC)
  - 2015 Indian heat wave
  - The official death toll from the Indian heat wave rises to 2,330 with meteorologists
    warning that relief from the monsoon season could still be days away. (CNN)
  - Sinking of the Dong Fang Zhi Xing
  - Rescue efforts continue for people on board the ship that sank on the Yangtze
    River in China's Hubei province with over 450 people on board. So far, fewer than
    12 have been rescued and five bodies recovered. (New York Times), (CNN)
  - Malaysia Airlines Flight 370
  - Two brothers whose father was on Malaysia Airlines Flight 370 last year when it
    disappeared receive compensation from the government of Malaysia and Malaysian
    Airlines. (AP via Asian Correspondent)
  Health:
  - 2015 Middle East respiratory syndrome coronavirus outbreak in South Korea
  - Two people die of Middle East respiratory syndrome in South Korea. (NBC News)
  Law and crime:
  - Beijing bans smoking in indoor public places, including offices, shopping malls,
    restaurants, bars and airports, and in outdoor public places, including hospitals
    and schools. (CNN)
  - Thai Army Lieutenant General Manus Kongpan is suspended after police order his
    arrest on involvement in people trafficking. (Reuters via ABC Online)
  - Boston Marathon bombing
  - Dias Kadyrbayev, a college friend of Dzhokhar Tsarnaev, is sentenced to six years
    for obstruction of justice and conspiracy charges after Kadyrbayev removed incriminating
    evidence from Tsarnaev's college dorm room. (CBS Local)
  Politics and elections:
  - The United States Senate passes the USA Freedom Act, which will transfer the responsibility
    of Americans' bulk telephone metadata collection from the National Security Agency
    to telephone companies. (The Guardian)
  Sport:
  - 2015 FIFA corruption case
  - Sepp Blatter announces that he will resign as President of FIFA as a result of
    the corruption scandals with an emergency congress to be called as soon as possible.
    (BBC) (RTÉ News)
  - In Cricket, New Zealand beats England by 199 runs to draw the test series. (Telegraph)
