Date: '2015-06-10'
Source_URI: Portal:Current events/2015 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomber targets the Karnak temple site in the ancient Egyptian city of
    Luxor. Two militants were shot nearby, four Egyptians were wounded with no tourists
    hurt in the attack. (ITV News) (BBC) (Fox News) (AP)
  - Saudi Arabian-led intervention in Yemen
  American-led intervention in Iraq (2014–2021):
  - President Barack Obama authorizes up to 450 additional troops in Iraq to train
    Sunni forces. (CNN)
  - At least 43 people have been killed in fighting in Yemen. (Reuters)
  Disasters and accidents:
  - Indonesia's Mount Sinabung eruption resumes spewing gas leading to the evacuation
    of 3,000 nearby residents. (AFP and AP via Economic Times)
  2015 South Korean MERS outbreak:
  - The death toll from the MERS outbreak in South Korea rises to nine, with 13 new
    cases reported. More than 2,200 schools have closed or cancelled classes as a
    result of the outbreak. (Reuters)
  Law and crime:
  - Catholic Church sexual abuse cases
  - Pope Francis approves the outline of a new system giving power to the Vatican's
    Congregation for the Doctrine of the Faith to judge bishops "with regard to crimes
    of the abuse of office when connected to the abuse of minors." (National Catholic
    Reporter)
  - The Supreme Federal Court of Brazil strikes down a law allowing the subjects of
    biographies to quash works they disapprove of. (AP)
  Sports:
  - Bidding for the 2026 FIFA World Cup is postponed due to the 2015 FIFA corruption
    case and the subsequent resignation of Sepp Blatter. (Reuters via ABC Australia)
