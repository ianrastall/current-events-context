Date: '2015-06-28'
Source_URI: Portal:Current events/2015 June 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 Sousse attacks
  - Tunisia deploys an additional 1000 police in resorts and beaches following the
    attack on tourists on Friday. (AP)
  - With the number of British dead expected to exceed 30, the U.K. warns its citizens
    about traveling to certain parts of Tunisia, including the south and near the
    Libyan border. (AP), (BBC)
  - 2015 Kuwait mosque bombing
  - Kuwait claims that the suicide bomber responsible for the attack that killed 27
    people was Fahd Suleiman Abdulmohsen al-Qaba'a, a citizen of Saudi Arabia. (AFP
    via ABC News Australia)
  - Operation Zarb-e-Azb
  - At least 24 militants are killed in Pakistan Air Force air strikes on positions
    in the Khyber Agency and North Waziristan. (IANS via the Hindu)
  - In Istanbul, Turkish police forces interrupt the LGBT pride parade, which was
    refused this year due to the holy month Ramadan, by firing water cannons and rubber
    pellets. (Reuters UK)
  Business and economy:
  - Greek government-debt crisis
  - The BBC reports that the European Central Bank will cap lending to Greece's struggling
    banks, causing the run on the nation's banks to become even worse. Next week a
    referendum will be held about leaving the Euro currency. (BBC), (BBC), (Irish
    Times)
  - Greece announces that it will close banks until July 6, with limits being placed
    on automatic teller machine withdrawals. The Athens Exchange is also closed as
    financial conditions worsen. (Reuters), (CNBC)
  - The Governor of Puerto Rico, Alejandro García Padilla, says that Puerto Rico's
    debts are "not payable". (New York Times)
  Health and environment:
  - 2015 Middle East respiratory syndrome outbreak in South Korea
  - The number of deaths from MERS in South Korea rises to 32, with the number of
    cases stabilizing at 182. (Yonhap)
  - A six-year-old boy whose parents refused to have him vaccinated dies of diphtheria,
    the first case in Spain since 1987. (AFP via MENA-FN)(Fox News Latino)
  Law and crime:
  - 2015 Clinton Correctional Facility escape
  - Remaining escapee David Sweat is shot and captured in upstate New York near the
    border with Canada. (NBC News)
  - The Federal Bureau of Investigation and Bureau of Alcohol, Tobacco, Firearms and
    Explosives are investigating a series of fires at black churches in the states
    of Tennessee, South Carolina, North Carolina and Georgia with three of the four
    cases confirmed as arson. (Buzzfeed)
  Politics and elections:
  - Danish general election, 2015
  - Lars Løkke Rasmussen forms Denmark's first single-party government in 33 years,
    and Rasmussen himself becomes the first prime minister in 33 years to serve in
    two non-consecutive terms; Kristian Jensen becomes the sixth foreign minister
    since 2010. (The Local) (Copenhagen Post)
  Science and technology:
  - An unmanned Space-X Falcon 9 space rocket explodes 2 minutes after take-off from
    Cape Canaveral Air Force Station in Florida. The rocket was on a resupply mission
    to the International Space Station. This is the third such incident in a year.
    (Reuters via News24) (CNN)
