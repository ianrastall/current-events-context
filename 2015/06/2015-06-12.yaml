Date: '2015-06-12'
Source_URI: Portal:Current events/2015 June 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - Boko Haram militants raid five different villages around Maiduguri, Nigeria killing
    37 people. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - The Saudi-led coalition bombs the World Heritage Listed old quarter of Sana'a
    destroying three houses and killing five people. (AFP via Daily Mail)
  - Second Libyan Civil War
  - An armed group storms the Tunisian embassy in Libya taking ten hostages. (al-Arabiyah)
  - Operation Protective Edge
  - The Israel Defense Forces Advocate General has announced criminal investigations
    into three more incidents from Operation Protective Edge. Of the 190 incidents
    reported to the IDF, investigations have been completed on 105, with seven leading
    to criminal investigations. (YNet)
  Business and economy:
  - Residents of the Galápagos Islands conduct a strike and protest over decisions
    by the Ecuador National Assembly to axe cost of living subsidies causing cancellation
    of flights to and from the islands. (AP via ABC News)
  - Public school teachers in the Brazilian state of São Paulo vote to return to work
    after three months of strike action. (BBC)
