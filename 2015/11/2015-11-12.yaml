Date: '2015-11-12'
Source_URI: Portal:Current events/2015 November 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli-Palestinian conflict
  - Israeli agents, disguised as Arabs escorting a woman in labor, raids a hospital
    in Hebron, West Bank, seizing a Palestinian suspected of stabbing and shooting
    dead his cousin. (New York Times) (Haaretz)
  - Iraqi Civil War (2014–2017), Military intervention against ISIL
  - American-led intervention
  - Kurdish forces, backed by U.S. airstrikes, capture several villages in an offensive
    to retake the Iraqi town of Sinjar from Islamic State militants, who overran it
    more than a year ago. The operation aims to cordon off the town, take control
    of Islamic State supply routes, and establish a buffer zone to protect the town
    from artillery, according to the Kurdish national security council. (Reuters)
    (NBC News)
  2015 Beirut bombings:
  - Lebanese Interior Minister Nouhad Machnouk reports at least 43 people were killed
    and more than 239 wounded as two, simultaneous suicide bomb blasts hit a Shi'ite
    community center and a nearby bakery in the Beirut suburb of Bourj el-Barajneh,
    a section of the Lebanese capital controlled by Hezbollah. The Islamic State of
    Iraq and the Levant claims responsibility for the attack. Machnouk said a third
    suicide bomber had been killed by one of the explosions before he could detonate
    his own bomb. The bombers struck as Lebanese lawmakers held a legislative session
    for the first time in over a year. (Daily Star) (Sky News) (Reuters)
  Arts and culture:
  - French-American Florent Groberg receives the Medal of Honor, becoming the first
    foreign-born Medal of Honor recipient of the War in Afghanistan. (CNN)
  Business and economy:
  - Mario Draghi, head of the European Central Bank, tells the European Parliament
    in prepared testimony that the outlook for inflation is "weakening." The comment
    was taken to suggest the ECB will soon take a more stimulative stance on interest
    rates or money quantity. (Bloomberg)
  - The city of Montreal in Canada begins dumping 2 billion gallons of raw sewage
    into the Saint Lawrence River, an action the mayor, Denis Coderre, says is necessary
    to make repairs and improvements to the city's wastewater system. The move has
    caused outrage among residents and environmentalists, while the hashtag "#flushgate‬"
    is being used on social media sites to voice opposition to the dumping effort.
    (CNN)
  International relations:
  - The Valletta Summit on Migration concludes with European leaders setting up a
    fund to promote development in African countries, in return for help in the European
    migrant crisis. (Times of Malta)
  Health and medicine:
  - The World Health Organization (WHO) announced that maternal deaths will have fallen
    44% between 1990 and 2015; although, this falls short of the United Nations' Millennium
    Development Goal of 75% reduction. (BBC)
  Law and crime:
  - Two nephews of Venezuelan First Lady Cilia Flores, who were arrested in Haiti
    by U.S. authorities on Tuesday, are indicted in New York for conspiring to smuggle
    cocaine into the United States. (USA Today) (Venezuelanalysis.com)
  - More than a dozen alleged ISIS-linked, terrorist members of Rawti Shax, a European
    offshoot of the Iraqi Kurdish jihadist network Ansar al-Islam, are arrested in
    a coordinated, multi-nation sweep by police across Europe. The operation dismantled
    an integrated cell in Italy, the United Kingdom, Norway, Finland, Switzerland,
    and Germany. The group is accused of radicalizing fighters, planning attacks targeting
    Norwegian and British diplomats in the Middle East, and planning to establish
    a caliphate in Iraq's Kurdistan region. (NBC News) (The Local) (CNN)
  - Human rights in Uzbekistan
  - Uzbek political prisoner Murod Juraev is finally released after being imprisoned
    for 21 years. (New York Times)
  Sport:
  - Russian Sports Minister Vitaly Mutko says there will be no boycott of next year's
    Olympics in Rio de Janeiro, and that he is ready to own up to some of the charges
    leveled in the World Anti-Doping Agency commission's massive report on doping,
    the Associated Press reports. (AP)
