Date: '2015-11-07'
Source_URI: Portal:Current events/2015 November 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Assyrian Human Rights Network (AHRN) reports Islamic State militants released
    37 Syrian Christians, mostly women, who were among more than 200 people from the
    Assyrian minority group abducted in February. (AP)
  - The Syrian Observatory for Human Rights says the death toll from an airstrike
    on an IS-controlled eastern city near the border with Iraq rose from 25 to 71.
    (AP)
  - Iraqi Civil War (2014–2017)
  - Bombs in and around Baghdad kill at least nine people, police and medical sources
    say. There is no immediate claim of responsibility. (Reuters)
  Art and culture:
  - The University of Sydney's Australian Archaeological Mission, excavating at a
    UNESCO World Heritage Site on the southwest coast of the Mediterranean island
    of Cyprus, discover Cyprus's oldest theatre. Located in the ancient city of Nea
    Paphos (capital of Cyprus at the time), it is a Hellenistic-Roman structure believed
    to have been in use for about six and a half centuries, from c. 300 B.C. until
    its final destruction in the earthquakes of A.D. 365. The Roman columns are made
    of granite from quarries in Troad, Turkey. (AFP, via MSN)
  - The Egyptian Ministry of Antiquities says infrared thermography indicates a hidden
    chamber in the tomb of King Tutankhamen, findings consistent with early theories
    his tomb included two concealed doorways and with the theory presented in archaeologist
    Nicholas Reeves' paper this summer. (UPI)
  Business and economics:
  - Takata Defective airbag recalls (2013-present)
  - Nissan Motor Co. says it will not use airbag inflators made by Japanese auto parts
    supplier Takata Corp. in its cars, joining Toyota Motor Corp. and Honda Motor
    Co. (Reuters)
  Disasters and accidents:
  - Metrojet Flight 9268
  - A sudden noise immediately before the "black box" flight data recorder went dark
    indicates the plane was brought down by a bomb, according to unnamed sources.
    Officially, Ayman el-Muqadem says the Egyptian investigative team is "considering
    all possible scenarios for the cause of the accident" and has not yet reached
    any conclusions. (BBC) (USA Today) (The Mirror)
  - European migrant crisis
  - The Greek coast guard and the European Union border agency Frontex, in six separate
    operations, rescue a total of 383 migrants attempting to sail from Turkey to the
    eastern Greek islands. (AP)
  - Minas Gerais dam disaster
  - As rescue teams labor to reach isolated communities, state officials are taking
    precautions to contain the environmental fallout from the burst dams. A state
    public prosecutor based in Mariana says he will seek 500,000 Brazilian reais (US$130,000)
    in personal damages for each of about 200 families most affected by the dam burst.
    (Reuters)
  Health and medicine:
  - In Iraq, a cholera outbreak prompts United Nations agencies UNICEF and the World
    Health Organization to launch a prevention and treatment campaign. So far, around
    2,200 cases have been confirmed, and some infections have occurred in neighboring
    countries. (Al Jazeera English)
  - The WHO declares Sierra Leone free from Ebola transmissions. (France 24) (BBC)
    (New York Times)
  International relations:
  - Cross-Strait relations, 2015 Ma–Xi Meeting
  - Mainland China's leader Xi Jinping and Taiwan's leader Ma Ying-jeou meet in Singapore,
    the first meeting between a Chinese and Taiwanese leader since the Chinese Communist
    Revolution. (CNN)
  - China–United States relations
  - The United States and China hold joint naval exercises in the Atlantic Ocean near
    Naval Station Mayport, Jacksonville, Florida. The United States missile destroyer
    USS Mason and guided missile cruiser USS Monterey along with other ships in the
    Atlantic, conduct drills with China's guided-missile frigate Yiyang, guided-missile
    destroyer Jinan, and oil tanker Qiandao Hu. (UPI)
  Law and crime:
  - A manhunt is underway for a gunman who shot and seriously wounded presiding Travis
    County, Texas State District Judge Julie Kocurek at the driveway of her home in
    West Austin, Texas. It was unclear whether she and/or her family members were
    targeted (they were arriving home) or if it was a botched robbery. She was listed
    in serious condition at University Medical Center Brackenridge in Austin but is
    expected to recover. (USA Today, via MSN)
  - In Louisiana, United States, two law enforcement officers are arrested and charged
    with homicide of a six-year-old and attempted homicide of his father. (Al Jazeera
    English) (BBC)
  Politics and elections:
  - Portuguese legislative election, 2015
  - Three leftist parties announce their ability to form a government, making it likely
    that Pedro Passos Coelho will no longer be Prime Minister. (BBC)
  - Myanmar general election, 2015
  - Myanmar president Thein Sein says his government and the military, which gave
    up power only five years ago, will respect the results of Sunday's historic elections
    that are expected to be won by opposition leader Aung San Suu Kyi's NLD party.
    (AP)
