Date: '2015-11-03'
Source_URI: Portal:Current events/2015 November 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014–15 India–Pakistan border skirmishes
  - At least two Indian soldiers are killed after Pakistani forces opened fire along
    the de facto border that divides Kashmir between the two countries. (BBC)
  - Russian military intervention in the Syrian Civil War, Syrian Civil War
  - The Syrian Observatory for Human Rights reports Russia conducted multiple airstrikes
    on ISIS-held Palmyra. (Air Force Times)
  - Russia's Defence Ministry says the Russian Air Force has bombed 2,804 "militant
    targets" in Syria so far since beginning of its airforce campaign in September.
    (The Daily Star)
  - Islamic State in Iraq and the Levant
  - ISIS claims responsibility for the deaths of two Syrian refugee activists who
    fled to Sanliurfa, Turkey, raising concerns about the group’s reach in countries
    outside of Syria and Iraq. Ibrahim Abdel Qader, a founder of Raqqa Is Being Slaughtered
    Silently, and Fares Hammadi are said to have been killed by an acquaintance posing
    as a defector from ISIS. (New York Times)
  - At least four people are killed and 15 injured in an ISIL attack in the Kurdish
    section of northern Iraq. (Al-Arabiyah)
  Business and economics:
  - British bank Standard Chartered announces that it will axe 15,000 jobs around
    the world as part of a restructure. (AFP via Manila Bulletin)
  - Takata Defective airbag recalls (2013-present)
  - The U.S. National Highway Traffic Safety Administration and the Japanese manufacturer
    of airbags Takata Corp. agree to a five-year consent decree where the company
    agrees to pay a civil penalty of $70 million and faces as much as $130 million
    more in fines if it violates the settlement. Twelve automakers are ordered to
    speed up recalls that so far have only reached about a quarter of the affected
    cars. (Bloomberg) (USA Today)
  - Honda, Takata's biggest customer, announces it will not use airbag inflaters made
    by Takata Corp. for the driver or front passenger side in new Honda and Acura
    vehicles for any market, worldwide. (USA Today) (NASDAQ)
  - Volkswagen emissions scandal
  - Volkswagen says it has found faulty emissions readings for the first time in gasoline-powered
    vehicles, widening a scandal that so far had centered on diesel engines. (Bloomberg)
    (BizNews)
  Disasters and accidents:
  - At least seven people are dead and 35 others are injured as a bus overturns near
    Tula, Russia. (RT)
  - At least 30 people are killed and 35 injured after an overcrowded bus carrying
    passengers inside and on its roof veered off a mountain road in northwest Nepal.
    (USA Today)
  - 2015 Southeast Asian haze
  - Scientists report fires raging in Indonesia have hit Borneo's orangutans particularly
    hard. Borneo is home to about 30 percent of the world's wild orangutans, an endangered
    species. Smoke has already displaced many orangutans and caused health problems
    related to smoke inhalation, according to the Borneo Orangutan Survival Foundation
    (BOSF). (Live Science)
  - 2015 North Indian Ocean cyclone season
  - Cyclone Chapala
  - '"Ravaged by months of war, Yemen now gets battered by the first tropical storm
    on record to make landfall." Extremely Severe Cyclonic Storm Chapala slams into
    Yemen''s central coast, with maximum sustained winds of around 140 kph (85 mph)
    -- the equivalent of a Category 1 hurricane. The storm floods coastal areas, brings
    down electricity lines and destroys houses, with severe threat of mudslides. Chapala
    is expected to pour over two or three years worth of rain, up to 300 millimeters
    (12 inches), in a single day. (CNN) (Abu Dhabi Media)'
  International relations:
  - China–United States relations
  - In a Peking University speech in Beijing, US Pacific Command commander, Admiral
    Harry Harris, says the U.S. Navy’s freedom-of-navigation patrols in the South
    China Sea are routine operations intended to demonstrate respect for international
    law principles. Harris reiterated they should not be construed as a threat to
    any country while emphasizing America's common ground with China. (South China
    Morning Post) (Bloomberg)
  - Libyan Crisis (2011–present)
  - The New General National Congress (Libya Dawn) which controls the capital Tripoli,
    and much of western Libya, threatens to send 'hundreds of thousands' of refugees
    to Europe unless the European Union recognizes the Islamist-led government. (Daily
    Mail)
  - Territorial disputes in the South China Sea, Japan–Vietnam relations
  - Japan has delivered two more ships to Vietnam that will be refurbished into patrol
    boats. The ships, which arrived in the port city of Da Nang, are the second delivery
    of a 2014 deal in which Tokyo is to provide Vietnam with six used fishing vessels
    that will be converted into patrol boats for Vietnam's coast guard in the South
    China Sea. (Voice of America)
  - European migrant crisis
  - German Chancellor Angela Merkel announces a plan to register and distribute incoming
    refugees evenly throughout the European Union. Refugees would be stopped at EU
    borders, have their application processed, and then, if accepted, sent to one
    of the Union's 28 member states. (UPI)
  Law and crime:
  - Pakistani journalist Zaman Mehsud is shot dead by two motorcycle-riding gunmen
    in Pakistan's Khyber Pakhtunkhwa province, near the country's northwestern tribal
    region. According to a 2014 report, at least 56 journalists have been killed in
    Pakistan since 1992. (UPI) (Xinhua)
  Politics and elections:
  - The U.S. Department of Education’s Office for Civil Rights (OCR) issues a two-year
    investigative report finding the Palatine, Illinois, school district unfairly
    denied a transgender teenager — who was undergoing hormone therapy but had not
    undergone gender reassignment surgery — access to school facilities in violation
    of Title IX, that bars discrimination in federally funded education programs,
    causing her “isolation,” “ostracism” and at least one “tearful breakdown.” The
    school district has 30 days to reach an agreement with authorities or risk losing
    up to $6 million in federal funding and case-referral to the Department of Justice.
    The Washington Post report called this "The Palatine standoff". (The Washington
    Post) (Chicago Tribune) (DOE report)
  U.S. elections:
  - Gubernatorial
  - In Kentucky, Republican Matt Bevin defeats Democrat Jack Conway and independent
    Drew Curtis with 52 percent of the vote to succeed term-limited Democrat Steve
    Beshear. (Fox News) (AP)
  - In Mississippi, incumbent Republican Phil Bryant easily wins re-election over
    Democratic, truck driver Robert Gray. according to the Associated Press. (AP via
    Huffington Post)
  - State, city
  - Former five-term Bridgeport mayor Joe Ganim wins election to a sixth term as mayor
    of Connecticut's largest city, topping the six other candidates in the poll. Ganim
    is, in American parlance, an "ex-con;" i.e., a convicted felon. In 2003, he was
    convicted by a federal jury on 16 felony counts for racketeering, bribery, conspiracy,
    mail fraud, and tax evasion in an operation that also led to convictions of 10
    of his associates. Ganim served seven years in federal prison; he was released
    from a Hartford halfway house in 2010. (Hartford Courant) (AP via CBSLocal.com)
  - Newcomer, businesswoman, and clinical psychologist Karen Weaver tops incumbent
    Dayne Walling in the non-partisan, Flint, Michigan, Mayor's election. Flint, which
    is dealing with lead in drinking water, has been under State financial management
    for close to four full years, and is in the final stage where control will be
    returned to city officials. (AP) (Detroit News) (MLive Media)
  - Ballot initiatives, referendums
  - In Ohio, a ballot initiative that would have established a legal oligopoly for
    the sale of recreational and medicinal marijuana is resoundingly defeated by voters,
    according to AP. (Los Angeles Times)
  - In Texas, the Equal Rights Ordinance that would have established nondiscrimination
    protections for gay and transgender people in Houston fails to win approval from
    voters. (AP via Washington Post) (Texas Tribune)
  - Voters in Denver's suburban Jefferson County recall, by 64 to 36 percent, three
    conservative school board members who worked to weaken the local teachers union
    while boosting funding for charter schools and pushing through other market-driven
    policy changes. In Fall 2014, the conservative-led majority drew national attention
    when they wanted the AP U.S. history course to focus on citizenship and patriotism,
    while condemning civil disobedience and strike actions. (Washington Post) (AP
    via Huffington Post)
  Sport:
  - In Australian horse racing, Prince of Penzance wins the 2015 Melbourne Cup becoming
    the first 100-1 winner since World War II; Michelle Payne becomes the first female
    jockey to ride the winning horse. (Melbourne Age) (Huffington Post)
