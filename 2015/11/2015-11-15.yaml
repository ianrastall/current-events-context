Date: '2015-11-15'
Source_URI: Portal:Current events/2015 November 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - November 2015 Paris attacks
  - One of the Paris attackers is identified as Ismael Omar Mostefai, a 29-year-old
    who was born and raised in the Paris suburbs. (Fox News) (BBC)
  - Paris prosecutor François Molins says three jihadist cells, apparently multinational
    teams with links to the Middle East, Belgium, and possibly Germany, as well as
    France, staged coordinated attacks at bars, a concert hall, and a soccer stadium,
    killing 132 people and injuring 350, including around 90 who are in a serious
    condition. (Reuters)
  - French authorities identify two of the suicide attackers; both French nationals
    living in Belgium, one age 20, the other 31. (AP)
  - Turkey–ISIL conflict
  - Turkish police detain seven ISIS-linked suspects in simultaneous operations in
    Ankara. (Daily Sabah)
  - 2015 Beirut bombings, Spillover of the Syrian Civil War
  - Lebanon arrests nine people including seven Syrians over the recent Beirut bombings
    that killed at least 44 people. (Al Jazeera)
  - Egyptian security forces allegedly shoot dead at least 15 Sudanese asylum seekers
    in the Sinai Peninsula near the Israeli border. (Al-Jazeera)
  - Syrian Civil War
  - France-led coalition intervention against ISIL
  - France launches a series of airstrikes on Raqqa, the Islamic State's de facto
    capital in Syria, destroying a jihadi training camp and a munitions dump. (AP)
  - American-led intervention in Syria
  - A government official says the United States made a fresh delivery of ammunition
    to Syrian Arab Coalition fighters battling Islamic State in northern Syria, pushing
    ahead with a strategy that initially unnerved ally Turkey. (Reuters)
  Business and economy:
  - Daily fantasy sports companies DraftKings and FanDuel, who are fighting New York's
    cease-and-desist order that their industry is gambling in the U.S. state, apparently
    are OK with that label in the United Kingdom. DraftKings obtained a British gambling
    license in August and FanDuel applied for one earlier this month. (AP)
  Disasters and accidents:
  - The death toll from a landslide on Friday in China's Zhejiang province rises to
    16 with 21 still missing. (New York Times)
  - Heavy rain leads to warnings of floods in mid and north Wales. (BBC)
  International relations:
  - 2015 G-20 Antalya summit
  - The leaders of nations with the top 20 economies vow to use all their policy resources
    to bolster a sagging global economic environment. While the European migrant crisis
    and terrorism were high on the agenda of this economic summit the terror attacks
    in Paris dominate conversations and meetings. In the wake of the attacks and during
    ongoing investigation, French President François Hollande remains in Paris. (Reuters)
    (CNN Money) (New York Times)
  - 'United States President Barack Obama and Russian President Vladimir Putin, in
    a G20 working lunch meeting, traded views on Syria''s civil war: where they agreed,
    i.e. UN negotiations, cease-fire, and Syrian-led political transition; and where
    they disagreed, i.e. President Bashar al-Assad''s future role. Obama reiterated
    his support for the full implementation of the Minsk agreements on Ukraine, including
    Ukraine''s control of its borders. (AP) (RT), (Reuters), (NBC News)'
  - November 2015 Paris attacks
  - The top of Dubai's Burj Khalifa, the world's tallest skyscraper, is lit up in
    the blue, white and red of the French flag, in tribute to France and those killed
    in the attacks in Paris. Other landmark buildings in the United Arab Emirates,
    including the sail-shaped Burj Al Arab building, also paid tribute. (AP), (Arabian
    Business)
  - European migrant crisis
  - Swedish police increase checks of asylum facilities in the country's southwest
    amid reports refugees are leaving to avoid being registered by immigration officials.
    (AP)
  - Japan–Philippines relations
  - Reuters reports Japanese Prime Minister Shinzō Abe and Philippine President Benigno
    Aquino are set to agree on a deal paving the way for Tokyo to directly supply
    Manila with used military equipment. An announcement is expected this week during
    the Asia-Pacific Economic Cooperation (APEC) summit in Manila. (Reuters)
  Politics and elections:
  - Myanmar general election, 2015
  - Aung San Suu Kyi holds talks with parliament's outgoing chairman, Shwe Mann, seeking
    his help in an orderly democratic transition to the newly-elected National League
    for Democracy (NLD) government. Mann, who was ousted as head of the Union Solidarity
    and Development Party in August, lost his house seat in the November 8 vote. The
    current parliament will have at least one more session. (Reuters)
  - Myanmar's President Thein Sein promises a smooth transfer of power following the
    National League for Democracy winning a majority of parliamentary seats in last
    week's elections. (UPI)
  Sport:
  - UFC 193
  - Holly Holm defeats Ronda Rousey in a women's bantamweight title match at Etihad
    Stadium in the Australian city of Melbourne, Victoria. (News Limited) (Los Angeles
    Times)
  - In a suit filed by two former American professional football (NFL) players, the
    Ohio Supreme Court upholds a lower court ruling that Cleveland's formula for taxing
    visiting professional athletes, the so-called "jock tax," violates players' due
    process rights. A spokesman says the city will begin issuing refunds to players.
    (AP)
  - 2015 Fed Cup
  - In tennis, the Czech Republic retains the Fed Cup defeating Russia 3-2 in the
    final played at the O2 Arena in Prague. This is the Czech Republic's fourth title
    in five years. (Yahoo News)
  - 2015 NFL season
  - November 2015 Paris attacks
  - Several NFL teams hold moment of silence before their games for victims of the
    Paris attacks. (CBS Sports)
  - 2015 Green Bay Packers season
  - For the first time since 1991, the Detroit Lions defeated the Green Bay Packers
    at Lambeau Field with an 18-16 victory. (CBS Sports)
