Date: '2015-07-25'
Source_URI: Portal:Current events/2015 July 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - The Saudi-led military coalition announces that a 5-day humanitarian ceasefire
    has been agreed to, set to begin just before midnight Sunday. (Wall Street Journal)
  - Two suicide bombings at a swimming pool in northern Iraq kill at least 12 people.
    (Reuters)
  Arts and culture:
  - Chris Brown leaves the Philippines after he is prevented from leaving for four
    days due to a financial dispute between Brown and the Christian sect Iglesia ni
    Cristo. (The New York Times)
  Disasters and accidents:
  - A large fire west of the French city of Bordeaux ravages more than of forest.
    (The Daily Star)
  Politics and election:
  - The Tunisian parliament approves a new anti-terror law that allows the death penalty
    for terrorists. (Reuters)
  Sports:
  - Dutch cyclist Niek Kimmann wins his first UCI BMX Supercross series world title,
    while Venezuelan Stefany Hernandez finished first at the elite women's race. (British
    Cycling)
