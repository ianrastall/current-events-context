Date: '2015-07-28'
Source_URI: Portal:Current events/2015 July 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram attacks in multiple northern Nigerian villages leaves at least 29 dead.
    (Bloomberg)
  Business and economy:
  - Dutch aerospace company Fokker Technologies is acquired by the British multinational
    GKN. (GKN)
  Disasters and accidents:
  - Rescuers find 13 dead migrants in a boat off the Libyan coast. (Al-Arabiyah)
  - Florida law enforcement and civilians continue the search for two boys, both aged
    14, who were intending to travel to the Bahamas by boat. (USA Today)
  - At least 25 people have been killed and 22 injured at a fire in a furniture factory
    in Obour City near the Egyptian capital Cairo. (Reuters via Egypt Independent)
    (BBC)
  - At least six people have been killed and several are missing following a building
    collapse in the Indian city of Thane. (CNN)
  - Heavy rain in last three days resulted in widespread flood in north Gujarat resulting
    in more than 70 deaths.
  Law and crime:
  - A Libyan court sentences Saif al-Islam Gaddafi to death in absentia for alleged
    atrocities in 2011. (AP via Fox News)
  - Police in Santa Cruz, California, find what they suspect is the body of 8-year-old
    Madyson Middleton, who was last seen on footage on the afternoon of Monday, July
    27, riding her new scooter. A 15-year-old male minor has been arrested on suspicion
    of homicide. (MSN)
  - 2015 Clinton Correctional Facility escape
  - Joyce Mitchell, who had smuggled hacksaw blades inside frozen meat to Richard
    Matt and David Sweat in prison, before withdrawing as their getaway driver, pleads
    guilty to a first-degree felony of promoting prison contraband and to a misdemeanor
    count of fourth-degree criminal facilitation. She faces up to 7 years in prison
    when sentenced. (MSN)
  Politics and elections:
  - 1Malaysia Development Berhad
  - Malaysian Prime Minister Najib Razak fires Deputy Prime Minister Muhyiddin Yassin.
    (The New York Times)
  - Barack Obama is the first US president to speak in front of the African Union
    (AU). He encourages the world to strengthen economic ties with the continent,
    but also criticises the lack of democracy. (WSJ)
