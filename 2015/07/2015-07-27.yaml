Date: '2015-07-27'
Source_URI: Portal:Current events/2015 July 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - At least 7 people are killed and many injured after gunmen attack an Indian police
    station in Punjab. (The Hindu)
  - Syrian Civil War, Battle of Sarrin (June–July 2015)
  - YPG led forces capture the strategic town Sarrin from ISIL after a month-long
    offensive. (The Daily Star)
  Business and economy:
  - 2015 Chinese stock market crash
  - The Shanghai Composite Index drops 8.5%, the largest one-day decline in the index
    since 2007. (Bloomberg)
  Law and crime:
  - The Turkish National Police warns of possible bomb attacks on crowded places in
    central Istanbul, including metro stations and bus stops, following the escalation
    of Turkey–ISIL conflict. (Hürriyet Daily News)
  Politics and elections:
  - Philippines President Benigno Aquino III holds his final State of the Nation Address
    before stepping down in 2016. He advocates the passage of the Bangsamoro Basic
    Law and an anti-dynasty bill. (CNN Philippines), GMA News Online
  - French farmers protesting low prices within the country turn back hundreds of
    trucks suspected of carrying foreign agricultural products at the country's border
    with Germany. (AP)
  - A.P.J. Abdul Kalam,former President of India dies aged 83.
