Date: '2015-07-21'
Source_URI: Portal:Current events/2015 July 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Kurdish People's Protection Units (YPG) and human rights organizations say
    that YPG fighters have captured one juvenile prison and a power station south
    of Al-Hasakah. (kurdpress)
  Business and economy:
  - Greek government-debt crisis timeline
  - The government of Greece submits more legislation to the Hellenic Parliament required
    by its creditors to start a bailout package. (Reuters)
  - Hisao Tanaka stands down as the CEO of Japanese company Toshiba following a $1.2
    billion accounting scandal. (Financial Times)
  International relations:
  - The Philippines announces plans to increase its defense budget by 25% amid ongoing
    tension in the South China Sea. (AFP via Straits Times)
  Law and crime:
  - Authorities in Waller County, Texas announce that the death of activist Sandra
    Bland in police custody will be treated as a murder investigation. (CNN)
  Politics and elections:
  - Burundian presidential election, 2015
  - Voters in Burundi go to the polls for a presidential election amidst gunfire and
    violence with President Pierre Nkurunziza seeking a third term and opposition
    parties boycotting the election. At least two people have been killed in election
    violence. (BBC), (Reuters via SABC)
  - 2016 United States presidential election
  - The Governor of Ohio John Kasich becomes the 16th person to seek the nomination
    of the Republican Party. (NBC News)
  Sports:
  - The National Hockey League announces that it has received formal applications
    for expansion teams from ownership groups in Las Vegas and Quebec City. If granted,
    the expansion teams would begin play in the 2017–18 season. (CBC)
