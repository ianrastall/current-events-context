Date: '2015-07-09'
Source_URI: Portal:Current events/2015 July 9
Intelligence_Payload:
  Business and economy:
  - Chinese stock market crash
  - The China Securities Regulatory Commission (CSRC) imposes a six-month ban on stockholders
    owning more than 5 percent of a company's stock from selling those stocks, resulting
    in a 6 percent rise in stock markets. (Reuters)
  - Puerto Rican debt crisis
  - The United States Congress refuses to offer a bailout to Puerto Rico. (Politico)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Hong Kong starts closing schools as Typhoon Linfa approaches. (South China Morning
    Post)
  International relations:
  - Philippines v. China
  - The Philippines asks the International Court of Arbitration at The Hague to invalidate
    China's claims to virtually all of the South China Sea. The hearing was attended
    by observers from Indonesia, Japan, Malaysia, Thailand, and Vietnam. (AP viaThe
    Washington Post)
  - Prince Zeid bin Ra'ad, the United Nations High Commissioner for Human Rights,
    warns that violence can explode into armed conflict in Burundi following events
    of the current presidential election. (AP via ABC News America)
  - 7th BRICS summit
  - The event is concluded. (One India)
  Politics and elections:
  - The South Carolina House of Representatives agrees to a bill previously passed
    by the Senate to remove the Confederate flag from the capitol grounds with Governor
    Nikki Haley signing the legislation into law. (AP via ABC News America), (NBC)
  - Ugandan police arrest two presidential hopefuls, former Prime Minister Amama Mbabazi
    and opposition leader Kizza Besigye. (AlJazeera)
  - Same-sex marriage in Puerto Rico
  - The US Court of Appeals for the 1st Circuit rules the ban in the region 2–1 unconstitutional,
    paving way for same-sex marriages. (Washington Blade)
  - The health department announces issuing licenses early next month. (AP)
  - The European Parliament rejects a plan to abolish Freedom of Panorama. (Amateur
    Photographer)(NOS (Dutch)).
  - The Thai consulate in Istanbul is attacked by Turkish protestors after about a
    hundred Uighurs were deported by Thailand back to China despite concerns over
    persecution. (BBC)
  Sports:
  - 2015 FIFA corruption case
  - FIFA suspends former Executive Committee member Chuck Blazer for life for assorted
    ethical breaches including accepting bribes. (FIFA Governance)
