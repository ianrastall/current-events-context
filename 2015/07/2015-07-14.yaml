Date: '2015-07-14'
Source_URI: Portal:Current events/2015 July 14
Intelligence_Payload:
  Disasters and accidents:
  - At least 27 people are killed in a stampede at the Godavari Maha Pushkaram Hindu
    festival in the Indian state of Andhra Pradesh. (NY Times)
  - A helicopter belonging to the National Iranian Oil Company (NIOC) with four people
    on board (two crew members, a patient, and a person accompanying the patient)
    crashes in the Persian Gulf. (Tasnim)
  - Two people are dead and six are missing due to flash flooding in Kentucky. (NBC
    News), (Fox News)
  International relations:
  - Territorial disputes in the South China Sea
  - The Google Maps website removes the Chinese name for the Scarborough Shoal bitterly
    disputed by China and the Philippines from its maps service, following an outcry
    from Filipinos. (The Economic Times)
  - Negotiation of a comprehensive nuclear agreement with Iran
  - A nuclear deal is reached in Vienna between Iran and P5+1. This Joint Comprehensive
    Plan of Action if signed by the entities involved, will cut off Iran's ability
    to produce a nuclear weapon whilst allowing for the peaceful use of nuclear energy,
    inspections, and the lifting of sanctions. (BBC) (CNN) (NY Times)
  Law and crime:
  - North Korea announces a criminal amnesty in honor of the 70th anniversary of independence
    from Japanese rule. (AFP via Yahoo! News)
  - The Catholic Church in Taherpur, India is vandalized, and the caretaker is arrested.
    The church was desecrated on the night of July 9, according to Indian media reports.
    (India Express)
  Science and technology:
  - Recent climate change would still cause a 6-meter (20-feet) sea-level rise even
    if greenhouse gas emissions were reduced today per a scientific paper in Science.(Times
    of Malta), (Science)
  - NASA's New Horizons spacecraft completes a historic flyby of the dwarf planet
    Pluto and its five moons. Measurements, along with many high-quality photos and
    reams of data, were taken, including conclusive information regarding the diameter
    of Pluto and its moons.(Gizmodo) (CNN) (official NASA page)
  - 'Scientists at Northumbria University in northeast England develop a computerized
    statistical model of the Sun''s solar cycle (a measurement of the number of sunspots
    and solar flares, in this case between 1976 and 2008, and their intensity and
    activity). While preliminary, and not yet peer-reviewed, the data predicts irregularities
    in the cycle: the Northern Hemisphere could experience a slight lowering in temperatures
    in the 2030s. (CNN) (Washington Post)'
  - Scientists at CERN's Large Hadron Collider announce discovery of the pentaquark.
    (BBC) (ABC News)
  Sport:
  - A panel appointed by the Supreme Court of India recommends that two Indian Premier
    League cricket teams, the Chennai Super Kings and Rajasthan Royals be suspended
    for two years due to a corruption scandal. (BBC)
  - 2015 Major League Baseball All-Star Game
  - In baseball, the American League defeats the National League 6-3 to win home-field
    advantage in the 2015 World Series. (Sports Illustrated via Twitter)
