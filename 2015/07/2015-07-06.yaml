Date: '2015-07-06'
Source_URI: Portal:Current events/2015 July 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - An Iraqi Air Force Sukhoi Su-25 jet, returning from a bombing raid against ISIL
    militants in the north, accidentally drops a bomb on Baghdad destroying several
    homes and killing at least 7 civilians. American officials claimed that as many
    as 65% of Iraqi air force bombers do not drop their bombs due to "lack of targets".
    (Sky News)
  - Yemeni Civil War (2015–present)
  - An air-strike by the Saudi-led coalition on the southern port city of Aden kills
    at least 30 people. It is unclear how many of the dead are civilians or Houthi
    rebels. (BBC)
  - Boko Haram insurgency, Timeline of Boko Haram insurgency
  - Two bomb attacks on the central Nigerian city of Jos have left at least 44 people
    dead. (BBC)
  Disasters and accidents:
  - A Russian Su-24 military aircraft crashes while taking off from an airfield in
    the Khabarovsk region in Russian Far East on a nighttime training flight and both
    pilots are killed. (NY Times)
  International relations:
  - Ban Ki-moon, the Secretary-General of the United Nations, calls for a new investigation
    into the death of former Secretary-General Dag Hammarskjöld in a plane crash after
    a panel he appointed uncovers new evidence. (New York Times)
  Politics and elections:
  - Greek bailout referendum, 2015
  - Yanis Varoufakis resigns as the Greek Minister of Finance despite the success
    of the "no" vote which supported his views. (AFR)
  - Greek Prime Minister Alexis Tsipras calls Russian President Vladimir Putin in
    the wake of the referendum; Putin expresses his support for the Greek people in
    the call. Many western officials express concerns that, like Egypt, Greece may
    increase its ties to Russia at the expense of the west. Greece is a member of
    the NATO military alliance. (Yahoo)
  Sports:
  - In auto racing, Dale Earnhardt Jr. wins the NASCAR 2015 Coke Zero 400 at the Daytona
    International Speedway after a four-hour rain delay. On the final lap, a major
    crash sent Austin Dillon into the catch fence in front of the grandstands, causing
    minor injuries to five fans. Dillon himself walked away unhurt. (ESPN)
  - 2015 Tour de France
  - In cycling, the 2015 Tour de France race is neutralized 100km into the third stage
    due to a major crash involving about 30 riders. Yellow jersey leader Fabian Cancellara
    is injured in the crash and is forced to withdraw from the Tour. The race is eventually
    stopped 50km from the finish with Briton Chris Froome taking the yellow jersey.
    (News24) (BBC)
  - In boxing, the World Boxing Organization strips Floyd Mayweather Jr. of the welterweight
    title he won in his fight with Manny Pacquiao for failing to pay a US$200,000
    fee in time and failing to vacate a Light middleweight title he also held. (Reuters
    via MSN)
