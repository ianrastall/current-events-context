Date: '2015-07-24'
Source_URI: Portal:Current events/2015 July 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkish involvement in the Syrian Civil War, Spillover of the Syrian Civil War
  - Turkish warplanes strike ISIS positions in northern Syria following an exchange
    of gunfire on the Turkish-Syrian border which left one Turkish soldier dead. The
    airstrikes are said to have killed as many as 35 ISIS militants. (Yahoo)
  Business and economy:
  - Health insurance company Anthem Inc. agrees to buy Cigna in a deal worth $48 billion.
    (Wall Street Journal)
  - Greek government-debt crisis timeline
  - Greece has formally requested a new bailout loan from the International Monetary
    Fund. (Deutsche Welle)
  Disasters and accidents:
  - A large explosion, which triggers other explosions and a fire (which threatens
    a nearby forest) at a fireworks factory in southeastern Italy (Modugno, Metropolitan
    City of Bari, Apulia Region) kills 7 people and injures several more, some seriously.
    Emergency vehicles were on the scene and the cause is being investigated; it is
    the peak season for fireworks in Italy because of the summer festivals there.
    (BBC)
  Law and Crime:
  - The United States Department of Transportation opens an investigation into whether
    airlines engaged in price gouging by raising ticket prices in the Northeastern
    United States following the 2015 Philadelphia train derailment in May. (AP)
  Politics and elections:
  - Burundian presidential election, 2015
  - The President of Burundi, Pierre Nkurunziza, is elected for a third consecutive
    term. (BBC)
  Anti-corruption campaign in China:
  - Zhou Benshun, the Communist Party chief of China's Hebei province, is detained
    for investigation by the party's anti-graft body. He is first incumbent provincial
    leader to be investigated since the anti-corruption campaign began in 2013. (WSJ)
