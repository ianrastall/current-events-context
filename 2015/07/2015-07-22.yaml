Date: '2015-07-22'
Source_URI: Portal:Current events/2015 July 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide bomb attack kills at least 15 people in northern Afghanistan. (CNN)
  - Two explosions in the Nigerian city of Gombe killed at least 29 people. (Reuters)
  Arts and Culture:
  - The University of Oxford has radiocarbon dated fragments, of what apparently is
    the world's oldest Quran, to between 568 A.D. and 645 A.D. The animal skin parchment
    was found hidden inside the pages of another book in England's University of Birmingham
    library. (Daily Mail) (Deutsche Welle)
  Business and economy:
  - The European Central Bank provides an extra 900 million euros to the Greek banks.
    (The Independent)
  Disasters and accidents:
  - 2015 Studénka train crash
  - Three people die in a collision between a Pendolino train and a lorry that occurred
    near Studénka, north Moravia, in the Czech Republic. (Yahoo news) (ABC news) (ČTK)
  Law and crime:
  - Charleston church shooting
  - Dylann Roof, the suspect in the murder of nine people in the American city of
    Charleston, South Carolina, is indicted on dozens of federal offenses including
    hate crimes. (The Guardian)
  - The former prime minister of Egypt, Ahmed Nazif, is sentenced to five years in
    prison after losing appeal against 3-year prison sentence for corruption. (Cairo
    Post)
  - Broken Arrow murders
  - Perpetrators Robert and Michael Bever murder their family in preparation for their
    Mass shooting plot.
  Science and technology:
  - The finals of the robot football World Cup are held. A Chinese team defeats the
    Netherlands in the finals of the middle-weight non-humanoid league, while another
    lost in the final of the small humanoid class to a team from Japan. (DutchNews)
    (BBC)
  Health and medicine:
  - Scientists at the U.S. NIH's National Institute of Allergy and Infectious Diseases
    report a major breakthrough toward finding a new universal flu vaccine by using
    non-infectious H-proteins instead of whole viruses.(NIAID)
