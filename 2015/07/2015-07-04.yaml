Date: '2015-07-04'
Source_URI: Portal:Current events/2015 July 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - A rally of war veterans in Kiev calls for Ukraine to abandon the Minsk II ceasefire
    agreement and to declare war on pro-Russian separatists in the Donbass region.
    Despite two ceasefire agreements since September, combat operations, including
    the use of heavy artillery and ballistic missiles, never stopped. (BBC)
  - Saudi Arabian-led intervention in Yemen
  - Yemen's Houthi rebels shell the Saudi Arabian cities of Jizan and Najran with
    claims of several Saudi soldiers being killed. (Reuters via Daily Star)
  - Second Libyan Civil War
  - At least ten civilians are killed when three separate car bombs explode simultaneously
    in the eastern coastal city of Derna. (Yahoo news via AP)
  - Sinai insurgency
  - A shell kills a woman and her two children as fighting continues on the Sinai
    Peninsula between the Egyptian Army and Islamic State of Iraq and the Levant militants.
    (AFP via Times of India)
  - Syrian Civil War
  - A mosque bombing in northern Syria kills 15 members of Al Qaida's affiliate Nusra
    Front. (Fox News via Associated Press)
  - The Syrian Army and Hezbollah launch an offensive to capture the rebel-held Syrian
    city of Zabadani. (Al-Arabiyah)
  - Kurdish People's Protection Units advance on the Islamic State in Iraq and the
    Levant de facto capital city of Raqqa. (ALJazeera)
  - ISIL militants execute 25 Syrian Army soldiers in the ancient city of Palmyra.
    (Al-Arabiya)
  - Nagorno-Karabakh conflict
  - The Azerbaijani military shoots down two Armenian drones over Azeri positions
    according to Azerbaijan's defense ministry. (TREND)
  Arts and culture:
  - The Republic of China (Taiwan) holds a large military parade in Taipei to commemorate
    World War II in support of its claims that Kuomintang forces led by Chiang Kai-Shek
    played a leading role in the defeat of the Empire of Japan with the Chinese Communist
    Party under Mao Tse-Tung playing a minor role. (AP)
  - 'UNESCO adds new sites to the World Heritage List: Tusi Sites (China), Susa, Cultural
    Landscape of Maymand (both in Iran), Singapore Botanic Gardens (Singapore), Baekje
    Historic Areas (Republic of Korea), Great Burkhan Khaldun Mountain and its surrounding
    sacred landscape (Mongolia), and the French wine producing regions of Champagne
    and Burgundy. (AFP via Straits Times) (UNESCO)'
  Disasters and accidents:
  - At least nine people have been killed and 30 injured following a factory collapse
    in the city of Wenling in Zhejiang province. (AP via Star Tribune)
  - A wildfire in the Canadian province of Saskatchewan forces 8,000 people from their
    homes. (CBC)
  Law and crime:
  - A South Korean navy officer is charged with leaking confidential information to
    China. (RTHK) (AFP via Sky News)
  - Abdul Gani Patail, the Attorney General of Malaysia, says that a probe of troubled
    state owned investment bank 1Malaysia Development Berhad has uncovered documents
    that show the transfer of money into private accounts of the Prime Minister Najib
    Razak. (Market Watch)
  Politics:
  - 2015 Sousse attacks
  - Tunisia's President Beji Caid Essebsi declares a state of emergency. (VOA News)
  - Tupou VI is officially crowned as the King of Tonga. (BBC)
  - Fidel Castro makes his first public appearance at a Cuban cheese factory since
    February 2015. (UPI)
  Sport:
  - 2015 Tour de France
  - In cycling, the 2015 Tour de France gets underway in the Dutch city of Utrecht
    with an individual time trial. (The Guardian)
  - 2015 Super Rugby season
  - The Highlanders from the New Zealand region of Otago defeat the Hurricanes from
    the New Zealand capital Wellington in the Super Rugby final, 21–14. It is the
    Highlanders' first Super 15 final. (The Age)
  - 2015 FIFA Women's World Cup
  - In association football, England defeat Germany 1–0 through an extra time penalty
    goal by Fara Williams to win third place in the FIFA Women's World Cup. (BBC)
  - 2015 Copa América
  - In football, the Chile national football team win the Copa América for the first
    time, defeating Argentina 4–1 in a penalty shoot-out following a 0–0 draw.(The
    Guardian), (BBC)
