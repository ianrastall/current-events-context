Date: '2015-07-29'
Source_URI: Portal:Current events/2015 July 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The Afghan government claims that Taliban leader Mohammad Omar died in April 2013
    in Pakistan of natural causes. (BBC) (Reuters)
  - War in North-West Pakistan
  - Malik Ishaq, leader of the terrorist group Lashkar-e-Jhangvi, is killed during
    a shootout in which supporters of the group ambushed a prisoner convoy. The shootout
    killed 13 of the attackers, injured six police officers, and also killed two of
    Ishaq's sons. (New York Times)
  Disasters and accidents:
  - The Wragg Fire in Northern California continues to burn at 80% containment with
    over 6,991 acres being destroyed and mandatory evacuations. (KQED)
  - Malaysia Airlines Flight 370
  - Debris found near the Indian Ocean island of Réunion is consistent with material
    from a Boeing 777 and is being examined to confirm whether it is from Malaysia
    Airlines Flight 370. (CNN)
  - At least 27 people are killed and 149 injured after a out of control truck runs
    into a religious procession in the Mexican state of Zacatecas. (AP via Washington
    Post)
  Health:
  - The Children's Hospital of Philadelphia announces that 8-year old Zion Harvey
    became the first pediatric patient to receive a double hand transplant earlier
    this month. (ABC)
  International relations:
  - Nigerian President Muhammadu Buhari visits neighboring Cameroon to bolster support
    for a multinational army to fight Boko Haram. (AP via Washington Post)
  Law and crime:
  - University of Cincinnati Police officer Ray Tensing is charged with murder for
    the July 19, 2015 shooting death of Samuel DuBose. (Yahoo News)
  - Santa Cruz County District Attorney Jeffrey Rosell announces that Adrian Jerry
    Gonzalez, a 15-year-old will be tried as an adult in the murder of 8-year-old
    Madyson Middleton. (ABC News)
