Date: '2015-07-13'
Source_URI: Portal:Current events/2015 July 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Burundi's army kills 31 suspected rebels and captures 170 others in fighting in
    the country's north. (ABC News via AP)
  - Saudi Arabian–led intervention in Yemen
  - An airstrike by the Saudi-led coalition kills 25 civilians and wounds 50 in Sanaa,
    the capital of Yemen. Last week a ceasefire agreement was reached. (STL Today)
    (CTV News via AP)
  Business and economy:
  - Greek government-debt crisis, timeline
  - Eurozone leaders agree on a bailout deal for Greece providing the Hellenic Parliament
    passes reforms into law by July 15. (BBC)
  Disasters and accidents:
  - All the missing 42 people have been found following the collapse of a Russian
    Army barracks in the Omsk Oblast of southwestern Siberia with 23 deaths. (TASS)
  International relations:
  - Georgia accuses Russia of violating its sovereignty by placing border markers
    on the edge of the South Ossetia region, leaving part of an international oil
    pipeline in territory under Russian control. The area was the site of the Russo-Georgian
    war in 2008. (Reuters)
  Law and crime:
  - The Prime Minister of Romania Victor Ponta is charged in an on-going corruption
    scandal. (BBC)
  - Former United Kingdom Independence Party Member of the European Parliament Ashley
    Mote is jailed for 5 years for fraudulently claiming almost £500k in European
    Parliament expenses. (BBC)
  - Rapper Curtis James Jackson III, better known by his stage name 50 Cent, files
    for Chapter 11 bankruptcy protection. (MarketWatch)
  - President Barack Obama commutes the sentences of 46 American prison inmates serving
    long sentences for drug related offences. (CNN)
  - Son of Boston police captain is charged with a foiled plot to bomb a university,
    inspired by Boston Marathon bombing, on alleged behalf of ISIS. He is scheduled
    Tuesday for a bail hearing at a federal court in Springfield. (AP)
  - Alaa Bader Abdullah, 31, is executed in the United Arab Emirates for the murder
    of Ibolya Ryan, a Romanian-American teacher. (Reuters)
  - The male defendant is found not guilty of death threats on US Majority Speaker
    of the House, John Boehner, by reason of insanity. He is still in jail and due
    for another trial on August 21 to determine his ability to adjust to society.
    (USA Today)
  Politics and elections:
  - Dutch Finance Minister Jeroen Dijsselbloem was re-elected president of the Eurogroup
    for a second term. (Reuters)
  - 2016 United States presidential election
  - Scott Walker, the Governor of Wisconsin, announces that he will be seeking the
    Republican Party nomination. (NBC News)
  Sport:
  - Football at the 2016 Summer Olympics
  - The male New Zealand national under-23 football team are disqualified from the
    qualifying tournament by the Oceania Football Confederation for fielding allegedly
    ineligible player Deklan Wynne.(BBC)
