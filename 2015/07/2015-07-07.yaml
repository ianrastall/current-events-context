Date: '2015-07-07'
Source_URI: Portal:Current events/2015 July 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency, Timeline of Boko Haram insurgency
  - A bomb attack has killed at least 25 people and wounded 32 others in northern
    Nigeria's Zaria. (BBC)
  - Saudi Arabian–led intervention in Yemen
  - Air strikes and combat kill 200 in Yemen, highest daily toll so far. (Reuters
    via SANAA)
  - Terrorism in Kenya, Somali Civil War (2009–present)
  - Al-Shabaab militants kill 14 in northern Kenya. (US News)
  - War in Afghanistan (2001–2021)
  - A NATO convoy is hit by a suicide car bomb in Kabul. Three or four civilians are
    injured; no fatalities have been reported. (NBC News)
  Business and economy:
  - Greek debt crisis timeline
  - Eurozone leaders hold a crisis meeting to discuss options on Greek debt following
    the referendum as Greek banks are near to running out of cash. For the last week
    Greek banks allowed to withdraw only 60 euros a day. (Reuters)
  - The Government of Greece does not present any new proposals and Greek banks are
    unlikely to reopen this week. (AP)
  - The European Union gives Greece a deadline of Thursday to develop new proposals
    for discussion at an emergency summit on Sunday. (BBC)
  Disasters and accidents:
  - 2015 Moncks Corner mid-air collision
  - A United States Air Force F-16 collides with a privately-owned Cessna to the north
    of Charleston, South Carolina. The pilot of the jet ejects safely, but the Cessna
    breaks up mid-air, killing the two unidentified occupants. (CNN)
  Law and crime:
  - 1Malaysia Development Berhad scandal
  - Malaysian authorities order a freeze on six accounts associated with alleged payments
    by development bank 1Malaysia Development Berhad to the Prime Minister Najib Razak.
    (Wall Street Journal)
  - The FBI, U.S. Postal Service, and Indiana State Police seize electronics and other
    items from the Zionsville, Indiana home of Subway commercial spokesman Jared Fogle.
    The seizure comes two months after the former head of Fogle's foundation was arrested
    on child pornography charges. (Indianapolis Star)
