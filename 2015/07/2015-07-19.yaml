Date: '2015-07-19'
Source_URI: Portal:Current events/2015 July 19
Intelligence_Payload:
  Disasters and accidents:
  - British police resume the search for four people missing after an explosion at
    a mill in Cheshire. (BBC)
  Arts and culture:
  - Fourteen Sufi mausoleums in the city of Timbuktu in northern Mali have been rebuilt,
    three years after they were destroyed by Islamist militants from Ansar Dine group.
    (BBC)
  International relations:
  - 2014–15 India–Pakistan border skirmishes, India–Pakistan relations
  - The Pakistan Foreign Office lodges an official report with India over what it
    calls a series of "unprovoked ceasefire violations" in the disputed Himalayan
    region of Kashmir. (AP via Asian Correspondent)
