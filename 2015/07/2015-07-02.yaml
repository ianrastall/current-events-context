Date: '2015-07-02'
Source_URI: Portal:Current events/2015 July 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Sinai insurgency: July 2015 Sinai attacks'
  - Egypt vows to continue an offensive on the Sinai Peninsula until ISIL militants
    have been removed. A hundred people have been killed in fighting in the past two
    days. (BBC)
  - Egyptian Air Force air strikes in the Sinai Peninsula kill at least 23 ISIS-linked
    militants a day after the deadliest clashes in the region in years. (Reuters)
  - Boko Haram
  - Boko Haram gunmen kill scores of people in attacks on the Nigerian towns of Kukawa
    and Musarram in recent days. (Agencies via WA Today)
  - Saudi Arabian-led intervention in Yemen
  - Airstrikes on Sanaa kill eight, according to Houthi officials. (AP)
  - An attack on a convoy in northern Mali kills six UN Peacekeepers. (AP)
  Business and economy:
  - Deepwater Horizon oil spill
  - London-based BP agrees, pending court approval, to pay $US18.7 billion to compensate
    the United States government and the five Gulf Coast states--Alabama, Florida,
    Louisiana, Mississippi and Texas--for damages stemming from the 2010 Gulf of Mexico
    oil spill. The settlement includes a civil penalty of $US5.5 billion under the
    Clean Water Act. (Fortune) (AP via Washington Post)
  - According to a statement from Ukraine's nuclear energy authority, Yadernoye Toplivo,
    a private U.S. nuclear energy company, ConverDyn, could begin helping Ukraine
    in the production of enriched uranium, a day after Russia shut off natural gas
    supplies to the country after the two failed to reach agreement over Ukraine's
    unpaid gas debts to Russia.(MSN)
  Disasters and accidents:
  - Sinking of Kim Nirvana-B
  - The Kim Nirvana ferry capsizes off the Philippines en route from the city of Ormoc
    to Camotes island with 173 people onboard; at least 33 people are confirmed dead
    while at least 50 people have been rescued. (AFP via ABC Online), (BBC)
  - A bridge collapses under a Pakistan Army train at Gujranwala, killing nineteen
    and injuring over 100.Dawn
  Politics and elections:
  - 2016 United States presidential election
  - Former Senator Jim Webb announces that he will seek the Democratic Party nomination.
    (Fox News)
  Health and medicine:
  - Health officials announced that a 21-year-old woman from Bishop, California had
    died June 20th at Renown Regional Medical Center in Reno, Nevada from cardiac
    arrest caused by the rare brain-eating amoeba Naegleria fowleri. (Reno Gazette-Journal)
    (Inquisitr.com)
