Date: '2015-07-15'
Source_URI: Portal:Current events/2015 July 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - At least 33 people are killed in Boko Haram attacks in recent days in northeastern
    Nigeria. (CNN)
  - Yemeni Crisis (2011–present)
  - Loyalists of exiled President Abd Rabbuh Mansur Hadi capture Aden International
    Airport after four months of being under Houthi control. (Al-Arabiyah)
  Disasters and accidents:
  - A preliminary report from the Dutch Safety Board of the investigation of the Malaysia
    Airlines Flight 17 (MH17) disaster points to pro-Russian rebels as being responsible
    for the shooting down of the passenger flight on 17 July 2014. (CNN)
  Business and economy:
  - Greek government-debt crisis, Greek government-debt crisis timeline
  - The Hellenic Parliament votes to approve the Greek bailout package despite many
    senior lawmakers from the ruling Syriza Party refusing to vote for the deal. (AP
    via New York Times), (BBC)
  - Puerto Rico government debt crisis
  - Standard & Poor's cut the credit rating of Puerto Rico's Government Development
    Bank to 'CC', saying a near-term default is a virtual certainty. (Reuters)
  - Pabst Brewing Company announces plans to brew again at their historic brewery
    located in Milwaukee. (JS)
  - Spanish manufacturer Talgo announces Saudi Arabia's cancellation of a $201-million
    contract for six high-speed trains. (Reuters via Arabian Business)
  Health:
  - Two South Korean airlines, Korean Air and Asiana Airlines, will resume flights
    to Japan after suspending flights during the recent MERS outbreak. (TASS)
  Law and crime:
  - Oskar Gröning, known as the "Auschwitz book-keeper", is sentenced to four years
    imprisonment for being an accessory to the murder of 300,000 Jews. (BBC)
  Politics and elections:
  - President of Russia Vladimir Putin signs a law that sets the date for an early
    parliamentary election on 18 September 2016. (Bloomberg)
  Science and Technology:
  - The circumnavigation attempt of Earth by the solar-powered Solar Impulse plane,
    currently in Hawaii, has been suspended for the rest of 2015 in order to perform
    necessary repairs. (BBC)
  - NASA publishes the first close up photos of Pluto from the New Horizons spacecraft.
    They show geologically young mountains made of water ice. (The Guardian), (Wired)
