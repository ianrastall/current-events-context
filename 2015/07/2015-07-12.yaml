Date: '2015-07-12'
Source_URI: Portal:Current events/2015 July 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian–led intervention in Yemen
  - Saudi-led coalition forces bomb Houthi targets in several provinces of Yemen,
    killing at least 15 people, despite a UN-brokered truce. (Business Standard)
  - 2015 Sousse attacks
  - Tunisia arrests 127 people suspected of being members of terrorist groups following
    last month's attack. (Al-Arabiya)
  - Tunisia's Interior Minister Najem Gharsalli claims that the country has targeted
    the al-Qaida-linked Oqba Ibn Nafaa brigade. (AP)
  - War in Afghanistan (2001–2021)
  - A suicide car bomb kills 25 people and wounds 10 in southeastern Afghanistan close
    to a U.S. base. (Reuters)
  - Colombian conflict (1964–present)
  - The Government of Colombia and FARC announce plans to negotiate a ceasefire to
    end the fifty year old dispute. (AP)
  Business and economy:
  - Greek government debt crisis
  - A European Union leaders' summit to discuss the Greek debt crisis is cancelled
    due to failure of finance ministers to agree on Greek proposals. However, Eurozone
    leaders do meet, with discussions continuing into the night. (BBC), (Sky News)
    (The Guardian)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Typhoon Chan-hom weakens as it heads to northeastern China. (Xinhua)
  Law and crime:
  - War on Terror
  - An independent report reveals that the American Psychological Association was
    complicit in the participation of its members with the use of torture during the
    Iraq and Afghan wars, such as in Abu Ghraib and Guantanamo Bay. Many experts suspected
    that the bizarre torture and humiliation were not "a few bad apples" but meticulously
    planned techniques. (The Guardian)
  Sports:
  - 2015 Wimbledon Championships
  - In tennis, Novak Djokovic defeats Roger Federer in the men's singles in four sets
    to claim his third title. (BBC), (BBC)
