Date: '2015-07-30'
Source_URI: Portal:Current events/2015 July 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkey–PKK conflict
  - An ambush on a Turkish military convoy in the south-eastern Şırnak Province by
    PKK militants kills 3 Turkish soldiers. (BBC)
  Disasters and accidents:
  - A heat wave hits the Middle East with Baghdad recording a top temperature of and
    the Iranian city of Bandar Mahshahr recording a near world record heat index temperature
    of . (Washington Post)
  - At least 30 people are killed in a landslide that struck villages near Pokhara,
    Nepal. (Reuters UK)
  International relations:
  - A Taiwanese high school student commits suicide by charcoal fumes after a protest
    against controversial Sinocentric revisions in a curriculum guideline; hundreds
    storm the education ministry in response. (AFP via Yahoo) (Taipei Times) (BBC)
    (AP via Yahoo) (Los Angeles Times)
  - Russia vetoes a U.N. Security Council resolution that would have established an
    international criminal tribunal to investigate the downing of Malaysia Airlines
    Flight 17. (WSJ)
  Law and crime:
  - The Israeli Knesset passes a controversial law that legalizes forced-feeding of
    Palestinian prisoners. (Middle East Eye)
  - India executes Yakub Memon for his role in the 1993 Bombay bombings. (BBC)
  Politics and elections:
  - After days of debate, the Taliban announce Mullah Akhtar Mansoor as the successor
    to Mullah Omar over his son, Yaqoob Omar. (BBC)
  - Chen Min'er replaces Zhao Kezhi as the Communist Party Secretary of Guizhou province,
    China. Zhao awaits assignment. (CRI)
  Anti-corruption campaign in China:
  - Former Central Military Commission Vice-Chairman, General Guo Boxiong, is accused
    of taking bribes in exchange for the promotion of officers and expelled from the
    Communist Party of China. (BBC)
