Date: '2015-07-23'
Source_URI: Portal:Current events/2015 July 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Spillover of the Syrian Civil War
  - Turkey scrambles fighter jets and Turkish tanks open fire on ISIS positions along
    the Syrian border following an exchange of fire which left one Turkish soldier
    dead and two injured. The clashes are the first direct combat between the Turkish
    military and ISIS forces. There are multiple reports of Turkish ground forces
    crossing the official border into Syria. (Telegraph)
  - Turkey agrees to allow the United States access to İncirlik Air Base, near the
    city of Adana (in close proximity to the Syrian border) for the US-led coalition
    forces' air strikes against ISIS. (Today's Zaman)
  - China's People's Liberation Army conducts a series of military exercises simulating
    an attack on Taiwan's Presidential Office Building. (Focus Taiwan) (Quartz) (Wall
    Street Journal)
  Business and economy:
  - Greek government-debt crisis timeline
  - A majority in the Greek parliament votes to approve a second bailout reform package.
    (Euronews)
  - Pearson PLC agrees to sell Financial Times Group to Nikkei Inc. for £844 million.
    (BBC)
  Disasters and accidents:
  - At least 35 people are killed in a boat crash on Egypt's Nile. (BBC), (Yahoo)
  Law and crime:
  - Broken Arrow killings
  - Five people are killed and a girl is wounded in a stabbing at a home in Broken
    Arrow, Oklahoma, U.S. that occurred the previous day. Two teenage suspects are
    arrested. (CNN)
  - 2015 Lafayette shooting
  - Seven people are wounded, and three are dead (including the shooter) after a 58-year-old
    gunman opens fire at the Grand 16 Movie Theater in Lafayette, Louisiana during
    a showing of Trainwreck. (NBC), (CNN)
  Science and technology:
  - Discoveries of exoplanets
  - NASA scientists announce the discovery of Kepler-452b, the first near-Earth sized
    exoplanet discovered orbiting the habitable zone of a Sun-like star. (NASA), (BBC)
