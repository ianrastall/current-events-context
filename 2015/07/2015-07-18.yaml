Date: '2015-07-18'
Source_URI: Portal:Current events/2015 July 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Persecution of Hazara people in Quetta
  - In a failed suicide blast, a security guard intercepted a suicide bomber clad
    in female clothing attempting to enter Quetta’s Hazara town, who then detonated
    their device that contained of explosive material, killing themselves and the
    guard. (Dawn).
  - Islamic State in Iraq and the Levant (ISIL)
  - The Kurdish's People's Protection Units and independent monitors accuse ISIL of
    using poison gas while fighting in northern Syria late in June. (Reuters)
  - Saudi Arabia arrests 431 people accused of links to Islamic State. (Al-Arabiyah)
  - ISIL claims responsibility for kidnapping three African Christians in Libya. (Reuters
    via Trust)
  - War in Donbass, Timeline of the war in Donbass (July 2015–present)
  - Three civilians have been killed by shelling in the Donbass town of Avdiivka,
    within government-held territory. (Reuters)
  - Sinai insurgency
  - Militants kill at least five soldiers in attacks on two Egyptian Army checkpoints.
    (AP via ABC America)
  Disasters and accidents:
  - At least four people are dead, seven injured and a girl trapped as a four story
    building collapses in West Delhi in India's National Capital Territory of Delhi.
    (NDTV)
  - 2015 Cajon Pass wildfire
  - The wildfire burning in San Bernardino County, California has burned over 3,500
    acres, and destroyed 16 homes and other buildings. The fire has also burned over
    60 passenger vehicles and tractor-trailers. (CBS-Los Angeles)
  Law and crime:
  - 2015 Chattanooga shootings
  - The sailor wounded in Thursday's shooting at two military installations in Chattanooga,
    Tennessee, dies a little after 2 a.m. Saturday, bringing the death toll of the
    shooting to five. (Chattanooga Times-Free Press)
