Date: '2015-07-05'
Source_URI: Portal:Current events/2015 July 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - American-led intervention in Syria
  - A United States bombing campaign against ISIL has killed at least 30 people in
    the Syrian city of Al-Raqqah. (AFP via Yahoo! News)
  - Iraqi Civil War (2014–2017)
  - Iraqi government air strikes kill at least 73 people in the ISIL held cities of
    Ramadi and Fallujah. (Al-Jazeera)
  - War in North-West Pakistan
  - A roadside bomb in North Waziristan kills at least three Pakistan Army soldiers
    and injures six others. (AFP via Daily Star)
  - Boko Haram
  - A suicide bomber attacks a church in the Potiskum area of Nigeria's Yobe State,
    killing five and raising the toll of Boko Haram attacks for the past week to 200.
    (BBC) (DailyStar via AP)
  Arts and culture:
  - UNESCO adds more sites to the World Heritage List including the San Antonio Missions
    National Historical Park in the US city of San Antonio, Texas and Scotland's Forth
    Bridge. (My San Antonio), (BBC)
  - Pope Francis begans his tri-nation visit to Latin America arriving in Ecuador.
    Next he travels to Bolivia from July 8–10 and Paraguay from July 10–12, and returning
    to Rome on July 13. (Libreria Editrice Vaticana), (Catholic News Agency), (CNA),
    (CNA)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Over 1,000 people in the Philippines are stranded temporarily by Severe Tropical
    Storm Linfa (Egay) as landslides occur in Palawan province. (GMA Network)
  - Canadian wildfires
  - More than 60 wildfires start in the Canadian province of British Columbia over
    the weekend leading to several communities declaring a state of emergency. (CBC)
  - Nearly 1,000 military personnel are sent to fight wildfires in Saskatchewan. (CTV)
  Politics and elections:
  - Greek bailout referendum, 2015
  - Greek voters solidly reject (61.3 percent) the latest austerity proposal of the
    European Union, the International Monetary Fund and the European Central Bank.
    (Sky News), (The Guardian) (Reuters)
  - The Chancellor of Germany Angela Merkel and the President of France François Hollande
    call for an international summit of Eurozone leaders to discuss the next moves.
    (Bloomberg)
  - The Greek opposition leader Antonis Samaras resigns as leader of his party, New
    Democracy; the new temporary leader is Evangelos Meimarakis. (To Vima)
  - Several hundred Turkish people protest China's treatment of Uyghurs and burn Chinese
    flags at the Chinese consulate in Istanbul. (Al-Jazeera)
  Science and technology:
  - A Russian space capsule reaches the International Space Station allowing resupply
    of provisions after the crash of the SpaceX space capsule last week. (CNN)
  Sports:
  - 2015 FIFA Women's World Cup
  - The United States defeats defending champion Japan, 5-2, to win the 2015 FIFA
    Women's World Cup in Vancouver, British Columbia, Canada. (BBC) (AP via Washington
    Post)
  - 2015 British Grand Prix
  - In motorsport, Lewis Hamilton wins the race for the second consecutive year with
    team mate Nico Rosberg finishing second. (News24)
