Date: '2015-07-11'
Source_URI: Portal:Current events/2015 July 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - A suicide bomber attacks the Nigerian city of Maiduguri killing at least one person.
    (Reuters)
  - A suicide bomber in a burqa kills 14 people in Chad's capital of N'Djamena. (Reuters)
    (Chron via AP)
  - South Thailand insurgency
  - At least seven people have been killed and dozens injured in a series of attacks
    in southern Thailand. (AFP via The Daily Star)
  - 2015 Bombing of the Cairo Italian Consulate
  - A car bomb explodes outside the Italian consulate in the Egyptian capital Cairo,
    resulting in at least one death and four people injured; ISIS claims responsibility.
    (The Daily Star) (BBC), (CNN)
  - Somali Civil War (2009–present)
  - At least six civilians and four militants are killed in attacks on two hotels
    in the Somali capital of Mogadishu. (Reuters)
  - Yemeni crisis, Saudi-led intervention in Yemen (2015-present)
  - A truce brokered by the United Nations due to last for the remainder of Ramadan
    is broken within an hour with both sides exchanging blame. (AP via US News and
    World Report)
  Business and economy:
  - Greek government-debt crisis
  - The Hellenic Parliament passes a package of economic reforms to end the current
    stage of the debt crisis. (BBC)
  - Steve Huffman is re-appointed as the CEO of Reddit as Ellen Pao steps down over
    a dispute with the website's users over the firing of a popular employee. (Irish
    Times)
  - Satoru Iwata, the CEO and President of Nintendo, dies due to a bile duct growth.
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Eastern China braces for the impact of Typhoon Chan-hom with the province of Zhejiang
    evacuating 865,000 people in coastal areas. (CNN), (Business Insider)
  - Volcán de Colima
  - Hundred of villagers are evacuated from near the Colima volcano following recent
    eruptions. Authorities fear that it could be on the same scale as a 1913 eruption.
    (BBC)
  Law and crime:
  - Serbian Prime Minister Aleksandar Vučić is pelted with stones and other objects
    as he attempts to pay respects to the victims of the Bosnian Genocide, Vučić is
    a former member of the Serbian Radical Party, a far right anti-Islam party. (AP
    via New York Times)
  - Russian military intervention in Ukraine
  - Dozens of Russian soldiers face trial for fleeing a training ground in Maikop,
    fearing deployment to Ukraine. (Deutsche Welle)
  - Mexican drug kingpin Joaquín Guzmán Loera escapes from a maximum security prison
    the Federal Social Readaptation Center No. 1. (AP)
  Politics and elections:
  - Aung San Suu Kyi announces that the National League for Democracy will participate
    in Myanmar's general election later this year. (Wall Street Journal)
  Sport:
  - 2015 Wimbledon Championships
  - Serena Williams defeats Garbiñe Muguruza to win the 2015 Wimbledon Women's Singles
    title. (The Guardian)
  - 2015 Ashes series
  - The First Test of the 2015 Ashes Series between England and Australia ends with
    a 169-run victory for England after four days at the Swalec Stadium in Cardiff.
    (BBC)
