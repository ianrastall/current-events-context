Date: '2015-07-16'
Source_URI: Portal:Current events/2015 July 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2014–15 India–Pakistan border skirmishes
  - India and Pakistan exchanged gunfire and mortar bombs along their disputed frontier,
    killing five civilians and injuring more than a dozen. (Reuters)
  - Yemeni Crisis (2011–present)
  - Members of exiled President of Yemen Abd Rabbuh Mansur Hadi's Cabinet tour the
    southern city of Aden for the first time in several months. (Reuters via Daily
    Mail)
  - Sinai insurgency
  - The Islamic State of Iraq and Greater Syria (ISIS) has claimed that it sank an
    Egyptian patrol boat in the Mediterranean, just off the coast of Rafah. The Egyptian
    military claimed the ship sank from a fire not caused by attacks. (Time) (Ahram
    Online)
  - Boko Haram, Timeline of Boko Haram insurgency
  - Twin blasts at a market in Gombe, Nigeria kill at least 49 people. (BBC)
  - Boko Haram militants kill a dozen villagers in Niger. (Reuters)
  - South Thailand insurgency
  - Two Thai Army soldiers are killed in an ambush in Thailand's Narathiwat Province.
    (Bangkok Post)
  - At least 11 people are killed and many others injured in a tribal fight in a remote
    area of Papua New Guinea. (AFP via ABC Australia)
  Arts and culture:
  - Nominations for the 67th Primetime Emmy Awards are announced with Game of Thrones
    receiving 24 nominations. (Variety)
  Business and economy:
  - The European Union launches an antitrust action against American semiconductor
    company Qualcomm, for possible abuse of a dominant market position, on the one
    hand, and predatory pricing, on the other hand. (European Union)
  Disasters and accidents:
  - Sixty-five thousand people in the Indian state of Assam are affected by floods
    and heavy rainfall. (NDTV)
  - Ash from the Raung volcano closes five airports in Indonesia, while ash from the
    Gamalama volcano closes the Babullah Airport in Ternate. (Channel News Asia)
  - 2015 Pacific typhoon season
  - Typhoon Nangka makes landfall on the Japanese island of Shikoku. (Weather.com)
  - The Nexen pipeline at the Long Lake facility near Fort McMurray, Alberta, spills
    of oil emulsion. (CBC)
  Law and crime:
  - 2015 Chattanooga shootings
  - A shooting occurs at a United States Navy recruiting office and a Navy operational
    support center in Chattanooga, Tennessee, killing four U.S. Marines, a U.S. Navy
    Sailor, and the gunman, and wounding a police officer and a Marine Corps recruiter.
    (Reuters via MSN) (The Tennessean), (NBC News), (WRCB) (CNN)
  - 2012 Aurora, Colorado shooting
  - James Holmes, a former University of Colorado neuroscience student, is found guilty
    of first-degree murder in relation to a mass shooting in Aurora, Colorado, which
    killed 12 and injured 70; he had pled not guilty by reason of legal insanity.
    (Reuters, via MSN)
  Politics and elections:
  - Japan's lower house of parliament passes a pair of bills changing the country's
    security laws, allowing Japanese soldiers to fight overseas for the first time
    since the end of World War II under certain conditions, over strong protests from
    opposition lawmakers, who walked out of the vote.(BBC) (NHK)
