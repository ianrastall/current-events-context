Date: '2015-07-26'
Source_URI: Portal:Current events/2015 July 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency in Cameroon
  - A 13-year-old female suicide bomber attacks in the Cameroonian town of Maroua,
    killing 20 people and injuring another 70. (Voice of America)
  - Cameroonian officials order the closing of mosques and Islamic schools, and bar
    underage children from being at public places, following the recent strings of
    suicide bombings. (AP via Fox News)
  - A suicide bomber detonates a vehicle loaded with explosives at a hotel in the
    Somali capital of Mogadishu, killing 15 people. (CNN)
  - A bomb detonates on a bus carrying Egyptian military conscripts in Arish, injuring
    18. (Daily News Egypt)
  Business and economics:
  - German marketplace organizer Deutsche Börse agrees to purchase trading platform
    360T for €725 million. (Wall Street Journal)
  - Verizon employees in nine states (Connecticut, Delaware, Maryland, Massachusetts,
    New Jersey, New York, Pennsylvania, Rhode Island, Virginia) and Washington, D.C.
    vote to go on strike on August 1 if disputes between the union and the company
    result in no new contracts. (New Haven Register)
  - Nike agrees to pay a combined $2.4 million to consumers of Nike+ FuelBand over
    false advertising. (Times Gazette)
  Arts and culture:
  - Bobbi Kristina Brown, age 22, daughter of American entertainer Whitney Houston
    and heiress to the Houston estate, dies approximately 6 months after having been
    put in a medically induced coma since being found face-down in a bathtub in her
    Roswell, Georgia home near Atlanta on January 31, 2015. (CNN), (MSN)
  Disasters and accidents:
  - A light plane crashes in the Tokyo residential area of Chōfu, killing three people.
    (ABC Online)
  Law and crime:
  - Palestinian youth and Israeli riot police clash at the Al-Aqsa Mosque as the Muslims
    attacked Jews celebrating Tisha B'Av with rocks and firecrackers and barricaded
    themselves inside the mosque. (New York Times)
  - At least 20 people are killed as gunmen open fire at a wedding celebration in
    Afghanistan's Baghlan province. (Al-Jazeera)
  Politics and elections:
  - John Sewel, Baron Sewel steps down from his position as Chairman of Committees
    in the House of Lords following a drug scandal. (BBC)
