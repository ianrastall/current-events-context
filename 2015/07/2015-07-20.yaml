Date: '2015-07-20'
Source_URI: Portal:Current events/2015 July 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - In a friendly fire incident, a NATO air strike hits an Afghan National Army outpost
    in Logar Province, about 30 miles east of Kabul, with at least seven soldiers
    killed and five wounded. (CNN) (The Independent - UK)
  - Spillover of the Syrian Civil War, Suruç bombing
  - A huge explosion in the mostly Kurdish border town of Suruç, Turkey, targeting
    The Socialist Youth Associations Federation, kills at least 31 people and injures
    over 100. Preliminary evidence suggests an ISIS suicide attack. (BBC) (The Daily
    Star)
  Business and economy:
  - Greek government-debt crisis timeline
  - Greek banks reopen for the first time in three weeks with strict capital controls.
    (AP)
  - Lockheed Martin agrees to buy United Technologies Corp's Sikorsky Aircraft for
    $9 billion. (Reuters)
  - Venezuela orders producers to divert supplies to state stores amid a chronic shortage
    of goods. (AP)
  International relations:
  - Joint Comprehensive Plan of Action
  - The United Nations Security Council unanimously approves the Nuclear Pact between
    Iran and a group of six world powers in return for sanctions relief. (Voice of
    America) (Reuters)
  - The United States and Cuba resume full diplomatic relations after five decades.
    (AP)
  Rosetta mission:
  - The Philae lander on comet 67P/Churyumov–Gerasimenko has lost contact with the
    European Space Agency (ESA) ground control. (DW), (CNN)
  Anti-corruption campaign in China:
  - Ling Jihua is expelled from the Communist Party of China after an investigation
    and arrested to faced criminal charges. (New York Times)
  Sports:
  - 2015 Open Championship
  - In golf, the final round of The Open Championship is played at the Old Course
    at St Andrews in Scotland with Zach Johnson winning a four hole playoff with Marc
    Leishman and Louis Oosthuizen. (The Guardian), (The Independent)
  - FIFA announces it will hold an extraordinary session on February 26, 2016, in
    order to elect a new president to replace Sepp Blatter. (BBC)
