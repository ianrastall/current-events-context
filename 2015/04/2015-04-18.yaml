Date: '2015-04-18'
Source_URI: Portal:Current events/2015 April 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - April 2015 Jalalabad suicide bombing
  - A suicide bomber allegedly affiliated with ISIL strikes a bank in the city of
    Jalalabad in Afghanistan, killing at least 33 and wounding 100. (RT) (CNN) (Reuters)
    (BBC)
  - Yemeni Civil War (2015–present)
  - An Iranian Naval convoy is headed towards Yemen to potentially resupply Shia Houthi
    rebels. (The Hill)
  - At least 27 people are dead in fighting in the city of Taez. (AFP via Maktoob
    Yahoo!)
  - Iran proposes a four point peace plan which is rejected by the Hadi government
    of Yemen. (Reuters)
  - Kashmir conflict
  - Indian Army soldiers fire on separatist protesters following unruly behaviour
    resulting in the death of a teenage protester. (AP via Houston Chronicle)
  - Second Libyan Civil War
  - The Prime Minister of Italy Matteo Renzi warns that thousands of Libyans will
    continue to risk their lives travelling to Europe unless the civil war ends. More
    than 2000 people have been rescued in the past week. (BBC)
  Arts and culture:
  - List of Rock and Roll Hall of Fame inductees
  - New inductees are welcomed to the Rock and Roll Hall of Fame including Lou Reed,
    Ringo Starr, Stevie Ray Vaughan & Double Trouble, Joan Jett & the Blackhearts,
    Green Day, Bill Withers, the Paul Butterfield Blues Band and the 5 Royales. (Los
    Angeles Times)
  Disasters and accidents:
  - At least 19 people are killed as a gold mine collapses in Tanzania's Msalala district.
    (AFP via Daily Mail)
  - Hundreds of people are feared dead after a boat carrying people from Libya to
    Italy capsizes in the Mediterranean Sea. Twenty-eight people have been rescued.
    (Times of Malta)
  Health:
  - A mystery disease that kills patients within 24 hours has killed at least 18 people
    within the past week in the Nigerian town of Ode-Irele in Ondo State. (AFP via
    ABC Australia)
  Law and crime:
  - Australian Federal Police foil an Islamic State inspired plot to carry out an
    attack at a World War One centenary event in Melbourne. (BBC)
  Sports:
  - 2015 ISU World Team Trophy in Figure Skating
  - In figure skating, the United States team wins the World Team Trophy held in Japan
    while Elizaveta Tuktamysheva of Russia wins the women's individual free skate
    title. (AP)
