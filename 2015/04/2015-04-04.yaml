Date: '2015-04-04'
Source_URI: Portal:Current events/2015 April 4
Intelligence_Payload:
  Accidents and disasters:
  - 6 people die in a Malaysian helicopter crash. (ABC) (CBC)
  Armed conflicts and attacks:
  - Sinai Insurgency
  - Egypt launches strikes around Sheikh Zuweid in retaliation for the 15 Egyptian
    soldiers that were killed by ISIL-affiliated groups in the past week, killing
    about 100 terrorists according to Egyptian military sources. (PressTV)
  - ISIL affiliated groups have claimed responsibility for killing the 15 soldiers.
    (ABC) (CTV)
  International relations:
  - Russia convenes a UNSC session to discuss Saudi Arabian attacks in Yemen after
    Royal Saudi Air Force bombed a refugee camp, killing dozens. (RT) (Sputnik)
  Law and crime:
  - The United States Army is probing alleged sexual assaults committed by its soldiers
    in Colombia between 2003-2007. (USA Today)
  - An Turkish Sports Team, Fenerbahce SK, Team Bus got attacked by Unknown people,
    With an shotgun. (The Guardian)
  Sports:
  - In the semifinal round of the 2015 NCAA Men's Division I Basketball Tournament,
    the Wisconsin Badgers win an upset victory against the previously undefeated Kentucky
    Wildcats. (SB Nation)
