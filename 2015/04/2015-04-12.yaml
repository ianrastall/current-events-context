Date: '2015-04-12'
Source_URI: Portal:Current events/2015 April 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - Islamic militants attack the South Korean embassy in Tripoli killing two guards
    and leaving another injured. (Yonhap)
  - War in North-West Pakistan
  - U.S. drone strikes in North Waziristan kill at least four suspected Taliban militants.
    (Reuters)
  Disasters and accidents:
  - One student is killed and another 100 injured in a stampede caused by an exploding
    generator at the University of Nairobi in Kenya. (Al Arabiyah)
  Politics and elections:
  - 2016 United States presidential election
  - Hillary Clinton, former United States Secretary of State, announces that she is
    seeking the Democratic Party nomination for President in the 2016 election. (The
    Guardian)
  - Japanese unified local elections, 2015
  - The Liberal Democratic Party wins most of the major local and prefectural contests,
    including all ten governorships at stake. (Wall Street Journal)
  - The Osaka Restoration Association maintains control of the Osaka Prefecture and
    Osaka City assemblies but fails to win a majority as the LDP makes some gains,
    casting doubt upon the outcome of the scheduled May 17 referendum on the Osaka
    Metropolis plan. (Nikkei)
  - Large protests in Brazil call for the impeachment of President of Brazil Dilma
    Rousseff due to a scandal involving members of her Workers Party receiving kickbacks
    from the state run oil company Petrobras. (CNN)
  Sports:
  - '2015 Masters Tournament: In golf, the final round of the Masters Tournament is
    held at the Augusta National Golf Club with American Jordan Spieth winning his
    first championship at the age of 21. Spieth is the second youngest player to win
    the Masters after Tiger Woods, he ties Woods''s record for the lowest winning
    total, and becomes the fifth man to lead from start to finish. (Sydney Morning
    Herald) (CNN)'
