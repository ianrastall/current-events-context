Date: '2015-04-29'
Source_URI: Portal:Current events/2015 April 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - An Iranian Red Crescent plane is blocked by bombing of Sanaa International Airport's
    runway by Saudi Arabian F-15 fighters, which unsuccessfully intercepted and issued
    warnings to the plane to turn back. (The Guardian)
  Businesses and economy:
  - Russian financial crisis (2014–2016)
  - State-owned gas company, Gazprom, loses 86 percent in net income due to ruble
    devaluation, plunge on oil prices, and Ukraine crisis. (Reuters)
  Disasters and accidents:
  - April 2015 Nepal earthquake
  - The death toll for the earthquake reaches 6,100 as the first food aid reaches
    Nepal. This includes 6000+ people in Nepal, 19 people on Mount Everest, 76 in
    India, 25 in China, and 4 in Bangladesh. (AP via Daily Mail)
  - Thousands of people are fleeing Kathmandu due to uncertainty over food supply.
    (Xinhua)
  - At least 15 are dead and dozens missing after flash flooding in the southwestern
    Kenyan town of Narok. (International Business Times)
  - Firefighters in Ukraine try to stop a large forest fire from reaching the site
    of the Chernobyl nuclear power plant. (Euronews)
  Health:
  - The Americas becomes the first World Health Organization region to be officially
    declared free of rubella. (NY Times)
  International relations:
  - Australia–Indonesia relations
  - Australia withdraws its ambassador after eight people including Brazilian Rodrigo
    Gularte, an Indonesian, four Nigerians, and two Australians, Andrew Chan and Myuran
    Sukumaran are executed. (BBC) (ABC News Australia)
  Politics and elections:
  - Succession to the Saudi Arabian throne
  - Crown Prince Muqrin is replaced by his nephew. (Huffington Post)
  - 2016 United States Presidential election
  - Nominally independent Senator Bernie Sanders from Vermont announces that he will
    be seeking the Democratic Party nomination in the US presidential election. (AP
    via Yahoo! News)
  Science and technology:
  - Scientists discover the first known dinosaur with membranous wings, Yi Qi. (NY
    Times)
