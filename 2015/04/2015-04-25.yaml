Date: '2015-04-25'
Source_URI: Portal:Current events/2015 April 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Islamist rebels including the al-Qaeda-affiliated al-Nusra Front claim to have
    captured most of the town of Jisr al-Shughur in the Idlib Governorate. (BBC)
  Arts and culture:
  - Gallipoli Landing 100th anniversary
  - Attendances at services to commemorate Anzac Day break attendance records in Australia
    and New Zealand. (TV NZ), (BBC)
  Business and Economy:
  - Ferdinand Piëch, grandson of the inventor of the Volkswagen Beetle and chairman
    of Volkswagen for more than 20 years, steps down from that post under trade union
    pressure. (Reuters)
  Disasters and accidents:
  - April 2015 Nepal earthquake
  - A strong 7.9 earthquake strikes between the Nepalese capital Kathmandu and the
    regional headquarter city of Pokhara. The Government of Nepal declares a state
    of emergency with 1500 dead. A number of UNESCO World Heritage Sites are destroyed,
    including the historic Dharahara tower. Deaths are also recorded in India, Bangladesh
    and the Chinese province of Tibet. (AP), (Reuters via ABC News Australia), (BBC),
    (CNN)
  - The Italian Navy rescues 274 migrants from a ship off the Libyan coast while 300
    migrants rescued on Friday arrive on Friday. (AP via US News)
  International relations:
  - The New York Times reports that Russian hackers read President of the United States
    unclassified emails indicating that the breach of the White House's computer system
    was more extensive than previously revealed. (New York Times)
  Law and crime:
  - Death of Freddie Gray
  - Twelve people are arrested in the American city of Baltimore as protests against
    the death of Freddie Gray in police custody turn violent. (Baltimore Sun)
  Politics and elections:
  - Togolese presidential election, 2015
  - Voters in Togo go to the polls amid political unrest. (AP via Yahoo! News)
