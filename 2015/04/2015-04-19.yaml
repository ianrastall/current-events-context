Date: '2015-04-19'
Source_URI: Portal:Current events/2015 April 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Internal conflict in Burma
  - Myanmar says it has lost 126 soldiers in clashes with the Myanmar National Democratic
    Alliance Army in Kokang since early February. (Xinhua)
  Disasters and accidents:
  - The Maltese Navy and Italian Coast Guard mount a rescue operation for a boat that
    capsized between Libya and Italy with up to 700 people aboard. (Malta Today)
  Politics and elections:
  - Elections in Northern Cyprus
  - Voters in Northern Cyprus go to the polls to elect a new President to represent
    them in peace talks with the southern Republic of Cyprus. (Reuters via Daily Mail)
  - Finnish parliamentary election, 2015
  - Voters in Finland go to the polls for a parliamentary election with a new coalition
    government led by Juha Sipilä of the Centre Party favoured to form government
    after negotiation. (Reuters) (New York Times)
