Date: '2015-04-10'
Source_URI: Portal:Current events/2015 April 10
Intelligence_Payload:
  Accidents and Disasters:
  - A head-on collision between a semi-trailer truck and a bus carrying a delegation
    of young athletes in southern Morocco on Friday killed 33 people and injured seven.
    (ABC News)
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - The Pakistani parliament votes not to join the Saudi led coalition in Yemen. (Al
    Jazeera)
  - The United Nations warns that the situation in Yemen continues to deteriorate
    as humanitarian aid starts to arrive. (Voice of America)
  - Iraqi insurgency
  - A car bomb blast in Baghdad kills at least three people and injures 12. (AFP via
    France 24)
  - Balochistan conflict
  - Gunmen kill 20 laborers at a dam construction in Pakistan's Balochistan province.
    (AFP via ABC News Australia) (BBC)
  Business and economy:
  - The U.S. Environmental Protection Agency reaches an agreement with two petroleum
    industry groups about biofuel blending targets. (Reuters)
  Law and crime:
  - Malaysia toughens its sedition laws to cover all online media and provide for
    mandatory jail sentences. (Reuters)
  - In a response to a cyberattack on TV5Monde, the French Minister of Culture and
    Communications Fleur Pellerin has called for an emergency meeting of the heads
    of various major media outlets and groups based in France, to take place sometime
    today at an undisclosed location. (The Guardian)
  - Ronald Anderson is arrested in connection with a kidnapping his girlfriend, the
    fatal shooting of a guard at US Census Bureau headquarters and police chase into
    H Street night life district on April 9. (abcnews) (Fox News)
  - '"Serial bride" pled not guilty to felony fraud for marrying 10 husbands, up to
    8 at once in New York City. She married men from "red flagged" nations such as
    Egypt, Turkey, Georgia, Pakistan, Mali, and Bangladesh who sought resident status.
    (WTKR)'
  Politics and elections:
  - Multiple sources have reported that former United States Secretary of State Hillary
    Clinton will announce her candidacy for the office of President in the 2016 election
    on Sunday, April 12. (The Guardian)
