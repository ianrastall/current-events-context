Date: '2015-04-08'
Source_URI: Portal:Current events/2015 April 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - A gunfight erupts between Afghan soldiers and U.S. soldiers working for NATO's
    Resolute Support Mission leaving 1 Afghan and 1 U.S. soldier dead, and 3 Afghan
    and 2 U.S. soldiers wounded. (Reuters)
  - Sinai insurgency
  - Eleven civilians and two Egyptian Army soldiers have been killed in three attacks
    in the northern Sinai Peninsula. (AP)
  Business and economy:
  - Royal Dutch Shell purchases rival BG Group for around $70 billion. (Wall Street
    Journal)
  - A French air traffic controllers strike causes the cancellation of hundreds of
    flights throughout Europe. (AFP via ABC News Australia)
  Disasters and accidents:
  - At the Dragon Aromatics chemical plant in Fujian in southeast China, a fourth
    tank of about 1,500 tonnes of liquid hydrocarbon catches fire and explodes. More
    than 14,000 residents have been evacuated. (BBC)
  - A shipwreck off the Haiti coast claims the life of 21 people. (AFP via Global
    Post)
  Law and crime:
  - Boston Marathon bombings
  - Boston Marathon bomber Dzhokhar Tsarnaev receives a guilty verdict on all legal
    charges against him. (CNN) (NBC News)
