Date: '2015-04-30'
Source_URI: Portal:Current events/2015 April 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - '2015 West African offensive: The Nigerian Army rescues a further 160 women and
    children from a Boko Haram camp in the Sambisa Forest. (CNN)'
  - 'Yemeni Civil War (2015–present): Dozens of Houthi fighters are killed in clashes
    with Saudi Arabian forces on the border while air strikes hit the southern city
    of Aden. (Reuters)'
  - 'Mexican Drug War: Two state police officers and six other people are dead following
    a gunfight in the southern state of Guerrero between police and suspected kidnappers.
    (AP via ABC News America)'
  Businesses and economy:
  - 'Russian financial crisis (2014–2016): The Central Bank of Russia lowers its interest
    rate the third time to 12.5%, a drop from 14%. (Reuters UK)'
  - The sovereign bonds of Germany experience second straight day of historic sell-off,
    dragging other securities in much of the continent with them. (Bloomberg)
  Disasters and accidents:
  - 'April 2015 Nepal earthquake: A teenager is pulled alive out of the wreckage of
    a guesthouse on the outskirts of Kathmandu after five days. (Times of India)'
  International relations:
  - Seizure of Maersk Tigris
  - Iran claims that the seizure of the Maersk Tigris in the Strait of Hormuz was
    related to an unpaid debt. (NBC News)
  - The United States Navy says it will accompany American-flagged ships through the
    Strait of Hormuz. (AP via ABC News)
  Law and crime:
  - The Chinese city of Helong reports three recent deaths along the border with North
    Korea with North Korean border guards accused of recent murders and thefts. (AP)
  - An anti-terrorism court in Pakistan's Swat District sentences ten people to life
    imprisonment after finding them guilty of an attack on Nobel Peace Prize winner
    Malala Yousafzai and two other school girls. (Pakistan Tribune)
  - 'Death of Freddie Gray: The Baltimore Police Department completes its investigation
    into the death of Freddie Gray and hands it over to prosecutors. (New York Times)'
  - A woman, identified Friday morning as Alexia Christian, 25, who had earlier stolen
    a car, fires a handgun at two Atlanta Police Department officers, barely missing
    them. She is subsequently shot and killed. (Atlanta Journal-Constitution)
  Science:
  - NASA's MESSENGER spacecraft crashes into Mercury after surpassing its one year
    primary mission by three years. (NBC News)
  Sport:
  - '2015 NFL draft: In American football, the 80th annual National Football League
    draft is held in Chicago''s Auditorium Theater. Jameis Winston of Florida State
    University is drafted first by the Tampa Bay Buccaneers despite his problematic
    past. (New York Daily News)'
