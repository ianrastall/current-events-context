Date: '2015-04-01'
Source_URI: Portal:Current events/2015 April 1
Intelligence_Payload:
  Disasters and accidents:
  - Two United States Marine Corps F-18 fighters make a precautionary landing at Taiwan's
    Tainan Air Force Base. (Focus Taiwan) (The Washington Times)
  - Flames engulf a Mexican state-run Pemex oil platform in the Gulf of Mexico, killing
    four workers. (AP)
  - The Russian trawler Dalniy Vostok with 132 crew sinks off of the Kamchatka Peninsula
    leaving at least 54 dead and 15 missing. (AP) (BBC)
  Health:
  - California governor Jerry Brown announces mandatory water restrictions in response
    to the worst drought in California history. (The New York Times)
  Law and crime:
  - Turkish police shoot two attackers outside Istanbul’s central police headquarters,
    killing one of them. The exchange of fire wounds two officers. (The Guardian)
  - An apparent murder and suicide leaves four dead in Tulsa, Oklahoma. (AP)
  - A federal grand jury indicts New Jersey Senator Bob Menendez on corruption charges.
    (AP)
  - A court convicts eleven Atlanta, Georgia teachers as part of a mass cheating scandal.
    (BBC)
  - The Obama Administration targets overseas cyber attackers with a sanctions program.
    (Reuters)
  Politics and elections:
  - Thailand's military junta repeals martial law in favor of an imposed constitutional
    provision that allows the leader of the government to make extra-constitutional
    orders. (AP)
