Date: '2015-04-14'
Source_URI: Portal:Current events/2015 April 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - At least seven people are dead after a car bomb blast south of Baghdad. (AP via
    Irish Times)
  - War in Somalia
  - al-Shabab gunmen enter the Higher Education Ministry building in Mogadishu after
    a large explosion is reported. (Voice of America)
  Business and economy:
  - The Wall Street Journal reports that European Union regulators have announced
    plans to file charges against American Internet company Google following a European
    Union investigation. (CNBC)
  Disasters and accidents:
  - An Asiana Airlines Airbus A320 en route from South Korea to Japan skids off the
    runway at Hiroshima Airport injuring 20 of the 74 passengers. (AP via News24)
  - 2015 Libya migrant shipwreck
  - Up to 400 people may have died as a boat capsizes in the Mediterranean Sea between
    Libya and Italy with up to 550 passengers on board. (AFP/Reuters via ABC News
    Australia)
  Health:
  - More than 100 passengers out of 1,100 on the cruise ship Crown Princess may be
    suffering from symptoms of Norovirus. (Reuters)
  International relations:
  - President of the United States Barack Obama endorses a proposal to remove Cuba
    from a list of countries that sponsor terrorism. (New York Times)
  - Yemeni Civil War (2015–present)
  - The United Nations Security Council votes to impose sanctions on Yemen's Houthi
    rebels. (Los Angeles Times)
  Law and crime:
  - A court in Japan's Fukui Prefecture issues a landmark injunction against restarting
    reactors 3 and 4 of the Takahama Nuclear Power Plant. (AFP via Yahoo! News Australia)
  Science and technology:
  - SpaceX's latest attempt at recycling its Falcon 9 rocket by landing it on an ocean
    platform fails. (AFP via Yahoo! News)
  - Stone tools found at Lomekwi 3 are dated to 3.3 million years ago, which, if confirmed,
    would represent the oldest known stone tools. (Science)
