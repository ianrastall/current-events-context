Date: '2015-04-06'
Source_URI: Portal:Current events/2015 April 6
Intelligence_Payload:
  Business and economy:
  - Twitter and YouTube are both inaccessible for hours in Turkey; part of a crack-down
    on social media by the government there. (Reuters)
  Disasters and accidents:
  - In Fujian, Southeast China an explosion and fire at a paraxylene producing petrochemical
    plant by Dragon Aromatics occupied 430 firemen. (Reuters)
  - Tropical storms kill at least 36 people and injure scores in Bangladesh over the
    past couple of days, with Bogra District hardest hit (20 deaths). (AP via Fox
    News)
  Law and crime:
  - An Indonesian court rejects Andrew Chan's and Myuran Sukumaran's appeal against
    the President of Indonesia Joko Widodo's refusal to grant them clemency against
    the death penalty as organisers of the Bali Nine plot to smuggle heroin to Australia
    in 2005. (ABC News Australia)
  - Gul Ahmad Saeed is suspected in the killing of his fiancee and nine of her relatives
    in Pakistan, apparently because of opposition to his marriage. He also is a suspect
    in the murders, earlier this year, of his mother, father, brother, and sister-in-law.
    (NBC)
  - University of Virginia fraternity Phi Kappa Psi announces that it will "pursue
    all available options" against Rolling Stone magazine a day after the magazine
    withdraws "A Rape on Campus", a story alleging a student was gang-raped at a party
    in 2012. (CNN Money)
  Sports:
  - Basketball
  - In basketball, Dick Bavetta, John Calipari, Spencer Haywood, Lisa Leslie, Dikembe
    Mutombo and Jo Jo White are announced as 2015 inductees to the Naismith Memorial
    Basketball Hall of Fame. They will be formally inducted alongside five figures
    announced in February, Louie Dampier, Lindsay Gaze, Tom Heinsohn (already inducted
    as a player but now entering as a coach), John Isaacs, and George Raveling, on
    September 11. (ESPN)
  - In basketball, Duke defeats Wisconsin 68–63 to win the NCAA Men's Basketball Championship.
    (USA Today)
