Date: '2015-04-09'
Source_URI: Portal:Current events/2015 April 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Gunmen mount an attack on the office of the attorney-general of Afghanistan's
    Balkh Province in the city of Mazar-e-Sharif. (BBC)
  - Islamic State of Iraq and the Levant
  - Sohaib al Rawi, Governor of Al Anbar Governorate in Iraq, claims that ISIL has
    killed 52 people, mostly police officers on the border with Syria in the past
    week. (CNN)
  Arts and culture:
  - The regional branch of the Communist Party of China in Tibet demands that Buddhist
    monasteries display the Chinese flag in an effort to shore up Chinese rule. (AP)
  Disasters and accidents:
  - At least 24 people are killed and 22 injured in a bus accident in southwestern
    Bangladesh. (AP via TVNZ)
  - A ship spills toxic bunker fuel into English Bay, Vancouver. The fuel has washed
    up on Vancouver's beaches, prompting a warning from city officials. (CBC)
  - Tornadoes of 2015
  - A violent storm system spawns at least one tornado killing two people and injuring
    seven others in the American state of Illinois and causing widespread damage especially
    in the small towns of Rochelle and Fairdale. (Chicago Tribune)
  Law and crime:
  - A gunman attacks the Palace of Justice in Milan, killing three people, including
    a judge. A fourth person found dead at the scene apparently died from a heart
    attack. (AP) (The Telegraph)
  - Former Chinese Communist Party official Liao Shaohua is sentenced to 16 years
    in prison after being convicted of bribery and abuse of power. (Global Times)
  - A fire on April 1 that disrupted power and internet access throughout London is
    now suspected to have been part of a robbery at the Hatton Garden Safe Deposit
    Company. (The Register)
