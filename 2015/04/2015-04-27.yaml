Date: '2015-04-27'
Source_URI: Portal:Current events/2015 April 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - Hundreds of people have been found dead in the northern Nigerian town of Damasak,
    most likely killed by Boko Haram. (AFP via Yahoo! News)
  Business and economy:
  - Fitch Ratings downgrades Japan's credit rating to A over mounting debts. (Reuters
    via CNBC)
  Disasters and accidents:
  - April 2015 Nepal earthquake
  - The death toll from the earthquakes in Nepal rises to more than 3,700 with reports
    that tens of thousands of people are homeless. There are fears that the death
    toll could rise to over 5,000. (AP) (Reuters via Daily Mail)
  International relations:
  - Philippines President Benigno Aquino III asks Indonesian President Joko Widodo
    to spare the life of Mary Jane Veloso, a migrant domestic worker sentenced to
    death for drug trafficking. (Australian Broadcasting Corporation)
  Law and crime:
  - Opposition activists protest for a second day over President of Burundi Pierre
    Nkurunziza's decision to run for a third term in office. At least two people were
    killed yesterday in protests. (BBC)
  - Death of Freddie Gray, 2015 Baltimore riots
  - Violent rioting and protests including looting occur near the Mondawmin Mall in
    Baltimore after the funeral of Freddie Gray with fifteen Baltimorean police officers
    being injured. (Reuters) (USA Today)
  - Larry Hogan, the Governor of Maryland, puts the National Guard on alert in response
    to the riots. The Mayor of Baltimore Stephanie Rawlings-Blake declares a daily
    curfew beginning at 10 p.m. Tuesday. (AP via ABC News) (ABC News Baltimore)
  Politics and elections:
  - Kazakhstani presidential election, 2015
  - The Organization for Security and Co-operation in Europe reports that the voters
    in the presidential elections in Kazakhstan had a limited choice due to the lack
    of opposition and restrictions on free political expression. Kazakhstan's freshly
    re-elected president has been ruling the country since the time of the Soviet
    Union. (Reuters via Daily Mail)
  - Sudanese general election, 2015
  - Sudan's Electoral Commission declares that incumbent President of Sudan Omar al-Bashir
    won re-election with 94.4 per cent of the vote extending his 25 year rule. He
    has been indicted multiple times by the International Criminal Court for being
    personally responsible for war crimes committed in Darfur and elsewhere in Sudan.
    (AP)
