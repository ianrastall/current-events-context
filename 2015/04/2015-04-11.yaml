Date: '2015-04-11'
Source_URI: Portal:Current events/2015 April 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Heavy Saudi Arabian air strikes hit southern Yemen resulting in at least 20 deaths
    of Houthis soldiers and two members of rival militias. Saudi Arabia claims to
    have killed 500 rebels since the start of military operations in March. (Reuters)
    (CNN)
  - India evacuates 5600 people including 960 foreign nationals from Yemen under Operation
    Raahat. Several flights were allowed to take off and land in Yemen despite the
    no-fly zone declared on the country. (The New York Times)
  - Turkey–PKK conflict
  - Turkey sends additional troops and aircraft into Ağrı Province which borders Iran,
    after four soldiers are injured in clashes with PKK insurgents. (Reuters)
  Business and economy:
  - Banca Monte dei Paschi di Siena, the beneficiary of a controversial bail-out from
    the Bank of Italy in 2013 admits that its exposure to Nomura Holdings is greater
    than the regulatory limit. (Bloomberg)
  International relations:
  - The President of the United States Barack Obama and the President of Cuba Raul
    Castro meet at the sidelines of the Summit of the Americas in Panama. This marks
    the first meeting of the leaders of the two countries since the Cuban Revolution.
    (ABC News America)
  - A man carrying a protest sign, backpack and rolling luggage fatally shot himself
    in the head in front of the US Capitol Building. Capitol Police announced there
    was no apparent connection to terrorism. It follows unconnected shootings at the
    US Census HQ and the NSA. (CNN)
  Law and crime:
  - An Egyptian court sentences the leader of the Muslim Brotherhood Mohamed Badie
    and fourteen other people to death for inciting violence. (CNN)
  - Bangladeshi Jamaat-e-Islami leader Muhammad Kamaruzzaman is executed for war crimes
    committed during the 1971 Liberation War. (The Hindu)
  Politics and elections:
  - Voters in Nigeria go to the polls for gubernatorial and state Assembly elections.
    At least nine people are killed in election day violence, most of them in Rivers
    State. (BBC) (Deutsche Welle)
  Sports:
  - 2015 Grand National
  - The 168th annual running of the Grand National steeplechase race occurs at Aintree
    Racecourse near the English city of Liverpool. Many Clouds ridden by Leighton
    Aspell is the winner. (Sky News)
  - The Boat Races 2015
  - Rowing teams from University of Oxford and University of Cambridge meet on the
    River Thames with Oxford successful in both the men's and women's races. (BBC
    Sport) (BBC Sport²)
