Date: '2015-04-02'
Source_URI: Portal:Current events/2015 April 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gunmen attack Garissa University College in Kenya, killing at least 140 people
    and wounding 65 others. (BBC) (AP via News24)
  - Yemeni Crisis (2011–present)
  - Al-Qaeda fighters attack a prison in Al Mukalla, freeing at least 270 prisoners.
    (CNN)
  Disasters and accidents:
  - Five people are killed after a Eurocopter EC155 crashes in Carapicuiba, Brazil.
    (Aviation Safety Network)
  Germanwings Flight 9525:
  - The flight data recorder is recovered from the crash site. (CNN)
  - German prosecutors state that the co-pilot researched suicide methods and the
    security of cockpit doors. (BBC)
  International relations:
  - The Ministry of Foreign Affairs of the People's Republic of China files a protest
    after two American jet fighters landed on April 1 at an air base in Taiwan. (AFP
    via Yahoo7) (Reuters via Yahoo!)
  - Iran, the United States, the United Kingdom, France, Russia, People's Republic
    of China, Germany, and the European Union (the P5+1) reach a breakthrough agreement
    on the general framework for an agreement on Iran's nuclear program, but sign
    no verbal agreement or official document. The deadline for a full deal is June
    30, 2015. (The New York Times) (CNN)
  Law and crime:
  - Denial of the Armenian Genocide is criminalized in the Republic of Cyprus. (Reuters
    UK)
  Politics and elections:
  - Indiana Senate Bill 101
  - A Christian-owned Indiana pizza shop closes its doors after receiving death and
    arson threats in response to the restaurant's saying it would not cater a same-sex
    wedding; the owners are afraid they may close permanently or leave town. (The
    Washington Times)
  - A GoFundMe page gets over US$50,000 from supporters. (The Washington Post)
