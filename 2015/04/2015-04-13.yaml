Date: '2015-04-13'
Source_URI: Portal:Current events/2015 April 13
Intelligence_Payload:
  Accidents and disasters:
  - Nine people die as a boat carrying people to Italy capsizes off the coast of Libya.
    The Italian coast guard rescues 144 people. (ANSA)
  - A cargo plane carrying two pilots goes missing after departing from Vancouver
    International Airport en route to Prince George Airport in British Columbia, Canada.
    Search and rescue efforts are initiated after wreckage was reported in the province's
    North Shore Mountains. (Global)
  - Wildfires in Southern Siberia, Russia kill at least 26 people and damage 1,300
    homes. (AFP via GMA Network)
  Armed conflicts and attacks:
  - Russian president Vladimir Putin lifts the ban on delivery of S-300 missile air
    defense systems to Iran in connection to the nuclear dialogue. Israel and the
    United States oppose the deal on the grounds that Iran is a state sponsor of terrorism.
    (RT)
  - Second Libyan Civil War
  - In Tripoli, the Moroccan Embassy is damaged by a bomb explosion just hours after
    gunmen assault the South Korean mission. ISIL loyalists take credit for both attacks.
    (New York Daily News)
  Health:
  - An American man working at Managua's U.S. embassy provokes a security scare in
    Nicaragua; the country's health ministry quarantines the Ebola suspect and asks
    that he be removed from the country immediately. (BBC)
  Law and crime:
  - A former work-study student is sought in a shooting of his print shop supervisor
    at Wayne Community College in Goldsboro, North Carolina and is still on the run.
    (WRAL)
  - Murder of Travis Alexander
  - An Arizona judge sentences convicted murderer Jodi Arias to life without parole
    for the 2008 murder of her ex-boyfriend. (Reuters)
  - Two Massachusetts high schools close due to bomb threats; it is the third bomb
    threat Brockton High School has received this school year. (Boston Globe)
  - Blackwater Baghdad shootings
  - The first of four Blackwater security guards to be sentenced is given a life sentence
    in the United States for his role in killing 14 Iraqi civilians in Baghdad in
    2007. (Washington Post)
  - A volunteer police officer is charged with manslaughter in the shooting death
    of Eric Harris, an unarmed man who was shot while lying on his back in Tulsa,
    Oklahoma. (CNN)
  Politics and elections:
  - 2016 United States presidential election
  - Florida Senator Marco Rubio announces his candidacy for the Republican nomination
    in the 2016 presidential election. (CNN)
  - Foundation of the Free Republic of Liberland. (Bitcoin Magazine)
