Date: '2015-04-21'
Source_URI: Portal:Current events/2015 April 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War (2009–present)
  - A deadly explosion in a Mogadishu restaurant kills at least four people and injures
    ten others. (Al Jazeera)
  - Yemeni Civil War
  - Saudi Arabia announces that it is ending its bombing campaign in Yemen. (BBC)
  - Forty armed men in camouflaged uniforms and speaking Albanian take several police
    officers hostage in northern Macedonia, the armed men are apparently calling for
    the creation of "an Albanian state". The incident was reminiscent of an insurgency
    in Macedonia in 2001 when Skopje's security forces battled rebels demanding greater
    rights for the former Yugoslav republic's large ethnic Albanian minority. (Reuters)
  Arts and culture:
  - Pope Francis accepts the resignation of Robert Finn as bishop of the Roman Catholic
    Diocese of Kansas City–Saint Joseph for failing to report a suspected child abuser.
    (AP via Yahoo! News)
  Business and economy:
  - Israeli generics giant Teva Pharmaceutical offers $4 billion to acquire US rival
    Mylan. (Economic Times)
  Disasters and accidents:
  - Australian east coast low
  - Three people have died in floods in the Australian town of Dungog, New South Wales
    as heavy rains and cyclonic winds hits the state of New South Wales causing widespread
    flooding, loss of power to over 100,000 homes and disruption of transport services.
    (ABC News Australia)
  Law and crime:
  - Former AC/DC drummer Phil Rudd pleads guilty to threatening to kill and drug possession
    charges in Tauranga, New Zealand. (AP via USA Today)
  - April 2015 Mediterranean Sea migrant shipwrecks
  - Italian police arrest the captain and crew member of a vessel that sank in the
    Mediterranean Sea on Sunday drowning as many as 900 people. (AP)
  - An American man Tommy Schaefer is sentenced to 18 years imprisonment in Bali for
    the murder of his mother-in-law Sheila von Wiese Mack last year. (Sky News Australia)
  - An Egyptian court sentences former President Mohammed Morsi to twenty years imprisonment
    for involvement in the killing of protesters when he was in power. (BBC)
  - The U.S. Justice Department has charged Navinder Singh Sarao with commodities
    fraud and related offenses, alleging that he played a part in the flash crash
    of May 2010. (Reuters)
  - Death of Freddie Gray
  - The United States Department of Justice announces a federal investigation into
    the death of Freddie Gray in police custody in the city of Baltimore, Maryland.
    (AP via The Republic)
  - Michele Leonhart announces her retirement as the Administrator of the United States
    Drug Enforcement Administration with concerns raised about her leadership following
    a prostitution scandal involving Agency officers having sex with prostitutes provided
    by drug cartels. (CNN)
