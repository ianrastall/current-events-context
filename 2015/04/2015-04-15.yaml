Date: '2015-04-15'
Source_URI: Portal:Current events/2015 April 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - Fierce clashes in Iraq's Anbar province as Islamic State captures three villages
    near the provincial capital Ramadi. (The Eagle)
  Business and economy:
  - Nokia announces plans to buy telecommunications equipment maker Alcatel-Lucent
    for €15.6 billion (US$16.6 billion). (The Verge)
  - The European Union formally charges Google with antitrust breaches. (Sky News)
  International relations:
  - Benjamin Netanyahu demands that any final agreement on the Iranian nuclear program
    include a "clear and unambiguous Iranian recognition of Israel's right to exist."
    (CNN) (Haaretz)
  - The European Parliament approves a resolution to mark the 100th anniversary of
    the Armenian genocide. (AP via Boston Herald)
  - Jamal Benomar resigns as the United Nations peace envoy to Yemen after losing
    support from the Gulf nations. (AFP via Straits Times)
  Law and crime:
  - British police arrest six people on suspicion of terrorism after Turkish authorities
    stop a group crossing the Syrian border. (Al Arabiyah)
  - Former American football player Aaron Hernandez is convicted of murder in the
    first degree in the town of Fall River, Massachusetts. Hernandez shot a former
    friend Odin Lloyd in 2013. He was automatically sentenced to life in prison without
    parole. (CNN)
  - In Arizona, dashcam video showed a police officer intentionally running over an
    armed suspect. The suspect had stolen a rifle from a nearby Walmart, and had discharged
    the weapon in a neighborhood. (CNN)
  - A mailman from Florida was arrested after he made an unauthorized landing of a
    small gyrocopter with postal service markings on the Capitol West Front Lawn.
    He had told a newspaper that a terrorist would not have informed the public that
    he planned a non-violent protest flight for campaign finance reform. (Washington
    Post)
  - Two former Colombian ministers Sabas Pretelt and Diego Palacio are sentenced to
    six years in prison for corruption in bribing lawmakers to support the 2006 re-election
    bid of former President Alvaro Uribe. (AP via WTOP)
