Date: '2015-04-22'
Source_URI: Portal:Current events/2015 April 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - A tribal fight in Papua New Guinea's Hela Province between the Wapiago and Tapamu
    clans claims the lives of ten people, mostly children. (ABC News Australia)
  - War in Afghanistan (2001–2021)
  - The Taliban announces the start of its annual spring offensive warning it would
    attack foreign embassies as well as military targets. (Reuters via Daily Mail)
  - Syrian Civil War
  - The Syrian Observatory for Human Rights estimates that Syrian government air strikes
    on areas controlled by Islamic State in Iraq and the Levant kills 32 people. The
    air strikes hit a hospital in Dayr Hafir killing at least 21 people. (AP via ABC
    News America)
  Business and economy:
  - The European Union opens an antitrust case against Russian gas giant Gazprom which
    supplies most of Central and eastern Europe with supplies of natural gas. (AP
    via Daily Mail)
  - Google announces a new wireless network in the United States called Project Fi
    with a pay as you go data rate. (Venture Beat)
  Disasters and accidents:
  - Australian east coast low
  - The storm in Australia's New South Wales is declared a "catastrophe" with four
    deaths, heavy flooding and disruption of transport to the state's largest cities
    Sydney and Newcastle. (The Australian) (WA Today)
  - Twelve areas of NSW are declared as disaster zones including Dungog, Maitland,
    Cessnock Gosford, Great Lakes Council, Lake Macquarie, Newcastle, Pittwater Council,
    Port Stephens, Singleton, Warringah and Wyong. (WA Today)
  - Sinking of the MV Sewol
  - South Korea approves plans to recover the which sank last year with the loss of
    300 people. (AP)
  - The Calbuco volcano erupts in southern Chile forcing the evacuation of 4000 residents.
    (Reuters via Yahoo! Canada) (Wall Street Journal)
  Law and crime:
  - The United States Senate unanimously passes a bill to combat human trafficking
    after a long delay caused by a dispute over abortion funding. (New York Times)
  - An 11-judge panel of the U.S. Ninth Circuit Court of Appeals overturns the 2011
    conviction of all-time Major League Baseball home run leader Barry Bonds on obstruction
    of justice charges stemming from the BALCO doping scandal. (AP via ESPN)
  Politics and elections:
  - Anguillan general election, 2015
  - Voters in Anguilla go to the polls for a general election with the Anguilla United
    Front led by Victor Banks elected to government. (Jamaica Observer)
