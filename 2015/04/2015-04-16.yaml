Date: '2015-04-16'
Source_URI: Portal:Current events/2015 April 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Al-Qaeda in the Arabian Peninsula captures Riyan Airport, seaport and oil terminal
    in the city of Al Mukalla in southern Yemen. (AP via Washington Times)
  - In the past two weeks, Oman has received 2,695 people of forty-eight nationalities
    escaping from Yemen. (Zawya)
  Arts and culture:
  - WikiLeaks publishes 30,287 documents and 173,132 emails resulting from the Sony
    Pictures Entertainment hack believed to be undertaken by North Korea. (Variety)
  Disasters and accidents:
  - More than 40 people have drowned as a migrant boat sinks travelling between Libya
    and Italy. In a separate incident, 15 Muslim migrants from another Italy-bound
    boat have been arrested, after allegedly throwing 12 Christian migrants overboard.
    (BBC)
  International relations:
  - The United States Congress negotiates a deal to fast track the Trans-Pacific Partnership
    between the US and Australia, Brunei, Canada, Chile, Japan, Malaysia, Mexico,
    New Zealand, Peru, Singapore and Vietnam. (Al Jazeera)
  Law and crime:
  - Five people are found dead after a business dispute in Phoenix, Arizona. (AP)
  - Five are shot in Toronto, Ontario, in a neighbourhood with children around playing,
    two critically and one in life-threatening condition, having been shot by the
    police. Four suspects detained. (CP24)
  - One year after the Sinking of the MV Sewol, police blockade a memorial in response
    to public anger at inactivity by the government to rescue or salvage the bodies
    of victims from the ship's wreck. (Amnesty.org)
  Sports:
  - The National Football League reinstates Adrian Peterson of the Minnesota Vikings
    after a lengthy suspension. (Fox News)
