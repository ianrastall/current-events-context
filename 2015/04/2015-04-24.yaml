Date: '2015-04-24'
Source_URI: Portal:Current events/2015 April 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Italian police mount an operation against an al-Qaeda inspired cell in Sardinia
    claimed to be in operation since 2005. (NBC News)
  - Three members of a United Nations peacekeeping mission to the Democratic Republic
    of the Congo have been abducted. (AFP)
  - Yemeni Civil War (2015–present)
  - UNICEF reports that hundreds of children have been killed and injured in the Civil
    War while combatants have recruited hundreds more. (Reuters)
  - Islamic State of Iraq and the Levant
  - Iraqi Army Brigadier-General Hassan Abbas Toufan and three other officers are
    killed in a targeted car bombing in Anbar province. (AP via New York Times)
  - Boko Haram insurgency
  - Boko Haram recapture the border town of Marte from the Nigerian Army. (AFP via
    France 24)
  - Balochistan conflict
  - Pakistani human rights campaigner Sabeen Mahmud is killed by gunmen after attending
    a seminar on Balochistan’s "disappeared people" in Karachi. (Al Jazeera)
  Arts and culture:
  - Armenia commemorates the 100th anniversary of the Armenian Genocide by the Ottoman
    Empire. (BBC)
  - Former American Olympic Games champion Caitlyn Jenner announces that she is a
    trans woman. (CNN)
  Business and economy:
  - In the United States, the NASDAQ and S&P 500 end at record highs spurred by strong
    results by tech giants Google, Amazon and Microsoft. (Reuters)
  Disasters and accidents:
  - A 6.4 magnitude earthquake occurs near the town of Kaikoura on the South Island
    of New Zealand. (New Zealand Herald)
  - Chilean authorities urge further evacuations near the Calbuco volcano after mudflows
    of volcanic debris are located in a nearby river after this week's eruption. (AP)
  Law and crime:
  - The Statue of Liberty in New York is evacuated after a bomb threat. (AP via News24)
    (CNN)
  Science and technology:
  - A study by the University of Utah show that the magma reserves of the Yellowstone
    supervolcano are much greater than previously thought. (CNN)
