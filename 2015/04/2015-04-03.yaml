Date: '2015-04-03'
Source_URI: Portal:Current events/2015 April 3
Intelligence_Payload:
  Accidents and disasters:
  - Five people die in a helicopter crash in a São Paulo residential area, including
    the son of Governor Geraldo Alckmin. (Xinhua)
  Germanwings Flight 9525:
  - Data from the flight data recorder reveals that the plane was deliberately accelerated
    before crashing into the French Alps. (Reuters) (BBC) (Guardian)
  Armed conflicts and attacks:
  - Sinai insurgency
  - About 15 Egyptian soldiers and 2 civilians are killed by a combination of guns
    and car bombs. (BBC) (The New York Times)
  - Yemeni Crisis (2011–present)
  - Saudi Arabia donates a plethora of weapons and medical supplies to the conflict
    by dropping them over Tawahi. (Reuters) (The Globe and Mail)
  International relations:
  - Israeli Prime Minister Benjamin Netanyahu disagrees with the Iranian nuclear program
    agreement that the P5+1 Nations offered to Iran, saying it threatens Israel. (Reuters)
    (YNet news) (Fox)
  Law and crime:
  - Plaintiffs withdraw a lawsuit against Google that had asserted that it was illegally
    tying its licensing of the Android operating system to the favorable treatment
    of Google apps. (Reuters)
  Miscellaneous news:
  - An American sailor who was lost for 66 days in the Atlantic Ocean is found by
    a German tanker. He survived on a diet of solely raw fish and rainwater. (BBC)
    (CTV news) (Yahoo! news)
  Health and Medicine:
  - Burkina Faso culls 115,000 chickens over a bird flu scare. (Reuters) (Xinhua)
  Politics and elections:
  - Former Prime Minister of the Netherlands Piet de Jong celebrates his 100th birthday.
    (NOS)
  - Former Vice President of Zimbabwe Joice Mujuru is expelled from the ruling party
    for allegedly planning a coup against President Robert Mugabe. (BBC) (Herald)(NewZimbabwe)
