Date: '2015-04-23'
Source_URI: Portal:Current events/2015 April 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - The Prime Minister of France Manuel Valls claims that five terrorist attacks have
    been "foiled" in France in recent months. (France 24)
  - War in Afghanistan (2001–2021)
  - The United States advises that a counterterrorism operation on the border of Afghanistan
    and Pakistan has killed American and Italian al-Qaeda hostages Warren Weinstein
    and Giovanni Lo Porto. (AP via ABC News)
  - Two other American citizens working with al-Qaeda, Adam Yahiye Gadahn and Ahmed
    Farouq, are also killed in special operations in the same area. (CNBC)
  Business and economy:
  - Bloomberg News reports that Comcast will walk away from its $45 billion takeover
    for Time Warner Cable. (Bloomberg)
  - The NASDAQ Stock Market sets a new record high for the first time since the dot
    com bubble collapsed in 2000. (Wall Street Journal)
  Disasters and accidents:
  - Macedonian state television reports that 14 migrants died after being hit by a
    train near the city of Veles while travelling through the Balkans towards Western
    Europe. (Reuters via Daily Mail)
  Law and crime:
  - Libor scandal
  - Deutsche Bank pays $2.5 billion to settle an investigation by the United States
    and the United Kingdom related to manipulation of the Libor or London Interbank
    Offered Rate. It will also plead guilty in a US court case. (Wall Street Journal)
  - Petraeus scandal
  - Former United States Army general and Director of the Central Intelligence Agency
    David Petraeus pleads guilty of sharing classified information with his biographer
    and lover. He is given two years probation and a $100,000 fine. (The Guardian)
  Politics and elections:
  - Djoomart Otorbaev resigns as the Prime Minister of Kyrgyzstan. (World Bulletin)
  - The United States Senate confirms Loretta Lynch as the Attorney General of the
    United States. Lynch will be the first African-American woman to hold the position.
    (New York Times)
