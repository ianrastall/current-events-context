Date: '2015-04-26'
Source_URI: Portal:Current events/2015 April 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Balochistan conflict
  - A bomb on a motorcycle kills at least 3 people and injured 20 in the town of Sibi
    in Pakistan's Balochistan region. (AFP via Nigeria Guardian)
  - Syrian Civil War
  - Syrian government planes bomb the city of Jisr al-Shughur the day after it was
    captured by al-Qaeda and its allies. (France 24)
  - Boko Haram
  - Boko Haram captures Karamga island in Lake Chad from Niger, killing many soldiers.
    (Reuters)
  Business and economy:
  - American for profit education company Corinthian Colleges announces that it will
    close its remaining more than two dozen colleges in the western United States
    due to state and federal investigations into its job-placement practices. (Los
    Angeles Times)
  Disasters and accidents:
  - April 2015 Nepal earthquake
  - Rescue and recovery attempts continue in Nepal after Saturday's earthquake with
    the death toll more than 2200 and expected to rise further. (CNN), (CBC), (New
    York Times)
  - A strong earthquake aftershock measured at 6.7 hits Nepal and northern India and
    causes further avalanches in the Himalayas. (Reuters via Daily Mail)
  - Rescue helicopters airlift badly injured climbers off Mount Everest a day after
    avalanches triggered by the earthquake kill seventeen people. (NBC News)
  Politics and elections:
  - Kazakhstani presidential election, 2015
  - Voters in Kazakhstan go to the polls for a presidential election with incumbent
    President Nursultan Nazarbayev winning with 97.7 percent of the vote. He has been
    ruling the country since 1984 in one form or another. (AP via Daily Mail), (NDTV)
  - Northern Cyprus presidential election, 2015
  - Voters in Northern Cyprus go to the polls in the run-off election to elect leftist
    Mustafa Akıncı as president. (AP via The New York Times)
  Sport:
  - Kenyan Eliud Kipchoge topped all male runners and Ethiopian Tigist Tufa won the
    women's elite event in the 35th running of the London Marathon. (The Telegraph)
    (ABC News)
  - In football, FC Bayern Munich wins the 2014–15 Bundesliga for a 25th time. (Reuters
    via Daily Mail)
