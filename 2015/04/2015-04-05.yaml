Date: '2015-04-05'
Source_URI: Portal:Current events/2015 April 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Garissa University College attack
  - Kenyan Air Force planes bomb two al Shabaab bases in response to last week's attack
    on Garissa University College. (Reuters)
  Disasters and accidents:
  - Devastating floods in northern Chile leave at least 25 dead and more than 100
    missing. (CNN)
  International relations:
  - Swedish Prime Minister Stefan Löfven says that neither he nor any other of his
    cabinet-level ministers will be attending the 70th anniversary of the end of World
    War II in Moscow due to Russia's actions in Ukraine. Sweden joins a large group
    of European countries unofficially boycotting the May 9th Victory Day parade.
    (The Local)
  Law and crime:
  - Dozens of Chinese taxi drivers attempt a mass suicide in Beijing to protest the
    way taxi companies renewed their vehicle leases. (The New York Times) (The Telegraph)
  - Rolling Stone magazine retracts "A Rape on Campus", a discredited story claiming
    an alleged gang rape at the University of Virginia. (The Independent)
  Science and technology:
  - Giant pandas Xi Mei and Lu Lu break the record for the longest mating session
    ever recorded at the Sichuan Giant Panda Research Center, lasting 18 minutes and
    three seconds. (The Telegraph) (The Straits Times)
  - The Large Hadron Collider at CERN centre in Geneva, Switzerland has been restarted
    after a two-year conversion. (The Guardian)
