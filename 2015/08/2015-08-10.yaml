Date: '2015-08-10'
Source_URI: Portal:Current events/2015 August 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Two women attack the U.S. consulate in Istanbul with automatic rifles. No fatalities
    are reported, and one of the attackers, wounded during the exchange of fire, is
    captured. The Revolutionary People’s Liberation Army-Front (DHKP-C) claims responsibility.
    (The News Hub), (The Hürriyet Daily News)
  - War in Afghanistan (2001–2021)
  - A suicide bomb blast kills at least five people at the entrance to the Kabul International
    Airport. The Taliban claim responsibility. (BBC)
  - A stabbing at an Ikea store in Västerås, Sweden reslults in two people killed,
    and a third person seriously injured. (BBC News via MSN)
  - Islamic State in Iraq and the Levant
  - ISIL claims responsibility for a bombing in central Iraqi city of Baquba that
    killed at least 30 people and injured 40 more. (CNN)
  Business and economy:
  - Google creates a new holding company called Alphabet Inc. containing Google Inc.
    and Calico containing Google Ventures, Google Capital, Google X, and other subsidiaries.
    (Bloomberg)
  Disasters and accidents:
  - The death toll from floods in Myanmar tops 100 with more than a million people
    affected. (AAP via Sky News Australia)
  Politics and elections:
  - Voters elect Tony Smith as Speaker of the Australian House of Representatives
    replacing Bronwyn Bishop who resigned as a result of an expenses scandal. (The
    Sydney Morning Herald)
  Science and technology:
  - A night parrot is captured for the first time in over a hundred years in Australia's
    outback. (The Guardian), (The Australian)
  - A study, part of the Galaxy And Mass Assembly (GAMA) survey, examined huge blocks
    of space as distant as several billion light years away and concluded that the
    universe is "slowly dying" as more stars gradually go out faster than they are
    being replaced by light-emitting active ones. In cosmological terms, the demise
    of the universe (the current age calculated at approximately 13.8 billion years)
    is billions, perhaps trillions of years away. (The Guardian via MSN), (CNN), (The
    South African Times Live)
