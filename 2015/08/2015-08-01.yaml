Date: '2015-08-01'
Source_URI: Portal:Current events/2015 August 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Operation Martyr Yalçın
  - Turkey has killed around 260 members of the Kurdistan Workers' Party in recent
    bombing campaigns in Turkey and northern Iraq. Officially the operation was started
    to attack ISIL but over 90% of attacks were against the PKK. (AFP via Yahoo! News)
  - Arab–Israeli conflict
  - Israeli forces in separate incidents in violent riots protesting an arson attack
    that burned an infant to death result in the death of two 17-year-old Palestinians.
    (Reuters), (RT)
  - Internal conflict in Peru
  - The Peruvian Army rescues 15 people from Shining Path guerillas. (AFP via France
    24)
  Arts and culture:
  - The speech by Japanese Emperor Hirohito announcing the unconditional surrender
    of Japan is released in digital form. (AP)
  - The President of Russia, Vladimir Putin, places the ancient historic site of Chersonesus
    under the control of the Russian federal government after a local government made
    a controversial appointment as site manager. (AP via The Republic)
  Business and economy:
  - Puerto Rico fails to make a $58 million bond repayment due today. Gubernatorial
    Chief of Staff Víctor Suárez said the government still hopes to reach an agreement
    with creditors on renegotiating its debts. (AP via MyWay), (Analyst Rating Reports)
  Disasters and accidents:
  - Malaysia Airlines Flight 370
  - Debris suspected to be from Malaysia Airlines Flight 370 that disappeared last
    year arrives in France for investigation in Toulouse. (Reuters)
  - The President of Myanmar Thein Sein declares a state of emergency in four regions,
    Chin State, Magway Region, Sagaing Region and Rakhine State, after floods kill
    at least 27 people. (BBC)
  - A landslide in India's Manipur state near the border with Myanmar buries a village
    and kills at least twenty people. (The Times of India)
