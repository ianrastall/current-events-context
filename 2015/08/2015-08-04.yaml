Date: '2015-08-04'
Source_URI: Portal:Current events/2015 August 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present), Saudi Arabian–led intervention in Yemen
  - Roughly 1,500 United Arab Emirates Army troops deploy with tanks and heavy equipment
    to the strategic southern Yemeni city of Aden which has been the scene of heavy
    fighting between Houthi militants and fighters loyal to the previous regime of
    Abd Rabbuh Mansur Hadi. Previous attempts by the Saudi Arabian Army and Royal
    Saudi Air Force to defeat the Houthis were unsuccessful. (AFP via Yahoo)
  Business and economy:
  - The U.S. Navy's newest submarine, the 12th in the Virginia-class submarine line,
    the , joins the fleet in a commissioning ceremony at Norfolk Naval Station in
    Norfolk, Virginia. (CNN)
  - The Government of the United Kingdom sells 5.4% of the Royal Bank of Scotland
    raising £2.1bn. (ITV)
  Disasters and accidents:
  - A street-corner sized sinkhole forms at the intersection of Fifth Avenue and 64th
    Street in Sunset Park in Brooklyn, New York City, ruining the street corner. The
    northbound N Broadway Local train undergoes delays; there is at least one disconnected
    pipe and some gas lines requiring repair by National Grid workers. Local police
    cordon off the area. No fatalities or injuries are reported. (Business Insider,
    via MSN)
  - Two express passenger trains (12 coaches of the Kamayani Express; to Varanasi
    from Mumbai, or Bombay) derail, after being partially swept off a bridge while
    crossing flooded tracks in India's Madhya Pradesh state leaving at least 31 people
    killed and about 100 others injured. Related to this incident are monsoon rains
    and the end of a cyclone which have killed more than 100 people in India. (NDTV),
    (Reuters via MSN)
  - Two boats collide between Kiwa and Remba Islands on Lake Victoria leaving several
    people dead. (The Nation)
  Health:
  - Researchers from the University of California, Riverside discover that soybean
    oil and corn oil increase diabetes rates in mice more than coconut oil and fructose.
    (UCR Today)
  Religion:
  - The Roman Catholic Archdiocese of Milwaukee, in Milwaukee, Wisconsin, according
    to its Archbishop, Jerome Listecki, reaches a collective settlement agreement
    of $21 million for its sex abuse claims, meaning it could emerge from its January
    4, 2011 Chapter 11 bankruptcy. (Archdiocese of Milwaukee),(AP)
