Date: '2015-08-08'
Source_URI: Portal:Current events/2015 August 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - An overnight attack on Camp Integrity in Kabul leaves one NATO service member
    killed, along with eight support staff and two Taliban insurgents. (Reuters via
    Yahoo News), (AFP)
  - A hostage rescue operation in central Mali is successfully performed by British
    SAS forces after gunmen attack a hotel with at least seven people dead. (The Daily
    Star)
  - Civil war in the Central African Republic
  - A Rwandan soldier attached to MINUSCA goes on a shooting spree in Bangui, killing
    four fellow UN peacekeepers and injuring another eight before turning the gun
    on himself. (The Guardian)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Typhoon Soudelor makes landfall in Taiwan killing at least four people with four
    people missing and 64 injured. (CNA via Focus Taiwan), (AP via The New York Times)
  - Typhoon Soudelor makes landfall in mainland China in Fujian province with 250,000
    having been evacuated from that province and Zhejiang province. (AFP via ABC News)
  Law and crime:
  - A man is in custody in Harris County, Texas, after six children and two adults
    are found dead near the U.S. city of Houston. (KHOU)
  Sports:
  - In cricket, England regains The Ashes after taking an unbeatable lead of 3–1 in
    the 2015 Ashes series. Australian captain Michael Clarke announces his retirement.
    (BBC)
  - In rugby union, Australia wins the 2015 Rugby Championship with a 27–19 win over
    the New Zealand All Blacks. (WA Today)
