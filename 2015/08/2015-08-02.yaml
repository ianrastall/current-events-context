Date: '2015-08-02'
Source_URI: Portal:Current events/2015 August 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - A projectile fired from Yemen into the city of Najran kills a Saudi Arabian citizen.
    (Al-Arabiya)
  - Turkey–PKK conflict
  - A suicide attack by the PKK kills two Turkish Army soldiers and injures 24 others
    in the Turkish town of Doğubeyazıt in Ağrı Province near the Iran border. (BBC)
  - General Adolphe Nshimirimana, former chief of staff of the Burundi Army, is assassinated
    in Bujumbura. (RFI original in French)
  - Boko Haram
  - Nigerian Army soldiers rescue 178 people from Boko Haram camps including 101 children.
    (AP)
  Law and crime:
  - A court in Egypt postpones a verdict in the prominent trial of two journalists
    with Al-Jazeera, who have been charged with aiding the Muslim Brotherhood. (Reuters)
  - A Catholic and a Baptist church in Las Cruces, New Mexico are rocked by explosions
    at a mailbox and a trash can. (USA Today)
  - Services are held outdoors after Dustin Connor allegedly stole a computer, discharged
    fire extinguishers, and damaged a cross and other structures at a church in Piqua,
    Ohio. He is aleady a person of interest in similar vandalism to another church
    in the town.(The Washington Times and The Dayton Daily News)
  - Authorities jail a man in Melbourne, Florida, after he tries to rob the church
    during a sermon with an airsoft gun before being subdued by the Pastor. (The San
    Francisco Chronicle and Florida Today)
  - In an apparent road rage incident in Reedley, California, an 18-year-old pregnant
    woman is shot in the left eye after passing a slow-driving SUV which subsequently
    pulls up alongside and opens fire.(Sky News)
  - On the R-158 Highway in the Penza Oblast, a silver Hyundai Solaris collided with
    a MAZ-5432 at 190km/h at the 514th kilometre mark at 4:00pm GMT+4. 5 Occupants
    were announced dead at the scene with 2 injured.
  Politics and elections:
  - Bronwyn Bishop resigns as the Speaker of the Australian House of Representatives
    following an expenses scandal. (The Australian)
  - Canadian Prime Minister Stephen Harper confirms that he has asked Governor General
    David Johnston to dissolve the Canadian Parliament and set a general election
    for October 19. This will be the longest election campaign for Canada in recent
    history, since voting was once staggered over months to accommodate people travelling
    from remote regions of the country using archaic means of transportation. (CBC)
