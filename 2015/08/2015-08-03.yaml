Date: '2015-08-03'
Source_URI: Portal:Current events/2015 August 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - A Syrian fighter jet crashes into a marketplace in the town of Ariha leaving at
    least 31 people dead and dozens injured. (TC via AP), (ABC), (YNET News)
  Business and economy:
  - British bank HSBC agrees to sell its Brazilian banking business to Banco Bradesco
    for $5.2 billion. (AFP via Yahoo)
  - Nokia sells its mapping application Here to German car makers BMW, Audi, and Mercedes-Benz
    for 2.8 billion euros. (AFP via Yahoo)
  - The Athens Stock Exchange reopens after more than a month with share values falling
    by 22 percent in early trading. (AP)
  - Puerto Rico fails to make a scheduled payment of US$58 million to service its
    debts of $72 billion. Moody's considers the commonwealth in default. (BBC)
  Disasters and accidents:
  - Flooding caused by heavy monsoon rains has caused over 100 deaths in India over
    the past week with tens of thousands of people taking shelter in refugee camps.
    (BBC)
  - Two cranes overturn on several houses while installing a part of the Julianabrug
    at Alphen aan den Rijn in the Netherlands leaving twenty people injured. (The
    Netherlands Times), (BBC)
  - After days of heavy rain, a fifty-year-old building collapses in the Indian city
    of Thane killing at least twelve people with many more feared trapped in the rubble.
    (NDTV), (AP)
  Law and crime:
  - 2012 Aurora, Colorado shooting
  - In a unanimous decision, the jury rules that James Holmes, having already been
    convicted for the shooting, is still eligible for the death penalty. (CNN)
  Sports:
  - 2015 World Aquatics Championships
  - Katie Ledecky of the United States breaks her own world record for the freestyle
    clocking 15:27.71 in the final in Kazan, Russia. (Sportsmole)
