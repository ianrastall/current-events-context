Date: '2015-08-25'
Source_URI: Portal:Current events/2015 August 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - A teenage girl suicide bomber kills five people and injures fourteen others in
    the Damaturu area in northeast Nigeria. (AP via Fox News)
  - Islamic State in Iraq and the Levant
  - Fourteen people are arrested in Spain and Morocco for allegedly trying to recruit
    people to ISIL. (The Times of Israel)
  - North Korea and South Korea agree to stop airing propaganda at the border and
    stand down preparations for war. (NPR)
  Arts and culture:
  - Almost four years of renovations at St. Patrick’s Cathedral in New York City are
    nearly complete prior to Pope Francis' visit in September. Cardinal Timothy Dolan
    leads a brief tour of the cathedral. (CBS)
  Business and economy:
  - The People's Bank of China cuts interest rates and lowers minimum requirements
    for bank reserves for the second time in two months. (Reuters)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Typhoon Goni makes landfall in southwestern Japan with at least 26 people injured
    but no people killed. The death toll in the Philippines rises to 21 while South
    Korea is on alert. (AP), (Yonhap)
  - A gas explosion in the Afghanistan city of Herat kills eleven people and injures
    18 others. (AP via Ahram)
  International relations:
  - A record number of migrants crossing the Balkans results in a record number of
    people in Hungary despite the government building a wall on the border with Serbia.
    (AP via The Columbian)
  Law and crime:
  - A Federal Security Service court in Russia sentences Ukrainian film director Oleg
    Sentsov to 20 years in prison for plotting terrorist acts in Crimea, amid allegations
    of torture and U.S. claims that he is being held hostage in Russia after having
    been abducted from Ukraine by Russian-backed separatists. (BBC)
  - A shooting at a Romani camp in Roye, Somme, France, by a suspect from the same
    community leaves four people killed and three others severely injured. (The Irish
    Times), (L'Express)
  - Protests by the Patidar community in Ahmedabad turn violent, sparking violence
    across the state of Gujarat, India. (DNA India)
  Politics and elections:
  - The Parliament of Singapore is dissolved with a general election to be held on
    September 11. (AFP/Reuters via ABC Australia)
