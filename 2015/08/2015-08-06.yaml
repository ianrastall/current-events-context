Date: '2015-08-06'
Source_URI: Portal:Current events/2015 August 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide bomber kills at least eight people and injures twelve in the city of
    Pul-i-Alam in Logar Province. (AP via ABC News)
  - 2015 Abha mosque bombing, Terrorism in Saudi Arabia, Islamic State in Iraq and
    the Levant
  - A suicide bomb attack kills at least 15 people at a mosque in the south-western
    Saudi city of Abha. IS claims responsibility. (Reuters), (AFP via Yahoo)
  - Syrian Civil War
  - Islamic State of Iraq and the Levant conquers the key transport hub Al-Qaryatain,
    allowing its forces in the Qalamun region to be supplied through this city. (The
    News Hub)
  - Russian hackers are suspected of infiltrating the U.S. Pentagon e-mail system
    last week. (The Daily Telegraph)
  Arts and culture:
  - American news satire program The Daily Show airs its last broadcast with comedian
    Jon Stewart as host. (The New Yorker)
  - Many people throughout the world commemorate the 70th anniversary of the dropping
    of an atomic bomb on the Japanese city of Hiroshima. (Reuters via The Melbourne
    Age)
  Disasters and accidents:
  - A helicopter crash in the southern province of Zabul kills at least 17 people,
    including 12 Afghan army soldiers. (Al-Jazeera)
  - A Pakistani military helicopter crashes in Khyber Pakhtunkhwa province resulting
    in at least 11 deaths. (AP)
  Yemeni Civil War:
  - Saudi Arabia sends new military equipment including tanks from Sharura into northern
    Yemen to support government forces fighting Iran-backed Houthi militants. (Voice
    of America)
  Politics and elections:
  - The Republican Party candidates for President of the United States debate, in
    two events (top tier candidates and lower-tier candidates separated) in an informal
    kick-off event for the 2016 campaign. (The Los Angeles Times)
