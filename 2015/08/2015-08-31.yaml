Date: '2015-08-31'
Source_URI: Portal:Current events/2015 August 31
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 Bangkok bombing
  - Thai police say they have discovered bomb-making material in a raid in an apartment
    in an outer side of Bangkok. (AP)
  Arts and culture:
  - Denali, the highest mountain peak in North America, officially regains its original
    Alaska Native name through an executive order issued by American President Barack
    Obama. Previously, since 1917, it had been known as Mount McKinley. (The New York
    Times)
  Disasters and accidents:
  - 2015 Atlantic hurricane season
  - Hurricane Fred hits Cape Verde causing flooding and the closure of airports. (AP
    via The New York Times)
  International relations:
  - Turkey–PKK conflict
  - A judge in Turkey charges two reporters and a support worker for Vice News with
    being members of Islamic State of Iraq and Levant, following their arrest a few
    days prior. (Al Jazeera)
  - Minsk II implementation
  - Riot police clash with protesters armed with firecrackers and petrol bombs outside
    the parliament building, in Kiev, Ukraine, leaving one national guardsman dead
    and around 100 people injured. (Al Jazeera), (The News Hub), (BBC)
  - Syria–North Korea relations
  - Syrian authorities name a park in Damascus after the North Korean founding leader
    Kim Il-Sung. (Al Jazeera)
  Law and crime:
  - Czech authorities extradite from the United States Kevin Dahlgren, who is suspected
    of killing four Czech family members. (AP via Yahoo), (AP via Fox news),
  - A Kansas court convicts white supremacist Frazier Glenn Miller, Jr. (also known
    as Frazier Glenn Cross) of three counts of murder outside two Jewish centers.
    (AP via Yahoo)
  - Riots in the Churachandpur district of India's Manipur State after the passage
    of three bills in the Manipur Legislative Assembly yesterday leave at least three
    people dead and three people injured. (New Delhi TV)
  Science and technology:
  - Conservationists report in Oryx, the International Journal of Conservation that
    the Sumatran Rhino is now considered extinct in the wild in Malaysia. No new wild
    animals have been spotted since 2007, elsewhere fewer than 100 Rhinos remain in
    the wild. (MSN)
