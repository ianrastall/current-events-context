Date: '2015-08-13'
Source_URI: Portal:Current events/2015 August 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 Baghdad market truck bomb, Iraqi Civil War (2014–2017)
  - A truck bombing in Baghdad, Iraq kills at least 76 people and wounds 212 others.
    Islamic State of Iraq and the Levant claims responsibility for the attack. (Reuters),
    (The Daily Mail)
  - Islamic State of Iraq and the Levant, Rojava Revolution
  - The United States believes that ISIL used a sulfur mustard agent against Kurdish
    forces in Iraq earlier this week.
  Business and economy:
  - The New Zealand government-owned, coal-mining company, Solid Energy, goes into
    temporary voluntary administration, asking creditors to freeze most of its debt.
    (Radio New Zealand)
  - 2015 Chinese stock market crash
  - The People's Republic of China further devalues the yuan (Renminbi) by 1 percent
    after two previous devaluings. (BBC)
  Disasters and accidents:
  - 2015 Tianjin explosions
  - The death toll rises to 50. (AP)
  - An unspecified-type Egyptian military aircraft crashes due to a 'technical failure'
    near the Libyan border killing four crew members and injuring two others. (ABC
    via AP)
  Law and crime:
  - Assange v Swedish Prosecution Authority
  - Swedish prosecutors drop some charges against Wikileaks founder Julian Assange
    as the statute of limitations expire but will continue to investigate rape claims.
    (Sky News)
  Politics and elections:
  - Al-Qaeda leader Ayman al-Zawahiri pledges allegiance to the new Taliban chief
    Akhter Mansour in an audio message posted online. (BBC) (Reuters)
