Date: '2015-08-18'
Source_URI: Portal:Current events/2015 August 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - Fighting intensifies near the ceasefire line in eastern Ukraine with both the
    Government of Ukraine and the rebels blaming each other. The separatist-held cities
    of Donetsk and Horlivka have been bombed with hundreds of shells and rockets in
    the last 72 hours. (The New York Times)
  Arts and culture:
  - Two women pass the United States Army's Ranger School becoming the first to do
    so, and earning Ranger tabs on their uniforms. (AP via MSN)
  Business and economy:
  - The Obama administration, through the United States Environmental Protection Agency
    announces new regulations on emissions of the greenhouse gas methane. (The New
    York Times), (NPR), (The Atlantic), (EPA)
  Disasters and accidents:
  - Trigana Air Service Flight 257
  - Indonesian crews locate the bodies of all 54 people aboard the wreckage of Trigana
    Air Service Flight 257 in a remote area of Papua. (The New York Times), (CNN via
    Twitter)
  Health:
  - The US Food and Drug Administration approves the use of Flibanserin to help women
    with Hypoactive Sexual Desire Disorder. (The Washington Post)
  Politics and elections:
  - The Prime Minister of Turkey Ahmet Davutoğlu returns his mandate to form a government
    to the President after failing to form a coalition government. This means that
    a new election is likely. (BBC), (The News Hub)
