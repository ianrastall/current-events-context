Date: '2015-08-09'
Source_URI: Portal:Current events/2015 August 9
Intelligence_Payload:
  Arts and culture:
  - Japan commemorates the 70th anniversary of the atomic bomb dropped over the Japanese
    city of Nagasaki during World War II. (BBC)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - The death toll in China from Typhoon Soudelor rises to at least 22 people with
    more missing and millions without power. (USA Today)
  Law and crime:
  - An arrest warrant is issued for the cousin of Syrian President Bashar al-Assad,
    Suleiman Hilal Al-Assad, who is accused of shooting and killing Colonel Hassan
    Al-Sheikh of the Syrian Armed Forces at what can be described as a traffic dispute.
    (The News Hub), (France 24)
  - Ferguson unrest
  - Tyrone Harris, Jr is shot in Ferguson, Missouri after allegedly firing shots at
    police. He is in a critical condition.(The St Louis Post-Dispatch)
  Politics and elections:
  - The Prime Minister of Iraq Haider al-Abadi calls for abolishing the positions
    of Vice President and Deputy Prime Minister and says he is opening graft investigations.
    The previous vice president Tariq al-Hashimi was sentenced in absentia to death
    over political murders. (Bloomberg)
  - Haitian parliamentary election, 2015
  - Voters in Haiti go to the polls for the first election in four years with some
    polling places in the capital Port-au-Prince forced to close due to violence.
    (Reuters)
  Sports:
  - NFL player and sportscaster Frank Gifford dies at the age of 84. (NBC)
