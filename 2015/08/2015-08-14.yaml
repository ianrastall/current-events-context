Date: '2015-08-14'
Source_URI: Portal:Current events/2015 August 14
Intelligence_Payload:
  Business and economy:
  - Greek government-debt crisis
  - The Hellenic Parliament approves (with 222 yes votes) Prime Minister of Greece
    Alexis Tsipras's bailout package, despite opposition by almost one-third of his
    Syriza party. This third bailout plan is almost identical to the one rejected
    by the Greek people in the referendum. Tsipras will seek a vote of confidence
    following the country's August 20th payment to the European Central Bank. (The
    Guardian), (The International New York Times)
  - Ministers at Eurogroup's lengthy meeting today approve Greece's 85 billion euro
    bailout. (Forex), (The Guardian)
  International relations:
  - Cuban Thaw, Cuba–United States relations
  - U.S. Secretary of State John Kerry officially reopens the American embassy in
    Havana. Eight congressional lawmakers involved in the policy change also attend.
    (AP via Global News), (CNN), (The Washington Post)
  - The United States flag is raised at the embassy for the first time in 54 years.
    (NBC)
  Disasters and accidents:
  - A road accident near the Indian city of Jamshedpur in Jharkhand state kills thirteen
    pilgrims and leaves 11 injured. (The International Business News Live)
  Law and crime:
  - Masked gunmen kill 19 people and wound seven others at multiple locations of São
    Paulo's suburbs Thursday night. (BBC), (ABC)
  Science and technology:
  - Mathematicians at the University of Washington Bothell discover a new type of
    pentagon tiling, the first new type of "tiling the plane" with a single polygon
    since 1985. (NPR)
