Date: '2015-09-29'
Source_URI: Portal:Current events/2015 September 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - At least four people are killed in a bombing attack on Baghdad. (Euronews)
  - War in Afghanistan (2001–2021)
  - Battle of Kunduz
  - Afghan National Security Forces start efforts to recapture the city of Kunduz.
    (CNN), (The News Hub)
  - The U.S. Air Force launches air-strikes on Taliban forces within Kunduz. (The
    Washington Post)
  - Turkey–PKK conflict
  - 2015 PKK rebellion
  - Two police officers are gunned down by suspected PKK militants on the streets
    of Adana, southern Turkey. (Middle East Eye)
  - Gaza–Israel conflict
  - At least one rocket is intercepted over Ashdod by Israel's Iron Dome missile defense
    system, and is believed to have come from the Gaza Strip. (Haaretz)
  - 2015 Burkinabé coup d'état
  - After a tense standoff, Burkina Faso's military crushed the elite presidential
    guard and seized the coup's abandoned headquarters. The former head of the guard,
    Gen. Gilbert Diendéré, had called on his men to lay down their weapons to avoid
    a bloodbath. Diendéré told Agence France-Presse (AFP) he feared “many deaths and
    injuries” in the operation. It is unclear whether there are casualties. (The New
    York Times) (BBC) (The Guardian)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Typhoon Dujuan hits mainland China in Fujian province after hitting Taiwan, where
    it caused two deaths and injured 300. (AP via ABC News)
  International relations:
  - Amnesty International designates Cuban graffiti artist Danilo Maldonado Machado
    as a prisoner of conscience. (Reuters)
  Law and crime:
  - All 500 of the prisoners escape from the Ngaraba jail in Bangui, the capital of
    the Central African Republic. (Reuters), (The Guardian)
  Science and technology:
  - Researchers discover a biofluorescent hawksbill sea turtle, glowing bright red
    and green, near the Solomon Islands in the South Pacific Ocean. This is the first
    time scientists have found biofluorescence in a reptile in the wild. The hawksbill
    sea turtle is an endangered species. (Live Science) (CNN)
