Date: '2015-09-04'
Source_URI: Portal:Current events/2015 September 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - Iraqi security forces raid the offices of Kata'ib Hezbollah in Baghdad, accusing
    them of being involved in the abduction of 18 Turkish workers. (Reuters via Economic
    Times)
  - Sinai insurgency
  - Two roadside bombs detonate in the Sinai Peninsula injuring six international
    peacekeepers, who were there to support the 1979 Egypt–Israel Peace Treaty. (AP
    via CBS)
  - Saudi Arabian-led intervention in Yemen
  - An explosion at an arms depot in Yemen kills 45 Emirati soldiers who were part
    of the Saudi led coalition. (Yahoo)
  - Five Bahraini soldiers are killed on the Saudi-Yemeni border while taking part
    in a military operation against Yemen-based Houthi militants. (Reuters)
  - Clashes in and around Tajikistan's capital Dushanbe kill at least 17 people. Government
    representatives blame the attacks against security forces on former Deputy Defense
    Minister Aduhalim Nazarzoda, who fought against government forces in the Tajikistan
    Civil War. (BBC)
  - Russia's role in the Syrian Civil War
  - Russian President Vladimir Putin confirms that Russia is providing military aid
    in Syrian Civil War in support of the Bashar al-Assad regime and is providing
    heavy weapons, aircraft, tanks, serious training and logistical support to the
    Syrian Army. (Telegraph)
  Arts and Culture:
  - The world's shortest man ever recorded, Chandra Bahadur Dangi, dies from pneumonia
    in an American Samoan hospital at age 75. Dangi lived with his family in Dang
    District, Nepal. His height, listed in the Guinness World Records, is 54.6 centimeters
    / 21.5 inches. (Kathmandu Post) (Daily Pakistan)
  - U.S. Military Academy officials confirm that during West Point's annual pillow
    fight on August 20, 2015, some cadets swung pillowcases packed with hard objects
    leaving 30 cadets injured, including 24 with concussions. (New York Times)
  Business and economics:
  - General Mills sells subsidiary Green Giant to B&G Foods Inc. for $765 million.
    (Star Tribune via The Ledger)
  - BlackBerry Limited announces it will purchase Good Technology, a provider of mobile
    software, as part of its broader shift to a services role within the internet
    of things. (Reuters)
  - Fiat Chrysler U.S. recalls 7,810 SUVs to prevent hacking. (Reuters)
  Disasters and accidents:
  - 2015 Atlantic hurricane season
  - Tropical Storm Fred's predicted track will turn northeast toward the Azores islands
    off the coast of Portugal as a Tropical Depression. (Weather.com)
  - 2015 Pacific hurricane season
  - Tropical Storm Ignacio, currently headed north-northwest away from Hawaii, is
    anticipated to turn northeast on Sunday, heading for the Alaskan panhandle and
    northwestern British Columbia. (AccuWeather), (SurfLine.com)
  - Forty one people are injured when a British tourist bus and four trucks are involved
    in a collision between Sempach and Sursee in Switzerland. (Reuters via News24)
  Law and crime:
  - Two British VICE News journalists, Jake Hanrahan and Philip Pendlebury, arrested
    on 28 August in Diyarbakir Province in southeastern Turkey on terror charges,
    are released while their colleague, translator Mohammed Ismael Rasool, remains
    in custody. (Turkish Weekly), (Time)
  - US Open (tennis) drone arrest. (BBC)
  - A Latvian man charged by U.S. over the Gozi computer virus (a proxy Trojan horse)
    pleads guilty. (Reuters)
