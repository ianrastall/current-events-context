Date: '2015-09-19'
Source_URI: Portal:Current events/2015 September 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Islamist rebels execute 56 Syrian Army personnel following the capture of the
    Abu al-Duhur airbase in the Idlib Governorate according to the Syrian Observatory
    for Human Rights. (Telegraph), (The News Hub)
  - Kurdish–Turkish conflict
  - At least 55 are killed when Turkish warplanes hit Kurdistan Workers Party (PKK)
    camps in northern Iraq, according to Turkey's security sources. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - A Saudi-led military coalition bombards government buildings and residential neighborhoods
    in the Yemeni capital, Sana'a, killing about 30 people, including civilians. Rescuers
    continue searching for other possible victims buried under the rubble. (AP via
    Orange County Register), (Xinhuanet)
  Arts and culture:
  - Pope Francis departs from Rome to begin his Apostolic Visit to Cuba. Francis will
    then visit the US. In the US, he will address a joint session of Congress (the
    first by an incumbent Pope), meet with President Obama, canonize Junípero Serra,
    tour a prison and the World Trade Center site, hold Masses in New York, Washington,
    and Philadelphia, and preside over the World Meeting of Families in Philadelphia.
    (Vatican), (USCCB), (The New York Times)
  - Univision's Sábado Gigante, the world's longest running variety show in television
    history, ends after 53 years on air. (USA Today)
  Disasters and accidents:
  - Heavy rain triggers flash floods killing 10 people in Tehran and southern Iran,
    with eight others missing. (AP via CP24)
  - European migrant crisis
  - Italy rescues thousands of refugees in the Mediterranean Sea off the coast of
    Libya. (Al-Jazeera)
  - A five-year-old Syrian girl dies and several other refugees are missing after
    their boat sinks in the Aegean Sea near the Greek island of Lesbos. The Greek
    Coast Guard says it rescued 11 people from the boat carrying 26 people. (AFP via
    Asian Age), (Reuters)
  Health:
  - 2015 Dengue fever outbreaks
  - Authorities in the Dominican Republic issue an alert as the number of deaths (57
    this year) and cases of dengue fever continue to rise. (AP via ABC News)
  - The Delhi government defers elective surgery to free up 1000 hospital beds to
    treat a dengue fever outbreak. (Times of India)
  International relations:
  - Japanese Self-Defense Forces
  - Japan's upper chamber of Parliament approves controversial legislation, which
    the lower chamber passed in July, that expands the role of the Japanese Self-Defense
    Forces overseas. (CNN), (Mainichi Daily News)
  - European migrant crisis, Croatia–Hungary relations
  - Hungarian security forces confiscate a Croatian train carrying 1000 migrants and
    disarm 40 Croatian police officers accompanying the migrants. Hungarian authorities
    repatriate the officers. (Sky News)
  - Croatian prime minister Zoran Milanović says Croatia will 'force' Hungary to accept
    migrants by sending them to the Hungarian border. Hungary responded angrily calling
    Milanović "pathetic" and accused Croatia of human smuggling. (BBC)
  - Croatia allows some asylum seekers to move on past its borders into Hungary and
    Slovenia. (Washington Post)
  - Egypt's new Cabinet is sworn in before President Abdel Fattah el-Sisi, a week
    after the previous administration resigned following a corruption scandal, and
    a month before parliamentary elections. The 33-member body has 16 new ministers,
    including two women. Sherif Ismail, petroleum minister in the last cabinet, is
    the new prime minister. (Egyptian Streets), (Reuters)
  Law and crime:
  - 1Malaysia Development Berhad scandal
  - The Federal Bureau of Investigation launches an investigation of money laundering
    associated with the 1Malaysia Development Berhad sovereign wealth fund. (Wall
    Street Journal)
  Sports:
  - 2015 Rugby World Cup
  - In what media called "the greatest shock in rugby history", Japan defeat two-time
    World Cup champion South Africa 34–32 in Brighton. (ESPN (UK))
  - In another result viewed as a surprise, Georgia defeat Tonga 17–10 in Gloucester.
    In the match, Georgia's 18-year-old Vasil Lobzhanidze becomes the youngest player
    ever to appear in a Rugby World Cup match. (PA via ESPN (UK))
