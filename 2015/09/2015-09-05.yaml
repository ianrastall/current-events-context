Date: '2015-09-05'
Source_URI: Portal:Current events/2015 September 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Afghanistan War
  - Gunmen kill 13 minority Hazara men but spare the life of one woman among a traveling
    party in usually tranquil Balkh Province. No group claims responsibility. (AFP
    via Times of Oman)
  - Syrian Civil War
  - At least 20 Syrian rebels and 27 ISIS fighters are killed in a battle in Mare',
    Syria, in northern Aleppo Governorate near the Turkish border. (AFP via Lebanon
    Daily Star) (Reuters)
  - The death toll in Tajikistan clashes rises to 22 dead. (BBC)
  - Somali Civil War (2009–present)
  - al Shabaab militants seize two towns in southern Somalia. (Reuters)
  - Thai police seek a 10th suspect in deadly Bangkok bombing. (AP)
  International Relations:
  - European migrant crisis
  - Following Austria's and Germany's decision to waive their asylum system rules,
    approximately 6,500 migrants – mostly from Syria, Iraq, and Afghanistan – arrive
    in Vienna. They traveled from Hungary by bus, train or on foot. The migrants were
    given the opportunity to register in Austria or move on to Germany. (The Star
    - Malaysia) (USA Today) (Washington Post) (Budapest Business Journal)
  - The first group, 450 of an expected 10,000 migrants, arrive in Munich, Germany,
    after traveling through Hungary and Austria. (BBC)
  Law and crime:
  - Cross-Strait relations
  - Former vice president Annette Lu of Taiwan files charges of treason against former
    vice president Lien Chan, accusing him of breaching national security when he
    attended the 2015 China Victory Day Parade. (Taipei Times)
