Date: '2015-09-13'
Source_URI: Portal:Current events/2015 September 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkey–PKK conflict
  - A PKK car bombing on a checkpoint kills two Turkish police officers and injures
    five others in south-eastern Turkey. Also, Turkish security forces impose a curfew
    in the region's largest city, Diyarbakır. (Reuters)
  - Egyptian security forces open fire on a Mexican tourist convoy in the Western
    Desert while pursuing militants with at least twelve people killed and 10 injured.
    (AFP/Reuters via ABC News Australia)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - The death toll from flooding in Japan caused by Tropical Storm Etau rises to seven.
    (Straits Times), (Asia One)
  - Japan's Fire and Disaster Management Agency (消防庁) advises 2.8 million people to
    evacuate due to heavy flooding in the eastern region of the country. (CNN)
  - 2015 California wildfires
  - The Valley wildfire claims at least one life in Lake County, California with thousands
    of people forced to evacuate. (ABC News Bay Area)
  - An explosion in the Pakistan city of Multan kills at least eleven people and injures
    79. (AFP via ABC News Australia), (Pakistan Tribune)
  - An Islamic school in the Nigerian town of Bukuru collapses with at least four
    students killed and 40 injured. (Reuters)
  - Thirty-four refugees, including four babies and 11 children, drown in the Aegean
    Sea when their wooden boat sinks off the Greek island of Farmakonissi, close to
    Turkey's coast. (Xinhua News Agency), (Sydney Morning Herald)
  - Four inmates are killed and four more injured during violence that lasted a couple
    of minutes at a privately-operated prison in Cushing, Oklahoma (U.S.). (N.Y. Daily
    News), (The New York Times)
  International relations:
  - Yemeni Crisis (2011–present)
  - The government in exile says that it will no longer attend United Nations brokered
    talks with the rebel Houthis. (Trust)
  - Arab-Israeli conflict
  - Israeli police engage Palestinian protesters with tear gas and stun grenades near
    Jerusalem's Al-Aqsa Mosque in response to reports of planned incidents ahead of
    Rosh Hashanah, the Jewish New Year. Protesters throw fireworks and small explosive
    devices from inside the Mosque. (AP via Washington Post), (BBC)
  - The Jordanian government condemns Israel for assaults on Muslim holy sites in
    Jerusalem's Old City. (Jerusalem Post)
  - European migrant crisis
  - Germany reintroduces emergency controls on its border with Austria. (Washington
    Post)
  Science and technology:
  - Russian cosmonaut Gennady Padalka's return from the ISS on Saturday sets a new
    record for time in space, breaking the one fellow countryman Sergei Krikalev set
    in 2005. Padalka totaled 879 days in space (2.41 years) over five flights. (NPR)
  Health and medicine:
  - Doctors at Salamanca University Hospital in Salamanca, Spain implant a 3-D printing-produced
    artificial titanium sternum (breastbone), and a portion of the ribs (as opposed
    to the current standard, a non-customized, flat piece of titanium, which can loosen
    over time) in a patient who had numerous cancerous tumors in that area, the first
    use of 3D printing technology to take the place of these specific body parts.
    (Quartz, via MSN)
  Sport:
  - 2015 US Open (tennis)
  - In tennis, Novak Djokovic of Serbia defeats Roger Federer of Switzerland 3 sets
    to 1 in the final of the men's singles. (International Business Times), (The Guardian)
  - In golf, Lydia Ko wins the final LPGA major of the year, The Evian Championship,
    by six shots after a final-round 63. The New Zealander becomes the youngest person
    of either sex to win a professional major championship, at age . (BBC Sport)
