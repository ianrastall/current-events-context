Date: '2015-09-09'
Source_URI: Portal:Current events/2015 September 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Islamic Front rebels seize Abu al-Duhur military airport while taking control
    of Syria's northwestern Idlib province. (BBC), (Reuters via Sydney Morning Herald),
    (Al Jazeera English Online)
  - Russian forces reportedly begin combat operations in Syria in support of the Bashar
    al-Assad government. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - Egypt deploys around 800 troops to Yemen to join the Saudi-led war effort against
    the Houthis. (Reuters)
  Arts and culture:
  - Queen Elizabeth II becomes Britain's longest-reigning monarch (63 years and seven
    months), surpassing the record set by Queen Victoria, her great-great-grandmother.
    (BBC), (The Huffington Post UK), (Al Jazeera English Online)
  Business and economy:
  - A German court issues an injunction ordering a halt to a Lufthansa airline pilots'
    strike. Earlier, Germany's biggest airline announced it had canceled 1,000 flights
    while about 500 would still operate. (CNBC), (AP via US News & World Report)
  International relations:
  - Refugees of the Syrian Civil War
  - Australia announces that it will accept an additional 12,000 Syrian migrants,
    mostly from persecuted minorities. (ABC News), (Al Jazeera English Online)
  - Egypt–Israel relations
  - Israel reopens its embassy in Cairo, Egypt, after closing it in 2011 after violent
    protests. (AP via ABC News), (Al Jazeera English Online), (CNN International)
  Law and crime:
  - Human Rights Watch and the Philippine Commission on Human Rights condemn the murders
    of an indigenous Lumad family and the rape of an indigenous Manobo girl by soldiers
    and militiamen of the Philippine Army under the guise of fighting a communist
    rebellion. (The Philippine Star), (Rappler), (Human Rights Watch)
