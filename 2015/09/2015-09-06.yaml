Date: '2015-09-06'
Source_URI: Portal:Current events/2015 September 6
Intelligence_Payload:
  Disasters and accidents:
  - At least 10 people die and 8 are missing from a South Korean fishing charter that
    capsized Saturday night off the country's southern coast. Coast Guard officers
    said three people survived by clinging to the wreckage for 10 hours. (Sydney Morning
    Herald) (AFP via New Delhi Television)
  - The death toll from the September 1 chemical factory blast in China rises to 13.
    (AP)
  - A Spain car rally race crash leaves six dead after a car veers off a straight
    section into spectators. (BBC)
  International Relations:
  - European migrant crisis
  - Pope Francis asks Catholic faithful in Europe to host refugee families fleeing
    death from war and hunger, and announces the Vatican's two churches will welcome
    two families of refugees. (CNN) (NBC4 New York)
  Law and crime:
  - In Tampa, Florida, former University of South Florida football player Elkino Watson
    is killed and Desmon Watson, another former player, is injured after an early
    morning stabbing after an argument broke out outside a nightclub in Ybor City.
    (WFLA)
  - In North Carolina, the Charlotte-Mecklenburg Police Department announces an unprecedented
    11 people have been shot, 5 fatally, over the Labor Day weekend, including a boy
    shot at a birthday party. (Charlotte Observer)
  - In the second police officer shooting in the city in three days, a man ambushed
    a marked police SUV stopped at a traffic light in Las Vegas by walking up and
    firing multiple rounds, striking one officer in the hand. The shooter was arrested.
    (Fox News)
  - Crystal Cortes of Dallas, Texas is charged with capital murder of dentist Kendra
    Hatcher on September 2. Her borrowed Jeep Cherokee was seen entering a parking
    garage on video. She told police she conspired with an unidentified man who paid
    her to drive him to the garage with the intention of robbery. (WFAA)
  Politics and elections:
  - Guatemalan general election, 2015
  - Voters in Guatemala go to the polls for a general election. The presidential election
    appears headed for a runoff. (AP)
  - Thailand's National Reform Council (NRC) rejects a controversial new constitution,
    135 to 105, with 7 abstentions. This result dissolves the NRC, continues military
    rule for at least 7 months, and delays the scheduled January 2016 referendum to
    early 2017 or later. (AsiaOne) (BBC)
