Date: '2015-09-16'
Source_URI: Portal:Current events/2015 September 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkey–PKK conflict
  - PKK attacks kill five Turkish police officers in the southeastern Mardin and Hakkâri
    provinces. The Turkish Army claims to have killed nine militants. (Daily Sabah),
    (Reuters via Daily Star)
  - 2015 Burkinabé coup d'état
  - Soldiers detain the interim president and prime minister of Burkina Faso, as well
    as a number of cabinet ministers, sparking fear of a coup d'etat. A joint statement
    by the United Nations, the African Union, and the Economic Community of West African
    States states that the presidential guard should immediately release the leaders
    of the interim government. (Al-Jazeera), (Reuters)
  Business and economy:
  - Hewlett-Packard, which has struggled for years in a declining PC market, will
    cut up to 33,300 jobs over the next three years, mostly in its enterprise business.
    (Reuters)
  Disasters and accidents:
  - One person is dead and fourteen missing after floods hit Huaping County in China's
    Yunnan province. (Xinhua)
  - Tropical cyclone effects in Europe
  - The remnants of former Tropical Storm Henri combines with another storm in western
    Europe to cause heavy rains and possible floods in the United Kingdom, France,
    Spain and Portugal. (AccuWeather)
  - The death toll rises to 16 from this week's flash flood along the Utah – Arizona
    border in the United States. (Christian Science Monitor)
  - An earthquake measuring 8.3 on the Richter scale occurs in the Pacific Ocean near
    Chile sparking a tsunami warning. At least five people die. (AP via ABC News America),
    (USGS), (CNN)
  Health:
  - A cholera outbreak kills at least 16 people in three camps for displaced people
    fleeing Boko Haram in Nigeria. (France 24)
  International relations:
  - European migrant crisis
  - Dozens of migrants reach the border of Serbia and Croatia which has become the
    new route for migrants denied entry to Hungary. (BBC)
  - Hungarian riot police and migrants clash at the now-closed border crossing near
    Horgos. (BBC)
  Law and crime:
  - The U.S. Court of Appeals for the Sixth Circuit denies Kim Davis' request to have
    same-sex marriage licenses delayed, but does not toss out her appeal entirely.
    (AP via MSN)
  - New York City Police and US federal agents arrest members of an international
    crime syndicate that have been selling cheap, but toxic, synthetic marijuana.
    In New York alone, 2,300 people have ended up in emergency rooms in the last two
    months. The seizure includes two warehouses full of synthetic drugs in the Bronx,
    one of the largest raids ever. (CBS News)
  Sports:
  - 'The International Olympic Committee announces the bidding cities for the 2024
    Summer Olympics: Budapest, Hamburg, Los Angeles, Paris, and Rome. (CNN)'
