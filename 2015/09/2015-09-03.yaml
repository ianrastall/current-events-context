Date: '2015-09-03'
Source_URI: Portal:Current events/2015 September 3
Intelligence_Payload:
  Disasters and accidents:
  - European migrant crisis/Syrian Civil War
  - Bodies of Syrian refugees are found on a beach in Turkey, including a 3-year-old
    boy, pictures of whose body spread virally and prompt grave international concern.
    (Al Jazeera)
  - An overloaded wooden boat with Sumatra-bound migrants sinks off the coast of Malaysia
    killing at least 15 people, 13 of which are women. Nearby fisherman rescue 19
    people with more than 40 missing. The Malaysian Maritime Enforcement Agency states
    that the boat was taking migrant workers home to Tanjung Balai in Indonesia's
    Sumatra province for the Hari Raya Haji celebration. (Reuters) (The NY Daily News)
    (Malaysian Star)
  Malaysia Airlines Flight 370:
  - French prosecutors state that they believe "with certainty" that a piece of debris
    that had washed ashore on Reunion Island came from the missing plane. (BBC)
  International relations:
  - 2015 China's V-Day Parade
  - A military parade is held in Beijing featuring 12,000 members of the People's
    Liberation Army, 500 vehicles and 200 People's Liberation Army Air Force air craft.
    Women of the Chinese military are allowed to participate in this particular parade
    for the first time. (RT)
  Law and crime:
  - The President of Guatemala, Otto Pérez Molina, resigns after being charged in
    a corruption scandal; Vice President Alejandro Maldonado is sworn in as interim
    head of state. (The New York Times) (BBC News)
  - 2015 Bangkok bombing
  - Another suspect in the bombing is arrested in Narathiwat Province in southern
    Thailand and flown to Bangkok. (Bangkok Post)
  - Miller v. Davis
  - Kim Davis, the Rowan County, Kentucky, clerk, is jailed for contempt of court
    for continuing to refuse, on grounds of religious freedom, to issue marriage licenses
    to same-sex couples per U.S. District Judge David Bunning's August 12, 2015, order.
    The deputy clerks are ordered to issue these licenses. (Reuters), (New York Times)
  - 'Harriman, Tennessee police arrest 41-year-old actress Jennifer Ann Lien, who
    played "Kes" on the Star Trek: Voyager television series. She is accused of exposing
    herself to children and is charged with two misdemeanor counts of indecent exposure
    involving children under age 13. (AP via FOX), (Huffington Post)'
  Sports:
  - National Football League
  - In arbitration, U.S. District Judge Richard M. Berman overturns the NFL Commissioner
    Roger Goodell's four-game suspension of New England Patriots quarterback Tom Brady.
    The judge rules that Brady had been given no notice that ball deflation would
    result in a suspension. The NFL announces that they will appeal the ruling. (AP)
    (ESPN)
