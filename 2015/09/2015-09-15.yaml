Date: '2015-09-15'
Source_URI: Portal:Current events/2015 September 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency, 2015 West African offensive
  - The Nigerian Army rescues dozens of women and children in Borno State. (AP via
    ABC News)
  - Saudi Arabian-led intervention in Yemen
  - Houthi militants backed by Yemeni troops reportedly seize control of al-Rabu’ah,
    a town in Saudi Arabia's southwestern Asir region near the Yemeni border, forcing
    Saudi forces to pull out of the area. (Press TV)
  Disasters and accidents:
  - 2015 Southeast Asian haze
  - The Indonesian province of Riau declares a state of emergency due to high levels
    of smoke haze from forest fires in Riau, Jambi and South Sumatra that have led
    thousands of people to flee the capital Pekanbaru. (AFP via Straits Times)
  - The 24 hour Pollutant Standards Index in Singapore remains in the unhealthy range
    due to smoke haze. (Channel News Asia)
  - Two students die and three others are injured after a school bus is struck by
    another vehicle and swerves off an Interstate 610 overpass in Houston, Texas.
    (Houston Chronicle), (Reuters)
  - The death toll from yesterday's flash floods in the American towns of Hildale,
    Utah, and Colorado City, Arizona, rises to 12 with one person still missing. (AP
    via ABC News), (NBC News)
  - A floatplane crashes during takeoff near Iliamna in southwest Alaska, killing
    three people and injuring the other seven on board. (AP via Fairbanks Daily News-Miner)
  - Seven mountain climbers die in an avalanche in the French Alps near the town of
    Pelvoux. (Accuweather)
  Health:
  - The U.S. Food and Drug Administration orders R. J. Reynolds Tobacco Company to
    stop further U.S. sale and distribution of four cigarette products because they
    may be more dangerous than similar older cigarettes. (Reuters)
  International relations:
  - European migrant crisis
  - Hungary declares a state of emergency in two of its southeastern counties as tougher
    laws come into effect aimed at preventing asylum-seekers and other migrants from
    entering the country. (BBC), (AP via U.S. News & World Report)
  Politics and elections:
  - Liberal Party of Australia leadership spill, September 2015
  - Malcolm Turnbull is sworn in as the Prime Minister of Australia following his
    election to the leadership of the Liberal Party of Australia. (ABC News Australia)
  - The Assembly of the Republic of Macedonia appoints a special prosecutor into a
    wiretapping scandal. (AP via ABC News)
