Date: '2015-09-23'
Source_URI: Portal:Current events/2015 September 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Colombian conflict (1964–present)
  - The President of Colombia Juan Manuel Santos and the leader of FARC Timoleón Jiménez
    will announce a deal on justice for crimes committed in the fifty-year-long conflict.
    (BBC)
  Arts and culture:
  - Pope Francis%27 visit to the United States
  - Pope Francis makes his first ever visit to the U.S. and becomes the third Pope
    to visit the White House. He was received in an official welcome ceremony by President
    and Mrs. Obama and is scheduled to meet with a bishops' conference of the United
    States and hold mass and canonize Junípero Serra at the Basilica of the National
    Shrine of the Immaculate Conception, near the Catholic University of America.
    (AP via MSN), (The New York Times), (Washington Post), (CNN)
  Business and economy:
  - Volkswagen emissions violations
  - Martin Winterkorn resigns as the CEO of Volkswagen as a result of an emissions
    cheating scandal. (BBC)
  Law and crime:
  - Egypt pardons al-Jazeera journalists Mohamed Fahmy and Baher Mohamed, who have
    been recently sentenced to three years in prison. (BBC)
  - European migrant crisis
  - Slovakia mounts a legal challenge to mandatory quotas decided in a European Union
    ministerial summit yesterday. (BBC)
