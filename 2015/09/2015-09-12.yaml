Date: '2015-09-12'
Source_URI: Portal:Current events/2015 September 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present), Al-Qaeda insurgency in Yemen, Saudi Arabian-led
    intervention in Yemen
  - A drone strike kills four suspected Al-Qaeda militants in northern Yemen. (Reuters
    via Trust)
  - Medics claim that at least 16 other people have been killed in Saudi led airstrikes.
    (Reuters)
  - Houthi militants backed by allied Yemeni troops seize control of four Saudi military
    bases in Saudi Arabia's southern 'Asir Region according to Yemeni state TV. (Press
    TV)
  - Sino-Indian border dispute
  - Chinese and Indian troops face-off in the Burtse region of northern Ladakh after
    Indian troops crossed the mutually-agreed patrolling line to dismantle a disputed
    watchtower the Chinese were building close to line. (Economic Times)
  - Sinai insurgency
  - The Egyptian Armed Forces claim that an offensive against ISIS militants in northern
    Sinai over the past week has killed at least 164 insurgents with the loss of eight
    troops. (AFP via Sky News)
  - Arab-Israeli conflict
  - Violent clashes erupt between new Israeli settlers and Palestinians in the Silwan
    area of East Jerusalem with 13 Palestinians and four Israeli police injured. (Haaretz)
  Arts and culture:
  - Venezuelan director Lorenzo Vigas wins a Golden Lion award for Best Film at the
    Venice Film Festival for Desde allá (From Afar). (AP)
  Disasters and accidents:
  - An Indian Railways train derailment near Gulbarga in Karnataka state kills at
    least two people with several others injured. (AP via Star Tribune)
  - Tropical Storm Etau (2015)
  - Japan resumes a search for 16 missing persons after torrential rain and floods
    with thousands still hoping to return home. (Reuters)
  - Petlawad explosion
  - A series of explosions involving propane triggering nearby illegally stored mining
    detonators in the Indian town of Petlawad in the state of Madhya Pradesh kills
    at least 104 people with over 150 missing. (News 18), (ABC News Australia), (AP
    via US News)
  - 2015 California wildfires
  - The Butte Fire has destroyed 60 homes in the rural counties of Amador and Calaveras
    and threatens 6000 residents. (Reuters via ABC News Australia)
  Politics and elections:
  - The outcome of the election for the next leader of the United Kingdom Labour Party
    is announced with Jeremy Corbyn winning the contest ahead of Yvette Cooper, Andy
    Burnham and Liz Kendall while Tom Watson is elected as the new deputy leader.
    (The Telegraph), (Evening Standard)
  Sport:
  - 2015 US Open (tennis)
  - In tennis, Italian Flavia Pennetta defeats fellow countrywoman Roberta Vinci in
    two sets to win the 2015 US Open women's singles title. During the awards ceremony,
    Pennetta announces her retirement from tennis. (AP) (BBC) (US Open)
  - Major League Baseball
  - David Ortiz of the Boston Red Sox hits two home runs in the Sox' 10–4 win over
    the Tampa Bay Rays at Tropicana Field in St. Petersburg, Florida, making him the
    27th player in MLB history with 500 career homers. (ESPN)
  - In boxing, Floyd Mayweather, in what is expected to be the final fight of his
    career, defeats Andre Berto by unanimous decision to extend his record to 49–0.
    (ESPN)
