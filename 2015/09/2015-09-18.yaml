Date: '2015-09-18'
Source_URI: Portal:Current events/2015 September 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - Israel deploys an extra 800 Israeli police officers as Palestinians call for a
    "day of rage" protests in Jerusalem over entry restrictions to Al-Aqsa mosque.
    A police vehicle in Jerusalem was attacked with assault rifle fire. (Jerusalem
    Post), (Al Jazeera America)
  - 2015 Camp Badaber attack
  - Two security personnel, 17 worshippers in a mosque, and 13 militants are killed
    following a Tehrik-i-Taliban Pakistan attack on a Pakistan Air Force base on the
    outskirts of Peshawar. (The Express Tribune), (Reuters via SBS)
  - Syrian Civil War
  - Russia moves its first tactical fighter jets to Syria, according to American sources.
    (CNN)
  - The United States Secretary of State John Kerry agrees to begin military to military
    talks with Russia concerning Russia's military activities in Syria. (The New York
    Times)
  - At least 26 people are killed following Syrian Arab Air Force air-raids on the
    Islamic State-held central Syrian city of Palmyra according to the Syrian Observatory
    for Human Rights. (Reuters)
  - Saudi Arabian-led intervention in Yemen
  - Shells fired by Yemeni forces across the border from Yemen kill at least three
    people and wound 28 others in the Jizan region. (Daily Star)
  Business and economy:
  - European communications company Altice announces plans to buy US cable television
    company Cablevision for $17.7 billion. (NPR via KVCR)
  - Volkswagen emissions violations
  - The U.S. Environmental Protection Agency orders Volkswagen to fix nearly 500,000
    VW and Audi diesel cars from model years 2009-2015 that include software that
    circumvents EPA emissions standards. The company's illegal use of so-called "defeat
    devices" threaten public health, in some cases releasing 40 times the pollution
    standard of nitrogen oxide emissions. The company faces possible U.S. fines of
    up to $37,500 per vehicle for the violations which could total more than $18 billion.
    (AP via Fox News), (EPA)
  - In India, about 2.3 million people respond to the state of Uttar Pradesh's announcement
    of 368 low-level government jobs openings that pay 16,000 rupees ($240) a month.
    At least 255 of the applicants had a doctorate and over 200,000 had master's degrees.
    (AP)
  Health:
  - A national alert is issued in the United Kingdom about a strain of gonorrhea that
    is highly drug resistant after 15 cases are reported in northern England. (AAP
    via SBS)
  - Ebola virus epidemic in West Africa
  - Ebola virus cases in the United States
  - United States authorities announce mandatory Ebola screening will end for travelers
    from Liberia to five U.S. airports, effective September 21, 2015. Screening of
    travelers from Sierra Leone and Guinea will continue. (USA Today)
  International relations:
  - The government of Prime Minister Shinzo Abe moves to enact legislation allowing
    the Japan Self-Defense Forces to serve overseas. Yesterday, fist-fights erupted
    in the parliament over this legislation. (Reuters)
  - European migrant crisis
  - Croatia closes seven out of eight border crossings with Serbia. Zoran Milanović,
    the Prime Minister, says that his country "will move migrants on". (BBC), (BBC)
  - Cuba–United States relations
  - The United States departments of Commerce and Treasury announce removal of a series
    of restrictions on Americans traveling to and doing business with Cuba effective
    September 21, 2015. The U.S. economic embargo, itself, remains in place until
    Congress acts. (USA Today), (Reuters)
  - A Venezuelan Air Force Sukhoi Su-30MKK crashes near the Colombian border after
    an illicit aircraft, probably linked to illicit drugs, enters Venezuelan airspace.
    (Reuters via Daily Mail)
  Law and Crime:
  - Baby Doe, a toddler who was found washed ashore Deer Island in Massachusetts in
    a trash bag, is identified as Bella Bond. (CNN)
  - Phoenix freeway shootings
  - Governor of Arizona Doug Ducey states that 21-year-old Leslie Allen Merritt Jr.
    is ballistically linked to four incidents and arrested in Glendale, Arizona after
    a SWAT raid. Merritt was previously charged twice in 2013, the first for failing
    to stop at the scene of a damaged vehicle, and the second for assault and criminal
    damage. Police state that he is known to hold anti-government and anti-police
    views. He is charged with four counts each of aggravated assault, criminal damage,
    disorderly conduct, discharging a firearm within city limits, carrying out a drive-by
    shooting, and intentional acts of terrorism; and his bail is set at $1 million.
    (ABC15), (KOB), (HEAVY), (ABC News), (Q13FOX), (AZ Central), (CNN), (Yahoo News),
    (NBC News)
  Politics and elections:
  - The President of the United States nominates Eric Fanning as the first openly
    LGBT Secretary of the Army. (Washington Post)
  Sports:
  - In football, Jérôme Valcke steps aside as Secretary General of FIFA while his
    alleged involvement in a ticketing scandal is investigated. (AFP via ABC News
    Australia)
  - In rugby union, the opening ceremony of the 2015 Rugby World Cup is held at Twickenham.
    (The Guardian)
