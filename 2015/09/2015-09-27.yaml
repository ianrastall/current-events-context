Date: '2015-09-27'
Source_URI: Portal:Current events/2015 September 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Air-strikes by Saudi helicopter gunships on the Yemeni village of Bani Zela in
    Yemen's Red Sea border area with Saudi Arabia kill at least 25 people. (Euronews)
  - Central African Republic Civil War (2012-present)
  - Clashes between Christians and Muslims in the capital Bangui leave at least 21
    people dead and over 100 injured. (The Telegraph)
  - War in Afghanistan (2001–2021)
  - Militants reportedly allied to the Islamic State of Iraq and the Levant launch
    coordinated attacks on government positions in the eastern Nangarhar Province
    close to the border with Pakistan. Two police officers are reportedly killed.
    (BBC)
  - Syrian Civil War, Military intervention against ISIL
  - Opération Chammal
  - France says it has carried out its first air-strikes against the Islamic State
    of Iraq and the Levant within Syria, destroying a training camp in the east of
    the country. Previously, France had only carried out air-strikes in Iraq with
    consent of the Iraqi government. (Reuters)
  - Second Libyan Civil War
  - Ten people are dead in Benghazi as a result of fighting between Islamic State
    in Iraq and the Levant and Libyan government forces over the weekend. (Al-Arabiya)
  Disasters and accidents:
  - European migration crisis
  - A boat carrying Syrian migrants sinks in the Aegean Sea between Turkey and Greece
    with seventeen people on board. (Today's Zaman)
  Law and crime:
  - The government of Australia refuses entry to American singer Chris Brown because
    of his 2009 conviction for domestic violence against his then girlfriend Rihanna.
    (ABC News Australia)
  International relations:
  - Guyana–Venezuela relations
  - Guyana's President David Granger accuses Venezuela of massing troops, armored
    vehicles, and rockets along its disputed border. (VICE News)
  Politics and elections:
  - Catalonian parliamentary election, 2015
  - Voters in the Spanish province of Catalonia go to the polls for regional elections
    with nationalist parties to gain a majority which they claim will allow them to
    declare independence. (BBC), (AFP via ABC News Australia), (Euronews)
  Science and technology:
  - September 2015 lunar eclipse
  - The night of September 28 sees a lunar eclipse (sometimes described as a "blood
    moon") with a supermoon. (The Telegraph)
  Sports:
  - In athletics, Eliud Kipchoge of Kenya wins the men's race in the Berlin Marathon
    while his compatriot Gladys Cherono wins the women's race. (Reuters via Yahoo!
    Australia), (Reuters via Daily Mail)
