Date: '2015-09-07'
Source_URI: Portal:Current events/2015 September 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Turkey–PKK conflict
  - Turkish jets strike PKK militant positions across south-east Turkey and northern
    Iraq and deploy special forces to the Iraqi border following a deadly PKK attack
    which left at least 16 Turkish soldiers dead. (Reuters)
  Business and economy:
  - The patent office in India rejects Pfizer's petition for a patent on an arthritis
    drug, tofacitinib, re-affirming their rejection of the same drug in 2011. The
    drug is a chemical reformulation of the active compound in the medicine and thus
    the Indian Patent Office says that the company would have to establish that the
    compound for which it is seeking a patent is therapeutically more effective than
    the active compound. (Reuters)
  Disasters and accidents:
  - Five people are killed as a small plane crashes in western Colorado. (USA Today)
  International relations:
  - European refugee crisis
  - The President of France François Hollande agrees to take 24,000 refugees out of
    the estimated 100,000 per month expected to arrive. (AP via ABC News)
  - Hundreds of people, tired of waiting for promised transportation, broke out from
    Hungary's first migrant holding center near the Serbian border, past police overwhelmed
    by their numbers, to start the march north toward Budapest. The asylum seekers
    / migrants, now accompanied by groups of police, advanced along the edge of the
    main highway to the capital. (AP via Global News)
  - The United Kingdom House of Commons passes a bill to conduct a planned referendum
    on the United Kingdom's continued membership in the European Union. (Reuters via
    Daily Mail)
  Law and Crime:
  - Just before the Brooklyn, New York West Indian J'ouvert Labor Day Carnival, lawyer
    Carey Gabay is shot in the head and critically wounded, caught in crossfire between
    feuding gangs. Two others are wounded in shootings and one man is stabbed to death.
    (ABC News), (Breitbart)
  - In Cass County, Missouri, a family of four is fired upon after they passed a slower
    vehicle, which then pulls up alongside and opens fire, hitting the father and
    a 2-year-old girl. Police believe the motive may have been road rage after flashing
    headlights. (KCTV5)
  Politics and elections:
  - Trinidad and Tobago general election, 2015
  - Voters in Trinidad and Tobago go to the polls for a House of Representatives election
    with the People's National Movement led by Keith Rowley returning to power. (Reuters),
    (Miami Herald)
  - During U.S. Labor Day holiday activities in Boston, President Barack Obama announces
    a new executive order requiring federal government contractors to offer workers
    seven days of paid sick leave per year. On July 1st, Massachusetts became the
    third state, Connecticut and California being the others, with similar requirements.
    (Washington Post) (Huffington Post)
  - In an education scandal in Egypt, a top student, Mariam Malak, says she's a victim
    of corruption and fraud with the school or the examination board purposefully
    swapping her final exam papers with another pupil, while she is thus assigned
    "Zero"-grade for each of the seven subjects. 40,000 online rally for her via a
    Facebook support page while another top student reporting the same complaint.
    (BBC)
  - Hungary's Defense Minister Csaba Hende resigns amid the refugee crisis. Prime
    Minister Viktor Orbán immediately replaced Hende with a member of his Fidesz party,
    István Simicskó. (UPI)
  Science and technology:
  - A bolide or meteor fireball explodes over the Thai city of Bangkok. (The Telegraph)
