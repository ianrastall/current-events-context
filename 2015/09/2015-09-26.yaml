Date: '2015-09-26'
Source_URI: Portal:Current events/2015 September 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Two Saudi border guards, including a district commander, are killed following
    clashes with Yemeni forces near the border with Yemen. (Reuters)
  - Nagorno-Karabakh conflict
  - At least four Armenian soldiers are killed following an Azeri attack near the
    disputed Nagorno-Karabakh region. Yesterday, Azerbaijan shelled several ethnic
    Armenian villages, leaving three civilians dead. (Reuters)
  - Armenia's Defense Ministry declares that it will "use artillery and missiles"
    to repel attacks by Azerbaijan following the deaths of four soldiers in the Nagorno-Karabakh
    region, raising fears of all-out war between the rival countries. (Fox News)
  - A prominent Libyan Zuwarah militia leader and migrant smuggler, Salah Al-Maskhout,
    is reportedly killed in Tripoli by Italian special forces. The EU recently approved
    military action against people smuggling networks operating out of Libya. (Malta
    Today)
  - Turkey–PKK conflict
  - Fighting in the south-eastern Şırnak Province kills thirty-four PKK militants,
    four civilians, and two Turkish soldiers. Also, the Turkish military conducts
    airstrikes on PKK camps in Iraq's northern Dohuk Governorate. (Al Jazeera)
  - Iraqi Civil War (2014–2017)
  - Iraq says that Iran, Russia and Syria are assisting it in its fight with the Islamic
    State in Iraq and the Levant. (Reuters)
  Businesses and economy:
  - Volkswagen emissions violations
  - Porsche announces Oliver Blume to become the next CEO soon. (Bloomberg)
  Disasters and accidents:
  - 2015 Pacific hurricane season
  - Tropical Storm Niala forms off the coast of the Hawaiian islands with the likelihood
    of heavy rain on the island of Hawaii (Big Island) over the weekend. (Accuweather)
  - A fire severely damages the Baitul Futuh Mosque, London, United Kingdom. (BBC
    News Online)
  - 2015 Hajj stampede
  - The death toll from the stampede near Mecca rises to 769, with 934 injuries. (ITV)
  International relations:
  - Russia-Estonia relations
  - Russia and Estonia exchange two convicted spies. (BBC)
  Law and crime:
  - Ahmad al-Faqi is transferred to the International Criminal Court to face trial
    for the war crime of directing the destruction of cultural sites in Timbuktu,
    Mali when the city was under the control of Islamist groups in 2012. (BBC News)
  - A man goes on a shooting spree in Banning, California, U.S., killing two and wounding
    three others. A 35-year-old suspect is taken into custody. The shooting is suspected
    by authorities to be random. (Reuters via Yahoo News)
  Politics and elections:
  - Bolivia's Plurinational Legislative Assembly passes legislation that would amend
    the constitution removing term limits for the President if passed in a referendum
    next year. (Reuters via Daily Mail)
