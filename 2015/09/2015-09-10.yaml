Date: '2015-09-10'
Source_URI: Portal:Current events/2015 September 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Islamic State of Iraq and the Levant
  - ISIL attacks a government held air base near the eastern city of Deir ez-Zor with
    dozens of government loyalists and ISIL militants killed. (Reuters)
  - Operation Martyr Yalçın
  - At least 30 people have been killed in the southeastern Turkish city of Cizre
    following clashes between Turkish security forces and pro-Kurdish Peoples' Democratic
    Party (HDP) supporters. Locals say Cizre has been "under siege" since the military
    imposed a curfew. (BBC)
  - Saudi Arabian-led intervention in Yemen
  - Air strikes target Houthi political leaders and military bases in Sana'a, Yemen.
    (Al Jazeera English Online)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - In Japan, tens of thousands are forced to evacuate due to flooding and landslides
    caused by Tropical Storm Etau. So far, one person is reported as missing. (Radio
    NZ Online), (AP via U.S. News & World Report), (Al Jazeera English Online), (BBC)
  International relations:
  - European migrant crisis
  - Denmark reopens rail services to Germany after closing rail lines and a motorway
    in order to stem the flow of migrants on their way to Sweden. (ITV)
  - President of the United States Barack Obama directs his administration to accept
    at least 10,000 Syrian refugees in the next fiscal year from the United Nations
    High Commissioner for Refugees. (Washington Post)
  - Russia–United States relations
  - The United States expresses concern about alleged escalations of Russian military
    activities in Syria. (Al Jazeera English Online)
  - Joint Comprehensive Plan of Action
  - The United States Senate fails to pass a resolution blocking approval of the nuclear
    agreement with Iran, meaning it will be formally adopted on October 19. (New York
    Times)
  Law and crime:
  - An indigenous Lumad child dies in an evacuation center while the Philippine Senate
    investigates the alleged September 1 murders of an indigenous Lumad family and
    the alleged rape of an indigenous Manobo girl by soldiers and militiamen of the
    Philippine Army. (Rappler), (Mindanao News), (Philippine Daily Inquirer)
  - Azerbaijan jails journalist Khadija Ismayilova after a trial that many believe
    is politically-motivated. (Al Jazeera English Online)
  - Venezuelan opposition leader Leopoldo López is convicted and sentenced to 14 years
    imprisonment for allegedly inciting violence at anti-government rallies. (AP)
  - A U.S. federal jury awards nearly $17.5 million to five former migrant workers
    at a South Florida farm in their case of sexual harassment and abuse in their
    work. (Reuters)
  Politics and elections:
  - Peter Robinson, the First Minister of Northern Ireland, steps aside after the
    Democratic Unionist Party fails to get enough support to adjourn the assembly.
    (BBC)
  Science and technology:
  - Homo naledi
  - Elife publishes a discovery by scientists at the University of the Witwatersrand
    announcing a new species of hominid (Homo naledi) in the Rising Star Cave in South
    Africa. Although the remains have yet to be properly dated, they could be three
    million years old. (BBC) (Al Jazeera English Online)
