Date: '2015-09-02'
Source_URI: Portal:Current events/2015 September 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi Civil War (2014–2017)
  - Masked men in military uniforms kidnap 16 Turkish workers in Baghdad. (AP)
  - Syrian Civil War
  - A car bomb kills at least seven people in the Latakia Governorate. (AFP via Daily
    Star)
  Business and economy:
  - 150 million workers go on strike in India to oppose Prime Minister Narendra Modi's
    labour market reforms. (Voice of America)
  Disasters and accidents:
  - French police arrest an arsonist for a fire in an apartment in the 18th arrondissement
    of Paris which killed eight people.(BBC)
  International relations:
  - Joint Comprehensive Plan of Action
  - Upcoming congressional votes
  - President Barack Obama has sufficient support in the United States Senate to uphold
    a veto of the proposed congressional vote of disapproval of the nuclear deal with
    Iran. (AP)
  Law and crime:
  - Eight people have been killed and over 30 injured in riots in the Indian state
    of Manipur since the passage of three controversial land bills on Monday. (IBN
    Live)
  - Crime in El Salvador
  - There have been 907 deaths last month in El Salvador as a result of gang violence,
    a death rate not seen since the Salvadoran Civil War of the 1980s. (BBC)
  - The Dutch Public Prosecution Service releases a statement that former Deputy Prime
    Minister of the Netherlands Els Borst who was murdered on 8 February 2014, died
    from forty-one stab wounds on her head, neck and hands. (NOS)
  - A French probe into the death of former Palestinian leader Yasser Arafat in 2004
    closes without bringing any new information. (Wires via France 24)
  - A judge orders that President of Guatemala Otto Pérez Molina be detained for his
    alleged role in a corruption scandal. (AP)
  Science and technology:
  - A new study estimates that there are three trillion trees on Earth, with 15 billion
    lost each year to mainly human causes. (Sydney Morning Herald)
  - Russian rocket Soyuz TMA-18M launches a crew of three to the ISS. (Space.com)
  Sports:
  - 2022 Commonwealth Games
  - South Africa will become the first African nation to host the Commonwealth Games
    as Durban is granted the rights to host the games in 2022. (AP via Yahoo! News)
  - Delegates elect Vitaly Mutko to be the President of Russian Football Union. (TASS)
