Date: '2015-09-24'
Source_URI: Portal:Current events/2015 September 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Crisis (2011–present)
  - At least 29 people are killed in a bombing of a mosque in the Yemeni capital Sana'a
    during prayers for Eid al-Adha. (CNN)
  - Nagorno-Karabakh conflict
  - The government of Armenia claims that Azerbaijani forces shelled Tavush Province
    resulting in three deaths. (AFP via France 24)
  - Arab–Israeli conflict
  - Israel's security cabinet issues a three-year temporary order that sets a four-year
    minimum sentence for adult stone- and firebomb-throwers. In addition, new rules
    of engagement allow police to open fire when the life of a third party is under
    threat. (NBC News), (Haaretz), (Newsweek)
  - 2015 Burkinabé coup d'état
  - The coup is reversed. Interim President Michel Kafando and interim Prime Minister
    Yacouba Isaac Zida are reinstalled, and government soldiers are returned to their
    stations. Coup leader Gen. Gilbert Diendéré apologizes for the coup and the week-long
    unrest that killed at least 10 people. The Economic Community of West African
    States (ECOWAS) suggests that elections, originally scheduled for Oct. 11, be
    held Nov. 22, and that candidate eligibility rules be more inclusive. (AP via
    Washington Post), (Reuters), (Big News Network)
  Arts and culture:
  - Pope Francis' visit to the United States
  - 'Pope Francis becomes the first Pope ever to address a Joint Session of the United
    States Congress. Afterwards, he greets onlookers at the National Mall. He addresses
    many issues: abortion and the sanctity of life, the importance of the family and
    of marriage, climate change, immigration and the refugee crises caused by global
    unrest, proper business conduct, and worldwide abolition of capital punishment.
    (AP via MSN), (CNN), (Washington Post), (Time), (Vatican)'
  Business and economy:
  - Caterpillar may cut 10,000 additional jobs through 2018. (BBC)
  Disasters and accidents:
  - 2015 Hajj stampede
  - At least 719 people are dead and 863 people injured in a stampede near Mecca during
    the Hajj pilgrimage in Saudi Arabia. (BBC), (The New York Times), (Washington
    Post)
  - At least four people are killed and 12 critically injured after a charter bus,
    a Ride the Ducks tour vehicle, and two smaller vehicles crash on the Aurora Bridge
    in the U.S. city of Seattle, Washington. (King 5)
  International relations:
  - European migrant crisis
  - Ten thousand migrants enter Hungary, mostly from Croatia, despite efforts by the
    Hungarian government and military to stop them. (AFP via Yahoo! News)
  - Croatia and Serbia restrict cross-border traffic. (Reuters/AFP via ABC News Australia)
  - War in Donbass
  - Luhansk People's Republic officials in Donetsk tell U.N. agencies and several
    other international NGOs to leave the Luhansk region in eastern Ukraine. Despite
    the Minsk Protocol and Minsk II peace agreements low intensity fighting and shelling
    have continued non-stop in the region for over a year. (AP via ABC News)
