Date: '2015-09-20'
Source_URI: Portal:Current events/2015 September 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - At least 14 people are killed as rebels shell a neighborhood in western Aleppo.
    (AP via ABC News)
  - Yemeni Civil War
  - Houthi rebels release six foreign hostages; three Americans, two Saudis, and a
    Briton. (BBC)
  - Boko Haram insurgency
  - Triple explosions kill at least 80 people and injure 150 in the Nigerian city
    of Maiduguri. (Reuters)
  Arts and culture:
  - 67th Primetime Emmy Awards
  - The Emmy Awards are held in Los Angeles with Game of Thrones winning the Emmy
    for best drama series. (ABC News Australia)
  - After having arrived in Havana, Cuba, the day before, Pope Francis, in the third
    trip by an incumbent Pope to Cuba, presides over a Papal Mass in Havana's Plaza
    de la Revolución, and pleads for Colombia and the FARC rebels to make a final
    peace, also noting the better relations between the U.S., which he will visit
    next, and Cuba. He holds a meeting with Cuban President Raúl Castro, and meets
    for a talk and exchange of gifts with former Cuban President Fidel Castro. (ABC),
    (USA Today), (WSJ), (The New York Times)
  Business and economy:
  - Volkswagen emissions violations
  - Volkswagen halts sales of its 4-cylinder diesel vehicles in the United States
    following a U.S. Environmental Protection Agency citation that their cars violated
    U.S. emissions standards. (Auto Guide), (USA Today)
  Disasters and accidents:
  - European migrant crisis
  - Some 26 migrants are feared missing after a dinghy carrying them sinks off the
    coast of the Greek island of Lesbos. The Greek Coast Guard rescued 20 people who
    were spotted in the water by Frontex, EU's border agency. (RTE), (AP via WSB-TV2)
  - At least 13 migrants died when a ferry and their inflatable dinghy collided off
    the northwestern Turkish port of Çanakkale. Twenty people were rescued while another
    13 are still missing. (BBC), (i24 News)
  International relations:
  - European migrant crisis
  - U.S. Secretary of State John Kerry says that the United States will accept 85,000
    refugees from the world in 2016, up from this year's 70,000 refugees, and will
    increase to 100,000 refugees in 2017. (Washington Post)
  - Austrian officials report 11,000 migrants crossed into the country from Hungary
    on Saturday, and another 7,000 are expected today. Seven trains are scheduled
    to transport 3,500 of these travelers to Germany. (CBS News)
  Law and crime:
  - Apple's iOS App Store suffers its first major cyberattack. (Reuters)
  Politics and elections:
  - Greek legislative election, September 2015
  - Voters in Greece go to the polls for the third time this year with Syriza (Coalition
    of the Radical Left) again winning a plurality in the Hellenic Parliament. (The
    Guardian), (The Globe and Mail via Worldwide Herald)
  - Syriza leader Alexis Tsipras, whose resignation last month as prime minister mandated
    this snap election, says a coalition government will again be formed with the
    right-wing populist Independent Greeks (ANEL) party. (Sputnik Media), (The Telegraph)
  - Constitution of Nepal
  - A new constitution comes into effect in Nepal establishing it as a modern secular
    state. (Reuters via Daily Mail)
