Date: '2015-09-25'
Source_URI: Portal:Current events/2015 September 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 Burkinabé coup d'état
  - Burkina Faso's cabinet dissolves the elite presidential guard behind last week's
    coup d'état, creates a commission to investigate these events, and dismisses the
    minister in charge of security. (Reuters)
  - Syrian Civil War
  - New Syrian Forces trade American supplied equipment to the Al Qaeda-linked Nusra
    Front in return for safe passage. (Reuters via Daily Mail)
  Business and economy:
  - The People's Republic of China will launch a cap and trade policy creating a carbon
    market in 2017. (The Guardian)
  - Ukraine selectively bans certain Russian airlines such as Aeroflot and Transaero
    from flying to and through Ukraine. (Ukraine Today)
  Disasters and accidents:
  - 2015 Hajj stampede
  - King Salman of Saudi Arabia orders an investigation into the stampede near Mecca
    which has claimed over 700 lives and caused 800 injuries. (AFP/BBC via ABC News
    Australia)
  - 2015 Southeast Asian haze
  - Singapore closes its primary and secondary schools as smoke from the Indonesian
    fires raises air pollution to hazardous levels. (CNN)
  - Thirty-nine people are injured after an earthquake in the waters off the coast
    of the Indonesian province of West Papua. (New York Daily News)
  - A tornado, with maximum sustained winds of 130 mph, strikes Johns Island, South
    Carolina with no deaths or injuries, but 75 homes are damaged, 10 heavily. (AP,
    via MSN)
  Health:
  - The BBC reports that Nigeria will be removed from the list of countries where
    polio is endemic. (BBC)
  Law and crime:
  - 2015 FIFA corruption case
  - The Office of the Attorney General of Switzerland opens criminal proceedings against
    the President of FIFA Sepp Blatter. (CNN)
  International relations:
  - European migrant crisis
  - Croatia reopens its border with Serbia. (Reuters)
  Politics and elections:
  - Hakubun Shimomura resigns as Japan's Minister of Education, Culture, Sports, Science
    and Technology due to the design for the stadium for the 2020 Summer Olympics
    being abandoned. (Reuters via Yahoo! News)
  - John Boehner schedules his resignation from the position of Speaker of the United
    States House of Representatives and from Congress for the end of October. (The
    New York Times), (Washington Post)
