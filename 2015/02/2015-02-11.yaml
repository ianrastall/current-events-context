Date: '2015-02-11'
Source_URI: Portal:Current events/2015 February 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi clashes and attacks kill at least 31 people. (AP)
  Business and economy:
  - Rite Aid, one of the largest chains of pharmacies in the United States, announces
    that it is purchasing EnvisionRx, a pharmacy benefits manager, from TPG Capital,
    for $2 billion. (Reuters)
  Disasters and accidents:
  - The Greek Coast Guard rescues all 22 crewmen from a Cyprus-flagged vessel Good
    Faith that ran aground on the Greek island of Andros during a storm in the Aegean
    Sea. (AP)
  - A 106-car pileup occurs on Yeongjong Bridge in Incheon, South Korea, leaving two
    men dead and more than 65 people injured. (BBC)
  - Costa Concordia disaster
  - A court in the city of Grosseto convicts the former captain of the Costa Concordia,
    Francesco Schettino, of manslaughter for his part in the ship's January 2012 sinking,
    and sentences him to 16 years in jail. (BBC)
  International relations:
  - Yemeni Crisis (2011–present)
  - The United States, United Kingdom, and France close their Yemeni embassies and
    evacuate their staff due to terrorist activities and continued unrest. (USA Today)
  - General Secretary of the Central Committee of the Communist Party of China Xi
    Jinping will make his first state visit to the United States next September. (AP)
  - War in Donbass
  - Leaders from Germany, France, Russia and Ukraine meet in the Belarusian capital
    Minsk for peace talks. (CNN)
  Law and crime:
  - Police arrest a suspected shooter Craig Stephen Hicks for killing a Muslim family
    of three in Chapel Hill, North Carolina. Police state that the shooting was motivated
    by a long-standing neighbor dispute over parking. (The Independent) (AP)
  - A shooting at a wedding in Newtownbutler, Northern Ireland kills one and injuries
    one while another victim was injured by a knife. (BBC)
  Science and technology:
  - SpaceX launches a weather observation satellite, Deep Space Climate Observatory,
    at 6:03 p.m. EST from Cape Canaveral, Florida (for the US Air Force/NASA/NOAA),
    but postpones making of a second attempt to land a Falcon 9 v1.1 rocket on a floating
    platform called the autonomous spaceport drone ship, following the January 10
    failure during the SpaceX CRS-5 mission. SpaceX instead, attempts a "mock" soft-landing
    into the Atlantic ocean (AP) (AP²)
  Sports:
  - Little League Baseball strips Chicago's Little League championship team Jackie
    Robinson West of their 2014 Little League World Series US title after an investigation
    revealed the team had falsified boundaries to field ineligible players. The league
    names Mountain Ridge Little League of Las Vegas, Nevada, the US champion due to
    the vacating of Jackie Robinson West's wins. (AP) (Little League.org)
