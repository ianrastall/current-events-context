Date: '2015-02-25'
Source_URI: Portal:Current events/2015 February 25
Intelligence_Payload:
  Arts and culture:
  - 2015 Brit Awards
  - American entertainer Madonna falls off stage while performing "Living for Love"
    at the 2015 Brit Awards. (PA via WA Today)
  - Mark Ronson wins Best British single for "Uptown Funk" featuring American singer
    Bruno Mars. (The Guardian)
  - Ed Sheeran wins Best British album for x. (The Guardian)
  Disasters and accidents:
  - At least 187 people are killed in avalanches in northeastern Afghanistan (BBC
    News)
  Health:
  - The Atlanta-based U.S. Centers for Disease Control and Prevention (CDC), were
    so concerned about a study released today in The New England Journal of Medicine,
    that they are launching another new study about why so many people are becoming
    infected by or exposed to the potentially deadly Clostridium difficile ("C. diff.")
    bacterium after going to the doctor's or dentist's office. (CNN) (CDC) (NEJM)
  Law and crime:
  - An arrest warrant is issued for Khaleda Zia, former Prime Minister of Bangladesh,
    after she fails to show up to face graft charges. (BD News)
  - Film director Roman Polanski testifies at a closed to the media court hearing
    in Kraków, Poland, regarding a US request for his extradition over a 1977 child
    sex crime conviction. The hearing is later postponed until April. (The Guardian)
    (CNN)
  - Morgan Stanley agrees to pay $2.6 billion to settle with the United States Department
    of Justice over its sale of residential mortgage backed securities. (Bloomberg)
  - The Austrian Parliament passes a bill, partly aimed at tackling Islamist radicalism,
    that gives Muslims more legal security but bans foreign funding for mosques and
    imams. (BBC)
  - A United States district court judge orders documents turned over to hedge fund
    NML Capital with regard to the flow of funds in a February 9 issuance of Argentina
    dollar denominated sovereign bonds. (Reuters)
  International relations:
  - The Argentine National Congress approves installation of a Chinese satellite tracking
    station in Patagonia. (AP)
  Politics and elections:
  - Faure Gnassingbé, the President of Togo, announces his candidacy for the forthcoming
    election in April. (AFP via Yahoo! News)
