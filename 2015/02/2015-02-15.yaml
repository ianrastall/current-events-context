Date: '2015-02-15'
Source_URI: Portal:Current events/2015 February 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 Copenhagen shootings
  - Danish Police seek a gunman who fired on three people near a Copenhagen synagogue
    a day after the shootings at the Free Speech Gathering. One person dies. (PA via
    The Independent) (The Australian)
  - Danish police kill a man at the Nørrebro train station after an exchange of gunfire.
    The police believe he was the man responsible for the two previous attacks. (Reuters/AFP
    via ABC News Australia) (BBC)
  - Internal conflict in Burma
  - The Myanmar Army kills around a dozen Kokang rebels and capture another eight
    in Kokang offensive. (AFP via Bangkok Post)
  - Boko Haram insurgency
  - A suicide bomber kills seven and wounds 30 in Nigerian city of Damaturu. (BBC)
  - Libyan Civil War (2014–present)
  - The Islamic State releases a video purportedly showing the beheading of 21 Egyptian
    Coptic Christians who had been previously kidnapped in Sirte. (BBC) (Press TV)
  - Egyptian president Abdel Fattah el-Sisi announces a seven-day mourning period
    and calls for a security meeting with the country's top security body. (Reuters)
    (AFP via Yahoo! News)
  Disasters and accidents:
  - A house under construction collapses in the Indian city of Mughalsarai in the
    state of Uttar Pradesh killing twelve people and injuring two. (NDTV)
  Law and crime:
  - A Turkish court remands seventeen police officers into custody for allegedly being
    part of an illegal wiretapping program targeting politicians, bureaucrats, and
    businessmen. (LBC)
  Politics and elections:
  - Hamburg state election, 2015
  - Voters in the German city state of Hamburg go to the polls with the governing
    Social Democratic Party of Germany led by Olaf Scholz retaining power. (Guardian
    Liberty Voice)
  Sports:
  - In ski jumping, Anders Fannemel of Norway sets a new world record with a leap
    of at Vikersund. (BBC)
