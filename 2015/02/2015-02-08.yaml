Date: '2015-02-08'
Source_URI: Portal:Current events/2015 February 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - In Cairo, Egypt, clashes between police and fans of Zamalek SC kill 22 people.
    Egyptian authorities indefinitely suspend football league matches. (BBC) (AP)
  Arts and culture:
  - 57th Annual Grammy Awards
  - The National Academy of Recording Arts and Sciences members present the Grammy
    Awards at the Staples Center in Los Angeles, California. (News Limited)
  - '"Stay with Me (Darkchild Version)" wins Song of the Year and Record of the Year.
    (AP) (AP)'
  - Morning Phase performed by Beck wins Album of the Year. (Reuters via Yahoo!)
  - 68th British Academy Film Awards
  - The British Academy of Film and Television Arts members present the British Academy
    Film Awards at the Royal Opera House in London. (BBC)
  - Boyhood wins Best Film with Richard Linklater winning the Best Director award.
    (The Guardian)
  Sports:
  - The Ivory Coast wins the Africa Cup of Nations, beating Ghana 9–8 on penalties
    after a 0–0 draw. (CAF)
