Date: '2015-02-09'
Source_URI: Portal:Current events/2015 February 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - Fighting in the past 24 hours kills at least nine Ukrainian soldiers. (Reuters)
  - An artillery shell causes a massive explosion at a chemical plant in Donetsk.
    (ABC News)
  - Boko Haram
  - Boko Haram launch a raid on a prison in the town of Diffa in Niger. Authorities
    repel the attack. (AP)
  - Hooded gunmen attack French police in the city of Marseille, which Prime Minister
    Manuel Valls is due to visit. (The Telegraph)
  - Several attacks, including a suicide bombing, kill at least 22 in Baghdad, Iraq,
    in a predominantly Shiite part of the capital. (AP)
  - Members of Ireland's police force Garda Síochána raid the Dublin home of former
    MEP Paul Murphy TD, taking Murphy into custody along with three other activists
    and politicians opposing the water-tax-rate change, stirring nationwide speculation
    of "political policing." The police later release all four without charges. (Independent.IE)
    (The Irish Times) (The Irish Times²)
  - Somali Civil War (2009–present)
  - Islamists from al-Shabab kill a member of the parliament Abdullahi Qayad Barre
    in the capital city of Mogadishu, Somalia. (BBC)
  Business and economy:
  - A Canadian gold mining company, Tahoe Resources, agrees to buy Rio Alto Mining
    for more than CAN$1 billion, part of an ongoing consolidation in the precious
    metals mining industry. (Reuters)
  Disasters and accidents:
  - Mountaineers claim to have found in the Andes the wreckage of LAN Chile Flight
    210 that disappeared in August 1961 killing 24 people on board including eight
    members and two coaches of the Club de Deportes Green Cross football team. (The
    Independent)
  - The U.S. city of Boston, Massachusetts, sets all-time records for amount of snow
    on the ground and amount of snow over 30-day and 40-day periods in 17 days. (WCVB)
    (NBC News)
  - Two buses crash head-on in Bình Thuận’s Hàm Thuận Nam District, Viet Nam, killing
    10 people and injuring 9 others. (Thanh Nien News)
  Law and crime:
  - Samsung reveals potential for next generation smart TVs to eavesdrop. (AP)
  Politics and elections:
  - Bahrain suspends the newly launched Alarab News Channel. On February 1, 2015,
    Alarab's first day of operations, Bahrain's Information Affairs Authority had
    ordered the channel to cease broadcasting since it had not done enough to combat
    “extremism and terrorism.” Alarab had debuted with a Shia opposition politician
    interview. (Al Jazeera) (The Nation)
