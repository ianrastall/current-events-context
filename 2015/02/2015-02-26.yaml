Date: '2015-02-26'
Source_URI: Portal:Current events/2015 February 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - A Taliban suicide bomb attack on a Turkish government vehicle in Kabul kills at
    least one person. (BBC) (NBC News)
  - Islamic State of Iraq and the Levant
  - '"Jihadi John", an ISIL terrorist featured in many beheading videos, is identified
    as Mohammed Emwazi, a Kuwaiti-born man who lived in the United Kingdom and was
    on a terrorism watch list. (The Washington Post) (The New York Times) (CBS News)'
  - ISIS posts a video showing the destruction of Mosul Museum, the second largest
    in Iraq and rich in artifacts from thousands of years of Iraqi history. (National
    Post)
  International relations:
  - French actresses Marion Cotillard and Mélanie Laurent, and French President François
    Hollande begin their two-day state visit to the Philippines, where they are to
    discuss climate change. (GMA News)
  Law and crime:
  - Norwegian police raid the offices of the Catholic Church’s diocese in Oslo, charging
    the church administration with serious fraud under the suspicion of wrongfully
    claiming as much as NOK 50 million in state support by presenting fraudulent membership
    statistics. (NewsInEnglish)
  - The Guardian publishes articles alleging that the Chicago Police Department have
    been running a black site at Homan Square for detained Americans; former justice
    officials call for investigation. The CPD denies the allegations. (The Guardian)
    (The Guardian²) (Chicago Sun-Times)
  - A United Nations report claims that a North Korean shipping company has been renaming
    and reflagging its vessels to avoid an arms embargo. (BBC)
  - Effective midnight, Washington, D.C. joins Alaska, Colorado, and Washington state
    as the only places in the United States that locally purport to override federal
    law and allow the use of marijuana for recreational purposes. (HuffPost)
  Politics and elections:
  - The US Federal Communications Commission votes to classify internet service providers
    as public utilities, creating net neutrality rules. The FCC also votes to preempt
    state laws in North Carolina and Tennessee that effectively prevent municipal
    broadband providers from expanding outside their existing service areas. (AP)
