Date: '2015-02-02'
Source_URI: Portal:Current events/2015 February 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Moro insurgency in the Philippines
  - Foreign investors withdraw "billions of pesos" from the Philippines after a deadly
    battle threatened to derail the March 2014 peace deal. (The Straits Times) (Agence
    France Presse via Yahoo! News)
  - War in Donbass
  - Artillery shelling of Donetsk leaves at least one civilian dead while five Ukrainian
    Army soldiers are killed in heavy fighting. (Reuters via LBC)
  - A shootout between Lesotho Defence Force soldiers and two former bodyguards of
    Prime Minister Tom Thabane leaves at least one bystander killed and three others
    wounded. (Reuters)
  - Islamist insurgency in Nigeria
  - A female suicide bomber attacks minutes after the President of Nigeria leaves
    an election rally in the city of Gombe resulting in at least one death and eighteen
    people injured. (BBC)
  Arts and culture:
  - The four remaining original copies of the Magna Carta go on public display at
    the British Library in London to commemorate the 800th anniversary signing of
    the document in June 1215. (AFP via AsiaOne)
  Business and economy:
  - File sharing site Pirate Bay returns online after having been shut down by Swedish
    authorities in December 2014. (Sydney Morning Herald)
  Disasters and accidents:
  - 2014–15 North American winter
  - A winter storm causes the cancellation of school in the midwestern United States
    and the cancellation of 1,000 flights. (Daily Mail)
  International relations:
  - Gaza–Israel conflict
  - Canadian academic William Schabas resigns as the head of a United Nations committee
    investigating alleged Israeli war crimes in an offensive in the Gaza Strip during
    2014 due to Israel alleging bias due to consultancy work he did for the Palestine
    Liberation Organisation. (Reuters)
  Law and crime:
  - Former International Monetary Fund head Dominique Strauss-Kahn goes on trial in
    France on pimping charges. (BBC)
  - Police in Tupelo, Mississippi, US arrest Thomas Jesse Lee for killing his wife
    and four other members of his family in LaGrange, Georgia. (Fox News)
  Science and technology:
  - Iran successfully puts the Fajr satellite in orbit using a Safir-B1 rocket. (Spaceflight
    Now)
