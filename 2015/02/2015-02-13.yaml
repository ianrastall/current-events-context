Date: '2015-02-13'
Source_URI: Portal:Current events/2015 February 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Internal conflict in Burma
  - Several days of clashes with Kokang rebels in the north of the country kills forty-seven
    Myanmar Army soldiers with dozens wounded. (CNN)
  - Assam conflict
  - A grenade attack by the United Liberation Front of Assam on a family in the town
    of Sepon in India's Assam state kills two people. (NDTV)
  - War in Donbass
  - Ahead of the upcoming February 15 start of the agreed ceasefire, fighting in the
    past 24 hours kills eight Armed Forces of Ukraine service personnel. (Reuters)
  - War in North-West Pakistan
  - Pakistan announces the arrest of twelve Tehrik-i-Taliban Pakistan in relation
    to their alleged involvement in last year's school massacre. (Al Jazeera)
  - Police and gunmen exchange gunfire in Peshawar after an explosion is reported
    at a nearby Shia mosque. (BBC)
  - Boko Haram insurgency
  - Boko Haram militants attack Chad for the first time after 30 fighters crossed
    Lake Chad in four motorboats and attacked the village of Ngouboua. Chad recently
    joined Nigeria, Niger, and Cameroon in a military coalition against Boko Haram.
    (BBC)
  Business and economy:
  - Fitch Ratings downgrades Ukraine's credit rating to junk bond status predicting
    it is likely to default on its debts. (AFP via France 24)
  Disasters and accidents:
  - A bus crashes with a freight train in the Mexican state of Nuevo León, killing
    at least sixteen people and injuring 30. (Reuters)
  Health:
  - Ebola virus epidemic in West Africa
  - Sierra Leone quarantines 700 homes in the Aberdeen district of Freetown following
    the death of a fisherman. (AFP via West Australian)
  International relations:
  - United Nations negotiators produce an early draft on an agreement to be put to
    a conference on climate change in Paris in December. (AP)
  Law and crime:
  - An Egyptian court orders the release from prison of Canadian journalist Mohamed
    Fahmy in Cairo. (CP via CP24)
  Politics and elections:
  - The Queensland Labor Party led by Annastacia Palaszczuk will be in a position
    to form a minority government after the polls are declared in the Queensland state
    election. (ABC Australia)
  - Voters elect Wang Rong Chairman of the People's Political Consultative Conference
    of Guangdong province, in China, replacing Zhu Mingguo, who was dismissed for
    corruption. (SCMP)
  - The Governor of Oregon John Kitzhaber resigns amid allegations his fiancee used
    taxpayer resources to aid her green-energy consulting business. Kate Brown moves
    up to Governor from being the Secretary of State. (AP) (AP²) (The New York Times)
