Date: '2015-02-01'
Source_URI: Portal:Current events/2015 February 1
Intelligence_Payload:
  Business and economy:
  - The United Steelworkers union strikes against Royal Dutch Shell Plc at nine U.S.
    oil and chemical plants. Up until recently oil prices had undergone steep drops
    since June, but the union's action as part of the supply chain caused the market
    price to soar more than eight percent. (Reuters)
  - Quintana Roo switches to the Southeastern Time Zone, which has the same effect
    as observing Eastern Standard Time year-round, to boost tourism. (UPI)
  Law and crime:
  - Egypt deports Australian journalist Peter Greste after being jailed with two al-Jazeera
    colleagues Mohamed Fahmy and Baher Mohamed 400 days before. (BBC)
  - Four-hundred African migrants charge past Moroccan border forces by throwing rocks,
    trying to storm border fences separating Spain's North African enclave Melilla,
    but Spanish guards repel them. (AP via Fox News)
  Politics and elections:
  - Pro-democracy protesters peacefully return to the streets of Hong Kong for the
    first time since the end of Occupy Central protests in December. (AFP France 24)
    (Reuters)
  Sports:
  - 2015 Australian Open
  - In tennis, Novak Djokovic of Serbia beats Andy Murray of the United Kingdom in
    the Australian Open Men's Singles Final. Djokovic is the first man to win five
    Australian Open championships in the open era. (ABC News) (The Guardian)
  - Super Bowl XLIX
  - In American football, the New England Patriots defeat the Seattle Seahawks 28–24
    in the Super Bowl at the University of Phoenix Stadium in Glendale, Arizona. (BBC)
    (NFL)
  - Patriots quarterback Tom Brady wins his third MVP award at a Super Bowl and becomes
    the third quarterback to win four Super Bowls after Joe Montana and Terry Bradshaw.
    (Sports International)
  - 2015 World Men's Handball Championship
  - In handball, France beats Qatar in the final to win a record fifth world championship.
    (Gulf Times)
  - Poland wins the bronze medal having beaten Spain by 29–28. (marca.com)
