Date: '2015-02-07'
Source_URI: Portal:Current events/2015 February 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - North Korea and weapons of mass destruction
  - North Korea test fires a new "ultra-precision" intelligent anti-ship missile which
    is to be deployed across its navy. (AFP via France 24)
  - War in Donbass
  - The leaders of France, Germany and Russia agree to work on a peace plan to be
    put to the President of Ukraine Petro Poroshenko on Sunday. (BBC)
  - Islamic State of Iraq and the Levant
  - Bombings in Baghdad kill at least 37 people hours before the city's curfew was
    due to end. ISIL claims responsibility. (AP via Los Angeles Times) (AP via KSL)
  - Islamist insurgency in Nigeria
  - Nigeria postpones its general election for six weeks to allow its armed forces
    to take control of the Boko Haram-controlled parts of the country. (Irish Times)
  Arts and culture:
  - NBC Nightly News anchorman Brian Williams begins a temporary hiatus from broadcasting
    after he was caught lying about having been on board an underfire helicopter which
    crashed during the 2003 invasion of Iraq. (AP)
  Business and economy:
  - The management of Twentieth Century Fox considers granting permission to a group
    of investors, including some hedge funds, seeking to amend the company's charter
    and turn their type of voting shares of stock into non-voting shares, a conversion
    that might raise that type of shares' market price and that also would further
    concentrate control in the hands of Rupert Murdoch and his family. (Reuters)
  Disasters and accidents:
  - TransAsia cancels dozens of flights to retrain its pilots following the February
    4 crash of TransAsia Airways Flight 235 which killed at least 43 people. (AFP
    via Daily Mail)
  Law and crime:
  - A gunman shoots six people, killing four, including several children, in Douglasville,
    Georgia, ending with the gunman committing suicide. (AP via FOX News)
  - A 17-year-old male opens fire on a man at the Monroeville Mall in the Pittsburgh,
    Pennsylvania area, striking his intended target as well as two bystanders hospitalizing
    three people. (AP via News24) (Pittsburgh Post-Gazette)
  Politics and elections:
  - Queensland Liberal National Party voters elect Lawrence Springborg as their leader
    with John-Paul Langbroek as deputy leader. (ABC News Australia)
  - Slovak same-sex marriage referendum
  - Although greater than 90% vote in favor of the referendum, Slovak election officials
    deem the result invalid due to a low 21% voter turnout, far short of the 50% or
    greater turnout required for the results to be legally binding. (The Slovak Spectator)
