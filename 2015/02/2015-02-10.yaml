Date: '2015-02-10'
Source_URI: Portal:Current events/2015 February 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - Fighting kills fifteen people and leaves 60 injured as missiles hit Ukraine's
    military headquarters in the city of Kramatorsk. (Radio Free Europe)
  - The Obama Administration announces the creation of the Cyber Threat Intelligence
    Integration Center, a new United States federal government agency that will be
    a fusion center between existing agencies and the private sector for real-time
    use against cyber attacks. (Reuters)
  - Islamic State of Iraq and the Levant
  - The United States confirms the death of ISIL hostage Kayla Mueller. (Fox News)
  Arts and culture:
  - NBC Nightly News suspends American newsreader Brian Williams from broadcasting
    for six months for exaggerating a story about his personal experiences on a helicopter
    during the 2003 invasion of Iraq. (AP)
  - American comedian and satirist Jon Stewart, host of Comedy Central's The Daily
    Show, announces his departure from the show, which is due to take place at the
    end of the year. (Reuters)
  - The European Broadcasting Union announces that Australia will participate in the
    Eurovision Song Contest for the first time in Vienna 2015; it will be the first
    country ever outside of the European Broadcasting Area, as well as the first associated
    member of the EBU, to participate. (Eurovision.tv) (ESC Today)
  Business and economy:
  - Apple, Inc. becomes the first company in the world to close with a market capitalization
    over $700 billion. (AP)
  International relations:
  - Wang Yu-chi resigns as Taiwan's Minister of the Mainland Affairs Council responsible
    for maintaining relations with the People's Republic of China. (Reuters)
  Law and crime:
  - The Federal Court of Malaysia rejects opposition leader Anwar Ibrahim's appeal
    against sodomy charges meaning he will start serving a five-year sentence. (Reuters)
  - Manhattan District Attorney Cyrus Vance Jr. states that a 50-person bribery case
    involves New York City inspectors, landlords, and contractors with payoffs to
    get safety violations dismissed and procure phony eviction orders. (AP)
  Politics and elections:
  - The February 7 Delhi Legislative Assembly election results in the Aam Aadmi Party
    leading in 63 out of 70 seats. (BBC)
