Date: '2015-02-03'
Source_URI: Portal:Current events/2015 February 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - In the town of Chuddogram in eastern Bangladesh, anti-government protesters firebomb
    a bus full of sleeping passengers, leaving seven people dead. (AFP via ABC News)
  - Egyptian Army soldiers fire warning shots at the Gaza Strip after an explosion
    occurs on the Gaza side of the border near a convoy. (Reuters)
  - Islamic State of Iraq and the Levant
  - The Islamic State of Iraq and the Levant posts pictures of Jordanian Air Force
    pilot Muath Al-Kasasbeh being burnt alive which Jordan believes are a month old.
    (BBC)
  Arts and culture:
  - American author Harper Lee announced plans to publish her second book, a sequel
    to To Kill a Mockingbird, that was completed in the 1950s but misplaced. July
    14, 2015 will be the release date for Go Set a Watchman. (The Telegraph) (ABC
    News)
  Disasters and accidents:
  - 2014–15 Australian bushfire season
  - The Department of Fire and Emergency Services orders the evacuation of residents
    of the Western Australia town of Northcliffe as a bushfire approaches. (Perth
    Now)
  - An explosion at the Galleria 220 shopping center in the Perth suburb of Morley
    kills at least one person and injures nine others. (News Limited)
  - 2014–15 North American winter
  - Ten people die in Cook County, Illinois while shoveling snow. (Chicago Tribune)
  - A collision between a commuter train and a passenger vehicle kills six in Valhalla,
    New York. (AP via MSN) (CBS Local)
  International relations:
  - The Iranian parliament passes a new bill that requires the Rouhani administration
    to cancel the Geneva interim agreement on the Iranian nuclear program in case
    of new US sanctions, as a response to a similar action by the Congress. (Icana)
  Law and crime:
  - Standard & Poor's reaches settlements totaling $1.5 billion with the U.S. Justice
    Department and several U.S. states for inflating ratings on subprime mortgage
    bonds in the lead-up to the 2008 financial crisis. (Bloomberg)
  - The investigator into the death of Argentinian prosecutor Alberto Nisman states
    that Nisman had drafted a request that President Cristina Fernandez be arrested
    for allegedly attempting to derail his investigation of the 1994 AMIA bombing
    that killed 85 people. (Reuters)
  Politics and elections:
  - John Baird resigns as the Canadian Minister of Foreign Affairs. (Daily Mail)
