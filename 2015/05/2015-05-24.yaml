Date: '2015-05-24'
Source_URI: Portal:Current events/2015 May 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - At least ten Afghan police officers are killed in a Taliban attack on checkpoints
    in Helmand Province. (AP via Fox News)
  - 2015 Burundian unrest
  - The Burundi opposition suspends talks with the Government of President Pierre
    Nkurunziza following the assassination of opposition leader Zedi Feruzi of the
    Union for Peace and Development party yesterday. (CNN)
  - Syrian Civil War
  - A Syrian military helicopter crashes near the town of Kweiras killing all on board.
    (AP)
  Arts and culture:
  - Dheepan, a French film directed by Jacques Audiard, wins the Palme d'Or at the
    2015 Cannes Film Festival. (The Guardian)
  Disasters and accidents:
  - Flash floods and heavy storms in the American states of Texas and Oklahoma claim
    at least two lives with at least eight people missing and hundreds of homes destroyed.
    (AP via Yahoo!) (CNN) (KXAN)
  International relations:
  - Feminist activists including Gloria Steinem cross the Korean Demilitarized Zone
    by bus after being denied permission to walk across. (AP via US News and World
    Report)
  Law and crime:
  - Authorities in Malaysia find mass graves in more than a dozen camps near the border
    with Thailand where Rohingya migrants are held. (AP)
  Politics and elections:
  - Polish presidential election, 2015
  - Voters in Poland go to the polls for the second round of a Presidential election
    between President Bronisław Komorowski and challenger Andrzej Duda with exit polls
    showing Duda ahead. (BBC) (AP) (AP via WTOP)
  - Ethiopian general election, 2015
  - Voters in Ethiopia go to the polls for a general election with the ruling Ethiopian
    Peoples' Revolutionary Democratic Front facing no viable opposition. (The Guardian)
  Science:
  - Nobel Prize winner John Forbes Nash, Jr. and his wife Alicia died in a taxi accident.
    (The New York Times)
  Sports:
  - 2015 Monaco Grand Prix
  - Nico Rosberg of Mercedes wins the 2015 Monaco Grand Prix ahead of third placed
    team mate Lewis Hamilton who started in pole position. (BBC)
  - 2015 Indianapolis 500
  - 2000 winner Juan Pablo Montoya holds off teammate Will Power by 0.105 seconds
    to win the 2015 Indianapolis 500. 2008 winner Scott Dixon started on the pole
    position and finished fourth. Concerns about safety had been raised after several
    practice crashes before the race, including one that hospitalized James Hinchcliffe.
    (ESPN)
  - A pit-road collision between the vehicles of James Davison and Pippa Mann results
    in the injury of two pit crew members on the team of Tristan Vautier. Greg Senerius
    was treated and released on-track for a foot injury, and Daniel Jang was transported
    to a hospital for evaluation. (ESPN)
  - 2015 Coca-Cola 600
  - The 2015 Coca-Cola 600 occurs today with 2000 winner Matt Kenseth on the pole
    position. Carl Edwards won the race. (ESPN)
  - 2015 French Open
  - The French Open gets underway at Stade Roland Garros with Rafael Nadal and Maria
    Sharapova the defending champions in men's and women's singles. (Tennis.com)
