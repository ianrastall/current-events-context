Date: '2015-05-29'
Source_URI: Portal:Current events/2015 May 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant
  - Singapore says the Islamist group plans to take the conflict into Southeast Asia.
    (Straits Times)
  - Dammam Mosque bomb blast:Islamic State claims responsibility for a car bomb in
    the parking lot of the Imam Hussain Mosque situated in Dammam, Saudi Arabia, during
    Friday prayers, with at least four people killed and dozens injured. Authorities
    state that the mosque itself was not hit. (The Express Tribune), (CNN)
  - Balochistan conflict
  - Gunmen in Pakistan's Balochistan Province attack two buses killing at least 19
    people. (BBC)
  Disasters and accidents:
  - A volcano erupts on the Japanese island of Kuchinoerabu-jima prompting the evacuation
    of all residents and the diversion of all flights. (Kyodo via Japan Times), (GMA
    Network)
  - 2015 Texas–Oklahoma flood and tornado outbreak
  - Dozens of people are rescued in the US state of Texas. The death toll from floods
    in Texas and Oklahoma has reached 24 dead with 13 missing with another 15 people
    dead from tornadoes in northern Mexico and Texas. (NBC News)
  - The Governor of Texas Greg Abbott asks for a Presidential declaration of a disaster
    to obtain United States Government assistance for the worst affected areas of
    the state. (AP)
  - 2015 Indian heat wave
  - The official death toll from the Indian heat wave passes 1,800 making it the deadliest
    heatwave in more than two decades. (AFP via Yahoo! News)
  Health:
  - The number of cases in an outbreak of Middle East respiratory syndrome in South
    Korea rises to 12. (Yonhap News)
  International relations:
  - 2015 Rohingya refugee crisis
  - Thailand will allow the United States to fly surveillance planes through their
    airspace, allowing the United States to identify boats carrying refugees. (ITV)
  - Irish Naval Service patrol vessel LÉ Eithne rescues 300 migrants in the Mediterranean
    Sea off the coast of Libya. (BBC)
  - The United States officially removes Cuba from its list of State Sponsors of Terrorism.
    (NBC News)
  - War in Donbass
  - The President of France François Hollande and the Chancellor of Germany Angela
    Merkel call on the President of Russia Vladimir Putin to implement measures agreed
    on the Minsk ceasefire. (Reuters)
  - Russia blacklists dozens of European Union officials from entering the country.
    (AFP via France 24)
  Law and crime:
  - Silk Road founder Ross Ulbricht is given a life sentence after being convicted
    for narcotics trafficking. (The Verge)
  - American television actor Dustin Diamond is convicted of two misdemeanor charges
    stemming from a stabbing at a Wisconsin bar last year but acquitted on felony
    charges. (AP)
  Politics and elections:
  - Muhammadu Buhari is sworn in as the President of Nigeria following a recent election.
    (AP)
  - Democratic Party presidential primaries, 2016
  - Former Governor of Maryland Martin O'Malley will announce his candidacy for President
    of the United States at 10:00 am on May 30. (USA Today)
  Sports:
  - Sepp Blatter is elected to a fifth term as president of FIFA after Prince Ali
    bin Hussein withdraws his candidacy before a second round of voting could take
    place. The first round of voting had ended with Blatter falling seven votes short
    of the 2/3 majority needed to win. (ESPN), (CNN)
