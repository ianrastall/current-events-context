Date: '2015-05-25'
Source_URI: Portal:Current events/2015 May 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Turkey says that it has reached an in-principle deal with the United States to
    give support to some elements of Syrian opposition. Over a million Syrian refugees
    live in Turkish territory, including many Syrian opposition figures. (Reuters
    via Yahoo! News)
  - A Tunisian Army soldier is killed after a shooting rampage in which 7 fellow soldiers
    are killed and 10 others injured in their barracks in Tunis. (AP via Fox News)
    (AFP via News24)
  - Islamic State of Iraq and the Levant
  - Close to 55,000 people have fled the Iraqi city of Ramadi since it was captured
    by Islamic State. (CNN)
  Arts and culture:
  - Australia announces that it will repatriate the bodies of up to 25 soldiers killed
    in the early stages of the Vietnam War. (AP via Yahoo! News)
  Disasters and accidents:
  - Nine railway carriages of the Muri Express derail in Uttar Pradesh's Kaushambi
    district, killing one and injuring more than 100 people. (Zee News)
  - Tornadoes of 2015
  - A tornado kills at least thirteen people in the Mexican city of Ciudad Acuña and
    injures 88. (Reuters)
  - 2015 India heat wave
  - The death toll from an Indian heat wave rises to 432 in the states of Andhra Pradesh
    and Telangana with extreme conditions forecast to continue. (Times of India)
  - At least 38 people are killed and 6 injured in a nursing home fire in Lushan County
    of China's Henan Province. (BBC)
  - Emergency workers have recovered the final bodies from a collapsed gold mine in
    Colombia with 15 people recovered. (France 24)
  International relations:
  - Malaysia summons a Philippines diplomat over a dispute regarding the ownership
    of Sabah. (Rappler)
  - The People's Republic of China lodges an official complaint with the United States
    over a flight by an alleged spy plane over parts of the South China Sea. (Reuters)
  - The government of Sudan denies allegations from South Sudan that it is supporting
    rebels threatening oil fields in its southern neighbour. (Reuters via Daily Star)
  Law and crime:
  - Malaysia announces the discovery of 139 mass graves near the border with Thailand
    with some graves containing more than one body. (Reuters viaDaily Mail)
  - Former Prime Minister of Israel Ehud Olmert is sentenced to eight months in jail
    following a conviction on corruption charges for unlawfully accepting multiple
    envelopes with cash from an American supporter. There are 3 more criminals prosecutions
    against him. (BBC), (AP via The Guardian)
  Politics:
  - David Cameron, the Prime Minister of the United Kingdom, outlines who will be
    able to vote in the referendum on the United Kingdom remaining a member of the
    European Union with the vote restricted to those eligible to vote in British elections
    rather than European Parliament elections. (AP via WTOP)
  - Surinamese general election, 2015
  - Voters in Suriname go to the polls for a general election. (AFP via Yahoo! News)
  - Two recent polls indicate that the ruling party in Republic of Turkey, the Justice
    and Development Party of Recep Tayyip Erdoğan, is in danger of losing its parliamentary
    majority in the June 7 election. (Reuters)
