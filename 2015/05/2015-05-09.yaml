Date: '2015-05-09'
Source_URI: Portal:Current events/2015 May 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - North Korea claims to have successfully test fired a ballistic missile from a
    submarine. (CNN)
  - Ongoing insurgency in Kumanovo between the National Liberation Army and the Macedonian
    army. 3 policemen are reported to have been killed. (CNN/N1INFO) (International
    Business Times)
  - Iraqi insurgency (2011–2013)
  - At least 6 guards and 30 prisoners are killed in an Iraq prison break while 40
    prisoners escape. (AP via ABC News America)
  - War in Donbass
  - Alexander Zakharchenko, leader of the rebel Donetsk People's Republic said the
    insurgents had released two American aid workers. (AP via Yahoo! News)
  - Naxalite–Maoist insurgency
  - Naxalite Maoists are holding 250 villagers hostage to protest the building of
    a bridge in India's Chhattisgarh state. (AP)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Thousands of people are evacuated from the Philippines island of Luzon ahead of
    Typhoon Noul (Dodong). (Reuters via Daily Mail)
  - 2015 Atlantic hurricane season
  - Tropical storm Ana forms near the states of North and South Carolina weeks before
    the official start of the hurricane season. (Accuweather)
  - An Airbus A400M Atlas military transport aircraft crashes near the Spanish city
    of Seville with three people onboard killed. (The Telegraph)
  - Tornadoes of 2015
  - At least one person is killed and another injured in a tornado in the town of
    Cisco, Texas with tornadoes also reported in eastern Colorado. (CNN)
  - Ten people are killed after a wall collapses on a construction project in China's
    Shandong province. (AP via ABC News America)
  Health:
  - Ebola virus epidemic in West Africa
  - The World Health Organization declares that the outbreak of the Ebola virus has
    ceased in Liberia after weeks of no cases there. (BBC)
  International relations:
  - Russia stages its biggest ever military parade in Moscow's Red Square to commemorate
    the 70th anniversary of Victory Day despite a boycott by many western world leaders
    due to Russian involvement in the Ukrainian crisis. (BBC)
  Law and crime:
  - Former President of Egypt Hosni Mubarak and his two sons are sentenced to three
    years imprisonment and a fine for corruption. (AP via Washington Post)
  - A man is arrested in Paraguay for allegedly raping and impregnating his ten-year-old
    stepdaughter. (AFP via ABC Online)
  - Two police officers are shot dead in the American town of Hattiesburg, Mississippi.
    (AP via ABC News America)
  Politics and elections:
  - The Moro Islamic Liberation Front registers the United Bangsamoro Justice Party
    as its vehicle to run in future elections in the Philippines. (Inquirer)
  Sport:
  - In cycling, the 2015 Giro d'Italia gets underway at San Lorenzo al Mare. (ABC
    News Australia)
