Date: '2015-05-17'
Source_URI: Portal:Current events/2015 May 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - A suicide attack by the Taliban kills three and injures at least eighteen outside
    Kabul International Airport in Afghanistan. (BBC News)
  - The Islamic State reportedly seizes control of the Iraqi city of Ramadi after
    the retreat of government forces. (BBC News)
  Arts and culture:
  - Pope Francis of the Roman Catholic Church canonises two saints from Palestine,
    Sister Mariam Baouardy and Sister Marie Alphonsine Ghattas. (AP via Ten Play)
  - 2015 Billboard Music Awards
  - American pop music star Taylor Swift wins 8 awards at the Billboard Music Awards,
    including top artist. (The Independent)
  Law and crime:
  - 2015 Waco shootout
  - At least 9 people are killed and 18 injured, some by law enforcement and others
    in gunfire exchanges, in a shootout between rival biker gangs in Waco, Texas,
    at the Twin Peaks Restaurant. (KWTX) (The Guardian)
  - At least 25 members of outlaw motorcycle clubs are being held as witnesses and
    possible suspects. (Austin American-Statesman)
  Health:
  - A 'groundbreaking' combination of lumacaftor and ivacaftor could improve the quality
    of life and life expectancy of cystic fibrosis sufferers is trialed. (BBC News)
  Politics:
  - A large rally is held by tens of thousands of protestors in Skopje, Macedonia,
    as part of the ongoing protests against Prime Minister Nikola Gruevski. (BBC News)
  - A referendum was held in Osaka, Japan to mandate the implementation of the Osaka
    Metropolis plan. The proposal was defeated by 50.38% to 49.62%. Osaka Mayor Toru
    Hashimoto announced retirement from politics by the end of his term in December
    2015. (Japan Times) (Yomiuri Shimbun)
  Science:
  - Roscosmos manages to restart the engines of the Progress spacecraft and to correct
    the orbit of the International Space Station. (AFP via Yahoo! News)
  Sports:
  - In ice hockey, Canada wins gold over Russia at the 2015 IIHF World Championship,
    while the United States wins bronze over the Czech Republic. Canada's Sidney Crosby
    becomes the newest member of the Triple Gold Club, the group of players and coaches
    who have won gold medals at both the World Championship and Olympics, plus the
    Stanley Cup. (Sportsnet)
  - 2014–15 A-League
  - In football (soccer), Melbourne Victory FC defeats Sydney FC 3–0 in the Grand
    Final of the Australian A-League with Victory captain Mark Milligan winning man-of-the-match.
    (ABC News)
