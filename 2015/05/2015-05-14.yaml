Date: '2015-05-14'
Source_URI: Portal:Current events/2015 May 14
Intelligence_Payload:
  Arts and culture:
  - Blues legend B.B. King dies at the age of 89. (BBC)
  Disasters and accidents:
  - In New Zealand's North Island heavy rains cause flooding on the Kapiti Coast in
    the Wellington Region prompting evacuations and closing road and rail links. (TVNZ)
    (Fairfax New Zealand)
  - 2015 Philadelphia train derailment
  - The death toll from the derailment rises to eight, with 43 of the more than 200
    injured remaining hospitalised. (The Guardian)
  International relations:
  - U.S. President Barack Obama meets with the Gulf Cooperation Council at the White
    House with a proposed nuclear deal with Iran top of the agenda.(CNN)
  - Malaysia turns away two boats with more than 800 Rohingya and Bangladesh migrants
    abandoned at sea by human traffickers. (AP)
