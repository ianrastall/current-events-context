Date: '2015-05-22'
Source_URI: Portal:Current events/2015 May 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant captures the border crossing at Al Waleed
    (al-Tanf in Syria), the last remaining border crossing between Syria and Iraq
    controlled by the Government of Syria. ISIL reportedly advances to within 40 km
    of Baghdad after their victory in Ramadi. (BBC)
  - A suicide bomber targeting Shiites at a mosque in Qatif, Saudi Arabia, has killed
    19 and injured 28, per Red Crescent authorities. (Irish Independent)
  - Mexican Drug War
  - At least 42 members of the Jalisco New Generation Cartel and two Federal Police
    officers are killed in a shootout in the state of Michoacán. The death toll is
    preliminary and is expected to rise. (Reuters)
  Business:
  - Li Hejun, formerly China's richest man, loses an estimated US$14 billion when
    his energy shares plunge nearly 50%. (Forbes)
  Disasters and accidents:
  - Surrounding areas of Wembley Stadium, London, UK have been evacuated following
    the discovery by construction crews of a still-live World War II-era 50-kg (110-llb)
    conventional-explosive bomb, a remnant of the Blitz. (MSN)
  - The Myanmar Navy rescues two boats carrying 208 migrants as it faces growing international
    pressure to tackle the Rohingya migration crisis. (AFP via Yahoo! News)
  - Over 3,000 cases of cholera resulting in at least 31 deaths breaks out in a refugee
    camp for Burundians fleeing the recent political unrest in their country. (Al
    Jazeera)
  Politics:
  - Voters in Ireland go to the polls to vote on constitutional referendums, including
    one that would allow same-sex marriage. (BBC)
  - The United States Senate passes legislation to allow President Barack Obama to
    fast track trade negotiations with other countries. (AP via ABC News America)
  Science:
  - Science publishes a series of papers on biodiversity in the deep sea, including
    tens of thousands of single-celled organisms most of which had not been previously
    identified. (BBC)
  Sports:
  - In cricket, Pakistan plays a Twenty20 match against Zimbabwe at Lahore. This is
    the first time a test playing nation toured Pakistan for a cricket match since
    the 2009 attack on the Sri Lanka national cricket team. (IndiaTV)
