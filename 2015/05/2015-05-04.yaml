Date: '2015-05-04'
Source_URI: Portal:Current events/2015 May 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Curtis Culwell Center attack
  - One of the two attackers, Elton Simpson, had linked himself to ISIL on Twitter
    before his attack on the exhibition of drawings of the prophet Mohammed at the
    Curtis Culwell Center in Garland, Texas. He had been a member of a since-closed
    Phoenix mosque; he and his partner, 34-year-old Nadir Hamid Soofi, who had gone
    to college in Utah, had been known to and were investigated by law enforcement,
    but nevertheless, officers did not know that they were planning an imminent attack
    of this type, and they were not thought to be an imminent threat, despite having
    admired the late Anwar al-Awlaki, and swearing loyalty to Abu Bakr al-Baghdadi,
    prominent figures in al-Qaeda in Iraq and in ISIL, respectively. (CNN)
  Arts and culture:
  - It is announced that the daughter of the Duke of Cambridge and Catherine, Duchess
    of Cambridge, has been named Charlotte Elizabeth Diana, named after her grandfather,
    grandmother, and great grandmother. (News Limited)
  Disasters and accidents:
  - Italy reports that ten people have died and 5,800 people have been rescued in
    the Mediterranean Sea as people smugglers attempt to take advantage of calmer
    waters. (Reuters)
  Health:
  - An analysis of drinking water from three homes in Bradford County, Pennsylvania
    revealed traces of a compound commonly found in Marcellus Shale drilling fluids.
    The paper in the Proceedings of the National Academy of Sciences (PNAS) addresses
    the potential risks to underground drinking water from the drilling technique
    fracking. (New York Times)
  Politics and elections:
  - 2016 United States Presidential election
  - Former Hewlett-Packard Chief Executive Officer Carly Fiorina announces that she
    will be seeking the Republican Party nomination for the 2016 presidential election.
    (CNN)
  Sport:
  - In basketball, Stephen Curry of the Golden State Warriors is named as Most Valuable
    Player of the North American National Basketball Association for the 2014–15 NBA
    season. (AP via Yahoo! News)
  - Stuart Bingham wins the 2015 World Snooker Championship defeating Shaun Murphy
    in the final. (World Snooker)
