Date: '2015-05-19'
Source_URI: Portal:Current events/2015 May 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Russian embassy in Damascus is shelled. (RT)
  Business and economy:
  - The inflation rate in the United Kingdom goes to -0.1 in April, marking the first
    time since 1960 it has been negative. (BBC)
  - Takata Corporation doubles the size of its recall of faulty airbags in the United
    States with 34 million vehicles to be recalled. (Wall Street Journal)
  - The Los Angeles City Council votes to increase the minimum wage in the American
    city of Los Angeles, California, to $15 an hour by 2020. (New York Times)
  Disasters and accidents:
  - More than 20 garment workers are killed after a bus that they were travelling
    to work in collides with a tourist bus in Cambodia's Svay Rieng Province. (Cambodia
    Daily)
  - The death toll from landslides in the Colombian town of Salgar rises to 56 with
    scores missing. (Agencies via Al Jazeera)
  - Germanwings Flight 9525
  - French prosecutors say the passengers onboard the Germanwings flight that crashed
    in southern France have all been identified, and their bodies can be returned
    home to their families. (Reuters via Daily Mail)
  - At least 16 people are killed and scores are injured in a residential building
    fire in Baku, Azerbaijan. (Reuters UK)
  - Norwegian Cruise Line's Norwegian Dawn ran aground three miles off Bermuda when
    departing for a return trip to Boston, Massachusetts, U.S.A.. (Boston Herald)
    (Irish Independent)
  International relations:
  - Prince Charles becomes the first member of the British Royal Family to meet with
    Gerry Adams, the President of Sinn Féin, during a two-day visit to Ireland. (AFP
    via ABC News)
  Law and crime:
  - Former nurse Victorino Chua has been found guilty of murder and poisoning patients
    at Stepping Hill Hospital in Stockport, Greater Manchester, U.K., and sentenced
    to 35 years in jail. (BBC)
  - Police arrest more than 50 people following a probe into match fixing in Italian
    football. (BBC)
  - Mohawk Industries and five other companies agree to pay $275.5 million to settle
    lawsuits related to alleged price fixing of polyurethane foam. (Reuters)
  Politics and elections:
  - The President of Burundi Pierre Nkurunziza says that the government will proceed
    with a presidential election despite protests and a recent failed coup. (BBC)
  - The United States Congress sends a human trafficking bill to President Barack
    Obama for signature. (Washington Times)
  Sports:
  - Deflategate
  - In American football, Robert Kraft, the owner of the New England Patriots, says
    that team will not appeal the National Football League ruling. (ESPN)
