Date: '2015-05-11'
Source_URI: Portal:Current events/2015 May 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Han Min-goo, the South Korean Minister for National Defense states that South
    Korea will "mercilessly counterattack" any North Korean "provocations" following
    the North's successful trial of a ballistic missile system. (Yonhap)
  - Second Libyan Civil War
  - A Turkish-owned ship is attacked with tank fire off the coast of Tobruk in Libya,
    resulting in the loss of a crew member and several others being injured. (Reuters
    via ABC Online)
  Arts and culture:
  - Pablo Picasso's Women of Algiers (Version O) becomes the most expensive artwork
    ever to sell at an auction at Christie's auction house selling for US$179,365,000.
    (AP via Business Insider) (BBC)
  - Alberto Giacometti's lifesized statue Pointing Man sells for a record US$141.3
    million making it the most expensive sculpture ever sold at auction. (Yahoo! News)
  Business and economy:
  - The Obama administration gives provisional approval for Royal Dutch Shell to drill
    in the Arctic Ocean during the summer. (New York Times)
  Disasters and accidents:
  - At least 15 people are dead and 20 others injured after a bus falls into a gorge
    in the Udhampur district in India's Jammu and Kashmir state. (Times of India)
  - Typhoon Noul (2015)
  - Two people are dead after Typhoon Noul hits the Philippines. The storm is now
    headed for Japan. (USA Today) (Time)
  - May 5–10, 2015 tornado outbreak sequence
  - The death toll from a tornado outbreak in the United States rises to five with
    dozens injured and eight people missing. (CNN)
  Health:
  - A new strain of bird flu caused by the H5N8 virus is identified in a backyard
    poultry flock in Whitley County, Indiana, in the United States. (AP via Journal
    Gazette)
  International relations:
  - Malaysia detains over a thousand Bangladeshi and Rohingya people asylum seekers
    who arrived by boat on Monday. The Indonesian Navy confirms that it had turned
    the boats away. (Reuters) (AP via Washington Post)
  Law and crime:
  - The Swedish Supreme Court rejects a bid from Wikileaks founder Julian Assange
    to revoke the warrant for his detention in 2010. (Deutsche Welle)
  - George Zimmerman is involved in a shooting incident in Lake Mary, Florida, and
    suffers a minor gunshot wound. (WESH)
  - Investigators find the remains of at least seven people buried beneath a shopping
    centre in New Britain, Connecticut, with the suspected killer serving time for
    unrelated charges. (NBC Connecticut)
  Politics and elections:
  - Guyanese general election
  - Voters in Guyana go to the polls for a general election. (Telesurtv)
  - The President of Chile Michelle Bachelet approves a new cabinet following a fall
    in popularity caused by a corruption scandal. (BBC)
  - The Prime Minister of the United Kingdom David Cameron announces a new Cabinet
    consisting of members of the Conservative Party. (BBC)
  Sports:
  - In American football, New England Patriots quarterback Tom Brady is suspended
    without pay for four games. The team is also fined $1 million dollars (USD) and
    forced to forfeit their first-round pick in the 2016 NFL draft and their fourth-round
    selection in the 2017 draft for their role in Deflategate. (NBC) (CNBC)
