Date: '2015-05-26'
Source_URI: Portal:Current events/2015 May 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide bomber and gunmen attack a court building in the provincial capital
    of Maidan Shahr in Maidan Wardak resulting in the deaths of two police officers
    and four of the attackers. (Tolo News)
  - Thirteen Kenyan police officers are missing after an Al-Shabaab ambush in Garissa
    County. (Standard Digital)
  - Yemeni Civil War (2015–present)
  - Shellfire from Yemen kills two people over the border in Saudi Arabia. (AFP via
    Daily Star)
  - Boko Haram
  - Boko Haram kills at least 43 people in the town of Gubio in Nigeria's Borno State.
    (Reuters)
  Business and economy:
  - Charter Communications announces plans to merge with Time Warner Cable in a $55.1
    billion deal. (Market Watch) (Bloomberg)
  Arts and culture:
  - Police in China catch 175 looters who raided the Niuheliang Neolithic archaeological
    site in Manchuria. (AP)
  Disasters and accidents:
  - Tornadoes of 2015
  - Thirteen die in Ciudad Acuña, Mexico in the city's first-ever tornado. (BBC News)
  - Texas–Oklahoma floods
  - Flash flood warnings are now in place in eight states with flood waters causing
    closures of roads, rail services and buses in Houston. (NBC News)
  - Thirty people are reported missing in the Houston area as the flood water levels
    continue to rise as the death toll in Texas rises to 13. (AP via News24), (AP)
  - 2015 India heat wave
  - The death toll from the heat wave passes 1100 as the roads in the capital New
    Delhi are melting in the heat. (AFP via AsiaOne)
  Health:
  - A man dies of the rare Lassa fever in the American state of New Jersey after returning
    from West Africa. (AFP via Yahoo! News)
  International relations:
  - The President of Taiwan Ma Ying-jeou proposes a mechanism for resolving disputes
    in the South China Sea. (The Guardian)
  - The Japan Ground Self-Defense Force will for the first time participate in Exercise
    Talisman Saber, a joint exercise between the United States and Australia. (AFP
    via ABC Australia)
  Law and crime:
  - A petition to legalize same-sex marriage in the Philippines is filed in the Supreme
    Court. (Rappler)
  - Thieves use an online tax service provided by the American Internal Revenue Service
    to steal information from more than 100,000 taxpayers. (AP)
  - A US Appeals Court rules that President Barack Obama will not be able to implement
    his executive action on immigration while it is being challenged by Texas and
    25 other states. (Washington Examiner)(New York Times)
  - A lone gunman enters a Walmart store in Grand Forks, North Dakota, United States,
    and opens fire, killing one employee before turning the gun on himself. (Minneapolis
    Star Tribune)
  Science:
  - The Wildlife Conservation Society estimates that poachers have killed half of
    Mozambique's elephants in the past five years. (AFP via CapitalFM)
  Sports:
  - 2015 NBA Finals
  - In basketball, the Cleveland Cavaliers led by LeBron James win the Eastern Conference
    and will play in the 2015 NBA finals. (Cleveland.com)
