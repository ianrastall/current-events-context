Date: '2015-05-10'
Source_URI: Portal:Current events/2015 May 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Saudi-led airstrikes target the Sana'a home of former President of Yemen Ali Abdullah
    Saleh. (Thomson Reuters Trust)
  - The Yemeni Army accepts a five day truce offer from the Saudis. (Reuters via Daily
    Mail)
  Business and economy:
  - The People's Bank of China in the People's Republic of China lowers its benchmark
    interest rate for the third time in half a year. (Reuters)
  Disasters and accidents:
  - 2015 Pacific typhoon season
  - Typhoon Noul (Dodong) makes landfall in the northern Philippines as a Category 5
    typhoon with thousands of passengers stranded and warnings of landslides. (Al
    Jazeera) (Reuters via Daily Mail) (Reuters via ABC News Online)
  - 2015 Atlantic hurricane season
  - Tropical Storm Ana makes landfall near the city of Myrtle Beach, South Carolina,
    today. (CNN)
  - April 2015 Nepal earthquake
  - The death toll from earthquake reaches 8000 as three earth tremors hit Nepal.
    Avalanches disrupt rescue efforts higher in the mountains. (Times of India)
  - Tornadoes of 2015
  - At least 36 people are hospitalised and 30 per cent of the town of Van, Texas
    is damaged by a tornado. (NBC News)
  - At least two people are killed in the American town of Nashville, Arkansas. (NBC
    News)
  Health:
  - Mexico suspends vaccination of infants and authorises an inquiry after two babies
    die and 29 injured in the municipality of Simojovel in Chiapas state. (AP via
    ABC News)
  International relations:
  - The President of Cuba, Raul Castro, is received in an official private audience
    with Pope Francis, who will become the third Pope to visit the still officially
    Communist island before visiting the U.S. this October. Some restrictions on exercise
    of religion, and a few restrictions on other rights, have been lifted or relaxed,
    especially after Pope John Paul II's historic 1998 meeting with Fidel Castro,
    Pope Emeritus Benedict XVI's trip during his reign, and especially in 2014 and
    earlier this year, after Raul and Francis and U.S. President Barack Obama's diplomatic
    team dramatically improved U.S.-Cuba relations. President Castro went there to
    thank Francis, whom he publicly has stated his admiration for, for his efforts,
    and spoke of the possibility of converting and of officially restoring the Church.
    (Holy See Press Office)
  - Two boats carrying 500 members of Myanmar's Rohingya Muslim people arrive in western
    Indonesia. (AAP via SBS)
  - King Salman of Saudi Arabia will not meet with President of the United States
    Barack Obama at Camp David or at a summit meeting sending senior Ministers instead
    reportedly due to disagreement over a nuclear deal with Iran. (New York Times)
  Law and crime:
  - Police in the Mississippian city of Hattiesburg arrest three people on suspicion
    of murdering two policemen. (AP)
  Politics and elections:
  - Polish presidential election, 2015
  - Voters in Poland go to the polls for a presidential election with a second round
    of voting scheduled with Andrzej Duda of the Law and Justice Party challenging
    incumbent President Bronisław Komorowski. (The Economist) (BBC)
  Sport:
  - 2015 Spanish Grand Prix
  - In auto racing, the Formula One Spanish Grand Prix is held at the Circuit de Barcelona-Catalunya
    in Montmeló with Mercedes driver Nico Rosberg finishing ahead of Lewis Hamilton.
    (BBC)
