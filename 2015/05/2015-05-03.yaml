Date: '2015-05-03'
Source_URI: Portal:Current events/2015 May 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2014–present)
  - Yemen officials say that at least 20 members of the Arab coalition have landed
    in Aden on a 'reconnaissance' mission. (AP via UT San Diego)
  - Moro insurgency in the Philippines
  - Fugitive Abdul Basit Usman dies in a clash in Mindanao. (Rappler)
  Disasters and accidents:
  - April 2015 Nepal earthquake
  - Kathmandu International Airport closes to large aircraft flying in relief because
    its runway can no longer stand the strain.(AP)
  - The death toll from the earthquake passes 7000 and is expected to rise much higher.
    (Reuters via ABC News Australia)
  - At least eighteen people are killed in a traffic accident in Afghanistan's Badghis
    Province. (TOLO News)
  - Italy reports nearly 4,100 migrants were rescued off the Libyan coast with more
    rescues expected as people smugglers take advantage of the safe conditions. (Reuters
    via Daily Mail) (Reuters)
  Health and environment:
  - Preventive medicine researchers from Harvard University and Northwestern University
    conduct a study on long-term (13 years; 793 people) pre-cancer changes (mostly
    leukemia, prostate cancer, lung cancers, and skin cancers) in telomeres, the protective
    ends of DNA. Some said, in previous short-look studies, that focused mostly on
    their known role in the pace of regular aging, that they either got shorter or
    longer. There was a 3-4 year period of accelerated aging, and then it halted a
    few years before cancer was diagnosed. (Medical News Today)
  Law and crime:
  - 'Curtis Culwell Center attack: Two gunmen attacked the Curtis Culwell Center in
    the US city of Garland, Texas, which is holding an exhibition of drawings of the
    Prophet Muhammad. Both gunman were shot dead by police. Their car was found to
    contain no explosives. One security guard was hospitalized and is expected to
    recover. The attacks were reminiscent of the Charlie Hebdo shootings in Paris
    in January 2015. ISIL claimed responsibility for the attack. (CBS Dallas Fort
    Worth) (CNN)'
  Politics and elections:
  - Madison, Wisconsin, becomes one of the first cities in the United States to make
    discrimination against atheists illegal. (AP, via MSN)
  - 2016 United States presidential election
  - Retired neurosurgeon Ben Carson tells a Florida television station that he would
    run for the Republican Party nomination with a formal announcement to be made
    in the city of Detroit, Michigan, where he grew up. (USA Today)
  - Nagorno-Karabakh parliamentary election, 2015. (Euroactiv.com) (Interfax)
  Sports:
  - In English football, Chelsea wins the 2014–15 Premier League. (The Guardian)
