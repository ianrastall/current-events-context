Date: '2015-05-28'
Source_URI: Portal:Current events/2015 May 28
Intelligence_Payload:
  Business and economy:
  - The Solicitor General of the United States sides with Oracle in a much-watched
    copyright dispute with Google over Java APIs. (IDG News Service).
  Disasters and accidents:
  - The United States Air Force says that as many as 22 people have been inadvertently
    exposed to anthrax during a laboratory training exercise at Osan Air Base in South
    Korea. (AFP via Yahoo! News)
  - Tornadoes of 2015 and 2015 Texas–Oklahoma flood and tornado outbreak
  - The death toll from the recent storms in the American states of Texas and Oklahoma
    rises to 21 with 11 people missing. Fourteen more people have been killed in northern
    Mexico. (AP via ABC News)
  - 2015 Indian heat wave
  - The death toll from the Indian heat wave rises to over 1,400 with over 1000 dead
    in Andhra Pradesh state alone. (CNN)
  - Seventeen students are killed and five injured when a truck carrying them to school
    overturns on the Indonesian island of Sumatra. (AFP via Abram Online)
  International relations:
  - The Hellenic Coast Guard rescues 218 migrants off the coast of Greece who sailed
    illegally from Turkey making the total number of people arriving more than 1,500
    in a week. (AFP via Daily Star)
  Law and crime:
  - Former Speaker of the United States House of Representatives Dennis Hastert is
    indicted for allegedly trying to evade banking reporting requirements and lying
    to the Federal Bureau of Investigation. (CNBC)
  - Independent lawmaker Catherine Murphy raises fresh allegations in Ireland's Dáil
    against billionaire Denis O'Brien, prompting criticism over the silence of the
    country's media (much of it owned by O'Brien). (RTE) (Broadsheet) (UP Report)
  Politics and elections:
  - Republican Party presidential primaries, 2016
  - Former Governor of New York, George Pataki, announces that he is seeking the Republican
    Party nomination for the 2016 presidential election. (CNN)
  Science and technology:
  - NASA awards Boeing a commercial contract to build and fly the next passenger spacecraft,
    the CST-100. (Fin24)
