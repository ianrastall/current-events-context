Date: '2015-05-16'
Source_URI: Portal:Current events/2015 May 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - The United States claims that senior ISIL commander Abu Sayyaf is killed in a
    United States special operations forces raid within what is officially Syrian
    territory. (CNN)
  Law and crime:
  - An Egyptian court sentences deposed President Mohamed Morsi to death for his part
    in the Egyptian Revolution of 2011. (CNN)
  - 'Sinai insurgency: In response to Morsi''s sentence, gunmen fatally shoot three
    Egyptian judges in the Sinai Peninsula. (AFP via Al Arabiya News)'
  - An Egyptian court bans hardcore football clubs over terrorism accusations. In
    2012, over 70 football fans were killed and 500 injured in the Port Said Stadium
    riot. (AP)
  Disasters and accidents:
  - A passenger train collides with a tractor and trailer on a level crossing at Ibbenbüren,
    Germany. Two people are killed and twenty are injured. (Metro)
  Politics:
  - Jim Murphy announces his resignation as Scottish Labour Party leader. (BBC News)
  Health:
  - Study suggests inflammation may be to blame for brain injury in newborn bloodstream
    infections. The findings were published in the Journal of Infectious Diseases.
    (Harvard Medical School) (The Journal of Infectious Diseases)
  Sports:
  - American Pharoah wins the 2015 Preakness Stakes at Pimlico Race Course in Baltimore,
    and, in the wake of the death of Freddie Gray in that city, is described as a
    sporting event that "...could help start the healing process." (ESPN)
