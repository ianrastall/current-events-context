Date: '2015-05-07'
Source_URI: Portal:Current events/2015 May 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - At least five people are killed in a Boko Haram attack on a village in southwest
    Niger. (Reuters)
  - Islamic State of Iraq and the Levant
  - The Pentagon raises security at its US military bases due to a growing jihadist
    threat in the United States and a recent shooting in Garland, Texas. (CNN)
  Arts and culture:
  - Archaeologists in Madagascar announce the partial discovery of Captain Kidd's
    treasure. A silver ingot was found in a wreck off the coast of Île Sainte-Marie.
    (BBC)
  Disasters and accidents:
  - Scores of flights are cancelled after a fire devastates part of terminal three
    at Rome's Fiumicino Airport. The fire was triggered by an electrical fault. (AFP
    via News24)
  - The wreck of the migrant boat which sank in April 2015 with 700 people on board
    is located by the Italian Navy 136km off the Libyan coast at a depth of 375m.
    (AFP via News24)
  - The Royal Navy's HMS Bulwark rescues 110 migrants from a dinghy off the coast
    of Libya, the first for a British ship during 2015. (BBC)
  International relations:
  - The United States Senate passes a bill giving the Congress a voice in any nuclear
    deal negotiated between Iran and world powers. (New York Times)
  Law and crime:
  - A three-judge panel of the U.S. Second Circuit Court of Appeals rules that the
    National Security Agency's mass surveillance of telephones metadata is illegal
    under the Patriot Act. (The Guardian) (The New York Times)
  Politics and elections:
  - United Kingdom general election, 2015
  - Voters in the United Kingdom go to the polls for a general election with the Conservative
    Party winning a narrow majority in the House of Commons after the election. (The
    Guardian) (BBC) (The Telegraph) (BBC²)
  - The Scottish National Party wins a massive bulk of the seats in Scotland with
    the Scottish Labour Party losing a very large number of seats. (AP via Washington
    Post)
