Date: '2015-03-18'
Source_URI: Portal:Current events/2015 March 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Bardo National Museum attack
  - Gunmen attack Tunisia's Bardo National Museum, adjacent to the parliament building,
    killing 23 people, including 18 foreign tourists. (AP via MSN) (The Telegraph)
  Disasters and accidents:
  - 2014–15 Australian region cyclone season
  - Cyclone Nathan intensifies to a category 2 tropical cyclone (Australian scale)
    and is expected to make landfall near the Queensland town of Cooktown on March
    19. (WA Today)
  International relations:
  - The United States Department of Defense authorizes the U.S. Army to destroy a
    large U.S. stockpile of chemical weapons. (AP via MSN)
  Health:
  - Kraft Foods Group Inc. recalls more than 6.5 million 7.25-ounce (0.2-kilogram)
    boxes of its macaroni and cheese after customers reported finding small pieces
    of metal inside. The recalled products were shipped nationwide in the U.S. as
    well as to some countries in South America and the Caribbean. (Bloomberg via MSN)
  - A study in the medical journal The Lancet states that babies who are breastfed
    were more likely to have higher IQs, spend more time in school, and end up in
    higher-paying jobs. (Quartz via MSN) (The Lancet)
  Law and crime:
  - A suspected gang-related shooting in a restaurant at Hisingen, an island near
    the Swedish city of Gothenburg, kills at least two people with several more injured.
    (Reuters) (BBC)
