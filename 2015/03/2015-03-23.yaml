Date: '2015-03-23'
Source_URI: Portal:Current events/2015 March 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iraqi insurgency (2011–2013)
  - Multiple bombings in Baghdad, Iraq, kill at least nineteen people and wound another
    thirty-six. (AP)
  Business and economy:
  - China's biggest state-owned chemical company ChemChina acquires a 26% stake in
    Italian tire manufacturer Pirelli with an additional offer to buy the remaining
    outstanding shares. (AP)
  Disasters and accidents:
  - A bus crashes into traffic near Huarmey in northern Peru, leaving at least thirty-seven
    people dead and dozens injured. (AFP via ABC news)
  International relations:
  - The National Assembly of Armenia approves a declaration recognizing the Greek
    and Assyrian genocides by Ottoman Turkey between 1915 and 1923. (Armenpress)
  Law and crime:
  - The South Gauteng High Court sitting in Palm Ridge, Katlehong, finds former doubles
    tennis champion Bob Hewitt guilty of two counts of rape and one of sexual assault
    of three former students that he coached in South Africa. (News 24)
  - Former NFL player Darren Sharper pleads guilty in a Maricopa County, Arizona courtroom
    to raping two women after spiking their drinks at a Tempe apartment in November
    2013, and the court sentences him to nine years in prison. Sharper has also been
    indicted on charges of sexually assaulting women in the U.S. states of California,
    Louisiana, and Nevada. (Reuters)
  - The U.S. Supreme Court affirms Wisconsin's law requiring voters to present photo
    identification to cast a ballot. (Reuters)
  - The U.S. state of Utah reinstates the use of execution by firing squad for situations
    where lethal injection is not possible. (CNN)
  Politics and elections:
  - Death of Lee Kuan Yew
  - Lee Kuan Yew, a founding father of Singapore as well as its first prime minister,
    dies at the age of 91 after a prolonged illness. (BBC)
  - 2016 United States presidential election
  - Senator Ted Cruz (R-Texas) announces his intention to run for president. (NBC
    News)
