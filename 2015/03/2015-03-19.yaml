Date: '2015-03-19'
Source_URI: Portal:Current events/2015 March 19
Intelligence_Payload:
  Disasters and accidents:
  - 2014–15 Australian region cyclone season
  - Authorities in the Australian state of Queensland prepare for the impact of Severe
    Tropical Cyclone Nathan which is forecast to make landfall near Cooktown early
    tomorrow morning. (AAP via Wa Today)
  - Cyclone Pam
  - Authorities in Vanuatu report that it faces imminent shortages of food and water
    in the wake of Cyclone Pam. (ABC News)
  - A huge boulder falls upon tourists awaiting to board a ship at the scenic Diecai
    Hill of China's Guilin region killing seven of them. (AFP via South China Morning
    Post)
  International relations:
  - The Euro zone tells Greece that it must stay with its reform package or risk being
    forced out of the euro zone by cash-flow problems. (Reuters)
  - Moldovan authorities ban two Russian journalists, Dmitry Kiselev and Andrei Kondrashov,
    from the country for five years because they had planned to travel to Moldova
    to present a documentary sympathetic to Russia annexing the Crimea. (AP via ABC)
  Law and crime:
  - A stabbing attack from March 17, leaves three dead and three wounded in New Bern,
    North Carolina, both the 18-year-old attacker and victims were refugees from Myanmar
    (Burma). (AP via MSN)
  - A March 17 DOS attack occurs on Chinese website GreatFire, reaching 2.5 billion
    spoof requests per hour. (The Epoch Times)
