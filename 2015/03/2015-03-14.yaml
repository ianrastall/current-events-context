Date: '2015-03-14'
Source_URI: Portal:Current events/2015 March 14
Intelligence_Payload:
  Disasters and accidents:
  - The United Nations will send emergency aid to Vanuatu with at least four people
    officially dead and reports of dozens more dead after Cyclone Pam hit yesterday.
    (Reuters via Daily Mail) (AP)
  - A bus crash in the southern Brazilian state of Santa Catarina kills at least 51
    people. (AFP via Yahoo! News) (Reuters via Daily Mail)
  International relations:
  - Prime Minister of India Narendra Modi visits Sri Lanka's Jaffna District to hand
    over 27,000 homes to Tamil survivors of the Sri Lankan Civil War. (Al Jazeera)
  - After an armed band removed his personal security guards, the Vice President of
    Sierra Leone, Samuel Sam-Sumana, goes into hiding after applying for asylum at
    the United States embassy in Freetown. (AAP via SBS) (AP)
  - Guyana rejects the latest objections raised by neighboring Venezuela over the
    granting to ExxonMobil Corp. of an oil and gas concession in Caribbean waters
    claimed by both nations. (Miami Herald)
  Law and crime:
  - The Los Angeles Police Department issues a warrant for the arrest of American
    Robert Durst regarding the murder of writer and confidant Susan Berman following
    the airing of a six-part documentary by HBO called The Jinx. He is later taken
    into custody in the city of New Orleans. (USA Today)
  Politics and elections:
  - The cancellation of several of Russian President Vladimir Putin's scheduled meetings
    leads to widespread social media speculations regarding the reason for his public
    absence. (The New York Times)
