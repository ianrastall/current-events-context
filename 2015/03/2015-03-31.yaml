Date: '2015-03-31'
Source_URI: Portal:Current events/2015 March 31
Intelligence_Payload:
  Disasters and accidents:
  - Landslides in India's Jammu and Kashmir state kill at least six people and leave
    sixteen others missing. (BBC)
  - Large parts of Turkey experience a power outage affecting public services and
    infrastructure including air traffic control, trams, and subways in Istanbul.
    As much as 65% of the country is without power. (CNN)
  Germanwings Flight 9525:
  - Germanwings' owner Lufthansa officially acknowledges that it knew there were mental
    health issues with Andreas Lubitz before the crash. (The New York Times)
  - German newspaper Bild and French news magazine Paris Match say they have a passenger's
    cell phone video showing the plane's last moments before the crash. (BBC)
  Health:
  - The journal Nature Neuroscience publishes research from Columbia University Medical
    School that finds that wage income of parents correlates with brain complexity
    in their children. (The Washington Post via MSN) (Abstract of article)
  Law and crime:
  - A Malaysian court finds a local man guilty of the murder of two British students
    in Borneo in 2014. (BBC)
  - A prisoner accused of multiple bank robberies escapes from a hospital in Falls
    Church, Virginia after stealing a guard's gun. Washington, D.C. police capture
    him. (WJLA)
  - In a courthouse in Istanbul, the Revolutionary People's Liberation Party–Front
    of Turkey takes hostage the prosecutor handling the case of a 15-year-old who
    died in a police gas attack. The situation ends with police killing the gunmen.
    The prosecutor later dies at a hospital. (BBC)
  - An incident at a shooting range complex in Bucharest, Romania leaves two people
    dead. (Mediafax)
  Politics and elections:
  - Nigerian general election, 2015
  - Nigerian voters elect Muhammadu Buhari (who previously ruled as a military dictator
    in 1983-1985) of the All Progressives Congress as the next President of Nigeria.
    (Bloomberg via Melbourne Age)
  Sports:
  - The Australian Football League anti-doping tribunal clears 34 members of the Essendon
    Football Club team of doping during the 2012 AFL season. (The Daily Telegraph)
