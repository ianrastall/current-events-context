Date: '2015-03-26'
Source_URI: Portal:Current events/2015 March 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Aftermath of the 2014–15 Yemeni coup d'état
  - 2015 military intervention in Yemen
  - The Saudi Arabian Air Force launches airstrikes on Sana'a International Airport
    and Yemen's al Dulaimi military airport resulting in at least 17 deaths. (Reuters)
    (Al Jazeera)
  Arts and culture:
  - Exhumation of Richard III of England
  - Leicester Cathedral reburies the remains of King Richard III of England. (ABC
    News Australia)
  Disasters and accidents:
  - A scaffolding collapses in Hà Tĩnh Province in Vietnam, killing at least fourteen
    people and leaving around thirty others injured. (AP), (Reuters)
  - Germanwings Flight 9525
  - French prosecutors claim that evidence supports the conclusion that the co-pilot,
    Andreas Lubitz, deliberately crashed the plane. (The Guardian)
  - A building explosion and pancake floor collapse in New York City's East Village
    causes at least two deaths and multiple injuries. (CBS Local) (USA Today)
  - Two passenger trains collide in Ayutthaya, Thailand, injuring 22 people. (AP via
    News24)
  - A Vietnam People's Air Force military helicopter crashes on Phú Quý island due
    to strong winds during the landing, with all eight crew members saved. (Thanh
    Nien News)
  - Massive floods affect the Chilean regions of Antofagasta, Atacama and Coquimbo,
    killing at least 15 people and causing the total destruction of cities as Chañaral
    and several damages in Copiapo. Wikinews in Spanish
  Law and crime:
  - After the recent March 17 DOS attack on Chinese website GreatFire (See March 19),
    a massive distributed denial-of-service attack from China occurs against GitHub,
    a leading online coding platform, with the Github-hosted GreatFire contents being
    the main target. (The Verge)
