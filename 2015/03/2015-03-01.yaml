Date: '2015-03-01'
Source_URI: Portal:Current events/2015 March 1
Intelligence_Payload:
  Political elections:
  - Estonian parliamentary election, 2015
  - The ruling Reform Party wins the elections, but loses the majority that it has
    had with its current coalition partner, the Social Democratic Party. For the first
    time in many years, two new parties cross the election threshold, the right-of-centre
    Free Party and the eurosceptic Conservative People's Party of Estonia. (Estonian
    Public Broadcasting)
  - Andorran parliamentary election, 2015
  - Despite losing five seats, the Democrats for Andorra narrowly retains their absolute
    majority in the General Council, winning 15 of the 28 seats. (Elections Andorra)
  Science and technology:
  - NASA astronauts perform the third of three ISS spacewalks completing the cabling
    reroutings needed in preparation for the 2017 arrival of the first commercial
    spacecraft capable of transporting astronauts. (AP)
