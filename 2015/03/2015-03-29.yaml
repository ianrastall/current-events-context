Date: '2015-03-29'
Source_URI: Portal:Current events/2015 March 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 military intervention in Yemen
  - Pakistan sends a Boeing 747 to evacuate Pakistani nationals concerned about their
    security. The plane will be allowed into the country despite the no-fly zone declared
    by Saudi Arabia. (Reuters)
  Disasters and accidents:
  - Air Canada Flight 624
  - Air Canada Flight 624 skids off the runway at Halifax Stanfield International
    Airport, after arriving from Toronto shortly past midnight. All 133 passengers
    and 5 crews on board survive, with 23 treated for minor injuries. (BBC)
  International relations:
  - The President of Egypt Abdel Fattah el-Sisi announces that members of the Arab
    League have agreed in principle to form a joint military force to respond to security
    threats. (Ahram Online)
  Politics and elections:
  - Death of Lee Kuan Yew
  - Singapore holds a funeral and elaborate procession for Lee Kuan Yew, the first
    Prime Minister of Singapore. (AP)
  - Nigerian general election, 2015
  - Nigeria extends voting in its general election for a second day due to delays
    and malfunctioning equipment. So far, Boko Haram attacks have killed 43 people.
    (Bloomberg)
  - French departmental elections, 2015
  - Voters in France go to the polls for local government elections with initial polling
    suggesting favorable results for former President Nicolas Sarkozy's UMP. (BBC)
  - Uzbekistani presidential election, 2015
  - Voters in Uzbekistan go to the polls for a presidential election with incumbent
    President Islam Karimov set to win against token opposition. (Al Jazeera)
  Sports:
  - 2015 Cricket World Cup
  - Australia defeats New Zealand by seven wickets in the final at the Melbourne Cricket
    Ground. (ABC News Australia) (Sydney Morning Herald)
