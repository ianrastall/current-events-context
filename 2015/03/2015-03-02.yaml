Date: '2015-03-02'
Source_URI: Portal:Current events/2015 March 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  Islamic State of Iraq and the Levant:
  - A coalition of Iraqi Armed Forces and militia numbering around 30,000 launches
    an offensive against Islamic State positions in Tikrit. Troops seize control of
    the district of al-Tin and al-Abeid. (BBC)
  - Libya's Council of Deputies agrees to resume peace talks. (Reuters via Daily Mail)
  Business and economy:
  - Hewlett-Packard announces that it will buy Aruba Networks, a California-based
    manufacturer of wi-fi equipment, for approximately $2.7 billion in combined cash
    and equity. (HP Inc. press release)
  International relations:
  - In response to joint exercises held by South Korea and the United States, North
    Korea fires two short-range missiles off its coast. (Reuters)
  Law and crime:
  - A man shoots to death a woman and a seven-year-old boy then himself in the Queensland
    town of Biddeston, west of Brisbane, Australia. (ABC News)
  Sports:
  - Durham Police arrest English and Sunderland footballer Adam Johnson over suspected
    sexual activity with a 15-year-old girl. (BBC News)
