Date: '2015-03-07'
Source_URI: Portal:Current events/2015 March 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram
  - Maiduguri city in northeast Nigeria sees five suicide bomb blasts with 54 dead
    and 143 wounded. (AP)
  - A suspected terrorist attack in Bamako, Mali, kills five people. (AFP via BDlive)
    (CNN)
  - Islamic State of Iraq and the Levant
  - In Iraq, ISIL destroys the ancient city of Hatra following the destruction of
    Nimrud. (BBC)
  Law and crime:
  - The US Secret Service locks down the White House after a loud noise (later revealed
    to be a burned-out souvenir truck) is heard on the South Lawn, moments before
    U.S. President Barack Obama and his family were due to take off by helicopter.
    He and his family were not yet on the South Lawn when the noise was heard. (Reuters
    via MSN) (Reuters)
  - Assassination of Boris Nemtsov
  - Russian authorities arrest five men, Anzor Gubashev and Zaur Dadayev, suspects
    from the rebellious North Caucasus region, according to Russian state media reports,
    relying on a statement from the Russian Federal Security Service Director Alexander
    Bortnikov. However, Nemtsov's daughter, Zhanna Nemtsova, speaking from Germany,
    says she has no idea who they are. Many still suspect Russian governmental involvement
    in his death. (CNN) (AP)
  Politics and elections:
  - According to former U.S. President Jimmy Carter, the flu causes his Vice President,
    Walter Mondale, 87, to be hospitalized at the famed Mayo Clinic, in Rochester,
    Minnesota. (CNN)
