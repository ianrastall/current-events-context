Date: '2015-03-11'
Source_URI: Portal:Current events/2015 March 11
Intelligence_Payload:
  Disasters and accidents:
  - 2014–15 Australian region cyclone season
  - Tropical Cyclone Nathan intensifies to a Category 2 system as it nears Cape York
    Peninsula in the north of the Australian state of Queensland. (The Australian)
  - A search continues after an army helicopter crashed March 10 during a foggy night
    training exercise at Eglin Air Force Base in the Florida Panhandle leaving seven
    Marines and four United States Army soldiers missing. (AP via US News)
  - A fire and partial collapse of the Admiral shopping complex in the Russian city
    of Kazan kills at least 17 people with 55 more injured. (Radio Free Europe)
  International relations:
  - The Government of Germany advises that Chancellor Angela Merkel will not attend
    a May 9 World War II Victory Day Parade in Moscow but will visit shortly thereafter.
    (Radio Free Europe)
  Law and crime:
  - Assassination of Boris Nemtsov
  - The Kremlin's Rights Council states that they believe that Zaur Dadayev, a former
    Chechen police officer, who confessed to being part of the murder of Boris Nemtsov
    did so after being tortured. (AFP via Yahoo! News)
  - At least 15 armed assailants ambush two vans on a highway in Burgundy, France
    carrying millions of euros worth of jewels. It was the latest in a string of big
    jewel heists in France. (AP)
  - A United States immigration appeals panel approves the deportation of former El
    Salvador Defence Minister Carlos Eugenio Vides Casanova to potentially face human
    rights abuses charges in his homeland. (NBC News)
