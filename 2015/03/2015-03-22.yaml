Date: '2015-03-22'
Source_URI: Portal:Current events/2015 March 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni crisis
  - The United Nations Security Council meets to discuss the deteriorating security
    situation in Yemen as the United States removes all remaining personnel. (Fox
    News)
  - Shia Houthis rebels capture the strategically important city of Ta'izz. (BBC)
  - War in North-West Pakistan
  - The Pakistan Army claims to have killed 80 Tehrik-i-Taliban Pakistan fighters
    in fighting in Khyber Pakhtunkhwa in recent days while the Taliban claims to have
    killed at least six soldiers. (Reuters via ABC News Australia)
  - Syrian Civil War
  - A Syrian Armed Forces helicopter crashes in Jabal al-Zawiya in the Idlib Governorate
    resulting in the death of one crew member and the capture of four. (BBC)
  Arts and culture:
  - The remains of King Richard III of England, that were discovered in a car park
    in Leicester in 2012, arrive at Leicester Cathedral ahead of a burial on March
    26. (BBC)
  Disasters and accidents:
  - A campsite tent fire on Ganghwa Island in the South Korean city of Incheon kills
    five people and seriously injures two others. (Yonhap)
  - 2014–15 Australian region cyclone season
  - Cyclone Nathan makes landfall near Nhulunbuy in the Northern Territory as a high
    end Category 2 cyclone. (AAP via SBS)
  - Japan allocates 820 billion yen ($6.8 billion) for creating a nearly 400-kilometer
    (250-mile) chain of cement seawalls, at places nearly five stories high, against
    future tsunami disasters such as the one that struck the country's northeastern
    coast four years ago. (AP)
  - A Venezuelan bus plunges into a lake in Aragua state, southwest of the capital
    Caracas, killing at least eleven people with thirty-six others injured. (BBC)
  Politics and elections:
  - French departmental elections, 2015
  - Voters in France go to the polls for the first round of voting in local government
    elections. Exit polls show the conservative UMP in first place, Marine Le Pen's
    National Front in second, with President François Hollande's French Socialist
    Party in third. (RTE) (BBC)
  - Israeli legislative election, 2015
  - The President of Israel Reuven Rivlin opens discussions over the formation of
    a new government, with Benjamin Netanyahu expected to return as Prime Minister.
    (AFP via Yahoo! News)
