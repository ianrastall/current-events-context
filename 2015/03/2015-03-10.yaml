Date: '2015-03-10'
Source_URI: Portal:Current events/2015 March 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinai insurgency
  - A suicide bomber kills one person and injures 24 in an attack on a police station
    in Egypt's Sinai Peninsula. (AFP via Yahoo! News)
  Arts and culture:
  - The family of soul music singer Marvin Gaye wins a $7.3 million lawsuit for copyright
    infringement against Robin Thicke, Pharrell Williams, and T.I. holding that Thicke's
    hit "Blurred Lines" resembled Gaye's "Got to Give It Up". (Rolling Stone)
  Disasters and accidents:
  - A passenger train collides with a lorry on a level crossing at Dien Sanh, Vietnam
    leaving one person dead and several others injured. (Tuổi Trẻ News)
  Law and crime:
  - A large number of Class A drugs became legal in Republic of Ireland after a legislative
    mistake overruled the 1977 Misuse of drugs act. this prompted some emergency legislation
    being rushed through but effectively a single day where the use of drugs became
    legal. (Irish Post)
  - Police in New Zealand announce they are investigating threats to contaminate infant
    formula, after letters were sent to dairy cooperative Fonterra and farming lobby
    group Federated Farmers containing packages of infant formula laced with 1080
    poison. (ABC News)
  - The Wikimedia Foundation and eight other organisations file a lawsuit in the state
    of Maryland, US against the National Security Agency and the United States Department
    of Justice regarding the NSA's mass surveillance program. The Wikimedia Foundation
    is the owner and parent company of Wikipedia. (NBC News)
  - The University of Oklahoma expels two students identified as ringleaders in the
    singing of a racist chant by the Sigma Alpha Epsilon fraternity. (NBC News)
  - Pakistan lifts a moratorium on the death penalty for terrorism, months after reinstating
    it. (RTT)
