Date: '2015-03-24'
Source_URI: Portal:Current events/2015 March 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Gunmen kill at least thirteen people in an attack on three passing vehicles including
    a bus in Wardak province's Sayad Abad district. (Al Jazeera)
  Arts and culture:
  - A BBC investigation finds that Top Gear presenter Jeremy Clarkson assaulted a
    producer with reports that he will be sacked from the television program. (The
    Telegraph)
  Disasters and accidents:
  - Germanwings Flight 9525
  - A Germanwings flight crashes en route from Barcelona, Spain, to Düsseldorf, Germany,
    in a mountainous region of the Alps near Digne-les-Bains in Southern France leaving
    150 dead. Rescue workers recover the damaged, but still usable, cockpit voice
    recorder. (RT) (Reuters) (The Guardian)(RT)
  Science and technology:
  - The Opportunity rover completes a Martian marathon, the first time any vehicle
    has traveled more than 26.2 miles on the surface of another world. (CNN)
