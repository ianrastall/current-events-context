Date: '2015-03-30'
Source_URI: Portal:Current events/2015 March 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Crisis (2011–present)
  - The People's Republic of China evacuates its citizens from Yemen due to concerns
    over declining security. (AP)
  - 2015 military intervention in Yemen
  - Saudi-led airstrikes hit a refugee camp near a military installation in the northern
    Harad District killing 21 people. Houthi militants make gains in Hadi's last bastion,
    Aden. (Reuters)
  Business and economy:
  - Creditors offer Puerto Rico's highly leveraged power authority $2 billion in new
    financing, including $1.2 billion for a new natural gas operation, in exchange
    for assurances that it will repay its debt. (Reuters)
  - American company UnitedHealth Group will buy American pharmacy benefit firm Catamaran
    Corporation for $12.8 billion. (Reuters)
  Arts and culture:
  - South African comedian Trevor Noah will succeed Jon Stewart as host of the television
    program The Daily Show on the Comedy Central network. (The New York Times)
  Disasters and accidents:
  - A 7.7 magnitude earthquake off the coast of Papua New Guinea prompts a tsunami
    warning for Papua New Guinea and the Solomon Islands. (AP)
  - A van crash on U.S. Route 27 in Florida near the town of Moore Haven results in
    8 deaths and 10 injuries. (NBC News)
  Law and crime:
  - The Jerusalem District Court finds former Prime Minister of Israel Ehud Olmert
    guilty of accepting cash from an American businessman for personal use. (Ynet
    News)
  - In Fort George G. Meade, Maryland, base perimeter guards shoot and kill one person
    and injure another person as two men attempt to crash the entrance gate with their
    vehicle. The incident also injures a guard. The base is the headquarters for the
    National Security Agency. (BBC)
  Politics and elections:
  - United Kingdom general election, 2015
  - Queen Elizabeth II dissolves Parliament and calls a general election for May 7.
    (Reuters)
  - Nigerian general election, 2015
  - Challenger Muhammadu Buhari leads by two million votes with three-quarters of
    the states having their votes counted but votes from some of President Goodluck
    Jonathan's strongest states in the Niger Delta have yet to be counted. (Reuters)
