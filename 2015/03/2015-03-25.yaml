Date: '2015-03-25'
Source_URI: Portal:Current events/2015 March 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - The Afghan National Army kills twenty-nine insurgents and injures twenty-one others
    in a series of operations in Daikundi, Ghazni, and Parwan provinces during the
    past 24 hours. (Tolonews)
  - Aftermath of the 2014–15 Yemeni coup d'état
  - Yemeni President Abed Rabbo Mansour Hadi flees Yemen in a boat after Houthi rebels
    besiege the government's temporary capital of Aden in the southern part of the
    country. (AP)
  - 2015 military intervention in Yemen
  - The Gulf Cooperation Council announces its intervention in Yemen and Saudi Arabia
    begins launching airstrikes against Houthi forces and installations. (CBS News)
  Arts and culture:
  - The BBC sacks Jeremy Clarkson, one of the three presenters for the television
    program Top Gear. (BBC)
  - British singer and songwriter Zayn Malik leaves popular boyband One Direction.
    (The Independent)
  Business and economy:
  - American companies Kraft Foods and H.J. Heinz announce merger plans to create
    a combined company, The Kraft Heinz Company, which will be led by the present
    CEO of Heinz, Bernardo Hees. (Reuters)
  Disasters and accidents:
  - Germanwings Flight 9525
  - A search and recovery operation resumes for the remains of the Germanwings flight
    that crashed into the French Alps on March 24. (BBC)
  - An audio recording indicates that a pilot was locked out of the cockpit at the
    time of the crash and was unable to reenter. (The New York Times)
  - North American tornado outbreaks
  - Tornadoes hit the American city of Tulsa and the surrounding region of eastern
    Oklahoma leaving one person dead and several others injured. (News on 6) (BBC)
  Law and crime:
  - The US Army charges US Army soldier Bowe Bergdahl, who was held captive by the
    Taliban-aligned Haqqani network in Afghanistan from June 2009 until his release
    in May 2014, with desertion and misbehavior before the enemy. (CNN)(FOX News)
  Politics and elections:
  - Pope Francis appoints Bishop Richard Moth of the British military diocese as Bishop
    of Arundel and Brighton, England. The diocese had been vacant since September
    when Bishop Kieran Conry resigned. (Catholic News Agency)
  Sports:
  - Major League Soccer, the top league of association football in the United States
    and Canada, announces that Twin Cities-based North American Soccer League franchise
    Minnesota United FC will become the league's 23rd franchise, with the team's MLS
    debut scheduled for 2018. (ESPN)
