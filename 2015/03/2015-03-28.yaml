Date: '2015-03-28'
Source_URI: Portal:Current events/2015 March 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2015 military intervention in Yemen
  - Saudi airstrikes continue in Yemen for the third successive day while ground fighting
    occurs in Aden. Saudi Arabia claims to be in full control of Yemen's airspace.
    (Al Jazeera)
  - Saudi planes evacuate a United Nations mission from the Yemeni capital Sana'a.
    (Al Arabiyah)
  - Somali Civil War (2009–present)
  - The death toll from the March 27 hotel siege in Mogadishu rises to 20. (CNN)
  Disasters and accidents:
  - Germanwings Flight 9525
  - According to an interview with Germany's Bild newspaper, the former girlfriend
    of co-pilot Andreas Lubitz was told by him that "One day I'm going to do something
    that will change the whole system, and everyone will know my name and remember."
    (BBC)
  - A mourning religious service is held at Digne-les-Bains in the French Alps near
    the site of the downed passenger jet. (Guardian)
  Law and crime:
  - The Congolese bar owner whom Amanda Knox falsely accused of killing Meredith Kercher
    criticises a lack of justice in the surprise decision by Italy to quash her conviction
    yesterday, citing diplomatic pressure coupled with Knox's wealth and status as
    American, as opposed to his being African. (Guardian)
  Politics and elections:
  - Nigerian general election, 2015
  - Voters in Nigeria go to the polls for a general election. Gunmen kill at least
    15 voters including an opposition house of assembly candidate for Dukku in Gombe.
    (CNN) (Reuters via MSN)
  - New South Wales state election, 2015
  - Voters in the Australian state of New South Wales go to the polls for a state
    election with the Liberal-National Coalition led by Mike Baird retaining government.
    (ABC News Australia) (The Daily Telegraph via The Courier Mail)
  Sports:
  - In association football, Russia, recovering after Friday's abandoned Euro 2016
    qualifier in Montenegro, press for UEFA to award them victory. Among the injured
    were goalkeeper Igor Akinfeev, knocked out of the game in the first minute, concussed
    and nursing a neck injury after a flare struck him in the head; Dmitri Kombarov,
    struck by another object; Alan Dzagoev, struck by projectiles while being treated
    for another injury. (The Guardian)
