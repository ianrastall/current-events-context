Date: '2005-08-29'
Source_URI: Portal:Current events/2005 August 29
Intelligence_Payload:
  Uncategorized:
  - Hurricane Katrina as a Category 3 storm makes landfall at 6:10 a.m. CDT (11:10
    a.m. UTC). The eye is just east of New Orleans. This date is now known as Black
    Monday to New Orleanians and many residents of the Gulf Coast. (AP)
  - Death toll by Hurricane Katrina reaches 55. (Canadian Press, via Canada.com),
    (Guardian)
  - New South Wales Opposition Leader, John Brogden, resigns from the leadership of
    the NSW Liberal Party after describing Helena Carr, wife of former Premier Bob
    Carr, as a "mail-order bride" and sexually harassing two female journalists. Brogden
    will remain Member for Pittwater until at least the next state election. (ABC
    News)
  - The Nigerian Vice President's home in Maryland, USA was raided by the FBI. Atiku
    Abubakar's relations with President Olusegun Obasanjo have cooled and it is possible
    he might use the pretext of the FBI corruption investigation to dismiss him.(BBC)
  - Countries of the European Union attempt to work out a deal to end the "bra wars",
    the Chinese textile import row. (BBC)
