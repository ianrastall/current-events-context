Date: '2005-08-20'
Source_URI: Portal:Current events/2005 August 20
Intelligence_Payload:
  Uncategorized:
  - Susilo Bambang Yudhoyono, the President of Indonesia, ordered the national intelligence
    agency and police to investigate after a power outage left about 100 million people
    without electricity. (Wikinews)
  - The original handwritten manuscript of a paper by Albert Einstein, entitled "Quantum
    theory of the monatomic ideal gas" (Bose-Einstein condensate), dated December
    1924, has been found in the archives of Leiden University's Lorentz Institute
    for Theoretical Physics. It was considered one of Einstein's last great breakthroughs.
    (AP via Yahoo! News)(Link dead as of 20:43, 14 January 2007 (UTC)) Photographs
    of the 16-page manuscript and a description of how a student stumbled upon it
    were posted on the institute's Web site. (Leiden University)
  - Northwest Airlines mechanics went on strike.
