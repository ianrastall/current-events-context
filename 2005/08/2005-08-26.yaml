Date: '2005-08-26'
Source_URI: Portal:Current events/2005 August 26
Intelligence_Payload:
  Uncategorized:
  - 120,000 people are expected at the Jean-Michel Jarre's concert Space of Freedom
    in Gdańsk Shipyard in Poland commemorating 25th anniversary of the creation of
    "Solidarity" trade union; live at 20:00 CET at iTVP (Radio Polonia)
  - The High Court of Fiji overturns that country's sodomy laws after hearing the
    case of one Australian and one native Fijian who were previously sentenced to
    two years in jail under the legislation (365gay.com) (ABC)
  - 14 children and three adults die as a fire breaks out in a building in Paris which
    housed African immigrants. (BBC)
  - Typhoon Mawar (11W) makes landfall at Chiba city, just east of Tokyo, having weakened
    from super-typhoon strength. (BBC)
  Israeli–Palestinian conflict:
  - An Israeli Border Policeman is wounded when a Palestinian man stabs him in the
    back of the neck near The Cave of the Patriarchs in Hebron. (Ha'aretz), (The Jerusalem
    Post), (Reuters)
  - The Interior Ministry of Israel has announced that the number of Israeli citizens
    living in Israeli settlements on the West Bank has increased by more than 9,000
    thus far this year. (BBC)
