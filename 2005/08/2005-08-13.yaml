Date: '2005-08-13'
Source_URI: Portal:Current events/2005 August 13
Intelligence_Payload:
  Conflict in Iraq:
  - Three US Soldiers are killed following an IED attack by insurgents in Tuz, northern
    Iraq. (MilitaryTimes)
  Uncategorized:
  - Former Prime Minister David Lange of New Zealand dies. His 1984–1989 administration
    has left a permanent mark on New Zealand. (NZ National Business Review)
  - German Chancellor Gerhard Schröder warns the U.S. to back away from the possibility
    of military action against Iran over its nuclear program. (BBC)
  - Ernest "Smokey" Smith, the last surviving Canadian recipient of the Victoria Cross,
    is laid to rest in Vancouver, British Columbia, Canada following the largest Canadian
    military funeral in recent history. He died on 3 August at the age of 91. (CBC)
  - Singapore President S. R. Nathan is returned unopposed by the Presidential Elections
    Committee, which ruled that he is the only eligible candidate out of 4 applicants.
    Singapore's nomination day is on October 17. (Bernama)
