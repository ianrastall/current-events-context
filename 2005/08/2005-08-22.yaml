Date: '2005-08-22'
Source_URI: Portal:Current events/2005 August 22
Intelligence_Payload:
  Uncategorized:
  - Iraq's parliament receives a draft of that country's constitution, minutes before
    the revised deadline. The parliamentary vote on the constitution will be delayed
    until a final draft emerges. (ABC)
  - Eric Rudolph is sentenced to three more life terms without possibility of parole
    for the Centennial Olympic Park bombing of the 1996 Summer Olympics in Atlanta.
    (BBC) (VOA)
  - A large explosion injures several people in Beirut, Lebanon. (BBC) (CNN)
  - The Piano Man has been identified and sent back home to Bavaria, Germany. (BBC)(CNN)
  - 'Conflict in Afghanistan: US Troops claim to have killed more than one hundred
    suspects following raids in south and East Afghanistan. (BBC)'
  - 'Conflict in Iraq: US Troops claim that they will investigate the circumstances
    following the death of a cousin of Iraq''s envoy to the United Nations. The man
    died from a bullet wound to the head as he opened his door to US Soldiers in western
    Iraq. (BBC)'
  - Patriarch Theophilus III is unanimously elected 141st Orthodox Patriarch of Jerusalem
    by the Holy Synod of the Orthodox Church of Jerusalem to replace ousted predecessor
    Irenaios I.(LA Times) (Link dead as of 00:41, 15 January 2007 (UTC))
  - Israeli forces enter the last remaining Israeli settlement in the Gaza Strip to
    remove the settlers from Netzarim, a religious farming community of about 500,
    completing the evacuation of all the enclaves. Four small militant settlements
    on the West Bank will also be cleared, with 5,500 troops heading there to begin
    evictions on Tuesday. (Reuters) (Link dead as of 00:41, 15 January 2007 (UTC)),
    IMRA
  - Israeli Prime Minister Ariel Sharon announces that existing large West Bank Israeli
    settlements will be expanded. (WikiNews)
  - Voting registration begins in the war-torn east of the Democratic Republic of
    Congo ahead of planned elections. (BBC)
  - In tennis, Maria Sharapova becomes the first Russian woman to reach world number
    one replacing injured American Lindsay Davenport at the top of the WTA rankings.
    (BBC) (Yahoo! News)
