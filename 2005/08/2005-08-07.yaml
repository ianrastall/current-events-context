Date: '2005-08-07'
Source_URI: Portal:Current events/2005 August 7
Intelligence_Payload:
  Uncategorized:
  - Peter Jennings, long-time anchor of ABC World News Tonight, has died from lung
    cancer at the age of 67. (ABC News)
  - 'Conflict in Iraq: 39 people have died, including at least two U.S. soldiers,
    following a series of insurgent attacks throughout Iraq. (AFP via Yahoo!)'
  - Russian Priz class mini-submarine AS-28 and its 7 crew members are saved at 03:25
    UTC off the Pacific coast (RIAN - in Russian) (Reuters), (Guardian)
  - England wins the second match of The 2005 Ashes test cricket series over Australia
    in a nail biter, winning by 2 runs at Edgbaston in Birmingham, England. (Cricinfo)
  - Venezuelan president Hugo Chávez dismisses cooperation with the US DEA, claiming
    that they spy on him (BBC) (Reuters)
  - In China, flooding in coal mine traps at least 102 (Xinhua) (People's Daily) (Channel
    News Asia) (Reuters)
  - Singer Marc Cohn is shot in the head in Colorado, but survives.
  - In South Africa, National Union of Mineworkers (NUM) begins the first country-wide
    strike in the gold mines (BBC) (Forbes) (Reuters SA)
  Israeli-Palestinian Conflict:
  - A 10-year-old Israeli boy is severely wounded after being shot in the head when
    an Al-Aqsa Martyrs Brigades gunman opened fire on the vehicle he was travelling
    in outside the Israeli settlement of Ateret in the West Bank. (Reuters) (YNETnews)
  - A Palestinian man, Muhammad Qashta, is shot dead as he stands outside his home
    in Rafah, Gaza Strip. IDF soldiers fire shots to the head and chest from an observation
    post. (Al Jazeera), (Kuwait News Agency)
  - Binyamin Netanyahu, the former Prime Minister of Israel, resigns his cabinet post
    as Finance Minister in protest against the planned Israeli withdrawal from the
    Gaza Strip. Deputy Prime Minister Ehud Olmert has been appointed to succeed him.
    (BBC), (Reuters)
