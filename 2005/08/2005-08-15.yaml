Date: '2005-08-15'
Source_URI: Portal:Current events/2005 August 15
Intelligence_Payload:
  Uncategorized:
  - Many countries celebrate the 60th Anniversary of the Victory in the Pacific and
    the end of World War II. Beijing holds an arts performance gala. In Japan, in
    a large-scale ceremony led by the Emperor Akihito, Prime Minister Junichiro Koizumi
    apologizes for people's suffering Japan caused during World War II. The ceremony
    was met with scattered protests. (Xinhua) (BBC China)
  - The Parliament of Iraq grants an extension to the nation's leaders to draw up
    a new Constitution. (MSNBC)
  - The U.S. refused to abide by a North American Free Trade Agreement (NAFTA) ruling
    on the U.S.-Canada softwood lumber dispute, leading to Canada's Finance Minister
    Ralph Goodale saying he was considering trade sanctions on the US. (Boston Globe)
  - Israel begins the Gaza Strip pullout plan. The Kissufim Roadblock was shut down
    at midnight between August 14 and August 15. Palestinian leader Mahmoud Abbas
    hailed the move as "historic" but said Israel should also pull out of the West
    Bank. (BBC), (Canada.com)
  - 'Conflict in Iraq: A senior aide to Abu Musab al-Zarqawi, Abu Zubair, has been
    shot dead following a U.S. ambush in Mosul, Iraq. (BBC)'
  - The Indonesian government and rebels from the Free Aceh Movement (Gam) sign a
    peace deal aimed at ending their near 30 year conflict. (BBC), (chosun.com). UN
    Secretary-General Kofi Annan applauded both parties for reaching a peaceful settlement
    of the dispute through dialogue, and commended Martti Ahtisaari, former President
    of Finland, for the mediation role that he played throughout the negotiation process.
    (XinHua)
  - Due to stalled labour talks, the Canadian Broadcasting Corporation locks out the
    company's 5500 members of the Canadian Media Guild, severely disrupting operations
    in most of Canada. The key point of contention is the broadcaster's insistence
    on more contract employees to the expense of full time positions. (The Toronto
    Star)
  - Phil Mickelson wins the 2005 PGA Championship (PGA.com)
  - India celebrates its sixtieth Independence Day.
  - Helios Airways Flight 522 crashes near Grammatiko, Greece, killing all 121 passengers
    and crew on board. It is the deadliest aviation accident in Greek history. (Aviation
    Safety Network)
