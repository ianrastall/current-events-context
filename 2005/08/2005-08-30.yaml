Date: '2005-08-30'
Source_URI: Portal:Current events/2005 August 30
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: According to U.S. and Iraqi government officials, US Air strikes
    near the border with Syria have left 56 civilians and over seven insurgents dead.
    (CNN)'
  - Former Prime Minister of Israel, Binyamin Netanyahu, has declared his intention
    to challenge Ariel Sharon for leadership of the Likud party. (BBC)
  - In Paris, France, seven die and fourteen are injured when a fire burns down an
    apartment housing African immigrants owned by the Société Immobilière d'Économie
    Mixte de la Ville de Paris 22:00 (GMT+1) (Bloomberg)
  - Prime Minister Manmohan Singh announced India would give US$50 million in additional
    aid for the reconstruction of Afghanistan during his meetings with Hamid Karzai.
    Earlier, it had pledged US$500 million to help rebuild the war-ravaged country.(MSN)
  - The 2005 Forbes Global CEO Conference has kicked off in Sydney, Australia. Police
    arrest four at a barricade surrounding the Opera House (Wikinews) (Sydney Morning
    Herald via SMH.com.au)
  - Former New South Wales Opposition Leader, John Brogden, is hospitalized after
    apparent suicide attempt after resigning as party leader. (Sydney Morning Herald
    via SMH.com.au)
  In the aftermath of Hurricane Katrina:
  - The death toll in Biloxi, Mississippi, may be as high as 80. Mayor A.J. Holloway
    declares that Katrina "is our tsunami", comparing the catastrophe to the 2004
    Indian Ocean Earthquake and Tsunami. (Yahoo! News) (Link dead as of 21:22, 14
    January 2007 (UTC)) Residents report storm surge higher than Hurricane Camille.
  - US Highway 90 along Gulfport, Mississippi, has been destroyed.
  - New Orleans, Louisiana, almost completely floods when levees along Lake Pontchartrain
    break. At least one attempt to repair broken levees was ended unsuccessfully.
    Gas leaks pollute the floodwaters. The primary evacuation site at the Louisiana
    Superdome is safe, with water only 3 ft. (1 m) deep outside. Death tolls there
    remain untold. Governor Kathleen Blanco orders the evacuation of everyone remaining
    in New Orleans.
  - The storm surge has totally destroyed the Interstate 10 causeway connecting the
    east side of New Orleans to mainland Louisiana over the east tip of Lake Pontchartrain.
  - The American Red Cross declares that the relief effort will exceed in scope that
    after the September 11, 2001 attacks. (Fox News)
  - Michael Brown, director of the United States Federal Emergency Management Agency,
    declares that Katrina was "catastrophic" and pledges full federal assistance.
    (Yahoo! News) (Link dead as of 21:22, 14 January 2007 (UTC))
  - Oil reaches US$70/bbl for the second time, closes at $69.35 on the New York Mercantile
    Exchange. Gasoline expected to rise as well. AP
