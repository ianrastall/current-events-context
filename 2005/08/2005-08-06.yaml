Date: '2005-08-06'
Source_URI: Portal:Current events/2005 August 6
Intelligence_Payload:
  Uncategorized:
  - The British politician and former Cabinet Minister Robin Cook dies suddenly at
    the age of 59. (BBC)
  - Jimmy Wales clarifies the recent media statements made about possible changes
    to Wikipedia editorial content. (Mailing list)
  - India and Pakistan announce that they have agreed to give each other advance notice
    of future nuclear missile tests. (BBC)
  - Fourteen people are killed when a Tunisian ATR 72 passenger plane carrying 39
    passengers and crew ditches in the sea off the coast of the Italian island of
    Sicily. (CBS/AP), (Reuters)
  - Cuban veteran singer Ibrahim Ferrer, vocalist and front man of the Buena Vista
    Social Club band, dies at the age of 78 (Prensa Latina) singer ferrer dies (Contactmusic)
    (Reuters)
