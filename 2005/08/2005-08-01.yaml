Date: '2005-08-01'
Source_URI: Portal:Current events/2005 August 1
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: At least six US Marines have died following an insurgent attack
    in Haditha, 140 miles northwest of Baghdad, Iraq. (NBC)'
  - A survey of the world's strongest brands by Anholt-GMI has placed Australia as
    the leading "nation brand", ahead of Canada, Switzerland and the United Kingdom.
    Last years top brand, Sweden, dropped to fifth place, whilst the United States
    dropped from fourth to eleventh place. (The Age) (NZ Herald)
  - One person has been killed and another injured in an explosion on a Russian nuclear-powered
    submarine in dock for decommissioning. (BBC)
  - Leaked communications between two U.S. military prosecutors reveal internal doubts
    about the military commission system established to try Guantanamo Bay detainees.
    In separate emails, the prosecutors allege that the commission system is rigged
    in favour of the prosecution and that the cases being pursued are "marginal".
    In Australia, the Australian Government came under renewed pressure to withdraw
    its support for the commissions, under which Australian citizen David Hicks would
    be tried. (Wikinews) (ABC)
  - Vice-President John Garang of Sudan, a central figure in the new peace deal ending
    the Second Sudanese Civil War, is reported dead with 13 other people in an aircraft
    crash near the Uganda-Sudan border. (Wikinews), (Reuters), (CNN), (AP via Yahoo!News)
    (Link dead as of 02:29, 15 January 2007 (UTC))
  - Deadly riots erupt in Khartoum after Garang's death. (Reuters) (Link dead as of
    02:29, 15 January 2007 (UTC))
  - King Fahd of Saudi Arabia has died in a hospital at the age of 83. It was believed
    that he was in poor health and entered the hospital on May 27 with acute pneumonia.
    Crown Prince Abdullah, who had been effective regent for years, accedes to the
    throne. Defence Minister Prince Sultan will be the new Crown Prince. (Wikinews)
    (Reuters) (Al-Jazeera)
  - New European Union directive banning tobacco advertising comes into effect (Euronews)
  - President Bush circumvents the Senate after a five-month impasse to appoint John
    Bolton as the United States Ambassador to the United Nations. (Wikinews) (Yahoo
    News) (Link dead as of 02:29, 15 January 2007 (UTC))
  - In Egypt, opposition party al-Wafd (Delegation Party) announces that it will endorse
    its leader Numan Gumaa as a candidate in presidential election next September
    (Al-Jazeera)
  - NASA announces that astronauts will make repairs on the bottom of the Space Shuttle
    Discovery to ensure its safety in re-entry (Space.com) (Science Daily) (Reuters)
    (Link dead as of 02:29, 15 January 2007 (UTC))
  - In Colombia, paramilitary group United Self-Defence Forces of Colombia begins
    disarming (BBC)
  - In Brazil, Valdemar Costa Neto, leader of the Liberal Party, steps down after
    he admitted that he received money from the ruling Worker's Party (MercoPress)
    (Reuters) (Link dead as of 02:29, 15 January 2007 (UTC)), (Bloomberg)
  - In India, HCL infosystems and Dayanidhi Maran, communications minister, unveil
    cheap "PC for India" with Linux OS, costing 9990 rupees (equivalent to US$225)
    (The Hindu) (Hindu Business Line) (BBC)
