Date: '2005-08-21'
Source_URI: Portal:Current events/2005 August 21
Intelligence_Payload:
  Uncategorized:
  - More than 800,000 people joined Pope Benedict XVI for the concluding Mass of World
    Youth Day 2005 in Cologne, Germany. (CNN) The next World Youth Day was announced
    to be held in Sydney, Australia in 2008. BlueAirNews News
  - Martin Dillon, 48, musician, operatic tenor, and professor of music, died in Randolph,
    VT. Martin Dillon was found dead, in the back yard of a Highland Avenue residence,
    in Randolph, VT. Musicians and supporters of the Central Vermont Chamber Music
    Festival | (CVCMF) were stunned to learn that tenor Martin Dillon died about 12
    hours after his August 20 concert on the Chandler Music Hall stage. Due to the
    untimely nature of his death, an autopsy and a toxicology report was ordered,
    and there was no appearance of anything suspicious. Later it was confirmed that
    he died of a cardiac arrest of natural causes. See Randolph Herald News See Tribute
    blog See In Memoriam Rutgers Camden
