Date: '2005-08-02'
Source_URI: Portal:Current events/2005 August 2
Intelligence_Payload:
  Uncategorized:
  - In Iran, Judge Masoud Ahmadi Moghaddasi, who had ruled the case of Akbar Ganji,
    is assassinated by a gunman. (Guardian)
  - 'President Bush endorses intelligent design, stating that it should be taught
    in school. He is quoted as saying: "I think that part of education is to expose
    people to different schools of thought. You''re asking me whether or not people
    ought to be exposed to different ideas, the answer is yes." A large portion of
    the scientific community does not recognise ID as a scientific theory and considers
    it to be creationist pseudoscience.(Boston Globe)'
  - In Ohio's Second District, voters are choosing a new congressman. The candidates
    are Jean Schmidt and Paul Hackett. Schmidt ultimately wins the election.
  - While landing during a severe lightning storm, Air France Flight 358 skidded off
    the runway at Toronto Pearson International Airport at 4:03 p.m. local time and
    burst into flames. All 309 passengers and crew on board survived. (CJAD 800) (CBC)
    (BBC)
  - Anti-disengagement protesters rally in Sderot. The organizers said the crowd numbered
    50,000, but police estimated the figure between 10,000 and 15,000. Some 18,000
    troops and 12,000 police are involved in preventing protesters from getting to
    the Gush Katif Israeli settlement on the Gaza Strip. (INN), (BBC), (HaAretz)
  - Scientists at Stanford University have used nanotechnology to kill cancer cells
    without harming healthy tissue. (BBC)
  - 'Conflict in Iraq: At least 15 people have died following a series of insurgent
    attacks throughout Iraq. (BBC)'
  - The Chinese national oil company CNOOC has withdrawn a bid for Unocal quelling
    the fears that the deal would give a foreign government too much control over
    American oil reserves. Chevron is now expected to acquire Unocal. (NY Times)
  - In Zimbabwe, state prosecutors dropped treason charges against opposition leader
    Morgan Tsvangirai. Mr Tsvangirai, leader of the Movement for Democratic Change,
    was accused of organising mass protests in 2003 to overthrow Robert Mugabe's controversial
    régime. (AFP)
  - In Germany, police in Brandenburg announce that they have uncovered bones of nine
    newborn babies that had been buried in flower pots. The woman believed to be their
    mother, identified in newspapers as "Sabine H.", has been arrested in the worst
    case of individual infanticide in German history. (Reuters) (BBC)
  - Malaysia, Indonesia and Singapore agree to joint anti-piracy patrols in the Malacca
    Strait. (Jakarta Post) (Channel News Asia) Thailand later joins them. (Channel
    News Asia) (New Straits Times) (Reuters AlertNet)
  - In Turkey, two explosions injure 6 people in Antalya, a popular tourist resort.
    The tourism minister blames gas leaks but the police are investigating. (Turkish
    Press) (Reuters AlertNet)
  - In France, medical authorities investigate a case where remains of 351 stillborn
    fetuses had been kept in storage in St Vincent de Paul hospital against the law
    and the parents' consent. (BBC)
