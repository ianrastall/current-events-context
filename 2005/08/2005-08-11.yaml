Date: '2005-08-11'
Source_URI: Portal:Current events/2005 August 11
Intelligence_Payload:
  Uncategorized:
  - Tens of thousands of Israelis have converged on Tel Aviv to protest the proposed
    removal of Israeli settlements from the Gaza Strip. (Ynet) (BBC)
  - Scientists at the German Primate Centre and the University of Göttingen announce
    the discovery of two new species of lemur, Mirza zaza and Microcebus lehilahytsara.
    (German press release), (BBC)
  - Pakistan's first domestically designed cruise missile, the Babur missile, is test
    launched. (BBC)
  - Salva Kiir has been sworn in as the Vice-President of Sudan, following the recent
    death of John Garang. (BBC) Ugandan President Yoweri Museveni has threatened to
    close down newspapers which continue to publish "conspiracy theories" about Garang's
    death. (BBC)
  - 'Abortion in Ireland: Three Irish women are taking the Government of Ireland to
    the European Court of Human Rights to challenge Ireland''s constitutional ban
    on Abortion. (BBC)'
  - Mars Reconnaissance Orbiter was scheduled to be launched at 9:00am EST (local
    time for launch), but the launch was scrubbed due to technical problems. (BBC)
    (Spaceflightnow.com)
  - Malaysia has announced a state of emergency in two towns after air pollution reached
    dangerous levels. The pollution is blamed on fires lit to clear land in neighbouring
    Indonesia, seriously affecting air quality and visibility across the Strait of
    Malacca. (BBC)
  - Scott Sullivan, once the chief financial officer of WorldCom, then the star witness
    in the prosecution of his former boss there, Bernie Ebbers, is sentenced to five
    years in prison.
