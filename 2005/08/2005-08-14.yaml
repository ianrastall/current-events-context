Date: '2005-08-14'
Source_URI: Portal:Current events/2005 August 14
Intelligence_Payload:
  Uncategorized:
  - Kurmanbek Bakiyev has been sworn in as Kyrgyzstan's new president after winning
    nearly 90 percent of the vote last month in an election to find a successor to
    President Askar Akayev, who was ousted during protests in March.(Reuters)
  - Thirty bodies are found in a mass grave south of Baghdad after the interrogation
    of Iraqi insurgents captured in a raid yesterday. (Newsday; AP)
  - Time magazine cites United States military intelligence documents that an Iranian-backed
    Iraqi insurgent network, led by Abu Mustafa al-Sheibani, had introduced a bomb
    design based on Iranian-backed Lebanese militia Hizbollah plans in last eight
    months. (Reuters)
  - U.S. forces in Iraq raid a warehouse in Mosul. They uncover a suspected chemical
    weapons factory. (Boston Globe)
  - Helios Airways Flight 522 en route from Larnaca, Cyprus via Athens, Greece to
    Prague, Czech Republic crashes near Athens, with at least 121 onboard. Observations
    from Greek fighter aircraft indicate a decompression problem. (BBC)
  - Ugandan journalist Andrew Mwenda has been charged with sedition after a radio
    debate speculating on the death of Sudan's vice-president John Garang.(BBC)
  - Liberian football hero George Weah has been given the go-ahead to contest the
    country's presidency. Liberia's election commission dismissed a complaint that
    his French citizenship barred him from standing.(BBC)
