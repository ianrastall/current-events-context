Date: '2005-08-27'
Source_URI: Portal:Current events/2005 August 27
Intelligence_Payload:
  Uncategorized:
  - Over 30 are injured in a bomb blast on a ferry at Lamitan, Basilan, Philippines,
    a stronghold of the Abu Sayyaf group. (BBC)
  - Muhammad Deif, the Hamas leader who heads Israel's most wanted list, releases
    a video taunting Israel. (BBC)
  - Nearly 1,000 detainees at the Abu Ghraib prison are released this week at the
    request of the Iraqi Government, the largest number of prisoners freed since the
    start of the war.
  - The All Blacks win the tri nations with a nail biting win over the Springboks
    31-27 in Dunedin.(CNN)
  - Actor Robert Downey Jr. marries film producer Susan Levin in a Jewish ceremony
    at Amagansett, New York.
