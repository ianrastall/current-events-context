Date: '2005-08-23'
Source_URI: Portal:Current events/2005 August 23
Intelligence_Payload:
  Uncategorized:
  - At least 41 die when TANS Peru Flight 204, a Boeing 737-200, crashes near Pucallpa,
    Peru, with 100 on board. It was the fifth major airline accident this month. (Reuters)
    (Link dead as of 21:38, 14 January 2007 (UTC)), (BBC), (CNN).
  - UN Secretary-General Kofi Annan visits Zinder, Niger, which is affected by a regional
    food crisis in West Africa. (Guardian), (BBC), (CNN) (Link dead as of 21:38, 14
    January 2007 (UTC)), (Reuters) (Link dead as of 21:38, 14 January 2007 (UTC))
  - Israel completes the unilateral disengagement from all settlements in the Gaza
    Strip and four in the West Bank. (Reuters) (Link dead as of 21:38, 14 January
    2007 (UTC)), (BBC), (Haaretz) (Link dead as of 21:38, 14 January 2007 (UTC))
  - Canada has sent 2 Kingston-class warships to the north Arctic port of Churchill,
    Manitoba following a territorial dispute with Denmark regarding Hans Island. (BBC)
  - Christian religious leader Pat Robertson, a televangelist and former candidate
    for President of the United States, calls on the U.S. to kill Hugo Chávez, the
    President of Venezuela.(Yahoo! News (Link dead as of 21:38, 14 January 2007 (UTC)))
    (BBC) (ABC) (Link dead as of 21:38, 14 January 2007 (UTC))
