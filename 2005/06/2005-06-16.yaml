Date: '2005-06-16'
Source_URI: Portal:Current events/2005 June 16
Intelligence_Payload:
  Uncategorized:
  - A report by the Metropolitan Police in the UK states that children are being trafficked
    into the UK from Africa to be used as 'human sacrifices'. (BBC), (Guardian)
  - 26 of 60 tank cars carrying fuel oil derail near Rzhev, Russia (about 200 km /
    125 miles northwest of Moscow), sending a very large amount of oil into the ground
    contaminating Moscow's water supply and the Volga River after flowing down the
    Vazuza River from the accident site. It is not yet known if this incident is related
    to the bomb that was exploded on June 12 that derailed a passenger train. (RIA
    Novosti) (RIA Novosti) (Pravda)
  - 'Conflict in Iraq: Five U.S. Marines die from a roadside bomb in Ramadi, Western
    Iraq. (BBC)'
  - A Jewish cemetery in West Ham has been attacked. This was the 117th time a Jewish
    cemetery in Great Britain has been attacked in 15 years. (The Independent)
  - In Cambodia, 6 unidentified gunmen take over a school in the town of Siem Reap
    near Angkor Wat and hold a number hostage for six hours. Reports of the number
    of hostages range from 24 to 70. Many of them were children from foreign families
    that work in the area. Gunmen demand money, weapons and a car. A Canadian child
    is executed by the gunmen before the rest are freed. (BBC) (CBC) (Channel News
    Asia) (Channel News Asia) (Reuters),(Reuters)
  - In Japan, former tycoon Yoshiaki Tsutsumi confesses to financial fraud and insider
    trading. (Japan Today) (Channel News Asia)
  - Chilean authorities have found a weapons arsenal in Villa Baviera, former Colonia
    Dignidad, during the investigation of the colony's founder Paul Schaefer (BBC)
  - Uzbekistan deports four members of human rights group International Helsinki Federation
    after they had investigated unrest in Andijan. (Mosnews) (Reuters AlertNet)
  - In Brazil, minister José Dirceu resigns due to allegations that he knew about
    bribery but insists that he is innocent (BBC) (Forbes)
  - Eastern Orthodox Church demotes former patriarch Irenaios I to a rank of a monk
    (Jerusalem Post/AP) (BBC)
  - The police chief of Nuevo Laredo, Mexico, Alejandro Domínguez, is gunned down
    just seven hours after his inauguration.
