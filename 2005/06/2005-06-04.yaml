Date: '2005-06-04'
Source_URI: Portal:Current events/2005 June 4
Intelligence_Payload:
  Uncategorized:
  - In the context of the Parti Québécois National Congress, Bernard Landry announces
    his surprise resignation as leader of the Parti Québécois, the major party in
    Quebec that advocates national independence for Quebec. (CTV)
  - A French court finds the newspaper Le Monde guilty of defamation against the Jews
    and Israel, in an article published in 2002 which used "Jews" and "Israel" interchangeably.
    (Haaretz)
  - Hundreds of people attend the funeral in Beirut of anti-Syrian columnist Samir
    Kassir, killed by a bomb on Thursday. Opposition leaders Gibran Tueni and Saad
    al-Hariri, son of slain former Prime Minister Rafik al-Hariri, are in attendance.
    Reuters
  - Palestinian President Mahmoud Abbas announces the postponement of legislative
    elections originally scheduled for July 17. He cited a report from the Palestinian
    election authority that it needs more time to implement changes in laws concerning
    seating of legislators. Hamas leaders object to the postponement. (New York Times),
    (Haaretz)
  - Roberto Maroni, Italian Minister of Welfare, calls for Italy to stop using the
    Euro and revert to the Lira. (Sunday Mail)
  Guantánamo Bay Qur'an desecration allegations:
  - Following allegations that the Muslim holy book, the Quran, was urinated on in
    front of inmates at Guantanamo Bay, Cuba, the Bush administration drastically
    changes its position on the credibility of these reports, and now admits that
    desecration did in fact occur. (Wikinews)
