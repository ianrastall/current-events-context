Date: '2005-06-11'
Source_URI: Portal:Current events/2005 June 11
Intelligence_Payload:
  Uncategorized:
  - The G8 announces the cancellation of the multilateral debt of eighteen of the
    poorest countries in the world (BBC)
  - '2005 Atlantic hurricane season: Tropical Storm Arlene makes landfall near Pensacola,
    Florida. One death has been reported thus far. (ABCNews)'
  - In Ethiopia, opposition says that the leaders of Coalition for Unity and Democracy,
    Hailu Shawel and senior official Lidetu Ayalew, are under house arrest and demand
    their release. (IOL) (BBC)
  - In Portugal, former prime minister Vasco Gonçalves, one of the figures of the
    Carnation Revolution, dies (Guardian Unlimited) (BBC)
  - In Poland, gay rights activists defy ban and march in the streets of Warsaw (Radio
    Polonia) (BBC)
