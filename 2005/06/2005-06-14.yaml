Date: '2005-06-14'
Source_URI: Portal:Current events/2005 June 14
Intelligence_Payload:
  Uncategorized:
  - A major earthquake strikes about 80 miles (130 kilometers) off the coast of northern
    California on Tuesday night, briefly prompting a tsunami warning along the Pacific
    coast but with no immediate reports of damages or injuries. (AP)
  - Asafa Powell breaks the world record in the 100 meters (328 feet, 1 inch) Tuesday
    with a 9.77 clocking at the Athens, Greece Olympic Stadium, making him the world's
    fastest human at 36.85 km/h (22.9 mi/h). (AP)
  - The Supreme Court of Argentina declares unconstitutional two laws that granted
    immunity to Dirty War human rights abusers. (Bloomberg)
  - Jacob Zuma, Executive Deputy President of South Africa, is fired for being implicated
    in a high-profile corruption trial. (Reuters)
  - 'Conflict in Iraq: 22 people have died following a suicide bombing in Kirkuk,
    northern Iraq. (BBC)'
  - Sudan rejects the UN's decision to use the International Criminal Court to try
    criminals in relation to the atrocities of the Darfur conflict, and instead opens
    its own recently-created special court. (Al-Jazeera) (ReliefWeb), (ISN)
  - A TNS/MRBI Irish Times opinion poll predicts that Ireland, previously seen as
    certain to vote yes, is likely to vote no in its planned referendum on the European
    Constitution. Only 30% of voters indicated that they would vote for the constitution,
    the lowest level in any country in the European Union to date. (The Scotsman)
  - 'A four-year-old boy is reported dead shortly after losing consciousness while
    riding Mission: SPACE at Walt Disney World''s Epcot. (CNN)'
  - According to Washington Post, US and Russian defense officials blocked NATO demand
    of investigation into crackdown of unrest in Uzbekistan (Washington Post) (ReliefWeb)
    (IHT)
  - In Indonesia, lawyers of Schapelle Corby file appeal in Bali court (Australia)
    (Reuters)
  - In Mexico, Raúl Salinas de Gortarí is released from prison on bail. He has been
    in prison for ten years (El Universal) (Reuters)
  - JP Morgan Chase & Co. announced a settlement of a lawsuit brought against it by
    Enron investors who claim that it helped the management of that company defraud
    them. JP Morgan will pay claimants US$2.2 billion.
  Football (soccer) sex crime allegations:
  - George Best, the former Manchester United star from Northern Ireland, has been
    arrested and bailed on suspicion of indecently assaulting a young girl. (BBC)
  - Robin van Persie, the Dutch Arsenal footballer, has been arrested in Rotterdam
    on suspicion of rape. (BBC)
