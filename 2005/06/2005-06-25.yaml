Date: '2005-06-25'
Source_URI: Portal:Current events/2005 June 25
Intelligence_Payload:
  Uncategorized:
  - In Destin, Florida, a 14-year-old Louisiana girl is killed in a shark attack.
  - A second case of mad cow disease has been confirmed in the United States.
  - 'Elections in Bulgaria: The people of Bulgaria are voting today and the government
    of Prime Minister Simeon Sakskoburggotski, the country''s former Tsar, is expected
    to be defeated. (Reuters)'
  - Pope Benedict XVI's new book contains material critical of the European Union's
    efforts that he characterizes as an "attempt to build a human community absolutely
    without God" and Western liberalization of abortion. (The Associated Press)
  - Hong Kong's new leader, Donald Tsang, promises to rebuild the trust of the people
    in the government of the Chinese territory. (The Associated Press)
  - The Sri Lanka Muslim Congress, a political party, says it would boycott the deal
    between the government and Tamil rebels for sharing tsunami relief because it
    shortchanged Muslims. (BBC)
  - China's southern province of Guangdong suffers great damage from the flooding
    Pearl River. (The Associated Press)
  - In Iran, the hardline Mayor of Tehran, Mahmoud Ahmadinejad, wins Friday's run-off
    election for the nation's presidency with 62% of the vote. (BBC) (Bloomberg News)
  - Residents in St. Louis, Missouri are allowed back to their homes early today after
    an explosion at an industrial gas plant forced emergency evacuations Friday. (The
    Associated Press)
  - The board of the NAACP unanimously selects business executive Bruce S. Gordon
    as the civil rights organization's next president. (Guardian)
  - Billy Graham meets former President Bill Clinton onstage before a crowd of 80,000
    during the second of three services of his last crusade at Flushing Meadows Corona
    Park in New York.
