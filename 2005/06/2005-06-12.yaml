Date: '2005-06-12'
Source_URI: Portal:Current events/2005 June 12
Intelligence_Payload:
  Uncategorized:
  - Steve Jobs, CEO of Apple Computer and of Pixar Animation Studios, deliveres a
    Commencement addresses in Stanford University. (Stanford University)
  - French journalist Florence Aubenas and her Iraqi interpreter Hussein Hanoun al-Saadi
    are freed after five months of captivity in Iraq. (BBC)
  - A series of bombs strike the Iranian cities of Ahwaz and Tehran, leaving 8 people
    dead and dozens wounded. There has been no claim of responsibility. (BBC)
  - Mike Tyson announces he will retire from boxing. Wikinews
  - 'Lebanese general elections: Results of the third round of the Lebanese parliamentary
    elections in Mount Lebanon and the Beqaa show the triumph of Michel Aoun''s list
    in the upper part of the region (Metn) and the success of Walid Jumblatt''s coalition
    in the lower part (Chouf). (Daily Star) (ABC) (IHT)(Daily Star) (Reuters) (Al-Jazeera)
    Last stage of the elections will be next Sunday in North Lebanon.'
  - Kuwait appoints first female cabinet minister, Massuma al-Mubarak (Al-Jazeera)
    (Arab News) (IHT)
  - In the Philippines, president Gloria Arroyo asks for unity in the face of so far
    unproven allegations of electoral fraud. The army is in alert to thwart any coup
    attempts. Opposition organizes a brief protest to demand Arroyo's resignation
    (Sun Star, Philippines) (ABS-CBN)
  - Kurdish parliament in Northern Iraq elects Masoud Barzani as a president of the
    region (Reuters)
  - In China, official death toll in the flood in Heilongjiang Province rises to 92
    (Xinhua) (People's Daily)
  - Ethiopian opposition appeals for calm after the last week's protests (Reuters
    AlertNet)
  - Nepal lifts a ban on Indian television stations. (Deepika) (BBC)
  Conflict in Iraq:
  - 28 bodies, believed to mainly be Sunni Arabs, have been found in Baghdad sidestreets.
    (BBC), (A.P)
  - Four US Soldiers die from two roadside bombs in Baghdad, bringing the total death
    toll of US troops to over 1,700. (Associated Press)
