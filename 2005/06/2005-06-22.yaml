Date: '2005-06-22'
Source_URI: Portal:Current events/2005 June 22
Intelligence_Payload:
  Uncategorized:
  - German car manufacturer BMW acquires the Formula One team Sauber Petronas. In
    the next season the new team will be probably known as BMW Sauber. BBC Sport
  - The entire network of the Swiss Federal Railways shuts down due to a power failure
    in its overhead wire system. The power failure is also affecting international
    transit through Switzerland as such intercity trains use the same system. Initial
    reports indicate that the power failure started with a voltage drop in Ticino
    (in the St. Gotthard region) that then spread to the entire system. The initial
    failure happened at about 1700 local time, with some power supplies restored about
    2015, but the last trains did not reach their destinations until 0300. (SwissInfo)
    (BBC)
  - In Chad, a referendum for allowing presidents, particularly Idriss Déby, run for
    office for three straight terms, passes. (Reuters SA)
  - An Italian military tribunal in La Spezia has sentenced 10 German former Nazi
    officers in absentia to life imprisonment for their role in a World War II massacre
    of 560 civilians in the Tuscan village of Sant'Anna di Stazzema. (BBC News)
  - In Colombia, congress approves a draft bill that offers sentences of only eight
    years to those members of paramilitary militias who give up their weapons. It
    demands that they confess, return the stolen property and disarm. Critics of president
    Álvaro Uribe say that the law is too lenient (IHT) (Colombia Journal) (Reuters
    AlertNet)
  - International Whaling Commission meeting in Ulsan, South Korea, does not support
    Japan's suggestion to resume coastal whaling or increase its own scientific one.
    Commission also voted down a request that Japan could catch 150 minke whales a
    year (Japan Today) (Channel News Asia) (Reuters AlertNet)
  - In South Africa, President Thabo Mbeki names energy and minerals minister Phumzile
    Mlambo-Ngcuka as his deputy president. She is the first woman to hold the position.
    (SABC) (Reuters SA) (News24) (BBC profile)
  - The Peruvian government condemns supreme court decision to drop the case of former
    president Alberto Fujimori for forging signatures for 2000 elections (Reuters
    AlertNet)
  - The Peruvian government states that it will allow limited growing of coca plant
    for traditional uses (MercoPress) (BBC)
  - In Brazil, heated arguments in the congress result in fighting and the session
    is suspended. Fighting begun when former chief of staff José Dirceu, who had rejoined
    the congress, tried to defend the government against the bribery allegations (Bloomberg)
  - In Ethiopia, main opposition group Coalition for Unity and Democracy states that
    government investigators have dropped all their complaints about possible election
    fraud. Government still has not released any results (AllAfrica) (Reuters AlertNet)
    (BBC)
  - United Nations Security Council votes to send 750 more peacekeepers to Haiti for
    elections and extend the UN mandate to February 15 2006 (UN News Centre) (ReliefWeb)
  - In Poland, opposition demands resignation of prime minister Marek Belka because
    of allegations that declassified files show he had ties to communist-era security
    services. Belka refuses to do so, stating that he signed a contract to be allowed
    to go to study trip to USA (Radio Polonia) (Warsaw business Journal) (Reuters)
