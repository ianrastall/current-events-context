Date: '2005-06-06'
Source_URI: Portal:Current events/2005 June 6
Intelligence_Payload:
  Uncategorized:
  - Syrian vice-president Abdel-Halim Khaddam resigns during a Ba'ath party congress
    (BBC) (Jerusalem Post)
  - In Ethiopia, police arrest more than 500 students who protest against the parliamentary
    elections. The ruling EPRDF party claims victory but official results have been
    delayed until July 8 due to complaints of electoral fraud and opposition protests
    (News24) (Reuters AlertNet) (BBC)
  - In Burundi, former rebel group Hutu Forces for the Defence of Democracy wins 75
    out of 129 seats in municipal elections (AllAfrica) (Reuters AlertNet) (BBC)
  - In Kyrgyzstan, the top prosecutor issues an arrest warrant for the former prime
    minister Nikolai Tanayev for mishandling government funds (Guardian Unlimited)
    (BBC)
  - Bolivian president Carlos Mesa offers his resignation when unrest continues.(El
    Clarin)
  - 'Debian GNU/Linux: Version 3.1, codenamed sarge, is released. (Press release)'
  - Apple Computer announces they would change the processors for their Macintosh
    computer lineup from IBM to Intel. - Ziff Davis; BBC News
  - The Supreme Court of the United States found for the federal government in a 6-3
    decision in the medical marijuana case Ashcroft v. Raich. The court also decided
    in Spector v. Norwegian Cruise Line Ltd. by ruling that the ADA applies to foreign
    cruise ships.
  - U.S. Secretary of State Condoleezza Rice opened the 35th General Assembly meeting
    of the Organization of American States Sunday in Fort Lauderdale, Florida. Secretary
    Rice called on member states to do more to protect democracy in the region, and
    strengthen civil society. (VOA News)
  - The International Criminal Court announces an investigation into crimes against
    humanity in Darfur (Sudan Tribune) (Reuters AlertNet)
  - Protests against privatisation of essential utilities continue in Bolivia (Reuters
    AlertNet)
  - In Bougainville, Joseph Kabui is elected president of the autonomous government
    (Radio Australia) (BBC)
  - In Australia, Chinese defector Chen Yonglin claims that the Australian government
    rejected his request for political asylum without interviewing him. China states
    that his claims about a large espionage ring in Australia are false (ABC) (Taipei
    Times) (BBC)
  - In Washington state, United States, the battle over the results of the 2004 gubernatorial
    election is settled by a county judge, approving the final count in favor of Christine
    Gregoire.
