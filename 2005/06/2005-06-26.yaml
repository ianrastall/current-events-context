Date: '2005-06-26'
Source_URI: Portal:Current events/2005 June 26
Intelligence_Payload:
  Uncategorized:
  - Richard Whiteley, who for 23 years presented the Channel 4 game show Countdown,
    died aged 61.
  - The Kremlin has called for an inquiry into fighting that took place on June 4,
    2005, between Chechens and Avars. Russian president Vladimir Putin threatens that
    if any future incidents take place, "the North Caucasus will burn." (Seattle Post-Intelligencer)
  - The Israeli Foreign Minister, Silvan Shalom, apologises to New Zealand for the
    actions of two Israeli citizens, believed to be Mossad agents, who attempted to
    gain New Zealand passports under false pretences in 2004. The apology allows diplomatic
    relations between the two countries to return to normal. (NZ Herald)
  - U.S. officials meet with Iraqi insurgents in attempt to quell attacks. More than
    30 are killed in series of suicide bombings across the country. (The Times), (NY
    Times)
  - Elections in Bulgaria
  - The Socialists win a plurality with 31.44% of the vote, with incumbent Prime Minister
    and ex-Tsar Simeon Saxe-Coburg receiving 20.13%. Despite the plurality, the results
    fall far short of pre-election forecasts for the Socialists. (Reuters)
  - Ataka, a nationalist party founded only two months before, wins 7.9% of the vote.
    The party opposes membership in the European Union and the North Atlantic Treaty
    Organization. (Int'l Herald Tribune)
  - Florida beaches reopen after the shark attack Saturday that killed Jamie Daigle.
    (CNN)
  - Fires in the Southwestern United States threaten a small community and close a
    highway in Utah. Blazes in California, Arizona, and Nevada have already consumed
    200,000 acres (800 km²). (Guardian)
  - Colombia launches a large counter-offensive against FARC (BBC) (CNN)
  - In Chile, senator Jorge Lavandero receives suspended sentence for child molestation.
    Opposition criticizes the sentence (CNN)
  - In Kenya 49 people die and 174 are hospitalized after drinking industrial alcohol
    (Standard, Kenya) (Reuters AlertNet) (Guardian Unlimited)
  - In Paris, former sports minister Guy Drut withdraws from the Paris' bid to host
    2012 Olympic Games because he is charged with involvement with corruption (GamesBids)
    (BBC)
  - Syrian court acquits human rights activist Aktham Naisse (Al-Jazeera) (Al bawaba)
  - Rev. Billy Graham finishes what might be his final crusade. He preached before
    a crowd of 90,000 at Flushing Meadows Corona Park in New York. (New York Times)
