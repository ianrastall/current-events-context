Source_URI: Portal:Current events/2005 June 18
Intelligence_Payload:
  Uncategorized:
  - In Canada, the rain died down and the state of emergency came to an end. With
    one evening of pounding rain, hail and cold temperatures, the Elbow River spilled
    over the dam for the first time. Again the low-lying areas of Calgary, AB were
    evacuated, the town of Bragg Creek, the towns of High River and Okotoks, and the
    small town of Sundre were all evacuated.
