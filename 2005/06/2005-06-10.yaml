Date: '2005-06-10'
Source_URI: Portal:Current events/2005 June 10
Intelligence_Payload:
  Uncategorized:
  - In the Philippines, whistleblower Samuel Ong accuses, with audio evidence, President
    Gloria Macapagal-Arroyo of rigging the 2004 elections, thus starting an electoral
    crisis. (IHT)
  - The Colima volcano in Mexico increases its eruptive activity, with strong explosions.
    (CNN)
  - The Bolivian Congress accepts the resignation of Carlos Mesa and names Supreme
    Court justice Eduardo Rodríguez as the new interim president (Bloomberg) Bolivian
    military says it is ready to intervene if protests continue (IHT)
  - In Japan, a high school student throws a bomb into classroom in Hikari, Yamaguchi
    Prefecture. 69 students are injured. (Japan Today)
  - In Australia, a Queensland government inquiry states that medical doctor Jayant
    Patel should be charged with murder, fraud, negligence and medical malpractice
    due to the death of 87 of his patients. Jayant Patel has left the country and
    his current location is unknown. (ABC) (SBS)
  - In India, Subrata Roy, chairman of Sahara Group, goes public to state that he
    is healthy. Roy had been out of the public eye since April and his absence had
    aroused rumors of death, illness, intrafamily conflict and political pressure.
    (Hindu) (ExpressIndia) (BBC)
  - Kuwait's Crown Prince Sheikh Saad al-Abdulla al-Sabah is taken to the hospital.
  - The popular Battlefield 2 Demo was released to the public as a preview to the
    full version of the game Battlefield 2 launched on June 21, 2005.
