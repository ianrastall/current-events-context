Date: '2005-06-17'
Source_URI: Portal:Current events/2005 June 17
Intelligence_Payload:
  Uncategorized:
  - A mudslide in San Antonio Senahu, Guatemala, kills 23 people, including several
    children. Most of the dead were of Mayan descent. (alternet)
  - The murder weapon used to kill Leon Trotsky is purported to have surfaced in Mexico.
    (BBC)
  - A United Nations investigation has concluded that Rafik Hariri, the former Prime
    Minister of Lebanon, was killed by a truck bomb. (BBC)
  - Controversial Pakistani scientist AQ Khan is said to be stable after suffering
    a heart attack. (BBC)
  - In Kyrgyzstan, hundreds of protesters seize a government building in the capital
    of Bishkek. They support presidential candidate Urmat Baryaktadasov, who was denied
    registration because the government says he is also a citizen of Kazakhstan. Police
    later seized the building. (RIA Novosti) (CNN) (Guardian Unlimited) (BBC)
  - The 2005 Presidential election begins in Iran. Most pre-voting polls favor Akbar
    Hashemi Rafsanjani. (Middle East Online) (Al-Jazeera) (Reuters) (IHT)
  - Cambodian police have arrested a security guard who allegedly planned the hostage
    drama in Siem Reap. (Channel News Asia) (Reuters)
  - The Supreme Court of the Republic of China rejects the opposition's appeal to
    nullify the results of the 2004 presidential election. Chen Shui-bian won the
    election by a narrow majority. (Channel News Asia) (Bloomberg)
  - In the United Kingdom, the Ugandan-born bishop of Birmingham Rt Rev Dr John Sentamu
    is named the new Archbishop of York. He is the first ever black person to be appointed
    an Archbishop of the Church of England. (BBC) (Reuters)
  - The Vatican announces that it has taken the unusual step of suspending the announced
    beatification of the Reverend Leon Dehon in order to investigate charges of anti-Semitism.
    AP
  - Dennis Kozlowski, the former chief executive of Tyco International, and Mark Swartz,
    its erstwhile chief financial officer, are found guilty by a New York state court
    jury on all but one of 31 counts of grand larceny, conspiracy, falsifying business
    records and securities fraud. (Houston Chronicle)
