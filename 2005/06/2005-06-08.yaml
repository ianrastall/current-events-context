Date: '2005-06-08'
Source_URI: Portal:Current events/2005 June 8
Intelligence_Payload:
  Uncategorized:
  - Claire Miles from Exeter in Devon gives birth by Caesarean section to two babies,
    one in each of her two half sized wombs. BBC
  - In Canada, rain begins to pound the province of Alberta starting an almost 3-week
    flooding crisis in the province.
  - The infection source of Norway's recent outbreak of Legionnaire's Disease is surprisingly
    found to have been an industrial purification installation known as a scrubber,
    a device which cleans air using water. Reportedly, such facilities have never
    before caused a Legionnaire's outbreak anywhere in the world. Ten people have
    been killed, and 52 infected, in the outbreak, which is Norway's largest ever.
    (Aftenposten)
  - A previously unknown aria written by Johann Sebastian Bach in October of 1713
    is discovered in documents from a German library. It is the first new work to
    be discovered by Bach since 1975.(CNN)
  - In Bolivia, widespread demonstrations continue. Ex-president Carlos Mesa, who
    has already offered his resignation, states that there is a threat of civil war
    without immediate elections. Congress will decide on Thursday whether to accept
    the resignation (Reuters AlertNet) (CNN) (BBC)
  - The Philippine senate is evacuated after a bomb threat. (Reuters AlertNet)
  - 'Ethiopian general elections: At least 22 Ethiopians are killed at demonstrations
    in Addis Ababa between police and students who accuse the ruling party of fraud
    in last month''s general elections. (News 24, South Africa) (Guardian)'
  - The European Commission and its president José Manuel Barroso survive the no confidence
    vote (EUpolitix) (IHT) (Bloomberg)
  - HealthSouth and the U.S. Securities and Exchange Commission reach a settlement.
    The company will pay $100 million to put the SEC investigation behind it.
