Date: '2005-06-27'
Source_URI: Portal:Current events/2005 June 27
Intelligence_Payload:
  Uncategorized:
  - Domino Harvey dies of an OD, Harvey was a legendary bounty hunter and her biography
    was made a movie with Keira Knightley as Domino.
  - The Supreme Court of the United States releases a unanimous decision in MGM Studios,
    Inc. v. Grokster, Ltd., finding that P2P file sharing companies can be held liable
    for the copyright infringement of their users. (Wired), (Financial Times)
  - Walmart heir John T. Walton dies when his ultra-light plane crashes right after
    taking off in Jackson, Wyoming. (CNN)
  - Kenya releases three men suspected of conspiracy to a suicide bombing in 2002
    and links to al Qaeda. (BBC) (Reuters)
  - South Africa's Congress of South African Trade Unions (Cosatu) has organized a
    nationwide strike to protest job losses and unemployment. (IOL) (Reuters SA) (BBC)
    (Bloomberg)
  - In the Philippines, president Gloria Arroyo apologizes and admits that she took
    a phonecall to an election official during the presidential elections last. She
    denies any vote fixing and refuses to resign. (Manila Bulletin) (Sun Star) (Reuters)
  - In Mexico, Subcomandante Marcos of the Zapatistas announces a "new political initiative"
    after a week-long meeting in the jungle. (Indymedia Chiapas - Spanish and English)
    (Reuters AlertNet)
  - Greek prosecutor launches a preliminary investigation to determine if Greeks fighting
    for Bosnian Serbs were involved with the Srebrenica massacre. (Reuters AlertNet)
  - In Bosnia, Bosnian Serb police arrests 11 for connection with war crimes. (Reuters)
  - Israeli military tribunal convicts ex-soldier Wahid Taysir of manslaughter for
    killing British peace activist Tom Hurndall in April 2003. The victim's family
    accuses Israeli army of using Taysir as a scapegoat. (Jerusalem Post) (Ha'aretz)
    (Times) (BBC)
  - Dennis Rader plead guilty in the Sedgwick County District Court to ten counts
    of murder in the BTK trial.
