Date: '2005-06-24'
Source_URI: Portal:Current events/2005 June 24
Intelligence_Payload:
  Uncategorized:
  - Five people are found shot to death at their Yuma, Arizona home, and a sixth victim
    dies at a local hospital
  - Share prices of American airlines fell sharply as oil neared $60 a barrel. (Reuters)
  - The United States House of Representatives voted to prevent United Airlines from
    transferring its pension plan obligations to the government insurer, the Pension
    Benefit Guaranty Corporation. (Chicago Sun-Times)
  - An Italian judge ordering the arrest of 13 people linked to the CIA on charges
    of kidnapping terrorism suspect Abu Omar allegedly in order to have him tortured
    in Egypt dramatizes a growing rift between the U.S. and its allies in the War
    on Terrorism. (IHT) (Chicago Tribune)
  - Ohio Governor Bob Taft says he will not resign, despite ethical questions around
    him and his administration. (Akron Beacon-Journal)
  - The Irish Republican Army apologises unreservedly to the family of 14-year-old
    Kathleen Feeney, whom it shot dead in Derry in November 1973. The IRA had previously
    blamed the British Army for the killing. (BBC), (RTE)
  - Sir Donald Tsang is sworn in as the second Chief Executive of Hong Kong in the
    Great Hall of the People following his appointment by the Election Committee.
    (BBC)
  - Iranian presidential election, 2005
  - Second round of voting begins in presidential elections between candidates Akbar
    Hashemi Rafsanjani and Mahmoud Ahmadinejad. (IRNA) (Iran Focus) (Al-Jazeera) (Reuters)
  - Nobel Laureate Shirin Ebadi announces that she will boycott the election (Al-Jazeera)
  - 26 Iranians have been arrested for poll violations. (Al-Jazeera) (Reuters)
  - Mahmoud Ahmadinejad wins the Iranian presidential elections. (Reuters)
  - In China, death toll in summer floods has risen to 536 (Xinhua) (Reuters AlertNet)
  - In the Indian state of Bihar, Maoist rebels clash with police, leaving at least
    21 people dead. (The Hindu) (BBC)
  - Billy Graham began his last crusade in New York. He led the first of three services
    at Flushing Meadows Corona Park (New York Times)
  - Legg Mason announces the sale of its broker/dealer to Citigroup in exchange for
    Citigroup's asset management business.
  Israeli-Palestinian conflict:
  - Palestinian militants kill an Israeli in drive-by shooting near the Israeli settlement
    of Beit Haggai, in the West Bank outside Hebron. (BBC) (Al-Jazeera)
  - Palestinian Authority arrests eight Palestinians in connection with the previous
    day's killing of a Palestinian policeman, accusing Said Amin of the Al-Aqsa Martyrs'
    Brigades of leading the killers. (Al-Jazeera)
