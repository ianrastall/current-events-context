Date: '2005-06-29'
Source_URI: Portal:Current events/2005 June 29
Intelligence_Payload:
  Uncategorized:
  - The United States House of Representatives passes a $1.17 billion funding bill
    for Amtrak in fiscal year 2006, an amount that is still short of the $2 billion
    Amtrak was originally seeking. The funding was approved in an amendment to a more
    general transportation and treasury appropriations bill. The House also removed
    the requirement in the bill that would mandate Amtrak to end passenger train service
    on currently unprofitable routes. The funding has yet to be approved by the Senate.
  - The United States Capitol in Washington D.C. was briefly evacuated due to an aircraft
    that entered restricted airspace.
  - New York officials release the design for the signature building of the World
    Trade Center. The building will be called "The Freedom Tower" and shine a ray
    of light from its spire.
  - In Spain, Manuel Fraga, the last politician from the era of Francisco Franco,
    loses in elections in Galicia.
  - A Belgian jury finds two Rwandans, Etienne Nzabonimana and Samuel Ndashyikirwa,
    guilty of involvement in the Rwandan genocide.
  - Hezbollah shells Israeli positions with mortars and rockets in the disputed Shebaa
    farms, wounding five soldiers and killing one. The Israeli military shelled areas
    around several villages in southern Lebanon and planes launched missiles. Israel
    intends to file a complaint against Lebanon and UNIFIL for failing to prevent
    aggression by Hezbollah.
  - UN special envoy Anna Tibaijuka meets Robert Mugabe in Zimbabwe, discussing about
    a recent urban crackdown that has left 300.000 people homeless
  - In Serbia, Belgrade court convicts 10 officials from the government of Slobodan
    Milošević for an assassination attempt against then-opposition leader Vuk Drašković.
    they include special police commander Milorad Ulemek and chief of state security
    Radomir Marković (B92) (Reuters AlertNet)
  - In Ethiopia, government promises to rerun some elections in constituencies where
    there have been allegations of election fraud (IOL) (Reuters AlertNet) Government
    also arrests four journalists who had criticized the government crackdown against
    protesters (Reuters AlertNet)
  - Venezuela forms Petrocaribe, an energy cooperation pact with 13 Caribbean states
    to supply them with cheaper oil. Trinidad and Tobago and Barbados opt out (Caribbean
    Net News) (Reuters) (Bloomberg)
  - International Federation for Human Rights demands that International Criminal
    Court investigate human rights abuses of Colombian paramilitary group Self-Defense
    Forces of Colombia (AUC) (World peace Herald) (BBC)
  - In Liberia, Gyude Bryant, president of transitional government, states that he
    is going to use death penalty against those who commit gboyo human sacrifice,
    especially presidential candidates trying to boost their chances (Liberian Observer)
    (AllAfrica) (Reuters AlertNet)
  - Giant sudoku puzzle appears near Bristol, England (BBC)
