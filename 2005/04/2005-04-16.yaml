Date: '2005-04-16'
Source_URI: Portal:Current events/2005 April 16
Intelligence_Payload:
  Uncategorized:
  - Najib Mikati becomes the new Prime Minister of Lebanon, replacing Omar Karami,
    who has resigned for a second time after seven weeks of frustrated efforts to
    form a consensus government. (Reuters)
  - The Gaelic Athletic Association congress votes overwhelmingly to suspend its controversial
    rule 42 ban on 'foreign games' being played at its sports venues, to enable Irish
    soccer and rugby international fixtures to be played at its Croke Park stadium.
    (RTÉ News)
  - A magnitude 5.1 earthquake hits Southern California. No injuries or major damage
    have been reported. (CNN)
  - The G7 leaders meet in Washington, D.C. in the World Bank headquarters. Among
    the main discussion points are the rising price of oil and the pegging of the
    Chinese yuan to the U.S. dollar. (CNN)
