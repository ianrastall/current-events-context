Date: '2005-04-09'
Source_URI: Portal:Current events/2005 April 9
Intelligence_Payload:
  Uncategorized:
  - A zircon crystal, thought to be the oldest piece of Earth at about 4.4 billion
    years old, goes on a one-day display at the University of Wisconsin-Madison. (BBC)
  - 'Spring 2005 anti-Japanese demonstrations in China: Chinese rioters storm the
    Japanese embassy in Beijing. The riot grew from a protest against Japan''s newly
    approved history textbooks, which according to critics, whitewashed Japanese wartime
    atrocities. (Wikinews)'
  - The South African New National Party, successor to the National Party which governed
    in the apartheid era, votes to dissolve itself following poor results in last
    year's elections. Its elected representatives are expected to join the governing
    African National Congress. (Daily News, South Africa)
  - The World Health Organization announced a worsening of the Marburg virus in Angola.
    Doctors have suspended casualty counts due to worsening conditions; medical personnel
    are under increasing attacks by residents who blame doctors for the virus's spread.
    (CNN)
  - 'Israeli-Palestinian Conflict: Islamic Jihad have announced that they are to "re-evaluate"
    their cease-fire after Israeli soldiers kill 3 Palestinians, all aged 14. Palestinian
    witnesses allege they were killed trying to retrieve a football in a no-go area
    near the Egypt border at the Rafah Refugee camp. According to Israel Radio, Palestinian
    security services notified Israel they had detained two boys who were not hit
    by IDF fire, and that the group of five youths were smugglers. At least 10 mortar
    shells are then fired at the Gush Katif settlements. A Hamas leader, Saeed Siyam,
    is quoted by the AP as saying the boys deaths would be "avenged". (Haaretz) (BBC)
    (Al Jazeera) (Reuters) (Scotsman)'
  - Prince Charles marries Camilla Parker Bowles in a 20-minute ceremony at Windsor
    Guildhall, which is followed by a blessing at St George's Chapel in Windsor Castle.
    (BBC) (BBC)
  - Pakistani President Pervez Musharraf says that despite his plans to go to New
    Delhi to watch the last Indo-Pak cricket ODI, Kashmir, and not cricket, was on
    top of his agenda. (Hindu)
  - Calling for the abolition of death penalty, the Dalai Lama, currently on a visit
    to Japan, says criminals must be treated with compassion and made to feel part
    of the society. (Peninsula On-Line)
  Conflict in Iraq:
  - 15 Iraqi soldiers have been killed following an insurgent attack near the town
    of Latifiya. (BBC)
  - Tens of thousands of Iraqis have staged an anti-American protest in Firdus Square,
    where Saddam Hussein's statue was toppled on April 9 2003. (BBC)
