Date: '2005-04-30'
Source_URI: Portal:Current events/2005 April 30
Intelligence_Payload:
  Uncategorized:
  - 'Cairo terrorism: Tourists in the Egyptian capital Cairo are targeted in two separate
    terrorist attacks. (BBC)'
  - U.S. Senator John Kerry formally endorses a candidate for mayor of Los Angeles,
    Antonio Villaraigosa, repaying Mr. Villaraigosa's support for his own presidential
    campaign in 2004(AP)
  - King Gyanendra of Nepal ends the state of emergency. Press censorship and ban
    of political activities continues. (NDTV) (IHT)
  - US releases a report that clears soldiers who shot Italian intelligence agent
    Nicola Calipari and journalist Giuliana Sgrena. (full text on BBC) (CNN) (Reuters)
  - In Roraima, Brazil, Macuxi Indians release four policemen they had held as hostages
    since April 22. The Macuxi protested against the creation of a huge reservation
    and demanded better living conditions. (BBC) (ABC)
  - In Honduras, six children die in a grenade accident. (Scotsman) (Reuters)
  - Severo Moto, exiled politician from Equatorial Guinea, reappears in Spain. He
    says that he survived an assassination attempt in Croatia. (BBC) (Reuters)
