Date: '2005-04-25'
Source_URI: Portal:Current events/2005 April 25
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian Conflict: Amnesty International has called on the Israeli
    government to investigate the poisoning of Palestinian land, allegedly by Israeli
    settlers around Hebron (BBC)'
  - Bulgaria and Romania sign accession treaty to the European Union, continuing the
    enlargement process. (press release) (BBC)
  - Mary, Crown Princess of Denmark will have a baby in October, says the Royal House
    in Copenhagen. (Royal House) (Danmarks Radio)
  - More than 20,000 Australians, New Zealanders, Turks and other nationalities gather
    at Anzac Cove, Gallipoli, Turkey to mark the 90th anniversary of the landing at
    Anzac Cove during World War I. Thousands more attend ANZAC Day dawn remembrance
    ceremonies and marches in cities around Australia and New Zealand, 250,000 in
    Sydney alone. (Reuters)(Wikinews)
  - 'Amagasaki rail crash: In Japan, a Fukuchiyama Line train derails and crashes
    into an apartment building in the city of Amagasaki, near Osaka. At least 55 people
    are dead and around 400 are injured as a result of the accident, Japan''s worst
    rail crash since 1963. (Japan Today) (Reuters) (BBC)'
  - The third and final part of the Obelisk of Axum returns to Ethiopia. Ethiopia
    has also asked for the return of the remains of prince Alemayehu Tewodros. (BBC)
    (Independent)
  - Czech prime minister Stanislav Gross resigns. Jiří Paroubek is expected to succeed
    him. (Bloomberg) (Reuters) (BBC)
  - 'Same-sex marriage in Canada: Four same-sex couples in New Brunswick file suit
    for the right to marry under the Charter. This challenge, the first to be filed
    in over five months, would make New Brunswick the eighth of ten provinces to recognize
    same-sex marriage. (CBC)'
  - Germany's foreign minister, Joschka Fischer admits in a public hearing that procedural
    mistakes allowed criminals to have visas to enter the country. He also states
    that his political opponents had exaggarated the situation. (Deutsche Welle) (IHT)
    (Reuters) (Bloomberg)
  - A Finnish man is accused of sexual abuse of 445 boys in Thailand (Helsingin Sanomat)
    (Reuters)
  - Andrés Manuel López Obrador returns to his work as a mayor of Mexico City despite
    government demands that he is no longer eligible. (BBC) (Washington Post)
  - A 5000-strong Richtersveld community in Northern Cape province, South Africa,
    goes to Land Claims Court seeking compensation. In the 1920s they were evicted
    from their land, that turned out to be rich in diamonds and was mined by Alexkor
    mining company. (BBC) (IOL)
  - Liberians register to vote in the first elections after a long civil war. Elections
    are due on October 11. (Land Claims Court) (Reuters AlertNet) (BBC)
  - Indian Rail Minister Laloo Prasad Yadav is charged with embezzlement. (Deccan
    Herald) (BBC)
