Date: '2005-04-11'
Source_URI: Portal:Current events/2005 April 11
Intelligence_Payload:
  Uncategorized:
  - Yad Vashem bestow the honour of "Righteous Among the Nations" posthumously upon
    a Nazi Major, Karl Plagge. Plagge saved around 1,200 Jews, mostly women and children,
    from execution during the Holocaust by putting them in forced labor positions
    at a vehicle workshop. (BBC)
  - At least 54 Hindu pilgrims have been killed when a dam in the Madhya Pradesh state
    in India is apparently opened by mistake. (BBC)
  - Hezbollah, the Lebanese political and militant organisation, flies another unmanned
    drone plane over Israel. Hezbollah claims the "reconnaissance mission" was in
    retaliation for alleged Israeli violations of Lebanese Airspace. Israel quickly
    retaliates by sending jets to fly at a low altitude over southern Lebanon and
    caused sonic booms. (BBC)
  - The election of a new secretary general of the Organization of American States
    ends in an unprecedented stalemate after five rounds of voting. (BBC)
  - U.S. President George W. Bush praises the Israeli Prime Minister Ariel Sharon
    for his "courageous initiative" to pull all Israeli settlements out of the Gaza
    Strip, however Bush also told Sharon not to expand other existing settlements.
    The two leaders met in Texas, United States. (BBC Video) (BBC) (CNN)
  - 'Tulip Revolution: The Parliament of Kyrgyzstan finally approves the resignation
    of deposed President Askar Akayev. (Fox News)'
  - '2005 anti-Japanese demonstrations: 20,000 protesters marching in two cities in
    southern Guangdong province objecting to a recently amended Japanese schoolbook
    which allegedly glosses over Japan''s imperialist past. (CNN)'
  - Jeremy Jaynes, estimated to be the world's eighth most prolific spammer, is sentenced
    to nine years imprisonment. (IDG), (Spamfo.co.uk)
  - The International Court of Justice at The Hague begins hearing a complaint by
    the Democratic Republic of Congo that Uganda of invaded its territory and committed
    human rights violations. (AllAfrica) (BBC)
  - Australian Liberal MP Dave Tollner urges people to kill poisonous cane toads with
    cricket bats and golf clubs. The toads have become a nuisance in the Northern
    Territory. Animal rights groups prefer freezing them to death. (ABC) (Reuters
    AlertNet) (BBC)
  - A 9-story factory building collapses in Dhaka, Bangladesh; five deaths are reported.
    (Reuters AlertNet) (BBC)
  - The World Health Organization announces that 203 people have died in Angola from
    the Marburg virus. News.com.au
  - A court in Oslo, Norway, detains a man suspected of involved with the theft of
    the Edvard Munch paintings The Scream and Madonna. (Afternposten) (Reuters)
  - Nepal allows United Nations Human Rights Commission to send monitors to the country
    to investigate claims of human rights abuses. (Times of India) (Bloomberg) (Reuters
    AlertNet) (BBC)
