Date: '2005-04-24'
Source_URI: Portal:Current events/2005 April 24
Intelligence_Payload:
  Uncategorized:
  - Jawed uploads the first YouTube Video, Me at the zoo.
  - About 1 million people march silently through Mexico City in support of the capital's
    embattled mayor, Andrés Manuel López Obrador. (Bloomberg) (CNN) (El Universal)
    (BBC) (The Guardian)
  - 'Togolese presidential election, 2005: Three killed, amid claims of fraud in tense
    election in Togo to choose the successor to President Gnassingbé Eyadéma, hardline
    ruler for 38 years, from amongst Faure Gnassingbé, the 39-year-old son of the
    late leader, and several challengers led by Emmanuel Bob-Akitani. (Khaleej Times),
    (CNN)'
  - Leaders of Asian and African countries celebrate the 50th anniversary of Bandung
    Conference. (People's Daily Online), (KeralaNext), (XinHua)
  - Tens of thousands of Armenians mark the 90th anniversary of the mass killings
    of Armenians in the Ottoman Empire. (CBC), (Reuters)
  - 'Soyuz TMA-5: A Russian Soyuz spacecraft lands in Kazakhstan, bringing 3 astronauts,
    Russian Salizhan Sharipov, Chinese American Leroy Chiao and Italian Roberto Vittori,
    safely back to Earth from the International Space Station. (Reuters)'
  - Pope Benedict XVI is formally installed as Pope of the Catholic Church in an inaugural
    mass. (BBC) (CNN)
  - Ousted president of Ecuador, Lucio Gutiérrez, moves to exile in Brazil. (Reuters)
    (ITV)
  - Venezuelan president Hugo Chávez ends military cooperation with United States,
    claiming that US army training officers in the country have been agitating unrest
    against him. (Reuters)
  - In Kuwait, around 7000 Bengali workers storm the embassy of Bangladesh in Kuwait
    City to protest against unpaid wages. (Bangladesh Journal) (Al-Jazeera) (Reuters)
  - Forty Pakistani Christians are arrested in Riyadh, Saudi Arabia for practicing
    their religion in violation of a Saudi law forbidding the practice of any religion
    but Islam. (Christian Today).
