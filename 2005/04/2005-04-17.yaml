Date: '2005-04-17'
Source_URI: Portal:Current events/2005 April 17
Intelligence_Payload:
  Uncategorized:
  - A major breakthrough in the study of ancient Greek and Roman texts may lead to
    the revelation of hundreds of lost comedies, tragedies and epic poems. Using an
    infrared technique originally developed for satellite imaging, classicists at
    Oxford University, in the past four days alone, have made a series of new discoveries
    from Oxyrhynchus, including writings by Sophocles, Euripides, Hesiod and other
    literary giants. It may also be used to reveal lost Christian gospels. (The Independent),
    (Blogger News Network)
  - Over one hundred thousand people throughout Indonesia have taken part in anti-Israeli
    and anti-American protests. The protest was organised by the Prosperous Justice
    Party in order to show Muslim unity regarding the Al Aqsa Mosque. (Herald Sun),
    (Guardian), (Jerusalem Post)
  - Privacy groups in the United Kingdom along with opposition Liberal Democrats decry
    fingerprint passports as 'ID card by stealth'. (Telegraph) (Wikinews) (Guardian)
    (Telegraph)
  - Marla Ruzicka, a US activist and aid worker, is killed by a car bomb in Iraq.
    (CIVIC Worldwide) (Guardian)
  - 12 people die and 15 are injured when a coach plunges into a ravine near the Great
    St. Bernard Pass in Switzerland. (Swissinfo) (BBC)
  - In the Comoros Islands, the volcano Mount Karthala begins to erupt, forcing hundreds
    of villagers to flee. (Reuters) (CNN)
  - Seven people die in clashes between supporters of rival political factions prior
    to the forthcoming Togolese presidential election. (Reuters AlertNet) (ReliefWeb)
    (BBC)
  - Turkish Cypriots elect Mehmet Ali Talat as their new president. Talat endorses
    unification of Cyprus and membership in the European Union. (Reuters) (Turkish
    Weekly) (Guardian)
  - 100 supporters of the Party of the Democratic Revolution protest outside the ranch
    of Mexican president Vicente Fox. They protest against the trial of Andrés Manuel
    López Obrador, popular mayor of Mexico City. (El Universal, Mexico) (Reuters)
  - The Basque National Party of Juan José Ibarretxe wins regional elections in the
    Basque autonomous region of Spain but votes to EHAK, the Communist Party of Basque
    Lands, denies them majority. EHAK may have gained votes of supporters of banned
    Herri Batasuna party. Results may threaten Ibarratxe's plans for autonomy. (EITB)
    (Reuters) (Bloomberg) (BBC)
  - Jörg Haider launches his new party, Alliance for Austria's Future. (Deutsche Welle)
  - Negotiations in Helsinki between the government of Indonesia and Free Aceh Movement
    end "constructively", according to mediator Martti Ahtisaari. Talks are scheduled
    to continue in May. (Bloomberg) (BBC)
  - Students at the University at Albany in Albany, New York set the record for the
    world's largest pillow fight with 3,648 participants, observed by Guinness Records
    officials. (Albany.edu)
