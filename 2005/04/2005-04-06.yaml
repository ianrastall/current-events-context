Date: '2005-04-06'
Source_URI: Portal:Current events/2005 April 6
Intelligence_Payload:
  Uncategorized:
  - Warring factions sign a peace treaty to end the civil war in Côte d'Ivoire, start
    immediate disarmament and make plans for new elections. (Globe&Mail)
  - The Movement for Democratic Change, the opposition party in Zimbabwe, presents
    'proof of fraud' in the recent parliamentary elections that kept Robert Mugabe
    and the ruling Zimbabwe African National Union - Patriotic Front in office. (BBC)
  - At least 16 people are killed in Afghanistan when a U.S. military Chinook helicopter
    crashes in the south-eastern province of Ghazni. (BBC)
  - The College of Cardinals sets April 18 as the date for a conclave for a papal
    election to select a successor to Pope John Paul II. (CNN)
  - The world famous painting of Leonardo da Vinci, the Mona Lisa, is taken to its
    original location, the Salle des Etats, in the Louvre, Paris. (SKY News)
  - Hong Kong's government asks Beijing to intervene in a dispute over the term to
    be served by new Chief Executive. (BBC)
  - Jalal Talabani, a Kurdish leader, is named as Iraq's President. (FOX News)
  - The United Nations is looking at the allegations that some UN staff added false
    details to a UN document about the conflict of Rwanda and Democratic Republic
    of Congo. William Church, former UN employee and US intelligence analyst, says
    that some UN staff added false information about Rwandan military incursions to
    Congo last year. (BBC)
  - Murdered British banker Alistair Wilson is buried in Nairn. The murderer is still
    at large. (Scotsman) (BBC)
  - Monaco's Prince Rainier III dies at age 81. (NYT)
  - In Brazil, members of Landless Workers' Movement (MST) occupy 12 farms trying
    to pressure the government to speed up land reform. (Reuters AlertNet) (BBC)
  - A court on Guernsey in the English Channel blocks the release of papers that would
    name alleged backers of an aborted coup in Equatorial Guinea last year, due to
    bank secrecy in that jurisdiction. (This Is Guernsey) (BBC) (Reuters SA)
  - Togolese police clash with demonstrators of the opposition party the Union of
    Forces for Change, who are demanding that presidential elections be postponed
    so that they would have more time for campaigning. (Reuters AlertNet) (Republic
    of Togo)
  - The U.S. Securities and Exchange Commission, by a 3-2 vote, adopts a set of rules
    designed to create a National Market System. The dissenting commissioners describe
    the measure as 'anticompetitive'. (SEC press release)
  - The Integrated Ocean Drilling Program (IODP) announces that it has drilled a hole
    to the lowest level of the Earth's crust, and that it is poised to break through
    to the mantle, in search of the Mohorovicic discontinuity. SPACE.com
