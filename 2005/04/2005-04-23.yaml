Date: '2005-04-23'
Source_URI: Portal:Current events/2005 April 23
Intelligence_Payload:
  Israeli-Palestinian conflict:
  - The Association of University Teachers, the leading British academic group, has
    voted to boycott two Israeli universities, Haifa University and Bar-Ilan University,
    over their alleged involvement in "illegal activity" in the occupied territories.
    The AUT said it voted for the boycott in response to a plea for action by a group
    of Palestinian academics. It was condemned by the Israeli Embassy, the British
    Ambassador in Israel, by Jewish Human Rights groups and by Universities UK. (BBC),
    (Guardian)
  - Israeli security forces arrest 3 suspected Palestinian militants on the Geha Highway
    near Ra'annana, Israel. When the police arrived, the 3 suspects were barricaded
    in their car, while a 4th suspect fled the scene. Earlier in the night, the Israeli
    Police put roadblocks and checkpoints after it received high alert on "rolling"
    suicide bombing attack. (Haaretz), (Ynet)
  - A 17-year-old Palestinian is caught carrying 4 pipe bombs in Beit Furik checkpoint.
    (Haaretz)
  - A Qassam rocket was launched toward northern Gaza community. No casualties were
    reported. Also, Palestinian militants stabbed a soldier near Ganim settlement,
    injuring him moderately. (Haaretz)
  Uncategorized:
  - A rodent species representing a new family of mammals, Laonastidae, is discovered
    in Laos. This is the first new family of mammals discovered since 1974. (Cambridge
    Journals)
  - Bangladesh accuses the BSF of gunning down two farmers who had strayed into no
    man's land at Hairharpur on the Indo-Bangla border. Indian officials say the guards
    had only shot at and injured two Bangladeshis trying to sneak into West Bengal.
    (Gulf Times, Qatar) (Voice of America)
