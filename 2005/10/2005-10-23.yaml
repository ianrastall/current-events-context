Date: '2005-10-23'
Source_URI: Portal:Current events/2005 October 23
Intelligence_Payload:
  Avian influenza:
  - The Swedish National Veterinary Institute reports a dead duck discovered near
    Stockholm was infected with an undetermined strain of avian influenza. (ABC)
  Uncategorized:
  - Nigerian airline Bellview Airlines Flight 210 crashed in Oyo State, Nigeria shortly
    after take-off from Lagos en route to Abuja. The Red Cross reports there are no
    survivors. (theStar) (Reuters) (BBC) (CNN)
  - The second round of the Polish Presidential election is held today between conservative
    candidates Lech Kaczyński and Donald Tusk. According to exit polls conducted by
    Polish television stations, Kaczyński is the winner. (Bloomberg) (AFP)
  - A referendum to ban civilian manufacture and sale of firearms in Brazil is rejected
    by a vote of 64 percent to 36 percent. (ABC News)
  - Pope Benedict XVI canonizes Chilean Jesuit Alberto Hurtado.
  - Elections in Argentina, 2005.Candidates supporting Argentina's President, Néstor
    Kirchner, won the parliamentary elections in Buenos Aires Province (his wife was
    elected as Senator) and several other provinces. However, they lost in Buenos
    Aires City and Santa Fe Province. (Bloomberg).
  - The Chicago White Sox defeat the Houston Astros 7-6 to take a 2-0 lead in the
    World Series.
