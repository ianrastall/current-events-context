Date: '2005-10-09'
Source_URI: Portal:Current events/2005 October 9
Intelligence_Payload:
  Uncategorized:
  - In the Polish presidential election, frontrunner Donald Tusk of the liberal (libertarian)
    Civic Platform party receives approximately 35.8% of the vote, slightly ahead
    of Lech Kaczyński of the conservative Law and Justice Party with 33.3%. A run-off
    election between Tusk and Kaczyński will take place on October 23. (BBC)
  - Three white New Orleans police officers are arrested after a video surfaces showing
    the officers brutally beating unarmed 64-year-old Robert Davis. The victim, who
    is black, has been charged with public intoxication, resisting arrest, battery
    on a police officer and public intimidation. (Reuters), (BBC), (Footage of incident
    from BBC)
  - New York Senator Hillary Clinton is inducted into the National Women's Hall of
    Fame. (Reuters)
  - 'United Kingdom: In a joint statement, Anglican and Catholic leaders voice concerns
    over euthanasia as the House of Lords gears up for debate on legislation. (BBC)'
  - 'United Kingdom: Former actress and current Labour MP Glenda Jackson announces
    she intends to stand against Tony Blair in a leadership bid if he doesn''t stand
    down in the near future. (BBC) (Scotsman)'
  - Tropical Storm Vince, the 20th named storm of the season (making the current Atlantic
    hurricane season the 2nd most active since recording first took place) is gaining
    hurricane strength while heading towards Europe. It is unusual for such a storm
    to form so far east in the Atlantic Ocean, and more so gaining hurricane strength,
    since the waters are much cooler than in the Caribbean area. (National Hurricane
    Center)
  - Southend Pier, in the East of England, is devastated by a fire. (BBC)
  - The members of the Canadian Media Guild vote 88% in favour of the proposed settlement
    of the lockout with the Canadian Broadcasting Corporation, officially ending the
    current labor dispute with the affected personnel resuming regular duties on October
    11 with a gradual resumption of regular programming. (Toronto Star)
  - The Houston Astros beat the Atlanta Braves 7-6 in the 18th inning of the longest
    post-season game in Major League Baseball history. (Houston Chronicle)
