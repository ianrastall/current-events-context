Date: '2005-10-08'
Source_URI: Portal:Current events/2005 October 8
Intelligence_Payload:
  Uncategorized:
  - Five autonomous robots have completed the 2005 DARPA Grand Challenge, the winner
    (to be declared on Sunday) travelling the 132 mile course in less than 7.5 hours.
    (SFGate)
  - A mudslide in Guatemala triggered by heavy rains buries the village of Panabaj.
    All 800 residents of the village are feared dead. (CNN)
  - '2005 South Asia earthquake: An earthquake measuring 7.6 on the Richter scale
    occurred at 08:52:38 UTC in the Pakistan-controlled part of Kashmir, killing over
    175,000 people. (NDTV) (USGS) (Indian Express)'
  - After 26 months of construction as part of People's Republic of China's Tenth
    Five-Year Plan, Nanjing's Third Yangtze Bridge opens. (Xinhua)
  - Uganda Human Rights Commission, in its 2004 report, states that at least 4,000
    children who were among the tens of thousands abducted by the Lord's Resistance
    Army rebels cannot be traced. This estimate is much lower than the previous estimate
    of 20,000 kidnapped children released by the most recent Human Rights Watch report.
    The UHRC accuses the Uganda People's Defence Forces (UPDF) of torturing the Acholi
    people of northern Uganda through brutal methods to extract information or to
    instill discipline in suspects. (allAfrica)
  - '2006 FIFA World Cup qualifiers in Germany are: Italy, England, the Netherlands,
    Portugal, Poland, Croatia, Paraguay, Ecuador, Angola, Togo, Ghana, Tunisia, Ivory
    Coast and Costa Rica.'
  - Sidney Crosby (Picked first overall in the 2005 NHL Entry Draft) played his first
    NHL game in Pittsburgh (3rd NHL game in total), he scored his first NHL goal and
    had two assists for the Pittsburgh Penguins against the Boston Bruins. (YouTube)
