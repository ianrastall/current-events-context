Date: '2005-10-14'
Source_URI: Portal:Current events/2005 October 14
Intelligence_Payload:
  Uncategorized:
  - Zimbabwean state-owned media announces that the Zimbabwean government briefly
    detained the United States ambassador, on Monday, October 10. The United States
    considers the matter closed following a formal apology. (Wash. Times)
  - '2005 Kashmir earthquake: SOS Children''s Villages have been appointed temporary
    custodian of unaccompanied children. SOS will run the family tracing database
    and look after children in their emergency centre in Islamabad and in other six
    villages in Kashmir. (SOS)'
  - A high ranking undercover Central Intelligence Agency officer, known only as "Jose,"
    will coordinate CIA, FBI, and State Department spying operations as the new director
    of the National Clandestine Service. (Reuters)
  - Futures industry regulators, brokerages, and futures exchanges in the United States
    engage in furious talks over how to avoid, or how to minimize the consequences
    of, the impending failure of Refco, a global commodities broker-dealer. (MSN Money)
  - Security concern over Google maps - India's President has warned that the Google
    map service could help terrorists by providing satellite photos of potential targets.
  - Former President of Ecuador, Lucio Gutiérrez Borbúa, deposed by the Ecuadorian
    military on April 20, 1995, after days of civil disturbances in Quito, returns
    voluntarily to Ecuador and is immediately locked in a maximum security prison
    cell in Quito, on charges of attempting to subvert national security, after having
    repeatedly stated to the international media that he continues to be the legitimate
    President of the Republic of Ecuador. (El Universo, Guayaquil) (article in Spanish).
  - Daniel Craig is announced as the sixth official James Bond actor.
