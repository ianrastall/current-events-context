Date: '2005-10-20'
Source_URI: Portal:Current events/2005 October 20
Intelligence_Payload:
  Uncategorized:
  - In a bid to stay in step with its largest trading partner, the United States,
    Ontario announces it will become the first Canadian province to extend daylight
    saving time. (CBC)
  - Two weeks after the Kashmir earthquake death toll reaches 79,000, the UN estimates
    that 500,000 people are cut off from relief aid. The UN appeals to the international
    community for more aid, warning that tens of thousands of people could die if
    aid does not reach them before the harsh winter. (Guardian) (USA Today)
  - In the United Kingdom, David Cameron and David Davis go through to a runoff vote
    of Conservative Party members after a second round of voting amongst Tory MPs
    in the party's leadership election. Liam Fox is eliminated. (BBC)
  - 'Conflict in Afghanistan: Several U.S. soldiers are caught setting fire to dead
    Taliban fighters, in defiance of Muslim beliefs and practices, in scenes broadcast
    on Afghan TV. (BBC)'
  - Guinea's government announces that municipal elections will be held on 18 December.
    (Reuters)
  - One ticket sold in Oregon matched all the numbers in the United States Powerball
    Lottery which was worth U.S.$340 million.
  Conflict in Iraq:
  - Four U.S. soldiers are killed in two insurgent attacks north of Baghdad, Iraq.
    (BBC)
  - A defense lawyer for one of Saddam Hussein's co-defendants is kidnapped. (BBC)
