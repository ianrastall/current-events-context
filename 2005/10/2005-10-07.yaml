Date: '2005-10-07'
Source_URI: Portal:Current events/2005 October 7
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Afghanistan: U.S. Troops kill four Afghan police, after mistaking
    them for militants in the Girishk district of the Helmand Province. (BBC)'
  - Militants kill at least 8 members of the Ahmadiyya faith inside a Mosque as worshippers
    were performing Salah. The attack occurred in Mandi Bahauddin in Punjab, Pakistan.
    (BBC)
  - The UN International Atomic Energy Agency and its Director General Mohamed ElBaradei
    share the 2005 Nobel Peace Prize for their efforts to limit the spread of atomic
    weapons. (CNN) (Aftenposten) (Nobel Prize)
  - Three Hamas members are kidnapped from their homes in the West Bank. A group,
    supportive of the Palestinian National Authority, calling itself the "Omar Ben
    al-Khatib Warriors" claims responsibility for the kidnappings of the three, and
    one is later freed. (Ynetnews)
  - According to the BBC, the industrial solvent gamma-butyrolactone (GBL) is being
    used in the UK as a club drug, with lethal results. (BBC)
  Conflict in Iraq:
  - At least twenty-nine Iraqi fighters and six U.S. Marines are killed in major fighting
    in western Iraq. (BBC) (Reuters)
  - British forces have detained 12 people, including three police officers, in connection
    with a series of deadly attacks on UK forces in southern Iraq. (BBC)
