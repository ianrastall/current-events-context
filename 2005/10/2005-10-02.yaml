Date: '2005-10-02'
Source_URI: Portal:Current events/2005 October 2
Intelligence_Payload:
  Uncategorized:
  - Mexico wins the FIFA U-17 Men's Championship 2005 in Lima, Peru, beating Brazil
    3-0 (Notimex)
  - Severely injured victims of the 2005 Bali bombings are being evacuated to medical
    facilities in Australia and Singapore. The Australian Government has made moves
    to assist Indonesia in its response, dispatching Australian Federal Police officers
    and forensic experts to assist in investigations. (ABC)
  - The Ethan Allen, a boat on Lake George, in Upstate New York, capsized killing
    20 people. The boat has been raised by investigators. (CNN)
  - The Ugandan Army is deploying troops to West Nile in readiness for an imminent
    military combat against the Lord's Resistance Army at the border with the Democratic
    Republic of Congo. (allAfrica)
  - The astronomers who discovered Eris, referred to as "the tenth planet" by NASA
    and some media outlets, have announced that it has a moon, Dysnomia. (CNN)
