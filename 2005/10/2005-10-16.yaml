Date: '2005-10-16'
Source_URI: Portal:Current events/2005 October 16
Intelligence_Payload:
  Uncategorized:
  - Louis Farrakhan, leader of the Nation of Islam, addresses the Millions More event
    in Washington DC and condemns George W. Bush for the federal government's response
    to Hurricane Katrina. (BBC)
  - 'South Thailand insurgency: A Buddhist monk and five other people are killed and
    a Buddhist temple is set on fire. (Reuters)'
  - The reentry module of the Chinese manned spacecraft Shenzhou 6 lands safely in
    Inner Mongolia, China. (People's Daily).
  - Japanese prime minister Junichiro Koizumi visits the Yasukuni shrine which honors
    Japan's war dead including 14 Class A war criminals of World War II. This is Koizumi's
    fifth visit to Yasukuni since taking office in 2001. (CNN)
  - More than 4 million people vote in Italy for the primaries of the center left
    to elect the person that should represent the main antagonist to the current Prime
    Minister Silvio Berlusconi. (La Repubblica)
  Israeli-Palestinian Conflict:
  - A leader of Islamic Jihad is killed in a shoot-out following an Israeli raid into
    the West Bank town of Jenin. (BBC)
  - The Al-Aqsa Martyrs' Brigades claim responsibility for a West Bank shooting attack
    that kills three Israeli settlers at a hitchhiking post. Another Israeli is seriously
    wounded in a second shooting attack. (Haaretz)
