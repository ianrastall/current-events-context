Date: '2005-10-03'
Source_URI: Portal:Current events/2005 October 3
Intelligence_Payload:
  Uncategorized:
  - St. Tammany Parish Schools reopen in Louisiana just over a month after Hurricane
    Katrina closed them.
  - West African leaders call for the strengthening of United Nations peacekeeping
    force to ensure efforts to end the three year civil war in Côte d'Ivoire pay off.
    A total 6,640 peacekeepers are currently serving in the UN force, which is under
    Senegalese command, monitoring the buffer zone between the north and south with
    the help of 4,000 French troops. (allAfrica)
  - South Africa announces a ZAR 140 million (USD $22 million) donation to the United
    Nations World Food Programme (WFP) and the Food and Agriculture Organization (FAO)
    to alleviate food shortages in Southern Africa. (allAfrica)
  - Australians Barry J. Marshall and Robin Warren have been awarded the 2005 Nobel
    Prize in Physiology or Medicine "for their discovery of the bacterium Helicobacter
    pylori and its role in gastritis and peptic ulcer disease". (BBC)
  - U.S. Representative Tom DeLay is indicted on a charge of money laundering. (Reuters)
  - Up to 60 police cadets have been swept away by powerful Typhoon Longwang in Fujian,
    south-east China. (BBC)
  - Former Manchester United footballer George Best reported to be in intensive care
    (due to a kidney infection) at Cromwell Hospital, London. (BBC)
  - At least 11 people die during a stampede at a concert in Sangju, South Korea.
    (BBC)
  - Welsh heavy metal band Bullet For My Valentine release their debut album The Poison.
    On January 30, 2009, the album was certified gold by the RIAA after 500,000 copies
    were sold in the United States. (RIAA)
  - On the first day of the U.S. Supreme Court's fall term, President George W. Bush
    nominates White House Counsel Harriet Miers to fill the seat currently held by
    Sandra Day O'Connor. The nominee has no judicial experience. (BBC).
  - 'Conflict in Afghanistan: Afghan troops kill 31 suspects following clashes in
    Paktika, in eastern Afghanistan. (BBC)'
  - Millions of people view the solar eclipse which occurred at 10:31 UTC, mainly
    in Africa and south-west Europe. (BBC)
  - A train derails and crashes in Datia, Madhya Pradesh in India, killing 16 people.
    (BBC)
  - NTL, the largest British cable television company, telco and ISP, announces its
    multi-billion pound purchase of Telewest, the second largest cable company, creating
    one of the largest companies in the British media industry. (Guardian) (Bloomberg)
  - Turkey and Croatia begin talks about joining the European Union following over
    a day of debate over an Austrian proposal that Turkey should be offered an associate
    status short of full membership. (BBC)
  - In Canada, the Canadian Broadcasting Corporation and the Canadian Media Guild
    announce a preliminary agreement to end the current lockout of CMG members in
    most of the country which seriously impaired corporation's programming since August
    17. (Toronto Star)
