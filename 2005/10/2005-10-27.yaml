Date: '2005-10-27'
Source_URI: Portal:Current events/2005 October 27
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: At least 20 Shia Militia members and Iraqi Police have died
    following a Sunni Arab ambush in Nahrawan, South East of Baghdad. (BBC)'
  - Israeli Prime Minister Ariel Sharon calls for the expulsion of Iran from the United
    Nations after the Iranian President repeated Ruhollah Khomeini's call for Israel
    to be "wiped off the map". (BBC)
  - As the relief operation of 2005 Kashmir earthquake is facing great difficulties
    in reaching victims due to bad weather, mountainous terrain, landslides and blocked
    roads, Pakistani Prime Minister Shaukat Aziz makes an appeal to millions of survivors
    in the mountains to leave their villages and come down to the valleys and cities
    for shelter before the start of winter in about three weeks. (Bloomberg)
  - Former Northern Irish footballer George Best's medical condition worsens in an
    intensive care unit at a private English hospital, as he is reportedly suffering
    from serious internal bleeding. (BBC News)
  - President George W. Bush's nominee for Associate Justice of the Supreme Court
    of the United States, Harriet Miers, has turned down the nomination made on October
    3, 2005. The President has accepted her withdrawal. (CNN)
  Israeli-Palestinian Conflict:
  - Israeli troops raid the Palestinian town of Jenin, in the West Bank. (BBC) (IMEMC)
  - Eight Palestinians, including three militants, have died following Israeli Air
    Strikes in the Gaza Strip. (BBC)
