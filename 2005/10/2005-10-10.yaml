Date: '2005-10-10'
Source_URI: Portal:Current events/2005 October 10
Intelligence_Payload:
  New Orleans:
  - Three New Orleans officers accused of near fatally beating Robert Davis and assaulting
    a cameraman who taped the ordeal, plead not guilty.
  - Allegations that New Orleans police looted 200 cars (41 Cadillacs) are under investigation
    by Louisiana police.(Yahoo)
  - Widespread desertion, suicide, and crime among New Orleans police officers has
    been reported in the wake of Hurricane Katrina. (Reuters)
  Uncategorized:
  - The Japan Aerospace Exploration Agency successfully tests the model of a $10 million
    jet that travels at twice the speed of sound. The test takes place at the RAAF
    Woomera Range Complex in Australia and is part of the Next Generation Supersonic
    Transport programme. (Reuters)
  - '2005 Kashmir earthquake: SOS Children have reported that despite the destruction
    of much of their Children’s Village in Muzaffarabad all of the children in their
    care are believed safe.'
  - 'Conflict in Iraq: Insurgent attacks throughout Iraq leave seven Iraqis, two security
    officials from the Arab league and one U.S. soldier dead. (BBC)'
  - Following the German federal election, 2005, Christian Democrat Angela Merkel
    will become the next Chancellor of Germany, replacing Social Democrat Gerhard
    Schröder, although Schröder's party will be the dominant party in the grand coalition.(BBC)
    (Reuters)
  - The Royal Swedish Academy of Sciences awards Thomas Schelling and Robert Aumann
    the 2005 Nobel Prize in Economics, "for having enhanced our understanding of conflict
    and cooperation through game-theory analysis". (nobelprize.org)
  - 'Aardman Animations, the company behind films such as Chicken Run, Creature Comforts,
    and the just-released Wallace and Gromit film Wallace & Gromit: The Curse of the
    Were-Rabbit lose their entire history, but not their film library, in a fire.
    (BBC)'
  - The former President of Uganda, Milton Obote, has died of kidney failure at the
    age of 80. Obote led the East African country from 1962-1971 and again from 1980-1985.
    (BBC)
