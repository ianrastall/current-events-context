Date: '2005-10-06'
Source_URI: Portal:Current events/2005 October 6
Intelligence_Payload:
  Uncategorized:
  - Five leaders of the Lord's Resistance Army, a rebel group begun in Uganda, are
    targeted by the first arrest warrants to be issued by the International Criminal
    Court. (BBC)
  - Gabon announces that the presidential elections are to be held on 27 November
    with security forces voting two days earlier, but opposition denounces the move
    as a ruse for ballot rigging. (allAfrica)
  - Zimbabwe is facing increasing threat of military revolt, as soldiers are increasingly
    dissatisfied by the government's failure to increase their salaries and by chronic
    food shortages at their barracks. (allAfrica)
  - New York City increases police presence in the New York City Subway system after
    receiving a credible terror threat. (BBC)
  - 'Hurricane Katrina: Louisiana National Guard officials say repeated news reports
    by CNN on September 1, 2005 that shots were fired at a UH-60 Black Hawk military
    helicopter at the Louisiana Superdome were false. (Washington Post)'
  - 'Conflict in Iraq: As Iraqi president Jalal Talabani tells UK Prime Minister Tony
    Blair any troop withdrawal would be a "catastrophe" (BBC), 10 people die following
    a bomb near the Ministry of Oil in Baghdad. (BBC)'
  - The European Court of Human Rights rules the United Kingdom's ban on voting rights
    for prisoners is unlawful. (BBC)
  - Properties in Manchester, England are searched by the Assets Recovery Agency during
    on-going investigations into the business activities of men alleged to have links
    with the Irish Republican Army. (BBC)
  - Death toll of Hurricane Stan reaches 166. (Reuters)
  - 'Israeli-Palestinian Conflict: Israel is to ban using Palestinians as human shields
    following a Supreme Court of Israel ruling. (BBC)'
  - Malalai Joya, a 27-year-old women's rights worker, has won one of the first seats
    in Afghanistan's National Assembly, also called the Wolesa Jirga. (CNN)
  - Ted Koppel will anchor his last broadcast of Nightline on 22 November and not
    in December 2005 as had been previously announced. (Reuters)
