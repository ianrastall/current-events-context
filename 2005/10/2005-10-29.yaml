Date: '2005-10-29'
Source_URI: Portal:Current events/2005 October 29
Intelligence_Payload:
  Conflict in Iraq:
  - More than 20 people die when a car bomb detonates in Howaider, a Shia village
    near Baquba, 60 miles north of Baghdad. (BBC)
  Uncategorized:
  - In the Valigonda train wreck a train derails in Andhra Pradesh, India, killing
    at least 116. (BBC)
  - A series of blasts detonate in New Delhi, the Capital of India. 61 people are
    known to have died; many more are injured. (NDTV), (BBC)
  - Three Christian Indonesian girls are beheaded as they walk through a cocoa plantation
    near a private Christian school in Central Sulawesi. (BBC)
