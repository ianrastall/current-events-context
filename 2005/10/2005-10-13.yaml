Date: '2005-10-13'
Source_URI: Portal:Current events/2005 October 13
Intelligence_Payload:
  Uncategorized:
  - The United Nations is to evacuate some staff from Sudan's West Darfur state because
    of an increase in violence. U.N. officials said that the violence had hindered
    aid access to 650,000 refugees in the region. (Reuters)
  - Right to Information Act 2005, (Act No. 22/2005) law enacted by the Parliament
    of India giving citizens of India access to Government records, came into force
    in India. (RTIAct)
  - ABC investigative reporter Brian Ross reports that security at nuclear reactors
    on U.S. college campuses is easily compromised. (ABC)(BadgerHerald)
  - Shenzhou 6 could be brought back one day earlier than planned due to weather conditions
    at the landing area and the physical condition of the astronauts. The People's
    Republic of China's second human spaceflight was originally planned for the mission
    to last five days. (SpaceDaily)
  - 'Scores of suspected Chechen separatist rebels attack the southern Russian city
    of Nalchik in a coordinated operation against Russian security forces, killing
    dozens of people. BBC 85 killed and map: (Washington Post)'
  - The presence of the dangerous H5N1 avian influenza virus is confirmed in dead
    birds found in Turkey, marking the first cases of the disease in Europe. (BBC)
  - In Stockholm, it is announced that British playwright Harold Pinter is the 2005
    winner of the Nobel Prize for Literature. (Reuters)
  - 'Iraq''s Constitutional Referendum: A four day curfew has been announced in order
    to hamper terrorists. Early voting has begun. (Reuters)'
