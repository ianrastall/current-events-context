Date: '2005-10-01'
Source_URI: Portal:Current events/2005 October 1
Intelligence_Payload:
  Uncategorized:
  - The Ilamatepec volcano erupts in a coffee-growing area 40 miles (60 km) west of
    San Salvador, El Salvador, spitting rock and ash into the air. The Salvadoran
    government evacuates hundreds of people in the region and there are no reported
    injuries. San Salvador's air quality - already the most polluted in Central America
    - is significantly worsened by the additional volcanic debris. (Yahoo! news)(Link
    dead as of 22:37, 14 January 2007 (UTC))
  - A bomb explodes outside of a packed football stadium at the University of Oklahoma,
    killing one. (ABC) (NYTimes) (registration required)
  - A Russian rocket lifts a Soyuz spacecraft towards the International Space Station,
    carrying the third fare-paying space tourist, American Gregory Olsen. (CNN) (Link
    dead as of 22:37, 14 January 2007 (UTC)) (FloridaToday)
  - Four explosions are reported in Bali at popular tourist areas, killing at least
    36 and injuring 103 people. (CNN) (Link dead as of 22:37, 14 January 2007 (UTC))
    (BBC) (WRKO)
  - New Zealand's Labour Prime Minister Helen Clark is set to form a third-term government
    after the National Party loses a seat following the count of 'special' votes.
    She begins talks with minor party leaders to form a coalition government as well
    obtain the support of enough minor parties to have a majority on supply and confidence
    issues. (SBS) (Reuters) (Link dead as of 22:37, 14 January 2007 (UTC)) (NZ election
    results)
  - The Indonesian government raises fuel prices by more than 100%, resulting in petrol
    prices of 4,500 rupiah (US$0.44) a litre (US$1.67 per gallon). (Reuters) (Link
    dead as of 22:37, 14 January 2007 (UTC))
