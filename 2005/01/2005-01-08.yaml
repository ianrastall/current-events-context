Date: '2005-01-08'
Source_URI: Portal:Current events/2005 January 8
Intelligence_Payload:
  Uncategorized:
  - A U.S. Navy nuclear submarine, USS San Francisco, runs aground south of the Pacific
    island of Guam. (AP via USA Today) (BBC)
  - 'September 11, 2001, attacks: About 8,000 photographs recovered from the ruins
    of the World Trade Center after the terrorist attacks have been restored and will
    be posted on a restricted-access website for people to identify and claim by the
    Port Authority of New York and New Jersey on January 18. (CNN)'
  - Cyclone Gudrun hit Sweden and Denmark causing extensive damage and the loss of
    22 lives.
  2004 Indian Ocean earthquake:
  - The United States National Oceanic and Atmospheric Administration (NOAA) reveals
    a detailed minute-to-minute Indian Ocean tsunami timeline. (CNN) (NOAA Press Release)
  - An Islamist group with alleged al Qaeda links has set up a relief camp on Indonesia's
    Sumatra island, raising concerns in the U.S. and Australia that it could stir
    up sentiment against their troops who are also assisting the aid effort. The Laskar
    Mujahidin group has posted a sign at its camp that reads (in English) "Islamic
    Law Enforcement". (CNN)
  Conflict in Iraq:
  - U.S. Army sergeant Tracy Perkins is acquitted of manslaughter but found guilty
    of aggravated assault for forcing two Iraqi civilians to leap from a bridge into
    the River Tigris on 3 January 2004. (BBC)
  - The U.S. Army promises an investigation into an incident in Mosul in which an
    F-16 jet dropped a 500-pound "precision-guided" bomb on the wrong target. The
    army claims five civilians were killed; 14 died, say locals. (BBC)
