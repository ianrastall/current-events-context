Date: '2005-01-30'
Source_URI: Portal:Current events/2005 January 30
Intelligence_Payload:
  Conflict in Iraq:
  - Polls close in Iraq marking the first multi-party election in 50 years. Electoral
    officials estimate about a 50–70% turnout. A series of election day attacks across
    the country killed at least 44 people, mainly in Baghdad. The 275-member National
    Assembly will create a new constitution, choose a new president and two new vice
    presidents. Most candidate names on the various party lists remained anonymous.
    (BBC) Reuters News24
  - Between nine and fifteen British soldiers die as a C-130 Hercules transport plane
    crashes about 40km north west of Baghdad. The cause of the crash is under investigation.
    (BBC), (CNN)
  Uncategorized:
  - A firefight leaves 3 suspected militants and one Kuwaiti police officer dead after
    security forces raid an alleged hideout in Kuwait City. (BBC)
  - In eastern Sudan, demonstrators on their way to a meeting with tribal leaders
    clash with police leaving up to 17 protestors dead. A Sudanese general states
    that the protestors were looting and inciting violence against his men. Members
    of eastern tribes, mainly Beja, presented a list of demands which included better
    representation to the provincial governor three days ago. (BBC)
  - Former UK Labour Culture Secretary, Chris Smith, states he has been HIV positive
    for 17 years. (BBC)
  - In Spain, a bomb explodes at a hotel in the southwest town Denia injuring one.
    Police officials say the detonation occurred after a telephone warning from the
    Basque ETA group. Spanish parliament is scheduled to debate and vote on a Basque
    plan for independence from Spain in two days. (BBC)
  - Talks between the Indonesian government and Free Aceh Movement leaders in Helsinki
    end a day early, possibly signaling a breakdown in negotiations. (IHT)
  - The deadline passes for the finalization of constituencies for Afghanistan's May
    21 parliamentary elections, UN officials say. Though the constituencies were supposed
    to be set up 120 days before the election, officials have not yet announced an
    election delay. Violence continues, particularly in the south of the country where
    the Taliban still remains active. (Pakistan Daily Times) (Reuters)
