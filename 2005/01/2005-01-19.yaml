Date: '2005-01-19'
Source_URI: Portal:Current events/2005 January 19
Intelligence_Payload:
  Uncategorized:
  - '2004 Indian Ocean earthquake: The number of people known to have died in last
    month''s Asian tsunami has reached 226,000, following an announcement by Indonesian
    officials that more than 166,000 had been confirmed dead in their country alone.
    (BBC)'
  - 'Hajj: Around two million Muslims from around the world are converging on Mount
    Arafat for the most important day of the annual Hajj pilgrimage to Mecca. (BBC)'
  - Japan Meteorological Agency issues tsunami warnings near the Izu island chain
    south of Tokyo after a strong undersea earthquake (6.8 on the Richter scale).
    (Bloomberg), (BBC), (Xinhua)
  - In Peru, prime minister Carlos Ferrero and defence minister Roberto Chiabra survive
    a censure motion in parliament connected to earlier nationalist uprising in January.
    (BBC)
  - The Indian Army says that Pakistan has violated ceasefire after a mortar fire
    over the military line that divides Kashmir. Pakistan denies the charge. (ExpressIndia)
    (Reuters Alertnet) (BBC)
  - Indonesian foreign minister Hassan Wirayuda says that he wishes to start formal
    peace talks with Free Aceh Movement. (Jakarta Post) (Reuters) (BBC)
  - Scott Polar Research Institute in Cambridge has begun to restore Shackleton's
    Hut at Cape Royds, Antarctica. (BBC)
  Israeli-Palestinian Conflict:
  - Following negotiations with President Abu Mazen, Zachariya Zubaidi, the leader
    of the Al Aqsa Martyrs Brigade, has announced that his militant group are to halt
    attacks inside Israel but said it would continue to strike at Israelis in the
    West Bank and Gaza Strip. (Al Jazeera)
  - Israel has lifted a ban on contacts with new Palestinian leader Mahmoud Abbas.
    (BBC)
  - The top Palestinian security commander, Abdul Razeq Majaydeh, has promised swift
    action to stop terrorist attacks against Israel and has deployed Security forces
    along the border between the Gaza Strip and Israel "to prevent violations". (Pravda)(BBC)
  - IDF forces killed two Palestinian terrorists who threw grenades at Israeli soldiers
    near the Israeli Gaza Strip barrier. (Haaretz)
  - In Nablus, IDF Shayetet-13 forces arrest 13 suspected Hamas members and demolished
    two buildings. (Haaretz)
  - Hamas has said that its meeting with President Abu Mazen was "positive", but has
    not indicated if an agreement on a cease-fire, or Hudna, has been made. (China
    View)
