Date: '2005-01-18'
Source_URI: Portal:Current events/2005 January 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - The government of Sudan signs a preliminary peace treaty with the National Democratic
    Alliance, an opposition umbrella group of rebels in the north and east of the
    country. (Sudan Tribune) (IslamOnline) (BBC)
  Israeli-Palestinian conflict:
  - Palestinian suicide bomber killed one and wounded six Israelis in Gush Katif junction
    in the Gaza Strip. Hamas claimed responsibility. (Haaretz)
  Iraq War:
  - Iraq is to close all its land borders for three days around the 30 January elections
    in an attempt to enhance security, election officials have said. (BBC)
  - Syrian Catholic Archbishop of Mosul Basile Georges Casmoussa is kidnapped in Iraq.
    The Vatican condemns the act and demands his release; Casmoussa is later freed.
    (Catholic World News) (Reuters) (BBC)
  Arts and culture:
  - The Airbus A380 is officially launched at a ceremony in the main French Airbus
    factory in Toulouse. Carrying between 550 and 840 passengers (depending on configuration),
    the double decker A380 is now the largest passenger airliner in the world. (Reuters)
    (BBC)
  Health and environment:
  - The United Nations World Food Program appeals for aid to Mauritania, after drought
    and large locust swarms destroy the harvest. (AllAfrica) (Planet Ark) (Reuters
    Alertnet)
  International relations:
  - A U.N. World Conference on Disaster Reduction in Kobe, Japan begins. About 3,000
    government officials, non-governmental experts and other specialists from around
    the world will discuss the growing trend of people affected by natural disasters.
    (BBC) (WCDR Official Site)
  Law and crime:
  - Bao Tong, Zhao Ziyang's former secretary and the highest ranking official to be
    jailed after the Tiananmen Square protests of 1989 is blocked from paying his
    respects at a mourning hall set up in Zhao's Beijing home. Bao's wife, Jiang Zongcao,
    was injured in the scuffle with plain-clothes police and had to be hospitalized.(Reuters)
  - Two former Bosnian Serb officers, Vidoje Blagojevic and Dragan Jokic, have been
    convicted and imprisoned for their complicity in the Srebrenica massacre in 1995.
    (BBC)
  Politics and elections:
  - In France, labour unions are threatening to begin a succession of strikes to protest
    against the government of president Jacques Chirac. (Expatica) (BBC)
  - Mark Latham, leader of Australia's opposition Labor Party, resigns from his position
    and from parliament due to ill health. Possible replacements include former deputy
    prime minister Kim Beazley, shadow foreign minister Kevin Rudd and shadow health
    minister Julia Gillard. (Melbourne Herald Sun) (ABC) (BBC)
