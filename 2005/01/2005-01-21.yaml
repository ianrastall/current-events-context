Date: '2005-01-21'
Source_URI: Portal:Current events/2005 January 21
Intelligence_Payload:
  Uncategorized:
  - In Belize, the unrest continues for a second day. Water has been cut and government
    buildings have been torched. (Belize channel 5) (Belize channel 7)
  - B15A, the world's largest iceberg with 160 km length, seems to have run aground
    in Antarctica, threatening to cut off supply ships for a number of scientific
    research stations and to starve tens of thousands of penguins. (CBC)
  - In Lucerne, Switzerland, a trial opens against a nurse accused of killing 24 patients.
    (SwissInfo)
  - The Italian government condemns the destruction of an Italian cemetery in Mogadishu,
    Somalia. Local militia wanted to clear the area for a base. (BBC)
  - Italian police have arrested number of people connected to smuggling of illegal
    immigrants from Libya. (AGI) (BBC)
  - Chilean judge Sergio Munoz intends to launch an international investigation for
    secret bank accounts of Augusto Pinochet. (Reuters) (BBC)
  - In France, teachers and civil servants join the growing numbers of strikers to
    protest over job cuts in the public sector. (BBC) (Reuters)
  - The relatives of victims of Kursk submarine disaster appeal to the European Court
    of Human Rights for an additional investigation into the catastrophe. (Mosnews)
    (St.Petersburg Times)
  - France extradites Holger Pfahls, former German deputy defence minister suspected
    of corruption. (Deutsche Welle) (Bloomberg) (PolitInfo)
  Israeli-Palestinian Conflict:
  - The Palestinian Authority redeploys paramilitary police in Gaza for the first
    time since the outbreak of the Al-Aqsa Intifada. (Reuters)
  - Hamas publishes a document in which it recognizes the 1967 borders. (Haaretz)
  Conflict in Iraq:
  - 5 Danish troops, including an army intelligence officer, have been charged with
    mistreating Iraqi prisoners in southern Iraq last year. (BBC)
  - At least 14 people die in a car bombing at a Shi'a mosque in Iraq's capital, amid
    threats of a long war from a key militant. (BBC)
