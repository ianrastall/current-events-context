Date: '2005-01-15'
Source_URI: Portal:Current events/2005 January 15
Intelligence_Payload:
  Uncategorized:
  - The Straits Aviation Exchange Commission and Taipei Airlines Association announce
    that the first direct flights between mainland China and Taiwan since 1949 will
    be allowed to occur during the Chinese New Year holidays. (BBC)
  - Zhao Ziyang, former Premier of the People's Republic of China and General Secretary
    of the Communist Party of China, is in a coma after multiple strokes. (CNN), (BBC),
    (Reuters)
  - 'Conflict in Iraq: U.S.-led forces in Iraq have destroyed and contaminated precious
    ancient Babylonian archaeological evidence and sites according to a report by
    the British Museum. (AFP) (AP)'
  - Israeli-Palestinian Conflict
  - The fictional character Jára da Cimrman is reported in a big surprise to lead
    the scores of The Biggest Czech person competition organized by Czech television.
  Palestinian presidential election:
  - Mahmoud Abbas (a.k.a. Abu Mazen) is sworn in as president of the Palestinian Authority
    in a ceremony in the West Bank town of Ramallah, six days after winning the Palestinian
    presidential election. (BBC)
  - Dozens of Palestinian election officials resigned, alleging irregularities and
    intimidation in Sunday's Presidential election. (BBC)
  - Mahmoud Abbas, the new Palestinian President, has called for an end to the violence,
    and a mutual ceasefire between the Israelis and the Palestinian Militant factions.
    (BBC)
  - Qassam rocket fire hits Sderot, wounding 6 people, a 17-year-old Israeli woman
    suffered critical wounds. (Haaretz)
  - Eight Palestinians have been killed in two separate clashes in the Gaza strip.
    An Israeli child living on a settlement was also injured. (BBC), (Haaretz)
