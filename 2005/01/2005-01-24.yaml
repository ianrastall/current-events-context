Date: '2005-01-24'
Source_URI: Portal:Current events/2005 January 24
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: A suicide car bomb is detonated near interim Prime Minister
    Iyad Allawi''s Iraqi National Accord party office. Officials say Allawi was not
    in the area at the time and that seven policemen and three civilians were wounded.
    U.S. military officials confirm the death of one soldier in Mosul and state four
    of Iraq''s 18 provinces, a quarter of the total population and predominantly Sunni,
    will be unsafe to vote in Sunday''s elections. (Reuters)'
  - Yulia Tymoshenko is appointed Prime Minister of Ukraine as one of President Viktor
    Yushchenko's first official acts, before a state visit in Moscow. Her post still
    requires ratification by the Verkhovna Rada, Ukraine's parliament. (Kyiv Post)
    (Guardian)
  - New "Wall of Names" holocaust memorial is unveiled in Paris. The site will be
    officially opened on Thursday. (Reuters) (Haaretz) (BBC)
  - In Sudan, leader of Sudan People's Liberation Army John Garang says that the northern
    government would have to say why the country should stay united. SPLM leadership
    is to ratify the peace deal with the Khartoum government later. (BBC)
  - JP Morgan Chase bank apologizes for its predecessors Canal Bank and Citizens'
    Bank which accepted slaves as collateral. (CBS2) (Vanguard) (BBC)
  - In Kenya, attorney general Amos Wako gives an order to drop charges against journalist
    Kamau Ngotho. Ngotho was charged with libel after he wrote about government corruption.
    (Legalbrief) (BBC)
  - In South Africa, 40 members of the country's parliament will be charged with fraud
    for using parliamentary travel vouchers worth 17.5 million rand illegally. (IAfrica)
    (IOL) (Guardian)
  - In India, priest Sri Jayendra Saraswathi, his deputy Vijayendra Saraswathi and
    various other people have been charged for murder in the Sankararaman murder case.
    Saraswathi has been released on bail after two months in prison and denies involvement.
    (NDTV) (BBC)
  - In the United Kingdom, Alan Roy Williams, a doctor who gave evidence against Sally
    Clark who was wrongfully convicted of the murder of her two sons, is charged with
    serious professional misconduct. (BBC)
  - North Korea has cut its food rations to half the amount that the United Nations
    World Food Program recommends. U.N. officials say the cut appears temporary and
    is not unprecedented in a country where fluctuations in public food distribution
    are regular. (Reuters Alertnet)
  - According to Finland-based Crisis Management Initiative group, Free Aceh Movement
    and the Indonesian government have agreed to negotiate for ceasefire in Helsinki.
    (Bloomberg) (London Free Press) (Reuters Alertnet)
  - A 6.2 Richter scale earthquake in Palu, Central Sulawesi, Indonesia, results in
    one reported death. (ChannelNewsAsia) (Malaysia Star)
