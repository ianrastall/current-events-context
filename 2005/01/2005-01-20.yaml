Date: '2005-01-20'
Source_URI: Portal:Current events/2005 January 20
Intelligence_Payload:
  Uncategorized:
  - Grenada switches recognition from the Republic of China (Taiwan) to the People's
    Republic of China following a million dollar aid deal from the PRC. This brings
    the number of countries that officially recognize the ROC to 25. (BBC)
  - In Belize, unrest over the government's new taxes boils over as people burn the
    government offices and union workers strike, closing ports and shutting down water
    services. There are reports that the United Kingdom says it will send in 1500
    soldiers to maintain peace. Belizetimes Belize channel 5 Belize channel 7 (Amandala)
    (Belizean)
  - 'Israeli-Palestinian Conflict: Israeli soldiers shoot dead a 13- or 14-year-old
    Palestinian boy, after he points a toy rifle at them, and kill another 13-year-old
    boy walking with his parents near Rafah. (BBC)'
  - The Republic of Ireland, one of the last countries to use non-metric speed limits,
    officially changes all road signage and regulations to use kilometres per hour
    (km/h). Speed limits in Northern Ireland remain in miles per hour (mph). (RTÉ)
    (BBC)
  - In Ukraine, the Supreme Court dismisses prime minister Viktor Yanukovych's appeal
    and confirms that Viktor Yushchenko has won the presidential election. (Bloomberg)
    (ITAR-TASS) (Reuters) (BBC)
  - President of Guinea Lansana Conté survives an apparent assassination attempt.
    (IAfrica) (Reuters)
  - Brazil offers to mediate between Colombia and Venezuela in a disagreement about
    the capture of Rodrigo Granda. (BBC)
  - In Peru, after vice president David Waisman faints during a TV interview, President
    Alejandro Toledo demands that criticism of his government be toned down. (BBC)
  - Cuba announces a ban of smoking in public places that is due to begin next month.
    Cigars are one of Cuba's main exports. (Reuters Alertnet) (Jamaica Observer)
  - The trial of Bernie Ebbers, former CEO of WorldCom, begins in New York with the
    jury selection. (Silicon.com) (Newsday)
  - Mars rover Opportunity uses its spectrometers to prove that Heat Shield Rock is
    a meteorite, the first to be found on another planet. (BBC) (Space.com)
  - The Walt Disney Company announces that the water park River Country will be closed
    permanently.
  United States:
  - U.S. President George W. Bush is sworn in for his second term, with a pledge to
    seek "freedom in all the world". (AP)
  - 'U.S. Vice President Dick Cheney blames Saddam Hussein for the slow pace of the
    Iraqi reconstruction: "I think the hundreds of thousands of people who were slaughtered
    at the time, including anybody who had the gumption to stand up and challenge
    him, made the situation tougher than I would have thought." (AP)'
  - A series of anti-war protests and rallies occur in Washington DC and other cities
    during the inauguration of George W. Bush. Police engage some snowball throwing
    protesters with pepper spray and batons. (Reuters) (NewStandard) (Democracy Now!)
  Hajj:
  - Pilgrims on Hajj celebrate Eid ul-Adha in Saudi Arabia, and prepare to stone the
    pillars that represent satan, and eat meat of a newly killed animal, while giving
    meat to those less fortunate as qurbani. Hajj Celebrations will also be held around
    the world, but some will wait until Friday. (BBC)
  - The most senior Islamic cleric in Saudi Arabia, Sheik Abdul-Aziz al-Sheik, again
    uses his Hajj sermon to speak out against terrorism, saying that the militants
    "were lured by the devil", and also states, "Faith does not mean killing Muslims
    or non-Muslims who live among us, it does not mean shedding blood, terrorising
    or sending body parts flying." (Chicago Sun-Times) (The Guardian)
