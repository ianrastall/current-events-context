Date: '2005-01-16'
Source_URI: Portal:Current events/2005 January 16
Intelligence_Payload:
  Uncategorized:
  - Adriana Iliescu becomes the world's oldest woman to give birth, at age 66.
  Israeli-Palestinian Conflict:
  - An Israeli tank shell has killed a Palestinian woman and her son in Khan Younis
    refugee camp in southern Gaza. (BBC)
  - Israeli Prime Minister Ariel Sharon instructs the army to take action against
    terrorism and Palestinian rocket attacks stating it was to be "without restrictions,
    I emphasize, without restrictions" following an attack by militants at a Gaza
    crossing that killed 6 Israelis, which followed several Israeli raids into the
    West Bank and Gaza which killed dozens of Palestinians. (AP) (The Guardian)
  - The PLO has called for an end to attacks by Palestinian militant groups against
    Israelis. (BBC)
  - Egyptian President Hosni Mubarak has called on Israeli Prime Minister Ariel Sharon
    to resume contacts with Mahmoud Abbas, the new President (Ra'ees) of the Palestinian
    Authority. Sharon had cut off all contact with the new Palestinian leader before
    he was inaugurated supposedly because Israel believes Palestinian officials aided
    the Militants attacks of the Karni checkpoint. (BBC) (The Guardian)
