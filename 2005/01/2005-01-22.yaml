Date: '2005-01-22'
Source_URI: Portal:Current events/2005 January 22
Intelligence_Payload:
  Uncategorized:
  - The Washington Post alleges that the Pentagon is running a military organization
    known as the Strategic Support Branch which is under the direct control of U.S.
    Defense Secretary Donald Rumsfeld. Allegedly it is used to bypass the limitations
    of working with the Central Intelligence Agency. The Pentagon stated "There is
    no unit that is directly reportable to the secretary of defense for clandestine
    operations" and the department "is not attempting to 'bend' statutes to fit desired
    activities".
  - The Tsunami relief concert is held at the Millennium Stadium, Cardiff, in aid
    of the victims of the 2004 Indian Ocean earthquake, raising over £1.25 million
    (€1.8 million or $2.4 million), making it the biggest charity concert in the United
    Kingdom since Live Aid in 1985. (BBC)
  - U.S. Defense Secretary Donald Rumsfeld cancels his attendance at the Munich Security
    Conference in February due to a war crimes investigation filed against him in
    Germany by the New York-based Center for Constitutional Rights in connection with
    detainee abuses at Iraq's Abu Ghraib prison. (Expatica) (DW)
  - Song Xiuyan is confirmed by the 3rd Plenum of the 10th Qinghai People's Congress
    as Governor of Qinghai, making her the only female Provincial Governor in the
    People's Republic of China at the time. (ChineseNewsNet)
  - 'Israeli-Palestinian Conflict: The al-Aqsa Martyrs'' Brigades agrees to a ceasefire
    if Israel will promise to fully halt military operations inside the West Bank
    and Gaza Strip, including arrest raids and assassinations and releases Palestinian
    prisoners from its jails. The militant group rejects Israel''s offer to ease operations.
    (BBC) (Reuters) (Link dead as of 02:35, 15 January 2007 (UTC)), (Haaretz) (Link
    dead as of 02:35, 15 January 2007 (UTC))'
  - Eid ul-Adha the second in the series of Eid festivals that Muslims celebrate.
  - In the basement of a hotel in the New York City borough of Queens, people hold
    a memorial service for the late Chinese leader Zhao Ziyang. This memorial follows
    the one held in the Shangri-la hotel yesterday. (NYT) (registration required)
  Conflict in Iraq:
  - The Association of Muslim Scholars negotiates the release of 8 Chinese hostages
    kidnapped by the Islamic Resistance Movement. (BBC) (Reuters) (Link dead as of
    02:35, 15 January 2007 (UTC))
  - The International Organization for Migration extends voter registration for 2
    days for Iraqis living abroad due to low turnout. Ansar al-Sunna announces it
    has executed 15 kidnapped Iraqi National Guard. (BBC) (Reuters) (Link dead as
    of 02:35, 15 January 2007 (UTC))
