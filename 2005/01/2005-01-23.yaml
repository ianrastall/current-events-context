Date: '2005-01-23'
Source_URI: Portal:Current events/2005 January 23
Intelligence_Payload:
  Uncategorized:
  - The Philadelphia Eagles win the 2004 NFC Championship game
  - The police chief in the capital of Somalia, Mogadishu, is shot dead. The new Somali
    government is slated to begin relocating from Kenya on February 1. (BBC)
  - Viktor Yushchenko is invested as president of Ukraine at a ceremony in Kiev before
    a large crowd of supporters and attended by numerous heads of state and other
    dignitaries from around the world. (BBC) (AP)
  Conflict in Iraq:
  - U.S. Ambassador John Negroponte confirms there is an investigation into the alleged
    loss or transfer of $300 million USD to a Beirut bank by Iraqi interim Defence
    Minister, Hazim al-Shaalan to purchase arms. (ABC AU)
  - The U.S. military is planning to deploy remote-controlled robots armed with machine
    guns and night vision to combat insurgents in Iraq. (BBC)
