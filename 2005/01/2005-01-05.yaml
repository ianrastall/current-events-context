Date: '2005-01-05'
Source_URI: Portal:Current events/2005 January 5
Intelligence_Payload:
  Uncategorized:
  - According to the 2005 the 2005 Index of Economic Freedom, the US has for the first
    time dropped from the top 10 free nations of the world, Hong Kong continues its
    number one ranking for the 11th consecutive year, released by The Heritage Foundation
    and The Wall Street Journal. (The Heritage Foundation | 2005 Index) (Financial
    Times)
  - Venezuela promises to investigate claims that Rodrigo Granda, a prominent member
    of the Colombian rebel group FARC, was captured from Caracas instead of from inside
    Colombia. Granda was arrested December 13, 2004. (BBC)
  - Serbian Justice Minister Zoran Stojković rejects the U.N. ICTY war crimes tribunal's
    demands that Serbia arrest four generals accused of committing atrocities in Kosovo.
    (B92) (BBC)
  - The U.S. Securities and Exchange Commission accuses Mexican broadcaster TV Azteca
    of involvement in a massive debt fraud; TV Azteca stock on the New York and Mexico
    City exchanges drops 9% on the news. (BBC)
