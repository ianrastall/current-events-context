Date: '2005-01-10'
Source_URI: Portal:Current events/2005 January 10
Intelligence_Payload:
  Uncategorized:
  - Four CBS News staffers are fired following the release of an independent investigation
    of a 60 Minutes story about U.S. President George W. Bush's military service that
    relied on forged documents. (CNN)
  - Mahmoud Abbas is officially declared winner of the Palestinian presidential election,
    with 62.3% of the votes cast. (BBC)
  - 'Darfur conflict: United Nations secretary general Kofi Annan warns that the security
    situation in Darfur is deteriorating. (BBC)'
  - Venezuelan President Hugo Chávez says he is convinced that Colombian police captured
    FARC leader Rodrigo Granda in Venezuela, contrary to their claims that he was
    arrested in the Colombian border town of Cúcuta. (Reuters Alertnet) (BBC)
  - A smoking ban comes into effect in Italy, prohibiting smoking in public places.
    It has been reported that some businesses and smokers intend to defy the ban.
    (Boston Globe) (BBC)
  - In India, more than 55 people are killed when a bus falls into the Almatti canal
    in Bijapur district, Karnataka. (BBC)
  - In the Philippines, the truce between the army and Islamist rebels collapses.
    Government forces exchange fire with the MILF rebels in Mindanao. The peace talks
    are still ongoing. (Reuters Alertnet)
  - Tides of over 2 meters inundate Port Blair, Andaman Islands, India, raising fears
    that the 2004 Indian Ocean earthquake has changed tidal patterns. BBC
