Date: '2005-02-11'
Source_URI: Portal:Current events/2005 February 11
Intelligence_Payload:
  Uncategorized:
  - Eason Jordan resigns from his posts at CNN, where he has been both chief news
    executive and executive vice president. The controversy that led to his resignation
    began at the World Economic Forum in Davos, Switzerland last month where, witnesses
    claim, he said that the U.S. military had targeted and killed journalists. (Miami
    Herald)
  - At least eight people are killed during a jail riot in Córdoba, Argentina. All
    hostages taken by the prisoners were later freed by police.
  - 'Conflict in Iraq: At least 20 people are killed in Baghdad as United States Secretary
    of Defense Donald Rumsfeld tours the country for a day. (BBC)'
  - 'Israeli-Palestinian conflict: Palestinian leader Mahmoud Abbas travels to the
    Gaza Strip to persuade militant groups to join the ceasefire announced with Israel
    three days ago. (BBC)'
  - An estimated two million Iranians demonstrate against a possible U.S. pre-emptive
    strike aimed at preventing Iran from deploying nuclear weapons – a strike which
    top US military leaders deny considering. (Jakarta Post)
  - The 485-foot-long Shakidor Dam in Baluchistan, southwest Pakistan, bursts under
    the pressure of a weeks' worth of rain, sending the Pakistani military into emergency
    search and rescue operations. Some 400 to 500 people are still unaccounted for.
    (CBC)
  - Japan pledges over $21M in support of a United Nations-backed independent tribunal
    of Khmer Rouge leaders in Cambodia. The proposed tribunal is for crimes against
    humanity. (ChannelNews Asia) (BBC)
  - The Supreme Court of India agrees to examine the legality of the sensitive issue
    raised in a petition demanding reservation for Dalits even after conversion to
    Christianity. (Indian Express)
  - In Karnataka, India, armed Naxalites gun down six State Reserve Police personnel
    and a civilian and injure five others at Venkammanahali in the Tumkur district
    bordering Andhra Pradesh. (Times of India) (Indian Express)
  - The Supreme Court of India issues notices to all state governments of India on
    a public interest petition seeking a ban on mixing whitening chemical agents like
    magnesium carbonate in gutkas. (NDTV) (Times of India) (Rediff)
  - Ministers of the Commonwealth criticize Pakistani president Pervez Musharraf for
    not stepping down as army chief as he had promised. The State Department of the
    United States also asks him to end his dual role. (Daily Times, Pakistan) (Sify)
    (NDTV) (BBC)
