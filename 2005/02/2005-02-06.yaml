Date: '2005-02-06'
Source_URI: Portal:Current events/2005 February 6
Intelligence_Payload:
  Uncategorized:
  - The New England Patriots win the Super Bowl, defeating the Philadelphia Eagles
    24-21. (Wash. Times)
  - US Secretary of State Condoleezza Rice arrives in Israel to meet with Israeli
    Prime Minister Ariel Sharon and Palestinian Authority President Mahmoud Abbas.
    (CNN)
  - Thai Prime Minister Thaksin Shinawatra wins an unprecedented second term as prime
    minister, in the greatest electoral sweep in the nation's history. (CNN)
  - 'Conflict in Iraq: Guerrilla fighting leaves 22 dead, including two US troops.
    (Daily Times)'
  - The tobacco industry hails a United States court of appeals ruling which rejected
    the government's $280bn claim for alleged deceit about the dangers of smoking.
    (BBC)
  - A gas leak in a hostel in Todolella, Spain kills 18 people. (BBC)
  Togo succession:
  - The Togolese parliament tries to legalize the accession to power of Faure Gnassingbé,
    son of Gnassingbé Eyadéma, by voting to change a constitutional amendment. (Yahoo
    France - AFP) (CBC)
  - The military of Togo is criticized by global leaders for suspending the constitution
    after the death of president Gnassingbé Eyadéma and naming his son successor.
    (BBC)
