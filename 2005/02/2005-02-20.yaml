Date: '2005-02-20'
Source_URI: Portal:Current events/2005 February 20
Intelligence_Payload:
  Uncategorized:
  - American author and journalist Hunter S. Thompson is found dead in his Aspen,
    Colorado home, the result of an apparent suicide. (BBC) (Bloomberg) (CNN)
  - The United States and Japan release a joint statement which says that easing tensions
    in the Taiwan Strait is among their "common strategic objectives". The statement
    is welcomed by the government of Taiwan, but is condemned by China. (Xinhua) (Reuters)
    (NY Times)
  - U.N. High Commissioner for Refugees Ruud Lubbers resigns over allegations of sexual
    harassment, while continuing to deny them. (VOA)
  - In Europe's first national referendum on the proposed European Constitution, the
    people of Spain vote to endorse the Treaty by a landslide 76.73% to 17.24%. However,
    turnout is an extremely low 42.32%, even after both the government and the main
    opposition party campaigned for a "yes" vote. (BBC) (Reuters) (Bloomberg) (EUobserver)
    (EurActiv) (BBC)
  - Irish Minister for Justice, Equality and Law Reform Michael McDowell directly
    accuses Sinn Féin leader Gerry Adams as well as Martin McGuinness (both elected
    MPs) and Martin Ferris TD of being on the IRA Army Council, the first such direct
    accusation from the Irish Government. Irish Prime Minister Bertie Ahern meanwhile
    has said he does not know the make-up of the Council. (Ireland Online)(RTÉ)
  - According to official results, the opposition Socialist party secures an absolute
    majority at the Portuguese Parliament election, 2005. (CNN International) (ABC)
  - The Turkish Republic of Northern Cyprus votes in its early general election. The
    election was called by President Rauf Denktaş after the coalition led by Mehmet
    Ali Talat finally lost its parliamentary majority. (BBC), (DW)
  - The US and EU join the protests against Faure Gnassingbé of Togo. The Economic
    Community of West African States (ECOWAS) imposes sanctions and suspends Togo's
    membership in the organization and US does not accept his rule as legitimate and
    ends all military assistance (Reuters AlertNet) (News24) (GhanaWeb) (BBC)
