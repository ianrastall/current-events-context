Date: '2005-02-05'
Source_URI: Portal:Current events/2005 February 5
Intelligence_Payload:
  Uncategorized:
  - NATO helicopters find the wreckage of a Kam Air Boeing 737, an Afghan passenger
    jet, in mountains east of Kabul; all 104 people that were on board are presumed
    dead. (ABC News)
  - 'Bareilly, India: More than 250 grams of weapons-grade uranium are found in possession
    of two people arrested for drug peddling in India. (Times of India)'
  - President Gnassingbé Eyadéma of Togo dies of a heart attack at the age of 68 and
    is succeeded by his son Faure Gnassingbé. (CNN)
  - In the People's Republic of China, The Tenth Shaanxi Provincial People's Congress
    votes in favour of Acting Governor Chen Deming to become the next Governor of
    Shaanxi. (People's Daily) (ChinaBroadcast)
  - In Malawi, President Bingu wa Mutharika quits the governing party, the United
    Democratic Front, stating he is fed up of criticism of his anti-corruption campaign.
    The party had debated whether to expel him for alleged misconduct. (IOL, SA) (SABC)
    (BBC)
