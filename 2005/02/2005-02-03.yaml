Date: '2005-02-03'
Source_URI: Portal:Current events/2005 February 3
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: At least 29 people, including 3 US Marines, are killed by opponents
    to the interim government and the occupying forces. In one operation, 50 policemen
    are ambushed in Baghdad, leaving at least 2 dead, 14 wounded and 16 missing. (The
    Scotsman)'
  - Pope John Paul II's medical condition is "evolving positively", but the Vatican
    says the 84-year-old pontiff will remain in hospital for another week. However,
    there is still concern over the pontiff's continuing fever, which some medical
    experts fear could be a sign of pneumonia. (CBC)
  - Prime Minister Zurab Zhvania of Georgia dies of gas poisoning. Zhvania was found
    dead by security guards, an apparent victim of carbon monoxide exposure. (Civil
    Georgia) (Reuters) (Interfax) (BBC)
  - Greece hands over Dejan Milenković, main suspect of the murder of Serbian Prime
    Minister Zoran Đinđić, to Serbian authorities. (Athens News Agency) (BBC)
  - King Gyanendra of Nepal includes media censorship as part of the emergency measures
    he has declared. (BBC)
  - A cargo plane crashes near Khartoum, Sudan, killing seven people. (Reuters) (IOL)
    (BBC)
  - In Cambodia, opposition leader Sam Rainsy is stripped of his parliamentary immunity.
    He may face libel charges, and has fled the nation. (Reuters AlertNet) (BBC)
