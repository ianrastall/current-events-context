Date: '2005-02-10'
Source_URI: Portal:Current events/2005 February 10
Intelligence_Payload:
  Uncategorized:
  - 'Balance of trade: The U.S. Department of Commerce states imports exceeded exports
    by $670 billion for 2004, beating the previous record by nearly 25%. (BBC)'
  - 'September 11, 2001 attacks: A previously unreleased portion of the 9/11 Commission''s
    report details that the Federal Aviation Administration received 52 intelligence
    reports on potential terrorist attacks by al-Qaeda before September 11, 2001.
    (BBC) (NY Times)'
  - 'Israeli-Palestinian Conflict: Israel has postponed security talks with Palestinians
    following a mortar attack by Hamas on the Gush Katif Jewish settlements in the
    Gaza Strip. Hamas claim the attack was in retaliation for an attack by Jewish
    settlers which left one man dead. Palestinian leader Mahmoud Abbas responds by
    firing the top security commanders in the Gaza Strip. (BBC)'
  - Clarence House announces that Charles, Prince of Wales is to marry Camilla Parker
    Bowles in a civil ceremony on 8 April. When Charles becomes a king, it is intended
    that she be styled as a princess consort, rather than a queen consort. (BBC)
  - 'North Korea and weapons of mass destruction: North Korea announces that it has
    developed nuclear weapons for its self-defense, and suspends participation in
    multi-nation talks to discuss its arms program. (Reuters)'
  - Saudi Arabia starts its first nationwide municipal elections. Voting is limited
    to men in Riyadh and voters elect only half of the municipal councils; the other
    half is appointed by the monarchy. Other regions are scheduled to hold elections
    next month. (Reuters) (Arab News) (Khaleej Times) (World Peace Herald)
  - In a meeting of the Economic Community of West African States, west African leaders
    refuse to recognise Faure Gnassingbé as the new president of Togo and threaten
    to impose sanctions if the country does not begin to plan presidential elections.
    Gnassingbé has promised elections as soon as possible. (Reuters) (BBC) (Republic
    of Togo)
  - An Indian baby who is believed to be the smallest baby in history to survive complications
    related to being of a relatively small size during birth, goes home six months
    after she was born in a hospital in Chicago. She was born weighing 8.6 ounces
    (244 grams). (Calcutta Telegraph) (Khalsa News) (Reuters)
  - In Peru, 5 die and 19 are injured when two gangs clash in the maximum security
    Lurigancho prison outside Lima. (Bloomberg) (BBC)
  - According to Zimbabwean police, female athlete Samukeliso Sithole is actually
    male. (AllAfrica) (BBC)
  Conflict in Iraq:
  - Iraqi officials announce they must recount around 300 ballot boxes due to various
    discrepancies, delaying the final results.
  - In Salman Pak south of Baghdad, guerrillas attack a police station killing at
    least eight Iraqi policemen and wounding more than 60.
  - Three people are killed when a car bomb is detonated in Baghdad.
  - Also in the capital, the bodies of 20 truck drivers are found and guerrillas ambush
    a convoy of Kurdish party officials, killing one and wounding four.
  - In Basra, guerrillas kill an Iraqi journalist working for the U.S.-funded al-Hurra
    TV station and his 3-year-old son as they leave their home.
  - A roadside bomb in Samarra leaves four policemen dead. (BBC) (ABC)
