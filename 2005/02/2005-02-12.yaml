Date: '2005-02-12'
Source_URI: Portal:Current events/2005 February 12
Intelligence_Payload:
  Uncategorized:
  - Protests against Faure Gnassingbé
  - In Lome, Togo, thousands protest the army-installed President Faure Gnassingbé.
    Clashes with soldiers and police forces cause the deaths of three demonstrators.
    (Guardian) (Yahoo France - AP)
  - A strain of HIV, known to be highly drug-resistant, is discovered in a New York
    City individual. Further alarming health officials is that the onset of AIDS began
    within a few months of his diagnosis, a process which ordinarily takes over ten
    years. The patient is known to have frequently taken methamphetamine, a mutagen.
    (CNN)
  - Howard Dean, a former governor of Vermont and a 2004 U.S. presidential candidate,
    is elected chairman of the Democratic National Committee. (CNN)
