Date: '2005-02-25'
Source_URI: Portal:Current events/2005 February 25
Intelligence_Payload:
  Uncategorized:
  - A suicide bomber explodes himself at the entrance of the "Stage" club in Tel Aviv,
    killing at least 4 Israelis and wounding 38 more. Responsibility is reportedly
    claimed by Islamic Jihad. (Haaretz) (CNN)
  - At Amsterdam's Schiphol airport an armoured car is hijacked on the cargo ramp.
    Unconfirmed reports say that it contained diamonds and other gems worth at least
    75 million euros (US$99 million). The vehicle was later recovered in the nearby
    town of Hoofddorp. (BBC), (Scotsman).
  - Three British soldiers convicted earlier this week of abusing Iraqi prisoners
    are jailed for periods between five months and two years, and dismissed from the
    army. (BBC).
  - Human Rights Watch states that tough methods of Thai leader Thaksin Shinawatra
    in the south of the country may serve to invite more trouble (Reuters Alertnet)
    (Bangkok Post) (BBC)
  - Vice President of Indonesia, Jusuf Kalla, states that he was pleased with the
    progress of talks with Free Aceh Movement in Finland. Government still opposes
    independence (Jakarta Post) (BBC)
  - In Ecuador, José Gallardo, a former defence minister, is arrested accused of misusing
    public funds to secretly purchase outdated weapons (Reuters AlertNet) (BBC)
  - King Gyanendra of Nepal asks for foreign help to crush Maoist insurgents. He says
    that he dismissed the elected government to fight terrorism and will return to
    democracy in three years. Many foreign countries have stopped all aid after his
    takeover (Channel News Asia) (Bloomberg) (New Kerala)
  - In Switzerland, the court of appeals rules that Yeslam Binladin, a half-brother
    of Osama bin Laden, can market products under the brand name Bin Ladin (SwissInfo)
  - Militia members ambush and kill 9 UN Bangladeshi peacekeepers in the Democratic
    Republic of Congo. (Xinhua) (LA Times)
  - Serial killer Dennis Rader is arrested.
