Date: '2005-02-24'
Source_URI: Portal:Current events/2005 February 24
Intelligence_Payload:
  Uncategorized:
  - In Somalia, thousands greet Abdullahi Yusuf Ahmed and Mohammed Ali Ghedi, leaders
    of the exiled Somalian government, when they begin a week-long tour in the country.
    They led a delegation that studies a possibility to finally relocate the government
    from Kenya to Somalia (Reuters AlertNet) (BBC)
  - The Anglican Churches of North America – the Episcopal Church in the United States
    and the Anglican Church of Canada – are asked to voluntarily withdraw their members
    from the Anglican Consultative Council until after the next Lambeth Conference
    in 2008. This is viewed as an ultimatum to the churches to bring their policies
    into line with the worldwide Anglican Communion, following the ordination of the
    first gay bishop in New Hampshire and the blessing of same-sex unions by the Canadian
    church, and presages a schism if they do not comply. (BBC)
  - In Taiwan, Chen Shui-bian and People First Party Chairman James Soong meet for
    the first time in four years. They issue a joint 10-point declaration emphasizing
    their agreement on preserving the "status quo" in cross strait relations. (Reuters)
    (United Evening News)
  - The PRC objects to former US President Bill Clinton's plan to visit Taiwan and
    meet with the ROC President Chen Shui-bian. (VOA)
  - Pope John Paul II returns to hospital in Rome for more specialist treatments and
    tests. (ANSA). Doctors decided to carry out a tracheotomy, which was performed
    successfully.
  - Canadian Prime Minister Paul Martin tells the US ambassador to Canada that he
    will say "no" to the US' proposed missile defense plan. (Xinhua) (CNN) (CTV) (Reuters)
  - Slovakia Summit between U.S. President George W. Bush and Russian President Vladimir
    Putin begins in Bratislava. (Slovak Spectator)
  - In Colombia, there is a ceremony to mark the three-year anniversary of the capture
    of Ingrid Bétancourt, former Colombian presidential candidate who is still a FARC
    hostage. She was captured February 2002. Her relatives are pressing government
    to make a prisoner swap for her and other hostages. (Newsday) (BBC)
  - Colombian supreme court authorizes the extradition of drug dealer Miguel Rodríguez
    Orejuela to the US (Reuters Alertnet) (VOA) (BBC)
  - In Sudan, an ammunition depot explodes near the town of Juba; at least 18 are
    dead and the toll continues to rise (BBC) (ABC)
  - In Mexico, the supreme court rules that former President Luis Echeverría cannot
    be tried for genocide because of 30-year statute of limitations. Echeverría was
    accused of genocide because he ordered an attack on protesting students in 1971,
    resulting in 40 deaths. (Reuters) (BBC)
  - Foreign Minister of Burma/Myanmar Nyan Win visits Bangladesh to discuss with Shamsher
    M Chowdhury about a direct road link between the countries and repatriation of
    Burmese refugees 05-29.htm (Mizzima) (Financial Express, Bangladesh) (BBC)
  - Ebert Anibal Rivera, alleged head of a Mara Salvatrucha gang that killed 28 bus
    passengers in Honduras last December 23, is arrested in Texas. Honduras intends
    to request extradition if Texas authorities do not file charges. (Reuters) (Houston
    Chronicle) (BBC)
  - Italian court orders Diego Maradona to pay 30 million euros of back taxes (equal
    to US$39.6 million) (Sporting Life) (BBC)
  - New EU laws declare lottery scams illegal (BBC)
  - The parliament of Turkey grants amnesty to 677,000 people who have been expelled
    from university in recent years (BBC)
  - In Kyrgyzstan, thousands of people protest in support of opposition politicians
    who were barred from elections (BBC)
  - French Finance Minister Hervé Gaymard faces increasing pressure to resign. He
    has been criticized due to the luxury apartment where he lives at the state's
    expense, although he has promised to move elsewhere. (Reuters) (Financial Times)
