Date: '2005-02-04'
Source_URI: Portal:Current events/2005 February 4
Intelligence_Payload:
  Uncategorized:
  - New observations from the Arecibo radio telescope confirm that asteroid 2004 MN4
    (later named 99942 Apophis in July 2005), once briefly considered an impact risk,
    will pass Earth on April 13, 2029 at a distance of 36,350 km (22,600 mi) and will
    reach magnitude 3.3, easily visible to the naked eye from Europe, Africa and western
    Asia. (Space.com)
  - 'United States: Alberto Gonzales becomes the first Hispanic U.S. Attorney General,
    confirmed by a 60-36 Senate vote split across party lines. (Washington Times)'
  - In Congo (Kinshasa), the equestrian statue of King Léopold of the Belgians, who
    founded the Congo Free State in 1885, is briefly re-erected in Kinshasa before
    it is again removed. (News24) (BBC)
  - The government of Uganda announces a new ceasefire of 18 days with the Lord's
    Resistance Army. (Reuters AlertNet) (BBC)
  - In Mauritania, four army officers who plotted coups against President Maaouya
    Ould Sid'Ahmed Taya each receive a life sentence instead of the expected death
    penalty after a four-month trial. The sentenced include former army major Saleh
    Ould Hanenna. (Reuters AlertNet) (Middle East Online)
  - Watergate papers of Washington Post reporters Bob Woodward and Carl Bernstein
    are announced to go on public display. The reporters still do not intend to reveal
    the identity of Deep Throat. (Reuters) (Washington Post)
  - 'Same-sex marriage in the United States: The New York State Supreme Court rules
    that the state''s ban on same-sex marriage violates the state constitution. The
    decision is stayed for 30 days. (CBC) (CNN)'
