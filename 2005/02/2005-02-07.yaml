Date: '2005-02-07'
Source_URI: Portal:Current events/2005 February 7
Intelligence_Payload:
  Uncategorized:
  - Englishwoman Ellen MacArthur sets a record for the quickest round-the-world solo
    sail. She completed the 27,354 mile journey in 71 days, 14 hours, 18 minutes and
    33 seconds, breaking the old record of 72 days, 22 hours, 54 minutes and 22 seconds,
    set by Francis Joyon in 2004, which itself took 20 days off the previous record.
    (Associated Press) (Sky News)
  - A number of people are taken hostage in the Spanish consulate in Bern, Switzerland.
    (SwissInfo) (BBC)
  - Nigerian President Olusegun Obasanjo asks other African states not to recognize
    the transfer of power in Togo to Faure Gnassingbé. The African Union has also
    condemned the move. (IAfrica)
  - Spanish police in the Canary Islands find a drifting boat containing 227 African
    migrants. (BBC)
  - In Guatemala, the constitutional court stops a trial of 16 military officers accused
    of war crimes and killing hundreds of civilians. (Reuters) (BBC)
  - In Nepal, the state media reports that the new government of King Gyanendra of
    Nepal offers talks to Maoist rebels. At the same time, Nepalese government forces
    begin a new offensive against the rebels.
