Date: '2005-05-29'
Source_URI: Portal:Current events/2005 May 29
Intelligence_Payload:
  Uncategorized:
  - A London newspaper reports that Merrill Lynch, New York, is trying to persuade
    at least seventeen members of the corporate derivatives team of rival investment
    bank JP Morgan to defect. An anonymous source/headhunter quoted in the newspaper
    predicted that the seventeen will be working at Merrill Lynch by the end of the
    summer. (Reuters)
  - The French electorate reject the Treaty establishing a Constitution for Europe
    by approximately 55% to 45%, igniting a political crisis in the union and dealing
    a sharp blow to French President Jacques Chirac. All 25 EU member states must
    ratify the treaty for it to come into effect - 9 have done so to date, but only
    Spain has previously held a referendum. (BBC) (Los Angeles Times) (Bloomberg)
    (Reuters)
  - Dan Wheldon won the 89th running of the Indianapolis 500, beating rookie Danica
    Patrick, who led the race three times and came in an impressive fourth place (CNN/SI)
  - In Brazil, huge Gay Pride parade begins in São Paulo. (CNN) (CBC) (BBC)
  - In Taiwan, thousands of mourners attend the funeral of reputed gangster Hsu Hai-ching.
    (TaiwanNews) (Taipei Times) (BBC)
  - Three US senators visit Uzbekistan to demand investigation on the crackdown of
    unrest. (ABC) (Reuters AlertNet)
  - Paolo Savoldelli wins the 2005 Giro d'Italia. <<NEWSLINK MISSING>>
  - The Coca Cola League One Play Off Final is won by Sheffield Wednesday at the Millennium
    Stadium, Cardiff after they beat Hartlepool United 4-2 to gain promotion to the
    Coca Cola Championship.
