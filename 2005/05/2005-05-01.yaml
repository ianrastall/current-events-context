Date: '2005-05-01'
Source_URI: Portal:Current events/2005 May 1
Intelligence_Payload:
  Uncategorized:
  - Lenovo Group, the largest Chinese computer company acquires the personal computer
    business of IBM for US$ 1.25 billion in cash, and Lenovo assumes $500 million
    of IBM's debt. (Reuters)
  - More than thirty Iraqis are killed and more than fifty are wounded as a bomb goes
    off at a funeral. (CBC)
  - The United States informs Japan that North Korea may have launched another test
    missile towards the Sea of Japan. The report is now said to be confirmed. (ABC
    News) (Forbes)
  - Astronomers have directly confirmed the existence of an extrasolar planet orbiting
    the brown dwarf numbered 2M1207a. The team says that this is the first-ever infrared
    view of an exoplanet. (Seattle Times) (ESO) (CP)
  - Taiwanese president Chen Shui-bian requests that the Chinese government meet directly
    with his government after China meets with Taiwan's opposition leader, Lien Chan.
    Taiwan and China are in conflict over Taiwan's increased calls for independence
    from the mainland. (CBC) (ABC)
  - Iraqi and American militaries hold several suspects for questioning in the Margaret
    Hassan kidnapping case. Hassan, director of CARE's Iraq division, was kidnapped
    by insurgents in late October 2004 and subsequently believed to be killed. (CBC)
    (NPR)
  - In Nepal, 10,000 protesters march in Kathmandu against the policies of king Gyanendra
    and demand return of democracy.
  - Italy intends to publish its own view of the killing of Nicola Calipari. Italian
    media has released classified details about a report the United States made. (BBC)
  - Honduran president Ricardo Maduro, and his daughter survive with minor injuries
    when their plane crashes into the sea near Tela. (CBC) (BBC)
