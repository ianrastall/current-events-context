Date: '2005-05-10'
Source_URI: Portal:Current events/2005 May 10
Intelligence_Payload:
  Uncategorized:
  - Leaders in Indonesia visit Suharto, the nation's former president, who is hospitalized
    with what has been diagnosed as intestinal bleeding. (Yahoo)
  - A Haitian court overturns convictions of 38 military officers who were charged
    with killings in the Raboteau Massacre during the 1991 coup against Jean-Bertrand
    Aristide. The Ecumenical Center for Human Rights states that the trial was annulled
    on technicality. (Jamaica Observer) (ABC) (BBC)
  - Human Rights Watch states that elections in the Oromia region of Ethiopia will
    be a "hollow exercise." (Human Rights Watch) (AllAfrica) (News24)
  - Canadian House of Commons opposition members of parliament pass a motion to instruct
    a house committee to call for the resignation of the government. The 153 votes
    of the Conservatives and Bloc Québécois defeat the 150 votes of the Liberals and
    NDP due to three absences. Although the motion is classified as a procedural instruction
    to a committee and not a no confidence motion, the Tories and BQ call on the government
    to resign. (CBC)
  - The Memorial to the Murdered Jews of Europe in Berlin close to the Brandenburg
    Gate is unveiled. (Deutsche Welle) (Ha'aretz) (ABC) (Reuters AlertNet)
  - G8 countries urge Ukraine to cover the Chernobyl nuclear plant. (Reuters AlertNet)
  - The Maldives government releases dissident Fathimath Nisreen. Two others, Mohamed
    Zaki and Ahmad Didi, remain in custody. (Reporters Without Borders) (Minivan News,
    Maldives) (BBC)
  - The Egyptian parliament approves a constitutional amendment that would allow presidential
    elections to be contested. (Arab News) (IHT) (BBC)
  - President George W. Bush and Georgian President Mikhail Saakashvili met in Tbilisi,
    Georgia and Bush gets a hand grenade thrown at him, but does not detonate.
