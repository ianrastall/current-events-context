Date: '2005-05-13'
Source_URI: Portal:Current events/2005 May 13
Intelligence_Payload:
  Uncategorized:
  - Heavy exchanges of fire in the Israeli-Lebanese border. Hezbollah fired at least
    9 mortar shells or Katyusha rockets on outposts in the disputed Shebaa Farms.
    The IDF retaliated by artillery fire and IAF aircraft bombed 3 Hezbollah positions.
    Israel maintains that Lebanon bears full responsibility for the border attacks,
    committed by Hezbollah and local Palestinian groups, while Hezbollah maintain
    that they are acting in retaliation for Israeli attacks on Lebanese territory
    including a hit on civilian houses in the village of Kfar Shouba. (Haaretz), (BBC)
  - 'Guantánamo Bay Qur''an desecration allegations: United States Secretary of State
    Condoleezza Rice promises "prompt action" if investigations prove that the Quran
    was desecrated by U.S. soldiers in Guantánamo Bay, Cuba. The Saudi Arabian government
    voices its "deep indignation" and has demanded a quick investigation and punishment
    for the perpetrators if found to be true. Seven people have died in Afghanistan
    following Anti-American protests in the wake of the allegations. There have also
    been protests in Pakistan and Indonesia. (BBC) (BBC) (The Jakarta Post)'
  - Star Trek Enterprise airs its last episode, These are the Voyages..., after a
    run of 98 episodes. Enterprise was canceled by UPN on February 8th due to lack
    of ratings, marking the first Star Trek series to be canceled since the original
    series in 1969
  - The Vatican announced that the late Pope, John Paul II, is to be beatified. This
    is the first step to becoming a saint. (BBC)
  - Michael Ross becomes the first person executed in the U.S. state of Connecticut
    since 1960. He was convicted in 1987 of the murder of four girls and young women.
    He confessed to having committed four more killings. (CNN)
  - Anime Central 8 kicks off today with over 10000 attendees.
  Unrest In Uzbekistan:
  - Thousands of Uzbeks take over a high security jail in Andijan, freeing thousands
    of prisoners in protest against the jail sentence of 23 businessmen who were accused
    of being Islamic extremists. (CBC)
  - Violence breaks out in Andijan and in the capital Tashkent. There are reports
    of firefights in the streets and snipers firing into the crowd. A political rally
    in Andijan demands the resignation of the government, which claims that the situation
    is under control. (BBC) (Interfax) (CNN)
  - At least twenty protesters – some reports say as many as 500 – are shot dead in
    Uzbekistan. Thirty soldiers have been taken hostage as a result. (Yahoo!) (BBC)
    (The Guardian)
  - A man is fatally shot outside Israel's embassy in Tashkent. The man, who has a
    history of mental illness, was carrying wooden objects, and guards suspected him
    of being a suicide bomber. He walked through to the building, despite warning
    shots in the air and a bullet to the leg, and was eventually shot dead. The American
    embassy reported he was a suicide bomber and one Uzbek police officer said the
    man was carrying only a harmless package. However, it was later reported that
    the man was carrying a mock explosive belt. (Haaretz), (Ynet)
