Date: '2005-05-20'
Source_URI: Portal:Current events/2005 May 20
Intelligence_Payload:
  Uncategorized:
  - 'Star Wars Episode III: Revenge of the Sith reaches a record high at the box offices
    on opening day with $50 million on 9,400 screens at 3,661 theaters worldwide,
    edging out Spider-Man 2''''''s top opening day record of $40.4 million and Shrek
    2''s'''' top single day record of $44.8 million. (marketwatch) (AP via Yahoo!
    News) (Link dead as of 02:43, 15 January 2007 (UTC)), (boxofficemojo.com)'
  - Daytime Emmys are awarded, and three records are broken. General Hospital wins
    Best Drama for a record eighth time, Erika Slezak of One Life to Live wins her
    sixth Daytime Emmy for Best Actress, and The Ellen DeGeneres Show wins five Daytime
    Emmys, including Best Talk Show Host, and Best Talk Show. (Washington Post) (Link
    dead as of 02:43, 15 January 2007 (UTC))
  - Reports say that five corpses are found and 200 men are safe in a high mountain
    encampment in the Andes after a Chilean Army instruction raid got hit by a severe
    storm. 47 recruits are missing and temperatures drop to -15ºC (5ºF) in the area.
    (Reuters) (Link dead as of 02:43, 15 January 2007 (UTC))
  - The town of Etoumbi in the Republic of the Congo is put under quarantine after
    an Ebola outbreak kills nine people. (BBC)
  - 'Israeli-Palestinian conflict: Israeli troops kill one Palestinian militant as
    three to four Hamas, Popular Resistance Committees, and Al Aqsa Martyrs Brigade
    militants fire mortar shells and anti-tank missiles on Israelis living in the
    Kfar Darom settlement in the Gaza Strip. (Haaretz) (Link dead as of 02:43, 15
    January 2007 (UTC)), (BBC)'
  - '2005 Pacific hurricane season: Two people die as Hurricane Adrian makes landfall
    near San Salvador, El Salvador.(MSNBC)'
  - In Togo, talks to resolve a crisis after last month's disputed presidential election
    end without agreement. Refugees continue to arrive in Benin. (BBC) (Reuters AlertNet)
    (Link dead as of 02:43, 15 January 2007 (UTC))
  - After six years, the last United Nations peacekeepers have left East Timor. (Bloomberg)
    (BBC)
  - 'Elections in Papua New Guinea: Bougainville in Papua New Guinea begins the first
    elections of its autonomous government. (National, Papua New Guinea) (Radio Australia)
    (BBC)'
  - Australian pop star Kylie Minogue is released from the hospital after surgery
    to treat breast cancer. (The Age)
