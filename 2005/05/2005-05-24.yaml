Date: '2005-05-24'
Source_URI: Portal:Current events/2005 May 24
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: At least five Iraqis and seven US soldiers have been killed
    following a spate of bombings in Iraq. (BBC)'
  - Mathematician Peter Lax receives the Abel Prize, worth nearly one million USD,
    from Norway's Crown Prince Haakon in a ceremony in Oslo. The prize is awarded
    for his work on "the theory and application of partial differential equations."(CNN)
  - Israeli soldiers catch a 15 year old Palestinian carrying two pipe bombs at a
    West Bank checkpoint. (Haaretz)
  - Al-Qaeda in Iraq claims in its website that Abu Musab al-Zarqawi has been wounded.
    (Yahoo!)
  - John Howard, the Prime Minister of Australia, has written to his Japanese counterpart,
    Junichiro Koizumi, urging Japan to reconsider its position on whaling. The International
    Whaling Commission is expected to consider Japan's expansion proposal when it
    meets next month. (ABC News)
  - The Chilean army buries 24 of 46 conscripts that died in a snow storm in the Andes.
    Presidential candidates have called for an end to compulsory military service.
    13 bodies still unfound.(SantiagoTimes) (BBC)
  - The appeal of six Pitcairn men who were sentenced for sexual abuse of young girls
    fails. An Auckland court is to decide whether to grant them bail. The men plan
    to appeal to the Privy Council. (BBC) (Reuters)
  - Canadian Liberal candidate Todd Russell wins a crucial by-election in the federal
    riding of Labrador. This result consolidates the shaky Liberal balance of power
    in the federal government. (CBC)
  - Jurors in the criminal trial of Richard M. Scrushy, founder and former CEO of
    HealthSouth Corporation, send notes to the presiding judge that indicate they
    are having difficulty reaching unanimity. The case is part of the wave of U.S.
    corporate scandals of recent years. Prosecutors allege that Mr. Scrushy and others
    conspired to overstate profits at HealthSouth by circa $2.7 billion, in the period
    1996 - 2002. (Reuters)
  - Vivian Liberto, first wife of Johnny Cash, dies due to complications from surgery
    to remove lung cancer.
