Date: '2005-05-03'
Source_URI: Portal:Current events/2005 May 3
Intelligence_Payload:
  Uncategorized:
  - Two United States Marine Corps F/A-18 Hornet jets collide over Iraq while flying
    a mission in Iraq. The body of one of the pilots is later recovered and an ejected
    seat was found, but the second one is still missing. (BBC) (Washington Post)
  - India bans Monsanto Company genetically modified cotton seeds. (Al-Jazeera)
  - In Nepal, thousands of journalists march in protest to restore press freedoms
    on World Press Freedom Day. (Guardian) (BBC)
  - United Nations chief prosecutor of Sierra Leone's war crimes court David Crane
    claims that Charles Taylor, former president of Liberia, is still plotting to
    kill Guinean leader Lansana Conté. Conté has been in a hospital since he survived
    an assassination attempt in January.(UN Regional Information) (World Peace Herald)
    (BBC)
  - A Togolese constitutional court announces Faure Gnassingbé as a winner of presidential
    election. Refugees continue to flee to neighboring countries. (News24)
  - Indonesian authorities confirm second case of polio. (Jakarta Post) (BBC) (Reuters
    AlertNet)
  - In Peru, four members of a government health team are found with their throats
    slit.
  - An explosion in a football stadium in Mogadishu, Somalia kills 15 people when
    new prime minister Ali Mohammed Ghedi begins his speech. Authorities later state
    that a security guard accidentally set off a grenade. (IOL) (IHT)
  - Eight people are arrested in Senegal for an advance fee fraud e-mail scam that
    had fooled at least one American and one Norwegian victim. (BBC)
  - Airwork Flight 23 breaks up and crashes in-fight over New Zealand. (The New Zealand
    Herald)
