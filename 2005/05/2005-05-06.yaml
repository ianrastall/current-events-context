Date: '2005-05-06'
Source_URI: Portal:Current events/2005 May 6
Intelligence_Payload:
  Uncategorized:
  - The United States Court of Appeals for the District of Columbia Circuit rules
    that the FCC overstepped its authority in attempting to impose the "broadcast
    flag" on hardware manufacturers. (News.com) (EFF)
  - Fatah wins 55 percent of the seats in municipal elections held in 84 cities across
    the West Bank and Gaza. Hamas wins about a third of the seats. Fatah won a majority
    of seats in Beit Lahiya, Hawara and Tulkarem, Hamas won the majority in Qalqiliya
    and El Boureij. Election participation was 70 percent in the West Bank and 80
    percent in Gaza. (CNN)
  - A meningitis outbreak in Delhi, India kills 14 people so far and health officials
    suspect many more.
  - A suicide bomber in a car blows himself up near a vegetable market in a southern
    Iraqi town, killing at least 22 people and wounding 45. (Reuters)
  - A 20-year-old IDF soldier is arrested in Israel after telling military police
    that he considers himself a "Nazi", and hates Jews, blacks and the State of Israel.
    (Israel National News) (Reuters), (Courier-Mail) (Houston Chronicle)
  - Reports emerge that the United States may be sending detainees to Uzbekistan,
    a regime notorious for torture. (Seattle Times) (ISN)
  - Audioslave become the first US Rock band to play in Cuba
  - Third Watch airs its final episode in the US after 6 years on NBC
  United Kingdom general election, 2005:
  - At 04:28 BST, The Labour Party wins a parliamentary majority. Despite a substantially
    reduced majority, Tony Blair becomes the first Labour Prime Minister to lead his
    party to three election victories. (Reuters) (Scotsman) He ends up with a majority
    of 66, on the lowest percentage vote for a government in modern history.
  - Northern Ireland's previously dominant Ulster Unionist Party is wiped out in the
    election, with all its MPs except one, including party leader and former First
    Minister David Trimble, losing their seats. Only Lady Sylvia Hermon holds her
    seat. (BBC) (Guardian)
  - In the Foyle constituency, Social Democratic and Labour Party leader Mark Durkan
    wins a seat with a large majority over the expected victor, Sinn Féin's Mitchel
    McLaughlin. (BBC)
  - Conservative Party leader Michael Howard announces that he plans to resign "sooner
    rather than later." (BBC)
