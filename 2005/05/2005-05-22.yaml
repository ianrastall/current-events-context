Date: '2005-05-22'
Source_URI: Portal:Current events/2005 May 22
Intelligence_Payload:
  Uncategorized:
  - In Shenzhen, China, what is believed to be the largest urban demolition blast
    in China uses 1,500 lb (680 kg) of explosives to simultaneously topple 16 tower
    blocks. Because of misplaced charges, one tower does not topple, but is reduced
    from 14 stories to 12, and will have to be demolished manually. (Xinhua (Pictures))
    (The Star (Malaysia)) (Boston Globe).
  - Ariel Sharon, the Prime Minister of Israel, was heckled and booed at a meeting
    to promote the planned Israeli withdrawal from the Gaza Strip by several U.S.
    Jews. (BBC)
  - Laura Bush, the First Lady of the United States, was heckled by both Israeli and
    Palestinian protesters as she visited the Wailing Wall and the outside of the
    Dome of the Rock. (Haaretz) (BBC)
  - The British government declines a request from the families of soldiers killed
    in Iraq for an investigation into the legality of the war. (BBC) (Chicago Tribune)
  - Israel arrests a 15-year-old Palestinian at a Hawara checkpoint, near Nablus,
    wearing a suicide bomb belt. (Haaretz)
  - German Chancellor Gerhard Schröder has declared that he will seek the next German
    federal election to be held this autumn, a year earlier than set out by the constitution,
    after the CDU and FDP defeated the Social Democrats (SPD), who were in coalition
    with the Greens, at the regional election in North Rhine-Westphalia. (BBC).
  - 'Elections in Mongolia: Former Prime Minister of Mongolia Nambaryn Enkhbayar wins
    presidential election. (Reuters) (CNN) (Forbes) (Xinhua)'
  - In Nepal, thousands of opposition supporters demonstrate against the rule of King
    Gyanendra and demand restoration of parliament. Royalist government is dismayed
    by EU and Indian demands to return to democracy (Reuters AlertNet) (Reuters Alertnet)
    (ABC) (BBC)
  - Egyptian police arrests Mahmud Ezzat, leader of banned Muslim Brotherhood. Various
    reports tell of different amounts (from 11 to 24) of other arrested members (Al-Jazeera)
    (ABC) (BBC)
  - Venezuelan president Hugo Chávez says he may consider breaking diplomatic ties
    with the United States if it will not extradite Luis Posada Carriles. (Reuters)
    (BBC) (World Peace Herald)
