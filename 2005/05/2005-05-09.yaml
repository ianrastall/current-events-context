Date: '2005-05-09'
Source_URI: Portal:Current events/2005 May 9
Intelligence_Payload:
  Uncategorized:
  - Iran admits to having converted thirty-seven tons of raw uranium into a gas, a
    key step in uranium enrichment. (The Guardian)
  - 88 members of U.S. Congress led by John Conyers write an open letter to the White
    House asking for answers concerning the new documents leaked which apparently
    reveal the secret U.S/U.K. agreement to attack Iraq in 2002. (The Times) (The
    Raw Story) (Scoop) (uruknet)
  - The Sellafield nuclear plant's Thorp reprocessing facility in Cumbria, England,
    is closed down due to a 20 tonne leak through a fractured pipe of water contaminated
    with radioactive uranium and plutonium. (The Guardian)
  - More than 50 heads of state, including Vladimir Putin, George W. Bush and German
    chancellor Gerhard Schröder, are among the guests attending the official celebrations
    commemorating the end of World War II in Moscow, Russia. It is the first time
    a German chancellor has attended a world-wide commemoration for the victims of
    the Third Reich. (Wikinews) (The Hindu) (CNN) (Scotsman)
  - Re-examination of old images taken by the Mars Global Surveyor several years ago
    may have led to the identification of the crash site of the Mars Polar Lander,
    which failed in December 1999. Using insights and techniques developed for analyzing
    images of the Mars Exploration Rovers, Malin Space Science Systems may have spotted
    the rocket blast zone, Mars Polar Lander and the parachute. (Spaceflight Now)
    (Space.com)
  - Peter Friederich, former Swiss ambassador to Luxembourg, goes on trial for money
    laundering. (Swissinfo)
  - Former Indonesian president Suharto is hospitalized; there are conflicting reports
    about his condition. (Jakarta Post) (Laksamana) (BBC) (Forbes)
  - The death toll continues to rise due to flooding in Somalia and the Somalia Region
    of Ethiopia. In April 2005, heavy rains generated widespread flooding and caused
    the Shebelle River to burst its banks. As of May 5, the flooding in Somali Region
    alone has caused over 100 confirmed deaths and widespread property damage affecting
    over 100,000 persons. The floods have also destroyed shelters housing 25,000 Somali
    refugees in Kenya. (UN IRIN) (UN News)
  - Twelve South American and 22 Arab countries begin a summit in Brazil. (Agencia
    Estado Brazil) (Arabic News) (Bloomberg) (Reuters)
  - In Ecuador, former president Gustavo Noboa is placed under house arrest. (CBS)
    (BBC)
  - In Italy, two Vatican Radio officials, Cardinal Roberto Tucci and Father Pasquale
    Borgome, have been convicted of polluting the atmosphere with unnecessarily powerful
    electromagnetic waves that might have causes increased risk of cancer. They receive
    10-day suspended sentences. (Reuters AlertNet) (BBC)
  - Hans Blix, former United Nations chief arms inspector, suggests that Iran and
    Israel could support a ban of uranium enrichment in the Middle East. (Al-Jazeera)
    (Reuters AlertNet)
  - The Nigerian government charges 80 Biafran separatists with treason. (AllAfricA)
    (BBC) (Reuters AlertNet)
  - Italian police in Rome reopen the investigation into the murder of Pier Paolo
    Pasolini. (BBC)
  - Andrés Manuel López Obrador, mayor of Mexico City, announces that he will quit
    his post on July 31 to concentrate on his campaign to be president of Mexico.
    (El Universal) (Reuters)
  - In the Democratic Republic of Congo, president Joseph Kabila visits Lumumbashi
    in Katanga province. At least 30 people have been arrested for an attempted separatist
    coup in the province. (AllAfrica) (ReliefWeb) (Reuters AlertNet) (BBC)
