Date: '2005-05-31'
Source_URI: Portal:Current events/2005 May 31
Intelligence_Payload:
  Uncategorized:
  - In Bolivia, police and protesters clash in the capital La Paz outside congress,
    disrupting its meetings. Protesters have closed the roads to the city. They demand
    nationalization of energy industry. (Reuters AlertNet) Private Entrepreneurs Confederation
    of Bolivia demands resignation of president Carlos Mesa (MercoPress)
  - Serbia withdraws arrest warrant of Mirjana Marković, wife of Slobodan Milošević
    (Kosovareport) (BBC)
  - United Nations Security Council votes to extend its peacekeeping mission in Haiti
    until June 24 (UN News Centre) (Reuters AlertNet)
  - In Botswana, Australian lecturer Kenneth Good loses his appeal against deportation.
    He had criticized the government of president Festus Mogae (Republic of Botswana)
    (Reuters SA) (SABC) (BBC)
  - India opens new naval base in Karwar in the state of Karnataka (NDTV) (Hindu)
    (BBC)
  - Russian billionaire and businessman Mikhail Khodorkovsky is sentenced to 9 years
    in prison in his tax evasion trial. (Moscow Times) (Mosnews) (Bloomberg)(Spiegel
    online, German) (BBC)
  - In Bangkok, Thailand, the Canadian contestant Natalie Glebova is crowned Miss
    Universe 2005.
  - Vanity Fair magazine reports that Ex-FBI official W. Mark Felt admits that he
    was the Watergate source known as Deep Throat. (CNN)
  - Hamas have declared that they will be boycotting the re-vote which was requested
    in three Districts of the Gaza Strip. (BBC)
  - Police in Israel say they have uncovered an Industrial espionage plot involving
    15 Israeli firms. Trojan horse computer viruses are believed to have been used
    to hack into rivals' systems and 20 people have so far been arrested. (BBC)
  - China and Japan have opened two days of closed-door negotiations in Beijing aimed
    at resolving a long-running dispute over natural gas drilling rights in a disputed
    area of the East China Sea (VOA News)
  - In France, the Prime Minister Jean-Pierre Raffarin resigns following the country's
    rejection of the Treaty establishing a Constitution for Europe. In an expected
    move, President Jacques Chirac appoints Interior Minister Dominique de Villepin
    to succeed him. (Reuters)
  - China claims that arrested Singaporean journalist Ching Cheong was spying. (BBC)
    (Reporters Without Borders) (Reuters) (Forbes)
  - China opens Three Gorges Dam to tourists. (Reuters AlertNet)
  - In Senegal, opposition leader Abdourahim Agne is charged with incitement to rebellion
    after he urged demonstrations against the president Abdoulaye Wade. (Reuters SA)
    (BBC)
  - Indonesia intends to vaccinate 6.4 million children against polio in the next
    couple of days. There are already 16 cases in the country. (Jakarta Post) (Channel
    News Asia) (Reuters AlertNet)
  - Bob Geldof announces plans for a concert similar to Live Aid, which took place
    in 1985, to coincide with the G8 Summit in Edinburgh this July. The concert, named
    ‘Live 8’, will take place in Hyde Park, London on 2 July, with other concerts
    in Paris, Rome, Berlin and Philadelphia, and is intended to raise awareness of
    the Make Poverty History campaign. It is expected to include acts such as Sir
    Paul McCartney, Robbie Williams, Madonna, the Rolling Stones, Coldplay and U2,
    as well as a rumoured reunion of the Spice Girls. (BBC), (Guardian Unlimited)
  - The U.S. Supreme Court has overturned the conviction of defunct accounting giant
    Arthur Andersen on charges arising from the Enron scandal, on the ground that
    the jury instructions were faulty, (thestreet.com)
