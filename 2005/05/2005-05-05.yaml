Date: '2005-05-05'
Source_URI: Portal:Current events/2005 May 5
Intelligence_Payload:
  Uncategorized:
  - Orthodox Patriarch of Jerusalem Irineos is dismissed following a controversy over
    the leasing of church-owned lands to groups eager to increase the Jewish presence
    in the Old City of Jerusalem. (BBC)
  - 'Israeli-Palestinian Conflict: An Israeli commander is suspended, pending a full
    inquiry, from his position following the deaths of two teenage cousins in Beit
    Liqya, near Ramallah, on May 4. (BBC)'
  - British polls open in the 2005 general election. Voters will elect 645 of the
    646 members of the House of Commons. Most expect Tony Blair and his Labour Party
    to win, but both Michael Howard and the Conservative Party along with Charles
    Kennedy and the Liberal Democrats are expected to make major gains in Parliament.
    (Wikinews) (BBC) (CNN)
  - An explosion outside the United Kingdom consulate in New York City occurs at 07:35
    GMT. There were no reported injuries. Police say they have found fragments of
    an explosive device. (Wikinews) (BBC) (Reuters)
  - The Indian Space Research Organization launches a mapping satellite, CARTOSAT-1
    and an Amateur Radio satellite HAMSAT, into Earth orbit (Tribune) (Space.Com)
    (Hindustan Times) (Reuters)
  - A Hong Kong court overturns convictions of 8 members of Falun Gong. (Standard)
    (IHT) (Law & Order, HK) (BBC)
  - The government of Kazakhstan closes the pro-opposition paper Respublica. (Reuters)
    (PolitInfo)
  - The Ugandan parliament votes in favour of holding a referendum on the return of
    multi-party democracy. Political opposition intends to boycott the referendum
    because they think that president Yoweri Museveni would use it stay in power.
    (Reuters AlertNet) (AllAfrica) (BBC)
  - In Niger, anti-slavery activist Ilguilas Weila is charged with attempted fraud.
    (Reuters AlertNet) (BBC)
  - The Kansas evolution hearings, a six-day courtroom-style debate over how the origin
    of life should be taught in the state's public schools, open in Topeka. (CNN)
