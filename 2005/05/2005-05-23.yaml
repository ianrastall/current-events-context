Date: '2005-05-23'
Source_URI: Portal:Current events/2005 May 23
Intelligence_Payload:
  Uncategorized:
  - Channel 10, an Israeli television station, broadcasts footage of what it claims
    is Israeli Defence Forces using a Palestinian youth as a human shield against
    rock-throwers in the West Bank. The IDF denies the allegation. (Haaretz)
  - A bipartisan group of fourteen U.S. Senators has successfully negotiated a compromise
    whereby a "nuclear option" showdown over judicial filibusters would be averted.
    (ABC News)
  - Five Irish teenage school girls, 4 from the Loretto Convent and 1 from Beaufort
    College in Navan, are killed and six others are critically injured in a bus crash
    in County Meath. The bus was carrying students from the Loretto Convent, the Mercy
    Convent, St. Patrick's Classical School and Beaufort College, all in Navan and
    did not have fitted seatbelts. (RTÉ)
  - The Palestinian Election Commission delays the Palestinian Legislative Council
    elections, citing that there was not enough time to prepare. Critics of the ruling
    Fatah party had predicted the delay, and believed it was a way to prevent Hamas,
    the main opposition party, from gaining power. (Al Jazeera) (BBC)
  - Health officials in Norway fear a Legionnaires' Disease epidemic after the death
    of four people during the last five days and the hospitalisation of many others
    in southeastern county of Østfold, particularly in the Fredrikstad-Sarpsborg urban
    area. At least 24 people are known to be infected, with many of them in critical
    condition. Legionnaires' Disease killed seven people in the southwestern city
    of Stavanger in 2001, in an outbreak that was later traced to a hotel air conditioning
    system. (Aftenposten)
  - 11,000 journalists and other employees of the BBC go on a 24-hour strike to protest
    over approximately 4,000 planned job cuts. TV and Radio news output has been the
    worst affected, with few new stories materialising and only a skeleton service
    being offered. (BBC) (Reuters UK) (Bloomberg) (BBC strike Q&A)
  - Supreme Leader of Iran, Ayatollah Ali Khamenei, urges the Council of Guardians
    to review applications of two reformist candidates, Mostafa Moin of the Islamic
    Iran Participation Front and Vice President Mohsen Mehralizadeh, after the council
    qualified only six candidates to the country's presidential election. Opposition
    groups threaten to boycott the elections and students of Tehran University protest
    against the disqualification of Moin. (Tehran Times) (IRNA) (Reuters AlertNet)
    (Reuters)
  - The death toll of the bird flu in Vietnam rises to 18. China informs the United
    Nations Food and Agriculture Organization that it has sealed off the Qinghai province
    to stop the spread of bird flu and vaccinated farmbirds. (People's Daily). (Reuters
    AlertNet)
  - The Walt Disney Internet Group launches the Virtual Magic Kingdom (VMK) in beta
    testing, scheduled to open to the public in July
