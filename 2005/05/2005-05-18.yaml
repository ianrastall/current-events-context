Date: '2005-05-18'
Source_URI: Portal:Current events/2005 May 18
Intelligence_Payload:
  Uncategorized:
  - According to a spokesman for the Georgian Interior Ministry, a hand grenade found
    among spectators during a speech by U.S. President George W. Bush last week in
    Tbilisi failed to function, although it was live and could have exploded. It was
    originally thought to have been a dummy grenade. (CNN)
  - Polish President Aleksander Kwaśniewski set the date for parliamentary elections
    for September 25, 2005 and a presidential election for October 9, 2005. (Bloomberg)
  - 'Unrest in Uzbekistan: 36 foreign diplomats visit Andijan in a government-sponsored
    trip and under heavy guard. The Uzbek government continues to deny that civilians
    were killed. The official death toll has risen to 169 but some human rights groups
    state that it can be as high as 750. A group of Islamic rebels led by a man called
    Baxtiyor Rahimov claim that they now control the border town of Qorasuv. (Mosnews)
    (BBC) (IHT) (Forbes)'
  - The World Health Organization announces an ebola outbreak in the Democratic Republic
    of Congo with 11 cases so far. (WHO press release) (News24) (Reuters AlertNet)
  - In Angola, the Marburg virus has claimed 311 lives. (ReliefWeb) (News24) (Reuters
    AlertNet)
  - Russia demands return of the energy minister Yevgeny Adamov, who is in a Swiss
    prison on a U.S. warrant waiting extradition. (RIA Novosti) (Swissinfo) (LA Times).
  - Green Day had their live album Bullet in a Bible at the National Bowl (Milton
    Keyes National Bowl) on this date.
