Date: '2005-05-07'
Source_URI: Portal:Current events/2005 May 7
Intelligence_Payload:
  Uncategorized:
  - Northern Ireland's Ulster Unionist Party leader David Trimble, the 1998 Nobel
    Peace Prize winner who helped reach the Good Friday Agreement, resigns from the
    leadership post he has held for ten years, after losing his seat in the British
    general election the previous day. (BBC)
  - George Peter Nanos announces that he will step down as the director of the Los
    Alamos National Laboratory, making his term the shortest of any previous director.
    (LA Times)
  - 15 people die in a plane crash near the Lockhart River in the Australian state
    of Queensland, the worst civilian air disaster in Australia in 36 years. (ABC
    Online)
  - The Time Traveler Convention was held at MIT, in the hopes of making contact with
    time travelers from the future. The convention was organized by Amal Dorai with
    help from current and former residents of the MIT living group Pi Tau Zeta. The
    convention was held at 22:45 EDT at the East Campus Courtyard and in Walker Memorial
    at MIT. That location is 42.360007 degrees north latitude, 71.087870 degrees west
    longitude. The spacetime coordinates continue to be publicized prominently and
    indefinitely, so that future time travelers will be aware and have the opportunity
    to have attended.
