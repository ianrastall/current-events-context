Date: '2005-05-19'
Source_URI: Portal:Current events/2005 May 19
Intelligence_Payload:
  Uncategorized:
  - Scientists discover that the 2004 Indian Ocean earthquake was the longest ever
    recorded — lasting nearly ten minutes when most powerful earthquakes last no more
    than a few seconds — and shook the entire planet. (CNN)
  - The Canadian House of Commons votes on two crucial budget bills. Bill C-43 carries
    with a vote of 250 yea, 54 nay. Bill C-48 is tied with a vote of 152 yea, 152
    nay, with the Speaker voting in favour, breaking the tie and carrying the bill.
    The Canadian government survives the Motion of no confidence. (CBC)
  - '2005 Pacific hurricane season: Tropical Storm Adrian reaches hurricane strength,
    and is about 12 hours away from making landfall over or near El Salvador. (NHC)'
  - 'Unrest in Uzbekistan: Various governments, including that of the United States,
    demand further investigation into the events. Uzbek government troops report that
    they have retaken the town of Qorasuv. President Islom Karimov rejects calls for
    international inquiry. Oppositions group fear that state will begin active oppression
    against them (Reuters Alertnet) (Mosnews) (ReliefWeb) (Reuters)(BBC) (Moscow Times)
    (CNN) (BBC)'
  - In Brazil, an environmental ministry study states that destruction of the Amazon
    rainforest is accelerating. (Planet Ark) (Reuters AlertNet) (BBC)
  - The UN Office for the Coordination of Humanitarian Affairs appeals for $16 million
    for food aid to Niger where drought and locust swarms destroyed part of the crop
    last year. (UN) (AllAfrica) (ReliefWeb) (Reuters AlertNet)
  - A United Nations legal team meet Indonesian officials to begin an inquiry for
    human rights abuses and killings related to East Timor's independence in 1999.
    (Laksamana) (Jakarta Post) (ReliefWeb) (Reuters)
  - Rwandan defense minister general Marcel Gatsinzi apologizes for being part of
    the Hutu government during the 1994 Rwandan genocide, the first time anyone from
    that government has done so. (ReliefWeb) (Reuters AlertNet) (BBC)
  - In Niger, 2,000 people march in the capital Niamey and demand the release of anti-slavery
    campaigners Ilguilas Weila and Alassane Biga. (BBC)
  - British scientists at University of Newcastle announce that they have cloned human
    embryos for stem cells. Also, a team of South Korean scientists at Seoul National
    University state they have cloned the first embryonic cells customized to individual
    patients. (BBC) (Reuters AlertNet) (Science Daily) (CNN)
  - 'Star Wars Episode III: Revenge of the Sith, at the time purported to be the final
    Star Wars film, is released in the United States. Just hours after its release,
    the workprint DVD of the film was "leaked" to file sharing networks. (BBC)'
  - Reggie Miller plays his last game as an Indiana Pacer, losing to the Detroit Pistons
    in Game 6 of the second round of the NBA Playoffs. He tallied 27 points in his
    final game.
