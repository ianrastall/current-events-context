Date: '2005-05-28'
Source_URI: Portal:Current events/2005 May 28
Intelligence_Payload:
  Uncategorized:
  - The clock tower of the Palace of Westminster in London, commonly known as Big
    Ben, renowned for its accuracy and chimes, stopped ticking for 90 minutes, an
    engineer said Saturday. (BBC)
  - Japan announces closure of World War II sex slave fund by March 2007. The Asian
    Women's Fund, set up in 1995, paid 2M yen ($19,470) each in compensation, plus
    medical and welfare support, to 285 so-called "comfort women" in the Philippines,
    South Korea and Taiwan. (BBC)
  - California State Senator Joseph Dunn, local school officials, and environmental
    professionals meet with parents of Kennedy Elementary School students in a town-hall
    style meeting in Santa Ana Thursday evening. The parents air their concerns over
    health issues at schools and workplaces, including a rash of leukemia cases in
    the student population, and begin a dialogue they have been working toward for
    years. (Wikinews)
  - In Ethiopia, provisional results indicate that the ruling Ethiopian People's Revolutionary
    Democratic Front of prime minister Meles Zenawi has won parliamentary majority.
    Opposition claims vote rigging. Final results are due June 8 (Reuters) (News24)
    (BBC)
