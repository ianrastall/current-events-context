Date: '2005-07-01'
Source_URI: Portal:Current events/2005 July 1
Intelligence_Payload:
  Uncategorized:
  - Iraq's ambassador to the UN, Samir Sumaidaie, accuses U.S. Marines of the "cold-blooded
    murder" of his 21-year-old cousin during a June 25 raid of his home in Al Anbar
    province. (Reuters)
  - Following a public statement from the denomination president on the eve of the
    event, the Congregationalist United Church of Christ begins their 5-day General
    Synod 25 in Atlanta, Georgia to debate a number of controversial resolutions,
    including same-sex marriage. Some are concerned about denominational schism. DailyBulletin.com
    Chicago Tribune Christian Science MonitorWashington Times UCC web page UCC news
    blog
  - Indonesian police arrest 24 people suspected of involvement in the 2002 Bali bombings
    and a 2003 attack on the Marriott Hotel in Jakarta. (BBC)
  - U.S. Supreme Court Justice Sandra Day O'Connor announces her retirement after
    24 years of service on the Court. (n:United States Supreme Court Justice O'Connor
    to retire) (NYTimes.com)
  - The UK assumes the rotating presidency of the European Union amidst its funding
    crisis. (BBC News)
  - The members of the Australian Senate elected at the election of 2004 take office,
    granting the government of John Howard control of both Houses of Parliament, the
    first time a government has had such power since 1981. (ABC News Online)
  - Much of the government of Minnesota shuts down as the state legislature fails
    to pass a budget by the end of the fiscal year. (Wikinews) (Bloomberg)
  - In the UK, cot death expert Sir Roy Meadow testifies before the General Medical
    Council hearing. He was involved with four court cases where four women were falsely
    accused of killing their children. Medical journal The Lancet defends him saying
    that he is just a "scapegoat" (BBC) (Scotsman)
  - In the Democratic Republic of Congo, at least 10 people have died during protests
    over delay to the presidential elections. Opposition claims the numbers are closer
    to 42. (Wikinews) (BBC)
  - In Germany, the Bundestag passes a Motion of no confidence in the government of
    Chancellor Gerhard Schröder by 296 to 151. The vote, at Schröder's insistence,
    opens the way for new elections to be held on September 18. (Wikinews) (Deutsche
    Welle) (IHT) (BBC)
  - Italian police in Genoa discover a parallel police force, called the Department
    of Anti-terrorism Strategic Studies, that was apparently founded to benefit from
    funding after 2004 Madrid bombings. The group's website is now down. (Google cache)
    (AKI) (AGI) (BBC)
  - A Toronto mosque makes history by hosting the first known Muslim prayer service
    in history to be led by a woman. (CBC)
  - General Motors Corp. announces that it had its best month in 19 years in June
    2005, increasing total deliveries by 41% against June 2004, (GM website)
  - Romania's legal tender, leu was re-valued, 10,000 old lei becoming 1 new leu.
    Thus the ISO 4217 code was changed from ROL (Romanian leu) to RON (Romanian New
    leu).
  - Lynching at Włodowo
