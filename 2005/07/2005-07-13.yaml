Date: '2005-07-13'
Source_URI: Portal:Current events/2005 July 13
Intelligence_Payload:
  Uncategorized:
  - The National Hockey League labor dispute, the longest work stoppage in North American
    professional sports, ends after 301 days. (CBC)
  - Former Worldcom CEO Bernard Ebbers is sentenced to 25 years imprisonment for conspiracy,
    securities fraud and seven counts of making false SEC filings. (Bloomberg)
  - U.S. Supreme Court Chief Justice William Rehnquist is hospitalized with a fever.
    There have been no indications when Rehnquist, who is fighting thyroid cancer,
    will be released. (CNN) (Reuters)
  - NASA's planned launch of STS-114, Space Shuttle Discovery from pad 39B at the
    Kennedy Space Center at 3:51pm EDT (1951 UTC) is delayed due to a problem with
    the fuel level sensors. This would have been the first manned space launch by
    NASA since the loss of Columbia over 2 years ago. (CNN) (NASA)
  - The Australian Government announces it will send back 150 élite Special Air Service
    troops to Afghanistan, to take part in covert operations and to help thwart a
    resurgent Taliban. A further 200 troops may also be dispatched to aid reconstruction
    efforts. (ABC News)
  - The American Family Association, a Christian conservative activist group, announces
    an international boycott of Nike. In adding Nike to its ongoing boycotts of Kmart
    and the book One of the Guys by Robert Clark Young, the AFA argues that Nike promotes
    "a back door move to legalise homosexual marriage." (GayNZ.com)
  - In Malaysia, ex-minister Osu Sukam, member of a ruling United Malays National
    Organisation party, resigns due to gambling debts totalling at least US$1.8 million.
    (Borneo Bulletin) (Channel News Asia)
  - In China, the death toll in the Xinjiang mine explosion rises to 81, with two
    missing. (Xinhua)
  - Geologists increase the alert status of Mount Merapi volcano in central Java in
    Indonesia. The volcano has shown increased activity since last Friday. (Jakarta
    Post) (Channel News Asia)
  - In the Philippines, thousands of protestors gather in Manila to demand the resignation
    of president Gloria Arroyo, who has reshuffled her cabinet. The military is on
    alert in case of violence. (Sun Star) (Reuters)
  - In Pakistan, a collision of three express trains near Ghotki leaves at least 120
    dead after 13 carriages derail, according to Pakistan Railways and local police.
    (Reuters) (Al-Jazeera)(BBC)
  - In Peru, thousands of demonstrators protest in Lima against a US trade pact that
    could lead to increase in the cost of medicines. (Reuters AlertNet)
  - In Chile, the Senate reforms the country's constitution, decreasing power of the
    military in the upper house and reducing the presidential term for four years.
    The previous constitution is from the era of Augusto Pinochet. (Reuters)
  - Spanish government approves pensions for people who fled Spain for the Soviet
    Union and South America as children during the Spanish Civil War and never returned.
    (Reuters)
  - In Taiwan, a SWAT team apprehends wanted gang leader Chang Hsi-ming after a 30-minute
    gun battle in Shalu Township. (Taipei Times) (Channel News Asia)
  - In Brazil, police raid the luxury good store Daslu and arrest the managers, including
    the owner Eliana Tranchesi, accused of tax evasion. (Bloomberg) (BBC)
  - In Italy, police arrest 174 people in a crackdown on suspected Islamist militants.
    (AGI) (Reuters)
  - In Japan, a group of 21 French speakers sue Shintaro Ishihara, governor of Tokyo,
    for calling French "a language which cannot count numbers". (Asahi Shimbun) (Reuters)
  - The US State Department says it may withhold aid to Uzbekistan unless the Uzbek
    government agrees to an international inquiry about the unrest in Andijan. The
    official death toll has risen to 187. (BBC) (Baku Today) (Reuters AlertNet) (Eurasianet)
  - 'Bones of a mammoth are found in Silicon Valley: Paleontologist Mark Goodwin said
    that bones discovered Saturday by Roger Castillo, an environmental activist, may
    be the femur, tusks and pelvic bones of a Columbian mammoth, a species of ancient
    elephant that roamed the area tens of thousands of years ago. (San Francisco Chronicle)'
