Date: '2005-07-15'
Source_URI: Portal:Current events/2005 July 15
Intelligence_Payload:
  Uncategorized:
  - Seven Palestinians are killed by Israeli Air Force missile attacks on the Gaza
    Strip and West Bank, including at least four Hamas militants. Five other Palestinian
    civilian bystanders are injured in the attacks. According to CNN all the 7 were
    militants, whereas the BBC says four were. The attack was carried out amid a barrage
    of Qassam rockets. (BBC) (CNN)(Reuters)
  - The chemist Magdi al-Nashar, sought by British police in relation to the 7 July
    London bombings, has been arrested in Egypt. (BBC)
  - In the Philippines, opposition demonstrators demanding resignation of president
    Gloria Arroyo seize the building of the Department of Agriculture and smash windows
    before dispersing before police. Her political opponents in the senate want to
    begin impeachment procedures (ABS-CBN) (Channel News Asia) (Reuters AlertNet)
    Governor Luis Singson, claims that he has a tape of a conversation where the jailed
    president Joseph Estrada is planning to return to power by disposing of whoever
    would lead the transitional government after Arroyo resigns. (ABS-CBN) (INQ7)
  - 5.0 Richter scale earthquake hits central Philippines. There are no reports of
    any casualties (Channel News Asia)
  - Paediatrician Sir Roy Meadow is struck off the medical register by the General
    Medical Council after finding that he had committed "serious professional misconduct"
    relating to his testimony as an expert witness in the trial of Sally Clark. (BBC)
  - The United States opens its borders to Canadian live cattle after legal action
    in its courts. (CBC)
