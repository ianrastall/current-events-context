Date: '2005-07-10'
Source_URI: Portal:Current events/2005 July 10
Intelligence_Payload:
  Uncategorized:
  - Ten Afghan soldiers are decapitated by Taliban insurgents in Afghanistan. (Guardian)
  - Hurricane Dennis makes landfall in the United States, slamming into the Florida
    Panhandle with 120 mph winds. (CNN)
  - Italy announces that it will begin its withdrawal of troops from Iraq in September
    by pulling 300 of its 3,000 soldiers out of the country. (Guardian)
  - Luxembourg says "yes" to the EU Constitution in a referendum. (wikinews)
  - Former rebel leader John Garang is sworn in as vice president of Sudan as part
    of the agreement ending the Second Sudanese Civil War. (Sudan Tribune), (Boston
    Globe)
  - In Azerbaijan, about 30,000 (other sources varying from 10,000 up to 50,000) opposition
    members demonstrated in the country's capital, calling for fair parliamentary
    elections. (Photos)
  - Karl Rove's lawyer, Robert Luskin, acknowledges that Rove was connected to the
    leak that led to the revelation of Valerie Plame's position as a CIA agent. Luskin
    confirmed that Rove had been interviewed by Cooper for the article. It is unclear,
    however, what passed between Cooper and Rove. "Rove did not mention her name to
    Cooper," Luskin said. "This was not an effort to encourage Time [magazine] to
    disclose her identity. What he was doing was discouraging Time from perpetuating
    some statements that had been made publicly and weren't true." Luskin had previously
    said that Rove "absolutely did not identify Valerie Plame." (Newsweek), (Washington
    Post)
  - In Turkey, bomb in Cesme injures 22. Group called the Kurdish Liberation Hawks
    takes responsibility (Zaman Online) (Al-Jazeera) (Reuters)
  - The Maccabiah Games have started.
