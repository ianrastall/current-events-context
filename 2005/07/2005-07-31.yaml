Date: '2005-07-31'
Source_URI: Portal:Current events/2005 July 31
Intelligence_Payload:
  Uncategorized:
  - More torrential monsoon rains have returned to Mumbai in India, as it tries to
    recover from the recent floods. The death toll in the floods rises to about 1,000.
    (BBC)
  - 7 more suspects are arrested in Brighton following the 21 July 2005 London bombings.
    (BBC)
  - Wim Duisenberg, the former head of the Rabobank, the Central Bank of the Netherlands
    and the European Central Bank, is found dead in the pool of his villa in the south
    of France. His death seems to have been caused by a cardiac arrest. (BBC)
  - Chile's Christian Democratic Party declares Michelle Bachelet as the presidential
    candidate of the ruling coalition (Mercopress) (BBC)
  - Russia's defence minister Sergei Ivanov bars the country's defense ministry from
    contacting ABC News after the channel broadcast an interview with Chechen rebel
    Shamil Basayev (RIA Novosti) (Mosnews) (Al-Jazeera) (BBC)
  - In Côte d'Ivoire, former rebels known as the New Forces refuse to disarm before
    legislative reforms (BBC) (Reuters AlertNet)
  - Indonesian pilot Pollycarpus Budihari Priyanto is charged with involvement with
    the murder of Munir Said Thalib (Jakarta Post) (BBC)
  - In India, separatist group National Socialist Council of Nagaland extends its
    ceasefire with the government by six months (Newindpress) (India Daily) (Reuters
    India)
  - In Iran former president Akbar Hashemi Rafsanjani appeals for the release of an
    imprisoned dissident writer Akbar Ganji. Ganji has been in a hunger strike for
    more than 50 days and is possibly near death (Reporters Without Borders) (IRNA)
  - Atkins Nutritionals, Inc., a company founded by the late diet guru Robert Atkins
    to promote low-carb products, enters chapter 11 due to a loss of public interest.
    (Fox News)
