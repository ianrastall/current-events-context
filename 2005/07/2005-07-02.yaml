Date: '2005-07-02'
Source_URI: Portal:Current events/2005 July 2
Intelligence_Payload:
  Uncategorized:
  - On The McLaughlin Group programme, MSNBC's political analyst Lawrence O'Donnell
    claims to have known that the identity of Matthew Cooper's source in the Valerie
    Plame exposure scandal was Karl Rove. (Huffington Post)
  - Indian Prime Minister Manmohan Singh unveils the Sethusamudram Shipping Canal
    Project amidst protests from fishermen and environmentalists. Nearly 600 are arrested.
    (Rediff), (Reuters)
  - 'The Live 8 concerts begin their globe-spanning tour in Tokyo. Several famous
    artists and musical groups are joining in this effort to raise awareness about
    poverty and AIDS in the leadup to the G8 summit and on the anniversary of the
    1985 Live Aid concerts. (Wikinews), (Wired), (Globe and Mail), (LA Times). Related
    information: (Live 8 home page), ONE Campaign, (AOL Music (live webcast))'
  - In Australia, the place of the last stand of bushranger Ned Kelly in Glenrowan,
    Victoria, is made a national heritage site. (ABC) (Australian)
  - Dave Zabriskie becomes the third American to ever wear the yellow leader's jersey
    in the Tour de France, beating fellow American Lance Armstrong by two seconds
    in the prologue stage. le Tour de France official website
  - Former World No.1 Venus Williams comes back from match point down to defeat Lindsay
    Davenport in the longest ever Wimbledon Ladies' final of all time (4-6 7-6 9-7)
    for her third Wimbledon title and her first Grand Slam title since September 2001.
