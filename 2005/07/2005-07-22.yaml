Date: '2005-07-22'
Source_URI: Portal:Current events/2005 July 22
Intelligence_Payload:
  Uncategorized:
  - A bomb explodes from beneath a car in the Lebanese capital of Beirut causing injuries,
    but no deaths. (BBC)
  - About 88 people are killed and 200 injured in a series of car bombs in the Egyptian
    resort of Sharm el-Sheikh at about 0100 local time (2200 UTC Friday). (BBC)
  - Malaysian Prime Minister Datuk Seri Abdullah Ahmad Badawi says that he feels it
    is his duty to prevent Islam and its symbols from being used to propagate violence.
    He has set three missions for himself – continuing to remind the world community
    to understand the root causes of terrorism, explaining that Islam is a religion
    of peace and opposed to violence, and showcasing Malaysia as a modern Islamic
    country and a safe place to invest and visit. (The Star) (Iranian Quran News Agency)
    (Islam Online)
  - 'Berlin, Germany: a small plane crashes near the Reichstag and the Federal Chancellor''s
    Office, killing the pilot. Suicide suspected, rather than terrorism. (Deutsche
    Welle) (Reuters AlertNet) (BBC)'
  - In Dubai, police are on alert due to the wedding of Junaid Miandad and Mahrukh
    Ibrahim. Junaid is the son of former Pakistani cricket captain Javed Miandad.
    Mahrukh is the daughter of India's most wanted crime boss, Dawood Ibrahim. (Sify)
  - Microsoft announces that the former codenamed "Windows Longhorn" will now officially
    be known as "Windows Vista". The first beta test will be launched on August 3.
  - In Mumbai, India, LeT militant and alleged Al-Qaida operative, Mohammed Afroze,
    is convicted of criminal conspiracy, conspiracy to disturb relations between friendly
    nations, and forging documents. However, he is acquitted on charges of waging
    war against the nation. (NDTV)
  - At least 36 people are dead after two days of violent fuel riots in Yemen. (BBC)
  - At least 15 people are killed when a dam collapses in south-west China. (BBC)
  - Jean Charles de Menezes, suspected of being an attempted suicide bomber, having
    been chased by plainclothes police has been reportedly pinned to the ground then
    shot five times at Stockwell tube station in London, and has been confirmed dead
    by the police. (Wikinews), (the Guardian), (BBC) (CNN) (Sky). The man was actually
    an innocent Brazilian killed without cause.
  - A mosque in east London and the surrounding area is evacuated for an hour following
    receipt of a bomb warning. The all-clear is given after the mosque is searched
    by police. (Wikinews), (Sky News)
  - Two ships collide off Japan's Chiba prefecture and the Chinese-crewed freighter
    Wei Hang 9 sinks. One crewmember is dead, with 8 missing. (Japan Today) (Xinhua)
    (Reuters)
  - The Pentagon confirms that 52 detainees of the Guantanamo camp have gone on hunger
    strike. (New York Times) (BBC) (Al-Jazeera)
  - Leaked excerpts from the United Nations' report into Zimbabwe's Operation Murambatsvina
    state that the operation has been a "disastrous venture" that has violated international
    law and created a grave humanitarian crisis. It further suggests that the act
    might qualify as a crime against humanity and urged Zimbabwe to prosecute those
    responsible. (Guardian).
  - The insolvent car-building company MG Rover Group is bought by the Nanjing Automobile
    Group for around 53 million pounds. (BBC) (Times Online)
