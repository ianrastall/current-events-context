Date: '2005-07-23'
Source_URI: Portal:Current events/2005 July 23
Intelligence_Payload:
  Uncategorized:
  - Human rights campaigners in Gujarat, India, have condemned a new school textbook
    introduced last year by the Bharatiya Janata Party which is seen to praise Adolf
    Hitler and barely mention the holocaust. (BBC)
  - The strongest earthquake to hit Tokyo in more than a decade strikes eastern Japan
    at 4:35 p.m. local time, injuring at least 27 people, rattling buildings and disrupting
    train and plane services. (CBC)
  - British police admit that the man killed yesterday by undercover officers had
    no connection to the suicide bombings or attempted bombings of previous days and
    weeks. Metropolitan Police has described the killing as a "tragedy". The victim,
    Jean Charles de Menezes, 27, was Brazilian. (BBC)
  - Rep. Barbara Lee (D-CA) introduces a Congressional Resolution of Inquiry which,
    if passed, will require the White House and the U.S. State Department to "transmit
    all information relating to communication with officials of the United Kingdom
    between January 1, 2002, and October 16, 2002, relating to the policy of the United
    States with respect to Iraq." (Wikinews)
  - A team of scientists from the UK and Australia state that they have found high
    concentrations of arsenic from the hair of King George III. Medication containing
    arsenic could have caused him bouts of madness (Scotsman) (News-medical.net) (Reuters)
  - In Spain, bomb explodes in Santiago de Compostela near regional savings bank Caixa
    Galicia. There are no casualties. Government blames Galician separatists. Police
    have arrested two people (EITB) (Reuters)
  - Cuba releases three dissidents, including leader Marta Beatriz Roque. 17 others
    are still incarcerated after crackdown in Friday (Cubanet) (Reuters)
  - In Colombia, president Álvaro Uribe signs a controversial law that is meant to
    encourage paramilitary groups and guerrillas to disarm (BBC)
  - In Burma/Myanmar, Khin Nyunt, former prime minister, receives a suspended sentence
    of 44 years in prison for corruption (Irrawaddy) (Democratic Voice of Burma)
  - 3 bombs hit the Naama Bay area of Sharm el-Sheikh, Egypt, killing 88 people. July
    23, 2005 Sharm el-Sheikh attacks.
