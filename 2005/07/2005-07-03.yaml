Date: '2005-07-03'
Source_URI: Portal:Current events/2005 July 3
Intelligence_Payload:
  Uncategorized:
  - Roger Federer defeats Andy Roddick in the Men's Wimbledon Final in straight sets
    to capture his third consecutive Wimbledon crown and fifth Grand Slam title overall.[Newslink
    missing]
  - Aviators Steve Fossett and Mark Rebholz, flying a replica World War I Vickers
    Vimy bomber, re-enact the first non-stop transatlantic flight of Alcock and Brown
    in 1919, landing at Clifden, Connemara, Ireland at 1704 local time (1604 UTC),
    about 18 hours after they took off from St. John's, Newfoundland. (Bloomberg)
  - Ihab al-Sherif, Egypt's most senior envoy to Iraq is kidnapped by gunmen while
    buying a newspaper. He was to be promoted to ambassador, representing the first
    Arab nation to recognize the new Iraqi government. (Guardian)
  - Albanians vote in parliamentary elections. Final results are expected in Tuesday
    (Reuters) (BBC)
  - In Mexico, Enrique Peña of the Institutional Revolutionary Party wins election
    for a governor in the state of México. (Reuters) (Bloomberg)
  - In Pristina, Kosovo, three bombs explode almost at the same time 9:30 PM. They
    explode near Kosovo's parliament building and EAR building; at the Commercial
    Bank near the OSCE building; and local United Nations peacekeeping headquarters.
    No injuries are reported. President Ibrahim Rugova and prime minister Bajram Kosumi
    state that the explosions were intended to "destabilize" the region prior to assessment
    of possibilities for future independence. (B92) (Reuters AlertNet)
  - In Mauritius, parliamentary elections begin. The main rivals are prime minister
    Paul Bérenger of the Mauritian Militant Movement and Navin Ramgoolam of the opposition
    Social Alliance. (IOL) (BBC)
  - In Malaysia, medical experts gather in a bird flu conference in Kuala Lumpur.
    (Channel News Asia) (BBC)
  - In Japan, underwater volcano causes a column of steam near the island of Iwo Jima.
    (Mainichi Daily News) (Japan Today) (Reuters AlertNet)
  - Computer microchip manufacturer AMD asks a Delaware court to order that third
    parties to its antitrust lawsuit against industry giant Intel, preserve certain
    documents in their possession that may be required as evidence. The court grants
    that request, ordering the third parties to suspend normal document destruction
    as to the documents described. (TechWorld)
  - The first VODcast (RSS on-demand TV channel) was published.[Newslink missing]
