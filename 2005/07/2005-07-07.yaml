Date: '2005-07-07'
Source_URI: Portal:Current events/2005 July 7
Intelligence_Payload:
  Uncategorized:
  - '7 July 2005 London bombings: Four explosions are reported on the London Underground
    and bus system, leading to the entire transport network being shut down. A previously
    unheard-of splinter group of al-Qaeda has claimed responsibility, though their
    involvement has not yet been verified. The attacks have left at least 50 people
    dead and roughly 700 others injured. (BBC (1)) (BBC (2)) (Wikinews)'
  - Malta becomes the 12th European Union member to ratify the EU constitution and
    the first to do so unanimously. (di-ve)
  - In the Philippines, president Gloria Arroyo asks all the members of her cabinet
    to resign. (Channel News Asia)
  - The United States raises the terror level from code yellow to code orange for
    mass transit systems in response to the London bombings. (Guardian) (EmergencyEmail)
    (CNN) (Wikinews)
  - Egypt confirms its most senior envoy to Iraq, Ihab al-Sherif, has been killed
    after being kidnapped last week. A group related to Abu Musab al-Zarqawi has claimed
    responsibility. (CNN) (Guardian)
  - Researchers halt a study in Africa after results indicate that circumcised men
    are 70% less likely to contract AIDS. The study will be presented at the Third
    International AIDS Society Conference on HIV Pathogenesis and Treatment later
    this month. Meanwhile, others argue that ritual circumcision increases the risk
    of infection because of poor sanitary conditions. (Advocate) (AllAfrica)
  - The Brazilian congress announces a referendum on banning firearms sales. (Reuters
    AlertNet)
  - In Turkey, a land mine placed on the tracks derails a freight train. There are
    no reports of casualties. (NTV-MSNBC) (Reuters AlertNet)
  - In Hungary, a hoaxed bomb threat forces evacuation of three shopping malls. (Pestiside.Hu)
    (Reuters)
  - In Mexico, the city of Nuevo Laredo chooses Omar Pimentel as the new chief of
    police. When gangsters assassinated the previous chief a month ago, Mexican federal
    police occupied the city and arrested the whole police force for investigation.
    (El Universal) (BBC)
