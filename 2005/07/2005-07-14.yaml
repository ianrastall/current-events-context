Date: '2005-07-14'
Source_URI: Portal:Current events/2005 July 14
Intelligence_Payload:
  Uncategorized:
  - U.S. Supreme Court Chief Justice William Rehnquist announces he will not retire
    from the court as long as his health permits him to remain. In October of 2004
    Rehnquist, 80, was diagnosed with thyroid cancer and underwent a tracheotomy.
    Yahoo News (Link dead as of 00:39, 15 January 2007 (UTC))
  - '2005 Atlantic hurricane season: Rain from Hurricane Emily causes flooding and
    mudslides in Grenada, as the hurricane continues to grow to near Category 3 strength.
    (NOAA), (CNN)'
  - Dana Galkowicz, an Israeli woman, 22, dies in the moshav of Netiv Ha'asara after
    Palestinian militants fire more than a dozen Qassam rockets. Hamas, Islamic Jihad
    and the al-Aqsa Martyrs' Brigades all claimed responsibility, though Israel primarily
    suspects Hamas (Ynet)
  - In the morning, a fifth person dies from injuries sustained in Tuesday's Netanya
    suicide bombing attack. (Ynet)
  - People across Europe observe two minutes of silence in memory of those who died
    in the 7 July 2005 London bombings. (Wikinews)
  - Russia demands that US extradite Leonid Nevzlin, ex-CEO of Yukos, to face various
    charges, including organizing a contract killing. Nevzlin addressed the Commission
    on Security and Cooperation in Europe on Wednesday in Washington, D.C. (Pravda)
    (Kommersant) (Reuters) (Link dead as of 00:39, 15 January 2007 (UTC))
  - In South Korea, one F-4E and one F-5F military jet fighter plane crash into the
    sea in two separate accidents. None of the four pilots survived. (Channel News
    Asia) (Bloomberg) (Reuters AlertNet) (Link dead as of 00:39, 15 January 2007 (UTC))
  - In New Zealand, Graham Capill, former leader of the Christian Heritage Party,
    is sentenced to nine years for sexual abuse of three young girls. (TVNZ) (New
    Zealand Herald)
  - The 7th World Games are being opened in Duisburg/Germany.
  - In the US, customs in New York airport have refused entry of British leading moderate
    Muslim theologian Zaki Badawi. Bawadi had been invited to a talk in Chautauqua
    Institution. He had publicly condemned the bombings in London (USA Today), (Reuters
    AlertNet) (Link dead as of 00:39, 15 January 2007 (UTC)), (BBC) (Al-Jazeera)
  - In Haiti, Jacques Roche, kidnapped prominent journalist and poet, is found dead.
    Police says he was tortured and shot. Roche was kidnapped July 10 (Reuters) (Link
    dead as of 00:39, 15 January 2007 (UTC))
  - In Zimbabwe, court jails a male athlete, who went by the name Samukeliso Sithole,
    for 3.5 years for masquerading as a female in women's sports. Sithole had said
    that he has both male and female sexual organs (Reuters) (BBC)
  - In Isiolo, Kenya, catholic missionary and bishop Luigi Locati is shot to death
    (Reuters AlertNet) (Link dead as of 00:39, 15 January 2007 (UTC)), (BBC)
