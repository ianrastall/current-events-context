Date: '2005-07-11'
Source_URI: Portal:Current events/2005 July 11
Intelligence_Payload:
  Uncategorized:
  - The Indonesian government asks TV stations to close down between 1 am and 5 am
    daily for six months in order to save energy after recent increases in the price
    of crude oil. Broadcasts of immensely-popular live European football matches which
    happen in the middle of the Indonesian night, are excluded from the shutdown.
    (BBC)
  - The General Synod of the Church of England adopts a resolution "that the process
    for removing the legal obstacles to the ordination of women to the episcopate
    should now be set in train"; and schedules debate on the best form of legislation
    to achieve this for its February 2006 session. (BBC)
  - The 17th Maccabiah Games are officially begun with a ceremony in Israel. More
    than 7000 Jewish athletes will compete on various sporting events. (Ynet)
  - The body of a U.S. Navy SEAL has been found and recovered in Afghanistan, a senior
    defense official said Sunday. (CNN)
  - In Kyrgyzstan, acting president Kurmanbek Bakiev wins presidential elections with
    89% support so far (IHT) (Reuters)
  - In China a mine explosion has killed 22 miners in Xinjiang province. 35 men were
    rescued while over 30 are still missing. (Xinhua) (China Daily) (Reuters)
  - The Roman Catholic Church defrocks six New York priests accused of sexual abuse,
    returning them to lay status. (IHT)
  - In the Netherlands, Mohammed Bouyeri, suspected killer of filmmaker Theo van Gogh,
    goes on trial (Expatica, Netherlands) (Reuters AlertNet) (Bloomberg)
  - In Bosnia and Herzegovina, tens of thousands of people gather in Potocari to commemorate
    the Srebrenica massacre and rebury 610 victims (Reuters) (BBC) (Al-Jazeera)
  - Mexican police releases Joaquín Romero Aparicio, who was falsely suspected of
    being a drug lord Vicente Carrillo Fuentes (El Universal) (Reuters)
  - According to the United States Department of Labor, Enron agrees to $356.25 million
    settlement with employees whose retirement plans were ruined. They are likely
    to receive only 15–20% of that (Forbes) (Reuters)
  - In Russia, state prosecutors begin investigation for alleged fraud and abuse of
    official position against former prime minister Mikhail Kasyanov. He is potential
    future presidential candidate (Moscow Times) (RIA Novosti) (Bloomberg)
  - Sanjay Shah, man who has spent 13 months in Nairobi airport, goes through British
    citizenship ceremony (BBC)
  - In Trinidad and Tobago, bomb explosion injures 13-15 people (sources disagree)
    in the capital Port of Spain (Reuters AlertNet) (BBC)
  - Brazilian police detains opposition congressman and bishop João Batista Ramos
    da Silva of the Liberal Front Party and six others who had been transporting $2.6
    million in cash in seven suitcases (MercoPress) (Bloomberg)
  - In Somalia, gunmen kill prominent peace activist Abdulkadir Yahya Ali (ReliefWeb)
    (Reuters AlertNet)
