Date: '2005-07-30'
Source_URI: Portal:Current events/2005 July 30
Intelligence_Payload:
  Uncategorized:
  - Thousands of Czech riot police disperse the crowd at the annual free electronic
    music festival "CzechTek", leaving dozens injured. (CBC)
  - 'Conflict in Iraq: At least two British private security agents have been killed
    following an attack on a convoy in Basra, south Iraq. (BBC)'
  - Lawyers for the former President of Iraq, Saddam Hussein, claim he was attacked
    by an unidentified man after questioning by the Iraqi special tribunal on Thursday;
    however the United States denies the event. (BBC)
  - Uzbekistan has reportedly given the United States six months to move out of a
    key base used for operations in Afghanistan.(BBC)
  - Russia begins to withdraw its troops from the military bases in Georgia (Mosnews)
    (Messenger, Georgia) (Euronews)
