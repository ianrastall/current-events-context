Date: '2005-07-09'
Source_URI: Portal:Current events/2005 July 9
Intelligence_Payload:
  Uncategorized:
  - Authorities in the United Kingdom evacuate over 20,000 people from the centre
    of the city of Birmingham, Britain's second largest city. (BBC) (Chicago Tribune)
    (CBC) (Wikinews).
  - A "lights on" bill to resume normal government operation is approved in Minnesota.
    The Minnesota Legislature now has until July 14 to approve a budget. (Star Tribune)
  - President Hamid Karzai of Afghanistan says at a press conference that he does
    not believe that Osama bin Laden is in Afghanistan. CIA chief Porter Goss has
    said in a recent interview that he has an "excellent idea" of bin Laden's whereabouts.
    (Al-Jazeera), (CNN)
  - In Serbia a documentary film "The Truth" (Istina) made of footage filmed during
    the Yugoslav wars, and showing numerous war crimes committed against Serbs is
    introduced in the Sava Center in Belgrade, sparking public outrage. (SN)
  - World leaders at the 31st G8 summit in Gleneagles, Scotland pledge 50 billion
    USD in aid to fight poverty in Africa (Reuters), and US$3 billions to Palestinians
    for infrastructures. (ReutersAlert)
