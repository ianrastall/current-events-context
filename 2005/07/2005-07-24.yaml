Date: '2005-07-24'
Source_URI: Portal:Current events/2005 July 24
Intelligence_Payload:
  Uncategorized:
  - Francis Ona, the leader of the former Bougainville Revolutionary Army, has died
    in village on Bougainville following a short illness. Ona led the bloody 10-year
    secessionist war against Papua New Guinea that ended in 1997. (ABC News) (ABC
    News)
  - A magnitude 7.2 earthquake occurs off the Nicobar Islands at 1542 UTC, near the
    epicentre of the 26 December 2004 earthquake. (USGS). USGS reports the quake was
    felt in Chennai, India, and Phuket, Thailand. (USGS)
  - 56 people die in Nigeria when a bus travelling from Lagos crashes and falls off
    a bridge into the Gadar Tamburawa river, just south of Kano. It is believed that
    the driver fell asleep as he drove. (BBC)
  - 'Conflict in Iraq: At least 39 people, mostly civilians, have been killed when
    a Suicide Truck Bomb exploded at a police station in the Iraqi Capital of Baghdad.
    (BBC), (the Guardian)'
  - American cyclist and cancer survivor Lance Armstrong wins his seventh consecutive
    Tour de France. Armstrong has announced that this will be his last tour and he
    will be retiring from the sport. (Letour.fr)(BBC)
  - The United States wins the 2005 CONCACAF Gold Cup, defeating Panama after two
    overtime rounds and a penalty shootout. (Los Angeles Times)
  - In Southwest China, authorities are investigating deaths of 17 farm workers who
    died of an unidentified disease (Xinhua) (Channel News Asia) (Reuters)
  - In South Korea, hundreds of people gather to the funeral of Yi Gu, the last heir
    of the former Joseon Dynasty. Yi Gu died in July 16 (Channel News Asia)
  - In Zambia, authorities arrest Michael Sata, leader of Patriotic Front, for sedition
    for inciting miners to riot (AllAfrica) (Reuters SA)
  - 'Guinea-Bissau presidential election, 2005: Guinea-Bissau votes in a second round
    of presidential elections. Candidates are the ruling party candidate Malam Bacai
    Sanhá and former military ruler João Bernardo Vieira. Results are expected next
    week (Reuters) (BBC)'
  - Dawood Ibrahim's daughter marries Javed Miandad's son in Dubai. (Rediff) (WorldEscape)
  Israeli-Palestinian Conflict:
  - Two Israeli civilians and two Palestinian terrorists have been killed. The Israelis
    were killed by Palestinian terrorists on the Kisufim road in the Gaza Strip, and
    the IDF Engineering forces killed the two terrorists. The al-Aqsa Martyrs' Brigades,
    the Popular Resistance Committees and Islamic Jihad all claimed responsibility
    for the attack. (BBC)
  - A Palestinian attempted suicide bomber from Jebaliya was caught near Kibbutz Nir
    Am, near Sderot, just outside the Gaza Strip.(Reuters), (Ynet)
