Date: '2005-07-19'
Source_URI: Portal:Current events/2005 July 19
Intelligence_Payload:
  Uncategorized:
  - Three British Soldiers are to face war crimes charges as well as criminal charges
    at a Court-Martial following the death of a detainee in Iraq in September 2003.
    (BBC)
  - 6 killed in Srinagar blast near school. The suicide bomber rammed his car on a
    passing army jeep, causing a massive explosion. Pakistani group Hizbul Mujahideen
    is suspected to be behind the attack. (Rediff)
  - US President George W. Bush has nominated federal appeals court judge John Roberts
    to replace Sandra Day O'Connor. Wikinews (AP/Yahoonews)
  - According to reports from Russia, at least 14 people have been killed and several
    injured in an explosion in Chechnya. (BBC)
  - In the Philippines, President Gloria Arroyo announces that she intends to form
    a truth commission to investigate charges of poll fraud against her. (Channel
    News Asia) (BBC)
  - The Canadian Senate passes Bill C-38 to legalize same-sex marriage in Canada.
    The bill will become law when it receives Royal Assent from Governor General Adrienne
    Clarkson, scheduled for tomorrow. (CBC)
  - Prime Minister Manmohan Singh of India addresses joint session of US Congress
    in his historic visit to the US. (BBC) (Rediff)
  - In Thailand, dozens of newspapers editors of Thai Journalist's Association protest
    against new emergency laws that include media censorship and phone tapping (Channel
    News Asia) (Index) (Reuters AlertNet)
  - UK court sentences Afghan warlord Faryadi Sarwar Zardad for 20 years in jail for
    war crimes (Telegraph) (Al-Jazeera) (Reuters)
  - Former Bosnian Croat soldier Miroslav Bralo pleads guilty for war crimes in the
    UN war crimes tribunal in the Hague (Reuters AlertNet) (FENA)
  - In Lebanon, prime minister Fouad Siniora announces his new cabinet after long
    negotiations. Cabinet members include representative of Hezbollah when Christian
    leader Michel Aoun refuses to join (Daily Star) (Monday Morning, Lebanon) (Al-Jazeera)
    (BBC)
  - In Spain, huge forest fire continues to rage, threatening villages of Selas and
    Ablanque. A group of ten day-trippers has confessed being responsible for the
    start of the fire and one of them has been charged (EITB) (BBC)
