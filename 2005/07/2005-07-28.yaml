Date: '2005-07-28'
Source_URI: Portal:Current events/2005 July 28
Intelligence_Payload:
  Conflict in Iraq:
  - Two people have died following an explosion which destroyed a train tanker carrying
    oil, believed to have been caused by a bomb on the tracks. [Death Toll Confirmed](BBC)
  - Six Iraqi soldiers have died following clashes in two Baghdad streets. (BBC)
  Uncategorized:
  - 'Israeli–Palestinian conflict: A Palestinian man has been shot dead by Israeli
    soldiers, who had suspected him of involvement in a suicide bombing. (BBC)'
  - Seven people have been killed and 38 others injured in an explosion on a moving
    passenger train in India. (BBC)
  - The Provisional IRA issues a statement formally ordering an end to the armed campaign
    it has pursued since 1969 and ordering all its units to dump their arms, with
    effect from 1600 BST today (1500 UTC). The IRA has been on "cease-fire" since
    1996 and said it would follow a democratic path ending more than 30 years of violence.
    It will not, however, disband.(BBC) (RTE) (Guardian) (Transcript of Statement)
  - The strongest tornado in Britain in 25 years, rating a 2 on the Fujita scale,
    hits Birmingham, damaging homes and injuring 20 people. (BBC)
  - The Islamic Human Rights Commission has released a statement which claims that
    the number of attacks on South Asians in the UK has risen 13 fold since the July
    2005 London bombings. (BBC)
  - Ugandans are voting in a referendum to decide whether to readopt a multi-party
    system (East African) (AllAfrica) (Reuters AlertNet) (BBC)
  - In India, Lal Krishna Advani of the Bharatiya Janata Party and seven others are
    charged with inciting riots in Ayodhya in 1992 (Newindpress) (The Hindu)
  - In the United States, the House of Representatives approves the Dominican Republic–Central
    America Free Trade Agreement, 217-215, sending the approved treaty to President
    George W. Bush. (Yahoo!)
  - The United States, China, India, Japan, South Korea and Australia have formed
    a partnership aiming to cut the emissions of gasses that lead to global warming.
    The agreement is known as the Asia-Pacific Partnership on Clean Development and
    Climate.
  - In the US, a number of American-Muslim scholars announce a fatwa that condemns
    terrorism and religious extremism (U.S State Department) (Reuters AlertNet)
  - In Serbia, Ljiljana Zelen-Karadžić, wife of Radovan Karadžić, goes public to ask
    her husband to give himself up (Fena) (B92) (IHT) (Reuters)
  - Poland recalls its ambassador to Belarus and demands that the European Union impose
    sanctions after Belarusian police storms the offices of the country's Polish minority
    (EUobserver) (Reuters AlertNet) (IHT)
  - In Canada, gene lab confirms that alleged sasquatch hairs actually belong to a
    bison (CBC) (Reuters)
  - In Bulgaria, Bulgarian Socialist Party fails to form a government due to hung
    parliament. President Georgi Parvanov approaches the National Movement Simeon
    II of former king Simeon Saxe-Coburg-Gotha (Euronews) (Reuters) (Sofia News Agency)
  - In Guinea-Bissau, electoral commission declares João Bernardo Vieira winner of
    the presidential election with a 52-55% majority (Reuters AlertNet) (BBC)
  - The UK government imposes a travel ban on Kenyan transport minister Chris Murungaru,
    who is investigated for corruption, forbidding him from visiting Britain (BBC)
    (KBC) (AllAfrica)
