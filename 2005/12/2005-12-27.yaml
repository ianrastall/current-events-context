Date: '2005-12-27'
Source_URI: Portal:Current events/2005 December 27
Intelligence_Payload:
  Uncategorized:
  - Indonesia's Free Aceh Movement formally disbands its armed wing. (Reuters) (Link
    dead as of 21:18, 14 January 2007 (UTC))
  - Andrei Illarionov, an adviser to Russian President Vladimir Putin quits, saying
    Russia is "no longer free". (Washington Post)
  - The government of Poland announces it will keep troops in Iraq until the end of
    2006, longer than previously planned. (Al jazeera)
  - A mass grave is discovered in the predominantly Shia city of Karbala south of
    Baghdad, Iraqi police said. (BBC)
  - The serial rape suspect accused of terrorizing two South Florida neighborhoods
    with attacks on victims ranging from elderly women to an 11-year-old girl was
    back in custody Tuesday, a week since his brazen jail escape, after a tipster
    recognized his face and called police. (AP via Yahoo! News) (Link dead as of 21:18,
    14 January 2007 (UTC))
  - Rebels in Colombia kill 24 soldiers guarding coca eradication workers. (BBC)
  - The Ugandan army kills seven civilians who had been protesting over the killing
    of a 15 year old boy. Sixteen others are injured. (BBC)
