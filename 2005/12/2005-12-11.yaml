Date: '2005-12-11'
Source_URI: Portal:Current events/2005 December 11
Intelligence_Payload:
  Uncategorized:
  - According to some reports, Ariel Sharon, the Prime Minister of Israel, put the
    Israeli Defense Force on high alert for possible airstrikes against Iranian nuclear
    facilities. Sharon's office, however, denied this or that they had any plans to
    do so. (Times Online) (Y-Net) (Y-Net)
  - Chief minister of the Indian state of Karnataka, Dharam Singh announced that the
    state government had accepted Jnanpith awardee U R Ananthamurthy's suggestion
    to rename Bangalore to its colloquial name, Bengaluru. The new name will be effective
    from November 1, 2006. (The Times of India)
  - Brian Chase of Nashville, Tennessee admits putting false information about John
    Seigenthaler Sr. into a Wikipedia article, leading to widespread debate. (NYT
    via Seattle Times) (CNN) (BBC)
  - A suicide bombing in Kandahar, Afghanistan, injures 3 people while killing the
    bomber. (Reuters) (Guardian)
  - '2005 Hertfordshire Oil Storage Terminal fire: Explosions are reported at the
    Buncefield oil depot north of London ten miles from the Luton airport. (BBC) (Sky
    News)'
  - Ethnically motivated violence erupts in the suburbs of Sydney, leading authorities
    to condemn the incidents as "shameful". (ABC)
  - Korean Air, both national and international has been shut down due to the strike
    going on in Korea. The national airplane circulation has been stopped already
    and the Korean Airline planes that were in a foreign country are returning to
    Korea.
  - Vengeance of Rain of Hong Kong, was crowned the World Racing Championship winner
    after winning the Cathay Pacific Hong Kong Cup at Sha Tin Racecourse
