Date: '2005-12-04'
Source_URI: Portal:Current events/2005 December 4
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian Conflict: Israel launches a series of air strikes as reprisals
    after the Palestinians fired Qassam rockets, hitting what local officials called
    an Islamic Jihad charity in the Gaza Strip. (BBC)'
  - Hong Kong people marched today to oppose the political reform set out by Chief
    Executive Donald Tsang in favour of a timetable on the full implementation of
    universal suffrage in the territory. Organisers claimed 250,000 attended the march,
    while police put the figure at 63,000. (AP via Yahoo!News) (Link dead as of 22:46,
    14 January 2007 (UTC)), (NYTimes) (registration required), (Xinhua)
  - Exit polls indicate that Kazakhstan's incumbent leader Nursultan Nazarbayev wins
    the presidential election by a landslide. (Forbes) (Financial Times) (Guardian)
    (Xinhua)
  - Former Prime Minister of Australia Malcolm Fraser calls for a worldwide ban on
    capital punishment. (The Australian)
  - The people of Venezuela vote in Parliamentary Elections. (BBC)
  - A London tabloid claims that the CIA's use of Scotland's airports was part of
    an alleged CIA operation to catch and transfer terrorist suspects to secret prison
    camps in Europe. The three airports allegedly involved were Glasgow International,
    Glasgow Prestwick, and Edinburgh Airport. (BBC News) (Hindustan Times) (Photo
    of aircraft (Airliners.net))
  Conflict in Iraq:
  - Former chief of the RUC police force will head a British investigation into possible
    infiltration of Iraq's police force by insurgents. (BBC)
  - Former prime minister Iyad Allawi says he survived an assassination attempt at
    the Imam Ali Mosque in Najaf. Police say his group fled from the Shi'ite Muslim
    shrine under a hail of debris by a mob. (ReutersUK)(Link dead as of 22:46, 14
    January 2007 (UTC)), (NYTimes) (registration required)
