Date: '2005-12-28'
Source_URI: Portal:Current events/2005 December 28
Intelligence_Payload:
  Uncategorized:
  - M. C. Puri, Professor Emeritus of Mathematics at the Indian Institute of Technology,
    Delhi, is killed and three others are injured when an unidentified gunman opened
    fire at India's premier educational institute, the Indian Institute of Science
    at Bangalore. (BBC) (The Hindu)
  - Jürgen Chrobog, Germany's former Deputy Foreign Minister, his wife and three children,
    are kidnapped in Yemen by tribesmen pressing for the release of jailed members
    of their tribe. (IHT) (Deutsche Welle)
  - Europe's "sat-nav" technology satellite, Giove-A, is launched as part of the Galileo
    positioning system with the goal of providing access to timing and location information
    independent of the United States' prevalent GPS system. (BBC)
  Arab–Israeli conflict:
  - Israeli jets bomb the PFLP-GC base in Naameh, Lebanon, a few miles outside Beirut,
    wounding two people, in retaliation for a rocket attack that hit Qiryat Shemona.
    Israeli warplanes then fly over southern Lebanon and the western Bekaa Valley
    in reconnaissance flights, drawing anti-aircraft fire from the Lebanese army.
    The PFLP-GC denies responsibility for the rockets that hit Kiryat Shmona. Major
    General Udi Adam has not ruled out targeting installations in Syria. (Reuters)
  - Israel Defense Forces forces launch Operation Blue Skies, firing artillery rounds
    against areas in the northern Gaza Strip and at the areas in proximity to the
    newly established ‘security strip’ - an area of the Gaza Strip that Israel has
    declared off limits to Palestinians which Israel claims is aimed at distancing
    Qassam rocket launchers from the border with Israel. (Ynetnews)
  - Militants from al-Aqsa Martyrs Brigade and other militants linked to Fatah storm
    electoral offices in Gaza. (BBC) (TVNZ)
