Date: '2005-12-26'
Source_URI: Portal:Current events/2005 December 26
Intelligence_Payload:
  Uncategorized:
  - 15-year-old Jane Creba is killed and six others are wounded in Toronto's Boxing
    Day shooting, when two groups of gunmen open fire outside a Foot Locker store
    near the Eaton Centre in Toronto. (CNN) (CBC)
  - Memorial services around the world, including one in Banda Aceh, Indonesia, attended
    by President Susilo Bambang Yudhoyono, mark the first anniversary of the 2004
    Indian Ocean earthquake and tsunami which saw 275,000 people killed or left missing.
    (CNN)
  - A gas attack occurs at an outlet of the Maksidom chain on Moskovsky Prospect in
    Saint Petersburg, Russia, and leads to the hospitalization of numerous victims.
    (BBC)
  - The prime minister of Israel, Ariel Sharon, will undergo a cardiac catheterization
    to seal a hole in his heart. The surgery is a routine procedure for this congenital
    defect, according to doctors in Jerusalem. (CNN)
  - A Qassam rocket fired at the Israeli kibbutz Sa'ad lands near a preschool. No
    injuries are reported. (Ynetnews)
  - SeaQuest DSV is released on DVD for the first time.
  - Kerry Packer, major shareholder of PBL, dies of kidney failure at the age of 68.
