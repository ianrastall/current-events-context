Intelligence_Payload:
  Uncategorized:
  - Azerbaijan Airlines Flight 217 crashed after taking off from the Azerbaijan capital,
    Baku, killing 23. (BBC)
  - Different sources report that Chadian president Idriss Déby has said his country
