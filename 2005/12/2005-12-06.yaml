Date: '2005-12-06'
Source_URI: Portal:Current events/2005 December 6
Intelligence_Payload:
  Uncategorized:
  - The BBC World Service reports that the U.S. are moving into four new bases in
    Romania, one of the bases is where the CIA has been accused of carrying out extraordinary
    rendition. (BBC)
  - An Iranian C-130 Hercules airplane crashes into a ten-story building in a civilian
    area of the Iranian capital Tehran, killing all 94 people aboard and 34 residents
    of the building - a total of 128+ people. (BBC) (BBC)
  - David Cameron wins the leadership election for the United Kingdom Conservative
    Party. (BBC)
  - The World Wide Fund for Nature (WWF) photographs what appears to be a new species
    in Borneo. The lemur-like carnivorous mammal is apparently a member of the viverrid
    family, related to the mongoose and civet. (BBC)
  - 'Conflict in Iraq: Two suicide bombers kill 27 Iraqi Police at a police academy
    in Baghdad. (BBC)'
  - The Red Cross mulls adding a new Red Crystal symbol to ensure continuing acceptance
    of its work. (BBC)
  - Deposed Iraq president Saddam Hussein has refused to attend his trial for crimes
    against humanity, throwing the sometimes chaotic Iraqi proceedings into further
    confusion. (ABC)
  - At least 123 miners are missing following an explosion at a coal mine in China's
    Hebei province, the official Xinhua news agency says. (ABC)
  - South Africa's axed deputy president Jacob Zuma, who lost his job in post-apartheid
    South Africa's most sensational corruption scandal, has been charged with rape.
    (ABC)
