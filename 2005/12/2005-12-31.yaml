Date: '2005-12-31'
Source_URI: Portal:Current events/2005 December 31
Intelligence_Payload:
  Uncategorized:
  - 25-year-old Scottish human rights worker Kate Burton and her parents are freed
    unharmed in the Gaza Strip by the Palestinian gunmen who kidnapped them two days
    earlier. (ABC Australia)
  - A bomb explodes in downtown Palu, Indonesia, killing at least eight people and
    wounding 45 people. (BBC)
  - After heavy rains, Napa, California experienced its worst flooding in 20 years.
    (Napa Valley Register) Two days later, Governor Arnold Schwarzenegger declared
    a state of emergency in Napa and 6 other California counties (Napa Valley Register),
    and one month later, U.S. President George W. Bush signed a declaration stating
    that a major disaster existed in Napa and 9 other California counties, allowing
    Federal Emergency Management Agency assistance for those areas affected by the
    flooding. (Napa Valley Register)
