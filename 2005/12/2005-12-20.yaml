Date: '2005-12-20'
Source_URI: Portal:Current events/2005 December 20
Intelligence_Payload:
  Uncategorized:
  - Chiyoda Corp. and Technip SA win a 500-billion Yen contract to build two LNG (liquefied
    natural gas) facilities in Qatar. Bloomberg
  - In the Kitzmiller v. Dover Area School District case, Judge John E. Jones III
    rules that it is unconstitutional to teach intelligent design as an alternative
    to evolution in a public school science classroom in the United States. (Aljazeera)
    (Associated Press) (BBC) (Christian Science Monitor) (CNN) (Guardian) (Time)
  - At least 20 people die as a bus in Pakistani-controlled Kashmir skids from the
    road, tumbles down a hill and lands in the river Jhelum. (BBC)
  - Local 100 of the Transport Workers Union declares a New York City transit strike
    after talks fail, shutting down the subway and bus system that constitute the
    largest transportation system in the United States. (Wikinews) (AP via Yahoo!)
    (CNN) (BBC)
  - Midwest Airlines Flight 210 lands safely at Boston's Logan International Airport
    with a landing-gear problem late Tuesday after circling the airport for approximately
    two hours. (AP via Yahoo!)
  Israel:
  - In the Likud primary elections, Benjamin Netanyahu wins, becoming the new Likud
    leader. In the voting, he is followed by Silvan Shalom, Moshe Feyglin, and Yisrael
    Katz. (Ynetnews)
  - Ariel Sharon, the prime minister of Israel, is released from Hadassah Ein Kerem
    hospital after being treated for a mild stroke. (Ynetnews)
