Date: '2005-12-19'
Source_URI: Portal:Current events/2005 December 19
Intelligence_Payload:
  Uncategorized:
  - Chalk's Ocean Airways Flight 101 flying from Miami, Florida to Bimini, Bahamas,
    crashes in Miami Beach, killing 18 passengers and two crew members.(CNN)
  - Evo Morales becomes the latest Leftist to win the Presidency of a South American
    nation after he claimed victory in the Bolivian Presidential Election. (BBC)
  - Early returns in the Iraqi legislative election, December 2005 indicate that religious
    parties have done quite well, winning up 80 percent of the vote. Election officials
    are investigating more than 1,000 complaints about irregularities, 20 of them
    considered serious. Final results will not be released until early January.
  - The Free Aceh Movement surrenders the last of its weapons following a peace agreement
    with the Government of Indonesia. (BBC)
  - 'Conflict in Iraq: An insurgent group broadcasts a video over the Internet of
    what they claim is the death of American Ronald Allen Schulz. (BBC)'
  - Nazi Officer Ladislav Niznansky is acquitted of charges relating to three massacres
    of Slovaks during World War II. (IOL)
  - Governor Antonio Fazio of Bank of Italy resigns, after having been officially
    put under investigation for insider trading, and following heavy pressure from
    both government and opposition. (BBC)
  - The Likud primary elections for the party's leadership between the candidates
    Benjamin Netanyahu, Silvan Shalom, Yisrael Katz and Moshe Feyglin opened at 10:00
    a.m. (Ynetnews)
