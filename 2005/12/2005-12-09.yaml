Date: '2005-12-09'
Source_URI: Portal:Current events/2005 December 9
Intelligence_Payload:
  Uncategorized:
  - 'The Chronicles of Narnia: The Lion, the Witch and the Wardrobe comes out to theatres.
    Walt Disney Pictures and Walden Media'
  - Viacom's Paramount Pictures agrees to buy the DreamWorks SKG company founded by
    Steven Spielberg, Jeffrey Katzenberg and David Geffen for $1.6 billion. (NY Times)
  - The Groups for the 2006 FIFA World Cup to be held in Germany are finalized. (BBC)
    Both Group C and Group E have been dubbed "groups of death". (SI), (Globe&Mail),
    (ChicagoTribune)
  - The Bush administration summons Canadian ambassador Frank McKenna, and is expected
    to formally lodge a complaint after Prime Minister Paul Martin's criticism on
    December 7 of the United States at the Montreal conference on climate change.
    U.S.-Canada relations are already a major issue in the upcoming Canadian federal
    election. (CBC)
  - Reports emerge of an alleged massacre of protesting farmers and fishermen in Dongzhou,
    Guangdong, China by police forces. The protesters are believed to be upset with
    government plans to build a new power plant in the area and infill part of the
    bay. The death toll, pegged at 20, is the worst act of violence by Chinese security
    forces since the Tiananmen Square protests of 1989. The town is reportedly still
    sealed off by government forces. (IHT) (BBC)
  - The last London Routemaster double-decker bus makes its final journey on route
    159 before being withdrawn from general service. (BBC)
