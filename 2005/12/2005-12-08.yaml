Date: '2005-12-08'
Source_URI: Portal:Current events/2005 December 8
Intelligence_Payload:
  Uncategorized:
  - A six-year-old boy is killed after Southwest Airlines Flight 1248 skids off a
    runway at Chicago Midway International Airport. (CNN)
  - President of Iran Mahmoud Ahmadinejad remarks that Israel should be moved to Europe
    and the "issue will be resolved." His remarks were widely condemned as Holocaust
    denial by Israeli, European and American politicians, The Secretary General of
    the United Nations, Kofi Annan, issued a statement indicating that he "was shocked",
    while Saudi, Turkish and Iranian officials criticized his speech because it undermined
    a Mecca summit dedicated to showing Islam's moderate face.(DailyStar)(UN) (AP)
    (KUNA)(BBC) (Reuters)
  - 'Conflict in Iraq: At least 32 people have died following an attack on a bus in
    Baghdad. (BBC) (Fox News)'
  - Croatian general Ante Gotovina, rated the third-most-wanted war criminal from
    the Yugoslav wars by the International Criminal Tribunal for the Former Yugoslavia,
    is arrested by Spanish police in Tenerife and extradited to face the tribunal
    in The Hague. (BBC)
  - Former Prime Minister of the United Kingdom Margaret Thatcher has left hospital
    after being given a clean bill of health by doctors after feeling faint yesterday.
    (BBC)
  - The International Red Cross and Red Crescent Movement adopt a Red Crystal design,
    allowing Israel to join as a fully participating member. (BBC)
  - UK Law Lords rule in A v. Secretary of State for the Home Department that evidence
    which may have been obtained by torture cannot be used against suspects in terrorism
    cases. (BBC)
  - Lawyers for convicted murderer and Crips co-founder Stanley "Tookie" Williams
    meet with Governor of California Arnold Schwarzenegger in a final plea for clemency.
    (MTV)
  - In Australia, the voluntary student unionism (VSU) legislation has passed the
    Senate. (ABC)
  Israeli-Palestinian Conflict:
  - Hamas leader Khaled Mashal declares at a rally in Damascus, Syria that its informal
    ceasefire with Israel, which expires at the end of the year, will not be renewed.
    (BBC)
  - Two Palestinians, believed to be militants, are killed following an Israeli air
    strike in the Gaza Strip. (BBC)
  - An Israeli soldier dies after being stabbed by a Palestinian at a Checkpoint in
    the West Bank. (BBC)
