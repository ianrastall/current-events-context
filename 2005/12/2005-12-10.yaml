Date: '2005-12-10'
Source_URI: Portal:Current events/2005 December 10
Intelligence_Payload:
  Uncategorized:
  - The International Atomic Energy Agency and its Director General Mohamed ElBaradei
    receive the Nobel Peace Prize in Oslo. (BBC)
  - The other 2005 Nobel Prizes are handed out in Stockholm to Barry J. Marshall and
    Robin Warren (Physiology or Medicine), Roy J. Glauber and John L. Hall and Theodor
    W. Hänsch (Physics), Robert H. Grubbs, Richard R. Schrock and Yves Chauvin (Chemistry),
    Robert J. Aumann and Thomas C. Schelling (Economics), and Harold Pinter (Literature).
    (CNN)
  - At least 103 people are killed and 7 injured when Sosoliso Airlines Flight 1145
    crashes en route to Port Harcourt from the Nigerian capital Abuja. (CNN)
  - American comedian and actor Richard Pryor dies of cardiac arrest at the age of
    65 at 7:58 AM (Pacific Time).
