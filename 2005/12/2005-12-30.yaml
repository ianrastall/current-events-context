Date: '2005-12-30'
Source_URI: Portal:Current events/2005 December 30
Intelligence_Payload:
  Uncategorized:
  - Twenty Sudanese migrants are killed when a Cairo camp is broken up by police.
    (BBC)
  - A consortium led by New York based Citigroup has won the right to buy 85% of the
    Guangdong Development Bank, in the People's Republic of China, according to a
    Reuters report. It beat out a rival Europe-based consortium.
  - Tropical Storm Zeta, the twenty-seventh named storm of the 2005 Atlantic hurricane
    season, forms in the Atlantic Ocean one month after the season's official end.
    (Reuters) (US NHC)
  - Drake Bell was injured in a car accident. A Mercedes plowed into his 1966 Mustang.
    Bell suffered a broken jaw and a fractured neck. Due to this, his hit television
    show "Drake and Josh" was post-poned until March.
