Date: '2005-12-17'
Source_URI: Portal:Current events/2005 December 17
Intelligence_Payload:
  Uncategorized:
  - Hong Kong police detain 900 protesters at the World Trade Organization Ministerial
    Conference of 2005 after an anti-globalization demonstration became violent. The
    protesters object to trade rules that they say hurt poor farmers. 74 people are
    injured. (Reuters) (CNN)
  - 'Israeli-Palestinian Conflict: Palestinian militant Khaled Abu Sitta is killed
    and three others injured when Sitta''s car explodes in the Gaza Strip. Palestinian
    sources say the explosion was caused by an Israeli air strike, although the Israeli
    Defense Force denies any involvement but admits bombing roads and bridges and
    shooting dead a suspect.(BBC) (Y-Net) (Haaretz) (Reuters)'
  - Condoleezza Rice and the African Union request additional funds to enable the
    A.U.'s peacekeeping mission in Darfur, Sudan to continue. Without additional aid,
    the African peacekeeping force will run out of funds in four months. Violence
    in the region has resurged recently. (Boston Globe) (Reuters) (LA Times via Chron.com)
  - A group of over 40 people, dressed in Santa Claus costumes, go on a rampage through
    downtown Auckland, New Zealand, robbing stores and assaulting security guards.
    (AP)
  - Thieves use a flatbed truck to steal a 2-ton Henry Moore statue from the grounds
    of his foundation in Hertfordshire, England. The statue is valued at more than
    $5.2 million dollars. (AP) (Telegraph.co.uk)
