Date: '2005-12-05'
Source_URI: Portal:Current events/2005 December 5
Intelligence_Payload:
  Uncategorized:
  - The 23rd Southeast Asian Games officially closes with Philippines gaining the
    top medal ranking for the first time. (Manila Bulletin)
  - An earthquake strikes the Democratic Republic of the Congo (formerly Zaire). Many
    people are feared dead after an earthquake measuring 6.8 on the Richter scale
    struck Lake Tanganyika near the town of Kalemie. (TimesOnLine) (News24) (The Independent)
    (BBC)
  - 'Civil Partnership Act 2004: The United Kingdom begins registration of civil unions
    for same-sex couples. (BBC)'
  - '2005 Kashmir earthquake: Pakistan renews SOS Children''s Villages role as custodian
    of all orphans and unaccompanied children following the earthquake. (SOS)'
  - 'Israeli-Palestinian conflict: A suicide bomb attack kills at least five people
    in Netanya, north-western Israel. The attack follows confirmation from Shaul Mofaz
    that Israel will resume its policy of "targeted killings". (Ynetnews) (BBC)'
  - Venezuelan parliamentary elections apparently result in Hugo Chávez's party and
    allies winning all 167 seats, as opposition parties boycott the election claiming
    election fraud. (BBC)
