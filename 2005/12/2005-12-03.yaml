Date: '2005-12-03'
Source_URI: Portal:Current events/2005 December 3
Intelligence_Payload:
  Uncategorized:
  - Talks on the new EU budget may not be completed under the United Kingdom's presidency,
    the UK's minister for Europe warns. (BBC)
  - 'ROC local elections, 2005: Republic of China (Taiwan) opposition party Kuomintang
    (Chinese Nationalist Party) makes major gains in municipal elections, taking 14
    of 23 mayor or county magistrate seats. Ruling Democratic Progressive Party takes
    six seats. People First Party and New Party each takes one seat, and an independent
    wins one seat. DPP chairman Su Tseng-chang resigns to take responsibility for
    his party''s defeat. (AP via San Francisco Chronicle)'
  - Pakistan's information minister claims Pakistani forces have killed al-Qaeda operational
    commander Abu Hamza Rabia in fighting along the Afghanistan border. (BBC)
  - An attack about 60 miles from Baghdad, involving a roadside bomb, kills 19 Iraqi
    soldiers. (Yahoo)
  - Some 40,000 protest inaction on global warming in Montreal. The demonstration,
    held as part of the United Nations Climate Change Conference, is one of the largest
    environmental protests ever and is accompanied by marches worldwide, including
    one in hurricane-devastated New Orleans. (CTV) (Independent)
  - Marilyn Manson marries Dita Von Teese in a lavish ceremony.
