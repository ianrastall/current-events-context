Date: '2005-09-14'
Source_URI: Portal:Current events/2005 September 14
Intelligence_Payload:
  Uncategorized:
  - The President of Pakistan, Pervez Musharraf, shakes hands with the Prime Minister
    of Israel, Ariel Sharon, the first time such an encounter has been made in public.
    (BBC)
  - UN High Commissioner for Refugees and World Food Programme appeal for more funds
    to provide food for two million refugees in Africa, in countries such as Tanzania,
    Central African Republic, Liberia and Kenya. (Reuters)
  - Mandatory emergency evacuation is ordered for Outer Banks in North Carolina as
    Hurricane Ophelia approaches. (Washington Post), (Reuters), (Guardian)
  - Two American air carriers, Delta Air Lines and Northwest Airlines, have filed
    for Chapter 11 bankruptcy protection. Delta has lost over six billion USD since
    the start of 2001.
  - The Massachusetts General Court rejects a proposed amendment to ban Same-sex marriage
    in Massachusetts by a vote of 157-39, meaning that Massachusetts will remain the
    only state in the United States to allow gay marriage.
  - Ugandan Rebels of the Lord's Resistance Army cross the White Nile for the first
    time to carry out attacks near Juba, the capital of Southern Sudan. (BBC)
  - Hamas blows a hole through the wall between Egypt and Gaza, allowing free passage
    for Palestinians to and from Egypt for the first time since 1967. (BBC)
  - Frances Newton is executed by lethal injection by the U.S. state of Texas for
    the murder of her ex-husband and two children. She is the first African American
    woman executed in Texas since 1858. (Reuters)
  - Robert Wise, film director, dies at the age of 91, at the UCLA Medical Center
    in Los Angeles.
  - Following serious Loyalist rioting during which dozens of shots were fired at
    riot police, the Northern Ireland Secretary Peter Hain announced that the British
    government no longer recognized the Ulster Volunteer Force ceasefire.
  Conflict in Iraq:
  - 114 people die when a car bomb explodes in a Shia district of Baghdad called Kadhimiya.
    (BBC)
  - 17 people die in the town of Taji, near Baghdad when gunmen storm their homes.
    (BBC)
