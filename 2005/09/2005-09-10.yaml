Date: '2005-09-10'
Source_URI: Portal:Current events/2005 September 10
Intelligence_Payload:
  Uncategorized:
  - Four people are known to have died following a football match in the Democratic
    Republic of Congo after a wall collapsed in the stadium the teams were playing
    in. (BBC)
  - Several police have been injured when Loyalist gunmen open fire after the Whiterock
    Orange Order Parade in Belfast, Northern Ireland. (BBC)
  - Iraqi forces and US troops attack Iraqi insurgents in Tal Afar. (Reuters)
  - The 2005 World Summit to take place on Wednesday, September 14 is expected to
    be the largest gathering of world leaders in history, with more than 170 world
    leaders in attendance. (Guardian) (FOX) (UN News) (Wikinews)
  - Ahead of New Zealand's September 17 general election, Leader of the Opposition
    Don Brash denies lying about knowing of an anti-Labour pamphlet released by the
    Exclusive Brethren. (New Zealand Herald) (TVNZ) (TaiwanNews)
  - Three young backpackers are killed and eight injured in a rural Queensland, Australia
    bus accident. (Sydney Morning Herald)
  - Russia is planning to build the world's first low capacity floating nuclear power
    plant (FNPP) at a cost of $200,000. The plant will produce 1/150th the power of
    a standard Russian facility. (MOSNEWS)
