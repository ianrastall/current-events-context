Date: '2005-09-08'
Source_URI: Portal:Current events/2005 September 8
Intelligence_Payload:
  Uncategorized:
  - One woman was killed and over a dozen were injured following a stampede when people
    fled the Saudi Arabian Airlines plane they were on after a hoax bomb threat was
    made. (Reuters) (Link dead as of 00:43, 15 January 2007 (UTC))
  - Up to 33 Indian troops die when a bridge they are crossing collapses in Himachal
    Pradesh, North India. (BBC)
  - Several people were injured when bombs exploded in a KFC and McDonald's restaurants
    in the Pakistani city of Karachi. (BBC)
  - Hosni Mubarak wins the first multi-candidate presidential election in the history
    of Egypt with 78 percent of the vote. Ayman Nour is the nearest runner-up with
    12 percent. (Fox News)
  - News Corporation says it will buy IGN Entertainment for $650 million. IGN is one
    of the largest multimedia sites on the Internet and also owns the GameSpy Network
    and AskMen.com. (BBC)
  - Ukraine President Viktor Yushchenko fires Prime Minister Yulia Tymoshenko and
    most of his cabinet amid accusations of graft and serious infighting. (Yahoo!
    News) (Link dead as of 00:43, 15 January 2007 (UTC))
  - Guy Theunis, a Catholic priest from Belgium, has been arrested on a charge of
    republishing articles in a magazine that the authorities cite as encouraging genocide
    in Rwanda. (BBC)
  - Reporters Without Borders accuses Yahoo! of assisting the People's Republic of
    China government to identify Shi Tao, the journalist sentenced to 10 years jail
    in April 2005. Shi released on the Internet a government letter which advised
    the Chinese media not to report on the 15th anniversary of the Tiananmen Square
    protests. (Reporters sans frontières) (Daily Telegraph)
  - 103 Croatians were arrested in Malta following supporter disturbances after a
    2006 FIFA World Cup qualifying football match which Croatia unexpectedly failed
    to win. (HINA)
  - Apple Computer has unveiled a pencil-thin iPod nano digital music player and a
    long-anticipated cell phone that plays music like an iPod, both aimed at extending
    its domination of the digital music market. Also, Apple discontinued their iPod
    mini. (New York Times) (registration required), (CNN) (Link dead as of 00:43,
    15 January 2007 (UTC))
  - California Governor Arnold Schwarzenegger announced he would veto a bill allowing
    same-sex marriage citing the March 2000 Proposition 22 ballot initiative that
    stated "Only marriage between a man and a woman is valid or recognized in California".
    (LA Times) (Link dead as of 00:43, 15 January 2007 (UTC))
  Hurricane Katrina:
  - 'Emergency officials requisition 25,000 body bags as search and rescue operations
    continue in Louisiana. A spokesman for the state''s department of health and hospitals
    said: "We don''t know what to expect ... It means we are prepared." (The Guardian)'
