Date: '2005-09-13'
Source_URI: Portal:Current events/2005 September 13
Intelligence_Payload:
  Uncategorized:
  - The rebel National Liberation Front of Burundi breaks off peace negotiations with
    the new government of Pierre Nkurunziza. (BBC)
  - Many petrol stations across the United Kingdom experienced increased demand ahead
    of the 2005 fuel protests. (Reuters)
  - Sony recalls 3.5 million faulty PlayStation 2 power adapters. (BBC)
  - President of the People's Republic of China Hu Jintao meets with U.S. President
    George W. Bush at the United Nations during the Leaders' Gathering in honor of
    the 60th Anniversary of the UN's founding. (East News)(White House)
  - Chief Justice nominee John Roberts affirms before the Senate Judiciary Committee
    today his belief in a constitutional right to privacy, which underpins many Constitutional
    amendments (viz. 1, 4, 5, 9, 13 and 14) as well as Roe v. Wade. (This does not
    translate to support specifically for Roe v. Wade.) He answers questions regarding
    civil rights in wartime, torture and the role on international law in interpreting
    the Constitution. (NPR)
