Date: '2005-09-02'
Source_URI: Portal:Current events/2005 September 2
Intelligence_Payload:
  Uncategorized:
  - U.S. President George W. Bush tours the area devastated by Hurricane Katrina amidst
    growing criticism of his lack of leadership. Media reports say he will not visit
    New Orleans. Bush said order would be restored and New Orleans would emerge from
    its "darkest days". (BBC)
  - Vladimir Putin tells mothers of Beslan children killed a year ago that the government
    could not guarantee complete security in the face of terrorism. (CNN)
  - The NASA Mars Exploration Rover Mission robotic Spirit rover sends back a partial
    panoramic view from the top of "Husband Hill" at Gusev Crater on Mars. (BBC)
