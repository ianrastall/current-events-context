Date: '2005-09-09'
Source_URI: Portal:Current events/2005 September 9
Intelligence_Payload:
  Uncategorized:
  - United States Department of Homeland Security Secretary Michael Chertoff appoints
    Vice Admiral Thad W. Allen, chief of staff of the United States Coast Guard, to
    direct Hurricane Katrina relief efforts in New Orleans, in place of Federal Emergency
    Management Agency director Michael D. Brown, who returns to Washington to direct
    planning for future disaster relief. (CTV.ca)
  - During a military exercise, a Belgian Air Force F-16 fighter jet crashes in the
    Wadden Sea (Waddenzee), near the Dutch island of Vlieland. The pilot failed to
    eject, and died in the crash. (Expatica)
  - People's Republic of China President Hu Jintao meets with Canadian Prime Minister
    Paul Martin in Ottawa. The event is met with protesters and supporters of the
    Chinese government. Martin and Hu agree on a new "Strategic Partnership", and
    sign a series of agreements on transportation, food inspection, and scientific
    research. Hu also meets with Governor General Adrienne Clarkson. (CBC) (Chinesenewsnet)
    (CTV.ca)
  - 'A federal grand jury in Providence, Rhode Island indicts Richard Hatch, winner
    of Survivor: Pulau Tiga, for income tax evasion and fraud for allegedly failing
    to pay taxes on his winnings and misusing charity funds. (Fox News)'
  - An earthquake measuring 7.3 on the Richter scale is detected off the eastern coast
    of Papua New Guinea, though no damage has been recorded. (Manichi Daily News)
    (BBC)
  - Australian Federal Opposition Leader Kim Beazley says the Australian Government's
    proposed new anti-terrorism laws would not deter terrorism. Others say the laws
    would radicalise young Muslims and civil liberty groups say the laws would make
    Australian society more dangerous.(ABC)(ABC)
  - The Australian Security Intelligence Organisation plans to recruit an additional
    500 spies for its current staffing of 1,000 to counter terrorism. (The Australian)
  - India and Pakistan will exchange civilian prisoners on September 12 at the Waga
    border. Those exchanged have completed their sentences. (The Indian Express)
