Date: '2005-09-16'
Source_URI: Portal:Current events/2005 September 16
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: At least 10 people died as a Shia Mosque is bombed in Tuz Khurmatu,
    Central Iraq. (BBC)'
  - Hamas hold a huge prayer rally in the now abandoned Israeli settlements in the
    Gaza Strip, leading thousands of Palestinian Muslims in Friday Prayers (Salat
    ul Jum'a). (BBC)
  - 87 journalists are arrested at a protest in Nepal. (CTV)
  - The President of Pakistan, Pervez Musharraf, has evoked outrage by suggesting
    that rape victims in Pakistan are part of a "money making concern". (BBC)
  - Hurricane Ophelia is downgraded to a tropical storm as it appears to head out
    to the Atlantic Ocean. (Science Daily)
  - The Bicentennial of the Battle of Trafalgar and the death of Admiral Lord Nelson
    is commemorated by a re-enactment of the 1806 waterborne state funeral procession
    on the River Thames in London. (BBC)
  - New Zealand prepares to go to the polls on Saturday. (New Zealand Herald)
