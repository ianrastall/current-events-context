Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: Five U.S. troops die following three insurgent attacks, two
    in Ramadi and one in Baghdad. (BBC)'
  - North Korea announces that its offer to end its nuclear arms program is dependent
    on it being allowed to build a civilian nuclear reactor. (ABC), (BBC)
  - 14 Indian soldiers die following an insurgent attack in the eastern state of Manipur.
    (BBC)
  Federal elections in Germany:
  - There is still no clear course for coalition building, with deadlocks for all
    possible coalitions.
  - Angela Merkel (CDU) and Franz Müntefering (SPD) were elected chairpersons of their
    respective Parliamentary parties.
  - German green politician Joschka Fischer announced his retirement from leading
    the Green party in the newly elected Parliament, retiring to become an "elder
    statesman" in the back benches. Spiegel online
