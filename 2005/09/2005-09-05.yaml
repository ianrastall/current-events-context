Date: '2005-09-05'
Source_URI: Portal:Current events/2005 September 5
Intelligence_Payload:
  Uncategorized:
  - A Russian Navy fighter jet crashes and sinks to a depth of 1,100 meters near Shetland
    in the Norwegian Sea during a military exercise. The jet, a Sukhoi Su-33, slid
    off the flight deck of aircraft carrier Admiral Kuznetsov after the plane's arresting
    cable broke during the landing attempt; the pilot ejected out of the plane and
    survived. Due to the plane's reportedly containing secret high-tech military equipment,
    Russian authorities have decided to destroy it using underwater bombs. (Pravda.Ru),
    (Aftenposten)
  - 'Ethiopian general elections, 2005: The National Elections Board of Ethiopia,
    following repeat voting in 31 areas, announces that the ruling EPRDF coalition
    has retained control of the government, obtaining 59 percent of the seats in Parliament.
    (IRIN)'
  - Typhoon Nabi (Category 3) reaches the Japanese coasts. It will make landfall today,
    and is expected to take 3 days to cross the island of Kyūshū. (Reuters)
  - 'Hurricane Katrina: Senator and former First Lady Hillary Clinton calls for a
    "9/11 Style Inquiry" into the U.S. federal government''s response to the Hurricane.
    (The Myrtle Beach online)'
  - A cable car crash at Sölden, Ötztal, in the Austrian Alps leaves nine people dead
    when a helicopter carrying construction materials dropped concrete onto the cable.
    (BBC) (Sky News)
  - American jurist John Roberts is nominated by US President George W. Bush as the
    next Chief Justice of the United States. (MSNBC) Bush withdrew Roberts' original
    nomination to succeed retiring Associate Justice Sandra Day O'Connor.
  - Three teenage girls admit starting a fire in Paris on September 3 which left 16
    people dead. (CFRA Canada)
  - Google taps into the Chinese local markets by opening their fifth international
    Local Search Engine on Google China at http://bendi.google.com/. (SINA)
  - Ibrahim Rugova, the President of Kosovo, has announced that he has lung cancer
    but will not be stepping down. (BBC)
  - 'Conflict in Iraq: Two British Soldiers have been killed following a roadside
    IED bomb in Basra, southern Iraq. (BBC)'
  - 'Mandala Airlines Flight 091: A Mandala Airlines flight crashes into a residential
    area of the Indonesian city of Medan, killing at least 100 passengers. Among the
    dead are the governor and former governor of Sumatra Utara, Rizal Nurdin and Raja
    Inal Siregar. (CNN)'
  - A painting discovered in the Kunsthalle Bremen museum in Bremen, Germany is believed
    by art historians to be a previously unknown work by Norwegian artist Edvard Munch.
    (The Independent)
