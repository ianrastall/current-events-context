Date: '2005-09-28'
Source_URI: Portal:Current events/2005 September 28
Intelligence_Payload:
  Uncategorized:
  - The Pentagon announces it will investigate allegations that US soldiers posted
    photographs of dead Iraqis on a website so as to get access to free Internet porn.
    CAIR had earlier called for the investigation after the details of the site came
    to light. (BBC)
  - Trade unions inflict defeats against the UK Labour Party government, during the
    party's annual conference, including on the plan to use private companies in the
    National Health Service. (BBC)
  - U.S. House Majority Leader Tom DeLay is indicted on one count of criminal conspiracy
    by Texas grand jury, for allegedly funding Texas state elections secretly through
    the Republican national office.
  - 'Israeli-Palestinian Conflict: Israeli airstrikes on Palestinian areas continue.
    IDF planes and artillery strike Gaza knocking out power to parts of the city,
    destroy a bridge in Beit Hanoun, fire missiles at a Fatah Youth Centre, an office
    and a refugee camp in the central Gaza Strip. Israeli troops later raided offices
    of Hamas and Islamic Jihad in the West Bank. (BBC)'
  - According to reports, Asif Chotu, allegedly a leader of the al Qaeda-linked militant
    group Lashkar-e-Jhangvi, has been arrested in Pakistan. (BBC) (Reuters)
  - An 82-year-old British man was manhandled out of Labour Party Conference for loudly
    protesting that Jack Straw was lying about Britain's involvement with the Conflict
    in Iraq. (BBC)
