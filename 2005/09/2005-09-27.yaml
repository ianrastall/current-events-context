Date: '2005-09-27'
Source_URI: Portal:Current events/2005 September 27
Intelligence_Payload:
  Uncategorized:
  - During a US State Department visit to Jidda, Saudi Arabia, Karen Hughes receives
    a mixed reaction when she suggests Saudi women be allowed to drive cars and to
    "fully participate" in society.(NYT) (registration required)
  - Australian State and Territory leaders agree to implement the Commonwealth Government's
    tough new anti-terrorism laws with a sunset clause. The new laws allow police
    to detain terrorism "suspects" without charge for up to two weeks, and electronically
    tag them for up to a year. The measures have been attacked by civil libertarians
    and Muslim groups. (ABC) (ABC)
  - Michaëlle Jean is sworn in as the 27th Governor General of Canada, replacing Adrienne
    Clarkson. (CBCUnlocked)
  - Two Japanese scientists snap more than 500 photos of a live giant squid and recover
    one of its two longest tentacles, which severed during a struggle. (National Geographic)
    (MSNBC [with pictures])
  - The Australian Government dismissed a suggestion from former Australian Prime
    Minister Bob Hawke that the Australian economy would benefit significantly from
    storing the world's nuclear waste in the country's desert interior. (BBC)
  - Abu Azzam, claimed by the US to be an aide to Abu Musab al-Zarqawi, was shot dead
    by US soldiers. (BBC)
  - 'Israeli-Palestinian Conflict: Israeli Airstrikes on Palestinian areas continue.
    The Israel Defense Forces strikes three bridges in the Gaza Strip and a money-changer
    in Khan Younis, while a further 82 people were arrested in the West Bank. (BBC),
    (Reuters) (Link dead as of 22:31, 14 January 2007 (UTC)), (Al Jazeera), (Haaretz)
    (Link dead as of 22:31, 14 January 2007 (UTC))'
  - The Prime Minister of Israel, Ariel Sharon, survives a major leadership challenge
    within the Likud Party. The proposal, which would have ordered the next Party
    Leader election be held in October 2005 rather than April 2006, is voted down
    by the party's Central Committee, 48% to 52%. (Yahoo!News) (Link dead as of 22:31,
    14 January 2007 (UTC))
