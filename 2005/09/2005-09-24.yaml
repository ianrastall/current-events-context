Date: '2005-09-24'
Source_URI: Portal:Current events/2005 September 24
Intelligence_Payload:
  Uncategorized:
  - Unofficial reports from Hong Kong say the second Chinese human spaceflight, Shenzhou
    6, is expected to launch October 13 carrying two astronauts on a five day mission.
    (RedNova News)
  - Human Rights Watch reports whistleblowers accuse U.S. troops of routinely torturing
    Iraqi prisoners and declining to investigate complaints. (Human Rights Watch),
    (IPS news), (USA Today) (NYT)
  - Hurricane Rita makes landfall as a Category 3 hurricane on the Texas - Louisiana
    border at 2:38 a.m. CDT . The storm was downgraded within four hours to Category
    2. As of 10 p.m. CDT (0300 UTC, September 25), the center of Tropical Depression
    Rita was located on land 40 miles (65 km) north of Shreveport, Louisiana. Rita
    was moving north at 10 mph (16 km/h) with maximum sustained winds of 35 mph (55
    km/h) (CNN) While there are only a few direct deaths, more than 100 people die
    in the course of the chaotic evacuation of 2.5 million people. (Houston Chronicle)
  - Hundreds of thousands of people protest wars in the September 24, 2005 anti-war
    protest
  - In the Australian Football League's premiership-deciding match for season 2005,
    the Sydney Swans defeat the West Coast Eagles 8.10 (58) – 7.12 (54) to win their
    first AFL premiership in seventy-two years. (Sydney Morning Herald)
  Israeli-Palestinian Conflict:
  - The Israeli Military stations troops and artillery on the edge of Gaza and seals
    the borders of the Gaza Strip and West Bank. (BBC)
  - At least five Israelis are injured after Palestinian militants fire some 30 Qassam
    rockets from the Gaza Strip on Israeli communities. (The Jerusalem Post) (YNETnews)
  - Four Hamas militants are killed after the Israeli Air Force launches air strikes
    on Hamas targets in the Gaza Strip. (ABC News) (The Jerusalem Post)
