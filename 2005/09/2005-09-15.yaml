Date: '2005-09-15'
Source_URI: Portal:Current events/2005 September 15
Intelligence_Payload:
  Uncategorized:
  - Nintendo finally reveals the controller for its next generation console on its
    website. Reactions from gamers are mixed. (Nintendo)
  - 'U.S. President George W. Bush addresses the nation from Jackson Square in New
    Orleans saying: "We have witnessed the kind of devastation no citizen of this
    great and generous nation should ever have to know. We will do what it takes and
    stay as long as it takes to help New Orleans to return their community and their
    lives." He provides the Federal Emergency Management Agency (FEMA) phone number
    to assist families in reuniting: 877‒568‒3317. (Seattle Post-Intelligencer)'
  - The Clinton Global Initiative is inaugurated in New York.
  - The Supreme court of Israel rejects the opinion of International Court of Justice
    for the removal of Israeli West Bank barrier, but calls on part of the wall to
    be re-routed so as not to encroach on Palestinian lands. The world court had called
    the barrier illegal and ordered the wall be torn down. (ABC News) (Ireland Online)
  - 'Conflict in Iraq: At least 26 Iraqi police die following two car bombs in the
    Baghdad. Elsewhere, 3 Shia pilgrims are shot dead by a passenger in a passing
    car traveling to Karbala, two Iraqi police members are killed near Kirkuk and
    three civil servants die following an attack on the Ministry of Industry in East
    Baghdad. (BBC)'
  - 'Australia: The Australian Broadcasting Corporation rushed to air its interview
    with former Labor Party Opposition leader Mark Latham after fending off legal
    challenges from News Corporation, publishers of The Australian and the Herald
    Sun. (The Age) (ABC News).'
  - Most of world leaders at the United Nations General Assembly call for eliminating
    poverty. (UN)
