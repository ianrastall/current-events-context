Date: '2005-09-26'
Source_URI: Portal:Current events/2005 September 26
Intelligence_Payload:
  Uncategorized:
  - U.S. Army PFC Lynndie England is found guilty of six of seven charges by a military
    court in connection with the Abu Ghraib prisoner abuse scandal. A sentencing hearing
    is scheduled to begin September 27. (Yahoo!News) (Link dead as of 21:25, 14 January
    2007 (UTC))
  - Anti-Iraq War activist Cindy Sheehan is arrested while protesting outside the
    White House. (Yahoo! News) (Link dead as of 21:25, 14 January 2007 (UTC))
  - 'Northern Ireland peace process: Retired Canadian general and present Chairman
    John de Chastelain of the Independent International Commission on Decommissioning
    announces in a Belfast, Northern Ireland press conference that the weapons, ammunition,
    and explosives of the Provisional Irish Republican Army have been "put beyond
    use". "We are satisfied that the arms decommissioned represent the totality of
    the IRA''s arsenal.", the general said. Unionists, such as Ian Paisley, have expressed
    cynicism. (BBC). (RTÉ)'
  - Imad Yarkas is convicted in Spain of conspiracy with al-Qaeda in the September
    11, 2001 attacks and sentenced to 27 years. Driss Chebli, was convicted of collaborating
    with a terrorist group and sentenced to six years, Al Jazeera journalist Tayseer
    Allouni was also convicted of collaborating with a terrorist group and sentenced
    to seven years, while Ghasoub al-Abrash Ghalyoun was acquitted on all counts.
    (AP) (Link dead as of 21:25, 14 January 2007 (UTC))
  - 'Israeli-Palestinian conflict: Israeli Airstrikes on Palestinian targets continue,
    with the Israel Defense Forces firing missiles in Gaza, knocking out the power
    supply to the East of the city, the Khan Yunis refugee camp and Rafah. Hamas had
    earlier declared an end to rocket attacks following pressure from the Palestinian
    National Authority and Egypt. (BBC)'
  - An Israeli citizen from an Israeli settlement east of Jerusalem was found murdered
    in Ramallah after Hamas killed the man they accused of being a member of the Shabak.
    (Israeli Insider), (BBC)
  - Kitzmiller et al. v. Dover Area School District is the first direct challenge
    brought in United States federal courts against a public school district curriculum
    mandating the teaching of intelligent design as an alternative to evolution. Opening
    arguments are set for today in Harrisburg, Pennsylvania District Court. (LA Times)
    (AP) (Link dead as of 21:25, 14 January 2007 (UTC))
  Conflict in Iraq:
  - Five school teachers were killed in an insurgent attack in Iskandariya, south
    of Baghdad. (BBC)
  - At least 7 people die when a car-bomb explodes as they queued at the police academy
    in the Iraqi capital Baghdad. (BBC)
