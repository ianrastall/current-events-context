Date: '2005-09-22'
Source_URI: Portal:Current events/2005 September 22
Intelligence_Payload:
  Uncategorized:
  - Australia agrees to fund Indonesia's response to avian influenza by providing
    anti-viral drugs to protect health workers in the event of a pandemic and contributing
    to a World Health Organisation team being sent to Jakarta. The Federal Opposition
    foreign affairs spokesman, Kevin Rudd, urged the Australian Government to further
    co-operate with regional states by calling for a regional summit on the issue.
    (ABC) (ABC)
  - The U.S. Senate Committee on the Judiciary votes 13 to 5 for the nomination of
    John Roberts as Chief Justice of the United States. The appointment needs approval
    of the entire Senate, and that vote is expected during the week of September 26.(AP
    via Yahoo!)
  - Verkhovna Rada (the Parliament of Ukraine) approves Yuriy Yekhanurov as the country's
    new Prime Minister. (VOA), (CNN), (Reuters), (CBC), (BBC)
  - Six people die and 20 are injured in two bomb blasts in the Pakistani city of
    Lahore. (BBC)
  - In Australia, AFL Premiership 2005 was released.
