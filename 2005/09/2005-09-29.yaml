Date: '2005-09-29'
Source_URI: Portal:Current events/2005 September 29
Intelligence_Payload:
  Uncategorized:
  - 'Conflict in Iraq: 95 people die following a series of Insurgent attacks in Balad,
    Iraq. (BBC), (BBC)'
  - The New York Times reporter Judith Miller is released from federal jail after
    receiving a waiver from her news source, allowing her to testify in the investigation
    of the outing of CIA operative Valerie Plame. (CNN) (Yahoo News) (Link dead as
    of 00:44, 15 January 2007 (UTC))
  - Algerians vote in a referendum to grant partial amnesty to militants to end the
    Algerian Civil War.(SBS)
  - The People's Republic of China Government unveils their new official Internet
    website, now to be found at www.gov.cn. (Beelink)
  - The family of Jean Charles de Menezes arrives in London looking for justice. The
    innocent Brazilian was shot six times by police exercising a shoot-to-kill policy.
    Metropolitan Police Commissioner Ian Blair has offered his personal apology for
    the killing, but this has been rejected by the family. (The Times)
  - By a vote of 78–22, the United States Senate confirms John Roberts as Chief Justice,
    presiding over the Supreme Court. Roberts is sworn in later in the afternoon,
    and will preside over the Court's Fall term beginning October 3.
  - The High Court of Australia has found that it is inappropriate for the court to
    judge whether the Howard Government's unapproved spending on an advertising blitz
    promoting the controversial industrial relations reform is unlawful. The case
    was brought by the Australian Labor Party and trade unions. (ABC)
  - British Columbia's Tobacco Damages and Health Care Costs Recovery Act is approved
    by the Supreme Court of Canada, opening the door for the Province to sue cigarette
    makers, in order to recover the billions spent in inflicted healthcare costs.
    (The Globe and Mail)
  - Ian Huntley, convicted of murdering two young girls, the Soham Murders, is sentenced
    to a minimum forty years in prison by a British court. (BBC)
  - The UK Prime Minister Tony Blair has apologised to Walter Wolfgang, an 82-year
    old Labour Party activist thrown out of the party's annual conference by stewards
    for heckling Jack Straw. He was controversially arrested under anti-terrorist
    legislation. (BBC)
  - The government of Macau takes over the management of Banco Delta Asia bank, after
    a US report on its North Korea ties caused a panic run on deposits. (The Standard)
  - A wildfire in the south of U.S. state California burns 17,000 acres (69 km²),
    spurs evacuations near State Route 118 and U.S. Route 101. (Bloomberg)
  - Girl group Play announces their dis-banding
