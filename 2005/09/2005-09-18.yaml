Date: '2005-09-18'
Source_URI: Portal:Current events/2005 September 18
Intelligence_Payload:
  Uncategorized:
  - Vice Admiral Thad Allen warns that New Orleans tap water is still unfit to drink.
    He cautions that mayor Ray Nagin's encouragement of residents outside the French
    Quarter to return is "extremely problematic" at this time. (Washington Times)
  - President of Pakistan, Pervez Musharraf, addresses the American Jewish Congress,
    the first leader of a Muslim nation not recognizing Israel to do so. He broke
    bread and led salat from the Quran. (BBC)
  - Taliban fighters launch a series of attacks as Afghans vote in the Afghan parliamentary
    election, 2005, the first legislative elections in Afghanistan in decades. (Reuters)
  - Federal elections are held in Germany. Provisional results give the CDU/CSU 35.2%
    of the vote and 225 seats, the SPD 34.3% and 222 seats, FDP 9.8% and 61 seats,
    the Left Party 8.7% and 54 seats, and the Green party 8.1% and 51 seats. There
    is likely to be several weeks of horse trading to form a workable coalition. (Deutsche
    Welle Election Night Ticker)
  - Russia wins the Fed Cup title for second straight year, beating France 3:2 in
    the final. (Yahoo! Sport News)
  Conflict in Iraq:
  - Insurgents in the Iraqi capital of Baghdad kill three, including the Kurdish Member
    of Parliament, Faris Hussein. (BBC)
  - Iraqi Police uncover at least 20 bodies in the river Tigris at Balad, north of
    Baghdad. (BBC)
