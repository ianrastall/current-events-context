Date: '2005-11-01'
Source_URI: Portal:Current events/2005 November 1
Intelligence_Payload:
  Uncategorized:
  - Champion race horse Best Mate suffers a heart attack and dies while racing in
    front of a live television audience.
  - U.S. Senate Minority Leader Harry Reid and his fellow Democrats force a closed
    session of the Senate over misinformed intelligence that led to the Iraq War and
    evasion of a congressional inquiry. (CNN)
  - The discovery of two additional moons of Pluto is announced. (CNN)
  - The United Nations Security Council passed a UNSC resolution (S/RES/1636 (2005))
    which requests urgently and forcefully Syria's full cooperation with the investigation
    into the assassination of former Lebanese Prime Minister Rafik Hariri. (CCTV)
  - Zanzibar's ruling Chama Cha Mapinduzi party and President Amani Abeid Karume are
    declared re-elected in a disputed election. Police clashed with opposition supporters,
    leaving 9 dead. (Reuters) (Reuters) (Guardian)
  - 'Israeli-Palestinian Conflict: 2 Palestinian militants, one from Hamas, the other
    the Al Aqsa Martyrs Brigade, have died following an Israeli air-strike in the
    Gaza Strip. (BBC)'
  - North Korea and South Korea will field a united Olympics team at the next Olympic
    Games. (BBC)
  - Justice John Gomery releases the first part of the Gomery Commission report on
    corruption in the Liberal Party of Canada and the sponsorship scandal. Gomery
    exonerates current Prime Minister Paul Martin but criticizes former Prime Minister
    Jean Chrétien and his Quebec lieutenant Alfonso Gagliano. (CBC)
  - 2005 Paris riots continue for the fifth consecutive night, sparked by the death
    of two Muslim youths from electric shock. The controversy caused by police firing
    tear gas into a mosque on Sunday night led to families of the dead youths pulling
    out of a meeting with the French Minister of the Interior Nicolas Sarkozy. (news24)
  - Makybe Diva wins the Melbourne Cup thoroughbred horse race for the third consecutive
    year, becoming the first horse ever to do so. Shortly thereafter, owner Tony Santic
    announces her retirement from racing. (Herald Sun)
  - U.S. prosecutors admitted that Omar al-Faruq was one of four detainees to escape
    from the Bagram base, Afghanistan, in July, all of whom are still on the run.
    (BBC)
