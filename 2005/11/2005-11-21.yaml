Date: '2005-11-21'
Source_URI: Portal:Current events/2005 November 21
Intelligence_Payload:
  Uncategorized:
  - The Prime Minister of Israel, Ariel Sharon, announces his resignation from Likud
    and his intention to form a new party, and asks the President of Israel to call
    a general election. (BBC)
  - 'Conflict in Iraq: Five Iraqi civilians, including three children, are shot dead
    by U.S. troops as they approached a checkpoint in Baquba. The minibus they were
    travelling in failed to stop as it approached a roadblock. (BBC)'
  - As more than one million Zambians face severe food shortages due to drought, President
    Levy Mwanawasa declares a national disaster and appealed for international food
    aid. (BBC)
  - The II Man vs Machine World Team Championship starts in Bilbao, Spain. (ChessBase)
