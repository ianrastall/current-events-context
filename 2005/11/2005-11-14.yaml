Date: '2005-11-14'
Source_URI: Portal:Current events/2005 November 14
Intelligence_Payload:
  Uncategorized:
  - 'Germany: Conferences of the CDU, CSU and SPD approve a coalition deal that will
    see Angela Merkel become Chancellor on November 22. (BBC)'
  - Mexico and Venezuela have withdrawn their ambassadors amid rising tension between
    the two countries. (Reuters)
  - 'Somalia: 8 men were sentenced to death today for the murder of British Aid workers
    Richard and Enid Eyeington in Somaliland in October 2003. SOS (BBC)'
  - Ugandan opposition leader Kizza Besigye, the main challenger to President Yoweri
    Museveni in the first multi-party elections since 1986, is arrested by the police.
    This has sparked off riots. He is accused of having links to the rebel groups
    People's Redemption Army and Lord's Resistance Army. (BBC) (Reuters)
  - The United States government issues warning after receiving credible information
    that a terrorist threat may exist against official U.S. government facilities
    in Guangzhou, China. (IHT)
  - Knesset Member Omri Sharon, the son of the Prime Minister of Israel Ariel Sharon,
    struck a deal with prosecutors that would see him plead guilty to a series of
    charges in connection with illegal fundraising during Ariel Sharon’s 1999 primaries
    campaign. (Ynetnews)
  Uzbekistan:
  - Petrol shortages in Uzbekistan continue to worsen. Critics attribute the shortages
    to the Uzbek government's monopoly of the petrol industry. (Reuters)
  - The Supreme Court of Uzbekistan found 15 men guilty of inciting the May 2005 unrest
    in Uzbekistan in the city of Andijan. The defendants allege that they were tortured
    while incarcerated. (Reuters)
