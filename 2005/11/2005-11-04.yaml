Date: '2005-11-04'
Source_URI: Portal:Current events/2005 November 4
Intelligence_Payload:
  Uncategorized:
  - Clashes continue in Debre Berhan, while government forces succeed in pacifying
    Bahir Dar and Awasa. The Ethiopian capital Addis Ababa remained calm, with few
    shops open and no taxis operating. (BBC)
  - The Old Bailey in the U.K. sentences five white supremacists to jail for 15 years
    for creating and distributing race hate material. (BBC)
  - One of three men arrested last month in the U.K. is charged under the Terrorism
    Act 2000. The others were charged with, among other things, conspiracy to murder
    and possessing bomb-making materials. (BBC)
  - The 2005 Paris suburb riots continue for an eighth consecutive night. Hundreds
    of arson attacks have taken place in the last few nights. Shots fired at police
    and firefighters. Rioting continues to spread. France described as facing a crisis.
    (BBC)
  - Israelis begin to mark the 10th anniversary of the assassination of Prime Minister
    Yitzhak Rabin. (BBC) (Reuters) (IOL)
  - Massive demonstrations against U.S. President George W. Bush continue to grow
    at the Fourth Summit of the Americas in Mar del Plata, Argentina. (Reuters)
