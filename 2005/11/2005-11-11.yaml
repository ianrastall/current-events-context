Date: '2005-11-11'
Source_URI: Portal:Current events/2005 November 11
Intelligence_Payload:
  Uncategorized:
  - Three British prisoners are freed in Iran after pressure from the British Foreign
    Office. The trio were seized at by Iranian Navy patrol boats on 28 October, when
    they sailed their boat to the disputed island of Abu Musa, which is claimed by
    both Iran and the United Arab Emirates. (BBC)
  - Albania suffers its worst ever electric power shortage. Due to low water levels,
    hydroelectric power is reduced to the minimum and there are blackouts in all the
    country. Water supplies won't last for more than two weeks, so electricity is
    currently available just six hours a day. The government plans to import power
    from Romania, Bulgaria and Italy. (BBC)
  - A Pakistani cargo plane carrying eight to ten people crashes near Kabul, capital
    of Afghanistan. There are no survivors. The cause of the crash is unknown. (BBC)
  - H5N1 avian influenza is found in Kuwait, the first reported case of the virus
    in the Middle East. (BBC)
  - Saudi Arabia becomes a member of the World Trade Organization after twelve years
    of talks. (BBC)
