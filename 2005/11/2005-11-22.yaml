Date: '2005-11-22'
Source_URI: Portal:Current events/2005 November 22
Intelligence_Payload:
  Uncategorized:
  - 'Israeli–Lebanese conflict: Israeli planes bomb targets in Southern Lebanon. (BBC)'
  - Floods and mudslides due to Tropical Storm Gamma, the 24th named storm in the
    2005 Atlantic hurricane season, kill at least 32 people in Honduras. (Reuters)
  - After two months of negotiations, Angela Merkel is elected the first female Chancellor
    of Germany by a coalition of the CDU/CSU and SPD delegates in the Bundestag. (BBC)
  - Kenyan voters overwhelmingly reject a new constitution, which would have given
    the president greater power, in a national referendum, which used symbols on the
    ballot paper to assist illiterate voters. (BBC)
  - 'Al Jazeera bombing memo: British Daily Mirror tabloid publishes an article suggesting
    that George W. Bush discussed with Tony Blair a plan to bomb the offices of the
    Al Jazeera TV station. (Mirror) Following the publication, the Attorney General
    threatens to prosecute, under §5 of the Official Secrets Act 1989, anyone making
    further disclosures from the memo. (Guardian) Al Jazeera offices in Baghdad and
    Kabul have previously been bombed by the U.S. military. U.S. officials deny Al
    Jazeera was the target of either attack, and a White House spokesman describes
    the report as "outlandish." (Guardian)'
  - The Microsoft Xbox 360 is released in North America with 18 launch titles.
