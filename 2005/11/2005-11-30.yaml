Date: '2005-11-30'
Source_URI: Portal:Current events/2005 November 30
Intelligence_Payload:
  Uncategorized:
  - The 2005 Atlantic hurricane season officially ended today, despite Tropical Storm
    Epsilon's remaining active in the Atlantic. (US NHC 1) (US NHC 2)
  - 'Gabon: Africa''s longest serving president (since 1967), Omar Bongo, wins presidential
    elections, securing a further seven years in office. (Reuters)'
  - The US Military has been covertly paying to run news stories written by US Military
    "information operations" troops. The stories, usually praising the work of the
    U.S. Military, appeared in Baghdad newspapers (Al Jazeera)(LA Times)
  - A new campaign against Iraqi insurgents begins with joint U.S.-Iraqi troops conducting
    Operation Iron Hammer in western Iraq. (ABC)
  - New policy document on American involvement in Iraq, "National Strategy for Victory
    in Iraq", is published by the White House. (UPI)
  - Surgeons in France carry out the first human face transplant. (BBC)
  - Death toll in northeast China coal mine blast reaches 150. (Science Daily)
  - Giovanni Prezioso, the General Counsel of the U.S. Securities and Exchange Commission,
    announces that he's leaving that post, although he'll remain until early 2006
    to aid with the transition. (SEC website)
  - 'There are reports that Walt Disney Co., which is trying to sell its ABC Radio
    unit, has narrowed the field of potential buyers to three: Entercom Communications
    Corp., Cumulus Media Inc. and a private equity firm Kohlberg Kravis Roberts. (Business
    Journal)'
