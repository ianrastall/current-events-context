Date: '2005-11-02'
Source_URI: Portal:Current events/2005 November 2
Intelligence_Payload:
  Uncategorized:
  - Guinea-Bissau's President Nino Vieira appoints Aristides Gomes, a former African
    Development Bank official, as new Prime Minister, replacing the dismissed Carlos
    Gomes Júnior. (xinhua) (Reuters)
  - Donald E. Powell, former chief executive of the First National Bank of Amarillo,
    Texas and current Federal Deposit Insurance Corporation chairman is named to coordinate
    rebuilding of the Gulf Coast by President George W. Bush. (White House) (Washington
    Times)
  - The Washington Post reports that the Central Intelligence Agency has been operating,
    perhaps as illegally, a covert network of "black site" prisons for terrorist suspects
    in eight foreign countries, including Afghanistan, Thailand, and several Eastern
    European democracies for the last four years, with little or no oversight from
    the United States Congress. (The Washington Post)
  - Iran's President Mahmoud Ahmadinejad nominates Sadeq Mahsouli as Supervisor of
    Ministry of Petroleum of OPEC's number two producer, risking domestic political
    commotion and a parliamentary veto after already making a disturbance abroad with
    a call for Israel's destruction. (Reuters)
  - The Delhi police release three sketches of one of the suspected bombers involved
    in 29 October 2005 Delhi bombings. (NDTV)
  - A car bomb kills six in Srinagar, India (Rediff)
  - The British Secretary of State for Work and Pensions, David Blunkett, resigns
    a second time, following allegations of ministerial misconduct over his directorship
    and purchase of shares in a bioscience company. John Hutton is named as his replacement.
    (Investment & Pensions Europe).
  - The 2005 Paris riots continue for the sixth consecutive night. Rioting spread
    through impoverished suburbs, which was sparked by the death of two youths who
    were allegedly fleeing police and were accidentally electrocuted while hiding
    in an electrical substation. The riots have caused increased strains between the
    authorities and the inhabitants of the poor suburbs. (AP)
  - 80 of the world's top radio astronomers meet in Pune, India to decide how and
    where to set up the world's biggest radio telescope, the Square Kilometre Array.
    (NDTV)
  - 'Israeli-Palestinian Conflict: An Israel Defense Forces soldier is seriously wounded
    and later dies of his wounds in an overnight arrest raid near the West Bank town
    of Jenin. (Ynetnews)'
  - At least 23 people are killed and 160 wounded in clashes between opposition supporters
    and police in the Ethiopian capital of Addis Ababa. (Reuters)
