Date: '2005-11-16'
Source_URI: Portal:Current events/2005 November 16
Intelligence_Payload:
  Uncategorized:
  - 1 person is killed, and 15 are injured in Hakkâri, Hakkari Province, Turkey during
    fighting between Turkish police and Kurdish PKK rebels. (Reuters)
  - In the 2005 Burkina Faso presidential elections incumbent Blaise Compaoré celebrates
    victory several days ahead of the release of the voting results. International
    watchdogs and opposition officials allege widespread vote rigging. (BBC)
  - The Health Ministry of the People's Republic of China announces the country's
    first one confirmed and one suspected cases of avian flu in humans in Hunan Province,
    and one confirmed case in Anhui. (BBC)
  - The United States government has won its fight to keep its supervisory authority
    over the internet through the ICANN, despite opposition from many nations. (BBC)
  - Major areas of the Australian city of Adelaide have been "locked down" ahead of
    the arrival of United States Secretary of Defense Donald Rumsfeld for the 17th
    annual AUS-MIN meeting. (ABC)
  - Australia qualifies for the FIFA World Cup for the first time since 1974 following
    a victory over Uruguay.
  - Nick Jonas of the pop band, Jonas Brothers, is diagnosed with type 1 diabetes
  - The Xbox 360 is first sold in the United States.
