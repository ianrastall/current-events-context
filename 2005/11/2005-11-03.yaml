Date: '2005-11-03'
Source_URI: Portal:Current events/2005 November 3
Intelligence_Payload:
  Uncategorized:
  - Measles Initiative (MI) announces that since 1999, more than 200 million children
    in Africa have been vaccinated against measles, reducing the infection rate by
    60 percent and saving 1 million lives. (allAfrica)
  - The 2005 Paris suburb riots continue for a seventh consecutive night.
  - 'Conflict in Iraq: Seven U.K. troops accused of murdering an Iraqi civilian have
    had their cases dropped after a judge ruled that there was insufficient evidence
    against the soldiers and that the Iraqi witnesses lied. (BBC)'
  - Five U.S. Marines have been arrested after they were accused of raping a local
    Filipino woman. The was prevented from leaving the Philippines until the men were
    apprehended. (BBC) (Xinhua)
  - Two more people have died as protests against the government of Ethiopia continue
    in Addis Ababa. (BBC)
  - Sagittarius A*, a compact radio source at the center of the Milky Way, is proved
    to be a supermassive black hole. (CNN)
  - A bomb explodes in the eastern Indonesian city of Ambon. No casualties have been
    reported. (Radio Australia)
  Israeli-Palestinian Conflict:
  - A joint Israeli-Palestinian doctors group has filed a petition to the Supreme
    Court of Israel requesting an end to the Israel Defense Forces use of sonic booms
    to terrify the Palestinian populace. The Doctors complain that the "sound bombs"
    cause widespread fear, induce miscarriages and traumatise children. The United
    Nations claim that the tactic causes panic attacks in children and has smashed
    thousands of windows. (The Guardian) (BBC)
  - A 12-year-old Palestinian boy is in a critical condition after being shot by an
    Israeli soldier. The soldiers had been in a firefight with Islamic Jihad members,
    and the boy was carrying a toy gun. Haaretz (BBC).
  - Israeli troops raid the West Bank area of Jenin. (BBC)
