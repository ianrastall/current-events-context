Date: '2005-11-27'
Source_URI: Portal:Current events/2005 November 27
Intelligence_Payload:
  Uncategorized:
  - 23rd Southeast Asian Games formally opens in Manila, Philippines. (Manila Bulletin)
  - A tornado outbreak across four U.S. states kills at least two people. (US NWS
    Storm Prediction Center)
  - The former Prime Minister of Iraq, Iyad Allawi, has claimed in The Observer newspaper,
    that human rights abuses by members of the Government of Iraq are as bad now as
    they were in the time of Saddam Hussein. (BBC)
  - Incumbent President Omar Bongo Ondimba seeks another seven-year term against four
    other candidates in Gabonese presidential election, 2005. (Reuters)
  - 'Honduran general election, 2005: Elections in Honduras are held, Manuel Zelaya
    is elected as President of Honduras. (BBC)'
  - An earthquake hits southern Iran, measuring 5.9 on the moment magnitude scale.
    (BBC)
  - Leader of the Democratic Action Party Lim Kit Siang calls for the resignation
    of the Malaysian Deputy Inspector-General of the Police for his actions in the
    Malaysian prisoner abuse scandal. (Lim's blog)
  - The Edmonton Eskimos defeat the Montreal Alouettes 38-35 in the 93rd Grey Cup
    Canadian Football League championship at B.C. Place Stadium in Vancouver, British
    Columbia. The Eskimos won in overtime on a Sean Fleming field goal to capture
    their 13th Grey Cup in franchise history. Eskimos quarterback Ricky Ray was named
    Grey Cup MVP. (Game Coverage)
