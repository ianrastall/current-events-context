Date: '2005-11-07'
Source_URI: Portal:Current events/2005 November 7
Intelligence_Payload:
  Uncategorized:
  - Sierra Leone Health and Sanitation Minister, Abator Thomas says that polio has
    been eradicated in the country, following a successful immunization program. (allAfrica)
  - The United Nations is asking donors for US$3.2 million to help six West African
    countries fight cholera. The disease has killed at least 700 people and infected
    over 42,000 in the region since June, a sharp rise due to the unusually heavy
    rains this year. (allAfrica)
  - India's foreign minister, K. Natwar Singh, is forced to step down from his post
    amid allegations that he and the governing Indian National Congress had illegally
    benefited from the UN Oil-for-Food Programme in Iraq. (Reuters)
  - Canadian New Democratic Party leader Jack Layton withdraws his support to the
    minority government of Prime Minister Paul Martin. This decision might set a confidence
    vote in the next week. (Globe & Mail)
  - China closes all Beijing poultry markets. Authorities ordered all live poultry
    markets in China's capital to close immediately and went door-to-door seizing
    chickens and ducks from private homes, as the government dramatically ramped up
    its fight against avian influenza today. (Business Week)
  - Alberto Fujimori, former President of Peru, is arrested in Chile whilst a Chilean
    judge considers a Peruvian extradition request. (BBC)
  - India opens the first of three frontier checkpoints at Chakan Da Bagh in Poonch
    on the Kashmir Line of Control (LoC) between India and Pakistan, for 2005 Kashmir
    earthquake relief work. (Rediff)
  - The 2005 French urban riots continue to intensify and spread, in the eleventh
    consecutive night of rioting in cities across France. A related incident has been
    reported in Saint-Gilles, Brussels, Belgium (Guardian) (BBC) (CNN) (Le Figaro)
    (in French)
