Date: '2005-11-10'
Source_URI: Portal:Current events/2005 November 10
Intelligence_Payload:
  Uncategorized:
  - 'Liberian presidential election: Ellen Johnson-Sirleaf wins the Liberian presidential
    run-off election in Liberia, defeating George Weah. Johnson-Sirleaf becomes the
    first-ever elected female head of state in Africa. AP, NYT'
  - '2005 levee failures in Greater New Orleans: An Investigations of the 17th Street
    Canal, whose failure flooded much of New Orleans, Louisiana in the wake of Hurricane
    Katrina, show that metal pilings were seven feet shallower than engineering specifications.
    (Times-Picayune)'
  - United States House of Representatives Republican leadership drops a provision
    from budget plans that would open the Arctic National Wildlife Refuge to drilling
    due to opposition from moderate Republicans and expected opposition in the Senate.
    (AP)
  - A Boeing 777-200LR Worldliner jet aircraft breaks the record for the longest non-stop
    passenger airline flight. The 20,000-kilometer (12,500-mile) flight from Hong
    Kong to London lasted 23 hours. (Boeing) (BBC)
  - 'War in Afghanistan: Taliban insurgents are suspected in the killing of seven
    police in an ambush in Kandahar. Two civilians from Uruzgan were also found decapitated.
    (BBC)'
  - 'Iraq War: At least 33 are killed in an attack on a restaurant in Baghdad. Al-Qaida
    in Iraq claims responsibility. Guardian CBS BBC'
  - '2005 Ethiopian police massacres: In the Ethiopian capital of Addis Ababa, police
    officers and protesters clash.'
