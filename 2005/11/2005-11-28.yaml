Date: '2005-11-28'
Source_URI: Portal:Current events/2005 November 28
Intelligence_Payload:
  Uncategorized:
  - Iraqi President Jalal Talabani has called the former prime minister Iyad Allawi's
    comments "nonsense". Allawi claimed that the human rights abuses in Iraq were
    as bad now as they were under Saddam Hussein. Talabani stated that the government
    was against any form of torture or harming of Prisoners. (Australian Broadcasting
    Corporation)
  - Reports that Darshan Singh has been dismissed as chief hangman of Singapore are
    denied by prison officials. They would not say if he would perform the hanging
    of Nguyen Tuong Van. (ABC)
  - 'Canadian federal election, 2006: Prime Minister Paul Martin''s minority government
    is defeated in a confidence motion by a vote of 171 - 133. The Prime Minister
    announces he will request a dissolution of parliament from the Governor General
    tomorrow. (CBC).'
  - The tribunal trying Saddam Hussein and seven co-defendants adjourned for a second
    time after hearing posthumous evidence. (BBC)
  - EU Justice commissioner Franco Frattini makes an unprecedented call for the suspension
    of privileges, for any member state found to have hosted a CIA black site. (ABC)
  - Running water is restored to the city of Harbin, in Heilongjiang, China after
    several days of a water cut-off due to the toxic benzene spill. Yilan County,
    Heilongjiang, however, is still without running water. (The Guardian)
  - The United Nations Climate Change Conference opens in Montreal. - (Government
    of Canada)
