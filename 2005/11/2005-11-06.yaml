Date: '2005-11-06'
Source_URI: Portal:Current events/2005 November 6
Intelligence_Payload:
  Uncategorized:
  - A bomb explosion near a convoy of cars carrying Somalia's Prime Minister Ali Mohammed
    Ghedi in Mogadishu. Although the PM escapes unhurt, 9 people have been killed
    and 20 others wounded. (Reuters) (Link dead as of 20:57, 14 January 2007 (UTC))
  - Former Peruvian President Alberto Fujimori arrives in Santiago, Chile after being
    exiled in Japan since 2000. Although he is the subject of an Interpol arrest warrant,
    the Chilean government said he cannot be arrested without an order from a Chilean
    judge. Fujimori arrives at a time of tension between Chile and Peru over sea boundaries.
    (CNN) (Link dead as of 22:17, 14 January 2007 (UTC))
  - People in several parts of Germany report several fireballs in the sky, leading
    to speculation that they may be UFOs. Scientists report that the sightings are
    of the Taurid meteor shower. (Yahoo! News) (Link dead as of 20:57, 14 January
    2007 (UTC))
  - Azerbaijani citizens go to the polls in the Azerbaijan parliamentary election,
    2005. Opposition parties have alleged that there is voting fraud. (Reuters) (Link
    dead as of 22:17, 14 January 2007 (UTC))
  - The tenth night of the 2005 French riots is reported as being the most intense
    yet, and the riots are now the subject of crisis meetings in the French government.
    President Jacques Chirac has called for the arrest, trial and punishment of the
    rioters. (BBC)
  - A tornado estimated to be over ½ mile wide and of F3 strength on the Fujita scale
    hits around 2 a.m. near Evansville, Indiana. Over 20 are killed and 200 injured.
    (National Weather Service) (Yahoo! News) (Link dead as of 20:57, 14 January 2007
    (UTC))
  - Show called The Boondocks first airs on Adult Swim, a late night segment of Cartoon
    Network.
