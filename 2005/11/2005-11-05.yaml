Date: '2005-11-05'
Source_URI: Portal:Current events/2005 November 5
Intelligence_Payload:
  Uncategorized:
  - The 400th anniversary of Guy Fawkes' attempt to blown up parliament with King
    James I of England inside.
  - The Seabourn Cruise Line cruise ship The Seabourn Spirit evades an attack by pirates
    off the coast of Somalia. (Yahoo! News) (Link dead as of 21:17, 14 January 2007
    (UTC))
  - Archaeologists in Israel discover a rare early Christian church, dating to circa
    AD 300. The church was uncovered near the prison at Megiddo. (Reuters) (Ynetnews)
  - Pope Benedict XVI prepares to enact new rules restricting homosexual men from
    entering the seminary, claiming that the action will help to curb the Roman Catholic
    Church sex abuse scandal. In response, Gene Robinson, the first openly gay U.S.
    ordained Episcopalian bishop, calls it "an act of violence that needs to be confronted."
    (Gazette-Times) (Yahoo) (Link dead as of 21:17, 14 January 2007 (UTC)) (ABC)
  - The final episode of The Red Green Show aired, ending at exactly 300 episodes
    at the end of season 15.
