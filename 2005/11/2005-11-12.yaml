Date: '2005-11-12'
Source_URI: Portal:Current events/2005 November 12
Intelligence_Payload:
  Uncategorized:
  - Amir Peretz, the new head of the Israeli Labor Party, warns Israeli Prime Minister
    Ariel Sharon that if Sharon does not pick a date for an early election, Peretz
    will institute a motion of no-confidence forcing a snap election within 90 days.
  - Tens of thousands of people gather at Rabin Square in Tel Aviv in a rally to mark
    a decade since the assassination of Prime Minister Yitzhak Rabin. (Ynetnews)
  - Harry Potter and the Goblet of Fire premieres at the Ziegfeld Theatre in New York
    City
  Iraq War:
  - The UN Secretary-General Kofi Annan, makes a surprise visit to Iraq and expresses
    support for an Arab League conference discussing cooperation with Iraq's many
    factions. (BBC)
  - Four people die following a car bomb in Baghdad. (BBC)
