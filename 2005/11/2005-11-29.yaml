Date: '2005-11-29'
Source_URI: Portal:Current events/2005 November 29
Intelligence_Payload:
  Uncategorized:
  - The 2005 Atlantic hurricane season nears its official end but the 26th named storm
    of the season, Tropical Storm Epsilon, forms from a non-tropical low east of Bermuda.
    (US NHC) (CNN)
  - Virginia Governor Mark R. Warner grants clemency in the case of convicted murderer
    Robin Lovitt. It was about 24 hours before Lovitt was scheduled to be executed.
    Evidence against Lovitt had been illegally destroyed after his trial by a court
    clerk, preventing DNA testing that may have cleared him of the crime. Lovitt's
    execution was to be the 1,000th execution in the United States since the Supreme
    Court reinstated the death penalty in 1976. (Reuters)
  - Former Israeli Prime Minister Shimon Peres says he may leave the Israeli Labor
    Party to join Ariel Sharon's government after the next election if he is re-elected
    and if Sharon's new party is to form a government. (ABC)
  - The Government of Lesotho offers all its citizens a free HIV test. Aimed at stopping
    and reversing the spread of AIDS, this is believed to be the first programme of
    its kind in the world. (BBC)
  - President of the Palestinian Authority, Mahmoud Abbas, has cancelled the Fatah
    Primary Elections after accusations of voter fraud were made. (BBC)
  - Colonel Lawrence Wilkerson, a top aide to former Secretary of State Colin Powell,
    accused Vice-President Dick Cheney of ignoring a decision by President Bush on
    the treatment of prisoners in the war on terror. (BBC)
  - Two bomb attacks occur in the Bangladeshi cities of Chittagong and Gazipur. Six
    people are killed and 65 others wounded. (Reuters)
  - Activist investor Carl Icahn announces that he has hired Lazard to advise him
    as he wages a proxy fight for control of Time Warner, the media empire. (thestreet.com)
  - Canadian federal election, 2006 - Canadian Governor General Michaëlle Jean formally
    dissolves Parliament, following Prime Minister Paul Martin's loss of a confidence
    vote, and calls a federal election for January 23, 2006. (Toronto Star)
