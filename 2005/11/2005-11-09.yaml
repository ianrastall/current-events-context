Date: '2005-11-09'
Source_URI: Portal:Current events/2005 November 9
Intelligence_Payload:
  Uncategorized:
  - Facing the world's highest HIV infection rate, Swaziland is drafting a Sexual
    Offences and Domestic Violence Bill proposing the death penalty for child rape,
    incest and the intentional transmission of HIV. Amnesty International later expresses
    concern.
  - Amir Peretz is elected leader of the Israeli Labor Party, narrowly defeating the
    incumbent, Shimon Peres. (BBC)
  - A gun battle between the Indonesian police and militants in East Java kills seven
    militants, including suspected Bali bombings mastermind Azahari Husin who is believed
    to have blown himself up. (Reuters) (Reuters)
  - '2005 Amman bombings: Three coordinated attacks on the Grand Hyatt Hotel, Radisson
    SAS Hotel, and Days Inn in the Jordanian capital of Amman kill at least 57 people
    and injure 115 others, mostly Westerners. Abu Musab al-Zarqawi later claims responsibility.'
  - Archaeologists report that two lines of a Phoenician or Hebrew alphabet on a stone
    dating to the 10th century BCE were discovered in July in Tel Zayit tell in Israel.
    The discovery suggests that literacy existed in ancient Israel earlier than had
    been thought.(IHT) (AP)
  - In the United States, the visit of Iraqi Deputy Premier Ahmed Chalabi to the Department
    of State and Department of the Treasury arouses controversy. (BBC)
  - The British government loses a key House of Commons vote on detaining terrorism
    suspects for 90-days without charge, in the report stage of the Terrorism Act
    2006. This is Tony Blair's first ever commons defeat and has been described a
    serious blow to his authority. Opposition Leader Michael Howard calls on Blair
    to resign. (BBC)
  - Venus Express, the first mission to Venus in over a decade, lifts off from the
    Baikonur Cosmodrome in Kazakhstan. (BBC)
  - 2005 United States elections
  - 'California special election: voters reject all eight statewide ballot propositions,
    including four backed by Governor Arnold Schwarzenegger.'
  - De Baca County, New Mexico sheriff Gary Graves is recalled from office following
    accusations of misappropriation of funds, mistreating prisoners, and sexual harassment.
    (SupremeCourt.NM.org)
  - Judith Miller, controversial reporter for The New York Times, announces her retirement.
    (New York Times)
