Date: '2005-03-05'
Source_URI: Portal:Current events/2005 March 5
Intelligence_Payload:
  Uncategorized:
  - President Bashar al-Assad of Syria announces that Syria will withdraw all 14,000
    troops in Lebanon to the Bekaa Valley area, on the Syrian-Lebanese border. (Reuters)
  - Scientists flock to an area about off the coast of U.S. state of Washington to
    study what appears to be an ongoing undersea volcanic eruption. Accompanying earthquakes
    measuring up to magnitude 4.0 have numbered thousands per day. (Seattle Times)
  - The South African film director Zola Maseko wins the top prize at the 2005 FESPACO
    African film festival for his film Drum. (FESPACO site) (BBC)
  - The Pakistani government is appealing to the Supreme Court of Pakistan after the
    Lahore High Court overturned the death sentences of five of the six men convicted
    for the alleged gang rape of Mukhtaran Bibi in a tribal feud. Daily Times, Pakistan
  - In Niger, government cancels special ceremony that would have released about 7000
    slaves because no slaves appeared. Local human rights group Timidra blames government
    threats against tribal leaders. (News24) (CNN) (Telegraph) (BBC)
  - Chin Peng, leader of communist rebels during Malayan Emergency, asks Malaysian
    court to allow him to return. (Malaysian Star) (New Straits Times) (Reuters India)
