Date: '2005-03-19'
Source_URI: Portal:Current events/2005 March 19
Intelligence_Payload:
  Uncategorized:
  - A 7.0 magnitude earthquake hits Japan's southernmost main island of Kyūshū. Japan's
    Meteorological Agency emits warnings for tsunamis that could hit areas including
    the coast of Kyūshū. (CNN)
  - One Briton killed and 12 people wounded by a car bomb in Doha, Qatar. (Al-Jazeera)
    (BBC)
  - Pakistan successfully test-fires a long-range nuclear-capable ballistic missile,
    Shaheen-II, the latest in a series of tests. Shaheen-II can travel up to 2,000
    km and carry all kinds of warheads. (Pakistan Times) (Daily Times, Pakistan) (Times
    of India)
  - G20 group of the developing countries calls on rich nations to end their farming
    subsidies in five years (Reuters) (Business Week) (Bloomberg) (BBC)
  - Manny Pacquiao and Erik Morales met for their first of three epic boxing matches.
    Morales won the 12-round bout by unanimous decision. Pacquiao would later revenge
    the bout, fighting Morales two more times, winning both by knockoutt.
