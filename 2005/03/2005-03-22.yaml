Date: '2005-03-22'
Source_URI: Portal:Current events/2005 March 22
Intelligence_Payload:
  Uncategorized:
  - The World Hockey Association announces that a six-team tournament, the "Bobby
    Hull Invitational", will take place in May 2005 in Vancouver, British Columbia,
    Canada. (ESPN)
  - Israel hands over control of Tulkarm to the Palestinian Authority. (BBC)
  - Prince Rainier III of Monaco, hospitalized for the past two weeks with a pulmonary
    infection, is moved to intensive care. (Yahoo! News) (Link dead as of 03:13, 15
    January 2007 (UTC))
  - In Chile, Paul Schäfer, former leader of Colonia Dignidad, is charged with involvement
    in the 1976 disappearance of Juan Maino, activist and opponent of the regime of
    Augusto Pinochet. (Reuters AlertNet) (Prensa Latina) (BBC)
  - In Kyrgyzstan, President Askar Akayev's spokesman claims that the protests are
    a coup attempt planned by "drug mafia". (Pravda) (CNN) (Link dead as of 03:13,
    15 January 2007 (UTC))
  - In the Democratic Republic of Congo, authorities say they have arrested many senior
    members of militia groups in Ituri, including Thomas Lubanga of the Union of Congolese
    Patriots. (Reuters AlertNet) (Link dead as of 03:13, 15 January 2007 (UTC)), (ReliefWeb)
    (BBC)
  - United Nations declares World Water Day, starting a decade-long Water for Life
    campaign for clean water. (UN News Centre) (ABC) (Reuters AlertNet) (Link dead
    as of 03:13, 15 January 2007 (UTC)), (BBC)
  - Nigerian President Olusegun Obasanjo sacks education minister Fabian Osuji for
    corruption. (Vanguard, Nigeria) (AllAfrica) (Reuters SA) (Link dead as of 03:13,
    15 January 2007 (UTC))
  - German airline Lufthansa announces its takeover of Swiss Airlines. (Swissinfo)
    (Bloomberg)
  - In Italy, the Council of State allows Alessandra Mussolini to stand in elections.
    (AGI) (BBC)
  - In India, numerous bank workers take part in a one-day strike to protest government
    reforms and bank merges they say will lead to job cuts. (New Kerala) (Hindustan
    Times) (BBC)
  - The Indian government bans veterinary drug diclofenac because of a connection
    to the near extinction of vultures. (Indian Express) (BBC)
  - Ex-president of Peru, Alberto Fujimori, plans to finance his coming presidential
    campaign with Fuji-Cola. Fujimori is in exile in Japan, is wanted for corruption,
    murder and kidnapping and is legally banned from holding public office in Peru
    until 2010 (Reuters) (Link dead as of 03:13, 15 January 2007 (UTC)), (BBC)
  - In Angola, at least 96 people have died of Marburg virus. (ReliefWeb) (Reuters
    SA) (Link dead as of 03:13, 15 January 2007 (UTC)), (News24) (CIDRAP)
