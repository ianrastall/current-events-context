Date: '2005-03-25'
Source_URI: Portal:Current events/2005 March 25
Intelligence_Payload:
  Uncategorized:
  - Several Imax cinemas in the US (in Texas, Georgia and the Carolinas) have chosen
    not to show the film "Volcanoes of the Deep Sea" in light of its reference to
    the theory of evolution. (BBC)
  - Doctors at a Monaco hospital call the condition of Prince Rainier III "worrying"
    and are unsure if he will recover from heart and renal failure. He remains on
    a ventilator. (Yahoo! News)
  - Good Friday was celebrated all over the world. Processions with statues representing
    the Passion of Christ (Way of the Cross) were held all over Malta. [NEWSLINK MISSING].
  Tulip Revolution in Kyrgyzstan:
  - Kyrgyz opposition leader Kurmanbek Bakiyev is named interim President of Kyrgyzstan,
    while ousted President Askar Akayev remains defiant. (Reuters)
  - Looters ransack the capital city of Bishkek following the protests.
