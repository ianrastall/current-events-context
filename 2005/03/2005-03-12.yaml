Date: '2005-03-12'
Source_URI: Portal:Current events/2005 March 12
Intelligence_Payload:
  Uncategorized:
  - President Hu Jintao of the People's Republic of China is elected to be chairman
    of the Central Military Commission by the 3rd Plenum of the 10th National People's
    Congress. (Xinhua) (Reuters) (NBC-WTSM) (CCTV)
  - The State Council of the People's Republic of China approves the resignation of
    Hong Kong's Chief Executive Tung Chee-Hwa, who then becomes a vice-chairman of
    the Political Consultative Conference, an advisory body. (Channel News Asia) (Xinhua)
  - Ukraine begins to pull its troops out of Iraq. (VOA) (Al Jazeera) (Guardian)
  - Local council elections in Malta are to take place. Results initially appear to
    favour the Malta Labour Party. (di-ve)
