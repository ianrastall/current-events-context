Date: '2005-03-20'
Source_URI: Portal:Current events/2005 March 20
Intelligence_Payload:
  Uncategorized:
  - US Secretary of State Condoleezza Rice arrives in Beijing for the last leg of
    her six-country Asian trip. Rice met with President Hu Jintao and Premier Wen
    Jiabao; talks about North Korea nuclear missiles program and Taiwan are on the
    top of the agenda. (CNN) (China Daily)
  - Protesters in Kyrgyzstan march against electoral fraud in the 2005 Kyrgyz parliamentary
    elections, and appear to have taken control of the southern town of Jalal-Abad
    after mounting large-scale demonstrations to demand Askar Akayev to step down
    as President of Kyrgyzstan. (Reuters), (BBC), (CNN)
  - Floods in Afghanistan kill more than 200. Coalition helicopters are dispatched
    to save people (Bloomberg) (Hi Pakistan) (BBC)
  - In Azerbaijan, president Ilham Aliyev announces pardons for 114 people, including
    7 opposition leaders and total of 50 political prisoners (Azertag) (CASCFEN) (BBC)
  - Serbian government states that Bosnian Serb general Vinko Pandurević will surrender
    to war crimes tribunal at the Hague. He is charged with genocide connected to
    Srebrenica massacre in 1995 (FENA) (B92) (Reuters)
