name: Daily Wikipedia Update

on:
  schedule:
    - cron: "30 23 * * *" # 11:30 PM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mwparserfromhell pyyaml

      - name: Run Script for Today
        run: python update_data.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "No changes today. Skipping commit."
          else
            git commit -m "Automated daily update for $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi