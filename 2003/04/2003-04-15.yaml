Date: '2003-04-15'
Source_URI: Portal:Current events/2003 April 15
Intelligence_Payload:
  Uncategorized:
  - Abu Abbas captured by United States forces in Iraq.
  - Parliament of Finland elects Anneli Jäätteenmäki as the nation's first woman Prime
    Minister.
  - In New York, Omar Portee, founder and leader of the United Blood Nation, receives
    a sentence of 50 years in jail. He had been convicted in August of racketeering,
    murder conspiracy, credit card fraud and drug selling.
  - 10 Iraqis are reported killed and 16 injured in the city of Mosul. Marines insist
    they were fired at, survivors say demonstrators only threw stones.
