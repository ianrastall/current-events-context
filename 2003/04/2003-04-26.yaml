Date: '2003-04-26'
Source_URI: Portal:Current events/2003 April 26
Intelligence_Payload:
  Uncategorized:
  - Unknown assailants fire incendiary devices on an ammunition dump in suburban Baghdad,
    triggering hours of explosions. American sources put the casualties at six dead
    and four wounded; Iraqi sources state 25 wounded. U.S Army 3rd Infantry Division
    the 11th Engineer Battalion Charlie Co. ASP(Ammo Security Point)89 tons of confiscated
    munitions exploded after an enemy attack.
  - Winnie Mandela is sentenced to four years in prison (five years, less one-year
    suspended) for theft and fraud.
  - Hiker and mountain climber Aron Ralston is stuck for five days in Blue John Canyon
    after an 800-pound rock falls on his right arm, pinning it to the canyon wall.
