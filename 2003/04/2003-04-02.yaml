Date: '2003-04-02'
Source_URI: Portal:Current events/2003 April 2
Intelligence_Payload:
  Uncategorized:
  - Iraqi military forces light oil wells on fire while retreating in the face of
    overwhelming US military might. This was considered an act of environmental terrorism.
  - U.S. Brigadier General Vincent K. Brooks claims the Baghdad division of the Iraqi
    Republican Guard was "destroyed". Iraq information minister Muhammad Saeed al-Sahhaf
    responded that this was another American "lie".
  - The Iraqi Information Ministry bans Qatar-based Al Jazeera satellite television
    from Baghdad.
