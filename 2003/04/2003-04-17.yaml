Date: '2003-04-17'
Source_URI: Portal:Current events/2003 April 17
Intelligence_Payload:
  Uncategorized:
  - 2003 invasion of Iraq
  - Australian Prime Minister John Howard announces that Australian forces in Operation
    Falconer will completely pull out by June.
  - The Bechtel Corporation is awarded a contract for the rebuilding of parts of Iraq's
    electricity system, water supplies and other key infrastructures.
  - Barzan Ibrahim al-Tikriti, top advisor and half-brother of Saddam Hussein is captured
    by U.S. forces (the second of Hussein's half brothers captured this week).
  - Save the Children announces that U.S. forces continue to prevent their airplane
    from landing in Arbil, Iraq to deliver medical supplies and emergency feeding
    kits. U.S. officials contend that the area is not yet safe, while the United Nations
    has already declared Arbil a "safe and secure" area.
  - Martin Sullivan and Gary Vikan, of the U.S. Presidential Advisory Committee on
    Cultural Property, announced their resignations in protest of the US failure to
    prevent looting of the Iraqi National Museum.
  - Sir John Stevens releases the Stevens Report, which states that the police and
    other security services in Northern Ireland colluded in the murders of many innocent
    people, including Pat Finucane and Francisco Notarantonio, in the 1970s and 1980s.
