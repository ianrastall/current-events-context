Date: '2003-04-12'
Source_URI: Portal:Current events/2003 April 12
Intelligence_Payload:
  Uncategorized:
  - Looting and lawlessness plague Baghdad. Hospitals looted, humanitarian aid hindered
    by unsafe conditions.
  - Prince Laurent of Belgium marries British-born 'commoner' Claire Coombs at the
    St. Michael and Gudula Cathedral in Brussels.
  - Poet Linda Gregerson receives the $100,000 Kingsley Tufts Poetry Award for her
    collection Waterborne. The award is presented annually by the Claremont Graduate
    University for a "mid-career poet". Joanie Mackowski receives the $10,000 Kate
    Tufts Discovery Award.
  - 'Canadian scientists announce that they have sequenced the genome of the virus
    which is thought to cause Severe acute respiratory syndrome. The sequence is published
    on their website: http://www.bcgsc.ca/bioinfo/SARS/. (News item:)'
  - 14th annual Thunder Over Louisville is held in Louisville, Kentucky.
