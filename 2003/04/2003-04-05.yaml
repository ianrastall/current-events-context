Date: '2003-04-05'
Source_URI: Portal:Current events/2003 April 5
Intelligence_Payload:
  Uncategorized:
  - The Senate of Belgium approves a change in the nation's war crimes law so that
    it will no longer apply to citizens of nations with sufficient human rights laws.
    The House of Representatives had already approved the change. The law had been
    used in the past to charge such people as George H. W. Bush, Colin Powell and
    Ariel Sharon with war crimes, and had interfered with Belgium's international
    relations.
  - Monty's Pass wins the Grand National
