Date: '2003-04-06'
Source_URI: Portal:Current events/2003 April 6
Intelligence_Payload:
  Uncategorized:
  - British forces step up their presence in the southern Iraq city of Basra. According
    to embedded journalists, the citizens of Basra braved gunfire to dance in the
    streets and cheer for the British troops. UPI's Chief International Correspondent
    Martin Walker claimed that he had witnessed at least one Basra citizen kiss a
    British tank.
  - In a friendly fire incident during the battle of Debecka Pass, U.S. warplanes
    struck a convoy of allied Kurdish fighters and U.S. Special Forces during a battle
    in northern Iraq. At least 18 people are killed and more than 45 wounded, including
    senior Kurdish commanders.
