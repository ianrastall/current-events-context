Date: '2003-04-18'
Source_URI: Portal:Current events/2003 April 18
Intelligence_Payload:
  Uncategorized:
  - Iraqi Police arrest Saddam Hussein's former finance minister, Hikmat Mizban Ibrahim
    al-Azzawi in Baghdad, and turn him over to U.S. Marines.
  - United States forces announce that a "disease control" plant in Baghdad has been
    raided by unknown persons, and strains of cholera, black fever, HIV, polio and
    hepatitis may have been lost.
  - DNA testing proved that the bodies found on the shores of San Francisco Bay were
    those of the missing Laci Peterson and her unborn son. Peterson's husband, Scott,
    was arrested in La Jolla, California, and returned to their home town of Modesto,
    California, for trial.
  - United States Army troops found over dollars in United States and Iraqi currency
    in sealed metal boxes in several bricked up cottages on the grounds of the homes
    of members of the Iraqi elite in Baghdad. Preliminary indications were that the
    money was real uncirculated bills, and not counterfeit.
