Date: '2003-04-29'
Source_URI: Portal:Current events/2003 April 29
Intelligence_Payload:
  Uncategorized:
  - The World Health Organization lifts the SARS travel warning for Toronto.
  - Leaders of member countries of ASEAN and the Premier of the People's Republic
    of China held an emergency summit in Bangkok, Thailand in order to address the
    SARS problem. Among the decisions made were the setting-up of a ministerial-level
    task force and uniform pre-departure health screening in airports.
  - Israeli forces assassinate three Palestinian militants in Gaza, including Nidal
    Salamah, a leader of the Popular Front for the Liberation of Palestine. The action
    prompts accusations that Israel is trying to sabotage the Palestinian government's
    attempts to transform itself.
  - Mahmoud Abbas is confirmed as the first Palestinian Authority prime minister after
    winning a vote of confidence from the Palestinian legislature.
  - The United States announces that it will be reducing its military presence in
    Saudi Arabia to a handful of advisors.
  - Lynn Htun, suspected of being the head of the Fluffi Bunni computer cracker ring,
    is arrested in London.
  - Quebec premier-elect Jean Charest is sworn in and names his cabinet.
