Date: '2003-04-11'
Source_URI: Portal:Current events/2003 April 11
Intelligence_Payload:
  Uncategorized:
  - The northern Iraqi city of Mosul falls to coalition forces as the Iraqi army's
    fifth Corps offers a letter of surrender. The only remaining major city left to
    fall is Saddam Hussein's hometown of Tikrit, where some expect the remaining regime
    loyalists to make their final stand.
  - Europe's largest civil engineering project, and the world's largest single metro
    expansion project, is officially opened in Madrid. MetroSur, a 40-kilometre loop
    of the Madrid Metro in the southern suburbs of the city, took under three years
    to complete.
  - Cuba executes three men charged with terrorism for hijacking a passenger ferry
    on April 2. Another four men receive life sentences.
  - In response to Baseball Hall of Fame president Dale Petroskey's April 8 decision
    to cancel a 15th anniversary celebration of "Bull Durham, sportswriter Roger Kahn
    cancels a planned appearance at the baseball museum.
  - Tom Hurndall, a British photojournalist is shot in the head by an Israeli sniper
    in Rafah, Gaza Strip.
