Date: '2003-04-21'
Source_URI: Portal:Current events/2003 April 21
Intelligence_Payload:
  Uncategorized:
  - 'Boston Marathon: Robert Kipkoech Cheruiyot wins in 2:10:11, Svetlana Zakharova
    in 2:25:20 (legally blind American Marla Runyan finishes fifth), Ernst Van Dyk
    and Christina Ripp win the wheelchair races in 1:28:32 and 1:54:57 respectively.'
  - Vote counting in Nigeria heavily favors Olusegun Obasanjo; opposition makes accusations
    of electoral fraud.
  - The International Criminal Court elects its first prosecutor, Luis Moreno Ocampo.
  - British pop group S Club announce that they are splitting up after four years.
    The announcement was made in the London Arena by the six remaining members of
    the group.
