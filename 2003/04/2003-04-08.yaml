Date: '2003-04-08'
Source_URI: Portal:Current events/2003 April 8
Intelligence_Payload:
  Uncategorized:
  - U.N. International Atomic Energy Agency chief Mohamed ElBaradei reiterates a statement
    he made on March 31, to which the United States has yet to respond, that only
    the UN IAEA has a mandate to search out and destroy any nuclear weapons or parts
    of a nuclear weapons program found in Iraq.
  - Hong Kong health officials say that spread of severe acute respiratory syndrome
    may mean it is going to be around for a while. World Health Organization officials
    are cautiously optimistic that it can be contained.,
  - The Iraqi ambassador to the Arab League, Mohsen Khalil, announces that "Iraq has
    now already achieved victory – apart from some technicalities."
  - 'Deaths of three journalists in Baghdad: Two American air to surface missiles
    hit the Qatar satellite station Al Jazeera''s office in Baghdad and kill a reporter
    and wound a cameraman. U.S. Officials said that the offices were not targeted,
    but were right next to the Iraqi Ministry of Information building which was a
    target. The nearby office of Arab satellite channel Abu Dhabi is also hit by air
    strikes. Al Jazeera accuses the U.S. of attacking Arab media to hide facts. On
    the same day a U.S. tank fires into the 15th floor of the Palestine Hotel in Baghdad,
    where almost all remaining foreign journalists are based, and kills two cameramen
    and wounds three. In the Abu Dhabi case the station airs the picture of Iraqi
    fire from beneath of the camera. In the hotel case, however, other journalists
    on the scene deny any fire from or around the hotel.,'
  - Baseball Hall of Fame president Dale Petroskey cancels a planned celebration for
    the 15th anniversary of "Bull Durham." Petroskey cites recent comments made by
    film co-stars Tim Robbins and Susan Sarandon as potential dangers to U.S. troops
    in Iraq. The celebration was to take place April 26 and 27.
