Date: '2003-04-23'
Source_URI: Portal:Current events/2003 April 23
Intelligence_Payload:
  Uncategorized:
  - A U.S. commanding officer in Baghdad announces that five U.S. soldiers are under
    investigation for the theft of hundreds of thousands of dollars from caches of
    money found in Iraq.
  - The British and Irish governments publicly ask three questions of the IRA. Depending
    on clarification offered, the Northern Ireland Executive may be reinstated or
    the Assembly elections postponed.
  - New Jersey re-ratifies the 14th Amendment, having ratified and subsequently rescinded
    support for the amendment in the late 19th century.https://www.nj.gov/state/archives/doc14thamendment.html#SJR16
