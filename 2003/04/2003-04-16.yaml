Date: '2003-04-16'
Source_URI: Portal:Current events/2003 April 16
Intelligence_Payload:
  Uncategorized:
  - A Bush administration official announces that the United States, People's Republic
    of China, and North Korea will meet in Beijing from April 23 to April 24 to discuss
    North Korea's suspected nuclear weapons program. The United States had refused
    bilateral discussions with North Korea since October 2002, insisting on multinational
    talks. The United States will be represented by Assistant Secretary of State James
    Kelly.
  - The Helsingin Sanomat reports that in late March, a RITEG-beacon was disassembled
    by thieves in Kurgolovo, Russia, who dumped the highly radioactive nuclear material
    into the Gulf of Finland, 100 km south of Finland.
  - Michael Jordan plays his final game in the NBA prior to his retirement.
