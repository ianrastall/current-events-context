Date: '2003-04-25'
Source_URI: Portal:Current events/2003 April 25
Intelligence_Payload:
  Uncategorized:
  - United States Army secretary Thomas E. White resigns amidst tensions with Secretary
    of Defense Donald Rumsfeld over the direction future Army weapons development
    programs should take, and controversy surrounding White's previous employer, Enron.
    The Pentagon declines to provide specifics on the circumstances of his resignation.
