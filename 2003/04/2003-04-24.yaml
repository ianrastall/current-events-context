Date: '2003-04-24'
Source_URI: Portal:Current events/2003 April 24
Intelligence_Payload:
  Uncategorized:
  - '2003 Iraq war: Iraqi former Deputy Prime Minister Tariq Aziz surrenders himself
    to U.S. forces'
  - The Dixie Chicks pose nude on the cover of Entertainment Weekly, with political
    slogans on their bodies, in response to their critics' reaction to lead singer
    Natalie Maines' derogatory remark against U.S. President George W. Bush.
  - In the Red Lion Area Junior High School cafeteria (Red Lion, Pennsylvania), eighth-grader
    James Sheets, carrying multiple weapons, fatally shoots the principal, Eugene
    Segro, and then fatally shoots himself. Two years earlier, the same school district
    was the site of a machete attack that injured another principal, two teachers
    and 11 pupils.
  - Winnie Mandela is found guilty of theft and fraud involving funds of the African
    National Congress and faces up to fifteen years in prison.
  - The Canadian federal fisheries minister, Robert Thibault, announces the complete
    closure of the Atlantic cod fishery, in order to prevent the commercial extinction
    of cod.
  - An article in Nature states that the chemical pyrroloquinoline quinone should
    be classed as one of the B vitamins.
  - A massive intrusion of fish occurs at the water inlet of the Donald C. Cook Nuclear
    Generating Station, causing a plant shutdown for approximately 25 hours.
  - Microsoft releases Windows Server 2003.
