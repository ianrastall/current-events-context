Date: '2003-04-10'
Source_URI: Portal:Current events/2003 April 10
Intelligence_Payload:
  Uncategorized:
  - United States Green Berets and Kurdish fighters enter the city of Kirkuk in Iraq
    with little resistance. Turkey and U.S., in separate statements, say they will
    not allow the Kurds to occupy the city.,
  - British Airways and Air France simultaneously announce that they will retire the
    supersonic Concorde aircraft. Passenger numbers had never recovered following
    a crash that killed 113 in 2000. In response, Sir Richard Branson offers to buy
    British Airways' Concordes for £1 for the use of his Virgin Atlantic Airlines.
    BA dismisses the offer as a stunt and indicates that the planes will go to air
    museums.
  - A fire destroys a boarding school for the deaf in Makhachkala, Russia, killing
    28 children, aged eight to 14. About 100 other children suffer burns and smoke
    inhalation, 39 of which are in serious condition.
