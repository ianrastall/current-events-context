Date: '2003-04-28'
Source_URI: Portal:Current events/2003 April 28
Intelligence_Payload:
  Uncategorized:
  - At Falluja, 50 km from Baghdad, American soldiers from the 82nd Airborne opened
    fire on a group of protesters, killing between six and 17 and leaving others injured.
    The incident occurred during a demonstration outside a local school were American
    forces were stationed. The day before two soldiers were wounded in Ramadi when
    a hand grenade was thrown from a crowd. Different versions of the incident exist.
    two days later on April 30, 2003, another shooting incident occurred in which
    three people died. After the incidents relations with the populus of Falluja soured,
    and tensions would continue to build until the November 2004 Battle of Falluja.
  - The World Health Organization announces that SARS has peaked in all affected countries
    except the People's Republic of China. These countries include Canada, Singapore,
    and Vietnam, as well as Hong Kong.
  - SARS is made only the fourth disease, after plague, yellow fever, and cholera,
    that countries are required to report to the World Health Organization.
  - Apple Computer revealed a new online music store, entitled the iTunes Music Store,
    for its iTunes and iPod products. Each song can be downloaded for 99 cents and
    there is no subscription fee.
  - A Mexicana de Aviación jet is forced to land at San Francisco International Airport
    in California after the pilot accidentally sets off the anti-terror alarm.
