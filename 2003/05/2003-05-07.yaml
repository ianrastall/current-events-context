Date: '2003-05-07'
Source_URI: Portal:Current events/2003 May 7
Intelligence_Payload:
  Uncategorized:
  - Nearly 40,000 manuscripts and 700 artifacts belonging to the National Museum of
    Iraq in Baghdad are recovered by U.S. Customs agents working with museum experts
    in Iraq. Some looters had returned items after promises of rewards and amnesty,
    and many items previously reported missing had actually been hidden in secret
    storage vaults at the museum prior to the outbreak of war.
  - A five-hour transit of Mercury takes place, an event that occurs only 13 times
    per century on average.
