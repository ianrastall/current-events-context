Date: '2003-05-31'
Source_URI: Portal:Current events/2003 May 31
Intelligence_Payload:
  Uncategorized:
  - Eric Robert Rudolph, a suspect in the Centennial Olympic Park bombing at the 1996
    Summer Olympics and other bombings in the Atlanta, Georgia area, is arrested behind
    a grocery store in North Carolina
  - United States President George W. Bush visits the location of the former death
    camp at Auschwitz. He is only the second president to do so, after Gerald Ford
    toured the camp in 1975.
  - The final flight of an Air France Concorde takes place, landing at Charles de
    Gaulle Airport. British Airways plans to retire its Concorde fleet at the end
    of October.
  - Peter MacKay is elected leader of the Progressive Conservative Party of Canada,
    replacing retiring leader Joe Clark.
