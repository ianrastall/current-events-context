Date: '2003-05-13'
Source_URI: Portal:Current events/2003 May 13
Intelligence_Payload:
  Uncategorized:
  - The Bureau of Engraving and Printing of the Treasury Department of the United
    States releases a new 20 dollar note, aimed at defeating the technological advances
    of counterfeiters. The note is expected to begin circulating in the fall of 2003;
    which is five years since the last $20 note was released in 1998. New designs
    for the $50 and $100 notes will follow in 2004 and 2005. The most distinctive
    change in the new currency design is in color. It is the first U.S. currency since
    1905 to include colors other than green and black. Different colors for different
    denominations will make it easier to tell one note from another, and more difficult
    to counterfeit. The New Color of Money Web site (includes images)
  - Much of France comes to a standstill in a general strike of the public and private
    sectors.
  - Russian officials identify Arab militant Abu Walib as the mastermind behind the
    May 12 bombing in Znamenskoye, Chechnya, and claim links between that incident
    and the bombings in Riyadh 14 hours later.
  - A suicide bombing occurs at a religious festival in the town of Iliskhan-Yurt,
    in southeastern Chechnya. At least 14 people are killed by the bombing. The attack
    is apparently an attempt to assassinate Akhmad Kadyrov, the Moscow-appointed chief
    administrator of Chechnya. Kadryov escaped injury.,
