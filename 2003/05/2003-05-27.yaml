Date: '2003-05-27'
Source_URI: Portal:Current events/2003 May 27
Intelligence_Payload:
  Uncategorized:
  - Israeli prime minister Ariel Sharon states that the "occupation" of Palestinian
    territories is "a terrible thing for Israel and for the Palestinians" and "can't
    continue endlessly." Sharon's phraseology prompts shock from many in Israel, leading
    to a clarification that by "occupation," Sharon meant control of millions of Palestinian
    lives rather than actual physical occupation of land.
  - 'SCO v. IBM Linux lawsuit: Novell enters the lawsuit between the SCO Group and
    IBM with a press release concerning the SCO Group''s ownership of UNIX. "To Novell''s
    knowledge, the 1995 agreement governing SCO''s purchase of UNIX from Novell does
    not convey to SCO the associated copyrights," a letter to the SCO Group''s CEO
    Darl McBride said in part. "We believe it unlikely that SCO can demonstrate that
    it has any ownership interest whatsoever in those copyrights. Apparently you share
    this view, since over the last few months you have repeatedly asked Novell to
    transfer the copyrights to SCO, requests that Novell has rejected."'
  - The first version of the free and open-source blogging tool WordPress was released.
    It was labelled as Version 0.7, a continuation of the last release of its predecessor,
    b2/cafelog.
