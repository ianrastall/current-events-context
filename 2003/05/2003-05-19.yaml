Date: '2003-05-19'
Source_URI: Portal:Current events/2003 May 19
Intelligence_Payload:
  Uncategorized:
  - White House spokesman Ari Fleischer announces he will resign from his job in the
    summer, citing his desire to see his new wife more and to work in the private
    sector as reasons for his decision.
  - Boobs! The Musical, the World According to Ruth Wallis, by Ruth Wallis, opens
    at the Triad Theater in New York City. Gennifer Flowers is an eventual understudy
    in this play.
