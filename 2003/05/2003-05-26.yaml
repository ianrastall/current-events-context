Date: '2003-05-26'
Source_URI: Portal:Current events/2003 May 26
Intelligence_Payload:
  Uncategorized:
  - A Ukrainian YAk-42 plane crashes in northeast Turkey, near the city of Trabzon,
    killing all aboard. The plane carried 12 crew-members and 62 Spanish soldiers
    returning from a six-month peacekeeping mission in Afghanistan.
  - A draft of the proposed European constitution is unveiled.
  - In the city of Munich (Germany), the SPD and Greens, who have a city hall majority,
    decide in separate meetings to migrate 14,000 city-owned Windows NT PC workstations
    to the SUSE Linux operating system. In spite of personal meetings with Microsoft
    CEO Steve Ballmer and substantial rebates offered on a Microsoft solution, Munich
    now becomes the largest German city to migrate all of its client PCs to Linux.
    As an office suite, OpenOffice.org will be used.
  - Peter Hollingworth resigns as Governor-General of Australia.
