Date: '2003-05-23'
Source_URI: Portal:Current events/2003 May 23
Intelligence_Payload:
  Uncategorized:
  - US Congress passes a tax cut plan. The plan is less than half the size of President
    Bush's original proposal. Vice President Dick Cheney casts the deciding vote,
    breaking the 50–50 tie in the Senate
  - The Euro breaks through its 1999 launch exchange rate of USD 1.1747 for the first
    time.
