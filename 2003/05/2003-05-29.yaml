Date: '2003-05-29'
Source_URI: Portal:Current events/2003 May 29
Intelligence_Payload:
  Uncategorized:
  - 'Space Shuttle Columbia disaster: NASA officials release experimental findings
    proving that the insulation known to have hit the leading edge of Columbia''s
    left wing could have created a gap in between protective heat panels.'
  - A Russian nuclear energy company founded a branch to promote its bid for Finland's
    new nuclear power plant. Competing bids have been submitted by French-German company
    Framatome and General Electric. Finnish power company TVO will make its selection
    in the autumn at the earliest, but by the end of the year at the latest.
  - The Indian Ministry of Defence announced its purchase of Phalcon early warning
    radar systems from Israel. The contract is worth U.S. $.
  - Legendary entertainer Bob Hope celebrates his 100th birthday, quipping "I'm so
    old, they've canceled my blood type."
