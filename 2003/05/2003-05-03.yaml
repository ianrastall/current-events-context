Date: '2003-05-03'
Source_URI: Portal:Current events/2003 May 3
Intelligence_Payload:
  Uncategorized:
  - New Hampshire's famous landmark rock formation, the Old Man of the Mountain, collapses
    overnight.
  - Funny Cide, a gelding, wins the Kentucky Derby.
  - Titular Archbishop of Glendalough and Vatican representative in the United Nations
    in Geneva, Archbishop Diarmuid Martin is named Coadjutor Archbishop of Dublin
    by Pope John Paul II. His appointment is announced to worshippers at St. Mary's
    Pro-Cathedral in Dublin by the Archbishop of Dublin Cardinal Desmond Connell.
    No date is given for Connell's retirement but Martin's appointment takes immediate
    effect.
  - Dar Heatherington, Lethbridge alderman, disappears in Great Falls, Montana, and
    is found three days later, alleging that she had been abducted and raped. A series
    of legal battles later stated that Heatherington had made these charges up, though
    she maintains her innocence.
