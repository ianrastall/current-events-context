Date: '2003-05-20'
Source_URI: Portal:Current events/2003 May 20
Intelligence_Payload:
  Uncategorized:
  - Christine Todd-Whitman announces that on June 27 she will resign her position
    as Administrator of the United States Environmental Protection Agency
  - The Chelsea Flower Show opens
  - A case of BSE ("mad cow disease") in a single cow in Alberta is confirmed by Canadian
    federal and provincial officials. The animal had been destroyed and declared unfit
    for consumption prior to being diagnosed. The US issues a temporary ban on all
    Canadian beef. This is the first North American case of BSE since one in 1993
    involving an animal born in Britain.
  - DARPA's Congressional report announces that the controversial Total Information
    Awareness program will be known as the Terrorist Information Awareness program
    from now on, to emphasize that its purpose is to compile data on terrorists, and
    not to compile dossiers on US citizens.
  - Buffy the Vampire Slayer aired its series finale, concluding the seven year series.
  - The massively-multiplayer online first-person-shooter video game Planetside released
    in North America.
