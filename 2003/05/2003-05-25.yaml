Date: '2003-05-25'
Source_URI: Portal:Current events/2003 May 25
Intelligence_Payload:
  Uncategorized:
  - Israeli Prime Minister Ariel Sharon wins cabinet approval for a peace plan that
    includes the creation of a Palestinian state by 2005.
  - Gus Van Sant is awarded the Palme d'Or at the Cannes Film Festival for his film
    Elephant
  - Cardiff City F.C. defeat Queens Park Rangers F.C. in the Football League Second
    Division play-off final held at The Millennium Stadium in Cardiff, Wales.
