Date: '2003-05-21'
Source_URI: Portal:Current events/2003 May 21
Intelligence_Payload:
  Uncategorized:
  - An earthquake in northern Algeria measures 6.7 on the Richter scale; at least
    1,600 are feared dead and 7,000 injured.
  - An explosion occurs inside the Yale University's Sterling Law School Building
    in New Haven, Connecticut, damaging two rooms. Investigators from the Joint Terrorism
    Task Force respond. No injuries reported. Authorities strongly believe the explosion
    was caused by a pipe bomb.
  - In Britain, the convicted child-killer Mary Bell, now living under a new name
    and assumed identity, wins her High Court battle for anonymity.
  - In a close vote, Ruben Studdard beat out Clay Aiken to become the next American
    Idol.
