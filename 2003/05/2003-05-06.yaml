Date: '2003-05-06'
Source_URI: Portal:Current events/2003 May 6
Intelligence_Payload:
  Uncategorized:
  - Buckingham Palace announces that Prince Edward, Earl of Wessex and his wife, Sophie,
    Countess of Wessex are expecting their first child. The child will be the seventh
    grandchild of Queen Elizabeth II and Prince Philip, Duke of Edinburgh.
  - The United States signs a Free Trade Agreement with Singapore, the first with
    an Asian country.
  - Tiësto releases Nyana.
  - Brian Duchow, a Milwaukee bus driver, is charged with child abuse of a passenger
    with Down syndrome, allegedly hitting him and threatening more abuse. The abuse
    was recorded on an audio tape using a recorder that the parents had put in the
    child's backpack.
