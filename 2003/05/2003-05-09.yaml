Date: '2003-05-09'
Source_URI: Portal:Current events/2003 May 9
Intelligence_Payload:
  Uncategorized:
  - As many as 129 are feared dead after a door opens on a plane flying from Kinshasa
    to Lubumbashi, Democratic Republic of the Congo. The victims were sucked from
    the plane, which returned to Kinshasa after the incident. Although the airline
    to which the plane belongs to is unknown, the plane involved in the tragedy has
    a logo of Ukrainian Cargo Airlines.
  - The United States Senate Armed Services Committee votes to lift a 10-year-old
    ban on the research and development of low-yield nuclear weapons as part of its
    2004 defense-spending bill. The majority of the committee and the Bush administration
    argue that such weapons may in the future become necessary to deal with terrorist
    threats, and to effectively incinerate biological or chemical weapons installations.
    The move is criticized by Democrats who fear that it will increase the risks of
    nuclear proliferation and nuclear escalation in warfare.,
  - The National Association of Evangelicals, a group of evangelical Christians, condemns
    Franklin Graham, Jerry Falwell, Jerry Vines, Pat Robertson and other evangelical
    ministers for anti-Islamic statements.
  - The United States House of Representatives approves a tax-cut measure for over
    10 years. This is less than President George W. Bush originally proposed, but
    more than the Senate's version of the same measure. One highly controversial aspect
    of the President's initial proposal that the House removed is the repeal of the
    tax on dividends paid by corporations to shareholders. There are also important
    differences between the House and Senate bills, and great difficulty is foreseen
    in reconciling them before they may be sent to the President for approval.
