Date: '2003-05-24'
Source_URI: Portal:Current events/2003 May 24
Intelligence_Payload:
  Uncategorized:
  - Police in Lafayette Parish, Louisiana, release information on a new suspect in
    the Baton Rouge Serial Killer case.
  - After a 40-year wait, Russian fans of The Beatles finally get to see former Beatle
    Paul McCartney perform on their soil, on the Red Square in Moscow.
  - Sertab Erener wins the 2003 Eurovision Song Contest for Turkey, held in Riga,
    Latvia.
  - Swedish singer Carola releases her album Guld, Platina och Passion.
