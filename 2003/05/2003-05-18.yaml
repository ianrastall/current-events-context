Date: '2003-05-18'
Source_URI: Portal:Current events/2003 May 18
Intelligence_Payload:
  Uncategorized:
  - The Guardian reporter Andrew Meldrum, the last foreign journalist in Zimbabwe,
    is forcibly deported after covering the country for the last 23 years.
  - In Belgium federal elections take place. The main winners are the social-democratic
    cartel Different Socialist Party–Spirit and the extreme right wing Vlaams Blok.
    The biggest losses are for the green party Agalev.
  - A nationwide referendum on record nine issues takes place in Switzerland. Abolition
    of nuclear power is rejected. Reduction and modernization of army is approved.
    It ends requirement of nuclear bunker in every home and famous bicycle brigade.
  - Indonesian president Megawati Sukarnoputri declares martial law in the breakaway
    republic of Aceh (→ Indonesian offensive in Aceh).
  - In Slovakia, voters approve a referendum on joining the European Union. The referendum
    is only advisory, the decision is in the hands of the national legislature, but
    it is expected to be approved.
