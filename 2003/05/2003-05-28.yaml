Date: '2003-05-28'
Source_URI: Portal:Current events/2003 May 28
Intelligence_Payload:
  Uncategorized:
  - Belgian researchers report a link between trichloramine and rising numbers of
    childhood asthma cases. Trichloramine is a byproduct of reactions between several
    organic substances and chlorine, a chemical used in large quantities to disinfect
    swimming pools.
  - CBS Evening News reports that the bunker the United States bombed in Baghdad on
    March 20 never existed.
  - In an interview held in Miami, Mike Tyson tells interviewer Greta Van Susteren
    that, because of his being labeled as a rapist, nowadays, he would like to rape
    Desiree Washington.
  - A.C. Milan win the 2002/2003 final of the UEFA Champions League by beating Juventus
    3:2 (penalty shootout) at Old Trafford in Manchester. The game had ended 0–0 before
    the shootout.
  - EU countries will get more financial power. A convent which thinks about the future
    of EU is giving member countries more authority to decide of their own finance
    politics. Countries not belonging to EMU couldn't take part in these decisions.
