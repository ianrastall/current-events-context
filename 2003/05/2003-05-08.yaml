Date: '2003-05-08'
Source_URI: Portal:Current events/2003 May 8
Intelligence_Payload:
  Uncategorized:
  - 30 German passengers and the driver of a tourist bus are killed by a train collision
    at a railroad crossing near Siofok, Hungary. 12 people are injured. Most of the
    passengers came from Lower Saxony or Schleswig-Holstein.
  - A vulnerability in the Microsoft Passport Internet authentication system is announced
    which allows an attacker to change a victim's password and thereby hijack their
    account. This affects Hotmail and other Passport-enabled systems, allowing an
    attacker to use a victim's email account and obtain other personal data such as
    credit card numbers.,
  - The Russian mathematician Dr Grigori Perelman claims to have resolved the Poincaré
    conjecture.
  - In New York City, the World Boxing Council declares itself bankrupt, to avoid
    paying a former world champion dollars after the former boxer wins a lawsuit against
    the organization.
  - King Mohammed VI of Morocco releases 9459 prisoners from Morocco's prisons in
    celebration of the birth of his first son and heir, who was named Prince Moulay
    Hassan.
  - An F4 tornado hits metro area of Oklahoma City, and became the 10th costliest
    tornado in United States history. No one was killed but many were injured. The
    tornado followed a path similar to that of the F5 tornado of May 3, 1999.
