Date: '2003-05-16'
Source_URI: Portal:Current events/2003 May 16
Intelligence_Payload:
  Uncategorized:
  - '2003 occupation of Iraq: United States and United Kingdom officials announce
    a change of policy concerning the redevelopment of Iraq. The establishment of
    an Iraq-led national assembly will be put off indefinitely, and Allied commanders
    will remain in charge, reportedly because no new government would have the necessary
    amount of real power.'
  - 'Terrorist incidents: A series of explosions occurs in Casablanca. At least 41
    people are believed to be dead including 12 suicide bombers, and 100 are reported
    injured. See: Casablanca Attacks.'
  - 'Astronomy: A total lunar eclipse is visible from Europe, the Americas and most
    of Africa from 01:46 to 05:34 GMT Nasa 1, Nasa 2.'
  - The Guardian reports that the Republican Party of Texas had the help of the United
    States Department of Homeland Security to track down several Democratic Party
    state legislators who had fled the state to prevent the state's House of Representatives
    from meeting with a quorum.
  - Three time defending NBA champions Los Angeles Lakers get eliminated from the
    2002–2003 playoffs, losing 110–82 to the San Antonio Spurs in Los Angeles in Game
    6 of their series.
