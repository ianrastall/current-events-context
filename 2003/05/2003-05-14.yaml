Date: '2003-05-14'
Source_URI: Portal:Current events/2003 May 14
Intelligence_Payload:
  Uncategorized:
  - DARPA's Information Processing Technology Office solicits bids for the LifeLog
    project, an extremely ambitious effort to create a massive searchable computer
    database, "an ontology-based (sub)system that captures, stores, and makes accessible
    the flow of one person's experience in and interactions with the world ... The
    objective ... is to be able to trace the 'threads' of an individual's life in
    terms of events, states, and relationships".,
  - 'SCO v. IBM Linux lawsuit: Apparently noticing the incongruity of their selling
    a Linux distribution while suing IBM for stealing their intellectual property
    and giving it to the developers of that operating system, the SCO Group (formerly
    Caldera International and Caldera Systems) announces they will no longer distribute
    Linux. According to their press release, "SCO will continue to support existing
    SCO Linux and Caldera OpenLinux customers and hold them harmless from any SCO
    intellectual property issues regarding SCO Linux and Caldera OpenLinux products."'
  - Carlos Menem quits the Argentinian presidential race; fellow Peronist Néstor Kirchner
    is consequently expected to win.
  - The bodies of 17 Hispanics, suspected Mexican illegal immigrants, were found by
    police in Victoria, Texas. One more person, a man, died in a hospital, raising
    the death total to 18. 13 of the bodies were found inside a locked truck, and
    four of them outside it. A man was later arrested in Houston on suspicion of being
    the smuggler who led the 18 persons to their deaths.
