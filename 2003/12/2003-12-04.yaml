Date: '2003-12-04'
Source_URI: Portal:Current events/2003 December 4
Intelligence_Payload:
  Uncategorized:
  - Polish Prime Minister Leszek Miller is injured in a helicopter crash outside Warsaw.
  - Facing the threat of a trade war, U.S. President George W. Bush lifts 20-month-old
    tariffs on foreign steel. Within minutes of the announcement, the European Union
    announces that it is lifting its threat of sanctions on $2.2 billion of U.S. products
    that would have taken effect in mid-December based on a ruling from the World
    Trade Organization that the tariffs were in violation of global trade rules.
  - Hourly productivity of U.S. employees increased in the 3rd quarter of 2003 at
    an annual rate of 9.2%, the highest since the Reagan years (Q2 of 1983).
  - Interpol issues a red notice for the arrest of former President of Liberia Charles
    Taylor.
  - Australia's population was expected to hit 20 Million on this day.
