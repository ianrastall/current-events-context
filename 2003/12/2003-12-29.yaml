Date: '2003-12-29'
Source_URI: Portal:Current events/2003 December 29
Intelligence_Payload:
  Uncategorized:
  - Papal Nuncio to Burundi, Irish-born Archbishop Michael Courtney, is killed in
    an ambush.
  - The United States Department of Homeland Security announces that it will require
    armed security personnel on all airline flights, whether US or foreign carriers,
    when the department has intelligence that there is a threat to a flight.
  - Cuban officials are investigating who is responsible for altering a photograph
    of Fidel Castro on the front page of the official government newspaper, Granma,
    to make him look like Adolf Hitler.
  - The Federal Bureau of Investigation issues a memo instructing police to be alert
    of people carrying almanacs, stating that information in these reference works
    could be used to aid in the planning of terrorist attacks.
