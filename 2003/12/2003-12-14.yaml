Date: '2003-12-14'
Source_URI: Portal:Current events/2003 December 14
Intelligence_Payload:
  Occupation of Iraq:
  - Iraq's Civil Administrator L. Paul Bremer announces that Saddam Hussein was captured
    by US forces. Saddam was found approximately 15 km south of his home town of Tikrit
    at 2030 local time on December 13. Hussein was captured without resistance in
    a so-called "spider-hole" at a farmhouse in the town of ad-Dawr. He is in Coalition
    custody at an undisclosed location. At a press conference, Bremer presents video
    of Saddam in custody with a full beard, which is later shown removed. Bremer says
    that Saddam is in good health and is being "co-operative and talkative". He says
    that Saddam will "face justice" before an Iraqi court and under Iraqi law.
  - In an address to his nation, US president George W. Bush comments on the capture
    of Saddam, "Now the former dictator of Iraq will face the justice he denied to
    millions."
  - 'British Prime Minister Tony Blair welcomes the capture of Saddam, urging the
    Iraqi people "to reach out and to reconcile." Other world leaders offer similar
    sentiments: Russian Foreign Minister Igor Ivanov says that the arrest "will contribute
    to the strengthening of security in Iraq and to the process of political regulation
    in the country," while UN Secretary General Kofi Annan comments that Saddam''s
    capture provides a chance "to give fresh impetus to the search for peace and stability
    in Iraq".'
  - A car bomb explodes at a police station in Khaldiyah, 60 km west of Baghdad, killing
    at least 17 and wounding 30.
  Uncategorized:
  - Pakistani President Pervez Musharraf narrowly escapes a bombing. "The president's
    motorcade passed a minute before the blast", according to officials.
  - In an interview with The Washington Post newspaper, a 78-year-old African-American
    Los Angeles woman claims to be the illegitimate daughter of the late U.S. Senator
    Strom Thurmond.
  - The famous Italian opera house La Fenice in Venice reopens after being destroyed
    by fire in 1996. It was rebuilt at the cost of €90mn.
  - Jason White, quarterback of the University of Oklahoma Sooners, wins the Heisman
    Trophy, awarded to the best player in college football.
