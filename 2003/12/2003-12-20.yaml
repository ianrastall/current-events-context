Date: '2003-12-20'
Source_URI: Portal:Current events/2003 December 20
Intelligence_Payload:
  Uncategorized:
  - The Holy See announces plans to beatify the last Austro-Hungarian emperor Karl.
    Karl, who was overthrown in 1918 and died in exile in 1922, is expected to be
    beatified, a step to sainthood, in the next year. Karl's widow, Zita of Bourbon-Parma
    died in 1989. His son, former Crown Prince Otto von Habsburg was until recently
    a German MEP.
  - CCTV footage at Hampton Court Palace near London, once home of King Henry VIII
    of England, is released, and claimed to show a "ghost". The footage, taken in
    October 2003, shows a man in 16th century clothes closing a firedoor that had
    blown open. The palace markets itself as one of Britain's most haunted locations.
  - Celebrations marking the Bicentennial of the Louisiana Purchase culminate in New
    Orleans, Louisiana.
  - Irish charity fundraiser John O'Shea attacks Manchester United football manager
    Sir Alex Ferguson as "greedy" for demanding £90,000 to attend a cancer charity
    function in Ireland in 1999. According to O'Shea, a sports celebrity demanding
    'appearance money' from a charity is unheard of in his experience. Ferguson's
    appearance fee amounted to half the money raised. The fundraisers, until now unaware
    that Ferguson had taken half the proceeds, denounce his behaviour and say if they
    had known about it at the time they would have cancelled the event.
  - Former Argentinian president Carlos Menem is charged with tax fraud for failing
    to declare a Swiss bank account containing $600,000. If convicted he could be
    debarred from public office.
  - The World Court says it will hear legal arguments about Israel's construction
    of a controversial barrier in the West Bank to separate Israeli and Palestinian
    areas. The hearings will begin on 23 February 2004.
  - Spanish Prime Minister José María Aznar pays a surprise visit to Spanish troops
    in Iraq.
  - Massive landslides in the Philippines caused by heavy rain result in the deaths
    of up to 90 people.
  - A Malaysian opposition website is shut down by its British web-hosting company
    amid claims of "political censorship" from the opposition.
  - Zimbabwean opposition leader Morgan Tsvangirai tells his supporters to "fight
    fear" as they campaign against President Robert Mugabe. His comments follow the
    decision of Zimbabwe's police to occupy the offices of Zimbabwe's only privately
    owned newspaper in defiance of a court order that the newspaper could resume publication.
  - Eleven people, mainly young people from Germany, die in a bus crash in Belgium.
  - In Comoros, leaders signed an agreement clearing the way for legislative elections
    in April.
