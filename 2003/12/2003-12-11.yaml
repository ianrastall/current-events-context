Date: '2003-12-11'
Source_URI: Portal:Current events/2003 December 11
Intelligence_Payload:
  Uncategorized:
  - 'Spamming: Virginia indicts two men (one arrested) on felony charges for violating
    state laws on bulk e-mail solicitations.'
  - Electronic voting comes under scrutiny at a conference in Maryland.
  - According to Pentagon investigations, Halliburton overcharged the US Army for
    fuel in Iraq. Dick Cheney was chairman of Halliburton prior to becoming Vice President
    of the United States.
  - In Israel, an explosion at a money exchange office in a shopping district near
    the city center of Tel Aviv at 1230 local time (1030 UTC) kills three and injures
    at least eighteen people. Police say the cause of the explosion was probably criminal
    rather than terrorist.
  - A general strike in Quebec interrupts road and port traffic as well as non-essential
    surgeries and day-care service in Montreal, Quebec City, and Trois-Rivières. The
    strike was called in opposition to the Charest government's policies.
  - 'US Economy: The Dow Jones Industrial Average closes above 10,000 for the first
    time since May 24, 2002.'
  - The Inuit Circumpolar Conference says it hopes to petition the inter-American
    human rights system to rule that Inuit basic rights are being violated by global
    warming. They claim that the greenhouse effect, exacerbated by the failure of
    Russia and the USA to sign the Kyoto Protocol, will lead to the destruction of
    their way of life.
