Date: '2003-12-10'
Source_URI: Portal:Current events/2003 December 10
Intelligence_Payload:
  Uncategorized:
  - Western leaders are criticised at the World Summit on the Information Society
    in Geneva.
  - '2004 Taiwan Presidential Election: President Chen Shui-bian is officially nominated
    by his Democratic Progressive Party and picks Vice President Annette Lu as his
    running mate.'
  - Campaign finance reform, passed as the Bipartisan Campaign Reform Act of 2002,
    is upheld by a slim majority of the U.S. Supreme Court. , []
  - Canada's BC Ferry system experiences a total shutdown due to job action by its
    union, after an 80-day cooling-off period, imposed by the provincial government,
    was not rescinded.
  - The Barron Report into the Dublin and Monaghan Bombings in 1974 concludes that
    the Ulster Volunteer Force was responsible for the largest terrorist attack in
    the history of the Irish Troubles, which killed 33 people. It also concludes that
    some members of the Royal Ulster Constabulary and British military intelligence
    may have been involved in the attacks. The report strongly criticises the Irish
    National Coalition government (1973-77) for its handling of the crisis and criticises
    the United Kingdom for failures to offer assistance and information to track down
    the murderers.
  - Shirin Ebadi of Iran receives the Nobel Peace Prize in Oslo, Norway. In her acceptance
    speech she delivers heavy criticism against the War on Terrorism as an excuse
    for human rights violations. She also repeats her argument that discrimination
    against women in Muslim countries has no foundation in religion, but rather in
    culture.
  - Following electoral success in the Northwest Territories general election, 2003
    Joe Handley is unopposed for election as premier of the Northwest Territories
    by the legislature. Two prospective opponents had chosen not to run against him.
  - Scott Brison becomes the fourth caucus member of the former Progressive Conservative
    Party of Canada to leave the new Conservative Party of Canada, crossing the floor
    to the Liberals.
  - Elizabeth II, Queen of Canada, issues a proclamation officially acknowledging
    the deportation of the Acadians, 248 years after it took place. The proclamation
    is delivered by Heritage Minister Sheila Copps, who is of Acadian descent.
  Occupation of Iraq:
  - The Iraq Interim Governing Council announces the creation of a war crimes tribunal,
    to prosecute crimes against humanity committed under the Ba'ath Party régime (14
    July 1968 to 1 May 2003).
  - The European Commission announces it will investigate whether exclusion of Iraq
    war opponents from industrial contracts to rebuild the country constitutes a violation
    of WTO rules by the U.S. UN Secretary-General Kofi Annan condemns the "divisive"
    exclusion.
  - The People's Republic of China urges Japan not to send Japan Self-Defense Forces
    to Iraq.
