Date: '2003-12-12'
Source_URI: Portal:Current events/2003 December 12
Intelligence_Payload:
  Uncategorized:
  - A plot by militants linked to Al Qaeda to blow up the United Kingdom embassy in
    Yemen is foiled.
  - Germany announces plans to commemorate gay victims of the Nazi Holocaust, with
    a monument to be erected in central Berlin.
  - Queen Elizabeth II has a benign non-cancerous growth removed from her face. Buckingham
    Palace confirms the removed growths will be subject to further tests but denies
    there are any cancer fears surrounding the 77-year-old sovereign. She also underwent
    a knee operation.
  - Canada's BC Ferry system returns to normal operations after the company and its
    union agree to commit to binding arbitration.
  - 'A European Union defence policy is agreed upon by Britain, France and Germany
    at the beginning of an EU summit in Brussels where the member countries will discuss
    a forthcoming constitution for the EU. Defence policy: ; EU constitution: .'
  - Paul Martin, Jr. is appointed Canada's 21st Prime Minister, and takes his oath
    of office along with his cabinet. Notable Ministers include Deputy Prime Minister
    Anne McLellan in Domestic Security, Ralph Goodale in Finance, Pierre Pettigrew
    in Health and Intergovernmental Affairs, Lucienne Robillard in Industry, Irwin
    Cotler in Justice, Bill Graham in Foreign Affairs and David Pratt in Defence.
  - Keiko (whale) from Warner Brothers movie's Free Willy dies at age 27, at Norway's
    bay
  - In Haiti the biggest anti-government demonstrations in a decade take place, calling
    for the removal of President Aristide; after nightfall, squadrons of armed Aristide
    supporters take to the streets in response.
  - Mick Jagger is knighted.
  - According to a poll published in the Israeli daily Maariv, half of Israelis distrust
    their Prime Minister Ariel Sharon.
  - In the central province Bie, Angola, a land mine explodes and kills 6 Angolan
    staff of the international humanitarian organization, CARE.
  - The documentary Anatomy of t.A.T.u., aired on STS, reveals that the two women
    of the Russian band t.A.T.u. are not lesbians, among other revelations.
