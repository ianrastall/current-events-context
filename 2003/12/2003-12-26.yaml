Date: '2003-12-26'
Source_URI: Portal:Current events/2003 December 26
Intelligence_Payload:
  Uncategorized:
  - A powerful earthquake occurs near the southern Iranian city of Bam at 0156 GMT
    (5.26am local time). The USGS estimates its magnitude as 6.7 on the Richter scale.
    The BBC reports that "70% of the modern city of Bam" is destroyed. Iranian government
    officials estimate the death toll at over 20,000 with a further 50,000 injured.
    Bam Citadel the largest adobe structure of the world is destroyed. The area of
    the citadel is about 180,000 square meters and the construction date of parts
    of it goes back for about 2500 years.
  - The death toll in the Chinese gas-leak rises to 191.
  - Fearing the state's BSE outbreak may extend beyond a single farm, the U.S. Department
    of Agriculture quarantines a second cattle farm in Washington state.
