Date: '2003-12-05'
Source_URI: Portal:Current events/2003 December 5
Intelligence_Payload:
  Uncategorized:
  - 'Stavropol train bombing: Suicide bombers blow up a morning rush-hour commuter
    train in Russia''s Northern Caucasus, on the border with Chechnya; at least 40
    people are killed.'
  - 'As part of a spending bill passed by the United States Congress this week, the
    University of California will have to compete for the management contract of all
    three of its national laboratories: Lawrence Berkeley, Lawrence Livermore, and
    Los Alamos. Previously, it was expected that only Los Alamos would be up for bidding.'
  - The Commonwealth Heads of Government Meeting (CHOGM) is opened in Abuja, Nigeria,
    by Queen Elizabeth II. The future of Zimbabwe's membership is threatening to dominate
    the gathering. The debate has been marked by bitter personal polemics between
    Zimbabwean President Robert Mugabe and Australian Prime Minister John Howard,
    whom Mugabe accuses of leading an "Anglo-Saxon conspiracy" against Zimbabwe. Mugabe
    himself is barred from entering the European Union. Zimbabwe was suspended from
    the Commonwealth last year on charges that Mugabe had rigged his re-election in
    2002.
  - Members of the Canadian Alliance vote 96% to 4% in favour of forming a union with
    the Progressive Conservative Party, called the Conservative Party of Canada. The
    Progressive Conservatives will vote tomorrow.
  - 'SCO v. IBM: in the opening discovery stages of the SCO v. IBM conflict, a judge
    grants IBM''s two motions to compel against SCO, and defers consideration of SCO''s
    motions until later.'
  - The 22nd SEA Games open in Ho Chi Minh City, Vietnam. This is the first time Vietnam
    has hosted the regional athletic event and the first time East Timor has sent
    a delegation. Indonesia and Vietnam are expected to top the medal tallies.
  - The draw for the qualifying stages of the 2006 Football World Cup is made. England,
    Wales and Northern Ireland are drawn together in group 6 of the Europe (UEFA)
    section, making the group three-quarters of a home nations championship - Scotland
    missed out by being drawn (amongst others) against Italy and Norway.
