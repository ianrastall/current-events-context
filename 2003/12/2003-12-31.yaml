Date: '2003-12-31'
Source_URI: Portal:Current events/2003 December 31
Intelligence_Payload:
  Uncategorized:
  - In Taiwan, President Chen Shui-bian signs a law that allows referendums to be
    held. The People's Republic of China condemns this.
  - 'Occupation of Iraq: A car bomb detonates outside an upmarket Baghdad restaurant
    much favoured by foreign journalists, killing five New Year revelers.'
  - The Academy of Motion Picture Arts and Sciences mails nomination ballots in which
    it qualifies 254 films released in 2003 as eligible for Oscar consideration.
