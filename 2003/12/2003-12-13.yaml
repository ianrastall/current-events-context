Date: '2003-12-13'
Source_URI: Portal:Current events/2003 December 13
Intelligence_Payload:
  Uncategorized:
  - Saddam Hussein is captured and arrested by U.S. forces near Tikrit, Iraq.
  - Spain has announced an agreement with Morocco to proceed with plans to build a
    rail tunnel beneath the Strait of Gibraltar, linking Europe and Africa. Assuming
    the project is technically and financially feasible, digging would start in 2008.
    ,
  - At the EU summit, EU Commissioner Chris Patten describes the United States' method
    of awarding contracts for the rebuilding of Iraq as politically maladroit.
  - The European Union fails to reach agreement on a new constitution.
  - Operatic singer (tenor) Luciano Pavarotti marries his partner and producer Nicoletta
    Mantovani at a ceremony in Northern Italy.
  - California legislators approve Arnold Schwarzenegger's $15 billion bond issue.
  - Chad's government signs a cease-fire with the rebel Movement for Democracy and
    Justice in Chad (MDJT) in Burkina Faso.
  - Wanderley Carlos Stringhini, retired partner of Ernst Young, dies at age 51. During
    his life, he was partly responsible for the founding of Ernst Young offices in
    Curitiba, Blumenau, and Porto Alegre.
