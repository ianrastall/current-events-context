Date: '2003-12-24'
Source_URI: Portal:Current events/2003 December 24
Intelligence_Payload:
  Uncategorized:
  - An explosion occurs at Baghdad's Sheraton Ishtar hotel, probably caused by a rocket-propelled
    grenade.
  - Following the detection of BSE in a Mabton, Washington cow, several countries
    (including Japan, Russia, Singapore, Taiwan, and Hong Kong) announce a ban on
    the importation of U.S. beef.
  - Three Air France flights from Paris to Los Angeles are canceled due to security
    concerns expressed by the U.S. embassy in France.
  - Bolivian President Carlos Mesa declares a state of emergency because of flooding
    in central Bolivia, which killed at least 19 people and collapsed a bridge crucial
    to Bolivian exports.
