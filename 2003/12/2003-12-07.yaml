Date: '2003-12-07'
Source_URI: Portal:Current events/2003 December 7
Intelligence_Payload:
  Uncategorized:
  - Former Nicaraguan President Arnoldo Alemán receives a 20-year prison sentence
    for money laundering, embezzlement, electoral crime, etc.
  - Zimbabwean President Robert Mugabe announces that he is withdrawing his country
    from the Commonwealth of Nations. The Commonwealth had earlier decided to maintain
    Zimbabwe's suspension until human rights and democratic reforms had taken place.
  - President Putin's United Russia wins a resounding victory in the 2003 Russian
    election, with 37% of the vote. Second place and 12.5% of the vote goes to the
    Communist Party, with Zhirinovsky's LDPR nationalists close behind with 11.5%.
    However, electoral monitors say the democratic process was "overwhelmingly distorted"
    in the government's favour.
  - Afghan villagers have disputed United States claims that a bombing by the US that
    killed nine children had killed the intended target, Taliban militant, Mullah
    Wazir. They say Wazir had left the village ten days earlier.
  - Currency analysts remain negative on the US dollar.
  - One US soldier is killed and two are injured Sunday in Mosul when a convoy is
    attacked.
