Date: '2003-02-15'
Source_URI: Portal:Current events/2003 February 15
Intelligence_Payload:
  Uncategorized:
  - 'Global protests against war on Iraq: People around the world demonstrated against
    the planning of war against Iraq. In Rome three million people were on the streets,
    in London one million. In Berlin there were half a million in the largest demonstration
    for some decades. There were also protest marches all over France as well as in
    many other smaller European cities. Protests were also held in South Africa, Syria,
    India, Russia, Canada and in the US, in around 600 cities in total.'
  - 'Antwerp diamond heist: In the largest robbery of diamonds in history, thieves
    steal $100 million worth of diamonds and other precious jewelry from a store in
    Antwerp, Belgium.'
