Date: '2003-02-05'
Source_URI: Portal:Current events/2003 February 5
Intelligence_Payload:
  Uncategorized:
  - At the United Nations US Secretary of State Colin Powell presents the US government's
    case against the Saddam Hussein government of Iraq, as part of the diplomatic
    side of the U.S. plan to invade Iraq. The presentation includes tape recordings,
    satellite photographs and other intelligence data, and aims to prove WMD production,
    evasion of weapons inspections and a link to Al-Qaida.
  - The International Court of Justice orders the United States to take "all measures
    necessary" to prevent the execution of three Mexican nationals, pending its final
    judgment
  - Congressman Howard Coble, of North Carolina, chairman of the House committee overseeing
    homeland security, said that the internment of Japanese Americans during World
    War II was justified, and that it had been done for "their own safety." He was
    roundly criticized by Asian American members of Congress and spokespeople for
    Asian American organizations.
