Date: '2003-02-10'
Source_URI: Portal:Current events/2003 February 10
Intelligence_Payload:
  Uncategorized:
  - France and Belgium broke the NATO procedure of silent approval concerning the
    timing of protective measures for Turkey in case of a possible war with Iraq.
    Germany said it supports this veto. The procedure was put into operation on February
    6 by secretary general George Robertson. In response Turkey called upon Article
    4 of the NATO Treaty, which stipulates that member states must deliberate when
    asked to do so by another member state if it feels threatened.
  - Muslims celebrate the Islamic festival of Eid al-Adha.
