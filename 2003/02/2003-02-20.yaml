Date: '2003-02-20'
Source_URI: Portal:Current events/2003 February 20
Intelligence_Payload:
  Uncategorized:
  - 'The Station nightclub fire: A fire started by pyrotechnics set-off by Great White,
    a rock band playing a nightclub in West Warwick, Kent County, Rhode Island, kills
    at least 96 and injures nearly 200, with 35 in critical condition. Fatalities
    from burn injuries are expected to increase.'
  - University of South Florida computer engineering professor Dr. Sami Al-Arian was
    arrested by the FBI after he and seven others were indicted on 50 terrorism-related
    charges. United States Attorney General John Ashcroft alleged at a news conference
    that Al-Arian is the North American leader of the Palestinian Islamic Jihad.
