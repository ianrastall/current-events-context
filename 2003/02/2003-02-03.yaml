Intelligence_Payload:
  Uncategorized:
  - Record producer Phil Spector was arrested in relation to an investigation into
    the fatal shooting of a 40-year-old woman in Los Angeles. Press reports identify
    the woman as the actress Lana Clarkson. (The Guardian)
  - 'Radical Muslim cleric Abu Hamza al-Masri claims Space Shuttle Columbia disaster
    is a sign from God. He says "It is a punishment from God. Muslims see it that
    way. It is a trinity of evil because it carried Americans, an Israeli and a Hindu,
    a trinity of evil against Islam." al-Masri''s remarks are widely denounced by
    many other Muslim clerics. Reported in a BBC News Article: Muslim cleric''s shuttle
    outburst attacked.'
