Date: '2003-02-12'
Source_URI: Portal:Current events/2003 February 12
Intelligence_Payload:
  Uncategorized:
  - The British government deploys troops around Heathrow airport after reports that
    al-Qaeda agents may have smuggled surface-to-air missiles into Britain.
  - An audio tape attributed to Osama bin Laden is released by al Jazeera television.
    It recounts the battle of Tora Bora and urges Muslims to fight the United States
    and to overthrow the Iraq regime of Saddam Hussein.
