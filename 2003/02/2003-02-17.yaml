Date: '2003-02-17'
Source_URI: Portal:Current events/2003 February 17
Intelligence_Payload:
  Uncategorized:
  - 'London congestion charging begins: Motorists must pay £5 per day to enter central
    London. This attempt by the Transport for London group to reduce traffic density
    and pollution, and encourage use of public transport is being followed closely
    by cities around the world.'
  - In Chicago, Illinois, a stampede at the E2 south side nightclub kills 21 people.
