Date: '2003-02-14'
Source_URI: Portal:Current events/2003 February 14
Intelligence_Payload:
  Uncategorized:
  - Four ex-Symbionese Liberation Army members were sentenced to prison for the 1975
    murder of Myrna Opsahl during a bank robbery in Carmichael, California.
  - A very large demonstration was held in Melbourne to protest against the Australian
    government's support for the US's policy on Iraq. Organisers estimated that 200,000
    people came out on to the streets, while some news sources put the number at "up
    to 150,000".
  - UNMOVIC chief weapons inspectors Hans Blix and Mohamed ElBaradei presented a report
    to the United Nations Security Council. They stated that the Iraqis had been co-operating
    well with the inspectors and that no weapons of mass destruction had been found,
    but that the Saddam Hussein regime had still to account for many banned weapons
    believed to have been in his arsenal. Mr Blix also expressed doubts about some
    of the conclusions in Colin Powell's Security Council presentation of February
    5, and specifically questioned the significance of some of the photographic evidence
    that Mr Powell had presented.
  - Tariq Aziz of Iraq met with Pope John Paul II
  - Dolly the sheep, the world's first cloned mammal, was euthanized well short of
    her natural lifespan because of a progressive lung disease.
