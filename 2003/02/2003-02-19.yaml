Date: '2003-02-19'
Source_URI: Portal:Current events/2003 February 19
Intelligence_Payload:
  Uncategorized:
  - '2003 Iran Ilyushin Il-76 crash: A military plane carrying 302 members of Iran''s
    elite Revolutionary Guards crashed in the mountains of southeastern Iran killing
    all on board. The government did not go into the possible cause of the crash.
    The plane was en route from Zahedan, on the Pakistan border, to Kerman, about
    500 miles southeast of Tehran.'
  - An air force Fokker F27 crashes in fog-shrouded mountains near the northwestern
    city of KohatPakistan, killing Pakistan air force chief Air Chief Marshal Mushaf
    Ali, his wife and 15 others.
