Date: '2003-02-22'
Source_URI: Portal:Current events/2003 February 22
Intelligence_Payload:
  Uncategorized:
  - Jesica Santillan, who was made critically ill after receiving donor organs of
    the wrong blood type in a medical accident during a heart-lung transplant, is
    taken off life support after being declared brain dead after a second heart-lung
    transplant operation.
  - In Memphis, Tennessee, Mike Tyson beats fringe contender Clifford Etienne 49 seconds
    into round one of a boxing match. In an undercard bout, controversial former skater
    Tonya Harding loses a four round decision in her women's professional boxing debut.
