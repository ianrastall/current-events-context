Date: '2003-06-24'
Source_URI: Portal:Current events/2003 June 24
Intelligence_Payload:
  Uncategorized:
  - Six members of the British Royal Military Police are killed, in an attack in Majar
    al-Kabir, a village near the town of Amarah in Iraq. Eight others are wounded
    in two separate ambushes.
  - A violent tornado, rated F4 on the Fujita scale, annihilates the tiny town of
    Manchester, South Dakota. Manchester was never rebuilt and is now a "ghost town".
