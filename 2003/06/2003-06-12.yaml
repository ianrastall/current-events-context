Date: '2003-06-12'
Source_URI: Portal:Current events/2003 June 12
Intelligence_Payload:
  Uncategorized:
  - Zahi Hawass, head of Egypt's Supreme Council for Antiquities, dismisses claim
    that archaeologists discovered Nefertiti's mummy.
  - The Centers for Disease Control and Prevention (CDC) says 54 people in the US
    may be infected with monkeypox.
  - 'British Prime Minister Tony Blair reshuffles his Cabinet: the Lord Chancellor
    is to be replaced by a new Department for Constitutional Affairs, and Peter Hain
    and John Reid have new jobs, while Alan Milburn unexpectedly resigns. The government
    also plans to replace the House of Lords'' judicial functions with a new Supreme
    Court.'
  - A mass grave in Ulan Bator, Mongolia, dating back to the Stalinist purges in the
    1930s, is discovered containing at least 575 victims. Ninety percent of the dead
    were found with the remains of yellow and red garments and religious items usually
    worn by Buddhist monks. The number could top 1,000, investigators said.
