Date: '2003-06-18'
Source_URI: Portal:Current events/2003 June 18
Intelligence_Payload:
  Uncategorized:
  - Two months after becoming Finland's first female prime minister, Anneli Jäätteenmäki
    resigns amid accusations she lied about the leak of sensitive political information
    about Iraq discussions with George W. Bush during the election campaign.
  - Bounty hunters (including, reportedly, Duane "Dog" Chapman) aid in the capture
    of Andrew Luster, the fugitive Max Factor heir and a convicted rapist, in Puerto
    Vallarta, Mexico.
  - The Angolan government announces a Boeing 727 has been stolen from Luanda's International
    Airport. The FAA asks all control towers in the United States to watch for any
    unscheduled aircraft as a consequence.
