Date: '2003-06-02'
Source_URI: Portal:Current events/2003 June 2
Intelligence_Payload:
  Uncategorized:
  - President George W. Bush begins his Middle East trip today, beginning with Egypt.
    He is in talks with Israeli and Palestinian leaders. He promises to work for the
    goal of Israel and a Palestinian state being able to live side by side without
    any bloodshed.
  - Thousands of Iraqi soldiers threaten to begin suicide attacks against U.S. troops
    as leaders of Iraq's tribes tell the Americans that they could face war if they
    do not leave.
  - Israel says it will dismantle only some of the more than 100 West Bank settlement
    outposts since violence began in that area 32 months ago.
  - In Zimbabwe, opposition leader Morgan Tsvangirai is first arrested, then released.
    This coincides with the start of a week of protests against the government, who
    have put Tsvangirai on trial for treason. He is due to appear in court later today.
  - Europe launches its first voyage to another planet, Mars. The European Space Agency's
    Mars Express probe launches from the Baikonur space centre in Kazakhstan.
  - The U.S. Federal Communications Commission announces sweeping changes to the concentration
    of media ownership protections in the U.S, allowing a single owner to own up to
    45% of media in a given city.
  - A US Department of Justice internal audit is released which asserts that the government
    systematically abused the civil rights of individuals detained after the September
    11, 2001 Terrorist Attack, engaging in "a pattern of physical and verbal abuse".
