Date: '2003-06-07'
Source_URI: Portal:Current events/2003 June 7
Intelligence_Payload:
  Uncategorized:
  - Foreign affairs minister of Finland, Erkki Tuomioja, says that NATO could be a
    good option for the Scandinavian country. Finland has been previously very conservative
    about military alliances and known for its neutrality. (In Finnish) A more balanced
    view is given in an interview in Helsingin Sanomat's English edition of June 10.
  - Empire Maker wins the Belmont Stakes horse race, stopping the bid of Funny Cide
    to win the Triple Crown of Thoroughbred Racing. Funny Cide is third, behind Ten
    Most Wanted (horse).
