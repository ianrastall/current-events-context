Date: '2003-06-11'
Source_URI: Portal:Current events/2003 June 11
Intelligence_Payload:
  Uncategorized:
  - Three 160,000-year-old human skulls unearthed in Ethiopia bridge an important
    gap in the human fossil record and lend support to the "out of Africa" single
    origin theory of human evolution.
  - Masquerading as an Orthodox Jew, a suicide bomber blows up a bus in Jerusalem,
    Israel, killing at least sixteen people. An Israeli helicopter attack in the Gaza
    Strip kills at least seven.
  - 'Same-sex marriage in Canada: The attorney general of Ontario announces that his
    government will conform to yesterday''s court ruling legalizing same-sex marriage
    in that province.'
  - 'US baseball: Six Houston Astros pitchers combine to pitch a no-hitter against
    the New York Yankees. The game sets several records, including the most pitchers
    to combine for a no-hitter in Major League Baseball history, and a record for
    the Yankees for the most sequential games without being no-hit.'
