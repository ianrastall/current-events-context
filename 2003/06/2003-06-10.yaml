Date: '2003-06-10'
Source_URI: Portal:Current events/2003 June 10
Intelligence_Payload:
  Uncategorized:
  - Donald Regan, Secretary of the Treasury under U.S. President Ronald Reagan from
    1981 to 1985 and White House Chief of Staff from 1985 to 1987, dies at 84 of cancer.
  - 'Same-sex marriage in Canada: The Ontario Appeals Court rules that the law restricting
    marriage to heterosexual couples contravenes the equality provisions in the Canadian
    Charter of Rights and Freedoms. The court does not permit the province any grace
    time to bring its law in conformity with the ruling. This appears to mean that
    Ontario has become the first jurisdiction in North America to recognize same-sex
    marriages. Toronto announces that its city clerk will begin to issue marriage
    licences to same-sex couples, and two same-sex couples who filed suit have their
    marriages retroactively recognized.'
