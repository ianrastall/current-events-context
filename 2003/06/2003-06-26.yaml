Date: '2003-06-26'
Source_URI: Portal:Current events/2003 June 26
Intelligence_Payload:
  Uncategorized:
  - Cameroonian soccer player Marc-Vivien Foé collapsed during a Confederations Cup
    semi-final between Cameroon and Colombia in Lyon, France. He subsequently died
    after doctors failed to resuscitate him. He played for Olympique Lyonnais and
    was loaned to Manchester City F.C. in the 2002/03 season.
  - The U.S. Supreme Court issues opinions in Lawrence v. Texas, ruling 6–3 that a
    ban on gay sex is an unconstitutional violation of the Fourteenth Amendment. The
    decision reverses the court's ruling 17 years ago which upheld the anti-sodomy
    laws.
  - Under pressure from members of Congress and human rights activists, officials
    in the administration of United States President George W. Bush publicly pledge
    for the first time that the United States will not torture terrorism suspects.
