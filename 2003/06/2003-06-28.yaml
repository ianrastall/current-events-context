Date: '2003-06-28'
Source_URI: Portal:Current events/2003 June 28
Intelligence_Payload:
  Uncategorized:
  - The FBI finishes its investigation of a pond in Frederick, Maryland, for clues
    in the 2001 anthrax attacks. Items found in the pond include a bicycle, some logs,
    a street sign, coins, fishing lures, and a handgun. The FBI took soil samples
    from the bottom of the pond for testing.
