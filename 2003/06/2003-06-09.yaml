Date: '2003-06-09'
Source_URI: Portal:Current events/2003 June 9
Intelligence_Payload:
  Uncategorized:
  - Silvio Berlusconi's centre-right coalition is routed in the Italian local elections.
  - Archaeologists announce that the mummy of Queen Nefertiti may have been found
    in the Valley of the Kings in Egypt.
  - The FBI begins to drain a Frederick, Maryland, pond hoping to uncover more evidence
    in the 2001 anthrax attacks.
  - 'North American ice hockey: The New Jersey Devils win the Stanley Cup, beating
    the Mighty Ducks of Anaheim, 3-0, in Game Seven of their championship series.'
  - In New Brunswick, Canada, Bernard Lord's Progressive Conservatives edge out Shawn
    Graham's Liberals in the general election. Lord's party takes 28 seats, Graham's
    26 and the New Democratic Party takes 1.
