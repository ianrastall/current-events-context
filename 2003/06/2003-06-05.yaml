Date: '2003-06-05'
Source_URI: Portal:Current events/2003 June 5
Intelligence_Payload:
  Uncategorized:
  - German politician Jürgen Möllemann dies while parachuting.
  - Computer virus Bugbear.b spreads worldwide on computer systems running Microsoft
    Windows by infecting email attachments.
  - The United States agrees to dismantle its bases and withdraw American forces from
    positions they have occupied near the DMZ, which separates North and South Korea,
    for decades.
  - Pope John Paul II marks his 100th foreign voyage in a trip to Croatia, where the
    pontiff is expected to meet with Serbian Orthodox Christians as a sign of goodwill
    between the centuries-long feuding sister churches.
  - For the first time in more than two months, no new deaths were reported yesterday
    from SARS, the latest indication that the epidemic is subsiding, the World Health
    Organization said.
  - A United Nations war crimes tribunal charges President Charles Taylor of Liberia
    with war crimes for masterminding atrocities in the Sierra Leone civil war.
  - Metallica's St. Anger album released.
