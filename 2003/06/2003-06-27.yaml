Date: '2003-06-27'
Source_URI: Portal:Current events/2003 June 27
Intelligence_Payload:
  Uncategorized:
  - The United States Federal Trade Commission opens the National Do Not Call Registry.
    This registry gives consumers an opportunity to limit the telemarketing calls
    they receive. On October 1, 2003, when the National Do Not Call Registry became
    enforced, most telemarketers were required to remove the numbers on the registry
    from their call lists. See http://donotcall.gov/.
  - The Boston Red Sox establish a new Major League Baseball record by scoring 10
    runs before recording their first out of the game against the Florida Marlins
    in Boston. Marlins pitcher Kevin Olsen was injured by a line-drive hit and taken
    to a local hospital, where he was admitted in good condition. The Red Sox beat
    the Marlins, 25–8.
