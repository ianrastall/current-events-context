Date: '2003-06-23'
Source_URI: Portal:Current events/2003 June 23
Intelligence_Payload:
  Uncategorized:
  - The U.S. Supreme Court issues opinions in Grutter v. Bollinger and Gratz and Hamacher
    v. Bollinger, challenges to the affirmative action admissions policies at the
    University of Michigan. In Grutter, the Court held that the University of Michigan
    Law School's admissions policy, which considered race as one of a number of "soft"
    admissions factors on a case-by-case basis, was constitutional. In Gratz, the
    Court held that the undergraduate affirmative action admissions policy, which
    was based on a point system and was more rigid than the Law School's, was unconstitutional.
  - In Peekskill, New York, a 10-month-old baby girl survives a seven story fall.
    Her father, Willie Williams, takes her to the hospital, where she was treated
    for bruises and cuts, but Mr. Williams is later arrested on charges of attempted
    murder.
  - Human Rights Watch calls for a criminal investigation into Israeli Prime Minister
    Ariel Sharon's alleged role in the massacre of civilians, mostly Palestinians
    and Lebanese Shiites, in Sabra and the Shatila refugee camp.
