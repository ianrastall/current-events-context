Date: '2003-06-08'
Source_URI: Portal:Current events/2003 June 8
Intelligence_Payload:
  Uncategorized:
  - After several days of violence and confusion in Mauritania, Pro-Israeli President
    Maaouiya Ould Taya appears to have defeated the uprising against him.
  - The Polish referendum on EU enlargement entrance finishes today; 78% of the voters
    voted to join the EU, with approximately 59% turnout.
  - The presence of the monkeypox virus in the United States is confirmed with four
    cases in Wisconsin, sparking the first discovery of the virus in the Western Hemisphere.
    Dozens of suspected cases have appeared across three Midwest states, where pet
    enthusiasts came into contact with infected domestic prairie dogs, which caught
    the disease from the Gambian giant rat.
