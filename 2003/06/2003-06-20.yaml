Date: '2003-06-20'
Source_URI: Portal:Current events/2003 June 20
Intelligence_Payload:
  Uncategorized:
  - The Christian Science Monitor apologises to George Galloway for falsely alleging
    that he received ten million dollars from Saddam Hussein. Galloway refuses to
    accept the apology.
  - The Houston Chronicle reports that Bill Sikora, who advised NASA in 1989 on how
    to evade Freedom of Information Act requests, is now working as legal counsel
    on the agency's Space Shuttle Columbia disaster investigation board.
  - The North East MRT line in Singapore began operations, with 14 stations of the
    MRT line from HarbourFront to Punggol (except Woodleigh and Buangkok) being opened
    at the same time operated by SBS Transit Ltd using Alstom Metropolis C751As.
