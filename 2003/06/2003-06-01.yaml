Date: '2003-06-01'
Source_URI: Portal:Current events/2003 June 1
Intelligence_Payload:
  Uncategorized:
  - The Group of Eight summit opens in Évian, France, to tight security and tens of
    thousands of protestors.
  - The sluice-gates on the Three Gorges Dam in China are closed, starting the filling
    of the reservoir of the world's largest hydroelectric project.
  - The Railroad Museum of the Niagara Frontier opens.
