Date: '2003-06-04'
Source_URI: Portal:Current events/2003 June 4
Intelligence_Payload:
  Uncategorized:
  - 'Road map for peace: Israeli Prime Minister Ariel Sharon promises to dismantle
    illegal settlements in the West Bank, while new Palestinian Prime Minister Mahmoud
    Abbas renounces all terrorism against Israel.'
  - Martha Stewart is indicted by a federal grand jury on nine criminal counts including
    securities fraud, obstruction of justice, and conspiracy in the U.S. government's
    investigation of her possible insider trading of ImClone Systems stock in December
    2001. Just hours after this, she announces that she will quit as chairman and
    CEO of her company.
  - Scientists have used genetic engineering techniques to make chickens grow teeth.
  - The United States House of Representatives votes 282 to 139 to ban Intact dilation
    and extraction, a process commonly referred to as partial-birth abortion.
  - The Dow Jones Industrial Average closes above 9,000 for the first time since August
    22, 2002.
