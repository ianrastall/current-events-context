Date: '2003-06-22'
Source_URI: Portal:Current events/2003 June 22
Intelligence_Payload:
  Uncategorized:
  - Real Madrid clinches the Primera división, the top football league in Spain, beating
    Real Sociedad by two points. The very next day, Real Madrid fires its manager,
    Vicente del Bosque.
  - Hundreds of US troops raid Iraqi homes in the town of Ramadi, fired up by the
    Ride of the Valkyries coming through loudspeakers, in a scene which Reuters reporter
    Alistair Lyon describes as "a bizarre musical reprise from Vietnam War film Apocalypse
    Now." Meanwhile, a group identifying itself as the Iraqi National Front of Fedayeen
    announces to increase attacks on US troops if they refuse to leave the occupied
    country.
  - The largest hailstone ever recorded falls in Aurora, Nebraska.
