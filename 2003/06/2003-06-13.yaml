Date: '2003-06-13'
Source_URI: Portal:Current events/2003 June 13
Intelligence_Payload:
  Uncategorized:
  - The Iraqi oil pipeline near Baiji catches fire, following two explosions
  - The United States occupation forces north of Baghdad kill 27 Iraqis in a pitched
    battle.
  - Israel announces intention to kill high-ranking Hamas members, including Sheikh
    Ahmed Yassin despite an opinion poll showing that more than two-thirds of Israelis
    want the campaign of assassinations to stop.
  - Abud Sarhan, a shepherd, sues US Army General Franks and Secretary Rumsfeld following
    the deaths of 17 family members during the invasion of Iraq
  - 'US Baseball: Pitching against the St. Louis Cardinals, New York Yankee Roger
    Clemens notches his 4,000th strikeout and his 300th win.'
