Date: '2003-03-01'
Source_URI: Portal:Current events/2003 March 1
Intelligence_Payload:
  Uncategorized:
  - 'Iraq disarmament crisis: The Turkish speaker of Parliament voids the vote accepting
    U.S. troops involved in the planned invasion of Iraq into Turkey on constitutional
    grounds. Due to 19 abstentions, 264 votes for and 250 against accepting 62,000
    U.S. military personnel do not constitute the necessary majority under the Turkish
    constitution.'
  - Khalid Shaikh Mohammed, the alleged mastermind of the September 11, 2001 Terrorist
    Attack and of other al-Qaeda attacks, is reported to have been arrested in Pakistan
    and turned over to US authorities for questioning.
  - Under U.N. supervision, Iraq begins destroying four of its Al Samoud missiles.
  - The United Arab Emirates calls for Iraqi president Saddam Hussein to step down
    to avoid war. The sentiment is later echoed by Kuwait and Bahrain.
