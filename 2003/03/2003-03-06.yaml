Date: '2003-03-06'
Source_URI: Portal:Current events/2003 March 6
Intelligence_Payload:
  Uncategorized:
  - 'Britain: Abdullah el-Faisal is jailed for nine years for urging Islamists to
    kill non-believers, Americans, Hindus and Jews.'
  - Cuban President Fidel Castro is elected unopposed to a sixth term. He has served
    as the head of Cuba's government for 44 years—longer than any other living head
    of government.
  - New Scientist magazine reports a paper by Robert R. Caldwell, Marc Kamionkowski
    and Nevin N. Weinberg which puts forward the hypothesis that the end of the Universe
    may possibly occur as a "Big Rip", which will shred the physical structure of
    the Universe.
  - The SCO Group, formerly Caldera, the current owner of the rights to the Unix operating
    system, sues IBM for for "devaluing" Unix, claiming that IBM employees who signed
    Non-disclosure agreements worked on the Linux operating system.
  - The European Central Bank cut its reference rate by 0.25%
  - Vivendi reported a corporate loss of euros, the largest loss ever for a French
    company.
  - Koei's Dynasty Warriors 3 receives Animation Magazine's "Best Overall Game Animation"
    award.
  - Air Algérie Flight 6289, a Boeing 737, crashes after take off from Tamanrasset,
    Algeria. A total of 96 passengers and 6 crew were killed, while 1 passenger survived.
