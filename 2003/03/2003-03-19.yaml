Date: '2003-03-19'
Source_URI: Portal:Current events/2003 March 19
Intelligence_Payload:
  Uncategorized:
  - Jørn Siljeholm, a weapons inspector recently in Iraq, accused the U.S. of lying
    about evidence for weapons of mass destruction. English, Norwegian
  - Telephone tapping of EU headquarters uncovered. According to EU officials the
    taps targeted six EU states including Austria, Britain, France, Germany, Italy,
    and Spain. The taps appear to have been installed when the building was constructed
    in 1994.
  - A group of doctors in Hong Kong claims to have identified the agent causing severe
    acute respiratory syndrome as belonging to the paramyxoviridae family of viruses.
  - European Union Health and Consumer Protection Commissioner, David Byrne, said
    "cases like SARS demonstrate only too clearly that contagious diseases require
    a high level of preparedness across borders. Imagine if it had been an influenza
    pandemic which, in the past, had a devastating impact on humans. In order to meet
    the contemporary public health threat of communicable diseases, we must strengthen
    coordination and surveillance at Community level. The most effective way to do
    so is by setting up a European Union Centre for Disease Control."
  - Paul Twomey is chosen for being the next president of ICANN.
  - Dwight Watson, who had driven a tractor into the Constitution Gardens pond on
    the National Mall in Washington, D.C., surrendered to federal authorities. The
    48 hour standoff severely disrupted the business and traffic of downtown D.C.,
    as a large section of streets were blocked due to Watson's claim that he had explosives.
