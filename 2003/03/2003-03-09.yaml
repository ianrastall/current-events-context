Date: '2003-03-09'
Source_URI: Portal:Current events/2003 March 9
Intelligence_Payload:
  Uncategorized:
  - 'Iraq disarmament crisis: In an interview on BBC Radio 4, Clare Short, a member
    of Tony Blair''s cabinet, describes his stance on Iraq as "deeply reckless", and
    says she would resign if he committed the UK to war without an unambiguous mandate
    from the United Nations.'
  - ArabNews reports that Saddam Hussein demanded that the UN Security Council lift
    the "embargo against Iraq", denounce the United States and the United Kingdom
    as "liars", strip Israel of weapons of mass destruction and force Israel to withdraw
    from "Palestine and occupied Arab land".
  - Albania says it will send troops to join any war against Iraq, largely a symbolic
    measure thanking the United States and NATO for intervening in Kosovo in the 1999
    Kosovo War.
  - The largest synagogue in Europe was opened in Baku.
