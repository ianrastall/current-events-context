Date: '2003-03-02'
Source_URI: Portal:Current events/2003 March 2
Intelligence_Payload:
  Uncategorized:
  - Four North Korean fighter jets intercept a United States reconnaissance plane
    over international waters in the Sea of Japan
  - 'Iraq disarmament crisis: Iraq destroys six more Al-Samoud 2 missiles, bringing
    the total destroyed to 10 out of an estimated 100 missiles ordered eliminated
    by the U.N. The U.S. continues to dismiss Iraq''s actions as "part of its game
    of deception." Iraq indicates that it may halt destruction of the missiles if
    the U.S. indicates it will go to war anyway.'
  - The British newspaper Observer publishes what it claims to be a leaked memo from
    a high-ranking NSA official dated January 31, 2003. In it are orders to spy on
    the domestic and official communications of the United Nations Security Council
    members other than the U.S. and the United Kingdom. The memo names "... members
    Angola, Cameroon, Chile, Bulgaria and Guinea, ..." as candidates for special attention.
  - French president Jacques Chirac starts a three-day visit to the former French
    colony Algeria. It is the first visit of a French president to Algeria at the
    highest ceremonial level.
