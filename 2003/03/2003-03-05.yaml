Date: '2003-03-05'
Source_URI: Portal:Current events/2003 March 5
Intelligence_Payload:
  Uncategorized:
  - An appeals court in Norway ruled that Jon Johansen, the teenager who developed
    the DeCSS software that allows DVDs to be copied, will have to be retried on charges
    that he violated copyright and anti-hacking laws.
  - 'Iraq disarmament crisis: The foreign ministers of France, Germany and Russia
    indicate that they will oppose any UN Security Council proposals that would authorize
    war with Iraq.'
  - 'Iraq disarmament crisis: UK newspaper The Times reports that the United Nations
    secretly drawn up a plan to establish a post-war government in Iraq. Although
    no consensus have reached among UN Security Council members in regard to military
    action, the document indicates that UN leaders may now consider war all but inevitable.'
  - A bomb explosion at an airport in Davao City, Philippines, killed at least 19
    people.
  - Meeting of the Organisation of the Islamic Conference in Qatar fails to produce
    a statement opposing war in Iraq.
  - Saudi Arabia deploys 3,300 troops to Kuwait in preparation for a potential Iraq
    conflict.
  - A man exploded a bomb in a bus in Haifa, Israel, killing at least ten people.
  - A car bomb exploded in Cúcuta, Colombia killing at least seven people.
  - The chairman of the United States Senate subcommittee on East Asian and Pacific
    affairs said United Nation Security Council should debate the issue about abduction
    of Japanese citizens by North Korea as a question of human rights.
  - 'Protests against the 2003 Iraq war: Students protest and go on strike in a number
    of countries around the world.'
  - Crossgates Mall in Guilderland, New York, dropped charges of trespassing against
    a man who had been arrested for refusing to remove his "Give Peace a Chance" T-shirt.
    The change of heart occurred after over 100 anti-war demonstraters marched through
    the mall and threatened to stay until the mall backed down.
  - Belize's People's United Party returned to office, 22–7, in 2003 legislative elections.
