Date: '2003-03-11'
Source_URI: Portal:Current events/2003 March 11
Intelligence_Payload:
  Uncategorized:
  - After 20 years of delay, the Brazilian government fulfilled its legal commitment
    to demarcate the lands of the Awá tribe.
  - Jonathan Ben-Artzi, nephew of Benjamin Netanyahu (former prime minister of Israel),
    is court martialed for refusing to serve in the Israeli Defence Force on pacifist
    grounds.
  - The Dow Jones Industrial Average closes at 7524, a five-month low.
  - The 18 judges of the International Criminal Court are sworn in at The Hague.
  - Kofi Annan, Secretary General of the United Nations, announces that UN-sponsored
    talks on the reunification of Cyprus have failed. Cyprus remains a candidate for
    EU membership and the Greek Cypriot government intends to sign on behalf of the
    whole island. Analysts suggested that Turkish opposition to unification may hurt
    Turkey's chances of joining the EU (→ Annan Plan).
