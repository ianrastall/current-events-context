Date: '2003-03-26'
Source_URI: Portal:Current events/2003 March 26
Intelligence_Payload:
  Uncategorized:
  - UN Secretary General Kofi Annan says that American and allied troops in Iraq must
    be used to provide humanitarian aid to Iraqis whilst the security situation is
    so unstable (BBC)
  - At least 14 people are killed in Baghdad after a missile hits a marketplace (BBC).
  - Al Jazeera television broadcasts images of two dead soldiers and two prisoners
    of war, whom it says are British (BBC).
  - Scientists at the Rovira i Virgili University claim to have a 350,000-year-old
    axe, the oldest evidence of human creativity yet uncovered (BBC)
  - 'A meteor exploded over the midwest, showering Park Forest, Illinois, with dozens
    of meteorite fragments. APOD: 2003 May 6 – A Chicago Meteorite Fall'
  - 954 paratroopers of the US Army's 173rd Airborne made a combat jump into the Bashur
    Drop Zone as part of Operation Iraqi Freedom
