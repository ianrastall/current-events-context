Date: '2003-03-07'
Source_URI: Portal:Current events/2003 March 7
Intelligence_Payload:
  Uncategorized:
  - Pravda reports that Georgia intends to seek UN Security Council approval to use
    military force against Abkhazia.
  - The United States declared a national emergency and joined the European Union
    in imposing economic sanctions on Zimbabwean President Robert Mugabe and members
    of his government for "systematically undermin[ing] democratic institutions" in
    Zimbabwe.
  - 'War on Terrorism: Two of Osama bin Laden''s sons are rumored to have been arrested
    in a skirmish in southern Afghanistan. This report was denied by both United States
    and Pakistani officials.'
  - 'Iraq disarmament crisis: Hans Blix reports to the UN Security Council citing
    Iraq''s increased but qualified cooperation.'
  - Revising the draft resolution put forth by the United States, United Kingdom and
    Spain a week ago, Britain proposes setting March 17 as the date for Iraq to voluntarily
    disarm or face the prospect of war.
  - The Nikkei benchmark hit a 20-year low record as war in Iraq appears closer, alleged
    stock manipulation by Nikko Salomon Smith Barney came to light, North Korea is
    preparing to test fire a mid-range missile, and a new political scandal in the
    party of Prime Minister Junichiro Koizumi came to light.
  - Broadway musicians union members went on strike in protest over producers' proposals
    to cut the number of musicians at live performances, and the possibility of using
    taped or computer based music. All but one of Broadway's musicals (Cabaret) closed
    as a result.
  - Canadian Dot com company Zucotto Wireless ceases operations.
