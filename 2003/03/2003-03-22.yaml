Date: '2003-03-22'
Source_URI: Portal:Current events/2003 March 22
Intelligence_Payload:
  Uncategorized:
  - Estimates of between 125,000 and 250,000 people march for peace in New York City.
    The march was organized by the group United for Peace and Justice.
  - Two Russian fighter jets tracked a U.S. U-2 spy plane flying near the Russian
    border. The U-2 was partaking in reconnaissance over Georgia and Azerbaijan.
