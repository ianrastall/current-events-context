Date: '2003-03-15'
Source_URI: Portal:Current events/2003 March 15
Intelligence_Payload:
  Uncategorized:
  - Hu Jintao is elected President of the People's Republic of China by the National
    People's Congress by a vote of 2,937 to 4 with three abstentions. His predecessor,
    Jiang Zemin, steps down after serving the maximum of two five-year terms.
  - The World Health Organization issues warnings about an atypical pneumonia of unknown
    cause, dubbed severe acute respiratory syndrome (SARS). It was first found in
    Asia and appears to have originated in Hong Kong. There are fears that unless
    measures are taken to control SARS, it may become epidemic.http://www.who.int/csr/don/2003_03_15/en
    /
  - 'Iraq disarmament crisis: A round of protests takes place in cities across the
    world.'
  - 'War on Terrorism: Suspected al-Qaida terrorist Yassir al-Jaziri, is arrested
    in eastern Pakistan. He is believed to be among the leading al-Qaida members wanted
    by the United States.'
