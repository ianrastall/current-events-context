Date: '2003-03-04'
Source_URI: Portal:Current events/2003 March 4
Intelligence_Payload:
  Uncategorized:
  - Reports of a new security vulnerability in sendmail have been circulating, together
    with proof-of-concept exploit code. This raises fears of an imminent new Internet
    worm problem, unless existing vulnerable implementations are patched in time.
  - First performance of MarchFourth Marching Band in Portland, Oregon.
