Date: '2003-03-28'
Source_URI: Portal:Current events/2003 March 28
Intelligence_Payload:
  Uncategorized:
  - 'SARS: The Hong Kong government imposes a quarantine on a group of over 1000 people,
    and closes schools for nine days in an attempt to stop the spread of SARS.'
  - Fujitsu releases the HOAP-2, a humanoid robot product running the open standard
    Linux operating system.
  - Turkish Airlines' Airbus A310 was hijacked shortly after leaving Istanbul. At
    least three Turkish parliamentarians are among 196 passengers and eight aircrew
    members on the Flight TK 160 landed in Athens, Greece. The hijacker surrendered
    later in the day.http://www.cnn.com/2003/WORLD/meast/03/28/turkey.hijack/
  - '190th Fighter Squadron, Blues and Royals friendly fire incident: During the Coalition
    invasion of Iraq, two A-10 Thunderbolts from the USAF 190th Fighter Squadron fired
    on and destroyed two armored vehicles from the United Kingdom''s D-Squadron, killing
    one British soldier, and injuring five others.'
