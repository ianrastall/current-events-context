Date: '2003-03-18'
Source_URI: Portal:Current events/2003 March 18
Intelligence_Payload:
  Uncategorized:
  - U.S. Secretary of State Colin Powell says that thirty nations have joined with
    the United States in a "coalition of the willing" to remove Saddam Hussein from
    power, with another 15 quietly promising their support. See Worldwide government
    positions on war on Iraq.
  - Naji Sabri, the Iraqi foreign minister, calls U.S. President George W. Bush "a
    war criminal", "tyrant", "despot" and "idiot". He also claims that evacuation
    of UNIKOM from the demilitarized zone violates the UN resolution of 1991.
  - Approximately US$1 billion is stolen from the Central Bank of Iraq, anticipating
    the imminent bombing of Baghdad.
  - The United Kingdom Parliament votes in to grant Parliamentary Approval for the
    invasion of Iraq.
