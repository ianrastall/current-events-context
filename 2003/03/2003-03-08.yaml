Date: '2003-03-08'
Source_URI: Portal:Current events/2003 March 8
Intelligence_Payload:
  Uncategorized:
  - In a referendum, Malta votes in favor of joining the European Union in 2004.
  - An oil refinery and an oil pipeline are attacked in the northeastern Indian province
    of Assam. The United Liberation Front of Asom separatist group claims responsibility
    and according to regional newspapers threatens more such attacks.
  - 'Iraq disarmament crisis: Kuwaiti workers have been instructed to make 35 holes
    in the fence between Iraq and Kuwait, and that the Kuwaiti army is positioning
    tanks at these openings. The Pakistan Daily Times reported that UNIKOM had found
    armed US Marines in the demilitarized zone along the fence last month. CBC reported
    that 230 UN support workers have been ordered out of the demilitarized zone.'
  - The Japanese government expressed support for a revised draft resolution submitted
    jointly by the United States, United Kingdom and Spain to the United Nations Security
    Council that sets March 17 as the deadline for Iraq. Japanese media opinion polls
    taken last week indicate that 84% of Japanese people oppose an Iraq war.
