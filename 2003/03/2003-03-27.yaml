Date: '2003-03-27'
Source_URI: Portal:Current events/2003 March 27
Intelligence_Payload:
  Uncategorized:
  - Richard Perle resigned as chairman of the U.S. Defense Policy Board, but agreed
    to remain a board member.
  - Afghan deputy defense minister general Abdul Rashid Dostum created an office for
    the North Zone of Afghanistan and appointed officials to it, defying interim president
    Hamid Karzai's orders that there be no zones in Afghanistan.
  - 'SARS: The World Health Organization recommended that passengers flying from places
    where SARS outbreaks have occurred should be screened before being allowed on
    flights. These places included China, Hong Kong, Singapore, Vietnam, and the city
    of Toronto.'
