Date: '2003-07-07'
Source_URI: Portal:Current events/2003 July 7
Intelligence_Payload:
  Arts and culture:
  - MSNBC fires conservative talk show host Michael Savage for making several anti-gay
    remarks towards a prank caller posing as a homosexual. Savage, who was angered
    by aggressive personal attacks made by "East Coast Bob", the prank caller, stated
    that the caller "should only get AIDS and die". Gay rights group GLAAD applauds
    the decision to fire Savage. (Salon)
  - Thousands of people take part in the first bull run of the annual San Fermín festival
    in Pamplona, Spain. No serious injuries or gorings were reported. (CNN)
  Business and economy:
  - A United States district court approves a settlement between WorldCom and the
    U.S. Securities and Exchange Commission, in which WorldCom will pay to investors
    for its accounting scandal. (BBC)
  Politics and elections:
  - United States Central Command chief Gen. Tommy Franks retires after 36 years in
    uniform. Newcomer Army Gen. John Abizaid is appointed as his replacement. (Fox
    News)
  - A rare political drama happens in Hong Kong. Chief Executive Tung Chee Hwa is
    forced to postpone the legislation of Hong Kong Basic Law Article 23, just few
    hours after he insists the second reading will go on schedule despite the giant
    protest on July 1.
