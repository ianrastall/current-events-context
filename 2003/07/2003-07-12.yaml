Date: '2003-07-12'
Source_URI: Portal:Current events/2003 July 12
Intelligence_Payload:
  Uncategorized:
  - The intelligence service of the United States says that the CIA's head, George
    Tenet, accepted President George W. Bush's speech in January, which included wrong
    information of Iraq's plans to buy uranium from Africa. The office of Prime Minister
    Tony Blair responded that it stands by its belief that Saddam Hussein attempted
    to buy African uranium, claiming that it cannot share its information with the
    United States because it comes from "foreign intelligence sources."
  - 'Baseball: Barry Bonds ties the 63-year-old record of Jimmie Foxx by homering
    against the Arizona Diamondbacks'' Curt Schilling, becoming the second player
    in Major League Baseball to hit at least 30 home runs in 12 consecutive seasons.'
