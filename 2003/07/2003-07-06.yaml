Date: '2003-07-06'
Source_URI: Portal:Current events/2003 July 6
Intelligence_Payload:
  Uncategorized:
  - Laden and Laleh Bijani, 29-year-old female Iranian twins conjoined at the head,
    begin their two-to-four-day-long separation surgery in Singapore. (Fox News)
  - Wimbledon Championships
  - Roger Federer makes history, becoming the first Swiss male ever to win the Wimbledon
    final, defeating Mark Philippoussis, 7–6 (7–5), 6–2, 7–6 (7–3).
  - Martina Navratilova equals her idol, Billie Jean King's record of 20 Wimbledon
    titles after winning the mixed doubles final with Leander Paes against Andy Ram
    Anastassia Rodionova, 6–3 6–3. (BBC)
  - Todd Woodbridge also equals a record, winning with Jonas Björkman his eighth men's
    doubles title by beating Mahesh Bhupathi and Max Mirnyi, 3–6, 6–3, 7–6, 6–3. (BBC)
  - Kim Clijsters and Ai Sugiyama win the women's doubles final, and so their first
    Wimbledon title, 6–4, 6–4, against first seeds Virginia Ruano Pascual and Paola
    Suárez, as they did in this year's French Open final. (BBC)
