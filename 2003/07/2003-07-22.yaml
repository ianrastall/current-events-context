Date: '2003-07-22'
Source_URI: Portal:Current events/2003 July 22
Intelligence_Payload:
  Uncategorized:
  - John Manley, Deputy Prime Minister of Canada, drops out of the race to succeed
    Jean Chrétien as leader of the Liberal Party of Canada and Prime Minister after
    conceding he cannot catch front-runner Paul Martin, Jr..Manley quits Liberal leadership
    race
  - One of the top floors of the Eiffel Tower catches fire. No one is injured.
  - Fighting continues and the death toll rises in Liberia as rebels move into Monrovia
    to depose President Charles Taylor.
  - 'U.S.-led occupation of Iraq: In Iraq, "four key figures" in the former Iraqi
    regime die in a large operation by US troops. The dead included Saddam Hussein''s
    sons Uday and Qusay.'
  - A severe storm strikes Memphis, Tennessee, leaving several dead and as many as
    300,000 without power, including extremely severe damage to the power grid in
    some areas.CNN
