Date: '2003-07-20'
Source_URI: Portal:Current events/2003 July 20
Intelligence_Payload:
  Uncategorized:
  - 16 people are injured after two bombs explode outside tax offices in Nice, France.
  - 'Richard Sambrook, the Director of BBC News reveals that Dr. David Kelly was the
    source of claims that Downing Street had "sexed up" the September Dossier. (see
    also: Dodgy Dossier)'
  - Former Ugandan dictator Idi Amin is in a coma at a hospital in Jeddah, Saudi Arabia,
    and Uganda has refused permission for him to return.
  - 'British Open (golf): Rookie Ben Curtis, ranked 396th in the world, becomes the
    first golfer to win a major golf tournament in the first attempt in more than
    90 years.'
  - 14 people – a US family of 12 who had chartered the plane and the South African
    crew of 2 – die when a light plane crashes into Mount Kenya after taking off from
    Nairobi for Buffalo Springs National Reserve in northern Kenya.
