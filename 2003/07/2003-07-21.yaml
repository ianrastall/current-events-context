Date: '2003-07-21'
Source_URI: Portal:Current events/2003 July 21
Intelligence_Payload:
  Uncategorized:
  - npr.org's All Things Considered program aired a humorous article on the Wiki phenomenon,
    and on Wikipedia.org.
  - Jong-Wook Lee becomes the new Director-General of the World Health Organization.
  - 'SCO v. IBM Linux lawsuit: SCO Group announces that it intends to sell binary-only
    licences to use the free Linux operating system which will remove the threat of
    litigation from licence-holders. Linux advocates react by stating that SCO has
    no basis for this action, and that doing this may cause SCO to forfeit their rights
    under the GNU GPL to use or distribute Linux or Linux-derived code in any form.
    SCO press release CNet story'
  - In Puerto Rico, 25 people are seriously injured after a roof collapse in a Vega
    Alta, Puerto Rico mall.
