Date: '2003-07-27'
Source_URI: Portal:Current events/2003 July 27
Intelligence_Payload:
  Uncategorized:
  - Comedian Bob Hope dies in his sleep
  - 'Oakwood mutiny: A group of approximately 50 rogue soldiers from the Armed Forces
    of the Philippines seizes a portion of a shopping mall and the adjacent hotel
    in Makati City, Metro Manila in the Philippines demanding President Gloria Macapagal-Arroyo''s
    resignation. They claim to have surrounded the occupied zones with explosives
    and have temporarily held several people in the hotel, including Australian Ambassador
    Ruth Pierce. The group is said by some officials to be connected to ousted President
    Joseph Estrada and oppositionist Senator Gregorio Honasan, who staged several
    coup attempts in the late 1980s.'
  - The BBC reports that an extensive investigation of Loch Ness by a BBC team, using
    600 separate sonar beams, found no trace of any "sea monster" in the loch. Loch
    Ness is a popular tourist attraction because of the rumors surrounding an alleged
    monster or plesiosaur populating the lake (see Loch Ness Monster). The BBC team
    stated that it is now conclusively proven that "Nessie" does not exist.
  - '2003 Tour de France: Lance Armstrong wins his fifth consecutive Tour de France.'
