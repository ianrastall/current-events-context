Date: '2003-07-13'
Source_URI: Portal:Current events/2003 July 13
Intelligence_Payload:
  Uncategorized:
  - A national governing council meets for the first time in Baghdad, as US troops
    launch a new assault on anti-coalition elements.
  - Yahoo! announces that it will buy Internet search listing service Overture Services
    for in cash and stock.
  - The United Kingdom media, following tip-offs from the Israeli and British Intelligence
