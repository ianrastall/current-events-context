Date: '2003-07-09'
Source_URI: Portal:Current events/2003 July 9
Intelligence_Payload:
  Uncategorized:
  - The ferry MV Nasrin-1 capsizes and sinks near Chandpore in Bangladesh. The whereabouts
    of most of the approximately 700 passengers is unknown.
  - The U.S. government announces that two more officials of the defeated Iraqi government
    on the U.S. list of most-wanted Iraqis were taken into custody on Tuesday. Mizban
    Khadr al-Hadi was a high-ranking member of Iraq's Baath Party Regional Command
    and Revolutionary Command Council, and Mahmud Dhiyab al-Ahmad was a former Interior
    Minister. As to al-Ahmad this turns out to be an error - he surrenders to the
    American forces in August.
  - Nike announces an agreement to purchase Converse; for US$305M.
