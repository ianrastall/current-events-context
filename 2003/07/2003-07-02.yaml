Date: '2003-07-02'
Source_URI: Portal:Current events/2003 July 2
Intelligence_Payload:
  Law and crime:
  - The European Parliament approves two laws that regulate the selling of genetically
    modified food in the EU territory, requiring labelling of all GM products (products
    with more than 0.9% genetically modified parts) and allowing member states to
    separate GM food and non-GM food and crops.
  Politics and elections:
  - On taking up the EU presidency, Italian Prime Minister Silvio Berlusconi makes
    an embarrassing remark, causing an uproar of criticism from the 626-seat European
    Parliament and the European media, by insulting the German MEP Martin Schulz (SPD)
    with the words "Mr. Schulz, I know there is a producer in Italy who is making
    a film on the Nazi concentration camps. I will suggest you for the role of kapo.
    You'd be perfect."
  - The results of a Royal Commission on renewing the relationship between Canada
    and the province of Newfoundland and Labrador is released. (Canadian Government)
  Science and technology:
  - There are reports of the discovery of a possible new type of subatomic particle,
    a pentaquark. (BBC)
  Sport:
  - The International Olympic Committee announced in Prague, Czech Republic, that
    Vancouver, British Columbia will host the 2010 Winter Olympics.
