Date: '2003-07-04'
Source_URI: Portal:Current events/2003 July 4
Intelligence_Payload:
  Uncategorized:
  - A Shia Muslim mosque in Quetta, Pakistan, is stormed by armed attackers, killing
    at least 32 worshippers and wounding 52. (The Guardian)
  - Iraq War
  - A tape, purporting to be of Saddam Hussein and to have been made on June 14, is
    broadcast on Al Jazeera, the Arabic language satellite television station. If
    it is Saddam, it marks the first public communication from the former Iraqi leader
    since his disappearance early on in the Invasion of Iraq.
  - The United States military captures Turkish military personnel and lead them away
    with hoods over their heads.
