Date: '2003-07-05'
Source_URI: Portal:Current events/2003 July 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Second Chechen War: At least 16 people are killed and 40 injured by two female
    suicide bombers in an attack at Krylya, a popular music festival, at the Tushino
    airfield near Moscow. The Russian authorities blame an on-going terrorism campaign
    by Chechen rebels; the Chechen government denies any connection to the attacks.
    (BBC)'
  - '2003 occupation of Iraq: 7 newly US-trained Iraqi policemen are killed and at
    least 13 are wounded by an explosion while they are marching from training school
    in Ramadi. The American forces overseeing the rebuilding of Iraq''s infrastructure,
    who gave their blessing to the march taking place, blames loyalists to Saddam
    Hussein; some people on the scene blame U.S. forces. It is the first attack on
    Iraqis collaborating with the invading coalition forces, as opposed to on the
    forces themselves. (CNN)'
  Health:
  - Taiwan is the last territory to be declared free of SARS by the World Health Organization,
    after 20 days with no new cases reported. (BBC)
  Politics and elections:
  - In response to 500,000-strong protests earlier in the week, Tung Chee-hwa, Chief
    Executive of Hong Kong, announces that controversial provisions that are alleged
    capable of limiting civil liberties in Hong Kong Basic Law Article 23 will be
    rewritten. (BBC)
  - Premier John Hamm of Nova Scotia, Canada, calls a provincial election for August
    5.
  Sport:
  - 'Wimbledon Championships: Serena Williams repeats as women''s champion by beating
    her sister Venus, by scores of 4–6, 6–4, 6–2.'
