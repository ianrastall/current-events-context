Date: '2003-07-24'
Source_URI: Portal:Current events/2003 July 24
Intelligence_Payload:
  Uncategorized:
  - The United States' provisional authority in Iraq releases photos of what are presumably
    the dead bodies of Uday and Qusay Hussein in an attempt to show the Iraqi people
    proof that the two were actually killed in a U.S. military operation.
  - California lieutenant governor Cruz Bustamante announces that governor Gray Davis
    will face a recall election on October 7. This will be the second gubernatorial
    recall election in the United States history (the first occurred 82 years beforehand).
  - Italian officials have decided to attempt a restoration of Michelangelo's David
    using distilled water.
  - Colin R. McMillan, President Bush's nominee for the post of United States Secretary
    of the Navy, dies of an apparently self-inflicted gunshot wound to the head.
  - 'Jueves negro: Violent rioting follows on from political demonstrations in Guatemala
    City. (BBC)'
