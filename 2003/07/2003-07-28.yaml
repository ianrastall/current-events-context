Date: '2003-07-28'
Source_URI: Portal:Current events/2003 July 28
Intelligence_Payload:
  Uncategorized:
  - The United Nations Security Council appoints Harri Holkeri to head the temporary
    civilian administration UNMIK in Kosovo.
  - Ambassador Ole Wøhlers Olsen, the Muslim Danish coordinator for the U.S.-led provisional
    authority in southern Iraq resigns unexpectedly, to be replaced by Sir Hilary
    Synnott, currently the British High Commissioner to Pakistan. Ambassador Olsen,
    who had been critical of the lack of support for his reconstruction efforts, declared
    the British and Danish foreign services had chosen to replace him at that time
    instead of in October, as earlier planned, stating that he himself had been prepared
    to continue his work in Basra.
