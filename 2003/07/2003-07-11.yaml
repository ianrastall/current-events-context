Date: '2003-07-11'
Source_URI: Portal:Current events/2003 July 11
Intelligence_Payload:
  Uncategorized:
  - Zahra Kazemi, an Iranian-born Canadian journalist, dies of injuries received from
    a beating while in Iranian custody. She had been arrested on June 23 while taking
    photographs outside an Iranian prison. Her death sparks a furor between Canada
    and Iran over the disposition of her body and the punishment of her killers, and
    among international free speech groups concerned with freedom of the press in
    Iran.
