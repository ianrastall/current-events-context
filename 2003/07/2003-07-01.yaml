Date: '2003-07-01'
Source_URI: Portal:Current events/2003 July 1
Intelligence_Payload:
  Uncategorized:
  - In Hong Kong, 500,000 people march to protest the rush into legislation of Hong
    Kong Basic Law Article 23, the anti-subversion law. Critics say the law is both
    too broad and too vague.
  - After many years of controversy, the United Kingdom House of Commons, the lower
    house of parliament, again votes in favour of legislation to ban fox hunting.
  - Italy Premier Silvio Berlusconi's government assumed the rotating EU presidency.
