Date: '2003-11-30'
Source_URI: Portal:Current events/2003 November 30
Intelligence_Payload:
  Uncategorized:
  - Syria hands over 22 suspects to Turkey on Sunday in connection with four deadly
    suicide bombings in Istanbul, the semi-official Anatolia news agency reported.
  - According to the Information Center for Human Rights and Democracy, the People's
    Republic of China has freed three people detained on charges of posting information
    critical of the government on the Internet.http://famulus.msnbc.com/FamulusIntl/ap11-30-021719.asp?reg=PACRIM
  - The Observer newspaper reports that a deal is imminent to repatriate British men
    being held in Guantanamo Bay.
  - Israeli army chief Moshe Yaalon and former heads of Shin Bet criticise Prime Minister
    Ariel Sharon for his unwillingness to consider the Geneva plan.
  - The Japanese government announces its intention to temporarily nationalize regional
    bank Ashikaga Bank after inspections show that it is insolvent; the cost may exceed
    .https://www.reuters.com/newsArticle.jhtml;jsessionid=XWMRLQXUW0REOCRBAEOCFFA?type=businessNews&storyID=3910239
  - Iribnews.com reports that Georgia's parliament has elected Tedo Dzhaparidze as
    the new foreign minister.
  - 'Occupation of Iraq: Two South Korean civilians working for a US firm are killed
    on a highway near Tikrit.'
  - There is evidence that the tuberculosis drug D-cycloserine may be the first effective
    agent for the treatment of phobias.
  - Pakistan is to end a ban on Indian flights over its territory, in another sign
    of improving relations between the neighbours
  - Nathaniel Jones, a 41-year-old, unarmed black man dies after being clubbed by
    police with metal truncheons in Cincinnati, Ohio. Six police officers are suspended
    from duty afterwards. A video of the beating, captured by the video camera mounted
    in an officer's cruiser, is released to the public, stoking racial tensions in
    Cincinnati nearly three years after the city was rocked by riots. Preliminary
    autopsy results show that Jones had an enlarged heart, and his blood contained
    cocaine and PCP, Hamilton County Coroner Carl Parrott says.
  - The draw is made for the 2004 European Football Championship. England are drawn
    with holders France, and hosts Portugal are drawn with neighbours Spain.
  - In tennis, Australia wins the Davis Cup by three rubbers to one when Mark Philippoussis
    defeats Juan Carlos Ferrero of Spain in the first reverse singles match, played
    in Melbourne. It is the 28th time Australia has won the trophy, the most prestigious
    title in men's team tennis.http://www.abc.net.au/sport/content==references/s1000318.htm
