Date: '2003-11-24'
Source_URI: Portal:Current events/2003 November 24
Intelligence_Payload:
  Uncategorized:
  - Radical Muslim cleric Sheik Nasser al-Fahd denounces suicide bombings, declaring
    on Saudi TV that "blowing oneself up in such operations is not martyrdom; it is
    suicide". Some consider this a response to pressure from the Saudi government
    to recant previous statements.
  - The High Court in Glasgow rules that Abdelbaset al-Megrahi, convicted in 1999
    of the bombing of Pan Am flight 103 over Lockerbie, Scotland, in December 1988,
    must serve a minimum of 27 years before being considered for parole.
  - A former ANC intelligence operative appears in a South African Court on Monday
    in connection with an alleged plot to oust or kill President Thabo Mbeki.
  - A fire in a student hostel at Moscow's Patrice Lumumba University kills 32 and
    injures about 150 people, all foreign students. The fire services blame an electrical
    fault.
  - Pro-democracy groups gain in the Hong Kong District Council elections, as the
    pro-Beijing Democratic Alliance for the Betterment of Hong Kong loses 21 of its
    previous 83 elected seats. DAB chairman Tsang Yok-sing offers to resign.https://www.nytimes.com/2003/11/24/international/asia/24HONG.html?ex=1070254800&en=e51df8e3b9b09716&ei=5062&partner=GOOGLE
  - 'Canada, Northwest Territories general election, 2003: Voters in the NWT choose
    their new government, electing the independent members of their consensus legislature.
    The premier will be chosen by and among the members on December 10.'
  - In the United States, telephone number portability as mandated by the FCC takes
    effect in major metropolitan areas.
  - HIV-positive muppet Kami is appointed UN mascot for juvenile AIDS victims.
