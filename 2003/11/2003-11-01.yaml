Date: '2003-11-01'
Source_URI: Portal:Current events/2003 November 1
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian conflict: In Israel, a hard-hitting UN report says that Israel
    will effectively annex large areas of Palestinian territory as a result of the
    permits it intends to issue to Palestinians near the wall being built. The Israeli
    West Bank barrier has been built inside the internationally recognised Green Line
    about 18,000 acres (73 km2) and cuts off the rest of the West Bank. It has been
    declared a "closed military zone".'
  - The October Taylor Nelson Sofres / EOS Gallup EU poll reportedly shows that 59%
    of Europeans think that Israel is a threat to world peace (greater threat to world
    peace than North Korea, Iran, or Afghanistan). Also according to the poll, Europeans
    believe the United States surpasses the "axis of evil" (i.e., Iran, Iraq, and
    North Korea) and Afghanistan for countries that contribute most to world instability.
    Around 7,500 people from 15 different European countries were surveyed. Some of
    the results not yet published are still reportedly "unstable". Representatives
    will be meeting the EU's foreign policy chief Javier Solana to discuss the results
    of the poll and issues around combating anti-Semitism in Europe.
  - Zimbabwean President Robert Mugabe announces an overhaul of his cabinet and changes
    to the central bank aimed at tackling acute economic problems.
  - Communications in the United Kingdom are disrupted as the Royal Mail faces a wave
    of unofficial strikes.
  - 'North Korea nuclear weapons program: A North Korean defector to the South says
    the US cannot trust Pyongyang to stick to any deal about nuclear weapons.'
  - Fire fighters in California begin to gain the upper hand as they battle against
    the wildfires in Southern California.
  - The United States prosecutes Greenpeace for protesting illegal mahogany trade
    under an 1872 law against "sailormongering".
  - Taipei celebrates the first gay pride parade in either part of China. Approximately
    1,000 people march.
