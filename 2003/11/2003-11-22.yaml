Date: '2003-11-22'
Source_URI: Portal:Current events/2003 November 22
Intelligence_Payload:
  Uncategorized:
  - In Tbilisi, Georgia, opponents of President Eduard Shevardnadze seize the parliament
    building and demand the president's resignation. Opposition leader Mikhail Saakashvili
    vows to "trample" the country's leadership following unrest over disputed election
    results. Shevardnadze denounces what he calls an attempted coup and declares a
    state of emergency.
  - The United States tests the Massive Ordnance Air Blast bomb or (MOAB), the world's
    largest non-nuclear bomb, in Florida.http://timesofindia.indiatimes.com/cms.dll/xml/uncomp/articleshow?msid=296312
  - At 5:51 am, the United States House of Representatives passes the Medicare Prescription
    Drug, Improvement, and Modernization Act by a vote of 220–215, as fifteen Democrats
    change their votes. Three hours earlier the same bill had failed, 211–222.
  - Peruvian President Alejandro Toledo apologizes for the 70,000 people killed in
    the 15-year battle with the Shining Path rebel movement. He promises to punish
    members of Armed Forces who were responsible for many abuses.
  - '2003 Rugby World Cup: Regular time in a dramatic final match ends in a 14–14
    tie. England finally defeat Australia 20–17 to win the William Webb Ellis Cup
    – the first time it has been won by a Northern Hemisphere team.'
  - The 2003 Heritage Classic is played in Edmonton, Alberta, Canada, the first outdoor
    ice hockey games in the history of the National Hockey League. Over 50,000 spectators
    watch the two games.http://www.cbc.ca/sports/indepth/heritageclassic/
  - The last time the Toronto Maple Leafs beat the Vancouver Canucks (5-3). The Vancouver
    Canucks have won every time they have played since this date.
  Occupation of Iraq:
  - Car bombs outside police stations in the towns of Khan Bani Saad and Baquba, north
    of Baghdad, detonate around 08h local time (0500 UTC), killing upwards of 18 people.
  - A cargo plane belonging to courier company DHL makes an emergency landing at Baghdad
    airport after being hit by a surface-to-air missile. It was the first time a crew
    managed to land a jet that lost all of its hydraulics only by differential thrust
    without suffering casualties. Commercial flights in and out of the airport are
    suspended.http://interestalert.com/brand/siteia.shtml?Story=st/sn/11220000aaa07196.upi&Sys=siteia&Fid=LATEBRKN&Type=News&Filter=Late%20Breaking
