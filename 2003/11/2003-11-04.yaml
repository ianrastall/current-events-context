Date: '2003-11-04'
Source_URI: Portal:Current events/2003 November 4
Intelligence_Payload:
  Uncategorized:
  - The U.S. National Cancer Institute is funding human clinical studies to test experimental
    reovirus-based cancer treatments, after initial studies show promising results
    against a number of different types of tumor which contain the Ras oncogene.
  - 'War on Terrorism: In Saudi Arabia, an attempt at a terror attack on Saudi officials,
    pilgrims, or both, in the holy city of Mecca is foiled; plotters believed to be
    linked to Al Qaeda.'
  - 'Occupation of Iraq: For the second night running the HQ of the coalition in central
    Baghdad comes under attack; huge explosions are heard. Spain, one of the staunchest
    supporters of the US in the Iraq war, withdraws many of its staff from its embassy
    in Iraq.'
  - Whilst the Sri Lankan prime minister Ranil Wickremesinghe is visiting the United
    States, the country's president Chandrika Kumaratunga suspends parliament and
    deploys troops, effectively putting the country into a state of martial law.
  - The Anglican Church splits over gay bishop. Half the archbishops of the Anglican
    union denounce the Episcopal Church's consecration of the world's first openly
    gay, Gene Robinson, non-celibate bishop and vowed not to recognize the appointment.
  - The sun surprises astronomers by launching another solar flare, this time the
    largest ever recorded.
  - Software company Novell has announced that it will purchase Linux distributor
    SuSE.
  - A study in Germany shows that leeches can help with arthritis pain, apparently
    because their saliva contains anti-inflammatories.
  - Mark Messier of the New York Rangers scores two goals against the Dallas Stars,
    giving him 1851 to pass Gordie Howe and to move into second place on the NHL career
    points list.
  - Mexican President Vicente Fox begins a three state trip to the United States with
    a stop in Arizona, where he addresses immigration issues. A man is reportedly
    injured at a shooting near the place Fox spoke.http://aolsvc.news.aol.com/news/article.adp?id=20031104215209990005
  - Canadian author M.G. Vassanji is awarded the Giller Prize for his book The In-Between
    World of Vikram Lall.
  - In Ecuador, Angel Shingre, a campesino leader and human rights campaigner who
    played a key role in bringing to light environmental problems caused by oil exploration
    in Ecuador's Amazon region, is assassinated in the city of El Coca.
