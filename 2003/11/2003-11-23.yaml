Date: '2003-11-23'
Source_URI: Portal:Current events/2003 November 23
Intelligence_Payload:
  Uncategorized:
  - A BBC Correspondent programme, based on computer-generated images, suggests that
    the Warren Commission's controversial magic bullet theory, in which it was claimed
    that the same bullet hit President John F. Kennedy and Governor John Connally
    during Kennedy's assassination in 1963, was correct. Using state of the art computer
    generated images based on the Zapruder film, the programme concludes that a lone
    gunman could have shot Kennedy. ABC News and Court TV arrived at a similar conclusion
  - 'Rose Revolution: beleaguered Georgian President Eduard Shevardnadze resigns.
    Elections will be in 45 days, but until then, Nino Burdzhanadze will be the acting
    president.'
  - Nationalist party HDZ appears set to beat the ruling centre-left coalition in
    Croatia's general election.http://uk.news.yahoo.com/031123/325/eeqic.html
  - EADS, the largest European aircraft company, is doing preliminary work on a hypersonic
    passenger aircraft that would take the place of the recently retired Concorde;
    the planning includes collaboration with Japanese firms and Ministry of International
    Trade and Industry. However, its subsidiary Airbus' A380 'super-jumbo' sub-sonic
    vehicle is the product expected to become the dominant commercial aircraft in
    the near-future.
  - The New York Times reports that the Federal Bureau of Investigation is actively
    monitoring and gathering intelligence on anti-war protest movements' activities,
    ostensibly to detect possible terrorist activity. Opponents such as the American
    Civil Liberties Union criticize the practice as regressionary to the days of J.
    Edgar Hoover's intense monitoring of private organizations for potential communist
    links.
  - The People's Republic of China plans to start tests of a SARS vaccine on humans
    by the end of December; trials with monkeys show that the vaccine was effective.
  - 10,000 trade unionists, environmentalists, and farm workers march in Miami to
    protest against the Free Trade Area of the Americas expansion meeting. Other street
    protests erupt into violent confrontations with police several times throughout
    the day. Protester sources indicate upwards of 250 protesters incarcerated, along
    with reports of physical and sexual assault while in custody. Other demonstrations
    take place in cities throughout the Americas.
  - A US military helicopter crashes near Bagram, Afghanistan, killing five soldiers
    and wounding seven.http://uk.news.yahoo.com/031123/325/eeqjm.html
  - Indian newspapers reported on the results of an in-depth 2002 survey of 57,321
    Pakistanis in 89 districts of Pakistan. Although the survey was primarily concerned
    with the performance of local governments, the newspapers mischaracterized its
    results as the "utter dissatisfaction" of Pakistanis with the government of Pakistani
    president Pervez Musharraf.
  Occupation of Iraq:
  - Three US troops are killed in Iraq, two of them in a civilian vehicle in Mosul
    and the third in a roadside bombing in Baquba. A mob desecrates the bodies of
    the Mosul victims and loots their gear.
  - 'A female acting ambassador to the US is chosen by Iraq''s Governing Council:
    Rend al-Rahim Francke, an Iraqi/American educated in Britain, France and Lebanon.https://www.reuters.com/newsArticle.jhtml;jsessionid=4PU2ESEZODN0ECRBAE0CFFA?type=topNews&storyID=3877806'
