Date: '2003-11-17'
Source_URI: Portal:Current events/2003 November 17
Intelligence_Payload:
  Uncategorized:
  - Lord Black of Crossharbour is pushed to resign as chief executive of his media
    empire, which may be sold.
  - Arnold Schwarzenegger is sworn in as Governor of California.
  - Tony Blair publicly defends his decision to invite President Bush to the UK on
    a state visit.
  - John Allen Muhammad is unanimously convicted of all four counts in the indictment
    against him, including two charges of capital murder, committed during the October
    2002 sniper shootings in the Washington, DC, metro area. The jury is currently
    deciding whether Muhammad will be sentenced to death or to life in prison.
  - People living near remote submarine bases in the West Highlands of Scotland are
    to be issued with potassium iodate tablets in case of a nuclear accident.
  - 'Coca eradication: The White House Drug Policy Office claims the area planted
    with coca in Peru and Bolivia combined fell by 35 km2 in the year up to June,
    suggesting that the coca eradication program in neighboring Colombia was not driving
    production over the borders. But the US figures were very different from preliminary
    estimates in September by the head of the UN Office on Drugs and Crime in Colombia,
    which suggested output in Peru and Bolivia may have risen by as much 21 per cent
    that year.'
  - Chess grandmaster Garry Kasparov is level-pegging against X3D Fritz after three
    games played.
  - The United States contract bridge team defeats the team from Italy to win the
    2003 Bermuda Bowl in Monaco. After thirteen days and over 1000 hands of bridge,
    the US team wins by one point, after Italian Lorenzo Lauria plays the wrong card
    from the dummy to lose the last hand.
  Occupation of Iraq:
  - Izzat Ibrahim, a top general in the Iraqi army under Saddam Hussein, is directly
    implicated in recent attacks on US troops; he is number six on the US list of
    most wanted Iraqis and the second-highest target still at large after the former
    president himself.
  - Italian official Marco Calamai resigns from the U.S.-led administration running
    Iraq, stating that "The provisional authority simply doesn't work". He says that
    the Iraqis are becoming angry and that the UN needs to step in. He accuses the
    US of underestimating the complexity of Iraq's social structure.
