Date: '2003-11-15'
Source_URI: Portal:Current events/2003 November 15
Intelligence_Payload:
  Uncategorized:
  - Two car bombs explode outside synagogues in Istanbul, Turkey, at about 0700 UTC
    (1000 local time), killing at least 20 people and injuring another 250. A radical
    Islamist group, the Great Eastern Islamic Raiders' Front, claims responsibility.
  - In Louisiana, conservative Democrat Kathleen Blanco defeats Republican Bobby Jindal
    to become the first woman in that state to be elected governor. Jindal is the
    son of immigrants from India.
  - One hundred thousand people of various organisations demonstrate in Paris on occasion
    of the last day of the European Social Forum.
  - Former United Kingdom Foreign Secretary Robin Cook expresses puzzlement as to
    why George W. Bush should have been invited for a state visit to the UK. Opinion
    polls suggest that 60% of the British people think President Bush is a threat
    to world peace.
  - Police in Hebei province, People's Republic of China, arrest suspected serial
    killer Yang Xinhai alleged to have killed at least 65 people.
  - In Saint-Nazaire, France, 15 people, including 2 children, die and 32 are injured
    or missing when a gangway falls off the Queen Mary 2 cruise ship, which has just
    finished construction.http://aolsvc.news.aol.com/news/article.adp?id=20031115101109990001
  - '2003 Rugby Union World Cup: In the semi-finals Australia defeats New Zealand
    by 22 points to 10 to win a place in next weekend''s final.'
  Occupation of Iraq:
  - Iraq's Governing Council announces that sovereignty is to be restored to Iraq
    in June 2004, with full elections to be held in 2005.
  - Two U.S. Black Hawk helicopters crash near Mosul in northern Iraq. Reports suggest
    one helicopter was hit by a rocket-propelled grenade and it then collided with
    the other helicopter. Latest reports suggest seventeen dead and five injured.
  - One U.S. soldier is killed and two are injured in a roadside blast in northern
    Baghdad.http://interestalert.com/brand/siteia.shtml?Story=st/sn/11150000aaa02f3f.upi&Sys=siteia&Fid=LATEBRKN&Type=News&Filter=Late%20Breaking
