Date: '2003-11-28'
Source_URI: Portal:Current events/2003 November 28
Intelligence_Payload:
  Uncategorized:
  - The November 28 issue of the journal Science reports that the United States is
    not sufficiently prepared to respond to an influenza pandemic.
  - The United States is about to back down over its restrictions on steel imports
    that had caused such alarm in Europe and Asia.
  - 'War on Terrorism: A terrorism expert with access to intelligence on Al-Qaeda
    says the group wants to launch a catastrophic attack in the United States.'
  - The anti-Good Friday Agreement Democratic Unionist Party with 30 seats becomes
    the biggest party in Northern Ireland in the Northern Ireland Assembly Election,
    2003, replacing the Ulster Unionist Party (27 seats), while Sinn Féin at 24 seats
    replaces the SDLP (18 seats) as the major Irish nationalist party.
  - John Manley, Deputy Prime Minister of Canada, announces he will not take a position
    in the new cabinet of leadership rival Paul Martin that will take office on December
    12, and will not run again in his riding of Ottawa South in the forthcoming federal
    election. Martin praises Manley's past accomplishments and takes the unusual step
    of publicly offering Manley the posting of Ambassador to the U.S.http://www.cbc.ca/stories/2003/11/28/manley031128
  - In Italy, Alessandra Mussolini, granddaughter of Benito Mussolini and niece of
    Sophia Loren, resigns from the right wing National Alliance party after she considers
    that party leader and deputy Prime Minister Gianfranco Fini "dishonoured her family's
    history" when apologising in Israel for Italy's actions before and during the
    Second World War and describing fascism as "an absolute evil".
  - Simon Crean announces his resignation as leader of the Australian Labor Party,
    the main opposition party in Australia. Crean has led the party since November
    2001, but has consistently trailed Prime Minister John Howard in opinion polls.
    Crean becomes the first Labor leader to resign without having fought an election.
    His successor will be elected at a meeting of the Labor Caucus on . The candidates
    will probably be former leader Kim Beazley and finance spokesman Mark Latham.
    Foreign Affairs spokesman Kevin Rudd may also stand.
  - 'ROC referendum, 2004: In Taiwan, a referendum bill written by majority pro-Chinese
    reunification pan-blue coalition legislators, is passed by the Legislative Yuan.
    The move is met by opposition from the People''s Republic of China as it is seen
    as a possible route for declaring Taiwan independence, even though the bill blocks
    referendums on sovereignty issue and changing the official name of the Republic
    of China.'
  - In Russia, the planned merger between YUKOS and Sibneft has reportedly been suspended
    by Sibneft. It is unclear whether the two oil firms will carry on with the merger.
  - 'Global warming: In a new report, the WWF warned that billions of people may suffer
    severe water shortages if glaciers, which contain 70 percent of the world''s fresh
    water reserves, continue to melt.'
  - Highland Park High School, guided by 2009 No. 1 overall NFL draft pick Matthew
    Stafford. upset the nation's No. 1 football team Ennis, 38-28, in the Texas Class
    4A Division II playoffs at Texas Stadium. Ennis was guided by future Texas Tech
    quarterback Graham Harrell.
