Date: '2003-11-20'
Source_URI: Portal:Current events/2003 November 20
Intelligence_Payload:
  Uncategorized:
  - The FTAA negotiations in Miami end one day early; a menu approach is adopted to
    assure the future of the agreement, allowing individual countries to opt out of
    controversial or unacceptable provisions. Between 10,000 and 25,000 protestors
    demonstrate outside the conference center; the police use rubber bullets, and
    over 100 people are arrested.
  - 'Terrorist attacks: Bombs hit Istanbul, Turkey. At least 25 are killed and hundreds
    injured in two car-bomb blasts that devastate the Turkish headquarters of HSBC
    and the British consulate. British Consul-General Roger Short is among the dead.
    The Great Eastern Islamic Raiders'' Front (IBDA-C), a radical Islamist group,
    claims responsibility.'
  - Between 110,000 (according to the police) and 300,000 (according to the organization)
    people demonstrate in and around Trafalgar Square in London against the war in
    Iraq and George W. Bush's state visit.
  - The People's Republic of China says it may retaliate against restrictions the
    US is to impose on imports of Chinese textile products.
  - Pop musician Michael Jackson turns himself in to the Santa Barbara County Sheriff's
    Office and is officially charged with child molestation.
