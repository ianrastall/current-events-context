Date: '2003-11-19'
Source_URI: Portal:Current events/2003 November 19
Intelligence_Payload:
  Uncategorized:
  - The Canada-U.S. Power System Outage Task Force releases an interim report, citing
    a loss of situational awareness in FirstEnergy Corporation's control room as the
    primary cause and "immature" monitoring software used at the Midwest Independent
    Transmission System Operator as a secondary cause.
  - 'FTAA: The Bush administration says it is opening free-trade negotiations with
    Colombia, Peru, Ecuador, Bolivia, and Panama. It hopes to start the free trade
    talks by the second quarter of 2004.http://www.bday.co.za/bday/content/direct/1,3523,1486839-6078-0,00.html'
  - The People's Republic of China expresses firm opposition to US restrictions on
    imports of textiles (from mainland China) and vows to take the dispute to the
    WTO. Abandoning tolerance toward Taiwan for the first time since 2000, the PRC
    threatens to use force and, ultimately, conduct war against Taiwan if it pursues
    independence. The PRC's state press condemns Taiwanese President Chen Shui-bian's
    move toward holding a referendum on "independence" and providing the legislative
    framework for declaring a Republic of Taiwan.
  - An arrest warrant is issued for pop singer Michael Jackson.
  - The United States Department of Justice charges 47 people, including former employees
    of JP Morgan and UBS, with offenses related to foreign exchange fraud.https://www.reuters.com/newsArticle.jhtml;jsessionid=UJFB402DX5UH2CRBAEOCFEY?type=businessNews&storyID=3853910
    At the same time investigations into fraud in the US mutual fund industry widen.
    The U.S. House of Representatives approves a draft bill that explicitly bans some
    of the troublesome mutual fund practices. Some commentators think these various
    financial scandals are undermining the US dollar, which falls to an all-time low
    against the euro.
  - President Hosni Mubarak of Egypt is taken ill during a live television broadcast;
    he had taken antibiotics whilst fasting during Ramadan.
  - 'Politics of Japan: The Diet of Japan names Junichiro Koizumi Prime Minister in
    a short special session.'
  - 'Speaking in London, UK, Richard Perle says that the 2003 invasion of Iraq was
    an illegal act but morally correct: "international law stood in the way of doing
    the right thing".'
  - A tabloid journalist claims to have penetrated Buckingham Palace security preceding
    the visit of U.S. President George W. Bush to the UK. The Palace is seeking a
    restraining order to prevent The Mirror from publishing further information about
    the royal household.
  - The four-match chess contest between Garry Kasparov and X3D Fritz ends in a draw.
  - 'UEFA: The final five qualifying countries for the 2004 European Football Championship
    are settled, with Latvia astonishingly defeating Turkey 3–2 on aggregate over
    two games.'
  - London Bridge Tower, set to become the tallest skyscraper in Western Europe, is
    granted full planning permission by the Deputy Prime Minister John Prescott.
  - Release date of violent computer-game Manhunt.
