Date: '2003-11-29'
Source_URI: Portal:Current events/2003 November 29
Intelligence_Payload:
  Uncategorized:
  - In Norfolk, Virginia, the USS Cole leaves port on the destroyer's first overseas
    deployment since it was bombed in 2000 in Yemen's port at Aden.http://www.cnn.com/2003/US/11/29/cole.deploys.ap/index.html
  - Police in Turkey announce the arrest of a yet-unnamed man they state has admitted
    giving the order to suicide bombers to attack Beth Israel synagogue in Istanbul
    on November 15.
  - Luan Enjie, director of the National Aerospace Bureau of the People's Republic
    of China states that "By 2020, we will achieve visiting the moon."http://www.cnn.com/2003/TECH/space/11/29/china.moon.ap/index.html
  - 'Occupation of Iraq: A team of eight Spanish intelligence agents is attacked south
    of Baghdad; seven are killed and one wounded. Two Japanese diplomats are killed
    near Tikrit. Two U.S. soldiers and a Colombian civilian contractor are killed
    in Baghdad.'
  - In Australia, the opposition Labor Party's finance spokesperson, Mark Latham,
    announces that he will contest the party leadership ballot on against the former
    leader Kim Beazley. Press reports place the two candidates at about 40 votes each,
    with about ten undecided.
  - French and German university students continue to hold protests, including strikes,
    over controversial policies such as tuition fees. German students also occupied
    the central offices of the PDS in Berlin, following a similar protest earlier
    in the week in which 30 to 40 students occupied the office of Thomas Flierl for
    more than 24 hours. Protests in both countries have been continuing to spread
    for the last two weeks. German press:,http://morgenpost.berlin1.de/inhalt/berlin/story644038.html
