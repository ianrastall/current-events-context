Date: '2003-11-16'
Source_URI: Portal:Current events/2003 November 16
Intelligence_Payload:
  Uncategorized:
  - The Serbian presidential election fails as only 38% of the registered electorate
    show up to vote. About 18% of registered voters cast a vote for Tomislav Nikolic,
    14% for Dragoljub Micunovic, 4% for Velimir Ilic, and 3% for other candidates.
    With a turnout of less than 50%, the poll is declared invalid.
  - A BBC poll suggests that there is dangerously poor AIDS awareness in China and
    India; the poll leaves little grounds for optimism.
  - 'Israeli-Palestinian conflict: In Israel, four former heads of Shin Bet say Israel
    is heading for disaster unless Prime Minister Ariel Sharon''s right-wing government
    changes its policies with regard to the Palestinians and begins negotiations.
    Ministers accuse the former security heads of creating a controversy for political
    reasons.http://fr.jpost.com/servlet/Satellite?pagename=JPost/JPArticle/ShowFull&cid=1068880715304&p=1008596981749'
  - A 7.5-magnitude earthquake in the Aleutian Islands in Alaska triggers tsunami
    warnings.
  - '2003 Rugby Union World Cup: England beats France 24–7 in high winds and heavy
    rain in the World Cup semi-final.'
  Occupation of Iraq:
  - An audio-tape, purportedly from Saddam Hussein, airs on the Dubai station al-Arabiya.
    The CIA later informs that it is probably not the voice of Saddam Hussein.
  - At least two loud blasts echo across Baghdad after dark on Sunday night.
  - Top Iraqi scientist Dr. Modher Sadeq-Saba al-Tamimi flees to Iran. After eight
    months without work, and with no clear plans from the occupying Coalition, the
    scientist seeks work abroad. Iranian officials deny the claims.
  - In the United Kingdom, Tony Blair faces the "electoral poison" of U.S. President
    George W. Bush's state visit next week.
