Date: '2003-11-14'
Source_URI: Portal:Current events/2003 November 14
Intelligence_Payload:
  Uncategorized:
  - '2003 California recall: California Secretary of State Kevin Shelley officially
    certifies the recall election and he declares Arnold Schwarzenegger the Governor-Elect.
    The swearing-in is set to take at PST on Monday November 17 on the steps of the
    State Capitol in Sacramento, California.'
  - Four former heads of Israel's internal security criticise the policies of the
    right wing Likud-led government of Ariel Sharon towards Palestinians and say the
    policies if not changed would see Israel "headed for (an) abyss". The four headed
    the security services for two decades between 1980 and 2000.
  - In Paris over 40,000 people participate in the European Social Forum.
  - Attempting to calm fears that the recent takeover of oil giant YUKOS will mean
    a return to the era of a state-managed economy, Russian president Vladimir Putin
    tells Russian businessmen that the government is not planning to take control
    of the economy.
  - 'Politics of Canada: Paul Martin is elected leader of the Liberal Party. He becomes
    Prime Minister-designate and will assume office upon Jean Chrétien''s retirement
    by the end of February 2004.'
  - The US trade deficit with the People's Republic of China hit a record USD $12.7
    billion in September, with imports from mainland China also a record at . For
    the first nine months of that year, the total trade deficit was . At this pace,
    it will surpass the record of set in 2002.
  - 'Economy of Japan: Japan''s economy grows 0.6% in Q3 to give the seventh quarter
    of growth after a long recession.'
  - 'War on Terrorism: A leaked UN report claims that attempts to cut off the flow
    of funds to al-Qaeda are being undermined by lack of will.'
  - 'Politics of Germany: German opposition party CDU votes to expel Member of Parliament
    Martin Hohmann after he made a speech that was widely criticised for being anti-Semitic.'
  - India and the People's Republic of China hold joint naval exercises near Shanghai.
  Occupation of Iraq:
  - During his visit to London, President Bush plans to meet the families of UK troops
    killed in Iraq.
  - Two US troops are killed near Samarra when their vehicle is blown up. US forces
    kill seven Iraqis thought to have been preparing a rocket attack.
  - Pentagon bans cameras at funerals in Arlington National Cemetery. Coverage of
    bodies arriving at Dover Air Force Base is already banned.
