Date: '2003-11-10'
Source_URI: Portal:Current events/2003 November 10
Intelligence_Payload:
  Uncategorized:
  - The World Trade Organization declares United States tariffs on steel imports inconsistent
    with free trade, opening the way for the European Union to impose punitive tariffs
    on goods of US origin.
  - 'War on Terrorism: The United States Supreme Court has agreed to hear appeals
    by 16 people detained at Guantanamo Bay. The Supreme Court will consider whether
    alleged illegal combatants held by the United States since the War in Afghanistan
    can use American courts to challenge their detainment.'
  - In India, heavy rain boosts economic growth forecasts for the Indian economy.
  - DiC Kids Network Premiere of Sabrina's Secret Life
  - 'Sequels: Sabrina: The Animated Series (1999-2000) and Sabrina: Friends Forever
    (2002)'
  - In the United Kingdom, Michael Howard, new leader of the Conservative Party, announces
    his first Shadow Cabinet; membership is trimmed down to 12 from 26.
  - Alliance Capital Management, owned by AXA, fires two senior executives as a result
    of enquiries into mutual fund abuses.
  - Security officials in Saudi Arabia order 4600 extra troops into Mecca to provide
    increased security during Ramadan, saying that additional attacks could occur
    at any moment.
  - Questions surround Yasser Arafat after further allegations about money moved out
    of the West Bank to secret bank accounts.
  - Researchers report that some patients who recovered from SARS have developed bone
    disease, possibly as a result of drugs used to fight the infection.http://interestalert.com/brand/siteia.shtml?Story=st/sn/11090002aaa06120.upi&Sys=siteia&Fid=LATEBRKN&Type=News&Filter=Late%20Breaking
  - 'Toronto municipal election, 2003: David Miller is elected mayor of Toronto.'
  - In the United Kingdom, the Prince of Wales returns from a foreign trip to confront
    enormous media interest in rumours of homosexual acts involving him and a former
    aide arising from allegations made by another former royal servant, George Smith.
    Charles is considering legal action, but his staff have ruled out the possibility
    of a televised statement or interview.
  - Survivors of the massacre of Srebrenica, the worst European atrocity since World
    War II, are to sue the United Nations and the Netherlands for almost USD for failing
    to protect the Muslim enclave.
  - 'Fine arts: A striking piece of art, the lifelike sculpture of the Nazi leader
    Adolf Hitler kneels in an empty room in a Munich art museum, Germany (where the
    Nazi past has made it taboo to display Hitler in any form except in documentary
    films). The exhibition is at the neo-classical museum, which the Nazi leader ordered
    built in 1937.'
  Occupation of Iraq:
  - An array of senior figures in the United States criticize the case the Bush administration
    used to go to war with Iraq; they state that there never was a clear and present
    danger.
  - Paul Bremer says that attacks on coalition forces in Iraq will get worse unless
    intelligence improves; he says several hundred terrorists have entered Iraq from
    neighbouring countries.
