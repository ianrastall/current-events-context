Date: '2003-11-21'
Source_URI: Portal:Current events/2003 November 21
Intelligence_Payload:
  Uncategorized:
  - President George W. Bush arrives back in the United States after his controversial
    State Visit to the UK.
  - U.S. ambassador to the People's Republic of China Clark Randt is called to meet
    Chinese ministers twice (second day in succession) in connection with US plans
    to restrict imports of Chinese textiles; Beijing is shocked at the US move.
  - The Global Environment Facility Council Approves in Grants for 19 Projects to
    Improve the Global Environment
  Occupation of Iraq:
  - In the pre-dawn hours RPGs are launched from donkey carts at two Baghdad hotels
    and the oil ministry building. Reports indicate slight damage and one casualty.
  - Former senior U.S. intelligence official and UNSCOM inspector Scott Ritter urges
    the Parliament of the United Kingdom to investigate the questionable way in which
    units of British secret intelligence agencies massaged public opinion prior to
    war with Iraq.
