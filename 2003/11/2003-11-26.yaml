Date: '2003-11-26'
Source_URI: Portal:Current events/2003 November 26
Intelligence_Payload:
  Uncategorized:
  - Action movie star FPJ (Fernando Poe Jr.) announces he will seek the presidency
    of the Philippines. His popularity has caused political observers to suggest he'll
    have a major impact on the campaign to choose an opposition candidate for next
    May's race.
  - Australian Test cricket captain Steve Waugh announces his retirement from international
    cricket.
  - The People's Republic of China dismantles its satellite tracking station in Kiribati
    following the Pacific atoll nation's recognition of the Republic of China (Taiwan)
    on November 7.
  - 'ROC presidential election 2004: The Kuomintang drops its opposition to holding
    a referendum on Taiwan independence, a position that has been advocated by President
    Chen Shui-bian.'
  - Chairman Choe Byung-yul of the Grand National Party in South Korea has begun a
    hunger strike after President Roh Moo-hyun vetoed a bill demanding the appointment
    of an independent prosecutor for Mr. Roh's campaign finances.
  - India and Pakistan announce a ceasefire in the Kashmir region.
