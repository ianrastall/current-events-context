Date: '2003-11-09'
Source_URI: Portal:Current events/2003 November 9
Intelligence_Payload:
  Uncategorized:
  - 'Guatemalan election: Large numbers of voters turn out for the general election,
    despite fears of violence. In the presidential race, former Guatemala City mayor
    Óscar Berger receives 34% of the vote, and center-left candidate Álvaro Colom
    gets 26%; former dictator Efraín Ríos Montt comes in third in with 19%. A run-off
    vote between Berger and Colom is to take place on December 28.'
  - Coca-Cola sends some of its most senior executives to Dublin to discuss a spreading
    student boycott of Coca Cola products. Students in University College Dublin,
    Trinity College Dublin, National University of Ireland, Maynooth and Queens University
    Belfast announced their boycott amid allegations of ill-treatment of Colombian
    workers who bottle the company's drinks for sale in Latin America.
  - 'Japan general election: Prime Minister Junichiro Koizumi wins the election in
    Japan but with a reduced majority. The opposition Democratic Party is projected
    to win almost 180 seats which for the first time will take them into the position
    of forming a credible opposition. Other small parties like Japan Communist Party
    loses seats significantly, making two-party system realistic in politics of Japan.'
  - Peruvian armed forces capture a leader of the Shining Path rebel group after a
    clash in the Andes in which four guerrillas were killed and an officer wounded.
  - '2003 Rugby Union World Cup: England beats Wales to reach the semi-final of the
    World Cup, but Wales led in the first half.'
  - Beginning at about 1 a.m. UTC there is a lunar eclipse, visible from the Americas,
    Europe, Africa, central Asia.
  - William Donaldson, chairman of the U.S. Securities and Exchange Commission, launches
    a scathing attack on the US securities and mutual fund industries. Eliot Spitzer,
    New York Attorney General, is expected to shortly file civil and criminal charges
    against a widening group of fund management companies.
  - Experts conclude that dioxin probably killed off the trout in the Great Lakes.
  - In the United States, support for George W. Bush decreases as casualties mount
    in Iraq.
  - British bank Barclays Bank Plc is reported to be in talks with three US banks
    with regard to a takeover bid for one of them.
  War on Terrorism:
  - Seventeen people are killed and more than 120 are injured, many of them children,
    in a midnight car bomb attack in Riyadh, Saudi Arabia. Suspicions immediately
    fall on the terrorist movement al-Qaeda. The victims included Saudis as well as
    Sudanese, Lebanese, and Egyptian residents of the compound, which was less rigorously
    protected than similar facilities inhabited by westerners.
  - 'The Venice Commission: (The European Commission for Democracy through Law) criticizes
    the regime under which men are held in Guantanamo Bay. It concludes that it is
    wrong to ignore the Geneva Conventions and basic human rights law.'
  - British special forces commanders criticise the quality of the intelligence given
    to them before and during the conflict with Iraq.
  - The UK Secretary of Defence Geoff Hoon is accused of providing misleading figures
    about the true cost of conflict in Iraq.
  - U.S. troops shoot and kill Mohannad Ghazi al Kaabi, the appointed interim mayor
    of Sadr City (formerly Saddam City), Baghdad. The incident reportedly occurs from
    a confrontation following Mohannad's refusal to follow instructions from the on-site
    security official. The security official was enforcing security procedures stemming
    from recent car bombing incidents in accordance with standard rules of engagement.
