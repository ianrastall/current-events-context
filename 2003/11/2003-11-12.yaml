Date: '2003-11-12'
Source_URI: Portal:Current events/2003 November 12
Intelligence_Payload:
  Occupation of Iraq:
  - A top-secret CIA intelligence report warns about growing numbers of Iraqis concluding
    the coalition can be defeated and supporting the resistance. The CIA report also
    cautions that more aggressive counterinsurgency tactics will induce other Iraqis
    to join the resistance. Slate magazine notes the new anti-insurgency measures
    in "postwar Iraq" means the situation is "Iraq War – Phase II."
  - In response to a leaked report, Paul Bremer says that terrorists "are trying to
    encourage the Iraqi people to believe that the United States is not going to stay
    the course". The CIA report says that the incipient insurgency is deep rooted,
    growing rapidly and not confined to ex-Baathists.
  - President Bush and senior advisers meet in Washington to determine how to move
    forward in Iraq, given the slow progress of the Iraqi Governing Council and the
    deteriorating political situation as outlined in the CIA report.
  - Thirty-one people, mostly members of Italian security forces, are killed in a
    mid-morning truck bombing in Nasiriya. Italian opposition politicians call for
    a pullout from Iraq.
  Uncategorized:
  - 'Israeli-Palestinian conflict: The Palestinian parliament approves a new cabinet
    led by Prime Minister Ahmed Qurei.'
  - The United Kingdom government announces plans to introduce identity cards, which
    are intended to eventually become compulsory.
  - The Peruvian Congress approves more charges against ex-President Alberto Fujimori,
    alleging he trafficked arms to Colombian guerrillas, sanctioned torture, was responsible
    for the disappearance of student activists, and mismanaged millions of dollars
    from Japanese charities to build schools for poor children in Peru, with an unexplained
    shortfall in funds received, among other irregularities.
  - Shanghai With the Shanghai Transrapid sets up a new world record for commercial
    railway systems.
