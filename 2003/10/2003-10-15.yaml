Date: '2003-10-15'
Source_URI: Portal:Current events/2003 October 15
Intelligence_Payload:
  Uncategorized:
  - '2003 occupation of Iraq: U.S. concessions to proposals from Russia, the China
    and Pakistan ensure their support for a United Nations Security Council resolution
    to provide greater international legitimacy to the occupation force and the Iraq
    Interim Governing Council. The resolution draft, legitimizing US military and
    political control over Iraq''s political future, was already supported by United
    Kingdom, Spain, Cameroon, Bulgaria, Angola, Mexico, Chile and Guinea. Russia agrees
    to act as a mediator to achieve support for the compromise also from Germany and
    France.'
  - 'Israeli-Palestinian conflict: Four people die in a bomb attack on a convoy of
    US diplomatic vehicles in the Gaza Strip. Palestinian Authority head Yasser Arafat
    calls the bombing "dirty and shameful" in an exclusive interview on BBC News.
    Secretary of State Colin Powell urges Prime Minister Ahmed Qurei in a telephone
    call "to take action to put an end to violence and terrorism," according to a
    Palestinian official.'
  - China launches its first astronaut, Yang Liwei into orbit aboard a Shenzhou spacecraft,
    Shenzhou 5. The 21-hour trip is planned to circle the planet 14 times.
  - '2003 occupation of Iraq: Japan offers aid to Iraq in what could be the first
    tranche of a total of .'
  - The Supreme Court of the United States agreed to hear Elk Grove Unified School
    District v. Newdow
  - The Irish-based Australian novelist D.B.C. Pierre (real name Peter Finlay) wins
    the 2003 Booker Prize with his first novel, Vernon God Little, a satire on a Texas
    high-school massacre.
  - Anglican leaders from around the world meet in Lambeth Palace in an attempt to
    avoid a schism on the issue of homosexuality in the clergy. The Church of Ireland
    Archbishop of Armagh, Robin Eames says that the Anglican Communion is moving towards
    a "consensus situation" on the issue of homosexuality and the clergy at its meeting
    in Lambeth Palace.
  - 'Israeli-Palestinian conflict: The United States vetoes a United Nations Security
    Council resolution condemning the Israeli West Bank barrier.'
  - The Canadian Alliance and Progressive Conservative Party of Canada strike a deal
    to merge. The deal creating the Conservative Party of Canada must be ratified
    by each party's membership before December 12.
  - 'Azerbaijan: Presidential elections.'
  - Steven Gerrard becomes captain of Liverpool Football Club.
