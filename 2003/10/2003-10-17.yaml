Date: '2003-10-17'
Source_URI: Portal:Current events/2003 October 17
Intelligence_Payload:
  Uncategorized:
  - Carlos Mesa is sworn in as the President of Bolivia, after former president Gonzalo
    Sánchez de Lozada was forced to resign as protests and strikes escalated in the
    Bolivian Gas War.
  - 'Occupation of Iraq: Four US troops and at least two police officers are killed
    in an ambush in Karbala and another incident in Iraq.'
  - China's economy grows at 9% in the latest period, on course to become the largest
    economy in the world by 2050.
  - A 197 ft () spire is inserted on Taipei 101 in Taipei, Taiwan, unseating Malaysia's
    Petronas Towers as the world's tallest building.
