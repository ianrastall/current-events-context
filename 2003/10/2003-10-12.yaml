Date: '2003-10-12'
Source_URI: Portal:Current events/2003 October 12
Intelligence_Payload:
  Uncategorized:
  - 'Cricket: New Zealand prevents India from snatching victory in the first Test
    cricket at Ahmedabad.'
  - Relations between Syria and the United States fall to a low point as Syria criticizes
    the US for its failure to censure Israel.Syrian Official Says Relations With U.S.
    Plunge to New Low - NYTimes.com
  - China confirms that it will launch its first manned space mission between October
    15 and 17. The spacecraft plans to orbit Earth 14 times before landing in an undisclosed
    location. (See Shenzhou 5)
  - The operation to separate two-year-old Egyptian twins joined at the head is going
    well in Dallas; the two boys have been separated and no troublesome complications
    have arisen. The next steps are to reconstruct the boys' skulls including the
    skin.
  - India, Thailand, and China press ahead with efforts and a study group aimed at
    creating a Free Trade Area.
  - '2003 occupation of Iraq: A huge explosion occurs in the center of Baghdad, possibly
    caused by car bomb. A number of fatalities are reported. The blast takes place
    in Baghdad Hotel.'
  - Researchers announced that they have discovered the detailed relationship between
    the Ras v12 gene, polarity genes, and metastasis of cancer in fruit flies.
  - Liberia drops diplomatic relations with the Taiwan and re-establishes ties with
    China. This move was seen largely as a result of China's lobbying in the United
    Nations, which is planning to deploy a peacekeeping force to Liberia. Taiwanese
    Foreign Minister Eugene Chien offers to resign as a result.http://famulus.msnbc.com/FamulusIntl/reuters10-12-054050.asp?reg=PACRIM
