Date: '2003-10-28'
Source_URI: Portal:Current events/2003 October 28
Intelligence_Payload:
  Uncategorized:
  - The United States Federal Reserve leaves its key interest rate unchanged at today's
    meeting, saying that rates will be kept low for a considerable period.
  - Halloween solar storms, 2003. The sun emits another coronal mass ejection directly
    toward the Earth, the third largest solar flare on record. The effects are projected
    to affect Earth on the 29th.
  - Wildfires are largest in California history; the Cedar Fire leaeds to 1,500 homes
    being destroyed, 16 people killed and burned. Evacuations are ordered from parts
    of cities in Los Angeles and San Diego counties. The conflagration also spreads
    across the border into the Mexican state of Baja California, where two deaths
    are reported.
  - The UK Conservative Party's 1922 Committee announces that leader Iain Duncan Smith
    will face an immediate vote of confidence in his leadership on the following day,
    after at least 25 backbenchers formally request it.
  - The campaign for Japan general election, 2003 starts, lasting until a voting date,
    Nov 9.The Japan Times - News on Japan, Business News, Opinion, Sports, Entertainment
    and More
