Date: '2003-10-25'
Source_URI: Portal:Current events/2003 October 25
Intelligence_Payload:
  Uncategorized:
  - The Indian philosopher and Hindu revivalist Pandurang Shastri Athavale dies at
    the age of 83.
  - Israel publishes a map of the West Bank barrier.
  - 'World Series: Baseball: The Florida Marlins defeat the New York Yankees, four
    games to two, to win the 2003 World Series.'
  - 'Occupation of Iraq: A US Blackhawk helicopter is brought down near Tikrit by
    Iraqi militants. The Daily Star Lebanon reports that the US is effectively plundering
    Iraq following the occupation. The daily average of attacks on US troops rises
    and reaches about 25–26 per day. 100,000 march against the occupation of Iraq
    in Washington DC.'
  - Tony Blair announces that the UK will press ahead with GM technology.
  - Many countries in the Northern Hemisphere will end daylight saving time in the
    night from October 25 to October 26. In the Southern Hemisphere daylight saving
    time will start only in the Australian states of New South Wales, South Australia,
    and Victoria.
