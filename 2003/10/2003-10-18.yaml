Intelligence_Payload:
  Uncategorized:
  - Leaders of Pacific-rim nations gather in Bangkok ahead of the 11th Asian Pacific
    Economic Cooperation (APEC) conference.http://interestalert.com/brand/siteia.shtml?Story=st/sn/10180000aaa07407.upi&Sys=siteia&Fid=LATEBRKN&Type=News&Filter=Late%20BreakingAsian
    Leaders Find China a More Cordial Neighbor - NYTimes.com President George W. Bush
    arrives in Thailand ahead of an APEC summit of 21 Asia-Pacific government leaders
    which is likely to be dominated by discussions of the War on Terrorism and trade
    friction between rich and poor nations (trade and currency).
  - New audio tapes, allegedly from Osama bin Laden, air on the Al Jazeera network.
  - 'Occupation of Iraq: Spain''s government, one of the staunchest supporters of
    the attack on Iraq, has pledged over several years toward Iraqi reconstruction.'
  - Zimbabwe's state oil corporation is reported to have run out of fuel, aggravating
    the continuing acute fuel crisis.
  - Officials declare a state of emergency due to severe flooding in Squamish, British
    Columbia. Parts of the town are evacuated.
  - Canadian Prime Minister Jean Chrétien, visiting Afghanistan's President Hamid
    Karzai, is whisked out of Kabul owing to reports of a rocket attack. The reports
    turn out to be unfounded.
