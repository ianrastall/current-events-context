Date: '2003-10-26'
Source_URI: Portal:Current events/2003 October 26
Intelligence_Payload:
  Uncategorized:
  - Wildfires start to rage in Southern California. The scheduled NFL Monday Night
    Football game between the San Diego Chargers and Miami Dolphins is relocated from
    San Diego, California, to Tempe, Arizona, as a consequence of the fires.
  - 'Occupation of Iraq: The Al-Rashid Hotel in Baghdad where US deputy defense secretary
    Paul Wolfowitz was staying has been evacuated after several rockets were fired
    at it in the morning. one US Colonel was killed and fifteen individuals wounded
    (three seriously) in the attack. Two more explosions occurred near Al Rashid hotel
    later towards the evening. Further investigations confirm that Iraq had no active
    nuclear program, but did not relinquish nuclear ambitions or technical records.'
  - The President of Syria says that Iran and Syria, which are increasingly close
    allies, are capable of neutralizing conspiracies of foreign powers (implicitly
    referring to the US and Israel).
  - Mikhail Khodorkovsky, Russia's wealthiest businessman, has been arrested and is
    being held in Moscow facing charges of fraud and tax evasion.
