Date: '2003-10-03'
Source_URI: Portal:Current events/2003 October 3
Intelligence_Payload:
  Uncategorized:
  - 'Near-Earth asteroid: Confirmation on the closest near-miss of a natural object
    ever recorded. The asteroid (designated 2003 SQ222), about the size of a small
    house, flew past Earth at a distance of around 88,000 kilometres. It would have
    made a fireball had it entered the atmosphere.'
  - 'Iraq and weapons of mass destruction: The world continues to digest David Kay''s
    report that finds very little evidence of Weapons of mass destruction in Iraq,
    although the regime did intend to develop more weapons with additional capabilities.
    Such plans and programs appear to have been dormant, the existence of these were
    also concealed from the United Nations during the inspections that began in 2002.
    Weapons inspectors in Iraq do find clandestine "network of biological laboratories"
    and a deadly strain of botulinum. The US-sponsored search for WMD has so far cost
    and is projected to cost around more.'
  - 'California recall: Arnold Schwarzenegger denies admiring Hitler. Arnold Schwarzenegger''s
    denial comes days before the vote for the next governor of California.'
  - General Wesley Clark suggests that members of the Bush administration may be liable
    to criminal charges in connection with the Iraq war. Clark alleges that the plans
    for the 2003 invasion of Iraq, and other interventions in the Middle East (possibly
    including Lebanon and Syria), pre-dated the inauguration of the President and
    that the reasons for the war were misleadingly presented to the US people.
  - Evo Morales said that Gonzalo Sánchez de Lozada, president of Bolivia, may be
    preparing a coup. (in Spanish)
  - Polish soldiers of the United States-led Coalition discovered four advanced missiles
    around central Iraq in the Hilla region near a highway. The Roland-type French-made
    missiles (which are fired from a mobile launcher vehicle against low flying aircraft)
    were initially believed to have been manufactured earlier in 2003. Arms exports
    to Iraq had been barred by the United Nations after the 1990 invasion of Kuwait.
    France says it last shipped Roland missiles to Iraq in 1986. The Polish soldiers
    were later found to have misinterpreted markings that read 07-01-KND 2003 as a
    date on the missiles.
