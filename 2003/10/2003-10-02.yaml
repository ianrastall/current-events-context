Date: '2003-10-02'
Source_URI: Portal:Current events/2003 October 2
Intelligence_Payload:
  Uncategorized:
  - North Korea claims to "have already processed" 8,000 fuel rods from its Yongbyon
    nuclear reactor north of Pyongyang and is using the plutonium extracted during
    the process to make atomic bombs to boost its nuclear capabilities for nuclear
    deterrent force. Citing a "hostile policy" by the United States, Vice Foreign
    Minister Choe Su Hon states this is a means to safeguard the country's territory.
  - 'Occupation of Iraq: The United Nations Security Council discusses a new United
    States draft resolution on Iraq, which would enhance the United Nations'' role
    in Iraq. Secretary General Kofi Annan states draft did not go in the direction
    he recommended. A quicker transfer of sovereignty "may change the dynamics on
    the ground, in terms of the security situation, and send a message".'
  - 'Technology – Genome: The genome chip arrived with several companies rushing to
    sell the known human genes. The products will allow scientists to scan all genes
    in a human tissue sample at once to determine which are active, with lower cost
    and increased speed.'
  - 'Sino-American relations: The United States Navy blames China for the 2001 Hainan
    Island incident. A report released to Jane''s Defence Weekly under the Freedom
    of Information Act said that the pilot of the Chinese jet fighter made three passes
    at the U.S. propeller-driven reconnaissance plane over international waters. On
    the third pass, the Chinese fighter hit a propeller on the American plane.'
  - 'Ontario general election, 2003: Dalton McGuinty becomes the new premier of Ontario
    when his Liberal Party defeats Ernie Eves''s incumbent Tories and Howard Hampton''s
    NDP.'
  - J. M. Coetzee wins Nobel Prize in Literature.
  - 'European Union: United States draft legislation which urges The Pentagon to buy
    defence parts from American manufacturers has turned heads in Brussels, with some
    warning of yet another trade dispute at the WTO.'
  - 'European Union: The first bilateral meeting between France and Austria since
    1998 is marked by disagreements over the European Constitution. Austria heads
    the group of small countries seeking to make changes to the text, but France wants
    to leave the draft by Valéry Giscard d''Estaing broadly untouched.'
  - 'Media: A Program on International Policy Attitudes (PIPA) study conducted with
    California-based Knowledge Networks, titled "Misperceptions, the Media, and the
    Iraq War," is released. According to this study, misperceptions about the 2003
    invasion of Iraq are most common among consumers of Fox News Channel and supporters
    of President George W. Bush and least common among consumers of PBS and NPR and
    supporters of Democratic presidential candidates. The study also found that frequent
    viewers of Fox News are more likely to believe in the misconceptions than less
    frequent ones. One example misconception is the belief that weapons of mass destruction
    have already been found in Iraq.'
