Date: '2003-10-19'
Source_URI: Portal:Current events/2003 October 19
Intelligence_Payload:
  Uncategorized:
  - A new biography, reported in The Sunday Times, claims that the prosecution of
    Oscar Wilde for sodomy was ordered by the then Liberal government, in a deal with
    the Marquess of Queensberry, the father of Lord Alfred Douglas, to prevent his
    exposure of a homosexual relationship between another of his sons, Viscount Drumlanrig,
    and British Prime Minister Lord Rosebery. According to reports, future prime minister
    H. H. Asquith played a key role in negotiating the deal, which led to the imprisonment
    of the Irish writer.
  - British Prime Minister Tony Blair is rushed to hospital with heart problems. An
    irregular heart-beat is diagnosed. Blair is given a cardioversion in hospital,
    where he stays for four or five hours before going back to Number 10 Downing Street,
    and is ordered by his doctors to take 24 hours complete rest.
  - Pope John Paul II beatifies Mother Teresa. Hundreds of thousands attend the ceremony
    in St. Peter's Square. Mother Teresa, who founded the Missionaries of Charity,
    is now one step from sainthood.
  - South Korea and the United States are reported to be discussing the possible withdrawal
    of thousands of US troops.
  - 'North Korea crisis: The United States says it is willing to give North Korea
    security assurances in exchange for a nuclear standdown. U.S. President Bush rules
    out a non-aggression treaty demanded by Pyongyang.'
  - Bomb blows up a pickup truck on a dirt road in Afghanistan's eastern Kunar Province,
    killing four people, and two Afghan soldiers are killed in a separate land mine
    explosion in the country's south. The explosions come two days after the Taliban
    allegedly distributed pamphlets warning against working with the post-Taliban
    government of President Hamid Karzai.
  - 'Israeli-Palestinian conflict: Palestinian gunmen attack an Israeli army foot
    patrol near a West Bank village, kills three soldiers and wounds a fourth, rescue
    services and security sources state. Gunfire attacks near the Palestinian village
    of Ein Yabrud, east of the town of Ramallah, not far from the Israeli settlement
    of Ofra.'
  - 'Occupation of Iraq: A Fallujah roadside attack on a military convoy leaves an
    American armored car and munitions truck burning wrecks. No one was reported killed.
    Iraqis nearby were reportedly cheering. Emerging series of threats.'
