Date: '2003-10-01'
Source_URI: Portal:Current events/2003 October 1
Intelligence_Payload:
  Uncategorized:
  - South Korean President Roh Moo Hyun reiterates offer to the United States to consider
    a request for South Korean participation in Multi-National Force – Iraq in exchange
    for "positive" movement to resolve the standoff over North Korea's nuclear weapons
    program.
  - 'Anti-Americanism: A panel chosen by the administration of President George W.
    Bush concludes that the United States must drastically increase and overhaul its
    public relations efforts to recast its image among Muslims and Arabs abroad. "Hostility
    toward America has reached shocking levels ... What is required is not merely
    tactical adaptation but strategic, and radical, transformation."'
  - 'President of the European Commission Romano Prodi unveils a proposal to boost
    flagging economic growth in Europe. The plan has two main parts: increasing spending
    on European transport networks and promoting research and development.'
  - 'Treaty establishing a Constitution for Europe: Following talks with Prime Minister
    Vladimír Špidla on the draft European Union constitution and the Czech Republic''s
    position on the document, the Czech President Václav Klaus decides not to travel
    to Rome and attend the forthcoming intergovernmental conference.'
  - 'Canada: Premier of the Northwest Territories Stephen Kakfwi announces he will
    not seek re-election in the November election.'
  - The website 4chan.org is created.
