Date: '2003-10-27'
Source_URI: Portal:Current events/2003 October 27
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: More than 40 people are killed and over 200 are injured in
    a wave of coordinated bomb attacks on the Red Cross compound and several local
    police stations in Baghdad. George W. Bush states that the bombings are a sign
    of desperation by the insurgents.'
  - U.S. fund group Putnam Investments fires four fund managers as scandals about
    improper and/or fraudulent dealings reach the mutual fund industry.
  - Former Japanese Prime Ministers Miyazawa Kiichi and Nakasone Yasuhiro announce
    that they are going to retire.
  - 'Northwest Territories general election, 2003: The writ is dropped for the 19
    electoral districts of the Northwest Territories to elect members to the 15th
    session of the consensus government.'
