Date: '2003-10-13'
Source_URI: Portal:Current events/2003 October 13
Intelligence_Payload:
  Uncategorized:
  - '2003 occupation of Iraq: New draft resolution being circulated at the United
    Nations aims at getting international aid. The resolution sets a deadline for
    initial steps, if only for a transitional step, toward restoring Iraqi sovereignty,
    giving the Iraqi Governing Council until December 15 to develop a timetable for
    writing a constitution and holding elections. The Bush administration proposes
    that the United Nations recognize the Iraqi Governing Council as a unit that "will
    embody the sovereignty" of Iraq until the country returns to self-rule. Seeking
    Support at U.N., Bush Offers Concession on Iraq - NYTimes.com'
  - 'Israeli-Palestinian conflict: Israeli incursion leaves 1,240 Palestinians homeless,
    UN agency finds. The Israeli demolition of refugee shelters in Rafah camp on the
    southern Gaza Strip last week has left 1,240 people homeless, United Nations relief
    workers state.'
  - The Taoiseach, Bertie Ahern, and the British Prime Minister, Tony Blair, have
    begun talks in Downing Street on a possible restoration of devolved government
    in Northern Ireland.
  - '2003 occupation of Iraq: Three more US soldiers have been killed in separate
    incidents.'
  - The Public Library of Science commences publication of an open-access scientific
    journal, PLoS Biology and its website is immediately overwhelmed by traffic.
