Date: '2003-10-04'
Source_URI: Portal:Current events/2003 October 4
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian conflict: A Palestinian suicide bomber blows herself up in
    a crowded beach restaurant in the northern Israeli port city of Haifa, killing
    at least 19 people and wounding about two dozen, at least six seriously. Hours
    later Israeli helicopter gunships retaliate by attacking targets in Gaza City
    and Central Gaza.'
  - Robin Cook, former United Kingdom Foreign Secretary who resigned from the British
    Government in protest prior the Iraq war, publishes his personal diaries. In them
    he alleges inter alia that Tony Blair knew before the Iraq war began that the
    45 minutes to launch claim was false.
  - Poland apologizes to France for its claims that it had found newly produced Roland
    surface-to-air missiles in Iraq. It is believed that the Polish soldiers misinterpreted
    a "use-by" date or installation date marked on the missiles as a date of production.
