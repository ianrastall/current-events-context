Date: '2003-10-06'
Source_URI: Portal:Current events/2003 October 6
Intelligence_Payload:
  Uncategorized:
  - '2004 U.S. Democratic Primaries: Senator Bob Graham announces on Larry King Live
    that he is ending his 2004 presidential campaign.'
  - 'Chechen Election: Moscow''s choice, the Kremlin-backed Akhmad Kadyrov swept presidential
    election in the Russian republic of Chechnya, winning 81 percent of the votes.'
  - 'SCO v. IBM: In an open letter to the Linux community published by Silicon Graphics
    (SGI), SGI states it conducted a comprehensive comparison of the Linux kernel
    and the UNIX System V source code owned by The SCO Group. According to the letter
    (authored by SGI Vice President of Software Rich Altmaier), SGI''s "exhaustive
    comparison" of the source codes turned up only "trivial" code segments that "may
    arguably be related" to SCO''s software. The letter also disputed SCO''s claims
    that SGI inappropriately contributed its XFS (eXtensible File System).'
  - 'Middle East: Facing renewed threats from Israel, Palestinian leader Yasser Arafat,
    declares a state of emergency in Palestinian areas and installs a new government
    by decree. Ahmed Qurei is appointed prime minister and head of the eight-member
    emergency cabinet.'
  - 'Israel: In his first public comments since the Israeli attack on Syria, President
    Bush says that Israel has the right to defend its homeland; at the same time Mr.
    Bush asks Prime Minister Sharon to avoid any further actions that might destabilize
    the region.'
  - Paul Lauterbur and Sir Peter Mansfield are jointly awarded the Nobel Prize in
    Physiology or Medicine for their discoveries concerning Magnetic Resonance Imaging.
  - 'Occupation of Iraq: Some in the international community have rejected a revised
    United States draft United Nations Security Council resolution concerning Iraq
    (calling for a multinational force of peacekeeping troops in Iraq under American
    command; transferring power gradually to elected civilian rule [though there is
    no handover timetable for sovereignty]). The resolution is being supported by
    the United Kingdom. France, Germany, and Russia (which opposed the 2003 invasion
    of Iraq) have joined Kofi Annan in opposing the resolution. Annan states that
    the United Nations itself will not become heavily involved unless there are early
    moves toward passing sovereignty to the Iraqi people. Annan''s stance is similar
    to that of Pope John Paul II and some members of the European Union.'
  - Attempts by the Republic of Ireland's government to ban smoking in pubs, restaurants
    and hotels run into more trouble as a government minister who will have responsibility
    for enforcing the ban, Frank Fahey, refuses to deny that he is critical of the
    plan and wants a compromise that would allow smoking in some areas to continue.
    A former Mayor of Galway and Fianna Fáil councillor who has links with the pub
    industry resigns from a health authority in protest at the refusal of the Fianna
    Fáil-Progressive Democrat government to compromise on the proposed ban. This follows
    an earlier announcement that publicans in County Kerry will refuse to obey the
    new law and indications of growing popular opposition to the ban.
  - Former Sky News correspondent James Furlong, who resigned over allegations that
    he had faked a report during the Iraq War, is found dead. Furlong, aged 44, had
    served as Sky News' Defence and Royal Correspondent. He had previously worked
    for ITN.
  - A United Nations report says that almost people worldwide are living in slums.
    By 2050 , out of a world urban population of , may be living in slums, unless
    radical policies are implemented, according to the UN. Dr Anna Tibaijuka of the
    UN says the persistence of the slums should shame the whole world.
