Date: '2003-10-16'
Source_URI: Portal:Current events/2003 October 16
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: The UN Security Council unanimously approves a new UN resolution
    on Iraq. Russia, Germany and France back the resolution but will not provide troops
    or money. A survey indicates poor morale amongst the US troops serving in Iraq.'
  - President Bush re-affirms his intention to pressure China and Japan into fair
    policies re their exchange rates. China's trade surplus is shrinking as imports
    surge. At the same time India is wrestling with the implications of the sustained
    appreciation of the rupee against the dollar.
  - Tens of thousands of Catholics attend Mass celebrating the 25th anniversary of
    Pope John Paul II in Rome. The Pope will beatify Mother Teresa on Sunday, October
    19, and install 30 new Cardinals on Tuesday, October 21.
  - In a surprise move, Monsanto Company announce their intention to quit the European
    cereal business. Citing lack of success, the company has decided to cut costs.
  - 'Israeli-Palestinian conflict: European Commissioner for External Relations, Chris
    Patten has questioned Israel''s commitment to a two-states resolution to the conflict
    with the Palestinians.'
  - China's first astronaut, Yang Liwei returns to earth safely aboard a Shenzhou
    spacecraft, Shenzhou 5. During the 21-hour trip, he circled the planet 14 times.
  - Apple launches its iTunes Music Store, an online download music store, for the
    Microsoft Windows platform. The iTunes software can be downloaded from apple.com
    for free.
