Date: '2003-10-29'
Source_URI: Portal:Current events/2003 October 29
Intelligence_Payload:
  Uncategorized:
  - The US FDA approves Risperdal Consta (Risperidone long-acting injection) for the
    treatment of schizophrenia. Although already approved in several other countries,
    it is the first long-acting, atypical antipsychotic medication to be approved
    by the FDA.
  - British Conservative Party leader Iain Duncan Smith loses a vote of confidence
    in his parliamentary party by 90 votes to 75 and, in accordance with party rules,
    resigns from the leadership. A new leadership election is called. Shadow Deputy
    Prime Minister David Davis, previously tipped as a future leader, surprises Westminster
    by announcing that he will not seek the leadership and endorses former Home Secretary
    Michael Howard, who is now seen as the frontrunner to assume the leadership. Other
    leading politicians endorse Howard, once famously described by a colleague as
    having "something of the night about him".http://interestalert.com/brand/siteia.shtml?Story=st/sn/10290004aaa01957.upi&Sys=siteia&Fid=LATEBRKN&Type=News&Filter=Late%20Breaking
  - 'Occupation of Iraq: The International Red Cross announces that it is to scale
    back its commitments to Iraq. Two more GIs are killed, bringing the total killed
    since May 1 to 115.'
  - Halloween Solar Storms. The Earth's magnetosphere is hit by the recent solar flare
    causing a brief but intense geomagnetic storm, provoking unusual displays of Northern
    Lights.
