Date: '2003-10-24'
Source_URI: Portal:Current events/2003 October 24
Intelligence_Payload:
  Uncategorized:
  - 49 miners are trapped in a Russian mine as water began seeping into the mine,
    disabling electrical systems.
  - 'Israeli-Palestinian conflict: The body of the Hamas militant killed in the attack
    on an Israeli military camp (that killed three Israeli soldiers) is returned to
    his family in their refugee camp.http://interestalert.com/brand/siteia.shtml?Story=st/sn/10240000aaa00601.upi&Sys=siteia&Fid=LATEBRKN&Type=News&Filter=Late%20Breaking'
  - '2003 invasion of Iraq: The US Senate Committee on Intelligence finalizes its
    report on pre-war intelligence and is highly critical of George Tenet and the
    quality of US intelligence about Iraq''s weapons.'
  - Earth is hit by the Halloween Solar Storm, disrupting some satellite communications
    but not electric power transmission grids as was predicted. Canada, the northern
    US northern Europe were treated to an exceptional display of aurora borealis.
  - The final flights of Concorde, from New York, Edinburgh, and a loop around the
    Bay of Biscay, touch down at Heathrow International Airport around 1600 BST, marking
    the end of 27 years of commercial supersonic flight.
  - Three same-sex couples in Spain, including a Madrid city councilman, apply for
    marriage licenses. They state that if the registry judge does not grant them the
    licenses, they will appeal to Spain's constitutional court, and as far as the
    European Court of Human Rights if necessary. They describe their actions as inspired
    by the recent rulings on same-sex marriage in Canada.
