Date: '2003-10-20'
Source_URI: Portal:Current events/2003 October 20
Intelligence_Payload:
  Uncategorized:
  - Canadian Prime Minister Jean Chrétien indicates that during an informal meeting
    between him and Vladimir Putin, the Russian president indicated that he was tentatively
    in favour of signing the Kyoto Protocol. Russia's signature is absolutely necessary
    for the protocol to acquire the force of law.
  - 'United States deficit: The United States posts a record budget deficit of in
