    set in 1992. The number was actually better than the U.S. government''s own forecast
    of .'
  - 'United States: The publicist of Robert De Niro announces that the actor has prostate
    cancer.'
  - Early results in Swiss elections show larger-than-predicted gains for the right-wing
    Swiss People's Party.
  - An Italian archaeologist claims to have found a carved two-faced head over 200,000
    years old. The carving is possible the work of Homo erectus.
  - The Soyuz TMA-3 spacecraft docked with the International Space Station bringing
    a new crew of three from Russia, the United States, and Spain.
