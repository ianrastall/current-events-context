Date: '2003-10-11'
Source_URI: Portal:Current events/2003 October 11
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian conflict: Israeli troops pull back in Gaza. Israel will continue
    to demolish tunnels. The Israeli army states it discovers three tunnels in the
    camp, but no weapons have been found. A Palestinian teenager is shot dead and
    up to 10 homes were demolished and later electricity facilities were hit. Palestinian
    militants were seeking to smuggle from Egypt shoulder-fired missiles that could
    be used against tanks, helicopters, and fighter jets.'
  - President George W. Bush proposes a change in United States Fish and Wildlife
    Service regulations which would allow American citizens to travel abroad to capture,
    kill, and import endangered species. The regulation would not allow Americans
    to do the same to endangered species inside the United States.
  - German magazine Der Spiegel reports that Israel is preparing an attack on Iranian
    atomic plants.
  - Syria says that it will retaliate if attacked by Israel again. A week after Israel's
    attack the two countries continue to exchange insults; the United Nations Security
    Council is unable to agree on a resolution condemning Israel's attack.
  - 'Occupation of Iraq: The Organisation of the Islamic Conference (OIC), a grouping
    of Muslim nations meeting in Malaysia, calls on the US to quit Iraq as soon as
    possible and to hand over to the UN; the OIC also pledges support to Syria.'
  - The House of Representatives of the Diet of Japan is dissolved by the Prime Minister
    Koizumi Junichiro and the election will take place on November 9, 2003. See Japan
    general election, 2003 for more.The Japan Times - News on Japan, Business News,
    Opinion, Sports, Entertainment and More
  - The Spanish rail company RENFE opens its second AVE high-speed line, serving Madrid,
    Guadalajara, Calatayud, Zaragoza, and Lleida. It is expected to reach Barcelona
    by 2005. (Another line is being built from Madrid to Valladolid, and others to
    Valencia and Lisbon are planned.)
