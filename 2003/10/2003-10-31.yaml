Date: '2003-10-31'
Source_URI: Portal:Current events/2003 October 31
Intelligence_Payload:
  Uncategorized:
  - The trial of Shoko Asahara, accused of involvement in the 1995 sarin gas attack
    on the Tokyo subway, ends in Japan with final statements from lawyers. The next
    court session is to be held in mid-February 2004.
  - The furor surrounding Yukos deepens with an outspoken statement from the Russian
    Prime Minister Mikhail Kasyanov expressing deep concern about the freezing of
    Yukos shares.
  - Kenneth Clarke has ruled himself out of the contest to lead the UK Conservative
    Party and the field is left potentially clear for Michael Howard to be elected
    unopposed.
