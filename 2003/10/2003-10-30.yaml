Date: '2003-10-30'
Source_URI: Portal:Current events/2003 October 30
Intelligence_Payload:
  Uncategorized:
  - A plastic toy gun, used as part of a Halloween costume, sparks a two-hour-long
    terrorism scare at the Capitol in Washington, D.C.
  - The United States Department of Commerce reports that U.S. gross domestic product
    grew at an annual rate of 7.2% in the third quarter, the fastest growth rate since
    1984.
  - Vladimir Putin removes his Chief of Staff Aleksandr Voloshin as the political
    battle with the "Russian oligarchs" and between hard-liners and liberals, continues.Hints
    in Russia of Crisis Over Tycoon Case - NYTimes.com Russian judicial authorities
    have seized control of Yukos, the giant oil company.
  - 'Iraq War: Officials postpone awarding two contracts to repair Iraq''s oil refineries
    and pipelines (primarily because of sabotage and dilapidated conditions). An investigation
    has been started on the high price that the United States is paying to Kellogg
    Brown & Root for oil imported from Kuwait. The Center for Public Integrity says
    that firms awarded contracts in Iraq have tended to be big donors (in the past)
    to the Republican Party. The UN announces that it is withdrawing its remaining
    international staff from Baghdad, perhaps temporarily.'
  - After 22 years in power, Malaysian Prime Minister Mahathir bin Mohamad retires.
    He is succeeded by Dato' Seri Abdullah Ahmad Badawi
