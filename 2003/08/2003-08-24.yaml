Date: '2003-08-24'
Source_URI: Portal:Current events/2003 August 24
Intelligence_Payload:
  Uncategorized:
  - NASA launches the Space Infrared Telescope Facility on a Delta 2 rocket.
  - Hurricane Ignacio approaches the coast of Baja California. Harbours and airports
    close and low-lying areas are evacuated.
  - 'Little League World Series: Tokyo, Japan, defeats Boynton Beach, Florida, 10–1.
    The Tokyo team went undefeated in the tournament, defeating the Saudi Arabia team
    17–0, with a perfect game pitched by four Japanese pitchers, and the mercy rule
    invoked after four innings.'
