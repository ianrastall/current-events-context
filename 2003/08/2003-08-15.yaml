Date: '2003-08-15'
Source_URI: Portal:Current events/2003 August 15
Intelligence_Payload:
  Uncategorized:
  - Power is restored to many, but not all areas of the north-eastern United States
    and Canada affected by the previous day's blackout. Investigations into the root
    cause of the grid collapse are currently focusing on transmission lines circling
    Lake Erie.
  - Libya formally accepts responsibility for the 1988 bombing of Pan Am Flight 103.
    It consists of general language that lacks expression of remorse for lives lost.
    Although some claim the acceptance is just a business deal and not a true admission
    of guilt.
  - Prince Hans-Adam II of Liechtenstein announces that he will abdicate the throne
    in 2004, in favor of his son, Prince Alois.
