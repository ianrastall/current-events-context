Date: '2003-08-20'
Source_URI: Portal:Current events/2003 August 20
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism – Canal Hotel: US officials comment terror group linked to al
    Qaeda, Ansar al-Islam, is emerging as a top suspect in the U.N. headquarters bombing
    in Baghdad. "It''s part of a global war against terrorism that was officially
    declared on us on September 11. It''s quite clear we do have terrorists inside
    Iraq now."'
  - 'Natural disaster: French undertakers state that 10,000 more French people died
    during the early August summer heatwave than the first two weeks of August in
    2002. It had previously been suggested that the number was 3,000. President Jacques
    Chirac demands reports from cabinet ministers on the crisis, while in Italy the
    newspaper La Repubblica suggests that Italy had 2000 more deaths than normal due
    to the heatwave.'
  - One of the holiest sites in Jerusalem, known to Jews as the Temple Mount and to
    Muslims as the Haram al-Sharif or the Noble Sanctuary, is re-opened to controversy.
    Jerusalem's police chief, Mickey Levey says the decision was taken before the
    most recent suicide bombing. However the decision is condemned by the Grand Mufti
    of Jerusalem, Sheikh Ekrima Sabri, who says the re-opening was done without the
    agreement of the Waqf, the Muslim authority that oversees the site. Palestinians
    from outside Jerusalem who are under the age of 40 are currently barred from entering.
    The compound includes the al-Aqsa Mosque and the Dome of the Rock.
  - A computer worm called W32.Welchia.Worm infects computers across the Internet.
    The virus has been labeled "good" by some, because it attempts to remove W32.Blaster.Worm,
    and downloads the Windows security patch which prevents W32.Blaster.Worm infections
    before spreading to other computers. It will also remove itself once the date
    hits 2004.
  - 'Israeli-Palestinian conflict: Palestinian prime minister, Mahmoud Abbas, breaks
    negotiations with the Islamic militant groups Hamas and Islamic Jihad in response
    to the bombing in Jerusalem. Israel notifies the public that it will retaliate
    with military strikes for bus bombing. There are conflicting reports that Israel
    will hold off on the attacks to see if the Palestinian administration takes action
    against terrorist groups.'
  - Fighting persists in Chechnya, with six Russian servicemen killed and 11 others
    wounded in the war-ravaged region.
  - Pauline Hanson, former leader of the Australian anti-immigration One Nation Party,
    is sentenced in Queensland to three years in prison for electoral fraud.
  - 'Afghanistan: Afghan President Hamid Karzai''s spokesman comments that the issue
    of Taliban crossing into Afghanistan from Pakistan will be discussed during Pakistan
    Foreign Minister Khurshid Mahmud Kasuri''s visit to Kabul. Afghanistan claims
    Pakistani based Taliban have killed many Afghan soldiers.'
