Date: '2003-08-11'
Source_URI: Portal:Current events/2003 August 11
Intelligence_Payload:
  Uncategorized:
  - Liberian president Charles Taylor resigns. He is replaced by vice-president Moses
    Blah.
  - '2003 California recall: New California voter survey finds nearly two-thirds of
    the state''s voters want a new governor.'
  - Herb Brooks, the coach of the 1980 US gold medal ice hockey team that beat the
    Soviet Union in a game that was called The Miracle on Ice, dies in a car accident.
  - African church leader, Archbishop Bernard Malango, states that the leaders of
    600,000 Anglicans in Malawi, Botswana, Zambia and Zimbabwe informed him they would
    could cut ties with the United States organization unless the appointment of an
    openly gay bishop is overturned. The Anglican Church in Kenya also demanded a
    reversal.
  - 'European heat wave: Parisian health authorities charge that fifty people have
    died in Paris owing to the heat wave, particularly elderly people, and that the
    government is ignoring the crisis. In Catalonia, five people from one family are
    killed by a wildfire that encircles their home. Four villages are evacuated in
    the Algarve.'
  - Doctors in Montreal successfully deliver by Caesarean section a healthy baby who
    grew in an ectopic pregnancy. Such a pregnancy, which begins outside the uterus,
    is all but invariably fatal to the fetus and is extremely dangerous to the mother.
    The woman and her doctors were unaware of the ectopic pregnancy until she went
    into labour.
  - Lord Hutton's inquiry into the death of British scientist Dr. David Kelly begins
    in London.
  - The Spirit of Butts Farm becomes the first radio-controlled model aeroplane to
    cross the Atlantic.
  - NATO takes over command of the peacekeeping force in Afghanistan, marking its
    first major operation outside Europe in its 54-year history.
  - Jemaah Islamiah leader Riduan Isamuddin, better known as Hambali, is arrested
    in Bangkok, Thailand.
