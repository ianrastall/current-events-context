Date: '2003-08-26'
Source_URI: Portal:Current events/2003 August 26
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism: President Bush, speaking to American Legion veterans convention,
    defends the Iraq policy, declaring the United States had hit terrorism in overthrowing
    the government of Saddam Hussein. President Bush vows "no retreat" from Iraq.
    President Bush also states that the United States may carry out other pre-emptive
    strikes.'
  - 'Space Shuttle program: Columbia Accident Investigation Board (CAIB) releases
    200 page final dossier over the space shuttle Columbia''s destruction (and the
    death of its seven astronauts). It states the cause is from NASA''s cultural traits,
    lack of funds, and insufficient safety program.'
  - 'Technology: California Supreme Court rules that publishers could be barred from
    posting DVD descrambling code (DeCSS) online without infringing on free speech
    rights.'
  - O.J. Simpson, giving an interview to Playboy, states that he is still innocent,
    but says "dream team" lawyers saved him. Without the money to pay for a "dream
    team" of lawyers, he says he would not have prevailed by being acquitted. In the
    interview, he also states that after his acquittal he smoked marijuana to get
    to sleep.
  - Former British Prime Minister Sir Edward Heath is flown home from his holiday
    in Salzburg, Austria, to receive treatment in London for pulmonary embolism.
