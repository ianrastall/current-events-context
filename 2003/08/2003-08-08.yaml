Date: '2003-08-08'
Source_URI: Portal:Current events/2003 August 8
Intelligence_Payload:
  Uncategorized:
  - Hezbollah, a militant Lebanese group backed by Syria and Iran, fires artillery
    toward Israeli border posts, drawing return fire. It was the first such exchange
    in eight months. AP story
  - A Ma'ariv opinion poll shows 37% of his supporters think Israeli Prime Minister
    Ariel Sharon is involved in corruption, with 52% saying he will have to resign
    if he behaved illegally. The controversy is over a loan given in January 2002
    to Sharon's son, Gilad that was the loan originated from Cyril Kern, a friend
    of Ariel Sharon.
  - 'Occupation of Iraq: At his ranch in Crawford, Texas, President Bush noted the
    100th day since overt military action in Iraq ended, saying that the United States
    has made "good progress" in helping Iraq''s democratic processes, overall national
    security, and economy.'
  - 'US v. EU on GM food: The European Union expresses their disapproval over the
    American, Canadian and Argentinian effort to launch a World Trade Organization
    formal challenge against its decision to keep the policy of banning genetically
    modified crops.'
  - 'SCO v. IBM Linux lawsuit: IBM furnishes more information on their SCO countersuit
    and states that they have Novell support.'
  - 'War on Terrorism: According to the latest disclosed analysis of the cockpit recordings
    by the United States investigators, the September 11 terrorist-pilot Ziad Jarrah
    got instructions to crash the United Airlines flight 93 into the Pennsylvania
    farmland because of the passenger uprising in the cabin trying to seize the plane''s
    controls.'
  - It is reported that the Canadian Grand Prix is dropped from the Formula One calendar
    as a result of its anti-tobacco laws. The Montreal race was given a grace of seven
    years before the introduction of the new law, announced in 1997. This comes a
    week after it was announced that the Belgian GP will be re-introduced in the 2004
    season. However, Formula One director general Bernie Ecclestone says that no such
    decision has been made.
  - The draft EU constitution could lead to the establishment of foreign-owned private
    health care and educational services.
