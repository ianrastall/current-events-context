Date: '2003-08-05'
Source_URI: Portal:Current events/2003 August 5
Intelligence_Payload:
  Uncategorized:
  - A powerful car bomb explodes outside the Marriott Hotel, killing at least fourteen
    people and injuring about 150 in downtown Jakarta, a popular district for foreigners.
    It is believed to be a suicide bombing. The blast comes two days before a Bali
    court was due to deliver the verdict of the first suspect of the 2002 Bali terrorist
    bombing and four days after President Megawati Sukarnoputri vowed to wipe out
    terrorist networks in Indonesia. Jemaah Islamiyah claimed responsibility for the
    attack through a Singapore newspaper.
  - A planned meeting between Israeli prime minister Ariel Sharon and Palestinian
    prime minister Mahmoud Abbas is cancelled by Abbas. He accuses Israel of not doing
    enough in a US-backed road map for peace. Israel had said that 540 Palestinian
    prisoners would be freed but only released 342 names in a prisoner list. Israel
    accuses the Palestinians of not curbing terrorist attacks on Israel.
  - A further twist to the British David Kelly scandal occurs, as Tony Blair's official
    spokesman, Tom Kelly, apologizes to David Kelly's family for having compared the
    late and still un-buried Dr. Kelly to a "Walter Mitty" character in a "private"
    conversation with a journalist.
  - 'Election in Nova Scotia, Canada: the Progressive Conservative Party of Premier
    John Hamm is reelected with a minority government. They receive 25 seats, the
    New Democratic Party 15, and the Liberals 12.'
  - The Episcopal Church, the U.S. branch of the Anglican Communion, approves its
    first openly gay bishop as the final vote was cast to confirm Gene Robinson as
    the Diocese of New Hampshire. Robinson was cleared of allegations of misconduct
    before the vote. The action incites protests, a declaration of a "pastoral emergency",
    and calls for intervention by the Anglican Communion chief bishops.
