Date: '2003-08-28'
Source_URI: Portal:Current events/2003 August 28
Intelligence_Payload:
  Uncategorized:
  - '9/11: Nearly two years after the September 11 attack on the World Trade Center,
    transcripts of World Trade Center emergency calls are released. Voices of victims
    are identified on emergency calls and radio transmissions.'
  - 'United Kingdom – London blackout: A 34-minute power outage causes major disruptions
    in rail and Tube services in London and the South East when one of the National
    Grid circuits that feeds south London fails at about .'
  - 'Nuclear program: North Korea announces that it is in possession of nuclear weapons,
    has the means to deliver them, and will soon be carrying out a nuclear test to
    demonstrate this capability.'
