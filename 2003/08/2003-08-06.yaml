Date: '2003-08-06'
Source_URI: Portal:Current events/2003 August 6
Intelligence_Payload:
  Uncategorized:
  - '2003 California recall: Arnold Schwarzenegger announces he will run for Governor
    of California in the recall election of Gray Davis.'
  - Florida is set to begin paying in fees to pilot/database guru and alleged former
    drug smuggler turned government informant Hank Asher in payment for his MATRIX
    system, a rapidly searchable database combining existing police records and several
    large commercially available computer databases. Civil libertarians are outraged
    at the system, claiming it is Orwellian and reminiscent of the Federal Total Information
    Awareness program. The United States Department of Justice and Department of Homeland
    Security are providing funds to expand Matrix coverage to the entire country.
  - An Italian laboratory announces the birth of the world's first cloned horse, Prometea.
  - The United States Pentagon establishes that a unit of military personnel has arrived
    in Liberia, coordinating support for the West African peacekeepers in the country.
  - North Korea and Iran are planning to form an alliance to develop long-range ballistic
    missiles with nuclear warheads. Under the plan, North Korea will transport missile
    parts to Iran for assembly at a plant near Tehran, Iran.
  - Real IRA leader Michael McKevitt is convicted in the Republic of Ireland's Special
    Criminal Court of two terrorist offences, "directing terrorism" and "membership
    of an illegal organisation". One of the key witnesses was David Rupert, an FBI
    agent who posed as a member of the Real IRA to get close to McKevitt. The three
    judges of the SCC will sentence McKevitt later.
