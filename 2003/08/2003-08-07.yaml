Date: '2003-08-07'
Source_URI: Portal:Current events/2003 August 7
Intelligence_Payload:
  Uncategorized:
  - '2003 California recall: Republican Darrell Issa, the person behind the effort
    of recall election of Gray Davis, quickly and without warning dropped out of the
    gubernatorial race.'
  - Convicted terrorist, Real IRA leader Michael McKevitt, found guilty yesterday
    by the Republic of Ireland's Special Criminal Court of "membership of an illegal
    organisation" and "directing terrorism", is sentenced to twenty years in prison.
  - An Indonesian court sentences Amrozi bin Nurhasyim to death for his role in the
    2002 Bali terrorist bombing. The court found Amrozi guilty of planning and carrying
    out the attack. The verdict comes two days after another attack outside Marriott
    Hotel in Jakarta. Jemaah Islamiyah is linked with both of the attacks.
  - 'Occupation of Iraq: A car bomb explodes near the Jordanian Embassy in Baghdad,
    Iraq. At least 10 people are killed and more than 30 are injured. The bomb, hidden
    in a minibus, is believed to be detonated remotely.'
  - 'Liberian crisis: President Charles Taylor resigns as Nigerian peacekeepers entered
    Liberia. Taylor names his vice president, Moses Blah, as his successor. Peacekeepers
    intercepted an arms shipment to Liberia from Libya. Taylor, who is indicted for
    war crimes, indicates that he will seek political asylum in Nigeria.'
