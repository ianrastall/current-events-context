Date: '2003-08-23'
Source_URI: Portal:Current events/2003 August 23
Intelligence_Payload:
  Uncategorized:
  - In an unprecedented move, the British government submit thousands of official
    documents (many of which would not normally be seen by the public for 30 years)
    to the Hutton Inquiry, and publication on the Internet.
  - 'Natural disaster: Wildfires sweep into the southern suburbs of Kelowna, British
    Columbia, Canada, destroying more than 200 homes. One-third of the city''s population,
    or 30,000 people, have been evacuated.'
  - 'Israeli-Palestinian conflict: Palestinian leaders state they will try to negotiate
    a new ceasefire by extremist groups and urge Israel to stop their action against
    top militants.'
  - Power outage happens all of Southern Finland for 30 to 60 minutes, because one
    underground line in Central Helsinki short circuits. The lack of electricity begins
    at 20:20 and causes radio broadcasts, public lights, elevators, trains, trams
    and metro traffic to stop. Also people have to be evacuated in Linnanmäki amusement
    park. August 182357
  - 'California recall: Republican Bill Simon drops out of the California gubernatorial
    recall race.'
  - Iran makes protest and cuts diplomatic ties with Argentina over the arrest in
    Britain of its former ambassador with the United Kingdom and Argentina for the
    alleged bombing Jewish community centre in Buenos Aires in 1994 in which 85 people
    died.
  - John Geoghan, a defrocked Roman Catholic priest and convicted child molester,
    dies following an attack in prison. Initial reports say that he was strangled
    to death.
