Date: '2003-08-12'
Source_URI: Portal:Current events/2003 August 12
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism: An exclusive BBC report says a joint United States, Russia
    and United Kingdom "sting" halted a plot to shoot down Air Force One using an
    Igla surface-to-air missile. According to the BBC, the plot, initially unearthed
    by the Russians, led President Vladimir Putin to request that an FBI agent go
    to Saint Petersburg, where the agent posed as an Islamic extremist and met the
    British arms dealer supplying the missile. The missile was shipped from Saint
    Petersburg to Baltimore in the United States. The British arms dealer "arranging"
    the deal was arrested when he arrived in Newark, New Jersey, in the United States
    today. The White House has publicly denied that Air Force One was to be the target
    of the missile. However Tom Mangold, the BBC veteran investigative reporter who
    broke the story, claims the British dealer supplying the missile recommended to
    the undercover FBI agent that the President''s jet, rather than a commercial jet,
    be the target, saying that he could get another 60 Ingla missiles which could
    then be used to launch a co-ordinated attack on Air Force One.'
  - 'Occupation of Iraq: The Associated Press is reporting that troops in Iraq should
    expect to serve for at least a year according to the commander of United States
    forces.'
  - George W. Bush nominates former NGA chairman and current governor of Utah, Michael
    O. Leavitt for administrator of the Environmental Protection Agency.
  - 'Israeli-Palestinian conflict: Two Israelis killed and about a dozen wounded in
    two separate suicide bombings by Palestinian terrorists in the towns of Rosh-Ha''ayin
    and Ariel. Hamas and the Al-Aqsa Martyrs'' Brigades claimed responsibility for
    the attacks. The IDF retaliated on Wednesday by demolishing the house in Nablus
    where the bomber in the Rosh Ha-Ayin attack lived with his family.'
  - The Serbian government has indicated that it wants to retake control of the province
    of Kosovo, arguing that the United Nations, which currently has control, has failed
    to reestablish the rule of law.
  - Sir Jocelyn Gore-Booth announces the sale of the historic Lissadell estate in
    County Sligo in Ireland, the childhood home of early 20th-century Irish republican
    Constance Gore-Booth (Constance Markievicz) and which had major associations with
    the poet W.B. Yeats. Critics condemn the Irish government for failing to buy the
    estate; Sir Jocelyn had offered it first refusal. The identity of the buyer has
    not yet been revealed but rock singer Bono had shown major interest in the property.
  - The remains of a viking warrior are found at a building site in Dublin. The warrior
    had been stabbed to death during a 9th-century Viking raid on Dubhlinn monastery.
    The dagger was still attached to his body when his remains were found. The archaeological
    dig is expected to continue at the site for six months.
  - The Rev. Peter Short is elected Moderator of the United Church of Canada, the
    country's largest Protestant denomination, in Wolfville, Nova Scotia.
  - Microsoft has decided to appeal a verdict to pay from a Chicago federal jury that
    affirms the Internet Explorer web browser violated Intellectual Property rights
    of Eolas Technologies (concerning Patent US 5838906).
