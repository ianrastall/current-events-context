Date: '2003-08-04'
Source_URI: Portal:Current events/2003 August 4
Intelligence_Payload:
  Uncategorized:
  - Construction workers of Qiqihar, Heilongjiang Province, People's Republic of China
    accidentally dig out five Japanese mustard gas bombs from the Sino-Japanese War
    (1937-1945). Two of the bombs are damaged, and the gas poisons 43 (one died 19
    days later). Japan a week later accepts responsibility and sends doctors and compensation
    to China.
  - The clergy and lay people of the Episcopal Church in the United States of America,
    by a comfortable margin, vote in favor of the appointment of an openly gay bishop.
    The vote is thought likely to get confirmation from the bishops' collegium, which
    however is delayed due to last minute independent allegations of misconduct and
    intense conservative opposition.
  - 'SCO v. IBM Linux lawsuit: Reuters have reported that Red Hat intends to start
    legal action against SCO to establish that SCO''s claims against the Linux operating
    system are invalid.'
