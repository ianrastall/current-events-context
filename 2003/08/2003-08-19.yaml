Date: '2003-08-19'
Source_URI: Portal:Current events/2003 August 19
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism – Canal Hotel: A truck bomb explosion at the Baghdad Canal Hotel
    that houses the United Nations mission kills at least 17 people and injures over
    100. Among the casualties is Sérgio Vieira de Mello, U.N. special representative
    in Iraq. The bomb damages a hospital nearby, and the shock wave is felt a mile
    away.'
  - '20 killed, 136 wounded by an explosion on board an Israeli bus in Jerusalem.
    Among the victims are several children. The explosion was caused by a Palestinian
    suicide bomber. The Palestinian Islamic Jihad in Hebron claims responsibility
    for the attack. There are conflicting reports that Hamas is responsible for the
    bombing. Israeli government reportedly freezes road map for peace negotiations.
    In the following days, two additional victims died of their wounds, raising the
    death toll to 22., see also: Jerusalem bus 2 massacre'
  - 'War on Terrorism: A Moroccan court sentences four men to death and jails 83 others
    for their involvement in a wave of terror attacks in Casablanca that killed 33
    bystanders and a dozen suicide bombers in May 2003. The trial involved dozens
    of defendants accused of belonging to a clandestine Moroccan group, the Salafia
    Jihadia. Moroccan authorities have linked the group to Osama bin Laden''s al-Qaida
    network.'
  - 'Occupation of Iraq: Iraqi Vice President Taha Yassin Ramadan, disguised as an
    Arab Bedouin, has been captured. Ramadan served as Saddam''s thug and a member
    of Iraq''s Revolutionary Command Council. Kurdish group claims responsibility
    for the capture of Ramadan. He was handed over to Coalition forces in Mosul.'
  - Afghanistan celebrates its Independence Day amid one of the bloodiest weeks in
    a year, with heavily armed guerrillas killing at least nine police officers in
    the latest in a string of ambushes. In the last week, the country has been battered
    by an onslaught from insurgents, who are believed to be a mix of guerrillas from
    the ousted Taliban regime, al-Qaida fighters and supporters of renegade warlord
    Gulbuddin Hekmatyar.
  - The International Survivors Action Committee releases a 152-page report on the
    controversial Tranquility Bay behavior correction facility.
  - 'Natural disaster: Start of the Booth and Bear Butte forest fires in the Cascade
    Mountains, the worst fire in Oregon of this year. Within three days the resort
    community of Camp Sherman is evacuated, affecting 1,500 residents and campers,
    closure of US highway 20 over Santiam Pass, and burning at least 41,000 acres
    (170 km2).'
