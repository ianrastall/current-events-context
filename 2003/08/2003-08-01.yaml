Date: '2003-08-01'
Source_URI: Portal:Current events/2003 August 1
Intelligence_Payload:
  Uncategorized:
  - 'Mozdok truck bombing: A truck bomb destroys a military hospital in Mozdok in
    Southern Russia, near Chechnya, killing 52 and wounding 82. The Russian government
    blames the attack on Chechen separatists. A media spokesman for rebel political
    leader, Aslan Maskhadov, denied any connection with the incident.'
  - North Korea agrees to multilateral talks in its nuclear standoff with Japan, South
    Korea, Russia, The United States, and the People's Republic of China.
  - The Ministry of Social Affairs and Health plans to propose an amendment to Finnish
    tobacco legislation which would make retail sales of tobacco products subject
    to a license.
