Date: '2003-08-21'
Source_URI: Portal:Current events/2003 August 21
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: General Ali Hassan al-Majid (Chemical Ali) is reportedly
    captured in Iraq. He had previously been reported dead. August 21082003133538.asp'
  - 'Israeli-Palestinian conflict: Israel kills senior Hamas official, Ismail Abu
    Shanab, by a missile strike in the Gaza Strip and sent tanks into the West Bank
    towns of Nablus, Jenin and Tulkarem in response to a deadly suicide bombing of
    a bus in Jerusalem. In Hebron, troops destroy the terrorist bomber''s home. Hamas
    and Islamic Jihad end their participation in the cease fire (in response to Israel''s
    action from the two groups'' bombing), declaring themselves as enemies to the
    peace plan, and vow further terrorist acts. The militants demand that Palestinian
    prime minister, Mahmoud Abbas, leave their area of control.'
  - Canadian transport minister David Collenette announces that Montréal-Pierre Elliott
    Trudeau International Airport will be renamed in September for former prime minister
    Pierre Trudeau.
