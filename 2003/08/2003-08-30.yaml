Date: '2003-08-30'
Source_URI: Portal:Current events/2003 August 30
Intelligence_Payload:
  Uncategorized:
  - 'Software patents: After protests, the European Parliament has postponed its decision
    about legality of patents on software in the European Union from September 1 to
    September 22.'
  - WTO deal to allow poor countries to bypass drug patents and import cheap copies
    to treat AIDS, malaria and tuberculosis.
  - 'Natural disaster: French official first report from the Institut de Veille Sanitaire
    was presented to Jean-François Mattei (Health Minister). It reports 11,500 more
    deaths than the previous three years would be due to the heat wave of early August.
    It had previously been suggested that the number was 3,000.'
  - Russian nuclear submarine of K-159 November class sinks in the Barents Sea. The
    sub was decommissioned and it had 10 crew on board. The incident comes three years
    after Russia's worst peacetime naval disaster when all 118 crew of the nuclear
    submarine Kursk died when it sank in the Barents Sea on August 12, 2000. Environmental
    organizations say that the submarine could be dangerous for fishes, because radioactive
    material could leak to the sea from its two nuclear reactors.
  - Top fashion designer Stella McCartney, third daughter of former Beatle Sir Paul
    McCartney marries publisher Alasdhair Willis in a private Roman Catholic chapel
    at Mount Stuart House, the stately home of the Marquess of Bute.
