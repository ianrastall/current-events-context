Date: '2003-08-13'
Source_URI: Portal:Current events/2003 August 13
Intelligence_Payload:
  Uncategorized:
  - Ivan Jovovic and Bogdan Bukomiric, both 16 years old, from Goraždevac near Pec
    die after two attackers fired AK-47s on a group of children from Goraždevac who
    were bathing in the river Bistrica. Four children were injured in the attack,
    two of which are in critical condition. UNMIK and KFOR claimed that they transferred
    one of them, Marko Bogicevic, to Belgrade, but he is actually in a German military
    hospital at Prizren, against his parents' wishes. An Italian KFOR patrol refused
    to lend fuel for the car which was transporting wounded children to hospital in
    Pec, when it ran out of fuel, and took no action when car was stoned by local
    Albanians. After finally arriving at Pec, doctors there refused to treat the children.
    KFOR claims that it is researching the location of the incident with 300 men.
  - Discovery of a Saudi Arabia airplane plot. Intelligence agencies producing alerts
    and relaying them to Washington, D.C., and London of a specific threat to airlines
    flying around Riyadh international airport. The plan to shoot down a British Airways
    plane was discovered after a member of the plot drove his car through a checkpoint
    in Riyadh. In response to the threat BA cancels all flights to Saudi Arabia until
    further notice. The United States issues a travel alert for Saudi Arabia citing
    the threat of terrorism including potential attacks against civil aviation.
  - Iraq's northern oil fields resumes exports.
  - Arnold Schwarzenegger names Warren Buffett as his economic adviser on Wednesday.
    Mr Buffett will help the actor build a team to lead the state out of its fiscal
    crisis.
  - Disgraced Irish former Taoiseach Charles Haughey sells his historic home and estate,
    Kinsealy, in north Dublin to a property developer for euro. The former taoiseach,
    whose financial dealings and tax-evasion is the subject of a judicial inquiry
    and which have largely destroyed his reputation, bought the palatial mansion for
    £120,000 in the 1960s. Haughey, who is suffering from terminal prostate cancer,
    will not be allowed to remain in the house as a sitting tenant for the rest of
    his life, a demand of his which scuppered past attempts to sell.
  - 'Same-sex marriage in Canada: At its convention in Wolfville, Nova Scotia, the
    United Church of Canada votes overwhelmingly to ask the federal government to
    allow same-sex marriage.'
  - A National Geographic team releases the discovery of a new species of large dinosaur,
    Rajasaurus Narmadensis, native to the Indian subcontinent. The research effort
    was made by a joint Indo-American group, including members from the University
    of Michigan, University of Chicago, and the Punjab University of Northern India.
