Date: '2003-08-25'
Source_URI: Portal:Current events/2003 August 25
Intelligence_Payload:
  Uncategorized:
  - Two explosions, apparently caused by car bombs placed in taxis, kill at least
    44 and injures a further 150 in Mumbai, India. It is the sixth bombing in Mumbai
    in a year.
  - In Australia's One Nation Party case, it has been revealed that Federal Cabinet
    Minister Tony Abbott controlled "slush funds" which were used to lay the groundwork
    for party leader Pauline Hanson's prosecution, and to guarantee a private lawsuit
    against the party. Liberal ranks split as Abbot's colleague Bronwyn Bishop joined
    many Labor MPs in calling for disclosure of his role in the case, and described
    Hanson as a "political prisoner". Remarkably, the nearly defunct One Nation Party's
    support surged to 21% on news of Hanson's imprisonment.
  - The Tli Cho land claims agreement is signed in Canada's Northwest Territories.
    It grants the Dogrib people self-government in an area the size of Belgium.
  - Pete Sampras announces his retirement from competitive tennis.
  - Two Iranian intelligence officers are charged in connection with the death of
    Canadian photojournalist Zahra Kazemi.
