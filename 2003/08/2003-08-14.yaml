Date: '2003-08-14'
Source_URI: Portal:Current events/2003 August 14
Intelligence_Payload:
  Uncategorized:
  - A major power outage due to a power grid failure affects more than people in the
    northeast of North America, including New York City, New Jersey, Cleveland, Ottawa,
    Toronto and Detroit ABC BBC CNN. According to U.S. authorities, the cause is still
    unclear; according to the Canadian Department of National Defense, the chain reaction
    was started by a lightning strike in the Niagara Falls region on the U.S. side
    of the border. A press release with some technical details of the event is available
    at. The NRC reports that all nine affected nuclear power plants have been safely
    shut down.
  - 'Heat wave: French health officials estimate that as many as 3,000 people may
    have died in France as a result of the heat wave. Fatalities and illnesses are
    swamping the French health system. The city of Paris launches its Plan blanc emergency
    response procedure. However, temperatures in Paris have now dropped from 40 °C
    to 30 °C.'
  - 'SARS: Public health officials are investigating seven deaths and several infections
    in an outbreak that resembles, but is not believed to be, SARS in a nursing home
    in Surrey, British Columbia (a suburb of Vancouver). However, until more is known
    about the disease, the home will be treated as a SARS site for safety''s sake.'
  - A single-celled microbe, of the domain Archaea, is found to be able to survive
    at 121 °C (250 °F), making it the life form that can tolerate the highest temperature.
    The microbe, temporarily named Strain 121, which was found away from Puget Sound
    in a hydrothermal vent, may provide clues to when and where life first evolved
    on Earth. It metabolizes by reducing iron oxide. August 030815075108.htm
  - 'Terrorism: Hambali, an important leader of Jemaah Islamiyah, is in U.S. custody
    after being captured in Thailand.'
  - 'Liberian crisis: News services are reporting that Moses Blah met with Sekou Conneh
    of the Liberians United for Reconciliation and Democracy (LURD) group and Thomas
    Nimley of a smaller faction known as Model. Meanwhile, the Pentagon expands the
    United States'' military presence by adding a "quick reaction" force of 150 combat
    troops to back up Nigerian peacekeepers.'
  - 'Israeli-Palestinian conflict: Israel frees another 76 prisoners, a week after
    releasing more than 300 people. Israel argues that it is a gesture of goodwill
    and in accordance with agreements. The Palestinian authority disagrees and says
    that most were not arrested for terrorist activities, and that it was the people
    arrested for the latter that Israel originally agreed to release. Palestinian
    officials want the release of 6000 prisoners, many of whom it claims were wrongly
    arrested, to obtain public support for the US-backed road map for peace.'
  - 6.4 Richter scale earthquake near the Greek Ionian island of Lefkada – 24 injured
