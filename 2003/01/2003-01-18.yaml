Date: '2003-01-18'
Source_URI: Portal:Current events/2003 January 18
Intelligence_Payload:
  Uncategorized:
  - A mass mobilization pulls together global protests against the Iraq war in cities
    around the world, including Tokyo, Moscow, Paris, London, Montreal, Ottawa, Toronto,
    Cologne, Bonn, Gothenburg, Istanbul and Cairo. NION and ANSWER hold protests in
    Washington, D.C. and San Francisco, California.
  - The Swiss yacht Allinghi, captained by New Zealand skipper Russell Coutts, defeated
    Oracle, a San Francisco, California-based yacht, to win the challenger final of
    the America's Cup. Allinghi will now face the New Zealand defender, yet to be
    determined.
  - In Australia, the most devastating bushfire since the Ash Wednesday fires in 1983
    hits Canberra and the Australian Capital Territory. Four people are to die, 520
    homes and thousands of hectares of national park will be destroyed, 259 people
    will be admitted to The Canberra Hospital with burns and will be paid by insurance
    companies.
  - The Sengkang LRT line began operations, with 5 stations along the East Loop being
    opened at the same time operated by SBS Transit Ltd using Mitsubishi Heavy Industries
    Crystal Mover C810s.
