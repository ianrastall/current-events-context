Date: '2003-01-16'
Source_URI: Portal:Current events/2003 January 16
Intelligence_Payload:
  Uncategorized:
  - President Bush visits the University of Scranton in downtown Scranton, Pennsylvania,
    to give a speech on medical liability reform amidst major medical malpractice
    in northeastern Pennsylvania. Bush criticized state attorneys for "frivolous lawsuits",
    vowing to decrease excessive jury awards and propose a $250,000 cap on non-economic
    damages. The president later paid a visit to Scranton's Mercy Hospital.
  - US Senator Russ Feingold introduces a bill to halt the Information Awareness Office
    and Total Information Awareness pending a review of privacy issues involved. The
    US Congress attempting to suspend an internal Department of Defense project is
    a highly unusual step.
  - UN weapons inspectors in Iraq stated that they found empty rocket warheads, designed
    to carry chemical warfare agents, at the Ukhaider Ammunition Storage Area.
  - The Space Shuttle Columbia launches on its last mission STS-107. It disintegrated
    on re-entry 16 days later.
