Date: '2003-01-15'
Source_URI: Portal:Current events/2003 January 15
Intelligence_Payload:
  Uncategorized:
  - Belgian plant pathologist, Emile Frison, of the International Network for the
    Improvement of Banana and Plantain states that the commercial banana variety may
    become extinct within 10 years.
  - In a 7–2 decision in the case Eldred v. Ashcroft, the Supreme Court of the United
    States rules the 1998 Sonny Bono Copyright Term Extension Act constitutional,
    preventing the expiration of any U.S. copyrights for 20 years from the date the
    law went into effect.
  - A statement, issued by the Congregation for the Doctrine of the Faith and signed
    by Pope John Paul II, declared that all Roman Catholic politicians must adhere
    to church teachings, and that they cannot be faithful to the Church if they vote
    against Church positions on such issues as abortion.
  - Robert L. Ehrlich, (born November 25, 1957), an American politician, becomes the
    60th Governor of the State of Maryland.
  - 'Borland Software Corporation (Nasdaq NM: BORL) announced the completion of its
    acquisition of TogetherSoft Corporation. Borland acquired the privately held TogetherSoft
    for approximately (cash) plus 9,050,000 shares of Borland common stock (reported
    as a total of ) [news on Borland website].'
