Date: '2003-01-31'
Source_URI: Portal:Current events/2003 January 31
Intelligence_Payload:
  Uncategorized:
  - France strongly advises its citizens to leave the Ivory Coast. 1,500 French nationals
    remain trapped in the airport of the commercial capital Abidjan, which is surrounded
    by a crowd of around 5,000 supporters of President Laurent Gbagbo. Last week,
    the French brokered a power-sharing deal between the Government and the Northern
    rebels.
