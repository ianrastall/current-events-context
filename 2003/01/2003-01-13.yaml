Date: '2003-01-13'
Source_URI: Portal:Current events/2003 January 13
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism: Six more suspects were arrested in Bournemouth in England in
    connection with the investigation into ricin found in London. This brings the
    total of those arrested to eleven.'
  - Senator Joseph Lieberman from Connecticut announced he will run in the 2004 U.S.
    presidential election
  - The Indian government had to withdraw its case against Iftikhar Gilani to prevent
    itself from a situation where two of its ministries would have given contradictory
    opinions. Gilani had been arrested under the Official Secrets Act 1923.
