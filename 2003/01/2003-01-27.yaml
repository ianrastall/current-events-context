Date: '2003-01-27'
Source_URI: Portal:Current events/2003 January 27
Intelligence_Payload:
  Uncategorized:
  - Speaking to the United Nations Security Council, Iraqi Foreign Minister Naji Sabri
    said that the United States and its allies are "unjustifiably aggressive" and
    that Iraq is complying fully with requests made by the UN weapons inspectors.
    Speaking to the same forum, Hans Blix, the chief inspector, later said that Iraq
    had not been fully co-operative with the United Nations inspection teams.
