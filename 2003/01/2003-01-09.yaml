Date: '2003-01-09'
Source_URI: Portal:Current events/2003 January 9
Intelligence_Payload:
  Uncategorized:
  - UN Chief Weapons Inspector Hans Blix and International Atomic Energy Agency head
    Mohammed El Baradei give a report to the United Nations Security Council. They
    say that progress on the search for weapons of mass destruction in Iraq is "inching
    forward" but that a more "pro-active" stance is required from the Iraqi government.
  - Astronomers at NASA's Goddard Space Flight Center obtain the most detail view
    yet of a black hole "feeding" at the centre of a quasar.
