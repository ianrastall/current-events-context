Date: '2003-01-24'
Source_URI: Portal:Current events/2003 January 24
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism: The United States Department of Homeland Security officially
    began operation, and former governor Tom Ridge took command. Reorganization of
    other departments affected by its creation in the United States Government would
    continue for some time. This represented the largest reorganization of the United
    States Government since the creation of the United States Department of Defense
    during World War II.'
