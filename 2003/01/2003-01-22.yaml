Date: '2003-01-22'
Source_URI: Portal:Current events/2003 January 22
Intelligence_Payload:
  Uncategorized:
  - The RIAA, a music industry lobbying group, announces that Hilary Rosen will step
    down as head of the organization at the end of 2003. Rosen achieved notoriety
    on the Internet for her prolific efforts to halt the spread of copyrighted MP3
    recordings on peer-to-peer file sharing networks such as Napster and Kazaa. Reports
    indicate that the members of the RIAA are unhappy with Rosen's nearly total failure
    to achieve this goal.
  - Elections for the House of Representatives, the lower house of parliament of the
    Netherlands. The Dutch Labour Party wins, but Christian Democratic Appeal (CDA)
    remains the largest party in parliament. Pim Fortuyn List loses. CDA and People's
    Party for Freedom and Democracy do not get a majority.
  - A large Arctic air mass over much of central North America brings severe cold
    and wind chill over much of southern Canada and northern United States for several
    days.
  - Germany and France celebrate the 40th anniversary of their friendship in Versailles
    (Elysée Treaty).
  - Pie and Bovril (P&B) Scottish Football forum launched.
