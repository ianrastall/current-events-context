Date: '2003-01-29'
Source_URI: Portal:Current events/2003 January 29
Intelligence_Payload:
  Uncategorized:
  - A false rumor that Thai actress Suvanant Kongying had told a reporter that the
    temple ruins at Angkor really belong to Thailand led to a riot in Phnom Penh,
    Cambodia. This caused the destruction of the Thai Embassy and dozens of Thai-owned
    businesses, hotels and factories.
