Date: '2003-01-10'
Source_URI: Portal:Current events/2003 January 10
Intelligence_Payload:
  Uncategorized:
  - North Korea formally withdraws from the Nuclear Nonproliferation Treaty.
  - The INS registration deadline for males in the United States aged 16 and older
    from Afghanistan, Algeria, Bahrain, Eritrea, Lebanon, Morocco, North Korea, Oman,
    Qatar, Somalia, Tunisia, United Arab Emirates and Yemen. A controversial Bush
    administration policy designed to capture terrorists requires all such men to
    submit to "special registration" procedures consisting of fingerprinting, photographing,
    and lengthy interviews concerning their whereabouts, associations, and activities.
  - The Pentagon orders 62,000 US troops to the Persian Gulf
  - Gordon Campbell, premier of British Columbia, is arrested for drunk driving on
    vacation in Maui. He is the first sitting Canadian premier to be arrested. A scandal
    ensues.
