Date: '2003-01-14'
Source_URI: Portal:Current events/2003 January 14
Intelligence_Payload:
  Uncategorized:
  - 'War on Terrorism: Three more suspects have been arrested in Manchester in England
    in connection with the investigation into ricin found in London, although it now
    appears as though the raid was initially carried out as the pursuance of an investigation
    into immigration issues. A Special Branch police officer, Stephen Oake, was fatally
    stabbed during the arrests, and three other officers were also injured, one seriously.
    This brings the total of those arrested to fourteen.'
  - British humanitarian agency Care International warns that the security situation
    in Afghanistan is "urgent" and warns that coalition troops should not redirect
    resources from security to nation-building efforts, as this could enable factional
    forces to overthrow the internationally backed government in Kabul.
  - 20,000 workers at US industrial giant General Electric go on strike in 23 states
    over a GE plan to require workers to pay more for health insurance benefits.
