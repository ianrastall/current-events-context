Date: '2003-01-28'
Source_URI: Portal:Current events/2003 January 28
Intelligence_Payload:
  Uncategorized:
  - An election in the state of Oregon to pass a temporary three-year income tax failed
    with 54% of the votes voting against and 44% voting for. This forced the first
    layoffs in the Oregon State Police since its creation in 1931, and other actions
    including cutbacks in many of the local school districts.
