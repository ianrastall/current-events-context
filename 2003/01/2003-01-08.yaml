Date: '2003-01-08'
Source_URI: Portal:Current events/2003 January 8
Intelligence_Payload:
  Uncategorized:
  - North Korea threatens war if the United Nations applies economic sanctions.
  - Air Midwest airplane crashes during take off from Charlotte, North Carolina's
    international airport, killing all 21 people aboard. The plane, headed to Greer,
    South Carolina, was not able to maintain altitude after take-off, crashing onto
    a US Airways plane hangar. In another crash, in Turkey, at least 74 of the 77
    people on board died when a plane of the Turkish Airlines company, crashed while
    attempting an emergency landing at the Diyarbakir airport.
