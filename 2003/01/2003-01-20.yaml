Date: '2003-01-20'
Source_URI: Portal:Current events/2003 January 20
Intelligence_Payload:
  Uncategorized:
  - Finsbury Park mosque in Finsbury Park, London, England, often associated with
    Islamic extremism, was raided by British police in an investigation related to
    the hunt for the poison ricin. Seven men who were apparently living at the mosque
    were arrested, and a replica firearm, tear gas and a stun gun were reported as
    having been found on the premises.
  - As part of the plan to invade Iraq, British Defence Secretary Geoff Hoon announces
    that 26,000 British troops and equipment including 120 tanks will be sent to Kuwait,
    joining the 5,000 troops already on their way there.
