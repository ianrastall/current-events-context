Date: '2003-01-23'
Source_URI: Portal:Current events/2003 January 23
Intelligence_Payload:
  Uncategorized:
  - 350 Australian troops begin their journey towards Iraq, joining the US and UK
    troops already assembled there. Prime Minister John Howard said that "pre-positioning
    troops increased the likelihood of (the crisis) being resolved peacefully". Around
    150 people protested as the troop ship left Sydney, some shouting "Go yourself!"
    to Mr. Howard.
  - Fast food restaurant chain McDonald's reports a quarterly loss for the first time.
    The loss amounted to US$. Shares in the company fell around 3% on the news.
  - The last signal from Pioneer 10 was detected before losing signal with it completely.
  - Hulk Hogan returns to WWE.
  - The msy Wind Song was towed into the Sea of the Moon between Tahiti and Moorea
    and sunk in 9,843 feet of water.
