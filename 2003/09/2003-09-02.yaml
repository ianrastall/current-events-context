Date: '2003-09-02'
Source_URI: Portal:Current events/2003 September 2
Intelligence_Payload:
  Uncategorized:
  - Al-Qaeda leader Osama bin Laden says that his organization is working on "serious
    projects", and that his priority is to use biological weapons against the United
    States. Al Qaeda may already have such weapons, and be seeking means to transport
    and launch them.
  - 'Indonesia: An Indonesian court sentences Muslim cleric Abu Bakar Bashir to four
    years in prison for treason against the Indonesian government. However, the court
    found insufficient proof that Bashir was the leader of the militant Islamic organization
    Jemaah Islamiyah.'
  - 'Iraq: A car bomb explodes near the headquarters of Coalition trained police in
    Baghdad, killing an Iraqi police officer and wounding up to 10 bystanders. Observers
    saw the incident as an attempt to destabilize the new Iraqi governing body. (See
    2003 occupation of Iraq timeline)'
  - The Iraqi police handling the investigation say they have arrested 19 men in connection
    with the blast, many of them foreigners and all with admitted links to al-Qaeda.
  - 'Astronomy: Astronomers announce the discovery of an asteroid (2003 QQ47) whose
    orbit has a remote chance of striking earth.'
  - 'SCO v. IBM: SCO Germany is ordered to pay a fine of 10,000 Euro because they
    continued their allegations that Linux contains stolen intellectual property of
    SCO.'
  - 'Road map for peace: Israeli Defense Minister Shaul Mofaz states he favors expelling
    Palestinian President Yasser Arafat by the end of the year, because Arafat is
    obstructing the United States led peace plan. Arafat denies the statement and
    says he backs the peace plan (though he refuses to release control of Palestinian
    security services to reformer Prime Minister Mahmoud Abbas to stop militant group
    attacks as mandated by the plan). Palestinian leaders call Defense Minister''s
    remarks inflammatory.'
  - Premier of Ontario Ernie Eves calls a provincial election for October 2. Eves'
    incumbent Tories, Dalton McGuinty's Liberals, and Howard Hampton's NDP are in
    the race.
  - Premier of Prince Edward Island Pat Binns calls a provincial election for September
    29. The incumbent Tories, Robert Ghiz's Liberals, and Gary Robichaud's NDP are
    in the race.
  - A forest fire erupts in the Gorge of the Columbia River to the east of Cascade
    Locks, Oregon, forcing the closure of a 47-mile section of Interstate 84 and the
    evacuation of Cascade Locks for at least one full day.
