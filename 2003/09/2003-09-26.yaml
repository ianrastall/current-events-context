Date: '2003-09-26'
Source_URI: Portal:Current events/2003 September 26
Intelligence_Payload:
  Uncategorized:
  - 'Medicine: An experimental treatment given to a British man has halted the progress
    of brain damage caused by Creutzfeldt-Jakob disease.'
  - 'SCO vs IBM: International Business Machines Corp. files new counterclaims against
    SCO Group Inc. involving the Linux operating system according to a memo sent to
    the IBM sales force.'
  - 'Israeli-Palestinian conflict: A Palestinian gunman enters a home in Negohot (an
    Israeli settlement in the West Bank, near Hebron), murders 7-month-old Shaked
    Avraham and 27-year-old Eyal Yeberbaum, and injures both of the baby girl''s parents
    as they were celebrating the Jewish New Year. The shooter was later killed by
    Israeli security forces. The Palestinian Islamic Jihad claimed responsibility
    for the attack.'
  - 'Road map for peace: ''Quartet'' urges Israel and Palestinians to do more to revive
    Middle East peace plan. Voicing "great concern" at recent Israeli and Palestinian
    attacks that have stalled the Middle East peace process, a high-level meeting
    of the diplomatic Quartet of the United Nations, United States, Russian Federation
    and European Union call on both sides to take immediate action to revive the Road
    map for peace.'
  - 'Iraq – Constitution: Secretary of State Colin Powell, responding to a rapid timetable
    self-rule demands from France (and others), states the United States would set
    a deadline of six months for Iraqi leaders working under the coalition occupation
    to produce a new constitution. The constitution would clear the way for elections
    and the installation of a new leadership next year.'
  - 'Iraq – Terrorism: Mortar rounds hit killing at least seven civilian Iraqis in
    the town square of Baquba. At least 20 civilians were wounded. Also, Akila al-Hashemi,
    a member of Iraq''s Governing Council, was buried in Najaf a day after she died
    from wounds inflicted by an unidentified gunmen.'
