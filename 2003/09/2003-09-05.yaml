Date: '2003-09-05'
Source_URI: Portal:Current events/2003 September 5
Intelligence_Payload:
  Uncategorized:
  - Hong Kong's leader Tung Chee-hwa announces that he will indefinitely postpone
    plans for an extremely unpopular security bill which sparked massive public protests
    and would have granted the government broad powers to prosecute vaguely defined
    threats to national security.
  - 'Palestinian Authority: Prime Minister Mahmoud Abbas tells the Palestinian parliament
    to either support him or fire him, a move seen as making public for the first
    time his quarrel with Yasser Arafat. VOA characterizes Mr. Abbas'' ultimatum as
    the latest twist in a power struggle between him and Arafat, who is the President
    of the Palestinian Authority.'
  - David Blaine begins a new stunt. He will stay in a small transparent capsule suspended
    30 feet above the ground near Tower Bridge on London's River Thames without food
    for 44 days.
  - A train goes off the rails at a roller coaster at Disneyland in Anaheim, California,
    killing one.
