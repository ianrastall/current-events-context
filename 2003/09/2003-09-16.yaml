Date: '2003-09-16'
Source_URI: Portal:Current events/2003 September 16
Intelligence_Payload:
  Uncategorized:
  - 'WNBA Finals: The Detroit Shock defeat the Los Angeles Sparks, 83–78 in Game three,
    to win the series two games to one, and the WNBA''s world championship.'
  - Swedish police arrest Per-Olof Svensson in connection with the assassination of
    Anna Lindh.
  - 'Same-sex marriage in Canada: A House of Commons motion brought by the Canadian
    Alliance reiterating the heterosexual definition of marriage is narrowly defeated.
    This motion is preparatory to the government''s introduction of a bill to extend
    the Federal marriage law to include same-sex couples, expected within the next
    few months.'
