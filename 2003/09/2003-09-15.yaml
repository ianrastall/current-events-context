Date: '2003-09-15'
Source_URI: Portal:Current events/2003 September 15
Intelligence_Payload:
  Uncategorized:
  - China formally acknowledges that it has transferred guard duties along the China–North
    Korea border from the police to the army. The government does not formally report
    the number of troops deployed, however independent media estimate place it at
    150,000.
  - The United States Court of Appeals for the Ninth Circuit in San Francisco rules
    unanimously that the California gubernatorial recall election be postponed because
    several large counties, including Los Angeles County, have not upgraded their
    voting machines to replace the punched card systems which have consistently resulted
    in a significant number of uncountable votes (and thus unrepresented citizens).
  - German Interior Minister Otto Schily warns of a rise in the threat of neo-Nazis
    in Germany. The discovery of a suspected plot to bomb a Munich Jewish centre during
    a visit by the German president has "dramatically confirmed" the danger to society.
  - 'Chechen suicide attacks: A powerful truck bomb explodes near the branch office
    of the Federal Security Service of the Russian Federation in Magas, the capital
    of Ingushetia, which borders separatist Chechnya. Reports say three people were
    killed and more than 20 injured.'
