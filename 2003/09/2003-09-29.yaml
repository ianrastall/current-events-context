Date: '2003-09-29'
Source_URI: Portal:Current events/2003 September 29
Intelligence_Payload:
  Uncategorized:
  - Abdalla Yones, who was convicted of murder for killing his daughter, Heshu Yones,
    for dating a Christian, is sentenced to life in prison after becoming the first
    person in Britain to admit an "honour killing".
  - 'Terrorism: Pakistan dismisses and condemns al-Qaida terrorist network threat
    against President Pervez Musharraf, saying the war against terrorism will continue.
    Pakistan Foreign Ministry spokesman Masood Khan states (in Islamabad) Pakistan
    will not be deterred by such threats. The identity of the speaker on the audio
    tape or the authenticity of the tape has not been verified. The message was attributed
    to al-Qaida''s second-ranking leader, Ayman al-Zawahri, and was aired on Al Jazeera
    and Al-Arabiya.'
  - 'Space – Technology: NASA outlines plans for the Space Shuttle''s Replacement,
    a "Space Taxi". The next-generation space vehicle is on the drawing boards now
    and NASA has just issued newly defined requirements.'
  - 'Occupation of Iraq: Iraqi security forces and United States military police in
    Tikrit launch a hunt for guerrillas behind a series of deadly attacks on coalition
    troops—the largest-ever joint military operation to date. During the raids, dozens
    of soldiers from the United States Army''s 720th Military Police Battalion backed
    up over 200 Iraqi police. The raids netted 92 people and weapons that included
    Kalashnikov rifles, mortars, firing tubes, 155 mm artillery shells and rocket
    launchers.'
  - 'Nuclear weapons: Iranian official confirm traces of highly enriched uranium found
    in the country at the Kalaye Electric Company near Tehran (this was the second
    time such a discovery was made by United Nations inspectors). Iran''s ambassador
    to the International Atomic Energy Agency, Ali Akbar Salehi, attributes the find
    to the contamination of imported equipment on state television. Iranians have
    allegedly used Kalaye Electric Company to test centrifuges used to make highly
    enriched uranium that can be used to make atomic bombs.'
  - 'International relations: European Union increases pressure on Tehran to cooperate
    with international nuclear weapons inspectors. Britain states Iran must declare
    "unequivocally" that it harbours no ambitions to develop nuclear arms. European
    Union, in a draft joint statement, warns of economic fallout if Tehran does not
    make progress on key areas including non-proliferation, fighting terrorism, human
    rights and the Middle East peace process.'
  - 'International relations: Former US Secretary of State, Madeleine Albright (commenting
    on European Union relations to the United States), says that current transatlantic
    relations are in a dangerous "vicious circle". She states that the European Union
    is not a counterweight to American power in the world. She also states that there
    is an American "catch-22", and that America is criticized no matter which foreign
    policy it adopts.'
  - 'United Kingdom: The British Labour Party is holding its annual conference in
    Bournemouth on the English south coast. For the party and especially Tony Blair
    it is a tough conference as his policies (especially over Iraq) are under heavy
    attack.'
  - 'European Union: Member states clash over the issue of how many MEPs should represent
    the European Parliament on the approaching Intergovernmental Conference on October
    4. The developing consensus seems to be that at least one representative from
    the two major parties in the European Parliament will attend the conference, but
    this procedure is highly controversial—normally parliamentarians do not attend
    high level meetings among EU leaders.'
  - 'Elections: Despite the blackout and other damage caused by Hurricane Juan, Prince
    Edward Islanders go to the polls during the Prince Edward Island general election,
    2003, re-electing the Tories under Premier Pat Binns. The Liberals receive four
    seats.'
  - 'Elections: Newfoundland and Labrador premier Roger Grimes calls a general election
    for October 21. Grimes'' Liberals are seeking reelection against the Tories, NDP,
    and the Labrador Party.'
