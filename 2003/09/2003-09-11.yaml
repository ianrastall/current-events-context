Date: '2003-09-11'
Source_URI: Portal:Current events/2003 September 11
Intelligence_Payload:
  Uncategorized:
  - As the United States remembers the deadliest terrorist attack ever on its shores,
    the United States Department of State warns it is seeing "increasing indications
    that al-Qaeda is preparing to strike United States interests abroad" and urges
    citizens overseas to take special caution on the second anniversary of the September
    11 attacks amid growing indications that al-Qaeda is planning bigger attacks,
    "possibly involving unconventional weapons such as chemical or biological agents."
  - Swedish Foreign Minister Anna Lindh dies in the hospital from stab wounds inflicted
    while she was shopping in a department store in the centre of Stockholm. In the
    wake of the incident, both the Yes and No Euro campaigns suspended their activities.
  - The Security Cabinet of Israel votes in principle to expel President of the Palestinian
    National Authority Yasser Arafat from the West Bank. According to one source,
    the cabinet decided to ask the Israeli Defense Force to draw up a plan to expel
    Arafat. No timeline was specified, and Israeli government sources say that the
    decision was not to expel him immediately. The U.S. Department of States criticises
    such a move as "unhelpful". Thousands of Palestinians travel to the presidential
    compound in Ramallah to protest at the Israeli decision. Ahmed Qurei, Prime Minister
    of the Palestinian National Authority-designate, announces in response that he
    is halting efforts to form a government. Russian Foreign Minister Igor Ivanov
    states an international force may be needed to end spiraling violence in the Palestinian
    territories.
  - Massachusetts Institute of Technology scientists achieve the lowest temperature
    ever recorded, half a billionth of a Kelvin (0.5 nanokelvin) above absolute zero,
    in sodium gas. At that speed, atoms move about 12 cm/second.
  - The 6-10 Office, an arm of the National Security Bureau and Public Security Bureau
    of the People's Republic of China responsible for the measures against Falun Gong,
    changes its name to the "Leading Bureau for the Prevention and Procession of Evil
    Cults."
  - Actor John Ritter dies just shy of his 55th birthday after an unsuccessful surgery
    for an undisclosed heart condition.
