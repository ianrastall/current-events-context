Date: '2003-09-23'
Source_URI: Portal:Current events/2003 September 23
Intelligence_Payload:
  Uncategorized:
  - 'California recall: An 11-judge panel of the United States Court of Appeals for
    the Ninth Circuit overturns the earlier ruling of a three-judge panel and reinstates
    October 7 as the date of the California gubernatorial recall election. The American
    Civil Liberties Union, whose suit was responsible for the original decision, will
    not appeal to the Supreme Court.'
  - 'United Nations: World heads of state and government convene at United Nations
    Headquarters in New York City for the start of the annual General Assembly high-level
    summit. President of the United States George W. Bush urges the international
    community to help Iraq rebuild itself into a democracy with the "great power to
    inspire the Middle East." President Bush states a transformed Middle East would
    also benefit the entire world "by undermining the ideologies that export violence
    to other lands." President Bush also calls on the Security Council to adopt new
    anti-proliferation resolution "calling on all members of the UN to criminalize
    the proliferation of weapons of mass destruction", enacting strict export controls,
    and securing all sensitive material.'
  - 'Iraq: A new Gallup poll shows majority of Iraqis expect a better life in five
    years. After foreign occupation and the removal of Saddam Hussein, around two-thirds
    of Baghdad residents state the Iraqi dictator removal was worth the hardships
    they''ve been forced to endure.'
  - 'Iraq: A U.S.-led coalition-backed Iraqi Governing Council member, Ayad Allawi,
    announces restrictions of the operations of TV networks al Jazeera and al-Arabiya.
    The networks are barred from reporting on official activities and news conferences
    and from entering ministries and office buildings for the next two weeks. The
    council claims they incited anti-occupation violence (by airing statements from
    resistance leaders; specifically broadcasting a video of "terrorists terrorizing
    Iraqis"), increased ethnic and sectarian tensions and were supportive of the lawless
    resistance. Allawi hopes the ban sends a "very clear message" to other stations.
    Al Jazeera responds that it is trying to give a balanced view of the current situation
    in Iraq and that it considers its ethical standards to be similar to western ones.
    The Coalition Provisional Authority has not responded to inquiries about the announcement.'
  - The Methuselah Foundation launches the Methuselah mouse contest, offering a prize
    to the team which can extend mouse lifespan the longest. The aim is to promote
    research which can offer insights into human longevity.
  - 'Blackout: A power shortcut lays the southern part of Sweden and the eastern part
    of Denmark dead from midday, creating traffic problems and other disruptions throughout
    the area. About people are affected. From Copenhagen has power again. A Swedish
    nuclear power plant abruptly stopped producing power.'
