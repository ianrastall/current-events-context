Date: '2003-09-06'
Source_URI: Portal:Current events/2003 September 6
Intelligence_Payload:
  Uncategorized:
  - Johns Hopkins researchers retract all results of a frequently cited study which
    claimed that extensive and permanent brain damage occurred after just a single
    dose of Ecstasy. Due to a labelling mistake on the experimental drug vials, all
    but one of the animals involved in the study were not actually given Ecstasy at
    all, but were instead given the drug d-methamphetamine.
  - 'War on Terrorism: European Union foreign ministers denounce the political wing
    of Hamas as a terrorist organization following the group''s claim of responsibility
    for a truce-shattering bomb attack in Jerusalem.'
  - 'War on Terrorism: An Israeli warplane drops a relatively small bomb on a house
    in Gaza City (in an effort to avoid killing innocents, according to military sources
    who spoke to AP), lightly wounding Hamas founder Sheik Ahmed Yassin and 15 other
    people in an airstrike that Israeli officials confirm was an attempt to wipe out
    the Islamic group''s top leaders as they assemble for a meeting.'
  - 'Natural disaster: Hurricane Fabian lashes Bermuda, causing heavy damage. It is
    the most powerful storm to hit the island in fifty years.'
  - 'Palestinian Authority: Prime Minister Mahmoud Abbas submits his resignation to
    the President of the Palestinian Authority, Yasser Arafat. According to Palestinian
    sources, he will play a "caretaker" role of the position until a new prime minister
    is sworn in.'
  - 'Tennis: Justine Henin-Hardenne defeated fellow Belgian Kim Clijsters 7–5, 6–1
    to win her first U.S. Open title. She had defeated Clijsters earlier that year
    to take the French Open as well.'
