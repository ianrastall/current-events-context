Date: '2003-09-04'
Source_URI: Portal:Current events/2003 September 4
Intelligence_Payload:
  Uncategorized:
  - North Korea announces re-election of dictator Kim Jong-il as chairman of the National
    Defense Commission by a unanimous vote of the Supreme People's Assembly, a move
    dismissed as a propaganda stunt by Western observers, who nearly all regard the
    Supreme People's Assembly as a rubber stamp body.
  - California legislature passes expanded domestic partnership bill. The state assembly
    approved a measure to extend nearly all the legal rights of married couples to
    people in same-sex partnerships. If signed by the governor, the bill will become
    law in 2005.
  - The right wing British National Party (BNP) candidate Nicholas Geri, who is of
    Italian descent, wins a surprise victory in a local government by-election to
    Thurrock Borough Council in Essex. The Labour Party, which has a 21-seat majority
    on the Council, sees its candidate pushed into third place, behind the BNP and
    the Conservative Party. Turnout in the by-election was 22%.
  - Singapore drops its 21-year ban on Cosmopolitan magazine and slightly relaxes
    its film censorship policy. Despite this move, the censorship board's surveyors
    found the Singaporean public largely does not want the country's tough censorship
    rules liberalized.
  - 'Natural disaster: The Booth and Bear Butte forest fires in the Cascade Mountains,
    which had been 45% contained, explodes to burn an additional 20,000 acres (80 km2).
    Estimates of the size of this fire vary between 62,000 and 80,000 acres (250 and
    320 km2). The resort community of Camp Sherman, where authorities allowed residents
    to return, is once again evacuated.'
  - A Dutch court rules that Karin Spaink's publication of the Fishman Affidavit on
    her website is legal in the Netherlands.
  - The Israeli Air Force flew three F-15 fighter planes over the Auschwitz death
    camp in Poland.
