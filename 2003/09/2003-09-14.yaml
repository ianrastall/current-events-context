Date: '2003-09-14'
Source_URI: Portal:Current events/2003 September 14
Intelligence_Payload:
  Uncategorized:
  - 'Sweden and the euro: Swedish voters reject joining the Economic and Monetary
    Union of the European Union and adopting the Euro, with 56.1 percent of voters
    voting no.'
  - A military coup d'état is reported in Guinea-Bissau.
  - 'Estonian European Union membership referendum, 2003: Estonians vote, 66.8 percent
    to 33.2 percent, to join the European Union.'
  - 'World Trade Organization Ministerial Conference of 2003: World Trade Organization
    talks collapse in Cancún, Mexico. Rich and poor countries are unable to find common
    ground. The meetings have been the subject of anti-globalization protests.'
  - Some of the severe wildfires in British Columbia have been contained, including
    the one threatening Kelowna. The one near Kamloops is still threatening structures.
    This has been the worst wildfire season in BC in fifty years (→ List of wildfires
    in British Columbia).
  - Yetunde Price, sister of Venus Williams and Serena Williams was shot down during
    a gang shootout in Compton.
