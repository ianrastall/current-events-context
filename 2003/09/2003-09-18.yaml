Date: '2003-09-18'
Source_URI: Portal:Current events/2003 September 18
Intelligence_Payload:
  Uncategorized:
  - 'International Atomic Energy Agency: Iranian officials give signals that they
    do not intend to comply with a resolution passed by the United Nations''s nuclear
    watchdog giving Tehran until the end of next month to come clean on its atomic
    programme. Parliamentary speaker Mehdi Karrubi, a close ally of President Mohammad
    Khatami, said the IAEA resolution was "political" and that "the Iranian people
    will not accept giving in to the logic of force."'
  - Hurricane Isabel makes landfall on the east coast of the United States near Kill
    Devil Hills, North Carolina.
  - A passenger aboard a South African Airways jet tries to break into the cockpit
    during a flight from Cape Town to Atlanta. The passenger, James Drake, is arrested
    upon arrival. He had also been arrested in 1987 after trying to break into another
    airplane's cockpit.
