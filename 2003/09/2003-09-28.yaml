Date: '2003-09-28'
Source_URI: Portal:Current events/2003 September 28
Intelligence_Payload:
  Uncategorized:
  - 'Nuclear Weapons: Iran remains defiant about nuclear program. Iran states it will
    not give up its nuclear program (including uranium enrichment). The International
    Atomic Energy Agency (IAEA) have given Iran until October 31 to prove it has no
    secret nuclear arms program and told it to halt enrichment activities. Iran states
    international pressure will not deter its nuclear plans.'
  - 'Blackout: In Italy and a small part of Switzerland people were without power
    from late Saturday night until Sunday noon. The power outage was more extensive
    than the North American blackout in August.'
  - 'Natural disaster: Hurricane Juan is expected to make landfall near Halifax, Nova
    Scotia.'
  - 'Space: Europe has launched its first mission to the moon, using SMART-1, an unmanned
    probe.'
  - Pope John Paul II names 30 new cardinals, including Marc Ouellet, Archbishop of
    Quebec and Primate of Canada. The Pope also created a 31st Cardinal in pectore,
    which means his identity is kept secret and he will not be made a Cardinal if
    the Pope dies before revealing his name.
