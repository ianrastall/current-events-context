Date: '2003-09-20'
Source_URI: Portal:Current events/2003 September 20
Intelligence_Payload:
  Uncategorized:
  - 'Israeli-Palestinian conflict: Israel says that the United Nations resolution
    on Yasser Arafat (passed 133–4 with 15 abstentions) "is meaningless. It is only
    a declaration and not legally binding." Yasser Arafat states it is of the "utmost
    importance" as a sign of international support for the Palestinians. Israel states
    Palestinians should focus their energy on fighting terrorism. Israel also insists
    that a new government being formed by incoming Palestinian Prime Minister Ahmed
    Qureia cut links to Arafat. Israel says Arafat is tainted by terrorism. Qureia''s
    criticism of United States policy is the strongest sign yet he does not plan to
    challenge Arafat.'
  - '''War on Terrorism'': Seventeen people are killed by United States airstrikes
    in southeast Afghanistan''s Zabul province (in particular the Shinkay district).
    Eight nomad women and children, two Taliban fighters, several collaborating nomads,
    and a Taliban commander (Mohammad Gul Niazai) are among the dead.'
  - 'Occupation of Iraq: Two American soldiers are killed and 13 wounded in a mortar
    attack in Abu Ghraib, and another soldier dies in a roadside attack in Ramadi,
    bringing the number of U.S. deaths since the war began to 304, of which 165 occurred
    after President Bush''s "mission accomplished" statement of May 1. A member of
    the Governing Council, Dr. Aquila al-Hashimi, is shot in an assassination attempt
    (she dies five days later). United Nations Secretary-General Kofi Annan strongly
    condemns the attack and warns that it only undermines the country''s political
    progress.'
  - 'European Union enlargement: Latvians vote overwhelmingly in favor of the Baltic
    country joining the European Union.'
  - 'Canadian Liberal Leadership Race: Early numbers from delegate-selection elections
    within the Liberal Party confirm Paul Martin will win an automatic first-round
    victory at the forthcoming leadership convention. Barring unforeseen circumstances,
    Martin can now be expected to become Canada''s 21st Prime Minister in February
    2004.'
