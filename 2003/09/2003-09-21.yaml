Date: '2003-09-21'
Source_URI: Portal:Current events/2003 September 21
Intelligence_Payload:
  Uncategorized:
  - 'Galileo probe: After 14 years of flight time and 8 years of service in the Jovian
    system, Galileo''s mission was terminated by sending the probe into Jupiter''s
    crushing atmosphere at a speed of nearly 50 kilometres per second to avoid any
    chance of it contaminating local moons.'
  - 'Espionage: The Washington Times reveals the arrest of U.S. Army Captain James
    Yee, an Islamic chaplain at the Guantanamo Bay naval base, for officials, speaking
    on condition of anonymity, state that FBI agents discovered classified documents
    carried by Yee and were questioning him before handing him over to the military.'
  - 'Terrorism – 9/11: Khalid Shaikh Mohammed, mastermind of the September 11 attacks,
    tells interrogators he first discussed the plot with Osama bin Laden in 1996.
    The original plan, and its evolution, are told to an interrogator, along with
    the answers to several questions over the attacks.'
  - 'United Nations: Leaders of the United Nations are concerned if change can give
    it the freedom it needs to survive. Kofi Annan will outline plans for reform at
    the United Nations General Assembly next week. Annan states that only "radical"
    revisions will likely preserve it.'
  - 'Iraq: To open up its economy, the Iraq leadership council unveils sweeping free
    market reforms permitting foreign investment and imposes income taxes – but keeps
    oil under government control.'
  - 'Embargo: China voices opposition to United States sanctions over the alleged
    sale of advanced missile technology to an unnamed country.'
  - 'Germany: State elections in the state of Bavaria show a great success for the
    governing CSU of Edmund Stoiber, scoring over 60%. The nationally governing SPD
    is down to 19%, a historic low point.'
