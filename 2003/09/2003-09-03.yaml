Date: '2003-09-03'
Source_URI: Portal:Current events/2003 September 3
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: Poland assumes a position in postwar Iraq. The coalition
    in Iraq hands over the south-central part of the country to a force led by Poland.
    The force of Polish troops leads a multinational peacekeeping brigade that will
    relieve Coalition forces (in particular the United States Marine expeditionary
    force). This is Poland''s biggest military operation since World War II. This
    is also the first sign of the global community''s commitment to a postwar Iraq.
    Secretary of State Colin Powell seeks support from Britain, France, Germany, and
    Russia on a proposed United Nations resolution that would give the United Nations
    a role in Iraq''s economic and political future. Coalition soldiers strongly desire
    to see more troops from other nations share the work of occupation.'
  - 'Palestinian Authority: Palestinian Prime Minister Mahmoud Abbas threatens to
    quit if the Palestinian legislature does not endorse his government and its policies
    at a session scheduled for Thursday.'
  - 'Iraq: Iraqi Governing Council swears in the first ministerial cabinet since Saddam
    Hussein''s removal. They urge the cabinet to help restore stability to the country.'
  - 'Iran: Iranian Vice President Mohammad Ali Abtahi states that President Mohammad
    Khatami rejects compromise with hard-line opponents over key reform bills. The
    bills seek to curb the conservatives'' power.'
  - 'Diplomacy: British Embassy in Tehran closes temporarily after shots are fired
    at it from the street.'
  - 'United States: Former Presbyterian minister Paul J. Hill is executed for his
    1994 murder in Pensacola, Florida, of an abortion doctor and his bodyguard.'
  - Irish minister Frank Fahey accuses US Immigration authorities at Shannon Airport
    of acting 'disgracefully' in turning back a group of 13 Irish musicians travelling
    to attend New York benefit concert to raise money for an Irish cancer victim in
    the United States for treatment. Ireland's 2003 Eurovision Song Contest singer
    Mickey Joe Harte, one of the singers refused entry, said they were told they needed
    no visas in their case. However, at Shannon, the musicians were suddenly told
    they needed work visas, though the event was for charity and they were providing
    their services 'free of charge'. Irish people travelling to the United States
    do not normally need visas except to get paid employment. The concert is scheduled
    for Friday.
  - Miss Justice Mary Laffoy dramatically resigns as chairperson of the Laffoy Commission
    on Child Abuse, which is investigating evidence of child sex abuse in schools,
    orphanages and Catholic Church-run institutions over decades in Ireland. Her resignation
    followed one day after the Minister for Education, Noel Dempsey told RTÉ Radio
    that the Irish Government, worried by suggestions that the investigation would
    last more than a decade and cost hundreds of millions of euro, wanted to restructure
    the investigation to examine only a sample of the 1800 cases being investigated.
    The government has delayed publishing Justice Laffoy's resignation letter. Abuse
    victim and crusader against abuse Christine Buckey calls for Dempsey's resignation.
    Colm O'Gorman, of the child abuse charity One in Four, and himself a prominent
    survivor of abuse, calls on Taoiseach Bertie Ahern to publish all correspondence
    relating to the resignation.
  - 'California recall: Five candidates (Lt. Governor Cruz Bustamante, California
    state senator Tom McClintock, Peter Camejo, Peter Ueberroth and Arianna Huffington)
    attended the first debate held for the recall election. Arnold Schwarzenegger
    was criticized for not turning up at the debate. Issues such as tax and campaign
    finance were brought up.'
