Date: '2003-09-10'
Source_URI: Portal:Current events/2003 September 10
Intelligence_Payload:
  Uncategorized:
  - The Swedish Foreign Minister Anna Lindh is stabbed while shopping for clothes
    at a mall without bodyguards.
  - 'Terrorism: Al-Qaida sued over September 11 attacks. Major insurance companies
    are suing al-Qaida and Middle Eastern governments in a bid to recover billions
    of dollars in losses related to the September 11 attacks.'
  - 'Terrorism: On the eve of the second anniversary of the September 11 terrorist
    attacks, the Arabic-language television channel Al Jazeera airs a videotape, purportedly
    from Osama bin Laden. The videotape shows two men, including one meant to be bin
    Laden, walking down an (unidentified) rocky hillside. Al Jazeera said the other
    man seen on the tape, carrying an automatic rifle, was Ayman al-Zawahri, the Egyptian
    physician who merged his Islamic Jihad organization with Al Qaeda. The tape was
    claimed to have been made in late April or early May. An accompanying audiotape,
    attributed to the deputy, Ayman al-Zawahri, called on Iraqis to "bury" American
    troops in Iraq.'
  - Japan is to freeze and confiscate assets linked to the removed Iraqi regime based
    on a United Nations resolution. The assets belong to former Iraqi President Saddam
    Hussein, his two sons, and 52 other former top officials of the removed regime.
  - 'Terrorism: Imam Samudra became the second Bali bomber to be sentenced to death
    by firing squad for his role in the October 12 atrocity which killed 202 people.
    Samudra greeted the sentence with chants of "Allahu Akbar" (God is great).http://www.heraldsun.news.com.au/common/story_page/0,5478,7225199%255E661,00.html'
  - 'War on Terrorism: An Israeli warplane targeted the apartment building which is
    home of the senior Hamas leader, Mahmoud al-Zahar, in Gaza. Al-Zahar is lightly
    wounded; his adult son and a bodyguard are killed in the attack. A half-ton bomb
    destroys the building, marking the first time a Hamas leader has been attacked
    in his home, an escalation of Israel''s campaign against the group. Twenty-five
    people were wounded, including Zahar''s wife and a daughter.'
  - 'Terrorism: The leader of Hamas, says that its jihad will continue, and that the
    group may now attack Israeli homes. The military wing of the group has threatened
    to change tactics by attacking Israeli houses and buildings after Israel tried
    to kill Hamas political leader.'
  - 'War on Terrorism: Israel states that an "unwritten and abstract" axis with India
    and the United States has been created to combat international terrorism and make
    the world a more secure place for all.'
  - 'War on Terrorism: APEC: Indonesia and Malaysia have submitted lists of 20 suspected
    terrorists with links to two militant groups, asking for Thailand to help monitor
    their movements on the southern border.'
  - 'War on Terrorism: Kuala Lumpur: Malaysia will amend its Penal Code to punish
    not just terrorists but also those who provide financial services or facilities
    to them. Changes will penalize those who help terrorists.'
  - 'Dewey Decimal Classification: The Online Computer Library Center sues the Library
    Hotel for trademark infringement.'
