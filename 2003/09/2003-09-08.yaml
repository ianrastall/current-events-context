Date: '2003-09-08'
Source_URI: Portal:Current events/2003 September 8
Intelligence_Payload:
  Uncategorized:
  - 'Occupation of Iraq: Declaring Iraq to be the "central front" in the war against
    terrorism, President Bush asks Congress for to help pay for the reconstruction
    of Iraq as well as Afghanistan.'
  - 'Road map for peace: Ahmed Qurei, who was nominated as Palestinian prime minister
    by the head of the Palestinian Authority, Yasser Arafat, accepts the position
    (pending the approval of the parliament). He had originally said there was no
    reason to form a new government unless "Israel wants to change its hostile attitude."'
  - The Ellen DeGeneres Show premiered on NBC. Hosted by comedian and entertainer
    Ellen DeGeneres and originally filmed in Studio 11 at NBC Studios in Burbank,
    California, The successful television program has won 31 day-time Emmy Awards
    and is scheduled to remain on air to at least the 2013-2014 season.
  - Jaclyn Linetsky, the voice of Caillou, died in a car accident.
