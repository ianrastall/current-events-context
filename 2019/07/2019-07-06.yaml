Date: '2019-07-06'
Source_URI: Portal:Current events/2019 July 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamist insurgency in Mozambique
  - ISIL claims responsibility for a Wednesday attack in Nangade District in Mozambique,
    which killed seven people. (Business Standard)
  - Five soldiers of the Israel Defense Forces are injured in a vehicle-ramming attack
    in Hizma, Palestine. The suspect is still at large. (The Jerusalem Post)
  - Syrian Civil War
  - The SNHR says at least 544 civilians (including 130 children) have been killed,
    and another 2,117 people injured since a Russian-led Syrian government assault
    on the last rebel bastion in northwestern Syria began two months prior. (Al Jazeera)
    (Reuters)
  Disasters and accidents:
  - 23 people are injured in a gas explosion at a shopping mall in Plantation, Florida.
    (WPLG) (CNN)
  - At least 2 company employees are confirmed killed and two more are critically
    injured in an explosion at the industrial waste processing plant owned by Monotaro
    due to improper handling of spray cans. (nikkei.com)
  Law and crime:
  - American billionaire Jeffrey Epstein is arrested and faces new charges related
    to alleged sex crimes involving minors. (ABC News)
