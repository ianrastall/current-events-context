Date: '2019-07-03'
Source_URI: Portal:Current events/2019 July 3
Intelligence_Payload:
  Armed conflict and attacks:
  - Insurgency in Jammu and Kashmir
  - Five Pakistani soldiers are killed and one is injured by a bomb blast in Jammu
    and Kashmir. (Economic Times)
  - Syrian Civil War
  - A mass grave containing over 200 bodies is discovered in Raqqa, Syria. The victims,
    who were shackled and shot in the head, are believed to have been killed by ISIL
    militants. (Al Jazeera)
  Disasters and accidents:
  - Over one million people in the Japanese prefectures of Miyazaki and Kagoshima
    are ordered to evacuate their homes due to torrential rainfall. An elderly woman
    in Kagoshima city died after a mudslide hit her home. (BBC News)
  - One tourist is killed and several injured when Mt. Stromboli in Italy erupts.
    (BBC News)
  - At least 26 people have died after a fishing boat capsized off the coast of Honduras.
    (BBC News)
  - At least six people are killed and 190 injured after a tornado hits the city of
    Kaiyuan in Liaoning Province, China. (Global News)
  Law and crime:
  - Death of Otto Warmbier, North Korea–United States relations
  - The parents of Otto Warmbier, an American student who died in North Korean custody
    after allegedly being tortured, file a claim for a seized North Korean cargo ship
    in an attempt to collect on a $501 million judgment they received after suing
    the country. (Associated Press)
  Politics and elections:
  - Ninth European Parliament
  - David Sassoli of the Progressive Alliance of Socialists and Democrats is elected
    President of the European Parliament. (DW)
