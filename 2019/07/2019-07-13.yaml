Date: '2019-07-13'
Source_URI: Portal:Current events/2019 July 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - Taliban gunmen storm a hotel in Badghis Province, killing four soldiers and two
    civilians. Three of the five gunmen are killed and two are arrested. (RFE/RadioLiberty)
  - A U.S. soldier is also killed in a separate bombing in Wardak Province. (Al Jazeera)
  - 2019 Tacoma attack
  - Four policemen kill a suspect attempting to attack an ICE immigrant detention
    center in Tacoma, Washington. The perpetrator was armed with a rifle and incendiary
    devices, and had left a three-page manifesto advocating political violence (BBC
    News) (Heavy)
  Disasters and accidents:
  - Manhattan blackout
  - A blackout in New York City affects 42,000 people near Times Square. (CNN)
  - Monsoon of South Asia
  - Three days of heavy rain in Nepal trigger floods and landslides resulting in at
    least 67 deaths. India was also affected by heavy floods, resulting in the death
    of 34 people, while 29 others died in Bangladesh. (BBC News)
  - Tropical Storm Barry increases to 121 kilometers per hour (75 miles per hour),
    becoming the first hurricane of the 2019 Atlantic hurricane season.
  Politics and elections:
  - U.S. Vice President Mike Pence says the conditions under which asylum seekers
    are being held in facilities along the U.S. border with Mexico are unacceptable,
    after visiting two federal detention centers in Texas, remaining the highest-ranking
    member of the Trump administration to say so. He calls upon the U.S. Congress
    to act. (CNN)
  Sports:
  - 2019 Wimbledon Championships
  - Simona Halep defeats Serena Williams (6–2, 6–2) to win the 2019 Wimbledon women's
    singles championship, her first Wimbledon victory and her second Grand Slam singles
    title. Williams was attempting to equal Margaret Court's all-time record of 24
    Grand Slam singles titles. (The Guardian)
