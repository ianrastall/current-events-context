Date: '2019-07-15'
Source_URI: Portal:Current events/2019 July 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - A landmine blast in the Khakrez District kills 11 pilgrims, including seven children.
    (Reuters)
  Law and crime:
  - Aftermath of the Charlottesville car attack
  - James A. Fields Jr. receives a second life sentence in prison plus 419 years for
    driving his car into a crowd of protestors, killing one and injuring 28, at the
    2017 Unite the Right rally in Charlottesville, Virginia. (AP)
  - A police raid on a neo-Nazi group in northern Italy results in the arrest of three
    people. Sophisticated weaponry, including a Matra Super 530F air-to-air missile,
    are seized during the operation. (BBC News)
  Science and technology:
  - India aborts the launch of their Chandrayaan-2 mission to the Moon due to a technical
    snag glitch reported in the rocket launcher. (AP)
