Date: '2019-07-14'
Source_URI: Portal:Current events/2019 July 14
Intelligence_Payload:
  Disasters and accidents:
  - A GippsAero GA8 Airvan sky diving operation plane crashes on an island outside
    Umeå, Sweden, killing all nine people onboard. (The Guardian)
  International relations:
  - Argentina–Brazil relations
  - Brazilian President Jair Bolsonaro renews his support for the re-election of Argentine
    President Mauricio Macri. "We're brothers, and I want prosperity for our nations,"
    he concludes in an interview. (Clarín)
  Science and technology:
  - The European Union's Galileo satellite navigation system suffers a major outage
    due to a "technical incident related to its ground infrastructure," taking all
    active Galileo satellites offline. (BBC News)
  Sports:
  - 2019 Wimbledon Championships
  - In the men's singles final match, Serbian Novak Djokovic beats Swiss Roger Federer
    in five sets for his 16th Grand Slam title win in a match that lasted four hours
    and 56 minutes. It was the longest Wimbledon final of all time, and also the first
    men's singles final in any of the four Grand Slam events that went to a fifth-set
    tiebreaker. (Wimbledon) (ESPN)
  - 2019 Cricket World Cup
  - England beats New Zealand in the 2019 Cricket World Cup Final on total boundaries
    after both regulation play and a super over end in a tie. (ESPN)
