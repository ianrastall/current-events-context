Date: '2019-07-30'
Source_URI: Portal:Current events/2019 July 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in North-West Pakistan
  - Four are killed and over 20 injured in a bomb blast near a police station in Quetta,
    Pakistan. (Al Jazeera)
  Arts and culture:
  - Federal agents have joined the investigation of a fire that destroys a 125 year-old
    landmark Catholic Church of the Visitation in Westphalia, Texas. After storms
    destroyed two earlier church structures in the 1880s, the Church of Visitation
    was completed in February of 1895 and dedicated on May 23, 1895. (Catholic News
    Agency)
  Disasters and accidents:
  - At least 18 people, including thirteen civilians and five crew members, are killed
    and 12 others injured after a small military plane crashes into a residential
    area near the Pakistani city of Rawalpindi. (BBC News)
  - Eleven deaths and multiple hospitalizations are attributed to the ongoing heat
    wave in Japan. (BBC News)
  Politics and elections:
  - Al-Sultan Abdullah is crowned as the 16th Yang di-Pertuan Agong of Malaysia at
    Istana Negara, Kuala Lumpur. (Berita Harian)
  - Romanian Interior Minister resigns amid outrage over the slow response by police,
    state prosecutor's office and the secret service in charge of telecomunications
    to the disappearance and possible murder of a 15-year-old girl in the city of
    Caracal. (RFE/RL)
