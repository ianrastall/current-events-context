Date: '2019-07-07'
Source_URI: Portal:Current events/2019 July 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan, 2019 Ghazni bombing
  - Fourteen people are killed and nearly 200 are injured in a suicide car bombing
    by the Taliban in Ghazni, Afghanistan. (Al Jazeera)
  Arts and culture:
  - The Jodrell Bank Observatory in Cheshire, United Kingdom, the ancient ruins of
    Babylon in Babil Governorate, Iraq, among other sites are designated UNESCO World
    Heritage Sites. (BBC News) (The Independent)
  International relations:
  - Joint Comprehensive Plan of Action, Nuclear program of Iran
  - Iran announces plans to begin enriching uranium beyond the limit set in its 2015
    nuclear deal, with world powers pressing Europe to salvage the accord after the
    United States withdrew from it last year. (Al Jazeera)
  Politics and elections:
  - 2019 Greek legislative election
  - Citizens of Greece go to the polls to vote for the next members of the Hellenic
    Parliament. (BBC News)
  - Leader of the Opposition Kyriakos Mitsotakis, from New Democracy, wins an absolute
    majority and is expected to be sworn in Prime Minister as incumbent Alexis Tsipras
    falls to second place. Far-right Golden Dawn loses all the seats they had in the
    Parliament. (The New York Times)
  - Operation Car Wash, Foreign relations of Venezuela, Foreign relations of Brazil
  - New leaked messages between Brazilian judge Sérgio Moro and prosecutors of Operation
    Car Wash show that Moro suggested they leak confidential information concerning
    Odebrecht's activities in Venezuela to members of the Venezuelan opposition. Some
    prosecutors even entertained the possibility of provoking a civil war in Venezuela
    over the leaks. (The Intercept Brasil)
  - Anglican bishop David Vunagi is sworn in as Governor-General of Solomon Islands.
    (Solomon Times)
  Sports:
  - 2019 FIFA Women's World Cup
  - In the final match of the 2019 Women's World Cup, the United States wins 2–0 over
    the Netherlands. Golden Boot winner Megan Rapinoe scored on a penalty kick, followed
    by Rose Lavelle's strike in the 69th minute. (The New York Times)
  - 2019 Copa América
  - Hosts Brazil defeat Peru 3–1 in the final match of the Copa América at the Estádio
    do Maracanã in Rio de Janeiro. It is their ninth title and first since 2007. (The
    Guardian)
  - 2019 CONCACAF Gold Cup
  - Mexico wins their eighth Gold Cup, defeating the United States 1–0 in the final
    match in Chicago. (The Washington Post)
  - FIBA Women's EuroBasket 2019
  - Spain wins its fourth title of the Eurobasket competition after defeating France
    in the final match. (El Mundo)
