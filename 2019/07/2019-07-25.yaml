Date: '2019-07-25'
Source_URI: Portal:Current events/2019 July 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Japan–North Korea relations
  - North Korea tests two new missiles that land in the Sea of Japan, though not within
    Japanese territory. Japanese Defense Minister Takeshi Iwaya condemns the testing
    as "extremely regrettable". (Al Jazeera) (DW)
  Health and environment:
  - July 2019 European heat wave
  - 'A number of national maximum temperature records are broken, several surpassing
    records set the previous day: Germany sees at Lingen, Belgium at Begijnendijk
    and The Netherlands at Gilze en Rijen. (Accuweather) (The Guardian)'
  - The United Kingdom reports a temperature reading of in Cambridge, the second highest
    UK temperature yet recorded. It is subsequently confirmed that a reading of is
    verified, also in Cambridge, beating the previous record of set in Faversham,
    Kent on 10 August 2003 to become the new national record. (The Guardian)
  - All-time records for various cities and towns in Western Europe are broken, most
    notably Paris, reaching a temperature of .
  Law and crime:
  - Capital punishment in the United States
  - U.S. Attorney General William Barr resumes the federal usage of the death penalty.
    Five inmates are expected to be executed between December 2019 and January 2020.
    If carried out, these would be the first federal executions in the United States
    in sixteen years. (CNBC) (The New York Times)
  - At least four people are killed and two wounded in a shooting spree that spread
    across multiple Los Angeles neighborhoods. Police tackled and arrested the suspect,
    Gerry Zaragoza, after a 12-hour manhunt. (CNN) (Reuters via AOL.com)
  Politics and elections:
  - U.S. President Donald J. Trump had a phone conversation with the president of
    Ukraine, including discussion of U.S. presidential candidate Joe Biden's son.
    Trump asked the Ukrainian president to "look into it," as per a White House transcript.
    (White House.gov)
  - The 92-year-old and first freely-elected President of Tunisia, Beji Caid Essebsi,
    dies. Tunisian parliament President Mohamed Ennaceur takes the role of interim
    president. (Associated Press) (BBC News)
  - 2019 Algerian protests
  - Algerian interim president Abdelkader Bensalah appoints a six-member panel to
    set a presidential election date. The previous date of July 4 was cancelled due
    to lack of candidates amid mass protests. (Reuters)
  Sports:
  - Outfielder Stevie Wilkerson of the Baltimore Orioles becomes the first position
    player in Major League Baseball history to record a save, doing so in a 10–8 victory
    over the Los Angeles Angels. (CBS)
