Date: '2019-07-10'
Source_URI: Portal:Current events/2019 July 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Assailants raid a village in Papua New Guinea's Hela province, killing and dismembering
    16 women and children, and burning buildings. (The Guardian)
  - Three or five of Iran's IRGC Navy gunboats unsuccessfully attempt to seize control
    of British oil tanker British Heritage in the Persian Gulf, according to UK's
    Ministry of Defense as well as two anonymous U.S. officials. The Royal Navy's
    HMS Montrose reportedly warns the boats to back away from the BP Shipping-owned
    tanker, which they do. The incident is allegedly captured on a U.S. aircraft's
    camera. (CNN)
  Business and economy:
  - Three large shipbuilders in the People's Republic of China announce that they
    are in talks to merge. This is part of an ongoing shake-up and consolidation of
    that industry in the face of high operational costs and sluggish new orders. (Caixin
    Eng.)
  Disasters and accidents:
  - An unexpected violent storm hits the Greek region of Halkidiki with heavy rain,
    hail, and strong winds, killing six foreign tourists. (BBC News)
  International relations:
  - United Kingdom–United States relations
  - Sir Kim Darroch, the United Kingdom's ambassador to the United States, resigns
    his appointment amid public disagreements with U.S. President Donald Trump initiated
    by a series of leaked diplomatic cables in which the ambassador criticized the
    president, and will leave the post upon the appointment of his successor. (BBC
    News)
  - Kosovo–Serbia relations
  - Serbian Defense Minister Aleksandar Vulin is banned from entering Kosovo. (ABC
    News)
  Law and crime:
  - List of lawsuits involving Donald Trump
  - The U.S. Court of Appeals for the Fourth Circuit dismisses a lawsuit by the state
    of Maryland and the District of Columbia against President Donald Trump, citing
    lack of legal standing in challenging payments to President Trump's private properties
    by foreign customers. (CNBC) (Politico)
  Science and technology:
  - 2019 in archaeology
  - Paleoanthropologists announce, through the Nature journal, that a human skull
    (Apidima 1) discovered inside a cave in Greece, is dated to 210,000 years ago,
    making it the oldest known Homo sapiens individual found outside of Africa. (BBC
    News) (Nature)
  Sports:
  - 2019 Cricket World Cup
  - New Zealand defeats India in the first semi-final of the Cricket World Cup. (The
    Independent)
  - 2019 ESPY Awards
  - The 27th annual ESPY Awards are held in the Microsoft Theater in Los Angeles,
    California. The United States women's national soccer team wins the Outstanding
    Team Award for their 2019 FIFA Women's World Cup victory, Giannis Antetokounmpo
    wins the Best Male Athlete Award, Alex Morgan wins the Best Female Athlete Award,
    and Saquon Barkley wins the Breakthrough Athlete of the Year Award. (ESPN)
