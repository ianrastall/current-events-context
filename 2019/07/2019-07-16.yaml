Date: '2019-07-16'
Source_URI: Portal:Current events/2019 July 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Syrian government airstrikes targeting residential areas in the towns of Jisr
    al-Shughur, Khan Shaykhun, Maar Shoreen, Hantoteen and Ain Al Bardeh in Idlib
    province, kill at least nine civilians and injure 14 others. (AA)
  Business and economy:
  - Nate Sutton, associate general counsel of Amazon, in testimony before a committee
    of the U.S. Senate, denies that the company uses individual data to compete unfairly
    with smaller sellers using its third-party platform. (Seeking Alpha)
  Law and crime:
  - Odebrecht case
  - Former President of Peru Alejandro Toledo is arrested in the United States following
    an extradition request. (US News)
  - American musician R. Kelly pleads not guilty to federal sex-assault charges but
    is denied bail. (NBC News)
  Politics and elections:
  - Telegramgate scandal
  - Puerto Rico Governor Ricardo Rosselló says that he will remain in office despite
    protests. (CBS News)
  - The European Parliament elects Ursula von der Leyen of Germany as the new President
    of the European Commission. Succeeding Jean-Claude Juncker, she will be sworn
    in on 1 November 2019. She is the first woman to be elected to this office in
    EU history. (BBC News)
  - Christine Lagarde announces that she will step down as managing director of the
    International Monetary Fund on 12 September 2019. (BBC News)
