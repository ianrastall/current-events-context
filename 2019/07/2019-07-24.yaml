Date: '2019-07-24'
Source_URI: Portal:Current events/2019 July 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - A suicide bomber detonates inside the office of Mogadishu's mayor Abdirahman Abdi
    Osman, killing six government officials. Osman is seriously injured in the attack
    and his condition is critical. (BBC News)
  Business and economy:
  - Boeing 737 MAX groundings
  - Boeing reports its largest-ever quarterly loss, of 2.9 billion, as a result of
    the grounding of its 737 MAX series, with the company saying that it could halt
    its production. (The Guardian)
  Health and environment:
  - July 2019 European heat wave
  - Highest-ever temperatures are recorded in Germany (at 40.5°C or 104.9°F), the
    Netherlands (at 39.2°C or 102.5°F), and Belgium (at 38.9°C or 102.0°F). (Deutscher
    Wetterdienst) (The Guardian)
  Politics and elections:
  - Premiership of Theresa May, Premiership of Boris Johnson
  - Theresa May visits Queen Elizabeth II at Buckingham Palace to formally tender
    her resignation and recommend her replacement as Prime Minister of the United
    Kingdom. (Royal Communications)
  - Greenpeace protesters block The Mall, the drive to Buckingham Palace, holding
    up Prime Minister-designate Boris Johnson on his way to visit the Queen. (The
    Guardian)
  - Johnson is asked by the Queen to form a new administration, making him the 55th
    Prime Minister of the United Kingdom. (BBC News)
  - 'Multiple cabinet members resign on the day of Johnson''s ascension to premiership,
    or in the days preceding it, in response to Johnson''s politics and views on Brexit,
    including Chancellor, Philip Hammond, Foreign Secretary, Jeremy Hunt, David Gauke,
    Sir Alan Duncan, Rory Stewart, Anne Milton, and Theresa May''s de facto deputy
    the: Chancellor of the Duchy of Lancaster & Minister for the Cabinet Office, David
    Lidington. (The Guardian) (Financial Times) (The Times)'
  - Secretary-General of the European Commission Martin Selmayr is appointed as EC
    representative in Austria from November 1 on. (Politico) (Deutsche Welle)
  - Annegret Kramp-Karrenbauer is sworn in as German defence minister. (Deutsche Welle)
