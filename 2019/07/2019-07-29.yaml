Date: '2019-07-29'
Source_URI: Portal:Current events/2019 July 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - An Afghan National Army soldier kills two United States Army soldiers in Kandahar,
    Afghanistan, which local police suspect is an insider attack. The killer is believed
    to be wounded. (BBC News)
  - Saudi Arabian-led intervention in Yemen
  - Ten civilians, including children, are killed after a Saudi Arabian-led coalition
    air strike hits a market in northern Yemen, according to anonymous Houthi members.
    (The Washington Post)
  - 2018–19 Sudanese protests
  - Five students are shot dead after security forces open fire in the city of El-Obeid
    during a protest. (Al Jazeera)
  Arts and culture:
  - Billboard reports that Lil Nas X has broken the all-time record on the Billboard
    Hot 100 with his song "Old Town Road", as it spends its seventeenth week atop
    the chart; the previous record-holders are Mariah Carey and Boyz II Men with "One
    Sweet Day", and Luis Fonsi with "Despacito" featuring Daddy Yankee. (Billboard)
  Business and economy:
  - International sanctions during the Venezuelan crisis
  - Venezuelan officials are accused of using the cryptocurrency Bitcoin in order
    to circumvent United States sanctions. (Yahoo! Finance)
  - List of data breaches
  - Capital One announces that a major data breach occurred on July 19, 2019, by one
    individual who compromised the data of about 106 million people in the United
    States and Canada. The Federal Bureau of Investigation have made an arrest after
    the alleged hacker, 33-year-old Paige Thompson from Seattle, boasted about her
    actions online. (BBC News)
  Health and environment:
  - The Wildlife Protection Society of India announces that the wild population of
    tigers in India has increased by a third since 2015 following a comprehensive
    survey. Prime Minister of India Narendra Modi describes the news as a "historic
    achievement". (Sky News) (The Guardian)
  Law and crime:
  - An eight-year-old boy is killed and his mother injured after being pushed by a
    man into the path of an oncoming train at Frankfurt's main station, in Hesse,
    Germany. The attacker, a 40-year-old immigrant Eritrean man who lives in Switzerland,
    also attempted to knock a third person onto the tracks. The suspect and the victims
    did not know each another. (Sky News)
  - 2019 Altamira prison riot
  - At least 62 people are killed, including sixteen who were beheaded, during prison
    riots in Pará, Brazil, which saw rival gangs battle for five hours. (CNN)
  - Three are killed in a shooting at a garlic festival in Gilroy, California. (The
    Washington Post)
  Politics and elections:
  - After two FARC leaders go into hiding from drug trafficking charges in Colombia
    and the United States, Venezuelan President Nicolás Maduro makes a public statement
    saying they are welcome to take refuge in his country. He also welcomes other
    FARC rebels to Venezuela, calling them "leaders of peace". (Reuters)
  - 2019 Hong Kong anti-extradition bill protests
  - The Chinese government's Hong Kong and Macao Affairs Office condemns protests
    in Hong Kong as "evil and criminal acts committed by the radical elements", saying
    that Hong Kong's top priority is to "punish violent and unlawful acts in accordance
    with the law". Hong Kong legislators and journalists reject the statement from
    Beijing, expressing concern that this will worsen tensions. (BBC News)
