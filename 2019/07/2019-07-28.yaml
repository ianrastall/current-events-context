Date: '2019-07-28'
Source_URI: Portal:Current events/2019 July 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 28 July 2019 Kabul suicide bombing
  - Gunfire and an explosion kills 20 and injures over 50 in an attack at the Kabul
    office of the Vice Presidential candidate Amrullah Saleh, who was slightly injured
    in the attack. (BBC News)
  - Libyan Civil War
  - An airstrike kills five doctors in a hospital in the southern outskirts of Libya's
    capital Tripoli. (BBC News)
  - During conflicts in the state of Amapá in northern Brazil, armed miners invade
    a native reserve and stab to death an indigenous man. (BBC News)
  Disasters and accidents:
  - At least 42 people die in a landslide striking a village in southern China. (BBC
    News)
  - Heavy storms across central Italy kill three people and cause damages. One death
    was caused by lightning, one by a tornado, and one by getting caught in a flood.
    (Il Messaggero)
  - The death toll of the heavy floods in Nepal rise to 113. (India Today)
  Law and crime:
  - Gilroy Garlic Festival shooting
  - A gunman opens fire at the Gilroy Garlic Festival in Gilroy, California, killing
    three people and wounding at least twelve others. The gunman is killed after engaging
    with the police. Police believe an accomplice is still at large. (SF Chronicle)
    (CBS News)
  Politics and elections:
  - Hong Kong protests
  - Tens of thousands of protesters demanding the resignation of pro-China Chief Executive
    of Hong Kong Carrie Lam take over the streets in Sai Wan and Causeway Bay, near
    China's Hong Kong Liaison Office, despite an official police ban on protests near
    the Chinese government building. (BBC News)
  - During protests, Hong Kong groups organize to put pressure on the United Kingdom,
    asking for help to uphold the city-state's legal rights. The Joint Agreement of
    1997 signed by the UK and China outlines that Hong Kong will have legislative
    and judiciary independence, based on systems implemented there under British rule.
    (The Guardian)
  - 2021 Peruvian general election
  - President Martín Vizcarra announces that he will present a constitutional reform
    that calls a snap election for April 2020. (Reuters)
  Sports:
  - 2019 Tour de France
  - In road cycling, Colombia's Egan Bernal wins the Tour de France by 1:11 on general
    classification over his British teammate Geraint Thomas. The 22-year-old Bernal
    is the first Colombian and first Latin American rider to win the Tour, and the
    youngest rider to do so since 1909. (BBC Sport)
