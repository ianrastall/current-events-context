Date: '2019-07-27'
Source_URI: Portal:Current events/2019 July 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Japan–North Korea relations
  - Japan warns on Saturday that the new North Korean projectiles have trajectories
    that are not typical for conventional ballistic missiles, making them difficult
    or impossible to intercept en route to Japan. (Al-Manar)
  - 2019 Borno funeral attack
  - At least 65 people are killed and 10 injured in an attack by Boko Haram at a funeral
    in Maiduguri, Nigeria. (CNN)
  Law and crime:
  - Two American teenagers are arrested in Rome for extortion and murder of an Italian
    military officer. (The New York Times)
  Politics and elections:
  - President Félix Tshisekedi and the Congolese parliament, controlled by a rival
    party, agree to form a new government following negotiations, six months after
    he replaced Joseph Kabila during the 2018 DR Congo general election. Sylvestre
    Ilunga will be formally nominated for the post of Prime Minister in the coming
    week. (News24)
  - Venezuela's Nicolás Maduro again accuses the United States of flying over its
    national waters. (El Sol de Mexico)
  - 2019 Moscow City Duma election
  - Several thousand people attend a rally in Moscow organized by opposition members
    due to several opposition candidates being disqualified from regional elections.
    The protests turned violent and police detained about 1,000 people, including
    politician Alexei Navalny. (BBC News)
