Date: '2019-07-12'
Source_URI: Portal:Current events/2019 July 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Asasey Hotel attack
  - A car bomb and a gun attack kill at least 26, including two prominent journalists
    and nine foreigners, in Kismayo, Somalia. (BBC News)
  - War in Afghanistan
  - A suicide bomber kills nine people and injures 40 others at a wedding in the Nangarhar
    Province in Afghanistan. The bomber is believed to be a minor. (BBC News) (Reuters)
  - 2019 Venezuelan presidential crisis
  - The Venezuelan government arrests two members of disputed Interim President Juan
    Guaidó's personal security. The government claims that the pair were trying to
    sell weapons stolen from the national army and organising the failed coup attempt
    on 30 April. The opposition denies the weapons charges. (Reuters)
  International relations:
  - Russia–Turkey relations
  - Turkey receives its first shipment of the S-400 missile system from Russia, defying
    U.S. and NATO calls to cancel the deal. (BBC News)
  Law and crime:
  - Oulu child sexual exploitation scandal
  - Oulu District Court hands down the last sentences concerning the cases involving
    eight foreign-born men who abused the same girl victim. (Yle)
  Politics and elections:
  - U.S. Secretary of Labor Alexander Acosta announces his resignation from office
    amid growing public criticism over his past role in securing a 2008 plea deal
    for former financier Jeffrey Epstein, after Epstein was arrested and charged with
    sex trafficking of minors. He is to be replaced by Acting Secretary Patrick Pizzella
    effective July 19. (NBC News)
