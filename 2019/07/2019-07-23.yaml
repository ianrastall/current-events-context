Date: '2019-07-23'
Source_URI: Portal:Current events/2019 July 23
Intelligence_Payload:
  International relations:
  - Foreign relations of Venezuela
  - Through Argentine Foreign Affairs Minister Jorge Faurie, the Lima Group say that
    "the use of force in Venezuela will be implemented when required". (El Nacional)
  - Hezbollah foreign relations
  - Hezbollah condemns Argentina over its designation of their group as a "terrorist
    organization", saying Argentina did so under "United States pressure". (Itón Gadol)
  Politics and elections:
  - 2019 Conservative Party leadership election
  - Boris Johnson is elected as Leader of the UK Conservative Party, and as a result
    is expected to become Prime Minister of the United Kingdom on 24 July 2019. (BBC
    News)
