Date: '2019-07-11'
Source_URI: Portal:Current events/2019 July 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War
  - Four people are killed and over 30 injured in a car bomb attack at a funeral for
    a senior Libyan National Army commander in Benghazi. (Reuters)
  - Syrian Civil War
  - A car bomb detonates in a Turkey-backed rebel city, Afrin, near the entrance,
    killing 11 and injuring over 30 badly. (Reuters)
  - Another car bomb detonates in the city of Qamishli near a church, injuring 11.
    The Islamic State claimed responsibility. (Rudaw)
  Disasters and accidents:
  - Tropical Storm Barry (2019)
  - Louisiana Governor John Bel Edwards declares a state of emergency as Tropical
    Storm Barry makes unprecedented levels of rainfall on Louisiana, Mississippi,
    Alabama and the western Florida Panhandle. (CNN) (CNN²)
  - Seven people, including six foreign tourists, are killed and 100 others injured
    during a violent storm that swept across Thessaloniki, Greece. (BBC News)
  Law and crime:
  - British right-wing activist Tommy Robinson is sentenced to nine months in prison
    for contempt of court — minus time served equals about another 10 weeks in prison.
    Supporters attacked police and journalists following the court proceedings. Police
    say no new arrests were made. (BBC News)
  - American R&B singer R. Kelly is arrested in Chicago on federal sex crime charges.
    (NBC News)
  Science and technology:
  - JAXA's Hayabusa2 space probe makes its second successful and final landing on
    Apollo asteroid 162173 Ryugu. (The Guardian)
