Date: '2019-07-05'
Source_URI: Portal:Current events/2019 July 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Reyhanlı car bombing
  - A car bomb explodes in the Turkish city of Reyhanlı. The blast kills three Syrian
    citizens who were inside the car. (Daily Sabah)
  - War in Afghanistan
  - Fourteen civilians are killed and 45 injured in mortar attacks in Faryab Province.
    Taliban insurgents claim responsibility for the attack. (TOLOnews)
  - A bomb hits a mosque in Ghazni, Afghanistan, killing two and wounding over 40.
    (TOLOnews)
  Arts and culture:
  - Hijab by country
  - Tunisian Prime Minister Youssef Chahed announces that the niqab will be banned
    in public institutions effective immediately, citing security concerns following
    a pair of suicide bombings on June 27. (Al Jazeera)
  Disasters and accidents:
  - 2019 Ridgecrest earthquakes
  - A magnitude 7.1 earthquake hits Southern California just a day after a magnitude
    6.4 earthquake in the same area. (USGS)
  - Seven Americans, including coal billionaire Chris Cline, are found dead in a helicopter
    crash in the Bahamas. (Los Angeles Times)
  Politics and elections:
  - Operation Car Wash
  - New text messages between Brazilian judge Sérgio Moro and Operation Car Wash's
    prosecutors are leaked by The Intercept Brasil and Veja. In the messages, Judge
    Moro illegally advises the prosecutors in including pieces of evidence against
    defendants of cases presided by him and suggests dates for Federal Police operations.
    The messages also suggest that Moro withheld evidence to prevent cases being transferred
    out of his jurisdiction to the Supreme Federal Court. (Veja)
  - Sudanese protests
  - The Sudanese military and representatives of civil groups agree on a deal to share
    power for a transition period. (DW)
