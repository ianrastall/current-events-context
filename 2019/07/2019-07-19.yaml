Date: '2019-07-19'
Source_URI: Portal:Current events/2019 July 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iran–United Kingdom relations
  - Iranian Navy of the Islamic Revolutionary Guard Corps captures British tanker
    Stena Impero and temporarily seizes British-operated and Liberian-flagged tanker
    Mesdar in the Persian Gulf. British Foreign Secretary Jeremy Hunt says there will
    be "serious consequences" if Iran does not release the tanker. (CNN) (Yahoo!)
    (BBC News)
  - Iran–United States relations
  - Iran denies that one of its drones was shot down by the United States on July
    18, saying all of their drones "returned to their bases." (USA Today)
  - A car bombing at Kabul University kills eight and injures dozens. (Reuters)
  Disasters and accidents:
  - Skydive Umeå Gippsland GA8 Airvan crash
  - The Gippsland GA8 Airvan is grounded in Australia, New Zealand and the European
    Union following a fatal crash on July 14. (The Guardian) (New Zealand Herald)
  Politics and elections:
  - Ramush Haradinaj, Prime Minister of Kosovo, resigns after receiving a summons
    from the Kosovo Specialist Prosecutor's Office as a war crimes suspect. (DW)
  Sports:
  - 2019 Africa Cup of Nations
  - Algeria defeats Senegal in the Africa Cup of Nations Final, winning their second
    continental championship. (The Guardian)
