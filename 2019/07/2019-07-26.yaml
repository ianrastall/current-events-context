Date: '2019-07-26'
Source_URI: Portal:Current events/2019 July 26
Intelligence_Payload:
  Business and economy:
  - The U.S. Department of Justice approves a $26 billion merger between T-Mobile
    and Sprint. If finalized, they will become the third-largest mobile network operator
    in the nation. (Reuters)
  Disasters and accidents:
  - Heavy rains in Al Haouz Province, Morocco, trigger a landslide, resulting in the
    deaths of 15 people. (The New York Times) (Morocco World News)
  - Two people die and more than 17 are injured when an internal balcony collapses
    at a nightclub in the South Korean city of Gwangju. (BBC News)
  - 2019 Batanes earthquake
  - At least nine people are killed and 60 others injured when two earthquakes strike
    the province of Batanes in the Philippines. (InquirerNet)
  Health and environment:
  - Saudi Arabia suspends visas for Hajj pilgrims arriving from the Democratic Republic
    of the Congo, amid safety concerns regarding the ongoing Ebola epidemic in Kivu.
    (Al Jazeera)
  Law and crime:
  - A man from the Bronx, New York City, is arrested for attempting to join the Taliban.
    (ABC News)
  - Sixteen American Marines are arrested at Camp Pendleton, California, on suspicion
    of aiding human smuggling and drug charges. (CBS News)
