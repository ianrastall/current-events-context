Intelligence_Payload:
  Arts and culture:
  - List of highest-grossing films
  - 'The Walt Disney Company reports that Avengers: Endgame has surpassed Avatar as
    the highest grossing movie of all time, unadjusted for inflation. (CNN)'
  Business and economy:
  - British Airways halts flights to Cairo for at least seven days, citing security
    concerns. Lufthansa also halts all flights, although only for one day. (Reuters)
  Disasters and accidents:
  - An explosion at a gas factory in China's Henan Province kills at least 15 people
    and leaves 256 injured. (DW)
  Sports:
  - Manny Pacquiao vs. Keith Thurman
  - In boxing, Manny Pacquiao defeats Keith Thurman via split decision held in MGM
    Grand Garden Arena, Las Vegas, Nevada. (ABS-CBN News)
