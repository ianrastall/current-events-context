Date: '2019-12-10'
Source_URI: Portal:Current events/2019 December 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - Near the Villa Somalia presidential palace in Mogadishu, five al-Shabaab gunmen
    attack a SYL hotel. The attack and subsequent shootout kills three civilians,
    two soldiers and all the attackers. (CBS17)
  - 2019 Jersey City shooting
  - 'Heavy gunfire is exchanged between police and two shooters in Jersey City, New
    Jersey. Six people are killed: a police officer, the shooters, and three people
    inside a kosher supermarket, which the shooters barricaded themselves in. Police
    describe the shooting as an "ambush". (The Independent) (NBC New York)'
  - Iranian involvement in the Syrian Civil War
  - Satellite images spot a tunnel system being dug at Imam Ali military base in eastern
    Syria, which is controlled by the Iranian military; Western intelligence believe
    the tunnels are being constructed to house their missiles. (Fox News)
  International relations:
  - Myanmar–United States relations
  - The United States Department of the Treasury blacklists four top Burmese military
    leaders, including Commander-in-Chief Min Aung Hlaing, for their role in the persecution
    of Rohingya Muslims and other minorities. (Reuters)
  Law and crime:
  - Ostrava hospital attack
  - In Ostrava, Czech Republic, a man opens fire in a hospital's waiting room, killing
    seven people before fleeing, then shooting himself dead. (Reuters)
  - Rohingya genocide case
  - At the International Court of Justice, The Gambia presents charges against the
    government of Myanmar and its leader Aung San Suu Kyi, who traveled to appear
    in the court. According to the prosecution, the Burmese government is responsible
    for mass rapes, widespread arson and killings of Rohingya children, among other
    crimes. (Reuters)
  - 2017 Saint Petersburg Metro bombing
  - A military court sentences 10 people to jail terms ranging between 19 and 28 years.
    The person who is said to have trained the suicide bomber gets prison for life.
    (BBC News)
  - Impeachment inquiry into Donald Trump
  - 'Democrats in the United States House of Representatives unveil two articles of
    impeachment against President Donald Trump: abuse of power and obstruction of
    Congress. (CNN)'
  Politics and elections:
  - Alberto Fernández takes the oath of office as President of Argentina while Cristina
    Fernández de Kirchner is sworn in as Vice President. (Reuters)
