Date: '2019-12-14'
Source_URI: Portal:Current events/2019 December 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - An insider attack by seven Taliban infiltrators killed 25 Afghan Armed Forces
    in Qarabagh, Ghazni Province, Afghanistan. (VOA News)
  Business and economy:
  - Light rail in Sydney
  - The first section of the CBD and South East Light Rail commences operations returning
    trams down George Street for the first time since the demise of the former tram
    network. (The Sydney Morning Herald)
  Health and environment:
  - 2019 Samoa measles outbreak
  - The government of Samoa extends the state of emergency until December 29 when
    it was due to end on December 15. There have been 72 deaths and more than 5,100
    cases to date. (RNZ) (Reuters)
  Law and crime:
  - Former Sudanese President Omar al-Bashir is sentenced to two years detention in
    a reform facility for corruption. There is heavy military custody of the government
    buildings and the court as followers of his now dissolved party rally in his support.
    Defense lawyers say they will appeal the sentence. (Reuters)
