Date: '2019-12-13'
Source_URI: Portal:Current events/2019 December 13
Intelligence_Payload:
  Business and economy:
  - China–United States trade war
  - Both countries announce an initial deal where new tariffs to be mutually imposed
    on December 15 would not be implemented. China says it "will buy more high quality
    of American agricultural products", while the United States says it will halve
    the existing 15% tariffs. (The Guardian)
  Disasters and accidents:
  - Fourteen people are killed after a van hit a truck loaded with smuggled fuel in
    Killa Saifullah District, Pakistan. (TRT Global)
  Law and crime:
  - 2019 Chilean protests
  - The Office of the United Nations High Commissioner for Human Rights releases a
    report regarding the situation in Chile. The report confirms the existence of
    severe and reiterative human rights violations, including excessive use of force,
    arbitrary detentions, torture and sexual violence. (Cooperativa)
  - Corruption in Ukraine
  - An appeals court in Ukraine confirms the guilty ruling of Artem Sytnyk, head of
    the National Anti-Corruption Bureau of Ukraine, for corruption. Sytnyk was accused
    of having expensive vacations paid by businessman Mykola Nadeyko. (UNIAN)
  - Impeachment inquiry into Donald Trump
  - The House Judiciary Committee votes along party lines to pass two articles for
    impeachment against President Donald Trump. The House of Representatives is expected
    to hold two votes, one for each charge, on Wednesday, December 18. (ABC News)
  Politics and elections:
  - 2019 Algerian presidential election
  - Abdelmadjid Tebboune is elected in the first round. (NPR)
  - UK Prime Minister, Boris Johnson begins his second term and forms a new majority
    government after winning the 2019 general election by a landslide. (BBC News)
