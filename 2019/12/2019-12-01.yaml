Date: '2019-12-01'
Source_URI: Portal:Current events/2019 December 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Villa Unión shootout
  - A shootout between police officers and cartel gunmen in Villa Unión, Coahuila,
    Mexico, leaves at least 21 people dead. (Reuters)
  - 2019 attacks on Burkina Faso
  - Gunmen open fire on a church in Burkina Faso killing fourteen Christians and wounding
    dozens of others. The attack took place in a village in Foutouri, Est Region.
    (Reuters)
  - Anglophone Crisis
  - A Camair-Co plane is fired upon while attempting to land at Bamenda Airport, but
    the pilot manages to safely land the plane with no casualties reported. (RT)
  - Syrian Civil War
  - Rami Abdul Rahman says clashes in Idlib between Islamists and the Syrian Arab
    Army kill around 70. Around 36 Syrian soldiers were killed in the two day clash.
    (France 24)
  Disasters and accidents:
  - Nineteen people die when a bus skids off a bridge in Zabaykalsky Krai in the Russian
    Far East, and falls onto a frozen river. (Reuters)
  - Twenty-four people are killed and 18 injured when a bus plunges into a ravine
    in Tunisia. (Al Jazeera)
  - Three people are killed in a plane crash in San Antonio, Texas, United States.
    (CNN)
  Health and environment:
  - 2019 Samoa measles outbreak
  - Three children in one family are among those killed by the outbreak. (The Guardian)
  - World AIDS Day
  - The observance is marked by UNAIDS and worldwide, as the AIDS Quilt returns to
    San Francisco. (The Independent) (The New York Times)
  Politics and elections:
  - 2019 Iraqi protests
  - The Council of Representatives accepts Prime Minister Adil Abdul-Mahdi's resignation.
    (Al Jazeera)
