Date: '2019-12-05'
Source_URI: Portal:Current events/2019 December 5
Intelligence_Payload:
  Business and economy:
  - Chinese telecommunications giant Huawei sues the U.S. Federal Communications Commission
    over the latter's ban on carriers from using money from the Universal Service
    Fund to buy equipment from Huawei and ZTE. (Tech Crunch)
  Disasters and accidents:
  - Three Minnesota National Guard members are killed when a Sikorsky UH-60 Black
    Hawk helicopter crashes near St. Cloud. (AOL News)
  International relations:
  - Bosnia and Herzegovina takes full control of the country's airspace for the first
    time since the end of the Bosnian War. Bosnia's air space had been controlled
    by NATO between 1995 and 2003, following which it was controlled jointly by Serbia
    and Croatia until this announcement. (Reuters)
  Law and crime:
  - Indonesian police arrest more than 34 people over "charges of treason" for attempting
    to raise the outlawed Morning Star flag, which represents the independence movement
    of West Papua Province. (RNZ)
  - Accounting fraud
  - The U.S. Securities and Exchange Commission charges Neil Cole, former CEO of Iconix
    Brand Group, with accounting fraud. (Reuters)
  - In Miramar, Florida, police pursuing jewel thieves through traffic engage in a
    shootout leaving both perpetrators dead alongside two bystanders (one of whom
    was a UPS driver who had been taken hostage). (Miami New Times)
  - Impeachment inquiry into Donald Trump
  - U.S. House Speaker Nancy Pelosi announces the U.S. House of Representatives will
    begin to draft articles of impeachment against U.S. President Donald Trump before
    the Christmas recess. (The New York Times)
  - 2019 French pension reform strike
  - A national strike begins in France over President Emmanuel Macron's pension reform
    plan. (NPR)
