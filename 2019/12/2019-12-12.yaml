Date: '2019-12-12'
Source_URI: Portal:Current events/2019 December 12
Intelligence_Payload:
  Armed conflict and attacks:
  - 2019 Jersey City shooting
  - The attack on a kosher grocery in Jersey City is officially labeled an act of
    domestic terrorism and antisemitism. (Fox News)
  - A suicide bomber kills seven paramilitary soldiers and wounds three others near
    Samarra, Iraq. (Reuters)
  Disasters and accidents:
  - Russia's only aircraft carrier, the Admiral Kuznetsov, catches fire while docked
    in Murmansk. (Ars Technica)
  International relations:
  - Former President of Bolivia Evo Morales lands in Argentina after being granted
    asylum. Foreign Minister of Argentina Felipe Solá says Morales will receive refugee
    status. (Reuters)
  Law and crime:
  - Sandy Hook Elementary School shooting
  - A trial date has been set for September 2021, after families of the victims sue
    Remington for the "company’s reckless marketing of the Bushmaster AR-15", the
    gun used by the perpetrator in the rampage. (Reuters)
  Politics and elections:
  - Indian Citizenship (Amendment) Bill, 2019
  - As anger over the new citizenship law grows in the Indian states of Assam and
    Tripura, the government calls in the Army to restore peace. Prime Minister Narendra
    Modi appeals for calm. (BBC News)
  - 2019 United Kingdom general election
  - Voters in the United Kingdom go to the polls to elect members to the House of
    Commons in the general election. (BBC News)
  - The exit poll forecasts a Conservative landslide victory with major gains in Northern
    England. Boris Johnson was returned as Prime Minister and formed a majority government.
    (The Guardian)
  - Leader of the Labour Party Jeremy Corbyn announces he will step down as party
    leader following the party's defeat in the general election. (The Telegraph)
  - Leader of the Liberal Democrats Jo Swinson loses her seat in East Dunbartonshire
    to the Scottish National Party. (The Independent)
  - The parliamentary leader of the Northern Irish Democratic Unionist Party (DUP)
    Nigel Dodds loses his seat in Belfast North as Nationalist MPs overtake Unionists
    in Northern Ireland for the first time. (Politics Home)
  - 2019 Algerian protests, 2019 Algerian presidential election
  - Thousands of protesters flood the streets of Algiers to protest the presidential
    election currently underway. As all five candidates have ties to ousted president
    Abdelaziz Bouteflika, protesters call the election a sham and demand that the
    military withdraw its influence from political life. (Al Jazeera)
  - 2020 Israeli legislative election
  - The Israeli parliament votes to dissolve itself and schedules an unprecedented
    third election in a year for 2 March 2020. (The Jerusalem Post)
  - 2019 Chilean protests
  - The impeachment process against President Sebastián Piñera is defeated by 79 votes
    against 73 in the Chamber of Deputies. The impeachment process was initiated after
    several human rights violations have been reported against protestors. (Al Jazeera)
  Science and technology:
  - The U.S. Federal Communications Commission designates 988 as the new phone number
    of the National Suicide Prevention Lifeline. (Associated Press)
