Date: '2019-12-02'
Source_URI: Portal:Current events/2019 December 2
Intelligence_Payload:
  Business and economy:
  - Russia and China inaugurate their joint Power of Siberia gas pipeline. (The Seattle
    Times)
  Disasters and accidents:
  - Thirteen Pakistani nationals, including eight children and four women, have died
    and three others are injured in a fire at a farm in rural Jordan. (BBC News)
  Health and environment:
  - 2019 Samoa measles outbreak
  - Police urge people to respect the curfew. Authorities order that children stay
    at home and announce that Christmas celebrations and public gatherings have been
    cancelled in order to prevent the epidemic from spreading even further. The death
    toll from the outbreak now stands at 53. (RNZ) (Stuff.co.nz) (RNZ2)
  International relations:
  - China–United States relations
  - China bans visits by United States military ships to Hong Kong and sanctions five
    U.S. NGOs, in response to the American Hong Kong Human Rights and Democracy Act
    passed last week. (CNBC)
  - International Atomic Energy Agency approved Rafael Grossi as the new Director
    General. (IAEA)
  Law and crime:
  - A 12-year-old boy is killed and five other people are injured in a deliberate
    hit-and-run crash near a school in Loughton, Essex, United Kingdom. (BBC News)
  - A man shoots himself on the steps of the Alberta Legislature Building in Edmonton,
    Alberta, Canada, causing an early adjournment of the day's question period. The
    individual is pronounced dead at the scene. (Global)
  Politics and elections:
  - Politics of Mauritius
  - The National Assembly of Mauritius elects and sworns in Prithvirajsing Roopun
    as nation's President. (Business Standard)
