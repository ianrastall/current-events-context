Date: '2019-12-06'
Source_URI: Portal:Current events/2019 December 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Iraqi protests
  - Gunmen in vehicles open fire on protesters in Baghdad, killing over 19 and injuring
    around 70 others. Three of the dead were Iraqi police. The victims were either
    stabbed or shot. (AP) (Telegraph) (Al Jazeera)
  - 2019 Kenya bus shooting
  - At least ten people – including seven police officers – are killed when gunmen
    ambush a bus in Kotulo, Kenya. Al-Shabaab claimed responsibility for the attack.
    (Reuters) (Al Jazeera)
  - Naval Air Station Pensacola shooting
  - A shooter kills three people and injures eight more at Naval Air Station Pensacola,
    Florida, United States, before being shot and killed by police. (Pensacola News
    Journal)
  - The shooter was a Saudi national who was being trained at the Naval station. His
    name was later released to be Mohammed Saeed Alshamrani. (CNN)
  - Allied Democratic Forces insurgency
  - Islamists kill 17 civilians in two attacks in eastern Democratic Republic of the
    Congo. (Reuters)
  Disasters and accidents:
  - A collision between a U.S. Navy boat and a U.S. Coast Guard boat in Kodiak, Alaska's
    Womens Bay injures nine, one critically. (Stars & Stripes)
  - A gas explosion and consecutive fire in an apartment building in Prešov, Slovakia
    killed at least seven people and injured dozens. (Deutsche Welle) (The New York
    Times)
  Law and crime:
  - 2019 Samoa measles outbreak
  - Samoan police arrest Edwin Tamasese, an anti-vaccination campaigner, for incitement
    against a government order. (ABC Australia)
  - The United States District Court for the Central District of California rejects
    a US$190 million defamation suit against entrepreneur Elon Musk by Tham Luang
    cave rescuer Vernon Unsworth. The lawsuit, considered to be the first major suit
    by a private individual over comments made on Twitter, was filed over Musk's insulting
    Tweets after Unsworth criticized his role in the rescue. (Reuters)
  Politics and elections:
  - 2019 Dominican general election
  - People in Dominica head to the polls to elect the members of the House of Assembly
    of Dominica. The governing Dominica Labour Party gathers the most votes and stays
    in power for another legislation. (Dominica News Online)
