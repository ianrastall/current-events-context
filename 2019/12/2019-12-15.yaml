Date: '2019-12-15'
Source_URI: Portal:Current events/2019 December 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019–20 Lebanese protests
  - Clashes between protestors and security forces at a protest camp in Beirut leave
    dozens of people injured. (Al Jazeera)
  - Allied Democratic Forces insurgency
  - Twenty-two civilians are killed by Islamist militants in machete attacks in the
    town of Beni, Democratic Republic of the Congo. (Reuters) (DW News)
  - Citizenship (Amendment) Bill protests in India
  - Violent protests against the new citizenship bill break out in Delhi, leaving
    at least six dead. The protestors, numbering in the thousands and containing numerous
    students, were dispersed by police using tear gas and baton charges. The police
    also stormed the campus of Jamia Millia Islamia University to arrest protestors
    fleeing the scene while clashing against students. (Al Jazeera)
  Arts and culture:
  - Censorship in China
  - State broadcaster China Central Television pulls a Premier League match between
    Arsenal and Manchester City from its schedule after Arsenal midfielder Mesut Özil
    criticized China's re-education camps in Xinjang. (The Guardian)
  Disasters and accidents:
  - 2019 Davao del Sur earthquake
  - At least seven people are confirmed dead while 37 more are injured after a magnitude
    6.9 earthquake strikes Matanao, Davao del Sur, in the Philippines. (Sputnik) (AP
    via CBC News)
  - At least ten people are killed by a fire at a fan factory in Gazipur, Bangladesh.
    (Reuters)
  - A bus carrying 32 Hindu pilgrims veers off a highway in central Nepal, killing
    at least 14 people. (Channel News Asia)
  International relations:
  - Libya–Turkey relations, Libyan Civil War (2014–present)
  - Turkey says it is ready to provide military support to the Tripoli-based Government
    of National Accord (GNA) against Khalifa Haftar's forces if requested to do so
    by the GNA. The Grand National Assembly of Turkey approves military intervention
    in Libya. (Reuters) (Al Jazeera)
  Politics and elections:
  - 2019 Hong Kong protests
  - Hong Kong Police Force clash with protesters at different malls across Hong Kong
    amid a visit by Chief Executive Carrie Lam to Beijing. Riot police use pepper
    spray to disperse crowds as a result. (Reuters)
  - 2019 Chilean protests
  - In a non-binding referendum organized by the Chilean Association of Municipalities,
    91% of the voters support a new Constitution and more than 70% of the voters support
    a fully elected constituent assembly to write it. An official referendum will
    be realized in April 2020. (La Tercera)
