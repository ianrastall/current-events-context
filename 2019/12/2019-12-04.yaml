Date: '2019-12-04'
Source_URI: Portal:Current events/2019 December 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Japanese doctor Tetsu Nakamura and five Afghans are killed in Jalalabad, Nangarhar
    Province, Afghanistan when militants open fire on their car while they were travelling
    to monitor a project. (BBC News) (Euronews)
  - Syrian Civil War, Iran–Israel proxy conflict
  - An Iranian Islamic Revolutionary Guard Corps weapons depot in Abu Kamal District,
    Deir ez-Zor Governorate, Syria, is hit by an airstrike. Arab media say Israel
    is behind the attack. The United States denies any involvement. (Ynet) (Haaretz)
  - In Madrid, Spain, a man throws a hand grenade at a migrant unaccompanied minor
    centre, although it did not explode. (The Guardian)
  - Eighteen Indian sailors are abducted near the Nigerian coast. (The Hindu)
  Arts and culture:
  - Gadhimai festival
  - Thousands of animals are sacrificed by beheading at the Hindu Gadhimai Temple
    in southern Nepal. (Reuters)
  - CBS and Viacom cease operations and become ViacomCBS.
  Disasters and accidents:
  - A boat carrying refugees capsized near Nouadhibou, off the coast of Mauritania,
    in one of the deadliest maritime disasters this year, leaving 58 people dead and
    many more who tried to swim to shore in need of treatment. The boat had departed
    The Gambia on 27 November 2019. It was heading towards the Canary Islands when
    it approached the Mauritanian coast to get fuel and food. The boat had been carrying
    between 150–180 people when it capsized, most of them aged between 20 and 30.
    (The Guardian)
  - A gas explosion in Szczyrk, Poland causes a three-story building to collapse and
    kills 8 people (tvn24.pl)
  Health and environment:
  - 2019 Samoa measles outbreak
  - Amid the imposed curfew, the Samoan government asks unvaccinated families to display
    a red flag or red cloth in front of their homes to warn others and to aid mass
    vaccination efforts as the death toll hits 60 and confirmed cases surpass 4,000.
    (Deutsche Welle)
  International relations:
  - Japan–United States relations
  - The National Diet of Japan ratifies a United States–Japan trade deal. Under the
    deal, Japan will reduce its tariffs on U.S. beef and pork; in return, Japan will
    receive reductions in tariffs on certain manufactured goods. (Financial Times)
  - Iran–United States relations, Iran and weapons of mass destruction
  - The Pentagon says the United States Navy's USS Forrest Sherman (DDG-98) intercepted
    a vessel in the Arabian Sea last month and seized advanced missile parts that
    were of Iranian origin. The crew were handed over to the Yemen Coast Guard, while
    the missile parts are in the possession of the United States military. (Reuters)
  Law and crime:
  - Crime in Hawaii
  - The U.S. military says a sailor shot and killed two people at Joint Base Pearl
    Harbor–Hickam, Hawaii, before killing himself. (UPI)
  - Impeachment inquiry into Donald Trump
  - The U.S. House Judiciary Committee begins its hearings into the impeachment inquiry
    of U.S. President Donald Trump. (The New York Times)
  - Nunes v. CNN
  - U.S. Rep. Devin Nunes files a US$435 million defamation lawsuit against CNN. (USA
    Today)
