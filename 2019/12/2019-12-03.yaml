Date: '2019-12-03'
Source_URI: Portal:Current events/2019 December 3
Intelligence_Payload:
  Business and economy:
  - Google co-founders Larry Page and Sergey Brin announce they are stepping down
    as CEO and president respectively from the company. Sundar Pichai will become
    the new CEO of Google and its parent company Alphabet Inc. effective immediately.
    (ABC News)
  Disasters and accidents:
  - An explosion at a ceramic factory in the Sudanese capital, Khartoum, kills at
    least 16 people and leaves dozens injured, according to the Sudanese Professionals
    Association. (Gulf News)
  Health and environment:
  - 2019 Samoa measles outbreak
  - The government makes it illegal to make non-essential domestic travel on the roads
    while vaccination units cross the country with 40,000 still to be vaccinated.
    Also, the opposition calls for an inquiry into the low vaccination rates which
    began after a mistake by two nurses last year which resulted in the deaths of
    two children. (RNZ)
  International relations:
  - 2019 London summit
  - World leaders from members of NATO gather for their annual summit in Watford,
    Hertfordshire, England. (Time)
  Law and crime:
  - Pakistani business tycoon Malik Riaz agrees to surrender £190 million in cash
    and assets to the United Kingdom's National Crime Agency, including his Grade
    II listed-London home in One Hyde Park. The NCA accuses the tycoon of acquiring
    his wealth and property through crime. (Sky News)
  - The Federal Supreme Court of Switzerland upholds a 2018 ruling that the Liberation
    Tigers of Tamil Eelam is not a criminal group. Even though it carried out terrorist
    attacks, the Tamil Tigers' primary objective in the Sri Lankan Civil War was,
    according to the court, to be recognised as an independent ethnic community. (swissinfo.com)
  - Impeachment inquiry into Donald Trump
  - The U.S. House Intelligence Committee releases a 300-page report of its impeachment
    inquiry saying there is "overwhelming" evidence of misconduct and obstruction
    of Congress by U.S. President Donald Trump. It is sent to the U.S. House Judiciary
    Committee for review. (CNN)
  Politics and elections:
  - Politics of Finland
  - Antti Rinne resigns as the Prime Minister of Finland after losing the support
    of coalition partner Centre Party over Rinne's handling of industrial strikes.
    The Rinne Cabinet will continue as a caretaker government until a new government
    can be formed. (Reuters)
  - 2020 Democratic Party presidential primaries
  - California Senator Kamala Harris drops out of the presidential race, citing a
    lack of funds for her campaign. (NPR)
