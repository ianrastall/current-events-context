Date: '2019-12-29'
Source_URI: Portal:Current events/2019 December 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Security Belt forces say a missile fired by the Houthis hit a military parade
    in the southern separatist-held town of al-Dhalea, killing at least five people
    and injuring others. There are no claims of responsibility for the attack. (Reuters)
  - War in Donbass
  - The Ukrainian government and separatist rebels exchange prisoners according to
    the "all identified for all identified" formula agreed upon during peace talks
    in Paris earlier this month. (NBC)
  - War in Afghanistan (2001–2021)
  - Local officials say Taliban have killed 17 local militiamen in an attack on their
    base in Khwaja Bahauddin District, Takhar Province. A Taliban spokesman says they
    killed 21 gunmen. The Taliban propose a 7 to 10-day nationwide ceasefire, after
    which a peace deal with the United States would be signed. (Al Jazeera)
  - 2019 United States bombing of Kata'ib Hizbollah
  - The United States Air Force carries out strikes using F-15E Strike Eagle jets
    and drones in Iraq and Syria in retaliation for the death of an American civil
    contractor in a rocket attack on K-1 Air Base in Kirkuk Governorate. The strikes
    were targeted at the Iranian-backed Kata'ib Hezbollah militia group. A spokesman
    for Kata'ib Hezbollah, says 19 of its fighters were killed and 35 injured in the
    American strikes, while vowing to respond. (Reuters) (France 24) (The Washington
    Post)
  - Iraqi Prime Minister Adil Abdul-Mahdi condemns the unilateral American bombings
    inside Iraq, saying the U.S. strikes are a "violation of Iraqi sovereignty", and
    a "dangerous escalation that threatens the security of Iraq and the region." (USA
    Today)
  - Iran warns of consequences after the airstrikes. The Iranian Foreign Ministry
    spokesman Abbas Mousavi stated it was "illegal" and "the United States must accept
    responsibility of the attack." (CNN)
  - Terrorism in Russia
  - Following a tip-off from the United States, Russia arrests two men planning a
    New Year's Eve attack in the city of Saint Petersburg. (Sky News)
  - Somali Civil War (2009–present)
  - The death toll of the attack in Mogadishu the previous day rises to 84 with over
    25 others remaining missing. (Xinhua)
  - The United States target Al-Shabaab in a series of airstrikes that killed four.
    The strikes were in coordination with the government of Somalia. (DW News)
  Arts and culture:
  - The world's oldest rhinoceros, Fausta, dies in Tanzania at the age of 57. (BBC
    News)
  Business and economics:
  - Citizenship Amendment Act protests
  - The Indian tourism industry reports that, as a result of protests, December visits
    to the Taj Mahal and the state of Assam declined by 60% and 90% respectively compared
    to the same period last year. These declines are also occurring in the midst of
    general economic slowdown in the country. (Reuters)
  - Over 19 flights are cancelled as a three-day strike at Lisbon Airport comes to
    an end. The strike was instigated when airport owner Vinci refused to unfreeze
    wages for the employees. (Reuters)
  - Ghanaian President Nana Akufo-Addo announces his country will adopt the eco as
    its new currency, but insists to fellow members of the currency union that it
    should not be pegged to the euro. (Reuters)
  Disasters and accidents:
  - An official at Bangladesh's health directorate says at least 50 people have died
    of cold-related illnesses in December. A cold wave sweeps through the country,
    with a lowest recorded temperature of . (Thomson Reuters via CBC)
  Health and environment:
  - 2019 Samoa measles outbreak
  - The Samoan government lifts its six-week state of emergency after a mass immunization
    campaign against measles reduced the death and infection rates. (Al Jazeera)
  Law and crime:
  - West Freeway Church of Christ shooting
  - A man kills two people and injures another at a church in White Settlement, Texas,
    United States before being killed by a security guard and a civilian. (ABC News)
    (BBC News)
  Politics and elections:
  - 2019 Guinea-Bissau presidential election
  - Citizens of Guinea-Bissau head to the polls in the second round of the country's
    latest presidential election. (Reuters)
