Date: '2019-12-07'
Source_URI: Portal:Current events/2019 December 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Iraqi protests
  - A drone attacks the home of prominent Shia cleric Muqtada al-Sadr, leaving no
    casualties and causing minimal damage. The attack follows yesterday's incident
    in Baghdad when multiple protesters were fired upon and killed. (Reuters)
  - Afghan peace process
  - The Taliban announce that the peace talks with the United States resumed "from
    where they stopped" in September. (CNN)
  Disasters and accidents:
  - 2018–19 Southern Africa drought
  - An unprecedented drought in Zimbabwe, considered the worst in a century, causes
    the Victoria Falls waterfall on the Zambezi river to nearly stop flowing. (The
    Guardian)
  - A woman is killed and 18 other people injured when a bus crashes with a truck
    in Milan, Italy. (Ansa)
  International relations:
  - Iran–United States relations
  - In an act of cooperation that is rare in recent years, Iran releases Princeton
    PhD candidate Wang Xiyue while the United States releases stem cell researcher
    Massoud Soleimani in a prisoner exchange. Both U.S. President Donald Trump and
    Iranian Foreign Minister Mohammad Javad Zarif thank the Swiss government for facilitating
    the swap. (Reuters)
  Law and crime:
  - Rohingya genocide
  - Myanmar's Aung San Suu Kyi travels to The Hague where she is expected to face
    genocide charges against her government for the alleged crimes committed against
    the Rohingya Muslim minority, in what is described as one of the most-high profile
    international legal cases in a generation. (The Telegraph)
  - Two indigenous leaders from the Guajajara tribe are shot dead in a drive-by shooting
    on a federal highway in Brazil's Maranhão state. (The Guardian)
