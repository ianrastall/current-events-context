Date: '2019-04-20'
Source_URI: Portal:Current events/2019 April 20
Intelligence_Payload:
  Armed conflict and attacks:
  - War in Afghanistan (2001–2021)
  - In Kabul, seven are killed after suicide bombers and gunmen attack the communications
    ministry. (BBC News)
  - Syrian Civil War
  - ISIL militants kill 50 Syrian soldiers in two days of clashes in the Syrian desert.
    (Al Jazeera)
  Arts and culture:
  - Bangladesh celebrates Easter as national holiday for first time in 30 years. The
    South Asian nation of 159 million is 89% Muslim and 10% Hindu. Pope Francis made
    an apostolic journey to Myanmar and Bangladesh in 2017. (Vatican News)
  Politics and elections:
  - 2019 Egyptian constitutional referendum, Arab Winter
  - Egyptians vote on a number of amendments to the Constitution of Egypt, which,
    among other things, allow President Abdel Fattah el-Sisi to remain in power until
    2030, increase the president's powers over Egypt's judiciary, and increase the
    power of Egypt's military over all other state institutions. The vote takes place
    over three days from 20 to 22 April. (AP News)
