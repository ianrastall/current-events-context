Date: '2019-04-05'
Source_URI: Portal:Current events/2019 April 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, 2019 Western Libya Offensive
  - Libyan National Army troops reach the outskirts of the Libyan capital Tripoli,
    securing a key military checkpoint known as "Bridge 27". (AFP)
  - The LNA captures several more towns in the Tripoli District, including Qasr bin
    Ghashir, Wadi Rabie and Suq al-Khamis, as well as the town of ‘Aziziya in the
    Jafara District, to the west of Tripoli. (Reuters) (The Economist)
  - LNA forces say they have seized control of Tripoli International Airport. (Reuters)
  - The United States, United Kingdom, France, and Italy issue a joint statement calling
    on Field Marshal Khalifa Haftar to end the offensive. (Euronews)
  Disasters and accidents:
  - Boeing 737 MAX groundings, Ethiopian Airlines Flight 302
  - The CEO for Boeing, Dennis Muilenburg, apologizes for the loss of lives in the
    two 737 MAX accidents, recognizing the role that the MCAS system played in the
    disasters. (Washington Post)
  Health and environment:
  - The U.S Centers for Disease Control and Prevention reports the source of E. coli
    O103, that has infected 72 people in five states, has not been identified. Bill
    Marler, a food safety lawyer in Seattle, notes this O103 outbreak is by far the
    largest in recent memory. (The Washington Post via MSN.com)
  Law and crime:
  - Julian Assange's asylum at the Ecuadorian embassy, INA Papers
  - WikiLeaks says that a high-level source within the government of Ecuador has informed
    them that Julian Assange will be expelled within "hours to days" and that Ecuador's
    government already has an agreement with the UK for his arrest. On April 2, 2019,
    Ecuadorian President Lenín Moreno accused WikiLeaks of leaking the INA Papers,
    a set of documents published in February 2019 which uncover the operations of
    INA Investment Corp, an offshore tax haven created by the brother of President
    Moreno and allegedly reveal government corruption. (WikiLeaks) (Al Jazeera)
  - A 29-year-old man is charged with five counts of attempted murder after stabbing
    five people in "random attacks", including four people in a 10-hour period on
    March 30, in Edmonton, London. (BBC News)
  - An inquest finds that Jennifer and Sarah Hart intentionally killed themselves.
    In 2018, a vehicle with the couple and their six adopted children drove off a
    cliff in California, killing all of them. (MSN.com)
  Science and technology:
  - A small 5-200 kilometer planetesimal, with a similar mineral composition to Earth,
    is found orbiting in the debris disk of a white dwarf star. This discovery is
    among the first of its kind and expected to provide insight into the future of
    our own planetary system. (Astronomy.com)
  - JAXA space probe Hayabusa2 successfully fires a bullet at Apollo asteroid 162173
    Ryugu, forming a crater which will be used to collect underground samples. (AP)
