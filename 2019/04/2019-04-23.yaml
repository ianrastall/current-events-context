Date: '2019-04-23'
Source_URI: Portal:Current events/2019 April 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Sri Lanka Easter bombings
  - ISIL claims responsibility for the bombings in Sri Lanka that took place on Easter
    Sunday. (The New York Times)
  - Sri Lankan investigators believe that the bombings were revenge for attacks on
    New Zealand mosques in March. (Reuters)
  Business and economy:
  - The Federal Aviation Administration (FAA) certifies Alphabet Inc.-owned delivery
    drone service Wing to operate as an airline in the United States. Wing is the
    first delivery drone company to receive FAA air carrier certification. (Reuters)
    (NPR)
  Disasters and accidents:
  - 2019 Visayas earthquake
  - A magnitude 6.5 earthquake strikes the islands of Visayas in the Philippines at
    13:37 Philippine Standard Time. (ABS-CBN News)
  - According to PHIVOLCS, the epicenter of the earthquake is located northwest of
    San Julian, Eastern Samar. PHIVOLCS originally records the earthquake, which is
    tectonic in origin, at magnitude 6.2, but later upgrades it to 6.5. (The Philippine
    Star)
  - The earthquake happened less than 24 hours after the 6.1 magnitude earthquake
    that struck Luzon. (ABS-CBN News)
  - A mudslide at a jade mine in Hpakant, Kachin State, northern Myanmar caused by
    the collapse of a nearby lake kills three miners and leaves 51 missing. (CNN)
  International relations:
  - North Korea–Russia relations
  - Korean Central News Agency confirms North Korean leader Kim Jong-un will soon
    visit Russia for a summit with Russian President Vladimir Putin. (Reuters)
  - Canada–Philippines relations
  - Philippine President Rodrigo Duterte insists Canada remove tons of mislabeled,
    misdirected trash from Manila that arrived in 2013 and 2014. Duterte threatens
    to retaliate, up to declaring war, if the trash is not removed. (NPR)
  Law and crime:
  - Murder of Karina Vetrano
  - In the United States, Chanel Lewis is sentenced to life in prison without the
    possibility of parole for the 2016 murder of Karina Vetrano while she was running
    in Queens, New York City. The judge had earlier declined the defense's motion
    of a re-trial due to what they alleged to be police and juror misconduct. (ABC)
  - Eight pedestrians in Sunnyvale, California, are injured when a car is intentionally
    driven into them. The driver is arrested after crashing into a tree. The FBI is
    assisting in the investigation. (NBC News)
  Politics and elections:
  - 2019 Prince Edward Island general election and electoral reform referendum
  - The Progressive Conservative Party of Prince Edward Island wins its first minority
    government since the Island's 1890 general election; while the Green Party of
    Prince Edward Island has beaten the Prince Edward Island Liberal Party by taking
    most of all their seats and becoming the province's new Official Opposition party,
    a first for any Green Party in North America. (The Epoch Times) (The Guardian)
    Voters also reject adopting mixed-member proportional representation as the province's
    election system in a referendum held simultaneously with the election. (The Guardian)
  Science and technology:
  - Exploration of Mars
  - NASA reports the first detection of a likely Marsquake by the InSight Mars lander.
    (News18) (NASA)
