Date: '2019-04-09'
Source_URI: Portal:Current events/2019 April 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, 2019 Western Libya offensive
  - The UN cancels a planned Libyan National Conference that was due to take place
    later in April for negotiations between different political factions to organise
    new elections due to the ongoing fighting in Tripoli. (The Guardian)
  - Sinai insurgency
  - A 15-year-old suicide bomber attacks a market in Sheikh Zuweid, Egypt, killing
    four policemen and three civilians, and injuring 27 others. (Xinhua)
  - 2018–19 Sudanese protests
  - Heavy gunfire is reported in the Sudanese capital Khartoum as Rapid Support Forces
    loyal to President Omar al-Bashir attempted to break-up an anti-government protest
    outside the military's headquarters, killing at least 14 people, including five
    Sudanese soldiers who defected to the opposition. (Sky News)
  Business and economy:
  - Debenhams, one of the largest department stores in the United Kingdom which employs
    25,000 people, collapses into administration. (The Guardian)
  - Alcon has completed a 100% spin-off from Novartis. (PharmaTimes) (Reuters)
  Disasters and accidents:
  - A Japan Air Self-Defense Force F-35 Lightning II jet disappears from radar while
    on a training mission over the Pacific Ocean. Japanese Defense Minister Takeshi
    Iwaya subsequently grounds Japan's fleet of F-35s. (CBS News)
  Law and crime:
  - 2019 college admissions bribery scandal
  - 16 people are indicted on new charges in the nationwide college admissions cheating
    scandal, one day after it was announced that 13 of the defendants charged in the
    case would plead guilty for conspiracy. (The Boston Globe) (The New York Times)
  Politics and elections:
  - 2019 Israeli legislative election
  - Israelis go to the polls to elect the new members of the Knesset (Israel's parliament)
    and a new Prime Minister. (Reuters)
  - 2019 Venezuelan presidential crisis
  - The Organization of American States votes 18 to 9, with six abstentions, to accept
    Gustavo Tarre Briceño as the ambassador from Venezuela. Tarre is the envoy from
    Juan Guaidó's government; Nicolás Maduro's Foreign Ministry calls Tarre a "political
    usurper". (Washington Post)
