Date: '2019-04-24'
Source_URI: Portal:Current events/2019 April 24
Intelligence_Payload:
  Disasters and accidents:
  - Floods and mudslides in the South African city of Durban and the wider KwaZulu-Natal
    province have killed at least 60 people. (BBC News)
  - Police evacuate 148 homes in Sokndal, Norway. Wildfires have burned through about
    7.5 square kilometers (2.9 sq. miles) of land in the area. A spokesperson for
    the European Union Forest Fire Information System says wildfires in northern Europe
    "are way above the average" for this time of year. (BBC News)
  International relations:
  - North Korea–Russia relations
  - North Korean leader Kim Jong-un arrives by train in Vladivostok, Russia, for his
    first talks with Russian President Vladimir Putin, expected to start Thursday.
    (BBC News)
  Law and crime:
  - 2019 Guatemalan general election
  - A judge in Miami orders the arrest of Guatemalan presidential candidate Roberto
    Arzú. Arzú is the second presidential candidate who has had legal problems with
    the United States. (Prensa Libre)
  - Murder of James Byrd Jr.
  - John William King is executed by lethal injection by the state of Texas, 21 years
    after the murder of James Byrd Jr., for which he was sentenced. (Reuters)
  - Illinois Governor J. B. Pritzker is investigated federally for a property tax
    break that netted him $331,000 in tax relief by taking toilets out of a Chicago
    mansion he owns. Pritzker stated he has "no concerns" about the report. (Washington
    Post) (Governing) (Washington Times)
  Politics and elections:
  - Asia Press reports that North Korean leader Kim Jong-un ordered the execution
    by firing squad of four foreign ministry officials following the failure of his
    February Hanoi summit with U.S. President Donald Trump, after accusing them of
    "selling information to the U.S." before the summit. (Yahoo! News)
