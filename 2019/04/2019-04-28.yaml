Date: '2019-04-28'
Source_URI: Portal:Current events/2019 April 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Six people are killed when terrorists storm a church in the Soum Province, Burkina
    Faso. The victims are the pastor, two of his sons and three other worshippers.
    (BBC News)
  Disasters and accidents:
  - 272 election workers in Indonesia die, mostly of fatigue-related illnesses, caused
    by long hours of work counting millions of ballot papers by hand. 1,878 other
    staff fall ill. (BBC News)
  Law and crime:
  - Crime in Tennessee
  - Seven people are found dead in Sumner County, Tennessee. The suspect, Michael
    Cummins, is in police custody. (WFTS)
  - Crime in Ohio
  - Four family members, three women and one man, were found shot to death in an apartment
    in West Chester Township, Ohio. The suspect remains at large. (NBC News)
  Politics and elections:
  - 2019 Spanish general election
  - Spaniards go to the polls to elect all 350 members of the Congress of Deputies
    and 208 (of 266) seats in the Senate. (CNN)
  - The governing social democrat Spanish Socialist Workers' Party (PSOE) wins, but
    short of an absolute majority. The far-right Vox party finished fifth with 10%
    of the votes. (CBC) (El País)
  - The Valencian regional election is held concurrently. The ruling left-wing alliance
    led by PSPV-PSOE wins a majority. (El Pais)
