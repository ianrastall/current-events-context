Date: '2019-04-27'
Source_URI: Portal:Current events/2019 April 27
Intelligence_Payload:
  Arts and culture:
  - The official video for Taylor Swift's "Me!", which premiered Thursday night, breaks
    Vevo's record for the biggest debut of all time, with at least 56.9 million views
    in 24 hours. (The Hollywood Reporter)
  Disasters and accidents:
  - Seattle crane collapse
  - A construction crane in the South Lake Union of Seattle collapses onto Mercer
    Street, killing four people. (The Seattle Times)
  Law and crime:
  - Poway synagogue shooting
  - One person is killed and multiple people are wounded in a shooting that occurred
    at a synagogue in Poway, California. (CNN)
  - John Earnest, a 19-year-old student at California State University, San Marcos,
    is arrested after Poway synagogue shooting. (VOA News)
  - Oliver North steps down as president of the National Rifle Association as New
    York attorney general Letitia James opens an investigation against the NRA. (Business
    Insider) (Vox)
