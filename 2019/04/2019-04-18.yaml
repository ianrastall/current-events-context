Date: '2019-04-18'
Source_URI: Portal:Current events/2019 April 18
Intelligence_Payload:
  Armed conflict and attacks:
  - 2019 Makran massacre
  - 14 people are killed in a gun attack on a bus in Pakistan. (CNN)
  Disasters and accidents:
  - At least 13 people are killed and 29 others are injured when a wall collapses
    in Empangeni, South Africa, at the start of an Easter service at a Pentecostal
    church. (BBC News)
  - Mountain climbers Jess Roskelley, David Lama and Hansjörg Auer are suspected dead
    after an avalanche on Howse Peak in Canada's Banff National Park. (MSN.com)
  Law and crime:
  - Dissident Irish Republican campaign
  - Northern Irish journalist Lyra McKee is shot dead by dissident republicans on
    the Creggan estate in Derry. (The Irish News)
  - The Royal Thai Navy is planning to remove a house that was allegedly constructed
    illegally off the Thai coastline to promote seasteading. The owners had planned
    to start a community of at least 20 houses in the area. Thai authorities have
    filed a complaint, which if prosecuted could carry a death sentence for "threatening
    the sovereignty of a state, and erosion of a state's independence". (Time via
    MSN)
  - Aftermath of the Bishop International Airport attack
  - Amor Ftouhi is sentenced to life in prison for stabbing a police officer at Bishop
    International Airport in Flint, Michigan, United States, in June 2017. (MLive)
  Politics and elections:
  - Mueller special counsel investigation, Russian interference in the 2016 United
    States elections
  - The redacted version of the report by Special Counsel Robert Mueller is released
    by U.S. Attorney General William Barr. The investigation did not find any conspiracy
    between President Donald Trump and the Russian government regarding the accusation
    that they collaborated to win the 2016 presidential election. The report did not
    rule out if the Trump administration committed obstruction of justice. The Department
    of Justice also stated some members of Congress will receive a less-redacted version
    of the report in the near future. (The New York Times) (USA Today)
  - Mali's Prime Minister Soumeylou Boubèye Maïga and his entire cabinet resigns,
    being succeeded by Boubou Cisse. No reason is addressed. (CNN)
