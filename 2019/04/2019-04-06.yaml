Date: '2019-04-06'
Source_URI: Portal:Current events/2019 April 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, 2019 Western Libya offensive
  - Militias loyal to the internationally-recognised Government of National Accord
    launch a counterattack on Libyan National Army troops in the southern outskirts
    of Tripoli. (The Washington Post)
  - Libyan National Army Field Marshal Khalifa Haftar declares a no-fly zone for military
    aircraft over western Libya, after LNA forces were targeted by airstrikes from
    GNA warplanes that took off from Misrata Airport. (Al Arabiya)
  Business and economy:
  - South Korea's Hyundai Motor reaches an agreement with Tencent to partner on research
    and development of self-driving cars. Hyundai plans to roll such cars out commercially
    by 2030. (Reuters)
  Law and crime:
  - European migrant crisis
  - Greek riot police clash with hundreds of migrants near the Diavata refugee camp,
    attempting to enter North Macedonia, after rumours were circulated on social media
    that the border would be open. (Reuters)
  Politics and elections:
  - 2019 Maldivian parliamentary election
  - Voters are called to the polls to elect the new members of the People's Majlis.
    Preliminary results give the victory to Maldivian Democratic Party, led by former
    President Mohamed Nasheed. (The Washington Post) (BBC News)
