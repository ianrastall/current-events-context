Date: '2019-04-26'
Source_URI: Portal:Current events/2019 April 26
Intelligence_Payload:
  Arts and culture:
  - Pope Francis meets with Milorad Dodik, head of the joint presidency of Bosnia-Herzegovina.
    They discuss bilateral relations, the presence of the Catholic community, coexistence
    and reconciliation, and the economic and social challenges facing Bosnia and Herzegovina.
    (Vatican Press Office)
  Disasters and accidents:
  - A large methane explosion at a coal mine in the self-proclaimed Luhansk People's
    Republic in eastern Ukraine leaves 17 miners dead. (UrduPoint)
  Law and crime:
  - Miami native Todd Leininger is released from a Venezuelan prison after being detained
    for five years for allegedly aiding the opposition. (CBS News) (Miami Herald)
  Politics and elections:
  - U.S. President Donald Trump announces at an NRA meeting that he will be withdrawing
    the country's signature from the Arms Trade Treaty. (CTV News)
  Sports:
  - 2019 NFL season
  - The Kansas City Chiefs suspend wide receiver and return specialist Tyreek Hill
    from team activities for an alleged child abuse case. (Sporting News) (Houston
    Chronicle)
