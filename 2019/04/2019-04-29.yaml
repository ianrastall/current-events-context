Date: '2019-04-29'
Source_URI: Portal:Current events/2019 April 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - A propaganda video featuring Islamic State of Iraq and the Levant leader Abu Bakr
    al-Baghdadi is released, in which he references the 2019 Sri Lanka Easter bombings,
    indicating that he is still alive and that the video was shot very recently. It
    is the first time he's been seen on video since July 2014, when he addressed a
    crowd at the now destroyed Great Mosque of al-Nuri in Mosul. (Al Jazeera)
  - Syrian Civil War
  - Hayat Tahrir al-Sham (HTS) militants assault several Syrian Army positions in
    the northern Aleppo Governorate, killing 17 soldiers and wounding 30 others. HTS
    say the attacks were in response to recent Syrian government and Russian airstrikes
    on rebel-held areas. (Al Jazeera)
  - Terrorism in the United States
  - A US Army veteran was planning to bomb a white nationalist rally in retribution
    for the shooting in New Zealand. He was also planning attacks on Jews. (BBC News)
    (CNN)
  Arts and culture:
  - 'Avengers: Endgame breaks numerous box office records, including the biggest opening
    weekend in cinematic history, grossing over $1 billion worldwide. (The Guardian)'
  Disasters and accidents:
  - Cyclone Kenneth
  - The death toll in cyclone-hit northern Mozambique has risen to 38, as aid workers
    struggle to reach the worst-affected areas. Seven people were also killed by the
    cyclone in Comoros. (BBC News) (ReliefWeb)
  - Floods sparked by torrential rains have killed 31 people in Indonesia while 13
    others are missing. (Bangkok Post)
  - North Carolina authorities have ordered evacuations covering a half-mile radius
    because of air quality, possibly including harmful sulfuric acid, from a massive
    fire at a metal recycling plant in Mooresboro. Officials say the blaze has been
    extinguished, as of 7:15 a.m. (BBC News)
  - A minibus carrying Turkish Süper Lig Alanyaspor football players crashes near
    Alanya, Turkey, resulting in the death of Czech Republic national football team
    international Josef Šural, while several other players are seriously injured.
    (The Guardian)
  Politics and elections:
  - Indonesian President Joko Widodo has decided to relocate the nation's capital
    from Jakarta, on the northwest coast of Java island. The new location and timing
    are not yet known. Jakarta, home to over 10 million people, is sinking at one
    of the fastest rates in the world; almost half of its area is below sea level.
    (BBC News) (NPR)
  - U.S. Deputy Attorney General Rod Rosenstein announces he will resign, effective
    May 11. (The Washington Post)
