Date: '2019-04-14'
Source_URI: Portal:Current events/2019 April 14
Intelligence_Payload:
  Disasters and accidents:
  - Tornadoes of 2019
  - At least eight people are killed in the Southern United States amid severe storms
    bringing floods and tornadoes. (ABC News)
  International relations:
  - Second Libyan Civil War
  - Field Marshal Khalifa Haftar of the LNA visits Cairo for a meeting with Egyptian
    President Abdel Fattah el-Sisi, who has supported the LNA in its military operation
    against the rival GNA in Tripoli. (The Guardian)
  Law and crime:
  - Two people are dead, and two others were wounded in a drive-by shooting outside
    a nightclub in Melbourne, Australia. (News.com.au)
  - One person is killed and another injured in a shooting in a church in the British
    Columbia city of Salmon Arm. The suspected shooter was wrestled to the ground
    by churchgoers, police say. (CBC)
  Politics and elections:
  - 2019 Finnish parliamentary election
  - Social Democratic Party takes a narrow victory with 40 seats, while Finns Party
    comes close second with 39 seats. (Yle)
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries,
    Pete Buttigieg 2020 presidential campaign
  - Pete Buttigieg, Mayor of South Bend, Indiana, announces he is running for the
    Democratic Party's nomination to be President of the United States in the 2020
    presidential election. (NBC News)
  Sports:
  - 2019 Masters Tournament
  - Tiger Woods wins the Masters Tournament in Augusta, Georgia, his first major golf
    win in 11 years and his first win at the Masters since 2005. (WGHP) (The New York
    Times)
