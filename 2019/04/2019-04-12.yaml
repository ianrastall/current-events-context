Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Quetta bombing
  - Twenty-one people are killed and about fifty others injured in a suicide bombing
    at a market in Quetta, Pakistan. (CNN)
  - 2018–19 Sudanese protests, 2019 Sudanese coup d'état
  - Lt. General Ahmed Awad Ibn Auf steps down as leader of the Transitional Military
    Council in favor of Lt. General Abdel Fattah Abdelrahman Burhan. (BBC News)
  - Russian security services kill two ISIL-affiliated terrorists who were planning
    an attack in the city of Tyumen. (RT)
  - 2019 Mall of America murder attempt
  Disasters and accidents:
  - Two buildings collapse in Rio de Janeiro, Brazil, killing nine people and leaving
    fifteen others missing. The buildings were irregularly built. (G1)
  Politics and elections:
  - Abortion in the United States
  - Ohio Governor Mike DeWine signs a bill that restricts abortion after a detectable
    heartbeat. The American Civil Liberties Union of Ohio said it was preparing a
    constitutional challenge to the law. (ABC News)
