Date: '2019-04-15'
Source_URI: Portal:Current events/2019 April 15
Intelligence_Payload:
  Arts and culture:
  - 2019 Pulitzer Prize
  - Annapolis, Maryland daily newspaper The Capital is awarded a Pulitzer Prize for
    its coverage of a mass shooting inside its own offices on June 28, 2018, that
    left five of its employees dead. (BBC News)
  Business and economy:
  - AT&T Inc. sells its 10% stake in Hulu to Hulu LLC for $1.43 billion. (Variety)
  Disasters and accidents:
  - Notre-Dame de Paris fire
  - A fire breaks out at the Notre-Dame de Paris cathedral in Paris, resulting in
    the collapse of its roof and spire and considerable damage to the building's interior.
    (AJC) (BBC)
  - French President Emmanuel Macron pledges to rebuild the Cathedral after the fire.
    (BBC News)
  International relations:
  - Inter-Korean summits, North Korea–South Korea relations
  - South Korean President Moon Jae-in says he is ready for a fourth summit with North
    Korean leader Kim Jong-un. The 2019 inter-Korean summit will be held in South
    Korean capital of Seoul. (Time) (SFGate)
  Law and crime:
  - Four people are killed in a string of shootings in Penticton, British Columbia,
    in what police are calling targeted killings. A man later turned himself in and
    was taken into custody. (CBC News)
  Politics and elections:
  - 2020 United States presidential election, 2020 Republican Party presidential primaries,
    Bill Weld 2020 presidential campaign
  - Former Massachusetts Governor Bill Weld announces he is running for the Republican
    Party's nomination to be President of the United States in the 2020 presidential
    election, the first Republican to officially challenge incumbent President Donald
    Trump. (CNN)
