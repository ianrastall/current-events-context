Date: '2019-04-13'
Source_URI: Portal:Current events/2019 April 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, 2019 Western Libya offensive
  - Aguila Saleh, the chairman of the Tobruk-based Libyan parliament that rivals the
    Government of National Accord, stated that the parliament's Libyan National Army
    will continue advancing on Tripoli in spite of international calls for them to
    stop the offensive. (Reuters)
  Health and environment:
  - The last known female Yangtze giant softshell turtle, the world's largest species
    of freshwater turtle and one of the most endangered species on the planet, dies
    at Suzhou Zoo in China. (Sohu.com)
  Science and technology:
  - Scaled Composites Stratolaunch, an aircraft with the largest wingspan ever to
    fly, makes its maiden flight over California, United States. (BBC News)
