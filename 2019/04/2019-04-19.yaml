Date: '2019-04-19'
Source_URI: Portal:Current events/2019 April 19
Intelligence_Payload:
  Disasters and accidents:
  - A house deck collapses in Langley, British Columbia, Canada, injuring 40 people,
    20 of them severely. (Global News)
  International relations:
  - 2019 Western Libya offensive, Libya–United States relations
  - The White House says President Donald Trump has spoken to Libyan Field Marshal
    Khalifa Haftar about recent developments in Libya. During the call, Trump recognised
    Haftar's efforts to combat Islamic terrorism and secure Libya's oil reserves.
    (BBC News)
  - Russia and the United States veto a British-sponsored United Nations Security
    Council resolution calling for a ceasefire between the Libyan National Army and
    forces loyal to the Tripoli-based Government of National Accord. (The Moscow Times)
  Law and crime:
  - Minatitlán shooting
  - A mass shooting at a bar in Minatitlán, Veracruz, kills 13 people and injures
    4 others. (Reuters)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - Media reports indicate former United States Vice President and Senator Joe Biden
    has decided that next week he will announce his participation in the race for
    Democratic Party's nomination in the 2020 United States presidential election.
    (The Atlantic) (NBC News)
  - Mueller special counsel investigation, Russian interference in the 2016 United
    States elections
  - House Judiciary Chairman Jerry Nadler issues a subpoena to the Justice Department
    for, by May 1, the full, unredacted version of the Mueller report, and for the
    underlying grand jury evidence and testimony. Attorney General William Barr's
    offer to allow committee members a chance to view a less-redacted version of the
    report does not meet the committee's needs and was not accepted. (Politico)
