Date: '2019-04-02'
Source_URI: Portal:Current events/2019 April 2
Intelligence_Payload:
  Business and economy:
  - Google starts deleting consumer accounts from its social network Google+ due to
    low user engagement and the discovery of security vulnerabilities which potentially
    exposed user data to developers. (The Verge)
  Disasters and accidents:
  - Boeing 737 MAX groundings
  - Boeing delays the availability of the software update for its 737 Max airliners.
    The Federal Aviation Administration anticipates the update to be rolled out "in
    the coming weeks." (CBC)
  International relations:
  - Russia–Venezuela relations
  - Russia opens a helicopter training facility in Venezuela. Under the plans, Russian
    state-owned Rostec will train Venezuelan pilots to operate Mi-35M gunships and
    transport helicopters. The move comes after the White House warned Moscow against
    sending troops or military equipment to the country. (Reuters)
  Law and crime:
  - According to a criminal complaint filed in a U.S. District Court, a Chinese woman
    is arrested and charged with making a false statement to the United States Secret
    Service after illegally entering U.S. President Donald Trump's Mar-a-Lago resort
    in Florida on 30 March 2019 while carrying multiple passports, four mobile phones
    and a thumb drive containing malware. (BBC News) (Reuters)
  - Eric Holder (not to be confused with the former U.S. Attorney General of the same
    name) is arrested and charged with the murder of rapper Nipsey Hussle. (The Washington
    Post)
  - Peruvian authorities investigate the death of British De La Salle Brother Paul
    McAuley, age 71. According to the report he is burned to death in a home he founded
    for indigenous students in Iquitos, in the northeastern Amazonian region. (AP)
  Politics and elections:
  - 2019 Algerian protests
  - President Abdelaziz Bouteflika resigns amid pressure from the public and the military,
    having ruled the country since 1999. (BBC News)
  - Brexit negotiations
  - UK Prime Minister Theresa May gives a speech after seven hours of continuous meetings,
    saying that a further extension to the withdrawal from the European Union is needed,
    and asking for talks with Jeremy Corbyn. (BBC News)
  - The chairman for the Republican Party in North Carolina, Robin Hayes, is charged
    with bribery and other corruption charges, along with Republican donor Greg Lindberg.
    (Yahoo!)
  - SNC-Lavalin affair
  - Canadian Prime Minister Justin Trudeau expels former ministers Jody Wilson-Raybould
    and Jane Philpott from the Liberal Party of Canada. (BBC News) (Reuters)
  - 2019 Venezuelan presidential crisis
  - The Nicolás Maduro-aligned Constituent National Assembly formally strips opposition
    leader and National Assembly President Juan Guaidó of his immunity from prosecution,
    potentially paving the way for his arrest. (Brisbane Times)
  Sports:
  - In American football, Tom Dundon, principal owner of the Alliance of American
    Football, announces that the league has suspended operations effective immediately,
    before the end of its first season. (ESPN)
