Date: '2019-04-01'
Source_URI: Portal:Current events/2019 April 1
Intelligence_Payload:
  Disasters and accidents:
  - 2019 Iran floods
  - The Iranian government announces an emergency in southwestern provinces threatened
    by flooding and worked to evacuate dozens of villages as forecasters predicted
    more of the heavy rains that have killed at least 45 people last week. (Reuters)
  - The death toll from thunderstorms in southern Nepal rises to 30. Several houses
    are ruptured, trees uprooted and vehicles overturned in Bara district and Parsa
    district. (BBC News)
  - Thirty firefighters die in southwestern China after a forest fire trapped them
    due to a sudden shift in winds. (The New York Times) (BBC)
  - Two children are killed and twenty are injured in China after a dust devil lifts
    an inflatable castle off the ground. (South China Morning Post)
  Health and environment:
  - China announces that it will add fentanyl to a list of regulated narcotic drugs
    on May 1, 2019, in an effort to curtail its manufacturing. (BBC News) (CNN) (Time)
  - Aftermath of Cyclone Idai
  - The first death due to cholera is confirmed in Mozambique, with confirmed cases
    rising to 517. (CBS News) (The Independent)
  Politics and elections:
  - 2019 Turkish local elections, Erdoğanism
  - In an election marred by electoral fraud, Turkey's ruling Justice and Development
    Party wins with 44% of the vote while Republican People's Party comes in second
    with 30% of the vote. Overall, People's Alliance gets 51% of the vote while Nation
    Alliance receives 37% of the vote. Voter turnout was 84%. (Anadolu Agency)
  - 2019 Japanese imperial transition
  - is revealed as the new Japanese Era name set to start on May 1 upon Crown Prince
    Naruhito's accession to the Chrysanthemum Throne as the 126th Emperor of Japan.
    (The Japan Times)
  - 2019 Guatemalan general election
  - The Supreme Electoral Tribunal accepts the nullity recourses against the candidacy
    of Thelma Aldana and temporarily leaves her out of the general elections. However,
    an appeal will be filed before the Supreme Court of Justice and ultimately, the
    Constitutional Court. All three top candidates face serious legal challenges that
    may prevent them from running. (Prensa Libre) (Fox News) (Al Jazeera)
  - 2019 Algerian protests
  - Algerian President Abdelaziz Bouteflika announces that he will resign by April
    28, following intense pressure from the military and the ruling party to step
    down amid anti-government protests, bringing an end to his 20-year rule. (Reuters)
  - Brexit negotiations
  - The British parliament votes against four alternative Brexit plans. (CBC)
  - Protesters strip naked in the public galleries of the House of Commons, pressing
    their buttocks against the window facing Ministers. (The Guardian via YouTube)
    (The Guardian)
  - Michele Muratori and Nicola Selva are sworn in as Captains Regent of San Marino.
    (Corriere Romagna)
