Date: '2019-04-22'
Source_URI: Portal:Current events/2019 April 22
Intelligence_Payload:
  Disasters and accidents:
  - 2019 Luzon earthquake
  - Sixteen people are killed when a magnitude 6.1 earthquake strikes the municipalities
    of Porac and Lubao, Pampanga province, Philippines at 17:11 Philippine Standard
    Time. (The Manila Times)
  - According to PHIVOLCS, the epicenter of the earthquake is located northeast of
    Castillejos, Zambales. PHIVOLCS originally records the earthquake, which is tectonic
    in origin, at magnitude 5.7, but later upgrades it to 6.1. (GMA News)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - U.S. Representative for Massachusetts Seth Moulton announces he is running for
    the Democratic Party's nomination in the 2020 US presidential election. (CNN)
  - United States sanctions against Iran
  - The United States demands that all countries cease purchasing oil from Iran by
    May 1 or face sanctions, in a move aimed at reducing Iran's income. (Reuters)
