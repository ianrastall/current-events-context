Date: '2019-04-07'
Source_URI: Portal:Current events/2019 April 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, 2019 Western Libya offensive
  - The Government of National Accord in Tripoli formally announces the start of a
    counteroffensive to reclaim all parts of the capital held by the Libyan National
    Army. (Al Jazeera)
  - The United States Africa Command evacuates a contingent of U.S. troops from Libya
    due to the unrest. India also withdraws a contingent of peacekeepers from Tripoli.
    (The Guardian)
  - Libyan Air Force jets loyal to Khalifa Haftar strike GNA positions in Tripoli
    for first time since the offensive began, including four airstrikes near the Bab
    al-Azizia military barracks. (Reuters) (Voice of America)
  - Russia blocks a United Nations Security Council statement calling on Libyan Field
    Marshal Khalifa Haftar to immediately halt the Libyan National Army's offensive
    on Tripoli, because it wants the UN statement to also apply to pro-GNA forces,
    including Islamist militias from Misrata. (South China Morning Post)
  - Two female suicide bombers attack a crowd on the outskirts of Maiduguri, Nigeria,
    killing three civilians and injuring 33 others. (The Guardian.ng)
  Disasters and accidents:
  - A major power outage occurs in Sudan, leaving almost the entire country without
    electricity amid ongoing anti-government protests. (Africanews)
  - An innocent motorist is fatally shot by the Brazilian army after being shot eighty
    times when his vehicle is mistaken for a criminal target in Rio de Janeiro. (G1)
  Politics and elections:
  - 2019 Andorran parliamentary election
  - Andorrans head to the polls to elect the new members of the General Council that
    will choose the new Prime Minister. The ruling party, Democrats for Andorra, loses
    the majority in the chamber. (La Vanguardia)
  - Political appointments by Donald Trump, List of Trump administration dismissals
    and resignations
  - U.S. President Donald Trump announces that Homeland Security Secretary Kirstjen
    Nielsen is leaving the administration. Customs and Border Protection commissioner
    Kevin McAleenan will serve in her stead until a new secretary is confirmed by
    Congress. (The Washington Post)
