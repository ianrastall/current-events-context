Date: '2019-04-10'
Source_URI: Portal:Current events/2019 April 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Libyan Civil War, 2019 Western Libya offensive
  - Aguila Saleh, speaker of the Tobruk-based Libyan parliament which Khalifa Haftar's
    Libyan National Army is loyal to, states that no peace agreement or UN-backed
    conference is possible while Tripoli "is occupied by armed groups". (Fox News)
  - The Libyan National Army says it has shot down a pro-GNA L-39 Albatros over Tripoli.
    (RT)
  International relations:
  - Brexit negotiations
  - The United Kingdom and European Union agree to delay Brexit until October 31,
    2019. This means that the UK will participate in next month's European Parliament
    election. (BBC News)
  Law and crime:
  - The United States federal government charges 24 in a Medicare fraud scheme involving
    the billing of Medicare for nearly $1.2 billion in unnecessary back braces and
    other medical braces pitched via telemarketing through durable medical equipment
    companies. (NPR)
  Politics and elections:
  - 2019 Venezuelan presidential crisis
  - After the Organization of American States accepts an envoy from the government
    of President of the Venezuelan National Assembly Juan Guaidó as ambassador, United
    States Vice President Mike Pence asks for the United Nations to expel and replace
    the Nicolás Maduro-appointed Venezuelan envoy in its own chamber. (Bloomberg)
  - The International Monetary Fund denies Venezuela access to its money as there
    is no majority of member states recognizing either Maduro or Guaidó, describing
    the situation as "political chaos" and asking for debate between its members on
    the nation. (Bloomberg)
  Science and technology:
  - Katie Bouman and scientists at the Event Horizon Telescope project release the
    first ever photograph of the event horizon of a black hole, that of the supermassive
    black hole at the center of Messier 87 galaxy, taken using a network of eight
    radio telescopes around the world. (CNN)
  - Homo luzonensis is identified as a new species of human beings discovered in the
    Callao Cave, Northern Philippines. (National Geographic)
