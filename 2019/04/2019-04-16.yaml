Date: '2019-04-16'
Source_URI: Portal:Current events/2019 April 16
Intelligence_Payload:
  Business and economy:
  - Apple Inc. and Google remove TikTok from their app stores in India after a high
    court in Madras ruled the app could expose children to sexual content and cyberbullying.
    (CNN)
  International relations:
  - Yemeni Civil War (2015–present), Saudi Arabian-led intervention in Yemen, Saudi
    Arabia–United States relations
  - U.S. President Donald Trump vetoes a Congressional resolution that sought to end
    U.S. support for Saudi Arabia's military intervention in Yemen. (Reuters)
  Law and crime:
  - Five people are killed and 13 others injured in an arson and stabbing attack in
    an apartment complex in Jinju, South Korea. The attacker tells the police he was
    angry because of back pay. (The Korea Times)
  - Eight families file a lawsuit against Washington Hebrew Congregation for allowing
    what they say was a lack of action over an assistant teacher who stands accused
    of sexually abusing several children in the day care program. (USA Today) (CNN)
