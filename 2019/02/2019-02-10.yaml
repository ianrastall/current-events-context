Date: '2019-02-10'
Source_URI: Portal:Current events/2019 February 10
Intelligence_Payload:
  Law and crime:
  - Sexual abuse scandal in Southern Baptist churches, Religious abuse, Baptists in
    the United States
  - An investigation by Houston Chronicle and the San Antonio Express-News found that
    since 1998, about 380 Southern Baptist church clerics, laypersons, and volunteers
    have faced credible accusations of sexual abuse and that of those, roughly 220
    were convicted of sex crimes or received plea deals, in cases involving more than
    700 victims. Many accusers were young men and women, who allegedly experienced
    everything from molestation to rape and impregnation at the hands of church members.
    (Houston Chronicle) (Houston Chronicle2) (San Antonio Express-News)
  - President of the Southern Baptist Convention J. D. Greear condemns the sexual
    abuse committed by the clergy, laypersons, and volunteers and calls it "pure evil".
    (The Washington Post)
  - Three people are killed in Gandhinagar, India, by a serial killer. The alleged
    killer, who is later identified as a eunuch, remains at large. (Ahmedabad Mirror)
  Politics and elections:
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Amy Klobuchar 2020 presidential campaign
  - United States Senator Amy Klobuchar announces her intention to run for President
    of the United States in the 2020 United States presidential election. (NBC News)
  - Demographics of Hungary, Opposition to immigration
  - Hungary's Prime Minister Viktor Orbán announces new tax and loan benefits for
    families as part of his government’s efforts to increase the birth rate in Hungary.
    The new measures include the expansion of a loan program for families with at
    least two children and waiving personal income tax for women raising at least
    four children. Orbán is one of the most outspoken critics of immigration to Europe
    from the Middle East and Asia. (France 24) (Reuters)
  Sports:
  - 2019 Caribbean Series
  - In baseball, the Toros de Herrera become the first Panamanian team since 1950
    to win the Caribbean Series as they defeat the Leñadores de Las Tunas of Cuba
    3-1 in the final. (Associated Press via ESPN)
