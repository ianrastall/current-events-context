Date: '2019-02-08'
Source_URI: Portal:Current events/2019 February 8
Intelligence_Payload:
  Disasters and accidents:
  - 2018–19 North American winter
  - Washington Governor Jay Inslee declares a state of emergency as a winter storm
    that could bring up to of snow begins to affect the state. (NBC News)
  - A fire at Flamengo sports club's youth training camp in Rio de Janeiro, Brazil,
    leaves ten people dead and three injured. (CNN)
  - A train collision near Barcelona, Spain, leaves one dead and 100 injured. (The
    Washington Post)
  Law and crime:
  - 2010–2017 Toronto serial homicides
  - Bruce McArthur is sentenced to life imprisonment for eight murders in Toronto,
    making him the oldest known sexually motivated serial killer in Canadian history.
    (CBC News) (Toronto Star)
  Politics and elections:
  - 2019 Venezuelan presidential crisis, Crisis in Venezuela, United States–Venezuela
    relations
  - A senior White House official, speaking on condition of anonymity, reveals that
    the United States government is holding direct communications with members of
    Venezuela's military urging them to abandon Nicolás Maduro. (Reuters)
  - Accession of Macedonia to NATO
  - In a 153–140 vote, the Parliament of Greece ratifies the NATO accession protocol
    for North Macedonia. (RFE/RL)
  - Spanish constitutional crisis
  - The Spanish government announces that it is breaking off dialogue with the government
    of Catalonia, escalating the regional crisis. (Reuters)
  - 2019 Thai general election
  - Thai Princess Ubolratana conveyed a message of thanks to Thais on Saturday morning
    after King Vajiralongkorn issued a royal announcement late on Friday night saying
    political involvement by a senior royal is inappropriate. (Bangkok Post)
