Date: '2019-02-28'
Source_URI: Portal:Current events/2019 February 28
Intelligence_Payload:
  Armed conflict and attacks:
  - 28 February 2019 Mogadishu bombings
  - 29 people were killed in three bomb attacks and a siege that lasted into March
    1. (BBC News) (CNN)
  Arts and culture:
  - Pope Francis pays tribute to Cardinal Augustin Bea (1881-1968) as a pioneer of
    Jewish-Catholic dialogue. The papal audience commemorates the fiftieth anniversary
    of the passing of Cardinal Bea. "He remains a model and a source of inspiration
    for ecumenical and interreligious dialogue". He served as the first president
    of the Secretariat for Promoting Christian Unity. (Holy See Press Office)
  Business and economy:
  - Online child abuse
  - YouTube announces that it will turn off comments on videos featuring children
    under the age of 18 after reports that a pedophile ring was operating in the comment
    sections of videos featuring minors, which subsequently led AT&T, Nestlé and Hasbro
    to suspend advertisements on the website. (BBC News)
  International relations:
  - 2019 North Korea–United States Hanoi Summit, North Korea–United States relations
  - The summit between U.S. President Donald Trump and North Korean leader Kim Jong-un
    in Hanoi abruptly ends earlier than scheduled, with the White House saying no
    deal has been reached in regards to relations between the two countries and North
    Korea's nuclear weapons policies and sanctions due to them. (NBC News)
  - 2019 India–Pakistan standoff, 2019 Balakot airstrike
  - Pakistani Prime Minister Imran Khan says that captured Indian Air Force pilot
    Abhinandan Varthaman will be released tomorrow as a gesture of peace. (Economic
    Times) (Reuters)
  - 2019 Venezuelan presidential crisis
  - The United Nations Security Council rejected rival resolutions on Venezuela by
    the United States and Russia Thursday. Russia and China vetoed the U.S. call for
    new elections and the unhindered distribution of humanitarian aid, while Moscow's
    proposal for a political solution and reaffirmation of the government's role in
    soliciting assistance failed to gain sufficient support. (The Washington Post)
  - Venezuelan opposition leader and interim president Juan Guaidó said Thursday he
    will return to his country by Monday, and that a dialogue with President Nicolás
    Maduro won't be possible without discussing elections. (CNN)
  Law and crime:
  - Corruption in Israel
  - The Attorney General of Israel Avichai Mandelblit says that after more than two
    years of investigations he has decided to indict Prime Minister Benjamin Netanyahu
    on charges of bribery, fraud and breach of trust. (Sky News)
