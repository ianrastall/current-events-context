Date: '2019-02-18'
Source_URI: Portal:Current events/2019 February 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kashmir conflict
  - Two reported Jaish-e-Mohammed militants, one civilian and four Indian soldiers
    are killed in a skirmish in the Pulwama district of Indian-administered Kashmir
    as police search for suspects in Thursday's suicide attack that killed 40 Indian
    paramilitary police. (arynews)
  - Syrian Civil War
  - Twin explosions in Idlib, Syria, kill 24 people and injure more than 20. (Daily
    Sabah)
  - A suicide bombing kills the bomber and three police officers in Cairo, Egypt.
    Two others are injured. (Wall Street Journal)
  International relations:
  - A summit between Israel and the Visegrád Group (the Czech Republic, Hungary, Poland
    and Slovakia) is cancelled following Poland's reaction and withdrawal as a result
    of Israeli officials' statements on the Holocaust alleging Polish involvement.
    Prime Minister Benjamin Netanyahu says Israel will hold bilateral talks with the
    three prime ministers attending. (BBC News)
  Law and crime:
  - List of mass shootings in the United States in 2019
  - Four people are killed in a shooting at a home in Solon Township, Kent County,
    Michigan, United States, with police investigating it as a possible murder–suicide.
    (NBC News) (CBS News)
  Politics and elections:
  - National Emergency Concerning the Southern Border of the United States
  - Sixteen states sue U.S. President Donald Trump, calling his national emergency
    declaration made last week "unlawful and unconstitutional". (USA Today)
  - History of the UK Labour Party
  - Seven Labour Party MPs (Chuka Umunna, Luciana Berger, Angela Smith, Chris Leslie,
    Gavin Shuker, Ann Coffey and Mike Gapes) resign from the party, forming a new
    independent group, in protest at Jeremy Corbyn's leadership, and "institutional
    anti-Semitism" within the party. (BBC News)
  - 2019 North Korea–United States Hanoi Summit Vietnam
  - The United States is discussing exchanging liaison officers with North Korea.
    (CNN)
  - 2019 Venezuelan presidential crisis
  - In a speech, U.S. President Donald Trump urges the Venezuelan military to abandon
    Venezuelan President Nicolás Maduro or "lose everything". (Reuters)
  - North Korea–Vietnam relations
  - North Korean leader Kim Jong-un will meet with Vietnamese General Secretary and
    President Nguyễn Phú Trọng in Hanoi ahead of talks with U.S. President Donald
    Trump. (Fox News)
  - United States Deputy Attorney General Rod Rosenstein is reported to be stepping
    down from his position in mid-March. (Reuters), (Fox News)
