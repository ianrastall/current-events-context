Date: '2019-02-14'
Source_URI: Portal:Current events/2019 February 14
Intelligence_Payload:
  Armed conflict and attacks:
  - 2019 Pulwama attack
  - At least 46 members of India's security forces are killed when a suicide bomber
    blew himself up as a convoy of military vehicles drove on a highway in Jammu and
    Kashmir. (BBC News)
  - Iraqi insurgency (2017–present)
  - A roadside bomb blast kills 8 Shiite militiamen and wounds others. (France 24)
  - Syrian Civil War, Battle of Baghuz Fawqani
  - Thousands of ISIL fighters and their families flee or surrender to the Syrian
    Democratic Forces, pushing back ISIL control to a square mile in the last ISIL
    stronghold of Baghuz. It is expected that ISIL still holds several hostages, including
    British Journalist John Cantlie. (US News) (The Guardian)
  Business and economy:
  - Amazon HQ2
  - Amazon cancels its New York City headquarters plans, citing opposition from activists
    and local politicians. (CNN)
  Law and crime:
  - Murder of Laquan McDonald
  - Former CPD officer Jason Van Dyke, known for the fatal shooting of teenager Laquan
    McDonald, is allegedly attacked in prison. (NBC News)
  - Florida rapper YNW Melly is arrested for allegedly murdering two friends. (CTV
    News)
  Politics and elections:
  - 2019 Haitian protests
  - The death toll rises to 9 as protesters ask for Jovenel Moïse to step down as
    president of Haiti. The protest started February 7. (BBC News) (TIME)
  - Joint Comprehensive Plan of Action, February 2019 Warsaw Conference
  - U.S. Vice President Mike Pence accuses European Union members of trying to break
    U.S. sanctions against Iran, and calls on the EU to withdraw from the Joint Comprehensive
    Plan of Action. (Reuters)
  - Special Counsel investigation
  - Former FBI Deputy Director Andrew McCabe confirms he ordered the probe on U.S.
    President Donald Trump for obstruction of justice, citing concerns that arose
    from the dismissal of James Comey. (CBS News)
  - Political appointments by Donald Trump
  - The U.S. Senate votes to confirm Trump nominee William Barr as United States Attorney
    General with a vote of 54–45. (NBC News)
  - Brexit
  - The House of Commons votes to reject British Prime Minister Theresa May's negotiating
    strategy with the EU, though this motion has no legal force. (BBC News)
