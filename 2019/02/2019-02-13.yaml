Date: '2019-02-13'
Source_URI: Portal:Current events/2019 February 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Khash-Zahedan suicide bombing
  - At least 27 Iranian Revolutionary Guards are killed after a suicide bombing attack
    in southeastern Iran. The attack is claimed by Jaish ul-Adl militants. (The New
    York Times) (Reuters)
  International relations:
  - Israel–Venezuela relations, 2019 Venezuelan presidential crisis
  - Venezuelan disputed interim President Juan Guaidó states that he is working to
    restore ties with Israel, which were broken by Hugo Chávez's anti-Israeli policy,
    while also weighing whether to relocate the nation's embassy into Jerusalem. (Al
    Jazeera)
  - Foreign involvement in the Syrian Civil War
  - The Kremlin announces that Russia, Iran and Turkey will hold their fourth round
    of talks in Sochi on Thursday with regards to their roles in the Syrian Civil
    War. (Al Jazeera)
  Law and crime:
  - The Public Prosecutor General of Germany announces the arrest of two members of
    the Syrian military intelligence service on charges of crimes against humanity.
    The arrests happened the day before in the states of Berlin and Rhineland-Palatinate.
    (DW)
  - Special Counsel investigation
  - U.S. District Court Judge Amy Berman Jackson rules that political consultant and
    former Trump campaign chairman Paul Manafort breached his plea deal with special
    counsel Robert Mueller by intentionally lying, about three of five matters, to
    investigators and the federal grand jury. (BBC News) (Daily Mail)
  Politics and elections:
  - Trump administration dismissals and resignations
  - FEMA Administrator Brock Long announces his resignation. (Fox News)
  Science and technology:
  - Exploration of Mars
  - The mission of NASA's Opportunity rover on Mars comes to an end. The rover stopped
    communicating in June 2018 after a Martian dust storm, and attempts to reestablish
    communications have not been successful. (NASA)
