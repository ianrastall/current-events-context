Date: '2019-02-25'
Source_URI: Portal:Current events/2019 February 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - American military intervention in Somalia (2007–present)
  - United States Africa Command says a U.S. airstrike has killed 35 al-Shabaab militants
    in Somalia's central Hiran administrative region. (FRANCE 24)
  Disasters and accidents:
  - 2019 Piper PA-46 Malibu crash
  - The Air Accidents Investigation Branch of the United Kingdom issues an interim
    report revealing the pilot, David Ibbotson, held only a private pilots licence
    and could not transport paying passengers within the European Union. Ibbotson
    and Argentinian footballer Emiliano Sala both died in the accident. Cardiff City
    FC announce "grave concerns" over Ibbotson's licence. (BBC News)
  International relations:
  - Chagos Archipelago sovereignty dispute
  - The International Court of Justice (ICJ), the highest court of the United Nations,
    rules that the United Kingdom should end its control of the Chagos Archipelago
    "as rapidly as possible". Mauritius claims the archipelago was unlawfully separated
    from the island nation in 1965. (BBC News)
  - Brexit
  - The Labour Party announces it will support a second referendum on the end of the
    United Kingdom's membership of the European Union unless Wednesday sees Labour's
    proposed Brexit deal supported by Parliament. (BBC News)
  - Negotiations between the Taliban and the United States
  - Peace talks begin in Qatar between the United States and the Taliban. (BBC News)
  - 2019 North Korea–United States Hanoi Summit
  - North Korean leader Kim Jong-un arrives in Vietnam, ahead of his two-day summit
    with U.S. President Donald Trump in the capital Hanoi. (CNN)
  Law and crime:
  - UK Home Secretary Sajid Javid announces plans to ban the political wing of the
    Lebanese Islamist movement Hezbollah under counterterrorism legislation. (Herald
    Scotland)
  - Iran and state-sponsored terrorism
  - Police in Kenya ask a court to allow them to detain three men for 30 days on suspicion
    of conspiring to aid two Iranian terror suspects to escape. (KBC)
  Politics and elections:
  - 2019 Okinawan referendum
  - Japanese Prime Minister Shinzō Abe says the relocation of Marine Corps Air Station
    Futenma, in the Okinawa Prefecture, will still go ahead despite 72% of Okinawan
    voters rejecting the construction of a new base in a non-binding referendum. (BBC
    News)
  - 2019 Venezuelan presidential crisis
  - Jorge Ramos and five other Univision staff are detained at Miraflores Palace in
    Caracas shortly after interviewing Nicolás Maduro. (CNN) (Miami Herald)
  - 2019 Cuban constitutional referendum
  - Voters in Cuba approve a new constitution which recognizes private and cooperative
    businesses, sets term limits for the president, creates the post of prime minister,
    introduces the presumption of innocence and habeas corpus to the justice system,
    and affirms an "irrevocable" socialist government. (Al Jazeera) (The Guardian)
  Sports:
  - New England Patriots owner Robert Kraft is charged with two counts of first-degree
    solicitation in Florida. (ESPN) (NPR) (Fox News)
