Date: '2019-02-16'
Source_URI: Portal:Current events/2019 February 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Battle of Baghuz Fawqani
  - The Syrian Observatory for Human Rights reports that the U.S.-backed Syrian Democratic
    Forces have taken control of Al-Baghuz Fawqani, following the surrender of the
    last remaining ISIL militants in the town. (Reuters)
  - Sinai insurgency
  - Militants attacked an army checkpoint in Sinai Peninsula killing and injuring
    15. It is believed that 11 soldiers were killed but that has not been confirmed.
    Seven militants also died in the attack. (The National) (The Times of Israel)
  - Boko Haram suicide bombers and a gunman kill 8 and injure 15 in an attack in Maiduguri,
    Nigeria. All three attackers were later killed. (Al Jazeera)
  - Afghanistan War
  - 32 Afghan border security troops are killed by a Taliban attack in Kandahar, Afghanistan.
    (The New York Times)
  Disasters and accidents:
  - At least 24 miners are found dead and dozens are still missing after two mines
    were flooded two days ago in Battlefields, Zimbabwe. (Al Jazeera)
  Politics and elections:
  - 2019 Nigerian general election
  - Voting is delayed in Nigeria for a week, hours before polling was due to start
    because of violent incidents in the lead up to the election. (BBC News)
  - 2019 North Korea–United States Hanoi Summit Vietnam
  - North Korean Chairman Kim Jong-un is to arrive in Vietnam on February 25 ahead
    of the second summit meeting between the two leaders on February 27–28 in Hanoi.
    (Reuters)
  - 2019 Venezuelan presidential crisis
  - United States Air Force C-17s land at Cúcuta near the Colombia–Venezuela border,
    the aircraft are loaded with humanitarian aid intended for Venezuela. (ABC News)
  - Political appointments by Donald Trump
  - State Department spokesperson Heather Nauert withdraws from consideration for
    the U.S. ambassador to the United Nations nomination. Jonathan Cohen has been
    serving in that position since January 1, 2019, following Nikki Haley's resignation.
    (NPR)
  Sports:
  - NBA All-Star Weekend takes place at the Spectrum Center in Charlotte, North Carolina.
    (CBS Sports)
