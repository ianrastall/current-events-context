Date: '2019-02-07'
Source_URI: Portal:Current events/2019 February 7
Intelligence_Payload:
  Business and economy:
  - Amazon CEO Jeff Bezos publishes an online essay accusing American Media, Inc.
    owner David Pecker of "extortion and blackmail." (The New York Times)
  Disasters and accidents:
  - Six people are killed by a gas explosion in an abandoned coal mine in Middelburg,
    South Africa. (BBC News)
  - 2019 Piper PA-46 Malibu crash
  - The lone body found in the Piper PA-46 Malibu that disappeared two weeks ago is
    confirmed to be that of missing footballer Emiliano Sala. The pilot remains missing,
    presumed dead. (Mirror)
  Politics and elections:
  - France–Italy relations
  - France withdraws its ambassador to Italy, for the first time since the Second
    World War, amid an ongoing verbal row and Deputy Prime Minister Luigi Di Maio’s
    decision to meet with members of the French yellow vest movement. (Reuters)
  - Me Too movement / 2019 Virginia political crisis
  - Californian professor Vanessa Tyson accuses Lieutenant Governor of Virginia Justin
    Fairfax of having sexually assaulted her in 2004. (CNBC)
  Science and research:
  - NASA scientists report the MarCO satellites, two CubeSats in deep space, have
    lost contact with Planet Earth. (CNN)
