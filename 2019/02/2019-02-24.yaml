Date: '2019-02-24'
Source_URI: Portal:Current events/2019 February 24
Intelligence_Payload:
  Arts and culture:
  - 91st Academy Awards
  - The 91st Academy Awards are presented in Hollywood. Bohemian Rhapsody wins a leading
    four awards, followed by Black Panther, Green Book, which won Best Picture, and
    Roma, with three awards each. (The Guardian), (The New York Times)
  Disasters and accidents:
  - During a training exercise, a twin-engine aircraft crashes through the roof of
    a home in Winter Haven, Florida, shortly after takeoff. The pilot was killed.
    A trainee pilot and eight people in the house suffered minor injuries. The Federal
    Aviation Administration and National Transportation Safety Board will be investigating.
    (ABC News via MSN)
  - A state of emergency is declared in Tennessee amid flooding that has caused landslides
    and one death. (CNN)
  Law and crime:
  - Biman Bangladesh Airlines Flight 147
  - Bangladeshi special forces shoot and kill an armed man after he attempted to hijack
    a Biman Bangladesh Airlines flight heading to Dubai International Airport. All
    148 passengers and crew members disembarked safely. (BBC News)
  - National Coalition for Men v. Selective Service System
  - A federal judge rules that the exclusion of women from the Selective Service System
    is unconstitutional. (The New York Times)
  Politics and elections:
  - 2019 Moldovan parliamentary election
  - Voters in Moldova go to the polls to elect the new members of Parliament. (France
    24)
  - 2019 Senegalese presidential election
  - Voters in Senegal assemble to vote for the country's next president. (DW)
  - 2019 Cuban constitutional referendum
  - Voters in Cuba are asked whether they approve of a new constitution that gives
    criminal defendants the presumption of innocence, recognizes private property,
    bans some forms of discrimination, creates a term limit for the president, and
    restores the position of Prime Minister. (Al Jazeera)
  - Brexit
  - British MPs will vote on the latest Brexit deal by March 12, according to Prime
    Minister Theresa May. (BBC News)
  - 2019 Okinawan referendum
  - Voters in the Japanese prefecture of Okinawa go to the polls in a referendum on
    the central government's plan to move the Futenma airbase to Henoko in northern
    Okinawa Island. 72% of voters oppose the plan. (Asahi Shimbun English)
  Sports:
  - 2019 English Football League Cup Final, 2018–19 English Football League Cup
  - Manchester City F.C. defeat Chelsea F.C. in the English Football League Cup Final
    in the penalties after 120 minutes of goalless draw for their 6th EFL title. Post-match
    discussion is dominated by Chelsea goalkeeper Kepa Arrizabalaga's controversial
    refusal to leave the pitch when head coach Maurizio Sarri attempted to substitute
    him. (The Guardian)
