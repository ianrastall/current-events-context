Date: '2019-02-03'
Source_URI: Portal:Current events/2019 February 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - At the request of Chadian authorities, French Air Force Mirage 2000 fighter jets
    strike a convoy of around 40 pickups of an armed group that entered northern Chad
    from Libya. (Reuters)
  Disasters and accidents:
  - 2019 Piper PA-46 Malibu disappearance
  - The wreckage of the Piper PA-46 Malibu light aircraft, which went missing on January
    21, 2019, with two people on board, including Cardiff City F.C. record signing
    Emiliano Sala, is discovered on the seabed of the English Channel. (Sky News)
  International relations:
  - Pope Francis arrives in Abu Dhabi, United Arab Emirates, becoming the first pope
    to visit the Arabian Peninsula. (Reuters) (The New York Times)
  Law and crime:
  - Atlanta-based rapper 21 Savage is taken into custody by the U.S. Immigration and
    Customs Enforcement (ICE), accusing him of actually being a British national who
    has been in the United States unlawfully since his visa expired in July 2006.
    (Fox 5 Atlanta)
  - The Abbott of the Montserrat Abbey, in Barcelona, Spain, apologizes for the sexual
    abuses that a monk did and that came to light two weeks ago. (El País)
  Politics and elections:
  - 2019 Salvadoran presidential election
  - Former San Salvador mayor Nayib Bukele of the Grand Alliance for National Unity
    is elected President of El Salvador with over 50% of the ballots cast. (Al Jazeera)
    (BBC Mundo)
  Sports:
  - Super Bowl LIII
  - In American football, the New England Patriots defeat the Los Angeles Rams in
    Super Bowl LIII by a score of 13–3. (CBS Sports)
