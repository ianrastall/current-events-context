Date: '2019-02-09'
Source_URI: Portal:Current events/2019 February 9
Intelligence_Payload:
  Disasters and accidents:
  - 2019 Piper PA-46 Malibu crash
  - The family of pilot David Ibbotson launch a GoFundMe campaign to locate and recover
    his body, raising thousands of pounds within hours. Footballer Emiliano Sala's
    body was recently found in the wreckage and recovered two weeks after the plane
    first went missing. (BBC News)
  - 2018–19 North American winter
  - Cities in the Seattle metropolitan area receive of snow, the most in 70 years.
    (CBS News)
  Politics and elections:
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Elizabeth Warren 2020 presidential campaign
  - United States Senator Elizabeth Warren announces her intention to run for President
    of the United States in the 2020 United States presidential election. (CNN)
  - 2019 Venezuelan presidential crisis
  - Venezuela's interim President Juan Guaidó says he will not rule out seeking the
    help of the United States military to remove Nicolás Maduro from power. (AFP via
    France 24)
  - Venezuelan authorities claim that a U.S.-owned air freight company delivered a
    crate of weapons to the international airport in Valencia to be used in "terrorist
    actions" against the Maduro government. The air charter business involved, 21
    Air, denies the charges. (Chicago Tribune)
  Sports:
  - 2019 AAF season
  - The Alliance of American Football kicks off its first season with two games. (CBS
    Sports)
