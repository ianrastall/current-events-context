Date: '2019-02-11'
Source_URI: Portal:Current events/2019 February 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Libyan Crisis (2011–present)
  - The Libyan Tobruk-based government has full control of the El Sharara oil field,
    the largest oilfield in Libya, after it was captured by the Libyan National Army.
    The oilfield, which was formerly under the control of Tripoli-based Government
    of National Accord, was taken over by local tribesmen in December 2018. (Reuters)
  Business and economy:
  - Mars One, a private Dutch organization that had claimed it would send humans on
    a one-way trip to Mars starting in 2024, releases a statement saying it has been
    declared bankrupt. (CBC)
  Disasters and accidents:
  - A helicopter carrying Brazilian journalist and news anchor Ricardo Boechat crashes
    in São Paulo, killing both Boechat and the pilot. (BBC News)
  - 2018–19 North American winter
  - A winter storm is expected to bring up to of snow to the Midwestern and Northeastern
    United States in the upcoming days. (NBC News)
  - A winter storm hits Hawaii, depositing snow at record-low elevations at Polipoli
    State Park, along with massive waves, coastal flooding, and strong winds, resulting
    in at least one death. (AP) (The Washington Post)
  International relations:
  - Switzerland–United Kingdom relations
  - The United Kingdom and Switzerland sign a trade continuity agreement to maintain
    current trade relations post-Brexit. (The Guardian)
  Law and crime:
  - Oulu child sexual exploitation scandal
  - Finnish police start to investigate new rapes of two underage girls that had occurred
    a few days earlier in Oulu, Finland. (Yle)
  - A 15-year-old student has stabbed and killed his teacher and a classmate at a
    high school in Stolbtsy, Belarus. Two other classmates were also injured. (The
    New York Times)
