Date: '2019-02-17'
Source_URI: Portal:Current events/2019 February 17
Intelligence_Payload:
  Business and economy:
  - Hundreds of airline passengers are left stranded throughout Europe following British
    airline Flybmi's bankruptcy filing. (AP via The Washington Times)
  Disasters and accidents:
  - At least nine people die after a fire sweeps through more than 200 slum dwellings
    in Chittagong, Bangladesh. (BBC News)
  - Four children die after a landslide in Mauá, São Paulo, Brazil. (G1)
  - Eight people are rescued from a gold mine that is flooded in Battlefields, Zimbabwe.
    (Al Jazeera)
  Law and crime:
  - A mass shooting inside a nightclub in Cancún, Mexico, leaves five dead and five
    wounded. (Fox News)
  Politics and elections:
  - Israeli Prime Minister Benjamin Netanyahu appoints intelligence minister Israel
    Katz to take over the foreign minister portfolio. Netanyahu retains his defence
    minister and health minister roles. Israel's parliamentary elections are scheduled
    for 9 April 2019. (Reuters) (The Jewish Chronicle)
  - Australian Prime Minister Scott Morrison announces the country's major political
    parties computer networks had been hacked by a "sophisticated state actor." (BBC
    News)
  - Saudi Arabia–Pakistan relations
  - Saudi Arabia signs $20 billion dollars in deals with Pakistan. (BBC News)
  Sports:
  - 2019 NBA All-Star Game
  - The 2019 NBA All-Star Game takes place in Charlotte, North Carolina, with Team
    LeBron defeating Team Giannis 178–164. Golden State Warriors small forward Kevin
    Durant is named the game's MVP; it is his second All Star MVP award, the first
    coming in 2012. (CBS Sports)
  - 2019 Daytona 500
  - Denny Hamlin wins the 2019 Daytona 500. It is his second win in the event, the
    first coming in 2016. (Fox News)
