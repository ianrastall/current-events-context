Date: '2019-02-06'
Source_URI: Portal:Current events/2019 February 6
Intelligence_Payload:
  Disasters and accidents:
  - 2018 Anchorage earthquake
  - Two aftershocks strike Anchorage, Alaska, the first a magnitude 4.1, and the second
    a magnitude 3.7, occurring 23 minutes later. (Anchorage Daily News)
  - Heavy rain hits Rio de Janeiro, leaving three people dead and two missing. (G1)
  - Fourteen people were killed, and fourteen others are injured when an eight-story
    apartment building collapsed in Istanbul, Turkey. (BBC News)
  Health and environment:
  - 2019 Philippines measles outbreak
  - The Philippines Department of Health declares a measles outbreak attributed to
    the drop in trust in vaccines due to the Dengvaxia controversy. (The Philippine
    Star)
  International relations:
  - Accession of Macedonia to NATO
  - In Brussels, an accession protocol for joining NATO is signed between Jens Stoltenberg,
    Secretary General of NATO, and Nikola Dimitrov, foreign minister of the Republic
    of Macedonia. (The Washington Post)
  - 2019 Venezuelan presidential crisis, Colombia–Venezuela relations
  - The Venezuelan National Guard blocks off a bridge on the Colombia–Venezuela border
    with a tanker truck. The Venezuelan opposition had been planning to use the bridge
    to bring humanitarian aid into the country, while President Nicolás Maduro has
    rejected foreign aid, saying "we're not a nation of beggars". (BBC News) (Daily
    Star)
  Law and crime:
  - Game law
  - In a landmark decision, the Constitutional Court of Colombia rules to ban recreational
    hunting, citing environmental protection concerns. (El Tiempo)
  Politics and elections:
  - 2019 Guatemalan general election
  - The Attorney General files a request to withdraw immunity to the presidential
    candidate of National Unity of Hope, former First Lady Sandra Torres, for alleged
    crimes of illicit electoral financing. Torres said it was a political persecution
    of the former Attorney General and presidential candidate Thelma Aldana. (The
    Washington Post)
