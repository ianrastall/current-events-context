Date: '2019-02-23'
Source_URI: Portal:Current events/2019 February 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Venezuelan presidential crisis, 2019 shipping of humanitarian aid to Venezuela,
    2019 Venezuelan protests
  - Trucks carrying humanitarian aid from Colombia and Brazil attempt to enter Venezuelan
    territory. Two trucks are set on fire on the Francisco de Paula Santander International
    Bridge. (Herald Sun)
  - Venezuelan people clash with the Venezuelan National Guard on the Venezuela's
    border with Colombia and Brazil. Three people have died in southern Bolívar State.
    (The Guardian)
  - Sixty Venezuelan National Guard personnel defect to Colombia; three of them defect
    after smashing a barrier at the Simón Bolívar International Bridge on the Colombia–Venezuela
    border in two armored vehicles, leaving some injured. A video posted on social
    media shows the men with their guns above their heads in a sign of surrender.
    (Miami Herald) (AFP) (Reuters)
  - Venezuela breaks diplomatic relations with Colombia and expels all of Colombia's
    diplomats; however, Colombia maintains diplomatic relations with Guaidó's ambassador,
    Humberto Calderón Berti. (Reuters) (Colombian Foreign Minister) (Colombia's Caracol
    TV)
  - Venezuelan opposition deputy Freddy Superlano and his assistant are poisoned at
    a restaurant in Cúcuta, Colombia. His assistant and cousin, Carlos Salinas, has
    died while Superlano is in a serious but stable condition in hospital. (The Washington
    Post) (BNO News)<!--
  Disasters and accidents:
  - Atlas Air Flight 3591
  - A Boeing 767 on a cargo flight crashes into the Trinity Bay en route from Miami
    to Houston, killing all three crew members. (The Weather Channel)
  International relations:
  - 2019 North Korea–United States Hanoi Summit
  - The Vietnamese Foreign Ministry announces that North Korean leader Kim Jong-un
    will make an official visit to the country in the coming days, ahead of the upcoming
    summit between him and U.S. President Donald Trump in Hanoi. (Reuters)
  Politics and elections:
  - 2019 Nigerian general election
  - After having been postponed by a week, Nigeria's general election takes place
    nationwide. (DW)
