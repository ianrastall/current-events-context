Date: '2019-10-18'
Source_URI: Portal:Current events/2019 October 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - Mexican Drug War
  - The Mexican National Guard arrests Ovidio Guzmán López, one of former cartel leader
    Joaquín "El Chapo" Guzmán's sons, in Culiacán. He is later released after government
    forces come under intense attack and are overpowered by Sinaloa Cartel gunmen,
    according to Security Minister Alfonso Durazo. (BBC News) (CNBC)
  - According to a later statement, Mexican President Andrés Manuel López Obrador
    and government authorities ordered officers to let Guzmán López go free to avoid
    a "bloodbath" and "preserve the lives of our officers and bring calm back to the
    city". (Clarín)
  - Eight people are confirmed killed in the failed raid. More than twenty others
    were injured. (AP News)
  - Haska Meyna mosque bombing
  - Multiple explosions inside a mosque in Haska Meyna District of Afghanistan's Nangarhar
    Province kill at least 62 people and severely damage the building. (Reuters)
  - 2019 Turkish offensive into north-eastern Syria
  - The Kurds say that Turkey is already violating the ceasefire agreement by shelling
    the border town of Ras al-Ain. (CNN)
  - Turkish airstrikes kill five civilians in the village of Bab al-Kheir. (Times
    of Israel)
  Arts and culture:
  - The wreck of Japanese warship Kaga, sunk in the Battle of Midway during World
    War II, is discovered on the seabed in the Pacific Ocean. It is only the second
    vessel sunk during the battle to have been found. (Live Science)
  Business and economy:
  - UK clothing retailer Bonmarché collapses into administration. The chain employs
    2,900 people and operates 318 stores. (iNews)
  Disasters and accidents:
  - Seattle crane collapse
  - Washington State authorities find a crane collapse earlier this year in Seattle
    was caused when workers removed securing pins too early during the crane's dismantling.
    Four people were killed in the accident. Three firms are issued fines. (NBC News)
  International relations:
  - Japan says it will not join the U.S.-led International Maritime Security Construct
    to protect international shipping in the Persian Gulf and Strait of Hormuz amid
    Iranian aggression, but will instead deploy its own Maritime Self-Defense Force
    to the region to guard merchant vessels "related to Japan". (Reuters)
  - The Financial Action Task Force, an international counter-terrorism finance taskforce,
    tells Pakistan to improve its counter-terror funding operations by next February
    or face being added to the group's blacklist. (The Hindustan Times)
  Law and crime:
  - Trial of Catalan independence leaders; 2019 Catalan protests
  - Catalonia goes to a general strike in protest of the prison sentence of the Catalan
    independentists leaders. Thousands of demonstrators arrive walking to Barcelona
    from the whole region. (The Guardian)
  - After a peaceful demonstration involving more than 500,000 people in Barcelona,
    violent clashes erupt, with more clashes in Tarragona and Girona. (El Periódico)
    (Tarragona Digital)
  - In Barcelona, a water cannon is used for the first time against protesters in
    Spain. (La Vanguardia)
  - Former President of Catalonia Carles Puigdemont is released with charges by the
    Brussels prosecutor's office after surrendering on Thursday to the Belgian authorities
    following the issuing of the European Arrest Warrant on Monday. (The Guardian)
    (Euronews)
  Politics and elections:
  - 2019–20 Lebanese protests
  - Hundreds of protestors march across Lebanon over the government's proposal to
    tax numerous goods, such as tobacco and WhatsApp calls. Police respond by firing
    tear gas on those in Beirut. (Al Jazeera) (Reuters)
  - The government withdraws the controversial tax plan. Despite this, protests continue,
    with participants swelling to tens of thousands and them now calling for the downfall
    of the government. Prime Minister Saad Hariri gives his government 72 hours to
    resolve the country's worsening economic crisis. (Al Jazeera)
  - 2019 Santiago protests
  - After a week of fare-dodging protests in the Santiago Metro, thousands of protestors
    clash with police in different places across Santiago, Chile. Subway service is
    suspended in the entire city. Protests started after a price hike in the most
    expensive subway system in Latin America. (The Guardian)
  Science and technology:
  - In the International Space Station, the crew members Expedition 61, Christina
    Koch and Jessica Meir took the first all female spacewalk in history. (BBC news)
