Date: '2019-10-23'
Source_URI: Portal:Current events/2019 October 23
Intelligence_Payload:
  Disasters and accidents:
  - Lion Air Flight 610, Boeing 737 MAX groundings
  - Indonesian investigators meet with families of the deceased ahead of the release
    of their final report, scheduled for Friday. They state the crash was caused by
    design flaws with software on the aircraft, and inaccurate assessments by Boeing
    as to how pilots would respond to them. (Al Jazeera)
  - Yirol Let L-410 Turbolet crash
  - Ukraine releases the final report into the disaster, which was prepared by South
    Sudan. The report concludes mistakes by both crew and maintenance, as well as
    poor weather, combined to cause the crash. (The Aviation Herald)
  Health and environment:
  - Pacific Gas and Electric is set to shut off power to 179,000 customers in Northern
    California due to an elevated wildfire risk, while Southern California Edison
    does so for 308,000 in Southern California. (The New York Times) (KTLA)
  International relations:
  - 2019 Turkish offensive into north-eastern Syria, Turkey–United States relations
  - The Trump administration lifts the sanctions it placed on Turkey, in response
    to the latter's ceasefire. While U.S. President Donald Trump states the ceasefire
    is permanent, he threatens to reinstate the sanctions if "something happens that
    we are not happy with". (Reuters)
  Law and crime:
  - Essex lorry deaths
  - Police discover 39 bodies inside a lorry container in Grays, Essex, UK. They had
    been transported from Zeebrugge, across the English Channel to Purfleet. The driver,
    a man from Northern Ireland, is arrested. (The Guardian)
  - Right-wing terrorism in the United Kingdom, Christchurch mosque shootings
  - Two men are given prison sentences in the United Kingdom after they incited copycat
    attacks following mosque shootings in New Zealand. They were convicted of a series
    of terror offences. (BBC News)
  - Police in Albania say they have identified a terrorist cell in the country operated
    by the Revolutionary Guards of Iran and seeking to attack members of exiled Iranian
    anti-government group Mujahedin-e Khalq. (The Guardian)
  - Murder of Nusrat Jahan Rafi
  - A court in Bangladesh sentences sixteen people to death after they burned a student
    alive when she reported sexual harassment by a teacher. (BBC News)
  - 2019 Trump–Ukraine scandal
  - At a hearing in New York City, Lev Parnas and Igor Fruman, two associates of U.S.
    President Donald Trump's personal lawyer Rudy Giuliani, who aided him with a search
    in Ukraine for detrimental information on President Trump's political opponents,
    plead not guilty to charges that they funneled $350,000 in illegal donations to
    a pro-Trump political committee and another $20,000 to former Republican Congressman
    Pete Sessions while acting on behalf of at least one Ukrainian government official.
    (AOL)
  Politics and elections:
  - 2019 Botswana general election
  - Citizens of Botswana cast their vote to elect the members of the National Assembly
    and local government councils. (Eyewitness News)
  - 2019 Chilean protests
  - Chilean President Sebastián Piñera in a nationally televised address apologizes
    for the failures of the government and pledges economic reforms as violent protests
    continue in the country. (WJCT)
  - 2019 Bolivian protests
  - Evo Morales accuses opposition politicians of plotting a coup d'etat with foreign
    powers. (The Guardian)
  - Stoneman Douglas High School shooting, Fort Lauderdale airport shooting
  - In a special session of the Florida Senate, the chamber voted 25–15 to uphold
    the suspension of former Broward Sheriff Scott Israel for his agency's response
    to the mass shootings at both Ft. Lauderdale-Hollywood International Airport and
    Parkland. (WPLG)
  - September 2019 Israeli legislative election
  - President of Israel Reuven Rivlin tasks Leader of the Opposition Benny Gantz to
    try to form government after the failing of current Prime Minister Benjamin Netanyahu.
    (The Guardian)
