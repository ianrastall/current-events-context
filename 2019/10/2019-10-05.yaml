Date: '2019-10-05'
Source_URI: Portal:Current events/2019 October 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Kurdish–Turkish conflict (2015–present), Northern Syria Buffer
    Zone
  - Turkish President Recep Tayyip Erdoğan threatens to invade SDF-held areas in Northern
    Syria "today or tomorrow", after dubbing joint US-Turkish patrols per the buffer
    zone agreement a "fairy tale". (Reuters) (Daily Sabah)
  - Paris police headquarters stabbing
  - Counter-terror investigators confirm the man who killed four people at Paris police
    headquarters two days ago was a convert who adhered to Islamist extremism and
    had contact with Salafists. (BBC News)
  Disasters and accidents:
  - 2019 Totnes bus crash
  - A major incident has been declared in Devon, England, after a double-decker bus
    overturned near the town of Totnes while operating a busy passenger service between
    the English Riviera coast and the city of Plymouth. (BBC News)
  - More than fifty people, including the bus driver, have been injured; eight people
    have serious injuries. Local hospitals have been overwhelmed with patients attending
    from the bus crash and forced to close to non-emergency care. (ITV)
  - Ukraine–European Union relations
  - The European Aviation Safety Agency revokes its authorisation of Ukraine Air Alliance,
    effectively banning the airline from all airspace in the European Union. The move
    results from yesterday's crash of an Antonov An-12 owned by the airline, after
    it ran out of fuel near Lviv, Ukraine. (The Aviation Herald)
  International relations:
  - Russia–Venezuela relations
  - Russian Deputy Prime Minister Yuri Borisov visits ally Venezuela, reiterating
    Russia's support of disputed president Nicolás Maduro and announcing new trade
    deals with the economically crippled country. (Reuters)
  Law and crime:
  - In Lower Manhattan, New York City, four homeless men are beaten to death and a
    fifth severely injured while sleeping. A 24-year-old man, also believed homeless,
    is in custody. (CNN)
  - After acquitting five Muslim men of murder, Thai judge Kanakorn Pianchana gives
    a speech complaining of corrupt pressure upon the judiciary, including in this
    case, to convict without sufficient evidence. He then shoots himself in the chest
    in court in Yala, but survives. Criticism from judges of the Thai legal system
    is rare, but rights groups claim Muslims often face trumped-up charges in the
    region, which is Muslim-majority and suffers from insurgency. (BBC News)
  Politics and elections:
  - 2019 Emirati parliamentary election
  - A pool of citizens of the United Arab Emirates heads to the polls in the country's
    fourth parliamentary election. (Gulf News)
  Sports:
  - 2019 World Artistic Gymnastics Championships
  - In the floor exercise, Simone Biles lands a triple-twisting double backflip in
    a tucked position. The new skill will be named "Biles 2", the third element named
    after her, and will have an FIG difficulty value of J. (PopSugar via Yahoo!)
