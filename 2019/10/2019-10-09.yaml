Date: '2019-10-09'
Source_URI: Portal:Current events/2019 October 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Halle synagogue shooting
  - Two people are killed and two others are injured in attacks by a man wearing military
    camouflage near a synagogue and at a kebab shop in Halle, Saxony-Anhalt, Germany.
    Shots are also reported in nearby Landsberg. A suspect, 27-year-old Stephan Billiet,
    is arrested. The attack had been livestreamed on Twitch for 35 minutes citing
    anti-Semitic and racist motivations. (BBC News) (DW) (The Guardian)
  - 2019 Turkish offensive into north-eastern Syria, Turkish involvement in the Syrian
    Civil War, Kurdish–Turkish conflict (2015–present)
  - Turkish President Recep Tayyip Erdoğan says his country has launched a military
    invasion of northern and eastern Syria. The Kurdish YPG-led Syrian Democratic
    Forces say that Turkish fighter aircraft strike targets and "civilian areas".
    Syrian state television says the Turkish artillery shelling of Ras al-Ayn, al-Hasakah
    Governorate, is "random", and Ayn Issa, Raqqa Governorate, is also being shelled.
    (Deutsche Welle) (Al Jazeera) (Xinhuanet)
  - The Kurdish-led Syrian Democratic Forces requests urgent air support from the
    United States, and a no-fly zone over northern Syria to protect it from Turkish
    air raids. U.S. President Donald Trump has ordered U.S. forces to not intervene
    in the conflict. (Reuters) (BBC News)
  - Women at the SDF-controlled Al-Hawl refugee camp, which holds around 74,000 refugees,
    mostly the wives and children of ISIL fighters, riot and burn their tents according
    to a Kurdish security official. (Kurdistan24)
  - The U.S. military takes two militants of the Beatles ISIL cell previously held
    by Kurdish forces to face trial in the United States. (Reuters) (ABC News)
  - Multiple reports that ISIL has committed multiple suicide bombings in the Syrian
    city of Raqqa. (Time)
  - Military activity of ISIL
  - President of Niger Mahamadou Issoufou claims that American hostage Jeffery Ray
    Woodke is still alive and being held by a jihadist group affiliated with ISIL.
    Woodke was kidnapped in October 2016. (ABC News)
  Business and economy:
  - The OECD releases a set of proposals, for the 134 countries which accepted the
    principle, to discuss and negotiate a change in international taxation of the
    big digital and consumer goods companies' global profits. (Reuters)
  - International sanctions during the Venezuelan crisis
  - Adobe cuts access to its software and cancels all Creative Cloud memberships in
    Venezuela, to comply with U.S. President Donald Trump's trade restrictions. (BBC
    News)
  - European debt crisis
  - Greece issues new three-month debt at a negative interest rate. (Financial Times)
  Law and crime:
  - 2019 Tunisian presidential election
  - An appeals court in Tunisia releases candidate Nabil Karoui from prison, days
    before the second round of the presidential election. (Al Jazeera)
  Politics and elections:
  - 2019 Ecuadorian protests
  - Ecuadorian President Lenín Moreno says that he will not resign "under any circumstance"
    and continues with his government in Guayaquil. (Infobae)
  Science and technology:
  - The Nobel Prize in Chemistry is awarded to John B. Goodenough, M. Stanley Whittingham
    and Akira Yoshino for the development of lithium ion batteries. (CNN)
