Date: '2019-10-28'
Source_URI: Portal:Current events/2019 October 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Afghanistan–Pakistan barrier
  - Three women are killed after Afghan and Pakistani forces clash in Kunar Province.
    (CityNews Vancouver)
  - Kashmir conflict
  - Twenty people are injured in a grenade attack in Sopore. (Reuters)
  - Maghreb insurgency
  - Pobé Mengao shooting
  - Gunmen kill 16 people after they refused to help buy them ammunition. The attack
    happened in the village of Pobé Mengao in Burkina Faso. (Jeune Afrique)
  - Bayonne mosque shooting
  - A gunman opens fire on a mosque in Bayonne, Nouvelle-Aquitaine, France, wounding
    two before being detained. The perpetrator is an 84-year-old man who ran for the
    National Front in the 2015 regional elections. (The Daily Telegraph)
  - War in Afghanistan
  - An improvised explosive device detonates in a partially constructed building in
    Bati Kot, Afghanistan. The bomb kills two labourers and injures five more, three
    seriously. (Xinhua News Agency)
  Arts and culture:
  - Pope Francis officially renames the Vatican Secret Archive to the Vatican Apostolic
    Archive. (Detroit News)
  Disasters and accidents:
  - An explosion kills five people at a petroleum plant in Shaanxi, China. A further
    three are missing. (South China Morning Post)
  Law and crime:
  - Impeachment inquiry into Donald Trump
  - Charles Kupperman, U.S. President Donald Trump's former deputy national security
    adviser, defies a congressional subpoena to testify before the House Permanent
    Select Committee on Intelligence regarding the impeachment inquiry into President
    Trump. (CNN)
  Politics and elections:
  - Brexit negotiations
  - The European Union agrees to delay the deadline again for a Brexit deal until
    January 31, 2020. (BBC News)
  - October 2019 Iraqi protests
  - The Iraqi government enacts a curfew in Baghdad as renewed protests enters its
    fourth day. (Al Jazeera)
  - 2019 Chilean protests
  - President Sebastián Piñera changes eight ministries of his cabinet, notably with
    Interior Minister Andrés Chadwick and Financial Minister Felipe Larraín Bascuñán
    being replaced with Gonzalo Blumel and Ignacio Briones respectively. New rounds
    of protests and riots erupt in Santiago and other cities after the announcement.
    (BBC News) (The Guardian)
  - 2019–20 Lebanese protests
  - Central Bank Governor Riad Salame says the economy of Lebanon is "days" away from
    collapsing. (CNN)
  - Impeachment inquiry into Donald Trump
  - The U.S. House of Representatives announces it will vote this week to formalize
    the impeachment inquiry into President Donald Trump. (CNN)
  Science and technology:
  - A study by Garvan Institute of Medical Research in Sydney, and headed by geneticist
    Vanessa Hayes, pinpoints the Okavango region in northern Botswana as the origin
    of modern humans. Other scientists express skepticism at this, particularly at
    the study's primary evidence coming from mitochondrial DNA. (BBC News) (The Guardian)
    (Nature)
