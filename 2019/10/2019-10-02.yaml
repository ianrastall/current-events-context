Date: '2019-10-02'
Source_URI: Portal:Current events/2019 October 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2018–19 Arab protests
  - At least five people are killed in a second day of spontaneous protests against
    unemployment, government corruption and lack of basic services in Iraq. Police
    say they have "lost control" of the city of Nassiriya after exchanging gunfire
    with protesters. Curfews are imposed on the Iraqi cities of Baghdad, Nassiriya,
    Amarah and Hillah. (AP) (Reuters)
  Business and economy:
  - The World Trade Organization authorizes the United States to impose about US$7.5
    billion in tariffs on goods from the European Union every year. The WTO started
    the probe in 2005 after the United States complained that European subsidies to
    Airbus damage Boeing airplane sales. (NPR)
  - The United States announces a tariff of 10% on European-made Airbus planes and
    25% on a range of goods, set to take effect on 18 October. (Reuters)
  - American retailer Bed Bath & Beyond announces it will close 60 stores by the end
    of the year due to declining profits. (USA Today)
  - A foreign exchange trader, Rohan Ramchandani, has filed a lawsuit against Citigroup.
    Ramchandani won acquittal last year after criminal charges of market manipulation.
    He claims that the charges were instigated by his former employer in order to
    mitigate the regulatory consequences for its own misbehavior. (Reuters)
  Disasters and accidents:
  - Following yesterday's collapse of Nanfang'ao Bridge in Su'ao, Taiwan, onto fishing
    boats, rescuers recover four bodies. Three are identified as foreign fishermen,
    with a fourth corpse unidentified. Two people remain missing. (Deutsche Welle)
  - 2019 Boeing B-17 Flying Fortress crash
  - A World War II-era B-17 crashes near Bradley International Airport in the U.S.
    state of Connecticut, killing at least seven of the 13 people on board. (NBC)
  - Schoharie limousine crash
  - The National Transportation Safety Board of the United States, as part of its
    investigation, issues a series of recommendations to the National Highway Traffic
    Safety Administration asking it to mandate improved seatbelt and construction
    standard for stretch limousines. (Reuters)
  - At least 14 people are killed after an illegal gold mine collapses in the Democratic
    Republic of the Congo's Maniema province. Search efforts are underway for others
    who could be trapped. (BBC News)
  - Star City fire
  - A fire razed Star City, an amusement park in Pasay, Philippines in a suspected
    arson attack early morning. (Yahoo! News UK)
  International relations:
  - Japan–North Korea relations, North Korean missile tests
  - Japanese Prime Minister Shinzō Abe condemns in the strongest terms the latest
    North Korean missile tests and says they clearly violate United Nations Security
    Council resolutions. (BBC News)
  - North Korean state media says the country has successfully tested a new type of
    submarine-launched ballistic missile (SLBM) off the coast of Wonsan. (Deutsche
    Welle) (Reuters)
  - U.S. Secretary of State Mike Pompeo speaks out about China's religious freedom
    violations during a visit to the Vatican. (Catholic News Agency)
  Law and crime:
  - Corruption in Israel
  - Israeli Prime Minister Benjamin Netanyahu faces a pretrial hearing regarding the
    charges against him in Case 4000, one of the three corruption cases in which the
    Israeli Attorney General Avichai Mandelblit decided to indict him, pending a hearing.
    (The Guardian)
  - Internet censorship in Singapore
  - The Protection from Online Falsehoods and Manipulation Act (POFMA), a law giving
    the Singaporean government more powers to stop the spread of designated falsehoods
    and fake news, goes into effect. Rights groups like Human Rights Watch and journalists
    worry the law could be used to stifle dissent and free expression. (NPR)
  - 2019 Trump–Ukraine scandal, Impeachment inquiry into Donald Trump
  - A whistleblower who filed a complaint against U.S. President Donald Trump over
    a phone conversation with Ukrainian President Volodymyr Zelensky sought guidance
    from the House Permanent Select Committee on Intelligence prior to the filing,
    Representative Adam Schiff's office says, but denies seeing the complaint in advance.
    (CNN)
  - Immigration policy of Donald Trump
  - The Donald Trump administration says it is preparing to broadly expand DNA collection
    from migrants in U.S. detention. (NBC News)
  Politics and elections:
  - 2020 United States presidential election, Bernie Sanders 2020 presidential campaign
  - U.S. Senator Bernie Sanders suspends campaigning for the 2020 U.S. presidential
    election "until further notice" after the discovery of artery blockage during
    a medical evaluation for chest discomfort results in surgery. (CNN)
