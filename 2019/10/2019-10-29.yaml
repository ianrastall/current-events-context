Date: '2019-10-29'
Source_URI: Portal:Current events/2019 October 29
Intelligence_Payload:
  Business and economics:
  - WhatsApp sues Israeli cyber intelligence firm NSO Group for allegedly spying on
    1,400 users on four continents. Among those affected were diplomats, journalists,
    and government officials. If moved forward, it could set a major legal precedent
    for cybersecurity. (Reuters)
  Disasters and accidents:
  - 2019 Cotabato earthquakes
  - A magnitude 6.6 earthquake strikes the southern part of the island of Mindanao,
    killing at least eight. (GMA News and Public Affairs)
  - At least 42 people were killed during a landslide caused by torrential rainfall
    in the city of Bafoussam, Cameroon. Twenty-six of the victims are children. (Al
    Jazeera)
  - South Airlines Flight 8971
  - The National Bureau of Air Accidents Investigation of Ukraine concludes its investigation,
    stating the accident was caused by the pilot's excessive speed reductions as he
    attempted to land in weather conditions beyond his qualifications. (The Aviation
    Herald)
  International relations:
  - Turkey–United States relations, Armenia–United States relations, Armenian Genocide
    recognition
  - The United States House of Representatives votes 405 to 11 to officially recognize
    the Armenian Genocide as a genocide for the first time. Turkey condemns the resolution,
    describing it as "a meaningless political step", and that "its sole addressees
    are the Armenian lobby and anti-Turkey groups". (Reuters)
  - Israel–Jordan relations
  - Jordan recalls its ambassador to Israel when the latter refuses to release two
    Jordanian citizens whom Foreign Affairs Minister Ayman Safadi says have been held
    illegally for months without charges. They were arrested in August for crossing
    into the West Bank to attend a family wedding. (Reuters)
  Politics and elections:
  - 2019–20 Lebanese protests
  - Lebanese Prime Minister Saad Hariri submits his resignation to President Michel
    Aoun. (Al Jazeera)
  - October 2019 Iraqi protests
  - Shia cleric Muqtada al-Sadr, who heads the current ruling bloc, calls on the opposition
    to help him introduce a motion of no confidence against Prime Minister Adil Abdul-Mahdi.
    (Reuters)
  - 2019 United Kingdom general election
  - The House of Commons votes 438 to 20 to approve Prime Minister Boris Johnson’s
    call to hold a general election on December 12. (Reuters)
