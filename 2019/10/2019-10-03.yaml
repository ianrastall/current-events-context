Date: '2019-10-03'
Source_URI: Portal:Current events/2019 October 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Paris police headquarters stabbing
  - A man stabs five people at the central police headquarters in the French capital
    of Paris, killing three officers and an administrative worker. The attacker, who
    was shot dead by other officers, was an admin worker at the station. (BBC News)
  Disasters and accidents:
  - The Marine Accident Investigation Branch of the UK Department for Transport issues
    a report on the grounding of cargo vessel MV Priscilla on the Pentland Skerries
    off the coast of Shetland, Scotland. The investigation concludes the lone crewmember
    on the bridge was distracted by watching music videos during the nighttime accident.
    The grounding triggered changes in procedures by the Maritime and Coastguard Agency.
    (BBC News)
  - Three people are killed and three others injured in a plane crash at Capital Region
    International Airport in Lansing, Michigan. (WNEM-TV) (WLNS-TV)
  Health and environment:
  - 2019 United States outbreak of lung illness linked to vaping products
  - The Centers for Disease Control and Prevention announces that the number of deaths
    caused by vaping-associated pulmonary injury ("vaping illness") linked to electronic
    cigarettes has risen to 18, with an additional 1,080 injuries reported. The CDC
    says the cause is still under investigation. (USA Today)
  Law and crime:
  - A shooting in Vancouver, Washington, United States leaves at least one dead, and
    several more injured. (The Columbian)
  - Foreign interference in the 2020 United States elections
  - Amid an impeachment inquiry against him, U.S. President Donald Trump says "China
    should start an investigation" into presidential candidate Joe Biden. Chair of
    the Federal Election Commission Ellen Weintraub again explains that "it is illegal
    for any person to solicit, accept, or receive anything of value from a foreign
    national in connection with a U.S. election". (NBC News)
  - 2019 Trump–Ukraine scandal
  - Sources for The New York Times allege that two American diplomats presented a
    statement for Ukrainian President Volodymyr Zelensky to sign wherein Ukraine would
    commit to investigate Joe Biden and his son Hunter Biden. (ANP via Het Laatste
    Nieuws) (The New York Times)
