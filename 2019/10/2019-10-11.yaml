Date: '2019-10-11'
Source_URI: Portal:Current events/2019 October 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iran–Saudi Arabia proxy conflict
  - The Pentagon announces the deployment of 1,000 to 3,000 U.S. troops to Saudi Arabia
    to deter Iranian aggression. (CNN) (ABC News)
  - Iran claims one of its oil tankers was hit in the Red Sea, likely by missiles.
    The Saudi Ports Authority confirms an incident with a tanker near the port of
    Jeddah overnight. (Reuters)
  - Syrian Civil War, 2019 Turkish offensive into north-eastern Syria
  - A car bomb detonates in the Syrian city of Qamishli, killing three and injuring
    nine. The Islamic State claims responsibility for the attack. (Reuters)
  - Five ISIL prisoners escape a Syrian Democratic Forces-run prison near Kobanî,
    Syria, after being shelled by Turkey. (Reuters) (Metro)
  - Turkish artillery mistakenly hits a contingent of United States special operations
    forces on Mashtenour hill in the Kurdish-majority city of Kobanî, according to
    a senior Department of Defense official. (Newsweek)
  - A YPG mortar and rocket attack on the Turkish town of Nusaybin kills eight civilians
    and injures 35 others, according to the governor of Mardin Province. (Reuters)
  - Burkina Faso mosque attack
  - Gunmen kill 16 people during prayers in a northern Burkina Faso mosque. (Reuters
    via India Today)
  Arts and culture:
  - Ethiopian Prime Minister Abiy Ahmed wins the 2019 Nobel Peace Prize for his efforts
    to make peace between Ethiopia and neighbouring Eritrea. (Reuters)
  Business and economy:
  - Thierry Bolloré is fired with immediate effect as the number two of the Renault
    group, reportedly after a power struggle with its president Jean-Dominique Senard.
    (Libération) (BBC News)
  - 2019 Japan–South Korea trade dispute
  - Japan and South Korea hold the first round of talks in Geneva to address a South
    Korea complaint with World Trade Organization over Japanese export controls. (Yonhap)
  - China–United States trade war
  - China and the United States announced a tentative agreement for the "first phase"
    of a trade deal, with China agreeing to buy up to $50 billion in American farm
    products with the United States agreeing to suspend new tariffs scheduled for
    October 15. (Wall Street Journal)
  Disasters and accidents:
  - A cargo plane carrying presidential staff crashes in eastern Democratic Republic
    of the Congo, killing all eight passengers and crew onboard. The Russian embassy
    in Kinshasa says "preliminary information" indicates Russians were on the aircraft.
    (Reuters)
  - Saddleridge Fire
  - A wildfire destroys 25 homes, displaces 100,000 people and burns over 7,500 acres
    of forest in and around Los Angeles. (NPR)
  Law and crime:
  - Manchester Arndale stabbing
  - Four people are stabbed and injured, one critically, in a mass stabbing at the
    Manchester Arndale shopping centre in the Northern Quarter, Manchester, United
    Kingdom. Another person was injured but not stabbed. A man in his early 40s is
    arrested. He was arrested under the Mental Health Act. (BBC News)
  - One Dutch person and two Afghans are remanded in custody for manslaughter and
    assistance to illegal immigrants staying in France, after they sold places in
    inflatable boats for them to reach Great Britain, causing the death of an Iranian
    woman on 9 August. (La Voix du Nord)
  - Uganda announces the plan to pass a bill within weeks which potentially broadens
    the criminalisation of same-sex relations to include the death penalty. (The Independent)
    (Fox News)
  - Censorship in Turkey, Erdoğanism
  - Turkey's Minister of the Interior Süleyman Soylu says almost 500 people were investigated
    and 121 have been detained for "insulting" the Turkish offensive in Syria on social
    media and characterizing Turkey as an "invading" force. (AP via Al-Arabiya)
  Politics and elections:
  - Foreign relations of Argentina, 2019 Venezuelan presidential crisis
  - Argentina announces it has severed diplomatic ties with the disputed Nicolás Maduro-led
    Government of Venezuela in favour of explicit recognition of opposition leader
    Juan Guaidó as interim president of Venezuela in the context of the 2019 Venezuelan
    presidential crisis. (Clarín)
