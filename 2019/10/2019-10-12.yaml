Date: '2019-10-12'
Source_URI: Portal:Current events/2019 October 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Turkish offensive into north-eastern Syria
  - Senior SDF official Redur Xelil says defending ISIL prisons is not a priority
    anymore due to the conflict with Turkey. (BBC News)
  - Prominent Kurdish Syrian politician Hevrin Khalaf is dragged from her vehicle
    on the M4 Motorway and summarily executed along with her driver and eight civilians
    by Turkish-backed Free Syrian Army militants. The killings were recorded by the
    militants, which has since been spread on social media. (The Guardian)
  - Terrorism in Kenya
  - A homemade bomb strikes a Kenyan military vehicle, killing 10. (Reuters)
  - 2019 Ecuadorian protests
  - President Lenín Moreno orders curfew and the militarisation of the capital as
    civil unrest worsens. (Deutsche Welle)
  - Sinai insurgency
  - Shelling in Bir Al Abd, Egypt kills nine members of the same family. A further
    six people are wounded. (Gulf News)
  Disasters and accidents:
  - A Hard Rock Hotel and Casino under construction in New Orleans partially collapses,
    killing one person and injuring at least 18. (The New York Times)
  - Typhoon Hagibis makes landfall in Japan, the biggest storm to hit the region in
    decades, with over seven million people urged to evacuate. (BBC News)
  International relations:
  - 2019 Venezuelan presidential crisis
  - Argentine Foreign Minister Jorge Faurie announces, the day after Argentina severs
    diplomatic ties with the government of Nicolás Maduro, that visas granted to the
    diplomats appointed by Maduro have been revoked and they will be expelled from
    Argentina; the country now recognizes only Juan Guaidó appointees. (Clarín)
  - Border control refuses entry to Venezuela for the Guatemalan President-Elect Alejandro
    Giammattei, who was to visit Juan Guaidó on a diplomatic tour. Giammattei is rerouted
    to Panama. (Financial Times)
  Law and crime:
  - Shooting of Atatiana Jefferson
  - In Fort Worth, Texas, a woman is shot dead in her bedroom by a policeman sent
    to check on her welfare. (BBC News)
  Sports:
  - Eliud Kipchoge finishes a marathon in Vienna in 1 hour, 59 minutes and 40 seconds,
    assisted by a car and using a fleet of pacemakers. (CNN)
