Date: '2019-10-24'
Source_URI: Portal:Current events/2019 October 24
Intelligence_Payload:
  International relations:
  - Japan–South Korea relations, 2019 Japan–South Korea trade dispute
  - Japan and South Korea hold a high-level bilateral meeting for the first time since
    the trade dispute, with Japanese Prime Minister Shinzō Abe meeting with his counterpart
    Lee Nak-yeon. (The Japan Times)
  Law and crime:
  - 2019 Grays incident
  - The people found deceased in a lorry in Essex yesterday are suspected to be Chinese
    nationals. (BBC News)
  - Persecution of homosexuals in Uganda
  - Ugandan authorities announce that they have arrested 16 LGBT activists on suspicion
    of gay sex. (The Guardian)
  - At the Old Bailey a UK jury convicts a British man who traveled to fight against
    the Islamic State of a terror offence for visiting a training camp used by the
    PKK. He is the first UK man found guilty of such a crime, and is remanded in custody
    to await his November 7 sentencing hearing. (BBC News)
  Politics and elections:
  - The remains of former Spanish dictator Francisco Franco are exhumed from Valle
    de los Caídos and are moved to a private mausoleum with his wife Carmen Polo,
    44 years after his death. Some pro-Franco protestors gather outside the national
    mausoleum. (CNN)
  - 2019–20 Lebanese protests
  - As protests enter its eighth day, President Michel Aoun in a televised address
    states he is willing to meet with protestors and offers support for various reforms,
    such as increasing transparency for banks and lifting immunity for government
    officials. He however states that changes “can only happen through state institutions"
    in response to calls to bring down the government. (Al Jazeera)
  - The Chicago Teachers Union's strike enters its sixth school day as it is unable
    to reach an agreement with Chicago Public Schools. (WMAQ-TV)
  - Mueller special counsel investigation, Russia investigation origins counter-narrative
  - U.S. federal prosecutor John Durham's ongoing probe into potential FBI and Justice
    Department misconduct in the time leading up to the 2016 presidential election
    through the spring of 2017 is upgraded to a formal criminal investigation. (New
    York Post)
  Sports:
  - Brandon Taubman, the assistant general manager for the Houston Astros, is fired
    from his position for making "inappropriate comments" toward female journalists.
    (Forbes)
