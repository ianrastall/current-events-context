Date: '2019-10-06'
Source_URI: Portal:Current events/2019 October 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Kurdish–Turkish conflict (2015–present), Northern Syria Buffer
    Zone
  - Following a phone call between U.S. President Donald Trump and Turkish President
    Recep Tayyip Erdoğan, the White House says that Turkish Armed Forces will launch
    an incursion into Syrian Democratic Forces-held northern Syria, and that United
    States Armed Forces will be withdrawing from the region to avoid clashing with
    its NATO ally. (The Guardian)
  Law and crime:
  - List of mass shootings in the United States in 2019
  - Police in Kansas City, Kansas, are seeking two unnamed suspects after two men
    opened fire at a bar, killing four people and wounding another five. (BBC News)
  - Crime in Austria
  - 'An Austrian man kills five people in the town of Kitzbühel, Tyrol: his ex-girlfriend,
    her brother and parents, as well as her new boyfriend. He gives himself up at
    the police station. (Reuters)'
  Politics and elections:
  - The Jordanian government announces it has struck a deal with the teachers' union
    to end a month-long strike that affected at least 1.5 million students. The strike
    was instigated over pay in light of new austerity measures. (Reuters)
  - 2019 Kosovan parliamentary election
  - Following the resignation of Prime Minister Ramush Haradinaj in July, voters in
    Kosovo cast their ballots to elect the new members of the Assembly of the Republic
    of Kosovo. Opposition party, Vetëvendosje, led by Albin Kurti wins in an unprecedented
    victory. (DW)
  - 2019 Portuguese legislative election
  - Portuguese voters head to the polls to elect a new session to the Assembly of
    the Republic. In line with opinion polls, exit polls show the incumbent Socialist
    Party winning the most seats, but likely not quite enough to form a majority.
    (euronews) (Reuters)
  - 2019 Tunisian parliamentary election
  - Tunisian citizens gather to vote in the country's latest parliamentary election.
    (DW)
  Science and technology:
  - Fermi bubbles
  - Scientists say that, using data from the Hubble Space Telescope, they have found
    evidence of a 300,000-year-long burst of radiation originating 3.5 million years
    ago from or near the center of our galaxy, erupting through both galactic poles,
    with effects on the Magellanic Stream, 200,000 light-years away. (EarthSky)
