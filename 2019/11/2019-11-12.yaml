Date: '2019-11-12'
Source_URI: Portal:Current events/2019 November 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gaza–Israel conflict
  - Israel conducts airstrikes on Islamic Jihad Movement in Palestine (PIJ) targets
    in Gaza Strip. (NPR)
  Disasters and accidents:
  - Mondobhag train collision
  - Two passenger trains collide head-on in Kasba, Bangladesh, killing at least 16
    people and injuring over 100. (Yahoo! News)
  - Sea level rise driven by effects of global warming on oceans, Acqua alta
  - An exceptional high tide of hits flooded Venice, Italy. It is the second highest
    acqua alta in Venetian history, after the 1966 Venice flood. Two deaths are reported.
    (NDTV) (BBC News) (The Guardian)
  International relations:
  - Cuba–Spain relations
  - Felipe VI becomes the first ever Spanish Monarch to visit Cuba. (The Washington
    Post)
  Law and crime:
  - LGBT rights in Uganda
  - Police in Uganda raid a gay-friendly bar in Kampala and charge 67 people with
    "common nuisance" in what is described as the "latest attack on Uganda's LGBT
    community". (The New York Times)
  - Crime in China
  - A man attacks a kindergarten class in Kaiyuan, China, with chemical spray, injuring
    51 children and three teachers. (CNN)
  - Crime in Thailand
  - In Chanthaburi Province, Thailand, an ex-policeman shoots and kills two people,
    including a former prime minister's lawyer and a plaintiff, before being killed
    by return fire. (ABC News)
  Politics and elections:
  - 2019 Hong Kong protests
  - As the situation worsens with clashes in the central financial district, police
    say violence is bringing the city to the "brink of total breakdown". Large-scale
    protests continue near the City University of Hong Kong, Chinese University of
    Hong Kong, and other districts including Central and Tai Po. (Reuters)
  - After police shoot a protester with live ammunition, Hong Kong leader Carrie Lam
    speaks out and labels the protesters as "selfish" for "paralyzing" the city and
    urges all students not to take part in protests. (Reuters)
  - Police investigate protesters for attempted murder after they are filmed setting
    a 57-year-old man on fire during an argument. (CNA)
  - November 2019 Spanish general election
  - Prime Minister Pedro Sánchez from the PSOE and Pablo Iglesias, leader of the left-wing
    Podemos, announce a first government agreement that will constitute the first
    coalition government in Spain's democratic history. This follows the failure to
    reach an agreement last summer and the rise of the far-right party Vox. (The New
    York Times)
  - 2019 Catalan protests, Catalan independence movement
  - Protesters block the two main passages between Spain and France. In La Jonquera,
    on the border between Catalonia and France, French National Police try to expel
    rioters. (The Guardian) (BBC News)
  - The Parliament of Catalonia approves a resolution expressing willingness to exercise
    the right to self-determination concretely, mocking the warnings of the Constitutional
    Court, which suspends its effects shortly thereafter. (The New York Times)
  - During the night, some major throughways of Barcelona and Tarragona and national
    roads in Basque Country are blocked for a few minutes. (The Local)
  - 2019 Bolivian protests, Evo Morales government resignation
  - Despite lacking a quorum in a session of the National Congress, Senator Jeanine
    Áñez immediately declares herself President of Bolivia due to the vacancy arising
    from the resignation and exile of Evo Morales. (The New York Times)
  - 2019 United Kingdom general election
  - Nigel Farage announces that his Brexit Party will withdraw its candidates in the
    317 seats that the ruling Conservative Party won in the last general election.
    The move is expected to increase the chances of a Conservative majority in parliament.
    (The Washington Times)
  - Politics of Moldova
  - A vote of no-confidence ousts the government of Prime Minister Maia Sandu after
    breaking the coalition government with Socialist Party. (Reuters)
