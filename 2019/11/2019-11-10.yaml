Date: '2019-11-10'
Source_URI: Portal:Current events/2019 November 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Five Italian soldiers are wounded by a bombing in Kirkuk, Iraq. Three of the soldiers
    are seriously injured, two of whom suffer an amputated leg, while another an amputated
    foot. The Islamic State claims responsibility for the attack. (Fox News)
  - The Armed Forces of the Democratic Republic of the Congo announces it has "neutralized"
    the leader of an offshoot of a Hutu militia, the Democratic Forces for the Liberation
    of Rwanda, in another blow to a "weakened group". (Reuters)
  - Syrian Civil War, 2019 Turkish offensive into north-eastern Syria
  - Turkey says a car bomb near the Syrian city of Tell Abyad killed at least eight
    civilians and injured twenty others. (The Washington Post)
  - 2019 Hong Kong protests
  - Protesters vandalize a subway station as violence breaks out across the New Territories
    amid anger over a demonstrator's death and the arrest of pro-democracy politicians.
    (ABC News)
  Arts and culture:
  - 2019 Japanese imperial transition
  - The new Emperor Naruhito and his wife Empress Masako take part in a parade in
    central Tokyo as tens of thousands of onlookers line the streets in celebration
    of the emperor's enthronement. (Mainichi Shimbun) (Kyodo News Plus) (Associated
    Press)
  Politics and elections:
  - 2019 Bolivian protests, Evo Morales government resignation
  - Bolivian President Evo Morales announces new general elections after accusations
    of fraud. (Deutsche Welle) (The New York Times)
  - Hours after the announcement, Morales resigns from the presidency amid pressure
    from the military and the police in what he deemed a 'coup'. (BBC News) (The Guardian)
  - The constitutional successors of Morales, Vice President Álvaro García Linera,
    President of the Senate Adriana Salvatierra and President of the Chamber of Deputies
    Víctor Borda also resign. Mining Minister César Navarro also announces his resignation.
    (Reuters)
  - Vice President of the Senate Jeanine Áñez becomes the acting president of Bolivia,
    the first woman to ascend to that office. (Time)
  - 2019 Romanian presidential election
  - People in Romania cast their votes in the country's latest presidential election.
    (Deutsche Welle)
  - Israel–Jordan peace treaty
  - Israel returns the territory of the "Island of Peace" to Jordan. (The Times of
    Israel)
  - November 2019 Spanish general election
  - Citizens of Spain head to the polls for the second general election within a year.
    (Deutsche Welle)
  - The PSOE, headed by incumbent Prime Minister Pedro Sánchez, wins the election
    but loses 3 seats and its absolute majority in the Senate. Political deadlock
    remains. (The Guardian)
  - Far-right Vox gains 28 seats and raises from fifth to the third national force.
    (BBC News)
  - The center-right Citizens, the third national force going into the elections,
    goes from 57 seats in Congress to just 10, the biggest seat loss in the election.
    Albert Rivera quits as Citizens' leader as a result. (El País) (The New York Times)
  - 2019 Chilean protests
  - An American white supremacist shoots a protester in Reñaca. Before being detained
    by the police, he uploads a video to YouTube confessing the attack, claiming to
    have fired in self-defense. (The Washington Post)
  - Interior Minister announces the government will propose the creation of a new
    constitution through the existing Congress instead of a constituent assembly as
    requested by the protesters. (Bloomberg News)
  Sports:
  - 2019 MLS Cup Playoffs
  - The Seattle Sounders FC defeat Toronto FC 3–1 at CenturyLink Field to win their
    second MLS Cup. (Major League Soccer)
