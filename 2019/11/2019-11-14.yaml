Date: '2019-11-14'
Source_URI: Portal:Current events/2019 November 14
Intelligence_Payload:
  Business and economy:
  - Ford announces that its new electric SUV will be known as the Mustang Mach-E.
    The "Mustang" model name, previously employed by Ford's muscle cars, could be
    an important asset for the new venture. (Reuters)
  Disasters and accidents:
  - A vehicle collision in Iran's southeastern Sistan and Baluchestan Province kills
    at least 28 people, all Afghan nationals. (BBC News)
  Law and crime:
  - 2019 Saugus High School shooting
  - A school shooting at Saugus High School in Santa Clarita, California, injures
    five students, two fatally. The 16-year-old gunman, identified as Nathaniel Berhow,
    shoots himself, is hospitalized, and dies a day later. (The Cincinnati Enquirer)
  - 2017–18 Spanish constitutional crisis
  - After the admission of the European Arrest Warrant against her, ousted Catalan
    Education Minister Clara Ponsatí, who is in a "self-exile" in Edinburgh, appears
    in court and is bailed without charges hours after. (BBC News)
  Politics and elections:
  - 2019 Hong Kong protests
  - Chief Superintendent of Police of Hong Kong Tse Chun-chung says protesters' acts
    are "another step closer to terrorism". (Reuters)
  - Japan–South Korea relations
  - South Korean government officials announce that Japan and the United States are
    interested in renewing the GSOMIA pact between Japan and South Korea to maintain
    bilateral cooperation between the two nations in defense issues. (Yonhap News
    Agency)
  - 2019 Bolivian protests, 2019 Bolivian political crisis
  - Bolivian police use tear gas to break up a peaceful pro-Morales counter-protest
    in La Paz, then block about a dozen pro-Morales senators from entering the nation's
    legislature. Pro-Morales demonstrators respond with cries of "dictatorship" and
    throw stones at the police. (The New York Times)
  - Politics of Moldova
  - Ion Chicu is sworn in as Prime Minister after the collapse of Maia Sandu's government
    on 12 November. (Reuters)
