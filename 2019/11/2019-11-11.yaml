Date: '2019-11-11'
Source_URI: Portal:Current events/2019 November 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Bolivian protests, Evo Morales government resignation
  - Buildings are set alight in La Paz overnight in apparent retaliatory attacks after
    Evo Morales resigned under pressure from anger over his disputed re-election.
    (Reuters)
  - Armed gangs attack people in Cochabamba who appear to be celebrating Evo Morales's
    resignation. (The New York Times)
  - Drinking water supplies to La Paz and El Alto, Bolivia's top two largest cities,
    are cut off. (The New York Times)
  - Former Bolivian President Evo Morales says he has accepted an offer of political
    asylum in Mexico and boards a Mexican government plane as Bolivian Army troops
    are deployed in the capital. (BBC News)
  - Gaza–Israel conflict
  - The Israel Defense Forces say they've killed Baha Abu al-Ata, leader of the Islamic
    Jihad Movement in Palestine's armed wing known as the Al-Quds Brigades, in an
    airstrike on a building in the Gaza Strip. PIJ confirms the death of Baha Abu
    al-Ata and his wife, vowing to "shake the Zionist entity to its core" in response.
    (Haaretz) (The Jerusalem Post)
  - Syrian Civil War, Israeli involvement in the Syrian Civil War
  - Israeli Air Force jets target a downtown Damascus house belonging to Islamic Jihad
    Movement in Palestine. The strike killed one of the militant's son. (Haaretz)
  - Three blasts targeting the town of Qamishli in Syria kill 6 and wound dozens of
    others. All the blasts were claimed by ISIL. (Al Jazeera)
  - ISIL also claims responsibility for the killing of an Armenian priest and his
    father. (Vatican News)
  - Gunmen kill nine in twin attacks in Punjab a Pakistan province. The ambushes killed
    two police officers, two intelligence officers and an informant in the first attack.
    The second attack happened at a checkpoint when unknown gunmen killed an officer
    and three others. (TOLOnews) (Radio Free Europe/Radio Liberty)
  - A 33-year-old Yemeni man stabbed and wounded three Spanish theatre actors in Riyadh,
    Saudi Arabia. Is not known if the attack is in protest against the war in Yemen
    or for the attacker's opposition to Saudi Arabia’s growing entertainment industry.
    (The Arab Weekly)
  Arts and culture:
  - The wreckage of United States Navy submarine USS Grayback (SS-208), which disappeared
    with its 80 crew members in the East China Sea on February 27, 1944 during World
    War II, is discovered on the sea floor using new drone technology. (BBC News)
    (CNN)
  Law and crime:
  - James Le Mesurier, the British co-founder of the White Helmets, a volunteer civil
    defence organisation in Syria, is found dead near his home in Istanbul, Turkey.
    The cause of death is not known. (BBC News)
  - Cristian Sabou pleads guilty to the murder of Valerie Graves. He is convicted
    and sentenced to life imprisonment with a minimum of 23 years 272 days. (The Guardian)
  Politics and elections:
  - 2019 Hong Kong protests
  - Protesters in Hong Kong call for a city-wide strike amidst an escalation in violence.
    Police shot a man with a live round at point-blank range in Sai Wan Ho district,
    besieged the Chinese University of Hong Kong and the Hong Kong Polytechnic University,
    and fired tear gas inside the campuses. (Reuters)
  - Embattled Hong Kong leader Carrie Lam says on Monday that violence has exceeded
    protesters' demands for democracy and labels the demonstrators as the "people's
    enemy". (Reuters)
  - The Kiribati High Court clears the way for the opposition to file a motion of
    no confidence against President Taneti Mamau amid reported discontent with the
    government's decision to switch its diplomatic recognition of Taiwan to recognition
    of the People's Republic of China. (Radio New Zealand)
  - International reactions to the persecution of Rohingyas in Myanmar
  - Fifty-seven countries file a lawsuit in the International Court of Justice against
    Myanmar, formally accusing their government of committing a genocide against the
    country's Rohingya population. (ABC News)
  - 2019 United Kingdom general election
  - Major parties put forward veterans' platforms for Remembrance Day, the first in
    a campaign season since the 1923 election, with the Conservatives proposing an
    amendment to the Human Rights Act so that it will no longer apply to The Troubles
    or other 20th-century actions and the Labour Party promising extra childcare for
    military families and a new railcard for veterans. This is the 100th anniversary
    of the two-minute silence and other Armistice Day commemorations worldwide. (BBC
    News)
  Science and technology:
  - Transit of Mercury
  - In a rare celestial event, Mercury passes directly between Earth and the Sun for
    five and a half hours. Mercury's next transit will be in 2032. (CBS News)
