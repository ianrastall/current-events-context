Date: '2019-11-27'
Source_URI: Portal:Current events/2019 November 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - Allied Democratic Forces insurgency
  - Islamist militants of the Allied Democratic Forces kill nineteen people near the
    city of Oicha in the Democratic Republic of the Congo, following a week's worth
    of protests against the mass killings from rebels that killed four others near
    a United Nations base. (Reuters)
  - Second Libyan Civil War
  - The eastern-based Libyan National Army loyal to Field Marshal Khalifa Haftar recaptures
    the strategic Elephant Field oil field in southwestern Libya after driving out
    GNA forces with airstrikes. (Reuters)
  - 2019 Iraqi protests
  - Iraqi protesters storm and set fire to the Iranian Consulate General in Najaf.
    (Reuters) (Al Jazeera)
  - War in Afghanistan (2001–2021)
  - A roadside bomb in Kunduz Province kills 15 civilians and injures two others.
    (Al Jazeera) (VOA)
  Disasters and accidents:
  - A chemical plant producing butadiene in Port Neches, Texas, United States, explodes
    and burns. It damages thousands of buildings over several square miles and sending
    three workers to the hospital. (Yahoo! News)
  - A fire at a Minneapolis apartment building leaves five dead and three injured.
    (The New York Times)
  International relations:
  - China–United States relations, Hong Kong–United States relations, 2019 Hong Kong
    protests
  - U.S. President Donald Trump signs the Hong Kong Human Rights and Democracy Act
    into law despite strong opposition from China. The bill means the U.S. will only
    trade with Hong Kong if it retains enough autonomy and bans the export of crowd-control
    munitions to Hong Kong Police Force. (Reuters)
  Politics and elections:
  - 2019 Guinea-Bissau presidential election
  - The latest presidential election in Guinea-Bissau has to go into a second round
    on December 29 as no candidate managed to win more than 50% of the votes during
    the first round. The second round will be a run-off between Domingos Simões Pereira
    and Umaro Sissoco Embaló while incumbent president José Mário Vaz was eliminated
    from the race. (DW)
  - 2019 Namibian general election
  - Citizens of Namibia head to the polls to elect both the country's president and
    National Assembly members. (The Washington Post)
  - Ninth European Parliament
  - The European Parliament confirms the Von der Leyen Commission, which will begin
    acting on December 1. (DW)
  Science and technology:
  - Following a public outcry, Twitter apologises and backtracks one day after saying
    that it would begin deleting inactive accounts outside the United States on December
    11, after users were upset that the measure would cause the removal of accounts
    belonging to users who had died. It now says that it will first implement a process
    for "memorialising" dead users. It would have been the first large scale cull
    of inactive accounts on the social media platform. (BBC News)
  Sports:
  - The Arena Football League announces that it has filed for Chapter 7 bankruptcy
    and will immediately cease operations. This marks the effective end of the 32-year-old
    league, and the second liquidation bankruptcy in its history. (USA Today)
  - City Football Group (CFG) owner Khaldoon Al Mubarak, who is also chairman of Premier
    League club Manchester City F.C., the fifth most valuable association football
    club in the world, agrees to sell a $500 million stake to American private equity
    firm Silver Lake Partners, making CFG the most valuable association football group
    in the world. (Reuters) (BBC News)
