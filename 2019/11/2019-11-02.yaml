Date: '2019-11-02'
Source_URI: Portal:Current events/2019 November 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - A car bomb explodes in Tell Abyad, Raqqa Governorate, on the Turkish border. It
    kills 13 people and wounds more than 30 others, mostly civilians. (Reuters)
  - War in Afghanistan
  - A bomb blast kills nine children, aged seven to ten, who were on their way to
    school in Takhar Province. (BBC News)
  - Islamic State of Iraq and the Levant
  - Turkish Interior Minister Süleyman Soylu announces that ISIL prisoners will be
    sent back to their home countries. (Reuters)
  - ISIL claims responsibility for the attack in Mali on 1 November that killed 54.
    (NBC News)
  - ISIL – Sinai Province pledges allegiance to the new caliph, Abu Ibrahim al-Hashimi
    al-Qurayshi. (Voice of America)
  - Illegal militant loggers in the Amazon rainforest shoot dead an indigenous activist
    named and wounds another. (Reuters)
  Business and economy:
  - The United Kingdom imposes an immediate moratorium on hydraulic fracturing, also
    known as "fracking", a technique for the recovery of oil or gas reserves. (Reuters)
  Politics and elections:
  - 2019 Hong Kong protests
  - Protestors vandalize numerous businesses, such as the headquarters of HSBC and
    the offices of Xinhua News Agency, and set fire to the entrance of numerous metro
    stations after police violently clashed with protestors earlier in the day. (Reuters)
  - 2019 Iraqi protests
  - Thousands of protestors block the roads leading to Umm Qasr Port near Basra, demanding
    the end to foreign influence in the country. The blockades were set up after security
    forces clashed with protestors earlier. (Al Jazeera)
  Science and technology:
  - A shipwreck stuck at Niagara Falls moves for the first time in 101 years due to
    high winds and heavy rains. (MSN)
  Sports:
  - 2019 Rugby World Cup
  - South Africa defeat England 32–12 to be crowned World Champions for the third
    time. (NBC Sports)
