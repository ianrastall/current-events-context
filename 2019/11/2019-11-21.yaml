Date: '2019-11-21'
Source_URI: Portal:Current events/2019 November 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Bolivian protests
  - Bolivian riot police fire tear gas to break up a funeral procession that had turned
    into massive anti-government protest. (France 24) (International Business Times)
    (Reuters)
  Disasters and accidents:
  - Two USAF airmen are killed when two planes collide at Vance Air Force Base in
    Enid, Oklahoma, United States. (Associated Press)
  - An explosion at a fireworks factory in the town of Barcellona Pozzo di Gotto,
    Sicily, Italy, kills five people and injures two others. (Sky News)
  International relations:
  - Cross-Strait relations
  - After the running mate for the presidency of Taiwan for Tsai Ing-wen, William
    Lai, says he supports Taiwanese independence, China condemns the move as a "disaster"
    which crosses a red line China is not willing to accept. (Reuters)
  Law and crime:
  - 2019 Hong Kong protests
  - The Hong Kong High Court denies the lift of a travel ban imposed on pro-democracy
    activist Joshua Wong, who was scheduled to travel to the United Kingdom to receive
    a human rights award from the two houses of the British Parliament. The judge
    cites the risk of absconding and says he can remain in the city to help restore
    peace. (The Independent)
  - 2019 Chilean protests
  - Amnesty International releases a report regarding human rights violations committed
    by the Carabineros and the Armed Forces against peaceful protesters. (Reuters)
  - Investigations involving Benjamin Netanyahu
  - Prime Minister of Israel Benjamin Netanyahu is officially indicted by Attorney
    General Avichai Mandelblit for bribery, fraud, and breach of trust. Netanyahu
    protests the allegations as being part of a political "witch-hunt" against him.
    (The Guardian)
  - 2019 Iranian fuel protests
  - The Supreme National Security Council gradually restores the internet to some
    provinces and parts of Tehran, after shutting it off nationwide five days ago
    to counteract protests. (Al Jazeera)
  - Nine Extinction Rebellion protesters are arrested for storming U.S. House of Representatives
    Speaker Nancy Pelosi’s office. (Washington Post)
  Politics and elections:
  - Vanuatu backtracks on a controversial law that would have allowed immigration
    authorities to racially profile and closely follow people from the Middle East.
    (RNZ)
  - 2019 Colombian protests
  - Thousands of protestors take to the streets in Colombia demanding the resignation
    of President Iván Duque Márquez. The protests were instigated over controversial
    tax and labor reforms proposed by Congress, murders of indigenous leaders, and
    the government’s failure to implement the FARC peace deal. (Washington Post)
