Date: '2019-11-30'
Source_URI: Portal:Current events/2019 November 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - ADF insurgency in the Democratic Republic of the Congo
  - Twelve civilians are killed in an attack by militants. (Al Jazeera)
  - Two alleged rebels are lynched by civilians who suspected that the two were involved
    in the deaths of dozens of civilians since November 5. (The Straits Times)
  - The DR Congo armed forces say that they have killed a top militant, Mouhamed Mkubwa
    Islam, who is one of three leaders of the insurgency. (CGNT)
  Disasters and accidents:
  - Nine people are killed and another three are injured in a plane crash in Sioux
    Falls, South Dakota, United States. (USA Today)
  International relations:
  - Japan–North Korea relations
  - In an insult-laden statement, North Korean media warn Japanese Prime Minister
    Shinzō Abe that he "may see a real ballistic missile in the near future." (Reuters)
  Law and crime:
  - Samoa measles epidemic
  - The Prime Minister of Samoa, Tuilaepa Sailele Malielegaoi, says that he will propose
    a law which would penalize parents who refuse to vaccinate their children, amid
    an ongoing epidemic that has killed 44 people, mostly children under the age of
    four. (RNZ)
  Politics and elections:
  - Protests against poor living conditions break out in the central town of Jilma,
    Tunisia after a man set himself on fire for the same reason on Friday. Police
    use tear gas to disperse the protestors. (Reuters)
