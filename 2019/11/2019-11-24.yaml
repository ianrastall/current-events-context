Date: '2019-11-24'
Source_URI: Portal:Current events/2019 November 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Taliban insurgents storm a checkpoint in Daykundi Province, killing eight Afghan
    Army personnel. After reinforcements were sent to the area, Afghan soldiers drive
    off the attackers, killing at least 20 of them. (Washington Post)
  - A grenade attack in Kabul hit a United Nations car killing one foreigner and injuring
    five others. (Reuters)
  - 2019 Iraqi protests
  - Security forces opened fire on protesters, killing nine and wounding dozens. (Reuters)
  - 2019–20 Lebanese protests
  - Clashes between anti-government protestors, and Hezbollah and Amal Movement supporters
    break out when the former group blocked a main bridge in downtown Beirut. At least
    five people are injured. (Reuters)
  Disasters and accidents:
  - 2019 Busy Bee crash
  - A plane crashes shortly after takeoff in a densely populated neighborhood of the
    city of Goma, Democratic Republic of the Congo, killing all the 19 people on board.
    About ten other people are killed on the ground. (Reuters) (BBC News)
  International relations:
  - Foreign relations of Tuvalu
  - Tuvaluan Foreign Minister Simon Kofe says Tuvalu rejects Chinese offers to build
    artificial islands for his country, which deals with rising sea levels because
    Tuvalu sees the offers as an "attempt to reduce Taiwanese influence in the Pacific
    region". Tuvalu is one of four Pacific nations to recognize Taiwan in the One-China
    policy dispute. (RNZ)
  Politics and elections:
  - 2019 Bolivian political crisis
  - Bolivia's legislative assembly approves the annulment of the October general election
    and the holding of new elections. Ex-president Evo Morales is barred from participating.
    (DW)
  - 2019 Guinea-Bissau presidential election
  - Citizens of Guinea-Bissau head to the polls to vote for a new president amidst
    political turmoil. (Euronews)
  - 2019 Hong Kong protests, 2019 Hong Kong local elections
  - Local elections are held in Hong Kong. Barring military intervention from Beijing,
    the outcome is seen as a major indicator for the political future of the protest-ridden
    region. (DW)
  - With a record 71% turnout, the pro-democracy camp wins 333 of 452 seats up for
    election. Jimmy Sham, one of the leaders of the protest, won in his electorate
    while major pro-Beijing leader Junius Ho lost in his. (Reuters)
  - 2019 Romanian presidential election
  - People of Romania cast their vote in the second round of the latest presidential
    election. (DW)
  - 2019 Uruguayan general election
  - Uruguay holds the second round of the 2019 presidential election. (Al Jazeera)
  - 2020 Democratic Party presidential primaries, Michael Bloomberg 2020 presidential
    campaign
  - Former Mayor of New York City Michael Bloomberg announces he's running for the
    presidency as part of the Democratic ticket. (NPR)
  - U.S. Secretary of Defense Mark Esper forces Navy Secretary Richard V. Spencer
    to resign over his handling of the court martial of Navy SEAL Eddie Gallagher.
    (Reuters)
  Sports:
  - 2019 Campeonato Brasileiro Série A
  - With four rounds to go, Flamengo wins the Brazilian league for the sixth time.
    They are the first team since 1963's Santos FC to win the national league and
    the Copa Libertadores on the same weekend. (Globo Esporte)
  - 2019 CFL season
  - The Winnipeg Blue Bombers win the 107th Grey Cup, defeating the Hamilton Tiger-Cats
    33-12, in Winnipeg's first Grey Cup win since 1990. Winnipeg running back Andrew
    Harris becomes the first player in Grey Cup history to be named both Most Valuable
    Player and Most Valuable Canadian. (Sportsnet)
