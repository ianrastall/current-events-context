Date: '2019-11-05'
Source_URI: Portal:Current events/2019 November 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War, Yemeni peace process
  - Yemen and the Southern Transitional Council sign a power-sharing deal in Riyadh,
    Saudi Arabia, to put an end to infighting between the two groups in Aden. (Al
    Jazeera)
  - Mexican Drug War
  - LeBarón family massacre
  - U.S. President Donald Trump offers Mexico military support to help defeat drug
    cartels, should his counterpart Andrés Manuel López Obrador request help, after
    nine American Mexican Mormon fundamentalists, including six children, are killed
    in an ambush by suspected cartel members in Sonora, northern Mexico. (The Independent)
  Law and crime:
  - LGBT rights in the Cook Islands
  - The Cook Islands announces it will retain its ban on homosexual practices by men
    and that it will be extended to women as well. Homosexuals face up to seven years
    of imprisonment on the islands. (Radio New Zealand)
  - Crime in Italy
  - Three firefighters are killed while two others and a policeman are injured after
    an explosion at an abandoned farm building in Quargnento, Piedmont, Italy. The
    explosion was caused by two bombs placed in the building. (Fox News)
  - Murder of Ana Kriégel
  - An Irish judge sentences two 15-year-old boys to jail for the 2018 murder of 14-year-old
    Ana Kriégel in suburban Dublin. The boys were 13-years-old at the time they murdered
    her and are the youngest people convicted of murder in Ireland. They have not
    been named due to their age. One boy was sentenced to life in detention to be
    reviewed after twelve years—he was also sentenced to eight years for sexual assault
    to run concurrently with the murder sentence. The other boy was sentenced to 15
    years in prison, but his sentence will be reviewed after eight years instead of
    twelve. Her parents said that "justice has been served for Ana", but about the
    sentences that "forever is not long enough". (RTE News and Current Affairs) (RTE
    News and Current Affairs2)
  - Impeachment inquiry into Donald Trump
  - Gordon Sondland, the United States Ambassador to the European Union, reverses
    his previous testimony, admitting to a quid pro quo in the withholding of military
    aid for Ukraine. (The New York Times)
  Politics and elections:
  - 2019 Virginia elections, 2019 Kentucky gubernatorial election
  - Democrats win majorities in both houses of the Virginia General Assembly (Senate
    and House), resulting in Democratic trifecta control of the governorship and General
    Assembly for the first time since 1993. Democratic Kentucky Attorney General Andy
    Beshear defeats Republican incumbent Matt Bevin to win the governorship of Kentucky.
    (Vox) (The Washington Post) (CNN)
