Date: '2019-11-25'
Source_URI: Portal:Current events/2019 November 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Protestors storm the MONUSCO headquarters in Beni, Democratic Republic of the
    Congo, and set UN vehicles on fire in anger at the peacekeepers' failure to stop
    the Allied Democratic Forces insurgency. Congolese security forces fire at the
    crowd to disperse them, killing at least two. (Al Jazeera)
  Business and economy:
  - Transport for London announces it will not grant a new license to operate to Uber,
    citing safety failures. The company will appeal. (BBC News)
  Disasters and accidents:
  - 2019 Ménaka helicopter crash
  - Thirteen French soldiers are killed in a helicopter crash during an operation
    against jihadists in Mali. (BBC News)
  Health and environment:
  - 2019 Samoa measles outbreak
  - Fijian Health Minister Ifereimi Waqainabete warns that police will be deployed
    to areas under quarantine if people continue not to respect the order to stay
    at home if they have measles, amid an ongoing outbreak of the illness in various
    Pacific island nations. (Fiji Times) (RNZ)
  International relations:
  - Iran–Israel relations, Iran–Saudi Arabia relations, Iran–United States relations,
    2019 Iranian protests
  - Head of the Revolutionary Guards Hossein Salami delivers a televised speech toward
    Israel, Saudi Arabia, the United States and those who are protesting against the
    government in which he says "We will destroy you" if they cross Iran's red line.
    (Haaretz) (The Washington Post)
  Law and crime:
  - Essex lorry deaths
  - The driver of the lorry in which 39 Vietnamese migrants were found dead in Grays,
    Essex, England, pleads guilty to conspiring to assist unlawful immigration. (The
    Independent)
  - Catholic Church sexual abuse cases in Argentina
  - Two Roman Catholic priests are sentenced to more than 40 years in prison for sexually
    assaulting deaf children at a church school in Mendoza Province, Argentina; the
    school's gardener also receives an 18-year sentence. (BBC News) (The Guardian)
  Science and technology:
  - Tim Berners-Lee, creator of the World Wide Web, launches a World Wide Web Foundation
    scheme Contract for the Web. (CNBC)
