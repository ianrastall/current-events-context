Date: '2019-11-20'
Source_URI: Portal:Current events/2019 November 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Israeli military launches airstrikes on dozens of Quds Force targets in Damascus
    and surrounding towns in response to a missile intercepted the previous day over
    the Golan Heights. The Syrian Observatory for Human Rights reports 23 are killed,
    including several Iranian fighters. (Associated Press)
  - Missiles and airstrikes strike a crowded facility in Qah and Idlib, killing approximately
    over 20 including women and children. Activists claim that Syrian Armed Forces
    were behind the attack. (BBC News)
  - War in Afghanistan
  - The U.S. military says two American service members have been killed in a helicopter
    crash in Afghanistan. (USA Today)
  - 2019 Bolivian protests
  - The death toll in the protests rises to 30. (Reuters)
  - 2019 Iranian fuel protests
  - According to the human rights organization Amnesty International, casualties are
    estimated to be around 106 protestors and rising. (Radiofarda)
  - Yemeni Civil War (2015–present)
  - Houthi militants release the South Korean ship they captured two days prior. (Al
    Jazeera)
  - Allied Democratic Forces insurgency
  - Militants target civilians in the DR Congo near the border with Uganda, killing
    19 and kidnapping others. Churches were also burned down in two separate attacks.
    It is believed that the Allied Democratic Forces is behind the attacks. (Reuters)
  Arts and culture:
  - Prince Andrew, Duke of York, halts all public duties in light of allegations of
    rape, saying his "ill-judged" association with American convicted sex offender
    Jeffrey Epstein had caused major disruption to the royal family's work. (Reuters)
  Business and economy:
  - 2019 Japan–South Korea trade dispute
  - South Korea's finance minister Hong Nam-ki presses Japan to take steps to lift
    its export restrictions. (Yonhap)
  - 2019 Hong Kong protests
  - Joshua Wong calls on HSBC to re-open an account used to support the pro-democracy
    movement in the city. (The Telegraph)
  - Google announces it will ban targeted ads that use voter data, effective within
    a week. (Reuters)
  International relations:
  - Iran–Saudi Arabia relations
  - King Salman of Saudi Arabia blames Iran for the "chaos and destruction" their
    multiple missiles and drone attacks have caused in the country, and reiterates
    that his country will not hesitate to defend itself. (Reuters)
  - Pope Francis arrives in Bangkok for a three-day visit to Thailand. The Catholic
    Church in Thailand is celebrating 350 years of Holy See recognition of the Church
    in Thailand. Bishop Arpondratana of Chiang Mai diocese states that the pope's
    visit is important for the Church in all of Asia. (Catholic News Agency)
  Law and crime:
  - Tongan authorities contact their New Zealand counterparts to warn them of death
    threats against Tongan Prime Minister Pohiva Tuʻiʻonetoa on social media. (RNZ)
  - Ali al-Haj, secretary of the Islamist Popular Congress Party, is arrested after
    Sudanese authorities summon him for questioning over his role in the coup d’état
    that put former President Omar al-Bashir in power. (Reuters)
  - International reactions to the Rohingya genocide
  - The office of Myanmar's civilian leader, Aung San Suu Kyi, releases a statement
    announcing that she will personally lead the legal team defending the Burmese
    military's actions against the Rohingya minority in the International Criminal
    Court. Nine days earlier, fifty-seven countries led by The Gambia filed a lawsuit
    in the International Criminal Court, formally accusing Myanmar of committing genocide
    against the Rohingya. (CNN) (TIME)
  Politics and elections:
  - 2019 referendum on the creation of a Sidama region
  - The Sidama people of Ethiopia go to the polls for a referendum on further autonomy
    for the Sidama Zone. If autonomy is approved, then local taxes, education, security
    and laws will be decided by the Sidama instead of the government of Ethiopia.
    (Reuters)
  - 2020 Israeli legislative election
  - Blue and White Alliance leader Benny Gantz's mandate to form a new government
    expires. As both he and Prime Minister Benjamin Netanyahu failed to form one,
    Israel will likely face a third election in two years. (Al Jazeera)
