Date: '2019-11-13'
Source_URI: Portal:Current events/2019 November 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - November 2019 Kabul bombing
  - A suicide car bomb kills 12 people and injures 20 others near the Interior Ministry
    in Kabul, Afghanistan. (Al Jazeera) (Yahoo! News)
  - Terrorism in Indonesia
  - A suicide bomber kills himself and injures six other people when he detonates
    near police headquarters in Medan, Indonesia. (Deutsche Welle)
  - Gaza–Israel conflict; Gaza–Israel clashes (November 2019)
  - Israeli airstrikes leave 22 Palestinians (20 militants and 2 civilians) dead and
    dozens injured. (Haaretz)
  - More than 200 rockets are fired into Israel from Gaza. (New York Post)
  - An Islamic Jihad rocket commander and five relatives are killed in an Israeli
    airstrike. (The Times of Israel)
  - Islamist insurgency in Mozambique, Mozambique–Tanzania relations
  - Jihadists kill six civilians and injure seven in a village near the Mozambique–Tanzania
    border. All the victims are Tanzanian nationals, while the terrorists are identified
    as Mozambicans. (News24)
  - Crime in Poland
  - Two people are arrested in Poland for planning to kill Muslims in an attack inspired
    by the 2011 Utoya/Oslo attacks by Norwegian mass murderer Anders Behring Breivik,
    and the Christchurch, New Zealand mosque shootings. (Reuters)
  Disasters and accidents:
  - A bus collision with a truck near Nitra kills 13 people and leaves at least 17
    wounded. The disaster is the deadliest in Slovakia in a decade. (Reuters)
  International relations:
  - Japan–North Korea relations, Japan–South Korea relations
  - South Korean media reports that between May and September, Japanese Prime Minister
    Shinzō Abe sent personal letters to North Korea's Kim Jong-un to hold bilateral
    meetings to ease tensions between the two countries. A Japanese government spokesman
    denies the report. (The Japan Times)
  - Foreign relations of Bolivia, Foreign relations of Venezuela, 2019 Venezuelan
    presidential crisis
  - Interim President of Bolivia Jeanine Áñez officially establishes relations with
    Juan Guaido's government after he recognizes her as President of Bolivia on Twitter.
    (Daily Sabah)
  Law and crime:
  - Catholic Church sexual abuse cases
  - The Australian High Court agrees to hear a final appeal from ex-Vatican treasurer
    and convicted child sex offender George Pell, who was found guilty of sexually
    assaulting three teenage choirboys. (Reuters)
  - After the South Korean government launches an investigation into comfort women,
    a survivor tells the press that Japan "lacked honor" for failing to attend the
    South Korean court's proceedings. (Reuters)
  Politics and elections:
  - 2019 Hong Kong protests
  - Hong Kong leader Carrie Lam vows not to give in to protesters as chaos continues
    into Wednesday morning. (The Straits Times)
  - Schools, transport links and businesses close amid rising clashes in the city.
    (Reuters)
  - 2019 Bolivian protests, Evo Morales government resignation
  - Bolivia's exiled former president Evo Morales rejects the presidency of opposition
    senator Jeanine Áñez, but police bar lawmakers from his party from entering the
    legislature to undo it. (The Washington Post)
  - Two people were killed on in clashes between Bolivian police and supporters of
    former president Evo Morales. In total, 10 people have been killed so far since
    political turmoil broke out in Bolivia. (Al Jazeera)
  - Politics of Tunisia
  - Rached Ghannouchi is elected Speaker of the Assembly of the Representatives of
    the People of Tunisia. (France 24)
