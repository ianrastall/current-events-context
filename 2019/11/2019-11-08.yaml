Date: '2019-11-08'
Source_URI: Portal:Current events/2019 November 8
Intelligence_Payload:
  Disasters and accidents:
  - A 5.9-magnitude earthquake strikes 60 km (35 miles) from Hashtrud, East Azerbaijan
    Province, in northwestern Iran, killing at least six and injuring more than 300.
    The United States Geological Survey warns that "significant casualties are likely
    and the disaster is potentially widespread". (Al Jazeera)
  - An explosion in a mine in Teutschenthal, Saxony-Anhalt, Germany, injures two workers
    and traps around 30 underground in a secure area. All are rescued several hours
    later. (Deutsche Welle)
  Law and crime:
  - Takuma Sakuragi, a 76-year-old former Japanese assemblyman from Inazawa, Aichi,
    is sentenced to life in prison by the Guangzhou City First Intermediate Court
    in southern China for smuggling drugs hidden in his suitcase at Guangzhou Baiyun
    International Airport in October 2013. He had been detained by Chinese authorities
    since then. (Kyodo News Plus) (Los Angeles Times)
  - A federal judge orders the immediate release of former Brazilian President Luiz
    Inácio Lula da Silva. (Reuters)
  - 2019 Hong Kong protests
  - A student from Hong Kong University of Science and Technology, named Chow Tsz-lok,
    died after suffering brain damage following a fall during anti-government protests.
    (The Guardian) (The New York Times)
  - Impeachment inquiry into Donald Trump
  - During her testimony before U.S. House investigators last month in the impeachment
    inquiry against President Donald Trump, Fiona Hill, Trump's former top adviser
    on Russia and Europe, said that she received death threats and "hateful calls"
    and was the subject of false "conspiracy theories" as part of a targeted harassment
    campaign she claims was implemented after she agreed to cooperate with the inquiry,
    according to a deposition transcript. (NBC News)
  Politics and elections:
  - Turkey's Interior Minister Süleyman Soylu announces that his country will begin
    repatriating ISIL prisoners on Monday. (Reuters)
  - Under pressure of sanctions by ECOWAS, newly appointed Prime Minister of Guinea-Bissau
    Faustino Imbali resigns. (Yahoo! News)
  - 2019 Bolivian protests
  - Several dozen policemen were seen joining the protests against Evo Morales' government
    in at least three cities. Bolivia's defence minister stated that no "military
    measures" would be taken against the policemen, but added that he would "get"
    the disobedient officers. (Reuters) (The Guardian)
