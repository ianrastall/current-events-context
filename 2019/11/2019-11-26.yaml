Date: '2019-11-26'
Source_URI: Portal:Current events/2019 November 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, November 2019 Syria bombings
  - A car bomb kills 17 civilians and injures 20 others in an attack in Ras al-Ayn,
    Al-Hasakah Governorate, Syria. (Reuters)
  - War in Afghanistan
  - An American is identified as the victim killed in a Kabul grenade attack on a
    United Nations convoy. (The Jerusalem Post)
  - Terrorism in the Netherlands
  - Two men are arrested in the Netherlands after plans were uncovered to commit a
    jihadist attack with explosive belts and car bombs. (NL Times)
  - Insurgency in Jammu and Kashmir
  - A grenade attack kills two including a government official and wounds four others.
    Two militants were also killed in another incident. (Al Jazeera)
  - Iraqi insurgency (2017–present)
  - Multiple bombings in Baghdad kill six people and injure 15 others. Most are motorcycle
    bombs. (U.S. News and World Report)
  Business and economy:
  - Foreign relations of Israel
  - It is announced that in a United States-backed peace plan, Israeli citizens will
    be allowed to visit the Gulf States for "business and political purposes", starting
    next year. (Middle East Monitor)
  - China–United States trade war
  - Discount retailer Dollar Tree reports that it will miss its analysts' profit expectations
    for this quarter, blaming the shortfall on the tariff costs imposed by the United
    States government on products it imports from China. (Reuters)
  Disasters and accidents:
  - 2019 Albania earthquake
  - A 6.4 magnitude earthquake hits coastal Albania, bringing down many buildings
    and leaving people trapped under rubble. The Defense Ministry confirms 30 people
    killed and 650 others injured, mostly in Durrës County. (BBC News)
  - Pope Francis prays for victims of the earthquake in Albania and sends “heartfelt
    condolences” to Albanian President Ilir Meta. The quake's epicenter is less than
    20 miles from Tirana, the country’s capital city, which has a population of 900,000.
    Additional earthquakes occurred in southern Bosnia and the Greek island of Crete.
    (CNA)
  Health and environment:
  - 2019 Samoa measles outbreak
  - The death toll from the measles outbreak in Samoa has reached 32 with over 2,400
    cases recorded. (ABC Australia)
  Law and crime:
  - Censorship in Vietnam
  - A court in Vietnam sentences a Facebook user to six years in prison for anti-state
    posts on the social media. It is the latest case seen as a crackdown on government
    dissidents. (Reuters)
  - 2019 Chilean protests
  - Human Rights Watch releases a report about "serious" human rights violations committed
    by Carabineros, confirming the findings of Amnesty International published last
    week. (France 24)
  Politics and elections:
  - Politics of Mauritius
  - Acting President Barlen Vyapoory resigns from office. Eddy Balancy, the Chief
    Justice of the Supreme Court of Mauritius, becomes the country's new acting president.
    (L'Express)
  - 2019 Australian Parliament infiltration plot, Chinese intelligence activity abroad
  - ASIO is investigating an alleged plot by the Communist Party of China to install
    an agent into the Parliament of Australia. (ABC Australia)
  Science and technology:
  - 2019 in spaceflight
  - Egypt's first ever communications satellite TIBA 1 is launched by Arianespace
    on an Ariane 5 rocket from the Guiana Space Centre. (Reuters)
