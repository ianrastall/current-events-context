Date: '2019-11-09'
Source_URI: Portal:Current events/2019 November 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Chilean protests
  - Overnight, protesters forcibly storm the Argentine embassy in Santiago and set
    it on fire because of the Argentine government's support for President Sebastián
    Piñera. Ambassador José Octavio Bordón is unharmed and now considering moving
    the embassy. (Buenos Aires Times)
  - 2019 Bolivian protests
  - Police guards outside Bolivia's presidential palace abandoned their posts and
    join the protest against Evo Morales. (Associated Press) (Fox News)
  Disasters and accidents:
  - Bushfires in Australia
  - The bodies of three people killed by bushfires in Australia are found – two near
    Glen Innes, and one at Johns River – as fires that have destroyed at least 150
    houses continue to burn in eastern New South Wales and Queensland. (The Sydney
    Morning Herald)
  - Half a million people are evacuated from the Bangladesh coastal area in preparation
    for the landfall of Cyclone Bulbul. (CNN)
  Law and crime:
  - Ayodhya dispute
  - The Supreme Court of India rules in favor of Hindus over a place of worship that
    has been the center of disputes between them and the Muslim community in the country.
    (Reuters)
  Politics and elections:
  - President of Sierra Leone Julius Maada Bio calls for urgent action on Guinea-Bissau
    to "avoid a civil war". He makes the statement before the Chairman of ECOWAS,
    Nigerien President Mahamadou Issoufou. (The Patriotic Vanguard)
