Date: '2019-11-28'
Source_URI: Portal:Current events/2019 November 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Allied Democratic Forces insurgency
  - An attack on a United Nations center in the Congo by Mai-Mai militants kills three
    Ebola response workers and a police officer. (LA Times)
  - The death toll in November attacks by Islamist militants in the Democratic Republic
    of the Congo increases to 107 from violence in and around Beni since November
    5. (Al Jazeera) (TRT World)
  - 2019 Iraqi protests
  - In one of the deadliest days of the protests so far, Iraqi security forces open
    fire and kill 25 people who were blocking a bridge in Nasiriyah, while 10 people
    are killed in Najaf, and four people are shot dead in the capital Baghdad. The
    Iraqi Armed Forces says an emergency unit had been created to "impose security
    and restore order" in response to the violence. 45 people have been killed by
    security forces in total. (BBC News) (The Guardian)
  - Two Turkish troops are killed by mortar fire in the Akçakale district of Turkey,
    near the Syrian border. (AA)
  - South Korean army officials claim that North Korea launched two projectiles "from
    a super-large caliber multiple rocket launcher." (CNN)
  Disasters and accidents:
  - 2019 Albania earthquake
  - Twenty more bodies are found under destroyed buildings after the earthquake in
    Albania two days ago, bringing the death toll to 50 people. (Shqiptarja.com)
  Health and environment:
  - 2019 Samoa measles outbreak
  - The United Nations blames anti-vaccination messages for the current outbreak of
    measles in the Pacific island nation, where the death toll has risen to 39 and
    is expected to rise as 200 are reported hospitalised, according to the World Health
    Organization. Total cases now soar to near 3,000. (The Guardian) (RNZ)
  International relations:
  - Foreign relations of Benin
  - The government of Benin orders EU ambassador Oliver Nette to leave the country
    after accusing him of "meddling in their internal affairs". (DW)
  - Foreign relations of Bolivia, Foreign relations of Israel
  - Bolivia and Israel reestablish diplomatic relations after Bolivia suspended ties
    over a decade ago as a consequence of Operation Cast Lead. The foreign minister
    of the Bolivian transitional government says President Evo Morales took the decision
    in 2009 "without thinking about the economic and commercial consequences". (The
    Jerusalem Post)
  Law and crime:
  - Censorship in Vietnam
  - In the third case this month, and the second this week, a court in Vietnam convicts
    and sentences a Facebook user to nine years in prison for defaming the ruling
    Communist Party and government. (Reuters)
  - Hillsborough disaster
  - David Duckenfield, the former South Yorkshire Police chief superintendent who
    was in charge of the 1988–89 FA Cup semi-final match between Liverpool F.C. and
    Nottingham Forest F.C. at Hillsborough Stadium, is cleared of manslaughter by
    gross negligence relating to the deaths of 96 Liverpool fans who were crushed
    to death during the match. The verdict sparks outrage from the families of victims.
    (BBC News) (The Guardian)
  Politics and elections:
  - 2019 Hong Kong protests, Hong Kong–United Kingdom relations
  - Following the U.S. legislation regarding Hong Kong, pro-democracy activist Joshua
    Wong urges Western nations, especially the United Kingdom, to "stand with Hong
    Kong" and calls for the penalization of leader Carrie Lam. (Federal News Network)
  - War in Afghanistan (2001–2021), Afghanistan–United States relations
  - U.S. President Donald Trump and First Lady Melania Trump make an unannounced Thanksgiving
    visit to troops at the Bagram Airfield in Afghanistan, their second visit to a
    combat zone since taking office. While there he also claims he has re-started
    talks with the Taliban. (The New York Times)
