Date: '2019-11-03'
Source_URI: Portal:Current events/2019 November 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Ethiopian clashes
  - The death toll of recent clashes in the Oromia Region of Ethiopia rises to 86.
    (Reuters)
  - 2019 Hong Kong protests
  - Four people are injured at a mall as a knife-wielding man attacks a crowd in Hong
    Kong. The suspect, a pro-Beijing Mandarin speaker, is subdued and arrested by
    police. (BBC News)
  - War in Afghanistan (2001–2021)
  - At least nine Afghan security forces are killed in clashes with Taliban forces
    in northeastern Afghanistan. (WION)
  Business and economy:
  - Saudi Vision 2030
  - Saudi Aramco announces it will go public on the Riyadh stock exchange, with shares
    totalling up to two percent of the firm's worth made available at its IPO launch.
    Valued at US$1.2 trillion, the company is being partially privatized to reduce
    the kingdom's economic dependence on oil. (BBC News)
  - McDonald's CEO Steve Easterbrook is fired for having a relationship with an employee.
    Current company president Chris Kempczinski immediately assumes his position.
    (BBC News)
  Disasters and accidents:
  - Thirty-three people are injured, four critically, when a FlixBus overturns at
    an exit near Amiens, France. (BBC News)
  Politics and elections:
  - 2019 Venezuelan presidential crisis
  - Following similar measures by Argentina last month, the government of El Salvador
    expels diplomats of the government of Venezuela led by Nicolás Maduro. (BBC News)
  - 2019 Iraqi protests
  - Protestors storm the Iranian consulate in Karbala, where they set fires around
    the building and replaced the Iranian flag with an Iraqi one. (Al Jazeera)
  Sports:
  - 2019 FIA Formula One World Championship
  - Lewis Hamilton wins his sixth Driver's Championship title at the 2019 United States
    Grand Prix. (Motor Authority)
