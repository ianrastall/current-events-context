Date: '2019-11-29'
Source_URI: Portal:Current events/2019 November 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 London Bridge stabbing
  - A terrorist mass stabbing at London Bridge kills two civilians and injures three
    others. The attacker, Usman Khan, wearing a fake explosive belt, is shot dead
    by police on the bridge. Khan was a former prisoner convicted of terrorism offences,
    and had links to Islamist terrorist groups. (BBC News)
  - War in Afghanistan (2001–present)
  - After a surprise visit by U.S. President Donald Trump, the Taliban say they are
    ready to restart peace talks and reach a ceasefire. (Reuters)
  - 2019 Iraqi protests
  - Protests continue across Iraq with a death toll of seven protesters by unsourced
    reports. Other reports by hospital sources state the death toll is over 20 due
    to Iraqi forces opening fire in Nasiriya. (Al Jazeera) (BBC News)
  - Yemeni Civil War
  - Houthi militants say that they shot down a Saudi Arabian helicopter, killing both
    pilots. Saudi Arabia has not confirmed the incident. (Sputnik)
  Health and environment:
  - 2019 Samoa measles outbreak
  - It is expected that there will be 70 deaths from the illness, and at least 6,500
    people will be infected by the highly infectious disease. (NZ Herald)
  Law and crime:
  - The government of Sudan repeals all laws restricting women's freedom of dress,
    movement, association, work and study, and dissolves the former ruling party.
    Sudanese Prime Minister Abdalla Hamdok praises women on social media and says
    that the laws were “an instrument of exploitation, humiliation, violation, aggression
    on the rights of citizens”. (The Guardian)
  - A national court rules President of Suriname Dési Bouterse guilty of murder. The
    case addresses the execution of 15 government critics in 1982, following the 1980
    Sergeants' Coup led by Bouterse. Six other former military officers are also declared
    guilty. (The Guardian)
  - Police report that three young people have been wounded in a stabbing on a shopping
    street in The Hague, Netherlands. (Reuters)
  - Burning Sun scandal
  - K-pop singer-songwriter Jung Joon-young receives a six-year prison term and former
    boy band member Choi Jong-hoon is sentenced to a five-year term for having sex
    with a woman who was unable to consent, as well as other sex crimes including
    filming women without consent. (AP)
  Politics and elections:
  - 2019 Iraqi protests
  - Prime Minister of Iraq Adel Abdul Mahdi announces plans to offer his resignation
    to the country's parliament as a reaction to the ongoing protest movement. (DW)
  - Prime Minister of Malta Joseph Muscat intends to step down following controversy
    over an ongoing investigation about the murder of investigative journalist Daphne
    Caruana Galizia two years ago. (DW)
  - Former Japanese Prime Minister Yasuhiro Nakasone dies at the age of 101. (NHK
    WORLD News)
