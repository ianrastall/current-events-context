Date: '2019-11-07'
Source_URI: Portal:Current events/2019 November 7
Intelligence_Payload:
  Disasters and accidents:
  - A Cirrus SR22 crashes into a house in Upland, California, killing the pilot. (Los
    Angeles Times)
  Law and crime:
  - LGBT rights in Malaysia
  - Five Malaysian men are sentenced to six months in jail, fined, and caned for "attempting
    gay sex". (Reuters)
  - The International Criminal Court sentences Bosco Ntaganda to 30 years in prison
    for war crimes as leader of the National Congress for the Defence of the People
    which operated in the Democratic Republic of the Congo. (Al Jazeera)
  - 2019 Bolivian protests
  - The mayor of Vinto, Patricia Arce of the ruling MAS party, is attacked by opposition
    protesters who dragged her through the streets barefoot, covered her in red paint
    and forcibly cut her hair. (BBC News)
  - Limbert Guzman, a 20-year-old student, is killed following clashes between supporters
    and opponents of Bolivian President Evo Morales. (Voice of America)
  Politics and elections:
  - 2019 Mauritian general election
  - Citizens of Mauritius cast their vote in the country's latest parliamentary election.
    Militant Socialist Movement, led by incumbent Prime Minister Pravind Jugnauth
    wins a huge majority securing the re-election. (Foreign Brief) (The New York Times)
    (Reuters)
