Date: '2019-11-22'
Source_URI: Portal:Current events/2019 November 22
Intelligence_Payload:
  Business and economy:
  - China–United States trade war
  - The U.S. Federal Communications Commission (FCC) unanimously votes to label Chinese
    telecommunications giants Huawei and ZTE as national security risks, thereby disqualifying
    them from the Universal Service Fund. In a separate vote, the FCC mandates that
    national wireless carriers remove both companies' products from their existing
    networks. The companies have 30 days to appeal. (Reuters)
  - 2019 Japan–South Korea trade dispute
  - South Korea halts its World Trade Organization complaint concerning Japan's tightened
    export controls of key chemicals South Korea uses for computer chips and displays.
    (Voice of America)
  - Amazon files a lawsuit against the United States Department of Defense for awarding
    a US$10 billion cloud computing contract to Microsoft. The company had previously
    accused the Department of bias in their decision, given CEO Jeff Bezos has been
    a vocal critic of U.S. President Donald Trump. (Reuters)
  Health and environment:
  - 2019 Samoa measles outbreak
  - Samoa confirms that 20 persons, all but one under the age of four, have died of
    measles, and 11 more are in critical condition. Authorities recorded 1,644 cases
    since the outbreak began last month. (RNZ)
  International relations:
  - Chagos Archipelago sovereignty dispute
  - The United Kingdom misses a United Nations deadline to return control of the disputed
    Chagos Archipelago to Mauritius, prompting the government of Mauritius to call
    the UK an "illegal colonial occupier". (BBC News)
  Law and crime:
  - Murder of Grace Millane
  - After a three-week trial, a 27-year-old New Zealand man is found guilty of murdering
    22-year-old British tourist Grace Millane in Auckland in December 2018. (BBC News)
  - Former Paraguayan Congresswoman Cynthia Tarragó is arrested alongside her husband
    at Newark Liberty International Airport in Newark, New Jersey and charged with
    money laundering, following an undercover operation from FBI agents who purported
    to be drug traffickers. According to court documents, in addition to money laudering,
    Tarragó offered to traffic drugs herself from Paraguay. (ABC Color) (Última Hora)
    (The Philadelphia Inquirer)
  Politics and elections:
  - 2021 German federal election
  - Annegret Kramp-Karrenbauer, who replaced German Chancellor Angela Merkel as leader
    of the Christian Democratic Union, threatens to stand down as a chancellor candidate
    if her centre-right party continues to disagree over support. (BBC News) (The
    Guardian) (The Telegraph)
  - 2019 Bolivian protests, 2019 Bolivian political crisis
  - Bolivia's new interior minister, Arturo Murillo, files a criminal complaint against
    former President Evo Morales for alleged sedition and terrorism. (The Guardian)
    (Reuters)
