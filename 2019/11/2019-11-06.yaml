Date: '2019-11-06'
Source_URI: Portal:Current events/2019 November 6
Intelligence_Payload:
  Armed conflicts and attacks:
  - Terrorism in Tajikistan
  - Twenty gunmen open fire around a border checkpoint between Tajikistan and Uzbekistan,
    killing a border guard and a policeman. Fifteen assailants are killed and five
    others captured. (Al Jazeera)
  - A knife-wielding man launched a random assault wounding eight people, including
    four foreign tourists and four locals, before being arrested in Jerash, Jordan.
    A Mexican tourist and a Jordanian tour guide are seriously injured. Among the
    injured there is a bus driver stabbed while trying to stop the assailant from
    entering a cafeteria full of tourists. (BBC News)
  - Allied Democratic Forces insurgency
  - Ten civilians are killed by ADF militiamen who crossed the border from Uganda
    into the Beni Territory, North Kivu, DR Congo. (France 24)
  - Insurgency in the Maghreb
  - Thirty-seven people are dead and 60 others are injured after gunmen attack a Canadian
    gold mining company convoy on a road in Burkina Faso. (BBC News)
  - France announces it will send ground troops to three border areas in Burkina Faso.
    (Al Jazeera)
  - 2019 Yala attack
  - Gunmen kill 15 people and injure five at a security checkpoint in Yala Province,
    Thailand. The attack is the most deadly in years. (Reuters) (Bangkok Post)
  - 2019 Hong Kong protests
  - Hong Kong pro-government politician Junius Ho and his assistant are hospitalized
    after being stabbed by a man pretending to be a supporter. The perpetrator is
    arrested. (BBC News) (CNN) (South China Morning Post)
  - LeBarón family massacre
  - A suspect has been arrested for the mass shooting in Sonora, Mexico. (USA Today)
  - 2019 Iraqi protests
  - At least three people are killed, and a further 17 wounded, when security forces
    fire at protestors trying to block a bridge in Baghdad. This is in spite of the
    government announcing the military was banned from using live rounds. (Al Jazeera)
  Business and economy:
  - Facebook–Cambridge Analytica data scandal
  - A court filing by California Attorney General Xavier Becerra reveals for the first
    time that the state launched an 18-month investigation into Facebook’s privacy
    issues in response to the Cambridge Analytica scandal. The filing accuses the
    company of refusing to cooperate with investigators, and asks the court to require
    them to turn over information regarding third-party access to data and changes
    in privacy settings. (Reuters)
  International relations:
  - Israel–Jordan relations
  - Israel releases two Jordanian citizens it held in detention since August, after
    the Jordanian government successfully negotiated for their release on Monday.
    (Al Jazeera)
  - Nuclear program of Iran
  - French media reports that Iranian nuclear scientists began injecting uranium into
    centrifuges in the presence of International Atomic Energy Agency inspectors at
    the Fordow Fuel Enrichment Plant. Effectively it turns the plant from a research
    site into an active nuclear site, in further violation of the Joint Comprehensive
    Plan of Action. (Al Jazeera)
  Law and crime:
  - Dutch police evacuate passengers and crew onboard an Air Europa flight at Amsterdam's
    Schiphol Airport to investigate reports of a "suspicious situation". The airline
    later tweets it was a false alarm. (BBC News) (NL Times)
  - 2019 Chilean protests
  - Regional prosecutor for East Santiago Manuel Guerra announces his intentions to
    investigate 14 police officers for allegedly torturing protestors. (Reuters)
  - Two former Twitter employees are charged for spying on at least 6,000 users on
    behalf of Saudi Arabia. (BBC News)
  Politics and elections:
  - 2019–20 Lebanese protests
  - Protestors sit-in at numerous government ministries, offices of major utility
    company Électricité du Liban, and property development sites at Zaitunay Bay in
    Beirut as protests enter their fourth week. (Al Jazeera)
  - Hundreds of students at schools and universities join the protests. (Al Jazeera)
