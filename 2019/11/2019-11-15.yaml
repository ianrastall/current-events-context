Date: '2019-11-15'
Source_URI: Portal:Current events/2019 November 15
Intelligence_Payload:
  Business and economy:
  - The Iranian government announces that, effective immediately, petrol will be rationed
    to 60 litres per month, and prices will increase 50%. Fuel beyond the limit will
    cost double. Iranians take to the streets to oppose the plan, which results from
    United States sanctions against Iran. (Al Jazeera) (The New York Times)
  International relations:
  - North Korean abductions of Japanese citizens, Japan–North Korea relations
  - Sakie Yokota, the mother of a Japanese girl abducted by North Korea 42 years ago
    at the age of 13, appeals directly to Kim Jong-un to release her and all Japanese
    abductees. She also decries the lack of Japanese government action on the issue.
    (NHK World-Japan)
  - Japan–South Korea relations, Japan–United States relations, South Korea–United
    States relations
  - Japan, South Korea and the United States agree to boost multilateral military
    cooperation and defense issues. (Yonhap News Agency)
  Law and crime:
  - Criminal charges brought in the Mueller special counsel investigation
  - A federal jury convicts Roger Stone of lying to the United States Congress and
    tampering with a witness about his efforts to learn about the anti-secrecy group
    WikiLeaks's release of hacked Democratic emails in the 2016 U.S. presidential
    election. (The Washington Post)
  Politics and elections:
  - 2019 Hong Kong protests
  - A 70-year-old bystander dies after being hit by a brick while filming a clash
    between protesters and residents. Police is treating the act as a murder. (BBC
    News) (South China Morning Post)
  - Pro-Beijing Hong Kong Justice Secretary Teresa Cheng suffers minor injuries after
    being heckled in London. China's Foreign Ministry condemns the protesters. (Reuters)
    (South China Morning Post)
  - 2019 Chilean protests
  - An agreement is signed by most of the political parties supporting a referendum
    in April 2020 regarding the draft of a new constitution through a constituent
    convention. This will be the first time the Constitution of Chile is written with
    popular participation. (The Guardian)
  - 2019 Bolivian protests
  - Security forces open fire on protesters in Cochabamba, killing at least five.
    (CBC News)
