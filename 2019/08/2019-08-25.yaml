Date: '2019-08-25'
Source_URI: Portal:Current events/2019 August 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Lebanese conflict
  - 2019 Beirut drone crash
  - Hezbollah says two Israeli drones went down in the Moawwad neighborhood of Dahieh
    (South Beirut), Lebanon, and they did not shoot them. A small reconnaissance drone
    fell on the roof of the Hezbollah media building, then another drone exploded
    nearby, causing damage to the building. Residents report a loud blast. The Israeli
    Army says it does not comment on "foreign reports". The Lebanese Army confirms
    the drones as Israeli. (AP News) (Al Jazeera) (Reuters)
  - Iran–Israel conflict during the Syrian Civil War
  - Iran denies attacks in southern Syria by Israel hit their installations. The Syrian
    Observatory for Human Rights, an opposition-aligned medium, claims the missiles
    killed one Iranian and two people from Hezbollah. (Times of Israel)
  - 2019 Israeli airstrikes in Iraq
  - Alleged Israeli airstrikes hit a Iran backed Popular Mobilization Forces convoy
    near Al-Qa'im, Iraq. (Al Jazeera)
  - 2019 Hong Kong protests
  - In an escalation of the ongoing protests, a police officer fires a gun whilst
    clearing protesters; this is the first time a gun has been fired by a police officer
    in Hong Kong since 1967. (The Guardian)
  Disasters and accidents:
  - A helicopter and an ultralight airplane plane collide near the town of Inca, on
    the island of Mallorca, Spain, killing seven people including two children, according
    to regional government officials. (Sky News)
  - Lightning strikes on at least two Alaska Airlines planes force them to make emergency
    landings in Southeast Alaska. Lightning also knocked out electrical service to
    the state capital, Juneau. (Kfsk)
  Law and crime:
  - Three people are killed and four others injured in a mass shooting at a house
    party in Hobbs, New Mexico, U.S. (CNN)
  Politics and elections:
  - Rohingya crisis
  - At Kutupalong, the world's largest refugee camp, in Cox's Bazar, Bangladesh, 200,000
    people gather peacefully to remember the day, in 2017, when a violent crackdown
    by Myanmarese security forces compelled 740,000 Rohingya to flee over the border.
    (France24)
  - 2020 Republican Party presidential primaries
  - Conservative radio host and former Illinois congressman Joe Walsh announces his
    run for president, becoming only the second Republican to challenge incumbent
    President Donald Trump. (CNN)
  - 2019 Abkhazian presidential election
  - Partially recognized Republic of Abkhazia holds the first round of the presidential
    election. Incumbent President Raul Khajimba and oppositor Alkhas Kvitsinia heads
    to second round on 8th September. (Eurasianet)
