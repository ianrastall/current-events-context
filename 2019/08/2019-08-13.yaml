Date: '2019-08-13'
Source_URI: Portal:Current events/2019 August 13
Intelligence_Payload:
  Business and economy:
  - China–United States trade war
  - The United States Trade Representative announces a delay until December 15 on
    a significant number of products affected by 10% import tariffs announced on August
    1 and set to be imposed in September. (CNBC) (Reuters)
  - Verizon agrees to sell the social networking site Tumblr to Automattic, owner
    of WordPress.com, for less than $10 million, less than two years after acquiring
    the site in 2017. (Los Angeles Times) (Axios)
  Disasters and accidents:
  - According to Interfax, the governor of Arkhangelsk Oblast dismisses as "complete
    nonsense" the advice by authorities in Severodvinsk to residents of Nyonoksa to
    evacuate on August 14. This follows the accidental explosion on Thursday of what
    is speculated to be a nuclear-powered missile. Russian nuclear agency Rosatom
    says the failed test involved a "nuclear isotope power source" for a liquid-propelled
    rocket engine. (The Independent) (CBS News)
  - Venezuelan migrant crisis
  - A new poll from Consultores 21 suggests that at least 4.7 million Venezuelans
    are living outside of the country, with the range going up to 6 million — 19%
    of the nation's entire population in 2017. (Miami Herald)
  Law and crime:
  - 2019 Sydney stabbing attack
  - A man in Sydney, Australia, stabs and kills one person and wounds another. The
    motive of the suspect, who was arrested at the crime scene, is unknown. (Australian
    Broadcasting Corporation)
  International relations:
  - 2019 Hong Kong anti-extradition bill protests
  - U.S. President Donald Trump tweets that U.S. intelligence informed him that China
    is moving troops to the border with Hong Kong. (Bloomberg)
  Politics and elections:
  - Presidency of Jair Bolsonaro
  - Hundreds of thousands of students, schoolteachers and university professors hold
    demonstrations across Brazil against sweeping cuts in the education budget. Protestors
    also voice opposition to the government's plan to delegate the administrative
    and financial management of federal universities and institutes to a privately-held
    fund. (Agência Brasil) (Telesur English)
  - Earlier in the day, over a thousand Indigenous Brazilian women, representing over
    100 ethnic groups, march on Brasília after an overnight occupation of the headquarters
    of the Ministry of Health's Special Secretariat of Indigenous Health. Protestors
    chanted against the government's recent attempts at municipalization and privatization
    of the Indigenous health subsystem, and called for stricter environmental regulations.
    (BBC News) (Telesur English)
  Science and technology:
  - List of nearest exoplanets
  - Three super-Earth exoplanets are announced orbiting around the nearby red dwarf
    Gliese 1061, one of which orbits within the star's habitable zone. (Arxiv)
