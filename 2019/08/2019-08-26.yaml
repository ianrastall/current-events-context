Date: '2019-08-26'
Source_URI: Portal:Current events/2019 August 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Qousaya attack, Israel–Lebanon relations
  - Lebanese media claims Israeli aircraft targeted a PFLP-GC military site in Qousaya
    town, making it the second attack in Lebanon since the 2006 war after the alleged
    attack in Beirut yesterday.
  - Lebanese President Michel Aoun accuses Israel of a "declaration of war", and asserts
    the right of the country to defend itself from aggression in response to Israeli
    strikes in the Beqaa Valley. (Al Arabiya)
  Business and economy:
  - The Federal Cartel Office in Germany announced that it will appeal a decision
    by a regional court that suspended its restrictions on Facebook's activities.
    The appeal will bring the dispute, over underlying privacy issues, to the attention
    of the country's highest court. (Reuters)
  - Opioid epidemic in the United States
  - An Oklahoma district court finds Johnson & Johnson liable for exacerbating opioid
    addiction in the state, and fines them US$572 million. The company announces it
    will appeal. (Reuters)
  International relations:
  - 45th G7 summit
  - Group of Seven leaders hold their yearly meeting in Biarritz, France. (CNN)
  Politics and elections:
  - Politics of Indonesia
  - Indonesian President Joko Widodo announces North Penajam Paser and Kutai Kartanegara
    regencies as location of the future capital of Indonesia. He says government will
    prepare a bill to submit in the House of Representatives as soon as possible.
    (The Jakarta Post) (The Washington Post)
