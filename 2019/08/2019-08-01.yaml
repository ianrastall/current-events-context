Date: '2019-08-01'
Source_URI: Portal:Current events/2019 August 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - RENAMO insurgency (2013–2019)
  - A peace deal is signed between the leaders of Renamo and the ruling party Frelimo
    in Mozambique, officially ending a conflict that plagued the country for years.
    (DW)
  - Yemeni Civil War
  - 51 security forces, including Southern Movement commander Munir Al Yafi, are killed
    and scores wounded in a rocket attack on a military camp near the city of Aden,
    Yemen. The rocket attack was claimed by Houthi movement. (Anadolu Agency)
  - 13 people are killed by a suicide bomber in Sheikh Othman. The bombing was claimed
    by Islamic State. (The New York Times)
  - Somali Civil War
  - Mayor of Mogadishu Abdirahman Abdi Osman dies from injuries he sustained during
    the 24 July 2019 Mogadishu bombing. (The New York Times)
  Business and economy:
  - China–United States trade war
  - President of the United States Donald Trump announces in a tweet that the United
    States will impose import tariffs of 10% on US$300 billion worth of Chinese exports
    starting September 1. (CNBC)
  Disasters and accidents:
  - The town of Whaley Bridge in Derbyshire, England, is evacuated after heavy rain
    and flooding causes structural damage to the nearby dam at the Toddbrook Reservoir
    amid fears the dam could collapse. A severe flood warning has been issued for
    communities situated along the River Goyt. (BBC News)
  International relations:
  - 2019 Venezuelan presidential crisis
  - U.S. Commerce Secretary Wilbur Ross says that the United States has "a blueprint"
    to recover Venezuela's economy if Nicolás Maduro leaves office as the nation's
    disputed President. (Wall Street Journal)
  - U.S President Donald Trump says that he is considering a blockade of Venezuela
    as the U.S increases pressure on President Maduro to step down. (Reuters)
  Science and technology:
  - List of nearest exoplanets
  - Astronomers from the Max Planck Institute for Astronomy announce the discovery
    of red dwarf star GJ 357 and its three confirmed exoplanets in the Hydra constellation,
    one of which (GJ 357 d) is highly likely to be a super-Earth planet located in
    the system's circumstellar habitable zone where life can exist. The discovery
    was made using NASA's Transiting Exoplanet Survey Satellite (TESS). (The Independent)
