Date: '2019-08-03'
Source_URI: Portal:Current events/2019 August 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 El Paso shooting
  - At least 22 people are killed and 24 others injured in a mass shooting at a Walmart
    in El Paso, Texas. A suspect Patrick Crusius of Allen, Texas was captured alive.
    The case is being investigated as domestic terrorism given that Patrick Crusius
    had posted a 4-page white nationalist manifesto titled The Inconvenient Truth
    on 8chan where he cited a supposed "Hispanic invasion of Texas" and "Simply trying
    to defend my country from cultural and ethnic replacement" as motivation for the
    shooting. The suspect was also inspired by Brenton Tarrant, the perpetrator of
    the Christchurch mosque shooting in New Zealand. (CNN)
  - Indian authorities issue evacuation orders for thousands of people, including
    tourists and Hindu pilgrims heading to the Amarnath Temple for yatra (which has
    been cancelled) to immediately leave Jammu and Kashmir because of security alerts
    about possible militant attacks. Also, the pilgrimage to Machel Mata for yatra,
    which also began on 1 July, has been suspended. (BBC News) (CNN-News18)
  International relations:
  - Argentina–United States relations
  - Argentine President Mauricio Macri receives the U.S. Commerce Secretary Wilbur
    Ross, who expresses full support from the U.S. for his re-election in the upcoming
    Argentine elections. (La Nación)
  Politics and elections:
  - 2018–19 Sudanese protests, 2019 Sudanese transition to democracy
  - The African Union announces the Sudanese military council and the opposition agreed
    to a constitutional declaration that will pave the way to a new transitional government.
    It calls for the new government to be headed by six civilians and five generals,
    and formally places the Rapid Support Forces under military command. (BBC News)
  - Several hundred people are detained by Russian police at unauthorized protests
    in Moscow. The protests occurred because several opposition candidates were disqualified
    from running in the upcoming Moscow City legislative election. (RT)
  Sports:
  - X Games Minneapolis 2019
  - Mitchie Brusco becomes the first skateboarder in history to complete a 1260° (3½-revolution
    aerial spin) in competition. (CBS Sports)
