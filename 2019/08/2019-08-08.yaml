Date: '2019-08-08'
Source_URI: Portal:Current events/2019 August 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Kyrgyzstan's security forces storm the compound of former President Almazbek Atambayev
    on the outskirts of Bishkek for the second time after a failed overnight raid
    left one officer dead. Atambayev and his loyalists are "putting up severe armed
    resistance", according to President Sooronbay Jeenbekov. Atambayev is detained,
    ending a two-day standoff. One officer was killed, while 80 people were injured.
    (Reuters) (BBC News)
  - War in Catatumbo
  - The Human Rights Watch breaks a report on violence around the Colombia—Venezuela
    border since the Colombian peace process, announcing that there has been an ongoing
    War in the since early 2018. (The Guardian) (Human Rights Watch)
  Disasters and accidents:
  - Floods hit the states of Karnataka and Kerala in India, resulting in 11 dead and
    43,000 people being evacuated. (Gulf News)
  Health and environment:
  - Dengue fever outbreaks
  - The Department of Health of the Philippines declares a national dengue epidemic
    in the country, as cases spike to 622 deaths. (Gulf News)
  Law and crime:
  - Uruapan massacre
  - Jalisco New Generation Cartel massacres 19 people, hanging 9 of their desecrated
    bodies from a bridge in Uruapan. (The Guardian)
  Politics and elections:
  - Matteo Salvini, Italian Deputy Prime Minister, announces the collapse of the coalition
    government with the Five Stars Movement, opening the possibility of holding a
    snap election. (Politico)
  - Marek Kuchciński, speaker of the Sejm in Poland, announces his resignation after
    admitting the use of a government jet for 23 personal flights. (Euractiv)
