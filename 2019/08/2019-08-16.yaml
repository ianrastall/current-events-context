Date: '2019-08-16'
Source_URI: Portal:Current events/2019 August 16
Intelligence_Payload:
  International relations:
  - Proposed United States purchase of Greenland
  - In response to reports that U.S. President Donald Trump expressed interest in
    the United States acquiring Greenland, Greenland's Foreign Minister Ane Lone Bagger
    dismisses the idea, noting on Twitter that "a better and more equal partnership
    with Denmark should be the way forward for a stronger and longer-term free Greenland".
    (BBC News) (Reuters)
  - Israel–United States relations
  - According to Israel's Interior ministry, U.S. Congresswoman Rashida Tlaib sends
    a letter to Israeli Interior Minister Aryeh Deri, asking for permission to visit
    her elderly grandmother in the West Bank. Tlaib's request was approved on the
    condition that she "not advance boycott activities for the duration of her visit".
    Tlaib later declines to come, saying she won't let Israel impose "oppressive conditions"
    on her. (CNN)
  Law and crime:
  - Death of Jeffrey Epstein
  - The death of accused sexual trafficker Jeffrey Epstein is ruled a suicide by hanging
    by the New York City Office of the Chief Medical Examiner. Epstein's attorneys
    say they will be conducting their own investigation into his death. (CNN)
