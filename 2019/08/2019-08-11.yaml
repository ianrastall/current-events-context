Date: '2019-08-11'
Source_URI: Portal:Current events/2019 August 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen
  - Saudi coalition forces intervene in Aden. The Southern Transitional Council says
    it will not "negotiate under duress" with their coalition partners. (Reuters)
  - Israeli–Palestinian conflict
  - Israeli riot police clash with Palestinians at the Al-Aqsa Mosque and Temple Mount
    site in East Jerusalem. With holidays coincidentally falling on the same day (11
    August) this year for both Judaism and Islam, some Palestinians began protesting
    the admittance of Jewish visitors to the site, despite a longstanding agreement
    barring Jewish visitors. Following the agreement, the Al-Aqsa police barred Jews
    from the site. Israeli forces then fired rubber bullets and tear gas at people
    inside. The Jews were then admitted, which caused further tensions on both sides
    of the dispute. (Al Jazeera)
  Arts and culture:
  - Pope Francis recalls the 70th anniversary of the Geneva Conventions after his
    Sunday afternoon Angelus address. The 1949 conventions concern the treatment of
    the sick, the wounded, prisoners, and civilians in war. (Vatican News)
  Politics and elections:
  - 2019 Guatemalan general election
  - Conservative Alejandro Giammattei is elected in the second round of the presidential
    election and will take office in January 2020. (BBC News)
