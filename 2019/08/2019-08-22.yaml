Date: '2019-08-22'
Source_URI: Portal:Current events/2019 August 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Papua conflict
  - Indonesia cuts off Internet in the provinces of Papua and West Papua amid pro-independence
    unrest. (The Guardian) (RTÉ)
  - War in Afghanistan (2001–2021)
  - A ninth round of peace talks between the United States and the Taliban starts
    in Doha, Qatar. (Al Jazeera)
  Disasters and accidents:
  - At least four people are dead and more than 100 injured after lightning strikes
    the summit of Giewont in the Tatra Mountains, Poland. Another person is killed
    in Slovakia. (tvn24.pl) (gazeta.pl) (BBC News)
  - At least five people are killed and 21 others injured in a stampede at a rap concert
    in Algiers, Algeria. (BBC News)
  International relations:
  - Japan–South Korea relations, GSOMIA
  - South Korea decides against extending the General Security of Military Information
    Agreement (GSOMIA). South Korean officials express that the exclusion from Japan's
    preferred trade list on 12 August eliminated any benefit to maintaining the agreement.
    (NHK)
  Law and crime:
  - 2018 Chemnitz protests
  - A Syrian man is jailed for manslaughter in relation to a stabbing in Chemnitz,
    Saxony, Germany last year. The killing sparked far-right protests and riots in
    the city. (BBC News)
  - Eileen Sarmenta and Allan Gomez murder
  - Philippine Department of Justice Secretary Menardo Guevarra and Bureau of Corrections
    (BuCor) Director-General Nicanor Faeldon says that former Calauan Mayor Antonio
    Sanchez is ineligible under a 2013 law that credits good conduct time allowance
    (GCTA) for an early release from prison. (Philippine Daily Inquirer)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - Washington governor Jay Inslee drops out of the presidential primaries to focus
    on his re-election bid. (The New York Times)
  Science and technology:
  - The second GPS IIIA satellite is successfully launched by a Delta IV Medium rocket
    from Cape Canaveral Air Force Station. It is the last launch of the Delta IV Medium
    vehicle. (Orlando Sentinel)
  - The uncrewed Soyuz MS-14 mission to resupply the International Space Station commences.
    Its launch is a successful test of a Soyuz spacecraft atop a Soyuz-2 launch vehicle,
    which will replace the Soyuz-FG as the carrier rocket for Soyuz spacecraft starting
    next year. (NASASpaceFlight.com) (Space.com)
