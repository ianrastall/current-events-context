Date: '2019-08-30'
Source_URI: Portal:Current events/2019 August 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen, Yemeni Civil War (2015–present)
  - The Yemeni Ministry of Defense says 300 people were killed and wounded in United
    Arab Emirates air raids in southern Yemen over the two previous days. The UAE
    Foreign Ministry has said the "preemptive operation" targeted "terrorist militias".
    (Al Jazeera)
  - Israel–Lebanon conflict
  - Israeli Defense Forces name three senior Iranian officers and point out that the
    leader of the Quds Force is in Lebanon "with his family". Amid the campaign for
    the 17 September legislative election, Israel says Iran is moving to convert Hezbollah's
    arsenal of what Israel says is more than 100,000 rockets into precision-guided
    missiles. (CNN)
  International relations:
  - Pope Francis sends a video message to the people of Mozambique before his visit
    to the African country next week. He stresses reconciliation after years of conflict.
    The Pontiff says that “although I will be unable to travel beyond the capital,
    my heart reaches out and embraces you all, with a special place for those who
    live in difficulty.” (Holy See Press Office)
  Law and crime:
  - Brexit
  - A Court of Session judge refuses to grant an interdict, the Scottish equivalent
    to an injunction, preventing the upcoming suspension of the UK Parliament. The
    judge rules there is "no cogent need" for such an emergency measure as the suspension
    is not scheduled until September 9. However, a full hearing on the lawfulness
    of the suspension is brought forward to Tuesday. The case against the UK government
    is being brought by Members of the Scottish Parliament. (BBC News)
  - Former Prime Minister Sir John Major announces he will join a case brought by
    anti-Brexit campaigner Gina Miller seeking judicial review of Parliament's suspension
    in the High Court under English law. The case challenges the lawfulness of current
    UK Prime Minister Boris Johnson's advice to Queen Elizabeth II in asking her to
    suspend the UK Parliament. The case is due for a preliminary hearing next Thursday
    with a full hearing the following day if the High Court approves one. (BBC News)
  - The High Court in Belfast hears a claim under Northern Irish law brought by Raymond
    McCord, a campaigner for Troubles victims, challenging the constitutionality of
    suspending the UK Parliament. Sir Declan Morgan, The Lord Chief Justice of Northern
    Ireland, adjourns proceedings until next week. (BBC News)
  - A cross-party group of over fifty members of the suspended Parliament pledge to
    carry on meeting in the absence of Parliament. (The Guardian)
  - Hong Kong protests
  - Prominent Hong Kong pro-democracy activists Joshua Wong and Agnes Chow are arrested,
    charged and released on bail. (BBC News)
  - September 11 attacks
  - A military judge sets 11 January 2021 as the starting date for the selection of
    a military jury in the trial of five suspects, among which is Khalid Sheikh Mohammed,
    held in Guantanamo Bay. (The Guardian)
  - List of mass shootings in the United States in 2019
  - At least 10 teenagers (age 15 to 18) are injured in a mass shooting at a high
    school football game at Ladd–Peebles Stadium in Mobile, Alabama. (CNN)
  Politics and elections:
  - Politics of the United States
  - Madeleine Westerhout is forced to resign as Director of Oval Office Operations
    at the White House after leaking private information about the Trump family and
    White House operations to reporters at a private dinner. Westerhout had allegedly
    bragged about her personal access to U.S. President Donald Trump. (BBC News)
  - White House aides admit that President Trump made up a phone call from China last
    weekend. (The Independent)
