Date: '2019-08-18'
Source_URI: Portal:Current events/2019 August 18
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - 17 August 2019 Kabul bombing
  - ISIL claims responsibility for a terrorist attack against a wedding party in Afghanistan
    the day prior, which left 63 people dead and over 200 injured. (The Guardian)
  International relations:
  - Iran–United States relations; United Kingdom–United States relations
  - Gibraltar authorities reject the request by the U.S. to seize the Iranian oil
    tanker Grace 1. They argue that EU, not U.S. law, is applicable in Gibraltar.
    The tanker is also renamed. (Al Arabiya)
  Politics and elections:
  - 2019 Hong Kong anti-extradition bill protests
  - The organizers claim that at least 1.7 million people join a peaceful rally in
    Victoria Park, Hong Kong. Protesters spill into nearby streets, with train service
    intermittently suspended due to the sheer number of people. (The Guardian)
