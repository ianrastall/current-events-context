Date: '2019-08-10'
Source_URI: Portal:Current events/2019 August 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War
  - Fighters of the Southern Movement capture the port city of Aden from forces loyal
    to the internationally recognized President of Yemen Abdrabbuh Mansur Hadi. (Al
    Jazeera)
  - Libyan Civil War
  - A car bomb goes off in Benghazi, killing three members of the United Nations Support
    Mission in Libya and two other mission members, and wounding dozens of civilians.
    (The Guardian)
  - Bærum mosque shooting
  - A man in Bærum, Norway, opens fire in Al Noor Islamic Centre, injuring a congregant.
    A woman was found dead at the house of the suspect. (BBC News)
  - Israeli–Palestinian conflict
  - Israeli forces shoot dead four Palestinian militants near the border with Gaza,
    the Israeli military say. Israel Defense Forces say the men were armed with assault
    rifles, anti-tank missiles and hand grenades. (The Guardian)
  - Israeli forces arrest two Palestinians who are suspected of having killed an Israeli
    soldier. (Jerusalem Post)
  Disasters and accidents:
  - The death toll due to the monsoon flooding in southern and western India rises
    to 147, while hundreds of thousands have been evacuated from their homes. (Al
    Jazeera)
  - At least 56 people have been killed and more than a million forced from their
    homes as Typhoon Lekima hits eastern China. (BBC News)
  - Morogoro tanker explosion
  - At least 75 people have been killed and 60 injured in a fuel tanker explosion
    in Morogoro, Tanzania. (Xinhua)
  - Five people are confirmed dead and three injured following an accidental rocket
    explosion on a naval test range near Severodvinsk, Russia on Thursday August 8th.
    The rocket used an experimental nuclear isotope liquid fuel source, causing a
    brief localized spike in radiation. 9500 nearby residents were evacuated. (BBC
    News)
  International relations:
  - North Korea–United States relations
  - In a letter sent by North Korean leader Kim Jong-un to U.S. President Donald Trump,
    Kim apologizes for the testing of short-range missiles. Trump says he expects
    to meet Kim soon and see a denuclearized North Korea as "one of the most successful
    countries in the world". (Clarín)
  Law and crime:
  - Death of Jeffrey Epstein
  - American financier Jeffrey Epstein is found dead in his Manhattan jail cell in
    an apparent suicide while awaiting trial for sex trafficking charges. (The New
    York Times)
  Politics and elections:
  - 2019 Moscow City Duma election
  - As many as 50,000 people gathered at ongoing protests in Moscow against the Russian
    authorities preventing several opposition candidates from running in the election,
    which turned into a protest against the government in general. It is the biggest
    such event since the 2011 protests. (ABC News)
