Date: '2019-08-07'
Source_URI: Portal:Current events/2019 August 7
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - 7 August 2019 Kabul bombing
  - A car bombing by the Taliban kills 14 and injures over 150 in Kabul, Afghanistan.
    (CNN)
  Disaster and accidents:
  - The death toll of the heat wave in Japan rises to 57, while 18,347 others are
    hospitalized. (Japan Times)
  Law and crime:
  - 2019 California stabbing rampage
  - A Garden Grove, California, man stabs and kills four people and wounds two others
    in a two-hour crime spree at a series of Orange County locations. Both injured
    victims are expected to survive. The motive of the 33-year-old suspect, who was
    arrested at the last scene, appears to be robbery as well as "anger and hate."
    (CNN) (AP via KESQ-TV)
  Politics and elections:
  - 2019 Argentine general election
  - Sources from the Brazilian government reveal that Brazilian President Jair Bolsonaro
    suggested U.S. President Donald Trump visit Argentina in order to back the re-election
    of President Mauricio Macri. (La Nación)
  - Cyntoia Brown is released from prison after serving fifteen years for killing
    Johnny Allen in 2004. (NY Times)
