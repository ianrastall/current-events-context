Date: '2019-08-17'
Source_URI: Portal:Current events/2019 August 17
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - 17 August 2019 Kabul bombing
  - 63 people are killed and 182 wounded in a suicide attack at a wedding party in
    Kabul, Afghanistan. The attacker set off explosives among the invitees. (Al Arabiya)
  Politics and elections:
  - Aftermath of the 2018–19 Sudanese protests
  - The ruling military and the civilian opposition formally sign a power-sharing
    deal establishing a three-year transition period towards the election of a civilian
    government. (Al Jazeera)
  - 2019 Hong Kong anti-extradition bill protests
  - Thousands of school teachers join the 11th weekend of anti-government protests
    in Hong Kong. (Reuters)
  - A rally of far-right groups such as the Proud Boys and Patriot Prayer is met by
    left-wing Antifa in Portland, Oregon. (The New York Times)
  - The Argentinian Treasury Minister, Nicolás Dujovne, resigns after incumbent President
    Mauricio Macri's loss in a primary vote saw Argentina's peso fall to record lows.
    (Bloomberg)
  Science and technology:
  - China announces the successful first launch of the carrier rocket. (Reuters)
