Date: '2019-08-04'
Source_URI: Portal:Current events/2019 August 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Cairo bombing
  - A car drives into three other cars causing an explosive crash outside the National
    Cancer Institute Egypt campus in central Cairo, killing 20 people and injuring
    47 others. The Interior Ministry says that the car that hit the others contained
    explosives and was to be used in a terrorist operation. The driver fled the scene
    before the explosion. The minister accuses the Islamist Hasm Movement of being
    behind the attack. (Reuters)
  International relations:
  - Iran–Iraq relations
  - Iran seizes a foreign tanker, reported to be Iraqi, in the Persian Gulf, according
    to Iranian state media. The Iranians accuse the tanker of "smuggling fuel for
    some Arab countries". (BBC News)
  Law and crime:
  - 2019 Dayton shooting
  - A mass shooting occurs at a bar in the Oregon Historic District of Dayton, Ohio,
    United States. Nine people are killed and at least 27 others are injured. The
    shooter Connor Betts is killed by police. (BBC News)
  Science and technology:
  - French inventor Franky Zapata successfully crosses the English Channel on the
    jet-powered Flyboard Air. The 22-mile (35.4-km) journey took 22 minutes with one
    refueling stop about halfway to Dover, England. (BBC News) (The Guardian)
  Sports:
  - 2019 Women's British Open
  - In golf, Japan's Hinako Shibuno wins the year's final major championship by one
    shot over American Lizette Salas. Shibuno, a 20-year-old rookie on the Japan LPGA
    Tour, was playing outside her home country for the first time, and was also playing
    for the first time in a major recognized by the U.S. LPGA. (AP via ESPN)
