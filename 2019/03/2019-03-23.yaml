Date: '2019-03-23'
Source_URI: Portal:Current events/2019 March 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - Battle of Baghuz Fawqani
  - The Syrian Democratic Forces announce the capture of the last territory held by
    ISIL in Syria. (DW)
  - Northern Mali conflict
  - March 2019 attacks against Fulani herders
  - At least 160 Fulani herdsmen are killed in an attack on the villages of Ogossagou
    and Welingara by Dogon militia in Mali. (Reuters)
  - Somali Civil War
  - In Mogadishu, Somalia, at least five militants set off a car bomb and raid a government
    building, killing at least five people. Al-Shabaab claim responsibility for the
    attack. (The New York Times) (The Washington Post)
  Business and economy:
  - The Wall Street Journal reports that former Enron CEO Jeffrey Skilling, released
    from prison in February after serving 12 years for fraud and insider trading following
    Enron's 2001 collapse, is planning a return to the energy business, helming a
    "digital platform connecting investors to oil and gas projects". (The Wall Street
    Journal).
  Disasters and accidents:
  - Rescuers scramble to rescue about 1,300 passengers and crew from the cruise ship
    Viking Sky adrift off the coast of Norway. (CNN)
  International relations:
  - China–Italy relations
  - Italy signs $2.8 billion in deals with the Belt and Road Initiative. (Reuters)
  Politics and elections:
  - Opposition to Brexit in the United Kingdom
  - Approximately one million Britons assemble for the People's Vote March in London,
    United Kingdom advocating for an additional referendum on Brexit. (BBC News) (The
    Guardian)
