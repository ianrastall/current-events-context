Date: '2019-03-01'
Source_URI: Portal:Current events/2019 March 1
Intelligence_Payload:
  Business and economy:
  - Amazon announces plans to open dozens of proprietary grocery stores in several
    major U.S. cities. (The Wall Street Journal), (Fortune)
  Disasters and accidents:
  - A bus overturns on the Qom–Tehran Highway in Iran, killing eight people (including
    the driver) and injuring more than thirty others. Officials claim the driver fell
    asleep. (France 24)
  - A Russian cargo ship collides with a motorway bridge in the city of Busan, South
    Korea. The captain is reported to be drunk. (The Guardian)
  - A leaking oil pipeline explodes in Bayelsa, Nigeria; a stampede follows. Over
    50 are reported missing. (The Guardian)
  - A BMW collides with two oncoming minibuses between Fouriesburg and Bethlehem in
    Free State, South Africa, killing thirteen and injuring eight. (Eyewitness News)
  International relations:
  - Rohingya refugees in Bangladesh
  - Bangladesh's Foreign Secretary Shahidul Haque tells the United Nations Security
    Council that his country will no longer accept Rohingya refugees fleeing violence
    across the border in Rakhine State, and accuses Myanmar of "hollow promises" regarding
    repatriation. (BBC News)
  - North Korea–Vietnam relations
  - North Korean leader Kim Jong-un begins an official visit to Vietnam, three days
    after arriving in the country for a nuclear summit with U.S. President Donald
    Trump that ended in deadlock. (The Straits Times)
  - 2019 Venezuelan presidential crisis
  - The Trump administration announced Friday it is revoking the visas of 49 Maduro-aligned
    officials and their families and sanctioning several top military and security
    officials, part of a major U.S. campaign to push contested Venezuelan President
    Nicolás Maduro from power. (Fox News)
  Politics and elections:
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Washington Governor Jay Inslee announces he will join the Democratic Party primaries
    in 2020 and cites fighting climate change as a reason. (Time), (The New York Times)
