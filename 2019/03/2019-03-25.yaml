Date: '2019-03-25'
Source_URI: Portal:Current events/2019 March 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Gaza–Israel conflict
  - Seven people are moderately injured after a rocket attack destroys a home in Mishmeret,
    Israel. The Israel Defense Forces claim that Hamas is responsible for any attack
    from Gaza. (BBC News)
  - As a result, Israeli Prime Minister Benjamin Netanyahu cuts his four-day trip
    to the United States short after meeting with U.S. President Donald Trump. (Reuters)
    (The Washington Post)
  - In retaliation Israeli Air Force jets strike multiple targets in the Gaza Strip,
    including the office of senior Hamas official Ismail Haniyeh, and Hamas' military
    intelligence headquarters in Gaza City. (Reuters) (Al Jazeera)
  Disasters and accidents:
  - 2019 Iran floods
  - Flash flooding in the southern provinces of Iran kills at least 19 people and
    injures more than 100. The majority of the deaths occurred in the city of Shiraz.
    (BBC News)
  Health and environment:
  - Bayer and Johnson & Johnson announce that they have reached a $775 million agreement
    to settle approximately 25,000 outstanding litigation cases, which claim that
    their drug Xarelto caused severe and sometimes fatal bleeding episodes. Bayer
    and Johnson & Johnson had successfully defended the safety of the drug in all
    six prior cases that went to trial. (The New York Times)
  International relations:
  - United States recognition of the Golan Heights as part of Israel, Israel–United
    States relations, Syria–United States relations
  - U.S. President Donald Trump signs a proclamation formally recognising the disputed
    Golan Heights as sovereign Israeli territory. (Al Jazeera)
  - Syria's Foreign Affairs Ministry condemns Trump's move as a "flagrant violation
    of the sovereignty of Syria". (Xinhuanet)
  - Greek–Turkish relations
  - Greek prime minister Alexis Tsipras says Turkish fighter jets threatened his helicopter,
    in Greek airspace, heading to the Aegean island of Agathonisi, near Turkey's coastline,
    for Greek Independence Day which celebrates the country's 1821 uprising against
    the Ottoman Empire. Turkish security forces rejected the accusation, insisting
    the jets were carrying out a routine mission. (BBC News)
  Law and crime:
  - A judge rules that former Guantanamo Bay prisoner Omar Khadr has completed his
    prison sentence. (CBC) (Vancouver Courier)
  - Attorney Michael Avenatti is arrested and charged with extortion, embezzlement
    and bank fraud. (CNBC)
