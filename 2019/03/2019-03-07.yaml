Date: '2019-03-07'
Source_URI: Portal:Current events/2019 March 7
Intelligence_Payload:
  Disasters and accidents:
  - Crisis in Venezuela
  - A major power blackout leaves most of Venezuela without electricity, including
    the capital Caracas. At least 18 of Venezuela's 23 states have reported blackouts.
    Venezuelan news website El Pitazo blames failures at Simón Bolívar hydroelectric
    plant; state TV blames anti-government saboteurs. (The Guardian)
  Law and crime:
  - 2019 Venezuelan presidential crisis
  - American journalist at WPLG, Cody Weddle, is released from Venezuela after being
    detained early Wednesday. (CBS News) (Fox News)
  - Trials of Paul Manafort
  - Former Trump campaign manager Paul Manafort is sentenced to 47 months in federal
    prison for eight counts including tax fraud and bank fraud. (CBS News)
  - Buffalo Billion
  - Joe Percoco, former aide to New York Governor Andrew Cuomo, is denied bail and
    is expected to start his six-year prison term for bribery. (New York Post) (New
    York Daily News)
