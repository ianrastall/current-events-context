Date: '2019-03-29'
Source_URI: Portal:Current events/2019 March 29
Intelligence_Payload:
  Health and environment:
  - In the aftermath of Cyclone Idai, those infected by cholera jump to 139 confirmed
    cases in Mozambique. (The Washington Post) (CBS News)
  Law and crime:
  - Same-sex marriage in the Cayman Islands
  - Cayman Islands legalises same-sex marriage after a judge rules that a law defining
    marriage as a relationship between a man and woman is unconstitutional. (The Independent)
  Politics and elections:
  - Brexit negotiations
  - UK Prime Minister Theresa May suffers another defeat of 286–344 on her Withdrawal
    Agreement. European Council President Donald Tusk schedules an emergency summit
    on April 10, two days before Brexit is scheduled to happen. (CNN)
  - 2019 Algerian protests
  - Algerians protest in the capital of Algiers against President Abdelaziz Bouteflika
    in an effort to make him resign. It is estimated that tens of thousands to hundreds
    of thousands attended. (The New York Times) (BBC News) (Channel NewsAsia)
