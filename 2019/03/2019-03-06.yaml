Date: '2019-03-06'
Source_URI: Portal:Current events/2019 March 6
Intelligence_Payload:
  Disasters and accidents:
  - The flooding of the Citarum River, Indonesia, causes at least two deaths. (The
    Jakarta Post)
  Arts and culture:
  - Weinstein effect
  - Celebrity chef Mario Batali gives up his stake in his restaurants more than a
    year after being accused of sexual misconduct. (The Guardian)
  - Alex Trebek, host of the American syndicated game show Jeopardy! since 1984, announces
    that he has been diagnosed with terminal stage 4 pancreatic cancer. He plans to
    continue hosting during his treatment. (CNN)
  Business and economy:
  - The United States Commerce Department reports the country's 2018 trade deficit
    was $621 billion (£472.5 bn), the highest since 2008. (BBC News)
  - Economy of the United States
  - Production ends at General Motors' Lordstown Assembly complex in Lordstown, Ohio,
    United States. (CNN)
  - Dollar Tree announces it will close 390 Family Dollar stores, and rebrand a further
    200 Family Dollar stores as Dollar Tree. (CNBC)
  Law and crime:
  - 2019 Venezuelan presidential crisis, Corruption in Venezuela, Censorship in Venezuela
  - Venezuelan journalist Alí Domínguez, who disappeared a week ago, dies from injuries
    of beating and torture. (El Universal), (Fox News)
  - China–United States trade war
  - Huawei sues the U.S. Government to challenge the constitutionality of Section
    889 of the National Defense Authorization Act which prohibits U.S. executive government
    agencies from procuring telecommunications equipment from two Chinese companies,
    Huawei and ZTE. (CNBC)
  Sports:
  - 2018–19 UEFA Champions League
  - Manchester United defeats Paris Saint-Germain 3–1 in Paris, overcoming a 2–0 home-leg
    deficit to advance to the quarter-finals with a 3–3 win on away goals. United
    becomes the first side in the history of the Champions League or European Cup
    to overcome a first-leg home deficit of 2–0 or greater in a knockout tie. (BBC
    Sport)
