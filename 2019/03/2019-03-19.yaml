Date: '2019-03-19'
Source_URI: Portal:Current events/2019 March 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, International military intervention against ISIL, Battle of
    Baghuz Fawqani
  - Syrian Democratic Forces declares progress in Syria after an ISIL camp on the
    outskirts of Baghuz is captured. (NPR) (Fox News)
  Health and environment:
  - The U.S. Food and Drug Administration approves Sage Therapeutics' Zulresso, also
    known as allopregnanolone or brexanolone, for treatment of postpartum depression.
    It is the first drug approved to specifically target the disease, which is the
    most common complication of childbirth. (STAT News) (US FDA)
  International relations:
  - North Korea–South Korea relations
  - North Korea and South Korea express interest in jointly hosting the 2023 FIFA
    Women's World Cup. (Reuters UK) (Yonhap News Agency)
  Politics and elections:
  - The President of Kazakhstan, Nursultan Nazarbayev, announces his resignation after
    29 years in office. (Reuters)
  - 2019 Guatemalan general election
  - A judge issues an arrest warrant against presidential candidate Thelma Aldana;
    however, as the Supreme Electoral Tribunal registered Aldana as a presidential
    candidate, she enjoys immunity and can not be arrested. (Arab News)
  Science and technology:
  - The Norwegian Academy of Science and Letters awards this year's Abel Prize to
    Karen Uhlenbeck for "her pioneering achievements in geometric partial differential
    equations, gauge theory and integrable systems." Uhlenbeck is the first woman
    to win this prize. (The New York Times via MSN.com)
