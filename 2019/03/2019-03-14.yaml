Date: '2019-03-14'
Source_URI: Portal:Current events/2019 March 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Tel Aviv rocket strike
  - Two rockets are fired from the Gaza Strip at Tel Aviv, Israel; neither rocket
    was intercepted by the IDF's Iron Dome system. (The New York Times) (IDF Spokesperson)
  Disasters and accidents:
  - USS Devastator is damaged by fire while at a Bahrain dock. (Task & Purpose)
  Law and crime:
  - Bloody Sunday
  - Prosecutors in Northern Ireland charge a former British Army soldier with murdering
    two people during the mass shooting in Derry during the Troubles in 1972, following
    a contemporary police investigation. The man, known only as Soldier F, is also
    charged with three attempted murders. It is also announced that no other charges
    against either soldiers or civilians will be brought due to insufficient evidence.
    Soldiers shot 28 unarmed protestors, killing 13. (BBC News)
  - 2019 college admissions bribery scandal
  - Eight universities are sued by two Stanford University students in regards to
    the college admissions bribery scandal. (ABC News)
  - Caracas drone attack
  - A CNN reporter alleges an unnamed source has provided new video details about
    the August 2018 drone explosion in Caracas, claiming that it was part of a plot
    to kill Nicolás Maduro. (CNN)
  Politics and elections:
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Beto O'Rourke 2020 presidential campaign
  - Former U.S. Representative Beto O'Rourke from Texas announces he is running for
    the Democratic Party's nomination for President of the United States in the 2020
    election. (BBC News)
  - Brexit negotiations
  - The House of Commons of the United Kingdom votes 412 to 202 to seek a delay to
    Brexit of three months if UK Prime Minister Theresa May's deal can be passed at
    a third attempt next week, else significantly longer. The delay, which means the
    UK will no longer leave the European Union on March 29, will have to be unanimously
    approved by all other 27 EU member states. (BBC News)
  - National Emergency Concerning the Southern Border of the United States
  - The U.S. Senate votes 59–41 to cancel President Donald Trump's emergency declaration
    to fund the wall along the Mexico–United States border. Trump plans to veto the
    decision. (The New York Times)
