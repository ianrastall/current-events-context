Intelligence_Payload:
  Armed conflict and attacks:
  - 2019 Utrecht shooting
  - A man opens fire in a tram in the city of Utrecht, Netherlands, killing three
    people and wounding nine others, before fleeing. Terrorism is suspected by authorities.
    A 37-year-old Turkish man is arrested. (Fox News)
  - Christchurch mosque shootings, Internet censorship in Australia
  - Telstra blocks access to several websites in Australia for hosting footage of
    the recent mass shootings in Christchurch, New Zealand, which were livestreamed
    on Facebook, including LiveLeak, 4chan, 8chan, Voat and the blog Zero Hedge. Optus
    and Vodafone took similar actions but did not list which sites had been blocked.
    (9news)
  Science and technology:
  - Kamchatka superbolide
  - NASA reports that it has detected a huge meteor explosion in Earth's atmosphere
    on December 18, 2018, above Russia's Kamchatka Peninsula. The explosion went largely
    unnoticed due to its location. The explosion, which was ten times more powerful
    than the atomic bomb dropped on Hiroshima, was the second largest of its kind
    in 30 years. (BBC News)
