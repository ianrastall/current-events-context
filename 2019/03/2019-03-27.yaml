Date: '2019-03-27'
Source_URI: Portal:Current events/2019 March 27
Intelligence_Payload:
  Business and economy:
  - Cathay Pacific announces the acquisition of low-cost carrier HK Express for US$628
    million (HK$4.93 billion). (BBC News) (South China Morning Post)
  International relations:
  - European migrant crisis
  - The European Union says it is suspending Operation Sophia ship patrols. Instead,
    the operation will rely on air missions and close coordination with Libya. The
    EU also announces the mandate for Operation Sophia, which was scheduled to expire
    March 31, 2019, will be extended for six months. (AFP via Yahoo! News)
  - More than 100 migrants hijack a merchant vessel that rescued them off Libya's
    coast, ordering the crew to head towards Malta. Malta's military said the ship
    would not be allowed into its waters. (BBC News)
  Law and crime:
  - Aftermath of the Charlottesville car attack
  - James Alex Fields, who drove his car into a crowd of protestors at the Unite the
    Right rally in Charlottesville, Virginia, in 2017, killing one person and injuring
    28 others, pleads guilty to 29 federal hate crimes. He will be sentenced on July
    3, 2019. (NBC)
  - Aftermath of the kidnapping of Jayme Closs
  - Jake Patterson pleads guilty to the kidnapping of teenager Jayme Closs and the
    murder of her parents last year. (New York Post)
  - Medicaid expansion
  - Judge James Boasberg of the U.S. District Court for the District of Columbia blocks
    Kentucky from implementing Medicaid work requirements and Arkansas from continuing
    its program, stating the program's approval by the Department of Health and Human
    Services "... is arbitrary and capricious because it did not address ... how the
    project would implicate the 'core' objective of Medicaid, the provision of medical
    coverage to the needy". (NPR)
  - Former Argentine President Carlos Menem is sentenced to 3 years and 9 months in
    prison for the sale of a government ground. His government's Minister of Economy
    Domingo Cavallo was also sentenced to 3 years and 6 months. In addition, both
    were disqualified from holding public office for life. As Menem is currently a
    National Senator and has immunity, he will not comply with his sentence yet. (CNN
    in Spanish)
  Politics and elections:
  - Brexit negotiations
  - The UK parliament holds "indicative votes" on eight options regarding Brexit in
    an attempt to find an approach which can command a majority. None of the options
    are passed at this stage; however, a further round of voting is planned for Monday.
    (CBC) (The Guardian) (The Guardian)
  - UK Prime Minister Theresa May announces that she will resign before the next phase
    of Brexit negotiations, if her deal were to be passed. (The Guardian)
  - 2019 Guatemalan general election
  - The Supreme Electoral Tribunal dismisses six nullity proceedings against the presidential
    candidacy of Thelma Aldana. However, it accepts two processes and requests the
    Supreme Court of Justice, the Public Prosecutor's Office and the Comptroller General
    of Accounts to present a report on their legal situation. It was also reported
    that after resolving these processes this week, it will proceed to issue the credential
    that grants immunity to the candidate. (Prensa Libre)
  - The Supreme Electoral Tribunal acts legally before the Constitutional Court to
    appeal the permission granted to the presidential candidate Zury Ríos to participate
    in the elections despite having constitutional impediment. (Prensa Libre)
  - Director of the Registry of Citizens of the Supreme Electoral Tribunal Leopoldo
    Guerra denounces pressures and threats by far-right groups not to register Thelma
    Aldana as a presidential candidate and request precautionary measures from the
    Inter-American Commission on Human Rights. (Prensa Libre)
