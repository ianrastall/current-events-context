Date: '2019-03-05'
Source_URI: Portal:Current events/2019 March 5
Intelligence_Payload:
  Armed conflicts and attacks:
  - Packages containing suspected improvised explosive devices are found near Heathrow
    Airport, London City Airport, and London Waterloo station in London, England.
    (BBC News)
  Arts and culture:
  - Japanese architect Arata Isozaki is announced as the winner of the 2019 Pritzker
    Prize. (BBC News)
  Health and environment:
  - Management of HIV/AIDS
  - An HIV-positive man, identified as "the London patient", is the second known adult
    worldwide cleared of the HIV virus after a bone marrow transplant from an HIV-resistant
    donor. He has been in remission from HIV for 18 months and is no longer taking
    HIV drugs. (BBC News) (The Washington Post) (The Irish Times) (Nature)
  - The US Food and Drug Administration approves Janssen Pharmaceutica's esketamine
    for treatment-resistant depression. The drug is the chemical cousin of ketamine,
    a powerful anesthetic and recreational drug, and the first major new depression
    treatment to be approved by the FDA in more than 30 years. (CNN) (TechCrunch)
  Politics and elections:
  - United States' Food and Drug Administration commissioner Scott Gottlieb announces
    his resignation "in the next month". (CNN)
  - 2019 Guatemalan general election
  - Semilla announces Jonathan Menkos Zeissig as running mate of Thelma Aldana. Aldana
    will be proclaimed presidential candidate on March 10. (La Hora)
  Sports:
  - 2018–19 UEFA Champions League
  - Underdog AFC Ajax defeats defending champions Real Madrid 4–1, and advances to
    quarter-finals on aggregate 5–3, marking the end of Real Madrid's European dominance.
    (Goal.com)
