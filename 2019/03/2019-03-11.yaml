Date: '2019-03-11'
Source_URI: Portal:Current events/2019 March 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Battle of Baghuz Fawqani, International military intervention against ISIL
  - US-backed Syrian forces resume their offensive on the final enclave controlled
    by ISIL in Syria at Baghuz. (Reuters) (Al Jazeera)
  Business and economy:
  - Economy of Turkey
  - The Turkish economy enters a recession for the first time since 2009 after the
    currency and debt crisis of 2018. (BBC News) (Bloomberg)
  - The United Kingdom announces it will abolish the Financial Reporting Council,
    which regulates the nation's accounting industry, after it was criticised by an
    independent review following the collapse of several large organisations. It is
    to be replaced by the Audit, Reporting and Governance Authority featuring increased
    powers and new leaders. (Sky News)
  Disasters and accidents:
  - Ethiopian Airlines Flight 302
  - Shares of Boeing lose roughly 9 percent after one of its best-selling planes,
    the Boeing 737 MAX jet, saw its second deadly crash in less than five months.
    (CNBC)
  - China and Indonesia ground 737-8 MAX aircraft across their nations in response
    to the Ethiopian Airlines Flight 302 and Lion Air Flight 610 disasters; airlines
    elsewhere including Ethiopian Airlines voluntarily ground their own 737 MAX jets.
    (The Independent)
  - rescues a 27-strong crew from a burning container vessel 150 miles off the coast
    of France. (BBC News)
  International relations:
  - Iran–Iraq relations
  - Iranian President Hassan Rouhani begins his first official visit to Iraq to boost
    bilateral ties and trade amid re-instated U.S. sanctions on Iran. (BBC News)
  - U.S. Senator Lindsey Graham visits the Israeli-occupied Golan Heights, saying
    he will start an effort to recognize the Golan as part of the State of Israel.
    (The Times of Israel)
  Law and crime:
  - Mixed martial artist Conor McGregor is arrested in Miami Beach, Florida, on charges
    of robbery and criminal mischief. (LowKick MMA)
  Politics and elections:
  - Crisis in Venezuela
  - 2019 Venezuelan blackout
  - Partially-recognized Venezuelan Acting President Juan Guaidó says the country
    has "truly collapsed already", while accusing the Nicolás Maduro-led government
    of murdering 17 people during the ongoing nationwide power blackout. (CNN)
  - 2019 Algerian protests
  - Algerian President Abdelaziz Bouteflika says he will postpone the country's elections
    next month, and will not seek a fifth term in office. (Al Jazeera)
  - Prime Minister of Algeria Ahmed Ouyahia resigns after Bouteflika's speech. He
    is replaced by Noureddine Bedoui. (Jeune Afrique)
  - Actor and former Minister of Culture Salvador del Solar is appointed new Prime
    Minister of Peru. (El País)
