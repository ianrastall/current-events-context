Date: '2019-03-10'
Source_URI: Portal:Current events/2019 March 10
Intelligence_Payload:
  Disasters and accidents:
  - Ethiopian Airlines Flight 302
  - An Ethiopian Airlines Boeing 737 MAX 8 from Addis Ababa, Ethiopia, with 149 passengers
    and eight crew members onboard crashes en route to Nairobi, Kenya, killing all
    157 persons on board. (BBC News)
  Politics and elections:
  - 2019 Guatemalan general election
  - Guatemalan political party Semilla proclaims Thelma Aldana as presidential candidate
    and Jonathan Menkos as vice presidential candidate. (El Periódico de Guatemala)
  - Internet censorship in Russia
  - Thousands of Russians take to the streets in Moscow, Voronezh, and Khabarovsk
    to protest internet restrictions. (Reuters)
