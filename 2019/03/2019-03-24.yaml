Date: '2019-03-24'
Source_URI: Portal:Current events/2019 March 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A United States airstrike in Afghanistan early Saturday kills 10 children and
    3 adults. The family was displaced because of the conflict according to early
    findings by the United Nations Assistance Mission in Afghanistan. (Reuters)
  Arts and culture:
  - The 2019 Global Teacher Prize and its $1 million (£760,000) purse is awarded to
    Brother Peter Tabichi, a Franciscan science teacher from rural Kenya. Tabichi
    gives away 80 percent of his salary to support poorer pupils at the Keriko Mixed
    Day Secondary School in Pwani Village, Nakuru. (BBC News)
  Disasters and accidents:
  - Stoneman Douglas High School massacre aftermath
  - More than 60 school, county, city, child services and law enforcement officials,
    as well as mental health specialists, teachers and parents, hold an emergency
    meeting after the suicide of a second Stoneman Douglas survivor. Florida's emergency
    chief is requesting the state Legislature provide more mental health resources
    for the community. Coral Springs, Florida, police reported that, Saturday night,
    a current sophomore killed himself. Last week, Sydney Aiello, a 19-year-old graduate
    who had recently been diagnosed with post-traumatic stress disorder, took her
    own life. (The Guardian) (Miami Herald)
  International relations:
  - Russia–Venezuela relations
  - Two Russian military planes, an Ilyushin Il-62 and an Antonov An-124, land at
    Simón Bolívar International Airport near Caracas, Venezuela, carrying senior Defence
    Ministry official , a large amount of equipment and about 100 troops. Russia,
    which three months earlier held joint military exercises on Venezuelan soil, condemned
    other countries for backing Venezuelan opposition leader Juan Guaidó against embattled
    President Nicolás Maduro. (Reuters) (BBC News)
  - Status of Jerusalem
  - In Washington, D.C., the leaders of Romania and Honduras announce they will recognize
    Jerusalem as Israel's capital, following the lead of the United States. (Fox News)
  Politics and elections:
  - 2019 Thai general election
  - Voters in Thailand head to the polls to elect all 500 members of the House of
    Representatives. This is the first parliamentary election held in the country
    since the invalidation of the 2014 Thai general election and the ensuing 2014
    Thai coup d'état. (Reuters) (The Washington Post)
  - 2019 Comorian presidential election
  - Voters in the Comoros head to the polls to elect a new President. (BBC News)
  - Mueller special counsel investigation
  - Special Counsel Robert Mueller's report on Russian interference in the 2016 United
    States elections does not find that any US officials or Trump campaign members
    knowingly conspired with the government of Russia. Mueller drew no conclusions
    about whether Trump illegally obstructed justice. (Reuters) (The New York Times)
  - Attorney General William Barr releases the "principal conclusions" of Mueller's
    investigation in a four-page public letter to the Congress's Judiciary Committee
    leadership. (Fox News) (The Washington Post) (William Barr letter to congress
    via The Washington Post)
  - Thousands of teachers gather in the capital of Rabat, Morocco to protest working
    conditions and wages. (BBC News) (France 24)
