Date: '2019-03-09'
Source_URI: Portal:Current events/2019 March 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - Internal conflict in Myanmar
  - Rakhine insurgents of the Arakan Army attack a police post in a village in Rakhine
    State, killing nine policemen. All of the victims were local recruits from the
    village. (Reuters)
  Arts and culture:
  - Japanese supercentenarian Kane Tanaka is officially recognized as the world's
    oldest living person at 116 years and 67 days old. (The Guardian)
  Disasters and accidents:
  - 2019 Colombia DC-3 crash
  - A DC-3 operated by Laser Aereo crashes in Colombia en route from San José del
    Guaviare, killing all 14 aboard. (Reuters) (El Espectador)
  - Crisis in Venezuela
  - 2019 Venezuelan blackout
  - Whilst a nationwide power blackout continues, Acting President Juan Guaidó calls
    for protests in the capital of Venezuela. (Reuters) (Time)
  - With a fire causing new damage to a power plant in Bolívar State, President Nicolás
    Maduro states the power outages are "caused by U.S.-backed sabotage"; Guaidó says
    the outages are due to Maduro government "corruption and mismanagement". (MSN)
    (SFGate)
  - A Japanese high-speed boat collides with a "marine creature" while carrying 121
    passengers; 87 passengers are injured and 5 airlifted by helicopter to the hospital.
    (CNN)
  - 2018–19 South-West Indian Ocean cyclone season
  - The floods from the predecessor of Cyclone Idai cause 23 deaths and 11 missing
    in southern Malawi. (The Maravi Post)
  - Around 40 fishermen are rescued by the United States Coast Guard after an ice
    sheet breaks away on Lake Erie. (NBC) (The Washington Post)
  Law and crime:
  - Salamanca nightclub shooting
  - A mass shooting at a nightclub in Salamanca, Guanajuato, Mexico, kills at least
    15 people and leaves another seven people wounded. (Reuters)
  Politics and elections:
  - Tunisian health minister Abderraouf Cherif resigns following the deaths of 11
    newborn babies since Thursday at a hospital in the capital Tunis. Evidence suggests
    all 11 died from septic shock. Tunisia's public healthcare had been considered
    one of the best in North Africa, but it has operated less smoothly since the 2011
    revolution. (BBC News)
  - Prime Minister of Peru Cesar Villanueva resigns after falling approval ratings.
    (Al Jazeera) (Reuters)
