Date: '2019-03-16'
Source_URI: Portal:Current events/2019 March 16
Intelligence_Payload:
  Disasters and accidents:
  - A fire at a refugee camp in Nigeria kills eight and leaves 15,000 homeless. The
    residents are people displaced by ongoing conflict with Boko Haram. (Reuters)
  - 2019 Midwestern U.S. floods
  - Flooding over large portions of Nebraska leave one dead and two missing with over
    900 people using emergency shelters. Many roads and highways in the state are
    also closed. (USA Today)
  Law and crime:
  - Terrorism in Ireland, Terrorism in the United Kingdom
  - The village of Derrylin, close to the border between Northern Ireland and the
    Republic of Ireland, is sealed off after a suspicious object is found. The object
    is later determined to be “nothing untoward”. (Irish Times)
  - Colombia's migration authority detains and expels an alleged spy working for Cuba's
    Intelligence Directorate. (El Tiempo)
  Politics and elections:
  - Yellow vests movement
  - Protests against French President Emmanuel Macron enter a fourth month in Paris.
    Tear gas is fired at protestors throwing stones at riot police in front of the
    Arc de Triomphe, news stands are torched at the Champs-Élysées, and a branch of
    Banque Tarneaud is burned. More than 80 arrests are made. Businesses around the
    Champs-Élysées are looted. (Reuters)
  - Trial of Catalonia independence leaders, Catalan independentism
  - Thousands of demonstrators protest in Madrid against the trial of Catalan independence
    leaders and the ongoing detention of some of them. Local police say around 18,000
    protestors were involved; organisers claim almost 120,000. (BBC News)
