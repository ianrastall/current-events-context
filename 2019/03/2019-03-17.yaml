Date: '2019-03-17'
Source_URI: Portal:Current events/2019 March 17
Intelligence_Payload:
  Disasters and accidents:
  - 2019 Jayapura flood and landslide
  - At least 73 people have been killed in flash floods in the province of Papua,
    Indonesia. (BBC News)
  - President of Mozambique Filipe Nyusi suggests the death toll of Cyclone Idai could
    reach over one thousand. The current official toll stands at 84. (BBC News)
  Politics and elections:
  - 2019 Slovak presidential election
  - Progressive Slovakia candidate Zuzana Čaputová, who ran on an anti-corruption
    campaign against the backdrop of Ján Kuciak's murder, wins the first round of
    Slovakia's presidential election with 40.5% of the vote while the ruling Direction
    – Social Democracy Party's candidate Maroš Šefčovič receives 18.6% of the vote.
    As no candidate reached 50%+1 votes in the first round, Čaputová and Šefčovič
    will take part in a second round on March 30, 2019. The ruling Direction – Social
    Democracy Party suffers its worst result since its founding in 1999. (Reuters)
    (The Guardian) (BBC News) (Slovakia's Election Commission)
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Kirsten Gillibrand 2020 presidential campaign
  - U.S. Senator Kirsten Gillibrand of New York formally announces she is officially
    running for the Democratic Party's nomination for President of the United States
    in the 2020 election. (The New York Times)
