Date: '2019-03-28'
Source_URI: Portal:Current events/2019 March 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - At least 11 people are killed following an explosion in Mogadishu, Somalia. (Al
    Jazeera)
  - European migrant crisis
  - The Maltese Navy seizes control of commercial tanker Elhiblu 1, which was hijacked
    by migrants off the coast of Libya yesterday. The tanker is now docked in the
    Maltese capital, Valletta. (BBC News)
  Business and economy:
  - WOW air, an Icelandic low-cost airline, ceases operations. (Icelandic Transport
    Authority) (CBC)
  Disasters and accidents:
  - At least 18 people have died after a truck struck a crowd gathered at a road accident
    in western Guatemala. The group had apparently gathered on the road to inspect
    a person who had been killed in a separate crash when the vehicle ploughed into
    them. The estimates of those dead were later revised by officials. (Sky News)
    (Reuters) (BBC News)
  - A fire breaks out in Dhaka, Bangladesh, at a 22-story tower, killing at least
    25 people and injuring more than 70 others. (BBC News)
  Law and crime:
  - The Supreme Court of the United States rejects a request by gun rights activists
    to grant a temporary stay on the Trump administration's ban on bump stock attachments
    that allow semi-automatic firearms to be fired rapidly. The policy took effect
    Tuesday after a similar bid to delay implementation was rejected. (Reuters)
  - Judge John D. Bates of the Federal District Court for the District of Columbia,
    in a case filed by 11 states, strikes down the Trump administration rule broadly
    re-defining an Association Health Plan employer to include self-employed individuals
    with no employees because it violates the Employee Retirement Income Security
    Act of 1974 and the Affordable Care Act of 2010. (The New York Times via msn.com)
  Politics and elections:
  - 2019 Venezuelan presidential crisis
  - Venezuelan state comptroller Elvis Amoroso announces that opposition leader Juan
    Guaidó is barred from holding public office for 15 years because of irregularities
    in his financial records. Guaidó, the National Assembly President, says he will
    continue his campaign to oust President Nicolás Maduro. (CBS News)
