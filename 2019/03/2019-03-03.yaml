Date: '2019-03-03'
Source_URI: Portal:Current events/2019 March 3
Intelligence_Payload:
  Disasters and accidents:
  - Tornado outbreak of March 3, 2019
  - At least 23 people are confirmed dead, many are injured, and 10,000 customers
    are without electricity after several tornadoes strike Lee County in southeast
    Alabama. (Fox News) (BBC News)
  - After heavy snowfall, avalanches close Interstate 70 and three Copper Mountain
    passes in Summit County, Colorado. (KCNC-TV)
  Politics and elections:
  - 2019 Estonian parliamentary election
  - Jüri Ratas, incumbent Prime Minister of Estonia, and his party gets second place
    in the election, while opposition leader Kaja Kallas's Estonian Reform Party gets
    the largest number of votes, and the right-wing Conservative People's Party doubles
    in seats. (BBC News)
  - 2019 Italian Democratic Party leadership election
  - Governor of Lazio, Nicola Zingaretti, wins the leadership election by a landslide,
    defeating Maurizio Martina and Roberto Giachetti, and becoming the new Secretary
    of the Democratic Party. (The Guardian)
  - National Emergency Concerning the Southern Border of the United States
  - Senator Rand Paul is expected to vote against Donald Trump’s national emergency.
    (The Hill)
  Science and technology:
  - 2019 in spaceflight
  - SpaceX's unmanned spacecraft Dragon 2 successfully docks with the International
    Space Station (ISS) for the first time. (BBC News) (NASA Spaceflight)
  Sports:
  - 2019 in tennis, 2019 Roger Federer tennis season, Open Era tennis records – men's
    singles
  - Roger Federer wins the 2019 Dubai Tennis Championships, his 100th ATP singles
    title overall, defeating Stefanos Tsitsipas, 6–4, 6–4, in the final. Federer became
    the second male tennis player in the Open Era after Jimmy Connors to win 100 ATP
    singles titles. (ATP Tour)
