Date: '2019-01-24'
Source_URI: Portal:Current events/2019 January 24
Intelligence_Payload:
  Disasters and accidents:
  - The city of Adelaide, South Australia, records its hottest ever temperature, with
    the official West Terrace weather station reaching at around 3:36pm local time,
    and the former Kent Town station reaching . This is the highest recorded temperature
    in any Australian state capital. The high temperatures have proven fatal for significant
    numbers of local animals. (BBC)
  - Three people die due to the severe storms in the Spanish region of Asturias. (El
    País)
  Politics and elections:
  - 2018 Democratic Republic of the Congo general election
  - Félix Tshisekedi is sworn in as the 5th President of the Democratic Republic of
    the Congo, marking the first transition of power by an election in the country
    since it gained independence in 1960. (Al Jazeera)
  - Brazilian legislator and LGBT rights activist Jean Wyllys announces he will leave
    his office and his country after death threats against him increase in number
    and intensity. Wyllys will be replaced by fellow PSOL politician David Miranda.
    (The Guardian)
  Law and crime:
  - Former Scotland First Minister Alex Salmond is charged with two attempted rapes
    and indecent assault. (NBC News)
  - Crime in Pennsylvania, List of mass shootings in the United States in 2019
  - A gunman kills three people and injured one other person before committing suicide
    in State College, Pennsylvania, United States. (ABC News)
