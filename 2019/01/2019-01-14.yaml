Date: '2019-01-14'
Source_URI: Portal:Current events/2019 January 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - A suicide bomber kills four people and injures over 100 others in a car bomb attack
    in Kabul, Afghanistan. (Al Jazeera)
  Disasters and accidents:
  - 2019 Saha Airlines Boeing 707 crash
  - A Boeing 707 cargo plane crashes into a building in Karaj, Iran, after overshooting
    the runway during its landing. Officials confirm that of 16 people on board, 15
    are killed and one is injured. No casualties are reported on the ground. (BBC
    News)
  Law and crime:
  - Paweł Adamowicz, the Mayor of Gdańsk, Poland, dies in hospital of stab wounds
    after an attack at a charity event the night before. (The Guardian)
  - Robert Lloyd Schellenberg, a Canadian in China, is sentenced to death after a
    one-day retrial for attempting to smuggle over 222 kilograms (489.4 pounds) of
    methamphetamine through the country. Schellenberg's new sentence comes amid increasing
    tensions between Canada and China. (CNN) (Fox News)
  Politics and elections:
  - Over 31,000 teachers, nurses, counselors and librarians in Los Angeles, who have
    been without a contract for more than a year, go on a strike to demand higher
    pay after negotiations for improved compensation and work conditions failed. (CBS
    News) (Al Jazeera)
