Date: '2019-01-30'
Source_URI: Portal:Current events/2019 January 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - A grenade is lobbed in a Zamboanga mosque in the Philippines, killing two people
    and injuring four others. No group has claimed responsibility. (Al Jazeera)
  Business and economy:
  - Foxconn's Wisconsin plant
  - Taiwanese manufacturer Foxconn announces that the company is reconsidering their
    plan to manufacture LCD panels in a promised Wisconsin plant because of a changed
    global marketplace, and the high cost of United States labor. Foxconn said, earlier
    in January, that it still planned to create 13,000 jobs in Wisconsin. The State
    of Wisconsin pledged subsidies worth more than $3bn. (BBC News) (Reuters)
  Disasters and accidents:
  - January 2019 North American cold wave
  - Several hundred flights are cancelled in Chicago amidst an extreme cold wave bringing
    temperatures of to the region. Amtrak, Metra and South Shore Line have also cancelled
    services. (WBBM-TV) (NBC News)
  - Ten deaths have been reported across the midwest due to the record breaking low
    temperatures. (NBC News)
  - After a fire at a Consumers Energy natural gas compressor station, Michigan residents
    are asked to turn down their heat to conserve natural gas. (MLive.com), (WEYI-TV)
  - Two overcrowded boats carrying migrants capsize off the coast of Djibouti, leaving
    at least 28 people dead and over 130 others missing, according to the International
    Organization for Migration. (The Guardian)
  Law and crime:
  - Suspicious items, later discovered to be incendiary devices, are found near a
    police station in Eugene, Oregon. An investigation is ongoing. (KVAL), (KEZI)
  International relations:
  - Canada–Cuba relations, Havana syndrome
  - Canada announces that it will withdraw half of its embassy staff in Cuba following
    the fourteenth confirmed illness since 2017 of a Canadian diplomat in the country.
    (BBC News)
  Science and technology:
  - Cancer research
  - An Israeli team of scientists claim to have developed a cure for cancer. This
    claim is criticized by other scientists, who say it is likely faked. (Times of
    Israel)
