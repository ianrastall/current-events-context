Date: '2019-01-15'
Source_URI: Portal:Current events/2019 January 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Nairobi attack
  - Multiple explosions and gunfire are reported after four armed men stormed the
    Dusit hotel in Nairobi, Kenya. The Somalia-based militant group Al-Shabaab claims
    responsibility. (BBC News)
  Arts and culture:
  - 2019 Prayag Kumbh Mela
  - The largest human gathering in the world, the Kumbh Mela festival, starts at Prayagraj
    (previously known as Allahabad), India. More than 120 million Hindu devotees,
    as well as tourists, are expected. (The Guardian)
  International relations:
  - North Korea–United States relations
  - South Korean media reports that North Korean officials are expected to visit the
    United States to discuss a second summit between the two countries at an unspecified
    date. (Reuters) (Al Jazeera)
  Law and crime:
  - Laurent Gbagbo, former President of Ivory Coast, is acquitted of crimes against
    humanity charges by the International Criminal Court. (BBC News)
  - U.S. District judge Jesse Furman issues a decision that invalidates the Trump
    administration's addition of a U.S. citizenship question to the 2020 census. This
    is the first ruling on this issue. There are four more lawsuits, filled by dozens
    of states, cities and other groups, yet to be heard. (NPR)
  - Catalan regional police in Barcelona and Igualada arrest 17 suspected terrorists
    ready to launch a terrorist attack. (The Telegraph) (Europa Press)
  Politics and elections:
  - Brexit negotiations, Meaningful vote
  - British Prime Minister Theresa May's Brexit deal is defeated in Parliament by
    432 votes to 202, the worst defeat for a Prime Minister in modern British history.
    As a result, a vote of no confidence in her government will be held tomorrow.
    (Reuters) (BBC News)
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Democratic U.S. Senator Kirsten Gillibrand of New York announces she is running
    for president in 2020. (NPR)
  Science and technology:
  - The correction of the North Magnetic Pole model, one year ahead of the regular
    five-year update, scheduled to be released this week is delayed until the end
    of January because of the U.S. federal government shutdown. The model is used
    in navigation and by the GPS systems in smartphones. The pole has been wandering,
    much faster than expected, away from the Canadian Arctic toward Siberia. (UPI)
    (M.I.T. Technology Review) (The Maritime Executive)
