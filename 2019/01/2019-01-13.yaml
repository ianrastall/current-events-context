Date: '2019-01-13'
Source_URI: Portal:Current events/2019 January 13
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War
  - The Syrian government and pro-government militants fire artillery into villages
    inside the Idlib de-escalation zone, killing one civilian and leaving two civilians
    injured. (AA)
  Arts and culture:
  - British newspaper The Guardian switches from polythene wrappers to compostable
    material made from potato starch based on customer feedback. The paper said this
    packaging, which is biodegradable but cannot be recycled, increases operating
    costs. (BBC News)
  Business and economy:
  - Ten Mile Junction LRT station along the Bukit Panjang LRT line has been permanently
    closed which led to the cessation of Bukit Panjang LRT Service C which ran from
    this station and looping at Bukit Panjang town via Senja. This was the first ever
    operational MRT or LRT station to be permanently closed in Singapore's history
    of MRT and LRT. (Straits Times)
  Disasters and accidents:
  - An avalanche near the Austrian Lech am Arlberg ski resort kills three skiers and
    leaves a fourth missing. (NBC News) (BBC News)
  Law and crime:
  - A man stabs the Mayor of Gdańsk, Paweł Adamowicz, on stage at a Great Orchestra
    of Christmas Charity event in Gdańsk, Poland. (The Guardian)
  - Italian far-left terrorist Cesare Battisti is extradited to Italy after his capture
    in Bolivia. Battisti was convicted of multiple murders nearly three decades ago.
    (ABC)
  Politics and elections:
  - Macedonia naming dispute
  - Alexis Tsipras, leader of SYRIZA in Greece, announces a vote of confidence in
    his government after Panos Kammenos, leader of the Independent Greeks (ANEL),
    announces that it will withdraw from the ruling coalition due to opposition to
    the Prespa agreement. (FT)
  - 2019 Venezuelan presidential crisis
  - The President of the National Assembly of Venezuela, Juan Guaidó, is briefly detained
    in Caracas after saying he was prepared to assume the country's presidency. (BBC
    News)
