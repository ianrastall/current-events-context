Date: '2019-01-20'
Source_URI: Portal:Current events/2019 January 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Northern Mali conflict
  - At least ten United Nations peacekeepers are killed and several others injured
    in an Islamist militant attack on their base in Mali's northern Kidal Region.
    (Al Jazeera)
  Disasters and accidents:
  - Two people died and 25 more were injured, four seriously, in a fire at the ski
    resort of Courchevel in the French Alps. (RTE)
  International relations:
  - Chad–Israel relations
  - Chad and Israel restore diplomatic relations with each other after Israeli Prime
    Minister Benjamin Netanyahu meets with Chadian President Idriss Déby in N'Djamena.
    Chad severed ties with Israel in 1972. (i24 News)
  Sports:
  - 2018–19 NFL playoffs
  - In American football, the Los Angeles Rams defeat the New Orleans Saints in the
    NFC Championship Game, 26-23, to advance to Super Bowl LIII and play the New England
    Patriots, who defeated the Kansas City Chiefs in the AFC Championship Game. The
    NFC Championship game is best known for an unpenalized pass interference committed
    by cornerback Nickell Robey-Coleman on wide receiver Tommylee Lewis, which is
    nicknamed as the NOLA No-Call. (CBS Sports) (CNN)
