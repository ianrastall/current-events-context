Date: '2019-01-22'
Source_URI: Portal:Current events/2019 January 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - Israeli–Palestinian conflict
  - A Hamas militant is killed and two others are injured when an Israeli tank fires
    into the Gaza Strip after a protest turned violent. The Israel Defense Forces
    action is retaliation for a shooting which lightly injured an officer, and for
    the brief incursion of two Palestinians into Israel. (Reuters)
  - 2019 Venezuelan protests
  - A 16-year-old boy is shot and killed at around midnight on Tuesday evening/Wednesday
    morning during protests in the Venezuelan capital Caracas. Three others are killed
    in overnight protests in Estado Bolívar. (The Washington Post), (Business Standard)
  Arts and culture:
  - The nominees for the 91st Academy Awards, honoring the best in cinema in 2018
    are announced, with Roma and The Favourite leading with 10 nominations each. (The
    New York Times)
  Disasters and accidents:
  - 2019 Piper PA-46 Malibu disappearance
  - In the Channel Islands, a multinational search and rescue operation for a missing
    aircraft carrying Cardiff City F.C. footballer Emiliano Sala resumes, after fading
    light and deteriorating weather conditions caused the search to be called off
    the previous day. (BBC News)
  - A bus catches fire after crashing with a truck in Lasbela, Pakistan, killing 27
    people and injuring others. (Dawn)
  - Five foreign demining experts, identified as two South Africans, one Croatian,
    one Bosnian and one Kosovar, are killed in an accidental explosion in Yemen. (BBC
    News)
  - A Tupolev Tu-22M3 supersonic strike bomber crashes in Russia's northwestern Murmansk
    region while attempting landing during a storm. Three of its four crewmen are
    killed. (Reuters)
  International relations:
  - Kuril Islands dispute, Japan–Russia relations
  - Japanese Prime Minister Shinzō Abe and Russian President Vladimir Putin meet in
    Moscow to discuss a peace treaty and the Kuril Islands dispute. (TASS) (Al Jazeera)
  - An Israeli spokesman says Israeli Prime Minister Benjamin Netanyahu has cancelled
    Wednesday's Qatari aid of $15 million to Gaza Strip. (Reuters)
  Law and crime:
  - American singer Chris Brown and two associates are briefly detained in Paris after
    being accused of aggravated rape and drug offenses. (NBC News)
  - Transgender personnel in the United States military
  - The U.S. Supreme Court allows, by a 5–4 vote, the Trump administration to begin
    implementing the policy that prohibits transgender persons who require or have
    undergone gender transition from serving. Unresolved challenges remain in lower
    courts. (BBC News)
  Politics and elections:
  - 2018 North Carolina's 9th congressional district election
  - North Carolina Superior Court judge Paul Ridgeway rejects the bid to certify Republican
    Mark Harris as the winner of the country's last undecided congressional race until
    there's a final decision in the investigation into possible illegal tactics. (Reuters)
    (WSOC-TV)
  Sports:
  - 2019 Baseball Hall of Fame balloting
  - The National Baseball Hall of Fame announces the results of voting by the Baseball
    Writers' Association of America (BBWAA) to determine players to be formally inducted
    in July 2019. Roy Halladay, Edgar Martínez, Mike Mussina, and Mariano Rivera are
    elected and will join Harold Baines and Lee Smith, elected by a Hall committee
    in December 2018, at the induction ceremonies in Cooperstown, New York. Rivera
    is the first player ever to be elected unanimously by the BBWAA. (ESPN)
