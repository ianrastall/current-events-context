Date: '2019-01-10'
Source_URI: Portal:Current events/2019 January 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - 32 people were killed by the Taliban while the Taliban lost 25 of their members
    in shooting attacks across Afghanistan (RadioLiberty)
  - Yemeni Civil War (2015–present)
  - A Houthi drone strike on Al Anad Air Base in Lahij Governorate, Yemen, during
    a military parade, kills six soldiers and injures several senior officials. (BBC
    News)
  - South Thailand insurgency
  - Four civil defense volunteers were shot dead by suspected militants in a school
    in Pattani's Yarang District. Police suspect the attack could have been done by
    Barisan Revolusi Nasional. Two insurgents were later killed by the police. (The
    Thaiger)
  Politics and elections:
  - 2018 Democratic Republic of the Congo general election
  - After several delays, the Congolese election commission announces that Félix Tshisekedi
    is the winner of the December 30 presidential election. (France24)
  - Popular candidate Martin Fayulu, who came in second, claims the election was rigged
    and says he will challenge the result. (AP)
  - Crisis in Venezuela, Second inauguration of Nicolás Maduro
  - Nicolás Maduro is sworn in for his second term as President of Venezuela amid
    widespread condemnation over his election as "illegitimate". (Reuters)
  - Germany has announced its support for the Venezuelan National Assembly to take
    over Executive powers in Venezuela. (El Nacional)
  - Several Latin American countries close their embassies in Venezuela in protest
    of Maduro's "illegitimate" election. (Al Jazeera)
  - President of the National Assembly of Venezuela, Juan Guaidó, declares a State
    of Emergency as the country enters a "de facto dictatorship". (Asamblea Nacional)
  Science and technology:
  - Russia confirms that a fireball seen over much of New Zealand on January 5 was
    its Kosmos 2430 missile early warning satellite, which was launched in 2007. (The
    Guardian)
