Date: '2019-01-09'
Source_URI: Portal:Current events/2019 January 9
Intelligence_Payload:
  Disasters and accidents:
  - Remnants of a Dassault Mirage 2000D fighter jet are found in Jura, France, after
    the aircraft with two pilots onboard disappeared from radar. (France Info)
  Law and crime:
  - Diplomatic offices in Melbourne, Australia, are evacuated after suspicious packages
    were found. (Reuters)
  - Former Israeli minister Gonen Segev pleads guilty to spying for Iran, in exchange
    for an 11-year prison sentence. (Reuters)
  - German prosecutors say, based on CCTV images, that most of AfD politician Frank
    Magnitz's injuries yesterday may have been sustained as he hit the ground after
    having been elbowed once by three people and falling over. Magnitz says the attack
    may have been an attempted robbery. (Deutsche Welle)
  Politics and elections:
  - Brexit negotiations
  - After a vote by MPs in the House of Commons, the government is required to table
    an alternative Brexit plan within 3 days of the vote, if it fails to pass a majority
    on January 15. (BBC News)
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Joining several other Democrats in the race, Senator Kamala Harris of California
    announces her intention for running in the 2020 United States presidential election.
    (KCBS Radio)
  Science and technology:
  - Havana syndrome
  - Two biologists who analysed a sound recording obtained by the Associated Press
    in 2017, say that it closely matches the calling song of the Indies short-tailed
    cricket, a species not known to exist in Cuba. (NBC News)
  - Scientists announce through the Nature journal, the discovery of 13 deep-space
    fast radio bursts (FRBs), named FRB 180814, by the CHIME radio telescope in British
    Columbia, Canada. (BBC News)
