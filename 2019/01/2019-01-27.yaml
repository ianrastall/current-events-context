Date: '2019-01-27'
Source_URI: Portal:Current events/2019 January 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Jolo Cathedral bombings
  - Two bombs at the Roman Catholic Our Lady of Mount Carmel Cathedral in Jolo, Philippines,
    kill 20 people, fifteen civilians and five soldiers, and injure 81 others. Abu
    Sayyaf is suspected to be behind the attack. (Sky News)
  Disasters and accidents:
  - 2019 Abancay landslide
  - At least 15 people are killed and 28 others injured when the roof of a hotel collapses
    after a landslide during a wedding in Abancay, Peru. (América Televisión)
  - January 2019 North American cold wave
  - Numerous winter storm and blizzard warnings are issued across the Midwestern United
    States as a storm that could bring up to of snow in the following days moves across
    the region. (The Weather Channel)
  Sports:
  - 'In motorsport, the 2019 24 Hours of Daytona endurance race is won by the #10
    Cadillac of Wayne Taylor Racing. Drivers Fernando Alonso, Jordan Taylor, Kamui
    Kobayashi, and Renger van der Zande are declared the winners after heavy rain
    forces the race to be halted for the final two hours. (Motorsport.com)'
