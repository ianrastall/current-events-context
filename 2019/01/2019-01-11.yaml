Date: '2019-01-11'
Source_URI: Portal:Current events/2019 January 11
Intelligence_Payload:
  Armed conflict and attacks:
  - Two Iraqis were killed and 25 others were injured in a car bomb blast outside
    a public market in the town of Al-Qaim. The Islamic State is presumed to be behind
    the attack. (TheDailyStar)
  Disasters and accidents:
  - A bus crash in eastern Cuba leaves at least seven people dead, including four
    foreigners, and 33 others injured. (BBC News)
  - An Ottawa, Canada municipal transit bus crashes into a station, killing three
    people and injuring 23 others. (CBC)
  Law and crime:
  - Kidnapping of Jayme Closs
  - Teenager Jayme Closs, who went missing in October 2018 in Wisconsin after the
    murder of her parents, is found alive. A suspect, Jake Thomas Patterson, age 21,
    has been arrested and charged with two counts of murder and one count of kidnapping.
    (CBS News), (Milwaukee Journal-Sentinel)
  Politics and elections:
  - United States federal government shutdown of 2018–2019
  - An estimated 800,000 federal government workers miss their first paycheck of the
    shutdown as it enters into its 21st day, which ties the record set by the shutdown
    of 1995 and 1996. (Associated Press via MSN)
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Joining several other Democrats in the race, Representative Tulsi Gabbard of Hawaii
    announces her intention for running in the 2020 United States presidential election.
    (CNN)
  - Crisis in Venezuela, 2019 Venezuelan presidential crisis
  - Juan Guaidó holds an open cabildo, performed as a rally and national address,
    announcing his plans to take control of the Presidency of Venezuela, with the
    Organization of American States declaring their support for his assumption of
    office. (The Guardian)
  - In an official National Assembly statement, Guaidó assumes office, to the extent
    that is possible, as acting President – invoking the Constitution of Venezuela.
    (Asamblea Nacional)
