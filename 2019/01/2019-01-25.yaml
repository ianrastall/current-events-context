Date: '2019-01-25'
Source_URI: Portal:Current events/2019 January 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 18 people were killed and 23 others were injured when gunmen belonging to the
    "Union for Peace" group, attacked a funeral ceremony in the town of Ippy, Central
    African Republic. (The Tribune)
  Disasters and accidents:
  - Brumadinho dam disaster
  - A mining dam owned by the Brazilian company Vale collapses in Minas Gerais, leaving
    248 dead and 22 people missing. (BBC News)
  - 2019 South Sulawesi floods
  - At least 59 people are killed when flooding and landslides hit South Sulawesi,
    Indonesia. Twenty-five others are missing and thousands have been displaced. (Al
    Jazeera) (Yahoo! News)
  - A plane and a helicopter collide over Testa del Rutor near the border of France
    and Italy, leaving seven dead. (Corriere della Sera)
  Law and crime:
  - Mueller special counsel investigation
  - Roger Stone, a former adviser to U.S. President Donald Trump, is indicted by a
    federal grand jury and arrested on charges of obstruction, giving false statements,
    and witness tampering as part of special counsel Robert Mueller's probe into Russian
    interference in the 2016 United States elections. (NBC News)
  Politics and elections:
  - Macedonia naming dispute
  - The parliament of Greece votes 153–146 in approval of changing the name of the
    Republic of Macedonia to the Republic of North Macedonia, ending a 27-year naming
    dispute. (BBC News)
  - 2018–19 United States federal government shutdown
  - U.S. President Donald Trump announces a short-term deal has been reached with
    congressional leaders to temporarily reopen the federal government after a partial
    shutdown that has lasted for 35 days. The stop-gap agreement will last three weeks,
    until February 15, and will allow for talks to continue over security on the Mexico-United
    States border. The temporary deal includes no money for President Trump's planned
    additional border barrier with Mexico. (NBC News)
  - 2020 United States presidential election, 2020 Democratic Party presidential primaries
  - Two sources with direct knowledge tell Yahoo! News that Senator Bernie Sanders
    plans to announce his intention to run for the presidency in the 2020 presidential
    election. (Yahoo! News)
  - Retired U.S. Army major and former West Virginia State Senator Richard Ojeda suspends
    his campaign for presidency in the 2020 presidential election. (The Intercept)
  - 2019 Bangsamoro Autonomous Region creation plebiscite
  - The ratification of the Bangsamoro Organic Law is proclaimed paving the way for
    the creation of the Bangsamoro Autonomous Region in the Philippines. (Rappler)
