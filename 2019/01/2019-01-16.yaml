Date: '2019-01-16'
Source_URI: Portal:Current events/2019 January 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Manbij bombing
  - In Manbij, Syria, a suicide attack claimed by ISIL causes at least 19 casualties.
    Among them, two U.S. soldiers, a Pentagon Civilian, and a civilian contractor
    are reported dead and three other Service Members injured. (The Washington Post)
  - 2019 Nairobi attack
  - Dozens of people remain missing one day after a deadly attack on a popular hotel
    complex in Nairobi, according to the Kenya Red Cross Society. (NBC News)
  - Gunmen attack two villages in the Ménaka region, Mali, near the border with Niger,
    killing at least 20 people. (NOVÝ CAS)
  - Second Libyan Civil War
  - Five people are killed and twenty are injured in clashes between rival militias
    in Tripoli, breaking several months of relative peace. (Middle East Eye)
  - Terrorism in the United States
  - A man from Georgia planned to attack the White House and even tried to trade his
    own car for weapons for the attack. (BBC News)
  Law and crime:
  - At least 21 people are killed in a massacre by gunmen in police uniforms in Port-au-Prince,
    Haiti. (The Independent)
  Politics and elections:
  - United States federal government shutdown
  - About 42,000 active-duty Coast Guard members, who continue to work on essential
    operations, missed their scheduled paycheck Tuesday. This is the first time that
    United States Armed Forces servicemembers have not been paid during a shutdown
    or other lapse in government appropriation. (NBC News)
  - President Donald Trump signs a bill which requires the government to compensate
    government employees after the shutdown is over for their work during the shutdown.
    (CNN)
  - Speaker of the House Nancy Pelosi suggests that President Trump's State of the
    Union address scheduled for January 29 be delayed or use a drastically modified
    format due to security concerns related to the ongoing government shutdown. (NPR)
  - Brexit negotiations, Meaningful vote
  - Theresa May's government survives a no confidence vote by a majority of 19. (BBC
    News)
  - 2018 Andalusian regional election
  - The Andalusian parliament elects Juan Manuel Moreno Bonilla as the next regional
    President with the votes of conservative party PP, liberal party Cs and far-right
    party Vox, ending a 36-year term, since the restoration of democracy, of social
    democratic PSOE government. (El Mundo)
  - Macedonia naming dispute
  - Greek Prime Minister Alexis Tsipras survives a no-confidence vote after the Independent
    Greeks party quit the ruling coalition. (The New York Times)
