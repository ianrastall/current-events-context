Date: '2019-01-26'
Source_URI: Portal:Current events/2019 January 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - Nairobi Latema Road blast
  - An explosive device goes off outside a cinema in a busy part of Kenya’s capital,
    injuring two people. The area was also the place of an attack earlier this month.
    (The Washington Post)
  Disasters and accidents:
  - 2019 South Sulawesi floods
  - The death toll from floods and landslides in South Sulawesi, Indonesia, rises
    to 68, while six people are still missing. (Channel NewsAsia)
  - At least 15 people are killed in a crash between a bus and a truck in Arequipa,
    Peru. (América Televisión)
  Law and crime:
  - January 2019 Louisiana shootings
  - A 21-year-old man shoots and kills five people, including his parents and girlfriend,
    in two Louisiana parishes. The suspect fled to Virginia and was arrested the next
    day. (CBS News) (People)
  Politics and elections:
  - 2019 Venezuelan presidential crisis, Crisis in Venezuela, Russia–Venezuela relations
  - Reuters reports that Russian private military contractors belonging to the Wagner
    Group have flown into Venezuela to help guard President Nicolás Maduro, and that
    Russia supports Maduro's disputed government. (Reuters)
  - In an emergency United Nations Security Council meeting called by the United States,
    U.S. Secretary of State Mike Pompeo tells the representatives of each government
    in attendance to make it known whether their country will support the disputed
    presidency of Maduro or his contested political rival Juan Guaidó as the leader
    of Venezuela. (The Washington Post)
  - The Bank of England blocks Maduro's officials from withdrawing $1.2 billion worth
    of gold. (Bloomberg)
  - European countries, led by France, the United Kingdom, Germany and Spain, notify
    Venezuelan President Nicolás Maduro that he must call elections within eight days
    or they will officially recognize the claim of leadership made by Guaidó. (BBC
    News)
  - Canadian Prime Minister Justin Trudeau fires Canada's ambassador to China, John
    McCallum, following McCallum's remarks about the extradition of Huawei's CFO,
    Meng Wanzhou. (BBC News)
