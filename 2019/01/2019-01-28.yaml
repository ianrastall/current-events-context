Date: '2019-01-28'
Source_URI: Portal:Current events/2019 January 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - Boko Haram insurgency
  - Boko Haram kills 60 people in an arson attack in the town Rann. (Reuters)
  - Seven people were killed and 26 injured in a bike bombing at a market in Mokha,
    Yemen. Houthis were blamed for the attack. (The Straits Times)
  Disasters and accidents:
  - Tornadoes of 2019
  - A tornado in eastern Havana, Cuba, kills three people and injures 174 others.
    (Euronews)
  International relations:
  - Brexit negotiations
  - British Prime Minister Theresa May tells Conservative lawmakers that she plans
    to hold a vote in parliament on her Brexit deal on February 13. (The New York
    Times)
  Law and crime:
  - Six Tanzanian children are killed for their eyes, ears and other body parts. A
    Njombe district official, who found many were taken when they were home alone
    whilst their parents were working, believes that superstitious beliefs and witchcraft
    are involved. Four other missing children have been found alive. (BBC News)
  - The United States Justice Department, Department of Homeland Security, Department
    of Commerce and Federal Bureau of Investigation announces 23 criminal charges
    against China's telecom Huawei and its chief financial officer Wanzhou Meng, which
    include banking and financial fraud, money laundering, wire fraud, conspiracy
    to defraud the United States, theft of trade secret technology, provided bonus
    to workers who stole confidential information from companies around the world,
    obstruction of justice and sanctions violations. (BBC News)
  - Pecan Park raid
  - Texas Police shoot and kill two homeowners after invading their house. 5 officers
    were injured in a substantial shootout in Harris County near Houston. Reports
    later indicated one of the officers lied that drugs were in the house. (ABC News)
  Politics and elections:
  - 2019 Venezuelan presidential crisis, United States–Venezuela relations, Crisis
    in Venezuela, Second Cold War
  - The United States Department of the Treasury imposes sanctions on Venezuela's
    state-owned oil company PDVSA, which accounts for much of Venezuela’s income and
    foreign currency. (United States Department of the Treasury)
  - Kremlin Press Secretary Dmitry Peskov denies the presence of Russian mercenaries
    in Venezuela, despite earlier reports that up to 100 may have been deployed to
    protect President Nicolás Maduro. (South China Morning Post)
  - 2019 State of the Union Address
  - U.S. President Donald Trump accepts House Speaker Nancy Pelosi's invitation to
    deliver the State of the Union Address on February 5. (The Washington Post)
  - 2019 Guatemalan general election
  - Semilla Movement announces that on March 3 it will officially proclaim the presidential
    candidacy of former Attorney General Thelma Aldana. (Voice of America)
  - The 2018 Corruption Perceptions Index names Somalia as the most corrupt country
    in the world, followed by South Sudan and Syria, while Denmark was again named
    the least corrupt country. The United States drops out of the top 20 least corrupt
    countries for the first time since 2011. (Daily Mail)
