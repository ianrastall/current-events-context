Date: '2019-01-19'
Source_URI: Portal:Current events/2019 January 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - Dissident Irish Republican campaign
  - A car bomb explodes outside a courthouse in Londonderry, Northern Ireland. The
    bomb exploded as the area was being evacuated, and there were no injuries. Investigations
    currently point responsibility for the attack towards the New IRA dissident organisation.
    (BBC News)
  Arts and culture:
  - American singer R. Kelly is dropped by RCA Records following the release of Surviving
    R. Kelly, a Lifetime documentary detailing alleged sexual assaults committed by
    him. (Variety)
  Disasters and accidents:
  - 2018–19 North American winter
  - A state of emergency is declared in Pennsylvania and New Jersey as a large winter
    storm makes its way to the northeastern United States. Three people have already
    been killed due to it. (AccuWeather) (The Weather Channel)
  - List of earthquakes in 2019
  - A magnitude 6.7 earthquake hits Coquimbo, Chile. Light damage is reported and
    thousands of homes lose power. (Devdiscourse)
  Law and crime:
  - 2019 Indigenous Peoples March Incident
  - Covington Catholic High School faces backlash after a video of students were seen
    mocking a Native American elder at the Indigenous Peoples' March in Washington
    DC. (USA Today) (Cincinnati Enquirer) (WDRB)
  Politics and elections:
  - President of Burkina Faso Roch Marc Christian Kaboré announces in a televised
    statement that Prime Minister Paul Kaba Thieba and the cabinet have resigned from
    their positions effective immediately. No reason is given. (BBC News)
  - 2018 Democratic Republic of the Congo general election
  - The Constitutional Court of DR Congo rejects an appeal for a vote recount of the
    30 December 2018 election by second-place candidate Martin Fayulu, upholding Félix
    Tshisekedi as the winner. (France24)
  - Martin Fayulu claims to be the "legitimate president" and calls on the international
    community to not recognize the result. (Deutsche Welle)
