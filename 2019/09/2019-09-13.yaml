Date: '2019-09-13'
Source_URI: Portal:Current events/2019 September 13
Intelligence_Payload:
  Business and economy:
  - Transport in Paris
  - Parisian metro workers launch a general strike, the largest of its kind since
    2007, in protest at Emmanuel Macron’s pension reforms. Ten of the sixteen metro
    lines and two major regional train lines are shut down during morning rush hour.
    (Reuters)
  Disasters and accidents:
  - A fire in a hospital kills eleven people in Rio de Janeiro, Brazil. (G1)
  - Two students are killed when a bus rolls over east of Bamfield, British Columbia.
    (Global News)
  International relations:
  - Sanctions against North Korea, North Korea–United States relations
  - The U.S. Treasury imposes sanctions on the Lazarus Group and two of its affiliates,
    accusing them of being responsible for several recent cyberattacks under direction
    from North Korea's RGB intelligence agency. (Washington Post)
  Law and crime:
  - Ponte Morandi collapse
  - Three employees of infrastructure firm Atlantia are arrested by Italian police
    on suspicion of offences connected to falsification of safety documentations for
    motorway bridges. The probe follows the disaster which killed 43 in August 2018.
    (Reuters)
  - 2019 college admissions bribery scandal
  - American actress Felicity Huffman is sentenced to fourteen days in jail and fined
    US$30,000 for her role in the conspiracy. (Reuters)
