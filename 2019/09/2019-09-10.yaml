Date: '2019-09-10'
Source_URI: Portal:Current events/2019 September 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - American-led intervention in Iraq (2014–2021)
  - The United States Air Force launches a small shock and awe bombing raid using
    F-35 and F-15 Eagle warplanes on the ISIL-occupied Qanus Island in Iraq's Saladin
    Governorate, dropping 36,000 kg of explosives. The small island was being used
    by ISIL as a "major transit hub", according to the U.S.-led coalition. (The Independent)
    (Sky News)
  Business and economy:
  - Jack Ma retires and Daniel Zhang succeeds him as executive chairman of Alibaba
    Group. (International Business Times)
  Disasters and accidents:
  - Karbala stampede
  - Thirty-one pilgrims are killed and 100 others are injured in a stampede in the
    city of Karbala, Iraq, while marking Ashura. (Gulf News)
  Health and environment:
  - Fukushima disaster cleanup
  - As Tepco says that, by 2022, it will run out of storage room for what is now more
    than 1 million tonnes of radioactively contaminated reactor core cooling water,
    Japanese Minister of the Environment Yoshiaki Harada opines that "the only option
    will be to drain it into the sea and dilute it". (Reuters)
  International relations:
  - Colombia–Venezuela relations
  - 150,000 Venezuelan troops begin exercises along the Colombian border. Nicolás
    Maduro's Venezuelan government says it is to intercept an attack from the other
    country, despite no indications there will be one. (Reuters)
  - 2019 Hong Kong protests, Hong Kong Human Rights and Democracy Act
  - Chief Executive of Hong Kong Carrie Lam urges "foreign parliaments" not to interfere
    in Hong Kong's internal affairs and says continued violence "cannot solve the
    issues". (CNN)
  Politics and elections:
  - List of Trump administration dismissals and resignations
  - United States National Security Advisor John R. Bolton is dismissed by President
    Donald Trump, citing strong disagreements. Bolton insists he resigned. The interim
    replacement is to be Deputy Charles Kupperman, says the White House. (BBC News)
  - September 2019 Israeli legislative election, Proposed Israeli annexation of the
    Jordan Valley
  - With next week's election in sight, Prime Minister of Israel Benjamin Netanyahu
    proposes to annex parts of the West Bank and the Jordan Valley. Prime Minister
    of the State of Palestine Mohammad Shtayyeh replies that "Netanyahu is the chief
    destroyer of the peace process". (The Jerusalem Post) (NBC News)
  - 2019 North Carolina's 9th congressional district special election
  - In a special election viewed as prescient to the 2020 elections, Republican Dan
    Bishop beats Democrat Dan McCready by two percentage points. (The New York Times)
  - The California State Senate approves Assembly Bill 5, a bill to regulate gig economy
    work, introducing a formal test to classify workers as independent contractors
    or employees. (TechCrunch) (The Week)
