Date: '2019-09-25'
Source_URI: Portal:Current events/2019 September 25
Intelligence_Payload:
  Business and economy:
  - Collapse of Thomas Cook
  - German airline Condor, a subsidiary of the now insolvent Thomas Cook Group, files
    for bankruptcy. (BBC News)
  - Secretary of State for Transport Grant Shapps announces that the UK government
    is planning to introduce new legislation in the aftermath of Thomas Cook's collapse
    in order to allow "more orderly" bankruptcies by travel agencies and airlines.
    (Sky News)
  - Northern Irish bus manufacturer Wrightbus collapses into administration after
    buyout talks fail, with 1,200 jobs lost. Local politicians urge action from UK
    Prime Minister Boris Johnson, who commissioned the so-called "Boris Bus" from
    the company when he was Mayor of London and previously promised to "do everything
    we can to ensure the future of" Wrightbus. (Sky News)
  Disasters and accidents:
  - Rescuers reach the wreckage of a Twin Otter cargo plane that crashed last week
    between Timika and Ilaga in Papua, Indonesia. All four persons on board are found
    dead, and their bodies are recovered. (The Malaysian Insight)
  Health and environment:
  - Climate change mitigation
  - An advisory board to the Dutch government recommends reducing speed limits on
    roads and using public money to purchase outdated cattle farms as part of a raft
    of measures to tackle global warming-linked nitrogen emissions in the country.
    (Associated Press)
  - Economy of Poland
  - Polish Energy Minister Krzysztof Tchórzewski announces the ruling Law and Justice
    party plans to pass new laws to enable more coal mines to be built. (Reuters via
    Euronews)
  International relations:
  - Foreign relations of Kiribati
  - Kiribatian President Taneti Mamau condemns Australia for the alleged apathy the
    Australian government shows toward small island nations in the Pacific facing
    the threat of global warming. (RNZ)
  Law and crime:
  - A bomb explodes as a police riot bus passes by in Yüreğir, Adana Province, Turkey.
    At least five officers are injured. (Bianet)
  - Cannabis in Australia
  - The Australian Capital Territory (ACT) becomes the first jurisdiction in Australia
    to legalize the recreational use of cannabis. From January 31, 2020, adults within
    ACT will be allowed to have 50 grams of the drug and can grow up to four cannabis
    plants at home. (BBC News)
  - Millionaire Italian yacht businessman Giulio Lolli is convicted of terrorism in
    Libya and sentenced to life imprisonment by a court in Tripoli. Lolli is wanted
    for fraud in Italy, and his Italian lawyer says the Libyan legal case appears
    to be based on Lolli using a yacht to evacuate fighters from Tripoli. (The Times)
  - A jury in New York convicts Dilkhayot Kasimov, a citizen of Uzbekistan, of terrorism
    offences for attempting to raise funds to assist a friend in travelling to join
    ISIL. Five others pleaded guilty in 2015. (Associated Press)
  - Suspected serial killer Gracious David-West confesses to fifteen murders at a
    hotel in Port Harcourt, Nigeria. (The Telegraph)
  - The military court in Blida sentences Mohamed Mediène, , and Louisa Hanoune, four
    persons from the ruling elite around former Algerian President Abdelaziz Bouteflika,
    to 15-year jail terms for conspiracy against the army and the authority of the
    Algerian state. (Reuters)
  - Impeachment inquiry into Donald Trump
  - The United States House of Representatives issues an impeachment inquiry into
    President Donald Trump. (CNN)
  - Danske Bank money laundering scandal
  - Authorities raid the German bank Deutsche Bank as part of a money laundering probe
    into €200 billion of suspicious payments identified into the accounts of Danske
    Bank's branch in Estonia. Danske Bank's Estonian boss from 2007 to 2015 is found
    dead near Tallinn at his home in circumstances police describe as neither suspicious
    nor accidental. (City A.M.)
  - A federal grand jury indicts a US Army soldier on charges of distributing explosives
    information as part of an alleged far-right terror plot. (CNN)
  Politics and elections:
  - September 2019 Israeli legislative election
  - Israeli President Reuven Rivlin formally gives Benjamin Netanyahu the mandate
    to form the next Israeli government by October 24, after 55 members of the Knesset
    recommended the latter, compared with 54 recommendations for Benny Gantz. If Netanyahu
    fails, the mandate could be transferred to Gantz. (The Jerusalem Post)
  Science and technology:
  - The Soyuz-MS spacecraft Sarmat, carrying Hazza Al Mansouri, the first United Arab
    Emirates astronaut, and Expedition 61 crew members Jessica Meir and Oleg Skripochka,
    is launched to the International Space Station. It was the final flight of the
    Soyuz-FG launch vehicle – all future Soyuz MS spacecraft launches will be conducted
    with the Soyuz-2. (Spaceflight Now) (CBS News)
