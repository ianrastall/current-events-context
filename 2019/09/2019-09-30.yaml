Date: '2019-09-30'
Source_URI: Portal:Current events/2019 September 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - Somali Civil War
  - Islamist militants launch two attacks against foreign forces in Somalia. A U.S.
    military base in Baledogle, Lower Shabelle, is stormed by attackers using two
    car bombs and guns, and an Italian peacekeeping convoy is targeted by additional
    bombs in Mogadishu. United States and Italian authorities both state no injuries
    occurred, although the suicide bombing against the Italian convoy destroyed a
    military vehicle and heavily damaged nearby buildings. Al-Shabaab claims responsibility
    for both attacks. (Newsweek)
  - Yemeni Civil War, Yemeni peace process
  - The International Committee of the Red Cross says that the Houthis have unilaterally
    released 290 prisoners. The move is part of a peace agreement brokered in Stockholm
    by the United Nations in December. The Houthis call on their opponents to take
    a comparable step. (BBC News)
  - The Swedish Navy formally relocates its headquarters back to the underground Muskö
    naval base on the island of Muskö after a 25-year absence. The move from Karlskrona
    naval base to Muskö is based on the calculation that only Muskö could withstand
    a Russian attack, according to the Swedish Defence Research Agency. (The Guardian)
  Business and economy:
  - The American clothing retailer Forever 21 files for Chapter 11 bankruptcy and
    announces it will close up to 178 stores. (NPR)
  - French airline XL Airways grounds all flights amid financial difficulties ahead
    of a bankruptcy hearing scheduled for Wednesday. (The Local)
  - Slovenian airline Adria Airways cancels all flights and files for bankruptcy.
    (Reuters)
  International relations:
  - Foreign relations of Vanuatu, 2019 Papua protests
  - At the United Nations, the Prime Minister of Vanuatu, Charlot Salwai, calls for
    "action on West Papua". He was rebuffed by Indonesian diplomats. (RNZ)
  - Iraq–Syria relations
  - The main border crossing between Al-Qa'im, Iraq, and Albukamal, Syria, reopens.
    (AFP via The Daily Star)
  Law and crime:
  - Eight alleged members of a far right terror cell go on trial in Germany. The defendants,
    from Chemnitz, are accused of plotting attacks against immigrants and "the economic
    establishment". The city saw far-right protests last year following the stabbing
    homicide of a German man. (BBC News)
  - Moroccan journalist Hajar Raissouni and her husband Rifaat al-Amin are each jailed
    for a year by a Rabat court for premarital sex and unlawful abortion, with doctor
    Mohammed Jamal Belkeziz receiving two years for carrying an abortion out. Her
    lawyer claims the evidence was fabricated to dissuade Raissouni and others from
    criticising the government. Observers including Amnesty International criticise
    the verdicts. (The Guardian)
  - European migrant crisis
  - Riots erupt following a fire yesterday which killed an Afghan woman at an overcrowded
    refugee camp on the Greek island of Lesbos. The camp in Moria houses 13,000 in
    tents and shipping containers but has facilities for only 3,000 residents. The
    Greek government declares it will step up transfers to the mainland in response.
    (The Guardian)
  Politics and elections:
  - 2019 Peruvian constitutional crisis
  - President of Peru Martín Vizcarra dissolves the Congress and calls for snap elections.
    Lawmakers reject the proposal, suspend him from office and name Vice President
    Mercedes Aráoz as acting president. The Peruvian Armed Forces continued to recognize
    Vizcarra as President of Peru and head of the armed forces. Popular protests backing
    the President takes place in the streets of Lima. (BBC News) (The Guardian) (The
    New York Times)
  - Vicente Zeballos is named new Prime Minister, replacing Salvador del Solar. (Andina)
  Science and technology:
  - Scientists say the largest iceberg in 50 years has broken away from Antarctica's
    Amery Ice Shelf. The 1,636 sq km iceberg, known as D28, will continue to be monitored
    as it could pose a risk to shipping. (BBC News)
  - A near-record snowstorm drops large amounts of snow in some parts of Alberta,
    from September 27-30. 95 cm fell in Waterton, 50-60 cm fell in Lethbridge, and
    over 27-32 cm fell in Calgary. Impacts were relatively mild, with power outages,
    and businesses closing. (The Globe and Mail)
