Date: '2019-09-29'
Source_URI: Portal:Current events/2019 September 29
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian and Yemeni border conflict, Yemeni Crisis, Najran attack
  - Yemen's Houthi movement releases footage appearing to show captured Saudi Arabian
    Army soldiers and burning armoured personnel carriers, after claiming to have
    conducted an "all-out" cross-border offensive inside Saudi Arabia's Najran Region
    that defeated three "enemy military brigades". (Al Jazeera)
  Disasters and accidents:
  - A fire at an overcrowded refugee camp on the Greek island of Lesbos kills an Afghan
    woman living in a shipping container. A local official claims "aggressive" residents
    at the camp prevented firefighters from accessing the blaze, and that thrown stones
    and other missiles injured first responders and damaged their vehicles. (The Guardian)
  Politics and elections:
  - 2019 Austrian legislative election
  - The Federal Electoral Authority, based on preliminary results, reports the People's
    Party, headed by the prior chancellor Sebastian Kurz, wins the snap election with
    38.4 percent of the vote. Second place Social Democratic Party got 21.5%. (BBC
    News) (The New York Times) (National Election Authority (in German)) (Reuters)
  Sports:
  - 2019 UCI Road World Championships
  - Mads Pedersen wins the men's Road race World Championship as the first rider from
    Denmark ever. (BBC Sport)
