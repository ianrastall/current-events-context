Date: '2019-09-09'
Source_URI: Portal:Current events/2019 September 9
Intelligence_Payload:
  Disasters and accidents:
  - Typhoon Faxai kills three people and causes damage to Japan's capital Tokyo. (The
    Japan Times)
  International relations:
  - Nuclear program of Saudi Arabia
  - Saudi Arabia says it experiments with two nuclear reactors and wants to go ahead
    with the "full nuclear cycle", implying also uranium enrichment. The United States
    states they would like to pursue a Section 123 Agreement to accompany the transfer
    of U.S. technology. (Reuters)
  - The International Monetary Fund confirms that Kristalina Georgieva is the only
    candidate for the nomination as its Managing Director. (Politico.eu)
  Law and crime:
  - 2019 Samoa assassination plot
  - Three suspects appear in court in Apia, Samoa, where two of them enter not-guilty
    pleas and the other a guilty plea on charges of conspiracy to assassinate the
    Prime Minister of Samoa. The defendant who pleaded guilty is due to be sentenced
    on September 30. (RNZ)
  Politics and elections:
  - 2019 Tuvaluan general election
  - Citizens of Tuvalu head to the polls to elect the 15 members of the parliament.
    (Fenui News)
  - Politics of the United Kingdom
  - John Bercow announces his resignation as Speaker of the House of Commons, effective
    October 31. (The Irish Times)
  - Women's rights in Iran
  - An Iranian female football fan, Sahar Khodayari, dies one week after setting herself
    on fire outside a court, reportedly after learning she may have to serve a six-month
    sentence for trying to enter a football stadium alongside men. (The Washington
    Post)
