Date: '2019-09-01'
Source_URI: Portal:Current events/2019 September 1
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabian-led intervention in Yemen, Iran–Saudi Arabia proxy conflict
  - More than 100 people are killed in a Saudi airstrike on a detention centre in
    Dhamar, Yemen, according to the International Committee of the Red Cross. Saudi
    Arabia says it hit a Houthi military facility used to store drones and missiles,
    "in accordance with international humanitarian law". Iran labels the airstrike
    as a "war crime". (BBC News) (The New York Times) (Iran Press)
  - War in Afghanistan
  - A vehicle triggers a roadside bomb in Balkh, Afghanistan; all eight civilians
    on board are killed. (Xinhua)
  Business and economy:
  - Economic history of Argentina, Presidency of Mauricio Macri
  - A Necessity and Urgency Decree reinstates currency controls in Argentina. (Reuters)
    (Buenos Aires Económico)
  Disasters and accidents:
  - 2019 Amazon rainforest wildfires
  - Troops join volunteers battling wildfires in Bolivia. (Al Jazeera)
  - Germany and Norway cease paying into the Amazon Fund, citing concerns over Brazil's
    environmental policies and the role they have played in the fires. (Al Jazeera)
  - A flight plan transmission computer system fails in France, causing disruption
    to international flights across Western Europe. (BBC News) (Le Parisien)
  - 2019 Atlantic hurricane season
  - Hurricane Dorian
  - Category 5 Hurricane Dorian, with maximum sustained winds of 185 mph (295 km/h),
    makes landfall on Elbow Cay in the northern Bahamas Abaco islands. The storm is
    heading west at 7 mph toward Grand Bahama and the southeast American coast. Storm
    surges from Dorian, which ties as the second strongest Atlantic hurricane on record,
    are predicted to be as high as 23 feet (7 meters) in places. (BBC News) (Reuters)
    (National Hurricane Center)
  - A partially occupied building under construction collapses, killing 15 people
    in Bamako, Mali. (AFP via Eyewitness News)
  - A medical aircraft crashes into a resort in Pansol, Philippines. All nine on board
    are killed, with two injuries on the ground. (The Evening Standard)
  International relations:
  - Germany–Poland relations
  - German President Frank-Walter Steinmeier asks Poland's forgiveness at a remembrance
    ceremony in Wieluń, Poland, attended together with Polish President Andrzej Duda.
    The heads of state commemorate Nazi Germany's bombing of Wieluń on the first day
    of World War II, the world's bloodiest conflict, 80 years ago. (France 24)
  Law and crime:
  - Gun politics in the United States
  - New laws come into effect in the state of Texas that allow for less restrictions
    on the carrying of guns in "schools, places of worship, foster homes where children
    live and apartments". (NBC News)
