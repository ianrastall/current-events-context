Date: '2019-09-27'
Source_URI: Portal:Current events/2019 September 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - American intervention in Libya (2015–2019)
  - The United States Africa Command says the US has carried out an airstrike against
    ISIL in southwest Libya, killing at least 17 militants. (The Straits Times)
  Business and economy:
  - Collapse of Thomas Cook
  - Portugal announces it has set aside 150 million euros to lend to the companies
    that have been hurt by the collapse of tour guide company Thomas Cook. (Reuters)
  Health and environment:
  - September 2019 climate strikes, Individual and political action on climate change
  - An estimated two million people across the world participate in strikes to encourage
    action on climate change, with a total of 6 million during the week, including
    up to 500,000 protesters in Montreal, Quebec, Canada. (The Guardian) (CBC)
  International relations:
  - Foreign relations of China, Foreign relations of Taiwan, Foreign relations of
    Kiribati, Cross-Strait relations
  - Anti-China protests are held by the opposition in Kiribati's capital of Tarawa
    after the government severed ties with Taiwan and established relations with China.
    (RNZ)
  - Turkey–United States relations
  - Turkish President Recep Tayyip Erdoğan says that it is "impossible" for his country
    to stop buying oil from Iran, despite United States sanctions against Iran. (Reuters)
  - U.N. General Assembly 74th session, Foreign relations of North Macedonia
  - North Macedonia establishes diplomatic relations with Armenia, Monaco, San Marino
    and Tunisia at the 74th session of the United Nations General Assembly. (Ministry
    of Foreign Affairs of North Macedonia) (News.am) (Foreign Minister of North Macedonia)
  - 2019 Venezuelan presidential crisis
  - Diplomats of several Western-aligned countries walk out of the UN General Assembly
    as Venezuelan Vice-President Delcy Rodríguez begins a speech. (Fox News)
  Law and crime:
  - Honour killing in Pakistan
  - The brother of Pakistani social media star Qandeel Baloch is sentenced to life
    in prison for her honour murder, while six others are acquitted. The case sparked
    international headlines and discussion of women's rights in the country. (BBC
    News)
  - Crisis in Venezuela
  - A resolution is adopted by the United Nations Human Rights Council with 19 votes
    in favour, 7 against and 21 abstentions, accusing Venezuela's Nicolás Maduro government
    of thousands of extrajudicial murders, forced disappearances, and torture, after
    being proposed by the Lima Group and backed by many European countries. The UN
    resolves to send an investigative mission to the country. Maduro says the motion
    was "produced by the United States to run a hate campaign". Another Venezuelan
    representative calls the UN a "small group" that they "will not cooperate with".
    (BBC News)
  - Police in Kaduna, Nigeria, raid an Islamic learning centre, and free around 500
    men and male children held captive there. The freed detainees allege torture,
    slavery, and sexual abuse, and some display evidence of injury and malnutrition.
    Two children self-identify as being from Burkina Faso, with the remaining captives
    thought by police to be mostly Nigerian. Eight suspects are arrested. (BBC News)
  Politics and elections:
  - UK Prime Minister Boris Johnson is formally referred to the Independent Office
    for Police Conduct (IOPC) amid allegations of corruption during his tenure as
    Mayor of London. Johnson is alleged to have awarded a close friend, American technology
    entrepreneur Jennifer Arcuri, "thousands of pounds" in public business funding,
    according to the The Sunday Times. (The Guardian)
  - 2019 Trump–Ukraine scandal, Impeachment inquiry into Donald Trump
  - Kurt Volker, United States special envoy to Ukraine, resigns one day after the
    release of a whistleblower report concerning a phone call between U.S. President
    Donald Trump and Ukraine President Volodymyr Zelensky. (CNN) (Reuters)
  - 2020 United States federal budget
  - President of the United States Donald Trump signs a short-term spending bill that
    temporarily extends government funding through November 21, thereby avoiding a
    federal government shutdown when the 2019 budget funding ends on September 30.
    (The Hill) (CNN)
  - Fale Alea elects Pohiva Tuʻiʻonetoa as Prime Minister of Tonga succeeding the
    interim premiership of Semisi Sika. (RNZ)
