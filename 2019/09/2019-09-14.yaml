Date: '2019-09-14'
Source_URI: Portal:Current events/2019 September 14
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Abqaiq–Khurais attack, Saudi Arabian-led intervention in Yemen
  - Two Saudi Aramco oil refineries, one in Abqaiq and one in Khurais, Saudi Arabia,
    are attacked by drones, resulting in massive fires. The fires are under control,
    according to the Saudi Arabian Interior Ministry. Houthi militants claim responsibility,
    saying that they used 10 drones for the attack. (Euronews)
  - According to Al Jazeera, Saudi Aramco's exports and oil production are disrupted
    by 5 million barrels of oil a day, half of the entire Saudi Arabian oil exports.
    (Al Jazeera) (Al Jazeera)
  Disasters and accidents:
  - Seven people are hospitalized after a taxi drives onto the sidewalk outside Kanayama
    Station in Nagoya, Japan. (NHK)
  Politics and elections:
  - A charity ship, carrying 82 migrants rescued off the coast of Libya, is offered
    docking at the Italian island of Lampedusa. The migrants can be brought ashore
    after "several E.U. countries" agreed to take them in, Italian Prime Minister
    Giuseppe Conte said on Thursday. (Reuters)
  Sport:
  - In Gaelic football, Dublin defeat Kerry 1–18 to 0–15 in the 2019 All-Ireland Senior
    Football Championship Final replay to become the first male team in GAA history
    to win 5 All-Ireland titles in a row. (RTE)
