Date: '2019-09-16'
Source_URI: Portal:Current events/2019 September 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Abqaiq–Khurais attack, Iran–Saudi Arabia proxy conflict, Iran–United States
    relations
  - Iran says the accusations about the Saudi Arabian oil facilities attacks are unacceptable
    and baseless. (Al Arabiya English)
  - Iraq says the United States has told them that the information the U.S. has "confirms
    the Iraqi government's statement that its territory was not used to carry out
    this attack". (Reuters)
  - Saudi Arabia says Iranian weapons were used in the attacks. (Swissinfo)
  Business and economy:
  - Economy of China
  - Figures released by the National Bureau of Statistics of China show that industrial
    production growth in August was at a 17-year low. (SCMP)
  Law and crime:
  - Grenfell Tower fire
  - Officers with the Metropolitan Police interview members of the London Fire Brigade
    under caution in connection with the disaster. The fire brigade is being treated
    as a corporation suspected of breaching health and safety legislation. (The Guardian)
  Disasters and accidents:
  - One firefighter is killed and six others are injured after a propane gas leak
    leads to a large explosion at a non-profit organization in Farmington, Maine.
    (CNN) (WGME)
  International relations:
  - Iran–United Arab Emirates relations
  - The Islamic Revolutionary Guards Corps of Iran says it has seized a vessel in
    the Persian Gulf which it claims was smuggling diesel fuel to the United Arab
    Emirates. (Radio Free Europe/Radio Liberty)
  - Political status of Taiwan, Foreign relations of China, Foreign relations of the
    Solomon Islands
  - The Cabinet of the Solomon Islands votes to shift diplomatic ties from Taiwan
    to China. Taiwanese Minister of Foreign Affairs Joseph Wu says that, since the
    Solomon Islands decided to establish diplomatic relations with China, this prompts
    Taiwan to cut ties with the Solomon Islands". (Hong Kong Free Press) (Reuters)
  Politics and elections:
  - Brexit
  - UK Prime Minister Boris Johnson abruptly pulls out of a press conference in Luxembourg
    to avoid an anti-Brexit protest organised and attended by British citizens living
    in Luxembourg. Luxembourg Prime Minister Xavier Bettel attends the press conference,
    where, during a short speech followed by questions from journalists, he contradicts
    Johnson's prior public statements and exposes that the UK government has not submitted
    any concrete proposals for amendments to the UK's Withdrawal Agreement from the
    European Union, or delivered any alternative to the "Irish backstop" which Johnson
    wishes to replace. Bettel warns that Johnson "holds the future of all UK citizens
    in his hands" and that he shouldn't "hold the future hostage for party political
    gain". (BBC News)
  - At the Liberal Democrats conference, party leader Jo Swinson reaffirms that if
    elected any future Liberal Democrat led government, would halt Brexit by revoking
    Article 50, adding that in the case of a hung parliament she would not enter a
    coalition with either the Conservatives or Labour. (BBC News)
