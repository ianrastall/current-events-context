Date: '2019-09-06'
Source_URI: Portal:Current events/2019 September 6
Intelligence_Payload:
  Arts and culture:
  - Amazon is criticized for the trailer and synopses of its new season of Jack Ryan,
    which are interpreted to promote a US-led invasion of Venezuela. (Yahoo!)
  Disasters and accidents:
  - At least 43 people are now confirmed to have been killed by Hurricane Dorian in
    the Bahamas. The death toll is expected to rise further. (BBC News)
  Politics and elections:
  - Niuean MP Terry Coe says there is "growing concern" over the absence of Premier
    Toke Talagi, who is reportedly undergoing medical treatment in New Zealand and
    has not been seen in public since July and, prior to that, early April. Coe says
    Niue's citizens are concerned that the state affairs are seemingly being conducted
    from New Zealand, and the island nation's acting premier has held power for an
    unusually long period of time due to Talagi's absence. (Radio New Zealand)
  - Robert Mugabe, the second president of Zimbabwe, dies at the age of 95. (CNBC)
  - The United Kingdom's House of Lords approves a bill forcing Prime Minister Boris
    Johnson to ask the European Union for a Brexit deadline extension. The bill will
    now become law once receiving royal assent from Queen Elizabeth II. (BBC News)
  - The first government of Sudan after the Omar Al-Bashir era is formed, headed by
    Abdalla Hamdok. (Al Jazeera)
  - 2019 Venezuelan presidential crisis
  - Venezuelan political parties waive the multi-party agreement to rotate leadership
    of the National Assembly annually in favor of allowing Juan Guaidó to continue
    in the position for another term. (Reuters)
  Science and technology:
  - A denial-of-service attack takes down Wikipedia, with users unable to access the
    encyclopedia in Europe and parts of the Middle East. The Wikimedia Foundation
    blames a "massive and very broad" distributed denial of service attack. (The Independent)
    (Deutsche Welle) (TechCrunch)
  - The Indian Space Research Organization loses contact with Vikram moments before
    its planned soft landing on the Moon. India would have been the fourth nation
    to have explored the lunar surface, had Vikram successfully landed, and it would
    have deployed the Pragyan rover onto the surface. (NPR)
