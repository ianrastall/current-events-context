Date: '2019-09-21'
Source_URI: Portal:Current events/2019 September 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iran–Saudi Arabia proxy conflict
  - 2019 Abqaiq–Khurais attack
  - Saudi Foreign Minister Adel al-Jubeir says the international community must take
    a firm stand on Tehran and that if confirmed Iran is behind the attacks against
    the oil facilities, Saudi Arabia will "take the necessary steps" to "respond appropriately".
    (Reuters)
  - 2019 Karbala bombing
  - ISIL claims responsibility for yesterday's bombing in Iraq, in which 12 were killed.
    (The New York Times)
  Disasters and accidents:
  - Search and rescue operations begin for a baby who is missing after a migrant boat
    carrying fourteen people sinks near Turkey. (The Daily Sabah)
  - Authorities in Texas report a fifth death from Tropical Storm Imelda. (Los Angeles
    Times)
  - Venezuelan migrant crisis
  - As the number of refugees from the crisis in Venezuela is projected to surpass
    the 6 million figure in 2020, matching that of the Syrian Civil War now, Brookings
    Institution calculates that aid for Venezuelan emigration is yet only 1.5% that
    for Syrian emigrants after five years of crisis. (Bloomberg)
  Health and environment:
  - Individual and political action on climate change
  - Global warming protesters glue themselves to a road near the Port of Dover in
    England, blocking it. Police arrest ten people, believed to be members of Extinction
    Rebellion. Further scheduled protests take place in a dedicated area set up by
    police. (BBC News)
  International relations:
  - Iran's Revolutionary Guards leader, Hossein Salami, warns that "any country that
    attacks the Islamic Republic will have their mainland turned into the main battlefield".
    He further added that "any attack will not stop until the full destruction of
    the aggressor". (Al Arabiya English)
  Law and crime:
  - Terrorism in Turkey
  - Turkish authorities declare a forest wildfire near Istanbul to be the result of
    terrorism. They say a suspect is in custody. (The Daily Sabah)
  - A mass shooting in Lancaster, South Carolina, leaves 2 men dead and 9 other people
    injured. (USA Today)
  Politics and elections:
  - Brexit
  - Thousands of protestors march in Edinburgh, Scotland, against the upcoming departure
    of the United Kingdom from the European Union. The crowd is addressed by Members
    of the UK Parliament, and Members of the Scottish Parliament. Amongst the attendees
    is MSP Joanna Cherry QC, who is taking legal action against UK Prime Minister
    Boris Johnson's recent prorogation of the UK Parliament. Cherry's action succeeded
    at Scotland's Court of Session, and is currently being reviewed by the UK Supreme
    Court. (BBC News)
