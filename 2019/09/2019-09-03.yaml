Date: '2019-09-03'
Source_URI: Portal:Current events/2019 September 3
Intelligence_Payload:
  Armed conflicts and attacks:
  - Second Yemeni Civil War
  - At least 1,000 Saudi-led coalition forces are reported killed or captured after
    being enveloped and besieged in the Jabara Valley, Saada Governorate, Yemen. (Middle
    East Eye)
  Business and economy:
  - The Institute for Supply Management releases numbers that indicate that manufacturing
    activity in the United States declined in the month of August, the first such
    decline in three years. (Reuters)
  - Aftermath of the 2019 El Paso shooting
  - Walmart announces it will stop selling ammunition for handguns and some assault
    weapons in all of its American stores in response to a shooting that killed 22
    and injured 24 at one of its El Paso, Texas stores last month. It and Kroger also
    ask customers not to bring guns into the stores. (Reuters)
  Disasters and accidents:
  - Sinking of MV Conception
  - Search and rescue efforts for those remaining missing off the Californian coastline
    are called off as the National Transportation Safety Board arrives to launch a
    federal investigation. (NBC Los Angeles)
  - 2019 Atlantic hurricane season
  - Bahamian Prime Minister Hubert Minnis confirms two more people have been killed
    by Hurricane Dorian, raising the death toll to seven. (Associated Press)
  International relations:
  - United States sanctions against Iran
  - The U.S. State Department announces sanctions against the Iranian Space Agency,
    Iranian Space Research Center and Aeronautics Research Institute. (Xinhua)
  Law and crime:
  - Xenophobia in South Africa, 2019 Johannesburg riots
  - A wave of xenophobic attacks on migrants and foreign owned businesses in South
    Africa, particularly targeting Nigerian citizens, continues into its sixth day.
    (Yahoo! News)
  Politics and elections:
  - Asma Mohamed Abdalla is appointed Foreign Minister of Sudan, becoming the first
    woman to hold that office. (Al Jazeera)
  - Politics of the United Kingdom, Brexit
  - British MP Phillip Lee defects from the Conservative Party to the Liberal Democrats,
    leaving Prime Minister Boris Johnson without a working majority in the House of
    Commons. (The Independent)
  - The House of Commons votes to allow an attempt to stop a no-deal Brexit. All 21
    Conservative MPs who voted with the opposition have their party whip removed and
    now sit as independents. (BBC News)
  - 2019 Italian government formation
  - Five Star Movement members agree to join a coalition with the Democratic Party.
    (Euronews)
  - Gerrymandering in the United States, Redistricting in North Carolina
  - A North Carolina state court rules the state legislative map drawn up by the Republican-majority
    state legislature violates the state constitution, and must be redrawn in time
    for the 2020 elections. (Reuters)
  - National Emergency Concerning the Southern Border of the United States, Mexico–United
    States barrier
  - The Pentagon approves to redistribute US$ 3.6 billion from military construction
    to 11 new border wall projects. (UPI News)
