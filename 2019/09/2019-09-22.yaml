Date: '2019-09-22'
Source_URI: Portal:Current events/2019 September 22
Intelligence_Payload:
  Arts and culture:
  - 71st Primetime Emmy Awards
  - Fleabag wins Outstanding Comedy Series and Game of Thrones wins Outstanding Drama
    Series at the 71st Primetime Emmy Awards. (CNBC)
  Disasters and accidents:
  - At least 22 people are killed and 15 others injured after a bus rams into a hill
    en route from Skardu to Rawalpindi, Pakistan, following a brake failure. (Sky
    News)
  - Two minibuses collide head-on near Limpopo, South Africa. All eleven on board
    the vehicles die. (ENCA)
  - Search and rescue aircraft locate wreckage near Ilaga, Indonesia. It is thought
    to be a missing Twin Otter cargo plane carrying rice and four people, but this
    remains to be confirmed. (The Aviation Herald)
  - A classroom collapses in Dagoretti, Kenya, killing at least seven children. (The
    Standard)
  Health and environment:
  - World Car-Free Day
  - Cities around the world celebrate World Car-Free Day. (UrduPoint)
  - Brussels reports up to 70% lower levels of nitrogen dioxide and black carbon in
    the atmosphere, compared to other Sundays. (Belga via Het Laatste Nieuws)
  - Over of roads are closed for traffic in central London. (The Guardian)
  - Climate change mitigation
  - German Environment Minister Svenja Schulze says the €54 billion climate plan approved
    by the German cabinet on Friday enables her country to join the Powering Past
    Coal Alliance. Germany expects to transition away from coal by 2038. (Deutsche
    Welle)
  - Effects of global warming
  - The World Meteorological Organization publishes a report stating that 2015–2019
    was the hottest five-year period since measurements began. The increase in the
    global carbon dioxide level, the rise of the sea level and the melting of ice
    caps is accelerating. (PA via breakingnews.ie)
  Law and crime:
  - Crisis in Venezuela
  - Argentina accuses Venezuela of committing "crimes against humanity", "torture
    and murder" after receiving reports from Venezuelan refugees in the country. The
    Argentine Government will file a formal accusation against Venezuela before the
    International Court of Justice. (Clarín)
  - Brexit
  - Dominic Raab says the UK Government will abide by the upcoming Supreme Court's
    ruling on the lawfulness of Prime Minister Boris Johnson's prorogation of Parliament.
    When asked if the Government would prorogue Parliament again if it wins, he answers
    that he's "keen not to take levers off the table that weaken the position of the
    UK in Brussels". (BBC News)
  - Sudanese Prime Minister Abdalla Hamdok launches an investigation into the deaths
    of dozens of protestors during a July crackdown orchestrated under the regime
    of now-ousted President Omar al-Bashir. (France 24)
  Politics and elections:
  - The Joint List recommends Benny Gantz as the next Prime Minister of Israel. This
    is the first time an Arab-led political party recommends a candidate for prime
    minister since they recommended Yitzhak Rabin in 1992. (Axios)
