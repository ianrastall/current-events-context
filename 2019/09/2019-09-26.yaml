Date: '2019-09-26'
Source_URI: Portal:Current events/2019 September 26
Intelligence_Payload:
  Business and economy:
  - The world's largest airport, Beijing Daxing International Airport, formally opens
    to commercial flights. (CNN)
  Disasters and accidents:
  - 2019 Ambon earthquake
  - A 6.5-magnitude earthquake strikes the Maluku Islands in eastern Indonesia. 30
    people are killed and 156 others injured. (Rappler)
  - Around 100 people are evacuated from Breivika port in Tromsø, Norway, after Russian
    trawler FV Bukhta Naezdnik catches fire and develops a heavy list. The burning
    ship has a tank of ammonia and 200,000 litres of diesel oil on board. The ship
    is purposely capsized to reduce the risk of the ammonia tank exploding. (BreakingNews.ie)
    (The Independent)
  - At least 30 miners are killed after a gold mine collapses due to a landslide in
    the Tibesti Region, Chad. (BBC News)
  International relations:
  - Foreign relations of Sudan, Aftermath of the Sudanese Revolution
  - Sudan closes its borders with Libya and the Central African Republic citing the
    "threat they pose to the security and economy of Sudan". (Africanews)
  - Japan–South Korea relations, 2019 Japan–South Korea trade dispute
  - Japan and South Korea fail to make progress toward resolution, but agree to continue
    dialogue. (The Japan Times) (Bloomberg)
  Law and crime:
  - The Major Criminal Court in Bahrain sentences four people to jail terms for setting
    up a terror group with the aim of launching attacks on police, and related crimes.
    Two are fugitives tried in absentia (Gulf News)
  - Authorities in the Netherlands launch a probe into bank ABN Amro. The bank is
    suspected of breaching rules on money laundering and terrorism financing. (City
    A.M.)
  Politics and elections:
  - National Emergency Concerning the Southern Border of the United States
  - The United States Senate votes to end President Donald Trump's emergency declaration
    along the U.S.-Mexico border. (CBS News)
  - September 2019 Indonesian protests and riots
  - A student dies after allegedly being shot during a violent clash between the protesters
    and police force in front of the provincial parliament building in Kendari, Indonesia.
    (The Jakarta Post)
  Science and technology:
  - The Soyuz-MS spacecraft Sarmat successfully docks with the International Space
    Station, with the first Emirati astronaut, Hazza Al Mansouri, and Expedition 61
    astronauts Jessica Meir and Oleg Skripochka joining the crew of Expedition 60
    aboard the station. (Gulf News)
