Date: '2019-09-28'
Source_URI: Portal:Current events/2019 September 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - A bomb targeting the office of Jamiat Ulema-e-Islam in Chaman, Balochistan, Pakistan,
    kills three people, including leader Maulana Mohammad Hanif, with nine more people
    injured. (Arab News)
  - Saudi Arabian-led intervention in Yemen
  - Houthi rebels claim that they have captured "thousands" of enemy troops near the
    Saudi town of Najran following a major, deadly attack near the two countries'
    border. Saudi officials have not confirmed the claim. (BBC News) (Al Jazeera)
  Disasters and accidents:
  - Flooding in the Indian state of Uttar Pradesh kills at least 93 people and displaces
    thousands of others. Another 29 people were killed in Bihar. (BBC News).
  - An oil tanker ship explodes in Ulsan, South Korea, with flames subsequently spreading
    to an adjacent second tanker. At least ten people are injured. (CBC)
  - A coach with a flat tyre swerves into oncoming traffic and strikes a lorry head-on
    in Jiangsu, China. The collision kills at least 36 and injures another 36. (The
    Guardian)
  International relations:
  - Syrian Civil War, U.N. General Assembly 74th session, Rojava conflict
  - Syrian Foreign Minister Walid al-Moualem demands the immediate withdrawal of all
    U.S. and Turkish troops from his country and warns that Syrian government forces
    have the right to take countermeasures if they refuse. (Reuters)
  Politics and elections:
  - 2019 Afghan presidential election
  - Voters in Afghanistan head to the polls to elect a new president. The process
    is overshadowed by "insurgent" attacks, which led to dozens of civilian casualties.
    (DW)
  - The Independent Election Commission says it has reports that there is no contact
    with 901 of the 4,942 polling centers. (Reuters)
  Sports:
  - The Richmond Football Club defeats the Greater Western Sydney Giants in the 2019
    AFL Grand Final by 114 points to 25, marking the club's twelfth premiership and
    second in three years. The match, attended by 100,014 spectators, is the lowest
    single-match score by the Giants in their history, and the most lopsided Grand
    Final result in Richmond's history (89 points). (The Age)
  - 2019 UCI Road World Championships
  - Annemiek van Vleuten wins the women's road race after a solo attack, with a lead
    of 2 min 15 s over second-placed defending champion Anna van der Breggen. (The
    Guardian)
