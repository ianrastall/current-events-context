Date: '2019-09-02'
Source_URI: Portal:Current events/2019 September 2
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan
  - A car bomb explodes in Kabul, killing 16 people and wounding over 100 others.
    (Al Jazeera)
  - A suicide bomber attacks a police station in Kunduz, Afghanistan. At least six
    police officers are killed and another seventeen wounded. (Xinhua)
  - Six Afghan army soldiers were killed and three police officers wounded after Taliban
    militants ambushed their patrol in the country's eastern Ghazni province. (Xinhua)
  - Gunmen open fire on a vehicle carrying Colombian mayoral candidate Karina García,
    killing her, her mother, a candidate for the municipal council, and three activists.
    (Reuters)
  - A Tunisian National Guard officer and three fighters from an armed group are killed
    in a security operation in the region of Kasserine, Tunisia. (Al Jazeera)
  Disasters and accidents:
  - Sinking of MV Conception
  - The United States Coast Guard says that 25 people died, nine went missing and
    five crew members have been rescued after a fire on a diving boat near Santa Cruz
    Island, off the coast of California. (BBC News)
  - 2019 Atlantic hurricane season
  - After killing at least five people in the Bahamas, Hurricane Dorian is downgraded
    to a Category Four hurricane as it approaches the southeastern United States.
    (The New York Times) (MSNBC)
  Law and crime:
  - 2019 Papua protests
  - Amid an ongoing Internet blackout across Papua, Indonesia says police have banned
    "fake news", "violent demonstrations" and "carrying out or spreading separatism
    in expressing opinions in public". The Chief of the Indonesian National Police
    announces that the security detail in the region has been reinforced with 6,000
    troops. (Reuters)
  - Corruption in Spain
  - Close to 40 people, including former presidents of Community of Madrid and senior
    politicians Esperanza Aguirre, Ignacio González and Cristina Cifuentes, are charged
    by the Audiencia Nacional with alleged crimes during the instruction of the Púnica
    corruption case. (El Mundo)
  - A court in Russia orders the seizure of the 41.6% share of equity in Vostochny
    Bank controlled by private equity firm Baring Vostok. The seizure, requested by
    Vostochny itself, is the latest move in continuing litigation over alleged embezzlement
    by Baring Vostok executives. (Reuters) (RAPSI)
  - Former British MP Nigel Waterson's son, 26-year-old Stephen Waterson, admits to
    having killed 3-year-old Alfie Lamb in 2018 by crushing him to death in the footwell
    of a vehicle. (Metro)
  - Italian police seize a migrant rescue boat after it spent over a week stranded
    at sea unable to find a port to accept it; over 100 migrants begin to disembark
    in Sicily. (euronews)
  - A ship carrying 635 mostly Afghan migrants from the crowded refugee camp on the
    Greek island of Lesbos arrives in the mainland port city of Thessaloniki. A second
    ship carrying 800 more is expected to arrive tomorrow. They are to be housed in
    , where a camp already houses 1,000 migrants. (Boston 25 News)
  - A 40-year-old man allegedly kills eight children outside a primary school in Hubei,
    China. (BBC News)
  - Former Guatemalan presidential candidate Sandra Torres is arrested for possible
    charges of illegal financing in her election campaign in 2015. She was given preventive
    detention at the Mariscal Zavala Military Center. (BBC News)
  Politics and elections:
  - Government of Georgia, Bakhtadze government
  - Georgian Prime Minister Mamuka Bakhtadze announces his resignation on Facebook.
    (AFP via Arab News)
  - Brexit
  - UK Prime Minister Boris Johnson holds discussions about a possible snap election
    in the face of opposition to leaving the European Union without a deal. Those
    against Johnson's plan to leave in late October with or without a deal within
    his own Conservative Party are warned they may be expelled from the party. (BBC
    News)
