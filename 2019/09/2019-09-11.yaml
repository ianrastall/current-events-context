Date: '2019-09-11'
Source_URI: Portal:Current events/2019 September 11
Intelligence_Payload:
  Business and economy:
  - China–United States trade war
  - China publishes a list of 16 U.S. goods that will be temporarily exempted from
    its retaliatory import tariffs. (Reuters)
  - China announces that it will allow the import of soybean meal from Argentina,
    to ensure livestock feed under the impact of the trade war with the U.S. Apart
    from Argentina, China has been increasing imports of soybeans and soymeal from
    other channels, such as allowing soybean meal, rapeseed meal and sunflower meal
    from Russia since September 6. (Global Times)
  - 2019 Japan–South Korea trade dispute
  - South Korea announces it will file a complaint with the World Trade Organization
    over Japanese government export controls. (Marketwatch)
  Disasters and accidents:
  - A crash of a twin-engine Convair 440 cargo plane near Toledo, Ohio, kills the
    two people on board. (CNN)
  - Effects of Hurricane Dorian in The Bahamas
  - The Bahamian National Emergency Management Agency lists approximately 2,500 people
    as missing after Hurricane Dorian devastated the islands last week. (BBC News)
  International relations:
  - Pastoral visit of Pope Francis to Africa
  - At St. Peter's Square Pope Francis reviews highlights from his African visit to
    Mozambique, Madagascar and Mauritius on September 4-10. (Crux)
  Politics and elections:
  - Suffering from pneumonia, Tongan Prime Minister ʻAkilisi Pōhiva is rushed from
    hospital in Nukuʻalofa to one in Auckland, New Zealand, where he was treated for
    a liver condition earlier this year. According to a government spokesperson, Pōhiva
    is in a "very serious" condition. (RNZ)
  - B.J. Habibie, reformist Indonesian president, dies at 83, after spending more
    than a week in intensive care. (The Washington Post)
  - Japanese Prime Minister Shinzō Abe rearranges his government cabinet, naming replacements
    at the Defense, Foreign Affairs, Environment and Olympics ministries, among others.
    (Al Jazeera)
  - Politics of the United Kingdom
  - Scotland's Court of Session rules that UK Prime Minister Boris Johnson violated
    the law by his suspension of Parliament from 9 September to 14 October, encouraging
    calls for MPs to get back to work immediately. (Reuters)
  - The Johnson ministry releases the Operation Yellowhammer contingency plans in
    the event of a no-deal Brexit to the public. (BBC News)
  - 2019 Canadian federal election
  - Canadian Prime Minister Justin Trudeau calls a general election on 21 October.
    Governor General Julie Payette, the acting head of state, formally dissolves Parliament.
    (The Independent)
  Science and technology:
  - Scientists from Denmark and the United Kingdom report they have identified genetic
    information from a 1.7-million-year-old Stephanorhinus tooth enamel from Dmanisi,
    Georgia, making it the oldest genetic data ever recorded. (Cosmos)
  - Discoveries of exoplanets
  - Water vapor is detected on exoplanet K2-18b, a super-Earth which is located about
    111 light-years away from Earth. It is the first time water has been confirmed
    on an exoplanet within the circumstellar habitable zone of a star. (BBC News)
    (Business Insider)
  - Scientists report, in the journal Gondwana Research, the discovery of an eighth—
    still hidden—continent (Greater Adria) from the break-up of supercontinent Pangaea
    which slid underneath what is now Southern Europe about 120 million years ago.
    (National Geographic) (Business Insider)
