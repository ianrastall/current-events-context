Date: '2019-06-23'
Source_URI: Portal:Current events/2019 June 23
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Houthis launch a drone strike that kills a Syrian and wounds 21 more. The attack
    takes place at the Abha International Airport, which was attacked two weeks ago
    with a ballistic missile. (Reuters)
  - There are unconfirmed reports of another attack at the Jizan Airport, although
    there has been no confirmation. (Business Insider)
  - Houthis warn of worse attacks if Saudi Arabia continues its escalation and aggression
    in Yemen. (Xinhua)
  - Boko Haram insurgency
  - Twenty-six Boko Haram militants and 11 Chadian soldiers are killed in an ambush
    after the soldiers recover cattle that the militants had seized. Nine Chadian
    soldiers are injured. (Yahoo! News)
  - Internal conflict in Myanmar
  - Twenty Myanmar soldiers and two Arakan Army insurgents are killed in clashes in
    Mrauk-U Township, Rakhine State. (Radio Free Asia)
  Arts and culture:
  - Persecution of homosexuals in Nazi Germany
  - A ceremony is held at the former site of Germany’s Buchenwald concentration camp
    to remember people imprisoned there because they were thought to be gay. (Japan
    Times)
  International relations:
  - 2019 Venezuelan presidential crisis
  - Chilean President Sebastián Piñera says he agrees with Argentine President Mauricio
    Macri that the "corrupt dictatorship of Maduro has its days numbered". (ABC ES)
  - Venezuelan refugee crisis
  - Chile is extending its offer of "democratic responsibility" visas, allowing Venezuelans
    to live in the country for up to two years, so that they may be applied for from
    any Chilean embassy or consulate in the world instead of just in Venezuela. However,
    Chile border control now also demands visas upon entry for Venezuelans, a tightening
    of the previous 90-day free period. The move should aid Venezuelans trying to
    travel through other Latin American nations that have changing restrictions. (Reuters)
  Politics and elections:
  - June 2019 Istanbul mayoral election
  - The re-run Istanbul mayoral election concludes with a victory for opposition leader
    Ekrem İmamoğlu and defeat for the ruling AK Party. (BBC News)
  - 2019 in the Czech Republic
  - Hundreds of thousands take to the streets of Prague to demand the resignation
    of Czech Prime Minister Andrej Babiš in the country's biggest protest since the
    Velvet Revolution in 1989. (BBC News) (CNN)
