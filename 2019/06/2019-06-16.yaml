Date: '2019-06-16'
Source_URI: Portal:Current events/2019 June 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Northwestern Syria offensive (April–August 2019)
  - The Syrian Army and the Turkish Land Forces exchange heavy fire in the northern
    Idlib Governorate, in what Turkish officials described as a deliberate mortar
    attack on one of their observation posts in Murak that wounded three Turkish troops.
    (Al Jazeera) (Daily Sabah)
  - At least 12 people are killed after jihadists shelled a village in Aleppo Governorate
    with mortars. (Business standard)
  - In the past week, over 160 people have been killed and 40 villages destroyed in
    attacks between tribes in the Democratic Republic of the Congo. (Al Jazeera)
  Disasters and accidents:
  - 2019 South American blackout
  - A massive blackout hits Argentina, Uruguay, and southern Brazil, leaving millions
    without power. (The New York Times)
  Law and crime:
  - A group of bandits attack a village in the Shinkafi local government area of Zamfara
    State, Nigeria, killing at least 34 civilians. The gunmen arrived on motorcycles
    and opened fire on civilians indiscriminately, later burning down homes. (Reuters)
  International relations:
  - Israel–United States relations
  - Israeli Prime Minister Benjamin Netanyahu formally unveils Trump Heights, a new
    settlement in the Golan Heights, named after U.S. President Donald Trump for his
    decision to recognise Israeli sovereignty over the occupied territory. (BBC News)
  - Japan–Mongolia relations, Japan–North Korea relations
  - Foreign Minister of Japan Tarō Kōno seeks cooperation from Mongolia over efforts
    to settle the issue of past abductions of Japanese nationals by North Korea, as
    Mongolia maintains friendly ties with Pyongyang. Japan has no ties with North
    Korea and pushes for further sanctions. (The Japan Times)
  Politics and elections:
  - 2019 Guatemalan general election
  - Citizens of Guatemala head to the polls to vote for their next president and new
    members of the country's congress. (BBC News)
  - 2019 Conservative Party leadership election
  - The first televised debate between Conservative Party candidates for Leader of
    the Conservative Party and Prime Minister of the United Kingdom takes place in
    London. Frontrunnner Boris Johnson refuses to attend. (BBC News)
  - 2019 Hong Kong anti-extradition bill protests
  - The scheduled peaceful mass protest, despite bill suspension yesterday, of nearly
    2 million people gather in Victoria Square demanding the legislation be withdrawn.
    If the organizers numbers are confirmed, this is the largest protest ever. Hong
    Kong leader Carrie Lam apologizes for proposing the bill. Police say turnout was
    338,000 at its peak. (BBC News)
  Sports:
  - Toyota Gazoo Racing wins the 2019 24 Hours of Le Mans. (The Guardian)
  - 2019 U.S. Open (golf)
  - Gary Woodland wins his first major championship, finishing three shots ahead of
    two-time defending champion Brooks Koepka at Pebble Beach, California. (AP via
    ESPN)
