Date: '2019-06-10'
Source_URI: Portal:Current events/2019 June 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - June 2019 Mali massacre
  - An attack on a village near the town of Sangha in central Mali kills 95 Dogon
    villagers. The mayor of nearby Bankass blames local Fulani. (BBC News)
  - Boko Haram militants attacked the town of Darak in Cameroon’s Far North Region
    bordering Lake Chad, killing 21 soldiers and 16 civilians. Several Boko Haram
    attackers were also killed. (xinhuanet)
  Arts and culture:
  - The Vatican issues a teaching instruction, Male and Female He Created Them, which
    criticizes the theory of gender as being more complex than the binary division
    of sexes. The document draws criticism from LGBT groups. (BBC News)
  Business and economy:
  - Defense contractors United Technologies and Raytheon agree to merge into a combined
    company that would generate $74 billion in annual sales, making it the second-largest
    aerospace and defense company in the U.S. (CNBC) (Bloomberg)
  Disasters and accidents:
  - A man died and 15 others are injured after an accidental explosion at the building
    of the Comune in Rocca di Papa, Italy. Emanuele Crestini, the mayor of the city,
    was critically injured and died ten days later from his injuries, bringing the
    death toll to two. (Corriere della Sera)
  - Earthquakes in 2019
  - A magnitude 4.0 earthquake is reported in Northeast Ohio. No damage has been reported.
    (News 5 Cleveland) (NBC News)
  - A helicopter crashes onto the roof of the AXA Equitable Center in New York City,
    killing the pilot. (The New York Times)
  Health and environment:
  - Phase-out of lightweight plastic bags
  - Canadian Prime Minister Justin Trudeau announces that Canada will ban all single-use
    plastics as early as 2021 in a bid to significantly reduce plastic pollution.
    (BBC News)
  Law and crime:
  - McStay family murder
  - In San Bernardino, California, Charles "Chase" Merritt is found guilty of four
    counts of murder in the 2013 deaths of the McStay family. (The Los Angeles Times)
  - Rape in India
  - An Indian court convicts six men in the 2018 rape and murder of an eight-year-old
    girl near Kathua in the state of Jammu and Kashmir. Three of the men are given
    life sentences while the other three, found guilty of destroying evidence, receive
    five-year prison terms. (NPR)
  - Former Boston Red Sox star David Ortiz returns to Boston to recover from a shooting
    in the Dominican Republic. (CBS News)
  - Internal conflict in Myanmar
  - Two hundred Myanmar Army troops surround Pauktawbyin monastery in Rakhine State,
    demanding that they be allowed entry to search for Arakan Army insurgents possibly
    hiding in an IDP camp within the monastery. The head monk initially refused, saying
    that they would only allow inspections by people in civilian clothes, but later
    permitted their entry. (RFA)
  Politics and elections:
  - Nechirvan Barzani is sworn in as the new President of Iraqi Kurdistan. In his
    first speech as President, Barzani says he will seek to improve ties with Baghdad,
    and create a joint-security plan to prevent ISIL from re-emerging in the region.
    (Rudaw)
  - Congressman Justin Amash announces that he will leave the Freedom Caucus, weeks
    after calling for the impeachment of President Donald Trump. (Politico)
