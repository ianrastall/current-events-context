Date: '2019-06-26'
Source_URI: Portal:Current events/2019 June 26
Intelligence_Payload:
  Armed conflicts and attacks:
  - In Pakistan three suicide bombers attempted to storm a police housing complex
    in the southern Balochistan province. One of them was killed by guards, while
    the two others entered and blew themselves up, killing a senior constable and
    wounding five others. The Pakistani Taliban has claimed responsibility (Reuters)
  - International military intervention against ISIL
  - Canada and the Iraq War
  - Defence Minister Harjit Sajjan announces that Canada will continue to command
    a NATO mission in Iraq for a second year until November 2020. (Al Arabiya)
  - War in Afghanistan
  - Two U.S. Troops are killed in an ambush by the Taliban in Wardak Province, Afghanistan.
    (USA Today)
  - Four men with ties to ISIL are arrested in Nicaragua. (BBC News)
  Arts and culture:
  - LGBT in the United States
  - New York City begins the 50th Annual World Pride festival, expecting to draw four
    million people over six days. (France 24)
  International relations:
  - Germany–United States relations
  - U.S. President Donald Trump states that Germany is "delinquent" on NATO defense,
    saying, "So they are giving Russia billions of dollars yet we are supposed to
    protect Germany and Germany is delinquent! Okay?" (Al Arabiya)
  Law and crime:
  - An unnamed Brazilian Air Force sergeant is arrested in Seville for smuggling 39
    kilograms of cocaine inside an Embraer E190 airliner. The aircraft, now grounded,
    was being used as a backup plane during President Bolsonaro's official visit to
    Japan, connecting in the Spanish city. (The Olive Press)
  - In a unanimous decision, the Supreme Court of Japan rejects retrial for a 92-year-old
    woman, Ayako Haraguchi, who had already served 10 years in prison for the 1979
    murder of her former brother-in-law. (The Japan Times)
  - Terrorism in Canada
  - Canada's government adds Neo-Nazi groups Blood & Honour and Combat 18 to its list
    of designated terrorist organizations. It is the first time that extreme far-right
    groups have been designated as terrorist in Canada. Three Shia militant groups,
    including the Iranian-backed Al-Ashtar Brigades are also banned. (Global News)
  Politics and elections:
  - 2020 United States presidential election, 2020 Democratic Party presidential debates
    and forums
  - The first of two Democratic Party debates for the nomination of the party's nominee
    in the 2020 United States presidential election is held in Miami, Florida. (Reuters)
  Science and technology:
  - 2019 European heat wave
  - Germany, Poland and the Czech Republic record their highest ever recorded temperatures
    for June amid a heat wave in Western and Central Europe. (BBC News) (Weather Underground)
