Date: '2019-06-28'
Source_URI: Portal:Current events/2019 June 28
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Indanan bombings
  - Two suicide bombers detonate their devices in Sulu, Philippines, killing four
    soldiers and two civilians. ISIL claims responsibility. (CBC) (Reuters) (CNN Philippines)
  - Syrian Civil War, Northwestern Syria offensive (April 2019–present)
  - Nearly 100 people are killed in clashes between the Syrian Army, rebels and jihadists
    in northwestern Syria. 51 government troops and allied militiamen, and 45 rebel
    fighters and jihadists are among the dead. (France 24)
  Business and economy:
  - Demolition experts implode the Ponte Morandi viaduct in Genoa, Italy, ten months
    after a partial collapse that killed 43 people. (BBC News)
  Disasters and accidents:
  - A train hauling 40 cars derails in the St. Clair Tunnel between Port Huron, Michigan
    and Sarnia, Ontario, spilling 13,700 gallons of sulfuric acid and closing the
    tunnel for several days. (WDIV-TV) (WXYZ-TV)
  International relations:
  - China–Holy See relations
  - The Vatican asks China's communist government to stop intimidating Catholic clergy
    who want to remain unequivocally loyal to the pope and refuse to sign ambiguous
    official registration forms. (Reuters)
  - Bahrain–Iraq relations
  - More than 200 demonstrators break into the courtyard of Bahrain's embassy in Baghdad
    and take down the kingdom's flag to protest a U.S.-led meeting in Bahrain on the
    Israeli–Palestinian peace process. (Reuters)
  - Foreign relations of Argentina
  - Argentine Foreign Minister Jorge Faurie announces that the European Union and
    Argentina, Brazil, Paraguay and Uruguay achieved a breakthrough in free-trade
    talks after 20 years. (Gulf News)
  - United States–Venezuela relations
  - The United States announces sanctions on Nicolás Maduro Guerra, the son of disputed
    Venezuelan President Nicolás Maduro, accusing him of engaging in propaganda on
    behalf of the government. (BBC News)
  - 2019 Argentine general election, Argentina–Brazil relations, Argentina–United
    States relations
  - U.S. President Donald Trump and Brazilian President Jair Bolsonaro officially
    endorse the re-election campaign of Mauricio Macri. (La Nación)
  Law and crime:
  - Salt Lake City police arrest a man for murder in connection to the search for
    missing University of Utah student Mackenzie Lueck. (NBC News)
  - Aftermath of the Charlottesville car attack
  - James A. Fields Jr. is sentenced to life in prison after pleading guilty to 29
    hate crimes for driving his car into a crowd of protestors, killing one and injuring
    28, at the 2017 Unite the Right rally in Charlottesville, Virginia. (CNN) (NBC
    News) (The Washington Post)
  - Capital punishment in Sri Lanka
  - For the first time in 43 years, Sri Lanka hires executioners to reinstate the
    death penalty. (The Guardian)
  Politics and elections:
  - Immigration to Japan
  - A Nigerian man dies in a Japanese immigration detention center this week, an official
    says. It ends a hunger strike that an activist group said was intended to protest
    against him being held for more than three years. (Reuters)
  - The House of Representatives of the Netherlands passes the final bill of the climate
    agreement. The goal of the accord is to have the level of greenhouse gasses in
    the atmosphere in 2030 the same as the level of greenhouse gasses in the atmosphere
    in 1990. (ABC News)
  - According to the first report presented by the Nicaraguan Foundation for Economic
    and Social Development, Nicaragua has become one of the world's least democratic
    countries, qualifying it as an "authoritarian regime". Among the reasons that
    this center of thought mentions to explain this situation are "the retrocess of
    civil liberties by the repression against the anti-government protests in progress
    since 2018" and "the loss of independence of the State institutions in favor of
    the Executive Power". (La Prensa)
  Science and technology:
  - 2019 European heat wave
  - Amid a continental heat wave, France records its highest ever temperature of in
    Gallargues-le-Montueux. (Sky News)
  - In Spain, authorities report two deaths connected to the extreme heat. The worst
    wildfire in 20 years burns more than 5,000 hectares at the south of Province of
    Tarragona, in Catalonia. (Express) (CNN)
