Date: '2019-06-21'
Source_URI: Portal:Current events/2019 June 21
Intelligence_Payload:
  Armed conflicts and attacks:
  - Ten civilians are killed when a suicide bomber detonates his explosive belt in
    a crowd of worshippers at a Shia mosque in eastern Baghdad, Iraq. (Sputnik)
  Business and economy:
  - Korean Air confirms that US carrier Delta Air Lines has acquired a 4.3% stake
    in Korean Air's parent company Hanjin Kal, which may help Hanjin resist pressure
    from an activist shareholder. (Reuters)
  - Myanmar's Ministry of Transport and Communications orders mobile phone companies
    and internet providers to suspend service in nine townships in Rakhine State.
    (France 24)
  Disasters and accidents:
  - A Beechcraft King Air sky diving operation plane crashes near Dillingham Airfield
    on Oahu, Hawaii, killing all eleven people onboard. (The Guardian)
  International relations:
  - Japan–Russia relations
  - Japan's Defense Ministry says Russian Air Force bombers violated southern Japanese
    airspace, prompting Japan Air Self-Defense Force fighters to scramble and escort
    the planes out of the area. (Japan Today)
  - Iran–Saudi Arabia relations
  - Foreign Minister of Saudi Arabia Adel Al-Jubeir says Iran "has to understand that
    its aggressive behaviour cannot be sustained" and that his country is "trying
    to avoid a war at all costs". (Sky News)
  - Iran–United States relations, June 2019 Iranian shoot-down of American drone
  - Trump administration officials say that President Donald Trump ordered the United
    States Armed Forces to conduct military strikes against targets of the Armed Forces
    of the Islamic Republic of Iran in retaliation for downing an American surveillance
    drone the day prior, and that he changed his mind hours later and ordered an immediate
    stop to the operation while American warplanes were in the air and warships were
    in position. (The New York Times) (ABC News)
  - Iranian Americans protest outside the State Department as tensions increase. (NBC
    Washington)
  - Saudi Arabia–United States relations
  - U.S. President Donald Trump spoke to Saudi Crown Prince Mohammad bin Salman about
    Middle East stability and the oil market, the White House says, after tensions
    with Iran prompt a rise in oil prices. (Reuters)
  Politics and elections:
  - 2019 Brecon and Radnorshire recall petition
  - Chris Davies, Member of the UK Parliament for the Welsh constituency of Brecon
    and Radnorshire, is removed from his position following a successful recall petition
    in the wake of his conviction for fraudulent expense claims. A by-election will
    be held to replace Davies. (BBC News)
  Health and environment:
  - In a school of the Moquegua city, in Peru, 66 children are poisoned by a leak
    from a gas regasification plant, located 300 meters away. All affected students
    were taken to a nearby health center. (América Televisión) (La República)
