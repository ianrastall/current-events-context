Date: '2019-06-24'
Source_URI: Portal:Current events/2019 June 24
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Amhara Region coup d'état attempt
  - The Attorney General of Ethiopia's Amhara Region, Migbaru Kebede, dies after having
    been wounded during the coup attempt two days earlier. Asaminew Tsige, the general
    suspected to be behind the coup attempt, had been reportedly killed by security
    forces. (DW)
  - Men in camouflage kill 50 in Bahir Dar, Ethiopia (Reuters)
  Disasters and accidents:
  - Two German Air Force Eurofighter Typhoon fighter jets collide in mid-air and crash
    near Lake Müritz in Mecklenburg-Vorpommern. Both pilots are able to eject before
    the crash, but only one survives. (DW)
  International relations:
  - United Nations High Commissioner for Human Rights Michelle Bachelet says the tens
    of thousands of Islamic State fighters and family members being held in Iraq and
    Syria must be tried or released, and calls on countries to take responsibility
    for their citizens and take them back if not charged. (BBC News)
  - Iran and state-sponsored terrorism, Terrorism in Europe
  - The British newspaper Independent in Arabic quotes an intelligence source as saying
    that in 2018 Iran had delivered half a ton of TATP explosives in diplomatic packages
    to a civilian plane that was supposed to be transferred to Paris to carry out
    an attack in the city. (The Jerusalem Post)
  Law and crime:
  - Diane Madison, the mother of American serial killer Michael Madison, is stabbed
    to death in her home. Three children are also injured. Her grandson Jalen Plummer
    is arrested and charged with aggravated murder and felonious assault. (Cleveland.com)
  Politics and elections:
  - The Defense Minister of Peru, José Huerta, suddenly dies of cardiac arrest while
    worked. (CNN en Español) (Perú.21)
  Science and technology:
  - Methane on Mars
  - NASA announces that its Curiosity rover has detected the largest ever measurement
    of methane on Mars. (BBC News)
  - Soyuz MS-11 returned to Earth, landing in Kazakhstan, from the International Space
    Station carrying Canadian David Saint-Jacques, American Anne McClain and Russian
    Oleg Kononenko. The astronauts and cosmonaut spent 204 days aboard the ISS, a
    record for Canada. (CBC)
  Sports:
  - The 2026 Winter Olympics are selected to be held in Milan and Cortina d'Ampezzo,
    Italy. (BBC News)
