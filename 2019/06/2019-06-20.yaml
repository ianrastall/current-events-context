Date: '2019-06-20'
Source_URI: Portal:Current events/2019 June 20
Intelligence_Payload:
  Armed conflicts and attacks:
  - Iran–United States relations, June 2019 Iranian shoot-down of American drone
  - Iran's Islamic Revolutionary Guard Corps shoots down an American RQ-4 Global Hawk
    spy drone after it allegedly violates Iranian airspace. (RTÉ)
  - An anonymous American official says the incident occurred in international airspace,
    and not over Iranian territory. (The Times of Israel)
  - U.S. President Donald Trump, when asked about the strike, says it is "hard to
    believe it was intentional". He later approves retaliatory military attacks against
    Iranian missile and radar facilities, but subsequently changes his mind. (CNN)
    (BBC News)
  Business and economics:
  - The Antitrust Division of the U.S. Justice Department files a lawsuit against
    two large printing companies contemplating a merger. If the deal is allowed to
    proceed, the filings claim, the combined company would dominate the market for
    printing magazines, catalogs and books. (Reuters)
  Disasters and accidents:
  - At least 44 people are killed when a bus carrying at least 60 plunges into a gorge
    in the Kullu district of Himachal Pradesh, a mountainous northern Indian state.
    (BBC News)
  International relations:
  - Kim–Xi meetings, China–North Korea relations
  - Chinese Communist Party general secretary Xi Jinping arrives in North Korea for
    a two-day state visit with Korean Workers' Party chairman Kim Jong-un. (Los Angeles
    Times)
  - Venezuelan refugee crisis, Colombia–Venezuela relations
  - The Colombian military reveals that dissident FARC groups, in spite of a 2016
    treaty, have been recruiting Venezuelan migrants at illegal border crossings,
    strengthening their numbers and increasing attacks. (Reuters)
  Law and crime:
  - Computer ransomware
  - Riviera Beach, Florida, is paying $600,000 to a hacker who took over local government
    computers three weeks ago. (CNN)
  Politics and elections:
  - 2019 Guatemalan general election
  - After days of disagreements, allegations of electoral fraud and several inconsistencies
    with the preliminary results of the general election held last Sunday, the Supreme
    Electoral Tribunal orders a new review of the electoral records and restarts the
    count. (Prensa Libre)
  - 2019 Conservative Party leadership election
  - Home Secretary Sajid Javid is eliminated after coming in fourth place in the fourth
    round of voting. Boris Johnson remains the front runner, with Michael Gove and
    Jeremy Hunt coming in second and third place respectively. (BBC News)
  - In the fifth round of voting, Gove is controversially eliminated. The party membership
    run-off vote will be between Johnson and Hunt. (The Guardian)
  - 2020 United States Senate election in Alabama
  - Roy Moore announces that he will run for U.S. Senate again in Alabama, defying
    the wishes of Donald Trump and the Republican Party. (CNBC)
  Arts and culture:
  - David Gilmour auctions 120 guitars of his personal collection, raising $21.5 million,
    including $3.975 million for The Black Strat, his most iconic guitar. (Christie's)
    (Rolling Stone)
  Sports:
  - 2019 NBA Draft
  - Zion Williamson of Duke University is selected first by the New Orleans Pelicans.
    (ESPN)
