Date: '2019-06-22'
Source_URI: Portal:Current events/2019 June 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Amhara Region coup d'état attempt
  - An attempted coup in Ethiopia's Amhara state leaves several people dead, including
    the regional president Ambachew Mekonnen and the Chief of Staff of the Ethiopian
    National Defense Force, General Se'are Mekonnen. (BBC News)
  Disasters and accidents:
  - A seven-story building collapses in Sihanoukville, Cambodia, killing at least
    28 people and wounding 25 others. (The Guardian)
  International relations:
  - Iran–Saudi Arabia relations
  - Saudi Arabia's Minister of State for Foreign Affairs Adel Al-Jubeir says if Iran
    closes the Strait of Hormuz, there will be a "very, very strong reaction". (Arab
    News)
  - United States sanctions against Iran, Iran–United States relations, Iran and weapons
    of mass destruction
  - The United States announces "major" sanctions against Iran to prevent them from
    obtaining nuclear weapons. (BBC News) (Al Jazeera)
  Politics and elections:
  - 2019 Mauritanian presidential election
  - Voters in Mauritania head to the polls to elect a new president. The election
    would be the country's first democratic transition of power, as incumbent president
    Mohammed Ould Abdel Aziz prepares to step down after having served two terms.
    (DW)
  - British Foreign Office Minister Mark Field is suspended for assaulting a Greenpeace
    activist. (BBC News)
  - The Trump administration releases a $50 billion plan that calls for investment
    in Palestine's economy. (NBC News)
