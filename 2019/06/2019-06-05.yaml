Date: '2019-06-05'
Source_URI: Portal:Current events/2019 June 5
Intelligence_Payload:
  Armed attacks and conflicts:
  - Khartoum massacre
  - The Central Committee of Sudanese Doctors say the number of people killed this
    week in Sudan is at least 100, and that 40 bodies were pulled from the River Nile
    at Khartoum on Tuesday. Members of the Rapid Support Forces have reportedly been
    roaming the streets attacking civilians as it pushes deeper into Khartoum. (BBC
    News)
  - A Sudanese official denies that 100 people were killed by a paramilitary unit
    during protests, saying that the number was at most 46. (BBC News)
  - Syrian Civil War, Russian involvement in the Syrian Civil War
  - Syrian government and Russian warplanes conduct airstrikes that target Syria's
    northwest, killing five civilians in the town of Kansafra and three villages in
    Idlib, including two children. (Al Jazeera)
  - Government forces shell the northern Hama countryside, killing one civilian. (Al
    Jazeera)
  - Government air attacks hit a motorcycle in the Idlib town of Maaret al-Numan,
    killing a woman and her two children. (Al Jazeera)
  Business and economy:
  - Fiat Chrysler withdraws its merger proposal for French carmaker Renault after
    Renault board members were unable to reach a decision on the offer. (BBC News)
  - YouTube announces a new policy regarding hate speech and harassment on the video
    sharing platform, saying it will specifically ban videos that include neo-nazi
    and supremacist content, subsequently suspending several popular right-wing channels,
    and demonetizing Steven Crowder's. (CNET)
  International relations:
  - Taiwan–United States relations, China–United States relations, Cross-Strait relations
  - The Trump administration informs Congress of a potential $2 billion arms deal
    with Taiwan that includes the M1A2, the U.S.'s latest main battle tank, and a
    resupply of anti-air and anti-armor weapons. China's foreign ministry says it
    is "severely concerned with" and "firmly against" the plan. (Bloomberg)
  Law and crime:
  - Australian federal police raid the headquarters of the country's public broadcaster,
    Australian Broadcasting Corporation, regarding the alleged publication of classified
    material in a 2017 report on allegations that Australian Special forces engaged
    in unlawful killings and gross misconduct in Afghanistan. The day before, police
    raided Herald Sun journalist Annika Smethurst's home regarding an alleged leak
    of national security information. (BBC News) (Business Insider)
  - Detroit Police Chief James Craig announces the department is looking for a possible
    serial killer in three unsolved murders of sex workers in the city dating back
    to March. (Time)
  Politics and elections:
  - 2019 Danish general election
  - The center-left Social Democrats win 48 of the 179 seats in the Folketing (parliament).
    Current Liberal Prime Minister Lars Løkke Rasmussen concedes defeat, paving the
    way for Social Democrat leader Mette Frederiksen, who at 41 is set to be the country's
    youngest prime minister. (The Local) (EUobserver)
  - President of Peru Martín Vizcarra wins a motion of confidence in the Congress
    of the Republic. (Reuters)
