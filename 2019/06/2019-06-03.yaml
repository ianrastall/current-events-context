Date: '2019-06-03'
Source_URI: Portal:Current events/2019 June 3
Intelligence_Payload:
  Armed conflict and attacks:
  - War in Afghanistan
  - Five people are killed and over 10 injured in an IED bomb explosion in Kabul,
    Afghanistan. (Dailytrust)
  - 2018–19 Sudanese protests
  - Over 13 people have been killed when Sudanese forces use live ammunition to break
    up a protester camp in Khartoum. (Al Jazeera)
  - Boko Haram insurgency
  - Boko Haram storms multiple military bases in the Nigerian state of Borno. Casualties
    are unknown. (The Guardian Nigeria)
  - 2019 Tripoli shooting
  - A gunman kills four security officers and injures two before blowing himself up
    in Tripoli, Lebanon. (BBC News)
  Arts and culture:
  - James Holzhauer is defeated on the American quiz show Jeopardy!, concluding a
    victory streak of 32 games with an earnings total of $2,464,216, but falls short
    of the winnings record set by Ken Jennings in 2004. (Washington Post)
  Disasters and accidents:
  - 2019 Indian Air Force An-32 disappearance
  - An Indian Air Force Antonov An-32 goes missing shortly after takeoff from an airbase
    in Assam. All 13 people aboard are presumed dead as search operations continue.
    (India Today)
  Health and environment:
  - Authorities say that a patient has died amid an outbreak of Legionnaires' disease
    in a recently opened hospital in Grove City, Ohio. (ABC News)
  Law and crime:
  - Insider trading. The US Supreme Court refused to take an appeal from the US Court
    of Appeals for the Second Circuit decision. The 'denial of cert' leaves standing
    the conviction of Mathew Martomo on charges of insider trading. on information
    leaked to him from representatives of two major pharmaceutical companies. (Reuters)
  Politics and elections:
  - Donald Trump on social media
  - U.S. President Donald Trump tweets a call to boycott AT&T in order to bring "big
    changes" at CNN. AT&T has not given an official comment or statement back regarding
    the tweet. (CNBC via MSN)
  Sport:
  - 2019 AFL season
  - In Australian rules football, Brendon Bolton is sacked as the head coach of the
    Carlton Football Club, following a prolonged period of poor on-field performances.
    (The Age)
