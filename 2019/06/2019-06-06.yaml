Date: '2019-06-06'
Source_URI: Portal:Current events/2019 June 6
Intelligence_Payload:
  Business and economy:
  - Reuters, citing "a source familiar with the matter", said that the hedge fund
    firm Elliott Management is in talks to acquire the storied bookseller Barnes &
    Noble for roughly $476 million. (Reuters)
  International relations:
  - President of France Emmanuel Macron, Prime Minister of the United Kingdom Theresa
    May, Prime Minister of Canada Justin Trudeau and President of the United States
    Donald Trump mark the 75th Anniversary of D-Day in Normandy, France, paying tribute
    to Allied World War II veterans. (CBS News) (Reuters) (BBC News) (CBC)
  - 2018–19 Sudanese protests
  - The African Union suspends Sudan's membership "with immediate effect", after dozens
    of protesters were killed by pro-government forces in the capital Khartoum. (BBC
    News)
  Law and crime:
  - Niels Högel, post-war Germany's serial killer with the highest known kill count,
    is sentenced to life imprisonment for 85 murders. (DW)
  - American singer R. Kelly pleads not guilty to 11 additional sex-related felonies
    during a court hearing in Chicago. (ABC News)
  Politics and elections:
  - 2019 Peterborough by-election
  - The Labour Party holds the Peterborough seat in the by-election, defying predictions
    that they would lose the seat to the Brexit Party. The seat was vacated after
    a successful recall petition against its previous MP Fiona Onasanya. (The Guardian)
  - 2019 Danish general election
  - After the defeating of his party in the general election, Prime Minister Lars
    Løkke Rasmussen resigns, but will remain as acting in the office until his succession.
    (CBC)
  - Bolivarian diaspora
  - In Peru, the president Martín Vizcarra's government decides to impose humanitarian
    visa and passport requirements on Venezuelan immigrants who wish to enter Peru,
    who flee the economic, social and political crisis in their country. This happens
    after the expulsion of 140 Venezuelan citizens with police records and amid a
    growing rejection of immigrants from the Peruvian population. He said that his
    goal is "to ensure an orderly and safe migration we are achieving it through eliminating
    the bad elements.". (Perú.21) (Gestión) (El Comercio)
