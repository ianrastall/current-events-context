Date: '2019-06-08'
Source_URI: Portal:Current events/2019 June 8
Intelligence_Payload:
  Armed conflicts and attacks:
  - Syrian Civil War, Northwestern Syria offensive
  - Abdul Baset al-Sarout, a Jaysh al-Izza commander, the “singer of the revolution”,
    and former Syria national football team goalkeeper, dies from wounds sustained
    Thursday when he was struck by Syrian Army artillery. (BBC News) (The Guardian)
  Disasters and accidents:
  - Human remains found at a beach near the Port of Quebec in 2011 and 2016 are identified
    as those of 21 shipwreck victims, who drowned in 1847 while fleeing the Irish
    Great Famine. (BBC News)
  Politics and elections:
  - Media freedom in Russia
  - Several people, protesting Meduza investigative journalist Ivan Golunov's arrest
    Thursday on drug charges, are themselves arrested outside Moscow's Nikulinsky
    Court. Others were arrested yesterday. His lawyer says drugs were planted on him.
    Golunov was taken to a hospital, police say because he said he was ill. Meduza
    says he was beaten up during and after his arrest. A doctor's examination found
    the reporter has "a suspected rib fracture, concussion and hematoma." (BBC News)
    (Moscow Times)
  Sports:
  - 2019 French Open
  - Australian Ashleigh Barty, a former professional cricket player, defeats 19-year-old
    Czech Markéta Vondroušová (6–1, 6–3) to win the 2019 French Open women's singles
    championship, her first Grand Slam singles title. (The New York Times)
