Date: '2019-06-01'
Source_URI: Portal:Current events/2019 June 1
Intelligence_Payload:
  Armed conflict and attacks:
  - A suicide bomber driving a Humvee detonated the vehicle loaded with explosives
    near a security building in Afghanistan, killing 8 officers. (ariananews)
  Arts and culture:
  - Pope Francis visits Romania, meeting with Patriarch Daniel of the Romanian Orthodox
    Church and holding an open mass in front of 80,000 people. (The New York Times)
  - Pope Francis urges ethnic Hungarians and Romanians to mend their differences toward
    a peaceful existence in one country. (Reuters)
  Business and economics:
  - Chinese authorities begin an investigation into American multinational courier
    delivery services company FedEx for allegedly undermining the rights of Chinese
    clients. The investigation stems from allegations by Chinese telecommunications
    company Huawei that FedEx attempted to divert the shipping route of its packages
    without the company's prior authorization which in turn has been denied by FedEx.
    (CNBC)
  Disasters and accidents:
  - Twenty-nine people are injured in a fire at a center used as temporary accommodation
    for about 500 migrants in the northwestern Bosnian town of Velika Kladusa. (Reuters)
  - An explosion at a Russian Military high-explosive production and storage facility
    in the city of Dzerzhinsk injures 79 people. (BBC News)
  - Six earthquakes, the first 5.3 , in a two-hour period near Korçë in southeastern
    Albania injure four people and damage around 100 houses. (Reuters)
  - 'Cruise ship MSC Opera collides with a riverboat and the quayside at Venice, Italy:
    four people are injured, none seriously. The incident leads to renewed demands
    to ban large cruise ships from the Lagoon of Venice. (BBC News)'
  Health and environment:
  - Hong Kong confirms its second case of African swine fever, indicating the virus
    continues to spread beyond mainland China. Sheung Shui slaughterhouse is temporarily
    closed while 4,100 animals are culled from the facility. (South China Morning
    Post)
  International relations:
  - Honduras–United States relations, 2017–2019 Honduran protests
  - Dozens of masked protesters set fire to the U.S. Embassy in downtown Tegucigalpa,
    amid a second day of mass anti-government protests in Honduras. (Reuters)
  - At the close of the Organization of Islamic Cooperation summit in Mecca, the OIC
    says it will not accept any decision to change the legal and demographic status
    of Syria's Golan Heights, that it condemns any position adopted by an international
    body that supports prolonging occupation of Palestinian territories, and it condemns
    the inhumane situation of Rohingya Muslims. (Reuters) (Reuters²) (Reuters³)
  - China–United States trade war
  - The United States begins collecting the higher, 25 percent tariffs on many Chinese
    goods arriving in U.S. seaports. (Reuters)
  Law and crime:
  - Indictment and arrest of Julian Assange
  - The United Nations special rapporteur on torture, Nils Melzer, accuses the United
    States, the United Kingdom and Sweden of "ganging up" on Julian Assange and subjecting
    him to "psychological torture" and "collective persecution" after spending seven
    years living inside London's Ecuadorian Embassy. (The New York Times)
  Politics and elections:
  - 2020 United States presidential election
  - Maryland Governor Larry Hogan says he won't challenge U.S. President Donald Trump
    for the Republican Party's nomination for President in the 2020 presidential election,
    leaving Bill Weld as the only other major candidate for the nomination. (CNBC)
  - Sudanese protests
  - Shots fired by "regular forces" near the site of a sit-in protest in Khartoum
    kill one person and wound 10 others, according to the Central Committee of Sudanese
    Doctors. The gunfire lasted about four hours. This week at least three protesters
    have been shot dead and eight others injured during protests calling for the generals
    who replaced deposed President Omar al-Bashir to hand power to a civilian-led
    administration. (Reuters) (Al Jazeera)
  - El Salvador's new President Nayib Bukele takes office. (Reuters)
  - The website The Daily Beast identifies the man who posted a video of U.S. House
    Speaker Nancy Pelosi in order to create the misleading impression of drunkenly
    slurred speech. It was "an occasional sports blogger from the Bronx." (The Daily
    Beast).
  Sports:
  - Liverpool F.C. defeats Tottenham Hotspur F.C. by a score of 2–0 to win the 2019
    UEFA Champions League Final. (CBS Sports)
  - Andy Ruiz Jr. defeats Anthony Joshua by knockout in the seventh round to become
    IBF, WBA and WBO heavyweight champion of the world in what has been described
    as one of the biggest upsets in heavyweight boxing history. (Sky News)
