Date: '2019-06-27'
Source_URI: Portal:Current events/2019 June 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - 2019 Tunis bombings
  - Twin blasts from suicide bombers, kill one police officer and wound nine others
    in Tunis. (CNN)
  - Yemeni Civil War, Saudi-led intervention in Yemen
  - Arab Coalition spokesman Turki al-Maliki says that his forces intercept and down
    a drone in Yemeni airspace after its launch toward Saudi Arabia by Houthis north
    of Sanaʽa. (Al Arabiya)
  Disasters and accidents:
  - Angara Airlines Flight 200 crashes on landing at Nizhneangarsk Airport, Far East
    Russia, killing two of the 47 people on board. (Aviation Safety Network)
  Politics and elections:
  - Argentina–Cuba relations
  - Argentina Education Minister Alejandro Finocchiaro strongly condemns a school
    in Chaco Province for displaying a Cuban flag on Argentina's Flag Day, asking,
    "What differences are there between the Cuban regime and the Nazis?" He also describes
    Che Guevara as a "criminal and genocider". (Clarín)
  - 2020 United States presidential election, 2020 Democratic Party presidential debates
    and forums
  - The second of two Democratic Party debates for the nomination of the party's nominee
    in the 2020 United States presidential election is held in Miami, Florida. (The
    New York Times)
  - The social democrat Frederiksen Cabinet is formed in Denmark. (Bloomberg)
  Science and technology:
  - List of fast radio bursts
  - Scientists announce, through the Science journal, that they discover the source
    of a fast radio burst for the first time. FRB 180924, a non-repeating FRB which
    was detected in September 2018 using the Australian Square Kilometre Array Pathfinder,
    originates from a large galaxy known as DES J214425.25−405400.81 located 3.6 billion
    light-years from Earth. (Newsweek) (9news)
  - Dragonfly (spacecraft)
  - NASA awards $1 billion to the Dragonfly mission, which will use a dual-quadcopter
    drone to explore Titan for signs of life. (Nature) (Science) (The New York Times)
    (The Atlantic)
  Sports:
  - 2019 FIFA Women's World Cup
  - Ellen White becomes England's all-time leading FIFA Women's World Cup Final goalscorer
    with the team's second goal against Norway in the 2019 Women's World Cup quarterfinal
    win. (The Telegraph)
