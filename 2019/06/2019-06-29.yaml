Date: '2019-06-29'
Source_URI: Portal:Current events/2019 June 29
Intelligence_Payload:
  International relations:
  - 2019 G20 Osaka summit
  - China–United States trade war, China–United States relations
  - U.S. President Donald Trump and Chinese President Xi Jinping meet at the G20 summit
    and reach a deal that will allow American companies to sell non-sensitive technology
    to Huawei while China will buy food and agricultural products from the United
    States. (The Washington Post)
  - Foreign relations of Venezuela
  - In Osaka, Argentina, Brazil, Chile and Canada jointly issue a statement condemning
    the Venezuelan government. The statement's author, Argentine President Mauricio
    Macri, indicated that it was meant to "show that beyond good faith and dialogue,
    Maduro takes advantage of that to create more poverty, famine and corruption in
    Venezuela". (Clarín)
  Law and crime:
  - Carola Rackete, the captain of a migrant rescue ship, is arrested in Italy for
    docking without authorization after Italy closed its ports to rescue organizations.
    (BBC News)
  Politics and elections:
  - German Chancellor Angela Merkel says she's "fine" following two bouts of shaking
    in public that have sparked concerns about her health. (BBC News)
