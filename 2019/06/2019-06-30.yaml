Date: '2019-06-30'
Source_URI: Portal:Current events/2019 June 30
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Afghanistan (2001–2021)
  - Four humvees packed with explosives controlled by suicide bombers kill 23, including
    eight election workers, in the province of Kandahar. The Taliban claimed 57 were
    killed. (Reuters)
  - 2018–19 Sudanese protests
  - Ten people are killed in Sudan during clashes between the Sudanese military and
    civilian protesters. (Reuters)
  - Gunmen open fire, killing two guards and wounding another for Lebanese Refugee
    Affairs Minister, Saleh al-Gharib. This attack happened in a mountain village
    near Beirut, Lebanon. (Al Jazeera) (DW)
  - Northern Mali conflict
  - At least 23 people are dead and 300 missing after attacks on three Fulani villages
    in central Mali. (Reuters)
  - 12 civilians including a baby were killed when the vehicle they were traveling
    in hit a landmine. (Al Jazeera)
  Disasters and accidents:
  - Ten people are killed when a Beechcraft BE-350 King Air crashes into a hangar
    at Addison Airport in Addison, Texas. (NBC News)
  International relations:
  - 2019 Koreas–United States DMZ Summit, North Korea–United States relations, South
    Korea–United States relations, North Korea–South Korea relations, 2018–19 Korean
    peace process
  - U.S. President Donald Trump, together with South Korean President Moon Jae-in,
    meets North Korean leader Kim Jong-un at the Joint Security Area, becoming the
    first sitting U.S. president to set foot in North Korea. Trump also invites Kim
    to the White House to resume talks about denuclearizing the Korean Peninsula.
    (NBC News) (Business Insider) (CNN)
  - Princess Haya bint Hussein of Jordan fled her husband Sheikh Mohammed bin Rashid
    Al Maktoum, the Vice President and Prime Minister of the UAE and Ruler of Dubai,
    with their two children in fear for her life. The family fled to London via Germany
    seeking asylum, and a high profile court battle over non-repatriation and custody
    of the children is anticipated. (Times)
  Law and crime:
  - In the second similar case within a week, police in Toyonaka, Japan, arrest Ryotaro
    Taniguchi for keeping the body of his deceased mother a year after her death.
    He is quoted as saying he didn't want to pay for the funeral. Police are investigating
    whether or not Taniguchi continued to receive his mother's pension. (Japan Today)
    (The Japan Times)
