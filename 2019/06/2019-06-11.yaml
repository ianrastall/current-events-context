Date: '2019-06-11'
Source_URI: Portal:Current events/2019 June 11
Intelligence_Payload:
  Arts and culture:
  - The E3 2019 trailer for Pokémon Sword and Shield, scheduled to be released in
    November, causes controversy and unprecedented unanimous outrage among fans following
    the announcement that Pokémon absent from the Galar Pokédex cannot be transferred
    into the games, giving rise to the "Bring Back National Dex" hashtag among fans
    on Twitter. (Polygon)
  Business and economy:
  - A committee of the US House of Representatives announces that it will hold a hearing
    next Thursday (June 20) to examine fuel efficiency standards, as the Trump administration
    presses for a rollback of an Obama-era schedule of 5% reductions in emissions
    per year. (Reuters)
  Disasters and accidents:
  - Sinking of Hableány
  - Four bodies are recovered by salvage crews during the raising of the wreck of
    the Hableány, which sank on the Danube in Budapest last month. Four other people
    are still missing. (BBC News)
  - 2019 North Indian Ocean cyclone season
  - Very Severe Cyclonic Storm Vayu is in the Arabian Sea less than 600 miles south-southeast
    of Karachi, Pakistan, and is strengthening as it heads north. Vayu is expected
    to be a Category 2 or 3 storm when it approaches the Indian state of Gujarat early
    Thursday (local time), then should weaken as it approaches southeastern Pakistan
    over the weekend. (The Weather Channel) (Al Jazeera)
  - A group of 65 Rohingya Muslims are left stranded on Rawi Island in southern Thailand
    after their boat shipwrecked during a journey to flee genocide in their native
    Rakhine State in Myanmar. (Reuters) (The Washington Post)
  Law and crime:
  - Asbestos and the law
  - The Congress of Colombia unanimously approves a resolution to ban the production,
    commercialization, and distribution of asbestos. (El Tiempo)
  - LGBT rights in Botswana
  - Botswana decriminalizes homosexuality. (BBC News)
  - Media freedom in Russia
  - Following a public outcry, authorities in Russia drop drug charges against a journalist,
    Ivan Golunov, who has earned a reputation for exposing the corruption of Moscow
    city officials. (Reuters) (BBC News)
  - Censorship in Samoa
  - Samoa bans the film Rocketman for its depictions of gay sex. (BBC News)
  Politics and elections:
  - North Korea–United States relations, List of North Korean missile tests
  - U.S. President Donald Trump says he received a "beautiful", "very warm and very
    nice" letter from North Korean leader Kim Jong-un. He added that Kim is "keeping
    his word" and not testing any kind of missiles. Earlier at a speaking event in
    Washington, National Security Adviser John Bolton said North Korea is not complying
    with the terms agreed upon during Trump's first summit with Kim in Singapore last
    year. (Bloomberg) (The Washington Post) (CNN)
  Sports:
  - 2019 FIFA Women's World Cup
  - The USA's 13–0 defeat of Thailand sets a World Cup record for margin of victory
    for either men or women, and Alex Morgan's five goals ties a tournament record.
    (Yahoo! Sports)
