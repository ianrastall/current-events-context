Date: '2019-06-02'
Source_URI: Portal:Current events/2019 June 2
Intelligence_Payload:
  Armed conflict and attacks:
  - Syrian Civil War
  - June 2019 Syria attacks
  - A car bomb in Azaz kills at least 21 people and leaves many wounded. (DW)
  - A suicide car bomber kills five soldiers of the Syrian Democratic Forces and five
    civilians at a checkpoint in central Raqqa, Syria. This and a nearby roadside
    bomb wound 20 people. (DW)
  - Israel kills ten people in airstrikes conducted against Syrian military targets
    in the Golan Heights in response to two rockets fired at Mount Hermon late Saturday.
    (The Guardian)
  - Two car bombs targeting a unit of the Libyan National Army injure 18 people in
    the city center of Derna, Libya. (Reuters)
  Disasters and accidents:
  - An EF1 tornado strikes the Orleans residential community of Ottawa, Canada, creating
    a track of damage but without serious injuries. (Ottawa Citizen)
  International relations:
  - Canada–Venezuela relations
  - Canada temporarily closes its embassy in Venezuela after Canadian diplomats were
    no longer able to get diplomatic accreditation under Venezuelan President Nicolás
    Maduro's government according to a statement released by the Canadian Minister
    of Foreign Affairs, Chrystia Freeland. (CBC News)
  Law and crime:
  - Jazz drummer Lawrence Leathers is found dead in his Bronx apartment building.
    Police arrested Lisa Harris and Sterling Aguilar. (NPR) (The New York Times)
  Politics and elections:
  - Andrea Nahles announces her resignation as leader of Germany's Social Democratic
    Party, effective at the beginning of next week. (BBC News)
  - Israeli Prime Minister Benjamin Netanyahu dismisses Minister of Justice Ayelet
    Shaked and Minister of Education Naftali Bennett from the interim government.
    (AP via Fox News)
  - King Juan Carlos I of Spain retires from public life five years after his abdication.
    (People)
  - During his visit to Romania, Pope Francis apologizes to the Roma people on behalf
    of the Catholic Church and asks forgiveness for "all those times in history when
    we have discriminated, mistreated or looked askance at you." He also beatifies
    seven Eastern Catholic church bishops who were jailed for treason and tortured
    under Communist rule. All died in confinement and were buried in secret. (Reuters)
    (BBC News)
  - U.S. President Donald Trump announces the resignation of Kevin Hassett as Chairman
    of the Council of Economic Advisers. (The Washington Post)
  - 2019 Sammarinese referendum
  - Sanmmarinese voters vote to end discrimination based on sexual orientation and
    initiate a popular legislative initiative for the reform of the electoral system.
    (Euronews)
  Science and technology:
  - Google has a cloud services outage that affects Gmail, Snapchat, YouTube and other
    services in parts of the United States. (CNBC)
