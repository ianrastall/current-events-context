Date: '2019-06-09'
Source_URI: Portal:Current events/2019 June 9
Intelligence_Payload:
  Disasters and accidents:
  - At least one person is killed and six others are injured after a crane collapses
    onto an apartment building in Dallas, Texas, amid severe weather. (KTRK-TV)
  - A woman is killed when a police officer driving under the influence crashes into
    a restaurant in Illinois. (MSN)
  International relations:
  - Vietnamese customs say it will crack down on goods of Chinese origin illegally
    relabeled "Made in Vietnam" by exporters seeking to avoid American tariffs on
    Chinese imports. (Bloomberg)
  Law and crime:
  - Former Boston Red Sox designated hitter David Ortiz is shot in the Dominican Republic
    during a reported robbery attempt. He is expected to fully recover following surgery.
    (Heavy) (ESPN)
  Politics and elections:
  - 2019 Kazakh presidential election
  - Kassym-Jomart Tokayev is elected as the next president of Kazakhstan. The election
    was marred by the arrests of more than 500 protesters and was not declared to
    be fully democratic by OSCE observers. (DW)
  - 2019 Moldovan constitutional crisis
  - The Constitutional Court of Moldova dissolves the national parliament and removes
    Moldovan President Igor Dodon from office, appointing former prime minister Pavel
    Filip in his place. Dodon, as well as the Parliament of Moldova defy the move,
    hence triggering a constitutional crisis. (Reuters) (DW)
  - Extradition Law controversy
  - Over 1 million people gather in the streets of Hong Kong to protest a new controversial
    law which would allow the city to extradite fugitives to China. (CNN)
  - Operation Car Wash
  - Several text and audio messages between Brazilian judge Sérgio Moro and lead prosecutor
    Deltan Dallagnol are leaked, casting doubt over the trial of former Brazilian
    President Luiz Inácio Lula da Silva on the grounds of illegal collaboration between
    court and prosecution. The leaks also point to interference in the 2018 elections
    by Operation Car Wash's task force officials. (The Intercept)
  Sports:
  - 2018–19 UEFA Nations League
  - The Portugal national football team defeats the Netherlands in the final of the
    2018–19 UEFA Nations League, 1–0, to become the first champions of the tournament.
    (Newsday)
  - 2019 French Open
  - Spaniard Rafael Nadal, who turned 33 this past Monday, defeats Austrian Dominic
    Thiem 6–3, 5–7, 6–1, 6–1 for his 12th French Open men's singles championship,
    and his 18th Grand Slam title. (The New York Times)
