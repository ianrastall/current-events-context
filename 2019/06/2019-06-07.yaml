Date: '2019-06-07'
Source_URI: Portal:Current events/2019 June 7
Intelligence_Payload:
  Armed conflict and attacks:
  - Syrian Civil War
  - Over 120 rebels are killed in northwestern Hama Governorate, after failed attacks
    against Syrian troops. (Al-Masdar News)
  - Terrorism in the United States
  - Authorities arrested Ashiqul Alam who allegedly planned to attack Times Square
    in New York City with grenades, guns and a suicide vest. (The New York Times)
    (CNN)
  Art and culture:
  - France returns three archaeological pieces to Peru that were seized by French
    customs in 2007. The artifacts, which date from between 1100 and 1450, are two
    clay statuettes and a wooden spear that belong to the Chancay and Chimú pre-Columbian
    cultures respectively. (Perú.21) (El Comercio)
  Business and economy:
  - Boeing 737 MAX groundings
  - U.S. Representatives Peter DeFazio and Rick Larsen of the House Transportation
    committee report Boeing discovered the 737 Max AOA Disagree alert problem in 2017
    but decided to defer fixing it until 2020, and sped up the process only after
    the Lion Air Flight 610 crash. (Reuters) (The Seattle Times)
  - Concerns over Chinese involvement in 5G wireless networks, Brazil-China relations
  - Brazilian Vice President Hamilton Mourão says the government will not exclude
    Chinese telecom company Huawei Technologies Co. from operating a fifth-generation
    (5G) mobile telecom network. (Reuters)
  - Hydraulic fracturing
  - Colombia’s top administrative court begins hearings on proposals to drill for
    oil using the technique known as fracking. (Reuters)
  Disasters and accidents:
  - An Oman-registered bus carrying 31 passengers crashes into an overhead traffic
    sign in Dubai, United Arab Emirates, killing at least 17 people. (BBC News)
  - 2018–19 European windstorm season
  - Three people on a rescue mission are killed when Storm Miguel, with max winds
    of 129 km/h (80 mph), overturned their National Society of Sea Rescue boat off
    the west coast of France in the Atlantic Ocean. The storm, unusual at the start
    of the summer tourist season, hit Spain, the Netherlands and southern England
    and Wales yesterday and is heading north toward England, Wales and Scotland. (BBC
    News) (AccuWeather)
  Health and environment:
  - In the United Kingdom, three hospital patients die from listeria linked to prepacked
    sandwiches from North Country Cooked Meats distributed via The Good Food Chain,
    which supplies 43 National Health Service trusts across the country. Three other
    patients are seriously ill. North Country Cooked Meats, and its distributor, North
    Country Quality Foods, voluntarily cease production while the investigation is
    ongoing. (BBC News) (CNN)
  International relations:
  - 'The U.S. cruiser USS Chancellorsville and the Russian destroyer Admiral Vinogradov
    almost collide in the western Pacific Ocean. Each side blames the other, and their
    reports disagree as to the location of the incident: Russia claims it happened
    in the East China Sea, while the U.S. says it was in the nearby Philippine Sea.
    (BBC News)'
  - 2019 Gulf of Oman incident
  - The United Arab Emirates tells the UN Security Council that a "state actor" was
    most likely behind the May 12 attacks on four tankers off its coast, including
    ones from Saudi Arabia and Norway. UAE did not say who it suspected; the United
    States blamed Iran which denied the accusation. (BBC News)
  - Turkey–United States relations
  - The United States notifies Turkey that it will cancel Turkey's purchase of F-35
    fighter jets if the government goes ahead with purchasing Russia's S-400 missile
    defense system. (Al Jazeera)
  - Mexico–United States relations
  - Mexico and the United States reach a deal on migration, suspending tariffs on
    Mexican imports into the U.S. which were to take effect on June 10. Mexico agreed
    to increase its enforcement efforts along their southern border with Guatemala,
    including deploying troops from their upcoming . (CBS News) (CNBC)
  Politics and elections:
  - 2019 Conservative Party leadership election
  - UK Prime Minister Theresa May resigns as Leader of the Conservative Party, paving
    the way for a new Prime Minister to be elected. (BBC News)
  - Crisis in Venezuela
  - The United Nations reports more than four million Venezuelans have fled their
    country during the economic and humanitarian crisis. (BBC News)
  Science and technology:
  - NASA announces that the International Space Station will be opened for commercial
    business in 2020 for $58 million. (Los Angeles Times) (Space.com)
  Sports:
  - The 2019 FIFA Women's World Cup starts with the hosts France defeating South Korea
    4–0. (Reuters)
