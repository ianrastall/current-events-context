Date: '2019-05-22'
Source_URI: Portal:Current events/2019 May 22
Intelligence_Payload:
  Armed conflicts and attacks:
  - War in Donbass
  - The Ukrainian military reports that eight Ukrainian soldiers have been captured
    by pro-Russian fighters near the village of Novotroyitske. (Newsweek) (UNIAN)
  - At least nine people are killed when a car bomber attacks a police checkpoint
    in the Bondhere District of Mogadishu (Al Jazeera)
  - Central African Republic Civil War (2012–present)
  - A French nun is found decapitated in a village in the Central African Republic.
    (France24)
  - Armed militias kill over 30 civilians in one of the deadliest attacks since a
    peace deal was reached back in February of this year. (Reuters)
  - Syrian Civil War, Northwestern Syria offensive (April 2019–present)
  - Syrian government airstrikes in Syria’s northwestern de-escalation zones target
    the towns of Maarrat al-Nu'man and Maarat Herma in Idlib Governorate, killing
    twelve civilians. (AA) (Daily Sabah)
  - The Syrian Army and Iran-back militants shell the town of Khan Sheykhun and the
    villages of Al-Kassabiyya, Abdin, Karasaa, Kafr Sajna and Al-Naqeer. (AA)
  Business and economy:
  - Economy of the United Kingdom
  - British Steel Limited goes into compulsory liquidation after rescue talks between
    the British government and the company's owners, Greybull Capital, fail. Around
    5,000 workers are employed by the company, 3,800 of whom are based in the UK.
    (BBC News)
  Disasters and accidents:
  - Tornadoes of 2019
  - A powerful tornado hits Jefferson City, Missouri, leaving people trapped or injured
    and structural damage according to city and state officials. At least three people
    are killed in southwestern Missouri when a storm system sweeps across the state
    causing extensive damage. (CBS News) (NBC News) (The Kansas City Star)
  International relations:
  - Russia–United States relations
  - United States F-22 Raptors intercept four Russian Tu-95 bombers and two Su-35
    fighter jets off the coast of Alaska on Tuesday and Wednesday, according to a
    statement from the North American Aerospace Defense Command. (ABC News)
  - Chagos Archipelago sovereignty dispute
  - The United Nations General Assembly passes a non-binding resolution demanding
    the United Kingdom return control of the Chagos Archipelago to Mauritius. The
    Mauritians claim they were forced to give up the islands to the British in 1965
    in exchange for independence. (BBC News)
  Law and crime:
  - Timeline of investigations into Donald Trump and Russia (2019)
  - The U.S. Justice Department agrees to provide the House Intelligence Committee
    with intelligence files from special counsel Robert Mueller's investigation of
    Russian interference in the 2016 election. (USA Today via MSN.com)
  - Lawyer Michael Avenatti is indicted in separate cases charging him with allegedly
    stealing about $300,000 from Stormy Daniels and blackmailing Nike. (CNBC)
  - Tax returns of Donald Trump
  - The New York State Legislature passes a bill that will authorize state tax officials
    to release U.S. President Donald Trump's state returns to Congress. (The New York
    Times)
  - Judge Edgardo Ramos of the United States District Court for the Southern District
    of New York rules Deutsche Bank and Capital One can release President Trump's
    financial records to Congress. (CNBC)
  Politics and elections:
  - 2019 Indonesian general election
  - Six people die and more than 200 are injured in the Indonesian capital, Jakarta,
    after protesters of the announced results of the presidential election clash with
    security forces and set fire to a police dormitory and vehicles. (The Guardian)
  - Andrea Leadsom resigns as the United Kingdom's Leader of the House of Commons
    with immediate effect in response to Prime Minister Theresa May's handling of
    Brexit. Several other cabinet ministers are reportedly threatening to resign.
    (BBC News)
