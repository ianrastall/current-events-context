Date: '2019-05-16'
Source_URI: Portal:Current events/2019 May 16
Intelligence_Payload:
  Armed conflicts and attacks:
  - Sinai insurgency
  - Forty-seven insurgents and five Egyptian soldiers are killed in a gunfight in
    the Sinai Peninsula. (Al Jazeera)
  - Insurgency in Jammu and Kashmir
  - Multiple people are killed, including three militants, two Mujahideen, two civilians
    and two Indian soldiers, in Kashmir after a shootout. (Reuters)
  Business and economy:
  - The U.S. Government under the Trump administration cancels federal grant for California
    High-Speed Rail project. (Los Angeles Times)
  Disasters and accidents:
  - Three Britons and a South African die when their light aircraft crashes on approach
    to Dubai International Airport, closing the world's busiest airport for 45 minutes.
    (Sky News)
  International relations:
  - Second Libyan Civil War
  - Field Marshal Khalifa Haftar of the Tobruk-based House of Representatives meets
    with Italian Prime Minister Giuseppe Conte and has scheduled a meeting with French
    President Emmanuel Macron for next week. (Libya Observer) (Reuters)
  Politics and elections:
  - 2020 Democratic Party presidential primaries
  - Mayor of New York City Bill de Blasio announces he is running for the Democratic
    Party's nomination to be President of the United States in the 2020 presidential
    election. (The Guardian)
  - Immigration policy of Donald Trump
  - U.S. President Donald Trump proposes a new immigration plan based on merits such
    as college degrees and skilled trades and less on family ties. (The New York Times)
  - U.S. federal agents raid the Venezuelan embassy to evict Code Pink protesters,
    at the request of National Assembly leader Juan Guaidó. They had been staying
    at the embassy at the invitation of Venezuelan President Nicolás Maduro, who is
    locked in a dispute over the presidency with Guaidó. Maduro's government considers
    the raid to be a violation of the Vienna convention. (Reuters) (The Independent)
  - Brexit negotiations in 2019, Premiership of Theresa May
  - UK Prime Minister Theresa May says that she will detail the timetable for her
    resignation after the Brexit vote in June. (FT) (The New York Times) (Time)
