Date: '2019-05-06'
Source_URI: Portal:Current events/2019 May 6
Intelligence_Payload:
  Armed conflict and attacks:
  - Syrian Civil War, 2019 Idlib offensive
  - The Syrian Arab Army launches a ground offensive against HTS and NFL-held areas
    in northern Hama and southern Idlib, after six days of intensive airstrikes on
    the region. (Fars) (Reuters) (ABC News)
  Arts and culture:
  - The first child of Prince Harry, Duke of Sussex, and Meghan, Duchess of Sussex,
    is born; the boy is seventh in line to the British throne. (The New York Times)
  Disasters and accidents:
  - A fuel tanker lorry overturns and explodes near the airport in Niamey, Niger,
    killing at least 58 people. (BBC News)
  Health and environment:
  - The United Nations Global Assessment Report on Biodiversity and Ecosystem Services
    reports that, due to human activity, the Earth's biodiversity has suffered a catastrophic
    decline that is unprecedented in human history. (NPR) (Reuters)
  International relations:
  - China–United States trade war, China–United States relations
  - Chinese stocks are down, falling more than 5 percent as of midday, following U.S.
    President Donald Trump's threats to raise tariffs against Chinese-made goods on
    Sunday. The current negotiations for a new deal between the two countries, originally
    planned for Wednesday, are now in question. U.S. stock futures fell sharply as
    well. (BBC News) (The New York Times) (Bloomberg)
  Politics and elections:
  - 2019 Turkish local elections, 2019 Istanbul mayoral election
  - After a narrow victory of Turkey's main opposition party CHP against Recep Tayyip
    Erdoğan's AKP in Istanbul's mayoral election last month, Turkey’s Supreme Electoral
    Council annulled the results and ordered a rerun of the election for the mayor
    of Istanbul. (The New York Times)
  - 2019 Guatemalan general election
  - The Attorney General and the International Commission against Impunity in Guatemala
    (CICIG) present a new case of corruption involving the current Economy Minister
    Acisclo Valladares Urruela, the presidential candidate Estuardo Galdámez of the
    ruling party National Convergence Front and seven deputies. They also request
    the revocation of the immunity of these politicians to proceed with their arrest.
    Galdámez is the sixth presidential candidate who has a process for possible acts
    of corruption. (elPeriódico de Guatemala)
  Sports:
  - U.S. President Donald Trump awards the Presidential Medal of Freedom, one of the
    highest civilian awards in the United States, to Tiger Woods for his accomplishments
    in professional golf and charitable work. (CBS Sports)
