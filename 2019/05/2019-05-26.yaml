Date: '2019-05-26'
Source_URI: Portal:Current events/2019 May 26
Intelligence_Payload:
  Armed conflict and attacks:
  - May 2019 Kathmandu bombings
  - Four people are killed and seven others are injured in three blasts in the city
    of Kathmandu, Nepal. Police believe a Maoist splinter group may have been responsible.
    (Reuters) (BBC News)
  - Iraqi insurgency (2017–present)
  - Iraq sentences three French militants to death for their involvement in ISIS.
    (BBC News)
  - A truck bomb explodes at a popular market in the village of Nineveh, Iraq, killing
    5 and injuring 8. (Xinhuanet)
  - Boko Haram
  - Four soldiers of the Chadian Army and a journalist are killed following a Boko
    Haram attack near the northern shore of Lake Chad. Boko Haram have reportedly
    continued their incursion into northern Chad. (Africanews)
  - Four people are killed in an attack on a Catholic church in northern Burkina Faso,
    the latest in a string of assaults on Christian places of worship in the region.
    (Al Jazeera)
  Business and economy:
  - The initial stage of Sydney Metro, Australia's first automated rapid transit system,
    opens to the public. (The Sydney Morning Herald)
  - Teva Pharmaceutical Industries announces, two days before their scheduled trial,
    it has agreed to pay $85 million to the U.S. state of Oklahoma in connection with
    allegations that it helped fuel the U.S. opioid epidemic. (Reuters)
  Disasters and accidents:
  - 2019 Peru earthquake
  - A strong earthquake measuring 8.0 strikes northeastern Peru, causing one death
    and several injuries. (CNN)
  Politics and elections:
  - 2019 European Parliament election
  - In the final stage of the latest European Parliament election, voters in Austria,
    Bulgaria, Belgium, Croatia, Cyprus, Denmark, Estonia, Finland, Metropolitan France,
    Germany, Greece, Hungary, Italy, Lithuania, Luxembourg, Poland, Portugal, Romania,
    Slovenia, Spain, and Sweden elect their country's representatives. (European Parliament)
  - 2019 Belgian federal election
  - In addition to the European Parliament and regional elections, voters in Belgium
    head to the polls to vote for the members of the Chamber of Representatives. (Euronews)
  - 2019 Lithuanian presidential election
  - Lithuanian citizens also are heading to the polls to elect their future president
    in the second round of the latest presidential election. (Politico)
  - Papua New Guinea's Prime Minister Peter O'Neill announces his resignation over
    disputes of him holding dual citizenship and after weeks of defections from his
    coalition government. (Radio New Zealand)
  - 2019 Greek legislative election
  - Greek Prime Minister Alexis Tsipras, whose term expires in October, calls for
    snap elections following his leftist Syriza party's heavy defeat by the opposition
    conservatives in the European Parliament elections. (Reuters)
  Sports:
  - 2019 IndyCar Series
  - 2016 IndyCar Series champion Simon Pagenaud of France wins the 103rd running of
    the Indianapolis 500. (CBS News)
  - 2019 IIHF Ice Hockey World Championship
  - Finland defeats Canada to win gold medal at Ice Hockey World Championship in Slovakia.
    (Yle News)
