Date: '2019-05-31'
Source_URI: Portal:Current events/2019 May 31
Intelligence_Payload:
  Armed conflict and attacks:
  - A Taliban suicide car bomber kills four Afghan civilians and injures over 20 including
    four American soldiers. (VOA)
  Disasters and accidents:
  - 2019 Alberta wildfires
  - In northern Alberta, Canada, an estimated 10,000 people have been evacuated due
    to fast spreading wildfires. (Global News)
  - Air quality warnings are issued for most of Alberta as a result of the thick smoke
    moving across the province. Places as far south as Calgary have reached 10+ on
    the Air Quality Health Index, and rated worse than some of the most polluted cities
    in the world. (Calgary Herald)
  Law and crime:
  - North Korea–United States relations
  - According to South Korean media, North Korea executed five officials back in March,
    including Kim Hyok-chol, its nuclear envoy to the United States, for their part
    in the failed second summit in Hanoi. In addition, three other officials involved
    in the summit have reportedly been sent to a camp for political prisoners. (Reuters)
    (Fox News)
  - Eddie Gallagher, a U.S. Navy Seal charged with the murder of an ISIL prisoner,
    attempted murder of civilians, and obstruction of justice, is temporarily released
    from custody amidst allegations of misconduct by Navy prosecutors. (CBS News)
  - 2019 Virginia Beach shooting
  - Thirteen people are killed, including the shooter, and four are injured in a shooting
    at a municipal center in Virginia Beach, Virginia. (WAVY)
  Sports:
  - 2018–19 CAF Champions League
  - In African football, the 2019 CAF Champions League Final between Morocco's Wydad
    Casablanca, and Tunisia's Espérance Sportive de Tunis, is abandoned after Wydad
    Casablanca players refused to play following a row over a goal ruled out by the
    video assistant referee (VAR). The referee subsequently awarded the victory to
    Espérance Sportive de Tunis for their fourth CAF title. (BBC Sport)
