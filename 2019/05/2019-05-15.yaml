Date: '2019-05-15'
Source_URI: Portal:Current events/2019 May 15
Intelligence_Payload:
  Armed conflicts and attacks:
  - Militants kill at least 17 Niger Armed Forces troops in an ambush near the Malian
    border. Another 11 soldiers are missing; six others have been evacuated to a hospital.
    No group has claimed responsibility. (BBC News) (Reuters)
  Arts and culture:
  - The Jeremy Kyle Show, one of the United Kingdom's most watched reality television
    programmes, is cancelled by ITV Studios following the suicide of a male guest
    shortly after taking part in the programme. The show has long been criticised
    for its style, with many describing it as poverty porn. (BBC News)
  Disasters and accidents:
  - A helicopter with only the pilot onboard crashes into the Hudson River shortly
    after taking off from the West 30th Street Heliport in New York City injuring
    the pilot and the dockworker on the ground.
  - Pacific Islands Forum
  - United Nations Secretary General António Guterres says Pacific island nations
    are "running out of time" in regards to climate change and global warming effects.
    (Radio New Zealand)
  International relations:
  - Iraq–United States relations, Iran–United States relations
  - The United States Department of State orders all non-emergency, non-essential
    government employees at the U.S. Embassy in Baghdad and Erbil consulate office
    to leave Iraq amid heightened tensions in the Persian Gulf between the United
    States and Iran. (Reuters) (Associated Press)
  - Germany–Iraq relations, NATO Training Mission – Iraq, Germany–Iran relations,
    Iraq–European Union relations
  - Germany and the Netherlands suspend military training mission in Iraq citing escalating
    tensions in the region with Iran. (Deutsche Welle) (Reuters)
  - Christchurch Call summit
  - Representatives from 17 world governments and various U.S. technology companies
    meet in Paris to support a set of anti-terrorism guidelines called the "Christchurch
    Call to Action" drafted by the governments of France and New Zealand. The White
    House expressed support for the "overall goals reflected" in this pledge, but
    refused to back it, citing freedom of speech concerns. (SBS)
  Law and crime:
  - San Francisco becomes the first U.S. city to ban the use of facial recognition
    systems by law enforcement. (BBC News)
  - Abortion in the United States by state, Fetal heartbeat bill
  - The Governor of Alabama Kay Ivey signs the Human Life Protection Act into law,
    effective six months after signing, bans all abortions in the state of Alabama,
    except when "abortion is necessary in order to prevent a serious health risk"
    to the woman according to the bill's text. The law reclassifies abortion as a
    Class A felony and attempted abortion as a Class C felony. (CBS News) (WBRC Birmingham,
    AL)
  Politics and elections:
  - Fijian Prime Minister Frank Bainimarama asks developed nations, especially the
    United States, to help fight climate change to "prevent the current crisis from
    escalating into total chaos." (Radio New Zealand)
  - 2019 Andorran parliamentary election
  - Xavier Espot Zamora is elected the new Prime Minister by the General Council,
    succeeding Antoni Martí. (Diari d'Andorra)
  - Presidency of Jair Bolsonaro
  - Hundreds of thousands of students, schoolteachers, and university professors hold
    demonstrations across Brazil's biggest cities in opposition to large cuts in the
    education budget. From Dallas, Brazilian President Jair Bolsonaro calls demonstrators
    "stupid." (Al Jazeera)
  - President Bolsonaro expresses support for comedian Danilo Gentili who was sentenced
    to six months in prison for a sexually graphic rant against a congresswoman, saying
    that she was a transexual or a prostitute. (The Washington Post)
  - 2019 Guatemalan general election
  - The Constitutional Court ruled that former Attorney General Thelma Aldana can
    not participate as a presidential candidate and leaves her out of the elections.
    Aldana was one of the favorites to succeed the current President Jimmy Morales.
    (The Washington Post)
