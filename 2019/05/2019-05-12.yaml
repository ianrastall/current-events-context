Date: '2019-05-12'
Source_URI: Portal:Current events/2019 May 12
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in the Maghreb (2002–present)
  - Gunmen burn down a Catholic church during mass and kill six people, including
    a priest, in Dablo, Burkina Faso. (BBC News)
  - Gulf of Oman incident, Iran–United States relations, Iran–Saudi Arabia relations
  - The United Arab Emirates reports four commercial vessels were subject to "sabotage
    operations" just outside its territorial waters in the Gulf of Oman and two of
    the vessels suffer "significant damage" to their structure off the coast of Fujairah.
    One of the vessels was en route to the United Arab Emirates to be loaded with
    Saudi Arabia crude oil and sent to the United States. (Reuters) (Associated Press)
    (CNN)
  - Syrian Civil War
  - Memos sent to Syria's head of military intelligence, and obtained by the New York
    Times, report that President Bashar al-Assad's government has been running a network
    of secret torture facilities across Syria, crushing opposition via routine torture
    in secret prisons. (Al Jazeera)
  Law and crime:
  - Argentine lawmaker Héctor Enrique Olivares, who was seriously injured in a shooting
    attack near the Congress on May 9, dies in hospital as result of the gunshot injuries.
    (TN.com.ar) (Reuters)
  Politics and elections:
  - 2019 Lithuanian presidential election
  - Lithuanians are called to the polls to elect the new President. Ingrida Šimonytė
    wins the first round and will dispute the second round with Gitanas Nausėda. Prime
    Minister and presidential candidate, Saulius Skvernelis is about to resign after
    the bad results of his candidature. (Deutsche Welle) (BBC News)
  - 2019 North Macedonian presidential election
  - Stevo Pendarovski is sworn in as the President of North Macedonia after winning
    the election, the first after the Prespa agreement. (Euronews)
  Sports:
  - England's 2018–19 Premier League
  - Manchester City F.C. win England's 2018–19 Premier League for the second year
    in a row with 98 points, while Liverpool F.C. come in second with 97 points, continuing
    their 29-year title drought. (English Premier League)
