Date: '2019-05-27'
Source_URI: Portal:Current events/2019 May 27
Intelligence_Payload:
  Armed conflicts and attacks:
  - French police arrest four people in connection with last Friday's bombing in Lyon's
    historic city center that injured 13 people. Anti-terrorist prosecutors are leading
    the investigation. District mayor Denis Broliquier said the bomb was a relatively
    weak explosive that was too small to kill. No one has claimed responsibility for
    the attack. (BBC News)
  - Over Sunday and Monday, 55 people die of asphyxiation in various prisons across
    the Brazilian city of Manaus. (BBC News)
  Business and economy:
  - Italian firm Fiat Chrysler proposes a merger with French carmaker Renault. The
    new company will be based in the Netherlands and will be listed on the Milan,
    Paris and New York stock exchanges. (BBC News)
  Disasters and accidents:
  - At least 45 people die when a boat sinks on Lake Mai-Ndombe in western Democratic
    Republic of Congo. (BBC News)
  - Eight miners die in a goldmine explosion in central Zimbabwe. (BBC)
  - An airplane crashes in Sergipe, Brazil, killing Brazilian singer Gabriel Diniz.
    (G1)
  - U.S. tornadoes of 2019
  - Multiple destructive tornadoes strike Dayton, Ohio, and surrounding communities.
    There was at least one known fatality in Celina. Multiple homes and businesses
    were destroyed, with reports of numerous power outages and a boil and water conservation
    advisory issued for Dayton. (Accuweather)
  Law and crime:
  - Romania's Supreme Court denies Social Democratic Party leader Liviu Dragnea's
    appeal of his conviction and three-and-a-half year prison sentence for corruption.
    (BBC News)
  - Amazonas prison massacres
  - Brazil prison officials report at least 42 prisoners are found strangled to death
    in four separate jails in the state of Amazonas. Yesterday, 15 prisoners were
    killed in a fight between rival prison gangs at a facility near the Amazonas capital
    Manaus. (Reuters) (Firstpost)
  Politics and elections:
  - 2019 Austrian legislative election
  - Austrian Chancellor Sebastian Kurz loses a no-confidence vote following a corruption
    scandal over a secret video. (BBC News)
  - 2019 Malawian general election
  - Peter Mutharika of the Democratic Progressive Party wins Malawi's May 21 presidential
    election with 39% of the vote, followed by Lazarus Chakwera of the Malawi Congress
    Party with 36% and Saulos Chilima of the United Democratic Movement with 20%.
    (Reuters)
  - 2019 Canadian federal election
  - In separate press conferences, former Liberal cabinet members Jody Wilson-Raybould
    and Jane Philpott, who both resigned over the government's handling of the SNC-Lavalin
    criminal case, announce they are running as independents in the October 2019 elections.
    (BBC News)
