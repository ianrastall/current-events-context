Date: '2019-05-04'
Source_URI: Portal:Current events/2019 May 4
Intelligence_Payload:
  Armed conflicts and attacks:
  - Islamic State of Iraq and the Levant in Libya during the Libyan Civil War
  - An attack on forces loyal to Field Marshal Khalifa Haftar in Sabha, Libya, kills
    at least nine people. ISIL claims responsibility. (AFP via The Times of India)
  - North Korea and weapons of mass destruction
  - North Korea fires several short-range projectiles from the east coast city of
    Wonsan. (Reuters/AP via ABC Australia)
  - Gaza–Israel clashes (May 2019)
  - The Israeli Air Force carries out dozens of airstrikes on the Gaza Strip in response
    to a barrage of rockets fired by Hamas militants. The Turkish state-owned Anadolu
    Agency's media office in Gaza was among those hit by Israeli missiles, prompting
    outrage from Turkish officials. (Deutsche Welle)
  - Four Turkish soldiers were killed in an attack on their base in Iraq by Kurdish
    forces. Twenty PKK members were also killed in the attack. (Reuters)
  Arts and culture:
  - Vajiralongkorn, King of Thailand since 2016, is officially crowned sovereign.
    His wife Suthida Tidjai, who he had married only three days prior, is declared
    Queen consort. (Washington Post)
  Disasters and accidents:
  - 2019 North Indian Ocean cyclone season
  - Cyclone Fani starts affecting Bangladesh, where over a million people have been
    evacuated from the storm's path. Authorities say the cyclone has killed at least
    five people in Bangladesh and damaged over a thousand homes. At least twelve people
    have been killed in total by the cyclone. (Reuters)
  Science and technology:
  - Interstellar Technologies successfully launches uncrewed rocket MOMO-3 from its
    launch facility in Taiki, Hokkaido, becoming the first commercially developed
    Japanese rocket to reach the Kármán line. (Deutsche Welle)
  Sport:
  - 2019 Kentucky Derby
  - In horse racing, Country House wins the 145th Kentucky Derby after Maximum Security
    is disqualified. The latter horse is the first Kentucky Derby winner ever to have
    been disqualified for interference. (CBS Sports)
