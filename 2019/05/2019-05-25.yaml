Date: '2019-05-25'
Source_URI: Portal:Current events/2019 May 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - Saudi Arabia–United States relations, Iran–Saudi Arabia relations, Iran–Saudi
    Arabia proxy conflict
  - U.S. President Donald Trump bypasses Congress to approve the sale of billions
    of dollars' worth of weapons to Saudi Arabia, citing Iranian threats against the
    latter. (BBC News)
  Arts and culture:
  - 2019 Cannes Film Festival
  - The South Korean film Parasite wins the 2019 Palme d'Or, the Cannes Film Festival's
    top prize. (CNN)
  Disasters and accidents:
  - Tornadoes of 2019
  - Two people are killed and several are missing due to a tornado in the U.S. state
    of Oklahoma. (ABC News)
  - A boat sinking on Lake Mai-Ndombe in western Democratic Republic of the Congo
    kills at least 45 people with 200 passengers still missing. The vessel was carrying
    more than 400 people, the majority of whom were teachers going to collect their
    salaries. (BBC News)
  Politics and elections:
  - 2019 European Parliament election
  - Citizens in Latvia, Malta, Slovakia and the French overseas territories head to
    the polls to vote in the latest European Parliament election. Additionally, voting
    in the Czech Republic continues for the second day. (European Parliament)
  - Hundreds of counter-protesters show up and protest against an estimated nine attendees
    of a planned rally by a Ku Klux Klan-affiliated group in Dayton, Ohio. (CBS News)
  Science and technology:
  - Binary Aten asteroid (66391) 1999 KW4 and its minor-planet moon make their closest-ever
    recorded flyby of Earth at 3.2 million miles away. The asteroid will approach
    even closer at 0.0155 AU (2,320,000 km) from Earth in 2036, and is the largest
    asteroid to approach Earth until (4953) 1990 MU in June 2027. (Newsweek)
  Sports:
  - 2019 NBA playoffs
  - The Toronto Raptors defeat the Milwaukee Bucks in Game 6 and advance to the NBA
    Finals for the first time in the team's history. (CBC) (Sports Illustrated)
