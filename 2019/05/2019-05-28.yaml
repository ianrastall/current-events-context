Date: '2019-05-28'
Source_URI: Portal:Current events/2019 May 28
Intelligence_Payload:
  International relations:
  - Australia–China relations, South China Sea dispute
  - Australian helicopters, from the Royal Australian Navy flagship HMAS Canberra,
    are forced to make an emergency landing after being targeted by lasers from fishing
    boats in the South China Sea. The Canberra was being trailed by a Chinese warship.
    (AP via MSN.com)
  Law and crime:
  - Kawasaki stabbings
  - A man stabs two people to death and wounds 17 others, including sixteen children,
    in Kawasaki, Japan, before slitting his own throat; he later dies of his wounds.
    Three people are in critical condition. (BBC News) (CNN)
  - China–United States trade war
  - Huawei files for a summary judgment, seeking to expedite its March lawsuit against
    the U.S. Government, challenging the constitutionality of Section 889 of the National
    Defense Authorization Act that bans U.S. executive government agencies from procuring
    Huawei and ZTE telecommunications equipment based on national security. (CNBC)
    (CNN)
  - Former Tehran Mayor Mohammad-Ali Najafi is arrested after confessing to the murder
    of his wife. (IFP)
  Politics and elections:
  - 2018–19 Sudanese protests
  - Opposition leaders lead a two-day protest in Sudan over stalemate in negotiations
    between the military and opposition alliance groups over the transition of government
    following the 2019 Sudanese coup d'état. (Reuters) (The Washington Post)
  Science and technology:
  - Discoveries of exoplanets
  - Rare-earth metals are discovered in KELT-9b, an exoplanet located 650 light-years
    away from Earth. (Astronomy Now)
