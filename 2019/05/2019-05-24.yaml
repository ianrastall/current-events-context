Date: '2019-05-24'
Source_URI: Portal:Current events/2019 May 24
Intelligence_Payload:
  Armed conflict and attacks:
  - Iran–United States relations
  - U.S. President Donald Trump orders 1,500 troops and several Patriot missile launchers
    to the Persian Gulf as tensions rise with Iran. (CBS)
  - 2019 Lyon bomb attack
  - Multiple people are injured in Lyon, France, by a bomb filled with bolts. (CNN)
  - Insurgency in Balochistan
  - A bombing at a mosque in the Pakistani city of Quetta, the capital of the restive
    province of Balochistan, kills three people, including the prayer leader, and
    injures at least 28 worshippers. (Al Jazeera)
  - War in Afghanistan (2001–2021)
  - Three people, including a senior Muslim preacher, are killed and at least 20 injured
    after an explosion in a mosque during Friday prayers in the Afghan capital, Kabul.
    (Al Jazeera)
  - 2019 Portuguesa, Venezuela prison uprising
  - At least 23 prisoners are killed during a prison riot in Acarigua, Portuguesa,
    Venezuela. (TIME) (Washington Post)
  Disasters and accidents:
  - 2019 Surat fire
  - Twenty children die in a fire in Surat, India. (India Today)
  - 2017–2019 eruptions of Mount Agung
  - Mount Agung in Bali, Indonesia, erupts. (ABC)
  Law and crime:
  - Shiregreen child deaths
  - During a police raid, six children are found unconscious inside a residential
    property in the Shiregreen suburb of Sheffield, England. The eldest two children,
    aged 13 and 14, subsequently died at Sheffield Children's Hospital; the other
    four children remain hospitalised. (BBC News)
  - Two people – a 37-year-old man and a 34-year-old woman – have been arrested under
    suspicion of murder at the property in Sheffield where six children were found.
    They remain in police custody. A murder investigation has been opened. (Evening
    Standard)
  - LGBT rights in Taiwan, Legal status of same-sex marriage
  - Same-sex marriage becomes legal in Taiwan, making Taiwan the first nation in Asia
    to recognize same-sex marriage. (The Telegraph)
  - LGBT rights in Kenya
  - The High Court of Kenya rules against a bid to strike down Section 162 and 165
    of the Kenyan Penal Code, a sodomy law. The plaintiffs plan to appeal to the Court
    of Appeal. (Daily Nation) (The Guardian)
  - Aftermath of the kidnapping of Jayme Closs
  - In the U.S. state of Wisconsin, Jake Thomas Patterson is sentenced to life in
    prison for the kidnapping of Jayme Closs and the murders of her parents. (NPR)
  - Human Life Protection Act
  - A federal lawsuit is filed to block Alabama’s abortion ban. (ABC News)
  - Abortion in the United States by state, Heartbeat bill
  - The Governor of Missouri Mike Parson signs House Bill 126 into law, effective
    on August 28, 2019, bans all abortions in the state of Missouri at or beyond of
    pregnancy, except in cases of medical emergencies. Persons who perform abortion
    in the state after of pregnancy face in prison. (CBS News) (The Kansas City Star)
  - Trial of Catalonia independence leaders
  - The Board of the Congress of Deputies suspends Jordi Turull, Josep Rull, Oriol
    Junqueras and Jordi Sànchez Catalan leaders elected lawmakers due to they judicial
    situation. (Reuters)
  Politics and elections:
  - 2019 European Parliament election
  - Voters in Ireland and the Czech Republic head to the polls to vote for their country's
    representatives in the European Parliament. (European Parliament)
  - 2019 UK Conservative Party leadership election
  - United Kingdom Prime Minister Theresa May announces her resignation as leader
    of the Conservative Party, effective June 7. She will remain Prime Minister until
    a successor is elected. (The Guardian)
  - The U.S. Supreme Court temporarily blocks the redrawing of Ohio and Michigan electoral
    maps while it prepares to rule on whether or not partisan gerrymandering is constitutional.
    Lower federal courts ordered Michigan and Ohio electoral maps to be redrawn before
    the 2020 United States presidential election. (Reuters) (Los Angeles Times)
