Date: '2019-05-17'
Source_URI: Portal:Current events/2019 May 17
Intelligence_Payload:
  International relations:
  - Canada–United States relations, Mexico–United States relations
  - The United States lifts tariffs on steel and aluminum from Canada and Mexico.
    (NPR)
  Law and crime:
  - China–United States relations
  - A former CIA officer, Kevin Mallory, is sentenced to 20 years in prison by a federal
    judge in the Eastern District of Virginia for spying for China. (The New York
    Times) (BBC News)
  - LGBTQ rights in Taiwan
  - Taiwan's Legislative Yuan passes legislation legalizing same-sex marriage and
    limited joint-custody rights, making Taiwan the first country in Asia to do so.
    President Tsai Ing-wen and her cabinet helped draft the bill, and she will sign
    it into law on or before May 24. (Taiwan News) (Reuters) (Al Jazeera)
  - LGBTQ rights in the United States
  - The U.S. House of Representatives passes the Equality Act, which prohibits discrimination
    based on sexual orientation and gender identity. (Business Insider)
