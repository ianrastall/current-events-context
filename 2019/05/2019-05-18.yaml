Date: '2019-05-18'
Source_URI: Portal:Current events/2019 May 18
Intelligence_Payload:
  Arts and culture:
  - Eurovision Song Contest 2019
  - Duncan Laurence, representing the Netherlands, wins the 2019 edition of the Eurovision
    Song Contest with the song "Arcade". It is the country's first win since . (The
    Guardian)
  Disasters and accidents:
  - Five foreign tourists, four of whom were Americans, are killed when their Piper
    PA-32 crashes into the Atlantic Ocean near Honduras shortly after taking off from
    Roatán island. (ABC News)
  Health and environment:
  - 2019 Cook Islands dengue fever outbreak
  - The Cook Islands secretary of health, Josephine Herman, says that the country
    is holding and containing the latest outbreak of Dengue, which has killed 22 people
    and infected another 28. (Radio New Zealand)
  Law and crime:
  - Crime in Alabama
  - One person was killed and eight injured in a shooting after a dispute between
    two women at a large high school graduation party. The suspect is still at large.
    (Associated Press)
  Politics and elections:
  - 2019 Argentine general election
  - Former Argentine President Cristina Fernández de Kirchner announces that she will
    run for Vice President in the 2019 Argentine general election, with former Chief
    of Staff Alberto Fernández as her running mate for President. (Télam) (La Nación)
  - 2019 Australian federal election
  - Voters in Australia go to the polls to elect new members of the House of Representatives
    and half of the Senate. (SBS)
  - Prime Minister Scott Morrison declares victory. It remains unclear whether his
    Liberal-National Coalition has won a majority of seats, or whether it will form
    a minority government. (Sydney Morning Herald)
  - Despite opinion polls predicting a Labor victory, the Labor Party loses several
    seats, with support in the key state of Queensland far lower than expected. Opposition
    Leader Bill Shorten concedes defeat and steps down as party leader. (Canberra
    Times)
  - Former Prime Minister Tony Abbott loses his seat to independent candidate and
    former Olympian Zali Steggall. (The Guardian)
  - Efforts to impeach Donald Trump
  - Justin Amash from Michigan's 3rd congressional district becomes the first Republican
    U.S. Representative to support the impeachment of President Donald Trump. (Fox
    News)
  - Ibiza affair
  - Vice-Chancellor of Austria, Heinz-Christian Strache, steps down both as Vice-Chancellor
    and chairman of the Freedom Party of Austria due to an alleged corruption scandal.
    (DW)
  - Sebastian Kurz, Chancellor of Austria, announces the dissolution of his government
    and calls for a snap election. (Independent)
  Sports:
  - 2019 FA Cup Final, 2018–19 Manchester City F.C. season
  - Manchester City F.C. win England's 2018–19 FA Cup by defeating Watford F.C. 6-0
    in the final, marking the first time that an English club has won all three domestic
    titles in one season. (England's Football Association)
