Date: '2019-05-03'
Source_URI: Portal:Current events/2019 May 3
Intelligence_Payload:
  Business and finance:
  - Sinclair Broadcast Group buys Fox Sports Networks (FSN) from The Walt Disney Company
    for $10.6 billion. Disney was ordered by the U.S. Justice Department to sell FSN
    as part of its purchase of 21st Century Fox last year due antitrust concerns over
    its ownership of ESPN Inc. (The New York Times)
  - Documents filed in a United States bankruptcy court indicate that the bankrupt
    utility company Pacific Gas & Electric has not been able to reach a settlement
    with its creditors over billions of dollars it owes under power purchase contracts.
    PG&E wants the issue settled by the bankruptcy court rather than by the Federal
    Energy Regulatory Commission. (Reuters)
  Disasters and accidents:
  - Mississippi River floods
  - Alton, Illinois, builds a barrier wall as the Mississippi River rises to levels
    not seen since the historic 1993 floods. (Chicago Tribune)
  - The Mississippi River rises to its highest level since the 1993 floods at the
    Quad Cities in Illinois and Iowa. (Chicago Tribune)
  - Flooding from Michigan to the south damages homes and sends the Mississippi River
    to a 157-year high in Davenport, Iowa. (Weather Channel)
  - 2019 North Indian Ocean cyclone season
  - Cyclone Fani, an extremely severe category 4 storm and one of the strongest in
    recent years, makes landfall at the coastal town of Puri in the Indian state of
    Odisha. Eight people have been killed in India, according to the Press Trust of
    India, and hundreds more injured. Severe damage and flooding has been reported.
    One million Indians and 2.1 million Bangladeshis have been evacuated. A storm
    surge possibly up to 1.5m (5ft) is expected. The storm, weakening as it travels
    northeast through India, is expected to reach Chittagong in Bangladesh Saturday.
    (Reuters) (BBC News)
  - Miami Air Flight 293
  - A Boeing 737 arriving at Naval Air Station Jacksonville in Florida slides off
    the runway into the St. Johns River. All on board survive. (CNN)
  Politics and elections:
  - Tax returns of Donald Trump
  - The California Senate passes a bill that would keep Donald Trump out of the 2020
    presidential primaries until he releases his tax returns. (The Hill) (Associated
    Press)
  Sports:
  - 2019 NBA playoffs
  - The Portland Trail Blazers defeat the Denver Nuggets 140-137 in quadruple overtime,
    making the game the first quadruple overtime game in the playoffs since 1953.
    (The Guardian) (Vladtv)
