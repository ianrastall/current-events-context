Date: '2019-05-01'
Source_URI: Portal:Current events/2019 May 1
Intelligence_Payload:
  Armed conflict and attacks:
  - Naxalite–Maoist insurgency
  - Sixteen soldiers, including a driver, are killed in a landmine explosion in the
    Gadchiroli district of Maharashtra, India. Maoist insurgents are currently active
    in the area, leading officials to believe them to be responsible. (CNN)
  Arts and culture:
  - 2019 Japanese imperial transition
  - The Japanese Era begins as Emperor Naruhito accedes to the Chrysanthemum Throne
    as the 126th Emperor of Japan. The Emperor inherits two of the Three Sacred Treasures
    of Japan during a symbolic ceremony, which formalises his ascension. (The Mainichi)
    (BBC News)
  - Monarchy of Thailand
  - Vajiralongkorn, King of Thailand, marries his head of security and mistress, General
    Suthida Tidjai, days before his coronation. (Reuters)
  Law and crime:
  - WikiLeaks founder Julian Assange is sentenced to 50 weeks in prison by a judge
    in the United Kingdom for breaching bail in 2012. Assange still faces possible
    extradition to the United States on charges of conspiracy to commit computer intrusion.
    (NPR) (The Guardian)
  - Internet censorship in Russia
  - Russian President Vladimir Putin signs the into law. The bill has drawn fierce
    criticism from civil society groups over fears that it would lead Russia to establish
    an isolated internet landscape. (The Moscow Times)
  Politics and elections:
  - Fiona Onasanya, the member of the UK Parliament for Peterborough, is removed from
    her position following a successful recall petition in the wake of her conviction
    for perverting the course of justice, becoming the first MP in the country's history
    to lose their seat in this manner. A by-election will be called to elect a replacement
    MP. (BBC News)
  - British Prime Minister Theresa May fires Gavin Williamson as Secretary of State
    for Defence, following the leaking of information relating to a National Security
    Council meeting, regarding the security risk posed by Chinese multinational telecommunications
    company Huawei. Secretary of State for International Development Penny Mordaunt
    is appointed the first-ever female British Defence Secretary. (The Guardian) (Evening
    Standard)
  - The UK Parliament declares "an environment and climate emergency." (CNN)
