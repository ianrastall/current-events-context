Date: '2019-05-09'
Source_URI: Portal:Current events/2019 May 9
Intelligence_Payload:
  Armed conflicts and attacks:
  - North Korean missile tests
  - The South Korean military claims that North Korean military has launched an "unidentified
    projectile" into the sea, marking the second time North Korea has conducted a
    weapons test in a single week. (CNBC)
  - North Korea–United States relations
  - For the first time the United States seizes a North Korean merchant ship loaded
    with coal in the East China Sea sailing toward Indonesia. The ship is suspected
    of violating sanctions. (ABC News) (CNN) (NBC News)
  - International military intervention against ISIL
  - A blast hits Baghdad's northeastern Sadr City district. ISIL claims responsibility.
    No verified report on casualties is presently available. (Reuters)
  Arts and culture:
  - 'The Reserve Bank of Australia confirms it issued approximately 46 million new
    Australian $50 notes in late 2018 with a typo in the background fine print: "responsibility"
    is misspelled as "responsibilty", the third "i" is missing. The mistake appears
    three times on the note and is extremely small requiring magnification to see.
    Part of the rollout of Australia''s redesigned currency, the A$50 notes feature
    the first female member of an Australian parliament, social reformer Edith Cowan.
    (BBC News) (The Age)'
  Disasters and accidents:
  - European migrant crisis
  - The United Nations states that at least 65 people are dead after a boat sinks
    off the coast of Tunisia while carrying migrants from Libya to Europe. (Reuters/ABC
    News Australia)
  Law and crime:
  - Argentine congressman of the UCR party is shot by two assailants and is in critical
    condition. One of his advisers dies as a result of the gunshots. (Infobae) (Buenos
    Aires Times)
  - Operation Car Wash
  - Former Brazilian President Michel Temer surrenders to the federal police in response
    to Wednesday's arrest warrant regarding an investigation into an alleged corruption
    scheme involving an Eletrobras nuclear power plant. Temer's lawyer's appeal will
    be heard on Tuesday. (Reuters) (France 24)
  Health and environment:
  - The United States House of Representatives votes to overturn President Donald
    Trump’s move on the Affordable Care Act. (The Hill)
  Politics and elections:
  - 2019 Venezuelan presidential crisis
  - SEBIN agents detain Juan Guaidó's deputy Edgar Zambrano, the Vice President of
    the opposition-held National Assembly, and are reported to have taken him to El
    Helicoide prison. He is the most high profile opposition politician arrested since
    the presidential crisis began in January. (BBC News) (Deutsche Welle)
  - Colleague Richard Blanco of the Brave Peoples’ Alliance party seeks refuge in
    Argentina's embassy in Caracas, Venezuela, following Zambrano's arrest. (Reuters)
  - Montenegrin coup plot
  - Russian officials are sentenced for a 2016 coup attempt in Montenegro. (The Guardian)
