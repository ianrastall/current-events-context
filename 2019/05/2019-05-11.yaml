Date: '2019-05-11'
Source_URI: Portal:Current events/2019 May 11
Intelligence_Payload:
  Armed conflicts and attacks:
  - Yemeni Civil War (2015–present)
  - Houthi forces begin to withdraw from several Yemeni ports, including Al Hudaydah,
    As-Salif and Ras Isa. The withdrawal is part of a UN-brokered ceasefire deal that
    aims to end the blockade of Yemen. (Deutsche Welle)
  - 2019 Pearl Continental Hotel attack
  - In Gwadar, three insurgents attack a luxury hotel, as a result of the attack,
    four hotel employees, a soldier and all three attackers have been killed. The
    Baloch Liberation Army, an ethnic Baloch separatist group fighting for independence
    for Balochistan province, claimed responsibility for the attack saying that four
    fighters were involved. (BBC News)
  - North Korea–United States relations
  - A North Korean merchant ship loaded with coal, seized by the United States in
    the East China Sea for suspected sanctions violation, arrives in Pago Pago, American
    Samoa. (Associated Press)
  Health and environment:
  - Efforts begin in Solomon Islands to refloat a ship after an oil spill in what
    the government says will be a "very difficult operation." (Radio New Zealand)
  Law and crime:
  - Harvey Weinstein sexual abuse allegations
  - Harvard announces that they will not renew law professor Ronald S. Sullivan Jr.'s
    appointment as dean of Winthrop House after he joined the defense of Harvey Weinstein.
    He remains a regular professor. (Boston CBS) (New York Times)
  Politics and elections:
  - David W. Panuelo is sworn in as President of the Federated States of Micronesia,
    succeeding Peter M. Christian, after being elected by the Congress. (Fiji Times)
