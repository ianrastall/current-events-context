Date: '2019-05-29'
Source_URI: Portal:Current events/2019 May 29
Intelligence_Payload:
  Arts and culture:
  - Indian record label and film production company T-Series' most-subscribed YouTube
    channel reaches 100 million subscribers. (Times News Now)
  Disasters and accidents:
  - Sinking of Hableány
  - The Hableány, a sightseeing river cruise ship on the Danube in Budapest, capsizes
    and sinks with 34 South Korean tourists on board. At least seven people are killed
    and 19 remain missing. (The New York Times)
  Law and crime:
  - A 55-year-old pediatrician, Ricardo Russo, is arrested at the Hospital Garrahan
    in Buenos Aires, Argentina, where he was Chief of the Immunology Department. He
    is accused of sexually abusing minors, distributing and possessing child pornography,
    including handicapped children and babies. He was wanted by the U.S. FBI and public
    prosecutors in Brazil. (Clarín) (Fox News)
  - Maine becomes the 17th U.S. state to ban conversion therapy for minors. (The Hill)
  - Trial of Catalonia independence leaders
  - Imprisoned politician Raül Romeva is suspended as Senator by the Board of the
    Spanish Senate. (MSN)
  Politics and elections:
  - 2019 Latvian presidential election
  - Egils Levits, a Judge of the European Court of Justice, is elected President by
    the Saeima. (Reuters)
  - Elections in Israel
  - Israel is expected to hold a new election on September 17 as Prime Minister Benjamin
    Netanyahu fails to form a government. (The Jerusalem Post)
  Science and technology:
  - China–United States trade war
  - The Institute of Electrical and Electronics Engineers (IEEE) bans Huawei scientists
    from reviewing submissions to its peer-reviewed journals, due to the "severe legal
    implications" of U.S. sanctions against the Chinese company. (Sciencemag)
