Date: '2019-05-10'
Source_URI: Portal:Current events/2019 May 10
Intelligence_Payload:
  Armed conflicts and attacks:
  - Insurgency in the Maghreb (2002–present)
  - Four hostages, who were being held in northern Burkina Faso, are rescued by French
    naval commandos, with two French commandos killed during the rescue operation.
    Those freed include two Frenchmen who had been kidnapped in Benin on May 1 and
    a pair of women, one an American and the other a South Korean. (BBC News)
  - Boko Haram insurgency
  - About 900 children are released from the Civilian Joint Task Force, a militia
    formed in Nigeria to counter Boko Haram. (CNN)
  - Insurgency in Balochistan
  - Suspected Baloch nationalist gunmen storm a coal mine in Islamabad, Pakistan,
    killing at least five people. (Al Jazeera)
  - War in Afghanistan
  - One day after peace talks between the Taliban and the United States ended with
    no resolution, Taliban militants attack government outposts in northwestern Afghanistan,
    killing at least twelve Afghan soldiers. (The New York Times)
  Business and economy:
  - Uber makes its initial public offering on the New York Stock Exchange, starting
    by selling stocks at $42 and closing at $41.60. Uber's market cap drops from over
    $80 billion to about $72 billion. (Yahoo! Finance) (BuzzFeed News)
  International relations:
  - China–United States trade war, China–United States relations
  - The United States increases tariffs from 10% to 25% on $200 billion worth of imports
    from China after no deal materialized prior to the midnight deadline.
  Law and crime:
  - Mueller special counsel investigation, Crossfire Hurricane (FBI investigation)
  - Republicans Senate Homeland Security Committee Chairman Ron Johnson and Senate
    Finance Committee Chairman Chuck Grassley request documents related to Christopher
    Steele, author of the Trump–Russia dossier, in a letter to United States Secretary
    of State Mike Pompeo and the FBI Director Christopher Wray. (CBS News)
  - Tax returns of Donald Trump
  - The United States House Committee on Ways and Means subpoenas United States Secretary
    of the Treasury Steven Mnuchin and Commissioner of Internal Revenue Charles Rettig
    to provide President Donald Trump's federal tax returns for the last six years.
    (The New York Times)
