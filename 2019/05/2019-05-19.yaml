Date: '2019-05-19'
Source_URI: Portal:Current events/2019 May 19
Intelligence_Payload:
  Armed conflicts and attacks:
  - An explosion hits a tourist bus carrying South African nationals near the Grand
    Egyptian Museum in Giza, Egypt, injuring at least 14 people. (CNN)
  - Iraq–United States relations, Iran–United States relations
  - A rocket explodes inside the heavily fortified Green Zone sector of Iraq's capital,
    landing less than a mile from the U.S. Embassy in Baghdad amid heightened tensions
    in the region between the United States and Iran. (Associated Press) (Los Angeles
    Times)
  Business and economy:
  - China–United States trade war
  - Google pulls Android update support for Huawei phones, as well as the Google Play
    Store and Gmail apps, after the Chinese technology company was blacklisted by
    the United States Commerce Department. (The Guardian)
  - Martin Tower, the tallest building in Bethlehem, Pennsylvania, is destroyed in
    a controlled demolition by the Controlled Demolition, Inc. firm. The 21-story
    building, which was listed on National Register of Historic Places, had been vacant
    since 2007. (BBC News)
  International relations:
  - The White House is expected to announce the first part of their Middle East peace
    proposal in what officials are calling an economic "workshop" to encourage investing
    capital in the West Bank, Gaza, and the region. The workshop is expected to happen
    on June 25 and 26 in Manama, Bahrain. (CNN)
  - Iran–Saudi Arabia relations
  - Saudi Arabian Minister of Foreign Affairs Adel al-Jubeir says his country "seeks
    to avert war, ready to respond with force and determination" to a would-be attack
    by Iran. (Al Jazeera)
  Law and crime:
  - Several gunmen open fire inside a bar in Belém, Brazil, killing at least eleven
    people. (Bloomberg)
