Date: '2002-12-27'
Source_URI: Portal:Current events/2002 December 27
Intelligence_Payload:
  Uncategorized:
  - Chechen rebels detonate two car bombs at the Grozny headquarters of Chechnya's
    Russian-backed government in an apparent suicide attack, killing more than 80
    people.
  - North Korea expels UN weapons inspectors, and announces plans to reactivate a
    dormant nuclear fuel processing laboratory.
  - Clonaid, the medical arm of a cult called Raëlism, who believe that aliens introduced
    human life on Earth, claims to have successfully cloned a human being. They claim
    that aliens taught them how to perform cloning, even though the company has no
    record of having successfully cloned any previous animal. A spokesperson said
    an independent agency would prove that the baby, named Eve, is in fact an exact
    copy of her mother.
  - Presidential elections in Kenya between Uhuru Kenyatta, candidate for ruling party
    KANU, and Mwai Kibaki, candidate for opposition party NARC. Early reports say
    the latter wins a landslide victory.
