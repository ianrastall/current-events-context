Date: '2002-12-18'
Source_URI: Portal:Current events/2002 December 18
Intelligence_Payload:
  Uncategorized:
  - Insurance and finance company Conseco, deep in debt and facing a federal investigation
    of its accounting practices, filed for Chapter 11 protection in what is at that
    point the third-largest bankruptcy in U.S. history.
  - An Indian court sentences three men to death for treason for their assistance
    in helping five gunmen prepare for the 2001 Indian Parliament attack, which killed
    nine people and triggered a tense standoff with nuclear rival Pakistan. Capital
    punishment in India is rare.
  - Matsushita and Sony have announced that they are collaborating on the development
    of a Linux platform for home electronics.
