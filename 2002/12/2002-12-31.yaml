Date: '2002-12-31'
Source_URI: Portal:Current events/2002 December 31
Intelligence_Payload:
  Uncategorized:
  - United States troops get into a brief gun battle with paramilitary forces of the
    Warzirstan Scouts of Pakistan, in a remote tribal area along the undefined Afghan/Pakistani
    border, in Paktia Province, Afghanistan. One US soldier is wounded by gunfire,
    and several Pakistani soldiers are killed when US air support arrives. The border
    in this region is poorly demarcated. Three missiles from US helicopter gunships
    strike a madrassa owned by former Taliban official Maulana Muhammad Hassan, according
    to the ANI news agency.
  - The first trial of a member of the Russian military for human rights violations
    in Chechnya concludes controversially, with Col. Yuri Budanov found not guilty
    by reason of insanity and committed to a psychiatric hospital for further evaluation
    and treatment. Budanov was charged with murder and abduction after being accused
    of raping and strangling Heda Kungayeva, an 18-year-old Chechen girl whom Budanov
    contends was a rebel sniper.
