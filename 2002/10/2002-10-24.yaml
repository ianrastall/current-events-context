Date: '2002-10-24'
Source_URI: Portal:Current events/2002 October 24
Intelligence_Payload:
  Uncategorized:
  - 'Moscow theatre siege, Second Chechen War: The Chechen rebels holding hundreds
    of hostages in a Moscow theater shot and killed one captive and said they were
    ready to die for their cause, warning that thousands more of their comrades were
    "keen on dying."'
  - 'Beltway sniper: Within hours of Police Chief Charles Moose announcing that John
    Allen Muhammad was wanted in connection with the investigation, Muhammad and his
    17-year-old stepson John Lee Malvo were arrested on federal weapons charges, found
    with the rifle used in the shootings.'
