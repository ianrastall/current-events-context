Date: '2002-10-25'
Source_URI: Portal:Current events/2002 October 25
Intelligence_Payload:
  Armed conflicts and attacks:
  - 'Moscow theatre siege, Second Chechen War: The Chechen separatist "suicide squad"
    release eight children, but keep some 700 people hostage in a Moscow theater rigged
    with explosives. Diplomats wait for the gunmen to honor a pledge to free about
    75 foreigners among their hostages, including Australians, Austrians, Britons,
    Germans and three Americans.'
  - 'Israeli-Palestinian conflict: Hundreds of Israeli soldiers backed by scores of
    tanks and other military vehicles took control of the Palestinian city of Jenin
    in response to a suicide bombing that killed 14 people.'
  Arts and culture:
  - IBM announces that its Blue Gene petaflop supercomputer architecture will use
    the Linux operating system.
  Politics and elections:
  - Kenyan President Daniel arap Moi dissolved the country's Parliament, officially
    starting the campaign for one of the African Great Lakes country's most competitive
    general elections and closing his tenure as one of Africa's longest ruling leaders.
  - The Alberta Alliance Party is officially registered with Elections Alberta.
