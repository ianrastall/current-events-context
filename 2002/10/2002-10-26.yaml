Date: '2002-10-26'
Source_URI: Portal:Current events/2002 October 26
Intelligence_Payload:
  Uncategorized:
  - 'Moscow theatre siege, Second Chechen War: Special forces of the Russian army
    attack the Chechen separatists who were holding hostages in a Moscow theater.
    Fifty of the 53 separatists and 117 of the 800 hostages are killed. Most of hostages
    were killed by poison gas used by the special forces, with most of the surviving
    hostages hospitalised with gas poisoning.'
  - The Anaheim Angels force a decisive seventh game with the San Francisco Giants
    in the 2002 World Series with a dramatic late-inning rally from 5–0 to win 6–5.
