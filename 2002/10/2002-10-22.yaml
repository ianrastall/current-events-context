Date: '2002-10-22'
Source_URI: Portal:Current events/2002 October 22
Intelligence_Payload:
  Uncategorized:
  - Canadian author Yann Martel won the Booker Prize for his "quirky fable" Life of
    Pi. The prize is worth £50,000 ($77,300). Martel's work was picked from 130 novels
    from Britain, Ireland.
  - The German Bundestag made Gerhard Schröder again Chancellor. He was elected with
    305 votes, one vote out of the 306 red-green coalition missing. After that, the
    new ministers of the Bundesregierung were appointed.
