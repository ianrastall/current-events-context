Date: '2002-10-30'
Source_URI: Portal:Current events/2002 October 30
Intelligence_Payload:
  Uncategorized:
  - The government of Canada issued a travel advisory to the United States for all
    Canadian citizens born in Iran, Iraq, Libya, Sudan or Syria after the United States
    announced that anyone born in those countries will be photographed and fingerprinted
    upon arrival in the United States.
  - The European Union accuses tobacco company R. J. Reynolds of selling black market
    cigarettes to drug traffickers and mobsters from Italy, Russia, Colombia and the
    Balkans.
  - The Minnesota Democratic–Farmer–Labor Party chose former Vice President of the
    United States Walter Mondale as their candidate for the United States Senate seat
    of recently deceased Senator Paul Wellstone from Minnesota.
