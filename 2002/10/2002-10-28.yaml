Date: '2002-10-28'
Source_URI: Portal:Current events/2002 October 28
Intelligence_Payload:
  Uncategorized:
  - Three nursing professors are shot dead at the University of Arizona by a student
    flunking out of the nursing program. Robert J. Flores, Jr., 41, shot and killed
    Robin Rogers, 50, Barbara Monroe, 45, and Cheryl McGaffic, 44, before turning
    the gun on himself. Two of the teachers were shot in a classroom and the gunman
    allowed the students to leave before killing himself.
  - Team Bath become the first university team to qualify for the FA Cup First Round
    since 1882. They beat Horsham 4–3 on penalties in the Fourth Qualifying Round
    replay.
