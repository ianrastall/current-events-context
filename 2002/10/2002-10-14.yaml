Date: '2002-10-14'
Source_URI: Portal:Current events/2002 October 14
Intelligence_Payload:
  Law and crime:
  - '2002 Bali bombings: Indonesia''s defense minister blamed al-Qaida and its extremist
    allies for the massive bomb attack that killed more than 180 people at a nightclub
    on the resort island of Bali.'
  - United Kingdom took back the reins of government in Northern Ireland amid a crisis
    in the peace process provoked by a spying scandal, but vowed to try and restore
    home rule early next year. See also Good Friday Agreement.
  - The Washington sniper strikes again for the twelfth time at at a Home Depot in
    Falls Church, Virginia, making Linda Franklin the ninth fatality. (Washington
    Post)
  Sport:
  - The San Francisco Giants defeated the St. Louis Cardinals, four games to one,
    to win the National League Championship Series and move on the World Series. They
    will play the Anaheim Angels, who defeated the Minnesota Twins four games to one
    to win the American League Championship Series.
