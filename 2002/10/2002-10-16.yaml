Date: '2002-10-16'
Source_URI: Portal:Current events/2002 October 16
Intelligence_Payload:
  International relations:
  - 'U.S. plans to invade Iraq: Authorization for Use of Military Force Against Iraq
    Resolution of 2002, was signed into law by President George W. Bush.'
  Law and crime:
  - Seven members of the Dawson family were murdered in Baltimore, Maryland in retribution
    for opposing local drug activity
  Politics and elections:
  - Politics of the Netherlands
  - The cabinet of Balkenende resigns. Because of the constant internal fighting in
    the new party LPF, the other two governing parties, CDA and VVD decided that continuing
    the coalition was impossible. It seems almost certain that there will be new elections,
    possibly as early as December.
  - Officials in Brussels fear that the collapse in the Netherlands will delay the
    expansion of the EU. The Netherlands cabinet was already divided on the issue
    and if new elections are to be held it may take 4–5 months before another cabinet
    is installed that is willing to make a decision.
  - Gerhard Schröder and Joschka Fischer sign the coalition treaty for the second
    red-green cabinet of Germany.
