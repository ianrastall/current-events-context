Date: '2002-10-27'
Source_URI: Portal:Current events/2002 October 27
Intelligence_Payload:
  Politics and elections:
  - Leftist Luis Inácio Lula da Silva handily wins Brazil's presidential election.
  Sport:
  - The Anaheim Angels win the 2002 World Series by four games to three, with a 4–1
    win over the San Francisco Giants in Game 7.
  - Emmitt Smith of the Dallas Cowboys passes Walter Payton as the NFL's leading rusher
    in a 17–14 loss to the Seattle Seahawks.
  Television:
  - The ITV London area television network London Weekend Television closes and Carlton
    Communications took over the channel.
  Games:
  - 'Rockstar Games Video games series Grand Theft Auto, Grand Theft Auto: Vice City
    October 27, 2002 released came out that day.'
