Date: '2002-11-10'
Source_URI: Portal:Current events/2002 November 10
Intelligence_Payload:
  Uncategorized:
  - According to the Guardian newspaper, Gauthier Hulot of the Paris Geophysical Institute
    has discovered evidence of a reduction of the Earth's magnetic field over the
    last two hundred years. It is possible that this may be a prelude to a reversal
    of polarity of the Earth's magnetic field over the next few hundred years.
