Date: '2002-11-11'
Source_URI: Portal:Current events/2002 November 11
Intelligence_Payload:
  Uncategorized:
  - A three-day general strike begins in Nepal. According to Outlook India, "the capital
    Kathmandu virtually came to a standstill ... Maoists have called the strike to
    oppose the King's appointment of Lokendra Bahadur Chand... as prime minister after
    dismissing the government of Sher Bahadur Deuba." Also, 30 Maoist guerrillas were
    killed in a renewed assault on the revolutionary forces the country's government
    is currently fighting against. See also politics of Nepal.
  - The Burrell affair takes a turn for the worse as further scandalous rumours begin
    to circulate about the British royal family and their servants.
  - 'Grigori Perelman uploads an article to arxiv.org with the proof the Poincaré
    conjecture: Perelman, Grisha (November 11, 2002). "The entropy formula for the
    Ricci flow and its geometric applications".'
