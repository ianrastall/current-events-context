Date: '2002-11-24'
Source_URI: Portal:Current events/2002 November 24
Intelligence_Payload:
  Uncategorized:
  - '2002 Austrian legislative elections: The conservative Austrian People''s Party
    (OVP), led by Federal Chancellor Wolfgang Schüssel wins a landslide victory (42.27%
    of the vote), picking up 27 seats and becoming the largest party in the National
    Council for the first time since 1966. The Freedom Party of Austria (FPÖ) is reduced
    to 10.16% of the vote and loses 34 seats.'
  - David McRae, a conservation worker from Guthrie, Angus, Scotland, dies from rabies.
    He was the first person to contract rabies in the United Kingdom since 1902.
  - Philosopher John Rawls dies.
