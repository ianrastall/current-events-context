Date: '2002-11-07'
Source_URI: Portal:Current events/2002 November 7
Intelligence_Payload:
  Uncategorized:
  - A referendum in Gibraltar organised by the Government of Gibraltar showed that
    99% of those who voted rejected a proposal for joint sovereignty with Spain The
    turnout for the referendum was 88%.
  - Colombian drug lord Gilberto Rodríguez Orejuela, one of the leaders of the Cali
    drug cartel, was released from prison (for "good behavior") after serving less
    than half of his sentence, despite objections from the governments of Colombia
    and the United States.
  - Iran banned advertising of US products and an Iranian, believing a sorcerer had
    made him invisible, tried to rob a bank in Tehran.
  - In Northampton, England, four men stand trial accused of the racist murder of
    Ross Parker which occurred shortly after the September 11 attacks.
