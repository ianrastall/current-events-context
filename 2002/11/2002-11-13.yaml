Date: '2002-11-13'
Source_URI: Portal:Current events/2002 November 13
Intelligence_Payload:
  Uncategorized:
  - U.S. President George W. Bush says that an audio tape thought to carry the voice
    of Osama bin Laden, believed to be authentic, has put the "world on notice."
  - The Democratic Caucus of the United States House of Representatives selects California
    Representative Nancy Pelosi as their minority leader, making her the first woman
    to lead a major American party.
  - A new HIV vaccine developed by researchers at the U.S. National Institute of Allergy
    and Infectious Diseases begins clinical trials on humans.
