Date: '2002-11-04'
Source_URI: Portal:Current events/2002 November 4
Intelligence_Payload:
  Uncategorized:
  - 'Yemen: An AGM-114 Hellfire missile launched by an American drone airplane destroyed
    a car carrying what the United States claims were six members of al-Qaeda, including
    the mastermind of the USS Cole attack, Qaed Salim Sinan al-Harethi.'
  - 'Turkey: Turkish Justice and Development Party (AK Party) has won the Turkish
    general election. The AK Party campaigned on economic and social issues, and downplayed
    its Islamist origins. The AK Party''s chairman Recep Tayyip Erdoğan is banned
    from holding political office, so someone else will become Turkish Prime Minister.
    Opponents of the AK Party have expressed concerns that the AK Party''s victory
    may threaten the secular nature of the Turkish state.'
  - 'Human rights: Amnesty International has released a 74-page report accusing the
    Israel Defense Forces of war crimes and human rights violations.'
  - 'Internet: Country code top-level domain administrators have started to talk about
    taking back control of their parts of the domain name system that has been controlled
    by ICANN since the death of Jon Postel. They have complained that ICANN is unaccountable,
    dictatorial and unresponsive to users'' needs.'
