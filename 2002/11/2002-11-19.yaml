Date: '2002-11-19'
Source_URI: Portal:Current events/2002 November 19
Intelligence_Payload:
  Uncategorized:
  - José Bové, member of the anti-globalization movement, will have to carry out a
    fourteen months time in prison for destruction of the transgenic rice seedlings
    in France.
  - 'The tanker Prestige, which has been leaking oil off the north-west coast of Spain
    for several days, split into two at 8 o''clock in the morning (0700 GMT). The
    vessel was reported to be about away from the Spanish coast at that time. The
    entire load of oil is 70,000 ton; most of it is still in the two parts of the
    ship; if all leaks out the resulting damage could be twice that of the Exxon Valdez
    disaster off the coast of Alaska in 1989. Despite efforts, the oil reached the
    coast. See: .'
  - James Coburn, actor, dies of a heart attack, aged 74.
