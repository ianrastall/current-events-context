Date: '2002-11-01'
Source_URI: Portal:Current events/2002 November 1
Intelligence_Payload:
  Uncategorized:
  - An earthquake has killed 29 in the town of San Giuliano di Puglia, in Campobasso,
    Molise, in Italy. Twenty-six of the victims were children killed then the roof
    of their school collapsed. An estimated 5,500 Italians are left homeless.
  - Judge Colleen Kollar-Kotelly announced her findings in the United States v. Microsoft
    antitrust case after the close of the financial markets.
