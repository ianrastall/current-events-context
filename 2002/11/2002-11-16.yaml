Date: '2002-11-16'
Source_URI: Portal:Current events/2002 November 16
Intelligence_Payload:
  Uncategorized:
  - A plot by a group of terrorists believed to be a part of or affiliated to the
    al-Qaeda network was revealed as having been uncovered by MI5. The plot involved
    a plan to release poison gas in the London Underground railway network.
  - Abdullah Gül becomes the new prime minister of Turkey.
