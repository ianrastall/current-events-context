Date: '2002-11-23'
Source_URI: Portal:Current events/2002 November 23
Intelligence_Payload:
  Uncategorized:
  - In the Netherlands, Volkert van der Graaf confessed to the murder of Pim Fortuyn.
    He said he acted alone and did it to protect vulnerable groups in society.
  - Following riots and killings in Nigeria, Miss World contest organizers leave and
    reconvene in London
  - '2002 Ecuadorian elections: In the presidential runoff election, former coup leader
    and left-leaning soldier Lucio Gutiérrez of the January 21 Patriotic Society Party/Pachakutik
    Plurinational Unity Movement – New Country receives 54.4% of the vote to become
    the next president of Ecuador, defeating Álvaro Noboa of the Institutional Renewal
    Party of National Action, who receives 45.2% of the vote.'
