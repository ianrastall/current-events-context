Date: '2002-11-17'
Source_URI: Portal:Current events/2002 November 17
Intelligence_Payload:
  Uncategorized:
  - The UK government has refused to either confirm or deny the putative poison gas
    attack revealed on November 16, although it is known that three men are currently
    being held and investigated under the terms of the Terrorism Act 2000.
  - Abba Eban, former Israeli foreign affairs minister, dies.
  - An Italian court sentences former Prime Minister Giulio Andreotti to 24 years
    in prison for complicity in the 1979 contract killing murder of journalist Mino
    Pecorelli.
