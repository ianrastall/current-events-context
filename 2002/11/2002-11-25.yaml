Date: '2002-11-25'
Source_URI: Portal:Current events/2002 November 25
Intelligence_Payload:
  Uncategorized:
  - President George W. Bush signs the Homeland Security Act into law. The act creates
    a new Department of Homeland Security and is the largest government reorganization
    since the National Security Act of 1947 more than 50 years before.
  - A group of European scientists has announced that they intend to use the Very
    Large Telescope to take pictures of the lunar module bases remaining on the Moon,
    in order to debunk the Apollo moon landing conspiracy theory that states that
    the Apollo moon landings were a hoax.
