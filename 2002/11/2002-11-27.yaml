Date: '2002-11-27'
Source_URI: Portal:Current events/2002 November 27
Intelligence_Payload:
  Uncategorized:
  - The controversial physician Severino Antinori has claimed that a project to clone
    human beings has succeeded, with the first human clone due to be born in 2003.
    His claims were received with skepticism from many observers. The even more controversial
    organization Clonaid then announced that they had five clones waiting to be born,
    one of whom, they claimed, would be born in December 2002.
