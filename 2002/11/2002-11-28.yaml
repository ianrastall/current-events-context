Date: '2002-11-28'
Source_URI: Portal:Current events/2002 November 28
Intelligence_Payload:
  Uncategorized:
  - Thanksgiving Day 2002.
  - '2002 Mombasa attacks: Three suicide bombers detonated themselves at a hotel in
    Mombasa, Kenya, killing a number of people, including Israeli tourists who have
    been presumed to be the targets of the attack. At the same time two anti-aircraft
    missiles were fired at a passenger aircraft, which only narrowly missed. The two
    attacks are suspected to be connected, and it is suspected that al-Qaeda may be
    involved in the attacks.'
  - Henry Kissinger is appointed chairman of the National Commission on Terrorist
    Attacks Upon the United States, commonly known as the 9/11 Commission.
