Date: '2002-07-01'
Source_URI: Portal:Current events/2002 July 1
Intelligence_Payload:
  Uncategorized:
  - A Russian Tupolev Tu-154 airliner and a Boeing 757 operated by DHL collide at
    35,000 ft over Überlingen, due to failure of correct communication from ground-to-air.
    The 69 people aboard the Tupolev (mainly Russian schoolchildren) and the two pilots
    of the Boeing are all killed.
