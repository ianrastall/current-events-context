Date: '2002-08-22'
Source_URI: Portal:Current events/2002 August 22
Intelligence_Payload:
  Uncategorized:
  - 'Extreme weather: In China, the Dongting Lake floods Yueyang, forcing the evacuation
    of 600,000 people; the crest of the flooding from the Yangtze River is expected
    Sunday. Floods and landslides have killed nearly 1000 people in China, 200 in
    the Hunan province. There have been 376 deaths in India, 494 in Nepal, and 158
    deaths in Bangladesh this monsoon season.'
  - 'Government of Canada: Jean Chrétien, the Prime Minister of Canada, announces
    he will step down in February 2004.'
