Date: '2002-09-30'
Source_URI: Portal:Current events/2002 September 30
Intelligence_Payload:
  Uncategorized:
  - Senator Robert Torricelli (D-NJ) withdraws from his campaign for reelection following
    ethics scandals.
  - NOAA and NASA researchers announce the ozone hole over Antarctica has grown markedly
    smaller since last year and has broken into two, due to warmer temperatures.
  - 'Accounting scandals: New York Attorney General Eliot Spitzer has filed civil
    fraud lawsuits against ex-WorldCom CEO Bernie Ebbers, Qwest Communications executives
    Philip Anschutz and Joseph Nacchio, Metromedia Fiber Networks chairman Stephen
    Garofalo, and ex-McLeod USA CEO Clark McLeod.'
  - 'Stock market downturn of 2002: Japanese Prime Minister Junichiro Koizumi fired
    financial regulator Hakuo Yanagisawa in favor of economy minister Heizō Takenaka.'
