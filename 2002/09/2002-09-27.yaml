Date: '2002-09-27'
Source_URI: Portal:Current events/2002 September 27
Intelligence_Payload:
  Uncategorized:
  - Several thousand people marched in Denver, Colorado, to protest the U.S. plan
    to invade Iraq when President Bush visited the city.
  - 'Sports: The best golfers in Europe and the United States begin competition for
    the 2002 Ryder Cup at The Belfry in England.'
  - The annual G7 meeting begins the weekend of the 2002 IMF/World Bank annual meetings
    in Washington, D.C.. 649 protesters from the alternative globalization movement
    are arrested.
  - East Timor becomes the 191st member of the United Nations.
