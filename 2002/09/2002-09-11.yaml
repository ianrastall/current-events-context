Date: '2002-09-11'
Source_URI: Portal:Current events/2002 September 11
Intelligence_Payload:
  Uncategorized:
  - The first anniversary of the September 11, 2001, attacks is marked by many services
    and memorials.
  - Ramzi bin al-Shibh, a key al Qaeda member who supposedly helped to plan the September
    11 attacks was captured in Pakistan
  - Johnny Unitas dies at the age of 69.
  - Skeleton of a baby girl is found encased in a concrete block in a lock-up in Barepot
    near Workington.
