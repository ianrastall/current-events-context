Date: '2002-09-14'
Source_URI: Portal:Current events/2002 September 14
Intelligence_Payload:
  Uncategorized:
  - Tim Montgomery of the United States broke the world record in the 100 meter dash
    at the IAAF Grand Prix Final, running 9.78 seconds to beat the former record of
    9.79 set by Maurice Greene of the United States in 1999.
  - In both San Francisco and Los Angeles, California, hundreds of anti-war protesters
    marched and spoke out against the U.S. plan to invade Iraq.
