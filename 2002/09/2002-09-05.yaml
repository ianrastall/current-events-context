Date: '2002-09-05'
Source_URI: Portal:Current events/2002 September 5
Intelligence_Payload:
  Uncategorized:
  - An assassination attempt was made on President Hamid Karzai of Afghanistan in
    Kandahar. A gunman wearing the uniform of the new Afghan Army opened fire, wounding
    the Governor of Kandahar and an American Special Operations officer. The gunman
    and one of the President's bodyguards were killed.
