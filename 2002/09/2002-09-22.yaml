Date: '2002-09-22'
Source_URI: Portal:Current events/2002 September 22
Intelligence_Payload:
  Uncategorized:
  - Armagh beat Kerry at Croke Park, Dublin by a scoreline of 1-12 to 0-14 to win
    their first All-Ireland Senior Football Championship.
  - A new Bundestag (German parliament) is chosen. In a very tight election, Gerhard
    Schröder defeats Edmund Stoiber to remain Chancellor. The German Green Party does
    very well. The coalition between the SPD and the German Green Party continue with
    Joschka Fischer as vice chancellor.
  - Politics of Germany, Bundestag, List of political parties in Germany (SPD, CDU/CSU,
    Greens, FDP, PDS)
  - 'People: Guido Westerwelle (Chancellor-Candidate of the FDP)'
  - Hurricane Isidore strikes the Yucatán Peninsula as a Category Three hurricane.
