Date: '2002-09-18'
Source_URI: Portal:Current events/2002 September 18
Intelligence_Payload:
  Uncategorized:
  - After three days of negotiations in Sattahip, Thailand, the Tamil Tigers agreed
    to drop their demand for independence from Sri Lanka, and accepted autonomy in
    the north and northwest of the country.
  - 'Archaeologists use a remote-controlled robot to access a hitherto sealed chamber
    within the Great Pyramid of Giza: the robot drilled a hole in a long-sealed door
    and poked a fiber-optic camera through. Unfortunately, all that was revealed was
    another closed door.'
  - Nazi collaborator Maurice Papon is released from jail due to health reasons.
  - The body of abducted British schoolgirl Amanda Dowler is found in remote woodland
    in Yateley near Hampshire.
  - Athlete Bob Hayes dies.
