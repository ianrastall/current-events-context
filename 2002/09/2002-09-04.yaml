Date: '2002-09-04'
Source_URI: Portal:Current events/2002 September 4
Intelligence_Payload:
  Uncategorized:
  - Argentina defeated the United States, 87–80, at the World Basketball Championships
    in Indianapolis, Indiana. It was the first loss ever in international play for
    a United States team containing National Basketball Association players.
  - The Oakland Athletics baseball team won their 20th consecutive game, an American
    League record.
  - Laura Diaz joined rival KCBS-TV after leaving KABC-TV, where she worked for 18
    years.
  - Glenn Tilton joined United Airlines as President, Chairman and Chief Executive
    Officer.
