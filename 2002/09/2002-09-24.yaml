Date: '2002-09-24'
Source_URI: Portal:Current events/2002 September 24
Intelligence_Payload:
  Uncategorized:
  - 'Technology: Motorola has announced a single-chip satellite navigation receiver,
    opening the possibility of the addition of location-specific functions to low
    cost ubiquitous computing devices. The chip combines RF processing, analog signal
    processing, digital signal processing and a CPU on a single chip.'
  - 'Côte d''Ivoire: Côte d''Ivoire rebel soldiers, still attempting to overthrow
    the government, have invested a compound containing over 100 American citizens
    and other foreigners. 200 United States Marines have entered the country.'
