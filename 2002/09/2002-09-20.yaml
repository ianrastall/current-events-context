Date: '2002-09-20'
Source_URI: Portal:Current events/2002 September 20
Intelligence_Payload:
  Uncategorized:
  - 'U.S. plan to invade Iraq: White House and Pentagon officials announce that Gen.
    Tommy Franks presented detailed war plans to President Bush in early September.'
  - Spirited Away was released in the US.
  - Joss Whedon's short-lived TV show Firefly makes its debut.
  - A large tornado carves a path through Indiana, this tornado was given a rating
    of EF3, which is 3/5 on the Enhanced Fujita Scale.
  - A fire destroys a home on Clivus Drive in Nevada County, California, killing two
    dogs and several cats, and leaving a resident with second-degree burns, prompting
    officials to close Highway 49. (The Union)
